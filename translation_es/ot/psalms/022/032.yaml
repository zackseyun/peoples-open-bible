    text: O «su justicia». El hebreo puede denotar rectitud en sentido amplio, incluida la acción justa y salvadora de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «que nacerá».
    reason: lexical_alternative
  - marker: c
    text: O «porque lo ha hecho». La cláusula final en hebreo es breve y puede entenderse tanto como el contenido de lo proclamado como la razón de la proclamación.
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto para seguir más de cerca la evidencia fuente y el audit trail inglés: (1) se cambia a ''su rectitud'' para reflejar la elección principal correspondiente a ''his righteousness'', conservando ''su justicia'' como alternativa; (2) se cambia ''porque'' por ''que'' para mantener como lectura principal la cláusula de contenido de כִּי; (3) se reparan notas con español natural y sin anglicismos; (4) se mantiene la concisión de עָשָׂה con ''lo ha hecho''.'
