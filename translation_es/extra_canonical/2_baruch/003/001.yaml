translation:
  language: es
  text: "Y dije: «¡Oh Señor, mi Señor! ¿He venido al mundo para esto, para ver el mal de mi madre? No, mi Señor.»"
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܐܡܝ
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi ciudad
  - Sión
  lexicon: Payne Smith
  rationale: Conservo la metáfora afectiva de maternidad que el texto usa para Jerusalén/Sión. En español, ‘mi madre’ preserva mejor el lamento poético y la intimidad del discurso que una explicitación interpretativa en el texto principal.
- source_word: ܒܝܫܬܗ̇
  english_pob_choice: the evil of my mother
  chosen_spanish: el mal de mi madre
  alternatives_spanish:
  - la desgracia de mi madre
  - la destrucción de mi madre
  lexicon: Payne Smith
  rationale: El siríaco aquí corresponde al ‘mal’/‘maldad’ o calamidad padecida por la ciudad personificada. ‘El mal’ mantiene la amplitud semántica de la POB inglesa y evita adelantar ‘destrucción’, que el audit trail reserva para el verso siguiente.
- source_word: ܐܡܪ / ܐܢܐ ... ܒܥܝܬܗ̇
  english_pob_choice: have I asked / that I should see
  chosen_spanish: he pedido / para ver
  alternatives_spanish:
  - he venido al mundo / para ver
  - he suplicado / para contemplar
  lexicon: Payne Smith
  rationale: El control revisado corrige la lectura que introducía ‘come into the world’. Por eso traduzco el valor de petición (‘he pedido’) y mantengo el infinitivo final ‘ver’, sin expandir el verso con material no sustentado por el siríaco.
theological_decisions:
- issue: Identidad de ‘mi madre’
  english_pob_reading: Baruch speaks of Jerusalem/Zion as ‘my mother.’
  chosen_spanish_reading: Baruc habla de Jerusalén/Sión como ‘mi madre’.
  alternative_spanish_readings:
  - El término se refiere de modo genérico al pueblo
  - Debe convertirse en ‘mi ciudad’ en el texto principal
  rationale: La imagen materna es central para el lamento y expresa la relación de pacto y duelo. Mantenerla en español conserva el paralelismo afectivo y evita reinterpretar la metáfora en la línea principal.
  doctrine_reference: Personificación profética de Sión/Jerusalén en la literatura judía
- issue: Fuerza de la pregunta retórica
  english_pob_reading: Baruch asks whether he has come into the world for this purpose.
  chosen_spanish_reading: Baruc se pregunta si pidió/solicitó algo para terminar viendo el mal de su madre.
  alternative_spanish_readings:
  - Baruc afirma que vino al mundo para esto
  - La frase debe parafrasearse como una mera queja emocional
  rationale: El paquete fuente revisado elimina ‘come into the world’. La pregunta retórica conserva el tono de crisis sin introducir una afirmación no atestiguada por el siríaco.
  doctrine_reference: Lectura controlada por el texto siríaco y el aparato de revisión
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por revisiones importantes: una expansión previa con ‘come into the world’ fue luego corregida por el control siríaco, que devuelve la idea de haber pedido/suplicado y reserva ‘destrucción’ para el siguiente versículo. La traducción española sigue la lectura revisada y evita el material descartado.'
  spanish_consistency_notes:
  - Se usa ‘mi Señor’ para reproducir el paralelismo reverencial del original y del inglés auditado.
  - Se mantiene ‘mi madre’ como metáfora sin sustituirla por ‘mi ciudad’ en el texto principal.
  - El marcador [a] aparece exactamente en el punto anclado para habilitar la nota alternativa.
