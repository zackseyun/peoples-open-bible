  - severity: low
    issue: 'La nota [c] usa una alternativa poco natural: «se enciende un poco»'
    rationale: La documentación inglesa habla de «is kindled but a little» o «will blaze in a little while». En español, «se enciende por poco» o «arderá dentro de poco» comunica mejor brevedad o inmediatez sin sonar torpe.
  - severity: low
    issue: Puntuación/estilo menor en la nota [a]
    rationale: La comilla inicial sobrante antes de «O:» entorpece la presentación y conviene normalizarla.
