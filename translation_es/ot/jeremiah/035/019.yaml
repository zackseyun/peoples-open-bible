base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/035/019.yaml
  text: 'Therefore thus says Yahweh of hosts[b][a], the God of Israel: Jonadab the son of Rechab shall never lack a man to stand before me all the days.'
  footnotes:
  - marker: a
    text: Or, more literally, 'shall not be cut off from Jonadab son of Rechab a man standing before me all the days.'
    reason: lexical_alternative
  - marker: b
    text: '''Standing before me'' may denote service in God''s presence; the text does not specify a particular office.'
    reason: alternative_reading
