    issue: Relativo «quien» menos natural que «que» en este contexto
    rationale: Aunque gramaticalmente posible, «a Dios, quien verdaderamente dirigirá tus pasos» suena más calcado y menos natural en español neutro que «a Dios, que verdaderamente dirigirá tus pasos». La decisión léxica inglesa sobre אשר no obliga a mantener un relativo personal marcado si el español fluye mejor con «que».
