translation:
  language: es
  text: Salomón siguió[a] a Ashtoret[b], el dios[c] de los sidonios, y a Milcom[d], la abominación de los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue tras», un modismo hebreo que expresa adhesión o lealtad cultual, no solo movimiento físico.
    reason: lexical_alternative
  - marker: b
    text: O «Astarté», una forma más conocida del nombre de esta deidad.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el dios(es) de los sidonios»; aunque se nombra a una deidad femenina, aquí el texto conserva esa forma.'
    reason: lexical_alternative
  - marker: d
    text: Algunas tradiciones asocian Milcom con Moloc, pero el texto hebreo aquí lee «Milcom».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ אַחֲרֵי
  english_pob_choice: went after
  chosen_spanish: siguió
  alternatives_spanish:
  - fue tras
  - anduvo tras
  lexicon: HALOT
  rationale: El hebreo expresa una secuencia idiomática de adhesión o lealtad cultual, no solo desplazamiento físico. En español, «siguió» comunica esa idea de ir tras alguien o algo sin forzar una expansión interpretativa a «adoró».
- source_word: עַשְׁתֹּרֶת
  english_pob_choice: Ashtoreth
  chosen_spanish: Astarté
  alternatives_spanish:
  - Ashtoret
  - Astoret
  lexicon: HALOT
  rationale: Se conserva el nombre propio de la deidad con una forma reconocible y natural en español. «Astarté» es una equivalencia tradicional y ampliamente comprensible, mientras que «Ashtoreth» sería más pegado a la forma hebrea pero menos natural para lectura pública.
- source_word: אֱלֹהֵי צִדֹנִים
  english_pob_choice: the god of the Sidonians
  chosen_spanish: el dios de los sidonios
  alternatives_spanish:
  - la diosa de los sidonios
  - los dioses de los sidonios
  lexicon: HALOT
  rationale: Aunque el contexto presenta a Astarté como deidad femenina, la forma hebrea aquí es un constructo plural («dios(es) de») y el audit trail inglés decidió no especificar «goddess» en la redacción final. Por fidelidad al texto fuente y a esa revisión, se mantiene «el dios de los sidonios», dejando visible la tensión morfológica y contextual.
- source_word: מִלְכֹּם
  english_pob_choice: Milcom
  chosen_spanish: Milcom
  alternatives_spanish:
  - Molec
  lexicon: HALOT
  rationale: Se translitera el nombre tal como aparece en el texto hebreo. No se sustituye por «Molec» porque el testimonio consonántico aquí lee Milcom, y el material auditado distingue ambas formas.
- source_word: שִׁקֻּץ
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - abominable cosa
  - ídolo detestable
  lexicon: HALOT
  rationale: «Abominación» reproduce con dignidad y fuerza el valor peyorativo fuerte del término hebreo, que suele marcar algo ritualmente o moralmente detestable.
theological_decisions:
- issue: Conservar la idiomática hebrea sin explicitar que se trata de idolatría en el verbo principal
  english_pob_reading: Retain the Hebrew idiom 'went after' without expanding to 'worshiped' in the main text.
  chosen_spanish_reading: Mantener «siguió» sin expandir a «adoró» en el texto principal.
  alternative_spanish_readings:
  - adoró a Astarté
  - se entregó al culto de Astarté
  rationale: El verso en sí usa el modismo de ir tras, y la traducción debe preservar esa forma para no resolver por adelantado lo que el contexto narrativo deja inferir. La carga idolátrica queda disponible por el conjunto de la perícopa y por los sustantivos deidades/abominación.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail inglés: se evitó traducir ''goddess'' en la línea principal, porque la revisión final volvió a ''the god of the Sidonians'' para reflejar el hebreo אֱלֹהֵי. También se preservó la decisión de no expandir el modismo a ''worshiped'' en la redacción principal.'
  spanish_consistency_notes:
  - Se prefirió «Astarté» como forma natural en español, manteniendo el nombre propio transliterado/tradicional y no una paráfrasis.
  - «Abominación» se usó de manera consistente para שִׁקֻּץ, en línea con el tono fuerte del original.
  - No se introdujo «SEÑOR» ni otros sustitutos, porque el versículo no contiene el tetragrámaton.
  - La puntuación sigue el orden del hebreo y la cadencia de la versión auditada, con comas para separar las dos cláusulas paralelas.
