revisions:
- from: ¡Ciertamente en vano he mantenido puro mi corazón[a][b], y he lavado mis manos en inocencia.
  to: Ciertamente, en vano he mantenido puro mi corazón[a], y lavé mis manos en inocencia[b].
  rationale: Se quita la exclamación impropia, se añade una coma tras «Ciertamente» para reflejar mejor la partícula discursiva, se reubica la nota cultural al sintagma que realmente explica, y se ajusta «he lavado» a «lavé» para un español poético más natural sin cambiar el sentido fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:20:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido del hebreo: partícula enfática («Ciertamente»), futilidad («en vano»), pureza moral del corazón, y la imagen paralela de lavarse las manos «en inocencia». También conserva adecuadamente la tensión entre imagen ritual y sentido ético. Sin embargo, la puntuación y el anclaje de notas no están bien resueltos.'
  spanish_quality_summary: El español es claro y natural, pero el signo inicial de exclamación no corresponde al tono del versículo ni tiene cierre, y «he lavado» puede simplificarse a «lavé» para un paralelismo más idiomático en poesía española. Además, la nota b está anclada a «corazón» cuando explica la imagen de «lavé mis manos en inocencia».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las elecciones «corazón», «inocencia» y «manos» son fieles y legibles. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: Uso incorrecto de exclamación en «¡Ciertamente»
    rationale: El texto abre con signo de exclamación sin cierre y añade una carga emotiva no exigida por אַךְ, que aquí funciona como partícula aseverativa/discursiva, no exclamativa.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota cultural explica la expresión «lavé mis manos en inocencia», pero en el borrador aparece junto a «mi corazón», lo que confunde la referencia.
  - severity: low
    issue: «y he lavado» suena menos natural que «y lavé» en este paralelismo poético
    rationale: Aunque el perfecto compuesto es posible, «lavé» da mejor fluidez y simetría en español poético con la primera cláusula sin alterar el sentido.
  revised_spanish_text: Ciertamente, en vano he mantenido puro mi corazón[a], y lavé mis manos en inocencia[b].
  revised_footnotes:
  - marker: a
    text: O «por nada» en lugar de «en vano».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lavé mis manos en inocencia/limpieza», una imagen de inocencia moral más que de un lavado meramente físico.
    reason: cultural_note
  revision_rationale: Se quita la exclamación impropia, se añade una coma tras «Ciertamente» para reflejar mejor la partícula discursiva, se reubica la nota cultural al sintagma que realmente explica, y se ajusta «he lavado» a «lavé» para un español poético más natural sin cambiar el sentido fuente.
