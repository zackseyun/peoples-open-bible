    rationale: Aunque posible, desplaza el sentido desde ‘hacerse querido/apreciado’ hacia ‘parecer agradable’, y no conserva tan bien el valor relacional de προσφιλής documentado en el audit trail.
  - severity: medium
    issue: «amabilidades» para χάριτες
    rationale: El POB inglés eligió «favors» como sentido contextual principal. «Amabilidades» se acerca a gestos corteses, pero pierde la amplitud semántica de actos de favor y se aleja de la decisión auditada; conviene «favores» con nota para alternativas.
  - severity: low
    issue: «por su palabra» suena menos natural que «por sus palabras»
    rationale: ἐν λόγῳ puede expresarse instrumentalmente en singular o plural, pero en español bíblico contemporáneo «por sus palabras» comunica mejor el medio del habla sin rigidez.
  revised_spanish_text: El sabio, por sus palabras[a], se hará apreciar; pero los favores[b] de los necios se derramarán.
