translation:
  language: es
  text: Tú te sientas y hablas contra tu hermano; calumnias[a] al hijo de tu propia madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «echas reproche contra el hijo de tu propia madre». El hebreo dice literalmente «das דפי», un modismo que significa poner reproche, culpa o habla difamatoria sobre alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּשֵׁב
  english_pob_choice: You sit
  chosen_spanish: Tú te sientas
  alternatives_spanish:
  - Tú te sientas
  - Tú te sientas y
  lexicon: HALOT
  rationale: Conservar el verbo concreto de ישׁב evita suavizar la imagen hebrea; en español, el presente directo funciona bien como forma proverbial o acusatoria.
- source_word: בְּאָחִיךָ
  english_pob_choice: against your brother
  chosen_spanish: contra tu hermano
  alternatives_spanish:
  - con tu hermano
  - sobre tu hermano
  lexicon: HALOT
  rationale: La preposición ב con דבר puede tener valor adversativo en contexto hostil; 'contra' reproduce ese matiz mejor que 'con' o 'sobre'.
- source_word: תְדַבֵּר
  english_pob_choice: speak
  chosen_spanish: hablas
  alternatives_spanish:
  - hablas
  - dices
  lexicon: HALOT
  rationale: '''Hablas'' mantiene el acto de hablar sin sobrecargar el verbo, ya que la dirección hostil queda expresada por ''contra tu hermano''.'
- source_word: בְּבֶן אִמְּךָ
  english_pob_choice: your own mother's son
  chosen_spanish: al hijo de tu propia madre
  alternatives_spanish:
  - al hijo de tu madre
  - a tu propio hermano
  lexicon: HALOT
  rationale: La expresión conserva el paralelismo familiar intenso del hebreo y evita perder el énfasis en la misma madre; 'propia' reproduce la fuerza relacional.
- source_word: תִּתֶּן דֹּפִי
  english_pob_choice: you slander
  chosen_spanish: calumnias
  alternatives_spanish:
  - levantas reproche
  - echas reproche
  lexicon: HALOT
  rationale: La frase hebrea es idiomática ('dar דפי'); en español, 'calumnias' comunica de forma natural el acto de emitir palabras difamatorias sin traducir mecánicamente 'das reproche'.
- source_word: דֹּפִי
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - reproche
  - difamación
  lexicon: HALOT
  rationale: '''Calumniar'' y ''calumnia'' expresan bien el daño verbal del sustantivo דפי en un registro actual; se prefiere la forma verbal en la primera cola y el sustantivo implícito en la segunda para fluidez.'
translation_notes:
  revision_awareness: Se siguió el consenso alto del audit trail inglés sin cambios sustantivos. La principal decisión fue mantener el valor adversativo de בְּאָחִיךָ y traducir el idiomático תִּתֶּן דֹּפִי con un equivalente natural en español, evitando un calco como 'das reproche'.
  spanish_consistency_notes:
  - Se usa 'hermano' en sentido de par del mismo pueblo o familiar cercano, acorde con el paralelismo del verso.
  - Se eligió 'calumnias' para captar el valor difamatorio de דֹּפִי sin perder la viveza del hebreo.
  - El versículo queda en presente gnómico/proverbial en español, coherente con el tono acusatorio del hebreo.
