revisions:
- from: 'Ahora bien, estos son los nombres de las tribus: desde la extremidad norte[a], junto al camino de Hetlón, hasta Lebo-hamat, Hazar-enán, al límite de Damasco hacia el norte, junto a Hamat, y se extenderá para él desde el lado oriental hasta el mar: Dan, una porción.'
  to: 'Ahora bien, estos son los nombres de las tribus: desde el extremo norte, junto al camino de Hetlón hasta Lebo-hamat[a], Hazar-enán, en el límite de Damasco hacia el norte, junto a Hamat; y su territorio se extenderá desde el lado oriental hasta el mar: Dan, una porción.[b]'
  rationale: Se corrige la ubicación de la nota para que acompañe a Lebo-hamat, en línea con el rastro de auditoría inglés. Se añade una segunda nota para conservar la alternativa interpretativa del hebreo comprimido en la cláusula final, tal como hace el POB inglés. En el texto principal, «extremo norte» mejora la naturalidad, y «su territorio se extenderá» expresa con más claridad la función de וְהָיוּ לוֹ dentro de la descripción del lote de Dan, sin sobreparafrasear.
  reviewer_model: gpt-5.4
