translation:
  language: es
  text: y los sacerdotes no pudieron mantenerse en pie para ministrar a causa de la nube, porque la gloria de Yahvé llenó la casa de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Dios». Literalmente, «la casa de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  english_pob_choice: could
  chosen_spanish: pudieron
  alternatives_spanish:
  - fueron capaces de
  - les fue posible
  lexicon: HALOT
  rationale: El hebreo expresa capacidad/posibilidad; en español, "no pudieron" comunica de forma natural esa incapacidad sin añadir matices ajenos.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros
  lexicon: HALOT
  rationale: El sustantivo definido se refiere de manera directa a los sacerdotes; "sacerdotes" es claro y fiel en español.
- source_word: לַעֲמוֹד
  english_pob_choice: stand
  chosen_spanish: mantenerse en pie
  alternatives_spanish:
  - estar de pie
  - permanecer en pie
  lexicon: HALOT
  rationale: Como en contexto no se trata solo de adoptar la postura momentánea sino de permanecer aptos para el servicio, "mantenerse en pie" conserva la imagen concreta y sugiere continuidad.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT
  rationale: En contexto sacerdotal, la idea es servicio litúrgico. "Ministrar" conserva el valor cultual más específico que el simple "servir".
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - debido a
  - por
  lexicon: HALOT
  rationale: La preposición expresa causa; "a causa de" reproduce de forma natural y transparente la relación causal.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube visible
  - la nube de gloria
  lexicon: HALOT
  rationale: El hebreo solo dice "la nube"; no se amplía en el texto principal para no introducir interpretaciones no explicitadas aquí.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introducción explicativa/causal. En español, "porque" hace la relación más natural y clara en esta secuencia narrativa.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba llenando
  lexicon: HALOT
  rationale: El perfecto verbal narra un hecho consumado; "llenó" preserva la acción completa sin sobrecargar el aspecto.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  - la gloria del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como "Yahvé" según el estándar del proyecto; "gloria" mantiene el sentido de manifestación gloriosa de Dios.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: El hebreo dice literalmente "casa de Dios"; en español, "casa de Dios" es fiel y más transparente que "templo" en el texto principal.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El audit trail inglés preserva el nombre propio divino y no una sustitución titulada. En español, la forma estándar del proyecto es "Yahvé", que conserva el referente del Tetragrama sin enmascararlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la nube y la imposibilidad de los sacerdotes
  english_pob_reading: because of the cloud
  chosen_spanish_reading: a causa de la nube
  alternative_spanish_readings:
  - por la nube
  - debido a la nube
  rationale: 'El hebreo presenta una causalidad directa: la nube impedía a los sacerdotes permanecer para ministrar. "A causa de" comunica esa relación sin atenuarla.'
  doctrine_reference: HALOT / sintaxis de מִפְּנֵי
- issue: 'בית האלהים: ''house of God'' frente a ''temple of God'''
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  rationale: La nota inglesa preserva la literalidad de 'house of God' y solo admite 'temple' como alternativa interpretativa. En español, "casa de Dios" conserva el hebreo de manera más directa en el texto base.
  doctrine_reference: Lexical note on בֵּית הָאֱלֹהִים
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente indicado como sin cambios; no se detectaron ajustes pendientes respecto del juicio auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Yahvé» según la terminología del proyecto.
  - Se prefirió «casa de Dios» en el texto principal para reflejar la literalidad hebrea; «templo de Dios» queda implícito como alternativa contextual, no como sustitución.
  - «Ministrar» se usó con sentido cultual, coherente con el contexto sacerdotal y la decisión inglesa de no reducirlo a «servir».
