  language: en
  yaml_path: translation/ot/esther/005/014.yaml
  text: Then Zeresh his wife and all his friends said to him[a], “Let a gallows fifty cubits high be made, and in the morning tell the king to have Mordecai hanged on it. Then go with the king to the banquet rejoicing.” The matter pleased Haman[c][b], and he made the gallows.
  footnotes:
  - marker: a
    text: Or 'a stake' or 'a pole.' The Hebrew עֵץ can denote wood, tree, or a wooden execution structure; the exact form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Fifty cubits is roughly 75 feet or 23 meters.
    reason: cultural_note
  - marker: c
    text: Or 'to have Mordecai impaled on it.' The Hebrew wording can refer to suspension on a wooden structure, and the precise execution method is debated.
    reason: alternative_reading
