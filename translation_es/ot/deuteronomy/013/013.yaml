translation:
  language: es
  text: Si oyes decir en una de tus ciudades que Yahvé tu Dios te da para habitar allí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando oigas». El hebreo puede introducir aquí una cláusula condicional o temporal en material legal. O «para establecerte allí».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Porque
  lexicon: HALOT
  rationale: En este contexto legal-casuístico, כִּי introduce una cláusula condicional; «Si» expresa mejor esa apertura de escenario que una causal o temporal.
- source_word: תִשְׁמַע
  english_pob_choice: you hear
  chosen_spanish: oyes decir
  alternatives_spanish:
  - oyes
  - escuchas
  - te enteras
  lexicon: HALOT
  rationale: Aquí שׁמע expresa recibir un informe; «oyes decir» conserva la idea de un reporte oído, sin forzar un objeto explícito que el hebreo no da en esta línea.
- source_word: בְּאַחַת עָרֶיךָ
  english_pob_choice: in one of your cities
  chosen_spanish: en una de tus ciudades
  alternatives_spanish:
  - en una de tus poblaciones
  - en una de tus villas
  lexicon: HALOT
  rationale: «Ciudades» reproduce el valor normal de עִיר en este marco legal y mantiene la correspondencia con el conjunto de asentamientos urbanos de Israel.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: de las que
  alternatives_spanish:
  - que
  - cual
  lexicon: HALOT
  rationale: El relativo modifica «ciudades». En español, «de las que» integra con naturalidad la relación posesiva/partitiva que el hebreo expresa con mayor concisión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma de política terminológica del proyecto, no una sustitución titular. «Yahvé» es la transliteración española establecida en este draft.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Elohim
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La expresión de pacto con sufijo de segunda persona se vierte de manera directa como «tu Dios», manteniendo la relación personal y covenantal.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te concede
  lexicon: HALOT
  rationale: El participio hebreo puede expresar acción en curso o característica. En español, «te da» fluye de forma natural en esta fórmula y preserva la idea de dádiva divina sin alargar innecesariamente la frase.
- source_word: לָשֶׁבֶת שָׁם
  english_pob_choice: to dwell there
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar allí
  - para vivir allí
  - para establecerte allí
  lexicon: HALOT
  rationale: «Habitar» conserva el registro formal y la resonancia bíblica de יׁשב, evitando una paráfrasis más doméstica que podría debilitar el matiz de asentamiento.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - 'así:'
  - diciendo lo siguiente
  lexicon: HALOT
  rationale: «Diciendo» refleja la partícula quotativa que introduce el contenido del informe en el versículo siguiente. Se deja abierta la continuación inmediata del discurso.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a Dios con el Tetragrámaton. La política del proyecto exige preservar el nombre propio en lugar de sustituirlo por un título, por lo que se usa «Yahvé» en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió un registro más formal para לָשֶׁבֶת. Frente al borrador inglés previo con «to live there», el ajuste a «to dwell there» se refleja en español con «para habitar», manteniendo la formalidad y la cercanía semántica al hebreo. También se respeta el nombre divino como «Yahvé» según la norma del proyecto, en vez de una sustitución por título.
  spanish_consistency_notes:
  - Se conserva la fórmula legal condicional con «Si» para כִּי, coherente con el contexto casuístico.
  - «Oyes decir» evita introducir información no explícita y mantiene el valor reportativo de שׁמע.
  - Se usa «ciudades» de forma consistente con el tratamiento del sustantivo עִיר en contextos legales.
  - El infinitivo «para habitar» sostiene el registro bíblico-formal sin caer en arcaísmo excesivo.
  - No se añade contenido interpretativo sobre el mensaje reportado; la oración queda abierta como en el hebreo.
