base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/031.yaml
  text: Then Hezekiah answered and said[a], “Now you have filled your hand for Yahweh. Come near and bring sacrifices and thank offerings to the house of Yahweh.” And the assembly brought sacrifices and thank offerings, and all who were willing of heart brought burnt offerings.
  footnotes:
