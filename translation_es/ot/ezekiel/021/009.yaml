revisions:
- from: Porque he cortado de ti al justo y al impío[a], por eso mi espada saldrá de su vaina contra toda carne, desde el sur hasta el norte.[b]
  to: Porque cortaré de ti tanto al justo como al impío[a], por eso mi espada saldrá de su vaina contra toda carne[b], desde el sur hasta el norte.
  rationale: Se ajusta הִכְרַתִּי a la decisión principal auditada en inglés, usando un futuro profético natural en español («cortaré») y dejando la lectura pasada en nota alternativa. También se mejora levemente la claridad inclusiva con «tanto… como…» y se conserva el resto de la formulación, que ya era fiel y legible.
