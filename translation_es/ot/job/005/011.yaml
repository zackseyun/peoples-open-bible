translation:
  language: es
  text: para poner a los abatidos en alto,[b] y los que están de luto[a] son exaltados a salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que son oscurecidos» o «los dolientes»; el participio hebreo evoca aflicción con imagen de oscuridad.
    reason: lexical_alternative
  - marker: b
    text: O «a lo alto», o, con la frase siguiente, «a salvación», «a liberación» o «a seguridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָשׂוּם
  english_pob_choice: to set
  chosen_spanish: poner
  alternatives_spanish:
  - colocar
  - poner en
  lexicon: HALOT
  rationale: El infinitivo constructo expresa propósito o resultado. «Poner» conserva la fuerza verbal de la acción sin añadir un matiz de nombramiento o institución que no está en el hebreo.
- source_word: שְׁפָלִים
  english_pob_choice: the lowly
  chosen_spanish: los abatidos
  alternatives_spanish:
  - los humildes
  - los de baja condición
  - los bajos
  lexicon: HALOT
  rationale: El término describe a quienes están bajos, humillados o rebajados. «Abatidos» mantiene esa lowness tanto social como existencial, y evita convertirlo solo en virtud interior como «humildes».
- source_word: לְמָרוֹם
  english_pob_choice: on high
  chosen_spanish: en alto
  alternatives_spanish:
  - a lo alto
  - en un lugar alto
  - hacia lo alto
  lexicon: HALOT
  rationale: La imagen literal es de elevación. «En alto» es natural en español y conserva el contraste con «abatidos».
- source_word: וְקֹדְרִים
  english_pob_choice: those who mourn
  chosen_spanish: los que están de luto
  alternatives_spanish:
  - los dolientes
  - los que se lamentan
  - los que están oscurecidos
  lexicon: HALOT
  rationale: El participio puede denotar oscuridad, aflicción o luto. En este contexto de reversión y rescate, «los que están de luto» comunica bien la experiencia de duelo sin perder del todo la imagen sombría.
- source_word: שָׂגְבוּ
  english_pob_choice: are lifted up
  chosen_spanish: los elevan
  alternatives_spanish:
  - son levantados
  - son exaltados
  - son puestos en alto
  lexicon: HALOT
  rationale: El hebreo expresa ser hecho alto/exaltado. Dado el paralelismo con el primer hemistiquio, el español puede entender la elevación de modo resultativo; «los elevan» conserva la imagen de subir y funciona bien con la siguiente frase.
- source_word: יֶשַׁע
  english_pob_choice: to salvation
  chosen_spanish: a salvación
  alternatives_spanish:
  - a liberación
  - a rescate
  - a seguridad
  lexicon: HALOT
  rationale: «Salvación» preserva el alcance léxico amplio de יֶשַׁע y su resonancia teológica, sin reducirlo solo a ayuda temporal. La preposición «a» reproduce el movimiento hacia ese estado de rescate.
theological_decisions:
- issue: Alcance de יֶשַׁע en un contexto sapiencial
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - seguridad
  rationale: En sabiduría, el término puede abarcar rescate concreto, seguridad o salvación. «Salvación» conserva la amplitud semántica y la resonancia bíblica sin imponer un desarrollo doctrinal ajeno al contexto inmediato.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: Sin cambios de revisión posteriores en el paquete auditado; el texto inglés más reciente permaneció sin cambios tras la pasada de revisión, con observaciones menores sin alterar el sentido base.
  spanish_consistency_notes:
  - Se mantiene «salvación» para יֶשַׁע, en continuidad con la decisión inglesa y con el valor léxico amplio del término.
  - «Abatidos» evita una lectura exclusivamente moral de שְׁפָלִים y conserva el contraste poético con la elevación.
  - La nota sobre וְקֹדְרִים preserva la tensión entre luto y oscuridad, ya documentada en el audit trail inglés.
