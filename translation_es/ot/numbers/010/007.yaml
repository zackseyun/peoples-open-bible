translation:
  language: es
  text: Pero cuando reúnan a la congregación[a], harán sonar, y no tocarán señal de alarma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la asamblea». El hebreo קָהָל puede referirse al pueblo reunido como cuerpo comunitario.
    reason: lexical_alternative
  - marker: b
    text: O «tocarán un toque de alarma». El hebreo contrasta el toque ordinario con la señal distintiva de alarma usada para ponerse en marcha en el contexto circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/הַקְהִיל
  english_pob_choice: But when assembling
  chosen_spanish: Pero cuando se reúna
  alternatives_spanish:
  - Y cuando se reúna
  - Pero al reunir
  lexicon: HALOT
  rationale: El infinitivo hifil con prefijo conjuntivo/preposicional expresa aquí la circunstancia temporal de reunir al pueblo. «Cuando se reúna» comunica bien el valor temporal en español y conserva el matiz pasivo/medio implícito del contexto, sin volver la frase demasiado mecánica.
- source_word: הַקָּהָל
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - el pueblo reunido
  lexicon: HALOT
  rationale: קָהָל designa al grupo reunido del pacto. «Congregación» mantiene el sentido comunitario y cultual que el POB inglés también privilegia, y es natural en español eclesial sin desplazar el referente.
- source_word: תִּתְקְעוּ
  english_pob_choice: you shall blow
  chosen_spanish: tocarán
  alternatives_spanish:
  - harán sonar
  - tocaréis
  lexicon: HALOT
  rationale: En este contexto תקע se refiere al toque de trompeta. «Tocarán» es idiomático en español para instrumentos de viento y evita la redundancia de añadir «las trompetas» cuando el hebreo no las repite en esta cláusula.
- source_word: וְלֹא
  english_pob_choice: and you shall not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - ni
  lexicon: HALOT
  rationale: La negación coordina la segunda cláusula con la primera. En español, «y no» mantiene la simple coordinación normativa del hebreo sin cargar innecesariamente el contraste.
- source_word: תָרִיעוּ
  english_pob_choice: sound an alarm
  chosen_spanish: darán la señal de alarma
  alternatives_spanish:
  - sonarán la alarma
  - harán sonar una alarma
  lexicon: HALOT
  rationale: El verbo הריע en contextos de trompeta no es simplemente «hacer ruido», sino dar la señal distintiva de alarma. «Dar la señal de alarma» conserva la fuerza técnica y la diferencia respecto al toque ordinario del primer miembro.
theological_decisions:
- issue: Contraste entre el toque ordinario y la señal de alarma
  english_pob_reading: The Hebrew contrasts ordinary blowing with the distinctive alarm signal used for setting out in the surrounding context.
  chosen_spanish_reading: El texto distingue entre tocar para reunir y dar la señal de alarma.
  alternative_spanish_readings:
  - El texto opone un toque común a una alarma
  - El texto distingue un toque ordinario de una señal de partida
  rationale: La distinción funcional del verso forma parte del sentido del pasaje. La formulación española debe conservar ese contraste para no borrar la diferencia ritual señalada por el hebreo y por la nota inglesa.
  doctrine_reference: Nm 10:1–10; contexto inmediato de las trompetas de plata
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la redacción española se ajusta al mismo contraste semántico entre el toque ordinario y la señal de alarma, manteniendo la distinción del contexto inmediato.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en toda la serie, pero en este versículo no aparece el nombre divino.
  - Se mantiene «congregación» como término cultual consistente con el valor de קָהָל en este contexto.
  - Se conserva la distinción entre «tocar» y «dar la señal de alarma» para no fusionar dos actos instrumentales distintos.
