  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Carne» preserva correctamente בשר en sentido literal físico. No aparecen términos sensibles como Yahvé/Mesías/Espíritu. «Lomos» concuerda con la decisión documentada. La única falta relevante es conservar en español la nota léxica sobre נִקְלֶה como término difícil, con alternativas como «inflamación» o «quemazón/ardor».
