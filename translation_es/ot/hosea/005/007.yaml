  text: בַּ/יהוָ֣ה בָּגָ֔דוּ כִּֽי בָנִ֥ים זָרִ֖ים יָלָ֑דוּ עַתָּ֛ה יֹאכְלֵ֥/ם חֹ֖דֶשׁ אֶת חֶלְקֵי/הֶֽם־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/hosea/005/007.yaml
  text: They have dealt faithlessly with Yahweh[a], for they have borne foreign children[b]. Now the new moon will devour them with their portions.
  footnotes:
