translation:
  language: es
  text: Y sucedió el séptimo día que algunos[a] del pueblo salieron a recoger, pero no hallaron nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de entre el pueblo»; el sentido es partitivo, es decir, solo una parte del pueblo salió.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el siguiente hecho en secuencia; «Y sucedió» mantiene el flujo narrativo sin sonar arcaico.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - el séptimo día
  - en el día séptimo
  lexicon: HALOT
  rationale: La frase temporal es directa; «en el séptimo día» conserva la referencia sin añadir «de la semana», que no está en el hebreo.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron afuera
  - se fueron
  lexicon: HALOT
  rationale: יצא expresa movimiento hacia fuera; en español «salieron» es natural y fiel al sentido de desplazamiento desde el campamento o lugar donde estaban.
- source_word: מִן הָעָם
  english_pob_choice: some of the people
  chosen_spanish: algunos del pueblo
  alternatives_spanish:
  - algunos del pueblo
  - una parte del pueblo
  - unos del pueblo
  lexicon: HALOT
  rationale: 'La preposición מן con «el pueblo» señala sentido partitivo: no todo el pueblo salió, sino solo una parte. «Algunos del pueblo» comunica esa restricción de manera clara en español.'
- source_word: לִלְקֹט
  english_pob_choice: to gather
  chosen_spanish: a recoger
  alternatives_spanish:
  - para recoger
  - a juntar
  lexicon: HALOT
  rationale: El infinitivo לקט significa recoger/espigar/reunir; aquí el contexto de la provisión previa permite omitir el objeto explícito sin perder claridad. «A recoger» suena natural y mantiene la finalidad del movimiento.
- source_word: וְלֹא מָצָאוּ
  english_pob_choice: but they found none
  chosen_spanish: pero no hallaron nada
  alternatives_spanish:
  - pero no hallaron ninguno
  - y no encontraron nada
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no encontraron; en español, «pero no hallaron nada» refleja bien el fracaso de la búsqueda y preserva el matiz adversativo que el contexto exige.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés. Se conservó el matiz partitivo de מִן הָעָם con una nota, y se evitó añadir explicaciones como «manna» porque el contexto inmediato ya lo presupone.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «salieron» y «hallaron» para un registro bíblico claro, moderno y digno.
  - La nota [a] preserva la tensión lexical entre el hebreo literal «de/desde el pueblo» y el sentido natural partitivo en español.
