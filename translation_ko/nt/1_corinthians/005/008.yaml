  yaml_path: translation/nt/1_corinthians/005/008.yaml
  text: Therefore let us keep the feast[a], not with old leaven, nor with the leaven of malice and wickedness[b], but with the unleavened bread of sincerity and truth.
  footnotes:
  - marker: a
    text: 'Or ''let us celebrate'' or ''let us observe the festival.'' The Greek keeps Passover-festival imagery from the previous verse.'
