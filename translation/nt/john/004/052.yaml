id: JHN.4.52
reference: John 4:52
source:
  edition: SBLGNT
  text: ἐπύθετο οὖν ⸂τὴν ὥραν παρ’ αὐτῶν⸃ ἐν ᾗ κομψότερον ἔσχεν· ⸂εἶπαν οὖν⸃ αὐτῷ ὅτι ⸀Ἐχθὲς ὥραν ἑβδόμην ἀφῆκεν αὐτὸν ὁ πυρετός.
translation:
  text: So he asked them the hour in which he got better. Then they said to him[a], “Yesterday at the seventh hour the fever left him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at one o’clock,' if the hour is reckoned from sunrise; some understand John's timekeeping differently.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπύθετο
  chosen: he asked
  alternatives:
  - he inquired
  - he found out
  lexicon: BDAG
  rationale: πυνθάνομαι commonly means to ask or inquire. In context the father questions the servants about the timing, so 'he asked' is the clearest natural English rendering.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' fits readable modern English while preserving the connection to the previous verse.
- source_word: τὴν ὥραν
  chosen: the hour
  alternatives:
  - the time
  lexicon: BDAG
  rationale: ὥρα is literally 'hour' and here refers to the specific time of improvement. Retaining 'hour' also matches the servants' answer in the next clause.
- source_word: παρ’ αὐτῶν
  chosen: them
  alternatives:
  - from them
  lexicon: BDAG
  rationale: παρά with the genitive means 'from' in the sense of source, but English idiom after 'asked' normally uses the direct object 'asked them.' The source sense is preserved idiomatically.
- source_word: ἐν ᾗ
  chosen: in which
  alternatives:
  - when
  - at which
  lexicon: BDAG
  rationale: The relative phrase links the inquiry to a specific hour. 'In which' is slightly more formal but accurately reflects the Greek construction; it remains natural enough in context.
- source_word: κομψότερον ἔσχεν
  chosen: he got better
  alternatives:
  - he began to recover
  - he was better
  lexicon: BDAG
  rationale: This idiom refers to improvement in health. 'He got better' is clear modern English and captures the ingressive sense better than the more static 'he was better.'
- source_word: εἶπαν οὖν
  chosen: Then they said
  alternatives:
  - So they said
  - Therefore they said
  lexicon: BDAG
  rationale: This resumes the narrative with the servants' reply. 'Then they said' is natural English and reflects the sequential force.
- source_word: Ἐχθὲς
  chosen: Yesterday
  lexicon: BDAG
  rationale: Straightforward temporal adverb meaning 'yesterday.'
- source_word: ὥραν ἑβδόμην
  chosen: at the seventh hour
  alternatives:
  - at the seventh hour of the day
  - at one o'clock
  lexicon: BDAG
  rationale: The Greek gives the hour designation without converting it into a modern clock time. Retaining 'the seventh hour' preserves the source wording and avoids over-resolving whether John is using Jewish or Roman time reckoning.
- source_word: ἀφῆκεν αὐτὸν ὁ πυρετός
  chosen: the fever left him
  alternatives:
  - his fever left him
  - the fever departed from him
  lexicon: BDAG
  rationale: ἀφίημι here means 'leave' or 'depart from.' 'The fever left him' is idiomatic and closely reflects the Greek subject-object structure.
