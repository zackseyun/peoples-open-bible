lexical_decisions:
- source_word: בַּעֲלָה
  english_pob_choice: Baalah
  chosen_spanish: Baalá
  alternatives_spanish:
  - Baalah
  - Balah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español conviene transliterarlo. Se conserva la forma cercana al hebreo MT, adaptada a la ortografía española con acento gráfico para marcar la pronunciación final llana/aglutinada en lectura pública. No se traduce el elemento léxico del nombre.
- source_word: עִיִּים
  english_pob_choice: Iyyim
  chosen_spanish: Iyyim
  alternatives_spanish:
  - Iim
  - Iyim
  - Ruinas
  lexicon: HALOT
  rationale: El contexto es una lista de ciudades/lugares, así que se trata como topónimo y se translitera. Se conserva la geminación representada en la solución inglesa 'Iyyim', evitando traducirlo como 'ruinas' porque la función aquí es nominal, no descriptiva.
- source_word: עָצֶם
  english_pob_choice: Ezem
  chosen_spanish: Ezem
  alternatives_spanish:
  - Azem
  lexicon: HALOT
  rationale: También es nombre propio de lugar. Se mantiene la transliteración 'Ezem' como reflejo más directo de la vocalización hebrea del verso, en línea con la decisión inglesa POB frente a la variante tradicional 'Azem'.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática del español
  rationale: La conjunción une una lista simple de topónimos. En español la forma natural es 'y'; no hace falta 'e' porque la palabra siguiente comienza con consonante.
- source_word: וָ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática del español
  rationale: La segunda conjunción coordinante se vierte igualmente como 'y' dentro de la lista de nombres.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alta concordancia; no se detectaron cambios revisados posteriores y se mantiene la misma lista de topónimos sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de los tres topónimos por tratarse de una lista geográfica.
  - No se introdujo terminología eclesiástica ni traducción semántica de los nombres propios.
  - La puntuación con comas y la conjunción final siguen el patrón natural de una enumeración breve en español.
