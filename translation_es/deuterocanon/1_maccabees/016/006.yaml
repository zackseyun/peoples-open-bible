translation:
  language: es
  text: Él mismo acampó frente a ellos con su pueblo; y cuando vio que la gente tenía miedo de cruzar el wadi[a], cruzó primero, y los hombres lo vieron y cruzaron detrás de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el torrente» o «el lecho del arroyo»; el término griego se refiere a un curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - levantaron campamento
  - acamparon
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica establecer campamento. «Acamparon» conserva la imagen táctica y es natural en español.
- source_word: κατὰ πρόσωπον αὐτῶν
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - opuestos a ellos
  - delante de ellos
  lexicon: LSJ
  rationale: La frase marca posición de enfrentamiento o proximidad frontal. «Frente a ellos» suena natural en español y mantiene la fuerza estratégica del pasaje.
- source_word: δειλούμενον
  english_pob_choice: afraid
  chosen_spanish: atemorizado
  alternatives_spanish:
  - con miedo
  - asustado
  - temeroso
  lexicon: LSJ
  rationale: El participio describe temor real ante la acción de cruzar, no un juicio moral. «Atemorizado» preserva el matiz de miedo inmediato.
- source_word: διαπερᾶσαι
  english_pob_choice: to cross
  chosen_spanish: cruzar
  alternatives_spanish:
  - pasar
  - atravesar
  - pasar al otro lado
  lexicon: LSJ
  rationale: Con un cauce estacional, el sentido es atravesar de un lado a otro. «Cruzar» es el equivalente más claro e idiomático.
- source_word: τὸν χειμάρρουν
  english_pob_choice: the wadi
  chosen_spanish: wadi
  alternatives_spanish:
  - torrente
  - cauce seco
  - arroyo torrencial
  lexicon: LSJ
  rationale: Se mantiene «wadi» porque el audit trail inglés lo eligió para expresar con precisión un curso de agua estacional; en español es igualmente reconocible en contexto geográfico y evita reducir el término a un «arroyo» permanente.
- source_word: διεπέρασεν πρῶτος
  english_pob_choice: he crossed first
  chosen_spanish: cruzó primero
  alternatives_spanish:
  - pasó primero
  - atravesó primero
  lexicon: LSJ
  rationale: La construcción subraya que lidera la acción. «Cruzó primero» conserva la prioridad narrativa sin añadidos.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - sus hombres
  - los soldados
  lexicon: LSJ
  rationale: El griego dice simplemente «los hombres» sin posesivo explícito. Se conserva esa literalidad, aunque el contexto los identifique como su tropa.
- source_word: κατόπισθεν αὐτοῦ
  english_pob_choice: after him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - siguiéndolo
  lexicon: LSJ
  rationale: La frase expresa desplazamiento en su estela. «Detrás de él» es claro en español y mantiene la secuencia narrativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca la versión inglesa auditada y el griego subyacente. Se mantuvo la referencia geográfica especializada «wadi» por coherencia con el criterio léxico del POB en inglés, y se evitó una paráfrasis que diluyera la escena militar de avance y cruce.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y narrativo, apto para lectura pública.
  - Se mantiene «wadi» con nota para no perder la precisión del término griego χειμάρρους.
  - No se introduce vocabulario eclesiástico ajeno al pasaje; se privilegia la literalidad contextual.
