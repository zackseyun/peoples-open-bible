translation:
  language: es
  text: Y fortificaron las aldeas[a] en medio de ellos, y acopiaron provisiones en preparación para la guerra, porque sus campos habían sido cosechados recientemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aldeas entre ellos». La expresión reproduce el griego sin fijar con más precisión la relación espacial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτείχισαντο
  english_pob_choice: they fortified
  chosen_spanish: fortificaron
  alternatives_spanish:
  - amurallaron
  - rodearon con muros
  - reforzaron defensivamente
  lexicon: LSJ
  rationale: El griego medio de τειχίζω indica hacer defensible un lugar o dotarlo de fortificación. «Fortificaron» comunica bien esa acción sin forzar si se trata específicamente de muros o de defensas más amplias.
- source_word: τὰς ἐν αὐτοῖς κώμας
  english_pob_choice: the villages among them
  chosen_spanish: las aldeas entre ellos
  alternatives_spanish:
  - las aldeas en medio de ellos
  - las aldeas en su interior
  - las aldeas en su midst
  lexicon: LSJ
  rationale: κῶμαι son aldeas/villages; «entre ellos» conserva la relación espacial comprimida de ἐν αὐτοῖς sin decidir más de lo que el griego exige. Se usa «aldeas» por naturalidad en español, sin perder el referente.
- source_word: παρέθεντο
  english_pob_choice: they laid in
  chosen_spanish: acopiaron
  alternatives_spanish:
  - acumularon
  - provisionaron
  - pusieron aparte
  lexicon: LSJ
  rationale: En combinación con εἰς ἐπισιτισμόν, el verbo apunta a preparar y reunir suministros para una necesidad futura. «Acopiaron» expresa acumulación deliberada y encaja con el tono militar-logístico del pasaje.
- source_word: ἐπισιτισμὸν
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - abastecimiento
  - provisiones de alimento
  - suministros
  lexicon: LSJ
  rationale: El sustantivo se refiere al aprovisionamiento, especialmente de comida. «Provisiones» mantiene la amplitud del término y su uso natural en español bíblico contemporáneo.
- source_word: εἰς παρασκευὴν πολέμου
  english_pob_choice: in preparation for war
  chosen_spanish: para la preparación de la guerra
  alternatives_spanish:
  - en preparación para la guerra
  - para guerra
  - para preparar la guerra
  lexicon: LSJ
  rationale: παρασκευή aquí significa preparación, no el sentido técnico posterior de «viernes». «Para la preparación de la guerra» refleja con fidelidad el propósito expresado por εἰς + acusativo, aunque en español suene algo más formal que «en preparación para la guerra».
- source_word: προσφάτως
  english_pob_choice: newly
  chosen_spanish: recientemente
  alternatives_spanish:
  - hace poco
  - de nuevo
  - recién
  lexicon: LSJ
  rationale: El adverbio marca una reciente cosecha. «Recientemente» conserva el valor temporal sin añadir una connotación excesivamente coloquial.
- source_word: τεθερισμένα
  english_pob_choice: had been harvested
  chosen_spanish: habían sido cosechados
  alternatives_spanish:
  - habían sido segados
  - habían sido cosechados ya
  lexicon: LSJ
  rationale: El participio perfecto pasivo de θερίζω indica una cosecha ya completada. «Habían sido cosechados» mantiene la pasiva y el sentido agrícola; en español se entiende mejor que un calco como «habían sido segados».
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió una formulación de aprovisionamiento más natural («laid in provisions»). En español se reflejó esa elección con «acopiaron provisiones», manteniendo además la finalidad militar y la causa agrícola del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no lo contiene.
  - «Aldeas» se eligió por naturalidad española, aunque κῶμαι también podría traducirse como «pueblos» en otros contextos; aquí el contexto pequeño-rural favorece «aldeas».
  - No se añadió nota teológica porque el versículo es descriptivo y no presenta una decisión doctrinal explícita.
