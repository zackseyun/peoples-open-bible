translation:
  language: es
  text: Las escribirás sobre los postes de la puerta de tu casa[a] y en tus entradas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los marcos de la puerta". El hebreo se refiere específicamente a los postes laterales de una entrada.
    reason: lexical_alternative
  - marker: b
    text: O "y en tus portones" / "y sobre los postes de tus portones". El hebreo puede referirse al área de la entrada o a sus postes estructurales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְתַבְתָּם
  english_pob_choice: You shall write them
  chosen_spanish: Y las escribirás
  alternatives_spanish:
  - y escribirás
  - escríbelas
  lexicon: HALOT
  rationale: El verbo hebreo tiene fuerza injuntiva en esta secuencia. En español, el futuro de mandato conserva bien ese valor sin sonar forzado. El objeto pronominal femenino plural 'las' mantiene explícita la referencia a las palabras/mandamientos del contexto inmediato.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' comunica con naturalidad la idea de inscripción colocada en una superficie y preserva el sentido espacial del hebreo.'
- source_word: מְזוּזֹת
  english_pob_choice: doorposts
  chosen_spanish: los postes de la puerta
  alternatives_spanish:
  - los dinteles
  - los marcos de la puerta
  - las jambas
  lexicon: HALOT
  rationale: El término hebreo se refiere específicamente a los postes laterales de la entrada. 'Postes de la puerta' es claro para lectores generales y evita el riesgo de ampliar el sentido a 'marcos' o reducirlo a una sola pieza.
- source_word: בֵּיתֶךָ
  english_pob_choice: of your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu hogar
  lexicon: HALOT
  rationale: '''Casa'' reproduce con más precisión la referencia concreta al edificio o unidad doméstica indicada por el hebreo. ''Hogar'' sería más interpretativo y menos ligado a la imagen física del texto.'
- source_word: וּבִשְׁעָרֶיךָ
  english_pob_choice: and on your gates
  chosen_spanish: y sobre tus puertas
  alternatives_spanish:
  - y en tus puertas
  - y sobre tus portones
  - y en tus entradas
  lexicon: HALOT
  rationale: '''שער'' puede referirse al acceso o entrada con su estructura. ''Puertas'' es un equivalente idiomático suficientemente amplio en español para abarcar tanto la puerta/entrada como el área estructural sin limitar indebidamente el sentido.'
theological_decisions:
- issue: Alcance de 'puertas' frente a 'gates'
  english_pob_reading: and on your gates
  chosen_spanish_reading: y sobre tus puertas
  alternative_spanish_readings:
  - y sobre tus portones
  - y en tus entradas
  rationale: El hebreo puede abarcar el área de acceso o sus elementos estructurales. 'Puertas' ofrece una formulación natural en español que conserva esa amplitud sin imponer una lectura excesivamente específica. La nota mantiene visibles las alternativas estructurales equivalentes.
  doctrine_reference: Deuteronomio 6:9
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, marcada como sin cambios necesarios y con alto grado de acuerdo entre revisión y verificación cruzada.
  spanish_consistency_notes:
  - Se conserva el objeto pronominal 'las' para corresponder al 'them' del inglés y al antecedente contextual hebreo.
  - Se evitó 'SEÑOR' u otras sustituciones, ya que este versículo no contiene el Tetragrámaton.
  - Se mantuvo un registro neutral y bíblico, con 'casa' y 'puertas' como equivalentes concretos de los sustantivos hebreos.
