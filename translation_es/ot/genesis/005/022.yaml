translation:
  language: es
  text: Enoc caminó con Dios[a] trescientos años después de engendrar a Matusalén, y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vivió en comunión con Dios'. El modismo hebreo es literalmente 'caminó con Dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  english_pob_choice: walked with
  chosen_spanish: caminó con
  alternatives_spanish:
  - anduvo con
  - vivió en comunión con
  lexicon: HALOT
  rationale: El hitpael de הלך en este contexto expresa un modo de vida relacional. En español, "caminó con" conserva la metáfora bíblica sin volverla explicativa en exceso. "Vivió en comunión con" aclara demasiado y suaviza la imagen original.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - ante Dios
  lexicon: HALOT
  rationale: La relación idiomática se expresa de forma natural en español con "con Dios". "Ante Dios" introduce una dirección distinta y no refleja tan bien el paralelo idiomático del hebreo.
- source_word: אַֽחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - a partir de
  lexicon: HALOT
  rationale: '"Después de" comunica de forma clara el marco temporal de la acción en español y mantiene la relación temporal del hebreo sin ambigüedad.'
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado a
  alternatives_spanish:
  - haber sido padre de
  - haber dado a luz a
  lexicon: HALOT
  rationale: El causativo de ילד aquí refiere al padre masculino; "engendrado" preserva el sentido genealógico y es más fiel al registro bíblico que una paráfrasis más moderna. Se usa el infinitivo compuesto para encajar con la estructura temporal española.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה
  english_pob_choice: three hundred years
  chosen_spanish: trescientos años
  alternatives_spanish:
  - por trescientos años
  - durante trescientos años
  lexicon: HALOT
  rationale: La cifra se traslada de forma directa. Se evita insertar una preposición de duración adicional en el núcleo numérico para no crear una relación sintáctica más fuerte que la del hebreo; la duración ya queda clara por el contexto verbal.
- source_word: וַיּוֹלֶד
  english_pob_choice: and he fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y fue padre de
  - y tuvo
  lexicon: HALOT
  rationale: Se conserva la correspondencia con el verbo anterior y con el valor genealógico de ילד. "Engendró" mantiene el paralelismo formal y la referencia paterna del texto.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - descendencia
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "hijos y hijas", en español bíblico y moderno "hijos e hijas" expresa correctamente la descendencia masculina y femenina. "Descendencia" sería demasiado general y perdería la explicitud de ambos sexos.
theological_decisions:
- issue: Preservar la metáfora de "caminar con Dios"
  english_pob_reading: Retain the relational metaphor 'walked with God' in the main text
  chosen_spanish_reading: Mantener "caminó con Dios" en el texto principal
  alternative_spanish_readings:
  - vivió fielmente delante de Dios
  - vivió en comunión con Dios
  rationale: El hebreo sostiene una metáfora relacional con peso teológico y genealógico. Traducirla de manera interpretativa reduciría su fuerza evocadora. La forma española conserva la imagen sin resolverla por completo.
  doctrine_reference: Translation philosophy §3
- issue: Duración de los trescientos años
  english_pob_reading: three hundred years after he fathered Methuselah
  chosen_spanish_reading: trescientos años después de haber engendrado a Matusalén
  alternative_spanish_readings:
  - después de engendrar a Matusalén durante trescientos años
  - y después de haber engendrado a Matusalén, vivió trescientos años
  rationale: La disposición española debe dejar claro que los trescientos años pertenecen a la caminata de Enoc con Dios, no al acto de engendrar. La redacción elegida sigue el orden temporal del hebreo y evita la ambigüedad señalada en la revisión inglesa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó un ''for'' que podía hacer ambigua la duración de ''three hundred years''. En español se evita esa ambigüedad colocando la duración directamente con la acción principal: ''caminó con Dios durante trescientos años después de haber engendrado a Matusalén''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin artículo, como es normal en español para el nombre/título divino.
  - Se usa 'engendró' para conservar el valor genealógico de ילד en ambos casos dentro del versículo.
  - No se introduce 'Cristo', 'SEÑOR' ni formulaciones interpretativas ajenas al hebreo.
  - La puntuación separa claramente el marco temporal de la acción principal para reflejar la sintaxis del hebreo y evitar lecturas dobles.
