revisions:
- from: Y las vestiduras sagradas que son de Aarón serán para sus hijos después de él, para ungirlos[a] con ellas y para investirlos[b] con ellas.
  to: Y las vestiduras santas que son de Aarón serán para sus hijos después de él, para ungirlos[a] en ellas y para investirlos[b] en ellas.
  rationale: 'La revisión corrige el punto principal de fidelidad: בָהֶם / בָם debe reflejarse como «en ellas», no «con ellas», porque las vestiduras funcionan como el marco en que se realiza la unción y la instalación sacerdotal. También se ajusta «sagradas» a «santas» para acercarse mejor al expediente POB sin sacrificar naturalidad. Se conserva «investirlos» como solución española clara para el modismo מלא יד, respaldada por nota.'
