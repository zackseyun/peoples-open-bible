translation:
  language: es
  text: Y ahora hacen pedazos toda su obra tallada, juntamente, con hacha y martillos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con hacha y mazos»; los términos hebreos designan herramientas específicas de golpe y corte, y el equivalente moderno exacto de cada una es incierto.
    reason: lexical_alternative
  - marker: b
    text: O «toda su obra tallada juntamente».
    reason: previous_rendering
lexical_decisions:
- source_word: וְעַת
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: La combinación de conjunción y adverbio temporal marca el giro a la escena presente de destrucción. «Y ahora» conserva el avance discursivo y suena natural en español.
- source_word: פִּתּוּחֶיהָ
  english_pob_choice: its carved work
  chosen_spanish: toda su obra tallada
  alternatives_spanish:
  - sus tallas
  - su obra esculpida
  - todo su tallado
  lexicon: HALOT
  rationale: El sustantivo refiere al trabajo decorativo tallado o grabado. «Obra tallada» conserva el sentido colectivo y, con «toda», refleja la totalidad destructiva del contexto.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: toda
  alternatives_spanish:
  - entera
  - completa
  - junta
  lexicon: HALOT
  rationale: El adverbio expresa totalidad o acción tomada en conjunto. En español, «toda» en «toda su obra tallada» carga esa fuerza totalizante sin introducir una redundancia poco natural.
- source_word: בְּכַשִּׁיל
  english_pob_choice: with hatchet
  chosen_spanish: con hacha
  alternatives_spanish:
  - con hachuela
  - con azuela
  - con hachetilla
  lexicon: HALOT
  rationale: El término designa una herramienta de corte o golpe, probablemente para madera. «Hacha» es el equivalente más claro y natural en español; se evita precisar más allá de lo seguro.
- source_word: וְכֵילַפּוֹת
  english_pob_choice: and hammers
  chosen_spanish: y martillos
  alternatives_spanish:
  - y mazos
  - y golpeadores
  - y macillos
  lexicon: HALOT
  rationale: El plural apunta a instrumentos de golpe. «Martillos» es la opción más directa y comprensible en español, manteniendo el carácter de herramientas distintas de corte y golpe.
- source_word: יַהֲלֹמוּן
  english_pob_choice: they smash
  chosen_spanish: destruyen
  alternatives_spanish:
  - golpean
  - apalean
  - martillean
  lexicon: HALOT
  rationale: El verbo expresa golpear con fuerza hasta arruinar. «Destruyen» comunica la fuerza devastadora del contexto sin forzar una imagen demasiado coloquial o mecánica.
theological_decisions:
- issue: 'Valor de יַחַד: “juntos” / “todos” / acción total'
  english_pob_reading: The POB uses "together" to reflect the totality or collective nature of the smashing.
  chosen_spanish_reading: «Toda» dentro de «toda su obra tallada» expresa el valor totalizante de יַחַד.
  alternative_spanish_readings:
  - juntos
  - todos a la vez
  - en conjunto
  rationale: Aquí יַחַד no añade una idea doctrinal, sino de totalidad o acción colectiva. En español, repetir «juntos» junto a las herramientas sonaría torpe; «toda» integra mejor la fuerza semántica del hebreo.
  doctrine_reference: Ps 74:6; cf. uso adverbial de יַחַד en contextos de totalidad
- issue: 'Naturaleza de los instrumentos: identificación precisa incierta'
  english_pob_reading: The English POB notes uncertainty between specific modern equivalents ('hatchet/axe' and 'hammers/mallets').
  chosen_spanish_reading: «Hacha» y «martillos» como equivalentes probables, sin afirmar precisión terminológica absoluta.
  alternative_spanish_readings:
  - hacha y mazos
  - hacha y mallets
  - azuela y martillos
  rationale: El hebreo nombra herramientas concretas, pero la equivalencia exacta moderna no es segura. El español debe conservar la imagen de destrucción artesanal sin exagerar el grado de certeza léxica.
  doctrine_reference: Ps 74:6; nota lexical sobre instrumentos
- issue: Sentido de פִּתּוּחֶיהָ como ornamento/escultura del santuario
  english_pob_reading: The POB renders 'carved work' for the decorative work being destroyed.
  chosen_spanish_reading: «Obra tallada» mantiene el valor colectivo y ornamental del término.
  alternative_spanish_readings:
  - grabados
  - talladuras
  - ornamentos tallados
  rationale: El contexto describe la profanación de una estructura sagrada/real; «obra tallada» permite abarcar tanto relieves como decoración sin limitarlo a una sola técnica.
  doctrine_reference: Ps 74:6 in context of sanctuary desecration
translation_notes:
  revision_awareness: La redacción española sigue el texto hebreo y el auditable inglés POB, pero evita calcar la duplicación de «together»/«all» que el propio historial inglés corrigió y luego reintrodujo. Para español, se optó por integrar el valor de יַחַד en «toda» y conservar la escena de destrucción con herramientas concretas, sin precisar más allá de lo que permite la evidencia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención POB, pero este versículo no contiene el nombre divino.
  - Se prefirió «obra tallada» por consistencia con el campo semántico de carved/engraved work en pasajes afines.
  - Se evitó «siervo», «Cristo» y otros términos no pertinentes al versículo.
  - La frase verbal «destruyen» recoge la fuerza de yahalomun sin sobretraducir a una metáfora diferente.
