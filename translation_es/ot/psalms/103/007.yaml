- from: Él hizo conocer sus caminos a Moisés[a], sus obras a los hijos de Israel.
  to: Él dio a conocer sus caminos a Moisés[a], sus hechos a los hijos de Israel.
  rationale: Se ajusta «hizo conocer» a «dio a conocer» para un español más natural sin perder el valor causativo del hebreo. Se cambia «obras» por «hechos» para reflejar mejor עֲלִילוֹתָיו. Se corrige la nota al pie para que ofrezca una alternativa real e idiomática en español, sin duplicar la lectura principal.
