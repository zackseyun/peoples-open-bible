    issue: '''recipiente de bronce'' contradice el sentido contextual de כִּיּוֹר en este versículo'
    rationale: El hebreo suele significar 'lavatorio/basín', pero aquí las dimensiones y la acción de 'estar sobre ello' exigen una estructura elevada. El English POB ya documentó que la traducción principal debe ser 'platform'. En español, 'recipiente' desinforma sobre la escena.
  - severity: medium
    issue: La nota al pie explica correctamente la anomalía léxica, pero el texto principal no incorpora la decisión contextual
    rationale: La política de la POB requiere que el texto principal preserve el sentido de la fuente; las alternativas léxicas van en nota, no al revés.
  - severity: low
    issue: '''Se puso sobre él'' es menos preciso que una formulación explícita de ponerse de pie sobre la estructura'
    rationale: וַיַּעֲמֹד עָלָיו expresa claramente que estuvo de pie sobre ella. 'Se puso sobre él' puede sonar ambiguo en español.
  revised_spanish_text: Porque Salomón había hecho una plataforma[a] de bronce y la había puesto en medio del atrio; medía cinco codos de largo, cinco codos de ancho y tres codos de alto. Se puso de pie sobre ella, luego se arrodilló delante de toda la asamblea de Israel y extendió sus manos hacia el cielo.
