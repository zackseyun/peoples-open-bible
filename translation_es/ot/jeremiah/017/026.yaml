    text: O «la Sefelá»; es la región baja de Judá.
    reason: lexical_alternative
  - marker: b
    text: O «el sur»; «Neguev» es el nombre de la región meridional de Judá.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «casa de Yahvé», es decir, el templo.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de notas para que corresponda al audit trail inglés, se hace más transparente הַשְּׁפֵלָה en el texto principal con el topónimo en nota, se añade la nota léxica esperada para «Neguev», y se ajusta «ofrendas de cereal» para mejorar la naturalidad y el valor colectivo de la lista sacrificial sin alterar el sentido.
