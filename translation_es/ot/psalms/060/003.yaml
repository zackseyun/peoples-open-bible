revisions:
- from: Dios[a], nos has rechazado; nos has abierto una brecha[b]; has estado airado. Restáuranos[c].
  to: Dios, nos has rechazado; has abierto brecha entre nosotros; has estado airado. Restáuranos[a].
  rationale: Se mantiene el sentido del hebreo y del POB inglés, pero se mejora la naturalidad y precisión del español al sustituir «nos has abierto una brecha» por «has abierto brecha entre nosotros», que conserva la imagen de ruptura violenta sin sonar impropio. Se eliminan notas no esenciales y se conserva solo la nota importante sobre la ambigüedad de la petición final.
