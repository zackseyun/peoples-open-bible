translation:
  language: es
  text: Hizo cinco barras de madera de acacia para los tableros[a] de un lado del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marcos» para las piezas estructurales verticales del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra acción sucesiva; en español puede expresarse de forma natural con el pretérito simple sin añadir una conjunción obligatoria, manteniendo la secuencia narrativa.
- source_word: בְּרִיחֵי
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - travesaños
  - pernos
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa piezas horizontales de sujeción. «Barras» conserva la función estructural y evita la ambigüedad de «pernos».
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de acacia
  lexicon: HALOT
  rationale: La cadena constructa indica material hecho con acacia; en español «madera de acacia» es natural y precisa, y evita la elipsis excesiva de «de acacia».
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  lexicon: HALOT
  rationale: Número cardinal directo que modifica a «barras».
- source_word: לְקַרְשֵׁי
  english_pob_choice: for the frames of
  chosen_spanish: para los marcos de
  alternatives_spanish:
  - para los tableros de
  - para las tablas de
  lexicon: HALOT
  rationale: En lenguaje arquitectónico del tabernáculo, קֶרֶשׁ señala los elementos verticales de soporte. «Marcos» comunica mejor su función estructural en español moderno que «tableros» o «tablas».
- source_word: צֶלַע
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - flanco
  lexicon: HALOT
  rationale: En este contexto arquitectónico, צלע significa una parte lateral de la estructura, no «costilla». «Lado» es la opción más clara y natural en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  lexicon: HALOT
  rationale: Renderización establecida y precisa para la estructura del santuario en Éxodo.
- source_word: הָאֶחָת
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - el uno
  - el lado uno
  lexicon: HALOT
  rationale: El femenino singular concuerda con «lado» implícito y distingue una de las dos caras laterales; en español se naturaliza como «un lado».
translation_notes:
  revision_awareness: La revisión inglesa solo añadió el punto final y no alteró el contenido semántico; por tanto, la base de traducción sigue siendo estable y de alta concordancia con el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «tabernáculo» como término técnico consistente con la tradición POB y con el contexto de Éxodo.
  - Se evitó «SEÑOR» u otras sustituciones, pues el versículo no contiene el Tetragrámaton ni lenguaje teológico que requiera ajuste terminológico.
  - «Marcos» se usa como equivalente funcional de las piezas estructurales verticales; la nota preserva la alternativa «tableros» por la tensión lexical documentada en el inglés POB.
