review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: personificación femenina de la necedad, carácter ruidoso, predicación de simplicidad y la idea idiomática de ignorancia total con nota para la literalidad abrupta «no sabe qué». Sin embargo, «alborotadora» introduce un matiz agentivo (''que causa alboroto'') más interpretativo que el participio/adjetivo hebreo, que describe principalmente una cualidad de ruido o estruendo.'
  spanish_quality_summary: El español es generalmente natural y legible. La principal mejora es cambiar «es alborotadora» por «es ruidosa» para conservar mejor la cualidad descriptiva y evitar sobreinterpretación. El resto del verso fluye bien. La nota al pie está bien formulada y anclada correctamente.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «La mujer Necedad» preserva adecuadamente la personificación de אֵשֶׁת כְּסִילוּת en paralelo con Proverbios 9. «Simple» mantiene el vínculo léxico con el campo semántico de los simples en Proverbios. La nota literal sobre «no sabe qué» conserva la alternativa documentada por la POB inglesa.
  issues:
  - severity: medium
    issue: «alborotadora» añade un matiz más activo que el hebreo
    rationale: הֹמִיָּה describe a la mujer como ruidosa/estruendosa/boisterous. «Alborotadora» en español suele sugerir que ella provoca alboroto, no solo que es ruidosa. «Ruidosa» o «bulliciosa» se ajustan mejor al valor descriptivo.
  - severity: low
    issue: Divergencia interna en la decisión léxica para יָדְעָה מָּה
    rationale: El texto dice correctamente «no sabe nada», pero en las decisiones léxicas aparece «sabe nada» como forma elegida. Conviene armonizarlo para evitar inconsistencia documental.
  revised_spanish_text: La mujer Necedad es ruidosa;[a] es simple y no sabe nada.
