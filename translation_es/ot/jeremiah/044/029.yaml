review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la señal, la fórmula profética con Yahvé, el castigo en este lugar, la finalidad de que sepan, y la certeza intensificada de que las palabras divinas se alzarán/permancerán contra ellos para daño. Sin embargo, dos puntos requieren ajuste para fidelidad más fina al texto y al rastro POB: (1) «para ustedes[a]» ancla una nota que no corresponde a esa frase; la nota en inglés pertenece a la cláusula final sobre «mis palabras…», no a «para ustedes»; (2) «para hacerles daño» introduce un matiz verbal no presente en לְרָעָה, que expresa resultado/adversidad («para mal/daño/desgracia») más que una cláusula de propósito con verbo añadido.'
  spanish_quality_summary: El español es claro y digno, pero «ciertamente se levantarán contra ustedes» suena algo rígido; aun así, es defendible por cercanía a קום. El problema principal de calidad es la nota mal ubicada y con mezcla innecesaria de inglés («harm»). La redacción mejora si se mantiene el texto principal cercano al hebreo y se traslada la nota al segmento pertinente.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé», דְבָרַי → «mis palabras», juicio de פקד → «castigando». No hay conflicto doctrinal relevante. Conviene ajustar לְרָעָה a una forma nominal más directa («para daño») en vez de «para hacerles daño», para seguir mejor la decisión POB «for harm».'
  issues:
  - severity: medium
    issue: Marcador de nota colocado en «ustedes[a]» en vez de la cláusula final.
    rationale: La nota documenta una alternativa para «mis palabras ciertamente… para daño/desgracia», no para «para ustedes». Debe anclarse donde surge la ambigüedad léxica real.
  - severity: medium
    issue: «Para hacerles daño» añade un verbo no expreso en לְרָעָה.
    rationale: El hebreo expresa resultado adverso nominal («para mal/daño»). «Para daño» o «para mal» preserva mejor la concisión y el valor léxico documentado por el POB.
  - severity: low
    issue: La nota contiene inglés residual («harm»).
    rationale: Las notas españolas deben estar plenamente en español y con formulación limpia.
