translation:
  language: es
  text: El vino y la bebida fuerte endulzan la vida[a], pero mejor que ambas es hallar un tesoro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Vino y bebida fuerte endulzan la vida, y más allá de ambas, hallar un tesoro». El paralelo griego también respalda un sentido comparativo: «por encima de ambas».'
    reason: alternative_reading
lexical_decisions:
- source_word: חיי / ζωὴ
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - la vida de
  - vivir
  lexicon: HALOT; LXX ζωὴ
  rationale: El hebreo y el griego presentan 'vida' como el sustantivo base; en español conviene conservarlo sin convertirlo en paráfrasis. 'La vida' mantiene el valor nominal y permite el sentido resultativo de que ciertas cosas la vuelven más agradable.
- source_word: עובד / ἐργάτου
  english_pob_choice: worker / laborer
  chosen_spanish: el trabajador
  alternatives_spanish:
  - el obrero
  - el laborioso
  lexicon: HALOT; BDAG ἐργάτης
  rationale: El griego ἐργάτου apunta a un trabajador, y el hebreo de apoyo también corresponde a una figura laboral. 'Trabajador' es neutral y claro en español, sin cargar el término con matices sociales que el texto no exige.
- source_word: αὐτάρκους
  english_pob_choice: self-sufficient
  chosen_spanish: autosuficiente
  alternatives_spanish:
  - suficiente para sí mismo
  - independiente
  lexicon: BDAG; LSJ
  rationale: El adjetivo griego expresa autosuficiencia o suficiencia propia. 'Autosuficiente' comunica bien el rasgo sin explicarlo innecesariamente y conserva el matiz conceptual del original.
- source_word: γλυκανθήσεται / ימתקו
  english_pob_choice: sweeten
  chosen_spanish: se endulzará
  alternatives_spanish:
  - se hará dulce
  - se volverá agradable
  - se endulzará la vida
  lexicon: HALOT; LSJ
  rationale: El verbo transmite la idea de hacerse dulce o agradable. 'Se endulzará' es una forma natural en español que conserva la metáfora gustativa del texto.
- source_word: ὑπὲρ ἀμφότερα / ומשניהם
  english_pob_choice: but better than both
  chosen_spanish: y más que ambas
  alternatives_spanish:
  - y por encima de ambas
  - y más que las dos
  lexicon: LSJ; HALOT
  rationale: El griego favorece una lectura comparativa de superioridad ('por encima de ambas'), y el hebreo también puede leerse en ese sentido. 'Y más que ambas' preserva la comparación sin añadir una interpretación demasiado explícita en el cuerpo del verso.
- source_word: ὁ εὑρίσκων θησαυρόν / מוצא אוצר
  english_pob_choice: finding a treasure
  chosen_spanish: el que encuentra un tesoro
  alternatives_spanish:
  - quien halla un tesoro
  - el hallazgo de un tesoro
  lexicon: BDAG; HALOT
  rationale: La construcción participial se vierte de modo natural como una relativa en español. 'Encuentra' mantiene la acción concreta y 'tesoro' corresponde de forma directa a θησαυρόν / אוצר.
theological_decisions:
- issue: Comparative force of 'above both' versus a simple additive reading
  english_pob_reading: but better than both is finding a treasure
  chosen_spanish_reading: y más que ambas, el que encuentra un tesoro
  alternative_spanish_readings:
  - pero mejor que ambas es el que encuentra un tesoro
  - y por encima de ambas, el que encuentra un tesoro
  rationale: El hebreo y el paralelo griego sostienen una comparación de superioridad, no solo una suma de beneficios. En español, 'y más que ambas' conserva la tensión comparativa del original y deja claro que el hallazgo del tesoro supera a las dos bebidas.
  doctrine_reference: Sabiduría proverbial; sin afirmación doctrinal específica
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje hebreo base de Kahana y el paralelo griego de Swete. El inglés POB ya había resuelto la comparación como 'better than both'; aquí se conserva esa fuerza comparativa, pero el sintagma se formuló de modo más cercano al griego/hebreo y más natural para el español.
  spanish_consistency_notes:
  - Se prefirió 'tesoro' para אוצר / θησαυρόν por concordancia con el paralelo griego y por ser el equivalente más directo en español.
  - Se optó por 'autosuficiente' para αὐτάρκους, término que mantiene el sentido conceptual sin necesidad de expandirlo en nota.
  - Se mantuvo una estructura breve y proverbial, acorde al género sapiencial del versículo.
