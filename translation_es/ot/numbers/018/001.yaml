  yaml_path: translation/ot/numbers/018/001.yaml
  text: Then Yahweh said to Aaron[a], “You and your sons and your father’s house with you shall bear the iniquity of the sanctuary[b], and you and your sons with you shall bear the iniquity of your priesthood.”
  footnotes:
