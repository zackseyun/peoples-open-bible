base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/028.yaml
  text: He sent them to Lebanon[a], ten thousand a month in shifts; they would be in Lebanon one month and two months at home[c][b], and Adoniram was over the forced labor.
  footnotes:
  - marker: a
    text: Or 'by relays' or 'alternating groups' for 'in shifts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his house'; the sense is that each laborer spent two months at home between month-long terms in Lebanon.
    reason: lexical_alternative
  - marker: c
    text: Or 'labor levy'; the Hebrew term refers to compulsory state labor.
    reason: lexical_alternative
