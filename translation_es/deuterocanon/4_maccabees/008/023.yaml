translation:
  language: es
  text: ¿Por qué nos apartamos de la vida más agradable[a], y nos privamos a nosotros mismos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conservado de este versículo parece incompleto, pues termina con «y nos privamos a nosotros mismos» sin un objeto expreso después de ἀποστεροῦμεν. Por eso, la traducción española sigue de cerca la redacción extante y deja la oración inconclusa en vez de suplir contenido por conjetura.
    reason: textual_variant
lexical_decisions:
- source_word: τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: LSJ
  rationale: En una pregunta retórica deliberativa, τί pide naturalmente un sentido de causa o motivo; por eso '¿Por qué?' comunica mejor la fuerza de la cláusula que un simple '¿Qué?'.
- source_word: ἐξάγομεν
  english_pob_choice: do we remove ourselves
  chosen_spanish: nos sacamos
  alternatives_spanish:
  - nos removemos
  - nos apartamos
  - nos llevamos fuera
  lexicon: LSJ
  rationale: El verbo significa literalmente 'sacar/poner fuera'. 'Nos sacamos' conserva la imagen de movimiento hacia fuera sin introducir un giro explicativo ajeno al griego.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: a nosotros mismos
  alternatives_spanish:
  - nosotros mismos
  - a nosotros
  lexicon: LSJ
  rationale: El reflexivo se mantiene explícito en la segunda mitad de la frase; en la primera, el clítico 'nos' ya lo expresa. Reforzarlo con 'a nosotros mismos' preserva la autosujeción de la acción.
- source_word: τοῦ ἡδίστου βίου
  english_pob_choice: from the most pleasant life
  chosen_spanish: de la vida más agradable
  alternatives_spanish:
  - de la vida más dulce
  - de la vida más deleitosa
  - de la vida más placentera
  lexicon: LSJ
  rationale: ἡδίστου es superlativo de ἡδύς, con el campo de 'agradable/dulce/delicioso'. 'Más agradable' es claro en español y mantiene un registro sobrio sin forzar un matiz demasiado emocional.
- source_word: ἀποστεροῦμεν
  english_pob_choice: deprive
  chosen_spanish: nos privamos
  alternatives_spanish:
  - nos despojamos
  - nos robamos
  - nos defraudamos
  lexicon: LSJ
  rationale: El griego puede significar 'privar' o 'despojar'. En una construcción reflexiva, 'nos privamos' reproduce bien la idea de quitarse algo a sí mismos sin añadir una connotación jurídica o comercial.
translation_notes:
  revision_awareness: El testimonio griego conservado parece incompleto al final; la versión inglesa POB opta por una traducción estrictamente adhesiva y deja la frase sin completar. Esta versión española sigue esa misma prudencia, evitando añadir un objeto no atestiguado.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y cualquier terminología litúrgica ajena, porque no aparece en el texto.
  - Se mantiene un registro sobrio y transparente, acorde con un fragmento de discurso retórico.
  - La primera persona plural refleja la forma verbal griega y conserva el carácter deliberativo de la pregunta.
