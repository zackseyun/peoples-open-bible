translation:
  language: es
  text: Y sucederá que toda olla en Jerusalén y en Judá será santa para Yahvé de los ejércitos, y vendrán todos los que sacrifican, y tomarán de ellas y cocerán en ellas. Y ya no habrá cananeo[a] alguno en la casa de Yahvé de los ejércitos en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mercader' o 'comerciante'; la palabra hebrea puede llevar ese sentido en algunos contextos.
    reason: alternative_reading
lexical_decisions:
- source_word: סִיר
  english_pob_choice: pot
  chosen_spanish: caldero
  alternatives_spanish:
  - olla
  - vasija de cocinar
  lexicon: HALOT
  rationale: El hebreo designa un recipiente para cocinar o hervir. En español, 'caldero' comunica con claridad un recipiente de cocción y mantiene mejor el valor concreto que un término demasiado genérico como 'vasija'.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: Como predicado aplicado a los recipientes, 'santo' expresa mejor el sentido cultual de estar apartado para Yahvé. 'Consagrado' es posible, pero aquí suena más técnico y menos directo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el nombre divino como 'Yahvé' y צְבָאוֹת como 'de los ejércitos'. Esta forma conserva el título profético tradicional sin ocultar el nombre propio.
- source_word: הַזֹּבְחִים
  english_pob_choice: all who sacrifice
  chosen_spanish: todos los que sacrifican
  alternatives_spanish:
  - todos los que ofrecen sacrificios
  - todos los sacrificadores
  lexicon: HALOT
  rationale: El participio sustantivado describe a quienes realizan actos sacrificiales. 'Todos los que sacrifican' es natural en español y conserva el carácter de acción habitual.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - de algunos de ellos
  lexicon: HALOT
  rationale: El pronombre retoma los recipientes; 'de ellos' mantiene la referencia directa sin añadir matices no explicitados en el hebreo.
- source_word: וּבִשְּׁלוּ בָהֶם
  english_pob_choice: and boil in them
  chosen_spanish: y cocerán en ellos
  alternatives_spanish:
  - y hervirán en ellos
  - y cocinarán en ellos
  lexicon: HALOT
  rationale: El verbo admite la idea general de cocinar por calor húmedo; 'cocer' es un equivalente sobrio y fiel, sin introducir el objeto 'la carne' que el hebreo no expresa.
- source_word: כְנַעֲנִי
  english_pob_choice: Canaanite
  chosen_spanish: cananeo
  alternatives_spanish:
  - mercader
  - comerciante
  lexicon: HALOT
  rationale: Se conserva el término étnico-literal, como en el texto base inglés, porque mantiene la tensión interpretativa del pasaje. El posible sentido comercial queda documentado en nota, no resuelto en el cuerpo del texto.
- source_word: בְּבֵית יְהוָה צְבָאוֹת
  english_pob_choice: in the house of Yahweh of hosts
  chosen_spanish: en la casa de Yahvé de los ejércitos
  alternatives_spanish:
  - en el templo de Yahvé de los ejércitos
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: '''Casa'' reproduce el hebreo de forma directa y puede entenderse naturalmente como el templo. Se evita imponer una paráfrasis interpretativa en el texto principal.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: HALOT
  rationale: La fórmula profética fija se vierte con la expresión idiomática 'en aquel día', muy estable en español bíblico y perfectamente transparente.
theological_decisions:
- issue: Sentido de כְנַעֲנִי en la cláusula final
  english_pob_reading: Retain the literal term 'Canaanite' in the main text, with a footnote noting 'merchant' or 'trader' as possible senses.
  chosen_spanish_reading: Mantener 'cananeo' en el texto principal, con nota sobre 'mercader' o 'comerciante' como sentidos posibles.
  alternative_spanish_readings:
  - mercader
  - comerciante
  rationale: El hebreo permite un valor étnico literal y, en ciertos contextos, un valor comercial. Como el contexto cultual sugiere una carga de exclusión/purificación, conviene no resolver la ambigüedad en el cuerpo principal. La nota preserva la tensión documentada por el POB inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la última revisión disponible del audit trail inglés: no se registran cambios aplicados y el control cruzado reporta alta concordancia. La versión española sigue esa lectura estable, preservando la ambigüedad de כְנַעֲנִי en nota y sin introducir objetos o interpretaciones adicionales en ''cocerán en ellos''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino y 'de los ejércitos' para צְבָאוֹת, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara del nombre divino.
  - '''Cananeo'' conserva la tensión entre lectura étnica y posible sentido comercial, siguiendo la decisión auditada del texto inglés.'
  - '''Casa de Yahvé'' se conserva sin expandir a ''templo'' en el texto principal para no sobreinterpretar el hebreo.'
