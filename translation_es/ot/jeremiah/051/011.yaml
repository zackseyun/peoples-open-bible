  text: הָבֵ֣רוּ הַ/חִצִּים֮ מִלְא֣וּ הַ/שְּׁלָטִים֒ הֵעִ֣יר יְהוָ֗ה אֶת ר֨וּחַ֙ מַלְכֵ֣י מָדַ֔י כִּֽי עַל בָּבֶ֥ל מְזִמָּת֖/וֹ לְ/הַשְׁחִיתָ֑/הּ כִּֽי נִקְמַ֤ת יְהוָה֙ הִ֔יא נִקְמַ֖ת הֵיכָלֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/011.yaml
  text: Sharpen the arrows[a]; fill the shields. Yahweh has stirred up the spirit of the kings of Media, because his plan is against Babylon, to destroy her; for it is the vengeance of Yahweh[b], vengeance for his temple.
  footnotes:
  - marker: a
    text: Or 'fill the shields.' The Hebrew term can denote shields, but 'quivers' fits the immediate context of arrows more naturally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her,' referring to Babylon as a personified city.
    reason: lexical_alternative
