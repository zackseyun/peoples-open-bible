base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/010.yaml
  text: A divine verdict is on the lips of a king[b][a]; his mouth does not betray justice.
  footnotes:
  - marker: a
    text: 'Hebrew qesem often means ''divination''; here it is rendered ''a divine verdict'' because the context is judicial speech. Possible alternatives: ''divination'' or ''oracle.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'in judgment' or 'when judging' for 'justice.'
    reason: lexical_alternative
