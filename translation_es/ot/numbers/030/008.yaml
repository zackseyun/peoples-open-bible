translation:
  language: es
  text: Si su esposo lo oye en el día en que lo oye[a], y calla respecto de ella, entonces sus votos quedarán firmes, y sus obligaciones vinculantes[b], que se impuso sobre sí misma, quedarán firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no le dice nada». El hebreo usa un modismo que indica que el esposo no objeta, de modo que el voto sigue siendo válido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus ataduras», «sus vínculos» o «sus obligaciones». El término hebreo se refiere a compromisos vinculantes que ella ha puesto sobre sí misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַע
  english_pob_choice: And if ... hears
  chosen_spanish: Si ... oye
  alternatives_spanish:
  - Y si ... oye
  - Si ... escucha
  lexicon: HALOT
  rationale: En esta cláusula casuística, el hebreo con וְ + perfecto funciona como condición; en español jurídico-natural, «Si» comunica mejor el valor condicional que un simple «y». «Oye» mantiene el valor de percepción auditiva sin volverlo abstracto.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - el hombre de ella
  lexicon: HALOT
  rationale: En contexto matrimonial y legal, el poseído por 3fs se entiende como el esposo. «Esposo» es claro y digno en español moderno; «marido» sería igualmente posible, pero «esposo» suena más neutral y amplio en registro.
- source_word: בְּיוֹם שָׁמְעוֹ
  english_pob_choice: on the day he hears
  chosen_spanish: en el día en que lo oye
  alternatives_spanish:
  - el día que lo oye
  - cuando lo oye
  lexicon: HALOT
  rationale: Se conserva la delimitación temporal legal del hebreo con una formulación natural en español. «Lo oye» refleja el objeto implícito del asunto/voto del contexto inmediato.
- source_word: וְהֶחֱרִישׁ לָהּ
  english_pob_choice: and is silent toward her
  chosen_spanish: y calla respecto de ella
  alternatives_spanish:
  - y no le dice nada
  - y guarda silencio ante ella
  lexicon: HALOT
  rationale: El hebreo expresa abstención de objeción; «calla respecto de ella» preserva el sentido idiomático sin introducir una frase más interpretativa como «no le dice nada».
- source_word: וְקָמוּ
  english_pob_choice: then ... shall stand
  chosen_spanish: entonces ... quedarán firmes
  alternatives_spanish:
  - entonces ... se mantendrán
  - entonces ... permanecerán válidos
  lexicon: HALOT
  rationale: «Quedarán firmes» reproduce la fuerza legal de קום en este contexto, manteniendo la idea de validez/estabilidad y permitiendo la repetición del verbo con el mismo valor en la cláusula final.
- source_word: נְדָרֶיהָ
  english_pob_choice: her vows
  chosen_spanish: sus votos
  alternatives_spanish:
  - sus votos votivos
  - sus promesas
  lexicon: HALOT
  rationale: «Votos» es el equivalente legal habitual para נדרים y evita diluir su carácter cultual/jurídico. Se conserva el posesivo femenino implícito en el contexto.
- source_word: וֶאֱסָרֶהָ
  english_pob_choice: her binding obligations
  chosen_spanish: sus ataduras
  alternatives_spanish:
  - sus obligaciones vinculantes
  - sus vínculos
  lexicon: HALOT
  rationale: El sustantivo derivado de אסר conserva la imagen de algo que ata; «ataduras» es breve y fiel al campo semántico, aunque más literal que una expansión explicativa.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  english_pob_choice: that she bound on herself
  chosen_spanish: que se impuso sobre sí misma
  alternatives_spanish:
  - que ató sobre sí
  - que se obligó a sí misma
  lexicon: HALOT
  rationale: La construcción idiomática de «atar sobre la nefesh» puede sonar forzada en español si se calca. «Se impuso sobre sí misma» mantiene el sentido de autoobligación, aunque nota el matiz reflexivo y legal del hebreo.
- source_word: נַפְשָׁהּ
  english_pob_choice: herself
  chosen_spanish: sí misma
  alternatives_spanish:
  - su vida
  - su alma
  lexicon: HALOT
  rationale: En este giro legal, נֶפֶשׁ funciona reflexivamente, no como «alma» en sentido doctrinal. «Sí misma» evita una falsa espiritualización y conserva el referente a la persona.
- source_word: יָקֻמוּ
  english_pob_choice: shall stand
  chosen_spanish: quedarán firmes
  alternatives_spanish:
  - permanecerán válidos
  - se mantendrán
  lexicon: HALOT
  rationale: Se repite el mismo verbo jurídico que antes; la misma solución española ayuda a conservar la reiteración enfática del hebreo y su fuerza de validez legal.
translation_notes:
  revision_awareness: El antecedente inglés fue revisado y quedó sin cambios sustanciales; la presente propuesta sigue ese estado estable, pero traduce directamente desde el hebreo con atención al valor casuístico de la cláusula, al modismo de silencio y a la repetición jurídica de קום.
  spanish_consistency_notes:
  - Se mantuvo la duplicación del verbo de permanencia con una misma solución («quedarán firmes») para reflejar la repetición hebrea.
  - Se evitó «SEÑOR» y cualquier sustitución teológica ajena al versículo, ya que el texto no contiene el Tetragrámaton.
  - Se optó por «esposo» como equivalente claro de אִישׁ con sufijo posesivo en contexto matrimonial.
  - Se conservó el carácter legal de נדרים/אֱסָרִים con vocabulario de votos y ataduras, sin domesticarlos a simples promesas.
