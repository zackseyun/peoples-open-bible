revisions:
- from: Él también buscó a la nación y la condujo[a] a toda clase de ilegalidad.
  to: Él también buscó a la nación y la condujo[a] a toda clase de transgresión de la ley.
  rationale: Se mantiene la estructura y el sentido general del borrador, pero se reemplaza «ilegalidad» por «transgresión de la ley» para reflejar mejor παρανομία como conducta contraria a la ley en sentido moral-religioso, no meramente civil o penal. No hace falta adjudicación adicional porque el ajuste es claro y de bajo riesgo.
