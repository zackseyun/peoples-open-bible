- from: Pero cuando se reúna la congregación[a], tocarán, y no darán la señal de alarma.
  to: Pero cuando reúnan a la congregación[a], harán sonar, y no tocarán señal de alarma[b].
  rationale: La revisión corrige el matiz causativo de וּבְהַקְהִיל mediante «cuando reúnan a la congregación», mejora la naturalidad instrumental con «harán sonar», y añade la nota léxica clave sobre la oposición entre toque ordinario y toque de alarma, preservando mejor el rastro de auditoría del POB inglés.
