translation:
  language: es
  text: Así la enfermedad de la piel[a] de Naamán se te pegará a ti y a tu descendencia para siempre.” Y salió de su presencia afectado por esa enfermedad, blanco como la nieve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicionalmente: «la lepra de Naamán se te pegará... y salió leproso, blanco como la nieve». El hebreo צָרַעַת / מְצֹרָע se refiere de manera más amplia a una afección grave de la piel o condición ritual, no necesariamente a la lepra moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección de la piel
  - enfermedad cutánea
  lexicon: HALOT
  rationale: En español bíblico, 'lepra' es el equivalente tradicional más reconocible para la condición descrita, aunque el valor hebreo es más amplio que la lepra médica moderna. Se mantiene la claridad receptiva y se deja la precisión semántica en nota.
- source_word: נַעֲמָן
  english_pob_choice: Naaman
  chosen_spanish: Naamán
  alternatives_spanish:
  - Naaman
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio según el uso normal en español bíblico, con acento ortográfico para la pronunciación natural.
- source_word: תִּדְבַּק
  english_pob_choice: will cling
  chosen_spanish: se te pegará
  alternatives_spanish:
  - se te adherirá
  - se te pegará con fuerza
  - se te pegará de manera persistente
  lexicon: HALOT
  rationale: '''Pegar(se)'' comunica bien la idea concreta de adhesión/pegamiento del verbo דבק en un español natural, sin perder la imagen de una maldición que se aferra.'
- source_word: בְּךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - sobre ti
  - en ti
  lexicon: HALOT
  rationale: Con 'pegarse' en español, 'a ti' expresa la relación de destino de modo idiomático y claro.
- source_word: וּבְזַרְעֲךָ
  english_pob_choice: and to your offspring
  chosen_spanish: y a tu descendencia
  alternatives_spanish:
  - y a tus hijos
  - y a tu linaje
  - y a tu simiente
  lexicon: HALOT
  rationale: זֶרַע denota posteridad; 'descendencia' preserva el sentido genealógico amplio sin sonoridad arcaica.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre jamás
  - perpetuamente
  lexicon: HALOT
  rationale: '''Para siempre'' es la forma natural y solemne en español para duración indefinida en un juicio o maldición.'
- source_word: וַיֵּצֵא
  english_pob_choice: he went out
  chosen_spanish: Y salió
  alternatives_spanish:
  - Y se fue
  - Y salió afuera
  lexicon: HALOT
  rationale: La narración en español fluye mejor con 'salió', que conserva el movimiento concreto del hebreo.
- source_word: מִלְּפָנָיו
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de él
  - de ante su presencia
  lexicon: HALOT
  rationale: '''De su presencia'' reproduce la fuerza relacional de salir de delante de alguien sin sonar forzado.'
- source_word: מְצֹרָע
  english_pob_choice: diseased
  chosen_spanish: leproso
  alternatives_spanish:
  - afectado de lepra
  - enfermo de lepra
  - afligido por lepra
  lexicon: HALOT
  rationale: Se conserva el término tradicional 'leproso' por su fuerza bíblica y porque el español permite mantener el vínculo léxico con 'lepra'. La nota aclara que el hebreo abarca una afección más amplia que la lepra moderna.
- source_word: כַּשָּׁלֶג
  english_pob_choice: white as snow
  chosen_spanish: blanco como la nieve
  alternatives_spanish:
  - blanco como la nieve
  - como la nieve
  lexicon: HALOT
  rationale: '''Blanco como la nieve'' expresa de manera natural el símil hebreo y el efecto visual del pasaje.'
theological_decisions:
- issue: Alcance de צָרַעַת / מְצֹרָע
  english_pob_reading: skin disease / diseased
  chosen_spanish_reading: lepra / leproso
  alternative_spanish_readings:
  - enfermedad de la piel / enfermo
  - afección cutánea / afectado
  rationale: Aunque el español tradicional usa 'lepra', se evita entenderla como diagnóstico médico moderno. La nota mantiene la tensión entre la tradición bíblica y el alcance más amplio del hebreo.
  doctrine_reference: Terminología bíblica y fidelidad semántica; evitar anacronismo médico.
translation_notes:
  revision_awareness: El inglés POB optó por una terminología amplia ('skin disease' / 'diseased') para evitar el anacronismo médico de 'leprosy'. En español se conservó el término tradicional 'lepra/leproso' por su fuerte inteligibilidad bíblica, pero se añadió nota explicativa para auditar la decisión y no borrar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio con acento: ''Naamán''.'
  - Se evitó 'Señor' o sustitutos teológicos porque el versículo no contiene el Tetragrámaton.
  - '''Descendencia'' se usó de forma inclusiva para זֶרַע.'
  - El símil final se ajustó a una formulación natural en español sin añadir contenido interpretativo.
