translation:
  language: es
  text: Y pondrás la mesa fuera del velo[a], y el candelero[b] frente a la mesa, en el lado sur del tabernáculo; y pondrás la mesa en el lado norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera de la cortina». פָּרֹכֶת nombra la partición interior del tabernáculo; «velo» se conserva por ser el equivalente tradicional más específico en español.
    reason: lexical_alternative
  - marker: b
    text: Hebreo menorá; se traduce aquí por «candelero» para expresar en español el soporte de lámparas, en lugar de transliterar el término.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׂמְתָּ / תִּתֵּן
  english_pob_choice: you shall place / you shall put
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - pondrás allí
  - la situarás
  lexicon: HALOT
  rationale: Los dos verbos hebreos describen acciones concretas de ubicación de los muebles del santuario. En español, «pondrás» funciona de modo natural y conserva la instrucción directa sin añadir matices no presentes en el hebreo.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de los panes de la Presencia
  - la mesa
  lexicon: HALOT
  rationale: El sustantivo hebreo es simplemente «mesa». Aunque el contexto cultual identifica de qué mesa se trata, aquí el texto no la nombra con mayor amplitud; por eso se conserva la forma simple.
- source_word: מִחוּץ לַפָּרֹכֶת
  english_pob_choice: outside the veil
  chosen_spanish: fuera del velo
  alternatives_spanish:
  - fuera de la cortina
  - del lado de afuera del velo
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la partición interior del tabernáculo. «Velo» mantiene la equivalencia tradicional precisa en español y «fuera de» reproduce bien מִחוּץ.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  - el lampadario
  lexicon: HALOT
  rationale: En español bíblico, «candelabro» comunica claramente el objeto funcional sin transliterar el término. «Menorá» sería posible, pero en este contexto la traducción semántica es más transparente para la lectura pública.
- source_word: נֹכַח
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: HALOT
  rationale: La relación espacial es de correspondencia directa entre la mesa y el candelabro. «Frente a» expresa esa ubicación de manera natural en español; también deja abierta la orientación precisa del conjunto.
- source_word: עַל צֶלַע הַמִּשְׁכָּן תֵּימָנָה
  english_pob_choice: on the south side of the tabernacle
  chosen_spanish: al lado sur del tabernáculo
  alternatives_spanish:
  - en el costado sur del tabernáculo
  - sobre el lado sur del tabernáculo
  lexicon: HALOT
  rationale: צֶלַע literalmente es «lado» o «costado», y תֵּימָנָה señala el sur. «Al lado sur» es claro, idiomático y mantiene la orientación espacial sin sobrecargar el español.
- source_word: עַל צֶלַע צָפוֹן
  english_pob_choice: on the north side
  chosen_spanish: al lado norte
  alternatives_spanish:
  - en el costado norte
  - sobre el lado norte
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la primera mitad del versículo y el mismo valor básico de צֶלַע como «lado/costado». «Al lado norte» es breve y natural en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una equivalencia óptima y no introduce revisiones sustanciales. La versión española sigue ese mismo perfil, conservando la estructura de mando y el paralelismo espacial del hebreo sin ampliar el sentido más allá de lo requerido por el contexto.
  spanish_consistency_notes:
  - Se mantiene «velo» para פָּרֹכֶת, conforme a la elección auditada en inglés y a la precisión del contexto del tabernáculo.
  - Se traduce הַמְּנֹרָה como «candelabro» por claridad funcional, sin transliterar «menorá» en el texto principal.
  - Se conserva la repetición de «al lado» para reflejar el paralelismo de las dos indicaciones espaciales.
  - No se usa «SEÑOR» ni terminología teológica adicional, porque el versículo no contiene el nombre divino ni un título cristológico.
