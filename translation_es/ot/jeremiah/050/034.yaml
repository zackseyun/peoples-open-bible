review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: גֹּאֲלָם = «Su Redentor», חָזָק = «fuerte», Yahvé se preserva correctamente, y la cláusula final mantiene el contraste entre descanso para la tierra y perturbación para Babilonia. Sin embargo, «Sin duda pleiteará su pleito» suena torpe en español y no expresa de la manera más natural el valor jurídico-forense intensificado de רִיב יָרִיב אֶת רִיבָם. Además, la nota b es defectuosa porque presenta como alternativa tradicional exactamente la misma expresión ya usada en el texto.'
  spanish_quality_summary: 'El español es en general claro y digno, pero hay dos problemas de calidad: 1) «pleiteará su pleito» resulta poco idiomático y pesado; una formulación como «defenderá con firmeza su causa» o «ciertamente defenderá su causa» comunica mejor el hebreo en español eclesial natural. 2) «poner inquietud» es comprensible, pero «traer inquietud» o «causar inquietud» suena más natural; aun así, el problema principal es la cláusula jurídica. También conviene corregir la nota b para que la alternativa tradicional sea realmente distinta, por ejemplo «Yahvé de las Huestes».'
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». «Redentor» es una buena elección principal para גֹּאֲלָם, con «pariente-redentor» en nota. «de los Ejércitos» es aceptable para צְבָאוֹת. La revisión propuesta conserva estas decisiones y mejora la naturalidad de רִיב y de la cláusula final sin apartarse del rastro léxico-teológico documentado.
  issues:
  - severity: high
    issue: La nota b ofrece una alternativa tradicional idéntica al texto principal.
    rationale: El texto principal ya dice «Yahvé de los Ejércitos», pero la nota afirma que la opción tradicional sería «de los Ejércitos». Esto no aporta alternativa real y contradice la función de la nota.
  - severity: medium
    issue: «Sin duda pleiteará su pleito» es poco natural en español.
    rationale: Aunque intenta reflejar la repetición legal del hebreo, en español suena forzado y poco legible. El sentido jurídico puede preservarse mejor con «defenderá con firmeza su causa» y explicarse en nota.
  - severity: low
    issue: «poner inquietud» es menos idiomático que otras opciones formales.
    rationale: No es incorrecto, pero «traer inquietud» o «causar inquietud» lee mejor en español general y mantiene el contraste con «dar descanso».
