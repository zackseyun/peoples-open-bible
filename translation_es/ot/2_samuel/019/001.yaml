translation:
  language: es
  text: 'Entonces el rey quedó profundamente sacudido, y subió a la cámara sobre la puerta[a] y lloró. Mientras iba, decía: «¡Hijo mío Absalón! ¡Hijo mío, hijo mío Absalón! ¡Quién me diera haber muerto yo en tu lugar, Absalón, hijo mío[b], hijo mío!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «la habitación superior de la puerta».
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo: «¿Quién dará...?», expresión de deseo; es decir, «¡Ojalá!» o «¡Quién me diera!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְגַּז
  english_pob_choice: was deeply shaken
  chosen_spanish: quedó profundamente sacudido
  alternatives_spanish:
  - quedó agitado
  - quedó turbado
  - tembló
  lexicon: HALOT
  rationale: רגז puede expresar agitación emocional intensa, no solo temblor físico. En este lamento, «quedó profundamente sacudido» conserva la fuerza afectiva del hebreo y el matiz de conmoción interior que el inglés POB intenta captar.
- source_word: עֲלִיַּת הַשַּׁעַר
  english_pob_choice: the chamber over the gate
  chosen_spanish: la cámara sobre la puerta
  alternatives_spanish:
  - la habitación superior de la puerta
  - la sala alta de la puerta
  - el aposento sobre la puerta
  lexicon: HALOT
  rationale: עֲלִיָּה designa un espacio alto o superior; con הַשַּׁעַר, se refiere a un recinto encima de la puerta/portón. «Cámara sobre la puerta» mantiene la imagen arquitectónica de forma natural en español. No se fuerza «aposento» porque el hebreo no exige esa tradición terminológica.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - sollozó
  - se puso a llorar
  lexicon: HALOT
  rationale: בכה en este contexto solemne se traduce bien con «lloró»; es claro, digno y directo. «Sollozó» añadiría una intensidad no explicitada, y «se puso a llorar» sería más perifrástico.
- source_word: וְכֹה אָמַר בְּלֶכְתּוֹ
  english_pob_choice: As he went, he said
  chosen_spanish: Mientras iba, decía
  alternatives_spanish:
  - Y mientras iba, dijo
  - Y así hablaba mientras iba
  - Al ir, decía
  lexicon: HALOT
  rationale: La construcción hebrea combina circunstancia y contenido repetido. «Mientras iba, decía» conserva el carácter continuo del lamento y evita una literalidad torpe en español.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: El hebreo repite el vocativo afectivo. En español, «hijo mío» suena más natural y conmovedor en vocativo que «mi hijo», y permite preservar la repetición exacta del lamento.
- source_word: מִי יִתֵּן
  english_pob_choice: If only
  chosen_spanish: ¡Quién me diera
  alternatives_spanish:
  - ¡Ojalá
  - ¡Si tan solo
  lexicon: HALOT
  rationale: La idiomática hebrea expresa un deseo imposible. «¡Quién me diera» reproduce bien el valor desiderativo y mantiene una tonalidad sobria y bíblica en español, sin volverlo mecánicamente literal.
- source_word: מוּתִי אֲנִי תַחְתֶּיךָ
  english_pob_choice: I had died instead of you
  chosen_spanish: haber muerto yo en tu lugar
  alternatives_spanish:
  - que yo hubiera muerto en tu lugar
  - morir yo en tu lugar
  lexicon: HALOT
  rationale: La frase expresa el deseo contrafáctico de haber muerto en el lugar de Absalón. «Haber muerto yo en tu lugar» preserva el sentido de sustitución y la forma de lamento, sin perder naturalidad en la exclamación previa.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma española establecida «Absalón», más natural y reconocible en la tradición bíblica en español. El nombre propio no requiere transliteración cruda cuando existe una forma ampliamente asentada.
translation_notes:
  revision_awareness: El modelo más reciente indicó acuerdo alto y ningún cambio; no se aplicaron revisiones adicionales respecto del texto fuente/auditoría en inglés.
  spanish_consistency_notes:
  - Se mantuvo la repetición intensiva de «hijo mío» para conservar el pathos del original.
  - Se evitó «SEÑOR» o fórmulas de sustitución teológica porque este versículo no contiene el Tetragrámaton ni un término divino equivalente.
  - La cadencia del lamento se preservó con una sintaxis fluida y suficientemente literal, sin suavizar la intensidad del deseo contrafáctico.
