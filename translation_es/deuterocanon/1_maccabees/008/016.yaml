revisions:
- from: Y confían a un solo hombre el gobierno de ellos cada año y el ejercicio de señorío sobre toda su tierra[a], y todos escuchan al uno, y no hay en ellos envidia ni celo.
  to: Y encomiendan a un solo hombre gobernarlos cada año y ejercer señorío sobre toda su tierra, y todos escuchan a ese solo hombre[a], y no hay entre ellos envidia ni celos.
  rationale: La revisión conserva más fielmente la fuerza política del griego y mejora el español. «Encomiendan» expresa mejor la delegación de autoridad implícita en πιστεύουσιν; «gobernarlos» simplifica y naturaliza ἄρχειν αὐτῶν; «escuchan a ese solo hombre» mantiene la cercanía a la literalidad apoyada por la nota; y «celos» corrige la ambigüedad de «celo» y se alinea con la decisión inglesa 'jealousy'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: delegan autoridad a un solo hombre por un año, todos atienden a ese único gobernante, y no hay rivalidad interna. También preserva adecuadamente la nota del inglés sobre ἀκούουσιν. Sin embargo, hay dos desajustes léxicos importantes: «confían a» suena incompleto/forzado en español para el sentido político de πιστεύουσιν con infinitivos complementarios, y «celo» no comunica bien el valor negativo de ζῆλος en pareja con φθόνος.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero contiene giros poco naturales: «confían a un solo hombre el gobierno de ellos» y «escuchan al uno» suenan calcados. «De ellos» debe suavizarse a «sobre ellos». «Escuchan al uno» puede mantenerse por fidelidad, pero en español fluye mejor «escuchan a ese solo hombre» o «escuchan al único». Además, «celo» en singular en este contexto suena ambiguo y poco idiomático; «celos» o «rivalidad» sería más claro, y «celos» conserva mejor la distinción léxica con «envidia».'
  glossary_alignment: No hay términos del glosario teológicamente sensibles en este versículo. La principal cuestión léxica es mantener la fuerza política de πιστεύουσιν y κυριεύειν sin producir español rígido. «Encomiendan a un solo hombre gobernarlos… y ejercer señorío» alinea mejor con el razonamiento del POB. Para ζῆλος, «celos» encaja mejor que «celo» con la decisión inglesa 'jealousy'.
  issues:
  - severity: medium
    issue: «confían a» es poco natural e incompleto para πιστεύουσιν en esta construcción.
    rationale: Aunque intenta reflejar 'entrust', en español bíblico-natural funciona mejor «encomiendan a» o «confían a un solo hombre la tarea de gobernarlos». La forma actual suena calcada y afecta la claridad.
  - severity: medium
    issue: «el gobierno de ellos» es una construcción rígida.
    rationale: Para ἄρχειν αὐτῶν, «gobernarlos» o «gobernar sobre ellos» comunica mejor el objeto personal del verbo y evita una frase nominal pesada.
  - severity: medium
    issue: «celo» no refleja bien el sentido negativo de ζῆλος en este contexto.
    rationale: En español actual, «celo» suele sugerir fervor, cuidado o celo religioso; aquí el sentido es negativo, paralelo a φθόνος. «Celos» preserva mejor la distinción con «envidia» y la legibilidad.
  - severity: low
    issue: «escuchan al uno» conserva demasiado literalmente el griego y suena extraño en español.
    rationale: La literalidad es defendible por la nota, pero una leve adaptación como «escuchan a ese solo hombre» mantiene el sentido y mejora la fluidez sin perder el matiz.
