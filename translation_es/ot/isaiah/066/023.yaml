translation:
  language: es
  text: Y acontecerá que, de luna nueva en luna nueva y de sábado en sábado, toda carne vendrá[a] a postrarse delante de mí[b], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de una luna nueva a otra, y de un sábado a otro».'
    reason: alternative_reading
  - marker: b
    text: «Toda carne» es un hebraísmo que puede significar toda la humanidad, conservando a la vez el matiz de vida encarnada y criatura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y acontecerá que
  alternatives_spanish:
  - Y será
  - Y será que
  - Y sucederá que
  lexicon: HALOT
  rationale: La fórmula profética pide un giro español natural y solemne. «Acontecerá que» conserva el valor futuro e introductorio sin depender de un calco rígido de «será».
- source_word: מִדֵּי ... בְּחָדְשׁוֹ
  english_pob_choice: from new moon to new moon
  chosen_spanish: de luna nueva en luna nueva
  alternatives_spanish:
  - de mes en mes
  - de una luna nueva a otra
  - de nuevo mes en nuevo mes
  lexicon: HALOT
  rationale: Aquí חֹדֶשׁ apunta al marcador cultual de la luna nueva, no solo a «mes». «De luna nueva en luna nueva» conserva el ritmo idiomático y la referencia litúrgica.
- source_word: וּמִדֵּי שַׁבָּת בְּשַׁבַּתּוֹ
  english_pob_choice: and from Sabbath to Sabbath
  chosen_spanish: y de sábado en sábado
  alternatives_spanish:
  - y de un sábado a otro
  - y semana tras semana
  lexicon: HALOT
  rationale: «Sábado» mantiene el término cultual directo. La repetición «de... en...» refleja la recurrencia periódica del hebreo sin introducir una paráfrasis temporal más amplia.
- source_word: כָל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todas las personas
  - todo ser humano
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico con «carne», porque el texto resalta a la humanidad en su condición corpórea y no solo un equivalente abstracto de «personas».
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to bow down
  chosen_spanish: a postrarse
  alternatives_spanish:
  - a inclinarse
  - a adorar
  - a prosternarse
  lexicon: HALOT
  rationale: El verbo expresa postración física de adoración. «Postrarse» mantiene la concreción corporal que la POB inglesa quiso preservar con «bow down».
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: «Delante de mí» reproduce de manera natural la relación espacial y cultual del hebreo. «Ante mí» sería igualmente posible, pero «delante de mí» suena más transparente en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, conservando la forma «Yahvé» en el texto principal en lugar del reemplazo tradicional por «SEÑOR».
theological_decisions:
- issue: Si חֹדֶשׁ debe entenderse como «mes» o como «luna nueva» en un contexto de culto futuro
  english_pob_reading: new moon
  chosen_spanish_reading: luna nueva
  alternative_spanish_readings:
  - mes
  - de mes en mes
  rationale: La mención paralela con sábado y el carácter repetitivo de la construcción favorecen un referente cultual. «Luna nueva» mantiene la textura litúrgica sin resolver más de lo que el verso exige.
  doctrine_reference: Preservar la tensión interpretativa del texto; primacía del hebreo sobre la tradición de traducción.
- issue: Cómo reflejar כָל בָּשָׂר sin reducir el alcance idiomático del hebreo
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: '«Toda carne» conserva el giro bíblico y deja abierta la amplitud semántica: humanidad universal, con el trasfondo de criatura encarnada. No se estrecha indebidamente a «personas» ni se abstrae por completo.'
  doctrine_reference: Preservar la tensión teológica del idioma fuente.
translation_notes:
  revision_awareness: La POB inglesa fue revisada para eliminar posesivos redundantes en la secuencia idiomática «from new moon to new moon and from Sabbath to Sabbath». La versión española sigue esa misma economía idiomática con «de luna nueva en luna nueva y de sábado en sábado», sin añadir posesivos que el hebreo no exige. También se mantuvo la preferencia por «all flesh» como expresión idiomática, no por una simplificación a «all people».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme al estándar del proyecto.
  - «Luna nueva» y «sábado» se mantienen como marcadores cultuales, no como meros periodos civiles.
  - La puntuación y el orden sintáctico buscan sonar natural en español bíblico moderno sin perder el paralelismo hebreo.
  - Se conserva el idioma corporal de «toda carne» en vez de neutralizarlo a una frase más abstracta.
