translation:
  language: es
  text: 'Y por mí se emite un decreto acerca de lo que han de hacer con estos ancianos de los judíos para la reconstrucción de la casa de Dios: el gasto total será pagado[a] con prontitud a estos hombres, de los bienes del rey, de la provincia Más allá del Río[b], para que la obra no se detenga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el costo total» o «el desembolso total».
    reason: lexical_alternative
  - marker: b
    text: «Más allá del Río» era el nombre administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
lexical_decisions:
- source_word: שִׂים טְעֵם
  english_pob_choice: a decree is issued
  chosen_spanish: se emite un decreto
  alternatives_spanish:
  - se dicta un decreto
  - se publica un decreto
  - se da una orden
  lexicon: HALOT
  rationale: La expresión aramea significa literalmente 'poner/establecer un decreto o decisión'; en español, 'se emite un decreto' conserva el carácter oficial y administrativo sin sonar forzado.
- source_word: לְמָא דִי תַעַבְדוּן
  english_pob_choice: concerning what you are to do
  chosen_spanish: acerca de lo que habéis de hacer
  alternatives_spanish:
  - sobre lo que debéis hacer
  - en cuanto a lo que habéis de hacer
  lexicon: HALOT
  rationale: La cláusula introduce el contenido del decreto. 'Acerca de lo que habéis de hacer' reproduce el sentido directivo y mantiene el tono administrativo. Se usa segunda persona plural por el plural implícito del destinatario.
- source_word: שָׂבֵי יְהוּדָיֵא
  english_pob_choice: elders of the Jews
  chosen_spanish: estos ancianos de los judíos
  alternatives_spanish:
  - los ancianos de los judíos
  - los ancianos judíos
  lexicon: HALOT
  rationale: '''Ancianos'' preserva el término de liderazgo comunitario; ''de los judíos'' sigue de cerca el genitivo del arameo y refleja la designación étnica del texto.'
- source_word: לְמִבְנֵא
  english_pob_choice: for the rebuilding
  chosen_spanish: para la reconstrucción
  alternatives_spanish:
  - para edificar
  - para la edificación
  lexicon: HALOT
  rationale: El infinitivo expresa propósito respecto al proyecto del templo. 'Reconstrucción' encaja con el contexto de reanudación de la obra y suena natural en español.
- source_word: בֵּית אֱלָהָא דֵךְ
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se conserva la forma 'casa de Dios' porque es más fiel al hebreo/arameo que 'templo' y evita añadir el posesivo 'tu', que el texto fuente no tiene.
- source_word: מִנִּכְסֵי מַלְכָּא
  english_pob_choice: from the king’s goods
  chosen_spanish: con los bienes del rey
  alternatives_spanish:
  - de los bienes del rey
  - con los recursos del rey
  - con el tesoro del rey
  lexicon: HALOT
  rationale: El sustantivo se refiere a bienes/posesiones, no necesariamente a un tesoro técnico. 'Con los bienes del rey' mantiene el sentido material y funciona bien en español administrativo.
- source_word: מִדַּת עֲבַר נַהֲרָה
  english_pob_choice: from the province Beyond the River
  chosen_spanish: de la provincia del otro lado del Río
  alternatives_spanish:
  - de la provincia Más allá del Río
  - de la provincia Transfratesiana
  - de la provincia al otro lado del río
  lexicon: HALOT
  rationale: Se conserva el nombre administrativo persa en forma explicativa. 'Del otro lado del Río' comunica el valor geográfico-histórico sin perder la referencia oficial del título.
- source_word: אָסְפַּרְנָא
  english_pob_choice: promptly
  chosen_spanish: con prontitud
  alternatives_spanish:
  - prontamente
  - sin demora
  - rápidamente
  lexicon: HALOT
  rationale: El adverbio enfatiza diligencia y urgencia en un contexto fiscal-administrativo. 'Con prontitud' es sobrio y preciso.
- source_word: נִפְקְתָא
  english_pob_choice: the full expense
  chosen_spanish: el gasto total
  alternatives_spanish:
  - el costo total
  - la erogación total
  - el desembolso total
  lexicon: HALOT
  rationale: El término apunta a gasto/erogación. 'Gasto total' refleja la suma completa a cubrir sin cargar con un tecnicismo ajeno.
- source_word: תֶּהֱוֵא מִתְיַהֲבָא
  english_pob_choice: is to be paid
  chosen_spanish: será pagado
  alternatives_spanish:
  - deberá ser pagado
  - habrá de ser pagado
  - será entregado
  lexicon: HALOT
  rationale: La secuencia verbal pasiva indica que la suma debe ser proporcionada. 'Será pagado' explicita el sentido financiero que el contexto exige.
- source_word: לְגֻבְרַיָּא אִלֵּךְ
  english_pob_choice: to these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estos varones
  - a estas personas
  - a ellos
  lexicon: HALOT
  rationale: '''Hombres'' reproduce el término arameo y mantiene la referencia explícita de género del original. En español bíblico, aquí no conviene neutralizar el sustantivo.'
- source_word: דִּי לָא לְבַטָּלָא
  english_pob_choice: so that the work may not cease
  chosen_spanish: para que la obra no se detenga
  alternatives_spanish:
  - para que no haya interrupción
  - para que no cese la obra
  - a fin de que no se suspenda
  lexicon: HALOT
  rationale: El propósito es evitar la suspensión de la reconstrucción. 'La obra' está implícita por el contexto y 'no se detenga' comunica con naturalidad la idea de no interrupción.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se eliminó el posesivo ''your'' antes de ''God'' por exactitud textual. Por eso la versión española dice solo ''la casa de Dios'' y no introduce un posesivo equivalente. También se mantuvo el sentido administrativo de ''Beyond the River'' sin convertirlo en una paráfrasis geográfica más interpretativa.'
  spanish_consistency_notes:
  - Se preservó 'casa de Dios' para alinear con la terminología POB y evitar el reemplazo por 'templo' salvo necesidad contextual.
  - '''Elders'' se tradujo como ''ancianos'', no como ''líderes'', para respetar la forma social concreta del texto.'
  - '''Goods'' se expresó como ''bienes'' en el cuerpo y se aclaró en nota como posible ''costo/desembolso'' respecto de la frase completa, manteniendo la distinción entre fuente de fondos y suma a pagar.'
  - Se mantuvo 'del otro lado del Río' como nombre administrativo, sin sustituirlo por un equivalente moderno como 'Trans-Eufrates' en el texto principal.
