translation:
  language: es
  text: En todo trabajo hay ganancia[a], pero las palabras solo llevan a la carencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la pobreza». El hebreo מַחְסוֹר puede denotar falta, carencia o pobreza.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל
  english_pob_choice: In all
  chosen_spanish: En todo
  alternatives_spanish:
  - En cada
  - En toda
  lexicon: HALOT
  rationale: La construcción generaliza un principio de sabiduría; «en todo» comunica bien la amplitud proverbial sin volver la frase demasiado literal o pesada.
- source_word: עֶצֶב
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - fatiga
  - esfuerzo
  lexicon: HALOT
  rationale: El término hebreo puede incluir esfuerzo penoso; «trabajo» es natural en español y mantiene la idea de actividad productiva en contraste con simples palabras. «Labor» o «esfuerzo» siguen siendo posibles, pero «trabajo» suena más idiomático aquí.
- source_word: מוֹתָר
  english_pob_choice: profit
  chosen_spanish: ganancia
  alternatives_spanish:
  - provecho
  - beneficio
  - lucro
  lexicon: HALOT
  rationale: En este proverbio, מוֹתָר apunta a lo que sobra o resulta ventajoso. «Ganancia» conserva la idea de resultado positivo y funciona bien en contraste con la carencia final.
- source_word: וּ/דְבַר שְׂפָתַיִם
  english_pob_choice: but mere talk
  chosen_spanish: pero la charla de los labios
  alternatives_spanish:
  - pero la palabra de los labios
  - pero el hablar de los labios
  - pero solo palabras
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude al hablar vacío o meramente verbal. «La charla de los labios» conserva la imagen de labios/expresión hablada sin caer en una traducción demasiado libre. El matiz despectivo se desplaza al contexto y al adverbio posterior.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  - solo y nada más
  lexicon: HALOT
  rationale: «אַךְ» restringe con fuerza el efecto de la segunda cola. «Solo» reproduce esa limitación de manera breve y natural en español.
- source_word: לְ/מַחְסוֹר
  english_pob_choice: to lack
  chosen_spanish: a la carencia
  alternatives_spanish:
  - a la pobreza
  - a la escasez
  - a la falta
  lexicon: HALOT
  rationale: מַחְסוֹר puede significar falta, carencia o pobreza. «Carencia» mantiene el campo semántico amplio sin decidir de forma demasiado estrecha por una sola modalidad de escasez.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el POB inglés de referencia, pero ajusta la primera cola para un español más natural («En todo trabajo hay ganancia») y conserva la antítesis con la segunda cola. No se introdujeron cambios textuales mayores ni se detectaron revisiones sustantivas en el registro fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable en este versículo.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al texto.
  - Se preservó la oposición proverbial entre esfuerzo productivo y habla vacía.
  - «Carencia» mantiene el rango semántico amplio de מַחְסוֹר, con nota alternativa sobre «pobreza».
