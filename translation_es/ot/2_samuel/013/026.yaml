translation:
  language: es
  text: 'Entonces Absalón dijo: «Si no[a], por favor, deja que mi hermano Amnón vaya con nosotros». Pero el rey le dijo: «¿Por qué habría de ir contigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «Si no quieres, por favor deja que mi hermano Amnón vaya con nosotros». El hebreo es elíptico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said / But ... said
  chosen_spanish: Entonces ... dijo / Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la escena; en español, «Entonces» reproduce bien ese avance, y «Pero» marca naturalmente el contraste en la respuesta del rey, siguiendo el valor discursivo del audit trail inglés.
- source_word: וָלֹא
  english_pob_choice: If not
  chosen_spanish: Si no
  alternatives_spanish:
  - Y no
  - Si no fuera así
  lexicon: HALOT
  rationale: La secuencia es elíptica y depende de la negativa previa. «Si no» conserva esa concisión y deja implícita la condición, como en el inglés POB.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: Es una partícula de cortesía. «Por favor» comunica de manera natural el tono deferente sin añadir matiz devocional no presente en el hebreo.
- source_word: יֵלֶךְ
  english_pob_choice: let ... go / should he go
  chosen_spanish: vaya / habría de ir
  alternatives_spanish:
  - vaya
  - iría
  - debería ir
  lexicon: HALOT
  rationale: En la petición de Absalón, el jussivo se expresa naturalmente con «vaya». En la respuesta del rey, la pregunta retórica se vierte como «habría de ir» para conservar el matiz de cuestionamiento sin convertirla en simple futuro.
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - junto con nosotros
  lexicon: HALOT
  rationale: Es el complemento comitativo directo con sufijo de primera persona plural; «con nosotros» es la equivalencia más clara y natural.
- source_word: אַמְנוֹן אָחִי
  english_pob_choice: Amnon my brother
  chosen_spanish: Amnón, mi hermano
  alternatives_spanish:
  - mi hermano Amnón
  - Amnón mi hermano
  lexicon: HALOT
  rationale: El hebreo pone el nombre seguido del sustantivo en aposición. En español, «Amnón, mi hermano» respeta el orden básico del original y resulta más natural con coma explicativa.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón
  lexicon: HALOT
  rationale: Interrogativo causal directo; «¿Por qué?» es la forma normal y más fiel en español.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  lexicon: HALOT
  rationale: El sufijo es de segunda persona singular femenina en hebreo, dirigido a Absalón. En español, el trato natural en esta pregunta directa es «contigo», que evita marcar género donde el castellano no lo exige en esta posición.
translation_notes:
  revision_awareness: El borrador sigue de cerca el inglés POB revisado, pero ajusta el orden nominal y la sintaxis para que el español sea natural y conserve la elipsis del hebreo. Se mantiene la ambigüedad interpretativa de וָלֹא con una nota, sin expandir indebidamente el texto principal.
  spanish_consistency_notes:
  - Se usa «Absalón» y «Amnón» con acento gráfico conforme al español bíblico habitual.
  - Se conserva «por favor» como equivalente estable de נָא.
  - La pregunta del rey se formula con condicional perifrástico («habría de ir») para reflejar mejor el valor retórico del imperfecto hebreo.
