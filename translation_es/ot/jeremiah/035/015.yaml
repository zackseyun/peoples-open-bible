    issue: «Vuelvan a la tierra» traduce incorrectamente וּשְׁבוּ אֶל הָאֲדָמָה.
    rationale: El hebreo aquí usa יָשַׁב (‘habitar, morar, permanecer’), no שׁוּב (‘volver’). La traducción actual altera el sentido principal del mandato y pierde la relación con «habitar/permanecer en la tierra».
  - severity: high
    issue: La nota [a] está anclada a «profetas» pero el expediente inglés reserva la nota principal para שֻׁבוּ נָא.
    rationale: La nota española introduce «mensajeros proféticos», alternativa no sustentada por el hebreo ni por el POB inglés, y omite la alternativa auditada sobre «vuélvanse / regresen / arrepiéntanse».
  - severity: medium
    issue: Faltan notas españolas para alternativas y explicación idiomática preservadas en el POB inglés.
    rationale: El POB inglés documenta el idiomático «rising early and sending», la alternativa «amend your deeds» y la nota distributiva. En español conviene preservarlas, especialmente donde ayudan a evitar pérdida semántica.
