translation:
  language: es
  text: Tu tierra es una desolación; tus ciudades están quemadas con fuego. Tu suelo—delante de tus mismos ojos—extranjeros[a] lo devoran, y es una desolación, como un derribo por extranjeros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'extraños' o 'forasteros'; el término hebreo repetido puede traducirse de varias maneras para referirse a intrusos de fuera.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'como un derribo por extranjeros'; la frase también puede entenderse como 'como el derribo de extranjeros' o, según algunos, como una alusión al derribo de Sodoma.
    reason: alternative_reading
lexical_decisions:
- source_word: אַרְצְכֶם
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu territorio
  lexicon: HALOT
  rationale: אֶרֶץ designa aquí la tierra/territorio poseído por el pueblo. 'Tierra' conserva la amplitud semántica y suena natural en español bíblico contemporáneo.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  - una ruina
  lexicon: HALOT
  rationale: El sustantivo expresa un estado de devastación. Mantener el sustantivo en español preserva el paralelismo nominal del hebreo y la fuerza del juicio.
- source_word: עָרֵיכֶם
  english_pob_choice: your cities
  chosen_spanish: tus ciudades
  alternatives_spanish:
  - vuestras ciudades
  - las ciudades
  lexicon: HALOT
  rationale: Correspondencia directa del plural con sufijo de 2ª persona. 'Tus' resulta más natural y ampliamente inteligible en español neutro.
- source_word: שְׂרֻפוֹת אֵשׁ
  english_pob_choice: burned with fire
  chosen_spanish: quemadas con fuego
  alternatives_spanish:
  - quemadas por el fuego
  - consumidas por fuego
  lexicon: HALOT
  rationale: La construcción pasiva con אֵשׁ se vierte de forma idiomática como 'quemadas con fuego', manteniendo la imagen sin sobreexplicar.
- source_word: אַדְמַתְכֶם
  english_pob_choice: your soil
  chosen_spanish: tu suelo
  alternatives_spanish:
  - tu tierra
  - tu terreno
  - tu suelo fértil
  lexicon: HALOT
  rationale: אֲדָמָה aquí apunta al terreno productivo y visible. 'Suelo' mantiene la concreción y permite distinguirlo de 'tierra' en la primera cola.
- source_word: לְנֶגְדְּכֶם
  english_pob_choice: before your very eyes
  chosen_spanish: delante de tus mismos ojos
  alternatives_spanish:
  - ante tus ojos
  - a la vista de ustedes
  lexicon: HALOT
  rationale: La frase enfatiza que la devastación ocurre a la vista del pueblo. 'Delante de tus mismos ojos' comunica la intensidad retórica del original.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - extranjeros
  lexicon: HALOT
  rationale: '''Extraños'' reproduce el valor de outsider/intruso y deja abierta la alternativa ''forasteros/extranjeros'' preservada en la nota. Se evita un término más técnico que estreche el matiz.'
- source_word: אֹכְלִים אֹתָהּ
  english_pob_choice: are devouring it
  chosen_spanish: lo devoran
  alternatives_spanish:
  - lo comen
  - lo consumen
  lexicon: HALOT
  rationale: El verbo hebreo es literal 'comer', pero en este contexto funciona metafóricamente como consumo hostil. 'Devoran' conserva fuerza verbal y evita un calco demasiado crudo.
- source_word: וּשְׁמָמָה
  english_pob_choice: and it is a desolation
  chosen_spanish: y es una desolación
  alternatives_spanish:
  - y está desolada
  - y queda desolada
  lexicon: HALOT
  rationale: La conjunción con sustantivo retoma e intensifica la primera descripción. 'Es una desolación' mantiene el paralelo nominal y la concisión del hebreo.
- source_word: כְּמַהְפֵּכַת
  english_pob_choice: like an overthrow
  chosen_spanish: como un derribo
  alternatives_spanish:
  - como una ruina
  - como un trastorno
  lexicon: HALOT
  rationale: מַהְפֵּכָה es un vuelco/derrocamiento catastrófico. 'Derribo' comunica la idea de caída violenta sin cargar el verso con un término demasiado interpretativo.
- source_word: זָרִים
  english_pob_choice: by strangers
  chosen_spanish: por extraños
  alternatives_spanish:
  - por extranjeros
  - de extraños
  lexicon: HALOT
  rationale: Se conserva la repetición del término y se da una lectura preposicional posible en español para reflejar la construcción comprimida del hebreo, sin resolver dogmáticamente la ambigüedad.
theological_decisions:
- issue: Interpretación de כְּמַהְפֵּכַת זָרִים
  english_pob_reading: like an overthrow by strangers
  chosen_spanish_reading: como un derribo por extraños
  alternative_spanish_readings:
  - como el derribo de extraños
  - como la destrucción de los extranjeros
  - como la destrucción de Sodoma
  rationale: El hebreo es sintácticamente comprimido y admite varias lecturas. El texto principal sigue de cerca el MT y conserva la ambigüedad sin imponer una referencia específica como Sodoma, que el hebreo no nombra explícitamente aquí.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no propuso cambios; se mantiene la lectura principal del verso con las alternativas críticas preservadas en notas.
  spanish_consistency_notes:
  - Se mantuvo 'tierra' para אַרֶץ y 'suelo' para אַדְמָה, preservando la distinción lexical del hebreo.
  - '''Extraños'' se usa de manera consistente para זָרִים, con ''extranjeros'' como alternativa anotada.'
  - Se conservó el carácter nominal de שְׁמָמָה como 'desolación' en ambas ocurrencias.
  - La ambigüedad de כְּמַהְפֵּכַת זָרִים no se resolvió de forma dogmática; se dejó abierta en la nota crítica.
