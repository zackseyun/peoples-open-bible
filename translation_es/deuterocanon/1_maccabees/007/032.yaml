translation:
  language: es
  text: en Cafar-salama[a]. Y cayeron de los que estaban con Nicanor unos cinco mil hombres, y huyeron a la ciudad de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El topónimo griego Χαρφαρασαραμά es oscuro; por eso son posibles otras transliteraciones además de la forma adoptada aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - junto a
  - cerca de
  lexicon: LSJ
  rationale: Con un topónimo en un relato de batalla, κατά funciona de manera locativa. En español, 'en' comunica el lugar del combate con naturalidad y sin añadir una relación adversativa que el contexto no pide.
- source_word: Χαρφαρασαραμά
  english_pob_choice: Chaphar-salama
  chosen_spanish: Cafar-salama
  alternatives_spanish:
  - Harpharasarama
  - Cafarsalama
  lexicon: LSJ
  rationale: Es un topónimo difícil y de forma griega incierta. Se conserva como nombre propio transliterado, con una forma española legible que sigue de cerca la secuencia consonántica y evita una traducción interpretativa.
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron abatidos
  lexicon: LSJ
  rationale: En narrativa militar, el verbo griego expresa la muerte en combate de forma breve. 'Cayeron' reproduce esa concisión en español sin explicitar más de lo que el texto dice.
- source_word: τῶν παρὰ Νικάνορος
  english_pob_choice: of those with Nicanor
  chosen_spanish: de los que estaban con Nicanor
  alternatives_spanish:
  - de los hombres de Nicanor
  - del bando de Nicanor
  lexicon: LSJ
  rationale: La expresión griega literalmente señala a los que estaban 'junto a' Nicanor. 'De los que estaban con Nicanor' mantiene esa relación de compañía/fuerza asociada sin forzar una posesión más fuerte de la que el griego exige.
- source_word: ὡς πεντακισχίλιοι ἄνδρες
  english_pob_choice: about five thousand men
  chosen_spanish: unos cinco mil hombres
  alternatives_spanish:
  - aproximadamente cinco mil hombres
  - como cinco mil hombres
  lexicon: LSJ
  rationale: ὡς ante un número marca aproximación. 'Unos' es el equivalente español más natural y fiel a esa no exactitud.
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - se dieron a la fuga
  - se retiraron
  lexicon: LSJ
  rationale: El verbo griego indica huida. 'Huyeron' conserva el movimiento de escape de manera directa y sobria, sin añadir matices militares que el texto no expresa.
- source_word: εἰς τὴν πόλιν Δαυείδ
  english_pob_choice: into the city of David
  chosen_spanish: a la ciudad de David
  alternatives_spanish:
  - hacia la ciudad de David
  - a la ciudad de David
  lexicon: LSJ
  rationale: εἰς indica movimiento hacia dentro; en español, con un destino ya conocido, 'a la ciudad de David' es la formulación más natural y clara. Se mantiene el nombre tradicional descriptivo 'ciudad de David' porque el griego lo presenta como denominación establecida, no como topónimo transliterado.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés coinciden sustancialmente; no se documentan revisiones sustantivas, y la única cuestión destacable es la transliteración incierta del topónimo inicial.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o cualquier sustitución teológica, porque no aparece el tetragrámaton ni un sustituto de κύριος en este versículo.
  - '''David'' se conserva sin transliteración, siguiendo el uso español estándar para el nombre propio bíblico.'
  - 'La puntuación reproduce la segmentación del griego: una primera frase toponímica breve, seguida del balance de bajas y la retirada a Jerusalén/ciudad de David.'
