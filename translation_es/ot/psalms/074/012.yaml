translation:
  language: es
  text: Pero Dios es mi Rey desde antiguo, obrando actos de salvación en medio de la tierra entera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» o «el país». El hebreo puede referirse ya sea a toda la tierra, ya sea a una tierra o región concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֵאלֹהִים
  english_pob_choice: Yet God
  chosen_spanish: Sin embargo, Dios
  alternatives_spanish:
  - Pero Dios
  - Y Dios
  lexicon: HALOT
  rationale: El prefijo conjuntivo tiene fuerza adversativa en el contexto del lamento y la confianza; en español, «Sin embargo» transmite mejor ese contraste que una simple coordinación. «Dios» conserva el referente a אֱלֹהִים como el Dios de Israel.
- source_word: מַלְכִּי
  english_pob_choice: my King
  chosen_spanish: mi Rey
  alternatives_spanish:
  - mi rey
  lexicon: HALOT
  rationale: 'El sustantivo con sufijo de primera persona expresa posesión: «mi Rey». Se mantiene la mayúscula en «Rey» por tratarse de un título divino, siguiendo la distinción funcional del inglés sin perder naturalidad en español.'
- source_word: מִקֶּדֶם
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde tiempos antiguos
  - desde el principio
  lexicon: HALOT
  rationale: La expresión denota antigüedad o duración remota. «Desde antiguo» preserva el sentido temporal y el tono poético sin forzar una afirmación más absoluta que «desde el principio».
- source_word: פֹּעֵל
  english_pob_choice: working
  chosen_spanish: que realiza
  alternatives_spanish:
  - que obra
  - que hace
  lexicon: HALOT
  rationale: El participio describe acción continua o característica. «Que realiza» suena natural en español y conserva la idea de un Dios que actúa de manera habitual y eficaz.
- source_word: יְשׁוּעוֹת
  english_pob_choice: acts of salvation
  chosen_spanish: actos de salvación
  alternatives_spanish:
  - salvaciones
  - liberaciones
  - actos de liberación
  lexicon: HALOT
  rationale: El plural hebreo sugiere obras repetidas de rescate. «Actos de salvación» mantiene ese plural y la resonancia teológica mejor que un plural desnudo como «salvaciones». «Liberaciones» sería posible, pero «salvación» preserva mejor el vínculo bíblico con el vocabulario de redención.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de la
  - dentro de
  lexicon: HALOT
  rationale: La preposición expresa ubicación central o intermedia. «En medio de» es la correspondencia natural en español y conserva la imagen espacial y poética.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «the earth», el hebreo אֶרֶץ puede abarcar «tierra», «país» o «tierra/territorio». En español, «la tierra» permite reflejar esa amplitud semántica sin decidir de forma demasiado restrictiva entre alcance global y regional.
theological_decisions:
- issue: Alcance de אֶרֶץ (cosmos o territorio)
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - el país
  rationale: El hebreo admite tanto un sentido amplio como uno local. Dado que el contexto puede leerse de forma universal o territorial, «la tierra» conserva la ambigüedad útil del original en español, evitando cerrar la referencia a un ámbito exclusivamente global o meramente local.
  doctrine_reference: Translation philosophy §3, §5
- issue: Título real aplicado a Dios
  english_pob_reading: my King
  chosen_spanish_reading: mi Rey
  alternative_spanish_readings:
  - mi rey
  rationale: La mayúscula en «Rey» ayuda a comunicar que no se trata de un monarca humano, sino del título soberano atribuido a Yahvé. Se preserva así la fuerza devocional y regia del hebreo sin sustituirla por lenguaje eclesiástico distinto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; no hubo modificaciones aplicadas. La versión española sigue el mismo perfil interpretativo, pero ajusta la última cláusula a «la tierra» para conservar la ambigüedad semántica de אֶרֶץ en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «Rey» con mayúscula para el título divino.
  - Se usa «salvación» en el sintagma pluralizado «actos de salvación» para reproducir el plural hebreo יְשׁוּעוֹת sin sonar artificial.
  - «En medio de la tierra» conserva la imagen espacial del hebreo בְּקֶרֶב הָאָרֶץ.
  - La nota al pie marca la alternativa semántica principal de אֶרֶץ sin sobrecargar el texto principal.
  - «Sin embargo» recoge mejor el valor adversativo del וֵ prefijado en este contexto que una coordinación simple.
