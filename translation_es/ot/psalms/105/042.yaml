translation:
  language: es
  text: Porque[a] recordó su santa palabra a Abraham su siervo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Pues recordó su santa palabra".
    reason: lexical_alternative
  - marker: b
    text: Aquí "palabra" tiene el sentido de una promesa hablada a Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón o explicación de la acción anterior. En español, 'Porque' expresa con naturalidad ese valor causal/explanatorio sin añadir contenido ajeno al hebreo.
- source_word: זָכַר
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - tuvo presente
  lexicon: HALOT
  rationale: '''Recordó'' conserva el sentido básico de זָכַר como traer a la memoria, y en el contexto salmódico puede implicar actuación conforme a lo recordado sin explicitarlo en la traducción principal.'
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - promesa
  - mensaje
  lexicon: HALOT
  rationale: '''Palabra'' reproduce el término hebreo de manera directa. Aunque el contexto remite a una promesa, el sustantivo hebreo es ''palabra''; la carga pactal queda sugerida por el contexto y se explica en nota si hace falta.'
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: su santa
  alternatives_spanish:
  - su sagrada
  lexicon: HALOT
  rationale: '''Santa'' es el equivalente más natural y bíblicamente estable de קָדֹשׁ/קֹדֶשׁ en español. Conserva el peso teológico sin volver la frase artificial.'
- source_word: אֶת אַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  - con Abraham
  lexicon: HALOT
  rationale: El hebreo no explicita una preposición en español, pero el sentido relacional es el de una palabra dirigida a Abraham. 'A Abraham' expresa de forma sobria esa relación sin sobretraducir.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: Aquí la referencia es a Abraham en relación de servicio/pacto con Dios. En español, 'siervo' comunica mejor ese registro bíblico y evita una dureza innecesaria que no está enfatizada en el contexto.
theological_decisions:
- issue: Sentido pactal de 'recordó'
  english_pob_reading: Retain 'remembered' rather than expanding to 'fulfilled his promise' in the main text.
  chosen_spanish_reading: Mantener 'recordó' en el texto principal, sin expandir a 'cumplió su promesa'.
  alternative_spanish_readings:
  - cumplió su promesa
  - recordó su promesa pactal
  rationale: El hebreo dice literalmente que recordó su santa palabra. Aunque el contexto es pactal, la expansión a 'cumplió' introduce una interpretación no explicitada por el verbo. El texto principal conserva la forma sobria, dejando que el contexto haga su trabajo.
  doctrine_reference: Philosophy 1, 3, and 6
- issue: Relación entre 'palabra santa' y Abraham
  english_pob_reading: Render as 'his holy word to Abraham his servant.'
  chosen_spanish_reading: '''su santa palabra a Abraham, su siervo''.'
  alternative_spanish_readings:
  - su santa promesa a Abraham, su siervo
  - su santa palabra, Abraham su siervo
  rationale: En español es necesario aclarar la relación entre la palabra y Abraham. 'A Abraham' comunica que la palabra le fue dirigida o dada, sin convertir 'palabra' en 'promesa' dentro del texto principal.
  doctrine_reference: Philosophy 1 and 5
translation_notes:
  revision_awareness: 'Alineado con el contexto de revisión más reciente: no se requirieron cambios sustanciales y se corrigió la necesidad de evitar marcadores de nota no anclados en el texto.'
  spanish_consistency_notes:
  - Se mantuvo el tono bíblico sobrio y la estructura breve del hebreo.
  - Se preservó 'palabra' en lugar de 'promesa' para no sobreinterpretar el sustantivo דְּבַר en el texto principal.
  - Se usó 'siervo' como equivalente contextual de עַבְדּוֹ, coherente con el perfil pactal de Abraham.
  - No se incluyeron notas al pie porque no eran necesarias para esta versión y así se evita cualquier marcador sin anclaje.
