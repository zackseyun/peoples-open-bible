    rationale: El hebreo enumera duraciones negadas; en español «No comerán ni un día, ni dos días...» puede leerse como objeto directo elíptico o resultar áspero. «No comerán por un día, ni por dos días...» expresa con claridad la duración excluida y corresponde mejor al sentido contextual y al inglés auditado («for one day»).
