translation:
  language: es
  text: Que se oiga un clamor desde sus casas, cuando tú traigas de repente sobre ellos una partida de saqueadores[a], porque han cavado una fosa para atraparme y han tendido trampas para mis pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tropa» o «una banda de asaltantes» para «una partida de saqueadores».
    reason: lexical_alternative
  - marker: b
    text: O «lazos para mis pies».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשָּׁמַע
  english_pob_choice: Let ... be heard
  chosen_spanish: Se oirá
  alternatives_spanish:
  - Que se oiga
  - Será oído
  lexicon: HALOT
  rationale: El nifal imperfecto expresa pasividad con fuerza exhortativa/jussiva en este contexto de plegaria. En español, «Se oirá» conserva esa fuerza sin volver la frase meramente predictiva.
- source_word: זְעָקָה
  english_pob_choice: a cry
  chosen_spanish: un clamor
  alternatives_spanish:
  - un grito
  - un alarido
  lexicon: HALOT
  rationale: El sustantivo denota un grito de angustia. «Clamor» mantiene el tono intenso y público del hebreo sin sonar demasiado moderno o coloquial.
- source_word: מִבָּתֵיהֶם
  english_pob_choice: from their houses
  chosen_spanish: desde sus casas
  alternatives_spanish:
  - desde sus hogares
  - de sus casas
  lexicon: HALOT
  rationale: «Desde» preserva la idea espacial de procedencia del sonido. «Casas» conserva la imagen concreta del texto.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en cuanto
  - al
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia en que se oirá el clamor; «cuando» refleja mejor la sintaxis y el flujo del español.
- source_word: תָבִיא
  english_pob_choice: you ... bring
  chosen_spanish: traigas
  alternatives_spanish:
  - hagas venir
  - lleves
  lexicon: HALOT
  rationale: El hifil de בוא puede ser «traer» o «hacer venir». «Traigas» es natural en español y mantiene a Dios como sujeto implícito del juicio.
- source_word: גְּדוּד
  english_pob_choice: a raiding band
  chosen_spanish: una banda de asalto
  alternatives_spanish:
  - una tropa
  - una banda de saqueadores
  lexicon: HALOT
  rationale: El término puede referirse a una tropa o incursión armada. «Banda de asalto» conserva la idea militar agresiva y la intención de ataque mejor que el genérico «tropa».
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  lexicon: HALOT
  rationale: Adverbio adverbial estándar; «de repente» es claro, idiomático y fiel.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: El segundo כִּי introduce la razón de la súplica. «Porque» expresa bien la conexión causal en español.
- source_word: כָרוּ
  english_pob_choice: they have dug
  chosen_spanish: han cavado
  alternatives_spanish:
  - cavaron
  - han excavado
  lexicon: HALOT
  rationale: El perfecto puede traducirse en presente perfecto para enlazar la acción concluida con la petición presente. «Cavado» conserva el acto de hacer una fosa.
- source_word: שיחה
  english_pob_choice: a pit
  chosen_spanish: una fosa
  alternatives_spanish:
  - un pozo
  - un hoyo
  lexicon: HALOT
  rationale: El sustantivo designa una cavidad usada para atrapar. «Fosa» comunica bien la idea de una trampa cavada sin forzar un tecnicismo.
- source_word: לְלָכְדֵנִי
  english_pob_choice: to capture me
  chosen_spanish: para atraparme
  alternatives_spanish:
  - para capturarme
  - para apresarme
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Atraparme» enlaza naturalmente con la imagen de la fosa y de las trampas.
- source_word: וּפַחִים
  english_pob_choice: and hidden traps
  chosen_spanish: y han tendido trampas
  alternatives_spanish:
  - y redes
  - y lazos
  lexicon: HALOT
  rationale: «פחים» son trampas o lazos; en español conviene integrar el verbo elíptico del contexto. «Tendido trampas» mantiene la acción implícita de colocarlas.
- source_word: טָמְנוּ
  english_pob_choice: hidden
  chosen_spanish: han tendido
  alternatives_spanish:
  - han ocultado
  - han escondido
  lexicon: HALOT
  rationale: El verbo significa esconder o ocultar algo preparado como emboscada. «Han tendido» expresa en español la colocación furtiva de trampas de manera natural.
- source_word: לְרַגְלָי
  english_pob_choice: for my feet
  chosen_spanish: para mis pies
  alternatives_spanish:
  - a mis pies
  - para mis pasos
  lexicon: HALOT
  rationale: La imagen corporal se conserva literalmente. «Pies» es la equivalencia más directa y clara en español.
theological_decisions:
- issue: Fuerza imprecatoria de la súplica
  english_pob_reading: Retain the petition as a direct appeal for judgment without softening its force.
  chosen_spanish_reading: Mantener la oración como una súplica directa de juicio, sin convertirla en mera predicción.
  alternative_spanish_readings:
  - Que se oirá un clamor...
  - Se oirá un clamor...
  rationale: El hebreo muestra una fuerza volitiva/jussiva en el marco de una oración de imprecación. En español, la formulación impersonal o pasiva permite conservar esa fuerza sin diluirla en un futuro descriptivo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto sigue de cerca el auditable English POB y su revisión sin cambios, manteniendo la misma decisión interpretativa sobre el tono imprecatorio y las principales equivalencias léxicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponde; aquí el versículo usa segunda persona implícita, sin necesidad de explicitarlo.
  - Se conserva el campo semántico de violencia/asalto en «banda de asalto» para גְּדוּד, evitando el genérico «tropa» salvo como alternativa.
  - Se preserva la imagen concreta de trampas para los pies, sin sustituirla por una paráfrasis abstracta.
