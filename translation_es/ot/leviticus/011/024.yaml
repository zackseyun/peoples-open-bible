translation:
  language: es
  text: 'Y por estas ustedes se volverán impuros: todo el que toque su cadáver[a][b] será impuro hasta la tarde.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y respecto de estas ustedes se volverán impuros». La frase inicial puede introducir la categoría siguiente de manera general, no solo instrumental.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente «su cadáver»: sustantivo singular con sufijo plural. En español también podría entenderse «sus cadáveres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאֵלֶּה
  english_pob_choice: And by these
  chosen_spanish: Y con estas cosas
  alternatives_spanish:
  - Y respecto de estas cosas
  - Y con estas
  - Y por medio de estas
  lexicon: HALOT
  rationale: La construcción con ו + לְ + demostrativo puede introducir la esfera o el medio de la impureza. En español, 'con estas cosas' comunica de modo natural que el contacto con estos animales implica impureza, sin forzar una preposición demasiado literal.
- source_word: תִּטַּמָּאוּ
  english_pob_choice: you shall become unclean
  chosen_spanish: se volverán impuros
  alternatives_spanish:
  - quedarán impuros
  - se impurificarán
  - serán hechos impuros
  lexicon: HALOT
  rationale: Tָמֵא aquí expresa impureza ritual, no culpa moral. 'Se volverán impuros' preserva el resultado del contacto y suena natural en español bíblico contemporáneo.
- source_word: כָּל הַנֹּגֵעַ
  english_pob_choice: everyone who touches
  chosen_spanish: todo el que toque
  alternatives_spanish:
  - quien toque
  - cada uno que toque
  - todo aquel que toque
  lexicon: HALOT
  rationale: El participio singular con כָּל tiene valor genérico. 'Todo el que toque' conserva el alcance universal y resulta idiomático en español.
- source_word: בְּנִבְלָתָם
  english_pob_choice: their carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su carroña
  - sus cadáveres
  - su cuerpo muerto
  lexicon: HALOT
  rationale: נְבֵלָה designa el cuerpo muerto de un animal; en este contexto de pureza, 'cadáver' es comprensible y digno en español, aunque 'carroña' sería más zoológico y menos publicable. Se mantiene el singular posesivo porque el hebreo tiene un sustantivo singular con sufijo plural.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  - estará impuro
  lexicon: HALOT
  rationale: La forma singular retoma al sujeto genérico. 'Será impuro' conserva el lenguaje ritual de טמא y evita cargar el término con connotaciones morales ajenas al pasaje.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta la noche
  - hasta el atardecer
  - hasta que caiga la tarde
  lexicon: HALOT
  rationale: '''Tarde'' es la opción más natural en español para el cierre del período ritual, sin perder la referencia temporal marcada por el hebreo. ''Atardecer'' sería posible, pero menos directo en este contexto legal.'
theological_decisions:
- issue: Impureza ritual vs. pecado moral
  english_pob_reading: Render טמא/unclean as ritual impurity language, not moral guilt
  chosen_spanish_reading: Traducir impuro/impureza como categoría ritual, no como condena moral
  alternative_spanish_readings:
  - inmundo
  - contaminado
  - defile
  rationale: El versículo trata de impureza cultual por contacto con cadáveres animales. 'Impuro' mantiene la categoría bíblica sin importar una acusación ética que el texto no formula.
  doctrine_reference: La santidad levítica distingue entre impureza ritual y culpa moral; la traducción debe preservar esa distinción.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión, que no introdujo cambios y mantuvo alto acuerdo con la propuesta inglesa auditada. Se conservan las dos tensiones léxicas relevantes: la apertura con לְאֵלֶּה y el singular hebreo con sufijo plural en נִבְלָתָם.'
  spanish_consistency_notes:
  - Se mantiene 'impuro' como término técnico para טמא en todo el versículo.
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el hebreo.
  - Se conserva un registro bíblico claro y moderno, sin caer en calcos rígidos.
  - El singular genérico 'todo el que toque' refleja la estructura hebrea de participio singular con valor universal.
