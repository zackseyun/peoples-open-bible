  to: Pondrá su mano sobre la cabeza de su ofrenda y la degollará a la entrada de la tienda de reunión[a]; y los hijos de Aarón, los sacerdotes, arrojarán la sangre contra el altar, todo alrededor[b].
  rationale: Se corrige el verbo principal de la aplicación de la sangre para reflejar fielmente זרק ('arrojar/lanzar') en vez de 'rociar', y se restituye la relación con el altar expresada por עַל־הַמִּזְבֵּחַ mediante 'contra el altar'. 'Todo alrededor' traduce naturalmente סביב y sigue la revisión final del POB inglés. Se mantiene el resto del texto, que ya era fiel y legible.
