    rationale: Aunque puede denotar vaciedad, en español bíblico y común «vanidad» suele asociarse fácilmente con engreimiento o vanagloria, lo que aquí puede desviar del sentido de habla vacía/falsa. «Vaciedades» o «falsedad» comunica mejor el campo semántico documentado.
  - severity: medium
    issue: «con corazón y corazón» es demasiado opaco
    rationale: La literalidad casi calcada no suena idiomática en español y puede no comunicar la duplicidad interior. El POB inglés ya documentó el valor idiomático; «con doble corazón» preserva mejor la imagen y el sentido.
  - severity: low
    issue: Nota b con formato poco natural
    rationale: La nota empieza con una comilla simple innecesaria y puede pulirse en español editorial.
