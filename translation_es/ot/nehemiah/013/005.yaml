review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido global del hebreo: Tobías recibe una gran estancia dentro del templo; allí antes se guardaban la ofrenda de cereal, el incienso, los utensilios, el diezmo de grano, mosto y aceite, la porción prescrita para levitas, cantores y porteros, y la contribución para los sacerdotes. También conserva adecuadamente el valor habitual de וְשָׁם הָיוּ לְפָנִים נֹתְנִים con «solían poner».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «cámara» suena poco natural en español bíblico general y puede evocar una cámara mecánica o política más que una estancia del templo. «Aposento» o «sala» sería más legible; dado el marco cultual y la nota existente, «un gran aposento» funciona mejor en el texto principal. Además, la colocación de notas [b][c] sobre «cantores» no ancla bien el problema real, que corresponde a toda la frase «la porción mandada para…».
  glossary_alignment: No hay conflictos con la terminología de proyecto. Las decisiones «ofrenda de cereal», «diezmo», «cantores», «porteros» y «contribución» son defendibles. «Incienso» para לְבוֹנָה es comprensible aunque menos específico que «olíbano»; no exige cambio. La principal mejora es estilística y de anclaje de notas, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: «gran cámara» es poco natural en español general para una estancia del templo
    rationale: Aunque puede ser calco léxico de chamber, en español eclesial amplio suena menos idiomático que «gran aposento». La nota ya preserva alternativas como «sala» y «almacén».
  - severity: medium
    issue: Las notas [b][c] están ancladas en «cantores» en vez de en la frase «la porción mandada…»
    rationale: El problema textual/lexical explicado por ambas notas corresponde a מִצְוַת הַלְוִיִּם וְהַמְשֹׁרְרִים וְהַשֹּׁעֲרִים, no específicamente a «cantores». El anclaje actual puede inducir a pensar que la nota trata solo de ese sustantivo.
  - severity: low
    issue: Se omite la alternativa inglesa sobre el matiz de costumbre pasada
    rationale: La nota inglesa [b] decía «Or 'there they used to put formerly,' expressing customary past practice». El español ya expresa bien esa idea en el texto con «solían poner», así que no es necesario añadir nota; solo conviene reconocer que no hace falta reproducirla.
  revised_spanish_text: 'Le hizo un gran aposento[a], donde antes solían poner la ofrenda de cereal, el incienso, los utensilios y el diezmo del grano, del mosto y del aceite: la porción mandada[b][c] para los levitas, los cantores y los porteros, y la contribución para los sacerdotes[d].'
  revised_footnotes:
