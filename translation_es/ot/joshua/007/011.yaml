    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota [a] habla de «han tomado de lo dedicado al anatema», pero en el texto está colocada tras «ha pecado». Esto desinforma al lector y rompe la disciplina requerida de anclar cada nota en la frase pertinente.
  - severity: high
    issue: Concordancia verbal incorrecta tras «Israel»
    rationale: El hebreo tiene sujeto singular «Israel» seguido de verbos plurales que expresan la culpa corporativa. «También ha transgredido» debería ser «también han transgredido» para reflejar el texto fuente y la decisión teológica documentada.
  - severity: medium
    issue: Falta nota para «sus pertenencias»
    rationale: La auditoría inglesa conserva una nota sobre el hebreo «entre sus vasos/artículos». El borrador español no preserva esta alternativa/documentación para בִכְלֵיהֶם, pese a que sí adopta la paráfrasis contextual «pertenencias».
  - severity: low
    issue: Comillas y redacción de la nota [a] mejorables
    rationale: La nota comienza con una comilla innecesaria y puede formularse con español más limpio y directo.
