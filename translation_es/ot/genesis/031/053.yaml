    text: Or, 'May the God of Abraham and the God of Nahor, the God of their father, judge between us.' The Hebrew can be read as identifying the same deity throughout; the translation preserves the ambiguity in the main text.
    reason: alternative_reading
  - marker: b
    text: '''The Fear of his father Isaac'' is an unusual title for God, literally using the noun ''fear'' or ''dread'' as a divine designation.'
    reason: lexical_alternative
  - marker: c
    text: Or '—the god of their father—'.
    reason: previous_rendering
