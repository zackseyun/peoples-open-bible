translation:
  language: es
  text: Y Judas y sus hermanos salieron[a], y pelearon contra los hijos de Esaú en la tierra del sur, y golpeó Hebrón y sus ciudades hijas[b]; derribó su fortaleza, y quemó sus torres por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los edomitas' (literalmente, 'los hijos de Esaú').
    reason: alternative_reading
  - marker: b
    text: '''Ciudades hijas'' es una expresión geográfica para asentamientos menores dependientes de una ciudad principal.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - salieron de allí
  lexicon: LSJ
  rationale: El griego presenta una salida narrativa simple; en español, 'salieron' conserva la naturalidad del movimiento inicial sin añadir matiz militar que el contexto ya aporta.
- source_word: ἐπολέμουν
  english_pob_choice: fought
  chosen_spanish: pelearon contra
  alternatives_spanish:
  - combatieron contra
  - estuvieron peleando contra
  lexicon: LSJ
  rationale: Para el aspecto imperfectivo, 'pelearon contra' comunica acción bélica sin volver la frase artificiosamente literal. Mantiene el sentido narrativo aceptado por la POB inglesa.
- source_word: τοὺς υἱοὺς Ἠσαῦ
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  - los edomitas
  lexicon: LSJ
  rationale: Se conserva la expresión literal del griego para mantener la resonancia bíblica e intertextual. 'Edomitas' sería una interpretación etnónima válida, pero menos cercana al texto fuente.
- source_word: ἐν τῇ γῇ τῇ πρὸς νότον
  english_pob_choice: in the land to the south
  chosen_spanish: en la tierra del sur
  alternatives_spanish:
  - en la región del sur
  - en el Negev
  lexicon: LSJ
  rationale: '''La tierra del sur'' reproduce de forma clara y natural la orientación geográfica del griego. ''Negev'' sería más específico, pero el texto griego no usa un topónimo aquí.'
- source_word: ἐπάταξεν
  english_pob_choice: he struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  - derrotó
  lexicon: LSJ
  rationale: El verbo griego permite un golpe militar amplio. 'Golpeó' conserva la fuerza básica sin precisar más de lo que dice el original; el sujeto singular se mantiene como en la POB inglesa, donde Judas queda en primer plano.
- source_word: τὴν Χεβρὼν
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: LSJ
  rationale: Se usa la forma castellana habitual del topónimo, plenamente reconocible y fiel al nombre propio griego.
- source_word: τὰς θυγατέρας αὐτῆς
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus poblados dependientes
  - sus aldeas dependientes
  lexicon: LSJ
  rationale: Se conserva la metáfora geográfica 'hijas', pero en una construcción natural en español. 'Ciudades hijas' retiene el patrón idiomático mejor que una paráfrasis interpretativa, aunque ambas opciones siguen siendo posibles.
- source_word: καθεῖλεν
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - demolió
  - echó abajo
  lexicon: LSJ
  rationale: '''Derribó'' es una equivalencia sobria y precisa para la acción de destruir una estructura fortificada. Evita un registro demasiado técnico o demasiado coloquial.'
- source_word: τὸ ὀχύρωμα αὐτῆς
  english_pob_choice: its fortress
  chosen_spanish: su fortaleza
  alternatives_spanish:
  - su fortín
  - su fortificación
  lexicon: LSJ
  rationale: '''Fortaleza'' comunica el valor defensivo del término con naturalidad en español. ''Fortificación'' es posible, pero menos concreto; ''fortín'' sería demasiado pequeño o moderno.'
- source_word: ἐνεπύρισεν κυκλόθεν
  english_pob_choice: he burned ... all around
  chosen_spanish: quemó ... por todos lados
  alternatives_spanish:
  - incendió ... alrededor
  - lo quemó ... en derredor
  lexicon: LSJ
  rationale: La expresión reproduce tanto el verbo de quemar como la idea distributiva de κυκλόθεν. 'Por todos lados' es una solución idiomática clara para el español moderno.
theological_decisions:
- issue: Expresión literal versus etnónimo interpretativo en τοὺς υἱοὺς Ἠσαῦ
  english_pob_reading: the sons of Esau
  chosen_spanish_reading: los hijos de Esaú
  alternative_spanish_readings:
  - los edomitas
  - los descendientes de Esaú
  rationale: Se preserva la formulación genealógica del griego para no borrar la referencia bíblica a Esaú y su carga histórica. La lectura etnónima ('edomitas') es válida como interpretación, pero se reserva como alternativa porque el texto fuente no la explicita.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se registran revisiones sustantivas en la última pasada, y la presente versión sigue esa lectura estable con ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva 'los hijos de Esaú' para sostener la intertextualidad bíblica, en paralelo con la decisión auditada en inglés.
  - '''Ciudades hijas'' mantiene la metáfora geográfica del original y de la POB inglesa, evitando sustituirla por una paráfrasis que pierda la imagen.'
