translation:
  language: es
  text: Y he aquí[a], las naciones se han reunido contra nosotros para destruirnos; tú sabes lo que maquinan[b] contra nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira». El griego ἰδοὺ puede introducir una exclamación de atención; «he aquí» conserva el tono solemne.
    reason: lexical_alternative
  - marker: b
    text: O «lo que están ideando contra nosotros». λογίζονται puede expresar cálculo o plan hostil; aquí se traduce como una intención deliberada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - véase
  lexicon: LSJ
  rationale: «ἰδοὺ» introduce una llamada de atención solemne y urgente. «He aquí» conserva ese valor deíctico y el tono orante mejor que una simple glosa moderna.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: En este contexto bélico, el griego nombra a los pueblos/naciones enemigas de Israel. «Las naciones» sigue de cerca el original sin cargar el término con un uso técnico eclesiástico de «gentiles».
- source_word: συνῆκται
  english_pob_choice: have gathered
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se han congregado
  - se han juntado
  lexicon: LSJ
  rationale: El perfecto expresa un estado presente resultante de la reunión. «Se han reunido» transmite bien esa idea en español y suena natural en un lamento de guerra.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - encima de nosotros
  lexicon: LSJ
  rationale: En un contexto hostil, la relación adversativa es clara; «contra nosotros» comunica mejor la intención agresiva que un literal «sobre nosotros».
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  english_pob_choice: to destroy us
  chosen_spanish: para destruirnos
  alternatives_spanish:
  - para exterminarnos
  - para borrarnos
  lexicon: LSJ
  rationale: El infinitivo expresa propósito. «Destruirnos» mantiene el sentido de eliminación violenta de forma formal y fiel, acorde con la revisión inglesa más reciente.
- source_word: ἃ λογίζονται
  english_pob_choice: what they are planning
  chosen_spanish: lo que maquinan
  alternatives_spanish:
  - lo que planean
  - lo que traman
  lexicon: LSJ
  rationale: «λογίζονται» aquí implica cálculo/intención hostil. «Maquinar» recoge esa idea de designio malicioso sin debilitarla, y en español conserva mejor la carga negativa que un neutro «piensan».
theological_decisions:
- issue: Alcance de τὰ ἔθνη en una súplica de guerra judía
  english_pob_reading: Rendered as 'the nations' rather than 'the Gentiles'
  chosen_spanish_reading: «las naciones» en lugar de «los gentiles»
  alternative_spanish_readings:
  - los gentiles
  - los pueblos
  rationale: El pasaje describe una amenaza militar concreta, no una categoría teológica posterior. «Las naciones» preserva el valor político-étnico del griego y evita importar un matiz confesional que el contexto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy over translation tradition
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «destroy us» por ser más formal y más cercana al verbo griego que una opción más coloquial. En español se reflejó con «destruirnos» y no con un equivalente más idiomático pero menos directo.
  spanish_consistency_notes:
  - Se mantuvo «las naciones» para conservar la misma opción terminológica del audit trail inglés.
  - Se prefirió «he aquí» por su equivalencia funcional con el inglés «behold» en un contexto de súplica.
  - No se usó «Señor» porque el versículo no contiene el nombre divino ni una sustitución de κύριος.
