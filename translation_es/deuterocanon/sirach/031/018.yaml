translation:
  language: es
  text: Conoce a tu prójimo como a ti mismo[b], y en todo lo que aborreces[c], considera bien[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego ofrecido aquí difiere sustancialmente del hebreo, con un sentido aproximado de «¿A quién atiende? ¿Y cuál es su apoyo?». Esta traducción sigue el testimonio hebreo conservado como fuente principal en este versículo.
    reason: textual_variant
  - marker: b
    text: O «como a tu propia alma». נפש puede significar «alma», «vida» o «yo mismo».
    reason: lexical_alternative
  - marker: c
    text: La cláusula final también puede entenderse como «y considera cuidadosamente todo lo que aborreces», expresando una prueba ética basada en lo que uno no querría que le hicieran a sí mismo.
    reason: alternative_reading
lexical_decisions:
- source_word: דעה
  english_pob_choice: Know
  chosen_spanish: Conoce
  alternatives_spanish:
  - Ten presente
  - Reconoce
  - Comprende
  lexicon: HALOT
  rationale: El imperativo de ידע expresa aquí un llamado ético a reconocer con atención al otro, no solo a poseer información. «Conoce» conserva la fuerza directa y la cercanía semántica del POB inglés «Know» sin volverlo demasiado abstracto.
- source_word: רעך
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu compañero
  - a tu semejante
  lexicon: HALOT
  rationale: רע designa a la persona cercana en el ámbito social y moral. «Prójimo» es la forma española más estable para ese alcance ético, y evita restringir el término a mera vecindad física.
- source_word: כנפשך
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a tu propia alma
  - como a tu propia vida
  - como a ti mismo mismo
  lexicon: HALOT
  rationale: נפש puede abarcar «vida», «alma» o «yo mismo». En español, la equivalencia idiomática más natural y fiel es «como a ti mismo», que mantiene la comparación reflexiva sin perder la fuerza antropológica.
- source_word: ובכל
  english_pob_choice: and in everything
  chosen_spanish: y en todo lo que
  alternatives_spanish:
  - y en toda cosa que
  - y en cualquier cosa que
  - y respecto de todo lo que
  lexicon: HALOT
  rationale: La frase distributiva introduce el alcance general de la segunda exhortación. «Y en todo lo que» reproduce bien la amplitud de la construcción hebrea y prepara el complemento relativo siguiente.
- source_word: ששנאת
  english_pob_choice: you hate
  chosen_spanish: aborreces
  alternatives_spanish:
  - odias
  - detestas
  - te desagrada
  lexicon: HALOT
  rationale: La referencia es a lo que resulta odiado o aborrecido por el destinatario. «Aborreces» mantiene una intensidad ética clara y suena natural en registro bíblico sin suavizar el término.
- source_word: התבונן
  english_pob_choice: be considerate
  chosen_spanish: sé considerado
  alternatives_spanish:
  - considera
  - reflexiona
  - piensa cuidadosamente
  lexicon: HALOT
  rationale: El verbo imperativo pide atención reflexiva y conducta prudente. «Sé considerado» expresa en español la disposición moral y práctica que el contexto exige, y corresponde bien al matiz adoptado en el POB inglés.
theological_decisions:
- issue: La frase ética no armoniza con la forma más conocida «ama a tu prójimo como a ti mismo»
  english_pob_reading: Retain the Hebrew's wording 'Know your neighbor as yourself' without harmonizing to 'love.'
  chosen_spanish_reading: Mantener «Conoce a tu prójimo como a ti mismo» sin convertirlo en «ama».
  alternative_spanish_readings:
  - Ama a tu prójimo como a ti mismo
  - Quiere a tu prójimo como a ti mismo
  rationale: El testimonio hebreo disponible usa lenguaje de conocimiento/atención, no de amor explícito. La traducción conserva esa tensión textual y no la resuelve hacia la formulación más familiar de la tradición bíblica.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension rather than harmonize it.'
- issue: Divergencia importante entre el hebreo conservado y el paralelo griego suministrado
  english_pob_reading: The Greek parallel differs substantially and is used as a control witness only, not followed in the main text.
  chosen_spanish_reading: Seguir el hebreo como base principal y documentar la divergencia griega en nota.
  alternative_spanish_readings:
  - 'Seguir el griego: «¿A quién atiende? ¿Y cuál es su apoyo?»'
  - Combinar ambos testigos en una redacción mixta
  rationale: Dado que el hebreo está presente como testimonio principal y el griego diverge de manera fuerte, la traducción debe reflejar el texto hebreo sin fusionarlo artificialmente con una forma distinta.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la primera exhortación hacia «Know» y la segunda hacia una formulación más natural de התבונן. La redacción española conserva esa decisión: «Conoce» para ידע y «sé considerado» para un imperativo reflexivo y prudente, sin volver a una armonización tradicional con «ama».'
  spanish_consistency_notes:
  - Se mantuvo «prójimo» para רעך por coherencia con el registro bíblico español y porque expresa mejor la relación ética que «vecino».
  - Se evitó «SEÑOR» o cualquier sustitución irrelevante, ya que el verso no contiene el Tetragrámaton.
  - «Conoce» se eligió por fidelidad al valor directivo del imperativo hebreo y por su correspondencia con el cierre auditado del POB inglés.
  - Las notas con letras se anclan exactamente en el texto donde aparece la ambigüedad o variante textual.
