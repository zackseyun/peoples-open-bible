  revision_rationale: Se ajusta el primer verbo para reflejar mejor el patrón repetido de יָצָא en descripciones de fronteras, se acerca el topónimo שִׁכְּרוֹנָה a la forma fuente documentada, y se suaviza la apertura para reproducir mejor la coordinación narrativa hebrea sin afectar la claridad del español.
