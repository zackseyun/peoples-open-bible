  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «habló», אֶל = «a», מֹשֶׁה = «Moisés», לֵאמֹר = «diciendo». También preserva correctamente יְהוָה como «Yahvé» en el texto principal, en línea con la política del proyecto.'
  spanish_quality_summary: 'El texto español es claro, natural y digno. La única corrección necesaria está en la nota al pie: actualmente dice como alternativa «Yahvé», que duplica la forma ya usada en el texto principal y no corresponde al modelo inglés, donde la alternativa es «Yahweh» o «Jehovah». En español conviene indicar «Yahweh» como forma transliterada alternativa y «Jehová» como forma tradicional alternativa.'
  glossary_alignment: 'Alineación general correcta con el glosario del proyecto: יְהוָה → «Yahvé» en el texto principal; no se enmascara como «SEÑOR». No hay conflictos terminológicos adicionales en este versículo formulario.'
  issues:
