translation:
  language: es
  text: Ciertamente, en vano he mantenido puro mi corazón[a], y lavé mis manos en inocencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por nada» en lugar de «en vano».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lavé mis manos en inocencia/limpieza», una imagen de inocencia moral más que de un lavado meramente físico.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: ¡Ciertamente
  alternatives_spanish:
  - Solo
  - En verdad
  - Seguramente
  lexicon: HALOT
  rationale: אַךְ funciona aquí como partícula enfática que introduce la conclusión del salmista. «Ciertamente» conserva la fuerza asertiva sin volver restrictivo el sentido, como lo haría «solo».
- source_word: רִיק
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - por nada
  - sin resultado
  - vacíamente
  lexicon: HALOT
  rationale: El sustantivo/adverbio expresa inutilidad o falta de resultado. «En vano» es una equivalencia natural en español y conserva el tono de lamento.
- source_word: זִכִּיתִי
  english_pob_choice: I have kept ... pure
  chosen_spanish: he mantenido puro
  alternatives_spanish:
  - he purificado
  - he limpiado
  - he guardado limpio
  lexicon: HALOT
  rationale: Con «mi corazón» como objeto, el verbo comunica mantenerlo limpio/puro en sentido moral. «He mantenido puro» evita una traducción demasiado ritual o mecánica y preserva el valor perfecto con relevancia actual.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: לֵבָב designa el centro interno de la persona, especialmente su dimensión moral y volitiva. «Corazón» es el equivalente transparente y fiel en español bíblico contemporáneo.
- source_word: וָאֶרְחַץ
  english_pob_choice: and washed
  chosen_spanish: y he lavado
  alternatives_spanish:
  - y lavé
  - y me he lavado
  - y lavé mis manos
  lexicon: HALOT
  rationale: El verbo רחץ significa «lavar». En paralelo con la primera cláusula, el perfecto español con «he lavado» mantiene la conexión con la acción ya considerada y su efecto vigente.
- source_word: בְּנִקָּיוֹן
  english_pob_choice: in innocence
  chosen_spanish: en inocencia
  alternatives_spanish:
  - en pureza
  - con inocencia
  - en limpieza
  lexicon: HALOT
  rationale: נִקָּיוֹן denota limpieza/innocencia, con fuerza moral en este contexto. «En inocencia» preserva la imagen ética de lavarse las manos, no solo una limpieza material o ceremonial.
- source_word: כַּפָּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  - mis manos abiertas
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «mis palmas», en español la expresión estable y natural es «mis manos». Conserva además el eco bíblico de la imagen de inocencia.
theological_decisions:
- issue: Imagen de pureza moral frente a limpieza ritual
  english_pob_reading: The verse uses ritual-washing imagery metaphorically for moral innocence/purity.
  chosen_spanish_reading: El versículo usa la imagen de lavarse para expresar inocencia y pureza moral.
  alternative_spanish_readings:
  - Principalmente lenguaje de pureza ritual sin énfasis moral fuerte
  - Una referencia exclusivamente ceremonial
  rationale: La pareja «corazón»/«manos» y el contexto de lamento apuntan a una limpieza ética de la vida interior y exterior. La traducción mantiene la metáfora sin convertirla en una afirmación doctrinal más estrecha de lo que el texto exige.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'El texto coincide con el análisis auditado del inglés POB y no requiere revisión adicional; se mantiene la misma lectura básica: el salmista lamenta la aparente inutilidad de su pureza moral.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Corazón» conserva el centro moral y volitivo del hebreo לֵבָב.
  - «Inocencia» mantiene la fuerza ética de נִקָּיוֹן sin reducirla a limpieza física.
  - El orden poético español respeta el paralelismo de dos miembros con énfasis inicial.
