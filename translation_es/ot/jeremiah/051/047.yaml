revisions:
- from: Por tanto, he aquí, vienen días en que castigaré las imágenes talladas de Babilonia, y toda su tierra será avergonzada[c], y todos sus muertos caerán en medio de ella.
  to: Por tanto[a], he aquí, vienen días en que castigaré las imágenes talladas[b] de Babilonia, y toda su tierra será avergonzada[c], y todos sus caídos caerán en medio de ella.
  rationale: 'Se revisa para alinear mejor el español con el hebreo y con el audit trail inglés: se cambia «muertos» por «caídos» para reflejar חֲלָלֶיהָ con mayor precisión contextual, y se restauran en español las notas léxicas significativas documentadas para «castigaré» y «imágenes talladas». Se mantiene «he aquí», la personificación femenina y «será avergonzada» como una opción fiel y suficientemente natural.'
  reviewer_model: gpt-5.4
