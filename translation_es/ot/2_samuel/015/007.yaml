revisions:
- from: 'Y sucedió que al cabo de cuarenta años[a], Absalón dijo al rey: «Déjame ir, por favor, y cumplir el voto que hice a Yahvé en Hebrón».'
  to: 'Y sucedió que al cabo de cuarenta años[a], Absalón dijo al rey: «Permíteme ir, por favor, y cumplir el voto que le hice a Yahvé en Hebrón».'
  rationale: Se ajusta el registro de la petición a uno más cortés y adecuado al contexto («Permíteme ir»). También se revisa la cláusula del voto para reflejar mejor la relación verbal implícita en el hebreo sin caer en un calco torpe; aunque el español no reproduce elegantemente «el voto que voté», «el voto que le hice a Yahvé» conserva mejor la fuerza de compromiso dirigido a Yahvé que «el voto que hice».
