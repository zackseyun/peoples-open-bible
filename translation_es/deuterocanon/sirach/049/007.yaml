translation:
  language: es
  text: para arrancar de raíz, derribar, destruir[a], derrocar[b]; y asimismo para edificar, plantar y levantar en alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo termina con un verbo positivo adicional que probablemente significa 'levantar en alto', 'poner en alto' o 'hacer seguro'. El paralelo griego es más breve aquí y termina con 'edificar y plantar'.
    reason: textual_variant
  - marker: b
    text: Esta línea evoca deliberadamente la comisión profética de Jeremías 1:10, aunque la redacción hebrea de Sirácides no es idéntica.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκάκωσαν γὰρ αὐτόν / לנתוש
  english_pob_choice: to uproot
  chosen_spanish: arrancar
  alternatives_spanish:
  - desarraigar
  - arrancar de raíz
  lexicon: HALOT
  rationale: El verbo inicial de juicio expresa la imagen de sacar algo desde la raíz. 'Arrancar' suena natural en español y conserva la fuerza concreta de 'uproot' sin volverse pesado.
- source_word: לנתוץ
  english_pob_choice: to tear down
  chosen_spanish: destruir
  alternatives_spanish:
  - derribar
  - demoler
  lexicon: HALOT
  rationale: Aunque el hebreo distingue varios verbos de ruina, en español 'destruir' funciona bien en la serie y evita una repetición mecánica. El matiz de derribo queda incluido en el contexto de la secuencia.
- source_word: ולהאביד
  english_pob_choice: to destroy
  chosen_spanish: arruinar
  alternatives_spanish:
  - destruir
  - hacer perecer
  - aniquilar
  lexicon: HALOT
  rationale: Aquí el hebreo intensifica el daño causado. 'Arruinar' mantiene el campo semántico de ruina sin duplicar exactamente el verbo anterior, y suena natural en una cadena profética.
- source_word: להרוס
  english_pob_choice: to overthrow
  chosen_spanish: destruir
  alternatives_spanish:
  - derribar
  - volcar
  - arrasar
  lexicon: HALOT
  rationale: El hebreo añade otro verbo de demolición/ruina. En español, repetir 'destruir' o alternar con 'derribar' sería posible; se eligió 'destruir' en la primera mitad y 'arruinar' para mantener fluidez sin perder el peso acumulativo.
- source_word: וכן
  english_pob_choice: and likewise
  chosen_spanish: y asimismo
  alternatives_spanish:
  - y de igual modo
  - y así también
  lexicon: HALOT
  rationale: La partícula marca simetría entre la comisión negativa y la positiva. 'Y asimismo' preserva el paralelismo solemne del texto.
- source_word: לבנות
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: HALOT
  rationale: '''Edificar'' conserva mejor el registro bíblico sin sonar arcaico en exceso, y corresponde bien al verbo de restauración profética.'
- source_word: לנטע
  english_pob_choice: to plant
  chosen_spanish: plantar
  alternatives_spanish:
  - sembrar
  lexicon: HALOT
  rationale: '''Plantar'' es la equivalencia directa y mantiene el par clásico con ''edificar''.'
- source_word: ולהשגיב
  english_pob_choice: to raise high
  chosen_spanish: levantar en alto
  alternatives_spanish:
  - exaltar
  - poner en alto
  - hacer seguro
  lexicon: HALOT
  rationale: El hebreo final es más abierto que la versión griega más breve. 'Levantar en alto' conserva la idea de elevación/protección sin fijar demasiado un solo matiz, y permite reconocer la diferencia textual con el paralelo griego.
theological_decisions:
- issue: Eco de la comisión profética de Jeremías 1:10
  english_pob_reading: Preserve the sequence of infinitives in a way that clearly echoes Jeremiah 1:10 while following the extant Hebrew wording of Sirach.
  chosen_spanish_reading: Mantener la cadencia de verbos infinitivos que recuerda claramente a Jeremías 1:10, sin forzar una cita exacta que el hebreo de Sirácides no repite palabra por palabra.
  alternative_spanish_readings:
  - Ajustar la frase para acercarla más literalmente a Jeremías
  - Suprimir el eco intertextual para hacerla más genérica
  rationale: La secuencia verbal de Sirácides está deliberadamente alineada con el lenguaje de la vocación profética. El español debe conservar esa resonancia intertextual, pero respetando la forma concreta del testimonio hebreo y la variación respecto de Jeremías.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Variación textual en el último verbo entre hebreo y griego
  english_pob_reading: Include the Hebrew final verb as 'to raise high' in the main text, with the Greek shorter form noted in a footnote.
  chosen_spanish_reading: Incluir el último verbo hebreo en el texto principal como 'levantar en alto', señalando en nota que el paralelo griego es más breve.
  alternative_spanish_readings:
  - Omitir el último verbo para seguir al griego
  - Traducirlo de manera más específica como 'hacer seguro'
  rationale: El testimonio hebreo conservado recibe prioridad para el texto base de Sirácides. A la vez, la diferencia con la tradición griega merece quedar visible para no borrar la tensión documental.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el testimonio hebreo conservado, pero mantiene visible la diferencia con el paralelo griego y con el eco de Jeremías. No se requieren cambios respecto del pase de revisión más reciente.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Se evitó 'Mesías'/'Cristo' porque el pasaje trata de un profeta, no del título mesiánico.
  - 'Se mantuvo un registro bíblico claro y moderno: ''edificar'', ''plantar'', ''levantar en alto''.'
  - La serie de verbos destructivos se conservó con variedad controlada para no sonar mecánica en español, pero sin perder el paralelismo semítico.
