  - severity: medium
    issue: Uso de «se come» con sujeto inanimado
    rationale: Con «cuello» era especialmente extraño; con «garganta» sigue siendo mejor el verbo simple «come», que reproduce la personificación proverbial sin reflexivo innecesario.
  - severity: medium
