translation:
  language: es
  text: 'Entonces Josué hijo de Nun llamó a los sacerdotes y les dijo: «Lleven el arca del pacto, y siete sacerdotes llevarán siete trompetas de cuerno de carnero[a] delante del arca de Yahvé[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete trompetas de cuernos de carnero».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el arca de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo narrativo de llamada directa se expresa naturalmente como «llamó»; conserva el valor de convocar a los sacerdotes sin cargarlo con una fuerza mayor que la del contexto.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  - Josué el hijo de Nun
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma española usual y la relación filial de manera directa y clara.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes cultuales
  - los ministros
  lexicon: HALOT
  rationale: En este contexto cultual, «sacerdotes» es el equivalente normal y transparente en español.
- source_word: שְׂאוּ
  english_pob_choice: Carry
  chosen_spanish: Lleven
  alternatives_spanish:
  - Carguen
  - Levanten
  lexicon: HALOT
  rationale: El imperativo plural en español se vierte mejor con «Lleven» para expresar la orden de transportar el arca; «cargar» puede sonar más pesado o ambiguo aquí.
- source_word: אֲרוֹן הַבְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca del convenio
  - el arca de la alianza
  lexicon: HALOT
  rationale: Se conserva la fórmula bíblica «arca del pacto», que refleja fielmente el constructo hebreo y mantiene el término técnico ya auditable en español.
- source_word: וְשִׁבְעָה כֹהֲנִים יִשְׂאוּ
  english_pob_choice: and let seven priests carry
  chosen_spanish: y siete sacerdotes llevarán
  alternatives_spanish:
  - y que siete sacerdotes lleven
  - y siete sacerdotes habrán de llevar
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como instrucción dentro del discurso directo; en español, el futuro simple comunica con naturalidad la orden/mandato previsto sin perder la fuerza directiva.
- source_word: שִׁבְעָה שׁוֹפְרוֹת יוֹבְלִים
  english_pob_choice: seven ram’s-horn trumpets
  chosen_spanish: siete trompetas de cuerno de carnero
  alternatives_spanish:
  - siete cuernos de carnero
  - siete trompetas de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno usado como trompeta; «trompetas de cuerno de carnero» conserva la función sonora y la clase de instrumento sin forzar el término técnico «júbilo/jubileo» de יוֹבְלִים.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en frente de
  lexicon: HALOT
  rationale: «Delante de» es la opción más natural en español para una procesión o disposición espacial inmediata.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de una sustitución por «SEÑOR».'
theological_decisions:
- issue: Traducción del nombre divino YHWH en el arca
  english_pob_reading: the ark of Yahweh
  chosen_spanish_reading: el arca de Yahvé
  alternative_spanish_readings:
  - el arca del SEÑOR
  - el arca de Yahweh
  rationale: El hebreo menciona explícitamente el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre divino como «Yahvé» para no ocultar el nombre del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del imperfecto en la orden a siete sacerdotes
  english_pob_reading: and let seven priests carry
  chosen_spanish_reading: y siete sacerdotes llevarán
  alternative_spanish_readings:
  - y que siete sacerdotes lleven
  - y siete sacerdotes han de llevar
  rationale: El hebreo usa imperfecto en una instrucción coordinada con un imperativo. En español, el futuro simple mantiene la dimensión directiva sin convertirla en mera predicción.
  doctrine_reference: Sintaxis narrativa hebrea en discurso directo
translation_notes:
  revision_awareness: La revisión auditada más reciente indicó que no eran necesarios cambios respecto del texto base. Esta versión sigue esa estabilidad, adaptando únicamente la formulación al español objetivo y al estándar del proyecto para YHWH.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se evitó «Cristo» o terminología cristiana no presente en el versículo.
  - «Arca del pacto» mantiene la fórmula técnica bíblica y la correspondencia con el hebreo.
  - «Lleven» y «llevarán» preservan la fuerza directiva del discurso.
  - Se mantuvo el paralelo numérico «siete... siete...» como en el hebreo.
