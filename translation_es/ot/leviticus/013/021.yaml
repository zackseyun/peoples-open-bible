  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido básico del hebreo: condición contrastiva, inspección sacerdotal, ausencia de pelo blanco, lesión no más hundida que la piel, reclusión del examinado por siete días. También preserva correctamente que el pronombre final se refiere a la persona, no a la lesión. Sin embargo, «oscura» para כֵהָה no refleja con suficiente precisión la idea de aspecto apagado/débil/difuso; en español puede sugerir color oscuro más que atenuación visual.'
  spanish_quality_summary: El español es claro y digno. «La examina», «no está más hundida que la piel» y «lo aislará» son naturales. La fórmula «y he aquí que» es aceptable en registro bíblico. El ajuste principal es reemplazar «está oscura» por una opción más fiel y natural para una marca de aspecto atenuado, como «está tenue».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones principales son coherentes con el audit trail inglés. La nota sobre «aislará» / «pondrá en cuarentena» está bien alineada con la rationale documentada. La nota sobre «la examina» también es apropiada.
  issues:
  - severity: medium
    issue: «oscura» para וְהִיא כֵהָה
    rationale: El hebreo כֵהָה en este contexto dermatológico describe una apariencia apagada, débil o tenue, no necesariamente de color oscuro. «Oscura» desplaza el sentido hacia coloración y puede inducir una lectura clínica distinta.
  - severity: low
    issue: Conector «sino que» tras una serie coordinada
    rationale: 'No es incorrecto, pero con el ajuste léxico conviene mantener una coordinación más fluida en español formal: «y está tenue» o «pero está tenue». Esto evita que suene como una corrección lógica demasiado fuerte.'
  revised_spanish_text: Pero si el sacerdote la examina[a], y he aquí que no hay en ella pelo blanco, y no está más hundida que la piel, y está tenue, entonces el sacerdote lo aislará[b] por siete días.
  revised_footnotes:
