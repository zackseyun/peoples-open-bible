revisions:
- from: 'Josué les dijo[a]: «Si eres un pueblo numeroso, sube al monte[b] y despeja allí terreno para ti[c], en la tierra de los perizitas y de los refaítas; porque el monte de Efraín es demasiado estrecho para ti».'
  to: 'Josué les dijo: «Si eres un pueblo numeroso, sube al bosque[a] y despeja allí terreno para ti, en la tierra de los perizitas y de los refaítas; porque la región montañosa de Efraín[b] es demasiado estrecha para ti».'
  rationale: 'Se corrigen las dos decisiones léxicas principales para ajustarlas al hebreo y al rastro de auditoría inglés: «bosque» para הַיַּעְרָה y «región montañosa de Efraín» para הַר אֶפְרָיִם. Se elimina una nota [a] innecesaria y se conservan solo notas útiles y correctamente ancladas. El resto del versículo puede mantenerse con cambios mínimos.'
