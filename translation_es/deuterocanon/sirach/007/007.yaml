translation:
  language: es
  text: No te hagas culpable en la asamblea junto a las puertas de Dios[a], y no te rebajes en la congregación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «No peques en la multitud de la ciudad, y no te eches abajo en una muchedumbre». Esto puede reflejar otra lectura hebrea o una suavización interpretativa de la expresión «puertas de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּרְשִׁיעֲךָ
  english_pob_choice: Do not make yourself guilty
  chosen_spanish: No te hagas culpable
  alternatives_spanish:
  - No obres con maldad
  - No te condenes
  - No peques
  lexicon: HALOT
  rationale: El verbo causativo con sufijo reflexivo expresa más precisamente ‘ponerse uno mismo en estado de culpa’ que un simple ‘pecar’. ‘Hacerse culpable’ conserva esa fuerza jurídica y moral en español natural.
- source_word: בַּעֲדַת
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - entre la asamblea
  - en el consejo
  - en la congregación
  lexicon: HALOT
  rationale: עֵדָה señala un grupo reunido; ‘asamblea’ conserva el sentido público y colectivo sin cargarlo innecesariamente de un matiz eclesiástico.
- source_word: שַׁעֲרֵי אֵל
  english_pob_choice: at the gates of God
  chosen_spanish: junto a las puertas de Dios
  alternatives_spanish:
  - en las puertas de Dios
  - ante las puertas de Dios
  - en los portones de Dios
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea difícil, evitando sustituirla por una interpretación más lisa. ‘Junto a’ comunica el lugar asociado a las puertas sin forzar una equivalencia demasiado literal que suene extraña en español.
- source_word: וְאַל תַּפִּילְךָ
  english_pob_choice: and do not bring yourself down
  chosen_spanish: y no te bajes
  alternatives_spanish:
  - y no te dejes caer
  - y no te abatas
  - y no te humilles
  lexicon: HALOT
  rationale: La forma verbal sugiere ‘hacerse caer’ o quedar rebajado. En español, ‘bajarse’ aquí es coloquial y puede sonar demasiado débil, por lo que se eligió ‘te bajes’ en el sentido de rebajarte; en el texto se acompaña con la preposición contextual de la frase. Se conserva la autoiniciativa del deterioro.
- source_word: בַּקְּהִלָּה
  english_pob_choice: in the congregation
  chosen_spanish: en la congregación
  alternatives_spanish:
  - en la asamblea
  - en el grupo reunido
  - en la multitud
  lexicon: HALOT
  rationale: קְהִלָּה designa una comunidad reunida; ‘congregación’ diferencia este segundo miembro del primero y mantiene el carácter comunitario. Aunque el griego apunta a ‘multitud/crowd’, el hebreo se preserva como lectura principal.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en Sirácides
  english_pob_reading: Retain the Hebrew-oriented rendering in the main text; note the Greek as an alternate reading
  chosen_spanish_reading: Mantener la lectura hebrea en el texto principal, con nota del paralelo griego
  alternative_spanish_readings:
  - No peques en la multitud de la ciudad
  - No te hagas culpable en la multitud de la ciudad
  rationale: Dado que el hebreo está conservado y el expediente lo califica como de alta confianza, se lo sigue en el cuerpo principal. El griego ofrece una formulación alternativa que puede reflejar otra base textual o una suavización interpretativa; por eso se registra sin desplazar la lectura hebrea.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del expediente inglés, que prefirió una expresión más idiomática para el segundo cola (‘bring yourself down’) sin perder el matiz reflexivo. En español se mantuvo esa cautela semántica y se conservó la tensión entre la imagen hebrea difícil y el paralelo griego más general.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֵל, conforme al estándar del proyecto.
  - Se preserva la distinción entre ‘asamblea’ y ‘congregación’ para reflejar los dos términos hebreos distintos.
  - La nota del paralelo griego se ancla en la frase correspondiente y no sustituye la traducción principal hebrea.
