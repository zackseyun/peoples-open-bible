translation:
  language: es
  text: 'Estos eran los hijos de Ehud. Estos eran los jefes de las casas paternas[a] de los habitantes de Geba, y los llevaron al exilio a Manahat[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'casas paternas' traduce una unidad de linaje o casa ancestral, no solo una familia nuclear.
    reason: cultural_note
  - marker: b
    text: 'O: ''y los llevaron al destierro a Manahat''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Y estos eran
  - Ahora estos eran
  lexicon: HALOT
  rationale: En una nota genealógica, el hebreo introductorio se vierte de forma natural con una frase simple en español. 'Estos eran' conserva la función de presentación y evita una calca pesada.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos/descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, 'hijos de' es la equivalencia más directa y tradicional en español, sin perder el valor de linaje o descendencia.
- source_word: אֵחוּד
  english_pob_choice: Ehud
  chosen_spanish: Ehud
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera estándar.
- source_word: רָאשֵׁי אָבוֹת
  english_pob_choice: the heads of fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de casas paternas
  - los jefes de los hogares ancestrales
  - los jefes de familia
  lexicon: HALOT
  rationale: La expresión técnica alude a jefes de linaje o unidad doméstica ancestral. 'Casas paternas' preserva mejor la estructura social que 'familias', y 'jefes' expresa adecuadamente רָאשֵׁי.
- source_word: לְיֹשְׁבֵי גֶבַע
  english_pob_choice: for the inhabitants of Geba
  chosen_spanish: de los habitantes de Geba
  alternatives_spanish:
  - para los habitantes de Geba
  - entre los habitantes de Geba
  lexicon: HALOT
  rationale: El lamed relacional se expresa con naturalidad en español mediante 'de', manteniendo la relación de pertenencia/referencia sin sobreinterpretar la preposición.
- source_word: וַיַּגְל֖וּ/ם
  english_pob_choice: and they carried them into exile
  chosen_spanish: y los llevaron cautivos
  alternatives_spanish:
  - y los llevaron al exilio
  - y los deportaron
  - y los llevaron a Manahat en cautiverio
  lexicon: HALOT
  rationale: El verbo de exilio se puede expresar en español con 'llevar cautivos', que conserva la idea de traslado forzado y el carácter de exilio sin un tecnicismo administrativo ajeno al registro bíblico.
- source_word: אֶל מָנָחַת
  english_pob_choice: to Manahath
  chosen_spanish: a Manahat
  alternatives_spanish:
  - a Manahath
  lexicon: HALOT
  rationale: Se conserva el nombre del lugar con transliteración española coherente. 'A' reproduce la dirección del hebreo.
theological_decisions:
- issue: Sentido genealógico de 'heads of fathers’ houses'
  english_pob_reading: The phrase refers to clan or ancestral-household leaders.
  chosen_spanish_reading: La frase se entiende como jefes de casas paternas o de linajes domésticos.
  alternative_spanish_readings:
  - jefes de familia
  - jefes de linaje
  - cabezas de casas paternas
  rationale: No se debe reducir la expresión a 'familias' sin más, porque el hebreo señala una estructura de parentesco y autoridad doméstico-clánica más precisa. La opción elegida mantiene esa tensión en español.
  doctrine_reference: N/A
- issue: Sentido de 'carried them into exile'
  english_pob_reading: A forced removal into exile is intended.
  chosen_spanish_reading: Se entiende un traslado forzado, expresado como que los llevaron cautivos.
  alternative_spanish_readings:
  - los deportaron
  - los llevaron al exilio
  - los exiliaron
  rationale: '''Llevaron cautivos'' conserva la fuerza del hecho sin imponer un tecnicismo moderno ni diluir el carácter de expulsión forzada del verbo hebreo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'deported' por 'carried them into exile' para reflejar con mayor precisión el verbo de exilio y mantener un registro formal. La versión española sigue esa línea con 'los llevaron cautivos', que conserva la idea de traslado forzado y evita un tecnicismo administrativo moderno.
  spanish_consistency_notes:
  - Se mantiene la transliteración 'Ehud' y 'Geba' de forma consistente con la política del proyecto.
  - '''Casas paternas'' preserva la estructura genealógica técnica del hebreo y evita nivelarla a ''familias''.'
  - '''Llevaron cautivos'' equilibra fidelidad semántica y naturalidad en español para el verbo de exilio.'
