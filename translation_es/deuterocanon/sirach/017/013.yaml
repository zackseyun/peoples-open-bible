translation:
  language: es
  text: 'Y les dijo: «Guárdense de toda injusticia[a]», y les ordenó a cada uno respecto de su prójimo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guárdense de toda cosa injusta» o «Estén en guardia contra todo lo injusto». El griego es breve y admite varias traducciones cercanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: Beware of
  chosen_spanish: Guárdense de
  alternatives_spanish:
  - Estén alerta contra
  - Estén en guardia contra
  - Cuídense de
  lexicon: BDAG
  rationale: El imperativo pide advertencia y vigilancia moral, no mera atención. «Guárdense de» transmite con naturalidad la idea cautelar y el matiz reflexivo implícito en el contexto, sin forzar un calco.
- source_word: ἀπὸ παντὸς ἀδίκου
  english_pob_choice: against every injustice
  chosen_spanish: de toda injusticia
  alternatives_spanish:
  - de todo mal
  - de toda maldad
  - de toda cosa injusta
  lexicon: LSJ
  rationale: «ἄδικος/ἀδίκου» aquí expresa lo injusto o lo contrario a la rectitud. «Injusticia» conserva el alcance ético y suena natural en español. La preposición «de» funciona bien con «guárdense de» y mantiene la advertencia.
- source_word: ἐνετείλατο
  english_pob_choice: he commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato
  - encargó
  lexicon: BDAG
  rationale: El verbo tiene fuerza de mandato autoritativo. «Mandó» preserva esa autoridad con un verbo directo y claro en español bíblico contemporáneo.
- source_word: ἑκάστῳ
  english_pob_choice: each of them
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada cual
  - a cada uno de ellos
  lexicon: BDAG
  rationale: La idea distributiva singular se expresa de forma natural con «a cada uno», manteniendo el valor individual del mandato.
- source_word: περὶ τοῦ πλησίον
  english_pob_choice: concerning his neighbor
  chosen_spanish: acerca de su prójimo
  alternatives_spanish:
  - respecto de su prójimo
  - sobre su prójimo
  - en cuanto a su prójimo
  lexicon: BDAG
  rationale: «πλησίον» en contexto ético corresponde a «prójimo». Se conserva el singular distributivo del griego con «su prójimo», que refleja el foco personal y relacional del mandato.
theological_decisions:
- issue: Alcance ético de ἀδίκου
  english_pob_reading: Rendered as 'injustice' rather than 'unrighteousness.'
  chosen_spanish_reading: «injusticia» en lugar de «injusticia/iniquidad» o «injusticia/impiedad» técnico-doctrinal.
  alternative_spanish_readings:
  - iniquidad
  - injusticia contra la rectitud
  - maldad
  rationale: 'En Sirácides el énfasis es sapiencial y social: evitar la conducta injusta. «Injusticia» comunica mejor ese campo semántico sin importar una categoría paulina más técnica.'
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
- issue: Singular distributivo de «neighbor»
  english_pob_reading: 'Retained singular: ''each of them concerning his neighbor.'''
  chosen_spanish_reading: 'Se mantiene el singular: «su prójimo».'
  alternative_spanish_readings:
  - sus prójimos
  - el prójimo de cada uno
  - unos a otros
  rationale: El griego usa singular distributivo; conservarlo en español respeta la forma fuente y mantiene el enfoque moral individual.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término anotado. La redacción sigue el griego con apoyo del audio/archivo inglés POB y conserva el mandato individual y el sustantivo ético principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí; no hay términos divinos explícitos en este versículo.
  - «Prójimo» se mantuvo en singular para reflejar el distributivo del griego.
  - La voz imperativa se hizo natural en español con «Guárdense de» para preservar la advertencia sin introducir sentido ajeno.
