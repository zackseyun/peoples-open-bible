review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y conserva correctamente la imagen aviar explícita. Sin embargo, dos elecciones necesitan ajuste para reflejar mejor la sintaxis y el matiz: «dolidas por su afecto» suena menos natural y menos cercano a ἀλγοῦντα τῇ στοργῇ que «afligidas en su afecto», y «en todo lo que pudieran» no representa bien καθʼ ὃν δύναται τρόπον, que significa ‘de cualquier modo que pudieran’ o ‘como pudieran’.'
  spanish_quality_summary: El español es claro y digno, pero «dolidas por su afecto» resulta algo forzado, y «en todo lo que pudieran» introduce una idea de totalidad de cosas más que de modo o manera. Un pequeño retoque mejora naturalidad y fidelidad sin perder legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La imagen aviar se preserva adecuadamente, en línea con la decisión auditada en inglés. No intervienen términos doctrinales sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «en todo lo que pudieran» no refleja el sentido modal de καθʼ ὃν δύναται τρόπον
    rationale: 'La frase griega expresa manera o medio: ‘de cualquier modo que pudieran’, no ‘en todo lo que pudieran’, que en español apunta más a totalidad de acciones u objetos.'
  - severity: low
    issue: «dolidas por su afecto» suena menos idiomático para ἀλγοῦντα τῇ στοργῇ
    rationale: Aunque comunica dolor ligado al afecto, en español suena algo rígido. «Afligidas en su afecto» o «afligidas por su afecto» representa mejor el dolor emocional sin introducir matices ajenos.
  - severity: low
    issue: «llamándolos» puede sonar levemente más transitivo que el griego
    rationale: El inglés auditado usa ‘calling to them’. En español «llamándoles» o «llamándolos» ambos pueden funcionar, pero «llamándoles con su propia voz» guarda mejor el matiz de dirigirse vocalmente a ellos.
  revised_spanish_text: Pero aun si no pudieran impedirlo[a], volando alrededor de ellos por todos lados, afligidas en su afecto, y llamándoles con su propia voz, ayudarían a sus hijos de cualquier modo que pudieran.
  revised_footnotes:
  - marker: a
    text: 'La imagen griega es aviar: una madre criatura «vuela alrededor» de sus crías y las llama.'
    reason: cultural_note
  revision_rationale: Se ajusta la expresión modal para reflejar correctamente καθʼ ὃν δύναται τρόπον (‘de cualquier modo que pudieran’), se mejora la naturalidad de ἀλγοῦντα τῇ στοργῇ con «afligidas en su afecto», y se afina el matiz direccional de ἀνακαλούμενα con «llamándoles». El resto del borrador preserva bien la imagen y el sentido del original.
