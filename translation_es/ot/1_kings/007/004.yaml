translation:
  language: es
  text: Había tres hileras de marcos de ventana[a], con una ventana opuesta a otra tres veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una ventana opuesta a otra en tres niveles». El hebreo dice literalmente «ventana a ventana tres veces», probablemente describiendo una disposición repetida en tres pisos o niveles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁקֻפִ֖ים
  english_pob_choice: window frames
  chosen_spanish: marcos de ventana
  alternatives_spanish:
  - ventanas
  - jambas de ventana
  - marcos
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término apunta a un elemento estructural de abertura. ‘Marcos de ventana’ conserva la idea de una abertura enmarcada sin exagerar un término técnico que el hebreo no obliga a precisar más.
- source_word: שְׁלֹשָׁ֣ה טוּרִ֑ים
  english_pob_choice: three rows
  chosen_spanish: tres hileras
  alternatives_spanish:
  - tres filas
  - tres niveles
  - tres cursos
  lexicon: HALOT
  rationale: טוּר denota una serie alineada. ‘Hileras’ es natural en español y mantiene el sentido de disposición repetida mejor que una opción excesivamente técnica.
- source_word: וּ/מֶחֱזָ֥ה
  english_pob_choice: window
  chosen_spanish: ventana
  alternatives_spanish:
  - abertura
  - mirador
  - vanos
  lexicon: HALOT
  rationale: Aquí el término se entiende por su función de abertura para ver o recibir luz. ‘Ventana’ es la equivalencia más clara y lecturable en español.
- source_word: אֶל מֶחֱזָ֖ה
  english_pob_choice: opposite window
  chosen_spanish: frente a ventana
  alternatives_spanish:
  - ventana opuesta a ventana
  - de ventana a ventana
  - ventana frente a ventana
  lexicon: HALOT
  rationale: La preposición expresa correspondencia u orientación recíproca. ‘Frente a ventana’ comunica esa relación de manera natural en español, sin perder el valor de oposición espacial del hebreo.
- source_word: שָׁלֹ֥שׁ פְּעָמִֽים
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - en tres niveles
  - en tres ocasiones
  - a tres niveles
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente ‘tres veces’. El español conserva esa forma, dejando abierta la posibilidad arquitectónica de una repetición en tres niveles, como indica el audit trail inglés.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘facing’ por ‘opposite’ para expresar con más precisión אֶל; por eso el español usa «frente a» en lugar de una formulación más interpretativa, y conserva «tres veces» en el texto principal con una nota que explicita la posible lectura arquitectónica.
  spanish_consistency_notes:
  - Se mantuvo «ventana» en singular donde el hebreo repite el sustantivo en una construcción distributiva.
  - No se introdujo terminología eclesiástica ni se amplió el sentido más allá de la descripción arquitectónica.
  - La nota al pie preserva la tensión entre la literalidad hebrea y la probable referencia a tres niveles, siguiendo el audit trail inglés.
