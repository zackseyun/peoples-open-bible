translation:
  language: es
  text: Y Apolonio reunió a los gentiles[a], y de Samaria reunió una gran fuerza para hacer la guerra contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones». El término griego puede significar «naciones» en general, pero en este contexto probablemente se refiere a pueblos no israelitas reunidos contra Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - mustered
  lexicon: LSJ
  rationale: El aoristo expresa que Apolonio puso juntos a distintos grupos. «Reunió» es natural en español y conserva la idea amplia de congregar gente sin forzar un matiz militar más específico de lo que el griego exige.
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: LSJ
  rationale: En este contexto judío de oposición a Israel, el término alude a no israelitas. «Los gentiles» conserva esa contraposición étnico-religiosa y sigue la decisión auditada del inglés POB; «las naciones» sería posible, pero aquí resulta menos preciso.
- source_word: δύναμιν μεγάλην
  english_pob_choice: a large force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - una gran potencia
  - una gran tropa
  lexicon: LSJ
  rationale: δύναμις aquí funciona como fuerza militar o contingente armado. «Una gran fuerza» mantiene amplitud y naturalidad en español sin estrechar indebidamente el referente a «ejército».
- source_word: τοῦ πολεμῆσαι
  english_pob_choice: to wage war
  chosen_spanish: para hacer guerra
  alternatives_spanish:
  - para combatir
  - para guerrear
  - para librar guerra
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. «Para hacer guerra» reproduce bien el propósito militar organizado y es una formulación transparente en español; «combatir» sería más general y menos explícita.
- source_word: ἀπὸ Σαμαρίας
  english_pob_choice: from Samaria
  chosen_spanish: desde Samaria
  alternatives_spanish:
  - de Samaria
  - a partir de Samaria
  lexicon: LSJ
  rationale: ἀπό señala origen o procedencia. «Desde Samaria» comunica con claridad el punto de partida de la fuerza; «de Samaria» también sería correcto, pero «desde» subraya mejor el origen.
- source_word: πρὸς Ἰσραήλ
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - hacia Israel
  - frente a Israel
  lexicon: LSJ
  rationale: Con πολεμέω, πρός indica dirección hostil. «Contra Israel» es la equivalencia española más natural para un contexto bélico.
theological_decisions:
- issue: Valor de ἔθνη en contexto narrativo judío
  english_pob_reading: Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  - los pueblos
  rationale: La lectura del POB inglés preserva el contraste con Israel y evita una neutralización excesiva. En español, «los gentiles» conserva esa tensión identitaria sin añadir una carga religiosa ajena al texto.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y consistencia terminológica documentada.'
translation_notes:
  revision_awareness: 'Coincidencia alta con el texto fuente griego y con la auditoría inglesa: no hay revisión aplicada en el pase más reciente, y la formulación española conserva el sentido militar, la procedencia desde Samaria y el contraste étnico-religioso de ἔθνη.'
  spanish_consistency_notes:
  - Se mantiene «Apolonio» como forma hispana normal del nombre propio.
  - Se usa «gentiles» en minúscula según el uso común en español cuando funciona como sustantivo común de contraste étnico-religioso.
  - «Para hacer guerra» conserva el matiz de finalidad del infinitivo articular griego.
  - No se introduce vocabulario eclesiástico ni una intensificación no respaldada por el original.
