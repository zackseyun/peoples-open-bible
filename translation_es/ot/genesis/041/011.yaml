translation:
  language: es
  text: Y soñamos un sueño en una noche[a], yo y él; cada hombre soñó conforme a la interpretación de su sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «soñamos un sueño en una noche, yo y él; cada hombre según la interpretación de su sueño soñamos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּחַלְמָה
  english_pob_choice: And we dreamed
  chosen_spanish: Y soñamos
  alternatives_spanish:
  - Y tuvimos un sueño
  - Entonces soñamos
  lexicon: HALOT
  rationale: El wayyiqtol narra un evento secuencial; «soñamos» conserva la acción narrativa y el paralelismo con el verbo final repetido.
- source_word: חֲלוֹם
  english_pob_choice: a dream
  chosen_spanish: un sueño
  alternatives_spanish:
  - un sueño soñado
  - un sueño en visión
  lexicon: HALOT
  rationale: En español, el acusativo cognado se expresa de forma natural como «soñamos un sueño», manteniendo el énfasis hebreo sin forzar la sintaxis.
- source_word: בְּלַיְלָה אֶחָד
  english_pob_choice: in one night
  chosen_spanish: en una sola noche
  alternatives_spanish:
  - en una noche
  - la misma noche
  lexicon: HALOT
  rationale: «En una sola noche» reproduce con fidelidad la coincidencia temporal del hebreo y suena natural en español; además preserva la literalidad del número uno.
- source_word: אֲנִי וָהוּא
  english_pob_choice: I and he
  chosen_spanish: yo y él
  alternatives_spanish:
  - él y yo
  - yo e él
  lexicon: HALOT
  rationale: Conservo el orden marcado del hebreo con «yo y él», aunque en español «él y yo» sería más idiomático. Aquí el orden tiene valor retórico y se mantiene por fidelidad al texto.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El distributivo masculino singular se expresa con «cada hombre», que conserva el alcance individual del hebreo en un registro bíblico claro.
- source_word: כְּפִתְרוֹן
  english_pob_choice: according to the interpretation of
  chosen_spanish: conforme a la interpretación de
  alternatives_spanish:
  - según la interpretación de
  - de acuerdo con la interpretación de
  lexicon: HALOT
  rationale: «Conforme a» comunica la relación de correspondencia del כְּ hebreo con un tono más bíblico y preciso que una paráfrasis.
- source_word: חֲלֹמוֹ
  english_pob_choice: his dream
  chosen_spanish: su sueño
  alternatives_spanish:
  - el sueño de él
  - su propio sueño
  lexicon: HALOT
  rationale: El sufijo singular funciona distributivamente para cada hombre; «su sueño» respeta esa referencia individual en español.
- source_word: חָלָמְנוּ
  english_pob_choice: dreamed
  chosen_spanish: soñó
  alternatives_spanish:
  - soñamos
  - tuvo
  lexicon: HALOT
  rationale: El final del versículo retoma el verbo en una cláusula distributiva. En español, repetir «soñó» tras «cada hombre» da claridad y refleja la construcción hebrea mejor que un plural repetido.
translation_notes:
  revision_awareness: Se siguió el hebreo de cerca, manteniendo el orden marcado «yo y él» y la coincidencia temporal explícita «en una sola noche», en línea con la revisión inglesa que prefirió la literalidad de בְּלַיְלָה אֶחָד sobre una equivalencia más libre. Se preservó también la repetición cognada «soñamos un sueño», que el audit trail inglés trató como rasgo lexical relevante.
  spanish_consistency_notes:
  - Se usa «soñar» para חָלַם en ambos lugares del versículo, conservando la repetición verbal del hebreo.
  - «Conforme a» traduce el valor relacional de כְּ sin sustituirlo por una formulación interpretativa más amplia.
  - Se mantiene el orden marcado «yo y él» para reflejar la secuencia del hebreo, aunque no sea el orden más natural del español.
  - El distributivo hebreo con אִישׁ se vierte como «cada hombre» para conservar la individualización de la acción.
  - La nota a explica la alternativa literal conservada en el audit trail inglés y no añade contenido extra al texto base.
