base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/001/016.yaml
  text: And I will pronounce my judgments against them for all their evil[a], because they have forsaken me, burned incense to other gods[b], and bowed down to the works of their own hands.
  footnotes:
