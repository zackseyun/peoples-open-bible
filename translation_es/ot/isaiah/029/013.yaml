base_translation:
  language: en
  yaml_path: translation/ot/isaiah/029/013.yaml
  text: 'And the Lord said: Because this people draws near with its mouth and honors me with its lips[a], while its heart is far from me, and their fear of me has become a commandment of men that is taught[b],'
