translation:
  language: es
  text: Pero extiende tu mano, te ruego, y toca su hueso y su carne; y él seguramente te maldecirá[a] en tu cara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «te bendecirá»; en este pasaje el verbo se entiende como un eufemismo por «maldecir».
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: HALOT
  rationale: La partícula adversativa introduce la contraposición de Satanás; «Pero» es natural en español y conserva el giro argumental sin sobrecargarlo.
- source_word: שְׁלַח נָא יָדְךָ
  english_pob_choice: stretch out your hand, please
  chosen_spanish: extiende tu mano, te ruego
  alternatives_spanish:
  - alarga tu mano, te ruego
  - tiende tu mano, te ruego
  - extiende tu mano, por favor
  lexicon: HALOT
  rationale: El hebreo usa el modismo «enviar/extender la mano» como acción deliberada. «Extiende tu mano» conserva la imagen y es idiomático en español; «te ruego» refleja la partícula נָא con tono de súplica.
- source_word: וְגַע
  english_pob_choice: and touch
  chosen_spanish: y toca
  alternatives_spanish:
  - y golpea
  - y lastima
  - y hiere
  lexicon: HALOT
  rationale: «Toca» reproduce con fidelidad el verbo נגע y deja que el contexto de daño y prueba determine el sentido hostil implícito, como en el audit trail inglés.
- source_word: אֶל עַצְמוֹ וְאֶל בְּשָׂרוֹ
  english_pob_choice: his bone and his flesh
  chosen_spanish: su hueso y su carne
  alternatives_spanish:
  - sus huesos y su carne
  - su cuerpo
  lexicon: HALOT
  rationale: Se conserva la expresión concreta y colectiva del hebreo. «Su hueso y su carne» mantiene la imagen corporal más estrechamente que «su cuerpo».
- source_word: אִם לֹא
  english_pob_choice: he will surely
  chosen_spanish: seguramente
  alternatives_spanish:
  - ciertamente
  - sin duda
  - de seguro
  lexicon: HALOT
  rationale: En este contexto la construcción funciona de manera enfática, no condicional. «Seguramente» comunica la seguridad de la afirmación sin convertirla en condición.
- source_word: אֶל פָּנֶיךָ
  english_pob_choice: to your face
  chosen_spanish: en tu misma cara
  alternatives_spanish:
  - a tu cara
  - ante ti
  - delante de ti
  lexicon: HALOT
  rationale: La locución expresa confrontación abierta. «En tu misma cara» es una equivalencia viva en español que conserva la idea de desafío directo y público.
- source_word: יְבָרֲכֶךָּ
  english_pob_choice: curse you
  chosen_spanish: te maldecirá
  alternatives_spanish:
  - te bendecirá
  - te renunciará
  - te despedirá
  lexicon: HALOT
  rationale: Aunque el verbo hebreo significa literalmente «bendecir», en Job 1:11 y 2:5 funciona como eufemismo de maldecir. El texto principal debe reflejar el sentido contextual, mientras el término literal queda registrado en la nota.
theological_decisions:
- issue: Uso eufemístico de ברך en la escena de la prueba de Job
  english_pob_reading: Render as 'curse' in the main text, with a note that Hebrew literally says 'bless'
  chosen_spanish_reading: 'Traducir «te maldecirá» en el texto principal, con nota que indique «literalmente: bendecirá»'
  alternative_spanish_readings:
  - «te bendecirá» con explicación contextual
  - «te maldecirá» sin nota
  rationale: El contexto narrativo es la acusación de Satanás de que Job renunciará a Dios bajo sufrimiento. «Te maldecirá» evita la confusión que produciría «te bendecirá» en español moderno, pero la nota preserva la transparencia del hebreo literal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete de origen; la traducción sigue el texto hebreo con el audit trail inglés como apoyo para decisiones lexicográficas y teológicas. Se mantiene la lectura de alta concordancia sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando corresponde; aquí no aparece.
  - Se mantiene el trato de segunda persona singular en todo el versículo.
  - Se preserva la imagen corporal concreta («hueso y carne») en vez de suavizarla a «cuerpo».
  - La nota del verbo ברך conserva la tensión entre forma literal y sentido contextual, sin ocultarla.
