review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: imperativo de descenso desde un estado de honor, privación posterior, personificación de Dibón, avance del devastador y destrucción de las fortificaciones. También conserva la alternativa léxica de בַצָּמָא en nota. Sin embargo, hay un desajuste de género/número en «oh habitante» frente a la personificación femenina singular del contexto («hija de Dibón»), y «en la sed» suena menos natural en español que una formulación igualmente fiel.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «oh habitante, hija de Dibón» resulta internamente tenso por mezclar un sustantivo común masculino/no marcado con una personificación femenina explícita. «Moradora» resuelve esto de forma natural y precisa. Además, «siéntate sedienta[a]» ofrece mejor legibilidad que «siéntate en la sed[a]» y aún permite la misma nota de ambigüedad.
  glossary_alignment: No hay términos del glosario mayor afectados. «Devastador», «ha subido contra ti» y «fortalezas» son aceptables en contexto. La personificación profética debe mantenerse en femenino en español.
  issues:
  - severity: medium
    issue: Desajuste de personificación en «oh habitante, hija de Dibón»
    rationale: El hebreo se dirige a la ciudad personificada como figura femenina singular. En español, «habitante» junto a «hija de Dibón» suena discordante; «moradora» o una reformulación femenina conserva mejor la imagen profética.
  - severity: medium
    issue: «En la sed» es poco idiomático en español
    rationale: Aunque intenta preservar la ambigüedad del hebreo, la frase suena forzada. «Sedienta» mantiene la privación de forma más natural; la nota puede seguir preservando la posibilidad de lugar seco/paraje reseco.
  revised_spanish_text: Desciende de tu gloria y siéntate sedienta[a], oh moradora[b], hija de Dibón, porque el devastador de Moab ha subido contra ti; ha destruido tus fortalezas.
  revised_footnotes:
  - marker: a
    text: O «siéntate en un lugar sediento» / «habita en tierra reseca». La expresión hebrea puede describir la sed misma o la condición/lugar seco al que Dibón es reducida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hija de Dibón», una personificación profética común de una ciudad y su población como una mujer.
    reason: cultural_note
  revision_rationale: Se ajusta la personificación al femenino con «moradora» para corresponder al hebreo y a «hija de Dibón», y se mejora la naturalidad del español con «siéntate sedienta» sin perder la ambigüedad del original, la cual se conserva en la nota. También se añade la nota cultural presente en la auditoría inglesa para explicar la personificación.
