revisions:
- from: Yahvé te herirá con [a] enfermedad consumidora, con fiebre, con inflamación, con ardor, con la espada, con tizón y con añublo; y te perseguirán hasta que perezcas[b].
  to: Yahvé te herirá con enfermedad consumidora[a], con fiebre, con inflamación, con calor abrasador, con la espada, con tizón y con añublo; y te perseguirán hasta que perezcas[b].
  rationale: Se corrige la colocación obligatoria del marcador de nota, y se refuerza חַרְחֻר con «calor abrasador», que preserva mejor la fuerza del hebreo y del audit trail inglés («burning heat»). Se mantiene «tizón y añublo» como pareja agrícola válida y de tono bíblico legible.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Yahvé como sujeto, la serie de azotes introducidos por ב, el verbo plural final «te perseguirán», y el cierre «hasta que perezcas». También preserva la nota sobre el plural de וּרְדָפוּךָ. Sin embargo, hay ajustes necesarios en precisión léxica y presentación.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta un problema de colocación del marcador [a] («con [a] enfermedad consumidora»), que debe ir unido a la palabra o frase anotada. Además, «ardor» queda algo débil frente a «burning heat», y «añublo» es menos transparente para lectura amplia que «mildiu» o «moho», aunque sigue siendo posible. Conviene mejorar naturalidad y claridad sin perder la serie técnica.
  glossary_alignment: 'Se alinea correctamente con el glosario del proyecto en «Yahvé». No hay otros términos doctrinales sensibles aquí. La principal cuestión es léxica: conviene acercar חַרְחֻר a «calor abrasador» para preservar mejor la fuerza de «burning heat», y mantener una pareja agrícola inteligible para שִׁדָּפוֹן / יֵרָקוֹן.'
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal colocado
    rationale: La instrucción exige que el marcador aparezca en la palabra o frase pertinente. «con [a] enfermedad consumidora» es tipográficamente incorrecto; debe anclarse a «enfermedad consumidora[a]».
  - severity: medium
    issue: «Ardor» subrepresenta חַרְחֻר
    rationale: El inglés auditado escogió «burning heat» para reflejar calor abrasador o fiebre ardiente. «Ardor» puede sonar demasiado interno o subjetivo y pierde parte del carácter de calor abrasador.
  - severity: low
    issue: «Añublo» puede ser menos claro para lectores amplios
    rationale: Aunque es defendible en contexto agrícola y bíblico, es menos transparente en español general. Una opción como «mildiu» sería más reconocible en algunos contextos, pero no es imprescindible si se mantiene la dignidad y paralelismo tradicional.
  revised_spanish_text: Yahvé te herirá con enfermedad consumidora[a], con fiebre, con inflamación, con calor abrasador, con la espada, con tizón y con añublo; y te perseguirán hasta que perezcas[b].
  revised_footnotes:
