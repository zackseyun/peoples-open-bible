  rationale: Se ajusta la primera frase para reflejar con más claridad la relación de liderazgo sobre el grupo ('los dirigían') y se hace más natural la segunda ('al frente de ellos'). También se corrige la nota [b] para conservar el matiz administrativo documentado en el audit trail inglés sobre un registro oficial de supervisores.
