translation:
  language: es
  text: 'Y sucedió[a] que, cuando vio el anillo de la nariz[b] y los brazaletes sobre las manos de su hermana, y cuando oyó las palabras de Rebeca, su hermana: «Así me habló el hombre», fue al hombre. Y he aquí[c] que él estaba de pie junto a los camellos, al lado[d] del manantial[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tuvo lugar». El hebreo וַיְהִי funciona como fórmula narrativa de transición; «Y sucedió» conserva el flujo del relato.
    reason: lexical_alternative
  - marker: b
    text: O «el anillo». El hebreo נֶזֶם puede referirse a un anillo en general; aquí se elige «anillo de la nariz» porque Génesis 24:47 especifica que fue puesto en la nariz de Rebeca.
    reason: lexical_alternative
  - marker: c
    text: O «Y mira». La expresión hebrea וְהִנֵּה marca una presentación vívida de la escena.
    reason: lexical_alternative
  - marker: d
    text: O «junto a». La preposición hebrea puede indicar cercanía, no necesariamente posición encima.
    reason: lexical_alternative
  - marker: e
    text: O «fuente» o «pozo». El hebreo עַיִן más específicamente significa «manantial» o «fuente de agua»; aquí «manantial» es más preciso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y tuvo lugar
  lexicon: HALOT
  rationale: El hebreo wayyiqtol introduce la siguiente escena narrativa; «Y sucedió» conserva la función discursiva sin arcaísmo excesivo. Evita un calco rígido y mantiene el tono bíblico legible en español.
- source_word: כִּרְאֹת
  english_pob_choice: when he saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al ver
  - apenas vio
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con כ se rinde naturalmente con «cuando vio», conservando la secuencia temporal del hebreo.
- source_word: הַנֶּזֶם
  english_pob_choice: the nose ring
  chosen_spanish: el anillo
  alternatives_spanish:
  - el anillo para la nariz
  - el aro
  lexicon: HALOT
  rationale: La POB inglesa eligió «nose ring» por el contexto inmediato y v. 47. En español, «anillo» mantiene la decisión léxica abierta entre un aro general y una joya nasal; «anillo para la nariz» sería más explícito pero más pesado. Se preserva la tensión documentada con nota.
- source_word: הַצְּמִדִים
  english_pob_choice: the bracelets
  chosen_spanish: los brazaletes
  alternatives_spanish:
  - las pulseras
  - las ajorcas
  lexicon: HALOT
  rationale: «Brazaletes» comunica mejor un adorno de brazo/mano en registro bíblico y evita reducirlo a una pieza moderna de muñeca. Mantiene la pluralidad del hebreo.
- source_word: עַל יְדֵי אֲחֹת/וֹ
  english_pob_choice: on his sister’s hands
  chosen_spanish: sobre las manos de su hermana
  alternatives_spanish:
  - en las manos de su hermana
  - en sus muñecas
  lexicon: HALOT
  rationale: Se conserva la literalidad básica de ידים («manos») porque el hebreo no dice muñecas. «Sobre» refleja la preposición y la posición de los adornos sin añadir precisión anatómica no explicitada por el texto.
- source_word: וּכְשָׁמְע/וֹ
  english_pob_choice: and when he heard
  chosen_spanish: y cuando oyó
  alternatives_spanish:
  - y al oír
  - y al escuchar
  lexicon: HALOT
  rationale: Se mantiene el paralelismo temporal con «cuando vio». «Oyó» es la forma simple y directa para el acto de escuchar reportado por el hebreo.
- source_word: דִּבְרֵי רִבְקָה
  english_pob_choice: the words of Rebekah
  chosen_spanish: las palabras de Rebeca
  alternatives_spanish:
  - el relato de Rebeca
  - lo que Rebeca dijo
  lexicon: HALOT
  rationale: «Palabras» traduce de modo directo דברי y conserva la estructura nominal hebrea. No se adelanta una reinterpretación como «relato».
- source_word: כֹּה דִבֶּר אֵלַי הָאִישׁ
  english_pob_choice: This is what the man said to me
  chosen_spanish: «Así me habló el hombre»
  alternatives_spanish:
  - «Esto me dijo el hombre»
  - «El hombre me dijo así»
  lexicon: HALOT
  rationale: La POB inglesa opta por una formulación idiomática que conserva el deíctico כֹּה. En español, «Así me habló el hombre» refleja el valor de modo/deíxis sin forzar una literalidad torpe; «habló» mantiene el registro formal y narrativo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - aquel hombre
  lexicon: HALOT
  rationale: Se conserva el sustantivo genérico definido, sin nombrarlo aún, como en el hebreo y la POB inglesa.
- source_word: וַיָּבֹא אֶל הָאִישׁ
  english_pob_choice: that he went to the man
  chosen_spanish: fue al hombre
  alternatives_spanish:
  - se acercó al hombre
  - vino al hombre
  lexicon: HALOT
  rationale: El verbo בוא con אל puede expresarse según el punto de vista narrativo; aquí «fue» es natural en español y mantiene el movimiento hacia el hombre.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y resulta que
  lexicon: HALOT
  rationale: «Y he aquí» conserva la fuerza deíctica y la vividez narrativa del hebreo, como la POB inglesa mantiene «And behold».
- source_word: עֹמֵד
  english_pob_choice: he was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - permanecía de pie
  lexicon: HALOT
  rationale: El participio expresa estado durativo; «estaba de pie» suena natural y preserva la postura continua.
- source_word: עַל הַגְּמַלִּים
  english_pob_choice: by the camels
  chosen_spanish: junto a los camellos
  alternatives_spanish:
  - al lado de los camellos
  - cerca de los camellos
  lexicon: HALOT
  rationale: La POB inglesa documenta que עַל puede indicar proximidad. En español, «junto a» evita la falsa idea de estar encima y conserva la lectura locativa cercana.
- source_word: עַל הָעָיִן
  english_pob_choice: at the spring
  chosen_spanish: junto al manantial
  alternatives_spanish:
  - al lado del manantial
  - en el pozo
  lexicon: HALOT
  rationale: La POB inglesa prefiere «spring» por precisión léxica. «Manantial» es el equivalente español más exacto; «junto al» expresa la localización del grupo en el lugar de agua sin imponer «pozo».
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que mantuvo «saying» para introducir la cita directa y conservó la escena final «by the spring». Se reflejó esa estructura con «diciendo» y «junto al manantial», preservando además las ambigüedades léxicas documentadas en נֶזֶם, עַל y עַיִן.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - Se evita «Cristo» porque no hay lenguaje de título mesiánico.
  - Se conserva el tono narrativo bíblico sin caer en arcaísmos innecesarios.
  - Las notas mantienen alternativas reales donde el hebreo admite más de una lectura, especialmente en נֶזֶם, עַל y עַיִן.
