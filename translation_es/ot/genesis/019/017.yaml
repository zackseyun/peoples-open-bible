translation:
  language: es
  text: 'Y sucedió que, cuando los sacaron fuera[a], él dijo: «Escapa por tu vida. No mires detrás de ti, y no te detengas en ningún lugar de la llanura. Escapa a los montes[b], no sea que seas arrastrado[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «afuera»; el hebreo indica simplemente el movimiento hacia el exterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al monte», «a la montaña» o «a la región montañosa».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no sea que perezcas» o «no sea que seas destruido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוּצָה
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: HALOT
  rationale: El hebreo indica movimiento hacia afuera desde el interior. «Afuera» comunica bien ese desplazamiento y suena natural en español contemporáneo sin perder el valor espacial.
- source_word: הִמָּלֵט
  english_pob_choice: Escape
  chosen_spanish: Escapa
  alternatives_spanish:
  - Huye
  - Sálvate
  lexicon: HALOT
  rationale: El imperativo niphal expresa una urgencia de librarse del peligro. «Escapa» conserva esa fuerza y permite mantener la repetición del mandato en ambos casos.
- source_word: עַל נַפְשֶׁךָ
  english_pob_choice: for your life
  chosen_spanish: por tu vida
  alternatives_spanish:
  - por ti mismo
  - para salvar tu vida
  lexicon: HALOT
  rationale: Es una expresión idiomática de preservación de la vida. «Por tu vida» reproduce con sobriedad la urgencia del hebreo y suena natural en español bíblico moderno.
- source_word: אַל תַּבִּיט אַחֲרֶיךָ
  english_pob_choice: Do not look behind you
  chosen_spanish: No mires detrás de ti
  alternatives_spanish:
  - No mires atrás
  - No vuelvas la vista atrás
  lexicon: HALOT
  rationale: El hebreo se refiere literalmente a mirar detrás de uno. «Detrás de ti» conserva esa relación espacial más directamente que la locución idiomática «atrás», aunque ambas son posibles.
- source_word: וְאַל תַּעֲמֹד
  english_pob_choice: and do not stop
  chosen_spanish: y no te detengas
  alternatives_spanish:
  - y no te quedes
  - y no permanezcas
  lexicon: HALOT
  rationale: En este contexto, עמד significa dejar de avanzar o quedarse en un punto. «No te detengas» expresa mejor la urgencia de seguir huyendo que «no te quedes».
- source_word: בְּכָל הַכִּכָּר
  english_pob_choice: anywhere in the plain
  chosen_spanish: en toda la llanura
  alternatives_spanish:
  - en toda la llanura del Jordán
  - en toda la planicie
  lexicon: HALOT
  rationale: כִּכָּר designa la región llana del valle/Jordán. «Llanura» es una equivalencia clara y aceptable; «en toda» refleja el valor distributivo de בְּכָל.
- source_word: הָהָרָה
  english_pob_choice: to the hills
  chosen_spanish: a los montes
  alternatives_spanish:
  - al monte
  - a la montaña
  - a la serranía
  lexicon: HALOT
  rationale: La forma direccional apunta hacia la zona montañosa. «Montes» mantiene el plural idiomático en español y conserva el contraste con la llanura.
- source_word: פֶּן תִּסָּפֶה
  english_pob_choice: lest you be swept away
  chosen_spanish: no sea que seas arrastrado
  alternatives_spanish:
  - no sea que perezcas
  - no sea que seas destruido
  lexicon: HALOT
  rationale: נספה puede significar ser arrasado, barrido o destruido en juicio. «Arrastrado» intenta mantener la imagen de ser alcanzado y llevado por la catástrofe, siguiendo de cerca la opción inglesa de «swept away».
theological_decisions:
- issue: Identidad del hablante
  english_pob_reading: Rendered simply as 'he said' without specifying whether the speaker is one angel or the angelic party collectively.
  chosen_spanish_reading: «él dijo» sin precisar si habla uno de los mensajeros o el grupo como conjunto.
  alternative_spanish_readings:
  - «ellos dijeron» por sentido colectivo
  - «el ángel dijo» con identificación explícita
  rationale: El verbo hebreo está en singular y el texto no obliga a resolver la cuestión narrativa más allá de esa forma gramatical. La traducción conserva la indeterminación del original y del audit trail inglés.
  doctrine_reference: Génesis 19:17; observación gramatical del verbo singular en el texto hebreo
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo alto del audit trail inglés sin cambios sustantivos. La decisión principal fue conservar el sentido urgente y literal del hebreo con un español natural: afuera / escapa / no te detengas / llanura / montes / no sea que seas arrastrado. No se detectaron revisiones posteriores que alteraran el contenido.'
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» según corresponda en otros pasajes, pero aquí no aparecen.
  - Se preservó el imperativo repetido de «escapa» para reflejar la repetición hebrea de הִמָּלֵט.
  - «Montes» se eligió como plural idiomático equivalente a la dirección hacia la zona montañosa.
  - Se mantuvo la tensión semántica de פֶּן תִּסָּפֶה con una nota que ofrece alternativas más literales o más interpretativas.
