translation:
  language: es
  text: Y clamamos a Yahvé, y oyó nuestra voz y envió un mensajero[a] y nos sacó de Egipto. Y he aquí, estamos en Cades, una ciudad en el extremo de tu territorio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ángel». El término hebreo puede referirse tanto a un mensajero humano como a uno celestial; en este contexto, muchos lo entienden como un mensajero angélico de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «frontera». El hebreo habla de una ciudad situada en el extremo de su límite territorial.
    reason: alternative_reading
lexical_decisions:
- source_word: וַנִּצְעַק
  english_pob_choice: we cried out
  chosen_spanish: clamamos
  alternatives_spanish:
  - gritamos
  - dimos voces
  lexicon: HALOT
  rationale: צעק expresa un clamor urgente, una petición apremiante de auxilio. En español, «clamamos» mantiene ese tono intenso sin sonar excesivamente coloquial. «Gritamos» puede sugerir solo volumen; «dimos voces» es posible, pero menos natural en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino y no una sustitución titulada. «Yahvé» corresponde a la política terminológica del proyecto para el Tetragrámaton y evita borrar el nombre revelado en el texto fuente.
- source_word: וַיִּשְׁמַע קֹלֵנוּ
  english_pob_choice: he heard our voice
  chosen_spanish: oyó nuestra voz
  alternatives_spanish:
  - nos oyó
  - escuchó nuestra voz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «oyó nuestra voz». «Oyó nuestra voz» conserva la imagen y el valor idiomático de la expresión. «Nos oyó» es más natural pero menos explícito; «escuchó» introduce una matización menos directa que el verbo fuente.
- source_word: מַלְאָךְ
  english_pob_choice: a messenger
  chosen_spanish: un mensajero
  alternatives_spanish:
  - un ángel
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel». Dado que el texto no especifica más, se mantiene la neutralidad léxica con «mensajero». La alternativa «un ángel» se conserva como posibilidad interpretativa, pero no se impone sin una identificación explícita en el versículo.
- source_word: וַיֹּצִאֵנוּ מִמִּצְרָיִם
  english_pob_choice: brought us out of Egypt
  chosen_spanish: nos sacó de Egipto
  alternatives_spanish:
  - nos hizo salir de Egipto
  - nos sacó fuera de Egipto
  lexicon: HALOT
  rationale: La forma causativa de יצא se traduce de manera natural con «sacar». «Nos sacó de Egipto» es idiomático y fiel; «nos hizo salir» es más explicativo, pero menos directo.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: HALOT
  rationale: «הִנֵּה» funciona como marcador discursivo que llama la atención sobre la situación presente. «Y he aquí» preserva esa fuerza deíctica en un registro digno y publicable. «Y mira» sonaría más conversacional.
- source_word: בְקָדֵשׁ
  english_pob_choice: in Kadesh
  chosen_spanish: en Cades
  alternatives_spanish:
  - en Kadesh
  lexicon: HALOT
  rationale: Se adapta el topónimo a la forma española más natural y ampliamente reconocible en contextos bíblicos, manteniendo el referente geográfico exacto.
- source_word: עִיר קְצֵה גְבוּלֶךָ
  english_pob_choice: a city at the edge of your border
  chosen_spanish: ciudad en el extremo de tu territorio
  alternatives_spanish:
  - ciudad al borde de tu frontera
  - ciudad al extremo de tu frontera
  lexicon: HALOT
  rationale: La construcción expresa una ciudad situada en el límite del territorio. «Extremo de tu territorio» transmite con claridad el sentido espacial de קצה y evita que «frontera» suene demasiado moderno o político en español.
theological_decisions:
- issue: Identidad de מַלְאָךְ en el relato
  english_pob_reading: Render the noun lexically as 'a messenger' without specifying the messenger's precise identity.
  chosen_spanish_reading: Traducir con «un mensajero» sin definir si se trata de un mensajero humano o celestial.
  alternative_spanish_readings:
  - un ángel
  - el ángel de Yahvé
  rationale: El versículo solo afirma que Yahvé envió un מַלְאָךְ; no especifica su identidad. Para no resolver una tensión que el hebreo deja abierta, la traducción conserva la amplitud léxica. La nota permite la lectura alternativa tradicional sin imponerla como única.
  doctrine_reference: Preservar la tensión lexical y teológica del texto fuente; primacía del original sobre una identificación tradicional no explícita.
translation_notes:
  revision_awareness: La versión inglesa de trabajo pasó de «angel» a «messenger» para reflejar con mayor neutralidad la amplitud de מַלְאָךְ, y de «look» a «behold» para un registro más formal. La presente propuesta sigue esa revisión al preferir «mensajero» y un marcador formal equivalente («Y he aquí»), manteniendo la misma cautela interpretativa frente a la identidad del enviado.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme a la política terminológica del proyecto.
  - Se prefiere «Cades» como forma española del topónimo bíblico.
  - Se conserva la ambigüedad de מַלְאָךְ mediante una nota lexical, sin cerrar la cuestión teológica.
  - El verbo «clamamos» intenta reproducir la intensidad de צעק sin sobreinterpretar el tipo de oración implícita.
