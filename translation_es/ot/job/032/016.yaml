    rationale: Aunque comunica silencio, no preserva tan bien la imagen de 'estar/pararse' o 'quedarse detenidos' que el hebreo y la auditoría inglesa mantienen. En contexto de discusión, «se quedaron allí» o «se quedaron parados» transmite mejor que dejaron de intervenir.
