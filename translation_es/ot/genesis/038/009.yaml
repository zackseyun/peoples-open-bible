    reason: lexical_alternative
  revision_rationale: Se ajustó 'el descendiente' a 'la descendencia' para reflejar mejor זרע en contexto levirático y sonar más natural en español. Se cambió 'se llegaba' por 'se unía' para evitar una construcción poco idiomática sin perder el eufemismo sexual. Se sustituyó 'derramaba el semen' por 'lo derramaba' para no explicitar más de lo que dice el hebreo ni más de lo que preserva el POB inglés en el texto principal; la nota conserva la aclaración necesaria.
