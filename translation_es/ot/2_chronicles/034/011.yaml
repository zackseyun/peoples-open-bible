base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/011.yaml
  text: And they gave it to the craftsmen and to the builders to buy quarried stone and timber for the supports and for roofing the buildings that the kings of Judah had ruined[a][b][c].
  footnotes:
  - marker: a
    text: Or 'hewn stone.' The Hebrew phrase refers to stone cut from a quarry for construction.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'joining work' is uncertain and may refer to structural joining, couplings, or framework elements.
    reason: lexical_alternative
  - marker: c
    text: Or 'for beams' / 'for covering.' The Hebrew verb can refer to roofing or covering a structure with beams.
    reason: lexical_alternative
