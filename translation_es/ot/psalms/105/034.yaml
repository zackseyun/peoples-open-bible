translation:
  language: es
  text: 'Él habló[a], y vinieron langostas: langostas jóvenes[b] sin número.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo». En este contexto poético, «habló» conserva la idea de que la plaga llegó por su palabra, sin añadir la fuerza explícita de «ordenó».
    reason: lexical_alternative
  - marker: b
    text: El hebreo יֶלֶק se refiere a un insecto devorador relacionado con la plaga de langostas, probablemente una etapa o variedad de langosta. Traducciones más antiguas a veces lo vierten «oruga».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַר
  english_pob_choice: He spoke
  chosen_spanish: Él habló
  alternatives_spanish:
  - Él dijo
  - Él ordenó
  lexicon: HALOT
  rationale: אָמַר significa decir/hablar. En español, 'Él habló' conserva la concisión poética y la idea de que la plaga llegó por la palabra de Dios, sin introducir la fuerza explícita de 'ordenó' que el hebreo aquí no expresa directamente.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - hubo
  lexicon: HALOT
  rationale: El wayyiqtol de בוא narra la llegada de la plaga. 'Vinieron' reproduce bien el movimiento narrativo en español y mantiene el sujeto plural implícito.
- source_word: אַרְבֶּה
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - langosta
  - una nube de langostas
  lexicon: HALOT
  rationale: Aunque la forma es singular, el sustantivo funciona como colectivo. 'Langostas' comunica naturalmente la plaga en español y preserva el sentido colectivo.
- source_word: יֶלֶק
  english_pob_choice: young locusts
  chosen_spanish: saltones
  alternatives_spanish:
  - langostas jóvenes
  - larvas de langosta
  - catarinas
  lexicon: HALOT
  rationale: El término denota un insecto devorador relacionado con la plaga de langostas. 'Saltones' es una voz española breve y bíblicamente comprensible para un estadio/tipo de langosta; evita 'caterpillar' y también evita una explicación demasiado técnica.
- source_word: וְאֵין מִסְפָּר
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - innumerables
  - sin contar
  lexicon: HALOT
  rationale: La expresión idiomática indica que eran incontables. 'Sin número' conserva la forma breve y poética del hebreo y es muy natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El inglés POB traduce אָמַר como 'He spoke' y אַרְבֶּה como 'locusts', con nota sobre יֶלֶק como posible variedad o estadio de langosta. La versión española sigue esa lectura, pero ajusta יֶלֶק con un término breve y natural ('saltones') que conserva la relación con la plaga sin importar una equivalencia engañosa como 'caterpillar'.
  spanish_consistency_notes:
  - Se mantiene el nombre divino implícito en tercera persona sin añadir sujeto explícito que no esté en el contexto inmediato.
  - '''Langostas'' se usa como colectivo plural, conforme al sentido narrativo de la plaga.'
  - '''Sin número'' conserva la cadencia y la transparencia del hebreo; no se normaliza a ''innumerables'' para no perder la imagen idiomática.'
