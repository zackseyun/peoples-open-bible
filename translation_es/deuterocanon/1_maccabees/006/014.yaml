revisions:
- from: Mira[a], yo me estoy perdiendo en gran dolor en tierra extranjera. Entonces llamó a Felipe, uno de sus amigos[b], y lo nombró sobre todo su reino.
  to: Mira[a], estoy pereciendo en gran dolor en tierra extranjera. Y llamó a Felipe, uno de sus amigos[b], y lo puso al frente de todo su reino.
  rationale: Se reemplaza «me estoy perdiendo» por «estoy pereciendo» para reflejar con naturalidad ἀπόλλυμαι en contexto de muerte inminente. Se cambia «Entonces» por «Y» para seguir más de cerca el simple καὶ del griego. Se ajusta «lo nombró sobre todo su reino» a «lo puso al frente de todo su reino», que expresa mejor en español la instalación formal en autoridad sin sobreinterpretar el cargo.
