translation:
  language: es
  text: Entonces corté en pedazos mi segundo báculo[a], Unión, para romper la fraternidad entre Judá e Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bandas» o «Ataduras» para el nombre del segundo báculo; el término hebreo evoca cosas atadas entre sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶגְדַּע
  english_pob_choice: Then I cut in pieces
  chosen_spanish: Entonces corté en pedazos
  alternatives_spanish:
  - Entonces lo quebré
  - Entonces lo corté
  - Entonces lo partí
  lexicon: HALOT
  rationale: גדע expresa cortar o seccionar con fuerza. «Corté en pedazos» conserva la acción deliberada y física del símbolo, más que un simple «rompí».
- source_word: מַקְלִי הַשֵּׁנִי
  english_pob_choice: my second staff
  chosen_spanish: mi segundo báculo
  alternatives_spanish:
  - mi otro báculo
  - mi segundo bastón
  - mi segundo cayado
  lexicon: HALOT
  rationale: מַקֵּל designa un báculo, vara o cayado. «Báculo» mantiene el objeto simbólico con un registro digno y bíblico; «segundo» expresa literalmente הַשֵּׁנִי.
- source_word: הַחֹבְלִים
  english_pob_choice: Union
  chosen_spanish: Unión
  alternatives_spanish:
  - Bandas
  - Ataduras
  - Ligaduras
  lexicon: HALOT
  rationale: En el contexto inmediato funciona como nombre propio del segundo báculo, no como simple sustantivo común. «Unión» comunica su valor simbólico en español, mientras que las alternativas más literales quedan auditables.
- source_word: לְהָפֵר
  english_pob_choice: to break
  chosen_spanish: para romper
  alternatives_spanish:
  - para anular
  - para invalidar
  - para quebrantar
  lexicon: HALOT
  rationale: הפר puede significar romper, anular o invalidar. Aquí la imagen concreta del acto sobre el báculo favorece «romper».
- source_word: הָאַחֲוָה
  english_pob_choice: the brotherhood
  chosen_spanish: la fraternidad
  alternatives_spanish:
  - la hermandad
  - el parentesco
  - la comunión
  lexicon: HALOT
  rationale: אַחֲוָה refiere a un vínculo fraternal entre colectividades. «Fraternidad» conserva ese sentido relacional y suena natural en español; se evita diluirlo en una abstracción genérica.
- source_word: בֵּין יְהוּדָה וּבֵין יִשְׂרָאֵל
  english_pob_choice: between Judah and Israel
  chosen_spanish: entre Judá e Israel
  alternatives_spanish:
  - entre Judá y el resto de Israel
  - entre Judá e Israel
  lexicon: HALOT
  rationale: La formulación preserva la distinción histórico-política del texto profético sin ampliaciones interpretativas.
theological_decisions:
- issue: Sentido del nombre simbólico del segundo báculo
  english_pob_reading: Union
  chosen_spanish_reading: Unión
  alternative_spanish_readings:
  - Bandas
  - Ataduras
  - Ligaduras
  rationale: El texto presenta el nombre como símbolo de cohesión entre Judá e Israel. «Unión» expresa con claridad esa función en español, sin perder la posibilidad de una lectura más literal en la nota.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Aporía semántica de אַחֲוָה entre literalidad y claridad
  english_pob_reading: the brotherhood
  chosen_spanish_reading: la fraternidad
  alternative_spanish_readings:
  - la hermandad
  - la comunión
  rationale: Se mantiene el matiz fraternal, relevante para la imagen profética, pero con una palabra natural y comprensible en español. No se neutraliza a «unidad» porque eso borraría el eco familiar del hebreo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés y no muestra revisiones aplicadas; se conserva la misma decisión interpretativa de alto acuerdo para el nombre simbólico del báculo y para el sentido fraternal de אַחֲוָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino por norma del proyecto; este versículo no lo contiene.
  - Se eligió «báculo» para מַקֵּל por ser claro y solemne en español, sin forzar un vocabulario arcaizante excesivo.
  - Se mantuvo la distinción entre nombre simbólico («Unión») y su explicación relacional («fraternidad») sin fusionarlos.
