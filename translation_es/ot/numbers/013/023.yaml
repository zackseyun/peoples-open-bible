translation:
  language: es
  text: Llegaron al Valle de Eshcol[a], y de allí cortaron una rama con un solo racimo de uvas, y dos de ellos lo llevaron sobre una vara[b]; también tomaron algunas de las granadas y algunos de los higos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Wadi de Eshcol» o «el Arroyo de Eshcol». El hebreo נַחַל puede referirse a un valle, una quebrada o un cauce estacional.
    reason: lexical_alternative
  - marker: b
    text: O «una rama de vid con un solo racimo de uvas».
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַל אֶשְׁכֹּל
  english_pob_choice: the Valley of Eshcol
  chosen_spanish: el Valle de Eshcol
  alternatives_spanish:
  - el Wadi de Eshcol
  - el Arroyo de Eshcol
  lexicon: HALOT
  rationale: נַחַל puede designar un valle, cauce estacional, quebrada o wadi. En español, «Valle de Eshcol» es la opción más natural y entendible para un topónimo narrativo, sin perder que el término hebreo puede implicar un terreno encajonado o de escorrentía.
- source_word: זְמוֹרָה
  english_pob_choice: a branch
  chosen_spanish: una rama
  alternatives_spanish:
  - una rama de vid
  - un sarmiento
  lexicon: HALOT
  rationale: זְמוֹרָה se refiere de manera específica a una rama de vid o sarmiento. «Rama» funciona bien en el texto principal porque el versículo inmediatamente aclara que se trata de un racimo de uvas; la alternativa más precisa se conserva en las opciones.
- source_word: אֶשְׁכּוֹל עֲנָבִים אֶחָד
  english_pob_choice: a single cluster of grapes
  chosen_spanish: un solo racimo de uvas
  alternatives_spanish:
  - un racimo de uvas
  - un único racimo de uvas
  lexicon: HALOT
  rationale: La expresión cuantifica un racimo único. «Un solo racimo de uvas» mantiene la fuerza de singularidad con un español natural y claro.
- source_word: וַיִּשָּׂאֻהוּ
  english_pob_choice: carried it
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo cargaron
  - lo transportaron
  lexicon: HALOT
  rationale: El sufijo retoma el conjunto rama-racimo como objeto singular. «Lo llevaron» es la forma más fluida en español moderno; «cargaron» sería más física pero algo más marcada.
- source_word: בַמּוֹט
  english_pob_choice: on a pole
  chosen_spanish: sobre una vara
  alternatives_spanish:
  - sobre un palo
  - en una pértiga
  lexicon: HALOT
  rationale: מּוֹט señala una barra o palo de transporte. «Sobre una vara» conserva la imagen concreta del medio usado para llevar la carga, con un registro bíblico comprensible.
- source_word: בִּשְׁנָיִם
  english_pob_choice: two of them
  chosen_spanish: dos de ellos
  alternatives_spanish:
  - por dos
  - entre dos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «por/mediante dos». En español conviene explicitar los agentes implícitos; «dos de ellos» refleja de forma natural que eran dos miembros del grupo quienes llevaban la carga.
- source_word: וּמִן הָרִמֹּנִים וּמִן הַתְּאֵנִים
  english_pob_choice: they also took some of the pomegranates and some of the figs
  chosen_spanish: también tomaron algunos de los granados y algunos de los higos
  alternatives_spanish:
  - también tomaron algunas granadas y algunos higos
  - también tomaron algunos granados y higos
  lexicon: HALOT
  rationale: רִמּוֹן designa el fruto o el árbol según contexto; en este pasaje el paralelo con los higos favorece entender frutos recolectados del lugar. Se eligió «granados» para mantener la ambigüedad botánica del hebreo y evitar fijar sin necesidad «granadas», que en español moderno suele sonar más directamente al fruto. «Tomaron» reproduce la acción narrativa implícita en la suma de elementos recolectados.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se traduce el lugar con un verbo simple de llegada («Llegaron a»), se mantiene la secuencia narrativa de corte, transporte y recolección, y se añade «algunos de» antes de «los higos» para reflejar el paralelismo del hebreo y la corrección introducida en la versión inglesa final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Eshcol» se deja transliterado como topónimo propio, en continuidad con el POB inglés.
  - Se conserva el paralelismo semántico de frutos tomados del lugar sin añadir cantidades no presentes en el hebreo.
