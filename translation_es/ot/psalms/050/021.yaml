translation:
  language: es
  text: Tú hiciste estas cosas, y yo callé; pensaste que yo era del todo como tú[a]. Te reprenderé y pondré el caso ante tus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pensaste que yo sería como tú». La construcción hebrea permite expresar de varias maneras la suposición equivocada.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «y lo pondré en orden ante tus ojos». El verbo hebreo puede significar «ordenar» o «disponer», y el objeto está implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - esas cosas
  lexicon: HALOT
  rationale: El demostrativo plural retoma las faltas mencionadas antes. «Estas cosas» conserva la referencia anafórica y suena natural en español.
- source_word: עָשִׂיתָ
  english_pob_choice: you did
  chosen_spanish: hiciste
  alternatives_spanish:
  - has hecho
  - hiciste tú
  lexicon: HALOT
  rationale: El perfecto qal 2ms se expresa mejor con pretérito simple en español, que comunica la acusación retrospectiva sin cargar el sentido con un presente perfecto.
- source_word: וְהֶחֱרַשְׁתִּי
  english_pob_choice: and I kept silent
  chosen_spanish: y yo callé
  alternatives_spanish:
  - y estuve callado
  - y no dije nada
  lexicon: HALOT
  rationale: La forma transmite una acción continuada de silencio. «Callé» es breve y natural; el pronombre «yo» preserva el contraste enfático con la segunda persona.
- source_word: דִּמִּיתָ
  english_pob_choice: you thought
  chosen_spanish: pensaste
  alternatives_spanish:
  - imaginaste
  - supusiste
  lexicon: HALOT
  rationale: Aquí דמה tiene valor de estimar o suponer mentalmente. «Pensaste» es la opción más clara en español moderno.
- source_word: הֱיוֹת אֶהְיֶה כָמוֹךָ
  english_pob_choice: that I was altogether like you
  chosen_spanish: que yo sería del todo como tú
  alternatives_spanish:
  - que yo era como tú
  - que yo iba a ser como tú
  - que yo sería como tú
  lexicon: HALOT
  rationale: La construcción expresa el contenido de la falsa conclusión del hablante. Se conserva la tensión temporal del hebreo con una forma de futuro en estilo indirecto y se mantiene la fuerza de «del todo» para reflejar la equivalencia moral plena que el inglés POB marcó con «altogether».
- source_word: אוֹכִיחֲךָ
  english_pob_choice: I will rebuke you
  chosen_spanish: te reprenderé
  alternatives_spanish:
  - te corregiré
  - te reprobaré
  - te convenceré
  lexicon: HALOT
  rationale: En este marco judicial-moral, «reprenderé» comunica bien la acusación divina. «Convenceré» sería demasiado interpretativo; «corregiré» debilita el matiz forense.
- source_word: וְאֶעֶרְכָה
  english_pob_choice: and set the case
  chosen_spanish: y pondré el caso
  alternatives_spanish:
  - y lo pondré en orden
  - y presentaré el caso
  - y lo dispondré
  lexicon: HALOT
  rationale: El verbo literalmente significa «ordenar/poner en orden». En contexto de querella divina, «poner el caso» deja claro el sentido forense sin borrar la metáfora de disponer los cargos ordenadamente.
- source_word: לְעֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: delante de tus ojos
  alternatives_spanish:
  - ante tus ojos
  - frente a tus ojos
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera directa y transparente. «Delante de tus ojos» comunica la exposición pública y evidente del caso.
theological_decisions:
- issue: Silencio divino como paciencia, no aprobación
  english_pob_reading: The verse is rendered to show God's temporary silence as forbearance, not approval, followed by judicial rebuke.
  chosen_spanish_reading: El silencio de Dios se entiende como paciencia y tolerancia provisional, no como aprobación, y luego viene la reprensión judicial.
  alternative_spanish_readings:
  - El silencio de Dios podría leerse de manera más neutra, sin explicitar la idea de paciencia.
  - También podría traducirse simplemente «y callé», dejando implícito el matiz forense.
  rationale: El contexto inmediato es una querella de pacto, no una mera observación moral. Por eso la traducción mantiene el contraste entre la paciencia divina y la posterior confrontación judicial.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto coincide con el pasaje hebreo y con la lectura auditada en inglés; se conserva la tensión entre el silencio divino y la acción judicial posterior, sin eliminar la ambigüedad léxica de וְאֶעֶרְכָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero en este versículo el hebreo no contiene el tetragrámaton ni un equivalente directo.
  - «Reprender» conserva el matiz forense de אוֹכִיחֲךָ mejor que opciones más suaves.
  - «Pondré el caso» mantiene la imagen judicial sin convertirla en paráfrasis extensa.
  - «Delante de tus ojos» preserva la frase idiomática hebrea de exposición clara y evidente.
