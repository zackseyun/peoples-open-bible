translation:
  language: es
  text: Ahora escucha mi voz; te aconsejaré, y que Dios esté contigo[a]. Sé tú para el pueblo delante de Dios[b], y llevarás los asuntos[c] a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y Dios esté contigo». La forma hebrea expresa un deseo o bendición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Representarás al pueblo delante de Dios».'
    reason: alternative_reading
  - marker: c
    text: «Los asuntos» se refiere aquí a los casos o disputas del pueblo llevados para decisión.
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora pues
  - Ya
  lexicon: HALOT
  rationale: Marca temporal y discursiva de transición; «Ahora» conserva la inmediatez del hebreo con un registro natural en español.
- source_word: שְׁמַע בְּקֹלִי
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - escucha mi voz y obedece
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática «oir/escuchar la voz de»; en español «escucha mi voz» preserva la imagen sin sobrecargarla con «obedecer».
- source_word: אִיעָצְךָ
  english_pob_choice: I will advise you
  chosen_spanish: te aconsejaré
  alternatives_spanish:
  - te aconsejo
  - te daré consejo
  lexicon: HALOT
  rationale: El verbo de יעץ expresa aconsejar/counsel; el futuro español refleja el valor directivo de la frase y su tono de instrucción.
- source_word: וִיהִי אֱלֹהִים עִמָּךְ
  english_pob_choice: and God be with you
  chosen_spanish: y que Dios esté contigo
  alternatives_spanish:
  - y Dios esté contigo
  - y que Dios sea contigo
  lexicon: HALOT
  rationale: El hebreo tiene matiz jussivo de deseo o bendición; en español «que Dios esté contigo» comunica mejor esa modalidad que una simple coordinación declarativa.
- source_word: הֱיֵה אַתָּה לָעָם
  english_pob_choice: You be for the people
  chosen_spanish: Tú sé para el pueblo
  alternatives_spanish:
  - Sé tú para el pueblo
  - Tú serás para el pueblo
  lexicon: HALOT
  rationale: Se conserva la estructura abierta del hebreo, evitando una paráfrasis interpretativa como «representa». «Sé para el pueblo» reproduce la función relacional del original.
- source_word: מוּל הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en presencia de Dios
  lexicon: HALOT
  rationale: «Delante de Dios» es una forma natural y fiel para la preposición de ubicación/oposición, y mantiene el tono sobrio del texto.
- source_word: וְהֵבֵאתָ
  english_pob_choice: you shall bring
  chosen_spanish: y tú llevarás
  alternatives_spanish:
  - y tú traerás
  - y presentarás
  lexicon: HALOT
  rationale: El verbo הביא puede ser «traer/llevar/presentar» según contexto; aquí se trata de llevar los casos a la instancia divina, por lo que «llevarás» conserva el movimiento hacia Dios sin sonar técnico.
- source_word: הַדְּבָרִים
  english_pob_choice: the matters
  chosen_spanish: los asuntos
  alternatives_spanish:
  - los casos
  - las causas
  - los litigios
  lexicon: HALOT
  rationale: En este contexto judicial, דברים se refiere a los casos o asuntos sometidos a decisión. «Asuntos» mantiene amplitud semántica sin estrecharse demasiado.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - hacia Dios
  lexicon: HALOT
  rationale: La meta del movimiento verbal se expresa naturalmente con «a Dios» en español; se evita añadir explicaciones que el hebreo no explicita.
theological_decisions:
- issue: Renderización de אֱלֹהִים en contexto narrativo/judicial
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el verdadero Dios
  rationale: Aunque la forma hebrea es morfológicamente plural, el contexto se refiere inequívocamente al Dios de Israel. «Dios» es la opción directa y no introduce énfasis no presente en el texto.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Función mediadora de Moisés entre el pueblo y Dios
  english_pob_reading: You be for the people before God
  chosen_spanish_reading: Tú sé para el pueblo delante de Dios
  alternative_spanish_readings:
  - Tú representarás al pueblo delante de Dios
  - Tú estarás por el pueblo ante Dios
  rationale: Se preserva la estructura del hebreo sin traducirla de inmediato a un glosa jurídica más interpretativa. El sentido de representación queda implícito en el enunciado y en el contexto.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: Tomé en cuenta la revisión final del auditorio inglés, que prefirió una forma futura más formal para וְהֵבֵאתָ y mantuvo la lectura no interpretativa de la función de Moisés. La versión española conserva esa decisión con «llevarás» y mantiene la estructura source-grounded del verso, sin convertir «delante de Dios» en una glosa explicativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים conforme al contexto singular y no se añadió «SEÑOR», que no corresponde aquí.
  - Se mantuvo «asuntos» como equivalente amplio de הַדְּבָרִים, con nota para su sentido judicial.
  - Se evitó «siervo» o «representa» en el texto principal porque el hebreo permite una lectura más abierta; la alternativa interpretativa queda en nota.
  - «Que Dios esté contigo» refleja el matiz jussivo sin perder naturalidad en español.
  - La puntuación y el orden buscan ser publicables y fieles al encadenamiento imperativo-jussivo del hebreo.
