base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/013.yaml
  text: But if a priest’s daughter becomes a widow or divorced[a], and has no offspring, and returns to her father’s house as in her youth, she may eat from her father’s food[b]; but no outsider may eat of it.
  footnotes:
  - marker: a
    text: Literally, 'her father’s bread.' Here 'bread' likely refers more broadly to the food provisions of the priestly household.
    reason: lexical_alternative
  - marker: b
    text: Or 'no unauthorized person.' The Hebrew term refers to someone outside the permitted priestly circle, not necessarily a foreigner by ethnicity.
    reason: lexical_alternative
