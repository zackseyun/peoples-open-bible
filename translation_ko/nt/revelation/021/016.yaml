source:
  edition: SBLGNT
  text: καὶ ἡ πόλις τετράγωνος κεῖται, καὶ τὸ μῆκος αὐτῆς ⸀ὅσον τὸ πλάτος. καὶ ἐμέτρησεν τὴν πόλιν τῷ καλάμῳ ἐπὶ ⸀σταδίους δώδεκα ⸀χιλιάδων· τὸ μῆκος καὶ τὸ πλάτος καὶ τὸ ὕψος αὐτῆς ἴσα ἐστίν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/016.yaml
  text: 'And the city lies foursquare[a], and its length is as great as its width. And he measured the city with the measuring rod: twelve thousand stadia[c][b]. Its length and width and height are equal.'
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; twelve thousand stadia is roughly 1,380 miles or 2,220 kilometers, depending on the exact length assumed.
    reason: cultural_note
  - marker: b
    text: Or, more interpretively, 'the city is a perfect cube.' The Greek states directly that its length and width and height are equal.
    reason: alternative_reading
  - marker: c
    text: Or 'with the reed.' The Greek term can mean 'reed,' but here it refers to a measuring instrument.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 성은 정사각형으로 자리잡고 있었고, 그 길이가 너비와 같았습니다. 그가 그 측량 갈대로 성을 재었는데, 만 이천 스타디온이었습니다. 그 길이와 너비와 높이가 똑같았습니다.
  philosophy: optimal-equivalence
