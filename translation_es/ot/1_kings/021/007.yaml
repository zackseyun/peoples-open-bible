translation:
  language: es
  text: 'Entonces Jezabel, su esposa, le dijo: «¿Ahora tú gobiernas Israel como rey[a]? Levántate, come pan y que tu corazón se alegre[b]; yo te daré la viña de Nabot el jezreelita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora tú estás ejerciendo realeza sobre Israel»; el hebreo puede leerse como una afirmación o un reproche, no solo como pregunta.'
    reason: alternative_reading
  - marker: b
    text: «Come pan» es un modismo hebreo para tomar una comida.
    reason: cultural_note
lexical_decisions:
- source_word: וַתֹּאמֶר אֵלָיו
  english_pob_choice: Then ... said to him
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» comunica bien la secuencia en español sin perder el flujo narrativo.
- source_word: אִיזֶבֶל אִשְׁתּוֹ
  english_pob_choice: Jezebel his wife
  chosen_spanish: Jezabel, su esposa
  alternatives_spanish:
  - Jezabel, su mujer
  - su esposa Jezabel
  lexicon: HALOT
  rationale: Conserva la apposición relacional y mantiene el identificador de la hablante como esposa de Ahab/Acab.
- source_word: אַתָּה עַתָּה תַּעֲשֶׂה מְלוּכָה עַל יִשְׂרָאֵל
  english_pob_choice: Do you now govern Israel as king?
  chosen_spanish: ¿Ahora tú gobiernas sobre Israel como rey?
  alternatives_spanish:
  - ¿Ahora estás ejerciendo el reinado sobre Israel?
  - ¿Ahora gobiernas Israel como rey?
  - ¡Ahora sí estás reinando sobre Israel!
  lexicon: HALOT
  rationale: El hebreo puede leerse como pregunta retórica o como afirmación/taunt. Se eligió una pregunta retórica natural en español, manteniendo el verbo «gobiernas» y la referencia explícita a «como rey» para preservar la fuerza idiomática de מְלוּכָה.
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Levanta
  lexicon: HALOT
  rationale: Imperativo de קום; «levántate» es la forma idiomática y clara en español.
- source_word: אֱכָל לֶחֶם
  english_pob_choice: eat bread
  chosen_spanish: come pan
  alternatives_spanish:
  - come
  - toma alimento
  lexicon: HALOT
  rationale: Se conserva la imagen semítica literal para reflejar el modismo, tal como la POB inglesa retiene «bread».
- source_word: וְיִטַב לִבֶּךָ
  english_pob_choice: and let your heart be cheerful
  chosen_spanish: alégrese tu corazón
  alternatives_spanish:
  - y esté alegre tu corazón
  - y regocíjese tu corazón
  - y sea agradable tu corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el corazón «sea bueno». En español, «alégrese tu corazón» comunica el estado interior deseado sin perder la metáfora del corazón como sede de disposición.
- source_word: אֲנִי אֶתֵּן לְךָ
  english_pob_choice: I will give you
  chosen_spanish: yo te daré
  alternatives_spanish:
  - yo mismo te daré
  - te daré
  lexicon: HALOT
  rationale: Se conserva el énfasis del pronombre explícito con «yo», sin sobrecargar el estilo español.
- source_word: כֶּרֶם נָבוֹת הַיִּזְרְעֵאלִי
  english_pob_choice: the vineyard of Naboth the Jezreelite
  chosen_spanish: la viña de Nabot el jezreelita
  alternatives_spanish:
  - el viñedo de Nabot el jezreelita
  - la viña perteneciente a Nabot el jezreelita
  - la viña de Nabot, el jezreelita
  lexicon: HALOT
  rationale: «Viña» reproduce bien כֶּרֶם en contexto agrícola y narrativo; «jezreelita» conserva el gentilicio estándar, equivalente al inglés POB.
theological_decisions:
- issue: 'Fuerza de la primera cláusula de Jezabel: pregunta retórica o afirmación/taunt'
  english_pob_reading: Do you now govern Israel as king?; footnote allows an assertive/taunting reading
  chosen_spanish_reading: ¿Ahora tú gobiernas sobre Israel como rey?
  alternative_spanish_readings:
  - Ahora tú gobiernas sobre Israel como rey.
  - ¿Ahora gobiernas Israel como rey?
  rationale: El hebreo carece de partícula interrogativa explícita, por lo que admite tanto lectura interrogativa como asertiva. En contexto, Jezabel reprende la pasividad de Acab y lo impulsa a actuar; la pregunta retórica preserva esa tensión y deja abierta la lectura alternativa mediante nota.
  doctrine_reference: Principio POB de preservar tensiones textuales y anotar alternativas cuando el hebreo lo permite; cf. la nota crítica inglesa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión auditada del inglés POB de tratar la primera cláusula como pregunta retórica, pero la formula en español con una sintaxis más natural («¿Ahora tú gobiernas sobre Israel como rey?») sin perder la ambigüedad registrada. También se conserva el modismo «come pan» con nota cultural, en paralelo al expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Viña» se eligió por ser el equivalente más natural de כֶּרֶם en una escena de propiedad agrícola.
  - «Jezreelita» se mantiene como gentilicio transparente y consistente con el uso bíblico.
  - Se conserva «corazón» como sede de disposición interior, evitando una paráfrasis psicológica excesiva.
