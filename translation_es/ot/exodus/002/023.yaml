    reason: lexical_alternative
  revision_rationale: 'La traducción base es fiel, pero necesita una reparación menor: reubicar la nota temporal en la frase correcta, añadir la nota sobre «los hijos de Israel» que sí está documentada en el rastro inglés, y sustituir la nota innecesaria sobre «clamaron» por la nota léxica pertinente para עֲבֹדָה. También se normaliza la redacción de las notas en español.'
