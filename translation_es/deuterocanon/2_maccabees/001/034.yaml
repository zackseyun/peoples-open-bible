translation:
  language: es
  text: Entonces el rey lo cercó y lo consagró[a], después de comprobar el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo convirtió en un santuario». El griego puede entenderse tanto como predicativo («lo hizo sagrado») como en sentido sustantivo («lo hizo un santuario»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιφράξας
  english_pob_choice: enclosed
  chosen_spanish: cercó
  alternatives_spanish:
  - rodeó
  - cerró con un cerco
  - acotó
  lexicon: LSJ
  rationale: El participio aoristo de περιφράσσω expresa la acción concreta de cercar o rodear con una barrera. 'Cercó' conserva la imagen física sin alargar innecesariamente la frase y suena natural en español.
- source_word: ἱερὸν
  english_pob_choice: made it sacred
  chosen_spanish: lo hizo sagrado
  alternatives_spanish:
  - lo hizo santo
  - lo consagró
  - lo convirtió en santuario
  lexicon: LSJ
  rationale: Aquí ἱερόν funciona predicativamente con ἐποίησεν, no como un sustantivo fijo. 'Lo hizo sagrado' refleja esa lectura y evita añadir explícitamente 'santuario' al texto principal, aunque esa posibilidad se mantiene en nota.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - convirtió
  - estableció
  lexicon: LSJ
  rationale: El verbo básico es 'hacer'. En combinación con ἱερόν, 'lo hizo sagrado' reproduce bien la construcción griega con una formulación natural en español.
- source_word: δοκιμάσας
  english_pob_choice: after testing
  chosen_spanish: después de comprobar
  alternatives_spanish:
  - tras examinar
  - después de probar
  - habiendo verificado
  lexicon: LSJ
  rationale: El participio marca una acción anterior a la principal. 'Comprobar' comunica verificación o prueba, que es el matiz más probable aquí, y funciona mejor que una traducción demasiado técnica.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - el hecho
  - el caso
  lexicon: LSJ
  rationale: πρᾶγμα es un término amplio para la cosa, asunto o situación tratada. 'El asunto' mantiene la generalidad del griego y es idiomático en español.
theological_decisions:
- issue: Valor de ἱερὸν tras ἐποίησεν
  english_pob_reading: 'predicative adjective: the king made the place sacred'
  chosen_spanish_reading: el rey lo hizo sagrado
  alternative_spanish_readings:
  - el rey lo convirtió en santuario
  - el rey lo hizo un lugar santo
  rationale: La sintaxis griega favorece un complemento predicativo más que un sustantivo explícito. En español, 'lo hizo sagrado' preserva esa ambigüedad sin forzar la idea de una construcción de templo o santuario que el texto no dice con claridad.
  doctrine_reference: 'Translation philosophy: fidelidad al griego y preservación de ambigüedades lexicales relevantes'
- issue: Relación entre el gesto del rey y la verificación previa
  english_pob_reading: after testing the matter
  chosen_spanish_reading: después de comprobar el asunto
  alternative_spanish_readings:
  - tras verificar el caso
  - después de examinar la situación
  rationale: El participio indica que la consagración siguió a una comprobación. 'Comprobar' preserva esa secuencia y el carácter de validación que el inglés POB destacó con 'testing'.
  doctrine_reference: Lectura temporal y aspectual del participio aoristo
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del POB en inglés: se evita añadir un sustantivo como ''lugar'' que no está explícito en el griego y se conserva la ambigüedad de ἱερὸν mediante una nota alternativa, tal como el audit trail distingue entre lectura predicativa y sustantiva.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton ni κύριος.
  - Se usa 'sagrado' en el texto principal para reflejar ἱερὸν como predicativo; 'santo' queda como alternativa posible pero menos neutra en este contexto.
  - '''Comprobar'' se elige por claridad idiomática en español y por su cercanía al sentido de verificación del participio griego.'
