translation:
  language: es
  text: La espada está afuera[a], y la pestilencia y la hambruna están adentro. El que esté en el campo morirá a espada, y al que esté en la ciudad[b], la hambruna y la pestilencia lo consumirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'plaga' para 'pestilencia' (דֶּבֶר).
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la hambruna y la pestilencia lo comerán'; 'lo consumirán' traduce de manera idiomática la metáfora hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la guerra
  - la espada del juicio
  lexicon: HALOT
  rationale: חֶרֶב nombra literalmente una espada y, en contextos proféticos de juicio, funciona como metonimia de muerte violenta por guerra. 'La espada' conserva la imagen concreta y el paralelismo tradicional del juicio.
- source_word: בַּחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - en la calle
  - al exterior
  - fuera
  lexicon: HALOT
  rationale: חוּץ contrasta con el interior; 'afuera' es natural en español y mantiene bien el contraste con 'adentro' en la siguiente mitad del versículo.
- source_word: הַדֶּבֶר
  english_pob_choice: pestilence
  chosen_spanish: la pestilencia
  alternatives_spanish:
  - la plaga
  - la enfermedad
  lexicon: HALOT
  rationale: דֶּבֶר designa una plaga epidémica como juicio. 'Pestilencia' conserva el registro profético formal mejor que el más general 'plaga'.
- source_word: הָרָעָב
  english_pob_choice: famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la escasez
  lexicon: HALOT
  rationale: רָעָב aquí apunta a carestía y hambre generalizada. 'Hambre' es claro y fiel; 'hambruna' sería posible, pero suena más técnico y menos paralelo al texto hebreo.
- source_word: מִבָּיִת
  english_pob_choice: inside the house
  chosen_spanish: adentro
  alternatives_spanish:
  - dentro
  - en el interior
  - adentro de la casa
  lexicon: HALOT
  rationale: La revisión inglesa retiró 'the house' porque el hebreo contrasta interior/exterior sin nombrar 'la casa'. 'Adentro' expresa el interior de modo breve y natural, sin añadir un sustantivo ausente.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: whoever is in the field
  chosen_spanish: El que esté en el campo
  alternatives_spanish:
  - Quien esté en el campo
  - El que esté en el campo abierto
  lexicon: HALOT
  rationale: La relativa distributiva hebrea pide una forma singular genérica. 'El que esté en el campo' preserva esa singularidad y resulta idiomático en español.
- source_word: בַּחֶרֶב יָמוּת
  english_pob_choice: will die by the sword
  chosen_spanish: morirá a espada
  alternatives_spanish:
  - morirá por la espada
  - morirá por medio de la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'morirá por/en la espada'. 'Morirá a espada' es una construcción española estable, concisa y fiel al valor instrumental del original.
- source_word: וַאֲשֶׁר בָּעִיר
  english_pob_choice: and whoever is in the city
  chosen_spanish: y el que esté en la ciudad
  alternatives_spanish:
  - y quien esté en la ciudad
  - y el que esté en la urbe
  lexicon: HALOT
  rationale: Se mantiene la misma construcción distributiva singular que en la línea anterior, conservando el contraste campo/ciudad.
- source_word: רָעָב וָדֶבֶר
  english_pob_choice: famine and pestilence
  chosen_spanish: el hambre y la pestilencia
  alternatives_spanish:
  - la pestilencia y el hambre
  - el hambre y la plaga
  lexicon: HALOT
  rationale: 'La segunda cola hebrea invierte el orden: hambre y pestilencia. Se preserva ese orden en español para respetar la secuencia del texto fuente.'
- source_word: יֹאכֲלֶנּוּ
  english_pob_choice: will consume him
  chosen_spanish: lo consumirán
  alternatives_spanish:
  - lo devorarán
  - lo comerán
  lexicon: HALOT
  rationale: אָכַל significa 'comer', pero aquí es una metáfora personificada con 'hambre y pestilencia' como sujetos. 'Consumirán' reproduce bien el efecto idiomático sin sonar áspero en español.
theological_decisions:
- issue: Triada de juicio profético
  english_pob_reading: Retain the concrete triad 'sword... pestilence... famine' as covenant-judgment language without expanding it interpretively.
  chosen_spanish_reading: Conservar la tríada concreta 'espada... pestilencia... hambre' como lenguaje de juicio, sin expandirla interpretativamente.
  alternative_spanish_readings:
  - Parafrasear como desastre, enfermedad y escasez
  - Explicitar 'guerra' en vez de 'espada'
  rationale: El versículo usa una fórmula profética estable. Mantener los tres términos concretos preserva la fuerza literaria y teológica del juicio sin añadir explicación ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referencia distributiva singular masculina
  english_pob_reading: Use singular 'whoever... him'
  chosen_spanish_reading: Usar 'el que... lo' en singular distributivo
  alternative_spanish_readings:
  - Usar plural inclusivo 'los que... los'
  - Neutralizar con 'quien... les'
  rationale: El hebreo emplea construcciones distributivas singulares y sufijo masculino singular. El español conserva esa forma para ser fiel al número y a la gramática del texto fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó 'the house' porque el hebreo dice 'from inside/within', no 'inside the house'. La versión española sigue esa corrección con 'adentro' y no añade 'casa'. También conserva el orden hebreo de la segunda cola ('hambre y pestilencia') y el singular distributivo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece, así que no se usa.
  - Se traduce דֶּבֶר con 'pestilencia', coherente con la elección del POB en inglés; la nota permite 'plaga' como alternativa válida.
  - Se conserva el singular distributivo 'el que... lo' para reflejar el hebreo y evitar pluralización no requerida.
  - '''Adentro'' expresa el contraste con ''afuera'' sin introducir un sustantivo inexistente en el hebreo.'
