lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  - Y vino a suceder
  lexicon: HALOT
  rationale: La forma narrativa introduce el siguiente acontecimiento; en español, 'Entonces ... vino' conserva la secuencia sin el giro arcaizante 'y aconteció'.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, 'la palabra' reproduce de manera directa y reconocible el hebreo y mantiene el carácter técnico de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española establecida en este proyecto, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: La preposición indica dirección o destinatario; en español, 'a' es la equivalencia natural con Jeremías como receptor.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: Convención onomástica
  rationale: Los nombres propios se transliteran según el uso estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo; 'diciendo' es la forma idiomática en español y marca que sigue el contenido del mensaje.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Para el español del proyecto se emplea 'Yahvé' como reproducción del nombre personal de Dios, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje es una fórmula narrativa breve y estable; el borrador sigue de cerca el hebreo y coincide con la lectura auditada en inglés, ajustando únicamente la realización natural en español y el nombre divino conforme a la norma del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con los criterios del proyecto.
  - '''Entonces ... vino'' conserva la estructura narrativa sin sonar arcaico.'
  - '''Diciendo'' reproduce la partícula introductoria del discurso sin añadir contenido.'
