theological_decisions:
- issue: Whether to specify the spirits as demons or unclean spirits in the main text
  chosen_reading: spirits
  alternative_readings:
  - unclean spirits
  - demons
  rationale: The immediate context identifies the referent as an unclean spirit, but this verse itself uses only πνεύματα. To avoid importing words not present in the clause, the main text keeps 'spirits' while the context supplies their hostile character through 'more evil.'
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
- issue: Rendering ἀνθρώπου as 'man' rather than 'person'
  chosen_reading: that man
  alternative_readings:
  - that person
  rationale: The referent is a particular individual in Jesus's illustration, not a generic abstraction. This aligns with the gender-accurate policy and avoids unnecessary neutralization.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
