translation:
  language: es
  text: Yahvé Dios plantó un jardín en Edén[a], al oriente, y allí puso al hombre que había formado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el oriente». La frase hebrea puede indicar ubicación («al oriente») o dirección/orientación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטַּע
  english_pob_choice: planted
  chosen_spanish: plantó
  alternatives_spanish:
  - sembró
  - estableció
  lexicon: HALOT
  rationale: נטע en este contexto describe la acción de establecer/plantar un jardín; en español, «plantó» es el equivalente directo, natural y fiel a la imagen agrícola.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - Yahvé, Dios
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino como «Yahvé» según la política del proyecto, y אֱלֹהִים se traduce «Dios»; así se mantiene el valor del nombre de pacto sin enmascararlo con una convención litúrgica.
- source_word: גַּן
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - parque
  lexicon: HALOT
  rationale: גַּן puede referir a un espacio cultivado y cercado; «jardín» es la opción más clara y ampliamente inteligible en español para este contexto narrativo.
- source_word: בְעֵדֶן
  english_pob_choice: in Eden
  chosen_spanish: en Edén
  alternatives_spanish:
  - en el Edén
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar, por lo que se translitera como «Edén».
- source_word: מִקֶּדֶם
  english_pob_choice: in the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - en el oriente
  - hacia el oriente
  - al este
  lexicon: HALOT
  rationale: La frase hebrea admite una referencia locativa u orientacional. «Al oriente» conserva bien esa flexibilidad y suena natural en español bíblico moderno; se evita fijar de manera demasiado estrecha una sola lectura.
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - situó
  lexicon: HALOT
  rationale: שׂים significa «poner/colocar». «Puso» es la equivalencia simple y adecuada para la secuencia narrativa.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: El adverbio indica ubicación; «allí» es la forma más fluida y formal en español.
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - a la humanidad
  lexicon: HALOT
  rationale: En este contexto singular y definido, אָדָם refiere al individuo recién formado. «Al hombre» conserva la referencia narrativa sin generalizar a la humanidad.
- source_word: אֲשֶׁר יָצָר
  english_pob_choice: whom he had formed
  chosen_spanish: que había formado
  alternatives_spanish:
  - a quien había formado
  - que formó
  lexicon: HALOT
  rationale: יצר significa «formar». En español, la construcción relativa «que había formado» expresa bien la anterioridad de la acción respecto de «puso» sin añadir elementos ajenos al texto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto pide representarlo como «Yahvé» en el cuerpo principal. Se evita sustituirlo por un título genérico, para conservar el nombre del pacto según la política del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of הָאָדָם
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: Aquí אָדָם se refiere al individuo específico ya formado, no a la humanidad en abstracto. «El hombre» mantiene esa precisión contextual y la coherencia con el relato de Génesis 2.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context)'
- issue: Treatment of מִקֶּדֶם
  english_pob_reading: in the east / eastward
  chosen_spanish_reading: al oriente
  alternative_spanish_readings:
  - en el oriente
  - hacia el oriente
  - al este
  rationale: La expresión hebrea es ambigua entre ubicación y dirección. «Al oriente» permite conservar esa tensión sin resolverla de forma excesiva, y en español resulta sobria y natural.
  doctrine_reference: English POB footnote on lexical alternative for מִקֶּדֶם
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail en inglés: mantiene Yahvé como nombre divino, conserva la referencia individual de הָאָדָם como «el hombre» y preserva la ambigüedad de מִקֶּדֶם mediante una nota de alternativa léxica. No se aplicaron revisiones posteriores al texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estilo del proyecto.
  - Se mantiene «Dios» para אֱלֹהִים sin mayúsculas especiales adicionales.
  - «Al oriente» evita un calco excesivo y conserva la posible ambigüedad locativa/direccional del hebreo.
  - «El hombre» respeta el referente singular definido del texto hebreo.
