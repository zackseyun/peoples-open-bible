translation:
  language: es
  text: El campo está devastado; la tierra está de duelo[a], porque el grano está devastado, el mosto se ha secado y el aceite ha faltado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se lamenta». El hebreo personifica la tierra como si estuviera de duelo, en paralelo con el campo devastado.
    reason: lexical_alternative
  - marker: b
    text: O «el aceite fresco se ha marchitado» / «el aceite de oliva ha faltado». El término hebreo se refiere al aceite fresco, por lo general de oliva, como parte de la tríada de productos básicos «grano, mosto y aceite».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁדַּד
  english_pob_choice: is devastated
  chosen_spanish: está devastado
  alternatives_spanish:
  - está arruinado
  - está asolado
  - está despojado
  lexicon: HALOT
  rationale: El pasivo expresa ruina violenta o desolación. «Está devastado» conserva la fuerza y suena natural en español.
- source_word: שָׂדֶה
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - campo abierto
  - terreno
  - campo cultivado
  lexicon: HALOT
  rationale: «Campo» comunica bien la imagen y evita una repetición demasiado técnica con «tierra» en el segundo hemistiquio.
- source_word: אָבְלָה
  english_pob_choice: mourns
  chosen_spanish: llora
  alternatives_spanish:
  - se lamenta
  - muestra duelo
  - se aflige
  lexicon: HALOT
  rationale: El hebreo personifica la tierra como alguien en duelo. «Llora» conserva la personificación poética con claridad natural en español.
- source_word: אֲדָמָה
  english_pob_choice: ground
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - terreno
  - suelo de cultivo
  lexicon: HALOT
  rationale: Distingue bien de שָׂדֶה y mantiene el paralelismo poético campo / tierra.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Introduce la razón del lamento. En español, «porque» expresa con claridad la causalidad del verso.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano cereal
  - cereal
  - cosecha de grano
  lexicon: HALOT
  rationale: «Grano» es breve, natural y suficientemente general para el cereal producido.
- source_word: הוֹבִישׁ
  english_pob_choice: has dried up
  chosen_spanish: se ha secado
  alternatives_spanish:
  - se ha marchitado
  - se ha agotado
  - se ha secado por completo
  lexicon: HALOT
  rationale: En contexto agrícola, el causativo indica pérdida de humedad o vigor. «Se ha secado» preserva la condición resultante con buena fluidez.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - mosto fresco
  - vino recién hecho
  lexicon: HALOT
  rationale: «Mosto» refleja con precisión el producto agrícola recién exprimido o fermentando, y evita la ambigüedad de «vino» en español moderno.
- source_word: אֻמְלַל
  english_pob_choice: has failed
  chosen_spanish: ha desfallecido
  alternatives_spanish:
  - se ha marchitado
  - se ha agotado
  - ha languidecido
  lexicon: HALOT
  rationale: El verbo expresa debilitamiento o marchitez. «Ha desfallecido» comunica bien la idea de un producto que pierde vigor o rendimiento.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite fresco
  - óleo
  lexicon: HALOT
  rationale: Tras la revisión inglesa hacia «oil», «aceite» es el equivalente directo y no añade precisión no explicitada por el hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó יִצְהָר de «fresh oil» a «oil». En español se siguió esa corrección con «aceite», evitando especificar «aceite de oliva» en el texto principal. También se mantuvo la personificación poética de אָבְלָה con una opción natural en español, anclada mediante nota alternativa.
  spanish_consistency_notes:
  - 'Se distinguieron dos términos territoriales: שָׂדֶה → «campo» y אֲדָמָה → «tierra», para conservar el paralelismo.'
  - Se evitó traducir תִּירוֹשׁ simplemente como «vino» para no perder el matiz agrícola de producto nuevo.
  - «Aceite» sigue la revisión auditada y no sobreespecifica el tipo de aceite en el texto principal.
  - La nota [a] está anclada explícitamente en «llora[a]» para cumplir con la trazabilidad de la alternativa léxica.
