source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 2. Καίγε διὰ τὰ ἐνύπνια⁵ *προσεθέμην αὐτῷ τὸ μῖσος⁶, καὶ ἤθελον αὐτὸν⁷ ἐκλεῖξαι⁸ *ἐκ γῆς⁹ ⌈ζώντων⌉¹⁰, ὃν τρόπον¹¹ ἐκλείχει¹² ὁ μόσχος τὰ χλωρὰ *τοῦ πεδίου¹³.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/002/002.yaml
  text: And because of the dreams I added hatred toward him, and I wanted to lick him up from the land of the living, as a calf licks up the green growth of the field.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:45Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y a causa de los sueños añadí odio contra él, y quise borrarlo[a] de la tierra de los vivientes, como el ternero lame los brotes verdes del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'lamerlo'; el verbo griego ἐκλεῖξαι es concreto, pero el revision_pass inglés optó por el sentido idiomático 'borrar/consumir' (wipe him out), preservando el símil del ternero que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνύπνια
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - visiones oníricas
  lexicon: BDAG
  rationale: Rendición directa; el contexto son los sueños de José.
- source_word: προσεθέμην ... τὸ μῖσος
  english_pob_choice: I added hatred
  chosen_spanish: añadí odio
  alternatives_spanish:
  - aumenté mi odio
  - acrecenté el odio
  lexicon: BDAG
  rationale: Conserva la imagen verbal de un odio que se va acumulando, más que un mero estado emocional.
- source_word: ἐκλεῖξαι
  english_pob_choice: to lick ... up / to wipe out
  chosen_spanish: lamerlo
  alternatives_spanish:
  - consumirlo
  - arrasar con él
  lexicon: LSJ
  rationale: El símil del ternero que sigue exige el verbo concreto 'lamer'; una traducción idiomática como 'aniquilar' perdería la imagen. Se añade nota porque la decisión inglesa más reciente fue 'wipe out'.
- source_word: ἐκ γῆς ζώντων
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de entre los vivos
  lexicon: BDAG
  rationale: Modismo bíblico tradicional, transparente en español y con registro elevado.
- source_word: τὰ χλωρὰ τοῦ πεδίου
  english_pob_choice: the green growth of the field
  chosen_spanish: los brotes verdes del campo
  alternatives_spanish:
  - la hierba del campo
  - lo verde del campo
  lexicon: LSJ
  rationale: Capta el sentido neutro plural de la vegetación verde sin sobreespecificar una planta concreta.
translation_notes:
  revision_awareness: El capítulo inglés cambió 'lick him up' a 'wipe him out'; el español prefiere mantener el verbo concreto 'lamer' para preservar el símil, y registra la alternativa idiomática en nota.
  spanish_consistency_notes:
  - '''tierra de los vivientes'' como rendición estándar de ἐκ γῆς ζώντων'
  - '''odio'' para μῖσος en toda la unidad'
