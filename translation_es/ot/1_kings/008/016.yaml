    text: 'O, «y escogí a David». La conjunción hebrea puede leerse de manera coordinada, pero el contexto favorece el contraste: no se había escogido ninguna ciudad, mientras que sí se había escogido a David.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la ubicación y el contenido de las notas para que coincidan con el expediente auditado: la explicación del modismo ''casa... mi nombre'' pasa a [a], y la alternativa conjuntiva/adversativa de וָאֶבְחַר se documenta en [b] junto a ''pero''. También se reemplazó ''para que estuviera sobre'' por ''para estar al frente de'' para mejorar la naturalidad del español sin convertir el sentido en ''gobernar'' de forma excesivamente interpretativa. No se requiere adjudicación adicional.'
