review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la mayor parte del versículo: mantiene la confrontación directa («estoy contra ti»), la metáfora de «monte», el nombre divino «Yahvé», el gesto judicial de extender la mano y la imagen de hacerlo rodar desde las peñas. Sin embargo, hay dos problemas relevantes: la nota [b] está anclada en «tierra» pero su texto repite la frase principal en vez de ofrecer la alternativa correcta («la tierra»/«el país» frente a «la tierra» en sentido mundial), y «monte de incendio» no refleja tan bien como debería el resultado de לְהַר שְׂרֵפָה, que en el expediente inglés se entiende mejor como «monte quemado» o equivalente resultativo.'
  spanish_quality_summary: El español es claro y de registro bíblico legible. «He aquí» y «oh» son aceptables en un tono profético, aunque algo tradicionales. La principal mejora de legibilidad y fidelidad está en reemplazar «monte de incendio», que suena menos natural y puede sugerir una abstracción o un lugar propenso a incendios, no un monte consumido por el fuego. También conviene corregir la nota [b] para que no sea errónea ni redundante.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אָרֶץ → «tierra» es defendible en contexto universal, con nota de alternativa; la metáfora de הַר se conserva. No hay conflictos mayores de glosario. La decisión «dice Yahvé» es aceptable, aunque «declara Yahvé» sería algo más cercana a נְאֻם; no es necesario forzar cambio.'
  issues:
  - severity: high
    issue: La nota al pie [b] es incorrecta y no corresponde a la alternativa léxica documentada.
    rationale: El texto principal ya dice «destructor de toda la tierra[b]», pero la nota ofrece otra vez «destructor de toda la tierra» en vez de aclarar la alternativa de אָרֶץ («tierra»/«país», o «toda la tierra»/«todo el país» según contexto). Esto falla en preservar el expediente auditado y confunde al lector.
  - severity: medium
    issue: «Te convertiré en monte de incendio» no expresa bien el valor resultativo de לְהַר שְׂרֵפָה.
    rationale: Aunque el hebreo es compacto, el POB inglés optó por «a burned mountain». En español, «monte de incendio» suena menos idiomático y puede desviar el sentido. «Monte quemado» preserva mejor el resultado de haber sido consumido por fuego, manteniendo la imagen.
  revised_spanish_text: He aquí[a], yo estoy contra ti, oh monte destructor, dice Yahvé, destructor de toda la tierra[b]. Extenderé mi mano contra ti, te haré rodar desde las peñas, y te convertiré en monte quemado.
  revised_footnotes:
