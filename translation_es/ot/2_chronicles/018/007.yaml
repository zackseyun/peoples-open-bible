translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Josafat: «Todavía hay un hombre por medio de quien podemos consultar a Yahvé[a], pero yo lo odio, porque nunca profetiza bien acerca de mí, sino siempre mal. Es Micaías hijo de Imla». Y Josafat dijo: «No diga el rey así».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por quien podemos consultar a Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֣וֹד אִישׁ אֶחָד
  english_pob_choice: There is still one man
  chosen_spanish: Todavía hay un hombre
  alternatives_spanish:
  - Aún queda un hombre
  - Todavía queda un hombre
  lexicon: HALOT
  rationale: ע֣וֹד con אִישׁ אֶחָד expresa que queda una sola persona disponible. En español, «Todavía hay un hombre» comunica con naturalidad la idea de que aún permanece uno, sin perder el valor de remanente.
- source_word: לִ/דְרוֹשׁ אֶת יְהוָה מֵ/אֹת/וֹ
  english_pob_choice: by whom we may inquire of Yahweh
  chosen_spanish: por quien podemos consultar a Yahvé
  alternatives_spanish:
  - por medio de quien podemos buscar a Yahvé
  - para consultar a Yahvé por medio de él
  lexicon: HALOT
  rationale: דרשׁ con אֶת־יְהוָה en contexto profético suele significar consultar o buscar dirección de Dios, normalmente por medio de un profeta. «Consultar a Yahvé» conserva esa función mediadora sin imponer una paráfrasis más amplia.
- source_word: וַ/אֲנִ֣י שְׂנֵאתִ֗י/הוּ
  english_pob_choice: but I hate him
  chosen_spanish: pero yo lo odio
  alternatives_spanish:
  - y yo lo odio
  - pero lo odio
  lexicon: HALOT
  rationale: El perfecto expresa una actitud estable del hablante. En español, el presente «lo odio» refleja mejor esa disposición continua. Se conserva el contraste adversativo del discurso con «pero».
- source_word: כִּֽי אֵינֶ/נּוּ מִתְנַבֵּ֨א עָלַ֤/י לְ/טוֹבָה֙
  english_pob_choice: because he never prophesies good concerning me
  chosen_spanish: porque nunca profetiza bien acerca de mí
  alternatives_spanish:
  - porque no profetiza bien sobre mí
  - porque jamás profetiza algo bueno acerca de mí
  lexicon: HALOT
  rationale: La forma negativa con participio expresa acción característica, no solo un momento puntual. «Nunca profetiza bien» transmite el hábito señalado por el rey, y «acerca de mí» mantiene el matiz de referencia personal.
- source_word: כִּ֣י כָל יָמָ֣י/ו לְ/רָעָ֔ה
  english_pob_choice: but always evil
  chosen_spanish: sino mal todos los días
  alternatives_spanish:
  - sino siempre mal
  - sino para mal todos sus días
  lexicon: HALOT
  rationale: 'La expresión literal «para mal todos sus días» es idiomática; en español resulta más claro conservar el contraste con «bien/mal» dentro de la profecía: «bien... sino mal». «Todos los días» preserva el valor de continuidad/hábito.'
- source_word: מִיכָ֣יְהוּ בֶן יִמְלָא
  english_pob_choice: Micaiah son of Imla
  chosen_spanish: Micaías hijo de Imla
  alternatives_spanish:
  - Micaías, hijo de Imla
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. «Hijo de» mantiene el patronímico de forma clara y natural en español.
- source_word: אַל יֹאמַ֥ר הַ/מֶּ֖לֶךְ כֵּֽן
  english_pob_choice: Let not the king say so
  chosen_spanish: No diga el rey así
  alternatives_spanish:
  - Que el rey no diga así
  - No hable así el rey
  lexicon: HALOT
  rationale: El אַל + imperfecto expresa prohibición/jussivo. «No diga el rey así» suena respetuoso y reproduce el tono de corrección indirecta de Josafat.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: De acuerdo con la terminología del proyecto, el Tetragrámaton se vierte como «Yahvé», no como «SEÑOR». Esto preserva el nombre propio divino revelado en el hebreo.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Nombre propio de Dios. La línea editorial pide no sustituirlo por un título enmascarado; en español, «Yahvé» es la forma adoptada para mantener esa distinción.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de לִדְרוֹשׁ אֶת־יְהוָה מֵאֹתוֹ
  english_pob_reading: by whom we may inquire of Yahweh
  chosen_spanish_reading: por quien podemos consultar a Yahvé
  alternative_spanish_readings:
  - por medio de quien podemos buscar a Yahvé
  - a través de quien podemos consultar a Yahvé
  rationale: La frase apunta a consultar a Dios mediante un intermediario profético. «Consultar a Yahvé» preserva esa relación sin reducirla a una mera búsqueda abstracta.
  doctrine_reference: HALOT, uso profético de דרשׁ
- issue: Intensidad de la descalificación de Micaías
  english_pob_reading: I hate him... he never prophesies good concerning me, but always evil
  chosen_spanish_reading: yo lo odio... porque nunca profetiza bien acerca de mí, sino mal todos los días
  alternative_spanish_readings:
  - lo aborrezco...
  - porque jamás profetiza bien...
  rationale: No se suaviza la hostilidad del rey ni la acusación repetida. «Odio» mantiene la fuerza léxica de שׂנא, y «nunca / mal todos los días» conserva el patrón habitual de juicio negativo.
  doctrine_reference: Sentido léxico de שׂנא en contexto narrativo
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y no se detectaron cambios necesarios en la lectura global. Se mantuvieron la referencia al Nombre divino como Yahvé, el sentido mediador de דרשׁ y la fuerza negativa del juicio sobre Micaías.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Consultar a Yahvé» conserva el matiz profético de דרשׁ sin introducir jerga eclesiástica.
  - «Micaías hijo de Imla» mantiene el patronímico en forma clara y publicable.
  - El cierre «No diga el rey así» refleja el tono respetuoso y correctivo de Josafat.
