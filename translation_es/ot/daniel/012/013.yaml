translation:
  language: es
  text: Pero en cuanto a ti[a], ve al fin; y descansarás[b] y te levantarás[c] para tu porción asignada, al fin de los días[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el fin».
    reason: lexical_alternative
  - marker: b
    text: «Descansarás» probablemente se refiere a la muerte de Daniel antes de la consumación final.
    reason: lexical_alternative
  - marker: c
    text: O «te pondrás en pie», es decir, recibir tu porción asignada.
    reason: lexical_alternative
  - marker: d
    text: La frase «al fin de los días» es una expresión escatológica; compárese Daniel 12:2.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Pero tú
  - Y tú
  lexicon: HALOT
  rationale: La partícula contrastiva más el pronombre independiente expresan un giro de discurso dirigido a Daniel. «Pero en cuanto a ti» conserva el contraste y suena natural en español bíblico contemporáneo.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: HALOT
  rationale: El imperativo de הלך se expresa de manera directa con «ve», que mantiene la orden breve y formal del hebreo.
- source_word: לַ/קֵּץ
  english_pob_choice: to the end
  chosen_spanish: al fin
  alternatives_spanish:
  - hasta el fin
  - al final
  lexicon: HALOT
  rationale: קֵץ es «fin». Con ל puede expresar dirección o extensión hacia un término; «al fin» conserva la imagen sin forzar «hasta», que interpretaría más explícitamente la duración.
- source_word: וְ/תָנ֛וּחַ
  english_pob_choice: and you will rest
  chosen_spanish: y descansarás
  alternatives_spanish:
  - y reposarás
  - y descansarás en la muerte
  lexicon: HALOT
  rationale: נוח significa «descansar/reposar». «Descansarás» comunica la idea de reposo y deja implícita, como en el POB inglés, la posible referencia a la muerte sin explicitarla en el texto principal.
- source_word: וְ/תַעֲמֹ֥ד
  english_pob_choice: and rise
  chosen_spanish: y te levantarás
  alternatives_spanish:
  - y te pondrás de pie
  - y resucitarás
  lexicon: HALOT
  rationale: עמד literalmente es «estar de pie/ponerse en pie». En este contexto escatológico, el español «te levantarás» preserva la imagen básica y deja abierta la resonancia de resurrección sin convertirla en una paráfrasis doctrinal.
- source_word: לְ/גֹרָלְ/ךָ֖
  english_pob_choice: for your allotted portion
  chosen_spanish: para tu heredad
  alternatives_spanish:
  - para tu lote
  - para tu porción asignada
  lexicon: HALOT
  rationale: גּוֹרָל es literalmente «lote» y por extensión la parte asignada. «Heredad» comunica de forma idiomática la idea de una porción recibida por asignación, aunque «porción asignada» queda como alternativa más literal.
- source_word: לְ/קֵ֥ץ הַ/יָּמִֽין
  english_pob_choice: at the end of the days
  chosen_spanish: al fin de los días
  alternatives_spanish:
  - al final de los días
  - al fin de aquellos días
  lexicon: HALOT
  rationale: La expresión es escatológica y literalmente dice «al fin de los días». «Al fin de los días» conserva la construcción del hebreo y el tono profético.
theological_decisions:
- issue: Si וְתָנ֛וּחַ debe explicitar muerte en la traducción española
  english_pob_reading: Rendered 'you will rest' without making death explicit in the main text.
  chosen_spanish_reading: «descansarás» sin explicitar la muerte en el texto principal.
  alternative_spanish_readings:
  - «morirás y descansarás»
  - «descansarás en la muerte»
  rationale: El contexto sugiere fuertemente la muerte de Daniel antes de la consumación final, pero el verbo hebreo significa «descansar». La traducción principal conserva esa ambigüedad productiva y evita resolverla por adelantado.
  doctrine_reference: Preservar la tensión textual y la implicación teológica sin sobreexplicar.
- issue: Si וְתַעֲמֹד debe traducirse como resurrección explícita
  english_pob_reading: Rendered 'rise' rather than 'stand' or 'rise again' in the latest English revision.
  chosen_spanish_reading: «te levantarás» sin decir explícitamente «resucitarás».
  alternative_spanish_readings:
  - «resucitarás»
  - «te pondrás en pie»
  rationale: En Daniel 12 la resurrección es una implicación natural, especialmente a la luz de 12:2, pero עמד literalmente es «ponerse en pie». «Te levantarás» preserva el verbo imagístico y permite que la resonancia escatológica permanezca implícita.
  doctrine_reference: Preservar la tensión entre imagen verbal y sentido escatológico.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «rise for your allotted portion» frente a «stand in your allotted place». Por eso el español evita «estarás de pie» o «ocuparás tu lugar» y usa «te levantarás» con una expresión de pertenencia/asignación («para tu heredad») que deja intacta la resonancia escatológica y la idea de la porción concedida.
  spanish_consistency_notes:
  - Se conserva «Yahvé» cuando corresponda en el proyecto, pero este versículo no lo contiene.
  - Se mantiene un registro formal y bíblico, evitando arcaísmos innecesarios.
  - «Heredad» se usa aquí por claridad idiomática; la nota preserva la alternativa más literal «porción asignada».
