translation:
  language: es
  text: Y he aquí[a], nuestras cosas sagradas, nuestra belleza y nuestra gloria han sido asoladas, y las naciones las han profanado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nuestro santuario’ o ‘nuestro lugar santo’; el griego dice literalmente ‘nuestras cosas santas’.
    reason: lexical_alternative
  - marker: b
    text: O ‘las han mancillado’ o ‘las han desacralizado’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira, pues
  - he aquí
  lexicon: LSJ
  rationale: ‘He aquí’ conserva la fuerza deíctica e interjectiva de ἰδοὺ con un registro digno y natural en español bíblico, sin caer en un calco duro.
- source_word: τὰ ἅγια ἡμῶν
  english_pob_choice: our holy things
  chosen_spanish: nuestros lugares santos
  alternatives_spanish:
  - nuestras cosas santas
  - nuestros objetos santos
  - nuestro santuario
  lexicon: LSJ
  rationale: El griego literalmente dice ‘las cosas santas nuestras’, pero en español ‘lugares santos’ comunica mejor el alcance cultual probable sin reducir indebidamente a un singular. Mantiene la amplitud del plural neutro y evita fijar el referente sólo como edificio.
- source_word: καλλονὴ
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - esplendor
  - hermosura
  lexicon: LSJ
  rationale: ‘Belleza’ es la equivalencia directa y más transparente para καλλονή en este lamento. ‘Esplendor’ sería posible, pero desplaza el matiz básico hacia brillo o magnificencia.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: LSJ
  rationale: ‘Gloria’ corresponde al término estable y solemne de δόξα, y encaja con la tríada retórica del versículo.
- source_word: ἠρημώθη
  english_pob_choice: have been laid waste
  chosen_spanish: han sido asolados
  alternatives_spanish:
  - han sido devastados
  - han quedado desolados
  - han sido arrasados
  lexicon: LSJ
  rationale: ‘Asolados’ preserva el sentido de devastación/desolación del pasivo griego con un tono bíblico claro y natural en español.
- source_word: ἐβεβήλωσαν
  english_pob_choice: have defiled
  chosen_spanish: han profanado
  alternatives_spanish:
  - han contaminado
  - han mancillado
  - han desacralizado
  lexicon: LSJ
  rationale: ‘Profanar’ reproduce con precisión la violación cultual del verbo, y en español mantiene mejor la tensión sagrada que ‘ensuciar’ o ‘contaminar’.
- source_word: ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: ‘Las naciones’ sigue de cerca el griego y preserva el referente etnopolítico general sin introducir un término confesional más interpretativo.
theological_decisions:
- issue: Alcance de τὰ ἅγια
  english_pob_reading: Rendered broadly as 'our holy things' rather than narrowing to 'our sanctuary.'
  chosen_spanish_reading: Se mantiene en plural y de forma amplia como ‘nuestros lugares santos’, sin reducirlo a un solo santuario.
  alternative_spanish_readings:
  - nuestro santuario
  - nuestro lugar santo
  - nuestras cosas santas
  rationale: El neutro plural griego permite una referencia colectiva a realidades sagradas; el español conserva esa amplitud y evita resolver la tensión interpretativa demasiado pronto.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'look' por 'behold' para un registro más formal; la presente redacción española ya refleja ese tono con ‘he aquí’. También conserva la tríada léxica y la tensión del plural neutro sin estrecharla a un solo edificio.
  spanish_consistency_notes:
  - Se usó ‘Y he aquí’ para reproducir la abertura enfática del hebreo/greco-bíblico sin sonar arcaico en exceso.
  - ‘Las naciones’ se mantuvo de forma literal y consistente con el contexto judío-gentil del pasaje.
  - Se prefirió ‘profanado’ por su fuerza cultual, coherente con el campo semántico de ἐβεβήλωσαν.
