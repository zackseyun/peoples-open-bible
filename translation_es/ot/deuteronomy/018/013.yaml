translation:
  language: es
  text: Serás íntegro[a] con Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entero' o 'completo' con Yahvé tu Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - sin defecto
  - irreprochable
  - completo
  lexicon: HALOT
  rationale: תָּמִים expresa integridad, plenitud o ausencia de defecto. En español, 'íntegro' comunica mejor la idea de integridad moral y lealtad indivisa en el contexto de Deuteronomio 18:9–14, sin sugerir perfección sin pecado. 'Sin defecto' sería demasiado físico; 'irreprochable' es posible pero más forense; 'completo' es menos natural aquí.
- source_word: תִּהְיֶה
  english_pob_choice: you shall be
  chosen_spanish: tú serás
  alternatives_spanish:
  - serás
  - deberás ser
  - sé
  lexicon: HALOT
  rationale: La forma imperfecta qatal/yiqtol de היה funciona como exhortación. 'Tú serás' conserva el tono injuntivo y la formalidad del hebreo en un español natural. 'Deberás ser' añade explicitud modal; 'sé' suena demasiado imperativo y menos representativo de la forma verbal.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - ante
  - delante de
  lexicon: HALOT
  rationale: עִם normalmente significa 'con'. En este contexto, expresa relación y fidelidad en comunión con Yahvé. 'Con' es la equivalencia directa y más natural; 'ante/delante de' introduciría una matización no exigida por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal como 'Yahvé', en coherencia con la política terminológica del proyecto. Esto evita la sustitución por un título y mantiene visible el Tetragrámaton.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  - tu Dioses
  lexicon: HALOT
  rationale: Aunque la forma morfológica de אֱלֹהִים puede ser plural, el sufijo de segunda persona y la referencia a Yahvé dejan claro que significa 'tu Dios' en singular. 'Tu Dios' preserva la relación pactual personal.
theological_decisions:
- issue: Sentido de תָּמִים en una exhortación de pacto
  english_pob_reading: blameless in integrity/devotion before God, not sinless perfection
  chosen_spanish_reading: íntegro en fidelidad y rectitud delante de Dios, no perfección sin pecado
  alternative_spanish_readings:
  - completo con Yahvé tu Dios
  - de corazón entero con Yahvé tu Dios
  rationale: En el contexto inmediato de Deuteronomio 18:9–14, el llamado contrasta a Israel con prácticas ocultistas. 'Íntegro' conserva la fuerza ética y de pacto sin resolver la tensión teológica hacia una impecabilidad absoluta. Otras opciones como 'completo' o 'de corazón entero' son posibles, pero menos precisas o más interpretativas.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה, no 'SEÑOR', conforme al criterio del proyecto.
  - '''tu Dios'' mantiene el singular relacional de אֱלֹהֶיךָ.'
  - La elección 'íntegro' evita tanto un literalismo físico como una lectura de perfección sin pecado.
