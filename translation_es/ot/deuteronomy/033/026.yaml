translation:
  language: es
  text: No hay nadie como Dios[a], oh Jesurún, que cabalga sobre los cielos para ayudarte[b], y en su majestad sobre el firmamento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesurún es un nombre poético para Israel.
    reason: cultural_note
  - marker: b
    text: 'O: «para tu ayuda».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sobre las nubes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is none
  chosen_spanish: No hay nadie
  alternatives_spanish:
  - No existe nadie
  - Nadie hay
  lexicon: HALOT
  rationale: La negación existencial absoluta se expresa con naturalidad en español como 'No hay nadie', conservando el tono enfático y poético del hebreo sin sonar forzado.
- source_word: כָּאֵל
  english_pob_choice: like God
  chosen_spanish: como Dios
  alternatives_spanish:
  - como el Poderoso
  - como El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como designación divina común, no como nombre propio transliterado. 'Dios' comunica con claridad la comparación e intensidad monoteísta del verso.
- source_word: יְשֻׁרוּן
  english_pob_choice: Jeshurun
  chosen_spanish: Jesurún
  alternatives_spanish:
  - Jeshurún
  - Yeshurún
  lexicon: HALOT
  rationale: Se conserva el nombre poético del Israel idealizado mediante transliteración. 'Jesurún' mantiene la referencia cultural y la forma vocativa del texto.
- source_word: רֹכֵב
  english_pob_choice: who rides
  chosen_spanish: que cabalga
  alternatives_spanish:
  - que monta
  - cabalgando
  lexicon: HALOT
  rationale: El participio describe una acción característica y elevada de Dios. 'Cabalga' es una equivalencia natural en español para la imagen regia del original.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos altos
  - los cielos
  lexicon: HALOT
  rationale: En español bíblico, 'los cielos' comunica bien el plural poético hebreo y mantiene el paralelismo con 'las nubes' o 'los cielos' según el contexto.
- source_word: בְעֶזְרֶךָ
  english_pob_choice: to help you
  chosen_spanish: para ayudarte
  alternatives_spanish:
  - para tu ayuda
  - en tu ayuda
  lexicon: HALOT
  rationale: La preposición ב con עזר puede expresar finalidad o beneficio. 'Para ayudarte' refleja con claridad la función del sintagma en el contexto, tal como señaló la revisión inglesa.
- source_word: וּבְגַאֲוָתוֹ
  english_pob_choice: and in his majesty
  chosen_spanish: y en su majestad
  alternatives_spanish:
  - y en su exaltación
  - y en su esplendor
  lexicon: HALOT
  rationale: En este contexto, גַּאֲוָה aplicada a Dios tiene fuerza de exaltación/majestad, no de orgullo pecaminoso. 'Majestad' preserva el registro reverente y poético.
- source_word: שְׁחָקִים
  english_pob_choice: the skies
  chosen_spanish: las nubes
  alternatives_spanish:
  - los cielos
  - las alturas
  lexicon: HALOT
  rationale: El término es un vocablo poético para la región alta del cielo; la tradición inglesa optó por 'skies' y su alternativa 'through the clouds'. En español, 'las nubes' mantiene la imagen elevada y la tensión poética del paralelo.
theological_decisions:
- issue: Reproducción del nombre poético Jeshurun / Jesurún
  english_pob_reading: Jeshurun is a poetic name for Israel.
  chosen_spanish_reading: Jesurún es un nombre poético para Israel.
  alternative_spanish_readings:
  - Jesurún es un apelativo poético de Israel
  - Jesurún es el Israel idealizado
  rationale: Se conserva la transliteración y se aclara en la nota que no es un título genérico, sino un nombre poético con referencia histórica e idealizante a Israel.
  doctrine_reference: 'Translation philosophy: translate names as names; preserve poetic allusions with explanatory notes.'
- issue: Sentido de אֵל en la comparación
  english_pob_reading: common divine title rendered 'God'
  chosen_spanish_reading: título divino común rendido como 'Dios'
  alternative_spanish_readings:
  - nombre propio 'El'
  - '''el Poderoso'''
  rationale: El verso afirma la incomparabilidad de Dios; traducir אֵל como 'Dios' evita sugerir otra deidad o un nombre técnico aislado y mantiene la fuerza monoteísta del hebreo.
  doctrine_reference: Original-language primacy over translation tradition; render titles by function in context.
- issue: Imagen de cabalgar sobre los cielos y sobre las nubes
  english_pob_reading: who rides on the heavens ... and in his majesty on the skies
  chosen_spanish_reading: que cabalga sobre los cielos ... y en su majestad sobre las nubes
  alternative_spanish_readings:
  - que cabalga en los cielos ... y en su majestad en las nubes
  - que cabalga sobre el cielo ... y en su majestad sobre las nubes
  rationale: La preposición hebrea permite una imagen de apoyo o dominio sobre la esfera celestial. 'Sobre' conserva el valor formal observado en la revisión inglesa y mantiene el paralelismo poético sin suavizarlo.
  doctrine_reference: Formal alignment to Hebrew preposition with poetic imagery preserved.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que corrigió 'through' a 'on' para אשמים/שָׁמַיִם y שְׁחָקִים, manteniendo la imagen de 'sobre'. Se preservó la comparación absoluta ('No hay nadie como Dios') y la lectura de גַּאֲוָה como 'majestad'. Para evitar una traducción demasiado calcada, 'to help you' se naturalizó como 'para ayudarte', mientras se conservó la ambigüedad poética de בְעֶזְרֶךָ mediante nota alternativa. El término poético Jeshurun se translitera como Jesurún y recibe aclaración cultural.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֵל conforme al criterio del proyecto.
  - Se conservó la imagen elevada del paralelo 'cielos/nubes' sin introducir explicaciones no presentes en el texto.
  - La puntuación vocativa 'oh Jesurún' refleja la función apelativa del hebreo y la audiencia poética.
  - Se prefirió 'cabalga' por registro bíblico-natural en español, evitando un calco excesivamente literal.
