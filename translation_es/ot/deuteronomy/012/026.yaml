    issue: '''que estén en tu poder'' no refleja con precisión la cláusula posesiva אֲשֶׁר יִהְיוּ לְךָ.'
    rationale: El hebreo expresa pertenencia ('que son tuyas', 'que te pertenecen'), no necesariamente control físico o disponibilidad. 'En tu poder' añade un matiz no requerido.
  - severity: low
    issue: '''cosas consagradas'' es menos natural y menos transparente que ''cosas santas'' en este contexto cultual.'
    rationale: Ambas opciones son posibles, pero 'cosas santas' preserva mejor la cercanía léxica a קָדָשֶׁיךָ y suena más idiomático en registro bíblico eclesial.
  revised_spanish_text: Pero solo tus cosas santas que te pertenezcan, y tus ofrendas votivas[a], las llevarás y vendrás al lugar que Yahvé elegirá.
