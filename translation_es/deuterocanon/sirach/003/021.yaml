review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo y la auditoría inglesa en la estructura y en el contraste entre buscar e investigar. Conserva correctamente la nota alternativa griega. Sin embargo, 'demasiado admirable' no representa con suficiente precisión פְּלָאוֹת en este contexto; en español suena más a algo digno de admiración que a algo maravilloso/asombroso que excede el alcance humano. Además, 'oculto para ti' es menos natural que 'oculto de ti' o, mejor, 'escondido de ti', aunque el sentido general se mantiene.
  spanish_quality_summary: El texto es claro, pero 'demasiado admirable' resulta poco idiomático y atenúa la fuerza sapiencial del límite humano. Una formulación como 'demasiado maravilloso para ti' o 'demasiado asombroso para ti' suena más natural y más fiel al hebreo. También conviene ajustar la segunda mitad para una expresión más idiomática en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La revisión propuesta respeta la decisión inglesa de mantener la imagen hebrea de lo maravilloso/oculto y la diferencia verbal entre buscar e investigar/escudriñar.
  issues:
  - severity: medium
    issue: '"demasiado admirable" para פְּלָאוֹת'
    rationale: '"Admirable" en español normalmente describe algo excelente o digno de admiración, no necesariamente algo maravilloso o extraordinario que rebasa la capacidad humana. Esto debilita la conexión con פלא y con la explicación auditada.'
  - severity: low
    issue: '"oculto para ti" suena menos natural'
    rationale: Aunque comprensible, en español la relación con מִמְּךָ se expresa mejor como 'escondido de ti' o, si se mantiene 'oculto', con una redacción más fluida. Esto mejora legibilidad sin cambiar el sentido.
  revised_spanish_text: No busques lo que es demasiado maravilloso para ti[a], ni investigues lo que está escondido de ti.
  revised_footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca el paralelo griego: “No busques lo que es más difícil que tú, ni examines lo que es más fuerte que tú”. El hebreo enfatiza lo demasiado maravilloso y lo escondido; el griego enfatiza lo que excede tu capacidad.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'demasiado admirable' por 'demasiado maravilloso' para reflejar mejor פְּלָאוֹת y la justificación léxica documentada. Se ajusta 'oculto para ti' a 'escondido de ti' para una expresión más natural y fiel al matiz de algo ocultado o velado respecto de la persona. La nota se actualiza para concordar con el texto revisado.
