translation:
  language: es
  text: 'Y a los sacerdotes y a todo este pueblo les hablé, diciendo: «Así dice Yahvé: No escuchen las palabras de sus profetas, que les profetizan, diciendo: “Miren[a], los utensilios de la casa de Yahvé están siendo devueltos[b] de Babilonia ahora, rápidamente”; porque profetizan falsamente a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vean». El hebreo הִנֵּה introduce una llamada enfática de atención.
    reason: alternative_reading
  - marker: b
    text: O «están siendo traídos de vuelta» o «serán devueltos». El hebreo dice literalmente «ahora, rápidamente», subrayando la inmediatez que afirmaban los falsos profetas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל הַכֹּהֲנִים
  english_pob_choice: And to the priests
  chosen_spanish: Y a los sacerdotes
  alternatives_spanish:
  - Y a los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים designa aquí al grupo sacerdotal concreto; en español, «sacerdotes» es el equivalente natural y transparente, sin desplazar el sentido hacia una categoría eclesiástica posterior.
- source_word: וְאֶל כָּל הָעָם הַזֶּה
  english_pob_choice: and to all this people
  chosen_spanish: y a todo este pueblo
  alternatives_spanish:
  - y a toda esta gente
  - y a todo el pueblo
  lexicon: HALOT
  rationale: Se conserva el singular colectivo de עָם con el demostrativo הַזֶּה; «todo este pueblo» mantiene la referencia colectiva y el énfasis de cercanía del hebreo.
- source_word: דִּבַּרְתִּי לֵאמֹר
  english_pob_choice: I spoke, saying
  chosen_spanish: les hablé, diciendo
  alternatives_spanish:
  - les hablé así
  - dije
  lexicon: HALOT
  rationale: La construcción profética se mantiene con verbo finito más complemento de dicción. «Les hablé, diciendo» suena algo formal pero fiel al flujo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se usa la forma española establecida del nombre divino en este proyecto. No se sustituye por un título enmascarador como «SEÑOR».
- source_word: אַל תִּשְׁמְעוּ אֶל
  english_pob_choice: Do not listen to
  chosen_spanish: No escuchen
  alternatives_spanish:
  - No oigan
  - No presten atención a
  lexicon: HALOT
  rationale: La prohibición con שמע más אֶל pide una expresión idiomática de obediencia auditiva/atención; «No escuchen» conserva bien ese valor.
- source_word: דִּבְרֵי נְבִיאֵיכֶם
  english_pob_choice: the words of your prophets
  chosen_spanish: las palabras de sus profetas
  alternatives_spanish:
  - el mensaje de sus profetas
  - lo que dicen sus profetas
  lexicon: HALOT
  rationale: Se preserva la concreción de דְּבָרִים como «palabras», y el poseedor plural con sufijo de 2ª persona se refleja naturalmente con «sus profetas».
- source_word: הַנִּבְּאִים לָכֶם
  english_pob_choice: who are prophesying to you
  chosen_spanish: que están profetizando para ustedes
  alternatives_spanish:
  - que profetizan para ustedes
  - que les están profetizando
  lexicon: HALOT
  rationale: El participio indica acción en curso; «están profetizando» lo refleja. Se eligió «para ustedes» porque el discurso se dirige a beneficio/alcance del destinatario, sin perder la orientación directa del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren bien
  - Vean
  lexicon: HALOT
  rationale: Para español bíblico moderno, «Miren» transmite la fuerza deíctica de הִנֵּה de manera natural, sin la rigidez de «He aquí».
- source_word: כְלֵי בֵית יְהוָה
  english_pob_choice: the vessels of the house of Yahweh
  chosen_spanish: los utensilios de la casa de Yahvé
  alternatives_spanish:
  - los vasos de la casa de Yahvé
  - los objetos de la casa de Yahvé
  - los utensilios del templo de Yahvé
  lexicon: HALOT
  rationale: כְלִים admite varios matices cultuales; «utensilios» conserva la idea de objetos/vasos rituales sin forzar una especialización de «vasos» ni sustituir innecesariamente la expresión «casa de Yahvé» por «templo».
- source_word: מוּשָׁבִים
  english_pob_choice: are being brought back
  chosen_spanish: son traídos de vuelta
  alternatives_spanish:
  - están siendo traídos de vuelta
  - serán devueltos
  lexicon: HALOT
  rationale: El hophal participa pasividad y retorno/restauración. «Son traídos de vuelta» mantiene el pasivo y la inmediatez del reclamo profético falso, sin ampliar el tiempo verbal más allá del hebreo.
- source_word: מִבָּבֶלָה
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  lexicon: HALOT
  rationale: Se usa el topónimo estándar en español. «De Babilonia» es la forma más directa y natural.
- source_word: עַתָּה מְהֵרָה
  english_pob_choice: now, quickly
  chosen_spanish: ahora, pronto
  alternatives_spanish:
  - ahora, muy pronto
  - ahora mismo, rápidamente
  lexicon: HALOT
  rationale: Se conservan los dos adverbios para no diluir la doble marca de inmediatez y prisa. «Pronto» comunica bien la fuerza conjunta de ambos términos en español.
- source_word: שֶׁקֶר הֵמָּה נִבְּאִים לָכֶם
  english_pob_choice: for they are prophesying falsely to you
  chosen_spanish: porque falsamente profetizan para ustedes
  alternatives_spanish:
  - porque profetizan mentira para ustedes
  - porque están profetizando falsamente para ustedes
  lexicon: HALOT
  rationale: שֶׁקֶר se vierte como adverbio («falsamente») para conservar el juicio sobre la manera de profetizar, en línea con la revisión inglesa. «Profetizan» mantiene el valor verbal continuativo del participio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama de forma explícita. En español se adopta «Yahvé», la forma de proyecto para el nombre pactal de Dios, evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Carácter de la profecía de los destinatarios
  english_pob_reading: they are prophesying falsely to you
  chosen_spanish_reading: falsamente profetizan para ustedes
  alternative_spanish_readings:
  - profetizan mentira para ustedes
  - están profetizando falsamente para ustedes
  rationale: 'שֶׁקֶר no se suaviza como simple error: la acusación es que la profecía es falsa, no solo equivocada. El adverbio «falsamente» preserva ese juicio moral y profético.'
  doctrine_reference: Énfasis profético de Jeremías sobre el falso mensaje frente a la palabra de Yahvé
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el cambio de «Look» a una forma más formal y la preferencia por una expresión adverbial para שֶׁקֶר. En español se reflejó esa preferencia con «Miren» en el marcador deíctico y «falsamente» en la cláusula final, manteniendo el registro bíblico formal sin sonar arcaico.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» como forma española del nombre divino, coherente con el estándar del proyecto.
  - Se mantiene el tratamiento directo plural de segunda persona con «ustedes», evitando el voseo o el tuteo regional.
  - «Profetizando» y «profetizan» conservan el aspecto continuativo del participio hebreo.
  - La expresión «casa de Yahvé» se conserva para no reemplazar innecesariamente la metáfora cultual con «templo».
