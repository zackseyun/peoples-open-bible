translation:
  language: es
  text: Todos los censados del campamento de Rubén fueron 151.450 según sus compañías[a]. Saldrán en segundo lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Según sus compañías» traduce el hebreo לְצִבְאֹתָם. También puede entenderse «según sus ejércitos» o «según sus divisiones»; aquí se prefirió «compañías» por ser más claro en español y acorde con el orden militar del campamento.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y en segundo ellos saldrán». La frase indica el puesto del campamento de Rubén en el orden de marcha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todo el total de
  - Todos los
  lexicon: HALOT
  rationale: En este contexto censal, el hebreo expresa la totalidad del grupo contado; «Todos» conserva la fuerza inclusiva sin sonar forzado en español.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los censados
  - los numerados
  lexicon: HALOT
  rationale: El participio pasivo de פקד aquí apunta a personas contadas o censadas. «Los contados» es breve, fiel y evita añadir «hombres» que el texto no explicita.
- source_word: לְמַחֲנֵה
  english_pob_choice: for the camp of
  chosen_spanish: para el campamento de
  alternatives_spanish:
  - del campamento de
  - pertenecientes al campamento de
  lexicon: HALOT
  rationale: La relación con la unidad tribal/campamento se puede expresar naturalmente con «para el campamento de»; en español mantiene la idea organizativa sin sobreinterpretar.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: uso bíblico español estándar
  rationale: «Rubén» es la forma bíblica usual en español y reconoce el nombre tribal sin pérdida de identificación.
- source_word: מְאַת אֶלֶף וְאֶחָד וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: 151,450
  chosen_spanish: '151.450'
  alternatives_spanish:
  - ciento cincuenta y un mil cuatrocientos cincuenta
  lexicon: numeral reading
  rationale: El total censal se expresa mejor con cifra en español para claridad y precisión; conserva exactamente el valor del hebreo.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their companies
  chosen_spanish: por sus compañías
  alternatives_spanish:
  - según sus compañías
  - por sus ejércitos
  - según sus divisiones
  lexicon: HALOT
  rationale: El contexto de marcha y orden militar favorece «compañías», que sigue de cerca la revisión inglesa más reciente («companies») y conserva el sentido organizativo de צבאותם.
- source_word: וּשְׁנִיִּם
  english_pob_choice: second
  chosen_spanish: en segundo lugar
  alternatives_spanish:
  - segundo
  - después de ellos
  lexicon: HALOT
  rationale: El hebreo marca orden de marcha. «En segundo lugar» comunica la función ordinal con naturalidad en español y evita una literalidad áspera.
- source_word: יִסָּעוּ
  english_pob_choice: They shall set out
  chosen_spanish: saldrán
  alternatives_spanish:
  - se pondrán en marcha
  - partirán
  - levantarán el campamento
  lexicon: HALOT
  rationale: En contexto de marcha del campamento, נסע significa iniciar el desplazamiento. «Saldrán» es conciso y idiomático; mantiene la idea de partida sin añadir detalle no explícito.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'divisions' por 'companies' para acercarse más a צבאותם; la redacción española sigue esa última preferencia con «compañías». No hay señales de conflicto textual en la fuente hebrea ni en el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «campamento» para מחנה, en línea con el sentido de organización tribal y militar.
  - Se usa «Rubén» como forma española estándar del nombre tribal.
  - Se conserva el número en formato decimal español con punto como separador de miles.
  - «Companías» se emplea como equivalente contextual de צבאותם, sin perder la posibilidad semántica de «ejércitos/divisiones».
