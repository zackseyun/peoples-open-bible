translation:
  language: es
  text: Ya que nuestro padre ha pasado a los dioses[a], y deseamos que los que están en el reino, estando tranquilos, atiendan los asuntos de los judíos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «ha pasado a los dioses», eufemismo helenístico real para la muerte; algunas traducciones lo simplifican como «ha muerto».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula final está comprimida en griego y también puede entenderse, de manera más amplia, como «que presten atención a los asuntos de los judíos».
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ πατρὸς ἡμῶν
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  - nuestro difunto padre
  lexicon: LSJ
  rationale: En este contexto de correspondencia real, la expresión designa al predecesor dinástico muerto. «Nuestro padre» conserva el giro cortesano y la relación dinástica sin añadir interpretación; «nuestro antepasado» pierde ese tono, y «nuestro difunto padre» explicita más de lo que el griego exige.
- source_word: εἰς θεοὺς μεταστάντος
  english_pob_choice: has departed to the gods
  chosen_spanish: ha pasado a los dioses
  alternatives_spanish:
  - ha partido a los dioses
  - ha muerto
  lexicon: LSJ
  rationale: La expresión griega es un eufemismo helenístico de muerte con fórmula pagana explícita. «Ha pasado a los dioses» preserva esa forma y evita neutralizarla con «ha muerto»; «ha partido a los dioses» es posible, pero menos natural en español.
- source_word: βουλόμενοι
  english_pob_choice: since we desire
  chosen_spanish: porque deseamos
  alternatives_spanish:
  - porque queremos
  - pues deseamos
  lexicon: BDAG
  rationale: El participio expresa la intención declarada de los gobernantes dentro del encabalgamiento epistolar. «Porque deseamos» reproduce el valor causal y es más sobrio que «porque queremos».
- source_word: τοὺς ἐκ τῆς βασιλείας
  english_pob_choice: those in the kingdom
  chosen_spanish: los que están en el reino
  alternatives_spanish:
  - los del reino
  - nuestros súbditos del reino
  lexicon: LSJ
  rationale: La frase abarca a los pertenecientes al ámbito real. «Los que están en el reino» conserva amplitud sin introducir el matiz de sujeción política que no está explícito en el griego.
- source_word: ἀπερισπάστως ὄντας
  english_pob_choice: being undisturbed
  chosen_spanish: viviendo sin perturbación
  alternatives_spanish:
  - estando sin turbación
  - sin distracción
  lexicon: LSJ
  rationale: El adverbio indica ausencia de perturbación o distracción. En español, «viviendo sin perturbación» comunica mejor una condición pública de estabilidad que el calco «sin distracción», demasiado interior.
- source_word: γενέσθαι πρὸς τὴν τῶν Ἰουδαίων ἐπιμέλειαν
  english_pob_choice: should devote themselves to the affairs of the Jews
  chosen_spanish: se dediquen a los asuntos de los judíos
  alternatives_spanish:
  - atiendan a los asuntos de los judíos
  - se ocupen de los asuntos de los judíos
  - presten atención a los asuntos de los judíos
  lexicon: LSJ
  rationale: ἐπιμέλεια puede significar cuidado, atención o administración. Dado el paralelismo y la compresión sintáctica del griego, «se dediquen a los asuntos de los judíos» refleja bien el sentido de atender/ocuparse de ellos sin forzar la estructura.
theological_decisions:
- issue: Fórmula real pagana de muerte
  english_pob_reading: departed to the gods
  chosen_spanish_reading: ha pasado a los dioses
  alternative_spanish_readings:
  - ha muerto
  - ha fallecido
  rationale: El texto forma parte de una carta real helenística y usa una fórmula pagana explícita. Mantenerla en español preserva el sabor histórico y evita normalizarla a un lenguaje monoteísta o eufemístico genérico.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para la cláusula final («should devote themselves to the affairs of the Jews»). La versión española sigue ese ajuste semántico, pero conserva la ambigüedad sintáctica del original mediante «se dediquen a los asuntos de los judíos».
  spanish_consistency_notes:
  - Se mantuvo «judíos» en minúscula por tratarse del etnónimo/nombre del pueblo, no de una referencia al nombre divino.
  - Se preservó el tono cortesano de la carta sin convertir la fórmula de muerte en un simple «murió».
  - El sujeto implícito de «deseamos» sigue siendo la voz real/plural del documento, como en el inglés auditado.
