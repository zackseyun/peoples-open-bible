  text: 또한 그들이 아브라함의 씨라고 해서 다 자녀인 것도 아닙니다. 도리어 「이삭에게서 난 자라야 네 씨로 일컬어질 것이다」 하셨습니다.
  philosophy: optimal-equivalence
