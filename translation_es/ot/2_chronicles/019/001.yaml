translation:
  language: es
  text: Y Josafat, rey de Judá, volvió a su casa en Jerusalén en paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió a su casa en Jerusalén sano y salvo». La expresión hebrea «en paz» también puede enfatizar el regreso seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: El verbo de שוב comunica el acto de volver; «volvió» es natural en español narrativo y conserva el sentido de retorno sin sobrecargar el registro.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: convención onomástica española
  rationale: En español bíblico ampliamente reconocido, el nombre se adapta como «Josafat», forma clara y estable para lectores eclesiales.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: La frase constructa identifica el oficio real de Josafat; «rey de Judá» reproduce el contenido con la fluidez natural del español.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su casa
  lexicon: HALOT
  rationale: בַּיִת aquí señala la residencia concreta de destino; «a su casa» preserva la imagen literal mejor que una paráfrasis como «a su hogar».
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sano y salvo
  - con seguridad
  lexicon: HALOT
  rationale: שָׁלוֹם puede implicar paz, bienestar y retorno seguro. «En paz» mantiene la expresión idiomática y deja abierta la posible connotación de regreso a salvo.
- source_word: לִירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea apunta a dirección, en español la locución con destino ya queda integrada con «a su casa»; «en Jerusalén» expresa de manera natural la ubicación de la casa.
translation_notes:
  revision_awareness: El texto base en inglés ya optó por una equivalencia óptima y añadió una nota sobre el matiz de בְּשָׁלוֹם. No hay revisiones posteriores que alteren el sentido, así que la versión española mantiene el mismo balance entre literalidad e idiomaticidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva el matiz de retorno seguro en la nota, sin sustituir «en paz» por una glosa interpretativa en el cuerpo del texto.
  - La puntuación sigue el orden natural del español bíblico contemporáneo, con coma tras el nombre y la función real para claridad.
