review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: escuchar sus deliberaciones, indagar más, descubrir la preparación de una agresión contra Artajerjes e informar al rey. Sin embargo, dos formulaciones españolas no preservan con precisión natural el sentido: «alzar la mano contra» no representa bien el idiomatismo griego τὰς χεῖρας ἐπιβαλεῖν («poner/echar las manos sobre», con posible sentido hostil concreto), y «lo informó al rey acerca de ellos» es gramaticalmente deficiente y no corresponde bien a ὑπέδειξεν τῷ βασιλεῖ περὶ αὐτῶν.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita una reparación menor para sonar natural y digno en español. «Poner las manos sobre» conserva mejor el literal idiomático que el inglés también preserva, y «informó al rey acerca de ellos» o «le informó al rey» debe corregirse para evitar un uso no idiomático de «lo informó».
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. Las decisiones léxicas centrales son mayormente acertadas: «escuchó», «planes», «investigó», «intenciones», «se preparaban». La principal desviación está en τὰς χεῖρας ἐπιβαλεῖν, donde conviene una forma más cercana al idiomático griego y al rastro de auditoría inglés.'
  issues:
  - severity: medium
    issue: «alzar la mano contra el rey Artajerjes» no refleja bien τὰς χεῖρας ἐπιβαλεῖν
    rationale: La expresión griega significa literalmente «poner/echar las manos sobre» alguien, con matiz de aprehender o atacar. «Alzar la mano contra» en español sugiere más bien amenazar o golpear, y cambia la imagen idiomática preservada en el POB inglés.
  - severity: medium
    issue: «Y lo informó al rey acerca de ellos» es español poco natural e incorrecto
    rationale: Con «informar», el español estándar requiere «informó al rey acerca de ellos» o «le informó al rey sobre ellos»/«informó al rey de ello». El borrador actual introduce un objeto directo «lo» sin referente adecuado.
  - severity: low
    issue: La nota al pie necesita ajustarse al texto revisado
    rationale: Si el texto principal cambia a «poner las manos sobre», la nota debe evitar presentar como principal una formulación distinta («alzar/poner»), y conviene simplificarla para mayor claridad.
  revised_spanish_text: Escuchó sus planes e investigó sus intenciones, y supo que se preparaban para poner las manos sobre el rey Artajerjes[a]. Y informó al rey acerca de ellos.
  revised_footnotes:
  - marker: a
    text: 'O: «atacar al rey Artajerjes». La expresión griega dice literalmente «poner las manos sobre» él y puede señalar una acción hostil más específica.'
    reason: lexical_alternative
  revision_rationale: Se corrige el idiomatismo de agresión para alinearlo mejor con τὰς χεῖρας ἐπιβαλεῖν y con la decisión auditada del POB inglés de preservar la imagen literal «lay hands on». También se repara «lo informó al rey» a un español natural y fiel. No se requiere adjudicación adicional porque son ajustes claros de estilo y precisión léxica, no cuestiones doctrinales ni textualmente inciertas.
