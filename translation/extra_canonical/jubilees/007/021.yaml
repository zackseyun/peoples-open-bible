translation:
  text: And uncleanness and all lawlessness. For because of these three things the flood came upon the earth[a], because of the fornication by which the Watchers committed fornication contrary to the command of their ordinances, going after the daughters of men, and they took for themselves wives from all whom they chose, and they made the beginning of uncleanness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sequence Naphidim / Naphil / Elyo reflects difficult giant-group terminology in the Ethiopic text. Some scholars compare these with forms like Nephilim and Elioud, but the exact relationships are debated.
    reason: textual_variant
    anchor_ref: '7:21'
  - marker: b
    text: Or 'transgressed against the command of their ordinances after the daughters of men'.
    reason: previous_rendering
