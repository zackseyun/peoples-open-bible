translation:
  language: es
  text: Entonces diez mil hombres escogidos de todo Israel vinieron frente a Gibeá[a], y la batalla fue recia; pero no sabían que la calamidad estaba a punto de alcanzarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'frente a Guibeá'. El hebreo literalmente dice 'en frente de Gibeá'.
    reason: alternative_reading
lexical_decisions:
- source_word: מִנֶּגֶד לַגִּבְעָה
  english_pob_choice: opposite Gibeah
  chosen_spanish: frente a Giba
  alternatives_spanish:
  - opuestos a Giba
  - enfrente de Giba
  - contra Giba
  lexicon: HALOT
  rationale: La expresión indica posición enfrente/opuesta; en contexto militar puede implicar avance hostil, pero el hebreo mismo no dice explícitamente 'contra'. 'Frente a Giba' conserva la relación espacial sin añadir más de lo que el texto exige.
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ בָּחוּר
  english_pob_choice: ten thousand chosen men
  chosen_spanish: diez mil hombres escogidos
  alternatives_spanish:
  - diez mil hombres elegidos
  - diez mil hombres selectos
  - diez mil hombres escogidos para la batalla
  lexicon: HALOT
  rationale: בָּחוּר aquí describe tropas seleccionadas o de élite, no solo jóvenes. 'Escogidos' mantiene el matiz de selección y suena natural en español militar.
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: from all Israel
  chosen_spanish: de todo Israel
  alternatives_spanish:
  - de entre todo Israel
  - de todo el pueblo de Israel
  lexicon: HALOT
  rationale: La frase señala procedencia representativa de la totalidad de Israel. 'De todo Israel' es breve, idiomática y fiel.
- source_word: וְהַמִּלְחָמָה כָּבֵדָה
  english_pob_choice: the battle was fierce
  chosen_spanish: la batalla fue recia
  alternatives_spanish:
  - la batalla fue feroz
  - la batalla fue intensa
  - la batalla fue dura
  lexicon: HALOT
  rationale: כָּבֵדָה expresa severidad o peso figurado. 'Recia' reproduce bien la intensidad combativa sin convertirlo en 'pesada', que sería literal pero poco natural.
- source_word: וְהֵם לֹא יָדְעוּ
  english_pob_choice: but they did not know
  chosen_spanish: pero no sabían
  alternatives_spanish:
  - y no sabían
  - pero no lo sabían
  lexicon: HALOT
  rationale: El hebreo marca contraste con lo anterior. 'Pero no sabían' conserva esa oposición y resulta fluido en español.
- source_word: כִּי נֹגַעַת עֲלֵיהֶם הָרָעָה
  english_pob_choice: that disaster was about to overtake them
  chosen_spanish: que la calamidad estaba a punto de alcanzarlos
  alternatives_spanish:
  - que la desgracia estaba tocándolos
  - que el desastre los estaba alcanzando
  - que la calamidad los estaba por tocar
  lexicon: HALOT
  rationale: נֹגַעַת conserva la idea de tocar/llegar; הָרָעָה aquí es calamidad, no mal moral. 'Estaba a punto de alcanzarlos' expresa inminencia y respeta la imagen de llegar/tocar sin volverla demasiado interpretativa.
theological_decisions:
- issue: הָרָעָה como calamidad, no mal moral
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - desgracia
  - desastre
  - mal
  rationale: En este contexto narrativo y militar, הָרָעָה describe ruina o desastre sobrevenido, no maldad ética. 'Calamidad' mantiene el sentido de desastre inminente y evita confundirlo con mal moral.
  doctrine_reference: Providencia y juicio narrativo en el relato histórico; distinción semántica entre mal moral y calamidad.
- issue: Inminencia del desastre expresada por נֹגַעַת
  english_pob_reading: was about to overtake them
  chosen_spanish_reading: estaba a punto de alcanzarlos
  alternative_spanish_readings:
  - los estaba alcanzando
  - estaba por tocarlos
  - se les venía encima
  rationale: El hebreo usa una imagen corporal de tocar/llegar. 'Estaba a punto de alcanzarlos' preserva la inminencia sin perder la metáfora ni exagerar la escena.
  doctrine_reference: Lectura narrativa del progreso del juicio en la historia de Israel.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audito inglés al preferir una expresión más cercana al hebreo para מִנֶּגֶד לַגִּבְעָה ('frente a/opuesto a') y para נֹגַעַת עֲלֵיהֶם הָרָעָה ('a punto de alcanzarlos'). En español se optó por 'frente a Giba' y 'estaba a punto de alcanzarlos' para mantener la inminencia y la imagen de llegada/tacto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la política general, pero este versículo no contiene el nombre divino.
  - '''Escogidos'' se mantiene como término militar para בָּחוּר.'
  - '''Calamidad'' conserva el valor no moral de הָרָעָה.'
  - Se prefiere 'Giba' como forma breve y transparente; puede alternar con 'Gibeá' en otros pasajes según la tradición editorial.
