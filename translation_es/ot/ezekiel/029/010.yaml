translation:
  language: es
  text: Por tanto[a], he aquí, estoy contra ti y contra tus canales del Nilo, y convertiré la tierra de Egipto en ruinas, devastación y desolación, desde Migdol hasta Siene[c][b], hasta la frontera de Cus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por eso». El hebreo formula una transición profética que introduce el juicio con fuerza retórica.
    reason: alternative_reading
  - marker: b
    text: Siene es la ciudad antigua cerca de la moderna Asuán, que marca el extremo sur de Egipto.
    reason: cultural_note
  - marker: c
    text: Cus se refiere a la región al sur de Egipto, a menudo asociada con Nubia más que con la actual Etiopía.
    reason: cultural_note
lexical_decisions:
- source_word: יְאֹרֶיךָ
  english_pob_choice: your Nile channels
  chosen_spanish: tus canales del Nilo
  alternatives_spanish:
  - tus ríos
  - tus corrientes del Nilo
  - tus canales
  lexicon: HALOT
  rationale: En el contexto egipcio, יְאֹר no designa ríos en general, sino el Nilo y sus brazos/canales. «Canales del Nilo» conserva esa referencia específica sin sonar forzado en español.
- source_word: לְחָרְבוֹת חֹרֶב שְׁמָמָה
  english_pob_choice: ruins, a desolation laid waste
  chosen_spanish: ruinas, una desolación devastada
  alternatives_spanish:
  - ruinas, una desolación arrasada
  - ruinas, una devastación y desolación
  - lugares en ruinas, devastación
  lexicon: HALOT
  rationale: El hebreo acumula términos cercanos de devastación. «Ruinas» y «desolación devastada» reproducen ese énfasis sin reducirlo a una sola palabra ni exagerar más allá del valor del conjunto.
- source_word: מִמִּגְדֹּל סְוֵנֵה
  english_pob_choice: from Migdol to Syene
  chosen_spanish: desde Migdol hasta Siene
  alternatives_spanish:
  - desde Migdol hasta Syene
  - desde Migdol hasta Asuán
  lexicon: HALOT
  rationale: Son nombres propios que marcan la extensión territorial de Egipto. «Siene» sigue la forma tradicional castellana ligada al topónimo antiguo; «Asuán» sería una equivalencia moderna, pero menos directa al hebreo.
- source_word: וְעַד גְּב֥וּל כּוּשׁ
  english_pob_choice: as far as the border of Cush
  chosen_spanish: y hasta la frontera de Cus
  alternatives_spanish:
  - hasta la frontera de Cus
  - hasta el límite de Cus
  - hasta la frontera de Etiopía
  lexicon: HALOT
  rationale: Se conserva «Cus» para no sustituir el etnónimo bíblico por una etiqueta geopolítica moderna que puede desviar el sentido. «Hasta la frontera» expresa el alcance del límite con naturalidad en español.
- source_word: הִנְנִי אֵלֶיךָ
  english_pob_choice: behold, I am against you
  chosen_spanish: he aquí, estoy contra ti
  alternatives_spanish:
  - mira, estoy contra ti
  - fíjate, estoy contra ti
  - he aquí, yo estoy contra ti
  lexicon: HALOT
  rationale: La fórmula profética transmite oposición divina solemne. «He aquí» preserva la fuerza discursiva de הִנְנִי en un registro bíblico claro y natural.
- source_word: וְנָתַתִּי אֶת אֶרֶץ מִצְרַיִם
  english_pob_choice: I will make the land of Egypt
  chosen_spanish: convertiré la tierra de Egipto en
  alternatives_spanish:
  - haré de la tierra de Egipto
  - pondré la tierra de Egipto como
  - daré la tierra de Egipto como
  lexicon: HALOT
  rationale: נתן con complemento resultativo aquí significa hacer que la tierra llegue a un estado de ruina, no simplemente «dar». «Convertiré ... en» comunica bien esa fuerza idiomática en español.
translation_notes:
  revision_awareness: 'Coincide con la traducción inglesa auditada en sus decisiones principales: fórmula profética de oposición, referencia egipcia específica a los canales del Nilo, acumulación de términos de devastación y topónimos que delimitan el alcance del juicio. No se registran revisiones posteriores que modifiquen este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando aparezca el nombre divino; en este versículo no está explícito.
  - Se usa «Cus» y no «Etiopía» para preservar el etnónimo bíblico.
  - Los topónimos se transliteran con la forma española habitual cuando existe («Migdol», «Siene»).
  - Se conserva el paralelismo y la gradación de devastación sin suavizar el juicio profético.
