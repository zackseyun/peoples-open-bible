translation:
  language: es
  text: Si estas ordenanzas fijas se apartaran de delante de mí[a], declara Yahvé, también la descendencia de Israel dejará de ser nación delante de mí para siempre[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estatutos', 'ordenanzas' o 'decretos'; en este contexto la frase alude al orden fijo establecido para la creación.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'la descendencia de Israel', expresión colectiva que significa los descendientes de Israel.
    reason: lexical_alternative
  - marker: c
    text: O 'todos los días'; el hebreo 'todos los días' es un modismo literal de continuidad duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם יָמֻשׁוּ
  english_pob_choice: If these fixed ordinances depart
  chosen_spanish: Si estos estatutos fijos se apartaran
  alternatives_spanish:
  - Si estas ordenanzas fijas se apartaran
  - Si estos decretos fijos se apartaran
  - Si estas leyes fijas se apartaran
  lexicon: HALOT
  rationale: Yָמֻשׁוּ expresa apartarse o retirarse de una posición establecida. En español, 'se apartaran' conserva la condicionalidad del hebreo y 'estatutos fijos' recoge la idea de orden establecido sin perder la referencia al contexto cósmico de Jeremías 31:35–36.
- source_word: הַחֻקִּים הָאֵלֶּה
  english_pob_choice: these fixed ordinances
  chosen_spanish: estos estatutos fijos
  alternatives_spanish:
  - estas ordenanzas fijas
  - estos decretos fijos
  - estas leyes fijas
  lexicon: HALOT
  rationale: En este contexto la expresión remite al orden establecido de la creación, no solo a mandamientos humanos. 'Estatutos fijos' mantiene la fuerza de חֻקִּים y la idea de una disposición estable, sin borrar la tensión entre 'estatutos' y el orden natural aludido por el texto.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de delante de mi rostro
  - de ante mí
  lexicon: HALOT
  rationale: La frase hebrea es relacional y espacial. 'De delante de mí' reproduce bien el valor idiomático y la paralela repetición de לְפָנַי más adelante en el versículo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto. Para esta fórmula profética, 'dice Yahvé' suena natural en español y preserva el carácter de declaración solemne sin volverla excesivamente interpretativa.
- source_word: זֶרַע יִשְׂרָאֵל
  english_pob_choice: the offspring of Israel
  chosen_spanish: la descendencia de Israel
  alternatives_spanish:
  - la simiente de Israel
  - los descendientes de Israel
  - el linaje de Israel
  lexicon: HALOT
  rationale: '''Descendencia'' mantiene el sentido colectivo singular de זֶרַע y resulta natural en español. Se evita ''simiente'' por ser más arcaico y menos transparente para el lector contemporáneo.'
- source_word: יִשְׁבְּתוּ
  english_pob_choice: will cease
  chosen_spanish: dejará de ser
  alternatives_spanish:
  - cesará de ser
  - terminará por ser
  - se extinguirá como
  lexicon: HALOT
  rationale: El verbo שׁבת comunica cesar o dejar de continuar en un estado. En español, 'dejará de ser' expresa con claridad el cese de la condición nacional y conserva la solemnidad de la cláusula condicional.
- source_word: מֵהְיוֹת גּוֹי
  english_pob_choice: from being a nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación organizada
  - comunidad
  lexicon: HALOT
  rationale: '''Nación'' corresponde bien a גּוֹי en este contexto, donde el énfasis recae en la persistencia corporativa de Israel como entidad histórica. ''Pueblo'' sería posible, pero suaviza la dimensión política/etnológica presente en el hebreo.'
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia espacial-relacional para preservar el paralelismo con 'de delante de mí' al inicio del versículo.
- source_word: כָּל הַיָּמִים
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - todos los días
  - por todos los días
  - siempre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'todos los días', el sentido idiomático es continuidad duradera. 'Para siempre' sigue la revisión del POB inglés y comunica de modo natural la permanencia ininterrumpida sin perder la fuerza del idiomismo.
theological_decisions:
- issue: Cómo preservar la afirmación sobre la continuidad corporativa de Israel sin suavizarla teológicamente
  english_pob_reading: Retain 'the offspring of Israel ... being a nation before me' in straightforward terms
  chosen_spanish_reading: Mantener 'la descendencia de Israel ... nación delante de mí' en términos directos
  alternative_spanish_readings:
  - Espiritualizar la referencia como continuidad del pueblo de Dios sin connotación nacional
  - Parafrasear como una promesa meramente simbólica o eclesial
  rationale: El hebreo habla explícitamente de la descendencia de Israel dejando de ser nación delante de Yahvé solo si el orden fijo de la creación desaparece. La traducción conserva ese lenguaje corporativo y nacional sin resolver la tensión interpretativa por medio de una glosa teológica posterior.
  doctrine_reference: Primacía del texto original; conservar la tensión histórica-corporativa del pasaje.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió 'forever' sobre 'all the days' por naturalidad idiomática, pero conserva en nota la literalidad del hebreo. También mantiene la lectura del contexto cósmico de 'estatutos fijos' y la referencia corporativa a Israel sin diluirlas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se evitó 'Cristo' o vocabulario eclesial ajeno al pasaje.
  - '''Descendencia de Israel'' conserva el valor colectivo de זֶרַע sin volverlo singular individual.'
  - '''Para siempre'' refleja el sentido idiomático de כָּל הַיָּמִים sin abandonar la base literal hebrea en nota.'
  - Se mantuvo paralelismo con 'de delante de mí' al inicio y al final del versículo.
