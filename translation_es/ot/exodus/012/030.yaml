    issue: La nota [a] está puesta en la frase equivocada.
    rationale: El rastro inglés muestra que la nota a ofrece una alternativa más literal para la cláusula final sobre la casa y el muerto, no para לילה הוא. Tal como está, la nota española introduce una alternativa nueva no sustentada por la evidencia auditada y omite la alternativa sí documentada.
  - severity: low
    issue: El texto de la nota [a] actual es editorialmente débil.
    rationale: 'La redacción «O, más literalmente: “de noche” / “en la noche”» no corresponde al aparato inglés y su uso de barra inclinada es poco elegante para una nota bíblica.'
  revised_spanish_text: Y Faraón se levantó de noche, él y todos sus siervos y todo Egipto, y hubo un gran clamor en Egipto[a], porque no había casa[b] en que no hubiera un muerto.
  revised_footnotes:
