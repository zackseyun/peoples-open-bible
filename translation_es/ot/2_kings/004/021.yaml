translation:
  language: es
  text: Entonces ella subió y lo acostó en la cama del hombre de Dios, cerró la puerta tras él[a] y salió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerró la puerta sobre él», es decir, la cerró de modo que quedara dentro del cuarto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּ֨עַל֙
  english_pob_choice: Then she went up
  chosen_spanish: Entonces ella subió
  alternatives_spanish:
  - Y subió
  - Luego subió
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en el contexto narrativo, «subió» conserva ese movimiento y sugiere de modo natural el traslado a un lugar alto o superior. «Entonces» refleja la secuencia narrativa del waw consecutivo sin sobrecargar el español.
- source_word: וַתַּשְׁכִּבֵ֔/הוּ
  english_pob_choice: laid him
  chosen_spanish: lo acostó
  alternatives_spanish:
  - lo hizo acostarse
  - lo puso a acostarse
  lexicon: HALOT
  rationale: El causativo de שׁכב pide una acción de hacer que alguien quede acostado. En español, «lo acostó» comunica con naturalidad la acción física sin perder el valor causativo básico.
- source_word: עַל מִטַּ֖ת
  english_pob_choice: on the bed
  chosen_spanish: en la cama
  alternatives_spanish:
  - sobre la cama
  - sobre el lecho
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre la cama», en español «lo acostó en la cama» resulta más idiomático y sigue implicando colocación sobre ella. «Cama» es el equivalente natural de מִטָּה en este contexto.
- source_word: אִ֣ישׁ הָ/אֱלֹהִ֑ים
  english_pob_choice: the man of God
  chosen_spanish: del hombre de Dios
  alternatives_spanish:
  - del varón de Dios
  - del profeta de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión titulativa directa del hebreo, sin reinterpretarla como «profeta», para mantener la designación fuente. En español, «hombre de Dios» es clara y tradicionalmente inteligible.
- source_word: וַ/תִּסְגֹּ֥ר
  english_pob_choice: shut
  chosen_spanish: cerró
  alternatives_spanish:
  - cerró con llave
  - echó el cerrojo
  lexicon: HALOT
  rationale: סגר significa cerrar o cerrar de golpe; aquí el punto es la acción de clausurar la puerta. «Cerró» es suficiente y no añade un mecanismo que el texto no especifica.
- source_word: בַּעֲד֖/וֹ
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - sobre él
  - tras él
  - para dejarlo adentro
  lexicon: HALOT
  rationale: La expresión indica cerrar la puerta de manera que él quede dentro. «Detrás de él» preserva esa relación espacial en español y evita la ambigüedad de un cierre meramente posterior sin enclausuramiento.
- source_word: וַ/תֵּצֵֽא
  english_pob_choice: and went out
  chosen_spanish: y salió
  alternatives_spanish:
  - y se fue
  - y se retiró
  lexicon: HALOT
  rationale: יצא es salir; «y salió» mantiene la salida concreta y no añade matiz interpretativo. En español narrativo, la coordinación simple es natural y fiel.
translation_notes:
  revision_awareness: 'El audio-texto inglés pasó por revisiones menores centradas en la frase relativa al cierre de la puerta: se debatió entre ''on him'' y ''behind him'', pero el estado final favorece ''behind him''. La versión española evita reproducir esa vacilación de forma mecánica y elige una expresión clara y natural que conserva el encierro espacial indicado por בַּעֲדוֹ.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y la expresión titulativa «hombre de Dios» de forma consistente con el estilo POB.
  - No se introduce «SEÑOR» ni «Cristo»; no hay base en este versículo para esas sustituciones.
  - Se usa el pretérito simple narrativo («subió», «acostó», «cerró», «salió») para reflejar la secuencia hebrea.
  - La nota al pie a acompaña una alternativa lexical sobre la expresión titulativa; la nota b conserva la ambigüedad del cierre de la puerta como cierre con encierro.
