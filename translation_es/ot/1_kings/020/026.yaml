    text: Or 'the Arameans.' Hebrew 'Aram' can refer to the kingdom or its people/army.
    reason: lexical_alternative
  - marker: c
    text: Or 'against Israel.' The Hebrew preposition is literally 'with,' used here in a battle context.
    reason: lexical_alternative
