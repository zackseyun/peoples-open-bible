translation:
  language: es
  text: Y hallaron escrito en la Ley que Yahvé había mandado por medio de Moisés que los hijos de Israel[a] debían habitar en cabañas durante la fiesta, en el séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los israelitas’ o ‘los hijos de Israel’; el hebreo dice literalmente ‘los hijos de Israel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: HALOT
  rationale: El valor narrativo del wayyiqtol se conserva con un pasado simple natural en español. 'Hallaron' mantiene la idea de encontrar algo ya existente en un texto, como en el inglés auditable 'found'.
- source_word: כָּתוּב
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - registrado
  - puesto por escrito
  lexicon: HALOT
  rationale: Como participio pasivo predicativo tras 'hallaron', 'escrito' reproduce con naturalidad la construcción y conserva el sentido de texto ya fijado.
- source_word: בַּתּוֹרָה
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - en la Torá
  - en la instrucción
  lexicon: HALOT
  rationale: Aquí תּוֹרָה se refiere al corpus legal mosaico. 'Ley' es el equivalente español más claro y establecido para este uso, sin ocultar su valor de instrucción pactal escrita.
- source_word: צִוָּה יְהוָה
  english_pob_choice: the LORD had commanded
  chosen_spanish: Yahvé había mandado
  alternatives_spanish:
  - Yahvé había ordenado
  - Yahvé mandó
  lexicon: HALOT
  rationale: Se preserva el nombre divino como 'Yahvé' según el estándar del proyecto. 'Había mandado' refleja el carácter previo de la orden hallada en la Ley y mantiene el matiz de mandato.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - por Moisés
  lexicon: HALOT
  rationale: La expresión idiomática 'por medio de' comunica la mediación de Moisés de forma idiomática en español y evita un calco poco natural.
- source_word: יֵשְׁבוּ
  english_pob_choice: should dwell
  chosen_spanish: habitaran
  alternatives_spanish:
  - moraran
  - vivieran
  - se alojaran
  lexicon: HALOT
  rationale: En este contexto festivo, ישב expresa residir o permanecer en un tipo de alojamiento temporal. 'Habitaran' conserva el sentido de permanencia ordenada, sin reducirlo a 'sentarse'.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea sin neutralizarla. 'Los hijos de Israel' reproduce el parentesco corporativo explícito del original y es comprensible en español bíblico.
- source_word: בַּסֻּכּוֹת
  english_pob_choice: in booths
  chosen_spanish: en cabañas
  alternatives_spanish:
  - en chozas
  - en tiendas
  - en tabernáculos
  lexicon: HALOT
  rationale: '''סֻכּוֹת'' nombra refugios temporales para la fiesta. ''Cabañas'' comunica bien la idea en español moderno; se evita ''tabernáculos'' por su carga tradicional ambigua.'
- source_word: בֶּחָג
  english_pob_choice: during the feast
  chosen_spanish: durante la fiesta
  alternatives_spanish:
  - en la fiesta
  - en el festival
  lexicon: HALOT
  rationale: La frase adverbial se vierte de manera directa y natural. 'La fiesta' mantiene la referencia festiva conocida en el contexto inmediato.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: HALOT
  rationale: Se conserva la referencia temporal con una equivalencia directa y clara.
theological_decisions:
- issue: Traducción del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El proyecto español usa 'Yahvé' como forma principal para el Tetragrámaton, manteniendo el nombre del pacto en lugar de sustituirlo por una convención de máscara. Aquí no hay razón contextual para cambiarlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Mediación de Moisés en la formulación legal
  english_pob_reading: through Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - por Moisés
  rationale: La lectura no atribuye la ley a Moisés como autor independiente, sino como mediador del mandato divino. 'Por medio de' mantiene esa relación sin pérdida de sentido.
  doctrine_reference: Éxodo 24:3; Deuteronomio 31:9-13
translation_notes:
  revision_awareness: 'El contexto inglés indica una versión aprobada sin cambios recientes (''unchanged: true'') y un acuerdo alto con revisión de solo observaciones menores. La presente redacción sigue ese estado, manteniendo el nombre divino como Yahvé, la mediación de Moisés y la fórmula corporativa ‘los hijos de Israel’, con ajuste idiomático al español.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se mantiene 'Ley' para תּוֹרָה en sentido mosaico/legal.
  - '''Cabañas'' se usa para סֻכּוֹת por claridad y naturalidad, con nota de alternativa lexical.'
  - La nota al pie se ancla en 'los hijos de Israel' para reflejar la alternativa lexical preservada en el audit trail inglés.
