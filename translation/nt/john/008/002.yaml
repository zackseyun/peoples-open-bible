id: JHN.8.2
reference: John 8:2
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ὄρθρου δὲ πάλιν παρεγένετο εἰς τὸ ἱερόν, καὶ πᾶς ὁ λαὸς ἤρχετο πρὸς αὐτόν·
    καὶ καθίσας ἐδίδασκεν αὐτούς.
  language: Greek
translation:
  text: At dawn he came again to the temple, and all the people were coming to him;
    and he sat down and began to teach them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is a continuation of the story of the woman caught in adultery
      (John 7:53–8:11), which is absent from the earliest Greek manuscripts. See note
      on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: Ὄρθρου
  chosen: At dawn
  alternatives:
  - Early in the morning
  - At daybreak
  lexicon: BDAG
  rationale: The genitive of time indicates the period just before or at sunrise.
    'At dawn' captures this concisely in English.
- source_word: παρεγένετο
  chosen: he came
  alternatives:
  - he arrived
  - he appeared
  lexicon: BDAG
  rationale: Indicates arrival or making an appearance at a location. 'Came' fits
    naturally with the destination 'to the temple.'
- source_word: ἱερόν
  chosen: temple
  alternatives:
  - temple courts
  - temple precincts
  lexicon: BDAG
  rationale: Refers to the entire temple complex where public teaching occurred, distinct
    from the inner sanctuary (naos). 'Temple' is the standard English rendering, understood
    contextually as the public courts.
- source_word: καθίσας
  chosen: he sat down
  alternatives:
  - sitting down
  - having taken a seat
  lexicon: BDAG
  rationale: The aorist participle indicates the action preceding the teaching. Sitting
    was the traditional posture for a Jewish rabbi teaching.
- source_word: ἐδίδασκεν
  chosen: began to teach
  alternatives:
  - was teaching
  - taught
  lexicon: BDAG
  rationale: The imperfect tense here can carry an inceptive force ('began to teach')
    or continuous force ('was teaching'). 'Began to teach' flows naturally in English
    after the aorist participle of taking a seat.
