revisions:
- from: Y guarda la carga de Yahvé, tu Dios, andando en sus caminos y guardando sus estatutos, sus mandamientos, sus juicios y sus testimonios, como está escrito en la Ley de Moisés, para que actúes con sabiduría en todo lo que hagas y adondequiera que te vuelvas.
  to: Y guarda el encargo de Yahvé, tu Dios, andando en sus caminos y guardando sus estatutos, sus mandamientos, sus juicios y sus testimonios, como está escrito en la Ley de Moisés, para que actúes con sabiduría en todo lo que hagas y adondequiera que te vuelvas.
  rationale: Se reemplaza únicamente «la carga» por «el encargo» para reflejar fielmente מִשְׁמֶרֶת como deber encomendado y mejorar la naturalidad del español, sin alterar el resto de una traducción que ya preserva bien el sentido del texto fuente y las decisiones auditadas.
