    text: '''Sus ojos se iluminaron'' es un modismo hebreo que indica vigor o alerta renovados después de comer.'
    reason: cultural_note
  revision_rationale: Se ajustó el verbo de inmersión para reflejar mejor וַיִּטְבֹּל, se reemplazó una construcción rígida por una expresión española más natural para el movimiento hacia la boca, y se restauró la imagen idiomática de los ojos con una nota explicativa ya justificada por la auditoría inglesa.
