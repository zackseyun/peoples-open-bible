translation:
  language: es
  text: 'y dirás[a]: «¡Cómo aborrecí la disciplina, y mi corazón despreció la reprensión[b]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y dices», reflejando el perfecto hebreo usado con sentido futuro o consecuencial dentro de la advertencia del padre.
    reason: lexical_alternative
  - marker: b
    text: «Reprensión» también puede traducirse «reproche» o «corrección».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and you say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y dirás entonces
  - 'y dirás:'
  - y dirás tú
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto exhortativo/instructivo funciona como una declaración consecuente o futura; en español, el futuro simple conserva mejor ese valor prospectivo que un presente literal.
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Cuán!
  - ¿Cómo?
  - ¡Ay, cómo!
  lexicon: HALOT
  rationale: Aquí introduce una lamentación exclamativa, no una pregunta informativa; el valor exclamativo se mantiene con «¡Cómo!», con la exclamación implícita en el tono del versículo.
- source_word: שָׂנֵאתִי
  english_pob_choice: I hated
  chosen_spanish: aborrecí
  alternatives_spanish:
  - odié
  - he aborrecido
  lexicon: HALOT
  rationale: «Aborrecí» expresa con más fuerza el rechazo intenso del verbo hebreo en paralelo con «despreció», sin perder el matiz afectivo negativo.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la instrucción
  - la corrección
  - el castigo disciplinario
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר combina instrucción formativa y corrección; «disciplina» preserva ambos aspectos y coincide con la elección auditada en inglés.
- source_word: וְתוֹכַחַת
  english_pob_choice: and reproof
  chosen_spanish: la reprensión
  alternatives_spanish:
  - el reproche
  - la corrección
  - la reprensión y corrección
  lexicon: HALOT
  rationale: «Reprensión» es un equivalente natural y bíblicamente claro para תוֹכַחַת, manteniendo el registro sapiencial; en español alterna bien con «disciplina» sin perder la idea de corrección verbal.
- source_word: נָאַץ
  english_pob_choice: despised
  chosen_spanish: despreció
  alternatives_spanish:
  - menospreció
  - rechazó con desprecio
  - aborreció
  lexicon: HALOT
  rationale: El verbo expresa desprecio desdeñoso; «despreció» reproduce bien esa fuerza y corresponde al paralelo con «aborrecí».
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - yo
  - mi ser interior
  - mi interior
  lexicon: HALOT
  rationale: Se conserva la antropología hebrea del «corazón» como centro interior de pensamiento y voluntad, en lugar de reducirlo a un pronombre.
translation_notes:
  revision_awareness: El texto se mantiene en alto acuerdo con el audit trail inglés y el hebreo masorético; no se detectaron revisiones textuales relevantes en el expediente proporcionado.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre «disciplina» y «reprensión», evitando armonizar ambos términos en una sola palabra.
  - Se mantuvo «corazón» para לִבִּי, siguiendo la antropología bíblica hebrea.
  - Se eligió el futuro simple «dirás» para reflejar el valor prospectivo del perfecto hebreo en contexto exhortativo.
