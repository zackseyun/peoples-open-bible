translation:
  language: es
  text: Un gobernante[a], un gobernador y un juez son honrados, pero ninguno es mayor que el que teme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego aquí tiene una lectura sustancialmente diferente: «Los hombres libres servirán a un esclavo sabio, y un hombre entendido no se quejará».'
    reason: textual_variant
lexical_decisions:
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  lexicon: HALOT
  rationale: נָגִיד señala a alguien puesto sobre otros con autoridad. En español, «gobernante» mantiene la idea de autoridad sin cargar un matiz dinástico como «príncipe».
- source_word: מוֹשֶׁל
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - regente
  - el que gobierna
  lexicon: HALOT
  rationale: Como el primer término ya sugiere autoridad, aquí conviene conservar una diferenciación léxica. «Gobernador» transmite una figura que ejerce gobierno y preserva la lista tripartita.
- source_word: שׁוֹפֵט
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  lexicon: HALOT
  rationale: «Juez» es la correspondencia natural y clara para un cargo judicial.
- source_word: נִכְבָּדוּ
  english_pob_choice: are honored
  chosen_spanish: se les honra
  alternatives_spanish:
  - son estimados
  - son honrados
  lexicon: HALOT
  rationale: El hebreo pasivo plural expresa que reciben honor. En español, «se les honra» conserva ese valor pasivo y suena natural.
- source_word: וְאֵין גָּדוֹל
  english_pob_choice: but none is greater
  chosen_spanish: pero ninguno es mayor
  alternatives_spanish:
  - y no hay nadie mayor
  - sin embargo, nadie es mayor
  lexicon: HALOT
  rationale: La frase establece un contraste de superioridad; «pero ninguno es mayor» reproduce bien la comparación superlativa.
- source_word: מִיְּרֵא אֱלֹהִים
  english_pob_choice: than one who fears God
  chosen_spanish: que el que teme a Dios
  alternatives_spanish:
  - que el que reverencia a Dios
  - que el piadoso
  lexicon: HALOT
  rationale: La expresión bíblica «teme a Dios» conserva la fuerza idiomática de reverencia y piedad, sin diluirla en una formulación más general.
theological_decisions:
- issue: Manejo de la fuerte discrepancia entre el hebreo y el testimonio griego
  english_pob_reading: 'The Hebrew text is primary; the Greek witness preserves a substantially different saying: ''Free men will serve a wise slave, and an understanding man will not complain.'''
  chosen_spanish_reading: Se traduce el hebreo conservado como texto principal, y se registra en nota que el griego ofrece un dicho sustancialmente distinto.
  alternative_spanish_readings:
  - «Los hombres libres servirán a un esclavo sabio, y un hombre entendido no se quejará»
  - «Los libres servirán a un esclavo sabio, y el entendido no murmurará»
  rationale: Aquí no se trata de una variante menor, sino de una sentencia diferente. Por fidelidad al testimonio hebreo disponible y honestidad textual, el texto principal sigue el hebreo y la lectura griega se preserva en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; preserve major textual uncertainty honestly.'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo conservado como texto principal, con la divergencia griega registrada en nota; no se requirieron cambios respecto del último repaso.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - 'Se mantuvo una distinción léxica entre los tres cargos: gobernante, gobernador y juez.'
  - La fórmula «teme a Dios» conserva el giro bíblico reconocido en español y evita una paráfrasis explicativa.
