revisions:
- from: Y no consideren admirable que la razón haya prevalecido sobre aquellos hombres en sus tormentos[a][b], pues incluso la mente de una mujer despreció dolores[b] más intensos.
  to: Y no consideren extraordinario que la razón haya prevalecido sobre aquellos hombres en sus tormentos[a], pues incluso la mente de una mujer despreció dolores[b] más intensos.
  rationale: Se corrige «admirable» por «extraordinario» para reflejar mejor θαυμαστόν en español natural. Se repara el aparato de notas asignando [a] a «tormentos» y [b] a «dolores», con marcadores únicos y contenido correspondiente a cada lugar. Se conserva el resto porque refleja fielmente λογισμός, περιεκράτησεν, γυναικὸς νοῦς y la intensificación contextual de los dolores.
