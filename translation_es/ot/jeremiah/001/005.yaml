revisions:
- from: Antes de formarte en el vientre, te conocí; y antes de que salieras del vientre, te aparté[a]; te puse como profeta para las naciones.
  to: Antes de formarte en el vientre, te conocí[a]; y antes de que salieras del vientre, te aparté[b]; te designé como profeta a las naciones.
  rationale: Se conserva la fidelidad al hebreo y a la filosofía del POB, pero se repara la documentación auditiva añadiendo la nota sobre «te conocí» y manteniendo la alternativa «te consagré» en el verbo de consagración/apartamiento. También se mejora la naturalidad y precisión de la comisión profética con «te designé ... a las naciones».
