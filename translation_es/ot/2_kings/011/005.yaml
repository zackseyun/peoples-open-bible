translation:
  language: es
  text: 'Y les ordenó, diciendo: «Esto es lo que ustedes harán: un tercio de ustedes, los que entran el sábado, harán guardia sobre la casa del rey[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio real». El hebreo dice literalmente «la casa del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֵּם
  english_pob_choice: And he commanded them
  chosen_spanish: Y le dio órdenes
  alternatives_spanish:
  - Y les mandó
  - Y los mandó
  lexicon: HALOT
  rationale: El piel de צוה expresa mandato con autoridad. «Dar órdenes» conserva la fuerza directiva sin sonar excesivamente arcaico. Se usa singular implícito en el contexto narrativo, como en el inglés POB.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Fórmula narrativa estándar de introducción de discurso; «diciendo» refleja la unión sintáctica del hebreo sin añadir matiz.
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esta es la cosa
  alternatives_spanish:
  - Esto es lo que
  - Esta es la orden
  lexicon: HALOT
  rationale: «דָּבָר» puede ser «cosa», «asunto» o «palabra». Aquí el inglés POB eligió una forma relativamente literal; en español «la cosa» conserva la deixis y la concreción del hebreo, aunque suene menos idiomático que «lo que» o «la orden».
- source_word: אֲשֶׁר תַּעֲשׂוּן
  english_pob_choice: that you shall do
  chosen_spanish: que ustedes harán
  alternatives_spanish:
  - que ustedes deben hacer
  - que harán
  lexicon: HALOT
  rationale: El imperfecto de instrucción en este contexto tiene valor directivo. «Harán» mantiene el futuro exhortativo sin sobrecargarlo con obligación explícita que no está en la forma verbal.
- source_word: הַשְּׁלִשִׁית מִכֶּם
  english_pob_choice: one third of you
  chosen_spanish: un tercio de ustedes
  alternatives_spanish:
  - la tercera parte de ustedes
  - un tercio entre ustedes
  lexicon: HALOT
  rationale: La expresión fraccionaria se entiende de modo colectivo. «Un tercio de ustedes» comunica de forma natural la partición del grupo.
- source_word: בָּאֵי הַשַּׁבָּת
  english_pob_choice: who come on the Sabbath
  chosen_spanish: los que entran en sábado
  alternatives_spanish:
  - los que vienen en sábado
  - los que llegan en sábado
  lexicon: HALOT
  rationale: בָּאֵי es literalmente «los que vienen/entran». En este contexto militar/turno de guardia, «entran» transmite el cambio de relevo; «en sábado» conserva la referencia temporal. No se explicita «al relevo» para no añadir algo no dicho en el hebreo.
- source_word: וְשֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_choice: shall keep watch
  chosen_spanish: guardarán vigilancia
  alternatives_spanish:
  - harán guardia
  - mantendrán la guardia
  lexicon: HALOT
  rationale: El participio con מִשְׁמֶרֶת denota función de guardia/turno. «Guardar vigilancia» conserva el valor durativo y formal de la guardia, y evita una simple repetición de «guardar» en español.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa del rey». Aunque el contexto puede referir al palacio, se conserva la formulación literal para no cerrar indebidamente la referencia espacial; por eso se mantiene «casa del rey» y no se sustituye por «palacio».
theological_decisions:
- issue: 'Alcance de בֵּית הַמֶּלֶךְ: casa o palacio'
  english_pob_reading: the king’s house, with footnote allowing “the royal palace” as an alternative
  chosen_spanish_reading: la casa del rey, con la posibilidad contextual de entender el recinto palaciego
  alternative_spanish_readings:
  - el palacio del rey
  - la casa real
  rationale: El texto hebreo es literal («casa del rey»). El inglés POB preserva esa literalidad y añade nota alternativa. En español se mantiene la forma literal y se deja abierta la posible referencia al complejo palaciego, sin imponer una equivalencia interpretativa no explicitada por el hebreo.
  doctrine_reference: none
- issue: Valor de la instrucción verbal en אֲשֶׁר תַּעֲשׂוּן
  english_pob_reading: that you shall do
  chosen_spanish_reading: que ustedes harán
  alternative_spanish_readings:
  - que ustedes deben hacer
  - que ustedes han de hacer
  rationale: 'No hay una dimensión doctrinal, pero sí una decisión sobre el tono: el futuro hebreo en contexto normativo funciona como instrucción. «Harán» conserva ese valor sin convertirlo en un mandamiento extra-explicado.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió explícitamente shall before keep watch para reflejar con mayor claridad la fuerza verbal. En español se ha reflejado esa fuerza con el futuro «guardarán vigilancia», manteniendo la sintaxis fluida y el valor directivo del hebreo. No se siguió mecánicamente la versión anterior del inglés en el tramo final, sino la lectura revisada y el hebreo subyacente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - Se conserva «casa del rey» en el cuerpo del texto para respetar la literalidad hebrea y la nota cubre la alternativa contextual.
  - «Diciendo» y la estructura de discurso directa siguen el patrón narrativo del hebreo sin añadir conectores interpretativos.
  - La división cuantitativa «un tercio de ustedes» evita una paráfrasis mayor y respeta el sentido colectivo de la forma hebrea.
