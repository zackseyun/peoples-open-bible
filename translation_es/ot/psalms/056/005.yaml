translation:
  language: es
  text: En Dios alabaré su palabra; en Dios he confiado; no temeré. ¿Qué puede hacerme la carne?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué me hará la carne?». El hebreo tiene literalmente forma futura; en español también puede expresarse como una pregunta retórica de incapacidad: «¿Qué puede hacerme la carne?»'
    reason: lexical_alternative
  - marker: b
    text: «La carne» aquí se refiere a seres humanos frágiles, en contraste con Dios.
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאלֹהִים
  english_pob_choice: In God
  chosen_spanish: En Dios
  alternatives_spanish:
  - Por Dios
  - Mediante Dios
  lexicon: HALOT
  rationale: La preposición ב con אֱלֹהִים aquí funciona de modo idiomático como esfera o base de la acción. En español, “En Dios” mantiene esa relación con naturalidad y refleja bien el paralelismo del verso.
- source_word: אֲהַלֵּל
  english_pob_choice: I will praise
  chosen_spanish: alabaré
  alternatives_spanish:
  - pregonaré
  - loaré
  lexicon: HALOT
  rationale: El piel imperfecto expresa una acción de alabanza con tono resolutivo. “Alabaré” comunica bien esa decisión poética sin perder la fuerza verbal del hebreo.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su promesa
  - lo que ha dicho
  lexicon: HALOT
  rationale: דבר puede significar palabra, asunto o dicho. “Su palabra” conserva la forma léxica y deja abierta la amplitud teológica del término, como en el inglés POB.
- source_word: בָּטַחְתִּי
  english_pob_choice: I have trusted
  chosen_spanish: he confiado
  alternatives_spanish:
  - confío
  - he puesto mi confianza
  lexicon: HALOT
  rationale: El qatal expresa una confianza ya afirmada con efecto presente. En español, “he confiado” reproduce bien ese valor perfecto y el tono de seguridad resultante.
- source_word: לֹא אִירָא
  english_pob_choice: I will not fear
  chosen_spanish: no temeré
  alternatives_spanish:
  - no tengo temor
  - no temeré en absoluto
  lexicon: HALOT
  rationale: El imperfecto negado comunica una negativa firme hacia el futuro o como resolución. “No temeré” es la forma más natural y poética en español para esa determinación.
- source_word: מַה יַּעֲשֶׂה
  english_pob_choice: What can ... do
  chosen_spanish: ¿Qué puede hacerme?
  alternatives_spanish:
  - ¿Qué me hará?
  - ¿Qué podrá hacerme?
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente futura, la pregunta retórica expresa incapacidad ante la confianza en Dios. “¿Qué puede hacerme?” reproduce bien la fuerza retórica en español.
- source_word: בָשָׂר
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - el hombre
  - los mortales
  - los seres humanos
  lexicon: HALOT
  rationale: En este contexto, בשר contrasta la fragilidad humana con Dios. “La carne” conserva la metáfora hebrea y la tensión teológica sin reducirla a “hombre”.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - para mí
  lexicon: HALOT
  rationale: 'Con el verbo poder/hacer en una pregunta retórica, el pronombre dativo en español suena más natural como objeto indirecto: “hacerme”. Mantiene el sentido de afectación personal del hebreo.'
theological_decisions:
- issue: Metáfora antropológica de בָשָׂר frente a Dios
  english_pob_reading: flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - el hombre
  - los mortales
  - los seres humanos
  rationale: La tensión del verso está entre la confianza en Dios y la limitación de la humanidad frágil. “La carne” conserva la metáfora original y evita suavizarla con una expresión más explicativa.
  doctrine_reference: 'DOCTRINE.md: consistencia de términos clave; בָשָׂר se rinde como ''carne'' cuando es literal'
- issue: Estructura retórica de confianza que desemboca en ausencia de temor
  english_pob_reading: I have trusted; I will not fear.
  chosen_spanish_reading: he confiado; no temeré.
  alternative_spanish_readings:
  - confío; no temeré
  - he confiado, por eso no temeré
  rationale: La unión entre confianza y ausencia de temor debe mantenerse como consecuencia implícita, sin añadir causalidad explícita que el hebreo no exige. El español conserva ese enlace con la puntuación y el orden.
  doctrine_reference: 'DOCTRINE.md: fidelidad a paralelismo y fuerza retórica'
- issue: Divine speech term דְּבָרוֹ
  english_pob_reading: his word
  chosen_spanish_reading: su palabra
  alternative_spanish_readings:
  - su promesa
  - lo que ha dicho
  rationale: “Su palabra” mantiene la amplitud del término hebreo y evita estrecharlo solo a una promesa puntual. Esto respeta la posibilidad de referencia tanto a lo dicho por Dios como a su declaración eficaz.
  doctrine_reference: 'DOCTRINE.md: preservar amplitud semántica cuando el original es amplio'
translation_notes:
  revision_awareness: 'La revisión en inglés ajustó la puntuación para reflejar mejor el paralelismo: una primera afirmación de alabanza y una segunda de confianza que conduce a la ausencia de temor. En español se refleja esa misma estructura con dos puntos y coma, sin introducir una separación excesiva ni alterar el contenido léxico.'
  spanish_consistency_notes:
  - Se conservó 'Dios' para אֱלֹהִים, siguiendo el criterio del proyecto.
  - Se eligió 'carne' para בָשָׂר por coherencia con el valor metafórico literal del término.
  - No se añadió nota al pie porque no era necesaria para resolver ambigüedad residual en español.
  - La puntuación mantiene el paralelismo del verso y la relación entre confianza y no temor.
