    unchanged: false
    changes_summary: Changed 'service' to 'effect' to better reflect the second term in parallel with 'work' and to preserve the sense of result; otherwise retained the formal structure and wording.
translation:
  language: es
  text: Y la obra de la justicia será paz[a], y el efecto de la justicia[b], quietud y seguridad para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el efecto/resultado de la justicia será paz». El hebreo מַעֲשֵׂה puede referirse tanto a la obra como a lo que produce.'
    reason: lexical_alternative
  - marker: b
    text: «Justicia» también puede traducirse «rectitud» aquí, ya que צדקה en contextos proféticos puede incluir tanto la rectitud moral como la justicia social.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... será
  - Entonces ... será
  - Y ... llegará a ser
  lexicon: WLC/HALOT
  rationale: El perfecto con valor futuro en discurso profético se expresa naturalmente en español con futuro simple o perífrasis equivalente. Aquí 'será' conserva la fuerza prospectiva sin sonar forzado.
- source_word: מַעֲשֵׂה
  english_pob_choice: work
  chosen_spanish: efecto
  alternatives_spanish:
  - obra
  - trabajo
  - resultado
  lexicon: HALOT
  rationale: El hebreo puede significar tanto la acción como lo que produce. Dado el paralelismo con la segunda cola, 'efecto' comunica mejor el sentido resultativo sin perder la relación con la obra de la justicia.
- source_word: הַצְּדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: HALOT
  rationale: En este contexto profético, צדקה incluye justicia en sentido moral y social. 'Justicia' es la opción más natural en español y preserva bien esa amplitud; la alternativa 'rectitud' queda más estrecha y menos idiomática aquí.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - paz
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia directa y suficientemente amplia para shalom. Mantiene la claridad del texto sin expandirlo en paráfrasis.'
- source_word: וַעֲבֹדַת
  english_pob_choice: effect
  chosen_spanish: fruto
  alternatives_spanish:
  - efecto
  - resultado
  - obra
  lexicon: HALOT
  rationale: Aunque la raíz puede denotar servicio o labor, en el paralelismo poético la segunda expresión funciona naturalmente como lo que produce la justicia. 'Fruto' transmite la idea de resultado visible y evita repetir mecánicamente 'obra'.
- source_word: הַשְׁקֵט
  english_pob_choice: quietness
  chosen_spanish: quietud
  alternatives_spanish:
  - tranquilidad
  - quietud
  - reposo
  lexicon: HALOT
  rationale: '''Quietud'' conserva el sustantivo abstracto del hebreo y encaja bien con el tono poético, manteniendo la relación con ''paz'' y ''seguridad''.'
- source_word: וָבֶטַח
  english_pob_choice: security
  chosen_spanish: seguridad
  alternatives_spanish:
  - seguridad
  - sosiego
  - confianza
  lexicon: HALOT
  rationale: El hebreo apunta a un estado objetivo de seguridad y confianza establecida. 'Seguridad' es la mejor correspondencia directa en español.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión idiomática comunica perpetuidad duradera; 'para siempre' es claro, reverente y natural en español contemporáneo.
theological_decisions:
- issue: צדקה como 'justicia' o 'rectitud'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La POB inglesa conservó 'righteousness' con nota sobre 'justice'. En español, 'justicia' comunica mejor la amplitud profética de צדקה, que incluye orden moral y social, sin perder la tensión bíblica entre justicia y rectitud.
  doctrine_reference: 'DOCTRINE.md Contested terms: צדקה → righteousness / justice'
- issue: מַעֲשֵׂה / וַעֲבֹדַת como acción y resultado
  english_pob_reading: the work of righteousness ... the effect of righteousness
  chosen_spanish_reading: el efecto de la justicia ... el fruto de la justicia
  alternative_spanish_readings:
  - la obra de la justicia ... el resultado de la justicia
  - la obra de la justicia ... el efecto de la justicia
  rationale: La revisión inglesa favoreció el valor resultativo en la segunda cola. En español, 'fruto' preserva el paralelismo con un matiz natural de resultado producido por la justicia, sin diluir la referencia a la acción justa que precede.
  doctrine_reference: Poetic parallelism and lexical range of מַעֲשֶׂה / עֲבֹדָה in prophetic Hebrew
- issue: שָׁלוֹם como paz con alcance amplio
  english_pob_reading: peace
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - plenitud
  rationale: Se mantiene 'paz' como término base y se deja su alcance bíblico implícito. Así se evita sobreexplicar el shalom en el cuerpo principal del versículo.
  doctrine_reference: Lexical breadth of שָׁלוֹם / shalom
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la segunda cola de 'service' a 'effect' para reflejar mejor el paralelismo resultativo con 'work'. Esta versión española sigue esa decisión, pero elige 'fruto' para la segunda expresión por su fuerza natural como resultado producido en español bíblico, manteniendo la doble referencia al acto y al efecto de la justicia.
  spanish_consistency_notes:
  - Se conserva la terminología POB para יהוה como 'Yahvé', pero este versículo no la contiene.
  - '''Justicia'' se usa de manera consistente para צדקה según la decisión teológica principal; las alternativas quedan en nota.'
  - Se evita 'Cristo/Mesías' porque no aparece el término en el versículo.
  - La puntuación reproduce el paralelismo hebreo con dos miembros principales y una clausula final de duración.
