review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: contraste numérico desproporcionado, segunda persona plural, y la imagen final de aislamiento visible. Sin embargo, hay dos fallas importantes de alineación documental: (1) las notas al pie están invertidas respecto de los anclajes del texto y del contenido léxico documentado; (2) la primera cláusula usa tercera persona plural (''huirán'') mientras la segunda usa segunda persona plural (''huiréis''), aunque el hebreo tiene segunda persona plural explícita en תָנֻסוּ y el inglés POB mantiene segunda persona en la segunda mitad sin introducir un sujeto distinto. Además, ''mástil'' en el texto principal no sigue la decisión inglesa preferida (''signal pole'') aunque sí queda como alternativa válida en nota.'
  spanish_quality_summary: El español es claro y digno, pero conviene mejorar la consistencia verbal y la naturalidad semántica. 'Mil huirán' suena menos coherente con la apelación profética directa del versículo; 'Mil huiréis' preserva mejor el golpe retórico del hebreo. 'Reprensión' es aceptable, aunque algo menos idiomático en contexto militar que 'reprensión/amenaza'; no obstante, puede conservarse. 'Mástil' en texto principal puede sugerir demasiado un objeto náutico; 'poste de señal' comunica mejor la función visible y el paralelismo con 'estandarte'.
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé/Mesías. En cuanto a decisiones léxicas auditadas, conviene alinear כַּתֹּרֶן con 'poste de señal' en el texto principal y dejar 'mástil' como alternativa en nota. También deben corregirse los marcadores [a] y [b] para que correspondan a תֹּרֶן y נֵס respectivamente.
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] están asignados al lugar equivocado.
    rationale: En el texto, [a] aparece tras 'uno' y [b] tras 'monte', pero la nota a documenta תֹּרֶן ('mástil/poste') y la nota b documenta נֵס ('estandarte/señal'). Esto rompe la trazabilidad del audit trail y la disciplina requerida de anclaje exacto.
  - severity: medium
    issue: Inconsistencia de persona verbal en 'Mil huirán ... huiréis'.
    rationale: El hebreo tiene segunda persona plural en תָנֻסוּ. Aunque 'mil' podría llevar a una reformulación impersonal en español, mezclar tercera y segunda persona dentro del mismo paralelismo debilita la fidelidad y la claridad.
  - severity: medium
    issue: '''Mástil'' en el texto principal no refleja la preferencia léxica documentada.'
    rationale: El English POB eligió 'signal pole' como lectura principal por el paralelismo con נֵס y la imagen de señal visible en altura. En español, 'poste de señal' o 'asta de señal' comunica mejor ese valor; 'mástil' debe quedar como alternativa en nota.
  revised_spanish_text: Mil huiréis ante la reprensión de uno; ante la reprensión de cinco huiréis, hasta que quedéis como un poste de señal[a] en la cima de un monte, y como un estandarte[b] sobre una colina.
  revised_footnotes:
  - marker: a
    text: O “como un mástil en la cima de un monte”. El hebreo תֹּרֶן puede referirse a un mástil o a un poste alto.
    reason: lexical_alternative
  - marker: b
    text: O “como un estandarte de señal sobre una colina”. El hebreo נֵס designa una bandera o estandarte elevado usado como señal.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la colocación de las notas para que coincidan con las palabras relevantes del texto, restablece la consistencia de segunda persona plural conforme al hebreo, y alinea la elección principal de כַּתֹּרֶן con la decisión documentada del POB ('signal pole') mediante 'poste de señal', dejando 'mástil' como alternativa léxica válida en nota.
