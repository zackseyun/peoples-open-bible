  text: Binding him to it on his knees[a], and fastening these with iron shackles, they bent his waist down over the wheel's wedge; around which, entirely bent back upon the wheel like a scorpion[c][b], he was being dismembered.
  footnotes:
  - marker: a
    text: Or 'with iron fetters' or 'with iron leg-irons'; the Greek term refers specifically to restraints placed on the feet or legs.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the wheel’s wedge' reflects specialized torture-device language; the exact mechanical feature is difficult to specify more narrowly from the Greek alone.
    reason: cultural_note
  - marker: c
    text: Or 'bent back like a scorpion'; the comparison likely evokes the body being arched or curled backward under torture.
    reason: lexical_alternative
