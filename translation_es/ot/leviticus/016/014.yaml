review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual del hebreo: tomar parte de la sangre del toro, rociar con el dedo sobre la kapporet hacia el oriente, y luego delante de ella siete veces. También conserva correctamente el valor partitivo de מִן y la distinción espacial entre עַל פְּנֵי y לִפְנֵי. Sin embargo, la nota al pie no preserva de verdad la alternativa del expediente inglés, porque repite la misma expresión del texto principal en lugar de ofrecer una alternativa léxica real para כַּפֹּרֶת.'
  spanish_quality_summary: El español es claro y legible. 'Tomará', 'con su dedo', 'hacia el oriente' y 'delante de' funcionan bien. 'La rociará' es comprensible, aunque en el segundo miembro queda mejor evitar la repetición pesada con una formulación más directa y fluida. La principal reparación necesaria está en la nota al pie; además conviene aligerar 'sobre la parte frontal' a 'sobre el frente', que suena más natural sin perder precisión.
  glossary_alignment: No hay conflicto con los términos globales principales del proyecto. La decisión de usar 'cubierta de expiación' para כַּפֹּרֶת es defendible en español según la justificación dada, aunque difiere del inglés 'mercy seat'. Esa diferencia no exige adjudicación mayor aquí porque está documentada y no altera el sentido; pero si el proyecto busca uniformidad intertestamentaria estricta para kapporet/propiciatorio, podría revisarse en lote, no por este versículo. La nota sí debe alinearse con la lógica del inglés y dar una alternativa distinta, por ejemplo 'propiciatorio'.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite 'cubierta de expiación' como alternativa.
    rationale: Una nota de alternativa léxica debe ofrecer una opción distinta. Tal como está, no aporta información y no preserva el contraste que sí existe en el expediente inglés entre traducción principal y alternativa.
  - severity: low
    issue: '''sobre la parte frontal'' suena algo rígido en español.'
    rationale: '''Sobre el frente'' o ''sobre la parte delantera'' comunica la misma orientación espacial de manera más natural y eclesialmente legible.'
  - severity: low
    issue: La repetición de 'un poco de la sangre' puede simplificarse al final.
    rationale: El segundo מִן puede expresarse como 'de la sangre' sin perder el valor partitivo, ya ya establecido por el contexto inmediato; esto mejora el ritmo en español.
  revised_spanish_text: Tomará un poco de la sangre del toro y la rociará con su dedo sobre el frente de la cubierta de expiación[a], hacia el oriente; y delante de la cubierta de expiación rociará de la sangre con su dedo siete veces.
  revised_footnotes:
  - marker: a
    text: O "propiciatorio". El hebreo kapporet se refiere a la cubierta del arca, el lugar asociado con la expiación.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que preserve una alternativa léxica real para כַּפֹּרֶת, en vez de repetir el texto principal. Además, se suaviza 'parte frontal' a 'frente' para mayor naturalidad en español, y se simplifica la segunda mención partitiva de la sangre sin alterar el sentido ritual del hebreo.
