  yaml_path: translation/ot/numbers/019/009.yaml
  text: Then a clean man shall gather the ashes of the heifer and place them outside the camp in a clean place[a], and they shall be kept for the congregation of the sons of Israel for water for impurity[b]; it is a sin offering.
  footnotes:
