translation:
  language: es
  text: 'Todos los servidores del rey y el pueblo de las provincias del rey saben que, para cualquier hombre o mujer que entre a ver al rey en el patio interior sin ser llamado[a], hay una sola ley para esa persona[b]: ser condenado a muerte, excepto aquel a quien el rey extienda el cetro de oro, para que viva. Pero en cuanto a mí, no he sido llamada para ir a ver al rey estos treinta días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin ser convocado». El hebreo usa un pasivo de «llamar»; aquí «ser llamado» expresa de manera natural el protocolo formal de la corte.
    reason: lexical_alternative
  - marker: b
    text: 'O «solo hay un decreto: muerte». El hebreo literalmente habla de «una sola ley» aplicada en ese caso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: HALOT
  rationale: El término hebreo עבד puede abarcar servicio cortesano, pero el POB inglés documenta la fuerza léxica y evita suavizarla con 'servants'. En español, 'esclavos' conserva esa fuerza semántica mejor que 'siervos', aunque en el marco persa pueda sonar más duro; se mantiene porque el texto no ofrece base para atenuarlo.
- source_word: וְעַם מְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: and the people of the king’s provinces
  chosen_spanish: y el pueblo de las provincias del rey
  alternatives_spanish:
  - y la gente de las provincias del rey
  - y el pueblo de las provincias reales
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce bien עַם y ''provincias'' conserva el valor administrativo estándar de מְדִינוֹת en Ester. Se evita ''reales'' porque el hebreo dice literalmente ''del rey'' y el contexto lo especifica sin necesidad de paráfrasis.'
- source_word: יֹדְעִים
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - están al tanto de
  - conocen
  lexicon: HALOT
  rationale: Verbo cognitivo directo; 'saben' es natural en español y preserva la notoriedad pública de la norma.
- source_word: כָּל אִישׁ וְאִשָּׁה
  english_pob_choice: any man or woman
  chosen_spanish: todo hombre o mujer
  alternatives_spanish:
  - cualquier hombre o mujer
  - todo varón o mujer
  lexicon: HALOT
  rationale: La construcción distributiva hebrea incluye ambos sexos explícitamente. 'Todo hombre o mujer' mantiene la exactitud del original sin volverlo más inclusivo o más interpretativo de lo que warrants el texto.
- source_word: יָבוֹא אֶל הַמֶּלֶךְ אֶל הֶחָצֵר הַפְּנִימִית
  english_pob_choice: goes to the king in the inner court
  chosen_spanish: entre al rey en el patio interior
  alternatives_spanish:
  - vaya al rey en el patio interior
  - se presente ante el rey en el patio interior
  lexicon: HALOT
  rationale: Se conserva la idea de acceso al rey mediante el patio interior del palacio. 'Entre al rey' suena algo elíptico en español, pero refleja el hebreo y evita expandirlo a una fórmula de audiencia que el texto no explicita.
- source_word: אֲשֶׁר לֹא יִקָּרֵא
  english_pob_choice: without being summoned
  chosen_spanish: sin ser llamado
  alternatives_spanish:
  - sin haber sido llamado
  - sin ser convocado
  lexicon: HALOT
  rationale: El POB inglés escogió 'summoned' por protocolo cortesano. En español, 'llamado' conserva el pasivo del hebreo y suena más natural que 'convocado'; se preserva la nota de acceso oficial sin añadir tecnicismo.
- source_word: אַחַת דָּתוֹ
  english_pob_choice: there is one law for him
  chosen_spanish: hay una sola ley para él
  alternatives_spanish:
  - hay un solo decreto para él
  - su ley es una
  lexicon: HALOT
  rationale: 'Se mantiene la ambigüedad legal del hebreo y del POB inglés: ''ley'' permite abarcar la decisión jurídica o la norma fija aplicable. No se reemplaza por ''decreto'' porque el texto fuente usa דת, no un término distinto para decreto.'
- source_word: לְהָמִית
  english_pob_choice: to be put to death
  chosen_spanish: ser muerto
  alternatives_spanish:
  - morir
  - ser ejecutado
  lexicon: HALOT
  rationale: '''Ser muerto'' refleja la pasiva de resultado del hebreo con fuerza legal. Aunque menos usual en español moderno, preserva mejor la literalidad semántica que ''morir'', que podría sonar meramente natural y no judicial.'
- source_word: לְבַד מֵאֲשֶׁר
  english_pob_choice: except for the one to whom
  chosen_spanish: salvo aquel a quien
  alternatives_spanish:
  - excepto aquel a quien
  - a menos que el rey
  lexicon: HALOT
  rationale: Fórmula de excepción clara y elegante. 'Salvo' mantiene la restricción exclusiva del hebreo sin recargar el período.
- source_word: יוֹשִׁיט לוֹ
  english_pob_choice: extends
  chosen_spanish: extienda
  alternatives_spanish:
  - alargue
  - tome y extienda
  lexicon: HALOT
  rationale: El gesto real de extender el cetro se expresa con un verbo directo y natural en español. 'Extienda' conserva la imagen física y la función de favor real.
- source_word: שַׁרְבִיט הַזָּהָב
  english_pob_choice: the golden scepter
  chosen_spanish: el cetro de oro
  alternatives_spanish:
  - el cetro dorado
  - el cetro de oro fino
  lexicon: HALOT
  rationale: '''Cetro de oro'' es la expresión española más clara y fiel para el objeto emblemático. ''Dorado'' podría sugerir recubrimiento y no necesariamente materialidad, por lo que se evita.'
- source_word: וְחָיָה
  english_pob_choice: so that he may live
  chosen_spanish: y vivirá
  alternatives_spanish:
  - para que viva
  - y vivirá él
  lexicon: HALOT
  rationale: El hebreo formula el resultado de la concesión real; el español futuro 'vivirá' expresa bien la consecuencia sin añadir una perífrasis interpretativa.
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Y yo
  alternatives_spanish:
  - Pero yo
  - En cuanto a mí
  lexicon: HALOT
  rationale: El pronombre es enfático. 'Y yo' conserva la simpleza del hebreo, aunque en español la oposición discursiva sea menos marcada que en inglés; se evita añadir una conjunción adversativa que no está explícita.
- source_word: לֹא נִקְרֵאתִי
  english_pob_choice: I have not been summoned
  chosen_spanish: no he sido llamada
  alternatives_spanish:
  - no he sido convocada
  - no me han llamado
  lexicon: HALOT
  rationale: Se mantiene el pasivo y el registro femenino adecuado al contexto de Ester. 'Llamada' reproduce el valor básico de קרא y conserva la relación con la nota de acceso al rey.
- source_word: זֶה שְׁלוֹשִׁים יוֹם
  english_pob_choice: these thirty days
  chosen_spanish: estos treinta días
  alternatives_spanish:
  - hace treinta días
  - durante estos treinta días
  lexicon: HALOT
  rationale: La deixis temporal se conserva con 'estos treinta días', que suena natural y sigue de cerca la construcción hebrea.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo de Ester 4:11 y el tramo auditado del POB inglés. Se respetan las decisiones revisadas como el valor legal de דת, la pasiva de יִקָּרֵא, y la restricción de acceso a la presencia del rey. No se introdujeron cambios textuales ni interpretativos no respaldados por la fuente.
  spanish_consistency_notes:
  - Se mantiene 'rey' de forma consistente para מֶלֶךְ.
  - Se usa 'patio interior' para הֶחָצֵר הַפְּנִימִית, evitando 'cámara' o 'atrio' que desplazarían el escenario.
  - Se preserva 'cetro de oro' como fórmula estable.
  - 'Se conserva la secuencia legal: una sola ley, excepción única, resultado de vida.'
  - El femenino de la primera persona se expresa con 'llamada' y 'he sido llamada' por el contexto de Ester.
