translation:
  language: es
  text: Estará sobre la frente de Aarón, y Aarón llevará la iniquidad[a] de las cosas santas que los hijos de Israel[c] consagren, por todas las ofrendas de sus cosas santas. Estará siempre sobre su frente, para aceptación para ellos[b] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cargar con la culpa’. El modismo hebreo ‘llevar la iniquidad’ puede denotar asumir la responsabilidad por la culpa asociada con las ofrendas santas.
    reason: lexical_alternative
  - marker: b
    text: O ‘para favor para ellos’, o ‘para que sean aceptados delante de Yahvé’.
    reason: alternative_reading
  - marker: c
    text: Hebreo ‘los hijos de Israel’, designación pactual habitual del pueblo de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: מֵצַח / מִצְחוֹ
  english_pob_choice: forehead
  chosen_spanish: frente
  alternatives_spanish:
  - entrecejo
  - brow
  lexicon: HALOT
  rationale: El término hebreo designa la parte frontal de la cabeza; en español, 'frente' es la equivalencia más natural y clara. 'Entrecejo' sería demasiado específico y 'brow' no es idiomático en español.
- source_word: נָשָׂא ... עֲוֺן
  english_pob_choice: bear the iniquity
  chosen_spanish: llevar la culpa
  alternatives_spanish:
  - cargar con la culpa
  - llevar la iniquidad
  lexicon: HALOT
  rationale: El modismo sacerdotal expresa cargar responsabilidad o culpabilidad vinculada con lo santo. 'Llevar la culpa' comunica esa carga jurídica y cultual de forma comprensible; 'llevar la iniquidad' preservaría más la forma, pero suena menos natural en español.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - los objetos santos
  lexicon: HALOT
  rationale: En este contexto cultual plural, la expresión refiere a realidades/elementos consagrados. 'Las cosas santas' mantiene el valor técnico sin sonar excesivamente abstracto.
- source_word: יַקְדִּישׁוּ
  english_pob_choice: consecrate
  chosen_spanish: consagren
  alternatives_spanish:
  - santifiquen
  - aparten como santo
  lexicon: HALOT
  rationale: '''Consagrar'' expresa bien el acto de dedicar algo a Dios en el ámbito ritual. ''Santifiquen'' es posible, pero en español puede sonar más general o teológico que ritual.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la designación formal del hebreo, que en español bíblico es transparente y reproduce el matiz corporativo masculino del original.
- source_word: לְכָל מַתְּנֹת קָדְשֵׁיהֶם
  english_pob_choice: for all the gifts of their holy things
  chosen_spanish: por todas las ofrendas de sus cosas santas
  alternatives_spanish:
  - respecto de todas las ofrendas de sus cosas santas
  - para todas las ofrendas de sus cosas santas
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil. 'Por' mantiene una relación cercana con el flujo de la frase y permite conservar la referencia a las 'ofrendas' y a 'sus cosas santas' sin suavizarla en exceso. Se evita resolver interpretativamente la ambigüedad del genitivo.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - permanentemente
  lexicon: HALOT
  rationale: '''Siempre'' transmite bien la continuidad exigida y es natural en español moderno.'
- source_word: לְרָצוֹן לָהֶם
  english_pob_choice: for acceptance for them
  chosen_spanish: para aceptación para ellos
  alternatives_spanish:
  - para que sean aceptados
  - para favor para ellos
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal cercana al hebreo y al inglés POB para no resolver demasiado el alcance del favor/aceptación. 'Para aceptación para ellos' deja abierta la relación entre personas y ofrendas, como hace el texto base.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, usando 'Yahvé' como forma española estándar y legible.
theological_decisions:
- issue: Sentido de 'llevar la culpa de las cosas santas'
  english_pob_reading: Aaron bears the liability/guilt associated with defects or impurity connected to the holy offerings, functioning in his priestly representative role.
  chosen_spanish_reading: Aarón lleva la culpa vinculada con las cosas santas y con las ofrendas consagradas, en su función representativa sacerdotal.
  alternative_spanish_readings:
  - Aarón quita directamente el pecado de las cosas santas
  - Aarón solo simboliza la culpa de Israel
  rationale: Se mantiene la tensión del modismo sacerdotal sin convertirlo en una explicación completa de expiación ni vaciarlo en mero símbolo. 'Llevar la culpa' preserva la carga legal/cultual y permite que el lector perciba la responsabilidad vicaria del sacerdote.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente
- issue: Alcance de 'para aceptación para ellos'
  english_pob_reading: The phrase refers to acceptance of the people in connection with their consecrated gifts before God.
  chosen_spanish_reading: La frase indica aceptación de ellos ante Yahvé, en relación con sus ofrendas consagradas.
  alternative_spanish_readings:
  - aceptación solo de las ofrendas
  - que ellos mismos sean aceptados
  rationale: El hebreo y el inglés POB dejan abierta la referencia entre personas y ofrendas. La traducción conserva esa apertura para no reducir el alcance del favor divino.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés de POB. Se preservó el modismo sacerdotal 'llevar la culpa', la fórmula cultual de aceptación y el nombre divino 'Yahvé'. No hubo revisiones aplicadas en el historial más reciente; por tanto, este borrador mantiene la lectura estable del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en consonancia con la convención del proyecto.
  - Se conserva 'frente' para מֵצַח / מִצְחוֹ, consistente con el uso bíblico y con la claridad en español.
  - '''Consagren'' y ''cosas santas'' conservan el registro cultual sin introducir terminología eclesiástica posterior.'
  - '''Hijos de Israel'' preserva la designación formal del original y coincide con la línea editorial del POB en traducciones de diseño formal.'
