translation:
  language: es
  text: Y besó a todos sus hermanos y lloró sobre ellos. Después de esto[a], sus hermanos hablaron con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «sus hermanos le hablaron». El hebreo permite ambas posibilidades, aunque «con él» refleja mejor aquí el sentido de conversación en este contexto de reconciliación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַשֵּׁק
  english_pob_choice: he kissed
  chosen_spanish: besó
  alternatives_spanish:
  - abrazó con besos
  - besó repetidamente
  lexicon: HALOT
  rationale: El verbo expresa un beso como gesto de afecto y reconciliación. En español, «besó» comunica de forma natural y fiel la acción sin añadir repetición que el hebreo no exige explícitamente en la línea principal.
- source_word: לְכָל אֶחָיו
  english_pob_choice: all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a cada uno de sus hermanos
  lexicon: HALOT
  rationale: כָּל con el plural indica la totalidad de los hermanos de José. «A todos sus hermanos» conserva ese alcance total y suena natural en español.
- source_word: וַיֵּבְךְּ
  english_pob_choice: and wept
  chosen_spanish: y lloró
  alternatives_spanish:
  - y lloró amargamente
  - y se echó a llorar
  lexicon: HALOT
  rationale: בכה puede significar «llorar» o «llorar/sollozar». «Lloró» es la forma más directa y digna en español; mantiene el tono emotivo de la reconciliación.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - por encima de ellos
  lexicon: HALOT
  rationale: עַל aquí puede expresar contacto o postura en medio del abrazo y el llanto. «Sobre ellos» preserva esa imagen sin forzar una explicación adicional.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: After that
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Luego
  lexicon: HALOT
  rationale: La expresión marca secuencia temporal. «Después de esto» reproduce bien el orden narrativo y evita una ambigüedad demasiado general.
- source_word: דִּבְּרוּ אֶחָיו אִתּוֹ
  english_pob_choice: his brothers spoke with him
  chosen_spanish: sus hermanos hablaron con él
  alternatives_spanish:
  - sus hermanos hablaron con él
  - sus hermanos le hablaron
  lexicon: HALOT
  rationale: La construcción con אִתּוֹ puede reflejar conversación mutua. «Hablaron con él» conserva esa reciprocidad mejor que «le hablaron», que en español puede sonar más unidireccional.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés. Se mantuvo la única ambigüedad reconocida en el original —דִּבְּרוּ אִתּוֹ— mediante una nota que conserva la alternativa de traducción sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos según la norma del proyecto; este versículo no contiene el nombre divino.
  - Se prefirió «hermanos» y no un término eclesiástico, porque el hebreo describe relación familiar literal.
  - Se evitó «Cristo» o cualquier terminología teológica ajena al contexto narrativo.
  - «Con él» se eligió por reciprocidad conversacional; la nota preserva la alternativa «le hablaron» para transparencia auditora.
