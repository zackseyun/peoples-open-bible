  yaml_path: translation/ot/leviticus/016/021.yaml
  text: And Aaron shall lay both his hands on the head of the live goat[a], and confess over it all the iniquities of the sons of Israel, and all their transgressions, all their sins, and put them on the head of the goat[b], and send it away into the wilderness by the hand of a man appointed for the task.
  footnotes:
