translation:
  language: es
  text: Entonces cargaron su grano sobre sus asnos y partieron de allí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus provisiones’ o ‘su grano comprado’. El término hebreo puede denotar provisiones de comida, pero en este contexto se refiere más naturalmente al grano adquirido en Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂא֥וּ
  english_pob_choice: they loaded
  chosen_spanish: cargaron
  alternatives_spanish:
  - llevaron
  - alzaron
  lexicon: HALOT
  rationale: El verbo hebreo נָשָׂא puede significar ‘levantar’ o ‘llevar’, pero en un contexto de viaje con mercancía colocada sobre animales, la idea idiomática es cargar mercancía. ‘Cargaron’ expresa con naturalidad la acción sin perder la imagen física.
- source_word: שִׁבְרָ֖ם
  english_pob_choice: their grain
  chosen_spanish: su grano
  alternatives_spanish:
  - sus provisiones
  - su grano comprado
  - su alimento
  lexicon: HALOT
  rationale: En el relato de José, שֶׁבֶר se refiere normalmente al grano obtenido para sobrevivir en la hambruna. ‘Grano’ sigue de cerca el sentido contextual principal; el posesivo singular en español recoge el plural posesivo hebreo de forma natural.
- source_word: עַל חֲמֹרֵי/הֶם
  english_pob_choice: onto their donkeys
  chosen_spanish: sobre sus asnos
  alternatives_spanish:
  - encima de sus asnos
  - sobre sus burros
  lexicon: HALOT
  rationale: El hebreo usa עַל con un verbo de carga; en español, ‘sobre’ mantiene bien la relación de colocación. ‘Asnos’ es una opción bíblica clara y precisa para חֲמוֹר, equivalente a ‘donkeys’ en el audit trail.
- source_word: וַיֵּלְכ֖וּ מִ/שָּֽׁם
  english_pob_choice: went from there
  chosen_spanish: fueron de allí
  alternatives_spanish:
  - salieron de allí
  - partieron de allí
  lexicon: HALOT
  rationale: הָלַךְ es un verbo general de movimiento. ‘Fueron de allí’ conserva la sencillez del hebreo y evita añadir el matiz de alejamiento que tendría ‘se fueron’ en ciertos contextos.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de ‘went away from there’ a ‘went from there’ para acercarse más al hebreo sin añadir matiz; la versión española sigue esa misma sobriedad con ‘fueron de allí’.
  spanish_consistency_notes:
  - Se mantuvo ‘grano’ para שִׁבְרָם, en coherencia con la decisión léxica inglesa y con el contexto narrativo de la hambruna.
  - Se evitó ‘SEÑOR’ u otras fórmulas no pertinentes, ya que el versículo no contiene el nombre divino ni títulos teológicos.
  - ‘Asnos’ conserva un registro bíblico claro y corresponde al animal de carga del hebreo, sin necesidad de modernizar a ‘burros’.
