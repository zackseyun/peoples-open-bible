translation:
  language: es
  text: Y cuando los judíos lo vieron, gritaron a gran voz al cielo, de modo que incluso los patios vecinos[a], resonando con ellos, produjeron un terror imposible de contener[b] en todo el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los patios adyacentes resonaron juntamente», enfatizando que los espacios circundantes reverberaron con el clamor de los judíos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «causaron un pánico imposible de contener en todo el campamento». πτοή puede significar miedo, terror o pánico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρήσαντες
  english_pob_choice: when they saw it
  chosen_spanish: cuando los judíos lo vieron
  alternatives_spanish:
  - cuando lo observaron
  - habiéndolo visto
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia del verbo principal; en español, una cláusula temporal con 'cuando' reproduce mejor la relación sin sonar forzada. 'Lo' conserva la referencia pronominal implícita al hecho presenciado.
- source_word: μέγα
  english_pob_choice: loudly
  chosen_spanish: a gran voz
  alternatives_spanish:
  - fuertemente
  - en voz muy alta
  lexicon: LSJ
  rationale: El adverbio modifica ἀνέκραξαν y expresa intensidad vocal. 'A gran voz' es natural en español bíblico y mantiene el carácter solemne del clamor sin volverse literal de más.
- source_word: εἰς οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - hacia el cielo
  lexicon: LSJ
  rationale: La frase indica dirección vertical del grito. 'Hacia el cielo' preserva el movimiento direccional sin explicitar interpretativamente a Dios, aunque el contexto lo sugiera.
- source_word: ἀνέκραξαν
  english_pob_choice: they cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - alzaron un grito
  lexicon: LSJ
  rationale: El verbo exige un acto fuerte de voz. 'Gritaron' comunica bien la fuerza del original; 'clamaron' habría sonado más litúrgico y menos inmediato.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - con el resultado de que
  - así que
  lexicon: LSJ
  rationale: Introduce la cláusula de resultado. 'De modo que' es claro y fluido en español publicado, conservando la relación causal/resultativa.
- source_word: τοὺς παρακειμένους αὐλῶνας
  english_pob_choice: the neighboring courtyards
  chosen_spanish: los patios vecinos
  alternatives_spanish:
  - los patios adyacentes
  - las enramadas vecinas
  lexicon: LSJ
  rationale: παρακειμένους señala proximidad; αὐλῶνας puede referirse a patios o recintos abiertos/enclosed. 'Patios vecinos' mantiene la imagen espacial y es comprensible en español sin imponer demasiado una reconstrucción arquitectónica.
- source_word: συνηχήσαντας
  english_pob_choice: echoed with them
  chosen_spanish: resonando con ellos
  alternatives_spanish:
  - ecoados con ellos
  - resonando en concordancia
  lexicon: LSJ
  rationale: El verbo indica sonar juntamente o resonar en conjunto. 'Resonando con ellos' conserva la idea de eco compartido y funciona bien como participio circunstancial en español.
- source_word: ἀκατάσχετον πτοὴν
  english_pob_choice: uncontrollable terror
  chosen_spanish: un terror imposible de contener
  alternatives_spanish:
  - un terror incontrolable
  - un pánico incontenible
  lexicon: LSJ
  rationale: πτοή abarca miedo, pánico o terror; ἀκατάσχετος añade la noción de algo no reprimible. 'Terror imposible de contener' preserva ambas ideas sin perder la tensión lexical.
- source_word: ποιῆσαι
  english_pob_choice: produced
  chosen_spanish: produjeron
  alternatives_spanish:
  - causaron
  - trajeron
  lexicon: LSJ
  rationale: El infinitivo de resultado depende de ὥστε. En español, el plural retoma el sujeto cercano ('los patios vecinos') y expresa el resultado de manera natural.
- source_word: παντὶ τῷ στρατοπέδῳ
  english_pob_choice: throughout the whole camp
  chosen_spanish: en todo el campamento
  alternatives_spanish:
  - por todo el campamento
  - en todo el campamento
  lexicon: LSJ
  rationale: στρατόπεδον es campamento/encampamiento. 'En todo el campamento' transmite la extensión total del efecto sin sobrecargar el verso.
theological_decisions:
- issue: Relación entre el clamor y el cielo sin explicitación de Dios
  english_pob_reading: Retained as 'to heaven' without making God explicit
  chosen_spanish_reading: '''hacia el cielo'' sin añadir ''a Dios'''
  alternative_spanish_readings:
  - a Dios
  - al cielo
  rationale: El griego nombra el cielo, no a Dios de manera directa. Mantener la dirección vertical conserva la textura del texto y deja intacta la posible alusión reverente sin convertirla en paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió el ajuste de revisión que hace explícita la relación participial ('cuando'), mantiene la dirección 'al cielo'/'hacia el cielo', y conserva la estructura resultativa donde los patios vecinos resuenan con el clamor y producen el temor en todo el campamento. La redacción española evita calcar mecánicamente el inglés y toma como base directa el griego.
  spanish_consistency_notes:
  - Se usa 'judíos' para οἱ Ἰουδαῖοι, sin mayúscula, conforme al uso neutral moderno.
  - '''a gran voz'' y ''gritaron'' mantienen el registro solemne-bíblico sin introducir terminología eclesiástica ajena al griego.'
  - '''patios vecinos'' refleja el valor espacial de αὐλῶνας sin fijar indebidamente una arquitectura específica.'
  - '''terror imposible de contener'' conserva la fuerza de ἀκατάσχετον πτοήν y evita suavizarlo a simple ''miedo''.'
