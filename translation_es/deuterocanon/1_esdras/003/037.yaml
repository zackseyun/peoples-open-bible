  rationale: Se sustituyó «domina sobre» por «gobierna sobre» para un español más idiomático y se cambió «ejerce dominio sobre» por «tiene dominio sobre» para conservar la diferenciación entre los dos participios griegos sin pesadez. También se pulió la nota b para alinearla mejor con la justificación inglesa, centrada en la elección de «hombres».
