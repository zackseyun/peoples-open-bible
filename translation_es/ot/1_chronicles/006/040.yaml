translation:
  language: es
  text: Les dieron Hebrón en la tierra de Judá, con sus tierras de pastoreo[a] alrededor de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus tierras comunes» o «sus terrenos abiertos». El término hebreo se refiere al terreno abierto asociado a una ciudad, a menudo usado para pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They gave
  chosen_spanish: Les dieron
  alternatives_spanish:
  - Y les dieron
  - Entonces les dieron
  lexicon: HALOT
  rationale: El wayyiqtol de נתן expresa acción narrativa simple; en español, el pasado simple con objeto indirecto antepuesto («les dieron») conserva la naturalidad y el valor narrativo sin añadir un conector que el español no exige.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a éstos
  lexicon: HALOT
  rationale: El hebreo marca el destinatario con ל; en español, el dativo átono «les» comunica mejor el objeto indirecto que una repetición pesada de «a ellos».
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: HALOT
  rationale: Nombre propio de lugar; se adapta a la forma usual en español bíblico manteniendo la identificación transparente del topónimo.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en Judá
  - en el territorio de Judá
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «territorio». «Tierra de Judá» sigue de cerca la referencia geográfica del hebreo y suena natural en español bíblico contemporáneo.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras comunes
  - sus terrenos abiertos
  - sus tierras de pasto
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el espacio abierto asociado a la ciudad, con frecuencia para pastoreo. «Pastizales» conserva la función del área sin limitarla de forma excesiva a una sola categoría jurídica.
- source_word: סְבִיבֹתֶיהָ
  english_pob_choice: around it
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - en torno a ella
  - alrededor
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a Hebrón como ciudad; «alrededor de ella» reproduce el referente y la relación espacial con claridad en español.
translation_notes:
  revision_awareness: El texto inglés POB lee «pasturelands» y mantiene una nota de alternativa léxica; la versión española conserva esa decisión funcional con «pastizales» y explicita en nota la alternativa semántica «tierras comunes/terrenos abiertos» sin perder la imagen del espacio abierto asociado a la ciudad.
  spanish_consistency_notes:
  - Se mantiene «Hebrón» como topónimo transliterado conforme al patrón POB.
  - Se usa «tierra de Judá» para preservar el valor geográfico de אֶרֶץ sin sobrerrepresentarlo.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el Tetragrámaton.
  - La nota [a] se ancla en «pastizales» porque allí recae la decisión lexical relevante.
