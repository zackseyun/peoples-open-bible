translation:
  language: es
  text: 'Entonces pronunció su discurso[a] y dijo: «Levántate, Balac, y oye; escúchame, hijo de Zipor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su oráculo» o «su proverbio» para «su discurso». El hebreo מָשָׁל puede denotar un dicho proverbial o una pronunciación poética formal; aquí introduce la declaración elevada de Balaam.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: he took up
  chosen_spanish: alzó
  alternatives_spanish:
  - tomó
  - levantó
  - pronunció
  lexicon: HALOT
  rationale: El hebreo usa נשׂא con מָשָׁל en una fórmula que introduce una pronunciación solemne. En español, «alzó su discurso» conserva la imagen idiomática sin sonar forzado; «pronunció» sería más explicativo, pero pierde el matiz figurado.
- source_word: מְשָׁלוֹ
  english_pob_choice: his discourse
  chosen_spanish: su discurso
  alternatives_spanish:
  - su oráculo
  - su proverbio
  - su sentencia
  lexicon: HALOT
  rationale: מָשָׁל puede ser proverbio, dicho elevado o pronunciación poética. «Discurso» mantiene el tono formal y deja abierta la ambigüedad registrada por la POB inglesa, sin imponer «oráculo» como única lectura.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y exclamó
  lexicon: HALOT
  rationale: Fórmula narrativa estándar; «y dijo» es la equivalencia natural en español bíblico contemporáneo.
- source_word: קוּם
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo dirigido a Balac pide ponerse de pie; «Levántate» conserva la energía exhortativa y la dignidad del mandato mejor que «Get up» o una forma excesivamente coloquial.
- source_word: וּשֲׁמָע
  english_pob_choice: and hear
  chosen_spanish: y oye
  alternatives_spanish:
  - y escucha
  - y presta oído
  lexicon: HALOT
  rationale: שׁמע se traduce con un verbo de oír/escuchar. «Oye» mantiene el paralelismo breve con el siguiente verbo intensificado y suena natural en una invocación solemne.
- source_word: הַאֲזִינָה
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - presta oído a mí
  - atiéndeme
  lexicon: HALOT
  rationale: El hifil de אזן expresa oír atentamente, dar oído. «Escúchame» comunica esa intensificación de manera clara y fluida en español.
- source_word: עָדַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - hacia mí
  lexicon: HALOT
  rationale: La dirección hacia el hablante queda incorporada naturalmente en el clítico «escúchame»; en el paralelismo poético español resulta más idiomático que repetir «a mí».
- source_word: בְּנוֹ צִפֹּר
  english_pob_choice: son of Zippor
  chosen_spanish: hijo de Zipor
  alternatives_spanish:
  - hijo de Zipor
  - hijo de Cípora
  lexicon: HALOT
  rationale: Se conserva el patronímico literal. «Zipor» sigue la transliteración habitual del nombre hebreo צִפֹּר, sin adaptar innecesariamente a una forma tradicional distinta.
theological_decisions:
- issue: Forma del llamamiento profético y tono elevado de מָשָׁל
  english_pob_reading: Balaam’s utterance is a formal poetic pronouncement, not merely casual speech; POB preserves this with 'his discourse' and a note allowing 'oracle' or 'proverb'.
  chosen_spanish_reading: 'La frase se vierte como una pronunciación solemne: «alzó su discurso».'
  alternative_spanish_readings:
  - «alzó su oráculo»
  - «alzó su proverbio»
  - «pronunció su discurso»
  rationale: No se reduce el sentido a un simple hablar cotidiano. Tampoco se obliga a «oráculo», porque la base léxica admite varias posibilidades y la POB inglesa deja constancia de esa tensión. «Discurso» mantiene amplitud semántica y solemnidad.
  doctrine_reference: Lexical semantics of מָשָׁל in prophetic-poetic discourse; Numbers 23:7, 18; HALOT
- issue: Tratamiento de la llamada a Balac con imperativos sucesivos
  english_pob_reading: '''Rise, Balak, and hear; listen to me'' preserves the rhetorical parallelism of two imperatives, with intensification in the second.'
  chosen_spanish_reading: «Levántate, Balac, y oye; escúchame» mantiene el paralelismo y la intensificación.
  alternative_spanish_readings:
  - «Levántate, Balac, y escucha»
  - «Ponte en pie, Balac, y oye; presta atención a mí»
  rationale: La sucesión de mandatos en español refleja la estructura hebrea sin diluir el crescendo retórico. «Oye» y «escúchame» distinguen oído general de atención concentrada.
  doctrine_reference: Poetic parallelism and rhetorical imperative structure in Hebrew poetry; Numbers 23:18
translation_notes:
  revision_awareness: 'Se siguió la lectura estable del contexto auditado en inglés, sin revisiones aplicadas en el pasaje. La traducción española busca reflejar la misma decisión óptima: conservar el giro idiomático de נשׂא + מָשָׁל, mantener el paralelismo de los imperativos y evitar cerrar indebidamente la ambigüedad de מָשָׁל con un único término técnico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene la transliteración «Balac» y «Zipor» de forma consistente con la forma hebrea y el uso esperado en español bíblico.
  - El verbo «escúchame» incorpora naturalmente el complemento de dirección de עָדַי, evitando una duplicación poco idiomática en español.
