translation:
  language: es
  text: Todos quedarán abandonados[a] a las aves de rapiña de los montes y a las bestias de la tierra; y las aves de rapiña pasarán el verano sobre ellos[b], y toda bestia de la tierra pasará el invierno sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «juntos». El hebreo literalmente dice que serán dejados «juntos» a las aves de rapiña de los montes y a las bestias de la tierra.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo singular con fuerza colectiva: «el ave de rapiña» / «sobre él». La traducción usa plurales para expresar con claridad el sentido colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָזְבוּ
  english_pob_choice: will be left
  chosen_spanish: quedarán abandonados
  alternatives_spanish:
  - quedarán
  - serán dejados
  lexicon: HALOT
  rationale: 'El nifal imperfecto de עזב aquí tiene sentido pasivo: los caídos quedan expuestos y desamparados. «Quedarán abandonados» comunica ese valor sin perder naturalidad en español.'
- source_word: יַחְדָּו
  english_pob_choice: all
  chosen_spanish: abandonados
  alternatives_spanish:
  - todos
  - juntos
  lexicon: HALOT
  rationale: El adverbio literalmente significa «juntos», pero en este contexto la fuerza es colectiva. El español lo integra de forma natural en la construcción sin forzar un «todos» redundante.
- source_word: לְעֵיט
  english_pob_choice: to the birds of prey
  chosen_spanish: a las aves de rapiña
  alternatives_spanish:
  - a los pájaros carroñeros
  - a las aves carroñeras
  lexicon: HALOT
  rationale: עַיִט denota ave rapaz o carroñera. «Aves de rapiña» preserva el registro bíblico y la imagen de animales que devoran cadáveres.
- source_word: הָרִים
  english_pob_choice: of the mountains
  chosen_spanish: de los montes
  alternatives_spanish:
  - de las montañas
  - de los cerros
  lexicon: HALOT
  rationale: «Montes» es un equivalente bíblico claro y natural en español para el plural hebreo, y conserva la imaginería elevada del texto.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: and to the beasts of the earth
  chosen_spanish: y a las bestias de la tierra
  alternatives_spanish:
  - y a los animales de la tierra
  - y a las fieras de la tierra
  lexicon: HALOT
  rationale: בְּהֵמָה puede abarcar animales o bestias; aquí, por el paralelo con aves de rapiña, «bestias» mantiene el contraste de criaturas carroñeras sin suavizar el término.
- source_word: וְקָץ
  english_pob_choice: will summer
  chosen_spanish: pasarán el verano
  alternatives_spanish:
  - veranearán
  - pasarán la estación cálida
  lexicon: HALOT
  rationale: El verbo se refiere a transcurrir el verano. En español, «pasarán el verano» conserva la imagen estacional con claridad y sin un verbo poco usual como «veranear».
- source_word: הָעַיִט
  english_pob_choice: the birds of prey
  chosen_spanish: las aves de rapiña
  alternatives_spanish:
  - el ave de rapiña
  - las aves carroñeras
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular formal, funciona colectivamente. El plural español expresa mejor el sentido colectivo que la POB inglesa también explicó en nota.
- source_word: תֶּחֱרָף
  english_pob_choice: will winter
  chosen_spanish: pasará el invierno
  alternatives_spanish:
  - invernará
  - permanecerá en invierno
  lexicon: HALOT
  rationale: El sentido es atravesar el invierno. «Pasará el invierno» mantiene el paralelismo con «pasarán el verano» y sugiere permanencia prolongada.
- source_word: עָלָיו
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre él
  - encima de ellos
  lexicon: HALOT
  rationale: Aunque el sufijo es singular en hebreo, funciona con referencia colectiva al grupo de cadáveres. El plural español hace explícita esa colectividad, como en la auditoría inglesa.
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene un enfoque de equivalencia óptima, sin revisiones aplicadas y con acuerdo alto del revisor. Esta propuesta sigue ese mismo perfil: conserva la imaginería estacional (verano/invierno), el paralelismo con aves/bestias y la fuerza colectiva de los singulares hebreos, evitando suavizar el léxico de depredación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino explícito.
  - «Aves de rapiña» y «bestias» conservan el registro bíblico y la fuerza semántica del original.
  - Los plurales españoles en los dos miembros finales reflejan la colectividad ya reconocida en la nota inglesa.
  - Se preserva el paralelismo verbal «pasarán el verano» / «pasará el invierno» para reflejar וְקָץ / תֶּחֱרָף.
