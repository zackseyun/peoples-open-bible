id: 1TI.4.3
reference: 1 Timothy 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κωλυόντων γαμεῖν, ἀπέχεσθαι βρωμάτων ἃ ὁ θεὸς ἔκτισεν εἰς μετάλημψιν μετὰ εὐχαριστίας τοῖς πιστοῖς καὶ ἐπεγνωκόσι τὴν ἀλήθειαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/003.yaml
  text: forbidding marriage and requiring abstinence from foods that God created to be received with thanksgiving by those who believe and have come to know the truth[a].
  footnotes:
  - marker: a
    text: Or, more literally, 'forbidding to marry and to abstain from foods.' The English main text makes explicit that the false teachers were enjoining abstinence from certain foods.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들은 혼인을 금하고[a], 하나님께서 믿는 자들과 진리를 깨달은 자들로 하여금 감사함으로 받게 하시려고 지으신 음식을 끊을 것을 명합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 보다 직역하면 「혼인하는 것과 음식을 끊는 것을 명하고」. 영어 본문은 거짓 교사들이 특정 음식에 대한 금욕을 강요했음을 명시적으로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλυόντων γαμεῖν
  english_pob_choice: forbidding marriage
  chosen_korean: 혼인을 금하고
  alternatives_korean:
  - 결혼을 막고
  - 혼인하기를 금하고
  lexicon: BDAG
  rationale: 「혼인」이 한국 교회 어휘로 정립되어 있다.
- source_word: ἀπέχεσθαι βρωμάτων
  english_pob_choice: abstinence from foods
  chosen_korean: 음식을 끊을 것을 명합니다
  alternatives_korean:
  - 음식 먹기를 금합니다
  - 음식에 손대지 않기를 요구합니다
  lexicon: BDAG
  rationale: ἀπέχομαι의 「~로부터 거리를 둠·금욕」을 「끊을 것을 명합니다」로 풀어 명령적 어감을 살린다.
- source_word: ὁ θεὸς ἔκτισεν εἰς μετάλημψιν
  english_pob_choice: God created to be received
  chosen_korean: 하나님께서 ~ 받게 하시려고 지으신
  alternatives_korean:
  - 하나님께서 받아들이도록 창조하신
  lexicon: BDAG
  rationale: κτίζω + 목적 부정사를 한국어 관형절로.
- source_word: μετὰ εὐχαριστίας
  english_pob_choice: with thanksgiving
  chosen_korean: 감사함으로
  alternatives_korean:
  - 감사로
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: τοῖς πιστοῖς καὶ ἐπεγνωκόσι τὴν ἀλήθειαν
  english_pob_choice: those who believe and have come to know the truth
  chosen_korean: 믿는 자들과 진리를 깨달은 자들
  alternatives_korean:
  - 신자들과 진리를 인식한 자들
  lexicon: BDAG
  rationale: ἐπιγινώσκω의 완료형 「깨달음에 이른 상태」를 「깨달은」으로 옮긴다.
