translation:
  language: es
  text: Entonces David se levantó, y todo el pueblo que estaba con él cruzó el Jordán. Al amanecer[a], no faltó ni uno que no hubiera cruzado el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta la luz de la mañana»; el hebreo conserva la imagen de la luz matutina mientras señala el momento para el cual terminó el cruce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en marcha
  lexicon: HALOT
  rationale: El verbo קום en esta forma narrativa puede expresar simplemente que David se levantó o se puso en pie. En español, 'se levantó' es natural y fiel; 'se alzó' suena más literario y 'se puso en marcha' añade un matiz interpretativo no explicitado por el hebreo.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: and all the people who were with him
  chosen_spanish: todo el pueblo que estaba con él
  alternatives_spanish:
  - todo el pueblo que estaba con él
  - y toda la gente que estaba con él
  lexicon: HALOT
  rationale: '''העם'' nombra al grupo acompañante de David; ''pueblo'' conserva el referente colectivo y es adecuado en registro bíblico. ''La gente'' sería más general, pero pierde un poco de la resonancia del término hebreo en este contexto.'
- source_word: וַיַּעַבְרוּ אֶת הַיַּרְדֵּן
  english_pob_choice: and they crossed the Jordan
  chosen_spanish: cruzaron el Jordán
  alternatives_spanish:
  - cruzaron el Jordán
  - pasaron el Jordán
  lexicon: HALOT
  rationale: עָבַר con el objeto 'el Jordán' se expresa de forma directa como 'cruzar el Jordán'. 'Pasar' también es posible, pero 'cruzaron' comunica mejor el cruce de un río y evita ambigüedad.
- source_word: עַד אוֹר הַבֹּקֶר
  english_pob_choice: By morning light
  chosen_spanish: Para la luz de la mañana
  alternatives_spanish:
  - Hasta la luz de la mañana
  - Para la luz de la mañana
  - Al clarear la mañana
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen de la 'luz' de la mañana y marca el punto temporal en que terminó la travesía. 'Para la luz de la mañana' mantiene esa imagen y funciona como límite temporal en español. 'Al clarear la mañana' es más idiomático, pero suaviza la imagen lexical de אוֹר.
- source_word: עַד אַחַד לֹא נֶעְדָּר
  english_pob_choice: not one was missing
  chosen_spanish: no faltó ni uno
  alternatives_spanish:
  - no faltó ni uno
  - no hubo uno ausente
  lexicon: HALOT
  rationale: El hebreo expresa que ninguno quedó sin contar o sin estar presente. 'No faltó ni uno' es natural en español y conserva la idea de totalidad sin añadir elementos.
- source_word: אֲשֶׁר לֹא עָבַר אֶת הַיַּרְדֵּן
  english_pob_choice: who had not crossed the Jordan
  chosen_spanish: que no hubiera cruzado el Jordán
  alternatives_spanish:
  - que no hubiera cruzado el Jordán
  - que no cruzó el Jordán
  lexicon: HALOT
  rationale: 'El relativo califica a ''ni uno'' y describe la acción completada antes del punto de referencia (''la mañana''). El pluscuamperfecto de subjuntivo en español comunica bien esa relación temporal: no faltó ni uno que no hubiera cruzado.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que cambió ''By the light of morning'' por la más natural ''By morning light''. En español se mantuvo la imagen de ''luz de la mañana'' para preservar el valor lexical de אוֹר, con una redacción fluida: ''Para la luz de la mañana''.'
  spanish_consistency_notes:
  - Se emplea 'Jordán' como nombre propio del río, sin artículo adicional innecesario.
  - Se preserva 'luz de la mañana' para reflejar el componente imagístico de אוֹר, en coherencia con la nota alternativa.
  - '''Se levantó'' mantiene el tono narrativo sobrio y el paralelismo con el flujo de acción del verso.'
