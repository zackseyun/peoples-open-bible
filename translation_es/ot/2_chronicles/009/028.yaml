translation:
  language: es
  text: Y se importaban caballos para Salomón de Egipto y de todas las tierras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y sacaban caballos de Egipto para Salomón, y de todas las tierras». El verbo hebreo significa literalmente «hacer salir» o «sacar», pero aquí se refiere al suministro comercial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מוֹצִיאִים
  english_pob_choice: they were importing
  chosen_spanish: estaban importando
  alternatives_spanish:
  - estaban sacando
  - traían
  - eran importados
  lexicon: HALOT
  rationale: El participio hifil de יצא expresa literalmente ‘hacer salir’ o ‘sacar’, pero en este contexto comercial la idea es suministro de caballos hacia Salomón. ‘Estaban importando’ conserva la fuerza relacional del movimiento hacia el destinatario y evita una paráfrasis demasiado libre.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - caballos de montar
  - equinos
  lexicon: HALOT
  rationale: El sustantivo plural es directo y no presenta dificultad. ‘Caballos’ es el equivalente natural y fiel en español.
- source_word: מִ/מִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: desde Egipto
  alternatives_spanish:
  - de Egipto
  - procedentes de Egipto
  lexicon: HALOT
  rationale: La preposición מן señala origen. ‘Desde Egipto’ comunica con claridad el punto de procedencia y mantiene el valor espacial del hebreo.
- source_word: לִ/שְׁלֹמֹה
  english_pob_choice: for Solomon
  chosen_spanish: para Salomón
  alternatives_spanish:
  - a Salomón
  - en beneficio de Salomón
  lexicon: HALOT
  rationale: En un contexto de abastecimiento comercial, ל indica destino o beneficiario. ‘Para Salomón’ reproduce mejor esa función que ‘a Salomón’ en español actual.
- source_word: וּ/מִ/כָּל הָ/אֲרָצוֹת
  english_pob_choice: and from all the lands
  chosen_spanish: y desde todas las tierras
  alternatives_spanish:
  - y desde todos los países
  - y desde todas las regiones
  lexicon: HALOT
  rationale: ‘Tierras’ preserva la imagen hebrea de אֲרָצוֹת y evita modernizar indebidamente a ‘países’. ‘Todas’ mantiene el alcance amplio del plural.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del control cruzado y conserva la misma decisión básica del POB en inglés: traducir el participio causativo de יצא con una forma idiomática de comercio (‘importando’), mientras se anota la alternativa más literal (''sacando''). No se reportaron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa ‘Y’ inicial porque el hebreo comienza con וְ/וּ y la frase enlaza con el contexto inmediato.
  - ‘Tierras’ se mantiene de forma consistente con la imagen hebrea y con la preferencia POB por ‘lands’ frente a ‘countries’.
  - La nota al pie conserva la tensión entre literalidad verbal y sentido contextual de comercio, sin borrar ninguna de las dos.
