translation:
  language: es
  text: Y los hijos de Israel[a] volvieron a hacer lo malo a los ojos de Yahvé, y Yahvé fortaleció a Eglón, rey de Moab, contra Israel, porque habían hecho lo malo a los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “los hijos de Israel”; también, de manera idiomática, “los israelitas”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  english_pob_choice: again did
  chosen_spanish: siguieron haciendo
  alternatives_spanish:
  - volvieron a hacer
  - hicieron de nuevo
  - añadieron a hacer
  lexicon: HALOT
  rationale: El hebreo יסף + infinitivo expresa repetición o continuación. En español, “siguieron haciendo” conserva la idea de reiteración sin sonar forzado ni demasiado interpretativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la metáfora familiar del hebreo. “Hijos” es natural en español bíblico y refleja con transparencia la forma מקורית, mientras “israelitas” sería más idiomático pero menos literal.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: did what was evil
  chosen_spanish: haciendo lo malo
  alternatives_spanish:
  - hacer el mal
  - hacer lo malo
  - haciendo el mal
  lexicon: HALOT
  rationale: La construcción verbal se integra de modo natural con la idea de repetición. “Lo malo” mantiene la evaluación moral del hebreo הָרַע sin sustituirla por una abstracción más interpretativa.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea es un modismo evaluativo. “Ante Yahvé” comunica juicio o valoración divina en un español claro y digno; “a los ojos de Yahvé” sería más literal, pero menos natural en lectura pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir el Tetragrámaton con el nombre divino “Yahvé”. “SEÑOR” ocultaría el nombre propio y “Jehová” no corresponde a la decisión terminológica adoptada.
- source_word: וַיְחַזֵּק
  english_pob_choice: strengthened
  chosen_spanish: fortaleció
  alternatives_spanish:
  - reforzó
  - dio fuerza a
  - hizo fuerte
  lexicon: HALOT
  rationale: חזק en piel expresa hacer fuerte o fortalecer. “Fortaleció” es directo, claro y conserva la acción divina sin introducir una explicación como “permitió” o “dio victoria” que no está en el hebreo.
- source_word: אֶת עֶגְלוֹן מֶלֶךְ מוֹאָב
  english_pob_choice: Eglon king of Moab
  chosen_spanish: a Eglón, rey de Moab
  alternatives_spanish:
  - a Eglón, el rey de Moab
  - a Eglón, rey moabita
  lexicon: HALOT
  rationale: La construcción apposicional se mantiene de forma natural en español. El nombre propio se adapta a la ortografía española “Eglón” para lectura pública, y la apposición conserva el sentido sin sobreexplicar.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - encima de Israel
  lexicon: HALOT
  rationale: En este contexto hostil, עַל indica oposición. “Contra” expresa adecuadamente la relación de enemistad o presión militar/política del texto.
- source_word: עַל כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - debido a que
  lexicon: HALOT
  rationale: La partícula causal se traduce con la conjunción más clara y natural en español. “Porque” mantiene la relación causal sin introducir matices ajenos.
- source_word: עָשׂוּ אֶת הָרַע
  english_pob_choice: they had done what was evil
  chosen_spanish: habían hecho lo malo
  alternatives_spanish:
  - habían hecho el mal
  - habían hecho lo que era malo
  - habían obrado mal
  lexicon: HALOT
  rationale: Se conserva el valor de acción pasada previa a la intervención divina. “Lo malo” reproduce bien la fórmula evaluativa hebrea y evita suavizarla en términos más abstractos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del proyecto y el audit trail inglés, se translitera como “Yahvé”, preservando el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La agencia divina en 'Yahvé fortaleció a Eglón'
  english_pob_reading: Yahweh strengthened Eglon
  chosen_spanish_reading: Yahvé fortaleció a Eglón
  alternative_spanish_readings:
  - Yahvé permitió que Eglón se fortaleciera
  - Yahvé dio la victoria a Eglón
  rationale: El hebreo atribuye de manera directa la acción de fortalecer a Yahvé. Se mantiene esa agencia sin resolver la tensión teológica ni suavizarla con perífrasis explicativas que el texto no aporta.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en sentido y estructura básica; no se documentan revisiones posteriores que obliguen a modificar la lectura. La redacción española busca reflejar el mismo equilibrio entre transparencia léxica y lectura pública natural.
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para el Tetragrámaton.
  - Se conserva “los hijos de Israel” con nota de alternativa idiomática.
  - Se mantiene el paralelismo evaluativo de “lo malo” ante Yahvé en ambas ocurrencias.
  - “Fortaleció” preserva la acción directa atribuida a Yahvé sin reinterpretarla.
