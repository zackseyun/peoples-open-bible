review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el contraste adversativo, el reproche de legitimidad de מַה לְּךָ y la imagen de hablar del pacto. Sin embargo, no preserva del todo la decisión léxica documentada para בְּרִית como término teológico central, que aquí debe mantenerse como «pacto» o mejor «pacto/alianza» según el audit trail; además, el verbo «poner» para וַתִּשָּׂא resulta algo débil frente a la idea de «tomar» atestiguada en la auditoría inglesa y en el hebreo. El sentido general sigue siendo correcto, pero conviene una reparación menor para alinear mejor la terminología y la fuerza idiomática.
  spanish_quality_summary: El español es claro y legible, con registro bíblico moderno y digno. «Pero al impío, Dios le dice» suena natural. No obstante, «poner mi pacto sobre tus labios» se percibe menos idiomático y menos preciso que «tomar mi pacto en tus labios», y la nota explicativa de «¿Qué tienes que hacer con recitar...?» es comprensible pero puede mejorarse ligeramente en fluidez española.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Dios» e «impío» funcionan bien. El punto a corregir es la consistencia con בְּרִית, cuyo peso pactal/teológico en la auditoría favorece «pacto» y desaconseja cambios innecesarios; además, para וַתִּשָּׂא conviene reflejar más de cerca «tomar» en vez de «poner».'
  issues:
  - severity: medium
    issue: «poner» para וַתִּשָּׂא debilita la imagen verbal y se aparta de la decisión auditada «take»
    rationale: El hebreo נָשָׂא aquí significa literalmente ‘llevar/levantar’ y, en esta construcción idiomática, ‘tomar’ el pacto en la boca/labios. «Poner» comunica el resultado, pero pierde la acción verbal y la cercanía con la fuente.
  - severity: low
    issue: 'La nota [a] suena algo forzada en español: «¿Qué tienes que hacer con recitar...?»'
    rationale: Aunque refleja la literalidad inglesa, en español natural y fiel sería mejor «¿Qué tienes tú que ver con recitar...?» o similar.
  revised_spanish_text: Pero al impío, Dios le dice:[a] «¿Qué derecho tienes para recitar mis estatutos y para tomar[b] mi pacto sobre tus labios?»
  revised_footnotes:
