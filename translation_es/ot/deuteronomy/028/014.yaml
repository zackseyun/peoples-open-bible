translation:
  language: es
  text: Y no te apartes de ninguna de las palabras que yo te mando hoy, ni a derecha ni a izquierda, para ir tras[a] otros dioses y servirles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para seguir a otros dioses». El hebreo dice literalmente «para ir tras».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para adorarlos». El verbo puede denotar servicio rendido a una deidad y, por tanto, incluye fuerza de adoración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָסוּר
  english_pob_choice: turn aside
  chosen_spanish: te apartes
  alternatives_spanish:
  - te desvíes
  - te desvíes del camino
  - te vuelvas aparte
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse de una norma. En español, «apartarse» comunica con naturalidad el sentido de desviación de las palabras mandadas, sin endurecer el estilo ni perder la idea de apartamiento covenantal.
- source_word: מִכָּל הַדְּבָרִים
  english_pob_choice: from any of the words
  chosen_spanish: de ninguna de las palabras
  alternatives_spanish:
  - de todas las palabras
  - de alguna de las palabras
  lexicon: HALOT
  rationale: La negación con מכל requiere en español una formulación negativa que exprese exclusión total. «De ninguna de las palabras» conserva la fuerza de no apartarse de parte alguna del mandato.
- source_word: מְצַוֶּה
  english_pob_choice: am commanding
  chosen_spanish: yo te mando
  alternatives_spanish:
  - yo te ordeno
  - yo estoy mandando
  lexicon: HALOT
  rationale: El participio presenta una acción vigente en el discurso. «Yo te mando» mantiene la inmediatez y funciona de forma natural en español bíblico moderno.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y claro en español contemporáneo, y conserva la urgencia del contexto de renovación del pacto.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a derecha ni a izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo para no desviarse en ninguna dirección. La fórmula española con paralelismo negativo reproduce bien el valor idiomático y la cadencia del original.
- source_word: לָלֶכֶת אַחֲרֵי
  english_pob_choice: to go after
  chosen_spanish: para ir tras
  alternatives_spanish:
  - para seguir
  - para caminar tras
  lexicon: HALOT
  rationale: לך אחרי es un modismo para seguir a alguien o algo, especialmente en contexto de lealtad o idolatría. «Ir tras» conserva la imagen verbal y evita una paráfrasis más interpretativa.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros dioses extranjeros
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia directa y sobria del hebreo. «Dioses ajenos» sería posible, pero aquí «otros dioses» conserva mejor la formulación de Deuteronomio sin añadir matiz no explicitado.
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: servirles
  alternatives_spanish:
  - para servirlos
  - para adorarlos
  lexicon: HALOT
  rationale: עבד puede implicar servicio cultual o adoración. Se eligió «servirles» por ser más directo y mantener la amplitud semántica; en español permite inferir la dimensión religiosa sin fijarla exclusivamente como «adorar».
theological_decisions:
- issue: Advertencia contra seguir a otros dioses sin resolver la tensión teológica
  english_pob_reading: other gods
  chosen_spanish_reading: otros dioses
  alternative_spanish_readings:
  - dioses ajenos
  - dioses extranjeros
  rationale: El versículo usa la fórmula de advertencia deuteronómica sin explicar la ontología de esos dioses. Se preserva la redacción llana del texto, evitando resolver una tensión que el versículo no resuelve.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretar el estatus de los otros dioses.
- issue: Valor cultual de עבד aplicado a deidades
  english_pob_reading: to serve them
  chosen_spanish_reading: servirles
  alternative_spanish_readings:
  - adorarlos
  - rendirles culto
  rationale: El hebreo permite un rango entre servicio y adoración. Se mantiene «servirles» para no estrechar el sentido y porque el contexto idólatra queda suficientemente señalado por «otros dioses».
  doctrine_reference: Evitar reducir el término a una sola categoría cultual cuando el texto es más amplio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el auditor inglés de la POB, manteniendo las decisiones clave: no apartarse de ninguna de las palabras mandadas, conservar el modismo «ir tras» mediante una nota, y preservar la amplitud de עבד como «servirles» con nota alternativa de adoración. No se detectan revisiones aplicadas en el expediente inglés; la redacción española refleja esa misma lectura estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí el verso no lo contiene, por lo que no aparece.
  - Se mantiene «otros dioses» como traducción directa y no se sustituye por una formulación más interpretativa.
  - La cadencia negativa doble («ni a derecha ni a izquierda») reproduce el modismo hebreo sin agregar contenido.
  - «Servirles» conserva la amplitud de עבד sin forzar una glosa litúrgica única.
