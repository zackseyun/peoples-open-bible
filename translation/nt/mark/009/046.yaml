id: MRK.9.46
reference: Mark 9:46
source:
  edition: robinson-pierpont-2005-byzantine
  text: ὅπου ὁ σκώληξ αὐτῶν οὐ τελευτᾷ, καὶ τὸ πῦρ οὐ σβέννυται.
  language: Greek
translation:
  text: where[a] their worm does not die, and the fire is not quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is
      present in the Byzantine majority tradition and the Latin tradition. It is likely
      a later scribal addition repeating the identical words of verse 48 (and verse
      44).
    reason: textual_critical
lexical_decisions:
- source_word: σκώληξ
  chosen: worm
  alternatives:
  - maggot
  lexicon: BDAG
  rationale: Refers to a worm or maggot that consumes decaying matter. 'Worm' is retained
    for its strong traditional resonance and direct connection to the quotation from
    Isaiah 66:24.
- source_word: τελευτᾷ
  chosen: die
  alternatives:
  - come to an end
  - perish
  lexicon: BDAG
  rationale: From the lemma τελευτάω, meaning to come to an end or die. In this context,
    'die' accurately reflects the continuous present tense of the unending consumption.
- source_word: σβέννυται
  chosen: quenched
  alternatives:
  - extinguished
  - put out
  lexicon: BDAG
  rationale: From the lemma σβέννυμι. 'Quenched' is the traditional and highly evocative
    rendering for a fire that cannot be extinguished, fitting the apocalyptic judgment
    context.
