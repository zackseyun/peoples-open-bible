  text: Ἀδελφικῶς ἀποθάνωμεν ἀδελφοὶ περὶ τοῦ νόμου· μιμησώμεθα τοὺς τρεῖς τοὺς ἐπὶ τῆς Συρίας νεανίσκους, οἳ τῆς ἰσοπαίδος καμίνου κατεφρόνησαν.
