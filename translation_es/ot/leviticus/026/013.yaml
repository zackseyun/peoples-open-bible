translation:
  language: es
  text: Yo soy Yahvé, su Dios, que los saqué de la tierra de Egipto, de ser sus esclavos[a]; yo quebré las barras[b] de su yugo y los hice andar erguidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de ser esclavos para ellos'.
    reason: lexical_alternative
  - marker: b
    text: O 'las varas de su yugo'.
    reason: lexical_alternative
  - marker: c
    text: O 'con la cabeza en alto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en transliteración, según la norma del proyecto. 'Yahvé' refleja el Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - sus dioses
  - tu Dios
  lexicon: HALOT
  rationale: En fórmula de pacto, el plural posesivo remite al Dios único de Israel. En español se usa 'su' porque el sujeto está en plural ('los saqué'), manteniendo la referencia corporativa.
- source_word: הוֹצֵאתִי
  english_pob_choice: brought ... out
  chosen_spanish: saqué
  alternatives_spanish:
  - hice salir
  - los saqué de
  lexicon: HALOT
  rationale: El causativo de יצא se expresa de modo natural con 'sacar' en español, conservando el movimiento de éxodo y la acción divina directa.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto, fuera de
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' reproduce la fórmula bíblica y suena natural en español; el valor de salida ya queda marcado por ''saqué''.'
- source_word: מִהְיוֹת לָהֶם עֲבָדִים
  english_pob_choice: from being their slaves
  chosen_spanish: para que no fueran sus esclavos
  alternatives_spanish:
  - de ser sus esclavos
  - para no ser sus esclavos
  - de ser esclavos de ellos
  lexicon: HALOT
  rationale: Se preserva el sentido de liberación de la esclavitud, pero en español la construcción final resulta más clara y idiomática con 'para que no fueran'. 'Esclavos' mantiene la fuerza de עֲבָדִים.
- source_word: וָאֶשְׁבֹּר
  english_pob_choice: I broke
  chosen_spanish: yo quebré
  alternatives_spanish:
  - yo rompí
  - yo quebré en pedazos
  lexicon: HALOT
  rationale: '''Quebré'' comunica el acto de romper con buena correspondencia semántica y mantiene el tono elevado del texto.'
- source_word: מֹטֹת עֻלְּכֶם
  english_pob_choice: the bars of your yoke
  chosen_spanish: las barras de su yugo
  alternatives_spanish:
  - los palos de su yugo
  - las varas de su yugo
  - las barras del yugo que llevaban
  lexicon: HALOT
  rationale: '''Barras'' conserva el objeto concreto del yugo; se elige ''su yugo'' para concordar con el referente plural del discurso y evitar una forma menos natural de segunda persona compuesta.'
- source_word: וָאוֹלֵךְ אֶתְכֶם
  english_pob_choice: and made you walk
  chosen_spanish: y los hice andar
  alternatives_spanish:
  - y los hice caminar
  - y los llevé
  - y los hice andar por camino
  lexicon: HALOT
  rationale: El causativo de הלך se expresa con 'hacer andar', que conserva la idea de acción causativa sin perder fluidez en español.
- source_word: קוֹמְמִיּוּת
  english_pob_choice: upright
  chosen_spanish: erguidos
  alternatives_spanish:
  - en pie
  - rectos
  - con la cabeza en alto
  lexicon: HALOT
  rationale: '''Erguidos'' preserva la imagen física de postura recta y el sentido de dignidad restaurada. Evita una paráfrasis excesiva como ''con la cabeza en alto''.'
theological_decisions:
- issue: Nombre divino en el pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión mantiene el nombre personal de Dios revelado a Israel, sin enmascararlo con un título. Esto sigue la política del proyecto y el sentido del hebreo.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Condición de Israel en Egipto
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: El versículo enfatiza la liberación de una servidumbre opresiva. 'Esclavos' conserva esa carga histórica y teológica mejor que 'siervos'.
  doctrine_reference: Éxodo / liberación de la esclavitud
- issue: Imagen final de liberación y dignidad
  english_pob_reading: made you walk upright
  chosen_spanish_reading: los hice andar erguidos
  alternative_spanish_readings:
  - los llevé erguidos
  - los hice caminar con la cabeza en alto
  rationale: La combinación hebrea incluye movimiento causativo y postura erguida. 'Andar erguidos' mantiene ambas dimensiones sin convertirlas en una explicación interpretativa.
  doctrine_reference: Dignidad restaurada / liberación
translation_notes:
  revision_awareness: 'Se siguió el acuerdo alto de la auditoría inglesa y no hubo revisiones aplicadas; la redacción española conserva el paralelismo del hebreo: declaración divina, éxodo, liberación de la esclavitud, ruptura del yugo y marcha erguida.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton según la terminología base del proyecto.
  - '''Esclavos'' se conserva para עֲבָדִים por su fuerza semántica de servidumbre opresiva.'
  - '''Barras de su yugo'' replica la imagen concreta del texto base y armoniza con el registro bíblico en español.'
  - '''Erguidos'' deja visible la tensión entre postura corporal y dignidad restaurada sin sobreinterpretar el final del versículo.'
