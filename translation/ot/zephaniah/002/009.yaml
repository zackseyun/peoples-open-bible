id: ZEP.2.9
reference: Zephaniah 2:9
source:
  edition: WLC
  text: לָ/כֵ֣ן חַי אָ֡נִי נְאֻם֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל כִּֽי מוֹאָ֞ב כִּ/סְדֹ֤ם תִּֽהְיֶה֙ וּ/בְנֵ֤י עַמּוֹן֙ כַּֽ/עֲמֹרָ֔ה מִמְשַׁ֥ק חָר֛וּל וּ/מִכְרֵה מֶ֥לַח וּ/שְׁמָמָ֖ה עַד עוֹלָ֑ם שְׁאֵרִ֤ית עַמִּ/י֙ יְבָזּ֔וּ/ם וְ/יֶ֥תֶר גוי יִנְחָלֽוּ/ם־־־־׃
translation:
  text: Therefore[a], as I live, declares Yahweh of hosts, the God of Israel, Moab will surely become like Sodom, and the sons of Ammon like Gomorrah—a place overgrown with weeds, a salt pit, and a perpetual desolation. The remnant of my people will plunder them[b], and the remainder of my nation will inherit them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'a possession of nettles.' The Hebrew phrase is difficult; the translation conveys the image of abandoned land overtaken by thorny weeds.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Ammonites'; literally, 'the sons of Ammon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding indictment; 'Therefore' preserves the prophetic logical connection.
- source_word: חַי אָנִי
  chosen: as I live
  alternatives:
  - surely as I live
  - by my life
  lexicon: HALOT
  rationale: Standard oath formula. 'As I live' is idiomatic English and preserves the solemn divine self-oath.
- source_word: נְאֻם יְהוָה צְבָאוֹת אֱלֹהֵי יִשְׂרָאֵל
  chosen: declares the LORD of hosts, the God of Israel
  alternatives:
  - oracle of the LORD of hosts, the God of Israel
  lexicon: HALOT
  rationale: נְאֻם is well rendered 'declares' in prophetic speech. Per doctrine, יְהוָה is rendered 'the LORD.' 'LORD of hosts' is retained as the established and semantically transparent title for יְהוָה צְבָאוֹת.
- source_word: כִּי
  chosen: will surely
  alternatives:
  - indeed
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the oath with emphatic force. Rendering it with 'will surely' brings the force into natural English rather than a wooden 'that'.
- source_word: מוֹאָב כִּסְדֹם תִּהְיֶה
  chosen: Moab will surely become like Sodom
  alternatives:
  - Moab will be like Sodom
  lexicon: HALOT
  rationale: תִּהְיֶה is simple 'will be/become'; 'become like' fits the judgment context of transformation into a devastated state. 'Surely' carries the oath-emphasis from כִּי.
- source_word: וּבְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew expression while remaining understandable. 'Ammonites' is possible, but 'sons of Ammon' better mirrors the source and pairs with 'my people'/'my nation' later.
- source_word: כַּעֲמֹרָה
  chosen: like Gomorrah
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward comparison to the paradigmatic city of judgment.
- source_word: מִמְשַׁק חָרוּל
  chosen: a place overgrown with weeds
  alternatives:
  - a possession of nettles
  - a stretch of weeds
  - a pasture of nettles
  lexicon: HALOT
  rationale: The phrase is difficult. חָרוּל denotes a thorny or nettle-like weed. מִמְשַׁק likely denotes a place characterized by growth/spread or possession. 'A place overgrown with weeds' communicates the image of abandoned overgrowth in readable English without overclaiming a precise botanical identification.
- source_word: וּמִכְרֵה מֶלַח
  chosen: a salt pit
  alternatives:
  - a salt mine
  - a place of salt
  lexicon: HALOT
  rationale: Conveys a barren, saline wasteland. 'Salt pit' is idiomatic and fits the judgment imagery better than the more industrial-sounding 'salt mine.'
- source_word: וּשְׁמָמָה עַד עוֹלָם
  chosen: and a perpetual desolation
  alternatives:
  - and a desolation forever
  - and everlasting waste
  lexicon: HALOT
  rationale: Combines the noun and temporal phrase into natural English while preserving the enduring character of the judgment.
- source_word: שְׁאֵרִית עַמִּי
  chosen: The remnant of my people
  alternatives:
  - What is left of my people
  lexicon: HALOT
  rationale: '''Remnant'' is an important prophetic term and should be preserved rather than flattened, especially in contexts of judgment and survival.'
- source_word: יְבָזּוּם
  chosen: will plunder them
  alternatives:
  - will spoil them
  - will despoil them
  lexicon: HALOT
  rationale: From בזז, the sense is taking spoil from defeated enemies. 'Plunder' is clear modern English and preserves the force.
- source_word: וְיֶתֶר גּוֹי
  chosen: and the remainder of my nation
  alternatives:
  - and the rest of my people
  - and the residue of my nation
  lexicon: HALOT
  rationale: יֶתֶר parallels שְׁאֵרִית as a surviving remainder. גּוֹי can mean 'nation' without negative connotation; here 'my nation' preserves the lexical distinction from עַם while remaining natural.
- source_word: יִנְחָלוּם
  chosen: will inherit them
  alternatives:
  - will possess them
  - will take them as an inheritance
  lexicon: HALOT
  rationale: The verb נחל commonly carries inheritance/possession language. 'Inherit them' preserves the covenantal and territorial nuance better than the flatter 'possess them.'
