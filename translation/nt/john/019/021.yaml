id: JHN.19.21
reference: John 19:21
source:
  edition: SBLGNT
  text: ἔλεγον οὖν τῷ Πιλάτῳ οἱ ἀρχιερεῖς τῶν Ἰουδαίων· Μὴ γράφε· Ὁ βασιλεὺς τῶν Ἰουδαίων, ἀλλ’ ὅτι ἐκεῖνος εἶπεν Βασιλεὺς ⸂τῶν Ἰουδαίων εἰμί⸃.
translation:
  text: So the chief priests of the Jews were saying to Pilate[a], “Do not write, ‘The King of the Jews,’ but that he said[b], ‘I am King of the Jews.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the Judeans” / “King of the Judeans.” The Greek term can denote Jews generally or Judeans more specifically, depending on context.
    reason: alternative_reading
  - marker: b
    text: Or “I am the King of the Jews.” English may supply the article in this predicative title, though the Greek here does not explicitly include it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action; 'were saying' preserves that aspect in natural English better than simple past.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference. 'So' is natural modern English and preserves the connective force without sounding overly formal.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities, not a claim that multiple men simultaneously held the singular office of high priest.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: In John's passion narrative this phrase is tied to the public political-religious designation 'King of the Jews' and to the identified priestly leaders. 'Jews' is the conventional and contextually intelligible rendering, while 'Judeans' is a viable alternative preserved in a footnote because the term can denote Judean people/authorities in some contexts.
- source_word: Μὴ γράφε
  chosen: Do not write
  alternatives:
  - Stop writing
  - Do not inscribe
  lexicon: BDAG
  rationale: Present imperative with μή can prohibit an action; 'Do not write' is the most straightforward idiomatic rendering here.
- source_word: Ὁ βασιλεὺς τῶν Ἰουδαίων
  chosen: The King of the Jews
  alternatives:
  - The king of the Jews
  lexicon: BDAG
  rationale: Retains the exact wording of the disputed inscription as a title. Capitalizing 'King' reflects titular use in English quotation.
- source_word: ἀλλ’ ὅτι
  chosen: but rather,
  alternatives:
  - but that
  - except that
  lexicon: BDAG
  rationale: Introduces the correction they want Pilate to make. 'But rather' makes the contrast explicit and idiomatic.
- source_word: ἐκεῖνος
  chosen: That man
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: The demonstrative is somewhat distancing or dismissive in tone. 'That man' preserves the contemptuous distance better than the neutral 'he'.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - claimed
  - declared
  lexicon: BDAG
  rationale: The verb simply means 'said'; stronger interpretive verbs like 'claimed' import nuance not explicit in the Greek.
- source_word: Βασιλεὺς τῶν Ἰουδαίων εἰμί
  chosen: I am King of the Jews
  alternatives:
  - I am the King of the Jews
  lexicon: BDAG
  rationale: The Greek lacks the article before βασιλεύς in this clause. English can naturally omit 'the' in a predicative title after 'I am,' while still conveying the sense. The alternative with 'the' is possible and preserved in a footnote as a stylistic lexical alternative.
