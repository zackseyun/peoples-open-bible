    issue: Falta la nota al pie léxica alternativa presente en el POB inglés.
    rationale: El audit trail inglés preserva una alternativa significativa ('A horror and a shocking thing'). La revisión española debe conservar una alternativa equivalente, anclada en el texto.
  - severity: low
    issue: '''Una cosa espantosa y horrenda'' es comprensible, pero suena algo rígido en español.'
    rationale: '''Algo espantoso y horrendo'' mantiene la fuerza semántica y mejora la naturalidad sin alejarse del hebreo.'
  revised_spanish_text: Algo espantoso y horrendo ha sucedido en la tierra.[a]
