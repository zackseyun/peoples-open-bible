  text: 아무도 두 주인을 섬길 수 없습니다. 한쪽을 미워하고 다른 쪽을 사랑하거나, 한쪽에 헌신하고 다른 쪽을 멸시할 것이기 때문입니다. 여러분은 하나님과 재물을 함께 섬길 수 없습니다.
