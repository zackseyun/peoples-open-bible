  to: En aquel día, el rey Asuero dio a la reina Ester la casa de Amán, el enemigo de los judíos, y Mardoqueo se presentó ante el rey, porque Ester había dado a conocer quién era él para ella[a].
  rationale: Se reubicó la nota al pie en la cláusula que realmente comenta, se mejoró la naturalidad de la expresión cortesana con «se presentó ante el rey», y se sustituyó «lo que él era para ella» por «quién era él para ella» para mantener la ambigüedad del hebreo en un español más idiomático.
