translation:
  language: es
  text: Y lo que odias[a], no se lo hagas a nadie. No bebas vino hasta embriagarte, y no dejes que la embriaguez vaya contigo en tu camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que es odioso para ti, no se lo hagas a nadie».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ μισεῖς
  english_pob_choice: what you hate
  chosen_spanish: lo que tú odias
  alternatives_spanish:
  - lo que te resulta odioso
  - lo que detestas
  lexicon: LSJ
  rationale: La cláusula relativa proverbial se vierte de forma directa y natural en español. 'Lo que tú odias' conserva el sujeto en segunda persona y la amplitud del mandato recíproco sin convertirlo en una abstracción impersonal.
- source_word: μηδενὶ
  english_pob_choice: to no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguno
  - a nadie en absoluto
  lexicon: LSJ
  rationale: 'La dative prohibitiva se expresa en español como complemento directo/indirecto natural de la acción: ''no se lo hagas a nadie''. Mantiene la fuerza universal negativa.'
- source_word: ποίησης
  english_pob_choice: do
  chosen_spanish: hagas
  alternatives_spanish:
  - hagas
  - haces
  lexicon: LSJ
  rationale: En este dicho ético, ποιέω se traduce por el verbo común 'hacer', que reproduce bien la forma proverbial sin añadir matices innecesarios.
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: Equivalente léxico directo y transparente.
- source_word: εἰς μέθην
  english_pob_choice: to drunkenness
  chosen_spanish: hasta embriagarte
  alternatives_spanish:
  - hasta la embriaguez
  - para embriagarte
  lexicon: LSJ
  rationale: En español, 'vino hasta embriagarte' transmite con claridad el valor de resultado/extent del griego. Se evita una construcción rígida como 'a la embriaguez', que sonaría menos natural, sin perder el énfasis en la intoxicación.
- source_word: μὴ πίῃς
  english_pob_choice: do not drink
  chosen_spanish: No bebas
  alternatives_spanish:
  - No bebas
  - No has de beber
  lexicon: LSJ
  rationale: Prohibición directa y idiomática en español moderno, fiel al imperativo negativo griego.
- source_word: μὴ πορευθήτω μετὰ σοῦ μέθη
  english_pob_choice: do not let drunkenness go with you
  chosen_spanish: no dejes que la embriaguez vaya contigo
  alternatives_spanish:
  - no dejes que la embriaguez te acompañe
  - no vayas en embriaguez
  lexicon: LSJ
  rationale: Se conserva la personificación del griego, donde 'la embriaguez' es aquello que 'va con' la persona. 'Ir contigo' reproduce mejor la imagen que una simple paráfrasis abstracta.
- source_word: ἐν τῇ ὁδῷ σου
  english_pob_choice: on your way
  chosen_spanish: en tu camino
  alternatives_spanish:
  - en tu camino
  - en tu senda
  - en tu andar
  lexicon: LSJ
  rationale: '''Camino'' preserva la imagen concreta y también puede sugerir el curso de vida, como en el contexto proverbial, sin forzar un giro más interpretativo.'
theological_decisions:
- issue: Principio de reciprocidad negativa
  english_pob_reading: And what you hate, do to no one.
  chosen_spanish_reading: Y lo que tú odias, no se lo hagas a nadie.
  alternative_spanish_readings:
  - Y lo que te resulta odioso, no se lo hagas a nadie.
  - Y lo que detestas, no se lo hagas a nadie.
  rationale: El griego expresa una máxima ética de reciprocidad negativa. La redacción elegida mantiene el alcance universal y la segunda persona singular, sin convertir la frase en una paráfrasis excesiva.
  doctrine_reference: Transparencia textual y equivalencia óptima; preservar el mandato ético proverbial sin suavizarlo.
- issue: Imagen personificada de la embriaguez
  english_pob_reading: do not let drunkenness go with you
  chosen_spanish_reading: no dejes que la embriaguez vaya contigo
  alternative_spanish_readings:
  - no dejes que la embriaguez te acompañe
  - no vayas en embriaguez
  rationale: El griego personifica la embriaguez como una compañía de camino. La traducción mantiene esa imagen para no perder el matiz retórico del texto.
  doctrine_reference: Respeto del imaginario del texto fuente y de su advertencia moral concreta.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, manteniendo la estructura proverbial y la imagen de la embriaguez como acompañante de camino. No hubo revisiones posteriores que alteraran la decisión traductológica.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica aquí; no hay tetragrámaton en el versículo.
  - Se eligió 'embriaguez' para μέθη por consistencia con el sustantivo abstracto y para conservar la personificación del verbo 'ir' con la persona.
  - Se prefirió 'vino' y 'camino' por claridad y correspondencia directa con el griego, evitando añadir interpretaciones devocionales no explícitas.
