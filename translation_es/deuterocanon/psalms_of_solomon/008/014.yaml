translation:
  language: es
  text: No omitieron ningún pecado que no cometieron[a], más que las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «No omitieron ningún pecado que no hicieron, superando a las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλειπον
  english_pob_choice: omitted
  chosen_spanish: omitieron
  alternatives_spanish:
  - dejaron de lado
  - pasaron por alto
  lexicon: LSJ
  rationale: El griego expresa la idea de no dejar algo sin hacer o sin incluir. «Omitieron» conserva la fuerza negativa total del verbo y sigue de cerca el ajuste revisado de la POB inglesa.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  lexicon: LSJ
  rationale: «Pecado» es el equivalente natural y religioso en español para ἁμαρτία en este contexto moral. Mantiene la lectura estándar sin suavizar el peso ético del término.
- source_word: ἐποίησαν
  english_pob_choice: commit
  chosen_spanish: hubieran cometido
  alternatives_spanish:
  - hicieran
  - practicaran
  lexicon: LSJ
  rationale: 'Aunque el verbo es literalmente «hacer», en español «cometer» es la forma idiomática para hablar de pecados. El pluscuamperfecto de subjuntivo reproduce bien la relativa negativa del griego: «que no hubieran cometido».'
- source_word: ὑπὲρ τὰ ἔθνη
  english_pob_choice: beyond the nations
  chosen_spanish: más allá de las naciones
  alternatives_spanish:
  - por encima de las naciones
  - más que las naciones
  lexicon: LSJ
  rationale: ὑπέρ expresa excedencia o sobrepasamiento. «Más allá de las naciones» conserva esa idea comparativa sin introducir una categoría teológica más específica como «gentiles».
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que acercó la estructura al griego: «omitted no... that they did not commit... beyond the nations». La nota recoge la alternativa inglesa equivalente para ὑπὲρ τὰ ἔθνη, manteniendo la comparación sin decidir entre «más allá de» y «más que».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y vocabulario no presente en el verso.
  - Se conservó la comparación con «las naciones» en lugar de «los gentiles» para respetar el alcance del griego.
  - La puntuación y el registro buscan ser publicables en español latinoamericano sin perder la estructura sintáctica del original.
