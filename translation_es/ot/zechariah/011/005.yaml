translation:
  language: es
  text: 'cuyos compradores los matan y no son tenidos por culpables[a], y cuyos vendedores dicen: «¡Bendito sea Yahvé, porque me he enriquecido!», y sus propios pastores no tienen compasión de ellos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no son considerados culpables» / «no quedan culpables».
    reason: lexical_alternative
  - marker: b
    text: O «no los perdonan» / «no los ahorran»; la idea es que no muestran misericordia hacia ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyos / cuyos... los
  alternatives_spanish:
  - que
  - de quienes
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula relativa posesiva; en español, «cuyos» conserva esa relación y enlaza naturalmente con los sustantivos plurales posteriores.
- source_word: קֹנֵיהֶן
  english_pob_choice: buyers
  chosen_spanish: compradores
  alternatives_spanish:
  - compradores
  - adquirentes
  - dueños
  lexicon: HALOT
  rationale: La idea comercial del verbo קנה se mantiene mejor con «compradores», que conserva el contraste con «vendedores».
- source_word: יַהֲרְגֻן
  english_pob_choice: slaughter
  chosen_spanish: los matan
  alternatives_spanish:
  - los degüellan
  - los sacrifican
  - los matan
  lexicon: HALOT
  rationale: El verbo significa «matar»; en español, «los matan» evita añadir un matiz sacrificial que el hebreo no exige explícitamente, aunque la imagen pastoral lo sugiera.
- source_word: וְלֹא יֶאְשָׁמוּ
  english_pob_choice: and are not held guilty
  chosen_spanish: no son tenidos por culpables
  alternatives_spanish:
  - no se les considera culpables
  - no quedan culpables
  - no son responsables
  lexicon: HALOT
  rationale: La expresión conserva la fuerza forense de אשם como ser considerado culpable o incurrir en culpa. «Tenidos por culpables» refleja bien esa pasiva en español.
- source_word: וּמֹכְרֵיהֶן
  english_pob_choice: and whose sellers
  chosen_spanish: y cuyos vendedores
  alternatives_spanish:
  - y sus vendedores
  - y quienes los venden
  lexicon: HALOT
  rationale: Se mantiene la paralela posesiva de la primera cláusula y la estructura relativa del hebreo.
- source_word: יֹאמַר
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dice
  - declaran
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es singular, el sentido colectivo del sujeto en español requiere plural para sonar natural y fiel al referente.
- source_word: בָּרוּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: ¡Bendito sea Yahvé[b]!
  alternatives_spanish:
  - ¡Bendito sea Yahvé!
  - ¡Sea bendito Yahvé!
  - ¡Bendito sea Yahvé el cual...
  lexicon: HALOT
  rationale: Se preserva la fórmula doxológica con un giro natural en español. Se usa «Yahvé» según el estándar del proyecto para יְהוָה.
- source_word: וַאעְשִׁר
  english_pob_choice: for I have become rich
  chosen_spanish: porque me he enriquecido
  alternatives_spanish:
  - porque me he hecho rico
  - porque he prosperado
  - porque he llegado a ser rico
  lexicon: HALOT
  rationale: El hifil expresa volverse rico/prosperar; «me he enriquecido» transmite el resultado con naturalidad y sin perder el tono autocelebratorio.
- source_word: וְרֹעֵיהֶם
  english_pob_choice: and their own shepherds
  chosen_spanish: y sus propios pastores
  alternatives_spanish:
  - y sus pastores
  - y quienes los pastorean
  - y sus mismos pastores
  lexicon: HALOT
  rationale: «Pastores» conserva la metáfora de liderazgo; «propios» refleja el posesivo enfático del hebreo y sigue la revisión inglesa.
- source_word: לֹא יַחְמֹל עֲלֵיהֶן
  english_pob_choice: have no compassion on them
  chosen_spanish: no tienen compasión de ellos
  alternatives_spanish:
  - no se compadecen de ellos
  - no los perdonan
  - no los tratan con compasión
  lexicon: HALOT
  rationale: חמל puede implicar no ahorrar ni compadecer. «Tener compasión de» es español claro y mantiene la crueldad del cuadro.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue el principio del proyecto de no ocultar el nombre divino hebreo y de usar la forma española establecida «Yahvé» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metaphorical leadership term רֹעִים
  english_pob_reading: shepherds
  chosen_spanish_reading: pastores
  alternative_spanish_readings:
  - líderes
  - guías
  rationale: Se conserva la metáfora pastoral en vez de reinterpretarla como un cargo eclesial posterior; «pastores» es suficientemente transparente en español y mantiene el peso profético del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés al mantener la lectura más literal de la pasiva forense de אשם y el énfasis posesivo en «sus propios pastores». La redacción española evita depender de una paráfrasis y conserva las tres acciones en paralelo: matar, declarar inocencia/ausencia de culpa, bendecir y enriquecerse, y no compadecer.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrama.
  - Se mantiene «pastores» para רֹעִים por consistencia con la metáfora bíblica.
  - Se conserva la estructura posesiva relativa con «cuyos» para reflejar el hebreo.
  - Los marcadores [a] y [b] aparecen exactamente donde corresponden en el texto español.
