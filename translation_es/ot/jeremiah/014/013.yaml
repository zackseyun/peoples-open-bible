    rationale: La nota explica una alternativa léxica para שְׁלוֹם אֱמֶת, no para וָאֹמַר. Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente del `spanish_text`.
  - severity: low
    issue: «Verdadera paz» es menos natural que «paz verdadera» en español para este contexto.
    rationale: Ambas opciones son fieles, pero «paz verdadera» suena más idiomática y conserva bien la idea de paz genuina/no engañosa. Además armoniza mejor con la nota «paz que es verdadera».
