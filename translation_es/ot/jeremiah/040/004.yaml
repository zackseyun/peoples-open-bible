translation:
  language: es
  text: 'Y ahora, he aquí: hoy te he liberado[a] de las cadenas que estaban en tus manos. Si te parece bueno venir conmigo a Babilonia, ven, y cuidaré de ti[b]. Pero si te parece malo venir conmigo a Babilonia, abstente. Mira, toda la tierra está delante de ti[c]; ve a donde te parezca bueno y recto ir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «te he abierto»; el verbo hebreo usa la idea de «abrir», pero aquí significa liberar o soltar de las cadenas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «pondré mi ojo sobre ti», un modismo que aquí expresa cuidado o protección favorable.
    reason: lexical_alternative
  - marker: c
    text: El hebreo concluye más literalmente, «ve allá, ve», una forma enfática de dar permiso; esa fuerza queda incorporada en la frase principal en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִתַּחְתִּיךָ
  english_pob_choice: I have freed you
  chosen_spanish: te he soltado
  alternatives_spanish:
  - te he liberado
  - te he dado libertad
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «abrir», pero con una persona como objeto y en el contexto de las cadenas significa liberar de una restricción. «Soltar» comunica bien la acción concreta de quitar los grilletes, sin perder la idea de liberación.
- source_word: הָאזִקִּים
  english_pob_choice: the chains
  chosen_spanish: las cadenas
  alternatives_spanish:
  - los grilletes
  - las ataduras
  lexicon: HALOT
  rationale: El sustantivo designa un medio de sujeción en un prisionero. «Cadenas» es claro, natural y fiel al contexto inmediato.
- source_word: אֲשֶׁר עַל יָדֶךָ
  english_pob_choice: that were on your hands
  chosen_spanish: que estaban sobre tus manos
  alternatives_spanish:
  - que estaban en tus muñecas
  - que estaban sobre tus brazos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de las «manos» sin precisar más de lo que el texto da. En español, «sobre tus manos» suena algo más directo que «en tus manos» para una sujeción física.
- source_word: אִם טוֹב בְּעֵינֶיךָ
  english_pob_choice: If it is good in your eyes
  chosen_spanish: Si te parece bueno
  alternatives_spanish:
  - Si te parece bien
  - Si es bueno a tus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de valoración. «Te parece bueno» conserva la idea sin calcar de forma extraña el hebreo, y mantiene el contraste con «te parece malo».
- source_word: וְאָשִׂים אֶת־עֵינִי עָלֶיךָ
  english_pob_choice: I will look after you
  chosen_spanish: pondré mis ojos sobre ti
  alternatives_spanish:
  - cuidaré de ti
  - velaré por ti
  - te miraré con favor
  lexicon: HALOT
  rationale: La imagen literal «poner mis ojos sobre ti» conserva la fuerza del idiomático hebreo. Aunque en español suena menos natural que «cuidaré de ti», se mantiene porque el registro del POB inglés preserva la metáfora y no la reduce por completo.
- source_word: וְאִם רַע בְּעֵינֶיךָ
  english_pob_choice: if it is bad in your eyes
  chosen_spanish: si te parece malo
  alternatives_spanish:
  - si te parece mal
  - si te parece desagradable
  lexicon: HALOT
  rationale: Se conserva el paralelo con la cláusula anterior y el valor evaluativo del modismo hebreo.
- source_word: חֲדָל
  english_pob_choice: refrain
  chosen_spanish: abstente
  alternatives_spanish:
  - no vayas
  - detente
  - desiste
  lexicon: HALOT
  rationale: El imperativo significa dejar de hacerlo o abstenerse de la acción propuesta. «Abstente» comunica con precisión la negativa sin añadir un objeto explícito que el hebreo deja implícito.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: Funciona como marcador discursivo para introducir la opción abierta que se le ofrece a Jeremías. «Mira» es claro y natural en español.
- source_word: כָּל הָאָרֶץ לְפָנֶיךָ
  english_pob_choice: the whole land is before you
  chosen_spanish: toda la tierra está delante de ti
  alternatives_spanish:
  - toda la tierra está ante ti
  - todo el país está delante de ti
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de libertad de movimiento y elección. «Tierra» refleja el sustantivo hebreo, y «delante de ti» mantiene la disposición abierta.
- source_word: אֶל טוֹב וְאֶל הַיָּשָׁר בְּעֵינֶיךָ
  english_pob_choice: wherever it seems good and right in your eyes
  chosen_spanish: a donde te parezca bueno y recto ir
  alternatives_spanish:
  - a donde te parezca bueno y correcto ir
  - a donde veas que es bueno y recto ir
  lexicon: HALOT
  rationale: Se preservan ambos adjetivos, «bueno» y «recto», sin fusionarlos. «Recto» conserva mejor el matiz ético/legal de יָשָׁר que «correcto».
- source_word: לָלֶכֶת שָׁמָּה לֵךְ
  english_pob_choice: go
  chosen_spanish: ir
  alternatives_spanish:
  - ve
  - anda
  lexicon: HALOT
  rationale: El hebreo cierra con un infinitivo y un imperativo enfático. En español, el sentido se integra de modo fluido en la cláusula final («a donde te parezca... ir») sin forzar una repetición mecánica.
theological_decisions:
- issue: La fórmula hebrea de «poner mis ojos sobre ti» puede leerse como vigilancia hostil o cuidado favorable.
  english_pob_reading: I will look after you
  chosen_spanish_reading: pondré mis ojos sobre ti
  alternative_spanish_readings:
  - cuidaré de ti
  - velaré por ti
  - tendré cuidado de ti
  rationale: Se conserva la metáfora del original, pero el contexto de la oferta benevolente de Nabuzaradán a Jeremías inclina a una lectura de protección/favor. La frase española mantiene la tensión figurativa sin ocultarla.
  doctrine_reference: Jeremías 40:4; cf. uso idiomático de עין en contexto de favor/protección.
- issue: El cierre hebreo enfatiza libertad de elección y permiso explícito.
  english_pob_reading: the whole land is before you; go wherever it seems good and right in your eyes to go
  chosen_spanish_reading: toda la tierra está delante de ti; ve a donde te parezca bueno y recto ir
  alternative_spanish_readings:
  - toda la tierra está ante ti; ve a donde quieras ir
  - toda la tierra está delante de ti; anda donde te parezca mejor
  rationale: La formulación española conserva la amplitud del permiso y evita restringir indebidamente el alcance de la decisión personal. También mantiene el doble criterio moral y práctico de «bueno y recto».
  doctrine_reference: Jeremías 40:4; cf. el permiso concedido por el oficial babilónico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más formal: se mantuvo el registro digno de «he aquí», se prefirió «abstente» para חֲדָל, y se conservó la fuerza idiomática de las expresiones hebreas sin traducir de manera meramente mecánica desde el inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «Babilonia» como topónimo estándar en español.
  - Se preserva el modismo hebreo «en tus ojos / te parece» mediante construcciones naturales en español, sin borrar el contraste entre bien y mal.
  - Se conserva el tono formal y narrativo del contexto profético-histórico.
