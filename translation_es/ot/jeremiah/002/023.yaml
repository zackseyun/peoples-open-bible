translation:
  language: es
  text: '¿Cómo puedes decir[a]: «No me he contaminado; no he ido tras los Baales»? Mira tu camino en el valle; sabe lo que has hecho: una joven camella ágil[c], torciendo sus sendas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No me he vuelto impura».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede evocar una camella joven moviéndose con pasos erráticos o retorcidos; el matiz exacto del participio es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִטְמֵאתִי
  english_pob_choice: I have not defiled myself
  chosen_spanish: No me he contaminado
  alternatives_spanish:
  - No me he vuelto impura
  - No me he defilecido
  lexicon: HALOT
  rationale: El niphal de טמא expresa quedar contaminado/impuro. En español, «me he contaminado» comunica bien la impureza moral-religiosa sin sonar forzado. Mantiene la fuerza del verbo mejor que una paráfrasis más general.
- source_word: אַחֲרֵי הַבְּעָלִים ... הָלַכְתִּי
  english_pob_choice: I have not gone after the Baals
  chosen_spanish: no he ido tras los Baales
  alternatives_spanish:
  - no he seguido a los Baales
  - no he andado tras los Baales
  lexicon: HALOT
  rationale: La idiomática hebrea «ir tras» conserva bien la imagen de seguimiento idólatra. Se mantiene el plural «Baales» porque el hebreo es plural y apunta a las diversas manifestaciones de ese culto.
- source_word: רְאִי דַרְכֵּךְ
  english_pob_choice: Look at your way
  chosen_spanish: Mira tu camino
  alternatives_spanish:
  - Considera tu conducta
  - Observa tu senda
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino literal o conducta figurada. «Camino» preserva la metáfora concreta sin perder el sentido acusatorio de la conducta.
- source_word: בַּגַּיְא
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el barranco
  - en la hondonada
  lexicon: HALOT
  rationale: גיא designa un valle o quebrada. «Valle» es natural en español y suficientemente preciso para el contexto.
- source_word: דְּעִי
  english_pob_choice: know
  chosen_spanish: reconoce
  alternatives_spanish:
  - sabe
  - comprende
  lexicon: HALOT
  rationale: El imperativo de ידע puede significar «conocer» o «reconocer/advertir». Aquí «reconoce» expresa mejor la idea de tomar conciencia de lo hecho, conservando el tono admonitorio.
- source_word: בִּכְרָה
  english_pob_choice: young she-camel
  chosen_spanish: una joven camella
  alternatives_spanish:
  - una camella joven
  - una dromedaria joven
  lexicon: HALOT
  rationale: El sustantivo nombra una camella joven hembra. «Camella» conserva el rasgo femenino del símil, importante para la imagen del texto.
- source_word: קַלָּה
  english_pob_choice: swift
  chosen_spanish: ágil
  alternatives_spanish:
  - veloz
  - ligera
  lexicon: HALOT
  rationale: El adjetivo literal sugiere ligereza. «Ágil» comunica en español el movimiento rápido y nervioso del símil con naturalidad.
- source_word: מְשָׂרֶכֶת דְּרָכֶיהָ
  english_pob_choice: twisting her ways
  chosen_spanish: que retuerce sus caminos
  alternatives_spanish:
  - que va de un lado a otro en sus caminos
  - que entrecruza sus pasos
  lexicon: HALOT
  rationale: El participio de שרך es raro y la imagen es difícil. Se preserva la tensión semántica con «retuerce», que mantiene la idea de movimiento errático/tortuoso sin cerrar indebidamente el sentido.
theological_decisions:
- issue: Pluralidad de בְּעָלִים
  english_pob_reading: the Baals
  chosen_spanish_reading: los Baales
  alternative_spanish_readings:
  - Baal
  - los señores
  rationale: Se conserva el plural del hebreo para no aplanar la acusación ni singularizar indebidamente la referencia idolátrica. «Baales» es claro y refleja el texto fuente.
  doctrine_reference: Ex 23:13; Jue 2:11-13; Jer 2:11
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la última cláusula hacia una formulación más cercana al hebreo: de una imagen más explicativa de los caminos a una expresión más breve y literal del movimiento retorcido. En español se siguió esa línea con «que retuerce sus caminos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en esta serie, pero este versículo no contiene el nombre divino.
  - «Baales» conserva el plural del hebreo y coincide con la política del proyecto de no singularizar el culto idolátrico.
  - Se evita «contaminarse» en sentido meramente ritual cuando el contexto exige también reproche moral y de apostasía, aunque el verbo español todavía permite esa resonancia.
