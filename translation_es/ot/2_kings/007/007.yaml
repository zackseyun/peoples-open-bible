    reason: lexical_alternative
  - marker: c
    text: Literalmente, «huyeron a sus vidas», un giro idiomático que significa «huyeron para salvar sus vidas».
    reason: lexical_alternative
  revision_rationale: Se corrige el singular «su vida» a plural «sus vidas» para reflejar mejor אֶל נַפְשָׁם; se reubican las notas al segmento que realmente explican; y se alisa la puntuación para un español más natural y claro.
