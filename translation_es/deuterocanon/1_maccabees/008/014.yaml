translation:
  language: es
  text: Y en todo esto ninguno de ellos se puso una corona[a], ni se vistió de púrpura[b], para exaltarse con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Corona» traduce de forma natural el adorno regio; «diadema» es una alternativa más técnica para destacar el matiz de realeza del griego διάδημα.
    reason: lexical_alternative
  - marker: b
    text: La «púrpura» funciona aquí como signo de rango o dignidad real, no solo como color.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἅπασιν τούτοις
  english_pob_choice: in all these matters
  chosen_spanish: en todo esto
  alternatives_spanish:
  - en todas estas cosas
  - en todos estos asuntos
  lexicon: LSJ
  rationale: El demostrativo neutro plural remite al conjunto de acciones y prácticas mencionadas antes; «en todo esto» conserva esa referencia amplia sin sonar artificial en español.
- source_word: ἐπέθετο ... διάδημα
  english_pob_choice: put on a crown
  chosen_spanish: se puso una corona
  alternatives_spanish:
  - se puso un diadema
  - llevó un diadema
  - se ciñó una corona
  lexicon: LSJ
  rationale: El griego habla de un adorno real para la cabeza. «Corona» comunica de modo natural la idea básica, mientras que «diadema» se reserva como alternativa más técnica si se quisiera destacar el matiz monárquico del término.
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - vestidura púrpura
  - ropa púrpura
  - manto púrpura
  lexicon: LSJ
  rationale: El texto griego nombra el color/material de manera metonímica. «Púrpura» mantiene esa concisión y el valor de estatus regio señalado por el contexto, sin añadir más de lo que dice el original.
- source_word: ἁδρυνθῆναι
  english_pob_choice: to exalt themselves
  chosen_spanish: exaltarse
  alternatives_spanish:
  - ensalzarse
  - engrandecerse
  - hacerse grandes
  lexicon: LSJ
  rationale: El infinitivo expresa el propósito de usar la púrpura como medio de autoengrandecimiento. «Exaltarse» reproduce bien ese sentido sin cargar el texto con una moralización más fuerte de la que exige el griego.
- source_word: ἐν αὐτῇ
  english_pob_choice: by it
  chosen_spanish: por ello
  alternatives_spanish:
  - con ella
  - por medio de ella
  - en ella
  lexicon: LSJ
  rationale: El pronombre se refiere a la púrpura como medio instrumental. «Por ello» resulta natural en español y deja clara la relación causal/instrumental.
theological_decisions:
- issue: Símbolos de realeza y autoexaltación
  english_pob_reading: Not one of them put on a crown, nor did they clothe themselves in purple so as to exalt themselves by it.
  chosen_spanish_reading: Ninguno de ellos se puso una corona ni se vistió de púrpura, para exaltarse por ello.
  alternative_spanish_readings:
  - '...para engrandecerse con ello'
  - '...para hacerse grandes por ello'
  rationale: El versículo presenta la ausencia de insignias reales como señal de moderación política; la traducción conserva esa relación entre corona/púrpura y autoexaltación sin convertirla en una acusación más amplia de orgullo personal que la fuente no explicita aquí.
  doctrine_reference: 1 Macabeos 8:14; cf. sentido histórico-político del pasaje
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios textuales; se mantiene el acuerdo alto con el original griego y con el análisis auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene «corona» como solución principal para διάδημα, con nota que preserva la alternativa «diadema».
  - «Púrpura» se usa de manera metonímica, coherente con el griego y con el valor cultural de estatus.
  - El sintagma final «por ello» conserva la lectura instrumental de ἐν αὐτῇ sin sobreinterpretar el motivo.
  - El registro es formal y publicable, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
