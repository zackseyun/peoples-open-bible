translation:
  language: es
  text: Porque, sabiendo que ser devoto no es irracional, no se opusieron a los padecimientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλόγιστον
  english_pob_choice: not irrational
  chosen_spanish: no es irracional
  alternatives_spanish:
  - no es irrazonable
  - no es sin razón
  - no es insensato
  lexicon: LSJ
  rationale: El adjetivo niega la falta de razón y, en contexto, califica la piedad como conforme a la razón. «No es irracional» conserva la estructura negativa del griego y la tesis del libro sobre la armonía entre devoción y razón.
- source_word: εἰδότας
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - aunque sabían
  - ya que sabían
  - conociendo
  lexicon: BDAG
  rationale: Como participio con valor circunstancial, expresa conocimiento previo que acompaña la acción. «Sabiendo» transmite esa relación sin forzar una subordinación más interpretativa.
- source_word: εὐσεβεῖν
  english_pob_choice: to be devout
  chosen_spanish: ser devoto
  alternatives_spanish:
  - ser piadoso
  - vivir con piedad
  - reverenciar a Dios
  lexicon: BDAG
  rationale: El verbo señala conducta de piedad. «Ser devoto» mantiene la concisión y el matiz religioso sin expandir innecesariamente el objeto implícito.
- source_word: μὴ ἀνθίστασθαι
  english_pob_choice: did not resist
  chosen_spanish: no se resistieron
  alternatives_spanish:
  - no resistieron
  - no se opusieron
  - no retrocedieron ante
  lexicon: BDAG
  rationale: El infinitivo significa literalmente «no oponerse/resistir». En este contexto de sufrimiento, la forma pronominal española comunica la negativa a enfrentar o rechazar los dolores de manera natural y fiel.
- source_word: τοῖς πόνοις
  english_pob_choice: the pains
  chosen_spanish: a los dolores
  alternatives_spanish:
  - a los sufrimientos
  - a los tormentos
  - a las penas
  lexicon: BDAG
  rationale: πόνοις puede ser dolor, fatiga o sufrimiento. «Dolores» es una equivalencia directa y suficientemente amplia para el contexto martirial, sin intensificarlo hasta «tormentos».
theological_decisions:
- issue: Relación entre piedad y razón en 4 Macabeos
  english_pob_reading: Piety/devotion is not irrational; the martyrs knowingly endure suffering.
  chosen_spanish_reading: La devoción no es irracional, y por eso ellos soportan sin resistirse los dolores.
  alternative_spanish_readings:
  - ser devoto es irracional
  - sabiendo que era irracional ser devoto, no se resistieron a los dolores
  - sabiendo que la devoción no es razonable, no se resistieron a los dolores
  rationale: La sintaxis griega es comprimida, pero el flujo argumental del libro favorece leer que la devoción concuerda con la razón. La traducción mantiene esa tensión resuelta en el sentido del texto, sin invertirla ni debilitarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando cualquier nota al pie no anclada. La versión actual no usa marcadores de nota, de modo que no hay riesgo de desalineación entre texto y aparato crítico. La opción de traducir εἰδότας como «sabiendo» y εὐσεβεῖν como «ser devoto» sigue la revisión más reciente del audit trail.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable en español latinoamericano.
  - No se introdujo «Cristo» ni terminología eclesiástica ajena al pasaje.
  - «Dolores» conserva el campo semántico de πόνοις sin sobrerinterpretar a «tormentos».
  - La cláusula inicial con «Porque» refleja la partícula γὰρ y enlaza con el razonamiento del contexto.
