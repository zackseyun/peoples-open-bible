translation:
  language: es
  text: 'Para el director del coro: «No destruyas»[b]. De David. Mictam[c], cuando Saúl envió hombres[a][d], y vigilaron la casa para matarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «cuando Saúl envió, y vigilaron la casa para matarlo». El hebreo no dice explícitamente «hombres», pero el verbo plural lo implica.'
    reason: lexical_alternative
  - marker: b
    text: «No destruyas» probablemente es el nombre de una melodía o una indicación musical en el encabezado del salmo.
    reason: cultural_note
  - marker: c
    text: El sentido de מִכְתָּם es incierto; por eso se translitera en vez de traducirlo.
    reason: lexical_alternative
  - marker: d
    text: 'O: «cuando Saúl envió hombres y vigilaron la casa».'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Al maestro de coro
  lexicon: HALOT
  rationale: La fórmula superscriptiva señala al responsable musical. «Director del coro» comunica bien la función en español moderno sin perder el carácter litúrgico-musical de la indicación.
- source_word: אַל־תַּשְׁחֵת
  english_pob_choice: Do Not Destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No destruyas esto
  - No destruyas la melodía
  lexicon: HALOT
  rationale: En el encabezado probablemente funciona como nombre de una melodía o indicación musical. Se conserva como cita/título implícito en español con sentido imperativo natural, sin forzar una explicación que el hebreo no da.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición de la superscripción permite asociación, dedicación o autoría. «De David» mantiene esa ambigüedad tradicional sin precisar más de lo que el texto muestra.
- source_word: מִכְתָּם
  english_pob_choice: miktam
  chosen_spanish: Mictam
  alternatives_spanish:
  - miktam
  - inscripción
  - cántico
  lexicon: HALOT
  rationale: El término es incierto; se translitera para no ocultar la duda léxica con una glosa especulativa. Se adapta a ortografía española como nombre común transliterado.
- source_word: בִּשְׁלֹחַ
  english_pob_choice: when Saul sent men
  chosen_spanish: cuando Saúl envió hombres
  alternatives_spanish:
  - cuando Saúl envió
  - al enviar Saúl
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se rinde naturalmente con «cuando». El hebreo no dice explícitamente «hombres», pero el verbo plural siguiente lo implica; por eso se incluye con nota.
- source_word: וַיִּשְׁמְרוּ
  english_pob_choice: they watched
  chosen_spanish: ellos vigilaron
  alternatives_spanish:
  - ellos observaron
  - ellos guardaron
  lexicon: HALOT
  rationale: Aquí שׁמר expresa vigilancia hostil, no protección. «Vigilaron» conserva ese matiz de vigilancia/acecho mejor que «guardaron» en español.
- source_word: אֶת־הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la casa de él
  - la vivienda
  lexicon: HALOT
  rationale: El objeto directo definido es «la casa». En español se evita añadir posesivo no explicitado por el hebreo, aunque el contexto remite a la casa de David.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para darle muerte
  - para quitarle la vida
  lexicon: HALOT
  rationale: El infinitivo de propósito con sufijo de tercera persona se traduce con una construcción final natural y directa en español.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente que aclaró la relación sintáctica entre la cláusula temporal («cuando Saúl envió hombres») y la cláusula principal («y ellos vigilaron la casa»), reflejando esa estructura con una coma implícita en la puntuación española y manteniendo la lectura de la secuencia verbal. No se realizaron cambios por la última pasada, que indicó que no había modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva «Mictam» como transliteración para respetar la incertidumbre léxica.
  - Se evita introducir interpretaciones como «tune name» en el texto principal; esa inferencia queda en nota.
  - «Vigilaron» se eligió por el valor hostil del verbo hebreo en este contexto, no como guardia protectora.
