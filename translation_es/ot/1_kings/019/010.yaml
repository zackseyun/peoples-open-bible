review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: conserva el nombre divino «Yahvé», el título «el Dios de los ejércitos», la acusación de haber abandonado el pacto, derribado los altares y matado a los profetas, así como la idea de que Elías ha quedado solo y buscan su vida. Sin embargo, hay dos detalles mejorables respecto a la evidencia fuente y al rastro auditado: (1) la intensificación de קַנֹּא קִנֵּאתִי suena más natural en español como «He sentido un celo muy grande» o «He tenido gran celo» que como «Muy celoso he sido»; y (2) el inglés auditado preserva una nota alternativa para «los hijos de Israel / los israelitas», la cual no se mantuvo en las notas españolas. También «procuran quitarme la vida, para tomarla» resulta algo redundante y menos natural que una formulación que preserve la anáfora con mejor fluidez.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta cierta rigidez: «Muy celoso he sido» suena calcado y algo menos idiomático que «He sentido un celo muy grande» o «He tenido gran celo». Además, «procuran quitarme la vida, para tomarla» es comprensible, pero estilísticamente forzado por la repetición semántica; «buscan mi vida[a], para quitarla» o «buscan mi vida[a], para tomarla» preserva mejor la estructura hebrea, aunque en español la mejor solución idiomática es explicitar la referencia. Conviene también ordenar las notas para que reflejen las alternativas significativas del audit trail inglés.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֵי צְבָאוֹת -> «el Dios de los ejércitos» aceptable y claro; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel» preserva la forma fuente; נֶפֶשׁ -> «vida» correctamente entendido. La principal excepción es estilística/lexical: para קַנֹּא קִנֵּאתִי, «celoso» es posible, pero en español bíblico contemporáneo puede sonar ambiguo; «he tenido gran celo por Yahvé» transmite mejor el valor intensivo y contextual.'
  issues:
  - severity: medium
    issue: «Muy celoso he sido» suena acartonado y menos idiomático para קַנֹּא קִנֵּאתִי
    rationale: La construcción hebrea intensiva debe preservarse, pero el español natural y claro favorece «He tenido gran celo por Yahvé» o similar. «Celoso» puede entenderse bien por contexto, pero como predicativo frontalizado resulta torpe.
  - severity: medium
    issue: Falta la nota alternativa para «los hijos de Israel» / «los israelitas» presente en el audit trail inglés
    rationale: El proyecto pide preservar alternativas significativas cuando el inglés POB las conserva. Aquí la alternativa lexical relevante debería mantenerse en nota española.
  - severity: low
    issue: «Procuran quitarme la vida, para tomarla» es redundante y poco natural
    rationale: El hebreo distingue «buscan mi vida» y «para tomarla». La solución actual mezcla un modismo ya interpretado («quitarme la vida») con una repetición literal («tomarla»), creando fricción estilística.
