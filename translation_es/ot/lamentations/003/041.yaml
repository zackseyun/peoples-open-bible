translation:
  language: es
  text: Levantemos nuestros corazones y nuestras manos[a] a Dios en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Levantemos nuestros corazones a nuestras manos, a Dios en el cielo». El hebreo probablemente expresa que los corazones se elevan juntamente con las manos alzadas en oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשָּׂא
  english_pob_choice: Let us lift up
  chosen_spanish: Levantemos
  alternatives_spanish:
  - Alcemos
  - Elevemos
  lexicon: HALOT
  rationale: El cohortativo exhortativo pide una forma inclusiva de exhortación en español. «Levantemos» conserva la imagen concreta de alzar, con un registro natural y digno.
- source_word: לְבָבֵנוּ
  english_pob_choice: our hearts
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  - nuestro interior
  lexicon: HALOT
  rationale: Aunque el inglés POB usa plural idiomático, el hebreo tiene singular colectivo con sufijo de 1cp. En español, el singular colectivo «nuestro corazón» reproduce mejor la forma del original sin perder el valor comunitario e interior.
- source_word: אֶל כַּפָּיִם
  english_pob_choice: and hands
  chosen_spanish: y nuestras manos
  alternatives_spanish:
  - y las manos
  - con nuestras manos
  lexicon: HALOT
  rationale: 'La relación hebrea es compacta e idiomática: el corazón se eleva junto con las manos en oración. «Y nuestras manos» refleja que ambas realidades están incluidas como objetos de la exhortación, sin forzar la preposición literal «a» en español.'
- source_word: כַּפָּיִם
  english_pob_choice: our hands
  chosen_spanish: nuestras manos
  alternatives_spanish:
  - nuestras palmas
  - las palmas de nuestras manos
  lexicon: HALOT
  rationale: El dual de כף se refiere a las palmas/manos. «Manos» es la equivalencia española más clara y natural en lenguaje de oración.
- source_word: אֶל אֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  lexicon: HALOT
  rationale: אֵל es el título divino «Dios». La preposición direccional se traduce naturalmente con «a» en este contexto de oración.
- source_word: בַּשָּׁמָיִם
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  lexicon: HALOT
  rationale: El plural hebreo de «cielos» conserva mejor la forma del original y su matiz bíblico. En español puede mantenerse en plural sin sonar arcaico, y evita estrechar innecesariamente el alcance del término.
theological_decisions:
- issue: 'Imágenes de oración: corazón y manos'
  english_pob_reading: The verse joins inward repentance/prayer ('hearts') with outward supplication ('hands') without privileging a sacramental or merely physical act.
  chosen_spanish_reading: El versículo une la disposición interior del corazón con el gesto exterior de las manos levantadas en oración, sin reducir la petición a un rito corporal.
  alternative_spanish_readings:
  - El corazón se eleva junto con las manos hacia Dios.
  - Levantemos el corazón y, además, las manos como gesto de oración.
  rationale: 'La sintaxis hebrea es compacta y puede sugerir simultaneidad entre interioridad y gesto externo. La redacción española conserva esa tensión: no separa artificialmente ambos elementos ni los convierte en dos acciones independientes.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «with our hands» a «and hands» para reflejar mejor que ambos elementos dependen del mismo verbo. La versión española sigue esa revisión al coordinar «nuestro corazón y nuestras manos», pero conserva la preposición direccional del cierre («a Dios en los cielos») y mantiene la imagen idiomática de oración sin volverla mecánica.
  spanish_consistency_notes:
  - Se mantiene el trato inclusivo de primera persona plural coherente con un llamamiento comunitario.
  - «Dios» se usa para אֵל según la convención del proyecto; no se introduce «Señor» porque el término hebreo aquí es el título divino general.
  - «En los cielos» conserva el plural bíblico del hebreo y armoniza con el registro de poesía de lamento.
  - La nota al pie preserva la alternativa más literal sin imponerla en el texto principal.
