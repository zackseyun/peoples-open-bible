  to: Entonces volverá a su tierra con gran riqueza[a], pero su corazón estará en contra del pacto santo; y actuará y volverá a su tierra.
  rationale: Se mejoró la naturalidad del español en la cláusula de hostilidad interna, cambiando «estará contra» por «estará en contra del», sin alterar el sentido del hebreo. También se eliminó la nota b porque no preservaba una alternativa significativa distinta del texto principal. Se mantuvieron la repetición de «volverá», la amplitud de «gran riqueza» y el lenguaje de «pacto santo» para reflejar fielmente la fuente y la auditoría POB.
