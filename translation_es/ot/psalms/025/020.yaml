translation:
  language: es
  text: Guarda mi alma[a] y líbrame; no quede yo avergonzado, porque en ti me refugio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida». Hebreo nephesh puede significar «alma», «vida» o «persona»; aquí el sentido probable es el de la vida/persona del salmista en peligro.
    reason: lexical_alternative
  - marker: b
    text: O «me he refugiado en ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְרָה
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Protege
  - Vela por
  lexicon: HALOT
  rationale: El imperativo pide protección activa de parte de Dios. «Guarda» conserva la idea concreta de vigilancia y protección, y en español es natural en una súplica poética.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: La revisión inglesa decidió reflejar más directamente נֶפֶשׁ como «soul». En español, «alma» comunica mejor ese matiz que «vida», aunque el hebreo puede abarcar la persona o la vida entera. Se mantiene así la tensión antropológica sin reducirla a un solo concepto técnico.
- source_word: וְהַצִּילֵנִי
  english_pob_choice: and rescue me
  chosen_spanish: y líbrame
  alternatives_spanish:
  - y rescátame
  - y sálvame
  - y sácame de allí
  lexicon: HALOT
  rationale: El verbo expresa sacar/salvar de peligro. «Líbrame» es idiomático, breve y fiel al valor de liberación, sin perder el tono de petición urgente.
- source_word: אַל אֵבוֹשׁ
  english_pob_choice: let me not be put to shame
  chosen_spanish: no quede yo avergonzado
  alternatives_spanish:
  - no sea yo avergonzado
  - no me avergüence
  - no quede yo en vergüenza
  lexicon: HALOT
  rationale: En contexto de lamento, בוש implica deshonra o quedar en vergüenza delante de adversarios. La pasiva «no quede yo avergonzado» conserva ese matiz social mejor que una lectura meramente interior de «sentirme avergonzado».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce el fundamento de la súplica. «Porque» mantiene con claridad la relación causal en español.
- source_word: חָסִיתִי בָךְ
  english_pob_choice: I take refuge in you
  chosen_spanish: me refugio
  alternatives_spanish:
  - he tomado refugio en ti
  - confío en ti
  - me acojo a ti
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de refugiarse. En español, «me refugio» conserva esa imagen. Aunque el sujeto implícito es presente de sentido durativo, la forma refleja la confianza continua sin volverla una paráfrasis abstracta.
theological_decisions:
- issue: Sentido antropológico de נַפְשִׁי
  english_pob_reading: The revision moved from 'my life' to 'my soul' to more directly reflect the Hebrew.
  chosen_spanish_reading: «mi alma»
  alternative_spanish_readings:
  - mi vida
  - mi ser
  - mi persona
  rationale: Se sigue la revisión inglesa que privilegia la correspondencia más directa con נַפְשִׁי. En español, «alma» es la opción más cercana y eclesialmente legible; aun así, se conserva la posible amplitud semítica del término en la nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Implicación de vergüenza pública en אַל אֵבוֹשׁ
  english_pob_reading: let me not be put to shame
  chosen_spanish_reading: no quede yo avergonzado
  alternative_spanish_readings:
  - no sea yo avergonzado
  - no me avergüence
  rationale: La forma elegida mantiene la dimensión relacional y pública de la vergüenza, que en los salmos no es solo emoción interna sino deshonra ante enemigos y ante Dios.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La base inglesa pasó de «Guard my life» a «Guard my soul» para reflejar más directamente נַפְשִׁי. La versión española sigue esa revisión y, a la vez, conserva la alternativa semántica de «vida» en nota, de modo que la traducción no borra la amplitud del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología base solo cuando el Tetragrámaton esté presente; este verso no lo contiene.
  - Se prefirió «alma» por coherencia con la revisión inglesa, pero la nota preserva la amplitud de נֶפֶשׁ.
  - «me refugio» conserva la metáfora verbal sin convertirla en una abstracción como «confío».
  - La sintaxis poética busca ser natural en español sin suavizar la súplica ni la vergüenza pública implícita.
