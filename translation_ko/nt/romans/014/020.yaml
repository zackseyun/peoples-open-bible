  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ ἕνεκεν βρώματος κατάλυε τὸ ἔργον τοῦ θεοῦ. πάντα μὲν καθαρά, ἀλλὰ κακὸν τῷ ἀνθρώπῳ τῷ διὰ προσκόμματος ἐσθίοντι.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/020.yaml
  text: Do not, for the sake of food, tear down the work of God. All things are indeed clean, but it is evil for the person who eats in a way that causes stumbling.
translation:
  language: ko
  text: 음식 때문에 하나님의 일을 허물지 마십시오. 모든 것이 정결하지만, 걸림이 되게 하면서 먹는 사람에게는 그것이 악입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατάλυε
  english_pob_choice: tear down
  chosen_korean: 허물다
  alternatives_korean:
  - 무너뜨리다
  - 파괴하다
  lexicon: BDAG
  rationale: 건축물을 무너뜨리는 어휘. 「세우다(οἰκοδομέω)」의 반대. 「허물다」가 한국어로 자연스럽다.
- source_word: πάντα ... καθαρά
  english_pob_choice: All things are ... clean
  chosen_korean: 모든 것이 정결하다
  alternatives_korean:
  - 모든 것이 깨끗하다
  lexicon: BDAG
  rationale: 의식적 정결 문맥. 14:14의 「부정한」(κοινός)과 대조되도록 「정결한」으로 옮긴다.
- source_word: διὰ προσκόμματος ἐσθίοντι
  english_pob_choice: who eats in a way that causes stumbling
  chosen_korean: 걸림이 되게 하면서 먹는
  alternatives_korean:
  - 걸림돌이 되게 하여 먹는
  lexicon: BDAG
  rationale: 「διά + 속격」을 방식·수단으로 풀어 「걸림이 되게 하면서 먹는」으로 자연스럽게. 14:13의 「걸림돌」과 어휘 연결.
