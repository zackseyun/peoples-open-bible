translation:
  language: es
  text: El vino es injusto, el rey es injusto, las mujeres son injustas, y todos los hijos de los hombres[a] y todas sus obras son injustas, todas esas cosas. Y no hay verdad en ellos, y en su injusticia perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “todos los seres humanos”; el griego usa “los hijos de los hombres”, un giro masculino idiomático para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄδικος / ἄδικοι / ἄδικα
  english_pob_choice: unjust
  chosen_spanish: injusto / injustas / injustos
  alternatives_spanish:
  - injusto
  - injusta
  - inicuo
  - malvado
  lexicon: BDAG
  rationale: Se conserva la repetición del predicado con el campo semántico de falta de justicia/rectitud. 'Injusto' es el equivalente natural en español moderno y evita cargar el texto con matices doctrinales más estrechos que 'inicuo' o 'malvado'.
- source_word: οἶνος
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - licor
  lexicon: BDAG
  rationale: Equivalencia directa y transparente del sustantivo griego.
- source_word: βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: BDAG
  rationale: El artículo griego favorece un referente definido; en español, 'el rey' reproduce mejor el tono proverbial y sentencioso del pasaje.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: BDAG
  rationale: '''Mujeres'' sigue el sentido ordinario del plural griego; ''esposas'' añadiría una relación no exigida por el texto.'
- source_word: πάντες οἱ υἱοὶ τῶν ἀνθρώπων
  english_pob_choice: all the sons of men
  chosen_spanish: todos los hijos de los hombres
  alternatives_spanish:
  - todos los seres humanos
  - todas las personas
  lexicon: BDAG
  rationale: Se conserva la formulación masculina e idiomática del griego, como hace la POB en inglés, en vez de neutralizarla sin base inmediata en el original.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: '''Obras'' es un equivalente natural en español y mantiene el carácter amplio de lo que hacen o producen los seres humanos.'
- source_word: πάντα τὰ τοιαῦτα
  english_pob_choice: all such things
  chosen_spanish: todas esas cosas
  alternatives_spanish:
  - todas las cosas de ese tipo
  - todo eso
  lexicon: BDAG
  rationale: La expresión resume la lista anterior; 'todas esas cosas' conserva la función generalizadora sin sobreespecificar el referente.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  lexicon: BDAG
  rationale: '''Verdad'' es el equivalente más natural y claro en español, y sostiene bien el contraste con la injusticia.'
- source_word: ἀπολοῦνται
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - se perderán
  - serán destruidos
  lexicon: BDAG
  rationale: '''Perecerán'' expresa con fidelidad el resultado de ἀπόλλυμι sin introducir explícitamente un agente externo que el griego aquí no menciona.'
theological_decisions:
- issue: Fórmula masculina genérica para la humanidad
  english_pob_reading: all the sons of men
  chosen_spanish_reading: todos los hijos de los hombres
  alternative_spanish_readings:
  - todos los seres humanos
  - todas las personas
  rationale: Se preserva la forma masculina e idiomática del original, coherente con la política de exactitud de género cuando el griego lo presenta así, dejando intacto el valor representativo universal del enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tensión entre 'justicia' e 'injusticia' en la sentencia
  english_pob_reading: unjust / in their injustice
  chosen_spanish_reading: injusto / en su injusticia
  alternative_spanish_readings:
  - malvado / en su maldad
  - inicuo / en su iniquidad
  rationale: '''Injusto'' e ''injusticia'' mantienen el nexo léxico visible entre el adjetivo repetido y el sustantivo final, sin desplazar el sentido hacia categorías morales más específicas que el griego no exige.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: 'Se ha seguido el audit trail inglés sin depender mecánicamente de él: se conservaron la repetición de ἄδικος con un mismo campo léxico en español, la formulación masculina de πάντες οἱ υἱοὶ τῶν ἀνθρώπων, y el cierre con ἀπολοῦνται como ''perecerán''. La única adaptación principal fue ajustar el orden y la puntuación para que el castellano resulte publicable sin perder la estructura sentenciosa del griego.'
  spanish_consistency_notes:
  - Se mantuvo 'injusto/injustas' de forma uniforme para reflejar la repetición del griego.
  - Se prefirió 'obras' para ἔργα y 'verdad' para ἀλήθεια, ambos en registro claro y eclesialmente legible.
  - No se reemplazó la fórmula masculina por una neutralización total en el texto principal; la alternativa quedó en nota.
  - El marcador [a] queda anclado en 'Vino[a]' para señalar la alternativa de lectura sin interrumpir la sintaxis.
  - El marcador [b] queda anclado en 'hombres[b]' para preservar la observación sobre el idiomatismo masculino del original.
