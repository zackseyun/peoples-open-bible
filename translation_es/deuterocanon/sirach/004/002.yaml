translation:
  language: es
  text: No hagas caer en desesperación a un alma necesitada[a], y no ignores a un alma abatida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: “No entristezcas a un alma hambrienta, y no provoques a un hombre en su aflicción”. El testimonio hebreo es más amplio (“alma necesitada” / “alma abatida”), por eso el texto principal sigue el hebreo y aquí se preserva el matiz griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: דֹּוֶוה נֶפֶשׁ חֲסֵרָה
  english_pob_choice: a needy soul
  chosen_spanish: un alma necesitada
  alternatives_spanish:
  - un alma indigente
  - un alma menesterosa
  - un alma afligida
  lexicon: HALOT
  rationale: La combinación hebrea une aflicción o languidez con carencia; el griego paralelo, ψυχὴν πεινῶσαν, apunta a una persona privada de lo necesario. 'Alma necesitada' conserva el sentido amplio de necesidad y pobreza interior o material sin reducirlo solo a hambre literal.
- source_word: אַל תָּפוּחַ
  english_pob_choice: do not make ... despair
  chosen_spanish: No entristezcas
  alternatives_spanish:
  - no la hagas desesperar
  - no la aflijas
  - no la llenes de tristeza
  lexicon: HALOT
  rationale: El verbo hebreo es difícil, y el griego μὴ λυπήσῃς apoya la idea de causar dolor o tristeza. 'Entristezcas' comunica bien el efecto de agravar la condición del necesitado y evita forzar una lectura más específica que el testimonio no exige.
- source_word: וְאַל תִּתְעַלֵּם
  english_pob_choice: and do not ignore
  chosen_spanish: y no ignores
  alternatives_spanish:
  - y no te escondas de
  - y no desatiendas
  - y no apartes la vista de
  lexicon: HALOT
  rationale: El hitpael de עלם puede expresar ocultarse o fingir no ver; en español, 'no ignores' transmite de manera natural esa idea de desentenderse de alguien en necesidad.
- source_word: מִמְּדֻכְדַּךְ נָפֶשׁ
  english_pob_choice: a crushed soul
  chosen_spanish: un alma abatida
  alternatives_spanish:
  - un alma quebrantada
  - un espíritu aplastado
  - un alma oprimida
  lexicon: HALOT
  rationale: מדוכדך expresa algo aplastado, abatido o deshecho. 'Alma abatida' conserva la imagen de alguien vencido o derribado, con un registro natural en español y cercano a la fuerza metafórica del hebreo.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo base con apoyo del paralelo griego. No se registran revisiones textuales aplicadas; la decisión principal es mantener el alcance más amplio del hebreo en el texto principal y reservar el matiz de 'hambrienta' para nota.
  spanish_consistency_notes:
  - Se usa 'alma' para נֶפֶשׁ conforme al tono sapiencial del pasaje.
  - Se evita 'SEÑOR' u otra terminología no pertinente; no hay nombres divinos en este versículo.
  - La forma imperativa negativa en español conserva el paralelismo del hebreo y del griego.
  - '''Necesitada'' y ''abatida'' mantienen el campo semántico de carencia y postración sin sobreinterpretar la causa concreta de la aflicción.'
