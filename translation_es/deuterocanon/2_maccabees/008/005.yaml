translation:
  language: es
  text: Pero cuando Macabeo había formado un grupo, ya se había vuelto irresistible para las naciones[a], porque la ira del Señor se había tornado en misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los gentiles», ya que el término griego puede designar a los pueblos no judíos que rodeaban Judea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος δὲ ὁ Μακκαβαῖος ἐν συστήματι
  english_pob_choice: had formed a band
  chosen_spanish: se había reunido en un grupo
  alternatives_spanish:
  - había formado una banda
  - había organizado un grupo
  - se había juntado con una fuerza
  lexicon: LSJ
  rationale: El griego indica que Macabeo llegó a encontrarse/actuar en un cuerpo organizado. En español, 'se había reunido en un grupo' conserva la idea de una agrupación ya constituida sin precisar indebidamente un tamaño o estructura militar. Se evita 'banda' por su posible carga peyorativa en español actual.
- source_word: ἀνυπόστατος
  english_pob_choice: irresistible
  chosen_spanish: irresistible
  alternatives_spanish:
  - imposible de resistir
  - incontenible
  - invencible
  lexicon: LSJ
  rationale: El adjetivo expresa que no podía ser resistido o soportado por sus adversarios. 'Irresistible' reproduce bien esa fuerza en español y sigue la revisión inglesa más natural, sin añadir una idea de victoria total que el griego no exige.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - para los gentiles
  - para los pueblos
  - ante las naciones
  lexicon: LSJ
  rationale: Se mantiene 'naciones' como la lectura más directa del término griego, evitando imponer un tecnicismo eclesiástico. En este contexto señala a los pueblos no judíos alrededor de Judea.
- source_word: τῆς ὀργῆς τοῦ κυρίου
  english_pob_choice: the wrath of the Lord
  chosen_spanish: la ira del Señor
  alternatives_spanish:
  - el enojo del Señor
  - la cólera del Señor
  lexicon: LSJ
  rationale: '''Ira'' conserva el peso teológico de ὀργή mejor que ''enojo''. ''Señor'' sigue el valor de κύριος en la frase griega, donde se refiere al Dios de Israel.'
- source_word: εἰς ἔλεον τραπείσης
  english_pob_choice: had turned to mercy
  chosen_spanish: se había vuelto misericordia
  alternatives_spanish:
  - había cambiado en misericordia
  - se había tornado misericordia
  - había dado paso a misericordia
  lexicon: LSJ
  rationale: La expresión griega usa una imagen de giro o cambio hacia la misericordia. 'Se había vuelto misericordia' conserva el movimiento metafórico sin forzar una paráfrasis explicativa.
theological_decisions:
- issue: Relación causal entre la misericordia divina y la invencibilidad de Macabeo
  english_pob_reading: because the wrath of the Lord had turned to mercy
  chosen_spanish_reading: porque la ira del Señor se había vuelto misericordia
  alternative_spanish_readings:
  - ya que la ira del Señor había cambiado a misericordia
  - porque el Señor había pasado de la ira a la misericordia
  rationale: La cláusula final funciona como explicación causal del éxito de Macabeo. La traducción conserva la afirmación teológica de un cambio en la disposición divina sin suavizarla ni racionalizarla más allá del griego.
  doctrine_reference: Preservar la tensión teológica del texto; no armonizar ni explicar en exceso.
- issue: Alcance de τοῖς ἔθνεσιν
  english_pob_reading: for the nations
  chosen_spanish_reading: para las naciones
  alternative_spanish_readings:
  - para los gentiles
  - para los pueblos
  rationale: '''Naciones'' mantiene la ambigüedad útil del griego: puede abarcar a los pueblos circundantes no judíos sin convertir el término en una categoría técnica posterior.'
  doctrine_reference: Consistencia léxica en pasajes de 2 Macabeos sobre los pueblos circundantes.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'irresistible' para ἀνυπόστατος. En español se adoptó la misma solución natural, pero se ajustó el resto de la frase para que suene idiomática y fiel al griego. Se evitó calcar 'had turned to mercy' con una construcción excesivamente literal cuando el español permite una metáfora clara y elegante.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος, en línea con el valor teológico del texto y con la práctica del proyecto cuando el referente es el Dios de Israel.
  - '''Naciones'' se mantiene como término amplio y no se sustituye por ''gentiles'' en el cuerpo del texto, para no cerrar indebidamente el alcance semántico.'
  - '''Misericordia'' se conserva para ἔλεον, conforme al tono bíblico y a la consistencia interna del proyecto.'
