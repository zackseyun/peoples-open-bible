translation:
  language: es
  text: Y derramaré mi ira sobre Sin[a], la fortaleza de Egipto, y cortaré la multitud de No[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sin suele identificarse con Pelusio, una ciudad fortificada en la frontera nordeste de Egipto.
    reason: cross_reference
  - marker: b
    text: No suele identificarse con Tebas.
    reason: cross_reference
lexical_decisions:
- source_word: וְשָׁפַכְתִּי
  english_pob_choice: And I will pour out
  chosen_spanish: Y derramaré
  alternatives_spanish:
  - Y vaciaré
  - Y verteré
  lexicon: HALOT
  rationale: שָׁפַךְ en este contexto de juicio divino expresa la imagen de una efusión intensa; en español, 'derramaré' conserva bien esa fuerza y suena natural en estilo bíblico contemporáneo. Se mantiene el enlace inicial con 'Y' para reflejar el וְ coordinante.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi enojo
  lexicon: HALOT
  rationale: חֵמָה comunica una ira ardiente y judicial. 'Ira' preserva la gravedad del término en español; 'furor' es posible, pero puede sonar más emocional, y 'enojo' es demasiado débil para este contexto.
- source_word: סִין
  english_pob_choice: Sin
  chosen_spanish: Sin
  alternatives_spanish:
  - Pelusio
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo en el texto principal, siguiendo el criterio del POB de transliterar topónimos. La identificación histórica con Pelusio queda para la nota.
- source_word: מָעוֹז מִצְרָיִם
  english_pob_choice: the stronghold of Egypt
  chosen_spanish: la fortaleza de Egipto
  alternatives_spanish:
  - el baluarte de Egipto
  - la ciudadela de Egipto
  lexicon: HALOT
  rationale: מָעוֹז designa un lugar de fuerza o defensa fortificada. 'Fortaleza' transmite bien esa idea en español y mantiene el valor descriptivo de Sin como plaza fuerte de Egipto.
- source_word: וְהִכְרַתִּי
  english_pob_choice: and I will cut off
  chosen_spanish: y cortaré
  alternatives_spanish:
  - y destruiré
  - y exterminaré
  lexicon: HALOT
  rationale: כרת en fórmulas de juicio suele conservar la metáfora de 'cortar'. 'Cortaré' mantiene la imagen del hebreo sin suavizarla; 'destruiré' o 'exterminaré' interpretan más de lo necesario.
- source_word: אֶת הֲמוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el gentío
  lexicon: HALOT
  rationale: הָמוֹן puede abarcar multitud o masa de gente. 'La multitud' es la opción más amplia y fiel, sin especificar de más si alude a habitantes, población o gran cantidad de personas.
- source_word: נֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - Tebas
  lexicon: HALOT
  rationale: Se mantiene el nombre hebreo en el texto principal. La identificación común con Tebas se registra en nota, en línea con el tratamiento del POB para nombres geográficos.
theological_decisions:
- issue: Lenguaje de juicio divino sin atenuación
  english_pob_reading: Retain 'my wrath' and 'cut off' as direct divine actions of judgment
  chosen_spanish_reading: Conservar 'mi ira' y 'cortaré' como acciones directas de juicio divino
  alternative_spanish_readings:
  - usar 'mi enojo' en lugar de 'mi ira'
  - usar 'destruiré' en lugar de 'cortaré'
  rationale: El hebreo presenta un juicio activo y severo de Yahvé. 'Mi ira' y 'cortaré' conservan esa intensidad sin desdibujar la imagen verbal de derramamiento y corte, evitando una paráfrasis que suavice el pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Topónimos antiguos con identificación histórica
  english_pob_reading: Sin is commonly identified with Pelusium; No with Thebes
  chosen_spanish_reading: Mantener los nombres Sin y No en el texto, con identificación histórica en nota
  alternative_spanish_readings:
  - sustituir Sin por Pelusio
  - sustituir No por Tebas
  rationale: La política del proyecto favorece la transliteración de nombres propios en el texto principal. Las identificaciones históricas son valiosas, pero pertenecen mejor a notas para no borrar el dato hebreo original.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios recientes ni revisiones aplicadas; se sigue la lectura estable indicada por el contexto de alta concordancia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando el texto hebreo nombra explícitamente el nombre divino; aquí el versículo emplea primera persona sin el tetragrámaton, por lo que no se introduce.
  - Se mantiene la metáfora verbal de juicio ('derramaré', 'cortaré') para conservar la fuerza del hebreo.
  - Los nombres propios geográficos se conservan transliterados en el texto principal, con identificaciones históricas en notas.
