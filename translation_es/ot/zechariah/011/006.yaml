translation:
  language: es
  text: Porque ya no tendré compasión de los habitantes de la tierra[a], declara Yahvé. He aquí, yo entrego al pueblo, cada uno en manos de su prójimo y en manos de su rey, y ellos aplastarán la tierra[c][b], y yo no la libraré de sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los habitantes de la tierra» en sentido universal, si הָאָרֶץ se entiende como «la tierra» entera y no localmente como «la tierra» o «el país» en cuestión.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «cada hombre en mano de su prójimo y en mano de su rey»; la formulación presenta a cada persona entregada al poder de otro.'
    reason: lexical_alternative
  - marker: c
    text: O «yo no la rescataré» / «no los rescataré de sus manos». El objeto final no está explícito en hebreo y se suple según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחְמֹל
  english_pob_choice: will ... have compassion
  chosen_spanish: tendré compasión
  alternatives_spanish:
  - perdonaré
  - me compadeceré
  - los perdonaré
  lexicon: HALOT
  rationale: חמל expresa la idea de mostrar compasión o de abstenerse de un acto de misericordia. «Tendré compasión» conserva el matiz afectivo y judicial, sin reducirlo a una mera exención técnica.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los habitantes del país
  - los que habitan la tierra
  - los moradores de la tierra
  lexicon: HALOT
  rationale: El sustantivo participial designa a los que habitan en un lugar. En este contexto, la expresión puede referirse localmente a la tierra en cuestión; «tierra» mantiene la ambigüedad posible entre territorio y mundo, sin forzar una universalización.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en español según el criterio del proyecto. «Declara» reproduce la fórmula profética solemne de נְאֻם sin volverla excesivamente arcaica.
- source_word: מַמְצִיא
  english_pob_choice: am handing over
  chosen_spanish: entrego
  alternatives_spanish:
  - estoy entregando
  - hago pasar
  - pongo en manos
  lexicon: HALOT
  rationale: El hifil de מצא aquí tiene sentido causativo de poner a alguien en poder de otro. «Entrego» comunica bien la acción judicial y hostil en español, con menos pesadez que una glosa literal.
- source_word: הָאָדָם אִישׁ
  english_pob_choice: the people, each one / each man distributively
  chosen_spanish: el pueblo, cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  - cada uno
  lexicon: HALOT
  rationale: La combinación intensifica el reparto distributivo. «El pueblo, cada uno» conserva la colectividad de אָדָם y el efecto distributivo de אִישׁ, evitando neutralizar del todo el singular del hebreo y sin sonar forzado en español.
- source_word: בְיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: La metáfora hebrea de la «mano» expresa poder y dominio. «En mano de» mantiene la imagen recurrente y su cohesión retórica con el cierre de la versículo.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  - su amigo
  lexicon: HALOT
  rationale: רֵעַ puede ser amigo, compañero o prójimo. En un contexto de ruptura social y violencia mutua, «prójimo» comunica cercanía relacional sin la tonalidad demasiado positiva de «amigo».
- source_word: מַלְכּוֹ
  english_pob_choice: his king
  chosen_spanish: su rey
  alternatives_spanish:
  - su gobernante
  - su soberano
  lexicon: HALOT
  rationale: El término significa literalmente «rey». Se conserva la especificidad política del juicio.
- source_word: וְכִתְּתוּ
  english_pob_choice: they will crush
  chosen_spanish: aplastarán
  alternatives_spanish:
  - quebrarán
  - harán pedazos
  - desmenuzarán
  lexicon: HALOT
  rationale: כתת puede significar machacar, quebrantar o triturar. «Aplastar» expresa bien la violencia del verbo en español y funciona naturalmente con «la tierra» como objeto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Se mantiene la misma palabra que al inicio del verso para conservar la coherencia semántica y la posible amplitud del hebreo.
- source_word: אַצִּיל
  english_pob_choice: I will not deliver it
  chosen_spanish: no la libraré
  alternatives_spanish:
  - no la rescataré
  - no la salvaré
  - no la entregaré
  lexicon: HALOT
  rationale: נצל en hifil significa librar, rescatar o salvar de un peligro. «No la libraré» conserva el registro de juicio y evita añadir un objeto explícito que el hebreo final deja implícito.
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de sus manos
  - de su poder
  lexicon: HALOT
  rationale: La imagen de la mano se preserva para reflejar el paralelismo con «en mano de» y mantener el eco idiomático del texto hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. En español del proyecto se adopta «Yahvé» como forma principal, preservando el nombre del pacto en vez de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra habitada
  rationale: El contexto inmediato de Zacarías favorece una referencia territorial/local antes que universal. «La tierra» mantiene esa lectura sin cerrar del todo la posibilidad semántica del hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
- issue: Valor colectivo-distributivo de הָאָדָם אִישׁ
  english_pob_reading: the people, each / each man distributively
  chosen_spanish_reading: el pueblo, cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada persona
  - cada uno
  rationale: 'La expresión hebrea combina un sustantivo colectivo con un distributivo. «El pueblo, cada uno» conserva ambos niveles: masa colectiva y reparto individual bajo juicio.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
translation_notes:
  revision_awareness: El borrador inglés revisado cambió de «each man» a una formulación colectiva («the people, each») para reflejar mejor אָדָם sin perder el distributivo de אִישׁ. La versión española sigue esa línea con «el pueblo, cada uno», y mantiene la clausura final ambigua del hebreo con una solución coherente en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente del nombre divino.
  - 'Se conserva la metáfora de la mano en dos posiciones del verso: «en mano de» y «de su mano».'
  - Se traduce הָאָרֶץ de manera uniforme como «la tierra» en las dos ocurrencias del verso.
  - Se evita sustituir sistemáticamente el lenguaje de juicio por paráfrasis explicativas, para preservar la tensión del texto hebreo.
