theological_decisions:
- issue: 11:2-16 머리 가리개 본문의 해석 — 단일 해석을 본문에 강제하지 않음
  chosen_reading: 본문의 「머리(κεφαλή)」와 「가리다(κατακαλύπτω)」 어휘를 직역적으로 보존하고, 머리의 의미(권위/근원/수단), 가리개의 정체(면사/머리카락 자체), 회중 적용 범위 등은 본문이 결정하지 않으므로 한국어 본문도 결정하지 않는다.
  alternative_readings:
  - 머리(κεφαλή) = 권위 (전통적 해석)
  - 머리(κεφαλή) = 근원/원천
  - 가리개 = 면사/베일
  - 가리개 = 머리카락 자체 (11:15)
  rationale: 본문 자체가 어휘 선택에서 다층적이며 (11:15에서 머리카락이 「대신에/처럼」 주어졌다고 말해 본문 안에서 해석 폭을 열어 둔다), 한국어 본문은 해석을 풀어 쓰지 않고 어휘 그대로를 보존하여 독자가 본문에서 판단하도록 한다. γυνή/ἀνήρ는 「여자/남자」를 기본으로 옮기되 「아내/남편」으로도 읽힐 수 있음을 각주로 표시한다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
