translation:
  language: es
  text: Yahvé Todopoderoso los anuló por mano de una mujer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de una mujer». El giro griego «por mano de» expresa agencia o instrumentalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Como título divino, κύριος se vierte naturalmente por «Señor» en español. Mantiene el valor reverencial y concuerda con el uso bíblico, sin reemplazarlo por una paráfrasis.
- source_word: Παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Soberano de todo
  lexicon: BDAG
  rationale: «Todopoderoso» transmite con claridad el título divino Παντοκράτωρ y conserva el énfasis en el poder universal de Dios sin expandir el sentido.
- source_word: ἠθέτησεν
  english_pob_choice: nullified
  chosen_spanish: anuló
  alternatives_spanish:
  - invalidó
  - dejó sin efecto
  - deshizo
  lexicon: BDAG
  rationale: El verbo ἀθετέω puede significar poner algo a un lado, invalidarlo o dejarlo sin efecto. «Anuló» comunica bien en español que Dios hizo ineficaz a sus enemigos y permanece cercano al valor del griego.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Pronombre de objeto plural directo; «los» es la forma natural en español y remite a los enemigos del contexto.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: La expresión conserva el giro idiomático semítico/griego y deja ver la agencia o instrumento sin perder claridad en español. «Por mano de» es suficientemente idiomático y refleja el matiz de acción mediada.
- source_word: θηλείας
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una fémina
  - una hembra
  lexicon: LSJ
  rationale: 'Aunque el griego se relaciona etimológicamente con «femenino», el contexto narrativo exige la referencia personal «mujer». Esto preserva el efecto sorpresivo del pasaje: Dios actuó mediante una mujer.'
theological_decisions:
- issue: Títulos divinos Κύριος Παντοκράτωρ
  english_pob_reading: The Lord Almighty
  chosen_spanish_reading: El Señor Todopoderoso
  alternative_spanish_readings:
  - El Señor Omnipotente
  - El Soberano Todopoderoso
  rationale: 'Se conservan ambos elementos del griego: κύριος como título reverencial y παντοκράτωρ como afirmación del poder universal de Dios. «Todopoderoso» es natural en español bíblico y no atenúa la fuerza teológica.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; κύριος → Señor'
- issue: Agencia en ἐν χειρὶ θηλείας
  english_pob_reading: by the hand of a woman
  chosen_spanish_reading: por mano de una mujer
  alternative_spanish_readings:
  - por medio de una mujer
  - a través de una mujer
  rationale: 'Se mantiene la imagen idiomática de la «mano» para preservar la mediación humana inesperada y la tensión teológica: Dios obra por medio de un agente no anticipado.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; equivalencia óptima'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se mantuvo el título divino doble, se tradujo ἀθετέω con un verbo fuerte pero natural en español, y se preservó el giro idiomático de agencia para no borrar la imagen retórica del texto griego.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος en línea con la norma del proyecto para títulos divinos.
  - «Todopoderoso» conserva el tono bíblico y evita un calco innecesario.
  - La nota de pie recoge la alternativa semántica principal de ἐν χειρί sin duplicar marcadores.
  - No se empleó «Mesías», «esclavo» ni otras terminologías no pertinentes a este versículo.
