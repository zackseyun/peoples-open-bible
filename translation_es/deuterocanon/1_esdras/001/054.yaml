translation:
  language: es
  text: Y fueron siervos de él y de sus hijos hasta que los persas llegaron a reinar, para cumplir la palabra de Yahvé por boca de Jeremías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παῖδες
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - sirvientes
  - esclavos
  lexicon: LSJ
  rationale: En este contexto de sujeción política bajo un rey imperial, παῖδες designa personas en servicio o dependencia, no hijos ni muchachos. «Siervos» comunica la relación de subordinación con sobriedad y sin imponer de entrada la carga social más fuerte de «esclavos», que el griego aquí no obliga a explicitar.
- source_word: μέχρι οὗ βασιλεῦσαι Πέρσας
  english_pob_choice: until the Persians came to reign
  chosen_spanish: hasta que los persas llegaron a reinar
  alternatives_spanish:
  - hasta que los persas reinaron
  - hasta el reinado de los persas
  lexicon: LSJ
  rationale: La construcción con infinitivo expresa el momento en que comienza el dominio persa. «Llegaron a reinar» conserva ese matiz de transición y resulta natural en español sin perder la idea temporal del griego.
- source_word: εἰς ἀναπλήρωσιν
  english_pob_choice: to fulfill
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para el cumplimiento de
  - a fin de cumplir
  lexicon: LSJ
  rationale: 'La frase expresa propósito o resultado: el hecho histórico sucede para que la palabra profética se realice. «Para cumplir» es breve, claro y fiel a esa función.'
- source_word: τοῦ ῥήματος τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra de Yahvé
  - el dicho del Señor
  lexicon: LSJ
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino cuando el trasfondo hebreo es directo, aquí el texto base es griego κύριος en una fórmula profética. «Señor» preserva el registro del testimonio griego y la fórmula bíblica tradicional en español, sin borrar la referencia divina.
- source_word: ἐν στόματι Ἰερεμίου
  english_pob_choice: by the mouth of Jeremiah
  chosen_spanish: por boca de Jeremías
  alternatives_spanish:
  - por la boca de Jeremías
  - mediante Jeremías
  lexicon: LSJ
  rationale: La expresión reproduce la fórmula profética de mediación verbal. «Por boca de Jeremías» mantiene el giro bíblico en español y comunica que la palabra divina fue pronunciada mediante el profeta.
theological_decisions:
- issue: κύριος en una fórmula profética del griego de 1 Esdras
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El pasaje traduce directamente el griego de 1 Esdras, donde κύριος aparece como la forma textual transmitida. Aunque el trasfondo pueda corresponder al nombre divino hebreo, la decisión de la POB inglesa fue leerlo como 'Lord'; en español, «Señor» conserva ese mismo nivel textual y evita sobreimponer una reconstrucción que el griego aquí no explicita.
  doctrine_reference: 'DOCTRINE.md: κύριος en el texto griego se vierte según el testimonio disponible; el nombre divino del trasfondo hebreo no debe reemplazar automáticamente la forma griega transmitida'
- issue: Relación entre el griego de 1 Esdras y el paralelo hebreo aproximado
  english_pob_reading: Translate the Greek verse as a fulfillment statement about servitude until Persian rule
  chosen_spanish_reading: Traducir el versículo griego como una afirmación de servidumbre hasta el dominio persa
  alternative_spanish_readings:
  - Alinear el verso con el paralelo hebreo aproximado sobre vasos del templo llevados a Babilonia
  - reformular el verso según el trasfondo del libro de Esdras
  rationale: El paralelo hebreo provisto es explícitamente aproximado y no controla el texto de 1 Esdras. Por eso la redacción española sigue el griego recibido, manteniendo la afirmación de servidumbre y su horizonte temporal hasta el dominio persa.
  doctrine_reference: 'PHILOSOPHY.md: el testimonio griego deuterocanónico es primario; los paralelos hebreos sirven como apoyo comparativo, no como corrección obligatoria'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada; esta versión conserva el sentido del borrador inglés auditado y aplica únicamente ajustes naturales de español, sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «siervos» para παῖδες, evitando «esclavos» porque el audit trail inglés no lo exigió y el contexto permite una subordinación general.
  - Se mantiene «Señor» para κύριος, ya que el texto fuente es griego y la formulación profética depende de esa transmisión textual.
  - La cláusula final conserva la estructura de propósito («para cumplir»), que refleja mejor εἰς ἀναπλήρωσιν que una paráfrasis más libre.
  - «Por boca de Jeremías» conserva la fórmula profética y resulta plenamente natural en español bíblico contemporáneo.
