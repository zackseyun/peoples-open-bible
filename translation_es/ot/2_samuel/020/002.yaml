base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/002.yaml
  text: So every man of Israel went up from following David to follow Sheba son of Bichri[a], but the men of Judah held fast to their king[b], from the Jordan to Jerusalem.
  footnotes:
  - marker: a
    text: Or 'all the men of Israel.' The Hebrew is literally 'every man of Israel,' a collective masculine expression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'went up ... after Sheba.' The wording reflects a transfer of allegiance from David to Sheba.
    reason: lexical_alternative
