  language: en
  yaml_path: translation/ot/isaiah/028/002.yaml
  text: Behold[a], the Lord has one who is mighty and strong; like a storm of hail, a destroying tempest, like a storm of mighty, overflowing waters[b], he casts it down to the earth with his hand.
  footnotes:
