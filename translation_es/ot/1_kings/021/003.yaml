revisions:
- from: 'Pero Nabot dijo a Ahab[a]: «Lejos de mí, por Yahvé, entregarte la herencia de mis padres».'
  to: 'Pero Nabot dijo a Acab[a]: «Lejos de mí, por Yahvé, darte la herencia de mis padres».'
  rationale: Se ajusta 'Ahab' a 'Acab' por uso español estándar, se reemplaza 'entregarte' por 'darte' para seguir con mayor precisión el verbo hebreo 'dar', y se corrige la nota alternativa para que sea idiomática sin añadir el matiz interpretativo de 'me libre'. No se requiere adjudicación adicional porque la corrección es pequeña y claramente sustentada por la evidencia fuente y el rastro de auditoría.
