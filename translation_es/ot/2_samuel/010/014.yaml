  language: en
  yaml_path: translation/ot/2_samuel/010/014.yaml
  text: And when the sons of Ammon saw that Aram had fled[a], they fled before Abishai and entered the city[c][b]. Then Joab returned from against the sons of Ammon and came to Jerusalem.
