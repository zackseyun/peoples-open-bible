translation:
  language: es
  text: Prepara tu corazón[a], y fortalécete; y no te alarmes en tiempo de calamidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «no te apresures en tiempo de aflicción/visita». El hebreo destaca no desanimarse ni turbаться; el griego subraya evitar la prisa o la agitación temerosa bajo la prueba.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָכֵן
  english_pob_choice: Prepare your heart
  chosen_spanish: Prepara tu corazón
  alternatives_spanish:
  - Dispón tu corazón
  - Pon en orden tu corazón
  - Endereza tu corazón
  lexicon: HALOT; paralelo griego εὐθυνον
  rationale: El hebreo pide poner el corazón en condición adecuada o dispuesto; el paralelo griego agrega la idea de enderezar/dirigir. 'Prepara' conserva la fuerza exhortativa y suena natural en español, sin perder la noción de preparar interiormente la disposición del corazón.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  - tu ser interior
  lexicon: HALOT
  rationale: '''Corazón'' preserva el idioma bíblico del hebreo לב, que incluye voluntad, pensamiento y resolución. En español es claro y amplio, y mantiene la imagen original sin reducirla a un mero órgano emocional.'
- source_word: וְהִתְחַזֵּק
  english_pob_choice: be strong
  chosen_spanish: fortalécete
  alternatives_spanish:
  - sé fuerte
  - muéstrate firme
  - ten valor
  lexicon: HALOT; apoyo griego καρτέρησον
  rationale: El verbo reflexivo hebreo tiene fuerza de autoafirmación y firmeza perseverante. 'Fortalécete' conserva esa dimensión de fortalecerse a sí mismo y encaja bien con el paralelo griego, que apunta a resistencia/constancia.
- source_word: וְאַל תִּבָּהֵל
  english_pob_choice: do not be alarmed
  chosen_spanish: no te alarmes
  alternatives_spanish:
  - no te turbes
  - no te desanimes
  - no te asustes
  lexicon: HALOT
  rationale: בהל puede expresar dismayo, turbación o sobresalto. 'No te alarmes' comunica bien la prohibición de una reacción temerosa o agitada, y sigue siendo compatible con el matiz griego de no apresurarse bajo la aflicción.
- source_word: בְּיוֹם אֵד
  english_pob_choice: in a time of calamity
  chosen_spanish: en tiempo de calamidad
  alternatives_spanish:
  - en el día de la calamidad
  - en el día del desastre
  - cuando llegue la desgracia
  lexicon: HALOT; paralelo griego ἐν καιρῷ ἐπαγωγῆς
  rationale: La expresión hebrea es literalmente 'en día de calamidad/desastre', pero en español 'en tiempo de calamidad' comunica con naturalidad una circunstancia de prueba. Mantiene el alcance general del hebreo y deja espacio al matiz griego de un tiempo de aflicción/visita.
theological_decisions:
- issue: Cómo integrar el hebreo y el griego en la cláusula final
  english_pob_reading: The Hebrew emphasizes not being dismayed; the Greek highlights avoiding rash haste under trial.
  chosen_spanish_reading: El texto principal sigue el hebreo al decir 'no te alarmes', mientras que la nota preserva el matiz griego de no precipitarse en la aflicción.
  alternative_spanish_readings:
  - no te apresures en tiempo de aflicción
  - no te apresures cuando venga la prueba
  - no te turbes en tiempo de visita/aflicción
  rationale: 'En Sirácides 2:2 los testigos no se contradicen, sino que enfocan la misma exhortación desde ángulos distintos: el hebreo advierte contra el sobresalto interior y el griego contra la prisa temerosa. La línea principal debe seguir el testimonio hebreo conservado, pero sin borrar la lectura griega, que se mantiene explícita en la nota.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como input real; preservar tensiones o matices documentados.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que prefirió 'Prepare your heart' por cercanía con הָכֵן, pero la adapta a un español más natural y bíblico con 'Prepara tu corazón'. También conserva el equilibrio auditado entre el hebreo principal y el matiz griego alternativo en la nota.
  spanish_consistency_notes:
  - Se mantuvo 'corazón' para לִבְּךָ por consistencia con el uso bíblico del POB.
  - Se evitó 'Señor' o cualquier sustituto porque aquí no aparece el Tetragrámaton ni κύριος.
  - '''Fortalécete'' conserva el sentido reflexivo de וְהִתְחַזֵּק mejor que un simple ''sé fuerte'' en este contexto.'
  - '''Calamidad'' mantiene el registro sobrio y público; ''aflicción'' queda reservado para la nota griega.'
  - La puntuación con punto y coma refleja bien el paralelismo exhortativo del verso.
