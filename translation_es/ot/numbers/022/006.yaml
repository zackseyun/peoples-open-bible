revisions:
- from: Así que ahora[a], por favor, ven y maldice este pueblo por mí, porque es demasiado poderoso para mí. Quizá pueda derrotarlo y echarlo de la tierra, pues sé que a quien tú bendigas, bendito queda, y a quien tú maldigas, maldito queda.
  to: Y ahora[a], por favor, ven y maldice este pueblo por mí, porque es demasiado poderoso para mí. Quizá pueda golpearlo[b] y echarlo de la tierra, pues sé que a quien tú bendigas, queda bendito, y a quien tú maldigas, queda maldito.
  rationale: Se ajusta el inicio a un español más natural («Y ahora»), se corrige נכה a un equivalente menos interpretativo («golpearlo»), y se reemplaza la nota estilística por notas léxicas que sí preservan la decisión documentada sobre el singular colectivo del hebreo.
