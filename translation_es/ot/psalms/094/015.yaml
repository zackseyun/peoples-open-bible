  text: כִּֽי עַד צֶ֭דֶק יָשׁ֣וּב מִשְׁפָּ֑ט וְ֝/אַחֲרָ֗י/ו כָּל יִשְׁרֵי לֵֽב־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/094/015.yaml
  text: For judgment will return to righteousness[b][a], and all the upright in heart will follow after it.
  footnotes:
  - marker: a
    text: Or 'For justice will return to righteousness.' Hebrew מִשְׁפָּט can mean 'judgment' or 'justice,' and צֶדֶק can mean 'righteousness' or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and after it all the upright of heart'; the sense is that the upright in heart will follow or align themselves with it.
    reason: lexical_alternative
