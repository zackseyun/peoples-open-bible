theological_decisions:
- issue: Divine subject left implicit in the verse
  chosen_reading: Use 'He' to continue the subject from the immediate context, referring to the LORD.
  alternative_readings:
  - Repeat 'the LORD' explicitly in English
  rationale: The Hebrew verbs are third masculine singular with the subject supplied by the surrounding context (Nah 1:2-3). English requires an explicit subject, and 'He' preserves the poetic flow without adding a repeated divine name not present in this verse.
  doctrine_reference: YHWH default rendering applies in context, but the name itself does not occur in this verse.
