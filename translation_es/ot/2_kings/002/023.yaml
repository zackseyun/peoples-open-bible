translation:
  language: es
  text: 'Entonces subió de allí a Betel[a]. Y mientras subía por el camino, unos muchachos salieron de la ciudad y se burlaron de él, y le dijeron: «¡Sube, calvo! ¡Sube[b], calvo!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchachos jóvenes» o «jóvenes»; la expresión hebrea puede referirse a varones jóvenes en general, no necesariamente a niños muy pequeños.
    reason: lexical_alternative
  - marker: b
    text: El repetido «Sube» puede ser simplemente una burla, pero también puede aludir a que Elías fue llevado arriba.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: Then he went up
  chosen_spanish: Entonces subió
  alternatives_spanish:
  - Y subió
  - Así que subió
  lexicon: HALOT
  rationale: El wayyiqtol de עלה avanza la narración; «entonces» conserva la secuencia y suena natural en español sin perder el movimiento ascendente.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  - Betel
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Betel» es una forma corriente y clara en español bíblico.
- source_word: וְהוּא עֹלֶה בַדֶּרֶךְ
  english_pob_choice: And as he was going up on the way
  chosen_spanish: Y mientras subía por el camino
  alternatives_spanish:
  - Y mientras iba subiendo por el camino
  - Y cuando subía por el camino
  lexicon: HALOT
  rationale: El participio indica acción en curso concurrente con la narración principal. «Por el camino» transmite בַּדֶּרֶךְ de forma idiomática y mantiene la repetición de עלה frente al «sube» del verso.
- source_word: נְעָרִים קְטַנִּים
  english_pob_choice: small boys
  chosen_spanish: unos muchachos pequeños
  alternatives_spanish:
  - unos jóvenes
  - unos muchachos
  - unos jóvenes muchachos
  lexicon: HALOT
  rationale: נַעֲרִים puede abarcar jóvenes varones, y קְטַנִּים añade la idea de juventud o pequeñez. «Muchachos pequeños» preserva la fuerza del adjetivo sin reducirlo necesariamente a niños muy pequeños.
- source_word: יָצְאוּ מִן הָעִיר
  english_pob_choice: came out from the city
  chosen_spanish: salieron de la ciudad
  alternatives_spanish:
  - salieron de la ciudad
  - vinieron de la ciudad
  lexicon: HALOT
  rationale: יָצְאוּ significa salir; en español, «salieron de la ciudad» es natural y exacto.
- source_word: וַיִּתְקַלְּסוּ בּוֹ
  english_pob_choice: mocked him
  chosen_spanish: se burlaron de él
  alternatives_spanish:
  - se burlaron de él
  - lo ridiculizaron
  - lo mofaron
  lexicon: HALOT
  rationale: El hitpael de קלס expresa burla o escarnio. «Se burlaron de él» es una equivalencia natural y directa en español.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Sube
  - ¡Sube!
  - Súbete
  lexicon: HALOT
  rationale: El imperativo de עלה se conserva como «sube». Mantiene la repetición verbal con el v. 23 y deja abierta la posible carga de mofa o alusión.
- source_word: קֵרֵחַ
  english_pob_choice: baldhead
  chosen_spanish: calvo
  alternatives_spanish:
  - calvo
  - pelado
  - mocoso calvo
  lexicon: HALOT
  rationale: קֵרֵחַ significa «calvo». En español, «calvo» comunica el insulto sin añadir un compuesto poco natural como «cabeza calva».
theological_decisions:
- issue: Posible alusión del repetido «Sube»
  english_pob_reading: Retain the literal 'Go up' without making the allusion explicit in the main text
  chosen_spanish_reading: Conservar «Sube» sin explicitar en el cuerpo del verso si es una alusión a Elías
  alternative_spanish_readings:
  - «Vete de aquí»
  - «Sube, como Elías»
  rationale: El hebreo dice literalmente «sube». Como la fuerza exacta del insulto es debatida, conviene conservar la forma verbal y dejar la posible alusión en nota, sin resolverla en el texto principal.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Alcance de נְעָרִים קְטַנִּים
  english_pob_reading: Translate as 'small boys' in the main text, while preserving the broader possibility 'young lads/youths' in a footnote
  chosen_spanish_reading: Traducir en el texto principal como «unos muchachos pequeños», dejando abierta la posibilidad de un grupo de jóvenes varones
  alternative_spanish_readings:
  - unos jóvenes
  - unos muchachos
  - unos jóvenes varones
  rationale: El hebreo puede referirse a jóvenes varones de manera amplia, pero el adjetivo intensifica su pequeñez o juventud. La redacción española conserva ambos aspectos sin convertirlos en infantes necesariamente.
  doctrine_reference: Translation philosophy §5, consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente y el audit trail en inglés. No se requieren revisiones respecto del último pase: se mantiene la equivalencia óptima, la repetición de «sube» y la nota sobre el alcance de נְעָרִים קְטַנִּים.'
  spanish_consistency_notes:
  - Se conserva Yahvé como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Betel» se mantiene como topónimo transliterado, consistente con el tratamiento de nombres propios.
  - «Sube» reproduce la repetición del hebreo y no se suaviza a una paráfrasis idiomática.
  - «Calvo» retiene el valor insultante de קֵרֵחַ sin añadir glosa al texto principal.
