    text: Or 'a stronghold of deliverance' or 'a fortress of saving acts'; the Hebrew uses a plural noun, literally 'salvations.'
    reason: lexical_alternative
  - marker: b
    text: '''His anointed one'' can also be rendered ''his Messiah.'' In context it likely refers first to the LORD''s anointed king, while also allowing broader messianic resonance.'
