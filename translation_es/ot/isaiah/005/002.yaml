translation:
  language: es
  text: La cavó, le quitó las piedras y la plantó con vides escogidas; edificó una torre en medio de ella, y también le labró un lagar. Luego esperaba que produjera uvas, pero produjo uvas silvestres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «uvas inútiles» o «fruto malo». El hebreo se refiere a fruto pobre, fétido o de mala calidad, no a las buenas uvas que se esperaban.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְעַזְּקֵהוּ
  english_pob_choice: dug it up
  chosen_spanish: Lo cavó
  alternatives_spanish:
  - Lo trabajó
  - Lo preparó
  - Lo escardó
  lexicon: HALOT
  rationale: El verbo describe la preparación del terreno de una viña. En español, «lo cavó» comunica de forma natural esa labor agrícola sin alargar el sintagma ni perder la imagen concreta.
- source_word: וַיְסַקְּלֵהוּ
  english_pob_choice: cleared it of stones
  chosen_spanish: le quitó las piedras
  alternatives_spanish:
  - lo despejó de piedras
  - le sacó las piedras
  lexicon: HALOT
  rationale: En contexto vitícola, el verbo se refiere a retirar piedras del terreno. «Le quitó las piedras» es claro y directo, y evita una lectura no contextual de apedrear.
- source_word: שֹׂרֵק
  english_pob_choice: choice vines
  chosen_spanish: vides escogidas
  alternatives_spanish:
  - vides selectas
  - vides de calidad
  - vides finas
  lexicon: HALOT
  rationale: El término apunta a una vid de alta calidad. «Vides escogidas» conserva la idea de selección apreciativa y suena natural en español bíblico moderno.
- source_word: מִגְדָּל
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - atalaya
  - torre de vigilancia
  lexicon: HALOT
  rationale: La base semántica es simplemente «torre». Aunque en una viña pudiera funcionar como atalaya, el texto hebreo no lo especifica, así que se mantiene el término directo.
- source_word: בְּתוֹכוֹ
  english_pob_choice: in its midst
  chosen_spanish: en medio de él
  alternatives_spanish:
  - dentro de él
  - en su centro
  lexicon: HALOT
  rationale: La frase conserva la ubicación espacial con tono poético, y «en medio de él» reproduce bien el matiz del original sin forzar una glosa explicativa.
- source_word: יֶקֶב
  english_pob_choice: winepress
  chosen_spanish: lagar
  alternatives_spanish:
  - prensa de vino
  - lagar de vino
  lexicon: HALOT
  rationale: «Lagar» es el equivalente tradicional y comprensible en español para la instalación de prensado del vino; mantiene el color bíblico sin volverse arcaizante en exceso.
- source_word: חָצֵב
  english_pob_choice: hewed out
  chosen_spanish: cavó
  alternatives_spanish:
  - talló
  - escavó
  - labró
  lexicon: HALOT
  rationale: El verbo puede expresar hechar/extraer de roca. En español, «cavó» comunica la acción de abrir o excavar el lagar con naturalidad, aunque «talló» sería una alternativa más literal si se quisiera subrayar la idea de labrado en piedra.
- source_word: וַיְקַו
  english_pob_choice: he expected
  chosen_spanish: esperaba
  alternatives_spanish:
  - confiaba
  - aguardaba
  lexicon: HALOT
  rationale: El verbo expresa expectativa fundada. «Esperaba» conserva esa anticipación sin añadir más interpretación emocional de la que el texto exige.
- source_word: לַעֲשׂוֹת עֲנָבִים
  english_pob_choice: to produce grapes
  chosen_spanish: que produjera uvas
  alternatives_spanish:
  - que diera uvas
  - que rindiera uvas
  lexicon: HALOT
  rationale: En español, las plantas «producen» o «dan» fruto. «Que produjera uvas» mantiene el giro de expectativa del verso y respeta la metáfora agrícola.
- source_word: וַיַּעַשׂ בְּאֻשִׁים
  english_pob_choice: it produced wild grapes
  chosen_spanish: produjo uvas silvestres
  alternatives_spanish:
  - produjo uvas inútiles
  - produjo fruto malo
  - produjo uvas hediondas
  lexicon: HALOT
  rationale: El término hebreo designa fruto pobre, malo o fétido, en contraste con las uvas esperadas. «Uvas silvestres» preserva bien la oposición con las uvas cultivadas y evita precisar más de lo que el término garantiza.
theological_decisions:
- issue: Mantener la metáfora de la viña sin anticipar la identificación alegórica
  english_pob_reading: Retain the agricultural imagery without importing the interpretation into the verse itself.
  chosen_spanish_reading: Conservar la imagen agrícola sin introducir en el versículo la identificación posterior del viñedo.
  alternative_spanish_readings:
  - Traducir insinuando de antemano que la viña representa a Israel
  - explicitar el referente alegórico en el texto
  rationale: El verso presenta la escena concreta de una viña cuidadosamente preparada. La traducción debe dejar intacta esa tensión metafórica para que el desarrollo posterior del pasaje haga la identificación, no el traductor.
  doctrine_reference: Preservar la tensión teológica del texto; Isaías 5:7 interpreta el símbolo en su contexto inmediato.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés; no se introdujeron revisiones posteriores, y la versión más reciente del POB inglés quedó sin cambios. Se mantuvo la imaginería agrícola y la opción por un equivalente español natural para cada verbo clave.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma reservada para el Tetragrámaton cuando aparezca en el contexto inmediato; aquí no hay ocurrencia.
  - Se usa «uvas silvestres» como equivalente de בְּאֻשִׁים, con nota para alternativas semánticas.
  - «Lagar» se conserva por su valor bíblico y claridad en español.
  - El registro es sobrio y publicable, sin giro devocional añadido ni explicitación alegórica fuera del versículo.
