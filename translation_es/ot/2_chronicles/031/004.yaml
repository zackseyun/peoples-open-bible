revisions:
- from: También mandó al pueblo, a los habitantes de Jerusalén, que dieran la porción debida a los sacerdotes y a los levitas, para que se fortalecieran en la ley de Yahvé[a].
  to: También mandó al pueblo, a los habitantes de Jerusalén, que dieran la porción debida a los sacerdotes y a los levitas, para que se dedicaran[a] a la ley de Yahvé.
  rationale: 'Se cambia la lectura principal de יֶחֶזְקוּ a ''se dedicaran'' para seguir la decisión contextual documentada del POB: el sostenimiento material de sacerdotes y levitas tiene como fin capacitarlos para atender de lleno la ley de Yahvé. Se conservan en nota las alternativas léxicas de firmeza/fortaleza presentes en el rastro auditado.'
  reviewer_model: gpt-5.4
