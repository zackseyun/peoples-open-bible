translation:
  language: es
  text: Vuélvanse hacia mí[a], ustedes los simples, y alójense en la casa de mi instrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acérquense a mí»; el hebreo dice «Vuélvanse hacia mí», mientras que el griego paralelo lee «Acérquense a mí, los no instruidos, y alójense en la casa de instrucción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγγίσατε πρὸς μέ / פְּנוּ אֵלַי
  english_pob_choice: Turn to me
  chosen_spanish: Acérquense a mí
  alternatives_spanish:
  - Vuélvanse hacia mí
  - Arrímense a mí
  - Vengan a mí
  lexicon: BDAG; HALOT
  rationale: El hebreo pide una acción direccional de volverse hacia alguien, mientras que el griego paralelo expresa acercamiento. «Acérquense a mí» integra ambos matices en español natural y mantiene el tono de invitación sapiencial sin perder el movimiento hacia el hablante.
- source_word: ἀπαίδευτοι / סְכָלִים
  english_pob_choice: you who are simple
  chosen_spanish: simples
  alternatives_spanish:
  - sin instrucción
  - incultos
  - necios
  - inexpertos
  lexicon: BDAG; HALOT
  rationale: La combinación de hebreo y griego favorece aquí una falta de formación o madurez sapiencial, no solo un insulto moral. «Simples» en español conserva la idea de personas no formadas y permite el matiz sapiencial del pasaje, aunque sigue dejando oír la tensión entre ingenuidad y necedad.
- source_word: וְלִינוּ / αὐλίσθητε
  english_pob_choice: and lodge
  chosen_spanish: y alójense
  alternatives_spanish:
  - y hospédense
  - y pasen la noche
  - y quédense
  lexicon: HALOT; LSJ
  rationale: «Alójense» reproduce el sentido de alojarse o pasar la noche y conserva la imagen de entrar en un lugar para permanecer allí. Es más preciso que «quédense» y más idiomático que «dormir en».
- source_word: בְּבֵית מִדְרָשִׁי / οἴκῳ παιδείας
  english_pob_choice: in the house of my instruction
  chosen_spanish: en la casa de mi instrucción
  alternatives_spanish:
  - en la casa de mi enseñanza
  - en la casa del aprendizaje
  - en mi casa de estudio
  lexicon: HALOT; LSJ
  rationale: «Instrucción» refleja bien παιδεία como formación, disciplina y enseñanza, y también permite el eco del hebreo בית מדרש como lugar de aprendizaje. «Mi instrucción» mantiene el posesivo del hebreo y del inglés POB, sin convertir el verso en una referencia técnica posterior a una «casa de estudio».
theological_decisions:
- issue: Si סְכָלִים debe sonar como reprensión moral («necios») o como invitación a quienes carecen de formación sapiencial
  english_pob_reading: you who are simple
  chosen_spanish_reading: simples
  alternative_spanish_readings:
  - necios
  - sin instrucción
  - ingenuos
  rationale: El contexto es una invitación pedagógica a entrar en el ámbito de la sabiduría. La lectura española «simples» conserva la ambivalencia del hebreo y no endurece el verso más allá de lo que el paralelo griego y la función exhortativa exigen.
  doctrine_reference: 'Sabiduría / formación: mantener la tensión léxica sin forzar una condena moral.'
translation_notes:
  revision_awareness: El borrador sigue el último estado auditado del inglés POB, pero reequilibra el adjetivo final desde «unlearned» de una revisión intermedia hacia el consenso previo y el testimonio combinado hebreo-griego. También evita una traducción demasiado técnica de «house of instruction» y conserva la invitación sapiencial en un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton en la superficie del verso.
  - Se mantiene «instrucción» como término de alcance amplio para παιδεία y בית מדרש, sin fijarlo a una institución posterior específica.
  - «Simples» se eligió para preservar la tensión sapiencial entre ingenuidad, falta de formación y necedad, sin cerrarla demasiado.
  - La nota textual queda anclada en el verbo de apertura para documentar la divergencia hebreo/griego sobre el modo de la invitación.
