translation:
  language: es
  text: 'Entonces, habiendo mandado llamar a Hermón con una amenaza, dijo: «¿Cuántas veces tengo que mandarte acerca de estas mismas cosas, [a] tú, el más miserable?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «tú» se mantiene en el discurso directo para reflejar el vocativo insultante del griego; en español puede sonar redundante junto con «el más miserable», pero ayuda a conservar la aspereza de la reprensión.
    reason: spanish_style_note
lexical_decisions:
- source_word: τὸν δὲ Ἕρμωνα
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Herman
  lexicon: LSJ
  rationale: El nombre propio se translitera en español siguiendo la convención del proyecto; el acento gráfico ayuda a la lectura natural en español.
- source_word: προσκαλεσάμενος
  english_pob_choice: summoning
  chosen_spanish: habiendo mandado llamar
  alternatives_spanish:
  - llamando
  - habiendo convocado
  lexicon: LSJ
  rationale: El participio aoristo medio expresa una acción previa al dicho; «habiendo mandado llamar» conserva esa anterioridad y suena natural en español bíblico contemporáneo.
- source_word: μετὰ ἀπειλῆς
  english_pob_choice: with a threat
  chosen_spanish: con una amenaza
  alternatives_spanish:
  - amenazándolo
  - de manera amenazante
  lexicon: LSJ
  rationale: La construcción concreta «con una amenaza» reproduce el sustantivo griego sin convertirlo en adverbio, preservando el tono hostil del contexto.
- source_word: Ποσάκις
  english_pob_choice: How many times
  chosen_spanish: ¿Cuántas veces
  alternatives_spanish:
  - ¿Con qué frecuencia?
  - ¿Cuántas ocasiones?
  lexicon: LSJ
  rationale: «Cuántas veces» comunica la pregunta de frecuencia de modo idiomático y mantiene el reproche directo del original.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: tengo que
  alternatives_spanish:
  - debo
  - es necesario que yo
  lexicon: LSJ
  rationale: Aunque δεῖ expresa necesidad, en primera persona de discurso directo español «tengo que» transmite bien la fuerza obligatoria y la queja retórica sin sonar rígido.
- source_word: σοι ... προστάττειν
  english_pob_choice: I command you
  chosen_spanish: mandarte
  alternatives_spanish:
  - ordenarte
  - darte órdenes
  lexicon: LSJ
  rationale: προστάττειν significa ordenar/mandar; aquí «mandarte» conserva la relación directa con el objeto indirecto σοι y evita sobreexplicar la sintaxis.
- source_word: περὶ τούτων αὐτῶν
  english_pob_choice: about these very matters
  chosen_spanish: acerca de estas mismas cosas
  alternatives_spanish:
  - sobre estas mismas cosas
  - acerca de estos mismos asuntos
  lexicon: LSJ
  rationale: «Estas mismas cosas» refleja la intensificación de αὐτῶν con τούτων. «Acerca de» reproduce bien περὶ en español formal y natural.
- source_word: ἀθλιώτατε
  english_pob_choice: you most wretched man
  chosen_spanish: tú, el más miserable
  alternatives_spanish:
  - tú, el más desdichado
  - tú, el más wretched
  lexicon: LSJ
  rationale: El vocativo superlativo es insultante; «el más miserable» conserva la fuerza de ἀθλιώτατε sin recurrir a un giro demasiado coloquial. Se explicita el vocativo con coma en español.
translation_notes:
  revision_awareness: El testimonio griego coincide sustancialmente con el contexto auditado en inglés; la única adaptación importante es la sintaxis española para el participio inicial y la reexpresión idiomática de δεῖ + infinitivo en primera persona. Se preservó la intensidad de la recriminación y el matiz de reiteración en περὶ τούτων αὐτῶν.
  spanish_consistency_notes:
  - Se usa «Hermón» como transliteración consistente del nombre propio.
  - Se conserva un registro bíblico moderno y digno, sin caer en calcos demasiado literales.
  - No hay términos teológicos específicos en este versículo; la principal tensión es retórica y de tono insultante, mantenida en español.
