translation:
  language: es
  text: Espera en Yahvé[a] y guarda su camino, y él te exaltará para heredar la tierra[b]; cuando los malvados sean cortados[c], lo verás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Espera a Yahvé» o «Ten esperanza en Yahvé». El hebreo expresa una espera paciente y confiada.
    reason: lexical_alternative
  - marker: b
    text: O «la tierra». El hebreo אָרֶץ puede significar «tierra» o «tierra/país»; aquí se conserva «tierra» por el lenguaje repetido de herencia en el salmo y su matiz pactal. Compárese Mateo 5:5, donde se hace eco de esta promesa.
    reason: alternative_reading
  - marker: c
    text: Lit. «sean cortados». El hebreo usa un modismo de juicio con la imagen de ser «cortados», que aquí se conserva.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֵּה
  english_pob_choice: Wait for
  chosen_spanish: Espera en
  alternatives_spanish:
  - Espera por
  - Ten esperanza en
  lexicon: HALOT
  rationale: El imperativo de קוה expresa espera paciente y confiada. En español, «espera en» conserva la dirección de la confianza hacia Yahvé y suena natural sin perder el matiz de paciencia expectante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en su forma española establecida en este proyecto, en lugar de sustituirlo por un título. «Yahvé» mantiene la identificación directa del Tetragrámaton.
- source_word: שְׁמֹר דַּרְכּוֹ
  english_pob_choice: keep his way
  chosen_spanish: guarda su camino
  alternatives_spanish:
  - guarda su senda
  - observa su camino
  lexicon: HALOT
  rationale: שׁמר aquí pide fidelidad activa; «guardar» reproduce bien el valor de mantener y obedecer. «Camino» conserva la metáfora ética de conducta y vida.
- source_word: וִירוֹמִמְךָ
  english_pob_choice: he will exalt you
  chosen_spanish: él te exaltará
  alternatives_spanish:
  - él te elevará
  - él te levantará
  lexicon: HALOT
  rationale: El hifil de רום denota elevar/exaltar. «Exaltará» preserva el registro poético y la idea de vindicación y honra conferida por Dios.
- source_word: לָרֶשֶׁת אָרֶץ
  english_pob_choice: to inherit the land
  chosen_spanish: para heredar la tierra
  alternatives_spanish:
  - para poseer la tierra
  - para heredar el país
  lexicon: HALOT
  rationale: ירשׁ se traduce naturalmente por «heredar», manteniendo el matiz de promesa y herencia. Para אָרֶץ, «tierra» preserva la tensión semántica que el inglés POB dejó abierta entre «land» y «earth», sin resolverla de antemano.
- source_word: בְּהִכָּרֵת רְשָׁעִים
  english_pob_choice: when the wicked are cut off
  chosen_spanish: cuando los malvados sean exterminados
  alternatives_spanish:
  - cuando los malvados sean cortados de raíz
  - cuando los malvados sean eliminados
  lexicon: HALOT
  rationale: La construcción indica un momento circunstancial y la expresión idiomática de כרת. «Exterminados» comunica con fuerza la eliminación judicial total, aunque la metáfora literal de «cortados» queda atenuada; se preserva el sentido de juicio definitivo.
- source_word: תִּרְאֶה
  english_pob_choice: you will see it
  chosen_spanish: tú lo verás
  alternatives_spanish:
  - lo verás
  - verás esto
  lexicon: HALOT
  rationale: El verbo significa simplemente «ver»; el pronombre «lo» hace explícito en español el evento observado, siguiendo la claridad de la versión inglesa sin introducir contenido nuevo.
theological_decisions:
- issue: Áרֶץ como 'tierra' frente a 'mundo' o 'tierra/país'
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - mundo
  rationale: El inglés POB dejó abierta la tensión entre «land» y «earth», pero prefirió «land» por el marco pactal del salmo. En español, «tierra» conserva esa amplitud y permite tanto la lectura de herencia concreta como la resonancia canónica más amplia, sin imponer «mundo», que sería más interpretativo.
  doctrine_reference: 'Translation philosophy: preserve source ambiguity where the Hebrew allows it'
- issue: Verbo pasivo para los malvados en el juicio
  english_pob_reading: when the wicked are cut off
  chosen_spanish_reading: cuando los malvados sean exterminados
  alternative_spanish_readings:
  - cuando los malvados sean cortados
  - cuando los malvados sean destruidos
  rationale: El hebreo usa una forma pasiva/estativa asociada con כרת. «Sean exterminados» transmite el resultado judicial con claridad en español, pero la nota lexical preserva que el hebreo habla literalmente de ser «cortados»; no se quiere borrar esa tensión idiomática.
  doctrine_reference: 'Translation philosophy: preserve lexical force and judicial imagery'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa sin cambios sustanciales; se conserva su filosofía de equivalencia óptima y su decisión de mantener abierta la tensión de אָרֶץ. No se aplicaron revisiones textuales adicionales al versículo fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme a la terminología del proyecto.
  - «Tierra» se mantiene para אָרֶץ en un contexto de herencia, alineado con la lectura pactal del salmo.
  - «Malvados» traduce רְשָׁעִים con un sustantivo adjetival natural en español, sin suavizar el juicio moral implícito.
  - Los marcadores de nota aparecen solo donde hay una alternativa real o una tensión semántica que conviene preservar.
