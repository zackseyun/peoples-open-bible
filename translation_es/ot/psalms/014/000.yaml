source:
  edition: WLC
  text: לַ/מְנַצֵּ֗חַ לְ/דָ֫וִ֥ד אָ֘מַ֤ר נָבָ֣ל בְּ֭/לִבּ/וֹ אֵ֣ין אֱלֹהִ֑ים הִֽשְׁחִ֗יתוּ הִֽתְעִ֥יבוּ עֲלִילָ֗ה אֵ֣ין עֹֽשֵׂה טֽוֹב־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/014/000.yaml
  text: 'For the choir director[a]. Of David.


    The fool says in his heart, “There is no God.”

    They are corrupt; they do abominable deeds[c][b].

    There is none who does good.'
  footnotes:
  - marker: a
    text: Or, 'For the music director' or 'For the choirmaster.'
    reason: lexical_alternative
  - marker: b
    text: '''Of David'' may also mean ''by David'' or ''for David'' in the psalm heading.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from singular ('the fool') to plural ('they are corrupt'), moving from a representative individual to the class he represents.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:13Z'
    unchanged: false
    changes_summary: Completed the verse by adding the main psalm text omitted from the draft; rendered the Hebrew naturally and formally as 'The fool says in his heart, “There is no God.” They are corrupt; they do abominable deeds. There is none who does good.'
translation:
  language: es
  text: 'Para el director del coro[a]. De David[b].


    El necio dice en su corazón: «No hay Dios».


    Se han corrompido; hacen obras abominables[c].


    No hay quien haga el bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para el maestro de coro» o «Para el director musical».'
    reason: lexical_alternative
  - marker: b
    text: «De David» también puede significar «por David» o «para David» en el encabezado del salmo.
    reason: lexical_alternative
  - marker: c
    text: El hebreo pasa del singular («el necio») al plural («se han corrompido»), moviéndose de un individuo representativo a la clase que representa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director de la música
  - Para el choirmaster
  lexicon: לַמְנַצֵּחַ
  rationale: El hebreo designa al encargado musical de la ejecución del salmo. 'Director del coro' comunica bien la función en español neutro y evita un anglicismo; se conserva la posibilidad técnica indicada por la nota inglesa.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: לְדָוִד
  rationale: La preposición admite relación de autoría, dedicación o pertenencia del salmo. 'De David' es la forma más natural en español y deja abierta la misma tensión interpretativa que la nota inglesa.
- source_word: נָבָל
  english_pob_choice: The fool
  chosen_spanish: El necio
  alternatives_spanish:
  - El insensato
  - El necio moral
  - El vil
  lexicon: נָבָל
  rationale: '''Necio'' reproduce el valor sapiencial y moral del término mejor que un simple insulto. En este contexto no solo describe falta de inteligencia, sino una necedad que se expresa en negación de Dios.'
- source_word: אֵין אֱלֹהִים
  english_pob_choice: There is no God
  chosen_spanish: No hay Dios
  alternatives_spanish:
  - No existe Dios
  - No hay un Dios
  lexicon: אֵין אֱלֹהִים
  rationale: La negación hebrea se vierte de manera directa y sobria. 'No hay Dios' conserva la fuerza absoluta del enunciado y su tono de declaración interior.
- source_word: הִשְׁחִיתוּ
  english_pob_choice: They are corrupt
  chosen_spanish: Ellos se corrompen
  alternatives_spanish:
  - Se han corrompido
  - Están corrompidos
  - Se pervierten
  lexicon: שׁחת
  rationale: El verbo hebreo expresa deterioro moral y ruina. 'Se corrompen' mantiene la idea de corrupción activa y encaja con el cambio del singular representativo al plural colectivo señalado en la auditoría inglesa.
- source_word: הִתְעִיבוּ עֲלִילָה
  english_pob_choice: they do abominable deeds
  chosen_spanish: hacen obras abominables
  alternatives_spanish:
  - cometen obras abominables
  - realizan acciones abominables
  - hacen actos detestables
  lexicon: תעב / עֲלִילָה
  rationale: La frase combina abominación moral con conducta concreta. 'Obras abominables' conserva el paralelismo y la gravedad del hebreo sin volverlo excesivamente explicativo.
- source_word: אֵין עֹשֵׂה טוֹב
  english_pob_choice: There is none who does good
  chosen_spanish: No hay quien haga el bien
  alternatives_spanish:
  - No hay quien haga lo bueno
  - No hay nadie que haga el bien
  - No existe quien haga el bien
  lexicon: טוב
  rationale: '''El bien'' es la forma más natural en español para el sustantivo abstracto aquí. Mantiene el sentido moral general del hebreo y la clausura absoluta del verso.'
theological_decisions:
- issue: El sujeto plural tras el singular representativo del necio
  english_pob_reading: The Hebrew shifts from singular ('the fool') to plural ('they are corrupt'), moving from a representative individual to the class he represents.
  chosen_spanish_reading: El hebreo pasa del singular ('el necio') al plural ('ellos se corrompen'), moviendo de un individuo representativo a la clase que representa.
  alternative_spanish_readings:
  - El hebreo pasa del singular al plural sin cambio de referente
  - El necio representa a los impíos en general
  rationale: 'Se conserva explícitamente la tensión observada por el auditor inglés: el necio funciona como representante de un grupo mayor. No se armoniza artificialmente el número gramatical, porque el contraste forma parte del efecto del texto.'
  doctrine_reference: Salmo 14:1; observación literaria sobre plural representativo
- issue: Negación de Dios en el dicho interior del necio
  english_pob_reading: The fool says in his heart, “There is no God.”
  chosen_spanish_reading: 'El necio dice en su corazón: “No hay Dios”.'
  alternative_spanish_readings:
  - 'El necio se dice en su corazón: ''No hay Dios'''
  - 'El necio afirma en su corazón: ''No hay Dios'''
  rationale: Se preserva el habla interior como localización del pensamiento y la postura moral. No se suaviza la afirmación ni se la convierte en simple duda, porque el hebreo presenta una negación tajante.
  doctrine_reference: Salmo 14:1; antropología moral bíblica
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para completar el texto principal del salmo después de una omisión inicial del encabezado. La presente redacción sigue el estado revisado aprobado, manteniendo la estructura de encabezado más el contenido poético completo y reflejando la nota sobre el cambio de singular a plural en el segundo y tercer hemistiquio.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים conforme al estándar del proyecto.
  - Se usa 'necio' para נָבָל por su valor sapiencial y moral, no meramente insultante.
  - Se conserva la diferencia entre encabezado y cuerpo poético con salto de párrafo.
  - No se introduce 'Yahvé' porque el texto fuente no contiene el nombre divino; aparece אֱלֹהִים.
  - Se evita 'Cristo' o terminología mesiánica, ya que no corresponde al pasaje.
