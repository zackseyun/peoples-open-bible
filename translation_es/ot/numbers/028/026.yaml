    text: O «una asamblea santa». La expresión hebrea es un término técnico para una reunión sagrada convocada para el culto.
    reason: lexical_alternative
  - marker: b
    text: O «ningún trabajo laborioso» o «ningún trabajo ocupacional». La expresión se refiere al trabajo ordinario asociado con la labor diaria.
    reason: lexical_alternative
  revision_rationale: Se corrige «en sus semanas» a «en su Fiesta de las Semanas» para reflejar el sentido festivo contextual de בְּשָׁבֻעֹתֵיכֶם; se explicita «ofrenda nueva de grano» para preservar el valor cultual de מִנְחָה; se mejora la fluidez con «tendrán»; y se reubican las notas al pie para que coincidan con las alternativas documentadas en el rastro POB.
