translation:
  language: es
  text: 'Ellos le dijeron: «Dinos[e] quién eres, para que creamos[c] en ti». Él les dijo: «Ustedes ponen a prueba el rostro[a] del cielo y de la tierra, y a quien está delante de ustedes[d] no lo reconocen; y este kairos[b] no saben cómo ponerlo a prueba».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rostro» puede corresponder aquí a «apariencia»; el copto dice literalmente «el rostro del cielo y de la tierra».
    reason: cultural_note
  - marker: b
    text: Kairos es un préstamo griego que puede significar un tiempo señalado, crítico u oportuno; se deja sin traducir para conservar su matiz.
    reason: cultural_note
  - marker: c
    text: El verbo para «creer» es un préstamo griego (de pisteuein) y también puede implicar «confiar».
    reason: lexical_alternative
  - marker: d
    text: 'La cláusula también puede leerse «lo que está delante de ustedes», pero el pronombre siguiente favorece una referencia personal: «a quien está delante de ustedes».'
    reason: textual_variant
  - marker: e
    text: El texto impreso tiene ϫⲟⲟⲥ ⲉⲣⲟⲛ y la normalización lee ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ. Ambas expresiones significan «dinos».
    reason: textual_variant
lexical_decisions:
- source_word: ϫⲟⲟⲥ / ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ (printed/normalized)
  english_pob_choice: say/tell (to us)
  chosen_spanish: Dinos
  alternatives_spanish:
  - Háblanos
  - Decláranos
  lexicon: Crum, s.v. ϫⲟⲟⲥ; Layton (Grammar) on object complements
  rationale: La petición es una fórmula directa en la escena; «dinos» conserva la brevedad imperativa y el valor de «tell us / say to us» sin endurecerlo innecesariamente. «Háblanos» desplaza el foco de la declaración a la conversación; «decláranos» suena más enfático de lo que exige el copto.
- source_word: ⲛⲧⲕ ⲛⲓⲙ
  english_pob_choice: who are you
  chosen_spanish: quién eres
  alternatives_spanish:
  - qué eres
  lexicon: Layton (Grammar) § on interrogatives; Crum, s.v. ⲛⲓⲙ
  rationale: La pregunta busca identidad personal, no clasificación. En español, «quién eres» reproduce mejor el valor idiomático de la expresión copta.
- source_word: ⲣⲡⲓⲥⲧⲉⲩⲉ
  english_pob_choice: believe
  chosen_spanish: creamos
  alternatives_spanish:
  - confiemos
  lexicon: Lambdin (Grammar) on Greek loan-verbs; Crum, s.v. πιστεύω (loan)
  rationale: El préstamo griego expresa aquí la acción de creer en alguien. «Creamos» mantiene el paralelismo natural con el subjuntivo final de propósito. «Confiemos» es posible, pero en español puede sonar más interpretativo para este contexto.
- source_word: ⲣⲡⲓⲣⲁⲍⲉ
  english_pob_choice: test
  chosen_spanish: poner a prueba
  alternatives_spanish:
  - examinar
  - probar
  lexicon: Crum, s.v. πειράζω (loan); Lambdin on Greek infinitives
  rationale: «Poner a prueba» comunica con precisión la fuerza de πειράζειν como prueba o escrutinio, sin perder la repetición retórica del dicho. «Examinar» es más débil; «probar» puede sonar demasiado general en español.
- source_word: ⲡϩⲟ
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - apariencia
  lexicon: Crum, s.v. ϩⲟ
  rationale: Se conserva la imagen literal, pero «rostro» suena más natural y digno en español bíblico que «cara». «Apariencia» sería un sentido posible, pero borra la imaginería concreta que el audit trail de POB quiso retener.
- source_word: ⲡⲡⲉ (ⲧⲡⲉ)
  english_pob_choice: sky
  chosen_spanish: cielo
  alternatives_spanish:
  - firmamento
  - cielo visible
  lexicon: Crum, s.v. ⲡⲉ/ⲧⲡⲉ
  rationale: Aunque el inglés POB prefirió «sky» para evitar connotaciones teológicas, en español «cielo» es la opción más idiomática para el par «cielo y tierra». Aquí no implica necesariamente «heaven» en sentido doctrinal, y mantiene la expresión estable de la observación del mundo visible.
- source_word: ⲡⲕⲁϩ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - mundo
  lexicon: Crum, s.v. ⲕⲁϩ
  rationale: «Tierra» conserva el paralelismo con «cielo» y el alcance cósmico/visible del contraste. «Suelo» sería demasiado restringido; «mundo» altera la imagen.
- source_word: ⲡⲉⲧⲛⲙⲧⲟ ⲉⲃⲟⲗ
  english_pob_choice: the one who is before you
  chosen_spanish: a quien está delante de ustedes
  alternatives_spanish:
  - el que está ante ustedes
  - quien está en su presencia
  - lo que está delante de ustedes
  lexicon: Crum, s.v. ⲙⲧⲟ; Layton (Grammar) on relative ⲡⲉⲧ-
  rationale: La construcción relativa apunta probablemente a una referencia personal, confirmada por el objeto pronominal siguiente. «A quien está delante de ustedes» mantiene esa referencia personal en español y conserva la fuerza de inmediatez; «lo que está delante de ustedes» sería posible gramaticalmente, pero pierde el apoyo contextual al referente personal.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know/recognize
  chosen_spanish: reconocen
  alternatives_spanish:
  - saben
  - conocen
  lexicon: Crum, s.v. ⲥⲟⲟⲩⲛ
  rationale: Aquí el sentido relacional es el de no reconocer al que está presente. «Reconocen» explicita esa fuerza mejor que el más amplio «saben» o el más estático «conocen».
- source_word: ⲕⲁⲓⲣⲟⲥ
  english_pob_choice: kairos
  chosen_spanish: kairos
  alternatives_spanish:
  - tiempo
  - momento oportuno
  - tiempo señalado
  lexicon: Lambdin on Greek loans; Crum, s.v. καιρός
  rationale: Se conserva el préstamo griego para no perder la densidad semántica de la palabra en Thomas. En español puede entenderse como «tiempo señalado» o «momento oportuno», pero el término mismo queda auditado y visible en el texto.
- source_word: ⲥⲟⲟⲩⲛ ⲛⲧⲉ ⲣⲡⲓⲣⲁⲍⲉ
  english_pob_choice: know how to test
  chosen_spanish: saben cómo ponerlo a prueba
  alternatives_spanish:
  - saben probarlo
  - saben examinarlo
  lexicon: Layton (Grammar) on ⲥⲟⲟⲩⲛ ⲛⲧⲉ + infinitive
  rationale: La construcción expresa capacidad o pericia, no mera posesión de información. «Saben cómo ponerlo a prueba» conserva esa idea y enlaza con el verbo anterior, manteniendo el ritmo retórico del dicho.
theological_decisions:
- issue: Referente de «before you / delante de ustedes»
  english_pob_reading: 'The clause can also be read “what is before you,” but the following pronoun (“him”) favors a personal reference: “the one who is before you.”'
  chosen_spanish_reading: «a quien está delante de ustedes»
  alternative_spanish_readings:
  - «lo que está delante de ustedes»
  - «el que está delante de ustedes»
  rationale: 'Se preserva la tensión documentada por el audit trail: gramaticalmente podría ser neutro, pero el contexto siguiente favorece una referencia personal. El español mantiene esa preferencia sin eliminar la posibilidad analítica de una lectura menos personal.'
  doctrine_reference: Source-critical / discourse reference, not a doctrinal claim
- issue: Kairos como término cargado
  english_pob_reading: Kairos is a Greek loan meaning an appointed/critical time or season; left untranslated to retain its nuance.
  chosen_spanish_reading: «kairos»
  alternative_spanish_readings:
  - «tiempo señalado»
  - «momento oportuno»
  - «estación»
  rationale: No se traduce en el cuerpo principal para respetar la carga conceptual del término y la decisión POB de mantenerlo visible. En español, dejarlo como préstamo evita reducirlo a una sola equivalencia.
  doctrine_reference: Lexical / semantic nuance in Thomasine usage
translation_notes:
  revision_awareness: El español sigue el sentido del texto copto normado y el audit trail inglés, atendiendo la variante de la pregunta inicial («dinos» / «dinos quién eres») y la ambigüedad de la cláusula relativa. No se incorporaron revisiones posteriores al último pase; el texto se mantiene en acuerdo moderado alto con la evaluación previa.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «creer» y «confiar» solo como alternativa anotada, sin forzarla en el texto principal.
  - Se preservó la imagen concreta de «rostro» y el término técnico «kairos» por fidelidad al registro del dicho.
  - Se eligió un español neutral y reverente, evitando calcos rígidos excepto donde la imagen del original lo requiere.
