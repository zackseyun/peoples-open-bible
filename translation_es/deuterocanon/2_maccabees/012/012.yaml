translation:
  language: es
  text: Pero Judas, al reconocer que en muchos aspectos les eran verdaderamente útiles, consintió en mantener la paz con ellos; y, tras intercambiar las manos derechas[a], se retiraron a sus tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tras dar las manos derechas»; era un gesto convencional de pacto o acuerdo.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπολαβών
  english_pob_choice: recognizing
  chosen_spanish: al reconocer
  alternatives_spanish:
  - al considerar
  - al entender
  - al tomar en cuenta
  lexicon: LSJ
  rationale: El participio introduce la valoración de Judas sobre la situación; «al reconocer» conserva el matiz de juicio consciente sin volverlo una simple suposición.
- source_word: ὡς ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de veras
  - ciertamente
  lexicon: LSJ
  rationale: La expresión intensifica la certeza de la evaluación; «verdaderamente» mantiene el énfasis adverbial en un español natural y sobrio.
- source_word: ἐν πολλοῖς
  english_pob_choice: in many ways
  chosen_spanish: en muchos aspectos
  alternatives_spanish:
  - en muchas cosas
  - en muchos sentidos
  - para muchas cosas
  lexicon: LSJ
  rationale: La frase es amplia e idiomática; «en muchos aspectos» reproduce esa amplitud sin restringir indebidamente el alcance de la utilidad.
- source_word: χρησίμους
  english_pob_choice: useful
  chosen_spanish: útiles
  alternatives_spanish:
  - provechosos
  - provechosos para ellos
  - de utilidad
  lexicon: LSJ
  rationale: El adjetivo expresa beneficio práctico. «Útiles» es directo y no añade un matiz moral o afectivo que el griego no exige.
- source_word: ὑπεχώρησεν εἰρήνην ἄξειν πρὸς αὐτούς
  english_pob_choice: agreed to keep peace with them
  chosen_spanish: consintió en mantener la paz con ellos
  alternatives_spanish:
  - accedió a vivir en paz con ellos
  - aceptó guardar la paz con ellos
  - cedió para hacer la paz con ellos
  lexicon: LSJ
  rationale: ὑπεχώρησεν aquí comunica una concesión o aceptación; εἰρήνην ἄξειν expresa conducirse pacíficamente. «Consintió en mantener la paz» preserva ambos elementos con registro formal.
- source_word: λαβόντες δεξιάς
  english_pob_choice: after exchanging right hands
  chosen_spanish: tras darse las manos derechas
  alternatives_spanish:
  - después de darse la mano derecha
  - tras intercambiar las manos derechas
  - después de estrecharse la mano derecha
  lexicon: LSJ
  rationale: Se conserva la imagen concreta de la derecha como gesto de pacto. «Darse las manos derechas» es fiel al giro literal y legible en español, sin convertirlo en una paráfrasis más interpretativa.
- source_word: εἰς τὰς σκηνὰς ἐχωρίσθησαν
  english_pob_choice: they departed to their tents
  chosen_spanish: se retiraron a sus tiendas
  alternatives_spanish:
  - se apartaron a sus tiendas
  - partieron hacia sus tiendas
  - se dirigieron a sus tiendas
  lexicon: LSJ
  rationale: El contexto militar apunta a tiendas de campaña; «se retiraron» transmite la separación/dispersión y mantiene el tono formal del relato.
theological_decisions:
- issue: El gesto de la derecha como señal de pacto o acuerdo
  english_pob_reading: Retain the literal image 'giving right hands' in the main text
  chosen_spanish_reading: Mantener la imagen literal de las manos derechas
  alternative_spanish_readings:
  - traducirlo como «hacer un pacto»
  - traducirlo como «sellar un acuerdo»
  - traducirlo como «estrechar la mano»
  rationale: No hay un cruce doctrinal, pero sí una decisión de transparencia textual. La imagen concreta es históricamente significativa y evita añadir una interpretación jurídica o moderna que el griego no explicita.
  doctrine_reference: Principio de primacía del texto original; preservación de gestos culturales relevantes
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la expresión a «exchanging right hands» por mayor naturalidad y formalidad; por eso la versión española conserva la mutualidad del gesto con una fórmula literal pero fluida («tras darse las manos derechas»), evitando una paráfrasis excesiva. También se mantiene el registro narrativo formal de «se retiraron».
  spanish_consistency_notes:
  - Se mantiene «tiendas» para σκηνάς, preservando el escenario militar concreto.
  - Se usa «paz» en sentido relacional/diplomático, no como paz interior o espiritual.
  - No se traduce κύριος/Χριστός aquí; no aplica al versículo.
  - La nota al pie está anclada explícitamente en [a] para cumplir la referencia cultural del gesto.
