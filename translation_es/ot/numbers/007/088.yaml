revisions:
- from: Y todo el ganado para el sacrificio de los sacrificios de paz fue veinticuatro toros, sesenta carneros, sesenta machos cabríos y sesenta corderos de un año. Esta fue la dedicación del altar después de que fue ungido.
  to: Y todo el ganado para el sacrificio de paz[a] fue veinticuatro toros, sesenta carneros, sesenta machos cabríos y sesenta corderos de un año. Esta fue la dedicación del altar después de que fue ungido.
