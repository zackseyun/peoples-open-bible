translation:
  language: es
  text: Al día siguiente, los filisteos vinieron a despojar a los caídos[a][b], y hallaron a Saúl y a sus hijos caídos en el monte Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «el siguiente día».
    reason: lexical_alternative
  - marker: b
    text: El verbo se refiere a quitarles a los caídos en batalla sus pertenencias, como armas o ropa.
    reason: cultural_note
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  lexicon: HALOT
  rationale: La expresión hebrea indica el día posterior a los acontecimientos narrados. «Al día siguiente» es natural en español y conserva la secuencia temporal sin añadir información.
- source_word: לְפַשֵּׁט
  english_pob_choice: to strip
  chosen_spanish: despojar
  alternatives_spanish:
  - quitar
  - desnudar
  - saquear
  lexicon: HALOT
  rationale: En este contexto bélico, el verbo apunta a quitar a los caídos sus pertenencias, especialmente armas o ropa. «Despojar» comunica ese acto con dignidad y mantiene la fuerza del verbo sin caer en un calco torpe.
- source_word: הַחֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los muertos en batalla
  - los caídos en combate
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a los que han sido abatidos en combate. «Los muertos» es comprensible y sobrio en español; sin embargo, se conserva la referencia bélica en el contexto inmediato y en la nota léxica. Se evitó «cadáveres» por su dureza y posible pérdida del matiz narrativo.
- source_word: נֹפְלִים
  english_pob_choice: fallen
  chosen_spanish: caídos
  alternatives_spanish:
  - cayendo
  - tendidos
  - muertos
  lexicon: HALOT
  rationale: El participio literalmente significa «caídos» y en narración de batalla describe a quienes han sido derribados. «Caídos» preserva la imagen hebrea y el paralelismo con el contexto militar.
- source_word: בְּהַר גִּלְבֹּעַ
  english_pob_choice: on Mount Gilboa
  chosen_spanish: en el monte Gilboa
  alternatives_spanish:
  - sobre el monte Gilboa
  - en el monte de Gilboa
  lexicon: HALOT
  rationale: La preposición hebrea y el nombre propio se expresan de manera directa con «en el monte Gilboa». Esta forma es natural en español bíblico contemporáneo y mantiene la referencia geográfica.
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El valor narrativo de la fórmula se integra en la marcación temporal inicial del versículo. En español, «Al día siguiente» transmite con naturalidad la transición de la escena sin forzar una fórmula arcaica.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con la lectura auditada de la POB en inglés. Se preserva la secuencia narrativa, el matiz bélico de «despojar» y la imagen participial de «caídos», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «filisteos» como etnónimo estándar en español bíblico.
  - Se usa «monte Gilboa» como forma geográfica estable y comprensible.
  - Se evita el uso de «SEÑOR» porque no aparece el tetragrámaton ni una cita divina en este versículo.
