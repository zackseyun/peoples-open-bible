translation:
  language: es
  text: 'Entonces los hijos de Israel clamaron a Yahvé[a], y Yahvé levantó un rescatador[b] para los hijos de Israel, que los libró: Otniel, hijo de Quenaz, hermano menor de Caleb[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O, «salvador» o «libertador». El hebreo se refiere aquí a un agente humano levantado por Dios para rescatar a Israel.
    reason: lexical_alternative
  - marker: c
    text: O, «el hermano menor de Caleb». La expresión hebrea identifica a Otniel en relación con Caleb e indica que era menor que Caleb.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - clamaron por ayuda
  lexicon: HALOT
  rationale: El verbo זעק expresa un clamor urgente dirigido a Dios en medio de angustia. En español, «clamaron» conserva ese sentido de súplica intensa y suena más natural y digno que una traducción más literal pero menos idiomática.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Israel». Se preserva la formulación familiar del original, en línea con la decisión inglesa de no neutralizarla, aunque en español siga siendo clara y entendible.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre divino «Yahvé», conforme al estándar del proyecto. Se evita sustituirlo por un título, manteniendo el nombre personal del pacto revelado en el texto hebreo.
- source_word: וַיָּקֶם
  english_pob_choice: raised up
  chosen_spanish: levantó
  alternatives_spanish:
  - hizo surgir
  - alzò
  lexicon: HALOT
  rationale: קוּם en esta forma causativa indica que Dios hace aparecer o suscita a alguien para una función. «Levantó» reproduce bien la imagen bíblica y es idiomático en español.
- source_word: מוֹשִׁיעַ
  english_pob_choice: deliverer
  chosen_spanish: libertador
  alternatives_spanish:
  - salvador
  - rescatador
  - libertador
  lexicon: HALOT
  rationale: En Jueces el participio se refiere a un agente humano suscitado por Dios para rescatar a Israel de la opresión. «Libertador» comunica bien la función histórica sin cargarlo innecesariamente con asociaciones cristológicas; se mantiene la tensión entre rescate y liberación que el contexto demanda.
- source_word: וַיּוֹשִׁיעֵם
  english_pob_choice: he delivered them
  chosen_spanish: los libró
  alternatives_spanish:
  - los salvó
  - les dio liberación
  lexicon: HALOT
  rationale: El verbo ישׁע aquí expresa rescate concreto en un contexto militar-político. «Los libró» conserva el sentido de liberación eficaz y se relaciona naturalmente con «libertador».
- source_word: אֵת עָתְנִיאֵל בֶּן קְנַז
  english_pob_choice: Othniel son of Kenaz
  chosen_spanish: Otoniel, hijo de Quenaz
  alternatives_spanish:
  - Otniel, hijo de Quenaz
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estable y legible en español. «Otoniel» y «Quenaz» siguen una forma clara para lectura eclesial, manteniendo la identificación del texto.
- source_word: אֲחִי כָלֵב הַקָּטֹן מִמֶּנּוּ
  english_pob_choice: Caleb’s younger brother
  chosen_spanish: hermano menor de Caleb
  alternatives_spanish:
  - el hermano menor de Caleb
  - el hermano de Caleb, menor que él
  - el hermano de Caleb, más joven que él
  lexicon: HALOT
  rationale: La frase se entiende con naturalidad como una relación fraterna y de menor edad respecto de Caleb. «Hermano menor» reproduce esa relación de manera idiomática en español sin sobreafirmar algo como «el menor» o «el más joven», que podría ir más lejos de lo que el hebreo obliga.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio divino en lugar de una sustitución titular. Esto mantiene visible la identidad del Dios del pacto como aparece en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de מוֹשִׁיעַ en Jueces
  english_pob_reading: deliverer
  chosen_spanish_reading: libertador
  alternative_spanish_readings:
  - salvador
  - rescatador
  rationale: En este contexto el agente levantado por Yahvé es un liberador humano para Israel. «Libertador» comunica el acto de rescate histórico sin confundirlo con un uso soteriológico absoluto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Relación de Otoniel con Caleb
  english_pob_reading: Caleb’s younger brother
  chosen_spanish_reading: hermano menor de Caleb
  alternative_spanish_readings:
  - hermano más joven de Caleb
  - el hermano menor de Caleb
  rationale: La sintaxis hebrea puede expresar una relación fraterna con indicación de menor edad. La versión española conserva esa lectura natural y evita afirmar «el menor» como si el texto exigiera el superlativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'El inglés POB revisó la puntuación para dejar claro que el participio «deliverer» se refiere appositivamente a Othniel. La redacción española sigue esa lectura con una estructura igualmente clara: «levantó un libertador... que los libró: Otoniel...», evitando ambigüedad sobre el referente. También se mantuvo la distinción entre el nombre divino y el título, y se conservó la relación comparativa de edad/fraternidad con Caleb.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se emplea «libertador» para מוֹשִׁיעַ en este contexto narrativo de Jueces, manteniendo el matiz de rescate histórico.
  - 'Los nombres propios se transliteran de manera uniforme: Otoniel, Quenaz, Caleb.'
  - La frase final conserva la ambigüedad comparativa del hebreo con una lectura natural en español.
  - La puntuación reproduce la apposición del agente liberador tal como la dejó clara la revisión inglesa.
