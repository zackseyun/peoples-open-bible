translation:
  language: es
  text: 'Y les dijo: «Sin duda me dirán este proverbio: “Médico, cúrate a ti mismo”. Todo lo que oímos que se hizo[a] en Capernaúm, hazlo también aquí, en tu pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «lo que oímos que sucedió a/en Capernaúm». El griego usa εἰς («a/hacia»), pero aquí el sentido en contexto es locativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντως
  english_pob_choice: Surely
  chosen_spanish: Sin duda
  alternatives_spanish:
  - Ciertamente
  - Seguramente
  lexicon: BDAG
  rationale: El adverbio expresa una expectativa enfática de la respuesta de ellos. «Sin duda» conserva esa fuerza predictiva en español natural sin sonar demasiado formal o rígido.
- source_word: ἐρεῖτέ μοι
  english_pob_choice: you will say to me
  chosen_spanish: me dirán
  alternatives_spanish:
  - me dirán ustedes
  - me dirán a mí
  lexicon: BDAG
  rationale: El futuro de λέγω se conserva como predicción, no como mandato. En español, el dativo indirecto se expresa de forma natural con «me dirán».
- source_word: παραβολὴν
  english_pob_choice: proverb
  chosen_spanish: parábola
  alternatives_spanish:
  - proverbio
  - dicho
  lexicon: BDAG
  rationale: Aunque el contexto tiene forma proverbial, el uso lucano de παραβολή aquí permite mantener «parábola» como término del texto, y la cita misma aclara su carácter sentencioso. Se evita imponer «proverbio» en el texto principal sin necesidad absoluta.
- source_word: Ἰατρέ
  english_pob_choice: Physician
  chosen_spanish: Médico
  alternatives_spanish:
  - Médico tratante
  - Doctor
  lexicon: BDAG
  rationale: «Médico» conserva el tono proverbial y es idiomático en español. «Doctor» puede sonar más moderno y coloquial, mientras que «médico» mantiene mejor el registro del refrán.
- source_word: θεράπευσον σεαυτόν
  english_pob_choice: heal yourself
  chosen_spanish: cúrate a ti mismo
  alternatives_spanish:
  - sánate a ti mismo
  - cúrate
  lexicon: BDAG
  rationale: El imperativo aoristo exige una orden directa. «Cúrate a ti mismo» expresa claramente la acción reflexiva y conserva el sentido proverbial de la frase.
- source_word: ὅσα ἠκούσαμεν γενόμενα
  english_pob_choice: Whatever we have heard was done
  chosen_spanish: Todo lo que oímos que se hizo
  alternatives_spanish:
  - Todo lo que oímos que sucedió
  - Lo que oímos que se hizo
  lexicon: BDAG
  rationale: La construcción combina contenido oído con hechos ocurridos. «Se hizo» refleja de manera más fiel el sentido de acciones/deeds reportados, y mantiene la relación con lo que fue oído sin forzar una paráfrasis amplia.
- source_word: εἰς τὴν Καφαρναοὺμ
  english_pob_choice: in Capernaum
  chosen_spanish: en Capernaúm
  alternatives_spanish:
  - a Capernaúm
  - hacia Capernaúm
  lexicon: BDAG
  rationale: La POB inglesa optó por el sentido locativo en contexto. El español «en Capernaúm» transmite de forma natural el lugar donde ocurrieron los hechos; se mantiene la nota para la alternativa más literal del griego.
- source_word: ποίησον καὶ ὧδε
  english_pob_choice: do here also
  chosen_spanish: hazlo también aquí
  alternatives_spanish:
  - haz también aquí
  - haz aquí también
  lexicon: BDAG
  rationale: El verbo ποιέω puede abarcar «hacer» de modo amplio. Dado el antecedente tácito («lo que vimos/hemos oído hecho»), «hazlo» recupera el referente implícito y suena natural en español.
- source_word: ἐν τῇ πατρίδι σου
  english_pob_choice: in your hometown
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu patria
  - en tu pueblo
  - en tu tierra natal
  lexicon: BDAG
  rationale: πατρίς aquí indica el lugar natal o propio de alguien. «Tu tierra» es una solución amplia y bíblica en español que evita restringir indebidamente a una sola localidad moderna.
theological_decisions:
- issue: Valor de παραβολή en este dicho de Jesús
  english_pob_reading: Rendered as 'proverb' rather than 'parable'
  chosen_spanish_reading: Se mantiene «parábola» en el texto principal, con el dicho proverbial dentro de comillas
  alternative_spanish_readings:
  - proverbio
  - dicho
  rationale: El contexto muestra un refrán breve, pero el término griego es παραβολή. Para no borrar la tensión entre la palabra usada y la forma del dicho, se conserva «parábola» en el texto y se deja que la cita misma funcione como proverbio contextual.
  doctrine_reference: Uso contextual de παραβολή en los Evangelios; discernimiento léxico, no doctrinal.
- issue: Lectura de γενόμενα con εἰς τὴν Καφαρναούμ
  english_pob_reading: The things we heard happened in Capernaum
  chosen_spanish_reading: Todo lo que oímos que se hizo en Capernaúm
  alternative_spanish_readings:
  - Todo lo que oímos que sucedió en Capernaúm
  - Todo lo que oímos que ocurrió en Capernaúm
  rationale: La frase alude a obras/hechos reportados, no solo a eventos neutrales. «Se hizo» conserva la idea de hechos realizados y evita perder el matiz activo que la revisión inglesa destacó.
  doctrine_reference: No doctrinal; decisión de aspecto y referencia eventiva.
translation_notes:
  revision_awareness: La POB inglesa fue revisada desde «happened» a «was done» para reflejar mejor γενόμενα como hechos realizados en Capernaúm. La versión española sigue esa decisión al usar «se hizo» en vez de «sucedió» u «ocurrió», y mantiene el resto del verso con el mismo nivel de literalidad funcional.
  spanish_consistency_notes:
  - Se conserva Yahvé como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «Médico» se eligió por registro proverbial, no como actualización médica moderna.
  - «En tu tierra» reproduce πατρίδι de manera amplia; si se prefiriera una localización más concreta, «en tu pueblo» o «en tu tierra natal» serían alternativas interpretativas, no correcciones del texto.
