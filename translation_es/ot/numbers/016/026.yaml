translation:
  language: es
  text: 'Y habló a la congregación, diciendo: «Apártense, por favor, de las tiendas de estos hombres malvados, y no toquen nada de lo que les pertenece, no sea que sean arrastrados en todos sus pecados[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no sea que sean destruidos por causa de todos sus pecados’. El hebreo también puede entenderse con un matiz causal más explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: ‘עֵדָה’ designa al pueblo reunido como cuerpo. ‘Congregación’ es natural en español bíblico y conserva el sentido corporativo mejor que ‘comunidad’, que puede sonar demasiado amplio.
- source_word: סוּרוּ נָא
  english_pob_choice: Please move away
  chosen_spanish: Apártense, por favor
  alternatives_spanish:
  - Aljéntense, por favor
  - Retírense, por favor
  - Apártense ahora
  lexicon: HALOT
  rationale: El imperativo plural pide apartarse físicamente; ‘נָא’ añade ruego/urgencia más que simple referencia temporal. ‘Apártense, por favor’ mantiene la fuerza exhortativa de manera natural en español.
- source_word: מֵעַל אָהֳלֵי
  english_pob_choice: from the tents of
  chosen_spanish: de las tiendas de
  alternatives_spanish:
  - desde las tiendas de
  - de junto a las tiendas de
  - fuera de las tiendas de
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘de sobre/de encima de’, pero aquí funciona idiomáticamente como alejarse de la zona inmediata de las tiendas. ‘De las tiendas de’ comunica bien el movimiento requerido sin volver el español forzado.
- source_word: הָאֲנָשִׁים הָרְשָׁעִים הָאֵלֶּה
  english_pob_choice: these wicked men
  chosen_spanish: estos hombres malvados
  alternatives_spanish:
  - estos hombres perversos
  - estos hombres impíos
  - estos hombres culpables
  lexicon: HALOT
  rationale: ‘רְשָׁעִים’ tiene fuerza moral y judicial. ‘Malvados’ es claro y fiel; ‘impíos’ sería posible, pero en español puede sonar más religioso que el hebreo en este contexto narrativo.
- source_word: וְאַל תִּגְּעוּ
  english_pob_choice: and do not touch
  chosen_spanish: y no toquen
  alternatives_spanish:
  - y no entren en contacto con
  - y no pongan la mano sobre
  - y no toquen nada
  lexicon: HALOT
  rationale: ‘נגע’ puede ser ‘tocar’ o ‘entrar en contacto con’. ‘No toquen’ preserva la prohibición directa y sencilla. Se completa con ‘nada de lo que les pertenece’ para expresar el alcance distributivo del objeto.
- source_word: בְּכָל אֲשֶׁר לָהֶם
  english_pob_choice: anything that belongs to them
  chosen_spanish: nada de lo que les pertenece
  alternatives_spanish:
  - todo lo que les pertenece
  - cualquier cosa que sea suya
  - nada de sus bienes
  lexicon: HALOT
  rationale: La expresión abarca sus pertenencias en forma distributiva. ‘Nada de lo que les pertenece’ suena natural en español después de la prohibición y conserva el alcance comprehensivo sin añadir precisión ajena al texto.
- source_word: פֶּן תִּסָּפוּ
  english_pob_choice: lest you be swept away
  chosen_spanish: para que no sean arrastrados
  alternatives_spanish:
  - no sea que sean destruidos
  - para que no perezcan
  - no sea que sean barridos
  lexicon: HALOT
  rationale: El nifal de ‘ספה’ admite ‘ser arrastrado/swept away’, ‘ser destruido’ o ‘perecer’. ‘Arrastrados’ preserva la imagen pasiva de ser llevados con el juicio que cae, sin resolverla prematuramente solo como aniquilación.
- source_word: בְּכָל חַטֹּאתָם
  english_pob_choice: in all their sins
  chosen_spanish: junto con todos sus pecados
  alternatives_spanish:
  - en todos sus pecados
  - por causa de todos sus pecados
  - a causa de todos sus pecados
  lexicon: HALOT
  rationale: '‘ב’ puede expresar asociación o circunstancia, no solo causalidad. ‘Junto con’ preserva la tensión del hebreo: el peligro está ligado a la esfera de sus pecados y al juicio asociado, sin convertirlo únicamente en una causa explícita.'
theological_decisions:
- issue: Relación entre separación física y juicio asociado al pecado
  english_pob_reading: The warning is rendered as separation from the wicked and their possessions to avoid being swept away in the judgment connected with their sins.
  chosen_spanish_reading: La advertencia se expresa como una separación real de los malvados y de sus pertenencias para no quedar incluidos en el juicio ligado a sus pecados.
  alternative_spanish_readings:
  - para no ser destruidos por causa de todos sus pecados
  - para no ser barridos en medio de su castigo
  rationale: El hebreo mantiene una relación tensa entre cercanía, participación y juicio. La redacción española conserva esa tensión sin convertirla en una doctrina más desarrollada de culpa imputada ni reducirla a mera causalidad.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión inglesa más reciente, que no requirió cambios, y mantiene su lectura óptima-equivalente del final del versículo: alejamiento, prohibición de contacto y peligro de ser arrastrados junto con los pecados de esos hombres.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino cuando aparezca en contextos relacionados; aquí no aparece.
  - ‘Congregación’ se usa como término estable para עֵדָה, coherente con otros pasajes narrativos del Pentateuco.
  - ‘Malvados’ conserva el juicio moral/jurídico de רְשָׁעִים sin sobrecargarlo con un registro eclesiástico.
  - La cláusula final conserva la ambigüedad teológica del hebreo entre asociación y causalidad, en línea con la POB inglesa.
