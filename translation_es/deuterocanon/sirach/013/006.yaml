translation:
  language: es
  text: Tiene necesidad de ti, y te engañará[a]; te sonreirá y te tranquilizará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra posible lectura, apoyada por el griego paralelo, es «te vaciará» / «te despojará», es decir, que no solo te engañará sino que te dejará sin recursos.
    reason: alternative_reading
lexical_decisions:
- source_word: צֹרֶךְ לוֹ עִמְּךָ
  english_pob_choice: He has need of you
  chosen_spanish: tiene necesidad de ti
  alternatives_spanish:
  - te necesita
  - si tiene necesidad de ti
  lexicon: HALOT
  rationale: La frase hebrea expresa necesidad en relación contigo; en español, «tiene necesidad de ti» conserva la dependencia del otro y el valor relacional sin volverlo demasiado abstracto. Mantengo el matiz condicional al inicio porque el griego paralelo también sugiere una lectura condicional, aunque el hebreo base puede leerse de forma más directa.
- source_word: וְהָשִׁיעַ לָךְ
  english_pob_choice: he will deceive you
  chosen_spanish: te engañará
  alternatives_spanish:
  - te deludirá
  - te explotará
  - te despojará
  lexicon: HALOT
  rationale: El hebreo es difícil y el testimonio griego apunta a una acción de vaciar o despojar. «Engañará» recoge la fuerza manipuladora del contexto inmediato, sin afirmar más de lo que la forma hebrea permite y dejando intacta la tensión textual documentada por la POB inglesa.
- source_word: וְשׁוֹחֵק לְךָ
  english_pob_choice: he will smile at you
  chosen_spanish: te sonreirá
  alternatives_spanish:
  - se reirá contigo
  - se burlará de ti
  lexicon: HALOT
  rationale: En este contexto socialmente manipulador, el verbo de reír/sonreír se entiende mejor como una apariencia amistosa. «Te sonreirá» reproduce la imagen de cordialidad exterior con un tono natural en español.
- source_word: וְהִבְטִיחֶךָ
  english_pob_choice: reassure you
  chosen_spanish: te tranquilizará
  alternatives_spanish:
  - te dará seguridad
  - te asegurará
  lexicon: HALOT
  rationale: 'El hifil de בטח tiene valor causativo: hacer sentir seguro o confiado. «Te tranquilizará» funciona bien en español para una falsa calma persuasiva y mantiene la idea de inducir confianza, aunque no cargue el mismo peso técnico que una traducción más literal.'
- source_word: ἀποκενώσει σε
  english_pob_choice: he will empty you out
  chosen_spanish: te vaciará
  alternatives_spanish:
  - te despojará
  - te dejará vacío
  - te explotará
  lexicon: BDAG
  rationale: Aunque la POB inglesa optó por una formulación más general en el cuerpo del versículo, el griego paralelo aporta una imagen concreta de vaciamiento. En español, «te vaciará» preserva esa imagen sin sobreexplicar el mecanismo y refleja la nota auditada de explotación.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo como testimonio principal, pero integra el paralelo griego para mantener la tensión textual documentada en la auditoría inglesa: el verbo hebreo es difícil y el sentido global apunta a una relación manipuladora y explotadora. Se evitó una paráfrasis amplia y se conservó el movimiento de tres acciones: engaño, sonrisa aparente y falsa tranquilidad.'
  spanish_consistency_notes:
  - Se mantiene «te» de forma uniforme para la relación directa con el interlocutor singular.
  - «Te tranquilizará» se eligió como equivalente natural de la idea de reassurance sin introducir lenguaje doctrinal ajeno al contexto.
  - La nota al pie preserva la alternativa concreta del griego sin reemplazar la lectura principal del texto.
