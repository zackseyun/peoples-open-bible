translation:
  language: es
  text: Y harás así para Aarón y para sus hijos, conforme a todo lo que te he mandado. Siete días los investirás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «llenarás su mano»; es un modismo hebreo para instalar u otorgar el oficio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall do
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y debes hacer
  - Así harás
  lexicon: HALOT
  rationale: El hebreo tiene un perfecto con valor directivo en una secuencia instruccional; en español, «harás» conserva mejor el tono de mandato futuro que una perífrasis más explicativa.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: for Aaron and for his sons
  chosen_spanish: para Aarón y para sus hijos
  alternatives_spanish:
  - a Aarón y a sus hijos
  - para Aarón y sus hijos
  lexicon: HALOT
  rationale: Los dos ל expresan referencia ritual/relacional. «Para» comunica bien la instrucción dada en beneficio o con respecto a ellos, sin forzar un matiz direccional.
- source_word: כָּכָה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: HALOT
  rationale: Es un adverbio deíctico que remite al procedimiento ya indicado. «Así» es natural en español y conserva la referencia al rito prescrito.
- source_word: כְּכֹל אֲשֶׁר צִוִּיתִי אֹתָכָה
  english_pob_choice: according to all that I have commanded you
  chosen_spanish: conforme a todo lo que te he mandado
  alternatives_spanish:
  - según todo lo que te he mandado
  - de acuerdo con todo lo que te he mandado
  lexicon: HALOT
  rationale: כְּכֹל + relativo expresa conformidad total con las instrucciones previas. «Conforme a todo» preserva la amplitud de «all» sin sonar rígido.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: Seven days
  chosen_spanish: Siete días
  alternatives_spanish:
  - Durante siete días
  - Por siete días
  lexicon: HALOT
  rationale: Es un acusativo de duración. En español, la secuencia breve «Siete días» mantiene la proximidad al hebreo; el valor durativo queda claro por el contexto verbal.
- source_word: תְּמַלֵּא יָדָם
  english_pob_choice: you shall ordain them
  chosen_spanish: los investirás
  alternatives_spanish:
  - los ordinarás
  - los consagrarás para el sacerdocio
  - llenarás su mano
  lexicon: HALOT
  rationale: El modismo culto «llenar la mano» es literal pero opaco en español. «Investir» comunica la instalación oficial en el oficio sacerdotal con dignidad y sin introducir una terminología eclesiástica ajena. Se mantiene la tensión idiomática en nota.
theological_decisions:
- issue: Modismo sacerdotal תְּמַלֵּא יָדָם
  english_pob_reading: you shall ordain them
  chosen_spanish_reading: los investirás
  alternative_spanish_readings:
  - los ordinarás
  - los consagrarás para el sacerdocio
  - llenarás su mano
  rationale: El contexto es la instalación formal de Aarón y sus hijos en el servicio sacerdotal. «Investir» conserva el sentido de conferir un oficio; no se prefiere «consagrar» porque enfatiza la santificación más que la investidura, y «ordenar» puede sonar demasiado denominacional o poco natural en este contexto. La nota preserva el giro literal hebreo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que mantuvo la duración como «Seven days» sin añadir preposición explicativa. En español se conservó el valor durativo con la secuencia breve «Siete días», sin expandirla a una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la POB española, pero este versículo no contiene el tetragrámaton.
  - «Investir» se usa aquí en sentido de conferir un oficio; no se emplea como equivalente general de χριστός/Mesías.
  - Se evitó «SEÑOR» y cualquier lenguaje litúrgico que ocultara el sentido ritual del hebreo.
  - La nota al pie conserva el modismo literal para transparencia auditiva sin sacrificar claridad en el cuerpo del texto.
