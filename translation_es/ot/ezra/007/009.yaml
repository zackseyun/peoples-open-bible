revisions:
- from: Porque en el primer día del mes primero él puso los cimientos de la[a] subida desde Babilonia, y en el primer día del mes quinto llegó a Jerusalén, conforme a la buena mano de su Dios sobre él.
  to: Porque el primer día del primer mes él puso los cimientos para la subida[a] desde Babilonia, y el primer día del quinto mes llegó a Jerusalén, conforme a la buena mano de su Dios sobre él.
  rationale: Se corrige la colocación del marcador de nota para cumplir el formato exigido, se mejora la naturalidad de las fórmulas de fecha en español sin apartarse del hebreo, y se ajusta 'de' a 'para' en 'puso los cimientos' para reflejar mejor la relación entre יְסֻד y el viaje. Se conserva la metáfora de la 'buena mano' y el valor explicativo inicial de כִּי.
