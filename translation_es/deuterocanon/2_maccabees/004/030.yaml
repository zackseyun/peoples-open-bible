translation:
  language: es
  text: Mientras estas cosas estaban en curso[a], sucedió que la gente de Tarso y de Mallo se rebeló, porque estaba siendo entregada como obsequio a Antioquis, la concubina del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los tarsienses y los mallotes se rebelaban» o «estaban en rebelión». La traducción usa los nombres de las ciudades para mayor claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεστηκότων
  english_pob_choice: while these things were underway
  chosen_spanish: Mientras estas cosas estaban en curso
  alternatives_spanish:
  - Mientras esto sucedía
  - Mientras tales cosas se desarrollaban
  - Mientras estas cosas pasaban
  lexicon: LSJ
  rationale: El genitivo absoluto funciona aquí como marco temporal narrativo, no como “estar reunidos”. «Estaban en curso» conserva la idea de proceso en marcha y suena natural en español.
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - ocurrió
  - pasó
  lexicon: LSJ
  rationale: Verbo narrativo simple para introducir el hecho siguiente sin añadir énfasis interpretativo.
- source_word: Ταρσεῖς καὶ Μαλλῶτας
  english_pob_choice: the people of Tarsus and Mallus
  chosen_spanish: los tarsenses y los mallotes
  alternatives_spanish:
  - la gente de Tarso y de Mallo
  - los habitantes de Tarsos y de Mallos
  lexicon: LSJ
  rationale: El griego usa designaciones gentilicias/plurales. Se mantiene esa forma en español para no perder la referencia a los habitantes de ambas ciudades, aunque se ofrece una alternativa más explicativa implícita en la nota textual del inglés.
- source_word: στασιάζειν
  english_pob_choice: revolted
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - entraron en rebelión
  - se alzaron
  - se sublevaron
  lexicon: LSJ
  rationale: El verbo expresa levantamiento o facción contra una autoridad. «Se rebelaron» comunica bien el valor político del término.
- source_word: διὰ τὸ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - debido a que
  lexicon: LSJ
  rationale: Introducción causal directa y natural en español.
- source_word: Ἀντιοχίδι
  english_pob_choice: Antiochis
  chosen_spanish: Antioquis
  alternatives_spanish:
  - Antioquide
  - Antioquís
  lexicon: LSJ
  rationale: Transliteración al español más eufónica y legible, manteniendo el nombre propio sin forzar una forma tradicional inexistente en el uso bíblico castellano.
- source_word: παλλακῇ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - amante
  - manceba
  lexicon: LSJ
  rationale: «Concubina» es el equivalente directo y históricamente preciso; evita matices modernos de «amante».
- source_word: ἐν δωρεᾷ δίδοσθαι
  english_pob_choice: were being given as a gift
  chosen_spanish: se les estaba dando ... como regalo
  alternatives_spanish:
  - se les estaba otorgando como obsequio
  - se les estaba concediendo como dádiva
  lexicon: LSJ
  rationale: La construcción pasiva expresa concesión/donación real. «Como regalo» conserva el sentido de don sin sobrecargar el estilo; «se les estaba dando» preserva el pasivo en español.
theological_decisions:
- issue: Uso de título real y referencia a la concubina
  english_pob_reading: the king’s concubine
  chosen_spanish_reading: la concubina del rey
  alternative_spanish_readings:
  - la manceba del rey
  - la amante del rey
  rationale: 'No hay atenuación del término ni eufemismo: el texto griego y la traducción inglesa exigen el sentido histórico-social de concubina. Se mantiene el término claro y sobrio.'
  doctrine_reference: Lexical/historical fidelity; no doctrinal issue
translation_notes:
  revision_awareness: El texto base inglés no muestra revisiones aplicadas y el informe más reciente indica acuerdo alto y sin cambios necesarios. La versión española sigue esa lectura estable, manteniendo la equivalencia óptima sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva la distinción entre gentilicios y nombres de ciudades mediante la nota, siguiendo la decisión inglesa de claridad.
  - El registro es sobrio y bíblico moderno, sin recurrir a arcaísmos innecesarios.
