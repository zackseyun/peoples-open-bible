review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: mantiene la fórmula temporal, la búsqueda minuciosa de Jerusalén con lámparas, el juicio punitivo, la metáfora vinícola y la afirmación interna de indiferencia divina. También usa correctamente «Yahvé» para יהוה. La principal desalineación está en la nota al pie: presenta como alternativa exactamente la misma expresión ya usada en el texto («sobre sus heces»), por lo que no preserva de manera útil la alternativa documentada en el rastro inglés («lees/lías»).'
  spanish_quality_summary: El español es claro y digno. «Escudriñaré» funciona bien en registro bíblico moderno. Sin embargo, «están asentados sobre sus heces» suena algo rígido; «reposan sobre sus heces» o «están asentados sobre sus lías» serían opciones más fluidas. Aun así, la redacción principal es inteligible y fiel. El problema que sí requiere corrección es la nota, que no cumple bien su función y repite el texto principal.
  glossary_alignment: 'La terminología del proyecto está bien observada: יהוה -> «Yahvé»; no hay conflictos con otras entradas glosariales. La metáfora de שִׁמְרֵיהֶם se preserva, pero la alternativa española más natural y técnicamente precisa en nota debería ser «lías», en paralelo con la nota inglesa sobre «lees».'
  issues:
  - severity: medium
    issue: La nota al pie repite el mismo sintagma del texto principal en vez de ofrecer una alternativa real.
    rationale: 'El texto principal ya dice «sobre sus heces», pero la nota dice «O: “sobre sus heces”». Esto hace inútil la nota y no refleja adecuadamente la alternativa léxica preservada en la auditoría inglesa.'
  - severity: low
    issue: La elección «heces» es fiel pero puede sonar áspera en español general sin una alternativa aclaratoria más natural.
    rationale: En contexto vinícola «heces» es defendible, pero muchos lectores entenderán mejor «lías». Mantener «heces» en el texto principal puede aceptarse si la nota ofrece esa alternativa tradicional/técnica.
  revised_spanish_text: 'Y sucederá en aquel tiempo: yo escudriñaré a Jerusalén con lámparas[a], y castigaré a los hombres que están asentados sobre sus heces, los que dicen en su corazón: «Yahvé no hará bien ni hará mal».'
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, «sobre sus lías». El hebreo usa imagen vinícola para personas dejadas sin perturbar y espiritualmente complacientes.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es sustancialmente fiel y legible, pero se corrige la nota al pie para que aporte una alternativa léxica real y útil, en línea con la auditoría inglesa y con mejor claridad para lectores hispanohablantes.
