translation:
  language: es
  text: Quince codos de colgaduras para el costado[a], con sus tres pilares y sus tres bases[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para el hombro’. El hebreo usa un término literalmente corporal para indicar el lado o flanco de la estructura.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus tres zócalos’. El término hebreo puede denotar las bases con encaje que sostenían los pilares.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמֵשׁ עֶשְׂרֵה
  english_pob_choice: fifteen
  chosen_spanish: quince
  alternatives_spanish:
  - quince unidades
  lexicon: HALOT
  rationale: El numeral compuesto expresa simplemente ‘quince’; no requiere expansión. En español, ‘quince’ comunica la cantidad de forma natural.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos de longitud
  lexicon: HALOT
  rationale: ‘אַמָּה’ es la medida lineal ‘cubit’. ‘Codos’ es el equivalente español establecido y fiel al valor metrológico del hebreo.
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos colgantes
  - colgaduras
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, se trata de piezas textiles colgantes que forman el cerramiento. ‘Cortinas’ es claro y natural en español; aunque ‘colgaduras’ podría reflejar mejor la idea de suspensión, suena menos idiomático.
- source_word: לַכָּתֵף
  english_pob_choice: for the shoulder
  chosen_spanish: para el costado
  alternatives_spanish:
  - para el hombro
  - para el flanco
  lexicon: HALOT
  rationale: Aquí el término corporal se usa de modo arquitectónico para el lado/flanco de la estructura. En español, ‘costado’ transmite mejor esa función descriptiva que ‘hombro’, sin perder la relación con el hebreo.
- source_word: עַמֻּדֵיהֶם
  english_pob_choice: their three pillars
  chosen_spanish: sus tres columnas
  alternatives_spanish:
  - sus tres pilares
  - sus tres postes
  lexicon: HALOT
  rationale: ‘עַמּוּד’ designa una pieza vertical de soporte. ‘Columnas’ es un término arquitectónico claro en español; ‘pilares’ también sería posible, pero ‘columnas’ mantiene buena legibilidad en una descripción técnica.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their three bases
  chosen_spanish: sus tres bases
  alternatives_spanish:
  - sus tres zócalos
  - sus tres sockets
  lexicon: HALOT
  rationale: ‘אֶדֶן’ en este contexto alude al soporte inferior de la columna. ‘Bases’ es una traducción transparente y natural en español, y conserva la relación estructural sin introducir un tecnicismo innecesario.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se mantuvo la metáfora espacial de לַכָּתֵף con una solución española idiomática (‘costado’), mientras que ‘cortinas’, ‘columnas’ y ‘bases’ reflejan con claridad los elementos constructivos del tabernáculo. No se añadió material interpretativo fuera de lo que el hebreo exige.
  spanish_consistency_notes:
  - Se conservó un registro bíblico moderno y sobrio, apto para publicación.
  - Se evitó ‘SEÑOR’ o fórmulas devocionales no presentes en el verso.
  - ‘Columnas’ se usa aquí como término arquitectónico general; en otros contextos del tabernáculo, el proyecto podrá preferir ‘pilares’ si la consistencia terminológica lo requiere.
