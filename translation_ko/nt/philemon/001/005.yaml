id: PHM.1.5
reference: Philemon 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀκούων σου τὴν ἀγάπην καὶ τὴν πίστιν ἣν ἔχεις ⸀πρὸς τὸν κύριον Ἰησοῦν καὶ εἰς πάντας τοὺς ἁγίους,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/005.yaml
  text: because I hear of your love and faith that you have toward the Lord Jesus and for all the saints[c][b][a],
  footnotes:
  - marker: a
    text: 'Or, more explicitly by sense: ''your faith toward the Lord Jesus and your love for all the saints.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the faithfulness that you have.' The Greek word can denote faith, trust, or faithfulness.
    reason: lexical_alternative
  - marker: c
    text: Or 'your love and the faith that you have'.
    reason: previous_rendering
translation:
  language: ko
  text: 그대가 주 예수와 모든 성도를 향하여 가진 사랑과 믿음[a][b]에 대해 내가 듣기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 의미상 더 명시적으로 「주 예수를 향한 그대의 믿음과 모든 성도를 위한 그대의 사랑」. 많은 해석가들이 사랑은 성도를 향하고 믿음은 주를 향한 것으로 분배해 읽지만, 헬라어 본문은 「사랑과 믿음」을 묶은 뒤 두 전치사구를 잇기 때문에 본 번역은 본문의 흐름을 그대로 보존한다.
    reason: alternative_reading
  - marker: b
    text: 또는 「신실함」. 헬라어 πίστις는 믿음·신뢰·신실함을 함께 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούων
  english_pob_choice: because I hear
  chosen_korean: 내가 듣기 때문입니다
  alternatives_korean:
  - 내가 들으면서
  - 내가 들으니
  lexicon: BDAG
  rationale: 분사 ἀκούων은 앞 절 감사의 정황·근거를 가리킨다. 한국어 「~기 때문입니다」가 인과의 무게를 분명히 살리며 합쇼체 종결을 자연스럽게 마무리한다.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_korean: 사랑
  lexicon: BDAG
  rationale: ἀγάπη의 기본값.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신실함
  - 신뢰
  lexicon: BDAG
  rationale: πίστις의 기본값은 「믿음」. 이 문맥에서 「신실함」(빌레몬의 충성스러움) 뉘앙스도 가능하므로 각주에 대안을 둔다.
- source_word: πρὸς τὸν κύριον Ἰησοῦν
  english_pob_choice: toward the Lord Jesus
  chosen_korean: 주 예수와 ... 향하여
  alternatives_korean:
  - 주 예수께
  lexicon: BDAG
  rationale: πρός를 「향하여」로 옮겨 뒤따르는 εἰς와의 전치사 구분을 한국어 어순으로 자연스럽게 통합한다. 한국어에서는 「~와 ~을 향하여」로 두 대상을 함께 묶는 것이 영어 평행 구조보다 매끄럽다.
- source_word: εἰς πάντας τοὺς ἁγίους
  english_pob_choice: for all the saints
  chosen_korean: 모든 성도를 향하여
  alternatives_korean:
  - 모든 성도를 위하여
  lexicon: BDAG
  rationale: 본 절에서 한국어 어순은 두 대상(주 예수와 모든 성도)을 「~와 ~을 향하여」로 함께 묶는 것이 가장 매끄럽다. εἰς의 방향성도 「향하여」에 포함된다.
- source_word: ἁγίους
  english_pob_choice: saints
  chosen_korean: 성도
  alternatives_korean:
  - 거룩한 자들
  lexicon: BDAG
  rationale: 바울 서신 정형의 한국어 표준 등가어.
theological_decisions:
- issue: 「사랑」과 「믿음」을 두 전치사구에 어떻게 결부할지
  chosen_reading: 헬라어 어순대로 「사랑과 믿음」을 한데 묶은 뒤 「주 예수와 모든 성도를 향하여」로 잇고, 분배적 해석은 각주로 보존
  alternative_readings:
  - 주 예수를 향한 그대의 믿음과 모든 성도를 위한 그대의 사랑(분배적 해석)
  rationale: 헬라어 본문은 분배의 명시 표지 없이 두 명사와 두 전치사구를 평행하게 놓는다. 본 번역의 원칙(신학적 긴장을 해소하지 않고 보존)에 따라 본문은 헬라어 구조를 따르고, 분배적 해석은 각주에 둔다.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it)'
- issue: πίστις를 「믿음」으로 옮기되 「신실함」을 각주에 둠
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  rationale: 기본값은 「믿음」. 이 문맥은 단순한 신뢰만이 아니라 충성·신실함의 뉘앙스도 함께 담을 수 있으므로 대안을 각주에 보존한다.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives where contested'
