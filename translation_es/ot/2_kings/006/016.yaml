translation:
  language: es
  text: 'Él dijo[a]: «No tengas miedo, porque los que están con nosotros son más que los que están con ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque muchos son los que están con nosotros, más que los que están con ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El verbo narrativo וַיֹּאמֶר introduce una nueva intervención en el relato. En español, «Él dijo» conserva el valor verbal sin forzar una conjunción que puede sonar redundante en esta línea breve.
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  - No le temas
  lexicon: HALOT
  rationale: El hebreo usa una prohibición con אַל + yusivo; en español, «No tengas miedo» expresa de manera natural la prohibición y mantiene el sentido de temor personal del verbo ירא. «No temas» es más literal, pero algo más solemne.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la exhortación. «Porque» comunica con claridad esa relación causal en español moderno y digno.
- source_word: רַבִּים
  english_pob_choice: are more
  chosen_spanish: son más
  alternatives_spanish:
  - son muchos
  - son numerosos
  lexicon: HALOT
  rationale: En esta construcción comparativa, רַבִּים funciona como predicado de cantidad. «Son más» preserva la comparación explícita que el hebreo realiza con מֵאֲשֶׁר.
- source_word: אֲשֶׁר אִתָּנוּ
  english_pob_choice: those who are with us
  chosen_spanish: los que están con nosotros
  alternatives_spanish:
  - los que con nosotros están
  - los que nos acompañan
  lexicon: HALOT
  rationale: La relativa sustantivada אֲשֶׁר אִתָּנוּ se vierte de forma transparente como «los que están con nosotros», manteniendo el paralelo con la segunda mitad del versículo.
- source_word: מֵאֲשֶׁר
  english_pob_choice: than those who are
  chosen_spanish: que
  alternatives_spanish:
  - que los que
  - de los que
  lexicon: HALOT
  rationale: El comparativo con מן + אֲשֶׁר en español se expresa de manera natural con «más que». No hace falta repetir una estructura más pesada que entorpezca la comparación.
- source_word: אוֹתָם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - ellos
  - a ellos
  lexicon: HALOT
  rationale: Aunque el pronombre hebreo es literalmente «ellos», el contexto de contraste requiere en español la preposición implícita para reproducir el paralelismo «con nosotros / con ellos». El hebreo elide el verbo o la preposición en la segunda comparación, y el español debe explicitarla.
theological_decisions:
- issue: La cantidad comparativa frente a la simple idea de superioridad
  english_pob_reading: those who are with us are more than those who are with them
  chosen_spanish_reading: los que están con nosotros son más que los que están con ellos
  alternative_spanish_readings:
  - son muchos los que están con nosotros, más que los que están con ellos
  - son más numerosos los que están con nosotros que los que están con ellos
  rationale: 'El hebreo permite tanto la idea de «muchos» como la de comparación: רַבִּים + מִן/מֵאֲשֶׁר. La redacción principal mantiene la comparación sin decidir innecesariamente si el énfasis es solo numérico o también de superioridad relativa, siguiendo la prudencia del texto y del POB inglés.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad del grupo invisible con Elíseo
  english_pob_reading: Kept implicit as in the Hebrew, without specifying angels or divine hosts in the main text.
  chosen_spanish_reading: Se mantiene implícito quiénes son los que están con nosotros.
  alternative_spanish_readings:
  - Los ángeles están con nosotros
  - El ejército celestial está con nosotros
  rationale: Ni el hebreo ni la línea inglesa nombran aquí al grupo invisible; el contexto narrativo posterior lo aclara, pero no debe importarse a la traducción del versículo. La versión española conserva esa reserva y no añade contenido explicativo al texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se sigue el estado de revisión más reciente con acuerdo alto y sin cambios necesarios; la redacción española conserva la cautela del texto hebreo y la alternativa léxica documentada para la construcción comparativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiere; en este versículo no aparece el nombre divino.
  - Se mantiene el pronombre de primera persona plural «nosotros» para reproducir el contraste inclusivo del hebreo.
  - Se conserva una sintaxis directa y bíblica, pero con español natural, evitando calcos innecesarios.
