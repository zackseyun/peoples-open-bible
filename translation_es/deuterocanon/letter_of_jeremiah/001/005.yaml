revisions:
- from: 'Cuando vean una multitud delante de ellos y detrás de ellos, postrada[a] ante ellos, digan en su mente: «A ti te corresponde adorar, Maestro».'
  to: 'Cuando vean una multitud delante de ellos y detrás de ellos postrándose[a] ante ellos, digan en su mente: «A ti se te debe adorar, Soberano».'
  rationale: Se corrige la construcción participial para reflejar fielmente el griego y sonar natural en español; se ajusta δεῖ a una expresión de obligación general («se te debe adorar»); y se reemplaza «Maestro» por «Soberano» para representar mejor Δέσποτα en vocativo divino sin confundirlo con κύριος. También se pule la nota léxica para español idiomático.
