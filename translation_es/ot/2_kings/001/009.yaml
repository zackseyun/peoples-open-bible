revisions:
- from: 'Entonces envió a él un capitán de cincuenta con sus cincuenta[a]. Él subió a donde estaba él, y he aquí, estaba sentado en la cima del monte. Le habló: “Hombre de Dios, el rey ha hablado[b]: ‘Desciende’”.'
  to: 'Entonces le envió un capitán de cincuenta con sus cincuenta hombres. Este subió hacia él, y he aquí, él estaba sentado en la cima del monte[a]. Le habló: «Hombre de Dios, el rey dice[b]: “Baja”».'
  rationale: Se corrigió el anclaje de la nota topográfica para que corresponda a הַר; se alineó la fórmula real con la decisión principal de la POB («el rey dice») y se dejó el literal en nota; se mejoró la naturalidad del español («le envió», «subió hacia él», «cincuenta hombres») y se normalizó la puntuación del discurso directo.
