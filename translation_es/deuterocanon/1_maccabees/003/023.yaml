translation:
  language: es
  text: Y cuando terminó de hablar, cargó de repente contra ellos[a], y Serón y su campamento[b] fueron aplastados delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se lanzó sobre ellos» / «arremetió contra ellos»; el verbo griego implica un ataque repentino y violento.
    reason: lexical_alternative
  - marker: b
    text: «Su campamento» también puede entenderse en sentido más amplio como «su ejército» o «su fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἐπαύσατο λαλῶν
  english_pob_choice: And when he stopped speaking
  chosen_spanish: Y cuando terminó de hablar
  alternatives_spanish:
  - Y cuando dejó de hablar
  - Y al terminar de hablar
  - Y cuando cesó de hablar
  lexicon: LSJ
  rationale: La secuencia inmediata del griego se expresa de modo natural con «terminó de hablar», conservando la relación temporal sin agregar explicación.
- source_word: ἐνήλατο
  english_pob_choice: charged at
  chosen_spanish: cargó contra
  alternatives_spanish:
  - se lanzó sobre
  - arremetió contra
  - atacó
  lexicon: LSJ
  rationale: El verbo transmite una acometida súbita y agresiva; «cargó contra» conserva el impulso marcial del pasaje en español claro.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: at them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  lexicon: LSJ
  rationale: Con un verbo de ataque, «contra» expresa mejor la dirección hostil del movimiento.
- source_word: ἄφνω
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: LSJ
  rationale: «De repente» comunica con naturalidad la brusquedad del adverbio griego.
- source_word: συνετρίβη
  english_pob_choice: were crushed
  chosen_spanish: quedaron quebrantados
  alternatives_spanish:
  - fueron aplastados
  - fueron quebrados
  - quedaron destruidos
  lexicon: LSJ
  rationale: El pasivo sugiere ser roto o aplastado; «quedaron quebrantados» conserva la imagen de ruina y derrota sin perder claridad en español.
- source_word: Σήρων
  english_pob_choice: Seron
  chosen_spanish: Serón
  alternatives_spanish:
  - Seron
  lexicon: transliteration
  rationale: Se usa la forma castellana común «Serón» para el nombre propio griego, manteniendo la referencia inequívoca al personaje.
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su ejército
  - su fuerza
  - su hueste
  lexicon: LSJ
  rationale: «Campamento» conserva la imagen concreta de la fuerza militar en su disposición campamental, acorde con el contexto narrativo.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: La expresión idiomática se vierte de forma directa y natural como «delante de él», manteniendo el sentido de confrontación inmediata.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (1909) y coincide en sustancia con el audit trail inglés; se ajustó a un español natural, manteniendo la secuencia inmediata, la súbita acometida y la imagen militar de la derrota.
  spanish_consistency_notes:
  - Se prefirió «Serón» como transliteración castellana consistente del nombre Σήρων.
  - Se evitó suavizar συνετρίβη como simple «derrotados» para conservar la fuerza imagética de «quebrantados».
  - «Campamento» se mantuvo en singular para reflejar la frase griega ἡ παρεμβολὴ αὐτοῦ.
