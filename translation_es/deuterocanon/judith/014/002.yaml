    text: 'O: «un comandante» o «un líder». El griego ἀρχηγός puede denotar una cabeza, jefe o comandante.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Assur» es una traducción literal de la expresión griega; se refiere a los asirios.
    reason: cultural_note
  revision_rationale: Se ajustó la sintaxis para que el español refleje con más naturalidad la instrucción distributiva del griego y mantenga mejor la coherencia con el resto de los verbos. Se reemplazó «les pondrán un jefe» por «nombrarán un jefe sobre ellos» para representar con mayor precisión ἀρχηγός y δώσετε. También se elevó «hombre fuerte» a «hombre poderoso» para alinearse mejor con la revisión auditada en inglés («mighty man») y conservar un tono más formal.
