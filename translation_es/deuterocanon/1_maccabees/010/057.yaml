  source_alignment_summary: 'El borrador español refleja fielmente el griego: ἐξῆλθεν = «salió de», αὐτὸς καὶ Κλεοπάτρα ἡ θυγάτηρ αὐτοῦ = «él y Cleopatra su hija», ἦλθεν εἰς Πτολεμαΐδα = «llegó a Ptolemaida», y la fórmula cronológica se comprime correctamente como «en el año ciento sesenta y dos». La nota sobre la era seléucida corresponde bien al rastro inglés y no introduce interpretación en el texto principal.'
