translation:
  language: es
  text: Porque mi pueblo me ha olvidado; queman incienso a lo vacío[a]. Han tropezado en sus caminos, en las sendas antiguas, para andar por desvíos[d][c][b], por un camino no nivelado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «a la vanidad», «a lo falso» o «a los ídolos». El hebreo dice «a lo vacío / a la falsedad», un término que a menudo se usa para culto sin valor.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo permite una lectura activa: «ellos los hicieron tropezar en sus caminos, en las sendas antiguas».'
    reason: alternative_reading
  - marker: c
    text: «Sendas antiguas» evoca la imagen recurrente de Jeremías del camino establecido por Dios; compárese Jeremías 6:16.
    reason: cross_reference
  - marker: d
    text: También puede traducirse «senderos laterales», «veredas» o «senderos secundarios».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁכֵחֻנִי
  english_pob_choice: have forgotten me
  chosen_spanish: me ha olvidado
  alternatives_spanish:
  - me ha dejado de lado
  - me ha descuidado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción consumada con efecto presente. «Olvidado» conserva el valor relacional y de pacto del texto sin suavizarlo a una mera omisión ocasional.
- source_word: לַשָּׁוְא
  english_pob_choice: to emptiness
  chosen_spanish: para lo vacío
  alternatives_spanish:
  - para la vanidad
  - para lo falso
  - en vano
  lexicon: HALOT
  rationale: שָׁוְא abarca vacío, falsedad y vanidad. «Para lo vacío» mantiene la abstracción del hebreo y evita especificar «ídolos», que es inferencia contextual pero no el sustantivo explícito.
- source_word: יְקַטֵּרוּ
  english_pob_choice: they burn incense
  chosen_spanish: queman incienso
  alternatives_spanish:
  - ofrecen incienso
  - hacen humear ofrendas
  lexicon: HALOT
  rationale: El piel de קטר describe la acción de quemar incienso/ofrecer humo. «Queman incienso» es la equivalencia natural y precisa en español.
- source_word: וַיַּכְשִׁלוּם
  english_pob_choice: they have stumbled
  chosen_spanish: han tropezado
  alternatives_spanish:
  - los hicieron tropezar
  - los hicieron caer
  lexicon: HALOT
  rationale: El verbo puede leerse causativamente, pero el audit trail revisó la inglesa a una forma no pasiva para no añadir un agente no explícito. En español, «han tropezado» conserva el resultado y la concisión del hebreo.
- source_word: בְּדַרְכֵיהֶם
  english_pob_choice: in their ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en sus sendas
  - en su proceder
  lexicon: HALOT
  rationale: «Caminos» reproduce la imagen conductual y funciona bien con el paralelismo del verso. Mantiene la metáfora de vida/andar presente en el hebreo.
- source_word: שְׁבִילֵי עוֹלָם
  english_pob_choice: the ancient paths
  chosen_spanish: las sendas antiguas
  alternatives_spanish:
  - los senderos antiguos
  - los caminos de antaño
  - las sendas perpetuas
  lexicon: HALOT
  rationale: La expresión alude a trayectorias establecidas desde antiguo. «Sendas antiguas» sigue de cerca la fórmula del audit trail y conserva el eco jeremiano de un camino ya trazado.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para ir
  lexicon: HALOT
  rationale: En imágenes de camino, הלך suele expresar conducta y desplazamiento. «Andar» es natural en español y mantiene el paralelismo verbal del texto.
- source_word: נְתִיבוֹת
  english_pob_choice: side roads
  chosen_spanish: desvíos
  alternatives_spanish:
  - bypasses
  - sendas laterales
  - veredas
  lexicon: HALOT
  rationale: El término puede denotar caminos secundarios o veredas. «Desvíos» comunica en español contemporáneo la idea de rutas desviadas respecto al camino principal, sin perder el matiz de lateralidad.
- source_word: דֶּרֶךְ לֹא סְלוּלָה
  english_pob_choice: a road not built up
  chosen_spanish: por un camino no nivelado
  alternatives_spanish:
  - por un camino no preparado
  - por un camino no allanado
  - por una calzada no construida
  lexicon: HALOT
  rationale: סלל alude a apisonar, allanar o levantar un camino. «No nivelado» preserva la imagen física de un camino no preparado para transitar, en español claro y sin arcaísmo.
theological_decisions:
- issue: Sentido de לַשָּׁוְא y su carga idolátrica
  english_pob_reading: Render generically as 'emptiness' rather than explicitly 'idols.'
  chosen_spanish_reading: Traducirlo de forma genérica como «lo vacío» en vez de «ídolos».
  alternative_spanish_readings:
  - a los ídolos
  - a la vanidad
  - a lo falso
  rationale: El hebreo no nombra un objeto idolátrico concreto; usa un sustantivo amplio para falsedad/vaciedad. La versión española conserva esa amplitud y deja que el contexto cargue la crítica contra el culto vano.
  doctrine_reference: Translation philosophy §1, §3
- issue: Agencia en וַיַּכְשִׁלוּם
  english_pob_reading: Use passive English ('they have been made to stumble') revised to 'they have stumbled.'
  chosen_spanish_reading: 'Usar una forma intransitiva: «han tropezado».'
  alternative_spanish_readings:
  - los hicieron tropezar
  - han sido hechos tropezar
  rationale: La revisión inglesa optó por no introducir un agente no explícito. En español, «han tropezado» sigue esa decisión y mantiene la ambigüedad del sujeto implícito sin forzar causalidad externa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente del audit trail cambió la solución pasiva por una intransitiva en inglés para ajustarse mejor a la forma verbal y evitar añadir un agente no explícito. La propuesta española sigue esa revisión y además conserva la imagen de camino/senda del hebreo, con un equivalente natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Mesías/Cristo» no aplica aquí.
  - 'Se conservó la red de metáforas de camino: caminos, sendas antiguas, desvíos, camino no nivelado.'
  - «Lo vacío» retiene la amplitud semántica de שָׁוְא sin explicitar idolatría en el texto principal.
