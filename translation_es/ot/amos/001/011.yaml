base_translation:
  language: en
  yaml_path: translation/ot/amos/001/011.yaml
  text: 'Thus says Yahweh: “For three transgressions of Edom[a], and for four, I will not revoke its punishment, because he pursued his brother with the sword and destroyed his compassion; his anger tore continually[c][b], and he kept his wrath forever.”'
  footnotes:
  - marker: a
    text: Or, 'I will not turn it back,' that is, I will not reverse the announced judgment.
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' likely evokes Edom''s kinship with Israel through Esau and Jacob.'
    reason: cross_reference
  - marker: c
    text: Or, 'he tore perpetually in his anger, and kept his wrath forever.' The Hebrew uses vivid predatory imagery.
    reason: lexical_alternative
