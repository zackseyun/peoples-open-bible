translation:
  language: es
  text: Los aventé con un bieldo en las puertas del país[a]; dejé sin hijos, destruí a mi pueblo; no se volvieron de sus caminos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las puertas de la tierra». El hebreo puede significar «país» o «tierra»; aquí «país» encaja mejor con el contexto inmediato de juicio sobre Judá.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se arrepintieron de sus caminos». El hebreo dice «volver(se)/regresar», que en contextos proféticos puede llevar el sentido de arrepentimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶזְרֵם
  english_pob_choice: I winnowed them
  chosen_spanish: Los aventé
  alternatives_spanish:
  - Los zarandeé
  - Los aventé como grano
  lexicon: HALOT
  rationale: La imagen agrícola de זרה es la de aventar o separar el grano con aire. «Aventé» conserva el gesto verbal de dispersión/aventado sin convertirlo en una paráfrasis explicativa.
- source_word: בְּמִזְרֶה
  english_pob_choice: with a winnowing fork
  chosen_spanish: con un aventador
  alternatives_spanish:
  - con una horquilla de aventar
  - con un bieldo
  lexicon: HALOT
  rationale: מִזְרֶה designa un instrumento para aventar. «Aventador» es claro en español y mantiene la concreción del implemento; evita un tecnicismo menos transparente.
- source_word: בְּשַׁעֲרֵי הָאָרֶץ
  english_pob_choice: at the gates of the land
  chosen_spanish: en las puertas de la tierra
  alternatives_spanish:
  - en las puertas de la tierra/país
  - en las puertas del país
  lexicon: HALOT
  rationale: Conservo «puertas» como imagen literal de שַׁעֲרֵי. Opto por «tierra» porque el contexto inmediato es el juicio sobre Judá, aunque el hebreo admite también «tierra/país» y, en otro marco, «tierra» en sentido más amplio.
- source_word: שִׁכַּלְתִּי
  english_pob_choice: I bereaved
  chosen_spanish: dejé sin hijos
  alternatives_spanish:
  - esterilicé
  - causé duelo
  lexicon: HALOT
  rationale: שׁכל puede expresar hacer quedar sin hijos o causar bereavement. «Dejé sin hijos» mantiene la fuerza concreta del verbo y resulta natural en español, sin suavizar el juicio.
- source_word: אִבַּדְתִּי
  english_pob_choice: I destroyed
  chosen_spanish: destruí
  alternatives_spanish:
  - arruiné
  - hice perecer
  lexicon: HALOT
  rationale: אבד en causativo transmite destrucción/perdición. «Destruí» es directo y mantiene la severidad del enunciado divino.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: La expresión de pertenencia pactual se conserva literalmente con «mi pueblo». El acusativo se naturaliza en español con preposición por fluidez.
- source_word: מִדַּרְכֵיהֶם
  english_pob_choice: from their ways
  chosen_spanish: de sus caminos
  alternatives_spanish:
  - de su manera de vivir
  - de su conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino literal o conducta. «Caminos» mantiene la imagen hebrea y deja abierta la dimensión moral sin explicitarla de más.
- source_word: לֹא שָׁבוּ
  english_pob_choice: they did not turn back
  chosen_spanish: no se volvieron
  alternatives_spanish:
  - no retornaron
  - no se arrepintieron
  lexicon: HALOT
  rationale: שׁוּב significa volver/retornar y, en profetas, puede insinuar arrepentimiento. «No se volvieron» conserva el movimiento básico y deja visible la tensión entre retorno físico/metafórico y arrepentimiento, sin resolverla en el texto principal.
theological_decisions:
- issue: Si explicitar שׁוּב como arrepentimiento
  english_pob_reading: they did not turn back from their ways
  chosen_spanish_reading: no se volvieron de sus caminos
  alternative_spanish_readings:
  - no se arrepintieron de sus caminos
  - no regresaron de sus caminos
  rationale: El hebreo permite un sentido penitencial, pero el enunciado conserva la imagen de volver/retornar. Mantener esa forma preserva la tensión profética y evita fijar en el texto principal una lectura más estrecha que la del original.
  doctrine_reference: Principio POB de conservar la tensión lexical y teológica cuando el hebreo la deja abierta.
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del POB inglés, que sustituyó el guion antes de la cláusula final por un punto y coma. En español se mantuvo una puntuación formal equivalente: punto y coma entre las cláusulas principales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton en la forma preservada aquí.
  - «Caminos» conserva la metáfora hebrea de דֶּרֶךְ sin forzar un equivalente doctrinal.
  - «No se volvieron» preserva la ambigüedad entre retorno literal y arrepentimiento profético, en línea con la POB inglesa.
