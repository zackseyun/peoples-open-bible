  text: πάλιν ἀπέστειλεν ἄλλους δούλους λέγων· Εἴπατε τοῖς κεκλημένοις· Ἰδοὺ τὸ ἄριστόν μου ⸀ἡτοίμακα, οἱ ταῦροί μου καὶ τὰ σιτιστὰ τεθυμένα, καὶ πάντα ἕτοιμα· δεῦτε εἰς τοὺς γάμους.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/004.yaml
  text: Again he sent other slaves[a], saying, ‘Tell those who have been invited, “Look, I have prepared my dinner; my oxen and my fattened cattle have been slaughtered, and everything is ready[c][b]. Come to the wedding feast.”’
  footnotes:
  - marker: a
    text: Or “other servants.” The Greek word is doulous, which can mean either “servants” or “slaves” depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “my banquet” for “my dinner”; the Greek refers to a prepared meal.
    reason: lexical_alternative
  - marker: c
    text: Or simply “to the wedding”; the Greek plural can refer to the wedding celebrations as a whole.
    reason: lexical_alternative
translation:
  language: ko
  text: 그가 다시 다른 종들을 보내며 말하였습니다, 「초대받은 자들에게 일러라, ʻ보라, 내가 잔치를 다 차려 놓았으니, 황소와 살진 짐승들을 잡았고 모든 것이 준비되었다. 혼인 잔치에 오너라.ʼ」
  philosophy: optimal-equivalence
