  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales requieren un leve ajuste: εὐτολμίας mejor como ‘valentía’ o ‘audacia’ contextual; κατεῖρασεν mejor como ‘atacó’; διὰ μεθόδων debe conservar ‘por estratagemas’.'
