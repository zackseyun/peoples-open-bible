translation:
  language: es
  text: Hizo lo recto a los ojos de Yahvé, y anduvo en todo el camino de David, su padre[a], y no se desvió ni a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su padre» reproduce el hebreo dinástico; aquí «padre» puede significar antepasado o antecesor de la dinastía, no necesariamente padre inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Hizo entonces
  lexicon: HALOT
  rationale: El verbo עשׂה aquí introduce la acción evaluada del rey; en español, «hizo» preserva la narración sin sobrecargar con una conjunción inicial innecesaria.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo que era recto
  - lo justo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado expresa evaluación moral. «Lo recto» es natural en español y mantiene la idea de conducta correcta sin desplazarla hacia un juicio más jurídico que el del hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de evaluación. La forma «a los ojos de» reproduce el valor relacional y evaluativo del giro, con el nombre divino «Yahvé» según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente español establecido para el Tetragrámaton en el texto principal, evitando el reemplazo por un título genérico.
- source_word: וַיֵּלֶךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - andaba
  lexicon: HALOT
  rationale: En el contexto moral de «camino», «anduvo» preserva la metáfora bíblica de conducta sostenida mejor que un simple «fue» o «caminó».
- source_word: בְּכָל דֶּרֶךְ
  english_pob_choice: in all the way
  chosen_spanish: en todo el camino
  alternatives_spanish:
  - en cada camino
  - en toda la senda
  lexicon: HALOT
  rationale: La expresión singular con «todo» se conserva como metáfora de conformidad completa al modelo. «Camino» mantiene el valor conductual del hebreo.
- source_word: דָּוִד אָבִיו
  english_pob_choice: David his father
  chosen_spanish: de David su padre
  alternatives_spanish:
  - de su padre David
  - de David, su padre
  lexicon: HALOT
  rationale: Se mantiene el giro dinástico del original. En español, el posesivo pospuesto evita ambigüedad y conserva la relación textual, mientras que el sentido ancestral queda implícito como en el hebreo.
- source_word: וְלֹא סָר
  english_pob_choice: and he did not turn aside
  chosen_spanish: y no se desvió
  alternatives_spanish:
  - y no se apartó
  - y no torció
  lexicon: HALOT
  rationale: סור comunica apartarse del camino correcto; «se desvió» es idiomático en español y retiene la metáfora direccional.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - ni hacia la derecha ni hacia la izquierda
  - ni a diestra ni a siniestra
  lexicon: HALOT
  rationale: La fórmula fija expresa no apartarse en ninguna dirección. «Ni a la derecha ni a la izquierda» es claro, bíblico y fiel al paralelismo hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre propio divino en español como «Yahvé», no un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el registro auditado en inglés, pero ajusta la sintaxis para español natural: «Hizo lo recto» en lugar de una calca más pesada, conserva el paralelismo «no se desvió ni a la derecha ni a la izquierda», y mantiene el nombre divino como «Yahvé» según la política del proyecto.'
  spanish_consistency_notes:
  - Se conserva la metáfora de «camino» para coherencia con otros pasajes de evaluación moral.
  - Se evita sustituir «Yahvé» por «SEÑOR» para mantener transparencia textual.
  - «Lo recto» y «se desvió» mantienen el campo semántico moral-direccional del hebreo.
  - La nota sobre «padre» aclara el sentido dinástico sin alterar el cuerpo del verso.
