translation:
  text: And on that day Michael answered[a], saying to Raphael, “The power of the spirit seizes me and provokes me to anger because of the severity of the judgment concerning the hidden secrets. Who is there that can endure the severe judgment that has been executed[c][b], and before which they melt away?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez text of this line is difficult, and the clause rendered 'because of the severity of the judgment concerning these hidden things' may also be understood more literally as a terrible matter 'for the ear' concerning hidden things.
    reason: textual_variant
  - marker: b
    text: Or 'who can bear the severe thing that has been done?' The wording may refer either to the judgment itself or to the revelation of it.
    reason: lexical_alternative
  - marker: c
    text: Or 'drives me on'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ
  chosen: answered
  alternatives:
  - spoke
  - responded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative verb for replying or speaking in response; 'answered' preserves the dialogic setting with the following indirect quotation.
- source_word: ኀይሉ
  chosen: the power
  alternatives:
  - strength
  - force
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes active force or might. 'Power' best fits the overwhelming inner compulsion described in the clause.
- source_word: መንፈስ
  chosen: the spirit
  alternatives:
  - wind
  - breath
  - Spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary context the term most naturally refers to spirit rather than literal wind or breath. Lowercase is retained because the text does not clearly identify the referent as the divine Spirit.
- source_word: ይመሥጠኒ
  chosen: seizes me
  alternatives:
  - snatches me
  - draws me
  - compels me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forceful taking or gripping. 'Seizes me' preserves the vivid, overpowering sense appropriate to apocalyptic speech.
- source_word: ያምዕዐኒ
  chosen: drives me on
  alternatives:
  - agitates me
  - troubles me
  - impels me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs describe inward overpowering and disturbance. 'Drives me on' captures forceful inner propulsion without reducing it to mere emotion.
- source_word: ዕፁቡ
  chosen: the severity
  alternatives:
  - the terror
  - the hardness
  - the awfulness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote something grievous, harsh, or terrible. 'Severity' fits the judicial context and avoids over-specifying emotional terror.
- source_word: እንተ ኅቡኣት
  chosen: these hidden things
  alternatives:
  - the hidden things
  - the secret things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to concealed matters now under discussion in the revelation. 'Hidden things' is transparent and apocalyptic in tone.
- source_word: ተዐግሦተ
  chosen: endure
  alternatives:
  - bear
  - withstand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is capacity to bear up under something overwhelming. 'Endure' is idiomatic in English and suits the rhetorical question.
- source_word: ተገብረት
  chosen: has been carried out
  alternatives:
  - has been done
  - has been executed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/perfect sense indicates a judgment already effected or enacted. 'Has been carried out' makes the judicial nuance explicit without overtranslation.
- source_word: ይትመሰዉ
  chosen: they melt away
  alternatives:
  - they dissolve
  - they are consumed
  - they vanish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests wasting away or dissolving before overwhelming judgment. 'Melt away' preserves the vivid apocalyptic imagery.
