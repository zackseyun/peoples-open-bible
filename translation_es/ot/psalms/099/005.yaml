revisions:
- from: Exalten a Yahvé nuestro Dios[a], y póstrense ante su estrado[b]; santo es él.
  to: Exalten a Yahvé nuestro Dios, y póstrense ante su escabel[a]; santo es él.[b]
  rationale: Se corrige el anclaje de la nota lexical alternativa para que recaiga sobre la frase preposicional pertinente y se sustituye «estrado» por «escabel», que representa con mayor precisión la imagen de הֲדֹם (‘footstool’) en español eclesial legible. Se añade la marca [b] al cierre de la cláusula del escabel para que la nota cultural quede correctamente vinculada al término explicado.
