translation:
  language: es
  text: El ángel de Yahvé acampa alrededor de los que le temen[a] y los rescata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». El hebreo מַלְאַךְ puede significar «mensajero» o «ángel», aunque aquí «ángel» es el sentido más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹנֶה
  english_pob_choice: encamps
  chosen_spanish: acampa
  alternatives_spanish:
  - se acampa
  - pone su campamento
  - establece su campamento
  lexicon: HALOT
  rationale: El participio qal de חנה expresa la imagen de acampar. «Acampa» conserva en español la fuerza de presencia protectora y la imagen militar/campamental sin volverlo explicativo.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «mensajero» o «ángel», pero en este contexto la lectura sobrenatural es la más natural. Se mantiene «ángel» como equivalente directo y «Yahvé» para el nombre divino, conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se translitera el Tetragrámaton como «Yahvé» para preservar el nombre personal de Dios, en lugar de sustituirlo por un título.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: La preposición/adverbio indica posición circundante. «Alrededor de» es natural en español y conserva la idea protectora del hebreo.
- source_word: לִירֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: de los que le temen
  alternatives_spanish:
  - de los que lo reverencian
  - de sus temerosos
  lexicon: HALOT
  rationale: La expresión hebrea designa a personas caracterizadas por temer reverencialmente a Yahvé. «Le temen» conserva el idiomatismo bíblico y el matiz relacional del objeto pronominal.
- source_word: וַיְחַלְּצֵם
  english_pob_choice: and rescues them
  chosen_spanish: y los rescata
  alternatives_spanish:
  - y los libra
  - y los saca de allí
  lexicon: HALOT
  rationale: El verbo חלץ en este contexto significa sacar, librar, rescatar. «Rescata» es claro en español y reproduce bien la acción salvadora del verso.
theological_decisions:
- issue: Cómo renderizar מַלְאַךְ יְהוָה sin resolver de antemano su identidad teológica más amplia.
  english_pob_reading: Render as 'the angel of Yahweh' without specifying further identity.
  chosen_spanish_reading: «el ángel de Yahvé» sin precisar más su identidad.
  alternative_spanish_readings:
  - «el mensajero de Yahvé»
  - una figura teofánica/cristofánica
  rationale: El texto hebreo permite la ambigüedad entre «mensajero» y «ángel», aunque el sentido más probable aquí es el celestial. La traducción mantiene esa tensión sin imponer una identificación doctrinal no explicitada por el verso.
  doctrine_reference: Preservar la tensión teológica y no resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en su último repaso; la redacción española sigue esa misma lectura estable, con adaptación léxica natural al español y preservando la ambigüedad de מַלְאַךְ señalada en el aparato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el criterio del proyecto y con la decisión inglesa de no mascarar el Tetragrámaton.
  - «Ángel» se conserva por la lectura más probable del contexto; la nota mantiene viva la alternativa «mensajero» sin sobrecargar el texto principal.
  - «Acampa» y «rescata» sostienen la imagen de protección activa del verso sin añadir interpretación posterior.
