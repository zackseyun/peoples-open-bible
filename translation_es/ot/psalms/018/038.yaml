translation:
  language: es
  text: Perseguí a mis enemigos y los alcancé, y no volví atrás hasta que fueron consumidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta su consumación» o «hasta que su destrucción fue completa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרְדּוֹף
  english_pob_choice: I pursued
  chosen_spanish: Perseguí
  alternatives_spanish:
  - Persigo
  - Perseguiré
  lexicon: HALOT
  rationale: Es el qal imperfecto de רדף, pero en el contexto poético narrativo expresa una acción pasada; el pretérito español comunica mejor la secuencia de victoria sin forzar un valor futuro.
- source_word: א֭וֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis foes
  - los que me eran hostiles
  lexicon: HALOT
  rationale: אויב con sufijo de primera persona se corresponde de manera natural con 'enemigos'; mantiene el sentido adversarial y es idiomático en español.
- source_word: וְאַשִּׂיגֵם
  english_pob_choice: and overtook them
  chosen_spanish: y los alcancé
  alternatives_spanish:
  - y los alcanzé
  - y di alcance a ellos
  lexicon: HALOT
  rationale: El hiphil de נשׂג aquí expresa alcanzar/overtake en una persecución; 'los alcancé' conserva la imagen militar y funciona con el paralelo 'perseguí'.
- source_word: וְלֹא אָשׁוּב
  english_pob_choice: and I did not turn back
  chosen_spanish: y no volví
  alternatives_spanish:
  - y no me volví atrás
  - y no regresé
  lexicon: HALOT
  rationale: En este contexto שוב no es simple retorno espacial, sino cesar la persecución. 'No volví' es breve y natural; la idea de no volver atrás queda implícita en el contexto de persecución.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - mientras
  lexicon: HALOT
  rationale: Marca el límite temporal de la acción; 'hasta' preserva la relación de duración y meta final.
- source_word: כַּלּוֹתָם
  english_pob_choice: they were consumed
  chosen_spanish: consumirlos
  alternatives_spanish:
  - ser consumidos
  - quedaran consumidos
  - destruirlos por completo
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo puede expresar 'su consumación/completamiento' sin agente explícito. En español, 'consumirlos' conserva el verbo de la línea inglesa revisada y el matiz de total consumación sin añadir un sujeto no expresado en el hebreo.
theological_decisions:
- issue: Violencia y agente implícito en la cláusula final
  english_pob_reading: Preserve the endpoint of total defeat without softening the military violence or adding a more explicit agent than the Hebrew supplies.
  chosen_spanish_reading: Mantener la idea de consumación total del enemigo mediante una forma verbal directa, sin añadir un sujeto explícito ni suavizar la dureza del verso.
  alternative_spanish_readings:
  - y no volví hasta que fueron consumidos
  - y no volví hasta destruirlos por completo
  rationale: El salmo celebra una victoria concedida por Dios; el hebreo presenta la culminación de la derrota con כלה pero deja implícito el agente. 'Consumirlos' conserva la fuerza del texto y evita sobreinterpretar la sintaxis.
  doctrine_reference: 'Principio POB: equivalencia óptima con respeto al sentido llano y a la agencia implícita del texto fuente.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que prefirió 'were consumed' frente a una expresión más idiomática pero menos cercana al hebreo. En español, se optó por 'consumirlos' para conservar el mismo registro formal y la imagen de consumación total.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma de referencia divina cuando aparezca el nombre propio; en este versículo no se presenta.
  - Se mantiene un registro sobrio y poético, evitando calcos innecesarios pero sin ampliar el contenido del hebreo.
  - La nota a pie conserva la alternativa lexical principal documentada por el audit trail inglés.
