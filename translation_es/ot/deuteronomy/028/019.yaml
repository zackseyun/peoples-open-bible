translation:
  language: es
  text: Maldito[a] serás cuando entres, y maldito[a] serás cuando salgas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «al entrar ... al salir»; es un modismo hebreo que abarca todo el curso de la vida cotidiana.
    reason: cultural_note
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldito
  - maldecido
  lexicon: HALOT
  rationale: El hebreo es una forma pasiva/adjetival de la raíz 'maldecir', con sentido de estar bajo maldición. En español, 'maldito' expresa con naturalidad ese estado y conserva el tono de sanción del pacto. 'Maldecido' suena menos idiomático en este contexto y puede sonar más marcado como participio verbal que como fórmula de estado.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: serás
  alternatives_spanish:
  - serás tú
  - estarás
  lexicon: HALOT
  rationale: El hebreo usa segunda masculina singular; en español esa singularidad ya queda marcada por la forma verbal 'serás'. Se evita añadir 'tú' porque el paralelismo y la cadencia del hebreo no lo requieren.
- source_word: בְּבֹאֶךָ
  english_pob_choice: when you come in
  chosen_spanish: cuando entres
  alternatives_spanish:
  - cuando llegues
  - en tu entrar
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'en tu entrar', pero en español la equivalencia natural y fiel es 'cuando entres'. Mantiene el valor idiomático de movimiento de entrada sin volverlo rígido o artificial.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción פשוטamente coordina los dos miembros paralelos. 'Y' es la forma neutra y directa; 'e' no es necesaria porque la siguiente palabra no comienza con sonido /i/.
- source_word: בְּצֵאתֶךָ
  english_pob_choice: when you go out
  chosen_spanish: cuando salgas
  alternatives_spanish:
  - cuando salgas afuera
  - en tu salir
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el primer miembro y el valor idiomático de la expresión hebrea. 'Cuando salgas' es natural, breve y suficientemente cercano al original para expresar la merisma de entrada/salida.
theological_decisions:
- issue: Fórmula de maldición del pacto con paralelismo enfático
  english_pob_reading: Cursed shall you be when you come in, and cursed shall you be when you go out.
  chosen_spanish_reading: Maldito serás cuando entres, y maldito serás cuando salgas.
  alternative_spanish_readings:
  - Serás maldito cuando entres, y serás maldito cuando salgas.
  - Maldecido serás cuando entres, y maldecido serás cuando salgas.
  rationale: El hebreo antepone la maldición en cada cola para dar énfasis solemne. En español, 'maldito serás' conserva mejor ese arranque enfático y el tono formular del texto que 'serás maldito', sin perder claridad. Se mantiene la severidad de la sanción pactual sin suavizarla ni interpretarla alegóricamente.
  doctrine_reference: Sanciones del pacto en Deuteronomio 28; equivalencia formal con cadencia solemne y énfasis sintáctico.
- issue: Merismo 'entrar/salir' como totalidad de la vida cotidiana
  english_pob_reading: Literally, 'in your coming in ... in your going out,' a Hebrew idiom covering the whole course of daily life.
  chosen_spanish_reading: entres / salgas dentro de una fórmula idiomática que abarca toda la vida cotidiana
  alternative_spanish_readings:
  - entrar y salir como expresión de toda la vida
  - en todo lo que hagas
  rationale: 'El texto español principal mantiene el modismo sin explicarlo dentro del versículo para no romper la forma poética/jurídica. La nota preserva la explicación semántica: la expresión hebrea funciona como merismo para toda la actividad diaria, no solo para desplazamientos físicos.'
  doctrine_reference: Retórica hebrea; merismo bíblico en fórmulas de totalidad.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y el audit trail inglés: preserva la duplicación enfática de אָרוּר, mantiene el paralelismo de la merisma ''entrar/salir'' y evita una traducción mecánica desde el inglés cuando el español puede expresar mejor el mismo valor idiomático. No se detectaron revisiones previas que alteren la presente propuesta.'
  spanish_consistency_notes:
  - Se usa 'maldito' para אָרוּר por ser el equivalente español más natural y fuerte en contexto de maldición pactual.
  - Se conserva el paralelismo con dos miembros casi idénticos, como en el hebreo.
  - La nota al pie explica el modismo sin trasladar la explicación al cuerpo principal, para mantener el tono oracular/jurídico.
  - No se introduce 'SEÑOR' ni terminología no presente en el versículo.
