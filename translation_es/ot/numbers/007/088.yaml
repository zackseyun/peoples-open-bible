translation:
  language: es
  text: Y todo el ganado para el sacrificio de paz[a] fue veinticuatro toros, sesenta carneros, sesenta machos cabríos y sesenta corderos de un año. Esta fue la dedicación del altar después de que fue ungido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sacrificio de las ofrendas de comunión» o «el sacrificio de las ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And all
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y la totalidad de
  - Todo
  lexicon: HALOT
  rationale: Conserva el valor conectivo de וְ y la idea de totalidad de כֹל. En español, 'Y todo' fluye de manera natural al introducir el resumen final de esta clase de ofrendas.
- source_word: בְּקַר
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado vacuno
  - los animales bovinos
  lexicon: HALOT
  rationale: El hebreo es un colectivo para animales bovinos. 'Ganado' preserva el sentido colectivo y evita restringir demasiado el término antes de la enumeración específica de toros.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de los sacrificios de paz
  alternatives_spanish:
  - el sacrificio de las ofrendas de paz
  - el sacrificio de comunión
  - el sacrificio de bienestar
  lexicon: HALOT
  rationale: 'Se mantiene la estructura cultual del hebreo: זֶבַח + הַשְּׁלָמִים. ''Sacrificios de paz'' conserva la terminología bíblica tradicional sin sustituirla por una paráfrasis interpretativa. La repetición ''sacrificio de los sacrificios'' refleja la construcción del original y evita borrar la categoría técnica de שְׁלָמִים.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  english_pob_choice: twenty-four
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - '24'
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de explicación adicional.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: En contexto sacrificial, פָּרִים denota bovinos machos; 'toros' es un equivalente natural y digno en español que conserva la fuerza del término mejor que 'bueyes', y no introduce la idea de inmadurez que sugeriría 'novillos'.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos
  - ovejas macho
  lexicon: HALOT
  rationale: '''Carneros'' es el equivalente español estándar para machos ovinos en contexto sacrificial y resulta más natural que un calco técnico.'
- source_word: עַתֻּדִים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras macho
  - he-chivos
  lexicon: HALOT
  rationale: '''Machos cabríos'' expresa con claridad el sexo del animal y mantiene el registro bíblico sin recurrir a una forma artificial.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  english_pob_choice: one-year-old lambs
  chosen_spanish: corderos de un año
  alternatives_spanish:
  - corderos de un año de edad
  - corderos añales
  lexicon: HALOT
  rationale: La frase indica animales en su primer año. 'Corderos de un año' es claro y fiel al hebreo, y evita una expresión más pesada sin perder la precisión sacrificial.
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esto fue
  - Tal fue
  lexicon: HALOT
  rationale: En español, la frase retrospectiva al cierre de la enumeración queda mejor con un demostrativo femenino que concuerda con 'dedicación'.
- source_word: חֲנֻכַּת הַמִּזְבֵּחַ
  english_pob_choice: the dedication of the altar
  chosen_spanish: la dedicación del altar
  alternatives_spanish:
  - la inauguración del altar
  - la consagración del altar
  lexicon: HALOT
  rationale: '''Dedicación'' reproduce de forma directa חֲנֻכָּה y es el término más transparente en español. Se evita ''consagración'' porque puede cargar asociaciones litúrgicas no necesarias aquí.'
- source_word: אַחֲרֵי הִמָּשַׁח אֹתוֹ
  english_pob_choice: after it had been anointed
  chosen_spanish: después de que fue ungido
  alternatives_spanish:
  - después de haber sido ungido
  - tras su ungimiento
  lexicon: HALOT
  rationale: El hebreo expresa posterioridad respecto del acto de ungir sin señalar agente. 'Después de que fue ungido' conserva la pasividad implícita y mantiene el tono narrativo natural en español.
theological_decisions:
- issue: Renderizado de שְׁלָמִים como categoría sacrificial
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de comunión
  - sacrificios de bienestar
  rationale: Se conserva una terminología cultual reconocible y cercana a la tradición bíblica en español. 'Paz' retiene la relación con שָׁלוֹם sin desplazar el sentido sacrificial específico del término.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: חֲנֻכַּת הַמִּזְבֵּחַ como acto/evento de dedicación
  english_pob_reading: the dedication of the altar
  chosen_spanish_reading: la dedicación del altar
  alternative_spanish_readings:
  - la inauguración del altar
  - la consagración del altar
  rationale: El pasaje resume el total de ofrendas asociadas con la puesta en servicio del altar. 'Dedicación' es suficientemente preciso y no añade la idea de ofrenda explícita que la revisión inglesa retiró para ajustarse mejor al hebreo.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: La redacción inglesa revisada eliminó 'offering' tras 'dedication' para ajustarse más de cerca al hebreo. La versión española sigue esa corrección y evita añadir un equivalente explícito de 'ofrenda' después de 'dedicación'. También se ha preferido 'sacrificios de paz' para reflejar el término técnico שְׁלָמִים sin depender de una explicación perifrástica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el hebreo lo exija directamente; este versículo no lo contiene.
  - Se usa 'sacrificios de paz' como equivalente consistente de שְׁלָמִים, en línea con la decisión de la POB inglesa de conservar un término sacrificial tradicional.
  - '''Ungido'' traduce el pasivo del hebreo sin introducir un sujeto no expresado.'
  - No se añade nota al pie porque las alternativas semánticas relevantes pueden quedar documentadas en los campos de decisiones léxicas y teológicas.
