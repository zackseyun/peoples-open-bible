translation:
  language: es
  text: Abren su boca contra mí, como un león[a] que despedaza y ruge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abren su boca contra mí; león que despedaza y ruge». El hebreo presenta la imagen del león de manera compacta, sin una comparación explícita con «como».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצ֣וּ
  english_pob_choice: They open
  chosen_spanish: Abren
  alternatives_spanish:
  - Han abierto
  - Abran
  - Abren de par en par
  lexicon: HALOT
  rationale: El perfecto poético hebreo se vierte con presente para dar viveza inmediata, como en el POB inglés. «Abren» conserva el valor verbal directo y suena natural en español bíblico moderno.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - a mí
  - sobre mí
  lexicon: HALOT
  rationale: El contexto es hostil; «contra mí» expresa mejor la dirección adversaria que un simple «a mí» o «sobre mí».
- source_word: פִּיהֶם
  english_pob_choice: their mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - sus bocas
  - su boca abierta
  lexicon: HALOT
  rationale: El hebreo usa sustantivo singular con sufijo plural; en español, el singular colectivo «su boca» sigue la forma y evita una pluralización innecesaria. «Boca» reproduce mejor la imagen que «labios».
- source_word: אַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como león
  alternatives_spanish:
  - como un león
  - cual león
  lexicon: HALOT
  rationale: La imagen funciona appositivamente y el español requiere marcar la comparación con claridad. «Como león» conserva la concisión del hebreo; el artículo indefinido sería posible pero no necesario.
- source_word: טֹרֵף
  english_pob_choice: tearing
  chosen_spanish: que despedaza
  alternatives_spanish:
  - que rasga
  - desgarrando
  lexicon: HALOT
  rationale: El participio describe la acción violenta del león. «Despedaza» comunica bien la fuerza predatoria en español y evita un calco demasiado débil o arcaizante.
- source_word: וְשֹׁאֵג
  english_pob_choice: and roaring
  chosen_spanish: y ruge
  alternatives_spanish:
  - y brama
  - y aúlla
  lexicon: HALOT
  rationale: «Ruge» es la equivalencia directa y natural para el sonido del león. «Brama» también sería posible, pero «ruge» es más transparente y común en este registro.
theological_decisions:
- issue: Relación entre la imagen del león y la comparación implícita
  english_pob_reading: The Hebrew presents the lion image compactly without an explicit 'like.'
  chosen_spanish_reading: como león que despedaza y ruge
  alternative_spanish_readings:
  - león que despedaza y ruge
  - cual león despedazador y rugiente
  rationale: El hebreo presenta una construcción compacta donde la imagen del león funciona comparativamente. El español requiere explicitar la comparación para que la lectura no se vuelva ambigua. Mantengo la fuerza metafórica sin añadir contenido doctrinal ni suavizar la violencia de la imagen.
  doctrine_reference: Poética bíblica / imaginería del justo perseguido
translation_notes:
  revision_awareness: 'Sigo el último ajuste del POB inglés: la imagen del león queda ligada a «despedaza y ruge», y se conserva el singular colectivo de «boca»/«su boca» como reflejo del hebreo. La comparación se explicita en español por exigencia de claridad sintáctica, sin abandonar la estructura breve del original.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Mesías» según el estándar del proyecto; este versículo no los contiene.
  - Se prefirió un presente histórico («Abren») por el valor poético del perfecto hebreo, en línea con el POB inglés.
  - «León» se deja sin artículo dentro de la comparación para conservar concisión y paralelismo.
  - La nota a [a] preserva la alternativa textual/estructural del hebreo sin crear una paráfrasis extensa.
