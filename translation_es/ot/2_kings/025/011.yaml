translation:
  language: es
  text: Nebuzaradán, el capitán de la guardia, llevó al exilio al resto del pueblo que habían quedado[a] en la ciudad, a los desertores que se habían pasado[b] al rey de Babilonia, y al resto de la multitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que habían sido dejados allí» o «que habían sido dejados atrás».
    reason: alternative_reading
  - marker: b
    text: O «que habían caído ante»; el hebreo literalmente dice «los que habían caído sobre/al lado de» el rey de Babilonia, un modismo de defección o de pasarse al bando de alguien.
    reason: alternative_reading
  - marker: c
    text: O «el resto de la gente» o «el resto de la población» para «el resto de la multitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo restante de
  - el remanente de
  lexicon: HALOT
  rationale: En este contexto numérico e histórico, יֶתֶר marca lo que queda después de deportaciones previas; «el resto de» es natural en español y conserva la idea de sobrante/remanente sin añadir matices teológicos no requeridos.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: Aquí עָם designa a la comunidad nacional/cívica. «Pueblo» suena más preciso y bíblico que «gente», y mantiene el referente colectivo.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who remained
  chosen_spanish: que había quedado
  alternatives_spanish:
  - que permanecía
  - que había sido dejado
  lexicon: HALOT
  rationale: El participio nifal comunica a los que quedaron en la ciudad tras el sitio. «Había quedado» es idiomático en español y conserva la pasividad implícita sin volverlo mecánico.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La frase locativa es directa; «en la ciudad» mantiene sobriedad y claridad sin sobreespecificar.
- source_word: הַנֹּפְלִים ... נָפְלוּ עַל
  english_pob_choice: the deserters who had defected to
  chosen_spanish: los desertores que se habían pasado a
  alternatives_spanish:
  - los que habían caído ante
  - los que se habían rendido a
  - los que habían desertado hacia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente «caer sobre/a favor de» en contexto político-militar indica pasarse al bando de otro. «Se habían pasado a» conserva la idea de defección sin interpretar demasiado, y el sustantivo «desertores» refleja el valor de quienes cambiaron de lealtad.
- source_word: הַמֶּלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: La construcción genitiva se traduce de forma estándar y transparente. «El rey de Babilonia» preserva el referente histórico concreto.
- source_word: יֶתֶר הֶהָמוֹן
  english_pob_choice: the rest of the multitude
  chosen_spanish: el resto de la multitud
  alternatives_spanish:
  - el resto de la muchedumbre
  - el resto de la gente
  lexicon: HALOT
  rationale: הָמוֹן apunta a una masa o multitud; «multitud» mantiene esa amplitud colectiva. Se evita «población» porque estrecha el matiz, y «gente» pierde la fuerza del término.
- source_word: הֶגְלָה
  english_pob_choice: carried into exile
  chosen_spanish: llevó al exilio
  alternatives_spanish:
  - deportó
  - exilió
  - llevó cautivo
  lexicon: HALOT
  rationale: El hiphil de גלה expresa el acto forzado de destierro. «Llevó al exilio» es natural, sobrio y conserva la iniciativa coercitiva mejor que un mero «deportó» en español contemporáneo.
- source_word: נְבוּזַרְאֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradán
  lexicon: Transliteración estándar del nombre propio hebreo al español
  rationale: Se adapta la transliteración al uso hispano con acento gráfico final para reflejar la prosodia natural en español y evitar lectura errónea.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el capitán de los guardias
  - el jefe de la guardia
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «jefe de los verdugos/carniceros», el título oficial en contexto imperial se comunica mejor en español como «capitán de la guardia». Esto preserva la función administrativa y militar sin una literalidad engañosa.
translation_notes:
  revision_awareness: El texto coincide con el sentido y la puntuación del audit trail en inglés; no se documentan revisiones posteriores ni cambios de criterio que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto, pero este versículo no contiene el nombre divino.
  - Se eligió «el capitán de la guardia» para רַב טַבָּחִים siguiendo el valor funcional señalado en el auditor inglés, evitando una traducción literal potencialmente confusa.
  - «Multitud» conserva el alcance colectivo amplio de הֶהָמוֹן sin convertirlo en un término sociológico más estrecho.
