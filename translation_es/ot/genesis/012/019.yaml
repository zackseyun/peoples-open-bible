base_translation:
  language: en
  yaml_path: translation/ot/genesis/012/019.yaml
  text: Why did you say[a], ‘She is my sister,’ and I took her to be my wife? And now, here is your wife[c][b]. Take her and go.”
  footnotes:
  - marker: a
    text: Or, more formally, 'and I took her for me as a wife.' The main text renders the sense idiomatically while preserving Pharaoh's claim that Abram's statement led to his taking Sarai.
    reason: lexical_alternative
  - marker: b
    text: Or 'I took her for myself as a wife'.
    reason: previous_rendering
  - marker: c
    text: Or 'look, here is your wife'.
    reason: previous_rendering
