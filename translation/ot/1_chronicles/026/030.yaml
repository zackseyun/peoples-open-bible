id: 1CH.26.30
reference: 1 Chronicles 26:30
source:
  edition: WLC
  text: לַֽ/חֶבְרוֹנִ֡י חֲשַׁבְיָהוּ֩ וְ/אֶחָ֨י/ו בְּנֵי חַ֜יִל אֶ֣לֶף וּ/שְׁבַע מֵא֗וֹת עַ֚ל פְּקֻדַּ֣ת יִשְׂרָאֵ֔ל מֵ/עֵ֥בֶר לַ/יַּרְדֵּ֖ן מַעְרָ֑בָ/ה לְ/כֹל֙ מְלֶ֣אכֶת יְהוָ֔ה וְ/לַ/עֲבֹדַ֖ת הַ/מֶּֽלֶךְ־־׃
translation:
  text: 'For the Hebronites: Hashabiah and his brothers[a], 1,700 capable men, were in charge of the oversight of Israel west of the Jordan, for all the work of the LORD and for the service of the king.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''beyond the Jordan westward,'' that is, on the western side of the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֶבְרוֹנִי
  chosen: For the Hebronites
  alternatives:
  - As for the Hebronite
  - For the Hebronite clan
  lexicon: HALOT
  rationale: The form refers to the Hebronite Levitical clan/group rather than a single individual in context. 'For the Hebronites' fits the administrative list structure and idiomatic English.
- source_word: חֲשַׁבְיָהוּ
  chosen: Hashabiah
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names.
- source_word: וְאֶחָיו
  chosen: and his brothers
  alternatives:
  - and his kinsmen
  - and his relatives
  lexicon: HALOT
  rationale: Literal familial term is retained. In clan/genealogical contexts it can denote broader kin, but 'brothers' best preserves the Hebrew wording while remaining natural.
- source_word: בְּנֵי חַיִל
  chosen: capable men
  alternatives:
  - mighty men
  - men of valor
  - able men
  lexicon: HALOT
  rationale: The phrase often denotes men of strength, competence, or valor. Here the context is administrative oversight rather than battle, so 'capable men' better reflects functional competence without importing a military sense.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת
  chosen: 1,700
  alternatives:
  - one thousand seven hundred
  rationale: Straightforward numeral rendered in standard modern English style.
- source_word: עַל פְּקֻדַּת יִשְׂרָאֵל
  lemma: עַל
  chosen: were in charge of the oversight of Israel
  alternatives:
  - were over the supervision of Israel
  - had charge of Israel's administration
  lexicon: HALOT
  rationale: פְּקֻדָּה can denote oversight, charge, supervision, or office. The preposition עַל indicates responsibility over this function. 'Were in charge of the oversight of Israel' preserves the administrative nuance without over-specifying a modern bureaucratic category.
- source_word: מֵעֵבֶר לַיַּרְדֵּן מַעְרָבָה
  chosen: west of the Jordan
  alternatives:
  - on the western side of the Jordan
  - beyond the Jordan westward
  lexicon: HALOT
  rationale: Although literally 'from/across the Jordan westward,' in this context it designates the western side of the Jordan. 'West of the Jordan' is the clearest idiomatic English equivalent.
- source_word: לְכֹל מְלֶאכֶת יְהוָה
  chosen: for all the work of the LORD
  alternatives:
  - for every matter of the LORD
  - for all the business of the LORD
  lexicon: HALOT
  rationale: 'מְלָאכָה is broad: work, business, occupation. In this administrative-cultic setting, ''work of the LORD'' preserves the breadth of duties connected with divine service.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלַעֲבֹדַת הַמֶּלֶךְ
  chosen: and for the service of the king
  alternatives:
  - and for the king's service
  - and for the work of the king
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes service/duty. 'Service of the king' parallels 'work of the LORD' and preserves the distinction between divine and royal responsibilities.
