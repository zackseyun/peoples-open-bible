review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en los puntos principales: conserva la tríada de juicio ''espada / pestilencia / hambre'', mantiene el contraste ''afuera / adentro'', respeta el singular distributivo (''el que... lo''), y reproduce idiomáticamente יֹאכֲלֶנּוּ como ''lo consumirán''. También preserva correctamente el orden hebreo de la segunda cola: ''hambre y pestilencia''.'
  spanish_quality_summary: 'El español es claro y digno, pero hay una mejora léxica importante: רָעָב en este contexto de juicio social corresponde mejor a ''hambruna'' o ''hambre'' entendida colectivamente; sin embargo, en español bíblico y contemporáneo ''hambre'' puede sonar demasiado individual. Aun así, el problema más concreto es estilístico-sintáctico: ''esté'' introduce un matiz subjuntivo menos directo que el futuro descriptivo del hebreo; ''está'' o ''esté'' en una relativa genérica futura puede funcionar, pero ''el que esté'' es aceptable. La reparación más necesaria es menor: hacer más natural la nota b y pulir la puntuación de la cláusula distributiva.'
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: no aparecen Yahvé, Mesías, Cristo, Espíritu, etc. ''Pestilencia'' alinea bien con דֶּבֶר. ''La espada'' alinea bien con חֶרֶב. La única tensión léxica es ''hambre'' para רָעָב, donde ''hambruna'' refleja mejor ''famine'' y la rationale documentada del POB.'
  issues:
  - severity: medium
    issue: '''el hambre'' debilita el matiz de ''famine'' / רָעָב'
    rationale: Aunque 'hambre' puede funcionar, רָעָב aquí nombra escasez generalizada y mortífera, no solo sensación de hambre. 'Hambruna' comunica mejor el juicio colectivo y se acerca más a la decisión inglesa documentada ('famine').
  - severity: low
    issue: La nota b está formulada de manera algo torpe por las comillas y puede simplificarse
    rationale: 'El contenido es correcto, pero la redacción actual (''Literalmente: ''''...'''''') resulta poco limpia. Conviene una formulación española más natural sin alterar el sentido.'
  revised_spanish_text: La espada está afuera[a], y la pestilencia y la hambruna están adentro. El que esté en el campo morirá a espada, y al que esté en la ciudad[b], la hambruna y la pestilencia lo consumirán.
  revised_footnotes:
  - marker: a
    text: O 'plaga' para 'pestilencia' (דֶּבֶר).
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la hambruna y la pestilencia lo comerán'; 'lo consumirán' traduce de manera idiomática la metáfora hebrea.
    reason: lexical_alternative
  revision_rationale: Se ajusta רָעָב a 'hambruna' para reflejar mejor el sentido de 'famine' en contexto de juicio colectivo, y se pule la segunda cláusula y la nota b para mayor naturalidad en español sin apartarse del hebreo ni de la auditoría inglesa.
