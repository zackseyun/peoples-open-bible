  text: וְ/אַתֶּם֙ תָּשֻׁ֣בוּ הַ/יּ֔וֹם מֵ/אַחֲרֵ֖י יְהוָ֑ה וְ/הָיָ֗ה אַתֶּ֞ם תִּמְרְד֤וּ הַ/יּוֹם֙ בַּֽ/יהוָ֔ה וּ/מָחָ֕ר אֶֽל כָּל עֲדַ֥ת יִשְׂרָאֵ֖ל יִקְצֹֽף־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/018.yaml
  text: And you are turning away today from following Yahweh[a]; and if you rebel today against Yahweh[c][b], tomorrow he will be angry with the whole congregation of Israel.
  footnotes:
  - marker: a
    text: Or 'turn back today from following the LORD.' The Hebrew verb can mean 'turn back' or 'turn away'; in this context it carries the sense of turning away in disloyalty.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from after the LORD,' a Hebrew idiom meaning to stop following him.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew simply says 'he will be angry'; the implied subject is the LORD from the context.
    reason: lexical_alternative
