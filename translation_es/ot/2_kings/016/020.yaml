revisions:
- from: Y Ahaz se acostó con sus padres y fue sepultado con sus padres en la ciudad de David[a], y Ezequías, su hijo, reinó en su lugar.
  to: Y Ahaz durmió con sus padres[a] y fue sepultado con sus padres en la ciudad de David, y Ezequías su hijo reinó en su lugar.
  rationale: Se cambia 'se acostó' por 'durmió' para preservar el modismo hebreo de muerte de manera más natural y menos ambigua en español. Se ajusta la puntuación para mejorar la fluidez, y la nota se actualiza para explicar la fórmula con el nuevo verbo.
