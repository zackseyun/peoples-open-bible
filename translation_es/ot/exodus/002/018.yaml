revisions:
- from: 'Cuando vinieron a Reuel, su padre[a], él les dijo: «¿Por qué han llegado tan pronto hoy?»'
  to: 'Cuando vinieron a Reuel, su padre, les dijo: «¿Por qué han vuelto tan pronto hoy?[a]»'
  rationale: Se reemplaza «han llegado» por «han vuelto» para reflejar mejor el sentido contextual de retorno al padre. Se elimina la nota innecesaria en «su padre» y se traslada la nota al segmento verbal, preservando la alternativa léxica documentada en el rastro inglés para מִהַרְתֶּן בֹּא. También se simplifica «él les dijo» a «les dijo» por naturalidad en español.
