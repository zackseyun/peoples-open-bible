base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/012/004.yaml
  text: May God throw lawless houses into turmoil in war by whispering lips[a]; may God remove from the innocent the lips of the lawless in distress[c][b], and may the bones of whisperers be scattered away from those who fear the Lord.
  footnotes:
  - marker: a
    text: Or 'by slanderous lips' / 'the bones of slanderers.' The Greek ψιθυρος-word group can denote secretive malicious speech, not mere quiet speaking.
    reason: lexical_alternative
  - marker: b
    text: '''Houses'' may also imply households or family establishments, not only physical buildings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'remove from the innocent the lips of lawless men in distress'.
    reason: previous_rendering
