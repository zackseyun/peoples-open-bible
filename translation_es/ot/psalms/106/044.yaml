translation:
  language: es
  text: Sin embargo, vio su angustia cuando oyó su clamor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y vio la angustia que pesaba sobre ellos cuando oyó su clamor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - tomó conocimiento de
  - consideró
  lexicon: HALOT
  rationale: ראה en esta forma narrativa expresa percepción atenta. «Vio» conserva la imagen básica del hebreo y funciona con naturalidad en español sin debilitar el matiz de atención divina.
- source_word: בַּצַּר
  english_pob_choice: their distress
  chosen_spanish: su angustia
  alternatives_spanish:
  - su aflicción
  - su tribulación
  - la angustia que tenían
  lexicon: HALOT
  rationale: צַר aquí nombra una situación de opresión o apuro. «Angustia» comunica bien esa presión sufrida por el pueblo y suena natural en español bíblico moderno.
- source_word: לָהֶם
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - para ellos
  lexicon: HALOT
  rationale: 'El sufijo pronominal con ל se refleja en español como posesivo ligado al sustantivo: «su angustia». Esto evita una literalidad dura («la angustia para ellos») y conserva el sentido relacional.'
- source_word: בְּשָׁמְעוֹ
  english_pob_choice: when he heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - en su oír
  - apenas oyó
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo se expresa de forma más idiomática como «cuando oyó». Mantiene la simultaneidad/ocasión de la acción divina sin introducir matices no sustentados.
- source_word: רִנָּתָם
  english_pob_choice: their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su plegaria
  - su voz
  lexicon: HALOT
  rationale: רִנָּה puede ser un clamor sonoro y, en contextos de aflicción, un grito de ruego. «Clamor» conserva la fuerza vocal y deja abierta la tensión semántica entre grito y súplica.
- source_word: וַ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Y
  - Entonces
  - Pero
  lexicon: Sintaxis hebrea
  rationale: Aunque וַ suele ser «y», el contexto de Salmo 106 contrapone la rebelión/juicio con la respuesta compasiva de Dios. «Sin embargo» preserva ese giro adversativo sin alejarse del flujo del hebreo.
theological_decisions:
- issue: Fuerza adversativa de la conjunción inicial en un contexto de juicio y misericordia
  english_pob_reading: Adversative nuance rendered as 'Yet'
  chosen_spanish_reading: Adversativa suavemente marcada con «Sin embargo»
  alternative_spanish_readings:
  - Y vio su angustia cuando oyó su clamor.
  - Pero vio su angustia cuando oyó su clamor.
  rationale: El hebreo puede leerse simplemente con una coordinación, pero el contexto del salmo introduce una respuesta misericordiosa de Dios a la aflicción del pueblo. «Sin embargo» conserva esa tensión teológica de juicio previo y compasión presente sin añadir contenido externo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión, que no introdujo cambios, y se mantuvo la alta concordancia del control cruzado. La redacción española refleja la misma decisión discursiva que el POB inglés: una lectura adversativa del inicio y una expresión natural del temporal con ב + infinitivo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton ni κύριος.
  - Se usó «angustia» para צַר por coherencia con el campo semántico de opresión/apuro y por naturalidad en español.
  - Se prefirió «clamor» a «grito» para conservar la amplitud semántica de רִנָּה en un contexto de súplica.
  - La puntuación con coma antes de la cláusula temporal refleja la relación de simultaneidad del hebreo sin sobrerreproducir la sintaxis original.
