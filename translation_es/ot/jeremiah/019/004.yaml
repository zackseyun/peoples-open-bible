translation:
  language: es
  text: Porque me han abandonado y han vuelto este lugar irreconocible[a], y han quemado incienso en él a otros dioses, a quienes ni ellos ni sus padres ni los reyes de Judá habían conocido, y han llenado este lugar con la sangre de inocentes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'han hecho ajeno este lugar' o 'han profanado este lugar'. El verbo hebreo expresa la idea de volver algo extranjero, extraño o ajeno a su carácter propio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la sangre de inocentes''. El plural conserva un matiz personal más explícito que la forma idiomática ''sangre inocente''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Debido a que
  - Pues que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación causal que introduce el motivo del juicio. 'Porque' conserva el valor explicativo sin sonar artificial en español bíblico moderno.
- source_word: עֲזָבֻנִי
  english_pob_choice: they have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: '''Abandonado'' comunica bien la ruptura relacional. Se evita ''desamparado'' por registro más marcado; ''forsaken'' en inglés POB se vierte aquí con una forma natural y suficientemente fuerte.'
- source_word: וַיְנַכְּרוּ אֶת הַמָּקוֹם הַזֶּה
  english_pob_choice: made this place unrecognizable
  chosen_spanish: han vuelto irreconocible este lugar
  alternatives_spanish:
  - han hecho extraño este lugar
  - han tratado este lugar como ajeno
  - han profanado este lugar
  lexicon: HALOT
  rationale: Se conserva la imagen de hacer algo extranjero/estranjado sin importar 'profanar' como interpretación. 'Irreconocible' sigue de cerca la revisión inglesa más natural, manteniendo la tensión léxica de נכר.
- source_word: וַיְקַטְּרוּ בּוֹ
  english_pob_choice: have burned incense in it
  chosen_spanish: han quemado incienso en él
  alternatives_spanish:
  - han ofrecido incienso en él
  - han elevado humo en él
  lexicon: HALOT
  rationale: '''Quemar incienso'' es la equivalencia española usual para קטר en contexto de culto ilícito y preserva la especificidad del acto.'
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extranjeros
  lexicon: HALOT
  rationale: '''Otros dioses'' es la forma más clara y directa para אחרים. Se evita ''extranjeros'' porque la extranjería ya queda sugerida por el verbo anterior.'
- source_word: אֲשֶׁר לֹא יְדָעוּם הֵמָּה וַאֲבֹתֵיהֶם וּמַלְכֵי יְהוּדָה
  english_pob_choice: whom neither they nor their fathers nor the kings of Judah had known
  chosen_spanish: a quienes ni ellos ni sus padres ni los reyes de Judá habían conocido
  alternatives_spanish:
  - que ni ellos ni sus padres ni los reyes de Judá conocían
  - a quienes ellos, sus padres y los reyes de Judá no habían conocido
  lexicon: HALOT
  rationale: '''Habían conocido'' refleja el perfecto retrospectivo y la larga memoria de idolatría. La estructura con ''ni... ni... ni...'' reproduce la negación acumulativa del hebreo y del POB inglés.'
- source_word: וּמָלְאוּ אֶת הַמָּקוֹם הַזֶּה דַּם נְקִיִּם
  english_pob_choice: they have filled this place with the blood of innocents
  chosen_spanish: han llenado este lugar con sangre de inocentes
  alternatives_spanish:
  - han llenado este lugar con la sangre de inocentes
  - han llenado este lugar con sangre inocente
  lexicon: HALOT
  rationale: Se conserva el plural personal de נְקִיִּם con 'de inocentes', tal como la POB inglesa preserva 'of innocents'. 'Sangre de inocentes' mantiene la fuerza del genitivo hebreo sin volverlo excesivamente idiomático.
theological_decisions:
- issue: Valor de וַיְנַכְּרוּ aplicado al lugar santo
  english_pob_reading: made this place unrecognizable
  chosen_spanish_reading: han vuelto irreconocible este lugar
  alternative_spanish_readings:
  - han profanado este lugar
  - han hecho ajeno este lugar
  rationale: El hebreo apunta a volver el lugar extraño/ajeno a su carácter propio. Se evita 'profanado' porque introduce una lectura teológica correcta pero más interpretativa que el verbo por sí solo. 'Irreconocible' conserva la idea de alienación y desfiguración del lugar.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación entre idolatría y sangre inocente
  english_pob_reading: have filled this place with the blood of innocents
  chosen_spanish_reading: han llenado este lugar con sangre de inocentes
  alternative_spanish_readings:
  - han llenado este lugar con sangre inocente
  - han llenado este lugar con la sangre de inocentes
  rationale: La formulación mantiene la acusación profética de violencia sacrificial o judicial contra personas inocentes. Se preserva la ambigüedad sin suavizarla, tal como el hebreo lo hace.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'made this place unrecognizable' para el valor de נכר. La redacción española refleja esa decisión con 'han vuelto irreconocible este lugar', manteniendo además la alternativa interpretativa documentada en nota.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; por eso no se introduce ninguna sustitución terminológica.
  - Se mantiene 'otros dioses' en vez de 'dioses extranjeros' para no duplicar la idea ya expresada por el verbo נכר.
  - La construcción verbal española usa perfecto compuesto para concordar con el tono acusatorio y la lectura de resultado presente del hebreo y del POB inglés.
