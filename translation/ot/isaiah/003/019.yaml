id: ISA.3.19
reference: Isaiah 3:19
source:
  edition: WLC
  text: הַ/נְּטִיפ֥וֹת וְ/הַ/שֵּׁיר֖וֹת וְ/הָֽ/רְעָלֽוֹת׃
translation:
  text: the pendants[a], the armlets, and the veils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chains' or 'anklets' for 'bracelets'; the exact kind of ornament denoted by the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּטִיפוֹת
  chosen: the pendants
  alternatives:
  - the drops
  - the earrings
  lexicon: HALOT
  rationale: The noun likely refers to a hanging ornament, probably a pendant or drop-shaped piece of jewelry. 'Pendants' gives clear modern English while preserving the concrete sense of an ornamental item. 'Drops' is too opaque in English without context, and 'earrings' is possible but more specific than the Hebrew warrants here.
- source_word: הַשֵּׁירוֹת
  chosen: the bracelets
  alternatives:
  - the chains
  - the anklets
  lexicon: HALOT
  rationale: This rare term denotes an item of adornment, commonly understood as bracelets or chains. 'Bracelets' fits the jewelry list naturally and is a standard contextual rendering. Because the exact item is uncertain, alternatives are preserved in a footnote.
- source_word: הָרְעָלוֹת
  chosen: the veils
  alternatives:
  - the shawls
  - the mantles
  lexicon: HALOT
  rationale: The term refers to a covering garment or veil. 'Veils' is the most straightforward and widely recognized rendering in this context of women's finery. 'Shawls' or 'mantles' are possible but less direct.
