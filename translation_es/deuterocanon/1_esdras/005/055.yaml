review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: ἐθεμελίωσαν = ''echaron los cimientos'', ναός = ''templo'', τῇ νουμηνίᾳ = ''luna nueva'', y la secuencia temporal ''en el segundo año, después que habían venido a Judea y Jerusalén''. Sin embargo, la nota al pie contradice el texto principal al ofrecer como alternativa exactamente la misma expresión (''templo de Dios'') en lugar de preservar la alternativa documentada en inglés (''casa de Dios'') o eliminar la nota.'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. 'Echaron los cimientos' es idiomático. 'Después que habían venido' es entendible, aunque 'después de que habían venido' o 'después de haber venido' sería algo más pulido; no obstante, no exige cambio obligatorio. El único problema real de calidad editorial es la nota defectuosa.
  glossary_alignment: 'Alineado con la terminología del proyecto: ''templo de Dios'' para ναός, ''Dios'' para θεοῦ, y sin conflictos con términos sensibles del glosario. La decisión de no usar ''casa de Dios'' en el texto principal concuerda con la revisión inglesa más reciente, pero la alternativa debe corregirse en la nota.'
  issues:
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa idéntica al texto principal: ''O “templo de Dios”''.'
    rationale: Esto no aporta información útil y contradice el rastro de auditoría inglés, donde la alternativa preservada es 'house of God'/'casa de Dios'. Si se conserva la nota, debe reflejar una alternativa real; de lo contrario, debe eliminarse.
  revised_spanish_text: Y echaron los cimientos del templo de Dios en la luna nueva del segundo mes[a], en el segundo año, después que habían venido a Judea y Jerusalén.
  revised_footnotes:
  - marker: a
    text: O 'casa de Dios'. El griego usa el término habitual para el santuario/templo.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque representa fielmente el griego y la decisión inglesa revisada de usar 'templo de Dios'. Solo se corrige la nota al pie para que preserve una alternativa léxica real y útil, en vez de repetir la lectura principal.
