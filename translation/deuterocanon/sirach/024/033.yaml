  from: I will yet pour out instruction like prophecy, and I will leave it behind for everlasting generations.
  to: Again I will pour out instruction like prophecy, and I will leave it behind for endless generations.
  rationale: The Cartha draft's use of 'yet' introduces a potential ambiguity in modern English ('I will yet do X' often implies 'I haven't done it yet, but I will eventually'), whereas the Greek ἔτι in this context indicates continuation or repetition ('again', 'furthermore'). The blind draft and NRSV correctly use 'again.' Additionally, 'everlasting generations' is slightly awkward since generations themselves are not everlasting; 'endless generations' or 'generations of eternity' is a more natural way to render the Hebraic idiom behind εἰς γενεὰς αἰώνων.
