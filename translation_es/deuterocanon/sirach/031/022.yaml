translation:
  language: es
  text: Y aunque te sientes entre muchos[b], no extiendas la mano[a] antes que tu compañero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, no te adelantes a otro comensal tomando comida antes que él.
    reason: cultural_note
  - marker: b
    text: El paralelo griego en Swete difiere marcadamente aquí y dice una línea sobre 'las burlas de los impíos' que no son para favor; por eso se sigue el testimonio hebreo como texto principal de este versículo, manteniendo a la vista el griego como paralelo divergente.
    reason: textual_variant
lexical_decisions:
- source_word: וגם אם
  english_pob_choice: Even if
  chosen_spanish: Y aunque
  alternatives_spanish:
  - Y aun si
  - Aunque
  lexicon: HALOT
  rationale: Expresa con naturalidad el matiz concesivo del hebreo sin perder la idea de una circunstancia hipotética.
- source_word: בין רבים
  english_pob_choice: among many
  chosen_spanish: entre muchos
  alternatives_spanish:
  - en medio de muchos
  - entre una multitud
  lexicon: HALOT
  rationale: Conserva la referencia a una situación social numerosa sin añadir más especificación que la que permite el hebreo.
- source_word: ישבת
  english_pob_choice: you sit
  chosen_spanish: te sientas
  alternatives_spanish:
  - estás sentado
  - te has sentado
  lexicon: HALOT
  rationale: En español, el presente subjuntivo en una concesiva condicional transmite mejor el valor general/proverbial que el perfecto literal.
- source_word: לפני
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - antes de
  - en frente de
  lexicon: HALOT
  rationale: Aquí la idea es de precedencia en la mesa, no simplemente de ubicación espacial abstracta; 'delante de' lo comunica con claridad.
- source_word: רע
  english_pob_choice: your companion
  chosen_spanish: tu compañero
  alternatives_spanish:
  - tu prójimo
  - tu vecino
  - tu prójimo de mesa
  lexicon: HALOT
  rationale: Sigue la decisión auditada de entender רע como un asociado/persona cercana en contexto sapiencial y de mesa, no como 'malo'.
- source_word: אל תושיט יד
  english_pob_choice: do not reach out your hand
  chosen_spanish: no extiendas la mano
  alternatives_spanish:
  - no alargues la mano
  - no pongas la mano delante
  lexicon: HALOT
  rationale: Mantiene la imagen concreta de la etiqueta de mesa en un español natural y directo.
