    issue: «la ropa santa» es demasiado coloquial para τὴν ἱερὰν ἐσθῆτα
    rationale: Aunque conserva el sentido básico, «ropa» rebaja el registro y pierde la fuerza de ἐσθής como prenda/vestidura. «Vestidura sagrada» o similar preserva mejor dignidad y precisión.
  - severity: low
    issue: La nota [b] usa «dismayado»
    rationale: Es un calco innecesario del inglés y no encaja bien en español eclesial general. Debe sustituirse por alternativas idiomáticas como «aturdido» o «espantado/consternado» según el matiz deseado.
