  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Gimnasio' y 'antioquenos' están bien elegidos. No aparecen términos teológicos sensibles del glosario general. La decisión de conservar 'antioquenos' en el texto principal con nota alternativa sobre ciudadanía coincide con la justificación del POB.
