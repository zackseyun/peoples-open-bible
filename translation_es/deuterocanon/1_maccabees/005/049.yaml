translation:
  language: es
  text: Y Judas dio órdenes de proclamar en el campamento que cada uno permaneciera acampado en el lugar donde se encontraba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «que cada uno acampase donde estaba». La frase griega también puede entenderse como una orden de permanecer en la posición presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέταξεν
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: LSJ
  rationale: Expresa una instrucción con autoridad sin resultar demasiado rígido; mantiene el valor directivo del verbo griego.
- source_word: κηρῦξαι
  english_pob_choice: to proclaim
  chosen_spanish: proclamar
  alternatives_spanish:
  - hacer anunciar
  - anunciar públicamente
  lexicon: LSJ
  rationale: Conserva el sentido de anuncio público y solemne de κηρῦξαι, en un español natural y de registro formal.
- source_word: ἐν τῇ παρεμβολῇ
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en el real
  lexicon: LSJ
  rationale: παρεμβολή en contexto militar se refiere al campamento; 'campamento' es claro y fiel, y 'campamento militar' sería redundante.
- source_word: τοῦ παρεμβαλεῖν
  english_pob_choice: that each should encamp
  chosen_spanish: que cada uno acampase
  alternatives_spanish:
  - que cada uno acampara
  - que cada uno se mantuviera acampado
  lexicon: LSJ
  rationale: La forma infinitiva expresa el contenido de la proclamación; 'acampase' conserva el matiz militar y corresponde bien al campo semántico de παρεμβολή.
- source_word: ἕκαστον
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - todos
  lexicon: LSJ
  rationale: Reproduce el distributivo singular sin añadir elementos no explícitos como 'hombre'.
- source_word: ἐν ᾧ ἐστιν τόπῳ
  english_pob_choice: in the place where he is
  chosen_spanish: en el lugar donde se encontraba
  alternatives_spanish:
  - donde está
  - en el lugar en que está
  lexicon: LSJ
  rationale: La construcción griega apunta a permanecer en la posición actual; 'se encontraba' hace explícita esa permanencia sin forzar el sentido.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura inglesa revisada, que prefirió ''proclaim'' para κηρῦξαι y mantuvo el sentido militar de ''encamp''. La nota preserva la alternativa señalada en el aparato inglés: la frase puede entenderse como permanecer donde ya se estaba, no solo como comenzar a acampar allí.'
  spanish_consistency_notes:
  - Se mantiene 'campamento' para παρεμβολή y 'acampase' para παρεμβαλεῖν, conservando la relación léxica del griego.
  - '''Cada uno'' refleja el distributivo ἕκαστον sin introducir género masculino explícito.'
  - La nota al pie resguarda la ambigüedad importante del sintagma final, equivalente a la del texto inglés auditado.
