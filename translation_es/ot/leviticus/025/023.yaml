translation:
  language: es
  text: La tierra no debe venderse[a] en perpetuidad, porque la tierra es mía[b]. Pues ustedes son extranjeros y residentes temporales conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de manera permanente» o «para una alienación permanente».
    reason: lexical_alternative
  - marker: b
    text: «Extranjeros y residentes temporales» expresa la condición de Israel como residentes dependientes bajo la propiedad de Dios sobre la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: תִמָּכֵר
  english_pob_choice: must not be sold
  chosen_spanish: no debe venderse
  alternatives_spanish:
  - no ha de venderse
  - no se debe vender
  - no será vendida
  lexicon: HALOT
  rationale: El nifal legal expresa prohibición pasiva. «No debe venderse» comunica bien la fuerza normativa en español actual y conserva la pasiva implícita sin volver la frase demasiado rígida.
- source_word: לִצְמִתֻת
  english_pob_choice: permanently
  chosen_spanish: de manera permanente
  alternatives_spanish:
  - en perpetuidad
  - para una alienación permanente
  - para siempre
  lexicon: HALOT
  rationale: צְמִתֻת indica una venta irrevocable o de separación definitiva en este contexto jurídico. «De manera permanente» mantiene la claridad moderna sin perder el matiz de irrevocabilidad.
- source_word: כִּי לִי הָאָרֶץ
  english_pob_choice: because the land is mine
  chosen_spanish: porque la tierra es mía
  alternatives_spanish:
  - pues la tierra es mía
  - porque la tierra me pertenece
  lexicon: HALOT
  rationale: 'El hebreo da la razón directa del mandato: propiedad divina. «Porque la tierra es mía» conserva la afirmación de posesión sin suavizarla con una reformulación explicativa.'
- source_word: גֵרִים
  english_pob_choice: strangers
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - residentes extranjeros
  - inmigrantes
  lexicon: HALOT
  rationale: גֵר comunica no pertenencia originaria y dependencia. En español, «extranjeros» transmite mejor esa no-pertenencia de forma natural; «forasteros» es posible, pero menos preciso en tono legal.
- source_word: וְתוֹשָׁבִים
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - residentes temporales
  - moradores
  - peregrinos
  lexicon: HALOT
  rationale: תוֹשָׁב enfatiza residencia provisional o sin derecho hereditario. «Forasteros» evita una repetición demasiado técnica junto con «extranjeros», y conserva la idea de no permanencia/ajeneidad social.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - en relación conmigo
  lexicon: HALOT
  rationale: La preposición עם con sufijo de primera persona se rinde de forma directa como «conmigo». En contexto expresa dependencia bajo la relación de Dios con Israel en la tierra.
theological_decisions:
- issue: Relación de Israel con la tierra y propiedad divina
  english_pob_reading: The verse teaches that Israel's tenure in the land is derivative and subordinate to God's ownership, expressed without importing later doctrinal systems.
  chosen_spanish_reading: El versículo enseña que la permanencia de Israel en la tierra es derivada y subordinada a la propiedad de Dios, sin añadir sistemas doctrinales posteriores.
  alternative_spanish_readings:
  - El versículo es solo una norma socioeconómica sin afirmación teológica
  - El versículo implica una desposesión absoluta más allá del contexto del jubileo
  rationale: La frase «porque la tierra es mía» exige conservar el fundamento teológico del precepto. La traducción mantiene el peso legal y teológico a la vez, sin ampliar el sentido más allá de lo dicho por el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Base textual revisada: coincide plenamente con el audio-trail inglés; no se requieren cambios adicionales. Se mantuvieron las decisiones clave sobre venta irreversible, propiedad divina y estatus dependiente de Israel en el país.'
  spanish_consistency_notes:
  - Se usó «tierra» para la continuidad con el término jurídico del pasaje, no «país», porque el contexto habla de tenencia de la heredad.
  - Se evitó «SEÑOR» como máscara; aquí no aparece el Tetragrámaton en forma explícita, pero la propiedad divina se conserva con «mía».
  - Se eligió una pareja léxica no redundante, «extranjeros y forasteros», para reproducir la doble caracterización sin forzar una repetición mecánica.
