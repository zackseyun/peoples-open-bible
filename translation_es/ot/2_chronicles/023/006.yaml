translation:
  language: es
  text: Y nadie entre en la casa de Yahvé[a], sino los sacerdotes y los levitas que ministran; ellos podrán entrar, porque son santos. Y todo el pueblo cumplirá el encargo de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé». Literalmente, «la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «guardará la guardia de Yahvé», «cumplirá el deber de Yahvé» u «observará el mandato de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל יָב֣וֹא
  english_pob_choice: And let no one enter
  chosen_spanish: Y nadie entre
  alternatives_spanish:
  - Y no entre nadie
  - Y no se permita a nadie entrar
  lexicon: HALOT
  rationale: אַל con el yusivo de בוא expresa prohibición. En español, «nadie entre» conserva la fuerza directiva sin sonar artificial.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: «Casa de Yahvé» sigue de cerca la expresión hebrea בֵית יְהוָה y evita sustituirla por una equivalencia más interpretativa. «Templo» es posible por contexto, pero aquí se preserva la imagen original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la norma del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: La combinación introduce una excepción a la prohibición. En español, «sino» funciona de manera natural después de una negación y mantiene el contraste.
- source_word: הַ/כֹּֽהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: En el contexto cultual, כֹהֲנִים se traduce con el término directo «sacerdotes», que es claro y fiel.
- source_word: וְ/הַ/מְשָׁרְתִ֣ים לַ/לְוִיִּ֔ם
  english_pob_choice: and the ministering Levites
  chosen_spanish: y los levitas que ministran
  alternatives_spanish:
  - y los levitas que sirven
  - y los levitas ministrantes
  lexicon: HALOT
  rationale: El participio משרתים describe a los levitas en servicio litúrgico. «Que ministran» conserva ese matiz cultual mejor que un «sirven» demasiado general, y mantiene la relación sintáctica con «levitas».
- source_word: הֵ֥מָּה יָבֹ֖אוּ
  english_pob_choice: they may enter
  chosen_spanish: ellos podrán entrar
  alternatives_spanish:
  - ellos entrarán
  - ellos deben entrar
  lexicon: HALOT
  rationale: Después de la cláusula de excepción, se expresa autorización. «Podrán entrar» comunica permiso mejor que un futuro simple.
- source_word: כִּי קֹ֣דֶשׁ הֵ֑מָּה
  english_pob_choice: because they are holy
  chosen_spanish: porque son santos
  alternatives_spanish:
  - porque son santos para el culto
  - porque están consagrados
  lexicon: HALOT
  rationale: קדש aquí señala santidad en sentido cultual, es decir, aptitud/consecración para el acceso. «Santos» es el equivalente directo y transparente; la nota doctrinal aclara que no se trata de perfección moral absoluta.
- source_word: וְ/כָל הָ/עָ֔ם
  english_pob_choice: And let all the people
  chosen_spanish: Y todo el pueblo
  alternatives_spanish:
  - Y todo el pueblo, pues
  lexicon: HALOT
  rationale: Se conserva el colectivo de העם sin añadir elementos innecesarios. El mandato queda implícito en el verbo siguiente.
- source_word: יִשְׁמְר֖וּ מִשְׁמֶ֥רֶת
  english_pob_choice: keep the charge
  chosen_spanish: guardará la carga
  alternatives_spanish:
  - guardará la custodia
  - cumplirá la orden
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת es el deber/encargo asignado. «Carga» reproduce el peso de la responsabilidad y permite conservar el giro formal del hebreo; aquí no se toma «custodia» porque podría sonar demasiado militar o estrecho. Se mantiene la tensión de un deber sagrado a cargo del pueblo.
- source_word: יְהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino en el genitivo final para mantener consistencia con el resto del versículo.
theological_decisions:
- issue: Acceso al recinto sagrado restringido por santidad cultual
  english_pob_reading: The priests and ministering Levites may enter because they are holy.
  chosen_spanish_reading: Los sacerdotes y los levitas que ministran pueden entrar porque son santos.
  alternative_spanish_readings:
  - '...porque están consagrados'
  - '...porque son santos para el culto'
  rationale: La restricción de acceso se fundamenta en una condición cultual, no en una afirmación de impecabilidad moral. «Santos» conserva la categoría bíblica; la nota explica el alcance ritual del término.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue el criterio del proyecto para traducir el Tetragrama, preservando el nombre propio divino en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Mִשְׁמֶרֶת יְהוָה as sacred duty/charge
  english_pob_reading: keep the charge of Yahweh
  chosen_spanish_reading: guardar la carga de Yahvé
  alternative_spanish_readings:
  - cumplir la carga de Yahvé
  - guardar el encargo de Yahvé
  rationale: El hebreo combina la idea de vigilancia/observancia con un encargo debido. «Guardar la carga» intenta mantener la forma formal del original y el sentido de responsabilidad asignada por Yahvé, sin reducirlo a mera vigilancia física.
  doctrine_reference: Translation philosophy §2, lexical notes on שמר / מִשְׁמֶרֶת
translation_notes:
  revision_awareness: 'El texto sigue de cerca la revisión inglesa más reciente, que no introdujo cambios respecto del pasaje auditado y fue confirmada con alta concordancia. Se conservan las decisiones principales: prohibición con excepción, acceso restringido al recinto, santidad cultual y la expresión formal de la carga/duty de Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה.
  - Se mantuvo «sacerdotes» y «levitas» con terminología cultual estable.
  - «Ministran» se reservó para el servicio litúrgico de los levitas.
  - «Santos» se mantuvo para קֹדֶשׁ, con nota que aclara el sentido cultual.
  - «Guardar la carga» conserva el paralelismo formal con el audit trail inglés y el hebreo שמר משמרת.
