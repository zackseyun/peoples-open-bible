translation:
  language: es
  text: ¿Acaso no salen de la boca del Altísimo las calamidades[a] y el bien?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «males» o «desastres»; el hebreo רָעוֹת puede denotar en sentido amplio cosas dañinas o adversas. Aquí «calamidades» se usa para evitar implicar mal moral como tal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פִּי
  english_pob_choice: from the mouth of
  chosen_spanish: de la boca de
  alternatives_spanish:
  - de
  - por mandato de
  - desde la boca de
  lexicon: HALOT
  rationale: El hebreo usa la imagen de la boca como fuente de palabra o decreto. En español, «de la boca de» conserva esa imagen y expresa origen sin volver la frase artificiosa.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Más Alto
  lexicon: HALOT
  rationale: «Altísimo» es el equivalente natural y reverente del título divino hebreo, y mantiene la idea superlativa del original.
- source_word: לֹא תֵצֵא
  english_pob_choice: Do not ... come
  chosen_spanish: ¿Acaso no salen?
  alternatives_spanish:
  - ¿No salen?
  - ¿No salen de allí?
  - ¿No proceden?
  lexicon: HALOT
  rationale: La combinación negación + verbo funciona retóricamente como pregunta. «¿Acaso no salen?» reproduce mejor el valor interrogativo y la idea de proceder/surgir desde una fuente.
- source_word: הָרָעוֹת
  english_pob_choice: calamities
  chosen_spanish: las calamidades
  alternatives_spanish:
  - los males
  - los desastres
  - las adversidades
  lexicon: HALOT
  rationale: «Calamidades» evita sugerir mal moral y conserva el sentido de desgracias o males adversos que el contexto atribuye al gobierno soberano de Dios.
- source_word: וְהַטּוֹב
  english_pob_choice: and good
  chosen_spanish: y el bien
  alternatives_spanish:
  - y lo bueno
  - y el bien que hay
  - y la prosperidad
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado hebreo se vierte naturalmente como «el bien», que en español conserva la categoría general de lo favorable sin limitarla a prosperidad material.
theological_decisions:
- issue: Si הרעות debe sugerir mal moral o adversidad/calamidad
  english_pob_reading: Rendered as 'calamities' rather than 'evil'
  chosen_spanish_reading: «calamidades» en lugar de «males» o «mal»
  alternative_spanish_readings:
  - males
  - mal
  - desastres
  rationale: El contexto de Lamentaciones 3:37–39 trata del dominio soberano de Yahvé sobre acontecimientos adversos y favorables. «Calamidades» evita atribuirle a Dios mal moral, tensión que el hebreo no exige aquí.
  doctrine_reference: Afirmaciones; filosofía de traducción 1, 3 y 6
- issue: Si el verso debe sonar como negación plana o como pregunta retórica
  english_pob_reading: Rendered as a rhetorical question
  chosen_spanish_reading: «¿Acaso no salen...?»
  alternative_spanish_readings:
  - No salen...
  - ¿No salen...?
  rationale: En el contexto inmediato, la forma retórica expresa que nada ocurre fuera del decreto del Altísimo. La pregunta en español preserva mejor esa fuerza discursiva que una negación simple.
  doctrine_reference: Filosofía de traducción 1 y 6
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente: no hubo cambios aplicados y el consenso de revisión fue de acuerdo completo. Se conservó la decisión léxica de traducir רָעוֹת como una adversidad/calamidad, y la estructura interrogativa retórica del verso.'
  spanish_consistency_notes:
  - Se mantuvo «Altísimo» para עֶלְיוֹן, coherente con el término divino estándar en español.
  - Se evitó «mal» o «evil» para רָעוֹת a fin de no introducir la idea de mal moral.
  - Se conservó la imagen de la «boca» como origen de lo que sale, en lugar de sustituirla por una abstracción como «mandato» en el texto principal.
  - «El bien» se eligió por ser natural en español y por reflejar el valor sustantivado del hebreo.
