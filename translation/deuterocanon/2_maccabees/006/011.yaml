id: 2MA.6.11
reference: 2 Maccabees 6:11
source:
  edition: lxx-swete-1909
  text: ἕτεροι δὲ πλησίον συνδρομόντες εἰς τὰ σπήλαια λεληθότως ἄγειν τὴν ἑβδομάδα, μηνυθέντες τῷ Φιλίππῳ συνεφλογίσθησαν, διὰ τὸ εὐλαβῶς ἔχειν βοηθῆσαι αὐτοῖς κατὰ δόξαν τῆς σεμνοτάτης ἡμέρας.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: But others[a], having gathered nearby in the caves to observe the week in secret, were informed against to Philip and were burned together, because they scrupled to defend themselves out of regard for the honor of that most holy day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to observe the Sabbath secretly.' The Greek literally says 'to keep the week in secret,' but in context this likely refers to Sabbath observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  chosen: others
  alternatives:
  - some others
  - the rest
  lexicon: LSJ
  rationale: Indefinite contrast with the preceding group; 'others' is the natural English equivalent.
- source_word: πλησίον συνδρομόντες εἰς τὰ σπήλαια
  chosen: having gathered nearby into the caves
  alternatives:
  - having run together into the caves nearby
  - having assembled in the neighboring caves
  lexicon: LSJ
  rationale: συνδρομόντες conveys coming together/hastening together; with πλησίον and εἰς τὰ σπήλαια the sense is that they had gathered in nearby caves. 'Having gathered' is smoother English while preserving the collective movement.
- source_word: λεληθότως ἄγειν τὴν ἑβδομάδα
  chosen: to keep the week in secret
  alternatives:
  - to observe the Sabbath secretly
  - to spend the week unnoticed
  lexicon: LSJ
  rationale: λεληθότως means secretly/without notice. ἄγειν with a time expression means keep/observe/pass. τὴν ἑβδομάδα literally 'the week,' but in this persecution context it likely refers to Sabbath observance or the sacred weekly period. I retained 'week' in the main text as the direct lexical value, while the Sabbath-specific sense is preserved as an alternative because the Greek wording itself is not the usual direct term σάββατον.
- source_word: μηνυθέντες τῷ Φιλίππῳ
  chosen: were informed against to Philip
  alternatives:
  - were denounced to Philip
  - were reported to Philip
  lexicon: LSJ
  rationale: The passive indicates they were betrayed/reported. 'Informed against' preserves the hostile force without overinterpreting beyond the verb.
- source_word: συνεφλογίσθησαν
  chosen: were burned together
  alternatives:
  - were burned alive together
  - were consumed by fire together
  lexicon: LSJ
  rationale: The compound verb indicates being burned together/in a group. 'Burned together' is direct and textually anchored; 'alive' is implied by context but not explicit in the verb.
- source_word: διὰ τὸ εὐλαβῶς ἔχειν βοηθῆσαι αὐτοῖς
  chosen: because they scrupled to defend themselves
  alternatives:
  - because they were too reverent to help themselves
  - because they hesitated out of piety to come to their own aid
  lexicon: LSJ
  rationale: εὐλαβῶς ἔχειν expresses acting cautiously/reverently/scrupulously; βοηθῆσαι αὐτοῖς is literally 'to help themselves.' In context, the point is refusal to resist in battle on the sacred day, so 'defend themselves' brings out the practical sense while 'scrupled' preserves the moral-religious motivation.
- source_word: κατὰ δόξαν τῆς σεμνοτάτης ἡμέρας
  chosen: out of regard for the honor of that most holy day
  alternatives:
  - for the sake of the dignity of that most venerable day
  - in accordance with the glory of that most august day
  lexicon: LSJ
  rationale: δόξα here is best taken as honor/repute rather than visible glory. σεμνοτάτης denotes exceptional dignity or sanctity. 'That most holy day' communicates the religious weight in idiomatic English.
