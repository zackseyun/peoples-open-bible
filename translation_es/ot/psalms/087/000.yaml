translation:
  language: es
  text: Un salmo de los hijos de Coré[a]; un cántico[b]. Su fundamento[c] está en los montes santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los hijos de Coré», indicando asociación más que autoría directa.
    reason: lexical_alternative
  - marker: b
    text: 'También puede puntuarse: «Un salmo de los hijos de Coré. Un cántico».'
    reason: previous_rendering
  - marker: c
    text: O «Su fundamento está en los montes santos». El sufijo hebreo puede entenderse con Sión o Jerusalén como referente implícito.
    reason: alternative_reading
lexical_decisions:
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: of the sons of Korah / for the sons of Korah
  chosen_spanish: de los hijos de Coré
  alternatives_spanish:
  - para los hijos de Coré
  lexicon: sons of Korah
  rationale: El hebreo admite una relación de pertenencia o asociación. «De los hijos de Coré» mantiene la forma natural de un encabezado poético en español y preserva la ambigüedad documentada por el audit trail; la alternativa «para» queda como posibilidad de uso litúrgico o de destinación.
- source_word: מִזְמֹור
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - cántico salmódico
  lexicon: psalm
  rationale: «Salmo» es el equivalente directo y reconocido en español para el género poético-musical del término hebreo. Se mantiene el sustantivo tradicional sin añadir explicación innecesaria.
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - himno
  lexicon: song
  rationale: «Cántico» conserva el carácter cultual y poético del hebreo sin sonar coloquial como «canción». Se evita duplicar el matiz de «salmo» y se refleja el segundo término genérico del encabezado.
- source_word: יְסוּדָתוֹ
  english_pob_choice: Its foundation
  chosen_spanish: Su fundamento
  alternatives_spanish:
  - Su base
  - Su cimiento
  lexicon: foundation
  rationale: La forma pronominal hebrea puede aludir implícitamente a Sión/Jerusalén, como señala el POB en inglés. «Su fundamento» conserva esa referencia implícita sin forzarla en el texto principal; el sustantivo «fundamento» mantiene la solidez semántica del original.
- source_word: בְּהַרְרֵי קֹדֶשׁ
  english_pob_choice: in the holy mountains
  chosen_spanish: en los santos montes
  alternatives_spanish:
  - en los montes santos
  - en los montes sagrados
  lexicon: holy mountains
  rationale: «Santos montes» reproduce con fidelidad la estructura del hebreo y el adjetivo de sacralidad. Se prefiere «santos» a «sagrados» por mayor cercanía al campo bíblico estándar y por la correspondencia con el plural del hebreo.
theological_decisions:
- issue: Alcance del encabezado y posible referente implícito de «Su fundamento»
  english_pob_reading: The Hebrew suffix can be understood with Zion/Jerusalem as the implied referent.
  chosen_spanish_reading: Se conserva el pronombre posesivo sin nombrar explícitamente a Sión o Jerusalén en el texto principal.
  alternative_spanish_readings:
  - Su fundamento está en Sión.
  - Su fundamento está en Jerusalén.
  rationale: El hebreo permite una referencia implícita que el audit trail reconoce como posible, pero no obligatoria. En español, explicitarla en el cuerpo del texto iría más allá de lo que el encabezado exige; por eso se mantiene la forma abierta y se deja constancia de la alternativa en nota.
  doctrine_reference: No aplica; decisión de referencia textual y discursiva, no doctrinal.
translation_notes:
  revision_awareness: Se incorporó la cláusula final que faltaba en la versión anterior del audit trail («Its foundation is in the holy mountains») y se ajustó la puntuación del encabezado para unir naturalmente «salmo» y «cántico», manteniendo la ambigüedad reconocida sobre la atribución a los hijos de Coré.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantuvo «hijos de Coré» como fórmula estable de encabezado bíblico.
  - 'Se prefirió un orden de membresía natural en español: «Un salmo de…; un cántico».'
  - «Santos montes» conserva el plural hebreo y evita singularizar indebidamente el referente.
