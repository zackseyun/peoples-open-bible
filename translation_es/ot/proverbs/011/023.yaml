translation:
  language: es
  text: El deseo de los justos es solo bien, pero la esperanza[a] de los malvados es ira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expectativa» para «esperanza».
    reason: lexical_alternative
  - marker: b
    text: O «furia». El hebreo no dice explícitamente de quién es esa ira; puede referirse a la expectativa airada de los malvados o a la ira que les sobreviene.
    reason: alternative_reading
lexical_decisions:
- source_word: תַּאֲוַת
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - ansia
  lexicon: HALOT
  rationale: El hebreo expresa deseo o anhelo; «deseo» es natural, breve y mantiene el paralelo con «esperanza». En español «anhelo» también es posible, pero «deseo» conserva mejor la concisión proverbial.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: El plural sustantivado designa a una categoría moral; «los justos» es la forma más idiomática y fiel en español para ese grupo.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: La partícula restringe el contenido del deseo. «Solo» transmite bien la exclusividad con naturalidad en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - lo bueno
  - bondad
  lexicon: HALOT
  rationale: Aquí el sustantivo/adjetivo breve funciona como resultado o contenido deseado. «Bien» suena más natural en español dentro del proverbio y mantiene la brevedad del hebreo.
- source_word: תִּקְוַת
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - expectación
  lexicon: HALOT
  rationale: El término puede significar esperanza o expectativa. «Esperanza» es la equivalencia más común y clara; se preserva la alternativa en nota por la posibilidad semántica de «expectativa».
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malos
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: Aunque «los impíos» es tradicional, «los malos» mantiene el contraste moral directo y es una opción válida para un proverbio breve. Se evita endurecer el tono con un término más eclesiástico sin necesidad textual.
- source_word: עֶבְרָה
  english_pob_choice: wrath
  chosen_spanish: furia
  alternatives_spanish:
  - ira
  - indignación
  - furor
  lexicon: HALOT
  rationale: El término puede indicar ira, furor o furia. Dado que el audit trail inglés preserva la ambigüedad sobre de quién es la ira, «furia» comunica bien la intensidad y permite la misma apertura interpretativa que «wrath/fury» en inglés.
theological_decisions:
- issue: Ambigüedad de la cláusula final
  english_pob_reading: The hope of the wicked is wrath/fury; Hebrew does not explicitly say whose wrath is meant.
  chosen_spanish_reading: La esperanza de los malos es furia.
  alternative_spanish_readings:
  - La esperanza de los malos es ira.
  - La esperanza de los malos termina en la furia de Dios.
  rationale: El hebreo es conciso y no especifica explícitamente el sujeto de la ira. La traducción principal conserva esa tensión sin aclararla indebidamente. «Furia» mantiene la fuerza semántica del término y deja abierta la posibilidad de que sea la furia que acompaña a su esperanza o la furia que les sobrevendrá.
  doctrine_reference: Preservar la ambigüedad textual y no importar un sujeto teológico no explicitado.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: se mantiene la brevedad proverbial, la oposición entre justos y malos, y la ambigüedad del final sin introducir especificaciones ajenas al hebreo. No hubo revisiones posteriores relevantes en el expediente.'
  spanish_consistency_notes:
  - Se usa «los justos» para צַדִּיקִים y «los malos» para רְשָׁעִים, manteniendo contraste moral claro y lenguaje natural.
  - Se evita «SEÑOR» o fórmulas de ocultamiento del nombre divino porque este versículo no contiene el Tetragrámaton.
  - «Solo bien» refleja la restricción de אַךְ sin añadir explicaciones.
  - 'La nota sobre עֶבְרָה preserva la misma tensión semántica que el aparato inglés: furia/ira sin sujeto explícito.'
