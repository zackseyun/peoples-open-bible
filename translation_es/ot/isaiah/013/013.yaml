revisions:
- from: Por tanto, haré temblar los cielos[a], y la tierra se moverá de su lugar, por la furia de Yahvé de los Ejércitos, en el día de su ardiente ira.
  to: Por tanto, haré temblar los cielos[a], y la tierra temblará desde su lugar, por la furia de Yahvé de los Ejércitos, en el día de su ardiente ira.
  rationale: Se cambió 'se moverá de su lugar' por 'temblará desde su lugar' para reflejar mejor el valor sísmico de וְתִרְעַשׁ y mantener el paralelismo poético con 'haré temblar'. Se corrigió la nota para ajustarla a la política del proyecto sobre יהוה ('Yahvé') y ofrecer una alternativa tradicional real para צְבָאוֹת ('las Huestes').
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:21:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: conector inferencial, alcance cósmico (''los cielos'' / ''la tierra''), causativo en el primer verbo, desplazamiento de la tierra, y causa en la ira de Yahvé. Sin embargo, ''se moverá de su lugar'' debilita el matiz sísmico de וְתִרְעַשׁ (''temblará/se sacudirá'') y la nota al pie usa ''el SEÑOR'', contrario a la política del proyecto que exige ''Yahvé'' en el texto principal y también en alternativas tradicionales cuando se alude al título completo.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse. 'La tierra se moverá de su lugar' suena más débil y menos vívido que el hebreo poético; 'temblará' o 'se sacudirá' comunica mejor el paralelismo cósmico. 'Yahvé de los Ejércitos' es comprensible, aunque en español bíblico la alternativa tradicional mejor documentada para la nota es 'Yahvé de las Huestes', no 'el SEÑOR de los Ejércitos', porque el proyecto no enmascara el nombre divino.
  glossary_alignment: 'Alineación mayormente buena: יְהוָה→''Yahvé'' correcto; שָׁמַיִם→''los cielos'' correcto; חֲרוֹן אַפּוֹ→''su ardiente ira'' aceptable. El principal desajuste es la nota ''el SEÑOR...'', que contradice la norma terminológica del proyecto para יהוה. También conviene reforzar וְתִרְעַשׁ con ''temblará'' para mantener la fuerza léxica documentada.'
  issues:
  - severity: medium
    issue: '''se moverá de su lugar'' debilita וְתִרְעַשׁ'
    rationale: El verbo רעשׁ en Qal denota sacudida/temblor sísmico. 'Se moverá' es demasiado genérico y reduce la intensidad del juicio cósmico. 'Temblará' o 'se sacudirá' preserva mejor el valor del original y del audit trail inglés ('will shake').
  - severity: medium
    issue: La nota al pie usa 'el SEÑOR de los Ejércitos'
    rationale: El proyecto exige 'Yahvé' para יְהוָה, no 'SEÑOR' como convención de enmascaramiento. Si se conserva una alternativa tradicional, debe expresarse sin ocultar el nombre divino o bien reflejar la forma tradicional del título de צְבָאוֹת, por ejemplo 'Yahvé de las Huestes'.
  revised_spanish_text: Por tanto, haré temblar los cielos[a], y la tierra temblará desde su lugar, por la furia de Yahvé de los Ejércitos, en el día de su ardiente ira.
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, 'Yahvé de las Huestes'.
    reason: lexical_alternative
  revision_rationale: Se cambió 'se moverá de su lugar' por 'temblará desde su lugar' para reflejar mejor el valor sísmico de וְתִרְעַשׁ y mantener el paralelismo poético con 'haré temblar'. Se corrigió la nota para ajustarla a la política del proyecto sobre יהוה ('Yahvé') y ofrecer una alternativa tradicional real para צְבָאוֹת ('las Huestes').
