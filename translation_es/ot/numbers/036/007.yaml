review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido legal del hebreo: la herencia no debe pasar de una tribu a otra, porque los hijos de Israel deben permanecer ligados a la herencia tribal ancestral. Conserva adecuadamente «herencia», «tribu», «hijos de Israel» y el valor distributivo de אִישׁ con «cada uno».'
  spanish_quality_summary: 'El texto principal es mayormente claro y fiel, pero «se adherirán cada uno a la herencia...» suena algo rígido en español. La nota al pie actual está mal formulada y no preserva correctamente la alternativa inglesa: atribuye erróneamente el verbo a «la herencia» y produce una oración agramatical. Conviene reparar la nota y pulir levemente la frase principal para mayor naturalidad.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas clave están alineadas con el proyecto: נַחֲלָה = «herencia», מַטֶּה = «tribu», בְּנֵי יִשְׂרָאֵל = «hijos de Israel», יִדְבְּקוּ = apego firme. La preservación del lenguaje genealógico masculino también concuerda con la justificación documentada.'
  issues:
  - severity: medium
    issue: La nota al pie [a] está mal redactada y altera el sujeto de la alternativa.
    rationale: La alternativa inglesa es «the Israelites shall each cling to his ancestral tribal inheritance». El borrador español dice «la herencia de los israelitas se adherirá cada uno...», lo cual es agramatical y cambia el sentido.
  - severity: low
    issue: «Se adherirán cada uno» es comprensible pero poco natural en español.
    rationale: Reordenar a «cada uno se mantendrá unido a» o similar mejora la fluidez sin perder el valor de דבק. Dado que el inglés auditado usa «hold fast to» y la alternativa «cling to», una formulación menos dura que «aferrarse» pero más idiomática que «adherirse» funciona mejor en español.
  revised_spanish_text: Así, ninguna herencia de los hijos de Israel pasará de tribu a tribu[a], porque los hijos de Israel cada uno se mantendrá unido a la herencia de la tribu de sus padres.
  revised_footnotes:
  - marker: a
    text: 'O: «los hijos de Israel cada uno se aferrará a su herencia tribal ancestral».'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido y la terminología del original, pero se corrige la nota al pie para que refleje fielmente la alternativa auditada y se mejora ligeramente la naturalidad del español en la cláusula final. No se requiere adjudicación adicional.
