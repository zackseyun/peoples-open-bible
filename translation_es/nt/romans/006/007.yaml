translation:
  language: es
  text: Porque el que ha muerto[a] ha sido justificado[b] del pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «murió»; el participio aoristo puede expresar simplemente el hecho de haber muerto.
    reason: lexical_alternative
  - marker: b
    text: 'O, «ha sido liberado del pecado»; lit., «ha sido justificado del pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... ἀποθανὼν
  english_pob_choice: the one who has died
  chosen_spanish: el que ha muerto
  alternatives_spanish:
  - la persona que ha muerto
  - el que murió
  lexicon: BDAG
  rationale: El artículo con el participio aoristo funciona de manera sustantiva. En español, «el que ha muerto» reproduce bien esa fuerza representativa y suena natural, sin añadir género explícito ni cambiar el aspecto del participio más allá de lo necesario.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: γάρ introduce la explicación o razón de lo dicho antes. «Porque» comunica con claridad la relación causal/explanatoria en español y encaja con el registro de la carta.
- source_word: δεδικαίωται
  english_pob_choice: has been justified
  chosen_spanish: ha sido justificado
  alternatives_spanish:
  - ha sido absuelto
  - ha sido declarado justo
  - ha sido liberado
  lexicon: BDAG
  rationale: Se conserva la raíz judicial de δικαιόω con «ha sido justificado», siguiendo la revisión más reciente del audit trail. «Absuelto» sería idiomático en sentido forense, pero desplaza demasiado el término; «liberado» captura el efecto contextual, pero pierde el matiz judicial.
- source_word: ἀπὸ τῆς ἁμαρτίας
  english_pob_choice: from sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - de pecado
  - de la pecaminosidad
  - del dominio del pecado
  lexicon: BDAG
  rationale: La preposición expresa separación o liberación. «Del pecado» es la forma natural y fiel en español, y mantiene la referencia paulina al pecado como realidad personificada sin especificar en exceso si se trata de culpa, poder o ambos.
theological_decisions:
- issue: 'Sentido de δεδικαίωται en Romanos 6:7: ¿jurídico, liberador o ambos?'
  english_pob_reading: Rendered as 'has been justified' in the main text, with 'justified from sin' and 'freed from sin' preserved as alternatives.
  chosen_spanish_reading: «ha sido justificado» mantiene el sentido forense principal, con la posibilidad contextual de entender una liberación del pecado sin borrar la tensión.
  alternative_spanish_readings:
  - ha sido absuelto del pecado
  - ha sido liberado del pecado
  - ha sido justificado del pecado
  rationale: Romanos 6 enfatiza la ruptura con el dominio del pecado, pero Pablo usa un verbo judicial. En español, «ha sido justificado» conserva la fuerza estándar de δεδικαίωται y deja abierta la implicación de liberación, en vez de resolver la tensión a favor de un solo matiz.
  doctrine_reference: Preservar la tensión teológica entre justificación forense y liberación de la esclavitud al pecado.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que sustituyó 'acquitted' por 'justified' para reflejar con más precisión el sentido estándar de δεδικαίωται y mantener la consistencia formal. La redacción española sigue esa última decisión, pero conserva mediante nota la tensión contextual entre justificación forense y liberación del pecado.
  spanish_consistency_notes:
  - Se usa «justificado» para δικαιόω, coherente con el ajuste revisado del inglés POB.
  - Se traduce γάρ por «Porque» al inicio de la oración, respetando la conexión lógica.
  - Se mantiene «pecado» en singular, como en el griego, para preservar el valor personificado y general del término.
  - La redacción evita vocabulario eclesiástico tradicional que no esté respaldado por el texto fuente.
