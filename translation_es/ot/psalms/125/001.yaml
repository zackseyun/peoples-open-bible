  rationale: Se reemplaza 'ascensos' por 'subidas' para una fórmula más natural y reconocible en español sin perder fidelidad léxica. Se ajusta la nota para reflejar con más precisión la alternativa formal del hebreo documentada en la auditoría inglesa. No se requieren cambios doctrinales ni estructurales adicionales.
