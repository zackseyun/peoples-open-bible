translation:
  language: es
  text: Los sabios heredarán honor[a], pero los necios cargarán con la deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los necios son alzados con deshonra”, tomando el participio de manera más pasiva o idiomática. El hebreo de esta cláusula es compacto y se ha entendido de más de una forma.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT
  rationale: En Proverbios, כָּבוֹד suele referirse a prestigio, estima pública o condición honorable más que a la gloria divina. 'Honor' preserva bien el contraste con 'desgracia'.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los sabios varones
  - las personas sabias
  lexicon: HALOT
  rationale: El plural masculino funciona de manera representativa en la literatura sapiencial. 'Los sabios' suena natural en español y mantiene la categoría colectiva.
- source_word: יִנְחָלוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán
  - poseerán
  lexicon: HALOT
  rationale: נחל en qal expresa recibir como herencia o posesión. 'Heredarán' conserva el matiz de obtención futura y la imagen patrimonial del proverbio.
- source_word: וּכְסִילִים
  english_pob_choice: but fools
  chosen_spanish: pero los necios
  alternatives_spanish:
  - y los necios
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el sentido contrastivo de la línea pide 'pero'. 'Necios' transmite bien el valor sapiencial de כְסִילִים.
- source_word: מֵרִים
  english_pob_choice: bear disgrace
  chosen_spanish: cargarán con
  alternatives_spanish:
  - llevarán
  - alzarán
  lexicon: HALOT
  rationale: El participio hifil de רום/רים es compacto y admite lectura idiomática. 'Cargarán con' comunica de forma natural la idea de llevar como propio el oprobio o la deshonra, sin borrar la tensión del hebreo entre 'levantar' y 'soportar'.
- source_word: קָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: la desgracia
  alternatives_spanish:
  - la deshonra
  - la vergüenza
  lexicon: HALOT
  rationale: קָלוֹן denota vergüenza pública, oprobio o deshonra social. 'Desgracia' mantiene la fuerza negativa y el paralelismo con 'honor'.
theological_decisions:
- issue: Contraste sapiencial entre recompensa y oprobio
  english_pob_reading: The wise will inherit honor, but fools bear disgrace.
  chosen_spanish_reading: Los sabios heredarán honor, pero los necios cargarán con la desgracia.
  alternative_spanish_readings:
  - Los sabios recibirán honor, pero los necios llevarán la deshonra.
  - Los sabios poseerán honor, pero los necios serán cubiertos de vergüenza.
  rationale: El verso presenta una antítesis moral y social, no una afirmación doctrinal abstracta. 'Heredarán' preserva la idea de posesión concedida; 'cargarán con la desgracia' deja en español una lectura idiomática que refleja el valor compacto del hebreo sin suavizar el contraste.
  doctrine_reference: 'Sabiduría proverbial: retribución moral y consecuencias sociales (Proverbios 3:35)'
- issue: Lectura alternativa del participio hebreo מֵרִים
  english_pob_reading: but fools bear disgrace. Or 'fools are exalted with disgrace,' taking the participle more passively or idiomatically. The Hebrew of this clause is compact and has been understood in more than one way.
  chosen_spanish_reading: pero los necios cargarán con la desgracia.
  alternative_spanish_readings:
  - pero los necios son alzados con desgracia.
  - pero los necios quedan exaltados con desgracia.
  rationale: Se conserva la lectura principal por ser la más natural en español y coherente con la revisión inglesa que prefirió 'bear disgrace'. Aun así, la estructura hebrea admite una opción pasiva/idiomática; por eso se mantiene la nota de alternativa sin ocultar la compactación del original.
  doctrine_reference: Proverbios 3:35; nota textual y de sentido del participio hifil
translation_notes:
  revision_awareness: La revisión inglesa afinó la segunda mitad desde 'lift up disgrace' a 'bear disgrace' para sonar más natural y más cerca del sentido del hebreo. La versión española adopta esa misma preferencia de sentido, pero conserva en la nota la posibilidad alternativa que nace de la compacidad del participio מֵרִים.
  spanish_consistency_notes:
  - Se usa 'sabios' como sustantivo colectivo, siguiendo el uso sapiencial del hebreo.
  - '''Honor'' y ''desgracia'' se mantienen como par antitético principal para conservar la simetría del proverbio.'
  - No se introduce 'Cristo', 'SEÑOR' ni terminología ajena al verso; el texto no contiene nombres divinos ni mesiánicos.
  - '''Heredarán'' refleja mejor el valor de posesión recibida que un simple ''obtendrán''.'
  - '''Cargarán con'' preserva el sentido idiomático del cierre sin imponer una paráfrasis excesiva.'
