    text: O «no por su causa».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la invocación sobre ellos de su nombre majestuoso y magnífico»; es un giro idiomático para el nombre de Dios invocado sobre su pueblo.
    reason: cultural_note
  revision_rationale: Se corrigió el anclaje de la nota cultural para que explique la cláusula que realmente comenta. También se mejoró la naturalidad del español en la frase final, se alineó mejor διαθήκας con «alianzas» en contexto bíblico y se ajustaron los adjetivos para reflejar con más fidelidad el perfil honorífico del griego y de la auditoría inglesa.
