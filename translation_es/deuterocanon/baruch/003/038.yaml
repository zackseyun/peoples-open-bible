translation:
  language: es
  text: Después de esto apareció en la tierra[a], y vivió entre los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apareció en la tierra y convivió con los seres humanos». El griego también puede entenderse de manera más idiomática como «apareció»; «entre los hombres» significa entre la humanidad en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τοῦτο
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Entonces, después de esto
  lexicon: LSJ
  rationale: Conserva la secuencia temporal explícita del griego sin añadir inferencias; "Después de esto" es natural en español y sigue de cerca la forma del original.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  - sobre la tierra
  lexicon: LSJ
  rationale: '"En la tierra" comunica de modo directo la esfera terrenal frente a una manifestación celestial; evita una paráfrasis más interpretativa como "en el mundo".'
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  - se dejó ver
  - se apareció
  lexicon: LSJ
  rationale: La revisión inglesa prefirió "appeared" por ser más natural y directo. En español, "apareció" conserva esa naturalidad y mantiene el valor del aoristo pasivo/intransitivo sin sobreexplicar.
- source_word: ἐν τοῖς ἀνθρώποις
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre los seres humanos
  - entre la gente
  - entre los hombres y mujeres
  lexicon: LSJ
  rationale: '"ἀνθρώποις" denota humanidad en general. Se mantiene "los hombres" como equivalente representativo y formalmente alineado con la tradición de la POB; otras opciones aclaran el sentido inclusivo, pero cambian el tono.'
- source_word: συνανεστράφη
  english_pob_choice: lived among
  chosen_spanish: vivió entre
  alternatives_spanish:
  - convivió con
  - se relacionó con
  - se condujo entre
  lexicon: LSJ
  rationale: El verbo expresa convivencia o comportamiento sostenido con otros. "Vivió entre" reproduce bien la relación continua implícita sin cargar el texto con una expresión más técnica.
theological_decisions:
- issue: Sujeto masculino implícito en un contexto de Sabiduría
  english_pob_reading: Retain the Greek masculine pronoun as 'he' without resolving the broader interpretive question in the translation itself.
  chosen_spanish_reading: Mantener el sujeto masculino implícito con "apareció / vivió" sin explicitar una identificación doctrinal adicional.
  alternative_spanish_readings:
  - '"ella apareció" para concordar con Sabiduría'
  - '"esto apareció" para neutralizar el sujeto'
  - paráfrasis cristológica explícita
  rationale: El griego usa formas masculinas sin un sustantivo explícito en este versículo, siguiendo el contexto anterior. El español puede omitir el pronombre sujeto y así conservar la tensión interpretativa sin resolverla artificialmente, evitando imponer una conclusión doctrinal que el verso por sí solo no formula.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla.
translation_notes:
  revision_awareness: Se tomó como base la versión inglesa auditada más reciente, que revisó "was seen" a "appeared" para ὤφθη. En español se reflejó esa preferencia con "apareció". También se mantuvo la tensión teológica del sujeto implícito sin introducir una identificación interpretativa adicional.
  spanish_consistency_notes:
  - Se usó "tierra" para ἐπὶ τῆς γῆς en vez de "mundo" para mantener la imagen espacial del original.
  - Se prefirió "apareció" sobre "fue visto" siguiendo la revisión auditada inglesa.
  - Se conservó "los hombres" como equivalente representativo de ἀνθρώποις, coherente con el estilo de la POB.
  - La nota al pie recoge la alternativa idiomática y la posible ampliación inclusiva sin alterar el texto principal.
