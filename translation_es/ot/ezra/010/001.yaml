  language: en
  yaml_path: translation/ot/ezra/010/001.yaml
  text: Now while Ezra was praying and making confession[a], weeping and falling down before the house of God, a very great assembly from Israel gathered to him—men, women, and children—for the people wept greatly.
  footnotes:
