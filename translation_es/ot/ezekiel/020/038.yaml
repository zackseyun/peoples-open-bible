translation:
  language: es
  text: Purgaré[a] de entre ustedes a los rebeldes y a los que transgreden contra mí; los sacaré de la tierra donde habitan como extranjeros[b], pero no entrarán en la tierra de Israel[c]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cribaré de entre ustedes». El verbo hebreo puede expresar la idea de separar selectivamente a quienes no deben permanecer en la comunidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de la tierra de sus estancias como forasteros».
    reason: lexical_alternative
  - marker: c
    text: El hebreo tiene un verbo singular, usado con sentido colectivo o distributivo para el grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוֹתִי
  english_pob_choice: I will purge
  chosen_spanish: yo purgaré
  alternatives_spanish:
  - los apartaré
  - los separaré
  - los cribaré
  lexicon: HALOT
  rationale: El hebreo expresa una remoción selectiva con sentido judicial. «Purgar» conserva la idea de eliminar de entre el grupo a los no aptos, y mantiene la fuerza severa del pasaje mejor que un simple «separar».
- source_word: מִכֶּם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - de en medio de ustedes
  lexicon: HALOT
  rationale: La preposición más el pronombre indican extracción desde el interior del grupo, no solo alejamiento. «De entre ustedes» reproduce bien esa lectura colectiva.
- source_word: הַמֹּרְדִים
  english_pob_choice: the rebels
  chosen_spanish: los rebeldes
  alternatives_spanish:
  - los que se rebelan
  lexicon: HALOT
  rationale: Es un participio usado sustantivamente. «Los rebeldes» es natural en español y conserva el carácter de una clase identificable de personas.
- source_word: וְהַפֹּשְׁעִים בִּי
  english_pob_choice: those who transgress against me
  chosen_spanish: los que transgreden contra mí
  alternatives_spanish:
  - los transgresores contra mí
  - los que se rebelan contra mí
  lexicon: HALOT
  rationale: «פשע» añade una infracción covenantal distinta de מרד. «Transgreden» conserva esa infracción seria sin borrar la distinción semántica; «contra mí» preserva el objeto personal.
- source_word: מֵאֶרֶץ מְגוּרֵיהֶם
  english_pob_choice: out of the land where they sojourn
  chosen_spanish: de la tierra donde habitan como extranjeros
  alternatives_spanish:
  - de la tierra de su morada forastera
  - de la tierra donde peregrinan
  lexicon: HALOT
  rationale: מגור señala residencia como forasteros/sojourners. En español, «habitan como extranjeros» comunica esa condición temporal y alienada sin sonar forzado.
- source_word: אוֹצִיא אוֹתָם
  english_pob_choice: I will bring them out
  chosen_spanish: los sacaré
  alternatives_spanish:
  - los haré salir
  - los traeré fuera
  lexicon: HALOT
  rationale: El hifil de יצא significa causar que salgan. «Los sacaré» es la forma más directa y natural en español para esa acción.
- source_word: וְאֶל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  lexicon: HALOT
  rationale: Aunque אַדְמָה literalmente es «suelo/tierra», aquí funciona como designación territorial. «La tierra de Israel» es la equivalencia idiomática más clara y fiel.
- source_word: לֹא יָבוֹא
  english_pob_choice: they will not enter
  chosen_spanish: no entrarán
  alternatives_spanish:
  - no entrará
  - no llegará a entrar
  lexicon: HALOT
  rationale: El hebreo tiene verbo singular con sentido distributivo/colectivo. El español exige el plural por concordancia con el referente del grupo, sin perder la idea de exclusión de entrada.
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: La partícula conjuntiva introduce consecuencia. «Entonces» refleja mejor el valor resultativo del juicio anunciado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre propio divino y no una sustitución titular.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton, no un título. La forma «Yahvé» conserva el nombre personal del pacto conforme a la norma del proyecto, sin ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza judicial de וּבָרוֹתִי
  english_pob_reading: purge from among you
  chosen_spanish_reading: purgaré de entre ustedes
  alternative_spanish_readings:
  - separaré de entre ustedes
  - sift out from among you
  rationale: El contexto es de depuración/jucio del pueblo restaurado. «Purgaré» conserva el carácter de remoción selectiva y el peso judicial del acto, sin suavizarlo a un mero apartar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text plain sense; do not paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustantivos; la redacción española mantiene las decisiones auditadas sobre el verbo de juicio, la preposición colectiva, el carácter participial de los descriptores, y el nombre divino.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה según la terminología del proyecto.
  - «Purgaré» se usa en sentido judicial-selectivo, no como simple limpieza moral.
  - «De entre ustedes» mantiene la lectura colectiva de מִכֶּם.
  - «No entrarán» adapta al español el singular hebreo distributivo de לֹא יָבוֹא.
  - «La tierra de Israel» se usa como equivalente territorial natural de אַדְמַת יִשְׂרָאֵל.
