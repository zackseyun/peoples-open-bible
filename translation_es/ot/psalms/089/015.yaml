revisions:
- from: La justicia y la rectitud son el fundamento de tu trono[a]; la misericordia leal y la fidelidad van delante de ti.
  to: La rectitud y la justicia son el fundamento de tu trono[a]; el amor leal y la fidelidad van delante de ti.
  rationale: Se ajusta el orden a 'rectitud y justicia' para reflejar fielmente צֶדֶק וּמִשְׁפָּט y la distinción documentada en el expediente inglés. Se reemplaza 'misericordia leal' por 'amor leal' porque es más natural en español y transmite mejor la fuerza relacional/pactual de חֶסֶד junto con 'fidelidad' para אֱמֶת. Se conserva la solución idiomática 'van delante de ti' y la nota sobre 'tu rostro/tu presencia'.
