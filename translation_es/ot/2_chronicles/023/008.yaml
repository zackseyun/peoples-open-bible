translation:
  language: es
  text: Así que los levitas y todo Judá hicieron conforme a todo lo que Jehoiadá el sacerdote había mandado, y cada hombre tomó a sus hombres, los que entraban el sábado junto con los que salían el sábado; porque Jehoiadá el sacerdote no había despedido las divisiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cursos» o «los turnos» para «las divisiones», refiriéndose a los grupos programados de servicio sacerdotal y levítico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Se mantiene el nombre del grupo cultual/tribal con artículo definido plural, tal como en el hebreo y en la traducción inglesa auditada.
- source_word: וְכָל יְהוּדָה
  english_pob_choice: and all Judah
  chosen_spanish: y todo Judá
  alternatives_spanish:
  - y todo el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva/geográfica del hebreo. "Judá" funciona metonímicamente para la población, y la forma breve respeta la economía del original.
- source_word: כְּכֹל אֲשֶׁר צִוָּה
  english_pob_choice: according to all that ... had commanded
  chosen_spanish: conforme a todo lo que ... había mandado
  alternatives_spanish:
  - tal como ... mandó
  lexicon: HALOT
  rationale: '"Conforme a todo lo que" reproduce la amplitud de obediencia de כְּכֹל אֲשֶׁר. "Había mandado" refleja bien la secuencia narrativa y el valor de mandato ya cumplido.'
- source_word: יְהוֹיָדָע הַכֹּהֵן
  english_pob_choice: Jehoiada the priest
  chosen_spanish: Jehoiadá el sacerdote
  alternatives_spanish:
  - Jehoiada el sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación gráfica española estándar (Jehoiadá). Se mantiene el título funcional "el sacerdote" como en la fuente.
- source_word: וַיִּקְחוּ אִישׁ אֶת אֲנָשָׁיו
  english_pob_choice: and each man took his men
  chosen_spanish: y cada hombre tomó a sus hombres
  alternatives_spanish:
  - y cada uno tomó a sus hombres
  - y cada hombre tomó a su gente
  lexicon: HALOT
  rationale: '"Cada hombre" conserva el distributivo de אִישׁ. "Sus hombres" mantiene el referente de personal subordinado sin forzar el término a una equivalencia militar más interpretativa.'
- source_word: בָּאֵי הַשַּׁבָּת
  english_pob_choice: those coming in on the Sabbath
  chosen_spanish: los que entraban en sábado
  alternatives_spanish:
  - los que venían en sábado
  - los que entraban el sábado
  lexicon: HALOT
  rationale: '"Entraban" reproduce el participio de movimiento de בוא. "En sábado" conserva la referencia al día señalado para el cambio de turno, sin añadir matices no explicitados.'
- source_word: עִם יוֹצְאֵי הַשַּׁבָּת
  english_pob_choice: together with those going out on the Sabbath
  chosen_spanish: junto con los que salían en sábado
  alternatives_spanish:
  - con los que salían en sábado
  - junto con los que salían el sábado
  lexicon: HALOT
  rationale: '"Junto con" expresa la coexistencia de ambos grupos. "Salían" refleja el paralelo del hebreo y conserva la imagen del relevo.'
- source_word: לֹא פָטַר
  english_pob_choice: had not dismissed
  chosen_spanish: no había despedido
  alternatives_spanish:
  - no había liberado
  - no había soltado
  lexicon: HALOT
  rationale: En este contexto, פטר significa dejar ir o relevar del servicio. "Despedido" comunica con naturalidad que Jehoiadá no los había enviado fuera al término habitual de su turno.
- source_word: הַמַּחְלְקוֹת
  english_pob_choice: the divisions
  chosen_spanish: las divisiones
  alternatives_spanish:
  - los cursos
  - los turnos
  lexicon: HALOT
  rationale: '"Divisiones" sigue la elección inglesa auditada y es suficientemente transparente. Se preserva la posible referencia a grupos organizados de servicio sin imponer una tradición terminológica más cerrada.'
theological_decisions:
- issue: Referencia a Yahvé implícita en el marco narrativo del libro, pero no presente en este versículo
  english_pob_reading: No explicit divine-name term in the verse; no masking issue arises here.
  chosen_spanish_reading: No aparece un término para el nombre divino en este versículo; no se introduce ninguna sustitución.
  alternative_spanish_readings:
  - Sustituir por SEÑOR en línea con algunas tradiciones
  rationale: El hebreo de este versículo no contiene יהוה ni κύριος; por tanto, no corresponde aplicar la convención "Yahvé" ni ninguna ocultación del nombre divino. Se mantiene estrictamente lo que dice la fuente.
  doctrine_reference: No aplica
- issue: Sentido de las "divisiones" como grupos de servicio cultual
  english_pob_reading: the divisions = scheduled priestly and Levitical service groups
  chosen_spanish_reading: las divisiones = grupos organizados de servicio sacerdotal y levítico
  alternative_spanish_readings:
  - los cursos
  - los turnos
  rationale: Se conserva la referencia funcional a grupos de servicio sin convertirla en terminología eclesiástica posterior. La traducción permanece abierta a la nota léxica de alternativas, como en el registro inglés.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido ya confirmado en el contexto auditado en inglés, sin cambios de contenido respecto del pasaje base. Se mantiene la misma estructura semántica: obediencia a Jehoiadá, toma de sus hombres por turnos de entrada y salida en sábado, y la explicación final de que no había despedido las divisiones.'
  spanish_consistency_notes:
  - Se usa «Jehoiadá» como transliteración española estable del nombre יְהוֹיָדָע.
  - Se mantiene «los levitas» y «Judá» en forma breve y fiel al hebreo.
  - «Divisiones» conserva el término técnico del contexto; las alternativas se reservan para la nota.
  - La puntuación se adapta al español moderno sin alterar la relación causal ni la coordinación del hebreo.
