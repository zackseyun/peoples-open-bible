  yaml_path: translation/nt/hebrews/004/009.yaml
  text: So then, a Sabbath rest remains for the people of God.
translation:
  language: ko
  text: 그렇다면 하나님의 백성에게는 안식일의 안식이[a] 아직 남아 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σαββατισμός는 신약에서 오직 여기에만 나오는 단어로, 「안식일을 지킴, 안식일 모양의 안식」을 가리킨다. 4:1-11의 κατάπαυσις(안식)와 구별되며, 창조의 일곱째 날 안식과 종말론적 안식이 결합된 함의를 갖는다.
    reason: lexical_alternative
theological_decisions:
- issue: σαββατισμός의 번역
  chosen_reading: 안식일의 안식
  alternative_readings:
  - 안식
  - 안식일 준수
  - 안식의 날
  rationale: σαββατισμός는 신약에서 유일하게 사용된 명사로, κατάπαυσις(일반 안식)와 의도적으로 구별된다. 단순히 「안식」으로 옮기면 4장 전체의 단어 대조가 무너지고, 창조의 일곱째 날 안식의 성취라는 함의가 사라진다. 「안식일의 안식」으로 옮겨 안식일 형태의 종말론적 안식임을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: theological terminology preservation; PHILOSOPHY.md: hapax legomena handling'
