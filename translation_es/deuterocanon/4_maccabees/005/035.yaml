- from: No te avergonzaré, oh filosofía [a], ni te renunciaré, sacerdocio honrado y conocimiento de la ley [b].
  to: Ni te avergonzaré, oh razón filosófica[a], ni renegaré de ti[b], sacerdocio honrado y conocimiento de la ley.
