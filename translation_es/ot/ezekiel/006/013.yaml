revisions:
- from: 'Entonces sabrán que yo soy Yahvé[a], cuando sus muertos caigan en medio de sus ídolos, alrededor de sus altares, sobre todo collado alto, en todas las cumbres de los montes, y debajo de todo árbol frondoso y debajo de toda encina espesa: el lugar donde ofrecieron un olor agradable a todos sus ídolos.'
  to: 'Entonces sabrán que yo soy Yahvé, cuando sus muertos estén en medio de sus ídolos[a], alrededor de sus altares, en todo collado alto, en todas las cumbres de los montes, y debajo de todo árbol frondoso y debajo de todo terebinto frondoso: los lugares donde ofrecieron allí un aroma agradable a todos sus ídolos.'
  rationale: La revisión corrige el anclaje de la nota para que recaiga sobre «ídolos», elimina la acción añadida «caigan» y la sustituye por «estén», que refleja mejor la construcción circunstancial hebrea; ajusta אֵלָה a «terebinto» según la decisión lexical auditada; cambia «el lugar donde» por «los lugares donde» para preservar el sentido distributivo del pasaje; y mejora el giro cultual con «aroma agradable». También se suaviza la sintaxis locativa con «en todo collado alto».
  reviewer_model: gpt-5.4
