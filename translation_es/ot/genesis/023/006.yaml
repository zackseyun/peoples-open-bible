translation:
  language: es
  text: 'Escúchanos[a], mi señor: tú eres un príncipe de Dios entre nosotros. Entierra a tu muerto en lo mejor de nuestros sepulcros. Ninguno de nosotros te negará su sepulcro[b], de enterrar a tu muerto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un príncipe poderoso entre nosotros». La expresión hebrea «príncipe de Dios» puede funcionar idiomáticamente como superlativo.
    reason: lexical_alternative
  - marker: b
    text: O, «impidiéndote enterrar a tu muerto». El hebreo usa una construcción con la preposición מן para expresar prevención.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמָעֵנוּ
  english_pob_choice: Hear us
  chosen_spanish: Escúchanos
  alternatives_spanish:
  - Óyenos
  - Escúchanos, por favor
  lexicon: HALOT
  rationale: El imperativo de שׁמע con sufijo de 1cp pide una apelación directa y respetuosa. «Escúchanos» suena natural en español y conserva el tono de súplica formal.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  lexicon: HALOT
  rationale: Es una fórmula de deferencia hacia Abraham. «Mi señor» reproduce la relación de respeto sin introducir un registro demasiado arcaico.
- source_word: נְשִׂיא אֱלֹהִים
  english_pob_choice: a prince of God
  chosen_spanish: un príncipe de Dios
  alternatives_spanish:
  - un príncipe poderoso
  - un príncipe favorecido por Dios
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «príncipe de Dios». Se conserva esa formulación porque el audit trail inglés también la retiene como expresión de base, aun reconociendo su posible valor superlativo o intensivo.
- source_word: בְּתוֹכֵנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  lexicon: HALOT
  rationale: «Entre nosotros» transmite con naturalidad la inserción comunitaria de Abraham en el grupo hablante.
- source_word: בְּמִבְחַר קְבָרֵינוּ
  english_pob_choice: in the choicest of our tombs
  chosen_spanish: en el mejor de nuestros sepulcros
  alternatives_spanish:
  - en los más escogidos de nuestros sepulcros
  - en nuestros mejores lugares de sepultura
  lexicon: HALOT
  rationale: מבחר indica lo escogido o de mejor calidad. «El mejor» comunica el superlativo cortesano de la oferta. «Sepulcros» mantiene el campo funerario del texto y suena más sobrio que «graves» en español.
- source_word: קְבֹר אֶת מֵתֶךָ
  english_pob_choice: Bury your dead
  chosen_spanish: Entierra a tu muerto
  alternatives_spanish:
  - Sepulta a tu muerto
  - Entierra a tus muertos
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con tono de cortesía/posesión. «Tu muerto» conserva la literalidad básica y el singular del original, sin forzar un plural idiomático.
- source_word: אִישׁ מִמֶּנּוּ
  english_pob_choice: None of us
  chosen_spanish: Ninguno de nosotros
  alternatives_spanish:
  - Ningún hombre de entre nosotros
  - Nadie de nosotros
  lexicon: HALOT
  rationale: La construcción negada expresa distributivamente «no uno de nosotros». «Ninguno de nosotros» es la forma española más clara y fiel al sentido colectivo.
- source_word: אֶת קִבְרוֹ
  english_pob_choice: his tomb
  chosen_spanish: su sepulcro
  alternatives_spanish:
  - su tumba
  - su sepulcro
  lexicon: HALOT
  rationale: Se mantiene la consistencia con «sepulcros» y se evita una alternancia innecesaria. El posesivo distributivo sigue el sentido de que cada miembro tendría su propio lugar de sepultura.
- source_word: לֹא יִכְלֶה מִמְּךָ
  english_pob_choice: will withhold from you
  chosen_spanish: te negará
  alternatives_spanish:
  - te retendrá
  - te privará
  lexicon: HALOT
  rationale: כלה en este contexto expresa no retener ni rehusar. «Negará» funciona bien en español jurídico-comunitario y comunica la negativa a conceder el sepulcro.
- source_word: מִקְּבֹר מֵתֶךָ
  english_pob_choice: from burying your dead
  chosen_spanish: impidiéndote enterrar a tu muerto
  alternatives_spanish:
  - para impedir que entierres a tu muerto
  - de manera que no entierres a tu muerto
  lexicon: HALOT
  rationale: 'La preposición מן con infinitivo indica prevención. En español conviene explicitar el efecto resultante: no se le negará el sepulcro de modo que se le impida enterrar a su muerto.'
theological_decisions:
- issue: 'nְשִׂיא אֱלֹהִים: título honorífico con posible intensificación'
  english_pob_reading: a prince of God, with a footnote noting it can function idiomatically as a superlative ('a mighty prince among us')
  chosen_spanish_reading: un príncipe de Dios
  alternative_spanish_readings:
  - un príncipe poderoso entre nosotros
  - un príncipe favorecido por Dios
  rationale: Se conserva la formulación fuente-orientada y la tensión interpretativa. La nota permite que el lector vea la posible fuerza superlativa sin reemplazar el hebreo por una paráfrasis interpretativa en el texto principal.
  doctrine_reference: Uso idiomático del constructo hebreo; no implica una doctrina específica.
- issue: 'Última cláusula: construcción preventiva con מן + infinitivo'
  english_pob_reading: will withhold his tomb from you, from burying your dead
  chosen_spanish_reading: te negará su sepulcro, impidiéndote enterrar a tu muerto
  alternative_spanish_readings:
  - te negará su sepulcro, para que no entierres a tu muerto
  - te retendrá su sepulcro, de modo que no entierres a tu muerto
  rationale: La cláusula final expresa prevención, no mera negación abstracta. El español explicita el resultado preventivo sin borrar el vínculo sintáctico entre el no rehusar el sepulcro y el no poder enterrar al muerto.
  doctrine_reference: Sintaxis hebrea de prevención; sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: Se tomó como guía el texto hebreo masorético de Génesis 23:6 y el audit trail inglés más reciente. Se mantuvo la lectura fuente-orientada de נְשִׂיא אֱלֹהִים y se evitó la paráfrasis más interpretativa «príncipe poderoso» en el texto principal, reservándola para nota. En la cláusula final, se preservó el sentido preventivo de la construcción hebrea, pero se volvió más natural en español mediante una formulación explícita de impedimento.
  spanish_consistency_notes:
  - Se usó «sepulcro/s» de manera uniforme para mantener coherencia con el lenguaje funerario elevado del versículo.
  - Se prefirió «tu muerto» para conservar el singular poseído del hebreo, aun cuando el español pudiera sonar más natural con un plural generalizante.
  - «Entre nosotros» y «Ninguno de nosotros» sostienen el marco comunitario de la negociación sin diluir la cortesía del discurso.
