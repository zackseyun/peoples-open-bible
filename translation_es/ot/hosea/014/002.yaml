revisions:
- from: ¡Vuélvete[a], oh Israel, a Yahvé tu Dios, porque has tropezado en tu iniquidad.
  to: ¡Vuelve[a], oh Israel, a Yahvé tu Dios, porque has tropezado en tu iniquidad!
  rationale: Se hace una corrección menor para mejorar la naturalidad y fidelidad del imperativo hebreo en español ('Vuelve' en lugar de 'Vuélvete') y se corrige la puntuación española cerrando la exclamación. Se conserva la estructura, la terminología del proyecto y la nota léxica sobre el valor causal posible de la preposición.
  reviewer_model: gpt-5.4
