revisions:
- from: Sacaron a Urías de Egipto y lo llevaron al rey Joacim[a]; y él lo hirió con la espada y arrojó su cadáver a los sepulcros de los hijos del pueblo.
  to: Sacaron a Urías de Egipto y lo llevaron al rey Joaquim[a]; y él lo mató a espada y arrojó su cadáver a los sepulcros de la gente común.
  rationale: 'Se revisa para alinear mejor el español con el sentido documentado del hebreo y del POB inglés: se cambia ''lo hirió con la espada'' por ''lo mató a espada'' para expresar la letalidad contextual; se sustituye ''los hijos del pueblo'' por ''la gente común'' para comunicar el contraste social explícitamente señalado en la auditoría; se normaliza ''Joaquim'' para mayor legibilidad en español amplio; y se pule la nota al pie para que suene natural y preserve la alternativa léxica.'
