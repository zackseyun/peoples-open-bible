translation:
  text: There is one who grows rich through affliction[b][a], and this is the reward he deserves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through self-denial,' 'through suffering,' or 'from toil.' The Hebrew מֵהִתְעַנּוֹת is broad enough to cover hardship or self-affliction; the Greek parallel points toward labor and poverty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'and this will make liable his reward' (or similar). The clause is difficult; the translation gives the probable sense of due recompense in idiomatic English.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is one
  alternatives:
  - There is
  - One may be
  lexicon: HALOT
  rationale: Existential opening introducing a type of person; English idiom is clearer with 'There is one' in wisdom-style observation.
- source_word: מִתְעַשּׁר
  chosen: grows rich
  alternatives:
  - becomes rich
  - prospers
  lexicon: HALOT
  rationale: Hitpael participle from עשר denotes becoming wealthy; 'grows rich' preserves the processual sense better than the stative 'is rich.'
- source_word: מֵהִתְעַנּוֹת
  chosen: through affliction
  alternatives:
  - through self-denial
  - through suffering
  - from toil
  lexicon: HALOT
  rationale: The Hebrew points to being afflicted or practicing self-denial. In context and with the Greek parallel's emphasis on labor/poverty and sudden enrichment by the Lord, 'through affliction' best preserves the broad sense without over-specifying whether the suffering is voluntary asceticism or imposed hardship.
- source_word: וְזֶה
  chosen: and this
  alternatives:
  - and that
  - yet this
  lexicon: HALOT
  rationale: Straightforward demonstrative referring to the outcome just described.
- source_word: יְחַיֵּב
  chosen: deserves
  alternatives:
  - makes liable for
  - obligates
  - incurs
  lexicon: HALOT
  rationale: The verb can denote being liable or obligated. In this compressed wisdom saying, the sense is that such affliction-riches constitute the person's due recompense; 'deserves' gives the idiomatic force in English.
- source_word: שְׂכָרוֹ
  chosen: the reward he deserves
  alternatives:
  - his reward
  - his wages
  - his recompense
  lexicon: HALOT
  rationale: שכר commonly means reward, wages, recompense. Because יְחַיֵּב is difficult if rendered woodenly, the phrase is brought into natural English as 'the reward he deserves,' preserving the idea of due recompense.
- source_word: πόνῳ σου / πλουτίσαι πένητα (Greek parallel)
  chosen: through affliction
  alternatives:
  - through labor
  - from poverty
  lexicon: BDAG
  rationale: The Greek parallel warns against marveling at a sinner's works and says it is easy for the Lord suddenly to enrich a poor person, with an exhortation to remain in one's labor. This supports understanding the Hebrew phrase as hardship/lowliness rather than luxury or exploitation, and confirms the enrichment-from-hardship motif.
