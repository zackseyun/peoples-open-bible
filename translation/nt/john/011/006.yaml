theological_decisions:
- issue: Narrative implication of Jesus delaying after hearing of Lazarus's illness
  chosen_reading: Render the statement plainly without softening or explaining the delay.
  alternative_readings:
  - Paraphrasing to imply compassionate strategy in the main text
  - Smoothing the wording to reduce the apparent tension
  rationale: The verse intentionally presents the tension that Jesus, upon hearing of the illness, stayed two more days. Per translation philosophy, theological tension should be preserved rather than resolved in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
