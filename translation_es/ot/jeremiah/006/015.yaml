  to: ¿Se avergonzaron porque hicieron una abominación? No, no se avergonzaron en absoluto; ni siquiera sabían cómo sonrojarse. Por tanto, caerán entre los caídos; cuando yo los castigue[a], tropezarán, dice Yahvé.
