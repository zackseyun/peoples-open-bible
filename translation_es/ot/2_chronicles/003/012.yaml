translation:
  language: es
  text: Y un ala del primer querubín medía cinco codos, llegando hasta el muro de la casa; y la otra ala medía cinco codos[a], tocando el ala del otro querubín.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unida al ala del otro querubín».
    reason: lexical_alternative
  - marker: b
    text: «La casa» aquí se refiere al edificio del templo.
    reason: cultural_note
lexical_decisions:
- source_word: כְנַף
  english_pob_choice: wing
  chosen_spanish: ala
  alternatives_spanish:
  - ala
  - wing
  lexicon: HALOT
  rationale: En el contexto de los querubines del templo, el sentido concreto es el de un apéndice alado. En español, «ala» es el equivalente natural y fiel de «wing».
- source_word: כְּרוּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querubín
  - querub
  lexicon: HALOT
  rationale: El hebreo está en singular y se refiere a una figura individual. «Querubín» es la forma usual y clara en español bíblico para singular y evita la ambigüedad de un plural colectivo.
- source_word: אַמּוֹת חָמֵשׁ
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos
  - unos 2,25 metros
  lexicon: HALOT
  rationale: Se conserva la unidad antigua por fidelidad formal y coherencia en medidas arquitectónicas. Una equivalencia moderna sería interpretativa y menos auditable.
- source_word: מַגִּיעַ
  english_pob_choice: reaching
  chosen_spanish: llegando hasta
  alternatives_spanish:
  - llegando hasta
  - extendiéndose hasta
  - alcanzando
  lexicon: HALOT
  rationale: «Llegando hasta» expresa el contacto o alcance físico del ala con el muro sin sobrecargar el texto con una formulación técnica innecesaria.
- source_word: קִיר הַבָּיִת
  english_pob_choice: the wall of the house
  chosen_spanish: el muro de la casa
  alternatives_spanish:
  - el muro de la casa
  - el muro del templo
  lexicon: HALOT
  rationale: Se sigue de cerca el hebreo «casa». En este contexto cronístico, la referencia es al edificio del templo, pero la traducción mantiene el término fuente y deja que el contexto lo identifique.
- source_word: הַכָּנָף הָאַחֶרֶת
  english_pob_choice: the other wing
  chosen_spanish: la otra ala
  alternatives_spanish:
  - la otra ala
  - la segunda ala
  lexicon: HALOT
  rationale: «La otra ala» reproduce de manera natural el valor relacional de «the other wing» y preserva el paralelismo con la primera mitad del versículo.
- source_word: דְּבֵקָה
  english_pob_choice: touching
  chosen_spanish: tocando
  alternatives_spanish:
  - tocando
  - unida a
  - pegada a
  lexicon: HALOT
  rationale: «Tocando» conserva la idea de contacto físico directo sin añadir la noción de ensamblaje permanente que podría sugerir «unida a».
- source_word: הַכְּרוּב הָאַחֵר
  english_pob_choice: the other cherub
  chosen_spanish: el otro querubín
  alternatives_spanish:
  - el otro querubín
  - el segundo querubín
  lexicon: HALOT
  rationale: Se mantiene la relación de par expresada por «other» y la concordancia singular del hebreo.
theological_decisions:
- issue: Referencia de «la casa»
  english_pob_reading: The house here refers to the temple building.
  chosen_spanish_reading: La «casa» se entiende como el edificio del templo.
  alternative_spanish_readings:
  - La casa
  - el templo
  rationale: La traducción conserva el sustantivo hebreo «casa» en el texto principal, pero el contexto de Crónicas aclara que se trata del edificio del templo. Esta solución mantiene transparencia y legibilidad sin ocultar el trasfondo arquitectónico.
  doctrine_reference: Contexto histórico-templario de 2 Crónicas 3
- issue: Posible tensión lexical entre «tocando» y «unida a»
  english_pob_reading: Or 'joined to the wing of the other cherub.'
  chosen_spanish_reading: «tocando» en el texto principal, con alternativa «unida a».
  alternative_spanish_readings:
  - tocando
  - unida a
  - pegada a
  rationale: El inglés POB documenta una alternativa lexical. En español, «tocando» es más natural y no implica fijación mecánica; la nota preserva la alternativa para no borrar la ambigüedad del hebreo.
  doctrine_reference: Precisión descriptiva del texto arquitectónico
- issue: Uso de «querubín» en singular
  english_pob_reading: Singular noun here, so 'cherub' is required.
  chosen_spanish_reading: «querubín» singular en ambos casos.
  alternative_spanish_readings:
  - querub
  - querubines
  rationale: El hebreo describe dos seres distintos y el singular importa para la precisión exegética. En español, «querubín» comunica claramente esa singularidad sin recurrir al plural colectivo.
  doctrine_reference: Gramática y referencia nominal del hebreo
translation_notes:
  revision_awareness: 'Se revisó el pasaje contra el texto hebreo (WLC) y el auditorial inglés de la POB. No se requirieron cambios de fondo respecto del sentido básico: se mantuvo la medida antigua, la singularidad de «querubín» y la relación espacial de las alas. La única tensión relevante es la alternativa lexical entre contacto físico («tocando») y unión («unida a»), que se conserva en nota para no perder la ambigüedad documentada.'
  spanish_consistency_notes:
  - Se usa «codos» para אַמּוֹת de manera uniforme y medible.
  - Se preserva «casa» en el texto principal para reflejar el hebreo, con aclaración contextual en nota.
  - Se mantiene «querubín» singular por fidelidad morfosintáctica.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita de κύριος.
