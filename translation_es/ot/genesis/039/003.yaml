review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: «vio», «su amo», «Yahvé», «estaba con él» y la causalidad de «hacía prosperar» son fieles al texto fuente y al rastro de auditoría inglés. También preserva correctamente el nombre divino «Yahvé». Sin embargo, la colocación de la nota [a] está anclada en «él» aunque la nota explica «en su mano», y el cierre «todo lo que él hacía» suena algo menos natural que una formulación equivalente más fluida en español.'
  spanish_quality_summary: El español es claro y digno, pero «en su mano» en el cuerpo principal requiere la nota en el lugar correcto para evitar confusión. Además, repetir «él» en «todo lo que él hacía» no es necesario en español y vuelve la frase un poco más pesada. Una leve mejora de fluidez mantiene el sentido sin apartarse del hebreo.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales. «Su amo» es aceptable en el contexto de esclavitud doméstica. La decisión de conservar «en su mano» en el texto principal concuerda con la filosofía de equivalencia óptima, siempre que la nota quede bien anclada.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota comenta la expresión hebrea «en su mano» / בְּיָדוֹ, pero en el borrador aparece después de «él». Eso induce a pensar que la nota explica «con él» en vez de «en su mano».
  - severity: low
    issue: Redundancia estilística en «todo lo que él hacía».
    rationale: El pronombre explícito «él» no es necesario en español y hace la frase más pesada. «Todo lo que hacía» conserva plenamente la referencia a José y mejora la naturalidad.
  revised_spanish_text: Su amo vio que Yahvé estaba con él, y que Yahvé hacía prosperar en su mano[a] todo lo que hacía.
  revised_footnotes:
  - marker: a
    text: O «por medio de su mano» o «bajo su dirección»; el hebreo dice literalmente «en su mano».
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido fuente y la terminología POB, pero se corrige la ubicación de la nota para que explique la frase correcta («en su mano») y se aligera la redacción eliminando el pronombre innecesario «él». No hace falta adjudicación adicional porque el ajuste es menor y no doctrinal.
