translation:
  language: es
  text: Porque yo pasaré por la tierra de Egipto en esta noche[a], y heriré a todo primogénito en la tierra de Egipto, desde el hombre hasta la bestia[b]; y contra todos los dioses de Egipto ejecutaré juicios. Yo soy Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iré por». El verbo aquí indica pasar a través de la tierra, no «pasar por alto» en el sentido de perdonar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el hombre hasta la bestia».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: YHWH, tradicionalmente «el SEÑOR»; aquí se conserva «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַרְתִּי
  english_pob_choice: I will pass through
  chosen_spanish: pasaré por
  alternatives_spanish:
  - iré por
  - pasaré sobre
  lexicon: HALOT
  rationale: עבר con בְּאֶרֶץ indica atravesar o pasar por la tierra; 'pasaré por' conserva el movimiento a través del territorio y evita confundirlo con el sentido de 'pasar por alto'.
- source_word: בְאֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: HALOT
  rationale: El hebreo nombra el territorio; 'tierra' conserva el alcance geográfico del juicio.
- source_word: בַּלַּיְלָה הַזֶּה
  english_pob_choice: on this night
  chosen_spanish: en esta noche
  alternatives_spanish:
  - durante esta noche
  - esta noche
  lexicon: HALOT
  rationale: La frase temporal se expresa de manera natural en español sin perder el demostrativo.
- source_word: וְהִכֵּיתִי
  english_pob_choice: I will strike
  chosen_spanish: heriré
  alternatives_spanish:
  - golpearé
  - golpearé de muerte
  - smitiré
  lexicon: HALOT
  rationale: נכה puede abarcar herir, golpear o abatir; 'heriré' mantiene el registro bíblico y deja implícito, por el contexto, el efecto mortal sobre los primogénitos.
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo primer nacido
  lexicon: HALOT
  rationale: La expresión singular colectiva se vierte de forma natural en español como 'todo primogénito', sin añadir 'varón' que el hebreo no explicita.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: desde el hombre hasta la bestia
  alternatives_spanish:
  - desde el ser humano hasta el animal
  - desde la humanidad hasta el ganado
  lexicon: HALOT
  rationale: Se conserva el merismo humano-animal y la fuerza expresiva de 'אָדָם' frente a 'בְּהֵמָה'. 'Bestia' funciona como equivalente natural y solemne de בְּהֵמָה en este contraste.
- source_word: וּבְכָל אֱלֹהֵי מִצְרַיִם
  english_pob_choice: against all the gods of Egypt
  chosen_spanish: sobre todos los dioses de Egipto
  alternatives_spanish:
  - contra todos los dioses de Egipto
  - sobre todas las deidades de Egipto
  lexicon: HALOT
  rationale: La preposición con עשה שפטים expresa acción dirigida contra ellos; 'sobre' reproduce esa dirección en español sin introducir una lectura más interpretativa que el hebreo.
- source_word: אֶעֱשֶׂה שְׁפָטִים
  english_pob_choice: I will execute judgments
  chosen_spanish: ejecutaré juicios
  alternatives_spanish:
  - haré juicios
  - ejerceré juicios
  - infligiré castigos
  lexicon: HALOT
  rationale: Se conserva la fuerza judicial del idiomático שׁפטים. 'Ejecutaré juicios' mantiene el peso formal del original sin reducirlo a mera venganza o castigo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se expresa en la forma española de uso proyectual, 'Yahvé', conforme al estándar del proyecto, en lugar de reemplazarlo por una máscara litúrgica.
theological_decisions:
- issue: El alcance de los juicios sobre los dioses de Egipto
  english_pob_reading: the gods of Egypt
  chosen_spanish_reading: los dioses de Egipto
  alternative_spanish_readings:
  - las deidades de Egipto
  - los ídolos de Egipto
  rationale: El hebreo dice de manera directa 'dioses de Egipto'; la traducción conserva esa afirmación teológica sin suavizarla a una referencia meramente simbólica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: El nombre divino final
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto concluye con el Tetragrámaton; se mantiene el nombre propio del pacto en español, conforme a la directriz del proyecto, en vez de una sustitución por 'Señor'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: El valor de 'heriré' para וְהִכֵּיתִי
  english_pob_reading: I will strike
  chosen_spanish_reading: heriré
  alternative_spanish_readings:
  - golpearé
  - abatiré
  rationale: Aunque el contexto implica muerte, el hebreo usa un verbo de golpe/lesión; 'heriré' conserva esa tensión sin explicitar más de lo que el texto dice.
  doctrine_reference: HALOT, נכה
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y con alto acuerdo general con el original; se mantuvo la decisión del nombre divino como Yahvé y la coordinación del merismo humano-animal sin añadidos interpretativos.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Tierra de Egipto'' mantiene el valor territorial de בְּאֶרֶץ מִצְרַיִם.'
  - '''Todo primogénito'' refleja el singular colectivo del hebreo sin añadir ''varón''.'
  - '''Ejecutaré juicios'' mantiene el matiz forense/judicial de שְׁפָטִים.'
  - 'El merismo ''desde el hombre hasta la bestia'' se anotó como alternativa textual, ya que el español publicado usa una formulación más natural: ''desde el hombre hasta la bestia''.'
