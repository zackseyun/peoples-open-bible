    text: Or 'into your bosom' or 'into your lap.' The Hebrew idiom conveys intimate possession or reception.
    reason: lexical_alternative
  - marker: b
    text: Or 'such things and more.' The Hebrew expression is an idiom for adding still more of the same kind.
    reason: lexical_alternative
