base_translation:
  language: en
  yaml_path: translation/ot/2_kings/008/026.yaml
  text: Ahaziah was twenty-two years old when he became king[a], and he reigned one year in Jerusalem. His mother's name was Athaliah, the daughter of Omri king of Israel.
  footnotes:
  - marker: a
    text: Or 'descendant of Omri.' Hebrew 'daughter' can sometimes denote a female descendant or member of a dynasty rather than an immediate daughter.
    reason: lexical_alternative
