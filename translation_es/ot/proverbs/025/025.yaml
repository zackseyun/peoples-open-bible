translation:
  language: es
  text: Como agua fría para el alma cansada[a], así es la buena noticia de una tierra lejana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un buen informe de una tierra lejana». El hebreo שְׁמוּעָה puede significar «noticia», «informe» o «reporte».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: En español, como en inglés, el sustantivo funciona naturalmente como nombre de masa en esta comparación; "agua" conserva la imagen viva y fluida del original.
- source_word: קָרִים
  english_pob_choice: cold
  chosen_spanish: fría
  alternatives_spanish:
  - fresca
  - helada
  lexicon: HALOT
  rationale: El adjetivo expresa frialdad real. "Fría" es la equivalencia directa y más natural para mantener el efecto refrescante.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a
  - sobre
  lexicon: HALOT
  rationale: La preposición hebrea introduce el destinatario del alivio; en español, "para" conserva el sentido relacional sin sonar forzado como un calco de "sobre".
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - persona
  - vida
  - ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ designa el ser interior agotado. "Alma" preserva el registro poético y la carga interior que el contexto requiere.
- source_word: עֲיֵפָה
  english_pob_choice: weary
  chosen_spanish: cansada
  alternatives_spanish:
  - fatigada
  - exhausta
  lexicon: HALOT
  rationale: '"Cansada" comunica agotamiento de forma clara y natural en español, manteniendo el tono poético sin volverse técnico o excesivo.'
- source_word: וּשְׁמוּעָה
  english_pob_choice: good news
  chosen_spanish: buena noticia
  alternatives_spanish:
  - buenas nuevas
  - buen reporte
  - buenas noticias
  lexicon: HALOT
  rationale: שְׁמוּעָה puede ser noticia, informe o noticia recibida. "Buena noticia" es el equivalente moderno más claro y conserva el valor comunicativo que refresca como el agua.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - agradable
  - favorable
  lexicon: HALOT
  rationale: El adjetivo califica la noticia como beneficiosa y deseable; "buena" es la opción más directa y fiel.
- source_word: מֵאֶרֶץ מֶרְחָק
  english_pob_choice: from a distant land
  chosen_spanish: de tierra lejana
  alternatives_spanish:
  - de un país lejano
  - de una tierra distante
  - desde tierra lejana
  lexicon: HALOT
  rationale: La expresión hebrea indica lejanía geográfica. "De tierra lejana" mantiene la imagen breve y poética del original sin añadir una especificación no presente en el hebreo.
translation_notes:
  revision_awareness: El inglés auditado quedó sin cambios en la última revisión y el control cruzado mostró alto acuerdo; esta versión española sigue de cerca la imagen hebrea y adopta la equivalencia comunicativa de la nota inglesa para שְׁמוּעָה, manteniendo el paralelismo y la brevedad poética del proverbio.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «alma» para נֶפֶשׁ por coherencia con el registro poético, sin convertirlo en una paráfrasis antropológica.
  - «Buena noticia» se eligió como equivalente funcional de שְׁמוּעָה, preservando la alternativa semántica en nota.
  - La sintaxis española conserva el símil inicial con «Como… así…», correspondiente al paralelismo hebreo.
