translation:
  language: es
  text: Apoya a tu prójimo según tu capacidad, y ten cuidado, no sea que caigas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que no caigas en problemas» o «para que no quedes atrapado». El griego deja indeterminado el peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιλαβοῦ
  english_pob_choice: Support
  chosen_spanish: Apoya
  alternatives_spanish:
  - Sostén
  - Socorre
  - Ayuda
  lexicon: BDAG
  rationale: El imperativo medio ἀντιλαβοῦ implica prestar ayuda activa o tomar a alguien a cargo. «Apoya» conserva la idea de asistencia práctica y funciona con naturalidad en español sin debilitar el mandato.
- source_word: τοῦ πλησίον
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  - a tu prójimo cercano
  lexicon: BDAG
  rationale: En contextos éticos, πλησίον se refiere al otro que está cercano en relación moral o social. «Prójimo» comunica bien esa relación en español bíblico contemporáneo y evita restringirlo a proximidad espacial literal.
- source_word: κατὰ δύναμίν σου
  english_pob_choice: according to your ability
  chosen_spanish: según tu capacidad
  alternatives_spanish:
  - conforme a tus fuerzas
  - en proporción a tu capacidad
  - hasta donde puedas
  lexicon: BDAG
  rationale: κατά con acusativo expresa medida o norma. «Según tu capacidad» mantiene el límite proporcionado del griego y suena claro y sobrio en español.
- source_word: πρόσεχε σεαυτῷ
  english_pob_choice: watch yourself
  chosen_spanish: cuídate de ti mismo
  alternatives_spanish:
  - presta atención a ti mismo
  - vigílate
  - mantente atento a ti mismo
  lexicon: BDAG
  rationale: La fórmula es una advertencia reflexiva. En español, «cuídate de ti mismo» transmite la cautela personal requerida, aunque suene algo más exhortativa que literal; se conserva el sentido de vigilancia sobre uno mismo.
- source_word: μὴ ἐμπέσῃς
  english_pob_choice: lest you fall
  chosen_spanish: no sea que caigas
  alternatives_spanish:
  - para que no caigas
  - no vayas a caer
  - para que no caigas en dificultades
  lexicon: BDAG
  rationale: ἐμπέσῃς literalmente es «caigas»; el griego no explicita el objeto del caer. «No sea que caigas» preserva la advertencia abierta sin añadir «en problemas» o «en trampa» al texto principal.
theological_decisions:
- issue: Alcance indeterminado del peligro en μὴ ἐμπέσῃς
  english_pob_reading: A general caution to avoid falling oneself while helping another
  chosen_spanish_reading: Una advertencia general para no dañarse o caer uno mismo al ayudar al prójimo
  alternative_spanish_readings:
  - no sea que caigas en problemas
  - no sea que quedes atrapado
  - no sea que caigas en una trampa
  rationale: El griego deja indeterminado el objeto del caer, y la versión inglesa mantiene esa apertura con notas alternativas. En español se conserva la misma ambigüedad en el cuerpo del texto, sin concretar el peligro.
  doctrine_reference: 'Translation philosophy §3: preservar la ambigüedad cuando el original es genuinamente abierto'
translation_notes:
  revision_awareness: El texto griego y el control auditado en inglés muestran consenso alto y no requieren revisión adicional; se mantiene la ambigüedad de μὴ ἐμπέσῃς y la medida limitada de κατὰ δύναμίν σου.
  spanish_consistency_notes:
  - Se conserva «prójimo» para πλησίον, en línea con el registro bíblico y la lectura ética del término.
  - «Apoya» evita un calco rígido y corresponde a la ayuda activa de ἀντιλαβοῦ.
  - La nota al pie conserva las alternativas de peligro abiertas, como en el texto inglés auditado.
