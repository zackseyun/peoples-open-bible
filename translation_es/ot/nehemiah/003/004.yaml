  to: Y junto a ellos[a] hizo reparaciones[b] Meremot, hijo de Urías, hijo de Hacoz; y junto a ellos[a] hizo reparaciones[b] Mesulam, hijo de Berequías, hijo de Meshezabel; y junto a ellos[a] hizo reparaciones[b] Sadoc, hijo de Baana[c].
