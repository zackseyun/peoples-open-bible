  yaml_path: translation/ot/deuteronomy/005/001.yaml
  text: And Moses called all Israel and said to them[a], “Hear, Israel, the statutes and the judgments that I am speaking in your hearing today; learn them and keep them[b], to do them.”
  footnotes:
  - marker: a
    text: Or “Listen, Israel.” The Hebrew imperative can denote attentive hearing that leads to obedience, not mere auditory reception.
    reason: lexical_alternative
  - marker: b
    text: “Judgments” may also be rendered “ordinances” or “rules.” The Hebrew term refers to legal decisions or prescribed norms.
    reason: lexical_alternative
