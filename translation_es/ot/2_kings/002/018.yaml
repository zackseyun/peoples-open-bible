translation:
  language: es
  text: 'Cuando volvieron a él[a], él estaba sentado en Jericó, y les dijo: «¿No les dije: “No vayan”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y ellos volvieron a él, mientras él estaba sentado en Jericó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: When they returned
  chosen_spanish: Cuando volvieron
  alternatives_spanish:
  - Y volvieron
  - Así que volvieron
  lexicon: HALOT / שוב
  rationale: El hebreo con waw consecutiva avanza la narración con valor temporal. «Cuando volvieron» reproduce bien esa relación sin forzar el español.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: HALOT
  rationale: La preposición más el sufijo de 3ª masculina singular se expresa naturalmente como «a él»; el referente es Eliseo por el contexto inmediato.
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: he was sitting
  chosen_spanish: él estaba sentado
  alternatives_spanish:
  - él se hallaba sentado
  - él permanecía
  lexicon: HALOT / ישב
  rationale: Aquí se conserva el valor más concreto del participio, que la revisión inglesa también acercó a «sitting». En español, «estaba sentado» suena natural y mantiene la imagen sin perder la continuidad de la escena.
- source_word: בִּירִיחוֹ
  english_pob_choice: in Jericho
  chosen_spanish: en Jericó
  alternatives_spanish:
  - en Jericó
  lexicon: Topónimo bíblico
  rationale: Topónimo estándar en español bíblico. Se mantiene la forma usual «Jericó».
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: and he said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló
  - y les respondió
  lexicon: HALOT / אמר
  rationale: «Decir a» es la forma española más directa y transparente para el verbo de habla. «Les dijo» conserva la relación dativa del hebreo.
- source_word: הֲלֽוֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No les dije?
  alternatives_spanish:
  - ¿Acaso no les dije?
  - ¿No les había dicho?
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica con fuerza de reproche. En español, «¿No les dije?» es idiomático y mantiene el efecto esperado.
- source_word: אָמַרְתִּי אֲלֵיכֶם
  english_pob_choice: tell you
  chosen_spanish: les dije
  alternatives_spanish:
  - les había dicho
  - les he dicho
  lexicon: HALOT / אמר
  rationale: Aunque el inglés POB usa «tell you», el hebreo es literalmente «dije a ustedes». En español, «les dije» refleja mejor la forma verbal y el destinatario plural.
- source_word: אַל תֵּלֵכוּ
  english_pob_choice: Do not go
  chosen_spanish: No vayan
  alternatives_spanish:
  - No se vayan
  - No vayan allá
  lexicon: HALOT / הלך
  rationale: La prohibición con אַל exige un mandato negativo claro. «No vayan» es natural, directo y fiel al tono admonitorio de Eliseo.
theological_decisions:
- issue: Valor del participio verbal יֹשֵׁב
  english_pob_reading: he was sitting
  chosen_spanish_reading: él estaba sentado
  alternative_spanish_readings:
  - él permanecía en Jericó
  - él estaba en Jericó
  rationale: No se atenúa la imagen concreta del texto. El hebreo puede tener matiz de estado o permanencia, pero la revisión inglesa prefirió el sentido más literal de «sitting»; el español mantiene esa concreción.
  doctrine_reference: Ninguno específico; decisión gramatical y aspectual.
- issue: Fuerza retórica de la pregunta con הֲלוֹא
  english_pob_reading: Did I not
  chosen_spanish_reading: ¿No les dije?
  alternative_spanish_readings:
  - ¿Acaso no les dije?
  - ¿No les había dicho?
  rationale: La pregunta no busca información sino reafirmar la advertencia previa. Se conserva el tono de reprensión sin agregar énfasis doctrinal o interpretativo ajeno al texto.
  doctrine_reference: Ninguno específico; pragmática del discurso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la oscilación del audit trail inglés entre «was staying» y la revisión posterior «was sitting». Para el español se eligió una solución que siga la revisión más literal sin perder naturalidad, y se respetó el valor temporal de la primera cláusula con «Cuando volvieron».
  spanish_consistency_notes:
  - Se usa «él» para el referente masculino singular de Eliseo, coherente con el contexto inmediato.
  - Se mantiene «Jericó» como forma estándar en español bíblico.
  - 'La prohibición se vierte como mandato plural en español: «No vayan», para reflejar correctamente אַל תֵּלֵכוּ.'
