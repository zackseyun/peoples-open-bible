translation:
  language: es
  text: Que reúnan todo el alimento de estos años buenos que vienen, y que almacenen grano bajo la autoridad de Faraón[a] como alimento en las ciudades, y que lo guarden[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo la mano de Faraón», un hebraísmo que expresa autoridad o control.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y que lo custodien» o «y que lo preserven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִקְבְּצוּ
  english_pob_choice: Let them gather
  chosen_spanish: Que reúnan
  alternatives_spanish:
  - Que junten
  - Que recojan
  lexicon: HALOT
  rationale: El hebreo expresa una forma volitiva en contexto de consejo/propuesta; en español, 'Que reúnan' conserva el valor exhortativo sin volverlo una simple futura indicativa.
- source_word: כָּל אֹכֶל
  english_pob_choice: all the food
  chosen_spanish: todo el alimento
  alternatives_spanish:
  - toda la comida
  - todos los víveres
  lexicon: HALOT
  rationale: '''Alimento'' mantiene el campo semántico amplio de אֹכֶל y suena natural en un contexto administrativo de provisión.'
- source_word: הַשָּׁנִים הַטֹּבוֹת הַבָּאֹת הָאֵלֶּה
  english_pob_choice: these coming good years
  chosen_spanish: estos años buenos que vienen
  alternatives_spanish:
  - los años buenos que vienen
  - estos buenos años venideros
  lexicon: HALOT
  rationale: Se conserva la deixis de הָאֵלֶּה con 'estos' y el participio con 'que vienen'; 'años buenos' refleja el adjetivo 'good' sin forzar un tono arcaico.
- source_word: וְיִצְבְּרוּ
  english_pob_choice: let them store up
  chosen_spanish: que almacenen
  alternatives_spanish:
  - que acopien
  - que acumulen
  lexicon: HALOT
  rationale: El verbo implica amontonar para reservar. 'Almacenen' comunica bien la idea de guardar provisiones para uso posterior en un español claro y sobrio.
- source_word: בָר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: '''Grano'' reproduce el valor genérico de בָר sin estrecharlo a una sola especie de cereal.'
- source_word: תַּחַת יַד פַּרְעֹה
  english_pob_choice: under Pharaoh’s authority
  chosen_spanish: bajo la autoridad de Faraón
  alternatives_spanish:
  - bajo la mano de Faraón
  - bajo el control de Faraón
  lexicon: HALOT
  rationale: La expresión idiomática 'bajo la mano de' se explica naturalmente como autoridad/control. Se evita un calco duro y se conserva el sentido administrativo.
- source_word: אֹכֶל בֶּעָרִים
  english_pob_choice: as food in the cities
  chosen_spanish: como alimento en las ciudades
  alternatives_spanish:
  - como provisión en las ciudades
  - para alimento en las ciudades
  lexicon: HALOT
  rationale: '''Como alimento en las ciudades'' reproduce la función de destino/provisión del hebreo sin perder la relación con el grano almacenado.'
- source_word: וְשָׁמָרוּ
  english_pob_choice: and let them keep it
  chosen_spanish: y que lo guarden
  alternatives_spanish:
  - y que lo vigilen
  - y que lo preserven
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, custodiar o preservar. 'Lo guarden' es la opción más natural y suficientemente amplia para este contexto.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y el hebreo: conserva el valor volitivo de la propuesta, el alcance genérico de אֹכֶל y בָר, y el hebraísmo de תַּחַת יַד פַּרְעֹה en una forma idiomática española. No se detectaron cambios de revisión en el paso más reciente; la línea de decisión permanece estable.'
  spanish_consistency_notes:
  - Se usa 'Faraón' como nombre propio de la autoridad egipcia, coherente con el pasaje.
  - Se evita 'SEÑOR' porque aquí no hay referencia al nombre divino sino a la autoridad de Faraón.
  - '''Alimento'' y ''grano'' se distinguen para reflejar la diferencia entre el material almacenado y su finalidad.'
  - El tono exhortativo con 'Que...' preserva la fuerza jussiva del hebreo en español moderno.
