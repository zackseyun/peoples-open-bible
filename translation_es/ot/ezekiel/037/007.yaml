revisions:
- from: Así que profeticé[a] como se me había mandado, y mientras profetizaba, hubo un sonido, y he aquí un [b]estrépito, y los huesos se juntaron, hueso con su hueso.
  to: Entonces profeticé como se me mandó[a], y mientras profetizaba, hubo un sonido, y he aquí, un traqueteo[b], y los huesos se juntaron, hueso con su hueso.
