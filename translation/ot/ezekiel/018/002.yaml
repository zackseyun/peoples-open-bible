theological_decisions:
- issue: Gendered kinship terms in the proverb
  chosen_reading: Retain 'fathers' but render בָּנִים as 'children'
  alternative_readings:
  - '''The parents eat sour grapes, and the sons'' teeth are set on edge'''
  - '''The fathers eat sour grapes, and the sons'' teeth are set on edge'''
  rationale: The first term is specifically masculine and should remain 'fathers' per gender-accurate policy. The second term, though formally masculine, functions representatively for offspring in general within the proverb; 'children' communicates the sense without implying only male descendants suffer the consequence.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
