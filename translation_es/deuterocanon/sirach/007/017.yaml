lexical_decisions:
- source_word: אַל תָּאִיץ
  english_pob_choice: Do not hasten
  chosen_spanish: No te apresures
  alternatives_spanish:
  - No te precipites
  - No te apures
  lexicon: interpretive rendering from the Hebrew imperative
  rationale: Mantiene el valor exhortativo negativo del hebreo y sugiere prisa indebida sin añadir contenido ajeno al texto.
- source_word: לֵאמֹר לִי
  english_pob_choice: to say to me
  chosen_spanish: a decirme
  alternatives_spanish:
  - para decirme
  - diciéndome
  lexicon: syntactic rendering from Hebrew
  rationale: Conserva el destinatario explícito de la palabra dicha y suena natural en español.
- source_word: פָרֶץ
  english_pob_choice: Break through
  chosen_spanish: «¡Rompe!»
  alternatives_spanish:
  - «¡Abre paso!»
  - «¡Haz una brecha!»
  lexicon: contextual lexical choice from Hebrew
  rationale: La forma breve del hebreo parece una exclamación o consigna; «Rompe» refleja la fuerza verbal sin forzar una paráfrasis más larga.
- source_word: גֹּל אֶל אֵל
  english_pob_choice: commit to God
  chosen_spanish: entrégate a Dios
  alternatives_spanish:
  - encomiéndate a Dios
  - confía a Dios tu causa
  lexicon: Hebrew idiom rendering
  rationale: גֹּל expresa la idea de rodar/poner sobre otro, de ahí un español idiomático como «entrégate» o «encomiéndate»; elegí «entrégate» por fluidez y reverencia.
- source_word: וּרְצֵה דַרְכּוֹ
  english_pob_choice: accept his way
  chosen_spanish: acepta su camino
  alternatives_spanish:
  - agrada su camino
  - aprueba su camino
  lexicon: Hebrew verbal force and metaphor
  rationale: רצה aquí se entiende como aceptar/consentir; «camino» preserva la metáfora ética del hebreo y del contexto sapiencial.
theological_decisions:
- issue: Fuente primaria con hebreo difícil y paralelo griego disponible
  english_pob_reading: Translate the clear Greek imperative as the main text while acknowledging the Hebrew witness is difficult and likely corrupt or mismatched in this extraction.
  chosen_spanish_reading: Seguir el hebreo transmitido en la muestra, documentando la dificultad textual sin ocultarla.
  alternative_spanish_readings:
  - Humble yourself greatly
  - Humíllate mucho
  rationale: En este versículo, el paquete fuente ofrece un hebreo completo y una nota de desajuste con el griego; por eso la publicación española sigue el hebreo disponible y deja constancia del estado textual mediante la nota a pie. Esto evita imponer el griego cuando el propio expediente señala una discrepancia.
  doctrine_reference: 'PHILOSOPHY.md: traducir a partir del testimonio más original disponible y preservar honestamente la incertidumbre de la fuente.'
translation_notes:
  revision_awareness: 'El borrador anterior falló al anclar una nota a pie sin colocar su marcador en el texto. Esta versión corrige eso: la nota [a] aparece en la traducción, y la redacción principal sigue el hebreo de la fuente aportada, que es precisamente el pasaje auditado para esta revisión.'
  spanish_consistency_notes:
  - Usé «Dios» para אֵל, conforme al estándar del proyecto.
  - Mantuve un estilo bíblico moderno y digno, evitando calcos innecesarios.
  - Elegí «entrégate» para גֹּל por su equivalencia idiomática en español, con la alternativa «encomiéndate» reconocida en las decisiones léxicas.
