    text: O 'el matador'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'en la palma'.
    reason: lexical_alternative
  revision_rationale: Se corrige la apertura a 'Es dada' para reflejar mejor el pasivo funcional del hebreo y evitar el pronombre incorrecto. Se reemplaza 'asida' por 'tomada' para mayor naturalidad. Se ajusta 'Es afilada' a 'Ha sido afilada' para un español más idiomático manteniendo el sentido pasivo. Se cambia 'asesino' por 'matador' para evitar un matiz jurídico-moral excesivo frente a הוֹרֵג. También se reordenan las notas para que [c] ancle correctamente en 'mano' y [b] en 'matador'.
