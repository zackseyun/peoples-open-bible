translation:
  language: es
  text: Todos los días del malvado[a] él se retuerce[b], y un número de años han sido guardados[c] para el violento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Malvado» traduce aquí un singular masculino representativo del hebreo, no necesariamente un individuo aislado.
    reason: cultural_note
  - marker: b
    text: O «está en angustia»; el verbo hebreo puede expresar retorcerse, estremecerse o un padecimiento intenso.
    reason: lexical_alternative
  - marker: c
    text: O «han sido escondidos» o «han sido reservados» para el violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Durante todos los días de
  - Todos los días que
  lexicon: HALOT
  rationale: La construcción hebrea con כָּל + constructo temporal expresa totalidad a lo largo del tiempo. «Todos los días de» conserva esa estructura sin volverla forzada en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el hombre malvado
  lexicon: HALOT
  rationale: El sustantivo adjetival singular funciona de modo representativo para una persona tipo. «Malvado» comunica bien el valor sustantivado sin necesidad de añadir «hombre», que en español no siempre es indispensable.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El pronombre independiente se conserva como énfasis y reanudación del sujeto. En español, «él» mantiene la referencia explícita sin exagerarla.
- source_word: מִתְחוֹלֵל
  english_pob_choice: writhes
  chosen_spanish: se retuerce
  alternatives_spanish:
  - está en angustia
  - tiembla
  - se agita
  lexicon: HALOT
  rationale: La forma hitpolel/iterativa de חול puede expresar retorcerse, estremecerse o padecer angustia. «Se retuerce» es la opción más cercana y sobria, y evita añadir «en tormento», que el texto no exige de manera explícita.
- source_word: וּמִסְפַּר שָׁנִים
  english_pob_choice: and a number of years
  chosen_spanish: y un número de años
  alternatives_spanish:
  - y el número de años
  - y años en número
  lexicon: HALOT
  rationale: 'La expresión es indefinida: una cantidad determinada pero no especificada. «Un número de años» es natural en español y conserva esa indeterminación.'
- source_word: נִצְפְּנוּ
  english_pob_choice: are stored up
  chosen_spanish: ha sido reservado
  alternatives_spanish:
  - han sido escondidos
  - están guardados
  - han sido reservados
  lexicon: HALOT
  rationale: El nifal de צפן puede significar «estar escondido» o «estar guardado/reservado». En este contexto, la idea es que un lapso fijado queda apartado para el violento. La pasiva singular en español se ajusta mejor a «un número de años» como sujeto colectivo.
- source_word: לֶעָרִיץ
  english_pob_choice: for the ruthless
  chosen_spanish: para el violento
  alternatives_spanish:
  - para el tirano
  - para el despiadado
  - para el hombre violento
  lexicon: HALOT
  rationale: עָרִיץ puede referirse a un hombre violento, opresor o tiránico. «Violento» conserva el campo semántico amplio sin restringirlo a una tiranía política específica.
theological_decisions:
- issue: La duración reservada para el malvado/violento
  english_pob_reading: a number of years are stored up for the ruthless
  chosen_spanish_reading: un número de años ha sido reservado para el violento
  alternative_spanish_readings:
  - un número de años está guardado para el violento
  - años le han sido reservados al violento
  rationale: No hay decisión doctrinal explícita, pero el texto presenta una retribución temporal fijada para esa persona. La redacción española mantiene la idea de reserva/ajuste sin hacerla más precisa de lo que permite el hebreo.
  doctrine_reference: Sabiduría retributiva en Job; cf. Job 15:20
- issue: Valor representativo del singular
  english_pob_reading: The wicked man is grammatically masculine singular in Hebrew and represents the wicked person as a type.
  chosen_spanish_reading: el malvado
  alternative_spanish_readings:
  - el malvado[a] como tipo humano
  - el hombre malvado
  rationale: El hebreo usa singular masculino con valor genérico-representativo. El español conserva ese rasgo con un singular sustantivado, sin convertirlo en plural abstracto.
  doctrine_reference: Uso genérico-representativo del singular en poesía sapiencial
translation_notes:
  revision_awareness: La frase de la revisión inglesa eliminó «in torment» por ser interpretativa. Por eso el español evita agregar un equivalente interpretativo y conserva solo la acción verbal básica («se retuerce»). También se refleja la alternativa semántica de נִצְפְּנוּ como «reservado/guardado», sin inclinarse innecesariamente hacia «escondido».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; en este versículo no aparece.
  - Se mantiene «el violento» para עָרִיץ, siguiendo un campo semántico amplio y no técnico.
  - La sintaxis conserva el paralelismo poético hebreo con dos hemistiquios coordinados.
  - No se introduce «tormento» ni otra glosa afectiva adicional, en coherencia con la revisión auditada del POB en inglés.
