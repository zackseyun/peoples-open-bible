id: JHN.8.7
reference: John 8:7
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ὡς δὲ ἐπέμενον ἐρωτῶντες αὐτόν, ἀνακύψας εἶπεν αὐτοῖς, Ὁ ἀναμάρτητος ὑμῶν,
    πρῶτος ἐπ' αὐτὴν τὸν λίθον βαλέτω.
  language: Greek
translation:
  text: But when[a] they continued questioning him, he straightened up and said to
    them, "Let the one among you who is without sin be the first to throw a stone
    at her."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is part of the story of the woman caught in adultery (John 7:53–8:11),
      which is absent from the earliest Greek manuscripts. See note on John 7:53.
    reason: textual_critical
lexical_decisions:
- source_word: ἐπιμένω
  chosen: continued
  alternatives:
  - persisted
  - kept on
  lexicon: BDAG
  rationale: The imperfect tense of ἐπέμενον combined with the present participle
    ἐρωτῶντες indicates a continuous, ongoing action of questioning.
- source_word: ἀνακύπτω
  chosen: straightened up
  alternatives:
  - lifted himself up
  - raised himself
  lexicon: BDAG
  rationale: Translates the aorist participle ἀνακύψας, indicating the physical action
    of standing back up from his previous posture of bending down to write on the
    ground.
- source_word: ἀναμάρτητος
  chosen: without sin
  alternatives:
  - sinless
  - guiltless
  lexicon: BDAG
  rationale: A rare adjective in the NT (a hapax legomenon), meaning 'without sin'
    or 'guiltless'. 'Without sin' captures the moral and legal weight of the context
    naturally in English.
