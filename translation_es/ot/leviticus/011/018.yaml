translation:
  language: es
  text: y el búho cornudo[a], el pelícano[b] y el buitre carroñero[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de תִּנְשֶׁמֶת es incierta; puede referirse a una clase de búho, posiblemente un búho cornudo, un mochuelo u otra ave nocturna semejante.
