review_pass:
  verdict: revise
  source_alignment_summary: La primera mitad del versículo está bien encaminada y preserva el paralelismo del camino de ida y vuelta. Sin embargo, la segunda cláusula hebrea לֹא יָבֹא significa literalmente 'no vendrá/no llegará', no 'no entrará'. Ese cambio añade una fuerza espacial más fuerte que la fuente no exige. El nombre divino está correctamente vertido como 'Yahvé', y la fórmula profética 'declara' es adecuada para נְאֻם יְהוָה.
  spanish_quality_summary: El borrador es claro y legible, pero 'por él volverá' suena algo rígido en español actual; aun así, puede mantenerse si se desea conservar la anáfora explícita. La mejora principal es evitar 'entrará en esta ciudad' y usar 'vendrá a esta ciudad', que es más fiel y natural en el registro bíblico moderno. También conviene ajustar la nota para que su alternativa idiomática no suene forzada.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → ''Yahvé'' correctamente; נְאֻם → ''declara'' correctamente. No hay términos doctrinales conflictivos adicionales. La única desviación relevante es יָבֹא en la segunda cláusula, donde el borrador reemplaza ''venir'' por ''entrar'' sin apoyo suficiente del hebreo ni del rastro auditado inglés.'
  issues:
  - severity: medium
    issue: '''no entrará en esta ciudad'' sobretraduce לֹא יָבֹא'
    rationale: El hebreo repite בוא ('venir/llegar') y el rastro inglés documenta explícitamente que no debe intensificarse a 'enter' salvo necesidad contextual. 'Entrará' añade un matiz más fuerte que la fuente no marca.
  - severity: low
    issue: La nota alternativa puede sonar poco natural con 'por ese volverá'
    rationale: Aunque intenta reflejar בָּהּ, la formulación idiomática en español suena algo rígida. Puede mejorarse a 'por él volverá' o absorberse como 'por el mismo camino... volverá'.
  revised_spanish_text: Por el camino por el que él vino[a], por él volverá, y no vendrá a esta ciudad, declara Yahvé.
