translation:
  language: es
  text: 'Y lo encontraron y le dijeron[a]: «Todos te están buscando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todos te buscan». El griego ζητοῦσίν puede traducirse también «buscan», pero en este contexto probablemente se refiere a personas que tratan de encontrar físicamente a Jesús.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: lo encontraron
  alternatives_spanish:
  - lo hallaron
  - lo ubicaron
  lexicon: BDAG
  rationale: El aoristo de εὑρίσκω expresa el resultado de una búsqueda y en español narrativo normal se vierte con «encontraron». «Hallaron» es posible, pero «encontraron» suena más directo y natural.
- source_word: λέγουσιν
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le decían
  - le hablan
  lexicon: BDAG
  rationale: El presente histórico griego se traduce en español con pasado simple para conservar el ritmo narrativo. «Le dijeron» comunica el acto de hablar sin sobrecargar la frase.
- source_word: Πάντες
  english_pob_choice: Everyone
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos ellos
  - Todo el mundo
  lexicon: BDAG
  rationale: «Πάντες» en este contexto se refiere al grupo de personas que lo buscan. «Todos» conserva la fuerza colectiva sin añadir una universalidad abstracta.
- source_word: ζητοῦσίν σε
  english_pob_choice: is looking for you
  chosen_spanish: te están buscando
  alternatives_spanish:
  - te buscan
  - te están procurando
  lexicon: BDAG
  rationale: En este contexto narrativo, ζητέω expresa búsqueda física para dar con Jesús. «Te están buscando» conserva la idea de búsqueda activa y suena natural en español. El presente progresivo refleja mejor la acción en curso que un simple «te buscan».
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Se conserva el enlace narrativo sencillo de καί con «Y», acorde al estilo rápido de Marcos.
- source_word: αὐτὸν / αὐτῷ / σε
  english_pob_choice: him / him / you
  chosen_spanish: lo / le / te
  alternatives_spanish:
  - a él / le / te
  - lo / le / usted
  lexicon: BDAG
  rationale: Los pronombres se ajustan a sus funciones sintácticas en español. «Le» para objeto indirecto y «te» para el interlocutor mantienen la relación directa con Jesús.
