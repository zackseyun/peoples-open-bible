translation:
  language: es
  text: Israel olvidó a su Hacedor y edificó palacios[a], y Judá multiplicó ciudades fortificadas; por tanto, enviaré fuego en sus ciudades, y consumirá sus fortalezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templos». El hebreo puede referirse a palacios o a estructuras semejantes a un templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂהוּ
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - su creador
  - el que lo hizo
  lexicon: HALOT
  rationale: El participio de עשה con sufijo pronominal se refiere a quien hizo a Israel. «Hacedor» mantiene la fuerza relacional y teológica del hebreo sin volverlo demasiado abstracto, y en español conserva bien el paralelo con el olvido del origen covenantal.
- source_word: הֵיכָלוֹת
  english_pob_choice: palaces
  chosen_spanish: palacios
  alternatives_spanish:
  - templos
  lexicon: HALOT
  rationale: La palabra hebrea puede referirse a palacios o a edificios tipo templo. En este contexto de autosuficiencia política y militar, «palacios» es la opción principal más natural en español, y conserva la lectura auditable del POB en inglés; la alternativa cultual queda preservada en nota.
- source_word: הִרְבָּה
  english_pob_choice: has multiplied
  chosen_spanish: multiplicó
  alternatives_spanish:
  - aumentó
  - hizo muchas
  lexicon: HALOT
  rationale: El hiphil de רבה expresa hacer que algo sea numeroso. En español, el pretérito simple «multiplicó» reproduce con claridad la acción de incremento deliberado y mantiene el paralelismo del verso.
- source_word: עָרִים בְּצֻרוֹת
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades amuralladas
  - ciudades-fortaleza
  lexicon: HALOT
  rationale: La combinación sustantivo + adjetivo describe ciudades con defensa militar. «Ciudades fortificadas» es la forma más directa y clara en español moderno, sin perder el sentido defensivo.
- source_word: וְשִׁלַּחְתִּי אֵשׁ
  english_pob_choice: so I will send fire
  chosen_spanish: por tanto, enviaré fuego
  alternatives_spanish:
  - y enviaré fuego
  - así que enviaré fuego
  lexicon: HALOT
  rationale: La inferencia del juicio se expresa mejor en español con «por tanto». El verbo «enviar» conserva el lenguaje de agencia divina del hebreo y del POB en inglés.
- source_word: בְּעָרָיו
  english_pob_choice: into his cities
  chosen_spanish: a sus ciudades
  alternatives_spanish:
  - en sus ciudades
  - contra sus ciudades
  lexicon: HALOT
  rationale: Con fuego, la preposición hebrea se entiende como penetración devastadora en las ciudades. «A sus ciudades» evita un calco torpe y mantiene la dirección del juicio, sin forzar el matiz local de manera excesiva.
- source_word: אַרְמְנֹתֶיהָ
  english_pob_choice: her citadels
  chosen_spanish: sus fortalezas
  alternatives_spanish:
  - sus palacios
  - sus ciudadelas
  lexicon: HALOT
  rationale: אַרמון puede significar palacio o fortaleza/castillo. Dado el campo semántico militar de la línea, «fortalezas» comunica bien la idea de estructuras defensivas prominentes y evita una repetición innecesaria de «palacios».
theological_decisions:
- issue: Cambio de referent en los sufijos posesivos entre Israel y Judá
  english_pob_reading: 'The judgment clause is directed at Judah: ''his cities'' refers to Judah, while ''her citadels'' refers to the cities collectively.'
  chosen_spanish_reading: 'La cláusula de juicio se dirige a Judá: «sus ciudades» se entiende de Judá, y «sus fortalezas» conserva en español el sentido colectivo del plural femenino implícito en el hebreo.'
  alternative_spanish_readings:
  - La referencia final vuelve a Israel de manera estilística
  - Los sufijos no necesitan distinguirse en español
  rationale: El hebreo presenta un desplazamiento de referente entre Israel y Judá, y el POB inglés lo preserva. En español, «sus» es más natural y no obliga a aclarar de manera artificial un género imposible de reproducir sin perder fluidez; aun así, la nota textual deja constancia de la tensión interpretativa.
  doctrine_reference: Preservar la tensión del texto sin resolverla artificialmente
- issue: Sentido de הֵיכָלוֹת
  english_pob_reading: Rendered as 'palaces' in the main text, with 'temples' preserved in a footnote.
  chosen_spanish_reading: «Palacios» en el texto principal, con «templos» preservado en nota.
  alternative_spanish_readings:
  - templos
  - santuarios
  rationale: El contexto favorece la lectura de estructuras de poder y seguridad, no solo de edificios de culto. Por eso «palacios» va en el cuerpo del texto, mientras que la posibilidad cultual importante queda visible para el lector en la nota.
  doctrine_reference: Preservar una alternativa léxica real sin aplanarla
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios necesarios; por eso la redacción española se ajusta directamente al paquete fuente y a la decisión inglesa establecida, sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el nombre divino, así que no era necesario.
  - Se evitó «SEÑOR» y también «Cristo», porque no corresponden a este versículo.
  - «Hacedor» se eligió para conservar la fuerza relacional de עֹשֵׂהוּ sin caer en una paráfrasis más abstracta.
  - Se mantuvo el contraste entre el juicio sobre ciudades fortificadas y la quema de fortalezas, coherente con el paralelismo del hebreo.
