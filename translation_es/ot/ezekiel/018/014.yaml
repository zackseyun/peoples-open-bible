translation:
  language: es
  text: Pero he aquí[a], engendra un hijo, y ve todos los pecados que su padre ha hecho; los ve[b], y no hace lo mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mira».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite «ve» para énfasis: «ve ... ve, y no hace lo mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: But behold
  chosen_spanish: Pero mira
  alternatives_spanish:
  - Pero he aquí
  - Pero observa
  - Mas mira
  lexicon: HALOT
  rationale: La partícula introduce un caso nuevo con contraste discursivo; en español, «Pero» conserva ese giro, y «mira» expresa la fuerza deíctica de הִנֵּה de modo natural y reverente sin sonar arcaico.
- source_word: הוֹלִיד בֵּן
  english_pob_choice: he fathers a son
  chosen_spanish: engendra un hijo
  alternatives_spanish:
  - engendra un hijo varón
  - tiene un hijo
  - 'engendra un hijo (o: lo engendra)'
  lexicon: HALOT
  rationale: El hifil de ילד expresa acción generativa/paternidad. «Engendra» preserva esa fuerza mejor que «tiene», y «hijo» sigue el paralelismo del hebreo; «hijo varón» explicita el valor esperado, pero no es necesario para el sentido.
- source_word: וַיַּרְא
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - vio
  - mira
  lexicon: HALOT
  rationale: Aunque la forma hebrea es narrativa pasada, el contexto exhortativo/ilustrativo permite en español un presente vívido. «Ve» mantiene la repetición enfática del hebreo y fluye bien en el argumento.
- source_word: כָּל חַטֹּאת אָבִיו אֲשֶׁר עָשָׂה
  english_pob_choice: all the sins that his father has done
  chosen_spanish: todos los pecados que su padre ha hecho
  alternatives_spanish:
  - todos los pecados de su padre
  - todos los actos pecaminosos que su padre cometió
  - todas las culpas que su padre hizo
  lexicon: HALOT
  rationale: חַטֹּאת se entiende aquí como plural de «pecados»; el relativo «que su padre ha hecho» conserva el enlace con עָשָׂה y evita diluir la concreción de actos reales.
- source_word: וַיִּרְאֶה
  english_pob_choice: he sees them
  chosen_spanish: los ve
  alternatives_spanish:
  - y los ve
  - y los mira
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática de ראה con un objeto directo explícito. «Los ve» es idiomático y conserva la insistencia del hebreo.
- source_word: וְלֹא יַעֲשֶׂה כָּהֵן
  english_pob_choice: and he does not do likewise
  chosen_spanish: y no hace lo mismo
  alternatives_spanish:
  - y no hace así
  - y no hace de la misma manera
  - y no actúa igual
  lexicon: HALOT
  rationale: כָהֵן expresa comparación («así, de ese modo»). «Lo mismo» comunica con claridad la referencia a las acciones del padre en un español natural y sobrio.
theological_decisions:
- issue: Repetición enfática de «ve»/«vea» en la cadena narrativa
  english_pob_reading: 'The Hebrew repeats ''he sees'' for emphasis: ''he sees ... he sees, and does not do likewise.'''
  chosen_spanish_reading: Se conserva la repetición con «ve ... los ve», sin reducirla a una sola mención.
  alternative_spanish_readings:
  - «ve ... y no hace lo mismo» sin repetir el verbo
  - «considera ... y no hace lo mismo»
  rationale: La repetición forma parte del efecto retórico del versículo y sostiene la observación moral del hijo frente a la conducta del padre. Omitirla o sustituirla por otro verbo atenuaría la tensión textual documentada.
  doctrine_reference: Ezequiel 18; principio de responsabilidad moral individual
- issue: El valor de הוֹלִיד בֵּן en el argumento
  english_pob_reading: he fathers a son
  chosen_spanish_reading: engendra un hijo
  alternative_spanish_readings:
  - tiene un hijo
  - es padre de un hijo
  rationale: La lectura resaltada por la POB conserva la acción generativa de la raíz. En este contexto, «engendra» evita neutralizar la fuerza causal del verbo y mantiene el contraste con las decisiones del hijo.
  doctrine_reference: Ezequiel 18; transmisión familiar no equivale a culpa moral automática
translation_notes:
  revision_awareness: 'La versión inglesa más reciente sustituyó «look» por «behold» para reflejar con mayor formalidad הִנֵּה. Esta traducción española adopta un registro igualmente sobrio con «Pero mira», manteniendo el contraste discursivo y la viveza de la escena, y preserva la repetición enfática de ראה con «ve ... los ve».

    '
  spanish_consistency_notes:
  - Se usa «pecados» para חַטֹּאת, en línea con el valor plural concreto del hebreo.
  - Se prefiere «engendra» para הוֹלִיד porque conserva la fuerza causativa del verbo.
  - Se evita «SEÑOR» o equivalentes porque este versículo no contiene el tetragrámaton.
  - Se conserva la repetición verbal del hebreo mediante «ve ... los ve».
  - «No hace lo mismo» mantiene el sentido comparativo de כָּהֵן con español natural.
