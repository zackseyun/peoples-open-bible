revisions:
- from: 'Ahora los hombres de Israel estaban[a] presionados aquel día, y Saúl puso al pueblo bajo juramento, diciendo: «Maldito el hombre que coma pan antes del atardecer, antes de que me haya vengado de mis enemigos». Así que todo el pueblo no probó pan.'
  to: 'Ahora los hombres de Israel estaban en gran aprieto aquel día,[a] y Saúl puso al pueblo bajo juramento, diciendo: «Maldito el hombre que coma alimento antes del atardecer, antes de que me haya vengado de mis enemigos». Así que ninguno del pueblo probó alimento.'
  rationale: Se revisa «presionados» a «en gran aprieto» para reflejar mejor el sentido idiomático de נִגַּשׂ en español natural. Se cambia «pan» por «alimento» en ambas ocurrencias, siguiendo la decisión léxica auditada de que לֶחֶם aquí significa comida en general; la nota conserva el dato del hebreo literal. Se corrige «todo el pueblo no probó pan» a «ninguno del pueblo probó alimento» para una negación colectiva idiomática y fiel.
