- from: 'Y dijo[a]: «Muy celoso he sido por Yahvé, el Dios de los ejércitos, porque los hijos de Israel han abandonado tu pacto, han derribado tus altares y han matado a tus profetas a espada. Yo solo he quedado, y procuran quitarme la vida[b], para tomarla».'
