translation:
  language: es
  text: Pero si te dejas persuadir, serás amigo, y los asuntos del reino estarán a tu cargo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tendrás la administración de los asuntos del reino». El término griego puede denotar administración o liderazgo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεισθεὶς
  english_pob_choice: if you are persuaded
  chosen_spanish: si eres persuadido
  alternatives_spanish:
  - si aceptas
  - si accedes
  - si eres convencido
  lexicon: LSJ
  rationale: El participio aoristo pasivo se entiende condicionalmente en contexto. En español, "si eres persuadido" conserva la relación con la persuasión sin añadir un matiz de obediencia que no está explícito en el griego. "Aceptas" o "accedes" son posibles, pero interpretan más libremente la respuesta.
- source_word: φίλος
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - favorito
  - aliado
  lexicon: LSJ
  rationale: '"Amigo" reproduce el término básico del griego. Aunque en contexto de corte puede implicar estatus favorecido, la frase española conserva esa posibilidad sin imponerla.'
- source_word: ἔσῃ
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - estarás
  lexicon: LSJ
  rationale: Es el futuro de εἰμί. "Serás" es la correspondencia directa y natural en español.
- source_word: τῶν ἐπὶ τῆς βασιλείας πραγμάτων
  english_pob_choice: the affairs of the kingdom
  chosen_spanish: los asuntos del reino
  alternatives_spanish:
  - los asuntos del reino real
  - los negocios del reino
  - las materias del reino
  lexicon: LSJ
  rationale: πράγματα puede significar asuntos, asuntos administrativos o negocios. "Los asuntos del reino" preserva el sentido de administración real en un español claro y no excesivamente técnico.
- source_word: ἀφήγησιν
  english_pob_choice: have charge of
  chosen_spanish: tendrás a cargo
  alternatives_spanish:
  - tendrás el cargo de
  - tendrás la administración de
  - tendrás la supervisión de
  lexicon: LSJ
  rationale: La revisión inglesa pasó de "oversight" a "have charge of" para reflejar mejor la autoridad delegada. En español, "tendrás a cargo" comunica con naturalidad esa función de responsabilidad/encargo sin forzar un tecnicismo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió 'have charge of' en lugar de 'oversight' para ἀφήγησιν πραγμάτων. Por eso el español adopta una expresión de encargo y responsabilidad ('tendrás a cargo') en vez de un término demasiado administrativo o eclesiástico.
  spanish_consistency_notes:
  - Se mantiene 'reino' para βασιλεία, siguiendo el sentido político-real del contexto.
  - Se evita 'SEÑOR' u otra adaptación litúrgica porque no aparece aquí ninguna referencia al nombre divino.
  - La puntuación reproduce una condicional simple con paralelismo en la segunda cláusula, acorde con el griego y con la lectura inglesa auditada.
