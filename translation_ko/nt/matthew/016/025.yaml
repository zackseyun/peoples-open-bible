  text: 'For whoever wants to save his life will lose it[a], but whoever loses his life for my sake will find it.'
translation:
  language: ko
  text: '「누구든지 자기 생명을 구하려는 자는 그것을 잃을 것이고, 누구든지 나 때문에 자기 생명을 잃는 자는 그것을 찾을 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 본문 전체에 걸쳐 「영혼」. 헬라어 ψυχή는 「생명·자아·영혼」을 맥락에 따라 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ψυχὴν
  english_pob_choice: life
  chosen_korean: 생명
  alternatives_korean:
  - 영혼
  - 자기 자신
  lexicon: BDAG
  rationale: ψυχή는 「생명·자아·영혼」의 폭. 본문의 「구하다·잃다·찾다」 문맥에서 「생명」이 자연스럽고, 「영혼」 가능성은 각주로 보존한다.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: for my sake
  chosen_korean: 나 때문에
  alternatives_korean:
