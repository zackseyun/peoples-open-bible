review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: כִּי/הִנֵּה como introducción explicativa y enfática, יְהוָה como «Yahvé», y el paralelismo entre «la casa grande» y «la casa pequeña». Sin embargo, no preserva con suficiente precisión la distinción de resultados en las dos colas finales. La primera mitad usa «será hecha pedazos», pero la segunda queda elíptica en «y la casa pequeña en fragmentos», sin verbo explícito, y además invierte/neutraliza el matiz documentado entre רְסִיסִים («fragmentos») y בְּקִעִים («piezas/fisuras»).'
  spanish_quality_summary: El español es mayormente claro y digno, pero «y la casa pequeña en fragmentos» suena truncado y menos natural que la primera cola. También conviene alinear mejor la nota con el texto principal y evitar una formulación algo pesada donde la pasiva puede repetirse limpiamente. «Porque he aquí» es aceptable, aunque algo más natural en español bíblico actual sería «Porque, miren» o «Porque, ciertamente»; con todo, «he aquí» sigue siendo inteligible y apropiado al registro.
  glossary_alignment: 'Se alinea bien con la política del proyecto al usar «Yahvé». No hay conflictos terminológicos mayores. La decisión de mantener «casa» y la pasiva está bien encaminada. La principal corrección necesaria es léxica y estilística: conservar la diferencia entre «fragmentos» y «pedazos»/«piezas», y dar a ambas colas una sintaxis española completa.'
  issues:
