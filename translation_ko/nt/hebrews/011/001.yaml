  - 확신의 근거
  lexicon: BDAG
  rationale: 보이지 않는 것을 드러내는 「증거」의 의미를 보존한다.
- source_word: πίστις
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean: []
  lexicon: BDAG
  rationale: 11장 전체의 핵심어이며 일관되게 「믿음」으로 옮긴다.
theological_decisions:
- issue: 11장 전체 「믿음으로 X」 정형 어구 보존
  chosen_reading: Πίστει + 동사 정형을 한국어 「믿음으로 X」 정형 어구로 일관 번역
  alternative_readings:
  - 변화있는 표현
  rationale: 히브리서 11장은 Πίστει(여격) 어구를 반복하여 신앙 영웅들의 행위를 열거하는 수사 구조이다. 한국어 번역도 「믿음으로 X」 정형을 일관 보존하여 본문의 리듬과 신학적 강조를 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve formulaic repetition'
