translation:
  language: es
  text: Y la esposa de Sansón pasó a ser de su compañero[a], quien había sido su amigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su amigo … quien lo había acompañado»; el hebreo usa términos emparentados del grupo léxico רעה para expresar asociación o amistad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - fue
  - se volvió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva expresa cambio de estado. En español, «llegó a ser» comunica mejor la transición relacional que un simple «era/fue».
- source_word: אֵשֶׁת שִׁמְשׁוֹן
  english_pob_choice: Samson’s wife
  chosen_spanish: la esposa de Sansón
  alternatives_spanish:
  - la mujer de Sansón
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se vierte naturalmente como «la esposa de Sansón», preservando el vínculo marital sin introducir ambigüedad.
- source_word: לְמֵרֵעֵהוּ
  english_pob_choice: the wife of his companion
  chosen_spanish: la esposa de su compañero
  alternatives_spanish:
  - la esposa de su amigo
  - la esposa de su asociado
  lexicon: HALOT
  rationale: El grupo léxico de רעה aquí señala a un asociado o compañero. «Compañero» conserva la relación social y evita repetir «amigo» en la cláusula principal.
- source_word: אֲשֶׁר רֵעָה לוֹ
  english_pob_choice: who had been his friend
  chosen_spanish: quien había sido su amigo
  alternatives_spanish:
  - quien había acompañado con él
  - quien había estado asociado con él
  lexicon: HALOT
  rationale: El verbo de la misma raíz רעה expresa aquí relación/compañerismo, no pastoreo. «Había sido su amigo» es idiomático en español y mantiene el sentido relacional.
translation_notes:
  revision_awareness: El texto en inglés y la revisión más reciente muestran acuerdo alto y sin cambios sustantivos; se mantiene la lectura de cambio de estado («became») y la doble referencia relacional del grupo רעה, reflejada en español con un término distinto en la cláusula principal y su eco léxico en la relativa.
  spanish_consistency_notes:
  - Se usa «Sansón» en lugar de «Samson» por la forma española estándar del nombre bíblico.
  - 'Se conserva la estructura de dos miembros relacionales para reflejar el paralelismo del hebreo: esposa de un compañero / quien había sido su amigo.'
  - La nota al pie marca la alternativa lexical principal sin añadir interpretación doctrinal.
