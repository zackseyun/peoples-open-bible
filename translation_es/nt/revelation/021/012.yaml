translation:
  language: es
  text: teniendo una muralla grande y alta, teniendo doce puertas, y junto a las puertas doce ángeles, y nombres inscritos, que son los nombres de las doce tribus de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «los hijos de Israel» puede expresarse también como «los descendientes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχουσα
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - con
  - que tiene
  lexicon: BDAG
  rationale: El participio presente conserva en español la descripción continua de la ciudad. «Teniendo» mantiene la estructura participial mejor que convertirlo en una oración finita.
- source_word: τεῖχος μέγα καὶ ὑψηλόν
  english_pob_choice: a great and high wall
  chosen_spanish: un muro grande y alto
  alternatives_spanish:
  - una muralla grande y alta
  - un gran muro alto
  lexicon: BDAG
  rationale: «Muro» es claro y natural en español; «grande y alto» reproduce ambos adjetivos sin fusionarlos. «Muralla» sería posible, pero aquí «muro» conserva mejor la linealidad del griego.
- source_word: πυλῶνας
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - accesos
  lexicon: BDAG
  rationale: En español, «puertas» es el equivalente más natural para las entradas de la ciudad en este contexto apocalíptico. «Portones» sería más marcado y menos neutro.
- source_word: ἐπὶ τοῖς πυλῶσιν
  english_pob_choice: at the gates
  chosen_spanish: en las puertas
  alternatives_spanish:
  - junto a las puertas
  - sobre las puertas
  lexicon: BDAG
  rationale: La preposición con dativo es locativa. «En las puertas» conserva la ubicación sin sugerir que los ángeles están literalmente encima de ellas.
- source_word: ἀγγέλους δώδεκα
  english_pob_choice: twelve angels
  chosen_spanish: doce ángeles
  alternatives_spanish:
  - doce mensajeros
  lexicon: BDAG
  rationale: «Ángeles» es la traducción directa y estándar; no hay razón contextual para desplazarla a «mensajeros».
- source_word: ὀνόματα ἐπιγεγραμμένα
  english_pob_choice: names inscribed
  chosen_spanish: nombres inscritos
  alternatives_spanish:
  - nombres escritos
  - nombres grabados
  lexicon: BDAG
  rationale: «Inscritos» refleja bien la idea de algo escrito sobre una estructura monumental. «Grabados» sería demasiado específico, y «escritos» pierde el matiz arquitectónico.
- source_word: ἅ ἐστιν
  english_pob_choice: which are the names of
  chosen_spanish: que son los nombres de
  alternatives_spanish:
  - que pertenecen a
  - que corresponden a
  lexicon: BDAG
  rationale: La cláusula relativa identifica los nombres. Añadir «los nombres de» en español sigue la revisión del texto inglés y hace explícita la relación implícita sin añadir contenido ajeno.
- source_word: τῶν δώδεκα φυλῶν
  english_pob_choice: the twelve tribes
  chosen_spanish: las doce tribus
  alternatives_spanish:
  - las doce familias tribales
  lexicon: BDAG
  rationale: «Tribus» es la designación bíblica normal y precisa para φυλαί en este contexto.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos varones de Israel
  - de las tribus de Israel
  lexicon: BDAG
  rationale: Se conserva la fórmula masculina del griego con «hijos», siguiendo la precisión formal y la decisión del POB inglés de no neutralizarla. En español, «hijos de Israel» es también una fórmula bíblica reconocible.
theological_decisions:
- issue: Designación corporativa masculina υἱῶν Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos varones de Israel
  - el pueblo de Israel
  rationale: El griego usa explícitamente υἱῶν («hijos/varones»). Se preserva esa forma en el texto principal por fidelidad léxica y por la política de precisión de género del proyecto. «El pueblo de Israel» suavizaría la forma concreta del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: El texto inglés fue revisado para aclarar la relación implícita de ἅ ἐστιν con «the names of». La redacción española refleja esa misma aclaración con «que son los nombres de», manteniendo la tensión entre la forma compacta del griego y la explicitud requerida para la lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» como correspondencia de υἱῶν Ἰσραήλ, sin neutralizar el término.
  - «Ángeles» y «puertas» siguen el sentido contextual de ciudad fortificada/apocalíptica, sin tecnicismos innecesarios.
  - El participio inicial se conserva como «teniendo» para sostener la sintaxis descriptiva del versículo.
