    text: 'Hebreo: “treinta mil carros”. Algunos intérpretes y testigos antiguos han sugerido un número menor, por ejemplo “tres mil”, porque treinta mil parece inusualmente grande en este contexto; sin embargo, el texto principal sigue el hebreo masorético.'
    reason: textual_variant
  revision_rationale: Se reemplaza 'gente' por 'tropas' para reflejar mejor el valor militar contextual de וְעָם y alinearse con la decisión léxica auditada en inglés. Se suaviza el símil numérico para un español más natural sin perder la imagen ni la fuerza de לָרֹב. Se elimina la nota léxica b porque deja de ser necesaria tras la corrección.
