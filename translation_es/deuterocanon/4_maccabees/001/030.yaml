translation:
  language: es
  text: Porque la razón es líder[a] de las virtudes y dueña de las pasiones; por tanto, primero demostraré, mediante las obras restrictivas del autocontrol[b], que la razón es soberana sobre las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Líder» refleja ἡγεμών como quien dirige o encabeza; también podría traducirse «guía».
    reason: lexical_alternative
  - marker: b
    text: «Autocontrol» traduce σωφροσύνη en lenguaje español claro y moderno; también podría expresarse como «templanza» o «moderación».
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - razonamiento
  - juicio racional
  - mente
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός designa la facultad racional o el juicio razonado. «Razón» es el equivalente más natural en español y conserva el tono ético-filosófico del pasaje.
- source_word: ἡγεμών
  english_pob_choice: leader
  chosen_spanish: guía
  alternatives_spanish:
  - líder
  - gobernante
  - jefe
  lexicon: LSJ
  rationale: El término presenta a la razón como la que conduce a las virtudes. «Guía» preserva la imagen directiva con fluidez en español y evita un matiz político innecesario.
- source_word: αὐτοκράτωρ
  english_pob_choice: master
  chosen_spanish: dueña
  alternatives_spanish:
  - señora
  - soberana
  - dominadora
  lexicon: LSJ
  rationale: El griego expresa dominio efectivo sobre las pasiones. Aquí «dueña» comunica control real y mantiene una correspondencia idiomática clara con «master» en la lectura auditada; «soberana» queda para el segundo miembro del verso, donde el griego añade el matiz de autoridad independiente.
- source_word: παθῶν
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - emociones
  - deseos
  - afectos desordenados
  lexicon: LSJ
  rationale: En este contexto filosófico, πάθη se refiere a impulsos o pasiones, no simplemente a sentimientos. «Pasiones» reproduce bien ese campo semántico y mantiene la tensión con la razón.
- source_word: κωλυτικῶν
  english_pob_choice: restraining
  chosen_spanish: que frenan
  alternatives_spanish:
  - que restringen
  - que detienen
  - que inhiben
  lexicon: LSJ
  rationale: El adjetivo describe obras que contienen o impiden el avance de las pasiones. «Que frenan» es natural en español y conserva la fuerza impeditiva del término.
- source_word: σωφροσύνης
  english_pob_choice: self-control
  chosen_spanish: la templanza
  alternatives_spanish:
  - el autocontrol
  - la moderación
  - la sensatez
  lexicon: LSJ
  rationale: σωφροσύνη puede expresarse como templanza, moderación o autocontrol. Aquí se mantiene «templanza» por ser un equivalente clásico y porque el contexto moral del pasaje lo permite sin forzar una paráfrasis.
- source_word: ἔργων
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - actos
  - hechos
  - acciones
  lexicon: LSJ
  rationale: El texto habla de expresiones concretas de la virtud. «Obras» conserva amplitud formal y resulta natural en español bíblico y literario.
- source_word: αὐτοδέσποτός
  english_pob_choice: sovereign
  chosen_spanish: soberana
  alternatives_spanish:
  - autodueña
  - autogobernante
  - dueña de sí
  lexicon: LSJ
  rationale: El compuesto enfatiza dominio propio e independencia. «Soberana» recoge la idea de autoridad plena y evita una construcción forzada en español; el femenino concuerda con «la razón».
theological_decisions:
- issue: Tratamiento de πάθη como término ético-filosófico, no como categoría doctrinal posterior
  english_pob_reading: Render the terms in straightforward ethical-philosophical English without importing later doctrinal categories.
  chosen_spanish_reading: Traducir πάθη como «pasiones» sin convertirlo en «deseos pecaminosos» ni en una categoría teológica posterior.
  alternative_spanish_readings:
  - deseos pecaminosos
  - apetitos
  - emociones
  rationale: El griego del pasaje describe un contraste moral-filosófico entre razón y pasiones. «Pasiones» conserva esa tensión sin sobreinterpretar el texto ni cargarlo con una doctrina posterior que no está explícita aquí.
  doctrine_reference: Mantener el registro filosófico-moral del texto; no importar categorías doctrinales ajenas al contexto.
- issue: Alcance de σωφροσύνη
  english_pob_reading: self-control
  chosen_spanish_reading: «templanza» como virtud de contención moral, con tono clásico pero comprensible.
  alternative_spanish_readings:
  - autocontrol
  - moderación
  - dominio propio
  rationale: El término griego puede traducirse de varias maneras. En este contexto de disciplina moral, «templanza» es fiel y digna; la frase explicativa «que frenan la templanza» preserva la función de la virtud sin reducirla a una sola modernización léxica.
  doctrine_reference: Virtud ética en clave helenística; no se define aquí una virtud teológica específica.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al mantener el paralelismo fuerte entre razón, virtudes y pasiones, y al conservar el tono formal del segundo miembro con «soberana». También asume la preferencia auditada por un término de dominio efectivo para αὐτοκράτωρ/αὐτοδέσποτός, pero lo distribuye idiomáticamente en español para evitar redundancia y respetar la sintaxis natural.
  spanish_consistency_notes:
  - Se usa «razón» para λογισμός de manera consistente con el audit trail inglés y con el registro filosófico del pasaje.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no presente en el verso.
  - «Pasiones» mantiene la oposición ética con «razón» sin moralizar en exceso el griego.
  - La puntuación con punto y coma reproduce la articulación de las dos cláusulas mayores del original y de la versión inglesa revisada.
