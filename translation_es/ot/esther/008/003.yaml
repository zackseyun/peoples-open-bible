    text: O «se postró ante sus pies»; el hebreo describe una caída o postración suplicante ante el rey.
    reason: lexical_alternative
  - marker: b
    text: O «el mal plan» o «el daño»; el hebreo puede expresar el mal o daño que Amán pretendía causar, aquí en paralelo con el plan que había tramado.
    reason: lexical_alternative
  revision_rationale: Se ajustó la frase de postración para reflejar mejor וַתִּפֹּל y sonar natural en español («Cayó a sus pies»). También se revisó רָעַת הָמָן a «el plan malvado de Amán» para seguir la decisión contextual documentada en la auditoría inglesa y mantener el sentido de amenaza/complot, sin colapsarlo del todo con la segunda expresión sobre el plan tramado.
