    text: 'Hebreo literalmente: «un ternero, un hijo del ganado»; es decir, un bovino joven.'
    reason: lexical_alternative
  revision_rationale: La revisión corrige la terminología sacrificial de חטאת para alinearla con la fuente y la auditoría inglesa, mejora la naturalidad del español en עֵגֶל בֶּן בָּקָר trasladando la literalidad a nota, elimina una nota no priorizada por la evidencia, y corrige la puntuación final.
