translation:
  language: es
  text: No te entregues a una prostituta, no sea que desperdicies tu herencia[b].[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Aparta tu mirada de una mujer hermosa, y no examines la belleza ajena; porque por la belleza de una mujer muchos se desviaron, y de esto la pasión se enciende como fuego». El testigo griego aquí es considerablemente más extenso que el hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: «Herencia» puede referirse a la heredad familiar, al patrimonio o a la porción recibida por derecho; la advertencia es que la conducta sexual puede llevar a perderla o disiparla.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּתֵּן
  english_pob_choice: Do not give
  chosen_spanish: No te entregues
  alternatives_spanish:
  - No te des
  - No te entregues a
  - No te abandones a
  lexicon: HALOT
  rationale: El hebreo usa una prohibición con נתן y נַפְשְׁךָ, que expresa cederse a sí mismo. «No te entregues» comunica bien esa idea reflexiva en español sin volverla demasiado literal o torpe.
- source_word: לְזוֹנָה
  english_pob_choice: to a prostitute
  chosen_spanish: a una prostituta
  alternatives_spanish:
  - a una ramera
  - a una mujer prostituta
  - a una mujer de prostitución
  lexicon: HALOT
  rationale: זוֹנָה designa con precisión a una prostituta; «prostituta» es claro, actual y fiel. Se evita «ramera» por arcaico y otras opciones por menos precisas.
- source_word: נַפְשְׁךָ
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - tu alma
  - tu vida
  - tu persona
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la persona entera, no solo al alma inmaterial. En español, el clítico reflexivo en «te entregues» transmite naturalmente ese sentido de cederse por completo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español bíblico moderno, «para que no» expresa bien la advertencia de consecuencia y suena más natural que «lest» o «no sea que» en esta construcción.
- source_word: תָּסֵב
  english_pob_choice: you turn away / you squander
  chosen_spanish: desperdicies
  alternatives_spanish:
  - pierdas
  - arruines
  - desvíes
  lexicon: HALOT
  rationale: El hebreo apunta a apartar o perder la herencia en el efecto de la conducta sexual. Dado el ajuste auditado del inglés a «squander», «desperdicies» comunica con más precisión la pérdida por derroche o disipación.
- source_word: נַחֲלָתֶךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu heredad
  - tu patrimonio
  - tu porción
  lexicon: HALOT
  rationale: «Herencia» es el equivalente más transparente y amplio para נחלה, conservando la idea de porción recibida por derecho familiar o patrimonial.
theological_decisions:
- issue: Preferencia por el hebreo frente al paralelo griego más amplio
  english_pob_reading: Translate the extant Hebrew main line while allowing the Greek to inform the sense of the warning without replacing the Hebrew.
  chosen_spanish_reading: Se traduce la línea hebrea como texto principal y se preserva en nota el paralelo griego más extenso.
  alternative_spanish_readings:
  - «Aparta tu mirada de una mujer hermosa, y no examines la belleza ajena...»
  - «No fijes los ojos en una mujer hermosa...»
  rationale: En Sirácida, cuando el hebreo está disponible, debe primar como testigo principal. El griego presenta una tradición más amplia y distinta, con énfasis en la mirada y el deseo visual; por fidelidad al expediente, ese matiz se conserva como alternativa, no como reemplazo del hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobreviva; conservar honestamente la incertidumbre textual.'
- issue: Alcance moral de la advertencia
  english_pob_reading: sexual folly can divert or forfeit what belongs to you
  chosen_spanish_reading: la conducta sexual puede llevar a perder o disipar lo que te pertenece
  alternative_spanish_readings:
  - puedes perder tu patrimonio
  - puedes malgastar tu herencia
  - puedes quedar sin tu porción
  rationale: La advertencia no es solo económica; combina pérdida de bienes y daño moral. «Desperdicies tu herencia» mantiene esa amplitud sin precisar indebidamente si se trata de patrimonio, porción hereditaria o bien familiar.
  doctrine_reference: Sir 9:8; sentido sapiencial de advertencia contra la inmoralidad sexual y sus consecuencias.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés que prefirió una formulación equivalente a «squander your inheritance». Para el español se adoptó «desperdicies tu herencia», que conserva mejor el valor de pérdida por derroche que una simple lectura de «te apartes de». También se mantuvo la primacía del hebreo, dejando el griego en nota por su forma más extensa y divergente.
  spanish_consistency_notes:
  - Se usó «herencia» para נחלה, consistente con la preferencia del proyecto por términos transparentes y amplios.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes; el verso no contiene el nombre divino.
  - Se prefirió un reflexivo natural («te entregues») para reflejar נַפְשְׁךָ como entrega de la persona completa.
  - La nota griega conserva la tensión textual sin reemplazar el hebreo principal.
