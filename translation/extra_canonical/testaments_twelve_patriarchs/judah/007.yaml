  text: "VII. Καὶ τῇ ἑξῆς ἐρρέθη πρὸς ἡμᾶς ὅτι Γαὰς πόλεως¹ βασιλεὺς ἐν λαῷ πολλῷ² ἔρχεται³ πρὸς ἡμᾶς. 2. Ἐγὼ δὲ καὶ ὁ Δὰν⁴ πορευθέντες πρὸς Ἀμορραίους καὶ προσποιησάμενοι αὐτοῖς συμμάχους⁵ εἰσήλθομεν εἰς τὴν πόλιν αὐτῶν⁶. 3. Νυκτὸς δὲ βαθείας⁷ ἤλθον⁸ πρὸς ἡμᾶς οἱ ἀδελφοί μου, καὶ ἀνοίξαντες τὰς πύλας αὐτοῖς, πάντας αὐτοὺς ἐξωλοθρεύσαμεν⁹ καὶ ἐπρονομεύσαμεν¹⁰. 4. *Καὶ ἐπροσεγγίσαμεν τῇ Θάμνῃ¹¹, *ἐν ᾗ¹² ἦν πᾶσα ἡ ἀποσκευὴ²² τῶν πολεμίων βασιλέων²³. 5. Τότε οὖν ὑβριζόμενος παρ᾽ αὐτῶν ὠργίσθην²⁴, *καὶ ὥρμησα²⁵ *ἐπ᾽ αὐτοὺς ἐπὶ τὴν κορυφήν²⁶· κἀκεῖνοι ἐσφενδόνιζον με ἐν λίθοις²⁷ καὶ τοξεύοντες²⁸. 6. Καὶ εἰ μὴ Δὰν ὁ ἀδελφός μου συνεμάχησεν,"
  language: Greek
  source_pages:
  - 145
