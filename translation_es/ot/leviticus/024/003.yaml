translation:
  language: es
  text: Fuera del velo[a] del testimonio, en la tienda de reunión, Aarón lo dispondrá[b] desde la tarde hasta la mañana delante de Yahvé continuamente.[c] Es un estatuto permanente[d] por todas sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortina del testimonio».
    reason: lexical_alternative
  - marker: b
    text: O «lo pondrá en orden» o «lo ordenará».
    reason: lexical_alternative
  - marker: c
    text: «Continuamente» aquí se refiere a la observancia regular y continua del rito, especificada por «desde la tarde hasta la mañana».
    reason: cultural_note
  - marker: d
    text: O «un estatuto perpetuo» o «una ordenanza perpetua».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִחוּץ
  english_pob_choice: Outside
  chosen_spanish: Fuera
  alternatives_spanish:
  - Al exterior
  - Outside
  lexicon: HALOT
  rationale: מִחוּץ expresa ubicación externa. En español, «Fuera» es una solución natural y breve; mantiene la relación espacial sin añadir interpretación.
- source_word: לְפָרֹכֶת
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el velo
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la cortina/velo del santuario. En español, «velo» conserva el término cultual tradicional y la posibilidad lexical señalada por el texto inglés.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del testimonio
  - del arca del testimonio
  lexicon: HALOT
  rationale: En el contexto tabernacular, עֵדֻת es el término técnico «testimonio». Mantenerlo preserva la referencia cultual sin explicitar más de lo que el hebreo dice.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce el nombre técnico del santuario de manera clara y fiel. «Tienda» funciona bien en español moderno y evita la carga interpretativa de otros equivalentes.
- source_word: יַעֲרֹךְ אֹתוֹ
  english_pob_choice: shall arrange it
  chosen_spanish: dispondrá esto
  alternatives_spanish:
  - lo dispondrá
  - lo pondrá en orden
  - lo arreglará
  lexicon: HALOT
  rationale: ערך en contexto sacerdotal significa ordenar o disponer. «Disponer» comunica la acción ritual sin forzar una imagen demasiado específica; «esto» mantiene la referencia amplia del objeto implícito en el contexto inmediato.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  english_pob_choice: from evening until morning
  chosen_spanish: desde la tarde hasta la mañana
  alternatives_spanish:
  - de tarde a mañana
  - desde la tarde hasta la mañana
  lexicon: HALOT
  rationale: «Tarde» y «mañana» son equivalentes naturales en español; «desde... hasta...» preserva el intervalo temporal. Se evitó una formulación más rígida que pudiera sonar ajena al ritmo del hebreo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» es una forma cultual directa y transparente para לִפְנֵי. Se conserva «Yahvé» conforme a la política del proyecto para el Nombre divino.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  - continuamente
  lexicon: HALOT
  rationale: תָּמִיד puede señalar una práctica regular y constante, no necesariamente una acción sin interrupción literal. «Continuamente» conserva esa fuerza ritual y deja intacta la tensión con «desde la tarde hasta la mañana».
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una ordenanza perpetua
  alternatives_spanish:
  - un estatuto perpetuo
  - una ordenanza perpetua
  - una ordenanza permanente
  lexicon: HALOT
  rationale: חֻקַּת עוֹלָם expresa una disposición normativa duradera. «Ordenanza perpetua» es claro y solemne en español bíblico contemporáneo, y refleja bien la duración covenantal del hebreo.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a través de sus generaciones
  - para sus generaciones
  lexicon: HALOT
  rationale: La expresión idiomática indica vigencia intergeneracional. «Para sus generaciones» mantiene el giro bíblico sin perder inteligibilidad en español.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante Yahvé
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se preserva «Yahvé» en lugar de ocultarlo tras un título, siguiendo la política del proyecto y el testimonio del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תָּמִיד junto con el horario nocturno
  english_pob_reading: continually
  chosen_spanish_reading: continuamente
  alternative_spanish_readings:
  - regularmente
  - de continuo
  - continuamente
  rationale: El inglés POB mantiene «continually» y nota que se refiere a la observancia regular del rito, especificada por «from evening until morning». En español se conserva «continuamente» para no resolver la tensión entre continuidad y periodicidad ritual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés POB revisó la colocación temporal para unir «from evening until morning» más directamente con el verbo de la acción ritual. La redacción española sigue ese ajuste, colocando «desde la tarde hasta la mañana» inmediatamente después de «dispondrá esto» y antes de la referencia a Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - «Tienda de reunión» reproduce el nombre técnico del santuario y armoniza con el registro bíblico moderno.
  - Se conserva la tensión entre continuidad ritual y franja horaria concreta mediante «continuamente» más la nota.
  - «Velo» se usa como equivalente cultual de פָּרֹכֶת, con la alternativa «cortina» indicada en nota.
  - La frase «para sus generaciones» conserva el valor idiomático de vigencia intergeneracional.
