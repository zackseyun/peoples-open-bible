revisions:
- from: 'Así dice Yahvé de los ejércitos: Ve[a], entra[b] a este mayordomo, a Sebna[c], el que está sobre la casa:'
  to: 'Así dice el Señor Yahvé de los ejércitos: Ve[a], preséntate ante este mayordomo, ante Sebna, el que está sobre la casa[b]:'
  rationale: Se añadió «el Señor» para representar plenamente אֲדֹנָי יְהוִה junto con «Yahvé», conforme al hebreo y a la terminología del proyecto. Se reemplazó «entra a este mayordomo» por «preséntate ante este mayordomo» para lograr español natural sin perder la idea de aproximación del doble imperativo; la nota conserva la alternativa más literal. Se reubicó la nota cultural al sintagma del cargo, que es donde realmente aplica.
