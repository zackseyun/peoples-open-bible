translation:
  text: His disciples said to him[1], “Does circumcision benefit or not?” He said
    to them, “If it were beneficial, their father would beget them circumcised from
    their mother. Rather[6][5][4][3][2], the circumcision of truth in spirit has become
    entirely profitable.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ‘If it were beneficial’ reflects the irrealis construction ⲛⲉⲣⲉ…; cf. Layton,
      Grammar §280.
    reason: lexical_alternative
  - marker: '2'
    text: ‘Beget them … from their mother’ reflects a paternal subject (ⲡⲉⲩⲉⲓⲱⲧ) and
      source construction (ⲉⲃⲟⲗ ϩⲛ ⲡⲉⲩⲙⲁⲁⲩ).
    reason: cultural_note
  - marker: '3'
    text: ‘Circumcision of truth’ can be taken adjectivally as ‘true circumcision.’
    reason: lexical_alternative
  - marker: '4'
    text: ‘Has become entirely profitable’ renders the idiom ⲁϥϭⲛ̄ϩⲏⲩ ⲧⲏⲣϥ; lit. ‘has
      become entirely (so),’ with ‘profitable’ supplied from context.
    reason: lexical_alternative
  - marker: '5'
    text: 'Conceptual echoes: Rom 2:29; Phil 3:3.'
    reason: cross_reference
  - marker: '6'
    text: Lycopolitan-influenced pronominal form ⲛⲁⲛⲧⲟϥ (‘to him’) occurs in this
      saying.
    reason: dialect_note
lexical_decisions:
- source_word: ⲥⲃⲃⲉ
  chosen: circumcision
  alternatives:
  - cutting
  lexicon: Crum s.v. ⲥⲃⲃⲉ
  rationale: Standard Coptic term for ritual circumcision; the context clearly concerns
    the Jewish practice.
- source_word: ⲣⲱⲫⲉⲗⲉⲓ
  chosen: benefit
  alternatives:
  - profit
  - be of use
  lexicon: Loan from Gk. ὠφελεῖν; Crum notes ωφελεῖν as ‘to benefit’
  rationale: Verb of advantage; ‘benefit’ is idiomatic English and matches the contrast
    with the final clause.
- source_word: ⲛⲉⲣⲉ…ⲣⲱⲫⲉⲗⲉⲓ
  chosen: if it were beneficial
  alternatives:
  - were it beneficial
  - if it would benefit
  lexicon: Layton, Grammar §280 (irrealis with ⲛⲉⲣⲉ + infinitive)
  rationale: ⲛⲉⲣⲉ + infinitive marks counterfactual condition; render with English
    irrealis ‘if it were’.
- source_word: ϫⲡⲟⲛ
  chosen: beget
  alternatives:
  - engender
  - father
  lexicon: Crum s.v. ϫⲡⲟⲛ ‘beget’
  rationale: Subject is ‘their father,’ so ‘beget’ keeps the paternal action explicit.
- source_word: ⲉⲃⲟⲗ ϩⲛ ⲡⲉⲩⲙⲁⲁⲩ
  chosen: from their mother
  alternatives:
  - out from their mother
  lexicon: Crum s.v. ⲙⲁⲁⲩ ‘mother’
  rationale: ⲉⲃⲟⲗ ϩⲛ marks origin/source; concise English ‘from’ suffices.
- source_word: ⲉⲣⲉⲛⲧⲟⲟⲩ ⲥⲃⲃⲉ
  chosen: them circumcised
  alternatives:
  - with them being circumcised
  lexicon: Layton, Grammar §119 (ⲉⲣⲉ + object + predicate)
  rationale: Predicate construction marking a contemporaneous state; concise English
    participle fits.
- source_word: ⲁⲗⲗⲁ
  chosen: Rather
  alternatives:
  - But rather
  - But
  lexicon: Gk. ἀλλά loan
  rationale: ⲁⲗⲗⲁ introduces a corrective contrast; initial capital for sentence start.
- source_word: ⲡⲥⲃⲃⲉ ⲛⲙⲉ
  chosen: the circumcision of truth
  alternatives:
  - the true circumcision
  lexicon: Crum s.v. ⲙⲉ ‘truth; reality’
  rationale: Genitive ‘of truth’ likely functions attributively (‘true’). Retain genitive
    to preserve Coptic strangeness; note the adjectival alternative.
- source_word: ϩⲛ ⲡⲛⲉⲩⲙⲁ
  chosen: in spirit
  alternatives:
  - in the Spirit
  lexicon: Standard for ‘spirit’; no nomina sacra capitalization required in Thomas
  rationale: Thomas’s usage is not explicitly trinitarian; lower-case ‘spirit’ keeps
    ambiguity.
- source_word: ⲁϥϭⲛ̄ϩⲏⲩ ⲧⲏⲣϥ
  chosen: has become entirely [profitable]
  alternatives:
  - has become entirely
  - has become altogether profitable
  lexicon: Crum s.v. ϭⲛϩⲏⲩ ‘wholly, completely’; Layton notes ellipsis recoverable
    from context
  rationale: Idiom expresses totality; ‘profitable’ is supplied from the preceding
    verb of advantage to make the ellipsis explicit in English.
textual_note: 'Dialect/orthography: The saying is transmitted without lacunae in NH
  II,42. Lycopolitan-influenced pronominal forms appear (e.g., ⲛⲁⲛⲧⲟϥ for ‘to him’).
  The Greek loan ⲣⲱⲫⲉⲗⲉⲓ (ωφελεῖ) is used as a finite verb. The sequence ⲉⲣⲉⲛⲧⲟⲟⲩⲥⲃⲃⲉ
  is an ⲉⲣⲉ + object + predicate construction (‘them [being] circumcised’). The printed
  hand shows ⲡⲛ︤ⲁ︥ as an abbreviation for ⲡⲛⲉⲩⲙⲁ (nomina sacra style). The closing
  ⲁϥϭⲛ̄ϩⲏⲩ ⲧⲏⲣϥ is an idiom for ‘has become entirely/wholly,’ with ‘profitable’ implied
  from the preceding context; Dilley’s normalization represents pronoun assimilation
  but does not alter the sense. No Greek POxy overlap exists for this saying.'
