  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general y la mayoría de las decisiones léxicas del hebreo: la relación explicativa de כִּי, el valor iterativo de los imperfectos, la comparación con las langostas, y el propósito de destruir la tierra. Sin embargo, hay desajustes en las notas y un pequeño problema de anclaje: la nota [a] está colocada sobre «subirían», pero la alternativa documentada corresponde a «como langostas en multitud». Además, se perdió la nota cultural inglesa sobre «sus tiendas» como metonimia del campamento, y la nota [b] española reemplaza indebidamente esa función por una retroversión literal del hebreo para «sin número».'
  spanish_quality_summary: El español es legible y digno, pero «sus tiendas vendrían» suena algo rígido; aun así, puede conservarse para mantener la imagen fuente si se apoya con nota cultural. «Subirían» y «entraban» comunican bien el aspecto iterativo. «Ganado», «camellos» y «destruirla» son naturales y fieles. La principal reparación necesaria es de notas y anclajes, no de sentido principal.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: «ganado» por מִקְנֶה, «langostas» por אַרְבֶּה, y «destruirla» por לְשַׁחֲתָהּ. Conviene preservar explícitamente la metonimia de «tiendas» mediante nota, siguiendo la auditoría inglesa.'
  issues:
