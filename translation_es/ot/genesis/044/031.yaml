revisions:
- from: Entonces[a], cuando vea que el muchacho no está, morirá, y tus siervos harán bajar la canicie de tu siervo, nuestro padre, con dolor a Seol.
  to: Entonces[a], cuando vea que el muchacho no está, morirá, y tus siervos harán descender la canicie de tu siervo nuestro padre a Seol con dolor.
  rationale: Se aplican ajustes menores de estilo y orden sintáctico para un español más natural y digno, sin cambiar el sentido fuente ni las decisiones léxicas principales. Se mantiene 'Seol' con la nota correspondiente, así como la imagen concreta de la canicie y el tono deferente de 'tus siervos'.
