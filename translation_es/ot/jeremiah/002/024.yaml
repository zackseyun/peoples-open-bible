base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/002/024.yaml
  text: A wild donkey accustomed to the wilderness[a], in the craving of her appetite sniffs the wind; in her heat, who can turn her back? All who seek her will not weary themselves[c][b]; in her month they will find her.
  footnotes:
  - marker: a
    text: Or 'snuffs up the wind.' The Hebrew idiom pictures the animal eagerly scenting the air in restless desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'in her rut' or 'in her lust.' The Hebrew refers to the season/state of sexual craving.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in her month,' likely meaning the time of her heat or mating cycle.
    reason: cultural_note
