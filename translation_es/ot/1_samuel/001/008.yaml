    rationale: El expediente inglés y la decisión teológica explícita requieren una traducción gender-accurate como «sons». En español, «hijos» puede ser masculino específico, pero en uso contemporáneo suele oírse como mixto/genérico; por tanto, no preserva con suficiente claridad la fuerza del original.
