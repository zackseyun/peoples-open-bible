revisions:
- from: Antes del derramamiento de sangre vienen el vapor y el humo del horno; así, antes del derramamiento de sangre viene la injuria[a].
  to: Antes del fuego vienen el vapor del horno y el humo; así, antes del derramamiento de sangre viene la injuria[a].
  rationale: Se corrige el error principal de sentido restaurando 'fuego' en el primer miembro para reflejar πρὸ πυρὸς y conservar el paralelismo proverbial de la fuente. Se mantiene 'injuria' como opción digna y fiel para λοιδορία, pero la nota se normaliza al español y ofrece alternativas comprensibles.
  reviewer_model: gpt-5.4
