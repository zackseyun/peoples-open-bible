translation:
  language: es
  text: Yo los traeré[a], y habitarán en medio de Jerusalén; y serán mi pueblo, y yo seré su Dios, en verdad[b] y en rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘dentro de Jerusalén’. El hebreo dice más literalmente ‘en medio de Jerusalén’.
    reason: lexical_alternative
  - marker: b
    text: ‘En verdad’ también puede entenderse como ‘fielmente’ o ‘verdaderamente’.
    reason: lexical_alternative
  - marker: c
    text: ‘Rectitud’ también puede verterse ‘justicia’ en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: I will bring
  chosen_spanish: Yo los traeré
  alternatives_spanish:
  - Yo los llevaré
  - Yo los haré venir
  lexicon: HALOT
  rationale: El verbo causativo de בוא admite la idea de ‘traer’ o ‘hacer venir’. En español, ‘traer’ reproduce bien el movimiento causado por Yahvé sin añadir explícitamente ‘de vuelta’ que no está en la forma breve del hebreo, aunque el contexto sea restaurador.
- source_word: וְשָׁכְנוּ
  english_pob_choice: they will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  lexicon: HALOT
  rationale: שכן expresa residir o habitar. ‘Habitarán’ conserva el matiz estable y solemne mejor que ‘vivirán’, que sería más general.
- source_word: בְּתוֹךְ יְרוּשָׁלִָם
  english_pob_choice: in the midst of Jerusalem
  chosen_spanish: en medio de Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: בְּתוֹךְ es más preciso que un simple ‘en’. ‘En medio de Jerusalén’ mantiene la fuerza espacial y la formulación tradicional equivalente al inglés auditado.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: they will be my people
  chosen_spanish: serán para mí un pueblo
  alternatives_spanish:
  - serán mi pueblo
  - llegarán a ser un pueblo para mí
  lexicon: HALOT
  rationale: La fórmula de pacto se conserva de manera transparente. ‘Serán para mí un pueblo’ refleja mejor la estructura hebrea con לִי לְעָם que una mera equivalencia posesiva.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  english_pob_choice: and I will be their God
  chosen_spanish: y yo seré para ellos Dios
  alternatives_spanish:
  - y yo seré su Dios
  - y yo llegaré a ser Dios para ellos
  lexicon: HALOT
  rationale: Se mantiene la fórmula de pacto sin domesticarla. ‘Seré para ellos Dios’ conserva la relación expresada por לָהֶם לֵאלֹהִים y evita reemplazarla por una paráfrasis interpretativa.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con verdad
  - fielmente
  - verdaderamente
  lexicon: HALOT
  rationale: אֱמֶת puede implicar verdad, fidelidad o confiabilidad. ‘En verdad’ preserva la forma nominal y permite oír también el matiz de fidelidad que el inglés POB deja abierto.
- source_word: וּבִצְדָקָה
  english_pob_choice: and in righteousness
  chosen_spanish: y en justicia
  alternatives_spanish:
  - y en rectitud
  - y con justicia
  - y en justicia recta
  lexicon: HALOT
  rationale: צְדָקָה puede traducirse por ‘justicia’ o ‘rectitud’. Aquí se elige ‘justicia’ porque en español comunica mejor el campo semántico covenantal y mantiene el paralelo con ‘en verdad’.
theological_decisions:
- issue: Fórmula de pacto 'they will be my people, and I will be their God'
  english_pob_reading: Retain the traditional covenantal phrasing without paraphrase.
  chosen_spanish_reading: 'Conservar la fórmula de pacto: ''serán para mí un pueblo, y yo seré para ellos Dios''.'
  alternative_spanish_readings:
  - serán mi pueblo, y yo seré su Dios
  - me pertenecerán, y yo cuidaré de ellos como Dios
  rationale: El hebreo usa una fórmula pactal bien establecida; la traducción debe preservarla sin reexplicarla. La redacción elegida mantiene las conexiones intertextuales y evita añadir contenido no explícito.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over tradition'
- issue: Alcance de 'en verdad y en justicia'
  english_pob_reading: Attach the phrase to the covenant relationship as rendered 'in truth and in righteousness.'
  chosen_spanish_reading: 'Dejar la frase unida a la relación de pacto: ''en verdad y en justicia''.'
  alternative_spanish_readings:
  - verdaderamente y con justicia
  - como Dios fiel y justo para ellos
  rationale: El hebreo permite una cierta ambigüedad sobre el alcance exacto de la frase. La versión española conserva esa tensión sin reducirla solo a la acción divina o solo al estado del pueblo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el registro auditado en inglés POB. Se conservan las decisiones estables: בְּתוֹךְ como una localización más específica que ‘en’, la fórmula de pacto sin paráfrasis, y la ambigüedad controlada de אֱמֶת y צְדָקָה con notas alternativas en español.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ según el estándar del proyecto cuando el verso menciona la acción divina, aunque aquí no aparece el tetragrámaton explícito.
  - Se mantiene ‘Dios’ y no ‘dios(es)’ porque לֵאלֹהִים funciona aquí como fórmula relacional de pacto.
  - ‘En medio de Jerusalén’ conserva la espacialidad solemne y la conexión intertextual con la formulación auditada en inglés.
