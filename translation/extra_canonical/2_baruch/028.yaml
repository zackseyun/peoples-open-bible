  from: 'And I answered and said to her[a], “I too was moved in my heart because of this dwelling in which you now stand, because you have put on what is like the former beauty of Zion. And now, if you are so prepared, when you have seen the established order, and they have fallen into your many pits, and you have become a downfall in the great streets, and you, when you are swallowed up by their many stumbling blocks from their affliction, will no longer remember your strength for the earth. And you, who when you went out hoped and rejoiced, your glass will be broken, and your children and your mothers. How much more will the coming affliction be a veil for your glass[c][b], from many things by which you fell and rejoiced.”'
