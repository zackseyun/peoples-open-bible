review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la prohibición legal de no torcer el derecho del pobre en un caso judicial. 'No tuerzas' corresponde adecuadamente a תַטֶּה, 'el derecho' es una opción defendible para מִשְׁפָּט, y 'en su litigio' preserva el marco forense de בְּרִיבוֹ. Sin embargo, 'tu pobre persona' suena poco natural en español y no es la mejor manera de conservar אֶבְיֹנְךָ; además, el pie alternativo repite esa misma rareza.
  spanish_quality_summary: La redacción es mayormente clara, pero 'tu pobre persona' resulta forzada y poco idiomática en español bíblico natural. Una formulación como 'tu pobre' conserva la referencia posesiva y evita introducir género, manteniendo mejor legibilidad. El resto del verso es digno y claro.
  glossary_alignment: No hay términos de glosario mayor afectados. La decisión sobre אֶבְיֹנְךָ debe priorizar español natural sin añadir género; 'tu pobre' cumple mejor que 'tu pobre persona'. 'Litigio' encaja con el matiz jurídico de רִיב, y 'derecho' mantiene la fuerza legal de מִשְׁפָּט.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: ''tu pobre persona'''
    rationale: Aunque busca evitar añadir género, en español suena artificial y distrae del sentido legal. 'Tu pobre' transmite de manera más natural 'your poor person/your poor one'.
  - severity: low
    issue: La nota al pie alternativa también usa 'tu pobre persona'
    rationale: La alternativa debe ser natural en español y reflejar la misma mejora estilística para no perpetuar la torpeza del texto principal.
  revised_spanish_text: No tuerzas el derecho de tu pobre en su litigio[a].
  revised_footnotes:
