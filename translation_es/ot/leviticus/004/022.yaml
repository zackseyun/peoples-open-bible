revisions:
- from: Cuando un dirigente[a] peca y, sin darse cuenta, hace una de cualquiera de las cosas que Yahvé su Dios ha mandado que no se hagan[b], y queda culpable[c],
  to: Cuando un dirigente[a] peca y hace inadvertidamente[b] una de las cosas que Yahvé su Dios ha mandado que no se hagan, y queda culpable[c],
