translation:
  language: es
  text: Y ahora, Yahvé nuestro Dios, sálvanos de su mano, para que todos los reinos de la tierra sepan que solo tú eres Yahvé.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tú eres Yahvé solo»; el sentido es que solo Yahvé es Dios sobre todos los reinos de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el matiz discursivo del hebreo con la conjunción inicial וְ y la marca temporal עַתָּה. «Y ahora» suena natural en una oración y mantiene la transición enfática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La convención del proyecto en español es usar «Yahvé» para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La construcción posesiva expresa pertenencia pactal y relación comunitaria; «nuestro Dios» es la forma más natural y transparente en español.
- source_word: הוֹשִׁיעֵנוּ
  english_pob_choice: save us
  chosen_spanish: sálvanos
  alternatives_spanish:
  - líbranos
  - sálvanos/líbranos
  lexicon: HALOT
  rationale: El imperativo hiphil de ישׁע pide una acción de rescate. «Sálvanos» reproduce con claridad la petición directa; «líbranos» también es posible, pero el contexto de súplica favorece «sálvanos».
- source_word: מִיָדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su mano/poder
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de la mano como poder o control, sin desdibujarla con una explicación interpretativa en el cuerpo del texto.
- source_word: וְיֵדְעוּ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... sepan
  alternatives_spanish:
  - y ... sepan
  - para que ... conozcan
  lexicon: HALOT
  rationale: En este contexto la forma verbal expresa finalidad/resultados de la liberación. «Para que ... sepan» comunica bien la finalidad orante y mantiene el valor del prefijo verbal.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: all the kingdoms of the earth
  chosen_spanish: todos los reinos de la tierra
  alternatives_spanish:
  - todos los reinos del mundo
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance universal del hebreo en un registro bíblico natural; «mundo» sería más interpretativo y menos ligado a la formulación bíblica.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben reconocer los reinos. «Que» es la equivalencia más natural y precisa en español.
- source_word: אַתָּה יְהוָה לְבַדֶּךָ
  english_pob_choice: you alone are Yahweh
  chosen_spanish: tú solo eres Yahvé
  alternatives_spanish:
  - tú eres Yahvé solo
  - solo tú eres Yahvé
  lexicon: HALOT
  rationale: La fuerza de לְבַדֶּךָ es exclusividad. «Tú solo eres Yahvé» conserva esa exclusividad con un orden idiomático en español, sin suavizar la afirmación monoteísta.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la política del proyecto para el Tetragrámaton, manteniendo el nombre personal de Dios y evitando la sustitución por un título genérico. En español, «Yahvé» es la forma establecida en la serie.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the final clause לְבַדֶּךָ
  english_pob_reading: 'exclusive monotheistic claim: ''you alone are Yahweh'''
  chosen_spanish_reading: 'afirmación exclusiva: «tú solo eres Yahvé»'
  alternative_spanish_readings:
  - tú eres Yahvé solo
  - solo tú eres Yahvé
  rationale: La frase final no debe diluirse en una simple afirmación de identidad; afirma exclusividad respecto de todos los demás poderes y dioses. «Tú solo eres Yahvé» mantiene esa tensión teológica con naturalidad en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Concordancia alta con el control editorial más reciente; no se registraron revisiones aplicadas ni cambios de última pasada. La redacción española se ajusta al audit trail inglés y a la convención del proyecto para el Nombre divino.
  spanish_consistency_notes:
  - Se preserva el Tetragrámaton como «Yahvé», coherente con el sistema español del proyecto.
  - Se traduce la petición con un imperativo directo («sálvanos»), acorde con la forma de súplica del hebreo.
  - La frase final mantiene la exclusividad monoteísta sin ampliación explicativa dentro del texto principal.
  - «Tierra» se usa con sentido universal, no como restricción geográfica local.
