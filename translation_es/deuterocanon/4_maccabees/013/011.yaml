    issue: «mientras otro dijo» para ὁ μέν ... ὁ δέ
    rationale: «Mientras» puede sugerir simultaneidad o trasfondo temporal, pero el griego solo marca correlación/distribución entre dos hablantes sucesivos. Una formulación coordinada simple es más precisa.
  - severity: low
    issue: «Ten ánimo» para Θάρρει
    rationale: Es entendible, pero menos idiomático y menos enérgico en español general que «Ten valor» o «Cobra ánimo». Dado el contexto de exhortación martirial, una forma más natural mejora fidelidad estilística sin cambiar el sentido.
  revised_spanish_text: 'Y uno dijo[a]: «Ten valor, hermano»; y otro dijo: «Resiste noblemente».'
