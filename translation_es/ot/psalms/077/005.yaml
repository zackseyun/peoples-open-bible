translation:
  language: es
  text: Has mantenido abiertos mis párpados[a]; estoy turbado[b] y no puedo hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «has mantenido las vigilias de mis ojos». El hebreo es un modismo que probablemente significa que Dios ha impedido que el salmista cierre los ojos y se duerma.
    reason: lexical_alternative
  - marker: b
    text: 'O: «agitado» / «perturbado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָחַזְתָּ
  english_pob_choice: You have held
  chosen_spanish: Has mantenido
  alternatives_spanish:
  - Has sujetado
  - Has agarrado
  - Has retenido
  lexicon: HALOT
  rationale: El verbo expresa acción divina sobre el estado del orante. «Has mantenido» comunica bien la idea de sostener la vigilia de los ojos sin sonar tan brusco como «has agarrado», y preserva la agencia de Yahvé en el contexto.
- source_word: שְׁמֻרוֹת עֵינָי
  english_pob_choice: my eyelids open
  chosen_spanish: mis párpados
  alternatives_spanish:
  - las vigilias de mis ojos
  - las guardas de mis ojos
  - las vigilias de mis párpados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a aquello que mantiene los ojos despiertos o abiertos. En español, «mis párpados» transmite la imagen natural con claridad, mientras que las alternativas literales conservan el símil pero resultan menos idiomáticas.
- source_word: נִפְעַמְתִּי
  english_pob_choice: I am troubled
  chosen_spanish: estoy turbado
  alternatives_spanish:
  - estoy agitado
  - estoy perturbado
  - estoy dismayed
  lexicon: HALOT
  rationale: El niphal comunica agitación interior, desconcierto o sobresalto. «Estoy turbado» es una forma digna y natural en español que conserva esa tensión sin fijar demasiado el matiz emocional.
- source_word: וְלֹא אֲדַבֵּר
  english_pob_choice: and cannot speak
  chosen_spanish: y no puedo hablar
  alternatives_spanish:
  - y no hablo
  - y no hablaré
  - y no puedo decir nada
  lexicon: HALOT
  rationale: El hebreo puede leerse formalmente como «y no hablo», pero en contexto expresa incapacidad producida por la angustia. «No puedo hablar» mantiene ese valor de imposibilidad con naturalidad en español.
theological_decisions:
- issue: Dirección implícita de la acción divina y preservación de la metáfora del salmo
  english_pob_reading: God has held the psalmist’s eyelids open; the speaker is overwhelmed and unable to speak.
  chosen_spanish_reading: Dios mantiene despiertos los ojos del salmista mediante la imagen de los párpados abiertos; el orante queda sobrecogido e incapaz de hablar.
  alternative_spanish_readings:
  - Has sujetado mis párpados
  - Has mantenido despierta mi mirada
  rationale: 'No hay una disputa doctrinal explícita, pero sí una tensión poética: conservar la imagen corporal sin convertirla en una explicación demasiado interpretativa. «Mis párpados» y «no puedo hablar» respetan la experiencia de aflicción que el verso presenta.'
  doctrine_reference: Poética bíblica / antropología bíblica
- issue: Alcance de נִפְעַמְתִּי como agitación interna
  english_pob_reading: I am troubled / I am agitated / I am disturbed.
  chosen_spanish_reading: estoy turbado
  alternative_spanish_readings:
  - estoy agitado
  - estoy perturbado
  rationale: La elección evita reducir el término a un solo estado psicológico. «Turbado» conserva amplitud semántica y encaja con el paralelismo con la imposibilidad de hablar.
  doctrine_reference: Antropología bíblica / lenguaje poético
translation_notes:
  revision_awareness: El texto inglés auditado traduce el modismo de manera más explícita como «my eyelids open» y marca una alternativa para נִפְעַמְתִּי. La versión española conserva el sentido idiomático con «mis párpados» y mantiene la misma amplitud semántica para el estado interno con «turbado». No se detectaron revisiones posteriores que alteren estas decisiones.
  spanish_consistency_notes:
  - Se usa español neutro y digno, evitando arcaísmos innecesarios.
  - Se preserva la metáfora corporal sin sobreexplicarla en el cuerpo principal.
  - Las notas mantienen la alternativa literal del hebreo para auditar la decisión de traducción.
