translation:
  language: es
  text: Y caerán los abatidos en la tierra de los caldeos[a], y los traspasados[b] en sus calles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en Caldea” o “en la tierra de los babilonios”. El hebreo dice literalmente “la tierra de los caldeos”.
    reason: lexical_alternative
  - marker: b
    text: O “en sus plazas” o “en sus lugares abiertos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָפְלוּ
  english_pob_choice: And ... will fall
  chosen_spanish: Y caerán
  alternatives_spanish:
  - Y caerán
  - Y van a caer
  lexicon: HALOT
  rationale: El perfecto profético hebreo con waw conjuntiva expresa un acontecimiento anunciado con valor futuro; en español, 'caerán' comunica naturalmente ese matiz sin forzar un pasado narrativo.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los asesinados
  - los muertos
  lexicon: HALOT
  rationale: '''חֲלָלִים'' designa a quienes han muerto violentamente o han caído en combate. ''Los muertos'' es comprensible y natural en español, pero pierde algo de la fuerza bélica; por eso se mantiene la nota textual/lexical para el término específico de ''caídos'' o ''muertos violentamente'' implícito en el hebreo. Se evita ''cadáveres'' por ser demasiado clínico.'
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  english_pob_choice: in the land of the Chaldeans
  chosen_spanish: en la tierra de los caldeos
  alternatives_spanish:
  - en la tierra de los caldeos
  - en Caldea
  - en la tierra de los babilonios
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a los caldeos; 'caldeos' preserva el etnónimo y la construcción 'tierra de'. 'Babilonios' sería una interpretación más explicativa, no la forma más directa del texto.
- source_word: וּמְדֻקָּרִים
  english_pob_choice: and the pierced
  chosen_spanish: y los traspasados
  alternatives_spanish:
  - y los traspasados
  - y los atravesados
  - y los heridos
  lexicon: HALOT
  rationale: El participio pasivo de דקר comunica personas atravesadas por arma. 'Traspasados' conserva la imagen violenta y el paralelismo con 'los muertos'; 'heridos' sería demasiado débil.
- source_word: בְּחוּצוֹתֶיהָ
  english_pob_choice: in her streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus calles
  - en sus plazas
  - en sus lugares abiertos
  lexicon: HALOT
  rationale: '''חוּצוֹת'' puede referirse a calles, plazas o espacios públicos abiertos. ''Calles'' es la opción más natural y clara en español; el posesivo femenino ''sus'' refleja la ciudad/tierra personificada del contexto.'
translation_notes:
  revision_awareness: El texto en inglés fue revisado sin cambios en el último pase; se mantiene la decisión léxica principal y se conservan las alternativas marginales ya auditadas para los términos geográficos y espaciales.
  spanish_consistency_notes:
  - Se mantiene 'caldeos' para כַּשְׂדִּים en coherencia con el etnónimo explícito del hebreo y con la política POB de no sustituirlo por 'babilonios' sin base textual directa.
  - '''Traspasados'' preserva mejor la violencia del participio pasivo que ''heridos''.'
  - La personificación femenina implícita en 'su(s)' se conserva en español mediante el posesivo femenino singular de la fuente hebrea.
