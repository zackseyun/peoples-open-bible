translation:
  language: es
  text: Los peces del mar, las aves de los cielos, las bestias del campo, toda criatura que se arrastra sobre la tierra y todo ser humano[a] que está sobre la faz de la tierra temblarán en mi presencia; los montes serán derribados, los lugares escarpados caerán, y todo muro caerá a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad» o «toda persona». El hebreo usa אָדָם de manera colectiva para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעֲשׁוּ
  english_pob_choice: will quake
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - tremblarán
  lexicon: HALOT
  rationale: El verbo expresa un estremecimiento violento causado por la intervención divina. En español, «temblarán» comunica con naturalidad tanto el sacudimiento físico como el temor reverente sin forzar una repetición poco idiomática.
- source_word: מִפָּנַי
  english_pob_choice: at my presence
  chosen_spanish: en mi presencia
  alternatives_spanish:
  - ante mí
  - delante de mí
  lexicon: HALOT
  rationale: La expresión hebrea alude a la presencia de Yahvé como causa del pavor y del temblor. «En mi presencia» conserva esa fuerza causal y suena natural en español bíblico contemporáneo.
- source_word: דְּגֵי הַיָּם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - los peces del mar
  - los peces del océano
  lexicon: HALOT
  rationale: Se mantiene la relación de pertenencia del constructo hebreo sin rigidizar el giro como calco. «Del mar» es la equivalencia más natural y fiel en español.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: «Cielos» refleja el plural hebreo שָׁמַיִם y conserva el registro elevado del texto. «Aves» es más natural y abarcador en español que «pájaros» en este contexto solemne.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - los animales salvajes del campo
  lexicon: HALOT
  rationale: «Bestias del campo» preserva la cadencia bíblica y el sentido de fauna terrestre del hebreo. No se añadió «salvajes» porque el texto fuente no lo especifica.
- source_word: כָּל הָרֶמֶשׂ הָרֹמֵשׂ עַל הָאֲדָמָה
  english_pob_choice: every creeping thing that creeps on the ground
  chosen_spanish: todo animal que se arrastra sobre la tierra
  alternatives_spanish:
  - toda criatura que se arrastra sobre la tierra
  - todo ser que se arrastra sobre la tierra
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva con repetición de la raíz. En español, «animal que se arrastra» transmite la idea de manera clara y respetuosa del original, evitando una literalidad torpe como «toda cosa rastrera».
- source_word: כֹל הָאָדָם
  english_pob_choice: every human being
  chosen_spanish: todo ser humano
  alternatives_spanish:
  - toda la humanidad
  - toda persona
  lexicon: HALOT
  rationale: אָדָם aquí funciona colectivamente para la humanidad. «Todo ser humano» conserva el valor inclusivo que la revisión inglesa destacó y evita una lectura genérica masculina que no es necesaria en español.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La expresión es un hebraísmo asentado; «faz de la tierra» lo reproduce con dignidad literaria y mantiene la imagen espacial de la superficie habitada.
- source_word: וְנֶהֶרְסוּ הֶהָרִים
  english_pob_choice: the mountains will be thrown down
  chosen_spanish: los montes serán derribados
  alternatives_spanish:
  - los montes serán destruidos
  - los montes caerán
  lexicon: HALOT
  rationale: El nifal de הרס expresa derribo o demolición. «Serán derribados» preserva la violencia del colapso sin introducir una imagen distinta como «arrojados».
- source_word: הַמַּדְרֵגוֹת
  english_pob_choice: the steep places
  chosen_spanish: los lugares escarpados
  alternatives_spanish:
  - las alturas escarpadas
  - los despeñaderos
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «steep places» para no sobreespecificar. «Lugares escarpados» comunica la topografía abrupta de forma amplia y fiel, evitando interpretar el término como terrazas u otro accidente concreto.
- source_word: כָל חוֹמָה לָאָרֶץ תִּפּוֹל
  english_pob_choice: every wall will fall to the ground
  chosen_spanish: todo muro caerá a tierra
  alternatives_spanish:
  - todo muro caerá al suelo
  - todo muro se derrumbará
  lexicon: HALOT
  rationale: La frase hebrea expresa caída total. «Caerá a tierra» reproduce bien el giro y mantiene el tono bíblico; «muro» es preferible aquí a «pared» por el peso arquitectónico y militar del término.
theological_decisions:
- issue: Alcance colectivo de אָדָם
  english_pob_reading: every human being
  chosen_spanish_reading: todo ser humano
  alternative_spanish_readings:
  - toda la humanidad
  - toda persona
  rationale: El hebreo usa אָדָם de manera colectiva para la humanidad. La lectura elegida conserva esa amplitud sin introducir una formulación masculina exclusiva, y armoniza con la revisión inglesa más reciente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
- issue: Registro cósmico y antropológico de la lista
  english_pob_reading: the fish... the birds... the beasts... every creeping thing... and every human being
  chosen_spanish_reading: los peces... las aves... las bestias... todo animal que se arrastra... y todo ser humano
  alternative_spanish_readings:
  - los peces... las aves... los animales... toda criatura que se arrastra... y toda persona
  rationale: La secuencia incluye fauna acuática, aérea, terrestre y humana. Se mantuvo la amplitud de la lista y su carácter totalizador, sin suavizar la progresión ni convertirla en una mera hipérbole estilística.
  doctrine_reference: Ezequiel 38:20; source_payload WLC
- issue: מדרגות como accidente geográfico
  english_pob_reading: the steep places
  chosen_spanish_reading: los lugares escarpados
  alternative_spanish_readings:
  - los despeñaderos
  - las pendientes escarpadas
  rationale: El término hebreo es raro y puede referirse a alturas o pendientes abruptas. La traducción elegida evita fijar una estructura específica y preserva la decisión auditada de no sobreinterpretar el sustantivo.
  doctrine_reference: HALOT; applied revision 2026-04-23T10:38:28Z
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al traducir כֹל הָאָדָם como una referencia inclusiva a la humanidad, y refleja la preferencia revisada por una expresión no sobreespecificada para הַמַּדְרֵגוֹת. También conserva el ritmo enumerativo y el cierre catastrófico del versículo sin introducir interpretaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el pasaje lo requiere implícitamente por la primera persona divina; aquí la cita va en primera persona, así que no se inserta el nombre.
  - Se prefirió «cielos» para reproducir el plural hebreo שָׁמַיִם en un registro bíblico natural.
  - Se mantuvo la distinción entre «tierra» y «tierra»/«suelo» según el contexto, evitando una sola palabra inglesa/española para todos los usos de אֲדָמָה.
  - No se usó «SEÑOR» ni terminología eclesial tradicional que ocultara la textura del hebreo.
