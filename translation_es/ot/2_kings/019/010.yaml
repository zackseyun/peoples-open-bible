base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/010.yaml
  text: 'Thus you shall say to Hezekiah king of Judah: ‘Do not let your God[a], in whom you trust, deceive you, saying, “Jerusalem will not be given into the hand of the king of Assyria.”’'
  footnotes:
