translation:
  language: es
  text: No endurezcan sus corazones[a][b][c][d], como en Meribá, como en el día en Masá en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribá significa 'contienda' o 'riña'.
    reason: lexical_alternative
  - marker: b
    text: Masá significa 'prueba'.
    reason: lexical_alternative
  - marker: c
    text: Véase Éxodo 17:7 y Números 20:13 para los episodios del desierto aludidos aquí.
    reason: cross_reference
  - marker: d
    text: 'O: ''como en el día de Masá''.'
    reason: previous_rendering
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No nunca
  - Nunca
  lexicon: HALOT
  rationale: La partícula negativa con valor de prohibición se expresa de forma natural en español con 'No' ante el imperativo exhortativo.
- source_word: תַּקְשׁוּ
  english_pob_choice: harden
  chosen_spanish: endurezcan
  alternatives_spanish:
  - hagan duro
  - sean duros
  - obstinen
  lexicon: HALOT
  rationale: El causativo de קשׁה pide un verbo que exprese hacer duro/endurecer; 'endurezcan' conserva bien la fuerza figurada sobre el corazón.
- source_word: לְבַבְכֶם
  english_pob_choice: your hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su corazón colectivo
  lexicon: HALOT
  rationale: Aunque el hebreo es plural poseído con un sustantivo colectivo singular, en español la forma singular colectiva 'su corazón' suena más natural y mantiene el sentido corporativo; la alternativa plural se nota en una nota para no borrar la tensión número/colectivo.
- source_word: כִּמְרִיבָה
  english_pob_choice: as at Meribah
  chosen_spanish: como en Meribá
  alternatives_spanish:
  - como en Meriba
  - como en la contienda
  - como en la riña
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalmente transliterado para mantener la alusión histórica a los episodios del desierto; la nota puede recordar su sentido léxico de contienda/riña.
- source_word: כְּיוֹם
  english_pob_choice: as on the day
  chosen_spanish: como en el día
  alternatives_spanish:
  - como el día de
  - como en aquel día
  lexicon: HALOT
  rationale: La comparación temporal se vierte de modo directo y natural en español con 'como en el día'.
- source_word: מַסָּה
  english_pob_choice: at Massah
  chosen_spanish: Masá
  alternatives_spanish:
  - Massá
  - prueba
  - tentación
  lexicon: HALOT
  rationale: Se mantiene el nombre propio para preservar la referencia intertextual al episodio del desierto; la grafía acentuada ayuda a la lectura en español. El sentido de 'prueba' se nota aparte sin reemplazar el nombre en el texto principal.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: '''Desierto'' es la forma más comprensible en español para el marco del éxodo; ''desierto'' mantiene el trasfondo bíblico sin perder inteligibilidad.'
theological_decisions:
- issue: ¿Nombrar Meribá y Masá como topónimos o traducir sus significados léxicos?
  english_pob_reading: 'Render both as place names: ''Meribah'' and ''Massah'''
  chosen_spanish_reading: Conservar los nombres propios Meribá y Masá en el texto principal
  alternative_spanish_readings:
  - como en la contienda
  - como en el día de la prueba en el desierto
  rationale: El verso alude a episodios concretos del desierto conocidos por esos nombres; mantenerlos preserva la red de alusiones a Éxodo 17:7 y Números 20:13. El significado léxico se puede anotar sin convertirlo en paráfrasis del texto.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tensión entre el singular colectivo 'corazón' y el plural del sufijo hebreo
  english_pob_reading: your hearts
  chosen_spanish_reading: su corazón
  alternative_spanish_readings:
  - sus corazones
  - su corazón (colectivo)
  rationale: El español bíblico y moderno suele preferir un singular colectivo para este tipo de admonición dirigida a la comunidad. Se reconoce la forma plural de fondo en la nota para no ocultar el dato hebreo.
  doctrine_reference: 'Hebreo bíblico: sustantivo colectivo con sufijo plural'
- issue: ¿Debe 'Masá' interpretarse como 'prueba' o conservarse como nombre propio?
  english_pob_reading: at Massah
  chosen_spanish_reading: Masá como nombre propio, con nota de sentido 'prueba'
  alternative_spanish_readings:
  - prueba
  - lugar de prueba
  rationale: La forma propia encaja con la alusión histórica y con el paralelo Meribá/Masá. Traducirlo en la línea principal debilitaría la referencia canónica y la memoria del episodio.
  doctrine_reference: Éxodo 17:7; Números 20:13
translation_notes:
  revision_awareness: La revisión reciente del audit trail favorece una forma más directa para el segundo miembro comparativo y confirma el plural de 'hearts' en inglés; en español se opta por un singular colectivo ('su corazón') por naturalidad, sin ocultar en notas la pluralidad hebrea subyacente. También se preservan los dos nombres propios del desierto como en la decisión inglesa establecida.
  spanish_consistency_notes:
  - Se usa Meribá y Masá como nombres propios, no como traducciones explicativas en el texto principal.
  - 'Se mantiene el imperativo negativo en forma breve y natural: ''No endurezcan''.'
  - Las notas cubren el sentido léxico de los topónimos y la alusión a Éxodo 17:7 / Números 20:13.
  - La puntuación y acentuación siguen normas del español actual; la mayúscula inicial de la primera palabra del versículo se conserva.
