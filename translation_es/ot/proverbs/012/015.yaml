translation:
  language: es
  text: El camino de un necio es correcto ante sus propios ojos[a][b], pero el que escucha consejo es sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El camino de un necio le parece correcto».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «ante sus propios ojos», un modismo para el propio juicio o la propia evaluación.'
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - conducta
  lexicon: HALOT
  rationale: En Proverbios, la imagen de “way” expresa el curso o modo de vida. “Camino” conserva bien la metáfora en español sin volverla abstracta en exceso.
- source_word: אֱוִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - tonto
  lexicon: HALOT
  rationale: En la literatura sapiencial, el término describe una necedad moral y práctica, no solo falta de inteligencia. “Necio” reproduce mejor ese registro que “tonto”.
- source_word: יָשָׁר
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - correcto
  - derecho
  lexicon: HALOT
  rationale: 'Aquí el sentido es evaluativo: el necio considera su camino aprobado. “Recto” mantiene la idea de algo que le parece derecho o correcto a él, sin afirmar rectitud objetiva.'
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: a sus propios ojos
  alternatives_spanish:
  - en sus propios ojos
  - según su propio juicio
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la propia evaluación o autopercepción. “A sus propios ojos” preserva la imagen corporal y el valor idiomático del original.
- source_word: וְשֹׁמֵעַ
  english_pob_choice: but he who listens
  chosen_spanish: pero el que escucha
  alternatives_spanish:
  - y el que oye
  - mas el que atiende
  lexicon: HALOT
  rationale: El participio funciona como sujeto genérico contrapuesto al primer hemistiquio. “Escucha” comunica bien la actitud de atención obediente implicada en el contexto sapiencial.
- source_word: לְעֵצָה
  english_pob_choice: to counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo prudente
  - consejo sabio
  lexicon: HALOT
  rationale: “Consejo” es la equivalencia natural y de registro sapiencial para עֵצָה. Evita estrechar el sentido a “consejo” meramente casual o coloquial.
- source_word: חָכָם
  english_pob_choice: is wise
  chosen_spanish: es sabio
  alternatives_spanish:
  - es un sabio
  - muestra sabiduría
  lexicon: HALOT
  rationale: El predicado nominal en español suena natural como “es sabio”. Conserva el contraste con “necio” y la valoración sapiencial del texto.
theological_decisions:
- issue: Pronombre y sujeto genérico masculino singular en proverbio sapiencial
  english_pob_reading: 'Use masculine singular in English: ''his own eyes'' and ''he who listens'''
  chosen_spanish_reading: 'Mantener singular masculino genérico: “a sus propios ojos” y “el que escucha”'
  alternative_spanish_readings:
  - a sus propios ojos ... quien escucha es sabio
  - a sus propios ojos ... la persona que escucha es sabia
  rationale: El hebreo usa formas masculinas singulares genéricas. En español, conservar el singular masculino refleja con fidelidad el sujeto representativo del proverbio y mantiene el paralelismo con el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no requirió cambios; esta redacción sigue esa línea sin introducir modificaciones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial con “necio”, “camino”, “consejo” y “sabio”.
  - Se preservó el modismo hebreo de “a sus propios ojos” mediante una formulación idiomática en español.
  - No se introdujeron términos eclesiásticos tradicionales que desplacen el sentido lexical del hebreo.
  - La antítesis del proverbio se marcó con “pero”, coherente con el contraste del original.
