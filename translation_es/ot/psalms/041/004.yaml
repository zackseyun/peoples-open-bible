translation:
  language: es
  text: Yahvé lo sostendrá en su lecho de enfermo[a]; en su enfermedad, tú restaurarás todo su lecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''tú das vuelta a todo su lecho en su enfermedad''. El verbo hebreo significa literalmente ''volver/voltear'', pero aquí probablemente alude de manera idiomática al cuidado o a la restauración del enfermo en su lecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Tetragrammaton
  rationale: Se conserva el nombre divino personal como transliteración directa del Tetragrama, de acuerdo con la práctica base del proyecto, en lugar de sustituirlo por un título.
- source_word: יִסְעָדֶנּוּ
  english_pob_choice: will sustain him
  chosen_spanish: lo sostendrá
  alternatives_spanish:
  - lo sustentará
  - lo apoyará
  - lo mantendrá
  lexicon: HALOT
  rationale: סעד expresa sostener o dar apoyo a alguien en debilidad. En español, 'sostendrá' comunica ese sostén con naturalidad y sin perder el matiz de soporte.
- source_word: עֶרֶשׂ דְּוָי
  english_pob_choice: his sickbed
  chosen_spanish: su lecho de enfermedad
  alternatives_spanish:
  - su lecho de dolencia
  - su cama de enfermedad
  - su lecho enfermo
  lexicon: HALOT
  rationale: Se evita una simplificación excesiva y se conserva la imagen de un lecho asociado a la aflicción o enfermedad.
- source_word: כָּל
  english_pob_choice: whole
  chosen_spanish: todo
  alternatives_spanish:
  - entero
  - completo
  lexicon: HALOT
  rationale: Aquí כָּל intensifica la totalidad del lecho; 'todo' mantiene ese valor totalizador en español.
- source_word: מִשְׁכָּבוֹ
  english_pob_choice: his bed
  chosen_spanish: su lecho
  alternatives_spanish:
  - su cama
  - su lugar de descanso
  lexicon: HALOT
  rationale: מִשְׁכָּב designa el lugar donde uno yace; 'lecho' conserva mejor el paralelo poético con 'lecho de enfermedad'.
- source_word: הָפַכְתָּ
  english_pob_choice: you restore
  chosen_spanish: restauras
  alternatives_spanish:
  - giras
  - vuelves
  - retienes
  lexicon: HALOT
  rationale: Aunque el verbo significa literalmente 'volver/voltear', el contexto idiomático de cuidado en la enfermedad favorece una idea de restauración o renovación del lecho/estado del enfermo. Se mantiene el eco interpretativo del POB inglés.
- source_word: בְחָלְיוֹ
  english_pob_choice: in his illness
  chosen_spanish: en su enfermedad
  alternatives_spanish:
  - en su dolencia
  - cuando está enfermo
  lexicon: HALOT
  rationale: La preposición con חלי indica la circunstancia de la acción; 'en su enfermedad' es claro, formal y fiel.
theological_decisions:
- issue: Cambio de persona en el versículo
  english_pob_reading: Retain the Hebrew shift from third person ('him') to second person address to God ('you restore').
  chosen_spanish_reading: 'Se conserva el cambio de tercera persona a segunda persona: ''lo sostendrá'' / ''tú restauras''.'
  alternative_spanish_readings:
  - 'uniformar todo en tercera persona: ''Yahvé lo sostendrá... él restaurará...'''
  - suavizar el giro a una formulación impersonal
  rationale: El hebreo pasa de hablar de Yahvé en tercera persona a dirigirse directamente a él; mantener ese giro preserva la dinámica poética y orante del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se ha respetado el auditorial inglés: se conserva el cambio de persona, el valor idiomático de הָפַךְ y la decisión de mantener el nombre divino como transliteración.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrama, en coherencia con el proyecto.
  - '''Lecho'' se mantiene para reflejar el paralelismo poético y evitar una alternancia innecesaria con ''cama''.'
  - La traducción mantiene un registro bíblico moderno y no sustituye el giro verbal hebreo por una paráfrasis más amplia de lo que el texto permite.
