base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/004/022.yaml
  text: For I have hoped in the Eternal One for your salvation[a], and joy has come to me from the Holy One because of the mercy that will soon come to you from your eternal Savior.
  footnotes:
  - marker: a
    text: Or 'because of the merciful act.' The Greek term can elsewhere mean 'almsgiving' or 'charitable deed,' but here the context favors God's mercy toward his people.
