revisions:
- from: Pero fue arrancada en furor; fue arrojada a tierra[a]. Y el viento del oriente secó su fruto; su rama fuerte[b] se quebró y se secó; fuego la consumió.
  to: Pero fue arrancada en furor; fue arrojada a tierra[a]. Y el viento del oriente secó su fruto; su rama fuerte[b] se quebró y se secó; fuego lo consumió.
  rationale: Se cambió 'la consumió' por 'lo consumió' para reflejar mejor el objeto masculino singular del hebreo, referido a 'mַטֵּה' ('rama/vara/cetro'). Se mantuvo la imagen principal de 'rama fuerte' con la nota sobre el matiz real. También se simplificó la nota [a] para dejarla como alternativa de traducción, en línea con el rastro del POB inglés.
