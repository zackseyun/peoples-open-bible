translation:
  language: es
  text: Entonces Elías tomó su manto[a], lo enrolló y golpeó el agua; y esta se dividió aquí y allá[b], de modo que los dos cruzaron en seco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su capa". El hebreo se refiere a la prenda exterior de Elías.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "fueron divididas aquí y allá", es decir, hacia lados opuestos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדַּרְתּוֹ
  english_pob_choice: his cloak
  chosen_spanish: su manto
  alternatives_spanish:
  - su capa
  - su capa exterior
  lexicon: HALOT
  rationale: אַדֶּרֶת designa un vestido exterior distintivo, un manto o capa. En español, 'manto' conserva el matiz de prenda exterior amplia y sigue siendo natural y bíblicamente reconocible, sin forzar un tecnicismo.
- source_word: וַיִּגְלֹם
  english_pob_choice: rolled it up
  chosen_spanish: lo enrolló
  alternatives_spanish:
  - lo envolvió
  - lo dobló
  lexicon: HALOT
  rationale: El verbo expresa reunir la prenda para usarla como instrumento. 'Lo enrolló' comunica de manera directa y física esa acción, manteniendo la imagen del texto hebreo.
- source_word: וַיַּכֶּה אֶת־הַמַּיִם
  english_pob_choice: struck the water
  chosen_spanish: golpeó el agua
  alternatives_spanish:
  - hirió el agua
  - pegó al agua
  lexicon: HALOT
  rationale: נכה normalmente significa 'golpear' o 'herir'. 'Golpeó el agua' preserva la fuerza verbal sin añadir explicación interpretativa.
- source_word: וַיֵּחָצוּ
  english_pob_choice: it was divided
  chosen_spanish: se dividió
  alternatives_spanish:
  - fue dividida
  - se separó
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, el referente implícito es el agua. 'Se dividió' suena natural en español y conserva el resultado pasivo del evento.
- source_word: הֵנָּה וָהֵנָּה
  english_pob_choice: here and there
  chosen_spanish: aquí y allá
  alternatives_spanish:
  - de un lado y del otro
  - de una parte y de la otra
  lexicon: HALOT
  rationale: La expresión indica división hacia lados opuestos. 'Aquí y allá' sigue de cerca el hebreo y reproduce bien la distribución espacial sin sobreexplicar.
- source_word: וַיַּעַבְרוּ שְׁנֵיהֶם
  english_pob_choice: the two of them crossed over
  chosen_spanish: los dos cruzaron
  alternatives_spanish:
  - ambos cruzaron
  - los dos pasaron
  lexicon: HALOT
  rationale: שְׁנֵיהֶם enfatiza el dual. 'Los dos cruzaron' mantiene esa precisión de forma natural en español.
- source_word: בֶּחָרָבָה
  english_pob_choice: on dry ground
  chosen_spanish: en seco
  alternatives_spanish:
  - sobre tierra seca
  - en tierra seca
  lexicon: HALOT
  rationale: En contextos de cruce milagroso, חָרָבָה describe terreno seco expuesto. 'En seco' es breve, idiomático y fiel al sentido narrativo; conserva la idea de que cruzaron sin agua.
- source_word: וַיִּקַּח
  english_pob_choice: Then Elijah took
  chosen_spanish: Entonces Elías tomó
  alternatives_spanish:
  - Y Elías tomó
  - Luego Elías tomó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. 'Entonces' expresa secuencia en español moderno con claridad y naturalidad.
theological_decisions:
- issue: Descripción del milagro de la división del agua
  english_pob_reading: Render the event straightforwardly as a historical narrative miracle without naturalizing or embellishing it.
  chosen_spanish_reading: Presentar el hecho como narración milagrosa directa, sin domesticarlo ni añadir comentario explicativo.
  alternative_spanish_readings:
  - El agua se abrió
  - las aguas se apartaron
  rationale: El hebreo describe a Elías golpeando el agua y al agua dividiéndose para el paso de ambos. La traducción mantiene la tensión milagrosa del texto sin sustituirla por una formulación más interpretativa.
  doctrine_reference: Primacía del texto original y preservación del carácter milagroso del relato.
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del inglés POB que prefirió una equivalencia más directa de הֵנָּה וָהֵנָּה como 'here and there'. En español se reflejó con 'aquí y allá', manteniendo la correspondencia cercana al hebreo y una lectura fluida.
  spanish_consistency_notes:
  - Se mantiene 'Elías' para el nombre propio bíblico.
  - '''Manto'' se usa como equivalente estable para la prenda exterior, coherente con el valor lexical de אַדֶּרֶת.'
  - '''En seco'' conserva la imagen de tránsito sobre terreno sin agua y evita expandir innecesariamente ''dry ground''.'
  - 'Se preserva el orden narrativo del hebreo con conectores sencillos: ''Entonces... y...; y...'''
