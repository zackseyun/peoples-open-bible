translation:
  language: es
  text: Todas las cosas son agotadoras[a]; un hombre no puede hablar de ellas[b]. El ojo no se sacia de ver, ni el oído se llena de oír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todas las palabras son agotadoras»; hebreo דְּבָרִים puede significar «palabras», «asuntos» o «cosas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un hombre no puede hablar»; el hebreo puede significar que ninguna persona puede expresar plenamente el asunto, o que el tema es demasiado agotador para describirlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַדְּבָרִים
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todos los asuntos
  - Todas las palabras
  - Todo
  lexicon: HALOT
  rationale: דְּבָרִים puede significar 'palabras', 'asuntos' o 'cosas'. En este contexto, con el alcance universal de la observación, 'todas las cosas' conserva la amplitud del hebreo y reproduce bien la decisión auditada del inglés POB.
- source_word: יְגֵעִים
  english_pob_choice: are wearisome
  chosen_spanish: son fatigantes
  alternatives_spanish:
  - son wearisome
  - agotan
  - son cansinas
  lexicon: HALOT
  rationale: El adjetivo expresa aquello que causa cansancio o fatiga. 'Fatigantes' suena natural en español y mantiene la idea de que estas cosas producen agotamiento, sin suavizar el peso del término.
- source_word: לֹא יוּכַ֥ל אִ֖ישׁ לְ/דַבֵּ֑ר
  english_pob_choice: a man cannot speak of them
  chosen_spanish: un hombre no puede hablar de ellas
  alternatives_spanish:
  - nadie puede hablar de ellas
  - un hombre no puede expresarlas
  - un hombre no puede hablar de esto
  lexicon: HALOT
  rationale: אִישׁ se conserva como 'un hombre' por la política de mantener el singular masculino del hebreo cuando el texto lo usa. El POB inglés añadió sentido referencial plural ('them') en la revisión; en español se refleja con 'de ellas' para concordar con 'todas las cosas' y evitar perder el referente plural.
- source_word: עַיִן
  english_pob_choice: The eye
  chosen_spanish: El ojo
  alternatives_spanish:
  - El ojo humano
  - La vista
  lexicon: HALOT
  rationale: El singular funciona de manera genérica. 'El ojo' es la correspondencia más directa y mantiene la imagen corporal concreta del hebreo.
- source_word: לֹא תִשְׂבַּ֥ע ... לִ/רְא֔וֹת
  english_pob_choice: is not satisfied with seeing
  chosen_spanish: no se sacia de ver
  alternatives_spanish:
  - no queda satisfecha con ver
  - no se harta de ver
  - no se satisface con ver
  lexicon: HALOT
  rationale: שׂבע implica saciedad o satisfacción plena. 'No se sacia de ver' conserva la metáfora de insaciabilidad y resulta idiomática en español, con buena correspondencia semántica con el POB inglés.
- source_word: אֹ֖זֶן
  english_pob_choice: the ear
  chosen_spanish: el oído
  alternatives_spanish:
  - el oído humano
  - la oreja
  lexicon: HALOT
  rationale: Aunque 'oído' no es la traducción más literal de אֹזֶן, en español bíblico moderno expresa mejor la facultad de escuchar que 'oreja', y mantiene la genericidad del hebreo con dignidad estilística.
- source_word: וְ/לֹא תִמָּלֵ֥א ... מִ/שְּׁמֹֽעַ
  english_pob_choice: nor is the ear filled with hearing
  chosen_spanish: ni el oído se llena de oír
  alternatives_spanish:
  - ni el oído se satisface con oír
  - ni el oído queda lleno de escuchar
  - ni el oído se colma de oír
  lexicon: HALOT
  rationale: El niphal de מלא significa 'llenarse'. 'Se llena de oír' conserva el contraste con 'se sacia' y reproduce la metáfora física del hebreo sin volverla explicativa en exceso. 'Oír' mantiene el sustantivo verbal breve y natural en español.
theological_decisions:
- issue: 'Alcance de דְּבָרִים: ''cosas'' frente a ''palabras'''
  english_pob_reading: All things are wearisome; ... Or 'All words are wearisome'
  chosen_spanish_reading: Todas las cosas son fatigantes; ...
  alternative_spanish_readings:
  - Todas las palabras son fatigantes
  - Todos los asuntos son fatigantes
  rationale: El POB documenta la tensión léxica entre 'things' y 'words'. En este versículo, el flujo del contexto favorece un alcance general de la experiencia humana más que el acto de hablar en sí; por eso se mantiene 'cosas', dejando visible la alternativa sin imponerla en el texto principal.
  doctrine_reference: Sabiduría bíblica / alcance semántico de דָּבָר
- issue: Referencia de 'hablar de ellas'
  english_pob_reading: a man cannot speak of them
  chosen_spanish_reading: un hombre no puede hablar de ellas
  alternative_spanish_readings:
  - un hombre no puede hablar de esto
  - un hombre no puede expresarlas plenamente
  - nadie puede hablar de ellas
  rationale: La revisión inglesa cambió 'it' por 'them' para concordar con el plural de 'all things'. El español debe reflejar ese plural para no convertir el dicho en un objeto singular. 'Hablar de ellas' mantiene el sentido de imposibilidad de agotar el tema mediante el habla.
  doctrine_reference: Observación sapiencial sobre límites del lenguaje humano
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB: el referente de ''a man cannot speak of them'' se entiende como plural (''ellas''), no singular. También conserva la tensión léxica entre דְּבָרִים como ''cosas'' o ''palabras'' mediante nota, sin borrar la opción documentada.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o sustitutos reverenciales porque este versículo no contiene el nombre divino.
  - Se mantiene 'un hombre' para respetar el singular del hebreo y el criterio auditado del POB.
  - '''Oído'' se usa como facultad auditiva genérica; no se traduce ''oreja'' por ser menos natural en español bíblico moderno.'
  - La duplicación paralela 'no se sacia / no se llena' conserva la estructura hebrea de insaciabilidad visual y auditiva.
