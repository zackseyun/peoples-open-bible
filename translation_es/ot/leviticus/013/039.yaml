translation:
  language: es
  text: y el sacerdote examina, y he aquí, en la piel de su carne[a] hay manchas blancuzcas opacas; es una erupción que ha brotado en la piel; está limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «manchas blanquecinas opacas» o «mancha pecosa». El término hebreo designa una afección cutánea no contaminante, distinta de la enfermedad más grave tratada en este capítulo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: examines
  chosen_spanish: examina
  alternatives_spanish:
  - ve
  - inspecciona
  lexicon: HALOT
  rationale: En un contexto sacerdotal de diagnóstico ritual, ראה expresa una inspección evaluativa más que una mera percepción visual. 'Examina' conserva ese valor procedimental en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el priest
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente natural en español para הַכֹּהֵן en Levítico, y mantiene la referencia al funcionario que realiza la evaluación.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: '''Y he aquí'' conserva la fuerza deíctica y de descubrimiento del hebreo, con registro bíblico claro pero todavía inteligible.'
- source_word: בְעוֹר בשרם
  english_pob_choice: on the skin of their flesh
  chosen_spanish: en la piel de su carne
  alternatives_spanish:
  - sobre la piel de su carne
  - en la piel de su cuerpo
  lexicon: HALOT
  rationale: Se mantiene de cerca la imagen hebrea 'piel de su carne'. 'Su' reproduce el sufijo plural, y 'en' evita sobrecargar el español con una calca demasiado rígida.
- source_word: בֶּהָרֹת
  english_pob_choice: spots
  chosen_spanish: manchas
  alternatives_spanish:
  - puntos
  - placas
  - spots
  lexicon: HALOT
  rationale: En español médico general y bíblico, 'manchas' comunica bien la apariencia visible sin introducir una precisión dermatológica que el hebreo no exige aquí.
- source_word: כֵּהוֹת לְבָנֹת
  english_pob_choice: dull white
  chosen_spanish: blancuzcas opacas
  alternatives_spanish:
  - blancas apagadas
  - pálidas blancas
  - blancuzcas
  lexicon: HALOT
  rationale: 'La combinación hebrea une un matiz de blancura con una cualidad atenuada. ''Blancuzcas opacas'' intenta preservar ambos componentes: blancura no intensa y aspecto apagado.'
- source_word: בֹּהַק
  english_pob_choice: an eruption / a harmless rash / freckled spot
  chosen_spanish: una erupción
  alternatives_spanish:
  - una erupción benigna
  - una mancha moteada
  - una erupción cutánea
  lexicon: HALOT
  rationale: La revisión inglesa se inclinó por 'an eruption' como opción más literal. En español, 'erupción' conserva la literalidad sin añadir la interpretación explicativa de benignidad que el contexto no nombra explícitamente.
- source_word: פָּרַח
  english_pob_choice: has broken out
  chosen_spanish: ha brotado
  alternatives_spanish:
  - ha estallado
  - ha aparecido
  - ha brotado y se ha extendido
  lexicon: HALOT
  rationale: '''Brotar'' reproduce bien la metáfora de algo que sale o se despliega sobre la piel, de modo cercano al valor de פרח en descripciones cutáneas.'
- source_word: טָהוֹר הוּא
  english_pob_choice: he is clean
  chosen_spanish: es limpio
  alternatives_spanish:
  - es puro
  - está limpio
  - es ritualmente limpio
  lexicon: HALOT
  rationale: Se conserva la categoría cultual con 'limpio', en línea con la decisión de POB de mantener 'clean' como veredicto ritual/legal y no moral o médico. 'Es' transmite el estado declarado por el sacerdote.
theological_decisions:
- issue: Veredicto ritual de pureza
  english_pob_reading: Render טָהוֹר as 'clean' in ritual/legal sense, not as a statement of moral purity or medical cure.
  chosen_spanish_reading: Traducir טָהוֹר como 'limpio' en sentido ritual/legal, no como afirmación de pureza moral ni de curación médica.
  alternative_spanish_readings:
  - puro
  - ceremoniamente limpio
  - sanado
  rationale: En Levítico 13 el juicio sacerdotal determina estado cultual. 'Limpio' mantiene la categoría sin desplazarla a moralidad o salud clínica, y evita suavizar la sentencia ritual.
  doctrine_reference: Translation philosophy §6; preservar el sentido del texto fuente sin importar categorías doctrinales ajenas.
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó בֹהַק de una interpretación explicativa ('harmless rash') a la forma más literal 'an eruption'. La redacción española sigue esa revisión y evita añadir 'benigna' o 'inofensiva'. También se preservó la puntuación que separa el diagnóstico visible, la identificación de בֹהַק y el veredicto final de limpieza ritual.
  spanish_consistency_notes:
  - Se mantuvo 'sacerdote' para הַכֹּהֵן en línea con el uso consagrado en Levítico.
  - Se prefirió 'limpio' para טָהוֹר como término cultual breve y consistente con la tradición POB de 'clean'.
  - '''Y he aquí'' conserva la fórmula de descubrimiento sin sustituirla por un español más interpretativo.'
  - La nota al pie recoge las alternativas léxicas relevantes sin introducir una interpretación médica cerrada.
