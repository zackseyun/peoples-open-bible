lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Bendito
  - Que sea bendito
  - Alabado sea
  lexicon: HALOT
  rationale: El hebreo es una fórmula benedictoria/exclamativa. En español, '¡Bendito sea!' conserva el valor de deseo o proclamación litúrgica sin volverlo meramente descriptivo. 'Alabado sea' desplaza el matiz hacia alabanza explícita, y 'Bendito' suena incompleto en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. ''Jehová'' es una forma tradicional no preferida aquí, y ''Yahweh'' no es la forma normal del español bíblico objetivo.'
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para la eternidad
  - eternamente
  lexicon: HALOT
  rationale: La frase hebrea expresa duración continua. 'Para siempre' es natural en español bíblico moderno y conserva la fuerza temporal sin archaismo.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se mantiene la transliteración litúrgica tradicional 'Amén', que en español es estable y transparente en el contexto de cierre doxológico.
- source_word: וְאָמֵן
  english_pob_choice: and amen
  chosen_spanish: y amén
  alternatives_spanish:
  - sí, amén
  - y así sea
  lexicon: HALOT
  rationale: La conjunción añade repetición enfática. 'Y amén' preserva esa duplicación solemne sin explicitar un sentido que el hebreo deja en forma de eco litúrgico.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, no un título genérico. 'Yahvé' conserva el nombre propio revelado y evita la sustitución por 'Señor', manteniendo la decisión doctrinal del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas; la versión española conserva esa lectura estable, adaptando únicamente la formulación para que suene natural y reverente en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la repetición final 'Amén y amén' como eco litúrgico del hebreo.
  - La puntuación exclamativa en el inicio ayuda a reflejar el tono benedictorio sin añadir contenido.
  - No se introduce parafrasis explicativa; el cierre sigue siendo breve y formular.
  - El pie de nota conserva la alternativa de lectura centrada en el nombre divino, como en el audit trail inglés.
