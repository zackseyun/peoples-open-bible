translation:
  language: es
  text: hasta que Yahvé dé descanso a sus hermanos como a ustedes[a], y ellos también tomen posesión de la tierra que Yahvé, su Dios, les da más allá del Jordán[b]. Entonces cada uno de ustedes podrá volver a su posesión[c], que yo les he dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus compatriotas israelitas». El hebreo dice literalmente «a sus hermanos», usando un término de parentesco masculino para los miembros del pueblo de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «al otro lado del Jordán». La expresión es relativa al lugar del hablante, al este del río.
    reason: lexical_alternative
  - marker: c
    text: O «a su heredad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָנִ֨יחַ
  english_pob_choice: gives rest
  chosen_spanish: dé descanso
  alternatives_spanish:
  - les dé reposo
  - les haga descansar
  lexicon: HALOT
  rationale: El hifil de נוח expresa causar reposo o descanso. «Dé descanso» comunica bien la idea de estabilidad y alivio en español sin perder el matiz de concesión divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la norma del proyecto. «Yahvé» corresponde al Tetragrámaton y evita sustituirlo por un título.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: to your brothers
  chosen_spanish: a vuestros hermanos
  alternatives_spanish:
  - a vuestros hermanos y hermanas
  - a vuestros compatriotas israelitas
  lexicon: HALOT
  rationale: אָח en plural funciona aquí como término masculino representativo para los miembros de Israel. «Hermanos» mantiene la forma del hebreo y la referencia colectiva.
- source_word: כָּכֶם
  english_pob_choice: as to you
  chosen_spanish: como a vosotros
  alternatives_spanish:
  - como a ustedes
  - igual que a vosotros
  lexicon: HALOT
  rationale: La comparación es elíptica; «como a vosotros» conserva la relación de paralelismo entre el descanso concedido a los destinatarios y el que se concederá a sus hermanos.
- source_word: וְיָרְשׁוּ
  english_pob_choice: take possession of
  chosen_spanish: tomen posesión de
  alternatives_spanish:
  - hereden
  - posean
  lexicon: HALOT
  rationale: En contextos de reparto territorial, ירשׁ implica ocupar/poseer efectivamente la tierra. «Tomar posesión de» expresa esa acción concreta mejor que un simple «heredar».
- source_word: גַם הֵם
  english_pob_choice: they also
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - ellos asimismo
  lexicon: HALOT
  rationale: 'Se mantiene el énfasis inclusivo: los otros israelitas recibirán la tierra del mismo modo.'
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - está entregando
  lexicon: HALOT
  rationale: El participio presenta la acción como vigente y segura desde la perspectiva del hablante. En español, el presente simple («da») resulta natural y suficientemente aspectual.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: más allá del Jordán
  alternatives_spanish:
  - al otro lado del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión es relacional respecto al punto de vista de Moisés. «Más allá del Jordán» conserva el valor espacial sin forzar una explicación adicional.
- source_word: וְשַׁבְתֶּם
  english_pob_choice: Then each of you may return
  chosen_spanish: Entonces cada uno de vosotros podrá volver
  alternatives_spanish:
  - y volveréis
  - entonces regresaréis
  lexicon: HALOT
  rationale: 'El waw secuencial marca el paso lógico tras cumplirse la conquista. «Podrá volver» recoge la fuerza permisiva del contexto: el regreso se autoriza cuando la tarea termina.'
- source_word: אִישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno de vosotros
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: Aunque literalmente significa «hombre», aquí funciona distributivamente. La expresión española evita un masculinizante innecesario y reproduce el sentido individual dentro del grupo.
- source_word: לִירֻשָּׁתוֹ
  english_pob_choice: to his possession
  chosen_spanish: a su posesión
  alternatives_spanish:
  - a su heredad
  - a su herencia
  lexicon: HALOT
  rationale: El sustantivo combina la idea de heredad y propiedad asignada. «Posesión» es claro en español y conserva el carácter de lote territorial recibido.
- source_word: נָתַתִּי לָכֶם
  english_pob_choice: that I have given you
  chosen_spanish: que yo os he dado
  alternatives_spanish:
  - que yo os di
  - que os he dado
  lexicon: HALOT
  rationale: El perfecto hebreo señala una concesión ya realizada con vigencia presente. El pretérito perfecto compuesto en español mantiene esa relación temporal.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. La forma española del proyecto es «Yahvé», que conserva el nombre revelado sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor colectivo de «vuestros hermanos» y «cada uno de vosotros»
  english_pob_reading: Retain masculine representative forms while rendering the distributive expression idiomatically
  chosen_spanish_reading: Mantener «vuestros hermanos» y «cada uno de vosotros»
  alternative_spanish_readings:
  - vuestros hermanos y hermanas
  - cada hombre
  - cada cual
  rationale: El hebreo usa formas masculinas con referencia representativa al pueblo. La traducción conserva esa forma en «hermanos» y evita que el distributivo suene restrictivo en español con «cada uno de vosotros».
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide con la decisión auditada en inglés de preservar el nombre divino, el paralelismo del descanso concedido y el sentido distributivo de la cláusula final. No se registraron revisiones posteriores que alteraran el contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, de acuerdo con la terminología base del proyecto.
  - Se usa «tomar posesión de» para ירשׁ en contexto de reparto territorial, no «heredar» en el cuerpo principal.
  - El distributivo final se formula como «cada uno de vosotros», evitando un calco como «cada hombre» que sería menos natural en español.
  - «Más allá del Jordán» conserva la orientación espacial del original sin sobreexplicar el punto de vista.
  - Las notas al pie preservan alternativas lexicales reales y no añaden interpretaciones doctrinales ajenas al versículo.
