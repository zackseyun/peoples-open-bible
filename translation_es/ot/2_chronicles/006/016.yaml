translation:
  language: es
  text: 'Y ahora, Yahvé, Dios de Israel, guarda para tu siervo David, mi padre, lo que le has dicho, diciendo: «No te faltará[a] un hombre delante de mí que se siente sobre el trono de Israel, con tal que tus hijos guarden su camino, para andar en mi ley[b], como tú has andado delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No te faltará un hombre delante de mí». El hebreo dice, en sentido estricto, «un hombre ... no será cortado de ti».'
    reason: lexical_alternative
  - marker: b
    text: «Mi ley» también puede rendirse «mi instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, conforme al criterio del POB en español, en lugar de sustituirlo por una máscara litúrgica. 'Yahvé' es la forma española transparente y estándar del proyecto para YHWH.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - mantén
  - cumple
  - observa
  lexicon: HALOT
  rationale: El imperativo aquí pide conservar/guardar la promesa hablada. 'Guarda' mantiene el valor de custodia fiel sin reducirlo a mero 'cumplir'.
- source_word: לְעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En el lenguaje de oración real, 'siervo' comunica adecuadamente la relación subordinada ante Dios; 'esclavo' sería demasiado fuerte para el uso idiomático aquí en español, aunque el trasfondo de servidumbre se reconoce en la documentación.
- source_word: דָוִיד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  - mi padre, David
  lexicon: HALOT
  rationale: Se conserva la aposición natural en español y la identificación filial clave para la oración de Salomón.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  english_pob_choice: what you have spoken to him
  chosen_spanish: lo que le has hablado
  alternatives_spanish:
  - lo que le dijiste
  - lo que le prometiste
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hablar'; en español, 'lo que le has hablado' sigue de cerca esa forma y conserva la fuerza promissoria sin imponer explícitamente 'prometiste'.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  english_pob_choice: You shall not lack a man before me
  chosen_spanish: No faltará para ti un hombre delante de mí
  alternatives_spanish:
  - No te faltará un hombre delante de mí
  - No será cortado de ti un hombre
  lexicon: HALOT
  rationale: Se adopta una equivalencia óptima que integra el sentido idiomático de continuidad dinástica. 'No faltará' expresa la idea de manera natural en español, mientras 'delante de mí' conserva מִלְּפָנַי. Se documenta la alternativa más literal, pues el hebreo usa el valor de 'ser cortado'.
- source_word: יוֹשֵׁב עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: to sit on the throne of Israel
  chosen_spanish: que se siente sobre el trono de Israel
  alternatives_spanish:
  - sentado sobre el trono de Israel
  - para sentarse sobre el trono de Israel
  lexicon: HALOT
  rationale: El participio describe al heredero dinástico; 'que se siente' funciona con naturalidad en español y mantiene el sentido de reinar desde el trono.
- source_word: רַק אִם
  english_pob_choice: if only
  chosen_spanish: con tal que
  alternatives_spanish:
  - si solamente
  - solo si
  - si
  lexicon: HALOT
  rationale: La expresión introduce una condición fuerte y restrictiva. 'Con tal que' comunica bien esa fuerza condicional en español formal y claro.
- source_word: יִשְׁמְרוּ בָנֶיךָ אֶת דַּרְכָּם
  english_pob_choice: your sons keep their way
  chosen_spanish: tus hijos guarden su camino
  alternatives_spanish:
  - tus hijos vigilen su camino
  - tus hijos mantengan su conducta
  lexicon: HALOT
  rationale: Se mantiene el paralelo hebreo entre 'guardar' y 'camino', preservando el idioma de conducta fiel sin volverlo abstracto.
- source_word: בְּתוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  lexicon: HALOT
  rationale: Aquí תורה se orienta al marco normativo del pacto y de la sucesión davídica; 'ley' comunica bien esa fuerza en español bíblico contemporáneo. Se documenta la alternativa 'instrucción' por el rango semántico del término.
- source_word: כַּאֲשֶׁר הָלַכְתָּ לְפָנָי
  english_pob_choice: as you have walked before me
  chosen_spanish: como tú has andado delante de mí
  alternatives_spanish:
  - como has caminado delante de mí
  - tal como tú has andado en mi presencia
  lexicon: HALOT
  rationale: '''Andado'' preserva el modismo bíblico de conducta fiel; ''delante de mí'' conserva la imagen relacional/presencial del hebreo.'
theological_decisions:
- issue: Promesa davídica y formulación de continuidad dinástica
  english_pob_reading: Retain the idiom 'shall not be cut off from you' rather than replacing it with the smoother dynastic paraphrase.
  chosen_spanish_reading: No faltará para ti un hombre delante de mí
  alternative_spanish_readings:
  - No será cortado de ti un hombre
  - No te faltará un hombre
  rationale: Se preserva la tensión entre el valor literal de כרת ('ser cortado') y el sentido dinástico claro del contexto. En español, una forma más idiomática comunica el resultado sin borrar la base semántica, y se deja documentada la alternativa más literal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Sentido de תורה en un contexto de pacto y obediencia
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi enseñanza
  rationale: En este pasaje de fidelidad dinástica y obediencia, 'ley' expresa mejor el marco normativo y pactal. No se niega el rango de 'instrucción'; se documenta para mantener la transparencia lexical.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el cierre de revisión del POB en inglés: aunque la revisión prefería una formulación más natural para el idiomatismo de continuidad dinástica, esta versión española opta por una equivalencia óptima que conserva la imagen hebrea de ''ser cortado'' en nota y hace fluida la cláusula principal. También se incorporó la lectura revisada de דִּבַּרְתָּ como acción ya hablada/presentada a David, manteniendo el valor promissorio del contexto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, en concordancia con el estándar del proyecto.
  - Se mantiene el lenguaje de pacto y realeza ('siervo', 'trono', 'ley', 'delante de mí') sin sustituirlo por vocabulario eclesiástico posterior.
  - La condición con 'con tal que' conserva el matiz restrictivo de רַק אִם sin volverla excesivamente arcaica.
  - Se evita 'Cristo' porque el texto trata del linaje davídico y del trono de Israel, no de un título cristológico directo en esta unidad.
