review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: advertencia negativa, noticias recurrentes año tras año, violencia en la tierra y conflicto político. Sin embargo, pierde parte del rastro de notas del English POB: la nota [a] española está anclada a la partícula פן, mientras que en el audit trail inglés [a] va con שְׁמוּעָה y [b] con la expresión idiomática ''corazón... blando''. Además, ''después de él'' para אַחֲרָיו suena poco natural en español al referirse a ''informe''; ''después de eso'' o ''después'' refleja mejor el referente temporal. También conviene preferir ''noticia'' frente a ''informe'' para una lectura eclesial más natural, manteniendo en nota la alternativa ''rumor''/''informe''.'
  spanish_quality_summary: El texto es comprensible, pero mezcla registro tradicional peninsular ('vuestro', 'temáis') con la meta de español neutral latinoamericano. 'Se ablande vuestro corazón' es fiel pero algo rígido; 'no desmaye su corazón' o 'no se desaliente su corazón' sería más natural, aunque la imagen literal debe preservarse en nota. 'El informe oído en la tierra' suena administrativo; 'la noticia que se oye en la tierra' o 'la noticia oída en la tierra' lee mejor. El resto del verso fluye bien, y 'gobernante contra gobernante' es claro.
  glossary_alignment: 'No hay términos de glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas clave deben alinearse mejor con el audit trail: שְׁמוּעָה debe conservar la amplitud semántica mediante ''noticia'' con nota de alternativa; יֵרַךְ לְבַבְכֶם debe reflejar el modismo de perder ánimo, idealmente con nota literal; וּמֹשֵׁל עַל מֹשֵׁל puede mantenerse como ''gobernante contra gobernante'' con nota de alternativa ''sobre''.'
  issues:
  - severity: medium
    issue: Las notas al pie no preservan correctamente el audit trail inglés.
    rationale: El English POB marca una nota lexical para שְׁמוּעָה ('report/rumor/news'), otra para la literalidad de 'heart become soft', y otra para 'ruler over/against ruler'. El borrador solo incluye una nota y la aplica a פן, desviando el foco documentado.
  - severity: medium
    issue: '''Informe'' suena poco natural en español bíblico y eclesial.'
    rationale: Aunque semánticamente posible, 'informe' tiene un matiz burocrático. 'Noticia' mantiene amplitud y lectura natural; la alternativa 'rumor' puede ir en nota para reflejar la flexibilidad de שְׁמוּעָה.
  - severity: low
    issue: '''Después de él'' resulta torpe al referirse a ''informe''.'
    rationale: אַחֲרָיו apunta al elemento previo en la secuencia; en español, con un antecedente inanimado como 'noticia', 'después de eso' o simplemente 'después' evita una personificación innecesaria y mejora la fluidez.
  - severity: low
    issue: Registro pronominal no ideal para el objetivo de español neutral latinoamericano.
    rationale: '''Vuestro'' y ''temáis'' son entendibles, pero ''su corazón'' / ''tengan miedo'' encajan mejor con el estilo meta indicado por el proyecto.'
