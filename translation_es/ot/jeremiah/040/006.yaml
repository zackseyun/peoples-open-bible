revisions:
- from: Entonces Jeremías fue a Guedalías, hijo de Ajicam, en Mizpa[a], y habitó con él entre el pueblo que había quedado en la tierra.
  to: Entonces Jeremías fue a Guedalías, hijo de Ajicam, en Mizpa[a], y vivió con él entre el pueblo que quedó en la tierra.
  rationale: 'Se conserva el sentido del hebreo y la decisión teológica de evitar «remanente», pero se corrigen detalles editoriales y de estilo: «vivió» suena más natural que «habitó» para ישב en este contexto, «que quedó» mejora la fluidez, y la nota al pie se corrige ortográfica y estilísticamente sin perder la alternativa léxica preservada por la auditoría inglesa.'
