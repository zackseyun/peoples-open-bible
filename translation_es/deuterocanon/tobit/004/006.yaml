review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ποιοῦντός σου τὴν ἀλήθειαν → «si practicas la verdad»; εὐοδίαι ἔσονται ἐν τοῖς ἔργοις σου → «tus obras prosperarán»; πᾶσι τοῖς ποιοῦσι τὴν δικαιοσύνην → «todos los que practican…». Sin embargo, la elección principal «la justicia» para δικαιοσύνην no sigue la decisión auditada del POB inglés, que prefirió “righteousness” en este contexto sapiencial, preservando “justice” solo como alternativa. En español, «rectitud» o «justicia» son posibles, pero para alinearse con la racionalidad documentada y el contraste ético con «la verdad», conviene hacer principal una forma de rectitud ética y dejar «justicia» en nota.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Porque si practicas la verdad, tus obras prosperarán» suena bien y evita un calco torpe. La única mejora importante es terminológica: «todos los que practican la justicia» puede leerse más jurídicamente de lo que sugiere el contexto; «la rectitud» comunica mejor la cualidad ética habitual. También conviene simplificar la nota de [a], que actualmente explica de más y suena algo pesada.'
  glossary_alignment: 'Buen alineamiento en «verdad», «practicas» y «prosperarán». Desalineación parcial en δικαιοσύνη: el proyecto indica «justicia / rectitud» por contexto, y el expediente inglés decidió “righteousness” como principal en este pasaje. Por eso la forma española principal debería reflejar rectitud ética, con «justicia» como alternativa en nota.'
  issues:
  - severity: medium
    issue: La traducción principal de δικαιοσύνην como «justicia» no sigue la decisión contextual del POB inglés.
    rationale: El expediente auditado determina que en Tobit 4:6 el sentido primario es de rectitud ética más que de justicia en sentido jurídico/social. «Justicia» puede mantenerse como alternativa, pero no como forma principal.
  - severity: low
    issue: La nota [a] es innecesariamente explicativa y algo torpe en su redacción.
    rationale: El inglés no requiere nota para ἔργα, y si se conserva una nota lexical, debe ser breve y más idiomática en español.
  revised_spanish_text: Porque si practicas la verdad, tus obras[a] prosperarán, y también todos los que practican la rectitud[b].
  revised_footnotes:
