translation:
  language: es
  text: 'Los de Judea[a], el consejo de ancianos y Judas, a Aristóbulo, maestro del rey Ptolomeo, que también es de la familia de los sacerdotes ungidos, y a los judíos en Egipto: saludos y deseos de buena salud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judíos de Judea». El griego dice literalmente «los que están en Judea», sin repetir aquí el sustantivo «judíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: those in Judea
  chosen_spanish: los de Judea
  alternatives_spanish:
  - los que están en Judea
  - los judíos de Judea
  lexicon: LSJ
  rationale: La construcción griega es sustantiva y amplia. «Los de Judea» conserva esa amplitud sin añadir explícitamente «judíos», que en el griego aparece de forma clara solo para el segundo grupo receptor.
- source_word: γερουσία
  english_pob_choice: the council of elders
  chosen_spanish: el consejo de ancianos
  alternatives_spanish:
  - el senado
  - la gerusía
  - la asamblea de ancianos
  lexicon: LSJ
  rationale: Designa un cuerpo de ancianos. «Consejo de ancianos» comunica su sentido institucional de manera natural en español y evita el posible anacronismo o ambigüedad de «senado».
- source_word: διδασκάλῳ
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - doctor
  - instructor
  - maestro de
  lexicon: LSJ
  rationale: En el dativo, Aristóbulo aparece como maestro de Ptolomeo. «Maestro» es claro y natural en español; mantiene la relación de enseñanza sin sonar excesivamente escolar.
- source_word: ὄντι δὲ ἀπὸ τοῦ τῶν χριστῶν ἱερέων γένους
  english_pob_choice: who is also of the family of the anointed priests
  chosen_spanish: que también es de la familia de los sacerdotes ungidos
  alternatives_spanish:
  - que también pertenece a la familia de los sacerdotes consagrados
  - que es también de la estirpe de los sacerdotes ungidos
  lexicon: LSJ
  rationale: χριστῶν aquí conserva su valor léxico de «ungidos», no un título mesiánico. «Sacerdotes ungidos» reproduce ese sentido y deja visible la tensión lexical que el inglés POB también anotó. «Familia» traduce de modo natural γένους como linaje o estirpe.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - greeting
  - gozo
  lexicon: LSJ
  rationale: En fórmulas epistolares, χαίρειν funciona como saludo convencional. «Saludos» es el equivalente español más directo y natural.
- source_word: ὑγιαίνειν
  english_pob_choice: good health
  chosen_spanish: buena salud
  alternatives_spanish:
  - salud
  - estar bien
  lexicon: LSJ
  rationale: Como complemento epistolar de χαίρειν, expresa un deseo de bienestar. «Buena salud» conserva el matiz formulístico del griego.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Es un nombre propio de varón en contexto helenístico; «Judas» evita confundirlo con la tribu o el patriarca Judá.
theological_decisions:
- issue: Sentido de χριστῶν en τῶν χριστῶν ἱερέων
  english_pob_reading: anointed priests
  chosen_spanish_reading: sacerdotes ungidos
  alternative_spanish_readings:
  - sacerdotes consagrados
  rationale: Se mantiene el sentido léxico de χριστῶν como «ungidos», evitando cargar el término con un sentido cristológico ajeno al contexto. La formulación deja visible que se trata de sacerdotes marcados por unción.
  doctrine_reference: 'DOCTRINE.md: traducir según el sentido del término en contexto; evitar títulos posteriores cuando el griego usa valor léxico ordinario'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el rastro de auditoría en inglés. La principal decisión sensible fue conservar χριστῶν con su valor léxico de «ungidos», tal como lo explica la nota inglesa, sin convertirlo en referencia cristológica. También se respetó el carácter epistolar de χαίρειν καὶ ὑγιαίνειν como fórmula de saludo y bienestar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «Judas» como nombre propio y «sacerdotes ungidos» para preservar la tensión lexical documentada.
  - La puntuación reproduce una salutación epistolar fluida en español, con dos comas que separan destinatarios y una dos puntos antes de la fórmula final.
