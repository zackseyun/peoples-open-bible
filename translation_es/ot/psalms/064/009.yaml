  text: They are made to stumble[a]; their own tongue is against them[b]; all who see them shake their heads.
  footnotes:
  - marker: a
    text: Or, more formally, 'His/its tongue made him/it stumble upon them.' The Hebrew of the first clause is syntactically difficult, and translations differ on how the pronouns relate. The main text follows the sense that the wicked are undone by their own speech.
