    issue: Los pies de nota no corresponden a los puntos documentados en la auditoría inglesa.
    rationale: El pie [a] del inglés va con el título final («The LORD our righteousness»), no con «will be saved». El pie [b] del inglés va con «righteousness/justice», no con «dwell securely». Esto altera la trazabilidad del razonamiento léxico-teológico.
  - severity: medium
    issue: «es nuestra justicia» no refleja la preferencia principal de la POB inglesa para צִדְקֵנוּ.
    rationale: Aunque «justicia» es posible, la auditoría inglesa escogió «Is Our Righteousness» como lectura principal y relegó «justice» a alternativa. En español, «rectitud» preserva mejor ese valor principal que «justicia» sola.
  - severity: low
    issue: «Judá será salvado» es menos natural que «Judá será salvo».
    rationale: Ambas son comprensibles, pero «será salvo» es más idiomático y eclesialmente legible en español bíblico contemporáneo.
  revised_spanish_text: 'En sus días, Judá será salvo, e Israel habitará seguro; y este es el nombre por el cual será llamado: Yahvé es nuestra rectitud[a].[b]'
