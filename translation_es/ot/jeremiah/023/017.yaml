  text: אֹמְרִ֤ים אָמוֹר֙ לִֽ/מְנַאֲצַ֔/י דִּבֶּ֣ר יְהוָ֔ה שָׁל֖וֹם יִֽהְיֶ֣ה לָ/כֶ֑ם וְ֠/כֹל הֹלֵ֞ךְ בִּ/שְׁרִר֤וּת לִבּ/וֹ֙ אָֽמְר֔וּ לֹֽא תָב֥וֹא עֲלֵי/כֶ֖ם רָעָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/017.yaml
  text: 'They keep saying to those who despise me[a], ‘Yahweh has spoken: You will have peace’; and to everyone who walks in the stubbornness of his own heart they say[c][b], ‘No disaster will come upon you.’'
  footnotes:
  - marker: a
    text: Or 'to my despisers' or 'to those who spurn me.' The Hebrew has 'those who despise me.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' can also carry the sense of well-being or prosperity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'No evil will come upon you'; here 'evil' refers to calamity or disaster, not moral evil.
    reason: lexical_alternative
