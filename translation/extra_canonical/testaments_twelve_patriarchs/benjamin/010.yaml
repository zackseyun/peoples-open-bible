translation:
  text: '1[a]. Now when Joseph was in Egypt, I longed to see his appearance and the form of his face; and through the prayers of Jacob my father I saw him, while awake by day, exactly as his whole appearance was.


    2. And after saying these things he said to them, “Know then, my children, that I am dying. 3[b]. Therefore do truth, each one toward his neighbor, and keep the law of the Lord and his commandments. 4. For these things I leave you instead of every inheritance. And you also give them to your children as an everlasting possession; for thus Abraham and Isaac and Jacob did. 5. For they gave all these things to us as an inheritance, saying, ‘Keep the commandments of God until the time when you will see Enoch and Seth and Abraham and Isaac and Jacob risen up at his right hand in rejoicing.’


    6. Then we also will rise, each with our scepter, and we will worship the King of the heavens. 7. [the one who appeared on earth in the form of a man in humility; and all who believe in him on the earth will rejoice with him.]


    8. And all will rise, some to glory and some to dishonor; and the Lord will judge Israel first for their unrighteousness [because when God came to them in flesh, they did not believe him]. 9. And then he will judge all the nations [which did not believe him when he appeared on earth]. 10. And through the chosen ones from among the nations he will convict Israel, just as he convicted Esau through the Midianites, who deceived their brothers into becoming, through sexual immorality and idolatry, estranged from God, and so they became children in the portion of those who fear the Lord.


    11. You therefore, my children, if you walk in holiness in the commandments of the Lord, you will dwell again with confidence in me[d][c], and all Israel will be gathered to the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: The clauses in vv. 7-9 enclosed in brackets are widely regarded as later Christian expansion because of their explicit language about God appearing in flesh and belief in him on earth.
    reason: textual_variant
  - marker: 'b'
    text: Or 'practice truth' for 'do truth' (v. 3). The Greek idiom is concrete and ethical.
    reason: lexical_alternative
  - marker: 'c'
    text: '''With confidence'' in v. 11 renders a difficult phrase literally ''in hope.'''
    reason: lexical_alternative
  - marker: 'd'
    text: The phrase 'each over our scepter' (v. 6) is textually difficult; it may evoke restored dignity or tribal rule in the resurrection.
    reason: cultural_note
lexical_decisions:
- source_word: εἰδέα / μόρφωσις / ὄψις
  chosen: appearance / form / face
  alternatives:
  - likeness / shape / countenance
  - appearance / image / visage
  lexicon: LSJ
  rationale: The Greek piles up near-synonyms to stress Benjamin’s vivid longing to behold Joseph. I preserved the rhetorical accumulation with distinct but related English terms rather than collapsing them into a single word.
- source_word: ἐν ἡμέρᾳ γρηγορῶν
  chosen: while awake by day
  alternatives:
  - in daytime while awake
  - in a waking vision by day
  lexicon: LSJ
  rationale: The phrase contrasts waking sight with dream or sleep. 'While awake by day' keeps the experiential force without over-interpreting it as a technical 'vision' formula.
- source_word: ποιήσατε ... ἀλήθειαν
  chosen: do truth
  alternatives:
  - practice truth
  - act truthfully
  lexicon: LSJ
  rationale: The idiom is slightly unusual in English, but it preserves the ethical concreteness of the Greek better than the flatter 'be truthful.' It suits testamentary exhortation.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow
  - brother
  lexicon: LSJ
  rationale: '''Neighbor'' preserves the moral and covenantal register familiar from biblical exhortation, while remaining broad enough for social ethics.'
- source_word: νόμος ... ἐντολαί
  chosen: law ... commandments
  alternatives:
  - instruction ... commands
  lexicon: LSJ
  rationale: These are standard covenantal terms and should remain stable and recognizable rather than being modernized away.
- source_word: ἀντὶ πάσης κληρονομίας
  chosen: instead of every inheritance
  alternatives:
  - in place of all inheritance
  - as your whole inheritance
  lexicon: LSJ
  rationale: Benjamin presents ethical instruction as the true legacy he leaves. 'Instead of every inheritance' keeps the contrastive force of ἀντί.
- source_word: κατάσχεσιν αἰώνιον
  chosen: everlasting possession
  alternatives:
  - perpetual holding
  - eternal inheritance
  lexicon: LSJ
  rationale: The phrase denotes something held fast across generations. 'Everlasting possession' is idiomatic and preserves the testamentary sense.
- source_word: ἀνασταμένους ἐκ δεξιῶν αὐτοῦ
  chosen: risen up at his right hand
  alternatives:
  - standing at his right hand
  - raised at his right side
  lexicon: LSJ
  rationale: The participle is tied to resurrection hope in context. 'At his right hand' preserves the honorific placement without specifying more than the Greek does.
- source_word: ἐν ἀγαλλιάσει
  chosen: in rejoicing
  alternatives:
  - with exultation
  - in gladness
  lexicon: LSJ
  rationale: This keeps the elevated tone and links the patriarchs’ resurrection with celebratory joy.
- source_word: ἐπὶ σκήπτρον ἡμῶν
  chosen: over our scepter
  alternatives:
  - upon our scepter
  - with our scepter
  lexicon: LSJ
  rationale: The phrase is textually difficult. I retained a relatively literal rendering to avoid falsely resolving the image; it likely conveys royal or tribal dignity in resurrection.
- source_word: βασιλέα τῶν οὐρανῶν
  chosen: King of the heavens
  alternatives:
  - heavenly King
  - King of heaven
  lexicon: LSJ
  rationale: The plural 'heavens' reflects the Greek and preserves the elevated apocalyptic register.
- source_word: ἀτιμία
  chosen: dishonor
  alternatives:
  - shame
  - disgrace
  lexicon: LSJ
  rationale: In the resurrection-judgment contrast, 'dishonor' pairs well with 'glory' and keeps the formal antithesis.
- source_word: ἀδικία
  chosen: unrighteousness
  alternatives:
  - wrongdoing
  - injustice
  lexicon: LSJ
  rationale: This term carries moral and covenantal weight beyond a single act. 'Unrighteousness' best preserves that theological register here.
- source_word: ἐλέγξει
  chosen: will convict
  alternatives:
  - will expose
  - will reprove
  lexicon: LSJ
  rationale: The verb implies exposing guilt, not merely criticizing. 'Will convict' fits the judicial context of divine judgment.
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  lexicon: LSJ
  rationale: This is the project’s accessible default for the broad sexual-sin term, avoiding archaic diction while preserving moral seriousness.
- source_word: ἀπηλλοτριώθησαν Θεοῦ
  chosen: estranged from God
  alternatives:
  - alienated from God
  - made foreign to God
  lexicon: LSJ
  rationale: The passive conveys separation from covenant relationship. 'Estranged from God' is clear and weighty.
- source_word: ἐν ἁγιασμῷ
  chosen: in holiness
  alternatives:
  - in sanctification
  - in consecration
  lexicon: LSJ
  rationale: The exhortation is ethical and covenantal. 'In holiness' is natural English and preserves the moral-religious sense.
- source_word: ἐπʼ ἐλπίδι
  chosen: with confidence
  alternatives:
  - in hope
  - securely
  lexicon: LSJ
  rationale: The phrase is difficult in context ('you will dwell again ... in me'). 'With confidence' captures the hopeful security implied, while the note preserves the more literal alternative.
- source_word: συναχθήσεται πρὸς Κύριον
  chosen: will be gathered to the Lord
  alternatives:
  - will be assembled to the Lord
  - will be brought together to the Lord
  lexicon: LSJ
  rationale: This preserves the eschatological gathering motif and the covenantal direction toward the Lord.
