translation:
  language: es
  text: 'Entonces se apartó hacia ella, junto al camino, y dijo[a]: «Por favor, déjame llegarme a ti», pues no sabía que ella era su nuera. Y ella dijo: «¿Qué me darás[b], para que te llegues a mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «venir a / entrar a ti / a mí», expresión eufemística para relaciones sexuales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Qué me pagarás, para que te llegues a mí?» El hebreo dice más literalmente: «¿Qué me darás...?».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se volvió aparte
  lexicon: HALOT
  rationale: El verbo expresa que se desvía de su rumbo para acercarse a ella. «Se apartó» comunica bien el cambio de dirección sin sonar forzado en español.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: hacia ella
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El hebreo marca movimiento dirigido a Tamar; «hacia ella» conserva el matiz de aproximación dentro del contexto narrativo.
- source_word: אֶל־הַדֶּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al camino
  - por el camino
  lexicon: HALOT
  rationale: En la escena ella está sentada al borde de la ruta. «Junto al camino» suena natural en español y refleja la ubicación sin volverla demasiado literal.
- source_word: הָבָה נָּא
  english_pob_choice: Please, let me
  chosen_spanish: Por favor, déjame
  alternatives_spanish:
  - Vamos, déjame
  - Por favor
  lexicon: HALOT
  rationale: La combinación funciona como ruego o instancia. «Por favor, déjame» conserva el tono de súplica con español contemporáneo y digno.
- source_word: אָבוֹא אֵלַיִךְ
  english_pob_choice: come in to you
  chosen_spanish: entrar a ti
  alternatives_spanish:
  - meterme contigo
  - venir a ti
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo para relaciones sexuales. En español, «entrar a ti» preserva mejor ese eufemismo que una paráfrasis explícita, aunque suena más directo que el inglés.
- source_word: כִּי לֹא יָדַע
  english_pob_choice: for he did not know
  chosen_spanish: pues no sabía
  alternatives_spanish:
  - porque no sabía
  - ya que no sabía
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación de la acción de Judá. «Pues» expresa esa relación causal-explicativa de forma natural.
- source_word: כִּי כַלָּתוֹ הִוא
  english_pob_choice: that she was his daughter-in-law
  chosen_spanish: que ella era su nuera
  alternatives_spanish:
  - que era su hija política
  - que era su nuera
  lexicon: HALOT
  rationale: «Nuera» es el término preciso para כַלָּה en este contexto familiar. «Ella era» mantiene la referencia del hebreo con claridad.
- source_word: מַה תִּתֶּן לִּי
  english_pob_choice: What will you give me
  chosen_spanish: ¿Qué me darás?
  alternatives_spanish:
  - ¿Qué pagarás por mí?
  - ¿Qué me entregarás?
  lexicon: HALOT
  rationale: El hebreo dice literalmente «¿qué me darás?». Se conserva esa formulación, sin trasladar de entrada el sentido de pago que solo se infiere por el contexto.
- source_word: כִּי תָבוֹא אֵלַי
  english_pob_choice: that you may come in to me
  chosen_spanish: para que entres a mí
  alternatives_spanish:
  - para venir a mí
  - para que vengas a mí
  lexicon: HALOT
  rationale: Se preserva el eufemismo sexual del hebreo. «Para que entres a mí» mantiene la estructura final y la insinuación del original.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la línea auditada del inglés POB en el uso del eufemismo sexual y de la cláusula explicativa. Se ajustó el español para naturalidad: «junto al camino», «pues», y «para que entres a mí», manteniendo el mismo alcance semántico y sin introducir una paráfrasis más explícita que la fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «nuera» para כַלָּה, en continuidad con el valor kinship preciso del texto.
  - Se conservó el eufemismo sexual en el texto principal y en la nota, sin reemplazarlo por una expresión explícita.
