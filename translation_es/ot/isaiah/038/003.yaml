translation:
  language: es
  text: 'Y dijo: «Por favor, Yahvé, recuerda cómo he andado delante de ti en fidelidad[a] y con un corazón íntegro[b], y he hecho lo que es bueno ante tus ojos». Y Ezequías lloró con gran llanto[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en verdad». El término hebreo puede denotar verdad, fiabilidad o fidelidad.
    reason: lexical_alternative
  - marker: b
    text: O «con un corazón indiviso» o «con un corazón perfecto».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «lloró con gran llanto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del tetragrámaton, conforme a la terminología base del proyecto, evitando la sustitución por un título.
- source_word: אָנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Ah
  lexicon: HALOT
  rationale: Es una partícula de súplica en la oración; «Por favor» comunica la petición con naturalidad actual sin perder el tono implorante.
- source_word: זְכָר נָא
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - por favor, recuerda
  - haz memoria de
  lexicon: HALOT
  rationale: El imperativo con partícula de ruego queda bien en español con «recuerda», y la súplica ya queda expresada por «Por favor».
- source_word: הִתְהַלַּכְתִּי לְפָנֶיךָ
  english_pob_choice: I have walked before you
  chosen_spanish: he andado delante de ti
  alternatives_spanish:
  - he caminado delante de ti
  - he vivido delante de ti
  - me he conducido delante de ti
  lexicon: HALOT
  rationale: Se conserva la imagen bíblica de caminar/andar delante de Dios, que es una expresión de conducta relacional y de pacto, sin volverla demasiado abstracta.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - verdaderamente
  - con lealtad
  lexicon: HALOT
  rationale: En este contexto la idea no es solo veracidad factual, sino lealtad y constancia ante Dios; «fidelidad» conserva mejor ese valor covenantal.
- source_word: וּבְלֵב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con un corazón íntegro
  alternatives_spanish:
  - con un corazón entero
  - con un corazón perfecto
  - con un corazón indiviso
  lexicon: HALOT
  rationale: «Íntegro» expresa la idea de completitud, sinceridad y no duplicidad, sin sugerir perfección moral absoluta.
- source_word: וְהַטּוֹב בְּעֵינֶיךָ עָשִׂיתִי
  english_pob_choice: have done what is good in your eyes
  chosen_spanish: he hecho lo bueno ante tus ojos
  alternatives_spanish:
  - he hecho lo que es bueno a tus ojos
  - he hecho lo que te agrada
  lexicon: HALOT
  rationale: Se mantiene el giro evaluativo «ante tus ojos» y se traduce con naturalidad el valor de lo aprobado por Dios.
- source_word: וַיֵּבְךְּ ... בְּכִי גָדול
  english_pob_choice: wept greatly
  chosen_spanish: lloró con gran llanto
  alternatives_spanish:
  - lloró mucho
  - lloró con gran lloro
  - lloró grandemente
  lexicon: HALOT
  rationale: El hebreo usa un acusativo cognado intensivo; «con gran llanto» refleja de forma bastante literal y publicable la intensidad del llanto.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: HALOT
  rationale: Nombre propio bíblico según la forma castellana ampliamente reconocible y estándar.
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Y dijo» preserva la simpleza del hebreo narrativo.
theological_decisions:
- issue: La autodescripción de Ezequías puede sonar como afirmación de sinlessness si se traduce demasiado fuerte
  english_pob_reading: with a whole heart
  chosen_spanish_reading: con un corazón íntegro
  alternative_spanish_readings:
  - con un corazón perfecto
  - con un corazón indiviso
  rationale: Se conserva la sinceridad y totalidad de la devoción sin implicar perfección moral absoluta. La petición de Ezequías es apelativa y covenantal, no una doctrina de impecabilidad.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor de אֱמֶת en el contexto de conducta delante de Dios
  english_pob_reading: in faithfulness
  chosen_spanish_reading: en fidelidad
  alternative_spanish_readings:
  - en verdad
  - con verdad
  - con lealtad
  rationale: En una oración de recuerdo ante Dios, el matiz es de constancia leal; «fidelidad» preserva mejor la tensión entre verdad y confiabilidad que un mero «verdad».
  doctrine_reference: HALOT semántica de אֱמֶת
- issue: Intensidad del llanto final
  english_pob_reading: wept greatly
  chosen_spanish_reading: lloró con gran llanto
  alternative_spanish_readings:
  - lloró mucho
  - lloró amargamente
  rationale: Se evita introducir la idea de amargura, que no está explícita, y se refleja la intensidad mediante una construcción cercana al hebreo.
  doctrine_reference: Revisión POB 2026-04-23
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «wept greatly» frente a «wept bitterly» para reflejar más de cerca el hebreo de «gran llanto». La versión española sigue esa decisión y evita añadir matiz de amargura que el texto no exige.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה, de acuerdo con la convención del proyecto.
  - Se mantiene la imagen verbal de andar delante de Dios, no una paráfrasis abstracta.
  - «Fidelidad» traduce el valor relacional de אֱמֶת en este contexto.
  - «Corazón íntegro» comunica la totalidad de la devoción sin sugerir impecabilidad.
  - La frase final conserva la intensidad del hebreo con una construcción de llanto abundante.
