    text: 'O: «desde su madriguera».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a menos que haya atrapado». El objeto queda implícito por el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la segunda pregunta para reflejar mejor el hebreo y la auditoría inglesa: «león joven» para כְּפִיר, «alza ... su voz» para יִתֵּן קוֹלוֹ, y «haya atrapado algo» para expresar en español el objeto implícito de לָכָד. También se corrige la nota [a] para que sea una alternativa real y la [b] para preservar la literalidad documentada.'
