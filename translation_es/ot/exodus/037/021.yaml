translation:
  language: es
  text: y un botón[a] debajo de dos ramas de ella, y un botón debajo de dos ramas de ella, y un botón debajo de dos ramas de ella, para las seis ramas que salen de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nudo» para el hebreo כפתר, refiriéndose a un adorno redondeado del candelabro.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַפְתֹּר
  english_pob_choice: bulb
  chosen_spanish: capullo
  alternatives_spanish:
  - nudo
  - botón
  - bulbo
  lexicon: HALOT
  rationale: En este contexto del candelabro, el término nombra un adorno redondeado. «Capullo» conserva la idea de una forma pequeña y abultada sin sonar técnico en exceso; «nudo» o «botón» podrían sugerir mejor la forma, pero son menos transparentes. «Bulbo» sería más literal respecto al inglés POB, aunque en español puede sonar más botánico o especializado.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La relación espacial es directa. «Debajo de» es natural en español y mantiene la ubicación inferior del adorno respecto de las ramas.
- source_word: שְׁנֵי הַקָּנִים
  english_pob_choice: two branches
  chosen_spanish: dos ramas
  alternatives_spanish:
  - dos brazos
  - dos tallos
  lexicon: HALOT
  rationale: En la descripción del candelabro, קנים se refiere a los brazos que se desprenden del eje central. «Ramas» preserva la imagen orgánica del conjunto y es claro para el lector español.
- source_word: מִמֶּנָּה
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - del candelabro
  lexicon: HALOT
  rationale: El pronombre hebreo retoma el candelabro. Aunque gramaticalmente «menorá/candelabro» puede requerir femenino o masculino según el sustantivo español elegido, aquí se opta por «de él» para mantener la referencia al objeto mencionado en español sin sobreexplicarlo.
- source_word: לְשֵׁשֶׁת הַקָּנִים
  english_pob_choice: for the six branches
  chosen_spanish: para las seis ramas
  alternatives_spanish:
  - para las seis ramas laterales
  - correspondientes a las seis ramas
  lexicon: HALOT
  rationale: La frase resume la distribución de los tres adornos a lo largo de las seis ramas totales. «Para» reproduce la función distributiva/resultativa del hebreo en este contexto.
- source_word: הַיֹּצְאִים מִמֶּנָּה
  english_pob_choice: coming out from it
  chosen_spanish: que salen de él
  alternatives_spanish:
  - que brotan de él
  - que se extienden de él
  lexicon: HALOT
  rationale: El participio describe ramas que se proyectan desde el cuerpo central. «Salen de él» es idiomático en español y conserva el movimiento de procedencia sin introducir una imagen distinta.
translation_notes:
  revision_awareness: 'Se sigue el texto hebreo masorético con la misma estructura repetitiva de tres miembros y la clausula final sobre las seis ramas. La principal decisión revisada es lexical: se evita traducir mecánicamente el término ornamental con un tecnicismo rígido y se opta por una forma española más natural, manteniendo la nota alternativa donde el audit trail inglés preservó la ambigüedad léxica.'
  spanish_consistency_notes:
  - Se mantiene «ramas» para קנים en toda la línea para conservar consistencia terminológica.
  - Se conserva la repetición tripartita del hebreo sin condensarla.
  - El pronombre final se mantiene referencialmente neutro en la secuencia española, sin añadir el sustantivo «candelabro» para no sobrecargar el verso.
