id: HOS.10.1
reference: Hosea 10:1
source:
  edition: WLC
  text: גֶּ֤פֶן בּוֹקֵק֙ יִשְׂרָאֵ֔ל פְּרִ֖י יְשַׁוֶּה לּ֑/וֹ כְּ/רֹ֣ב לְ/פִרְי֗/וֹ הִרְבָּה֙ לַֽ/מִּזְבְּח֔וֹת כְּ/ט֣וֹב לְ/אַרְצ֔/וֹ הֵיטִ֖יבוּ מַצֵּבֽוֹת־׃
translation:
  text: Israel is a luxuriant vine that yields fruit for himself[a]. The more his fruit increased, the more he multiplied altars; the better his land became[c][b], the better they made the sacred pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Israel is an emptying vine' or 'a spreading vine.' The Hebrew adjective is difficult; the main text follows the sense favored by the context of abundant fruit and prosperous land.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he brings forth fruit for himself.' The Hebrew may carry a reflexive or self-serving nuance.
    reason: lexical_alternative
  - marker: c
    text: Or, 'standing stones' or 'cult pillars.' These were stone monuments used in worship, here in a condemned idolatrous setting.
    reason: cultural_note
lexical_decisions:
- source_word: גֶּפֶן
  chosen: vine
  alternatives:
  - grapevine
  lexicon: HALOT
  rationale: Basic noun for a vine/grapevine. 'Vine' is natural English and preserves the metaphor.
- source_word: בּוֹקֵק
  chosen: luxuriant
  alternatives:
  - emptying
  - empty
  - spreading
  - luxuriant/leafy
  lexicon: HALOT
  rationale: Though the root can mean 'empty out,' in this context with vine imagery and parallel fruitfulness language, the sense is of a vigorously spreading or luxuriant vine rather than a literally 'empty' one. This best fits the immediate clause about yielding fruit while preserving the ironic setup of prosperity leading to idolatry.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration.
- source_word: פְּרִי יְשַׁוֶּה לּוֹ
  chosen: that yields its fruit
  alternatives:
  - he brings forth fruit for himself
  - it sets fruit for itself
  - he produces fruit for himself
  lexicon: HALOT
  rationale: The verb שוה here is difficult; in context it refers to producing or yielding fruit. The pronominal suffix may be reflexive/advantageous ('for himself'), but English reads more naturally with the vine metaphor carried through as 'yields its fruit.' The selfish nuance is preserved more clearly in the following clauses about misuse of prosperity.
- source_word: כְּרֹב לְפִרְיוֹ
  chosen: The more his fruit increased
  alternatives:
  - According to the abundance of his fruit
  - As his fruit increased
  lexicon: HALOT
  rationale: 'Comparative-correlative construction expressing proportion: as fruit increased, so did idolatrous response. ''The more... increased'' captures the Hebrew idiom in readable English.'
- source_word: הִרְבָּה לַמִּזְבְּחוֹת
  chosen: the more he multiplied altars
  alternatives:
  - he increased altars
  - he made many altars
  lexicon: HALOT
  rationale: Hiphil of רבה means 'make many/increase.' 'Multiplied altars' is idiomatic and preserves the causative sense.
- source_word: כְּטוֹב לְאַרְצוֹ
  chosen: the better his land became
  alternatives:
  - according to the goodness of his land
  - as his land prospered
  - the better it was for his land
  lexicon: HALOT
  rationale: Another proportional clause. The phrase refers to the improving/prosperous condition of the land, not moral goodness. 'The better his land became' communicates agricultural prosperity.
- source_word: הֵיטִיבוּ
  chosen: they made better
  alternatives:
  - they improved
  - they made beautiful
  lexicon: HALOT
  rationale: Hiphil of יטב means 'make good/improve.' Here it refers to enhancing or adorning cultic objects.
- source_word: מַצֵּבוֹת
  chosen: sacred pillars
  alternatives:
  - pillars
  - standing stones
  - cult pillars
  lexicon: HALOT
  rationale: These are cultic standing stones associated with illicit worship. 'Sacred pillars' makes the religious function explicit for modern readers without over-paraphrasing.
