translation:
  language: es
  text: Engañoso es el encanto, y la belleza[a] es pasajera; pero la mujer[b] que teme a Yahvé será alabada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la belleza es vapor»; la imagen hebrea puede destacar tanto la transitoriedad como la vaciedad.
    reason: lexical_alternative
  - marker: b
    text: O «esposa»; el hebreo אִשָּׁה puede significar «mujer» o «esposa» según el contexto.
    reason: alternative_reading
  - marker: c
    text: O «se alabará a sí misma» si se toma de manera reflexiva, aunque el contexto favorece claramente «será alabada».
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁקֶר
  english_pob_choice: deceitful
  chosen_spanish: engañosa
  alternatives_spanish:
  - falsa
  - mentirosa
  - deceitosa
  lexicon: HALOT
  rationale: El hebreo expresa falsedad/engaño como cualidad del rasgo mencionado. En español, "engañosa" reproduce bien el valor predicativo sobre "gracia" sin sonar forzado, y conserva la evaluación negativa del proverbio.
- source_word: הַחֵן
  english_pob_choice: charm
  chosen_spanish: gracia
  alternatives_spanish:
  - encanto
  - favor
  - hermosura
  - atractivo
  lexicon: HALOT
  rationale: Aquí no se trata de la gracia teológica ni de favor social, sino del atractivo o donaire externo. "Gracia" es una opción natural en español bíblico y mantiene la ambigüedad de atractivo agradable, aunque en el contexto se refiere al aspecto exterior.
- source_word: הֶבֶל
  english_pob_choice: fleeting
  chosen_spanish: vana
  alternatives_spanish:
  - fugaz
  - como vapor
  - vacía
  - transitoria
  lexicon: HALOT
  rationale: El hebreo evoca vapor, soplo y transitoriedad, con posible matiz de vaciedad. En español, "vana" conserva la idea de algo sin permanencia y permite una construcción breve y proverbial; además deja abierta la tensión entre transitoriedad y vaciedad.
- source_word: הַיֹּפִי
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - buen parecer
  - belleza física
  lexicon: HALOT
  rationale: El sustantivo denota belleza/atractivo. "Hermosura" suena natural en español literario y encaja bien con la cadencia del proverbio, sin perder el sentido físico del término.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  - la esposa
  - mujer
  lexicon: HALOT
  rationale: El contexto sapiencial presenta un tipo de mujer en general, no necesariamente una esposa. En español, el artículo definido puede funcionar genéricamente en un proverbio, pero se mantiene la nota de que el hebreo puede leerse también como "esposa".
- source_word: יִרְאַת יְהוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: que teme a Yahvé
  alternatives_spanish:
  - que reverencia a Yahvé
  - con el temor de Yahvé
  - temerosa de Yahvé
  lexicon: HALOT
  rationale: La construcción expresa la cualidad distintiva de la mujer. "Teme a Yahvé" conserva el lenguaje bíblico del temor reverente y el valor de pacto del original. Se usa "Yahvé" según el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: "Yahvé". Esto preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: se
  alternatives_spanish:
  - ella
  - esa
  lexicon: HALOT
  rationale: El pronombre hebreo es enfático, pero en español una repetición explícita como "ella" en el final puede sonar pesada. Se integra el valor enfático mediante la estructura del verbo en pasiva perifrástica de español, manteniendo la focalización final sin sobrecargar el ritmo.
- source_word: תִתְהַלָּל
  english_pob_choice: shall be praised
  chosen_spanish: será alabada
  alternatives_spanish:
  - será elogiada
  - se alabará
  - se alabará a sí misma
  lexicon: HALOT
  rationale: El hitpael admite lectura reflexiva o pasiva-like. En el contexto de contraste con lo engañoso y lo vano, el sentido mejor sustentado es que esta mujer es objeto de alabanza. "Será alabada" preserva ese valor sin resolver de forma innecesaria la tensión reflexiva potencial.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. Traducirlo como "Yahvé" conserva el referente de pacto y la consistencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de אִשָּׁה
  english_pob_reading: a woman
  chosen_spanish_reading: la mujer
  alternative_spanish_readings:
  - una mujer
  - la esposa
  rationale: El hebreo puede significar "mujer" o "esposa". Dado que el proverbio formula una máxima de sabiduría general, la lectura más amplia es preferible; sin embargo, se preserva la nota de ambigüedad porque el contexto no la elimina por completo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Valor de תִתְהַלָּל
  english_pob_reading: shall be praised
  chosen_spanish_reading: será alabada
  alternative_spanish_readings:
  - se alabará a sí misma
  - se gloriará
  rationale: Aunque el hitpael puede ser reflexivo, el contexto del proverbio y la alabanza final de la mujer virtuosa favorecen la lectura pasiva de encomio. Se mantiene la tensión textual en la nota, pero la línea principal sigue la lectura más probable.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La formulación sigue de cerca el texto hebreo y la lectura auditada en inglés, pero adapta la sintaxis al español natural. Se conservan las tensiones documentadas: la posible fuerza de ''hebel'' como vaciedad/transitoriedad, la ambigüedad de אִשָּׁה entre ''mujer'' y ''esposa'', y la posible lectura reflexiva de תִתְהַלָּל. Se mantiene ''Yahvé'' para el nombre divino según el estándar del proyecto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se prefiere 'alabada' para el cierre, evitando resolver de antemano la discusión reflexiva del hitpael.
  - '''Gracia'' aquí se entiende como atractivo exterior, no como gracia salvífica.'
  - El paralelismo se conserva con dos predicaciones breves antes del contraste final.
