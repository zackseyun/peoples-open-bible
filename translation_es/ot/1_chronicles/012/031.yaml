translation:
  language: es
  text: Y de los hijos de Efraín, veinte mil ochocientos hombres valientes y poderosos, hombres de renombre[a], según sus casas paternas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hombres distinguidos»; literalmente, «hombres de nombres», un modismo para hombres notables o conocidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  lexicon: HALOT
  rationale: Conserva el enlace coordinante del listado tribal y expresa naturalmente la secuencia en español sin perder la relación con el versículo anterior.
- source_word: בְּנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los hombres de Efraín
  - los descendientes de Efraín
  lexicon: HALOT
  rationale: '''Hijos de'' preserva de manera fiel la forma idiomática hebrea y su sabor genealógico/tribal en este contexto de enumeración.'
- source_word: עֶשְׂרִים אֶלֶף וּשְׁמוֹנֶה מֵאוֹת
  english_pob_choice: twenty thousand eight hundred
  chosen_spanish: veinte mil ochocientos
  alternatives_spanish:
  - '20.800'
  lexicon: HALOT
  rationale: Se mantiene el número exacto en español estándar, con claridad y sin alterar la cifra.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - guerreros valientes
  - hombres de valor
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula militar de fortaleza y capacidad. 'Hombres valientes' comunica bien esa fuerza en español sin endurecer innecesariamente la frase.
- source_word: אַנְשֵׁי שֵׁמוֹת
  english_pob_choice: men of renown
  chosen_spanish: hombres de renombre
  alternatives_spanish:
  - hombres famosos
  - hombres distinguidos
  - hombres conocidos
  lexicon: HALOT
  rationale: '''Hombres de renombre'' conserva el sentido idiomático de personas conocidas por nombre y su tono honorífico, equivalente al inglés auditado.'
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - por sus casas paternas
  - según sus casas familiares
  - según sus linajes paternos
  lexicon: HALOT
  rationale: '''Casas paternas'' reproduce la estructura social/clánica del hebreo. ''Según'' mantiene la idea de clasificación o pertenencia dentro del censo tribal.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] directamente en el texto principal junto a la expresión correspondiente.
  spanish_consistency_notes:
  - Se mantuvo la estructura enumerativa del hebreo con una coordinación inicial ('Y de').
  - Se preservó el paralelismo tribal y genealógico de 'hijos de Efraín' y 'casas paternas'.
  - El modismo 'אַנְשֵׁי שֵׁמוֹת' se resolvió con una expresión natural en español, pero se documentó la alternativa literal en nota para no perder la tensión lexical.
