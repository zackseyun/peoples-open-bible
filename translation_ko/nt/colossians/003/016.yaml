id: COL.3.16
reference: Colossians 3:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ λόγος τοῦ Χριστοῦ ἐνοικείτω ἐν ὑμῖν πλουσίως ἐν πάσῃ σοφίᾳ· διδάσκοντες καὶ νουθετοῦντες ἑαυτοὺς ⸀ψαλμοῖς, ⸀ὕμνοις, ᾠδαῖς πνευματικαῖς ⸀ἐν χάριτι, ᾄδοντες ἐν ⸂ταῖς καρδίαις⸃ ὑμῶν τῷ ⸀θεῷ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/016.yaml
  text: Let the word of Messiah dwell in you richly in all wisdom, teaching and admonishing one another with psalms, hymns, and spiritual songs, singing with grace in your hearts to God.
translation:
  language: ko
  text: 메시아의 말씀이 여러분 가운데[a] 풍성히 거하게 하십시오. 모든 지혜로 시와 찬송과 신령한 노래로 서로 가르치고 권면하며, 은혜로[b] 여러분의 마음에 하나님께 노래하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분 안에」. 헬라어 복수형은 공동체 전체 또는 개별 신자 안의 거하심을 함께 가리킬 수 있다.
    reason: alternative_reading
  - marker: b
    text: 또는 「감사함으로」. 헬라어 ἐν χάριτι는 은혜·은혜로움·감사를 함께 담을 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λόγος τοῦ Χριστοῦ
  english_pob_choice: the word of Messiah
  chosen_korean: 메시아의 말씀
  alternatives_korean:
  - 그리스도의 말씀
  - 메시아에 관한 말씀
  lexicon: BDAG
  rationale: Χριστός는 칭호 「메시아」. 속격은 메시아의 말씀(원천·내용 모두 가능)을 보존.
- source_word: ἐνοικείτω
  english_pob_choice: let ... dwell
  chosen_korean: 거하게 하십시오
  alternatives_korean:
  - 머물게 하십시오
  - 깃들게 하십시오
  lexicon: BDAG
  rationale: 현재 명령. ἐνοικέω의 「내주」 비유를 살린다.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_korean: 여러분 가운데
  alternatives_korean:
  - 여러분 안에
  - 여러분 사이에
  lexicon: BDAG
  rationale: 복수 형식 + 회중적 어감을 「여러분 가운데」로 옮기고, 개인적 함의는 각주로 보존.
- source_word: πλουσίως ἐν πάσῃ σοφίᾳ
  english_pob_choice: richly in all wisdom
  chosen_korean: 풍성히 ... 모든 지혜로
  alternatives_korean:
  - 풍부히 모든 지혜로
  lexicon: BDAG
  rationale: πλουσίως를 「풍성히」로, ἐν πάσῃ σοφίᾳ를 뒤 분사에 자연스럽게 연결.
- source_word: διδάσκοντες καὶ νουθετοῦντες ἑαυτοὺς
  english_pob_choice: teaching and admonishing one another
  chosen_korean: 서로 가르치고 권면하며
  alternatives_korean:
  - 서로 가르치고 깨우치며
  - 서로 가르치며 훈계하며
  lexicon: BDAG
  rationale: νουθετέω의 「권면·바로잡음」을 「권면」으로 옮긴다(1:28과 차이는 문맥에 따라 선택).
- source_word: ψαλμοῖς, ὕμνοις, ᾠδαῖς πνευματικαῖς
  english_pob_choice: with psalms, hymns, and spiritual songs
  chosen_korean: 시와 찬송과 신령한 노래로
  alternatives_korean:
  - 시편과 찬송과 영적인 노래로
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「시·찬송·신령한 노래」를 사용한다.
- source_word: ἐν χάριτι
  english_pob_choice: with grace
  chosen_korean: 은혜로
  alternatives_korean:
  - 감사함으로
  - 은혜롭게
  lexicon: BDAG
  rationale: χάρις의 모호성을 「은혜로」로 옮기고, 「감사함」 가능성은 각주로 보존.
- source_word: ᾄδοντες ἐν ταῖς καρδίαις ὑμῶν τῷ θεῷ
  english_pob_choice: singing ... in your hearts to God
  chosen_korean: 여러분의 마음에 하나님께 노래하십시오
  alternatives_korean:
  - 마음으로 하나님께 노래하며
  - 마음 가운데 하나님께 찬송하며
  lexicon: BDAG
  rationale: 분사를 합쇼체 명령으로 풀어 마무리. 「마음에 ... 하나님께」로 내면적·대상 지향성 보존.
