    rationale: Aunque intenta reflejar formalmente el pasivo, en español suena forzado. «Es avergonzada» transmite mejor la afrenta pública y el tono de juicio sin alejarse del sentido fuente.
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota explica בְּיַד («en la mano de / en poder de»), pero el marcador [a] está unido a «Egipto» en vez de a la frase correspondiente.
  - severity: low
