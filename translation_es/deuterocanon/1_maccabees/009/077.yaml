translation:
  language: es
  text: Acampó tres mil jinetes y una gran fuerza[a], y fue a Azoto como si pasara de largo[b]; al mismo tiempo los iba conduciendo al llano, porque tenía una multitud de caballería y confiaba en ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego termina en medio de palabra («καὶ κατε-»), de modo que esta traducción refleja solo la parte completa conservada en esta unidad de versículo.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «como si solo atravesara el lugar», con el matiz de una apariencia engañosa más que de un simple desplazamiento.
    reason: lexical_alternative
  - marker: c
    text: El pronombre singular del griego puede referirse a la fuerza militar en conjunto o, más específicamente, a la caballería como base de su confianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: He encamped
  chosen_spanish: Alojó
  alternatives_spanish:
  - Acampó
  - Puso en campamento
  lexicon: LSJ
  rationale: El verbo militar indica establecer campamento. En español, «alojó» conserva la idea de alojar/establecer tropas sin sonar tan forzado como una calca; «acampó» también es viable y más directa, pero «alojó» deja el matiz de instalar una fuerza.
- source_word: τρισχιλίαν ἵππον
  english_pob_choice: three thousand cavalry
  chosen_spanish: tres mil de caballería
  alternatives_spanish:
  - tres mil jinetes
  - tres mil caballería
  lexicon: LSJ
  rationale: ἵππος puede funcionar colectivamente como caballería. «De caballería» preserva el valor militar colectivo sin convertirlo necesariamente en individuos; «jinetes» es posible, pero desplaza el énfasis hacia las personas más que hacia el cuerpo militar.
- source_word: δύναμιν πολλήν
  english_pob_choice: a large force
  chosen_spanish: una gran fuerza
  alternatives_spanish:
  - un gran ejército
  - muchas tropas
  lexicon: LSJ
  rationale: δύναμις aquí es fuerza militar. «Gran fuerza» es natural en español y mantiene la amplitud del término sin especificar más de lo que el griego exige.
- source_word: ἐπορεύθη εἰς Ἄζωτον
  english_pob_choice: went to Azotus
  chosen_spanish: fue a Azoto
  alternatives_spanish:
  - marchó a Azoto
  - se dirigió a Azoto
  lexicon: LSJ
  rationale: El verbo es el simple «ir/proceder». «Fue a Azoto» conserva la neutralidad del griego; «marchó» sería más interpretativo.
- source_word: ὡς διοδεύων
  english_pob_choice: as though passing through
  chosen_spanish: como si pasara de largo
  alternatives_spanish:
  - como si transitara por allí
  - como si solo atravesara el lugar
  lexicon: LSJ
  rationale: La expresión sugiere apariencia engañosa o tránsito aparente. «Pasara de largo» comunica bien la idea de no detenerse, manteniendo el matiz de apariencia introducido por ὡς.
- source_word: ἅμα προσῆγεν εἰς τὸ πεδίον
  english_pob_choice: at the same time he was leading them into the plain
  chosen_spanish: al mismo tiempo los iba conduciendo al llano
  alternatives_spanish:
  - al mismo tiempo los conducía al llano
  - mientras tanto los llevaba al llano
  lexicon: LSJ
  rationale: 'προσάγω aquí es causativo: conducir/dirigir hacia. «Iba conduciendo» preserva el aspecto progresivo del imperfecto y suena natural en español; «llano» es una buena equivalencia de πεδίον en contexto militar.'
- source_word: διὰ τὸ ἔχειν αὐτὸν πλῆθος ἵππου
  english_pob_choice: because he had a multitude of cavalry
  chosen_spanish: porque tenía una multitud de caballería
  alternatives_spanish:
  - porque tenía mucha caballería
  - porque contaba con gran número de jinetes
  lexicon: LSJ
  rationale: La construcción expresa la razón de su movimiento/confianza. «Multitud de caballería» sigue de cerca πλῆθος ἵππου y conserva el tono colectivo del griego.
- source_word: πεποιθέναι ἐπʼ αὐτήν
  english_pob_choice: trusted in it
  chosen_spanish: confiaba en ella
  alternatives_spanish:
  - se apoyaba en ella
  - ponía su confianza en ella
  lexicon: LSJ
  rationale: El perfecto infinitivo expresa confianza asentada. En español, «confiaba en ella» es el equivalente más natural y preserva la referencia singular del pronombre sin resolverla de modo excesivo.
theological_decisions:
- issue: Referencia del pronombre singular en «confiaba en ella»
  english_pob_reading: The pronoun in 'trusted in it' is singular in Greek and may refer specifically to his force or, more particularly, to his cavalry as the basis of his confidence.
  chosen_spanish_reading: «Ella» mantiene el singular del griego y deja abierta la referencia, ya sea a la fuerza militar o, más particularmente, a la caballería.
  alternative_spanish_readings:
  - «confiaba en eso»
  - «confiaba en su caballería»
  rationale: El texto griego usa un pronombre singular femenino que no debe resolverse demasiado pronto. Mantener «ella» conserva la tensión documental entre el referente general (la fuerza) y el más específico (la caballería), tal como lo observa el aparato inglés.
  doctrine_reference: Respeto al alcance del pronombre en el texto fuente; no aplica una cuestión doctrinal directa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'leading them into the plain' frente a 'bringing them into the plain' por mayor naturalidad. En español se reflejó ese ajuste con «los iba conduciendo al llano», manteniendo el valor causativo/progresivo de προσῆγεν y el registro formal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no la contiene.
  - Se usó «caballería» para ἵππος en sentido colectivo militar, coherente con el criterio inglés y con español contemporáneo.
  - Se conservó la apertura interpretativa del pronombre singular final, sin convertirlo en una referencia explícita no garantizada por el griego.
  - Se tradujo πεδίον como «llano», que en contexto militar resulta natural y preciso en español.
  - No se introdujo terminología eclesiástica ajena al registro narrativo de 1 Macabeos.
