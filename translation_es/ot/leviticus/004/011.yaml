translation:
  language: es
  text: Pero la piel del toro[a], y toda su carne[b], con su cabeza y con sus patas y sus entrañas[c] y su estiércol—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuero».
    reason: lexical_alternative
  - marker: b
    text: O «toro joven».
    reason: lexical_alternative
  - marker: c
    text: «Entrañas» también puede verterse «partes internas» o «partes interiores».
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹר
  english_pob_choice: hide
  chosen_spanish: piel
  alternatives_spanish:
  - cuero
  - hide
  lexicon: HALOT
  rationale: En español, para el animal sacrificial, «piel» es natural y fiel; «cuero» suena más al producto procesado. El inglés POB usa «hide» para precisar la piel de un animal sacrificado, pero en español «piel» conserva mejor la imagen concreta sin sonar técnico de más.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el buey
  lexicon: HALOT
  rationale: פָּר designa el toro/bull en este contexto sacrificial. «Toro» es claro y directo en español; «novillo» introduce una idea de edad no exigida aquí, y «buey» puede sugerir animal castrado.
- source_word: כָּל בְּשָׂרוֹ
  english_pob_choice: all its flesh
  chosen_spanish: toda su carne
  alternatives_spanish:
  - todo su cuerpo
  - toda su carne
  lexicon: HALOT
  rationale: «Carne» mantiene la fuerza concreta de בָּשָׂר y sigue la línea del inglés POB «flesh». «Cuerpo» sería más general y perdería el lenguaje sacrificial específico.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: with its head
  chosen_spanish: con su cabeza
  alternatives_spanish:
  - incluida su cabeza
  - sobre su cabeza
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «sobre/upon», en esta enumeración la función es inclusiva. «Con su cabeza» comunica bien la lista de partes del animal en español, como hace el inglés POB.
- source_word: וְעַל כְּרָעָיו
  english_pob_choice: with its legs
  chosen_spanish: con sus patas
  alternatives_spanish:
  - con sus piernas
  - con sus piernas traseras
  lexicon: HALOT
  rationale: כְּרָעַיִם se refiere a las patas/piernas del animal. «Patas» es más natural para un animal sacrificial en español y evita una posible lectura antropomórfica de «piernas».
- source_word: וְקִרְבּוֹ
  english_pob_choice: its entrails
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus entrañas
  - sus partes internas
  lexicon: HALOT
  rationale: El inglés POB eligió «entrails» y añadió la nota de que también puede traducirse «inward parts» o «inner parts». En español, «entrañas» conserva el sentido corporal concreto y admite esa misma flexibilidad semántica.
- source_word: וּפִרְשׁוֹ
  english_pob_choice: its dung
  chosen_spanish: su estiércol
  alternatives_spanish:
  - su excremento
  - su suciedad
  lexicon: HALOT
  rationale: פֶּרֶשׁ aquí apunta al desecho expulsado del animal; «estiércol» es fuerte y preciso en el contexto sacrificial. «Excremento» también sería posible, pero «estiércol» preserva mejor el registro bíblico y de ofrenda.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una enumeración sacrificial literal y no muestra revisiones sustantivas; el pasaje permanece en alto acuerdo con la fuente hebrea. La versión española conserva la misma secuencia y las mismas tensiones léxicas documentadas: עוֹר, פָּר, בָּשָׂר, קֶרֶב y פֶּרֶשׁ, sin introducir interpretaciones no atestiguadas.'
  spanish_consistency_notes:
  - Se mantiene el tono ritual y enumerativo del original hebreo.
  - Se conserva la distinción concreta entre «carne», «entrañas» y «estiércol».
  - La preposición inclusiva hebrea se vierte de forma idiomática con «con» para evitar calco duro.
  - Se usa un guion largo final para reflejar el corte de la cláusula tal como aparece en la fuente inglesa.
