translation:
  language: es
  text: Entonces Josué rasgó sus vestidos y cayó postrado rostro en tierra delante del arca de Yahvé hasta la tarde, él y los ancianos de Israel; y echaron polvo sobre sus cabezas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Echar polvo sobre la cabeza era una señal acostumbrada de duelo, humillación o luto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרַע
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: HALOT
  rationale: קרע en contexto de duelo expresa rasgar una prenda. «Rasgó» conserva el gesto concreto y es natural en español bíblico contemporáneo.
- source_word: שִׂמְלֹתָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: שִׂמְלָה puede abarcar ropa/vestido; «vestidos» mantiene un registro sobrio y tradicional sin perder claridad.
- source_word: וַיִּפֹּל עַל־פָּנָיו אַרְצָה
  english_pob_choice: fell facedown to the ground
  chosen_spanish: cayó rostro en tierra
  alternatives_spanish:
  - cayó de bruces a tierra
  - se postró con el rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea describe postración. «Cayó rostro en tierra» reproduce la imagen con dignidad y fidelidad; «de bruces» sería más idiomático pero menos solemne.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  english_pob_choice: before the ark of Yahweh
  chosen_spanish: delante del arca de Yahvé
  alternatives_spanish:
  - ante el arca de Yahvé
  - en presencia del arca de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי se rinde con «delante de» / «ante» en español. «Arca de Yahvé» preserva el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre divino como «Yahvé», de acuerdo con la terminología estándar del proyecto en español.
- source_word: עַד הָעֶרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta anochecer
  lexicon: HALOT
  rationale: «Hasta la tarde» es una equivalencia directa, clara y natural para el límite temporal del hebreo.
- source_word: הוּא וְזִקְנֵי יִשְׂרָאֵל
  english_pob_choice: he and the elders of Israel
  chosen_spanish: él y los ancianos de Israel
  alternatives_spanish:
  - él junto con los ancianos de Israel
  - él, y también los ancianos de Israel
  lexicon: HALOT
  rationale: El pronombre enfático se expresa con «él y». «Ancianos» es la traducción natural de זִקְנֵי en este contexto de autoridad comunitaria.
- source_word: וַיַּעֲלוּ עָפָר עַל־רֹאשָׁם
  english_pob_choice: they put dust on their heads
  chosen_spanish: echaron polvo sobre sus cabezas
  alternatives_spanish:
  - pusieron polvo sobre sus cabezas
  - se pusieron polvo sobre la cabeza
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático que expresa luto/humillación. «Echaron polvo» conserva el carácter ritual del gesto sin sonar mecánico en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama de forma explícita. Se mantiene el nombre propio divino, no una sustitución titular, para respetar la transparencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del gesto de echar polvo sobre la cabeza
  english_pob_reading: customary sign of grief, humiliation, or mourning
  chosen_spanish_reading: signo de duelo, humillación o luto
  alternative_spanish_readings:
  - gesto de dolor y aflicción
  - señal de lamentación
  rationale: 'La acción no es meramente decorativa: tiene valor cultural de duelo y humillación. La redacción española debe preservar esa carga simbólica sin convertirla en interpretación excesiva dentro del texto principal.'
  doctrine_reference: Éxodo 33:4-6; Job 2:12 (uso cultural del polvo como luto/humillación)
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo directamente y refleja el ajuste final del audit trail inglés: se conserva «put dust» como gesto cultural de duelo, no como arrebato literal de arrojar. También se alinea con la decisión doctrinal del proyecto de traducir יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrama, coherente con el proyecto.
  - «Rasgó sus vestidos» conserva el matiz de duelo del hebreo.
  - «Cayó rostro en tierra» expresa prostración sin añadir elementos no presentes.
  - Se conservaron las dos marcas de nota dentro del texto para que cada nota quede anclada a su segmento correspondiente.
