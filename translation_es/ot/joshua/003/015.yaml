    text: O «al borde del agua». La expresión hebrea dice literalmente «en el borde/extremo del agua», indicando que los pies de los sacerdotes entraron en el agua por su margen.
    reason: lexical_alternative
  - marker: b
    text: Esto es, el Jordán estaba en crecida durante la temporada de la siega.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota léxica al sintagma correcto, se fortalece el verbo para reflejar mejor נִטְבְּלוּ sin sobretraducir, se elimina una nota redundante y se mejora la naturalidad de la descripción del Jordán crecido manteniendo el sentido parentético del hebreo.
