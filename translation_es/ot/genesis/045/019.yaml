  text: וְ/אַתָּ֥ה צֻוֵּ֖יתָה זֹ֣את עֲשׂ֑וּ קְחוּ לָ/כֶם֩ מֵ/אֶ֨רֶץ מִצְרַ֜יִם עֲגָל֗וֹת לְ/טַפְּ/כֶם֙ וְ/לִ/נְשֵׁי/כֶ֔ם וּ/נְשָׂאתֶ֥ם אֶת אֲבִי/כֶ֖ם וּ/בָאתֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/045/019.yaml
  text: 'And you are commanded[a], ‘Do this: take for yourselves wagons from the land of Egypt for your little ones and for your wives[c][b], and carry your father and come.’'
  footnotes:
  - marker: a
    text: Or “carts” for the transport vehicles sent from Egypt.
    reason: lexical_alternative
  - marker: b
    text: “Little ones” refers specifically to small children.
    reason: lexical_alternative
  - marker: c
    text: Or “bring your father and come back,” since the context implies returning to Egypt, though the Hebrew simply says “come.”
    reason: alternative_reading
  ai_draft:
