translation:
  language: es
  text: Y hallaron pasto rico y bueno, y la tierra era ancha, tranquila y pacífica, porque los que eran de Ham y habían habitado allí anteriormente[a] habían estado allí antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque los hamitas habían habitado allí antes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִרְעֶה
  english_pob_choice: pasture
  chosen_spanish: pasto
  alternatives_spanish:
  - pastura
  - pastizal
  - lugar de pastoreo
  lexicon: HALOT
  rationale: El sustantivo designa un lugar o alimento de pastoreo. En español, 'pasto' es natural y breve; en este contexto comunica bien el área apta para el ganado, sin forzar una perífrasis.
- source_word: שָׁמֵן
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - fértil
  - graso
  - abundante
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'graso', en un contexto de terreno/pastura expresa abundancia y rendimiento. 'Rico' reproduce esa fuerza idiomática de manera clara y fluida.
- source_word: וָטוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - agradable
  - excelente
  - fino
  lexicon: HALOT
  rationale: El adjetivo es amplio y valorativo. 'Bueno' conserva la sencillez del hebreo y su enlace natural con 'rico'.
- source_word: רַחֲבַת יָדַיִם
  english_pob_choice: broad
  chosen_spanish: ancha
  alternatives_spanish:
  - espaciosa
  - amplia
  - de gran extensión
  lexicon: HALOT
  rationale: La expresión es idiomática y literalmente involucra 'anchura de manos'. En español, predicar 'ancha' de la tierra transmite bien la idea de amplitud sin volverla oscura o artificial.
- source_word: שֹׁקֶטֶת
  english_pob_choice: quiet
  chosen_spanish: quieta
  alternatives_spanish:
  - reposada
  - serena
  - tranquila
  lexicon: HALOT
  rationale: El participio describe un estado de reposo o falta de perturbación. 'Quieta' mantiene la sencillez y el paralelismo con la frase siguiente.
- source_word: שְׁלֵוָה
  english_pob_choice: peaceful
  chosen_spanish: pacífica
  alternatives_spanish:
  - segura
  - tranquila
  - en paz
  lexicon: HALOT
  rationale: El término puede sugerir sosiego, seguridad o bienestar asentado. 'Pacífica' encaja bien junto a 'quieta' y preserva la idea de una tierra estable y sin conflicto.
- source_word: כִּי מִן חָם הַיֹּשְׁבִים שָׁם לְפָנִים
  english_pob_choice: for those from Ham who had lived there formerly were there before
  chosen_spanish: porque los que de Ham habían habitado allí antes estaban allí primero
  alternatives_spanish:
  - porque los descendientes de Ham habían habitado allí antes
  - porque los de Ham que habitaban allí antes estaban allí primero
  - porque los hamitas habían habitado allí antes
  lexicon: HALOT
  rationale: La cláusula explica el estado de la tierra por sus antiguos pobladores. En español se requiere explicitar la referencia a personas ('los que de Ham') para que el sentido no quede fragmentario; 'habían habitado allí antes' y 'estaban allí primero' reproducen la noción de anterioridad contenida en לְפָנִים sin añadir la palabra 'descendientes' que el hebreo no expresa de forma explícita.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Ham
  alternatives_spanish:
  - Cam
  lexicon: HALOT
  rationale: Nombre propio bíblico; se conserva la transliteración 'Ham' conforme al criterio de la base inglesa y a la forma más reconocible en contexto académico/bíblico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, especialmente en la última cláusula, donde se evita introducir 'descendientes' como explícito si bien la relación étnica con Ham está implícita. Se conserva la secuencia de cualidades del terreno con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda.
  - Se prefirió 'pasto' frente a 'pastura' por naturalidad en español bíblico moderno; la nota deja abierta la alternativa.
  - '''Pacífica'' se eligió para mantener el paralelismo con ''quieta'' sin intensificar indebidamente a ''segura'' o ''prospera''.'
  - No se añadió ninguna nota teológica porque el versículo es descriptivo y no plantea una decisión doctrinal directa.
