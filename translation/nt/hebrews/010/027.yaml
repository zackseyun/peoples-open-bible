theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Retain the vivid language of consuming fire without softening it into merely metaphorical or explicitly eternal categories.
  alternative_readings:
  - Render more dynamically as 'raging fire'
  - Interpret explicitly as eternal punishment
  rationale: The verse presents severe divine judgment imagery but does not itself specify all theological details of that judgment. The translation preserves the warning's force without importing a fuller doctrinal system beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
