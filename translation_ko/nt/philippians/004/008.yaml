id: PHP.4.8
reference: Philippians 4:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸ λοιπόν, ἀδελφοί, ὅσα ἐστὶν ἀληθῆ, ὅσα σεμνά, ὅσα δίκαια, ὅσα ἁγνά, ὅσα προσφιλῆ, ὅσα εὔφημα, εἴ τις ἀρετὴ καὶ εἴ τις ἔπαινος, ταῦτα λογίζεσθε·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/008.yaml
  text: Finally, brothers, whatever is true, whatever is honorable, whatever is just, whatever is pure, whatever is lovely, whatever is commendable—if there is any virtue and if there is any praise—think about these things.
translation:
  language: ko
  text: 끝으로 형제 여러분[a], 무엇이든지 참된 것, 무엇이든지 존귀한 것, 무엇이든지 의로운 것, 무엇이든지 순결한 것, 무엇이든지 사랑스러운 것, 무엇이든지 칭찬받을 만한 것 — 무슨 덕이든, 무슨 기림이든 — 이것들을 깊이 생각하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「형제들」(ἀδελφοί)은 남성 복수 호격이나, 빌립보 회중 전체(남녀 모두)를 부른다.
    reason: cultural_note
lexical_decisions:
- source_word: Τὸ λοιπόν
  english_pob_choice: Finally
  chosen_korean: 끝으로
  alternatives_korean:
  - 마지막으로
  - 그 밖에
  lexicon: BDAG
  rationale: 결론적 권면을 도입하는 담론 표지. 「끝으로」가 한국 서신·강설의 자연스러운 정형어이다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제 여러분
  alternatives_korean:
  - 형제들
  - 형제자매
  lexicon: BDAG
  rationale: 1절과 동일한 원칙. 남성형 정확성을 유지하되 합쇼체 호격을 위해 「여러분」을 더하고, 포용적 의미는 각주에 둔다.
- source_word: ὅσα
  english_pob_choice: whatever
  chosen_korean: 무엇이든지
  alternatives_korean:
  - 무엇이든
  - 모든
  lexicon: BDAG
  rationale: 분배적 「무엇이든지」가 ὅσα의 반복 구조를 자연스럽게 살린다. 한국 교회에서 가장 외워지는 구절 중 하나로 ὅσα의 반복을 한 번도 생략하지 않는다.
- source_word: ἀληθῆ
  english_pob_choice: 'true'
  chosen_korean: 참된 것
  alternatives_korean:
  - 진실한 것
  - 진리인 것
  lexicon: BDAG
  rationale: 윤리적·인지적 「참됨」의 폭을 「참된 것」이 가장 자연스럽게 담는다.
- source_word: σεμνά
  english_pob_choice: honorable
  chosen_korean: 존귀한 것
  alternatives_korean:
  - 경건한 것
  - 위엄 있는 것
  lexicon: BDAG
  rationale: 도덕적 무게와 존중받을 만한 품격을 「존귀」가 자연스럽게 담는다. 「경건한」은 εὐσεβής와 혼동될 수 있다.
- source_word: δίκαια
  english_pob_choice: just
  chosen_korean: 의로운 것
  alternatives_korean:
  - 옳은 것
  - 공의로운 것
  lexicon: BDAG
  rationale: 이 윤리 목록 안에서 「의로운」은 한국 교회의 정착된 표현이며, δίκαιος의 폭(공정·올바름·의로움)을 담는다.
- source_word: ἁγνά
  english_pob_choice: pure
  chosen_korean: 순결한 것
  alternatives_korean:
  - 정결한 것
  - 깨끗한 것
  lexicon: BDAG
  rationale: 도덕적·내적 순결성을 한 단어로 담는 「순결한」을 택한다. 「정결한」도 가능하나 의례적 함의가 짙다.
- source_word: προσφιλῆ
  english_pob_choice: lovely
  chosen_korean: 사랑스러운 것
  alternatives_korean:
  - 사랑받을 만한 것
  - 호감 가는 것
  lexicon: BDAG
  rationale: 사랑·애정을 자아내는 성질을 자연스럽게 담는다.
- source_word: εὔφημα
  english_pob_choice: commendable
  chosen_korean: 칭찬받을 만한 것
  alternatives_korean:
  - 좋은 평을 듣는 것
  - 칭송할 만한 것
  lexicon: BDAG
  rationale: 좋은 평판을 얻을 만한 성질. 「칭찬받을 만한」이 한국어로 자연스럽고 의미가 분명하다.
- source_word: εἴ τις ἀρετὴ
  english_pob_choice: if there is any virtue
  chosen_korean: 무슨 덕이든
  alternatives_korean:
  - 무슨 탁월함이든
  - 어떤 덕이라도 있다면
  lexicon: BDAG
  rationale: ἀρετή의 「덕(德)」은 한국어 윤리 어휘로 정착되어 있다. 조건절을 「~이든」으로 압축해 목록의 리듬을 보존한다.
- source_word: ἔπαινος
  english_pob_choice: praise
  chosen_korean: 기림
  alternatives_korean:
  - 칭찬
  - 칭송
  lexicon: BDAG
  rationale: 앞의 「칭찬받을 만한 것」(εὔφημα)과의 어휘적 중복을 피하기 위해 「기림」을 택한다. ἔπαινος의 「(공적에 대한) 인정·칭송」 의미가 「기림」에 잘 담긴다.
- source_word: ταῦτα λογίζεσθε
  english_pob_choice: think about these things
  chosen_korean: 이것들을 깊이 생각하십시오
  alternatives_korean:
  - 이것들을 생각하십시오
  - 이것들에 마음을 두십시오
  lexicon: BDAG
  rationale: λογίζομαι는 단순한 사고가 아니라 의도적·반복적 사고·헤아림을 가리키므로 「깊이 생각하다」로 그 무게를 살린다. 한국 교회에서 가장 외워지는 구절 중 하나이지만, 합쇼체 일관성을 위해 개역개정의 「하라」(보통체)는 사용하지 않는다.
