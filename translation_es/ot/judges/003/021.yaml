review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español representa bien la secuencia narrativa y los elementos léxicos principales del hebreo: Ehud extiende/alcanza con la mano izquierda, toma la espada, la saca de su muslo derecho y la introduce en el vientre. Sin embargo, la nota [a] está mal anclada y no corresponde al término señalado en el rastro inglés: allí la nota alternativa pertenece a «su vientre» («abdomen»), no a «mano izquierda». Además, «de sobre su muslo derecho» es comprensible pero poco natural en español; el hebreo מֵעַל puede preservarse suficientemente con «de su muslo derecho» sin pérdida material de sentido.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere un ajuste menor para mayor naturalidad y para corregir la distribución de notas. «Extendió su mano izquierda» es aceptable, aunque algo menos natural que «alcanzó con la mano izquierda» o «extendió la mano izquierda». La frase «de sobre su muslo derecho» suena forzada en español bíblico moderno; «de su muslo derecho» comunica con naturalidad la ubicación concreta del arma. La puntuación y el registro son adecuados.
  glossary_alignment: No hay términos de glosario mayor en disputa. «La espada» sigue correctamente la decisión del POB para הַחֶרֶב, con nota sobre posible arma corta. «Vientre» es una buena elección para בְּבִטְנוֹ. No hay problemas teológicos ni terminológicos de proyecto.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «mano izquierda» pero el rastro inglés reserva esa alternativa para «vientre/abdomen».
    rationale: La nota inglesa dice «Or 'thrust it into his abdomen.'», que corresponde al complemento final, no a la expresión «his left hand». Mantenerla en «mano izquierda» introduce una alternativa no documentada y omite la alternativa sí documentada.
  - severity: low
    issue: «De sobre su muslo derecho» suena poco idiomático en español.
    rationale: Aunque refleja literalmente מֵעַל, en español moderno y digno basta «de su muslo derecho» para conservar el sentido concreto sin calco rígido.
  - severity: low
    issue: 'La formulación de la nota actual [a] («O: con su mano izquierda») no está sustentada por el rastro auditado.'
    rationale: El inglés POB no documenta esa alternativa en esta cláusula; por disciplina de auditoría conviene no crear una nota innecesaria.
  revised_spanish_text: Entonces Ehud extendió su mano izquierda, tomó la espada de su muslo derecho[a] y la hundió en su vientre[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «la espada»; el contexto puede sugerir una espada corta o un puñal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «abdomen».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación y el contenido de las notas para alinearlas con el rastro inglés y con el hebreo auditado. También se suavizó el calco espacial «de sobre» a «de» para mejorar la naturalidad en español sin perder el sentido de que el arma estaba ceñida al muslo derecho. El resto del versículo es fiel y no requiere cambios mayores.
