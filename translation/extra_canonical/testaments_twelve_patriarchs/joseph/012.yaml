theological_decisions:
- issue: Rendering κύριος / θεός in Joseph's providential rise
  chosen_reading: Translated as 'the Lord' in v. 6 and 'God' in v. 7 according to the Greek forms present.
  alternative_readings:
  - Harmonize both as 'God'
  - Harmonize both as 'the Lord God'
  rationale: The Greek witness distinguishes ὁ Κύριος and ὁ Θεός in adjacent verses. Preserving that variation respects the source rather than smoothing it.
  doctrine_reference: 'DOCTRINE.md: translate titles and preserve source-language distinctions where possible.'
- issue: Narrative segmentation after v. 8
  chosen_reading: Rendered the surviving Greek as a continuous chapter with a new scene beginning at the next numbered unit.
  alternative_readings:
  - Attempt to reconstruct missing connective material
  - Harmonize directly to Genesis 39
  rationale: The OCR witness is textually rough and appears to shift scenes abruptly. The translation follows the extant Greek without importing wording from Genesis or later translations.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy and transparency rather than silent harmonization.'
