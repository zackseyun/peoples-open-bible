  text: καθάπερ γὰρ ἡ Νῶε κιβωτὸς ἐν τῷ κοσμοπληθεῖ κατακλυσμῷ κοσμοφορουμένη καρτερῶς ὑπήνεγκεν τοὺς κλύδωνας·
