translation:
  language: es
  text: Porque defenderé esta ciudad para salvarla[a], por amor a mí mismo y por amor de mi siervo David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘librarla’. El verbo hebreo puede significar ‘salvar’ o ‘librar’ en contextos de rescate de peligro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַנּוֹתִי
  english_pob_choice: I will defend
  chosen_spanish: defenderé
  alternatives_spanish:
  - protegeré
  - resguardaré
  lexicon: HALOT
  rationale: גנן expresa la idea de cubrir o proteger; en este contexto militar, ‘defender’ comunica de manera natural la acción protectora sin perder la fuerza del verbo.
- source_word: אֶל הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - contra esta ciudad
  - sobre esta ciudad
  lexicon: HALOT
  rationale: Con גנן, el objeto hacia el que se dirige la protección se expresa de forma idiomática en español como ‘esta ciudad’, evitando una preposición extraña que el hebreo no exige traducir literalmente.
- source_word: לְהוֹשִׁיעָהּ
  english_pob_choice: to save it
  chosen_spanish: para salvarla
  alternatives_spanish:
  - para librarla
  - para rescatarla
  lexicon: HALOT
  rationale: ישׁע puede significar ‘salvar’ o ‘librar’; ‘salvarla’ mantiene la ambigüedad útil entre rescate y salvación, con una forma natural en español.
- source_word: לְמַעֲנִי
  english_pob_choice: for my own sake
  chosen_spanish: por amor a mí mismo
  alternatives_spanish:
  - por mi propio bien
  - por mi causa
  lexicon: HALOT
  rationale: La expresión enfatiza la motivación centrada en Dios mismo. ‘Por amor a mí mismo’ conserva ese peso reflexivo y suena más idiomático en español que una traducción demasiado literal.
- source_word: וּלְמַעַן דָּוִד עַבְדִּי
  english_pob_choice: for the sake of my servant David
  chosen_spanish: por amor de mi siervo David
  alternatives_spanish:
  - por causa de mi siervo David
  - por el bien de mi siervo David
  lexicon: HALOT
  rationale: Se mantiene el valor motivacional de לְמַעַן y el título relacional ‘mi siervo David’. ‘Por amor de’ conserva la causa/consideración personal sin diluir el vínculo pactual.
theological_decisions:
- issue: Doble motivo divino para salvar Jerusalén
  english_pob_reading: The verse states that the LORD will save the city both for his own sake and for the sake of David, reflecting divine concern for his own name and covenant commitment to David.
  chosen_spanish_reading: 'El versículo presenta dos motivos distintos: por amor a Dios mismo y por amor de David, su siervo.'
  alternative_spanish_readings:
  - Lo presenta como una sola motivación divina resumida en la fidelidad del pacto.
  - Podría entenderse como una referencia exclusiva a promesas pasadas a David sin énfasis más amplio en el nombre de Dios.
  rationale: El hebreo introduce ambos motivos con לְמַעַן y conviene preservarlos sin resolver la tensión teológica ni fusionarlos. Así se conserva tanto el interés de Dios en sí mismo como su compromiso con David.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios en el texto fuente ni en la decisión de traducir el verbo principal como protección/salvación.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ implícito en la primera persona por la voz divina del contexto.
  - ‘Siervo’ se conserva para עבדּי porque aquí es título relacional y no δοῦλος en sentido de esclavitud.
  - ‘Por amor a mí mismo’ y ‘por amor de mi siervo David’ preservan la doble motivación sin interpretar de más el fundamento teológico.
