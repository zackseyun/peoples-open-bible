- from: Mi amor fiel y mi fortaleza[a], mi baluarte y mi libertador, mi escudo, y en él me refugio[b]; el que somete a mi pueblo bajo mí.
  to: Mi amor fiel y mi fortaleza, mi baluarte y mi libertador[a], mi escudo, y en él me refugio; el que somete a mi pueblo[b] bajo mí.
  rationale: 'Se conserva el texto principal casi íntegro porque es fiel y legible, pero se corrigen las notas para alinearlas con la evidencia fuente y el expediente inglés: la nota sobre la antigua redacción «para mí» vuelve a «mi libertador», y la variante «pueblos» se mueve a «mi pueblo», donde realmente pertenece. No se requiere adjudicación adicional porque es una corrección editorial clara y de bajo riesgo doctrinal.'
