translation:
  language: es
  text: Miren, todos ustedes, hijos de Israel[a], den su opinión y consejo aquí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  - He aquí
  lexicon: HALOT
  rationale: Es una interjección deíctica que llama la atención del asambleísta. «Miren» conserva el tono exhortativo y suena natural en español moderno; «He aquí» sería más tradicional pero más arcaizante.
- source_word: כֻלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: Explicita el plural dirigido al grupo completo. «Todos ustedes» mantiene la referencia directa al auditorio y fluye mejor en español que una repetición más literal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos de Israelitas
  - Israelitas
  - hijos varones de Israel
  lexicon: HALOT
  rationale: Se conserva la imagen filial del hebreo constructo, pero en español «hijos de Israel» resulta más natural y sigue siendo suficientemente cercano al original. Mantiene la tensión entre la forma literal y el sentido colectivo.
- source_word: הָבוּ
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - presenten
  - ofrezcan
  - proporcionen
  lexicon: HALOT
  rationale: El imperativo pide que la asamblea aporte algo verbalmente. «Den» refleja el verbo básico sin especificar demasiado, dejando que el complemento determine el contenido.
- source_word: דָּבָר
  english_pob_choice: opinion
  chosen_spanish: opinión
  alternatives_spanish:
  - respuesta
  - propuesta
  - asunto
  - palabra
  lexicon: HALOT
  rationale: El contexto de deliberación pública favorece una noción de respuesta o propuesta. La revisión inglesa pasó de «word» a «opinion» para captar ese valor; «opinión» expresa bien la contribución pedida sin perder la amplitud semántica del hebreo.
- source_word: וְעֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - asesoramiento
  - plan
  - consejo deliberado
  lexicon: HALOT
  rationale: עֵצָה en este marco es consejo o plan reflexivo. «Consejo» es la correspondencia más directa y formal en español.
- source_word: הֲלֹם
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: HALOT
  rationale: Adverbio de lugar simple y directo. «Aquí» preserva la referencia a la asamblea presente.
theological_decisions:
- issue: Referencia colectiva a Israel mediante una expresión masculina plural
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - Israelitas
  - hijos de Israel
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de fidelidad formal: se conserva la metáfora filial del hebreo en vez de reemplazarla por un gentilicio más interpretativo. Esto mantiene visible la forma del texto fuente.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La base inglesa revisada cambió «word» por «opinion» para reflejar mejor דָּבָר en un contexto de deliberación. La versión española sigue esa revisión con «opinión», manteniendo también «consejo» para conservar el paralelismo semántico. No se adoptó «he aquí» porque el registro español moderno favorece una llamada más directa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino cuando aparezca; en este versículo no hay mención explícita.
  - Se conserva el paralelismo entre un término más amplio («opinión») y otro más deliberativo («consejo»).
  - Se evita «SEÑOR» o fórmulas de sustitución porque el hebreo aquí no contiene el tetragrámaton.
  - La puntuación busca reflejar una apelación pública breve y solemne.
