    text: Hebrew has 'from water(s) to sea' in the cited edition, but the Greek parallel reads 'from sea to sea,' which likely preserves the intended territorial formula; the translation follows that sense.
    reason: textual_variant
  - marker: b
    text: '''The River'' is the conventional biblical way of referring to the Euphrates in territorial-promise language.'
    reason: cross_reference
