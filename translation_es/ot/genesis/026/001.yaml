revisions:
- from: Ahora bien, hubo hambre en la tierra[a], además del primer hambre que había habido en los días de Abraham. Así que Isaac fue a Abimelec, rey de los filisteos, a Gerar.
  to: Ahora bien, hubo hambre en la tierra, además de la primera hambruna que hubo en los días de Abraham. Así que Isaac fue a Abimelec, rey de los filisteos, en Gerar[a].
  rationale: Se reubica la nota al lugar correcto, se alinea la lectura principal de Gerar con el POB auditado («en Gerar») y se mejora la naturalidad del español sin perder el sentido del hebreo.
