translation:
  language: es
  text: y la tierra de la India, de Media y de Lidia[a], y algunas de sus mejores tierras, las tomaron de él y se las dieron al rey Eumenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de sus territorios más escogidos». El griego dice literalmente «de sus tierras más bellas», una expresión idiomática para regiones especialmente valiosas o excelentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χώραν
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la región
  - el país
  lexicon: LSJ
  rationale: χώρα puede significar tierra, territorio o región. En este contexto geopolítico, 'la tierra' conserva la construcción singular del griego y suena natural en español sin perder el valor territorial.
- source_word: τὴν Ἰνδικὴν
  english_pob_choice: India
  chosen_spanish: la India
  alternatives_spanish:
  - India
  - el país de la India
  lexicon: LSJ
  rationale: El adjetivo sustantivado designa la región de India. En español, 'la India' es la forma geográfica natural y fiel al referente.
- source_word: Μηδίαν
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - la Media
  lexicon: LSJ
  rationale: Nombre regional propio. Se conserva la transliteración tradicional 'Media' sin añadir artículo, para mantener la tersura del listado.
- source_word: Λυδίαν
  english_pob_choice: Lydia
  chosen_spanish: Lidia
  alternatives_spanish:
  - Lydia
  lexicon: LSJ
  rationale: En español bíblico, el nombre geográfico se expresa naturalmente como 'Lidia'. Mantiene el referente histórico de la región de Λυδία.
- source_word: ἀπὸ τῶν καλλίστων χωρῶν αὐτῶν
  english_pob_choice: some of the finest of their lands
  chosen_spanish: de entre sus mejores tierras
  alternatives_spanish:
  - de sus tierras más bellas
  - de las mejores partes de sus territorios
  - de entre sus territorios más escogidos
  lexicon: LSJ
  rationale: καλλίστων, en un contexto territorial, expresa excelencia o calidad superior más que belleza estética. 'De entre' refleja bien el matiz partitivo de ἀπὸ con el plural genitivo, y 'mejores' comunica el valor idiomático de 'most beautiful/best' sin forzar 'bellas' en un registro geopolítico.
- source_word: λαβόντες
  english_pob_choice: they took
  chosen_spanish: las tomaron
  alternatives_spanish:
  - habiéndolas tomado
  - después de tomarlas
  - las habían tomado
  lexicon: LSJ
  rationale: Aunque es participio aoristo, en la secuencia narrativa funciona de manera casi finita. En español, 'las tomaron' mantiene la progresión verbal natural sin añadir explicaciones que el griego no exige.
- source_word: παρ' αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - de aquel rey
  - de Antioquía
  lexicon: LSJ
  rationale: El pronombre remite al gobernante ya mencionado en el contexto. 'De él' sigue de cerca el griego y evita introducir un antecedente explícito que el versículo no repite.
- source_word: ἔδωκαν αὐτὰς Εὐμενεῖ τῷ βασιλεῖ
  english_pob_choice: gave them to King Eumenes
  chosen_spanish: se las dieron al rey Eumenes
  alternatives_spanish:
  - las dieron al rey Eumenes
  - las entregaron al rey Eumenes
  - se las entregaron al rey Eumenes
  lexicon: LSJ
  rationale: ἔδωκαν es 'dar'. En español, 'se las dieron' preserva el objeto directo e indirecto de modo natural. 'Rey Eumenes' conserva el título antes del nombre, como en el inglés auditado, y mantiene la referencia al destinatario real.
translation_notes:
  revision_awareness: La versión española sigue el sentido y la segmentación del texto griego, con atención a la lectura auditada en inglés. Se mantiene la enumeración geográfica, el matiz partitivo de ἀπὸ y la secuencia narrativa de λαβόντες + ἔδωκαν, sin suavizar la referencia territorial ni introducir interpretaciones históricas no presentes en el versículo.
  spanish_consistency_notes:
  - Se usa 'la India' como nombre geográfico natural en español.
  - Se conserva 'Media' y 'Lidia' como transliteraciones estándar de regiones antiguas.
  - '''Rey Eumenes'' sigue la estructura del audit trail inglés y evita una paráfrasis más libre.'
  - La nota de pie de página marca la alternativa semántica de καλλίστων en un contexto territorial, sin desplazar el texto principal.
