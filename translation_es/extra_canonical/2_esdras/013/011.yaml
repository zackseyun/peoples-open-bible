translation:
  language: es
  text: 'Y todas estas cosas se mezclaron: la ola de fuego, el soplo de llama y la gran tormenta; y cayó sobre el asalto de la multitud que se había preparado para pelear, y los consumió a todos, de modo que de repente no se veía nada de aquella incontable multitud sino solamente polvo de ceniza y olor a humo. Y lo vi y quedé asombrado.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: multitudo tempestatis
  english_pob_choice: the wave of fire, the breath of flame, and the great storm
  chosen_spanish: la ola de fuego, el aliento de llama y la gran tormenta
  alternatives_spanish:
  - la masa de la tempestad
  - la multitud de la tempestad
  - la ola de fuego, el soplo de llama y la gran tempestad
  lexicon: multitudo = multitud; tempestatis = tempestad/tormenta
  rationale: El latín comprimido parece presentar una serie de imágenes apocalípticas; mantengo la coordinación figurativa del inglés POB y vierto tempestatis como 'tormenta', término natural y suficientemente amplio en español.
- source_word: concidit super multitudinis impetum
  english_pob_choice: it fell upon the assault of the multitude
  chosen_spanish: cayó sobre el asalto de la multitud
  alternatives_spanish:
  - cayó sobre el ataque de la multitud
  - cayó sobre el embate de la multitud
  lexicon: impetus = asalto/impulso/embate
  rationale: '''Asalto'' conserva el sentido agresivo y militar del contexto; ''embate'' sería posible, pero ''asalto'' refleja mejor la embestida de los que estaban listos para combatir.'
- source_word: succendit omnes
  english_pob_choice: burned them all up
  chosen_spanish: los consumió a todos
  alternatives_spanish:
  - los quemó a כולם
  - los abrasó a todos
  - los incendió a todos
  lexicon: succendere = encender, prender fuego, abrasar
  rationale: '''Consumió'' comunica la destrucción total con naturalidad en español y evita una repetición demasiado literal de ''quemó'', que en este pasaje requiere fuerza consumidora.'
- source_word: puluis cineris et fumi odor
  english_pob_choice: the dust of ashes and the smell of smoke
  chosen_spanish: polvo de ceniza y olor a humo
  alternatives_spanish:
  - polvo de cenizas y olor de humo
  - polvo de ceniza y hedor de humo
  lexicon: pulvis = polvo; cinis/cineris = ceniza; odor = olor
  rationale: Conservo la secuencia nominal breve del latín y del inglés POB. 'Olor a humo' suena más idiomático que 'olor de humo' en español moderno.
- source_word: extiti
  english_pob_choice: I was astonished
  chosen_spanish: quedé asombrado
  alternatives_spanish:
  - me quedé atónito
  - me estremecí
  - quedé maravillado
  lexicon: extiti (prob. ex-steti / asombro por reacción narrativa)
  rationale: El latín transmitido aquí es textualmente difícil; sigo la lectura del inglés POB que entiende una reacción de asombro, expresada en español con un giro natural y sobrio.
theological_decisions:
- issue: Naturaleza de la escena apocalíptica y lenguaje imagístico
  english_pob_reading: The wave of fire, the breath of flame, and the great storm
  chosen_spanish_reading: la ola de fuego, el aliento de llama y la gran tormenta
  alternative_spanish_readings:
  - la ola de fuego, el soplo de llama y la gran tempestad
  - la ola de fuego, el aliento de fuego y la gran tormenta
  rationale: Mantengo el carácter visionario y no explico las imágenes; el español conserva la acumulación sin reducirla a prosa descriptiva ordinaria.
  doctrine_reference: Apocalíptica visionaria; no se introduce una interpretación doctrinal adicional.
- issue: Afirmación de destrucción total de la multitud
  english_pob_reading: so that suddenly nothing could be seen of the innumerable multitude except only the dust of ashes and the smell of smoke
  chosen_spanish_reading: de modo que de repente no se veía nada de aquella incontable multitud sino solamente polvo de ceniza y olor a humo
  alternative_spanish_readings:
  - de modo que de repente no se veía nada de la innumerable multitud excepto sólo polvo de ceniza y olor a humo
  - de manera que al instante no quedó visible nada de aquella multitud innumerable, sino sólo polvo de ceniza y olor a humo
  rationale: Conservo la fuerza de aniquilación total sin suavizarla, porque esa es la carga del pasaje y de la traducción inglesa auditada.
  doctrine_reference: Juicio apocalíptico; destrucción completa en la visión.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del pasaje: no se registran cambios aplicados en la revisión más reciente, y el veredicto de control cruzado fue de alta concordancia (agree).'
  spanish_consistency_notes:
  - Se mantiene 'multitud' para multitudo y 'polvo de ceniza' para puluis cineris, en línea con la imaginería del texto fuente.
  - Se usa una puntuación en serie para reflejar la acumulación de imágenes del original y del inglés auditado.
  - No se introduce terminología eclesiástica ajena al pasaje; el tono permanece visionario y sobrio.
