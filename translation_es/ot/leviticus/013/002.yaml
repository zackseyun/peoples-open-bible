review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés en la estructura legal, la repetición anatómica, las tres lesiones cutáneas y la pasiva procedimental. Sin embargo, hay un desajuste importante en las notas: la nota [a] está anclada a «hinchazón», pero su contenido explica צָרָעַת/«lepra», no שְׂאֵת. Además, «uno de sus hijos, los sacerdotes» suena appositivo ambiguo en español; el hebreo identifica a los hijos como sacerdotes, y conviene expresarlo sin ambigüedad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere una corrección menor para la ubicación de la nota y una mejora de fluidez/precisión en «uno de sus hijos sacerdotes». También conviene evitar una nota léxica redundante sobre «infección de lepra» si ya se conserva la nota explicativa principal sobre «lepra».
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Aarón el sacerdote», «lepra» con nota aclaratoria y «será llevado» son aceptables dentro del expediente POB, aunque el propio historial inglés muestra tensión entre «lepra» y una categoría cutánea más amplia. La mejor alineación en español es mantener «lepra» en el texto principal por el audit trail final y conservar la nota explicativa en el lugar correcto.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «hinchazón», pero explica «lepra»/צָרָעַת.
    rationale: Esto rompe la correspondencia exigida entre ancla y contenido de la nota, y puede inducir al lector a pensar que la explicación corresponde a שְׂאֵת en vez de צָרָעַת.
  - severity: medium
    issue: «uno de sus hijos, los sacerdotes» es ambiguo y poco natural en español.
    rationale: La coma hace que «los sacerdotes» suene a aposición explicativa general. «uno de sus hijos sacerdotes» comunica mejor el sentido hebreo sin añadir información.
  - severity: low
    issue: 'La nota [b] «O: una afección de lepra» aporta poco y no preserva una alternativa relevante mejor que la nota principal.'
    rationale: La alternativa es débil y algo extraña en español; la nota verdaderamente útil es la aclaración sobre el alcance semántico de צָרָעַת frente a la lepra moderna.
  revised_spanish_text: Cuando un hombre tenga en la piel de su cuerpo una hinchazón, o una costra, o una mancha brillante, y llegue a ser en la piel de su cuerpo una infección de lepra[a], será llevado a Aarón el sacerdote, o a uno de sus hijos sacerdotes.
  revised_footnotes:
