translation:
  language: es
  text: Porque los pastores[a] se han embrutecido, y no han buscado a Yahvé; por eso no han actuado con sabiduría[b], y todo su rebaño se ha dispersado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «los pastores» probablemente se refiere metafóricamente a los dirigentes del pueblo.
    reason: cultural_note
  - marker: b
    text: O «no han prosperado». El hebreo puede abarcar tanto la idea de actuar con sabiduría como la de obtener buen resultado.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעֲרוּ
  english_pob_choice: have become stupid
  chosen_spanish: se han embrutecido
  alternatives_spanish:
  - se han vuelto estúpidos
  - se han vuelto insensatos
  - han perdido el juicio
  lexicon: HALOT
  rationale: El verbo en nifal expresa un estado de torpeza o brutalidad, no solo falta de información. En español, «se han embrutecido» conserva la fuerza profética y el matiz de degradación moral/intelectual sin sonar excesivamente coloquial.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los líderes
  - los pastores del pueblo
  lexicon: HALOT
  rationale: Se mantiene la metáfora pastoral en el texto principal, como en el hebreo y en la decisión inglesa, sin interpretarla de entrada como «líderes». En contexto jeremiano, el lector puede captar la referencia figurada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se usa el nombre divino explícito según el criterio del proyecto en español. La forma «Yahvé» conserva el Tetragrámaton sin sustituirlo por un título enmascarado.
- source_word: דָרָשׁוּ
  english_pob_choice: have not sought
  chosen_spanish: no han buscado
  alternatives_spanish:
  - no han consultado
  - no han inquirido de
  lexicon: HALOT
  rationale: דָרַשׁ con Dios puede implicar buscar, consultar o inquirir. «Buscar» es la opción más natural en español y conserva el sentido relacional y direccional del verbo.
- source_word: הִשְׂכִּילוּ
  english_pob_choice: have not acted wisely
  chosen_spanish: no han actuado con sabiduría
  alternatives_spanish:
  - no han sido sensatos
  - no han obrado prudentemente
  - no han tenido éxito
  lexicon: HALOT
  rationale: El hiphil de שכל puede expresar actuar sabiamente y, por extensión, obtener buen resultado. «Actuado con sabiduría» preserva la dimensión intelectual y práctica; evita reducirlo solo a prosperidad.
- source_word: מַרְעִיתָם
  english_pob_choice: their flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su grey
  - los que pastorean
  lexicon: HALOT
  rationale: Aunque el sustantivo puede referirse a pastura o a lo relacionado con el pastoreo, aquí el contexto favorece el conjunto de ovejas bajo su cuidado. «Rebaño» comunica bien la imagen pastoral en español.
- source_word: נָפֽוֹצָה
  english_pob_choice: is scattered
  chosen_spanish: se ha dispersado
  alternatives_spanish:
  - está disperso
  - ha sido dispersado
  - se esparce
  lexicon: HALOT
  rationale: El verbo comunica dispersión efectiva del rebaño. «Se ha dispersado» expresa el resultado ya producido y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se preserva el nombre de pacto en lugar de reemplazarlo por un título. Esto sigue la línea doctrinal del proyecto y evita ocultar la forma del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: término disputado יְהוָה / YHWH'
- issue: Lectura figurada de "pastores"
  english_pob_reading: the shepherds likely refers metaphorically to the people's leaders
  chosen_spanish_reading: los pastores
  alternative_spanish_readings:
  - los líderes
  - los gobernantes
  - los pastores del pueblo
  rationale: La metáfora se mantiene en el cuerpo del texto, mientras que la interpretación se deja para nota. Así no se pierde la imagen original ni se cierra prematuramente el sentido.
  doctrine_reference: Uso profético de la metáfora pastoral en Jeremías
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que corrigió הִשְׂכִּילוּ de una paráfrasis centrada en prosperar a «have not acted wisely». La redacción española refleja esa preferencia semántica sin perder la posible resonancia de éxito implícita en el verbo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, en coherencia con el estándar español del proyecto.
  - Se conserva la metáfora de «pastores» en el texto principal y se aclara su posible sentido figurado en nota.
  - «Se ha dispersado» reproduce el resultado colectivo del singular hebreo מַרְעִיתָם.
