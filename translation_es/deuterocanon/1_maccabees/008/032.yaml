review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional y el sentido jurídico-militar general del griego: ἐὰν… ἐντύχωσιν κατὰ σοῦ se transmite adecuadamente como una acción hostil contra el destinatario, y διὰ τῆς θαλάσσης καὶ διὰ τῆς ξηρᾶς está bien vertido como «por mar y por tierra». Sin embargo, el texto principal español sigue la revisión inglesa auditada («contra ellos») en vez de preservar la redacción griega atestiguada πολεμήσομέν σε («te combatiremos / lucharemos contra ti»), mientras la nota sí reconoce esa dificultad. Dado que las instrucciones priorizan la evidencia fuente y la decisión teológica inglesa documentada de preservar la tensión en el texto principal, el español debe alinear el texto principal con el griego transmitido y dejar la explicación en nota.'
  spanish_quality_summary: El español es claro y de registro apropiado. No obstante, «ejecutaremos juicio sobre ellos» suena poco natural en español bíblico moderno; una formulación como «ejecutaremos sentencia contra ellos» o «dictaremos/ejecutaremos juicio contra ellos» sería más idiomática. También conviene mantener la concordancia entre el texto principal y la nota textual. La fluidez mejora sustituyendo «sobre ellos» por «contra ellos».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). Las decisiones para «todavía», «presentan cargos», y «por mar y por tierra» son sólidas. El principal desajuste es metodológico: la frase final no preserva en el texto principal la lectura griega documentada, pese a que la nota la reconoce.'
  issues:
  - severity: high
    issue: La cláusula final del texto principal cambia el objeto griego de singular a plural.
    rationale: El griego dice πολεμήσομέν σε, literalmente «lucharemos contra ti / te combatiremos». El borrador pone «contra ellos», lo cual resuelve la dificultad contextual en vez de preservarla. La nota textual muestra que el problema fue advertido, por lo que el texto principal debe reflejar la lectura transmitida y la nota explicar la tensión.
  - severity: medium
    issue: «Ejecutaremos juicio sobre ellos» es poco natural en español.
    rationale: Aunque intenta seguir «execute judgment», en español suena calcado. «Ejecutaremos sentencia contra ellos» conserva la fuerza judicial y mejora la legibilidad.
  - severity: low
    issue: La nota está anclada en «ti», pero explica una dificultad que pertenece realmente a la cláusula final.
    rationale: El marcador puede mantenerse por economía editorial, pero idealmente estaría junto a la cláusula final. Aun así, no es imprescindible si solo se hace una reparación mínima.
  revised_spanish_text: Si todavía presentan cargos contra ti[a], ejecutaremos sentencia contra ellos, y lucharemos contra ti por mar y por tierra.
