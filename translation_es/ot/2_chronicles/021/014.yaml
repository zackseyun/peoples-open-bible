translation:
  language: es
  text: He aquí[a], Yahvé está golpeando a tu pueblo, a tus hijos, a tus esposas y a todas tus posesiones con una gran plaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «golpea ... con una gran plaga»; el participio hebreo puede expresar una acción inminente o en curso, y מַגֵּפָה puede significar plaga o un golpe/aflicción severo divinamente infligido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  - Atiende
  lexicon: HALOT
  rationale: La fórmula introduce una घोषणा profética solemne y de atención inmediata. «Mira» conserva la fuerza exhortativa en un español natural y público; «He aquí» sería más tradicional, pero menos vivo para esta línea de anuncio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» mantiene el Tetragrama en una forma reverente y reconocible, evitando la sustitución por un título genérico.
- source_word: נֹגֵף
  english_pob_choice: is striking
  chosen_spanish: está golpeando
  alternatives_spanish:
  - está golpeando
  - está hiriendo
  - está castigando
  lexicon: HALOT
  rationale: El participio en contexto profético comunica acción en curso e inminente. «Está golpeando» conserva la fuerza verbal de נֹגֵף y permite mantener la imagen de un golpe divino sin forzar una paráfrasis interpretativa.
- source_word: מַגֵּפָה גְדוֹלָה
  english_pob_choice: with a great plague
  chosen_spanish: con una gran plaga
  alternatives_spanish:
  - con una gran plaga
  - con un gran castigo
  - con una gran aflicción
  lexicon: HALOT
  rationale: «Plaga» es la opción principal porque מַגֵּפָה puede designar pestilencia o un golpe devastador enviado por Dios. Se conserva «gran» para reflejar גְדוֹלָה y la intensidad del juicio.
- source_word: בְּעַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - a tu pueblo
  - contra tu pueblo
  - entre tu pueblo
  lexicon: HALOT
  rationale: En español, el complemento directo con «golpear» transmite mejor el objeto afectado mediante «a tu pueblo». Se evita «contra» porque añade una relación no explícita en la forma hebrea.
- source_word: וּבְבָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos
  - a tus varones
  - a tus hijos varones
  lexicon: HALOT
  rationale: Aunque בנים es masculimo plural, en español «hijos» funciona de manera natural y puede abarcar descendencia masculina en una enumeración familiar. Se evita «varones» por resultar excesivamente marcado y poco idiomático aquí.
- source_word: וּבְנָשֶׁיךָ
  english_pob_choice: your wives
  chosen_spanish: a tus esposas
  alternatives_spanish:
  - a tus esposas
  - a tus mujeres
  - a tus mujeres casadas
  lexicon: HALOT
  rationale: «Esposas» expresa con claridad el sentido relacional de נָשִׁים en este contexto posesivo. «Mujeres» sería ambiguo en español y menos preciso.
- source_word: וּבְכָל רְכוּשֶׁךָ
  english_pob_choice: and all your possessions
  chosen_spanish: y todas tus posesiones
  alternatives_spanish:
  - y todas tus posesiones
  - y todos tus bienes
  - y toda tu propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ refiere al conjunto de bienes/posesiones. «Posesiones» preserva la amplitud del término y suena natural en español contemporáneo; se usa «todas» para reflejar el valor totalizador de כָל.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión mantiene el nombre propio del pacto en lugar de un título sustitutorio. «Yahvé» es la forma establecida en el proyecto y evita borrar la referencia directa al Tetragrama en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor aspectual del participio נֹגֵף
  english_pob_reading: is striking
  chosen_spanish_reading: está golpeando
  alternative_spanish_readings:
  - golpea
  - golpeará
  - está hiriendo
  rationale: Se conserva la inmediatez del anuncio profético sin reducirlo a un futuro simple ni convertirlo en una explicación más libre. El presente progresivo en español comunica bien la acción ya en marcha o inminente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tomó como base la revisión más reciente del POB en inglés, que prefirió el valor más inmediato del participio («is striking») frente a una lectura explícita de inminencia. La versión española refleja esa misma decisión de inmediatez, manteniendo además la alternativa léxica para מַגֵּפָה en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se preservó la imagen de «golpear»/«plaga» sin suavizarla a una formulación abstracta.
  - 'La enumeración conserva la progresión del hebreo: pueblo, hijos, esposas y posesiones.'
