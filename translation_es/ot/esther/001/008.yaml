translation:
  language: es
  text: 'Y el beber fue conforme a la ley[a]: no había coacción[b], porque así había instruido el rey a cada oficial de su casa, para hacer según el deseo de cada uno[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la ley»; el término puede significar ley, decreto o reglamento formal.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no había coacción»; es decir, nadie era forzado a beber.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «cada hombre y hombre», una expresión distributiva que significa cada individuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁתִיָּה
  english_pob_choice: And the drinking
  chosen_spanish: Y la bebida
  alternatives_spanish:
  - Y el beber
  - Y el acto de beber
  - Y la bebida del banquete
  lexicon: HALOT
  rationale: El sustantivo designa la bebida o el beber en el contexto del banquete. «La bebida» conserva la referencia concreta sin ampliar innecesariamente a todo el banquete.
- source_word: כַדָּת
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - conforme al reglamento
  - de acuerdo con la norma
  lexicon: HALOT
  rationale: דָּת en este contexto persa puede significar ley, decreto o regla formal. «Conforme a la ley» comunica bien la idea de una disposición establecida, sin perder la posible amplitud del término.
- source_word: אֵין אֹנֵס
  english_pob_choice: there was no compulsion
  chosen_spanish: no había coacción
  alternatives_spanish:
  - nadie era obligado
  - no había forzamiento
  - no se forzaba a nadie
  lexicon: HALOT
  rationale: La frase expresa ausencia de presión o imposición. «No había coacción» mantiene el valor nominal del hebreo y su fuerza jurídica o administrativa.
- source_word: יִסַּד
  english_pob_choice: had instructed
  chosen_spanish: había instruido
  alternatives_spanish:
  - había ordenado
  - había establecido
  - había dispuesto
  lexicon: HALOT
  rationale: En este marco administrativo, el verbo apunta a fijar una instrucción o disposición. «Había instruido» sigue de cerca el matiz del audit trail inglés y suena natural en español.
- source_word: עַל כָּל רַב בֵּיתוֹ
  english_pob_choice: every official of his household
  chosen_spanish: a cada oficial de su casa
  alternatives_spanish:
  - a cada jefe de su casa
  - a cada administrador de su casa
  - a cada principal de su casa
  lexicon: HALOT
  rationale: רַב es literalmente «grande / jefe», pero aquí se refiere a funcionarios o responsables del entorno real. «Oficial de su casa» refleja la función administrativa sin imponer un término más específico de lo que permite el contexto.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para actuar
  - para llevar a cabo
  - para proceder
  lexicon: HALOT
  rationale: El infinitivo es directo. «Para hacer» conserva la relación con lo siguiente y evita una paráfrasis innecesaria.
- source_word: כִּרְצוֹן
  english_pob_choice: according to the desire of
  chosen_spanish: según el deseo de
  alternatives_spanish:
  - conforme al deseo de
  - según la voluntad de
  - de acuerdo con la preferencia de
  lexicon: HALOT
  rationale: רָצוֹן expresa lo que alguien quiere o prefiere. «Deseo» funciona bien en español y mantiene el matiz de preferencia personal.
- source_word: אִישׁ וָאִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  - uno y otro hombre
  lexicon: HALOT
  rationale: La expresión distributiva hebrea significa «cada individuo». Se conserva el masculino singular como en el original, siguiendo la decisión del POB inglés de no neutralizarla sin necesidad.
translation_notes:
  revision_awareness: 'Seguí el POB inglés revisado con «had instructed» como guía para reflejar una instrucción real en un marco administrativo, y mantuve las tres notas léxicas donde el inglés preserva la tensión del hebreo: la amplitud de דָּת, la fuerza nominal de אֵין אֹנֵס y el distributivo אִישׁ וָאִישׁ. En español, la opción «conforme a la ley» conserva esa amplitud mejor que una traducción demasiado rígida como «reglamento», mientras que «coacción» comunica la ausencia de imposición sin suavizar el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige; aquí no aparece.
  - Se evita «SEÑOR» porque no corresponde a este versículo.
  - «Ley» se emplea como término amplio para דָּת, sin cerrar el sentido a un código jurídico moderno.
  - «Oficial» refleja la función cortesana de רַב en este contexto, sin pasar a «siervo» o «administrador» como lectura demasiado específica.
  - La puntuación con dos puntos conserva la relación explicativa entre la norma del banquete y la ausencia de coacción.
