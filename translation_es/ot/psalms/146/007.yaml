translation:
  language: es
  text: que hace justicia a los oprimidos[a], que da pan a los hambrientos. Yahvé libera a los prisioneros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio para los oprimidos».
    reason: lexical_alternative
  - marker: b
    text: O «los que están atados».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: executes
  chosen_spanish: hace
  alternatives_spanish:
  - ejecuta
  - realiza
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción continua o característica. En español, «hace justicia» conserva la naturalidad y el valor aspectual sin sonar forzado. «Ejecuta» sería más técnico y menos idiomático en esta construcción.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este contexto, la idea es rectificar la opresión y hacer valer el derecho; «justicia» comunica mejor esa fuerza que «juicio», que en español puede inclinarse demasiado hacia condena o veredicto.
- source_word: לָעֲשׁוּקִים
  english_pob_choice: for the oppressed
  chosen_spanish: a los oprimidos
  alternatives_spanish:
  - por los oprimidos
  - para los oprimidos
  lexicon: HALOT
  rationale: El participio pasivo se refiere a personas sufrientes bajo opresión. «A los oprimidos» mantiene la referencia personal y funciona de manera natural con «hace justicia» en español.
- source_word: נֹתֵן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - provee
  - entrega
  lexicon: HALOT
  rationale: El verbo expresa una acción habitual de Dios. «Da» es la equivalencia más directa y sobria, sin añadir matiz de provisión que no está explícito en el hebreo.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pan». En español, «pan» preserva el metonímico concreto y no generaliza innecesariamente a «alimento» o «comida».
- source_word: לָרְעֵבִים
  english_pob_choice: to the hungry
  chosen_spanish: a los hambrientos
  alternatives_spanish:
  - para los hambrientos
  - a los que tienen hambre
  lexicon: HALOT
  rationale: El sustantivo/adjetivo substantivado designa a personas que padecen hambre. «Hambrientos» es breve, claro y conserva el énfasis humano del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: en el texto principal se usa «Yahvé», transliteración del nombre divino, en lugar de sustituirlo por un título.'
- source_word: מַתִּיר
  english_pob_choice: frees
  chosen_spanish: libera
  alternatives_spanish:
  - desata
  - suelta
  lexicon: HALOT
  rationale: El verbo literalmente puede significar desatar o soltar. En este contexto con «presos», «libera» comunica con claridad el resultado de la acción divina y mantiene el registro natural.
- source_word: אֲסוּרִים
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los prisioneros
  - los cautivos
  - los que están atados
  lexicon: HALOT
  rationale: El término puede referirse a personas atadas o encarceladas. «Los presos» es la opción más directa y comprensible en español, sin perder la imagen de estar restringidos.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso nombra directamente al Dios del pacto. Conforme a la política del proyecto para el Tetragrámaton, se translitera el nombre divino como «Yahvé» y no se lo reemplaza por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audito inglés mantiene el texto en estado estable (no hay revisiones aplicadas) y la evaluación cruzada es de alto acuerdo. La versión española sigue esa lectura estable, preservando las dos alternativas léxicas documentadas en el aparato inglés: מִשְׁפָּט como «justicia/juicio» y אֲסוּרִים como «presos/atados».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con la política del proyecto para יְהוָה.
  - Se prefirió «justicia» sobre «juicio» por el contexto de cuidado al oprimido.
  - 'Se conservó el paralelismo breve de los miembros hebreos con verbos simples: «hace», «da», «libera».'
  - Se evitó «Señor» como sustitución del nombre divino, ya que el texto fuente usa explícitamente el Tetragrámaton.
