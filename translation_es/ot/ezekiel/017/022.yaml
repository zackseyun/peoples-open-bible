translation:
  language: es
  text: 'Así dice el Señor Yahvé: Yo mismo tomaré de la cima del cedro alto y lo pondré[a]. De la punta de sus brotes tiernos arrancaré yo mismo un retoño tierno[b], y yo mismo lo plantaré sobre un monte alto y elevado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de la corona del cedro’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘un tierno’; es decir, un brote o vástago tierno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: La combinación de título soberano + nombre divino se reproduce en español con ‘el Señor Yahvé’. ‘Señor Dios’ oscurecería el nombre propio; ‘Yahvéh’ no es la forma habitual en español bíblico del proyecto. La elección mantiene la distinción entre אֲדֹנָי y יְהוִה sin sustituir el nombre por una convención de máscara.
- source_word: מִצַּמֶּרֶת
  english_pob_choice: from the top
  chosen_spanish: de la cima
  alternatives_spanish:
  - de la copa
  - de la corona
  lexicon: HALOT
  rationale: En este contexto arbóreo, צמרת indica la parte superior del árbol. ‘Cima’ comunica con claridad la idea de lo más alto sin forzar una imagen técnica; ‘copa’ o ‘corona’ son posibles, pero menos transparentes aquí.
- source_word: הָאֶרֶז הָרָמָה
  english_pob_choice: the lofty cedar
  chosen_spanish: el cedro alto
  alternatives_spanish:
  - el cedro elevado
  - el cedro loftoso
  lexicon: HALOT
  rationale: אֶרֶז es ‘cedro’. רָמָה describe altura/elevación; en español, ‘alto’ funciona de modo natural y preserva la imagen poética. ‘Lofty’ no tiene un equivalente idiomático único aquí, y ‘elevado’ puede sonar más pesado sin añadir precisión.
- source_word: וְנָתָתִּי
  english_pob_choice: and set it out
  chosen_spanish: y lo pondré a un lado
  alternatives_spanish:
  - y lo colocaré
  - y lo estableceré
  lexicon: HALOT
  rationale: El inglés POB entiende aquí una acción hortícola previa a la plantación. En español, ‘poner a un lado’ comunica el gesto de apartar/colocar para su posterior desarrollo, manteniendo la secuencia agrícola. Se evita ‘plantar’ aún porque ese verbo aparece explícitamente después.
- source_word: מֵרֹאשׁ יֹנְקוֹתָיו
  english_pob_choice: from the tip of its young shoots
  chosen_spanish: de la punta de sus brotes tiernos
  alternatives_spanish:
  - de la cima de sus brotes jóvenes
  - de la punta de sus retoños
  lexicon: HALOT
  rationale: רֹאשׁ se expresa naturalmente como ‘punta’ en un brote. יֹנְקוֹתיו se rinde como ‘sus brotes tiernos’ para conservar la imagen botánica sin sobrecargarla con terminología técnica.
- source_word: רַךְ
  english_pob_choice: a tender one
  chosen_spanish: un retoño tierno
  alternatives_spanish:
  - un brote tierno
  - una ramita tierna
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en hebreo. En español, ‘retoño tierno’ preserva la cualidad y ofrece un antecedente claro y natural para la acción de ‘sacar/pluck’. ‘Brote tierno’ también sería posible, pero ‘retoño’ suena más orgánico en la metáfora de replantación.
- source_word: אֶקְטֹף
  english_pob_choice: will pluck
  chosen_spanish: sacaré
  alternatives_spanish:
  - arrancaré
  - cortaré
  lexicon: HALOT
  rationale: Aunque el verbo puede ser ‘arrancar/pluck’, en español ‘sacar’ aquí evita una dureza excesiva y funciona con el objeto vegetal. ‘Arrancaré’ transmite más fuerza, pero puede sonar más violento de lo que exige la imagen; ‘sacaré’ conserva la idea de extracción.
- source_word: וְשָׁתַלְתִּי
  english_pob_choice: and I myself will plant it
  chosen_spanish: y yo mismo lo plantaré
  alternatives_spanish:
  - y yo lo plantaré
  - y yo mismo lo trasplantaré
  lexicon: HALOT
  rationale: ‘Plantar’ es el verbo normal y directo. Se conserva el énfasis del pronombre explícito con ‘yo mismo’, como hace el inglés POB con ‘I myself’. ‘Trasplantar’ sería interpretativo y no necesario.
- source_word: עַל הַר גָּבֹהַ וְתָלוּל
  english_pob_choice: on a high and lofty mountain
  chosen_spanish: sobre un monte alto y elevado
  alternatives_spanish:
  - en un monte alto y prominente
  - sobre un monte alto y encumbrado
  lexicon: HALOT
  rationale: ‘Monte’ es más natural en español bíblico para una altura prominente que ‘montaña’ en este registro poético. ‘Alto y elevado’ reproduce la duplicación hebrea sin perder solemnidad.
- source_word: אָ֗נִי ... אָ֔נִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo en persona
  lexicon: HALOT
  rationale: La repetición del pronombre explicita énfasis. ‘Yo mismo’ es la forma más clara y digna en español para conservar esa insistencia sin artificio.
theological_decisions:
- issue: Representación del Tetragrámaton dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: Se conserva el nombre divino como nombre propio ‘Yahvé’, conforme al estándar del proyecto, y no se lo enmascara con ‘SEÑOR’. El compuesto mantiene la relación entre el título soberano y el nombre del pacto, que en hebreo está explícita en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene el sentido hortícola con dos decisiones ya estabilizadas: la lectura de צמרת como ‘top/crown’ y de רַךְ como sustantivo (‘a tender one’). La versión española conserva esas tensiones con un español natural: ‘cima’ / ‘retoño tierno’, sin diluir el énfasis del hebreo ni introducir una paráfrasis doctrinal. No hubo revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma del nombre divino, coherente con el estándar del proyecto.
  - Se conserva el paralelismo y la insistencia pronominal con ‘yo mismo’.
  - ‘Monte’ se usa para preservar el tono bíblico y la imagen elevada sin alejarse del español actual.
  - Las notas al pie señalan alternativas legítimas donde el hebreo permite más de una lectura botánica o topográfica.
