translation:
  language: es
  text: Josafat hizo barcos de Tarsis para ir a Ofir en busca de oro[a], pero no hicieron el viaje[b], porque los barcos naufragaron en Ezión-geber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «barcos de Tarsis», posiblemente una clase de grandes naves de alta mar más que barcos procedentes literalmente de Tarsis.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no fue» (singular); el sentido es colectivo y se refiere a la flota.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עשר
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - preparó
  - construyó
  lexicon: HALOT
  rationale: El texto consonántico se entiende aquí como un verbo de acción con Josafat como sujeto; en español, «hizo» comunica de forma natural la idea de preparar o disponer la flota sin añadir más de lo que la fuente permite.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: ships of Tarshish
  chosen_spanish: barcos de Tarsis
  alternatives_spanish:
  - barcos de Tarsis[a]
  - naves de Tarsis
  - barcos tarsisitas
  lexicon: HALOT
  rationale: Conservo la construcción de pertenencia/asociación del hebreo. «Barcos de Tarsis» es claro y fiel; «naves» también sería posible, pero «barcos» es más natural en español actual. La nota recoge la posible idea de una clase de embarcaciones grandes, no necesariamente procedentes de Tarsis.
- source_word: לָלֶכֶת אוֹפִירָה
  english_pob_choice: to go to Ophir
  chosen_spanish: para ir a Ofir
  alternatives_spanish:
  - para navegar a Ofir
  - para viajar a Ofir
  lexicon: HALOT
  rationale: El infinitivo con finalidad expresa propósito y destino. «Ir a» sigue de cerca la estructura hebrea y funciona bien en español; «navegar a» explicitaría el medio, pero no está exigido por el texto.
- source_word: לַזָּהָב
  english_pob_choice: for gold
  chosen_spanish: por oro
  alternatives_spanish:
  - para obtener oro
  - en busca de oro
  lexicon: HALOT
  rationale: La preposición ל marca finalidad; en español, «por oro» transmite la motivación del viaje con concisión. «Para obtener oro» explicita el objetivo, pero añade una glosa interpretativa que la forma breve no requiere.
- source_word: וְלֹא הָלָךְ
  english_pob_choice: but they did not go
  chosen_spanish: pero no fueron
  alternatives_spanish:
  - pero no llegó a ir
  - pero no partieron
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en singular, el contexto es colectivo y se refiere a la flota. En español, el plural es el modo más natural para evitar que parezca referirse a Josafat personalmente.
- source_word: נשברה
  english_pob_choice: were wrecked
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - se rompieron
  - quedaron destrozados
  - encallaron
  lexicon: HALOT
  rationale: El nifal de שבר significa «ser quebrado/roto». En un contexto marítimo, la idea es una pérdida catastrófica de los barcos; «fueron destruidos» comunica ese resultado sin forzar una imagen técnica específica que el hebreo no explicita.
- source_word: בְּעֶצְיוֹן גָּבֶר
  english_pob_choice: at Ezion-geber
  chosen_spanish: en Ezión-geber
  alternatives_spanish:
  - en Ezion-geber
  - junto a Ezión-geber
  lexicon: HALOT
  rationale: El hebreo usa ב para ubicación; «en» es natural en español para un lugar portuario. Mantengo la transliteración del topónimo con acento gráfico según uso editorial en español.
theological_decisions:
- issue: Referencia a Yahvé implícita en el relato histórico
  english_pob_reading: No explicit divine-name issue appears in the verse; the statement is purely narrative.
  chosen_spanish_reading: No se introduce ninguna referencia explícita a Yahvé en el texto español, porque el versículo no la contiene.
  alternative_spanish_readings:
  - Añadir una referencia devocional implícita
  - Sustituir el relato por una formulación interpretativa
  rationale: El versículo describe una expedición fallida de Josafat; no hay motivo textual para insertar lenguaje teológico adicional. Mantener el relato desnudo preserva la transparencia frente al hebreo.
  doctrine_reference: Principio de suficiencia textual y no ampliación interpretativa
translation_notes:
  revision_awareness: El cotejo más reciente indica alto acuerdo entre el texto fuente y la auditoría inglesa; no se reportan cambios aplicados en la revisión más reciente, y esta versión española sigue la lectura aprobada sin introducir expansiones.
  spanish_consistency_notes:
  - He mantenido «Josafat» sin acento, de acuerdo con la forma usual en español bíblico.
  - He usado «Ofir» y «Ezión-geber» como transliteraciones estables y legibles en español.
  - He conservado la ambigüedad de «barcos de Tarsis» mediante nota, en lugar de resolverla de manera interpretativa en el cuerpo del texto.
