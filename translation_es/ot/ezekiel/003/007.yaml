translation:
  language: es
  text: Pero la casa de Israel no querrá escucharte, porque no querrán escucharme; pues toda la casa de Israel es dura de frente[a] y obstinada de corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de rostro duro’ o ‘de frente rígida’; el hebreo presenta un modismo que describe obstinación sin vergüenza.
    reason: lexical_alternative
  - marker: b
    text: O ‘de corazón duro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵית יִשְׂרָאֵל
  english_pob_choice: But the house of Israel
  chosen_spanish: Pero la casa de Israel
  alternatives_spanish:
  - Y la casa de Israel
  - Mas la casa de Israel
  lexicon: HALOT
  rationale: Conservo la expresión corporativa 'casa de Israel' para mantener el matiz pactual y colectivo del hebreo. El ו inicial se traduce adversativamente como 'Pero' porque el contexto contrasta a Israel con los pueblos que sí podrían escuchar.
- source_word: יֹאבוּ / אֹבִים
  english_pob_choice: will not be willing / are not willing
  chosen_spanish: no querrá / no quieren
  alternatives_spanish:
  - no estarán dispuestos a
  - no consentirán
  - se negarán a
  lexicon: HALOT
  rationale: אָמַבָה expresa disposición o voluntad. 'Querrá' y 'quieren' conservan esa fuerza volitiva en español mejor que 'refusará' o 'obedecerá', y reflejan el contraste entre la disposición futura del pueblo y su estado actual.
- source_word: לִשְׁמֹעַ אֵלֶיךָ
  english_pob_choice: to listen to you
  chosen_spanish: escucharte
  alternatives_spanish:
  - oírte
  - prestarte atención
  lexicon: HALOT
  rationale: שׁמע con אֶל significa 'escuchar/escuchar a'. 'Escucharte' es natural en español y mantiene el matiz relacional de prestar atención a un mensajero profético sin forzar el sentido de 'obedecer'.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La relación causal del hebreo se expresa con claridad mediante 'porque'. En la segunda cláusula causal, 'pues' mantiene la explicación encadenada con un tono sobrio y fluido.
- source_word: לִשְׁמֹעַ אֵלַי
  english_pob_choice: to listen to me
  chosen_spanish: escucharme
  alternatives_spanish:
  - oírme
  - prestarse a escucharme
  lexicon: HALOT
  rationale: 'Repito el mismo campo semántico que en la primera mitad para conservar el paralelismo retórico: rechazar al profeta equivale a rechazar la palabra de Yahvé.'
- source_word: כִּי כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: for all the house of Israel
  chosen_spanish: pues toda la casa de Israel
  alternatives_spanish:
  - porque toda la casa de Israel
  - ya que toda la casa de Israel
  lexicon: HALOT
  rationale: '''Toda la casa de Israel'' reproduce el alcance colectivo y no lo reduce a un grupo menor. ''Pues'' introduce la explicación con naturalidad en español.'
- source_word: חִזְקֵי מֵצַח
  english_pob_choice: hard of forehead
  chosen_spanish: de frente dura
  alternatives_spanish:
  - de frente dura[a]
  - de rostro duro
  - de testa dura
  lexicon: HALOT
  rationale: El hebreo usa un idiomático 'duros/fuertes de frente'. 'De frente dura' conserva la imagen corporal sin volverla una paráfrasis. En español evita un calco demasiado áspero como 'duros de frente' y mantiene la obstinación shameless del idioma original.
- source_word: וּקְשֵׁי לֵב
  english_pob_choice: stubborn of heart
  chosen_spanish: de corazón obstinado
  alternatives_spanish:
  - de corazón duro[b]
  - tercos de corazón
  - de corazón duro y obstinado
  lexicon: HALOT
  rationale: קשה de לב señala dureza obstinada interior. 'De corazón obstinado' comunica esa resistencia del querer sin caer en repetición excesiva de 'duro' y sin perder la metáfora del corazón como centro de la voluntad.
- source_word: הֵמָּה
  english_pob_choice: are
  chosen_spanish: es
  alternatives_spanish:
  - son
  - están
  lexicon: HALOT
  rationale: El predicado nominal singular colectivo en español puede sonar más natural con 'es' referido a 'toda la casa de Israel', preservando el carácter sentencioso del hebreo.
theological_decisions:
- issue: Indictment of the whole house of Israel
  english_pob_reading: Retain the collective expression 'all the house of Israel' without softening the universal statement.
  chosen_spanish_reading: Conservar 'toda la casa de Israel' sin rebajar la amplitud de la acusación.
  alternative_spanish_readings:
  - muchos de la casa de Israel
  - los dirigentes de Israel
  rationale: El hebreo atribuye la dureza a la totalidad corporativa nombrada en el versículo. Traducirla así preserva la tensión teológica del texto profético y evita restringir el alcance a un subgrupo no mencionado.
  doctrine_reference: Preservar la tensión teológica del texto profético sin suavizarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo masorético y concuerda con la evaluación editorial inglesa: mantiene el paralelismo entre escuchar al profeta y escuchar a Yahvé, y conserva la acusación corporativa plena sin atenuarla. No se detectaron revisiones aplicadas en el expediente inglés reciente, así que esta versión refleja el estado estable del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' como fórmula corporativa estable.
  - '''Escuchar'' reproduce el valor relacional de שׁמע con אֶל sin convertirlo en ''obedecer''.'
  - Se evita 'SEÑOR' para preservar el nombre divino donde el contexto apunta a Yahvé implícito en la voz profética.
  - '''De frente dura'' y ''de corazón obstinado'' conservan el paralelismo idiomático sin normalizarlo demasiado.'
  - La concordancia verbal se adapta al español para que la cláusula final sea idiomática y clara.
