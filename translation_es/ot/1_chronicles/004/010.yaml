translation:
  language: es
  text: 'Y Jabez invocó al Dios de Israel, diciendo: «¡Si de verdad me bendices, y amplías mi territorio, y que tu mano esté conmigo[a], y me libras del daño[b] para que no sufra dolor[c]!». Y Dios le concedió lo que pidió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «tu mano esté conmigo» conserva el modismo hebreo de la mano divina como presencia, ayuda y poder.
    reason: idiom_explanation
  - marker: b
    text: O «del mal». El hebreo רָעָה puede referirse al mal moral o a una calamidad dañina; aquí el contexto favorece la idea de protección contra el daño.
    reason: lexical_alternative
  - marker: c
    text: La expresión «para que no sufra dolor» hace eco de la explicación del nombre de Jabez en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called on
  chosen_spanish: invocó
  alternatives_spanish:
  - clamó a
  - llamó a
  lexicon: HALOT
  rationale: En este contexto de oración, el verbo expresa una apelación dirigida a Dios. «Invocó» comunica bien la acción reverente sin perder el sentido de petición.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel,
  - al Dios de Israelita
  lexicon: HALOT
  rationale: La construcción posesiva es directa; «al Dios de Israel» conserva la identificación pactal y suena natural en español.
- source_word: אִם בָּרֵךְ תְּבָרֲכֵנִי
  english_pob_choice: If you would indeed bless me
  chosen_spanish: Si me bendices de verdad
  alternatives_spanish:
  - Si ciertamente me bendices
  - Oh, si me bendijeras
  lexicon: HALOT
  rationale: La infinitivo absoluto con verbo finito intensifica la petición. «De verdad» refleja esa fuerza enfática sin volver la frase pesada o arcaica.
- source_word: וְהִרְבִּיתָ אֶת גְּבוּלִי
  english_pob_choice: and enlarge my territory
  chosen_spanish: y amplías mi territorio
  alternatives_spanish:
  - y aumentas mi territorio
  - y ensanchas mi frontera
  lexicon: HALOT
  rationale: «Territorio» comunica de forma clara el sentido espacial de גְּבוּל en este contexto. «Amplías» conserva la idea de expansión sin introducir una metáfora ajena.
- source_word: וְהָיְתָה יָדְךָ עִמִּי
  english_pob_choice: and let your hand be with me
  chosen_spanish: y tu mano está conmigo
  alternatives_spanish:
  - y tu mano esté conmigo
  - y que tu mano esté conmigo
  lexicon: HALOT
  rationale: La imagen de la mano divina se conserva. En español, la forma directa «está conmigo» mantiene la cercanía idiomática y la fuerza de presencia y ayuda.
- source_word: וְעָשִׂיתָ מֵּרָעָה
  english_pob_choice: and keep me from harm
  chosen_spanish: y me libras de la mal[a]
  alternatives_spanish:
  - y me apartas del mal
  - y me preservas de la desgracia
  - y me libras del mal
  lexicon: HALOT
  rationale: La frase hebrea es difícil y admite tensión entre «mal» moral y calamidad dañina. «La mal[a]» mantiene abierta la alternativa léxica principal y, en esta oración, permite leer la petición como libramiento de daño.
- source_word: לְבִלְתִּי עָצְבִּי
  english_pob_choice: so that I may not suffer pain
  chosen_spanish: para que no sufra dolor
  alternatives_spanish:
  - para no sufrir dolor
  - para que no me aflijan
  - para que no me duela
  lexicon: HALOT
  rationale: El sustantivo verbal apunta a dolor, pena o aflicción. «Sufra dolor» conserva el eco con el nombre de Jabez y expresa bien el resultado buscado.
- source_word: וַיָּבֵא אֱלֹהִים אֵת אֲשֶׁר שָׁאָל
  english_pob_choice: And God granted what he asked
  chosen_spanish: Y Dios le concedió lo que pidió
  alternatives_spanish:
  - Y Dios hizo venir lo que pidió
  - Y Dios le dio lo que pidió
  lexicon: HALOT
  rationale: El verbo final expresa que Dios hizo acontecer o concedió la petición. «Concedió» es idiomático y fiel al sentido.
theological_decisions:
- issue: Sentido de גְּבוּל en la petición de Jabez
  english_pob_reading: Rendered in ordinary territorial terms without importing prosperity-theology implications.
  chosen_spanish_reading: Se traduce como «territorio» sin convertirlo en una fórmula de éxito o prosperidad.
  alternative_spanish_readings:
  - esfera de influencia
  - frontera
  rationale: El hebreo apunta primero a un aumento espacial o de posesión. «Territorio» evita tanto la abstracción moderna como una aplicación teológica no explícita en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de רָעָה en la petición
  english_pob_reading: Rendered as 'harm' rather than the more morally charged 'evil' in the main text.
  chosen_spanish_reading: Se refleja con «la mal[a]» y una nota breve para mantener la ambigüedad entre mal moral y daño adverso.
  alternative_spanish_readings:
  - mal
  - daño
  - desgracia
  rationale: El contexto inmediato favorece libramiento de daño o calamidad, pero el término hebreo también puede tener carga moral. La traducción conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el hebreo, sin cambios respecto del último pase revisado; se conserva la decisión de traducir גְּבוּל como un término territorial y de mantener la tensión semántica de רָעָה con nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece explícitamente el Tetragrámaton; aquí el pasaje habla de «Dios» y «Dios de Israel», por lo que no aplica.
  - Se mantiene «Dios» para אֱלֹהִים y «mano» para יָד como imagen idiomática de ayuda/poder.
  - «Concedió» preserva el carácter de respuesta divina sin sobrecargar el verbo con interpretaciones doctrinales adicionales.
