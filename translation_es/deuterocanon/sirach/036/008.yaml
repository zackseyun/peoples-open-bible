translation:
  language: es
  text: Por el conocimiento de Yahvé fueron distinguidos[a], y él cambió los tiempos y las fiestas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron separados» o «fueron puestos aparte». El verbo pasivo griego puede denotar diferenciación o separación; el sujeto queda implícito en el griego.
    reason: lexical_alternative
  - marker: b
    text: O «tiempos señalados» o «fiestas». El griego puede aludir a tiempos establecidos o a celebraciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γνώσει
  english_pob_choice: By the knowledge
  chosen_spanish: Por el conocimiento
  alternatives_spanish:
  - En el conocimiento
  - Mediante el conocimiento
  lexicon: LSJ
  rationale: La preposición ἐν con un sustantivo abstracto puede expresar medio o esfera. En español, «por el conocimiento» comunica bien el valor instrumental sin sonar demasiado rígido, y mantiene la relación causal/medial del griego.
- source_word: Κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: Proyecto POB / equivalencia reverencial para יהוה
  rationale: Aunque el griego dice Κυρίου, el contexto de sabiduría judía corresponde al nombre divino y el proyecto pide «Yahvé» como forma principal. «Señor» ocultaría esa referencia y debilitaría la transparencia del texto fuente.
- source_word: διεχωρίσθησαν
  english_pob_choice: were distinguished
  chosen_spanish: fueron distinguidos
  alternatives_spanish:
  - fueron separados
  - fueron puestos aparte
  lexicon: LSJ
  rationale: El pasivo de διαχωρίζω puede significar separar o distinguir. «Fueron distinguidos» conserva la idea de diferenciación sin imponer un sujeto u objeto interpretativo que el griego no explicita.
- source_word: ἠλλοίωσεν
  english_pob_choice: changed
  chosen_spanish: cambió
  alternatives_spanish:
  - alteró
  - varió
  lexicon: LSJ
  rationale: ἀλλοιόω significa hacer diferente o cambiar. «Cambió» es la correspondencia más directa y natural en español, manteniendo el valor general del verbo sin sobredeterminación.
- source_word: καιρούς
  english_pob_choice: times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las estaciones
  - los momentos establecidos
  lexicon: LSJ
  rationale: καιρός puede significar tiempo señalado o momento oportuno. Aquí, en paralelo con ἑορτάς, «los tiempos» conserva la amplitud temporal del griego y deja abierta la posibilidad de tiempos fijados o festivos.
- source_word: ἑορτάς
  english_pob_choice: festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las festividades
  - las fiestas solemnes
  lexicon: LSJ
  rationale: ἑορτή designa fiesta o celebración religiosa. «Fiestas» es fiel, claro y natural en español eclesial; evita estrechar innecesariamente el sentido hacia un tecnicismo litúrgico.
theological_decisions:
- issue: Sujeto implícito del pasivo plural διεχωρίσθησαν
  english_pob_reading: Left implicit as 'they were distinguished' rather than supplying an interpretive object such as days, nations, or heavenly bodies.
  chosen_spanish_reading: Se deja implícito en «fueron distinguidos», sin añadir el referente.
  alternative_spanish_readings:
  - fueron distinguidos los días
  - fueron separados las naciones
  - fueron distinguidos los astros
  rationale: El griego citado presenta un pasivo plural sin un sujeto explícito en esta cláusula. Para no resolver artificialmente la ambigüedad, el español conserva la misma apertura interpretativa que el POB inglés.
  doctrine_reference: Preservar la tensión o ambigüedad textual sin añadir elementos no presentes en la fuente.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «changed times» frente a «altered seasons» para acercarse más a καιρούς. En español, se reflejó con «cambió los tiempos» y se mantuvo la coordinación paralela con «las fiestas».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto para Κυρίου en contexto referencial divino.
  - Se prefirió «fiestas» y no «festivales» porque en español bíblico actual resulta más natural y sigue siendo fiel a ἑορτάς.
  - Se evitó introducir un sujeto como «los días» para no cerrar la ambigüedad del pasivo griego.
  - La puntuación conserva una sola cláusula coordinada como en el griego, sin intensificar el paralelismo más allá de lo necesario.
