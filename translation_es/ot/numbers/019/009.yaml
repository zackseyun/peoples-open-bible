  to: Entonces un hombre limpio recogerá las cenizas de la becerra y las pondrá fuera del campamento, en un lugar limpio; y quedarán guardadas para la congregación de los hijos de Israel, para agua de impureza[a]; es una ofrenda por el pecado[b].
  rationale: Se corrigen los anclajes de notas para que correspondan a las expresiones que explican, se mejora la naturalidad de לְמֵי נִדָּה con «agua de impureza» en el texto principal, y se limpia la puntuación de las notas sin alterar las decisiones léxicas o teológicas sustantivas.
