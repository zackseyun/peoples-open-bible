translation:
  language: es
  text: Pero si tu corazón se desvía, y no escuchas, y eres apartado[a], y te postras ante otros dioses y les sirves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «eres arrastrado» o «eres desviado». El verbo hebreo puede transmitir la idea de ser apartado del camino recto o alejado de la lealtad debida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción es formalmente copulativa, pero en contexto introduce un contraste con la obediencia anterior. «Pero si» conserva mejor la fuerza adversativa natural del pasaje en español.
- source_word: יִפְנֶה לְבָבְךָ
  english_pob_choice: your heart turns away
  chosen_spanish: tu corazón se desvía
  alternatives_spanish:
  - tu corazón se vuelve
  - tu corazón se aparta
  lexicon: HALOT
  rationale: פנה con «corazón» expresa giro interior de lealtad. «Se desvía» comunica el movimiento de apartarse del camino debido sin forzar una paráfrasis más explícita que el hebreo.
- source_word: וְלֹא תִשְׁמָע
  english_pob_choice: and you do not listen
  chosen_spanish: y no escuchas
  alternatives_spanish:
  - y no oyes
  - y no obedeces
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar u obedecer. «No escuchas» conserva la metáfora auditiva y deja implícita la dimensión de obedecer en contexto de pacto.
- source_word: וְנִדַּחְתָּ
  english_pob_choice: and you are drawn away
  chosen_spanish: y eres arrastrado
  alternatives_spanish:
  - y eres llevado lejos
  - y eres desviado
  lexicon: HALOT
  rationale: El nifal de נדח puede expresar ser empujado, arrastrado o apartado. «Eres arrastrado» refleja bien la pasividad de ser movido fuera de la lealtad debida, y mantiene una imagen fuerte sin añadir interpretación extra.
- source_word: וְהִשְׁתַּחֲוִיתָ
  english_pob_choice: and bow down
  chosen_spanish: y te postras
  alternatives_spanish:
  - y te inclinas
  - y te arrodillas
  lexicon: HALOT
  rationale: El verbo denota postración física. «Te postras» preserva la acción corporal que en contexto funciona como adoración, evitando sustituirla directamente por el término más general «adorar».
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: ante otros dioses
  alternatives_spanish:
  - a otros dioses
  - hacia otros dioses
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es «a», en español la escena de postración se expresa con naturalidad como «ante otros dioses». Mantiene la idea de orientación cultual sin perder fluidez.
- source_word: וַעֲבַדְתָּם
  english_pob_choice: and serve them
  chosen_spanish: y los sirves
  alternatives_spanish:
  - y les sirves
  - y los sirves como esclavo
  lexicon: HALOT
  rationale: עבד puede implicar servicio cultual. Aquí «servir» conserva el vínculo léxico y el sentido religioso. Se usa la forma directa «los sirves» para mantener el paralelismo con la serie verbal del hebreo.
theological_decisions:
- issue: Progresión de apostasía y fidelidad de pacto
  english_pob_reading: 'The verse is translated as a sequence: inward turning of heart, refusal to listen, being drawn away, bowing to other gods, and serving them.'
  chosen_spanish_reading: 'El versículo se vierte como una secuencia: desvío interior del corazón, falta de escucha, ser arrastrado, postración ante otros dioses y servicio a ellos.'
  alternative_spanish_readings:
  - 'Interpretar «eres arrastrado» como una acción más voluntaria: «te dejas arrastrar»'
  - Traducir שׁמע como «obedeces» para resaltar la desobediencia del pacto
  rationale: El hebreo presenta un encadenamiento de infidelidad sin exigir expansión interpretativa. La redacción española conserva esa progresión y no introduce conclusiones doctrinales más fuertes que las del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «drawn away» por acercarse mejor al verbo hebreo נדח sin perder naturalidad. La versión española refleja esa misma preferencia mediante «eres arrastrado», manteniendo la pasividad y el matiz de desvío.
  spanish_consistency_notes:
  - Se mantiene «dioses» en plural conforme a אֱלֹהִים אֲחֵרִים.
  - Se conserva el paralelismo verbal del hebreo con una cadena de acciones sucesivas.
  - No se introduce «obedecer» en el texto principal para respetar la ambigüedad de שׁמע y dejarla explicada en nota.
