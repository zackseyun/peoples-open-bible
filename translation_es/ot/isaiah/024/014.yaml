- from: Ellos levantan su voz; gritan de gozo. A la majestad de Yahvé[a], aclaman desde el mar.
  to: Ellos levantan su voz; gritan de gozo. Ante la majestad de Yahvé, aclaman desde el mar[a].
  rationale: Se ajusta una construcción poco natural en español («A la majestad de») a «Ante la majestad de», que comunica mejor el hebreo en contexto poético. También se mueve el marcador de nota a «desde el mar», que es el elemento realmente explicado por la nota léxica.
