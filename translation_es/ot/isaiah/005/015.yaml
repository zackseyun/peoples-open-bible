translation:
  language: es
  text: Y el hombre es abatido[a], y un hombre es humillado, y los ojos de los altivos[b] serán abatidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se inclina ... es rebajado»; el hebreo emplea dos verbos relacionados pero distintos para expresar el abatimiento en paralelo poético.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los ojos de los altivos»; es decir, la mirada orgullosa o encumbrada de personas exaltadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשַּׁח
  english_pob_choice: is brought low
  chosen_spanish: es abatido
  alternatives_spanish:
  - se inclina
  - es humillado
  - es rebajado
  lexicon: HALOT
  rationale: El verbo expresa el ser puesto en una condición baja o de abatimiento. «Es abatido» conserva esa pasiva de juicio y mantiene la imagen de descenso sin convertirla en una mera acción física de inclinarse.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El singular representativo se conserva con «el hombre», como término paralelo a אִישׁ. Evita neutralizar el contraste poético y mantiene la referencia genérica a la humanidad en forma masculina singular.
- source_word: וַיִּשְׁפַּל
  english_pob_choice: is humbled
  chosen_spanish: es humillado
  alternatives_spanish:
  - es abatido
  - es rebajado
  - se humilla
  lexicon: HALOT
  rationale: שׁפל comunica quedar en un estado de bajeza o humillación. «Es humillado» reproduce bien la segunda cola con un matiz distinto del primer verbo, como en el paralelo hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino individualizante. «Un hombre» refleja el paralelismo con אָדָם y no aplana el ritmo poético a un colectivo abstracto.
- source_word: עֵינֵי גְבֹהִים
  english_pob_choice: the eyes of the lofty
  chosen_spanish: los ojos de los altivos
  alternatives_spanish:
  - los ojos de los orgullosos
  - la mirada de los soberbios
  - los ojos de los exaltados
  lexicon: HALOT
  rationale: 'La expresión es literal: «ojos de los altos/altivos». En español, «los altivos» comunica con naturalidad la idea de personas orgullosas o encumbradas, preservando la imagen concreta de los ojos sin perder el sentido moral.'
- source_word: תִּשְׁפַּלְנָה
  english_pob_choice: will be brought low
  chosen_spanish: serán abatidos
  alternatives_spanish:
  - serán humillados
  - serán rebajados
  lexicon: HALOT
  rationale: La forma femenina plural concuerda con «ojos». En español, el plural masculino genérico de «abatidos» funciona con «ojos», y conserva la repetición verbal con el primer miembro del versículo, tal como la revisión inglesa final insistió en mantener el mismo campo verbal.
theological_decisions:
- issue: Paralelismo de dos verbos distintos para el abatimiento humano
  english_pob_reading: And man is brought low, and a man is humbled
  chosen_spanish_reading: Y el hombre es abatido, y un hombre es humillado
  alternative_spanish_readings:
  - Y el hombre se inclina, y un hombre se abaja
  - Y la humanidad es abatida, y una persona es humillada
  rationale: El hebreo usa dos verbos afines pero no idénticos; la traducción española debe preservar esa tensión y no colapsarla en una sola idea. «Abatido» y «humillado» distinguen los matices sin perder el paralelismo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 y §6'
- issue: Imagen de los ojos como metonimia del orgullo humano
  english_pob_reading: the eyes of the lofty
  chosen_spanish_reading: los ojos de los altivos
  alternative_spanish_readings:
  - los ojos de los orgullosos
  - la mirada de los soberbios
  rationale: La expresión hebrea no describe sólo órganos físicos, sino la actitud altanera expresada en la mirada. «Los altivos» permite conservar esa metonimia y la carga moral del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for imagery and figurative language'
translation_notes:
  revision_awareness: La revisión inglesa final corrigió el último miembro para repetir con mayor consistencia la idea de ser «brought low». Por eso el español mantiene también un mismo campo verbal en la última cola («serán abatidos») en lugar de suavizarlo a otra idea distinta.
  spanish_consistency_notes:
  - He mantenido un registro bíblico moderno y digno, evitando fórmulas arcaicas innecesarias.
  - Conservé la triple progresión del versículo y la repetición del campo semántico de abatimiento.
  - Usé «altivos» para reproducir la metonimia hebrea sin recurrir a una glosa explicativa dentro del texto principal.
