revisions:
- from: Cada día te bendeciré[a], y alabaré tu nombre por siempre y para siempre.
  to: Cada día te bendeciré[a][b], y alabaré tu nombre por los siglos de los siglos.
  rationale: 'Se conserva la fidelidad básica del borrador, pero se corrigen tres puntos menores: se añade la nota cultural requerida por la auditoría inglesa sobre «tu nombre», se mejora la fórmula final a un español más idiomático y eclesial («por los siglos de los siglos»), y se arregla la nota de alternativas para que ofrezca opciones reales y naturales. No hace falta adjudicación adicional.'
