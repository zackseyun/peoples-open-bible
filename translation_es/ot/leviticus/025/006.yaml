revisions:
- from: 'Y será para ustedes el sábado de la tierra[a] para comer: para ti, para tu esclavo varón, para tu esclava, para tu jornalero y para tu extranjero residente, que habitan contigo.'
  to: 'Y el producto sabático de la tierra será para ustedes como alimento: para ti, para tu esclavo, para tu esclava, para tu jornalero y para tu extranjero residente[a], que reside contigo.'
  rationale: Se ajusta el texto principal para seguir la decisión auditada de la POB inglesa sobre שַׁבַּת הָאָרֶץ, usando una formulación natural y contextual en español («producto sabático de la tierra») mientras se preserva la opción literal en nota. También se suaviza la concordancia final con «que reside contigo». Se mantiene la distinción jurídica entre «esclavo / esclava» y «jornalero», y no es necesario repetir «varón» porque el contraste con «esclava» ya deja clara la distinción de género en español.
