translation:
  language: es
  text: No temas el decreto de la muerte[a]; recuerda que los de antes y los de después están contigo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «No temas desde la muerte, tu decreto/lote asignado»; el paralelo griego lee «No temas el juicio de la muerte». La traducción principal refleja el sentido combinado más probable.'
    reason: alternative_reading
  - marker: b
    text: Es decir, los anteriores y los posteriores comparten la misma suerte mortal.
    reason: lexical_alternative
  - marker: c
    text: El hebreo de Kahana aquí está más abreviado; el griego ayuda a precisar la frase sobre la muerte.
    reason: textual_variant
lexical_decisions:
- source_word: μὴ εὐλαβοῦ / אל תפחד
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  - No temas con temor
  lexicon: HALOT; LXX εὐλαβέομαι
  rationale: La prohibición expresa una exhortación sobria contra el temor. «No temas» es natural en español, mantiene el tono sapiencial y corresponde bien al imperativo negativo tanto del hebreo como del paralelo griego.
- source_word: κρίμα θανάτου / ממות חקיך
  english_pob_choice: the decree of death
  chosen_spanish: el decreto de la muerte
  alternatives_spanish:
  - la sentencia de muerte
  - el juicio de la muerte
  - el decreto de tu muerte
  lexicon: HALOT; κρίμα
  rationale: La POB en inglés opta por «decree of death» tras valorar la tensión entre el hebreo comprimido y el griego interpretativo. En español, «decreto de la muerte» preserva ese sentido jurídico/apuntado sin añadir el posesivo no explícito del hebreo.
- source_word: זכור
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  lexicon: HALOT
  rationale: Imperativo directo y claro. «Recuerda» es idiomático en español contemporáneo y conserva la fuerza exhortativa del texto sapiencial.
- source_word: ראשנים ואחרנים
  english_pob_choice: those before and those after
  chosen_spanish: los de antes y los de después
  alternatives_spanish:
  - los anteriores y los posteriores
  - los de antes y los posteriores
  - los de antes y los de después
  lexicon: HALOT; προτέρων σου καὶ ἐσχάτων
  rationale: La expresión hebrea/griega contrasta quienes vinieron antes con quienes vendrán después. «Los de antes y los de después» mantiene la amplitud temporal sin forzar «generaciones» ni un referente más específico que el texto no da.
- source_word: עמך
  english_pob_choice: are with you
  chosen_spanish: están contigo
  alternatives_spanish:
  - están con usted
  - comparten tu suerte
  - están junto a ti
  lexicon: HALOT
  rationale: «Contigo» reproduce bien el sentido relacional del hebreo y funciona de forma natural en español. En contexto sapiencial expresa que la misma condición mortal acompaña a todos.
theological_decisions:
- issue: Cómo reflejar la divergencia leve entre el hebreo y el griego respecto del objeto temido
  english_pob_reading: Render the phrase as 'the decree of your death' / later revised to 'the decree of death'
  chosen_spanish_reading: «el decreto de la muerte»
  alternative_spanish_readings:
  - «la sentencia de muerte»
  - «el juicio de la muerte»
  - «el decreto de tu muerte»
  - «no temas la muerte»
  rationale: La evidencia hebrea y el paralelo griego apuntan a una idea de muerte decretada o fijada, no simplemente a la muerte en abstracto. La forma elegida conserva esa tensión textual y evita introducir el posesivo no sustentado por la revisión final.
  doctrine_reference: 'PHILOSOPHY.md: el hebreo de Sirácides es primario cuando está disponible; el griego se usa como control y aclaración donde hay desajuste menor'
- issue: Cómo entender «los de antes y los de después están contigo»
  english_pob_reading: same fate is shared by earlier and later people alike
  chosen_spanish_reading: que la misma condición mortal es compartida por los anteriores y los posteriores
  alternative_spanish_readings:
  - que todos comparten el mismo destino
  - que tus predecesores y sucesores están contigo
  - que los de antes y los de después son como tú
  rationale: La frase no afirma compañía literal en un espacio físico, sino una solidaridad en el destino humano. «Están contigo» deja abierta la metáfora y preserva la lectura de la POB en inglés de una condición compartida.
  doctrine_reference: Sabiduría bíblica / antropología de la mortalidad común
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todos los marcadores de nota directamente en el texto español. La redacción también evita añadir «tu» antes de «muerte», siguiendo la revisión más reciente de la POB en inglés.
  spanish_consistency_notes:
  - Se usa «muerte» con artículo definido en «el decreto de la muerte» para mantener el matiz de un decreto/orden fijado, no una muerte genérica.
  - «Contigo» conserva el valor relacional sin convertir la frase en una explicación demasiado explícita en el cuerpo principal.
  - Los marcadores [a], [b] y [c] aparecen exactamente donde corresponde en el texto para cumplir la trazabilidad de notas.
