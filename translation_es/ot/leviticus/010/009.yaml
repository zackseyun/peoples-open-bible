revisions:
- from: No beberás vino ni bebida fuerte tú y tus hijos contigo, cuando entren en la tienda de reunión[a], para que no mueran[b]. Será un estatuto perpetuo[c] por vuestras generaciones.
  to: Ni tú ni tus hijos contigo beberán vino ni bebida embriagante[a] cuando entren en la tienda de reunión, para que no mueran[b]. Este será un estatuto perpetuo por todas sus generaciones[c].
  rationale: Se corrigió la incoherencia de persona y número mediante una estructura española natural que mantiene explícitamente a Aarón y a sus hijos como destinatarios. Se reemplazó 'bebida fuerte' por 'bebida embriagante' por mayor naturalidad en español, preservando la alternativa tradicional en nota. Se uniformó el registro al evitar la mezcla 'tú/vuestras' y se reparó la nota c para que ofrezca una alternativa real. La revisión sigue fielmente el hebreo y el razonamiento de la POB inglesa sin añadir ni quitar alcance doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: prohibición de beber vino y otra bebida alcohólica al entrar en la tienda de reunión, con advertencia de muerte, y la fórmula legal de duración continua. Sin embargo, introduce una discordancia de persona y número: comienza con singular dirigido a Aarón (''No beberás... tú'') pero luego cambia a plural de tercera persona (''cuando entren'', ''mueran''), cuando el hebreo mantiene a Aarón y sus hijos como destinatarios directos en segunda persona plural en la cláusula de entrada y muerte. También la nota c no aporta una alternativa real, porque repite exactamente el texto anclado.'
  spanish_quality_summary: El español es mayormente claro, pero mezcla registros pronominales ('tú', 'vuestras') y personas verbales de modo poco natural para un español neutro eclesial. 'Bebida fuerte' es comprensible pero suena calcado; 'bebida embriagante' funciona mejor en español moderno y además ya está documentada como alternativa inglesa. 'Será un estatuto perpetuo por vuestras generaciones' es entendible, pero conviene uniformar a 'sus generaciones' o reestructurar para evitar voseo peninsular.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones relevantes aquí son léxicas y de estilo: ''vino'' está bien; para שֵׁכָר conviene preferir ''bebida embriagante'' en español por naturalidad; ''tienda de reunión'' es aceptable; ''estatuto perpetuo'' / ''estatuto permanente'' encajan con חֻקַּת עוֹלָם.'
  issues:
  - severity: high
    issue: Discordancia de persona/número en la oración principal
    rationale: El texto pasa de 'No beberás... tú y tus hijos contigo' a 'cuando entren... para que no mueran'. El hebreo mantiene la advertencia dirigida a los destinatarios; en español esto debe conservarse con una formulación coherente como 'No beberán ... cuando entren ... para que no mueran' o una reestructuración equivalente.
  - severity: medium
    issue: Mezcla de registros pronominales ('tú' con 'vuestras')
    rationale: En español neutro latinoamericano, combinar tuteo singular con posesivo de vosotros suena inconsistente y poco legible. Debe uniformarse el tratamiento.
  - severity: medium
    issue: '''Bebida fuerte'' suena poco idiomático en español bíblico actual'
    rationale: Aunque es calco tradicional de 'strong drink', en español general moderno comunica peor que 'bebida embriagante', que además refleja bien la amplitud semántica de שֵׁכָר y coincide con la nota lexical alternativa.
  - severity: low
    issue: La nota c repite el mismo texto del cuerpo
    rationale: El texto principal dice 'estatuto perpetuo[c]' y la nota c dice 'O “estatuto perpetuo”'. Una nota de alternativa debe ofrecer una variante real, por ejemplo 'estatuto permanente'.
  revised_spanish_text: Ni tú ni tus hijos contigo beberán vino ni bebida embriagante[a] cuando entren en la tienda de reunión, para que no mueran[b]. Este será un estatuto perpetuo por todas sus generaciones[c].
  revised_footnotes:
