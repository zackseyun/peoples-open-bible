review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la escena estacional y la mayoría de las decisiones léxicas del hebreo: הַתְּאֵנָה ... פַגֶּיהָ, וְהַגְּפָנִים סְמָדַר, נָתְנוּ רֵיחַ, קוּמִי, רַעְיָתִי, יָפָתִי. Sin embargo, dos elecciones no preservan del todo el matiz auditado: (1) חָנְטָה se auditó como ''has ripened/has formed'' en relación con el desarrollo visible de los higos tempranos; ''ha dado'' es más general y debilita ese matiz de formación/maduración. (2) וּלְכִי לָךְ fue documentado como ''come away'', es decir, una invitación a apartarse/irse con el hablante; ''ven conmigo'' añade explícitamente ''conmigo'', que no está en el hebreo, y cambia ligeramente la imagen de ''venirse/alejarse''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Las vides en flor desprenden fragancia' y 'Levántate, amor mío, hermosa mía' funcionan muy bien. No obstante, 'ha dado sus higos tempranos' suena algo menos preciso que 'ha madurado' o 'ha formado', y 'ven conmigo' es fluido pero introduce una explicitación no necesaria. 'Ven, aléjate' sería torpe; una solución como 'ven, aléjate conmigo' también sería innecesaria. La mejor reparación idiomática y fiel es 'ven' o mejor 'ven, vámonos' no encaja con el singular femenino. Por tanto, 'y ven' se queda corto para el matiz de apartarse, mientras que 'y ven conmigo' añade contenido. En español bíblico legible, 'y ven' con nota o 'y ven acá' tampoco refleja 'away'. La opción más fiel y natural es 'y ven' solo si se acepta cierta pérdida; mejor aún, 'y vente' preserva el movimiento hacia el hablante y el apartarse, pero es más regional. En neutral amplio, 'y ven' con nota explicativa es preferible.
  glossary_alignment: No hay términos del glosario de alto impacto doctrinal en este versículo. El borrador sigue bien el enfoque poético del POB. La principal alineación pendiente es respetar mejor la decisión lexical auditada para חָנְטָה y no sobre-explicitar וּלְכִי לָךְ.
  issues:
  - severity: medium
    issue: חָנְטָה se tradujo como 'ha dado'
    rationale: '''Ha dado'' comunica producción general, pero el hebreo y la auditoría resaltan la formación/maduración visible de los higos tempranos. ''Ha madurado'' o ''ha formado'' preserva mejor ese matiz estacional.'
  - severity: medium
    issue: וּלְכִי לָךְ se tradujo como 'y ven conmigo'
    rationale: La frase añade 'conmigo', ausente del hebreo, y desplaza el matiz de 'come away'. Conviene evitar esa explicitación en el texto principal y dejar la explicación idiomática en nota.
  - severity: low
    issue: El anclaje de notas [c][b] del inglés no se replicó, pero la numeración española sí es coherente
    rationale: No es un error, pero la nota sobre 'come away' debe seguir anclada exactamente a la frase revisada.
