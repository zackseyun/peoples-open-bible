  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «haces el bien» y «tu buena obra» son adecuados. La decisión problemática no es terminológica sino semántica: debe explicitarse «esperanza» para corresponder a תִקְוָה, dejando «gracias»/«agradecimiento» en la nota como alternativa griega.'
