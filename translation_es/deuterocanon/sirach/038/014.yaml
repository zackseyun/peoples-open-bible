revisions:
- from: pues su ruego puede prosperar[a], y su sanidad sirve para preservar la vida.
  to: pues su ruego puede prosperar[a], y su curación sirve para preservar la vida.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se sustituye «sanidad» por «curación» para lograr un español más natural y preciso en este contexto. También se pule la nota al pie para que suene menos forzada en español, sin alterar la evidencia textual ni la lógica del POB.
