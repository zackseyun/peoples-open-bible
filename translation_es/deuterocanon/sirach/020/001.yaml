translation:
  language: es
  text: Hay una reprensión que no es oportuna[a], y hay quien calla y también es sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay una reprensión que no es apropiada / a tiempo». El adjetivo griego puede significar «oportuno», «conveniente» o, en otros contextos, «hermoso»; aquí el sentido es la adecuación al momento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγχος
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - repruebo
  - reprensión
  - corrección
  lexicon: BDAG
  rationale: El griego ἔλεγχος puede expresar reprensión, reproche o corrección por una falta. En español, «reprensión» conserva la fuerza de corrección verbal sin sonar tan dura como «repruebo» ni tan amplia como «corrección».
- source_word: ὡραῖος
  english_pob_choice: timely
  chosen_spanish: oportuna
  alternatives_spanish:
  - a tiempo
  - oportuna
  - apropiada
  lexicon: LSJ
  rationale: Aunque ὡραῖος puede significar «hermoso» en otros contextos, aquí con ἔλεγχος señala conveniencia de momento o ajuste. «Oportuna» reproduce esa idea de pertinencia temporal y mantiene la observación sapiencial.
- source_word: σιωπῶν
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - guarda silencio
  - permanece callado
  - calla
  lexicon: BDAG
  rationale: El participio describe a una persona caracterizada por el silencio. «Calla» es natural en español y conserva la acción verbal sin añadir matices innecesarios.
- source_word: φρόνιμος
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - sensato
  - discreto
  lexicon: BDAG
  rationale: En este dicho breve, φρόνιμος se refiere a sabiduría práctica o prudencia. «Sabio» es la opción más idiomática y amplia en español; «prudente» sería una posible matización, pero menos general.
- source_word: καὶ αὐτός
  english_pob_choice: is himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - también él
  - él también
  - él mismo
  lexicon: BDAG
  rationale: La construcción añade énfasis al sujeto silencioso. «Él mismo» conserva ese énfasis de manera natural en español y refleja que el sabio no solo calla, sino que él mismo es sabio.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que hay alta concordancia con el texto fuente griego; por eso el borrador mantiene una equivalencia óptima breve y proverbial, sin expandir el sentido más allá del contraste entre reprensión inoportuna y silencio sabio.
  spanish_consistency_notes:
  - Se evita traducir ἔλεγχος de forma demasiado general como «corrección» para no diluir la fuerza de la reprensión.
  - «Oportuna» preserva el valor contextual de ὡραῖος sin introducir la idea ajena de belleza.
  - «Él mismo» mantiene el énfasis de καὶ αὐτός, paralelo al inglés auditado «is himself».
