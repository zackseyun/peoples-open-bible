translation:
  language: es
  text: 'Pero él dijo[a]: «¡Vive Yahvé, delante de quien estoy[b], que no lo tomaré!». Y le insistió para que lo tomara, pero él se negó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula de juramento hebrea: literalmente, «Vive Yahvé … si tomo [eso]», donde «si» expresa una negación fuerte: «ciertamente no lo tomaré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en cuya presencia estoy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: As the LORD lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Vive Yahvé, el Dios vivo!
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: En español, la fórmula juratoria queda natural y solemne como exclamación directa. ‘Vive Yahvé’ conserva el valor idiomático del juramento sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama directamente; la pauta del proyecto pide ‘Yahvé’ como nombre divino en el texto principal.
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  english_pob_choice: before whom I stand
  chosen_spanish: ante quien he estado
  alternatives_spanish:
  - delante de quien estoy
  - en cuya presencia estoy
  lexicon: HALOT
  rationale: ‘Ante quien he estado’ conserva el idioma relacional/cortesano del hebreo sin forzarlo a una paráfrasis como ‘a quien sirvo’. El perfecto español ‘he estado’ puede reflejar bien la referencia a la posición habitual ante Yahvé.
- source_word: אִם אֶקָּח
  english_pob_choice: I will not take it
  chosen_spanish: que no tomaré
  alternatives_spanish:
  - que ciertamente no tomaré
  - que no lo tomaré
  lexicon: HALOT
  rationale: En el contexto juratorio, אִם expresa negación enfática elíptica. El español necesita explicitarla con ‘que no tomaré’ para conservar el sentido de rechazo absoluto al regalo.
- source_word: וַיִּפְצַר בּוֹ לָקַחַת
  english_pob_choice: he urged him to take it
  chosen_spanish: le insistió para que lo tomara
  alternatives_spanish:
  - le rogó insistentemente que lo aceptara
  - le apremió a tomarlo
  lexicon: HALOT
  rationale: פצר comunica insistencia fuerte; ‘le insistió’ es natural en español y mantiene la presión narrativa. ‘Lo tomara’ conserva la referencia al obsequio ya mencionada.
- source_word: וַיְמָאֵן
  english_pob_choice: he refused
  chosen_spanish: se negó
  alternatives_spanish:
  - rehusó
  - se rehusó
  lexicon: HALOT
  rationale: מאן expresa negativa o rechazo decidido. ‘Se negó’ es claro, digno y directo en español contemporáneo.
theological_decisions:
- issue: Forma del juramento con el nombre divino
  english_pob_reading: As the LORD lives / Yahweh
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - Vive el SEÑOR
  - Por la vida de Yahvé
  rationale: El hebreo conserva el nombre del pacto, no un título genérico. La traducción española sigue la pauta del proyecto con ‘Yahvé’ y mantiene el carácter juratorio del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor negativo de אִם en juramento
  english_pob_reading: I will not take it
  chosen_spanish_reading: que no tomaré
  alternative_spanish_readings:
  - ciertamente no lo tomaré
  - no lo aceptaré
  rationale: La negación no está explícita en la forma hebrea, pero sí en su uso juratorio. El español debe hacer visible esa fuerza para no perder la solemnidad y la determinación del hablante.
  doctrine_reference: HALOT, entrada de אִם en fórmulas de juramento
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca anclado exactamente en el texto español. También se mantuvo la decisión de traducir el Tetragrama como Yahvé y de explicitar la negación enfática del juramento.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme a la terminología del proyecto.
  - Se conserva el registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - ‘Tomar’ se mantiene como verbo base para conservar el enlace léxico con לקח.
  - Se prefirió ‘se negó’ para מאן por claridad y naturalidad en español.
