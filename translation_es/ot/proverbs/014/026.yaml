translation:
  language: es
  text: En el temor de Yahvé hay fuerte confianza[a], y sus hijos tendrán refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probablemente: «y para sus hijos» podría entenderse como «y para los hijos de Yahvé habrá un refugio», tomando «sus» como referencia a Yahvé y no al que lo teme.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/יִרְאַת
  english_pob_choice: In the fear of
  chosen_spanish: En el temor de
  alternatives_spanish:
  - En el temor reverente de
  - En el temor hacia
  lexicon: HALOT
  rationale: La preposición ב con el constructo יִרְאָה expresa esfera o marco de vida; en español, «en el temor de» conserva el idiomático hebreo y sugiere una condición en la que uno vive, no solo un instrumento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton con la forma establecida del proyecto en español: «Yahvé», evitando la sustitución por un título.'
- source_word: מִבְטַח
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - confianza firme
  lexicon: HALOT
  rationale: Aquí מִבְטַח designa un estado de confianza o seguridad. «Confianza» es natural en español y permite que עֹז intensifique el sustantivo sin forzar una imagen de lugar.
- source_word: עֹז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - firme
  - poderosa
  lexicon: HALOT
  rationale: El hebreo modifica a מִבְטַח de modo atributivo. «Fuerte» reproduce esa intensificación de manera clara y directa en español.
- source_word: וּ/לְ/בָנָי/ו
  english_pob_choice: and his children
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus niños
  - y sus descendientes
  lexicon: HALOT
  rationale: בָּנִים puede significar «hijos» o «hijos/descendencia»; «sus hijos» es la opción más literal y natural aquí. Se evita añadir «para» porque el hebreo y la revisión auditada favorecen una relación más directa con el predicado.
- source_word: יִהְיֶה
  english_pob_choice: there will be
  chosen_spanish: tendrán
  alternatives_spanish:
  - habrá
  - será
  lexicon: HALOT
  rationale: Aunque היה introduce existencia, en este paralelismo el sentido comunicado es que los hijos del piadoso dispondrán de refugio. «Tendrán» suena natural en español y mantiene el valor resultativo sin perder la idea de provisión.
- source_word: מַחְסֶה
  english_pob_choice: a refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - asilo
  lexicon: HALOT
  rationale: מַחְסֶה denota refugio o lugar de protección. «Refugio» conserva la imagen protectora de modo breve y bíblicamente claro.
theological_decisions:
- issue: Referente del sufijo posesivo en «sus hijos»
  english_pob_reading: The suffix refers to the person who fears the LORD, so the proverb promises refuge for that person's children.
  chosen_spanish_reading: El sufijo se entiende como referido a la persona que teme a Yahvé; por tanto, el proverbio promete refugio para sus hijos.
  alternative_spanish_readings:
  - El sufijo podría referirse a Yahvé, de modo que se hablaría de los hijos de Yahvé.
  rationale: La sintaxis inmediata y el estilo sapiencial favorecen que el posesivo vuelva al temeroso de Yahvé. Esa lectura mantiene el foco proverbial en la consecuencia para su casa, sin negar que la otra posibilidad exista gramaticalmente.
  doctrine_reference: Preservar la tensión interpretativa cuando la gramática permite más de una referencia pronominal; no resolverla con exceso de precisión.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que eliminó la preposición equivalente a «para» delante de «sus hijos», para reflejar con mayor naturalidad la construcción hebrea y conservar la relación directa entre el temor de Yahvé y el refugio prometido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
  - Se usa «confianza» para מִבְטַח y «fuerte» para עֹז, preservando la intensificación del sustantivo.
  - Se traduce בָּנִים como «hijos» por ser la opción más natural y amplia en español.
  - Se evita «SEÑOR» y «Cristo», pues no corresponden a este versículo.
  - La nota al pie conserva la ambigüedad posesiva sin resolverla de modo dogmático.
