translation:
  language: es
  text: 'Y ella dijo a su marido[a]: «Mira ahora, yo sé que este es un santo hombre de Dios, que pasa continuamente por aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su esposo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces ella dijo
  - Así que ella dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la secuencia narrativa; en español, «Y ella dijo» conserva esa progresión simple sin añadir matices interpretativos.
- source_word: אֶל אִישָׁהּ
  english_pob_choice: to her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su hombre
  - a su esposo
  lexicon: HALOT
  rationale: En este contexto doméstico, אִישׁ con sufijo posesivo se entiende naturalmente como el marido. «Marido» es claro y fiel; «esposo» también sería posible, pero «marido» mantiene mejor el registro narrativo bíblico.
- source_word: הִנֵּה נָא
  english_pob_choice: See now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira bien ahora
  - Fíjate ahora
  lexicon: HALOT
  rationale: La combinación funciona como marcador discursivo de atención. «Mira ahora» transmite bien el énfasis de הִנֵּה y la atenuación/apelación de נָא en español natural.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - he llegado a saber
  - yo percibo
  - yo he llegado a conocer
  lexicon: HALOT
  rationale: El perfecto expresa reconocimiento firme basado en observación repetida. «Yo sé» es la equivalencia más natural en español y preserva el sentido de convicción presente.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo conocido; «que» es la subordinación más directa y natural en español.
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un varón de Dios
  - un hombre perteneciente a Dios
  lexicon: HALOT
  rationale: Se conserva el título bíblico reconocido «hombre de Dios», que en la narrativa designa a una figura profética o comisionada por Dios. «Varón de Dios» sería más arcaizante sin ganar precisión.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En español, «santo» comunica con más naturalidad la cualidad de apartamiento y santidad personal que «sagrado», que puede sonar más impersonal u objeto-céntrico.
- source_word: הוּא
  english_pob_choice: this is
  chosen_spanish: este es
  alternatives_spanish:
  - él es
  - ese es
  lexicon: HALOT
  rationale: El pronombre identifica al hombre mencionado; «este es» suena natural en español al señalar la persona reconocida.
- source_word: עֹבֵר עָלֵינוּ
  english_pob_choice: passes by us
  chosen_spanish: pasa por nosotros
  alternatives_spanish:
  - pasa junto a nosotros
  - va pasando por aquí
  lexicon: HALOT
  rationale: עָבַר עַל en este contexto expresa pasar cerca o por el lugar donde están. «Pasa por nosotros» es comprensible y mantiene la idea de tránsito recurrente.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - siempre
  lexicon: HALOT
  rationale: La revisión inglesa optó por «continually» para reflejar תָּמִיד con mayor literalidad. En español, «continuamente» conserva esa fuerza de recurrencia habitual sin sonar demasiado forzado.
theological_decisions:
- issue: Título אִישׁ אֱלֹהִים
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - varón de Dios
  - hombre perteneciente a Dios
  rationale: Se mantiene el valor titulado y narrativo de la expresión sin convertirla en una paráfrasis doctrinal. La frase sugiere un profeta o agente divinamente comisionado, pero no añade más de lo que el texto dice.
  doctrine_reference: Translation philosophy §1, §5; afirmación de no importar conclusiones fuera del texto
translation_notes:
  revision_awareness: El inglés POB pasó de «Look now» a «See now» para reflejar mejor הִנֵּה נָא, y de «regularly» a «continually» para hacer más explícito תָּמִיד. La versión española sigue esa revisión con «Mira ahora» y «continuamente», manteniendo el mismo equilibrio entre naturalidad y mayor cercanía al hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva «hombre de Dios» como título técnico bíblico.
  - «Santo» se deja en sentido de cualidad personal, no como título litúrgico.
  - La puntuación de cita respeta el estilo español con comillas angulares.
  - El marcador [a] se ancla en el término de parentesco para reflejar la alternativa léxica del inglés auditado.
