translation:
  language: es
  text: 'El altar era de madera[a], de tres codos de alto y de dos codos de largo; sus esquinas, su largo y sus muros eran de madera. Y me dijo: «Esta es la mesa que está delante de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo comienza con «el altar», pero luego lo identifica como «la mesa»; probablemente refleja una pieza del santuario con función a la vez sacrificial y de mesa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar-mesa
  - la mesa del altar
  lexicon: HALOT
  rationale: El término básico מִזְבֵּחַ significa ‘altar’. Aunque el verso termina llamándolo ‘mesa’, la POB inglesa preserva la tensión terminológica en vez de armonizarla; por eso el español mantiene ‘altar’ en la primera cláusula.
- source_word: עֵץ
  english_pob_choice: of wood
  chosen_spanish: de madera
  alternatives_spanish:
  - maderoso
  - de leña
  lexicon: HALOT
  rationale: 'La construcción es material/predicativa: el objeto está hecho de madera. En español, ‘de madera’ es la forma natural y fiel.'
- source_word: שָׁלוֹשׁ אַמּוֹת גָּבֹהַּ
  english_pob_choice: three cubits high
  chosen_spanish: de tres codos de alto
  alternatives_spanish:
  - de tres codos de altura
  - tres codos de alto
  lexicon: HALOT
  rationale: Se conserva la medida explícita con una formulación española natural. El valor dimensional se expresa con ‘de alto’ para corresponder a גָּבֹהַּ.
- source_word: וְאָרְכּוֹ שְׁתַּיִם אַמּוֹת
  english_pob_choice: and two cubits long
  chosen_spanish: y de dos codos de largo
  alternatives_spanish:
  - y su largo era de dos codos
  - y dos codos de longitud
  lexicon: HALOT
  rationale: ‘Largo’ reproduce el valor de אָרְךְ/אָרְכּוֹ sin recargar la sintaxis; la medida queda clara y fluida en español.
- source_word: וּמִקְצֹעוֹתָיו לוֹ
  english_pob_choice: its corners
  chosen_spanish: sus esquinas
  alternatives_spanish:
  - sus ángulos
  - sus salientes
  lexicon: HALOT
  rationale: מִקְצֹעוֹת designa las esquinas o extremos angulares del objeto. ‘Esquinas’ es la equivalencia más transparente y readable en español.
- source_word: וְקִירֹתָיו
  english_pob_choice: its walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - sus paredes
  - sus lados
  lexicon: HALOT
  rationale: La revisión inglesa prefirió ‘walls’ para mayor precisión léxica. En español, ‘muros’ conserva esa fuerza material/estructural mejor que ‘paredes’, aunque ambas sean posibles.
- source_word: זֶה הַשֻּׁלְחָן
  english_pob_choice: This is the table
  chosen_spanish: Esta es la mesa
  alternatives_spanish:
  - Esta es la mesa-altar
  - Esta es la mesa del altar
  lexicon: HALOT
  rationale: La segunda designación del objeto se mantiene como ‘mesa’ para respetar el cambio terminológico del hebreo y la decisión inglesa de conservar la tensión altar/mesa.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte según el estándar del proyecto como ‘Yahvé’, no con una sustitución por ‘Señor’. ‘Delante de’ refleja la relación espacial/cultual de לִפְנֵי.
theological_decisions:
- issue: Tensión terminológica entre “altar” y “mesa”
  english_pob_reading: Preserve both terms in the main text
  chosen_spanish_reading: Mantener «altar» al inicio y «mesa» al final
  alternative_spanish_readings:
  - Homogeneizar todo como «altar»
  - Homogeneizar todo como «mesa»
  - Usar «mesa-altar» en toda la frase
  rationale: El hebreo usa ambos términos de manera intencional. El español conserva esa tensión sin resolverla, permitiendo al lector percibir el carácter híbrido del mueble del templo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa ‘Yahvé’ como forma principal del Tetragrámaton. Esto sigue el texto fuente más directamente que una sustitución devocional por ‘Señor’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión española sigue el último pasaje auditado en inglés: mantiene ‘altar’ y ‘mesa’ como términos distintos, usa ‘walls’/‘muros’ para קִירֹתָיו, y traduce el nombre divino como Yahweh en inglés; en esta entrega se ajusta al estándar del proyecto en español con ‘Yahvé’.'
  spanish_consistency_notes:
  - Se mantuvo la alternancia léxica «altar» / «mesa» para no borrar la tensión del hebreo.
  - Se prefirió «muros» para קִירֹתָיו por su cercanía estructural, en línea con la revisión inglesa que corrigió ‘sides’ a ‘walls’.
  - Se conservó la medida ‘codos’ con sintaxis natural para lectura eclesial contemporánea.
  - La nota al pie marca la identificación funcional entre altar y mesa sin convertirla en armonización interpretativa.
