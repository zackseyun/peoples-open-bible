theological_decisions:
- issue: Cultic term ἱλασμός in a deuterocanonical temple context
  chosen_reading: atonement
  alternative_readings:
  - expiation
  - propitiation
  rationale: The term refers to the high priest's ritual act of making atonement. 'Atonement' is accessible and preserves sacrificial significance without importing a narrower doctrinal theory. More technical alternatives are preserved as lexical possibilities.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; avoid unnecessary ecclesiastical jargon while preserving theological weight'
- issue: Nuance of κεχάρισται
  chosen_reading: has graciously granted
  alternative_readings:
  - has granted
  - has shown favor by granting
  rationale: The verb includes the notion of favor or grace, not mere bare permission. Including 'graciously' preserves that theological nuance without overstating it.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension/weight in accessible English'
