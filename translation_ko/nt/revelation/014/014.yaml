  text: Καὶ εἶδον, καὶ ἰδοὺ νεφέλη λευκή, καὶ ἐπὶ τὴν νεφέλην καθήμενον ὅμοιον ⸀υἱὸν ἀνθρώπου, ἔχων ἐπὶ τῆς κεφαλῆς αὐτοῦ στέφανον χρυσοῦν καὶ ἐν τῇ χειρὶ αὐτοῦ δρέπανον ὀξύ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/014.yaml
  text: And I looked[a], and behold, a white cloud, and seated on the cloud was one like a son of man[b], having on his head a golden crown and in his hand a sharp sickle.
  footnotes:
  - marker: a
    text: 'Or, ''one like the Son of Man.'' The phrase echoes Daniel 7:13 and is commonly understood as a messianic title, though the Greek here reads anarthrously, ''like a son of man.'''
    reason: alternative_reading
  - marker: b
    text: The Greek word for 'crown' here is stephanos, often a victor's wreath rather than a royal diadem.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 나는 보았습니다. 보십시오, 흰 구름이 있었고, 그 구름 위에 인자 같은 분[a]이 앉아 계셨는데, 그분은 머리에 금 면류관을 쓰시고 손에는 날카로운 낫을 들고 계셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 ὅμοιος υἱὸν ἀνθρώπου는 다니엘 7:13의 「인자 같은 이」를 반향한다.'
