translation:
  language: es
  text: Entonces se acercaron los jefes de las casas paternas[a] del clan de los hijos de Galaad, hijo de Maquir, hijo de Manasés, de entre los clanes de los hijos de José, y hablaron delante de Moisés y delante de los jefes, jefes de las casas paternas de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jefes de las familias» / «los jefes de las casas ancestrales». El modismo hebreo se refiere a líderes reconocidos de unidades de parentesco dentro de la estructura tribal de Israel.
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Israel» es la expresión formal hebrea; alternativamente, «israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se presentaron
  - vinieron cerca
  lexicon: HALOT
  rationale: El verbo hebreo marca una aproximación narrativa y formal para exponer un caso. «Se acercaron» conserva el movimiento concreto y la solemnidad sin sobrecargar el texto.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los linajes paternos
  lexicon: HALOT
  rationale: La expresión hebrea designa cabezas de unidades familiares/parentales dentro de la estructura tribal. «Casas paternas» preserva esa unidad social y «jefes» refleja la función de liderazgo.
- source_word: לְמִשְׁפַּחַת
  english_pob_choice: of the clan of
  chosen_spanish: del clan de
  alternatives_spanish:
  - de la familia de
  - perteneciente al clan de
  lexicon: HALOT
  rationale: En este contexto legal-genealógico, מִשְׁפָּחָה se entiende mejor como «clan». La preposición relacional se expresa naturalmente con «del clan de».
- source_word: בְּנֵֽי גִלְעָד
  english_pob_choice: the sons of Gilead
  chosen_spanish: los hijos de Galaad
  alternatives_spanish:
  - los descendientes de Galaad
  lexicon: HALOT
  rationale: Se mantiene el paralelismo genealógico del hebreo con «hijos de». «Descendientes» sería posible, pero menos transparente frente al texto fuente.
- source_word: בֶּן מָכִיר בֶּן מְנַשֶּׁה
  english_pob_choice: son of Machir, son of Manasseh
  chosen_spanish: hijo de Maquir, hijo de Manasés
  alternatives_spanish:
  - descendiente de Maquir, descendiente de Manasés
  lexicon: HALOT
  rationale: La cadena genealógica se conserva de forma directa y formal. «Hijo de» evita comprimir el linaje y reproduce la repetición enfática del original.
- source_word: מִמִּשְׁפְּחֹת בְּנֵי יוֹסֵף
  english_pob_choice: from the clans of the sons of Joseph
  chosen_spanish: de entre los clanes de los hijos de José
  alternatives_spanish:
  - de los clanes de los hijos de José
  - entre los clanes de los hijos de José
  lexicon: HALOT
  rationale: El מִן hebreo expresa origen o procedencia dentro de la organización tribal. «De entre» comunica bien esa pertenencia/distinción sin perder naturalidad en español.
- source_word: וַיְדַבְּרוּ
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - expusieron
  lexicon: HALOT
  rationale: דבר es el verbo regular para hablar; «hablaron» es directo y suficientemente formal. «Expusieron» añadiría una interpretación más específica de la escena.
- source_word: לִפְנֵי מֹשֶׁה וְלִפְנֵי הַנְּשִׂאִים
  english_pob_choice: before Moses and before the leaders
  chosen_spanish: delante de Moisés y delante de los dirigentes
  alternatives_spanish:
  - en presencia de Moisés y en presencia de los dirigentes
  - ante Moisés y ante los dirigentes
  lexicon: HALOT
  rationale: לִפְנֵי en contexto formal indica comparecencia ante autoridad. «Delante de» preserva la relación espacial/jurídica del hebreo sin sonar arcaico.
- source_word: הַנְּשִׂאִים
  english_pob_choice: the leaders
  chosen_spanish: los dirigentes
  alternatives_spanish:
  - los jefes
  - los príncipes
  lexicon: HALOT
  rationale: נְשִׂיאִים son líderes tribales o cabezas reconocidas. «Dirigentes» comunica esa función con claridad moderna; «príncipes» sería más tradicional pero menos preciso para el lector actual.
- source_word: רָאשֵׁי אָבוֹת לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: the heads of the fathers’ houses of the sons of Israel
  chosen_spanish: jefes de las casas paternas de los hijos de Israel
  alternatives_spanish:
  - jefes de las casas paternas de los israelitas
  - jefes de los linajes de los hijos de Israel
  lexicon: HALOT
  rationale: La frase final identifica a los mismos líderes con la estructura genealógica completa. Se mantiene «hijos de Israel» por su transparencia formal y porque el texto hebreo usa la expresión covenantal literal.
theological_decisions:
- issue: Tratamiento del etnónimo formal בני ישראל
  english_pob_reading: ‘Sons of Israel’ is the formal Hebrew expression; alternatively, ‘Israelites.’
  chosen_spanish_reading: «hijos de Israel»
  alternative_spanish_readings:
  - «israelitas»
  rationale: Se conserva la expresión formal del hebreo para mantener la estructura genealógica y covenantal del versículo. «Israelitas» sería más fluido, pero borra parte de la forma original que el POB decidió transparentar.
  doctrine_reference: Ninguna doctrina específica; decisión de fidelidad formal al etnónimo bíblico.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y el criterio del POB inglés permanecen estables, con alta concordancia y sin necesidad de enmiendas textuales.'
  spanish_consistency_notes:
  - Se mantuvo la terminología de parentesco como «hijos de» y «casas paternas» para reflejar la estructura genealógica hebrea.
  - «Galaad», «Maquir», «Manasés» y «José» siguen la forma española estándar de los nombres bíblicos.
  - «Delante de» conserva la idea forense/formal de לִפְנֵי sin recurrir a un calco rígido.
  - No se sustituyó «hijos de Israel» por «israelitas» en el cuerpo principal, para preservar la transparencia al hebreo que el POB documenta.
