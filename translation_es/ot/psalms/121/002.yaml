translation:
  language: es
  text: Mi ayuda viene de Yahvé[a], el hacedor[b] del cielo y de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Mi ayuda es de Yahvé». El hebreo no tiene un verbo finito explícito en la primera cláusula; el español lo expresa idiomáticamente.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los cielos y la tierra». La traducción usa la expresión idiomática en español «el cielo y la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶזְרִי
  english_pob_choice: My help
  chosen_spanish: Mi ayuda
  alternatives_spanish:
  - Mi auxilio
  - Mi asistencia
  lexicon: HALOT
  rationale: עֵזֶר/עֶזְרִי expresa apoyo o ayuda; en español, «mi ayuda» es la equivalencia más natural y directa, y conserva la confesión breve de dependencia del salmista.
- source_word: מֵעִם
  english_pob_choice: comes from
  chosen_spanish: viene de
  alternatives_spanish:
  - es de
  - proviene de
  lexicon: HALOT
  rationale: La preposición indica procedencia «de junto a / de parte de». En español, «viene de» expresa bien el origen implícito sin exigir una construcción forzada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino «Yahvé», según la terminología española del proyecto, para preservar el nombre personal del pacto y no reemplazarlo por un título.
- source_word: עֹשֵׂה
  english_pob_choice: the Maker
  chosen_spanish: el Hacedor
  alternatives_spanish:
  - el que hace
  - el Creador
  lexicon: HALOT
  rationale: El participio presenta a Yahvé como aquel cuya identidad se caracteriza por hacer/crear. «El Hacedor» conserva ese valor titular y suena natural en español bíblico sin borrar el matiz verbal.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: Aunque el uso idiomático inglés opta por singular, en español «los cielos» mantiene mejor el plural hebreo y encaja con la fórmula bíblica establecida.
- source_word: וָאָרֶץ
  english_pob_choice: and earth
  chosen_spanish: y de la tierra
  alternatives_spanish:
  - y la tierra
  - y tierra
  lexicon: HALOT
  rationale: 'En el merismo «cielos y tierra», אֶרֶץ se entiende como «tierra» en contraste con los cielos. La preposición repetida en español hace más natural la coordinación: «de los cielos y de la tierra».'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre divino personal en vez de sustituirlo por un título. «Yahvé» es la forma adoptada por el proyecto en español y corresponde al Tetragrámaton del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Participial description עֹשֵׂה as a title
  english_pob_reading: the Maker of heaven and earth
  chosen_spanish_reading: el Hacedor de los cielos y de la tierra
  alternative_spanish_readings:
  - el que hizo los cielos y la tierra
  - el que hace los cielos y la tierra
  rationale: El participio hebreo expresa rasgo identificador más que solo una acción pasada. «El Hacedor» mantiene ese valor titular y evita perder la fuerza confesional del enunciado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto base se mantuvo en alta concordancia y no hay revisiones aplicadas que alteren la decisión de traducción.
  spanish_consistency_notes:
  - 'Se mantuvo la terminología del proyecto para el nombre divino: Yahvé.'
  - Se prefirió una construcción española natural con verbo explícito en la primera cláusula, equivalente al suministro idiomático del inglés.
  - Se conservó el merismo bíblico «los cielos y la tierra» sin suavizarlo a una sola expresión cosmológica.
  - No se añadieron notas al pie porque el español no generó una ambigüedad nueva ni el audit trail exigió alternativa impresa.
