base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/029.yaml
  text: Then the king of Israel said to Jehoshaphat[a], “Disguise yourself and go into the battle, but you, put on your robes.” So the king of Israel disguised himself, and they went into the battle.
  footnotes:
