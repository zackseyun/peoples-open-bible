translation:
  language: es
  text: Porque dos mujeres fueron llevadas[a] por haber circuncidado a sus hijos. Después de colgar a los infantes de sus pechos y de llevarlas públicamente alrededor de la ciudad[b], las arrojaron desde la muralla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron traídas» o «fueron conducidas». El griego puede referirse a que fueron llevadas para comparecer o para el castigo, sin especificarlo más.
    reason: alternative_reading
  - marker: b
    text: O «por la ciudad». La frase griega en este testimonio es algo áspera, y el sentido puede ser una procesión pública alrededor de la ciudad o a través de ella.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνήχθησαν
  english_pob_choice: were brought in
  chosen_spanish: fueron llevadas ante las autoridades
  alternatives_spanish:
  - fueron traídas
  - fueron conducidas
  - fueron llevadas
  lexicon: LSJ
  rationale: El pasivo de ἀνάγω en este contexto judicial/executivo sugiere traslado para comparecer ante autoridad o para castigo. «Ante las autoridades» explicita el valor contextual sin forzar «arriba» en español y preserva el sentido de ser llevadas para juicio.
- source_word: περιτετμηκυῖα
  english_pob_choice: having circumcised
  chosen_spanish: por haber circuncidado
  alternatives_spanish:
  - por haber realizado la circuncisión
  - por haber circuncidado a
  lexicon: LSJ
  rationale: El participio perfecto expresa la causa de su arresto/castigo. «Por haber circuncidado» conserva la fuerza causal y evita una paráfrasis más larga.
- source_word: τὰ τέκνα
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos e hijas
  - a sus pequeños
  lexicon: LSJ
  rationale: τέκνα es más amplio que «hijos» en sentido estrictamente masculino, pero en español «a sus hijos» es natural y suficientemente amplio en un contexto familiar; el sentido de infancia queda luego reforzado por βρέφη.
- source_word: ἐκ τῶν μαστῶν
  english_pob_choice: from their breasts
  chosen_spanish: de sus pechos
  alternatives_spanish:
  - de sus bustos
  - desde sus pechos
  - de sus pechos maternos
  lexicon: LSJ
  rationale: «Pechos» reproduce la imagen cruda de μαστοί con naturalidad en español. «De sus pechos» mantiene el valor corporal y la dureza del pasaje.
- source_word: τὰ βρέφη
  english_pob_choice: the infants
  chosen_spanish: a los infantes
  alternatives_spanish:
  - a los bebés
  - a los niños pequeños
  lexicon: LSJ
  rationale: βρέφη designa niños muy pequeños/infantes. «Infantes» es formal y solemne, apropiado para el tono trágico del texto.
- source_word: δημοσίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - en público
  - ante todos
  lexicon: LSJ
  rationale: Adverbio que marca humillación y ejecución pública. «Públicamente» es directo y conserva el matiz.
- source_word: περιαγαγόντες
  english_pob_choice: leading them around
  chosen_spanish: de llevarlas ... por la ciudad
  alternatives_spanish:
  - de pasearlas
  - de recorrer con ellas
  - de conducirlas alrededor
  lexicon: LSJ
  rationale: El verbo significa conducir/ir llevando alrededor. «Llevarlas ... por la ciudad» es fluido en español y mantiene el elemento procesional sin añadir una interpretación más fuerte como «pasearlas».
- source_word: ἀντὰς τὴν πόλιν
  english_pob_choice: around the city
  chosen_spanish: por la ciudad
  alternatives_spanish:
  - alrededor de la ciudad
  - a través de la ciudad
  lexicon: LSJ
  rationale: La expresión transmitida es algo áspera; en español «por la ciudad» conserva la idea de recorrido urbano y admite tanto el matiz de atravesarla como el de recorrerla en procesión, tal como refleja la nota inglesa.
- source_word: κατὰ τοῦ τείχους
  english_pob_choice: from the wall
  chosen_spanish: desde el muro
  alternatives_spanish:
  - desde la muralla
  - del muro
  - desde la pared
  lexicon: LSJ
  rationale: En contexto de ἐκρήμνισαν, el sentido es una caída o arrojamiento desde una altura. «Muro» es un equivalente neutro y claro; «muralla» sería posible si se quiere enfatizar la fortificación.
- source_word: ἐκρήμνισαν
  english_pob_choice: they threw them down
  chosen_spanish: las arrojaron
  alternatives_spanish:
  - las precipitaron
  - las derribaron
  - las echaron abajo
  lexicon: LSJ
  rationale: Verbo de violencia extrema que expresa arrojar desde arriba. «Arrojaron» conserva brutalidad y claridad en español sin sonar artificial.
theological_decisions:
- issue: Referente del objeto implícito final en ἐκρήμνισαν
  english_pob_reading: the women were thrown down from the wall after their infants had been hung from their breasts
  chosen_spanish_reading: las arrojaron desde el muro
  alternative_spanish_readings:
  - arrojaron a los infantes desde el muro
  - arrojaron a las mujeres y a los infantes desde el muro
  rationale: 'Como el griego omite el objeto explícito, el flujo narrativo más natural mantiene como víctimas principales a las mujeres: fueron llevadas, luego humilladas públicamente, y finalmente arrojadas desde el muro. En español, el objeto femenino plural «las» deja esa lectura abierta pero orientada por el contexto, sin resolver indebidamente la ambigüedad textual.'
  doctrine_reference: Preservar la ambigüedad documentada y no clausurarla con una especificación no explícita en el texto.
translation_notes:
  revision_awareness: El audit trail inglés revisó ἀνήχθησαν de ‘were brought up’ a ‘were brought in’; la versión española adopta un equivalente contextual más natural (‘fueron llevadas ante las autoridades’) para reflejar el traslado judicial/executivo. También se mantiene la ambigüedad del objeto final, como en la nota inglesa, sin añadir un referente que el griego no exprese explícitamente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene ‘infantes’ para βρέφη por consistencia con el tono grave y formal.
  - Se evita ‘siervos’ o ‘esclavos’ porque no corresponde a este verso.
  - La puntuación y el registro buscan ser publicables y fieles al carácter trágico del pasaje.
  - La nota a conserva la alternativa procesional igual que el audit trail inglés; la nota b preserva la ambigüedad del referente final.
