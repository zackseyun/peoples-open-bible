translation:
  language: es
  text: 'No digas[a]: «Devolveré mal por mal»; espera[b] en Yahvé, y él te salvará[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Pagaré mal por mal» o «devolveré el agravio».'
    reason: lexical_alternative
  - marker: b
    text: «Espera» también puede implicar esperar con esperanza confiada en Yahvé.
    reason: lexical_alternative
  - marker: c
    text: 'O: «él te librará» o «él te vindicará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No vayas a decir
  - No digas nunca
  lexicon: HALOT
  rationale: אַל con verbo en forma yusiva/prohibitiva se expresa naturalmente en español con una prohibición directa. «No digas» conserva la fuerza breve del hebreo sin añadir énfasis no documentado.
- source_word: אֲשַׁלְּמָה
  english_pob_choice: I will repay
  chosen_spanish: Yo pagaré
  alternatives_spanish:
  - Yo repagaré
  - Yo haré restitución
  lexicon: HALOT
  rationale: El verbo en contexto retaliatorio admite la idea de pagar de vuelta o repagar. En español, «pagaré el mal» comunica el acto de devolver con daño de modo idiomático; se evita «hacer restitución» porque introduce una connotación legal más estrecha que el contexto inmediato no obliga.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el mal causado
  - el daño
  - el mal moral
  lexicon: HALOT
  rationale: La POB inglesa conserva la dimensión moral con «evil». En español, «mal» mantiene esa carga y suena natural en una sentencia sapiencial sobre represalia.
- source_word: קַוֵּה
  english_pob_choice: wait for
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - pon tu esperanza en
  lexicon: HALOT
  rationale: קוה incluye la idea de esperar con expectativa. «Espera» es el equivalente más directo y breve; la nota preserva el matiz de esperanza expectante que el inglés documenta.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT / POB project default
  rationale: El texto fuente usa el Tetragrámaton. Siguiendo el criterio del proyecto en español, se vierte como «Yahvé» para no ocultar el nombre divino ni recurrir al comodín litúrgico «SEÑOR».
- source_word: וְיֹשַׁע
  english_pob_choice: he will save
  chosen_spanish: él te salvará
  alternatives_spanish:
  - él te librará
  - él te rescatará
  lexicon: HALOT
  rationale: ישׁע en hifil puede significar salvar, librar o rescatar. «Salvará» preserva el núcleo léxico amplio y permite tanto rescate como vindicación sin restringir el sentido.
- source_word: לָךְ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El pronombre enclítico singular se expresa con naturalidad como «te» tras «salvar». Mantiene la referencia directa del hebreo sin sobrecargar la sintaxis.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo trae explícitamente el Tetragrámaton. La convención española del POB pide «Yahvé» en el texto principal para preservar la identidad del nombre del pacto y la transparencia frente al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Alcance de וְיֹשַׁע לָךְ
  english_pob_reading: he will save you
  chosen_spanish_reading: él te salvará
  alternative_spanish_readings:
  - él te librará
  - él te vindicará
  rationale: El verbo ישׁע puede abarcar rescatar, librar o vindicar. «Salvará» conserva la amplitud semántica sin decidir prematuramente entre rescate físico o vindicación jurídica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto del último repaso; la versión española sigue la lectura hebrea directa y conserva las tensiones léxicas documentadas sobre רָע, קוה e ישׁע, sin resolverlas por paráfrasis.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para יהוה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Mal» mantiene la fuerza moral de רָע sin estrecharlo a simple daño físico.
  - La sintaxis breve en español conserva el tono proverbial imperativo del hebreo.
