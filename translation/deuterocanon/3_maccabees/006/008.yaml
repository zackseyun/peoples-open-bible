- issue: Allusion to Jonah tradition and creature terminology
  chosen_reading: Retain the LXX-style 'monster' language rather than harmonizing to the more familiar English 'great fish' or 'whale.'
  alternative_readings:
  - great fish
  - sea monster
  - whale
  rationale: The verse is a prayer recounting divine rescues and uses κῆτος, which in Greek is broader and weightier than 'fish.' Preserving that term respects the source text's diction and avoids importing later traditional specificity.
