translation:
  language: es
  text: Después de haber hablado contra las persuasiones[a] del tirano de este modo, los guardias[b] se adelantaron y arrastraron cruelmente[c] a Eleazar a los tormentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apelaciones» para «persuasiones»; el término griego puede denotar exhortación o estímulo, pero aquí se refiere a los intentos del tirano por inducir conformidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «portadores de lanza»; en contexto se trata de los guardias armados del tirano.
    reason: lexical_alternative
  - marker: c
    text: O «duramente» para «cruelmente»; el adverbio subraya la severidad del trato.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτον τὸν τρόπον
  english_pob_choice: in this way
  chosen_spanish: de este modo
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: LSJ
  rationale: La frase adverbial introduce la manera de la respuesta de Eleazar. «De este modo» conserva el valor demostrativo sin sonar forzado en español.
- source_word: ἀντιρρητορεύσαντα
  english_pob_choice: had spoken against
  chosen_spanish: había hablado contra
  alternatives_spanish:
  - había argumentado contra
  - había respondido oponiéndose
  - había contradicho
  lexicon: LSJ
  rationale: El participio describe una habla opositiva. «Había hablado contra» mantiene la oposición sin sobre-especificar un debate técnico.
- source_word: παρηγορίαις
  english_pob_choice: persuasions
  chosen_spanish: persuasiones
  alternatives_spanish:
  - apelos
  - exhortaciones
  - encouragements
  lexicon: LSJ
  rationale: En este contexto el tirano no consuela sino que intenta inducir conformidad. «Persuasiones» conserva ese matiz coercitivo mejor que una palabra más benigna.
- source_word: δορυφόροι
  english_pob_choice: bodyguards
  chosen_spanish: guardias
  alternatives_spanish:
  - escoltas armados
  - guardias personales
  - lanceros
  lexicon: LSJ
  rationale: Literalmente puede referirse a «portadores de lanza», pero aquí funciona como designación de los servidores armados del tirano. «Guardias» comunica la función sin introducir una traducción demasiado técnica.
- source_word: παραστάντες
  english_pob_choice: came forward
  chosen_spanish: avanzaron
  alternatives_spanish:
  - se adelantaron
  - dieron un paso al frente
  - se presentaron
  lexicon: LSJ
  rationale: El participio aoristo indica que entran en acción. «Avanzaron» refleja el movimiento narrativo de forma natural en español.
- source_word: πικρῶς
  english_pob_choice: harshly
  chosen_spanish: cruelmente
  alternatives_spanish:
  - ásperamente
  - duramente
  - con severidad
  lexicon: LSJ
  rationale: El adverbio expresa severidad y trato violento. «Cruelmente» hace explícita esa dureza en un español idiomático y acorde al contexto de tortura.
- source_word: ἔσυραν
  english_pob_choice: dragged
  chosen_spanish: arrastraron
  alternatives_spanish:
  - halaron
  - lo llevaron a rastras
  - tiraron de
  lexicon: LSJ
  rationale: El verbo implica fuerza física violenta. «Arrastraron» transmite mejor esa acción que un verbo más neutro como «llevaron».
- source_word: ἐπὶ τὰ βασανιστήρια
  english_pob_choice: to the tortures
  chosen_spanish: hacia los tormentos
  alternatives_spanish:
  - a los tormentos
  - hacia los instrumentos de tortura
  - al lugar de tortura
  lexicon: LSJ
  rationale: La expresión puede señalar tanto el destino como el ámbito/medio de tormento. «Hacia los tormentos» conserva el plural concreto y la dirección del movimiento sin cerrar indebidamente el sentido.
- source_word: τὸν Ἐλεάζαρον
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázar
  lexicon: Transliteración tradicional de nombre propio semítico
  rationale: Se mantiene el nombre propio en forma transparente y reconocible, de acuerdo con la política del proyecto.
theological_decisions:
- issue: Modo de describir la coacción del tirano
  english_pob_reading: persuasions
  chosen_spanish_reading: persuasiones
  alternative_spanish_readings:
  - apelos
  - exhortaciones
  - ruegos
  rationale: La escena no presenta una invitación benigna, sino intentos de someter la voluntad de Eleazar. «Persuasiones» conserva la tensión retórica y la intención de inducción forzada.
  doctrine_reference: Martirio fiel bajo presión coercitiva; fidelidad frente a la idolatría/compromiso
- issue: Intensidad del trato físico
  english_pob_reading: harshly
  chosen_spanish_reading: cruelmente
  alternative_spanish_readings:
  - duramente
  - ásperamente
  - con brutalidad
  rationale: El griego πικρῶς refuerza la violencia del acto y el sufrimiento de Eleazar. «Cruelmente» comunica esa severidad de forma natural en español y no suaviza la escena.
  doctrine_reference: Sufrimiento de los justos y violencia de los perseguidores
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'bitterly' por 'harshly' para πικρῶς. La redacción española adopta ese ajuste semántico con «cruelmente», manteniendo la fuerza del adverbio y la violencia de la escena. También se conserva la idea de 'bodyguards' como guardias armados del tirano, evitando una transliteración mecánica de 'spear-bearers'.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Eleazar» sin adaptar acentos innecesarios.
  - Se traduce la acción narrativa en secuencia pasada compuesta para reflejar la relación temporal del participio aoristo con el verbo principal.
  - «Tormentos» se usa para preservar el plural concreto de βασανιστήρια sin reinterpretarlo como un lugar específico si el contexto no lo exige.
