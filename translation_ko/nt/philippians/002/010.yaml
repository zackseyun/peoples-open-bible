id: PHP.2.10
reference: Philippians 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα ἐν τῷ ὀνόματι Ἰησοῦ πᾶν γόνυ κάμψῃ ἐπουρανίων καὶ ἐπιγείων καὶ καταχθονίων,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/010.yaml
  text: 'so that at the name of Jesus every knee should bow, of those in heaven and on earth and under the earth,'
translation:
  language: ko
  text: 이는 예수의 이름 앞에[a] 하늘에 있는 자들과 땅에 있는 자들과 땅 아래에 있는 자들[b]의 모든 무릎이 꿇게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수의 이름 안에서」, 「예수의 이름으로」. 헬라어 ἐν은 다양한 의미를 가질 수 있으나, 경배 행위의 문맥에서는 「~앞에」가 자연스럽다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로는 「하늘의 자들과 땅의 자들과 땅 아래의 자들」. 한국어 번역은 자연스러움을 위해 각 영역에 「있는 자들」을 보충했다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: 이는 ~하시려는 것
  alternatives_korean:
  - ~하도록
  - ~하기 위하여
  lexicon: BDAG
  rationale: 앞 절의 「높이시고 … 주셨습니다」의 목적·결과를 도입한다. 「이는 ~하시려는 것」이 한국어로 자연스러운 목적절 구조를 만든다.
- source_word: ἐν τῷ ὀνόματι Ἰησοῦ
  english_pob_choice: at the name of Jesus
  chosen_korean: 예수의 이름 앞에
  alternatives_korean:
  - 예수의 이름에
  - 예수의 이름으로
  - 예수의 이름 안에서
  lexicon: BDAG
  rationale: 경배 행위와 결합된 ἐν은 한국어로 「~앞에」가 자연스럽다. 그 이름이 지닌 지위에 대한 응답으로서의 무릎 꿇음을 표현한다.
- source_word: πᾶν γόνυ
  english_pob_choice: every knee
  chosen_korean: 모든 무릎
  alternatives_korean:
  - 모든 사람
  lexicon: BDAG
  rationale: 직역으로 신체적 비유를 보존한다. 보편적 경배의 생생한 그림을 추상화하지 않는다.
- source_word: κάμψῃ
  english_pob_choice: should bow
  chosen_korean: 꿇다
  alternatives_korean:
  - 굽히다
  - 꿇어 절하다
  lexicon: BDAG
  rationale: 경배의 맥락에서 「꿇다」가 가장 자연스러우며, 한국어로 강한 경배의 의미를 담는다.
- source_word: ἐπουρανίων
  english_pob_choice: in heaven
  chosen_korean: 하늘에 있는 자들
  alternatives_korean:
  - 하늘의 존재들
  - 하늘에 속한 자들
  lexicon: BDAG
  rationale: 명사화된 형용사를 한국어로 자연스럽게 「~에 있는 자들」로 옮긴다. 영역과 그에 속한 존재 모두를 자연스럽게 담는다.
- source_word: ἐπιγείων
  english_pob_choice: on earth
  chosen_korean: 땅에 있는 자들
  alternatives_korean:
  - 땅의 존재들
  - 땅에 속한 자들
  lexicon: BDAG
  rationale: 앞과 평행하게 옮겨 세 영역의 우주적 범위를 보존한다.
- source_word: καταχθονίων
  english_pob_choice: under the earth
  chosen_korean: 땅 아래에 있는 자들
  alternatives_korean:
  - 지하의 존재들
  - 음부의 존재들
  lexicon: BDAG
  rationale: 헬라어의 공간적 비유를 그대로 보존하고, 「음부」 등 더 해석적 어휘는 피한다.
theological_decisions:
- issue: 세 영역(하늘·땅·땅 아래)의 범위
  chosen_reading: 모든 피조 영역의 우주적·보편적 범위를 보존하되, 각 집단의 정체를 본문이 말하는 것 이상으로 명시하지 않는다
  alternative_readings:
  - 천상 존재·사람·죽은 자로 명시
  - 천사·사람·악령으로 해석적 명시
  rationale: 본 절은 예수께 대한 보편적 경배를 강조한다. 번역은 그 폭을 보존하며, 헬라어가 요구하지 않는 해석적 과잉 규정을 피한다.
