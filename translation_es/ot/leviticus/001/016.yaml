translation:
  language: es
  text: Le quitará el buche[a] con sus plumas[b], y la echará junto al altar, en el lado oriental, al lugar de las cenizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su papo», para «su buche».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «con sus plumas»; algunas traducciones lo interpretan como «con su suciedad».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵסִיר
  english_pob_choice: He shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - removerá
  - retirará
  lexicon: HALOT
  rationale: El hebreo expresa la acción de hacer salir algo de su lugar. En español, 'quitará' comunica bien la instrucción ritual sin sonar forzado; 'retirará' también sería posible, pero 'quitará' es más directo.
- source_word: מֻרְאָתוֹ
  english_pob_choice: its crop
  chosen_spanish: su buche
  alternatives_spanish:
  - su craw
  - su papo
  lexicon: HALOT
  rationale: En contexto de ave sacrificada, el término señala una parte anatómica del ave. 'Buche' es un equivalente natural en español para el órgano referido por el POB inglés como 'crop', y evita un tecnicismo menos conocido como 'craw'.
- source_word: בְּנֹצָתָהּ
  english_pob_choice: with its feathers
  chosen_spanish: con sus plumas
  alternatives_spanish:
  - con su plumaje
  - con su suciedad
  lexicon: HALOT
  rationale: La lectura más directa del hebreo relaciona la forma con נוצה, 'pluma/plumaje'. 'Con sus plumas' sigue esa correspondencia y conserva la sencillez del texto fuente. Se mantiene la tensión interpretativa sin imponer la lectura alternativa de 'suciedad'.
- source_word: וְהִשְׁלִיךְ אֹתָהּ
  english_pob_choice: and throw it
  chosen_spanish: y lo echará
  alternatives_spanish:
  - y lo arrojará
  - y lo lanzará
  lexicon: HALOT
  rationale: El verbo hebreo expresa arrojar o lanzar. 'Echará' es idiomático en español bíblico moderno y conserva la fuerza del acto sin excesiva dureza estilística.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  english_pob_choice: beside the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - al costado del altar
  lexicon: HALOT
  rationale: '''Junto al altar'' transmite proximidad lateral de manera natural y clara en español.'
- source_word: קֵדְמָה
  english_pob_choice: on the east side
  chosen_spanish: al lado oriente
  alternatives_spanish:
  - hacia el oriente
  - al lado oriental
  lexicon: HALOT
  rationale: La indicación direccional se refiere al lado oriental. 'Al lado oriente' es breve y bíblicamente sobrio en español; aunque 'lado oriental' también es posible, 'oriente' mantiene mejor el registro tradicional sin perder claridad.
- source_word: אֶל מְקוֹם הַדָּשֶׁן
  english_pob_choice: to the place of the ashes
  chosen_spanish: al lugar de las cenizas
  alternatives_spanish:
  - al lugar de la ceniza
  - al montón de cenizas
  lexicon: HALOT
  rationale: '''Lugar de las cenizas'' refleja bien la localización designada por el hebreo y sigue de cerca la formulación inglesa del POB, sin precisar más de lo que el texto exige.'
translation_notes:
  revision_awareness: 'Se ha seguido el audit trail inglés de forma cercana, pero con ajustes naturales para español: se eligió ''buche'' para el órgano ave, se mantuvo la lectura principal de ''plumas'' y se conservó la localización ritual con un giro español idiomático.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conservó un registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - '''Al lado oriente'' mantiene la orientación espacial del hebreo y puede coexistir con ''lado oriental'' como glosa estilística.'
