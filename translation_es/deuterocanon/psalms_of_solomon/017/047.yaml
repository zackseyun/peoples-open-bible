translation:
  language: es
  text: 'Esta es el esplendor[a] del rey de Israel, que Dios conoció[b]: levantarlo sobre la casa de Israel, disciplinarlo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «majestad» o «nobleza». El griego εὐπρέπεια denota belleza, dignidad o excelencia visible; aquí «esplendor» preserva bien la grandeza real.
    reason: lexical_alternative
  - marker: b
    text: O «reconoció», «previó» o «aprobó». El griego ἔγνω admite varios matices.
    reason: lexical_alternative
  - marker: c
    text: O «instruirlo» o «formarlo». παιδεῦσαι puede tener un matiz correctivo, educativo o formativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐπρέπεια
  english_pob_choice: splendor
  chosen_spanish: esplendidez
  alternatives_spanish:
  - esplendor
  - majestad
  - nobleza
  lexicon: LSJ
  rationale: El término griego expresa belleza, dignidad o excelencia visible. «Esplendidez» conserva la idea de brillo y dignidad real sin perder el matiz de excelencia; «esplendor» sería la alternativa más directa y más común.
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - supo
  - reconoció
  - previo
  lexicon: LSJ
  rationale: El verbo puede expresar conocer, reconocer o conocer de antemano. «Conoció» mantiene la apertura semántica sin forzar «previó» ni suavizarlo a un simple reconocimiento.
- source_word: ἀναστῆσαι
  english_pob_choice: raising him up
  chosen_spanish: levantarlo
  alternatives_spanish:
  - alzarlo
  - hacerlo surgir
  - establecerlo
  lexicon: LSJ
  rationale: El infinitivo apunta a causar que alguien se levante o sea establecido. «Levantarlo» conserva la imagen verbal y funciona naturalmente en español.
- source_word: ἐπʼ οἶκον Ἰσραήλ
  english_pob_choice: over the house of Israel
  chosen_spanish: sobre la casa de Israel
  alternatives_spanish:
  - para la casa de Israel
  - en la casa de Israel
  lexicon: LSJ
  rationale: «Sobre» reproduce la relación de autoridad o gobierno implícita en la construcción griega, mientras «casa de Israel» conserva la fórmula corporativa del pueblo.
- source_word: παιδεῦσαι
  english_pob_choice: disciplining him
  chosen_spanish: disciplinarlo
  alternatives_spanish:
  - instruirlo
  - educarlo
  - formarlo
  lexicon: LSJ
  rationale: El verbo puede significar instruir, formar o disciplinar. Dado el ajuste del audit trail, «disciplinarlo» es la opción más cercana léxicamente y mantiene el posible peso formativo-correctivo sin explicitar más de lo que el griego exige.
theological_decisions:
- issue: 'Alcance de ἔγνω aplicado a Dios: conocer, reconocer o conocer de antemano'
  english_pob_reading: knew
  chosen_spanish_reading: conoció
  alternative_spanish_readings:
  - reconoció
  - previó
  - aprobó
  rationale: El griego permite varios matices y el contexto puede insinuar elección divina. «Conoció» conserva la tensión teológica sin resolverla hacia una doctrina explícita de predestinación o mera observación.
  doctrine_reference: Preservar la tensión teológica sin cerrarla
- issue: Relación entre levantar al rey y su función sobre Israel
  english_pob_reading: to raise him up over the house of Israel
  chosen_spanish_reading: levantarlo sobre la casa de Israel
  alternative_spanish_readings:
  - establecerlo sobre la casa de Israel
  - nombrarlo sobre la casa de Israel
  rationale: La frase griega une alzar/establecer con autoridad sobre el pueblo. «Levantarlo» mantiene la imagen y el sentido de investidura real sin interpretarlo excesivamente.
  doctrine_reference: Lenguaje de entronización y elección
translation_notes:
  revision_awareness: El audit trail inglés pasó de una lectura más interpretativa («recognized») a una más directa («knew») para ἔγνω, y de «training him» a «discipline him» para παιδεῦσαι. La versión española sigue la revisión más reciente, pero mantiene en nota el rango semántico de ambos verbos para no cerrar indebidamente las alternativas del griego.
  spanish_consistency_notes:
  - Se conserva «casa de Israel» como fórmula corporativa estable, evitando reemplazarla por «pueblo de Israel».
  - «Dios» se mantiene sin artículo ni sustitución por «SEÑOR», conforme al texto griego θεός.
  - La puntuación con dos puntos reproduce la relación explicativa entre la primera cláusula y los infinitivos finales.
