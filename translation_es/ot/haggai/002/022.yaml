translation:
  language: es
  text: Yo volcaré el trono de los reinos[a], y destruiré la fuerza de los reinos de las naciones. Volcaré el carro con su jinete, y los caballos y sus jinetes descenderán[b], cada uno por la espada de su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «derrocaré el trono de los reinos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada uno por la espada de su hermano», un giro idiomático de matanza mutua o contienda interna entre los atacantes.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָפַכְתִּי
  english_pob_choice: I will overturn
  chosen_spanish: derribaré
  alternatives_spanish:
  - voltearé
  - daré vuelta
  - derrocaré
  lexicon: HALOT
  rationale: En este contexto de juicio contra poderes políticos y militares, el verbo hebreo expresa la caída/volteo de estructuras establecidas. «Derribaré» comunica con naturalidad la idea de desmantelar o hacer caer un poder, y funciona bien tanto para el trono como para el carro.
- source_word: כִּסֵּא מַמְלָכוֹת
  english_pob_choice: the throne of kingdoms
  chosen_spanish: el trono de los reinos
  alternatives_spanish:
  - el trono de los reinos
  - los tronos de los reinos
  - el trono real de los reinos
  lexicon: HALOT
  rationale: El hebreo usa un singular («trono») con valor probablemente colectivo o simbólico. «El trono de los reinos» conserva esa forma singular y evita pluralizar sin necesidad, manteniendo la imagen de la soberanía derribada.
- source_word: וְהִשְׁמַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - aniquilaré
  - extirparé
  - borraré
  lexicon: HALOT
  rationale: El verbo intensivo en este contexto tiene fuerza de juicio. «Destruiré» es en español claro y suficientemente fuerte, sin ir más allá de lo que exige el hebreo.
- source_word: חֹזֶק
  english_pob_choice: the strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - la fortaleza
  - el poder
  - la potencia
  lexicon: HALOT
  rationale: «Fuerza» reproduce bien la noción de capacidad o vigor militar/político y suena natural junto a «reinos». «Poder» también sería posible, pero «fuerza» conserva mejor el paralelo con el hebreo.
- source_word: מַמְלְכוֹת הַגּוֹיִם
  english_pob_choice: the kingdoms of the nations
  chosen_spanish: los reinos de las naciones
  alternatives_spanish:
  - los reinos de los pueblos
  - los reinos de las naciones extranjeras
  - los reinos de los gentiles
  lexicon: HALOT
  rationale: «Naciones» traduce bien גּוֹיִם en un marco geopolítico profético. Se mantiene el plural de «reinos» para reflejar la forma hebrea y el paralelismo del versículo.
- source_word: מֶרְכָּבָה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carro de guerra
  - el carro bélico
  - la carroza
  lexicon: HALOT
  rationale: En español bíblico, «carro» es una forma clara y digna para מֶרְכָּבָה; «carro de guerra» sería más explícito pero añade un elemento no expresado directamente. El contexto militar ya aporta el sentido.
- source_word: וְרֹכְבֶיהָ
  english_pob_choice: its rider
  chosen_spanish: a su jinete
  alternatives_spanish:
  - a sus jinetes
  - su jinete
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural con sufijo femenino singular, el sustantivo singular colectivo «carro» permite en español una referencia natural con singular. «A su jinete» conserva el paralelismo con el singular del carro y suena idiomático.
- source_word: וְיָרְדוּ
  english_pob_choice: will go down
  chosen_spanish: caerán
  alternatives_spanish:
  - descenderán
  - irán abajo
  - serán abatidos
  lexicon: HALOT
  rationale: En contexto bélico, «caerán» comunica el descenso a la derrota y muerte con más naturalidad que una traducción literal de «bajarán». Mantiene la imagen de ruina sin perder claridad.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los caballos de guerra
  - los corceles
  lexicon: HALOT
  rationale: «Caballos» es el equivalente directo y más transparente. No se añade «de guerra» porque el contexto ya lo establece mediante carro y jinetes.
- source_word: וְרֹכְבֵיהֶם
  english_pob_choice: their riders
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - sus cabalgantes
  - sus montadores
  - sus caballeros
  lexicon: HALOT
  rationale: «Jinetes» es el término español más natural para רֹכְבִים en este contexto militar. «Caballeros» sería demasiado ambiguo y menos fiel al registro bélico.
- source_word: אִישׁ בְּחֶרֶב אָחִיו
  english_pob_choice: each by the sword of his brother
  chosen_spanish: cada uno por la espada de su hermano
  alternatives_spanish:
  - cada uno por la espada de su hermano
  - cada uno con la espada de su hermano
  - cada uno a espada de su hermano
  lexicon: HALOT
  rationale: Se conserva el valor distributivo e idiomático del hebreo. «Por la espada de su hermano» mantiene la estructura cercana al original y comunica la idea de matanza mutua o guerra civil entre los combatientes.
theological_decisions:
- issue: Lectura del giro distributivo «cada uno ... su hermano» en un contexto de combate interno
  english_pob_reading: each by the sword of his brother, an idiom for mutual slaughter or civil strife among the attackers
  chosen_spanish_reading: cada uno por la espada de su hermano, como giro idiomático de matanza mutua o contienda interna
  alternative_spanish_readings:
  - cada uno por la espada de su hermano
  - cada uno a manos de su hermano
  rationale: La expresión hebrea preserva la imagen de combatientes que se destruyen entre sí. En español conviene mantener el giro cercano al original y explicar su sentido idiomático, sin neutralizar la referencia fraterna ni convertirla en una paráfrasis vaga.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mantenimiento del singular colectivo en «el trono» y «el carro»
  english_pob_reading: the throne of kingdoms / the chariot and its rider
  chosen_spanish_reading: el trono de los reinos / el carro y a su jinete
  alternative_spanish_readings:
  - los tronos de los reinos / los carros y sus jinetes
  - el trono de los reinos / el carro y sus jinetes
  rationale: El hebreo usa singulares con posible valor representativo o colectivo. En español se conserva esa estrategia para no diluir la fuerza simbólica del texto ni imponer una pluralización que el original no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés; no hubo revisiones sustantivas en la última pasada, y el veredicto general fue de alta concordancia con observaciones menores. La versión española mantiene las imágenes singulares de «trono» y «carro», conserva la fuerza del verbo de juicio y añade una nota para el giro idiomático final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la convención del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se evitó «Mesías/Cristo» porque no aparece en el texto.
  - Se prefirió «carro» sobre «carroza» para conservar el registro bíblico y militar.
  - Se usó «jinetes» para רֹכְבִים por ser el equivalente más natural en español contemporáneo y respetar el campo semántico bélico.
