    text: O «perdona toda culpa»; el modismo hebreo literalmente habla de cargar, llevar o quitar la culpa.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los toros de nuestros labios», una metáfora de alabanza, confesión o votos ofrecidos en lugar de sacrificios animales. Algunos testigos antiguos e intérpretes entienden «el fruto de nuestros labios».
    reason: alternative_reading
  revision_rationale: 'Se corrige el principal desajuste con la evidencia fuente y la racionalidad documentada: el texto principal debe conservar la metáfora masorética «los toros de nuestros labios» y dejar «el fruto de nuestros labios» en nota. Además, se regulariza el registro al español neutro latinoamericano con formas de «ustedes».'
