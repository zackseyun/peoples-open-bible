    text: Or 'I will search it out from the beginning of its coming to be.' The Greek phrase is compact and can be rendered more explicitly with 'coming to be' for γενέσεως.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will certainly not pass over the truth.'
    reason: lexical_alternative
