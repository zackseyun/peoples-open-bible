  text: וְ/כָל בַּ֞ת יֹרֶ֣שֶׁת נַחֲלָ֗ה מִ/מַּטּוֹת֮ בְּנֵ֣י יִשְׂרָאֵל֒ לְ/אֶחָ֗ד מִ/מִּשְׁפַּ֛חַת מַטֵּ֥ה אָבִ֖י/הָ תִּהְיֶ֣ה לְ/אִשָּׁ֑ה לְמַ֗עַן יִֽירְשׁוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אִ֖ישׁ נַחֲלַ֥ת אֲבֹתָֽי/ו־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/036/008.yaml
  text: And every daughter who inherits an inheritance from the tribes of the sons of Israel shall become the wife of one from the clan of her father's tribe[d][c][b][a], so that the sons of Israel may each inherit the inheritance of his fathers.
  footnotes:
  - marker: a
    text: Or 'inherits an inheritance' / 'is inheriting property'; the Hebrew participle can emphasize the daughter’s status as an heiress.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'family of her father's tribe'; Hebrew mishpachah denotes a clan-level kinship group within the tribe.
    reason: lexical_alternative
  - marker: d
    text: Or 'may inherit, each one, the inheritance of his fathers.'
    reason: lexical_alternative
