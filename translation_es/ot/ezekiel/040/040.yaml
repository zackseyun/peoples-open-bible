  - marker: b
    text: Or 'at the ascent' or 'where one goes up to the entrance of the north gate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which was by the porch of the gate'; the Hebrew expression indicates association with the gate's porch/vestibule.
    reason: lexical_alternative
