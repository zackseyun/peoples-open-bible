translation:
  language: es
  text: Y cuando un justo[a] se aparta de su justicia y hace injusticia[b], y yo pongo una piedra de tropiezo[c] delante de él, morirá. Porque no lo advertiste, morirá en su pecado, y sus actos de justicia[d] que hizo no serán recordados; y reclamaré su sangre de tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como "un hombre justo". Se mantiene "un justo" para conservar la concisión del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O "comete iniquidad" / "hace mal". El hebreo expresa un acto de injusticia o maldad con peso moral y judicial.
    reason: lexical_alternative
  - marker: c
    text: O "un tropiezo". El hebreo literalmente habla de una imagen de tropiezo puesta delante de él.
    reason: lexical_alternative
  - marker: d
    text: O "sus actos de rectitud". El plural hebreo apunta a acciones concretas de justicia, no solo a una cualidad abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un justo
  alternatives_spanish:
  - un hombre justo
  - una persona justa
  lexicon: HALOT
  rationale: El hebreo funciona sustantivadamente. En español, "un justo" mantiene la concisión y el valor representativo sin forzar un masculino genérico más pesado como "hombre" cuando el contexto ya lo identifica.
- source_word: מִצִּדְקוֹ
  english_pob_choice: from his righteousness
  chosen_spanish: de su justicia
  alternatives_spanish:
  - de su rectitud
  - de su conducta justa
  lexicon: HALOT
  rationale: El sustantivo expresa aquí la esfera o estado de conducta justa. "Justicia" conserva el vínculo léxico y moral del pasaje; "rectitud" sería posible, pero menos unificado con el resto del contexto profético-jurídico.
- source_word: וְעָשָׂה עָוֶל
  english_pob_choice: and does injustice
  chosen_spanish: y hace injusticia
  alternatives_spanish:
  - y comete iniquidad
  - y hace mal
  lexicon: HALOT
  rationale: עָוֶל tiene un peso moral-jurídico que "injusticia" transmite mejor que un simple "mal". "Iniquidad" sería más tradicional, pero menos transparente en español moderno.
- source_word: וְנָתַתִּי מִכְשׁוֹל לְפָנָיו
  english_pob_choice: and I place a stumbling block before him
  chosen_spanish: y yo pondré un obstáculo delante de él
  alternatives_spanish:
  - y pondré una piedra de tropiezo delante de él
  - y le pondré un tropiezo delante
  lexicon: HALOT
  rationale: Se preserva la imagen de tropiezo sin sonar demasiado extraña en español. "Obstáculo" comunica el efecto; la nota puede explicitar la metáfora literal de "piedra de tropiezo" si se desea, pero el texto principal prioriza legibilidad.
- source_word: בְּחַטָּאתוֹ
  english_pob_choice: in his sin
  chosen_spanish: en su pecado
  alternatives_spanish:
  - por su pecado
  - en medio de su pecado
  lexicon: HALOT
  rationale: La preposición hebrea señala la esfera en la que muere. "En su pecado" reproduce bien el sentido idiomático y mantiene la sobriedad del juicio profético.
- source_word: וְלֹא תִזָּכַרְןָ צִדְקֹתָיו אֲשֶׁר עָשָׂה
  english_pob_choice: and his righteous deeds that he did will not be remembered
  chosen_spanish: y sus actos de justicia que hizo no serán recordados
  alternatives_spanish:
  - y sus obras justas que hizo no serán recordadas
  - y sus actos de rectitud que hizo no serán recordados
  lexicon: HALOT
  rationale: El plural צִדְקֹתָיו apunta a actos concretos, no solo a una cualidad abstracta. "Actos de justicia" conserva la pluralidad y el carácter práctico mejor que una formulación más general.
- source_word: וְדָמוֹ מִיָּדְךָ אֲבַקֵּשׁ
  english_pob_choice: and I will require his blood from your hand
  chosen_spanish: y pediré su sangre de tu mano
  alternatives_spanish:
  - y exigiré su sangre de tu mano
  - y reclamaré su sangre de tu mano
  lexicon: HALOT
  rationale: '"Pediré su sangre de tu mano" mantiene la idiomática bíblica de responsabilidad por sangre derramada. "Exigiré" es posible, pero "pediré" conserva mejor el eco forense sin endurecer innecesariamente el español.'
theological_decisions:
- issue: Agencia divina al poner el tropiezo
  english_pob_reading: Retain the concrete metaphor 'stumbling block' without softening or resolving the theological tension of divine agency.
  chosen_spanish_reading: 'Mantener "obstáculo" y no suavizar la atribución a Dios: "y yo pondré".'
  alternative_spanish_readings:
  - y se pondrá un obstáculo delante de él
  - y permitiré que haya un obstáculo delante de él
  rationale: El hebreo atribuye la acción a Dios. La versión española conserva esa tensión sin reinterpretarla como mera permisión o como un giro pasivo que atenúe el texto.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: No recuerdo de los actos previos de justicia
  english_pob_reading: Translate that his prior righteous deeds 'will not be remembered' without importing a systematic-theological conclusion about perseverance or loss of salvation.
  chosen_spanish_reading: Traducir que sus actos de justicia "no serán recordados" sin convertirlo en una conclusión sistemática sobre salvación, perseverancia o apostasía.
  alternative_spanish_readings:
  - sus actos de justicia serán anulados
  - sus actos de justicia se perderán en sentido salvífico
  rationale: La frase profética afirma la no-remembranza de esos actos en el juicio. No conviene cargarla con una tesis doctrinal que el verso no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; este borrador respeta esa lectura de alta concordancia y mantiene las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene "Y" inicial para reproducir la continuidad del hebreo y del audit trail inglés.
  - '"Justicia/justo" se usa de forma coherente para צדיק/צדק según el contexto inmediato.'
  - '"Obstáculo" cubre la metáfora de מִכְשׁוֹל sin perder inteligibilidad; la nota preserva la alternativa literal.'
  - '"Pediré su sangre de tu mano" conserva el lenguaje forense de responsabilidad por sangre.'
  - No se introduce vocabulario eclesiástico tradicional que debilite la transparencia del texto profético.
