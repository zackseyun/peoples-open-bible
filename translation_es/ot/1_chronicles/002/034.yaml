translation:
  language: es
  text: Sesan no tuvo hijos varones, sino solo hijas. Y Sesan tuvo un esclavo[a] egipcio, cuyo nombre era Jarha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El hebreo עֶבֶד puede denotar un siervo o un esclavo; aquí se elige «esclavo» para preservar la idea de condición de servidumbre del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיָה לְשֵׁשָׁן
  english_pob_choice: Sheshan had
  chosen_spanish: Sesan tuvo
  alternatives_spanish:
  - había para Sesan
  - Sesan tenía
  lexicon: HALOT
  rationale: El hebreo expresa posesión mediante la construcción existencial 'ser/estar para'. En español, 'tuvo' comunica de forma natural la posesión relacional en esta genealogía sin perder el sentido del original.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - varones
  lexicon: HALOT
  rationale: Aunque el inglés auditado usa 'sons' por el contraste inmediato con 'daughters', en español 'hijos' cubre adecuadamente el plural masculino en una fórmula genealógica y evita una redundancia poco natural con 'hijas'. El contraste masculino/femenino sigue claro por el par 'hijos / hijas'.
- source_word: כִּי אִם
  english_pob_choice: only
  chosen_spanish: sino solo
  alternatives_spanish:
  - solo
  - excepto
  lexicon: HALOT
  rationale: 'Después de la negación, la construcción hebrea equivale a ''excepto / sino''. En español, ''sino solo'' reproduce bien la corrección contrastiva: ''no tuvo hijos, sino solo hijas''.'
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: hijas
  alternatives_spanish:
  - doncellas
  lexicon: HALOT
  rationale: Equivalente directo y natural para preservar el contraste con 'hijos'.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: Se mantiene el valor fuerte de dependencia/bondaje que la POB inglesa decidió conservar. 'Esclavo' evita suavizar el término y sigue la nota auditada que rechaza 'servant' cuando borra el matiz léxico.
- source_word: מִצְרִי
  english_pob_choice: Egyptian
  chosen_spanish: egipcio
  alternatives_spanish:
  - de Egipto
  - egipcio de origen
  lexicon: HALOT
  rationale: Adjetivo nacional directo y natural en español.
- source_word: וּשְׁמוֹ
  english_pob_choice: whose name was
  chosen_spanish: cuyo nombre era
  alternatives_spanish:
  - y su nombre era
  lexicon: HALOT
  rationale: La relativa española 'cuyo nombre era' reproduce el valor informativo del hebreo sin forzar un calco de 'y su nombre'.
- source_word: יַרְחָע
  english_pob_choice: Jarha
  chosen_spanish: Jarha
  alternatives_spanish:
  - Yarha
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado de manera estándar.
theological_decisions:
- issue: Estado social de עֶבֶד
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La tradición auditada de la POB preserva el sentido de condición vinculada o sometida del término hebreo. En español, 'esclavo' mantiene esa fuerza y evita una domesticación semántica que debilite el dato social del texto.
  doctrine_reference: Lexical policy on δοῦλος/עֶבֶד and bonded-status terminology
- issue: Contraste numérico y familiar
  english_pob_reading: no sons, only daughters
  chosen_spanish_reading: no tuvo hijos, sino solo hijas
  alternative_spanish_readings:
  - no tuvo hijos, solo hijas
  - no tuvo hijos varones, sino hijas
  rationale: La formulación conserva el contraste excluyente del hebreo כִּי אִם después de la negación y mantiene la lectura genealógica simple y transparente.
  doctrine_reference: Hebrew syntax and narrative genealogy
translation_notes:
  revision_awareness: El contexto auditado del inglés pasó por una revisión que intentó suavizar 'slave' a 'servant', pero luego se corrigió para restaurar 'slave' por fidelidad al término hebreo עֶבֶד. La versión española sigue esa decisión final y no atenúa el estado de bondaje. No se observan variantes textuales relevantes en el hebreo base (WLC).
  spanish_consistency_notes:
  - Se usa 'Sesan' como transliteración uniforme de שֵׁשָׁן.
  - Se mantiene el orden narrativo de dos oraciones breves como en el hebreo y el inglés auditado.
  - '''hijos / hijas'' conserva el contraste de género sin añadir explicaciones interpretativas.'
  - '''cuyo nombre era'' es una solución idiomática en español para וּשְׁמוֹ.'
  - La nota [a] queda anclada en 'esclavo' para señalar la alternativa léxica documentada.
