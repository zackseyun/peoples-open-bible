base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/038/028.yaml
  text: So the smith sits near the anvil and examines the unworked iron[a]; the vapor of the fire wastes his flesh[b], and he struggles with the heat of the furnace.
  footnotes:
  - marker: a
    text: Or 'the unworked iron' for 'the raw iron.' The Greek adjective can denote what is idle or not yet worked.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the vapor of the fire melts his flesh.' The English main text uses 'wastes' to express the bodily toll idiomatically.
    reason: lexical_alternative
