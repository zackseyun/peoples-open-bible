id: 2SA.11.11
reference: 2 Samuel 11:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אוּרִיָּ֜ה אֶל דָּוִ֗ד הָ֠/אָרוֹן וְ/יִשְׂרָאֵ֨ל וִֽ/יהוּדָ֜ה יֹשְׁבִ֣ים בַּ/סֻּכּ֗וֹת וַ/אדֹנִ֨/י יוֹאָ֜ב וְ/עַבְדֵ֤י אֲדֹנִ֨/י עַל פְּנֵ֤י הַ/שָּׂדֶה֙ חֹנִ֔ים וַ/אֲנִ֞י אָב֧וֹא אֶל בֵּיתִ֛/י לֶ/אֱכֹ֥ל וְ/לִ/שְׁתּ֖וֹת וְ/לִ/שְׁכַּ֣ב עִם אִשְׁתִּ֑/י חַיֶּ֨/ךָ֙ וְ/חֵ֣י נַפְשֶׁ֔/ךָ אִֽם אֶעֱשֶׂ֖ה אֶת הַ/דָּבָ֥ר הַ/זֶּֽה־־־־־־׃
translation:
  text: Uriah said to David[a], “The ark, and Israel and Judah, are staying in shelters, and my lord Joab and the servants of my lord are camped in the open field. Shall I then go to my house to eat and to drink and to lie with my wife? As surely as you live, and as your soul lives[c][b], I will not do this thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'booths' or 'temporary shelters'; the term refers to makeshift dwellings used in the field.
    reason: lexical_alternative
  - marker: b
    text: Or 'Shall I go to my house...?' The Hebrew wording is a rhetorical question expressing Uriah's refusal.
    reason: alternative_reading
  - marker: c
    text: 'Hebrew oath formula: ''As you live, and as your soul lives, if I do this thing''—with ''if'' expressing a strong negative after the oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the Ark of God
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew says simply 'the ark' with the article. 'The ark' preserves the text's wording without importing an expanded title not present in this verse, while still reflecting the known referent.
- source_word: יֹשְׁבִים בַּסֻּכּוֹת
  chosen: are staying in shelters
  alternatives:
  - are dwelling in booths
  - are living in tents
  lexicon: HALOT
  rationale: סֻכּוֹת literally denotes temporary shelters/booths. 'Staying in shelters' is natural modern English and preserves the temporary wartime sense better than the more wooden 'dwelling in booths.' 'Tents' is possible contextually but is less literal than the Hebrew noun.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In this narrative setting the term is a respectful human address/title, not the divine name. 'My lord' best matches the social register in readable English.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: in the open field
  alternatives:
  - on the face of the field
  - in the field
  lexicon: HALOT
  rationale: The idiom literally means 'on the surface/face of the field' and conveys exposure in the open countryside. 'In the open field' communicates that sense idiomatically.
- source_word: חֹנִים
  chosen: are camped
  alternatives:
  - are encamped
  - are camping
  lexicon: HALOT
  rationale: The participle describes an ongoing military encampment. 'Are camped' is concise, natural, and fits the wartime context.
- source_word: וַאֲנִי אָבוֹא אֶל בֵּיתִי
  chosen: Am I to go to my house
  alternatives:
  - And I should go to my house
  - Shall I go to my house
  lexicon: HALOT
  rationale: Though formally a first-person imperfect, in context it is rhetorical and indignant. 'Am I to go' captures the implied protest better than a flat future.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת וְלִשְׁכַּב עִם אִשְׁתִּי
  chosen: to eat and to drink and to lie with my wife
  alternatives:
  - to eat and drink and sleep with my wife
  lexicon: HALOT
  rationale: The infinitive chain is preserved with repeated 'to' for rhetorical force. 'Lie with my wife' is a clear, dignified rendering of the sexual euphemism; 'sleep with' is more colloquial and less textually restrained.
- source_word: חַיֶּךָ וְחֵי נַפְשֶׁךָ
  chosen: As surely as you live, and as your soul lives
  alternatives:
  - By your life and the life of your soul
  - As you live, and as your very life lives
  lexicon: HALOT
  rationale: This is an oath formula invoking the life of the person addressed. The chosen rendering is idiomatic in English while preserving the doubled solemnity. 'Soul' is retained rather than flattened to 'self' to stay closer to the Hebrew נפשׁ.
- source_word: אִם אֶעֱשֶׂה אֶת הַדָּבָר הַזֶּה
  chosen: I will not do this thing
  alternatives:
  - if I do this thing
  lexicon: HALOT
  rationale: After an oath formula, אִם functions elliptically as a strong negation ('surely not'). English requires the implied negative to be made explicit; a literal 'if I do this thing' would be misleading.
