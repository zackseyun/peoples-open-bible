translation:
  language: es
  text: Cuando este hombre dijo tales cosas, los demás Amigos[a], pronto mal dispuestos hacia Judas[b], incitaron aún más a Demetrio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los otros cortesanos reales»; el griego «los demás Amigos» probablemente usa «Amigos» como título de corte, no en el sentido ordinario de amigos personales.
    reason: cultural_note
  - marker: b
    text: El verbo griego es raro y puede significar que incitaron, predispusieron o amargaron más a Demetrio contra Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτων ... ῥηθέντων
  english_pob_choice: when ... had said such things
  chosen_spanish: Cuando ... hubo dicho tales cosas
  alternatives_spanish:
  - después de haber dicho tales cosas
  - al haber dicho tales cosas
  - cuando se dijeron tales cosas
  lexicon: LSJ
  rationale: La construcción genitiva absoluta pide en español una subordinada temporal o circunstancial. «Hubo dicho» conserva la anterioridad del dicho sin sonar tan plana como un pretérito simple.
- source_word: ὑπὸ τούτου
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - por él
  - por este
  - este
  lexicon: LSJ
  rationale: El griego apunta al hablante inmediato con cierto distanciamiento. «Este hombre» mantiene esa referencia y el matiz algo despectivo o recortado del demostrativo.
- source_word: θᾶττον
  english_pob_choice: quickly
  chosen_spanish: estando pronto
  alternatives_spanish:
  - rápidamente
  - enseguida
  - pronto
  lexicon: LSJ
  rationale: La idea central es prontitud de reacción. En español, «estando pronto» reproduce el valor adverbial ligado al participio siguiente; se evita sobrecargar con una expresión más interpretativa.
- source_word: οἱ λοιποὶ φίλοι
  english_pob_choice: the rest of the Friends
  chosen_spanish: los demás de los Amigos
  alternatives_spanish:
  - los demás Amigos
  - el resto de los Amigos
  - los otros de los Amigos
  lexicon: LSJ
  rationale: Se conserva «Amigos» con mayúscula porque el contexto cortesano sugiere un título de corte, no amistades ordinarias. La perícopa española puede sonar menos natural que una versión lisa, pero preserva la decisión documental de la POB.
- source_word: δυσμενῶς ἔχοντες
  english_pob_choice: being quickly ill-disposed
  chosen_spanish: mal dispuestos
  alternatives_spanish:
  - de mala disposición
  - hostiles
  - malquistados
  lexicon: LSJ
  rationale: La expresión griega describe una disposición adversa. «Mal dispuestos» es claro, neutral y suficientemente cercano sin intensificar prematuramente a «hostiles».
- source_word: τι πρὸς τὸν Ἰούδαν
  english_pob_choice: toward Judas
  chosen_spanish: hacia Judas
  alternatives_spanish:
  - contra Judas
  - con respecto a Judas
  - para con Judas
  lexicon: LSJ
  rationale: «Hacia» conserva la dirección relacional del griego y evita decidir demasiado pronto por un enfrentamiento explícito, que el contexto sugiere pero no formula aquí.
- source_word: προετετύρωμαν
  english_pob_choice: further incited
  chosen_spanish: incitaron aún más
  alternatives_spanish:
  - instigaron aún más
  - exasperaron aún más
  - azuzaron aún más
  lexicon: LSJ
  rationale: El verbo es raro y el inglés auditado recoge una idea de empujar o provocar más a Demetrio contra Judas. «Incitaron aún más» mantiene esa fuerza causal sin introducir un modismo demasiado fuerte.
- source_word: τὸν Δημήτριον
  english_pob_choice: Demetrius
  chosen_spanish: a Demetrio
  alternatives_spanish:
  - Demetrio
  - contra Demetrio
  lexicon: LSJ
  rationale: El nombre se translitera de manera estándar. El objeto indirecto/afectado se expresa con «a» para un español más natural.
theological_decisions:
- issue: La frase φίλοι en contexto real de corte seléucida
  english_pob_reading: the rest of the Friends
  chosen_spanish_reading: los demás de los Amigos
  alternative_spanish_readings:
  - los demás amigos
  - los otros cortesanos
  - los demás de la corte
  rationale: No se espiritualiza ni se banaliza el término. Se conserva la mayúscula en «Amigos» para señalar el probable título cortesano, siguiendo la nota auditada del texto inglés.
  doctrine_reference: Cultural-historical note; no doctrinal issue
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió «being quickly ill-disposed» para δυσμενῶς ἔχοντες y «incited» para προετετύρωμαν. La versión española refleja esa precisión con «mal dispuestos» e «incitaron aún más», manteniendo la tensión léxica sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» fuera de este versículo porque no aparecen en el texto.
  - «Amigos» se capitaliza como término cortesano siguiendo la lectura auditada del inglés.
  - Se evita introducir «hostiles» en el cuerpo principal para no adelantar una interpretación más fuerte que la del griego y el inglés revisado.
