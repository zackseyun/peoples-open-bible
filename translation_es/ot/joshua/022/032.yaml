translation:
  language: es
  text: Entonces Finees, hijo de Eleazar el sacerdote, y los líderes regresaron de los hijos de Rubén y de los hijos de Gad, de la tierra de Galaad a la tierra de Canaán, a los hijos de Israel, y les llevaron noticia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y les llevaron un informe». El hebreo דָּבָר puede significar «palabra», «asunto» o «informe» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: שוב en este contexto narrativo expresa el acto de volver; 'regresaron' es natural en español moderno y conserva el movimiento de retorno sin forzar un calco.
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Phinehas son of Eleazar the priest
  chosen_spanish: Finees, hijo de Eleazar el sacerdote
  alternatives_spanish:
  - Finees, hijo de Eleazar, el sacerdote
  - Finees, hijo de Eleazar, el sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se mantiene la apposición de filiación y oficio. 'El sacerdote' corresponde directamente a הַכֹּהֵן sin añadir matices ajenos al texto.
- source_word: וְהַנְּשִׂיאִים
  english_pob_choice: and the leaders
  chosen_spanish: y los líderes
  alternatives_spanish:
  - y los jefes
  - y los príncipes
  - y los principales
  lexicon: HALOT
  rationale: נְשִׂיאִים designa aquí autoridades tribales o cabecillas. 'Líderes' es claro en español contemporáneo y evita sugerir monarquía.
- source_word: מֵאֵת בְּנֵי רְאוּבֵן וּמֵאֵת בְּנֵי גָד
  english_pob_choice: from the sons of Reuben and from the sons of Gad
  chosen_spanish: de entre los hijos de Rubén y de entre los hijos de Gad
  alternatives_spanish:
  - de los hijos de Rubén y de los hijos de Gad
  - de entre los rubenitas y de entre los gaditas
  lexicon: HALOT
  rationale: Se conserva la estructura repetida 'hijos de...' que refleja mejor el hebreo que una etnónima resumida. 'De entre' ayuda a expresar la procedencia marcada por מֵאֵת.
- source_word: מֵאֶרֶץ הַגִּלְעָד
  english_pob_choice: from the land of Gilead
  chosen_spanish: de la tierra de Galaad
  alternatives_spanish:
  - de la región de Galaad
  - desde la tierra de Galaad
  lexicon: HALOT
  rationale: אֶרֶץ se vierte como 'tierra' para mantener correspondencia formal y el contraste geográfico con Canaán.
- source_word: אֶל אֶרֶץ כְּנַעַן
  english_pob_choice: to the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - hacia la tierra de Canaán
  - a Canaán
  lexicon: HALOT
  rationale: Se retiene 'tierra' para reflejar la repetición del sustantivo y mantener el paralelismo con 'la tierra de Galaad'.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'hijos de Israel' porque el hebreo la usa explícitamente; en español sigue siendo comprensible y refleja el formulismo del texto.
- source_word: וַיָּשִׁבוּ אוֹתָם דָּבָר
  english_pob_choice: and brought back word to them
  chosen_spanish: y les llevaron noticia
  alternatives_spanish:
  - y les dieron un informe
  - y les llevaron palabra
  - y les respondieron con un informe
  lexicon: HALOT
  rationale: דָּבָר aquí puede significar 'palabra', 'mensaje' o 'informe'. 'Noticia' comunica de manera idiomática el sentido de un reporte traído de vuelta, sin perder el vínculo con la acción de regresar.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde una formulación más etnónima ('the Reubenites and the Gadites') a una más literal ('the sons of Reuben and from the sons of Gad'); la versión española sigue esa literalidad de filiación y conserva el movimiento de retorno y la entrega del mensaje. No se detectan tensiones teológicas en este versículo.
  spanish_consistency_notes:
  - Se usa 'Finees' como transliteración estable del nombre Phinehas en español.
  - Se conserva 'hijos de Israel' por fidelidad al hebreo, aunque 'israelitas' sería una equivalencia idiomática válida.
  - '''Tierra'' se repite para mantener la correspondencia con אֶרֶץ en ambas cláusulas geográficas.'
  - '''Noticia'' se eligió para hacer natural en español el valor de דָּבָר como reporte, manteniendo la alternativa en nota.'
