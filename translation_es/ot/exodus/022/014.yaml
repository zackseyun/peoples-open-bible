review_pass:
  verdict: revise
  source_alignment_summary: 'La primera cláusula refleja bien el hebreo: «su dueño ... está con él» capta בְּעָלָיו עִמּוֹ, y «no hará restitución» preserva el sentido jurídico de לֹא יְשַׁלֵּם. El problema principal está en la segunda cláusula: el rastro auditado del POB en inglés termina con una lectura principal personal («if he is a hired worker»), y el borrador español sigue esa lectura con «si es un jornalero». Sin embargo, mantiene una nota al pie que presenta esa misma lectura personal como alternativa, cuando según el inglés auditado la alternativa preservada es más bien la lectura del bien/animal alquilado. Además, «vino por su jornal» es algo duro y menos claro en español; conviene una formulación más natural sin perder la tersura.'
  spanish_quality_summary: El español es generalmente legible y digno, pero hay una incoherencia entre texto principal, decisiones léxicas y nota al pie. «No hará restitución» funciona, aunque «no tendrá que hacer restitución» sería más idiomático; no es imprescindible cambiarlo. «Jornalero» es entendible, pero «trabajador contratado» suena más neutro y ampliamente comprensible en español eclesial latinoamericano. La nota actual necesita corregirse para no invertir la relación entre lectura principal y alternativa.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. El léxico legal está bien orientado con «dueño» y «restitución». La elección de «jornalero» no es incorrecta, pero «trabajador contratado» o «asalariado» se alinea mejor con legibilidad neutral. Debe corregirse la nota para reflejar la racionalidad documentada: el hebreo es ambiguo entre trabajador contratado y bien/animal alquilado; si el texto principal sigue la lectura personal del inglés auditado, la nota debe dar como alternativa la lectura del objeto alquilado.'
  issues:
  - severity: high
    issue: La nota al pie contradice la lectura principal adoptada
    rationale: 'El texto principal dice «si es un jornalero», siguiendo la lectura personal del inglés auditado. Pero la nota dice «O: si él es un jornalero...» como si esa fuera la alternativa, cuando en realidad repite la lectura principal en vez de preservar la alternativa del bien/animal alquilado.'
  - severity: medium
    issue: «Jornalero» puede sonar regional o demasiado estrecho
    rationale: Aunque es válido, en una Biblia de alcance amplio «trabajador contratado» comunica mejor la idea de שָׂכִיר sin limitarse al matiz de peón jornalero.
  - severity: low
    issue: «Vino por su jornal» es algo áspero en español
    rationale: Es bastante literal, pero puede sonar poco natural. «Vino por su paga» mantiene la concisión legal y resulta algo más claro para lectores generales.
  revised_spanish_text: Si su dueño está con él,[a] no hará restitución; si es un trabajador contratado, vino por su paga.
  revised_footnotes:
  - marker: a
    text: 'O: «si es algo alquilado, vino por su alquiler». El hebreo es breve y puede entenderse ya sea de un trabajador contratado o de un bien/animal alquilado; en este contexto de responsabilidad por propiedad prestada, algunos entienden la cláusula del objeto alquilado.'
    reason: alternative_reading
  revision_rationale: 'Se corrige la incoherencia principal entre texto y nota al pie: la lectura personal permanece en el texto principal, mientras que la nota ahora preserva la alternativa del bien/animal alquilado, conforme al expediente inglés auditado. También se mejora la neutralidad y claridad del español con «trabajador contratado» y «paga».'
