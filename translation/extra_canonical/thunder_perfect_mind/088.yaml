  - intemperance
  - licentiousness
  lexicon: Probably from Greek privative a- + kol- (cf. akolasia/akrateia), used in
    Coptic to mean lack of restraint or licentiousness.
  rationale: Keeps the explicit antithesis with “self-control” without narrowing to
    specifically sexual ‘licentiousness’; preserves the paradoxical pair.
- source_word: ϩⲓϫⲙ
