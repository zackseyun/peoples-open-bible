id: 1TH.2.13
reference: 1 Thessalonians 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Καὶ διὰ τοῦτο καὶ ἡμεῖς εὐχαριστοῦμεν τῷ θεῷ ἀδιαλείπτως, ὅτι παραλαβόντες λόγον ἀκοῆς παρ’ ἡμῶν τοῦ θεοῦ ἐδέξασθε οὐ λόγον ἀνθρώπων ἀλλὰ καθὼς ⸂ἀληθῶς ἐστὶν⸃ λόγον θεοῦ, ὃς καὶ ἐνεργεῖται ἐν ὑμῖν τοῖς πιστεύουσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/013.yaml
  text: And because of this we also thank God continually[a], that when you received the word of God that you heard from us, you accepted it not as the word of men but, as it truly is, the word of God[c][b], which is also at work in you who believe.
  footnotes:
  - marker: a
    text: Or 'the message of God that you heard from us.' The Greek expression is compressed and can be unpacked in more than one natural way in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'not as a human word but, as it truly is, God''s word.'
    reason: lexical_alternative
  - marker: c
    text: 'The relative pronoun could also be understood to refer to God: ''who is also at work in you who believe.'''
    reason: alternative_reading
translation:
  language: ko
  text: 이런 까닭에 우리도 하나님께 쉬지 않고 감사드리고 있습니다. 곧 여러분이 우리에게서 들은 하나님의 말씀[a]을 받았을 때 사람의 말로가 아니라, 그 말씀이 참으로 그러한 대로 하나님의 말씀[b]으로 받아들였기 때문입니다. 그 말씀은 또한 믿는 여러분 가운데서 역사하고 있습니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리에게서 들은 하나님의 메시지」. 헬라어 표현이 압축적이어서 풀어 옮기는 방식이 여러 가지일 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「사람의 말이 아니라, 참으로 그러한 대로 하나님의 말씀」.
    reason: lexical_alternative
  - marker: c
    text: 관계대명사가 하나님을 가리킬 수도 있다. 그 경우 「그분이 또한 믿는 여러분 가운데서 역사하십니다」.
    reason: alternative_reading
lexical_decisions:
- source_word: παραλαβόντες λόγον ἀκοῆς παρ’ ἡμῶν τοῦ θεοῦ
  english_pob_choice: when you received the word of God that you heard from us
  chosen_korean: 여러분이 우리에게서 들은 하나님의 말씀을 받았을 때
  alternatives_korean:
  - 우리에게서 들은 하나님의 말씀을 전해 받았을 때
  - 우리에게서 받은 들음의 말씀, 곧 하나님의 말씀을
  lexicon: BDAG
  rationale: 직역의 압축적 구조(들음의 말씀, 곧 하나님의 것)를 풀어 한국어 자연 어순으로 옮긴다. 영어 POB의 정리된 풀이를 동일한 방식으로 따른다.
- source_word: ἐδέξασθε
  english_pob_choice: you accepted it
  chosen_korean: 받아들였기
  alternatives_korean:
  - 영접하였기
  - 받았기
  lexicon: BDAG
  rationale: 앞 분사 παραλαβόντες(「받았다」)와 구분하기 위해 「받아들였다」로 옮긴다. 영접의 능동성을 살린다.
- source_word: λόγον θεοῦ
  english_pob_choice: the word of God
  chosen_korean: 하나님의 말씀
  alternatives_korean:
  - 하나님께 속한 말씀
  - 하나님의 메시지
  lexicon: BDAG
  rationale: 「하나님의 말씀」이 한국 교회 전통의 정형 어휘이며 본문의 무게를 그대로 담는다.
- source_word: ἐνεργεῖται ἐν ὑμῖν τοῖς πιστεύουσιν
  english_pob_choice: which is also at work in you who believe
  chosen_korean: 믿는 여러분 가운데서 역사하고 있습니다
  alternatives_korean:
  - 믿는 여러분 안에서 일하고 있습니다
  - 믿는 여러분 속에서 능력을 나타내고 있습니다
  lexicon: BDAG
  rationale: ἐνεργέω의 신적 행위 의미를 「역사하다」로 옮긴다. 한국 교회 전통의 표준 어휘이며 「일하다」보다 신적 능력 행사의 어감이 분명하다.
theological_decisions:
- issue: 관계대명사 ὅς의 선행사
  chosen_reading: 「말씀」을 선행사로 본 「그 말씀은 ... 역사하고 있습니다」
  alternative_readings:
  - 「하나님」을 선행사로 본 「그분이 ... 역사하십니다」
  rationale: 헬라어 ὅς는 남성 단수로 λόγος(남성)와 θεός(남성) 모두 가능하다. 본 번역은 직전 명사인 λόγος로 받아 본문의 자연스러운 흐름을 보존하되, 하나님을 가리킬 가능성을 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
