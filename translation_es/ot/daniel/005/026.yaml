translation:
  language: es
  text: 'Esta es la interpretación del mensaje[b]: MENE—Dios ha numerado tu reino y lo ha terminado[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El arameo MENE suena como el verbo que significa "ha numerado" o "ha contado".
    reason: lexical_alternative
  - marker: b
    text: O "la palabra", "el asunto" o "la inscripción".
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Esta
  lexicon: HALOT
  rationale: El demostrativo arameo introduce la explicación de Daniel. En español, "Esta es" reproduce de manera natural la copulativa implícita sin perder el tono de identificación del encabezado interpretativo.
- source_word: פְּשַׁר
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - explicación
  lexicon: HALOT
  rationale: En Daniel, פְּשַׁר se usa para la interpretación de sueños o de escritura enigmática. "Interpretación" conserva ese sentido técnico y es claro en español.
- source_word: מִלְּתָא
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - la palabra
  - la cosa
  - la inscripción
  lexicon: HALOT
  rationale: El término arameo puede significar "palabra", "asunto" o "cosa"; aquí se refiere a las palabras escritas con valor comunicativo. "Mensaje" expresa bien esa función sin cargar la frase con literalidad extraña.
- source_word: מְנֵא
  english_pob_choice: MENE
  chosen_spanish: MENE
  alternatives_spanish:
  - Mena
  - Número
  lexicon: HALOT
  rationale: Se conserva la transliteración del término inscrito, porque el verso depende del juego de palabras entre la palabra escrita y su explicación verbal.
- source_word: מְנָה
  english_pob_choice: has numbered
  chosen_spanish: ha contado
  alternatives_spanish:
  - ha numerado
  - ha calculado
  lexicon: HALOT
  rationale: En español, "ha contado" comunica el acto de hacer recuento y mantiene de forma natural el vínculo con MENE. Aunque "ha numerado" refleja más de cerca la forma inglesa, suena menos idiomático; "ha contado" preserva la relación semántica y el sentido de cómputo decretado.
- source_word: אֱלָהָא
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: La forma enfática/determinada se vierte naturalmente como "Dios" en español. El contexto presenta al Dios verdadero como agente del juicio sobre el reino.
- source_word: מַלְכוּתָךְ
  english_pob_choice: your kingdom
  chosen_spanish: tu reino
  alternatives_spanish:
  - tu realeza
  - tu dominio
  lexicon: HALOT
  rationale: El sustantivo se refiere al reino como esfera de poder y gobierno. "Tu reino" es la equivalencia más natural y precisa en español.
- source_word: וְהַשְׁלְמַהּ
  english_pob_choice: and finished it
  chosen_spanish: y lo ha terminado
  alternatives_spanish:
  - y lo ha acabado
  - y lo ha completado
  lexicon: HALOT
  rationale: El verbo expresa concluir o llevar a su fin; en este contexto judicial, "terminado" comunica la terminación del reino sin sugerir una culminación positiva. Se conserva el objeto pronominal para reflejar el complemento implícito del verbo.
theological_decisions:
- issue: Cómo expresar la acción divina sobre el reino de Belsasar
  english_pob_reading: God has numbered your kingdom and finished it.
  chosen_spanish_reading: Dios ha contado tu reino y lo ha terminado.
  alternative_spanish_readings:
  - Dios ha numerado tu reino y lo ha terminado
  - Dios ha contado los días de tu reino y lo ha terminado
  rationale: El texto presenta un juicio soberano de Dios sobre el reino. "Ha contado" conserva el juego verbal con MENE y la idea de un cómputo fijado; "lo ha terminado" mantiene la fuerza judicial de la clausura sin añadir explicaciones ajenas al verso. Se evita resolver la metáfora más allá de lo que el arameo exige.
  doctrine_reference: Preservar la tensión metafórica y judicial del texto; equivalencia óptima
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de "brought it to an end" a "finished it" para reflejar con más concisión el verbo de cierre. En español, "lo ha terminado" sigue esa misma decisión de concisión y fuerza judicial.
  spanish_consistency_notes:
  - Se mantiene "MENE" sin traducir para conservar el juego de palabras central del verso.
  - '"Dios" se usa sin mayúscula especial adicional ni sustitución por "SEÑOR", conforme al estilo POB para este pasaje.'
  - '"Tu reino" conserva el referente real y político de מַלְכוּתָךְ sin ampliar innecesariamente a "reinado".'
  - El objeto pronominal "lo" aclara en español lo que el arameo deja implícito en el verbo de terminación.
