revisions:
- from: Porque Dios lo condujo con seguridad en su extravío.[a][b]
  to: Porque Dios lo condujo con seguridad a través de su extravío.[a][b]
  rationale: Se revisa solo la frase preposicional final para reflejar mejor el sentido contextual de πλανήσει según el expediente auditado y para lograr un español más natural. Se conserva «extravío» como opción principal por su amplitud semántica, mientras las notas preservan «error», «engaño» y la formulación previa con «en su extravío».
  reviewer_model: gpt-5.4
