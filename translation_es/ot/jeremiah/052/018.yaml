  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La decisión «ministraban» está alineada con el matiz cultual documentado. La revisión propuesta mejora la alineación léxica con la decisión inglesa para הַמִּזְרָקֹת sin perder naturalidad en español.
