  text: וַ/אֲנִי֙ נִשְׁאַ֣רְתִּי לְ/בַדִּ֔/י וָֽ/אֶרְאֶ֗ה אֶת הַ/מַּרְאָ֤ה הַ/גְּדֹלָה֙ הַ/זֹּ֔את וְ/לֹ֥א נִשְׁאַר בִּ֖/י כֹּ֑ח וְ/הוֹדִ֗/י נֶהְפַּ֤ךְ עָלַ/י֙ לְ/מַשְׁחִ֔ית וְ/לֹ֥א עָצַ֖רְתִּי כֹּֽחַ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/010/008.yaml
  text: So I alone was left and saw this great vision[a], and no strength remained in me; my splendor was turned to ruin upon me[b], and I retained no strength.
