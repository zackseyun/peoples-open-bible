translation:
  language: es
  text: La tinaja de harina no se agotó, y la vasija de aceite no faltó, conforme a la palabra de Yahvé, que había hablado por medio de Elías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "por la mano de Elías", un giro idiomático que significa "por medio de Elías".'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּד
  english_pob_choice: jar
  chosen_spanish: tinaja
  alternatives_spanish:
  - jarra
  - vasija
  lexicon: HALOT
  rationale: El hebreo designa un recipiente doméstico para contener provisiones; en español, "tinaja" comunica un recipiente de almacenamiento sin sugerir necesariamente uso para líquidos. Evita el falso matiz de una jarra de servir.
- source_word: הַקֶּמַח
  english_pob_choice: the flour
  chosen_spanish: harina
  alternatives_spanish:
  - la harina
  - el trigo molido
  lexicon: HALOT
  rationale: '"Harina" es el equivalente natural y claro en español para el sustento doméstico del pasaje. Mantiene el sentido de provisión básica sin introducir especificaciones no dadas por el hebreo.'
- source_word: לֹא כָלָתָה
  english_pob_choice: was not used up
  chosen_spanish: no se agotó
  alternatives_spanish:
  - no se consumió
  - no se acabó
  - no se terminó
  lexicon: HALOT
  rationale: La idea es que el contenido no llegó a consumirse por completo. "No se agotó" preserva bien el sentido de continuidad milagrosa y suena natural en español.
- source_word: צַפַּחַת
  english_pob_choice: jug
  chosen_spanish: vasija
  alternatives_spanish:
  - jarra
  - frasco
  - jarrón
  lexicon: HALOT
  rationale: Se trata de un recipiente menor para aceite. "Vasija" funciona como término amplio y evita forzar una forma moderna demasiado específica que el hebreo no exige.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: aceite
  alternatives_spanish:
  - el aceite
  lexicon: HALOT
  rationale: '"Aceite" corresponde de manera directa al sustantivo hebreo y es idiomático en español para el aceite doméstico usado en el relato.'
- source_word: לֹא חָסֵר
  english_pob_choice: did not run out
  chosen_spanish: no se vació
  alternatives_spanish:
  - no faltó
  - no disminuyó
  - no se acabó
  lexicon: HALOT
  rationale: El hebreo expresa no quedar en falta o deficiente. En español, para un recipiente con aceite, "no se vació" transmite la continuidad del suministro y armoniza con la primera cláusula sin perder el matiz de no escasear.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la referencia explícita a la palabra hablada por Dios y el nombre divino en la forma normativa del proyecto, "Yahvé", en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la convención del proyecto en español. "Yahvé" preserva la identidad del Tetragrámaton sin la sustitución tradicional por "SEÑOR".
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El pluscuamperfecto en español refleja que la palabra ya había sido pronunciada antes del cumplimiento narrado. "Hablado" conserva mejor la relación con la revelación verbal que un simple "dicho".
- source_word: בְּיַד אֵלִיָּהוּ
  english_pob_choice: by the hand of Elijah
  chosen_spanish: por medio de Elías
  alternatives_spanish:
  - por la mano de Elías
  - a través de Elías
  - mediante Elías
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de agencia. En español, "por medio de Elías" comunica de forma natural la mediación profética que el original expresa literalmente con "por la mano de".
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula de cumplimiento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto vincula el milagro con la palabra pronunciada por el Dios de Israel usando el Tetragrámaton. El español del proyecto debe conservar el nombre divino en lugar de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de mediación profética
  english_pob_reading: that he had spoken by the hand of Elijah
  chosen_spanish_reading: que había hablado por medio de Elías
  alternative_spanish_readings:
  - que había hablado por la mano de Elías
  - que había hablado a través de Elías
  rationale: El versículo atribuye la palabra a Yahvé y presenta a Elías como agente humano de esa palabra. "Por medio de" conserva la mediación sin convertir la expresión en una interpretación más libre que el hebreo no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'Revisión concordante con el último pase: no se reportaron cambios necesarios y el consenso general fue alto, con observación menor sobre la expresión idiomática de agencia, resuelta aquí con una formulación natural en español y nota explicativa.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para el nombre divino.
  - 'Se mantiene el paralelismo de provisión con dos recipientes: tinaja de harina y vasija de aceite.'
  - '"Por medio de Elías" conserva la mediación profética sin calco innecesario.'
  - El tono es sobrio y publicable, sin añadir detalles que el hebreo no contiene.
