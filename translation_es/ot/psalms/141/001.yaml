review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: «Salmo de David», «Yahvé», «te invoco», «mi voz», y la temporalidad de «cuando te invoco» preservan adecuadamente el sentido. El problema principal está en la naturalidad y exactitud idiomática de dos giros imperativos: «apresúrate a mí» calca demasiado el inglés/hebreo y suena poco natural en español; «Da oído» es posible pero menos idiomático que «Presta oído» en registro bíblico-poético actual.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero necesita pulido para sonar natural en español eclesial amplio. «Yahvé» está bien conforme al proyecto. «Apresúrate a mí» resulta forzado; «ven pronto a mí» expresa mejor la urgencia y la dirección sin perder fidelidad. «Presta oído a mi voz» mantiene el tono elevado mejor que «Da oído a mi voz».
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente en texto principal; no hay conflicto con otros términos clave. La nota sobre YHWH debe mantenerse porque el inglés POB conservó la alternativa tradicional «the LORD / SEÑOR».'
  issues:
  - severity: medium
    issue: «apresúrate a mí» suena antinatural en español
    rationale: Aunque refleja la dirección del hebreo לִּי y el inglés «hurry to me», en español moderno y eclesial amplio este giro se percibe como calco. «Ven pronto a mí» conserva la urgencia y la orientación hacia el suplicante con mejor legibilidad.
  - severity: low
    issue: «Da oído» es menos idiomático que «Presta oído»
    rationale: Ambas opciones son comprensibles, pero «prestar oído» es una expresión estable y natural en español para el valor poético de הַאֲזִינָה, sin rebajar el registro.
  - severity: low
    issue: La nota de YHWH podría leerse redundante con «Alternativamente, “Yahvé”» cuando el texto principal ya usa «Yahvé»
    rationale: 'Sin embargo, conviene conservarla porque refleja el rastro de auditoría inglés: explica la tradición «SEÑOR» y la alternativa/transliteración. No requiere cambio sustancial.'
  revised_spanish_text: Salmo de David. Yahvé[a], te invoco; ven pronto a mí. Presta oído a mi voz cuando te invoco.
  revised_footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se vierte «SEÑOR». Alternativamente, «Yahvé».
    reason: alternative_reading
  revision_rationale: 'Se ajustan dos expresiones para mejorar la naturalidad y fidelidad funcional en español: «ven pronto a mí» evita un calco poco idiomático y mantiene la urgencia de חוּשָׁה לִּי; «Presta oído» preserva mejor el tono poético de הַאֲזִינָה en español actual. Se mantiene «Yahvé» y su nota conforme a la política terminológica del proyecto y al audit trail inglés.'
