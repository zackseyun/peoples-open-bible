    reason: lexical_alternative
  - marker: b
    text: O «bondadoso» o «benigno» para «bueno»; χρηστός puede abarcar bondad, amabilidad o benevolencia.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] en el término correcto y se cambia «asombroso» por «temible» para reflejar mejor φοβερός en un registro bíblico natural. Se conserva «Yahvé Dios» conforme a la política del proyecto y se mantiene la estructura general, añadiendo la nota [b] al adjetivo «bueno», que es el lugar pertinente para la alternativa de χρηστός.
