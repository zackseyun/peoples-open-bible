revisions:
- from: No harás injusticia en el juicio[a]. No favorecerás al pobre, ni cederás ante el grande[b]; con justicia juzgarás a tu prójimo.
  to: No cometerán injusticia en el juicio. No favorecerás al pobre, ni cederás ante el grande[b]; con rectitud[a] juzgarás a tu prójimo.
  rationale: Se corrige el plural inicial para reflejar mejor el hebreo תַעֲשׂוּ, se reubica la nota [a] al lugar semánticamente correcto, y se mejora בְּצֶדֶק a 'con rectitud' para conservar mejor la tensión entre rectitud moral y justicia forense, manteniendo 'con justicia' como alternativa documentada.
