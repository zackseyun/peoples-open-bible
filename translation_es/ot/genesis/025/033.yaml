translation:
  language: es
  text: 'Y Jacob dijo: «Júrame hoy[a]». Él le juró y vendió su primogenitura[b] a Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Júrame este día» o «Júrame a partir de hoy» / «desde hoy».'
    reason: lexical_alternative
  - marker: b
    text: «Primogenitura» se refiere a los derechos y al estatus que pertenecían al hijo primogénito.
    reason: cultural_note
lexical_decisions:
- source_word: הִשָּׁבְעָה
  english_pob_choice: Swear
  chosen_spanish: Júrame
  alternatives_spanish:
  - Hazme jurar
  - Jura
  lexicon: HALOT
  rationale: La forma imperativa aquí pertenece a la fórmula de juramento; en español, «júrame» expresa de manera directa y natural la exigencia de prestar juramento a favor de quien habla. «Hazme jurar» sería más explicativo y menos inmediato; «Jura» perdería el objeto indirecto explícito.
- source_word: לִּי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El complemento con ל marca el destinatario del juramento; en español, el clítico «me» reproduce con naturalidad esa relación sin añadir peso innecesario. «A mí» sería posible, pero menos fluido en la exhortación directa.
- source_word: כַּיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - como hoy
  lexicon: HALOT
  rationale: La expresión temporal idiomática se comunica con «hoy», que mantiene la urgencia del acto sin forzar una glosa. «Este día» es más solemne pero menos natural; «como hoy» no funciona bien en español aquí.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: he swore
  chosen_spanish: le juró
  alternatives_spanish:
  - juró
  - prestó juramento
  lexicon: HALOT
  rationale: El verbo hebreo continúa la misma raíz del mandato y en español conviene conservar el vínculo con «jurar»; «le juró» refleja la relación interpersonal y el acto de responder al pedido. «Prestó juramento» es correcto, pero más formal y menos narrativo.
- source_word: וַיִּמְכֹּר
  english_pob_choice: sold
  chosen_spanish: vendió
  alternatives_spanish:
  - entregó en venta
  - transfirió por venta
  lexicon: HALOT
  rationale: El verbo indica una transacción real de venta; «vendió» es el equivalente directo y claro. Las otras opciones explicitan demasiado el acto.
- source_word: בְּכֹרָתוֹ
  english_pob_choice: his birthright
  chosen_spanish: su primogenitura
  alternatives_spanish:
  - sus derechos de primogénito
  - su derecho de primogénito
  lexicon: HALOT
  rationale: «Primogenitura» es el término español más preciso para los derechos y estatus del primogénito, y conserva el alcance jurídico-familiar del sustantivo hebreo. Las alternativas explican el concepto, pero son más largas y menos idiomáticas.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: La preposición de dirección/beneficiario se expresa naturalmente con «a» en español en este contexto de transferencia de propiedad. «Para Jacob» podría sugerir finalidad más que destinatario.
theological_decisions:
- issue: Valor legal-familiar de la primogenitura
  english_pob_reading: sold his birthright
  chosen_spanish_reading: vendió su primogenitura
  alternative_spanish_readings:
  - vendió sus derechos de primogénito
  - cedió su derecho de primogénito
  rationale: La frase describe una renuncia concreta a los privilegios y al estatus del primogénito. «Primogenitura» preserva la categoría legal-familiar sin añadir interpretación doctrinal; las alternativas aclaran el sentido, pero pierden la concisión del término tradicional y preciso.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; se mantuvo la lectura estable y la equivalencia óptima en español, con la misma distinción entre el mandato de jurar, la respuesta de Esaú y la venta de la primogenitura.
  spanish_consistency_notes:
  - Se conserva «Jacob» como forma propia del nombre.
  - Se usa «primogenitura» para mantener consistencia con el concepto jurídico-familiar de בְּכֹרָה.
  - Se evita «SEÑOR» u այլ sustituciones no pertinentes porque el versículo no contiene el tetragrámaton ni κύριος.
  - La puntuación sigue el orden narrativo del hebreo y del texto inglés auditado, con cita directa breve y clara.
