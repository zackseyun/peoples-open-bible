revisions:
- from: Y les dije que fueran a Ladaeo[a], el líder en el lugar del tesoro[b].
  to: Y les dije que fueran a Ladaeo[a], el líder en el lugar de la tesorería[b].
  rationale: Se hace una reparación mínima para reflejar mejor el valor institucional de γαζοφυλάκιον con «tesorería» en el texto principal, manteniendo la compacidad del griego y la neutralidad de «líder». También se corrige la puntuación de la nota b y se preservan las alternativas de construal documentadas en el audit trail inglés.
