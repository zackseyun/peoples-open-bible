id: JOS.20.4
reference: Joshua 20:4
source:
  edition: WLC
  text: וְ/נָ֞ס אֶל אַחַ֣ת מֵ/הֶ/עָרִ֣ים הָ/אֵ֗לֶּה וְ/עָמַד֙ פֶּ֚תַח שַׁ֣עַר הָ/עִ֔יר וְ/דִבֶּ֛ר בְּ/אָזְנֵ֛י זִקְנֵ֥י הָ/עִֽיר הַ/הִ֖יא אֶת דְּבָרָ֑י/ו וְ/אָסְפ֨וּ אֹת֤/וֹ הָ/עִ֨ירָ/ה֙ אֲלֵי/הֶ֔ם וְ/נָתְנוּ ל֥/וֹ מָק֖וֹם וְ/יָשַׁ֥ב עִמָּֽ/ם־׀־־־׃
translation:
  text: He shall flee to one of these cities and stand at the entrance of the city gate[a], and he shall speak his case in the hearing of the elders of that city. Then they shall take him into the city to themselves, and they shall give him a place[b], and he shall live with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his words' or 'his matter'; the Hebrew can refer either to the words he speaks or to the case he presents.
    reason: lexical_alternative
  - marker: b
    text: Or 'receive him into the city among them'; the Hebrew verb can mean 'gather,' 'bring in,' or 'receive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָס
  chosen: He shall flee
  alternatives:
  - and he flees
  - then he must flee
  lexicon: HALOT
  rationale: Qal perfect with vav in legal/instructional sequence functions futurally/injunctively in context; 'shall flee' fits the procedural legislation better than a simple past or present.
- source_word: אַחַת מֵהֶעָרִים הָאֵלֶּה
  chosen: one of these cities
  alternatives:
  - one from these cities
  lexicon: HALOT
  rationale: Standard partitive construction; 'one of these cities' is idiomatic and precise.
- source_word: וְעָמַד פֶּתַח שַׁעַר הָעִיר
  chosen: and stand at the entrance of the city gate
  alternatives:
  - and stand at the opening of the gate of the city
  - and stand in the gateway of the city
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance'; שַׁעַר is 'gate.' 'Entrance of the city gate' preserves the formal image of appearing publicly at the gate, the place of civic judgment.
- source_word: וְדִבֶּר בְּאָזְנֵי
  chosen: and he shall speak ... in the hearing of
  alternatives:
  - and he shall speak in the ears of
  - and he shall tell
  lexicon: HALOT
  rationale: The idiom בְּאָזְנֵי means 'in the hearing of' rather than a wooden 'in the ears of.' 'Speak' is preferred over 'tell' because the object is his case/words presented formally.
- source_word: זִקְנֵי הָעִיר הַהִיא
  chosen: the elders of that city
  alternatives:
  - the elders of the city
  lexicon: HALOT
  rationale: הַהִיא adds specificity; 'that city' is worth preserving in English.
- source_word: אֶת דְּבָרָיו
  chosen: his case
  alternatives:
  - his words
  - his matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'case.' In this judicial setting, 'his case' best conveys that he is presenting the facts of his situation before civic authorities.
- source_word: וְאָסְפוּ אֹתוֹ הָעִירָה אֲלֵיהֶם
  chosen: Then they shall bring him into the city to themselves
  alternatives:
  - and they shall gather him into the city to them
  - and they shall receive him into the city among them
  lexicon: HALOT
  rationale: אָסַף literally means 'gather/bring in/receive.' Here it denotes official reception into the city. 'Bring him into the city to themselves' preserves both the motion into the city and the relational element אֲלֵיהֶם.
- source_word: וְנָתְנוּ לוֹ מָקוֹם
  chosen: and they shall give him a place
  alternatives:
  - and assign him a place
  - and give him lodging
  lexicon: HALOT
  rationale: מָקוֹם is broadly 'place.' The phrase indicates provision of a place within the city; 'give him a place' is faithful and leaves the exact nature of the provision appropriately broad.
- source_word: וְיָשַׁב עִמָּם
  chosen: and he shall live with them
  alternatives:
  - and he shall dwell with them
  - and he shall sit with them
  lexicon: HALOT
  rationale: יָשַׁב often means 'sit,' but in settlement/residence contexts it means 'dwell/live.' 'Live with them' is natural modern English and fits the asylum context.
