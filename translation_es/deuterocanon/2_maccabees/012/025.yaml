translation:
  language: es
  text: Pero, cuando les había asegurado largamente[a] que devolvería a estos hombres ilesos, lo dejaron ir por la seguridad[b] de sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con muchas palabras» para «largamente».
    reason: lexical_alternative
  - marker: b
    text: O «por la liberación de sus hermanos»; el término griego también puede traducirse «salvación», pero aquí probablemente se refiere a la seguridad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστώσαντος
  english_pob_choice: had assured
  chosen_spanish: hubo asegurado
  alternatives_spanish:
  - había asegurado
  - les aseguró
  - hubo dado seguridad
  lexicon: LSJ
  rationale: El participio aoristo aquí expresa la acción previa de dar garantía o seguridad. En español, «hubo asegurado» conserva la anterioridad narrativa y la fuerza causativa de la promesa o garantía sin sonar excesivamente rígido.
- source_word: διὰ πλειόνων
  english_pob_choice: at length
  chosen_spanish: por más palabras
  alternatives_spanish:
  - largamente
  - con muchas palabras
  - más ampliamente
  lexicon: LSJ
  rationale: La expresión griega puede significar «con muchas palabras» o «por más tiempo/en mayor extensión». «Por más palabras» mantiene la huella idiomática del original y explica que la seguridad fue dada extensamente.
- source_word: τὸν ὁρισμὸν ἀποκαταστῆσαι
  english_pob_choice: that he would restore
  chosen_spanish: que los devolvería
  alternatives_spanish:
  - que los restituiría
  - que los devolvería conforme al acuerdo
  - que los pondría de nuevo
  lexicon: LSJ
  rationale: ὁρισμός puede aludir a una disposición, acuerdo o determinación fija. En este contexto, la promesa contenida es la de devolver a los cautivos; «devolvería» comunica bien la acción pactada sin introducir una formulación demasiado interpretativa.
- source_word: τούτους ἀπημάντους
  english_pob_choice: these men unharmed
  chosen_spanish: a aquellos ... sanos e íntegros
  alternatives_spanish:
  - a estos ... sin daño
  - a aquellos ... ilesos
  - a estos hombres ... incólumes
  lexicon: LSJ
  rationale: ἀπήμαντος significa «sin daño, sin herida, seguro». «Sanos e íntegros» transmite la idea de quedar ilesos y preserva un registro natural en español. El demostrativo «aquellos» refleja el referente remoto del discurso.
- source_word: ἀπέλυσαν αὐτόν
  english_pob_choice: they released him
  chosen_spanish: lo soltaron
  alternatives_spanish:
  - lo liberaron
  - lo dejaron ir
  - lo pusieron en libertad
  lexicon: LSJ
  rationale: ἀπολύω suele significar «soltar, dejar ir, liberar». «Lo soltaron» conserva la acción narrativa directa y el tono sencillo del relato.
- source_word: ἕνεκα τῆς τῶν ἀδελφῶν σωτηρίας
  english_pob_choice: for the safety of their brothers
  chosen_spanish: por la seguridad de sus hermanos
  alternatives_spanish:
  - por la salvación de sus hermanos
  - por la liberación de sus hermanos
  - en atención a la seguridad de sus hermanos
  lexicon: LSJ
  rationale: σωτηρία puede significar «salvación, liberación, seguridad». Aquí el contexto militar hace que «seguridad» sea la opción más precisa. «Sus hermanos» conserva la relación de parentesco del plural masculino griego.
theological_decisions:
- issue: Sentido de σωτηρία en un contexto no explícitamente soteriológico
  english_pob_reading: safety
  chosen_spanish_reading: seguridad
  alternative_spanish_readings:
  - salvación
  - liberación
  rationale: El pasaje trata del rescate y del bienestar físico de los hermanos en peligro, no de una afirmación doctrinal sobre la salvación eterna. «Seguridad» evita sobrerreligiosizar el término y mantiene la tensión semántica del griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; context-sensitive lexical rendering.'
- issue: Preservación del referente masculino plural ἀδελφῶν
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - los hermanos
  - sus parientes
  rationale: El plural masculino tiene un valor relacional real en el contexto y no debe neutralizarse sin necesidad. «Sus hermanos» respeta el dato gramatical y la referencia a los propios compañeros o parientes en peligro.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al texto griego de Swete y al audit trail inglés. Se mantuvieron las decisiones clave de sentido: la promesa expresada con valor causal/anterior, la idiomática de «διὰ πλειόνων», y el valor contextual de σωτηρία como seguridad física. No se detectaron cambios sustantivos necesarios respecto del análisis previo.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo un registro narrativo claro y sobrio, acorde con una traducción pública de deuterocanónicos.
  - No se introdujo terminología eclesiástica no sustentada por el griego; se conservaron los matices de garantía, devolución y seguridad.
