translation:
  language: es
  text: Confíen en Yahvé para siempre,[a] porque Yah, Yahvé,[b] es una roca eterna.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hasta perpetuidad»; es un modismo que significa «para siempre».'
    reason: source_note
  - marker: b
    text: 'Hebreo: «en Yah, Yahvé»; la primera forma es el nombre divino abreviado poético (יָהּ), seguido por la forma plena (יְהוָה).'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la roca de los siglos». La expresión hebrea puede comunicar duración permanente o intensiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּטְחוּ
  english_pob_choice: Trust
  chosen_spanish: ¡Confíen!
  alternatives_spanish:
  - Tengan confianza
  - Pongan su confianza
  lexicon: HALOT
  rationale: Imperativo plural de בטח; en español, «confiar» expresa bien la llamada directa a depender de Dios sin añadir paráfrasis.
- source_word: בַיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el Señor
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé» en el texto principal, conservando el nombre divino propio y la fuerza del mandato de confiar en él.'
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: El modismo expresa duración continua; «para siempre» es natural en español y mantiene el valor temporal sin arcaísmo.
- source_word: בְּיָהּ
  english_pob_choice: in Yah
  chosen_spanish: en Yah
  alternatives_spanish:
  - en Yahvé
  - en Yah, el
  lexicon: HALOT
  rationale: La forma corta poética יָהּ se conserva como «Yah» para no borrar la repetición marcada entre el nombre abreviado y el pleno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el Señor
  lexicon: HALOT
  rationale: Se mantiene la misma transliteración del nombre divino en español, de acuerdo con la terminología del proyecto y la decisión doctrinal de no sustituirlo por un título.
- source_word: צוּר
  english_pob_choice: rock
  chosen_spanish: roca
  alternatives_spanish:
  - peñasco
  - firmeza
  lexicon: HALOT
  rationale: La metáfora concreta se preserva; «roca» es el equivalente natural y mantiene la imagen de estabilidad y protección.
- source_word: עוֹלָמִים
  english_pob_choice: everlasting
  chosen_spanish: de los siglos
  alternatives_spanish:
  - eterna
  - perpetua
  - de eternidad
  lexicon: HALOT
  rationale: La expresión admite un matiz de duración intensiva; «de los siglos» conserva el sabor poético y la tensión semántica de «everlasting rock» mejor que una simple adjetivación.
theological_decisions:
- issue: Renderización del Nombre divino YHWH en un versículo con doble apelación (Yah + YHWH)
  english_pob_reading: Yah, Yahweh
  chosen_spanish_reading: Yah, Yahvé
  alternative_spanish_readings:
  - Yah, Yahweh
  - el Señor, el Señor
  rationale: El hebreo distingue la forma abreviada יָהּ y la forma plena יְהוָה; traducir ambas como «Yahvé» borraría la repetición poética. Se conserva «Yah» y «Yahvé» para reflejar la estructura del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora final para צוּר עוֹלָמִים
  english_pob_reading: an everlasting rock
  chosen_spanish_reading: la roca de los siglos
  alternative_spanish_readings:
  - una roca eterna
  - una roca perdurable
  - la roca eterna
  rationale: La frase hebrea es literalmente una roca de duración/edad; «roca de los siglos» conserva el giro semipoético sin perder la imagen concreta. Se evita convertirla en mero adjetivo abstracto.
  doctrine_reference: 'DOCTRINE.md: readable modern Spanish, preserve concrete metaphor'
- issue: Uso de «para siempre» frente a formulaciones más literales para עֲדֵי עַד
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por siempre
  - por toda la eternidad
  rationale: La frase idiomática transmite continuidad sin sobrecargar la lectura. No se introduce una interpretación doctrinal ajena al hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal-equivalence with source transparency'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que suavizó «in Yah, the LORD» hacia una formulación más natural en inglés sin perder la construcción enfática del nombre divino. En español, mantuve la distinción entre la forma abreviada y la plena del nombre, porque la compresión a una sola forma borraría una tensión lexical explícita del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conservó «Yah» para יָהּ, ya que el versículo hace contraste deliberado entre la forma corta y la plena.
  - «Roca de los siglos» busca mantener la metáfora concreta y el matiz durativo de צוּר עוֹלָמִים.
  - No se empleó «Señor» como sustituto del nombre divino, por coherencia con la política textual del proyecto.
