    rationale: 'El texto principal dice «te encomiendo a mi hija como un depósito[a]», pero la nota dice «También puede entenderse: “te confío a mi hija como un depósito”», lo cual cambia παρατίθεμαί σοι, no ἐν παρακαταθήκῃ, y además repite «depósito» en vez de aclarar la alternativa idiomática documentada («en tu confianza», «como algo confiado», etc.).'
  - severity: medium
