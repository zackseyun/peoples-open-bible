id: 1KI.2.40
reference: 1 Kings 2:40
source:
  edition: WLC
  text: וַ/יָּ֣קָם שִׁמְעִ֗י וַֽ/יַּחֲבֹשׁ֙ אֶת חֲמֹר֔/וֹ וַ/יֵּ֤לֶךְ גַּ֨תָ/ה֙ אֶל אָכִ֔ישׁ לְ/בַקֵּ֖שׁ אֶת עֲבָדָ֑י/ו וַ/יֵּ֣לֶךְ שִׁמְעִ֔י וַ/יָּבֵ֥א אֶת עֲבָדָ֖י/ו מִ/גַּֽת־־־־׃
translation:
  text: Then Shimei arose[a], saddled his donkey, and went to Gath, to Achish, to look for his slaves. Shimei went and brought his slaves back from Gath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servants.' The Hebrew עֲבָדָיו can denote servants or slaves; here 'slaves' is used because the context emphasizes bonded status and recovery of runaways.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: The verb קום literally means 'arose' or 'got up.' 'Arose' preserves the narrative sequence and slightly formal tone without sounding archaic in context.
- source_word: וַיַּחֲבֹשׁ אֶת חֲמֹרוֹ
  chosen: saddled his donkey
  alternatives:
  - bound his donkey
  - prepared his donkey
  lexicon: HALOT
  rationale: חבש with a donkey in travel context refers to saddling or preparing the animal for riding. 'Saddled his donkey' is the most natural and precise English rendering.
- source_word: גַּתָה
  chosen: to Gath
  alternatives:
  - Gathward
  lexicon: HALOT
  rationale: The directional he indicates motion toward the place. English idiom is best represented by 'to Gath.'
- source_word: אָכִישׁ
  chosen: Achish
  rationale: 'Personal name transliterated according to the translation philosophy: titles are translated, names are transliterated.'
- source_word: לְבַקֵּשׁ
  chosen: to look for
  alternatives:
  - to seek
  - to search for
  lexicon: HALOT
  rationale: בקש commonly means 'seek' or 'look for.' In this concrete narrative setting, 'to look for' is clear modern English and avoids overly elevated diction.
- source_word: עֲבָדָיו
  chosen: his slaves
  alternatives:
  - his servants
  lexicon: HALOT
  rationale: עבד can mean either 'servant' or 'slave' depending on context. Here these are persons who had fled from Shimei and whom he retrieves as property-bound household laborers; the bonded nature is salient, so 'slaves' best fits the context and aligns with the project's guidance on bonded-status terms.
- source_word: וַיָּבֵא אֶת עֲבָדָיו מִגַּת
  chosen: brought his slaves back from Gath
  alternatives:
  - brought his slaves from Gath
  - brought back his servants from Gath
  lexicon: HALOT
  rationale: בוא in the Hiphil means 'bring.' Adding 'back' makes explicit in idiomatic English that he retrieved them and returned with them, which is strongly implied by the context though not separately lexicalized in Hebrew.
