translation:
  language: es
  text: Porque no se había celebrado una Pascua[a] como esta desde los días de los jueces, que juzgaron a Israel, ni en todos los días de los reyes de Israel y de los reyes de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «esta Pascua»; el sentido es «una Pascua como esta» o «tal Pascua».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: Introduce la explicación del enunciado anterior; en español, «porque» conserva bien la relación causal/explicativa que el inglés POB expresa con «For».
- source_word: לֹא נַעֲשָׂה
  english_pob_choice: had not been kept
  chosen_spanish: no se había celebrado
  alternatives_spanish:
  - no se había hecho
  - no se había guardado
  - no se había observado
  lexicon: HALOT
  rationale: Con Pascua como objeto cultual, «celebrar» comunica naturalmente la idea de una observancia festiva sin perder el valor retrospectivo del pasivo perfecto.
- source_word: כַּפֶּסַח הַזֶּה
  english_pob_choice: such a Passover
  chosen_spanish: un Pascua[a] como esta
  alternatives_spanish:
  - una Pascua como esta
  - tal Pascua
  - esta Pascua
  lexicon: HALOT
  rationale: El hebreo expresa comparación, no mera deixis. En español, «una Pascua como esta» conserva esa fuerza; se evita «esta Pascua» porque podría borrar el matiz comparativo. Se mantiene el sustantivo festivo en femenino por uso español habitual.
- source_word: מִימֵי הַשֹּׁפְטִים
  english_pob_choice: since the days of the judges
  chosen_spanish: desde los días de los jueces
  alternatives_spanish:
  - desde tiempos de los jueces
  - a partir de los días de los jueces
  lexicon: HALOT
  rationale: «Desde los días de los jueces» reproduce con naturalidad el punto inicial temporal del hebreo.
- source_word: אֲשֶׁר שָׁפְטוּ אֶת יִשְׂרָאֵל
  english_pob_choice: who judged Israel
  chosen_spanish: que juzgaron a Israel
  alternatives_spanish:
  - que gobernaron a Israel
  - que rigieron a Israel
  lexicon: HALOT
  rationale: «Juzgaron» mantiene el vínculo léxico con «jueces» y refleja el verbo básico de la cláusula relativa sin diluir el oficio histórico.
- source_word: וְכֹל יְמֵי מַלְכֵי יִשְׂרָאֵל וּמַלְכֵי יְהוּדָה
  english_pob_choice: nor in all the days of the kings of Israel and the kings of Judah
  chosen_spanish: ni en todos los días de los reyes de Israel y de los reyes de Judá
  alternatives_spanish:
  - ni durante todos los días de los reyes de Israel y de Judá
  - ni en todos los días de Israel y de Judá
  lexicon: HALOT
  rationale: Se conserva la repetición hebrea de «los reyes de» para reflejar la estructura paralela y la distinción entre los dos reinos.
theological_decisions:
- issue: Alcance comparativo del texto
  english_pob_reading: No comparable Passover had been kept from the judges through the monarchies of Israel and Judah; the verse does not claim no Passover at all, but none like this one.
  chosen_spanish_reading: No se afirma que nunca hubiera habido Pascua, sino que no se había celebrado una Pascua comparable a esta desde los jueces hasta las monarquías de Israel y Judá.
  alternative_spanish_readings:
  - No se había celebrado ninguna Pascua en todo ese período
  - No se había celebrado una Pascua así desde los jueces
  rationale: La comparación del hebreo con כַּפֶּסַח הַזֶּה exige conservar el matiz de semejanza. La redacción española evita convertir la frase en una negación absoluta y mantiene la tensión histórica del texto.
  doctrine_reference: Lectura histórico-gramatical del alcance comparativo; cf. 2 Reyes 23:22.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el auditorio inglés de POB. No se introdujeron cambios respecto del juicio de revisión más reciente; se preservó el matiz comparativo de כַּפֶּסַח הַזֶּה y la estructura paralela de los reyes de Israel y de Judá.
  spanish_consistency_notes:
  - Se usa «Pascua» en femenino, como sustantivo festivo estándar en español bíblico contemporáneo.
  - Se evitó «SEÑOR» u այլ substituciones no pertinentes; no hay nombres divinos en este versículo.
  - «Jueces» y «juzgaron» se mantienen léxicamente vinculados para respetar la forma histórica del hebreo.
