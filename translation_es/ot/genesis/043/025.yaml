translation:
  language: es
  text: Y prepararon el regalo hasta que llegó Yosef al mediodía, porque habían oído que allí comerían pan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «comer pan», un modismo para compartir una comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכִינוּ
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - lo prepararon
  - pusieron listo
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto expresa disponer algo con anticipación; 'prepararon' conserva el sentido de acción dirigida al objeto y suena natural en español.
- source_word: הַמִּנְחָה
  english_pob_choice: the gift
  chosen_spanish: el regalo
  alternatives_spanish:
  - el presente
  - la ofrenda
  lexicon: HALOT
  rationale: Aquí מִנְחָה no es una ofrenda cultual sino un obsequio para Yosef; 'regalo' comunica bien la intención narrativa sin introducir lenguaje sacrificial.
- source_word: עַד בּוֹא יוֹסֵף
  english_pob_choice: until Yosef came
  chosen_spanish: hasta que llegó Yosef
  alternatives_spanish:
  - hasta la llegada de Yosef
  - hasta que Yosef viniera
  lexicon: HALOT
  rationale: La construcción de duración hasta un evento final se expresa de forma natural en español con 'hasta que llegó'. Mantiene la secuencia narrativa pasada.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al medio día
  lexicon: HALOT
  rationale: '''Al mediodía'' es la forma más idiomática y clara en español para el momento del día indicado.'
- source_word: כִּי שָׁמְעוּ
  english_pob_choice: because they had heard
  chosen_spanish: porque habían oído
  alternatives_spanish:
  - pues habían oído
  - ya que habían oído
  lexicon: HALOT
  rationale: La causalidad del primer כִּי se conserva con 'porque'. 'Habían oído' refleja bien la anterioridad de la información respecto de la preparación.
- source_word: כִּי שָׁם יֹאכְלוּ לָחֶם
  english_pob_choice: that they would eat bread there
  chosen_spanish: que allí comerían pan
  alternatives_spanish:
  - que allí tendrían una comida
  - que allí comerían
  lexicon: HALOT
  rationale: Se mantiene el hebraísmo 'comer pan' porque el texto literalmente dice 'comerán pan', un modismo para tomar una comida. En español, 'comerían pan' preserva la imagen y su fuerza idiomática.
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: Yosef
  alternatives_spanish:
  - José
  lexicon: Project naming policy
  rationale: Se conserva la transliteración del nombre propia del proyecto, en vez de la forma tradicional castellana, para mantener coherencia con el texto base y el criterio onomástico del POB.
translation_notes:
  revision_awareness: Se siguió el pasaje revisado más reciente del POB en inglés, que cambió el conector inicial a 'And', ahora reflejado con 'Y'. También se mantuvo la solución auditada para el modismo final, adaptándola a un español publicable sin perder la imagen literal del hebreo.
  spanish_consistency_notes:
  - Se conserva 'Yosef' como nombre propio transliterado, en coherencia con el criterio del proyecto.
  - '''Regalo'' refleja el carácter no cultual de מִנְחָה en este relato.'
  - Se mantiene el modismo 'comer pan' mediante una formulación española natural que no borra la expresión hebrea subyacente.
