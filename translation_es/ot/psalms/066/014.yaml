    issue: '''mis labios abrieron'' no transmite el sentido idiomático hebreo'
    rationale: פָּצוּ con 'labios' significa 'hablar / proferir / pronunciar', no simplemente 'abrir'. En español, la forma actual resulta gramaticalmente extraña y semánticamente opaca.
  - severity: low
    issue: La nota al pie está bien orientada, pero el texto principal no sigue la decisión semántica del POB inglés
    rationale: La nota explica correctamente el literal 'abrieron', pero el cuerpo del texto debería dar el sentido idiomático principal, dejando lo literal en la nota, como hace la auditoría inglesa.
