translation:
  language: es
  text: Y ahora, Yahvé Dios, levántate a tu lugar de reposo, tú y el arca de tu poder[a]. Que tus sacerdotes, Yahvé Dios, se vistan de salvación, y que tus fieles[b] se alegren en lo bueno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arca de tu fuerza» o «el arca de tu fortaleza».
    reason: lexical_alternative
  - marker: b
    text: O «los piadosos», «los santos» o «los leales». חסיד puede expresar fidelidad pactual y piedad.
    reason: lexical_alternative
  - marker: c
    text: O «en el bien» o «en tu bondad». El hebreo dice literalmente «en lo bueno / en el bien», sin posesivo explícito.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La partícula conjuntiva más el adverbio temporal introducen una súplica culminante; «Y ahora» conserva el enlace discursivo sin sonar arcaico.
- source_word: קוּמָה
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - alza(te)
  - ponte en pie
  lexicon: HALOT
  rationale: En español, el imperativo reflexivo «levántate» comunica con naturalidad la llamada litúrgica dirigida a Dios; mantiene el impulso de «arise» sin perder dignidad.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: O Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Yahvé, Dios
  - oh Yahvé Dios
  lexicon: HALOT
  rationale: Se preserva «Yahvé» para יהוה según la norma del proyecto, y «Dios» para אֱלֹהִים. En español, el vocativo puede quedar implícito por la coma y el contexto de oración.
- source_word: לְנוּחֶךָ
  english_pob_choice: to your resting place
  chosen_spanish: para tu lugar de reposo
  alternatives_spanish:
  - a tu reposo
  - a tu lugar de descanso
  lexicon: HALOT
  rationale: El sustantivo expresa tanto reposo como el lugar donde se reposa; «lugar de reposo» conserva la imagen espacial y la referencia al templo/arca sin sobreinterpretar.
- source_word: עֻזֶּךָ
  english_pob_choice: your strength
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu fortaleza
  lexicon: HALOT
  rationale: «Poder» funciona bien en español junto al arca y mantiene la amplitud semántica de עֹז; «fuerza» y «fortaleza» son alternativas válidas, pero «poder» suena más natural en esta fórmula.
- source_word: כֹּהֲנֶיךָ
  english_pob_choice: your priests
  chosen_spanish: tus sacerdotes
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo sacerdotal con el posesivo de segunda persona.
- source_word: יִלְבְּשׁוּ תְשׁוּעָה
  english_pob_choice: be clothed with salvation
  chosen_spanish: se vistan de salvación
  alternatives_spanish:
  - se revistan de salvación
  - lleven salvación
  lexicon: HALOT
  rationale: Se conserva la metáfora de vestidura. «Se vistan de salvación» reproduce el valor pasivo/medio de la forma verbal y la imagen sinforzarla hacia una abstracción.
- source_word: חֲסִידֶיךָ
  english_pob_choice: your faithful ones
  chosen_spanish: tus fieles
  alternatives_spanish:
  - tus piadosos
  - tus santos
  - tus leales
  lexicon: HALOT
  rationale: «Fieles» comunica la lealtad pactual y la piedad sin cargar el término con el uso eclesiástico posterior de «santos».
- source_word: בַטּוֹב
  english_pob_choice: in what is good
  chosen_spanish: en lo bueno
  alternatives_spanish:
  - en el bien
  - en la bondad
  - en tu bondad
  lexicon: HALOT
  rationale: El hebreo carece de posesivo explícito; «en lo bueno» preserva la indefinición y resulta idiomático. La opción «en tu bondad» queda como lectura interpretativa, pero no se impone en el texto principal.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se sigue la convención del proyecto: el Tetragrámaton se traduce como «Yahvé» y no se enmascara como «SEÑOR». Esto preserva el nombre pactual revelado en el texto hebreo.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de עֻזֶּךָ en la expresión «el arca de tu... »
  english_pob_reading: the ark of your strength
  chosen_spanish_reading: el arca de tu poder
  alternative_spanish_readings:
  - el arca de tu fuerza
  - el arca de tu fortaleza
  rationale: «Poder» mantiene la relación con el arca y evita decidir demasiado pronto entre matices cercanos de fuerza/might/power. La frase sigue siendo reverente y comprensible en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Lectura de בַטּוֹב
  english_pob_reading: rejoice in what is good
  chosen_spanish_reading: se alegren en lo bueno
  alternative_spanish_readings:
  - se alegren en el bien
  - se alegren en tu bondad
  rationale: El hebreo no añade posesivo; por eso se conserva la amplitud de «lo bueno» en vez de resolver la referencia como si fuera necesariamente «tu bondad».
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que prefirió «rejoice in what is good» frente a «rejoice in goodness» por mayor naturalidad y precisión. La versión española refleja esa decisión con «en lo bueno», preservando además la ausencia de posesivo explícito del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva la metáfora de vestidura en «se vistan de salvación».
  - «Fieles» evita la carga denominacional de «santos» y preserva la idea de fidelidad pactual.
  - La frase final conserva la ambigüedad deliberada del hebreo entre el bien general y una posible bondad divina explícita.
