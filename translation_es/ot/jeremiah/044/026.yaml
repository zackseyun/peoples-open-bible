- from: 'Por tanto, oíd la palabra de Yahvé[a], todo Judá que habitáis en la tierra de Egipto: he aquí, he jurado por mi gran nombre, dice Yahvé, que ya no será invocado mi nombre[b] por la boca de ningún hombre de Judá en toda la tierra de Egipto, diciendo: “¡Vive el Señor Yahvé!”.'
  to: 'Por tanto, oigan la palabra de Yahvé, todo Judá, los que habitan en la tierra de Egipto: He aquí, he jurado por mi gran nombre, dice Yahvé, que mi nombre ya no será invocado[a] por la boca de ningún hombre de Judá en toda la tierra de Egipto, diciendo: «Vive el Señor Yahvé».'
  rationale: 'Se corrigió la discordancia gramatical y el registro peninsular para ajustarlo al español neutral: ''oigan'' y ''los que habitan''. Se mantuvo ''Yahvé'' y la fórmula ''Señor Yahvé'' por fidelidad al proyecto y al hebreo. Se retiraron los signos de exclamación de la fórmula juramentaria. Se unificaron y reubicaron las notas para que el único marcador aparezca en la frase verdaderamente discutida (''será invocado'') y no en ''Yahvé''.'
