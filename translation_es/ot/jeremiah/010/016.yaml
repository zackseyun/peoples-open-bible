translation:
  language: es
  text: No es como estos[a] la porción de Jacob, porque él es el Formador de todas las cosas, e Israel es la tribu de su herencia[b]; Yahvé de los ejércitos es su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la porción que pertenece a Jacob». El hebreo puede entenderse como «la porción de Jacob» o «la porción que le corresponde a Jacob»; el sentido es que el Dios de Israel no es como los ídolos recién descritos.
    reason: lexical_alternative
  - marker: b
    text: O «la vara/cetro de su herencia». El hebreo שֵׁבֶט puede significar «tribu», «vara» o «cetro»; aquí «tribu» encaja mejor con Israel como el pueblo que pertenece a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶק יַעֲקֹב
  english_pob_choice: the Portion of Jacob
  chosen_spanish: la porción de Jacob
  alternatives_spanish:
  - la porción de Jacob
  - Jacob es su porción
  lexicon: HALOT
  rationale: חֵלֶק expresa la idea de porción, parte o herencia asignada. En español, «porción de Jacob» conserva la posibilidad de leer la frase como título y como expresión posesiva, igual que el audit trail inglés. Mantiene el contraste covenantal con los ídolos sin explicitar de más.
- source_word: כְאֵלֶּה
  english_pob_choice: like these
  chosen_spanish: como estas
  alternatives_spanish:
  - como estas cosas
  - como estos ídolos
  lexicon: HALOT
  rationale: El demonstrativo apunta a los ídolos del contexto inmediato. «Como estas» conserva la referencia cercana sin introducir una glosa interpretativa en el texto principal.
- source_word: יוֹצֵר
  english_pob_choice: Former
  chosen_spanish: el Formador
  alternatives_spanish:
  - el Hacedor
  - el Creador
  - el que forma
  lexicon: HALOT
  rationale: יוֹצֵר subraya la acción de formar/modelar. «Formador» reproduce mejor esa imaginería que «Creador», y en español resulta natural como designación divina en contraste con los ídolos hechos por manos humanas.
- source_word: הַכֹּל
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el conjunto de todo
  lexicon: HALOT
  rationale: «Todas las cosas» conserva el alcance totalizante de הַכֹּל y suena natural en español moderno, sin perder la amplitud de la afirmación.
- source_word: שֵׁבֶט נַחֲלָתוֹ
  english_pob_choice: the tribe of his inheritance
  chosen_spanish: la tribu de su herencia
  alternatives_spanish:
  - el cetro de su herencia
  - la vara de su herencia
  lexicon: HALOT
  rationale: Con Israel como sujeto, שֵׁבֶט aquí encaja mejor con «tribu» que con «cetro» o «vara». «Herencia» traduce נַחֲלָה de manera transparente y preserva la relación de pertenencia pactal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración según la norma del proyecto. «Yahvé» es la forma establecida en el texto español, en lugar de una sustitución por título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: En español, «de los ejércitos» es la equivalencia más clara y transparente de צְבָאוֹת. Mantiene el valor del título sin forzar un arcaísmo.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - así es su nombre
  lexicon: HALOT
  rationale: La clausula nominal se traduce de manera directa y solemne. «Es su nombre» preserva el cierre formular del hebreo.
theological_decisions:
- issue: Sentido de «Portion of Jacob»
  english_pob_reading: The phrase refers to the LORD as Jacob/Israel's allotted God, contrasted with idols.
  chosen_spanish_reading: La frase se entiende como una designación del Yahvé de Israel como la porción asignada a Jacob, en contraste con los ídolos.
  alternative_spanish_readings:
  - la porción que pertenece a Jacob
  - Jacob es su porción
  rationale: El contexto inmediato contrapone al Dios vivo con los ídolos. La formulación española mantiene la tensión entre lectura posesiva y titular sin resolverla con una paráfrasis explicativa en el texto principal.
  doctrine_reference: Jeremías 10:16; contraste entre Yahvé y los ídolos del contexto inmediato
- issue: Valor de שֵׁבֶט en relación con Israel
  english_pob_reading: '''Israel is the tribe of his inheritance'' rather than ''scepter/rod''.'
  chosen_spanish_reading: «Israel es la tribu de su herencia» preserva el sentido colectivo de pueblo perteneciente a Yahvé.
  alternative_spanish_readings:
  - Israel es el cetro de su herencia
  - Israel es la vara de su herencia
  rationale: Con Israel como referente, el sentido de «tribu» es el más coherente. Las opciones de «cetro» o «vara» introducirían una imagen menos natural en este versículo y menos consistente con la referencia al pueblo.
  doctrine_reference: Jeremías 10:16; uso semántico de שֵׁבֶט en HALOT
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés y no hubo revisiones tardías que cambiaran el sentido. La versión española conserva las dos tensiones léxicas principales documentadas: חֵלֶק יַעֲקֹב y שֵׁבֶט נַחֲלָתוֹ, sin resolverlas mediante una glosa excesiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se eligió «Formador» para יוֹצֵר para mantener la imaginería de formar/modelar.
  - Se prefirió «de los ejércitos» como traducción transparente de צְבָאוֹת en el título divino.
  - No se empleó «SEÑOR» como sustituto del nombre divino.
  - La puntuación reproduce la cadencia del texto hebreo con una cláusula final nominal solemne.
