review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo, el nombre divino «Yahvé», la dirección «al Jordán» y la negación enfática final. Sin embargo, presenta dos desajustes importantes con la evidencia fuente y el rastro POB: la nota [a] no corresponde al texto principal, porque repite «al Jordán» en vez de ofrecer la alternativa «al río Jordán»; y la fórmula de juramento se volvió poco natural y algo distorsionada con «¡Vive Yahvé, y vive tu propia vida...!», que no refleja de manera idiomática el sentido de וְחֵי נַפְשְׁךָ ni la explicación inglesa «as you yourself live».'
  spanish_quality_summary: El español es mayormente claro, pero «y vive tu propia vida» suena forzado y poco idiomático en español eclesial general. También «Y siguieron caminando los dos» es entendible, aunque «los dos siguieron adelante» o «los dos siguieron su camino» suena más natural y mantiene el énfasis dual. La puntuación del juramento puede mejorarse evitando exclamaciones innecesarias dentro del discurso citado.
  glossary_alignment: 'La renderización de יְהוָה como «Yahvé» está alineada con la política del proyecto. No hay otros términos doctrinales sensibles aquí. La decisión sobre la fórmula juratoria debe mantenerse idiomática sin perder su fuerza: conviene «Tan cierto como que Yahvé vive, y como que tú mismo vives...» o equivalente, en vez de una reproducción literal extraña.'
  issues:
  - severity: high
    issue: La fórmula juratoria «¡Vive Yahvé, y vive tu propia vida[b], que no te dejaré!» es poco fiel e idiomáticamente deficiente.
    rationale: חַי יְהוָה וְחֵי נַפְשְׁךָ es una fórmula de juramento. «Vive tu propia vida» no es español natural y representa mal la fuerza idiomática de «as you yourself live». Debe reformularse para expresar el juramento solemnemente y con claridad.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real al texto español.
    rationale: El texto principal ya dice «al Jordán», pero la nota dice «O “al Jordán”». Según el rastro inglés, la alternativa es «to the Jordan River», por lo que en español debe ser «al río Jordán».
  - severity: low
    issue: «Y siguieron caminando los dos» puede mejorarse estilísticamente.
    rationale: Aunque comprensible, resulta algo pesado. «Los dos siguieron adelante» o «los dos siguieron su camino» suena más natural y sigue reflejando וַיֵּלְכוּ שְׁנֵיהֶם.
  revised_spanish_text: 'Entonces Elías le dijo: «Por favor, quédate aquí, porque Yahvé me ha enviado al Jordán[a]». Pero él respondió: «Tan cierto como que Yahvé vive, y como que tú mismo vives[b], no te dejaré». Así que los dos siguieron adelante.'
  revised_footnotes:
