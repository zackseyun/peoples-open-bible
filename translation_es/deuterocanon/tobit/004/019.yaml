translation:
  language: es
  text: Y en todo tiempo bendice a Yahvé Dios, y pídele que tus caminos sean enderezados y que todos tus senderos y planes[a] prosperen. Porque ninguna nación tiene consejo[b], sino que el mismo Señor da todos los bienes y humilla a quien quiere, como le place. Y ahora, niño, recuerda mis mandamientos, y no dejes que sean borrados de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas tus sendas y consejos prosperen». El griego βουλαί puede significar «planes», «propósitos» o «consejos».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula «ninguna nación tiene consejo» es abrupta en griego y puede entenderse como que ningún pueblo posee por sí mismo el consejo último, en contraste con el Señor, que da bienes y humilla a quien quiere.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - en cada tiempo
  - siempre
  lexicon: LSJ
  rationale: Conserva el alcance total y natural de la frase sin volverla rígida; en español bíblico moderno, 'en todo tiempo' transmite bien la fuerza comprehensiva.
- source_word: εὐλόγει
  english_pob_choice: bless
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  - bendecir
  lexicon: LSJ
  rationale: '''Bendice'' reproduce el verbo con valor cultual y relacional, y evita reducirlo a ''alaba'', que estrecharía el sentido.'
- source_word: Κύριον τὸν Θεόν
  english_pob_choice: the Lord God
  chosen_spanish: al Señor Dios
  alternatives_spanish:
  - al Señor, Dios
  - al Señor tu Dios
  lexicon: LSJ
  rationale: Mantiene ambos títulos presentes en el griego. No se añade 'tu', que no está en el texto.
- source_word: παρʼ αὐτοῦ αἴτησον
  english_pob_choice: ask from him
  chosen_spanish: pídele
  alternatives_spanish:
  - pide de él
  - solicítale
  lexicon: LSJ
  rationale: En español, 'pedirle' expresa de manera natural la dependencia del que recibe; la preposición fuente del griego queda implícita en el contexto inmediato.
- source_word: ὅπως αἱ ὁδοί σου εὐθεῖαι γένωνται
  english_pob_choice: that your ways may be made straight
  chosen_spanish: que tus caminos sean enderezados
  alternatives_spanish:
  - que tus caminos se hagan rectos
  - que tus caminos sean rectos
  lexicon: LSJ
  rationale: Conserva la imagen de rectitud/enderecimiento del griego. 'Sean enderezados' preserva mejor la pasiva de resultado que una formulación meramente adjetival.
- source_word: πᾶσαι αἱ τρίβοι καὶ βουλαὶ
  english_pob_choice: all your paths and plans
  chosen_spanish: todos tus senderos y planes
  alternatives_spanish:
  - todos tus caminos y propósitos
  - todas tus sendas y consejos
  lexicon: LSJ
  rationale: '''Senderos'' distingue τρίβοι de ὁδοί sin forzar el español; ''planes'' sigue la decisión auditada para βουλαί como intenciones prácticas.'
- source_word: εὐοδωθῶσιν
  english_pob_choice: may prosper
  chosen_spanish: prosperen
  alternatives_spanish:
  - tengan éxito
  - salgan bien
  lexicon: LSJ
  rationale: '''Prosperen'' conserva el matiz de buen éxito con registro bíblico adecuado.'
- source_word: πᾶν ἔθνος οὐκ ἔχει βουλήν
  english_pob_choice: no nation has counsel
  chosen_spanish: ninguna nación tiene consejo
  alternatives_spanish:
  - ningún pueblo tiene consejo
  - ninguna nación tiene plan
  lexicon: LSJ
  rationale: '''Consejo'' mantiene la ambigüedad legítima de βουλή entre consejo, plan y propósito, y reproduce la tensión abrupta del griego sin suavizarla.'
- source_word: δίδωσιν πάντα τὰ ἀγαθὰ
  english_pob_choice: gives all good things
  chosen_spanish: da todos los bienes
  alternatives_spanish:
  - da todo lo bueno
  - concede todos los bienes
  lexicon: LSJ
  rationale: '''Bienes'' es una opción natural en español para τὰ ἀγαθά y conserva la referencia a dones/bienes concretos sin perder la amplitud.'
- source_word: ὃ ἐὰν θέλῃ ταπεινοῖ
  english_pob_choice: whomever he wills he humbles
  chosen_spanish: humilla a quien quiere
  alternatives_spanish:
  - humilla a quien desea
  - humilla a cualquiera que quiera
  lexicon: LSJ
  rationale: Mantiene la afirmación personal de soberanía divina sin introducir explicaciones; 'a quien quiere' refleja la voluntad libre expresada por el griego.
- source_word: καθὼς βούλεται
  english_pob_choice: just as he pleases
  chosen_spanish: como le place
  alternatives_spanish:
  - como quiere
  - según le agrada
  lexicon: LSJ
  rationale: '''Como le place'' reproduce bien el matiz de libertad soberana y mantiene un tono digno.'
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  - pequeño
  lexicon: LSJ
  rationale: '''Niño'' es el vocativo natural en español para la expresión afectiva y no añade posesión explícita que el griego no marca.'
- source_word: ἐντολῶν μου
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis preceptos
  lexicon: LSJ
  rationale: '''Mandamientos'' preserva el peso normativo y bíblico de ἐντολαί, coherente con el tono exhortativo.'
- source_word: μὴ ἐξαλειφθήτωσαν ἐκ τῆς καρδίας σου
  english_pob_choice: do not let them be blotted out from your heart
  chosen_spanish: no dejes que sean borrados de tu corazón
  alternatives_spanish:
  - no permitas que sean borrados de tu corazón
  - no dejes que se borren de tu corazón
  lexicon: LSJ
  rationale: '''Borrados'' comunica la metáfora de ἐξαλείφω de forma clara y bíblicamente reconocible; ''de tu corazón'' sigue de cerca el griego.'
theological_decisions:
- issue: Rendering of κύριος in a divine address
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - el Señor, Dios
  - Dios, el Señor
  rationale: Se conserva 'Señor' como equivalente de κύριος y se mantiene el doble título sin sustituirlo por una forma litúrgica distinta. La frase funciona como apelación directa a Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Abrupt claim that no nation has counsel
  english_pob_reading: no nation has counsel
  chosen_spanish_reading: ninguna nación tiene consejo
  alternative_spanish_readings:
  - ningún pueblo tiene consejo
  - ninguna nación tiene entendimiento
  rationale: Se preserva la tensión del griego sin suavizarla. 'Consejo' deja abierta la ambigüedad entre consejo, plan y propósito, como en el audit trail inglés.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Divine sovereignty over humbling whom he wills
  english_pob_reading: whomever he wills he humbles, just as he pleases
  chosen_spanish_reading: humilla a quien quiere, como le place
  alternative_spanish_readings:
  - humilla a quien desea, según le agrada
  - humilla a quien se propone
  rationale: La redacción conserva la soberanía activa de Dios y evita neutralizar el sujeto del verbo. No se atenúa el contraste entre naciones y el Señor.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se siguió el último pasaje inglés auditado sin necesidad de cambios sustanciales; la revisión final indicó que no había modificaciones necesarias y el consenso fue de alta concordancia. Se preservó la tensión lexical de βουλή/βουλαί y la afirmación de soberanía divina tal como aparece en el griego y en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος y 'Dios' para Θεός, sin sustituir por fórmulas litúrgicas más opacas.
  - Se eligió 'consejo' para βουλή en el segmento abrupto, y 'planes' para βουλαί en el miembro anterior, reflejando la variación contextual del griego.
  - Se conservó la imagen de caminos/senderos rectos y la metáfora de borrar del corazón, ambas comprensibles en español bíblico moderno.
  - Se usó un registro reverente pero natural, compatible con lectura eclesial amplia.
