translation:
  language: es
  text: En aquel día vendrá a ti el fugitivo, para que lo oigas con tus propios oídos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para traer noticias a tus oídos» o «para informarte». La expresión hebrea es idiomática y subraya que el informe será oído directamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: La expresión hebrea señala un momento futuro específico con valor demostrativo. «En aquel día» preserva bien ese matiz solemne y temporal en español bíblico actual.
- source_word: יָבֹוא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá a
  - llegará
  lexicon: HALOT
  rationale: El imperfecto verbal en contexto futuro se rinde naturalmente con «vendrá». Mantiene la referencia al movimiento hacia el destinatario sin añadir información.
- source_word: הַפָּלִיט
  english_pob_choice: the fugitive
  chosen_spanish: el fugitivo
  alternatives_spanish:
  - el escapado
  - el sobreviviente
  - el refugiado
  lexicon: HALOT
  rationale: El término designa a uno que ha escapado. «El fugitivo» conserva el valor concreto de alguien que huye y sobrevive, y corresponde al sentido del contexto de Ezequiel.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  - hacia ti
  lexicon: HALOT
  rationale: La preposición dirigida al interlocutor singular se expresa de modo directo y natural con «a ti», manteniendo la segunda persona singular masculina del hebreo.
- source_word: לְהַשְׁמָעוּת אָזְנָיִם
  english_pob_choice: to make your ears hear
  chosen_spanish: para hacer oír tus oídos
  alternatives_spanish:
  - para que oigas con tus oídos
  - para traer noticias a tus oídos
  - para informarte
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y enfatiza la recepción audible del mensaje. «Para hacer oír tus oídos» conserva la imagen auditiva y el énfasis directo, evitando una paráfrasis demasiado libre como «informarte».
translation_notes:
  revision_awareness: La redacción sigue el ajuste del POB inglés que volvió la cláusula final más cercana al hebreo idiomático «for a hearing of ears», evitando suavizarla en exceso. Se mantuvo esa cercanía en español con una estructura auditiva directa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó «el fugitivo» como traducción concreta y no se sustituyó por un término más interpretativo.
  - La cláusula final mantiene la rareza del hebreo para no perder el énfasis en el oído y en el reporte audible.
