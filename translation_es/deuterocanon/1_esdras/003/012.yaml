translation:
  language: es
  text: 'El tercero escribió[a]: «Las mujeres son más fuertes, pero la verdad vence por encima de todo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las mujeres prevalecen, pero la verdad vence todo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  english_pob_choice: The third
  chosen_spanish: El tercero
  alternatives_spanish:
  - El tercer hombre
  - El tercero de ellos
  lexicon: LSJ
  rationale: El artículo con ordinal funciona sustantivamente; en español, «el tercero» es natural y mantiene la referencia al tercer participante sin añadir información no presente en el griego.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió en respuesta
  - redactó
  lexicon: LSJ
  rationale: γράφω en aoristo simple indica acción de escribir. «Escribió» conserva la acción directa y resulta idiomático en español.
- source_word: Ὑπερισχύουσιν
  english_pob_choice: are stronger
  chosen_spanish: son más fuertes
  alternatives_spanish:
  - prevalecen
  - tienen más fuerza
  lexicon: LSJ
  rationale: El verbo puede significar ser más fuerte o prevalecer. Dado que el POB inglés distingue este verbo de νικᾷ, «son más fuertes» preserva esa diferencia lexical y suena natural en español.
- source_word: αἱ γυναῖκες
  english_pob_choice: Women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - mujeres
  lexicon: LSJ
  rationale: El sustantivo aquí es general, no restringido a esposas. «Las mujeres» reproduce el valor amplio del griego y la mayúscula inglesa no requiere equivalente en español.
- source_word: ὑπὲρ δὲ πάντα
  english_pob_choice: but above all things
  chosen_spanish: pero por encima de todo
  alternatives_spanish:
  - pero sobre todas las cosas
  - pero más que todo
  lexicon: LSJ
  rationale: La expresión marca contraste y superioridad máxima. «Por encima de todo» transmite la fuerza superlativa de ὑπὲρ δὲ πάντα sin sonar arcaico.
- source_word: νικᾷ
  english_pob_choice: is victorious / conquers
  chosen_spanish: vence
  alternatives_spanish:
  - conquista
  - triunfa
  - es victoriosa
  lexicon: LSJ
  rationale: νικάω expresa victoria, conquista o prevalecer. «Vence» conserva la idea de triunfo activo de la verdad y funciona bien con el sujeto abstracto en español.
- source_word: ἡ ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la realidad
  lexicon: LSJ
  rationale: Aunque el inglés omite el artículo con el abstracto, el español normalmente lo requiere aquí. «La verdad» conserva la universalidad proverbial y el valor definido del artículo griego.
theological_decisions:
- issue: 'Equilibrio entre dos verbos de fuerza/victoria: Ὑπερισχύουσιν y νικᾷ'
  english_pob_reading: Women are stronger, but truth conquers above all things.
  chosen_spanish_reading: Las mujeres son más fuertes, pero la verdad vence por encima de todo.
  alternative_spanish_readings:
  - Las mujeres prevalecen, pero la verdad vence por encima de todo.
  - Las mujeres son más fuertes, pero la verdad es victoriosa por encima de todo.
  rationale: Se mantiene la tensión del griego entre superioridad/fuerza y victoria final. No se fusionan ambos verbos en una sola idea, para no borrar la distinción que el POB inglés preserva.
  doctrine_reference: 'Principio de equivalencia óptima: conservar la arquitectura semántica del original y la relación entre los dos verbos.'
- issue: Si ἡ ἀλήθεια debe sonar como un enunciado universal o como una noción específica
  english_pob_reading: truth
  chosen_spanish_reading: la verdad
  alternative_spanish_readings:
  - verdad
  - la verdad
  rationale: El versículo es proverbial y no apunta a una proposición particular; sin embargo, el artículo griego y el español natural favorecen «la verdad», que mantiene la forma definida sin restringir el alcance universal.
  doctrine_reference: Abstracción proverbial y uso normal del artículo definido en español con sustantivos abstractos.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado del inglés auditado: la segunda cláusula debe reflejar νικᾷ con un verbo de victoria distinto de Ὑπερισχύουσιν, y ὑπὲρ δὲ πάντα debe leerse como un marco de superioridad global, no como inversión del sujeto.'
  spanish_consistency_notes:
  - Se usa «escribió» para ἔγραψεν y no una paráfrasis más amplia, porque el contexto es una respuesta escrita.
  - Se mantuvo «las mujeres» en sentido general, no «las esposas», siguiendo el uso léxico no restringido de γυναῖκες en este contexto.
  - Se prefirió «vence» para νικᾷ, diferenciándolo de «son más fuertes» para Ὑπερισχύουσιν.
  - La puntuación con dos puntos antes de la cita refleja el encabezado narrativo del griego y la práctica editorial del POB.
