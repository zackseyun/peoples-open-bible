revisions:
- from: Y no se conocerá la abundancia[a] en la tierra[b] a causa de ese hambre después[c], porque será muy grave.
  to: Y no se conocerá la abundancia[a] en la tierra a causa de ese hambre posterior[b], porque será muy grave.
  rationale: Se ajustó una frase rígida para lograr un español natural sin perder el sentido ni la forma relevante del hebreo. «Ese hambre posterior» conserva mejor que «ese hambre después» la referencia demostrativa y la posteridad temporal. También se eliminaron notas no necesarias para mantener claridad y economía editorial.
