  to: Cuando tienen un asunto[a], ese asunto viene a mí, y yo juzgo entre un hombre y su prójimo[b], y doy a conocer los estatutos de Dios y sus leyes[c].
  rationale: Se hace una reparación mínima para que el español suene natural y claro, explicitando «ese asunto» como sujeto de «viene a mí». Así se preserva mejor la decisión auditada de mantener el singular del hebreo en בָּא, sin caer en una construcción española torpe o ambigua. Las notas y el resto del versículo pueden permanecer igual.
