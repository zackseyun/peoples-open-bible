translation:
  language: es
  text: 'Entonces Isaías el profeta fue al rey Ezequías y le dijo[a]: «¿Qué dijeron estos hombres, y de dónde vinieron a ti?». Y Ezequías dijo: «Vinieron a mí de una tierra lejana[b], de Babilonia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿y de dónde vienen a ti?». El hebreo usa una forma imperfecta que puede traducirse de manera más formal, pero el sentido pasado encaja con el contexto narrativo.'
    reason: lexical_alternative
  - marker: b
    text: «De una tierra lejana» luego se especifica como «de Babilonia», conservando el énfasis del hebreo en el origen lejano antes de nombrar el lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y ... vino
  - Luego ... vino
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración. «Entonces» conserva esa secuencia con un giro natural en español, y «vino» refleja bien el movimiento narrativo sin forzar una traducción mecánica.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías el profeta
  lexicon: HALOT
  rationale: Nombre propio estándar en español. Se mantiene la identificación profética por el sustantivo siguiente, como en el hebreo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Isaías
  lexicon: HALOT
  rationale: Título definido directo y transparente; no requiere expansión.
- source_word: אֶל־הַמֶּלֶךְ חִזְקִיָּהוּ
  english_pob_choice: to King Hezekiah
  chosen_spanish: al rey Ezequías
  alternatives_spanish:
  - al rey, Ezequías
  - al rey Hezekías
  lexicon: HALOT
  rationale: El español normal integra la aposición sin repetir artículo de manera pesada. «Rey Ezequías» conserva el valor de cargo y nombre propio.
- source_word: מָה אָמְרוּ
  english_pob_choice: What did ... say
  chosen_spanish: ¿Qué dijeron?
  alternatives_spanish:
  - ¿Qué han dicho?
  - ¿Qué dijeron estos hombres?
  lexicon: HALOT
  rationale: En una pregunta narrativa, el pretérito simple es la opción idiomática y fiel al sentido de evento pasado.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos individuos
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural; se mantiene la fuerza léxica y el referente masculino explícito del hebreo.
- source_word: וּמֵאַיִן יָבֹאוּ
  english_pob_choice: and where did they come from
  chosen_spanish: ¿y de dónde vinieron?
  alternatives_spanish:
  - ¿y de dónde vienen?
  - ¿y de dónde habrán venido?
  lexicon: HALOT
  rationale: El hebreo usa una forma imperfecta, pero en contexto narrativo la referencia temporal pasada es natural en español. «De dónde vinieron» preserva la cuestión de procedencia sin calcar una construcción extraña.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  - hasta ti
  lexicon: HALOT
  rationale: El hebreo expresa dirección/relación personal con la segunda persona singular; «a ti» lo reproduce con claridad. En contexto directivo, evita una paráfrasis innecesaria.
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: from a distant land
  chosen_spanish: desde una tierra distante
  alternatives_spanish:
  - desde una tierra lejana
  - desde un país lejano
  lexicon: HALOT
  rationale: «Tierra» preserva la amplitud del hebreo אֶרֶץ, más general que «país». «Distante» mantiene el matiz espacial, aunque «lejana» sería una alternativa viable.
- source_word: בָּאוּ מִבָּבֶל
  english_pob_choice: They came ... from Babylon
  chosen_spanish: vinieron ... desde Babilonia
  alternatives_spanish:
  - vinieron de Babilonia
  - llegaron ... desde Babilonia
  lexicon: HALOT
  rationale: 'Se mantiene la secuencia del original: primero la procedencia general y luego la especificación del lugar. «Desde Babilonia» conserva mejor la relación de origen destacada por el hebreo.'
theological_decisions:
- issue: Retención de la referencia explícita a Babilonia después de «una tierra distante»
  english_pob_reading: The Hebrew first states the general origin ('from a distant land') and then specifies it ('from Babylon'), preserving Hezekiah’s emphasis on the visitors’ far-off origin before naming the place.
  chosen_spanish_reading: Primero se dice «desde una tierra distante» y luego se precisa «desde Babilonia», manteniendo el énfasis narrativo en el origen lejano antes de nombrar el lugar.
  alternative_spanish_readings:
  - «vinieron de Babilonia» sin la mención previa a la tierra distante
  - «desde Babilonia, una tierra distante»
  rationale: La doble formulación forma parte de la estrategia narrativa del hebreo y de la lectura auditada en inglés. Conservar ambas expresiones evita perder el énfasis progresivo del texto.
  doctrine_reference: Ninguno; decisión narrativa y semántica, no doctrinal.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje de referencia; el texto inglés auditable muestra alta concordancia y no requiere ajuste adicional para el español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Babilonia» como forma española estándar del topónimo.
  - Se conserva el tratamiento narrativo en pretérito para la pregunta de Hezequías, en línea con la lectura contextual del hebreo.
