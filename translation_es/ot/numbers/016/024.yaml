review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: mandato a Moisés de dirigirse a toda la congregación y ordenar que se retiren de la zona alrededor del mishkán de Coré, Datán y Abiram. También mantiene correctamente la decisión contextual de traducir מִשְׁכָּן como vivienda/habitación y no como tabernáculo sagrado. Sin embargo, «Aparétense de alrededor de» suena poco natural en español y no refleja con claridad la combinación הֵעָלוּ מִסָּבִיב; conviene una formulación más idiomática como «Aléjense de los alrededores de».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos problemas de calidad: 1) la locución «de alrededor de» es torpe en español; 2) la nota b contiene un error tipográfico grave («כאן מִשְׁכָּן») y debe decir simplemente «el hebreo מִשְׁכָּן». Además, en las decisiones léxicas aparece una falta ortográfica en una alternativa («Aljénguense»), lo que confirma la necesidad de reparación menor.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Congregación» para הָעֵדָה y «morada» para מִשְׁכָּן son defendibles; «Coré, Datán y Abiram» es una forma española tradicional e inteligible. La principal mejora es estilística y de precisión idiomática, no terminológica.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «Aparétense de alrededor de»'
    rationale: Aunque intenta reflejar הֵעָלוּ מִסָּבִיב, en español suena forzado. Una orden de retirada desde la zona circundante se expresa mejor como «Aléjense de los alrededores de» o «Apártense de los alrededores de».
  - severity: medium
    issue: 'Error en la nota b: «כאן מִשְׁכָּן»'
    rationale: La nota introduce un elemento hebreo ajeno («כאן») que no pertenece al texto fuente. Debe corregirse para no desinformar al lector.
  - severity: low
    issue: Anclaje de nota a en «congregación» no es el lugar más natural
    rationale: La nota a explica la orden de retirarse, no «congregación». Debe anclarse en la frase imperativa correspondiente para coincidir con su contenido.
  revised_spanish_text: 'Habla a la congregación, diciendo: «Aléjense[a] de los alrededores de la morada[b] de Coré, Datán y Abiram».'
  revised_footnotes:
  - marker: a
    text: O «Apártense de los alrededores de la morada de Coré, Datán y Abiram». El verbo hebreo dice literalmente «suban», pero aquí funciona como una orden de retirarse.
    reason: lexical_alternative
  - marker: b
    text: «Morada» traduce el hebreo מִשְׁכָּן en el sentido de habitación o zona de tiendas, no necesariamente el tabernáculo sagrado.
    reason: cultural_note
  revision_rationale: Se ajusta la orden principal para que suene natural en español y exprese con claridad el retiro desde la zona circundante. También se reubica la nota léxica al verbo pertinente y se corrige el error hebreo de la nota cultural, preservando la decisión teológica de no traducir מִשְׁכָּן como «tabernáculo» en este contexto.
