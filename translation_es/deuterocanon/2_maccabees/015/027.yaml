translation:
  language: es
  text: Y mientras combatían con sus manos, en sus corazones oraban a Dios, abatieron no menos de treinta y cinco mil cuatrocientos[a], habiendo sido grandemente alegrados por el cuidado de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego expresa literalmente la cifra como «tres miríadas y cinco mil y cuatrocientos»; la forma transmitida alrededor de «cinco mil» es comprimida o irregular en este testimonio, pero el total entendido es claro: 35.400.'
    reason: textual_variant
  - marker: b
    text: 'O: «habiendo sido grandemente alentados por el cuidado providente de Dios». El griego dice más literalmente «el cuidado de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῖς μὲν χερσὶν ἀγωνιζόμενοι
  english_pob_choice: while fighting with their hands
  chosen_spanish: mientras combatían con sus manos
  alternatives_spanish:
  - mientras luchaban con sus manos
  - mientras peleaban con sus manos
  - luchando con sus manos
  lexicon: LSJ
  rationale: ἀγωνίζομαι expresa lucha o combate activo; en este contexto militar, «combatían» es natural en español y conserva la oposición con la esfera interior de la siguiente cláusula.
- source_word: ταῖς δὲ καρδίαις πρὸς τὸν θεὸν εὐχόμενοι
  english_pob_choice: they were praying in their hearts to God
  chosen_spanish: con sus corazones oraban a Dios
  alternatives_spanish:
  - oraban en sus corazones a Dios
  - oraban con sus corazones a Dios
  - mientras oraban en su corazón a Dios
  lexicon: LSJ
  rationale: La dación καρδίαις tiene valor instrumental o de esfera, y el contraste es entre combate externo y oración interior. «Con sus corazones» mantiene la imagen sin hacerla más explicativa de lo que permite el griego.
- source_word: κατέστρωσαν
  english_pob_choice: they struck down
  chosen_spanish: abatieron
  alternatives_spanish:
  - derribaron
  - derribaron por tierra
  - hicieron caer
  lexicon: LSJ
  rationale: En contexto bélico, el verbo transmite la caída o derrota de enemigos. «Abatieron» es idiomático y fuerte en español, cercano a «struck down».
- source_word: οὐδὲν ἧττον
  english_pob_choice: no fewer than
  chosen_spanish: no menos de
  alternatives_spanish:
  - nada menos que
  - no menos que
  - no menos de
  lexicon: LSJ
  rationale: La locución introduce un mínimo numérico. «No menos de» conserva el valor enfático del griego y funciona con naturalidad en español.
- source_word: μυριάδων πένθων καὶ τετρακισχιλίων
  english_pob_choice: thirty-five thousand and four hundred
  chosen_spanish: treinta y cinco mil cuatrocientos
  alternatives_spanish:
  - tres miríadas y cinco mil cuatrocientos
  - treinta y cinco mil y cuatrocientos
  lexicon: LSJ
  rationale: 'La transmisión griega es irregular en torno a πένθων, pero el sentido numérico del total es claro en la tradición del pasaje: 35,400. En español, la cifra resuelta es la más legible y sigue el análisis del texto recibido.'
- source_word: τῇ τοῦ θεοῦ μεγάλως ἐφρανθέντες ἐπιμελείᾳ
  english_pob_choice: having been greatly gladdened by the care of God
  chosen_spanish: habiendo sido grandemente alegrados por el cuidado de Dios
  alternatives_spanish:
  - grandemente gozosos por la providencia de Dios
  - habiendo sido muy alentados por el cuidado de Dios
  - regocijados grandemente por la atención de Dios
  lexicon: LSJ
  rationale: 'ἐπιμέλεια significa cuidado, atención o interés. «Cuidado de Dios» preserva el sentido léxico sin importar «providencia». ἐφρανθέντες se rinde como resultado emocional: «alegrados».'
theological_decisions:
- issue: Si ἐπιμελείᾳ debe entenderse como 'providencia' o como 'cuidado'
  english_pob_reading: the care of God
  chosen_spanish_reading: el cuidado de Dios
  alternative_spanish_readings:
  - la providencia de Dios
  - el cuidado providente de Dios
  rationale: El griego dice literalmente cuidado/atención, y el texto no usa un término técnico para 'providencia'. «Cuidado de Dios» mantiene la afirmación teológica sin ampliarla más allá de la evidencia verbal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the lexical claim before theological inference.'
- issue: Si καρδίαις debe explicarse como oración 'interior' o mantenerse más literal
  english_pob_reading: they were praying in their hearts to God
  chosen_spanish_reading: con sus corazones oraban a Dios
  alternative_spanish_readings:
  - oraban en sus corazones a Dios
  - oraban interiormente a Dios
  rationale: La contraposición entre manos y corazones ya comunica la dimensión interior. La forma elegida conserva el paralelismo sin sobreexplicar la imagen.
  doctrine_reference: Maintain the body/soul contrast present in the source text.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del testimonio griego de Swete y del audit trail inglés. Se mantuvo la cifra resuelta, el contraste manos/corazones y el sentido léxico de ἐπιμέλεια como «cuidado», evitando importar «providencia» al texto principal.
  spanish_consistency_notes:
  - Se usó «Dios» para θεόν, conforme al estándar español del proyecto.
  - Se conservó «cuidado» para ἐπιμέλεια para no borrar la tensión entre cuidado literal y posible implicación providencial.
  - La cifra se normalizó a «treinta y cinco mil cuatrocientos» por claridad pública, con nota textual.
  - El paralelismo corporal del griego se preservó con «con sus manos / con sus corazones».
