    text: Or 'children of Israel' or 'people of Israel.' The Hebrew is literally 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Nazirites'' refers to those specially consecrated to God under a Nazirite vow; alternatively, ''consecrated ones.'''
    reason: cultural_note
