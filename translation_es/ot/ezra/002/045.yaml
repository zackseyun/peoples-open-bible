lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - los miembros de la familia de
  lexicon: HALOT
  rationale: En este registro genealógico, בְּנֵי funciona como designación de linaje o clan. «Los hijos de» conserva la forma hebrea y la estructura repetitiva del listado; en español es una equivalencia natural y transparente para un catálogo de familias.
- source_word: לְבָנָה
  english_pob_choice: Lebanah
  chosen_spanish: Lebaná
  alternatives_spanish:
  - Lebana
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la vocal final abierta como «-á» para reflejar mejor la forma hebrea y la pronunciación esperable en español.
- source_word: חֲגָבָה
  english_pob_choice: Hagabah
  chosen_spanish: Hagabá
  alternatives_spanish:
  - Hagaba
  lexicon: HALOT
  rationale: Nombre propio transliterado. La terminación «-á» ayuda a reflejar la vocal final del hebreo y evita una forma más naturalizada que ocultaría la correspondencia con el texto fuente.
- source_word: עַקּוּב
  english_pob_choice: Akkub
  chosen_spanish: Akkub
  alternatives_spanish:
  - Akub
  - Acuub
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma tradicional «Akkub», que coincide con la tradición inglesa POB y representa adecuadamente la duplicación consonántica y la vocal larga del hebreo.
theological_decisions:
- issue: Valor de בְּנֵי en un listado genealógico/clánico
  english_pob_reading: Hebrew 'sons of' may denote a family line or clan group, not only immediate male children.
  chosen_spanish_reading: «Hijos de» puede designar un linaje o grupo de clan, no solo hijos varones inmediatos.
  alternative_spanish_readings:
  - «Descendientes de»
  - «Familia de»
  rationale: La nota inglesa debe mantenerse porque el hebreo no limita aquí el sentido a filiación biológica inmediata. En español, «hijos de» conserva la repetición formal del hebreo, mientras que la nota aclara el alcance clánico de la expresión.
  doctrine_reference: Uso léxico-genealógico, no doctrinal; coherencia con la nota auditada de la POB en inglés.
