translation:
  language: es
  text: Y debajo de la expansión[b], sus alas eran rectas[a], una hacia su hermana. Cada ser tenía dos que lo cubrían, y cada ser tenía dos que cubrían su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, “una mujer hacia su hermana”, con formas femeninas singulares porque “alas” es gramaticalmente femenino; el sentido es que las alas correspondían una con otra.
    reason: lexical_alternative
  - marker: b
    text: O “firmamento” para “expansión”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַחַת
  english_pob_choice: And under
  chosen_spanish: Y debajo de
  alternatives_spanish:
  - Y bajo
  - Y bajo de
  lexicon: HALOT
  rationale: La relación espacial se expresa de modo natural en español con 'debajo de', manteniendo la continuidad descriptiva de la visión sin añadir énfasis interpretativo.
- source_word: הָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: la expansión
  alternatives_spanish:
  - el firmamento
  - la bóveda
  lexicon: HALOT
  rationale: '''Raqía'' designa el espacio extendido/cúpula visible; ''expansión'' conserva el sentido amplio y evita cargar el texto con el registro tradicional de ''firmamento'', aunque esta sigue siendo una alternativa posible.'
- source_word: כַּנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas
  lexicon: HALOT
  rationale: El término se refiere de forma directa a las alas de los seres vivientes; 'alas' es la equivalencia natural en español y conserva el referente corporal.
- source_word: יְשָׁרוֹת
  english_pob_choice: were straight
  chosen_spanish: eran rectas
  alternatives_spanish:
  - estaban rectas
  - eran derechas
  lexicon: HALOT
  rationale: '''Yasharot'' describe alineación/rectitud. ''Eran rectas'' mantiene la observación breve y visual del hebreo.'
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  english_pob_choice: each one toward her sister
  chosen_spanish: una hacia su hermana
  alternatives_spanish:
  - cada una hacia su hermana
  - una con la otra
  lexicon: HALOT
  rationale: Con alas gramaticalmente femeninas, el hebreo usa 'mujer/hermana' en singular femenino para indicar correspondencia mutua. 'Una hacia su hermana' conserva esa imagen sin volverla genérica en exceso.
- source_word: לְאִישׁ
  english_pob_choice: Each had
  chosen_spanish: Cada uno tenía
  alternatives_spanish:
  - Y cada uno tenía
  - Para cada uno había
  lexicon: HALOT
  rationale: El distributivo hebreo requiere una reestructuración idiomática en español. 'Cada uno tenía' expresa bien la distribución sin perder claridad.
- source_word: שְׁתַּיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Numeral simple; se conserva como 'dos' en ambas ocurrencias para reflejar la repetición distributiva.
- source_word: מְכַסּוֹת לָהֵנָּה
  english_pob_choice: covering them
  chosen_spanish: que los cubrían
  alternatives_spanish:
  - que las cubrían
  - cubriéndolos
  lexicon: HALOT
  rationale: El participio describe función continua de cobertura. En español, una relativa con 'que los cubrían' fluye mejor. El pronombre plural masculino se usa por el referente colectivo de los seres vivientes, mientras que el antecedente inmediato 'alas' sigue siendo femenino gramatical en la frase anterior.
- source_word: וּלְאִישׁ שְׁתַּיִם מְכַסּוֹת לָהֵנָּה
  english_pob_choice: and each had two covering
  chosen_spanish: y cada uno tenía dos alas que cubrían
  alternatives_spanish:
  - y para cada uno dos alas que cubrían
  - y cada uno tenía dos alas cubriéndolos
  lexicon: HALOT
  rationale: Se mantiene la estructura distributiva repetida del hebreo. Añadir 'alas' hace explícito el sustantivo implícito en la repetición y evita ambigüedad en español.
- source_word: אֵת גְּוִיֹּתֵיהֶם
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus cuerpos
  - sus troncos
  lexicon: HALOT
  rationale: '''Geviyyot'' en este contexto visionario se refiere al cuerpo de los seres vivientes, no a cadáveres. ''Cuerpos'' es la opción más clara y fiel en español.'
theological_decisions:
- issue: Sentido de הָרָקִיעַ en la visión
  english_pob_reading: the expanse; alternative note acknowledges 'firmament'
  chosen_spanish_reading: la expansión
  alternative_spanish_readings:
  - el firmamento
  - la bóveda
  rationale: No se trata de imponer una cosmología moderna ni de fijar una traducción litúrgica tradicional. 'Expansión' conserva la imagen amplia y abierta del término hebreo, mientras que la nota deja constancia de la alternativa tradicional 'firmamento'.
  doctrine_reference: Lenguaje cosmológico descriptivo de la visión; no define por sí solo doctrina dogmática.
- issue: Referente de 'sus cuerpos' frente a posibles lecturas de גְּוִיּוֹת
  english_pob_reading: their bodies
  chosen_spanish_reading: sus cuerpos
  alternative_spanish_readings:
  - sus cadáveres
  - sus troncos
  rationale: En una visión de seres vivientes, 'cadáveres' sería teológicamente y contextualmente inadecuado. 'Cuerpos' respeta el referente vivo de la escena y evita introducir una connotación de muerte que el pasaje no exige.
  doctrine_reference: Contexto visionario de los seres vivientes en Ezequiel 1.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de WLC y el audit trail inglés sin cambios textuales relevantes respecto a la última revisión, que quedó marcada como unchanged. Se conserva la decisión de traducir רָקִיעַ con una opción moderna y clara, y de entender גְּוִיּוֹתֵיהֶם como “cuerpos” en el contexto de la visión.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno pero digno, con sintaxis natural en español.
  - Se evita el calco mecánico del hebreo cuando el español requiere reordenación distributiva.
  - Se conserva la ambigüedad literaria de las alas femeninas mediante la nota [a], en paralelo con el inglés POB.
  - No se usa 'SEÑOR' ni 'Cristo' porque el versículo no contiene esos términos.
  - '''Expansión'' se usa de forma consistente con el default del proyecto para רָקִיעַ, dejando constancia de la alternativa tradicional.'
