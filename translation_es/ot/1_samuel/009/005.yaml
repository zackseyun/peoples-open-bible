  text: When they came into the land of Zuph[a], Saul said to his young man who was with him, “Come, let us return[b], lest my father stop caring about the donkeys and become anxious about us.”
  footnotes:
  - marker: a
    text: Or “stop worrying about the donkeys.” The Hebrew says “stop/cease from the donkeys,” an idiom meaning to cease being occupied with them.
    reason: lexical_alternative
  - marker: b
    text: Or “be concerned for us.”
    reason: lexical_alternative
