    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los Refaim»; tradicionalmente también se traduce «los gigantes».'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] sobre «Sippai», que es donde corresponde. Se cambió «se levantó la guerra» por «hubo guerra» para mayor naturalidad en español. Se sustituyó «hirió» por «abatió» para reflejar mejor la fuerza de הִכָּה / 'struck down'. Se reemplazó «húsata» por «husatita» como gentilicio más claro. Se ajustó «refaítas» a «Refaim» para seguir más de cerca la decisión léxica y teológica auditada del POB inglés.
