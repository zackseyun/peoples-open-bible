    text: Or 'a despised, shattered idol/image.' The Hebrew עֶצֶב can denote a fashioned object, including an idol or image; the main text renders it as 'pot' because the parallel with 'vessel' favors pottery imagery here.
    reason: lexical_alternative
  - marker: b
    text: Coniah is the shortened Hebrew form of the king also known as Jeconiah (cf. Jer 24:1; 27:20).
    reason: cross_reference
