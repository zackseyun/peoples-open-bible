review_pass:
  verdict: approve
  source_alignment_summary: El borrador español refleja fielmente el hebreo אש לוהטת יכבו מים כן צדקה תכפר חטאת, con buen apoyo del paralelo griego. «El agua apaga un fuego ardiente» conserva la imagen proverbial; «así la limosna expía el pecado» transmite correctamente צדקה como «limosna/almsgiving» y תכפר con fuerza expiatoria. La nota sobre el plural griego «pecados» preserva adecuadamente la variante sin desplazar el singular hebreo del texto principal.
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis es fluida y ampliamente eclesialmente legible. «Limosna» y «expía» son términos precisos y comprensibles en este contexto. La puntuación y el anclaje de notas son correctos.
  glossary_alignment: Cumple bien con la terminología del proyecto. No hay nombres divinos ni títulos mesiánicos en juego. La decisión clave צדקה -> «la limosna» sigue la justificación auditada del POB y evita la generalización abstracta a «justicia». תכפר -> «expía» preserva la fuerza teológica mejor que formulaciones debilitadas.
  issues:
  - severity: low
    issue: «Fuego ardiente» es algo menos vívido que «fuego abrasador» o «fuego en llamas».
    rationale: No es infiel ni poco natural; simplemente suaviza un poco la intensidad de «blazing fire». Aun así, sigue siendo plenamente aceptable y fiel al sentido.
  - severity: low
    issue: La nota a incluye «rectitud» además de «justicia».
    rationale: Es una expansión interpretativa menor respecto de la nota inglesa, pero está dentro del campo semántico documentado de צדקה y no distorsiona el pasaje.
