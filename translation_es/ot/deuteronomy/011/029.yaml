review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en los elementos principales: «Yahvé», «tu Dios», «la tierra», «la bendición», «la maldición», y la nota sobre נתן como ‘poner/dar’ frente a ‘proclamar’. Sin embargo, no preserva fielmente la estructura de la cláusula relativa hebrea אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ, porque fusiona ‘entrar’ con ‘poseer’ en «la tierra que vas a poseer» y omite explícitamente la idea de entrada. El hebreo y el English POB distinguen ‘entrar’ de ‘poseer’; el español debe mantener ambas nociones.'
  spanish_quality_summary: 'El texto es claro y natural, pero «que vas a poseer» reduce contenido semántico. Además, «sobre el monte» es comprensible, aunque «en el monte» suele sonar más natural en español para ubicación ceremonial; con todo, puede mantenerse «sobre» si se quiere reflejar más de cerca עַל. La reparación necesaria es pequeña y mejora tanto fidelidad como fluidez: «en la tierra a la que vas para poseerla» o similar.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales. La decisión para נתן como «pondrás» concuerda con la filosofía POB, y la nota léxica conserva la alternativa «proclamarás». El único desajuste importante está en la segmentación semántica de אֲשֶׁר אַתָּה בָא שָׁמָּה / לְרִשְׁתָּהּ.'
  issues:
  - severity: high
    issue: Se omite la idea explícita de ‘entrar’ en la tierra
    rationale: אֲשֶׁר אַתָּה בָא שָׁמָּה significa literalmente que entras/vas allí; el borrador lo reemplaza por «que vas a poseer», absorbiendo indebidamente לְרִשְׁתָּהּ y perdiendo una parte del sentido fuente.
  - severity: medium
    issue: La decisión léxica para אֲשֶׁר אַתָּה בָא שָׁמָּה no coincide con el texto español final
    rationale: En las decisiones se registra «que vas a poseer» para una frase que en realidad corresponde a ‘que estás entrando / a la que vas’, lo cual documenta incorrectamente la evidencia fuente y la solución española.
  revised_spanish_text: Y cuando Yahvé tu Dios te introduzca en la tierra a la que vas para poseerla, pondrás[a] la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal.
  revised_footnotes:
  - marker: a
    text: O «proclamarás la bendición sobre el monte Gerizim y la maldición sobre el monte Ebal». El hebreo dice literalmente «poner/dar», y el gesto ceremonial exacto se explica en el pasaje inmediato.
    reason: lexical_alternative
  revision_rationale: La revisión mínima restituye las dos ideas del hebreo —entrada en la tierra y posesión de ella— sin perder naturalidad en español. Se mantiene «Yahvé» según la norma del proyecto y se conserva la nota léxica sobre «pondrás/proclamarás».
