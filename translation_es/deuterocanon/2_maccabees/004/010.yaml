    reason: lexical_alternative
  revision_rationale: Se sustituyó «hubo dado / hubo obtenido» por formas más naturales en español narrativo, sin perder la secuencia de acciones previas. Se reemplazó «volvió ... hacia» por «desvió ... al», que expresa mejor la acción causativa de μετέστησε y produce una frase idiomática y clara sobre la helenización cultural.
