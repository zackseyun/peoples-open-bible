    reason: lexical_alternative
  revision_rationale: Se corrige φείδομαι con «no tengamos compasión de» para evitar el falso matiz de absolver culpa que introduce «perdonemos a la viuda». También se depura la nota [a] para ceñirse a la alternativa documentada en la auditoría inglesa y no introducir «inocente», que excede la evidencia dada. No se requiere adjudicación adicional.
