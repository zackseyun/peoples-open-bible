  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Te arrojaré», «bestias de la tierra», «aves de los cielos» y el perfecto profético «Te he dado» están bien alineados. «Desierto» es aceptable para הַמִּדְבָּרָה aunque «wilderness»/«yermo» sería algo más amplio; no exige cambio.
