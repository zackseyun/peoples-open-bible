base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/006.yaml
  text: Until the day breathes and the shadows flee[b][a], I will go to the mountain of myrrh and to the hill of frankincense.
  footnotes:
  - marker: a
    text: Or 'Until the day blows/grows cool and the shadows flee.' The Hebrew verb is literally 'breathes' and may evoke the evening breeze or the breaking of dawn.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'I will go to myself' / 'I will go.' The Hebrew includes an ethical dative ('for myself'), which may add emphasis rather than a separate idea.
    reason: lexical_alternative
