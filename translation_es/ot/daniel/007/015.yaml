translation:
  language: es
  text: En cuanto a mí[a], Daniel, mi espíritu se angustió dentro de mí, y las visiones de mi cabeza me aterrorizaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de mi cuerpo». El término arameo subyacente puede entenderse como «vaina» o «envoltura», una metáfora rara del cuerpo que contiene el espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתְכְּרִיַּת
  english_pob_choice: was distressed
  chosen_spanish: se angustió
  alternatives_spanish:
  - se vio angustiado
  - se perturbó
  - se sintió afligido
  lexicon: HALOT
  rationale: El verbo arameo expresa una perturbación o dolor interno intenso. «Se angustió» comunica bien la aflicción interior en español natural, sin perder la fuerza emotiva del texto.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi vida interior
  - mi mente
  lexicon: HALOT
  rationale: Aquí רוּחַ designa el ámbito interior de Daniel, no viento ni aliento físico. «Mi espíritu» conserva esa dimensión antropológica y coincide con el uso bíblico habitual.
- source_word: בְּגוֹא
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - en mi interior
  - dentro de mi cuerpo
  lexicon: HALOT
  rationale: La revisión inglesa optó por una expresión más idiomática que «within its sheath», entendiendo la locución como referencia al interior/cuerpo de Daniel. «Dentro de mí» reproduce con claridad ese sentido sin endurecer el español.
- source_word: נִדְנֶה
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi cuerpo
  - en mi envoltura
  - en mi carne
  lexicon: HALOT
  rationale: El sustantivo arameo es raro y la POB inglesa decidió no conservar la metáfora de manera literal en el texto principal. En español, la misma decisión se expresa con «dentro de mí», manteniendo accesible el sentido sin borrar la tensión léxica, que queda reflejada en la nota.
- source_word: חֶזְוֵי
  english_pob_choice: the visions
  chosen_spanish: las visiones
  alternatives_spanish:
  - las apariciones
  - los sueños
  lexicon: HALOT
  rationale: En el contexto apocalíptico de Daniel, el término se refiere a visiones reveladas. «Las visiones» es la forma más precisa y natural en español.
- source_word: רֵאשִׁי
  english_pob_choice: of my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - en mi cabeza
  - de mi mente
  lexicon: HALOT
  rationale: Se conserva la imagen formal «de mi cabeza», que refleja el hebreo/arameo y el modo característico de Daniel de describir la experiencia visionaria.
- source_word: יְבַהֲלֻנַּנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterrorizaron
  alternatives_spanish:
  - me alarmaron
  - me espantaron
  - me asustaron
  lexicon: HALOT
  rationale: El verbo indica un efecto fuerte de temor o alarma. «Me aterrorizaron» mantiene la intensidad del inglés POB y del contexto inmediato.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés: se abandona una traducción demasiado literal de la imagen de «sheath» y se adopta una formulación más natural y exacta («within me»), manteniendo el tono formal y la estructura del versículo.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» para רוּחַ, en continuidad con el criterio bíblico-antropológico del proyecto.
  - Se conserva la imagen «de mi cabeza» en lugar de interpretarla como «en mi mente», para no aplanar el lenguaje visionario.
  - «Aterrorizaron» preserva la intensidad del verbo final sin exceder la fuerza del texto fuente.
  - La nota al pie recoge la alternativa corporal documentada por la POB inglesa sin introducirla en el texto principal.
