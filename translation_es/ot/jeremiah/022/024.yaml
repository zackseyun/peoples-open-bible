translation:
  language: es
  text: '«Vivo yo —declara Yahvé—: aunque Conías[a], hijo de Joacim, rey de Judá, fuera un anillo de sello[b] en mi mano derecha, aun de allí te arrancaría».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Coniah»; en otros lugares este rey también es llamado «Jeconías».'
    reason: alternative_reading
  - marker: b
    text: O «sello» o «sortija de sello». La imagen es la de un sello real llevado en la mano como símbolo de autoridad y de valor precioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Por mi vida
  - Tan cierto como que vivo yo
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento solemne de autoafirmación divina. En español, «Vivo yo» preserva la concisión y la fuerza performativa sin introducir una paráfrasis innecesaria.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: 'La fórmula profética estándar se mantiene con un verbo declarativo formal y el nombre divino según el criterio del proyecto: «Yahvé».'
- source_word: כִּי אִם
  english_pob_choice: even if
  chosen_spanish: aunque
  alternatives_spanish:
  - aun si
  - incluso si
  lexicon: HALOT
  rationale: 'Aquí la combinación introduce una concesión fuerte: aun concediendo la condición hipotética, el juicio sigue vigente. «Aunque» expresa bien esa relación en español natural.'
- source_word: כָּנְיָהוּ
  english_pob_choice: Coniah
  chosen_spanish: Conías
  alternatives_spanish:
  - Coniah
  - Jeconías
  lexicon: HALOT
  rationale: Se conserva la forma hebrea breve presente en este versículo. «Conías» reproduce el nombre de manera transparente para el lector español y evita armonizarlo con la forma más larga usada en otros lugares.
- source_word: חוֹתָם
  english_pob_choice: signet ring
  chosen_spanish: anillo de sello
  alternatives_spanish:
  - sello
  - sortija de sello
  lexicon: HALOT
  rationale: El término designa el objeto portátil usado como sello real. «Anillo de sello» comunica tanto el objeto como su función simbólica con claridad en español.
- source_word: עַל יַד יְמִינִי
  english_pob_choice: on my right hand
  chosen_spanish: en mi mano derecha
  alternatives_spanish:
  - sobre mi mano derecha
  - en la palma de mi mano derecha
  lexicon: HALOT
  rationale: La imagen corporal natural en español es «mano derecha». Se conserva la cercanía, honor y autoridad sugeridos por la expresión hebrea.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - aun desde allí
  lexicon: HALOT
  rationale: El adverbio locativo mira al lugar hipotético del anillo en la mano derecha. «De allí» resulta fiel y fluido en la cláusula de amenaza.
- source_word: אֶתְּקֶנְךָּ
  english_pob_choice: I would tear you off
  chosen_spanish: te arrancaría
  alternatives_spanish:
  - te arrancaría de allí
  - te arrancaría de mi mano
  lexicon: HALOT
  rationale: El verbo נתק expresa una remoción violenta, no solo un simple quitar. «Arrancaría» conserva esa fuerza de desgarro y expulsión.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio del proyecto de rendir directamente el Tetragrámaton como «Yahvé», preservando el nombre del pacto en vez de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma del nombre de Conías en este versículo
  english_pob_reading: Coniah
  chosen_spanish_reading: Conías
  alternative_spanish_readings:
  - Jeconías
  - Coniah
  rationale: Se mantiene la forma breve presente en el hebreo de este versículo, sin nivelarla con la forma más conocida de otros contextos. Esto conserva el matiz retórico del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de Jeremías 22:24 y el audit trail inglés. No se detectaron revisiones aplicadas en el flujo inglés, y el control de concordancia reporta alta coincidencia; por eso se mantiene la estructura concesiva, el nombre breve Conías y la metáfora del sello con una equivalencia española natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se mantuvo «Conías» para la forma hebrea breve de este versículo; la nota explica la variante «Jeconías».
  - «Anillo de sello» conserva el valor del objeto sin perder la imagen real.
  - La cláusula final «te arrancaría» refleja la violencia del hebreo נתק sin suavizarla.
