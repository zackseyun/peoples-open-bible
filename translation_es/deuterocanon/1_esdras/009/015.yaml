translation:
  language: es
  text: Y los de la cautividad[a] hicieron todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los exiliados que regresaron»; el griego dice literalmente «los de la cautividad», refiriéndose a la comunidad posexílica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cumplieron
  - realizaron
  - llevaron a cabo
  lexicon: BDAG
  rationale: ποιέω aquí funciona de manera idiomática con κατὰ πάντα ταῦτα para indicar que ejecutaron lo recién descrito. En español, «hicieron» conserva esa idea de acción realizada sin añadir un matiz más interpretativo que «cumplieron» o más técnico que «llevaron a cabo».
- source_word: κατὰ πάντα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - conforme a todo esto
  - según todo esto
  - todas estas acciones
  lexicon: LSJ
  rationale: La frase apunta a la totalidad de lo antes narrado y a la referencia retrospectiva de ταῦτα. «Todas estas cosas» reproduce bien esa suma global en un español natural y readable, sin forzar una construcción demasiado literal.
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: those from the captivity
  chosen_spanish: los que venían de la cautividad
  alternatives_spanish:
  - los que volvieron del exilio
  - los exiliados que regresaron
  - los de la cautividad
  lexicon: LSJ
  rationale: El griego dice literalmente «los de la cautividad/exilio». Opté por «los que venían de la cautividad» para mantener la referencia al grupo posexílico sin introducir de lleno una paráfrasis interpretativa como «los exiliados que regresaron». «Cautividad» conserva mejor la textura histórica del término griego y encaja con el audit trail inglés.
translation_notes:
  revision_awareness: 'El control de revisión indica que no se requerían cambios, y la solución mantiene la lectura de base: el sujeto colectivo posexílico y la acción completa expresada por el aoristo griego.'
  spanish_consistency_notes:
  - Se mantiene «cautividad» para reflejar el valor formal de αἰχμαλωσία sin borrar el referente histórico posexílico.
  - «Hicieron» conserva la fuerza verbal simple del griego y evita sobreinterpretar la acción.
  - El marcador [a] queda anclado en el grupo sujeto porque allí está la alternativa lexical principal.
