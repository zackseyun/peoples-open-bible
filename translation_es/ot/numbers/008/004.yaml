translation:
  language: es
  text: 'Ahora bien, esta era la hechura del candelabro: trabajo martillado de oro[a]; desde su base hasta su flor, era de trabajo martillado. Conforme al modelo[b] que Yahvé había mostrado a Moisés, así hizo el candelabro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "trabajo batido"; el hebreo enfatiza que el candelabro fue formado a golpes de martillo. Algunos también entienden el término en el sentido de "de una sola pieza".
    reason: lexical_alternative
  - marker: b
    text: '"Modelo" también puede verterse como "apariencia" o "visión" en este contexto, pero aquí se entiende como la forma mostrada a Moisés para la fabricación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  english_pob_choice: workmanship
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - artesanía
  - manufactura
  lexicon: HALOT
  rationale: En este contexto artesanal, מַעֲשֵׂה señala la realización u obra producida, no solo un acto abstracto. "Obra" suena natural en español y conserva el sentido de ejecución/craftsmanship sin volverlo demasiado técnico.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: la menorá
  alternatives_spanish:
  - el candelabro
  - el candelero
  - la lámpara
  lexicon: HALOT
  rationale: Aquí se conserva el término cultual tradicional "menorá", porque en español ya identifica con claridad este objeto del tabernáculo y evita una descripción menos precisa. Dado que el contexto es técnico-litúrgico, la transliteración es más fiel que "candelabro".
- source_word: מִקְשָׁה
  english_pob_choice: hammered work
  chosen_spanish: trabajo martillado
  alternatives_spanish:
  - obra martillada
  - trabajo batido
  - de una sola pieza
  lexicon: HALOT
  rationale: La raíz enfatiza metal trabajado a golpes de martillo. "Martillado" expresa bien la técnica; la formulación sustantiva "trabajo martillado" mantiene el paralelismo con la primera y segunda aparición del término. Se evita "de una sola pieza" porque es una inferencia secundaria, no el sentido principal.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro puro
  lexicon: HALOT
  rationale: El material es simplemente oro. En español, "de oro" reproduce de manera natural la construcción hebrea y evita añadir una cualidad no presente en el texto.
- source_word: עַד יְרֵכָהּ
  english_pob_choice: from its base
  chosen_spanish: desde su base
  alternatives_spanish:
  - hasta su base
  - desde su pie
  - desde su parte inferior
  lexicon: HALOT
  rationale: יְרֵךְ aquí designa la parte inferior o base del objeto. "Desde su base" conserva el alcance total indicado por la preposición y es idiomático en español.
- source_word: עַד פִּרְחָהּ
  english_pob_choice: to its flower
  chosen_spanish: hasta su flor
  alternatives_spanish:
  - hasta su floración
  - hasta su ornamento floral
  - hasta su floritura
  lexicon: HALOT
  rationale: El hebreo alude al adorno en forma de flor. "Flor" mantiene la imagen concreta y sigue de cerca la forma singular del original, sin sobreinterpretarla.
- source_word: כַּמַּרְאֶה
  english_pob_choice: according to the pattern
  chosen_spanish: conforme al modelo
  alternatives_spanish:
  - según la apariencia
  - según la visión
  - de acuerdo con el patrón
  lexicon: HALOT
  rationale: En este pasaje de construcción del santuario, el sentido no es mera apariencia visual sino el modelo mostrado a Moisés. "Modelo" comunica con claridad la referencia arquitectónica/cultual y evita una traducción demasiado abstracta.
- source_word: הֶרְאָה
  english_pob_choice: had shown
  chosen_spanish: había mostrado
  alternatives_spanish:
  - mostró
  - había hecho ver
  - había enseñado
  lexicon: HALOT
  rationale: El causativo de ראה se expresa naturalmente con "mostrar". El pluscuamperfecto español refleja bien la relación temporal dentro de la cláusula relativa y la acción previa al hacer la menorá.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. "Yahvé" preserva la referencia al nombre propio sin sustituirlo por una máscara litúrgica.
- source_word: כֵּן עָשָׂה
  english_pob_choice: so he made
  chosen_spanish: así hizo
  alternatives_spanish:
  - de esa manera hizo
  - así la hizo
  - y así hizo
  lexicon: HALOT
  rationale: El verbo hebreo deja implícito el sujeto; en español el agente se sobreentiende por el contexto. "Así hizo" conserva la correlación "conforme a... así..." sin añadir innecesariamente un sujeto explícito.
theological_decisions:
- issue: Nombre divino יְהוָה en un texto de revelación y obediencia cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El pasaje describe la instrucción y ejecución del diseño del santuario; mantener el nombre propio subraya que el modelo proviene directamente de Yahvé. No se usa "SEÑOR" porque el proyecto evita esa máscara convencional cuando el hebreo contiene el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de כַּמַּרְאֶה en contexto tabernacular
  english_pob_reading: according to the pattern
  chosen_spanish_reading: conforme al modelo
  alternative_spanish_readings:
  - según la apariencia
  - según la visión
  - conforme a la forma
  rationale: 'Aunque el sustantivo puede significar "apariencia" o "visión", aquí la función del pasaje es normativa: Moisés recibe un modelo concreto para la fabricación. "Modelo" preserva esa fuerza regulativa sin negar las otras posibilidades, que quedan como alternativas léxicas.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con alta concordancia con la última revisión inglesa, especialmente al reflejar explícitamente la construcción "trabajo martillado de oro" y la correlación "conforme al modelo... así hizo". Se mantiene la tensión léxica de מִקְשָׁה sin reducirla a una sola interpretación secundaria.
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para יְהוָה.
  - Se conserva "menorá" como término cultual técnico, en lugar de sustituirlo por un equivalente más genérico.
  - '"Modelo" se emplea para כַּמַּרְאֶה en armonía con el contexto de instrucción de fabricación.'
  - La estructura "desde... hasta..." reproduce el alcance del hebreo y resulta natural en español.
  - Se evita añadir el sujeto explícito de עָשָׂה para respetar el hebreo, donde el agente queda implícito.
