base_translation:
  language: en
  yaml_path: translation/ot/psalms/123/002.yaml
  text: Look[a], as the eyes of servants are toward the hand of their masters, as the eyes of a female servant are toward the hand of her mistress, so our eyes are toward Yahweh our God[b], until he shows us favor.
  footnotes:
  - marker: a
    text: Or 'slaves' (for עֲבָדִים); the image is of dependent attendants watching for a superior's signal or provision.
    reason: lexical_alternative
  - marker: b
    text: Or 'until he is gracious to us' or 'until he has mercy on us.'
    reason: alternative_reading
