translation:
  language: es
  text: He hecho pacto con mis ojos[a]; ¿cómo, pues, miraría yo a una virgen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿cómo, pues, fijaría yo la vista en una virgen?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: HALOT
  rationale: En español, «pacto» comunica mejor una obligación solemne y vinculante sin sonar tan técnico como «alianza» ni tan poco natural como «covenio». Mantiene la fuerza formal del hebreo en un contexto de autodisciplina moral.
- source_word: כָּרַתִּי
  english_pob_choice: have made
  chosen_spanish: he hecho
  alternatives_spanish:
  - he cortado
  - he establecido
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal «cortar un pacto», pero en español «he hecho pacto» conserva el sentido idiomático natural. El perfecto compuesto expresa una acción ya realizada con vigencia presente.
- source_word: לְעֵינַי
  english_pob_choice: with my eyes
  chosen_spanish: con mis ojos
  alternatives_spanish:
  - para mis ojos
  - respecto de mis ojos
  lexicon: HALOT
  rationale: La preposición ל con «ojos» funciona aquí de modo relacional; en español, «con mis ojos» reproduce de manera natural la idea de un compromiso asumido en relación con la mirada.
- source_word: וּמָה
  english_pob_choice: so how could I
  chosen_spanish: ¿cómo, pues,
  alternatives_spanish:
  - ¿y por qué habría yo de
  - entonces, ¿cómo podría yo
  lexicon: HALOT
  rationale: La partícula introduce una consecuencia lógica del pacto previo. «¿Cómo, pues,» conserva esa inferencia en español sin forzar una estructura demasiado literal.
- source_word: אֶתְבּוֹנֵן
  english_pob_choice: gaze
  chosen_spanish: miraría
  alternatives_spanish:
  - fijaría la vista
  - contemplaría
  - miraría atentamente
  lexicon: HALOT
  rationale: El verbo hebreo sugiere una mirada atenta y deliberada; en este contexto moral, «miraría» con el complemento posterior comunica de forma clara y sobria la acción prohibida. Se evita un verbo demasiado rebuscado que distraería del sentido.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: Con verbos de visión, «a» es la preposición española más natural para indicar el objeto de la mirada.
- source_word: בְּתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: una virgen
  alternatives_spanish:
  - una joven
  - una doncella
  lexicon: HALOT
  rationale: «Virgen» mantiene la precisión del hebreo para una mujer sexualmente intacta, que es central en el contraste moral del pasaje. «Joven» o «doncella» serían más amplios o más literarios, pero menos exactos aquí.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: la lectura se mantiene alta en equivalencia óptima, preservando el valor idiomático de «cut/make a covenant» con un equivalente español natural y sosteniendo la fuerza deliberada del verbo de mirar sin mecanicismo.'
  spanish_consistency_notes:
  - Se usa «pacto» para בְּרִית, coherente con una traducción formal y sobria del término en contextos de compromiso vinculante.
  - «Virgen» se conserva por precisión léxica; no se suaviza a «joven» porque el contexto de Job 31:1 es explícitamente moral y sexual.
  - La nota alternativa se ancla en la frase verbal de la segunda cola, donde español admite un matiz más literal de «fijar la vista».
