  text: εἶπεν δὲ ὁ πατὴρ πρὸς τοὺς δούλους αὐτοῦ· ⸀Ταχὺ ⸀ἐξενέγκατε στολὴν τὴν πρώτην καὶ ἐνδύσατε αὐτόν, καὶ δότε δακτύλιον εἰς τὴν χεῖρα αὐτοῦ καὶ ὑποδήματα εἰς τοὺς πόδας,
base_translation:
  language: en
  yaml_path: translation/nt/luke/015/022.yaml
  text: 'But the father said to his slaves[a], ‘Quickly, bring out the best robe and put it on him[c][b], and put a ring on his hand and sandals on his feet.’'
  footnotes:
  - marker: a
    text: 'Or ''servants'' for ''slaves'' (Greek doulous). The term denotes household bondservants/slaves; ''slaves'' is used here to preserve that social reality.'
    reason: alternative_reading
  - marker: b
    text: 'Literally ''the first robe''; idiomatically, likely ''the best robe'' or ''the foremost robe.'''
    reason: lexical_alternative
  - marker: c
    text: 'The Greek says simply ''a ring''; some understand this as a signet ring symbolizing restored status.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「그러나 아버지는 자기 종들에게 말하였다. 「속히 가장 좋은 옷을 가져다가 그에게 입히고, 그의 손에 가락지를 끼우고 발에 신을 신기라.」」
  philosophy: optimal-equivalence
