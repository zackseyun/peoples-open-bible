translation:
  language: es
  text: Por tanto[a], mientras esperamos la salvación de parte de él, invoquémoslo en nuestra ayuda, y él oirá nuestra voz[b], si le es agradable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'liberación que proviene de él'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'él oirá nuestra voz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Conserva el valor inferencial/consecutivo del griego y suena natural en español bíblico sin añadir interpretación.
- source_word: ἀναμένοντες
  english_pob_choice: while we wait
  chosen_spanish: mientras esperamos
  alternatives_spanish:
  - esperando
  - en tanto esperamos
  lexicon: BDAG
  rationale: La forma participial expresa espera continua y expectante; 'mientras esperamos' reproduce bien ese matiz en español.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: Mantiene el peso teológico de la intervención salvadora de Dios, que el inglés POB también preserva con 'salvation'.
- source_word: τὴν παρ' αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de parte de él
  alternatives_spanish:
  - de él
  - procedente de él
  lexicon: LSJ
  rationale: παρά con genitivo indica procedencia/origen; 'de parte de él' comunica esa fuente de modo claro y reverente en español.
- source_word: ἐπικαλεσώμεθα
  english_pob_choice: let us call on
  chosen_spanish: invoquémoslo
  alternatives_spanish:
  - llamémoslo
  - clamemos a él
  lexicon: BDAG
  rationale: El subjuntivo exhortativo en contexto de oración pide un verbo de súplica; 'invocar' conserva el matiz bíblico de apelación a Dios.
- source_word: εἰς βοήθειαν ἡμῶν
  english_pob_choice: for our help
  chosen_spanish: para nuestra ayuda
  alternatives_spanish:
  - en nuestra ayuda
  - para ayudarnos
  lexicon: BDAG
  rationale: La construcción preposicional se refleja con una frase nominal cercana al griego, manteniendo la idea de petición de auxilio.
- source_word: εἰσακούσεται
  english_pob_choice: he will hear
  chosen_spanish: él escuchará
  alternatives_spanish:
  - él oirá
  - él atenderá
  lexicon: BDAG
  rationale: En contexto de oración, el verbo implica oír favorablemente; 'escuchará' comunica esa atención sin perder naturalidad en español.
- source_word: τῆς φωνῆς ἡμῶν
  english_pob_choice: our voice
  chosen_spanish: nuestra voz
  alternatives_spanish:
  - nuestro clamor
  - nuestra oración
  lexicon: LSJ
  rationale: Se conserva el sustantivo literal 'voz', evitando intensificar indebidamente a 'clamor' o 'oración' cuando el griego dice simplemente 'voz'.
- source_word: ἐὰν ἦν αὐτῷ ἀρεστόν
  english_pob_choice: if it is pleasing to him
  chosen_spanish: si le es agradable
  alternatives_spanish:
  - si le parece bien
  - si le resulta agradable
  lexicon: BDAG
  rationale: La cláusula expresa deferencia a la voluntad divina; 'le es agradable' mantiene el sentido sin sobreexplicar.
theological_decisions:
- issue: σωτηρία como salvación en un contexto narrativo de auxilio
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: Aunque el contexto inmediato es la liberación en una crisis, el griego permite y el contexto bíblico favorece conservar el lenguaje de salvación para no perder la densidad teológica del término.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5; principle of preserving theological weight in contested terms'
- issue: 'Condición final de la oración: la respuesta depende de lo que agrada a Dios'
  english_pob_reading: if it is pleasing to him
  chosen_spanish_reading: si le es agradable
  alternative_spanish_readings:
  - si le parece bien
  - si es de su agrado
  rationale: La formulación refleja la subordinación de la respuesta divina a la voluntad y beneplácito de Dios, sin convertirla en una simple fórmula idiomática.
  doctrine_reference: 'DOCTRINE.md: fidelity to source logic and deference clauses'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que ajustó 'that comes from him' a 'from him' y 'to help us' a 'for our help'. Por eso el español usa 'de parte de él' y 'para nuestra ayuda', manteniendo cercanía formal al griego y al texto POB más reciente.
  spanish_consistency_notes:
  - Se mantuvo 'salvación' para σωτηρία, coherente con el criterio POB de preservar el peso teológico cuando el contexto lo admite.
  - Se evitó 'SEÑOR' porque el pasaje griego no contiene κύριος; la referencia es a Dios de manera implícita en el contexto.
  - '''Invocarlo'' se prefirió sobre ''llamarlo'' por el registro bíblico y la petición dirigida a Dios.'
  - '''Nuestra voz'' se conservó literalmente para respetar la tensión entre ''voz'' y una posible lectura más intensiva como ''clamor''.'
