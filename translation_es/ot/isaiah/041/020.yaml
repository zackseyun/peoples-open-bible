translation:
  language: es
  text: para que vean y sepan[a], y consideren y comprendan juntos, que la mano de Yahvé ha hecho esto, y el Santo de Israel lo ha creado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y lo lleven al corazón y ganen discernimiento juntos». Los verbos hebreos pueden llevar el matiz de una consideración interior y de adquirir perspicacia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor final/purpose del hebreo sin perder la relación de consecuencia-intención.
- source_word: יִרְאוּ
  english_pob_choice: they may see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - perciban
  lexicon: HALOT
  rationale: El verbo básico es ver; en esta cadena cognitiva, 'vean' mantiene la imagen y la fuerza perceptiva sin sobreinterpretar.
- source_word: וְיֵדְעוּ
  english_pob_choice: and know
  chosen_spanish: y conozcan
  alternatives_spanish:
  - y sepan
  - y reconozcan
  lexicon: HALOT
  rationale: ידע expresa conocimiento real y consciente; 'conozcan' conserva el valor epistémico y encaja con la progresión del verso.
- source_word: וְיָשִׂימוּ
  english_pob_choice: and may consider
  chosen_spanish: y consideren
  alternatives_spanish:
  - y lo tomen a corazón
  - y lo pongan en su corazón
  lexicon: HALOT
  rationale: El hebreo no significa simplemente 'poner', sino aplicar la mente/corazón al asunto. 'Consideren' comunica esa atención reflexiva en español actual.
- source_word: וְיַשְׂכִּילוּ
  english_pob_choice: and understand
  chosen_spanish: y comprendan
  alternatives_spanish:
  - y entiendan
  - y ganen discernimiento
  lexicon: HALOT
  rationale: El hifil de שכל puede implicar entender o actuar con discernimiento. 'Comprendan' conserva la meta cognitiva y deja abierta la idea de perspicacia.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: '''Juntos'' es la forma más natural y directa en español para la idea de actuación/aprehensión colectiva.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que se reconoce; 'que' funciona mejor en español como nexo de oración subordinada de contenido.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahvé
  - la mano de Dios
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de agencia/poder divino y el nombre propio Yahvé conforme al criterio terminológico del proyecto.
- source_word: עָשְׂתָה זֹּאת
  english_pob_choice: has done this
  chosen_spanish: ha hecho esto
  alternatives_spanish:
  - ha realizado esto
  - ha obrado esto
  lexicon: HALOT
  rationale: '''Hacer'' reproduce bien la amplitud de עשה sin forzar un matiz específico; ''ha hecho esto'' suena natural y respeta el demostrativo.'
- source_word: וּקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: and the Holy One of Israel
  chosen_spanish: y el Santo de Israel
  alternatives_spanish:
  - y el Santo de Israel
  - y el Santo de Israel mismo
  lexicon: HALOT
  rationale: Es el título estable de Isaías; 'Santo' conserva la carga bíblica-teológica y la fórmula tradicional del propio libro.
- source_word: בְּרָאָהּ
  english_pob_choice: has created it
  chosen_spanish: lo ha creado
  alternatives_spanish:
  - lo ha formado
  - la ha creado
  lexicon: HALOT
  rationale: ברא se traduce normalmente por 'crear'. El pronombre neutro 'lo' es el más natural en español para remitir al hecho/resultado previo sin resolver artificialmente el referente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrama; en el texto español se usa 'Yahvé', siguiendo el estándar del proyecto para preservar el nombre divino en vez de ocultarlo detrás de 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre 'ha hecho esto' y 'lo ha creado'
  english_pob_reading: Both clauses are retained distinctly
  chosen_spanish_reading: 'Se mantienen dos enunciados distintos: ''ha hecho esto'' ... ''lo ha creado''.'
  alternative_spanish_readings:
  - ha hecho/creado esto
  - ha hecho esto y lo ha creado
  rationale: El hebreo emplea dos verbos diferentes, עשה y ברא. La versión española conserva ambas afirmaciones para no aplanar la fuerza retórica ni perder la amplitud de agencia y creación del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy 1 and 5
- issue: Cadena cognitiva de los cuatro verbos
  english_pob_reading: see / know / consider / understand
  chosen_spanish_reading: vean / conozcan / consideren / comprendan
  alternative_spanish_readings:
  - vean / sepan / lo tomen a corazón / ganen discernimiento
  - perciban / conozcan / reflexionen / entiendan
  rationale: El verso acumula verbos cercanos pero no idénticos. La secuencia elegida preserva el progreso cognitivo con un español claro y sin borrar la posible matización de discernimiento.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence'
translation_notes:
  revision_awareness: El texto fuente y el control de revisión coinciden en alta concordancia; no se requieren cambios de fondo. La redacción española sigue de cerca el audit trail inglés, pero adapta la cadena verbal a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se conserva 'Santo de Israel' como título isaiano fijo.
  - '''Lo'' en ''lo ha creado'' funciona como pronombre resumptivo neutro para el resultado/acto referido por el contexto inmediato.'
  - La nota [a] preserva la alternativa semántica documentada para la serie verbal cognitiva.
