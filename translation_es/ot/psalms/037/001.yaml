translation:
  language: es
  text: De David[a]. No te irrites por causa de los malhechores[b]; no envidies a los que obran mal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David». El hebreo לְדָוִד en un encabezado puede indicar autoría, pertenencia o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «No te inquietes por causa de los malhechores». El verbo hebreo puede expresar volverse acalorado, agitado o irritado.
    reason: lexical_alternative
  - marker: c
    text: O «a los que hacen injusticia» / «a los obradores de iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: La preposición לְ en un encabezado salmódico puede señalar autoría, pertenencia o dedicación. «De David» conserva esa ambigüedad en español y es la forma más natural y breve para un superscrito.
- source_word: תִּתְחַר
  english_pob_choice: be provoked
  chosen_spanish: te irrites
  alternatives_spanish:
  - te exasperes
  - te enfurezcas
  - te inquietes
  lexicon: HALOT
  rationale: El hitpael de חרה comunica una reacción interna de calentarse, agitarse o irritarse. «Te irrites» transmite esa agitación sin forzar un enojo más intenso de lo que el hebreo exige; también mantiene un registro contemporáneo y claro.
- source_word: בַּמְּרֵעִים
  english_pob_choice: by evildoers
  chosen_spanish: por causa de los malhechores
  alternatives_spanish:
  - a causa de los malhechores
  - por los malhechores
  - a los malhechores
  lexicon: HALOT
  rationale: La preposición ב aquí indica ocasión o motivo de la agitación. «Por causa de» expresa mejor en español esa relación causal que un simple «por», y «malhechores» es una equivalencia directa y comprensible para el participio de רעע.
- source_word: תְּקַנֵּא
  english_pob_choice: envy
  chosen_spanish: envidies
  alternatives_spanish:
  - tengas envidia de
  - celes
  - envides
  lexicon: HALOT
  rationale: קנא puede ser celar o envidiar según el contexto. Aquí el paralelismo con la conducta aparente de los impíos favorece «envidies», que reproduce con naturalidad el valor de comparación y deseo indebido.
- source_word: בְּעֹשֵׂי עַוְלָה
  english_pob_choice: those who do wrong
  chosen_spanish: a los que hacen lo malo
  alternatives_spanish:
  - a los que hacen injusticia
  - a los que obran mal
  - a los que practican la injusticia
  lexicon: HALOT
  rationale: La construcción participial se conserva con «los que hacen», y עַוְלָה admite «lo malo», «injusticia» o «perversidad». «Lo malo» es claro y sobrio en español; evita cargar el verso con un tecnicismo donde el hebreo permite una amplitud semántica entre maldad e injusticia.
translation_notes:
  revision_awareness: El texto coincide con el sentido de alta concordancia del expediente inglés y no requiere ajustes de fondo. Se mantuvo la ambigüedad del superscrito y se eligió una equivalencia moderna para el verbo de agitación, sin suavizar la advertencia ni introducir matices no respaldados por el hebreo.
  spanish_consistency_notes:
  - 'Se evitó «SEÑOR» o formulaciones ajenas: el verso no contiene el Tetragrámaton.'
  - «Malhechores» y «los que hacen lo malo» mantienen el paralelismo hebreo sin introducir términos más interpretativos.
  - La puntuación separa el superscrito del mandato principal conforme al estilo bíblico en español.
