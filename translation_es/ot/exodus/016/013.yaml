translation:
  language: es
  text: Y por la tarde subió la codorniz y cubrió el campamento, y por la mañana había[a] una capa de rocío alrededor del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una capa de rocío estaba alrededor del campamento». La construcción hebrea puede entenderse con sentido existencial («había») o con el verbo concordando con el sujeto que sigue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִ֣י בָ/עֶ֔רֶב
  english_pob_choice: And in the evening
  chosen_spanish: Y por la tarde
  alternatives_spanish:
  - Y en la tarde
  - Y al anochecer
  - Y ocurrió en la tarde
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce la siguiente acción en secuencia. En español, 'por la tarde' comunica con naturalidad el mismo marco temporal sin volver la frase mecánica.
- source_word: וַתַּ֣עַל הַ/שְּׂלָ֔ו
  english_pob_choice: the quail came up
  chosen_spanish: subieron las codornices
  alternatives_spanish:
  - subió la codorniz
  - vinieron las codornices
  - aparecieron las codornices
  lexicon: HALOT
  rationale: עלה conserva la imagen de movimiento ascendente. En español, 'subieron las codornices' mantiene esa imagen y el sujeto colectivo, evitando una paráfrasis demasiado libre como 'aparecieron'.
- source_word: וַתְּכַ֖ס אֶת הַֽ/מַּחֲנֶ֑ה
  english_pob_choice: covered the camp
  chosen_spanish: cubrieron el campamento
  alternatives_spanish:
  - cubrieron el campamento por completo
  - cubrieron el campamento entero
  - cubrieron la campamento
  lexicon: HALOT
  rationale: כסה significa 'cubrir'. 'Campamento' es el equivalente natural de מַחֲנֶה en este contexto histórico-narrativo, y el plural verbal concuerda con el sujeto colectivo 'las codornices'.
- source_word: וּ/בַ/בֹּ֗קֶר
  english_pob_choice: and in the morning
  chosen_spanish: y por la mañana
  alternatives_spanish:
  - y en la mañana
  - y al amanecer
  - y a la mañana siguiente
  lexicon: HALOT
  rationale: La expresión marca el siguiente momento de la narración. 'Por la mañana' es clara y fiel al hebreo, y conserva la secuencia temporal.
- source_word: הָֽיְתָה֙ שִׁכְבַ֣ת הַ/טַּ֔ל
  english_pob_choice: a layer of dew was
  chosen_spanish: había una capa de rocío
  alternatives_spanish:
  - era una capa de rocío
  - estaba una capa de rocío
  - se veía una capa de rocío
  lexicon: HALOT
  rationale: שִׁכְבָה denota una capa o depósito extendido. En español, 'había una capa de rocío' reproduce bien el valor existencial que la POB inglesa dejó abierto con su nota, sin sonar forzado.
- source_word: סָבִ֖יב לַֽ/מַּחֲנֶֽה
  english_pob_choice: around the camp
  chosen_spanish: alrededor del campamento
  alternatives_spanish:
  - todo alrededor del campamento
  - rodeando el campamento
  - en torno al campamento
  lexicon: HALOT
  rationale: סביב con ל indica localización circundante. 'Alrededor del campamento' es la forma más directa y transparente en español.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del texto fuente inglés, que permanece sin cambios tras la revisión automática; no hay revisiones aplicadas ni discrepancias con la concordancia alta reportada.
  spanish_consistency_notes:
  - Se mantuvo 'campamento' para מַחֲנֶה, como en el audit trail inglés.
  - Se preservó la imagen verbal de 'subir' para עלה, evitando 'aparecer' salvo que el contexto lo exigiera.
  - Se optó por una formulación española idiomática para la secuencia temporal ('por la tarde' / 'por la mañana') sin perder el paralelismo del hebreo.
  - El sustantivo 'rocío' conserva el referente físico concreto de טַל.
