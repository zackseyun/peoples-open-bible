    reason: alternative_reading
  - marker: b
    text: Literalmente, «tres fuegos»; probablemente significa que hizo descender fuego en tres ocasiones.
    reason: lexical_alternative
  revision_rationale: La revisión corrige el verbo principal para reflejar mejor el valor causativo del hebreo en el contexto de Elías («hizo descender fuego») y ajusta la nota léxica para que preserve el literal documentado por el POB («tres fuegos»). También se mueve el anclaje de la nota b a la frase pertinente.
