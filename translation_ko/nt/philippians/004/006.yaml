id: PHP.4.6
reference: Philippians 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδὲν μεριμνᾶτε, ἀλλ’ ἐν παντὶ τῇ προσευχῇ καὶ τῇ δεήσει μετ’ εὐχαριστίας τὰ αἰτήματα ὑμῶν γνωριζέσθω πρὸς τὸν θεόν·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/006.yaml
  text: Do not be anxious about anything, but in everything, by prayer and petition with thanksgiving, let your requests be made known to God.
translation:
  language: ko
  text: 아무것도 염려하지 마십시오. 오직 모든 일에 감사함으로[a] 기도와 간구로[b] 여러분의 구할 것을 하나님께 아뢰십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「감사함으로」는 헬라어 μετʼ εὐχαριστίας(「감사와 함께」)의 직역. 기도·간구에 늘 감사가 동반되어야 함을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 δέησις는 προσευχή보다 구체적인 청원·간곡한 호소를 가리키므로 「간구」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲν μεριμνᾶτε
  english_pob_choice: Do not be anxious about anything
  chosen_korean: 아무것도 염려하지 마십시오
  alternatives_korean:
  - 무엇이든 염려하지 마십시오
  - 아무 일도 근심하지 마십시오
  lexicon: BDAG
  rationale: 한국 교회에서 가장 익숙한 표현이며, 「염려」가 μεριμνάω의 불안한 마음 씀의 무게를 합쇼체로 적절히 담는다. 합쇼체 부정명령 「-지 마십시오」를 사용한다.
- source_word: ἐν παντὶ
  english_pob_choice: in everything
  chosen_korean: 모든 일에
  alternatives_korean:
  - 모든 상황에서
  - 모든 것에서
  lexicon: BDAG
  rationale: 포괄적 범위를 자연스럽게 「모든 일에」로 옮긴다.
- source_word: τῇ προσευχῇ
  english_pob_choice: prayer
  chosen_korean: 기도
  lexicon: BDAG
  rationale: 표준 등가어. 하나님께 드리는 일반적 기도.
- source_word: τῇ δεήσει
  english_pob_choice: petition
  chosen_korean: 간구
  alternatives_korean:
  - 청원
  - 탄원
  lexicon: BDAG
  rationale: δέησις의 구체적·간곡한 호소 성격을 한국 교회 정착어 「간구」로 살린다. 「기도와 간구」는 한국 교회의 정형 짝구이다.
- source_word: μετ’ εὐχαριστίας
  english_pob_choice: with thanksgiving
  chosen_korean: 감사함으로
  alternatives_korean:
  - 감사와 함께
  - 감사로
  lexicon: BDAG
  rationale: 「감사함으로」는 한국 교회의 자연스러운 정형어이며, 기도·간구의 정황 부사로 매끄럽게 기능한다. εὐχαριστία의 신학적 무게도 보존된다.
- source_word: τὰ αἰτήματα ὑμῶν
  english_pob_choice: your requests
  chosen_korean: 여러분의 구할 것
  alternatives_korean:
  - 여러분의 청원
  - 여러분이 구하는 것
  lexicon: BDAG
  rationale: αἰτήματα는 「구하는 구체적 사항」. 「구할 것」이 한국어로 자연스럽고 간구(δέησις)와 어휘적 중복을 피한다.
- source_word: γνωριζέσθω
  english_pob_choice: let ... be made known
  chosen_korean: 아뢰십시오
  alternatives_korean:
  - 알려지게 하십시오
  - 알리십시오
  lexicon: BDAG
  rationale: 헬라어는 「알려지게 하라」(수동 명령)이나, 하나님께 드리는 행위에 대한 한국어 자연어는 「아뢰다」이며 합쇼체 「아뢰십시오」가 경어와 명령을 함께 담는다. 직역 「알려지게 하십시오」는 각주에 두지 않더라도 어휘 결정에 명시한다.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_korean: 하나님께
  alternatives_korean:
  - 하나님 앞에
  lexicon: BDAG
  rationale: 「께」는 헬라어 πρός를 자연스럽게 옮기며 경어도 함께 살린다.
