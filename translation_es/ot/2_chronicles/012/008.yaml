base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/012/008.yaml
  text: For they will become his slaves[a], so that they may know my service and the service of the kingdoms of the lands.
  footnotes:
  - marker: a
    text: Or 'my worship ... and the service of the kingdoms of the lands.' The Hebrew word for 'service' can include worshipful service as well as servitude or labor.
