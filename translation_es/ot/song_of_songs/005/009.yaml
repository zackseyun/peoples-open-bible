revisions:
- from: ¿Qué tiene tu amado[a] que ver con otro amado[b], oh la más bella entre las mujeres? ¿Qué tiene tu amado que ver con otro amado, para que nos hayas hecho jurar así?
  to: ¿Qué tiene tu amado[a] más que otro amado, la más bella entre las mujeres? ¿Qué tiene tu amado más que otro amado, para que nos hayas hecho jurar así?[b]
  rationale: Se reemplazó «¿Qué tiene... que ver con...?» por «¿Qué tiene... más que...?» para conservar la comparación explícita de מִן. Se eliminó «oh» por naturalidad en español. Se corrigió la nota b para que explique el verbo הִשְׁבַּעְתָּנוּ, en conformidad con el expediente inglés y el hebreo fuente.
