    reason: lexical_alternative
  - marker: b
    text: O «yendo al final de la marcha» para «sirviendo de retaguardia».
    reason: lexical_alternative
  - marker: c
    text: El término hebreo también puede verterse «huestes» o «compañías»; aquí se refiere a las divisiones tribales organizadas en el orden de marcha.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota léxica de «estandarte», se mueve la nota de la retaguardia a la frase correcta, se mejora la naturalidad del español en dos expresiones sintácticas, y se ajusta la transliteración del patronímico a una forma española más fiel al hebreo. El sentido fuente y la lógica de las decisiones del POB se mantienen intactos.
