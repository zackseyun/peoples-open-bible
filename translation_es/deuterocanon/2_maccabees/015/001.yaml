  rationale: 'Se revisa el texto para mejorar la naturalidad del español sin perder la fidelidad al griego ni a las decisiones auditadas en inglés. ‘Habiéndose enterado’ expresa mejor μεταλαβών en español natural; ‘día de reposo’ mantiene la literalidad cautelosa de τῇ τῆς καταπαύσεως ἡμέρᾳ; y la nota se corrige para presentar una alternativa idiomática y exacta: ‘el sábado’. No se requiere adjudicación adicional porque el sentido fuente y la solución española son claros.'
