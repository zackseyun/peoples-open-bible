translation:
  language: es
  text: Donde no hay cerca[a], la propiedad será saqueada; y donde no hay esposa[b], él gemirá mientras vaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «valla»; φραγμός denota una barrera protectora o un cierre alrededor de la propiedad.
    reason: lexical_alternative
  - marker: b
    text: El griego literalmente dice «y donde no hay esposa, gemirá vagando»; el sujeto queda implícito en la segunda cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: φραγμός
  english_pob_choice: fence
  chosen_spanish: cerca
  alternatives_spanish:
  - valla
  - cercado
  - enclosure
  lexicon: LSJ
  rationale: φραγμός denota una barrera protectora o un cierre alrededor de la propiedad. «Cerca» es natural en español moderno y conserva la imagen de protección sin volverla demasiado técnica o monumental.
- source_word: διαρπαγήσεται
  english_pob_choice: will be plundered
  chosen_spanish: será saqueada
  alternatives_spanish:
  - será robada
  - será despojada
  - será pillada
  lexicon: LSJ
  rationale: El futuro pasivo expresa que otros se llevarán por la fuerza lo que está desprotegido. «Será saqueada» comunica bien esa toma violenta y encaja con «propiedad» en español.
- source_word: κτῆμα
  english_pob_choice: property
  chosen_spanish: la propiedad
  alternatives_spanish:
  - la posesión
  - la hacienda
  - los bienes
  lexicon: LSJ
  rationale: κτῆμα puede significar posesión o propiedad en sentido amplio. «La propiedad» es claro y general, y mantiene el paralelismo proverbial sin sugerir un bien específico.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: LSJ
  rationale: En este contexto doméstico proverbial, γυνή se entiende mejor como «esposa» y no como «mujer» en general. El dicho trata de la estabilidad del hogar.
- source_word: στενάξει
  english_pob_choice: will groan
  chosen_spanish: gemirá
  alternatives_spanish:
  - lamentará
  - suspirará
  - gemirá de dolor
  lexicon: LSJ
  rationale: El verbo transmite aflicción intensa. «Gemirá» preserva esa fuerza sin sonar demasiado literario para el español actual.
- source_word: πλανώμενος
  english_pob_choice: as he wanders
  chosen_spanish: mientras anda errante
  alternatives_spanish:
  - mientras vaga
  - errante
  - mientras se extravía
  lexicon: LSJ
  rationale: El participio indica una condición continua acompañando el gemido. «Mientras anda errante» expresa bien el estado de desorientación y suena natural en español.
- source_word: οὗ οὐκ ἔστιν ... καὶ οὗ οὐκ ἔστιν
  english_pob_choice: Where there is no ... and where there is no ...
  chosen_spanish: Donde no hay ... y donde no hay ...
  alternatives_spanish:
  - Allí donde no hay ...
  - Si no hay ...
  lexicon: LSJ
  rationale: La construcción relativa repetida funciona proverbialmente. «Donde no hay...» conserva el paralelismo y la cadencia del original sin recargar la sintaxis.
theological_decisions:
- issue: Sujeto implícito en la segunda cláusula
  english_pob_reading: he will groan as he wanders
  chosen_spanish_reading: él gemirá mientras anda errante
  alternative_spanish_readings:
  - gemirá mientras anda errante
  - uno gemirá mientras anda errante
  rationale: El griego no nombra el sujeto de στενάξει, pero el contexto de γυνή («esposa») implica al esposo o cabeza del hogar. En español, «él» mantiene esa referencia implícita sin añadir un sustantivo que el texto no da.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «a man will groan as he wanders» a «he will groan as he wanders» para no añadir un sustantivo ausente en el griego. La versión española sigue esa revisión al usar «él» y no explicitar «un hombre».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se traduce γυνή como «esposa» por el contexto doméstico proverbial, coherente con la decisión inglesa de «wife».
  - Se conserva el paralelismo repetido de «Donde no hay...», en línea con la estructura relativa del griego.
