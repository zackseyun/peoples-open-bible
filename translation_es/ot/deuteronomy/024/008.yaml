review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y del POB inglés: advertencia inicial, referencia a צָרַעַת como condición cutánea amplia, obediencia a la instrucción de los sacerdotes levitas y cierre enfático. Sin embargo, hay un problema importante de persona/número: el hebreo tiene segunda persona plural (אֶתְכֶם, תִּשְׁמְרוּ), pero el español usa singular (''te instruyan'', ''deberás''). También ''guardar diligentemente y hacer'' suena algo forzado en español para לִשְׁמֹר... וְלַעֲשׂוֹת.'
  spanish_quality_summary: El español es claro en líneas generales, pero mezcla registro natural con formulaciones algo calcadas. La mayor debilidad es la inconsistencia pronominal singular frente al plural del original. Además, 'para guardar diligentemente y hacer' resulta poco idiomático; 'para observar cuidadosamente y hacer' o 'para cumplir cuidadosamente' lee mejor. El resto es comprensible y digno.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no usa ''lepra'' en el texto principal y conserva la nota explicativa; mantiene ''sacerdotes levitas'' para הַכֹּהֲנִים הַלְוִיִּם. No hay conflictos con términos teológicos mayores. La revisión propuesta preserva estas decisiones.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular
    rationale: 'El hebreo se dirige al pueblo en plural (''os/ustedes''): אֶתְכֶם y תִּשְׁמְרוּ. El borrador usa ''te instruyan'' y ''deberás'', lo cual altera la referencia gramatical del original.'
  - severity: medium
    issue: '''guardar diligentemente y hacer'' suena poco natural'
    rationale: Aunque intenta reflejar לִשְׁמֹר מְאֹד וְלַעֲשׂוֹת, en español esta secuencia resulta rígida. 'observar cuidadosamente y hacer' conserva mejor la distinción semántica y mejora la fluidez.
  - severity: low
    issue: '''en el caso de'' es correcto pero algo pesado'
    rationale: No es infiel, pero 'cuando haya' o 'respecto a' sería más natural. Aun así, puede mantenerse para seguir de cerca la auditoría inglesa.
  revised_spanish_text: Tengan cuidado en el caso de un brote de enfermedad de la piel[a], para observar cuidadosamente y hacer conforme a todo lo que los sacerdotes levitas les instruyan; como yo les he mandado, así tendrán cuidado de hacerlo.
  revised_footnotes:
  - marker: a
    text: Tradicionalmente, 'lepra'. El término hebreo se refiere de manera más amplia en la Torá a un conjunto de afecciones de la piel, no específicamente a la enfermedad de Hansen moderna.
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda persona al plural para ajustarse al hebreo y se mejora la naturalidad de לִשְׁמֹר מְאֹד וְלַעֲשׂוֹת con 'observar cuidadosamente y hacer', manteniendo la decisión léxica sobre צָרַעַת y la identificación de los sacerdotes levitas.
