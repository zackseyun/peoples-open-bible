  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: el mandato enfático de guardar, la tríada legal («mandamientos», «testimonios», «estatutos»), y el nombre divino «Yahvé». Sin embargo, el verbo inicial «Guardarás cuidadosamente» suena más predictivo/futuro que exhortativo en español; dado el infinitivo absoluto con imperfecto imperatival, conviene una forma más idiomática y directa para mandato enfático. Además, la nota [a] puede ajustarse para reflejar mejor alternativas españolas naturales.'
  spanish_quality_summary: El español es claro y digno, pero «Guardarás cuidadosamente» resulta algo rígido y menos natural que «Debes guardar cuidadosamente» o «Guardarás con diligencia». El resto del versículo es legible y mantiene bien el registro bíblico-jurídico. «Testimonios» es aceptable en este proyecto, aunque marcado; la nota lo aclara adecuadamente.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; מִצְוֺת → «mandamientos»; עֵדֹתָיו → «testimonios» con nota útil; חֻקָּיו → «estatutos». No hay conflicto doctrinal. El ajuste propuesto mejora la fuerza de שָׁמוֹר תִּשְׁמְרוּן en español sin apartarse del audit trail inglés.'
  issues:
  - severity: medium
    issue: «Guardarás cuidadosamente» no expresa de la manera más natural el mandato enfático hebreo en español.
    rationale: Aunque es comprensible, en español suena más como futuro declarativo. El hebreo usa infinitivo absoluto + verbo finito para intensificación exhortativa; «Debes guardar cuidadosamente» comunica mejor obligación enfática y coincide con la nota inglesa «must surely keep».
  - severity: low
    issue: La nota [a] incluye «deberás guardar cuidadosamente», pero el texto principal no adopta la opción española más natural de ese mismo campo semántico.
    rationale: Hay una pequeña desalineación entre la mejor solución idiomática sugerida por la nota y la formulación escogida en el texto principal.
  revised_spanish_text: Debes guardar cuidadosamente los mandamientos de Yahvé tu Dios[a], y sus testimonios y sus estatutos[b], que él te ha mandado.
  revised_footnotes:
