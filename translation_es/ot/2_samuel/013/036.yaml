translation:
  language: es
  text: Apenas terminó de hablar, he aquí que vinieron los hijos del rey, alzaron la voz y lloraron. También el rey y todos sus siervos lloraron con un gran llanto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lloraron con un llanto muy grande», expresión enfática de duelo intenso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלֹּתוֹ לְדַבֵּר
  english_pob_choice: And as soon as he finished speaking
  chosen_spanish: Y sucedió que, cuando terminó de hablar
  alternatives_spanish:
  - Y aconteció que, cuando acabó de hablar
  - Y fue, cuando terminó de hablar
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se vierte en español con una estructura natural que conserva la secuencia inmediata sin volverse mecánica. «Cuando terminó de hablar» mantiene el valor temporal; «sucedió que» reproduce bien el tono narrativo de וַיְהִי.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: Este marcador introduce la llegada inesperada de los hijos del rey. «He aquí» conserva el golpe narrativo y el énfasis de la sorpresa mejor que omitirlo o suavizarlo.
- source_word: בְנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos del monarca
  - los hijos del rey
  lexicon: HALOT
  rationale: En español, «los hijos del rey» es la forma natural y fiel del constructo hebreo. Se evita «príncipes» porque el texto dice literalmente «hijos», no un rango político.
- source_word: וַיִּשְׂאוּ קוֹלָם
  english_pob_choice: they raised their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron su voz
  - alzaron la voz
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de lamento audible. «Alzaron su voz» conserva la imagen verbal del original y suena natural en español; «alzaron la voz» sería posible, pero la forma con posesivo refleja mejor el hebreo קולָם.
- source_word: וַיִּבְכּוּ
  english_pob_choice: and wept
  chosen_spanish: y lloraron
  alternatives_spanish:
  - y se lamentaron
  - y lloraban
  lexicon: HALOT
  rationale: En este contexto funerario o de duelo, «lloraron» comunica de modo directo el llanto de lamento. «Lloraron» es más natural que «se lamentaron», aunque el contexto de duelo queda preservado por la frase siguiente.
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: 'Marca adición inclusiva: no solo lloraron los hijos del rey, sino también el rey y sus servidores. «También» es claro y conciso en español.'
- source_word: וְכָל עֲבָדָיו
  english_pob_choice: and all his servants
  chosen_spanish: y todos sus siervos
  alternatives_spanish:
  - y todos sus servidores
  - y todos sus criados
  lexicon: HALOT
  rationale: Se elige «siervos» para mantener la decisión léxica de la POB cuando עֲבָדָיו tiene fuerza de subordinación/corte. «Servidores» o «criados» son posibles, pero «siervos» preserva mejor el término básico y su amplitud contextual.
- source_word: בָּכוּ בְּכִי גָּדוֹל מְאֹד
  english_pob_choice: wept with very great weeping
  chosen_spanish: lloraron con un llanto muy grande
  alternatives_spanish:
  - lloraron con un llanto muy grande[a]
  - lloraron con llanto grandísimo
  - lloraron con un llanto muy intenso
  lexicon: HALOT
  rationale: Se conserva el acusativo cognado como «un llanto muy grande», reflejando la intensificación hebrea sin reducirla solo a un adverbio. «Muy grande» reproduce la fuerza de גָּדוֹל מְאֹד de forma transparente para el lector español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el análisis y las decisiones del audit trail inglés: mantiene la secuencia narrativa inmediata de וַיְהִי + temporal, conserva el marcador discursivo וְהִנֵּה con una forma idiomática española, y reproduce el énfasis del acusativo cognado final sin diluirlo. No hubo cambios de revisión posteriores relevantes en el expediente inglés, y el pasaje muestra alto acuerdo con la evaluación de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «siervos» por la decisión léxica documentada en el contexto inglés; no se sustituye por «criados» ni «servidores» en el texto principal.
  - La nota al pie se coloca solo sobre la expresión enfática final, donde el español podría perder el paralelismo hebreo si se normalizara demasiado.
