translation:
  language: es
  text: He aquí, voy a traer desastre sobre ti, y barreré tras de ti, y cortaré de Acab a todo varón[a], tanto esclavo como libre en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «el que orina contra la pared», un giro grosero que significa todo varón.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: Mantiene la fórmula profética de anuncio solemne e inmediato. En español, «He aquí» conserva mejor el tono elevado y la deixis de anuncio que una paráfrasis más explicativa.
- source_word: מבי ... רָעָה
  english_pob_choice: I am bringing disaster
  chosen_spanish: voy a traer desastre
  alternatives_spanish:
  - voy a traer mal
  - voy a traer calamidad
  lexicon: HALOT
  rationale: En contexto judicial, רָעָה apunta a calamidad o desastre, no a mal moral. «Desastre» comunica el golpe de juicio sin atribuir a Dios maldad moral.
- source_word: אֵלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - a ti
  lexicon: HALOT
  rationale: «Sobre ti» expresa el impacto hostil del juicio de manera natural en español y conserva la imagen de una carga o caída que recae encima.
- source_word: וּבִעַרְתִּי אַחֲרֶיךָ
  english_pob_choice: I will sweep away after you
  chosen_spanish: barreré tras de ti
  alternatives_spanish:
  - barreré después de ti
  - eliminaré lo que sigue de ti
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no nombra explícitamente el objeto; por eso se evita expandirla a «posteridad» en el texto principal. «Barreré tras de ti» conserva el giro sin sobreinterpretarlo.
- source_word: וְהִכְרַתִּי לְאַחְאָב
  english_pob_choice: I will cut off from Ahab
  chosen_spanish: cortaré de la casa de Acab
  alternatives_spanish:
  - eliminaré de Acab
  - extirparé de Acab
  lexicon: HALOT
  rationale: En español, la construcción requiere hacer explícita la relación dinástica implícita para que el golpe de juicio se entienda con claridad. «Casa de Acab» preserva el referente real y el alcance familiar/dinástico de la frase.
- source_word: מַשְׁתִּין בְּקִיר
  english_pob_choice: every male
  chosen_spanish: a todo varón
  alternatives_spanish:
  - a todo hombre
  - a todo el que orina contra la pared
  lexicon: HALOT
  rationale: El hebreo usa un idiomático grosero para designar a los varones. «A todo varón» comunica el sentido sin crudeza innecesaria en el texto principal, mientras el valor literal queda disponible como nota si se requiere.
- source_word: וְעָצוּר וְעָזוּב
  english_pob_choice: both bond and free
  chosen_spanish: tanto esclavo como libre
  alternatives_spanish:
  - tanto atado como suelto
  - tanto protegido como abandonado
  lexicon: HALOT
  rationale: La pareja funciona como merismo de totalidad. «Esclavo y libre» es una equivalencia tradicional y comprensible en español que mantiene la amplitud total sin perder el contraste social.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: La preposición locativa normal en español comunica correctamente el ámbito del juicio.
theological_decisions:
- issue: Cómo traducir רָעָה en un juicio pronunciado por Yahvé sin sugerir mal moral divino
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - mal
  - calamidad
  rationale: «Desastre» conserva el carácter de juicio severo y evita una lectura en la que Dios sería presentado como autor de maldad moral. Sigue la misma decisión semántica del POB inglés.
  doctrine_reference: Traducción basada en el texto original; distinguir calamidad judicial de mal moral.
- issue: Valor de וּבִעַרְתִּי אַחֲרֶיךָ sin expansión interpretativa
  english_pob_reading: I will sweep away after you
  chosen_spanish_reading: barreré tras de ti
  alternative_spanish_readings:
  - barreré después de ti
  - eliminaré lo que venga después de ti
  rationale: El hebreo no nombra aquí explícitamente «descendencia»; por fidelidad auditable se conserva la imagen idiomática sin añadir una glosa interpretativa al cuerpo del texto.
  doctrine_reference: Primacía del idioma fuente; evitar ampliaciones no explícitas.
- issue: Retención del alcance total de la fórmula final
  english_pob_reading: both bond and free
  chosen_spanish_reading: tanto esclavo como libre
  alternative_spanish_readings:
  - tanto atado como suelto
  - tanto siervo como libre
  rationale: La fórmula expresa totalidad por contraste social. «Esclavo» mantiene la fuerza léxica de la exclusión sin suavizar el término; «siervo» sería una atenuación no motivada por el contexto.
  doctrine_reference: Consistencia lexical POB; preservar fuerza del original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que retiró la expansión interpretativa «posterity» para conservar el giro idiomático «after you»; en español se optó por una equivalencia igualmente idiomática («tras de ti») sin añadir descendencia en el texto principal. También se respetó la preferencia revisada por evitar una paráfrasis explicativa donde el hebreo es deliberadamente abrupto.
  spanish_consistency_notes:
  - Se mantiene «Acab» para la forma hispana del nombre propio, coherente con la tradición bíblica en español y sin cambiar el contenido fuente.
  - Se usa «esclavo» en lugar de «siervo» porque el contraste léxico con «libre» en la fórmula refleja la totalidad social del hebreo.
  - La nota de pie de página está anclada únicamente en «He aquí[a]»; no se añaden marcas innecesarias en otras palabras para evitar sobrecarga textual.
