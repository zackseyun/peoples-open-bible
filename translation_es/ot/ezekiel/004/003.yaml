translation:
  language: es
  text: Y tú, toma una plancha[a] de hierro y colócala como un muro de hierro entre ti y la ciudad; dirige tu rostro hacia ella, y estará bajo asedio, y tú la asediarás. Es una señal para la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sartén de hierro” o “comal de hierro”. El término hebreo designa un utensilio de cocina de metal, aquí usado simbólicamente como barrera.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲבַת בַּרְזֶל
  english_pob_choice: an iron griddle
  chosen_spanish: una sartén de hierro
  alternatives_spanish:
  - una plancha de hierro
  - un comal de hierro
  lexicon: HALOT
  rationale: מַחֲבַת nombra un utensilio de cocina plano; en español, "sartén" es más natural y suficientemente amplio para conservar el objeto culinario. Añadir "de hierro" refleja בַּרְזֶל. Se evita reducirlo solo a una barrera abstracta, porque el signo profético depende del implemento concreto.
- source_word: קִיר בַּרְזֶל
  english_pob_choice: an iron wall
  chosen_spanish: muro de hierro
  alternatives_spanish:
  - pared de hierro
  - barrera de hierro
  lexicon: HALOT
  rationale: קִיר significa literalmente "muro" o "pared". "Muro de hierro" conserva la imagen concreta del hebreo y su fuerza simbólica; "barrera" explicaría la función, pero debilitaría el sustantivo concreto del texto.
- source_word: וַהֲכִינֹתָה אֶת פָּנֶי/ךָ אֵלֶי/הָ
  english_pob_choice: set your face toward it
  chosen_spanish: dirige tu rostro hacia ella
  alternatives_spanish:
  - pon tu rostro hacia ella
  - fija tu rostro hacia ella
  lexicon: HALOT
  rationale: El hebreo usa un modismo de orientación intencional. "Dirige tu rostro hacia ella" transmite la idea de forma idiomática y natural en español, manteniendo la dirección deliberada del gesto profético.
- source_word: וְהָיְתָה בַמָּצוֹר
  english_pob_choice: it will be under siege
  chosen_spanish: estará bajo asedio
  alternatives_spanish:
  - estará en estado de asedio
  - será sitiada
  lexicon: HALOT
  rationale: מָצוֹר refiere al estado de sitio. "Bajo asedio" es la forma más natural en español y conserva la condición de la ciudad sin añadir interpretación.
- source_word: וְצַרְתָּ עָלֶיהָ
  english_pob_choice: you shall besiege it
  chosen_spanish: la asediarás
  alternatives_spanish:
  - pondrás sitio a ella
  - la sitiarás
  lexicon: HALOT
  rationale: El verbo צור aquí significa cercar militarmente. "Asediar" conserva el paralelismo con "bajo asedio" y expresa la acción bélica de manera directa y moderna.
- source_word: אוֹת הִיא
  english_pob_choice: It is a sign
  chosen_spanish: Es una señal
  alternatives_spanish:
  - Es una señal profética
  - Esto es una señal
  lexicon: HALOT
  rationale: אוֹת puede traducirse como "señal" o "signo". Se eligió "señal" porque suena natural en español y comunica con claridad el carácter simbólico de la acción; no se desarrolla más para no interpretar de más el gesto.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para la familia de Israel
  - para la casa de Israel
  lexicon: HALOT
  rationale: '"Casa de Israel" preserva la expresión colectiva/covenantal del hebreo. Se mantiene "casa" porque forma parte del lenguaje profético tradicional y del alcance del signo.'
theological_decisions:
- issue: Preservación del signo profético concreto
  english_pob_reading: Retain the concrete imagery of an 'iron wall' and the formula 'house of Israel' rather than interpretively paraphrasing the symbolism.
  chosen_spanish_reading: Conservar la imagen concreta de un "muro de hierro" y la fórmula "casa de Israel", sin convertir el signo en una mera explicación abstracta.
  alternative_spanish_readings:
  - '"barrera de hierro" y "Israel"'
  - una paráfrasis explicativa del símbolo
  rationale: El pasaje depende de una acción simbólica visible; por eso conviene retener los objetos y el lenguaje concretos. Así el lector percibe la fuerza del signo sin que la traducción resuelva por adelantado su sentido.
  doctrine_reference: Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado de la POB inglesa: se mantiene la imagen concreta del utensilio de cocina de hierro, el muro/barrera simbólico, el modismo de orientar el rostro y el cierre formulístico sobre la casa de Israel. No hay revisiones posteriores registradas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa "señal" de modo consistente con el valor de אוֹת en acciones proféticas.
  - Se evita "SEÑOR" porque no aparece el tetragrámaton en este versículo.
  - Se mantiene "casa de Israel" como expresión colectiva establecida en el discurso profético.
  - '"Muro" y "asedio" conservan el campo militar concreto sin suavizarlo.'
