    text: O “a los espartanos”. “Lacedemonios” es el etnónimo más literal del griego.
    reason: lexical_alternative
  - marker: b
    text: El “parentesco” probablemente alude a la relación tradicional reclamada entre los judíos y los espartanos mencionada en otros pasajes (compárese 1 Macabeos 12:6-23).
    reason: cross_reference
  revision_rationale: Se reemplaza ‘expatriado’ por ‘desterrado’ para lograr un español más natural y claro sin perder la idea de expulsión de la patria; se cambia ‘parentela’ por ‘parentesco’ por mayor precisión léxica para συγγένεια y mejor adecuación al rationale del audit trail. Se mantiene ‘lacedemonios’, ‘pereció’ y ‘tierra extraña’ por buena fidelidad al griego y al POB inglés.
