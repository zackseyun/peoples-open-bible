lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - aconteció
  lexicon: HALOT
  rationale: En la fórmula profética וַיְהִי דְבַר־יְהוָה אֵלַי, el inglés POB usa 'came' para expresar una irrupción reveladora. En español, 'vino' comunica ese mismo valor idiomático de llegada de la palabra sin volver la frase rígida o arcaica.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: Aquí דְבַר se refiere a la comunicación revelada de Dios. 'La palabra' preserva la fórmula profética establecida y mantiene el vínculo con la voz reveladora, como en el contexto auditado del POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo contiene el Nombre divino directo, no un título. El estilo español del proyecto exige 'Yahvé' como forma principal, conservando el nombre personal del pacto y evitando la sustitución por 'el SEÑOR'.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La partícula y el sufijo pronominal indican dirección hacia el profeta. 'A mí' es la forma natural y exacta en español para este dativo personal.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - para decir,
  - 'y dijo:'
  lexicon: HALOT
  rationale: '''לֵאמֹר'' introduce la fórmula de habla que sigue. ''Diciendo,'' conserva la función discursiva y la puntuación fluida del original, igual que en el audit trail inglés.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה in a prophetic formula
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La decisión teológica y editorial del POB es preservar el Nombre divino en vez de enmascararlo con un título. En español, 'Yahvé' cumple esa misma función confesional y auditably source-grounded.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Prophetic speech formula 'the word ... came to me'
  english_pob_reading: And the word of Yahweh came to me, saying,
  chosen_spanish_reading: Y vino la palabra de Yahvé a mí, diciendo,
  alternative_spanish_readings:
  - Y la palabra de Yahvé vino a mí, diciendo,
  - Y vino a mí la palabra de Yahvé, diciendo,
  rationale: El hebreo presenta una fórmula revelatoria fija. La redacción elegida conserva la secuencia y el carácter de irrupción de la palabra, sin añadir contenido interpretativo.
  doctrine_reference: Uso profético estándar en fórmulas de revelación (cf. Ez 1:3; 6:1)
translation_notes:
  revision_awareness: 'El pasaje presenta una fórmula profética breve y altamente estable. Se siguió el audit trail inglés en las decisiones principales: came → vino; the word → la palabra; Yahweh → Yahvé; to me → a mí; saying → diciendo. No hubo revisiones aplicadas en el expediente inglés, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del Nombre divino, conforme a la política terminológica del proyecto.
  - Se usa 'la palabra' y no 'mensaje' para sostener la fórmula profética reconocible en español.
  - La puntuación con coma final refleja que el participio 'diciendo' introduce la continuación del discurso en la secuencia siguiente.
