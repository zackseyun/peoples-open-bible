    text: 'O: «Mi ojo no te tendrá compasión». El hebreo usa un modismo con «ojo» para expresar perdonar o mirar con compasión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus abominaciones estarán en medio de ti».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula de juicio a ‘haré recaer ... sobre ti’ para reflejar mejor el sentido retributivo de עָלַיִךְ אֶתֵּן y mejorar la naturalidad en español. Se corrige ‘sabrás’ a ‘sabrán’ para respetar el plural de וִידַעְתֶּם en el original. Se conservan ‘Yahvé’, ‘caminos’ y ‘abominaciones’, y se mantienen las notas léxicas pertinentes.
