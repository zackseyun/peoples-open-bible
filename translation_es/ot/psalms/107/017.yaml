  yaml_path: translation/ot/psalms/107/017.yaml
  text: Fools[a], because of the way of their transgression and because of their iniquities[c][b], were afflicted.
  footnotes:
  - marker: a
    text: 'Or ''Fools, from the way of their transgression and from their iniquities, became afflicted.'' The Hebrew prepositions can be rendered more formally as ''from,'' though here they likely express cause: ''because of.'''
    reason: lexical_alternative
  - marker: b
    text: '''Transgression'' may also be rendered ''rebellion,'' and ''iniquities'' may also be rendered ''sins'' or ''guilt,'' preserving slightly different nuances in the Hebrew terms.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of the way of their transgression and because of their iniquities'.
    reason: previous_rendering
