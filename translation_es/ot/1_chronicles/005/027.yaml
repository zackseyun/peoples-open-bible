translation:
  language: es
  text: 'Los hijos de Leví: Gersón[a], Coat y Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Leví». En genealogías, «hijos de» puede funcionar de manera más amplia para el linaje, aunque aquí se refiere con mayor naturalidad a los tres hijos inmediatos de Leví.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En genealogías, el hebreo constructo de בְּנֵי puede abarcar filiación amplia; en español, «hijos de» conserva la relación genealógica de forma natural y breve. Se evita «descendientes de» porque aquí la lista nombra las tres líneas inmediatas de Leví.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Nombre propio bíblico; la acentuación «Leví» sigue la forma usual en español y mantiene la pronunciación de la vocal final.
- source_word: גֵּרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersón
  - Gershom
  lexicon: HALOT
  rationale: Se conserva el nombre propio con adaptación española de acentuación. Se evita «Gershom» porque corresponde a otra forma/nombre y no a la forma hebrea de este versículo.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Cohat
  lexicon: HALOT
  rationale: Nombre propio tradicional en español bíblico. «Coat» reproduce la convención castellana más extendida y es claro para lectura eclesial; «Kohat/Cohat» serían transliteraciones más cercanas pero menos establecidas.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la forma usual en español. La acentuación no es necesaria en la grafía castellana estándar para esta transliteración.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Conjunción simple de coordinación. «Y» es la forma normal; «e» no es necesaria porque el siguiente nombre comienza con consonante.
theological_decisions:
- issue: Valor genealógico de «hijos de»
  english_pob_reading: In genealogies, 'sons of' can sometimes function more broadly for lineage, though here it most naturally refers to Levi's three immediate sons.
  chosen_spanish_reading: «Hijos de Leví» conserva la lectura genealógica inmediata sin cerrar el posible valor de linaje amplio.
  alternative_spanish_readings:
  - «Descendientes de Leví»
  rationale: El hebreo permite una extensión genealógica, pero el contexto inmediato enumera tres nombres como subdivisiones de la casa levítica. «Hijos de» mantiene la tensión entre descendencia amplia y filiación inmediata sin explicitar más de lo que el texto dice.
  doctrine_reference: Genealogía levítica en 1 Crónicas; cf. Éxodo 6:16-19
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota textual [a] directamente en «Gersón[a]». No se añadieron notas sin marca en el texto. La versión sigue el packet hebreo y la auditoría inglesa, sin depender mecánicamente de la redacción inglesa.
  spanish_consistency_notes:
  - 'Se mantuvo el orden nominal del hebreo: Leví, Gersón, Coat y Merari.'
  - Se usó una puntuación de lista genealógica simple y publicable en español.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no presente en el versículo.
  - La forma «Leví» y «Gersón» favorece legibilidad en español sin alterar los nombres propios.
