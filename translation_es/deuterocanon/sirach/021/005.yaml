translation:
  language: es
  text: La oración del pobre llega de su boca a sus oídos[a], y su juicio[b] llega con rapidez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «de [la] boca a sus oídos». El pronombre se entiende más naturalmente como referido a Dios; así, la oración del pobre llega a los oídos de Dios.'
    reason: lexical_alternative
  - marker: b
    text: También puede significar «caso» o «justicia». El griego κρίμα puede referirse a la decisión judicial dictada a favor del pobre.
    reason: alternative_reading
lexical_decisions:
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: súplica
  alternatives_spanish:
  - oración
  - petición
  lexicon: BDAG
  rationale: δέησις expresa una petición insistente y urgente. En español, «súplica» conserva mejor ese matiz de ruego apremiante que «oración», que puede sonar más general, y evita reducirlo a una simple petición administrativa.
- source_word: πτωχοῦ
  english_pob_choice: poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el hombre pobre
  - la persona pobre
  - el necesitado
  lexicon: BDAG
  rationale: El genitivo masculino singular se refiere a un individuo pobre. En español, «el pobre» mantiene la referencia personal y la fuerza social del término sin forzar una perífrasis innecesaria.
- source_word: ἐκ στόματος ἕως ὠτίων αὐτοῦ
  english_pob_choice: from his mouth to his ears
  chosen_spanish: desde su boca hasta sus oídos
  alternatives_spanish:
  - de su boca a sus oídos
  - desde su boca hasta los oídos de Dios
  lexicon: LSJ
  rationale: La imagen griega es literalmente espacial. «Desde su boca hasta sus oídos» preserva la metáfora y la ambigüedad del pronombre, dejando que el lector perciba el alcance del decir y el oír sin sobreexplicar el referente implícito.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - caso
  - justicia
  lexicon: BDAG
  rationale: κρίμα puede significar decisión judicial, juicio o sentencia. «Juicio» conserva en español esa amplitud semántica y permite la lectura de una decisión pronunciada en favor del pobre, sin cerrar el sentido a una sola acepción.
- source_word: κατὰ σπουδήν
  english_pob_choice: quickly
  chosen_spanish: con rapidez
  alternatives_spanish:
  - rápidamente
  - con premura
  - sin demora
  lexicon: LSJ
  rationale: La expresión indica prontitud e inmediatez. «Con rapidez» es natural en español contemporáneo y mantiene el valor adverbial sin añadir una intensidad no documentada.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - se presenta
  - sobreviene
  lexicon: BDAG
  rationale: El verbo expresa llegada o arribo. En español, «llega» funciona con naturalidad con «juicio» y conserva la idea de un evento que se aproxima y se hace presente.
theological_decisions:
- issue: Referente implícito de αὐτοῦ en «sus oídos»
  english_pob_reading: The pronoun most naturally refers to God; the poor man's prayer reaches God's ears.
  chosen_spanish_reading: Se conserva el pronombre literal «sus», dejando implícito que el oyente es Dios, como sugiere el contexto sapiencial.
  alternative_spanish_readings:
  - «los oídos de Dios»
  - «sus oídos, es decir, los de Dios»
  rationale: El griego dice literalmente «hasta sus oídos», y la ambigüedad forma parte del texto. Como el contexto apunta a la escucha divina y la segunda cláusula habla de un juicio que llega prontamente, la traducción mantiene la imagen y documenta el referente implícito sin resolverlo en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas reales en vez de eliminarlas por aclaración excesiva.'
translation_notes:
  revision_awareness: La versión griega de Swete 1909 concuerda con el texto recibido y no muestra cambios relevantes frente al pasaje base. La revisión más reciente del audit trail indica que no se requirieron ajustes.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo exige, pero aquí el versículo no contiene el tetragrámaton ni κύριος como cita directa.
  - Se evitó «SEÑOR» porque el pasaje no nombra explícitamente al destinatario; la ambigüedad del pronombre se conserva y se documenta en nota.
  - Se optó por un español bíblico claro y moderno, sin introducir una paráfrasis interpretativa más allá de lo que permite el griego.
