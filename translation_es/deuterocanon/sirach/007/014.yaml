  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del paralelo griego: una advertencia contra hablar de manera excesiva en un ámbito formal y contra la repetición redundante en la oración. ''Asamblea de los gobernantes'' y ''no te repitas en tu oración'' preservan adecuadamente las decisiones del POB inglés. Sin embargo, la forma verbal principal del texto está defectuosa: ''No charles'' usa un verbo demasiado ligero para el registro sapiencial y además el expediente léxico contiene errores tipográficos (''charlees'').'
  spanish_quality_summary: La redacción es generalmente natural, clara y fiel, pero 'charles' suena coloquial y algo débil para un contexto de sabiduría. 'No parlotees' comunica mejor el matiz de habla vana o excesiva y mantiene un registro más digno. Las notas son útiles, aunque conviene pulir la nota [a] para no abrir demasiado hacia 'ancianos' como si fuera la lectura principal.
  glossary_alignment: No hay términos de glosario mayor en conflicto. 'Gobernantes' para שָׂרִים y 'oración' para תְּפִלָּה/προσευχή son adecuados. La decisión de usar 'no te repitas' sigue correctamente la revisión inglesa documentada. El único ajuste léxico necesario es fortalecer 'charles' a 'parlotees'.
  issues:
  - severity: medium
    issue: El verbo principal 'charles' es demasiado coloquial y liviano para el tono sapiencial.
    rationale: Aunque puede reflejar habla ligera, no transmite tan bien como 'parlotees' o 'hables en exceso' la idea de habla vana/excesiva apoyada por תְּסַוֵּר y μὴ ἀδολέσχει.
  - severity: low
    issue: Hay errores tipográficos en las decisiones léxicas ('charlees').
    rationale: No afectan el texto bíblico principal, pero muestran inestabilidad en la elección léxica y apoyan una pequeña revisión editorial.
  - severity: low
    issue: La nota [a] puede sugerir demasiado fuertemente 'ancianos' como alternativa principal.
    rationale: El hebreo base apoya 'gobernantes/rulers'; 'ancianos' proviene del paralelo griego y conviene mantenerlo claramente como alternativa contextual, no como desplazamiento del texto principal.
  revised_spanish_text: No parlotees en la asamblea de los gobernantes[a], y no te repitas en tu oración[b].
  revised_footnotes:
