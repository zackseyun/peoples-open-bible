translation:
  language: es
  text: 'Entonces tomé consejo dentro de mí, y presenté cargos[a] contra los nobles y los funcionarios, y les dije: «Ustedes están cobrando interés[b], cada uno de su hermano». Y reuní una gran asamblea[c] contra ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me enfrenté a los nobles y a los funcionarios». El verbo hebreo puede llevar tanto el matiz de disputa legal como el de contienda general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada uno de su compañero». Literalmente: «un hombre contra su hermano»; conserva el lenguaje de parentesco entre israelitas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «convoqué una gran asamblea contra ellos». El hebreo dice literalmente «puse/dí sobre ellos una gran asamblea», un giro idiomático de oposición pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּלֵךְ לִבִּי עָלַי
  english_pob_choice: I took counsel with myself
  chosen_spanish: tomé consejo dentro de mí
  alternatives_spanish:
  - deliberé conmigo mismo
  - consulté mi corazón dentro de mí
  - me puse a pensar
  lexicon: HALOT
  rationale: El hebreo expresa deliberación interna; «tomé consejo dentro de mí» conserva el sentido reflexivo sin reducirlo a emoción. «Consulté mi corazón» es posible, pero suena más literal y menos natural en español.
- source_word: וָאָרִיבָה
  english_pob_choice: I brought charges against
  chosen_spanish: presenté cargos contra
  alternatives_spanish:
  - contendí con
  - reprendí a
  - me enfrenté a
  lexicon: HALOT
  rationale: ריב puede ser contienda o litigio. En este contexto de denuncia pública a dirigentes, «presenté cargos contra» comunica bien la fuerza acusatoria y casi judicial del verbo.
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los aristócratas
  - los notables
  lexicon: HALOT
  rationale: Es el equivalente español idiomático para la élite social de Judá; «nobles» mantiene claridad y dignidad sin sobreespecificar.
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los funcionarios
  alternatives_spanish:
  - los gobernantes
  - los prefectos
  - los delegados
  lexicon: HALOT
  rationale: El término designa administradores o cargos subordinados. «Funcionarios» es claro en español y evita precisar un título burocrático que el texto no exige.
- source_word: מַשָּׁא
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  - carga
  - préstamo oneroso
  lexicon: HALOT
  rationale: En este contexto económico, el sustantivo puede referirse al peso impuesto al prestar. «Interés» sigue la lectura del POB en inglés y es comprensible en español; «usura» es posible, pero sugiere en español moderno un interés ilícito o excesivo de manera más estrecha.
- source_word: אִישׁ בְּאָחִיו
  english_pob_choice: each from his brother
  chosen_spanish: cada uno de su hermano
  alternatives_spanish:
  - cada uno de su prójimo
  - cada hombre de su hermano
  - cada uno de su compatriota
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco/covenio entre israelitas. «De su hermano» mantiene la literalidad y la carga fraternal del hebreo; «cada uno» expresa el valor distributivo del sustantivo איש.
- source_word: נשאים
  english_pob_choice: are exacting
  chosen_spanish: están cobrando
  alternatives_spanish:
  - están exigiendo
  - están imponiendo
  - están prestando con interés
  lexicon: HALOT
  rationale: El participio en este contexto transmite la acción de imponer un cobro o carga. «Están cobrando» funciona bien con «interés» en español y conserva el tono acusatorio sin forzar un tecnicismo.
- source_word: וָאֶתֵּן עֲלֵיהֶם קְהִלָּה גְדוֹלָה
  english_pob_choice: I assembled a great assembly against them
  chosen_spanish: reuní una gran asamblea contra ellos
  alternatives_spanish:
  - convocó una gran asamblea contra ellos
  - puse sobre ellos una gran asamblea
  - llamé una gran asamblea contra ellos
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático que literalmente dice «puse/dí sobre ellos una gran asamblea». «Reuní una gran asamblea contra ellos» expresa la convocatoria pública y mantiene el matiz adversativo de עֲלֵיהֶם. «Asamblea» respeta el registro formal del POB.
theological_decisions:
- issue: 'Exactitud del reclamo económico: מַשָּׁא / נשאים'
  english_pob_reading: You are exacting interest, each from his brother.
  chosen_spanish_reading: Ustedes están cobrando interés, cada uno de su hermano.
  alternative_spanish_readings:
  - Ustedes están exigiendo interés, cada uno de su hermano.
  - Ustedes están cobrando usura, cada uno de su hermano.
  rationale: Se mantiene la tensión entre una lectura amplia de la carga económica y el término más estable «interés». «Usura» sería más fuerte, pero en español puede estrechar el sentido y añadir una calificación moral no explícita en la palabra sola.
  doctrine_reference: Éxodo 22:25; Levítico 25:35-37; Deuteronomio 23:19-20
- issue: Sentido de la acción de Nehemías ante los líderes
  english_pob_reading: I brought charges against the nobles and the officials
  chosen_spanish_reading: presenté cargos contra los nobles y los funcionarios
  alternative_spanish_readings:
  - contendí con los nobles y los funcionarios
  - reprendí a los nobles y a los funcionarios
  rationale: Se conserva el tono público y casi jurídico del verbo ריב, sin borrar la posibilidad de confrontación verbal. «Presenté cargos» refleja bien el contexto narrativo y la oposición formal a los abusos.
  doctrine_reference: Nehemías 5:1-13; Proverbios 31:9
- issue: Naturaleza de la asamblea
  english_pob_reading: I assembled a great assembly against them
  chosen_spanish_reading: reuní una gran asamblea contra ellos
  alternative_spanish_readings:
  - convocé una gran asamblea contra ellos
  - llamé una gran asamblea contra ellos
  rationale: Se conserva la fuerza pública y adversativa del giro hebreo sin normalizarlo demasiado. «Asamblea» mantiene el carácter formal de קְהִלָּה y «contra ellos» refleja la postura de oposición explícita.
  doctrine_reference: Deuteronomio 31:30; Nehemías 8:2
- issue: Relación fraterna en «each from his brother»
  english_pob_reading: each from his brother
  chosen_spanish_reading: cada uno de su hermano
  alternative_spanish_readings:
  - cada uno de su prójimo
  - cada uno de su compatriota
  rationale: 'Se preserva el lenguaje de hermandad del hebreo, importante para la denuncia ética: no es solo una transacción, sino una violación entre miembros del mismo pueblo.'
  doctrine_reference: Levítico 25:35-37; Nehemías 5:8
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, incluyendo la revisión reciente que favorece «asamblea» para קְהִלָּה. Se eligieron equivalentes españoles naturales pero auditables, manteniendo el matiz jurídico de ריב, la carga fraterna de אִישׁ בְּאָחִיו y la ambigüedad económica de מַשָּׁא sin exagerarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Nobles» y «funcionarios» siguen el registro social-administrativo del pasaje.
  - 'Se conservó el orden discursivo del hebreo: deliberación interna, acusación pública, discurso directo y asamblea contra ellos.'
