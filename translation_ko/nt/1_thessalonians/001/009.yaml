id: 1TH.1.9
reference: 1 Thessalonians 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: αὐτοὶ γὰρ περὶ ἡμῶν ἀπαγγέλλουσιν ὁποίαν εἴσοδον ἔσχομεν πρὸς ὑμᾶς, καὶ πῶς ἐπεστρέψατε πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων δουλεύειν θεῷ ζῶντι καὶ ἀληθινῷ,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/009.yaml
  text: For they themselves report about us what kind of reception we had among you[a], and how you turned to God from idols to serve the living and true God[c][b],
  footnotes:
  - marker: a
    text: Or 'what kind of entrance we had to you'; the Greek expression refers to the character and effect of Paul's arrival among them.
    reason: lexical_alternative
  - marker: b
    text: Or 'how you were converted to God from idols.'
    reason: alternative_reading
  - marker: c
    text: The phrase 'the living and true God' contrasts God with lifeless idols; compare Jer 10:10.
    reason: cross_reference
translation:
  language: ko
  text: 그들 자신이 우리에 관하여, 우리가 여러분에게 어떻게 받아들여졌는지[a], 또 여러분이 어떻게 우상에서 하나님께로 돌아서서 살아 계시고 참되신 하나님[c]을 섬기게 되었는지[b] 알리고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리가 여러분에게 어떤 입성을 가졌는지」. 헬라어 표현은 바울 일행이 데살로니가에 도착해 받은 응대의 성격과 결과를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「어떻게 우상에서 하나님께로 회심하였는지」.
    reason: alternative_reading
  - marker: c
    text: 「살아 계시고 참되신 하나님」은 생명 없는 우상과 대조를 이루는 표현이다. 예레미야 10:10 참조.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_korean: 그들 자신이
  alternatives_korean:
  - 그들이 스스로
  - 그들 스스로
  lexicon: BDAG
  rationale: 강조 대명사. 바울이 청하지 않아도 다른 이들이 자발적으로 보고함을 강조한다.
- source_word: ἀπαγγέλλουσιν
  english_pob_choice: report
  chosen_korean: 알리고 있기
  alternatives_korean:
  - 전하고 있기
  - 보고하고 있기
  lexicon: BDAG
  rationale: 현재형. 지속적·공적 알림. 「알리다」가 가장 자연스럽고 어조가 무겁지 않다.
- source_word: ὁποίαν εἴσοδον ἔσχομεν πρὸς ὑμᾶς
  english_pob_choice: what kind of reception we had among you
  chosen_korean: 우리가 여러분에게 어떻게 받아들여졌는지
  alternatives_korean:
  - 우리가 여러분에게 어떤 입성을 가졌는지
  - 우리가 여러분 가운데 어떻게 맞이받았는지
  lexicon: BDAG
  rationale: εἴσοδος는 문자적으로 「들어감·입성」이나 문맥에서는 도착의 성격과 그 결과로서의 환대를 가리킨다. 「어떻게 받아들여졌는지」가 한국어로 그 의미를 자연스럽게 담는다.
- source_word: πῶς ἐπεστρέψατε πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων
  english_pob_choice: how you turned to God from idols
  chosen_korean: 어떻게 우상에서 하나님께로 돌아서서
  alternatives_korean:
  - 어떻게 우상으로부터 하나님께로 돌이켰는지
  - 어떻게 우상에서 떠나 하나님께로 향하였는지
  lexicon: BDAG
  rationale: ἐπιστρέφω는 회심의 비유. 「돌아서다」가 본문의 방향 전환 이미지를 보존하면서 후대 신학 용어 「회심」을 본문에 끼워 넣지 않는다.
- source_word: εἰδώλων
  english_pob_choice: idols
  chosen_korean: 우상
  alternatives_korean:
  - 우상들
  - 거짓 신들
  lexicon: BDAG
  rationale: 표준 한국어 등가어. 한국어 「우상」은 가산·불가산 모두 가능하다.
- source_word: δουλεύειν
  english_pob_choice: to serve
  chosen_korean: 섬기게
  alternatives_korean:
  - 종노릇하게
  - 예배 드리게
  lexicon: BDAG
  rationale: δοῦλος 어군에 속하지만 종교적 헌신 문맥에서는 「섬김」이 정착된 의미. 「종노릇」은 매임의 강도가 본문 강도를 넘어선다. 「섬기다」가 가장 자연스럽다.
- source_word: θεῷ ζῶντι καὶ ἀληθινῷ
  english_pob_choice: the living and true God
  chosen_korean: 살아 계시고 참되신 하나님
  alternatives_korean:
  - 살아 있는 참 하나님
  - 살아 계신 참되신 하나님
  lexicon: BDAG
  rationale: 하나님을 가리키는 경어 「계시고」, 「되신」으로 합쇼체 경어 어감을 살린다. 우상과의 대조가 분명히 드러난다.
theological_decisions:
- issue: ἐπιστρέφω를 회심 어휘로 옮길지 비유적 「돌아서다」로 옮길지
  chosen_reading: 우상에서 하나님께로 돌아서서
  alternative_readings:
  - 우상에서 하나님께로 회심하여
  rationale: 본문은 실제 회심을 묘사하나, 동사 자체의 비유적 의미 「돌아서다」를 보존하는 편이 본문 어휘에 더 가깝다. 후대의 체계화된 「회심」 용어는 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; readable modern Korean without flattening theological weight'
- issue: δουλεύειν을 「섬기다」로 옮긴 결정
  chosen_reading: 섬기게
  alternative_readings:
  - 종노릇하게
  - 예배 드리게
  rationale: δοῦλος 어군이나 종교적 충성·헌신의 문맥에서는 「섬김」이 본문 의미를 가장 정확히 담는다. 「종노릇」은 매임의 강도가 우상과 대조되는 헌신의 결을 넘어선다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος group rendered context-dependently'
