translation:
  language: es
  text: Pero tomaron el dinero de los que habían venido a comprarlos. Y, después de perseguirlos por una distancia considerable[a], se retiraron de la región, viéndose constreñidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por un largo tiempo'; la expresión griega puede indicar tanto duración prolongada como distancia prolongada.
    reason: lexical_alternative
  - marker: b
    text: El participio final puede indicar que se retiraron porque se veían apremiados o constreñidos, probablemente por circunstancias como el tiempo o el terreno.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρήματα
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - fondos
  - riquezas
  - bienes
  lexicon: LSJ
  rationale: En este contexto se trata del pago que traían quienes venían a comprar; 'dinero' comunica de forma natural y específica el valor monetario sin ampliar indebidamente a 'bienes' o 'riquezas'.
- source_word: τῶν παραγενομένων ἐπὶ τὸν ἀγορασμὸν αὐτῶν
  english_pob_choice: of those who had come to buy them
  chosen_spanish: de los que habían venido a comprarlos
  alternatives_spanish:
  - de los que habían llegado para su compra
  - de los que habían venido para comprarlos
  lexicon: LSJ
  rationale: παραγενομένων expresa llegada/venida, y ἀγορασμός implica compra. El pronombre αὐτῶν apunta a los que eran objeto de compra; en español, 'comprarlos' conserva esa referencia de manera idiomática y directa.
- source_word: συνδιώξαντες
  english_pob_choice: after pursuing
  chosen_spanish: después de perseguirlos
  alternatives_spanish:
  - habiéndolos perseguido
  - tras perseguirlos
  - después de haberlos perseguido
  lexicon: LSJ
  rationale: 'El participio tiene valor temporal: ''después de perseguirlos'' refleja bien la relación entre la persecución y la retirada posterior, con un español natural.'
- source_word: ἐφʼ ἱκανὸν
  english_pob_choice: for a considerable distance
  chosen_spanish: por una distancia considerable
  alternatives_spanish:
  - por bastante trecho
  - por un buen trecho
  - por bastante tiempo
  lexicon: LSJ
  rationale: La expresión puede marcar extensión espacial o temporal. Dado el contexto de persecución, la referencia espacial es la más natural en español, sin excluir la amplitud de la frase griega.
- source_word: ἀνέλυον
  english_pob_choice: withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - se volvieron
  - se marcharon
  - retrocedieron
  lexicon: LSJ
  rationale: En contexto militar/de marcha, ἀναλύω puede significar salir, retirarse o regresar. 'Se retiraron' es formal, natural y coincide con la revisión inglesa que favoreció 'withdrew'.
- source_word: ἀπὸ τῆς χώρας
  english_pob_choice: from the region
  chosen_spanish: de la región
  alternatives_spanish:
  - del territorio
  - de la comarca
  - de la tierra
  lexicon: LSJ
  rationale: χώρα es un término territorial amplio. 'Región' evita precisar de más y reproduce bien el alcance geográfico del texto.
- source_word: συγκλειόμενοι
  english_pob_choice: being hemmed in
  chosen_spanish: siendo acorralados
  alternatives_spanish:
  - siendo presionados
  - siendo encerrados
  - viéndose cercados
  lexicon: LSJ
  rationale: El participio sugiere estar constreñidos o presionados por las circunstancias. 'Siendo acorralados' conserva la imagen de quedar sin salida y funciona de modo natural en español militar/narrativo.
theological_decisions:
- issue: No hay una carga doctrinal explícita; el texto narra una acción militar y económica.
  english_pob_reading: The English POB keeps the sense factual and avoids over-theologizing the participle 'being hemmed in'.
  chosen_spanish_reading: Se mantiene el tono narrativo sobrio, sin introducir interpretación doctrinal adicional.
  alternative_spanish_readings:
  - con un matiz interpretativo más fuerte sobre la causa de la retirada
  - con una paráfrasis moralizante
  rationale: El pasaje no presenta un punto doctrinal directo. La traducción debe conservar la tensión narrativa y la ambigüedad causal del participio final, sin convertirla en explicación especulativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió 'withdrew' sobre 'turned back' para ἀνέλυον. También conserva la nota auditada sobre ἐφʼ ἱκανόν como posible extensión temporal o espacial, y mantiene la ambigüedad de συγκλειόμενοι sin resolverla en exceso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo subyacente lo requiera; este versículo no lo contiene.
  - Se mantiene 'se retiraron' para ἀνέλυον, alineado con la revisión auditada en inglés.
  - '''Dinero'' se prefiere aquí frente a opciones más amplias porque el contexto es un pago de compra.'
  - No se emplea terminología eclesiástica tradicional innecesaria; el registro es narrativo y sobrio.
