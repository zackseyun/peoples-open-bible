translation:
  language: es
  text: Y hemos traído otra plata[a] en nuestras manos para comprar alimento[b]. No sabemos quién puso nuestra plata en nuestros costales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dinero' para las dos ocurrencias de כֶּסֶף; el hebreo כֶּסֶף puede denotar plata como metal o dinero como moneda.
    reason: lexical_alternative
  - marker: b
    text: O 'para comprar grano'; la expresión verbal puede referirse específicamente a comprar grano, aunque 'alimento' refleja el sustantivo más amplio que aparece aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֶסֶף
  english_pob_choice: other silver
  chosen_spanish: otro[s] plata
  alternatives_spanish:
  - otra plata
  - dinero adicional
  - más plata
  lexicon: HALOT
  rationale: כֶּסֶף puede significar tanto 'plata' como 'dinero'. Mantener 'plata' preserva el término concreto del hebreo y su repetición en el versículo. El adjetivo אַחֵר exige la idea de 'otro/adicional'. En español, 'plata' es comprensible en registros bíblicos latinoamericanos, aunque la concordancia con 'plata' como sustantivo femenino puede hacer preferible 'otra plata'; se conserva la tensión léxica con una nota.
- source_word: הוֹרַ֥דְנוּ
  english_pob_choice: we have brought down
  chosen_spanish: hemos traído
  alternatives_spanish:
  - trajimos
  - hemos bajado
  - hemos traído abajo
  lexicon: HALOT
  rationale: El hiphil de ירד expresa 'hacer bajar, traer abajo'. En el contexto narrativo de Canaán hacia Egipto, 'traído' comunica el movimiento descendente implícito sin forzar una calca poco natural en español. El perfecto compuesto mantiene la relevancia presente del relato.
- source_word: בְ/יָדֵ/נוּ
  english_pob_choice: in our hands
  chosen_spanish: en nuestras manos
  alternatives_spanish:
  - en nuestra mano
  - con nosotros
  - en nuestro poder
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'en nuestra mano', un modismo de posesión o custodia. En español, 'en nuestras manos' conserva la metáfora corporal y refleja la decisión revisada del inglés POB de usar plural idiomático por naturalidad.
- source_word: לִ/שְׁבָּר אֹכֶל
  english_pob_choice: to buy food
  chosen_spanish: para comprar alimento
  alternatives_spanish:
  - para comprar grano
  - para comprar comida
  - para adquirir alimento
  lexicon: HALOT
  rationale: שבר aquí alude a comprar provisiones, especialmente grano, pero אֹכֶל es más amplio que 'grano'. 'Alimento' permite abarcar la amplitud del sustantivo hebreo y evita estrechar indebidamente el sentido.
- source_word: לֹ֣א יָדַ֔עְנוּ
  english_pob_choice: We do not know
  chosen_spanish: No sabemos
  alternatives_spanish:
  - No sabíamos
  - No hemos sabido
  lexicon: HALOT
  rationale: 'En discurso directo, el perfecto hebreo expresa con naturalidad un estado actual: ''no sabemos''. Es la forma más idiomática en español y corresponde al valor pragmático de la línea.'
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién fue el que
  - quién era
  lexicon: HALOT
  rationale: Interrogativo simple para introducir la pregunta indirecta. 'Quién' es la equivalencia natural y fiel.
- source_word: שָׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - metió
  - dejó
  lexicon: HALOT
  rationale: שׂים significa 'poner, colocar, poner en un lugar'. 'Puso' es directo y natural en español; conserva la sencillez del hebreo sin exceso interpretativo.
- source_word: כַּסְפֵּ/נוּ
  english_pob_choice: our silver
  chosen_spanish: nuestra plata
  alternatives_spanish:
  - nuestro dinero
  - nuestra moneda
  lexicon: HALOT
  rationale: Se mantiene la repetición de כֶּסֶף/כַּסְפֵּנוּ con 'plata'. En español bíblico latinoamericano, 'plata' comunica adecuadamente tanto el metal como el dinero y evita introducir una abstracción moderna ajena al texto.
- source_word: בְּ/אַמְתְּחֹתֵֽי/נוּ
  english_pob_choice: in our sacks
  chosen_spanish: en nuestros costales
  alternatives_spanish:
  - en nuestros sacos
  - en nuestras bolsas
  - en nuestros costales de grano
  lexicon: HALOT
  rationale: אַמְתַּחַת designa un saco o bolsa para transportar provisiones. 'Costales' es un término natural en español latinoamericano y encaja bien con el contexto de compra de alimento/grano. 'Sacos' también sería posible, pero 'costales' suena más concreto y vernáculo.
theological_decisions:
- issue: 'Terminología monetaria: כסף como ''plata'' o ''dinero'''
  english_pob_reading: The English POB retains 'silver' but notes 'money' as an alternative, preserving the concrete Hebrew word while acknowledging its monetary function.
  chosen_spanish_reading: '''plata'' en ambas ocurrencias, con nota de que también puede entenderse como ''dinero''.'
  alternative_spanish_readings:
  - dinero
  - moneda
  rationale: 'No hay cambio doctrinal, pero sí una decisión lexical importante: el hebreo usa el mismo término para el metal y para el dinero. Mantener ''plata'' hace visible la repetición y el color concreto del relato, mientras la nota evita ocultar la función monetaria.'
  doctrine_reference: Lexical note; no doctrinal issue.
- issue: 'Modismo posesivo: בְּיָדֵינוּ como posesión/custodia'
  english_pob_reading: The English POB first rendered the phrase literally, then revised to the idiomatic plural 'in our hands' for naturalness while retaining the metaphor.
  chosen_spanish_reading: '''en nuestras manos'''
  alternative_spanish_readings:
  - en nuestra mano
  - con nosotros
  - en nuestro poder
  rationale: El español puede conservar el cuerpo metafórico sin sonar artificial. La traducción comunica tanto la posesión como la custodia implícitas, sin perder la imagen original.
  doctrine_reference: Lexical note; no doctrinal issue.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantuvo ''silver'' y luego revisó el modismo de ''in our hand'' a ''in our hands'' por naturalidad. La versión española sigue esa revisión implícita: conserva la concreción de כסף con ''plata'', adopta el modismo plural ''en nuestras manos'' y mantiene la amplitud de אֹכֶל con ''alimento''.'
  spanish_consistency_notes:
  - Se preserva la repetición de כֶּסֶף con 'plata' en ambas cláusulas para mantener visible la correspondencia léxica.
  - '''Alimento'' se usa como equivalente amplio de אֹכֶל; no se estrecha a ''grano'' en el texto principal.'
  - La estructura breve y reportativa del hebreo se refleja con dos oraciones claras en español.
  - El marcador [a] va en el sustantivo principal para señalar la alternativa monetaria; [b] acompaña la frase de propósito para la posible lectura específica de 'grano'.
