translation:
  language: es
  text: 'Y vino a mí la palabra de Yahvé, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... sucedió
  - Entonces ... vino
  lexicon: HALOT
  rationale: El waw consecutivo introduce aquí una fórmula narrativa/profética de secuencia; en español, «Y ... vino» conserva la sencillez del hebreo sin forzar una perífrasis más explicativa como «sucedió».
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra hablada
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «la palabra» reproduce de manera transparente el sintagma establecido y mantiene el valor formal de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito del tetragrámaton con la forma española «Yahvé», conforme al criterio del proyecto y en vez de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección personal; «a mí» es la forma natural y exacta en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido directo del discurso. «Diciendo:» conserva la función formularia y la apertura hacia la cita que sigue.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base hebrea usa el Tetragrámaton directamente; el POB inglés lo rinde con una transliteración del nombre propio. En español, «Yahvé» cumple la misma función de preservar el nombre personal de Dios sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje es una fórmula profética breve; no hay variantes textuales señaladas en el paquete fuente ni revisiones aplicadas en el registro inglés más reciente. La propuesta mantiene el paralelismo funcional del hebreo con un español claro y publicación-readable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se mantiene «palabra» en la fórmula profética sin sustituirla por «mensaje», para preservar el idiomático דְבַר יְהוָה.
  - La puntuación con coma antes de «diciendo» sigue el valor introductorio de לֵאמֹר en español.
