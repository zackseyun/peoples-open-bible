translation:
  language: es
  text: Porque ofrecisteis incienso[a] y pecasteis contra Yahvé, y no habéis escuchado la voz de Yahvé[b] ni habéis andado en su ley[c], en sus estatutos y en sus testimonios; por eso os ha sobrevenido este desastre[d], como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quemasteis incienso'. El verbo hebreo se refiere a hacer una ofrenda sacrificial de humo o incienso.
    reason: lexical_alternative
  - marker: b
    text: O 'no habéis obedecido a Yahvé'. Literalmente, 'no habéis escuchado la voz de Yahvé'.
    reason: lexical_alternative
  - marker: c
    text: '''Ley'' también puede traducirse ''instrucción'' (heb. torá).'
    reason: lexical_alternative
  - marker: d
    text: O 'esta calamidad os ha sobrevenido'. El hebreo puede significar 'mal' o, en contextos como este, 'desastre/calamidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִטַּרְתֶּם
  english_pob_choice: you burned incense
  chosen_spanish: ofrecisteis incienso
  alternatives_spanish:
  - quemasteis incienso
  - hicisteis ofrendas de incienso
  lexicon: HALOT
  rationale: El verbo קטר en este contexto cultual alude a hacer ofrendas de humo/incenso. 'Ofrecisteis incienso' conserva el acto sacrificial sin sonar mecánico en español.
- source_word: חֲטָאתֶם לַיהוָה
  english_pob_choice: sinned against Yahweh
  chosen_spanish: pecasteis contra Yahvé
  alternatives_spanish:
  - pecasteis contra Yahweh
  - ofendisteis a Yahvé
  lexicon: HALOT
  rationale: La construcción con ל expresa aquí transgresión dirigida contra Yahvé; 'pecasteis contra' transmite bien esa relación. Se usa 'Yahvé' conforme al criterio del proyecto para el nombre divino.
- source_word: שְׁמַעְתֶּם בְּקוֹל יְהוָה
  english_pob_choice: have not listened to the voice of Yahweh
  chosen_spanish: no habéis escuchado la voz de Yahvé
  alternatives_spanish:
  - no habéis obedecido a Yahvé
  - no habéis escuchado la voz de Yahweh
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'escuchar la voz de' en vez de reducirlo a 'obedecer', para mantener la imagen y la progresión del texto. El presente perfecto español refleja bien la situación vigente que desemboca en el juicio.
- source_word: וּבְתוֹרָתוֹ
  english_pob_choice: his law
  chosen_spanish: su ley
  alternatives_spanish:
  - su instrucción
  - su Torá
  lexicon: HALOT
  rationale: En este trío legal/pactual, 'ley' comunica con claridad el alcance normativo de תּוֹרָה en español, sin perder la referencia a instrucción divina.
- source_word: וּבְחֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es el equivalente bíblico más estable para חֻקִּים y conserva la distinción dentro de la serie legal.'
- source_word: וּבְעֵדְוֹתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus preceptos-testimonio
  - sus estipulaciones del pacto
  lexicon: HALOT
  rationale: '''Testimonios'' preserva la diferenciación léxica de עֵדוֹת frente a תּוֹרָה y חֻקִּים, evitando aplanar la tríada legal.'
- source_word: קָרָאת אֶתְכֶם הָרָעָה הַזֹּאת
  english_pob_choice: this disaster has come upon you
  chosen_spanish: les ha sobrevenido este desastre
  alternatives_spanish:
  - les ha venido esta calamidad
  - les ha alcanzado este mal
  lexicon: HALOT
  rationale: רָעָה aquí es calamidad/juicio, no mal moral; 'desastre' comunica el golpe punitivo de forma natural en español. 'Sobrevenido' mantiene la idea de acontecimiento que irrumpe sobre ellos.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta hoy
  alternatives_spanish:
  - como en este día
  - tal como se ve hasta hoy
  lexicon: HALOT
  rationale: La fórmula idiomática señala una realidad observable en el presente; 'como hasta hoy' es idiomática y conserva la referencia al estado actual sin exceso de literalidad.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como 'Yahvé', preservando el nombre personal del pacto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de רָעָה en contexto judicial
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - calamidad
  - mal
  rationale: El contexto es de juicio sobre el pueblo; 'desastre' comunica el evento punitivo sin atribuir mal moral a Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense without importing doctrinal claims'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que ajustó los verbos al presente perfecto para reflejar mejor la secuencia hebrea que conduce al resultado presente. También mantiene la decisión auditada de distinguir la tríada legal 'ley / estatutos / testimonios' y de traducir רָעָה como un infortunio judicial, no como mal moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה.
  - 'Se preserva la tríada legal con tres términos distintos: ''ley'', ''estatutos'' y ''testimonios''.'
  - Se conserva el paralelismo verbal en presente perfecto para la segunda mitad del versículo.
  - La frase 'escuchar la voz de Yahvé' retiene el hebraísmo y deja visible la posible lectura alternativa 'obedecer'.
