translation:
  language: es
  text: Dichoso[a] el marido de una buena esposa, y el número de sus días se duplica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Bienaventurado» o «Afortunado» el marido de una buena esposa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשָּׁה טוֹבָה / γυναικὸς ἀγαθῆς
  english_pob_choice: a good wife
  chosen_spanish: una buena esposa
  alternatives_spanish:
  - una buena mujer
  - una esposa virtuosa
  lexicon: HALOT / LXX parallel
  rationale: En contexto matrimonial, el hebreo y el griego apuntan a la relación conyugal; por eso "esposa" comunica mejor que "mujer". "Buena" conserva la valoración amplia del texto sin añadir la carga interpretativa de "virtuosa".
- source_word: אַשְׁרֵי / μακάριος
  english_pob_choice: Happy is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Feliz
  - Bienaventurado
  - Afortunado
  lexicon: HALOT / BDAG
  rationale: El hebreo expresa una proclamación de bienestar en estilo sapiencial. "Dichoso" mantiene el tono de beatitud y evita que "bienaventurado" suene demasiado eclesiástico o que "feliz" banalice el registro proverbiale.
- source_word: בַעֲלָהּ / ὁ ἀνήρ
  english_pob_choice: the husband of
  chosen_spanish: el marido de
  alternatives_spanish:
  - el esposo de
  - su marido
  lexicon: HALOT / Greek parallel
  rationale: 'La construcción española natural es relacional: "el marido de". "Marido" conserva la referencia conyugal directa y evita la ambigüedad de "hombre" que tendría ἀνήρ fuera de este contexto.'
- source_word: וּמִסְפַּר יָמָיו / ἀριθμὸς τῶν ἡμερῶν αὐτοῦ
  english_pob_choice: and the number of his days
  chosen_spanish: y se duplican los días de su vida
  alternatives_spanish:
  - y el número de sus días es doble
  - y el número de sus días se duplica
  lexicon: HALOT / LXX parallel
  rationale: El hebreo y el griego dicen literalmente que el número de sus días es doble/doblado. En español, "se duplican los días de su vida" conserva la idea sin forzar un giro demasiado pesado con "número". Se mantiene la imagen proverbial de una vida prolongada o colmada.
- source_word: כִּפְלַיִם / διπλάσιος
  english_pob_choice: is doubled
  chosen_spanish: se duplican
  alternatives_spanish:
  - es doble
  - es duplicado
  - es dos veces mayor
  lexicon: HALOT / LXX parallel
  rationale: '"Se duplican" refleja el valor de doble/duplo y suena más natural en español que una calca como "es doblado". Mantiene la afirmación proverbial sin especificar mecánicamente una aritmética que el dicho no desarrolla.'
theological_decisions:
- issue: 'Beatitud sapiencial: si conviene "dichoso", "feliz" o "bienaventurado"'
  english_pob_reading: Happy is ...
  chosen_spanish_reading: Dichoso ...
  alternative_spanish_readings:
  - Feliz ...
  - Bienaventurado ...
  - Afortunado ...
  rationale: La línea no formula una bendición litúrgica sino una sentencia sapiencial de bienestar envidiable. "Dichoso" reproduce ese tono con dignidad y deja abierta la fuerza de "happy/fortunate/blessed" sin imponer un matiz doctrinal adicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: 'Alcance de la recompensa: si traducir de forma exacta o interpretativa la segunda cola'
  english_pob_reading: and the number of his days is doubled
  chosen_spanish_reading: y se duplican los días de su vida
  alternative_spanish_readings:
  - y el número de sus días es doble
  - y el número de sus días se duplica
  rationale: El hebreo y el griego coinciden en una imagen de duplicación; la traducción evita explicitar más de lo que el texto dice. "Los días de su vida" hace inteligible el hebraísmo sin borrar la idea numérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión mantiene el acuerdo alto entre hebreo y griego, preservando la estructura proverbial y la equivalencia de doble/doblado sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se usa "Dichoso" para אַשְׁרֵי / μακάριος, manteniendo el registro sapiencial.
  - Se prefiere "marido" por el valor relacional de בַעַל / ἀνήρ en contexto conyugal.
  - '"Una buena esposa" sigue el paralelismo hebreo-griego y evita moralizar con "virtuosa".'
  - La segunda cola conserva la idea de duplicación sin convertirla en una explicación interpretativa de longevidad.
