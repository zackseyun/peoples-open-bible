    text: Or 'will certainly come to pass.' The Hebrew uses an infinitive absolute with an imperfect verb to intensify certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the shrines of the high places.' Literally, 'all the houses of the high places.'
    reason: lexical_alternative
