translation:
  language: es
  text: Muchos buscan el favor de un noble[a], y todo el mundo es amigo de quien da dádivas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de un príncipe» o «de un hombre noble». El hebreo נָדִיב puede referirse a un noble o a un príncipe; aquí se conserva «noble» siguiendo la revisión contextual.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y todo el mundo es amigo de un hombre de dádivas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  - Muchos hombres
  lexicon: HALOT
  rationale: El cuantificador plural se expresa de forma breve y proverbial con «Muchos», conservando el sujeto indefinido sin sobretraducirlo.
- source_word: יְחַלּוּ פְנֵי
  english_pob_choice: seek the favor of
  chosen_spanish: buscan el favor de
  alternatives_spanish:
  - ruegan el favor de
  - apaciguan el rostro de
  - hacen súplicas ante
  lexicon: HALOT
  rationale: 'La expresión hebrea idiomática de «buscar/apaciguar el rostro de» se vierte por su sentido relacional en español: procurar el favor de alguien.'
- source_word: נָדִיב
  english_pob_choice: a noble man
  chosen_spanish: un noble
  alternatives_spanish:
  - un príncipe
  - un hombre noble
  - un generoso
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que favorece «noble» frente a «generous man». En español, «un noble» preserva la posibilidad de rango social y la dignidad del término, sin cerrar por completo el matiz de magnanimidad.
- source_word: הָרֵעַ
  english_pob_choice: is a friend
  chosen_spanish: son amigos
  alternatives_spanish:
  - se hacen amigos
  - es amigo
  - tienen amistad
  lexicon: HALOT
  rationale: El predicado relacional se naturaliza en español con «son amigos», que expresa la adhesión social amplia del paralelo sin perder la fuerza proverbial.
- source_word: לְאִישׁ מַתָּן
  english_pob_choice: to a man who gives gifts
  chosen_spanish: de quien da regalos
  alternatives_spanish:
  - de un hombre de regalos
  - del hombre de dádivas
  - de un dador de regalos
  lexicon: HALOT
  rationale: 'La construcción hebrea «hombre de dádiva/regalo» se vuelve en una frase natural que conserva el sentido: una persona caracterizada por dar regalos, evitando una literalidad extraña en español.'
theological_decisions:
- issue: Tratamiento de נָדִיב entre rango social y generosidad
  english_pob_reading: noble man, with the proverb focusing on gift-giving and social favor rather than rank alone
  chosen_spanish_reading: un noble, con posible resonancia de dignidad y generosidad
  alternative_spanish_readings:
  - un príncipe
  - un hombre generoso
  - un hombre noble
  rationale: 'No hay una tensión doctrinal, pero sí una tensión lexical relevante: el término puede señalar nobleza/rango o nobleza de carácter. En español, «noble» permite mantener ambas posibilidades sin borrar la ambigüedad documentada por la fuente.'
  doctrine_reference: Sabiduría proverbial; no aplica una doctrina específica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «generous man» por «noble man» para reflejar mejor נָדִיב. La versión española evita depender mecánicamente del inglés y conserva la misma decisión contextual, con una nota que deja abierta la alternativa lexical documentada.
  spanish_consistency_notes:
  - Se mantiene «favor» para פְּנֵי / יְחַלּוּ en sentido idiomático, no «rostro», porque el español contemporáneo requiere la equivalencia funcional.
  - «Regalos» se usa para מַתָּן por ser el equivalente más natural y transparente en español; «dádivas» quedaría más literario y menos inmediato.
  - La estructura proverbial se conserva con dos miembros coordinados y un paralelo social claro.
