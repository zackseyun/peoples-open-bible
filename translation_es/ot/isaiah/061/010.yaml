translation:
  language: es
  text: Me alegraré mucho en Yahvé; mi alma exultará en mi Dios, porque me ha vestido con vestiduras de salvación; me ha envuelto con un manto de rectitud[a], como un novio que se adorna con una diadema sacerdotal[b], y como una novia que se engalana con sus joyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un manto de justicia».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo probablemente evoca un adorno sacerdotal: «como un novio que se pone una diadema como un sacerdote».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׂוֹשׂ אָשִׂישׂ
  english_pob_choice: I will greatly rejoice
  chosen_spanish: Con gozo me gozaré
  alternatives_spanish:
  - Me gozaré grandemente
  - Rebosaré de gozo
  lexicon: HALOT
  rationale: El infinitivo absoluto más imperfecto intensifica la acción. En español, 'con gozo me gozaré' conserva la intensificación y el tono poético sin sonar mecánico.
- source_word: בַּֽיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvé Dios
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino. Se mantiene 'Yahvé' conforme al criterio del proyecto y al valor del Tetragrámaton.
- source_word: תָּגֵל נַפְשִׁי
  english_pob_choice: my soul will exult
  chosen_spanish: mi alma se alegrará
  alternatives_spanish:
  - mi alma exultará
  - mi ser se alegrará
  lexicon: HALOT
  rationale: גיל expresa alegría exuberante. 'Se alegrará' es natural en español y conserva la idea de júbilo poético sin endurecer el verbo.
- source_word: בֵּֽאלֹהַי
  english_pob_choice: in my God
  chosen_spanish: en mi Dios
  alternatives_spanish:
  - por mi Dios
  lexicon: HALOT
  rationale: El prefijo ב funciona en paralelo con la frase anterior; por eso se traduce 'en mi Dios' como esfera u objeto del regocijo.
- source_word: הִלְבִּישַׁ֨נִי
  english_pob_choice: he has clothed me
  chosen_spanish: me vistió
  alternatives_spanish:
  - me ha vestido
  - me ha revestido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa con efecto vigente. 'Me vistió' es directo y conserva la imagen de investidura.
- source_word: בִּגְדֵי יֶשַׁע
  english_pob_choice: garments of salvation
  chosen_spanish: vestiduras de salvación
  alternatives_spanish:
  - ropas de salvación
  - prendas de salvación
  lexicon: HALOT
  rationale: בִּגְדֵי es plural constructo y יֶשַׁע se entiende como salvación/liberación. 'Vestiduras de salvación' suena digno y mantiene el lenguaje bíblico.
- source_word: מְעִיל צְדָקָה
  english_pob_choice: a robe of righteousness
  chosen_spanish: un manto de justicia
  alternatives_spanish:
  - un manto de rectitud
  - una capa de justicia
  lexicon: HALOT
  rationale: מְעִיל es una prenda exterior, por eso 'manto'. En este versículo, צְדָקָה admite 'justicia' o 'rectitud'; se conserva 'justicia' para no perder la amplitud ética y pactal del término.
- source_word: יְעָטָ֑נִי
  english_pob_choice: he has wrapped me
  chosen_spanish: me envolvió
  alternatives_spanish:
  - me cubrió
  - me rodeó
  lexicon: HALOT
  rationale: El verbo comunica envolver con una prenda. 'Me envolvió' preserva la metáfora del vestido mejor que un simple 'cubrió'.
- source_word: כֶּֽחָתָן
  english_pob_choice: like a bridegroom
  chosen_spanish: como el novio
  alternatives_spanish:
  - como el esposo
  - como el recién casado
  lexicon: HALOT
  rationale: En español contemporáneo, 'novio' comunica el sentido relacional y ceremonial de חָתָן con naturalidad. Se evita una construcción más pesada.
- source_word: יְכַהֵן פְּאֵר
  english_pob_choice: who adorns himself with a priestly headdress
  chosen_spanish: que se adorna con una diadema sacerdotal
  alternatives_spanish:
  - que se ciñe un turbante sacerdotal
  - que lleva un tocado sacerdotal
  lexicon: HALOT
  rationale: El verbo raro sugiere adornarse con atavío sacerdotal. פְּאֵר puede referirse a tocado/adorno; 'diadema sacerdotal' preserva la posible alusión sacerdotal sin ocultarla.
- source_word: וְכַכַּלָּה תַּעְדֶּה כֵלֶיהָ
  english_pob_choice: and like a bride who decks herself with her jewelry
  chosen_spanish: como la novia que se engalana con sus joyas
  alternatives_spanish:
  - y como la novia que se adorna con sus ornamentos
  - como la desposada que se adorna con sus joyas
  lexicon: HALOT
  rationale: עדה es adornarse, y כֵלִים aquí apunta a adornos/objetos de aderezo en contexto nupcial. 'Joyas' es una equivalencia idiomática natural en español.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración reverente y auditable. ''Yahvé'' preserva la referencia al nombre del pacto y evita el masking litúrgico.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de צְדָקָה en la metáfora de vestidura
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: En la imagen de vestido, el término conserva su peso moral y pactal. 'Justicia' mantiene la amplitud semántica sin reducirla a un sentido meramente social.
  doctrine_reference: DOCTRINE.md translation philosophy §5; contested-terms rationale for δικαιοσύνη as analogous theological language
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios en la última revisión; el presente borrador español sigue de cerca esa decisión y conserva las dos tensiones lexicales principales: צְדָקָה (justicia/rectitud) y יְכַהֵן פְּאֵר (adorno sacerdotal).'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el proyecto.
  - Se usa 'salvación' para יֶשַׁע, no 'liberación', siguiendo la decisión inglesa auditada.
  - '''Manto de justicia'' conserva la metáfora de vestidura exterior para מְעִיל.'
  - '''Novio'' y ''novia'' se emplean como equivalentes naturales de חָתָן y כַּלָּה en español contemporáneo.'
