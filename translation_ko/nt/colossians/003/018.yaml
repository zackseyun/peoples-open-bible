lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: Wives
  chosen_korean: 아내들
  alternatives_korean:
  - 부인들
  lexicon: BDAG
  rationale: 가정 윤리 문맥에서 γυνή는 「아내」.
- source_word: ὑποτάσσεσθε
  english_pob_choice: submit yourselves
  chosen_korean: 복종하십시오
  alternatives_korean:
  - 순종하십시오
  - 따르십시오
  lexicon: BDAG
  rationale: 자발적 질서적 복속을 가리키는 중간/수동 명령. 「복종」은 한국 교회의 정립된 표현.
- source_word: ἀνδράσιν
  english_pob_choice: your husbands
  chosen_korean: 여러분의 남편들
  alternatives_korean:
  - 자기 남편들
  lexicon: BDAG
  rationale: 가정 문맥에서 ἀνήρ는 「남편」.
- source_word: ὡς ἀνῆκεν
  english_pob_choice: as is fitting
  chosen_korean: 합당한 대로
  alternatives_korean:
  - 마땅한 대로
  - 적절한 대로
  lexicon: BDAG
  rationale: 미완료가 관용적 현재 어감으로 사용됨. 「합당한 대로」가 자연스럽다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주께 대하여
  lexicon: BDAG
  rationale: 「주 안에서」는 한국 교회의 정립된 표현.
