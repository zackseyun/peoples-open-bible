revisions:
- from: Y aconteció[a] que, cuando Jehú estaba ejecutando juicio sobre la casa de Acab, halló a los oficiales de Judá y a los hijos de los hermanos de Ocozías, sirviendo a Ocozías[b], y los mató.
  to: Y sucedió[a] que, cuando Jehú estaba ejecutando juicio contra la casa de Acab, halló a los oficiales de Judá y a los hijos de los hermanos de Ocozías, sirviendo a Ocozías[b], y los mató.
  rationale: 'Se hacen dos ajustes menores: ''Y sucedió'' mejora la legibilidad moderna manteniendo la función narrativa de ויהי, y ''contra la casa de Acab'' hace idiomático en español el sentido punitivo/judicial de כְּהִשָּׁפֵט עִם בֵּית אַחְאָב mejor que ''sobre''. No se requieren cambios en las notas ni en las demás decisiones léxicas.'
  reviewer_model: gpt-5.4
