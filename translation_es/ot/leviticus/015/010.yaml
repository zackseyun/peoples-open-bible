base_translation:
  language: en
  yaml_path: translation/ot/leviticus/015/010.yaml
  text: And everyone who touches anything that was under him shall be unclean until the evening[a], and whoever carries them shall wash his clothes and bathe in water[b], and be unclean until the evening.
  footnotes:
  - marker: a
    text: Or 'anything that is under him.' The Hebrew may be rendered more literally with present tense, but the past sense fits the procedural context of objects previously beneath the affected person.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' refers collectively to the contaminated items associated with what was under him.
    reason: cross_reference
