id: PHP.1.23
reference: Philippians 1:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: συνέχομαι δὲ ἐκ τῶν δύο, τὴν ἐπιθυμίαν ἔχων εἰς τὸ ἀναλῦσαι καὶ σὺν Χριστῷ εἶναι, πολλῷ ⸀γὰρ μᾶλλον κρεῖσσον,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/023.yaml
  text: But I am hard pressed between the two, having the desire to depart and be with Messiah, for that is far better.
translation:
  language: ko
  text: 그러나 나는 두 가지 사이에서 압박을 받고 있으니, 떠나서[a] 메시아와 함께 있고자 하는 열망을 품고 있습니다. 그것이 훨씬 더 좋은 것이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「죽어서」. 헬라어 ἀναλύω는 「출발하다·떠나다」의 의미이며, 죽음을 가리키는 완곡한 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέχομαι
  english_pob_choice: am hard pressed
  chosen_korean: 압박을 받고 있으니
  alternatives_korean:
  - 갈등 가운데 있으니
  - 끼어 있으니
  lexicon: BDAG
  rationale: συνέχω 수동은 「제약·압박을 받다」를 의미한다. 「압박을 받고 있다」가 두 가능성 사이의 긴장을 자연스럽게 담는다.
- source_word: ἐκ τῶν δύο
  english_pob_choice: between the two
  chosen_korean: 두 가지 사이에서
  alternatives_korean:
  - 둘 사이에서
  - 두 길 사이에서
  lexicon: BDAG
  rationale: 문자적으로 「둘로부터」이나 관용적으로 「두 가능성 사이에서 압박을 받는」 의미이다. 「두 가지 사이에서」가 자연스럽다.
- source_word: τὴν ἐπιθυμίαν ἔχων
  english_pob_choice: having the desire
  chosen_korean: 열망을 품고 있습니다
  alternatives_korean:
  - 소원을 가지고 있습니다
  - 갈망을 품고 있습니다
  lexicon: BDAG
  rationale: ἐπιθυμία를 명시적으로 살리되 본 문맥의 긍정적 갈망에 맞게 「열망」으로 옮긴다.
- source_word: ἀναλῦσαι
  english_pob_choice: to depart
  chosen_korean: 떠나서
  alternatives_korean:
  - 죽어서
  - 이 세상을 떠나서
  lexicon: BDAG
  rationale: ἀναλύω는 죽음을 가리키는 완곡한 표현이다. 「떠나다」가 본문의 어휘를 보존하고, 「죽음」은 각주로 둔다.
- source_word: Χριστῷ
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: πολλῷ γὰρ μᾶλλον κρεῖσσον
  english_pob_choice: for that is far better
  chosen_korean: 그것이 훨씬 더 좋은 것이기 때문입니다
  alternatives_korean:
  - 그것이 훨씬 나은 것입니다
  - 비교할 수 없이 더 좋은 것이기 때문에
  lexicon: BDAG
  rationale: πολλῷ + μᾶλλον의 강한 비교급을 「훨씬 더」로 살린다. γάρ의 인과 기능을 「~기 때문입니다」로 표현한다.
