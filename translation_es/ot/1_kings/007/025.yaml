  text: עֹמֵ֞ד עַל שְׁנֵ֧י עָשָׂ֣ר בָּקָ֗ר שְׁלֹשָׁ֣ה פֹנִ֣ים צָפ֡וֹנָ/ה וּ/שְׁלֹשָׁה֩ פֹנִ֨ים יָ֜מָּ/ה וּ/שְׁלֹשָׁ֣ה פֹּנִ֣ים נֶ֗גְבָּ/ה וּ/שְׁלֹשָׁה֙ פֹּנִ֣ים מִזְרָ֔חָ/ה וְ/הַ/יָּ֥ם עֲלֵי/הֶ֖ם מִ/לְ/מָ֑עְלָ/ה וְ/כָל אֲחֹֽרֵי/הֶ֖ם בָּֽיְתָ/ה־׀׀׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/025.yaml
  text: 'It stood on twelve oxen: three facing north[a], three facing west, three facing south, and three facing east; and the Sea was on them above[b], and all their rear parts were inward.'
  footnotes:
