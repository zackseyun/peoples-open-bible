translation:
  language: es
  text: Porque dentro de siete días más[a] haré llover sobre la tierra cuarenta días y cuarenta noches[d][b][c], y borraré todo ser viviente que he hecho de sobre la faz del suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘después de siete días más’. El modismo hebreo indica que aún faltan siete días antes de que comience la lluvia.
    reason: lexical_alternative
  - marker: b
    text: O ‘raeré’. El verbo hebreo evoca la imagen de borrar, limpiar o hacer desaparecer por completo.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘de sobre la faz del suelo’, preservando la distinción respecto de ‘tierra’.'
    reason: lexical_alternative
  - marker: d
    text: O ‘y borraré de sobre la faz del suelo todo ser viviente que he hecho’.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Pues
  lexicon: HALOT
  rationale: Introduce la razón o explicación ligada al anuncio previo; 'Porque' preserva esa conexión causal de forma natural en español.
- source_word: לְיָמִים עוֹד שִׁבְעָה
  english_pob_choice: in seven more days
  chosen_spanish: dentro de siete días más
  alternatives_spanish:
  - después de siete días más
  - en siete días más
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala un intervalo breve antes de iniciar la acción; 'dentro de siete días más' comunica ese valor temporal sin forzar una calca.
- source_word: מַמְטִיר
  english_pob_choice: will make it rain
  chosen_spanish: haré llover
  alternatives_spanish:
  - causaré que llueva
  - enviaré lluvia
  lexicon: HALOT
  rationale: El hifil de מטר expresa causar lluvia; 'haré llover' conserva la agencia divina y es idiomático en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el mundo
  lexicon: HALOT
  rationale: '''Tierra'' refleja con naturalidad אֶרֶץ en el contexto del diluvio y mantiene el alcance amplio de juicio que destaca la POB en inglés.'
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לָיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta días y cuarenta noches
  lexicon: HALOT
  rationale: Expresión temporal fija y transparente; se conserva directamente en español.
- source_word: וּמָחִיתִי
  english_pob_choice: and I will wipe out
  chosen_spanish: y borraré
  alternatives_spanish:
  - y borraré
  - y eliminaré
  - y extirparé
  lexicon: HALOT
  rationale: מחה puede significar borrar, borrar de un registro o barrer por completo. 'Borraré' mantiene la imagen de eliminar/raer sin introducir una interpretación más fuerte que la del hebreo.
- source_word: כָּל הַיְקוּם
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo lo que vive
  - cada ser viviente
  lexicon: HALOT
  rationale: En este contexto, היקום abarca la totalidad de lo que vive y existe bajo el juicio; 'todo ser viviente' comunica ese referente con claridad, sin restringirlo indebidamente a animales o personas.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I have made
  chosen_spanish: que he hecho
  alternatives_spanish:
  - que hice
  - que he creado
  lexicon: HALOT
  rationale: El perfecto hebreo se puede expresar naturalmente con pretérito perfecto en español; 'he hecho' conserva la relación entre la obra creadora previa y el acto judicial presente.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the ground
  chosen_spanish: de sobre la faz del suelo
  alternatives_spanish:
  - de sobre la faz de la tierra
  - de sobre la superficie del suelo
  lexicon: HALOT
  rationale: Se preserva la distinción con אֶרֶץ mediante 'suelo' para אֲדָמָה. 'De sobre la faz del suelo' mantiene el hebraísmo 'faz de' y la relación espacial del texto.
theological_decisions:
- issue: Alcance del juicio del diluvio en אֶרֶץ / היקום
  english_pob_reading: Render with broad, creation-wide language ('earth,' 'every living thing') without narrowing the text to a merely local event.
  chosen_spanish_reading: Traducir con lenguaje amplio de creación ('tierra', 'todo ser viviente') sin convertir el pasaje en una afirmación explícita de alcance local.
  alternative_spanish_readings:
  - '''tierra'' en sentido restringido a una región'
  - '''mundo'' como expansión interpretativa'
  rationale: La combinación de אֶרֶץ y היקום en el versículo tiene un alcance deliberadamente amplio. La traducción conserva esa amplitud sin añadir argumentos modernos sobre la extensión geográfica del diluvio.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Distinción léxica entre אֶרֶץ y אֲדָמָה
  english_pob_reading: '''earth'' / ''ground'' distinction preserved'
  chosen_spanish_reading: '''tierra'' / ''suelo'' para mantener una distinción perceptible entre los dos términos hebreos'
  alternative_spanish_readings:
  - '''tierra'' / ''tierra'''
  - '''suelo'' / ''suelo'''
  rationale: El hebreo alterna entre אֶרֶץ y אֲדָמָה. En español, 'tierra' y 'suelo' permiten reflejar esa diferencia y evitar nivelarla en una sola palabra.
  doctrine_reference: 'Translation philosophy #1'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura inglesa auditada, pero adapta el orden para fluidez natural en español y conserva las distinciones léxicas relevantes: אֶרֶץ/אֲדָמָה, מחה y היקום. También respeta el matiz idiomático de לְיָמִים עוֹד שִׁבְעָה mediante una nota de alternativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene 'tierra' para אֶרֶץ y 'suelo' para אֲדָמָה para conservar la distinción del original.
  - '''Borraré'' se usa para מחה siguiendo la fuerza de ''wipe out/blot out'' sin sobrecargar con ''destruir''.'
  - '''Todo ser viviente'' preserva amplitud semántica y evita reducir היקום a ''criatura'' si el contexto no lo exige.'
