translation:
  language: es
  text: En el año veintitrés de Joás, hijo de Ocozías, rey de Judá, Joacaz, hijo de Jehú, llegó a ser rey[a] sobre Israel en Samaria, y reinó diecisiete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘llegó a ser rey’; también podría traducirse ‘comenzó a reinar’. La redacción elegida preserva el valor de acceso al trono sin confundirlo con la duración del reinado.
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/שְׁנַת עֶשְׂרִים וְ/שָׁלֹשׁ שָׁנָה
  english_pob_choice: In the twenty-third year
  chosen_spanish: En el año veintitrés
  alternatives_spanish:
  - En el vigésimo tercer año
  - En el año veintitrés
  lexicon: HALOT
  rationale: La fórmula cronológica hebrea se expresa de manera natural en español como ‘En el año veintitrés’. Conserva el valor regnal sin calcar el orden hebreo de los numerales.
- source_word: לְ/יוֹאָשׁ
  english_pob_choice: of Joash
  chosen_spanish: de Joás
  alternatives_spanish:
  - para Joás
  lexicon: HALOT
  rationale: En esta fórmula de datación, ל marca referencia al rey cuyo reinado sirve como punto de partida; en español, ‘de Joás’ comunica esa relación cronológica con naturalidad.
- source_word: בֶּן אֲחַזְיָהוּ
  english_pob_choice: son of Ahaziah
  chosen_spanish: hijo de Ocozías
  alternatives_spanish:
  - hijo de Ahazías
  lexicon: HALOT
  rationale: Se mantiene la relación filial explícita. Se usa ‘Ocozías’, forma española tradicional y reconocible del nombre, en lugar de transliteración rígida.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  lexicon: HALOT
  rationale: El sintagma constructo identifica el oficio real y su reino de forma directa y sin tensión en español.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: se hizo rey
  alternatives_spanish:
  - comenzó a reinar
  - llegó a ser rey
  lexicon: HALOT
  rationale: El verbo de ascensión al trono se vierte con un giro idiomático español que conserva el sentido de acceso real. ‘Se hizo rey’ mantiene la fuerza narrativa del hebreo sin confundirlo con la duración del reinado, que se expresa al final del verso.
- source_word: יְהוֹאָחָז בֶּן יֵהוּא
  english_pob_choice: Jehoahaz son of Jehu
  chosen_spanish: Joacaz, hijo de Jehú
  alternatives_spanish:
  - Jehoacaz, hijo de Jehú
  lexicon: HALOT
  rationale: Se conserva la filiación dinástica y se adopta la forma española ‘Joacaz’, habitual en traducciones bíblicas en español para este nombre.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el Israel
  - en Israel
  lexicon: HALOT
  rationale: Con מלך, עַל introduce la esfera de gobierno; ‘sobre Israel’ reproduce esa relación de autoridad de manera fiel y natural.
- source_word: בְּ/שֹׁ֣מְר֔וֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición indica localización del ejercicio del reinado en la capital. ‘En Samaria’ es directo y adecuado.
- source_word: שְׁבַ֥ע עֶשְׂרֵ֖ה שָׁנָֽה
  english_pob_choice: seventeen years
  chosen_spanish: diecisiete años
  lexicon: HALOT
  rationale: Se expresa la duración del reinado con el cardinal español equivalente, sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Fórmula de acceso al trono y duración del reinado
  english_pob_reading: became king ... and he reigned seventeen years
  chosen_spanish_reading: se hizo rey ... y reinó diecisiete años
  alternative_spanish_readings:
  - comenzó a reinar ... y reinó diecisiete años
  - llegó a ser rey ... y reinó diecisiete años
  rationale: Se conserva la distinción entre el momento de ascensión al trono y el período total de gobierno, evitando fusionar ambos datos cronológicos. No hay carga doctrinal adicional, pero sí una precisión histórica importante.
  doctrine_reference: Cronología histórica del libro de Reyes
translation_notes:
  revision_awareness: La base inglesa pasó de ‘began to reign’ a ‘became king’ para hacer más directa la ascensión al trono. La versión española sigue esa revisión con ‘se hizo rey’, manteniendo además la separación entre ascenso y duración del reinado.
  spanish_consistency_notes:
  - Se conservó la forma española tradicional ‘Joás / Ocozías / Joacaz / Jehú’ para los nombres personales, en lugar de transliteraciones hebreas más rígidas.
  - Se evitó ‘SEÑOR’ porque el versículo no contiene el Tetragrámaton ni una referencia divina directa.
  - ‘Sobre Israel’ se mantuvo para respetar la construcción de gobierno con עַל.
