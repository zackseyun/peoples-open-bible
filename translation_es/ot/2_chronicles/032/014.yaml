translation:
  language: es
  text: ¿Quién, entre todos los dioses de estas naciones que mis padres dedicaron a la destrucción[a], pudo librar a su pueblo de mi mano, como para que su Dios pueda librarlos de mi mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que mis padres pusieron bajo el anatema" o "que mis padres destruyeron". El verbo hebreo se refiere a consagrar algo a la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Cuál
  - ¿Quién de
  lexicon: HALOT
  rationale: Interrogativo natural en español para la pregunta retórica y desafiante.
- source_word: בְּכָל אֱלֹהֵי הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: among all the gods of these nations
  chosen_spanish: entre todos los dioses de estas naciones
  alternatives_spanish:
  - entre todos los dioses de los pueblos
  - de todos los dioses de estas naciones
  lexicon: HALOT
  rationale: El hebreo con ב + כָל funciona de manera partitiva; 'entre todos' refleja mejor el contraste dentro del conjunto. 'Naciones' conserva גּוֹיִם en su sentido de pueblos no israelitas.
- source_word: אֲשֶׁר הֶחֱרִימוּ אֲבוֹתַי
  english_pob_choice: that my fathers devoted to destruction
  chosen_spanish: que mis padres dedicaron a la destrucción
  alternatives_spanish:
  - que mis padres destruyeron
  - que mis padres pusieron bajo el anatema
  lexicon: HALOT
  rationale: הֶחֱרִימוּ tiene la fuerza técnica de consignar algo a destrucción. 'Dedicaron a la destrucción' preserva esa carga sin depender de un calco oscuro; 'anatema' sería más técnico pero menos claro para un lector amplio.
- source_word: אֲבוֹתַי
  english_pob_choice: my fathers
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis antepasados
  - mis padres y antepasados
  lexicon: HALOT
  rationale: En este discurso real, 'padres' en español puede sonar arcaico o ambiguo; 'mis padres' mantiene la relación de predecesores y el paralelismo con el texto fuente.
- source_word: יָכוֹל
  english_pob_choice: was able
  chosen_spanish: pudo
  alternatives_spanish:
  - fue capaz de
  - era capaz de
  lexicon: HALOT
  rationale: En la pregunta retórica pasada, 'pudo' comunica capacidad efectiva en el evento pasado de forma natural en español.
- source_word: לְהַצִּיל
  english_pob_choice: to deliver
  chosen_spanish: librar
  alternatives_spanish:
  - salvar
  - rescatar
  lexicon: HALOT
  rationale: '''Librar'' funciona bien en español bíblico para ''deliver'' en contexto de poder militar y peligro. Mantiene la idea de sacar de una situación opresiva sin introducir matices doctrinales ajenos.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  lexicon: HALOT
  rationale: El posesivo singular concuerda con el tratamiento retórico de cada dios en la pregunta. 'Pueblo' es la correspondencia más natural para עַם.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - de mi puño
  lexicon: HALOT
  rationale: Se conserva la metáfora semítica de 'mano' como poder/control, que además es transparente en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: HALOT
  rationale: 'En este contexto retórico, el hebreo introduce la consecuencia inferida: si otros dioses no pudieron, ¿cómo podría el de ustedes? ''Para que'' expresa adecuadamente la expectativa desafiante.'
- source_word: יוּכַל אֱלֹהֵיכֶם
  english_pob_choice: your God should be able
  chosen_spanish: vuestro Dios pueda
  alternatives_spanish:
  - vuestro Dios sería capaz
  - vuestro Dios podrá
  lexicon: HALOT
  rationale: El imperfecto en este juego retórico se vierte en subjuntivo de posibilidad/aptitud en español. Se mantiene la referencia directa a 'vuestro Dios' sin suavizar la ironía del hablante.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: libraros
  alternatives_spanish:
  - salvaros
  - rescataros
  lexicon: HALOT
  rationale: El pronombre enclítico conserva la segunda persona plural y evita redundancia innecesaria con 'a vosotros' en español.
theological_decisions:
- issue: Traducción de הֶחֱרִימוּ en un contexto de insulto político-asirio
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: dedicaron a la destrucción
  alternative_spanish_readings:
  - destruyeron
  - pusieron bajo el anatema
  rationale: La frase refleja la fuerza lexical del verbo sin añadir una explicación doctrinal al texto. 'Dedicaron a la destrucción' mantiene el sentido de consagrar algo para su ruina total, tal como hace la lectura inglesa auditada.
  doctrine_reference: Transparencia lexical; §1, §5
- issue: Referencia a los dioses de las naciones como 'dioses'
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  - supuestos dioses
  rationale: Se conserva la formulación del hablante sin editorializar. El texto presenta la blasfema jactancia del rey, y la traducción no debe corregirla con glosas interpretativas.
  doctrine_reference: Transparencia textual; §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el análisis auditado en inglés: mantiene la pregunta retórica, conserva la metáfora de la mano y traduce חרם con una fórmula que refleja la consagración a la destrucción sin atenuarla. No se aplicaron revisiones posteriores en la fuente inglesa; el texto se alinea con el pasaje aprobado en el último pase.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto solo cuando el texto lo requiere; en este versículo no aparece el nombre divino.
  - '''Dios'' se mantiene en singular para אֱלֹהֵיכֶם, conforme al valor posesivo singular del discurso.'
  - '''Librar'' se usa de manera consistente para לְהַצִּיל en este versículo, en paralelo con el inglés ''deliver''.'
  - La segunda persona plural se conserva con 'vuestro' y el enclítico '-os' para reflejar el hebreo plural.
