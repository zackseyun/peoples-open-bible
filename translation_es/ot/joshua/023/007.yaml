translation:
  language: es
  text: para que no entren entre estas naciones, las que quedan con ustedes, y no mencionen[a] el nombre de sus dioses, ni hagan jurar[b] por ellos, ni les sirvan, ni se postren ante ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invoquen el nombre de sus dioses». El verbo hebreo puede significar «mencionar» o, según el contexto, «invocar».
    reason: lexical_alternative
  - marker: b
    text: O «juren por ellos». El verbo hebreo es causativo, literalmente «hacer jurar», y puede incluir inducir a otros a prestar juramento por esos dioses.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבִלְתִּי בוֹא
  english_pob_choice: so that you do not come among
  chosen_spanish: para que no entren
  alternatives_spanish:
  - para que no vayan entre
  - a fin de que no entren entre
  lexicon: HALOT
  rationale: La construcción expresa prevención o finalidad negativa; en español, «para que no entren» transmite esa relación de manera natural. Opto por «entrar entre» para reflejar el movimiento hacia la asociación con esos pueblos, no solo el desplazamiento físico.
- source_word: בַּגּוֹיִם הָאֵלֶּה
  english_pob_choice: among these nations
  chosen_spanish: entre estas naciones
  alternatives_spanish:
  - en estas naciones
  - con estas naciones
  lexicon: HALOT
  rationale: «Entre» preserva la idea de convivencia o incorporación en medio de ellas. «Naciones» mantiene el valor colectivo del hebreo para los pueblos extranjeros del contexto.
- source_word: הַנִּשְׁאָרִים הָאֵלֶּה אִתְּכֶם
  english_pob_choice: these that remain with you
  chosen_spanish: estas que quedan con ustedes
  alternatives_spanish:
  - estas que permanecen con ustedes
  - estas que se han quedado con ustedes
  lexicon: HALOT
  rationale: «Quedan» reproduce bien el participio de permanecer o ser dejados atrás, y «con ustedes» conserva אִתְּכֶם. Mantengo el referente personal explícito para la claridad del español.
- source_word: וּבְשֵׁם אֱלֹהֵיהֶם לֹא תַזְכִּירוּ
  english_pob_choice: do not mention the name of their gods
  chosen_spanish: no mencionen el nombre de sus dioses
  alternatives_spanish:
  - no invoquen el nombre de sus dioses
  - no hagan memoria del nombre de sus dioses
  lexicon: HALOT
  rationale: «Mencionar el nombre» sigue de cerca el valor básico de הזכיר y deja abierta la posibilidad cultual que el contexto amplía. «Sus dioses» evita una construcción pesada y conserva el referente plural.
- source_word: וְלֹא תַשְׁבִּיעוּ
  english_pob_choice: or make anyone swear by them
  chosen_spanish: ni hagan jurar por ellos
  alternatives_spanish:
  - ni hagan que nadie jure por ellos
  - ni juren por ellos
  lexicon: HALOT
  rationale: El hiphil es causativo; por eso traduzco «hagan jurar» en lugar de un simple «juren». El complemento implícito se mantiene genérico, como en el hebreo, sin añadir más de lo necesario.
- source_word: וְלֹא תַעַבְדוּם
  english_pob_choice: or serve them
  chosen_spanish: ni les sirvan
  alternatives_spanish:
  - ni los sirvan
  - ni les rindan servicio
  lexicon: HALOT
  rationale: «Servir» preserva la fuerza verbal de עבד y distingue este acto del postrarse. El pronombre dativo «les» es idiomático en español cuando el objeto es personal o personificado.
- source_word: וְלֹא תִשְׁתַּחֲוּוּ לָהֶם
  english_pob_choice: or bow down to them
  chosen_spanish: ni se postren ante ellos
  alternatives_spanish:
  - ni se inclinen ante ellos
  - ni se arrodillen ante ellos
  lexicon: HALOT
  rationale: שׁחה denota postrarse o inclinarse físicamente; «postrarse» comunica bien ese acto ritual. «Ante ellos» conserva la dirección hacia las deidades y evita un calco pesado.
theological_decisions:
- issue: Secuencia de prohibiciones contra la idolatría
  english_pob_reading: Retain the sequence 'mention... make anyone swear... serve... bow down' as distinct prohibitions.
  chosen_spanish_reading: Mantener la secuencia «mencionen... hagan jurar... sirvan... se postren» como prohibiciones distintas.
  alternative_spanish_readings:
  - resumir todo como «no adoren»
  - unificarlo en «no tengan relación con sus dioses»
  rationale: El hebreo enumera acciones relacionadas pero no idénticas; conservarlas evita diluir la gradación concreta del texto y respeta la tensión entre lenguaje cultual, verbal y físico.
  doctrine_reference: Josué 23:7; política de traducción POB sobre precisión lexical y anti-idolatría
- issue: Tratamiento del nombre divino de los ídolos
  english_pob_reading: do not mention the name of their gods
  chosen_spanish_reading: no mencionen el nombre de sus dioses
  alternative_spanish_readings:
  - no invoquen el nombre de sus dioses
  - no hagan memoria del nombre de sus dioses
  rationale: La frase hebrea puede abarcar mera mención o invocación ritual. Conservar «mencionen» en el texto principal evita fijar indebidamente una sola interpretación, mientras el contexto de jurar y servir ya orienta la lectura.
  doctrine_reference: Nota léxica de הזכיר en contexto de culto
- issue: Forma de la prohibición causativa de juramento
  english_pob_reading: make anyone swear by them
  chosen_spanish_reading: hagan jurar por ellos
  alternative_spanish_readings:
  - hagan que nadie jure por ellos
  - juren por ellos
  rationale: El verbo hebreo es causativo; por eso la traducción debe sugerir que se induce a otro a jurar. «Hagan jurar» preserva esa fuerza sin añadir un sujeto explícito que el hebreo no expresa.
  doctrine_reference: Nota léxica de שׁבע en hiphil
translation_notes:
  revision_awareness: La base inglesa revisada cambió «go among» por «come among» para acercarse más al verbo hebreo. En español, «entren entre» refleja ese matiz de ingreso dentro del grupo sin perder naturalidad. También se mantuvo la distinción entre los cuatro verbos finales y la lectura causativa de שׁבע.
  spanish_consistency_notes:
  - Usar «Yahvé» cuando el hebreo tenga יהוה en otros versículos; aquí no aparece.
  - Conservar «dioses» en minúscula para los ídolos, sin alterar el valor polémico del hebreo.
  - Mantener verbos distintos para mencionar, jurar, servir y postrarse, evitando resumirlos en una sola idea de adoración.
