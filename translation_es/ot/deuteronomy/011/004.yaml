translation:
  language: es
  text: y lo que hizo al ejército de Egipto, a sus caballos y a sus carros, cuando hizo que las aguas del Mar Rojo[a] se desbordaran sobre ellos, mientras los perseguían, y Yahvé los destruyó hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Mar de los Juncos». Tradicionalmente se traduce «Mar Rojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza militar
  - hueste
  lexicon: HALOT
  rationale: En este contexto militar, junto con caballos y carros, חֵיל designa el conjunto armado de Egipto; «ejército» comunica con claridad esa fuerza militar sin introducir matices ajenos.
- source_word: לְסוּסָיו וּלְרִכְבּוֹ
  english_pob_choice: to its horses and its chariots
  chosen_spanish: a sus caballos y a sus carros
  alternatives_spanish:
  - a sus caballos y a su carro
  - a sus caballos y a su chariotería
  lexicon: HALOT
  rationale: El referente es Egipto como entidad colectiva. «Carros» es la forma natural en español para רִכְבּוֹ en este contexto bélico; «carros» conserva la imaginería militar sin forzar un tecnicismo.
- source_word: הֵצִיף
  english_pob_choice: made ... overflow over
  chosen_spanish: hizo que ... se desbordaran sobre
  alternatives_spanish:
  - hizo que ... inundaran sobre
  - hizo que ... pasaran por encima de
  lexicon: HALOT
  rationale: El causativo de הֵצִיף pide una construcción que conserve la idea de provocar la inundación. «Se desbordaran sobre» mantiene la causalidad y el movimiento del agua con español natural.
- source_word: מֵי יַם סוּף
  english_pob_choice: the waters of the Red Sea
  chosen_spanish: las aguas del Mar Rojo
  alternatives_spanish:
  - las aguas del Mar de los Juncos
  lexicon: HALOT
  rationale: Se mantiene la designación tradicional y reconocible en español, pero el POB inglés documenta la alternativa lexical «Sea of Reeds». En español, «Mar Rojo» es la forma más inteligible y estable; la variante se preserva en nota.
- source_word: עַל פְּנֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - por encima de ellos
  lexicon: HALOT
  rationale: El idiomático hebreo indica que las aguas cubrieron a los egipcios. «Sobre ellos» es conciso y fiel, sin reproducir una literalidad extraña como «sobre sus rostros».
- source_word: בְּרָדְפָם אַחֲרֵיכֶם
  english_pob_choice: as they pursued you
  chosen_spanish: mientras ellos los perseguían a ustedes
  alternatives_spanish:
  - cuando ellos los perseguían a ustedes
  - al perseguirlos
  lexicon: HALOT
  rationale: La construcción temporal contemporánea se expresa con «mientras» para mantener fluidez en español y conservar la simultaneidad de la acción.
- source_word: וַיְאַבְּדֵם
  english_pob_choice: destroyed them
  chosen_spanish: los destruyó
  alternatives_spanish:
  - los hizo perecer
  - los aniquiló
  lexicon: HALOT
  rationale: El verbo causativo de אבד transmite destrucción efectiva. «Los destruyó» es directo y no añade intensidad no requerida por el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del POB de no ocultar el nombre divino. En español, la forma elegida para el Tetragrámaton es «Yahvé», equivalente funcional y de uso asentado en traducciones bíblicas en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: Es un modismo hebreo de vigencia narrativa. «Hasta este día» conserva el tono bíblico sobrio y la referencia al presente del relato.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton יְהוָה directamente. Para mantener transparencia y no sustituir el nombre por un título, se conserva una transliteración del nombre divino en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: יַם סוּף
  english_pob_reading: Red Sea
  chosen_spanish_reading: Mar Rojo
  alternative_spanish_readings:
  - Mar de los Juncos
  rationale: 'El POB inglés conserva la designación tradicional en el texto principal y anota la alternativa lexical. En español se sigue la misma estrategia: «Mar Rojo» en el cuerpo y la alternativa léxica documentada en nota.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El texto sigue el sentido revisado del audit trail inglés: mantiene la causalidad de הֵצִיף con una formulación más directa y natural en español, equivalente al ajuste de «flood over» a «overflow over». También conserva la lectura tradicional de יַם סוּף en el cuerpo, documentando la alternativa lexical en nota, en paralelo al tratamiento del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, en coherencia con la política del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustitución en el texto principal para no ocultar el nombre divino.
  - «Mar Rojo» se mantiene como designación principal por inteligibilidad; la nota registra «Mar de los Juncos» para transparencia lexical.
  - «Carros» se prefiere a «carro(s) de guerra» porque el contexto ya es militar y el español lo entiende naturalmente.
  - La sintaxis conserva la secuencia narrativa del hebreo sin volverla rígida ni añadir explicaciones interpretativas.
