  rationale: Se ajusta el cierre del versículo para lograr español natural sin perder el énfasis exactivo del hebreo, y se explicita el matiz partitivo de la traducción inglesa auditada con 'parte de'. Se conservan las dos notas léxicas, con leve pulido de estilo.
