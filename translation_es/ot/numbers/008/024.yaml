  to: 'Esto es lo que corresponde a los levitas: de veinticinco años de edad en adelante[a], vendrá a cumplir su servicio en el servicio de la tienda de reunión.'
  rationale: 'Se revisa «entrará a hacer servicio en el servicio del tabernáculo de reunión» a «vendrá a cumplir su servicio en el servicio de la tienda de reunión» para: 1) reflejar mejor יָבוֹא como «vendrá»/«ha de venir» en una norma general; 2) hacer natural en español el idiomatismo לִצְבֹא צָבָא sin perder el matiz de deber; y 3) alinear אֹהֶל מוֹעֵד con la decisión auditada «tent of meeting» mediante «tienda de reunión».'
