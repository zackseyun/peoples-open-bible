translation:
  language: es
  text: Y cuando el cuerpo tenga en su piel un forúnculo[a], y se sane[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la carne» en lugar de «el cuerpo».
    reason: lexical_alternative
  - marker: b
