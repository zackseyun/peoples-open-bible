    issue: La nota al pie presenta una alternativa incorrecta/duplicada para el Tetragrámaton.
    rationale: El texto principal ya usa «Yahvé». La nota no debería decir «alternativamente se transcribe 'Yahvé'», porque no es una alternativa a sí misma. Debe reflejar formas alternativas reales, como «Yahweh» o «Jehová», conforme al rastro de auditoría en inglés y a la claridad para lectores hispanos.
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
