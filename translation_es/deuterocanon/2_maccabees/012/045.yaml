translation:
  language: es
  text: pues si él tenía la vista puesta en el más excelente galardón[a] reservado para los que han dormido con piedad, el pensamiento fue santo y devoto. Por eso hizo expiación[b] por los muertos, para que fueran librados del pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, ‘el más excelente don reservado’; el término griego εὐχαριστήριον es inusual aquí y puede llevar el sentido de un beneficio o recompensa reservada.
    reason: lexical_alternative
  - marker: b
    text: O ‘hizo propiciación’ por los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτε
  english_pob_choice: for if
  chosen_spanish: pues si
  alternatives_spanish:
  - si de hecho
  - porque si
  lexicon: LSJ
  rationale: 'Conserva el valor condicional-causal de inicio de argumento: una condición que también funciona como base inferencial. ‘Pues si’ suena natural en español y mantiene la relación con el contexto anterior sin convertirlo en una mera causalidad.'
- source_word: ἐμβλέπων
  english_pob_choice: he was looking to
  chosen_spanish: estaba mirando a
  alternatives_spanish:
  - estaba considerando
  - tenía la vista puesta en
  lexicon: LSJ
  rationale: El verbo expresa una atención dirigida, casi contemplativa. ‘Estaba mirando a’ conserva la imagen de fijar la mirada en algo futuro; en español puede leerse de forma literal, pero aquí funciona como orientación mental.
- source_word: τοῖς μετʼ εὐσεβίας κοιμωμένοις
  english_pob_choice: those who have fallen asleep in godliness
  chosen_spanish: los que han dormido con piedad
  alternatives_spanish:
  - los que han dormido en piedad
  - los que han muerto con piedad
  lexicon: LSJ
  rationale: κοιμάω es un eufemismo para morir, por eso ‘han dormido’ preserva la imagen. μετʼ εὐσεβίας se rinde con ‘con piedad’ para reflejar el matiz de acompañamiento/modo sin forzar una paráfrasis doctrinal.
- source_word: κάλλιστον ἀποκείμενον εὐχαριστήριον
  english_pob_choice: the most excellent reward laid up
  chosen_spanish: el más excelente galardón reservado
  alternatives_spanish:
  - el más excelente premio reservado
  - el más hermoso don reservado
  lexicon: LSJ
  rationale: 'El texto griego es léxicamente difícil: εὐχαριστήριον puede sugerir ‘ofrenda de acción de gracias’, pero aquí el contexto requiere un beneficio/recompensa reservada. ‘Galardón’ mantiene el sentido de recompensa; ‘reservado’ refleja ἀποκείμενον; ‘más excelente’ conserva κάλλιστον.'
- source_word: ὁσία καὶ εὐσεβὴς ἡ ἐπίνοια
  english_pob_choice: the thought was holy and devout
  chosen_spanish: el pensamiento fue santo y devoto
  alternatives_spanish:
  - la intención fue santa y piadosa
  - la reflexión fue santa y devota
  lexicon: LSJ
  rationale: ἐπίνοια puede ser pensamiento, intención o consideración. ‘Pensamiento’ es suficientemente amplio y natural; ‘santo y devoto’ reproduce la valoración moral-religiosa doble del griego.
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: LSJ
  rationale: Introduce la conclusión lógica del razonamiento anterior. ‘Por eso’ suena natural en español actual y conserva la inferencia.
- source_word: περὶ τῶν τεθνηκότων
  english_pob_choice: for the dead
  chosen_spanish: por los muertos
  alternatives_spanish:
  - acerca de los muertos
  - en favor de los muertos
  lexicon: LSJ
  rationale: La preposición περί con genitivo puede expresar referencia o beneficio. ‘Por los muertos’ es idiomático en español y deja abierta la relación precisa sin neutralizarla.
- source_word: τὸν ἐξιλασμόν
  english_pob_choice: atonement
  chosen_spanish: expiación
  alternatives_spanish:
  - atonación
  - propiciación
  lexicon: LSJ
  rationale: ‘Expiación’ es el equivalente español más directo y técnico sin imponer un marco doctrinal más estrecho que el texto. Se evita ‘atonación’, que es menos usual, y ‘propiciación’, que inclina la lectura hacia un matiz específico.
- source_word: ἐποιήσατο
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - ofreció
  lexicon: LSJ
  rationale: Con un sustantivo cultual como ἐξιλασμός, el verbo simple ‘hizo’ es natural y conserva la estructura del original sin añadir precisión ritual no explícita.
- source_word: τῆς ἁμαρτίας ἀπολυθῆναι
  english_pob_choice: so that they might be released from sin
  chosen_spanish: para que fueran librados del pecado
  alternatives_spanish:
  - para que quedaran libres del pecado
  - para ser liberados del pecado
  lexicon: LSJ
  rationale: ἀπολυθῆναι implica liberación o puesta en libertad. ‘Fueran librados del pecado’ mantiene el sentido pasivo y el resultado buscado, con una expresión clara en español.
theological_decisions:
- issue: Sentido de la expiación por los muertos y su alcance postmortem
  english_pob_reading: The verse is translated straightforwardly as affirming that atonement was made for the dead so that they might be released from sin, without importing later doctrinal systems.
  chosen_spanish_reading: El texto afirma directamente que se hizo expiación por los muertos para que fueran librados del pecado, sin añadir un sistema doctrinal posterior.
  alternative_spanish_readings:
  - Una lectura memorialista más débil, sin implicación de purificación postmortem
  - Una lectura plenamente alineada con una doctrina posterior de purificación
  rationale: 'El griego dice lo que dice: una expiación hecha por los muertos con finalidad liberadora respecto al pecado. La traducción conserva esa afirmación y evita resolver la tensión teológica que el pasaje plantea por sí mismo.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del POB inglés, que privilegió ‘most excellent reward’ para κάλλιστον y mantuvo ‘with godliness’ para μετʼ εὐσεβίας. En español, ‘más excelente galardón reservado’ y ‘con piedad’ buscan reflejar esos mismos matices sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa ‘expiación’ para τὸν ἐξιλασμόν, coherente con la alternativa principal del POB inglés y sin fijar más de lo que el griego exige.
  - Se conserva ‘muertos’ en lugar de ‘difuntos’ para mantener la correspondencia directa con περὶ τῶν τεθνηκότων y la fuerza del argumento.
  - Se mantiene ‘piedad’ en singular abstracto para εὐσεβίας, porque en español expresa adecuadamente la cualidad del modo de morir o vivir.
  - ‘Galardón’ se eligió para εὐχαριστήριον porque permite el sentido de recompensa/reserva indicado por el audit trail, mientras la nota a ofrece la alternativa de ‘don’ reservada.
