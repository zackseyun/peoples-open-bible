translation:
  language: es
  text: a Azoto[a], y entraron en Bet-dagón, el templo de su ídolo[b], para salvarse. Y Jonatán incendió Azoto y las ciudades de los alrededores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azoto es la forma griega del nombre de Asdod.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente, más literalmente, «su ídolo»; el griego probablemente se refiere al santuario idolátrico en Bet-dagón más que solo a una estatua.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄζωτον
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Asdod
  lexicon: LSJ
  rationale: El griego usa la forma helenizada del topónimo; en español, «Azoto» preserva esa forma y mantiene la conexión con la fuente griega. «Asdod» es el equivalente hebreo y puede anotarse como alternativa, pero no como forma principal en este versículo de 1 Macabeos.
- source_word: εἰσῆλθον
  english_pob_choice: they entered into
  chosen_spanish: entraron en
  alternatives_spanish:
  - entraron
  - fueron a
  lexicon: BDAG
  rationale: El verbo expresa entrada con dirección. En español, «entraron en» conserva el valor de movimiento hacia un lugar sin sobrecargar con un calco innecesario.
- source_word: Βηθδαγὼν
  english_pob_choice: Beth-dagon
  chosen_spanish: Bet-dagón
  alternatives_spanish:
  - Bet-dagón
  lexicon: LSJ
  rationale: Se translitera el nombre propio del lugar/edificio. «Bet-dagón» es la forma más clara y natural en español, manteniendo la referencia al nombre compuesto semítico.
- source_word: τὸ εἴδωλον αὐτῶν
  english_pob_choice: their idol temple
  chosen_spanish: su templo-idolo
  alternatives_spanish:
  - su ídolo
  - su santuario idolátrico
  - el templo de su ídolo
  lexicon: LSJ
  rationale: La frase griega literalmente dice «su ídolo», pero el contexto de entrar en Bet-dagón sugiere el santuario asociado al ídolo, no solo una estatua. «Templo-idolo» intenta preservar esa tensión contextual en español sin borrar el valor literal de εἴδωλον.
- source_word: τοῦ σωθῆναι
  english_pob_choice: to be saved
  chosen_spanish: para salvarse
  alternatives_spanish:
  - para ser salvados
  - para obtener refugio
  - para escapar
  lexicon: BDAG
  rationale: Aquí el infinitivo articular expresa finalidad en un contexto militar y concreto. «Para salvarse» comunica la idea de buscar rescate o seguridad, sin introducir un sentido religioso de salvación que el pasaje no exige.
- source_word: ἐνεπύρισεν
  english_pob_choice: burned
  chosen_spanish: incendió
  alternatives_spanish:
  - quemó
  - prendió fuego a
  - arrasó con fuego
  lexicon: LSJ
  rationale: El verbo indica que prendió fuego. «Incendió» es natural en español y mantiene con precisión la acción de quemar por completo o prender fuego a una ciudad.
- source_word: τὰς πόλεις τὰς κύκλῳ
  english_pob_choice: the cities around it
  chosen_spanish: las ciudades de alrededor
  alternatives_spanish:
  - las ciudades alrededor de ella
  - las ciudades vecinas
  - las ciudades circundantes
  lexicon: LSJ
  rationale: La expresión designa las poblaciones cercanas. «De alrededor» es idiomático en español y conserva la referencia espacial vinculada a Azoto.
theological_decisions:
- issue: Sentido de σωθῆναι en un contexto de guerra y refugio
  english_pob_reading: physical rescue/safety, not theological salvation
  chosen_spanish_reading: rescate o seguridad física, no salvación teológica
  alternative_spanish_readings:
  - salvación religiosa
  - escape
  - refugio
  rationale: 'El contexto narrativo es militar: los que entran en el santuario buscan protección. Por eso la traducción debe evitar importar el uso doctrinal de «salvación» y conservar el sentido concreto de amparo o escape.'
  doctrine_reference: Contextualidad semántica; evitar leer categorías soteriológicas donde el texto describe refugio físico.
- issue: Valor de εἴδωλον aplicado a Bet-dagón
  english_pob_reading: likely refers to the idol sanctuary at Beth-dagon rather than only to a statue
  chosen_spanish_reading: referencia al ídolo y, por extensión contextual, al santuario idolátrico
  alternative_spanish_readings:
  - solo una estatua
  - el templo del ídolo
  - santuario de ídolos
  rationale: La nota inglesa deja abierta la tensión entre estatua y santuario. En español conviene no reducirlo a una sola posibilidad; «templo-ídolo» intenta reflejar que el griego señala el ídolo, pero el contexto apunta al lugar de culto asociado.
  doctrine_reference: Atender al alcance semántico del término sin borrar la ambigüedad contextual.
translation_notes:
  revision_awareness: 'El draft sigue de cerca el texto griego de 1 Macabeos 9:83 y toma como guía la solución auditada en inglés: nombre griego de la ciudad, entrada a Bet-dagón sin añadir movimiento redundante, y un término compuesto en español para reflejar τὸ εἴδωλον αὐτῶν sin perder la posible referencia al santuario. También conserva la lectura contextual de σωθῆναι como rescate físico y no como salvación doctrinal.'
  spanish_consistency_notes:
  - Se mantiene «Azoto» como forma principal, en línea con el topónimo griego helenizado.
  - «Bet-dagón» conserva la transliteración del lugar, evitando una paráfrasis innecesaria como «casa de Dagón» en el texto principal.
  - «Templo-idolo» es una solución marcada para no borrar la tensión entre «ídolo» y «santuario»; se deja explicada en nota.
  - «Salvarse» se usa en sentido narrativo de protección/escape, no en sentido soteriológico.
  - «Incendió» y «las ciudades de alrededor» reflejan con naturalidad la acción y el alcance espacial del griego.
