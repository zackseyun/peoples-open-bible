    text: Or 'in my poverty.' The Hebrew can denote affliction, hardship, or poverty.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a thousand thousands.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and you shall add to them.'
    reason: lexical_alternative
