translation:
  language: es
  text: Mejor es un puñado con reposo que dos puñados con fatiga y un afanarse tras el viento[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con quietud».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y un afanarse/esforzarse tras el viento»; tradicionalmente, «y vexación de espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: El hebreo presenta una evaluación comparativa proverbial; en español, "Mejor es" reproduce con naturalidad esa estructura sin perder el valor sentencioso.
- source_word: מְלֹא כַף
  english_pob_choice: a handful
  chosen_spanish: un puñado
  alternatives_spanish:
  - una mano llena
  - la plenitud de la palma
  lexicon: HALOT
  rationale: La expresión literal apunta a la plenitud de la mano/palma, pero "un puñado" comunica la medida de forma idiomática y cercana al valor del hebreo.
- source_word: נָחַת
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - quietud
  - tranquilidad
  - descanso
  lexicon: HALOT
  rationale: El sustantivo denota calma, quietud o reposo. "Reposo" conserva el matiz de quietud asentada y funciona bien en el contraste sapiencial con el trabajo.
- source_word: מִמְלֹא חָפְנַיִם
  english_pob_choice: than two handfuls
  chosen_spanish: que dos puñados
  alternatives_spanish:
  - que la plenitud de dos manos
  - que ambas manos llenas
  lexicon: HALOT
  rationale: La construcción comparativa con el dual indica dos manos/puñados llenos. "Dos puñados" preserva la imagen y la economía expresiva del hebreo.
- source_word: עָמָל
  english_pob_choice: toil
  chosen_spanish: trabajo arduo
  alternatives_spanish:
  - fatiga
  - esfuerzo penoso
  - toil
  lexicon: HALOT
  rationale: En Eclesiastés, עָמָל suele expresar trabajo penoso y fatigoso. "Trabajo arduo" conserva el componente de esfuerzo pesado sin sonar artificioso en español.
- source_word: וּרְעוּת רוּחַ
  english_pob_choice: and a striving after wind
  chosen_spanish: y un afanarse tras el viento
  alternatives_spanish:
  - y un esforzarse tras el viento
  - y una persecución del viento
  - y una estrución tras el viento
  lexicon: HALOT
  rationale: La frase hebrea es metafórica y expresa búsqueda vana. "Afanarse tras el viento" mantiene la imagen y el sentido de esfuerzo inútil con registro claro y bíblico.
theological_decisions:
- issue: La expresión final hebrea tradicionalmente se ha vertido como "vexación de espíritu", pero el hebreo literal habla de un perseguir/afanarse tras el viento.
  english_pob_reading: and a striving after wind
  chosen_spanish_reading: y un afanarse tras el viento
  alternative_spanish_readings:
  - y vexación de espíritu
  - y afán tras el viento
  rationale: Se preserva la metáfora del hebreo y la decisión del POB inglés de evitar la fórmula tradicional interpretativa. "Afanarse tras el viento" comunica el absurdo de una búsqueda inútil sin imponer una lectura posterior.
  doctrine_reference: Eclesiastés 4:6; cf. el uso recurrente de רְעוּת רוּחַ en Eclesiastés
translation_notes:
  revision_awareness: Sigo la revisión inglesa más reciente, que cambió "a chasing after wind" por "a striving after wind" para acercarse más al hebreo y elevar el registro. En español, "afanarse tras el viento" mantiene esa cercanía formal sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se usa "reposo" para נָחַת, en paralelo con la alternativa inglesa "quietness"; la nota explica la opción equivalente.
  - Se evita "SEÑOR" o cualquier sustitución del nombre divino porque el versículo no contiene el Tetragrámaton.
  - Se conserva la metáfora de "viento" en lugar de una paráfrasis como "vanidad", para no borrar la tensión lexical del hebreo.
  - '"Puñado" y "puñados" reflejan la dualidad del hebreo de manera natural en español.'
