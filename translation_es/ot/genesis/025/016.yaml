revisions:
- from: 'Estos son los hijos de Ismael, y estos son sus nombres, en sus asentamientos y en sus campamentos: doce príncipes según sus pueblos.'
  to: 'Estos son los hijos de Ismael, y estos son sus nombres, según[a] sus asentamientos y según sus campamentos: doce príncipes[b] según sus pueblos.'
  rationale: Se ajusta la preposición para reflejar mejor la relación de clasificación por lugares que el expediente inglés final decidió preservar, usando una solución idiomática en español ('según'). Además, se restauran notas para alternativas léxicas significativas ya documentadas en el POB inglés. No se requiere cambio doctrinal ni adjudicación compleja.
