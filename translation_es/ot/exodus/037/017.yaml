    issue: '''tallo'' para קָנָהּ'
    rationale: Aunque mantiene cierta coherencia floral, el término hebreo aquí nombra el componente central estructural del candelabro. La auditoría inglesa eligió 'shaft' precisamente para evitar una lectura demasiado botánica. En español, 'tallo' puede sonar más vegetal que arquitectónico o artesanal.
  revised_spanish_text: Hizo el candelabro[a] de oro puro. Hizo el candelabro de obra martillada; su base y su fuste, sus copas, sus brotes[b] y sus flores eran de una sola pieza con él.
  revised_footnotes:
