translation:
  language: es
  text: Toda clase de carne se mantiene con su propia clase[a], y un hombre se une a su propia clase.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Todo ser vivo ama lo semejante a sí mismo, y todo hombre a su prójimo». El texto hebreo principal enfatiza la unión con la propia clase.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִין
  english_pob_choice: kind
  chosen_spanish: clase
  alternatives_spanish:
  - género
  - especie
  - tipo
  lexicon: HALOT
  rationale: מִין expresa una categoría o clase. En español, «clase» mantiene bien la idea proverbial de pertenencia a un grupo semejante sin sonar demasiado técnica.
- source_word: כָּל בָּשָׂר
  english_pob_choice: every kind of flesh
  chosen_spanish: toda clase de carne
  alternatives_spanish:
  - toda carne
  - todo ser vivo
  - toda criatura
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «todo carne», y el audit trail inglés decidió conservar «flesh» en esta revisión. «Toda clase de carne» refleja el sustantivo «carne» y la idea distributiva, en un español natural.
- source_word: אֶצְלוֹ
  english_pob_choice: to its own
  chosen_spanish: a su propia clase
  alternatives_spanish:
  - con la suya
  - junto a lo suyo
  - a lo suyo
  lexicon: HALOT
  rationale: La frase es elíptica. En el contexto, comunica afinidad o adhesión a lo semejante. «A su propia clase» hace explícita esa relación sin abandonar el sentido de pertenencia que el hebreo sugiere.
- source_word: יְחֻבַּר
  english_pob_choice: is joined
  chosen_spanish: se une
  alternatives_spanish:
  - se junta
  - se asocia
  - queda unido
  lexicon: HALOT
  rationale: El pasivo de חבר indica ser unido o asociado. «Se une» conserva la fuerza relacional y funciona con claridad en español.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  - humankind
  lexicon: HALOT
  rationale: אָדָם aparece en singular genérico, como en el inglés auditado «a man». «Un hombre» preserva esa forma proverbial y el paralelismo con el primer colon.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la primera línea
  english_pob_reading: Translate primarily from the Hebrew, with the Greek used to clarify the sense as association with one's own kind.
  chosen_spanish_reading: Traducir principalmente desde el hebreo, usando el paralelo griego solo como trasfondo para entender la afinidad con lo semejante.
  alternative_spanish_readings:
  - Toda criatura ama lo semejante a ella, y un hombre a su prójimo.
  - Todo ser vivo se apega a lo semejante a él, y un hombre a su cercano.
  rationale: El hebreo conservado es la base principal, pero la primera cola es comprimida. El griego confirma la idea de inclinación hacia lo semejante. Por eso se mantiene el lenguaje de «clase» y «se une», sin sustituirlo por «prójimo», que pertenecería más bien al paralelo griego que al hebreo extantado.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el griego paralelo como apoyo cuando aclara el sentido.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente reforzó la presencia de «flesh» en la primera cola; por eso la versión española conserva «carne» y no la sustituye por «ser vivo». Al mismo tiempo, se evita una traducción demasiado literal que sonaría extraña en español, resolviendo la elipsis de אֶצְלוֹ con «a su propia clase».
  spanish_consistency_notes:
  - Se mantiene un registro sapiencial sobrio y proverbial.
  - «Carne» se conserva por fidelidad al hebreo y al ajuste editorial reciente en inglés.
  - No se introduce «prójimo» en el texto principal, porque ese matiz pertenece al paralelo griego, no al hebreo principal.
  - El singular genérico de «un hombre» se preserva por paralelismo y por fidelidad a אָדָם.
