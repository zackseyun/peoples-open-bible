review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura prohibitiva del hebreo y distingue correctamente entre זָר, תּוֹשַׁב כֹּהֵן y שָׂכִיר. Sin embargo, dos elecciones principales no preservan con suficiente fidelidad el matiz documentado: «extranjero» desplaza זָר hacia etnicidad en vez de exclusión cultual/hogareña, y «la cosa santa» suena poco natural en español y no comunica bien el referente alimentario sagrado de קֹדֶשׁ. «Residente de un sacerdote» también resulta algo torpe; conviene una formulación más natural que conserve la relación con el hogar sacerdotal.'
  spanish_quality_summary: El texto es comprensible, pero «la cosa santa» es poco idiomático en español bíblico moderno y «extranjero» puede inducir una lectura errónea. «Residente de un sacerdote» también suena rígido. Una revisión menor mejora claridad, naturalidad y precisión sin apartarse del hebreo.
  glossary_alignment: 'No hay conflicto con términos globales principales. Las decisiones a ajustar son léxicas locales: usar «ajeno» o equivalente para זָר en contexto cultual, y evitar «cosa santa» para קֹדֶשׁ en favor de una expresión española natural como «lo santo», con nota que preserve «alimento santo/porción santa».'
  issues:
  - severity: high
    issue: «extranjero» para זָר
    rationale: En este contexto sacerdotal, זָר significa alguien ajeno al acceso autorizado, no principalmente una persona de otra etnia o nación. «Extranjero» en español inclina fuertemente hacia nacionalidad y debilita el sentido cultual que el English POB quiso preservar con «outsider».
  - severity: high
    issue: «la cosa santa» para קֹדֶשׁ
    rationale: Aunque formalmente cercano al singular hebreo, en español resulta poco natural y puede sonar material o impreciso. «Lo santo» preserva mejor la categoría sagrada; la nota puede aclarar que aquí se refiere a alimento o porción sagrada reservada a los sacerdotes.
  - severity: medium
    issue: «un residente de un sacerdote» para תּוֹשַׁב כֹּהֵן
    rationale: La relación con el sacerdote se entiende, pero la frase suena antinatural. «Un residente junto a un sacerdote» o «un residente asociado a un sacerdote» expresa mejor la dependencia/adscripción doméstica sin sugerir que el sacerdote es simplemente su posesivo abstracto.
  - severity: low
    issue: Nota c incluye «sojourner» en inglés
    rationale: El pie debe permanecer plenamente en español; mantener el anglicismo no ayuda a la legibilidad del público meta.
