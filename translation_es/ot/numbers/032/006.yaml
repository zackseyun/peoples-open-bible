review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Moisés habla a los hijos de Gad y de Rubén, contrasta a «sus hermanos» con «ustedes», y conserva la pregunta retórica sobre ir a la guerra. Sin embargo, «mientras ustedes se quedan aquí» atenúa la fuerza concreta de תֵּשְׁבוּ פֹה («se sentarán/se quedarán sentados aquí»), que en el POB inglés se preserva con «sit here». También hay una pequeña inconsistencia en la justificación léxica de «a la guerra», donde se afirma que esa opción es más natural que un calco como «a la guerra».'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para conservar mejor el filo retórico del original. «¿Sus hermanos irán a la guerra…?» es natural; no obstante, «se quedan aquí» suena algo más neutro que la reprensión directa del hebreo. «Se quedarán sentados aquí» suena natural en español y mantiene la imagen concreta sin volverse arcaico. También conviene anclar correctamente la nota cultural a «hermanos», no a «aquí».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Hijos de Gad»/«hijos de Rubén» es una opción fiel y justificable. «Hermanos» preserva bien אַחֵיכֶם, con nota explicativa adecuada. No hay términos teológicos sensibles adicionales en este versículo.
  issues:
  - severity: medium
    issue: La frase «mientras ustedes se quedan aquí» debilita la imagen concreta de תֵּשְׁבוּ פֹה.
    rationale: El verbo ישב significa literalmente «sentarse/estar sentado, permanecer». En esta reprensión, la concreción de «sentarse aquí» aporta fuerza retórica. «Quedarse aquí» comunica permanencia, pero reduce el contraste pictórico que el POB inglés decidió conservar.
  - severity: medium
    issue: La nota cultural está anclada a [b] en «aquí» en vez de en «hermanos».
    rationale: La nota explica el referente de «sus hermanos», por lo que el marcador debe aparecer en esa expresión para cumplir la disciplina de anclaje y evitar ambigüedad.
  - severity: low
    issue: La puntuación final usa punto después de la cita interrogativa.
    rationale: En español, si toda la oración es la cita interrogativa, no se añade un punto extra después de las comillas.
  - severity: low
    issue: Hay una inconsistencia en la rationale léxica para «a la guerra».
    rationale: Dice que «Guerra» es más natural que un calco como «a la guerra», pero la opción elegida es precisamente «a la guerra». Esto no obliga a cambiar el texto, pero sí muestra descuido editorial.
  revised_spanish_text: 'Pero Moisés dijo a los hijos de Gad y a los hijos de Rubén: «¿Sus hermanos[b] irán a la guerra[a] mientras ustedes se quedarán sentados aquí?»'
  revised_footnotes:
  - marker: a
    text: O «a la batalla». El hebreo dice literalmente «ir a la guerra», una expresión idiomática común para entrar en conflicto militar.
    reason: lexical_alternative
  - marker: b
    text: «Sus hermanos» se refiere a los israelitas de las otras tribus.
    reason: cultural_note
  revision_rationale: Se ajustó la segunda mitad del versículo a «mientras ustedes se quedarán sentados aquí» para preservar mejor la imagen concreta y la reprensión retórica de תֵּשְׁבוּ פֹה, en línea con el audit trail inglés. También se movió la nota cultural al término «hermanos», que es donde realmente aplica, y se corrigió la puntuación final española eliminando el punto sobrante tras la cita interrogativa.
