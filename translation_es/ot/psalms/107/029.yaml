translation:
  language: es
  text: Hizo que la tormenta se aquietara[a], y sus olas se aquietaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo que la tormenta quedara en calma». El hebreo expresa literalmente causar que la tormenta llegue a quietud o silencio.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sus olas». El sufijo puede entenderse como referido a los que iban en la barca («sus olas») o al mar/las aguas («sus olas», es decir, las de este).
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקֵם
  english_pob_choice: He made
  chosen_spanish: Él hizo que
  alternatives_spanish:
  - Él causó que
  - Él puso a
  lexicon: HALOT
  rationale: El hifil de קום tiene fuerza causativa. En español, «hizo que» comunica bien la acción causativa sin perder naturalidad ni exagerar el matiz.
- source_word: סְעָרָה
  english_pob_choice: the storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el temporal
  - la tempestad
  lexicon: HALOT
  rationale: El sustantivo designa una tormenta o tempestad en contexto marítimo; «tormenta» es claro y sobrio en español moderno.
- source_word: לִדְמָמָה
  english_pob_choice: be still
  chosen_spanish: se aquietara
  alternatives_spanish:
  - se calmara
  - quedara en calma
  - se hiciera silencio
  lexicon: HALOT
  rationale: 'La construcción expresa resultado: la tormenta es llevada a un estado de quietud/silencio. «Se aquietara» conserva ese resultado en un español natural; se evita reducirlo a una mera descripción estática.'
- source_word: וַיֶּחֱשׁוּ
  english_pob_choice: were hushed
  chosen_spanish: fueron acalladas
  alternatives_spanish:
  - se callaron
  - quedaron en silencio
  - fueron silenciadas
  lexicon: HALOT
  rationale: El verbo expresa quedar en silencio o aquietarse. «Fueron acalladas» refleja bien el efecto pasivo/resultativo en español y mantiene el movimiento hacia el silencio.
- source_word: גַּלֵּי/הֶם
  english_pob_choice: their waves
  chosen_spanish: sus olas
  alternatives_spanish:
  - sus ondas
  - las olas de ellos
  lexicon: HALOT
  rationale: El sufijo es formalmente de tercera persona plural. En español, «sus olas» conserva la referencia posesiva sin forzar la sintaxis ni resolver de más el antecedente.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: preservar la fuerza causativa del hebreo (hifil de קום) con una formulación natural en español, y mantener la segunda cláusula en voz resultativa/pasiva. Se evitaron equivalencias demasiado libres como «calmó la tormenta» para no borrar la noción de ‘hacerla entrar en quietud’.'
  spanish_consistency_notes:
  - Se usa «tormenta» para סְעָרָה, coherente con el campo semántico marítimo del contexto.
  - Se mantiene una solución causativa en español para יָקֵם, acorde con la lectura auditada.
  - «Sus olas» conserva la ambigüedad del sufijo hebreo sin sobreinterpretar el antecedente.
  - La pareja «se aquietara / fueron acalladas» busca reflejar el paso al silencio sin duplicar exactamente la misma imagen verbal.
