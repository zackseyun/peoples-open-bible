translation:
  language: es
  text: 'Cuando ella llegó[a], lo instó[b] a pedirle a su padre el campo. Entonces se apeó del asno[c], y Caleb le dijo[d]: «¿Qué quieres?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ella vino» o «al llegar ella». El hebreo expresa simplemente el momento de su llegada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo persuadió» o «lo incitó». El verbo hebreo puede abarcar desde instar hasta incitar; aquí el contexto favorece un sentido neutral, como «instó».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se bajó del asno» o «descendió del asno». El verbo hebreo permite la idea de bajar o desmontar.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «¿Qué te pasa?» o «¿Qué tienes?». El hebreo idiomático literalmente dice: «¿Qué hay para ti?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹאָהּ
  english_pob_choice: when she came
  chosen_spanish: cuando ella llegó
  alternatives_spanish:
  - cuando vino
  - al llegar ella
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo/sufijo expresa el momento de su llegada. «Llegó» es natural en español y conserva el valor temporal sin añadir matices innecesarios.
- source_word: וַתְּסִיתֵהוּ
  english_pob_choice: she urged him
  chosen_spanish: lo persuadió
  alternatives_spanish:
  - lo urgió
  - lo incitó
  - lo persuadió
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar desde «incitar» hasta «persuadir/instar». En este contexto narrativo y familiar, «persuadió» mantiene la acción de moverlo a pedir sin cargarla con una connotación negativa no exigida por el contexto.
- source_word: לִשְׁאוֹל
  english_pob_choice: to ask
  chosen_spanish: pedir
  alternatives_spanish:
  - solicitar
  - pedir que
  lexicon: HALOT
  rationale: Aquí שאל gobierna una petición dirigida al padre. En español, «pedirle a su padre» expresa mejor la fuerza pragmática de la súplica que un simple «preguntar».
- source_word: מֵאֵת אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: a su padre
  alternatives_spanish:
  - de su padre
  - a su padre
  lexicon: HALOT
  rationale: La preposición señala el origen de la solicitud. En español, la construcción «pedirle a su padre» transmite de forma idiomática esa relación de destinatario/origen.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo
  - la parcela
  - la tierra
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «field», en español «campo» puede referir aquí a un terreno o propiedad concreta. «Campo» mantiene la especificidad del artículo y suena natural; «tierra» sería más amplio y menos preciso.
- source_word: וַתִּצְנַח מֵעַל הַחֲמוֹר
  english_pob_choice: she dismounted from the donkey
  chosen_spanish: descendió del asno
  alternatives_spanish:
  - se bajó del asno
  - descendió del asno
  - se apeó del asno
  lexicon: HALOT
  rationale: El verbo puede indicar bajar o dejarse caer. «Descendió del asno» conserva el movimiento hacia abajo con un registro digno. «Asno» es un equivalente bíblico válido y claro en español.
- source_word: מַה לָּךְ
  english_pob_choice: What do you want?
  chosen_spanish: ¿Qué quieres?
  alternatives_spanish:
  - ¿Qué te pasa?
  - ¿Qué quieres?
  - ¿Qué tienes?
  lexicon: HALOT
  rationale: El hebreo es un modismo que literalmente significa «¿Qué hay para ti?» y, por el contexto de la petición, expresa la intención o necesidad de la interlocutora. «¿Qué quieres?» reproduce bien la fuerza pragmática en español.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: standard transliteration
  rationale: Nombre propio conservado por transliteración estándar.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente (sin cambios sustantivos). Se mantuvo el valor temporal de la cláusula inicial, la gama semántica de סות en un registro no negativo, el valor pragmático de שאל en contexto de petición, y el modismo final de מַה לָּךְ con una opción española natural.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y digno acorde con la línea POB.
  - Se usa «Y sucedió que» para reflejar el arranque narrativo hebreo sin sobrecargar el español.
  - Se eligió «asno» en coherencia con el registro bíblico y la imagen narrativa.
  - No hay decisiones teológicas explícitas en este versículo; el foco es lexical y pragmático.
