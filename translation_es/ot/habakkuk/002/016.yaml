translation:
  language: es
  text: Has quedado saciado de vergüenza en vez de gloria. Bebe tú también, y expón tu incircuncisión[a]. La copa en la diestra de Yahvé se volverá hacia ti, y la deshonra[b] estará sobre tu gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «queda expuesta tu incircuncisión»; el hebreo probablemente usa una imagen de vergüenza corporal y de pacto, con matiz de exposición pública.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo raro puede tener un matiz más gráfico, cercano a «deshonra vergonzosa» o «vergüenza como de vómito».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂבַעְתָּ
  english_pob_choice: have had your fill
  chosen_spanish: has quedado saciado
  alternatives_spanish:
  - te has saciado
  - has sido colmado
  lexicon: HALOT
  rationale: El verbo qal de שׂבע expresa saciedad o llenura. En español, «has quedado saciado» mantiene la idea de plenitud completada y suena natural en un reproche profético.
- source_word: קָלוֹן
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: HALOT
  rationale: קָלוֹן denota vergüenza pública o deshonra. Aquí elegí «vergüenza» para conservar el contraste directo con «gloria» y el tono breve del hebreo.
- source_word: מִכָּבוֹד
  english_pob_choice: instead of glory
  chosen_spanish: en vez de gloria
  alternatives_spanish:
  - en lugar de gloria
  - más bien que gloria
  lexicon: HALOT
  rationale: La preposición מִן en este contexto marca contraste o sustitución. «En vez de gloria» expresa bien la reversión de honor a vergüenza.
- source_word: שְׁתֵה גַם אַתָּה
  english_pob_choice: Drink, you also
  chosen_spanish: Bebe tú también
  alternatives_spanish:
  - Bebe, también tú
  - Bebe, tú asimismo
  lexicon: HALOT
  rationale: La forma imperativa conserva la metáfora de la copa de juicio. «Tú también» transmite la inclusión enfática del opresor en el juicio.
- source_word: וְהֵעָרֵל
  english_pob_choice: expose your uncircumcision
  chosen_spanish: expón tu incircuncisión
  alternatives_spanish:
  - muéstrala incircuncisión
  - queda expuesto en tu incircuncisión
  lexicon: HALOT
  rationale: El hebreo conserva una imagen corporal y covenantal de vergüenza pública. «Expón tu incircuncisión» preserva la concreción sin suavizarla, y en español mantiene mejor el sentido de exposición que un giro más interpretativo.
- source_word: תִּסּוֹב עָלֶיךָ
  english_pob_choice: will come around to you
  chosen_spanish: se volverá hacia ti
  alternatives_spanish:
  - vendrá sobre ti
  - girará hacia ti
  lexicon: HALOT
  rationale: סבב puede expresar girar, volverse o venir en torno. «Se volverá hacia ti» conserva la imagen del giro de la copa de juicio y su retorno al destinatario.
- source_word: כּוֹס יְמִין יְהוָה
  english_pob_choice: the cup in Yahweh’s right hand
  chosen_spanish: La copa en la diestra de Yahvé
  alternatives_spanish:
  - La copa en la mano derecha de Yahvé
  - La copa en la diestra de Yahvé
  lexicon: HALOT
  rationale: La frase describe la copa asociada con la mano derecha de Yahvé como agente de juicio. «Diestra» es una solución bíblica natural y digna en español, equivalente a la imagen hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Proyecto POB — convención del Tetragrámaton
  rationale: 'Se sigue el criterio del proyecto para יהוה: usar «Yahvé» en el texto principal, evitando la sustitución reverencial por «SEÑOR».'
- source_word: וְקִיקָלוֹן
  english_pob_choice: disgrace
  chosen_spanish: la deshonra
  alternatives_spanish:
  - la vergüenza
  - la afrenta
  lexicon: HALOT
  rationale: El sustantivo raro intensifica la idea de vergüenza/deshonra. «Deshonra» recoge bien el valor público y social del término sin introducir un matiz más fuerte del que exige el contexto.
- source_word: עַל כְּבוֹדֶךָ
  english_pob_choice: upon your glory
  chosen_spanish: sobre tu gloria
  alternatives_spanish:
  - encima de tu gloria
  - sobre tu honor
  lexicon: HALOT
  rationale: Se conserva «gloria» para mantener el contraste deliberado con la vergüenza del primer hemistiquio. «Sobre» traduce limpiamente עַל como superposición o carga.
theological_decisions:
- issue: Traducción del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Nombre divino. Siguiendo la convención editorial del POB, se conserva el nombre propio en español y no se lo enmascara con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Imágenes de vergüenza corporal y pacto en וְהֵעָרֵל
  english_pob_reading: expose your uncircumcision
  chosen_spanish_reading: expón tu incircuncisión
  alternative_spanish_readings:
  - revela tu incircuncisión
  - quede expuesta tu incircuncisión
  rationale: La línea preserva una humillación corporal concreta, no solo una abstracción moral. En español, «incircuncisión» mantiene la carga ritual y pública del hebreo sin reinterpretarlo como algo menos incisivo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: La copa de juicio en la diestra de Yahvé
  english_pob_reading: the cup in Yahweh’s right hand
  chosen_spanish_reading: la copa en la diestra de Yahvé
  alternative_spanish_readings:
  - la copa de la diestra de Yahvé
  - la copa en la mano derecha de Yahvé
  rationale: La imagen comunica juicio divino administrado activamente por Yahvé. «En la diestra de Yahvé» conserva la localización figurada sin convertirla en una paráfrasis teológica.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: mantiene la lectura directa del juicio, usa «en la diestra de Yahvé» para reflejar mejor la relación espacial de ימין, y evita intensificar innecesariamente el raro sustantivo final. También conserva la opción de exposición/incircuncisión mediante nota, en línea con la decisión revisada del inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrámaton en todo el proyecto.
  - Se conserva «gloria» en ambos miembros para reflejar el contraste con «vergüenza» y no neutralizar la antítesis del hebreo.
  - «Incircuncisión» se usa de forma consistente como equivalente concreto del campo semántico de ערל cuando el contexto exige vergüenza pública y covenantal.
  - La puntuación sigue el registro bíblico en español moderno, con imperativos separados para claridad rítmica.
