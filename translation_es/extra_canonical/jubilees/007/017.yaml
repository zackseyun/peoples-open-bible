lexical_decisions:
- source_word: Shem
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: Gen 10:21; 1 Cr 1:17
  rationale: Se usa la forma castellana establecida «Sem», común en Biblias en español y transparente para el lector.
- source_word: Arpachshad
  english_pob_choice: Arpachshad
  chosen_spanish: Arpaxad
  alternatives_spanish:
  - Arfacsad
  - Arpachshad
  lexicon: Gen 10:22; 11:10
  rationale: Se adapta al uso castellano bíblico tradicional «Arpaxad», conservando la referencia al mismo nombre propio.
- source_word: this one was born
  english_pob_choice: this one was born
  chosen_spanish: este fue el que nació
  alternatives_spanish:
  - este fue nacido
  - esta generación nació
  lexicon: Jub 7:17; Ge'ez tawalada
  rationale: La revisión auditada corrige la lectura errónea «esta generación». El ge'ez indica a una persona específica (Arpaxad), no a una generación; por eso se vierte con sujeto personal singular.
- source_word: flood
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - el inundación
  lexicon: Gen 7–8; Jub 7:17
  rationale: «Diluvio» es el término bíblico natural en español para el evento de Génesis y mantiene la conexión intertextual.
theological_decisions:
- issue: Identificación del nacido dos años después del diluvio
  english_pob_reading: this one was born two years after the flood
  chosen_spanish_reading: este fue el que nació dos años después del diluvio
  alternative_spanish_readings:
  - esta generación nació dos años después del diluvio
  rationale: 'Se preserva la tensión textual resuelta por la revisión: el referente es Arpaxad, no una generación. La frase mantiene la cronología y la relación genealógica sin ampliar el sentido.'
  doctrine_reference: Génesis 11:10; Jubileos 7:17
translation_notes:
  revision_awareness: 'La traducción sigue la corrección de la auditoría: el giro original mal leído como «esta generación» se entiende ahora como referencia singular a Arpaxad («este fue el que nació»). No se introducen cambios textuales adicionales respecto del testimonio base.'
  spanish_consistency_notes:
  - Se mantiene el orden genealógico del original y de la POB inglesa.
  - Se conserva la puntuación en inciso para aislar la nota cronológica.
  - Se emplean formas bíblicas habituales en español para nombres propios cuando no comprometen el control auditado del texto.
