  text: And you will be driven away from men[a], and your dwelling will be with the beasts of the field. You will be made to eat grass like oxen, and you will be drenched with the dew of heaven, and seven times will pass over you[b], until you know that the Most High rules in the kingdom of men and gives it to whomever he wills.
  footnotes:
