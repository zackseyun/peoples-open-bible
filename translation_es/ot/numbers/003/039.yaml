translation:
  language: es
  text: Todos los que fueron contados de los levitas[a], a quienes Moisés y Aarón contaron por mandato de Yahvé, por sus clanes, todo varón de un mes de edad en adelante, fueron veintidós mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé», un idiomatismo que significa «por mandato de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי / פָּקַד
  english_pob_choice: those counted / counted
  chosen_spanish: los contados / contaron
  alternatives_spanish:
  - los censados / censaron
  - los registrados / registraron
  - los enumerados / enumeraron
  lexicon: HALOT
  rationale: En este contexto censal, el sustantivo participial y el verbo de פקד expresan el total de personas contabilizadas. "Contados" y "contaron" preservan el sentido de censo sin añadir una connotación militar que no exige el hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el nombre del grupo tribal. En español, la forma asentada y clara es "levitas".
- source_word: עַל־פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por mandato de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - conforme al mandato de Yahvé
  - según el dicho de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es "por la boca de Yahvé", un idiomatismo de autorización o mandato. En español, "por mandato de Yahvé" comunica esa fuerza sin perder el vínculo con la orden divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el Nombre divino. "Yahvé" es la forma estándar de esta serie en español y evita la sustitución reverencial por "SEÑOR".
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: '"Clanes" refleja mejor la unidad social de parentesco en un contexto de censo que "familias", que puede sonar demasiado restringido en español contemporáneo.'
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todo hombre
  lexicon: HALOT
  rationale: El hebreo marca explícitamente el sexo masculino. "Varón" conserva la referencia humana y la precisión censal mejor que opciones más coloquiales o ambiguas.
- source_word: מִבֶּן חֹדֶשׁ וָמַעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: de un mes de edad y arriba
  alternatives_spanish:
  - desde un mes de edad en adelante
  - a partir de un mes de edad
  lexicon: HALOT
  rationale: Es la fórmula estándar de umbral de edad. "De un mes de edad y arriba" es fiel y natural; mantiene la estructura semítica sin sonar calcado de forma opaca.
- source_word: שְׁנַיִם וְעֶשְׂרִים אָלֶף
  english_pob_choice: twenty-two thousand
  chosen_spanish: veintidós mil
  alternatives_spanish:
  - '22.000'
  lexicon: HALOT
  rationale: El cardinal se expresa de manera directa y estándar en español.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la decisión editorial del proyecto, se conserva el Nombre propio en lugar de neutralizarlo con "SEÑOR". En esta serie, la forma española elegida es "Yahvé".
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de עַל־פִּי como fórmula de autorización
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: por mandato de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - por la boca de Yahvé
  rationale: La lectura inglesa entiende el idiomatismo como mandato divino. En español, "por mandato de Yahvé" comunica la misma fuerza sin oscurecer la función normativa de la expresión.
  doctrine_reference: Hebrew idiom עַל־פִּי in census/authorization contexts
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece sin cambios en la revisión más reciente; el español sigue esa lectura y mantiene sus decisiones léxicas clave: conteo censal con פקד, clanes para לְמִשְׁפְּחֹתָם y el Nombre divino como Yahvé. No se registran revisiones textuales adicionales para este versículo.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma del Nombre divino en toda la línea.
  - '"Contados" y "contaron" se usan de modo coherente para פקד en contexto censal.'
  - '"Clanes" se conserva como término preferido para unidades de parentesco en censos.'
  - La fórmula de edad se mantiene natural en español sin perder el paralelismo del hebreo.
