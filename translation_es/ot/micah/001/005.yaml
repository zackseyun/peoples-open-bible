translation:
  language: es
  text: Todo esto es por la transgresión de Jacob[a], y por los pecados de la casa de Israel. ¿Qué es la transgresión de Jacob? ¿No es Samaria? ¿Y cuáles son los lugares altos[b] de Judá? ¿No es Jerusalén?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rebelión» para פשע en ambas ocurrencias.
    reason: lexical_alternative
  - marker: b
    text: «Lugares altos» se refiere a sitios de culto en lugares elevados, a menudo asociados con adoración no autorizada o idolátrica.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/פֶשַׁע
  english_pob_choice: because of ... transgression
  chosen_spanish: por la transgresión
  alternatives_spanish:
  - por la rebelión
  - a causa de la transgresión
  - a causa de la rebelión
  lexicon: HALOT
  rationale: El ב causal se expresa naturalmente con «por» en este contexto de motivo del juicio. «Transgresión» conserva la fuerza moral y de ruptura del pacto de פשע sin suavizarla; «rebelión» también es posible, pero «transgresión» mantiene la consistencia con la primera ocurrencia y con el registro bíblico.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Jacob» porque el hebreo lo usa explícitamente y luego lo distingue de «la casa de Israel». Eso preserva el paralelismo retórico y evita homogeneizar las dos expresiones.
- source_word: כָּל זֹאת
  english_pob_choice: All this
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todas estas cosas
  - Todo este juicio
  lexicon: HALOT
  rationale: «Todo esto» reproduce con naturalidad la referencia amplia al anuncio previo de juicio. «Todo este juicio» explicita más de lo que el hebreo dice; por eso se deja la referencia abierta.
- source_word: וּ/בְ/חַטֹּאות
  english_pob_choice: and because of the sins
  chosen_spanish: y por los pecados
  alternatives_spanish:
  - y a causa de los pecados
  - y por las culpas
  lexicon: HALOT
  rationale: La coordinación con la primera cláusula sugiere también un valor causal. «Pecados» es la forma más clara y directa para חטאות en este contexto, descartando el sentido de «ofrendas por el pecado» por el marco acusatorio del versículo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión covenantal y formal «la casa de Israel» para conservar el paralelismo con «Jacob» y no reducirla a un nombre genérico.
- source_word: מִי
  english_pob_choice: What is
  chosen_spanish: ¿Qué es
  alternatives_spanish:
  - ¿Quién es
  - ¿Qué constituye
  lexicon: HALOT
  rationale: Aunque literalmente es «¿quién?», aquí la pregunta identifica el referente de la transgresión. En español, «¿Qué es...?» resulta más natural y transmite bien la pregunta retórica sin introducir una interpretación ajena.
- source_word: פֶשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebelión
  - culpa
  lexicon: HALOT
  rationale: Se conserva la misma solución léxica en la repetición para mantener transparencia y coherencia. «Transgresión» es precisa, comprensible y adecuada al tono profético.
- source_word: הֲ/לוֹא
  english_pob_choice: Is it not / Are they not
  chosen_spanish: ¿No es / ¿No son
  alternatives_spanish:
  - ¿Acaso no es
  - ¿No es así
  lexicon: HALOT
  rationale: El hebreo espera respuesta afirmativa; las preguntas negativas retóricas en español preservan esa fuerza. Se ajusta el verbo a singular/plural según el predicado para sonar natural.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional de la ciudad-capital del reino del norte, que funciona aquí como identificación metonímica del foco de la rebelión.
- source_word: וּ/מִי
  english_pob_choice: And what are
  chosen_spanish: ¿Y cuáles son
  alternatives_spanish:
  - ¿Y qué son
  - ¿Y cuáles serían
  lexicon: HALOT
  rationale: La forma plural del predicado («lugares altos») pide concordancia plural en español. «¿Y cuáles son...?» transmite la segunda pregunta paralela con naturalidad.
- source_word: בָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios en las alturas
  - las alturas
  lexicon: HALOT
  rationale: «Lugares altos» es la forma más transparente y suficientemente establecida en español para בָּמוֹת, manteniendo a la vez la referencia a sitios de culto elevado. Se evita «santuarios» porque podría introducir un matiz no explicitado por el hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Se usa el nombre propio español habitual de la entidad política y tribal. Mantiene el paralelismo con Samaria/Jerusalén.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Se usa la forma española estándar del topónimo, que en el versículo funciona como contraparte de Samaria.
theological_decisions:
- issue: Referente metonímico de Samaria y Jerusalén
  english_pob_reading: The city names Samaria and Jerusalem are rendered as metonymic identifications of the centers/source of the people's rebellion and illicit worship.
  chosen_spanish_reading: Samaria y Jerusalén se conservan como nombres de las capitales que representan el centro de la transgresión y de los lugares altos, sin explicitar la metonimia en el cuerpo del texto.
  alternative_spanish_readings:
  - Samaria y Jerusalén son las fuentes de la rebelión y del culto ilícito.
  - Samaria y Jerusalén representan metonímicamente esos pecados.
  rationale: El hebreo presenta preguntas retóricas que responden con las capitales mismas. La traducción mantiene esa estructura sin sobreexplicar la figura, pero la nota puede aclarar que se trata de una identificación representativa.
  doctrine_reference: Comentario bíblico-literario; no doctrinal en sentido dogmático.
- issue: Sentido de חטאות
  english_pob_reading: '''sins'' rather than ''sin offerings'' in context.'
  chosen_spanish_reading: «pecados» y no «ofrendas por el pecado».
  alternative_spanish_readings:
  - «ofrendas por el pecado»
  - «culpas»
  rationale: El contexto es una acusación profética y un anuncio de juicio, por lo que el valor de «pecados» es inequívoco. Traducirlo como ofrendas sacrificiales contradiría la dirección del pasaje.
  doctrine_reference: Exégesis contextual; no doctrinal en sentido dogmático.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, que indica que no fueron necesarios cambios y que la concordancia general con la revisión previa es alta. La versión española mantiene esa estabilidad, conservando la estructura retórica y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «transgresión» para פשע en ambas ocurrencias.
  - Se mantuvo la expresión formal «la casa de Israel» para conservar el paralelismo con «Jacob».
  - Se usó «lugares altos» como equivalente estable de בָּמוֹת y se anotó su sentido cultual.
  - 'Se conservaron los nombres propios bíblicos en sus formas españolas estándar: Jacob, Samaria, Judá y Jerusalén.'
  - Las preguntas retóricas negativas en español preservan la expectativa de respuesta afirmativa del hebreo.
