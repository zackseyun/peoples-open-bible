translation:
  language: es
  text: 'En aquel día Yahvé hizo un pacto con Abram[a], diciendo: «A tu descendencia he dado esta tierra, desde el río de Egipto[b] hasta el gran río, el Éufrates».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cortó un pacto», un modismo para establecer un pacto, probablemente con referencia al rito de corte del pacto en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: O «desde el arroyo/wadi de Egipto». El hebreo dice «río de Egipto», pero la referencia geográfica precisa es discutida.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel día mismo
  lexicon: HALOT
  rationale: La expresión temporal marca una ocasión específica y solemne. «En aquel día» conserva la cercanía formal del hebreo y suena natural en español bíblico contemporáneo.
- source_word: כָּרַת ... בְּרִית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - concertó un pacto
  - cortó un pacto
  lexicon: HALOT
  rationale: El hebreo literalmente dice «cortar un pacto», pero en español «hizo un pacto» comunica con claridad la acción de establecer la alianza. Se preserva la nota del trasfondo idiomático en una nota al pie.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como transliteración del nombre divino, en vez de sustituirlo por un título.'
- source_word: אֶת אַבְרָם
  english_pob_choice: with Abram
  chosen_spanish: con Abram
  alternatives_spanish:
  - con Abram, como objeto implícito
  - a Abram
  lexicon: HALOT
  rationale: Aunque el hebreo marca a Abram como objeto directo del verbo, el español expresa mejor la relación pactal con la preposición «con». Esto refleja con naturalidad el sentido relacional de la fórmula.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Es la introducción normal del discurso siguiente y puede mantenerse de forma directa en español.
- source_word: לְזַרְעֲךָ
  english_pob_choice: to your offspring
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu simiente
  - a tu posteridad
  lexicon: HALOT
  rationale: «Descendencia» preserva el valor colectivo de זֶרַע sin recurrir a «simiente», que en español sería más técnico y menos natural. Mantiene el alcance genealógico del término.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - doy
  - dí
  lexicon: HALOT
  rationale: El perfecto en una declaración de pacto expresa una concesión segura y efectiva. «He dado» conserva esa fuerza declarativa sin forzar a un pasado meramente narrativo.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta región
  - este país
  lexicon: HALOT
  rationale: En este contexto territorial, «tierra» es la equivalencia más directa y fiel.
- source_word: מִנְּהַר מִצְרַיִם
  english_pob_choice: from the river of Egypt
  chosen_spanish: desde el río de Egipto
  alternatives_spanish:
  - desde el arroyo de Egipto
  - desde el wadi de Egipto
  lexicon: HALOT
  rationale: נָהָר normalmente significa «río», por lo que se mantiene esa lectura en el texto principal. Se deja constancia de la alternativa geográfica debatida en una nota.
- source_word: עַד הַנָּהָר הַגָּדֹל
  english_pob_choice: as far as the great river
  chosen_spanish: hasta el gran río
  alternatives_spanish:
  - hasta el río grande
  - hasta el gran río, es decir
  lexicon: HALOT
  rationale: «Hasta» expresa el límite con naturalidad en español; «gran río» conserva la estructura descriptiva del hebreo.
- source_word: נְהַר פְּרָת
  english_pob_choice: the Euphrates
  chosen_spanish: el río Éufrates
  alternatives_spanish:
  - el Éufrates
  - el río Éufrates
  lexicon: HALOT
  rationale: «Éufrates» es el nombre propio usual en español; añadir «río» ayuda a mantener la aposición explícita del hebreo y evita ambigüedad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Nombre propio del pacto. Se traduce con la forma transliterada «Yahvé», conforme al criterio del proyecto y sin sustituirlo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del perfecto נָתַתִּי en una promesa de pacto
  english_pob_reading: I have given
  chosen_spanish_reading: he dado
  alternative_spanish_readings:
  - doy
  - di
  rationale: 'Se conserva la tensión entre promesa y posesión efectiva: el perfecto puede formular un don ya otorgado en el lenguaje solemne del pacto, sin resolverlo prematuramente como una mera narración pasada.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Expresión idiomática כָּרַת ... בְּרִית
  english_pob_reading: made a covenant
  chosen_spanish_reading: hizo un pacto
  alternative_spanish_readings:
  - cortó un pacto
  - concertó un pacto
  rationale: La nota del hebreo literal se preserva como observación, pero el texto principal usa una formulación clara y digna en español. Así se mantiene el trasfondo ritual sin oscurecer la lectura.
  doctrine_reference: 'DOCTRINE.md: source-first, with auditable lexical decisions'
translation_notes:
  revision_awareness: 'Se siguió el paquete fuente hebreo y el auditor inglés sin cambios sustantivos respecto de la lectura establecida: el versículo mantiene la fórmula temporal, la cláusula de pacto, la promesa a la descendencia y los límites geográficos tal como están atestiguados. Se adoptó «Yahvé» conforme a la política del proyecto para יְהוָה y se conservó la tensión del perfecto en «he dado».'
  spanish_consistency_notes:
  - Se unificó el nombre divino como «Yahvé» y el nombre propio como «Abram», sin normalizarlo a formas litúrgicas ajenas al expediente.
  - «Pacto» se emplea como equivalente estable de בְּרִית en el registro bíblico del texto.
  - «Descendencia» preserva el valor colectivo de זֶרַע y evita tanto el tecnicismo como la pérdida del sentido genealógico.
  - Los límites geográficos se expresan con preposiciones naturales en español («desde… hasta…») sin diluir la precisión del hebreo.
