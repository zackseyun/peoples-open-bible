translation:
  language: es
  text: Afligida, sacudida por la tormenta y no consolada, he aquí, yo pongo tus piedras en antimonio[b] y asentaré tus cimientos con zafiros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con lapislázuli»; el término hebreo tradicionalmente traducido «zafiros» puede referirse a una piedra preciosa azul no idéntica al zafiro moderno.
    reason: lexical_alternative
  - marker: b
    text: «En antimonio» probablemente alude a un material decorativo o de engaste para las piedras; algunos lo entienden como un mortero oscuro o una incrustación.
    reason: cultural_note
lexical_decisions:
- source_word: עֲנִיָּה
  english_pob_choice: afflicted one
  chosen_spanish: afligida
  alternatives_spanish:
  - afligida, oh afligida
  - oprimida
  - pobre
  lexicon: HALOT
  rationale: La forma femenina singular funciona como vocativo dirigido a Sion/Jerusalén personificada. «Afligida» conserva el valor adjetival y la dirección personal; «pobre» sería más socioeconómico y menos preciso, y «oprimida» introduce una determinación causal no explícita aquí.
- source_word: סֹעֲרָה
  english_pob_choice: storm-tossed
  chosen_spanish: sacudida por la tormenta
  alternatives_spanish:
  - zarandeada por la tormenta
  - tempestuosa
  - azotada por la tormenta
  lexicon: HALOT
  rationale: El participio describe a alguien batido o agitado por la tempestad. «Sacudida por la tormenta» transmite bien la imagen sin sonar arcaico ni forzar una equivalencia mecánica.
- source_word: לֹא נֻחָמָה
  english_pob_choice: not comforted
  chosen_spanish: no consolada
  alternatives_spanish:
  - no confortada
  - sin consuelo
  - no animada
  lexicon: HALOT
  rationale: El pasivo simple se expresa naturalmente en español con «no consolada». Mantiene la negación del alivio/consuelo sin añadir matices inexistentes.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - observa
  lexicon: HALOT
  rationale: En español bíblico «he aquí» sería posible, pero «mira» comunica la deíxis enfática de manera clara y digna para el lector moderno. Se conserva el tono de anuncio divino sin calco rígido.
- source_word: מַרְבִּיץ
  english_pob_choice: am setting
  chosen_spanish: pongo
  alternatives_spanish:
  - estoy poniendo
  - coloco
  - asiento
  lexicon: HALOT
  rationale: El valor verbal aquí apunta a asentar o colocar piedras en un medio decorativo o de engaste. «Pongo» es breve y directo; evita sobreinterpretar el matiz técnico, que se deja para la nota.
- source_word: בַּפּוּךְ
  english_pob_choice: in antimony
  chosen_spanish: en antimonio
  alternatives_spanish:
  - con antimonio
  - en un engaste de antimonio
  - en betún/negro mineral
  lexicon: HALOT
  rationale: Se conserva la correspondencia léxica principal con «antimonio», tal como hace el inglés. La preposición «en» mantiene abierta la imagen de colocación en un material decorativo o de inlay, sin resolver el detalle físico más allá del testimonio del hebreo.
- source_word: אֲבָנַיִךְ
  english_pob_choice: your stones
  chosen_spanish: tus piedras
  alternatives_spanish:
  - tus piedras de construcción
  - tus piedras preciosas
  lexicon: HALOT
  rationale: El sentido básico es «piedras». En el contexto arquitectónico de Sion restaurada, la traducción simple evita especificar «preciosas» sin base directa en la palabra hebrea.
- source_word: וִיסַדְתִּיךְ
  english_pob_choice: and laying your foundations
  chosen_spanish: y fundaré tus cimientos
  alternatives_spanish:
  - y asentaré tus cimientos
  - y te fundaré
  - y pondré tus cimientos
  lexicon: HALOT
  rationale: יסד tiene el sentido de fundar o echar cimientos. «Fundaré tus cimientos» y «cimientos» preservan el campo constructivo. Aunque la forma verbal hebrea puede leerse como acción vívida, el futuro español encaja bien con el anuncio profético.
- source_word: בַּסַּפִּירִים
  english_pob_choice: with sapphires
  chosen_spanish: con zafiros
  alternatives_spanish:
  - con lapislázuli
  - en zafiros
  lexicon: HALOT
  rationale: Se mantiene la forma tradicional «zafiros» como equivalente bíblico normal en español, sin cerrar la posible identidad mineral exacta. La alternativa «lapislázuli» queda implícitamente posible, pero no se impone en el texto principal.
theological_decisions:
- issue: Identidad de la destinataria
  english_pob_reading: The verse addresses personified Zion/Jerusalem as a feminine singular 'afflicted one.'
  chosen_spanish_reading: El verso se dirige a Sion/Jerusalén personificada como una mujer singular afligida.
  alternative_spanish_readings:
  - Se dirige a una mujer afligida de manera genérica
  - Se dirige a la comunidad del pacto en sentido más abstracto
  rationale: Las formas femeninas singulares del hebreo y el contexto inmediato de Isaías 54 favorecen una Sion personificada. La traducción lo conserva sin añadir precisiones doctrinales externas.
  doctrine_reference: Mantener la tensión teológica del texto y priorizar la evidencia del idioma original sobre la tradición de máscara léxica.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del expediente inglés: no se registraron cambios en la última pasada y la concordancia de revisión fue alta; por tanto, la versión española sigue de cerca la lectura estable del POB inglés y su nota cultural sobre antimonio y la posible piedra azul alternativa.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «zafiros» en el texto principal y se reserva la ambigüedad mineral para la nota, de acuerdo con el expediente inglés.
  - Se traduce el vocativo femenino con naturalidad española sin borrar la personificación de Sion/Jerusalén.
  - Se evita reemplazar la imagen arquitectónica por lenguaje devocional más interpretativo que el hebreo no exige.
