revisions:
- from: La Sabiduría[a] ha instruido a sus hijos, y atiende a todos los que la entienden.
  to: La Sabiduría[a] ha instruido a sus hijos e hijas, y atiende a todos los que la entienden.
  rationale: Se ajusta בָנֶיהָ para reflejar la decisión auditada de sentido inclusivo ('children') y evitar una restricción masculina innecesaria en español. También se afina la nota para representar mejor el matiz de testimonio favorable del hebreo preservado. El resto del versículo puede mantenerse como español natural y alineado con la revisión inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:05:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida la línea del English POB revisado y mantiene bien la personificación femenina de la Sabiduría. Sin embargo, no preserva del todo la decisión léxica documentada para בָנֶיהָ: el inglés auditado escogió ''children'' por su alcance inclusivo, mientras que ''sus hijos'' en español estrecha innecesariamente el referente a varones o suena menos amplio. La nota también refleja el hebreo alternativo con una redacción algo menos precisa que la documentada.'
  spanish_quality_summary: El español es claro y digno, pero 'sus hijos' conviene ajustarlo a 'sus hijos[a]' o mejor 'sus hijos e hijas' solo si el texto lo exigiera; aquí, por naturalidad y fidelidad, 'sus hijos' no es ideal. La opción más natural y amplia en español eclesial moderno es 'sus hijos' en algunos contextos, pero dado el razonamiento explícito del POB, 'sus hijos' no preserva bien la intención. 'Sus hijos' también crea una leve tensión con la nota de filosofía. 'Atiende a todos los que la entienden' sí es legible y encaja con la revisión inglesa.
  glossary_alignment: Sin conflictos con la glosario mayor. 'La Sabiduría' capitalizada funciona para la personificación. No hay términos del glosario principal comprometidos. El ajuste principal es alinear בָנֶיהָ con un equivalente español inclusivo y natural, preferiblemente 'sus hijos' -> 'sus hijos[a]' no resuelve el sentido; mejor 'sus hijos' -> 'sus hijos e hijas' sería demasiado interpretativo. 'Sus hijos' -> 'sus hijos' no cambia nada. La mejor solución es 'sus hijos' -> 'sus hijos' no sirve, así que se recomienda 'sus hijos' -> 'sus hijos[a]'? No. En español natural y amplio, 'sus hijos' sigue siendo ambiguo. Por fidelidad al rationale auditado, 'sus hijos' debe cambiarse a 'sus hijos e hijas' o 'sus hijos' replaced with 'sus hijos' impossible. La opción más fiel y natural aquí es 'sus hijos' -> 'sus hijos e hijas' pese a ser algo expansiva, porque evita restringir a varones.
  issues:
  - severity: medium
    issue: בָנֶיהָ se tradujo como 'sus hijos'
    rationale: El English POB documentó explícitamente 'her children' para evitar restringir el referente a varones. En este contexto de Sabiduría personificada y adherentes generales, 'sus hijos' en español puede leerse como masculino específico; 'sus hijos e hijas' preserva mejor el sentido inclusivo, aunque sea ligeramente más explícito.
  - severity: low
    issue: La nota textual no reproduce con máxima precisión la alternativa hebrea auditada
    rationale: El rastro inglés dice 'and she bears witness for all who have understanding in her'. 'Da testimonio para todos los que tienen entendimiento en ella' es entendible, pero 'da testimonio en favor de todos los que tienen entendimiento en ella' o 'da testimonio por todos...' expresa mejor el matiz favorable documentado para לְכָל.
  revised_spanish_text: La Sabiduría[a] ha instruido a sus hijos e hijas, y atiende a todos los que la entienden.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «y se apodera de los que la buscan». El hebreo conservado dice: «y da testimonio en favor de todos los que tienen entendimiento en ella».'
    reason: textual_variant
  revision_rationale: Se ajusta בָנֶיהָ para reflejar la decisión auditada de sentido inclusivo ('children') y evitar una restricción masculina innecesaria en español. También se afina la nota para representar mejor el matiz de testimonio favorable del hebreo preservado. El resto del versículo puede mantenerse como español natural y alineado con la revisión inglesa.
