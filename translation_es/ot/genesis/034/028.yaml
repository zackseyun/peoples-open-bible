translation:
  language: es
  text: Tomaron sus rebaños, sus ganados, sus asnos y todo lo que había en la ciudad y todo lo que había en el campo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo que estaba en la ciudad y lo que estaba en el campo”.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאנָם
  english_pob_choice: their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas y cabras
  - su ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, especialmente ovejas y cabras. «Rebaños» conserva el sentido colectivo y resulta natural en español sin especificar especies.
- source_word: בְּקָרָם
  english_pob_choice: their herds
  chosen_spanish: sus ganados
  alternatives_spanish:
  - sus reses
  - su ganado vacuno
  lexicon: HALOT
  rationale: בָּקָר designa ganado mayor/corral de reses. «Ganados» mantiene el valor colectivo y combina bien con «rebaños» en español; evita restringir demasiado a vacuno cuando el término hebreo es más amplio.
- source_word: חֲמֹרֵיהֶם
  english_pob_choice: their donkeys
  chosen_spanish: sus asnos
  alternatives_spanish:
  - sus burros
  - sus jumentos
  lexicon: HALOT
  rationale: El sustantivo se refiere a asnos. «Asnos» es fiel al referente y más estándar en un registro bíblico digno; «burros» sería más coloquial.
- source_word: אֲשֶׁר בָּעִיר
  english_pob_choice: whatever was in the city
  chosen_spanish: todo lo que había en la ciudad
  alternatives_spanish:
  - cualquier cosa que había en la ciudad
  - todo cuanto había en la ciudad
  lexicon: HALOT
  rationale: La construcción relativa amplía el objeto del saqueo. «Todo lo que había» expresa bien la amplitud colectiva del hebreo sin sonar artificial en español.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: whatever was in the field
  chosen_spanish: todo lo que había en el campo
  alternatives_spanish:
  - todo cuanto había en el campo
  - cualquier cosa que había en el campo
  lexicon: HALOT
  rationale: שָׂדֶה puede significar campo o terreno abierto. «En el campo» es la forma más directa y comprensible en español, manteniendo la extensión total del objeto.
- source_word: לָקָחוּ
  english_pob_choice: They took
  chosen_spanish: Tomaron
  alternatives_spanish:
  - Se llevaron
  - Arrebatron
  lexicon: HALOT
  rationale: לָקַח significa de manera básica «tomar». En este contexto de botín, «Tomaron» sigue de cerca el hebreo y deja que el contexto narre el acto de saqueo sin añadir una interpretación más fuerte.
translation_notes:
  revision_awareness: El texto inglés POB sigue de cerca el hebreo pero opta por una formulación idiomática con «whatever was in the city/field». La versión española conserva esa amplitud semántica con «todo lo que había», y mantiene la lista de botín con sustantivos colectivos equivalentes a los elegidos en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Rebaños»/«ganados» preservan la distinción colectiva de צֹאן y בָּקָר sin sobreespecificar especies.
  - «Tomaron» conserva la simplicidad verbal de לָקָחוּ y evita intensificar indebidamente el matiz de saqueo.
