translation:
  language: es
  text: Y haré cesar en Moab—oráculo de Yahvé—al que sube al lugar alto y quema incienso a su dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y haré cesar en Moab la adoración en los lugares altos …». El hebreo usa participios singulares («el que sube … y quema incienso»), que pueden representar adoradores de manera genérica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end
  chosen_spanish: haré cesar
  alternatives_spanish:
  - pondré fin
  - haré terminar
  - haré cesar
  lexicon: HALOT
  rationale: 'El hifil de שׁבת es causativo: Yahvé provoca que cese una práctica o una persona. En español, «haré cesar» conserva ese valor causativo sin volverlo demasiado abstracto o forzado.'
- source_word: לְמוֹאָב
  english_pob_choice: in Moab
  chosen_spanish: en Moab
  alternatives_spanish:
  - para Moab
  - de Moab
  lexicon: HALOT
  rationale: La preposición ל aquí señala el ámbito donde cesará la acción. «En Moab» comunica con claridad que el cese ocurrirá dentro de Moab.
- source_word: נְאֻם יְהוָה
  english_pob_choice: oracle of Yahweh
  chosen_spanish: oráculo de Yahvé
  alternatives_spanish:
  - declaración de Yahvé
  - dice Yahvé
  - palabra de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética nominal. «Oráculo de Yahvé» preserva su tono solemne y su valor de enunciado profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la convención del proyecto. «Yahvé» evita la sustitución por un título y mantiene la forma establecida en español.
- source_word: מַעֲלֶה
  english_pob_choice: the one who goes up
  chosen_spanish: al que sube
  alternatives_spanish:
  - el que sube
  - quien sube
  - el oferente
  lexicon: HALOT
  rationale: El participio expresa literalmente a quien asciende. «Al que sube» mantiene la imagen de subir al lugar alto y evita introducir «ofrecer» donde el hebreo no lo dice directamente.
- source_word: בָמָה
  english_pob_choice: the high place
  chosen_spanish: a la altura
  alternatives_spanish:
  - al lugar alto
  - al alto lugar
  - al santuario alto
  lexicon: HALOT
  rationale: Aunque «lugar alto» sería más explicativo, «altura» permite una frase más natural en español y conserva la referencia cultual implícita en בָמָה. La nota aclara que se trata de la práctica del lugar alto.
- source_word: וּמַקְטִיר
  english_pob_choice: and burns incense
  chosen_spanish: y quema incienso
  alternatives_spanish:
  - y ofrece incienso
  - y hace humear
  - y quema sacrificios
  lexicon: HALOT
  rationale: En contexto cultual, קטר puede referirse a quemar incienso o hacer subir humo sacrificial. «Quema incienso» es la opción más clara y concisa para el lector español.
- source_word: לֵאלֹהָיו
  english_pob_choice: to his god
  chosen_spanish: a su dios
  alternatives_spanish:
  - a sus dioses
  - a su deidad
  lexicon: HALOT
  rationale: Aunque אֱלֹהִים puede ser morfológicamente plural, el sufijo de 3ms y el contexto apuntan a un referente singular. «Su dios» conserva ese valor sin forzar pluralidad.
theological_decisions:
- issue: Forma de expresar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto pide transliterar el Tetragrámaton como «Yahvé». Esto preserva el nombre personal de Dios y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de lo que cesa en Moab
  english_pob_reading: the one who goes up to the high place and burns incense to his god
  chosen_spanish_reading: al que sube a la altura y quema incienso a su dios
  alternative_spanish_readings:
  - la adoración en lugares altos
  - el culto en la altura
  - quien sube al lugar alto y ofrece incienso
  rationale: El hebreo usa participios singulares masculinos, lo que sugiere un sujeto representativo, no una abstracción. La traducción mantiene esa forma y no la aplana a un sustantivo genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 4, 5
translation_notes:
  revision_awareness: 'El texto sigue la última revisión del auditor sin cambios sustanciales: la lectura principal conserva el sujeto singular representativo y la fórmula profética, mientras la nota mantiene la alternativa abstracta documentada en el inglés POB.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en todo el registro.
  - Se conserva «su dios» en singular, en línea con el valor contextual de לֵאלֹהָיו.
  - «Altura» funciona aquí como equivalente natural de בָמָה sin perder la referencia cultual; la nota evita ambigüedad interpretativa.
  - La puntuación con raya larga reproduce la inserción de la fórmula profética como en el audit trail inglés.
