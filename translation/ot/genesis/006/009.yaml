theological_decisions:
- issue: Meaning of תָּמִים in describing Noah
  chosen_reading: blameless as a description of integrity, not absolute sinlessness
  alternative_readings:
  - perfect
  - without blemish
  rationale: The context describes Noah's character in contrast to a corrupt generation. Rendering 'blameless' preserves the commendation without importing a doctrine of sinless perfection that the Hebrew does not require.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
- issue: Force of בְּדֹרֹתָיו
  chosen_reading: retain the more literal 'in his generations' in the main text
  alternative_readings:
  - among his contemporaries
  - in his time
  rationale: The phrase is somewhat ambiguous. A literal rendering keeps the ambiguity visible, while a footnote preserves the common interpretive alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
