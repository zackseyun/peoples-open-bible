translation:
  language: es
  text: Al ser humano le pertenecen los planes del corazón,[a][b] pero de Yahvé es la respuesta de la lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las disposiciones/preparativos del corazón son para el ser humano, pero la respuesta de la lengua es de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'אָדָם funciona aquí como singular representativo: una persona humana en general, no un individuo masculino en sentido restrictivo.'
    reason: cultural_note
lexical_decisions:
- source_word: לְאָדָם
  english_pob_choice: belong to man
  chosen_spanish: Del ser humano son
  alternatives_spanish:
  - Pertenecen al ser humano
  - Son para el ser humano
  - Del hombre son
  lexicon: HALOT
  rationale: El ל inicial expresa aquí relación o pertenencia. En español, una construcción posesiva con 'del ser humano son' reproduce la idea de que esos planes corresponden a la persona humana sin introducir un verbo ajeno al hebreo. 'Ser humano' conserva el valor genérico y representativo de אָדָם mejor que un masculino singular restrictivo.
- source_word: מַעַרְכֵי
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - arreglos
  - preparativos
  - disposiciones
  lexicon: HALOT
  rationale: El sustantivo de ערך puede abarcar arreglo u ordenación; en un proverbio de sabiduría con 'corazón' el sentido es el de intenciones o proyectos internos. 'Planes' es natural en español y mantiene bien la fuerza intencional sin desbordar el texto.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: '''Corazón'' conserva la imagen hebrea del centro de pensamiento y voluntad. En español bíblico sigue siendo claro y no pierde la dimensión afectiva e ինտencional del término.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' conforme al criterio del proyecto, preservando el nombre propio divino en lugar de sustituirlo por un título. Así se mantiene la diferencia con el segundo miembro del versículo.
- source_word: מַעֲנֵה
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - contestación
  - réplica
  - respuesta dada
  lexicon: HALOT
  rationale: El sustantivo denota una respuesta o contestación. 'Respuesta' es claro, sobrio y adecuado al paralelismo sapiencial.
- source_word: לָשׁוֹן
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua hablada
  - el habla
  - la boca
  lexicon: HALOT
  rationale: Aunque 'lengua' es literal, en español bíblico también funciona como metonimia de la խոսa. 'La lengua' conserva la concreción figurada del hebreo y resulta idiomática en español.
theological_decisions:
- issue: Relación entre la planificación humana y la procedencia divina de la respuesta
  english_pob_reading: The verse affirms that human beings make inward plans, while the decisive spoken answer ultimately comes from the LORD.
  chosen_spanish_reading: El versículo afirma que la persona humana formula planes interiores, pero que la respuesta pronunciada procede de Yahvé.
  alternative_spanish_readings:
  - Los seres humanos planean, pero Dios controla la respuesta final
  - Los planes internos son humanos, y la palabra decisiva viene de Yahvé
  rationale: La sintaxis española mantiene la contraposición del hebreo sin suavizarla ni resolverla. 'Pero' conserva el giro adversativo observado en la traducción inglesa, y 'de Yahvé es la respuesta de la lengua' deja en pie la tensión teológica entre intención humana y dependencia divina en la palabra hablada.
  doctrine_reference: Preservar la tensión teológica sin convertirla en un sistema doctrinal más explícito que el proverbio.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la posesión/relación de לְאָדָם, el contraste adversativo con ו, el nombre divino como Yahvé y la metonimia de ''tongue'' sin aplanar la tensión entre planes humanos y respuesta divina. No se registran revisiones aplicadas en el expediente inglés, y el acuerdo de revisión es alto.'
  spanish_consistency_notes:
  - Se prefirió 'ser humano' para reflejar el valor genérico de אָדָם sin introducir marcación de género innecesaria.
  - '''Yahvé'' se usó por consistencia con el estándar del proyecto para יְהוָה.'
  - '''Lengua'' se mantuvo como metonimia concreta y no se sustituyó por ''habla'' para no perder la imaginería hebrea.'
  - La puntuación refleja el paralelismo poético español con coma antes de 'pero'.
