lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la familia de
  lexicon: HALOT
  rationale: En listas censales y genealógicas, el constructo plural de בֵּן suele señalar pertenencia a un linaje o clan. «Los hijos de» conserva la estructura formal del hebreo y resulta natural en español bíblico; «descendientes de» explicita la idea, pero suaviza la forma del original.
- source_word: חָשֻׁם
  english_pob_choice: Hashum
  chosen_spanish: Hashum
  lexicon: HALOT
  rationale: Nombre propio de familia; se translitera para mantener la identidad del registro y la correspondencia con el texto fuente.
- source_word: שְׁלֹשׁ מֵאוֹת עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: three hundred twenty-eight
  chosen_spanish: trescientos veintiocho
  alternatives_spanish:
  - trescientos y veintiocho
  lexicon: HALOT
  rationale: El hebreo expresa un total cardinal simple. En español, «trescientos veintiocho» comunica el número exacto con naturalidad y sin añadir una conjunción que no pertenece al valor numérico del texto.
