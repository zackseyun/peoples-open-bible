review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del hebreo y del POB inglés: insuficiencia del grupo doméstico para un שֶׂה, cooperación con el vecino más cercano, cómputo según el número de personas y según lo que cada uno pueda comer. También preserva bien la nota léxica sobre שֶׂה. Sin embargo, hay dos desajustes importantes: (1) ''la casa'' suena más al edificio que al grupo doméstico, cuando el contexto exige ''hogar/casa'' en sentido doméstico; (2) ''ustedes lo calcularán para el cordero'' introduce un objeto directo ''lo'' no presente y suena poco natural/ambiguo en español. El hebreo תָּכֹסּוּ עַל־הַשֶּׂה expresa más bien ''harán el cálculo / contarán para el cordero''.'
  spanish_quality_summary: La redacción es mayormente clara, pero mezcla un registro algo forzado con una segunda persona plural explícita innecesaria ('ustedes'). 'La casa es demasiado pequeña' y 'ustedes lo calcularán para el cordero' reducen naturalidad y precisión. Una formulación como 'el hogar es demasiado pequeño' y 'harán el cálculo para el cordero' suena más idiomática y fiel. También conviene pulir la nota b, cuya puntuación y comillas están torpes.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Cordero' para שֶׂה es aceptable aquí con nota alternativa. 'Personas' para נְפָשֹׁת está bien. 'Cada hombre' preserva adecuadamente אִישׁ en valor distributivo. La revisión recomendada afecta claridad contextual y español natural, no el glosario teológico.
  issues:
  - severity: medium
    issue: '''la casa'' no comunica bien el sentido de household'
    rationale: הַבַּיִת aquí refiere al grupo doméstico participante, no principalmente al edificio. En español 'el hogar' o 'la casa' pueden funcionar, pero 'la casa es demasiado pequeña' suena espacial; 'el hogar es demasiado pequeño' comunica mejor insuficiencia del grupo.
  - severity: high
    issue: '''ustedes lo calcularán para el cordero'' es ambiguo y añade un objeto no justificado'
    rationale: תָּכֹסּוּ no requiere el pronombre 'lo', y la frase resultante en español suena mecánica. La idea es contar/calcular en relación con el cordero según la porción comestible de cada uno. 'Harán el cálculo para el cordero' o 'lo contarán' sin objeto añadido sería más fiel y natural.
  - severity: low
    issue: La nota b está mal presentada tipográficamente
    rationale: La nota actual tiene comillas y puntuación defectuosas. Debe darse como alternativa clara y natural en español.
