translation:
  language: es
  text: Porque atesoras un buen tesoro para ti para un día de necesidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el día de necesidad», «para un tiempo de angustia» o «para un día de dificultad». La frase griega es amplia y puede referirse a una necesidad urgente o a un tiempo de apuro o aflicción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέμα
  english_pob_choice: a good treasure
  chosen_spanish: un buen tesoro
  alternatives_spanish:
  - un buen depósito
  - un buen almacén
  - algo bueno guardado
  lexicon: LSJ
  rationale: El sustantivo indica algo puesto aparte o almacenado. "Tesoro" conserva en español la relación semántica con el verbo de almacenar/atesorar y suena natural en un contexto sapiencial. "Depósito" sería más técnico y menos idiomático.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: Aquí introduce la razón o explicación de lo anterior. "Porque" expresa bien la conexión causal/explanatoria en español sin perder el flujo argumentativo.
- source_word: ἀγαθὸν
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - benéfico
  - valioso
  lexicon: BDAG
  rationale: El adjetivo califica el tesoro como bueno. "Buen" es la forma más natural y directa en español, sin estrechar indebidamente el sentido hacia valor monetario.
- source_word: θησαυρίζεις
  english_pob_choice: you are storing up
  chosen_spanish: estás acumulando
  alternatives_spanish:
  - estás atesorando
  - estás guardando
  - estás almacenando
  lexicon: BDAG
  rationale: El verbo expresa la acción de reunir y guardar como tesoro. "Estás acumulando" comunica el aspecto progresivo y mantiene la imagen de reunir para el futuro; "atesorando" también es posible, pero puede sonar más literario o menos inmediato.
- source_word: σεαυτῷ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - en tu beneficio
  lexicon: BDAG
  rationale: El dativo reflexivo indica beneficio para el sujeto. "Para ti" es idiomático y claro en español, y evita una redundancia innecesaria.
- source_word: εἰς ἡμέραν ἀνάγκης
  english_pob_choice: for a day of need
  chosen_spanish: para el día de la necesidad
  alternatives_spanish:
  - para el día de la necesidad apremiante
  - para un tiempo de aflicción
  - para el día de la prueba
  lexicon: BDAG
  rationale: La frase griega es amplia y puede referirse a necesidad urgente, apuro o dificultad. "Día de la necesidad" conserva la amplitud semántica y sigue de cerca la estructura griega sin precisar demasiado el tipo de necesidad.
theological_decisions:
- issue: Metáfora de almacenar tesoro mediante la limosna o la conducta correcta
  english_pob_reading: Retain the metaphor of storing up treasure without expanding it into an explicit doctrine of merit.
  chosen_spanish_reading: Conservar la metáfora de acumular tesoro sin convertirla en una afirmación explícita sobre mérito.
  alternative_spanish_readings:
  - Interpretarlo como mérito para recompensa celestial
  - Entenderlo solo como provisión práctica para una dificultad futura
  rationale: El griego solo afirma que se está acumulando un buen tesoro para un día de necesidad. La traducción mantiene la imagen y no explicita el mecanismo teológico, preservando la tensión doctrinal del pasaje.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El auditor inglés revisó "for a day of necessity" a "for a day of need" por naturalidad; en español se optó por "para el día de la necesidad" para conservar la amplitud de ἀνάγκης y el paralelismo con el griego, evitando una concreción excesiva.
  spanish_consistency_notes:
  - Se mantuvo "tesoro" para reflejar la conexión con el verbo de almacenar/atesorar.
  - '"Porque" conserva la fuerza explicativa de γάρ.'
  - '"Día de la necesidad" preserva la amplitud semántica de ἀνάγκης sin fijarla en una sola circunstancia.'
  - El texto es una sola cláusula; no se añadieron elementos doctrinales ajenos al griego.
