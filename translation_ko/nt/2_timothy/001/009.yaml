id: 2TI.1.9
reference: 2 Timothy 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ σώσαντος ἡμᾶς καὶ καλέσαντος κλήσει ἁγίᾳ, οὐ κατὰ τὰ ἔργα ἡμῶν ἀλλὰ κατὰ ἰδίαν πρόθεσιν καὶ χάριν, τὴν δοθεῖσαν ἡμῖν ἐν Χριστῷ Ἰησοῦ πρὸ χρόνων αἰωνίων,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/009.yaml
  text: who saved us and called us with a holy calling, not according to our works but according to his own purpose and grace, which was given to us in Messiah Jesus before eternal ages,
translation:
  language: ko
  text: 하나님께서는 우리를 구원하시고 거룩한 부르심으로 부르셨습니다. 우리의 행위에 따라 그렇게 하신 것이 아니라, 자신의 뜻과 은혜를 따라 그리하셨습니다. 그 은혜는 영원 전에[a] 메시아 예수 안에서 우리에게 주어진 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「영원한 시대 이전에」. 시간의 시작 이전을 가리키는 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ σώσαντος ἡμᾶς
  english_pob_choice: who saved us
  chosen_korean: 우리를 구원하시고
  alternatives_korean:
  - 우리를 구하시고
  lexicon: BDAG
  rationale: σῴζω는 신학적 「구원」을 가리키며, 한국 성서 전통의 「구원하다」가 자연스럽다.
- source_word: κλήσει ἁγίᾳ
  english_pob_choice: with a holy calling
  chosen_korean: 거룩한 부르심으로
  alternatives_korean:
  - 거룩한 부르심을 따라
  - 거룩한 소명으로
  lexicon: BDAG
  rationale: 여격은 도구·방편으로 읽는 것이 자연스럽다. 「부르심」은 신약의 신학적 칼링을 한국 성서 전통대로 옮긴다.
- source_word: κατὰ ἰδίαν πρόθεσιν καὶ χάριν
  english_pob_choice: according to his own purpose and grace
  chosen_korean: 자신의 뜻과 은혜를 따라
  alternatives_korean:
  - 그분 자신의 목적과 은혜를 따라
  - 자신의 계획과 은혜를 따라
  lexicon: BDAG
  rationale: πρόθεσις는 미리 정하신 의도·계획을 가리킨다. 「뜻」은 자연스럽고 익숙하나 「계획」도 가능. 본 번역에서는 자연스러운 흐름을 위해 「뜻」을 택한다.
- source_word: πρὸ χρόνων αἰωνίων
  english_pob_choice: before eternal ages
  chosen_korean: 영원 전에
  alternatives_korean:
  - 영원한 시대 이전에
  - 시간이 시작되기 전에
  lexicon: BDAG
  rationale: 본문은 시간 이전의 신적 결정을 가리키는 정형 표현. 「영원 전에」가 한국 성서 전통에서 확립되어 있다.
theological_decisions:
- issue: '''메시아 예수 안에서 영원 전에 주어진 은혜'' — 시간 이전의 신적 결정 표현 유지'
  chosen_reading: 영원 전에 메시아 예수 안에서 우리에게 주어진
  alternative_readings:
  - 시간이 시작되기 전에 메시아 예수 안에서 우리에게 주어진
  rationale: 「영원 전에」는 한국 성서 전통에서 시간 이전의 신적 의도를 가리키는 정형으로 확립되어 있다. 본문의 시간 초월적 무게를 약화시키지 않기 위해 자연스러운 한국어로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological force'
