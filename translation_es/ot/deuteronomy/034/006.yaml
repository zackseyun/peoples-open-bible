translation:
  language: es
  text: Y lo enterró[a] en el valle, en la tierra de Moab, frente a Bet-peor; y nadie[b] conoce su lugar de sepultura hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «lo enterró» no se nombra en este versículo; el contexto inmediato apunta a Yahvé.
    reason: alternative_reading
  - marker: b
    text: O «ningún hombre conoce». El hebreo dice literalmente «no ha conocido un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּר
  english_pob_choice: he buried
  chosen_spanish: lo enterró
  alternatives_spanish:
  - lo sepultó
  - lo enterró él
  lexicon: HALOT
  rationale: El verbo qal consecutivo 3ms exige una forma activa. En español, «lo enterró» es natural y fiel; «sepultó» sería posible, pero «enterrar» comunica bien el acto sin elevar demasiado el registro. Mantengo el sujeto implícito, como en el hebreo, sin resolverlo explícitamente en el texto principal.
- source_word: בַגַּיְ
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el desfiladero
  - en la hondonada
  lexicon: HALOT
  rationale: גַּיְ designa un valle o barranco. «Valle» es la opción más clara y amplia en español; evita una precisión geográfica innecesaria que podría oscurecer el sentido.
- source_word: בְּאֶרֶץ מוֹאָב
  english_pob_choice: in the land of Moab
  chosen_spanish: en la tierra de Moab
  alternatives_spanish:
  - en Moab
  - en el país de Moab
  lexicon: HALOT
  rationale: Conservo la expresión concreta «la tierra de Moab», que refleja bien בְּאֶרֶץ sin comprimirla a un simple topónimo.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: HALOT
  rationale: מוּל indica correspondencia espacial. «Frente a» es idiomático en español y conserva la relación topográfica sin sonar arcaico.
- source_word: בֵּית פְּעוֹר
  english_pob_choice: Beth-peor
  chosen_spanish: Bet-peor
  alternatives_spanish:
  - Beth-peor
  - Bet Peor
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. «Bet-peor» respeta la forma habitual en español bíblico moderno y mantiene la relación con בֵּית.
- source_word: וְלֹא יָדַע אִישׁ
  english_pob_choice: and no one knows
  chosen_spanish: y nadie conoce
  alternatives_spanish:
  - y no conoce nadie
  - y ningún hombre conoce
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y no ha conocido un hombre», con fuerza genérica. Siguiendo el ajuste revisionado del POB inglés hacia una forma más natural, «nadie conoce» preserva el valor idiomático sin perder el alcance universal del negativo.
- source_word: קְבֻרָתוֹ
  english_pob_choice: his burial place
  chosen_spanish: su sepulcro
  alternatives_spanish:
  - su tumba
  - su lugar de sepultura
  lexicon: HALOT
  rationale: En contexto se refiere al lugar donde fue enterrado, no solo al acto de sepultar. «Sepulcro» comunica bien la ubicación funeraria y conserva un tono digno.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia española más estable y natural para la expresión temporal hebrea, conservando su fuerza narrativa desde la perspectiva del narrador.
theological_decisions:
- issue: Sujeto implícito de «lo enterró»
  english_pob_reading: Retain the ambiguous 'he' without explicitly identifying the subject.
  chosen_spanish_reading: Mantener el sujeto implícito sin nombrar a Yahvé en el texto principal.
  alternative_spanish_readings:
  - Yahvé lo enterró
  - lo enterró el Señor
  - fue enterrado
  rationale: Aunque el contexto inmediato apunta a Yahvé como sujeto, el verbo hebreo deja la referencia gramaticalmente implícita. El texto español conserva esa ambigüedad para no cerrar interpretivamente lo que el hebreo deja abierto, dejando la identificación al contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor genérico de אִישׁ
  english_pob_reading: Use 'no one' in the main text for contemporary English naturalness while preserving the generic sense.
  chosen_spanish_reading: Usar «nadie» en el texto principal, con el sentido genérico de la negación hebrea.
  alternative_spanish_readings:
  - ningún hombre
  - ninguna persona
  rationale: El hebreo usa אִישׁ con sentido genérico. En español, «nadie» transmite de forma natural la negación universal sin borrar el alcance del original; la tensión de género del hebreo queda explicable en nota léxica.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa del POB fue revisada desde «no man knows» a «no one knows» por mayor naturalidad contemporánea; la presente versión española adopta el mismo ajuste con «nadie conoce», manteniendo la ambigüedad del sujeto verbal y la referencia topográfica precisa del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en notas y decisiones, pero no se introduce en el texto principal porque el sujeto del verbo permanece implícito en el hebreo.
  - «Bet-peor» sigue la transliteración española usual para el topónimo, evitando traducirlo en el cuerpo del verso.
  - El tiempo verbal y el adverbio final conservan el carácter narrativo retrospectivo de עד הַיּוֹם הַזֶּה.
