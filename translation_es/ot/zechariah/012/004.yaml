translation:
  language: es
  text: En aquel día, declara Yahvé, heriré a todo caballo con pánico y a su jinete con locura. Pero sobre la casa de Judá tendré mis ojos abiertos[a], y heriré a todo caballo de los pueblos[b] con ceguera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abriré mis ojos sobre la casa de Judá»; el hebreo expresa un modismo de atención vigilante, probablemente con favor protector en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo caballo de las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural en español con 'declara Yahvé', manteniendo el valor de pronunciamiento divino y el uso del nombre divino conforme al estándar del proyecto.
- source_word: אַכֶּה
  english_pob_choice: I will strike
  chosen_spanish: heriré
  alternatives_spanish:
  - golpearé
  - castigaré con golpes
  lexicon: HALOT
  rationale: '''Heriré'' conserva el sentido fuerte de acción punitiva sin implicar necesariamente muerte, y funciona bien en el paralelismo judicial del versículo.'
- source_word: כָל סוּס
  english_pob_choice: every horse
  chosen_spanish: todo caballo
  alternatives_spanish:
  - cada caballo
  - todos los caballos
  lexicon: HALOT
  rationale: El hebreo distributivo con כָל puede renderizarse naturalmente en singular colectivo en español; 'todo caballo' mantiene esa distribución sin forzar pluralización.
- source_word: בַּתִּמָּהוֹן
  english_pob_choice: with panic
  chosen_spanish: con pánico
  alternatives_spanish:
  - con desconcierto
  - con espanto
  lexicon: HALOT
  rationale: '''Pánico'' reproduce bien la idea de desmayo/consternación en contexto militar y es idiomático en español contemporáneo.'
- source_word: וְרֹכְבוֹ
  english_pob_choice: and its rider
  chosen_spanish: y a su jinete
  alternatives_spanish:
  - y al que lo monta
  - y a su cabalgador
  lexicon: HALOT
  rationale: '''Jinete'' es el equivalente más natural para el montador del caballo en español; el pronombre posesivo refleja el sufijo hebreo.'
- source_word: בַּשִּׁגָּעוֹן
  english_pob_choice: with madness
  chosen_spanish: con locura
  alternatives_spanish:
  - con frenesí
  - con demencia
  lexicon: HALOT
  rationale: '''Locura'' es una traducción directa y idiomática del término de desquiciamiento/derramamiento mental, sin medicalizar innecesariamente el texto.'
- source_word: וְעַל בֵּית יְהוּדָה אֶפְקַח אֶת עֵינַי
  english_pob_choice: But over the house of Judah I will keep my eyes open
  chosen_spanish: Pero sobre la casa de Judá mantendré mis ojos abiertos
  alternatives_spanish:
  - Y sobre la casa de Judá abriré mis ojos
  - Pero sobre la casa de Judá velaré
  lexicon: HALOT
  rationale: La expresión conserva la imagen hebrea de 'abrir los ojos' sobre alguien, pero en español se formula de modo fluido como una atención vigilante. Se mantiene el contraste adversativo con 'Pero' como en la lectura auditada del POB.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - el linaje de Judá
  lexicon: HALOT
  rationale: '''Casa de Judá'' conserva la fórmula covenantal/familiar del hebreo sin reducirla a un simple topónimo.'
- source_word: כֹל סוּס הָעַמִּים
  english_pob_choice: every horse of the peoples
  chosen_spanish: todo caballo de los pueblos
  alternatives_spanish:
  - todo caballo de las naciones
  - todos los caballos de los pueblos
  lexicon: HALOT
  rationale: '''Pueblos'' reproduce el plural עַמִּים con menor nivel de interpretación que ''naciones'', y mantiene la misma distancia semántica del hebreo.'
- source_word: בַּעִוָּרוֹן
  english_pob_choice: with blindness
  chosen_spanish: con ceguera
  alternatives_spanish:
  - con ceguedad
  - con privación de la vista
  lexicon: HALOT
  rationale: '''Ceguera'' es la equivalencia más directa y clara para el término de juicio final del versículo.'
theological_decisions:
- issue: Sentido de 'abrir mis ojos' sobre la casa de Judá
  english_pob_reading: Rendered as attentive, favorable watchfulness without over-expanding into a full doctrinal claim of protection
  chosen_spanish_reading: mantendré mis ojos abiertos sobre la casa de Judá como imagen de vigilancia atenta y favorable
  alternative_spanish_readings:
  - abriré mis ojos sobre la casa de Judá
  - velaré por la casa de Judá
  rationale: El hebreo es idiomático; en contexto contrasta con el juicio sobre los caballos de los pueblos. La redacción española conserva la imagen sin convertirla en una paráfrasis más explicativa de lo que el texto exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Renderización del nombre divino YHWH
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la identificación explícita del tetragrámaton en el texto principal.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión auditada: se conserva la estructura de contraste juicio/favor, el nombre divino como Yahvé y la ambigüedad idiomática de ‘abrir los ojos’ sin sobrerinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se conserva ‘casa de Judá’ como fórmula estable y no se reduce a ‘Judá’.
  - ‘Pueblos’ se usa para עַמִּים por consistencia con el valor plural colectivo documentado.
  - El paralelismo de juicio ('pánico', 'locura', 'ceguera') se mantiene con vocabulario sobrio y directo.
