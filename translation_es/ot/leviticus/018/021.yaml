    rationale: 'El English POB conserva en nota una aclaración importante: muchos entienden esta prohibición como sacrificio infantil, a menudo descrito como hacer pasar a los hijos ''por el fuego''. El borrador español solo preserva la nota léxica sobre ''descendencia'', perdiendo parte del rastro auditado.'
