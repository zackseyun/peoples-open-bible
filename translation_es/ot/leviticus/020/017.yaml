base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/017.yaml
  text: If a man takes his sister[a], his father's daughter or his mother's daughter, and sees her nakedness, and she sees his nakedness, it is a disgrace, and they shall be cut off in the sight of the sons of their people. He has uncovered his sister's nakedness[b]; he shall bear his guilt.
  footnotes:
  - marker: a
    text: Or 'a shameful thing' or 'a reproach' for 'a disgrace' (Hebrew חֶסֶד in a rare negative sense here, not its usual sense 'kindness' or 'steadfast love').
    reason: lexical_alternative
  - marker: b
    text: '''They shall be cut off'' preserves the Hebrew legal formula without specifying whether the penalty is death, expulsion, or another form of removal.'
    reason: alternative_reading
