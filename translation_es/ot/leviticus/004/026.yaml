  text: וְ/אֶת כָּל חֶלְבּ/וֹ֙ יַקְטִ֣יר הַ/מִּזְבֵּ֔חָ/ה כְּ/חֵ֖לֶב זֶ֣בַח הַ/שְּׁלָמִ֑ים וְ/כִפֶּ֨ר עָלָ֧י/ו הַ/כֹּהֵ֛ן מֵ/חַטָּאת֖/וֹ וְ/נִסְלַ֥ח לֽ/וֹ־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/026.yaml
  text: And he shall burn all its fat on the altar[a], like the fat of the sacrifice of peace offerings. Thus the priest shall make atonement for him for his sin[b], and he shall be forgiven.
  footnotes:
  - marker: a
    text: Or 'peace offerings' may be rendered 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew חַטָּאת can mean either 'sin' or 'sin offering'; here it most likely refers to the man's sin.
    reason: lexical_alternative
