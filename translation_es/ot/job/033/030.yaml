translation:
  language: es
  text: para hacer volver su alma[a] de la fosa[b], para que vea la luz[c] de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida» para נַפְשׁוֹ; el hebreo nephesh puede significar alma, vida o yo.
    reason: lexical_alternative
  - marker: b
    text: O «del sepulcro» o «de la destrucción» para «de la fosa».
    reason: lexical_alternative
  - marker: c
    text: O «para ser iluminado» o «para ser llevado a la luz». El hebreo es breve y poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָשִׁיב
  english_pob_choice: to bring back
  chosen_spanish: hacer volver
  alternatives_spanish:
  - restaurar
  - traer de vuelta
  lexicon: HALOT
  rationale: El infinitivo causativo de שוב expresa hacer regresar o volver. En español, «hacer volver» conserva el valor causativo concreto sin cargar de interpretación teológica adicional, y se ajusta mejor al paralelismo poético que «restaurar».
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - a sí mismo
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o persona/yo. Dado el contexto de rescate de la fosa y de la luz de la vida, «alma» conserva la profundidad antropológica del hebreo y sigue siendo natural en español bíblico; la alternativa «vida» queda como opción léxica legítima.
- source_word: מִנִּי שָׁחַת
  english_pob_choice: from the pit
  chosen_spanish: de la fosa
  alternatives_spanish:
  - del sepulcro
  - de la destrucción
  lexicon: HALOT
  rationale: שחת en poesía sapiencial puede referir una fosa, el sepulcro o destrucción. «Fosa» conserva la imagen concreta y evita anticipar una lectura demasiado interpretativa.
- source_word: לֵאוֹר
  english_pob_choice: that he may be enlightened
  chosen_spanish: para que sea iluminado
  alternatives_spanish:
  - para ver la luz
  - para ser llevado a la luz
  lexicon: HALOT
  rationale: La construcción es breve y poética. En español, «para que sea iluminado» mantiene el efecto de entrada en la luz y recoge el sentido de אור sin convertirlo en una paráfrasis excesiva.
- source_word: בְּאוֹר הַחַיִּים
  english_pob_choice: with the light of life
  chosen_spanish: con la luz de la vida
  alternatives_spanish:
  - por la luz de la vida
  - en la luz de la vida
  lexicon: HALOT
  rationale: La frase es compacta y poética; «con la luz de la vida» conserva el valor asociativo/instrumental de בְּ y reproduce de forma natural la imagen del texto hebreo.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios adicionales; se mantiene la alta concordancia con el texto hebreo y con la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imaginería hebrea de «fosa» y «luz de la vida» sin convertirla en explicación doctrinal.
  - Se usa «alma» para נֶפֶשׁ con nota alternativa porque el campo semántico admite también «vida» en este contexto poético.
