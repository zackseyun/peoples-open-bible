translation:
  language: es
  text: 'Y Micaías dijo: «Mira, verás en aquel día, cuando entres en un aposento interior[a] para esconderte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite literalmente «cuarto/aposento», una expresión que puede indicar internarse hacia adentro para esconderse; también puede entenderse «de cuarto en cuarto» o «en un aposento interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol pide avance secuencial; «Y ... dijo» conserva el flujo hebreo sin añadir matices que el texto no exige.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Micaiahu
  lexicon: Convención bíblica española
  rationale: Se translitera el nombre propio a una forma natural en español bíblico. «Micaías» mantiene la identificación tradicional y es inteligible para lectores de iglesia.
- source_word: הִנְּךָ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: Es una interjección deíctica que llama la atención. «Mira» conserva la fuerza exhortativa en español moderno mejor que la fórmula arcaica «He aquí».
- source_word: רֹאֶה
  english_pob_choice: you will see
  chosen_spanish: verás
  alternatives_spanish:
  - estarás viendo
  - vas a ver
  lexicon: HALOT
  rationale: Aunque formalmente es un participio, aquí funciona predictivamente con valor futuro. «Verás» expresa con naturalidad esa expectativa sin perder el sentido.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se refleja con la fórmula bíblica común en español. «Aquel» conserva la distancia deíctica del original.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en que
  - en el que
  lexicon: HALOT
  rationale: Introduce la circunstancia temporal del ver. «Cuando» es la equivalencia más natural y precisa en español.
- source_word: תָּבֹא
  english_pob_choice: you go
  chosen_spanish: entres
  alternatives_spanish:
  - vayas
  - entres y vayas
  lexicon: HALOT
  rationale: Con el contexto de movimiento hacia el interior y el propósito de esconderse, «entres» capta mejor la dirección que «vayas».
- source_word: חֶדֶר בְּחֶדֶר
  english_pob_choice: into an inner room
  chosen_spanish: en una habitación interior
  alternatives_spanish:
  - de cuarto en cuarto
  - en un aposento interior
  lexicon: HALOT
  rationale: La repetición hebrea de «room» expresa internación hacia lo más adentro. «Habitación interior» comunica esa idea con claridad en español sin volverla demasiado literal o extraña.
- source_word: לְהֵחָבֵה
  english_pob_choice: to hide
  chosen_spanish: para esconderte
  alternatives_spanish:
  - para ocultarte
  - para esconderse
  lexicon: HALOT
  rationale: El infinitivo de propósito tiene valor reflexivo en contexto. «Esconderte» preserva ese matiz mejor que un impersonal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una formulación más formal para la expresión deíctica y entendió חֶדֶר בְּחֶדֶר como «into an inner room». La versión española conserva esa dirección semántica, pero opta por un equivalente natural en español («habitación interior») y mantiene la posibilidad alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparece explícitamente; en este versículo no aparece ningún nombre divino.
  - Se mantiene el registro bíblico sobrio, evitando arcaísmos innecesarios pero conservando una cadencia publicable.
  - La expresión espacial se traduce de forma no mecánica para no perder la idea de internación progresiva del hebreo.
