translation:
  language: es
  text: Es una afección cutánea crónica en la piel de su cuerpo[a], y el sacerdote lo declarará inmundo; no lo aislará, porque es inmundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una afección cutánea de larga duración». Las versiones tradicionales suelen traducir צָרַעַת como «lepra», pero el término hebreo en Levítico abarca un rango más amplio de afecciones que la lepra moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: afección cutánea
  alternatives_spanish:
  - enfermedad de la piel
  - afección de la piel
  - lepra
  lexicon: HALOT
  rationale: El término hebreo abarca un conjunto más amplio de trastornos de la piel que la lepra moderna. 'Afección cutánea' conserva la amplitud semántica sin medicalizar de más ni fijar una enfermedad específica que el hebreo no exige.
- source_word: נוֹשֶׁנֶת
  english_pob_choice: chronic
  chosen_spanish: crónica
  alternatives_spanish:
  - antigua
  - de larga duración
  - persistente
  lexicon: HALOT
  rationale: El participio expresa una condición antigua o de larga data. 'Crónica' comunica bien en español una afección establecida y persistente, con naturalidad moderna.
- source_word: בְּעוֹר בְּשָׂרוֹ
  english_pob_choice: in the skin of his body
  chosen_spanish: en la piel de su cuerpo
  alternatives_spanish:
  - en la piel de su carne
  - sobre la piel de su cuerpo
  lexicon: HALOT
  rationale: '''Cuerpo'' es más natural en español contemporáneo que ''carne'' en este contexto físico, y mantiene el sentido localizador del hebreo sin introducir una carga antropológica no buscada aquí.'
- source_word: וְטִמְּאוֹ
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo hará impuro
  - lo declarará inmundo
  lexicon: HALOT
  rationale: En el contexto sacerdotal, el sacerdote no causa la impureza sino que la reconoce y la declara oficialmente. 'Declarará impuro' preserva ese valor jurídico-ritual. Se usa 'impuro' aquí por claridad natural en español, aunque 'inmundo' podría conservar el eco tradicional.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-ley
  - el ministro cultual
  lexicon: HALOT
  rationale: Es la designación estándar y directa del oficio cultual. 'Sacerdote' es el equivalente natural y fiel en español.
- source_word: לֹא יַסְגִּרֶנּוּ
  english_pob_choice: he shall not isolate him
  chosen_spanish: no lo aislará
  alternatives_spanish:
  - no lo encerrará
  - no lo pondrá en cuarentena
  - no lo recluirá
  lexicon: HALOT
  rationale: El verbo describe colocarlo aparte para observación. 'Aislará' expresa bien la acción en español moderno sin el exceso clínico de 'cuarentena' ni la dureza arcaica de 'encerrará'.
- source_word: כִּי טָמֵא הוּא
  english_pob_choice: for he is unclean
  chosen_spanish: porque es impuro
  alternatives_spanish:
  - porque está impuro
  - pues es impuro
  lexicon: HALOT
  rationale: 'La cláusula causal explica por qué no se lo somete a nueva observación: el diagnóstico ya está establecido. ''Impuro'' conserva el valor ritual del término טמא en un registro claro y consistente.'
theological_decisions:
- issue: Terminología de impureza ritual
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - impropio ritualmente
  rationale: En Levítico, טמא funciona en sentido ritual-legal, no moral. 'Impuro' comunica bien el estado ceremonial sin sugerir culpabilidad personal. Se evita 'sucio' o una moralización indebida, y se mantiene la tensión entre diagnóstico ritual y pureza cultual.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Valor de צָרַעַת
  english_pob_reading: skin disease
  chosen_spanish_reading: afección cutánea
  alternative_spanish_readings:
  - enfermedad de la piel
  - lepra
  rationale: 'Se preserva la cautela del POB inglés: no identificar automáticamente צָרַעַת con lepra moderna. ''Afección cutánea'' deja abierta la amplitud del término hebreo y evita una equivalencia médica demasiado específica.'
  doctrine_reference: Lexical consistency for Leviticus purity terminology
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del texto base y del audit trail inglés, sin revisiones aplicadas en la fuente más reciente. Se mantiene la equivalencia óptima: claridad natural en español, pero con cuidado de no estrechar el alcance de צָרַעַת ni suavizar el lenguaje ritual de טמא.'
  spanish_consistency_notes:
  - Se mantiene 'impuro' de forma consistente para טמא dentro del marco ritual de Levítico.
  - Se evita 'lepra' como traducción principal de צָרַעַת para no imponer una identificación médica ajena al hebreo.
  - '''Aislará'' comunica la función observacional del verbo sin cargarlo de connotaciones sanitarias modernas excesivas.'
