translation:
  language: es
  text: El perezoso anhela, pero no tiene nada; mientras que el apetito de los diligentes quedará ricamente satisfecho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'será engordado', una imagen hebrea de abundancia y plena satisfacción.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתְאַוָּה
  english_pob_choice: craves
  chosen_spanish: anhela
  alternatives_spanish:
  - codicia
  - desea intensamente
  lexicon: HALOT
  rationale: El participio hitpael expresa un deseo continuo e insistente. 'Anhela' conserva la idea de deseo fuerte sin volverla excesivamente coloquial o negativa como 'codicia'.
- source_word: וָאַיִן
  english_pob_choice: but ... has nothing
  chosen_spanish: pero no tiene nada
  alternatives_spanish:
  - y no hay nada
  - pero nada tiene
  lexicon: HALOT
  rationale: La construcción hebrea indica contraste con ausencia de satisfacción. En español, 'pero no tiene nada' comunica con naturalidad la carencia resultante sin añadir contenido ajeno.
- source_word: נַפְשׁוֹ
  english_pob_choice: his appetite
  chosen_spanish: apetito
  alternatives_spanish:
  - alma
  - deseo
  - vida
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ no apunta al alma en sentido técnico, sino al impulso o apetencia interior. 'Apetito' preserva el matiz concreto y la paralelismo con la segunda mitad del versículo.
- source_word: עָצֵל
  english_pob_choice: the sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el holgazán
  - el indolente
  lexicon: HALOT
  rationale: Es un término sapiencial para la persona habitualmente perezosa. 'El perezoso' es claro, bíblico y natural en español, aunque menos proverbial que 'holgazán'.
- source_word: חָרֻצִים
  english_pob_choice: the diligent
  chosen_spanish: los diligentes
  alternatives_spanish:
  - los industriosos
  - los laboriosos
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivado para quienes se caracterizan por diligencia. El plural 'los diligentes' respeta la forma hebrea y el valor proverbial general.
- source_word: תְּדֻשָּׁן
  english_pob_choice: will be richly satisfied
  chosen_spanish: será abundantemente saciado
  alternatives_spanish:
  - será llenado de abundancia
  - será engrosado
  - quedará plenamente satisfecho
  lexicon: HALOT
  rationale: El verbo Pual de דשׁן literalmente evoca ser hecho graso o próspero, una metáfora de abundancia y satisfacción. 'Abundantemente saciado' conserva la imagen de plenitud sin volverla extraña para el lector español.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en ambos cola del proverbio
  english_pob_reading: appetite, not the immaterial soul in a technical theological sense
  chosen_spanish_reading: apetito, no 'alma' en sentido doctrinal
  alternative_spanish_readings:
  - alma
  - vida
  - deseo
  rationale: El contexto de sabiduría habla de deseo, satisfacción y carencia, no de la antropología espiritual en sentido sistemático. Traducirlo como 'apetito' mantiene la fuerza concreta del proverbio y evita una lectura doctrinal ajena al pasaje.
  doctrine_reference: Antropología bíblica / sabiduría veterotestamentaria
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés, que eliminó cualquier sobreespecificación en la primera cola y conservó la metáfora de abundancia en la segunda. En español se mantiene el contraste breve del hebreo, con 'no tiene nada' para וָאַיִן y una solución idiomática para תְּדֻשָּׁן sin perder la imagen corporal de prosperidad.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y proverbial.
  - '''Apetito'' se usa de forma consistente para נֶפֶשׁ en este versículo.'
  - '''Diligentes'' respeta el plural sustantivado del hebreo.'
  - El orden de las dos cláusulas conserva el paralelismo antitético del original.
