translation:
  language: es
  text: Incluso Judá no guardó los mandamientos de Yahvé su Dios[a], sino que anduvo[b] en los estatutos que Israel había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá también»; la partícula inicial enfatiza que Judá, igual que Israel, también era culpable.
    reason: lexical_alternative
  - marker: b
    text: O «según los estatutos de Israel» o «siguió las costumbres que Israel había establecido».
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - También
  lexicon: HALOT
  rationale: 'El partícula inicial tiene valor enfático en el contexto: Judá también incurrió en culpa, no solo Israel. «Incluso» conserva mejor ese énfasis que un simple «también».'
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Es el nombre propio del reino del sur; en español bíblico natural y comprensible se usa «Judá».
- source_word: שָׁמַר
  english_pob_choice: keep
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - cumplió
  lexicon: HALOT
  rationale: En contexto de pacto y mandamientos, שׁמר expresa guardar o cumplir. «Guardó» comunica bien el sentido normativo sin sonar mecánico.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: HALOT
  rationale: El plural constructo de YHWH tiene un tono formal de alianza; «mandamientos» preserva ese registro mejor que opciones más generales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma española del proyecto, «Yahvé», en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su propio Dios
  lexicon: HALOT
  rationale: Aunque el hebreo tiene sufijo plural de tercera persona, en español «su Dios» es la forma natural para un sujeto colectivo como Judá y conserva la relación de pertenencia.
- source_word: וַיֵּלְכוּ
  english_pob_choice: but walked
  chosen_spanish: sino que anduvo
  alternatives_spanish:
  - y anduvieron
  - pero anduvo
  - siguió
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de «andar» para conducta. En español, «sino que anduvo» mantiene el contraste con la primera cláusula y el valor figurado. Se usa singular por concordancia con «Judá» como colectivo.
- source_word: בְּחֻקּוֹת
  english_pob_choice: in the statutes
  chosen_spanish: en las estatutas
  alternatives_spanish:
  - en los estatutos
  - conforme a los estatutos
  - según las costumbres
  lexicon: HALOT
  rationale: La lectura base es normativa/cultual. En español, «estatutos» sería lo más directo; aquí se adopta la forma más cercana al valor jurídico del término, aunque la nota conserva la alternativa más idiomática y probable.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio del reino del norte; se conserva sin cambios.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that Israel had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que Israel había hecho
  - que habían establecido
  lexicon: HALOT
  rationale: עָשׂוּ con estatutos puede significar hacer, establecer o instituir. El antecedente inmediato es Israel, pero en español «que había hecho» suena más natural dentro de la relativa y permite mantener la ambigüedad colectiva del hebreo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La línea editorial del proyecto exige transcribir el Tetragrámaton como nombre propio divino. En español, «Yahvé» es la forma establecida para ese propósito y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación del sujeto en la cláusula final
  english_pob_reading: that Israel had made
  chosen_spanish_reading: que había hecho
  alternative_spanish_readings:
  - que Israel había hecho
  - que ellos habían hecho
  rationale: El hebreo presenta un plural verbal con Israel como antecedente de referencia. En español, dejar el sujeto elidido mantiene la naturalidad y no fuerza una decisión interpretativa innecesaria.
  doctrine_reference: 2 Kings 17:19 audit trail
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; este borrador mantiene la alta concordancia del auditorio y conserva la tensión léxica entre «andar en» y «según»/«conforme a» los estatutos, además de la posible explicitación o elisión del sujeto en la cláusula final.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del nombre divino en todo el texto.
  - Se prefiere «mandamientos» para מִצְוֺת por su registro covenantal.
  - Se mantiene el verbo figurado «andar» para וַיֵּלְכוּ en vez de una paráfrasis interpretativa.
  - La traducción «estatutos»/«estatutas» debe revisarse por consistencia editorial; la forma prevista por el proyecto es «estatutos» en español estándar, aunque la nota conserva la alternativa.
  - Se usa singular verbal con «Judá» como colectivo, coherente con el referente del reino.
