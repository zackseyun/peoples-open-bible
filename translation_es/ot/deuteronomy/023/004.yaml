translation:
  language: es
  text: No entrará amonita ni moabita en la asamblea de Yahvé[a]; aun hasta la décima generación[b], ninguno de ellos entrará en la asamblea de Yahvé para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'congregación de Yahvé' para 'asamblea de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice tanto 'hasta la décima generación' como 'para siempre', preservando la fuerza de exclusión duradera sin reducir una expresión a la otra.
    reason: cultural_note
lexical_decisions:
- source_word: עַמּוֹנִי
  english_pob_choice: Ammonite
  chosen_spanish: amonita
  alternatives_spanish:
  - ammonita
  - hombre de Amón
  lexicon: HALOT
  rationale: El gentilicio se vierte de manera natural al español con el etnónimo femenino/masculino de forma adjetival 'amonita'; la forma 'ammonita' es comprensible pero menos estándar en español bíblico actual.
- source_word: מוֹאָבִי
  english_pob_choice: Moabite
  chosen_spanish: moabita
  alternatives_spanish:
  - moabita
  - hombre de Moab
  lexicon: HALOT
  rationale: Como en el caso anterior, el gentilicio se traduce con el etnónimo español usual 'moabita', que conserva la referencia étnica sin añadir explicación innecesaria.
- source_word: בִּקְהַל יְהוָה
  english_pob_choice: assembly of Yahweh
  chosen_spanish: la asamblea de Yahvé
  alternatives_spanish:
  - la congregación de Yahvé
  - la asamblea del SEÑOR
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce bien קָהָל como comunidad convocada en sentido oficial; se mantiene ''Yahvé'' para יְהוָה según la convención del proyecto, evitando la sustitución por un título.'
- source_word: יָבֹא
  english_pob_choice: may enter
  chosen_spanish: entrará
  alternatives_spanish:
  - podrá entrar
  - que entre
  lexicon: HALOT
  rationale: En un contexto legal de prohibición, el imperfecto hebreo expresa inadmisión. En español, 'no entrará' comunica con naturalidad la exclusión normativa sin suavizarla.
- source_word: גַּם דּוֹר עֲשִׂירִי
  english_pob_choice: even to the tenth generation
  chosen_spanish: ni aun hasta la décima generación
  alternatives_spanish:
  - incluso hasta la décima generación
  - hasta la décima generación
  lexicon: HALOT
  rationale: '''Ni aun'' conserva el valor intensificador de גַּם y la fórmula generacional se expresa de modo idiomático en español con ''décima generación''.'
- source_word: לָהֶם
  english_pob_choice: none of them
  chosen_spanish: ninguno de ellos
  alternatives_spanish:
  - ninguno de los suyos
  - ninguno perteneciente a ellos
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa que prefirió una formulación más natural y precisa, 'ninguno de ellos' evita una paráfrasis explicativa excesiva y mantiene la referencia a esos pueblos y su descendencia.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la manera más clara y litúrgicamente sobria de expresar la duración indefinida de עוֹלָם en este contexto legal.'
theological_decisions:
- issue: Tensión entre la 'décima generación' y 'para siempre'
  english_pob_reading: Retain both expressions in the main text without harmonizing them away.
  chosen_spanish_reading: 'Conservar ambas expresiones en el texto principal: ''ni aun hasta la décima generación'' y ''para siempre''.'
  alternative_spanish_readings:
  - reducir 'décima generación' a un mero modismo de exclusión total
  - atenuar 'para siempre' como intensificación secundaria
  rationale: El hebreo presenta ambas fórmulas y la POB inglesa las preserva para no resolver la tensión del pasaje. El español debe mantener esa misma tensión legal y temporal, sin explicar de más ni nivelar las dos expresiones.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una fórmula más pesada por 'none of them', priorizando naturalidad y precisión. El español refleja esa misma preferencia con 'ninguno de ellos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Asamblea'' se usa de forma consistente para קָהָל en sentido comunitario-formal.'
  - '''Amonita/moabita'' conservan el valor étnico sin introducir glosas.'
  - La negación legal se expresa con un futuro de prohibición ('no entrará') para un registro bíblico claro y digno.
