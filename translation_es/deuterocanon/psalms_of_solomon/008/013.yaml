  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: violencia contra el altar, contaminación ritual, especificación de sangre menstrual, y contraste con carne profana/común. También respeta la política del proyecto al usar «Yahvé». Sin embargo, el verbo español «profanaron» para ἐμίανιν desplaza el matiz de contaminación/impureza ritual de μιαίνω hacia una violación de santidad más interpretativa; «contaminaron» o «mancharon ritualmente» se alinea mejor con «defiled».'
  spanish_quality_summary: El español es claro y legible, pero la puntuación mejora si se evita la coma tras «Yahvé» y se integra mejor la serie verbal. «Pisotearon el altar de Yahvé con toda inmundicia» fluye naturalmente. «Carne profana» es comprensible y digno. El conjunto suena eclesialmente legible sin calco excesivo.
  glossary_alignment: 'Alineación buena: κύριος referido al nombre divino como «Yahvé» está explícitamente justificado; ἀκαθαρσία como «inmundicia» preserva fuerza ritual; ἄφεδρος αἵματος como «sangre menstrual» sigue la revisión inglesa; κρέα βέβηλα como «carne profana» mantiene el contraste santo/común. El único ajuste recomendado es ἐμίανιν -> «contaminaron» para reflejar mejor la contaminación ritual.'
  issues:
  - severity: medium
    issue: «Profanaron» para ἐμίανιν es demasiado interpretativo
    rationale: μιαίνω en contexto cultual significa contaminar/defile por impureza ritual. «Profanar» se acerca más a βεβηλόω o a una violación directa de lo sagrado. Dado que «profana» ya aparece después para βέβηλα, repetir esa raíz además reduce la distinción léxica del original.
  - severity: low
    issue: Puntuación algo trabada tras «Yahvé[a]»
    rationale: 'La coma después de «Yahvé[a]» hace menos natural la construcción verbal. Sin esa pausa, la frase corre mejor en español: «Pisotearon el altar de Yahvé[a] con toda inmundicia...».'
  revised_spanish_text: Pisotearon el altar de Yahvé[a] con toda inmundicia, y con sangre menstrual[b] contaminaron los sacrificios, como carne profana[c];
