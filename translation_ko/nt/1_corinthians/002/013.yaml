  text: ἃ καὶ λαλοῦμεν οὐκ ἐν διδακτοῖς ἀνθρωπίνης σοφίας λόγοις, ἀλλ’ ἐν διδακτοῖς ⸀πνεύματος, πνευματικοῖς πνευματικὰ συγκρίνοντες.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/013.yaml
  text: These things we also speak[a], not in words taught by human wisdom, but in those taught by the Spirit, interpreting spiritual things to spiritual people.
  footnotes:
  - marker: a
    text: 'Or, "interpreting spiritual things to spiritual people." The Greek can also be taken that way because πνευματικοῖς may be read as masculine rather than as an implied reference to spiritual words.'
