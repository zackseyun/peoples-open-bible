translation:
  language: es
  text: los vestidos de gala[a], y los mantos[b], y los chales[c], y los monederos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestiduras de fiesta» o «ropas finas» para «vestidos de gala». El hebreo probablemente se refiere a prendas especiales y costosas más que a ropa común.
    reason: lexical_alternative
  - marker: b
    text: O «capas» o «envolturas» para «mantos».
    reason: lexical_alternative
  - marker: c
    text: O «velos» o «pañuelos» para «chales». El tipo exacto de prenda es incierto.
    reason: lexical_alternative
  - marker: d
    text: O «bolsas» o «bolsitas» para «monederos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַּחֲלָצוֹת
  english_pob_choice: festal robes
  chosen_spanish: vestidos de gala
  alternatives_spanish:
  - vestidos festivos
  - ropas finas
  - vestiduras de fiesta
  lexicon: HALOT, BDB
  rationale: El término hebreo se refiere a prendas especiales o costosas, no a ropa ordinaria. «Vestidos de gala» comunica bien en español la idea de ropa para ocasiones formales o festivas, con un matiz de distinción acorde al contexto.
- source_word: מַּעֲטָפוֹת
  english_pob_choice: cloaks
  chosen_spanish: mantos
  alternatives_spanish:
  - capas
  - envolturas
  - mantas
  lexicon: HALOT, BDB
  rationale: La raíz sugiere una prenda exterior envolvente. «Mantos» conserva la idea de una cobertura exterior amplia y es natural en español bíblico contemporáneo; «capas» también sería posible, pero puede sonar más coloquial o más específica de otra época.
- source_word: מִּטְפָּחוֹת
  english_pob_choice: shawls
  chosen_spanish: chales
  alternatives_spanish:
  - velos
  - pañuelos
  - mantillas
  lexicon: HALOT, BDB
  rationale: El término denota un textil de cobertura o envoltura para llevar puesto. «Chales» es una solución amplia y legible en español para un accesorio textil femenino sin forzar el sentido a «velo» o «pañuelo», que podrían estrechar indebidamente el referente.
- source_word: חֲרִיטִים
  english_pob_choice: purses
  chosen_spanish: bolsas
  alternatives_spanish:
  - bolsitas
  - puchas
  - monederos
  lexicon: HALOT, BDB
  rationale: El sustantivo designa una bolsa o bolsa pequeña para guardar valores o dinero. En español, «bolsas» transmite la idea general con claridad; «bolsitas» o «monederos» añadirían una especificidad no segura en el hebreo.
translation_notes:
  revision_awareness: La versión inglesa POB se mantiene sin cambios sustantivos en este pasaje; la presente propuesta conserva el inventario de prendas y accesorios con equivalentes españoles naturales, manteniendo las incertidumbres léxicas documentadas en las notas alternativas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio.
  - Se evita calcar mecánicamente la sintaxis inglesa; el español fluye como una lista nominal natural.
  - Se preserva la incertidumbre léxica donde el hebreo no especifica con total precisión el tipo exacto de accesorio o prenda.
