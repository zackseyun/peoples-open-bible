  yaml_path: translation/ot/ruth/004/001.yaml
  text: Now Boaz had gone up to the gate and sat down there[a], and behold, the redeemer of whom Boaz had spoken was passing by. So he said, "Turn aside, sit down here[b], so-and-so." And he turned aside and sat down.
  footnotes:
