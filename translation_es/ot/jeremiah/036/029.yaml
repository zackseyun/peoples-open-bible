translation:
  language: es
  text: 'Y en cuanto a Joacim, rey de Judá, dirás: «Así dice Yahvé: Tú has quemado este rollo, diciendo: “¿Por qué escribiste en él, diciendo: ‘El rey de Babilonia ciertamente vendrá y destruirá esta tierra, y eliminará de ella a hombre y bestia[a]’?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «humanidad y animales». La expresión hebrea «hombre y bestia» es una fórmula fija para indicar devastación total.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And concerning
  chosen_spanish: Y en cuanto a
  alternatives_spanish:
  - Y acerca de
  - Y contra
  lexicon: HALOT
  rationale: La preposición עַל con un verbo de habla introduce el tema o destinatario de la profecía; en español, «en cuanto a» comunica mejor ese encuadre que una lectura hostil automática como «contra».
- source_word: תֹּאמַר
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - deberás decir
  - dirás tú
  lexicon: HALOT
  rationale: El imperfecto 2ms funciona como instrucción profética. «Dirás» mantiene la fuerza directiva de manera natural y sobria.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula del mensajero profético. Para יְהוָה se usa «Yahvé» según el criterio del proyecto, sin ocultar el nombre divino.
- source_word: שָׂרַפְתָּ
  english_pob_choice: have burned
  chosen_spanish: has quemado
  alternatives_spanish:
  - quemaste
  - has incendiado
  lexicon: HALOT
  rationale: El perfecto acusa una acción completada y vigente en la confrontación profética; el presente perfecto español expresa bien esa inmediatez acusatoria.
- source_word: הַמְּגִלָּה הַזֹּאת
  english_pob_choice: this scroll
  chosen_spanish: este rollo
  alternatives_spanish:
  - este pergamino
  - este documento
  lexicon: HALOT
  rationale: מְגִלָּה es un documento enrollado; «rollo» conserva la imagen material y funciona bien en español bíblico contemporáneo.
- source_word: כָּתַבְתָּ עָלֶיהָ
  english_pob_choice: have you written on it
  chosen_spanish: escribiste en él
  alternatives_spanish:
  - escribiste sobre él
  - has escrito en él
  lexicon: HALOT
  rationale: Aunque עַל puede ser «sobre», en español «escribir en él» resulta más natural para un rollo y mantiene el sentido de inscribir contenido en el documento.
- source_word: בֹּא יָבֹא
  english_pob_choice: will surely come
  chosen_spanish: ciertamente vendrá
  alternatives_spanish:
  - vendrá sin falta
  - seguramente vendrá
  lexicon: HALOT
  rationale: El infinitivo absoluto más imperfecto intensifica la certeza. «Ciertamente vendrá» preserva esa fuerza sin sonar rígido.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo directo y transparente.
- source_word: וְהִשְׁחִית
  english_pob_choice: and destroy
  chosen_spanish: y destruirá
  alternatives_spanish:
  - y devastará
  - y arruinará
  lexicon: HALOT
  rationale: El hiphil de שׁחת en contexto profético expresa destrucción severa; «destruirá» es claro y fiel.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra aquí
  - este país
  lexicon: HALOT
  rationale: En Jeremías, «tierra» conserva mejor la resonancia territorial y pactual que «país».
- source_word: וְהִשְׁבִּית מִמֶּנָּה
  english_pob_choice: and cut off from it
  chosen_spanish: y hará cesar de ella
  alternatives_spanish:
  - y apartará de ella
  - y eliminará de ella
  lexicon: HALOT
  rationale: הִשְׁבִּית significa hacer cesar o poner fin; «hará cesar de ella» conserva el valor causativo sin perder el matiz de desolación.
- source_word: אָדָם וּבְהֵמָה
  english_pob_choice: man and beast
  chosen_spanish: hombre y bestia
  alternatives_spanish:
  - humano y animal
  - humanidad y animales
  lexicon: HALOT
  rationale: Se mantiene la fórmula fija de devastación total. «Hombre y bestia» reproduce el paralelismo idiomático del hebreo y el audit trail inglés; en nota se puede explicitar su valor colectivo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama directamente. Conforme al criterio del proyecto, se vierte como «Yahvé» para no enmascarar el nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Stock phrase אָדָם וּבְהֵמָה as total devastation formula
  english_pob_reading: man and beast
  chosen_spanish_reading: hombre y bestia
  alternative_spanish_readings:
  - humanidad y animales
  - personas y animales
  rationale: La combinación funciona como fórmula profética de desolación total. «Hombre y bestia» conserva la cadencia y la concreción representativa del hebreo; una versión inclusiva sería posible, pero diluye la expresión formularia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: אָדָם → man / humankind (context)'
translation_notes:
  revision_awareness: Comparado con el audit trail inglés, mantengo la misma lectura de עַל como introducción temática y la misma equivalencia para la fórmula de devastación; la principal adaptación es idiomática en español («en cuanto a», «rollo», «hará cesar de ella»). No se documentan cambios de revisión en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Tierra» se conserva para הָאָרֶץ, no «país», por la resonancia profético-pactual.
  - La fórmula «hombre y bestia» se mantiene compacta y con nota para su sentido colectivo.
