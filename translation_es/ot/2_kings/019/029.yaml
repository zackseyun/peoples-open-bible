  text: 'And this shall be the sign for you: this year eat what grows by itself[a], and in the second year what springs from that; and in the third year sow and reap[b], and plant vineyards and eat their fruit.'
  footnotes:
  - marker: a
    text: Or 'volunteer growth' for 'what grows by itself'; the Hebrew term refers to produce that comes up without sowing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'what springs from that' is rare and may mean 'second growth'—produce arising in the second year from the previous year's unsown crop.
    reason: lexical_alternative
