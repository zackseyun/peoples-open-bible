translation:
  language: es
  text: Al que hirió a reyes grandes[a], porque su amor leal[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al que golpeó a reyes grandes». El participio hebreo con לְ continúa la fórmula de alabanza del salmo.'
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce חסד, un término que suele abarcar lealtad de pacto, benevolencia y misericordia; también puede verterse «misericordia» o «amor constante».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַכֵּה
  english_pob_choice: To him who struck down
  chosen_spanish: Al que derrotó
  alternatives_spanish:
  - Al que golpeó
  - Al que hirió
  - Al que derribó
  lexicon: WLC/HALOT
  rationale: El לְ inicial conserva en español la fórmula de alabanza dirigida a Dios, por eso uso «Al que». En este contexto participial, מַכֵּה expresa una acción decisiva sobre reyes; «derrotó» comunica mejor el resultado de victoria/abatimiento que un simple «golpeó», sin añadir más de lo que el hebreo permite.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: HALOT
  rationale: El sustantivo plural es directo y no exige expansión. «Reyes» es el equivalente natural y transparente en español.
- source_word: גְּדֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - mighty
  - poderosos
  lexicon: HALOT
  rationale: «Grandes» sigue de cerca el adjetivo hebreo y mantiene el paralelismo del versículo. «Poderosos» interpretaría más fuertemente la idea de fuerza; por eso se deja como alternativa, no como principal.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor constante
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חסד abarca amor de pacto, lealtad y benevolencia durable. «Amor leal» comunica bien esa mezcla sin quedarse solo en afecto ni reducirse a «misericordia». Mantiene además la cadencia litúrgica del refrán.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para eternidad/para siempre». En español, la fórmula más natural y litúrgicamente reconocible es «para siempre»; el verbo «es» se sobreentiende en la clausula refránica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» comunica con claridad la relación explicativa del refrán. Aunque «for» en inglés conserva un tono litúrgico, aquí «porque» resulta más natural y no altera el sentido.
theological_decisions:
- issue: Cómo renderizar חסד en el refrán repetitivo
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal es para siempre
  alternative_spanish_readings:
  - su misericordia es para siempre
  - su amor constante es para siempre
  - su fidelidad amorosa es para siempre
  rationale: El texto celebra el חסד de Yahvé como amor de pacto y lealtad duradera. «Amor leal» preserva esa densidad teológica sin reducirla a mera emoción (amor) ni a un solo aspecto jurídico o compasivo (misericordia).
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Valor de לְ al inicio del hemistiquio
  english_pob_reading: To him who struck down...
  chosen_spanish_reading: Al que derrotó...
  alternative_spanish_readings:
  - Para el que derrotó...
  - Al que golpeó...
  rationale: La preposición prefija marca la fórmula de alabanza dirigida al destinatario del salmo. «Al que» reproduce mejor la función litúrgica que una traducción demasiado literal o una preposición que sonaría extraña en español.
  doctrine_reference: Salmo 136 como liturgia responsorial de alabanza
translation_notes:
  revision_awareness: La versión inglesa revisada mantuvo sin cambios la decisión de lectura y el consenso externo fue de alta concordancia; por eso no se requieren ajustes textuales mayores en español. La única adaptación necesaria es naturalizar la clausula final en español sin perder el valor refránico de לְעוֹלָם חַסְדּוֹ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparece el nombre divino en el contexto del salmo, aunque este versículo no lo contiene explícitamente.
  - Se conserva el tono litúrgico responsorial del Salmo 136 mediante una sintaxis breve y formularia.
  - «Amor leal» se usa aquí de manera consistente para חסד, evitando alternar innecesariamente con «misericordia» dentro del mismo refrán.
