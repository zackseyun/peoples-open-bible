  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperativos plurales dirigidos a «fuego y calor», con la secuencia «bendecir / cantar alabanza / exaltar» y el cierre temporal de perpetuidad. También conserva correctamente la nota léxica sobre καῦμα como posible «calor abrasador».'
