revisions:
- from: Y no darás tu emisión a la esposa de tu prójimo[a], para hacerte inmundo con ella.
  to: Y no darás tu emisión a la esposa de tu compañero[a], para quedar inmundo con ella.
  rationale: 'Se hace una reparación menor para alinear mejor el español con el análisis fuente-POB: se cambia ''prójimo'' por ''compañero'' para reflejar mejor עֲמִית en contexto legal-comunitario, y ''hacerte inmundo'' por ''quedar inmundo'' para representar con más naturalidad el valor resultativo de לְ/טָמְאָה. También se limpia la nota al pie para evitar mezcla de idiomas y una opción literal poco inteligible.'
