translation:
  language: es
  text: 'Entonces José hizo jurar a los hijos de Israel, diciendo: «Dios ciertamente los visitará[a], y ustedes harán subir mis huesos de aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Dios ciertamente los atenderá». El hebreo usa una forma intensificada del verbo, que expresa certeza y una atención divina activa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁבַּע
  english_pob_choice: made ... swear
  chosen_spanish: hizo jurar
  alternatives_spanish:
  - los puso bajo juramento
  - les tomó juramento
  lexicon: HALOT
  rationale: 'El hiphil de שׁבע es causativo: José provoca que los hijos de Israel presten juramento. «Hizo jurar» conserva esa fuerza causativa con un español natural y solemne.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene el valor literal y familiar/tribal del hebreo. «Hijos» preserva mejor la concreción genealógica que «israelitas».
- source_word: פָּקֹד יִפְקֹד
  english_pob_choice: God will surely visit you
  chosen_spanish: Dios ciertamente los visitará
  alternatives_spanish:
  - Dios ciertamente los atenderá
  - Dios ciertamente los tomará en cuenta
  lexicon: HALOT
  rationale: Se conserva «visitará» para reflejar más directamente el campo semántico tradicional de פקד y su resonancia bíblica. «Ciertamente» reproduce la intensificación del infinitivo absoluto más imperfecto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere claramente al Dios de Israel; «Dios» es la traducción estándar y suficiente en este contexto.
- source_word: וְהַעֲלִתֶם
  english_pob_choice: you shall bring up
  chosen_spanish: ustedes sacarán
  alternatives_spanish:
  - ustedes llevarán arriba
  - ustedes subirán
  lexicon: HALOT
  rationale: El verbo hiphil de עלה puede expresar hacer subir o sacar. En español, «sacar» comunica con claridad la acción de trasladar los huesos desde Egipto hacia la tierra prometida sin forzar una construcción pesada.
- source_word: עַצְמֹתַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis restos
  lexicon: HALOT
  rationale: Se conserva la concreción del hebreo. «Huesos» es más preciso que «restos» y mantiene la imagen que reaparece en el cumplimiento narrativo posterior.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: «De aquí» es natural en español y refleja el referente deíctico inmediato del hebreo.
theological_decisions:
- issue: Fuerza del juramento en el verbo causativo
  english_pob_reading: Then Joseph made the sons of Israel swear
  chosen_spanish_reading: Entonces José hizo jurar a los hijos de Israel
  alternative_spanish_readings:
  - Entonces José les tomó juramento
  - Entonces José los puso bajo juramento
  rationale: La forma elegida mantiene la causatividad del hebreo y la solemnidad legal del acto. No se diluye en una simple promesa informal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
- issue: Nuance de פָּקֹד יִפְקֹד אֱלֹהִים אֶתְכֶם
  english_pob_reading: God will surely visit you
  chosen_spanish_reading: Dios ciertamente los visitará
  alternative_spanish_readings:
  - Dios ciertamente los atenderá
  - Dios ciertamente los visitará y obrará por ustedes
  rationale: «Visitará» conserva el vínculo intertextual y la carga bíblica de פקד, mientras que «ciertamente» comunica la intensificación. Se evita suavizarlo a una mera observación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente reemplazó «attend to you» por «visit you» para reflejar con más directitud פָּקֹד יִפְקֹד, y ajustó la modalidad del juramento a «shall». Esta versión española sigue esa revisión: conserva «visitará» y usa un futuro simple solemne («sacarán») que encaja con la obligación juramentada sin introducir una nota excesivamente modal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en coherencia con el estándar del proyecto.
  - Se preserva el lenguaje concreto de «hijos» y «huesos» para no neutralizar la imaginería hebrea.
  - «Visitará» queda anotado porque la literalidad tradicional y la lectura intensiva son ambas relevantes para la transparencia del texto.
