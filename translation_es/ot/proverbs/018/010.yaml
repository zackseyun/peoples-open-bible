review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: «nombre», «Yahvé», la metáfora de «torre fuerte», el movimiento de refugio y la idea de seguridad elevada en נִשְׂגָּב. Sin embargo, «hacia ella» debilita בּוֹ, que aquí expresa entrada/refugio en la torre más que mera dirección hacia ella; y la nota b introduce «los justos», alternativa que no corresponde al singular representativo preservado en el rastro inglés.'
  spanish_quality_summary: 'El español es claro y digno, pero «torre fuerte» suena algo calcado; «una torre fuerte» o «una torre fortificada» serían posibles, aunque no imprescindibles. La reparación principal es idiomática y semántica: «corre a ella» sigue siendo menos preciso que «corre a refugiarse en ella». También conviene hacer más natural la cláusula final: «queda en alto y a salvo» comunica mejor la pasiva/reflexiva de seguridad inaccesible que «es puesto en alto con seguridad», que suena forzado.'
  glossary_alignment: Alinea correctamente יְהוָה -> «Yahvé» y שֵׁם -> «nombre». «El justo» es una buena solución para צַדִּיק en singular representativo. La principal desalineación es בּוֹ, donde el inglés auditado preserva «into it»; en español debe mantenerse la idea de entrar/encontrar refugio en la torre, no solo dirigirse hacia ella.
  issues:
  - severity: medium
    issue: «hacia ella» para בּוֹ
    rationale: La preposición ב con sufijo indica «en/into it», no solo movimiento hacia. En este proverbio la imagen es de entrar en la torre como refugio.
  - severity: medium
    issue: «es puesto en alto con seguridad» suena poco natural
    rationale: Aunque intenta reflejar נִשְׂגָּב, la frase es pesada en español. Una formulación como «queda en alto y a salvo» preserva mejor la imagen de seguridad inaccesible con buena legibilidad.
  - severity: low
    issue: Nota b ofrece «los justos» como alternativa
    rationale: El hebreo es singular masculino representativo. La alternativa plural no refleja bien la forma fuente ni el rastro inglés, que ofrece «the righteous», no un plural.
  revised_spanish_text: El nombre de Yahvé[a] es torre fuerte; el justo[b] corre a refugiarse en ella y queda en alto y a salvo[c].
  revised_footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente vertido «el SEÑOR»; aquí se conserva la transliteración «Yahvé».
    reason: alternative_reading
  - marker: b
    text: O «el justo», con fuerza representativa; el hebreo está en singular masculino.
    reason: lexical_alternative
  - marker: c
    text: O «está seguro» / «es protegido»; el hebreo sugiere ser puesto en un lugar alto e inaccesible.
    reason: lexical_alternative
  revision_rationale: Se corrige la preposición para reflejar mejor la idea hebrea de entrar/refugiarse en la torre, se suaviza la cláusula final para un español más natural sin perder la imagen de seguridad elevada, y se ajusta la nota b para no introducir un plural ajeno al singular representativo del texto fuente.
