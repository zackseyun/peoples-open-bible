translation:
  language: es
  text: Porque Yahvé[a] hará justicia a su pueblo y se compadecerá de sus siervos[b], cuando vea que su fuerza se ha agotado[c] y que no queda ninguno, ni esclavo ni libre[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: No se usa la sustitución tradicional 'SEÑOR'; aquí se conserva el nombre propio divino, 'Yahvé', conforme al criterio del proyecto.
    reason: source_note
  - marker: b
    text: O 'se arrepentirá respecto de sus siervos'. El verbo hebreo puede expresar relenting o ser movido a compasión.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'la mano se ha ido'. Es un modismo hebreo que significa que la fuerza o el poder se han agotado.
    reason: lexical_alternative
  - marker: d
    text: Hebreo 'confinado y abandonado', probablemente un giro que significa 'esclavo y libre' o, más ampliamente, 'no queda ninguno'.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדִין
  english_pob_choice: will vindicate
  chosen_spanish: juzgará
  alternatives_spanish:
  - vindicará
  - hará justicia a
  lexicon: HALOT
  rationale: El hebreo דין admite 'juzgar', 'gobernar' y también 'hacer justicia/vindicar'. En español, 'juzgará' conserva la acción judicial del verbo sin cerrar la tensión interpretativa. La nota y el contexto dejan claro que no se trata de una condena meramente punitiva, sino de una actuación a favor de su pueblo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según el criterio del proyecto. 'Yahvé' preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce bien el sentido colectivo y de alianza del término hebreo.'
- source_word: וְעַל עֲבָדָיו יִתְנֶחָם
  english_pob_choice: and will have compassion on his servants
  chosen_spanish: y se compadecerá de sus siervos
  alternatives_spanish:
  - y tendrá compasión de sus siervos
  - y se arrepentirá de sus siervos
  lexicon: HALOT
  rationale: נחם aquí puede expresar compadecerse, aliviarse o arrepentirse/relentir. 'Se compadecerá' conserva el matiz misericordioso que el contexto favorece, sin borrar la tensión semántica con 'se arrepentirá' o 'se relantirá'.
- source_word: אָזְלַת יָד
  english_pob_choice: their strength is gone
  chosen_spanish: su mano ha desaparecido
  alternatives_spanish:
  - se les ha ido la fuerza
  - su fuerza se ha agotado
  lexicon: HALOT
  rationale: Se conserva el idioma bíblico de 'mano' para no perder la imagen original. 'Ha desaparecido' comunica el sentido de agotamiento/cesación. La nota explica la equivalencia idiomática con 'fuerza'.
- source_word: וְאֶפֶס עָצוּר וְעָזוּב
  english_pob_choice: and there is none left, bond or free
  chosen_spanish: y que no queda ninguno, ni preso ni libre
  alternatives_spanish:
  - y que no queda nadie, ni atado ni suelto
  - y que no queda ninguno, esclavo o libre
  lexicon: HALOT
  rationale: La combinación 'preso ni libre' intenta mantener el carácter de merismo y evitar una simplificación excesiva. Dado que el hebreo puede referirse a 'confinado y abandonado' o funcionar como una expresión totalizadora, se deja la amplitud semántica mediante una fórmula sobria en español.
theological_decisions:
- issue: Sentido de יָדִין respecto de la acción de Yahvé sobre su pueblo
  english_pob_reading: The verse speaks of the LORD acting in favor of his people—vindicating them and showing compassion—rather than judging them adversely.
  chosen_spanish_reading: El verso presenta a Yahvé actuando a favor de su pueblo con una decisión judicial que termina en misericordia, no como condena final.
  alternative_spanish_readings:
  - Yahvé los castigará y luego se volverá a ellos
  - Yahvé juzgará a su pueblo en sentido punitivo
  rationale: El paralelismo con 'se compadecerá de sus siervos' y la cláusula sobre su impotencia favorecen una lectura restaurativa. Se conserva, no obstante, el valor judicial de דין en 'juzgará' para no borrar la ambigüedad productiva del hebreo.
  doctrine_reference: Preservar la tensión teológica entre justicia y misericordia; primacía del original sobre la tradición receptiva.
- issue: Interpretación de עָצוּר וְעָזוּב en la cláusula final
  english_pob_reading: Hebrew 'confined and abandoned,' likely an idiom meaning 'slave or free' or simply 'none at all left.'
  chosen_spanish_reading: 'La cláusula final se traduce como una expresión totalizadora: no queda nadie, esté preso o libre.'
  alternative_spanish_readings:
  - es decir, esclavo o libre
  - simplemente, no queda nadie
  rationale: El hebreo admite tanto una lectura idiomática de totalidad como una referencia social concreta. El español mantiene la amplitud con una formulación que suena natural y deja visible la alternativa por nota.
  doctrine_reference: No resolver artificialmente una expresión ambigua cuando el texto original la deja abierta.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la última cláusula de 'slave or free' a 'bond or free' por registro más formal. En español se optó por 'ni preso ni libre' para conservar ese registro elevado sin introducir 'esclavo', que podría sonar más interpretativo en este contexto; la nota explica la posibilidad alternativa y el carácter idiomático del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con la política del proyecto.
  - Se mantiene 'siervos' para עֲבָדָיו siguiendo el auditorio contextual y la carga covenantal del pasaje.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - La cláusula final preserva la ambigüedad del merismo hebreo mediante una fórmula española clara y sobria.
  - '''Juzgará'' mantiene la resonancia judicial sin cerrar la lectura a condena o vindicación.'
