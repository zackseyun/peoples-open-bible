translation:
  language: es
  text: ¿Y quién podrá escudriñar sus grandes hechos?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿Y quién...?
  alternatives_spanish:
  - ¿Y qué persona...?
  lexicon: BDAG
  rationale: El interrogativo introduce una pregunta retórica; «quién» es natural en español y conserva el tono directo del griego.
- source_word: ἐξιχνιάσει
  english_pob_choice: can search out
  chosen_spanish: podrá rastrear
  alternatives_spanish:
  - podrá investigar plenamente
  - podrá sondear
  lexicon: BDAG
  rationale: El verbo sugiere seguir huellas hasta descubrir algo oculto. «Rastrear» comunica mejor la imagen de indagar a fondo que un mero «buscar».
- source_word: τὰ μεγαλεῖα
  english_pob_choice: mighty deeds
  chosen_spanish: sus grandes obras
  alternatives_spanish:
  - sus obras poderosas
  - sus grandes hechos
  lexicon: LSJ
  rationale: El plural puede referirse a actos/obras grandiosas de Dios. «Grandes obras» mantiene el sentido de hechos visibles y evita sonar demasiado abstracto.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo se refiere a Dios en el contexto inmediato; «sus» es la forma natural en español y conserva la referencia sin explicitarla de más.
theological_decisions:
- issue: Referente de αὐτοῦ
  english_pob_reading: his = God
  chosen_spanish_reading: sus = de Dios
  alternative_spanish_readings:
  - sus = de él
  rationale: El contexto de Sirácides 18 habla de la singularidad y grandeza de Dios; la traducción mantiene esa referencia implícita sin añadir interpretación doctrinal.
  doctrine_reference: Preservar el referente contextual sin ampliarlo doctrinalmente.
translation_notes:
  revision_awareness: 'La redacción sigue el griego con apoyo del audit trail inglés: la pregunta retórica se conserva, el verbo se rinde con una imagen de indagación profunda, y μεγαλεῖα se entiende como obras/hechos grandiosos, no como una abstracción.'
  spanish_consistency_notes:
  - Se evita «Señor» o una sustitución litúrgica no presente en el versículo.
  - «Obras» se usa como equivalente bíblico natural para μεγαλεῖα en este contexto.
  - La puntuación interrogativa inicial refleja la fuerza retórica del original.
