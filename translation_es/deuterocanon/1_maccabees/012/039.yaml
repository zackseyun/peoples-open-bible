    text: Aquí «Asia» no designa el continente moderno, sino el ámbito político helenístico en juego.
    reason: cultural_note
  - marker: b
    text: O «atacar a Antíoco, el rey»; literalmente, «extender las manos contra Antíoco, el rey».
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación y el contenido de la nota léxica para que corresponda a ἐκτεῖναι χεῖρας ἐπ’ Ἀντίοχον, conforme al audit trail inglés. También se reemplazó el calco poco natural «extender las manos contra» por «echar mano de», que en español transmite una acción hostil amplia y preserva mejor la función idiomática del griego.
