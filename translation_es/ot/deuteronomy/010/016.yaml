translation:
  language: es
  text: Por tanto[a], circunciden el prepucio de su corazón[b], y no endurezcan más[c] su cerviz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y circunciden el prepucio de su corazón»; la conjunción inicial puede leerse solo como enlace, aunque el contexto también admite un sentido inferencial («Por tanto» / «Así que»).'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo conserva la metáfora de manera literal: «el prepucio de su corazón», imagen de quitar la resistencia interior a Dios.'
    reason: cultural_note
  - marker: c
    text: 'O: «no endurezcan más su cuello» o «no sean más de cerviz dura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְתֶּם
  english_pob_choice: So circumcise
  chosen_spanish: Así que circunciden
  alternatives_spanish:
  - Y circunciden
  - Por tanto, circunciden
  lexicon: HALOT
  rationale: El hebreo une una forma verbal exhortativa con וְ/וּ en contexto argumentativo. «Así que» comunica bien la fuerza inferencial que la POB inglesa marcó con «So», sin perder el tono de mandato.
- source_word: עָרְלַת לְבַבְכֶם
  english_pob_choice: the foreskin of your heart
  chosen_spanish: el prepucio de su corazón
  alternatives_spanish:
  - el prepucio de su corazón interior
  - el prepucio de su ser interior
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo. «Prepucio» reproduce el valor corporal de עָרְלָה y evita suavizar el imaginería covenantal en una paráfrasis como «la dureza de su corazón».
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: En español bíblico claro, «corazón» mantiene el centro interior de voluntad y pensamiento sin reducirlo a una sola facultad. El posesivo en plural de trato formal conserva la referencia al pueblo.
- source_word: וְעָרְפְּכֶם
  english_pob_choice: your neck
  chosen_spanish: su cerviz
  alternatives_spanish:
  - su cuello
  - su nuca
  lexicon: HALOT
  rationale: «Cerviz» es el equivalente bíblico natural en español para la imagen de obstinación ligada al hebreo עֹרֶף. Es más preciso y más tradicional en este giro que «cuello».
- source_word: לֹא תַקְשׁוּ עוֹד
  english_pob_choice: do not stiffen ... any longer
  chosen_spanish: no endurezcan más
  alternatives_spanish:
  - no se pongan más tercos
  - no se hagan más duros
  lexicon: HALOT
  rationale: El verbo causativo de קשׁה expresa endurecer. En español, «endurecer» conserva mejor el paralelismo con la imagen del cuello/cerviz que una recreación idiomática como «ser tercos». «Más» comunica adecuadamente עוֹד en prohibición.
theological_decisions:
- issue: Metáfora de circuncidar el corazón
  english_pob_reading: 'Retain the metaphor explicitly: ''circumcise the foreskin of your heart'''
  chosen_spanish_reading: 'Conservar explícitamente la metáfora: «circunciden el prepucio de su corazón»'
  alternative_spanish_readings:
  - purifiquen su corazón
  - eliminen la obstinación de su corazón
  rationale: El texto hebreo emplea una imagen corporal deliberada para describir la respuesta interior al pacto. Mantenerla en español preserva la tensión teológica entre signo externo e integración interna, sin sustituirla por una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza inferencial de וּ al inicio
  english_pob_reading: Or, 'And circumcise...' ; the conjunction may be read simply as connective, though the context also supports an inferential sense ('So' / 'Therefore').
  chosen_spanish_reading: «Así que» como lectura preferida, con posibilidad conectiva implícita.
  alternative_spanish_readings:
  - Y circunciden...
  - Por tanto, circunciden...
  rationale: La conjunción inicial admite conexión simple, pero el contexto argumentativo favorece una inferencia. «Así que» en español refleja bien esa relación sin exagerarla doctrinalmente.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Imagen de cerviz endurecida
  english_pob_reading: '''do not harden your neck anymore'' or ''be no longer stiff-necked.'''
  chosen_spanish_reading: «no endurezcan más su cerviz»
  alternative_spanish_readings:
  - no endurezcan más su cuello
  - no sean más tercos
  rationale: La metáfora de la cerviz endurecida es una expresión bíblica estable en español y mantiene la correspondencia imagística con el hebreo. Evitar «tercos» conserva la imagen corporal y su carga literaria.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se revisó el texto más reciente del conjunto de referencia y no hubo cambios requeridos; la versión española sigue de cerca el hebreo con preservación explícita de las dos metáforas principales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «corazón» y «cerviz» para sostener los dos campos metafóricos del hebreo sin reducirlos a paráfrasis.
  - Se conserva el registro bíblico moderno y digno, evitando giros arcaizantes innecesarios.
