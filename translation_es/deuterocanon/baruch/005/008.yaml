translation:
  language: es
  text: Y los bosques, así como todo árbol fragante, dieron sombra a Israel[a], por mandato de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «para Israel»; el dativo griego señala al beneficiario.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσκίασαν
  english_pob_choice: gave shade
  chosen_spanish: daban sombra
  alternatives_spanish:
  - dieron sombra
  - brindaban sombra
  - hacían sombra
  lexicon: LSJ
  rationale: El verbo expresa la acción concreta de proporcionar sombra. En español, «daban sombra» conserva la imagen natural y el valor aspectual narrativo sin sonar forzado.
- source_word: δρυμοὶ
  english_pob_choice: forests
  chosen_spanish: bosques
  alternatives_spanish:
  - selvas
  - arboledas
  - maderales
  lexicon: LSJ
  rationale: δρυμοί designa lugares arbolados o boscosos; «bosques» es la equivalencia más clara y sobria para un registro bíblico contemporáneo.
- source_word: πᾶν ξύλον εὐωδίας
  english_pob_choice: every fragrant tree
  chosen_spanish: todo árbol fragante
  alternatives_spanish:
  - todo árbol aromático
  - cada árbol fragante
  - todo árbol de buen aroma
  lexicon: LSJ
  rationale: ξύλον aquí funciona como árbol, y εὐωδίας añade la nota de fragancia. «Árbol fragante» preserva la imagen sensorial con naturalidad en español.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  - hacia Israel
  lexicon: LSJ
  rationale: El dativo marca al beneficiario de la acción; en español, «a Israel» mantiene la cercanía del giro griego y se integra bien con «daban sombra».
- source_word: προστάγματι τοῦ θεοῦ
  english_pob_choice: at the command of God
  chosen_spanish: por mandato de Dios
  alternatives_spanish:
  - por la orden de Dios
  - al mandato de Dios
  - a mando de Dios
  lexicon: LSJ
  rationale: πρόσταγμα es un mandato u orden. «Por mandato de Dios» expresa con claridad la causalidad/autoridad divina sin introducir una formulación eclesiástica ajena al texto.
theological_decisions:
- issue: οῦ θεοῦ / θεοῦ como título divino
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - Dios mismo
  rationale: El texto griego dice θεοῦ, no κύριος ni el nombre divino. Traducir simplemente «Dios» respeta el alcance del original sin importar el nombre Yahvé donde no aparece.
  doctrine_reference: 'DOCTRINE.md: no importar títulos o nombres divinos no presentes en la fuente; traducir según el sentido directo del original.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el cierre revisado del POB en inglés («at the command of God»), pero lo expresa con sintaxis natural española. Se conserva la imagen concreta de sombra y la relación de beneficio para Israel.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el griego aquí tiene θεοῦ y no el nombre divino.
  - «Bosques» mantiene el plural del griego y el tono procesional del pasaje.
  - «Por mandato de Dios» preserva la agencia divina sin añadir una glosa interpretativa.
