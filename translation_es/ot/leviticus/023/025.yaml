    rationale: Aunque intenta conservar la asociación con el fuego, no es una expresión española natural para una categoría sacrificial y puede resultar ambigua. El audit trail inglés optó por 'food offering', no por una formulación centrada en 'encendida'.
  - severity: low
    issue: Nota al pie dependiente de una base léxica menos adecuada
    rationale: Las alternativas 'ofrenda por fuego' y 'ofrenda de fuego' son válidas como nota, pero funcionan mejor si el texto principal adopta una opción más clara y natural como 'ofrenda de alimento'.
  revised_spanish_text: No haréis ningún trabajo laborioso, y presentaréis una ofrenda de alimento[a] a Yahvé.
