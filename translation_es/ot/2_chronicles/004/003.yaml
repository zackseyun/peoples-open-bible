translation:
  language: es
  text: 'Y debajo de este había figuras de bueyes[a] por todo alrededor, rodeándolo: diez por codo, circundando el Mar alrededor. Los bueyes estaban en dos hileras[c][b], fundidos como una sola pieza con este.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «semejanzas de bueyes»; el hebreo señala formas bovinas decorativas, no animales vivos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «diez por codo», probablemente en el sentido de diez figuras por cada codo de la circunferencia.'
    reason: cultural_note
  - marker: c
    text: 'O: «fundidos en su vaciado»; es decir, formados como parte del mismo trabajo de fundición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  english_pob_choice: figures of
  chosen_spanish: figuras de
  alternatives_spanish:
  - semejanzas de
  - imágenes de
  lexicon: HALOT
  rationale: דְמוּת expresa forma, semejanza o representación. «Figuras de» comunica en español la idea de formas decorativas representadas, sin convertirlas en animales literales.
- source_word: בְּקָרִים
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - bovinos
  lexicon: HALOT
  rationale: Aunque el término puede abarcar ganado bovino, en el contexto del mobiliario del templo la referencia es a formas decorativas de bueyes. «Bueyes» es natural y fiel en español bíblico.
- source_word: תַּחַת לוֹ
  english_pob_choice: beneath it
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - por debajo de él
  lexicon: HALOT
  rationale: La expresión indica la parte inferior del objeto. «Debajo de él» es idiomático y claro en español, preservando la relación espacial.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - rodeando por todas partes
  lexicon: HALOT
  rationale: La repetición intensifica la circularidad. «Todo alrededor» reproduce esa fuerza de manera natural en español sin sonar mecánico.
- source_word: סוֹבְבִים אֹתוֹ
  english_pob_choice: encircling it
  chosen_spanish: rodeándolo
  alternatives_spanish:
  - circundándolo
  - rodeando él
  lexicon: HALOT
  rationale: El participio describe la disposición de las figuras alrededor del recipiente. «Rodeándolo» conserva el movimiento envolvente con buena fluidez.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten to the cubit
  chosen_spanish: diez por codo
  alternatives_spanish:
  - diez al codo
  - diez en cada codo
  lexicon: HALOT
  rationale: La construcción expresa proporción o densidad en la medida. «Diez por codo» mantiene la relación métrica con la misma concisión que el original.
- source_word: מַקִּיפִים אֶת הַיָּם סָבִיב
  english_pob_choice: surrounding the Sea all around
  chosen_spanish: circundando el Mar todo alrededor
  alternatives_spanish:
  - rodeando el Mar
  - circundando el mar por todas partes
  lexicon: HALOT
  rationale: Se conserva la imagen repetida de contorno. «Mar» se escribe con mayúscula por ser la designación convencional del gran recipiente del templo.
- source_word: שְׁנַיִם טוּרִים
  english_pob_choice: in two rows
  chosen_spanish: en dos hileras
  alternatives_spanish:
  - en dos filas
  - en dos órdenes
  lexicon: HALOT
  rationale: טוּרִים señala disposición en filas/ordes. «Hileras» comunica bien el arreglo lineal de las figuras en español.
- source_word: הַבָּקָר
  english_pob_choice: The oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - las figuras de bueyes
  - los bovinos
  lexicon: HALOT
  rationale: Retoma las mismas formas ya mencionadas. Mantener «los bueyes» evita una perífrasis innecesaria y preserva la referencia colectiva.
- source_word: יְצוּקִים
  english_pob_choice: cast
  chosen_spanish: fundidos
  alternatives_spanish:
  - castados
  - vertidos
  lexicon: HALOT
  rationale: En metalurgia, יצק remite a un objeto hecho por vaciado/fundición. «Fundidos» es idiomático en español y expresa bien el proceso.
- source_word: בְּמֻצַקְתּוֹ
  english_pob_choice: as one piece with it
  chosen_spanish: como una sola pieza con él
  alternatives_spanish:
  - en su misma fundición
  - en la misma colada que él
  lexicon: HALOT
  rationale: La frase subraya que las figuras no estaban añadidas después, sino integradas al vaciado. «Como una sola pieza con él» hace explícita esa unidad material.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el acuerdo alto del expediente inglés y conserva sus tres puntos lexicográficos clave: la interpretación decorativa de דְמוּת/בְּקָרִים, la medida «diez por codo», y la unidad de fundición expresada por בְּמֻצַקְתּוֹ. No se registran revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Mar» con mayúscula para el recipiente cultual, coherente con el uso POB en inglés.
  - Se evita «SEÑOR» u otra sustitución no pertinente, porque no hay aquí vocabulario divino.
  - Se usa «bueyes» en vez de «toros» o «ganado» para conservar la concreción ornamental del contexto.
  - La sintaxis procura ser publicable en español moderno sin borrar la repetición enfática del hebreo.
