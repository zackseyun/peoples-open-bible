translation:
  language: es
  text: 'Y ella le dijo: «Padre mío, tú has abierto tu boca[a] a Yahvé; haz conmigo conforme a lo que salió de tu boca, ya que Yahvé ha tomado venganza por ti de tus enemigos, de los hijos de Amón[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Has abierto tu boca a Yahvé» es un modismo hebreo para hacer un voto solemne hablado.
    reason: cultural_note
  - marker: b
    text: O «contra los amonitas»; el hebreo dice literalmente «de/sobre los hijos de Amón».
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּצִיתָה אֶת־פִּיךָ
  english_pob_choice: you have opened your mouth
  chosen_spanish: has abierto tu boca
  alternatives_spanish:
  - has dado tu palabra
  - has hecho un voto
  lexicon: HALOT
  rationale: Conservo el giro idiomático concreto de «abrir la boca» para reflejar el hebreo y mantener la tensión solemne del juramento; el contexto de la frase aclara su fuerza vinculante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino en transliteración según el criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: עֲשֵׂה לִי
  english_pob_choice: do to me
  chosen_spanish: hazme
  alternatives_spanish:
  - trátame
  - haz conmigo
  lexicon: HALOT
  rationale: El dativo con sufijo de primera persona pide una formulación directa y natural en español; «hazme» conserva el valor transitivo sin suavizarlo.
- source_word: כַּאֲשֶׁר יָצָא מִפִּיךָ
  english_pob_choice: according to what has gone out from your mouth
  chosen_spanish: conforme a lo que salió de tu boca
  alternatives_spanish:
  - según lo que has dicho
  - conforme a tu voto
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de lo que «salió de tu boca» para enlazarla con «abrir la boca» y preservar el peso del dicho pronunciado.
- source_word: אַחֲרֵי אֲשֶׁר
  english_pob_choice: since
  chosen_spanish: ya que
  alternatives_spanish:
  - después de que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce fundamento causal, no mera secuencia temporal; «ya que» comunica bien esa relación en español.
- source_word: נְקָמֹת
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vindicación
  - actos de venganza
  lexicon: HALOT
  rationale: En este contexto la noción es retributiva y dirigida contra los enemigos; «venganza» conserva esa fuerza. En español, el plural hebreo puede expresarse de forma natural como un sustantivo abstracto singular.
- source_word: מֵאֹיְבֶיךָ
  english_pob_choice: on your enemies
  chosen_spanish: de tus enemigos
  alternatives_spanish:
  - contra tus enemigos
  - sobre tus enemigos
  lexicon: HALOT
  rationale: Sigo de cerca la construcción hebrea con una preposición más natural en español dentro de la expresión fija «tomar venganza de».
- source_word: מִבְּנֵי עַמּוֹן
  english_pob_choice: on the sons of Ammon
  chosen_spanish: de los hijos de Amón
  alternatives_spanish:
  - contra los amonitas
  - de los amonitas
  lexicon: HALOT
  rationale: Conservo la estructura literal «hijos de Amón», comprensible en español y fiel al ethnónimo hebreo; la alternativa etnónima moderna queda como opción interpretativa.
theological_decisions:
- issue: Naturaleza del voto de Jefté no resuelta en este versículo
  english_pob_reading: Render her words without resolving whether the vow entailed literal sacrifice or lifelong dedication.
  chosen_spanish_reading: Traducir sus palabras sin decidir en este versículo si el voto implicaba sacrificio literal o dedicación permanente.
  alternative_spanish_readings:
  - Ella acepta un voto que lleva a su muerte como sacrificio.
  - Ella acepta un voto que lleva a virginidad o servicio perpetuos.
  rationale: El hebreo de este versículo registra la aceptación de la hija, pero no especifica aquí el modo de cumplimiento del voto. La traducción debe preservar esa tensión y no imponer una solución debatida.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del POB en inglés: mantiene el idiomático «abrir la boca», conserva Yahvé como nombre divino, refleja la revisión de «has taken vengeance for you» con una construcción española igualmente natural, y preserva la ambigüedad interpretativa sobre la clase de voto sin resolverla.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se prefirió «venganza» por fuerza retributiva y para mantener la relación con «tomar venganza».
  - «Hijos de Amón» conserva la estructura hebrea; la nota ofrece la alternativa etnónima «amonitas».
  - Se mantuvo el lenguaje de boca/juramento para respetar el idiomatismo del hebreo.
