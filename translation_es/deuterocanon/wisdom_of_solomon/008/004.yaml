translation:
  language: es
  text: Porque ella es una iniciada en el conocimiento de Dios, y la que elige sus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la que aprueba sus obras». El griego es inusual y puede enfatizar la aprobación discernidora de lo que Dios hace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μύστις
  english_pob_choice: an initiate
  chosen_spanish: una iniciada
  alternatives_spanish:
  - una iniciada en los misterios
  - una mística
  - una persona iniciada
  lexicon: LSJ
  rationale: El griego designa a alguien admitido a un conocimiento o rito reservado. 'Iniciada' conserva esa idea de acceso privilegiado sin cargar el término con asociaciones modernas de 'mística' que no están garantizadas por el contexto.
- source_word: ἐπιστήμης
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: LSJ
  rationale: En este giro genitivo, 'conocimiento de Dios' suena natural en español y mantiene el sentido directo de ἐπιστήμη como conocimiento firme o especializado.
- source_word: αἱρέτις
  english_pob_choice: a chooser
  chosen_spanish: una elegidora
  alternatives_spanish:
  - una que elige
  - una aprobadora
  - una partidaria
  lexicon: LSJ
  rationale: El sustantivo femenino es raro y deriva de 'elegir'. 'Elegidora' conserva la forma verbal del griego y la rareza expresiva del original, aunque suene menos común en español.
- source_word: ἔργων
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras de Dios
  lexicon: LSJ
  rationale: '''Obras'' reproduce bien el alcance amplio de ἔργα para acciones divinas u obras realizadas, y encaja con la construcción ''sus obras''.'
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: '''Porque'' expresa claramente la relación explicativa del conector al inicio de la frase en español moderno.'
theological_decisions:
- issue: Cómo reflejar μύστις sin perder el matiz de acceso privilegiado al conocimiento divino
  english_pob_reading: an initiate
  chosen_spanish_reading: una iniciada
  alternative_spanish_readings:
  - una mística
  - una iniciada en los misterios
  rationale: La línea presenta a Sabiduría como participante admitida en el conocimiento de Dios. 'Iniciada' preserva la idea de admisión o acceso especial y evita imponer un sentido devocional posterior que 'mística' podría sugerir.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical force where possible'
- issue: Cómo verter αἱρέτις τῶν ἔργων αὐτοῦ
  english_pob_reading: a chooser of his works
  chosen_spanish_reading: una elegidora de sus obras
  alternative_spanish_readings:
  - una aprobadora de sus obras
  - una que elige sus obras
  rationale: El griego es comprimido y puede sugerir tanto elección como aprobación. El texto principal mantiene la relación léxica con 'elegir', mientras que una lectura interpretativa como 'aprobadora' no se impone en el cuerpo del versículo para no resolver demasiado la ambigüedad.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity rather than over-resolve'
- issue: Uso de 'Dios' en lugar de una perífrasis reverencial
  english_pob_reading: of God
  chosen_spanish_reading: de Dios
  alternative_spanish_readings:
  - del Señor
  rationale: Aquí el griego nombra explícitamente a θεοῦ; por tanto, 'Dios' es la opción directa y no requiere la convención de ocultar el nombre divino.
  doctrine_reference: 'Project terminology default: θεός -> Dios'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente adjudicado y con la revisión más reciente: no hubo cambios editoriales necesarios tras el último pase, y la versión inglesa conservó la ambigüedad de αἱρέτις con nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene el conector explicativo inicial con 'Porque' para reflejar γάρ.
  - '''Dios'' se usa de manera directa porque el griego dice θεοῦ.'
  - Se conserva la rareza semántica de αἱρέτις mediante 'elegidora' y una nota alternativa, en paralelo al tratamiento auditado en inglés.
  - '''Obras'' evita estrechar ἔργα a ''hechos'' o ''actos'' en un contexto de acciones divinas.'
