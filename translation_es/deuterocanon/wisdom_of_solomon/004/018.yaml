lexical_decisions:
- source_word: ὄψονται
  english_pob_choice: They will see
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - contemplarán
  lexicon: LSJ
  rationale: El futuro de ὁράω aquí expresa percepción visual directa; «verán» conserva la sencillez del verbo sin añadir matices no presentes en el griego.
- source_word: ἐξουδενήσουσιν
  english_pob_choice: will despise
  chosen_spanish: despreciarán
  alternatives_spanish:
  - considerarán como nada
  - menospreciarán
  lexicon: LSJ
  rationale: El verbo griego significa «tener en nada / despreciar». «Despreciarán» es natural en español y conserva el sentido de desprecio; la nota alternativa mantiene la posibilidad más literal de «tratar como nada».
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  lexicon: LSJ
  rationale: En este contexto sapiencial κύριος designa a Dios como juez; «el Señor» mantiene la referencia divina y sigue la convención del proyecto para κύριος.
- source_word: ἐκγελάσεται
  english_pob_choice: will laugh at them
  chosen_spanish: se reirá de ellos
  alternatives_spanish:
  - se burlará de ellos
  - se reirá contra ellos
  lexicon: LSJ
  rationale: El verbo tiene un matiz despectivo o burlón. «Se reirá de ellos» refleja bien la forma del griego y deja implícita la burla; la nota recoge la alternativa interpretativa más fuerte.
theological_decisions:
- issue: Matiz despectivo del verbo final aplicado a Dios
  english_pob_reading: the Lord will laugh at them
  chosen_spanish_reading: el Señor se reirá de ellos
  alternative_spanish_readings:
  - el Señor se burlará de ellos
  - el Señor se reirá de ellos con desprecio
  rationale: El griego permite un sentido derisorio; sin embargo, en español conviene no cargar innecesariamente el texto con una paráfrasis más fuerte que el verbo. La nota explica la alternativa sin imponerla en el cuerpo principal.
  doctrine_reference: Wisdom 4:18; LSJ ἐκγελάω
- issue: Renderizado de κύριος en un contexto de juicio divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el maestro
  rationale: El contexto identifica a κύριος como Dios que juzga a los impíos. «El Señor» preserva la fuerza teológica y la lectura tradicional del término en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó la cláusula final de «will laugh them to scorn» a «will laugh at them» para una correspondencia léxica más cercana con ἐκγελάσεται. La traducción española conserva ese ajuste con «se reirá de ellos», sin perder el matiz burlón indicado en la nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto en este contexto divino.
  - 'Se prefiere un español claro y sobrio: «verán», «despreciarán», «se reirá de ellos».'
  - Las notas preservan la tensión semántica entre «despreciar» y «tratar como nada», así como entre «reírse de» y «burlarse de».
