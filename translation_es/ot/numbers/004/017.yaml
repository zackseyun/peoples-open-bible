translation:
  language: es
  text: 'Entonces Yahvé habló a Moisés y a Aarón, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Luego ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; «Entonces» conserva la secuencia y «habló» mantiene con más precisión el acto de comunicación formal que un simple «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino propio, no con una sustitución titulada. «Yahvé» es la forma establecida en el estilo meta del proyecto para preservar el nombre del pacto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección/destinatario se expresa naturalmente en español con «a» cuando introduce el receptor de la palabra hablada.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin cambio de sentido.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  - a
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo para mostrar que Aarón también es destinatario directo del habla; «y a» reproduce esa estructura de manera natural en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin cambio de sentido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se traduce con el gerundio «diciendo», que en español bíblico moderno conserva bien la apertura de cita directa sin añadir contenido nuevo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: Se mantiene el nombre propio del pacto en lugar de una sustitución devocional. Esto preserva la distinción teológica del Tetragrámaton y coincide con la política del POB de no enmascararlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje es un encabezado de habla sin variantes textuales o notas críticas adicionales en el paquete fuente; la versión española sigue de cerca el análisis auditado del inglés POB y adapta las decisiones léxicas al español sin introducir glosas no sustentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma consistente para יְהוָה en el texto principal.
  - 'Se mantiene la estructura inclusiva del destinatario doble: Moisés y Aarón.'
  - No se añade puntuación o contenido interpretativo más allá de la fórmula de introducción de discurso.
