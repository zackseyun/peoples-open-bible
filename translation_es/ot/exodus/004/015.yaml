revisions:
- from: Hablarás a él y pondrás las palabras en su boca[a], y yo estaré con tu boca y con su boca[b], y yo les instruiré acerca de lo que ustedes deben hacer.
  to: Le hablarás y pondrás las palabras en su boca, y yo estaré con tu boca y con su boca[a], y yo les instruiré lo que ustedes han de hacer[b].
  rationale: Se corrige un calco poco natural («Hablarás a él» → «Le hablarás»), se mueve la nota literal al segmento que realmente comenta, y se simplifica la última cláusula para reflejar mejor el hebreo sin añadir «acerca de» ni sobreinterpretar con «deben». Se conserva la imagen concreta de «boca» y la explicitación del plural final mediante nota y «ustedes».
  reviewer_model: gpt-5.4
