translation:
  language: es
  text: Entonces el rey ordenó a Hilcías, el sumo sacerdote[a], a los sacerdotes del segundo orden y a los guardianes del umbral que sacaran del templo de Yahvé todos los utensilios hechos para Baal, para Aserá[b] y para toda la hueste del cielo. Los quemó fuera de Jerusalén en los campos de Cedrón, y llevó su polvo a Betel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sumo sacerdote» traduce el oficio del hebreo הַכֹּהֵן הַגָּדוֹל; también podría decirse «gran sacerdote», pero «sumo sacerdote» es la forma española más establecida y clara.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo אֲשֵׁרָה: puede referirse a la diosa Aserá o a un objeto de culto asociado con ella. Aquí se conserva la forma breve «Aserá» para no decidir la ambigüedad del término.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: HALOT
  rationale: צוה en narrativa expresa una orden con autoridad. En español, «ordenó» conserva bien esa fuerza sin sonar rígido; «mandó» sería posible, pero puede sonar más coloquial o incluso ambiguo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título y no el nombre propio; «el rey» mantiene esa forma directa y transparente.
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Jilquías
  lexicon: transliteración tradicional y moderna
  rationale: Se translitera el nombre propio con la forma más reconocible en español bíblico contemporáneo, sin introducir una forma menos usada que dificulte la lectura.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: «Sumo sacerdote» es el equivalente español asentado para el oficio supremo del sacerdocio. «Gran sacerdote» sería más literal, pero menos idiomático.
- source_word: כֹּהֲנֵי הַמִּשְׁנֶה
  english_pob_choice: the priests of the second order
  chosen_spanish: los sacerdotes del segundo orden
  alternatives_spanish:
  - los sacerdotes de segundo rango
  - los sacerdotes subordinados
  lexicon: HALOT
  rationale: «Del segundo orden» preserva la estructura y la ambigüedad institucional del hebreo, como en la versión auditada en inglés. No se especifica más de lo que el término permite.
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: the keepers of the threshold
  chosen_spanish: los guardianes del umbral
  alternatives_spanish:
  - los porteros
  - los cuidadores del dintel
  lexicon: HALOT
  rationale: «Guardians del umbral» sigue de cerca el hebreo y conserva la imagen cultual. «Porteros» sería más natural, pero borra parte de la precisión del término.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring out
  chosen_spanish: que sacaran
  alternatives_spanish:
  - para sacar
  - para retirar
  lexicon: HALOT
  rationale: En este mandato, «sacar» comunica de manera natural la acción de extraer objetos del templo; «retirar» sería más abstracto.
- source_word: מֵהֵיכַל יְהוָה
  english_pob_choice: from the temple of Yahweh
  chosen_spanish: del templo de Yahvé
  alternatives_spanish:
  - de la casa de Yahvé
  - del santuario de Yahvé
  lexicon: HALOT
  rationale: «Templo» es el valor contextual más claro de הֵיכָל aquí. Se mantiene «Yahvé» según la terminología del proyecto para el Tetragrámaton.
- source_word: כָּל הַכֵּלִים
  english_pob_choice: all the vessels
  chosen_spanish: todos los utensilios
  alternatives_spanish:
  - todos los objetos
  - todos los vasos
  lexicon: HALOT
  rationale: «Utensilios» funciona bien en español para objetos cultuales y evita un término demasiado restringido como «vasos».},{
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la política del proyecto, se conserva el nombre divino en forma audible y no se lo oculta bajo un título. «Yahvé» es la forma estándar adoptada aquí en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֲשֵׁרָה
  english_pob_reading: Asherah
  chosen_spanish_reading: Aserá
  alternative_spanish_readings:
  - la Aserá
  - el poste de Aserá
  - la imagen de Aserá
  rationale: La lista de objetos hechos «para Baal, para Asherah y para todo el host of heaven» permite conservar la ambigüedad entre deidad y objeto cultual. En español, «Aserá» mantiene esa apertura sin decidir prematuramente por «poste» o «imagen».
  doctrine_reference: 'DOCTRINE.md Contested terms: אֲשֵׁרָה'
- issue: Traducción de צְבָא הַשָּׁמָיִם
  english_pob_reading: the host of heaven
  chosen_spanish_reading: el ejército del cielo
  alternative_spanish_readings:
  - el ejército celestial
  - la hueste del cielo
  rationale: «Ejército del cielo» conserva el carácter colectivo y militar del hebreo צָבָא, sin perder la referencia a las potencias/astros venerados idolátricamente. Es una alternativa válida a «hueste», pero esta última suena más tradicional y menos transparente para lectura amplia.
  doctrine_reference: Léxico de expresiones celestiales idolátricas en el AT
- issue: Sentido de עֲפָרָם
  english_pob_reading: their dust
  chosen_spanish_reading: su polvo
  alternative_spanish_readings:
  - sus cenizas
  - su polvo y ceniza
  rationale: El inglés auditado corrigió «ashes» a «dust» para acercarse a עפרם. En español, «polvo» respeta mejor la correspondencia léxica; no se sustituye por «cenizas» porque eso interpretaría el resultado del fuego con más especificidad de la que da el hebreo.
  doctrine_reference: Léxico de עפר en contexto de objetos quemados
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés auditado: la versión final cambió «ashes» por «dust» para acercarse a עפרם. En español se reflejó ese ajuste con «polvo», y se mantuvo la estructura narrativa, los títulos sacerdotales y la lista de objetos cultuales sin suavizar las tensiones léxicas del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se usó «Aserá» como transliteración breve para conservar la ambigüedad del hebreo.
  - «Sumo sacerdote» y «sacerdotes del segundo orden» preservan la jerarquía sacerdotal sin reinterpretarla.
  - «Guardines del umbral» fue evitado por estilo; se prefirió «guardianes del umbral» por transparencia y naturalidad.
  - «Polvo» se eligió deliberadamente para עפרם en lugar de «cenizas», siguiendo la revisión auditada del texto inglés.
