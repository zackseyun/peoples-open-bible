review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: negación, objeto doble (''al guesurita y al maacatita'' como gentilicios colectivos), residencia continuada ''entre/en medio de Israel'' y la fórmula temporal ''hasta este día''. También conserva adecuadamente ''los hijos de Israel'' conforme al rastro POB. Sin embargo, hay un problema importante de forma onomástica: ''guesuritas / Guesur'' no es la castellanización estándar ni la más clara; en español bíblico normal corresponde ''gesuritas / Gesur''. Además, ''entre Israel'' es entendible pero algo menos natural que ''en medio de Israel'' en este contexto colectivo.'
  spanish_quality_summary: El español es legible y digno, pero requiere pequeños ajustes para sonar más natural y consistente con el registro bíblico en español. 'Gesur' y 'gesuritas' mejoran notablemente la legibilidad y la convención ortográfica. 'Habitan' está bien para el sentido presente-resultativo. 'Hasta este día' es aceptable; 'hasta el día de hoy' sería más idiomático, pero no es necesario cambiarlo si se desea una cercanía mayor al hebreo.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. ''Los hijos de Israel'' respeta la decisión auditada para בְּנֵי יִשְׂרָאֵל. ''Expulsaron'' es una opción válida para הוֹרִישׁוּ, con nota alternativa apropiada para ''desposeyeron''. La principal corrección es de transliteración/nombre propio: הַגְּשׁוּרִי / גְּשׁוּר debe representarse mejor como ''gesuritas / Gesur'' en español general.'
  issues:
  - severity: medium
    issue: Transliteración poco natural de Geshur/Geshurites como 'Guesur/guesuritas'.
    rationale: En español bíblico y de lectura eclesial amplia, 'Gesur' y 'gesuritas' resultan más naturales y reconocibles. 'Guesur' introduce una grafía innecesaria y poco estándar.
  - severity: low
    issue: La frase 'entre Israel' es menos idiomática que 'en medio de Israel'.
    rationale: '''Entre Israel'' no es incorrecta, pero ''en medio de Israel'' expresa con mayor naturalidad בְּקֶרֶב יִשְׂרָאֵל en español bíblico, especialmente cuando se habla de pueblos que permanecen dentro del conjunto de Israel.'
  - severity: low
    issue: La nota léxica anclada solo en 'guesuritas' en realidad comenta 'expulsaron'.
    rationale: El anclaje del marcador debe colocarse sobre la palabra o frase relevante. Si la nota explica הוֹרִישׁוּ, debe anclarse en 'expulsaron', no en el gentilicio.
  revised_spanish_text: Pero los hijos de Israel no expulsaron[a] a los gesuritas ni a los maacatitas, y Gesur y Maacat habitan en medio de Israel hasta este día.
  revised_footnotes:
  - marker: a
    text: ‘Expulsaron’ traduce aquí la fuerza causal del hebreo הוֹרִישׁוּ; también puede entenderse como ‘desposeyeron’, con un matiz más jurídico sobre la pérdida de la tierra.
    reason: lexical_alternative
  revision_rationale: Se corrigen las formas onomásticas a la castellanización más natural y reconocible en español ('Gesur/gesuritas'), se mejora la naturalidad de בְּקֶרֶב יִשְׂרָאֵל con 'en medio de Israel', y se reubica el marcador de nota para que ancle correctamente la observación léxica sobre 'expulsaron'. No se requieren cambios doctrinales ni de sentido sustancial.
