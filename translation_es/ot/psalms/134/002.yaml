  rationale: Se ajusta el texto principal para reflejar mejor la decisión auditada del English POB sobre קֹדֶשׁ («the holy place») sin introducir un matiz direccional extra; se restaura en la nota la tensión semántica completa, incluida la lectura cualitativa «en santidad»; y se mejora la neutralidad del español manteniendo un tono digno.
