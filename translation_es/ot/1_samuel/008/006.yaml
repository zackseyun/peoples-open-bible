base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/008/006.yaml
  text: But the matter was displeasing in Samuel’s eyes when they said[b][a], “Give us a king to judge us.” And Samuel prayed to Yahweh.
  footnotes:
  - marker: a
    text: Or “was displeasing in Samuel’s eyes.” The Hebrew says literally that the matter “was evil” in Samuel’s eyes, expressing his strong negative judgment.
    reason: lexical_alternative
  - marker: b
    text: “To judge us” can also carry the sense “to govern us” or “to rule us.”
    reason: lexical_alternative
