translation:
  language: es
  text: Muramos como hermanos, hermanos, por causa de la ley; imitemos a los tres jóvenes de Siria[a], que despreciaron el horno de igual tormento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los tres jóvenes judíos conocidos por Daniel 3. El griego aquí dice «en Siria», lo que refleja la formulación de este texto y no la más familiar «en Babilonia».
    reason: cross_reference
  - marker: b
    text: El adjetivo detrás de «igual tormento» es raro y difícil; puede indicar que el horno era comparable al que enfrentaron los tres jóvenes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφικῶς
  english_pob_choice: as brothers
  chosen_spanish: fraternalmente
  alternatives_spanish:
  - como hermanos
  - de manera fraterna
  lexicon: LSJ
  rationale: El adverbio expresa el modo de morir con solidaridad fraterna. «Fraternalmente» conserva el matiz adverbial y evita una repetición pesada de «como hermanos» junto con el vocativo siguiente.
- source_word: ἀποθάνωμεν
  english_pob_choice: Let us die
  chosen_spanish: Muramos
  alternatives_spanish:
  - Moramos
  - Muramos juntos
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo; «Muramos» reproduce la fuerza hortativa de manera natural en español.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos y hermanas
  lexicon: BDAG
  rationale: El contexto presenta a hermanos literales varones; «hermanos» es idiomático y exacto en español.
- source_word: περὶ τοῦ νόμου
  english_pob_choice: for the sake of the law
  chosen_spanish: por causa de la ley
  alternatives_spanish:
  - por la ley
  - en defensa de la ley
  lexicon: BDAG
  rationale: La preposición con genitivo expresa causa o interés; «por causa de» comunica bien la idea de morir en fidelidad y defensa de la ley.
- source_word: μιμησώμεθα
  english_pob_choice: Let us imitate
  chosen_spanish: imitemos
  alternatives_spanish:
  - sigamos el ejemplo de
  - imitémonos
  lexicon: BDAG
  rationale: Verbo exhortativo directo y natural en español, que conserva la llamada explícita a la imitación.
- source_word: τοὺς τρεῖς τοὺς ἐπὶ τῆς Συρίας νεανίσκους
  english_pob_choice: the three young men in Syria
  chosen_spanish: a los tres jóvenes de Siria
  alternatives_spanish:
  - a los tres jóvenes en Siria
  - a los tres muchachos de Siria
  lexicon: BDAG
  rationale: El texto griego dice literalmente «en/de Siria»; se conserva esa localización sin armonizarla con Babilonia. «Jóvenes» comunica bien νεανίσκους.
- source_word: ἰσοπαίδος
  english_pob_choice: equal in torment
  chosen_spanish: igual tormento
  alternatives_spanish:
  - tormento comparable
  - tormento semejante
  lexicon: LSJ
  rationale: 'La forma es rara y difícil. En contexto con καμίνου y la alusión a Daniel 3, el sentido seguro es comparativo: un horno de sufrimiento equiparable. «Igual tormento» preserva esa relación sin exagerar la precisión léxica.'
- source_word: καμίνου
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - furnace
  - horno ardiente
  lexicon: BDAG
  rationale: En español, «horno» es la equivalencia más natural para el aparato de fuego del relato de Daniel; el adjetivo «ardiente» no es necesario aquí porque ya está implícito en el contexto.
- source_word: κατεφρόνησαν
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - menospreciaron
  - desdeñaron
  lexicon: BDAG
  rationale: Verbo fuerte de desdén/contempto; «despreciaron» mantiene la fuerza retórica del texto.
theological_decisions:
- issue: Alusión a Daniel 3 y ubicación geográfica
  english_pob_reading: the three young men in Syria
  chosen_spanish_reading: los tres jóvenes de Siria
  alternative_spanish_readings:
  - los tres jóvenes de Babilonia
  rationale: Se sigue el testimonio explícito del griego, que dice Συρίας, aun cuando la tradición bíblica más conocida sitúa a los tres jóvenes en Babilonia. La referencia sigue siendo inequívoca para el lector informado.
  doctrine_reference: Primacía del texto original sobre la armonización tradicional
- issue: Repetición de «hermanos»
  english_pob_reading: brothers, brothers
  chosen_spanish_reading: Muramos fraternalmente, hermanos
  alternative_spanish_readings:
  - Muramos como hermanos, hermanos
  rationale: El griego repite ἀδελφοὶ; en español, una repetición literal de «hermanos, hermanos» puede sonar innecesariamente pesada. Se conserva la duplicación semántica mediante «fraternalmente» más el vocativo «hermanos».
  doctrine_reference: Fidelidad funcional a la repetición retórica
- issue: ἰσοπαίδος como comparación difícil
  english_pob_reading: furnace of equal torment
  chosen_spanish_reading: horno de igual tormento
  alternative_spanish_readings:
  - horno de tormento semejante
  - horno comparable de tormento
  rationale: La palabra es rara y no debe simplificarse como si su sentido fuera totalmente seguro. «Igual tormento» mantiene la comparación sin afirmar más de lo que permite el griego; además sigue de cerca la revisión inglesa más reciente.
  doctrine_reference: Conservación de una tensión léxica documentada
translation_notes:
  revision_awareness: La redacción inglesa fue revisada desde una formulación más torpe («equal in fierceness to theirs») a «of equal torment». La versión española sigue esa revisión y evita una paráfrasis excesiva, preservando la dificultad léxica de ἰσοπαίδος sin resolverla de modo dogmático.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se mantiene «ley» para νόμος por ser el referente mosaico claro en el contexto.
  - Se prefiere «jóvenes» para νεανίσκους por naturalidad y precisión.
  - No se introduce lenguaje tradicionalizante que oculte la especificidad geográfica del griego.
