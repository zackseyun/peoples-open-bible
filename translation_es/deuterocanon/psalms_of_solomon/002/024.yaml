review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: visión, súplica al Señor, imperativo de cese, la imagen de la mano divina sobre Israel, y el medio/instrumento del ataque de las naciones. Sin embargo, «supliqué ante el rostro del Señor» no corresponde tan fielmente a τοῦ προσώπου Κυρίου como una construcción transitiva en español que preserve mejor el modismo semítico, y «de tu mano que pesa sobre Israel» suena menos natural y menos cercano al valor de τοῦ βαρύνεσθαι que una formulación más idiomática.'
  spanish_quality_summary: 'El texto es legible y digno, pero presenta dos asperezas de estilo: «supliqué ante el rostro» resulta extraño en español, y la secuencia «Basta... de tu mano que pesa» suena algo trabada. Una pequeña revisión mejora naturalidad sin perder literalidad ni registro bíblico.'
  glossary_alignment: No hay conflicto importante de glosario, aunque para κύριος dirigido al Dios de Israel el proyecto prefiere «Yahvé» en el texto principal en lugar de «Señor». Dado que la fuente griega tiene Κύριος en oración a Dios, conviene aplicar la preferencia del proyecto aquí.
  issues:
  - severity: medium
    issue: Uso de «Señor» en lugar de «Yahvé»
    rationale: La guía del proyecto indica que יהוה / YHWH debe representarse como «Yahvé» en el texto principal, no «SEÑOR», y que cuando el griego κύριος alude al nombre divino se debe explicar la decisión. En este contexto de oración al Dios de Israel, «Yahvé» se ajusta mejor al estándar del proyecto.
  - severity: medium
    issue: «supliqué ante el rostro del Señor» es poco natural en español
    rationale: Aunque intenta preservar πρόσωπον, la construcción española suena forzada. «Supliqué el favor de Yahvé» conserva mejor el hebraísmo de buscar el rostro/favor divino y resulta más idiomática para lectores hispanos.
  - severity: low
    issue: «de tu mano que pesa sobre Israel» puede pulirse
    rationale: La imagen se conserva, pero «de tu mano que pesa pesadamente sobre Israel» o «de tu mano pesada sobre Israel» no son ideales; «de tu mano que pesa sobre Israel» es aceptable, pero «de tu mano que pesa sobre Israel» tras «Basta» sigue algo dura. «Basta, Yahvé, de que tu mano pese sobre Israel» reproduce mejor el infinitivo articular griego y fluye con más naturalidad.
  revised_spanish_text: 'Y yo vi, y supliqué el favor de Yahvé[a], y dije: «Basta, Yahvé,[b][c] de que tu mano pese sobre Israel por el ataque de las naciones[d]».'
