base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/007.yaml
  text: All the men of your covenant have sent you to the border[a]; the men at peace with you have deceived you and prevailed against you[c][b]. Those who eat your bread have set a trap under you—there is no understanding in him.
  footnotes:
  - marker: a
    text: Or 'have driven you out to the border' or 'have escorted you to the border.' The Hebrew verb can carry either a neutral or hostile nuance in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'lay a snare beneath you.' The Hebrew word rendered 'trap' is rare and its precise nuance is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'there is no discernment in him,' possibly referring to Edom; some understand 'in it' or take the line differently because the Hebrew referent is ambiguous.
    reason: alternative_reading
