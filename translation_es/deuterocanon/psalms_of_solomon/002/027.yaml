translation:
  language: es
  text: Porque no actuaron por celo[a], sino por el deseo de su alma[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sino en deseo de alma» o «sino en el deseo de su alma».'
    reason: lexical_alternative
