translation:
  language: es
  text: 'También en tiempos pasados[a], aun antes, cuando Saúl era rey, tú eras el que sacabas a Israel y lo hacías volver[b]; y Yahvé tu Dios te dijo: «Tú pastorearás a mi pueblo Israel, y tú serás gobernante[c] sobre mi pueblo Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «también ayer, también anteayer»; es un modismo hebreo que significa «antes» o «en tiempos pasados».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «tú eras el que hacía salir y entrar a Israel»; expresión hebrea para ejercer liderazgo sobre el pueblo.'
    reason: lexical_alternative
  - marker: c
    text: O «líder» o «príncipe» para נָגִיד; el término hebreo no es la palabra usual para «rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם תְּמֹל גַּם שִׁלְשֹׁם
  english_pob_choice: Even in times past, even before
  chosen_spanish: También en tiempos pasados
  alternatives_spanish:
  - Ayer y anteayer
  - Antes, desde hace tiempo
  - También ayer y anteayer
  lexicon: HALOT
  rationale: Conservo la fuerza enfática de גַּם con «también» y vierto el modismo temporal con una expresión natural en español. «En tiempos pasados» comunica el sentido idiomático sin perder el matiz de anterioridad.
- source_word: בִּהְיוֹת שָׁאוּל מֶלֶךְ
  english_pob_choice: when Saul was king
  chosen_spanish: cuando Saúl era rey
  alternatives_spanish:
  - mientras Saúl era rey
  - al tiempo que Saúl reinaba
  lexicon: HALOT
  rationale: La cláusula temporal queda directa y fiel. «Rey» reproduce מֶלֶךְ sin añadir matiz interpretativo.
- source_word: אַתָּה הַמּוֹצִיא וְהַמֵּבִיא אֶת יִשְׂרָאֵל
  english_pob_choice: you were the one who led Israel out and brought them in
  chosen_spanish: tú eras el que sacabas y traías a Israel
  alternatives_spanish:
  - tú eras el que sacabas a Israel y lo traías
  - tú eras el que salías y entrabas con Israel
  lexicon: HALOT
  rationale: Sigo el valor idiomático de «salir y entrar» como ejercicio de liderazgo, pero en español lo expreso con verbos naturales que conservan la imagen de dirección del pueblo. «Sacabas y traías» mantiene el paralelismo y evita una paráfrasis excesiva.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - el SEÑOR tu Dios
  - Yahvé, tu Dios
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El Tetragrámaton se traduce como «Yahvé» según la norma del proyecto. «Tu Dios» refleja con naturalidad el sufijo posesivo singular.
- source_word: תִרְעֶה אֶת עַמִּי אֶת יִשְׂרָאֵל
  english_pob_choice: You shall shepherd my people Israel
  chosen_spanish: Tú pastorearás a mi pueblo Israel
  alternatives_spanish:
  - Tú apacentarás a mi pueblo Israel
  - Tú serás pastor de mi pueblo Israel
  - Tú gobernarás a mi pueblo Israel
  lexicon: HALOT
  rationale: «Pastorearás» preserva la metáfora real del pastor y el pueblo sin reducirla a «gobernar». En español, esta forma suena más natural que un calco rígido y mantiene la tensión teológica del original.
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - jefe
  lexicon: HALOT
  rationale: «Gobernante» comunica la función de autoridad sin equipararla directamente con «rey», respetando la distinción semántica señalada por la POB inglesa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del nombre divino sigue la terminología oficial del proyecto en español. Se evita la sustitución por un título para conservar el nombre de pacto revelado en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metáfora pastoral de תִרְעֶה
  english_pob_reading: You shall shepherd my people Israel
  chosen_spanish_reading: Tú pastorearás a mi pueblo Israel
  alternative_spanish_readings:
  - Tú gobernarás a mi pueblo Israel
  - Tú cuidarás a mi pueblo Israel
  rationale: Se conserva la imagen del pastor porque forma parte del patrón bíblico de realeza y liderazgo. Esto evita diluir el trasfondo teológico del verbo hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Distinción entre rey y נָגִיד
  english_pob_reading: ruler
  chosen_spanish_reading: gobernante
  alternative_spanish_readings:
  - líder
  - príncipe
  rationale: Se mantiene la diferencia entre מֶלֶךְ («rey») y נָגִיד, que no es el término normal para rey. «Gobernante» deja visible esa distinción en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: leadership vocabulary'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Se mantuvo la lectura auditable del hebreo y la distinción entre el título real מֶלֶךְ y נָגִיד, con la metáfora pastoral preservada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Saúl» conserva la grafía española estándar del nombre propio.
  - «Pueblo» traduce עַם con naturalidad y mantiene el posesivo singular «mi»/«tu» según el hebreo.
  - La puntuación de cita se ajusta al español moderno sin alterar el sentido del texto.
