review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Moisés vuelve a Yahvé, ruega, identifica al pueblo como colectivo singular, mantiene la gravedad de la culpa y conserva correctamente el plural textual «dioses de oro» con nota alternativa. También sigue la política del proyecto al usar «Yahvé».'
  spanish_quality_summary: El español es claro y digno, pero «se han hecho para sí mismos dioses de oro» suena algo forzado y redundante en español. Una formulación más natural y fiel es «se hicieron dioses de oro para sí». Además, conviene evitar que «ha cometido un gran pecado» opaque del todo la repetición hebrea verbo+sustantivo; «ha pecado gravemente» sería posible, pero perdería el sustantivo. La redacción actual es aceptable, así que la revisión se centra en la frase final.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé»; עָם singular -> «este pueblo»; אֱלֹהֵי זָהָב -> «dioses de oro» con nota sobre la posible lectura singular contextual. No hay conflictos teológicos relevantes.'
  issues:
  - severity: medium
    issue: 'Frase reflexiva poco natural: «se han hecho para sí mismos dioses de oro»'
    rationale: Aunque transmite לָהֶם, en español la combinación «se han hecho para sí mismos» resulta pesada y algo calcada. «Se hicieron dioses de oro para sí» conserva el matiz benefactivo/reflexivo con mejor fluidez.
  - severity: low
    issue: Ligera pérdida de la fuerza cognada entre חָטָא y חֲטָאָה
    rationale: «Ha cometido un gran pecado» es fiel en sentido, pero reemplaza el verbo «pecar» por «cometer». No exige corrección, porque en español suena natural y mantiene el sustantivo clave «pecado».
  revised_spanish_text: 'Entonces Moisés volvió a Yahvé y dijo[a]: «Te ruego, este pueblo ha cometido un gran pecado, y se hicieron dioses de oro para sí».

