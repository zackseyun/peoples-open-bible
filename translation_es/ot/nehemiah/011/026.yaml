lexical_decisions:
- source_word: וּ/בְ
  english_pob_choice: and in
  chosen_spanish: y en
  alternatives_spanish:
  - también en
  - asimismo en
  lexicon: HALOT
  rationale: La secuencia repetida de conjunción más preposición marca una lista de localidades ocupadas. «Y en» conserva la estructura coordinada y el sentido locativo sin sobreexplicar.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshua
  - Jesúa
  lexicon: HALOT
  rationale: Es un nombre propio de lugar, por lo que se translitera. «Jesúa» mantiene una forma española transparente y cercana al valor del topónimo, sin traducirlo.
- source_word: מוֹלָדָה
  english_pob_choice: Moladah
  chosen_spanish: Moladá
  alternatives_spanish:
  - Moladah
  lexicon: HALOT
  rationale: Topónimo propio; se translitera. Se adapta la acentuación al español para lectura natural, conservando la identificación del lugar.
- source_word: בֵית פָּלֶט
  english_pob_choice: Beth-pelet
  chosen_spanish: Bet-pelet
  alternatives_spanish:
  - Beth-pelet
  - Bet Pelet
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar compuesto. En español es preferible transliterarlo como topónimo, no traducirlo como «casa de...»; el guion ayuda a reconocer la composición del nombre.
translation_notes:
  revision_awareness: El hebreo presenta una lista breve de localidades con la repetición de la preposición בְ. La versión inglesa POB la rindió con «and in» y conservó los nombres como topónimos. La revisión más reciente no introdujo cambios, y el acuerdo de revisión fue alto; por eso la propuesta española sigue esa decisión de transliteración y la adapta a una forma publicable en español.
  spanish_consistency_notes:
  - Se mantiene la estructura enumerativa con repetición de «y en», acorde al hebreo.
  - Se evita «SEÑOR» u այլ sustituciones porque no hay material divino en este versículo.
  - Los nombres propios se conservan como topónimos transliterados, siguiendo el criterio POB de no traducirlos literalmente cuando funcionan como lugares.
