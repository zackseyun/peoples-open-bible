    reason: lexical_alternative
  revision_rationale: Se ajusta «cuevas» a «guaridas» para reflejar mejor מְעוֹנוֹת en contexto animal; se reemplaza «para una emboscada» por «al acecho» para un español más natural que aún expresa la finalidad de la emboscada; y se corrige la puntuación interrogativa española. Se conserva la nota léxica sobre סֻכָּה y el paralelismo de los dos verbos.
