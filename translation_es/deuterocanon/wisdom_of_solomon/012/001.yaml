translation:
  language: es
  text: Porque tu Espíritu imperecedero está en todas las cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu espíritu está en todas»; el griego ἐν πᾶσιν puede traducirse de manera más breve, pero «en todas las cosas» hace explícito el sentido neutro plural probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφθαρτόν
  english_pob_choice: imperishable
  chosen_spanish: inmortal
  alternatives_spanish:
  - imperecedero
  - incorruptible
  lexicon: BDAG
  rationale: El adjetivo expresa lo que no está sujeto a corrupción o decadencia. En español, «inmortal» comunica bien la idea de no perecer; «imperecedero» e «incorruptible» también son posibles, pero «inmortal» suena más natural en este contexto y mantiene la fuerza ontológica sin volverlo técnico.
- source_word: πνεῦμά
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: BDAG
  rationale: El posesivo «tu» y el contexto de la presencia divina en todo favorecen una referencia personal/divina. Por eso se conserva la mayúscula «Espíritu»; «espíritu» sería una lectura más abstracta y «aliento» no encaja tan bien con el sentido teológico aquí.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - entre todas las cosas
  - en todos
  lexicon: BDAG
  rationale: El plural neutro admite una extensión universal. «En todas las cosas» conserva esa amplitud cósmica mejor que «en todos», que se limitaría a personas, y mejor que «en todo», que en español puede sonar demasiado abstracto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ciertamente
  lexicon: BDAG
  rationale: La partícula introduce la razón de lo anterior. «Porque» expresa con naturalidad esa relación causal en español y funciona bien al inicio de la frase.
theological_decisions:
- issue: Capitalización y alcance de πνεῦμά σου
  english_pob_reading: your Spirit
  chosen_spanish_reading: tu Espíritu
  alternative_spanish_readings:
  - tu espíritu
  rationale: Se mantiene la mayúscula para reflejar la lectura divina del posesivo en este contexto, sin cerrar del todo la posibilidad de una lectura más abstracta. La alternativa en minúscula sigue siendo lingüísticamente posible, pero la versión publicada debe señalar el referente personal/divino.
  doctrine_reference: Conservar la tensión lexical y teológica sin resolverla de manera artificial.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene una única nota de alternativa para ἐν πᾶσιν y no registra revisiones posteriores; la versión española sigue ese mismo perfil, conservando la ambigüedad útil entre una referencia amplia a la totalidad de las cosas y una formulación más breve.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el texto; aquí no aparece.
  - Se conserva «Espíritu» con mayúscula por la lectura divina del posesivo, en línea con el audit trail inglés.
  - Se evita «Cristo/Mesías» porque no corresponde a este versículo.
  - La nota [a] queda anclada en la frase «tu Espíritu» y recoge la alternativa de alcance de ἐν πᾶσιν.
