translation:
  language: ko
  text: 우리가 여러분의 믿음을 주관하려는 것이 아니라, 여러분의 기쁨을 위하여 함께 일하는 동역자가 되려는 것입니다. 이는 여러분이 믿음으로 굳건히 서 있기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κυριεύομεν
  english_pob_choice: lord it over
  chosen_korean: 주관하다
  alternatives_korean:
