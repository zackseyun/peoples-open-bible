  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: «Ahora» para וְעַתָּה, «ve» para לֵךְ, «y yo estaré» para וְאָנֹכִי אֶהְיֶה, la expresión concreta «con tu boca» para עִם פִּיךָ, «te enseñaré» para וְהוֹרֵיתִיךָ, y «lo que has de hablar» como formulación natural y formal para אֲשֶׁר תְּדַבֵּר. Preserva correctamente la tensión teológica de la presencia divina en el habla, sin resolverla en una paráfrasis explicativa.'
