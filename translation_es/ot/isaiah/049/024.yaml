translation:
  language: es
  text: ¿Puede ser tomado el botín[a] de un hombre poderoso, o pueden ser rescatados los cautivos de un justo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Botín»; también puede entenderse como «presa».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los cautivos de un justo». La expresión es difícil en el contexto. Algunas versiones antiguas y algunos intérpretes sugieren una lectura más cercana a «los cautivos de un tirano» o «de un terrible».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיֻקַּח
  english_pob_choice: Can ... be taken
  chosen_spanish: ¿Puede ser tomado... ?
  alternatives_spanish:
  - ¿Es tomado... ?
  - ¿Puede ser arrebatado... ?
  lexicon: HALOT
  rationale: La partícula interrogativa y la forma pasiva permiten una pregunta retórica de posibilidad. «Puede ser tomado» conserva bien el valor modal y el pasivo sin forzar un giro demasiado literal.
- source_word: מִגִּבּוֹר
  english_pob_choice: from a mighty man
  chosen_spanish: de un hombre poderoso
  alternatives_spanish:
  - de un guerrero
  - de un hombre fuerte
  lexicon: HALOT
  rationale: גִּבּוֹר puede ser «poderoso», «fuerte» o con matiz bélico «guerrero». «Hombre poderoso» mantiene la amplitud semántica y suena natural en español.
- source_word: מַלְקוֹחַ
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  - lo capturado
  lexicon: HALOT
  rationale: El sustantivo se refiere a lo arrebatado o a despojo. «Botín» es el equivalente más natural y conserva la idea de algo tomado por fuerza.
- source_word: וְאִם
  english_pob_choice: or can
  chosen_spanish: o pueden
  alternatives_spanish:
  - o si
  - y si
  lexicon: HALOT
  rationale: En este paralelismo retórico, la conjunción introduce una segunda pregunta más que una condición. «O pueden» refleja ese valor coordinante-interrogativo en español.
- source_word: שְׁבִי
  english_pob_choice: captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - la cautividad
  - los prisioneros
  lexicon: HALOT
  rationale: Aunque el sustantivo puede aludir a cautividad como estado, aquí el contexto pide personas cautivas. «Los cautivos» preserva ese sentido personal y paralelo con el verbo «rescatados».
- source_word: צַדִּיק
  english_pob_choice: a righteous one
  chosen_spanish: de un justo
  alternatives_spanish:
  - de un hombre justo
  - de un recto
  lexicon: HALOT
  rationale: «צַדִּיק» designa al justo/recto. «De un justo» es breve, fiel y permite mantener la tensión interpretativa del texto sin resolverla en el cuerpo principal.
- source_word: יִמָּלֵט
  english_pob_choice: be rescued
  chosen_spanish: ser rescatados
  alternatives_spanish:
  - ser librados
  - escapar
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape o liberación. «Ser rescatados» comunica la pasiva y encaja de forma natural con el paralelismo de la pregunta.
theological_decisions:
- issue: Sentido de צַדִּיק en un contexto de captor
  english_pob_reading: Retain the Masoretic Text's plain sense 'righteous one' in the main text without resolving the interpretive tension.
  chosen_spanish_reading: Mantener el sentido llano de «un justo» en el texto principal, sin resolver la tensión interpretativa.
  alternative_spanish_readings:
  - tirano
  - terrible
  - fuerte
  rationale: 'La lectura masorética presenta una dificultad real: un «justo» como poseedor de cautivos resulta chocante. La POB en inglés preserva esa tensión; en español conviene hacer lo mismo y reservar posibles explicaciones alternativas para nota, en vez de armonizar silenciosamente el pasaje.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La base inglesa no fue revisada en el último pase; el control cruzado reporta alta concordancia (0.95) y no se indicaron cambios aplicados. La presente redacción sigue esa lectura estable, preservando la tensión de צַדִּיק y la equivalencia funcional de los verbos pasivos/interrogativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefiere «botín» para מַלְקוֹחַ, en línea con el valor léxico principal y la naturalidad en español.
  - Se mantiene «justo» para צַדִּיק para no neutralizar la dificultad textual.
  - «Rescatados» se eligió por su pasividad natural en español y su cercanía a la idea de liberación del nifal.
