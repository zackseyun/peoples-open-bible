review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo, la repetición de «porción doble», la distinción entre «vergüenza» y «afrenta», y el tono de restauración. Sin embargo, falla en un punto importante de alineación con la evidencia fuente y el rastro POB: בָּשְׁתְּכֶם es inequívocamente 2mp («vuestra/tu vergüenza»), pero el texto principal español lo traduce como «su vergüenza», eliminando precisamente el cambio de persona que el POB decidió preservar. La nota a pie además habla de «tu vergüenza», lo que deja incoherencia interna. También la nota c no funciona como verdadera alternativa, porque repite exactamente la misma redacción del texto principal.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. «En lugar de», «afrenta», «porción doble», «Por tanto» y «gozo perpetuo» son naturales y adecuados. Hay una pequeña tensión estilística en usar «de ellos» en vez de «suyo/de ellos les pertenecerá», pero sigue siendo aceptable. El problema principal no es de estilo sino de fidelidad y consistencia pronominal.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son sólidas: «vergüenza», «afrenta», «porción doble», «tierra», «heredarán/poseerán» dentro de lo permitido. La corrección necesaria es restaurar la segunda persona en «tu/vuestra vergüenza» para respetar la decisión teológica documentada de conservar el cambio a tercera persona después.'
  issues:
  - severity: high
    issue: El texto principal usa «su vergüenza» en vez de segunda persona.
    rationale: בָּשְׁתְּכֶם lleva sufijo 2mp. El English POB preserva explícitamente «your shame» para mantener el cambio posterior a tercera persona. «Su vergüenza» borra ese rasgo textual y contradice la decisión teológica documentada.
  - severity: medium
    issue: La nota a pie a entra en conflicto con el texto principal.
    rationale: La nota explica un cambio desde «tu vergüenza» a tercera persona, pero el texto principal ya dice «su vergüenza». Esto produce inconsistencia entre texto y nota.
  - severity: medium
    issue: La nota c no presenta una alternativa real.
    rationale: El texto principal ya dice «heredarán una porción doble[c]», y la nota c ofrece exactamente «O «heredarán una porción doble»». Una nota de alternativa debe ofrecer una opción distinta, aquí p. ej. «poseerán una porción doble» o explicar la otra posibilidad léxica.
  revised_spanish_text: En lugar de vuestra vergüenza[a], habrá una porción doble; y en lugar de la afrenta, gritarán de alegría[b] por su porción. Por tanto, en su tierra heredarán una porción doble[c]; el gozo perpetuo será de ellos.
