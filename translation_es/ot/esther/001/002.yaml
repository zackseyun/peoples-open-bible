translation:
  language: es
  text: En aquellos días[a], cuando el rey Asuero estaba sentado sobre su trono real, que estaba en Susa, la ciudadela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Shushán, la ciudadela».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En aquellos tiempos
  lexicon: HALOT
  rationale: La fórmula temporal hebrea es narrativa y estereotipada; «En aquellos días» conserva su valor demostrativo y suena natural en español bíblico moderno.
- source_word: כְּשֶׁבֶת
  english_pob_choice: when ... sat
  chosen_spanish: cuando ... estaba sentado
  alternatives_spanish:
  - cuando ... se sentó
  - mientras ... estaba sentado
  lexicon: HALOT
  rationale: El infinitivo constructo con כ introduce una cláusula temporal. En español, «cuando estaba sentado» comunica la situación en curso sin forzar una construcción artificial.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Ahasuero
  - el rey Ahasuero
  lexicon: HALOT
  rationale: Se mantiene el título antes del nombre propio, como en el sentido del hebreo y del inglés auditado. «Asuero» es la forma española asentada para el nombre.
- source_word: עַל כִּסֵּא מַלְכוּתוֹ
  english_pob_choice: on his royal throne
  chosen_spanish: sobre su trono real
  alternatives_spanish:
  - en su trono real
  - sobre el trono de su reino
  lexicon: HALOT
  rationale: «Throne of his kingship/kingdom» se expresa de forma natural como «su trono real», preservando el matiz regio sin una calca pesada. «Sobre» reproduce היטב el valor locativo de עַל.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La cláusula relativa en español fluye mejor con «que»; el antecedente es «trono real». No se pierde contenido semántico.
- source_word: בְּשׁוּשַׁן
  english_pob_choice: in Susa
  chosen_spanish: en Susa
  alternatives_spanish:
  - en Shushán
  lexicon: HALOT
  rationale: Se usa la forma española más reconocible y estándar para el topónimo, en continuidad con la tradición bíblica en español.
- source_word: הַבִּירָה
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la fortaleza
  - la ciudadela fortificada
  lexicon: HALOT
  rationale: בִּירָה designa un recinto palaciego fortificado o ciudadela. «Ciudadela» conserva mejor esa precisión que «fortaleza», y evita el sentido amplio de «capital».
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el texto inglés auditado mantiene alta concordancia con la fuente hebrea y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto hebreo no contiene el tetragrámaton.
  - Se conserva el orden narrativo y la referencia geográfica sin expandir el sentido.
  - «Asuero» se usa como forma española estándar, no como transliteración cruda.
  - La puntuación reproduce una cláusula relativa simple y lecturable en español bíblico.
  - La nota al pie refleja la alternativa lexical documentada para שׁוּשַׁן.
