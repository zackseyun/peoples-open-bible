translation:
  language: es
  text: Entonces Jerobaal (es decir, Gedeón) y todo el pueblo que estaba con él se levantaron de madrugada y acamparon junto a la fuente[a] de Harod. El campamento de Madián estaba al norte de ellos, junto a la colina de Moreh en el valle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “junto a En-harod”. El hebreo incluye literalmente la palabra para “fuente”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantaron de madrugada
  alternatives_spanish:
  - se levantaron temprano
  - se alzaron muy de mañana
  lexicon: HALOT
  rationale: El valor verbal expresa levantarse muy temprano; 'de madrugada' conserva el matiz temporal natural en español sin sonar forzado.
- source_word: יְרֻבַּעַל הוּא גִדְעֹון
  english_pob_choice: Jerubbaal (that is, Gideon)
  chosen_spanish: Jerobaal (es decir, Gedeón)
  alternatives_spanish:
  - Jerobaal, es decir, Gedeón
  - Jerobaal, esto es, Gedeón
  lexicon: HALOT
  rationale: La apposición identifica a Jerobaal con Gedeón; 'es decir' transmite la explicación de manera clara y fiel.
- source_word: וְכָל הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: and all the people who were with him
  chosen_spanish: y todo el pueblo que estaba con él
  alternatives_spanish:
  - y toda la gente que estaba con él
  - y todo el pueblo que iba con él
  lexicon: HALOT
  rationale: עָם puede ser 'pueblo' o 'gente'; se mantiene 'pueblo' como término más directo y sobrio, preservando la amplitud del hebreo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se acamparon
  lexicon: HALOT
  rationale: El verbo significa establecer campamento; 'acamparon' es el equivalente natural en español.
- source_word: עַל עֵין חֲרֹד
  english_pob_choice: by the spring of Harod
  chosen_spanish: junto a la fuente de Harod
  alternatives_spanish:
  - junto al manantial de Harod
  - junto a En-harod
  lexicon: HALOT
  rationale: עֵין puede significar 'fuente' o 'manantial'. Se elige 'fuente' porque es claro en español y refleja el componente léxico del topónimo sin ocultarlo.
- source_word: וּמַחֲנֵה מִדְיָן
  english_pob_choice: The camp of Midian
  chosen_spanish: El campamento de Madián
  alternatives_spanish:
  - El campamento madianita
  - El campamento de los madianitas
  lexicon: HALOT
  rationale: El hebreo usa una construcción en genitivo; 'campamento de Madián' conserva esa relación sin añadir un gentilicio que el texto no explicita aquí.
- source_word: הָיָה לוֹ מִצָּפוֹן
  english_pob_choice: was north of them
  chosen_spanish: estaba al norte de ellos
  alternatives_spanish:
  - estaba al norte de él
  - quedaba al norte de ellos
  lexicon: HALOT
  rationale: Se sigue la revisión del POB inglés que ajusta el referente al plural. En español, 'de ellos' refleja con naturalidad el sentido revisado.
- source_word: מִגִּבְעַת הַמּוֹרֶה
  english_pob_choice: by the hill of Moreh
  chosen_spanish: junto al collado de More
  alternatives_spanish:
  - junto al monte de More
  - junto a la colina de More
  lexicon: HALOT
  rationale: גִּבְעָה puede ser 'collado', 'colina' o 'monte' según el contexto. 'Collado' preserva el relieve topográfico con un tono bíblico sobrio.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la llanura
  - en el valle
  lexicon: HALOT
  rationale: עֵמֶק se traduce normalmente como 'valle'; es la opción más directa y ampliamente inteligible.
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que cambia el referente espacial final de 'him' a 'them'; por eso el español dice 'de ellos'. También se mantuvo la decisión léxica de traducir עֵין con un término español transparente y no solo transliterar el topónimo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estándar del Tetragrámaton cuando aparezca, pero en este versículo no ocurre.
  - Se evitó 'señor' o 'encampó' para mantener un español claro y fiel al registro narrativo.
  - '''Madián'' sigue la forma española tradicional del nombre propio.'
