translation:
  language: es
  text: Mis ojos están siempre puestos en Yahvé[a], porque él sacará mis pies de la red.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la red». El verbo hebreo significa literalmente «sacará», conservando la imagen de rescate del enredo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַי
  english_pob_choice: My eyes
  chosen_spanish: Mis ojos
  alternatives_spanish:
  - Mi mirada
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo concreto en plural con sufijo de primera persona. «Mis ojos» conserva la imagen corporal directa del texto, mientras que «mi mirada» sería más interpretativo.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: están continuamente
  alternatives_spanish:
  - están siempre
  - están constantemente
  lexicon: HALOT
  rationale: La forma adverbial expresa continuidad habitual. «Continuamente» mantiene ese valor durativo en un español natural y solemne.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - sobre
  lexicon: HALOT
  rationale: Con el sujeto «ojos», «hacia» expresa mejor la orientación de la mirada. Evita el calco rígido de «a» y conserva la dirección implícita del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio en español, conforme al criterio POB. «Yahvé» es la forma más establecida y legible en español bíblico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la mirada fija en Yahvé. «Porque» comunica con claridad la relación causal sin forzar el tono poético.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis, pero en español «él» basta para reflejarlo sin sobrecargar la frase.
- source_word: יוֹצִיא
  english_pob_choice: will bring out
  chosen_spanish: sacará
  alternatives_spanish:
  - hará salir
  - sacará fuera
  lexicon: HALOT
  rationale: El hiphil de יצא conserva la imagen de hacer salir. «Sacará» transmite ese movimiento con naturalidad en español y evita perder la metáfora de rescate.
- source_word: מֵרֶשֶׁת
  english_pob_choice: out of the net
  chosen_spanish: de la red
  alternatives_spanish:
  - de la trampa
  - fuera de la red
  lexicon: HALOT
  rationale: «Red» corresponde al sentido básico del sustantivo y mantiene la imagen de atrapamiento. En español, con el verbo «sacar», la preposición «de» deja implícita la salida desde la red.
- source_word: רַגְלָי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis pasos
  lexicon: HALOT
  rationale: La referencia literal a los pies preserva la metáfora corporal de estar atrapado. «Mis pasos» sería más interpretativo y menos concreto.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la práctica POB, se preserva como nombre propio transliterado en español, en vez de sustituirlo por un título como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y sin cambios necesarios; por eso se mantiene la estructura semántica del inglés auditado y se adapta solo a un español bíblico natural, sin perder la imagen concreta de ojos, pies y red.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma uniforme del nombre divino.
  - Se conservó la imaginería corporal («ojos», «pies», «red») sin espiritualizarla.
  - «Sacará» refleja el movimiento de extracción del hiphil sin sustituirlo por una paráfrasis como «liberará».
