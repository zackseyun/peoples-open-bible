id: EST.4.1
reference: Esther 4:1
source:
  edition: WLC
  text: וּ/מָרְדֳּכַ֗י יָדַע֙ אֶת כָּל אֲשֶׁ֣ר נַעֲשָׂ֔ה וַ/יִּקְרַ֤ע מָרְדֳּכַי֙ אֶת בְּגָדָ֔י/ו וַ/יִּלְבַּ֥שׁ שַׂ֖ק וָ/אֵ֑פֶר וַ/יֵּצֵא֙ בְּ/ת֣וֹךְ הָ/עִ֔יר וַ/יִּזְעַ֛ק זְעָקָ֥ה גְדֹלָ֖ה וּ/מָרָֽה־־־׃
translation:
  text: When Mordecai learned all that had been done[a], Mordecai tore his clothes and put on sackcloth and ashes. Then he went out into the midst of the city and cried out with a great and bitter cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cried out a great and bitter cry.' The Hebrew uses a verb with a cognate noun for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַע
  chosen: learned
  alternatives:
  - knew
  - came to know
  lexicon: HALOT
  rationale: In context this verb marks Mordecai's becoming aware of the decree and events, not merely possessing knowledge. 'Learned' communicates the ingressive sense naturally in English.
- source_word: כָּל אֲשֶׁר נַעֲשָׂה
  chosen: all that had been done
  alternatives:
  - everything that had happened
  - all that was done
  lexicon: HALOT
  rationale: The passive construction is preserved. 'Had been done' fits the narrative sequence after Mordecai received the news.
- source_word: וַיִּקְרַע ... אֶת בְּגָדָיו
  chosen: tore his clothes
  alternatives:
  - rent his garments
  lexicon: HALOT
  rationale: This is the standard mourning gesture. 'Tore his clothes' is clear modern English; 'rent his garments' is more traditional but archaic.
- source_word: שַׂק וָאֵפֶר
  chosen: sackcloth and ashes
  alternatives:
  - sackcloth with ashes
  lexicon: HALOT
  rationale: This is the conventional idiom for mourning and humiliation. The pair is best rendered with the familiar English expression while remaining literal.
- source_word: בְּתוֹךְ הָעִיר
  lemma: בְּתוֹךְ
  chosen: into the midst of the city
  alternatives:
  - through the middle of the city
  - into the city center
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of.' 'Into the midst of the city' preserves the spatial force better than the more interpretive 'city center.'
- source_word: וַיִּזְעַק זְעָקָה גְדֹלָה וּמָרָה
  chosen: cried out with a loud and bitter cry
  alternatives:
  - wailed loudly and bitterly
  - cried out a great and bitter cry
  lexicon: HALOT
  rationale: The verb plus cognate noun intensifies the action; English expresses this naturally with 'cried out with a ... cry.' גְדֹלָה is rendered 'loud' rather than wooden 'great' in this auditory context, while מָרָה is kept as 'bitter' to preserve the emotional force.
- source_word: וַ
  chosen: Then
  alternatives:
  - and
  - so
  lexicon: HALOT
  rationale: The waw-consecutive chain advances the narrative. Using 'Then' before the final clause helps readable English while preserving sequence.
