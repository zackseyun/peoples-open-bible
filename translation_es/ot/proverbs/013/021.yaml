translation:
  language: es
  text: El desastre persigue a los pecadores[a], pero el bien recompensa a los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la calamidad persigue a los pecadores, pero los justos reciben el bien como recompensa».
    reason: alternative_reading
lexical_decisions:
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - culpables
  lexicon: HALOT
  rationale: El plural sustantivado designa a quienes se caracterizan por el pecado. «Pecadores» mantiene la categoría moral de forma breve y natural en español.
- source_word: תְּרַדֵּף
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - da caza a
  - sigue de cerca
  - acosa
  lexicon: HALOT
  rationale: El verbo expresa una acción activa y continua. «Persigue» conserva la imagen de seguimiento insistente que el paralelismo sapiencial requiere.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - daño
  lexicon: HALOT
  rationale: Aquí el término funciona como aquello que sobreviene a los pecadores, no como mal moral. «Desastre» comunica con claridad una consecuencia adversa sin borrar la ambigüedad del hebreo.
- source_word: וְ/אֶת
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: Hebrew syntax
  rationale: Aunque la conjunción básica es «y», el paralelismo exige valor adversativo. «Pero» refleja mejor el contraste entre el destino de los pecadores y el de los justos.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: «Los justos» es el equivalente idiomático y conserva la categoría sapiencial de quienes actúan con rectitud.
- source_word: יְשַׁלֶּם
  english_pob_choice: rewards
  chosen_spanish: recompensa
  alternatives_spanish:
  - paga
  - retribuye
  - da en pago
  lexicon: HALOT
  rationale: El verbo lleva la idea de recompensar o retribuir. «Recompensa» preserva la noción de correspondencia sin reducirla a una simple transacción económica.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - bondad
  - bienestar
  lexicon: HALOT
  rationale: El sustantivo/adjetivo abstracto se refiere aquí a un bien concedido como recompensa. «El bien» mantiene amplitud semántica y deja abierta la forma concreta de la recompensa.
theological_decisions:
- issue: Principio sapiencial de retribución
  english_pob_reading: 'The proverb states a general moral pattern: disaster pursues sinners, while good rewards the righteous.'
  chosen_spanish_reading: 'El proverbio presenta un patrón moral general: el desastre persigue a los pecadores, mientras el bien recompensa a los justos.'
  alternative_spanish_readings:
  - El proverbio enseña una retribución inmediata y exacta en cada caso.
  - El proverbio se refiere solo a una recompensa escatológica futura.
  rationale: El hebreo formula una máxima sapiencial general, no una explicación exhaustiva del modo o momento de la retribución. La traducción evita fijar una doctrina más estrecha de la que el texto dice, pero conserva la tensión moral del paralelismo.
  doctrine_reference: Preservar la tensión teológica de la sabiduría bíblica.
translation_notes:
  revision_awareness: El texto inglés auditable pasó de «repays the righteous» a «rewards the righteous» para sonar más natural y ajustarse mejor al sentido de retribución benéfica. En español se optó por «recompensa» para captar esa misma evolución sin perder el matiz de correspondencia del verbo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí no aparece el nombre divino.
  - Se tradujo רָעָה por un resultado adverso («desastre») y no por mal moral, siguiendo el contexto sapiencial.
  - El contraste adversativo se expresó con «pero» por la estructura paralela del proverbio.
  - «Los justos» conserva el sustantivo colectivo estándar de la literatura sapiencial.
