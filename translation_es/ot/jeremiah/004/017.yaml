translation:
  language: es
  text: Como guardianes de un campo[a], están contra ella en derredor, porque contra mí se ha rebelado, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Como guardias del campo abierto» o «Como guardianes de un campo». La imagen es la de vigilantes que rodean y custodian un campo, aplicada aquí a enemigos que cercan la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשֹׁמְרֵי
  english_pob_choice: Like watchmen
  chosen_spanish: Como guardianes
  alternatives_spanish:
  - Como vigilantes
  - Como centinelas
  lexicon: HALOT
  rationale: El prefijo comparativo כ pide un equivalente con «como». שׁמר en participio plural tiene sentido de guardar/vigilar; «guardianes» conserva la idea de custodia y funciona naturalmente en español. «Vigilantes» o «centinelas» serían posibles, pero «guardianes» permite mantener el cuadro de protección/cerco del contexto.
- source_word: שָׂדַי
  english_pob_choice: of a field
  chosen_spanish: de un campo
  alternatives_spanish:
  - del campo abierto
  - del campo
  lexicon: HALOT
  rationale: שָׂדֶה suele significar «campo». La forma singular se conserva en español para reflejar la singularidad del hebreo y no diluir la imagen en un plural generalizado. «De un campo» suena más natural que una calca excesiva y mantiene la alusión a guardias de campo.
- source_word: הָיוּ
  english_pob_choice: they are
  chosen_spanish: han estado
  alternatives_spanish:
  - están
  - eran
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto profético puede usarlo con vividez. En español, «han estado» conserva el valor aspectual de situación ya instalada y evita reducirlo a pasado remoto; «están» sería más directo pero menos fiel al matiz de estado ya establecido.
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - en su contra
  lexicon: HALOT
  rationale: En contexto hostil, על expresa oposición. «Contra ella» comunica mejor la fuerza adversativa en español y conserva el referente femenino implícito sin nombrarlo.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: en derredor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La idea es de cerco y encierro. «En derredor» es una forma española digna y precisa que mantiene el cuadro de rodear completamente. «Alrededor» también sería válido, pero «en derredor» refleja mejor el tono bíblico sin resultar arcaizante en exceso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón del juicio. «Porque» es la equivalencia causal más clara y natural en español.
- source_word: אֹתִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - a mí
  - me
  lexicon: HALOT
  rationale: Con מָרָה, el objeto personal lleva el sentido de rebelión contra alguien. En español se expresa de manera natural como «contra mí», preservando la carga relacional y hostil.
- source_word: מָרָתָה
  english_pob_choice: has rebelled
  chosen_spanish: se ha rebelado
  alternatives_spanish:
  - ha sido rebelde
  - me ha desafiado
  lexicon: HALOT
  rationale: מרה denota rebelión, resistencia o desafío contra autoridad. «Se ha rebelado» es la opción más directa y solemne en español, y conserva la gravedad pactal del verbo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Según la pauta del proyecto, el Tetragrámaton se rinde como «Yahvé». «Dice Yahvé» conserva la fórmula profética קצר/estándar sin forzar un calco demasiado técnico. «Declara Yahvé» y «oráculo de Yahvé» son posibles, pero la formulación breve resulta más fluida en español bíblico moderno.
theological_decisions:
- issue: Referencia del pronombre femenino singular
  english_pob_reading: Rendered as 'her' without specifying Jerusalem in the main text
  chosen_spanish_reading: «ella» sin explicitar el antecedente
  alternative_spanish_readings:
  - Jerusalén
  - hija de Sion
  - la tierra/Judá
  rationale: El hebreo deja implícito el antecedente femenino. Mantener «ella» respeta la personificación y evita resolver una ambigüedad que el texto fuente no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés, sin depender mecánicamente de la traducción inglesa. Se preserva la imagen de cerco, el matiz causal de כִּי, el valor de rebelión de מרה y la lectura del nombre divino como Yahvé. No se incorporan revisiones posteriores porque el expediente indica que no hubo cambios y el control cruzado muestra alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología del proyecto.
  - Se usa «contra ella» para עָלֶיהָ por el contexto hostil, preservando el referente femenino implícito.
  - «En derredor» se eligió por claridad y tono bíblico sobrio en español.
  - La nota al pie conserva la alternativa léxica principal del inglés POB para no perder la tensión entre 'watchmen', 'guards' y 'keepers'.
