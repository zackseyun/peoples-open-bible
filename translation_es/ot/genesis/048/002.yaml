translation:
  language: es
  text: 'Y a Jacob se le informó[a], y se dijo: «Mira, tu hijo José ha venido a ti». E Israel se fortaleció y se sentó sobre la cama.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Israel se fortaleció».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: was told
  chosen_spanish: fue notificado
  alternatives_spanish:
  - se le informó
  - le fue dicho
  lexicon: HALOT
  rationale: El hebreo usa un verbo de ‘dar noticia / informar’ con sujeto implícito; en español conviene una construcción impersonal pasiva para conservar esa indeterminación. «Fue notificado» mantiene el valor informativo del verbo sin introducir un agente no explicitado por el texto.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalmente transliterado como «Jacob», que corresponde al hebreo y coincide con el expediente inglés.
- source_word: וַיֹּאמֶר
  english_pob_choice: and it was said
  chosen_spanish: y se dijo
  alternatives_spanish:
  - y dijeron
  - y fue dicho
  lexicon: HALOT
  rationale: Aunque el inglés POB desdobla el flujo con comillas, el hebreo introduce otro acto de habla. «Y se dijo» preserva la voz impersonal y evita atribuir un hablante no especificado.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención. «Mira» conserva la fuerza deíctica en un español moderno y digno mejor que un calco arcaizante.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu propio hijo
  lexicon: HALOT
  rationale: Correspondencia directa y natural del posesivo nominal.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: HALOT
  rationale: Nombre propio en su forma española estándar, que es la forma publicada y reconocible en español bíblico.
- source_word: בָּא אֵלֶיךָ
  english_pob_choice: has come to you
  chosen_spanish: ha venido a ti
  alternatives_spanish:
  - vino a ti
  - está viniendo a ti
  lexicon: HALOT
  rationale: El qatal de בוא expresa acción completada con relevancia presente; «ha venido» reproduce bien ese valor aspectual en español.
- source_word: וַיִּתְחַזֵּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - recobró fuerzas
  - se hizo fuerte
  lexicon: HALOT
  rationale: El hitpael de חזק es reflexivo. «Se fortaleció» conserva la reflexividad y la idea de recobrar vigor sin añadir matices ajenos.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el cambio deliberado de nombre en el mismo versículo; no se armoniza con «Jacob» porque el hebreo distingue ambas formas.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat up
  chosen_spanish: se sentó
  alternatives_spanish:
  - se incorporó y se sentó
  - se sentó incorporándose
  lexicon: HALOT
  rationale: El verbo básico es «sentarse». En contexto de enfermedad y lecho, el español permite dejar implícito el movimiento hacia una postura erguida sin sobreexplicarlo. «Se sentó» es fiel y natural.
- source_word: עַל הַמִּטָּה
  english_pob_choice: on the bed
  chosen_spanish: sobre la cama
  alternatives_spanish:
  - en la cama
  - sobre el lecho
  lexicon: HALOT
  rationale: מִטָּה puede significar cama o lecho. «Sobre la cama» expresa bien la relación espacial de עַל y suena natural en español contemporáneo.
theological_decisions:
- issue: Alternancia de los nombres Jacob / Israel en el versículo
  english_pob_reading: Preserve the name shift exactly as in Hebrew
  chosen_spanish_reading: 'Preservar exactamente el cambio de nombre: Jacob / Israel'
  alternative_spanish_readings:
  - Usar Jacob en todo el versículo por consistencia estilística
  - Usar Israel en todo el versículo para unificar el referente
  rationale: La alternancia puede tener peso literario y teológico en Génesis. La versión española no debe nivelar esa tensión; por eso conserva ambos nombres tal como aparecen en el original.
  doctrine_reference: Tradición de nombres en Génesis; §3, §5 de la filosofía de traducción
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que corrigió una compresión inicial («When Jacob was told») para volver a una estructura más completa y formalmente alineada con el hebreo («And it was told... and it was said...»). La redacción española sigue esa decisión y conserva dos miembros verbales impersonales, además de mantener el cambio Jacob/Israel sin armonización.
  spanish_consistency_notes:
  - Se usa «Jacob» como nombre propio, no «Jacobo», para mantener la convención bíblica y la continuidad con el expediente fuente.
  - Se usa «José» para יוֹסֵף según el uso estándar del español bíblico.
  - Se evita «SEÑOR» u otra sustitución porque en este versículo no aparece el nombre divino.
  - 'La nota al pie marca la alternativa lexical observada en el expediente inglés: «se fortaleció» frente a la lectura más literal del hebreo.'
  - La puntuación con comillas angulares se adapta al español y conserva el discurso directo.
