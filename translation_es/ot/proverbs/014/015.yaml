translation:
  language: es
  text: El ingenuo cree cada palabra[a], pero el prudente considera sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cree todo» o «cree todo asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּתִי
  english_pob_choice: a simple man
  chosen_spanish: el ingenuo
  alternatives_spanish:
  - el simple
  - el naive
  - el crédulo
  lexicon: HALOT
  rationale: En Proverbios, פֶּתִי no describe falta de inteligencia, sino a la persona inexperta y fácilmente influenciable. «Ingenuo» comunica bien esa credulidad sin sonar tan técnico como «el simple», y mantiene el contraste proverbial con el prudente.
- source_word: יַאֲמִין
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - confía en
  - da por cierto
  - es crédulo ante
  lexicon: HALOT
  rationale: El verbo aquí expresa aceptar algo como verdadero. «Cree» es la equivalencia natural en español y conserva la amplitud del acto de creer sin añadir matices no presentes en el hebreo.
- source_word: לְכָל דָּבָר
  english_pob_choice: every word
  chosen_spanish: todo lo que se le dice
  alternatives_spanish:
  - cada palabra
  - todo asunto
  - todas las cosas
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «cosa». En este proverbio la idea es la credulidad indiscriminada ante lo que oye; por eso se vierte de manera más natural como «todo lo que se le dice», conservando la extensión del término sin forzar un calco rígido.
- source_word: עָרוּם
  english_pob_choice: a prudent man
  chosen_spanish: el prudente
  alternatives_spanish:
  - el sagaz
  - el astuto
  - el sensato
  lexicon: HALOT
  rationale: En la sabiduría bíblica, עָרוּם suele tener un valor positivo de discernimiento prudente, no de engaño. «El prudente» transmite ese sentido aprobatorio y mantiene el paralelismo con «el ingenuo».
- source_word: יָבִין
  english_pob_choice: considers
  chosen_spanish: examina
  alternatives_spanish:
  - considera
  - discierne
  - reflexiona sobre
  lexicon: HALOT
  rationale: El verbo implica discernimiento atento. «Examina» expresa en español una atención cuidadosa y activa al propio proceder, ajustándose bien al contexto de la segunda línea.
- source_word: לַאֲשֻׁרוֹ
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - su camino
  - su curso
  - su marcha
  lexicon: HALOT
  rationale: El término conserva una imagen concreta de caminar y, por extensión, del modo de proceder. «Sus pasos» reproduce con fidelidad esa imagen bíblica y sugiere la conducta personal sin perder literalidad.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con la evaluación de control y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo el contraste sapiencial entre el ingenuo y el prudente, evitando términos que inclinen «astuto» hacia una connotación negativa.
  - «Sus pasos» conserva la metáfora corporal del hebreo para la conducta, en armonía con el tramo final del proverbio.
  - La nota ofrece alternativas breves para reflejar la amplitud semántica de דָּבָר sin sobrecargar el texto principal.
