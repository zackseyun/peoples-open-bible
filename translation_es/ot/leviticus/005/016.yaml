  text: וְ/אֵ֣ת אֲשֶׁר֩ חָטָ֨א מִן הַ/קֹּ֜דֶשׁ יְשַׁלֵּ֗ם וְ/אֶת חֲמִֽישִׁת/וֹ֙ יוֹסֵ֣ף עָלָ֔י/ו וְ/נָתַ֥ן אֹת֖/וֹ לַ/כֹּהֵ֑ן וְ/הַ/כֹּהֵ֗ן יְכַפֵּ֥ר עָלָ֛י/ו בְּ/אֵ֥יל הָ/אָשָׁ֖ם וְ/נִסְלַ֥ח לֽ/וֹ־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/016.yaml
  text: He shall make restitution for what he sinned against from the holy thing[a], and he shall add a fifth to it and give it to the priest. Then the priest shall make atonement for him with the ram of the guilt offering[b], and he shall be forgiven.
  footnotes:
  - marker: a
    text: Or, 'for what he wrongfully withheld from the holy thing.' The Hebrew refers to restitution for an offense involving something holy or sacred.
    reason: lexical_alternative
  - marker: b
    text: Or, 'with the ram for a guilt offering'; alternatively, 'for a reparation offering.'
    reason: alternative_reading
  ai_draft:
