  - severity: medium
    issue: Falta una nota sobre «la mano de Dios» como metáfora de juicio divino.
    rationale: El POB inglés preserva y explica esta imagen como decisión teológica/lexical importante. La revisión española debe mantener esa trazabilidad, especialmente porque la expresión puede sonar menos transparente en español moderno.
  - severity: low
    issue: «La mano de Dios estaba muy pesada allí» es algo poco idiomático en español.
    rationale: No es incorrecto, pero «pesaba muchísimo allí» o «era muy pesada allí» suena más natural sin perder la metáfora ni el sentido de juicio intenso.
