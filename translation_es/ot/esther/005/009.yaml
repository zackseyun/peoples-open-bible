translation:
  language: es
  text: Amán salió aquel día alegre y contento de corazón. Pero cuando Amán vio a Mardoqueo en la puerta del rey[a], y que no se levantó ni tembló delante de él, Amán se llenó de ira contra Mardoqueo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se levantó ni mostró temor delante de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂמֵחַ וְטוֹב לֵב
  english_pob_choice: joyful and glad of heart
  chosen_spanish: alegre y contento de corazón
  alternatives_spanish:
  - gozoso y alegre de corazón
  - lleno de gozo y de buen ánimo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala un estado emocional jubiloso. 'Alegre y contento de corazón' conserva el paralelismo y la intensidad sin sonar forzado en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: '''Aquel día'' es natural en español y mantiene la referencia temporal definida del hebreo.'
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: in the king’s gate
  chosen_spanish: en la puerta del rey
  alternatives_spanish:
  - en la puerta real
  - en la entrada del rey
  lexicon: HALOT
  rationale: '''Puerta'' refleja el sentido de acceso/portal del hebreo y es la forma más natural en español para el complejo de entrada palaciego. Se evita una calca rígida de ''la puerta del rey'' si no oscurece el referente.'
- source_word: וְלֹא קָם
  english_pob_choice: he did not rise
  chosen_spanish: no se levantaba
  alternatives_spanish:
  - no se alzaba
  - no se puso de pie
  lexicon: HALOT
  rationale: Aquí קום expresa el gesto de ponerse en pie en señal de respeto. 'No se levantaba' comunica bien la acción y el valor social implicado.
- source_word: וְלֹא זָע מִמֶּנּוּ
  english_pob_choice: or tremble before him
  chosen_spanish: ni temblaba delante de él
  alternatives_spanish:
  - ni se estremecía ante él
  - ni mostraba temor delante de él
  lexicon: HALOT
  rationale: זוע puede abarcar temblar o agitarse por temor. En este contexto la falta de deferencia ofende a Haman; 'temblaba delante de él' conserva la fuerza de la humillación percibida y el matiz de temor/agitación. 'Delante de él' mantiene la relación interpersonal del original.
- source_word: וַיִּמָּלֵא ... חֵמָה
  english_pob_choice: was filled with rage
  chosen_spanish: se llenó de ira
  alternatives_spanish:
  - se llenó de furia
  - ardió de ira
  lexicon: HALOT
  rationale: La construcción expresa enojo intenso. 'Se llenó de ira' es una equivalencia clara y digna en español; 'ira' conserva el tono fuerte sin añadir una intensificación no exigida por el hebreo.
- source_word: עַל מָרְדֳּכַי
  english_pob_choice: against Mordecai
  chosen_spanish: contra Mardoqueo
  alternatives_spanish:
  - hacia Mardoqueo
  - por causa de Mardoqueo
  lexicon: HALOT
  rationale: Con verbos de enojo, עַל marca el blanco de la hostilidad. 'Contra Mardoqueo' reproduce bien esa dirección adversativa en español.
translation_notes:
  revision_awareness: 'Coincide ampliamente con el texto hebreo y con el auditor inglés: se mantiene la secuencia narrativa, el contraste adversativo y la fuerza idiomática de las expresiones de gozo y de ira. La única nota alternativa conserva el matiz lexical de זָע sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se usa 'Haman' sin artículo, conforme al nombre propio hebreo y al uso consistente del proyecto.
  - Se usa 'Mardoqueo' para el nombre propio tradicional en español, manteniendo la identificabilidad bíblica sin alterar el sentido del original.
  - '''Puerta del rey'' conserva el referente cortesano del hebreo; se evitó ''en la puerta real'' porque en español puede sonar más abstracto que el contexto narrativo requiere.'
  - '''Ira'' se reservó para חֵמָה; no se suavizó a ''enojo'' porque el contexto muestra una reacción intensa y hostil.'
