translation:
  language: es
  text: 'Y ahora[a], ¿acaso subí contra esta tierra para destruirla sin Yahvé? Yahvé me dijo: «Sube contra esta tierra y destrúyela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de Yahvé» o «independientemente de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבַּלְעֲדֵי
  english_pob_choice: was it apart from
  chosen_spanish: ¿fue aparte de... que...
  alternatives_spanish:
  - ¿fue sin... que...
  - ¿fue independientemente de... que...
  lexicon: HALOT
  rationale: La construcción interrogativa retórica expresa que la acción no ocurrió de manera autónoma respecto de Yahvé. «Aparte de» conserva esa relación sin volverla excesivamente técnica o calcada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el Tetragrámaton: usar «Yahvé» como forma española estable y auditable, en vez de sustituirlo por un título.'
- source_word: עָלִיתִי
  english_pob_choice: I came up
  chosen_spanish: subí
  alternatives_spanish:
  - subí contra
  - me acerqué
  lexicon: HALOT
  rationale: El verbo עלה en contexto militar admite la idea de ascender o avanzar hacia una campaña. En español, «subí» conserva el movimiento básico, y el complemento «contra esta tierra» aporta el matiz hostil exigido por el contexto.
- source_word: עַל הָאָרֶץ הַזֹּאת
  english_pob_choice: against this land
  chosen_spanish: contra esta tierra
  alternatives_spanish:
  - sobre esta tierra
  - a esta tierra
  lexicon: HALOT
  rationale: El hebreo con על en contexto bélico funciona adversativamente. «Contra esta tierra» expresa mejor la intención hostil que una mera localización espacial.
- source_word: לְהַשְׁחִיתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para arruinarla
  - para devastarla
  lexicon: HALOT
  rationale: El hifil de שׁחת aquí denota destrucción causada contra la tierra. «Para destruirla» es la equivalencia más directa y clara en español.
- source_word: אָמַר אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - habló conmigo
  - dijo a mí
  lexicon: HALOT
  rationale: La fórmula narrativa normal de discurso directo en español es «me dijo», que reproduce con naturalidad la relación emisor-receptor.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Asciende
  lexicon: HALOT
  rationale: El imperativo de עלה se expresa naturalmente con «sube». Mantiene el verbo de movimiento y el tono de mando divino.
- source_word: וְהַשְׁחִיתָהּ
  english_pob_choice: and destroy it
  chosen_spanish: y destrúyela
  alternatives_spanish:
  - y arrástrala a la ruina
  - y devástala
  lexicon: HALOT
  rationale: La repetición del mandato se conserva con un imperativo directo. «Destrúyela» mantiene la fuerza y la simetría del hebreo.
theological_decisions:
- issue: Referencia al nombre divino en una cita atribuida al invasor asirio
  english_pob_reading: The verse preserves the claim that Yahweh supposedly authorized the attack, without endorsing it; YHWH is rendered as Yahweh.
  chosen_spanish_reading: El texto conserva la afirmación atribuida al invasor de que Yahvé habría autorizado el ataque, sin validar esa afirmación; el Nombre divino se traduce como Yahvé.
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La traducción debe conservar el contenido de la cita hostil sin reinterpretarlo. Usar «Yahvé» mantiene la coherencia del proyecto con el Nombre divino y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: no hubo cambios requeridos tras la última pasada, y la propuesta coincide con el alto grado de acuerdo del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo de la doble orden con «destruirla / destrúyela».
  - El español evita un calco rígido de la estructura hebrea, pero retiene la pregunta retórica y el matiz bélico.
  - La puntuación con comillas angulares preserva el discurso directo de la cita.
