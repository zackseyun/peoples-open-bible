translation:
  language: es
  text: Y pusieron los dos extremos de las dos cadenas trenzadas[a] sobre los dos engastes[b], y los pusieron sobre las hombreras del efod, en la parte delantera de este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cadenas entretejidas»; también puede reflejar una expresión antigua equivalente a «cadenas trenzadas» o «cadenas torcidas».
    reason: lexical_alternative
  - marker: b
    text: O «monturas».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצוֹת
  english_pob_choice: ends
  chosen_spanish: extremos
  alternatives_spanish:
  - puntas
  - terminaciones
  lexicon: HALOT
  rationale: El hebreo designa los puntos terminales de algo. «Extremos» conserva ese sentido y suena natural en español bíblico contemporáneo.
- source_word: הָעֲבֹתֹת
  english_pob_choice: braided chains
  chosen_spanish: cadenas trenzadas
  alternatives_spanish:
  - cadenas entrelazadas
  - cadenas torcidas
  - cuerdas trenzadas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término apunta a un trabajo de cadena o cordón retorcido/trenzado. «Cadenas trenzadas» mantiene la imagen de cadena y la cualidad artesanal sin volverlo arcaico.
- source_word: מִּשְׁבְּצֹת
  english_pob_choice: settings
  chosen_spanish: engastes
  alternatives_spanish:
  - monturas
  - montajes
  - soportes
  lexicon: HALOT
  rationale: El término se refiere a piezas de adorno o fijación para joyería/ornamento. «Engastes» es un equivalente técnico en español que comunica bien la función artesanal; se conserva la alternativa de «engastes» frente a opciones más genéricas.
- source_word: וַיִּתְּנֻם
  english_pob_choice: put them
  chosen_spanish: los pusieron
  alternatives_spanish:
  - los colocaron
  - los fijaron
  - los asentaron
  lexicon: HALOT
  rationale: El verbo נתן aquí es de colocación. «Los pusieron» sigue de cerca el valor básico y evita añadir con demasiada fuerza una noción de fijación que el hebreo no explicita por sí sola.
- source_word: כִּתְפֹת
  english_pob_choice: shoulder pieces
  chosen_spanish: hombreras
  alternatives_spanish:
  - piezas de hombro
  - hombros
  - sobrehombros
  lexicon: HALOT
  rationale: En la prenda del efod no se trata del hombro anatómico sino de sus piezas de apoyo. «Hombreras» expresa de forma natural esa parte de la vestidura y mantiene el vínculo con el uso del POB inglés.
- source_word: אֶל מוּל פָּנָיו
  english_pob_choice: at its front
  chosen_spanish: al frente de éste
  alternatives_spanish:
  - en su frente
  - hacia su frente
  - delante de él
  lexicon: HALOT
  rationale: La frase indica ubicación en la parte frontal del efod. «Al frente de éste» conserva la referencia espacial sin sobreinterpretar el movimiento ni el aspecto del objeto.
theological_decisions:
- issue: Terminología del efod y sus partes técnicas
  english_pob_reading: The verse describes garment construction with artisan vocabulary, not theological symbolism beyond the text.
  chosen_spanish_reading: 'Se mantiene un registro descriptivo y técnico: «efod», «engastes», «hombreras».'
  alternative_spanish_readings:
  - reformular con lenguaje más devocional
  - usar términos litúrgicos tradicionales
  rationale: El pasaje es de fabricación cultual y el hebreo es concreto. La traducción debe conservar esa concreción sin espiritualizar ni suavizar el texto.
  doctrine_reference: Éxodo 28–39 (descripción del vestuario sacerdotal)
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios textuales ni decisiones revisadas posteriores; se conserva la equivalencia óptima con ajuste natural al español.
  spanish_consistency_notes:
  - Se conserva «efod» como término técnico ya fijado en la tradición de traducción bíblica y en el contexto inmediato.
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni un sustituto divino en este versículo.
  - La secuencia verbal en pasado narrativo («pusieron») refleja correctamente el wayyiqtol hebreo.
  - Se mantiene la referencia pronominal de «éste» para el efod, según el sufijo posesivo del hebreo.
