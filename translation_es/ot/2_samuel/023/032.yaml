  spanish_consistency_notes:
  - Se mantiene la secuencia nominal del hebreo, aun cuando resulte en una frase tersa y difícil en español.
  - Se preserva el artículo definido del gentilicio para reflejar la forma hebrea.
  - Se usan formas españolas reconocibles para nombres propios cuando existen, pero sin borrar la identidad del original.
