review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura invocativa del griego y conserva adecuadamente «Señor Dios, Rey, Dios de Abraham», «tu pueblo» y «tu herencia desde el principio». También mantiene la nota alternativa sobre ἐξ ἀρχῆς. Sin embargo, el punto principal a corregir es φεῖσαι: el sentido es «perdonar en el sentido de no destruir / preservar / librar», no «perdonar» en el sentido habitual español de absolver una culpa. Eso desplaza el significado de la súplica. Además, «nos miran para destrucción» es demasiado calcado y poco natural en español; el propio material auditado favorece una idea como «nos vigilan para destruirnos» o «han puesto los ojos en nosotros para destrucción».'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero dos giros afectan la legibilidad natural: «perdona a tu pueblo» suena a remisión de culpa más que a sparedeliverance, y «nos miran para destrucción» no es idiomático en español general. Una redacción como «preserva a tu pueblo» y «nos vigilan para destruirnos» mejora tanto fidelidad como naturalidad. Las notas necesitan reanclarse porque actualmente [a] está sobre «perdona», aunque el contenido de la nota explica la frase hostil ἐπιβλέπουσιν…'
  glossary_alignment: No hay conflicto importante con la terminología del proyecto en nombres divinos. «Señor» para Κύριε es aceptable aquí, ya que no se trata de יהוה explícito en el texto fuente griego. «Herencia» para κληρονομία y «pueblo» para λαός están bien. La principal desalineación léxica es φεῖσαι -> «perdona», que debería ajustarse a «preserva», «perdona la vida a», o «libra», preferiblemente «preserva» por precisión y neutralidad.
  issues:
  - severity: high
    issue: φεῖσαι se tradujo como «perdona»
    rationale: En español bíblico y común, «perdonar» activa primero el sentido de absolver culpa u ofensa. Aquí el imperativo de φείδομαι pide que Dios spare/preserve a su pueblo, no que le perdone pecados.
  - severity: medium
    issue: La nota [a] está anclada al término equivocado
    rationale: El contenido de la nota explica ἐπιβλέπουσιν ἡμῖν εἰς καταφθοράν, pero en el borrador [a] aparece sobre «perdona». El anclaje debe ir en la frase de hostilidad, no en φεῖσαι.
  - severity: medium
    issue: «nos miran para destrucción» es un calco poco natural
    rationale: Aunque intenta seguir de cerca el griego comprimido, en español suena forzado. «Nos vigilan para destruirnos» expresa la intención hostil con mejor claridad y sigue dentro del rango documentado.
  revised_spanish_text: Y ahora, Señor Dios, Rey, Dios de Abraham, preserva a tu pueblo, porque nos vigilan[a] para destruirnos y han deseado destruir tu herencia[b] desde el principio.
  revised_footnotes:
  - marker: a
    text: O «nos vigilan para ruina» o «han puesto los ojos en nosotros para destrucción». La expresión griega es condensada y comunica intención hostil dirigida a nuestra caída.
    reason: lexical_alternative
  - marker: b
    text: O «tu herencia de antiguo» / «tu antigua herencia».
    reason: alternative_reading
  revision_rationale: Se cambió «perdona» por «preserva» para reflejar con precisión φεῖσαι como súplica de no destruir o librar, no de absolver culpa. Se reformuló «nos miran para destrucción» como «nos vigilan para destruirnos» para lograr un español natural que conserve la intención hostil del griego y del audit trail inglés. También se reubicaron las notas al lugar correspondiente en el texto.
