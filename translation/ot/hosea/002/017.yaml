theological_decisions:
- issue: Meaning of וְעָנְתָה in restoration context
  chosen_reading: rendered as 'she will answer' in the main text
  alternative_readings:
  - she will sing
  - she will respond in song
  rationale: The verb's basic sense is 'answer/respond.' Because the context evokes renewed covenant joy and may allude to Israel's song after the exodus, 'sing' is possible, but the Hebrew itself does not require that narrower interpretation. Preserving 'answer' keeps the lexical tension without importing a more specific liturgical image into the main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
