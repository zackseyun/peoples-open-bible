review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la urgencia y la advertencia general del hebreo, y conserva correctamente ''el rey'' en vez de reemplazarlo por ''David''. Sin embargo, hay fallas de fidelidad/forma en puntos importantes: ''en las vados'' es gramaticalmente incorrecto; וְגַם עָבוֹר תַּעֲבוֹר expresa un mandato enfático de cruzar, no ''cruza también'' en el sentido aditivo; y el final debe sonar natural en español sin perder la imagen de ''ser tragados/consumidos''.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero contiene una incorrección evidente (''las vados'') y una combinación algo forzada (''sino cruza también''). Conviene ajustar a un español más natural y digno: ''en los vados del desierto'' y ''más bien, asegúrate de cruzar''.'
  glossary_alignment: No hay términos teológicos especiales aquí. Se mantiene bien 'David', 'el rey' y 'pueblo'. La nota léxica sobre ערבות como 'vados/llanuras' debe conservarse; en español, 'vados' funciona bien en este contexto si se corrige el artículo.
  issues:
  - severity: high
    issue: Error gramatical en 'en las vados del desierto'
    rationale: '''Vados'' es masculino plural; la forma correcta es ''en los vados del desierto''. La forma actual perjudica la legibilidad y no cumple el estándar de español publicable.'
  - severity: medium
    issue: '''sino cruza también'' no refleja bien el énfasis de וְגַם עָבוֹר תַּעֲבוֹר'
    rationale: 'El hebreo usa infinitivo absoluto + verbo finito para intensificar el mandato: ''asegúrate de cruzar'' / ''debes cruzar''. ''También'' suena aditivo y débil, y además el rastro inglés final eliminó ''also'' por torpeza estilística.'
  - severity: low
    issue: La clausura 'sean tragados' es fiel pero puede sonar algo rígida
    rationale: 'Es legítima por la imagen de בלע, pero conviene integrarla en una sintaxis más natural: ''no sea que el rey y todo el pueblo que está con él sean tragados'' funciona bien si se mejora el tramo previo.'
  revised_spanish_text: 'Ahora envíen con rapidez y digan a David[a]: «No pases la noche en los vados del desierto, más bien, asegúrate de cruzar, no sea que el rey y todo el pueblo que está con él sean tragados»'
  revised_footnotes:
  - marker: a
    text: O «en las llanuras del desierto». La expresión hebrea puede denotar las tierras bajas o llanuras del desierto; aquí se traduce «vados» porque el contexto inmediato exige la idea de un cruce y de un peligro en ese punto.
    reason: lexical_alternative
  revision_rationale: Se corrige el error gramatical 'las vados' a 'los vados', se ajusta el mandato enfático para reflejar mejor עָבוֹר תַּעֲבוֹר ('asegúrate de cruzar' en vez de 'cruza también'), y se pule la fluidez general del español sin apartarse de la imagen fuente de 'ser tragados'.
