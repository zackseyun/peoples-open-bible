review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura de dos preguntas retóricas y conserva el sentido general de הֲקֵץ, אוֹ, מַה y תַעֲנֶה. Sin embargo, לְדִבְרֵי רוּחַ queda menos natural en español como «palabras de viento», y la nota actual no aporta una alternativa real porque repite la misma frase. Además, כִּי se vierte mejor aquí como «que» que como «para que», ya que la cláusula expresa el contenido/resultado de la incitación más que un propósito.
  spanish_quality_summary: 'El texto es claro, pero «fin a las palabras de viento» suena algo calcado y «para que respondas así» introduce un matiz final más marcado de lo que pide el hebreo. Una ligera revisión mejora naturalidad y fidelidad: «¿No hay fin para las palabras vacías? ¿O qué te impulsa a responder así?»'
  glossary_alignment: 'No hay términos teológicos de glosario mayor en juego. La decisión clave es רוּחַ: aquí no debe traducirse como «espíritu», sino según el modismo de habla vacía/insustancial. «Palabras vacías» comunica mejor en español la fuerza idiomática documentada por el POB, y puede conservarse la imagen literal en nota.'
  issues:
  - severity: medium
    issue: «palabras de viento» es demasiado calcado y poco idiomático en español.
    rationale: Aunque preserva la metáfora hebrea, suena extraño en español eclesial general. El propio expediente inglés reconoce el valor idiomático de discurso vacío; «palabras vacías» comunica mejor el sentido fuente.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa útil porque repite «palabras de viento».
    rationale: La nota debe preservar alternativas significativas. Conviene usar la nota para registrar la literalidad «palabras de viento» si el texto principal adopta la opción idiomática.
  - severity: medium
    issue: «para que respondas así» sobretraduce כִּי con matiz de finalidad.
    rationale: Aquí כִּי funciona mejor como nexo de contenido/resultado tras «qué te impulsa», no como propósito. En español «a responder así» o «que respondas así» suena más fiel y natural.
  revised_spanish_text: ¿No hay fin para las palabras vacías[a]? ¿O qué te impulsa a responder así?
