translation:
  language: es
  text: 'Así que Moisés clamó a Yahvé[a], diciendo: «¿Qué haré con este pueblo? Un poco más, y me apedrearán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Un poco más, y me apedrearán», con sentido de amenaza inminente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: HALOT
  rationale: צעק expresa un clamor intenso, normalmente de urgencia o angustia. En español, «clamó» conserva mejor ese sentido de súplica intensa dirigida a Dios que un simple «dijo» o una formulación más neutra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrámaton. La política del proyecto pide «Yahvé» en el texto principal, no la sustitución por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: La forma introductoria del discurso se vierte de manera directa y natural como «diciendo», conservando la transición narrativa del hebreo.
- source_word: מָה אֶעֱשֶׂה
  english_pob_choice: What shall I do
  chosen_spanish: ¿Qué haré?
  alternatives_spanish:
  - ¿Qué debo hacer?
  - ¿Qué voy a hacer?
  lexicon: HALOT
  rationale: 'La pregunta deliberativa de Moisés se expresa con futuro en español como forma natural de decisión/inquietud: «¿Qué haré?». Mantiene el tono urgente y no añade modalización no presente en el hebreo.'
- source_word: לָעָם הַזֶּה
  english_pob_choice: with this people
  chosen_spanish: con este pueblo
  alternatives_spanish:
  - para este pueblo
  - ante este pueblo
  lexicon: HALOT
  rationale: Aunque el hebreo usa ל con עשה, el sentido idiomático aquí es la relación problemática de Moisés con el pueblo. «Con este pueblo» comunica bien la idea de trato o manejo, sin forzar una literalidad poco natural en español.
- source_word: עֹד מְעַט
  english_pob_choice: A little more
  chosen_spanish: Un poco más
  alternatives_spanish:
  - Todavía un poco
  - Aún un poco más
  lexicon: HALOT
  rationale: La expresión marca inminencia temporal. «Un poco más» es la forma más idiomática en español para transmitir que falta muy poco antes del desenlace violento.
- source_word: וּסְקָלֻנִי
  english_pob_choice: and they will stone me
  chosen_spanish: y me apedrearán
  alternatives_spanish:
  - y me lapidarán
  - y me arrojarán piedras hasta matarme
  lexicon: HALOT
  rationale: סקל refiere al acto de apedrear como ejecución o ataque violento. «Apedrearán» es claro y natural en español bíblico contemporáneo; se evita «lapidarán» por ser más técnico y menos transparente para una lectura pública.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio de Dios en vez de sustituirlo por un título. Esto sigue la convención del proyecto y evita ocultar el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor temporal e inminencia de עֹד מְעַט
  english_pob_reading: ‘A little more’ expressing that the threat is imminent
  chosen_spanish_reading: «Un poco más» con valor de inminencia
  alternative_spanish_readings:
  - «Todavía un poco»
  - «Aún un poco más»
  rationale: La expresión no solo indica cantidad pequeña, sino proximidad del acto de violencia. La traducción española debe conservar esa inminencia sin añadir contenido ajeno al texto.
  doctrine_reference: Exodo 17:4, nota lexical sobre la amenaza inminente
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última pasada; la versión española sigue esa lectura estable, incorporando el mismo énfasis de inminencia para עֹד מְעַט y la misma decisión doctrinal para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evita «señor» como sustituto del nombre divino para no perder la referencia al Tetragrámaton.
  - «Apedrearán» conserva el valor verbal directo del hebreo y la inminencia del contexto.
  - La nota al pie se ancla en la cláusula final para preservar la alternativa semántica documentada.
