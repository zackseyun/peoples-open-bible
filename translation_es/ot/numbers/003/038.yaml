revisions:
- from: Los que acampaban delante del tabernáculo, al oriente[a], delante de la tienda de reunión, hacia el naciente, eran Moisés, Aarón y sus hijos, guardando la custodia del santuario en representación de los hijos de Israel[b]. Pero el extraño que se acerque será muerto.
  to: Los que acampaban delante del tabernáculo, al oriente[a], delante de la tienda de reunión, hacia el naciente, eran Moisés, Aarón y sus hijos, encargados de la custodia del santuario en representación de los hijos de Israel. Pero el no autorizado[b] que se acerque será muerto.
  rationale: 'Se corrige el punto principal de fidelidad léxica: זָר se traduce como «el no autorizado» para evitar una lectura étnica de «extraño» y para conservar la decisión documentada del POB. La nota [b] se traslada a ese término y reproduce la aclaración auditada. Además, «guardando la custodia» se suaviza a «encargados de la custodia», que suena más natural en español sin perder el sentido de responsabilidad cultual. No se requiere adjudicación adicional porque el ajuste es claro a partir del hebreo y del rastro inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: ubicación frente al tabernáculo/tienda de reunión, doble orientación hacia el este, identificación de Moisés, Aarón y los hijos de Aarón, función de custodia del santuario y pena para quien se acerca sin autorización. Sin embargo, dos decisiones clave no preservan con suficiente precisión el sentido auditado: «el extraño» tiende a introducir una lectura étnica que el inglés POB explícitamente evita para זָר, y la nota [b] explica «los hijos de Israel» en vez de aclarar el sentido de «el outsider», por lo que no conserva la racionalidad documentada de la nota inglesa.'
  spanish_quality_summary: 'El español es generalmente legible y digno, pero varias expresiones suenan algo rígidas o poco naturales: «guardando la custodia» es torpe, «en representación de» puede sonar demasiado formal-institucional, y «será muerto» resulta menos natural que «será condenado a muerte» o «será ejecutado», aunque estas últimas también interpretan. Una reparación leve mejora fidelidad y naturalidad sin apartarse del hebreo.'
  glossary_alignment: 'No hay conflicto con términos de proyecto mayores como Yahvé/Mesías. «Tabernáculo», «tienda de reunión», «santuario» y «los hijos de Israel» están bien alineados. La principal desalineación terminológica es זָר: conforme al rastro POB, debe evitarse una forma española que sugiera extranjero étnico; «el no autorizado» o «el intruso» funcionan mejor aquí. También conviene ajustar la nota [b] para reflejar el comentario cultural documentado sobre acceso cultual no autorizado.'
  issues:
  - severity: high
    issue: «el extraño» para וְהַזָּר
    rationale: En español bíblico general, «extraño» puede entenderse como extranjero o desconocido. El expediente POB documenta que זָר aquí significa persona no autorizada para el servicio del santuario, no extranjero por etnia. La traducción actual no preserva ese control semántico y la nota no corrige el problema porque comenta otra frase.
  - severity: high
    issue: La nota [b] está anclada y explicada en el lugar equivocado
    rationale: La nota inglesa [b] aclara «the outsider». El borrador español pone [b] después de «los hijos de Israel» y comenta el sentido corporativo de esa expresión, introduciendo una nota distinta a la auditada y omitiendo la aclaración necesaria sobre זָר.
  - severity: medium
    issue: «guardando la custodia» suena poco idiomático
    rationale: Aunque intenta reflejar la construcción cognada שֹׁמְרִים מִשְׁמֶרֶת, en español resulta forzado. «cumpliendo la custodia» o «encargados de la custodia» comunican mejor la responsabilidad asignada sin perder el sentido custodial.
  - severity: medium
    issue: «en representación de los hijos de Israel» puede sobreinstitucionalizar el matiz
    rationale: La revisión inglesa favoreció «on behalf of» para expresar responsabilidad vicaria. En español, «en nombre de» puede sobrecargar; «por cuenta de» es demasiado coloquial. «en favor de» o «por los hijos de Israel» no son ideales. «en lugar de los hijos de Israel» sería demasiado fuerte. «en representación de» es defendible, pero conviene una formulación más natural en conjunto; mantenerla es posible si se mejora el resto.
  - severity: low
    issue: «Los que acampaban» frente a un contexto de distribución estable
    rationale: No es incorrecto, pero «Los que estaban acampados» o «Los que acamparon» podría encajar mejor con el contexto censal. Aun así, no requiere cambio obligatorio.
  revised_spanish_text: Los que acampaban delante del tabernáculo, al oriente[a], delante de la tienda de reunión, hacia el naciente, eran Moisés, Aarón y sus hijos, encargados de la custodia del santuario en representación de los hijos de Israel. Pero el no autorizado[b] que se acerque será muerto.
  revised_footnotes:
