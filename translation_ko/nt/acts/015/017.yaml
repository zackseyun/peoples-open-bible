id: ACT.15.17
reference: Acts 15:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅπως ἂν ἐκζητήσωσιν οἱ κατάλοιποι τῶν ἀνθρώπων τὸν κύριον, καὶ πάντα τὰ ἔθνη ἐφ’ οὓς ἐπικέκληται τὸ ὄνομά μου ἐπ’ αὐτούς, λέγει ⸀κύριος ποιῶν ⸀ταῦτα
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/017.yaml
  text: so that the remnant of mankind may seek the Lord[a], even all the Gentiles on whom my name has been called, says the Lord[c][b], who does these things
  footnotes:
  - marker: a
    text: Or 'all the nations.' The Greek ἔθνη can mean either 'Gentiles' or 'nations'; here 'Gentiles' is chosen because the Jerusalem Council is addressing the inclusion of non-Jews.
    reason: alternative_reading
  - marker: b
    text: Or 'who are called by my name.' The Greek idiom literally reads 'on whom my name has been called.'
    reason: lexical_alternative
  - marker: c
    text: This line echoes Amos 9:12 in a form reflected in the Greek Scriptures, where the emphasis falls on the nations/Gentiles bearing the Lord's name.
    reason: cross_reference
translation:
  language: ko
  text: 그리하여 남은 사람들과 내 이름으로 일컬음을 받는 모든 이방인들이 야훼[a]를 찾게 하려 함이다. 이 일을 행하시는 야훼께서 말씀하신다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 인용은 아모스 9:11-12의 LXX 본문이다. 헬라어 κύριος는 여기서 히브리어 본문의 יהוה(YHWH)를 옮긴 것이므로, 본 번역의 원칙에 따라 「야훼」로 옮긴다.
    reason: lexical_alternative
theological_decisions:
- issue: 아모스 9:12 LXX 인용에서 κύριος → 야훼
  chosen_reading: 야훼
  alternative_readings:
  - 주
  rationale: LXX는 히브리어 יהוה를 κύριος로 옮긴다. 본 번역은 NT 본문이 LXX를 인용하면서 YHWH를 가리키는 κύριος를 「야훼」로 복원하는 원칙을 따른다. 야고보가 아모스를 인용하는 본문에서 이 원칙을 적용한다.
  doctrine_reference: 'Glossary: κύριος (= YHWH) → 야훼; DOCTRINE.md: divine name policy'
