translation:
  language: es
  text: Esta estatura tuya es como una palmera, y tus pechos son como racimos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como racimos de uvas». El hebreo אַשְׁכֹּלוֹת puede referirse a racimos de uvas, pero el sustantivo no está especificado aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Esta misma
  - Tal
  lexicon: HALOT
  rationale: El demostrativo femenino singular apunta a la figura de la mujer; "Esta" conserva la inmediatez deíctica del hebreo y suena natural en español.
- source_word: קוֹמָתֵךְ
  english_pob_choice: stature of yours
  chosen_spanish: estatura tuya
  alternatives_spanish:
  - tu estatura
  - tu figura
  - tu altura
  lexicon: HALOT
  rationale: קֹומָה puede referirse a altura corporal o porte/estatura. "Estatura tuya" preserva el énfasis posesivo y la referencia al conjunto de la figura, no solo a una medida numérica.
- source_word: דָּמְתָה
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - se parece a
  - ha llegado a ser como
  lexicon: HALOT
  rationale: דמה expresa semejanza. En español, "es como" reproduce de manera idiomática la comparación poética sin sobrecargar el perfecto hebreo.
- source_word: לְתָמָר
  english_pob_choice: like a palm tree
  chosen_spanish: como una palmera
  alternatives_spanish:
  - como una palma
  - como la palmera
  lexicon: HALOT
  rationale: תמר designa una palmera o palma datilera. "Palmera" es la equivalencia más clara y digna en español; la imagen comparativa queda intacta.
- source_word: וְשָׁדַיִךְ
  english_pob_choice: and your breasts
  chosen_spanish: y tus pechos
  alternatives_spanish:
  - y tu busto
  - y tus senos
  lexicon: HALOT
  rationale: שָׁדַיִם denota de forma directa los pechos. "Pechos" mantiene la fuerza léxica del hebreo y evita suavizar el lenguaje erótico del Cantar.
- source_word: לְאַשְׁכֹּלוֹת
  english_pob_choice: like clusters of fruit
  chosen_spanish: como racimos de uvas
  alternatives_spanish:
  - como racimos
  - como racimos de fruta
  lexicon: HALOT
  rationale: אַשְׁכֹּלוֹת significa racimos y con frecuencia racimos de uvas. En español, "racimos de uvas" hace explícita la imagen más probable y sigue la nota inglesa sobre la alternativa léxica, sin negar que el término hebreo sea más general.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en un símil de figura/palmera y pechos/racimos. No hubo revisiones posteriores que alteraran el sentido, y la única tensión léxica notable está en אַשְׁכֹּלוֹת, que puede ser más general que «racimos de uvas».
  spanish_consistency_notes:
  - Se conservó el paralelismo poético con dos miembros coordinados por «y».
  - Se evitó «SEÑOR» u otros términos de sustitución, pues no hay material divino en este versículo.
  - Se mantuvo un registro digno y claro, apto para lectura pública, sin eufemizar el vocabulario corporal del Cantar.
