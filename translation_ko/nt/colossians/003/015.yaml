id: COL.3.15
reference: Colossians 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἡ εἰρήνη τοῦ ⸀Χριστοῦ βραβευέτω ἐν ταῖς καρδίαις ὑμῶν, εἰς ἣν καὶ ἐκλήθητε ἐν ἑνὶ σώματι· καὶ εὐχάριστοι γίνεσθε.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/015.yaml
  text: And let the peace of Messiah rule in your hearts, to which indeed you were called in one body. And be thankful.
translation:
  language: ko
  text: 또한 메시아의 평강이 여러분의 마음을 다스리게 하십시오. 여러분이 한 몸으로 부르심을 받은 것도 바로 그 평강을 향한 것입니다. 그리고 감사하는 자들이 되십시오.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἡ εἰρήνη τοῦ Χριστοῦ
  english_pob_choice: the peace of Messiah
  chosen_korean: 메시아의 평강
  alternatives_korean:
  - 그리스도의 평강
  - 메시아께서 주시는 평화
  lexicon: BDAG
  rationale: Χριστός는 칭호 「메시아」. εἰρήνη는 글로사리 기본 「평강」.
- source_word: βραβευέτω
  english_pob_choice: let ... rule
  chosen_korean: 다스리게 하십시오
  alternatives_korean:
  - 주관하게 하십시오
  - 심판자가 되게 하십시오
  lexicon: BDAG
  rationale: βραβεύω의 「심판·주관」을 「다스리게 하다」로 옮긴다. 현재 명령의 지속적 어감 살림.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_korean: 여러분의 마음을
  alternatives_korean:
  - 여러분의 마음 안에서
  lexicon: BDAG
  rationale: 「~을 다스리다」의 한국어 자연성을 위해 「~을」로 옮긴다.
- source_word: εἰς ἣν καὶ ἐκλήθητε
  english_pob_choice: to which indeed you were called
  chosen_korean: 바로 그 평강을 향한 것입니다 ... 부르심을 받은 것도
  alternatives_korean:
  - 여러분이 부르심을 받은 것도 그 평강을 위함입니다
  lexicon: BDAG
  rationale: 관계 구문을 한국어에서 명사를 반복하여 「바로 그 평강을 향한 것」으로 명료하게 옮긴다.
- source_word: ἐν ἑνὶ σώματι
  english_pob_choice: in one body
  chosen_korean: 한 몸으로
  alternatives_korean:
  - 한 몸 안에서
  - 한 몸 안으로
  lexicon: BDAG
  rationale: 영어 POB의 「in one body」 결정을 따라 「한 몸으로」(공동체적 영역)로 옮긴다.
- source_word: εὐχάριστοι γίνεσθε
  english_pob_choice: be thankful
  chosen_korean: 감사하는 자들이 되십시오
  alternatives_korean:
  - 감사하는 자가 되십시오
  - 감사를 드리는 자가 되십시오
  lexicon: BDAG
  rationale: γίνεσθε의 「되라」 어감과 형용사 εὐχάριστοι를 「감사하는 자들」로 옮긴다.
