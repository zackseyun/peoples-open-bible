translation:
  language: es
  text: Y los dispersaré entre las naciones, y desenvainaré[a] la espada tras ustedes; y su tierra será una desolación, y sus ciudades serán ruinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacaré la espada».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָרֶה
  english_pob_choice: I will scatter
  chosen_spanish: dispersaré
  alternatives_spanish:
  - esparciré
  - diseminaré
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto expresa dispersión por juicio; «dispersaré» comunica bien la acción y conserva la fuerza covenantal sin sonar mecánico en español. Se evita una paráfrasis más libre como «desterraré» porque el hebreo enfatiza la dispersión entre pueblos/naciones.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» refleja el sentido geopolitico de גּוֹיִם y corresponde al uso del pasaje en Levítico. «Gentiles» introduciría una carga posterior ajena al hebreo; «pueblos» es posible, pero «naciones» es más preciso en este contexto.
- source_word: וַהֲרִיקֹתִי ... חָרֶב
  english_pob_choice: I will draw out the sword
  chosen_spanish: desenvainaré la espada
  alternatives_spanish:
  - sacaré la espada
  - desnudaré la espada
  lexicon: HALOT
  rationale: La locución hebrea con ריק y חֶרֶב refiere a sacar/desenvainar la espada para persecución bélica. «Desenvainaré la espada» es la equivalencia española más natural y conserva la imagen concreta; además, mantiene la alternativa lexical documentada por el POB inglés («unsheathe the sword»).
- source_word: אַחֲרֵיכֶם
  english_pob_choice: after you
  chosen_spanish: detrás de ustedes
  alternatives_spanish:
  - tras ustedes
  - en persecución de ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «después de ustedes», pero en español «detrás de ustedes» expresa bien la persecución implícita en el contexto sin añadir una interpretación demasiado explicativa. Se conserva así la relación espacial/hostil del original.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto devastado
  lexicon: HALOT
  rationale: El sustantivo hebreo nombra el estado de devastación; por eso conviene mantener el nombre abstracto «una desolación» en lugar de convertirlo en adjetivo. Así se preserva el tono solemne de maldición del pacto.
- source_word: חָרְבָּה
  english_pob_choice: ruins
  chosen_spanish: ruinas
  alternatives_spanish:
  - desolación
  - lugares en ruinas
  lexicon: HALOT
  rationale: 'Con «sus ciudades» el sentido resultativo es claro: pasarán a ser «ruinas». Esta opción reproduce la idea de devastación completa que el inglés POB traduce como «ruins».'
- source_word: וְהָיְתָה ... יִהְיוּ
  english_pob_choice: will become
  chosen_spanish: será / serán
  alternatives_spanish:
  - llegará a ser / llegarán a ser
  - vendrá a ser / vendrán a ser
  lexicon: HALOT
  rationale: En español, «será/serán» suena más natural que calcar el ingressive «will become»; el contexto ya comunica el cambio de estado. Se evita sobrecargar el verso con formulaciones menos idiomáticas.
theological_decisions:
- issue: Agencia divina directa en el juicio del pacto
  english_pob_reading: Retain the direct first-person divine agency ('I will scatter... I will draw out the sword')
  chosen_spanish_reading: 'Mantener la primera persona divina directa: «dispersaré... desenvainaré... será/serán»'
  alternative_spanish_readings:
  - «serán dispersados» / pasivos impersonales
  - «permitiré que sean dispersados»
  rationale: El hebreo atribuye explícitamente estas acciones a Yahvé como actos de juicio del pacto. La traducción conserva esa agencia sin atenuarla mediante pasivos o formulaciones permisivas.
  doctrine_reference: Levítico 26:33; filosofía de traducción §1, §3
- issue: Terminología para el juicio militar asociado con la espada
  english_pob_reading: I will draw out the sword
  chosen_spanish_reading: «desenvainaré la espada»
  alternative_spanish_readings:
  - «sacaré la espada»
  - «levantaré la espada»
  rationale: La expresión española mantiene el carácter concreto del arma y la intención hostil del hebreo, sin espiritualizar ni suavizar la imagen. Además, refleja bien la alternativa lexical documentada en la nota inglesa («unsheathe the sword»).
  doctrine_reference: HALOT; Levítico 26:33
translation_notes:
  revision_awareness: El texto inglés POB vigente está en acuerdo alto con la fuente hebrea y no muestra revisiones aplicadas. La versión española sigue ese mismo juicio de estabilidad textual, trasladando directamente las decisiones léxicas principales sin introducir variantes doctrinales o textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito por la primera persona divina del hebreo, sin necesidad de nombrarlo en este versículo.
  - Se usa «naciones» para גּוֹיִם conforme al valor geopolítico del contexto.
  - Se preserva la fuerza resultativa del hebreo con «será/serán» y no con una explicación más larga.
  - Se evita «SEÑOR» como sustituto del nombre divino, siguiendo la norma del proyecto para el español.
