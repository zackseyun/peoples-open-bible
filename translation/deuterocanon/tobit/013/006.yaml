id: TOB.13.6
reference: Tobit 13:6
source:
  edition: lxx-swete-1909
  text: ἐὰν ἐπιστρέψητε πρὸς αὐτὸν ἐν ὅλῃ καρδίᾳ ὑμῶν καὶ ἐν ὅλῃ τῇ ψυχῇ ποιῆσαι ἐνώπιον αὐτοῦ ἀλήθειαν, τότε ἐπιστρέψει πρὸς ὑμᾶς,, καὶ οὐ μὴ κρύψῃ τὸ πρόσωπον αὐτοῦ ἀφʼ ὑμῶν· καὶ θεάσασθε ἃ ποιήσει μεθʼ ὑμῶν, καὶ ἐξομολογήσασθε αὐτῷ ἐν ὅλῳ τῷ σώματι ὑμῶν· καὶ εὐλογήσατε τὸν κύριον τῆς δικαιοσύνης, καὶ ὑψώσατε τὸν βασιλέα τῶν αἰώνων. ἐγὼ ἐν τῇ γῇ τῆς αἰχμαλωσίας μου ἐξομολογοῦμαι αὐτῷ, καὶ δεικνύω τὴν ἰσχὺν καὶ τὴν μεγαλοσύνην αὐτοῦ ἔθνεσιν ἁμαρτωλῶν. ἐπιστρέψατε, ἁμαρτωλοί, καὶ ποιήσατε δικαιοσύνην ἐνώπιον αὐτοῦ· τίς γινώσκει εἰ θελήσει ὑμᾶς καὶ ποιήσει ἐλεημοσύνην ὑμῖν; Ε
  language: Greek
  pages:
  - 860
  confidence: high
  validation: agree
translation:
  text: If you turn to him with all your heart and with all your soul[a], to do what is true before him, then he will turn to you and will certainly not hide his face from you. See what he will do with you, and give thanks to him with your whole being; bless the Lord of righteousness[d][c][b], and exalt the King of the ages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to act faithfully before him.' The Greek literally says 'to do truth' before him, a Semitic-style expression for living truthfully or faithfully in God's sight.
    reason: lexical_alternative
  - marker: b
    text: Or 'with all your body.' The Greek reads literally 'with your whole body,' likely expressing wholehearted, embodied thanksgiving.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Lord of justice.'
    reason: alternative_reading
  - marker: d
    text: Or 'the eternal King.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ἐπιστρέψητε ... τότε ἐπιστρέψει
  chosen: If you turn ... then he will turn
  alternatives:
  - return
  - turn back
  lexicon: BDAG
  rationale: The repeated verb ἐπιστρέφω creates a reciprocal repentance/restoration pattern. 'Turn' preserves the verbal echo in English better than mixing 'return' and 'turn back.'
- source_word: ἐν ὅλῃ καρδίᾳ ὑμῶν καὶ ἐν ὅλῃ τῇ ψυχῇ
  chosen: with all your heart and with all your soul
  alternatives:
  - with your whole heart and whole soul
  lexicon: BDAG
  rationale: This is a conventional total-devotion formula. A fairly formal rendering preserves its biblical resonance without obscuring meaning.
- source_word: ποιῆσαι ἐνώπιον αὐτοῦ ἀλήθειαν
  chosen: to do what is true before him
  alternatives:
  - to do truth before him
  - to act faithfully before him
  lexicon: BDAG
  rationale: The Greek is somewhat Semitic in flavor. 'Do what is true' keeps the unusual object 'truth' while yielding natural English. 'Act faithfully' is possible but narrows ἀλήθεια toward fidelity alone.
- source_word: οὐ μὴ κρύψῃ τὸ πρόσωπον αὐτοῦ ἀφʼ ὑμῶν
  chosen: will certainly not hide his face from you
  alternatives:
  - will never hide his face from you
  lexicon: BDAG
  rationale: οὐ μή with subjunctive is emphatic negation. 'Will certainly not' conveys the force clearly in modern English.
- source_word: θεάσασθε
  chosen: See
  alternatives:
  - Behold
  - Look at
  lexicon: BDAG
  rationale: An imperative inviting attentive recognition of God's action. 'See' is direct and readable without archaic tone.
- source_word: ἐξομολογήσασθε αὐτῷ
  lemma: ἐξομολογέομαι
  chosen: give thanks to him
  alternatives:
  - confess to him
  - praise him
  lexicon: BDAG
  rationale: In this praise context, ἐξομολογέομαι carries the sense of thanksgiving/praise rather than confession of sins. 'Give thanks' best fits the surrounding imperatives of blessing and exalting God.
- source_word: ἐν ὅλῳ τῷ σώματι ὑμῶν
  chosen: with your whole being
  alternatives:
  - with all your body
  - with your whole body
  lexicon: BDAG
  rationale: A literal 'body' is possible, but in context the phrase expresses total embodied devotion parallel to heart and soul language. 'Whole being' communicates the comprehensive force in idiomatic English while still reflecting totality.
- source_word: τὸν κύριον τῆς δικαιοσύνης
  chosen: the Lord of righteousness
  alternatives:
  - the Lord of justice
  lexicon: BDAG
  rationale: δικαιοσύνη defaults to 'righteousness' per project guidance, and here the genitive functions as a divine epithet. 'Justice' is possible but less consistent with the project's default.
- source_word: τὸν βασιλέα τῶν αἰώνων
  chosen: the King of the ages
  alternatives:
  - the eternal King
  - the King forever
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the plural αἰώνων and the elevated doxological tone.
