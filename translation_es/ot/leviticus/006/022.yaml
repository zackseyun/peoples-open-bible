translation:
  language: es
  text: Todo varón entre los sacerdotes podrá comerla[a]; es santísima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una santidad de santidades», un modismo que significa «santísima».'
