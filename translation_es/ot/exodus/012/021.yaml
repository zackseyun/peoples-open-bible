  to: 'Entonces Moisés llamó a todos los ancianos de Israel y les dijo: «Saquen[a] y tomen para ustedes animales del rebaño[b] según sus familias, y degüellen la Pascua[c]».'
  rationale: La revisión elimina un pronombre no representado en el hebreo, evita restringir צֹאן a «corderos» contra la documentación del POB, suprime una nota innecesaria y conserva la metonimia de הַפָּסַח con una nota más precisa. El resultado queda más fiel a la fuente y más natural en español.
