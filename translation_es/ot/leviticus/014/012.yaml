review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual, mantiene ''Yahvé'' correctamente para יְהוָה, conserva ''log'' como medida técnica, y refleja la acción de presentación y la ofrenda mecida. Sin embargo, no preserva con suficiente fidelidad dos puntos del hebreo y del rastro POB: (1) הַכֶּבֶשׂ הָאֶחָד se redujo a ''el cordero macho'' y pierde el valor distintivo de ''el uno / el único de ese conjunto''; (2) וְהֵנִיף אֹתָם ''los/ellos'' fue traducido como singular ''lo mecerá'', cuando el hebreo claramente refiere al cordero y al log de aceite juntos.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'como expiación por la culpa' suena menos natural y menos técnico que la categoría sacrificial esperable en Levítico; además, la discordancia singular/plural en 'junto con el log de aceite, y lo mecerá' afecta la legibilidad. Una leve normalización a terminología cultual más transparente mejora fidelidad y lectura.
  glossary_alignment: 'Alineación buena en ''Yahvé'', ''sacerdote'', ''log de aceite'' y terminología ritual básica. La principal desviación es לְאָשָׁם: el inglés POB eligió ''as a guilt offering'' con alternativa ''reparation offering''; en español conviene el término técnico ''como ofrenda por la culpa'' con nota de alternativa ''ofrenda de reparación'', no ''expiación por la culpa'', que desplaza el foco de categoría sacrificial a efecto expiatorio.'
  issues:
  - severity: high
    issue: Discordancia de número en וְהֵנִיף אֹתָם
    rationale: El hebreo usa objeto plural 'a ellos', refiriéndose al cordero y al log de aceite. El borrador dice 'lo mecerá', que altera el sentido fuente.
  - severity: medium
    issue: לְאָשָׁם se tradujo como 'expiación por la culpa'
    rationale: Aunque intenta preservar matices, no representa bien el sustantivo técnico de ofrenda sacrificial documentado por el POB. 'Ofrenda por la culpa' es más fiel y natural; la alternativa 'de reparación' puede ir en nota.
  - severity: medium
    issue: הַכֶּבֶשׂ הָאֶחָד pierde el matiz de 'el uno'
    rationale: '''El cordero macho'' no refleja el numeral distintivo. ''El cordero macho[a]'' puede mantenerse si la nota explica la especificidad, pero mejor es ''el único cordero macho'' o ''el cordero macho señalado'' según contexto. Dado el inglés POB, ''el único cordero macho'' comunica mejor la distinción dentro de la lista ritual.'
  - severity: low
    issue: Anclaje de notas mejorable
    rationale: La nota sobre el valor técnico de אָשָׁם debe anclarse a la frase sacrificial, y la nota sobre 'log' debería anclarse al término 'log' para reflejar el rastro POB, que conservó esa explicación cultural.
  revised_spanish_text: Entonces el sacerdote tomará el único cordero macho[a] y lo presentará como ofrenda por la culpa[b], junto con el log[c] de aceite, y los mecerá como ofrenda mecida delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: «Macho» explicita el rasgo masculino que el inglés POB añadió por contexto sacrificial; el hebreo dice literalmente «el cordero, el uno», distinguiendo este animal de los otros elementos del rito.
    reason: lexical_alternative
  - marker: b
    text: O también «como ofrenda de reparación». El hebreo אָשָׁם es un término técnico sacrificial que puede resaltar tanto la culpa como la reparación.
    reason: lexical_alternative
  - marker: c
    text: Un «log» era una pequeña unidad de medida de líquidos usada en el sistema ritual de Israel.
    reason: cultural_note
  revision_rationale: La revisión corrige el plural exigido por אֹתָם, restituye mejor la categoría sacrificial técnica de אָשָׁם, conserva el matiz distintivo de הָאֶחָד, y añade la nota cultural sobre «log» presente en el rastro POB. El resultado suena natural en español bíblico actual sin apartarse del hebreo ni de las decisiones documentadas del POB.
