    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para que el español sea más natural y a la vez refleje mejor el valor del hebreo. «En su corazón» mantiene el sentido colectivo de בְּלִבָּם sin calco incómodo. «Pero de tal modo que el hombre no puede» expresa mejor la limitación resultante marcada por מִבְּלִי אֲשֶׁר לֹא y la tensión del texto: Dios da una percepción de la eternidad, pero no una comprensión exhaustiva de su obra.'
