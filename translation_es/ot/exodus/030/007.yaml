translation:
  language: es
  text: Aarón quemará incienso aromático sobre el altar, mañana tras mañana[a]; cuando atienda las lámparas[b], lo quemará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada mañana». La repetición hebrea enfatiza la práctica diaria regular.
    reason: lexical_alternative
  - marker: b
    text: O «cuando arregle las lámparas». El verbo hebreo puede referirse más específicamente a poner las lámparas en orden.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: quemará
  alternatives_spanish:
  - hará arder
  - ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto cultual, el verbo expresa hacer subir la ofrenda en humo. En español, «quemará» comunica la acción ritual de manera natural y breve, sin perder el sentido sacrificial.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - en él
  lexicon: HALOT
  rationale: El antecedente es el altar de incienso. «Sobre él» mantiene la referencia locativa directa y funciona bien en español bíblico actual.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - sahumerio
  lexicon: HALOT
  rationale: «Incienso» es el equivalente normal para la sustancia quemada en el culto; evita una paráfrasis más amplia que debilitaría el término técnico.
- source_word: סַמִּים
  english_pob_choice: fragrant
  chosen_spanish: aromático
  alternatives_spanish:
  - fragante
  - de especias
  - perfumado
  lexicon: HALOT
  rationale: La idea es de incienso compuesto con especias aromáticas. «Aromático» conserva el componente olfativo y suena natural en español; «fragante» también sería posible.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición distributiva se refleja mejor con una forma repetida en español. «Mañana tras mañana» conserva el ritmo y la regularidad diaria que subraya el hebreo.
- source_word: בְּהֵיטִיבוֹ
  english_pob_choice: when he tends
  chosen_spanish: cuando atienda
  alternatives_spanish:
  - cuando quite las mechas de
  - cuando ponga en orden
  - cuando cuide
  lexicon: HALOT
  rationale: El verbo puede abarcar el servicio de arreglar o poner en orden las lámparas. «Atienda» conserva ese sentido amplio sin fijar indebidamente solo el recorte de las mechas.
- source_word: הַנֵּרֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las lámparas del candelabro
  - las luces
  lexicon: HALOT
  rationale: El referente ya está establecido por el contexto del santuario. «Las lámparas» es suficiente y preciso en español.
- source_word: יַקְטִירֶנָּה
  english_pob_choice: he shall burn it
  chosen_spanish: lo quemará
  alternatives_spanish:
  - lo ofrecerá en humo
  - lo quemará como incienso
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a «incienso». En español, el pronombre debe concordar con «incienso» como masculino gramatical, por lo que «lo» es la opción correcta; se mantiene la referencia anafórica sin sobreexplicar.
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado de «every morning» a «morning by morning» para reflejar con más cercanía la repetición hebrea. La versión española sigue esa misma decisión mediante «mañana tras mañana», preservando la regularidad distributiva y el paralelismo con la atención de las lámparas.
  spanish_consistency_notes:
  - Se mantiene «Aarón» como nombre propio estándar.
  - Se usa «incienso» para קְטֹרֶת, conforme al valor cultual del término.
  - Se conserva la referencia al altar con el pronombre «él», evitando añadir especificaciones no presentes en el hebreo.
  - «Mañana tras mañana» refleja la repetición distributiva sin convertirla en una mera frecuencia genérica.
  - El verbo «atender» deja abierta la gama semántica del mantenimiento de las lámparas, en línea con la nota auditada inglesa.
