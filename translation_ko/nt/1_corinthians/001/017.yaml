id: 1CO.1.17
reference: '1 Corinthians 1:17'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γὰρ ἀπέστειλέν με Χριστὸς βαπτίζειν ἀλλὰ εὐαγγελίζεσθαι, οὐκ ἐν σοφίᾳ λόγου, ἵνα μὴ κενωθῇ ὁ σταυρὸς τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/017.yaml
  text: For Messiah did not send me to baptize[a], but to proclaim the good news—not in wisdom of speech[c][b], so that the cross of Messiah might not be emptied.
  footnotes:
  - marker: a
    text: 'Or ''with eloquent wisdom'' or more literally, ''with wisdom of word.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''might not be made void'' or ''might not be emptied of its power.'''
    reason: lexical_alternative
  - marker: c
    text: 'Greek Χριστός; traditionally ''Christ.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아께서 나를 보내신 것은 침례를 베풀라는 것이 아니라 복음을 전하라는 것이었고, 그것도 말의 지혜로 하지 않게 하심은 메시아의 십자가가 헛되지 않게 하시려는 것이었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐαγγελίζεσθαι
  english_pob_choice: to proclaim the good news
  chosen_korean: 복음을 전하라
  alternatives_korean:
  - 좋은 소식을 전하라
  lexicon: BDAG
  rationale: 바울 신학 정립어 「복음」을 동사로 풀어 「복음을 전하다」.
- source_word: σοφίᾳ λόγου
  english_pob_choice: wisdom of speech
  chosen_korean: 말의 지혜
  alternatives_korean:
  - 언변의 지혜
  lexicon: BDAG
  rationale: 그리스 수사학적 「언변의 정교함」을 가리킨다.
- source_word: κενωθῇ
  english_pob_choice: might not be emptied
  chosen_korean: 헛되지 않게
  alternatives_korean:
  - 효력이 없게 되지 않게
  lexicon: BDAG
  rationale: κενόω는 「비게 만들다, 무력화하다」. 「헛되다」가 자연스럽다.
- source_word: ὁ σταυρὸς τοῦ Χριστοῦ
  english_pob_choice: the cross of Messiah
  chosen_korean: 메시아의 십자가
  alternatives_korean:
  - 메시아의 십자가 사건
  lexicon: BDAG
  rationale: σταυρός를 「십자가」로 그대로 옮긴다.
