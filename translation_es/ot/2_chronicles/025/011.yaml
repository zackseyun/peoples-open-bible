  rationale: Se sustituye «hirió» por «derribó» para reflejar mejor el valor de נכה en contexto militar con cifra de bajas, manteniendo al mismo tiempo una amplitud semejante a «struck down» del POB inglés. Se conserva el resto del versículo porque es fiel al hebreo y suena natural en español.
