translation:
  language: es
  text: La concubina de Caleb, Maacah, dio a luz a Sheber y a Tirhanah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «La concubina de Caleb, Maacah, engendró a Sheber y a Tirhanah», si se toma יָלַד en su sentido genealógico más general; como el sujeto aquí es explícitamente femenino, el texto principal usa «dio a luz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּלֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - esposa secundaria
  - mujer secundaria
  lexicon: HALOT
  rationale: El término hebreo designa a una mujer en una unión marital reconocida pero subordinada. «Concubina» es el equivalente español más directo y estándar, y conserva la fuerza genealógica del texto.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera habitual en español bíblico.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maacáh
  - Maacah
  lexicon: nombre propio
  rationale: Nombre propio; en español se adapta con acento final para reflejar la pronunciación habitual y mantener lectura natural.
- source_word: יָלַד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  - tuvo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, el verbo puede usarse de forma amplia para procrear o dar descendencia. Como el sujeto explícito es femenino, «dio a luz» comunica bien el hecho sin introducir una paráfrasis excesiva.
- source_word: שֶׁבֶר
  english_pob_choice: Sheber
  chosen_spanish: Sheber
  alternatives_spanish:
  - Sheber
  lexicon: nombre propio
  rationale: Nombre propio transliterado.
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y a
  alternatives_spanish:
  - y
  lexicon: hebreo bíblico
  rationale: El marcador de objeto directo no se representa en español; «y a» conserva la coordinación e introduce de forma natural el segundo objeto directo.
- source_word: תִּרְחֲנָה
  english_pob_choice: Tirhanah
  chosen_spanish: Tirhaná
  alternatives_spanish:
  - Tirhanah
  - Tirjana
  lexicon: nombre propio
  rationale: Nombre propio transliterado con adaptación ortográfica española para la acentuación final.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios sustanciales; la única tensión registrada es el valor genealógico amplio de יָלַד, que en español se refleja con una nota alternativa sin perder la lectura natural del sujeto femenino.
  spanish_consistency_notes:
  - Se conservó «concubina» por consistencia con el valor lexical documentado y el contexto genealógico.
  - Se mantuvieron los nombres propios transliterados, con acentos gráficos solo donde favorecen la lectura española sin alterar la identidad del nombre.
