translation:
  language: es
  text: Y fue a encontrarse con ellos[a], y dejó a su hermano Simón en el territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la tierra» o «en la región»; el griego χώρα puede designar territorio en sentido amplio, no solo la campiña cultivada.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήντησεν
  english_pob_choice: went to meet
  chosen_spanish: fue a encontrarse con
  alternatives_spanish:
  - fue a ver
  - se reunió con
  - encontró
  lexicon: LSJ
  rationale: El verbo compuesto expresa desplazamiento para ir al encuentro, no solo un encuentro estático. «Fue a encontrarse con» conserva esa dirección mejor que un simple «encontró».
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - los
  lexicon: Greek lexicon
  rationale: El dativo plural pide referencia plural; en español, con el verbo de encuentro, «con ellos» fluye con naturalidad y mantiene el sentido relacional del encuentro.
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - abandóno
  - lo dejó
  lexicon: LSJ
  rationale: «Dejó» reproduce la idea básica de abandonar a alguien en un lugar sin añadir una carga semántica más fuerte que el griego.
- source_word: ἀδελφὸν αὐτοῦ Σίμωνα
  english_pob_choice: his brother Simon
  chosen_spanish: a su hermano Simón
  alternatives_spanish:
  - a Simón, su hermano
  - a su hermano, Simón
  lexicon: Greek lexicon
  rationale: Se mantiene la relación de parentesco y el nombre propio en un orden natural en español, sin perder la identificación precisa del referente.
- source_word: ἐν τῇ χώρᾳ
  english_pob_choice: in the country
  chosen_spanish: en la región
  alternatives_spanish:
  - en el país
  - en la tierra
  - en el territorio
  lexicon: LSJ
  rationale: χώρα puede significar campo, tierra, región o territorio. En este contexto geográfico más amplio, «región» evita restringir injustificadamente el sentido a la campiña.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés coinciden de manera alta; no se observan revisiones aplicadas en el paso más reciente, por lo que esta versión sigue de cerca la lectura auditada y conserva la ambigüedad legítima de χώρα en la nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u այլ terminología no pertinente; el versículo no contiene nombres divinos ni títulos cristológicos.
  - «Región» se eligió para χώρα por amplitud semántica y naturalidad en español bíblico contemporáneo.
  - La puntuación mantiene una coordinación simple y clara, acorde con el griego breve del verso.
