translation:
  language: es
  text: Y tomó[a] alrededor de cinco mil hombres y los puso en una emboscada entre Betel y Hai, al occidente[b] de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''alrededor de cinco mil hombres''; el prefijo כ en ''cinco'' probablemente indica aproximación, no una cifra exacta.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'del mar de la ciudad'; en hebreo 'mar' se usa idiomáticamente para 'occidente' o 'oeste'.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - seleccionó
  - llevó consigo
  lexicon: HALOT
  rationale: El verbo לקח en narrativa militar puede significar 'tomar' o implicar una selección de tropas. 'Tomó' preserva la sencillez del hebreo y funciona de manera natural en español sin añadir una interpretación más específica de la que el texto exige.
- source_word: כַּחֲמֵשֶׁת אֲלָפִים אִישׁ
  english_pob_choice: about five thousand men
  chosen_spanish: alrededor de cinco mil hombres
  alternatives_spanish:
  - unos cinco mil hombres
  - aproximadamente cinco mil hombres
  - cinco mil hombres
  lexicon: HALOT
  rationale: El prefijo כ en el numeral suele tener valor aproximativo. Por eso conviene conservar la idea de aproximación con 'alrededor de' en lugar de convertir la cifra en exacta.
- source_word: וַיָּשֶׂם אוֹתָם
  english_pob_choice: and set them
  chosen_spanish: y los puso
  alternatives_spanish:
  - y los colocó
  - y los estacionó
  lexicon: HALOT
  rationale: 'שׂים es un verbo amplio: poner, colocar, situar. ''Los puso'' mantiene la llaneza del hebreo; ''estacionó'' es posible en contexto militar, pero introduce un matiz más técnico que el texto no exige.'
- source_word: אֹרֵב
  english_pob_choice: in ambush
  chosen_spanish: en emboscada
  alternatives_spanish:
  - como emboscada
  - en acecho
  lexicon: HALOT
  rationale: El sustantivo/participio אֹרֵב expresa una fuerza situada para ocultarse y atacar. En español, 'en emboscada' comunica bien la función táctica y evita una paráfrasis excesiva.
- source_word: בֵּין בֵּית אֵל וּבֵין הָעַי
  english_pob_choice: between Bethel and Ai
  chosen_spanish: entre Betel y Hai
  alternatives_spanish:
  - entre Betel y Ay
  - entre Bet-el y Hai
  lexicon: HALOT
  rationale: Se conservan los nombres propios en forma española de uso común para topónimos bíblicos. 'Hai' refleja la transliteración breve y clara del hebreo הָעַי sin imponer una forma eclesiástica menos transparente.
- source_word: מִיָּם לָעִיר
  english_pob_choice: west of the city
  chosen_spanish: al occidente de la ciudad
  alternatives_spanish:
  - al oeste de la ciudad
  - del lado occidental de la ciudad
  lexicon: HALOT
  rationale: יָם puede funcionar idiomáticamente como 'occidente/oeste'. 'Al occidente de la ciudad' conserva el valor geográfico del hebreo con un registro digno y bíblico, sin perder inteligibilidad en español moderno.
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del POB inglés que prefiere una formulación más idiomática ('in ambush') sin perder la literalidad sustantiva del hebreo. Se mantiene la aproximación numérica marcada por כ y la localización occidental expresada idiomáticamente por יָּם.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando el hebreo lo exige; aquí no aparece el tetragrámaton.
  - '''Hai'' se mantiene como topónimo breve y transparente, coherente con una transliteración sobria.'
  - La aproximación numérica se conserva explícitamente para no volver exacta una cifra que el hebreo presenta como aproximada.
