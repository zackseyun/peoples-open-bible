revisions:
- from: Así que oye[a], Israel, y esfuérzate por hacerlo, para que te vaya bien y te multipliques muchísimo, tal como Yahvé, el Dios de tus padres, te ha hablado[b], en una tierra que fluye leche y miel.
  to: Así que oye[a], Israel, y cuida de hacerlo, para que te vaya bien y te multipliques muchísimo, tal como Yahvé, el Dios de tus padres, te ha hablado[b], en una tierra que mana leche y miel.
  rationale: Se ajusta «esfuérzate por hacerlo» a «cuida de hacerlo» para reflejar mejor שׁמר לַעֲשׂוֹת como observancia cuidadosa orientada a la acción. Se cambia «que fluye leche y miel» a «que mana leche y miel» por fidelidad idiomática a la expresión fija hebrea en español. Se conservan «Yahvé» y «el Dios de tus padres» conforme a la política del proyecto.
