translation:
  language: es
  text: entonces que yo siembre, y otro coma; y que mis descendientes[a] sean desarraigados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «mi producción sea desarraigada» o «mis descendientes sean arrancados de raíz». צֶאֱצָא puede referirse a lo que brota, ya sea descendencia o producto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶזְרְעָה
  english_pob_choice: let me sow
  chosen_spanish: que yo siembre
  alternatives_spanish:
  - que siembre
  - permítaseme sembrar
  lexicon: HALOT
  rationale: El cohorte en primera persona expresa voluntad en un contexto de auto-malición; en español, «que yo siembre» conserva mejor el valor volitivo y la fuerza juramentaria que un simple futuro.
- source_word: וְאַחֵר
  english_pob_choice: and another
  chosen_spanish: y otro
  alternatives_spanish:
  - y alguien más
  - y otro hombre
  lexicon: HALOT
  rationale: אַחֵר significa «otro» o «alguien más»; «y otro» es breve y mantiene el contraste directo entre Job y quien se beneficia de su trabajo.
- source_word: יֹאכֵל
  english_pob_choice: eat
  chosen_spanish: coma
  alternatives_spanish:
  - coma de ello
  - consuma
  lexicon: HALOT
  rationale: El verbo original dice literalmente «comer»; el subjuntivo «coma» preserva la concreción agrícola y el paralelismo con «siembre» en español natural.
- source_word: וְצֶאֱצָאַי
  english_pob_choice: my offspring
  chosen_spanish: mis descendientes
  alternatives_spanish:
  - mi descendencia
  - mis hijos
  - mi prole
  lexicon: HALOT
  rationale: צֶאֱצָא puede referirse a lo que brota, tanto «descendencia» como «producción». Aquí, por el paralelo con la maldición agrícola y el verbo siguiente, «mis descendientes» conserva bien el sentido humano/familiar sin cerrar del todo la resonancia metafórica.
- source_word: יְשֹׁרָשׁוּ
  english_pob_choice: be uprooted
  chosen_spanish: sean desarraigados
  alternatives_spanish:
  - sean arrancados de raíz
  - sean desarraigados de raíz
  lexicon: HALOT
  rationale: El verbo intensivo de שׁרשׁ transmite la imagen de ser arrancado por las raíces. «Desarraigados» es una solución idiomática en español que mantiene la metáfora vegetal y el valor imprecatorio.
translation_notes:
  revision_awareness: La versión inglesa POB mantiene la ambigüedad de צֶאֱצָא con una nota léxica; la presente redacción española sigue esa misma tensión, optando por «mis descendientes» en el texto y ofreciendo la alternativa de «producción» en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no porque aparezca en este versículo, sino para coherencia global del proyecto cuando corresponda.
  - Se evita «SEÑOR» como sustituto automático del nombre divino, según la norma del proyecto.
  - «Desarraigados» conserva la imagen de raíz y evita neutralizar el verbo en una abstracción excesiva.
  - El subjuntivo en la primera y segunda cláusula reproduce mejor el tono volitivo/imprecatorio del hebreo que el indicativo.
