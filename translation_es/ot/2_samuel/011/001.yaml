  yaml_path: translation/ot/2_samuel/011/001.yaml
  text: At the turn of the year[a], at the time when kings go out to battle, David sent Joab, his servants with him, and all Israel. They devastated the Ammonites and besieged Rabbah[b], but David remained in Jerusalem.
