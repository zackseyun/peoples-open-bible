    issue: Calco poco natural en «sería establecido en el poder»
    rationale: Aunque reproduce de cerca el inglés, en español suena rígido y poco idiomático. El griego apunta a quedar colocado o afianzado en autoridad; «quedaría afianzado en el poder» o «sería afianzado en el poder» comunica mejor el sentido.
  - severity: low
    issue: La nota [b] no refleja con precisión la alternativa auditada
    rationale: La alternativa inglesa documentada es «for the welfare of the homeland/fatherland». La nota española propone «de la tierra natal», que desplaza el foco desde σωτηρία/‘bienestar’ hacia πατρίς/‘tierra natal’. Conviene ofrecer «por el bienestar de la patria» como alternativa más fiel al expediente.
  revised_spanish_text: Menelao también se unió a ellos y, con gran insinceridad[a], seguía instando a Antíoco, no para la seguridad de la patria[b], sino porque pensaba que quedaría afianzado en el poder.
