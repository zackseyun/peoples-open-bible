translation:
  language: es
  text: He aquí, yo construyo una casa[a] para el nombre de Yahvé mi Dios, para consagrarla a él, para quemar incienso aromático delante de él, y para poner la disposición continua[b], y holocaustos por la mañana y por la tarde, en los sábados, en las lunas nuevas, y en las fiestas señaladas de Yahvé nuestro Dios. Esto es para siempre para Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa» aquí alude al templo; el hebreo dice literalmente «una casa para el nombre de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O, de manera más tradicional, «el pan presentado continuamente» o «el pan puesto continuamente».
    reason: lexical_alternative
  - marker: c
    text: La frase «Esto es para siempre para Israel» expresa que estas ofrendas son una obligación perpetua para Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira bien
  - He aquí, pues
  lexicon: HALOT
  rationale: Es un marcador discursivo de atención; "He aquí" conserva el tono solemne y bíblico sin sonar artificial en español.
- source_word: בּוֹנֶה
  english_pob_choice: am building
  chosen_spanish: estoy edificando
  alternatives_spanish:
  - estoy construyendo
  - edifico
  - voy a edificar
  lexicon: HALOT
  rationale: El participio expresa acción en curso o en desarrollo. "Estoy edificando" mantiene ese matiz y resulta natural en español bíblico contemporáneo.
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - templo
  - edificio
  - casa sagrada
  lexicon: HALOT
  rationale: Se conserva el sustantivo básico "casa" para reflejar la expresión hebrea "casa para el nombre de Yahvé" sin introducir una glosa interpretativa en el texto principal.
- source_word: לְשֵׁם
  english_pob_choice: for the name
  chosen_spanish: para el nombre
  alternatives_spanish:
  - en honor del nombre
  - para la gloria del nombre
  lexicon: HALOT
  rationale: La fórmula es directa y teológicamente significativa; "para el nombre" preserva el giro idiomático y su fuerza de dedicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios y Señor
  - mi Dios propio
  lexicon: HALOT
  rationale: La forma posesiva es sencilla y directa; conserva la confesión personal de Salomón.
- source_word: לְהַקְדִּישׁ לוֹ
  english_pob_choice: to consecrate it to him
  chosen_spanish: para consagrarla a él
  alternatives_spanish:
  - para dedicarla a él
  - para santificarla para él
  lexicon: HALOT
  rationale: El hifil de קדשׁ expresa apartar algo como santo; "consagrar" es la opción cultual más precisa y clara en español.
- source_word: לְהַקְטִיר לְפָנָיו
  english_pob_choice: to burn fragrant incense before him
  chosen_spanish: para quemar incienso aromático delante de él
  alternatives_spanish:
  - para ofrecer incienso aromático delante de él
  - para hacer humear incienso aromático delante de él
  lexicon: HALOT
  rationale: '"Quemar" refleja el verbo sacrificial en un registro comprensible; "delante de él" conserva la orientación cultual de la acción. Se evita añadir "fragrante" por redundancia estilística en español, pero se mantiene el sentido aromático con "aromático".'
- source_word: קְטֹרֶת סַמִּים
  english_pob_choice: fragrant incense
  chosen_spanish: incienso aromático
  alternatives_spanish:
  - incienso perfumado
  - incienso de especias
  lexicon: HALOT
  rationale: La combinación hebrea apunta a un incienso especialmente preparado y aromático; "incienso aromático" comunica el sentido sensorial sin sobreespecificar la composición.
- source_word: וּמַעֲרֶכֶת תָּמִיד
  english_pob_choice: the regular arrangement
  chosen_spanish: el arreglo continuo
  alternatives_spanish:
  - la disposición continua
  - la fila continua
  - el arreglo regular
  lexicon: HALOT
  rationale: Se mantiene el valor básico de "arreglo/disposición" y el adjetivo de continuidad. En español, "arreglo continuo" suena más directo y conserva la ambigüedad cultual del hebreo sin introducir "pan" en el texto principal.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas holocausto
  - sacrificios quemados
  lexicon: HALOT
  rationale: '"Holocaustos" es el término tradicional y preciso para עֹלוֹת en contexto sacrificial; conserva la fuerza técnica del hebreo mejor que una paráfrasis más general.'
- source_word: לַבֹּקֶר וְלָעֶרֶב
  english_pob_choice: morning and evening
  chosen_spanish: por la mañana y por la tarde
  alternatives_spanish:
  - en la mañana y en la tarde
  - mañana y tarde
  lexicon: HALOT
  rationale: La preposición de temporalidad se expresa de forma natural en español con "por"; mantiene el ritmo diario de las ofrendas.
- source_word: לַשַּׁבָּתוֹת
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - en los días de sábado
  - en los días de reposo
  lexicon: HALOT
  rationale: Aunque "Sabbaths" puede traducirse por "sábados", se preserva el plural cultual con una forma transparente en español. No se sustituye por una glosa litúrgica más amplia sin base explícita en el texto.
- source_word: לֶחֳדָשִׁים
  english_pob_choice: at the new moons
  chosen_spanish: en las lunas nuevas
  alternatives_spanish:
  - en las novilunios
  - en los comienzos de mes
  - en las nuevas lunas
  lexicon: HALOT
  rationale: '"Lunas nuevas" sigue de cerca la imagen hebrea y es comprensible en español bíblico; conserva el carácter calendárico-ritual.'
- source_word: לְמוֹעֲדֵי
  english_pob_choice: at the appointed feasts
  chosen_spanish: en las fiestas señaladas
  alternatives_spanish:
  - en los tiempos señalados
  - en las festividades señaladas
  lexicon: HALOT
  rationale: En esta lista cultual, מוֹעֲדִים apunta a festividades fijadas; "fiestas señaladas" mantiene el valor de cita/convocatoria y su sentido calendárico.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración indefinida y obligación permanente. "Para siempre" es claro y fiel en español.
- source_word: זֹאת עַל יִשְׂרָאֵל
  english_pob_choice: This is forever for Israel
  chosen_spanish: Esto es para siempre sobre Israel
  alternatives_spanish:
  - Esto es para siempre para Israel
  - Esto recae para siempre sobre Israel
  - Esto es una obligación perpetua para Israel
  lexicon: HALOT
  rationale: Se conserva la preposición עַל con su fuerza de incumbencia o vigencia "sobre" Israel, evitando convertir prematuramente la cláusula en una interpretación explícita de obligación en el cuerpo del texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, manteniendo el nombre propio divino sin la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בַּיִת en el contexto del templo
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - edificio sagrado
  rationale: El hebreo dice literalmente "casa"; preservar esa forma mantiene la transparencia textual y la teología de "casa para el nombre" sin glosa interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
- issue: Naturaleza de מַעֲרֶכֶת תָּמִיד
  english_pob_reading: the regular arrangement
  chosen_spanish_reading: el arreglo continuo
  alternative_spanish_readings:
  - la disposición continua
  - el pan de la proposición
  rationale: Se evita introducir el término tradicional "pan de la proposición" en el texto principal porque el hebreo aquí no lo nombra explícitamente; sin embargo, "arreglo" conserva la ambigüedad ritual de la expresión.
  doctrine_reference: DOCTRINE.md Translation philosophy §6, readable modern Spanish, not archaic or academic
- issue: Sentido de זֹאת עַל יִשְׂרָאֵל
  english_pob_reading: This is forever for Israel
  chosen_spanish_reading: Esto es para siempre sobre Israel
  alternative_spanish_readings:
  - Esto es para siempre para Israel
  - Esto es una obligación perpetua para Israel
  rationale: La preposición עַל puede expresar incumbencia o vigencia "sobre" alguien. Se conserva en el texto principal y se deja abierta la interpretación de obligación permanente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §3, preserve lexical/theological tension where warranted
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último paso de revisión del inglés POB, que ajustó el orden de «burn fragrant incense before him» y prefirió «the regular arrangement» sin añadir «bread» en el texto principal. Por ello, el español evita introducir «pan» en el cuerpo del versículo y conserva la secuencia cultual: consagrar, quemar incienso, poner el arreglo continuo, y presentar holocaustos diarios y calendáricos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «casa» en vez de «templo» en el texto principal para preservar la literalidad hebrea.
  - Se usa «holocaustos» para עֹלוֹת como término sacrificial técnico.
  - Se conserva la ambigüedad de מַעֲרֶכֶת תָּמִיד sin añadir «pan» al texto principal.
  - Las notas al pie usan marcadores únicos y corresponden a anclajes presentes en el texto español.
