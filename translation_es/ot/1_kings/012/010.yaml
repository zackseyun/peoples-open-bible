  - severity: medium
    issue: ‘Las caderas de mi padre’ no representa bien מָתְנֵי en este contexto
    rationale: El POB inglés justificó ‘waist’ como opción moderna y dejó ‘loins’ en nota. ‘Caderas’ desplaza el referente corporal y debilita la correspondencia con la decisión auditada.
  - severity: medium
