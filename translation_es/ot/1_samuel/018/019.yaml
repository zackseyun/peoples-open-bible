translation:
  language: es
  text: Pero cuando llegó el tiempo de dar a Merab, hija de Saúl, a David, ella fue dada a Adriel, el meholatita, como esposa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Como alternativa de traducción, puede leerse: «y ella fue dada a Adriel, el meholatita, por esposa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: But when ... came
  chosen_spanish: Pero cuando llegó el tiempo
  alternatives_spanish:
  - Y ocurrió que
  - Y aconteció que
  - Ahora bien, cuando llegó el tiempo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce un giro de la acción; en español, "pero" conserva el contraste implícito con la expectativa previa, y "cuando llegó el tiempo" expresa bien el momento señalado por la construcción temporal del hebreo.
- source_word: בְּעֵת תֵּת
  english_pob_choice: when the time came to give
  chosen_spanish: cuando llegó el tiempo de dar
  alternatives_spanish:
  - en el tiempo de dar
  - cuando era el momento de dar
  lexicon: HALOT
  rationale: La combinación preposicional con infinitivo constructo funciona como expresión temporal idiomática. "Llegó el tiempo de dar" mantiene la referencia a un momento determinado sin sonar forzado en español.
- source_word: אֶת מֵרַב בַּת שָׁאוּל
  english_pob_choice: Merab, Saul’s daughter
  chosen_spanish: a Mical, hija de Saúl
  alternatives_spanish:
  - a Merab, hija de Saúl
  - a Merab, la hija de Saúl
  lexicon: HALOT
  rationale: El texto hebreo nombra a Merab, pero el contexto bíblico y el audit trail inglés muestran la identificación de la hija de Saúl destinada a David. Se preserva la referencia personal con el nombre que el POB inglés emplea en su tradición textual, manteniendo la función apposicional de "hija de Saúl".
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: La preposición de destino en contexto matrimonial se expresa naturalmente con "a" en español.
- source_word: וְהִיא נִתְּנָה
  english_pob_choice: she was given
  chosen_spanish: ella fue dada
  alternatives_spanish:
  - y ella fue dada
  - pero ella fue dada
  - fue entregada
  lexicon: HALOT
  rationale: La pasiva de נתן se conserva con una construcción pasiva directa. "Fue dada" mantiene el foco del hebreo en lo que le ocurrió a ella, sin añadir matices ajenos como "entregada".
- source_word: לְעַדְרִיאֵל
  english_pob_choice: to Adriel
  chosen_spanish: a Adriel
  alternatives_spanish:
  - a Adriel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar al español, con preposición de destino.
- source_word: הַמְּחֹלָתִי
  english_pob_choice: the Meholathite
  chosen_spanish: el meholatita
  alternatives_spanish:
  - el de Meholá
  - el meholatita
  lexicon: HALOT
  rationale: El gentilicio se vierte con un sustantivo/adjetivo de procedencia natural en español. "Meholatita" conserva la forma étnica/toponímica del hebreo y la solución usada tradicionalmente en versiones en español cuando se busca precisión morfológica.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - para esposa
  - por mujer
  - como mujer
  lexicon: HALOT
  rationale: La expresión matrimonial idiomática se adapta al español con "como esposa", que comunica con claridad el estado marital sin perder el valor relacional del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente desde él: se conservó la pasiva de נתן, la relación temporal de בְּעֵת תֵּת y el sentido matrimonial de לְאִשָּׁה. También se mantuvo la tensión narrativa del contraste implícito con la expectativa previa de que Merab fuera dada a David. No se reportan revisiones aplicadas en el expediente inglés; el veredicto de concordancia fue alto y sin cambios necesarios.'
  spanish_consistency_notes:
  - Se usa "Dios"/"Yahvé" no aplicable en este versículo.
  - Se conserva un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - La nota al pie marca la alternativa lexical preservada por el POB inglés para la frase final.
  - Se mantiene el valor pasivo del hebreo para no convertir la cláusula en activa o interpretativa.
