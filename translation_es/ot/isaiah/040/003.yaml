translation:
  language: es
  text: 'Una voz clama: «En el desierto preparen el camino de Yahvé[a]; allanen en el desierto una calzada para nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra puntuación: «Una voz clama en el desierto: “Preparen el camino de Yahvé; allanen en el desierto una calzada para nuestro Dios”»'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֣וֹל
  english_pob_choice: A voice
  chosen_spanish: Una voz
  alternatives_spanish:
  - La voz
  - Un sonido
  lexicon: HALOT
  rationale: קוֹל puede significar 'voz' o 'sonido'. En este anuncio profético, 'Una voz' suena natural en español y conserva el inicio heráldico del texto, paralelo al inglés POB.
- source_word: קוֹרֵ֔א
  english_pob_choice: cries
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - llama
  lexicon: HALOT
  rationale: El participio expresa una acción de proclamar o llamar en voz alta. 'Clama' mantiene el tono profético y solemne mejor que una forma más plana como 'llama'.
- source_word: בַּ/מִּדְבָּ֕ר
  english_pob_choice: In the wilderness
  chosen_spanish: En el desierto
  alternatives_spanish:
  - En el desierto, una voz clama
  - En el desierto
  lexicon: HALOT
  rationale: La puntuación hebrea favorece unir 'en el desierto' con el mandato siguiente, no con 'clama'. En español, 'desierto' comunica bien la imagen de lugar árido; 'wilderness' también podría renderizarse como 'estepa' en este versículo, pero el contraste poético se preserva mejor con 'desierto' al inicio.
- source_word: פַּנּ֖וּ
  english_pob_choice: prepare
  chosen_spanish: preparen
  alternatives_spanish:
  - preparen el camino
  - dispongan
  lexicon: HALOT
  rationale: El imperativo de פנה aquí implica despejar o preparar una ruta. 'Preparen' conserva ese sentido de acción concreta y encaja de manera idiomática en español.
- source_word: דֶּ֣רֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - la senda
  lexicon: HALOT
  rationale: '''Camino'' es la correspondencia más natural y clara en español para este uso figurado y vial de דֶּרֶךְ.'
- source_word: יְהוָ֑ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de usar 'Yahvé' en el texto principal para el Tetragrámaton, preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: יַשְּׁרוּ֙
  english_pob_choice: make straight
  chosen_spanish: enderecen
  alternatives_spanish:
  - allanen
  - rectifiquen
  lexicon: HALOT
  rationale: El verbo significa hacer recto o liso. 'Enderecen' mantiene la metáfora del trazado del camino y es natural en español; 'rectifiquen' podría sonar más abstracto.
- source_word: בָּ/עֲרָבָ֔ה
  english_pob_choice: in the desert
  chosen_spanish: en la estepa
  alternatives_spanish:
  - en el desierto
  - en la llanura árida
  lexicon: HALOT
  rationale: עֲרָבָה designa una llanura árida/estepa. 'Estepa' evita repetir 'desierto' y refleja mejor el matiz geográfico del término, manteniendo el paralelo poético con 'desierto'.
- source_word: מְסִלָּ֖ה
  english_pob_choice: a highway
  chosen_spanish: una calzada
  alternatives_spanish:
  - un camino elevado
  - una carretera
  lexicon: HALOT
  rationale: מְסִלָּה apunta a un camino construido o levantado. 'Calzada' transmite la idea de una vía preparada y digna para una llegada real o ceremonial.
- source_word: לֵ/אלֹהֵֽי/נוּ
  english_pob_choice: for our God
  chosen_spanish: para nuestro Dios
  alternatives_spanish:
  - para nuestro Dioses
  - para nuestro Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural en apariencia, aquí refiere al Dios de Israel con sufijo de primera persona plural. 'Nuestro Dios' reproduce el sentido normal del hebreo bíblico.
theological_decisions:
- issue: Ubicación de 'en el desierto'
  english_pob_reading: 'Attach ''in the wilderness'' to the imperative: ''In the wilderness prepare the way of the LORD.'''
  chosen_spanish_reading: '''En el desierto'' modifica al mandato: ''En el desierto preparen el camino de Yahvé.'''
  alternative_spanish_readings:
  - '''Una voz clama en el desierto: Preparen el camino de Yahvé.'''
  rationale: La acentuación masorética favorece ligar בַּמִּדְבָּר con el mandato que sigue. Sin embargo, la lectura alternativa está muy arraigada por la cita del Nuevo Testamento y la tradición cristiana, por lo que se conserva como nota en vez de eliminarse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del archivo de revisión: no se requieren cambios respecto del pasaje fuente ni de la decisión sintáctica principal. Se preserva la alternativa de puntuación en nota, como en el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio editorial del proyecto.
  - Se usa 'camino' para דֶּרֶךְ y 'calzada' para מְסִלָּה para distinguir la vía general de la vía preparada.
  - Se evita 'SEÑOR' como sustitución del Nombre divino, siguiendo la política terminológica del proyecto.
  - '''Estepa'' para עֲרָבָה refleja el matiz geográfico sin perder inteligibilidad, aunque la nota conserva la lectura alternativa con ''en el desierto''.'
