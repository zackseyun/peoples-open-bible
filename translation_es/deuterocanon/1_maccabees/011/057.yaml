translation:
  language: es
  text: 'Y Antíoco el menor escribió a Jonatán, diciendo: «Te confiero el sumo sacerdocio, y te pongo[a] al frente de los cuatro distritos, y que seas de los Amigos[b] del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te establezco sobre». El griego usa un verbo de colocación o instalación en cargo; el texto principal opta por una formulación más natural en español para una investidura administrativa.
    reason: lexical_alternative
  - marker: b
    text: O «los amigos del rey». En el contexto helenístico, la expresión probablemente alude a un rango oficial de la corte, no solo a amistades personales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - mandó una carta
  - escribió una carta
  lexicon: LSJ
  rationale: El aoristo afirma simplemente el acto de escribir. «Escribió» conserva la relación directa con el griego sin añadir innecesariamente el sustantivo «carta», que no está explícito en el texto.
- source_word: ὁ νεώτερος
  english_pob_choice: the younger
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el joven
  lexicon: LSJ
  rationale: Aquí λειτουργa como epíteto distintivo frente a otro Antíoco. «El menor» es natural en español para una designación comparativa y evita una lectura demasiado biográfica de edad física.
- source_word: Ἵστημί
  english_pob_choice: I appoint
  chosen_spanish: te confiero
  alternatives_spanish:
  - te nombro
  - te establezco
  lexicon: LSJ
  rationale: En este contexto administrativo, el verbo expresa investidura oficial. «Te confiero» conserva con dignidad la fuerza de otorgamiento de cargo; «te nombro» también sería posible, pero «confiero» subraya mejor la entrega de una dignidad.
- source_word: τὴν ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - el pontificado
  lexicon: LSJ
  rationale: La expresión denota el cargo/dignidad del sumo sacerdote. «Sumo sacerdocio» reproduce con fidelidad la institución conferida y es idiomático en español bíblico sin imponer terminología eclesiástica posterior.
- source_word: καθίστημί σε ἐπὶ
  english_pob_choice: I appoint you over
  chosen_spanish: te pongo sobre
  alternatives_spanish:
  - te establezco sobre
  - te nombro sobre
  lexicon: LSJ
  rationale: El verbo en contexto gubernativo significa colocar a alguien al frente de una jurisdicción. «Te pongo sobre» refleja esa idea de autoridad sobre un territorio; «nombro» repetiría demasiado la noción formal y «establezco» es más abstracto.
- source_word: τῶν τεσσάρων νομῶν
  english_pob_choice: the four districts
  chosen_spanish: los cuatro distritos
  alternatives_spanish:
  - las cuatro provincias
  - los cuatro nomos
  lexicon: LSJ
  rationale: El término se refiere a divisiones administrativas. «Distritos» comunica claramente la unidad política en español moderno; «nomos» sería técnico y menos transparente.
- source_word: τῶν φίλων τοῦ βασιλέως
  english_pob_choice: the king’s Friends
  chosen_spanish: los Amigos del rey
  alternatives_spanish:
  - los amigos del rey
  - los compañeros del rey
  lexicon: LSJ
  rationale: La mayúscula en inglés intenta preservar un título cortesano helenístico. En español, «Amigos del rey» mantiene esa posible designación oficial sin convertirla en una mera descripción afectiva.
theological_decisions:
- issue: Título cortesano φίλων τοῦ βασιλέως
  english_pob_reading: the king’s Friends
  chosen_spanish_reading: los Amigos del rey
  alternative_spanish_readings:
  - los amigos del rey
  - los compañeros del rey
  rationale: 'No hay problema doctrinal directo, pero sí una tensión lexical importante: la expresión probablemente designa un rango cortesano, no simples amigos personales. La mayúscula en «Amigos» conserva esa posibilidad titular en español.'
  doctrine_reference: Principio POB de conservar el valor histórico-lexical documentado sin diluirlo en una parapráfrasis
translation_notes:
  revision_awareness: 'La traducción sigue el ajuste auditado del inglés: se mantiene la idea de investidura oficial («appoint you to the high priesthood») sin añadir una preposición impropia, y se preserva la posible lectura titulada de «Friends» como rango cortesano.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Sumo sacerdocio» se usa como equivalente institucional de ἀρχιερωσύνην, no como referencia cristiana posterior.
  - Se mantiene un registro bíblico formal pero contemporáneo, con puntuación española y comillas angulares.
  - La frase «te pongo sobre los cuatro distritos» evita tanto el calco rígido como la expansión interpretativa.
