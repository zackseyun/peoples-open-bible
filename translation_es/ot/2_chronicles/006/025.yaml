review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro POB en los elementos principales: oír desde el cielo, perdonar el pecado de Israel y hacerlos volver a la tierra dada por Dios. También conserva correctamente «sus padres» en vez de neutralizarlo. Sin embargo, hay un problema de fidelidad sintáctica en la última cláusula: «la tierra que tú les diste y a sus padres» omite en español el segundo complemento indirecto explícito exigido por el hebreo («a ellos y a sus padres») y produce una construcción incompleta o forzada. Además, «los traerás de vuelta» es comprensible, pero en español bíblico-natural «los harás volver» refleja mejor el causativo de הֲשֵׁיבוֹתָם sin sugerir tanto traslado físico por acompañamiento.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero tiene dos puntos de mejora. Primero, «que tú les diste y a sus padres» suena gramaticalmente defectuoso; debe decir «que les diste a ellos y a sus padres» o equivalente. Segundo, «entonces tú oirás» es posible, pero el pronombre «tú» es innecesario en español y hace la frase un poco rígida. Una formulación más natural y fiel sería «entonces oirás desde el cielo… y los harás volver…».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Dios», «Yahvé», «Mesías» etc. no están en juego aquí. «Perdonarás», «pecado», «tu pueblo Israel» y «sus padres» están bien alineados. Se recomienda ajustar «los traerás de vuelta» a «los harás volver» por mejor correspondencia con el valor causativo de שוב en español.
  issues:
  - severity: high
    issue: Construcción defectuosa en «la tierra que tú les diste y a sus padres»
    rationale: 'El hebreo tiene dos complementos coordinados: «a ellos y a sus padres». En español, el borrador deja el segundo miembro colgando y no expresa bien la doble relación dativa. Esto afecta tanto la fidelidad formal como la legibilidad.'
  - severity: medium
    issue: «Los traerás de vuelta» es menos preciso que «los harás volver»
    rationale: Aunque comunica el retorno, «traer de vuelta» puede sonar más físico y menos directamente causativo. El hifil de שוב aquí se refleja con mayor naturalidad y precisión en «hacer volver».
  - severity: low
    issue: Pronombre explícito «tú» innecesario en «entonces tú oirás»
    rationale: No es incorrecto, pero en español suena más natural sin el pronombre salvo que se quiera énfasis contrastivo, que no está señalado en el hebreo.
  revised_spanish_text: entonces oirás desde el cielo[a], y perdonarás el pecado de tu pueblo Israel, y los harás volver a la tierra que les diste a ellos y a sus padres.
  revised_footnotes:
  - marker: a
    text: O «desde los cielos». El hebreo usa la forma plural «cielos».
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para expresar con buen español y con fidelidad la doble referencia dativa del hebreo («a ellos y a sus padres»). También se mejora el verbo causativo con «los harás volver», que representa mejor הֲשֵׁיבוֹתָם. Se elimina el pronombre «tú» por naturalidad sin pérdida de sentido. La nota sobre «cielo/cielos» se mantiene porque preserva una alternativa formal relevante del hebreo.
