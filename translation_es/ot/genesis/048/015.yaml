base_translation:
  language: en
  yaml_path: translation/ot/genesis/048/015.yaml
  text: And he blessed Joseph and said[a], “The God before whom my fathers Abraham and Isaac walked[b], the God who has been my shepherd from my birth to this day,”
  footnotes:
  - marker: a
    text: Or “the God who has been my shepherd” or “the God who has fed me.” The Hebrew verb carries the imagery of a shepherd’s ongoing care and provision.
    reason: lexical_alternative
  - marker: b
    text: Or “all my life.” The Hebrew expression literally points to the earliest part of Jacob’s life, emphasizing God’s care from the very beginning.
    reason: lexical_alternative
