translation:
  language: es
  text: Hijo, ¿has pecado? No lo hagas más, y ora por tus pecados anteriores.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea conservada en la Zona 1 no corresponde aquí a Sirácides 21:1; dice: «Tres cosas aborrecí, y cuatro no amé». Por esa desalineación, en este versículo se sigue el testigo griego.'
    reason: textual_variant
lexical_decisions:
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Niño
  lexicon: BDAG
  rationale: En español, el vocativo natural y pastoral en este contexto es 'Hijo'. 'Hijo mío' añade posesivo no explícito en el griego; 'Niño' suena menos adecuado para una exhortación sapiencial.
- source_word: ἥμαρτες
  english_pob_choice: have you sinned
  chosen_spanish: ¿has pecado?
  alternatives_spanish:
  - ¿pecaste?
  - ¿has errado?
  lexicon: BDAG
  rationale: El aoristo interrogativo expresa un hecho cometido. '¿Has pecado?' conserva el sentido moral-religioso y suena idiomático en español.
- source_word: μὴ προσθῇς μηκέτι
  english_pob_choice: Do so no more
  chosen_spanish: No sigas haciéndolo más
  alternatives_spanish:
  - No lo hagas más
  - No continúes más
  lexicon: BDAG
  rationale: La expresión griega literalmente prohíbe añadir/continuar. En español, 'No sigas haciéndolo más' comunica la cesación del acto sin forzar una traducción mecánica de 'añadir'.
- source_word: περὶ τῶν προτέρων σου
  english_pob_choice: concerning your former sins
  chosen_spanish: por tus pecados anteriores
  alternatives_spanish:
  - acerca de tus pecados anteriores
  - por lo que hiciste antes
  lexicon: BDAG
  rationale: El griego dice literalmente 'acerca de tus cosas anteriores', pero el contexto de pecado permite explicitar 'pecados' para hacer el sentido claro y fiel al uso contextual.
- source_word: δεήθητι
  english_pob_choice: pray
  chosen_spanish: ora
  alternatives_spanish:
  - suplica
  - ruega
  lexicon: BDAG
  rationale: El imperativo de δέομαι admite 'orar' en español bíblico y evita una perífrasis excesiva. 'Ora' preserva el tono exhortativo y penitencial.
theological_decisions:
- issue: Selección de base textual ante la desalineación del hebreo aportado
  english_pob_reading: Translate from the Greek parallel as the effective source for this verse, while noting the Hebrew mismatch.
  chosen_spanish_reading: Traducir desde el griego paralelo como base efectiva de este versículo, reconociendo implícitamente que la tradición textual usada para esta línea es la griega.
  alternative_spanish_readings:
  - Traducir la línea hebrea desalineada sobre 'Tres cosas aborrecí...'
  - Preferir una reconstrucción basada solo en el hebreo adjunto
  rationale: El paquete de fuentes indica que el hebreo disponible no corresponde a Sirácides 21:1 y marca una discrepancia menor. Para fidelidad a la referencia canónica, la lectura griega debe gobernar la traducción de este versículo.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio más original y pertinente disponible, preservando honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. La traducción se alinea ahora con la lectura griega de Sirach 21:1, según el expediente auditado, y mantiene un español natural y reverente.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece en este versículo.
  - Se mantuvo un registro directo y sapiencial, apropiado para una amonestación penitencial.
  - '''Pecado'' se usa de forma explícita por el contexto inmediato; no se recurrió a ''errar'' como lectura principal.'
  - No se añadió marcador de nota al pie, por lo que no hay riesgo de desanclaje de footnotes.
