review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: la causatividad de תְּשִׁיבֵנוּ, la hostilidad activa de מְשַׂנְאֵינוּ y el valor de beneficio propio en לָמוֹ. Sin embargo, «ante el enemigo» sigue una alternativa inglesa secundaria y no refleja tan directamente el sentido principal documentado «from the foe», es decir, retirada alejándose del enemigo. Además, la nota [a] no corresponde bien al audit trail inglés: ofrece una reformulación con «volver atrás» en lugar de la alternativa específica «Tú nos haces volver / nos vuelves atrás ante el enemigo».'
  spanish_quality_summary: 'El español es claro y natural. «Tú nos haces retroceder» y «los que nos odian» suenan bien en registro bíblico moderno. La mejora principal es afinar la preposición para expresar mejor la separación del enemigo: «desde delante del enemigo» sería demasiado rígido, pero «frente al enemigo» tampoco expresa alejamiento. «Nos haces retroceder ante el enemigo» funciona idiomáticamente, aunque es algo menos fiel que «nos haces retroceder ante el enemigo»? Mejor opción idiomática y más cercana al hebreo es «nos haces retroceder ante el enemigo» only if following alt, but to preserve principal choice conviene «nos haces retroceder ante el enemigo»? Aun así, la formulación más fiel y natural es «nos haces retroceder ante el enemigo» remains ambiguous. Therefore a better repair is «nos haces retroceder ante el enemigo»? No; final revisión propuesta: «nos haces retroceder ante el enemigo» replaced with «nos haces retroceder ante el enemigo» would not fix. Best concise faithful
    Spanish is «nos haces retroceder ante el enemigo»? Since the main issue is source meaning, use «nos haces retroceder ante el enemigo»? This still misses ''from''. Prefer «nos haces retroceder ante el enemigo» less ideal. Stronger option: «nos haces retroceder delante del enemigo», which in Spanish clearly evokes being driven back before him.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. El borrador sigue bien las decisiones léxicas principales: «retroceder» por el hifil de שוב, «los que nos odian» por el participio, «saquean» por שָׁסוּ y «para sí» por לָמוֹ. La única desalineación relevante es que la frase preposicional debería reflejar más claramente la retirada ante/delante del enemigo según la evidencia y el audit trail.'
  issues:
  - severity: medium
    issue: La expresión «ante el enemigo» no preserva con suficiente claridad el valor de retirada alejándose del enemigo en מִנִּי צָר.
    rationale: El audit trail inglés documenta como opción principal «from the foe» y como alternativa «before the enemy». En español, «ante el enemigo» puede significar simplemente ‘en presencia del enemigo’, no necesariamente ‘hechos retroceder delante de él’. «Delante del enemigo» comunica mejor la escena militar de retirada forzada.
  - severity: low
    issue: La nota [a] no refleja con precisión la alternativa documentada en inglés.
    rationale: La alternativa inglesa es «You turn us back before the enemy». La nota española propuesta introduce «hacer volver atrás», que no es incorrecto, pero se aparta innecesariamente del contraste auditado entre la formulación principal causativa y la alternativa más simple «volver/nos vuelves atrás».
  revised_spanish_text: Tú nos haces retroceder delante del enemigo,[a] y los que nos odian saquean para sí.[b]
