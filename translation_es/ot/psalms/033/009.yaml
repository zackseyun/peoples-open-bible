translation:
  language: es
  text: Porque él habló[a], y llegó a ser; él mandó[b], y quedó firme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «fue»; el hebreo es muy breve: «y fue / llegó a ser».'
    reason: lexical_alternative
  - marker: b
    text: O «se mantuvo en pie», o «fue establecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la relación causal con el versículo anterior. «Porque» conserva bien el valor explicativo/causal en español bíblico actual sin sonar rígido.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - él
  lexicon: HALOT
  rationale: El pronombre independiente conserva el énfasis del hebreo. En español, «él» es suficiente en esta paralelismo poético y mantiene la referencia enfática sin recargar la línea.
- source_word: אָמַר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: «Habló» conserva el registro elevado y encaja naturalmente con la secuencia creadora del verso. «Dijo» también sería posible, pero suena un poco más neutro en español.
- source_word: וַיְהִי
  english_pob_choice: it came to be
  chosen_spanish: fue hecho
  alternatives_spanish:
  - fue
  - llegó a ser
  - vino a ser
  lexicon: HALOT
  rationale: El hebreo es muy conciso y expresa el resultado inmediato de la palabra divina. En español, «fue hecho» comunica bien la eficacia creativa sin añadir demasiada interpretación, aunque conserva una leve tensión frente a alternativas más dinámicas.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - mandó
  - ordenó
  - dio mandato
  lexicon: HALOT
  rationale: «Mandó» corresponde de forma directa al verbo de mandato y mantiene el paralelismo con «habló». «Ordenó» es viable, pero «mandó» es más breve y bíblicamente natural en español.
- source_word: וַיַּעֲמֹד
  english_pob_choice: it stood firm
  chosen_spanish: quedó firme
  alternatives_spanish:
  - estuvo firme
  - quedó firme
  - fue establecido
  lexicon: HALOT
  rationale: El verbo literalmente significa «estar de pie», pero aquí expresa el resultado estable y fijado de la orden divina. «Quedó firme» preserva la imagen de estabilidad que el POB inglés explicita como «stood firm».
theological_decisions:
- issue: Eficacia de la palabra divina en lenguaje de creación/resultados
  english_pob_reading: Render the first result clause as 'it came to be' and the second as 'it stood firm.'
  chosen_spanish_reading: «fue hecho» / «quedó firme»
  alternative_spanish_readings:
  - «fue» / «estuvo firme»
  - «llegó a ser» / «fue establecido»
  rationale: El verso describe poéticamente que la palabra y el mandato de Dios producen realidad y estabilidad inmediata. «Fue hecho» conserva la fuerza resultativa del hebreo sin expandir el sentido más allá de lo que el texto permite; «quedó firme» mantiene la idea de permanencia/estabilidad del segundo miembro.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Coincide con el dictamen de alta concordancia del control cruzado; no se introdujeron revisiones posteriores y se mantuvo la estructura poética del original con equivalencia óptima.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal: hablar/mandar seguido de resultado/estabilidad.'
  - «Yahvé» no aparece en este versículo, por lo que no se aplica la convención del nombre divino aquí.
  - Se usaron formas breves y naturales en español para respetar la concisión extrema del hebreo.
  - Las notas al pie marcan las alternativas semánticas reales del hebreo sin diluir la lectura principal.
