translation:
  language: es
  text: y azul[a], y púrpura, y hilo escarlata, y lino fino, y pelo de cabra[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'violeta' o, más literalmente, como un tinte/material azul-violeta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'cabras'; aquí se entiende el material obtenido de ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - azul
  - tinte azul
  lexicon: HALOT
  rationale: El hebreo se refiere a una tela/material teñido en azul dentro de una lista de ofrendas para el tabernáculo. En español, 'azul' es la forma más clara y natural para el texto principal; la idea de material teñido queda implícita en la lista y se mantiene la concisión del inventario.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura teñida
  - tela púrpura
  lexicon: HALOT
  rationale: En el contexto de textiles del santuario, el término designa un material teñido de púrpura. 'Púrpura' conserva el valor de color y el registro digno, y es más exacto que un equivalente coloquial como 'morado'.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: hilo escarlata
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - material escarlata
  lexicon: HALOT
  rationale: La expresión hebrea alude al resultado de un tinte escarlata derivado de insecto/cochinilla, pero en una lista de materiales textiles el español natural es 'hilo escarlata'. 'Hilo' preserva la dimensión de material textil que el inglés POB explicitó con 'yarn'.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino fino
  - lino de calidad
  lexicon: HALOT
  rationale: En los contextos del tabernáculo, שֵׁשׁ designa lino fino o de calidad. 'Lino fino' reproduce bien el valor material y la convención contextual sin depender de una formulación eclesiástica arcaizante.
- source_word: עִזִּים
  english_pob_choice: goat hair
  chosen_spanish: pelo de cabra
  alternatives_spanish:
  - lana de cabra
  - pelo de las cabras
  - cabras
  lexicon: HALOT
  rationale: Aunque literalmente el hebreo dice 'cabras', el contexto de materiales para cubrir la tienda muestra que se trata del producto de ellas. 'Pelo de cabra' mantiene la referencia material directa y evita traducir de modo demasiado literal como animales sueltos.
translation_notes:
  revision_awareness: El texto sigue el alto acuerdo del repaso más reciente y no introduce cambios de fondo respecto del sentido del original; solo ajusta el español para una lista de materiales del santuario con equivalencia óptima y registro natural.
  spanish_consistency_notes:
  - Se mantiene 'azul' para תְכֵלֶת y 'púrpura' para אַרְגָּמָן, como términos de color reconocibles en español.
  - Se conserva la serie polisindética ('y ... y ...') para reflejar la enumeración hebrea.
  - '''Hilo escarlata'' traduce el valor material/textil implícito en תוֹלַעַת שָׁנִי sin exagerar la literalidad zoológica.'
  - '''Pelo de cabra'' sigue el sentido material documentado en la nota inglesa, evitando el término más amplio ''cabras'' en el cuerpo del texto.'
