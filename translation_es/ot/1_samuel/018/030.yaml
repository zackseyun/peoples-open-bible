translation:
  language: es
  text: Entonces salieron los jefes de los filisteos, y cada vez que salían, David actuaba con más prudencia que todos los siervos de Saúl[a], y su nombre era muy estimado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David actuaba más sabiamente» o «David tenía más éxito». El verbo hebreo puede implicar prudencia que desemboca en éxito.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «su nombre era muy precioso/honrado», es decir, su reputación era muy estimada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי פְלִשְׁתִּים
  english_pob_choice: the commanders of the Philistines
  chosen_spanish: los jefes de los filisteos
  alternatives_spanish:
  - los comandantes de los filisteos
  - los príncipes de los filisteos
  - los líderes de los filisteos
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a oficiales o jefes; en este contexto militar, 'jefes' comunica bien la función sin forzar un tecnicismo militar innecesario en español.
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salían
  alternatives_spanish:
  - iban fuera
  - salieron
  - marchaban
  lexicon: HALOT
  rationale: El verbo expresa movimiento de salida. El imperfecto narrativo 'salían' ayuda a reflejar la acción repetida del verso y encaja con la cláusula iterativa siguiente.
- source_word: מִדֵּי צֵאתָם
  english_pob_choice: as often as they went out
  chosen_spanish: cada vez que salían
  alternatives_spanish:
  - así como salían
  - cada vez que iban
  - todas las veces que salían
  lexicon: HALOT
  rationale: La construcción hebrea expresa repetición. 'Cada vez que salían' conserva claramente ese valor iterativo en español natural.
- source_word: שָׂכַל
  english_pob_choice: acted more wisely
  chosen_spanish: actuaba con más prudencia
  alternatives_spanish:
  - actuaba más sabiamente
  - tenía más éxito
  - progresaba más
  lexicon: HALOT
  rationale: El verbo puede implicar actuar con prudencia y, por extensión, resultar exitoso. 'Con más prudencia' preserva el matiz de discernimiento sin eliminar la tensión entre sabiduría y éxito que el inglés POB documenta.
- source_word: מִכֹּל עַבְדֵי שָׁאוּל
  english_pob_choice: than all the servants of Saul
  chosen_spanish: que todos los siervos de Saúl
  alternatives_spanish:
  - que todos los servidores de Saúl
  - que todos los servidores de Saúl
  - que todos los esclavos de Saúl
  lexicon: HALOT
  rationale: עֲבָדִים aquí parece referirse al servicio de corte o administración, no a esclavitud. 'Siervos' es una opción amplia y bíblicamente reconocible en español, aunque en el proyecto se prefiera 'esclavo' cuando el contexto lo exige.
- source_word: וַיִּיקַר שְׁמוֹ מְאֹד
  english_pob_choice: his name was highly esteemed
  chosen_spanish: su nombre era muy estimado
  alternatives_spanish:
  - su nombre era muy precioso
  - su nombre era grandemente honrado
  - su reputación era muy estimada
  lexicon: HALOT
  rationale: יָקַר en esta forma comunica valor, honor o estima aplicada al nombre; en español, 'muy estimado' mantiene el sentido de reputación honrada sin sonar demasiado literal o extrañado.
theological_decisions:
- issue: Relación entre sabiduría y éxito en שָׂכַל
  english_pob_reading: The Hebrew verb can denote prudent action that results in success.
  chosen_spanish_reading: David actuaba con más prudencia, con un resultado de mayor estima pública.
  alternative_spanish_readings:
  - David prosperaba más
  - David tenía más éxito
  - David actuaba más sabiamente
  rationale: La hebreo permite una tensión semántica entre prudencia y prosperidad. La traducción principal conserva la dimensión de prudencia y deja implícito el resultado favorable en la cláusula final sobre su nombre.
  doctrine_reference: Sabiduría práctica y providencia en la narrativa de 1 Samuel
- issue: Sentido de 'su nombre' como reputación
  english_pob_reading: Literally, 'his name was very precious/honored,' that is, his reputation was highly esteemed.
  chosen_spanish_reading: su nombre era muy estimado, es decir, su reputación era honrada.
  alternative_spanish_readings:
  - su nombre era muy precioso
  - su fama era muy grande
  - su reputación era muy honrada
  rationale: El hebreo usa 'nombre' para reputación. En español, 'nombre' puede mantenerse literalmente, pero conviene explicitar en la nota que se trata de prestigio o fama, no solo del nombre propio.
  doctrine_reference: Uso bíblico de 'nombre' como reputación/renombre
translation_notes:
  revision_awareness: El texto inglés revisado prefirió 'as often as' por precisión formal; la versión española adopta 'cada vez que' para expresar con naturalidad el valor iterativo del hebreo, manteniendo la misma intención revisada. Se conservó la tensión léxica de שָׂכַל entre prudencia y éxito, y la expresión idiomática 'su nombre' para reputación.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - '''Siervos'' se emplea por el contexto de corte real; no se usó ''esclavos'' porque el hebreo parece referirse a funcionarios/servidores de Saúl.'
  - Se evitó 'Cristo/Mesías' porque no aparece en el versículo.
  - La puntuación y el orden oracional buscan ser publicables en español sin perder el paralelismo iterativo del hebreo.
