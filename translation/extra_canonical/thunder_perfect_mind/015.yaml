  does not explicitly state ‘bridegroom’ due to the OCR’s ⲧϫⲟⲉⲓⲥ; if the underlying
  word is ⲡϩⲙϩⲁⲗ, a future revision will sharpen the bride/bridegroom antithesis.'
voice_check: First-person self-revelation is maintained where present in the Coptic
  (ⲁⲛⲟⲕ ⲧⲉ ... ⲁⲛⲟⲕ ⲧⲉ). I did not insert additional ‘I am’ into the first clause,
  which in this OCR appears as nominal statements rather than ‘I am’ formulas.
alignment_risk_note: 'Alignment confidence is medium. Two points at risk: (1) ⲧϫⲟⲉⲓⲥ
  may reflect a misread of ⲡϩⲙϩⲁⲗ (‘bridegroom’), which is the paradoxical pair attested
  in many translations; (2) the phrase break ⲛⲧⲉ ⲡⲁ / ϩⲁⲓ suggests ‘of my husband’
  belongs with ‘the bride’, but lineation could be misaligned. ‘ⲡⲁϫⲡⲟ’ is taken as
  ‘my begetter’; if this is wrong, the clause would need adjustment.'
