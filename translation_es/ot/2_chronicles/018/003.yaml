base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/003.yaml
  text: And Ahab king of Israel said to Jehoshaphat king of Judah[a], “Will you go with me to Ramoth-gilead?” And he said to him, “I am as you are, and my people as your people[b], and I am with you in the battle.”
  footnotes:
