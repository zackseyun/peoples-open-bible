lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  - cumplió
  lexicon: HALOT
  rationale: עשה es amplio ('hacer/hacer cumplir'). En este contexto de obediencia a un mandato, 'hizo' conserva la naturalidad del español y mantiene la idea de ejecución obediente sin añadir matices que el hebreo no exige.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: Transliteración bíblica tradicional en español
  rationale: El nombre propio se adapta a la forma estándar en español bíblico, 'Noé', que es plenamente reconocible y fiel al referente.
- source_word: כְּכֹל
  english_pob_choice: according to all
  chosen_spanish: conforme a todo
  alternatives_spanish:
  - según todo
  - de acuerdo con todo
  - tal como todo
  lexicon: HALOT
  rationale: La construcción con כְּ + כֹּל expresa conformidad total con lo mandado. 'Conforme a todo' preserva esa relación de correspondencia de manera idiomática en español.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - lo cual
  lexicon: HALOT
  rationale: En español, 'lo que' expresa de forma clara y natural el contenido de la orden divina sin forzar una relativa rígida.
- source_word: צִוָּהוּ
  english_pob_choice: had commanded him
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había comandado
  - le había dado mandamiento
  lexicon: HALOT
  rationale: צוה significa 'mandar/ordenar'. 'Mandado' es una equivalencia sobria y bíblicamente natural en español, y 'le había' conserva el valor anterior al acto de Noé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal español, preservando el nombre divino personal en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre propio de Dios. En español, el proyecto pide 'Yahvé' como forma principal para mantener la transparencia y la continuidad con el audit trail inglés, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto coincide con el pasaje hebreo y con el acuerdo alto del audit trail inglés; no se detectan revisiones posteriores que alteren el sentido. Se conserva la estructura básica: sujeto + verbo de obediencia + complemento de conformidad total + mandato divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con la política del proyecto.
  - '''Noé'' sigue la forma establecida en español bíblico para el nombre propio.'
  - '''Conforme a todo'' y la nota al pie preservan la posible lectura más literal ''según/conforme a todo lo que Yahvé le había mandado''.'
