  text: בַּ/יּ֣וֹם הַ/ה֔וּא יִֽהְיֶ֥ה מִצְרַ֖יִם כַּ/נָּשִׁ֑ים וְ/חָרַ֣ד וּ/פָחַ֗ד מִ/פְּנֵי֙ תְּנוּפַת֙ יַד יְהוָ֣ה צְבָא֔וֹת אֲשֶׁר ה֖וּא מֵנִ֥יף עָלָֽי/ו׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/019/016.yaml
  text: In that day Egypt will be like women[a], trembling and afraid because of the waving of the hand of Yahweh of Armies[c][b], which he waves against it.
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The simile 'like women' reflects ancient wartime imagery of vulnerability and fear; the Hebrew explicitly uses 'women.'
    reason: cultural_note
  - marker: c
    text: Or 'the brandishing of the hand.'
    reason: lexical_alternative
