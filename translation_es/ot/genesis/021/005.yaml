translation:
  language: es
  text: Y Abraham tenía cien años cuando le nació Isaac, su hijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Y Abraham era un hijo de cien años al nacerle Isaac, su hijo».'
