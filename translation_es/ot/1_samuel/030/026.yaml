base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/026.yaml
  text: When David came to Ziklag[a], he sent some of the spoil to the elders of Judah, his friends, saying, “Behold, here is a gift for you from the spoil of the enemies of Yahweh.”
  footnotes:
  - marker: a
    text: Or “a blessing for you.” The Hebrew word can mean “blessing,” but here refers to a material gift sent from the plunder.
    reason: lexical_alternative
