revisions:
- from: Yahvé te herirá con la sarna de Egipto[a], con tumores, con costras y con sarna, de la cual no podrás sanar.
  to: Yahvé te herirá con los forúnculos de Egipto, con tumores[a], con costras y con picazón, de las cuales no podrás sanar.
  rationale: Se reemplaza 'sarna de Egipto' por 'forúnculos de Egipto' para reflejar שְׁחִין según el expediente fuente y el POB inglés. Se mantiene 'tumores' con nota alternativa, se conserva 'costras' para גָּרָב y se cambia חָרֶס a 'picazón' para preservar la distinción léxica respecto de las otras afecciones. También se mueve la nota [a] a 'tumores' y se ajusta la cláusula final para expresar mejor la incurabilidad en español natural.
