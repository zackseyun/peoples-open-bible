    rationale: La nota [a] aparece sobre «hijos» pero comenta «que gobernaban...», y la nota [b] explica «la casa de sus padres» cuando la segunda nota inglesa corresponde a גִּבּוֹרֵי חַיִל. Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: «Hombres valientes» debilita el alcance de גִּבּוֹרֵי חַיִל.
    rationale: La expresión hebrea denota no solo valentía sino también fortaleza probada, capacidad y estatus. El POB inglés conservó esa fuerza con «mighty men of valor» y una nota aclaratoria; el español debería retener más de ese peso léxico.
  - severity: low
