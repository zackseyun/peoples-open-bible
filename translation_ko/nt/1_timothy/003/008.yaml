  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διακόνους ὡσαύτως σεμνούς, μὴ διλόγους, μὴ οἴνῳ πολλῷ προσέχοντας, μὴ αἰσχροκερδεῖς,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/008.yaml
  text: Deacons likewise must be dignified[a], not double-tongued, not devoted to much wine, not greedy for shameful gain[c][b],
  footnotes:
  - marker: a
    text: Or 'not saying one thing to one person and another to someone else.'
    reason: lexical_alternative
  - marker: b
    text: Or 'not addicted to much wine.'
    reason: lexical_alternative
  - marker: c
    text: Or 'not pursuing sordid gain.'
    reason: lexical_alternative
translation:
  language: ko
  text: 집사들도 이와 같이 단정한 사람이어야 합니다. 두 말 하지 않고[a], 많은 술에 빠지지 않고[b], 부끄러운 이익을 탐하지 않으며[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「한 사람에게 한 말을 다른 사람에게 다르게 말하지 않고」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「많은 술에 중독되지 않고」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「추한 이득을 좇지 않고」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διακόνους
  english_pob_choice: Deacons
  chosen_korean: 집사들
  alternatives_korean:
  - 봉사자들
  - 일꾼들
  lexicon: BDAG
  rationale: 본 절은 감독과 짝지어 등장하는 직제 문맥. 「집사」로 일관.
- source_word: σεμνούς
  english_pob_choice: dignified
  chosen_korean: 단정한 사람
  alternatives_korean:
  - 위엄 있는
  - 정중한
  lexicon: BDAG
  rationale: 2:2·3:4 σεμνότης와 일관.
- source_word: μὴ διλόγους
  english_pob_choice: not double-tongued
  chosen_korean: 두 말 하지 않고
  alternatives_korean:
  - 이중 언어를 쓰지 않고
  lexicon: BDAG
  rationale: 합성어 직역. 한국어 「두 말 하다」가 이중성을 자연스럽게 담는다.
- source_word: μὴ οἴνῳ πολλῷ προσέχοντας
  english_pob_choice: not devoted to much wine
  chosen_korean: 많은 술에 빠지지 않고
  alternatives_korean:
  - 술을 많이 마시지 않고
  lexicon: BDAG
  rationale: προσέχω + 여격의 「몰두」를 「빠지지」로 옮긴다.
- source_word: αἰσχροκερδεῖς
  english_pob_choice: greedy for shameful gain
  chosen_korean: 부끄러운 이익을 탐하지 않으며
  alternatives_korean:
  - 추한 이득을 좇지 않으며
  - 부정한 이득을 탐하지 않으며
  lexicon: BDAG
  rationale: αἰσχρός(부끄러운) + κέρδος(이익) 합성. 「부끄러운 이익을 탐하지 않으며」가 자연스럽다.
