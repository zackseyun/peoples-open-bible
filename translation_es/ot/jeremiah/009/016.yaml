revisions:
- from: 'Así dice Yahvé de los ejércitos: Consideren[a], y llamen a las mujeres endechas, para que vengan; y envíen por las mujeres hábiles[b], para que vengan.'
  to: 'Así dice Yahvé de los ejércitos: Consideren, y llamen a las plañideras[a], para que vengan; y manden llamar a las mujeres expertas[b], para que vengan.'
  rationale: Se corrigen dos expresiones poco naturales en español. 'Las plañideras' comunica con claridad el oficio de las mujeres que realizan lamentación fúnebre, y la nota conserva una alternativa más literal. 'Manden llamar a' expresa mejor el sentido contextual de 'send for'. También se ajusta 'mujeres hábiles' a 'mujeres expertas' para un español más natural en este contexto ritual, sin perder la distinción frente a 'sabias'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:46Z'
