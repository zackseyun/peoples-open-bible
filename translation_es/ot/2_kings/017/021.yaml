review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: ruptura con la casa de David, entronización de Jeroboam, apartamiento de Israel de seguir a Yahvé y causación de un gran pecado. Sin embargo, «se había desgarrado» introduce un plus aspectual no presente en el qatal simple aquí y suena menos natural en español narrativo; además, el hebreo/inglés auditado apunta mejor a una ruptura puntual que a un pluscuamperfecto. También conviene conservar la nota léxica sobre la imagen de desgarro con una formulación más natural en el texto principal.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Porque Israel se había desgarrado» resulta algo forzado e innecesariamente rebuscado. «Israel se arrancó de la casa de David» o «Israel se desgarró de la casa de David» preserva la metáfora; de esas, «se arrancó» suena más natural con «de». El resto del versículo es legible y fiel. La coordinación con punto y coma funciona bien.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con términos doctrinales principales. «Jeroboam apartó a Israel de seguir a Yahvé» es aceptable, aunque el matiz de נדח como expulsar/desviar queda algo suavizado; no obstante, sigue dentro del rango documentado y no exige cambio obligatorio. «Los hizo cometer un gran pecado» preserva bien el causativo de חטא.'
  issues:
  - severity: medium
    issue: Tiempo verbal «se había desgarrado»
    rationale: El hebreo קָרַע es qatal simple en una explicación histórica; el pluscuamperfecto español no está exigido por el contexto y puede sugerir una relación temporal más marcada que la del original.
  - severity: medium
    issue: Expresión poco natural «desgarrado de la casa de David»
    rationale: Aunque busca conservar la metáfora de desgarro, la combinación suena algo dura en español. Una formulación como «se arrancó de la casa de David» mantiene la viveza y mejora la fluidez.
  revised_spanish_text: Porque Israel se arrancó de la casa de David[a], e hicieron rey a Jeroboam hijo de Nabat; y Jeroboam apartó a Israel de seguir a Yahvé, y los hizo cometer un gran pecado.
  revised_footnotes:
