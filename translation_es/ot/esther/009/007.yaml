  lexicon: HALOT
  rationale: El marcador de objeto definido repetido en la lista no se traduce literalmente en español; su función sintáctica queda representada por la enumeración coordinada, como en la práctica de la POB inglesa.
theological_decisions:
- issue: Continuación implícita de la oración anterior sobre los hijos de Hamán muertos por los judíos
  english_pob_reading: These are the first three names in the list of Haman's sons, continued from the previous verse's statement that the Jews killed them.
  chosen_spanish_reading: Se mantiene solo la lista de nombres, dejando la continuación al versículo anterior.
  alternative_spanish_readings:
  - Estos son los primeros tres nombres de la lista de los hijos de Hamán, a quienes los judíos mataron.
  - Parsandata, Dalfón y Aspata, los cuales fueron muertos por los judíos.
  rationale: El versículo hebreo preservado aquí contiene únicamente los nombres; la conexión narrativa ya está establecida en el versículo previo. Añadir una glosa explicativa al cuerpo del texto excedería el testimonio inmediato del hebreo.
  doctrine_reference: Principio de fidelidad al alcance textual y a la continuidad contextual
translation_notes:
  revision_awareness: 'El contexto auditado inglés no requiere cambios sustantivos: el texto mantiene la lista de nombres propios y la nota de continuidad con el versículo anterior. La revisión más reciente indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se usa transliteración coherente de nombres propios persas/hebreos en todo el versículo.
  - Se evita traducir el marcador וְאֵת de forma explícita para no crear una estructura antinatural en español.
  - La nota al pie marca la continuidad narrativa sin insertar material ajeno en el texto principal.
