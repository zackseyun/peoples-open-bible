    issue: «delante de mi rostro» suena poco natural en español bíblico moderno
    rationale: Aunque es comprensible y cercano a la forma hebrea, la expresión es rígida y menos legible que alternativas como «ante mi rostro», que conservan dignidad y claridad.
  - severity: medium
    issue: La nota al pie dice «de mi rostro», lo cual puede sonar anatómico o confuso
    rationale: El hebreo מִפָּנַי aquí expresa una afrenta dirigida a la persona «ante mi rostro / en mi presencia», no procedencia física desde el rostro. La nota debe reflejar mejor esa fuerza contextual.
