translation:
  language: es
  text: Así, Hermón soportó una amenaza[a] inesperada y peligrosa, y se vio sacudido en su aspecto y semblante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedó consternado en su aspecto y rostro» o «se encogió en apariencia y expresión». El verbo griego puede transmitir contracción visible, intimidación o perturbación emocional.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: LSJ
  rationale: Marca la relación inferencial o consecutiva con lo anterior. «Así» conserva brevedad y naturalidad en español sin añadir matices no presentes.
- source_word: ὁ Ἕρμων
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: transliteration
  rationale: Se translitera el nombre propio con acento gráfico para la pronunciación española natural y legible.
- source_word: ἀπροσδόκητον
  english_pob_choice: unexpected
  chosen_spanish: inesperada
  alternatives_spanish:
  - inesperada e imprevista
  - no esperada
  lexicon: LSJ
  rationale: Expresa bien la falta de anticipación. «Inesperada» es el equivalente más natural y fiel en español contemporáneo.
- source_word: ἐπικίνδυνον
  english_pob_choice: dangerous
  chosen_spanish: peligrosa
  alternatives_spanish:
  - arriesgada
  - amenazante
  - peligrosa y amenazante
  lexicon: LSJ
  rationale: Conserva el sentido de peligro o riesgo real. «Peligrosa» es claro y directo; no se atenúa la fuerza del adjetivo griego.
- source_word: ὑπήνεγκεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - sufrió
  - aguantó
  - padeció
  lexicon: LSJ
  rationale: El verbo sugiere que Hermón pasó por y cargó con la amenaza. «Soportó» preserva la idea de atravesar una prueba sin forzar una lectura más intensa que la evidencia.
- source_word: ἀπειλήν
  english_pob_choice: threat
  chosen_spanish: amenaza
  alternatives_spanish:
  - amenaza
  - intimidación
  - amago
  lexicon: LSJ
  rationale: «Amenaza» corresponde de forma directa al sustantivo griego y funciona bien en español bíblico moderno.
- source_word: τῇ ὁράσει
  english_pob_choice: in appearance
  chosen_spanish: en su apariencia
  alternatives_spanish:
  - en su aspecto
  - a la vista
  - en lo visible
  lexicon: LSJ
  rationale: Mantiene el valor visible/externo del término. Se añade el posesivo para que el español fluya con naturalidad y se entienda que se refiere a su aspecto observable.
- source_word: τῷ προσώπῳ
  english_pob_choice: countenance
  chosen_spanish: y semblante
  alternatives_spanish:
  - y rostro
  - y expresión
  - y faz
  lexicon: LSJ
  rationale: «Semblante» preserva el matiz facial y expresivo sin reducirlo solo a «rostro». Además permite distinguirlo de «apariencia» como dos aspectos visibles relacionados.
- source_word: συνεστάλη
  english_pob_choice: he was shaken
  chosen_spanish: quedó abatido
  alternatives_spanish:
  - quedó consternado
  - se contrajo
  - se encogió
  lexicon: LSJ
  rationale: El verbo puede indicar contracción visible, intimidación o perturbación emocional. «Quedó abatido» recoge la idea de visible decaimiento y afectación sin decidir en exceso entre lo físico y lo emocional.
translation_notes:
  revision_awareness: El testimonio comparado indica alta concordancia con el inglés POB y el griego de Swete; la única tensión relevante es el alcance de συνεστάλη, que puede reflejar decaimiento visible, contracción o perturbación interna. La redacción española conserva esa ambigüedad controlada con «quedó abatido» y la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» fuera de esta unidad porque no aparecen en el texto.
  - Se usa español neutro y bíblico moderno, evitando calcos innecesarios.
  - La duplicación visible («apariencia»/«semblante») reproduce la doble referencia del griego a lo exterior y facial.
