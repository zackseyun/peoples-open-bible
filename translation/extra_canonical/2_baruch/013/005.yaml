  category: mistranslation
  from: your people
  to: your city
  rationale: The Syriac word is 'madīnatkōn', which means 'your city' (referring to
    Zion/Jerusalem). 'Your people' would be 'ʿammkōn'.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/013/005.job-77142.json
  category: grammar
  from: the retributions that come
  to: this retribution that has come
  rationale: The Syriac 'purʿānā hānā' is singular ('this retribution'), and the verb
    'etā' is in the perfect tense ('has come' or 'came'). The current rendering uses
    a plural noun and present tense verb.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/013/005.job-77142.json
  category: grammar
  from: their appointed time
  to: its appointed time
  rationale: The Syriac suffix in 'b-zabneh' is singular ('in its time'). Correcting
    the preceding nouns to singular means this pronoun should also be singular to
    match.
