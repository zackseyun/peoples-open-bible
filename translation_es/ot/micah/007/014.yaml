  revised_footnotes:
  - marker: a
    text: O «en medio de terreno fértil» / «en tierra fértil». El hebreo Carmel puede referirse tanto a la región de Carmel como a un terreno fructífero.
    reason: lexical_alternative
  revision_rationale: Se corrige 'vara' a 'cayado' para ajustarse mejor al sentido pastoral de שֵׁבֶט documentado en el POB inglés. Se mueve la nota [a] a 'Carmel' porque la nota trata la ambigüedad de כַּרְמֶל, no del instrumento del pastor. El resto del verso puede mantenerse por su buena fidelidad y legibilidad.
