theological_decisions:
- issue: Whether the sexual language should be rendered metaphorically as spiritual unfaithfulness or literally as sexual sin
  chosen_reading: Rendered literally in the main text as sexual misconduct, while allowing that Hosea's broader context also exploits covenant-unfaithfulness imagery.
  alternative_readings:
  - Rendered metaphorically as spiritual prostitution/idolatry
  rationale: In this verse the immediate syntax names 'your daughters' and 'your daughters-in-law' and uses two concrete sexual verbs in parallel with cultic activity at high places. The literal social/moral consequence is explicit, even if Hosea elsewhere uses sexual language metaphorically for idolatry. The translation should not collapse the literal into the metaphor.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
