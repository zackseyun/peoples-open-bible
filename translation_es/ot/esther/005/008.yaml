  text: אִם מָצָ֨אתִי חֵ֜ן בְּ/עֵינֵ֣י הַ/מֶּ֗לֶךְ וְ/אִם עַל הַ/מֶּ֨לֶךְ֙ ט֔וֹב לָ/תֵת֙ אֶת שְׁאֵ֣לָתִ֔/י וְ/לַ/עֲשׂ֖וֹת אֶת בַּקָּשָׁתִ֑/י יָב֧וֹא הַ/מֶּ֣לֶךְ וְ/הָמָ֗ן אֶל הַ/מִּשְׁתֶּה֙ אֲשֶׁ֣ר אֶֽעֱשֶׂ֣ה לָ/הֶ֔ם וּ/מָחָ֥ר אֶֽעֱשֶׂ֖ה כִּ/דְבַ֥ר הַ/מֶּֽלֶךְ־־־־־־׃
