translation:
  language: es
  text: y de la tribu de Judá, el que habló palabras sabias[a] a Darío, rey de los persas, en el segundo año de su reinado, en el mes de Nisán, el primer mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «ante Darío» o «en presencia de Darío»; la expresión griega ἐπὶ Δαρείου admite matices cercanos en este contexto de corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  lexicon: LSJ
  rationale: En este contexto genealógico y étnico, «tribu» comunica con claridad la división del pueblo sin añadir matices no presentes en el griego.
- source_word: Ἰούδα
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: LSJ
  rationale: Como nombre tribal y bíblico, «Judá» es la forma española estándar y más reconocible.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: LSJ
  rationale: «Habló» reproduce el acto verbal de λαλέω de manera natural en español sin especificar más de lo que el griego dice.
- source_word: λόγους σοφούς
  english_pob_choice: wise words
  chosen_spanish: palabras sabias
  alternatives_spanish:
  - dichos sabios
  - palabras de sabiduría
  lexicon: LSJ
  rationale: La secuencia conserva el plural de λόγους y el calificativo σοφούς de forma directa y clara en español.
- source_word: δευτέρῳ ἔτει τῆς βασιλείας αὐτοῦ
  english_pob_choice: in the second year of his reign
  chosen_spanish: en el segundo año de su reinado
  alternatives_spanish:
  - durante el segundo año de su reinado
  - en el segundo año de su reino
  lexicon: LSJ
  rationale: «Reinado» es el equivalente español más natural para βασιλεία en este contexto monárquico.
- source_word: μηνὶ Νισάν
  english_pob_choice: in the month Nisan
  chosen_spanish: en el mes de Nisán
  alternatives_spanish:
  - en Nisán
  lexicon: LSJ
  rationale: El griego menciona explícitamente «mes», así que se conserva para transparencia; «Nisán» es la forma usual en español bíblico.
- source_word: τοῦ πρώτου μηνός
  english_pob_choice: the first month
  chosen_spanish: el primer mes
  alternatives_spanish:
  - del primer mes
  lexicon: LSJ
  rationale: La frase appositiva identifica a Nisán como el primer mes; en español, la aposición directa es clara y fiel.
theological_decisions:
- issue: Valor de ἐπὶ Δαρείου en contexto cortesano
  english_pob_reading: to Darius / in the presence of Darius
  chosen_spanish_reading: a Darío
  alternative_spanish_readings:
  - ante Darío
  - en presencia de Darío
  rationale: El audit trail inglés dejó abierta la relación semántica de ἐπί con genitivo en este entorno de corte. En español, «a Darío» conserva la dirección del discurso sin cerrar indebidamente la posibilidad de que se trate de hablar ante su presencia.
  doctrine_reference: No aplica; decisión de sintaxis y pragmática del texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que ajustó ἐπὶ Δαρείου de «before Darius» a «to Darius», manteniendo la posibilidad contextual de una audiencia cortesana y conservando en español una formulación natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el nombre tribal, en línea con el uso bíblico estándar en español.
  - Se conserva «mes de Nisán» y luego «el primer mes» para reproducir la explicación appositiva del griego.
  - No se introduce puntuación interpretativa adicional ni se expande el contenido más allá del texto fuente.
