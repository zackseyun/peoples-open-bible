  to: Como pastor, pastoreará a su rebaño[a]; con su brazo reunirá a los corderos, y en su seno[b] los llevará; conducirá con cuidado a las ovejas que amamantan[c].
  rationale: Se conserva la redacción general del borrador por su fidelidad y buena legibilidad, pero se corrige la última frase para reflejar con mayor precisión עָלוֹת como ovejas lactantes/con cría y se reubica la nota alternativa al segmento correcto. También se elimina la nota errónea sobre «los llevará en sus brazos», ya que el inglés POB no preserva esa alternativa como nota allí, sino que mantiene «in his bosom» con nota cultural.
