revisions:
- from: Porque, viendo[a] la inundación de números y la dificultad para los que desean entrar[b] en los relatos de la historia, debido a la abundancia de material.
  to: Porque, viendo[a] el torrente de números y la dificultad para los que desean adentrarse[b] en los relatos de la historia, debido a la abundancia de material.
  rationale: Se corrige la nota [b] para que preserve una alternativa real y el matiz documentado del verbo griego. Además, se ajusta el texto principal con «torrente» y «adentrarse» para mejorar la naturalidad del español y reflejar mejor la metáfora y el verbo raro del original, sin alterar el sentido.
