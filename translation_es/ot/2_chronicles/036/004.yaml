translation:
  language: es
  text: Y el rey de Egipto hizo rey a Eliaquim, su hermano, sobre Judá y Jerusalén, y le cambió el nombre a Joacim. Y Neco[a] tomó a su hermano Joacaz y lo llevó a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Neco»; en algunas traducciones en inglés aparece «Necho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey
  alternatives_spanish:
  - lo nombró rey
  - lo puso como rey
  lexicon: HALOT
  rationale: 'El hifil de מלך es causativo: el rey de Egipto instala a Eliaquim. «Hizo rey» conserva esa causalidad sin añadir matices ajenos.'
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  - el monarca de Egipto
  lexicon: HALOT
  rationale: Es una construcción posesiva simple; «el rey de Egipto» es natural en español y mantiene la referencia definida al gobernante concreto.
- source_word: אֶלְיָקִים אָחִיו
  english_pob_choice: Eliakim his brother
  chosen_spanish: a Eliaquim, su hermano
  alternatives_spanish:
  - a su hermano Eliaquim
  - a Eliaquim, el hermano de él
  lexicon: HALOT
  rationale: La relación fraternal se refiere a Joacaz; en español, el orden con coma resulta claro y conserva el vínculo familiar sin confusión.
- source_word: עַל יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: over Judah and Jerusalem
  chosen_spanish: sobre Judá y Jerusalén
  alternatives_spanish:
  - sobre Judá y sobre Jerusalén
  - para gobernar Judá y Jerusalén
  lexicon: HALOT
  rationale: «Sobre» expresa el alcance del gobierno real. Se conservan ambos referentes territoriales, como en el hebreo y en la POB inglesa.
- source_word: וַיַּסֵּב אֶת־שְׁמוֹ יְהוֹיָקִים
  english_pob_choice: changed his name to Jehoiakim
  chosen_spanish: cambió su nombre por Joacim
  alternatives_spanish:
  - le cambió el nombre a Joacim
  - lo renombró Joacim
  lexicon: HALOT
  rationale: El verbo indica alteración/renombramiento impuesto. «Cambió su nombre por» es idiomático en español y evita la ambigüedad de un simple «llamó».
- source_word: וְאֶת יוֹאָחָז אָחִיו לָקַח נְכוֹ
  english_pob_choice: And Neco took his brother Jehoahaz
  chosen_spanish: Y Neco tomó a su hermano Joacaz
  alternatives_spanish:
  - Y Neco se llevó a su hermano Joacaz
  - Y Neco capturó a su hermano Joacaz
  lexicon: HALOT
  rationale: לקח aquí tiene fuerza de tomar/apresar; «tomó a» conserva la literalidad y deja abierto el matiz de captura que el contexto sugiere.
- source_word: וַיְבִיאֵהוּ מִצְרָיְמָה
  english_pob_choice: and brought him to Egypt
  chosen_spanish: y lo llevó a Egipto
  alternatives_spanish:
  - y lo trajo a Egipto
  - y lo condujo a Egipto
  lexicon: HALOT
  rationale: El sufijo direccional implica movimiento hacia Egipto. «Llevó a Egipto» es claro y fiel, sin forzar el matiz de traer.
- source_word: נְכוֹ
  english_pob_choice: Neco
  chosen_spanish: Neco
  alternatives_spanish:
  - Neco
  - Necho
  lexicon: HALOT
  rationale: Se mantiene la transliteración que la POB inglesa adoptó como forma principal, consistente con la vocalización hebrea y con la tradición textual indicada por la nota inglesa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «But» por «And» para ajustarse a la conjunción hebrea y evitar introducir contraste no presente. Por eso se conserva «Y» en ambos miembros de la oración, sin una adversativa.
  spanish_consistency_notes:
  - Se usa «Y» repetido para reflejar la coordinación del hebreo, sin añadir contraste.
  - Se mantiene «Egipto» sin articular como posesión innecesaria en español.
  - «Joacim» y «Joacaz» siguen la forma española habitual de los nombres teofóricos, coherente con la POB inglesa y con la pronunciación castellana estándar.
  - «Eliaquim» conserva la transliteración hispana tradicional del nombre hebreo, evitando formas híbridas.
