  to: En sus días, Nabucodonosor, rey de Babilonia, subió[a]; y Joacim llegó a ser su siervo por tres años[b]. Luego se volvió[c] y se rebeló contra él.
  rationale: Se revisa principalmente עֶבֶד de ‘esclavo’ a ‘siervo’ para ajustarse al sentido político del hebreo aplicado a un rey subordinado y a la justificación documentada del POB inglés. Se mantiene ‘subió’ por fidelidad formal, con nota aclaratoria. Se añade una nota para ‘se volvió’ porque el POB inglés preservó esa alternativa semántica y ayuda a aclarar la reversión de lealtad implícita en וַיָּשָׁב.
