review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: salida desde un lugar y acampada en otro. «Partieron» para וַיִּסְעוּ y «acamparon» para וַיַּחֲנוּ son opciones fieles y naturales. Sin embargo, los topónimos necesitan mejor alineación con la transliteración documentada en la pista inglesa: Mithkah y Hashmonah. Las formas españolas «Mitca» y «Jasmoná» simplifican demasiado y se alejan innecesariamente de los nombres fuente.'
  spanish_quality_summary: La frase es clara y natural en español bíblico moderno. No obstante, conviene ajustar los nombres de lugar para mayor consistencia editorial y recognoscibilidad interlingüística. También es preferible conservar la conjunción «y» antes de «acamparon», ya que corresponde al hebreo narrativo y suena perfectamente natural en una fórmula de itinerario.
  glossary_alignment: No hay términos teológicos mayores en este versículo. El punto principal es la política de transliterar nombres propios; por esa razón, «Mitcá»/«Mitca» y «Jasmoná» deberían revisarse hacia formas más cercanas a Mithkah y Hashmonah en español. «Hashmoná» preserva mejor el nombre fuente que «Jasmoná».
  issues:
  - severity: medium
    issue: Topónimo «Mitca» demasiado alejado de Mithkah
    rationale: Aunque los nombres propios se adaptan al español, la política del proyecto favorece transliterarlos, no reemplazarlos por formas demasiado simplificadas. «Mitca» pierde la aspiración/transliteración representada en Mithkah; una forma como «Mitká» conserva mejor la relación con la fuente y sigue siendo legible en español.
  - severity: medium
    issue: Topónimo «Jasmoná» se aparta de Hashmonah
    rationale: La sustitución de H por J no es necesaria bajo la política del proyecto. «Hashmoná» mantiene mejor la identidad del nombre documentado en el inglés POB y sigue siendo comprensible para lectores hispanohablantes.
  - severity: low
    issue: Omisión de la conjunción «y» antes de «acamparon»
    rationale: El hebreo coordina explícitamente las acciones, y en esta fórmula de itinerario el español admite naturalmente «y acamparon». No es un error grave, pero conservarla mejora la fidelidad formal sin volver la frase torpe.
  revised_spanish_text: Partieron de Mitká y acamparon en Hashmoná.
  revision_rationale: Se ajustan los topónimos para preservar mejor la transliteración de los nombres propios del hebreo según la pista inglesa y la política del proyecto, y se restituye la conjunción coordinante para reflejar con más fidelidad la fórmula narrativa del original.
