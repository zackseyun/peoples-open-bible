translation:
  language: es
  text: 'Entonces Rut la moabita dijo[a]: «Él también me dijo: “Quédate cerca de mis muchachas hasta que hayan terminado toda mi cosecha”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Quédate cerca de mis muchachos». La forma hebrea puede entenderse en masculino, aunque el contexto inmediato favorece «muchachas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «Entonces» comunica esa secuencia en español natural y digno.
- source_word: רוּת הַמּוֹאֲבִיָּה
  english_pob_choice: Ruth the Moabite
  chosen_spanish: Rut la moabita
  alternatives_spanish:
  - Rut la moabita
  - Rut, la mujer de Moab
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el gentilicio en forma natural. «Moabita» reproduce el valor étnico del hebreo sin arcaísmo.
- source_word: גַּם כִּי
  english_pob_choice: He also said to me
  chosen_spanish: Él también me dijo
  alternatives_spanish:
  - Además me dijo
  - Incluso me dijo
  lexicon: HALOT
  rationale: La combinación añade o enfatiza la cita. «También» refleja bien el matiz aditivo sin forzar una paraphrasis.
- source_word: עִם הַנְּעָרִים
  english_pob_choice: by my young women
  chosen_spanish: cerca de mis muchachas
  alternatives_spanish:
  - junto a mis muchachas
  - con mis muchachas
  lexicon: HALOT
  rationale: El contexto inmediato y la revisión inglesa muestran que el referente inmediato es femenino. «Cerca de» expresa la idea de permanecer al lado, manteniendo el sentido relacional del preposición con el verbo siguiente.
- source_word: תִּדְבָּקִין
  english_pob_choice: You are to stay close
  chosen_spanish: Quédate cerca
  alternatives_spanish:
  - Pégate a
  - Permanece pegada a
  lexicon: HALOT
  rationale: דבק tiene la fuerza de adherirse o mantenerse junto a alguien. «Quédate cerca» es idiomático en español y preserva la cercanía continua sin sonar mecánico.
- source_word: עַד אִם כִּלּוּ
  english_pob_choice: until they have finished
  chosen_spanish: hasta que hayan terminado
  alternatives_spanish:
  - hasta que terminen
  - hasta que hayan concluido
  lexicon: HALOT
  rationale: Se expresa el límite temporal completivo del hebreo con una forma natural del subjuntivo perfecto en español.
- source_word: כָּל הַקָּצִיר אֲשֶׁר לִי
  english_pob_choice: all my harvest
  chosen_spanish: toda mi cosecha
  alternatives_spanish:
  - todo mi cosechado
  - toda mi siega
  lexicon: HALOT
  rationale: En español, «cosecha» comunica tanto la recolección como su resultado de manera clara. Se evita «siega» por sonar más técnico o rural sin ventaja evidente.
theological_decisions:
- issue: Referencia a las «muchachas» frente a la ambigüedad posible del término hebreo
  english_pob_reading: The English POB settled on 'young women' after revision, matching the source term and immediate context.
  chosen_spanish_reading: «Mis muchachas»
  alternative_spanish_readings:
  - mis jóvenes
  - mis muchachas
  rationale: La revisión inglesa indica que el contexto inmediato favorece un referente femenino. En español, «muchachas» reproduce bien ese sentido y mantiene la naturalidad narrativa.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «young men» a «young women» para ajustarse al término de origen y al contexto inmediato. La redacción española sigue esa decisión revisada y evita la lectura masculina.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin calcos innecesarios.
  - Se preserva la secuencia narrativa con «Entonces».
  - Se evita «SEÑOR» u otras sustituciones que no aparecen en este versículo.
  - La posesión en «mi cosecha» se conserva de forma directa y transparente.
