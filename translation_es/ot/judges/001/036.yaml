translation:
  language: es
  text: Y el límite de los amorreos estaba desde la subida de Acrabim[a], desde Sela[b] y hacia arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Acrabim» significa «escorpiones»; alternativamente, «la subida de los escorpiones».
    reason: lexical_alternative
  - marker: b
    text: O «desde la roca», si el hebreo se entiende como un sustantivo común y no como el nombre de lugar Sela.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ / וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Además
  lexicon: HALOT
  rationale: La conjunción simplemente enlaza esta nota geográfica con el contexto anterior; en español, 'Y' reproduce con naturalidad ese enlace sin añadir matiz temporal o explicativo.
- source_word: גְבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - linde
  lexicon: HALOT
  rationale: '''גְבוּל'' denota una línea o extensión límite en contexto geográfico. ''Límite'' suena natural en español y conserva la idea de demarcación territorial sin forzar un término más técnico.'
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo puede aparecer en singular morfológico, funciona colectivamente como etnónimo. En español, el plural 'los amorreos' comunica mejor el valor colectivo del texto territorial.
- source_word: מִמַּעֲלֵה עַקְרַבִּים
  english_pob_choice: from the Ascent of Akrabbim
  chosen_spanish: desde la Subida de Acrabim
  alternatives_spanish:
  - desde la subida de Escorpiones
  - desde Maalé-Acrabim
  lexicon: HALOT
  rationale: '''מַעֲלֵה'' es ''subida / ascenso / paso''; ''Acrabim'' se conserva transliterado porque forma parte de un topónimo. ''Subida de Acrabim'' preserva el nombre propio y la idea topográfica, mientras la alternativa literal se deja para nota.'
- source_word: מֵהַסֶּלַע
  english_pob_choice: from Sela
  chosen_spanish: desde Sela
  alternatives_spanish:
  - desde la roca
  lexicon: HALOT
  rationale: En este contexto geográfico, el término es probablemente un nombre de lugar; por eso se mantiene 'Sela' en el texto principal. La lectura común 'la roca' se conserva como alternativa porque la forma hebrea es transparente.
- source_word: וָמָעְלָה
  english_pob_choice: and upward
  chosen_spanish: y hacia arriba
  alternatives_spanish:
  - y arriba
  - y en ascenso
  lexicon: HALOT
  rationale: La expresión indica continuidad en dirección ascendente o más allá de ese punto. 'Y hacia arriba' es claro, idiomático y mantiene la orientación espacial del hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'ran from' por 'was from' para ajustarse más de cerca al hebreo. Por ello, el español evita un verbo dinámico de movimiento y usa la estructura estática 'estaba desde', conservando el valor locativo del original. También se respetó la decisión del audit trail de mantener los topónimos Akrabbim/Sela en el texto principal y reservar las alternativas literales para nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto solo cuando el hebreo o el griego remiten al nombre divino; este versículo no lo requiere.
  - Se mantiene 'límite' para גְבוּל por consistencia con una demarcación territorial concreta.
  - '''Los amorreos'' se usa como etnónimo colectivo en plural, coherente con el valor del hebreo y con español natural.'
  - '''Acrabim'' y ''Sela'' se conservan como nombres propios en el texto principal, siguiendo el tratamiento del POB inglés y la evidencia geográfica del contexto.'
