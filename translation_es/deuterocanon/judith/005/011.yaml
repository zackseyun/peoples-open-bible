- from: Y el rey de Egipto se levantó contra ellos[a], y los trató con astucia en el trabajo y en la fabricación de ladrillos; los humilló y los puso como esclavos.
  to: Y el rey de Egipto se levantó contra ellos, y los trató con astucia[a] en trabajo forzado y en la fabricación de ladrillos; los humilló y los convirtió en esclavos.
  rationale: Se reubica la nota al verbo correcto para reflejar la evidencia léxica de κατεσοφίσαντο. Se ajusta «trabajo» a «trabajo forzado» para expresar mejor πόνος en este contexto de opresión egipcia. Se cambia «los puso como esclavos» por «los convirtió en esclavos» para representar con mayor precisión εἰς δούλους y mantener la fuerza del término δοῦλος. No se requiere adjudicación adicional porque los cambios son menores, claros y directamente sustentados por la evidencia fuente y la guía del proyecto.
