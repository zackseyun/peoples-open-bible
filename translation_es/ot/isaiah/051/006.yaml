  rationale: 'Se corrige el texto principal para alinearlo con la decisión léxica y teológica auditada de la POB sobre צִדְקָתִי: lectura principal equivalente a «righteousness», con «justice» conservado en nota. También se mejora la naturalidad de מִתַּחַת en español con «la tierra abajo». Se mantienen las demás decisiones porque son fieles al hebreo y legibles en español eclesial moderno.'
