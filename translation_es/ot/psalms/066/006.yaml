translation:
  language: es
  text: Él convirtió el mar en tierra seca; pasaron por el río a pie[b]; allí nos regocijamos en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «allí regocijémonos en él». La forma hebrea puede entenderse como una exhortación más que como una afirmación retrospectiva.'
    reason: alternative_reading
  - marker: b
    text: El versículo probablemente evoca tanto el cruce del mar en el éxodo como el cruce del río Jordán al entrar en la tierra.
    reason: cross_reference
lexical_decisions:
- source_word: הָפַךְ
  english_pob_choice: turned
  chosen_spanish: convirtió
  alternatives_spanish:
  - volteó
  - cambió
  - transformó
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de voltear o cambiar la condición de algo. «Convirtió» comunica bien la acción divina sobre el mar y mantiene el sentido concreto sin sonar mecánico.
- source_word: יָם
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - el mar
  - el mar abierto
  lexicon: HALOT
  rationale: «Mar» es el equivalente normal y directo del sustantivo hebreo. Mantiene la referencia amplia del texto sin especificar más de lo que el hebreo dice.
- source_word: לְיַבָּשָׁה
  english_pob_choice: into dry land
  chosen_spanish: en tierra seca
  alternatives_spanish:
  - en tierra firme
  - en suelo seco
  - en terreno seco
  lexicon: HALOT
  rationale: La expresión hebrea indica el resultado de convertir algo en tierra seca. En español, «en tierra seca» conserva la imagen y la dirección del cambio con naturalidad.
- source_word: בַּנָּהָר
  english_pob_choice: through the river
  chosen_spanish: por el río
  alternatives_spanish:
  - en el río
  - a través del río
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente «en/por el río», y con el verbo de pasar la idea se expresa de manera natural en español como «por el río». Se evita forzar una interpretación más explícita de la que el hebreo requiere.
- source_word: יַעַבְרוּ
  english_pob_choice: they passed through
  chosen_spanish: pasaron
  alternatives_spanish:
  - cruzaron
  - atravesaron
  - pasaron a través
  lexicon: HALOT
  rationale: El verbo significa pasar, cruzar o atravesar. «Pasaron» es suficientemente abierto para sostener la imagen del cruce sin estrecharla indebidamente.
- source_word: בְרָגֶל
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - con los pies
  - a pie, caminando
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español para indicar que atravesaron sin medios de transporte y sobre terreno seco.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí mismo
  - entonces
  lexicon: HALOT
  rationale: 'Se conserva el adverbio locativo para mantener la apertura del hebreo: puede señalar el lugar del acto recordado o el marco narrativo de la memoria litúrgica.'
- source_word: נִשְׂמְחָה
  english_pob_choice: we rejoiced
  chosen_spanish: nos alegramos
  alternatives_spanish:
  - nos regocijamos
  - alegrémonos
  - nos alegraremos
  lexicon: HALOT
  rationale: La forma hebrea puede leerse como retrospectiva o exhortativa. «Nos alegramos» refleja bien la lectura retrospectiva adoptada en el POB inglés, sin borrar la tensión con la posible lectura exhortativa.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en esto
  - en ello
  lexicon: HALOT
  rationale: El sufijo masculino singular apunta de manera natural a Dios en el contexto de alabanza. «En él» preserva esa referencia personal sin imponer una glosa interpretativa.
theological_decisions:
- issue: 'Lectura final: retrospectiva o exhortativa'
  english_pob_reading: The final clause can be read as a retrospective statement, 'we rejoiced in him,' though the Hebrew form can also be understood as an exhortation.
  chosen_spanish_reading: «Nos alegramos en él» como declaración retrospectiva, manteniendo abierta la posibilidad exhortativa en la nota.
  alternative_spanish_readings:
  - allí alegrémonos en él
  - allí nos alegremos en él
  rationale: La línea del salmo recuerda actos salvadores de Dios en la historia; por eso la lectura retrospectiva encaja bien. Sin embargo, el hebreo permite una exhortación, y esa tensión se preserva en la nota para no cerrarla artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: 'Alusión histórica: mar y río'
  english_pob_reading: The verse likely recalls both the crossing of the sea in the exodus and the crossing of the Jordan River into the land.
  chosen_spanish_reading: Se conserva la posible alusión doble al éxodo y al cruce del Jordán sin explicitarla en el texto principal.
  alternative_spanish_readings:
  - una referencia explícita al mar Rojo y al Jordán
  - una sola alusión al éxodo
  rationale: El hebreo menciona mar y río de modo suficientemente general. El texto principal debe permanecer fiel a esa amplitud; la conexión histórica se indica como trasfondo interpretativo, no como expansión del verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa POB más reciente fue marcada como unchanged después de revisión; no se requieren ajustes adicionales de revisión. Se conserva la lectura retrospectiva principal con nota de la alternativa exhortativa, y se mantiene la alusión histórica amplia sin ampliarla indebidamente.
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en «él» para respetar el pronombre masculino singular del hebreo y el contexto de adoración.
  - Se eligió un estilo moderno y digno, evitando arcaísmos innecesarios como «se regocijó» o «pasaron por en medio» que endurecerían el español.
  - Se preservó la ambigüedad del final mediante nota, en lugar de resolverla solo como imperativo o solo como pasado.
