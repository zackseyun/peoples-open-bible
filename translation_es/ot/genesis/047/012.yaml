translation:
  language: es
  text: Y José proveyó a su padre, a sus hermanos y a toda la casa de su padre de alimento[a], según el número de sus niños pequeños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan». El término hebreo literalmente suele significar «pan», pero aquí probablemente se refiere de manera más amplia a provisiones o alimento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «según la boca de los pequeños», un modismo hebreo que significa según el número o las necesidades de los niños.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַלְכֵּל
  english_pob_choice: provided
  chosen_spanish: proveyó
  alternatives_spanish:
  - sustentó
  - suministró
  - mantuvo
  lexicon: HALOT
  rationale: El verbo כלכל en piel expresa sostener, mantener o proveer materialmente. En este contexto de hambre y abastecimiento, «proveyó» comunica bien la acción de suplir necesidades sin volverla demasiado técnica o arcaica.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimentos
  - comida
  lexicon: HALOT
  rationale: Aunque el sustantivo puede referirse literalmente a «pan», en español bíblico y en este contexto de raciones de sustento, «pan» conserva mejor la fuerza concreta del hebreo y evita suavizar demasiado la imagen. La nota explica que puede abarcar provisiones en sentido amplio.
- source_word: כָּל בֵּית אָבִיו
  english_pob_choice: all his father's household
  chosen_spanish: toda la casa de su padre
  alternatives_spanish:
  - toda la familia de su padre
  - todo el hogar de su padre
  lexicon: HALOT
  rationale: «Casa» refleja bien el hebreo בַּיִת como unidad doméstica o de parentesco. Se evita «hogar» porque puede sonar más moderno de lo necesario y «familia» pierde la imagen social del término hebreo.
- source_word: לְפִי
  english_pob_choice: according to the number of
  chosen_spanish: según el número de
  alternatives_spanish:
  - conforme al número de
  - proporcionalmente al número de
  - según las necesidades de
  lexicon: HALOT
  rationale: La locución idiomática לְפִי expresa medida o proporción. «Según el número de» mantiene el valor distributivo y suena natural en español, sin forzar el hebreo idiomático.
- source_word: הַטָּף
  english_pob_choice: their little ones
  chosen_spanish: sus niños pequeños
  alternatives_spanish:
  - sus pequeños
  - sus hijos pequeños
  - los niños pequeños
  lexicon: HALOT
  rationale: טַף designa a los pequeños del grupo familiar. «Niños pequeños» comunica claramente el referente en español actual y conserva la idea de dependencia doméstica; se añade «sus» para reflejar el posesivo implícito en el contexto.
- source_word: אָבִיו ... אֶחָיו
  english_pob_choice: his father, his brothers
  chosen_spanish: a su padre, a sus hermanos
  alternatives_spanish:
  - a su padre y a sus hermanos
  - a su padre y a sus hermanos varones
  lexicon: HALOT
  rationale: Se conserva la precisión de los términos de parentesco. «Hermanos» refleja adecuadamente el plural masculino del hebreo y es idiomático en español sin perder exactitud.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; la presente versión española sigue de cerca la lectura hebrea y conserva la misma decisión clave de traducir לֶחֶם de modo flexible en el marco del sustento familiar durante la hambruna.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda; este versículo no contiene el nombre divino.
  - Se conserva el paralelismo de parentesco sin introducir lenguaje interpretativo adicional.
  - «Pan» se usa con una nota que evita restringir indebidamente el alcance del hebreo sin perder la concreción del sustento.
  - La frase «según el número de» reproduce la función idiomática de לְפִי sin calco extraño en español.
