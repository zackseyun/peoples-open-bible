id: GEN.49.21
reference: Genesis 49:21
source:
  edition: WLC
  text: נַפְתָּלִ֖י אַיָּלָ֣ה שְׁלֻחָ֑ה הַ/נֹּתֵ֖ן אִמְרֵי שָֽׁפֶר־׃ס
translation:
  text: Naphtali is a doe let loose[b][a], giving beautiful words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a hind let loose'; the Hebrew image is of a female deer released to run freely.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood differently in ancient and modern interpretation, including readings such as 'who gives beautiful sayings' or, with a different sense proposed for the last words, 'who bears beautiful fawns.'
    reason: alternative_reading
lexical_decisions:
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated per translation philosophy for names.
- source_word: אַיָּלָה
  chosen: doe
  alternatives:
  - hind
  - female deer
  lexicon: HALOT
  rationale: The noun denotes a female deer. 'Doe' is concise, natural English and preserves the feminine imagery better than the archaic 'hind'.
- source_word: שְׁלֻחָה
  chosen: set free
  alternatives:
  - let loose
  - sent out
  - released
  lexicon: HALOT
  rationale: Passive participial/adjectival form from שלח. In this poetic blessing context, the sense is of an animal loosed to run freely. 'Set free' is idiomatic modern English and captures the image better than the more wooden 'sent out'.
- source_word: הַנֹּתֵן
  chosen: giving
  alternatives:
  - who gives
  - that gives
  - producing
  lexicon: HALOT
  rationale: Masculine singular participle with article, functioning predicatively in poetry. 'Giving' keeps the compact poetic flow in English. The masculine form may refer back to Naphtali rather than the feminine 'doe,' but English can preserve the line without forcing an explicit relative clause.
- source_word: אִמְרֵי
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: HALOT
  rationale: Construct plural from אמר, referring to spoken expressions. 'Words' is the most natural and sufficiently broad rendering in English.
- source_word: שָׁפֶר
  chosen: beautiful
  alternatives:
  - fair
  - pleasant
  - graceful
  lexicon: HALOT
  rationale: The noun/adjectival form conveys beauty or pleasantness. 'Beautiful' is clear modern English and fits the poetic blessing context.
