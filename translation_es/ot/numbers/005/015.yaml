    text: Or 'a remembrance offering'; the Hebrew phrase may also be rendered more literally as 'an offering of remembrance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bringing guilt to remembrance'; the Hebrew עָוֹן can denote iniquity, guilt, or the liability arising from wrongdoing.
    reason: lexical_alternative
