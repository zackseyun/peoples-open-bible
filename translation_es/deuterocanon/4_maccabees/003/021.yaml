review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: transición enfática (τότε δὴ), sujeto indefinido (τινες), sentido adversativo de πρὸς con ὁμόνοιαν, y la idea de aprovechar συμφοραῖς de múltiples maneras. Sin embargo, «habiendo promovido una rebelión» suaviza y desplaza ligeramente νεωτερίσαντες, que aquí apunta más a causar agitación/revuelta contra la concordia común que a simplemente promoverla. También «se sirvieron de calamidades» es fiel, pero «valiéndose de calamidades» fluye mejor en español formal y conserva mejor el matiz instrumental.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero suena algo calcado en «habiendo promovido una rebelión» y «se sirvieron de calamidades de muchas maneras». Una leve revisión mejora naturalidad sin perder formalidad: «habiendo suscitado una revuelta» y «valiéndose de calamidades de muchas maneras». Además, conviene corregir la nota a para que contraste con el texto revisado y evitar la incongruencia entre «promoviendo» y «habiendo promovido».'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «armonía común» es aceptable para ὁμόνοια, aunque «concordia común» sigue siendo una alternativa válida en nota. El manejo de νεωτερίσαντες debe preservar su fuerza político-social; «revuelta» o «rebelión» funcionan mejor que una noción débil de innovación.
  issues:
  - severity: medium
    issue: «habiendo promovido una rebelión» no refleja con suficiente precisión νεωτερίσαντες
    rationale: El participio tiene fuerza de agitación política o subversiva. «Promover» puede sonar indirecto o programático; «suscitar una revuelta» representa mejor la acción de provocar disturbio contra la concordia común.
  - severity: low
    issue: La nota a contiene una leve incongruencia verbal
    rationale: Dice que νεωτερίσαντες puede tener un sentido político más fuerte que «promoviendo una rebelión», mientras el texto usa «habiendo promovido». Conviene armonizar la redacción.
  - severity: low
    issue: «se sirvieron de calamidades de muchas maneras» es algo rígido
    rationale: Aunque fiel, suena menos natural en español que «valiéndose de calamidades de muchas maneras» o «se valieron de calamidades de muchas maneras», que mantienen el matiz instrumental de χράομαι.
  revised_spanish_text: Entonces, en verdad, algunos[a], habiendo suscitado una revuelta contra la armonía común, valiéndose de calamidades[b] de muchas maneras.
