translation:
  language: es
  text: Oigo una reprensión que me avergüenza, y el espíritu[a] de mi entendimiento me responde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el espíritu que surge de mi entendimiento me responde»; el hebreo puede enfatizar que la respuesta nace del propio entendimiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me hace responder»; el verbo puede entenderse como un impulso interior que provoca la respuesta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּסַר
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - disciplina
  - amonestación
  lexicon: HALOT
  rationale: מוסר puede expresar disciplina, corrección o reprensión. Aquí el contexto es una respuesta airada a palabras ajenas, por lo que «reprensión» comunica mejor la idea de una censura verbal recibida.
- source_word: כְּלִמָּתִי
  english_pob_choice: that shames me
  chosen_spanish: que me avergüenza
  alternatives_spanish:
  - de mi vergüenza
  - mi deshonra
  - que me humilla
  lexicon: HALOT
  rationale: El sustantivo con sufijo de primera persona expresa vergüenza o deshonra vinculada con la reprensión. En español, una relativa como «que me avergüenza» conserva el efecto sobre el hablante sin sonar forzada.
- source_word: אֶשְׁמָע
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - escucho
  - estoy oyendo
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto expresa una acción presente. «Oigo» es natural y directo en español, y preserva la recepción inmediata de la reprensión.
- source_word: רוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - un espíritu
  - el aliento
  - la mente
  lexicon: HALOT
  rationale: Aquí רוח funciona como impulso interior o disposición anímica. «El espíritu» conserva la imagen hebrea sin reducirla de antemano a «mente».
- source_word: מִבִּינָתִי
  english_pob_choice: of my understanding
  chosen_spanish: de mi entendimiento
  alternatives_spanish:
  - de mi discernimiento
  - de mi inteligencia
  - desde mi entendimiento
  lexicon: HALOT
  rationale: בינה remite a entendimiento o discernimiento. «Entendimiento» es la forma más fiel y amplia en español, y mantiene la relación interna entre ese entendimiento y el espíritu mencionado.
- source_word: יַעֲנֵנִי
  english_pob_choice: answers me
  chosen_spanish: me responde
  alternatives_spanish:
  - me contesta
  - me hace responder
  lexicon: HALOT
  rationale: ענה en qal significa responder/contestar. «Me responde» conserva la idea principal; la alternativa causal «me hace responder» queda implícita como posibilidad interpretativa, pero no se impone en el texto principal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la auditoría inglesa: mantiene la relación entre מוסר y כלמה como una reprensión humillante, y conserva la ambigüedad de רוח + מבינתי sin resolverla de modo excesivo. No se registran revisiones previas que exijan ajuste.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se prefiere «entendimiento» para בינה por consistencia con el sentido de discernimiento intelectual/ético en contexto sapiencial.
  - La formulación «me responde» respeta el paralelismo con el hebreo y deja abierta la posible lectura dinámica señalada en la nota.
