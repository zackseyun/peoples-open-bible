id: MRK.11.23
reference: Mark 11:23
source:
  edition: SBLGNT
  text: ⸀ἀμὴν λέγω ὑμῖν ὅτι ὃς ἂν εἴπῃ τῷ ὄρει τούτῳ· Ἄρθητι καὶ βλήθητι εἰς τὴν θάλασσαν, καὶ μὴ διακριθῇ ἐν τῇ καρδίᾳ αὐτοῦ ἀλλὰ ⸀πιστεύῃ ὅτι ⸂ὃ λαλεῖ γίνεται, ἔσται αὐτῷ⸃.
translation:
  text: Truly I tell you[a], whoever says to this mountain, ‘Be lifted up and be thrown into the sea,’ and does not doubt in his heart but believes that what he says is happening[b], it will be so for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not waver' or 'is not divided within himself'; the Greek verb can carry the sense of inward division as well as doubt.
    reason: lexical_alternative
  - marker: b
    text: Or 'that what he says happens' or 'comes to pass.' The Greek uses a present tense ('is happening'/'happens') before the future result clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In the Synoptics, ἀμὴν introducing a solemn saying is idiomatically rendered as an affirmation formula. 'Truly' preserves the force in natural English better than leaving it untranslated as 'Amen.' 'Truly, truly' is characteristic of John, not Mark.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is a natural modern-English rendering of the speech formula while preserving direct address and solemnity.'
- source_word: ὃς ἂν εἴπῃ
  chosen: whoever says
  alternatives:
  - whoever might say
  - if anyone says
  lexicon: BDAG
  rationale: The relative pronoun with ἄν and aorist subjunctive expresses an indefinite general condition. 'Whoever says' captures the generic force in idiomatic English.
- source_word: τῷ ὄρει τούτῳ
  chosen: to this mountain
  alternatives:
  - to this hill
  lexicon: BDAG
  rationale: ὄρος normally means 'mountain.' The demonstrative is retained to preserve the vivid immediacy of Jesus' example.
- source_word: Ἄρθητι
  chosen: Be lifted up
  alternatives:
  - Be taken up
  - Be removed
  lexicon: BDAG
  rationale: Aorist passive imperative of αἴρω. 'Be lifted up' reflects the passive form and the image of being raised from its place. 'Be removed' is possible but less concrete than the paired imagery with 'be thrown.'
- source_word: βλήθητι
  chosen: be thrown
  alternatives:
  - be cast
  lexicon: BDAG
  rationale: Aorist passive imperative of βάλλω. 'Be thrown' is clear modern English; 'be cast' is traditional but more archaic.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the lake
  lexicon: BDAG
  rationale: θάλασσα is 'sea.' The phrase is retained literally to preserve the hyperbolic image.
- source_word: μὴ διακριθῇ
  chosen: does not doubt
  alternatives:
  - does not waver
  - is not divided
  lexicon: BDAG
  rationale: In this context διακρίνω in the passive/subjunctive idiom refers to inward doubting or wavering. 'Does not doubt' is the clearest contextual rendering, while the nuance of inner division is noted by alternatives.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - within himself
  lexicon: BDAG
  rationale: A literal rendering preserves the biblical anthropology of καρδία as the inner center of thought and will. The masculine singular is retained as gender-accurate generic per project philosophy.
- source_word: πιστεύῃ
  chosen: believes
  alternatives:
  - has faith
  - trusts
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believes.' This aligns with the project's default handling of the pistis word-group as 'faith/believe' unless context strongly favors another nuance.
- source_word: ὅτι ὃ λαλεῖ γίνεται
  chosen: that what he says is happening
  alternatives:
  - that what he says happens
  - that what he says comes to pass
  lexicon: BDAG
  rationale: The present tense γίνεται is preserved with progressive force ('is happening') rather than flattened into a simple future. λαλέω is rendered 'says' for natural English in this context, since the distinction from λέγω is not semantically weighty here. 'Comes to pass' is possible but more idiomatic/traditional than necessary.
- source_word: ἔσται αὐτῷ
  chosen: it will be so for him
  alternatives:
  - it will happen for him
  - it will be his
  lexicon: BDAG
  rationale: This future clause expresses the result granted to the speaker. 'It will be so for him' preserves the somewhat open-ended Greek without over-specifying mechanism. 'It will happen for him' is possible but slightly more interpretive.
