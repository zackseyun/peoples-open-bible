review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo en la mayor parte del versículo: «alma mía», la agitación interior, la exhortación a esperar/poner la esperanza en Dios, «todavía lo alabaré» y el cierre «y mi Dios» están bien encaminados. Sin embargo, hay dos fallas de alineación en las notas: la nota [a] fue anclada a «te abates», pero su contenido trata de יְשׁוּעוֹת פָּנַי; y la nota [b] fue anclada a «lo alabaré», aunque su contenido también trata de «la salvación de mi rostro». Además, en español «la salvación de mi rostro» resulta excesivamente calcada y oscura; dado el historial auditado en inglés, la solución más fiel y legible en español es «la salvación de mi semblante», manteniendo la imagen sin caer en una expresión corporal demasiado extraña.'
  spanish_quality_summary: 'El español es generalmente digno y legible, pero hay problemas formales importantes: las notas no corresponden a las palabras marcadas en el texto, lo cual rompe la trazabilidad exigida. También «te abates» suena menos natural en autoexhortación que «estás abatida», y «la salvación de mi rostro» es comprensible solo con dificultad. «Semblante» comunica mejor la imagen del rostro decaído/restaurado en registro bíblico-literario. «Espera en Dios» es aceptable, aunque «Pon tu esperanza en Dios» también sería posible; no requiere cambio.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» está bien. No aparecen términos como Yahvé, Mesías o δοῦλος. La decisión clave es פָּנַי: «semblante» es una excepción contextual justificada por claridad poética en español, mejor que el más literal «rostro» en esta construcción.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas
    rationale: La nota [a] aparece en «te abates» pero comenta «las salvaciones de mi rostro»; la nota [b] aparece en «lo alabaré» pero también comenta la frase final. Esto incumple el requisito de que cada nota aparezca en la palabra o frase relevante.
  - severity: medium
    issue: «La salvación de mi rostro» suena demasiado calcada y poco idiomática en español
    rationale: Aunque refleja la literalidad hebrea, en español moderno-eclesial la expresión tiende a sonar opaca. «La salvación de mi semblante» preserva mejor la imagen poética y la inteligibilidad.
  - severity: low
    issue: «Te abates» es menos natural que una forma estativa en este contexto
    rationale: El hebreo describe el estado del alma abatida. «¿Por qué estás abatida, alma mía?» suena más natural y ampliamente reconocible en español bíblico sin perder fuerza.
  revised_spanish_text: ¿Por qué estás abatida, alma mía, y por qué te turbas dentro de mí? Espera en Dios, porque todavía lo alabaré, la salvación de mi semblante[a] y mi Dios.
  revised_footnotes:
