translation:
  language: es
  text: Y sucedió que al día siguiente Moisés entró en la tienda del testimonio[a], y he aquí que la vara de Aarón, para la casa de Leví[b], había brotado, había echado botones, había producido flores y había producido almendras maduras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tienda del testigo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «para la casa de Leví», es decir, representando a la tribu o clan de Leví.'
    reason: cultural_note
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - a la mañana siguiente
  lexicon: HALOT
  rationale: Expresa con naturalidad la secuencia temporal inmediata sin perder el valor narrativo del hebreo.
- source_word: אֹהֶל הָעֵדוּת
  english_pob_choice: the tent of the testimony
  chosen_spanish: la tienda del testimonio
  alternatives_spanish:
  - la tienda del testimonio
  - la tienda del testimonio/eld testimonio
  lexicon: HALOT
  rationale: «Tienda» refleja bien אֹהֶל en español contemporáneo y mantiene el nombre del santuario; «testimonio» preserva עֵדוּת y su matiz legal/covenantal.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y miró
  lexicon: HALOT
  rationale: Conserva la fuerza de sorpresa y deíctica del narrador sin sonar forzado en español bíblico moderno.
- source_word: פָּרַח
  english_pob_choice: had budded
  chosen_spanish: había brotado
  alternatives_spanish:
  - había retoñado
  - había echado brotes
  lexicon: HALOT
  rationale: En la secuencia de crecimiento, «brotado» funciona como etapa inicial clara; evita limitar indebidamente la imagen solo a «floración».
- source_word: מַטֵּה
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cetro
  lexicon: HALOT
  rationale: «Vara» es el equivalente más natural en español bíblico para el objeto ritual y de autoridad en este contexto.
- source_word: לְבֵית לֵוִי
  english_pob_choice: for the house of Levi
  chosen_spanish: para la casa de Leví
  alternatives_spanish:
  - para la tribu de Leví
  - perteneciente a la casa de Leví
  lexicon: HALOT
  rationale: Mantiene la formulación hebrea y la referencia representativa al clan/linaje de Leví, como en el inglés auditado.
- source_word: וַיֹּצֵא פֶרַח
  english_pob_choice: it brought forth blossoms
  chosen_spanish: y dado flores
  alternatives_spanish:
  - y echado flores
  - y producido flores
  lexicon: HALOT
  rationale: La forma coordinada en español sigue la progresión del texto; «dado flores» expresa la etapa de aparición floral junto con el brote inicial.
- source_word: וַיָּצֵץ צִיץ
  english_pob_choice: it produced flowers
  chosen_spanish: y produjo flores
  alternatives_spanish:
  - y echó flores
  - y floreció
  lexicon: HALOT
  rationale: Mantiene la repetición intensificadora del hebreo y distingue, aunque de forma cercana, las dos etapas de floración.
- source_word: וַיִּגְמֹל שְׁקֵדִים
  english_pob_choice: ripened almonds
  chosen_spanish: maduró almendras
  alternatives_spanish:
  - produjo almendras maduras
  - dio almendras maduras
  lexicon: HALOT
  rationale: «Maduró» intenta conservar el valor de culminación del verbo, no solo la producción del fruto; «almendras» traduce el objeto final del milagro.
theological_decisions:
- issue: 'Designación del santuario: ''testimonio'' frente a ''witness'''
  english_pob_reading: the tent of the testimony
  chosen_spanish_reading: la tienda del testimonio
  alternative_spanish_readings:
  - la tienda del testimonio (con nota aludiendo a 'testigo')
  - la tienda del testimonio/eld testimonio
  rationale: Se conserva la designación tradicionalmente legal/covenantal de עֵדוּת, que en este contexto nombra el santuario central y no una simple idea abstracta de 'testigo'.
  doctrine_reference: Éxodo 25–40; Números 1:50
translation_notes:
  revision_awareness: 'Tomé como base la lectura inglesa auditada con sus decisiones léxicas y la revisión que unificó las cláusulas coordinadas. En español, ajusté la sintaxis para mantener la progresión narrativa y la triple secuencia de crecimiento del hebreo: brotar, florecer y madurar almendras.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo donde el texto no lo requería; aquí no aparece el nombre divino.
  - Preferí «vara» por ser el término bíblico español más natural para מַטֵּה en este contexto ritual.
  - Mantuve la repetición verbal para no suavizar la intensificación del milagro.
  - Conservo «casa de Leví» como eco del hebreo, con nota explicativa para lectores que prefieran el referente tribal.
