review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: negación de expulsar, referencia colectiva a los cananeos de Gezer, continuidad ''hasta el día de hoy'' y resultado de trabajo compulsorio. Sin embargo, la última frase no refleja con fidelidad óptima לְמַס עֹבֵד, porque «como esclavos de trabajo» no es una expresión natural ni precisa para corvée/trabajo forzoso, y además puede introducir la idea específica de esclavitud como estatus jurídico, que no es exactamente lo que documenta el audit trail inglés.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «han quedado como esclavos de trabajo» suena poco idiomático y algo torpe. «Han sido sometidos a trabajo forzoso» o «han llegado a ser trabajadores forzados» expresa mejor el sentido y la fluidez. También conviene evitar una triple coordinación pesada con dos 'y' seguidas donde puede mantenerse la coordinación hebrea de forma natural.
  glossary_alignment: 'No hay conflictos con términos teológicos mayores del glosario. «los cananeos», «Efraín» y la fórmula temporal están bien. La principal desalineación está en לְמַס עֹבֵד: el proyecto pide preservar la fuerza de trabajo forzoso, no meramente tributo, pero sin crear una formulación española antinatural ni cambiar la categoría semántica a ''esclavos'' cuando el inglés auditado prefirió ''forced laborers''.'
  issues:
  - severity: high
    issue: «como esclavos de trabajo» no traduce bien לְמַס עֹבֵד
    rationale: La expresión hebrea se refiere a servicio laboral obligatorio/corvée. «Esclavos de trabajo» no es español natural y puede sobreespecificar 'esclavitud' en vez de 'trabajo forzoso'.
  - severity: medium
    issue: La formulación final pierde la naturalidad del español bíblico contemporáneo
    rationale: Aunque la idea general se entiende, la frase final suena forzada. Una redacción como «han sido sometidos a trabajo forzoso» preserva mejor significado y legibilidad.
