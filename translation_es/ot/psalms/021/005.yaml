  to: 'Pidió vida de ti[a]; tú se la diste: largos días[b], por siempre y para siempre.'
  rationale: Se ajusta el español para mayor naturalidad y legibilidad sin perder el contenido del hebreo ni la decisión teológica del POB. «Largos días» conserva la imagen poética de אֹרֶךְ יָמִים mejor que el calco duro «largura de días». «Por siempre y para siempre» mantiene la intensificación de עוֹלָם וָעֶד de forma más idiomática. También se reubica la nota teológica al segmento que realmente comenta.
