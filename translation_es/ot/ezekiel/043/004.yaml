    issue: «por el camino de la puerta» es una formulación poco natural
    rationale: Aunque דֶּרֶךְ literalmente puede ser «camino/vía», en esta construcción con «puerta» el español más fiel y legible es «por la puerta» o «a través de la puerta». La forma actual suena calcada y entorpece la lectura.
  - severity: low
    issue: La nota b no refleja con precisión la alternativa del audit trail inglés
    rationale: El inglés ofrece una alternativa equivalente a «a través de la puerta que da al este». La nota española actual repite casi el texto principal y pierde el contraste útil.
  revised_spanish_text: Y la gloria de Yahvé[a] entró en la casa por la puerta que mira al oriente[b].
