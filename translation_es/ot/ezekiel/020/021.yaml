  language: en
  yaml_path: translation/ot/ezekiel/020/021.yaml
  text: But the children rebelled against me[a]. They did not walk in my statutes, and they did not keep my judgments to do them—the judgments that, if a man does them, he will live by them. They profaned my Sabbaths. So I said I would pour out my wrath on them[b], to exhaust my anger against them in the wilderness.
  footnotes:
  - marker: a
    text: Or 'if a person does them, he will live by them.' Hebrew 'the man' is a generic singular for a human being.
    reason: lexical_alternative
  - marker: b
    text: This clause echoes Leviticus 18:5.
    reason: cross_reference
