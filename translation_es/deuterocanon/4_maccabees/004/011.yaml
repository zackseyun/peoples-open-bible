translation:
  language: es
  text: Así, Apolonio, después de caer medio muerto sobre el patio sin vida[a] del santuario, extendió sus manos al cielo y, con lágrimas, rogó a los hebreos que oraran por él[b], para que pudieran aplacar al ejército celestial[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recinto del santuario». El término griego alude a un espacio sagrado cerrado o delimitado.
    reason: lexical_alternative
  - marker: b
    text: O «que oraran acerca de él». Literalmente, «orar acerca de él» o «respecto de él»; aquí se toma el sentido intercesorio.
    reason: lexical_alternative
  - marker: c
    text: O «la hueste celestial» o «el ejército del cielo». El griego deja abierto el referente exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: καταπεσὼν
  english_pob_choice: having fallen
  chosen_spanish: después de caer
  alternatives_spanish:
  - habiendo caído
  - tras caer
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa respecto del verbo principal; en español, «después de caer» mantiene la secuencia natural sin sobrecargar la sintaxis.
- source_word: ἡμιθανὴς
  english_pob_choice: half-dead
  chosen_spanish: medio muerto
  alternatives_spanish:
  - casi muerto
  - al borde de la muerte
  lexicon: LSJ
  rationale: La idea es de extrema cercanía a la muerte. «Medio muerto» conserva la fuerza vívida del compuesto griego y es idiomático en español.
- source_word: ἄψυχον
  english_pob_choice: lifeless
  chosen_spanish: sin vida
  alternatives_spanish:
  - inanimado
  - muerto
  lexicon: LSJ
  rationale: Aquí califica el recinto pétreo del templo; «sin vida» comunica ausencia de vida de manera natural y evita atribuirle muerte literal.
- source_word: τοῦ ἱεροῦ περίβολον
  english_pob_choice: the lifeless court of the sanctuary
  chosen_spanish: el patio ... del santuario
  alternatives_spanish:
  - el atrio del santuario
  - el recinto del santuario
  lexicon: LSJ
  rationale: περίβολος denota un espacio cerrado o rodeado; en contexto sagrado, «patio» funciona bien en español y mantiene la imagen de un área delimitada. «Santuario» conserva el referente cultual amplio del griego.
- source_word: τὰς χεῖρας ἐκτείνων εἰς τὸν οὐρανόν
  english_pob_choice: stretched out his hands to heaven
  chosen_spanish: extendiendo las manos hacia el cielo
  alternatives_spanish:
  - alzando las manos al cielo
  - extendió las manos al cielo
  lexicon: LSJ
  rationale: La postura es una señal convencional de súplica. «Hacia el cielo» reproduce el movimiento ascendente con español claro y culto.
- source_word: παρεκάλει
  english_pob_choice: begged
  chosen_spanish: rogaba
  alternatives_spanish:
  - suplicaba
  - imploraba
  lexicon: BDAG
  rationale: En el contexto de una petición desesperada, «rogaba» transmite bien la intensidad afectiva sin sonar excesivamente enfático.
- source_word: ὅπως περὶ αὐτοῦ εὐξόμενοι
  english_pob_choice: to pray for him
  chosen_spanish: que oraran por él
  alternatives_spanish:
  - que orasen por él
  - que hicieran oración por él
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «orar acerca de él», el sentido es intercesorio; «orar por él» conserva el valor pragmático reconocido en la auditoría inglesa.
- source_word: ἐξευμενίσωνται
  english_pob_choice: they might appease
  chosen_spanish: pudieran aplacar
  alternatives_spanish:
  - pudieran apaciguar
  - lograran aplacar
  lexicon: LSJ
  rationale: El verbo significa hacer favorable o apaciguar. «Aplacar» es una equivalencia natural en español que mantiene la idea de tornar favorable sin tecnicismo innecesario.
- source_word: τὸν ἐπουράνιον ... στρατόν
  english_pob_choice: the heavenly host
  chosen_spanish: el ejército celestial
  alternatives_spanish:
  - la hueste celestial
  - el ejército del cielo
  lexicon: LSJ
  rationale: στρατός puede significar ejército o hueste. Aquí se preserva la amplitud del referente celestial con una expresión natural en español, sin decidir si alude a ángeles, poder celestial o una circunlocución reverente.
theological_decisions:
- issue: Referente de τὸν ἐπουράνιον ... στρατόν
  english_pob_reading: A collective heavenly power or host is left as stated, without specifying angels or God directly.
  chosen_spanish_reading: Se mantiene «ejército celestial» sin precisar si se trata de ángeles, de una hueste celeste o de una designación reverente más amplia.
  alternative_spanish_readings:
  - la hueste celestial
  - el ejército de los cielos
  - los ángeles
  rationale: El griego no identifica el referente con mayor precisión. La versión española conserva esa amplitud para no resolver artificialmente una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La auditoría inglesa revisó περίβολος desde «enclosure» a «court» por naturalidad. En español se opta por «patio» para conservar la idea de espacio sagrado delimitado con lectura fluida. También se preserva la ambigüedad del referente celestial sin concretarlo más allá de lo que permite el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se conserva «santuario» para ἱερόν, evitando términos eclesiásticos ajenos al contexto judío del pasaje.
  - «Hebreos» traduce τοὺς Ἑβραίους de forma directa y consistente con el audit trail inglés.
  - Se usa «orar» en sentido intercesorio, porque el contexto de petición a terceros lo exige.
  - «Ejército celestial» mantiene la amplitud semántica de στρατός sin fijar indebidamente una lectura doctrinal.
