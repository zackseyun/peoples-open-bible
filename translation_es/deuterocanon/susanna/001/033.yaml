translation:
  language: es
  text: Y lloraban todos los que estaban con ella[a], y todos los que la conocían lloraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que estaban a su lado»; la expresión griega puede referirse en general a quienes estaban en su compañía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαιον
  english_pob_choice: were weeping
  chosen_spanish: lloraban
  alternatives_spanish:
  - estaban llorando
  - estaban lamentándose
  - lloraban en llanto
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o en curso; en español, el imperfecto «lloraban» conserva bien ese matiz durativo sin sonar forzado. No añado un aspecto progresivo explícito porque el verbo simple ya comunica la escena de duelo continuo.
- source_word: οἱ παρ᾽ αὐτῆς πάντες
  english_pob_choice: all those with her
  chosen_spanish: todos los que estaban con ella
  alternatives_spanish:
  - todos los que estaban a su alrededor
  - todos los de su entorno
  - todos sus acompañantes
  lexicon: LSJ
  rationale: La frase griega es idiomática y puede abarcar a quienes estaban en su compañía. «Los que estaban con ella» mantiene la amplitud sin especificar de más ‘sirvientes’ o ‘miembros del hogar’, que no están explícitos en el griego.
- source_word: ὅσοι αὐτὴν ᾔδεισαν πάντες
  english_pob_choice: all who knew her
  chosen_spanish: todos los que la conocían
  alternatives_spanish:
  - todos los que la habían conocido
  - todos los que estaban familiarizados con ella
  - todos sus conocidos
  lexicon: BDAG
  rationale: El verbo indica conocimiento personal o familiaridad; «la conocían» es la forma más natural y fiel en español. «La habían conocido» añade un matiz temporal no necesario aquí.
- source_word: πάντες ... πάντες
  english_pob_choice: all ... all
  chosen_spanish: todos ... todos
  alternatives_spanish:
  - todos ... cada uno
  - todos ... todos ellos
  lexicon: LSJ
  rationale: La repetición enfática de πάντες se preserva con «todos ... todos» para reflejar la amplitud del lamento colectivo en ambas cláusulas.
translation_notes:
  revision_awareness: El texto griego base presenta un imperfecto narrativo con repetición enfática de πάντες en ambas cláusulas. La versión española conserva ese aspecto durativo con «lloraban» y mantiene la duplicación de «todos» sin explicitar cargos o relaciones no presentes en el original. La nota al pie preserva la alternativa lexical registrada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «ella» para αὐτῆς/αὐτήν de forma consistente dentro del versículo.
  - No se introduce vocabulario eclesiástico o tradicional ajeno al griego; se prefiere una formulación directa y transparente.
  - La nota a pie de página se ancla en «con ella» porque allí reside la alternativa semántica documentada por el inglés POB.
