translation:
  language: es
  text: El segundo día, Natanael hijo de Zuar, el líder de Isacar, presentó.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo simplemente dice «presentó»; «su ofrenda» se entiende por el contexto repetido de Números 7, donde cada jefe de tribu presenta una ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: On the second day
  chosen_spanish: Al segundo día
  alternatives_spanish:
  - En el segundo día
  - El segundo día
  lexicon: HALOT
  rationale: La expresión hebrea es temporal; en español, «al segundo día» suena natural y conserva el valor narrativo secuencial sin añadir información que el verso no expresa.
- source_word: הִקְרִיב
  english_pob_choice: presented
  chosen_spanish: presentó
  alternatives_spanish:
  - ofreció
  - se presentó
  - presentó su ofrenda
  lexicon: HALOT
  rationale: En este versículo el verbo aparece sin objeto explícito; por eso se mantiene el simple «presentó», evitando suplir «su ofrenda» dentro del texto principal. La idea cultual queda preservada por el contexto repetido de Números 7.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Natanael
  alternatives_spanish:
  - Netanel
  - Natanel
  lexicon: Convención bíblica española
  rationale: Se usa la transliteración española habitual del nombre propio, con forma inteligible para lectores bíblicos en español.
- source_word: בֶּן צוּעָר
  english_pob_choice: son of Zuar
  chosen_spanish: hijo de Zur
  alternatives_spanish:
  - hijo de Zuar
  - hijo de Tsuar
  lexicon: Convención genealógica bíblica
  rationale: Se conserva la fórmula genealógica estándar «hijo de». El nombre propio se adapta a una forma española natural y reconocible, sin alterar la referencia al padre.
- source_word: נְשִׂיא
  english_pob_choice: the leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En contexto tribal, נָשִׂיא designa a una autoridad o jefe reconocido. «Líder» comunica bien el cargo sin la posible ambigüedad de «príncipe» en español moderno.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  - Isascar
  lexicon: Convención bíblica española
  rationale: Se emplea la forma castellana usual del nombre de la tribu, clara y establecida en español.
theological_decisions:
- issue: Verbo cultual sin objeto explícito
  english_pob_reading: presented
  chosen_spanish_reading: presentó
  alternative_spanish_readings:
  - presentó su ofrenda
  - ofreció
  rationale: El hebreo de este verso no menciona el objeto; la lectura en español debe respetar esa omisión. La referencia cultual se entiende por la fórmula repetida del capítulo, pero no se debe introducir en el texto principal algo que aquí no está escrito.
  doctrine_reference: 'Números 7: contexto de las ofrendas de dedicación'
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB eliminó «his offering» por no estar en el texto de este versículo. La versión española sigue esa decisión y conserva solo el verbo simple «presentó», dejando la ofrenda implícita por el contexto inmediato del capítulo.
  spanish_consistency_notes:
  - 'Se mantiene la terminología bíblica consistente: nombres propios transliterados en forma española estándar, tribus con mayúscula inicial y cargo tribal como «líder».'
  - No se añadió en el cuerpo principal ningún complemento cultual que el hebreo de este versículo no exprese explícitamente.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder el tono formulario del pasaje.
