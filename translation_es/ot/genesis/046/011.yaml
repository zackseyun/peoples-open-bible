translation:
  language: es
  text: 'Y los hijos de Leví: Gersón, Coat y Merari.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: Conservo la conjunción inicial para la continuidad genealógica y traduzco בְנֵי como «hijos» en el giro genealógico estándar del hebreo. «Hijos» preserva mejor la forma masculina y la relación de descendencia que una versión más genérica.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Es un nombre propio; en español bíblico es natural «Leví», con acento gráfico para reflejar la pronunciación española habitual.
- source_word: גֵּרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersón
  - Gershom
  lexicon: HALOT
  rationale: El hebreo aquí es גֵּרְשׁוֹן; en español se adapta como «Gersón» para una lectura natural y reconocible. «Gershom» no corresponde a la forma de este versículo.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Qehat
  lexicon: HALOT
  rationale: Sigo la convención española bíblica tradicional «Coat», que representa este nombre propio de modo estable y legible en español. La forma más fonética «Kohat» es posible, pero menos asentada.
- source_word: וּ/מְרָרִי
  english_pob_choice: and Merari
  chosen_spanish: y Merari
  alternatives_spanish:
  - y Merari
  lexicon: HALOT
  rationale: Mantengo el último nombre propio con la conjunción coordinante simple «y», equivalente directa del prefijo hebreo.
