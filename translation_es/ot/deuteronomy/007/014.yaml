revisions:
- from: Serás bendecido[a] sobre[b] todos los pueblos; no habrá en ti un estéril varón o mujer[c], ni entre tu ganado.
  to: Serás bendito más que todos los pueblos[a]; no habrá entre los tuyos ningún varón ni mujer estériles[b], ni entre tu ganado.
  rationale: Se revisa el comparativo a «más que todos los pueblos» para reflejar mejor מן en español natural. Se reemplaza «no habrá en ti» por «no habrá entre los tuyos» para evitar una construcción extraña, manteniendo a la vez la referencia corporativa al pueblo. Se corrige «un estéril varón o mujer» por «ningún varón ni mujer estériles» para expresar con claridad y corrección la explicitud masculina/femenina del hebreo. Se conserva «ganado» por su buena adecuación a בְּהֵמָה.
