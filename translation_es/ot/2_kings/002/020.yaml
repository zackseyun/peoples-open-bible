translation:
  language: es
  text: 'Y dijo[a]: «Tráiganme una vasija nueva, y pongan sal en ella». Y se la trajeron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jarra» o «frasco» para el recipiente mencionado aquí; el hebreo se refiere de manera general a un recipiente pequeño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso de Eliseo; en español conviene conservar la secuencia con una conjunción simple sin recargar el estilo.
- source_word: קְחוּ לִי
  english_pob_choice: Bring me
  chosen_spanish: Traedme
  alternatives_spanish:
  - Tomad para mí
  - Conseguidme
  lexicon: HALOT
  rationale: לקח aquí funciona como petición imperativa con לִי; en español, el valor idiomático natural es ‘traedme’, que comunica la solicitud de entrega del objeto.
- source_word: צְלֹחִית
  english_pob_choice: bowl
  chosen_spanish: vasija
  alternatives_spanish:
  - tazón
  - cuenco
  - jarra
  lexicon: HALOT
  rationale: El hebreo designa un recipiente pequeño de forma no especificada con precisión. ‘Vasija’ preserva la amplitud semántica mejor que un término más estrecho como ‘cuenco’ o ‘jarra’.
- source_word: חֲדָשָׁה
  english_pob_choice: new
  chosen_spanish: nueva
  alternatives_spanish:
  - recién hecha
  - nueva de nuevo
  lexicon: HALOT
  rationale: Adjetivo directo que modifica al recipiente; se mantiene sin matiz adicional.
- source_word: וְשִׂימוּ שָׁם מֶלַח
  english_pob_choice: and put salt in it
  chosen_spanish: y poned allí sal
  alternatives_spanish:
  - y poned sal en ella
  - y echad allí sal
  lexicon: HALOT
  rationale: שׂים significa ‘poner’. שָׁם literalmente es ‘allí’; en español ‘allí’ conserva la referencia al recipiente recién mencionado sin forzar una preposición más interpretativa.
- source_word: וַיִּקְחוּ אֵלָיו
  english_pob_choice: So they brought it to him
  chosen_spanish: Y se la trajeron
  alternatives_spanish:
  - Y la llevaron a él
  - Y la llevaron hasta él
  lexicon: HALOT
  rationale: El verbo לקח en contexto expresa la acción de llevar el recipiente hasta Eliseo. ‘Se la trajeron’ reproduce el sentido de entrega y permite referir el recipiente femenino implícito en ‘vasija’.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el antecedente inglés y no requiere revisión sustantiva. Se mantiene la misma estructura narrativa breve, con ajuste natural al español para el imperativo plural y la referencia pronominal del recipiente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ o ‘Cristo’ por no corresponder al contenido del versículo.
  - ‘Vasija’ conserva la amplitud del término hebreo sin imponer una forma específica.
  - ‘Traedme’ refleja adecuadamente el imperativo plural dirigido a varios participantes.
