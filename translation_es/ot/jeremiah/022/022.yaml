  source_alignment_summary: 'El borrador preserva bien los elementos clave del hebreo: mantiene la metáfora de ‘pastores’ y ‘amantes’, conserva el cautiverio, y refleja la pareja de vergüenza/humillación. Sin embargo, ‘serán apacentados por el viento’ introduce una voz pasiva no explícita y suena menos fiel al giro verbal irónico que el hebreo expresa activamente (‘el viento pastoreará’/‘el viento los pastoreará’). Además, ‘te humillarás’ sugiere que Judá se humilla a sí misma, cuando נכלם aquí expresa quedar humillada/avergonzada.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero ‘serán apacentados por el viento’ resulta forzado en español y algo opaco. ‘Y te humillarás’ es natural gramaticalmente, pero semánticamente desvía el sentido hacia una acción reflexiva voluntaria. Una leve revisión mejora tanto la fidelidad como la legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Pastores’ y ‘amantes’ concuerdan con la decisión teológica y lexical documentada. ‘Cautiverio’ y ‘maldad’ también son adecuados. La principal corrección necesaria es de sintaxis verbal y matiz semántico, no de glosario.
  issues:
  - severity: medium
    issue: ‘Serán apacentados por el viento’ cambia innecesariamente la construcción activa del hebreo.
    rationale: תִּרְעֶה רוּחַ es literalmente ‘el viento pastoreará’. Aunque la pasiva intenta sonar más idiomática, diluye el juego de palabras directo entre ‘pastores’ y el verbo repetido.
  - severity: medium
    issue: ‘Te humillarás’ comunica auto-humillación en lugar de humillación sufrida.
    rationale: וְנִכְלַמְתְּ en contexto se refiere a quedar avergonzada/humillada, no a humillarse a sí misma. ‘Quedarás humillada’ o ‘serás humillada’ preserva mejor el sentido.
  - severity: low
