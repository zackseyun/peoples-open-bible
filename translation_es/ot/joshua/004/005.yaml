translation:
  language: es
  text: 'Y Josué les dijo[a]: «Crucen delante del arca de Yahvé su Dios hasta el medio del Jordán, y que cada hombre levante una piedra sobre su hombro, conforme al número de las tribus de los hijos de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel». Esta es la expresión formal del pacto; muchas versiones la simplifican como «los israelitas» o «el pueblo de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Joshua said
  chosen_spanish: Y Josué les dijo
  alternatives_spanish:
  - Entonces Josué les dijo
  lexicon: HALOT
  rationale: La forma waw consecutiva narra avance secuencial; en español, «Y» conserva ese flujo narrativo sin sobrecargar el verso. «Les dijo» refleja el dativo plural del hebreo.
- source_word: עִבְרוּ
  english_pob_choice: Cross over
  chosen_spanish: Pasen
  alternatives_spanish:
  - Crucen
  - Atravesen
  lexicon: HALOT
  rationale: En este contexto del cruce del Jordán, el verbo apunta al paso de una frontera/curso de agua. «Pasen» es natural en español y mantiene la idea de atravesar sin forzar un calco.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Con el arca en una escena espacial concreta, «delante de» comunica bien la posición física. «Ante» sería posible, pero «delante de» suena más claro en español actual.
- source_word: אֲרוֹן יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: the ark of Yahweh your God
  chosen_spanish: el arca de Yahvé su Dios
  alternatives_spanish:
  - el arca de Yahvé, su Dios
  - el arca de Yahvé, el Dios de ustedes
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la terminología POB. «Su Dios» refleja el sufijo de 2.ª plural y evita introducir una formulación más explicativa que el hebreo no exige.
- source_word: אֶל תּוֹךְ הַיַּרְדֵּן
  english_pob_choice: into the middle of the Jordan
  chosen_spanish: hasta en medio del Jordán
  alternatives_spanish:
  - al medio del Jordán
  - en medio del Jordán
  lexicon: HALOT
  rationale: «תּוֹךְ» expresa interioridad/medio, no solo entrada. «Hasta en medio de» preserva el sentido direccional del mandato y sugiere el avance hasta el centro del río.
- source_word: וְהָרִימוּ
  english_pob_choice: and let each man lift up
  chosen_spanish: y levante
  alternatives_spanish:
  - y alce
  - y cargue
  lexicon: HALOT
  rationale: El hiphil de רום aquí implica levantar/tomar en alto una piedra. «Levante» funciona como imperativo distributivo en español y mantiene la acción concreta.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino distributivo; dado el contexto de representantes tribales, «cada hombre» preserva el rasgo masculino sin suavizarlo con un neutro.
- source_word: אֶבֶן אַחַת
  english_pob_choice: one stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una sola piedra
  - una piedra única
  lexicon: HALOT
  rationale: La combinación numeral-sustantivo se expresa de forma directa como «una piedra». El numeral no necesita enfatizarse más en español.
- source_word: עַל שִׁכְמוֹ
  english_pob_choice: on his shoulder
  chosen_spanish: sobre su hombro
  alternatives_spanish:
  - en su hombro
  - a su hombro
  lexicon: HALOT
  rationale: La preposición עַל se ajusta bien a «sobre». El posesivo singular concuerda con el distributivo «cada hombre» y conserva la imagen física.
- source_word: לְמִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: conforme al número de
  alternatives_spanish:
  - según el número de
  - de acuerdo con el número de
  lexicon: HALOT
  rationale: La expresión marca correspondencia entre las piedras y el total tribal. «Conforme al número de» es formal y fiel al valor relacional del hebreo.
- source_word: שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of the sons of Israel
  chosen_spanish: las tribus de los hijos de Israel
  alternatives_spanish:
  - las tribus de los hijos de Israel
  - las tribus de Israel
  - las tribus de los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal de pacto «hijos de Israel», que el audit trail retiene por su valor lexical y teológico. En español, «hijos de Israel» es natural y mantiene la estructura del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragramatón directamente. Conforme a la terminología proyectual, se translitera como «Yahvé» para no ocultar el nombre propio divino detrás de un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Expresión de filiación corporativa en בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La POB inglesa preserva la formulación formal del hebreo. En español, «los hijos de Israel» mantiene la tensión entre designación histórica/covenantal y fluidez idiomática.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail inglés indica high_agreement, verdict agree, con revisión final sin cambios necesarios; la redacción española sigue esa línea y no introduce variantes no sustentadas por el hebreo ni por la decisión inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar proyectual.
  - Se conserva «hijos de Israel» por su valor formal y de pacto, alineado con la nota inglesa.
  - Se traduce el mandato con imperativo plural seguido de distributivo singular («cada hombre»), preservando la sintaxis del hebreo.
  - «Arca» y «Jordán» se mantienen como nombres/terminología bíblica estándar en español.
