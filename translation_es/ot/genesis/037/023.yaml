review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: llegada de José, acción violenta de los hermanos y especificación de la túnica concreta que llevaba. «Túnica» y «a sus hermanos» son fieles. La nota léxica también conserva adecuadamente la incertidumbre de כְּתֹנֶת הַפַּסִּים y la preferencia documentada. Sin embargo, «lo despojaron de su túnica» en español puede sonar más abstracto o formulista que el hebreo concreto «lo desvistieron/le quitaron», y «Y sucedió que, cuando» resulta más pesado de lo necesario frente al valor temporal simple de וַיְהִי כַּאֲשֶׁר.'
  spanish_quality_summary: 'El español es claro y digno, pero hay una mejora de fluidez importante: «Y cuando José llegó...» suena más natural que «Y sucedió que, cuando José llegó...», sin pérdida de sentido. Además, «le quitaron» expresa con mayor naturalidad española la acción sobre la prenda específica ya mencionada. El resto del versículo es legible y apropiado para un registro bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «José», «hermanos» y «túnica» están bien alineados. La conservación de «la túnica de muchos colores» sigue la revisión auditada del inglés, y la nota preserva correctamente las alternativas léxicas.
  issues:
  - severity: medium
    issue: 'Fórmula inicial demasiado pesada: «Y sucedió que, cuando»'
    rationale: Aunque es defendible, sobrerrepresenta la fórmula narrativa hebrea. El inglés auditado eligió «And when», y en español «Y cuando» preserva la función temporal con mejor naturalidad.
  - severity: medium
    issue: «Lo despojaron de su túnica» suena menos concreto que la acción de quitarle la prenda
    rationale: וַיַּפְשִׁיטוּ con el objeto de la túnica apunta a la remoción concreta de la vestidura. «Le quitaron su túnica» comunica mejor esa acción específica en español bíblico natural.
  revised_spanish_text: Y cuando José llegó a sus hermanos, le quitaron su túnica, la túnica de muchos colores[a] que llevaba puesta.
  revised_footnotes:
  - marker: a
    text: O «la túnica larga» o «la túnica ricamente adornada». La expresión hebrea כְּתֹנֶת הַפַּסִּים es incierta; la tradicional «túnica de muchos colores» es posible, aunque quizá menos probable.
    reason: lexical_alternative
  revision_rationale: Se aligeró la fórmula narrativa inicial para reflejar mejor el valor temporal de וַיְהִי כַּאֲשֶׁר en español natural, y se sustituyó «lo despojaron de» por «le quitaron» para expresar con mayor claridad y concreción la acción de remover la túnica específica. Se mantuvo «túnica de muchos colores» y su nota, en conformidad con la revisión inglesa auditada.
