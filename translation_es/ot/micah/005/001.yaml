    issue: La nota [a] está colocada en 'desde antiguo' pero su contenido corresponde a una alternativa amplia de la cláusula final, y falta la nota del inglés sobre 'too small to be among the clans of Judah'.
    rationale: El POB inglés conserva explícitamente una nota léxica para la expresión sobre los 'clanes/millares'. En español, la nota [a] actual no corresponde bien a su anclaje textual ni al reparto de información auditado.
  - severity: medium
    issue: La cláusula 'y sus orígenes son' es menos fiel a la relación sintáctica del hebreo y menos elegante en español que una relativa.
    rationale: Tras 'uno que será gobernante en Israel', el hebreo continúa describiendo a ese gobernante. 'Cuyos orígenes son...' reproduce mejor esa dependencia y mejora la legibilidad.
  - severity: low
    issue: Las notas [a] y [b] son parcialmente redundantes.
    rationale: Ambas tratan la misma zona semántica final; conviene que una preserve la alternativa literal/menos fuerte y la otra la lectura más fuerte, o bien reducir a una sola nota bien formulada.
