translation:
  language: es
  text: 'y una canasta de panes sin levadura: tortas de flor de harina mezcladas con aceite[a], y obladas sin levadura ungidas con aceite[b], junto con su ofrenda vegetal y sus libaciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tortas sin levadura' para la primera aparición de מַצּוֹת; el término hebreo es amplio, y el versículo luego especifica tortas y obladas dentro de esa categoría.
    reason: lexical_alternative
  - marker: b
    text: O 'untadas con aceite' para 'ungidas con aceite'; el verbo hebreo es el término usual para ungir, pero aquí describe la preparación de las obladas.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַל
  english_pob_choice: basket
  chosen_spanish: canasta
  alternatives_spanish:
  - cesta
  - canastillo
  lexicon: HALOT
  rationale: El término designa un recipiente para transportar los elementos de la ofrenda; 'canasta' es natural, claro y fiel al sentido básico del contenedor.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan sin levadura
  - panes ázimos
  - cosas sin levadura
  lexicon: HALOT
  rationale: La expresión es amplia y engloba los productos mencionados luego como tortas y galletas. 'Panes sin levadura' conserva la categoría general sin forzar una equivalencia demasiado técnica.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina escogida
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, 'flor de harina' comunica bien la harina finamente molida y mantiene el registro sacrificial tradicional sin perder claridad.
- source_word: חַלֹּת
  english_pob_choice: cakes
  chosen_spanish: tortas
  alternatives_spanish:
  - pasteles
  - panes
  lexicon: HALOT
  rationale: En contexto ritual, el término alude a piezas moldeadas de masa; 'tortas' es una solución natural en español que evita la imagen moderna de un pastel dulce.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezcladas con aceite
  alternatives_spanish:
  - amasadas con aceite
  - mezcladas en aceite
  lexicon: HALOT
  rationale: '''Mezcladas con aceite'' refleja la acción de combinar la masa con aceite de manera clara y sin sobreinterpretar el matiz exacto de preparación.'
- source_word: רְקִיקֵי מַצּוֹת
  english_pob_choice: unleavened wafers
  chosen_spanish: galletas sin levadura
  alternatives_spanish:
  - obladas sin levadura
  - hojaldras sin levadura
  - tortitas delgadas sin levadura
  lexicon: HALOT
  rationale: La forma es delgada y plana; 'galletas' aquí funciona como término amplio para piezas delgadas de pan, aunque se mantiene una nota para la alternativa más cercana al valor cultual de 'wafers'.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  english_pob_choice: anointed with oil
  chosen_spanish: untadas con aceite
  alternatives_spanish:
  - ungidas con aceite
  - barnizadas con aceite
  - embadurnadas con aceite
  lexicon: HALOT
  rationale: En este contexto alimentario, 'ungidas' puede sonar demasiado cultual o personal; 'untadas' comunica mejor la aplicación física del aceite sin perder el vínculo léxico con el verbo hebreo.
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de cereal
  - su oblación
  lexicon: HALOT
  rationale: Se preserva la terminología POB para מִנְחָה como 'ofrenda vegetal', un término ya auditado y transparente dentro del sistema del proyecto.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas líquidas
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: '''Libaciones'' es la equivalencia cultual estándar en español y refleja bien el acto de derramar una ofrenda líquida acompañante.'
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético y el audit trail inglés de la POB para mantener las dos subcategorías de panes sin levadura: tortas mezcladas con aceite y piezas delgadas untadas con aceite. Se conservó la coherencia terminológica interna del sistema POB para la ofrenda vegetal.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque en este versículo no aparece el nombre divino.
  - '''Ofrenda vegetal'' mantiene la convención POB para מִנְחָה en el contexto sacrificial.'
  - '''Libaciones'' corresponde a un término cultual asentado y conciso en español.'
  - La alternativa 'ungidas' se preserva en nota por la tensión entre el verbo hebreo y el contexto culinario.
