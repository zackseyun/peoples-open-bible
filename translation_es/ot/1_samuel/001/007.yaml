base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/001/007.yaml
  text: 'And so it happened year after year: whenever she went up to the house of Yahweh[a], Peninnah would provoke her[b], and she would weep and not eat.'
  footnotes:
  - marker: a
    text: Or, 'he would do so year after year.' The Hebrew verb is literally singular masculine ('he would do'), often understood of Elkanah, but the clause can also function idiomatically to summarize the recurring situation.
    reason: alternative_reading
  - marker: b
    text: Or, 'in the house of the LORD.' The Hebrew preposition is literally 'in/at,' though English commonly says 'went up to the house of the LORD' with a verb of motion.
    reason: lexical_alternative
