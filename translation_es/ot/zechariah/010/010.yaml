translation:
  language: es
  text: Yo los haré volver de la tierra de Egipto y los reuniré de Asiria; los llevaré a la tierra de Galaad y del Líbano, y no se hallará lugar[a] para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «y no se hallará para ellos»; el hebreo deja implícita la idea de «lugar» o «espacio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁיבוֹתִים
  english_pob_choice: I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de vuelta
  - los restauraré
  lexicon: BDB / HALOT
  rationale: El hiphil de שוב expresa hacer regresar. En español, «los haré volver» conserva la causalidad y el movimiento de retorno; «los traeré de vuelta» es posible, pero «volver» conecta mejor con el retorno del exilio. «Los restauraré» es más amplio y diluye la imagen espacial inmediata.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente אֶרֶץ como «tierra», manteniendo el valor geográfico y la resonancia del éxodo. «De Egipto» es más breve, pero omite un elemento léxico relevante.
- source_word: וּמֵאַשּׁוּר
  english_pob_choice: and from Assyria
  chosen_spanish: y los reuniré de Asiria
  alternatives_spanish:
  - y de Asiria
  - y fuera de Asiria
  lexicon: HALOT
  rationale: Se mantiene el paralelismo geográfico con Egipto. «Asiria» es el nombre propio estándar en español y el verbo «reunir» transmite bien la idea de agrupar a un pueblo disperso.
- source_word: אֲקַבְּצֵם
  english_pob_choice: gather them
  chosen_spanish: los reuniré
  alternatives_spanish:
  - los juntaré
  - los congregaré
  lexicon: HALOT
  rationale: קבץ suele referirse a reunir a personas dispersas. «Reunir» es natural en español y comunica la acción restauradora sin añadir matices eclesiásticos que no están en el hebreo.
- source_word: וְאֶל אֶרֶץ גִּלְעָד וּלְבָנוֹן
  english_pob_choice: into the land of Gilead and Lebanon
  chosen_spanish: a la tierra de Galaad y del Líbano
  alternatives_spanish:
  - a la tierra de Galaad y Líbano
  - a Galaad y al Líbano
  lexicon: HALOT
  rationale: El hebreo presenta אֶל seguido de «tierra», por lo que «a la tierra de…» conserva la dirección sin forzar «dentro de». «Galaad» y «Líbano» se usan como topónimos reconocibles en español bíblico.
- source_word: אֲבִיאֵם
  english_pob_choice: I will bring them
  chosen_spanish: los llevaré
  alternatives_spanish:
  - los traeré
  - los conduciré
  lexicon: HALOT
  rationale: ביא en hiphil significa «traer/llevar». Aquí «los llevaré» funciona bien en español con el verbo de movimiento hacia el destino indicado. «Traeré» también es posible, pero puede sonar menos natural con el complemento direccional inmediato.
- source_word: וְלֹא יִמָּצֵא לָהֶם
  english_pob_choice: and no room will be found for them
  chosen_spanish: y no se hallará lugar para ellos
  alternatives_spanish:
  - y no se les hallará lugar
  - y no habrá lugar para ellos
  lexicon: HALOT
  rationale: El hebreo es literalmente pasivo e implica un «lugar/espacio» no expresado. «No se hallará lugar para ellos» mantiene la pasiva y hace explícito el objeto implícito sin sobreinterpretar. «No habrá lugar para ellos» es más idiomático, pero pierde la huella del verbo «hallar» presente en el original.
theological_decisions:
- issue: Objeto implícito en וְלֹא יִמָּצֵא לָהֶם
  english_pob_reading: The clause means that the restored people will become so numerous that no room/space will be found for them.
  chosen_spanish_reading: La cláusula expresa que el espacio no bastará para ellos, de modo que no se hallará lugar suficiente.
  alternative_spanish_readings:
  - 'La cláusula puede dejarse más literalmente: «y no se hallará para ellos».'
  - Puede entenderse como una afirmación de abundancia poblacional que llena la tierra.
  rationale: El hebreo omite el sustantivo «lugar/espacio», pero el contexto de llevarlos a Galaad y al Líbano sugiere insuficiencia de espacio. En español, hacer explícito «lugar» ayuda a la inteligibilidad sin añadir una idea extraña al texto.
  doctrine_reference: Principios de equivalencia óptima y transparencia textual del POB
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB, que cambió la idea de finalidad/resultado implícita por una coordinación más literal: «and no room will be found for them». Por eso el español evita expresiones como «hasta que» o «para que», y conserva una coordinación simple con «y no se hallará lugar para ellos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del verso porque no aparece el tetragrámaton en este pasaje.
  - Se usa «Asiria» y «Egipto» como topónimos bíblicos estándar en español.
  - «Lugar» se añade solo para explicitar el implícito hebreo, no como expansión interpretativa.
  - El registro es bíblico moderno y sobrio, evitando arcaísmos innecesarios.
