translation:
  language: es
  text: 'Y dijo: «¿Cuál es la palabra que él te habló? Por favor, no me la ocultes. Así te haga Dios, y aun más, si me ocultas ni una palabra[a] de toda la palabra que él te habló».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con más fluidez: «si me ocultas algo de todo lo que él te habló».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הַדָּבָר
  english_pob_choice: What is the word
  chosen_spanish: ¿Cuál es la palabra
  alternatives_spanish:
  - ¿Cuál es el mensaje
  - ¿Cuál es el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto' o 'mensaje'. En este contexto de revelación hablada, 'palabra' conserva mejor la repetición temática del pasaje y el vínculo con lo dicho por Dios.
- source_word: דִּבֶּר אֵלֶיךָ
  english_pob_choice: he spoke to you
  chosen_spanish: te ha hablado
  alternatives_spanish:
  - te habló
  - te dijo
  lexicon: HALOT
  rationale: El verbo דבר se mantiene con el sentido de 'hablar'. En español, 'te ha hablado' suena natural y conserva la relación formal con 'palabra'.
- source_word: אַל נָא תְכַחֵד מִמֶּנִּי
  english_pob_choice: Please do not hide it from me
  chosen_spanish: Por favor, no me la ocultes
  alternatives_spanish:
  - Por favor, no me lo escondas
  - No me la ocultes, por favor
  lexicon: HALOT
  rationale: כחד significa 'ocultar/encubrir'. En español, 'ocultar' es claro y digno; el pronombre 'la' retoma naturalmente 'la palabra'.
- source_word: כֹּה יַעֲשֶׂה לְּךָ אֱלֹהִים וְכֹה יוֹסִיף
  english_pob_choice: May God do so to you, and more also
  chosen_spanish: Así haga Dios contigo, y así añada aún más
  alternatives_spanish:
  - Así te haga Dios, y así añada aún más
  - Así haga Dios contigo, y más todavía
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento/imprecación con un español sobrio. 'Así haga Dios contigo' refleja la estructura hebrea sin perder naturalidad; 'añada aún más' traduce la intensificación idiomática de וְכֹה יוֹסִיף.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - que si
  - si es que
  lexicon: HALOT
  rationale: En fórmulas de juramento, אִם introduce la condición amenazante. 'Si' preserva esa estructura y su fuerza jurídica.
- source_word: תְּכַחֵד מִמֶּנִּי דָּבָר
  english_pob_choice: you hide from me a word
  chosen_spanish: me ocultas una palabra
  alternatives_spanish:
  - me ocultas algo
  - me escondes una palabra
  lexicon: HALOT
  rationale: Se mantiene el singular דָּבָר como 'palabra' para conservar la repetición léxica del hebreo. El español requiere un pronombre clítico natural ('la').
- source_word: מִכָּל הַדָּבָר
  english_pob_choice: of all the word
  chosen_spanish: de todo lo que
  alternatives_spanish:
  - de toda la palabra
  - de todo el asunto
  - de cualquier parte de lo que
  lexicon: HALOT
  rationale: La frase hebrea es singular y repetitiva; en español, 'de todo lo que' comunica con claridad la idea de no omitir ninguna parte del contenido revelado, sin sonar antinatural.
theological_decisions:
- issue: Fórmula de juramento con אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: En el contexto, la fórmula apunta al Dios de Israel. 'Dios' evita una lectura politeísta y sigue la decisión auditada del inglés POB.
  doctrine_reference: Monoteísmo bíblico; uso formular de אֱלֹהִים en juramento
- issue: Preservación de la repetición de דָּבָר
  english_pob_reading: word / a word of all the word
  chosen_spanish_reading: palabra / una palabra de todo lo que
  alternative_spanish_readings:
  - mensaje / un mensaje de todo el mensaje
  - asunto / un asunto de todo el asunto
  rationale: La repetición léxica es parte del efecto retórico del hebreo. 'Palabra' mantiene mejor ese eco que opciones más fluidas pero menos auditables.
  doctrine_reference: Principio de fidelidad semántica y retórica al texto fuente
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó ''all the word'' a una formulación más natural, pero luego se revirtió para preservar la repetición deliberada de דָּבָר. Esta versión española conserva esa tensión: mantiene ''palabra'' de modo repetido, pero evita el calco torpe con ''de todo lo que''.'
  spanish_consistency_notes:
  - Se usa 'Dios' en la fórmula de juramento, no 'Señor', porque el hebreo tiene אֱלֹהִים.
  - Se mantiene 'palabra' para דָּבָר en ambas apariciones significativas.
  - La nota [a] está anclada en 'una palabra' para ofrecer la alternativa más natural sin alterar el texto principal.
  - El español evita el literalismo 'de toda la palabra' por gramática, pero conserva el alcance total del contenido revelado.
  - El tono es solemne y directo, adecuado para una edición bíblica de lectura pública.
