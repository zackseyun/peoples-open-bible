id: EST.9.2
reference: Esther 9:2
source:
  edition: WLC
  text: נִקְהֲל֨וּ הַ/יְּהוּדִ֜ים בְּ/עָרֵי/הֶ֗ם בְּ/כָל מְדִינוֹת֙ הַ/מֶּ֣לֶךְ אֳחַשְׁוֵר֔וֹשׁ לִ/שְׁלֹ֣חַ יָ֔ד בִּ/מְבַקְשֵׁ֖י רָֽעָתָ֑/ם וְ/אִישׁ֙ לֹא עָמַ֣ד לִ/פְנֵי/הֶ֔ם כִּֽי נָפַ֥ל פַּחְדָּ֖/ם עַל כָּל הָ/עַמִּֽים־־־־־׃
translation:
  text: The Jews assembled in their cities throughout all the provinces of King Ahasuerus to lay hands on those seeking their harm[a], and no one could stand before them[c][b], because the fear of them had fallen on all the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to attack those seeking their harm'; the Hebrew idiom is literally 'to send/stretch out a hand against.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and no one could withstand them.'
    reason: lexical_alternative
  - marker: c
    text: '''Peoples'' likely refers to the various ethnic groups or populations within the empire, not merely a single nation.'
    reason: cultural_note
lexical_decisions:
- source_word: נִקְהֲלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - were assembled
  lexicon: HALOT
  rationale: Niphal of קהל denotes coming together/assembling. 'Assembled' is natural English and preserves the collective, organized sense without over-paraphrase.
- source_word: בְּעָרֵיהֶם
  chosen: in their cities
  alternatives:
  - in their towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city.' The plural with pronominal suffix is straightforwardly locative.
- source_word: בְּכָל מְדִינוֹת הַמֶּלֶךְ אֳחַשְׁוֵרוֹשׁ
  chosen: throughout all the provinces of King Ahasuerus
  alternatives:
  - in all the provinces of King Ahasuerus
  lexicon: HALOT
  rationale: מְדִינוֹת refers to administrative provinces in the Persian empire. 'Throughout all' conveys the distributive scope across the empire.
- source_word: לִשְׁלֹחַ יָד
  chosen: to lay hands on
  alternatives:
  - to strike
  - to attack
  - to stretch out the hand against
  lexicon: HALOT
  rationale: The idiom שׁלח יד often means to put one's hand against someone, frequently with hostile force. 'Lay hands on' preserves the idiomatic force while remaining readable; the hostile object clarifies that this is not benign contact.
- source_word: בִּמְבַקְשֵׁי רָעָתָם
  chosen: on those seeking their harm
  alternatives:
  - against those seeking their evil
  - against those who sought to harm them
  lexicon: HALOT
  rationale: מבקשי רעתם is literally 'seekers of their harm/evil.' 'Those seeking their harm' is idiomatic and preserves the active hostile intent.
- source_word: וְאִישׁ לֹא עָמַד לִפְנֵיהֶם
  chosen: and no man could stand before them
  alternatives:
  - and no one stood before them
  - and no man withstood them
  lexicon: HALOT
  rationale: Literally, 'and a man did not stand before them.' In context this means no one was able to resist or oppose them. 'Could stand before them' brings out the idiomatic sense while retaining the singular אִישׁ as 'man' per gender-accurate policy.
- source_word: כִּי נָפַל פַּחְדָּם
  chosen: because the fear of them had fallen
  alternatives:
  - for dread of them had fallen
  - because terror of them had fallen
  lexicon: HALOT
  rationale: פחד denotes fear/dread. The idiom 'fell on' is preserved because it is natural enough in English and reflects the Hebrew image.
- source_word: עַל כָּל הָעַמִּים
  chosen: on all the peoples
  alternatives:
  - on all the nations
  - on all the people groups
  lexicon: HALOT
  rationale: עַמִּים plural is best rendered 'peoples' here, referring broadly to the various ethnic/population groups in the empire rather than a single populace.
- source_word: אֳחַשְׁוֵרוֹשׁ
  chosen: Ahasuerus
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project philosophy.
