translation:
  language: es
  text: 'Jefté les dijo[a]: «Mi pueblo y yo estuvimos en un gran conflicto con los amonitas, y clamé a ustedes, pero ustedes no me salvaron de su mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Yo era un hombre de contienda, yo y mi pueblo, con los amonitas, en gran manera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ רִיב
  english_pob_choice: in a great dispute
  chosen_spanish: en un gran conflicto
  alternatives_spanish:
  - en disputa
  - en una amarga contienda
  - como hombre de contienda
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, con הָיִיתִי, describe la situación en que Jefté se encontraba. «Conflicto» conserva el sentido relacional y judicial de רִיב sin volverlo una descripción de carácter; «gran» refleja מְאֹד y mantiene el énfasis.
- source_word: וְעַמִּי
  english_pob_choice: and my people
  chosen_spanish: y mi pueblo
  alternatives_spanish:
  - y mi gente
  - y mis compatriotas
  lexicon: HALOT
  rationale: עַם normalmente designa un colectivo de personas; «mi pueblo» es la forma más natural y fiel en español, sin estrechar indebidamente el referente.
- source_word: וּבְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  lexicon: HALOT
  rationale: El etnónimo bíblico se vierte con el nombre natural del pueblo en español. «Los amonitas» conserva el referente y evita una fórmula más literal que suena menos natural.
- source_word: וָאֶזְעַק אֶתְכֶם
  english_pob_choice: I cried out to you
  chosen_spanish: clamé a ustedes
  alternatives_spanish:
  - grité a ustedes
  - llamé a ustedes
  - cllamé por ayuda a ustedes
  lexicon: HALOT
  rationale: זעק es un clamor de auxilio. «Clamé» es un término digno y suficientemente fuerte para el contexto militar; mantiene el tono de súplica mejor que «llamé».
- source_word: וְלֹא הוֹשַׁעְתֶּם אוֹתִי
  english_pob_choice: you did not save me
  chosen_spanish: pero ustedes no me salvaron
  alternatives_spanish:
  - pero ustedes no me rescataron
  - pero ustedes no me libraron
  - pero ustedes no me dieron salvación
  lexicon: HALOT
  rationale: El verbo causativo de ישׁע pide un verbo directo de rescate. «Salvar» reproduce con precisión la acción negada por Jefté y funciona bien en el registro narrativo.
- source_word: מִיָּדָם
  english_pob_choice: from their hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de sus manos
  - de su dominio
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» como poder o control se conserva en español. «De su mano» es transparente y mantiene la metáfora bíblica sin sobreexplicarla.
translation_notes:
  revision_awareness: El original hebreo presenta la construcción idiomática אִישׁ רִיב con el verbo הָיִיתִי; la solución española conserva el valor situacional («estuvimos en un gran conflicto») y mantiene la intensidad de מְאֹד. La versión inglesa auditada osciló entre una lectura más literal («a man of strife») y una más idiomática («great dispute»); el español sigue esa línea idiomática sin perder la tensión lexical documentada. También se preservó el clamor de auxilio de זעק y la imagen de «mano» en מִיָּדָם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto en otros pasajes, aunque aquí no aparece el nombre divino.
  - «Amonitas» sigue la convención bíblica estándar en español para בני עמון.
  - Se prefirió «salvar» para הוֹשַׁעְתֶּם por coherencia con el contexto bélico y con la decisión inglesa auditada.
