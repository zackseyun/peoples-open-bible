translation:
  language: es
  text: pero a Esaú lo odié[a], e hice de sus montes[b] una desolación, y de su herencia para los chacales[c] del desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo rechacé’ o ‘lo amé menos’. El verbo hebreo normalmente significa ‘odiar’; estas alternativas reflejan intentos interpretativos de expresar preferencia o rechazo de pacto.
    reason: lexical_alternative
  - marker: b
    text: O ‘su región montañosa’.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente ‘dragones del desierto’; el hebreo probablemente se refiere a chacales.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  english_pob_choice: I hated
  chosen_spanish: lo odié
  alternatives_spanish:
  - lo rechacé
  - lo amé menos
  lexicon: HALOT
  rationale: El verbo hebreo שׂנא en qal expresa de manera directa ‘odiar’. En español, ‘odiar’ conserva esa fuerza sin suavizarla. Se evita ‘rechacé’ o ‘amé menos’ en el texto principal porque trasladan una interpretación teológica posterior más que el valor léxico inmediato del hebreo.
- source_word: וָאָשִׂים
  english_pob_choice: and I made
  chosen_spanish: y convertí
  alternatives_spanish:
  - y puse
  - y establecí
  - y hice
  lexicon: HALOT
  rationale: שׂים puede significar ‘poner’, ‘hacer’ o ‘convertir/establecer’ según el contexto. Con שְׁמָמָה, el resultado es un estado provocado; ‘convertí’ expresa bien esa causación en español natural sin perder el matiz de transformación a desolación.
- source_word: הָרָיו
  english_pob_choice: his mountains
  chosen_spanish: sus montes
  alternatives_spanish:
  - su región montañosa
  - su tierra montañosa
  lexicon: HALOT
  rationale: El plural de הַר se vierte más directamente como ‘montes’. ‘Región montañosa’ aclara el sentido regional, pero atenúa la forma plural del hebreo. ‘Montes’ mantiene la concreción del original.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: en desolación
  alternatives_spanish:
  - en un desierto
  - en ruina
  - en devastación
  lexicon: HALOT
  rationale: El sustantivo hebreo denota desolación/devastación. En español, ‘en desolación’ conserva el sustantivo y su tono profético, mientras ‘en ruina’ o ‘en devastación’ cambian ligeramente el registro o el foco semántico.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión heredada
  - su patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה puede referirse a una posesión heredada o patrimonio familiar/covenantal. ‘Herencia’ es claro y bíblicamente reconocible en español, y mantiene la idea de posesión recibida por asignación.
- source_word: לְתַנּוֹת מִדְבָּר
  english_pob_choice: for the jackals of the wilderness
  chosen_spanish: para los chacales del desierto
  alternatives_spanish:
  - para los chacales del desierto árido
  - para los dragones del desierto
  lexicon: HALOT
  rationale: תַנּוֹת se entiende hoy con mayor probabilidad como ‘chacales’ en lugares desolados. ‘Del desierto’ reproduce bien מִדְבָּר. Se evita ‘dragones’ por ser una tradición antigua pero no la opción léxica preferente en el consenso actual.
- source_word: וְ/אֶת
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: Hebrew syntax
  rationale: Aunque la conjunción es formalmente ‘y’, el contexto contrasta a Jacob con Esaú del versículo previo. ‘Pero’ hace explícita la fuerza adversativa natural en español y sigue la decisión auditada del texto inglés.
theological_decisions:
- issue: Fuerza de la declaración divina de odio hacia Esaú
  english_pob_reading: Retain the direct wording 'I hated' in the main text without softening it.
  chosen_spanish_reading: Mantener ‘lo odié’ en el texto principal sin atenuarlo.
  alternative_spanish_readings:
  - lo rechacé
  - lo amé menos
  rationale: La traducción debe preservar la tensión teológica del hebreo y no resolverla en el texto principal mediante paráfrasis explicativas. Las alternativas pueden considerarse interpretaciones, pero no sustituyen la declaración directa del original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el auditorio inglés POB. No se detectan revisiones posteriores que obliguen a cambiar la solución; se conserva la tensión léxica de שׂנא, la causación de שׂים y la lectura probable de תַנּוֹת como ‘chacales’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma preferida en este proyecto cuando el Tetragrámaton aparezca; en este versículo no aparece.
  - ‘Mesías/Cristo’ no aplica aquí.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se conserva la fuerza nominal de ‘desolación’ y la concreción animal de ‘chacales’ para alinearse con el audit trail.
