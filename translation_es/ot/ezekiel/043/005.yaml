translation:
  language: es
  text: Entonces el Espíritu me levantó y me llevó al atrio interior[a], y he aquí, la gloria de Yahvé llenó la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viento» o «un espíritu»; רוּחַ puede abarcar esos sentidos, aunque en el contexto de la visión de Ezequiel probablemente se refiere al Espíritu divino.
    reason: alternative_reading
  - marker: b
    text: O «el templo»; «la casa» es la expresión más literal del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂאֵנִי
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me llevó hacia arriba
  lexicon: HALOT
  rationale: El hebreo expresa elevación o transporte ascendente en la visión. «Me levantó» comunica de forma natural esa acción y conserva la idea de traslado visionario sin endurecer el español con un calco.
- source_word: רוּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - el viento
  lexicon: HALOT
  rationale: En este contexto de transporte profético, la referencia más probable es el agente divino. «El Espíritu» mantiene la lectura contextual preferida por la POB inglesa sin borrar la tensión léxica de que רוּחַ también puede significar «viento» o «espíritu».
- source_word: וַתְּבִיאֵנִי
  english_pob_choice: brought me
  chosen_spanish: me llevó
  alternatives_spanish:
  - me trajo
  - me condujo
  lexicon: HALOT
  rationale: El causativo de בוא aquí indica introducir o trasladar a un lugar. «Me llevó» es idiomático en español y reproduce el movimiento hacia el recinto interior.
- source_word: הֶחָצֵר הַפְּנִימִי
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el atrio interno
  lexicon: HALOT
  rationale: En el contexto del templo, חָצֵר designa el espacio arquitectónico del recinto. «Atrio interior» es comprensible, solemne y suficientemente literal; «patio» sonaría menos técnico en este marco.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: «He aquí» preserva el valor discursivo de sorpresa e iluminación visual del hebreo y corresponde al registro profético del texto.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenaba
  alternatives_spanish:
  - estaba lleno
  - había llenado
  lexicon: HALOT
  rationale: 'El predicado describe un estado resultante: la casa aparece colmada por la gloria. «Llenaba» mantiene la fuerza del hebreo con naturalidad en español, sin forzar una pasiva perifrástica.'
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria de Yahvé
  lexicon: HALOT
  rationale: כָּבוֹד se refiere a la manifestación visible/pesada de la presencia divina. Se mantiene la terminología POB con «gloria» y el nombre propio divino «Yahvé» según la convención del proyecto.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la casa
  - el templo
  lexicon: HALOT
  rationale: Aunque el referente es el templo en la visión, el hebreo dice literalmente «la casa». «La casa» preserva mejor la formulación original y la idiomática de Ezequiel, incluso si puede aludir al templo por contexto.
theological_decisions:
- issue: Referente de רוּחַ en la escena visionaria
  english_pob_reading: the Spirit as divine agent
  chosen_spanish_reading: el Espíritu como agente divino
  alternative_spanish_readings:
  - un espíritu
  - el viento
  rationale: La escena pertenece a una serie de transportes visionarios en Ezequiel, donde el agente más coherente es el Espíritu de Dios. La traducción conserva la ambigüedad léxica posible, pero favorece la lectura narrativa y teológica más probable.
  doctrine_reference: 'Translation philosophy §3; DOCTRINE.md Contested terms: רוּחַ'
- issue: Renderizado del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como «Yahvé», manteniendo el nombre propio del pacto y evitando la sustitución por un título. Esto conserva la transparencia respecto del original hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tomó en cuenta el pase más reciente, que indicó sin cambios necesarios, y el control cruzado de alta concordancia (1.0). No se introdujeron revisiones adicionales respecto del sentido base auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se preservó «Espíritu» con mayúscula por tratarse del agente divino en el contexto visionario.
  - Se conservó la imagen arquitectónica de «atrio interior» para חָצֵר הַפְּנִימִי.
  - Se respetó la ambigüedad de «la casa» con nota alternativa a «el templo».
