revisions:
- from: Porque Yahvé está devastando Babilonia y destruyendo[a] de ella el gran estruendo; sus olas rugen[b] como muchas aguas; el ruido de su voz es dado.
  to: Porque Yahvé está devastando Babilonia y quitando de ella el gran estruendo; sus olas rugen como muchas aguas[a]; se alza el estruendo de su voz[b].
  rationale: Se reordenan y corrigen las notas para que correspondan a las cláusulas documentadas en el POB inglés; se mejora la naturalidad de «destroying from her the great sound» con «quitando de ella el gran estruendo»; y se suaviza el calco final con «se alza el estruendo de su voz», manteniendo en nota la literalidad hebrea.
  reviewer_model: gpt-5.4
