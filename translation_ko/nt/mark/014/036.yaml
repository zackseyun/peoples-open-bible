id: MRK.14.36
reference: Mark 14:36
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν· Αββα ὁ πατήρ, πάντα δυνατά σοι· παρένεγκε τὸ ποτήριον ⸂τοῦτο ἀπ’ ἐμοῦ⸃· ἀλλ’ οὐ τί ἐγὼ θέλω ἀλλὰ τί σύ.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/036.yaml
  text: And he was saying[a], “Abba, Father, all things are possible for you. Take this cup away from me. Yet not what I will[c][b], but what you will.”
  footnotes:
  - marker: a
    text: 'Or, ''he said.'' The Greek imperfect may suggest repeated or continued speech: ''he was saying.'''
    reason: lexical_alternative
  - marker: b
    text: '''Abba'' is an Aramaic form of address for father, retained here alongside the Greek ''Father.'''
    reason: cultural_note
  - marker: c
    text: '''Cup'' is a biblical metaphor for the suffering appointed to him; compare Mark 10:38.'
    reason: cross_reference
translation:
  language: ko
  text: 그분께서 말씀하셨습니다. 「아빠, 아버지여, 아버지께는 모든 것이 가능합니다. 이 잔을 저에게서 거두어 주십시오. 그러나 내가 원하는 것이 아니라, 아버지께서 원하시는 것을 행하여 주십시오.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Αββα ὁ πατήρ
  english_pob_choice: Abba, Father
  chosen_korean: 아빠, 아버지여
  alternatives_korean:
  - 아바, 아버지여
  - 아빠
  lexicon: BDAG
  rationale: 아람어 호칭 Αββα를 음역하여 친밀한 부자 관계의 셈어적 색채를 그대로 보존한다. 헬라어 본문 자체가 음역+번역 병치(Αββα ὁ πατήρ)로 적어 두었으므로, 한국어도 「아빠, 아버지여」로 병치한다.
theological_decisions:
- issue: 14:36의 아람어 호칭 Αββα ὁ πατήρ 보존
  chosen_reading: 아빠, 아버지여
  alternative_readings:
  - 아버지여
  - 아바, 아버지여
  rationale: 마가는 이미 헬라어 안에 아람어 Αββα를 보존하고 「ὁ πατήρ」로 헬라어 번역을 덧붙였다. 한국어 본문도 「아빠, 아버지여」로 음역+번역을 병치하여, 본문이 의도적으로 보존한 셈어적 친밀성과 이중 언어성을 그대로 살린다. 이 호칭은 겟세마네의 친밀한 절규의 핵심이다.
  doctrine_reference: 'DOCTRINE.md: render the source''s strongest plain meaning; preserve original-language signals'
