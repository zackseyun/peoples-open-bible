    text: Or 'a sultry east wind' or 'a vehement east wind.' The Hebrew adjective is rare and difficult; 'scorching' is chosen because the context emphasizes oppressive heat.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'My death is better than my life.'
    reason: lexical_alternative
