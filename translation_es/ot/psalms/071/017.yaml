translation:
  language: es
  text: Dios[a], me has enseñado desde mi juventud, y hasta hoy anuncio tus obras maravillosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus maravillas» o «tus hechos maravillosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo funciona como invocación directa en poesía, pero en español la oración queda natural y fiel con «Dios». Mantiene el trato directo sin añadir una partícula exclamativa que el hebreo no exige.
- source_word: לִמַּדְתַּנִי
  english_pob_choice: you have taught me
  chosen_spanish: me has enseñado
  alternatives_spanish:
  - me enseñaste
  - me has instruido
  lexicon: HALOT
  rationale: El pi‘el de למד con sufijo de 1.ª persona expresa una acción de enseñanza ya realizada. «Me has enseñado» preserva el valor perfecto con relevancia presente y suena natural en español; «instruido» sería posible, pero más técnico y menos fluido aquí.
- source_word: מִנְּעוּרָי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde mis años mozos
  lexicon: HALOT
  rationale: La preposición מִן pide «desde» y נְעוּרִים remite a la etapa juvenil. «Desde mi juventud» conserva la referencia temporal y evita restringirla indebidamente a la niñez.
- source_word: וְעַד הֵנָּה
  english_pob_choice: and to this day
  chosen_spanish: y hasta hoy
  alternatives_spanish:
  - y hasta este día
  - y hasta ahora
  lexicon: HALOT
  rationale: La frase marca continuidad hasta el presente. «Hasta hoy» reproduce bien el sentido y es idiomático en español, manteniendo el tono testimonial del salmo.
- source_word: אַגִּיד
  english_pob_choice: I declare
  chosen_spanish: anuncio
  alternatives_spanish:
  - declaro
  - proclamo
  - doy a conocer
  lexicon: HALOT
  rationale: El hifil de נגד tiene el sentido de declarar/manifestar/hacer saber. «Anuncio» funciona bien en español para una confesión pública y evita un formalismo innecesario; «declaro» también sería válido, pero puede sonar más jurídico.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus obras maravillosas
  alternatives_spanish:
  - tus maravillas
  - tus hechos maravillosos
  lexicon: HALOT
  rationale: נִפְלָאוֹת puede referirse a maravillas, actos asombrosos o hechos portentosos de Dios. «Obras maravillosas» explicita el matiz de acción/obra que el hebreo permite y conserva la amplitud del término sin volverlo demasiado abstracto.
theological_decisions:
- issue: Cómo reflejar el sentido de alabanza testimonial en el verbo final
  english_pob_reading: I declare your wondrous deeds
  chosen_spanish_reading: anuncio tus obras maravillosas
  alternative_spanish_readings:
  - declaro tus obras maravillosas
  - proclamo tus obras maravillosas
  rationale: El verso no solo comunica información; también da testimonio público de las acciones de Dios. «Anuncio» comunica ese acto testimonial sin intensificar más allá de lo que el hebreo exige.
  doctrine_reference: Poética de testimonio y alabanza en los Salmos; traducción con fidelidad semántica y tono devocional.
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia y no reporta revisiones aplicadas; esta redacción sigue de cerca las decisiones léxicas aprobadas en inglés, ajustándolas a un español natural sin perder la dirección devocional ni el paralelismo temporal del verso.
  spanish_consistency_notes:
  - Se mantuvo el trato directo a Dios en segunda persona, coherente con el hebreo y con el audit trail inglés.
  - Se conservó la progresión temporal «desde mi juventud... hasta hoy» para reflejar continuidad de experiencia.
  - «Obras maravillosas» equilibra literalidad y claridad; la nota ofrece las alternativas más literales preservadas por el POB inglés.
