translation:
  language: es
  text: Ahora entreguen a los hombres[a], los hijos de maldad, que están en Gabaa, para que les demos muerte y purguemos el mal de Israel. Pero Benjamín no quiso escuchar la voz de sus hermanos[c][b], los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hombres indignos'; tradicionalmente 'hijos de Belial'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''escuchar la voz de'', un modismo que también puede significar ''obedecer'' o ''hacer caso''.'
    reason: lexical_alternative
  - marker: c
    text: O 'los israelitas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  english_pob_choice: hand over
  chosen_spanish: entreguen
  alternatives_spanish:
  - den
  - entreguen en nuestras manos
  - sometan
  lexicon: HALOT
  rationale: En este contexto judicial, el imperativo pide la entrega de los culpables para juicio, no una simple acción de dar. 'Entreguen' conserva esa fuerza de entrega/sometimiento sin sonar forzado en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: El hebreo es masculino plural y se refiere a los perpetradores varones. 'Los hombres' es natural en español y precisa el referente.
- source_word: בְּנֵי בְלִיַּעַל
  english_pob_choice: sons of worthlessness
  chosen_spanish: los hijos de perversidad
  alternatives_spanish:
  - hombres perversos
  - los hijos de Belial
  - hombres indignos
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de la expresión hebrea como caracterización moral. 'Perversidad' mantiene el matiz de maldad/ruindad sin convertirlo en un nombre propio ni diluirlo en un insulto demasiado moderno.
- source_word: אֲשֶׁר בַּגִּבְעָה
  english_pob_choice: who are in Gibeah
  chosen_spanish: que están en Gabaa
  alternatives_spanish:
  - que están en Gibeá
  - que se hallan en Gabaa
  lexicon: HALOT
  rationale: Se identifica a los culpables por su ubicación. 'Están en' sigue de cerca la relación locativa y 'Gabaa' es una forma castellana estable del topónimo.
- source_word: וּנְמִיתֵם
  english_pob_choice: so that we may put them to death
  chosen_spanish: para que los pongamos a muerte
  alternatives_spanish:
  - para que los matemos
  - para ejecutarlos
  lexicon: HALOT
  rationale: La forma cohortativa expresa propósito/intención. 'Pongamos a muerte' reproduce la idea de ejecución formal mejor que el simple 'matemos'.
- source_word: וּנְבַעֲרָה רָעָה
  english_pob_choice: and purge evil
  chosen_spanish: y purguemos el mal
  alternatives_spanish:
  - y quitemos el mal
  - y exterminemos el mal
  lexicon: HALOT
  rationale: בער en esta fórmula judicial comunica quitar o purgar el mal de la comunidad. 'Purguemos el mal' conserva la fuerza legal-moral del hebreo y la del registro de la POB en inglés.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - fuera de Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: La preposición expresa separación de la comunidad; 'de Israel' es la forma más directa y fiel en español.
- source_word: וְלֹא אָבוּ
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó a
  lexicon: HALOT
  rationale: Aunque el hebreo expresa voluntad/disposición, en español el sujeto tribal colectivo suena más natural con 'no quiso'. Mantiene la idea de negativa voluntaria.
- source_word: לִשְׁמֹעַ בְּקוֹל
  english_pob_choice: to listen to the voice of
  chosen_spanish: escuchar la voz de
  alternatives_spanish:
  - obedecer a
  - hacer caso a
  - atender a
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'escuchar la voz de', que en español sigue siendo comprensible y deja abierta la gama de oír/obedecer/atender que el idiomático hebreo puede implicar.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: La relación de parentesco es literal y teológicamente importante en el relato tribal; 'sus hermanos' la preserva sin expansión.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación formal del texto hebreo. 'Hijos de Israel' conserva mejor la forma apositiva del original que 'israelitas'.
theological_decisions:
- issue: Expresión בְּנֵי בְלִיַּעַל y su posible carga demonológica
  english_pob_reading: sons of worthlessness; traditionally 'sons of Belial.'
  chosen_spanish_reading: los hijos de perversidad
  alternative_spanish_readings:
  - los hijos de Belial
  - hombres perversos
  - los hijos de indignidad
  rationale: La lectura de la POB en inglés entiende la frase como caracterización moral, no como nombre propio. En español, 'perversidad' comunica esa evaluación sin introducir asociaciones posteriores de 'Belial' como figura personal.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: La fuerza judicial-covenantal de la frase final
  english_pob_reading: so that we may put them to death and purge evil from Israel
  chosen_spanish_reading: para que los pongamos a muerte y purguemos el mal de Israel
  alternative_spanish_readings:
  - para que los ejecutemos y quitemos el mal de Israel
  - para que los matemos y purguemos el mal de Israel
  rationale: La escena presenta una demanda judicial comunitaria orientada a limpiar a Israel del mal. 'Pongamos a muerte' y 'purguemos el mal' conservan ese tono legal y purificador sin intensificar ni suavizar indebidamente el texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del inglés POB, evitando añadir artículo definido a 'mal' y conservando la lógica judicial del hebreo. También refleja la decisión auditada de mantener la expresión idiomática 'escuchar la voz de' en vez de reducirla sólo a 'obedecer'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Hijos de'' se reserva aquí para reproducir la fórmula hebrea בני בליעל / בני ישראל.'
  - '''Purguemos el mal'' mantiene el sustantivo sin artículo, conforme al hebreo y a la revisión auditada del inglés.'
