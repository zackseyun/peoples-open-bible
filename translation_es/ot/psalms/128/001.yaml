review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: título/sobrescrito, bienaventuranza sapiencial, temor reverente a Yahvé y metáfora ética de caminar en sus caminos. También preserva correctamente Yahvé para יהוה. Sin embargo, «ascensos» no suena idiomático en español para שִׁיר הַמַּעֲלוֹת y resulta más fiel y legible «Cántico de las subidas», que conserva la concreción del hebreo sin sobreinterpretar.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «Un cántico de ascensos» suena forzado y poco natural en español eclesial general. Además, la repetición «todo el que... el que...» puede simplificarse manteniendo la sintaxis: «Bienaventurado todo el que teme a Yahvé, que anda en sus caminos». El resto del verso es legible y apropiado.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» correctamente; אַשְׁרֵי → «Bienaventurado» es defendible y acorde al tono sapiencial; ירא → «teme» preserva el temor reverente; דְּרָכָיו → «sus caminos» mantiene la metáfora. La única desviación práctica es la formulación de שִׁיר הַמַּעֲלוֹת, donde «ascensos» no refleja bien el uso establecido y natural en español.'
  issues:
  - severity: medium
    issue: «Un cántico de ascensos» suena poco idiomático para שִׁיר הַמַּעֲלוֹת
    rationale: Aunque intenta calcar «Ascents», «ascensos» en español no funciona bien como título de salmo. «Cántico de las subidas» conserva el sentido concreto de מַעֲלוֹת y es más natural sin imponer una interpretación histórica como «peregrinación».
  - severity: low
    issue: Redundancia sintáctica en «todo el que teme a Yahvé, el que anda...»
    rationale: 'El segundo «el que» no es incorrecto, pero en español suena más fluido convertirlo en relativa dependiente: «que anda en sus caminos», manteniendo el mismo referente del participio hebreo.'
  revised_spanish_text: Cántico de las subidas. Bienaventurado[a] todo el que teme a Yahvé, que anda en sus caminos.
  revised_footnotes:
  - marker: a
    text: O «dichoso». אַשְׁרֵי puede denotar un estado de florecimiento o bienaventuranza.
    reason: lexical_alternative
