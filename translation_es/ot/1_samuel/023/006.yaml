  glossary_alignment: Se respeta la transliteración cultual «efod» y no se sobreinterpreta. No hay conflictos con la terminología por defecto del proyecto. Los nombres propios están en formas españolas plausibles. La decisión léxica sobre la alternativa de orden hebreo debe alinearse mejor con la nota inglesa auditada.
  issues:
