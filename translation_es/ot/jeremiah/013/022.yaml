translation:
  language: es
  text: 'Y si dices en tu corazón[a]: “¿Por qué me han sobrevenido estas cosas?”—por la magnitud de tu iniquidad han sido descubiertas tus faldas; han sido violentados tus talones[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “¿Por qué me han venido estas cosas?”'
    reason: alternative_reading
  - marker: b
    text: La expresión continúa la imagen de exposición humillante; el hebreo también puede entenderse, de modo más general, como maltrato violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Y cuando
  - Porque si
  lexicon: HALOT
  rationale: La partícula introduce una condición o planteamiento anticipado; en español, “Y si” conserva la continuidad discursiva y el valor condicional sin cargar el texto con una causalidad que no está explícita.
- source_word: תֹאמְרִי בִּלְבָבֵךְ
  english_pob_choice: you say in your heart
  chosen_spanish: dices en tu corazón
  alternatives_spanish:
  - piensas
  - dices para ti misma
  - te dices en tu interior
  lexicon: HALOT
  rationale: El hebreo usa el modismo de habla interior. “Dices en tu corazón” mantiene la imagen bíblica y el registro del original, evitando una paráfrasis demasiado interpretativa como “piensas”.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿Para qué motivo?
  lexicon: HALOT
  rationale: La interrogación directa es la más natural y fiel al hebreo.
- source_word: קְרָאֻנִי אֵלֶּה
  english_pob_choice: have these things happened to me
  chosen_spanish: me han sobrevenido estas cosas
  alternatives_spanish:
  - me han acontecido estas cosas
  - estas cosas han venido sobre mí
  lexicon: HALOT
  rationale: El hebreo con קרא en esta construcción idiomática expresa que calamidades han caído/sobrevenido al hablante. “Sobrevenido” conserva bien el matiz de evento que irrumpe sobre la persona y evita una lectura demasiado literal de “llamado”.
- source_word: בְּרֹב עֲוֺנֵךְ
  english_pob_choice: because of the greatness of your iniquity
  chosen_spanish: por la gran magnitud de tu iniquidad
  alternatives_spanish:
  - por tu gran iniquidad
  - a causa de la abundancia de tu culpa
  lexicon: HALOT
  rationale: בְּ con רֹב expresa causa o base. “Gran magnitud” refleja el sustantivo רֹב con más fuerza que un adjetivo simple, y “iniquidad” preserva el peso moral/covenantal de עָוֹן.
- source_word: נִגְל֥וּ שׁוּלַ֖יִךְ
  english_pob_choice: your skirts have been uncovered
  chosen_spanish: han sido descubiertas tus faldas
  alternatives_spanish:
  - han sido descubiertos los bordes de tu vestido
  - ha sido levantado tu ruedo
  lexicon: HALOT
  rationale: שׁוּלַיִם designa los bordes inferiores de la prenda. “Faldas” es un equivalente natural en español para la imagen de exposición vergonzosa; “descubiertas” conserva el pasivo de la acción y el tono profético de humillación pública.
- source_word: נֶחְמְס֥וּ עֲקֵבָֽיִךְ
  english_pob_choice: your heels have been violated
  chosen_spanish: han sido violentados tus talones
  alternatives_spanish:
  - han sido maltratados tus talones
  - han sido ultrajados tus talones
  - han sido dañados tus talones
  lexicon: HALOT
  rationale: חמס en el nifal comunica ser tratado con violencia, violado o agraviado. “Violentados” reproduce esa fuerza en español sin cerrar el texto a una sola especificación; “talones” mantiene el paralelismo corporal y la continuidad de la imagen de humillación/exposición.
theological_decisions:
- issue: Imagen profética de vergüenza y violencia
  english_pob_reading: Retain the metaphor of public humiliation and violation without softening it into mere embarrassment or over-specifying a sexual act not explicitly stated.
  chosen_spanish_reading: Mantener la metáfora de humillación pública y violencia sin suavizarla en simple vergüenza ni convertirla en una descripción sexual más explícita que la del hebreo.
  alternative_spanish_readings:
  - “han sido descubiertas tus desnudes”
  - “has sido abusada sexualmente”
  rationale: El hebreo presenta un lenguaje de juicio severo y vergüenza sobre una destinataria femenina singular. La versión española debe conservar esa dureza y, a la vez, no añadir detalles que el texto no dice directamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios adicionales; se mantiene el acuerdo alto entre el texto hebreo, la traducción inglesa auditada y la formulación española propuesta.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tratamiento femenino singular implícito en el hebreo mediante “dices” y los sufijos de segunda persona singular femenina (“tu”, “tus”), sin añadir género explícito en español más allá de lo requerido por la gramática.
  - Se evita sustituir la violencia imagística por eufemismos demasiado suaves, en línea con el audit trail inglés.
