translation:
  language: es
  text: Tu nombre ya no será Abram[a], sino que tu nombre será Abraham, porque te he hecho padre de una multitud de naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «porque te he dado por padre de una multitud de naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקָּרֵא
  english_pob_choice: shall ... be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será llamado así
  lexicon: HALOT
  rationale: El nifal de קרא en fórmulas de nombramiento expresa pasividad en lenguaje de nombre; en español, «ser llamado» conserva esa forma natural y directa sin perder el valor formulaico.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya
  alternatives_spanish:
  - ya no
  - no más
  lexicon: HALOT
  rationale: Con negación y verbo pasivo, עוֹד marca cese desde ahora. «Ya» en combinación con «no será llamado» reproduce esa cesación de manera idiomática; la lectura completa «ya no» queda implícita en la estructura.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre propio
  lexicon: HALOT
  rationale: Corresponde de manera transparente al posesivo de segunda persona singular y mantiene el tono directo del oráculo.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  lexicon: transliteración propia
  rationale: Se conserva el nombre propio en transliteración, conforme al criterio del proyecto para nombres personales.
- source_word: וְהָיָה
  english_pob_choice: but ... shall be
  chosen_spanish: sino que ... será
  alternatives_spanish:
  - y ... será
  - pero ... será
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «y será», el contraste de renombramiento en español se expresa con naturalidad mediante «sino que», que mantiene la oposición entre el nombre anterior y el nuevo sin añadir contenido ajeno.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: transliteración propia
  rationale: Se conserva el nombre propio en transliteración, siguiendo el criterio del proyecto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación del cambio de nombre; «porque» comunica de forma clara y natural la relación causal/explanatoria del hebreo.
- source_word: אַב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - antepasado
  lexicon: HALOT
  rationale: En esta explicación etimológica y pactal, el sentido básico «padre» es el más fiel y mantiene el juego de palabras con Abraham.
- source_word: הֲמוֹן
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una muchedumbre
  - muchos
  lexicon: HALOT
  rationale: «Una multitud» conserva el sustantivo colectivo y el valor explicativo del nombre, mejor que una paráfrasis adjetiva.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En contexto pactual de Génesis, «naciones» es el equivalente más estándar y preciso; «pueblos» sería posible pero menos específico.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he hecho
  alternatives_spanish:
  - te he dado como
  - te estableceré como
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «te he dado», en esta construcción predicativa el español más natural es «te he hecho»; conserva el aspecto perfecto y la fuerza declarativa consumada del acto divino.
theological_decisions:
- issue: Conservar el perfecto divino en la declaración de nombramiento/constitución
  english_pob_reading: for I have made you the father of a multitude of nations
  chosen_spanish_reading: porque te he hecho padre de una multitud de naciones
  alternative_spanish_readings:
  - porque te haré padre de una multitud de naciones
  - porque te he nombrado padre de una multitud de naciones
  rationale: El hebreo usa el perfecto נְתַתִּיךָ; se mantiene con «te he hecho» para preservar la fuerza declarativa ya establecida por la palabra de Dios, sin resolverla artificialmente a futuro.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje fue revisado sin cambios en la pasada más reciente; el presente borrador mantiene esa estabilidad y sigue el alto grado de acuerdo del control cruzado. Se conserva la tensión entre el hebreo literal «dar» y el español idiomático «hacer» en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada en el proyecto cuando corresponda; este versículo no lo contiene.
  - Se conserva la transliteración de los nombres propios Abram y Abraham.
  - Se evita el calco rígido «será llamado» solo donde el español lo permite; aquí se usa una estructura natural de renombramiento.
  - «Una multitud de naciones» mantiene la imaginería colectiva y el juego etimológico del texto hebreo.
