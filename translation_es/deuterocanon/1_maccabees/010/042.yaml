  to: Y además de estas cosas, los cinco mil siclos de plata que solían tomar de las rentas, como en los años anteriores, de la cuenta[a] del santuario cada año, estos también son remitidos, porque pertenecen a los sacerdotes que ministran.
  rationale: Se sustituye 'fondo' por 'cuenta' para reflejar con fidelidad el valor administrativo de λόγος. Se ajusta la sintaxis a 'estos también son remitidos' para un español más natural y para conservar el tono formal del original y del POB inglés. La nota léxica se mantiene, pues sigue siendo útil para la frase comprimida.
