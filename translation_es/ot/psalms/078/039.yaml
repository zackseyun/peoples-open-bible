translation:
  language: es
  text: Él recordó que ellos eran carne[a], un viento que pasa y no vuelve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un aliento que pasa y no vuelve». El hebreo רוּחַ puede significar «viento», «aliento» o «espíritu»; aquí lo más probable es la idea de transitoriedad y fragilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: He remembered
  chosen_spanish: Él recordó
  alternatives_spanish:
  - Y recordó
  - Entonces recordó
  lexicon: HALOT
  rationale: El wayyiqtol expresa narración pasada; en español, «Él recordó» conserva el valor verbal sin añadir causalidad ni forzar un conector innecesario. El sujeto implícito se mantiene con «Él» por fluidez y claridad.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo recordado, no una causa independiente; «que» reproduce mejor la sintaxis natural del español bíblico y moderno.
- source_word: בָשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne mortal
  - humanos
  - naturaleza humana
  lexicon: HALOT
  rationale: «Carne» preserva el término concreto del hebreo y su fuerza antropológica de fragilidad y mortalidad. «Humanos» o «naturaleza humana» suavizan demasiado la imagen.
- source_word: הֵמָּה
  english_pob_choice: they were
  chosen_spanish: ellos eran
  alternatives_spanish:
  - eran
  - son
  lexicon: HALOT
  rationale: El pronombre independiente se expresa de forma natural en español con sujeto explícito; «eran» mantiene el predicado nominal sin añadir matices no presentes en el hebreo.
- source_word: רוּחַ
  english_pob_choice: a wind
  chosen_spanish: un viento
  alternatives_spanish:
  - un aliento
  - un espíritu
  lexicon: HALOT
  rationale: En este paralelismo poético, «רוּחַ» apunta a transitoriedad e insustancialidad. «Viento» encaja mejor con «que pasa» y «no vuelve»; «espíritu» introduciría una lectura antropológica más específica de la que el texto exige.
- source_word: הוֹלֵךְ
  english_pob_choice: that passes
  chosen_spanish: que pasa
  alternatives_spanish:
  - que va
  - que anda
  lexicon: HALOT
  rationale: El participio describe movimiento continuo; «que pasa» es una equivalencia idiomática en español que comunica bien la idea de transitoriedad.
- source_word: וְלֹא יָשׁוּב
  english_pob_choice: and does not return
  chosen_spanish: y no vuelve
  alternatives_spanish:
  - y no regresará
  - y no volverá
  lexicon: HALOT
  rationale: El imperfecto hebreo tiene fuerza gnómica en el poema; «no vuelve» conserva el valor general y evita especificar futuridad de manera excesiva.
theological_decisions:
- issue: Imagen antropológica de fragilidad humana
  english_pob_reading: The verse speaks of human beings as frail and transient ('flesh ... a wind that passes and does not return'), without making a technical statement about the immaterial soul or spirit.
  chosen_spanish_reading: El versículo presenta a los seres humanos como frágiles y pasajeros («carne ... un viento que pasa y no vuelve»), sin convertirlo en una afirmación técnica sobre el alma o el espíritu inmortal.
  alternative_spanish_readings:
  - Leer רוּחַ como «espíritu» y entender que habla de la partida del espíritu humano
  - Interpretar «carne» como una mera metáfora de debilidad moral
  rationale: La paralela poética subraya mortalidad y transitoriedad. Traducir רוּחַ como «viento» evita imponer una doctrina antropológica más desarrollada que el versículo no demanda, manteniendo la tensión teológica original.
  doctrine_reference: Preservar la tensión teológica y la primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés aprobado y no incorpora revisiones adicionales; se mantiene la lectura de alta concordancia sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «carne» para בָשָׂר y «viento» para רוּחַ, conservando la imagen concreta del hebreo.
  - Se evita «SEÑOR» o terminología litúrgica ajena porque el versículo no contiene el nombre divino.
  - La estructura breve y paralela en español procura mantener el tono poético del original.
