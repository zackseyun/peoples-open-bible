translation:
  language: es
  text: 'Entonces Yahvé me respondió y dijo: «Escribe la visión; escríbela claramente en tablillas[a], para que el que la lea pueda correr».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que el que la lea corra con ella», o «para que se lea rápidamente / de corrido». La frase hebrea es breve y admite más de un sentido plausible.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino, no con una sustitución titulada. «Yahvé» conserva el carácter personal del nombre revelado y sigue el criterio POB documentado para el original hebreo.
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: answered me
  chosen_spanish: me respondió
  alternatives_spanish:
  - me contestó
  - me dio respuesta
  lexicon: HALOT
  rationale: ענה aquí significa responder o contestar en forma natural. «Me respondió» preserva el sufijo de primera persona y el valor narrativo directo sin recargar la frase.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea se expresa de modo idiomático con «y dijo», manteniendo la continuidad del discurso sin añadir matices no presentes en el texto.
- source_word: כְּתוֹב
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Anota
  - Escríbelo
  lexicon: HALOT
  rationale: El imperativo de כתב se traduce de forma directa. Se omite el pronombre explícito porque el español ya lo integra naturalmente en el mandato, y el objeto queda claro por el contexto.
- source_word: חָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la revelación
  - una visión
  lexicon: HALOT
  rationale: חזון en contexto profético denota la visión o mensaje revelado. «La visión» conserva el referente específico del oráculo sin ampliar indebidamente su alcance.
- source_word: וּבָאֵר
  english_pob_choice: make it plain
  chosen_spanish: hazla clara
  alternatives_spanish:
  - aclárala
  - expónla claramente
  lexicon: HALOT
  rationale: La forma piel de באר expresa hacer algo claro o distinguible. «Hazla clara» conserva la idea de claridad textual y visual, evitando un calco demasiado rígido y manteniendo la referencia a la visión como objeto directo.
- source_word: עַל הַלֻּחוֹת
  english_pob_choice: on tablets
  chosen_spanish: sobre tablas
  alternatives_spanish:
  - sobre tablillas
  - en tablas
  lexicon: HALOT
  rationale: לוחות son tablas o tablillas para escribir. «Tablas» respeta el sustantivo hebreo y evita especificar material que el texto no menciona; «sobre» reproduce bien la relación locativa del original.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La partícula introduce propósito. «Para que» es el equivalente natural en español y mantiene la estructura final de la cláusula.
- source_word: יָרוּץ
  english_pob_choice: may run
  chosen_spanish: pueda correr
  alternatives_spanish:
  - corra
  - pueda ir corriendo
  lexicon: HALOT
  rationale: רץ significa correr. «Pueda correr» conserva el matiz de posibilidad/propósito del hebreo y resulta fluido en español, sin perder la imagen de rapidez.
- source_word: קֹרֵא בוֹ
  english_pob_choice: one who reads it
  chosen_spanish: el que la lea
  alternatives_spanish:
  - quien la lea
  - el lector de ella
  - el que la esté leyendo
  lexicon: HALOT
  rationale: El participio con preposición se entiende sustantivamente como «el que lee». Se eligió una forma natural en español que preserva el sentido de una persona lectora y el referente femenino de «visión».
theological_decisions:
- issue: Ambigüedad de לְמַעַן יָרוּץ קֹרֵא בוֹ
  english_pob_reading: so that one who reads it may run
  chosen_spanish_reading: para que el que la lea pueda correr
  alternative_spanish_readings:
  - para que el que la lea corra con ella
  - para que se lea rápidamente / al correr
  - para que el mensajero que la lea corra
  rationale: 'El hebreo es compacto y admite más de una relación sintáctica: que el lector corra, que corra con el mensaje o que el texto se lea rápidamente. La redacción principal sigue la lectura más directa y conserva la tensión interpretativa en la nota, sin resolverla artificialmente.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control cruzado y no presenta revisiones aplicadas; se conserva la solución de la línea inglesa auditada, adaptándola al español con el nombre divino Yahvé y una cláusula final igualmente ambigua en su formulación básica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio POB del Tetragrámaton.
  - Se usa «visión» como término profético estándar, no «revelación», para no sobredeterminar el género del mensaje.
  - Se conserva la ambigüedad de la cláusula final con una nota breve y textual.
  - El tono es bíblico moderno y sobrio, evitando calcos innecesarios y evitando también arcaísmos de estilo litúrgico fijo.
