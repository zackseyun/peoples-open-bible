  yaml_path: translation/ot/numbers/031/050.yaml
  text: 'So we have brought near Yahweh’s offering: each man what he found—articles of gold[a], armlets and bracelets, rings, earrings[c][b], and pendants—to make atonement for ourselves before Yahweh.'
