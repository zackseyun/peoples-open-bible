translation:
  language: es
  text: 'Entonces Raquel dijo[a]: «Con luchas de Dios he luchado con mi hermana, y también he prevalecido». Por eso le puso por nombre Naftalí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con luchas de Dios he luchado». La frase puede significar «con luchas divinas» o, de manera idiomática, «con luchas poderosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְתּוּלֵי אֱלֹהִים
  english_pob_choice: wrestlings of God
  chosen_spanish: luchas de Dios
  alternatives_spanish:
  - luchas divinas
  - luchas poderosas
  - luchas de gran intensidad
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y probablemente idiomática. Conservé el genitivo «de Dios» porque el audit trail inglés lo mantuvo en la revisión más reciente y porque en español preserva mejor el vínculo formal con el hebreo y el juego de palabras con Naftalí. «Luchas de Dios» suena menos natural que otras opciones, pero es más auditable y no borra la tensión semántica del hebreo.
- source_word: נִפְתַּלְתִּי
  english_pob_choice: I have wrestled
  chosen_spanish: he luchado
  alternatives_spanish:
  - he wrestleado
  - he forcejeado
  - he peleado
  lexicon: HALOT
  rationale: En español, «he luchado» transmite una contienda real y digna sin sonar artificial. «He wrestleado» es inaceptable en registro bíblico; «he forcejeado» es más físico pero menos natural en esta construcción nominal-verbal. Se mantiene la idea de lucha vinculada al nombre Naftalí.
- source_word: עִם אֲחֹתִי
  english_pob_choice: with my sister
  chosen_spanish: con mi hermana
  alternatives_spanish:
  - contra mi hermana
  - frente a mi hermana
  lexicon: HALOT
  rationale: El hebreo עִם normalmente es «con», aunque el contexto es competitivo. Sigo la lectura directa «con mi hermana» porque el matiz adversarial ya queda expresado por «luchas» y «he luchado». «Contra» explicita demasiado una inferencia contextual.
- source_word: גַּם יָכֹלְתִּי
  english_pob_choice: and I have also prevailed
  chosen_spanish: y también he prevalecido
  alternatives_spanish:
  - y también he vencido
  - y también he salido vencedora
  - y también he podido
  lexicon: HALOT
  rationale: «Prevalecido» conserva el sentido de superar o salir adelante en una rivalidad, y mantiene el paralelismo con la versión inglesa POB. «He vencido» es posible, pero «prevalecido» deja menos ambigua la idea de éxito sin imponer una derrota total al otro lado.
- source_word: וַתִּקְרָא שְׁמוֹ נַפְתָּלִי
  english_pob_choice: So she called his name Naphtali
  chosen_spanish: Por eso llamó su nombre Naftalí
  alternatives_spanish:
  - Así que llamó su nombre Naftalí
  - Y llamó su nombre Naftalí
  - Por eso le puso por nombre Naftalí
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se vierte de manera bíblica y transparente. «Llamó su nombre» mantiene la relación formal entre el acto de nombrar y el nombre dado; «le puso por nombre» sería más idiomático, pero menos cercano a la estructura fuente.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Naftalí
  alternatives_spanish:
  - Neftalí
  lexicon: standard transliteration
  rationale: Se usa la transliteración usual en español bíblico como forma de nombre propio. «Naftalí» preserva mejor la relación sonora con נפתל/נפתולים que una adaptación más castellanizada.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la expresión נַפְתּוּלֵי אֱלֹהִים
  english_pob_reading: The English POB revised from 'mighty wrestlings' to the more literal 'wrestlings of God,' preserving the ambiguity and wordplay.
  chosen_spanish_reading: «luchas de Dios»
  alternative_spanish_readings:
  - «luchas divinas»
  - «luchas poderosas»
  rationale: No se resuelve la ambigüedad a favor de una sola interpretación. La traducción conserva la posibilidad de un genitivo literal («de Dios») y deja abierta la lectura idiomática intensiva, como en el audit trail inglés. Así se evita borrar la tensión teológica y lexical del hebreo.
  doctrine_reference: Principio de transparencia textual y reserva interpretativa; cf. nota lexical sin dogmatizar el valor exacto del constructo.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una interpretación más idiomática («mighty wrestlings») a una más literal («wrestlings of God»). La redacción española sigue la revisión más reciente para conservar la transparencia frente al hebreo y el juego de palabras con Naftalí, manteniendo la nota alternativa donde corresponde.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Naftalí» como transliteración bíblica estándar y coherente con el resto del corpus.
  - Se usa «prevalecido» para respetar el matiz competitivo sin introducir una victoria absoluta que el hebreo no explicita.
  - La nota al pie está anclada en la expresión problemática, como exige el registro auditable.
