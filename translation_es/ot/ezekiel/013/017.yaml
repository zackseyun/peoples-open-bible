translation:
  language: es
  text: Y tú, hijo de hombre, pon tu rostro contra las hijas[a] de tu pueblo, las que profetizan de sus propios corazones[b], y profetiza contra ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las mujeres de tu pueblo'. El hebreo dice literalmente 'las hijas de tu pueblo', y se conserva esa formulación para reflejar el detalle específico del original.
    reason: lexical_alternative
  - marker: b
    text: '''De sus propios corazones'' indica que su mensaje nace de ellas mismas, no de Yahvé.'
    reason: cultural_note
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva el apelativo fijo y repetido de Ezequiel, que en español se entiende de manera natural y mantiene la forma idiomática del original sin suavizarlo.
- source_word: שִׂים פָּנֶיךָ אֶל
  english_pob_choice: set your face against
  chosen_spanish: pon tu rostro contra
  alternatives_spanish:
  - dirige tu rostro contra
  - vuelve tu rostro contra
  lexicon: HALOT
  rationale: En español, 'poner el rostro contra' comunica bien la fuerza adversativa del hebreo en un contexto de juicio. 'Contra' queda explícito por el paralelo inmediato 'profetiza contra ellas.'
- source_word: בְּנוֹת עַמְּךָ
  english_pob_choice: the daughters of your people
  chosen_spanish: las hijas de tu pueblo
  alternatives_spanish:
  - las mujeres de tu pueblo
  lexicon: HALOT
  rationale: Se mantiene 'hijas' porque el hebreo dice literalmente 'hijas' y la POB inglesa preserva esa precisión frente a una generalización a 'women'. Esto respeta la referencia específica del texto.
- source_word: הַמִּתְנַבְּאוֹת
  english_pob_choice: who prophesy
  chosen_spanish: las que profetizan
  alternatives_spanish:
  - las que están profetizando
  - las que ejercen de profetisas
  lexicon: HALOT
  rationale: El participio expresa actividad profética característica. 'Las que profetizan' es natural en español y conserva la acción verbal sin añadir valoraciones que el versículo no explicita.
- source_word: מִלִּבְּהֶן
  english_pob_choice: out of their own hearts
  chosen_spanish: de su propio corazón
  alternatives_spanish:
  - desde su propio corazón
  - de su propio interior
  - de su propia mente
  lexicon: HALOT
  rationale: '''Corazón'' reproduce el campo semántico hebreo de לֵב como centro interior de pensamiento e intención. Se omite ''propio'' solo en términos de estilo repetitivo, pero se conserva en singular colectivo para reflejar que el origen del mensaje está en ellas mismas.'
- source_word: וְהִנָּבֵא עֲלֵיהֶן
  english_pob_choice: and prophesy against them
  chosen_spanish: y profetiza contra ellas
  alternatives_spanish:
  - y habla proféticamente contra ellas
  lexicon: HALOT
  rationale: '''Profetiza contra ellas'' reproduce el mandato imperativo y la fuerza hostil de עַל en contexto de juicio. Se evita una perífrasis menos directa.'
theological_decisions:
- issue: Caracterización de la profecía de las mujeres
  english_pob_reading: Render them as 'who prophesy' without adding 'falsely' in the main text.
  chosen_spanish_reading: Se traduce 'las que profetizan' sin añadir 'falsamente' en el texto principal.
  alternative_spanish_readings:
  - las que profetizan falsamente
  - las que pretenden profetizar
  rationale: El hebreo del versículo no usa aquí un adverbio o calificación equivalente a 'falsamente'; la condena surge del contexto y de 'de su propio corazón'. Mantener la formulación simple evita importar al versículo una acusación que el hebreo no expresa de manera explícita.
  doctrine_reference: Principio de primacía del texto original; no añadir juicios interpretativos al enunciado básico.
translation_notes:
  revision_awareness: La versión española sigue el juicio de alta concordancia del audit trail inglés y conserva la estructura retórica del versículo, sin introducir adiciones interpretativas. Se ajustó 'set your face against' a un español idiomático ('pon tu rostro contra') y se mantuvo la precisión de 'hijas' frente a una generalización.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del nombre divino en este proyecto, aunque en este versículo no aparece explícitamente.
  - Se mantiene 'profetiza' / 'profetizan' con el valor verbal directo del hebreo, sin sustituirlo por términos eclesiásticos más amplios.
  - '''Corazón'' se conserva por coherencia con el léxico hebreo de interioridad, evitando ''mente'' como reducción conceptual.'
