review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: convocatoria de Jehú por todo Israel, asistencia total de los adoradores de Baal, entrada en la casa de Baal y llenura completa del recinto. También preserva correctamente ‘adoradores de Baal’, ‘casa de Baal’ y el masculino representativo en ‘ningún hombre’. Sin embargo, ‘envió a todo Israel’ debilita el valor distributivo de בְּכָל יִשְׂרָאֵל (‘por/todo Israel’, ‘a través de todo Israel’) y puede sonar como objeto directo de envío. Además, ‘fue llena’ es gramaticalmente menos natural en español bíblico actual que ‘se llenó’ o ‘quedó llena’, sin pérdida del sentido pasivo/resultativo del nifal.'
  spanish_quality_summary: 'El texto es claro y mayormente digno y legible, pero requiere dos ajustes de naturalidad y precisión: ‘envió por todo Israel’ comunica mejor el alcance territorial de la convocatoria, y ‘se llenó’ es mucho más idiomático que ‘fue llena’ en español contemporáneo neutro. El resto del versículo fluye bien y conserva bien el tono narrativo.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Se mantiene ‘Baal’, ‘casa de Baal’ y ‘adoradores’. No aparece Yahvé ni otra terminología sensible del glosario. La decisión de conservar ‘hombre’ por אִישׁ concuerda con el audit trail inglés.
  issues:
  - severity: medium
    issue: ‘envió a todo Israel’ no expresa bien el distributivo de בְּכָל יִשְׂרָאֵל
    rationale: El hebreo indica que Jehú envió la convocatoria por todo Israel / a través de todo Israel, no que ‘envió a todo Israel’ como objeto directo. La redacción actual puede entenderse de forma ambigua o poco natural.
  - severity: medium
    issue: ‘fue llena’ suena forzado en español
    rationale: Aunque busca reflejar la pasividad del nifal, en español bíblico legible ‘se llenó’ o ‘quedó llena’ comunica mejor el resultado y sigue siendo fiel al sentido. ‘Fue llena’ resulta poco idiomático.
  revised_spanish_text: Así que Jehú envió por todo Israel[a], y vinieron todos los adoradores de Baal; no quedó ningún hombre que no viniera. Entraron en la casa de Baal, y la casa de Baal se llenó de un extremo al otro.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, ‘boca a boca’, un modismo que significa que la casa quedó completamente llena, de un extremo al otro.
    reason: lexical_alternative
