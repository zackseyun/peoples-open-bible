  yaml_path: translation/ot/exodus/023/033.yaml
  text: They must not dwell in your land[a], lest they cause you to sin against me; for if you serve their gods[c][b], it will surely become a snare to you.
  footnotes:
  - marker: a
    text: Or, 'they make you sin against me' or 'they lead you into sin against me.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for you would serve their gods'; the Hebrew conjunction can be understood as explanatory, and the clause may be read as the likely outcome rather than a simple condition.
    reason: alternative_reading
  - marker: c
    text: '''Snare'' translates Hebrew moqesh, a trap metaphorically describing something that leads to ruin or apostasy.'
    reason: cultural_note
