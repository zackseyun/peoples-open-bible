review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: genealogía, función cortesana/oficial y el alcance administrativo de ''todo asunto ... al pueblo''. También preserva correctamente las alternativas documentadas en las notas. Sin embargo, hay un ajuste menor necesario de naturalidad y precisión estilística en español.'
  spanish_quality_summary: La redacción es mayormente clara y fiel, pero 'estaba al lado del rey' suena algo física y temporal en español, menos idiomática para un cargo oficial. 'Estaba junto al rey' o una formulación similar conserva la imagen sin sonar tan coloquial. Además, 'concerniente al pueblo' es comprensible pero algo rígido; 'relacionado con el pueblo' o 'referente al pueblo' sería más natural, aunque la forma actual sigue siendo aceptable. Se propone una revisión mínima.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien, y no aparecen términos teológicos sensibles. La nota sobre 'a la mano del rey' preserva adecuadamente el trasfondo lexical del hebreo לְיַד.
  issues:
  - severity: medium
    issue: '''estaba al lado del rey'' puede sonar demasiado físico/coloquial para una función oficial'
    rationale: לְיַד הַמֶּלֶךְ es idiomático y el inglés auditado eligió 'at the king’s side' como suavización formal. En español, 'al lado del rey' puede evocar mera ubicación espacial; 'junto al rey' mantiene mejor la dignidad y deja abierta la noción de servicio oficial.
  - severity: low
    issue: '''concerniente al pueblo'' es algo forzado en español actual'
    rationale: Aunque es fiel, suena menos natural en registro bíblico moderno ampliamente legible. 'relacionado con el pueblo' comunica bien el valor administrativo sin cerrar la ambigüedad preservada por la nota.
  revised_spanish_text: Y Petaías, hijo de Meshezabel, de los hijos de Zérah, hijo de Judá, estaba[a] junto al rey para todo asunto[b] relacionado con el pueblo.
  revised_footnotes:
  - marker: a
    text: O 'a la mano del rey'; el hebreo literalmente dice 'a la mano del rey'. La frase puede indicar cercanía cortesana o función oficial.
    reason: lexical_alternative
  - marker: b
    text: O 'para el pueblo'. El hebreo puede significar asuntos relacionados con el pueblo o asuntos tratados en nombre del pueblo.
    reason: lexical_alternative
  revision_rationale: Se hizo una revisión menor para mejorar la naturalidad y la precisión idiomática en español sin apartarse del hebreo ni del audit trail inglés. 'Junto al rey' conserva mejor el matiz de cercanía/oficio que 'al lado del rey', y 'relacionado con el pueblo' suena más natural que 'concerniente al pueblo' manteniendo la misma ambigüedad básica documentada en la nota.
