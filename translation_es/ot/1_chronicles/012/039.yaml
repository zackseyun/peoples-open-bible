translation:
  language: es
  text: Todos estos eran hombres de guerra[a], dispuestos para la batalla, que vinieron a Hebrón con corazón íntegro para hacer rey a David sobre todo Israel; y también todo el resto de Israel, de un solo corazón, para hacer rey a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los hombres de guerra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי מִלְחָמָה
  english_pob_choice: men of war
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - guerreros
  - hombres de combate
  lexicon: HALOT
  rationale: La construcción nominal hebrea es literalmente ‘hombres de guerra’. ‘Hombres de guerra’ conserva de forma transparente el matiz masculino y militar que el POB inglés quiso preservar; ‘guerreros’ sería posible, pero menos cercano al molde formal del original.
- source_word: עֹדְרֵי מַעֲרָכָה
  english_pob_choice: arrayed for battle
  chosen_spanish: dispuestos para la batalla
  alternatives_spanish:
  - alineados para la batalla
  - formados para la batalla
  - preparados para la batalla
  lexicon: HALOT
  rationale: El participio describe a quienes ordenan o disponen la formación de combate. ‘Dispuestos para la batalla’ comunica la idea de preparación y alineación militar en un español natural sin perder la referencia a la formación.
- source_word: בְּלֵבָב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con corazón íntegro
  alternatives_spanish:
  - con un corazón entero
  - con corazón indiviso
  - de todo corazón
  lexicon: HALOT
  rationale: ‘Corazón íntegro’ conserva la metáfora del corazón y expresa integridad/completitud de intención. ‘De todo corazón’ sería más idiomático, pero debilita un poco el valor sustantivo de la imagen hebrea.
- source_word: בָּאוּ חֶבְרוֹנָה
  english_pob_choice: came to Hebron
  chosen_spanish: vinieron a Hebrón
  alternatives_spanish:
  - fueron a Hebrón
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el lugar. ‘Vinieron a Hebrón’ es natural en narración histórica y conserva la dirección del verbo hebreo.
- source_word: לְהַמְלִיךְ אֶת דָּוִיד
  english_pob_choice: to make David king
  chosen_spanish: para hacer rey a David
  alternatives_spanish:
  - para coronar a David rey
  - para proclamar rey a David
  lexicon: HALOT
  rationale: El hifil de מלך significa ‘hacer reinar’ o ‘instalar como rey’. ‘Hacer rey a David’ sigue de cerca el valor causal sin añadir la ceremonia de una coronación que el hebreo no explicita.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre la totalidad de Israel
  lexicon: HALOT
  rationale: Es la fórmula normal de dominio real sobre la nación. ‘Sobre todo Israel’ es breve, claro y fiel al alcance del gobierno davídico.
- source_word: כָּל שֵׁרִית יִשְׂרָאֵל
  english_pob_choice: all the rest of Israel
  chosen_spanish: todo el resto de Israel
  alternatives_spanish:
  - todo el remanente de Israel
  - todo lo restante de Israel
  lexicon: HALOT
  rationale: Aquí שֵׁרִית funciona en sentido narrativo de ‘lo que queda/el resto’, no como tecnicismo profético de ‘remanente’. ‘Resto’ evita cargar el texto con un matiz teológico que el contexto inmediato no exige.
- source_word: לֵב אֶחָד
  english_pob_choice: of one heart
  chosen_spanish: de un solo corazón
  alternatives_spanish:
  - con un solo corazón
  - unidos de corazón
  - de un mismo corazón
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘corazón uno’. ‘De un solo corazón’ preserva la metáfora y mantiene la idea de unanimidad interior que el POB inglés expresó como ‘of one heart’.
theological_decisions:
- issue: Posible sobretono teológico de שֵׁרִית ('remnant')
  english_pob_reading: Rendered contextually as 'all the rest of Israel' rather than 'all the remnant of Israel.'
  chosen_spanish_reading: Traducido contextualmente como 'todo el resto de Israel', no como 'todo el remanente de Israel'.
  alternative_spanish_readings:
  - todo el remanente de Israel
  rationale: Aunque שֵׁרִית puede tener peso teológico en literatura profética, aquí el contexto es histórico-narrativo y habla de los grupos presentes para apoyar a David. ‘Resto’ evita importar una terminología técnica de ‘remanente’ que el versículo no subraya.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal. El contenido sigue el audit trail en inglés, sin cambios de sentido respecto a la revisión más reciente ni a la concordancia alta del control cruzado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando el texto no lo requiere aquí.
  - Se preserva el paralelismo ‘hombres de guerra / dispuestos para la batalla / con corazón íntegro / de un solo corazón’.
  - ‘Hacer rey a David’ conserva el valor causativo del hifil sin añadir ceremoniales no explícitos.
