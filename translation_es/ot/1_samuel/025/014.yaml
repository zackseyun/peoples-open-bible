base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/014.yaml
  text: But one of the young men told Abigail[a], Nabal’s wife, saying, “Look, David sent messengers from the wilderness to greet our master[b], and he shouted at them.”
  footnotes:
  - marker: a
    text: Or 'to bless our master.' The Hebrew verb often means 'bless,' but here likely refers to offering a courteous greeting or blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he railed at them' / 'he flew at them.' The Hebrew verb is vivid and can suggest an aggressive outburst.
    reason: lexical_alternative
