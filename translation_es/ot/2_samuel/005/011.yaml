translation:
  language: es
  text: Y Hiram, rey de Tiro, envió mensajeros[a] a David, y madera de cedro, y artesanos de madera, y artesanos de mampostería de piedra[b]; y edificaron una casa para David[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘embajadores’. La palabra hebrea puede referirse a mensajeros ordinarios o a enviados diplomáticos.
    reason: lexical_alternative
  - marker: b
    text: O ‘albañiles’. El hebreo incluye literalmente ‘piedra’ y ‘muro’, es decir, artesanos de construcción en piedra para muros.
    reason: lexical_alternative
  - marker: c
    text: O ‘un palacio para David’. El hebreo dice literalmente ‘una casa’, que en un contexto real puede referirse a una residencia palaciega.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Verbo narrativo simple y natural en español; conserva el valor de envío sin sobrecargar el estilo.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Juram
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: מֶלֶךְ צֹר
  english_pob_choice: king of Tyre
  chosen_spanish: rey de Tiro
  alternatives_spanish:
  - el rey de Tiro
  lexicon: HALOT
  rationale: Construcción de posesión/identidad en castellano natural, manteniendo el topónimo tradicional de צֹר como Tiro.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: ‘Mensajeros’ cubre el sentido básico y deja abierta la posible función diplomática sin imponerla.
- source_word: וַעֲצֵי אֲרָזִים
  english_pob_choice: cedar wood
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - cedro
  - madera de cedro
  lexicon: HALOT
  rationale: La secuencia hebrea literalmente expresa madera/cedros; ‘madera de cedro’ es clara y fiel, evitando concretar innecesariamente troncos o vigas.
- source_word: וְחָרָשֵׁי עֵץ
  english_pob_choice: craftsmen of wood
  chosen_spanish: artesanos de madera
  alternatives_spanish:
  - carpinteros
  - trabajadores de la madera
  lexicon: HALOT
  rationale: ‘Artesanos’ mantiene el valor amplio de חָרָשׁ, más general que ‘carpinteros’.
- source_word: וְחָרָשֵׁי אֶבֶן קִיר
  english_pob_choice: craftsmen of stone masonry
  chosen_spanish: artesanos de piedra de muro
  alternatives_spanish:
  - canteros
  - albañiles
  - artesanos de mampostería
  lexicon: HALOT
  rationale: Se preservan explícitamente ‘piedra’ y ‘muro’, como en el hebreo, sin borrar la tensión léxica del compuesto. La forma resulta algo menos idiomática, pero más auditably cercana al original.
- source_word: וַיִּבְנֽוּ
  english_pob_choice: they built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: HALOT
  rationale: Verbo elevado y natural en contexto de edificación real; conserva el plural de acción conjunta.
- source_word: בַיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un palacio
  - una casa real
  lexicon: HALOT
  rationale: Se mantiene el sustantivo básico ‘casa’, siguiendo la decisión auditada de no introducir ‘palacio’ en el texto principal sin que el hebreo lo diga explícitamente.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - en favor de David
  - para uso de David
  lexicon: HALOT
  rationale: Dativo sencillo de beneficio/destino; ‘para’ es la equivalencia más directa en español.
theological_decisions:
- issue: bַיִת en contexto real puede sugerir residencia palaciega, pero el hebreo usa el término básico
  english_pob_reading: a house for David, with a footnote allowing ‘a palace’ as contextual alternative
  chosen_spanish_reading: una casa para David, con nota que permite ‘un palacio’ como alternativa contextual
  alternative_spanish_readings:
  - un palacio para David
  - una residencia para David
  rationale: Se conserva la literalidad del sustantivo y, a la vez, se informa la posibilidad contextual sin ocultarla, siguiendo el audit trail inglés.
  doctrine_reference: Principio de transparencia léxica; no se trata de una cuestión doctrinal sino de alcance semántico.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés más reciente, incorporando la revisión que prefirió una traducción más general para ‘cedar wood’ y una formulación más natural para el campo de construcción en piedra. El español mantiene la tensión entre literalidad y claridad sin borrar las alternativas documentadas.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por defecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantuvo ‘mensajeros’ como término principal, con alternativa diplomática en nota.
  - ‘Casa’ se conservó en el texto principal para reflejar בַיִת, sin imponer ‘palacio’ en el cuerpo del versículo.
  - La puntuación y el ritmo siguen una cadencia bíblica formal, pero en español contemporáneo.
