id: 2KI.2.2
reference: 2 Kings 2:2
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ אֵלִיָּ֨הוּ אֶל אֱלִישָׁ֜ע שֵֽׁב נָ֣א פֹ֗ה כִּ֤י יְהוָה֙ שְׁלָחַ֣/נִי עַד בֵּֽית אֵ֔ל וַ/יֹּ֣אמֶר אֱלִישָׁ֔ע חַי יְהוָ֥ה וְ/חֵֽי נַפְשְׁ/ךָ֖ אִם אֶעֶזְבֶ֑/ךָּ וַ/יֵּרְד֖וּ בֵּֽית אֵֽל־־־־־־־־׃
translation:
  text: And Elijah said to Elisha[a], “Please stay here, for Yahweh has sent me to Bethel.” But Elisha said, “As Yahweh lives, and as you live[b], I will not leave you.” So they went down to Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''has sent me as far as Bethel''; some translations simplify to ''has sent me to Bethel.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath formula: ''As the LORD lives, and as your life lives, if I leave you''—that is, ''I will not leave you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁב נָא פֹה
  chosen: Please stay here
  alternatives:
  - Please sit here
  - Remain here, please
  lexicon: HALOT
  rationale: שֵׁב from ישׁב can mean 'sit,' 'stay,' or 'remain' depending on context. Here Elijah is asking Elisha not to accompany him further, so 'stay here' best captures the situational sense in natural English. נָא adds politeness, rendered as 'please.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁלָחַנִי עַד בֵּית אֵל
  chosen: has sent me as far as Bethel
  alternatives:
  - has sent me to Bethel
  - has sent me unto Bethel
  lexicon: HALOT
  rationale: עַד often means 'as far as, up to.' Since the narrative traces successive stages of Elijah's journey, 'as far as Bethel' preserves the directional nuance better than the simpler 'to Bethel,' while remaining idiomatic.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard Hebrew oath formula. 'As the LORD lives' is the most natural and recognizable English equivalent that preserves the solemn force.
- source_word: וְחֵי נַפְשְׁךָ
  chosen: and as you yourself live
  alternatives:
  - and as your soul lives
  - and by your life
  lexicon: HALOT
  rationale: Literally 'and as your נפש lives.' In oath contexts, English normally expresses this as 'as you live' or 'by your life.' 'You yourself live' preserves the personal emphasis without importing a technical anthropology from 'soul' here.
- source_word: אִם אֶעֶזְבֶךָּ
  chosen: I will not leave you
  alternatives:
  - surely I will not leave you
  - if I leave you
  lexicon: HALOT
  rationale: 'After an oath, אִם can introduce an elliptical negative oath: ''if I leave you...'' meaning ''surely I will not leave you.'' English requires the implied negation to be made explicit for clarity.'
- source_word: וַיֵּרְדוּ
  chosen: they went down
  alternatives:
  - they descended
  - they went
  lexicon: HALOT
  rationale: ירד means 'go down/descend.' Because movement from the hill country toward Bethel is described, 'went down' preserves the directional element better than simply 'went'.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; names are transliterated per project philosophy.
