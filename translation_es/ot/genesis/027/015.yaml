translation:
  language: es
  text: Entonces Rebeca tomó las vestiduras escogidas de Esaú su hijo mayor[a], las cuales estaban con ella en la casa[b], y vistió a Jacob su hijo menor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las mejores vestiduras de Esaú».
    reason: lexical_alternative
  - marker: b
    text: O «que ella tenía en la casa»; el hebreo dice más literalmente «las cuales estaban con ella en la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: Then ... took
  chosen_spanish: Entonces ... tomó
  alternatives_spanish:
  - Y ... tomó
  - Luego ... tomó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» conserva la secuencia y suena natural en español bíblico moderno sin endurecer el flujo.
- source_word: בִּגְדֵי
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - vestidos
  lexicon: HALOT
  rationale: El plural constructo se refiere a prendas de vestir. «Vestiduras» mantiene un registro digno y claro, cercano a «garments» sin volverlo coloquial.
- source_word: הַחֲמֻדֹת
  english_pob_choice: choice
  chosen_spanish: escogidas
  alternatives_spanish:
  - las mejores
  - preciadas
  - deseables
  lexicon: HALOT
  rationale: El término expresa cualidad de ser deseable/valioso. «Escogidas» comunica que eran prendas seleccionadas y valiosas, sin exagerar la valoración material.
- source_word: בְּנוֹ הַגָּדֹל
  english_pob_choice: her older son
  chosen_spanish: su hijo mayor
  alternatives_spanish:
  - su hijo mayor de edad
  - su hijo mayorcito
  lexicon: HALOT
  rationale: En este contexto familiar, גָּדוֹל contrasta con קָטָן en orden de nacimiento. «Mayor» es la equivalencia natural en español.
- source_word: אֲשֶׁר אִתָּהּ בַּבָּיִת
  english_pob_choice: which were with her in the house
  chosen_spanish: las cuales estaban con ella en la casa
  alternatives_spanish:
  - las que tenía en la casa
  - que ella guardaba en la casa
  lexicon: HALOT
  rationale: La frase hebrea indica ubicación/tenencia de manera directa. «Estaban con ella en la casa» conserva la relación espacial sin añadir inferencias no explícitas.
- source_word: וַתַּלְבֵּשׁ
  english_pob_choice: put them on
  chosen_spanish: vistió a
  alternatives_spanish:
  - puso sobre
  - lo cubrió con
  lexicon: HALOT
  rationale: El verbo significa vestir o poner ropa a alguien. En español, con objeto personal expreso, «vistió a Jacob» es natural y fiel al acto descrito.
- source_word: בְּנוֹ הַקָּטָן
  english_pob_choice: her younger son
  chosen_spanish: su hijo menor
  alternatives_spanish:
  - su hijo más joven
  - su hijo pequeño
  lexicon: HALOT
  rationale: Aquí קָטָן contrasta con el hermano mayor, no con tamaño físico. «Menor» es la mejor equivalencia de orden de nacimiento.
translation_notes:
  revision_awareness: 'No se requirieron revisiones respecto del último pase: el texto hebreo y el audit trail inglés muestran alta concordancia, con diferencias menores de matiz léxico para el español.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «hijo mayor/menor» para reflejar el contraste de edad/orden del hebreo בין גָּדוֹל y קָטָן.
  - Se prefirió un registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
