translation:
  language: es
  text: Y los entregó sometidos a todos los reinos que están alrededor de nosotros, para reproche y desolación[a] entre todos los pueblos alrededor de quienes Yahvé los dispersó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lugar inaccesible». El término griego traducido «desolación» puede denotar más literalmente algo no hollado o no accesible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν
  english_pob_choice: gave ... over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los entregó a
  lexicon: BDAG
  rationale: El verbo aquí no expresa un dar neutral, sino una entrega a poder ajeno en contexto de juicio. «Entregó» conserva esa fuerza en español sin sonar mecánico.
- source_word: ὑποχειρίους
  english_pob_choice: as subjects
  chosen_spanish: como sujetos
  alternatives_spanish:
  - sometidos
  - bajo el poder de
  lexicon: LSJ
  rationale: La idea es de subyugación política o de dominio. «Como sujetos» reproduce la relación de sujeción con claridad y evita un giro demasiado explicativo.
- source_word: πάσαις ταῖς βασιλείαις
  english_pob_choice: to all the kingdoms
  chosen_spanish: a todos los reinos
  alternatives_spanish:
  - a todos los reinos
  - a cada reino
  lexicon: BDAG
  rationale: «Reinos» conserva el plural político del griego y su amplitud colectiva.
- source_word: ταῖς κύκλῳ ἡμῶν
  english_pob_choice: around us
  chosen_spanish: que están alrededor de nosotros
  alternatives_spanish:
  - alrededor de nosotros
  - que nos rodean
  lexicon: BDAG
  rationale: La frase desarrolla la idea espacial de circundación. En español, «que están alrededor de nosotros» mantiene la relación adverbial sin perder naturalidad.
- source_word: εἰς ὀνειδισμόν
  english_pob_choice: for reproach
  chosen_spanish: para reproche
  alternatives_spanish:
  - para afrenta
  - para oprobio
  lexicon: BDAG
  rationale: «Reproche» conserva el matiz de vergüenza pública y censura comunitaria que tiene ὀνειδισμός en contexto bíblico.
- source_word: ἄβατον
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - lugar inaccesible
  - para no ser hollado
  lexicon: LSJ
  rationale: Aunque el término puede sugerir lo no transitado o inaccesible, aquí funciona en un cuadro de juicio y ruina. «Desolación» preserva ese sentido contextual sin borrar la tensión léxica, que queda documentada en la nota.
- source_word: λαοῖς
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: BDAG
  rationale: «Pueblos» mantiene la referencia étnica y colectiva del griego mejor que una traducción más estatal como «naciones».
- source_word: διέσπειρεν
  english_pob_choice: scattered
  chosen_spanish: dispersó
  alternatives_spanish:
  - esparció
  - desparramó
  lexicon: BDAG
  rationale: En contexto de exilio, «dispersó» es una equivalencia natural y fiel al verbo de esparcimiento forzado.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Aunque el contexto griego usa κύριος, aquí corresponde el nombre divino por el vínculo del texto con la designación del Dios de Israel. Se preserva la transparencia del proyecto y la identificación del agente del destierro.
theological_decisions:
- issue: Identificación del agente del juicio en κύριος
  english_pob_reading: the Lord scattered them there
  chosen_spanish_reading: Yahvé los dispersó allí
  alternative_spanish_readings:
  - el Señor los dispersó allí
  - Dios los dispersó allí
  rationale: Se mantiene la atribución explícita del destierro a Dios como acto de juicio histórico. «Yahvé» es la forma preferida del proyecto para el nombre divino, y aquí evita la ocultación del nombre tras una traducción genérica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / κύριος → Yahvé / Lord'
- issue: Valor contextual de ἄβατον
  english_pob_reading: desolation
  chosen_spanish_reading: desolación
  alternative_spanish_readings:
  - lugar inaccesible
  - desierto
  rationale: El griego puede sugerir algo no transitado o inaccesible; sin embargo, dentro del paralelo con «reproche» y del marco de exilio, la mejor equivalencia es una condición de ruina. La nota conserva la alternativa lexical sin imponerla al texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El español sigue el ajuste final del inglés auditado: se evita repetir «alrededor de nosotros» en la última cláusula y se expresa «alrededor de quienes» para reflejar más de cerca el relativo griego οὗ. También se conserva el matiz de juicio del verbo principal y la tensión léxica de ἄβατον en una nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en el texto principal, conforme al estándar del proyecto.
  - «Pueblos» se usa para λαοῖς, reservando «naciones» para contextos más estatales o políticos cuando el griego lo exija.
  - «Desolación» se emplea como traducción contextual de ἄβατον, con nota que preserva la alternativa más literal.
  - La puntuación y el orden de las cláusulas buscan seguir de cerca la sintaxis griega sin sonar forzados en español.
