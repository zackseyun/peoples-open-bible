revisions:
- from: Estos son los [a] descendientes de Aarón y de Moisés, en el día en que Yahvé habló[a] a Moisés en el monte Sinaí[b][c].
  to: Estas son las generaciones[a] de Aarón y de Moisés, en el día en que Yahvé habló a Moisés[b] en el monte Sinaí[c].
  rationale: Se revisa para alinearse con la decisión lexical y teológica documentada para תּוֹלְדֹת, preservando «generaciones» en vez de resolverlo como «descendientes». También se corrigen los marcadores de notas para que sean únicos y se anclen a los elementos correctos del texto.
