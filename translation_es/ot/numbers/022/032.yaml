base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/032.yaml
  text: And the angel of Yahweh said to him[a], “Why have you struck your donkey these three times? Look, I have come out as an adversary[b], because your way is perverse before me.”
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן here means 'adversary' or 'opponent,' not necessarily the proper name 'Satan.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'is reckless' is rare and may also be understood as 'is perverse' or 'is contrary.'
    reason: alternative_reading
