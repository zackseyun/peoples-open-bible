  text: καὶ ὅτι ὤφθη Κηφᾷ, εἶτα τοῖς δώδεκα·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/005.yaml
  text: and that he appeared to Cephas[c][b][a], then to the twelve.
  footnotes:
  - marker: a
    text: Or 'he was seen by Cephas.' The Greek verb is formally passive, but in resurrection-appearance contexts it is commonly rendered 'appeared.'
    reason: lexical_alternative
  - marker: b
    text: Cephas is the Aramaic name corresponding to Peter.
    reason: cross_reference
  - marker: c
    text: '''The twelve'' is the established designation for Jesus''s apostolic circle, even though the group was not numerically twelve at every moment.'
    reason: cultural_note
translation:
  language: ko
  text: 게바에게 보이시고, 그 뒤에 열두 제자에게 보이셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 게바는 베드로의 아람어 이름이다.
    reason: cross_reference
  - marker: b
    text: 「열둘」은 예수의 사도단을 가리키는 정형 호칭으로, 매 순간 수가 정확히 12명이 아니더라도 유지된다.
    reason: cultural_note
