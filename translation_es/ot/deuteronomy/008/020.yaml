translation:
  language: es
  text: Como las naciones que Yahvé está destruyendo delante de ustedes, así perecerán ustedes, porque no escucharon la voz de Yahvé su Dios.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedecieron a Yahvé su Dios». El hebreo dice literalmente «escuchar la voz de Yahvé su Dios», una expresión que a menudo incluye la idea de obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּגּוֹיִם
  english_pob_choice: Like the nations
  chosen_spanish: Así como las naciones
  alternatives_spanish:
  - Como las naciones
  - Al igual que las naciones
  lexicon: HALOT
  rationale: כְּ introduce comparación; en este contexto גּוֹיִם se refiere a los pueblos paganos de la tierra. «Las naciones» es natural en español bíblico y conserva la referencia colectiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva el nombre divino como «Yahvé», siguiendo la convención del proyecto y evitando la sustitución por un título.
- source_word: מַאֲבִיד
  english_pob_choice: is destroying
  chosen_spanish: está destruyendo
  alternatives_spanish:
  - está haciendo perecer
  - está aniquilando
  - está borrando
  lexicon: HALOT
  rationale: El participio hifil de אבד expresa destrucción causativa con sentido actual o inminente. «Está destruyendo» mantiene ese valor verbal y suena natural en español.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - de delante de ustedes
  - ante ustedes
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente habla de ser quitados «de delante de» Israel. «Delante de ustedes» conserva la imagen sin sonar forzado; «de delante de ustedes» sería más literal pero menos fluido.
- source_word: תֹאבֵדוּן
  english_pob_choice: you will perish
  chosen_spanish: ustedes perecerán
  alternatives_spanish:
  - ustedes desaparecerán
  - ustedes serán destruidos
  lexicon: HALOT
  rationale: אָבַד en qal aquí anuncia la ruina del pueblo. «Perecerán» preserva el vínculo léxico con «destruyendo» y mantiene la solemnidad del aviso.
- source_word: עֵקֶב
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - en razón de que
  lexicon: HALOT
  rationale: Introduce la razón del juicio. «Porque» es la equivalencia más clara y natural en español.
- source_word: לֹא תִשְׁמְעוּן
  english_pob_choice: you did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no obedecieron
  - no oyeron
  - no prestaron atención
  lexicon: HALOT
  rationale: שׁמע con negación y con בְּקוֹל puede llevar la carga de escuchar/obedecer. «No escucharon» conserva la metáfora auditiva del hebreo sin resolverla de manera demasiado interpretativa; el pasado refleja la forma idiomática del reproche profético/alianzal.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - el mandato de
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea «escuchar la voz de», que en contexto también implica obediencia. Esto mantiene el matiz de la fórmula de pacto.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, el suyo
  - su Dios de ustedes
  lexicon: HALOT
  rationale: 'Con יְהוָה y el sufijo plural de segunda persona, el referente es singular: el Dios del pacto de Israel. En español, «su Dios» comunica esa relación; el contexto hispano admite el pronombre respetuoso/plural de ustedes como referente colectivo.'
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el nombre del pacto. Se mantiene como «Yahvé» para no ocultar el Tetragrámaton bajo un título y para ser coherentes con la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Cómo traducir שׁמע בְקוֹל: “listen” o “obey”'
  english_pob_reading: listen to the voice
  chosen_spanish_reading: no escucharon la voz de Yahvé
  alternative_spanish_readings:
  - no obedecieron a Yahvé
  - no prestaron atención a la voz de Yahvé
  rationale: El hebreo mantiene una tensión entre oír y obedecer. «Escuchar la voz» preserva la imagen literal y deja visible la dimensión de obediencia sin resolverla por completo en una sola glosa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'Revisado a la luz del último pase de revisión: no se requirieron cambios sustantivos; se conservó la estructura comparativa «Así como... así...» y la tensión lexical de שׁמע בְקוֹל mediante «escuchar la voz».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, en coherencia con el estándar del proyecto.
  - Se usó «perecerán» para reflejar el vínculo léxico con «destruyendo» y el campo semántico de אבד.
  - «Su Dios» traduce el sufijo plural con un posesivo natural en español y conserva el referente singular del pacto.
  - La nota al pie marca la alternativa de obediencia sin reemplazar la lectura principal.
