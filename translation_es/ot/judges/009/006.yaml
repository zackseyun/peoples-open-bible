    issue: '''dueños de Siquem'' para בַּעֲלֵי שְׁכֶם'
    rationale: En español induce una lectura de propiedad literal y no comunica bien el sentido cívico-político de los hombres principales de la ciudad. La evidencia y la auditoría favorecen 'jefes' o 'líderes'.
  - severity: high
    issue: '''roble[p] erigido'' para אֵלוֹן מֻצָּב'
    rationale: La redacción desplaza 'erigido' al árbol y pierde el valor nominal de מֻצָּב como objeto/monumento/pilar asociado al árbol. El hebreo es difícil, pero el texto principal debe mantener una referencia concreta, con nota para alternativas.
  - severity: medium
    issue: Marcador de nota '[p]' no corresponde a ninguna nota
    rationale: Incumple el formato requerido y hace inválida la anotación del registro.
  - severity: low
    issue: '''proclamaron rey'' frente a ''hicieron rey'''
    rationale: '''Proclamaron rey'' no es necesariamente erróneo, pero ''hicieron rey'' refleja de manera más directa el hifil causativo de מלך y se alinea mejor con la traducción auditada.'
