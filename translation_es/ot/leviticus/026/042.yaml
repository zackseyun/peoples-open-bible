    issue: La nota al pie en español tiene formulación y puntuación poco naturales.
    rationale: 'Empieza con una comilla innecesaria antes de «O:», y la redacción puede ajustarse al español bíblico/editorial más natural: «O “Y recordaré”». Esto no cambia el sentido, pero sí la calidad final.'
  - severity: low
