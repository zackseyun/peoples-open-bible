translation:
  language: es
  text: El Señor Yahvé me abrió el oído; y yo no fui rebelde; no me eché atrás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no retrocedí»; también puede entenderse «no me volví atrás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: The Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אדני con el nombre divino יהוה. En español se conserva la distinción con «el Señor» para אדני y «Yahvé» para el nombre propio, evitando la repetición artificial «Señor SEÑOR» y preservando ambos elementos del título compuesto.
- source_word: פָּתַח
  english_pob_choice: has opened
  chosen_spanish: me abrió
  alternatives_spanish:
  - ha abierto
  - abrió
  lexicon: HALOT
  rationale: El perfecto qal expresa una acción completada. En español, el pretérito simple suena natural en este testimonio profético y mantiene la concreción del acto de Dios sobre el profeta/siervo.
- source_word: לִי אֹזֶן
  english_pob_choice: my ear
  chosen_spanish: el oído
  alternatives_spanish:
  - mi oído
  - un oído para mí
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «para mí, un oído», el español bíblico natural prefiere «me abrió el oído». Se conserva la imagen corporal concreta sin volverla una paráfrasis abstracta como «me hizo escuchar».
- source_word: מָרִיתִי
  english_pob_choice: was not rebellious
  chosen_spanish: no fui rebelde
  alternatives_spanish:
  - no me rebelé
  - no resistí
  lexicon: HALOT
  rationale: «Rebelde» reproduce el valor de מרה y mantiene el matiz de actitud/estado que el inglés POB captó con «was not rebellious». En español, la forma copulativa suena más cercana al hebreo que un simple verbo de acción.
- source_word: אָחוֹר נְסוּגֹתִי
  english_pob_choice: did not turn back
  chosen_spanish: no me eché atrás
  alternatives_spanish:
  - no retrocedí
  - no di marcha atrás
  lexicon: HALOT
  rationale: El par hebreo expresa retroceso/repliegue. «No me eché atrás» es idiomático, conserva la metáfora de movimiento hacia atrás y corresponde al rango semántico de נסוג. También preserva la tensión del posible alternante «draw back».
theological_decisions:
- issue: Renderización del nombre divino יהוה en un título compuesto
  english_pob_reading: The Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: En la presente línea editorial, יהוה se vierte como «Yahvé». El compuesto con אֲדֹנָי se resuelve en español colocando primero el nombre propio divino y luego el título de soberanía, para evitar una secuencia redundante o extraña y mantener visible el valor teológico del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y la auditoría inglesa: mantiene el sujeto divino compuesto, el oído en singular y el doble movimiento de obediencia/no retroceso. No se aplicaron revisiones posteriores en el expediente, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto, no como sustituto reverencial oculto.
  - «No me eché atrás» preserva la imagen física de retroceso y evita suavizarla como mera negativa abstracta.
  - El singular «oído» se conserva porque el hebreo usa אֹזֶן en singular y la imagen es intencionalmente concreta.
