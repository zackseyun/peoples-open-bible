translation:
  text: '1[a]. And on the second day of the second week we brought to Adam, by the word of the Lord, all the beasts, and all the cattle, and all the birds, and everything that moves on the earth, and everything that moves in the waters, according to their kinds and according to their forms: the beasts on the first day, the cattle on the second day, the birds on the third day, and everything that moves on the earth on the fourth day, and what moves in the waters on the fifth day.

    2. And Adam gave names to them all, each by its own name; and as he called them, so was their name.

    3. And on these five days Adam saw them, male and female, according to every kind that was on the earth; but he was alone, and no helper like him was found for him.

    4. And the Lord said to us, “It is not good for the man to be alone; let us make for him a helper like him.” And the Lord our God caused a deep sleep to fall upon him, and he slept; and he took one rib from among his bones for the woman, and that rib was the origin of the woman from among his bones[b]; and he built flesh in its place, and built the woman.

    5. And he awakened Adam from his sleep, and when he awoke he rose on the sixth day, and he brought her to him.

    6. And he knew her and said to her, “This now is bone from my bones and flesh from my flesh. This one shall be called my woman, because she was taken from her man.”

    7. Therefore man and woman shall be one, and therefore a man shall leave his father and his mother and join himself to his wife, and they shall become one flesh.

    8. In the first week Adam was created, and the rib—his wife—was made; and in the second week he showed her to him. Therefore the commandment was given to keep, for a male, seven days, and for a female, two weeks of days, in impurity.

    9. And after forty days had been completed for Adam in the land where he had been created, we brought him into the garden of Eden, that he might till it and keep it; but his wife they brought in after eighty days, and after this she entered into the garden of Eden.

    10. Therefore the commandment was written on the heavenly tablets concerning her who gives birth: if she bears a male, she shall remain in her uncleanness seven days, according to the first seven days, and thirty-three days she shall remain in the blood of purification; she shall touch nothing holy, and she shall not enter the sanctuary

    11. until she completes these days for a male. But for a female: two weeks according to the first two weeks in uncleanness, and sixty-six days she shall remain in the blood of purification, and all together they shall be eighty days.

    12. And when she has completed these eighty days, we brought her into the garden of Eden, for it is holier than all the earth, and every tree that is planted in it is holy.

    13. Therefore there was ordained for her who bears a male or a female the statute of these days: she shall touch nothing holy, nor enter the sanctuary,

    14. until those days are completed for a male or for a female. This is the law and testimony that was written for Israel, that they should keep it all their days.

    15. And in the first week of the first jubilee Adam and his wife were in the garden of Eden for seven years, tilling and keeping it.

    16. And we gave him work, and we were instructing him in everything suitable for cultivation. And he was tilling, and he was naked and did not know it, and was not ashamed, and he kept the garden from the birds and from the beasts and from the cattle, and gathered its fruit and ate, and set aside the remainder

    17. for himself and for his wife, and stored what was being kept. And at the completion of the seven years which he had completed there, exactly seven years, in the second month, on the seventeenth day, the serpent came and approached the woman, and the serpent said to the woman, “Has God commanded you, saying, ‘You shall not eat from every tree of the garden’?”

    18. And she said to him, “From all the fruit of the trees of the garden God said to us, ‘Eat’; but from the fruit of the tree that is in the middle of the garden,

    19. God said to us, ‘Do not eat from it, and do not touch it, lest you die.’” And the serpent said to the woman, “You will not surely die,

    20. for God knows that on the day you eat from it your eyes will be opened, and you will be like gods, knowing good and evil.” And the woman saw the tree, that it was delightful and pleasing to the eyes, and its fruit was good

    21. for food; and she took from it and ate. And she covered her shame with fig leaves, and she gave also to Adam, and he ate.

    22. And his eyes were opened, and he saw that he was naked. And he took fig leaves and sewed them and made himself a covering, and covered his shame.

    23. And the Lord cursed the serpent and was angry with it forever. And with the woman also he was angry, because she listened to the voice of the serpent and ate; and he said to her, “I will greatly multiply your sorrow and your pain; in sorrow you shall bear children, and your return shall be to your husband, and he will rule over you.”

    24. And to Adam also he said, “Because you listened to the voice of your wife and ate from that tree from which I commanded you not to eat, cursed shall the ground be on your account. It shall produce thorns and thistles for you, and you shall eat your bread by the sweat of your face until you return to the ground from which you were taken; for you are earth, and to the earth you shall return.”

    25. And he made for them garments of skin, and clothed them, and sent them out from the garden of Eden.

    26. And on that day on which Adam went out from the garden, he burned incense as a sweet fragrance—frankincense, galbanum, stacte, and spices—in the morning with the rising of the sun, from the day when he covered his shame.

    27. And on that day the mouths of all the beasts and cattle and birds and whatever walks and whatever moves were closed from speech, for they all used to speak with one another, with one lip and one tongue.

    28. And he sent out from the garden of Eden all flesh that was in the garden of Eden, and all flesh was scattered, each according to its kind and according to its form, to the places that had been created for them.

    29. But to Adam alone he gave the ability to cover his shame, from among all the beasts and cattle.

    30. Therefore it was commanded on the heavenly tablets concerning all those who know the judgment of the law, that they should cover their shame and should not uncover themselves as the nations uncover themselves.

    31. And at the new moon of the fourth month Adam and his wife went out from the garden of Eden, and they dwelt in the land of Elda, in the land of their creation.

    32. And Adam called the name of his wife Eve.

    33. And they had no son until the first jubilee, and after this he knew her.

    34[c][d][e][f]. Now he tilled the land as he had been instructed in the garden of Eden.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez row numbering skips from verse 2 to 4, but the sense clearly includes a statement that during the five days Adam observed the creatures as male and female and found no helper corresponding to himself.
    reason: segmentation_note
    anchor_ref: '3:3'
  - marker: b
    text: The chapter links Adam's and the woman's delayed entrance into Eden with later postpartum impurity periods for male and female births.
    reason: cross_reference
    anchor_ref: '3:8'
  - marker: f
    text: 'The date is given precisely: second month, seventeenth day, after seven completed years in Eden. Jubilees regularly uses such chronology as part of its revelatory structure.'
    reason: cultural_note
    anchor_ref: '3:17'
  - marker: e
    text: '''Like gods'' could also be understood as ''like divine beings.'' The Ge''ez plural should be preserved rather than harmonized to a singular.'
    reason: alternative_reading
    anchor_ref: '3:20'
  - marker: d
    text: The list of aromatics is textually difficult in places, but the sense is a sweet incense offering made at sunrise after Adam covered his shame.
    reason: textual_variant
    anchor_ref: '3:26'
  - marker: c
    text: The place name rendered 'Elda' is uncertain in the Ethiopic transmission; the translation preserves a conventional transliteration of the likely proper name rather than forcing a meaning.
    reason: textual_variant
    anchor_ref: '3:31'
lexical_decisions:
- source_word: በበ ዘመዶሙ / በበ አምሳሎሙ
  chosen: according to their kinds and according to their forms
  alternatives:
  - by their families and by their likenesses
  - each by their species and appearance
  rationale: Jubilees echoes creation taxonomy language. 'Kinds' preserves classificatory force; 'forms' keeps the second term distinct rather than collapsing both into one English category.
- source_word: መርዳእ ዘከማሁ
  chosen: a helper like him
  alternatives:
  - a help corresponding to him
  - a helper matching him
  rationale: Keeps close to the Ge'ez and Genesis echo while remaining readable modern English.
- source_word: ዐጽመ
  chosen: rib
  alternatives:
  - bone
  - side
  rationale: Though literally 'bone,' the immediate context of taking one from among his bones and building the woman supports the traditional specific sense 'rib' here.
- source_word: ትእዛዝ
  chosen: commandment
  alternatives:
  - instruction
  - ordinance
  rationale: In this chapter the term grounds purity law in primordial revelation; 'commandment' preserves normative force.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: Standard, transparent rendering for Jubilees's revelatory motif; preserves the book's theological framework.
- source_word: ርኵስ / ርኵሳ
  chosen: impurity / uncleanness
  alternatives:
  - defilement
  rationale: Purity terminology should remain cultically recognizable. I varied between noun forms in English while preserving ritual sense.
- source_word: ደመ ንጽሓ፡
  chosen: blood of purification
  alternatives:
  - blood of cleansing
  - purifying blood
  rationale: Retains the technical purity-law phrase and its connection to Levitical legislation.
- source_word: መቅደስ
  chosen: sanctuary
  alternatives:
  - holy place
  - temple
  rationale: '''Sanctuary'' preserves cultic specificity without anachronistically implying the later Jerusalem temple alone.'
- source_word: ይትቀነይ / ቅኔ
  chosen: till / cultivation
  alternatives:
  - work
  - cultivate
  rationale: The context is agricultural tending of Eden; 'till' and 'cultivation' preserve that concrete sense.
- source_word: ዕራቁ
  chosen: naked
  alternatives:
  - bare
  rationale: Direct and idiomatic; also preserves the Edenic contrast with later shame.
- source_word: አርዌ ምድር
  chosen: serpent
  alternatives:
  - creature of the earth
  - earth-serpent
  rationale: The phrase literally includes 'of the earth,' but in context clearly denotes the serpent tempter. 'Serpent' is the clearest main-text rendering; the fuller nuance is noted in decisions.
- source_word: አማልክት
  chosen: gods
  alternatives:
  - divine beings
  - angels
  rationale: The plural is explicit. 'God' singular would over-harmonize; 'gods' preserves the provocative theological wording, with the possibility of 'divine beings' noted separately.
- source_word: ኀፍረት / ኀፍረቶ
  chosen: shame
  alternatives:
  - nakedness
  - private parts
  rationale: The term in this context points to the shameful area/nakedness. 'Shame' preserves the moral-experiential dimension emphasized in the chapter's clothing motif.
- source_word: አልባሰ ዘማዕስ
  chosen: garments of skin
  alternatives:
  - skin garments
  - leather garments
  rationale: Close, conventional, and faithful to the concrete image.
- source_word: አፈ ኵሉ ... እምነቢብ
  chosen: the mouths of all ... were closed from speech
  alternatives:
  - their speech ceased
  - their mouths were shut so that they no longer spoke
  rationale: Preserves Jubilees's distinctive claim that animals once spoke and then lost speech.
- source_word: ፍትሐ ሕግ
  chosen: the judgment of the law
  alternatives:
  - the rule of the law
  - the ordinance of the law
  rationale: A somewhat formal rendering is retained because the phrase sounds technical and authoritative in context.
- source_word: ሠርቀ ወርኅ
  chosen: new moon
  alternatives:
  - beginning of the month
  rationale: Preserves calendrical precision important in Jubilees.
- source_word: አእመራ
  chosen: knew
  alternatives:
  - had relations with
  - lay with
  rationale: Retains the biblical idiom for sexual union without flattening it into modern paraphrase.
theological_decisions:
- issue: Numbering and chapter segmentation in the Ethiopic row data
  chosen_reading: Rendered the extant material as 34 English verses, following the internal sense units rather than the corrupted row numbering alone.
  alternative_readings:
  - Compress into fewer verses following row numbers only
  rationale: The supplied Ge'ez rows contain merged and misnumbered segments. Preserving intelligible verse-by-verse English required reconstructing the obvious sense divisions while keeping the whole chapter intact.
  doctrine_reference: Preserve theological tension and document ambiguity; do not over-smooth textual difficulties.
- issue: Identity of አማልክት in the serpent's speech
  chosen_reading: Rendered as 'gods' in the main text.
  alternative_readings:
  - God
  - divine beings
  - angels
  rationale: The plural form is explicit in the Ge'ez. Rendering it singular would resolve the tension too quickly toward Genesis tradition. 'Gods' best preserves the wording while allowing readers to sense the ambiguity.
- issue: Status of Eden as cultically holy
  chosen_reading: 'Translated the chapter''s statements straightforwardly: Eden is ''holier than all the earth,'' and its trees are ''holy.'''
  alternative_readings:
  - Metaphorical holiness only
  - later temple language retrojected loosely
  rationale: Jubilees intentionally presents Eden in sanctuary terms and grounds later purity law in that primordial holiness. The translation preserves this theological architecture.
- issue: Animal speech before the fall
  chosen_reading: Translated literally that all animals formerly spoke and then their mouths were closed from speech.
  alternative_readings:
  - Figurative communication
  - mythic embellishment to be softened
  rationale: Jubilees makes a concrete claim here; the translation should not demythologize it.
