translation:
  language: es
  text: y estén preparados para el tercer día[a], porque al tercer día Yahvé descenderá a la vista de todo el pueblo en el monte Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante los ojos de todo el pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: and let them be
  chosen_spanish: y estén
  alternatives_spanish:
  - y sean
  - y permanezcan
  lexicon: HALOT
  rationale: En este contexto exhortativo, el hebreo funciona con fuerza injuntiva. En español, el subjuntivo exhortativo 'estén' comunica mejor la orden que un futuro o un indicativo literal.
- source_word: נְכֹנִים
  english_pob_choice: ready
  chosen_spanish: preparados
  alternatives_spanish:
  - listos
  - dispuestos
  lexicon: HALOT
  rationale: El adjetivo expresa estado de preparación para un acontecimiento sagrado. 'Preparados' mantiene la idea de readiness sin perder dignidad en español.
- source_word: לַיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: for the third day
  chosen_spanish: para el tercer día
  alternatives_spanish:
  - para el día tercero
  - de cara al tercer día
  lexicon: HALOT
  rationale: La preposición ל aquí señala la meta o el tiempo al que debe orientarse la preparación. 'Para el tercer día' conserva esa orientación sin desplazar el sentido hacia un simple plazo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la instrucción. 'Porque' es la equivalencia directa y clara en español contemporáneo.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - ese tercer día
  lexicon: HALOT
  rationale: Se mantiene el valor temporal del hebreo. 'En el tercer día' es natural y respeta la referencia al momento en que ocurre la acción divina.
- source_word: יֵרֵד
  english_pob_choice: will come down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - vendrá abajo
  lexicon: HALOT
  rationale: El verbo expresa movimiento descendente literal en una teofanía. 'Descenderá' conserva el registro solemne y la imagen espacial del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se adopta la forma española estándar del nombre divino en esta serie, 'Yahvé', para preservar el nombre propio del pacto y no sustituirlo por un título.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - en presencia de
  - ante los ojos de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y visual. 'A la vista de' conserva la imagen de manifestación pública sin sonar forzado en español.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - la totalidad del pueblo
  lexicon: HALOT
  rationale: '''Todo el pueblo'' reproduce la totalidad del colectivo presente y suena natural en español bíblico moderno.'
- source_word: עַל הַר סִינָי
  english_pob_choice: on Mount Sinai
  chosen_spanish: sobre el monte Sinaí
  alternatives_spanish:
  - en el monte Sinaí
  - en el monte Sinaí
  lexicon: HALOT
  rationale: El movimiento descendente de Yahvé requiere conservar la preposición espacial fuerte. 'Sobre el monte Sinaí' mantiene la imagen del descenso divino hacia la montaña.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, 'Yahvé' preserva el nombre propio de Dios revelado en el Sinaí y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor injuntivo de וְהָיוּ en contexto de mandato
  english_pob_reading: and let them be ready
  chosen_spanish_reading: y estén preparados
  alternative_spanish_readings:
  - y serán preparados
  - y deben estar preparados
  rationale: Aunque la forma hebrea es verbalmente narrativa, el contexto la convierte en instrucción. El subjuntivo exhortativo español comunica mejor esa fuerza sin añadir un elemento inexistente en el hebreo.
  doctrine_reference: Exodus 19:11 context of preparation for the theophany
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés: mantiene la injunción, la temporalidad doble del ''tercer día'', el nombre divino como nombre propio y la imagen visual de לְעֵינֵי. Se adopta ''Yahvé'' por la política española solicitada, en lugar del inglés ''Yahweh''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה según el criterio español del proyecto.
  - '''Monte Sinaí'' se mantiene con artículo y mayúscula acorde al uso bíblico en español.'
  - '''A la vista de'' conserva la carga visual del hebreo y armoniza con el registro litúrgico moderado del resto de la obra.'
