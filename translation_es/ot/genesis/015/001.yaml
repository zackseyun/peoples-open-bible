    issue: La nota al pie preserva una alternativa incorrecta
    rationale: 'La auditoría inglesa conserva como nota la lectura alternativa de la cláusula final: «I am your shield; your reward is exceedingly great». El borrador español, en cambio, pone en nota alternativas de «Después de estas cosas», que no son la variante significativa preservada por el POB para este versículo.'
  - severity: low
    issue: «en visión» suena menos natural que «en una visión»
    rationale: 'Aunque no es ininteligible, el hebreo בַּמַּחֲזֶה y la auditoría inglesa («in a vision») se reflejan mejor en español estándar con artículo indefinido: «en una visión».'
  - severity: low
    issue: Falta anclar la nota en el lugar relevante del texto
    rationale: Si se conserva la alternativa principal de lectura, el marcador debe ubicarse en la cláusula de escudo/recompensa, no en «estas cosas».
