translation:
  language: es
  text: Pero el rey se enfureció y trató a este con más crueldad que a los demás[a], tomando con amargura la burla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «resintiéndose amargamente por el insulto». La expresión griega πικρῶς φέρων ἐπὶ τῷ μυκτηρισμῷ también puede entenderse con énfasis en la reacción amarga del rey ante la burla recibida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκθύμως
  english_pob_choice: became furious
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se airó
  - se llenó de furia
  - se indignó fuertemente
  lexicon: LSJ
  rationale: El adverbio intensifica el estado emocional del rey. «Se enfureció» expresa con naturalidad la intensidad y el cambio de ánimo implícitos en ἐκθύμως + γενόμενος.
- source_word: γενόμενος
  english_pob_choice: became
  chosen_spanish: se enfureció
  alternatives_spanish:
  - habiendo llegado a estar
  - llegando a estar
  - se volvió
  lexicon: LSJ
  rationale: En combinación con ἐκθύμως, el participio se vierte mejor como una acción verbal finita en español, para evitar una construcción pesada y conservar el sentido narrativo.
- source_word: χειρίστως
  english_pob_choice: more cruelly
  chosen_spanish: con más crueldad
  alternatives_spanish:
  - más duramente
  - de manera más cruel
  - con mayor dureza
  lexicon: LSJ
  rationale: El comparativo se hace explícito con «que a los demás». «Con más crueldad» comunica la severidad del trato de manera clara y directa en español.
- source_word: ἀπήντησεν
  english_pob_choice: treated
  chosen_spanish: trató
  alternatives_spanish:
  - se comportó con
  - se portó con
  - respondió
  lexicon: LSJ
  rationale: Aquí el verbo no significa una mera respuesta verbal, sino la manera en que el rey actuó contra el joven. «Trató» conserva el valor contextual de trato hostil.
- source_word: παρὰ τοὺς ἄλλους
  english_pob_choice: than the others
  chosen_spanish: que a los demás
  alternatives_spanish:
  - que a los otros
  - más que a los demás
  - respecto de los demás
  lexicon: LSJ
  rationale: La frase comparativa indica que recibió un trato peor que los demás hermanos. «Que a los demás» es la forma española más clara y natural para ese contraste.
- source_word: πικρῶς φέρων
  english_pob_choice: taking ... bitterly
  chosen_spanish: llevando amargamente
  alternatives_spanish:
  - soportando con amargura
  - resintiéndolo amargamente
  - tomándolo con amargura
  lexicon: LSJ
  rationale: φέρω con complemento emocional expresa reacción interior; «llevando amargamente» mantiene la imagen verbal sin perder la carga afectiva. Se conserva el matiz de respuesta amarga ante la burla.
- source_word: μυκτηρισμῷ
  english_pob_choice: mockery
  chosen_spanish: escarnio
  alternatives_spanish:
  - burla
  - mofa
  - ridiculización
  lexicon: LSJ
  rationale: El sustantivo denota ridículo despectivo. «Escarnio» comunica con precisión el tono de desprecio y evita suavizar el insulto que provocó la reacción del rey.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en el sentido básico: el rey reacciona con furia y trata al joven con mayor crueldad debido a la burla. Se mantiene la ambigüedad registrada en πικρῶς φέρων ἐπὶ τῷ μυκτηρισμῷ mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica ajena porque el versículo no contiene nombres divinos ni conceptos doctrinales sensibles.
  - Se prefirió «escarnio» a «burla» para preservar el matiz más fuerte del griego μυκτηρισμός.
  - La comparación «que a los demás» hace explícito el valor de χειρίστως + παρὰ τοὺς ἄλλους sin añadir contenido no atestiguado.
