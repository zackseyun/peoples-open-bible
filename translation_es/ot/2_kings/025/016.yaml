translation:
  language: es
  text: En cuanto a los dos pilares[a], el Mar[b], y los soportes que Salomón había hecho para la casa de Yahvé, no se pesó[c] el bronce de todos estos utensilios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las dos columnas».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el gran recipiente ceremonial de bronce conocido como «el Mar».
    reason: cultural_note
  - marker: c
    text: 'O: «no hubo peso para el bronce de todos estos utensilios», es decir, el bronce no se pesó por su gran cantidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַמּוּדִים שְׁנַיִם
  english_pob_choice: the two pillars
  chosen_spanish: los dos pilares
  alternatives_spanish:
  - las dos columnas
  lexicon: HALOT
  rationale: עַמּוּדִים nombra elementos arquitectónicos/estructurales; "pilares" mantiene bien el referente cultual del templo y suena natural en español bíblico moderno.
- source_word: הַיָּם הָאֶחָד
  english_pob_choice: the one Sea
  chosen_spanish: el mar
  alternatives_spanish:
  - la gran tina
  - la Fuente de bronce
  - la gran pileta llamada el Mar
  lexicon: HALOT
  rationale: Aquí יָּם funciona como nombre técnico del gran recipiente de bronce del templo. En español, mantener "el mar" conserva el valor nominal del objeto y la señal de designación cultual, sin expandir más de lo que el hebreo dice.
- source_word: וְהַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: los soportes
  alternatives_spanish:
  - las bases
  - los pedestales
  lexicon: HALOT
  rationale: מְכֹנוֹת se refiere a las piezas que sostenían los lavatorios. "Soportes" expresa bien la función y evita un tecnicismo menos transparente.
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  english_pob_choice: that Solomon had made
  chosen_spanish: que Salomón había hecho
  alternatives_spanish:
  - que Salomón hizo
  lexicon: HALOT
  rationale: 'El pluscuamperfecto en español comunica adecuadamente la relación retrospectiva dentro del relato: se trata de objetos fabricados previamente por Salomón.'
- source_word: לְבֵית יְהוָה
  english_pob_choice: for the house of Yahweh
  chosen_spanish: para la casa de Yahvé
  alternatives_spanish:
  - para el templo de Yahvé
  - para la casa de Yahweh
  lexicon: HALOT
  rationale: בית־יהוה se traduce de forma transparente como "casa de Yahvé", preservando la expresión hebrea y el nombre divino según la política terminológica del proyecto.
- source_word: לֹא הָיָה מִשְׁקָל
  english_pob_choice: there was no weighing
  chosen_spanish: no se pesó
  alternatives_spanish:
  - no hubo peso
  - no se pudo pesar
  lexicon: HALOT
  rationale: מִשְׁקָל puede ser "peso" o "pesaje". El giro impersonal "no se pesó" conserva la idea de que el bronce no fue llevado al peso, sin añadir explicaciones interpretativas al texto principal.
- source_word: לִנְחֹשֶׁת
  english_pob_choice: the bronze
  chosen_spanish: el bronce
  alternatives_spanish:
  - el cobre
  - la aleación de cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת en el contexto del mobiliario del templo se entiende mejor como "bronce", el equivalente habitual y más claro en español.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  english_pob_choice: of all these vessels
  chosen_spanish: de todos estos utensilios
  alternatives_spanish:
  - de todos estos vasos
  - de todos estos objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/implementos. "Utensilios" comunica su carácter de piezas funcionales del templo sin forzar un significado más estrecho que el hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto pide "Yahvé" como forma principal, preservando el nombre del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se incorporó la lectura final sin cambios del último pase revisado: no se requirieron correcciones sustanciales respecto del audit trail en inglés. Se mantuvo la estructura enumerativa del hebreo y la referencia cultual a los objetos del templo.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" según la terminología del proyecto.
  - '"Pilares", "soportes" y "utensilios" se eligieron por claridad natural en español sin perder el referente técnico del mobiliario del templo.'
  - Se preservó la ambigüedad de מִשְׁקָל con una nota de alternativa sobre el pesaje del bronce.
  - '"El mar" se conserva como nombre técnico del objeto, no como simple sustantivo común.'
