translation:
  language: es
  text: 'Yo, Yahvé: ese es mi nombre. No daré mi gloria a otro[a], ni mi alabanza a los ídolos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni mi alabanza a imágenes talladas». El término hebreo se refiere específicamente a imágenes esculpidas o fabricadas; por implicación, son ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton nombra el nombre propio del Dios de Israel. En español, el equivalente adoptado por el proyecto es «Yahvé», conservando el nombre divino en lugar de sustituirlo por un título.
- source_word: הוּא
  english_pob_choice: that is
  chosen_spanish: ese es
  alternatives_spanish:
  - él es
  - es
  lexicon: HALOT
  rationale: 'La partícula funciona de manera identificativa en la frase nominal. «Ese es» reproduce con naturalidad en español el valor enfático de identificación: «ese es mi nombre».'
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi nombre propio
  lexicon: HALOT
  rationale: Es un posesivo directo y simple; «mi nombre» mantiene la fuerza de identidad exclusiva sin añadir explicación interpretativa.
- source_word: כְבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  lexicon: HALOT
  rationale: «Gloria» es el equivalente más establecido y adecuado para כָּבוֹד en este contexto teológico de unicidad divina.
- source_word: לְאַחֵר
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro alguno
  - a un extraño
  lexicon: HALOT
  rationale: La preposición más natural en español es «a». «Otro» conserva la exclusividad del contraste sin especificar más de lo que dice el hebreo.
- source_word: אֶתֵּן
  english_pob_choice: I will not give
  chosen_spanish: No daré
  alternatives_spanish:
  - No doy
  - No voy a dar
  lexicon: HALOT
  rationale: El imperfecto expresa resolución/futuro en este contexto. «No daré» es la forma natural y fiel en español.
- source_word: תְהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi alabanza debida
  - mi elogio
  lexicon: HALOT
  rationale: «Alabanza» comunica bien el sustantivo hebreo en español bíblico y evita una expansión explicativa no presente en el texto. Mantiene la referencia a la alabanza que pertenece a Yahvé.
- source_word: לַפְּסִילִים
  english_pob_choice: to idols
  chosen_spanish: a los ídolos
  alternatives_spanish:
  - a las imágenes talladas
  - a las imágenes esculpidas
  lexicon: HALOT
  rationale: El término hebreo alude específicamente a objetos tallados o moldeados; el inglés POB opta por «idols» por implicación. En español, «ídolos» comunica con claridad el referente culto-religioso, mientras la alternativa literal se preserva en la nota.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto usa el nombre propio del pacto, no un título. La tradición editorial del POB exige conservar el nombre divino de forma auditable; en español, «Yahvé» es el correlato consistente del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de תְהִלָּתִי frente a posibles ampliaciones explicativas
  english_pob_reading: my praise
  chosen_spanish_reading: mi alabanza
  alternative_spanish_readings:
  - la alabanza debida a mí
  - mi fama
  rationale: El hebreo es compacto y poético. «Mi alabanza» preserva la relación posesiva sin introducir una paráfrasis interpretativa, manteniendo la tensión de exclusividad del verso.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy: optimal equivalence; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto español sigue de cerca el sentido y las decisiones léxicas auditadas, manteniendo la equivalencia óptima sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el paralelismo breve del hebreo con dos miembros coordinados por «ni».
  - «Ídolos» se mantiene en el texto principal, con la alternativa literal explicada en nota.
  - La puntuación con punto y coma refleja la división poética del hebreo y la cadencia natural en español.
