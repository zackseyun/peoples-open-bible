translation:
  language: es
  text: Y si el levita viene de una de tus puertas[a], de entre todo Israel, donde reside, y viene con todo el deseo de su alma al lugar que Yahvé escogerá[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, "de una de tus puertas". Aquí "puertas" funciona metonímicamente por una ciudad o asentamiento cívico.
    reason: cultural_note
  - marker: b
    text: 'O: "con todo el anhelo de su alma".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Si
  lexicon: HALOT
  rationale: La construcción casuística introduce una condición conectada con la ley precedente. En español, "Y si" conserva la conjunción y la fuerza condicional sin sonar forzado.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - un levita
  lexicon: HALOT
  rationale: El artículo está presente en hebreo y funciona como caso representativo en el contexto legal. "El levita" preserva esa forma genérica.
- source_word: מֵאַחַד שְׁעָרֶיךָ
  english_pob_choice: from one of your gates
  chosen_spanish: de una de tus puertas
  alternatives_spanish:
  - de una de tus puertas-ciudad
  - de una de tus poblaciones
  lexicon: HALOT
  rationale: '"Puertas" conserva el término literal y la metonimia urbana/cívica del hebreo. Aunque el inglés POB optó por "gates" con nota cultural, en español "puertas" puede mantenerse con la misma nota explicativa.'
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: out of all Israel
  chosen_spanish: de entre todo Israel
  alternatives_spanish:
  - de todo Israel
  - desde cualquier parte de Israel
  lexicon: HALOT
  rationale: '"De entre" expresa mejor la procedencia distributiva implícita en el hebreo y suena natural en español bíblico moderno.'
- source_word: אֲשֶׁר הוּא גָּר שָׁם
  english_pob_choice: where he is residing
  chosen_spanish: donde reside
  alternatives_spanish:
  - donde vive
  - donde habita como residente
  lexicon: HALOT
  rationale: '"Reside" comunica el matiz de habitar sin asentamiento patrimonial fijo, sin necesidad de sobreexplicar en el texto principal.'
- source_word: וּבָא
  english_pob_choice: and comes
  chosen_spanish: y viene
  alternatives_spanish:
  - y llega
  - y entra
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo con un español natural; "viene" evita una traducción mecánica de "comes".
- source_word: בְּכָל אַוַּת נַפְשׁוֹ
  english_pob_choice: with all the desire of his soul
  chosen_spanish: con todo el deseo de su alma
  alternatives_spanish:
  - con todo el anhelo de su alma
  - con todo el deseo de su ser
  lexicon: HALOT
  rationale: La frase hebrea se mantiene cercana al original y refleja el vínculo entre נֶפֶשׁ y la intensidad del deseo. "Deseo" reproduce la fuerza léxica, mientras "alma" preserva la imagen source-grounded.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  - al lugar señalado
  lexicon: HALOT
  rationale: El hebreo dice simplemente "al lugar"; no se especifica en el verso principal más allá de la referencia implícita al sitio elegido.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: that Yahweh will choose
  chosen_spanish: que Yahvé escogerá
  alternatives_spanish:
  - que Yahvé elegirá
  - que Yahvé habrá de escoger
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto y el futuro del verbo en una formulación natural en español. "Escogerá" conserva la fórmula de elección central recurrente en Deuteronomio.
theological_decisions:
- issue: Renderización del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El paquete de fuente y la política del proyecto piden preservar el nombre divino y no sustituirlo por un equivalente funcional. "Yahvé" sigue el estándar español del POB y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Matiz de "residing" / גָּר
  english_pob_reading: where he is residing
  chosen_spanish_reading: donde reside
  alternative_spanish_readings:
  - donde vive
  - donde está de paso
  rationale: El verbo hebreo puede implicar residencia como forastero o asentado sin heredad; "reside" conserva esa neutralidad mejor que "vive" y evita añadir una glosa interpretativa.
  doctrine_reference: HALOT, entry for גּוּר
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB que volvió de "towns" a "gates" por mayor exactitud léxica. La versión española sigue esa decisión con "puertas" para conservar la metáfora urbana literal, añadiendo nota explicativa sobre su valor metonímico. También se respetó la decisión doctrinal de usar el nombre divino en forma explícita.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" consistentemente para יְהוָה, conforme al estándar del proyecto.
  - '"Puertas" conserva la imagen hebrea literal y evita sustituirla por una paráfrasis sociológica en el texto principal.'
  - '"Levita" permanece en minúscula por tratarse de un sustantivo común en español cuando funciona genéricamente.'
  - La repetición verbal "viene... y viene" se evita por fluidez, pero se conserva la secuencia de movimiento hacia el lugar elegido.
