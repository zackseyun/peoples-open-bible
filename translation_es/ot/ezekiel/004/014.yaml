translation:
  language: es
  text: 'Entonces dije: «¡Ah, Señor Yahvé! Mira, yo no me he contaminado jamás.[a] Desde mi juventud hasta ahora no he comido lo que muere por sí mismo ni lo que es despedazado por bestias,[b] y ninguna carne inmunda[c] ha entrado en mi boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi alma/vida no está contaminada»; un modismo que significa «no me he hecho impuro».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cadáver y carne despedazada»; es decir, animales que murieron naturalmente o fueron muertos por depredadores, ambos prohibidos como alimento bajo las leyes de pureza de Israel.'
    reason: cultural_note
  - marker: c
    text: 'O: «carne abominable». El término hebreo se refiere a carne hecha ritualmente inaceptable o contaminada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: Ah
  alternatives_spanish:
  - Ay
  - ¡Ah!
  - ¡Ay, ah!
  lexicon: HALOT
  rationale: La interjección expresa alarma o protesta. «Ah» conserva el tono de sorpresa angustiada sin volverlo demasiado arcaico.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord Yahweh
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahweh
  - Señor, Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: Se conserva el título compuesto con el nombre divino explícito. «Yahvé» sigue el estándar del proyecto para יְהוָה, evitando el enmascaramiento con «SEÑOR» y manteniendo la distinción entre el título y el nombre.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, por favor
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: Como marcador discursivo de atención, «Mira» resulta natural en español y preserva la súplica directa de Ezequiel.
- source_word: נַפְשִׁי לֹא מְטֻמָּאָה
  english_pob_choice: I have never defiled myself
  chosen_spanish: yo no me he contaminado jamás
  alternatives_spanish:
  - mi alma no está contaminada
  - yo no he sido contaminado
  - no he hecho impura mi vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi alma/vida no está contaminada», un giro idiomático que en contexto significa no haberse vuelto ritualmente impuro. Se conserva el sentido personal y la fuerza cultual con un verbo reflexivo natural en español.
- source_word: נְבֵלָה
  english_pob_choice: what dies of itself
  chosen_spanish: lo que muere por sí mismo
  alternatives_spanish:
  - cadáver
  - carne de animal muerto
  - animal hallado muerto
  lexicon: HALOT
  rationale: 'La expresión sigue de cerca el valor de נְבֵלָה: animal muerto sin degüello apropiado o muerto naturalmente. «Lo que muere por sí mismo» refleja la forma y el sentido sin perder claridad.'
- source_word: טְרֵפָה
  english_pob_choice: what is torn by beasts
  chosen_spanish: lo que es despedazado por bestias
  alternatives_spanish:
  - lo que es rasgado
  - presa despedazada por animales
  - lo que ha sido atacado por fieras
  lexicon: HALOT
  rationale: Se mantiene el paralelo con נְבֵלָה y el valor de alimento no permitido por haber sido devorado o atacado por animales salvajes.
- source_word: מִנְּעוּרַי וְעַד עַתָּה
  english_pob_choice: From my youth until now
  chosen_spanish: Desde mi juventud hasta ahora
  alternatives_spanish:
  - desde mi niñez hasta ahora
  - desde joven hasta ahora
  - desde mi juventud y hasta ahora
  lexicon: HALOT
  rationale: Es una equivalencia natural y fiel para una duración de vida completa.
- source_word: וְלֹא בָא בְּפִי
  english_pob_choice: has entered my mouth
  chosen_spanish: ha entrado en mi boca
  alternatives_spanish:
  - ha llegado a mi boca
  - ha pasado por mi boca
  - ha entrado por mi boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la boca como lugar de ingestión, siguiendo el hebreo sin sobrerreformularlo.
- source_word: בְּשַׂר פִּגּוּל
  english_pob_choice: unclean meat
  chosen_spanish: carne inmunda
  alternatives_spanish:
  - carne impura
  - carne abominable
  - carne contaminada
  lexicon: HALOT
  rationale: פִּגּוּל se refiere a carne cultualmente inaceptable o ritualmente rechazada. «Carne inmunda» comunica bien el ámbito de pureza ritual y evita suavizar el término.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahweh
  - Señor Dios
  - Señor, Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En coherencia con la política del proyecto, se traduce como «Yahvé» en vez de ocultarlo con «SEÑOR». El título אֲדֹנָי se mantiene como «Señor» para preservar la estructura título + nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido ritual de la afirmación de pureza personal
  english_pob_reading: I have never defiled myself
  chosen_spanish_reading: yo no me he contaminado jamás
  alternative_spanish_readings:
  - no me he hecho impuro
  - mi vida no está contaminada
  - no he contraído impureza
  rationale: La frase hebrea usa un idiomatismo de contaminación ritual. «Me he contaminado» conserva la dimensión cultual y personal sin reducirla a mera higiene o moralidad.
  doctrine_reference: Pureza ritual levítica; cf. leyes de alimentos en Levítico 11 y la autoafirmación del profeta
- issue: Valor cultual de פִּגּוּל
  english_pob_reading: unclean meat
  chosen_spanish_reading: carne inmunda
  alternative_spanish_readings:
  - carne impura
  - carne abominable
  - carne profanada
  rationale: El término no significa simplemente suciedad física, sino una condición de rechazo cultual. «Inmunda» preserva esa carga bíblica de impureza ritual.
  doctrine_reference: Lenguaje de pureza/impureza en la Torá
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del POB en inglés al preferir una formulación más precisa para נְבֵלָה («lo que muere por sí mismo») y una opción natural para בְּשַׂר פִּגּוּל («carne inmunda»). También adopta el nombre divino explícito «Yahvé» según la política revisada del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto y «Señor» para אֲדֹנָי, conservando la distinción del hebreo.
  - Se usa lenguaje de pureza ritual («contaminado», «inmunda») para no diluir el marco levítico del pasaje.
  - La frase verbal «lo que muere por sí mismo» conserva la concreción del hebreo sin forzar una paráfrasis interpretativa.
  - Los marcadores de nota a, b y c aparecen anclados exactamente donde corresponden en el texto español.
