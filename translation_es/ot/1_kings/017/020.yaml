    text: Or 'have you done evil to the widow'; the Hebrew verb can denote doing harm, bringing calamity, or dealing badly.
    reason: lexical_alternative
  - marker: b
    text: Or 'with whom I sojourn'; the Hebrew suggests residing as a guest or dependent.
    reason: lexical_alternative
