theological_decisions:
- issue: Prophetic use of 'My God'
  chosen_reading: Retain the first-person expression 'My God' as Hosea's own prophetic declaration.
  alternative_readings:
  - Render simply as 'God' for smoother English
  rationale: The possessive suffix is present in the Hebrew and contributes to the prophetic voice. Retaining it preserves both the personal and covenantal dimension without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to render שׁמע as 'listen' or 'obey'
  chosen_reading: Use 'listened to him' in the main text.
  alternative_readings:
  - '''obeyed him'''
  rationale: The Hebrew idiom can imply obedience, but the more literal 'listened to him' better preserves the source wording and leaves the theological implication of disobedience to the reader. This follows the principle of preserving the text's tension rather than resolving it more explicitly than necessary.
  doctrine_reference: Translation philosophy §1, §3
