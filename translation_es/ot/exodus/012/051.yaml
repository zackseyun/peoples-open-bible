review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: marco temporal enfático, nombre divino Yahvé, causalidad de «sacó», expresión corporativa «los hijos de Israel» y «la tierra de Egipto». Sin embargo, falla en עַל צִבְאֹתָם: «según sus ejércitos» suena demasiado militarizado y no refleja bien la decisión auditada del POB («according to their divisions»), que entiende agrupaciones ordenadas más que unidades de combate.'
  spanish_quality_summary: El español es claro y digno en general. «En aquel mismo día» es aceptable, aunque «en aquel mismo día» o «en ese mismo día» no cambian mucho; el problema principal es «según sus ejércitos», que resulta menos natural y más engañoso en español bíblico contemporáneo. «Según sus divisiones» comunica mejor la idea organizativa y coincide con la nota alternativa.
  glossary_alignment: Cumple con la política del proyecto en «Yahvé» para יְהוָה y mantiene «los hijos de Israel» para בְּנֵי יִשְׂרָאֵל. La desviación importante está en צִבְאֹתָם, donde el borrador no sigue la preferencia contextual documentada por el POB hacia «divisions/companies/hosts» en sentido organizativo no militar.
  issues:
  - severity: high
    issue: «según sus ejércitos» para עַל צִבְאֹתָם
    rationale: En español, «ejércitos» sugiere fuerzas militares reales y puede distorsionar el sentido en este contexto. El expediente inglés ya resolvió el término como «according to their divisions», con alternativas como «hosts/companies». «Según sus divisiones» preserva mejor las agrupaciones ordenadas sin sobrecargar el matiz bélico.
  - severity: low
    issue: La nota al pie ya no corresponde al mejor texto principal
    rationale: Si el texto principal se corrige a «según sus divisiones», la nota debe conservar alternativas verdaderas y útiles, no dejar la opción menos recomendable como redacción principal.
  revised_spanish_text: Y en aquel mismo día, Yahvé sacó a los hijos de Israel de la tierra de Egipto según sus divisiones[a].
  revised_footnotes:
  - marker: a
    text: O «según sus huestes» o «con sus compañías». El hebreo puede subrayar las agrupaciones ordenadas de Israel al salir.
    reason: lexical_alternative
  revision_rationale: Se cambió «según sus ejércitos» por «según sus divisiones» para reflejar con mayor fidelidad el sentido contextual de עַל צִבְאֹתָם y la decisión lexical documentada por el POB. Se ajustó la nota para preservar alternativas viables en español sin imponer un matiz militar excesivo.
