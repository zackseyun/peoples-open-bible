translation:
  language: es
  text: Colocó el candelabro en la tienda de reunión, frente[a] a la mesa, en el lado sur del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «opuesto a la mesa» o «de cara a la mesa». El hebreo נֹכַח puede indicar posición opuesta o delante de algo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: He placed
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Puso en su lugar
  lexicon: HALOT
  rationale: El verbo narrativo expresa una acción concluida de acomodar un objeto sagrado. En español, 'puso' es natural y fiel; 'colocó' también es posible, pero 'puso' mantiene la sencillez del relato sin perder precisión.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: la lámpara[a]
  alternatives_spanish:
  - el candelabro
  - el lampadario
  - la menorá
  lexicon: HALOT
  rationale: El objeto es la מְנוֹרָה cultual. 'Lámpara' comunica el sentido funcional al lector común, aunque el término bíblico apunta a un soporte de luz más que a una lámpara portátil. Se conserva la ambigüedad funcional sin imponer un tecnicismo menos natural; la nota recoge la relación con 'lampstand'.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: La expresión técnica del santuario puede rendirse de forma estable como 'tabernáculo de reunión'. En español bíblico esto es claro y reconocible, y mantiene la designación cultual del lugar sin volverlo meramente descriptivo.
- source_word: נֹכַח הַשֻּׁלְחָן
  english_pob_choice: opposite the table
  chosen_spanish: frente a la mesa
  alternatives_spanish:
  - opuesta a la mesa
  - enfrente de la mesa
  lexicon: HALOT
  rationale: נֹכַח indica posición opuesta o de frente. 'Frente a la mesa' expresa bien la relación espacial en español y evita un calco rígido. La alternativa 'opuesta' suena posible, pero 'frente a' es más idiomática en esta descripción.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa de los panes
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'la mesa'. En español, 'mesa' comunica el referente sin añadir información que el verso no explicita. Aunque el contexto posterior identifica su función, aquí conviene mantener la forma breve del texto.
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן נֶגְבָּה
  english_pob_choice: on the south side of the tabernacle
  chosen_spanish: al lado sur del tabernáculo
  alternatives_spanish:
  - en el costado sur del tabernáculo
  - en la parte sur del tabernáculo
  lexicon: HALOT
  rationale: La combinación de 'lado/flanco' con la dirección 'sur' indica ubicación lateral meridional. 'Al lado sur' es una forma natural en español y conserva la orientación espacial del original sin sobrecargarla.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  lexicon: HALOT
  rationale: '''Tabernáculo'' es el término consagrado para מִשְׁכָּן en este contexto. Mantiene precisión cultual y continuidad terminológica con el resto del libro.'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente inglés; la versión española sigue de cerca el sentido del texto hebreo y conserva la decisión espacial principal con una nota para la alternativa lexical de נֹכַח.
  spanish_consistency_notes:
  - Se mantiene 'tabernáculo' para מִשְׁכָּן y 'tabernáculo de reunión' para בְּאֹהֶל מוֹעֵד, en continuidad terminológica.
  - '''Mesa'' se usa sin ampliación interpretativa, conforme al texto breve del verso.'
  - La nota [a] se ancla en 'lámpara' para señalar la tensión entre una traducción funcional y la forma cultual más técnica.
