translation:
  language: es
  text: ¿Quién es este[a], que se aferró a ello, y tuvo paz, y le fue para gloria? Porque en la abundancia de paz de su vida[b], te será para gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo de esta línea es difícil y no coincide limpiamente con el paralelo griego. Una lectura más literal del hebreo sería: «¿Quién es este que se adhirió a ello, y tuvo paz, y le fue para gloria?»'
    reason: alternative_reading
  - marker: b
    text: 'El paralelo griego es bastante diferente y puede reflejar otra forma textual; una traducción más literal diría algo como: «el que no ha sido probado, poco sabe».'
    reason: textual_variant
lexical_decisions:
- source_word: מי הוא זה
  english_pob_choice: Who is this?
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es él?
  - ¿Quién es tal hombre?
  lexicon: HALOT
  rationale: La apertura hebrea tiene fuerza interrogativa e identificadora. «¿Quién es este?» conserva el tono retórico de manera natural en español y sigue de cerca la estructura del original.
- source_word: שנדבק בו
  english_pob_choice: has held fast to it
  chosen_spanish: que se apegó a ello
  alternatives_spanish:
  - que se aferró a ello
  - que se mantuvo unido a ello
  - que se adhirió a ello
  lexicon: HALOT
  rationale: El hebreo usa un verbo de adhesión/apego. En español, «se apegó a ello» comunica esa idea sin endurecerla en exceso. Se evita «clung» literal porque suena menos natural, pero se preserva la imagen de adhesión al objeto o camino aludido.
- source_word: והיה לו שלום
  english_pob_choice: And he had peace
  chosen_spanish: y tuvo paz
  alternatives_spanish:
  - y tuvo bienestar
  - y estuvo en paz
  - y le fue bien
  lexicon: HALOT
  rationale: «Paz» traduce de forma directa שָׁלוֹם y mantiene el valor de bienestar íntegro. Se conserva el lenguaje de resultado, breve y sentencioso, propio de la sabiduría bíblica.
- source_word: והיה לו תפארה
  english_pob_choice: and it became glory for him
  chosen_spanish: y le fue para gloria
  alternatives_spanish:
  - y le fue para honra
  - y le fue para honor
  - y resultó para su gloria
  lexicon: HALOT
  rationale: תפארה puede ser gloria, honor o esplendor. «Le fue para gloria» mantiene el registro bíblico y deja abierta la fuerza de honor resultante que el contexto sugiere.
- source_word: ὃς οὐκ ἐπειράθη
  english_pob_choice: Who has not been tested
  chosen_spanish: ¿Quién es este[a], que se apegó a ello, y tuvo paz, y le fue para gloria?
  alternatives_spanish:
  - el que no ha sido probado
  - el que no ha sido tentado
  - el que no ha pasado por prueba
  lexicon: BDAG
  rationale: La línea griega del paralelo es un testimonio alterno y no coincide limpiamente con el hebreo. Por eso no se integra como traducción continua en el texto principal, pero se reconoce en la nota como variante textual relevante.
- source_word: ὀλίγα
  english_pob_choice: in a little
  chosen_spanish: en lo poco
  alternatives_spanish:
  - en unas pocas cosas
  - en pequeña medida
  - en algo poco
  lexicon: BDAG
  rationale: Aunque el griego ofrece un enunciado de prueba y conocimiento, el testimonio principal de esta ficha es el hebreo. El griego se documenta en nota como variante alternativa, sin forzar su sintaxis dentro del texto base.
theological_decisions:
- issue: Manejo de una discrepancia textual fuerte entre el hebreo y el paralelo griego
  english_pob_reading: Main text gives a contextually coherent rendering that leans on the Greek parallel for the testing motif while retaining the Hebrew verse's rhetorical opening and honor/result language.
  chosen_spanish_reading: 'El texto principal sigue el hebreo disponible: adhesión, paz y gloria. La variante griega de prueba/conocimiento se registra aparte como lectura alternativa.'
  alternative_spanish_readings:
  - 'Una traducción más griega: «el que no ha sido probado, poco sabe»'
  - 'Una traducción más hebrea literal: «¿Quién es este que se adhirió a ello, y tuvo paz, y le fue para gloria?»'
  rationale: La fuente hebrea de esta ficha es la lectura base y el aparato marca una discrepancia importante con el griego. Para no borrar esa tensión, el texto principal conserva el sentido hebreo y las notas explican la variante griega. Así se mantiene transparencia textual sin mezclar indebidamente ambas formas en una sola línea.
  doctrine_reference: 'PHILOSOPHY.md: use the surviving Hebrew where it is primary, while documenting the Greek parallel honestly when the witnesses diverge; task instruction to preserve source uncertainty.'
translation_notes:
  revision_awareness: La versión española toma como texto base la lectura hebrea conservada en el expediente, en línea con la revisión que restableció el motivo de adherirse, la paz y la gloria. A la vez, conserva una nota explícita para el paralelo griego, cuya forma de prueba/conocimiento sigue siendo una variante textual importante.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca explícitamente en el segmento; aquí no aparece.
  - Se mantiene «gloria» para תפארה por su adecuación bíblica y por dejar abierta la gama honor/splendor.
  - Se evita mezclar la sintaxis griega de prueba con la hebrea de adhesión para no nivelar la discrepancia textual.
  - El registro es sobrio y bíblico, pero con español natural y legible para lector eclesial amplio.
