translation:
  language: es
  text: 'Mientras todavía se leían las cartas[a], he aquí que llegaron otros mensajeros desde Galilea, con sus vestiduras rasgadas, diciendo estas palabras:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «otros enviados llegaron desde Galilea, habiendo rasgado sus vestiduras». El griego puede leerse como una descripción del estado al llegar o como una acción previa; además, «mensajeros» aquí designa portadores humanos de noticias, no ángeles celestiales.'
