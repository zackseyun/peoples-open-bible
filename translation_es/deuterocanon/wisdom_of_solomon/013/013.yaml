translation:
  language: es
  text: Pero el desecho de estos[a], sin utilidad alguna, un pedazo de madera torcido y lleno de nudos—tomándolo, lo talló con el esmero de su ociosidad, y con la habilidad de su ocio lo formó, y lo hizo semejante a la imagen de un hombre[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descarte», «residuo» o «desperdicio» para ἀπόβλημα. El griego señala algo arrojado como inútil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con el esmero de su ociosidad, y con la habilidad de su ocio»; una descripción irónica del cuidadoso esfuerzo gastado en hacer un ídolo.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπόβλημα
  english_pob_choice: refuse
  chosen_spanish: desecho
  alternatives_spanish:
  - residuo
  - desperdicio
  - descarte
  lexicon: LSJ
  rationale: ἀπόβλημα designa algo arrojado como inútil o rechazado. «Desecho» conserva la idea de algo descartado y despectivo sin sonar demasiado técnico o regional.
- source_word: εἰς οὐδὲν εὔχρηστον
  english_pob_choice: useful for nothing
  chosen_spanish: inútil para todo
  alternatives_spanish:
  - útil para nada
  - sin utilidad alguna
  - bueno para nada
  lexicon: LSJ
  rationale: La frase subraya inutilidad total. «Inútil para todo» mantiene la fuerza absoluta en un español natural y digno.
- source_word: ξύλον σκολιόν
  english_pob_choice: a crooked piece of wood
  chosen_spanish: un pedazo de madera torcido
  alternatives_spanish:
  - madera torcida
  - un trozo de madera torcido
  - madera combada
  lexicon: LSJ
  rationale: ξύλον aquí es material concreto, no «árbol». «Pedazo de madera» conserva la concreción del fragmento sobrante; «torcido» transmite σκολιόν sin forzar el registro.
- source_word: ὅζοις συμπεφυκός
  english_pob_choice: full of knots
  chosen_spanish: lleno de nudos
  alternatives_spanish:
  - con nudos adheridos
  - con nudos crecidos en él
  - lleno de protuberancias
  lexicon: LSJ
  rationale: La expresión alude a madera defectuosa con nudos o salientes de ramas. «Lleno de nudos» es la equivalencia más clara y natural en español.
- source_word: ἐγλύψεν
  english_pob_choice: he carved
  chosen_spanish: lo talló
  alternatives_spanish:
  - lo esculpió
  - lo cinceló
  - lo labró
  lexicon: LSJ
  rationale: El verbo se refiere a trabajar material con corte o talla. «Tallar» funciona bien para madera y mantiene el contexto de fabricación de un ídolo.
- source_word: ἐν ἐπιμελείᾳ ἀργίας αὐτοῦ
  english_pob_choice: with the diligence of his idleness
  chosen_spanish: con el esmero de su ociosidad
  alternatives_spanish:
  - con el cuidado de su inactividad
  - con la diligencia de su ocio
  - con esmero en su tiempo ocioso
  lexicon: LSJ
  rationale: 'La frase griega es irónica: aplica cuidado diligente a una actividad nacida del ocio. «Esmero de su ociosidad» preserva esa tensión satírica y el contraste interno.'
- source_word: ἐμπειρίᾳ ἀνέσεως
  english_pob_choice: with the skill of his leisure
  chosen_spanish: con la habilidad de su ocio
  alternatives_spanish:
  - con la pericia de su descanso
  - con la experiencia de su ocio
  - con destreza en su tiempo libre
  lexicon: LSJ
  rationale: ἀνέσεως aquí sugiere descanso, soltura o ocio. «Habilidad de su ocio» reproduce el paralelo irónico con la expresión anterior y evita suavizar el juego retórico.
- source_word: ἐτύπωσεν
  english_pob_choice: he shaped
  chosen_spanish: lo dio forma
  alternatives_spanish:
  - lo formó
  - lo modeló
  - lo configuró
  lexicon: LSJ
  rationale: El verbo indica imponer una forma o molde. «Dar forma» es idiomático en español y conserva la secuencia artesanal.
- source_word: ἀπεικάσεν
  english_pob_choice: made it like
  chosen_spanish: lo hizo semejante
  alternatives_spanish:
  - lo pareció
  - lo asemejó
  - lo hizo parecido
  lexicon: LSJ
  rationale: El verbo expresa hacer que una cosa corresponda en semejanza con otra. «Lo hizo semejante» conserva la relación formal con la frase siguiente.
- source_word: εἰκόνι ἀνθρώπου
  english_pob_choice: the image of a man
  chosen_spanish: la imagen de un hombre
  alternatives_spanish:
  - la imagen de una persona
  - una imagen humana
  - la figura de un hombre
  lexicon: LSJ
  rationale: ἀνθρώπου es masculino singular en griego. Se conserva «un hombre» para mantener la precisión léxica y la política de exactitud de género del proyecto.
theological_decisions:
- issue: Referencia humana masculina en εἰκόνι ἀνθρώπου
  english_pob_reading: the image of a man
  chosen_spanish_reading: la imagen de un hombre
  alternative_spanish_readings:
  - la imagen de una persona
  - una imagen humana
  rationale: El griego usa ἀνθρώπου en singular masculino. No se neutraliza a «persona» ni «humana» porque el texto describe la fabricación de una figura con apariencia humana, y la precisión del término debe preservarse salvo una necesidad contextual clara.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Conservación de la ironía sobre el trabajo hecho en ocio
  english_pob_reading: with the diligence of his idleness, and with the skill of his leisure
  chosen_spanish_reading: con el esmero de su ociosidad, y con la habilidad de su ocio
  alternative_spanish_readings:
  - con el cuidado de su tiempo libre
  - con la diligencia de su ocio
  - con la pericia de su descanso
  rationale: El texto ridiculiza la artesanía del ídolo al yuxtaponer empeño y ocio. La traducción conserva ese contraste sin suavizarlo en una simple descripción de trabajo manual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB: la puntuación ante la cláusula final fue ajustada por claridad, y el sentido de conjunto permanece estable. La versión española refleja la misma secuencia retórica: desecho inútil, madera torcida y con nudos, talla cuidadosa en medio del ocio, y culminación en la imagen de un hombre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «hombre» para εἰκόνι ἀνθρώπου siguiendo la precisión del griego y la política de exactitud de género.
  - «Ociosidad/ocio» conserva el contraste irónico del original entre inutilidad y destreza artesanal.
  - El registro es sobrio y bíblico, sin calcos innecesarios ni paraphraseo interpretativo.
