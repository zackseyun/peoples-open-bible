  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ κύριος κατευθύναι ὑμῶν τὰς καρδίας εἰς τὴν ἀγάπην τοῦ θεοῦ καὶ εἰς τὴν ὑπομονὴν τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/005.yaml
  text: Now may the Lord direct your hearts into the love of God and into the steadfastness of Messiah[a][b][c].
translation:
  language: ko
  text: 주께서 여러분의 마음을 하나님의 사랑[a]과 메시아의 인내[b][c]로 인도해 주시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님께 대한 사랑」, 「하나님이 베푸시는 사랑」. 헬라어 속격은 어느 한 의미로 결정되지 않는다.
    reason: alternative_reading
  - marker: b
    text: 또는 「메시아의 인내」, 「메시아를 향한 인내」, 「메시아처럼 견딤」. 헬라어 속격은 여러 의미를 함께 가질 수 있다.
    reason: alternative_reading
  - marker: c
    text: 헬라어는 「그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατευθύναι
  english_pob_choice: direct
  chosen_korean: 인도해 주시기를
  alternatives_korean:
  - 향하게 하시기를
  - 인도하시기를
  lexicon: BDAG
  rationale: 기원의 부정사 어조를 「~해 주시기를 빕니다」로 자연스럽게 옮긴다. 「인도하다」는 신자의 내면을 어떤 방향으로 이끄는 의미를 잘 담는다.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_korean: 마음
  alternatives_korean:
  - 내면
  lexicon: BDAG
  rationale: 성경적 인간론의 「마음」.
- source_word: εἰς τὴν ἀγάπην τοῦ θεοῦ
  english_pob_choice: into the love of God
  chosen_korean: 하나님의 사랑
  alternatives_korean:
  - 하나님께 대한 사랑
  - 하나님의 베푸시는 사랑
  lexicon: BDAG
  rationale: 직역 「하나님의 사랑」을 본문에 둠으로써 주관적/객관적 속격의 모호성을 보존한다.
- source_word: εἰς τὴν ὑπομονὴν τοῦ Χριστοῦ
  english_pob_choice: into the steadfastness of Messiah
  chosen_korean: 메시아의 인내
  alternatives_korean:
  - 메시아의 견딤
  - 메시아를 향한 인내
  - 메시아처럼 견딤
  lexicon: BDAG
  rationale: 속격의 모호성을 보존하여 「메시아의 인내」로 옮긴다.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_korean: 주께서
  alternatives_korean:
  - 주님께서
  lexicon: BDAG
  rationale: 기원적 어조에서 「주께서」가 자연스럽다.
theological_decisions:
- issue: 「하나님의 사랑」 속격의 방향(주관적 / 객관적 / 참여적)
  chosen_reading: 「하나님의 사랑」 — 결정하지 않고 보존
  alternative_readings:
  - 하나님께 대한 사랑
  - 하나님이 베푸시는 사랑
  rationale: 헬라어 속격은 진실로 열려 있으므로 어느 한 해석으로 강제하지 않는다.
  doctrine_reference: 'Preserve theological tension'
- issue: 「메시아의 인내」 속격의 방향
  chosen_reading: 「메시아의 인내」 — 결정하지 않고 보존
  alternative_readings:
  - 메시아를 향한 인내
  - 메시아의 견딤
  - 메시아처럼 견딤
  rationale: 속격은 주관적·객관적·질적 해석이 모두 가능하므로 본문에서는 모호성을 보존한다.
  doctrine_reference: 'Preserve theological tension'
- issue: Χριστοῦ 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 칭호 정책 일관.
  doctrine_reference: 'Contested terms — Χριστός'
