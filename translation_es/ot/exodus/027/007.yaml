translation:
  language: es
  text: Y sus varas serán puestas en los anillos[a], y las varas estarán en los dos lados[b] del altar cuando sea llevado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán introducidas en los anillos». El hebreo tiene una forma pasiva que describe la inserción de las varas para el transporte.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lados» (צַלְעֹת), vocablo que también puede referirse a costados o flancos según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּבָא
  english_pob_choice: shall be put
  chosen_spanish: se meterán
  alternatives_spanish:
  - serán puestas
  - se introducirán
  - serán metidas
  lexicon: HALOT
  rationale: El hebreo es pasivo (Hophal) y describe la inserción de las varas en los anillos para el transporte. En español, "se meterán" conserva el valor pasivo/reflejo y la idea concreta de introducirlas en su lugar.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus polos
  - sus bastones
  - sus estacas
  lexicon: HALOT
  rationale: Para el mobiliario sagrado, "varas" es el término bíblico español más claro y natural para los travesaños de transporte. "Polos" sería ajeno al registro bíblico; "bastones" puede sonar menos técnico.
- source_word: בַּטַּבָּעֹת
  english_pob_choice: into the rings
  chosen_spanish: en los anillos
  alternatives_spanish:
  - dentro de los anillos
  - en los aros
  - por los anillos
  lexicon: HALOT
  rationale: El hebreo usa בְּ con sentido de ubicación/recepción. "En los anillos" preserva la imagen sin forzar una expresión más interpretativa; en contexto, el movimiento de inserción ya queda claro por el verbo.
- source_word: וְהָיוּ
  english_pob_choice: shall be
  chosen_spanish: estarán
  alternatives_spanish:
  - quedarán
  - deberán estar
  - serán
  lexicon: HALOT
  rationale: 'La forma verbal expresa disposición resultante: después de insertarse, las varas han de permanecer ubicadas así. "Estarán" conserva esa situación prescrita de manera natural en español.'
- source_word: עַל שְׁתֵּי צַלְעֹת
  english_pob_choice: on the two sides
  chosen_spanish: sobre los dos lados
  alternatives_spanish:
  - sobre los dos costados
  - en los dos lados
  - sobre las dos caras laterales
  lexicon: HALOT
  rationale: צַלְעֹת puede significar lados, costados o flancos. "Lados" mantiene la amplitud semántica que el inglés POB también preserva, sin concretar innecesariamente en "costados" o "paneles".
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del altar de sacrificio
  lexicon: HALOT
  rationale: En este contexto cultual, el término estándar es "altar". No hace falta añadir especificación adicional porque el capítulo ya identifica el objeto.
- source_word: בִּשְׂאֵת אֹתוֹ
  english_pob_choice: when it is carried
  chosen_spanish: cuando sea llevado
  alternatives_spanish:
  - al ser llevado
  - cuando lo transporten
  - mientras sea transportado
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב expresa circunstancia temporal: cuando se transporta. "Cuando sea llevado" preserva la pasividad y el enfoque en el altar, sin introducir un sujeto humano explícito.'
translation_notes:
  revision_awareness: La versión inglesa auditada no requiere cambios textuales; se mantiene la misma lectura básica, ajustando el español para expresar de forma natural el pasivo hebreo y la relación espacial de las varas con los lados del altar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se usa «altar» como término cultual estándar sin añadir glosas no sustentadas.
  - «Varas» conserva el sentido técnico del mobiliario tabernacular y armoniza con el uso bíblico español.
  - La pasiva refleja («se meterán», «sea llevado») evita atribuir una acción explícita que el hebreo no formula.
