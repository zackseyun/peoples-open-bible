translation:
  language: es
  text: 'Y Hamor habló con ellos[a], diciendo: «Mi hijo Siquem anhela por su hija. Por favor, dénsela por mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su alma está profundamente apegada a su hija» / «la desea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - les habló
  - habló con ellos
  lexicon: HALOT
  rationale: El hebreo introduce el discurso con un verbo de habla normal; en español, «habló» da un registro natural y digno. Se mantiene la relación conversacional del hebreo junto con el complemento explícito «con ellos».
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: La preposición con sufijo indica aquí el contexto de conversación directa. «Con ellos» refleja mejor esa interacción que un simple dativo español.
- source_word: שְׁכֶם בְּנִי
  english_pob_choice: My son Shechem
  chosen_spanish: Mi hijo Siquem
  alternatives_spanish:
  - Siquem, mi hijo
  - mi hijo Siquem
  lexicon: HALOT
  rationale: El hebreo presenta el nombre en aposición con «mi hijo». En español, el orden «Mi hijo Siquem» es natural y conserva la relación filial sin forzar la sintaxis.
- source_word: חָשְׁקָה נַפְשׁוֹ
  english_pob_choice: longs
  chosen_spanish: anhela
  alternatives_spanish:
  - desea
  - está profundamente apegado a
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica fuerte deseo o apego. «Anhela» preserva esa intensidad con una sola palabra española, sin reducirla a mero deseo superficial.
- source_word: בְּבִתְּכֶם
  english_pob_choice: for your daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - por su hija
  - para su hija
  lexicon: HALOT
  rationale: Aunque el sufijo es plural, el referente es la hija singular de la familia. En esta escena, «su hija» transmite el referente colectivo de manera clara en español; «a su hija» mantiene además la dirección del deseo hacia ella.
- source_word: תְּנוּ נָא
  english_pob_choice: Please give
  chosen_spanish: Les ruego que se la den
  alternatives_spanish:
  - Por favor, denle
  - Les pido que se la den
  lexicon: HALOT
  rationale: El imperativo con נָא expresa súplica cortés. En español, una fórmula como «Les ruego que...» conserva el tono de entreaty con mayor naturalidad que un imperativo directo.
- source_word: אֹתָהּ
  english_pob_choice: her
  chosen_spanish: se la
  alternatives_spanish:
  - la
  - a ella
  lexicon: HALOT
  rationale: El objeto directo femenino se expresa de modo natural en español con clítico dativo-acusativo de complemento indirecto más directo al construir una petición de entrega matrimonial. «Se la» evita ambigüedad y mantiene el valor pronominal.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por mujer
  alternatives_spanish:
  - como esposa
  - para esposa
  lexicon: HALOT
  rationale: La construcción hebrea indica entrega en matrimonio. «Por mujer» es una forma castellana clara y sobria para expresar el sentido matrimonial sin introducir un término demasiado interpretativo; «como esposa» sería más explícito pero menos literal.
translation_notes:
  revision_awareness: Alineado con el alto acuerdo del audit trail inglés y sin cambios revisados posteriores; se conserva el tono narrativo directo y la ambigüedad léxica del hebreo en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos, pero este versículo no contiene el nombre divino.
  - «Siquem» se mantiene como forma habitual en español bíblico para el nombre propio.
  - Se evitó «esposa» en el texto principal para no desplazar el valor matrimonial simple del hebreo sin necesidad contextual.
