translation:
  language: es
  text: Y los dones sagrados de cada hombre serán suyos[a]; lo que un hombre dé al sacerdote[b] será suyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sus cosas santas». La expresión se refiere a bienes u objetos consagrados como ofrendas sagradas.'
    reason: lexical_alternative
  - marker: b
    text: 'El «suyo» final se refiere al sacerdote: lo que un hombre dé al sacerdote le pertenece a él.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: each man / a man
  chosen_spanish: cada hombre / un hombre
  alternatives_spanish:
  - cada persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular masculino con valor distributivo en un contexto legal. En español, «hombre» conserva esa forma y el matiz masculino-legal del original mejor que una neutralización a «persona».
- source_word: קֳדָשָׁיו
  english_pob_choice: his holy gifts
  chosen_spanish: las cosas santas de cada hombre
  alternatives_spanish:
  - sus cosas santas
  - sus ofrendas santas
  - sus cosas consagradas
  lexicon: HALOT
  rationale: El plural posesivo קדשׁיו se refiere a elementos apartados como sagrados. «Cosas santas» sigue de cerca la amplitud del hebreo y evita introducir «ofrendas» si el contexto no lo exige de forma explícita.
- source_word: לוֹ יִהְיוּ
  english_pob_choice: shall be his
  chosen_spanish: serán suyas
  alternatives_spanish:
  - le pertenecerán
  - permanecerán suyas
  lexicon: HALOT
  rationale: La construcción expresa posesión. «Serán suyas» es una reproducción natural y breve del valor posesivo del hebreo, manteniendo la fórmula repetida del versículo.
- source_word: אֲשֶׁר יִתֵּן לַכֹּהֵן
  english_pob_choice: whatever a man gives to the priest
  chosen_spanish: lo que un hombre dé al sacerdote
  alternatives_spanish:
  - lo que un hombre entregue al sacerdote
  - cualquier cosa que un hombre dé al sacerdote
  lexicon: HALOT
  rationale: 'La relativa generaliza el alcance legal: no se trata de un objeto específico sino de cualquier cosa que se dé. «Dé» conserva el valor abierto del imperfecto/jusivo sin sonar arcaico.'
- source_word: לוֹ יִהְיֶה
  english_pob_choice: shall be his
  chosen_spanish: será suyo
  alternatives_spanish:
  - le pertenecerá
  - será de él
  lexicon: HALOT
  rationale: El referente final de «suyo» es el sacerdote, como en el audit trail inglés. El español mantiene la misma tersura posesiva y la ambigüedad controlada del hebreo, resuelta por el contexto.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de Nm 5:10 y el audit trail inglés sin introducir cambios de sentido. Se conserva la repetición posesiva del hebreo con una solución natural en español («serán suyas / será suyo») y se mantiene la referencia final al sacerdote, explicitada en nota como en el original inglés.
  spanish_consistency_notes:
  - Se usa «sacerdote» para כהן, conforme al contexto levítico y al audit trail inglés.
  - Se mantiene «hombre» como traducción distributiva de אִישׁ por fidelidad lexical y por la política de precisión de género del proyecto.
  - No se sustituye el valor posesivo por una paráfrasis explicativa extensa; la nota cubre la ambigüedad final sin cargar el texto principal.
