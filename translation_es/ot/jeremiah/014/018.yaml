  glossary_alignment: No hay conflictos con los términos de proyecto. No aparece Yahvé, Mesías, Espíritu, etc. Las decisiones «profeta», «sacerdote», «espada», «hambre» y «tierra» son compatibles con la guía. «Andan por la tierra» preserva adecuadamente la neutralidad del hebreo difícil.
