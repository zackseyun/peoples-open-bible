id: PHM.1.21
reference: Philemon 1:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πεποιθὼς τῇ ὑπακοῇ σου ἔγραψά σοι, εἰδὼς ὅτι καὶ ὑπὲρ ⸀ἃ λέγω ποιήσεις.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/021.yaml
  text: Confident of your obedience[a], I wrote to you, knowing that you will do even more than I say.
  footnotes:
  - marker: a
    text: Or 'beyond what I am saying.' Paul may imply that Philemon will exceed the specific request he has made, but the text does not state exactly how.
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 그대의 순종을 확신하면서 이 편지를 썼습니다. 그대가 내가 말하는 것 이상으로 행할[a] 줄 알기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내가 말하는 것을 넘어서」. 바울은 빌레몬이 자신의 구체적 요청을 능가하리라는 점을 함축하지만, 본문은 그 구체적인 내용까지 명시하지는 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεποιθὼς
  english_pob_choice: Confident
  chosen_korean: 확신하면서
  alternatives_korean:
  - 신뢰하면서
  - 믿으면서
  lexicon: BDAG
  rationale: πείθω의 현재완료 능동분사로 정착된 확신의 상태를 가리킨다. 「확신하면서」가 합쇼체 분사 흐름에 자연스럽다.
- source_word: τῇ ὑπακοῇ σου
  english_pob_choice: of your obedience
  chosen_korean: 그대의 순종을
  alternatives_korean:
  - 그대의 순종에
  - 그대의 응함을
  lexicon: BDAG
  rationale: ὑπακοή는 순종·복종. 「순종」이 바울의 사도적 권면에 응답하는 빌레몬의 의지적 응답의 도덕적 무게를 살린다. 「응함」 같이 약하게 옮겨서는 안 된다.
- source_word: ἔγραψά σοι
  english_pob_choice: I wrote to you
  chosen_korean: 이 편지를 썼습니다
  alternatives_korean:
  - 그대에게 썼습니다
  - 그대에게 편지했습니다
  lexicon: BDAG
  rationale: 부정과거. 합쇼체 「~썼습니다」로 옮긴다. 「이 편지를」을 보충하여 문맥을 자연스럽게 한다.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_korean: 알기 때문입니다
  alternatives_korean:
  - 알면서
  - 아는 까닭에
  lexicon: BDAG
  rationale: οἶδα의 분사. 본 절에서 인과·근거의 무게가 강하므로 합쇼체 종결 「~알기 때문입니다」로 마무리해 바울의 확신의 근거를 분명히 한다.
- source_word: καὶ ὑπὲρ ἃ λέγω
  english_pob_choice: even more than I say
  chosen_korean: 내가 말하는 것 이상으로
  alternatives_korean:
  - 내가 말한 것보다 더
  - 내가 말하는 것을 넘어서
  lexicon: BDAG
  rationale: ὑπέρ + 대격은 「~을 능가하여」. 「이상으로」가 자연스럽고 바울의 함축적 기대(빌레몬이 명시된 요청을 넘어 더 할 것)를 보존한다.
- source_word: ποιήσεις
  english_pob_choice: you will do
  chosen_korean: 행할
  alternatives_korean:
  - 할
  - 행하실
  lexicon: BDAG
  rationale: 미래. 「행할」이 합쇼체 산문에 자연스럽고, 본문의 의도적 무규정성을 유지한다.
theological_decisions:
- issue: ὑπακοή — 「순종」을 약화시키지 않음
  chosen_reading: 순종
  alternative_readings:
  - 응함
  - 협조
  rationale: 본문은 명시적으로 ὑπακοή를 사용하며, 이는 사도적 권위에 대한 의지적 응답의 무게를 담는다. 「순종」을 유지해 본문의 어휘적 무게를 살린다.
  doctrine_reference: 'Translation philosophy §1, §5'
- issue: 「내가 말하는 것 이상으로」의 함축
  chosen_reading: 의도적으로 무규정성을 유지 — 바울이 기대하는 구체적 행위를 명시하지 않음
  alternative_readings:
  - 오네시모를 해방시켜 주리라는 함의
  - 단지 관대한 영접의 약속
  rationale: 바울의 표현은 시사적이지만 명시적이지 않다. 본 번역은 그 수사적·신학적 긴장을 본문에서 해소하지 않고 보존한다.
  doctrine_reference: 'Translation philosophy §3'
