base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/008.yaml
  text: When they were by the great stone that is in Gibeon[a], Amasa came before them. Now Joab was clothed in his garment, and over it was a belt with a sword fastened to his waist in its sheath; and as he went out[c][b], it fell.
  footnotes:
  - marker: a
    text: Or, 'Amasa came to meet them.' The Hebrew literally says 'came before them.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'his robe' or 'the garment he wore'; the Hebrew likely refers to Joab's military attire.
    reason: lexical_alternative
  - marker: c
    text: The subject of 'it fell' is most likely the sword, implied by the feminine verb in Hebrew.
    reason: lexical_alternative
