review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego en casi todos los puntos: «juicio» por κρίσις, «injusto» por ἄδικον, y la serie doxológica «fuerza… reino… autoridad… majestad» preservan correctamente los matices distinguidos en la auditoría inglesa. «Bendito sea el Dios de la verdad» también corresponde fielmente a εὐλογητὸς ὁ θεὸς τῆς ἀληθείας. El único ajuste necesario es en τῶν πάντων αἰώνων: el borrador lo adhiere solo a «majestad» («la majestad de todos los siglos»), cuando en el griego la frase califica el conjunto doxológico con sentido temporal, no una posesión genitiva de «majestad».'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. Sin embargo, la secuencia con comas tras cada elemento suena algo trabada, y la colocación de «de todos los siglos» tras «majestad» induce una lectura menos natural y menos fiel. Reordenar la frase para que la expresión temporal cierre toda la doxología mejora tanto la fidelidad como la fluidez.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. «Dios» y «verdad» están bien. La conservación de la personificación mediante «su / suya» es aceptable en español y sigue la decisión teológica documentada sin forzar un femenino explícito artificial.
  issues:
  - severity: medium
    issue: Ubicación de «de todos los siglos»
    rationale: El griego τῶν πάντων αἰώνων funciona como remate de toda la declaración («la fuerza… el reino… la autoridad… la majestad… de todos los siglos» / temporalmente, «por todos los siglos»), no como complemento inmediato de «majestad» solamente. La redacción actual puede entenderse como «la majestad de todos los siglos», lo cual altera la relación sintáctica y el sentido.
  - severity: low
    issue: Puntuación algo pesada en la enumeración
    rationale: La repetición de comas después de cada «y» no es incorrecta, pero una secuencia más limpia mejora la lectura litúrgica sin apartarse del original.
  revised_spanish_text: Y en su juicio no hay nada injusto[a]. Y suya es la fuerza y el reino y la autoridad y la majestad por todos los siglos. Bendito sea el Dios de la verdad.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «de todos los siglos».'
    reason: lexical_alternative
  revision_rationale: Se revisa solo la segunda oración para evitar que «de todos los siglos» modifique únicamente «majestad» y para expresar de manera natural en español el valor temporal de τῶν πάντων αἰώνων. Se mantiene una nota breve con la alternativa más literal, ya que la auditoría inglesa preservó esa posibilidad. No se requieren cambios doctrinales ni una relectura compleja del pasaje.
