revisions:
- from: Y los oficiales se enojaron contra Jeremías[a], y lo golpearon y lo pusieron en la casa del encarcelamiento, en la casa de Jehonatán el escriba[b], porque de ella habían hecho una prisión.
  to: Y los oficiales se enfurecieron contra Jeremías[a], y lo golpearon y lo pusieron en la casa de confinamiento, en la casa de Jehonatán el escriba[b], porque la habían hecho una prisión.
  rationale: Se ajustó la intensidad de וַיִּקְצְפוּ a «se enfurecieron» para reflejar mejor la fuerza del hebreo y la decisión auditada en inglés. Se cambió «casa del encarcelamiento» por «casa de confinamiento» para conservar la metáfora del original con español más natural. Se simplificó la cláusula final a «porque la habían hecho una prisión», que reproduce mejor el sentido de עָשׂוּ לְבֵית הַכֶּלֶא sin la torpeza de «de ella». También se actualizó la nota [a] para mantener coherencia con el verbo principal revisado.
