translation:
  language: es
  text: Así que Sadoc el sacerdote, Natán el profeta, Benaía hijo de Joiada, y los cereteos y los peleteos[a] descendieron e hicieron que Salomón montara en la mula del rey David[b][c], y lo llevaron a Gihón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «la guardia real» para «los cereteos y los peleteos»; el hebreo conserva los nombres de los grupos.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mula del rey David».'
    reason: lexical_alternative
  - marker: c
    text: El sustantivo hebreo para «mula» es gramaticalmente femenino y puede designar una mula hembra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo hebreo ירד conserva con claridad el movimiento descendente; en español, «descendieron» mantiene ese valor sin sonar artificial en un contexto narrativo solemne.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el cura
  - el presbítero
  lexicon: HALOT
  rationale: כהן corresponde de forma directa a «sacerdote». «El sacerdote» conserva el título apposicional junto al nombre propio.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el vidente
  lexicon: HALOT
  rationale: נביא se traduce naturalmente como «profeta». La forma mantiene el paralelo con «el sacerdote».
- source_word: בֶן יְהוֹיָדָע
  english_pob_choice: son of Jehoiada
  chosen_spanish: hijo de Joiada
  alternatives_spanish:
  - el hijo de Joiada
  lexicon: HALOT
  rationale: La relación patronímica se expresa con la construcción normal en español «hijo de». «Joiada» sigue la forma usual en español del nombre hebreo.
- source_word: הַכְּרֵתִי וְהַפְּלֵתִי
  english_pob_choice: the Cherethites and the Pelethites
  chosen_spanish: los cereteos y los peleteos
  alternatives_spanish:
  - los quereteos y los peleteos
  - la guardia real
  lexicon: HALOT
  rationale: Se conservan los nombres de grupo como nombres propios colectivos, siguiendo la prudencia del texto inglés ante la ambigüedad sobre su función exacta. «La guardia real» sería interpretativo y por eso no se adopta en el texto principal.
- source_word: וַיַּרְכִּבוּ
  english_pob_choice: had Solomon ride on
  chosen_spanish: hicieron que Salomón montara en
  alternatives_spanish:
  - pusieron a Salomón sobre
  - montaron a Salomón en
  lexicon: HALOT
  rationale: El hiphil de רכב expresa causar que alguien monte. «Hicieron que… montara en» conserva la causalidad sin forzar un calco incómodo.
- source_word: פִּרְדַּת
  english_pob_choice: mule
  chosen_spanish: mula
  alternatives_spanish:
  - mulo
  - mula hembra
  lexicon: HALOT
  rationale: El sustantivo designa una mula; en español «mula» comunica la referencia animal de modo natural. La posible precisión de sexo no se explicita en el texto principal porque no es necesaria para la escena.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David’s
  chosen_spanish: de David, el rey
  alternatives_spanish:
  - de David, el rey David
  - del rey David
  lexicon: HALOT
  rationale: 'El hebreo expresa posesión: «la mula del rey David». En español, «la mula de David, el rey» conserva la relación posesiva y la aposición real, aunque con orden más natural en la frase.'
- source_word: וַיֹּלִכוּ אֹתוֹ
  english_pob_choice: they brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: HALOT
  rationale: El verbo causativo de הלך puede rendirse como «llevar» o «conducir». «Lo llevaron» funciona bien en el contexto procesional y evita introducir una distinción no requerida por el hebreo.
- source_word: עַל גִּחוֹן
  english_pob_choice: to Gihon
  chosen_spanish: a Gihón
  alternatives_spanish:
  - hasta Gihón
  - hacia Gihón
  lexicon: HALOT
  rationale: 'Aunque la preposición hebrea es על, el contexto de desplazamiento permite en español una meta simple con «a». Se mantiene el topónimo con acento gráfico español: «Gihón».'
translation_notes:
  revision_awareness: 'Se atendió la validación previa: ahora cada marca de nota aparece exactamente en el texto español. Además, se mantuvo la causalidad de וַיַּרְכִּבוּ con una construcción natural en español y se conservó la ambigüedad prudente sobre los cereteos y peleteos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se traduce el nombre propio como «Gihón» con acento ortográfico español.
  - 'Se mantiene la equivalencia de títulos: «sacerdote» y «profeta» en aposición directa a los nombres propios.'
  - Se conserva la lectura de grupo en «los cereteos y los peleteos» sin reinterpretarlos como función militar en el texto principal.
