revisions:
- from: Así que quitaron de en medio de ellos los dioses extranjeros y sirvieron a Yahvé[a], y él se impacientó[b] por la angustia de Israel.
  to: Entonces quitaron de entre ellos los dioses extranjeros y sirvieron a Yahvé, y él se impacientó[a] por la angustia de Israel.
  rationale: Se elimina la nota innecesaria sobre «Yahvé», se reemplaza «Así que» por «Entonces» para evitar un matiz inferencial no exigido por el hebreo, y se mejora la fluidez con «de entre ellos». Se conserva «se impacientó» con nota explicativa, en línea con la decisión léxica y teológica documentada en el POB.
