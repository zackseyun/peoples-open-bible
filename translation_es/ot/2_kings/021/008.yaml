base_translation:
  language: en
  yaml_path: translation/ot/2_kings/021/008.yaml
  text: And I will not again make Israel’s feet wander from the land that I gave to their fathers[a], if only they are careful to do according to all that I commanded them[c][b], and according to all the law that my servant Moses commanded them.
  footnotes:
  - marker: a
    text: Or 'make Israel move' / 'remove Israel from the land.' The Hebrew literally says 'make Israel’s foot wander,' preserving the image of displacement.
    reason: lexical_alternative
  - marker: b
    text: Or 'their ancestors.' Hebrew 'their fathers' is a covenantal expression for the forefathers of Israel.
    reason: lexical_alternative
  - marker: c
    text: '''The law'' may also be rendered ''the instruction''; here it refers to the Mosaic Torah commanded through Moses.'
    reason: lexical_alternative
