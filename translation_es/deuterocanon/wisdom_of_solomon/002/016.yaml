translation:
  language: es
  text: Fuimos tenidos por espurios[a] por él, y se aparta de nuestros caminos como de impurezas; llama bienaventurado el fin[b] de los justos, y se jacta de que Dios es su padre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falsos», «falsificados» o «no genuinos»; el griego expresa la idea de algo espurio o no auténtico.
    reason: lexical_alternative
  - marker: b
    text: O «el estado final» o «el desenlace de los justos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «se jacta [de] padre Dios»; es decir, afirma que Dios es su padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: κίβδηλον
  english_pob_choice: counterfeit
  chosen_spanish: falsos
  alternatives_spanish:
  - falsificados
  - espurios
  - no genuinos
  lexicon: LSJ
  rationale: El griego expresa algo no auténtico o no genuino. En español, «falsos» comunica bien la idea sin sonar demasiado técnico, y evita añadir una metáfora metalúrgica que el contexto no exige.
- source_word: ἐλογίσθημεν
  english_pob_choice: were considered
  chosen_spanish: fuimos considerados
  alternatives_spanish:
  - fuimos tenidos por
  - fuimos reputados
  lexicon: LSJ
  rationale: El pasivo de λογίζομαι aquí indica una evaluación o juicio sobre ellos. «Fuimos considerados» conserva ese valor y suena natural en español.
- source_word: ἀπέχεται
  english_pob_choice: keeps away
  chosen_spanish: se aparta
  alternatives_spanish:
  - se mantiene alejado
  - se abstiene
  - se distancia
  lexicon: LSJ
  rationale: El verbo puede implicar mantenerse apartado o abstenerse. Con «se aparta» se conserva la separación deliberada y se ajusta bien al régimen con «de nuestros caminos».
- source_word: ὁδῶν
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - conducta
  - maneras de vivir
  lexicon: LSJ
  rationale: «Caminos» preserva la metáfora bíblica común de la conducta o modo de vida, y suena natural en español.
- source_word: ἀκαθαρσιῶν
  english_pob_choice: uncleannesses
  chosen_spanish: impurezas
  alternatives_spanish:
  - inmundicias
  - cosas impuras
  - contaminaciones
  lexicon: LSJ
  rationale: El plural griego enfatiza aquello que contamina ritualmente o moralmente. «Impurezas» mantiene el campo semántico de limpieza/contaminación sin sonar forzado.
- source_word: μακαρίζει
  english_pob_choice: calls ... blessed
  chosen_spanish: llama feliz
  alternatives_spanish:
  - declara bienaventurado
  - llama bienaventurado
  - considera dichoso
  lexicon: LSJ
  rationale: El verbo significa llamar o tener por bendecido/feliz. «Llama feliz» sigue de cerca la lógica del texto y deja abierto el matiz de “bendecido” sin imponer lenguaje eclesiástico posterior.
- source_word: ἔσχατα
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el desenlace
  - el estado final
  - el último destino
  lexicon: LSJ
  rationale: En este contraste de destinos, «el fin» reproduce la concisión del plural griego y mantiene la referencia al desenlace final.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  - de los piadosos
  lexicon: LSJ
  rationale: «Justos» es la equivalencia natural y bíblica para δικαίων, y mantiene la categoría moral-religiosa sin expandirla.
- source_word: ἀλαζονεύεται
  english_pob_choice: boasts
  chosen_spanish: se jacta
  alternatives_spanish:
  - se gloria
  - se vanagloria
  - presume
  lexicon: LSJ
  rationale: El verbo conlleva arrogancia y ostentación. «Se jacta» transmite bien ese tono despectivo.
- source_word: πατέρα θεόν
  english_pob_choice: that God is his father
  chosen_spanish: de que Dios es su padre
  alternatives_spanish:
  - de Dios como padre
  - de tener a Dios por padre
  - de que tiene a Dios por padre
  lexicon: LSJ
  rationale: La construcción griega es comprimida; en español se necesita explicitar el contenido de la jactancia. «De que Dios es su padre» mantiene la relación paterna sin resolverla doctrinalmente.
theological_decisions:
- issue: La frase «llama feliz el fin de los justos»
  english_pob_reading: The wicked say the righteous man calls the end of the righteous blessed.
  chosen_spanish_reading: 'El texto refleja la acusación de los impíos: el justo es visto como alguien que valora como feliz el desenlace de los justos.'
  alternative_spanish_readings:
  - llama bienaventurado el final de los justos
  - declara feliz el destino final de los justos
  rationale: El griego y el inglés POB presentan la idea como una acusación de los impíos contra el justo. La versión española mantiene esa tensión sin convertirla en una afirmación doctrinal del narrador.
  doctrine_reference: Preservar la tensión literaria y retórica del pasaje sin resolverla.
- issue: «Dios es su padre» como acusación o jactancia
  english_pob_reading: boasts that God is his father
  chosen_spanish_reading: se jacta de que Dios es su padre
  alternative_spanish_readings:
  - se gloría de que Dios es su padre
  - presume tener a Dios por padre
  rationale: El verbo ἀλαζονεύεται implica jactancia arrogante. La traducción conserva ese matiz y evita convertir la frase en una simple confesión piadosa.
  doctrine_reference: Mantener el valor polémico del discurso de los impíos frente al justo.
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego de la edición Swete 1909 y el rastro auditado en inglés POB. Se conservaron las decisiones centrales del inglés: κίβδηλον como no genuino/falso, ἐλογίσθημεν como juicio evaluativo, ἀπέχεται como separación deliberada, μακαρίζει como llamar feliz/bienaventurado, ἔσχατα como desenlace final, y ἀλαζονεύεται + πατέρα θεόν como jactancia de filiación con Dios. Se evitó suavizar el tono polémico del pasaje.'
  spanish_consistency_notes:
  - Se usó «Dios» sin mayúsculas reverenciales adicionales, conforme al criterio de la serie.
  - Se prefirió «justos» para δικαίων y «caminos» para ὁδοί en coherencia bíblica.
  - Se mantuvo una sintaxis fluida en español sin perder las relaciones del original.
  - Las notas al pie preservan las alternativas léxicas significativas del audit trail inglés.
