    text: Hebrew “to all his house,” that is, to all Saul’s household/estate.
    reason: lexical_alternative
  - marker: c
    text: “Your master’s son” refers to Mephibosheth, Saul’s descendant and Ziba’s superior in the household structure.
    reason: cultural_note
