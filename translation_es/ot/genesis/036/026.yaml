translation:
  language: es
  text: 'Y estos fueron los hijos de Disán: Hemdan, Eshbán, Itrán y Querán[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones en inglés escriben este nombre como "Cheran". La forma hebrea puede transliterarse de cualquiera de las dos maneras; aquí se usa "Querán" por ser más transparente respecto de la consonante hebrea.
