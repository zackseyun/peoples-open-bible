review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la estructura del hebreo y del POB inglés: instrucción sobre la parte superior del arca, la puerta en su costado y tres niveles. Sin embargo, «abertura» como texto principal para צֹהַר se aparta de la decisión principal auditada («roof») y además no encaja bien con «harás una abertura para el arca» en este contexto arquitectónico. También «niveles inferiores, segundos y terceros» suena poco natural y no refleja con claridad la serie de tres niveles: inferior, segundo y tercero.'
  spanish_quality_summary: 'El español es comprensible, pero tiene dos puntos mejorables: «abertura» resulta impreciso y algo tosco en esta frase, y la secuencia «niveles inferiores, segundos y terceros» es poco idiomática. «Techo» en el texto con nota de alternativas, y «nivel inferior, segundo y tercero» mejora fidelidad y legibilidad. La cláusula difícil «la terminarás a un codo desde arriba» puede mantenerse como una formulación sobria y fielmente ambigua.'
  glossary_alignment: 'No hay términos teológicos mayores en este versículo. La principal cuestión léxica es respetar el audit trail para צֹהַר: el POB inglés optó por «roof» con alternativas en nota. En español, «techo» preserva mejor esa decisión principal, mientras que «ventana», «claraboya» y similares pueden quedar en nota.'
  issues:
  - severity: medium
    issue: La traducción principal de צֹהַר como «abertura» no sigue la decisión principal auditada.
    rationale: El POB inglés eligió «roof» como opción principal por el contexto arquitectónico, dejando «window/skylight» como alternativas en nota. «Abertura» intenta mezclar ambas posibilidades, pero en español no comunica bien un elemento superior estructural y debilita la correspondencia con la decisión documentada.
  - severity: medium
    issue: «niveles inferiores, segundos y terceros» es poco natural y ambiguo.
    rationale: 'La serie hebrea enumera tres niveles: inferior, segundo y tercero. En español, el plural con adjetivos ordinales así coordinados suena forzado; «con nivel inferior, segundo y tercero» o equivalente expresa mejor la enumeración.'
  revised_spanish_text: Harás un techo[a] para el arca, y la terminarás a un codo desde arriba.[b] Pondrás la puerta del arca en su costado. La harás con nivel inferior, segundo y tercero.[c]
  revised_footnotes:
