theological_decisions:
- issue: Rendering of παῖδας in a slave-trade context
  chosen_reading: servants
  alternative_readings:
  - slaves
  - boys
  rationale: The context clearly concerns the purchase of Israelites as captives, so the bonded sense is required. However, because the project default for δοῦλος does not directly govern παῖς, and because παῖς has a wider semantic range, 'servants' was chosen in the main text with 'slaves' preserved as an alternative. This avoids overclaiming a single English equivalent while still reflecting the exploitative context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
