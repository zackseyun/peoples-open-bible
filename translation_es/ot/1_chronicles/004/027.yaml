review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Simeí tuvo 16 hijos y 6 hijas; sus hermanos no tuvieron muchos hijos; y sus grupos de parentesco no crecieron al nivel de los descendientes de Judá. Sin embargo, ‘familias’ debilita el sentido genealógico de מִשְׁפַּחְתָּם, que en este contexto se entiende mejor como ‘clanes’. Además, en español ‘todas sus familias no se multiplicaron’ suena menos natural que una formulación con ‘ninguno de sus clanes llegó a multiplicarse…’ o ‘todos sus clanes no llegaron a multiplicarse…’; conviene ajustar la redacción para claridad manteniendo el valor colectivo.'
  spanish_quality_summary: El español es claro, pero ‘todas sus familias no se multiplicaron’ suena algo forzado y menos idiomático. ‘Clanes’ encaja mejor en un registro genealógico bíblico y evita la lectura moderna de ‘familias’ como núcleos domésticos. El resto del versículo es natural y fiel.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. La decisión clave es genealógica: מִשְׁפָּחָה debe preferirse como ‘clan(es)’ en este contexto, en línea con la auditoría inglesa. ‘Simeí’, ‘hijos’, ‘hijas’ y ‘Judá’ están bien.'
  issues:
  - severity: medium
    issue: ‘familias’ para מִשְׁפַּחְתָּם en contexto genealógico
    rationale: La auditoría inglesa documenta ‘clans’ porque מִשְׁפָּחָה aquí denota una unidad de parentesco amplia, no la familia nuclear moderna. En español ‘familias’ puede inducir una lectura demasiado doméstica.
  - severity: low
    issue: Redacción poco natural en ‘todas sus familias no se multiplicaron’
    rationale: Aunque comprensible, la negación con sujeto plural suena algo rígida en español. Una formulación como ‘ninguno de sus clanes llegó a multiplicarse tanto…’ expresa mejor el sentido distributivo/colectivo sin cambiar el significado.
  revised_spanish_text: Simeí tuvo dieciséis hijos y seis hijas[a], pero sus hermanos no tuvieron muchos hijos, y ninguno de sus clanes llegó a multiplicarse tanto como los hijos de Judá.
  revised_footnotes:
  - marker: a
    text: 'O: ‘no llegaron a ser tan numerosos como los hijos de Judá’.'
    reason: lexical_alternative
  revision_rationale: Se revisa ‘familias’ a ‘clanes’ para reflejar mejor מִשְׁפָּחָה en un contexto genealógico, y se mejora la naturalidad del español con ‘ninguno de sus clanes llegó a multiplicarse tanto…’, que preserva la comparación de cantidad documentada en la POB inglesa. También se normaliza la nota al pie quitando comillas y puntuación sobrantes.
