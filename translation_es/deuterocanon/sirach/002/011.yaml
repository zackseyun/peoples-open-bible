translation:
  language: es
  text: Porque Yahvé es compasivo y clemente[a]; perdona las iniquidades y salva en tiempo de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: ''misericordioso y clemente''. El hebreo רָחוּם וְחַנּוּן y el griego οἰκτίρμων καὶ ἐλεήμων forman una fórmula bíblica conocida para describir el carácter de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָחוּם / οἰκτίρμων
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT / BDAG
  rationale: El hebreo y el griego describen una compasión profunda y activa. 'Compasivo' comunica bien ese sentido en español moderno sin volverlo frío ni arcaico.
- source_word: חַנּוּן / ἐλεήμων
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - misericordioso
  lexicon: HALOT / BDAG
  rationale: '''Clemente'' expresa la disposición favorable y benevolente de Dios con dignidad literaria. En este contexto evita la ambigüedad de ''gracioso'' en español y preserva la pareja tradicional de atributos con matiz distinto a ''compasivo''.'
- source_word: יְהֹוָה / ὁ Κύριος
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT / tradición de transliteración del Tetragrámaton
  rationale: El hebreo trae el nombre divino directamente; por la norma del proyecto se mantiene 'Yahvé' en lugar de ocultarlo con un título. El griego κύριος funciona como equivalente reverencial del nombre, no como razón para sustituirlo por 'Señor' en el texto principal.
- source_word: וְסוֹלֵחַ / ἀφίησιν
  english_pob_choice: he forgives
  chosen_spanish: perdona
  alternatives_spanish:
  - cancela
  - remite
  lexicon: HALOT / BDAG
  rationale: El participio hebreo y el verbo griego expresan la acción característica de Dios de conceder perdón. 'Perdona' es natural y preciso en español.
- source_word: לַעֲוֹנוֹת / ἁμαρτίας
  english_pob_choice: iniquities
  chosen_spanish: las iniquidades
  alternatives_spanish:
  - los pecados
  - las culpas
  lexicon: HALOT / BDAG
  rationale: El hebreo עֲוֹנוֹת apunta a perversidad/iniquidad o culpa, y el audit trail inglés revisó de 'sins' a 'iniquities' para reflejar mejor el término. 'Iniquidades' conserva esa carga semántica más fuerte que 'pecados'.
- source_word: וּמוֹשִׁיעַ / σώζει
  english_pob_choice: and saves
  chosen_spanish: y salva
  alternatives_spanish:
  - y rescata
  - y libra
  lexicon: HALOT / BDAG
  rationale: '''Salva'' mantiene la conexión bíblica amplia del verbo y coincide con el griego σώζει. ''Rescata'' o ''libra'' serían posibles, pero estrechan o desplazan el matiz general.'
- source_word: בְּעֵת צָרָה / ἐν καιρῷ θλίψεως
  english_pob_choice: in a time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en un tiempo de aflicción
  - en tiempo de tribulación
  lexicon: HALOT / BDAG
  rationale: La expresión hebrea y griega designa una coyuntura de opresión o aflicción. 'Angustia' es idiomática y comunica bien la gravedad de צָרָה / θλίψις en español.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El versículo usa explícitamente el Tetragrámaton. Siguiendo la directriz del proyecto, se preserva el nombre divino en español como 'Yahvé' y no se lo reemplaza por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Pareja atributiva divina רָחוּם וְחַנּוּן / οἰκτίρμων καὶ ἐλεήμων
  english_pob_reading: compassionate and gracious
  chosen_spanish_reading: compasivo y clemente
  alternative_spanish_readings:
  - misericordioso y clemente
  - compasivo y gracioso
  rationale: 'La fórmula bíblica es tradicional y no debe diluirse. En español, ''compasivo y clemente'' conserva dos rasgos distintos: compasión activa y benevolencia indulgente. Se evita ''gracioso'' por su ambigüedad moderna.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'sins' a 'iniquities' para reflejar mejor עֲוֹנוֹת; por eso se evita 'pecados' en el español principal. También se mantiene la lectura de nombre divino ya actualizada a Yahvé y no se retrocede a una convención de ocultamiento.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' coherentemente con el estándar del proyecto para יְהֹוָה.
  - '''Iniquidades'' refleja mejor עֲוֹנוֹת que ''pecados'', y evita suavizar el matiz moral/jurídico del hebreo.'
  - '''Compasivo y clemente'' busca una pareja natural en español que conserve la fórmula hebrea/griega sin sonar calcada.'
  - La nota textual se ancla en la pareja atributiva porque ahí está la alternativa principal preservada por el audit trail.
