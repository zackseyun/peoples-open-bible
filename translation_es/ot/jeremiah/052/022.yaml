translation:
  language: es
  text: Y sobre él había un capitel de bronce; y la altura del capitel, el uno, era de cinco codos, con entramado[a] y granadas alrededor del capitel, todo de bronce. Y el segundo pilar tenía lo mismo[b], con granadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «red» o «malla» para «entramado».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «granadas»; probablemente adornos con forma de granada decorando el capitel.
    reason: cultural_note
lexical_decisions:
- source_word: כֹתֶרֶת
  english_pob_choice: capital
  chosen_spanish: capitel
  alternatives_spanish:
  - capitel ornamental
  - chapitel
  lexicon: HALOT
  rationale: En arquitectura del templo, el término designa la parte ornamental superior de una columna. «Capitel» es el equivalente español claro y estándar; «chapitel» es más antiguo y menos natural.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre la columna
  lexicon: HALOT
  rationale: El sufijo retoma el pilar mencionado antes. «Sobre él» conserva la relación espacial de manera natural en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En el material del tabernáculo/templo, el término suele referirse a bronce; «cobre» es posible pero menos preciso en este contexto, y «latón» es históricamente menos probable.
- source_word: קוֹמַת
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - estatura
  lexicon: HALOT
  rationale: Aquí se habla de una medida vertical de la pieza, no de estatura humana. «Altura» expresa mejor el valor dimensional.
- source_word: הָאַחַת
  english_pob_choice: the one
  chosen_spanish: el primer
  alternatives_spanish:
  - el uno
  - uno de los
  lexicon: HALOT
  rationale: En español, dentro de una descripción duplicada de dos pilares, «el primer capitel» comunica con claridad la distinción entre ambos elementos sin perder el matiz del hebreo.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - unos dos metros y medio
  - cinco medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua del texto fuente para mantener la exactitud y la estructura descriptiva original.
- source_word: שְׂבָכָה
  english_pob_choice: latticework
  chosen_spanish: entramado
  alternatives_spanish:
  - celosía
  - rejilla
  lexicon: HALOT
  rationale: La palabra denota una estructura reticulada o en red. «Entramado» comunica bien la idea de una ornamentación calada sin forzar un tecnicismo excesivo; «celosía» también sería posible, pero puede sonar más arquitectónica moderna.
- source_word: רִמּוֹנִים
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - granadas con forma de fruto
  - adornos en forma de granada
  lexicon: HALOT
  rationale: Se mantiene el término literal, como en el hebreo y en la versión inglesa POB, dejando abierta la referencia a ornamentos con forma de granada.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno a
  - todo alrededor
  lexicon: HALOT
  rationale: Expresa de modo natural la disposición circular de los adornos.
- source_word: הַכֹּל נְחֹשֶׁת
  english_pob_choice: all of bronze
  chosen_spanish: todo de bronce
  alternatives_spanish:
  - todo era de bronce
  - enteramente de bronce
  lexicon: HALOT
  rationale: La frase resume la composición material de los elementos decorativos. «Todo de bronce» es breve y fiel.
- source_word: וְכָאֵלֶּה
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - del mismo modo
  - igual
  lexicon: HALOT
  rationale: El hebreo es elíptico y compara el segundo pilar con el primero. «Lo mismo» reproduce esa equivalencia sin añadir más de lo que el texto dice.
- source_word: לָעַמּוּד הַשֵּׁנִי
  english_pob_choice: the second pillar had
  chosen_spanish: el segundo pilar tenía
  alternatives_spanish:
  - para el segundo pilar
  - al segundo pilar
  lexicon: HALOT
  rationale: Como en inglés, se completa la elipsis con un verbo de posesión para que la oración sea idiomática en español, preservando el sentido de atributos compartidos por el segundo pilar.
translation_notes:
  revision_awareness: 'La revisión reciente no introdujo cambios: el texto fue aprobado sin modificaciones, con alto grado de acuerdo entre revisores.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma predeterminada del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo la unidad «codos» en vez de convertirla a medidas modernas, siguiendo el criterio del texto fuente.
  - «Capitel» y «entramado» se usan de forma consistente con la terminología arquitectónica del pasaje y con el audit trail inglés.
  - 'Los dos pies de nota reflejan las mismas ambigüedades documentadas en la versión inglesa: la posible equivalencia de שְׂבָכָה y el valor cultural de רִמּוֹנִים.'
