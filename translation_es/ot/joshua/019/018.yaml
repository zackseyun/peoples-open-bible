    text: El hebreo lleva una terminación direccional en «Jezreel», que puede entenderse como «hacia Jezreel»; sin embargo, aquí se toma como uno de los lugares del límite.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'frontera' a 'límite' para reflejar mejor גְּבוּל en contexto de demarcación tribal, y se normaliza el segundo topónimo a una forma española más consistente y legible. Se conserva la nota sobre la terminación direccional de 'Jezreel' porque forma parte del audit trail y sigue siendo útil para transparencia lexical.
