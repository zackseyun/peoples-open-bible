  glossary_alignment: No hay conflicto con los términos globales del proyecto. «Lascivia» es defendible para זִמָּה en este contexto sexual-moral, aunque «conducta vergonzosa» o «depravación» serían alternativas posibles. «Serán advertidas» preserva adecuadamente la decisión auditada con nota alternativa.
