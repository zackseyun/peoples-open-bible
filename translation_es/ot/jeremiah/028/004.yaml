translation:
  language: es
  text: Y haré volver a este lugar a Jeconías hijo de Joaquim, rey de Judá, y a todos los desterrados[a] de Judá que vinieron a Babilonia, dice Yahvé, porque romperé el yugo del rey de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'los que vienen a Babilonia'. El hebreo usa un participio ('los que vienen/venían'), pero en español 'que vinieron a Babilonia' expresa de manera más natural el grupo ya deportado sin añadir una pasiva como 'fueron llevados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְכָנְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Jeconías
  lexicon: n/a
  rationale: Se conserva el nombre propio en forma transliterada habitual en español bíblico, con adaptación gráfica natural. El inglés POB usa 'Jeconiah' como forma plena del nombre; 'Jeconías' mantiene esa identificación sin introducir una forma menos reconocible en español.
- source_word: גָּלוּת
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la cautividad
  - la comunidad desterrada
  lexicon: HALOT
  rationale: El sustantivo puede referirse al estado de exilio o al grupo deportado; aquí, con el participio siguiente, el referente humano es claro. 'Desterrados' comunica el grupo de personas sin convertirlo en una abstracción.
- source_word: הַבָּאִים בָּבֶלָה
  english_pob_choice: who came to Babylon
  chosen_spanish: que vienen a Babilonia
  alternatives_spanish:
  - que vinieron a Babilonia
  - que llegaron a Babilonia
  - los que van a Babilonia
  lexicon: HALOT
  rationale: El hebreo usa un participio presente ('los que vienen/llegan a Babilonia'). En español, 'que vienen a Babilonia' refleja mejor esa forma verbal que un pasado. Se conserva la tensión del original sin imponer una pasiva no explícita.
- source_word: מֵשִׁיב
  english_pob_choice: I will bring back
  chosen_spanish: haré volver
  alternatives_spanish:
  - traeré de regreso
  - restauraré
  - volveré a traer
  lexicon: HALOT
  rationale: El hiphil de שוב expresa retorno/traer de vuelta. 'Haré volver' es natural en español y preserva el matiz causativo del verbo sin perder la imagen de regreso al lugar señalado.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar mismo
  lexicon: HALOT
  rationale: '''Este lugar'' es la forma más directa y formal en español para el deíctico hebreo, sin añadir especificación geográfica que el versículo no nombra.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - así dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé conforme al criterio del proyecto. 'Dice Yahvé' reproduce de manera sobria y natural la fórmula profética del hebreo בלי mascar el nombre por un título.
- source_word: עֹל
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la coyunda
  - el yugo opresor
  - la carga del yugo
  lexicon: HALOT
  rationale: '''Yugo'' conserva la metáfora política y de servidumbre del texto, ya adoptada por el inglés POB. En español sigue siendo la opción más clara y fiel.'
- source_word: אֶשְׁבֹּר אֶת עֹל מֶלֶךְ בָּבֶל
  english_pob_choice: I will break the yoke of the king of Babylon
  chosen_spanish: romperé el yugo del rey de Babilonia
  alternatives_spanish:
  - quebraré el yugo del rey de Babilonia
  - romperé la dominación del rey de Babilonia
  - haré pedazos el yugo del rey de Babilonia
  lexicon: HALOT
  rationale: Se preserva la imagen metafórica de romper el yugo, sin reinterpretarla como mera 'dominación'. 'Romperé' es natural y suficientemente fuerte para el profeta.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. La política del proyecto pide transliterarlo como 'Yahvé' en el texto principal, evitando la sustitución por un título. 'Yahvé' preserva el nombre de pacto y la audibilidad textual del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del participio הַבָּאִים בָּבֶלָה
  english_pob_reading: who came to Babylon
  chosen_spanish_reading: que vienen a Babilonia
  alternative_spanish_readings:
  - que vinieron a Babilonia
  - que fueron llevados a Babilonia
  rationale: El hebreo expresa la acción con un participio, no con una pasiva. Traducirlo con presente mantiene esa forma y evita introducir la idea de traslado pasivo que el hebreo no explicita aquí, aunque el contexto histórico la presuponga.
  doctrine_reference: Principio de forma verbal y no importación de pasiva no marcada
- issue: Metáfora del 'yugo'
  english_pob_reading: the yoke of the king of Babylon
  chosen_spanish_reading: el yugo del rey de Babilonia
  alternative_spanish_readings:
  - la opresión del rey de Babilonia
  - el dominio del rey de Babilonia
  rationale: La metáfora agrícola-política es central para la acusación y la promesa. Mantener 'yugo' permite que el lector perciba la imagen profética sin sustituciones explicativas que diluyan la fuerza del original.
  doctrine_reference: Uso profético de imagen concreta para dominación política
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado en inglés, que ajustó 'went to Babylon' a 'came to Babylon' para reflejar con mayor precisión el participio hebreo. La versión española conserva ese cambio al usar un presente ('vienen') en lugar de un pasado, y mantiene el resto de la línea sin introducir pasivas o explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - '''Babilonia'' se emplea uniformemente para בָּבֶל en este versículo.'
  - '''Yugo'' se conserva como metáfora política en lugar de paráfrasis explicativa.'
  - '''Desterrados'' traduce el colectivo exílico sin convertirlo en un concepto abstracto.'
