translation:
  language: es
  text: 'Así que los siervos de David llegaron a Abigail en Carmelo y le hablaron[a], diciendo: «David nos ha enviado a ti para tomarte para sí como esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para casarse contigo»; literalmente, «para tomarte ... como esposa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: HALOT
  rationale: En español, «llegaron» comunica la llegada al destino de modo natural y conserva la perspectiva del relato, equivalente al inglés POB «came».
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los hombres de David
  lexicon: HALOT
  rationale: עֶבֶד puede ser «siervo», «esclavo» o «servidor». Aquí el contexto muestra mensajeros de David en función de servicio leal, no énfasis en esclavitud; «siervos» mantiene la relación de subordinación sin sobrecargar el español con «esclavos».
- source_word: אֶל אֲבִיגַיִל
  english_pob_choice: to Abigail
  chosen_spanish: a Abigail
  alternatives_spanish:
  - hacia Abigail
  lexicon: HALOT
  rationale: La preposición אֶל expresa dirección simple; «a Abigail» es la forma natural en español.
- source_word: הַכַּרְמֶלָה
  english_pob_choice: at Carmel
  chosen_spanish: en Carmel
  alternatives_spanish:
  - a Carmel
  - junto a Carmel
  lexicon: HALOT
  rationale: El sufijo direccional apunta al lugar Carmel como destino del movimiento; en español, «en Carmel» comunica el punto de llegada de manera clara y fluida, sin convertirlo en una etiqueta étnica o nominal sobre Abigail.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ לֵאמֹר
  english_pob_choice: spoke to her, saying
  chosen_spanish: le hablaron, diciendo
  alternatives_spanish:
  - le dijeron
  - se dirigieron a ella, diciendo
  lexicon: HALOT
  rationale: La fórmula hebrea de introducción del discurso se conserva con una equivalencia natural. «Le hablaron, diciendo» mantiene el enlace verbal y evita perder la estructura del original.
- source_word: שְׁלָחָנוּ
  english_pob_choice: has sent us
  chosen_spanish: nos ha enviado
  alternatives_spanish:
  - nos envió
  - ha mandado a nosotros
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como completada con relevancia presente; «nos ha enviado» refleja bien ese valor, como en el POB inglés.
- source_word: לְקַחְתֵּךְ
  english_pob_choice: to take you
  chosen_spanish: para tomarte
  alternatives_spanish:
  - para llevarte
  - para recibirte
  lexicon: HALOT
  rationale: לקח en contexto matrimonial no es simplemente «llevar», sino «tomar» a una mujer para esposa. «Para tomarte» conserva el verbo fuente y prepara la aclaración siguiente.
- source_word: לוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: HALOT
  rationale: El pronombre expresa referencia reflexiva a David. «Para sí» reproduce ese sentido de posesión/referencia sin añadir explicaciones ajenas al texto.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - para esposa
  lexicon: HALOT
  rationale: La fórmula matrimonial hebrea se traduce con el equivalente idiomático y fiel «como esposa», que mantiene el valor relacional del sustantivo sin sonar artificial.
translation_notes:
  revision_awareness: Corregido para que el marcador de nota [a] aparezca explícitamente en el texto principal junto a la frase verbal correspondiente, conforme al registro auditado del POB inglés.
  spanish_consistency_notes:
  - Se mantuvo «siervos» por coherencia con la decisión léxica de עֶבֶד en este contexto narrativo.
  - Se evitó «Cristo/SEÑOR» porque no hay fundamento en este versículo; el texto nombra a David y a Abigail directamente.
  - Se conservó la estructura narrativa y la fórmula de discurso, con puntuación española natural y sin amplificación interpretativa.
