source:
  edition: WLC
  text: אַ֠ךְ לֹֽא סָ֜רוּ מֵ/חַטֹּ֧אות בֵּית יָרָבְעָ֛ם אֲשֶׁר החטי אֶת יִשְׂרָאֵ֖ל בָּ֣/הּ הָלָ֑ךְ וְ/גַם֙ הָ/אֲשֵׁרָ֔ה עָמְדָ֖ה בְּ/שֹׁמְרֽוֹן־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/013/006.yaml
  text: Yet they did not turn away from the sins of the house of Jeroboam[a], by which he caused Israel to sin; in them he walked, and even the Asherah remained standing in Samaria.
  footnotes:
  - marker: a
    text: Or 'the Asherah pole'; the Hebrew term can refer to the Canaanite goddess Asherah or, as likely here, the cult object associated with her worship.
    reason: lexical_alternative
