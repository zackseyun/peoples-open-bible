  rationale: Se corrige el anclaje erróneo de la nota [b], se ajusta la pareja léxica de prácticas ocultas para reflejar mejor la distinción del hebreo y del audit trail, y se rehace la nota [c] para que presente una alternativa real al texto principal. También se mejora levemente la naturalidad final con 'provocando su ira'.
