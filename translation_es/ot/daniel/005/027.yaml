review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del arameo: mantiene «Tekel» como transliteración del término inscrito, refleja el pasivo/resultativo de «has sido pesado», preserva la metáfora judicial de pesar y hallar deficiencia, y evita una paráfrasis doctrinal. Sin embargo, la nota b no aporta una alternativa real porque repite la misma frase, y «falto» suena algo menos idiomático en este contexto que «falto de peso» como nota o «insuficiente/deficiente» como alternativa. El texto principal puede mantenerse casi igual, con mejora menor en la nota c para reflejar mejor las alternativas del POB inglés.'
  spanish_quality_summary: 'El español es claro, digno y legible. «Has sido pesado en las balanzas y has sido hallado falto» es comprensible, aunque algo rígido; aun así, sigue siendo aceptable para un registro bíblico formal. Las comillas angulares y la puntuación están bien. La principal reparación necesaria está en las notas: una nota no debe repetir exactamente el texto principal como alternativa.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La transliteración «Tekel» sigue correctamente la decisión documentada para תקל. No hay términos del glosario mayor en disputa aquí. La metáfora de juicio por pesada se preserva sin expansión teológica indebida.
  issues:
  - severity: medium
    issue: La nota b repite el texto principal en vez de dar una alternativa distinta.
    rationale: El inglés documenta como alternativa «on the scales». En español, la nota debe ofrecer algo realmente alternativo, por ejemplo «en la balanza» o «en las balanzas de pesar», no repetir «en las balanzas».
  - severity: low
    issue: La nota c no refleja bien la alternativa inglesa «found wanting».
    rationale: «Falto de peso» puede captar parte de la metáfora, pero conviene incluir «falto» o «insuficiente/deficiente» como alternativas más directas al adjetivo arameo de carencia.
  revised_spanish_text: '«Tekel»: has sido pesado en las balanzas[a][b] y has sido hallado falto[c].'
  revised_footnotes:
  - marker: a
    text: «Tekel» es la palabra aramea escrita que Daniel interpreta; se conserva transliterada para distinguir la palabra inscrita de su explicación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la balanza».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «deficiente» o «insuficiente».'
    reason: lexical_alternative
  revision_rationale: El texto principal es sustancialmente fiel y natural, así que solo requiere una reparación menor en las notas para alinearlas con el expediente inglés y evitar una falsa alternativa repetida. También se ajusta la nota c para representar mejor el campo semántico de carencia/deficiencia sin sobreinterpretar.
