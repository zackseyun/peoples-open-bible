  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'justo', 'justicia' e 'injusticia' preservan bien צדק / עָוֶל y la decisión teológica de no suavizar la advertencia. Se mantiene adecuadamente el contraste judicial del texto.
