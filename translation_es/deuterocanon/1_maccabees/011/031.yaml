translation:
  language: es
  text: También les hemos escrito a ustedes una copia de la carta que Lasthenes escribió a nuestro pariente[a] acerca de ustedes, para que la vean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a nuestro pariente cercano» o «a nuestro asociado/compatriota de honor». El griego συγγενής puede denotar un pariente de sangre, un pariente, o un asociado reconocido según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ἀντίγραφον
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - la copia
  - un traslado
  - una transcripción
  lexicon: LSJ
  rationale: ἀντίγραφον designa una copia o reproducción de un documento. «Una copia» suena natural en español y conserva con precisión el valor documental del sustantivo.
- source_word: τῆς ἐπιστολῆς
  english_pob_choice: of the letter
  chosen_spanish: de la carta
  alternatives_spanish:
  - del escrito
  - de la epístola
  lexicon: LSJ
  rationale: ἐπιστολή es el término ordinario para una carta. «Carta» es la equivalencia más clara y fiel en español contemporáneo.
- source_word: ἧς ἔγραψεν
  english_pob_choice: that ... wrote
  chosen_spanish: que escribió
  alternatives_spanish:
  - la cual escribió
  - que redactó
  lexicon: LSJ
  rationale: La relativa modifica naturalmente «carta». ἔγραψεν significa «escribió»; «redactó» sería menos directo y no está exigido por el griego.
- source_word: Λασθένεις
  english_pob_choice: Lasthenes
  chosen_spanish: Lasthenes
  alternatives_spanish:
  - Lásthenes
  lexicon: convención transliterativa
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: τῷ συγγενεῖ ἡμῶν
  english_pob_choice: to our kinsman
  chosen_spanish: a nuestro[a] kinsman
  alternatives_spanish:
  - a nuestro pariente
  - a nuestro familiar
  - a nuestro compatriota
  lexicon: LSJ
  rationale: συγγενής puede abarcar pariente de sangre, pariente cercano o un asociado/compatriota de honor según el contexto. En español, «pariente» y «familiar» son posibles, pero aquí se preserva la tensión semántica del original mediante el préstamo explicativo «kinsman» en la línea principal, con nota alternativa para no cerrar indebidamente el sentido.
- source_word: περὶ ὑμῶν
  english_pob_choice: concerning you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - con respecto a ustedes
  - en cuanto a ustedes
  lexicon: LSJ
  rationale: περί con genitivo expresa aquí referencia o tema. «Acerca de ustedes» suena natural y mantiene el registro formal.
- source_word: γεγράφαμεν καὶ πρὸς ὑμᾶς
  english_pob_choice: We have also written to you
  chosen_spanish: también hemos escrito a ustedes
  alternatives_spanish:
  - también les hemos escrito
  - hemos escrito también a ustedes
  - también os hemos escrito
  lexicon: LSJ
  rationale: El perfecto γεγράφαμεν expresa una acción ya realizada con relevancia presente. «Hemos escrito» reproduce bien ese valor, y «también» refleja καί.
- source_word: ὅπως ἰδῆτε
  english_pob_choice: so that you may see it
  chosen_spanish: para que la vean
  alternatives_spanish:
  - para que ustedes la vean
  - a fin de que la vean
  - para que puedan verla
  lexicon: LSJ
  rationale: ὅπως con subjuntivo expresa finalidad. ἰδῆτε es literalmente «vean». El referente es «una copia / la carta», por lo que el objeto femenino se mantiene implícito en español como en la estructura natural del texto.
theological_decisions:
- issue: 'συγγενής: alcance relacional sin sobreespecificar parentesco de sangre'
  english_pob_reading: '''kinsman'' with note: blood relative, kinsman, or honored associate/compatriot depending on context'
  chosen_spanish_reading: Se conserva la amplitud semántica de συγγενής sin fijarlo solo como parentesco biológico.
  alternative_spanish_readings:
  - pariente
  - familiar
  - compatriota
  - aliado de honor
  rationale: El contexto diplomático sugiere una relación reconocida y respetuosa, pero no obliga a sangre. La traducción principal evita cerrar indebidamente el término, y la nota preserva la alternativa semántica.
  doctrine_reference: Principios de precisión semántica y no-sobreinterpretación textual
- issue: Referencia pronominal final en ὅπως ἰδῆτε
  english_pob_reading: so that you may see it
  chosen_spanish_reading: para que la vean
  alternative_spanish_readings:
  - para que la vean a ella
  - para que la puedan ver
  - para que la examinen
  rationale: El griego apunta a la copia/carta como objeto implícito de ver. En español, el pronombre puede omitirse porque el antecedente es claro y la construcción resulta más natural, sin perder la referencia.
  doctrine_reference: Claridad referencial y economía idiomática fiel al original
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente desde él: se conservó la estructura documental de la frase, se mantuvo el valor de perfecto en γεγράφαμεν y se preservó la ambigüedad controlada de συγγενής mediante una nota alternativa. No se detectaron revisiones aplicadas en el pasaje base; la redacción final prioriza claridad española sin añadir contenido ajeno al griego.'
  spanish_consistency_notes:
  - Se usó «copia» para ἀντίγραφον y «carta» para ἐπιστολή, diferenciando correctamente el documento y su reproducción.
  - Se mantuvo el nombre propio Lasthenes sin adaptación innecesaria.
  - Se conservó el registro formal de correspondencia con «acerca de ustedes» y «para que la vean».
  - Se evitó traducir συγγενής de manera restrictiva, en línea con la nota lexical del POB inglés.
