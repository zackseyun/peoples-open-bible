theological_decisions:
- issue: Personification of εὐσέβεια and the phrase 'immortal soul of godliness'
  chosen_reading: Retained the figurative personification without turning it into a doctrinal statement about an actual separate soul.
  alternative_readings:
  - '''by an immortal soul, namely godliness'''
  - '''by the immortal spirit of piety'''
  rationale: The comparison likens the youths' rational devotion to limbs moved by the soul. The Greek is rhetorical and personifying, not a technical anthropological claim. The translation preserves the imagery and avoids importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
