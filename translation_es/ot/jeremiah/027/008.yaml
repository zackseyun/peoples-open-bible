  language: en
  yaml_path: translation/ot/jeremiah/027/008.yaml
  text: And it shall be that the nation or the kingdom that will not serve him[a], Nebuchadnezzar king of Babylon, and that will not put its neck under the yoke of the king of Babylon, I will punish that nation with the sword, with famine, and with pestilence, declares Yahweh[c][b], until I have consumed them by his hand.
  footnotes:
