translation:
  language: es
  text: De Yahvé de los ejércitos serás visitado[a] con truenos, con un terremoto[b] y gran estruendo[c], con torbellino y tempestad, y con la llama de un fuego consumidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás castigado». El hebreo dice literalmente «serás visitado», un modismo bíblico que puede referirse a intervención divina para bien o para juicio; aquí el contexto indica juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con sacudida» o «con temblor» para «con un terremoto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un gran ruido» o «un gran sonido» para «gran estruendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעִם
  english_pob_choice: From
  chosen_spanish: De parte de
  alternatives_spanish:
  - de
  - desde
  - procedente de
  lexicon: HALOT
  rationale: El hebreo marca origen/fuente de la visita divina; en español, "de parte de" comunica mejor esa procedencia que un simple "de" y evita sonar torpe, conservando la relación con Yahvé como agente/origen.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término de proyecto para el Tetragrámaton, con forma española estable y legible. Mantiene el nombre propio divino en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los hosts
  - de las huestes
  lexicon: HALOT
  rationale: En el título fijo divino, "de los ejércitos" expresa bien la idea de anfitriones celestiales/armadas y es natural en español bíblico sin oscurecer el sentido.
- source_word: תִּפָּקֵד
  english_pob_choice: you will be visited
  chosen_spanish: serás visitado
  alternatives_spanish:
  - serás castigado
  - serás atendido
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo de פקד en nifal. "Serás visitado" mantiene la ambivalencia léxica básica, mientras que el contexto ya deja claro que se trata de juicio; en español suena algo más natural con la pasiva perifrástica.
- source_word: בְּרַעַם
  english_pob_choice: with thunder
  chosen_spanish: con truenos
  alternatives_spanish:
  - con trueno
  lexicon: HALOT
  rationale: El sustantivo colectivo puede expresarse naturalmente en plural en español al enumerar fenómenos. "Con truenos" suena idiomático y conserva el carácter acústico de la imagen.
- source_word: וּבְרַעַשׁ
  english_pob_choice: with earthquake
  chosen_spanish: con terremoto
  alternatives_spanish:
  - con sacudida
  - con temblor
  lexicon: HALOT
  rationale: En esta secuencia teofánica, el sentido concreto de רַעַשׁ se entiende como un evento sísmico. "Terremoto" comunica mejor la fuerza del término y su impacto en español contemporáneo.
- source_word: וְקוֹל גָּדֹול
  english_pob_choice: and a great noise
  chosen_spanish: y gran estruendo
  alternatives_spanish:
  - y gran ruido
  - y voz potente
  lexicon: HALOT
  rationale: קוֹל puede ser sonido, voz o ruido. Aquí, por la lista de fenómenos naturales, "estruendo" conserva la potencia acústica sin personalizarlo como "voz".
- source_word: סוּפָה
  english_pob_choice: with whirlwind
  chosen_spanish: con torbellino
  alternatives_spanish:
  - con remolino
  - con vendaval
  lexicon: HALOT
  rationale: '"Torbellino" reproduce la imagen de viento giratorio y distingue este término del siguiente, evitando que ambos se fundan en "tormenta".'
- source_word: וּסְעָרָה
  english_pob_choice: and storm
  chosen_spanish: y tempestad
  alternatives_spanish:
  - y tormenta
  lexicon: HALOT
  rationale: Para preservar la acumulación poética, se diferencia de סוּפָה con "tempestad", que sugiere violencia meteorológica general y se coordina bien con el paralelismo del verso.
- source_word: וְלַהַב אֵשׁ אוֹכֵלָה
  english_pob_choice: and with the flame of a consuming fire
  chosen_spanish: y con llama de fuego consumidor
  alternatives_spanish:
  - y con la llama de un fuego devorador
  - y con llama de un fuego que consume
  lexicon: HALOT
  rationale: 'Se conserva la estructura compacta del hebreo: לַהַב como "llama" y אֵשׁ אוֹכֵלָה como "fuego consumidor". La combinación mantiene la fuerza destructiva sin explicar de más.'
theological_decisions:
- issue: La visita divina en פקד
  english_pob_reading: Retain the idiom 'you will be visited' rather than making the judgment explicit in the verb itself.
  chosen_spanish_reading: serás visitado
  alternative_spanish_readings:
  - serás castigado
  - Dios te castigará
  rationale: El hebreo usa un verbo con amplio rango teológico; el contexto de tormenta teofánica indica juicio, pero la traducción conserva el giro bíblico y deja que la imagen cargue el matiz punitivo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se mantiene la política del proyecto de no enmascarar el nombre propio divino. "Yahvé" es la forma española adoptada para lectura pública y conserva la referencia directa al Tetragrámaton.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se reportan cambios sustanciales en el análisis; la elección española ajusta la sintaxis para fluidez natural sin alterar el contenido ni la tensión léxica documentada.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma española del nombre divino, coherente con el estándar del proyecto.
  - Se conserva la ambivalencia de פקד mediante «serás visitado», sin explicitar el juicio en el verbo.
  - La serie de fenómenos se traduce con términos diferenciados para preservar el paralelismo intensivo del hebreo.
  - Se evita la terminología eclesiástica tradicionalizante que no está exigida por la fuente.
