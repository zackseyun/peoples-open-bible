theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of divine vengeance in relation to the temple
  chosen_reading: the vengeance for his temple
  alternative_readings:
  - the vengeance of his temple
  - vengeance on behalf of his temple
  rationale: The Hebrew repeats 'vengeance' and then narrows it by reference to the temple. The translation preserves the strong judicial-theological claim that Babylon's judgment is retribution for what was done to the LORD's temple, without overinterpreting the exact syntactic nuance beyond idiomatic English necessity.
