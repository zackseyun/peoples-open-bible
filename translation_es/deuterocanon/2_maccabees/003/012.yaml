review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: la imposibilidad total de perjudicar a quienes habían puesto su confianza en la santidad del lugar y en el prestigio/protección del templo. Conserva adecuadamente ''santidad'', ''majestad'', ''inviolabilidad'' y el alcance universal de ''κατὰ τὸν σύμπαντα κόσμον''. Sin embargo, ἀδικήσαί expresa ''obrar injustamente contra / agraviar'', y ''hacer mal a'' suena algo débil e impreciso frente a la fuerza moral-jurídica del original.'
  spanish_quality_summary: 'El texto es legible y digno, pero ''hacer mal a'' no es la opción más natural ni más precisa en español bíblico actual. ''Agraviar'' o ''tratar injustamente'' reflejan mejor el registro y el valor semántico. Además, la nota al pie puede pulirse: ''estatus de asilo'' resulta anglicado; ''condición de asilo'' o simplemente ''derecho de asilo'' sería más natural.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Majestad', 'inviolabilidad', 'santidad' y 'templo' están bien alineados con las decisiones del POB. La principal mejora es léxica y estilística en ἀδικήσαί, no terminológica doctrinal.
  issues:
  - severity: medium
    issue: '"hacer mal a" para ἀδικήσαί'
    rationale: Aunque comprensible, suena menos preciso y menos idiomático que el valor de 'agraviar' o 'tratar injustamente'. El griego apunta a un agravio/injusticia más que a un daño genérico.
  - severity: low
    issue: '"estatus de asilo" en la nota'
    rationale: Es una formulación poco natural en español general y parece calco del inglés. Conviene una alternativa más idiomática, como 'condición de asilo' o mantener solo 'derecho de asilo'.
  revised_spanish_text: y que agraviar a los que habían confiado en la santidad del lugar, y en la majestad y la inviolabilidad[a] del templo honrado en todo el mundo, era totalmente imposible.
  revised_footnotes:
  - marker: a
    text: O "el derecho de asilo" para la inmunidad sagrada del templo contra toda violación.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'hacer mal a' por 'agraviar' para reflejar mejor la fuerza moral y jurídica de ἀδικήσαί en un español más natural y digno. También se reubica la nota sobre 'inviolabilidad' en el término relevante y se elimina el anglicismo 'estatus de asilo', conservando de forma clara la alternativa léxica documentada en el POB inglés.
