translation:
  language: es
  text: Venció a la multitud no por la fuerza del cuerpo[a], ni por la fuerza de las armas, sino por una palabra, sometió al castigador[b], recordándole los juramentos de los padres y las alianzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuerza corporal». El griego expresa un medio instrumental y contrasta la fuerza física con la palabra.
    reason: lexical_alternative
  - marker: b
    text: O «al que castigaba». El griego no identifica explícitamente si se trata de Dios, de un destructor angélico o de la fuerza personificada del juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνίκησεν
  english_pob_choice: overcame
  chosen_spanish: venció
  alternatives_spanish:
  - conquistó
  - prevaleció sobre
  lexicon: LSJ
  rationale: El aoristo de νικάω expresa victoria o prevalencia. «Venció» es natural en español y conserva la idea de triunfo sin cargar el pasaje con un matiz militar excesivo.
- source_word: τὸν ὄχλον
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - la turba
  lexicon: LSJ
  rationale: ὄχλος puede significar multitud o muchedumbre. «La multitud» mantiene el sentido colectivo amplio que corresponde al contexto.
- source_word: οὐκ ἰσχύι τοῦ σώματος
  english_pob_choice: not by strength of body
  chosen_spanish: no por la fuerza del cuerpo
  alternatives_spanish:
  - no por fuerza corporal
  - no por fuerza física
  lexicon: LSJ
  rationale: La dativo instrumental expresa medio. «Fuerza del cuerpo» conserva la construcción contraria a las armas y evita suavizar demasiado la fuerza literal del griego.
- source_word: οὐχ ὅπλων ἐνεργείᾳ
  english_pob_choice: nor by the force of weapons
  chosen_spanish: ni por la eficacia de las armas
  alternatives_spanish:
  - ni por la fuerza de las armas
  - ni por el obrar de las armas
  lexicon: LSJ
  rationale: ἐνέργεια apunta a efectividad operante o fuerza eficaz. «Eficacia de las armas» conserva ese valor de medio/poder sin sonar demasiado técnico en español.
- source_word: ἀλλὰ λόγῳ
  english_pob_choice: but by a word
  chosen_spanish: sino por una palabra
  alternatives_spanish:
  - sino por la palabra
  - sino por un dicho
  lexicon: LSJ
  rationale: λόγος puede ser palabra, discurso o expresión. «Por una palabra» mantiene la brevedad instrumental y evita expandirlo a «intercesión» o «oración», que el griego no dice explícitamente.
- source_word: τὸν κολάζοντα
  english_pob_choice: the punisher
  chosen_spanish: al castigador
  alternatives_spanish:
  - al que castigaba
  - al punidor
  lexicon: LSJ
  rationale: El participio presente sustantivado de κολάζω designa al que castiga. «Castigador» conserva esa función agente sin identificarlo indebidamente en el texto principal.
- source_word: ὑπέταξεν
  english_pob_choice: he subdued
  chosen_spanish: sometió
  alternatives_spanish:
  - subyugó
  - doblegó
  lexicon: LSJ
  rationale: ὑποτάσσω implica poner bajo sujeción o control. «Sometió» es una equivalencia clara y sobria en español para el efecto de freno o restricción del juicio.
- source_word: ὅρκους πατέρων
  english_pob_choice: the oaths of the fathers
  chosen_spanish: los juramentos de los padres
  alternatives_spanish:
  - los juramentos de los patriarcas
  - los votos de los padres
  lexicon: LSJ
  rationale: La frase genitiva se rinde de manera directa con «de los padres». «Juramentos» preserva el sentido de ὅρκους, y «padres» deja abierta la referencia patriarcal del contexto.
- source_word: καὶ διαθήκας
  english_pob_choice: and the covenants
  chosen_spanish: y los pactos
  alternatives_spanish:
  - y las alianzas
  - y los convenios
  lexicon: LSJ
  rationale: διαθήκη en griego bíblico suele ser «pacto» o «alianza». Aquí «pactos» funciona bien en español y evita forzar de entrada un tecnicismo eclesiástico.
- source_word: ὑπομνήσας
  english_pob_choice: reminding him
  chosen_spanish: recordándole
  alternatives_spanish:
  - trayéndole a la memoria
  - haciéndole recordar
  lexicon: LSJ
  rationale: El participio aoristo expresa medio o circunstancia concomitante. «Recordándole» es idiomático y mantiene la idea de traer a la memoria las promesas del pacto.
theological_decisions:
- issue: Referencia de «al castigador»
  english_pob_reading: the punisher; the Greek does not explicitly identify whether this refers to God, an angelic destroyer, or the personified force of judgment.
  chosen_spanish_reading: Mantener «al castigador» sin precisar quién es en el texto principal.
  alternative_spanish_readings:
  - al que castigaba
  - al ángel destructor
  - a Dios como el que castigaba
  rationale: El griego usa un participio sustantivado sin identificar explícitamente al referente. La traducción conserva esa reserva y evita resolver la ambigüedad que el original deja abierta.
  doctrine_reference: Preservar la tensión interpretativa del original; no cerrar indebidamente el referente.
- issue: Sentido de λόγῳ
  english_pob_reading: Translate as 'by a word' rather than 'by reason' or a more expansive paraphrase.
  chosen_spanish_reading: Traducir como «por una palabra», no como una paráfrasis más amplia.
  alternative_spanish_readings:
  - por la palabra
  - por el habla
  - por intercesión
  rationale: El contraste inmediato es con la fuerza corporal y las armas. «Por una palabra» conserva la concisión del griego y no introduce una explicación interpretativa que el texto no verbaliza.
  doctrine_reference: Primacía del original sobre la tradición de traducción; evitar la paráfrasis doctrinalizada.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del auditor inglés, que ajustó la frase equivalente a «los juramentos de los padres» para reflejar con mayor precisión el genitivo griego. Se mantuvo el resto de la línea de lectura establecida en el POB inglés, especialmente la ambigüedad del agente castigador y el valor instrumental de λόγῳ.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no nombra el Tetragrámaton.
  - Se prefirió «pactos» para διαθήκας, en coherencia con el uso bíblico de alianza/pacto sin forzar terminología eclesial.
  - 'Se conservó el paralelismo instrumental: no por... ni por... sino por....'
  - Se evitó identificar al castigador en el cuerpo del texto para respetar la cautela del original y del POB inglés.
