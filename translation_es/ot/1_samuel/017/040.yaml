base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/040.yaml
  text: He took his staff in his hand and chose for himself five smooth stones from the wadi[a], and put them in the shepherd’s bag that he had, in the pouch; and his sling was in his hand[b]. Then he approached the Philistine.
  footnotes:
