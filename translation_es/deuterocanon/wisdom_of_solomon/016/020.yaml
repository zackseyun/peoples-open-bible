review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en la estructura general: contraste inicial, alimento celestial, pan enviado desde el cielo, y doble descripción final del pan. Sin embargo, hay dos puntos que conviene reparar para mayor fidelidad y naturalidad: «desde el cielo» suena menos idiomático aquí que «del cielo», y sobre todo «teniendo todo deleite» es una reproducción demasiado calcada del inglés revisado y del participio griego, pero en español resulta poco natural y semánticamente borrosa. Una formulación como «con toda clase de deleites» preserva la idea de plenitud placentera sin sobreinterpretar hacia ‘satisfacer’.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta leve rigidez en «alimento de ángeles» y especialmente en «teniendo todo deleite». «Sin fatiga» es aceptable, aunque «sin esfuerzo» también sería natural; no requiere cambio. La revisión propuesta mejora la legibilidad e idiomaticidad sin apartarse del sentido fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El pasaje no contiene términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de mantener la ambigüedad de «alimento de ángeles» concuerda con la rationale inglesa y teológica documentada.
  issues:
  - severity: medium
    issue: «teniendo todo deleite» suena poco idiomático en español
    rationale: Aunque intenta seguir la revisión inglesa «having every delight», en español la expresión no comunica con claridad la cualidad del pan. El griego describe al pan como poseedor de toda clase de agrado/deleite; conviene una formulación más natural sin convertirla en paráfrasis interpretativa.
  - severity: low
    issue: «desde el cielo» es menos natural que «del cielo» en este contexto
    rationale: Ambas opciones pueden ser fieles a ἀπʼ οὐρανοῦ, pero «pan preparado del cielo» o «pan preparado del cielo»/«pan preparado del cielo» suena más bíblico e idiomático que «desde el cielo» después de «enviaste».
  - severity: low
    issue: Falta artículo en «con alimento de ángeles»
    rationale: «Con el alimento de ángeles» fluye mejor en español y refleja mejor el carácter definido de la provisión mencionada en paralelo con el inglés «the food of angels».
  revised_spanish_text: En vez de estas cosas[a], alimentaste a tu pueblo con el alimento de ángeles, y sin fatiga les enviaste pan preparado del cielo, con toda clase de deleites y apto para todo gusto.
  revised_footnotes:
  - marker: a
    text: O «comida de ángeles» o «pan apto para ángeles». La expresión griega no exige una explicación más específica.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para hacerlo más natural y preciso sin cambiar las decisiones exegéticas del POB: se añade el artículo en «el alimento de ángeles», se sustituye «desde el cielo» por «del cielo» para mejor fluidez, y se reemplaza «teniendo todo deleite» por «con toda clase de deleites», que comunica mejor la plenitud placentera del pan sin introducir la expansión interpretativa ‘satisfacer’.'
