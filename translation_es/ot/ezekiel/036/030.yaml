translation:
  language: es
  text: Y multiplicaré el fruto del árbol y el producto del campo,[a] para que ya no carguen con el oprobio del hambre entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no sufran la vergüenza del hambre entre las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: And I will multiply
  chosen_spanish: Y multiplicaré
  alternatives_spanish:
  - Y aumentaré
  - Y haré abundante
  lexicon: HALOT
  rationale: El piel/hiphil de רבה expresa hacer abundar o aumentar. «Multiplicaré» conserva bien la causatividad y encaja con el contexto agrícola de abundancia prometida.
- source_word: פְּרִי הָעֵץ
  english_pob_choice: the fruit of the tree
  chosen_spanish: el fruto del árbol
  alternatives_spanish:
  - el fruto de los árboles
  - el fruto del árbol
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo; «el fruto del árbol» reproduce esa forma sin volverla forzada en español. «Fruto» funciona de manera natural y digna.
- source_word: וּתְנוּבַת הַשָּׂדֶה
  english_pob_choice: and the produce of the field
  chosen_spanish: y la producción del campo
  alternatives_spanish:
  - y el rendimiento del campo
  - y el producto del campo
  lexicon: HALOT
  rationale: תְּנוּבָה apunta a producción o rendimiento agrícola. «Producción» comunica el sentido de cosecha/resultado del campo con claridad moderna, sin perder el paralelismo con «fruto».
- source_word: לְמַעַן אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: La construcción introduce propósito o resultado. «Para que» es la equivalencia más natural en español actual.
- source_word: לֹא תִקְחוּ עוֹד
  english_pob_choice: you will no longer bear
  chosen_spanish: ya no sufran
  alternatives_spanish:
  - ya no soporten
  - ya no lleven
  lexicon: HALOT
  rationale: Con חֶרְפָּה, לקח no se traduce literalmente como «tomar», sino como padecer o soportar una vergüenza. «Sufran» expresa bien la carga de la reprochada situación, manteniendo la fuerza idiomática.
- source_word: חֶרְפַּת רָעָב
  english_pob_choice: the reproach of famine
  chosen_spanish: el oprobio del hambre
  alternatives_spanish:
  - la vergüenza del hambre
  - el reproche del hambre
  lexicon: HALOT
  rationale: «חֶרְפָּה» incluye deshonra, afrenta o vergüenza pública. En español, «oprobio» preserva mejor el matiz de vergüenza social/covenantal que «hambre» impone entre los pueblos. Se eligió «hambre» para naturalidad; «famine» aquí no es solo escasez abstracta sino hambre padecida.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones
  lexicon: HALOT
  rationale: «Naciones» reproduce bien גּוֹיִם en un marco profético internacional. «Entre» mantiene el valor locativo y social del testimonio público.
theological_decisions:
- issue: La promesa combina abundancia material con vindicación pública ante las naciones
  english_pob_reading: 'The translation preserves both: material abundance (''fruit...produce'') is given with the purpose that Israel no longer bears famine''s reproach among the nations.'
  chosen_spanish_reading: 'La redacción conserva ambas dimensiones: abundancia agrícola y fin del oprobio público del hambre entre las naciones.'
  alternative_spanish_readings:
  - Una promesa meramente económica
  - Una promesa solo de restauración del honor
  rationale: El hebreo une explícitamente el aumento de fruto/producción con el resultado de no cargar más la afrenta del hambre en el ámbito de las naciones. No conviene resolver la tensión reduciendo el versículo a prosperidad material o solo a honor social.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión sigue el pasaje hebreo base y el audit trail inglés con alta concordancia; no hay revisiones aplicadas en el historial reciente que obliguen a ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiriera explícitamente; en este versículo no aparece el nombre divino.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton y el sentido se centra en la acción prometida.
  - Se conservó la imagen agrícola con paralelismo entre «fruto» y «producción» sin diluirla en una paráfrasis general.
  - «Oprobio» se eligió para preservar la carga pública y social de חֶרְפָּה.
  - La nota alternativa refleja la misma tensión lexical que el inglés POB marcó entre 'bear' y 'suffer'.
