- from: 'Entonces el Espíritu me levantó[a], y oí detrás de mí el sonido de un gran estruendo[b]: «¡Bendita sea la gloria de Yahvé desde su lugar!»'
  to: 'Entonces el Espíritu me levantó, y oí detrás de mí el sonido de un gran estruendo[a]: «¡Bendita sea la gloria de Yahvé desde su lugar![b]»'
