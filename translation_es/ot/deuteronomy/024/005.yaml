translation:
  language: es
  text: Cuando un hombre toma una esposa nueva, no saldrá con el ejército[a], ni se le impondrá ninguna obligación[b]. Estará libre para su hogar por un año[c], y alegrará a su esposa, a quien ha tomado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la guerra»; el hebreo dice literalmente «salir con el ejército», lo cual puede incluir un servicio militar más amplio, no solo combate directo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni se le asignará ninguna tarea» o «ni recaerá sobre él ninguna obligación». El hebreo es más amplio que el deber militar solamente.'
    reason: alternative_reading
  - marker: c
    text: 'O: «Quedará exento en su casa por un año». La frase hebrea puede enfatizar tanto su libertad para la vida doméstica como su permanencia con su hogar.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «y hará que su esposa, a quien ha tomado, se alegre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Cuando/si
  lexicon: HALOT
  rationale: Introduce una situación legal prevista. «Cuando» conserva el valor de caso y suena natural en español jurídico-bíblico.
- source_word: יִקַּח אִישׁ אִשָּׁה חֲדָשָׁה
  english_pob_choice: a man takes a new wife
  chosen_spanish: un hombre toma una mujer nueva
  alternatives_spanish:
  - un hombre se casa con una mujer nueva
  - un hombre toma una esposa nueva
  lexicon: HALOT
  rationale: Conserva el verbo de tomar/coger del hebreo לָקַח y refleja «mujer nueva» como matrimonio reciente. «Toma» mantiene el eco lexical del texto fuente mejor que una paráfrasis más libre.
- source_word: לֹא יֵצֵא בַּצָּבָא
  english_pob_choice: he shall not go out with the army
  chosen_spanish: no saldrá con el ejército
  alternatives_spanish:
  - no saldrá a la guerra
  - no servirá en el ejército
  lexicon: HALOT
  rationale: «Con el ejército» sigue de cerca la imagen hebrea de salir con la tropa/ejército y no restringe indebidamente a combate directo.
- source_word: וְלֹא יַעֲבֹר עָלָיו לְכָל דָּבָר
  english_pob_choice: nor shall any duty be imposed on him
  chosen_spanish: ni se le impondrá ningún asunto
  alternatives_spanish:
  - ni se le asignará ninguna tarea
  - ni recaerá sobre él ninguna obligación
  lexicon: HALOT
  rationale: El hebreo expresa una carga u obligación amplia, no sólo deber militar. «Se le impondrá» conserva la pasiva legal; «ningún asunto» reproduce la amplitud de לְכָל דָּבָר, aunque en español suene más idiomático con el verbo de imposición.
- source_word: נָקִי יִהְיֶה
  english_pob_choice: He shall be free
  chosen_spanish: Estará libre
  alternatives_spanish:
  - Quedará libre
  - Estará exento
  lexicon: HALOT
  rationale: נָקִי aquí apunta a estar libre/exento de cargas. «Estará libre» es natural en español y mantiene la idea de exención legal.
- source_word: לְבֵיתוֹ
  english_pob_choice: for his household
  chosen_spanish: para su casa
  alternatives_spanish:
  - para su hogar
  - para su casa/entorno doméstico
  lexicon: HALOT
  rationale: «Casa» puede abarcar hogar/casa en sentido doméstico; se prefiere aquí por brevedad y porque conserva el paralelismo con la esfera familiar del contexto.
- source_word: שָׁנָה אֶחָת
  english_pob_choice: for one year
  chosen_spanish: por un año
  alternatives_spanish:
  - durante un año
  - por un año entero
  lexicon: HALOT
  rationale: Expresa la duración establecida en la norma con claridad y sin añadir matices no presentes.
- source_word: וְשִׂמַּח אֶת אִשְׁתּוֹ
  english_pob_choice: and he shall make his wife rejoice
  chosen_spanish: y hará que su esposa se alegre
  alternatives_spanish:
  - y alegrará a su esposa
  - y hará feliz a su esposa
  lexicon: HALOT
  rationale: El piel de שׂמח es causativo. «Hará que... se alegre» preserva esa causatividad y evita volverlo meramente sentimental.
- source_word: אֲשֶׁר לָקָח
  english_pob_choice: whom he has taken
  chosen_spanish: a la cual ha tomado
  alternatives_spanish:
  - a quien ha tomado
  - que ha tomado
  lexicon: HALOT
  rationale: Mantiene la repetición verbal de לָקַח («tomar») presente en el hebreo y en el audit trail inglés. «A la cual» es formal, pero legible en español bíblico.
translation_notes:
  revision_awareness: Se revisó el texto a la luz del WLC y del audit trail inglés. Se mantuvo la estructura legal de caso, la amplitud de בַּצָּבָא/לְכָל דָּבָר, la exención expresada por נָקִי, y la causatividad de שִׂמַּח. No se detectaron revisiones aplicadas en el pass más reciente; el presente borrador sigue esa línea con ajustes idiomáticos en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se prefirió «tomar» para לָקַח a fin de mantener el vínculo léxico con el audit trail inglés.
  - Se usó «ejército» en lugar de «guerra» en el cuerpo principal para no estrechar indebidamente el alcance del hebreo.
  - Se mantuvo la distinción entre obligación impuesta y libertad/exención doméstica, tal como la refleja la nota inglesa.
