translation:
  language: es
  text: para que incline nuestros corazones hacia sí, para andar en todos sus caminos y para guardar sus mandamientos, sus estatutos y sus juicios, que mandó a nuestros padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice «nuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַטּוֹת
  english_pob_choice: incline
  chosen_spanish: incline
  alternatives_spanish:
  - doblar
  - volver
  - torcer
  lexicon: HALOT
  rationale: El hiphil de נטה expresa causar una orientación o inclinación del interior. «Incline» conserva la metáfora direccional sin volverla extraña en español bíblico actual.
- source_word: לְבָבֵנוּ
  english_pob_choice: our hearts
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestra mente
  - nuestro interior
  lexicon: HALOT
  rationale: לֵבָב designa el centro de voluntad, pensamiento y afectos. En español, «corazón» mantiene esa antropología bíblica y suena natural y digno.
- source_word: אֵלָיו
  english_pob_choice: to himself
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal apunta a Dios como término de dirección. En español, después de «incline nuestro corazón» resulta más natural «hacia él»; el matiz reflexivo implícito se conserva por el contexto.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para andar
  alternatives_spanish:
  - para caminar
  - para vivir
  lexicon: HALOT
  rationale: הלך en contextos de pacto expresa conducta. «Andar» preserva mejor el modismo bíblico que «caminar» y evita una paráfrasis más distante como «vivir».
- source_word: בְּכָל דְּרָכָיו
  english_pob_choice: in all his ways
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - según todos sus caminos
  - por todos sus caminos
  lexicon: HALOT
  rationale: La expresión es una fórmula pactal convencional. «En todos sus caminos» es fiel, clara y mantiene la correspondencia con el hebreo y con el audit trail inglés.
- source_word: וְלִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para observar
  - para custodiar
  lexicon: HALOT
  rationale: שׁמר con mandamientos significa guardar/observar. «Guardar» es una equivalencia sobria y ampliamente entendible en registro bíblico.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: מִצְוָה denota obligaciones ordenadas. «Mandamientos» mantiene el peso formal del término legal-pactual sin desdibujarlo.
- source_word: חֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus preceptos
  lexicon: HALOT
  rationale: חֹק/חֻקָּה alude a disposiciones fijadas. «Estatutos» distingue bien este término de los otros dos de la triada legal.
- source_word: וּמִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordinanzas
  - sus decisiones judiciales
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, sentencia u ordinanza. «Juicios» conserva la fuerza jurídica del término y la distinción respecto de «estatutos» y «mandamientos».
- source_word: אֲשֶׁר צִוָּה
  english_pob_choice: which he commanded
  chosen_spanish: que mandó
  alternatives_spanish:
  - que ordenó
  - que él mandó
  lexicon: HALOT
  rationale: La cláusula relativa modifica el conjunto de leyes mencionadas. «Mandó» es breve, formal y suficientemente directo para reproducir el verbo de mandato.
- source_word: אֶת אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo usa un término masculino plural de parentesco. «Padres» reproduce con fidelidad la forma del original y mantiene la lectura del POB en cuanto a la referencia ancestral.
theological_decisions:
- issue: Tríada legal del pacto
  english_pob_reading: his commandments, his statutes, and his judgments
  chosen_spanish_reading: sus mandamientos, sus estatutos y sus juicios
  alternative_spanish_readings:
  - sus mandatos, sus decretos y sus ordinanzas
  rationale: El hebreo presenta tres términos jurídicos distintos; conservarlos en español evita aplanar la textura legal y pactal del versículo. «Juicios» se mantiene para מִשְׁפָּטָיו porque preserva el campo jurídico que el texto plantea.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Referencia ancestral masculina
  english_pob_reading: our fathers
  chosen_spanish_reading: a nuestros padres
  alternative_spanish_readings:
  - a nuestros antepasados
  rationale: El hebreo dice literalmente «nuestros padres». Aunque el referente incluye a los antepasados de Israel en sentido amplio, la traducción conserva la forma masculina del original sin neutralizarla.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto revisado corrige la validación anterior asegurando que el marcador [a] aparece exactamente en la frase ancla dentro de la traducción. No se han añadido notas sueltas sin anclaje; la formulación sigue de cerca el hebreo y el audit trail inglés, con una sola alternativa lexical necesaria para el sustantivo colectivo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto solo cuando el pasaje lo exigiera; aquí el sujeto del pronombre se sobreentiende por el contexto y la línea no lo nombra explícitamente.
  - 'Se preservó la tríada legal con tres términos distintos: «mandamientos», «estatutos» y «juicios».'
  - Se usó «a nuestros padres» para reflejar el hebreo masculino plural y la nota aclara la alternativa colectiva en español.
  - El marcador de nota [a] está anclado exactamente en «nuestro corazón» para satisfacer la validación del registro.
