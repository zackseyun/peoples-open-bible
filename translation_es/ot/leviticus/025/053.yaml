  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en los puntos principales: כִּשְׂכִיר como comparación con un trabajador asalariado, שָׁנָה בְּשָׁנָה como continuidad anual, יִהְיֶה עִמּוֹ con una formulación sobria, y la prohibición de trato severo. Sin embargo, dos elecciones españolas requieren ajuste para mayor fidelidad y naturalidad: ''a tus ojos'' suena menos idiomático que ''ante tus ojos'' para לְעֵינֶיךָ, y ''no lo dominará'' es algo más estrecho/interpretativo que una forma más cercana al valor de רדה en este contexto legal.'
  spanish_quality_summary: El español es claro y digno, pero 'a tus ojos' resulta poco natural en esta construcción jurídica, y 'Como un trabajador asalariado año por año estará con él' mejora con una coma tras 'asalariado' para legibilidad. 'No ejercerá dominio sobre él con dureza ante tus ojos' suena más natural y más alineado con el sentido legal-ético del original.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección 'trabajador asalariado' para שׂכיר es adecuada y preserva la rationale documentada. No aplica ninguna de las entradas sensibles del glosario principal salvo mantener precisión legal sin introducir 'esclavo/siervo' en el texto principal.
  issues:
  - severity: medium
    issue: La frase 'a tus ojos' para לְעֵינֶיךָ es poco idiomática en este contexto.
    rationale: Aunque literal, en español bíblico-jurídico 'ante tus ojos' o 'en tu presencia' comunica mejor la idea de conducta visible/presenciada. El inglés auditado escogió 'in your sight', no una reproducción excesivamente literal.
  - severity: medium
    issue: '''No lo dominará'' reduce parcialmente el matiz de רדה.'
    rationale: El hebreo expresa ejercer dominio/regir sobre alguien en sentido de señorío. 'Dominar' puede funcionar, pero 'ejercerá dominio sobre él' conserva mejor el enlace léxico y encaja mejor con 'con dureza'.
  - severity: low
    issue: Falta una coma de apoyo tras 'asalariado'.
    rationale: La pausa ayuda a leer la frase comparativa y el sintagma distributivo sin cambiar el sentido.
  revised_spanish_text: Como un trabajador asalariado, año por año estará con él[a]; no ejercerá dominio sobre él con dureza ante tus ojos.
  revised_footnotes:
