translation:
  language: es
  text: 'Y entiérrame bien, y a tu madre conmigo, y no permanezcas ya más tiempo en Nínive. Hijo, mira lo que hizo Nadab[a] a Ahikar, que lo había criado: cómo lo llevó de la luz a la oscuridad, y lo que le pagó. Pero Ahikar fue salvado, mientras que aquel hombre recibió el pago, y él mismo descendió a la oscuridad. Manasés practicó misericordia[b], y fue salvado de la trampa mortal que Nadab le había puesto; pero Nadab cayó en la trampa y pereció.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Ἀδὰμ aquí es el nombre personal del cortesano traidor en la historia de Ahikar, no el primer hombre, Adán. Se traduce 'Nadab' para evitar confusión; 'Adam' sería una transliteración más literal de la forma griega.
    reason: alternative_reading
  - marker: b
    text: O 'limosna'. El término griego ἐλεημοσύνη en Tobit a menudo se refiere específicamente a la ayuda caritativa dada a los necesitados.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ θάψον με καλῶς
  english_pob_choice: And bury me properly
  chosen_spanish: Y entiérrame bien
  alternatives_spanish:
  - Y sepúltame bien
  - Y entiérrame apropiadamente
  lexicon: LSJ
  rationale: θάπτω exige la idea de sepultar; en español, 'enterrar' es natural y claro. καλῶς modifica la acción con el sentido de hacerlo de manera adecuada o digna; 'bien' conserva la brevedad y la fuerza idiomática sin añadir matiz no explícito.
- source_word: μηκέτι αὐλισθῆτε
  english_pob_choice: do not remain any longer
  chosen_spanish: no permanezcan ya más tiempo
  alternatives_spanish:
  - no se hospeden ya más
  - no acampen ya más
  - no se queden ya más
  lexicon: LSJ
  rationale: El verbo puede significar alojarse o permanecer; en este contexto habla de seguir viviendo o residiendo en Nínive. 'Permanecer' expresa mejor la continuidad de estancia sin forzar la imagen de alojamiento nocturno.
- source_word: τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Niño
  - Hijo/a
  lexicon: LSJ
  rationale: Aunque τέκνον es más amplio que 'hijo', en un discurso paterno-filial español 'Hijo' es la forma más natural y reverente. Se evita añadir 'mío' porque no está explícito en el griego.
- source_word: ἴδε
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  - considera
  lexicon: LSJ
  rationale: '''Mira'' funciona como imperativo de atención en español actual y mantiene el llamado a fijarse en el ejemplo narrado.'
- source_word: Ἀδὰμ
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Adam
  lexicon: LSJ
  rationale: Se sigue la decisión auditada de evitar la confusión con el primer hombre, aunque la forma griega sea Ἀδὰμ. 'Nadab' identifica correctamente al personaje del ciclo de Ahikar.
- source_word: Ἀχιαχάρῳ
  english_pob_choice: Ahikar
  chosen_spanish: Ahikar
  alternatives_spanish:
  - Ahiqar
  - Achiachar
  lexicon: LSJ
  rationale: Se conserva la transliteración usual y reconocible del nombre propio, acorde con la tradición del relato de Ahikar.
- source_word: τῷ θρέψαντι αὐτόν
  english_pob_choice: who had reared him
  chosen_spanish: que lo había criado
  alternatives_spanish:
  - que lo había alimentado
  - que lo había educado
  - que lo había criado y sustentado
  lexicon: LSJ
  rationale: θρέφω aquí expresa crianza, no solo alimentación. 'Criado' transmite bien la idea de haberlo levantado/educado bajo su tutela.
- source_word: ἐκ τοῦ φωτὸς ἤγαγεν αὐτὸν εἰς τὸ σκότος
  english_pob_choice: he brought him from the light into the darkness
  chosen_spanish: lo llevó de la luz a la oscuridad
  alternatives_spanish:
  - lo sacó de la luz para llevarlo a la oscuridad
  - lo trasladó de la luz a la oscuridad
  lexicon: LSJ
  rationale: Se conserva el contraste metafórico luz/oscuridad con español natural. 'Llevó' comunica el desplazamiento impuesto por el daño o ruina.
- source_word: ὅσα ἀνταπέδωκεν αὐτῷ
  english_pob_choice: what he repaid him
  chosen_spanish: lo que le pagó
  alternatives_spanish:
  - lo que le devolvió
  - lo que le retribuyó
  - lo que le retribuyó en pago
  lexicon: LSJ
  rationale: El grupo ἀνταποδ- pide mantener la idea de retribución. 'Pagó' es breve y conserva la correspondencia de deuda/recompensa; 'le' marca el dativo de persona.
- source_word: ἐσώθη
  english_pob_choice: was saved
  chosen_spanish: fue salvado
  alternatives_spanish:
  - fue rescatado
  - fue librado
  - fue preservado
  lexicon: LSJ
  rationale: En esta narrativa de peligro temporal, 'salvado' conserva la equivalencia lexical con el griego y el hilo del relato de rescate, sin convertirlo en formulación doctrinal más amplia.
- source_word: ἐλεημοσύνην
  english_pob_choice: did mercy
  chosen_spanish: hizo misericordia
  alternatives_spanish:
  - hizo limosna
  - hizo caridad
  - practicó misericordia
  lexicon: LSJ
  rationale: Se conserva la literalidad del giro verbal del POB inglés y el valor ético de ἐλεημοσύνη en Tobit. 'Misericordia' permite abarcar la caridad concreta sin reducirla solo a limosna monetaria.
- source_word: παγίδος θανάτου
  english_pob_choice: deadly snare
  chosen_spanish: trampa mortal
  alternatives_spanish:
  - lazo mortal
  - red de muerte
  - snare mortal
  lexicon: LSJ
  rationale: '''Trampa mortal'' es natural en español y comunica bien el peligro letal del genitivo. ''Mortal'' mantiene la fuerza de θανάτου sin recurrir a un calco rígido.'
- source_word: ἔπηξεν
  english_pob_choice: had set
  chosen_spanish: le había puesto
  alternatives_spanish:
  - había tendido
  - había colocado
  - había armado
  lexicon: LSJ
  rationale: Para una trampa, 'poner' es idiomático en español y refleja el acto previo de tenderla. El pluscuamperfecto conserva la anterioridad narrativa.
- source_word: ἀπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - se perdió
  - murió
  - fue destruido
  lexicon: LSJ
  rationale: '''Pereció'' mantiene el tono grave del juicio narrativo y la amplitud semántica de ἀπόλλυμι en este contexto.'
theological_decisions:
- issue: Sentido de 'saved' en Ahikar y Manasés
  english_pob_reading: Temporal deliverance from mortal danger
  chosen_spanish_reading: Libramiento temporal de un peligro mortal
  alternative_spanish_readings:
  - salvación espiritual
  - rescate definitivo
  rationale: El pasaje usa σῴζω en un marco sapiencial e histórico, no para desarrollar soteriología. Por eso 'fue salvado' se conserva en el texto, pero la lectura se entiende como rescate de la muerte o de una trampa, no como salvación eterna.
  doctrine_reference: Preservar la tensión lexical sin resolverla doctrinalmente; mantener la consistencia de términos clave.
- issue: ἐλεημοσύνην en Tobit
  english_pob_reading: acts of mercy / almsgiving nuance
  chosen_spanish_reading: misericordia con posible trasfondo de limosna o caridad
  alternative_spanish_readings:
  - limosna
  - caridad
  - obras de misericordia
  rationale: Tobit vincula ἐλεημοσύνη con la práctica concreta de dar a los necesitados, pero aquí el singular permite una formulación más amplia. 'Hizo misericordia' preserva el alcance ético sin cerrar el sentido al dinero únicamente.
  doctrine_reference: Consistencia de término clave con nota de alternativa lexical.
translation_notes:
  revision_awareness: The Spanish draft follows the latest audited English revision that prefers 'remain' over 'stay' and 'what he repaid him' over 'all that he repaid him,' while also preserving the later tightening from 'did acts of mercy' to the more literal singular force of 'did mercy.' The Spanish wording reflects those adjustments with 'permanecer', 'lo que le pagó', and 'hizo misericordia.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' only when the source explicitly requires the divine name; this verse does not contain it.
  - Se usa 'salvado' de forma narrativa y no doctrinal, en coherencia con Tobit y con el audit trail inglés.
  - El nombre Ἀδὰμ se representa como 'Nadab' por claridad narrativa, siguiendo la decisión auditada del POB inglés.
  - '''Misericordia'' se conserva como equivalente amplio de ἐλεημοσύνην, con nota de posible ''limosna'' o ''caridad''.'
