translation:
  language: es
  text: 'Entonces subió y se lo contó a su padre y a su madre, y dijo: «Vi una mujer en Timnat, de las hijas[a] de los filisteos. Ahora, tómenla para mí como esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de las hijas de los filisteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: Then he went up
  chosen_spanish: Entonces subió
  alternatives_spanish:
  - Entonces fue
  - Entonces fue hacia arriba
  lexicon: HALOT
  rationale: עלה conserva el movimiento de ascender/subir; ‘subió’ mantiene esa huella verbal de forma natural en español.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo contó
  alternatives_spanish:
  - les dijo
  - lo informó
  lexicon: HALOT
  rationale: נגד en hifil es ‘contar/decir/hacer saber’; ‘se lo contó’ naturaliza el complemento pronominal implícito y refleja que informó a ambos padres.
- source_word: לְאָבִיו וּלְאִמּוֹ
  english_pob_choice: his father and mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a su padre y madre
  - a su padre y a su madre
  lexicon: HALOT
  rationale: El hebreo repite el posesivo; en español la duplicación ‘a su padre y a su madre’ suena clara y fiel al paralelismo.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una joven
  lexicon: HALOT
  rationale: Aquí se ve primero a la mujer y solo después se pide en matrimonio; por eso ‘mujer’ es más exacto que ‘esposa’.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  - He visto
  lexicon: HALOT
  rationale: Aunque el inglés usa pasado simple, en español el perfecto compuesto funciona bien en discurso directo para una experiencia reciente o vigente en la mente del hablante.
- source_word: בְתִמְנָתָה
  english_pob_choice: in Timnah
  chosen_spanish: en Timnat
  alternatives_spanish:
  - en Timná
  - en Timnat
  lexicon: HALOT
  rationale: Se translitera el topónimo como ‘Timnat’ para mantener cercanía al hebreo y uso bíblico español consistente.
- source_word: מִבְּנוֹת פְּלִשְׁתִּים
  english_pob_choice: from the daughters of the Philistines
  chosen_spanish: de las hijas de los filisteos
  alternatives_spanish:
  - entre las hijas de los filisteos
  - de las mujeres filisteas
  lexicon: HALOT
  rationale: מִן + ‘hijas de’ expresa procedencia/pertenencia; ‘de las hijas de los filisteos’ conserva la relación original sin explicitar más de lo que dice el hebreo.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: La partícula introduce consecuencia y petición; ‘Así que ahora’ reproduce bien ese giro argumental.
- source_word: קְחוּ
  english_pob_choice: get
  chosen_spanish: tomenla
  alternatives_spanish:
  - tráiganla
  - consíganla
  lexicon: HALOT
  rationale: לקח en este contexto de arreglo matrimonial puede significar ‘tomar/traer/obtener’; ‘tomenla’ preserva el imperativo base sin sobreinterpretar.
- source_word: אוֹתָהּ לִּי לְאִשָּׁה
  english_pob_choice: her for me as a wife
  chosen_spanish: para mí por mujer
  alternatives_spanish:
  - para mí como esposa
  - como mujer para mí
  lexicon: HALOT
  rationale: La fórmula matrimonial hebrea se conserva de manera bastante literal; ‘por mujer’ evita normalizarla a ‘esposa’ demasiado pronto, aunque en español suene algo menos idiomática.
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético (WLC) y el audit trail inglés, que optó por ‘from the daughters of the Philistines’ para mantener la correspondencia léxica con מִבְּנוֹת פְּלִשְׁתִּים. En español se conservó esa relación con una formulación igualmente literal, evitando la paráfrasis ‘una filistea’ porque el hebreo habla de procedencia/pertenencia grupal, no de una equivalencia descriptiva simple.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Timnat’ se translitera de forma consistente y cercana al hebreo.
  - Se prefirió ‘mujer’ y no ‘esposa’ en el v. 2, porque el contexto narrativo todavía presenta a la mujer como objeto de deseo y petición matrimonial, no como relación ya establecida.
