revisions:
- from: Y de allí fue y halló a Eliseo hijo de Safat, y él estaba arando con doce yuntas[a] delante de él, y él estaba con la duodécima. Elías pasó junto a él y echó sobre él su manto[b].
  to: Se fue de allí y halló a Eliseo hijo de Safat, y él estaba arando con doce yuntas[a] delante de él, y él estaba con la duodécima yunta. Elías pasó junto a él y echó sobre él su manto[b].
  rationale: Se ajusta el inicio a un español más natural ('Se fue de allí'), se explicita 'yunta' en la segunda mención para evitar una elipsis demasiado abrupta en español, y se reduce la nota b a una alternativa léxica/tradicional alineada con la auditoría inglesa sin sobreinterpretar el simbolismo en la nota.
