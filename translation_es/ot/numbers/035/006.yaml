translation:
  language: es
  text: Y las ciudades que daréis a los levitas serán las seis ciudades de refugio[a], que daréis para que el homicida huya allí; y además de ellas daréis cuarenta y dos ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el homicida», «el matador» o «el asesino». El término hebreo se usa aquí en el contexto legal de las ciudades de refugio y no especifica por sí mismo si la muerte fue intencional o accidental; «homicida» conserva mejor esa amplitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los poblados
  lexicon: HALOT
  rationale: עִיר designa una ciudad o población; en este contexto legal y distributivo, «ciudades» reproduce con naturalidad el sustantivo colectivo y mantiene la correspondencia con el texto fuente.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: El dativo hebreo indica los destinatarios de las ciudades. «A los levitas» es la forma más directa y natural en español para expresar esa asignación.
- source_word: שֵׁשׁ עָרֵי הַמִּקְלָט
  english_pob_choice: the six cities of refuge
  chosen_spanish: las seis ciudades de refugio
  alternatives_spanish:
  - las seis ciudades de asilo
  - las seis ciudades de amparo
  lexicon: HALOT
  rationale: מִקְלָט señala refugio o asilo. «Ciudades de refugio» es la fórmula legal estable y comunica bien la institución sin añadir interpretación ajena.
- source_word: לָנוּס שָׁמָּה
  english_pob_choice: to flee there
  chosen_spanish: para que huya allí
  alternatives_spanish:
  - para huir allí
  - para que escape allí
  lexicon: HALOT
  rationale: 'נוּס significa «huir». La cláusula final en español requiere una construcción natural: «para que huya allí» conserva el sentido de movimiento hacia ese lugar y el valor direccional de שָׁמָּה.'
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  lexicon: HALOT
  rationale: En el contexto de las ciudades de refugio, רֹצֵחַ puede abarcar al que ha causado una muerte sin especificar por sí solo intención o accidente. «Homicida» preserva esa amplitud mejor que «asesino», que sugiere de manera más estrecha culpabilidad premeditada.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: besides them
  chosen_spanish: además de ellas
  alternatives_spanish:
  - además de éstas
  - aparte de ellas
  lexicon: HALOT
  rationale: La preposición על en este giro expresa adición, no ubicación física. «Además de ellas» comunica claramente el sentido aritmético y evita una construcción más idiomática pero menos exacta.
- source_word: אַרְבָּעִים וּשְׁתַּיִם עִיר
  english_pob_choice: forty-two cities
  chosen_spanish: cuarenta y dos ciudades
  alternatives_spanish:
  - cuarenta y dos poblaciones
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular «ciudad» tras el número, el español requiere el plural para el valor distributivo. Se mantiene «ciudades» por consistencia con el inicio del versículo.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado de «in addition to them» a «besides them» para reflejar con más precisión el matiz aditivo de la preposición hebrea. La versión española sigue ese ajuste con «además de ellas», manteniendo el mismo valor semántico y la lectura legal del pasaje.
  spanish_consistency_notes:
  - Se mantiene «levitas» para לְוִיִּם y «ciudades de refugio» como fórmula técnica consistente con el pasaje.
  - Se eligió «homicida» en el cuerpo por fidelidad legal; la nota preserva las alternativas semánticas relevantes sin introducir una interpretación cerrada.
  - «Además de ellas» conserva el sentido aditivo de וַעֲלֵיהֶם y evita la idea de superposición física.
