translation:
  language: es
  text: Que lo exalten en la asamblea[a] del pueblo, y lo alaben en el consejo de los ancianos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «congregación» para «asamblea».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «asiento/sesión de los ancianos»; «consejo de los ancianos» expresa mejor el sentido de una reunión deliberativa sentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִירֹמְמוּהוּ
  english_pob_choice: Let them exalt him
  chosen_spanish: Que lo exalten
  alternatives_spanish:
  - Y que lo levanten en alto
  - Y que lo ensalcen
  lexicon: HALOT
  rationale: רומם expresa elevar en honor; en español, «exalten» conserva bien el sentido de honra pública y funciona naturalmente con el subjuntivo exhortativo. Se evita un calco físico como «levanten en alto» porque suena menos idiomático.
- source_word: בִּקְהַל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  lexicon: HALOT
  rationale: קהל designa una reunión o asamblea convocada. «Asamblea» mantiene el sentido público y es menos eclesiástico que «congregación».
- source_word: עָם
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de la nación
  lexicon: HALOT
  rationale: עָם aquí señala al pueblo reunido en sentido colectivo. «Del pueblo» refleja bien la pertenencia comunitaria sin forzar una referencia política de «nación».
- source_word: וּבְמוֹשַׁב
  english_pob_choice: and in the council
  chosen_spanish: y en el consejo
  alternatives_spanish:
  - y en la sede
  - y en la sesión
  lexicon: HALOT
  rationale: מוֹשָׁב literalmente se relaciona con sentarse o con sede/sesión; en contexto con ancianos, el sentido es el de un cuerpo deliberativo. «Consejo» comunica esa función y sigue la decisión auditada en inglés.
- source_word: זְקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los líderes ancianos
  lexicon: HALOT
  rationale: זְקֵנִים aquí son líderes comunitarios reconocidos, no solo hombres de edad avanzada. «Ancianos» es la correspondencia española más directa y tradicional para ese cargo social.
- source_word: יְהַלְלֻהוּ
  english_pob_choice: praise him
  chosen_spanish: lo alaben
  alternatives_spanish:
  - lo alaben y celebren
  - lo canten en alabanza
  lexicon: HALOT
  rationale: הלל en piel significa alabar. «Lo alaben» es la forma más directa y natural en español para un contexto de culto o celebración pública.
translation_notes:
  revision_awareness: No se requirieron revisiones textuales respecto del último pase auditado; la presente redacción conserva el sentido y la estructura del hebreo con la misma decisión interpretativa que el inglés POB.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí, sino conforme al estándar del proyecto cuando corresponda al Tetragrámaton.
  - 'Se mantuvo el orden poético paralelo: exaltación pública primero, alabanza en el ámbito deliberativo después.'
  - «Ancianos» se entendió en sentido institucional/comunitario, no meramente biológico.
