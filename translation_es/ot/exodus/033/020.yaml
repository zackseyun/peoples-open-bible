translation:
  language: es
  text: 'Pero él dijo: «No puedes ver mi rostro[a], porque el hombre[b] no puede verme y vivir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi presencia». El hebreo dice literalmente «mi rostro».
    reason: lexical_alternative
  - marker: b
    text: Aquí «el hombre» significa cualquier ser humano; la afirmación se aplica a la humanidad en general.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, pero en español el contraste inmediato con la petición anterior se expresa con naturalidad mediante «Pero». Se conserva el sujeto explícito «él» para claridad referencial sin añadir contenido nuevo.
- source_word: לֹא תוּכַל
  english_pob_choice: You cannot
  chosen_spanish: No puedes
  alternatives_spanish:
  - No eres capaz de
  - No podrás
  lexicon: HALOT
  rationale: El verbo expresa incapacidad, no permiso. «No puedes» comunica de forma natural la imposibilidad presente y mantiene la fuerza del original.
- source_word: לִרְאֹת
  english_pob_choice: see
  chosen_spanish: ver
  alternatives_spanish:
  - mirar
  - contemplar
  lexicon: HALOT
  rationale: Aquí ראה se refiere a percepción visual directa. «Ver» es la equivalencia española más simple y fiel; las alternativas suenan más marcadas o interpretativas.
- source_word: אֶת פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi rostro/cara». «Rostro» conserva la imagen concreta y dignificada mejor que «cara» en español. «Presencia» queda como alternativa interpretativa, pero no desplaza la metáfora corporal del texto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la imposibilidad. «Porque» expresa la causalidad con claridad y naturalidad en español bíblico contemporáneo.
- source_word: לֹא יִרְאַ֥נִי
  english_pob_choice: shall not see me
  chosen_spanish: no me verá
  alternatives_spanish:
  - no podrá verme
  - no me verá jamás
  lexicon: HALOT
  rationale: El hebreo formula una verdad general sobre la imposibilidad humana de ver a Dios. «No me verá» preserva esa generalidad sin repetir innecesariamente la idea de capacidad.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular genérico del hebreo. «El hombre» conserva tanto la forma como el alcance general del término; una nota aclara que se refiere a la humanidad en general.
- source_word: וָחָי
  english_pob_choice: and live
  chosen_spanish: y vivirá
  alternatives_spanish:
  - y seguirá viviendo
  - y permanecerá vivo
  lexicon: HALOT
  rationale: 'En español, el futuro funciona bien para expresar la consecuencia general: la persona no verá a Dios y vivirá. Mantiene la relación de resultado del hebreo sin sobreexplicar.'
theological_decisions:
- issue: Lenguaje antropomórfico para Dios en «mi rostro»
  english_pob_reading: Retain 'my face' as the main-text rendering
  chosen_spanish_reading: Mantener «mi rostro» en el texto principal
  alternative_spanish_readings:
  - mi presencia
  rationale: El hebreo usa lenguaje corporal concreto; la traducción conserva esa imagen en vez de resolverla en una abstracción interpretativa. «Mi presencia» se deja como posibilidad léxica en la nota, no como sustituto del texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza genérica de הָאָדָם
  english_pob_reading: Render as 'man' in the main text
  chosen_spanish_reading: Renderizar como «el hombre» en el texto principal
  alternative_spanish_readings:
  - la humanidad
  - un ser humano
  rationale: El hebreo usa un singular genérico. «El hombre» preserva esa forma y su amplitud referencial; la nota aclara que se trata de toda la humanidad, no de un varón individual.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el trazado auditado en inglés: conserva la oposición narrativa inicial, la imposibilidad expresada por לֹא תוּכַל, la imagen concreta de פָּנִים y el singular genérico de הָאָדָם. No se introdujeron cambios respecto del sentido auditado; solo se ajustó la sintaxis al español natural.'
  spanish_consistency_notes:
  - Se usa «rostro» para פָּנִים en coherencia con el valor literal documentado, reservando «presencia» para nota.
  - Se mantiene «el hombre» como singular genérico, con aclaración inclusiva en nota.
  - El futuro «vivirá» refleja la consecuencia general del hebreo y mantiene tono bíblico natural en español.
  - La puntuación y las comillas siguen la norma española y facilitan lectura pública.
