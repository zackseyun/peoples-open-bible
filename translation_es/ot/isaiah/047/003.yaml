translation:
  language: es
  text: Tu desnudez será descubierta; sí, se verá tu vergüenza. Tomaré venganza, y no perdonaré a ningún hombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me encontraré con nadie», «no dejaré que nadie intervenga», o de modo semejante, «no perdonaré a nadie». La cláusula final hebrea es difícil y admite varias traducciones cercanas.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo dice «hombre» (אָדָם), probablemente con fuerza genérica: ninguna persona humana desviará o suavizará el juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגָּל
  english_pob_choice: will be uncovered
  chosen_spanish: será descubierta
  alternatives_spanish:
  - será revelada
  - será expuesta
  lexicon: HALOT
  rationale: El nifal imperfecto de גלה expresa exposición o desvelamiento pasivo. En español, «será descubierta» conserva la imagen de quedar al descubierto y resulta natural en el registro profético.
- source_word: עֶרְוָתֵךְ
  english_pob_choice: your nakedness
  chosen_spanish: tu desnudez
  alternatives_spanish:
  - tu vergüenza
  - tus partes íntimas
  lexicon: HALOT
  rationale: עֶרְוָה denota desnudez con carga de vergüenza y exposición. «Desnudez» mantiene la concreción metafórica sin reducir el término a una abstracción.
- source_word: גַּם
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: Aquí גַּם intensifica el paralelismo y la afirmación. «Sí» funciona como refuerzo enfático breve y natural en español.
- source_word: תֵּרָאֶה
  english_pob_choice: will be seen
  chosen_spanish: se verá
  alternatives_spanish:
  - aparecerá
  - será visible
  lexicon: HALOT
  rationale: El nifal de ראה comunica visibilidad pasiva. «Se verá» transmite con claridad la humillación pública implicada.
- source_word: חֶרְפָּתֵךְ
  english_pob_choice: your disgrace
  chosen_spanish: tu vergüenza
  alternatives_spanish:
  - tu oprobio
  - tu deshonra
  lexicon: HALOT
  rationale: חֶרְפָּה implica reproche, oprobio y vergüenza social. «Vergüenza» conserva el tono de deshonra pública de forma idiomática en español.
- source_word: נָקָם אֶקָּח
  english_pob_choice: I will take vengeance
  chosen_spanish: Tomaré venganza
  alternatives_spanish:
  - Ejecutaré venganza
  - Haré justicia vengadora
  lexicon: HALOT
  rationale: La construcción idiomática נָקָם לקח se vierte de modo establecido como «tomar venganza». En español, el futuro simple preserva la fuerza judicial del oráculo.
- source_word: אֶפְגַּע
  english_pob_choice: I will spare
  chosen_spanish: perdonaré
  alternatives_spanish:
  - intercederé por
  - me encontraré con
  lexicon: HALOT
  rationale: En este contexto difícil, la POB entiende el cierre como una afirmación de no ceder ante nadie ni perdonar a nadie. «Perdonaré» recoge bien la idea de no mostrar clemencia y resulta fluido en español.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - ninguna persona
  - nadie
  lexicon: HALOT
  rationale: אָדָם conserva aquí fuerza genérica humana. «Ningún hombre» mantiene la forma singular del hebreo y la gravedad del dicho, siguiendo la decisión de precisión de género del POB.
theological_decisions:
- issue: Sentido de וְלֹא אֶפְגַּע אָדָם
  english_pob_reading: I will spare no man
  chosen_spanish_reading: no perdonaré a ningún hombre
  alternative_spanish_readings:
  - no me encontraré con ningún hombre
  - no permitiré que nadie intervenga
  - no mostraré clemencia a nadie
  rationale: La cláusula hebrea es sintácticamente compacta y admite varias lecturas cercanas. En el contexto del juicio divino contra Babilonia, la lectura de no ceder/perdonar encaja con el flujo del oráculo. Se conserva en nota la ambigüedad real del hebreo.
  doctrine_reference: Translation philosophy §3; Tabla de términos controvertidos para אָדָם; precisión de género
- issue: Valor de אָדָם como término genérico humano
  english_pob_reading: 'Hebrew ''man'' (אָדָם), here likely with generic human force: no human being will avert the judgment.'
  chosen_spanish_reading: ningún hombre
  alternative_spanish_readings:
  - ninguna persona
  - nadie
  rationale: La forma singular hebrea tiene alcance genérico humano. «Ningún hombre» preserva la correspondencia formal con el texto fuente, aunque la nota permite leer el sentido inclusivo general de la expresión.
  doctrine_reference: Convención de género-preciso del POB; notas de términos controvertidos
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no se aplicaron cambios sustantivos. La decisión española sigue la lectura auditada del POB y conserva la ambigüedad relevante del cierre hebreo.'
  spanish_consistency_notes:
  - Se mantuvo un registro profético sobrio y directo.
  - Se preservó la imagen concreta de desnudez/vergüenza sin abstraerla demasiado.
  - Se usó «Tomaré venganza» para mantener la collocación idiomática del hebreo.
  - Se tradujo אָדָם de modo genérico pero con forma singular masculina, conforme al criterio de precisión de género del proyecto.
