translation:
  language: es
  text: Pero David no contó[a] a los de veinte años para abajo, porque Yahvé había dicho que multiplicaría a Israel como las estrellas de los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tomó su número». El hebreo es literalmente «no levantó su número», un modismo que significa «no contar» o «no hacer un censo de ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como las estrellas del cielo». La expresión retoma la promesa de hacer a Israel extraordinariamente numeroso.'
    reason: cross_reference
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Mas ... no
  lexicon: HALOT
  rationale: La conjunción introduce contraste con el contexto de censo anterior; «Pero» conserva ese valor adversativo de manera natural en español.
- source_word: נָשָׂא ... מִסְפָּרָם
  english_pob_choice: did not count them
  chosen_spanish: no contó[a]
  alternatives_spanish:
  - no tomó su número
  - no levantó su número
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático literalmente «no levantó su número». En español, «no contó» comunica con claridad el sentido de hacer un censo sin perder la fuerza lexical, y se deja la alternativa en nota.
- source_word: לְמִבֶּן עֶשְׂרִים שָׁנָה וּלְמָטָּה
  english_pob_choice: from twenty years old and under
  chosen_spanish: a los que eran de veinte años y menos
  alternatives_spanish:
  - de veinte años y abajo
  - de veinte años y menores
  - de veinte años y menos
  lexicon: HALOT
  rationale: La fórmula hebrea marca el umbral censal inclusivo descendente. «A los que eran de veinte años y menos» expresa ese rango con fluidez y sin forzar una calca.
- source_word: אָמַר יְהוָה
  english_pob_choice: the LORD had said
  chosen_spanish: Yahvé había dicho
  alternatives_spanish:
  - Yahvé dijo
  - el Señor había dicho
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el criterio del proyecto, y el pluscuamperfecto español refleja la anterioridad de la declaración divina respecto de la acción de David.
- source_word: לְהַרְבּוֹת
  english_pob_choice: he would multiply
  chosen_spanish: multiplicaría
  alternatives_spanish:
  - haría multiplicar
  - aumentaría
  - haría numeroso
  lexicon: HALOT
  rationale: El infinitivo causal tras «dijo» expresa el contenido de la promesa divina; «multiplicaría» reproduce ese valor prospectivo de forma idiomática en español.
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: like the stars of the heavens
  chosen_spanish: como las estrellas de los cielos[b]
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo «los cielos» en lugar de normalizarlo a singular, para conservar mejor la textura del original y la resonancia de la promesa patriarcal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvéh
  rationale: El texto hebreo contiene directamente el Tetragrama, y el proyecto pide «Yahvé» en el cuerpo principal. Se evita la sustitución por «SEÑOR» para preservar la transparencia del nombre pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Similitud con la promesa de descendencia innumerable
  english_pob_reading: like the stars of the heavens
  chosen_spanish_reading: como las estrellas de los cielos
  alternative_spanish_readings:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  rationale: La comparación evoca la promesa a los patriarcas de una descendencia innumerable. Mantener «los cielos» conserva la forma plural del hebreo y su eco intertextual.
  doctrine_reference: Cross-reference to Genesis 15:5; 22:17; 26:4
translation_notes:
  revision_awareness: El contexto inglés fue revisado y mantenido como de alta concordancia; no se requieren cambios sustantivos. La decisión principal en español es conservar la transparencia del nombre divino como «Yahvé» y traducir el modismo censal con un verbo natural en español, dejando la literalidad hebrea en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» en el texto principal para no ocultar el nombre divino original.
  - «Contó» funciona como equivalente dinámico del modismo hebreo y se complementa con nota lexical.
  - Se conserva el plural «los cielos» para reflejar la forma hebrea y el eco bíblico de la promesa.
  - El tono es sobrio y publicable, con puntuación y capitalización estándar del español.
