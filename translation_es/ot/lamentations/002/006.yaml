base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/006.yaml
  text: He has laid waste his shelter like a garden[a]; he has destroyed his appointed meeting place. Yahweh has caused appointed feast and Sabbath to be forgotten in Zion[c][b], and in the indignation of his anger he has spurned king and priest.
  footnotes:
  - marker: a
    text: Or 'his booth' or 'his tabernacle.' The Hebrew term can denote a shelter or booth; the exact image here is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'his appointed place of assembly'; possibly 'his tent of meeting.' The Hebrew word is related to the term later rendered 'appointed feast.'
    reason: lexical_alternative
  - marker: c
    text: Or 'appointed time' or 'festival.' In this context, paired with 'Sabbath,' the word likely refers to the set feast times.
    reason: lexical_alternative
