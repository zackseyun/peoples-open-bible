review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura temporal y el nombre divino, pero no refleja con suficiente fidelidad el matiz de ירש en ambos casos. El hebreo habla de desposeer/desalojar a las naciones para tomar su lugar, no meramente de 'tomarlas en posesión'. Además, 'que tú vas allí' suena incompleto en español; conviene explicitar el destino con 'adonde tú vas'.
  spanish_quality_summary: La redacción es mayormente clara, pero 'corte de delante de ti a las naciones' es algo rígido y 'tomarlas en posesión' resulta poco natural porque el objeto son las naciones, no la tierra. 'Las desposeas' sería fiel pero algo duro; 'expulsarlas' aclara demasiado. La mejor solución es mantener 'desposeer' en un registro bíblico claro. También puede suavizarse la cláusula relativa para mejor fluidez.
  glossary_alignment: Alineado con la convención del proyecto en 'Yahvé' y 'Dios'. No hay otros términos glosarios sensibles en este versículo. La principal desviación es léxica respecto de ירש, donde el inglés auditado eligió consistentemente 'dispossess' y el español debería preservar ese mismo valor semántico.
  issues:
  - severity: medium
    issue: ירש se tradujo como 'tomar en posesión' en ambos casos.
    rationale: El objeto directo son 'las naciones'; en este contexto la idea primaria es desposeerlas/desalojarlas, no simplemente poseerlas. La opción actual debilita el matiz de desplazamiento presente en el hebreo y documentado en el POB inglés.
  - severity: low
    issue: '''que tú vas allí'' es una formulación poco natural en español.'
    rationale: Aunque intenta reflejar בָא ... שָׁמָּה, en español suena truncado. 'adonde tú vas' o 'adonde vas' conserva el sentido con mejor legibilidad.
  - severity: low
    issue: '''corte de delante de ti a las naciones'' suena algo torpe.'
    rationale: 'Es entendible, pero una leve reordenación mejora la naturalidad sin perder la imagen verbal: ''quite de delante de ti a las naciones'' o ''corte de delante de ti las naciones''.'
  revised_spanish_text: Cuando Yahvé tu Dios[a] corte de delante de ti las naciones adonde tú vas para desposeerlas, y las desposeas y habites en su tierra,
  revised_footnotes:
  - marker: a
    text: Se usa «Yahvé» para el nombre divino יְהוָה, conforme a la convención del proyecto.
    reason: source_note
  revision_rationale: Se revisa para reflejar con más precisión ירש como 'desposeer' en ambos casos, en línea con la evidencia fuente y la decisión léxica inglesa auditada. También se mejora la fluidez de la cláusula relativa en español sin apartarse del sentido del hebreo. La nota sobre el nombre divino se conserva intacta y correctamente anclada.
