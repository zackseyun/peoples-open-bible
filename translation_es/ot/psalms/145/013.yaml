revisions:
- from: Tu reino es un reino[a] de todas las edades[b], y tu dominio es por cada generación.
  to: Tu reino[a] es un reino de todas las edades[b], y tu dominio es de generación en generación[c].
  rationale: Se conserva la repetición poética de «reino» y la formulación «de todas las edades» por fidelidad a la decisión POB, pero se sustituye «por cada generación» por «de generación en generación» porque expresa con mayor naturalidad y precisión el modismo hebreo de continuidad a través de generaciones sucesivas. También se añade una nota para documentar la alternativa temporal correspondiente al rastro de auditoría inglés.
