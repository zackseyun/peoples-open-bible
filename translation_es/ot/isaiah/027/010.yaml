    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [a] para que recaiga sobre «morada», que es el término realmente explicado por la nota y por la decisión léxica de נָוֶה. Se ajusta «como el desierto» a «como el yermo» para reflejar mejor la amplitud semántica de כַּמִּדְבָּר según el audit trail. Se mejora «y devora sus ramas» a «y deja peladas sus ramas» para representar mejor el efecto completo de וְכִלָּה, conservando en nota la alternativa más literal «consume sus ramas».
