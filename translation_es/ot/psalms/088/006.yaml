    reason: lexical_alternative
  - marker: b
    text: «Recordar» aquí probablemente significa más que una mera evocación mental; implica atender a alguien o actuar en su favor.
    reason: lexical_alternative
  - marker: c
    text: O «separados de tu mano». «Mano» es una imagen hebrea de poder, control o cuidado.
    reason: lexical_alternative
  revision_rationale: La revisión conserva las decisiones correctas del borrador, pero mejora la fidelidad y el español. «Los caídos» expresa mejor חֲלָלִים que «los muertos caídos», y «han sido cortados de tu mano» preserva la fuerza de נִגְזָרוּ mejor que «están separados». También se restaura el sujeto explícito «ellos» para reflejar וְהֵמָּה con mayor claridad.
