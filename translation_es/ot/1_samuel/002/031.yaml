translation:
  language: es
  text: He aquí[a], vienen días en que cortaré tu brazo y el brazo de la casa de tu padre, de modo que no habrá ningún hombre viejo en tu casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tu brazo ... el brazo de la casa de tu padre». Aquí «brazo» es una metáfora hebrea de fuerza o poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La fórmula introductoria profética pide una apelación directa y solemne. «Mira» conserva el valor deíctico y resulta natural en español contemporáneo sin sonar arcaico.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - están llegando días
  - se acercan días
  - los días vienen
  lexicon: HALOT
  rationale: La expresión anuncia un juicio inminente. «Vienen días» mantiene el movimiento hacia el futuro y suena idiomático en español, sin cargar innecesariamente el texto.
- source_word: גָּדַעְתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - destruiré
  - separaré
  - cortaré de raíz
  lexicon: HALOT
  rationale: El verbo transmite una acción decisiva de eliminación. «Cortaré» conserva la imagen verbal del hebreo y funciona bien con el complemento «tu brazo».
- source_word: זְרֹעֲךָ
  english_pob_choice: your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu fuerza
  - tu poder
  - tu brazo fuerte
  lexicon: HALOT
  rationale: El POB inglés revisado prefirió la imagen literal «arm» tras la revisión, y el hebreo usa una metáfora corporal de fuerza o poder. En español, «brazo» mantiene la metáfora sin perder legibilidad; se preserva la tensión entre imagen y sentido.
- source_word: זְרֹעַ בֵּית אָבִיךָ
  english_pob_choice: the arm of your father's house
  chosen_spanish: el brazo de la casa de tu padre
  alternatives_spanish:
  - la fuerza de la casa de tu padre
  - el brazo de tu familia paterna
  - el poder de la casa de tu padre
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la metáfora del hebreo. «Casa de tu padre» reproduce la expresión de linaje/household de forma transparente.
- source_word: מֵהְיוֹת זָקֵן בְּבֵיתֶךָ
  english_pob_choice: so that there will not be an old man in your house
  chosen_spanish: de modo que no habrá anciano en tu casa
  alternatives_spanish:
  - para que no haya un anciano en tu casa
  - de suerte que no quede un anciano en tu casa
  - sin que haya un anciano en tu casa
  lexicon: HALOT
  rationale: La construcción infinitiva expresa resultado. «De modo que» comunica bien la consecuencia; «anciano» reproduce con dignidad la idea de una persona que alcanza edad avanzada, no un cargo.
theological_decisions:
- issue: Metáfora corporal de זְרוֹעַ (arm) como fuerza/poder
  english_pob_reading: The English POB chose literal 'arm' after revision, while noting the metaphorical sense in a footnote.
  chosen_spanish_reading: Se conserva «brazo» en el texto principal y se aclara en nota que es una metáfora de fuerza o poder.
  alternative_spanish_readings:
  - traducir el sentido como «fuerza» o «poder»
  - mantener solo la imagen literal sin aclaración
  rationale: El hebreo presenta una imagen corporal concreta, pero en este oráculo la referencia apunta al despojo de poder y continuidad familiar. Mantener «brazo» respeta la forma del original; la nota evita que el lector pierda el sentido metafórico.
  doctrine_reference: Principios de equivalencia óptima y nota lexical sobre metáfora
- issue: Resultado del juicio expresado por la construcción infinitiva
  english_pob_reading: '''so that there will not be an old man in your house'''
  chosen_spanish_reading: «de modo que no habrá anciano en tu casa» como resultado del corte del brazo
  alternative_spanish_readings:
  - «para que no haya anciano en tu casa»
  - «sin que haya anciano en tu casa»
  rationale: 'La frase hebrea expresa el efecto del juicio sobre la casa de Eli: una línea familiar truncada antes de llegar a la vejez. La redacción española conserva la consecuencia sin sobre-interpretar el detalle.'
  doctrine_reference: Contexto narrativo de 1 Samuel 2 y semántica de infinitivo de resultado
translation_notes:
  revision_awareness: El texto inglés más reciente revisó la primera versión para recuperar la literalidad de «arm» frente a «strength». La versión española sigue esa revisión, manteniendo la metáfora corporal en el texto principal y explicando su valor semántico en nota, sin volver a sustituirla por un abstracto.
  spanish_consistency_notes:
  - Se mantuvo «brazo» para coherencia con la revisión inglesa y con la metáfora hebrea documentada.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, porque este versículo no contiene el Tetragrámaton.
  - «Casa de tu padre» conserva la expresión de linaje/household sin domesticarla a «familia» en el texto principal.
  - «Anciano» se eligió por edad avanzada, no como título eclesiástico.
