translation:
  language: es
  text: 'Y dijo: «Bendito sea Yahvé, el Dios de Israel, que habló por su boca[a] a David mi padre, y lo cumplió por su mano, diciendo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habló por su boca a David mi padre, y por su mano lo cumplió». El hebreo conserva un paralelismo deliberado entre lo que Dios dice y lo que realiza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso de Salomón; «Y dijo» conserva el flujo hebreo de manera natural en español sin añadir una relación temporal más fuerte de la que exige el texto.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Alabado sea
  lexicon: HALOT
  rationale: Es una fórmula doxológica dirigida a Dios. «Bendito sea» reproduce bien el valor exclamativo/benedictorio del hebreo con tono elevado y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada según la pauta del proyecto. «Yahvé» comunica el Tetragrámaton sin sustituirlo por un título impersonal.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa expresa el título pactual que identifica a Yahvé en relación con Israel; «el Dios de Israel» es la forma más clara y fiel en español.
- source_word: דִּבֶּר בְּפִיו
  english_pob_choice: spoke with his mouth
  chosen_spanish: habló por su boca
  alternatives_spanish:
  - habló con su boca
  - habló
  lexicon: HALOT
  rationale: El hebreo usa una imagen antropomórfica que contrasta con la acción posterior. «Por su boca» mantiene el paralelismo con «por su mano» y suena más natural que una calca demasiado literal.
- source_word: אֵת דָּוִיד אָבִי
  english_pob_choice: to David my father
  chosen_spanish: a David, mi padre
  alternatives_spanish:
  - a David mi padre
  - con David, mi padre
  lexicon: HALOT
  rationale: Con דבר, el complemento marcado funciona como destinatario del hablar divino. En español, «a David, mi padre» expresa con claridad ese destinatario.
- source_word: וּבְיָדוֹ מִלֵּא
  english_pob_choice: and has fulfilled it by his hand
  chosen_spanish: y lo cumplió por su mano
  alternatives_spanish:
  - y lo cumplió con su mano
  - y lo llevó a cabo por su mano
  lexicon: HALOT
  rationale: Se conserva el paralelismo entre hablar y actuar. «Por su mano» refleja el sentido instrumental del hebreo y evita una traducción demasiado rígida; «lo» explicita el objeto implícito en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijo
  lexicon: HALOT
  rationale: Es el infinitivo conjuntivo que introduce la cita siguiente; «diciendo» conserva la función quotativa de manera directa.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Se mantiene el nombre propio divino en lugar de una sustitución reverencial, conforme a la política del proyecto y al valor del pacto en el pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Instrumental parallelism: speaking and fulfilling'
  english_pob_reading: spoke with his mouth ... has fulfilled it by his hand
  chosen_spanish_reading: habló por su boca ... y lo cumplió por su mano
  alternative_spanish_readings:
  - habló con su boca ... y lo cumplió con su mano
  - habló ... y lo cumplió
  rationale: El hebreo conserva un paralelismo deliberado entre boca y mano, palabra y cumplimiento. La versión española preserva ese contraste sin borrar la metáfora corporal.
  doctrine_reference: Observación lexical del paralelismo hebreo en el versículo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la instrumentalidad de «with his hand» a «by his hand» para mayor naturalidad. La redacción española también usa una expresión instrumental natural («por su mano») y mantiene el paralelismo entre boca y mano del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - «por su boca / por su mano» conserva el paralelismo hebreo sin caer en calco impropio.
  - Se usó pasado simple («dijo», «cumplió») para la secuencia narrativa breve y solemne.
  - La coma en «a David, mi padre» aclara la aposición y mejora la legibilidad en español.
