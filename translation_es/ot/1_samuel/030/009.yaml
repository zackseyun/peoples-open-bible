translation:
  language: es
  text: Entonces David fue, él y los seiscientos hombres que estaban con él, y llegaron hasta el arroyo Besor[a], donde los que habían quedado atrás se quedaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Arroyo Besor» puede entenderse también como «wadi Besor», es decir, un cauce estacional o barranco.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So David went
  chosen_spanish: Así que David fue
  alternatives_spanish:
  - Entonces David fue
  - Y David fue
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Así que» mantiene la progresión natural sin forzar un calco. «Fue» expresa el movimiento de manera directa y digna.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - David, él
  - — (implícito)
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y appositivo; en español puede mantenerse con «él» para conservar la estructura del hebreo sin volverla pesada.
- source_word: וְשֵׁשׁ מֵאוֹת אִישׁ אֲשֶׁר אִתּוֹ
  english_pob_choice: and the six hundred men who were with him
  chosen_spanish: los seiscientos hombres que estaban con él
  alternatives_spanish:
  - y los seiscientos hombres que estaban con él
  - los seiscientos varones que estaban con él
  lexicon: HALOT
  rationale: «אִישׁ» aquí funciona como colectivo de combatientes varones; «hombres» comunica bien el sentido. Se conserva la referencia al grupo conocido y la relación de compañía con David.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - y llegaron
  - y vinieron
  lexicon: HALOT
  rationale: En contexto de desplazamiento, «llegaron» expresa el resultado del movimiento de forma natural. El plural queda claro por el sujeto compuesto anterior.
- source_word: עַד נַחַל הַבְּשׂוֹר
  english_pob_choice: to the Brook Besor
  chosen_spanish: hasta el arroyo Besor
  alternatives_spanish:
  - hasta el torrente Besor
  - hasta el Wadi Besor
  lexicon: HALOT
  rationale: נַחַל puede referirse a arroyo, cauce o wadi; «arroyo» es comprensible para lectores amplios y preserva el nombre propio. Se evita «SEÑOR» o equivalentes no pertinentes, y se mantiene el topónimo Besor.
- source_word: וְהַנּוֹתָרִים
  english_pob_choice: those who were left behind
  chosen_spanish: los que habían quedado atrás
  alternatives_spanish:
  - los que quedaron atrás
  - los restantes
  lexicon: HALOT
  rationale: La forma participial denota a quienes quedaron como remanente; «habían quedado atrás» reproduce bien la relación de anterioridad y el sentido de quedar separados del grupo principal.
- source_word: עָמָדוּ
  english_pob_choice: stayed
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se quedaron
  - permanecieron
  - estuvieron parados
  lexicon: HALOT
  rationale: Aunque literalmente es «estuvieron de pie», en este contexto de marcha significa detenerse o quedarse en un lugar. «Se detuvieron» conserva el valor narrativo sin sonar rígido.
translation_notes:
  revision_awareness: La revisión inglesa aclaró que la última frase debe entenderse como «los que habían quedado atrás»; la redacción española adopta esa precisión manteniendo la estructura narrativa y el matiz del participio hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva «Besor» como topónimo transliterado estable, con nota cultural sobre el posible valor de wadi.
  - La puntuación española sigue una sola oración narrativa con incisos coordinados, en paralelo al hebreo y al audit trail inglés.
