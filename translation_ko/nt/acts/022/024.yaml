  text: 'ἐκέλευσεν ⸂ὁ χιλίαρχος εἰσάγεσθαι αὐτὸν⸃ εἰς τὴν παρεμβολήν, ⸀εἴπας μάστιξιν ἀνετάζεσθαι αὐτὸν ἵνα ἐπιγνῷ δι’ ἣν αἰτίαν οὕτως ἐπεφώνουν αὐτῷ.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/022/024.yaml
  text: The tribune ordered him to be brought into the barracks[a], saying that he should be examined by scourging[b], so that he might find out for what reason they were shouting against him like this.
  footnotes:
  - marker: a
    text: "Or 'be interrogated by flogging.' The Greek combines examination language with the explicit means of scourging."
    reason: lexical_alternative
  - marker: b
    text: "Or 'the camp' or 'the fortress.' Here the term refers to the Roman military quarters in Jerusalem."
    reason: cultural_note
translation:
  language: ko
  text: 천부장은 그를 병영[a] 안으로 데려가라고 명하고, 그들이 무슨 이유로 그를 향해 그렇게 외치는지 알아내기 위해 채찍질로 신문하라고 말했습니다.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「병영」 또는 「진영」, 「요새」. 여기서는 예루살렘에 있던 로마 군영을 가리킨다.
    reason: cultural_note
  - marker: b
    text: 또는 「채찍질을 통해 심문하라고」. 헬라어는 신문 행위와 그 수단(채찍질)을 결합한다.
    reason: lexical_alternative
