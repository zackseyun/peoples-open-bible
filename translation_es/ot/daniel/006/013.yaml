  text: בֵּ֠/אדַיִן קְרִ֨יבוּ וְ/אָמְרִ֥ין קֳדָם מַלְכָּ/א֮ עַל אֱסָ֣ר מַלְכָּ/א֒ הֲ/לָ֧א אֱסָ֣ר רְשַׁ֗מְתָּ דִּ֣י כָל אֱנָ֡שׁ דִּֽי יִבְעֵה֩ מִן כָּל אֱלָ֨הּ וֶֽ/אֱנָ֜שׁ עַד יוֹמִ֣ין תְּלָתִ֗ין לָהֵן֙ מִנָּ֣/ךְ מַלְכָּ֔/א יִתְרְמֵ֕א לְ/ג֖וֹב אַרְיָותָ֑/א עָנֵ֨ה מַלְכָּ֜/א וְ/אָמַ֗ר יַצִּיבָ֧א מִלְּתָ֛/א כְּ/דָת מָדַ֥י וּ/פָרַ֖ס דִּי לָ֥א תֶעְדֵּֽא־־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/013.yaml
  text: 'Then they came near and spoke before the king concerning the king’s injunction: “Did you not sign an injunction that any man who makes a petition to any god or man for thirty days[a], except to you, O king, shall be thrown into the lions’ den?” The king answered and said, “The matter is certain, according to the law of the Medes and Persians[c][b], which cannot be changed.”'
  footnotes:
  - marker: a
    text: Or “decree” or “interdict” for “injunction”; the Aramaic term refers specifically to a binding prohibition.
    reason: lexical_alternative
  - marker: b
    text: “Any man” renders a grammatically masculine singular term used generically in this legal statement; alternatively, “any person.”
    reason: lexical_alternative
  - marker: c
    text: Or “which cannot be revoked” or “which cannot be altered.”
    reason: lexical_alternative
