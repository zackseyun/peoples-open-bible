review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del versículo, preserva «Yahvé», la lista inclusiva del hogar y de los vulnerables, y mantiene adecuadamente la fórmula del lugar escogido. Sin embargo, hay dos desajustes relevantes con el hebreo y con el propio marco auditado: «dentro de tus ciudades» interpreta בִּשְׁעָרֶיךָ en vez de conservar la expresión más literal/idiomática «dentro de tus puertas», y «que están entre ustedes» cambia de segunda persona singular a plural, debilitando la coherencia del mandato dirigido a un individuo representativo.'
  spanish_quality_summary: El español es claro y de registro digno. No obstante, «forastero» puede sonar más a visitante ocasional que a residente no israelita; «residente extranjero» comunica mejor el valor social-jurídico de גֵּר en este contexto. También conviene evitar la mezcla de «tú/tu» con «ustedes» dentro de la misma oración.
  glossary_alignment: Alinea bien con el glosario en «Yahvé» y en la decisión de mantener «esclavo / esclava». Se aparta innecesariamente de la preferencia auditada de conservar el modismo deuteronómico «dentro de tus puertas/gates». Para גֵּר, «forastero» es posible pero menos alineado con la nota inglesa que explicita al no israelita residente; en español conviene hacer principal «residente extranjero» y dejar «forastero» como alternativa.
  issues:
  - severity: medium
    issue: «dentro de tus ciudades» para בִּשְׁעָרֶיךָ
    rationale: El hebreo dice literalmente «en/tus puertas» y el inglés POB retuvo «within your gates» por su resonancia legal deuteronómica. «Ciudades» es una interpretación aceptable en nota o alternativa, pero en el texto principal pierde el modismo fuente y su fuerza jurídica.
  - severity: medium
    issue: Mezcla de segunda persona singular y plural en «tu... tus... entre ustedes»
    rationale: El mandato está dirigido a «tú» singular representativo. Cambiar a «ustedes» en la cláusula relativa introduce inconsistencia innecesaria y no refleja la morfología hebrea singular בְּקִרְבֶּךָ.
  - severity: medium
    issue: «forastero» como texto principal para גֵּר
    rationale: Puede entenderse como alguien de paso. En Deuteronomio גֵּר es un residente extranjero integrado bajo el orden social de Israel. «Residente extranjero» es más preciso; «forastero» puede quedar como alternativa en nota.
  - severity: low
    issue: Anclaje de nota [b] solo en «esclavo»
    rationale: La nota explica la elección para el masculino, pero la misma fuerza léxica aplica también a «esclava». No es un error grave, pero una formulación más inclusiva en la nota mejora la correspondencia con ambos términos.
  revised_spanish_text: 'Y te regocijarás[a] delante de Yahvé tu Dios: tú, tu hijo, tu hija, tu esclavo[b] y tu esclava, el levita que está dentro de tus puertas, y el residente extranjero[c], el huérfano y la viuda que están entre ti, en el lugar que Yahvé tu Dios escogerá para hacer morar allí su nombre.'
