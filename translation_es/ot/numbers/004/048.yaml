translation:
  language: es
  text: sus hombres censados eran ocho mil quinientos ochenta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los contados de entre ellos» o «sus contados». El hebreo se refiere a los inscritos en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: El verbo היה en este cierre de total censal funciona como copulativo en pasado. En español, «fueron» comunica de manera natural y formal el resultado numérico sin añadir matiz innecesario.
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: their counted men
  chosen_spanish: sus censados
  alternatives_spanish:
  - los contados de ellos
  - los enumerados de ellos
  - sus numerados
  lexicon: HALOT
  rationale: El sustantivo alude a los inscritos o contados en el censo. «Sus censados» conserva la referencia censal sin forzar una perífrasis pesada; el contexto inmediato ya deja claro que se trata de varones aptos para servicio.
- source_word: שְׁמֹנַת אֲלָפִים
  english_pob_choice: eight thousand
  chosen_spanish: ocho mil
  alternatives_spanish:
  - ocho millares
  lexicon: HALOT
  rationale: La construcción numeral estándar se vierte de forma directa e idiomática en español.
- source_word: וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred
  chosen_spanish: quinientos
  alternatives_spanish:
  - cinco cientos
  lexicon: HALOT
  rationale: Parte media del total numérico; «quinientos» es la forma natural y precisa en español.
- source_word: וּשְׁמֹנִים
  english_pob_choice: and eighty
  chosen_spanish: ochenta
  alternatives_spanish:
  - y ochenta
  lexicon: HALOT
  rationale: 'El total en español se expresa con la cadena numérica completa ya integrada: «ocho mil quinientos ochenta». La conjunción distributiva del hebreo queda implícita en la suma final, como en el uso normal del español.'
theological_decisions:
- issue: Terminología censal con referent masculino implícito
  english_pob_reading: their counted men
  chosen_spanish_reading: sus censados
  alternative_spanish_readings:
  - sus hombres censados
  - los contados entre ellos
  rationale: El contexto de Números 4 trata de los levitas varones aptos para el servicio del tabernáculo. En español, «sus censados» mantiene la función censal y deja visible que el texto habla de los inscritos en el recuento, sin sobreexplicitar género donde el sustantivo ya es genérico dentro del contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el control revisado: no se requieren cambios sustanciales. El punto principal es conservar el valor censal de פְּקֻדֵיהֶם sin volver el español innecesariamente literal o pesado.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero en español actual.
  - No se usa «SEÑOR» ni un equivalente en este versículo, porque el texto no contiene el nombre divino.
  - El total numérico se expresa como cifra escrita en palabras, siguiendo el estilo de la serie.
  - La nota al pie conserva la alternativa lexical importante documentada por el inglés POB.
