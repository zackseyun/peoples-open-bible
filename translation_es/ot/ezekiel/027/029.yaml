    rationale: El hebreo dice «estarán/se quedarán de pie», no «se pondrán». En español la frase actual introduce un matiz de movimiento o desembarco que ya está expresado por «descenderán». Conviene mantener la imagen final de estar en tierra.
  - severity: medium
