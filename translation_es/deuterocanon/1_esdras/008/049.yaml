base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/049.yaml
  text: 'And from the temple servants whom David and the leaders had assigned to the service of the Levites: temple servants[a], two hundred twenty[b]; all of them were listed by name.'
  footnotes:
  - marker: a
    text: Or 'Nethinim,' a Hebrew-derived technical term for temple servants. The Greek has 'temple servants' (ἱερόδουλοι), while the Hebrew parallel uses נְתִינִים.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them were recorded by name.' The closing phrase refers to formal registration or listing by name.
    reason: lexical_alternative
