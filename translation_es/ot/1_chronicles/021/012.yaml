  yaml_path: translation/ot/1_chronicles/021/012.yaml
  text: either three years of famine[a], or three months of being swept away before your foes while the sword of your enemies overtakes you, or three days of the sword of Yahweh, even pestilence in the land, with the angel of Yahweh destroying throughout all the territory of Israel[b]. Now consider what answer I should return to the one who sent me.
