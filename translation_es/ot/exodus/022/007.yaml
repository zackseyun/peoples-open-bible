revisions:
- from: Si el ladrón no es hallado[a], el dueño de la casa se presentará ante Dios para determinar si no ha puesto su mano en los bienes de su prójimo.
  to: Si el ladrón no es hallado[a], el dueño de la casa se acercará a Dios para ver si no ha puesto su mano sobre la propiedad de su prójimo.
  rationale: La revisión elimina la sobreexplicación de «para determinar», acerca el verbo principal al hebreo y al audit trail con «se acercará a Dios», y ajusta el objeto final a «la propiedad de su prójimo» para reflejar mejor la decisión léxica documentada. Se conserva la nota sobre «jueces» sin cambios sustanciales.
