translation:
  language: es
  text: Por estas cosas, la justicia divina está reservándote un fuego más intenso[a] y eterno[b], y tormentos, que durante toda la era[c] no te soltarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuego más denso». El comparativo griego πυκνοτέρῳ es literalmente «más denso» o «más espeso», aquí con sentido de mayor intensidad del castigo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fuego de duración de era». El griego αἰώνιος puede expresarse más literalmente en relación con una era, aunque en este contexto suele comunicar «eterno».'
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «durante toda la era». La expresión griega εἰς ὅλον τὸν αἰῶνα conserva lenguaje de era/edad y no conviene aplanarla a simplemente «para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθ᾽ ὧν
  english_pob_choice: For these things
  chosen_spanish: Por estas cosas
  alternatives_spanish:
  - Por lo cual
  - A causa de esto
  - Por razón de estas cosas
  lexicon: LSJ
  rationale: La expresión introduce la base causal del castigo venidero. «Por estas cosas» conserva esa relación sin añadir explicaciones que el griego no desarrolla.
- source_word: ταμιεύεταί
  english_pob_choice: is storing up
  chosen_spanish: está reservándote
  alternatives_spanish:
  - está guardando para ti
  - está acumulando para ti
  - está almacenando para ti
  lexicon: LSJ
  rationale: El verbo comunica la idea de dejar algo en reserva para un tiempo futuro. «Estar reservándote» mantiene la imagen de retribución preparada para después y suena natural en español.
- source_word: ἡ θεία δίκη
  english_pob_choice: divine justice
  chosen_spanish: la justicia divina
  alternatives_spanish:
  - el juicio divino
  - la justicia de Dios
  - el castigo divino
  lexicon: LSJ
  rationale: δίκη puede abarcar justicia, juicio y retribución. «Justicia divina» preserva el alcance judicial y retributivo sin introducir un nombre divino que el texto griego no expresa explícitamente.
- source_word: πυκνοτέρῳ
  english_pob_choice: more intense
  chosen_spanish: más intenso
  alternatives_spanish:
  - más denso
  - más espeso
  - más concentrado
  lexicon: LSJ
  rationale: La comparativa griega sugiere literalmente algo más denso o espeso, pero en el contexto del fuego lo que se intensifica es la severidad. «Más intenso» comunica esa fuerza sin perder la tensión semántica documentada.
- source_word: αἰωνίῳ
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - de edad perdurable
  - de largo siglo
  - age-long
  lexicon: LSJ
  rationale: En este contexto punitivo, «eterno» transmite de forma natural la duración absoluta que el término puede tener en el uso judío helenístico. Se mantiene la fuerza durativa del texto.
- source_word: πυρὶ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: LSJ
  rationale: Correspondencia léxica directa y clara.
- source_word: βασάνοις
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - penas
  - suplicios
  lexicon: LSJ
  rationale: El plural señala sufrimientos punitivos severos. «Tormentos» conserva el peso de la imagen sin sonar excesivamente técnico.
- source_word: εἰς ὅλον τὸν αἰῶνα
  english_pob_choice: through the whole age
  chosen_spanish: por todo el siglo
  alternatives_spanish:
  - a través de todo el siglo
  - por toda la era
  - durante todo el siglo
  lexicon: LSJ
  rationale: La frase conserva el idioma de «edad/siglo» del griego y evita colapsarla en una sola fórmula adverbial como «para siempre». «Por todo el siglo» mantiene la transparencia temporal en español.
- source_word: οὐκ ἀνήσουσί
  english_pob_choice: will not release
  chosen_spanish: no te soltarán
  alternatives_spanish:
  - no te liberarán
  - no te dejarán ir
  - no aflojarán su presa sobre ti
  lexicon: LSJ
  rationale: El verbo expresa soltar/aflojar. Con «fuego y tormentos» como sujetos personificados, «no te soltarán» preserva la fuerza de la imagen y su lectura de castigo incesante.
theological_decisions:
- issue: 'Doble lenguaje de duración: αἰώνιος y εἰς ὅλον τὸν αἰῶνα'
  english_pob_reading: Main text uses 'eternal' for αἰώνιος while preserving the more literal age-language in 'through the whole age.'
  chosen_spanish_reading: El texto principal usa «eterno» para αἰώνιος y conserva «por todo el siglo» para εἰς ὅλον τὸν αἰῶνα.
  alternative_spanish_readings:
  - «de edad perdurable» y «durante toda la era»
  - «eterno» y «para siempre»
  - «age-long» y «por todo el siglo»
  rationale: El versículo combina dos expresiones temporales distintas. Conviene no resolverlas en una sola fórmula española, para conservar la tensión auditada entre duración absoluta y lenguaje de edad/siglo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La traducción refleja la revisión más reciente del audit trail al preferir una equivalencia natural para πυκνοτέρῳ («más intenso») en vez de una calca como «más denso», sin perder la intensidad punitiva. También conserva la distinción entre αἰώνιος y εἰς ὅλον τὸν αἰῶνα, según la nota de revisión y la decisión teológica documentada.
  spanish_consistency_notes:
  - Se mantiene «justicia divina» para ἡ θεία δίκη, evitando sustituirlo por fórmulas eclesiásticas más interpretativas.
  - Se preserva el lenguaje de edad/siglo en la segunda expresión temporal para no homogeneizar las dos duraciones.
  - «No te soltarán» sigue la imagen verbal del original y conserva la personificación del fuego y los tormentos.
  - Los marcadores de nota a, b y c aparecen en el texto en los lugares correspondientes.
