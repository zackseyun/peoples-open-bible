translation:
  language: es
  text: Porque yo expulsaré naciones de delante de ti y ensancharé tu frontera, y ningún hombre[a] codiciará tu tierra cuando subas para presentarte ante[b] Yahvé tu Dios tres veces en el año[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ningún hombre» traduce un sustantivo hebreo masculino singular usado de manera representativa; el sentido es que nadie codiciará la tierra mientras los varones de Israel suben a las fiestas de peregrinación.
    reason: cultural_note
  - marker: b
    text: 'Hebreo literalmente: «ver el rostro de Yahvé tu Dios»; este giro significa «presentarte ante él» en adoración.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tres veces al año».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹרִישׁ
  english_pob_choice: I will drive out
  chosen_spanish: desalojaré
  alternatives_spanish:
  - expulsaré
  - arrojaré fuera
  lexicon: HALOT
  rationale: El verbo hiphil de ירש en este contexto expresa quitar a las naciones de la tierra delante de Israel. «Desalojaré» comunica bien la remoción territorial sin introducir una idea ajena al pasaje.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: En este contexto de conquista territorial, «naciones» conserva el valor político-colectivo del hebreo y coincide con la lectura de la POB en inglés.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literaliza la idea de retirada «delante de» la persona. «De delante de ti» mantiene el giro sin sonar demasiado forzado en español.
- source_word: וְהִרְחַבְתִּי
  english_pob_choice: and enlarge
  chosen_spanish: ensancharé
  alternatives_spanish:
  - agrandaré
  - ampliaré
  lexicon: HALOT
  rationale: El verbo significa hacer más amplio. «Ensancharé» reproduce de manera concreta la imagen espacial del hebreo y combina naturalmente con «límite».
- source_word: גְּבוּלֶךָ
  english_pob_choice: your border
  chosen_spanish: tu límite
  alternatives_spanish:
  - tu frontera
  - tu territorio
  lexicon: HALOT
  rationale: «Límite» conserva el sentido de frontera territorial sin sonar excesivamente moderno o administrativo. En español bíblico transmite bien la extensión prometida.
- source_word: לֹא יַחְמֹד
  english_pob_choice: will covet
  chosen_spanish: codiciará
  alternatives_spanish:
  - deseará
  - anhelará
  lexicon: HALOT
  rationale: «Codiciar» preserva el matiz moral fuerte del mismo verbo usado en el mandamiento contra el codiciar. Evita suavizar la prohibición implícita del texto.
- source_word: אִישׁ
  english_pob_choice: no man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: 'Aunque el hebreo es un singular masculino representativo, en español «nadie» expresa con naturalidad el sentido general: no habrá persona alguna que codicie la tierra. Mantiene la fuerza sin recargar el estilo con un masculino marcado.'
- source_word: אַרְצְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu suelo
  lexicon: HALOT
  rationale: «Tierra» es el término covenantal-territorial normal en el Éxodo y corresponde mejor al contexto que «país».
- source_word: בַּעֲלֹתְךָ
  english_pob_choice: when you go up
  chosen_spanish: cuando subas
  alternatives_spanish:
  - cuando asciendas
  - al subir
  lexicon: HALOT
  rationale: En lenguaje de peregrinación, עלה suele significar ir hacia el santuario. «Cuando subas» conserva la imagen y su fluidez en español.
- source_word: לֵרָאוֹת אֶת־פְּנֵי
  english_pob_choice: to appear before
  chosen_spanish: para ver el rostro
  alternatives_spanish:
  - para presentarte ante
  - para ver la faz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ver el rostro de». La POB inglesa explica el sentido cultual con una nota; en español se conserva la imagen bíblica, dejando la aclaración en nota para no perder la tensión entre literalidad e idiomática de adoración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragramatón se vierte como «Yahvé» en el texto principal. Es la forma española estable y reconocible para el nombre divino revelado en el texto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - tu Dios covenantal
  lexicon: HALOT
  rationale: La traducción es directa y conserva la relación de pacto implícita sin sobreexplicarla en el cuerpo del texto.
- source_word: שָׁלֹשׁ פְּעָמִים בַּשָּׁנָה
  english_pob_choice: three times in the year
  chosen_spanish: tres veces en el año
  alternatives_spanish:
  - tres veces al año
  lexicon: HALOT
  rationale: «En el año» reproduce con más cercanía la preposición y el artículo hebreos, como en la POB inglesa. Sigue siendo natural en español litúrgico.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragramatón y la POB en inglés lo explicita como «Yahweh». En español, «Yahvé» es la forma tradicional y natural para mantener el nombre personal de Dios, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish rendering Yahvé'
- issue: Carácter representativo de אִישׁ
  english_pob_reading: no man
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - ningún hombre
  - ninguna persona
  rationale: La POB inglesa nota que el sustantivo masculino singular funciona representativamente. En español, «nadie» comunica el alcance general con claridad; no pretende borrar el dato hebreo, sino evitar una formulación menos natural en el flujo del versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Idiomática de adoración לֵרָאוֹת אֶת־פְּנֵי יְהוָה
  english_pob_reading: to appear before Yahweh
  chosen_spanish_reading: para ver el rostro de Yahvé
  alternative_spanish_readings:
  - para aparecer ante Yahvé
  - para presentarte ante Yahvé
  rationale: Se conserva la imagen literal del hebreo porque el testimonio auditado de la POB en inglés señala expresamente la tensión idiomática y la explica en nota. En español, esto permite mantener la base textual y a la vez dejar abierta la lectura cultual.
  doctrine_reference: Lexical note from English POB footnote a
- issue: Semántica territorial de גְּבוּל
  english_pob_reading: border
  chosen_spanish_reading: límite
  alternative_spanish_readings:
  - frontera
  - territorio
  rationale: «Límite» mantiene la imagen espacial concreta del hebreo y funciona bien junto a «ensancharé». La decisión evita sustituir el término por uno más abstracto que podría diluir el matiz territorial.
  doctrine_reference: 'HALOT: גבול'
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «the LORD» por «Yahweh» para reflejar explícitamente el nombre divino del texto fuente. Esta propuesta sigue esa revisión y, además, adapta al español la misma decisión teológica con «Yahvé». Se mantiene la estructura del versículo y la tensión entre literalidad e idiomatismo en la expresión de peregrinación, con nota explicativa.
  spanish_consistency_notes:
  - He mantenido «Yahvé» en el texto principal para la coherencia con la política del proyecto sobre el Tetragramatón.
  - He preferido «tierra»/«límite»/«ensancharé» por su campo semántico territorial, en continuidad con el hebreo y con el audit trail inglés.
  - La nota sobre «ver el rostro» preserva la forma literal sin perder el sentido cultual de «aparecer delante».
  - No se ha neutralizado innecesariamente el masculino representativo del hebreo en las notas; el cuerpo del texto usa una solución española natural para el alcance general.
