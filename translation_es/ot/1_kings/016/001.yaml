translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino a Jehú hijo de Hananí contra Baasa[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acerca de Baasa». La preposición hebrea puede ser más amplia, pero aquí introduce un oráculo de juicio, por eso se prefiere «contra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y sucedió que ... vino
  - Y aconteció que ... vino
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva introduce un nuevo desarrollo; en español, «Entonces» marca la secuencia con naturalidad y sin arcaísmo. «Vino» reproduce el movimiento de llegada de la palabra divina a su destinatario, como en la fórmula profética.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» conserva la fórmula profética clásica y su peso revelatorio. Se mantiene «Yahvé» por la política del proyecto para יהוה, sin sustituir el nombre por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el criterio del proyecto. Es la forma usada en el texto principal en español para preservar el nombre divino propio.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: En la fórmula de revelación, אֶל introduce al destinatario; «a» es la equivalencia natural en español.
- source_word: יֵהוּא בֶן חֲנָנִי
  english_pob_choice: Jehu son of Hanani
  chosen_spanish: Jehú hijo de Hananí
  alternatives_spanish:
  - Jehú, hijo de Hananí
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estándar al español. Se evita la coma en el cuerpo principal porque el hebreo presenta la filiación de modo simple y directo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: En este contexto profético de juicio, עַל tiene fuerza de denuncia dirigida a Baasa; «contra» preserva esa carga judicial mejor que una traducción meramente informativa.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasa
  alternatives_spanish:
  - Baasa
  lexicon: HALOT
  rationale: Se adapta el nombre al español bíblico con grafía sencilla y reconocible. La forma sin aspiración ni duplicación refleja la transliteración habitual al castellano.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'para decir:'
  lexicon: HALOT
  rationale: «Diciendo» introduce la cita profética siguiente con la fórmula habitual en español. Los dos puntos señalan que el contenido directo continúa en el versículo siguiente.
theological_decisions:
- issue: Rendering of יהוה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre divino propio en vez de reemplazarlo por un título. Esto sigue la línea auditada del proyecto y evita ocultar el Tetragrámaton en una fórmula profética donde el nombre es teológicamente relevante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of עַל in a prophetic oracle
  english_pob_reading: against Baasha
  chosen_spanish_reading: contra Baasa
  alternative_spanish_readings:
  - acerca de Baasa
  - sobre Baasa
  rationale: La preposición no es solo temática; en un anuncio profético de juicio dirige la palabra en contra del rey. «Contra» conserva esa tensión judicial sin ampliar indebidamente el contenido.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el historial más reciente; el pasaje presenta alto acuerdo entre controles y la lectura auditada se mantiene estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - 'Los nombres propios bíblicos se mantienen transliterados y con acentuación española cuando corresponde: Jehú, Hananí, Baasa.'
  - Se conserva la fórmula profética breve con puntuación que anticipa la cita del versículo siguiente.
