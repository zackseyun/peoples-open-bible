base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/006.yaml
  text: No[a], but about this time tomorrow I will send my servants to you, and they will search your house and the houses of your servants; and whatever is desirable in your eyes[b], they will put into their hands and take away.
  footnotes:
