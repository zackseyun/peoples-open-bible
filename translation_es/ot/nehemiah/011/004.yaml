  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni términos doctrinales sensibles. El uso de «hijos de» concuerda con la decisión POB de preservar el idioma genealógico, y «vivían»/«habitaban» refleja adecuadamente יָשְׁבוּ.
