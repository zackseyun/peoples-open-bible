translation:
  text: While these matters were being arranged[a], a hostile rumor was spread against the nation among people of like mind for mistreatment, a pretext being given for their purpose[c][b], as though they were being hindered from their customary laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a hostile report was circulated against the people to like-minded persons for ill-treatment.'
    reason: lexical_alternative
  - marker: b
    text: '''An occasion'' could also be rendered ''a pretext'' or ''an opportunity''; the Greek ἀφορμή can carry any of these nuances in context.'
    reason: lexical_alternative
  - marker: c
    text: '''Their customary laws'' may also be understood as ''their ancestral laws'' or ''their established customs.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκονομουμένων
  chosen: were being arranged
  alternatives:
  - were being administered
  - were being managed
  - were being carried out
  lexicon: LSJ
  rationale: The participle denotes matters being managed or put in order. 'Were being arranged' gives clear modern English while preserving the administrative sense without over-specifying the agent.
- source_word: φήμη δυσμενὴς
  chosen: a hostile rumor
  alternatives:
  - an unfavorable report
  - an ill rumor
  - a malicious report
  lexicon: LSJ
  rationale: φήμη can mean report or rumor; in context of agitation against a people-group, 'rumor' better captures the socially circulating, inflammatory character. δυσμενής adds hostility or ill will.
- source_word: ἐξέκειτο
  chosen: was spread
  alternatives:
  - was laid out
  - was circulated
  - was published
  lexicon: LSJ
  rationale: The verb literally suggests being set forth or exposed. In context with φήμη, idiomatic English is that the rumor 'was spread' or 'circulated.' 'Was spread' is concise and natural.
- source_word: κατὰ τοῦ γένους
  chosen: against the nation
  alternatives:
  - against the race
  - against the people
  - against the stock
  lexicon: LSJ
  rationale: γένος here refers to the Jewish people as an ethnic/national group. 'Nation' communicates collective identity without the misleading modern biological overtones of 'race.'
- source_word: ἀνθρώποις συμφρονοῦσιν
  chosen: among people of like mind
  alternatives:
  - to like-minded people
  - among sympathetic people
  - among those sharing the same attitude
  lexicon: LSJ
  rationale: The dative with συμφρονοῦσιν indicates people sharing the same outlook or sympathies. 'Among people of like mind' preserves the social alignment implied by the Greek.
- source_word: εἰς κακοποίησιν
  chosen: for mistreatment
  alternatives:
  - for harming them
  - for abuse
  - for ill-treatment
  lexicon: LSJ
  rationale: The phrase expresses purpose or result toward doing harm. 'Mistreatment' is broad enough to cover hostile action without narrowing it to physical violence alone.
- source_word: ἀφόρμης
  chosen: an occasion
  alternatives:
  - a pretext
  - an opportunity
  - a starting point
  lexicon: LSJ
  rationale: ἀφορμή can mean base of operations, occasion, or pretext. Here the sense is that a basis/opportunity was being furnished for hostile intent. 'Occasion' keeps the wording somewhat open; the more interpretive 'pretext' is preserved as an alternative.
- source_word: διάθεσιν
  chosen: their disposition
  alternatives:
  - their intent
  - their purpose
  - their attitude
  lexicon: LSJ
  rationale: διάθεσις denotes disposition or settled attitude. Because the syntax is compressed, 'their disposition' stays close to the Greek while allowing the hostile orientation to be inferred from context.
- source_word: νομίμων
  chosen: their customary laws
  alternatives:
  - their ancestral laws
  - their lawful customs
  - their ordinances
  lexicon: LSJ
  rationale: τὰ νόμιμα commonly refers to customary or established laws/observances. 'Customary laws' preserves both legal and traditional force; 'ancestral laws' is possible but adds a nuance not explicit in the word itself.
- source_word: κωλύωνται
  chosen: were being hindered
  alternatives:
  - were being prevented
  - were being obstructed
  lexicon: LSJ
  rationale: The passive/subjunctive sense after ὡς ἂν conveys alleged hindrance. 'Were being hindered' is a natural rendering that preserves the claim without overstating total prohibition.
