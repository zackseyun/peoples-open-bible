translation:
  language: es
  text: 'Entonces Eliseo llegó a Damasco. Ben-adad, rey de Aram, estaba enfermo[a], y se le informó, diciendo: «Ha llegado el hombre de Dios hasta aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rey de Siria». El hebreo dice «Aram».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... llegó
  alternatives_spanish:
  - Y ... llegó
  - Así que ... llegó
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» da una progresión natural en español sin perder el valor narrativo de secuencia, y «llegó» expresa bien בוא en este contexto de llegada a una ciudad.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliseo
  lexicon: Nombre propio bíblico
  rationale: El nombre hebreo אֱלִישָׁע corresponde en español bíblico a «Eliseo», no a «Elías»; se conserva la identificación propia del profeta en el texto fuente.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damasco
  lexicon: Topónimo bíblico
  rationale: «Damasco» es la forma usual y clara en español para el topónimo hebreo, con equivalente estable en la tradición bíblica.
- source_word: וּבֶן הֲדַד
  english_pob_choice: Now Ben-hadad
  chosen_spanish: Y Ben-adad
  alternatives_spanish:
  - Ahora Ben-adad
  - Entonces Ben-adad
  lexicon: HALOT
  rationale: El waw introduce aquí un trasfondo circunstancial; en español puede mantenerse con una simple conjunción sin forzar un marcador discursivo más interpretativo. Se conserva el nombre compuesto con la forma habitual «Ben-adad».
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se preserva el término histórico-geográfico «Aram», siguiendo la prioridad del hebreo frente al equivalente interpretativo tradicional «Siria».
- source_word: חֹלֶה
  english_pob_choice: was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba mal
  - yacía enfermo
  lexicon: HALOT
  rationale: El participio predicativo describe el estado de Ben-adad; «estaba enfermo» es natural y preciso en español.
- source_word: וַיֻּגַּד לוֹ
  english_pob_choice: it was told him
  chosen_spanish: le informaron
  alternatives_spanish:
  - se le dijo
  - le fue dicho
  lexicon: HALOT
  rationale: El hebreo usa una pasiva impersonal; «le informaron» conserva la transmisión de la noticia en español fluido. Se evita una pasiva forzada que suene poco natural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - así
  lexicon: HALOT
  rationale: Se mantiene la fórmula de reporte, útil para reflejar la estructura narrativa del hebreo.
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - vino
  - está aquí
  lexicon: HALOT
  rationale: El perfecto en discurso reportado comunica que la llegada ya ocurrió y que la persona está presente; «ha llegado» refleja bien ese matiz resultativo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, que en este relato funciona como título reconocible para Eliseo.
- source_word: עַד הֵנָּה
  english_pob_choice: here
  chosen_spanish: hasta aquí
  alternatives_spanish:
  - aquí
  - hasta acá
  lexicon: HALOT
  rationale: El idiomático עַד הֵנָּה expresa llegada hasta el lugar del hablante; «hasta aquí» preserva el valor direccional con naturalidad en español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto principal junto a «enfermo», y la nota explica la alternativa léxica documentada en el POB inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Aram» en el texto principal por fidelidad al hebreo, con nota opcional para la equivalencia tradicional «Siria».
  - Se evitó una calca rígida de la pasiva hebrea, pero sin perder la impersonalidad narrativa del informe.
  - La fórmula de cita final conserva el tono formal y directo del original.
  - Se corrigió el nombre propio a «Eliseo», conforme al hebreo אֱלִישָׁע y al uso bíblico estándar en español.
