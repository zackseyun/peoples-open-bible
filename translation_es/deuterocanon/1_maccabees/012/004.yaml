translation:
  language: es
  text: Y les dieron cartas para la gente de cada lugar[a], para que los encaminaran[b] hasta la tierra de Judá en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por cada lugar»; la frase señala cartas dirigidas a personas o autoridades locales a lo largo de la ruta.
    reason: lexical_alternative
  - marker: b
    text: O «los acompañaran»; el verbo griego puede incluir la idea de ir con los viajeros y ayudarlos en el camino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν
  english_pob_choice: they gave
  chosen_spanish: les dieron
  alternatives_spanish:
  - les entregaron
  - les proporcionaron
  lexicon: LSJ
  rationale: δίδωμι en aoristo narrativo se vierte de manera directa con «dar». En español, «les dieron» mantiene la sencillez y el flujo histórico del pasaje.
- source_word: ἐπιστολὰς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - documentos
  lexicon: LSJ
  rationale: ἐπιστολή designa una comunicación escrita. «Cartas» es natural en español y conserva el sentido epistolar sin cargarlo con un matiz técnico innecesario.
- source_word: κατὰ τόπον
  english_pob_choice: to the people in each place
  chosen_spanish: para la gente en cada lugar
  alternatives_spanish:
  - para la gente de cada lugar
  - por cada lugar
  - a la gente en cada localidad
  lexicon: LSJ
  rationale: La expresión indica distribución local, «por lugar» o «en cada lugar». En español, «para la gente en cada lugar» refleja ese sentido distributivo con claridad, siguiendo la corrección del audit trail que precisó el valor de κατὰ τόπον.
- source_word: ὅπως προπέμπωσιν
  english_pob_choice: so that they might send them on
  chosen_spanish: para que los despidieran
  alternatives_spanish:
  - para que los acompañaran
  - para que los enviaran adelante
  - para que los escoltaran
  lexicon: LSJ
  rationale: προπέμπω puede significar despedir/saludar al partir, acompañar o enviar adelante. «Despidieran» en español puede incluir la idea de acompañar a alguien en su salida sin forzar un solo matiz, y aquí se complementa con el contexto de viaje para preservar la finalidad.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la tierra de Judea
  - el territorio de Judá
  lexicon: LSJ
  rationale: La traducción más pegada al griego es «la tierra de Judá». Se mantiene la forma geográfica/etnónica del original, en lugar de sustituirla por «Judea», que sería menos literal aquí.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: con paz
  alternatives_spanish:
  - en paz
  - pacíficamente
  - seguramente
  lexicon: LSJ
  rationale: La preposición μετὰ con εἰρήνης expresa literalmente «con paz». En español, «con paz» conserva la relación verbal de la frase y deja abierta la implicación de viaje seguro e ininterrumpido.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en el sentido general; la revisión inglesa aclaró que κατὰ τόπον es distributivo («en cada lugar») y que προπέμπω tiene posible matiz de acompañar/poner en camino. La versión española refleja esa aclaración sin perder la brevedad narrativa.
  spanish_consistency_notes:
  - Se conserva «Judá» en lugar de «Judea» para seguir la literalidad del sintagma γῆν Ἰούδα.
  - «Con paz» mantiene la construcción preposicional de μετʼ εἰρήνης y evita una paráfrasis excesiva.
  - No se introduce terminología eclesiástica ajena al pasaje; el registro es narrativo y sobrio.
