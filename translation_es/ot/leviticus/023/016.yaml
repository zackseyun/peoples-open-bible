translation:
  language: es
  text: Contarán cincuenta días[a], hasta el día después del séptimo sábado; entonces presentarán una ofrenda nueva de grano a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el día después de la séptima semana». El hebreo dice «el día después del séptimo sábado», y los intérpretes difieren sobre cómo se expresa en términos calendáricos el conteo de la fiesta.
    reason: alternative_reading
lexical_decisions:
- source_word: עַד
  english_pob_choice: up to
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - hasta el día de
  lexicon: HALOT
  rationale: La idea es de extensión temporal del conteo. «Hasta» reproduce bien el alcance sin sobreinterpretar el límite.
- source_word: מִמָּחֳרַת
  english_pob_choice: the day after
  chosen_spanish: el día después
  alternatives_spanish:
  - al día siguiente
  - la mañana después
  lexicon: HALOT
  rationale: «El día después» es claro y natural en español moderno, y conserva el sentido de fecha posterior inmediata.
- source_word: הַשַּׁבָּת הַשְּׁבִיעִת
  english_pob_choice: the seventh Sabbath
  chosen_spanish: el séptimo sábado
  alternatives_spanish:
  - la séptima semana
  - el séptimo día de reposo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el sábado/sabbath, el séptimo». Se conserva «sábado» para no resolver de antemano la cuestión calendárica que el texto deja formulada de modo explícito.
- source_word: תִּסְפְּרוּ
  english_pob_choice: you shall count
  chosen_spanish: contarán
  alternatives_spanish:
  - deberán contar
  - ustedes contarán
  lexicon: HALOT
  rationale: La forma legal exhortativa se expresa con futuro en español bíblico y sobrio. «Contarán» mantiene la instrucción dirigida al grupo.
- source_word: חֲמִשִּׁים יוֹם
  english_pob_choice: fifty days
  chosen_spanish: cincuenta días
  alternatives_spanish:
  - 50 días
  lexicon: HALOT
  rationale: Coincide de manera directa con el número y el sustantivo singular colectivo; «cincuenta días» es la forma natural en español.
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: then you shall present
  chosen_spanish: entonces presentarán
  alternatives_spanish:
  - y ofrecerán
  - y acercarán
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo implica traer/presentar una ofrenda. «Entonces» explicita la secuencia implícita del mandato.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: Se elige una equivalencia que conserve el campo sacrificial sin sonar excesivamente técnica. «Vegetal» intenta reflejar la ofrenda derivada de la cosecha/producción del campo; «de cereal» o «de grano» también son posibles, pero «vegetal» mantiene una lectura cultual amplia en español.
- source_word: חֲדָשָׁה
  english_pob_choice: new
  chosen_spanish: nueva
  alternatives_spanish:
  - recién hecha
  - fresca
  lexicon: HALOT
  rationale: Adjetivo directo y transparente; califica la ofrenda como nueva, probablemente vinculada al producto nuevo de la cosecha.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: El nombre divino se conserva como «Yahvé» según la norma del proyecto. En la ofrenda, el dativo preposicional se expresa naturalmente con «a».
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de no enmascarar el nombre divino y de verterlo como «Yahvé». Esto preserva el nombre de pacto del texto hebreo y evita la sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: «הַשַּׁבָּת הַשְּׁבִיעִת» en un contexto festivo de conteo
  english_pob_reading: the seventh Sabbath
  chosen_spanish_reading: el séptimo sábado
  alternative_spanish_readings:
  - la séptima semana
  - el séptimo día de reposo
  rationale: Se conserva la terminología de «sábado» para reflejar la formulación hebrea y no resolver interpretativamente una armonización calendárica que el texto no explicita. La ambigüedad queda visible, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés revisado, manteniendo la ambigüedad calendárica de «el séptimo sábado» y la referencia explícita al nombre divino. No se registraron revisiones aplicadas en el texto fuente inglés, y el veredicto de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el Tetragrámaton.
  - Se evitó «Señor» como sustituto, conforme a la política del proyecto.
  - «Ofrenda vegetal» se usó como equivalente funcional de מִנְחָה; si el equipo editorial prefiere mayor tecnicismo, puede revisarse a «ofrenda de grano», pero aquí se priorizó una formulación publicable y clara.
