translation:
  language: es
  text: 'He oído lo que han dicho los profetas,[a] los que profetizan mentiras en mi nombre, diciendo: «¡He soñado! ¡He soñado!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que profetizan falsamente en mi nombre». El hebreo permite tanto la idea de contenido mentiroso como la de profecía ejercida de manera falsa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - Oí
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción cumplida con relevancia presente; en español, el perfecto compuesto («he oído») conserva mejor ese matiz que el pretérito simple.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: HALOT
  rationale: La construcción funciona idiomáticamente como objeto directo relativo; «lo que» da un español natural sin perder la relación con la oración subordinada.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas ellos
  - los videntes
  lexicon: HALOT
  rationale: נביאים se traduce de forma directa por «profetas», preservando el referente tradicional y el artículo definido.
- source_word: הַנִּבְּאִים
  english_pob_choice: those who prophesy
  chosen_spanish: los que profetizan
  alternatives_spanish:
  - los que están profetizando
  - profetizando
  lexicon: HALOT
  rationale: El participio niphal usado sustantivamente se vierte con relativa para mostrar que se trata de personas caracterizadas por esa acción, manteniendo la conexión apposicional con «los profetas».
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - por mi nombre
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico de autoridad y representación divina con la expresión española establecida «en mi nombre».
- source_word: שֶׁקֶר
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedad
  - falsamente
  lexicon: HALOT
  rationale: En este contexto acusa el contenido de su mensaje; «mentiras» reproduce la fuerza concreta de שקר, más directa que «falsedad».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: El infinitivo de cita se expresa naturalmente con «diciendo», introduciendo la cita siguiente sin añadir contenido ajeno.
- source_word: חָלַמְתִּי חָלָמְתִּי
  english_pob_choice: I have dreamed! I have dreamed!
  chosen_spanish: ¡He soñado! ¡He soñado!
  alternatives_spanish:
  - ¡Soñé! ¡Soñé!
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del hebreo y el valor de experiencia declarada; el perfecto compuesto español mantiene mejor la vivacidad de la proclamación.
theological_decisions:
- issue: Naturaleza de la acusación contra los profetas
  english_pob_reading: those who prophesy lies in my name
  chosen_spanish_reading: los que profetizan mentiras en mi nombre
  alternative_spanish_readings:
  - los que profetizan falsamente en mi nombre
  rationale: Se conserva la dureza concreta de שקר como sustantivo («mentiras») y a la vez se deja claro que hablan invocando la autoridad de Yahvé. No se atenúa la acusación a una mera imprecisión estilística.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La propuesta sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés, conservando la repetición enfática final y la ambigüedad útil de שקר sin suavizarla. No se requirieron revisiones posteriores según el control de versión más reciente.
  spanish_consistency_notes:
  - Se mantiene «profetizan» para evitar oscilar entre participio y sustantivo, siguiendo el paralelismo del hebreo.
  - Se usa «en mi nombre» como fórmula estable para בִּשְׁמִי, coherente con el uso bíblico de autorización divina.
  - Se preserva la repetición exclamativa final con la misma estructura en ambas cláusulas.
  - Se opta por «He oído» y «He soñado» para reflejar el perfecto hebreo con relevancia presente.
