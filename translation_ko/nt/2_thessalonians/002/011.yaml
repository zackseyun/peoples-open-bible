id: 2TH.2.11
reference: 2 Thessalonians 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ διὰ τοῦτο ⸀πέμπει αὐτοῖς ὁ θεὸς ἐνέργειαν πλάνης εἰς τὸ πιστεῦσαι αὐτοὺς τῷ ψεύδει,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/011.yaml
  text: And because of this[a], God sends them a working of delusion so that they may believe the lie,
translation:
  language: ko
  text: 이런 까닭으로 하나님께서 그들에게 미혹의 활동[a]을 보내시어 그들로 거짓을 믿게 하십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「미혹케 하는 영향」, 「속이는 작용」, 전통적으로 「강한 미혹」. 두 명사(ἐνέργεια + πλάνη)의 속격 구조를 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_korean: 이런 까닭으로
  alternatives_korean:
  - 이로 인하여
  - 그러므로
  lexicon: BDAG
  rationale: 앞 절의 진리 거부를 받는 인과 표현을 자연스럽게 옮긴다.
- source_word: πέμπει
  english_pob_choice: sends
  chosen_korean: 보내시어
  alternatives_korean:
  - 보내시고
  - 파송하시어
  lexicon: BDAG
  rationale: 현재 직설법의 능동적 신적 행위를 약화시키지 않고 「보내시어」로 옮긴다.
- source_word: ἐνέργειαν
  english_pob_choice: a working
  chosen_korean: 활동
  alternatives_korean:
  - 작용
  - 역사
  - 능력 있는 작용
  lexicon: BDAG
  rationale: ἐνέργεια의 능동적 작동을 「활동」으로 자연스럽게 표현한다. 9절의 사탄의 ἐνέργεια와 어휘적 평행을 유지한다.
- source_word: πλάνης
  english_pob_choice: of delusion
  chosen_korean: 미혹의
  alternatives_korean:
  - 속임의
  - 오류의
  lexicon: BDAG
  rationale: πλάνη는 한국 성경 전통의 「미혹」이 가장 자연스럽다. 결과 상태(거짓을 믿게 됨)를 잘 담는다.
- source_word: ἐνέργειαν πλάνης
  english_pob_choice: a working of delusion
  chosen_korean: 미혹의 활동
  alternatives_korean:
  - 미혹케 하는 영향
  - 속이는 작용
  - 강한 미혹
  lexicon: BDAG
  rationale: 두 명사의 속격 구조를 그대로 보존하여 해석적 합성으로 무너뜨리지 않는다.
- source_word: εἰς τὸ πιστεῦσαι
  english_pob_choice: so that they may believe
  chosen_korean: 그들로 ~ 믿게 하십니다
  alternatives_korean:
  - 그들이 ~ 믿도록
  - 그들로 하여금 ~ 믿게
  lexicon: BDAG
  rationale: εἰς + 부정사 관사구의 목적/결과를 「그들로 ~ 믿게 하시다」 사역적 구조로 자연스럽게 옮긴다.
- source_word: τῷ ψεύδει
  english_pob_choice: the lie
  chosen_korean: 거짓을
  alternatives_korean:
  - 그 거짓을
  - 허위를
  lexicon: BDAG
  rationale: 정관사 + 단수는 정황의 특정한 거짓(불법의 자와 관련된)을 가리킨다.
theological_decisions:
- issue: 사법적 강퍅의 신적 작인
  chosen_reading: 하나님께서 그들에게 미혹의 활동을 보내신다(능동적 신적 주체로 보존)
  alternative_readings:
  - 하나님께서 그들에게 미혹이 임하도록 허용하신다
  - 하나님께서 그들을 미혹에 내어주신다
  rationale: 헬라어 본문은 하나님을 πέμπει(보내신다)의 명시적 주체로 둔다. 본 번역은 이를 「허용」으로 약화시키지 않고, 진리 거부에 대한 신적 심판의 신학적 긴장을 보존한다.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension'
