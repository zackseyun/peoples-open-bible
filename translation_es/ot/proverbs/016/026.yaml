  text: נֶ֣פֶשׁ עָ֭מֵל עָ֣מְלָה לּ֑/וֹ כִּֽי אָכַ֖ף עָלָ֣י/ו פִּֽי/הוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/026.yaml
  text: The appetite of a laborer labors for him[c][b][a], for his mouth presses him on.
  footnotes:
  - marker: a
    text: Or 'The soul/desire of the laborer labors for him.' Hebrew nephesh can mean 'soul,' 'life,' or 'appetite'; here the context of 'his mouth' favors 'appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for himself.' The Hebrew says 'for him,' but some understand the sense reflexively.
    reason: alternative_reading
  - marker: c
    text: Or 'his mouth urges him,' 'drives him,' or 'compels him.'
    reason: lexical_alternative
