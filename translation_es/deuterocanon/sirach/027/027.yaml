translation:
  language: es
  text: El que hace el mal[a], volverá rodando sobre él, y ciertamente no sabrá de dónde le vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rodará de vuelta sobre él». El griego conserva una imagen de movimiento para el mal que regresa al que lo hizo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιῶν
  english_pob_choice: Whoever does
  chosen_spanish: El que hace
  alternatives_spanish:
  - Quien hace
  - El que comete
  lexicon: BDAG
  rationale: El participio articular griego tiene valor genérico y proverbial. «El que hace» conserva ese carácter general con español natural y digno.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - cosas malas
  - maldad
  - lo malo
  lexicon: BDAG
  rationale: El plural neutro funciona sustantivamente; en español «el mal» preserva la carga moral sin forzar «cosas malas», que suena menos proverbial.
- source_word: εἰς αὐτὸν
  english_pob_choice: on him / back on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  - encima de él
  - de vuelta sobre él
  lexicon: BDAG
  rationale: La imagen de retorno se entiende en español con «sobre él»; evita una paráfrasis excesiva y mantiene la dirección adversa del golpe que recae sobre el autor.
- source_word: κυλισθήσεται
  english_pob_choice: it will roll back
  chosen_spanish: se volverá
  alternatives_spanish:
  - rodará de vuelta
  - volverá rodando
  - recaerá
  lexicon: BDAG/LSJ
  rationale: El verbo conserva la imagen de retorno, pero en español una forma pasiva literal resultaría dura. «Se volverá» es la opción más natural para comunicar el rebote moral sin borrar el movimiento de retorno sugerido por el griego.
- source_word: καὶ οὐ μὴ ἐπιγνῷ
  english_pob_choice: and he will certainly not know
  chosen_spanish: y ciertamente no sabrá
  alternatives_spanish:
  - y de ningún modo reconocerá
  - y no llegará a saber
  lexicon: BDAG
  rationale: La negación enfática οὐ μή pide una expresión fuerte. «Ciertamente no sabrá» reproduce bien esa fuerza en español actual.
- source_word: πόθεν
  english_pob_choice: where it came from
  chosen_spanish: de dónde
  alternatives_spanish:
  - de dónde provino
  - de qué lugar
  lexicon: BDAG
  rationale: Interrogativo de origen. «De dónde» es la forma más clara y directa en español.
- source_word: ἧκε
  english_pob_choice: it came
  chosen_spanish: le vino
  alternatives_spanish:
  - vino
  - le llegó
  - le sobrevino
  lexicon: LSJ
  rationale: En contexto de retribución, «le vino» comunica la llegada del mal al sujeto con naturalidad; mantiene el sentido de procedencia sin exagerar el matiz de arribo físico.
theological_decisions:
- issue: Imagen proverbial de retribución moral
  english_pob_reading: Preserve the metaphor of evil rolling back onto the perpetrator rather than flattening it to a generic statement of consequences.
  chosen_spanish_reading: Conservar el sentido proverbial de que el mal vuelve sobre quien lo hace, sin convertirlo en una mera frase abstracta sobre consecuencias.
  alternative_spanish_readings:
  - El que hace el mal, le vendrán consecuencias
  - El mal que hace volverá sobre él
  rationale: El griego presenta una imagen fuerte de retorno y ocultamiento del origen. La traducción española debe dejar visible ese carácter proverbial de retribución moral.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning and imagery unless context plainly demands otherwise.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] directamente en el texto mediante la marca colocada junto a «el mal». La redacción mantiene la imagen de retribución del griego y evita una mecanicidad innecesaria en español.
  spanish_consistency_notes:
  - Se usa «mal» para πονηρὰ por su fuerza moral y su naturalidad proverbial en español.
  - Se evita «Señor»/«Cristo» porque no aplica al pasaje.
  - La cláusula final conserva el valor de ignorar el origen del mal con «de dónde le vino», más natural que un calco rígido.
  - El tono es bíblico pero contemporáneo, adecuado para una edición pública en español.
