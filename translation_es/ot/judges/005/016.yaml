- from: ¿Por qué te sentaste entre los apriscos[a], para oír los silbos de los rebaños? Entre las divisiones de Rubén hubo grandes investigaciones del corazón.
  to: ¿Por qué te sentaste entre los apriscos, para oír los silbos de los rebaños? Porque en las divisiones[a] de Rubén hubo grandes reflexiones del corazón.
