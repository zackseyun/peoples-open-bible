translation:
  language: es
  text: Y todo Israel hizo gran duelo por él[a], y estuvo de luto por él muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo gran lamentación por él». El griego emplea una expresión idiomática con κόπτομαι y κοπετός para el duelo público.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκοψαντο
  english_pob_choice: made mourning
  chosen_spanish: hizo gran duelo
  alternatives_spanish:
  - hizo gran lamentación
  - guardó gran luto
  - hizo gran duelo público
  lexicon: LSJ
  rationale: El griego usa el verbo medio de κόπτω junto con κοπετός en una expresión idiomática de duelo público. «Hizo gran duelo» conserva la idea de lamento ritual/intenso sin imponer un gesto físico específico que el texto no explicita.
- source_word: κοπετὸν μέγαν
  english_pob_choice: great mourning
  chosen_spanish: gran duelo
  alternatives_spanish:
  - gran lamentación
  - gran lamento
  - gran duelo
  lexicon: LSJ
  rationale: κοπετός designa duelo o lamentación, frecuentemente pública e intensa. «Gran duelo» es natural en español y mantiene el énfasis de μέγαν.
- source_word: πᾶς Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: LSJ
  rationale: La expresión colectiva se refiere al pueblo entero. «Todo Israel» es literal, idiomático y adecuado en español bíblico moderno.
- source_word: ἐπένθησαν
  english_pob_choice: they mourned
  chosen_spanish: lo lloraron
  alternatives_spanish:
  - lo lamentaron
  - estuvieron de luto por él
  - lo lloraron en duelo
  lexicon: LSJ
  rationale: πενθέω suele significar llorar o hacer duelo por un muerto. En español, «lo lloraron» comunica con naturalidad el lamento funerario y distingue esta segunda cláusula del idiomático «hizo gran duelo».
- source_word: ἡμέρας πολλὰς
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por muchos días
  - largos días
  lexicon: LSJ
  rationale: El acusativo de duración se expresa naturalmente en español como «muchos días»; el sentido de duración prolongada queda claro sin añadir elementos no presentes en el griego.
translation_notes:
  revision_awareness: El pasaje coincide de cerca con la versión inglesa POB aprobada y con el griego de Swete; la única decisión relevante fue cómo reflejar en español el giro idiomático de duelo público sin sobrerrepresentar un gesto corporal.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el duelo idiomático de la primera cláusula y el verbo de luto de la segunda.
  - «Israel» se dejó sin artículo para conservar el valor colectivo bíblico habitual.
  - La nota al pie se ancló correctamente en «duelo» mediante [a].
