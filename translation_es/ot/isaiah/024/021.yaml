base_translation:
  language: en
  yaml_path: translation/ot/isaiah/024/021.yaml
  text: And on that day Yahweh will punish the host of heaven in heaven[c][b][a], and the kings of the earth on the earth.
  footnotes:
  - marker: a
    text: Or 'will visit'; the Hebrew idiom can mean 'will punish,' 'will call to account,' or more literally 'will visit' in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the host of heaven in heaven.' The Hebrew more literally reads 'the host of the height in the height,' which may refer to heavenly powers or to exalted powers above.
    reason: alternative_reading
  - marker: c
    text: Or 'the kings of the land on the land.' Here 'earth' best fits the cosmic contrast with 'the height.'
    reason: lexical_alternative
