translation:
  language: es
  text: 'En cuanto a mí[a], oí, pero no entendí. Y dije: «Señor mío, ¿cuál será el desenlace de estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿cuál será el fin de estas cosas?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: As for me
  chosen_spanish: En cuanto a mí
  alternatives_spanish:
  - Y yo
  - Yo
  lexicon: HALOT
  rationale: La construcción con pronombre independiente marca énfasis y contraste discursivo. «En cuanto a mí» reproduce bien ese matiz en español sin sonar forzado.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I heard
  chosen_spanish: escuché
  alternatives_spanish:
  - oí
  - oyeron
  lexicon: HALOT
  rationale: El verbo aquí expresa recepción auditiva del mensaje. «Escuché» es natural en español y conserva el sentido de haber percibido las palabras; se mantiene la distinción con «entender» en la cláusula siguiente.
- source_word: וְלֹא אָבִין
  english_pob_choice: but I did not understand
  chosen_spanish: pero no entendí
  alternatives_spanish:
  - y no entendí
  - pero no pude entender
  lexicon: HALOT
  rationale: La conjunción adversativa refleja la tensión entre oír y no comprender. «Entendí» en pretérito encaja con la secuencia narrativa y comunica la falta de comprensión de Daniel.
- source_word: וָאֹמְרָה
  english_pob_choice: So I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Así que dije
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. En español, «Y dije» mantiene la continuidad directa del relato; el matiz consecuencial ya queda implícito por el contexto.
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - mi señor
  - Señor
  lexicon: HALOT
  rationale: El destinatario inmediato es la figura celestial que explica la visión, no el nombre divino. «Señor mío» conserva el trato respetuoso sin introducir una identificación con Yahvé que el contexto no exige.
- source_word: מָה אַחֲרִית אֵלֶּה
  english_pob_choice: what will be the outcome of these things?
  chosen_spanish: ¿cuál será el desenlace de estas cosas?
  alternatives_spanish:
  - ¿cuál será el fin de estas cosas?
  - ¿qué será el final de estas cosas?
  lexicon: HALOT
  rationale: אַחֲרִית puede significar «fin», «último resultado» o «desenlace». «Desenlace» comunica bien la pregunta apocalíptica sobre la consumación de lo revelado y evita una rigidez excesivamente literal en español.
theological_decisions:
- issue: Valor de אֲדֹנִי como título de cortesía o referencia divina
  english_pob_reading: A respectful address to the heavenly messenger/interpreter, rendered 'My lord' without capitalization.
  chosen_spanish_reading: Un tratamiento respetuoso dirigido al mensajero/interprete celestial, rendido como «Señor mío».
  alternative_spanish_readings:
  - «Señor»
  - «mi señor»
  rationale: El contexto inmediato muestra a Daniel hablando con la figura que le comunica la interpretación. La traducción evita capitalizar o convertir el título en una referencia directa a Yahvé, preservando la tensión del texto.
  doctrine_reference: Prioridad del contexto inmediato y del hebreo original sobre una identificación automática con el lenguaje litúrgico tradicional.
translation_notes:
  revision_awareness: 'El texto en inglés de la POB quedó sin cambios en la última revisión: el revisor marcó acuerdo alto y no propuso enmiendas. La versión española sigue esa lectura estable, manteniendo la distinción entre oír y entender y la referencia respetuosa de אֲדֹנִי.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas para no confundir el título de cortesía con el nombre divino.
  - «Escuché» y «entendí» conservan la oposición semántica del hebreo entre percepción auditiva y comprensión.
  - «Desenlace» traduce el valor de אַחֲרִית con una opción natural en español moderno, mientras la nota mantiene la alternativa «fin».
