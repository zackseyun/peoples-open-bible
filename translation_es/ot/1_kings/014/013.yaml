revisions:
- from: Todo Israel hará duelo por él y lo enterrará[a], porque él solo, de la casa de Jeroboam, irá al sepulcro; pues en él se ha hallado algo bueno[b][c] delante de Yahvé, el Dios de Israel, en la casa de Jeroboam.
  to: Todo Israel hará duelo por él y lo enterrará[a], porque él solo, de la casa de Jeroboam, irá al sepulcro; pues en él se ha hallado algo bueno[b][c] hacia Yahvé, el Dios de Israel, en la casa de Jeroboam.
  rationale: Se revisa únicamente la expresión «delante de Yahvé» a «hacia Yahvé» para alinear el español con el valor relacional de אֶל, con la traducción auditada en inglés y con la nota léxica ya documentada. El resto del borrador es fiel, claro y terminológicamente consistente con el proyecto.
