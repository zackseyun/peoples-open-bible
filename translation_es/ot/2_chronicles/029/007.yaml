translation:
  language: es
  text: También cerraron las puertas del vestíbulo[a], apagaron las lámparas, no quemaron incienso[b] ni ofrecieron holocaustos en el santuario al Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las puertas del pórtico» o «de la sala de entrada»; el hebreo אוּלָם se refiere al vestíbulo de entrada del templo.
    reason: lexical_alternative
  - marker: b
    text: O «en el lugar santo»; el término hebreo puede denotar el área sagrada del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Añade esta acción al catálogo previo de negligencias. «También» reproduce la fuerza acumulativa de גַּם con español natural.
- source_word: סָגְרוּ
  english_pob_choice: shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - clausuraron
  - cerraron con llave
  lexicon: HALOT
  rationale: El verbo hebreo indica cerrar o echar. En español, «cerraron» es directo y adecuado; no se especifica llave, porque el texto no la menciona.
- source_word: דַּלְתוֹת הָאוּלָם
  english_pob_choice: the doors of the vestibule
  chosen_spanish: las puertas del vestíbulo
  alternatives_spanish:
  - las puertas del pórtico
  - las puertas del atrio de entrada
  lexicon: HALOT
  rationale: «Vestíbulo» conserva el valor arquitectónico de אוּלָם como espacio de entrada del templo. «Pórtico» sería posible, pero puede sonar más tradicional que preciso.
- source_word: וַיְכַבּוּ אֶת הַנֵּרוֹת
  english_pob_choice: put out the lamps
  chosen_spanish: apagaron las lámparas
  alternatives_spanish:
  - extinguieron las lámparas
  - apagaron las luces
  lexicon: HALOT
  rationale: La acción cultual es apagar lámparas reales del templo. «Apagaron las lámparas» es natural y mantiene la imagen concreta mejor que «luces».
- source_word: וּקְטֹרֶת לֹא הִקְטִירוּ
  english_pob_choice: did not burn incense
  chosen_spanish: no quemaron incienso
  alternatives_spanish:
  - no ofrecieron incienso
  - no hicieron humear incienso
  lexicon: HALOT
  rationale: El verbo hifil con קְטֹרֶת describe la quema ritual del incienso. «Quemaron incienso» es idiomático en español y conserva el sentido ceremonial.
- source_word: וְעֹלָה לֹא הֶעֱלוּ
  english_pob_choice: did not offer up burnt offerings
  chosen_spanish: ni ofrecieron holocausto
  alternatives_spanish:
  - ni ofrecieron burnt offerings
  - ni elevaron holocausto
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio completamente quemado; en español bíblico y eclesial, «holocausto» comunica mejor ese valor técnico que una paráfrasis general. Se conserva el enlace con el verbo ofrendar mediante «ofrecieron».
- source_word: בַקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo santo
  lexicon: HALOT
  rationale: «Santuario» es la mejor equivalencia cultual en español para el espacio sagrado del templo. Mantiene la lectura concreta del culto, sin diluirla en una abstracción.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: to the God of Israel
  chosen_spanish: para el Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  - para el Dios de Israel
  lexicon: HALOT
  rationale: El lamed puede expresar orientación/dedicación del culto. «Para el Dios de Israel» conserva esa finalidad cultual en un español fluido.
theological_decisions:
- issue: Terminología sacrificial y de templo
  english_pob_reading: Retain concrete sacrificial and sanctuary language ('burn incense,' 'burnt offerings,' 'sanctuary')
  chosen_spanish_reading: Mantener lenguaje concreto del templo y del sacrificio («incienso», «holocausto», «santuario»)
  alternative_spanish_readings:
  - generalizar a «no adoraron» o «no hicieron ofrendas»
  - usar solo lenguaje devocional no técnico
  rationale: El versículo enumera fallas específicas del servicio levítico en el templo. Conservar los términos técnicos evita borrar la acusación histórica y ritual del texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Elección de «holocausto» para עֹלָה
  english_pob_reading: did not offer up burnt offerings
  chosen_spanish_reading: ni ofrecieron holocausto
  alternative_spanish_readings:
  - ni ofrecieron sacrificio quemado
  - ni ofrecieron ofrenda quemada
  rationale: Aunque «holocausto» tiene usos modernos sensibles a otra carga semántica, sigue siendo el término técnico más asentado para עֹלָה en contextos bíblicos y preserva el carácter sacrificial completo del ofrecimiento.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Referencia al lugar sagrado
  english_pob_reading: in the sanctuary
  chosen_spanish_reading: en el santuario
  alternative_spanish_readings:
  - en el lugar santo
  - en la zona santa
  rationale: El hebreo בַּקֹּדֶשׁ puede abarcar el ámbito sagrado del templo; «santuario» funciona bien en español y no introduce una restricción espacial innecesaria.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: Alineado con la revisión más reciente, sin cambios necesarios frente al tramo auditado en inglés; se conserva la misma decisión de equivalencia óptima y el mismo tratamiento de los términos cultuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino, aunque en este versículo el hebreo usa la expresión «el Dios de Israel».
  - Se conserva la distinción entre lenguaje culto-técnico («santuario», «holocausto», «incienso») y lenguaje general de cierre/apagado para que el español siga el registro del hebreo.
  - Las notas usan opciones léxicas alternativas reales en español, sin ampliar indebidamente el campo semántico del texto fuente.
