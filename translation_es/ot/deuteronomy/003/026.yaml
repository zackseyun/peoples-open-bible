review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé se enojó con Moisés por causa del pueblo, no atendió su ruego, y lo despidió bruscamente prohibiéndole volver a hablar del asunto. Sin embargo, la nota a [a] introduce una alternativa inadecuada en español (''a su cuenta''), y la formulación principal ''Basta para ti'' suena poco idiomática en español y no comunica tan bien como podría el matiz de rechazo brusco que el inglés auditado explicó con ''Enough from you''.'
  spanish_quality_summary: El texto es claro y mayormente natural. 'Se enojó conmigo', 'por causa de ustedes' y 'no me escuchó' funcionan bien. El principal problema de calidad está en 'Basta para ti', que en español suena forzado y menos idiomático de lo deseable. Una forma como '¡Basta![b]' mantiene la brusquedad y la dignidad del registro, mientras la nota puede preservar el hebreo literal 'Basta para ti'. También conviene corregir la nota [a] para que las alternativas sean español natural.
  glossary_alignment: Se respeta correctamente el uso de 'Yahvé' para יְהוָה. No hay conflictos con otros términos del glosario del proyecto. La decisión sobre רַב לָךְ necesita mejor ajuste estilístico en español, preservando en nota la literalidad hebrea y el valor idiomático de rechazo tajante.
  issues:
  - severity: medium
    issue: La expresión principal 'Basta para ti' es poco idiomática en español.
    rationale: Aunque refleja el hebreo de forma cercana, en español suena artificial. El audit trail inglés mismo explicó que es un modismo de rechazo tajante; una forma más natural como '¡Basta!' comunica mejor esa función, mientras la nota puede conservar la literalidad 'Basta para ti'.
  - severity: medium
    issue: La nota [a] contiene la alternativa 'a su cuenta', que no es español natural en este contexto.
    rationale: La alternativa inglesa era 'on your account'. En español bíblico natural corresponde 'por cuenta de ustedes' o mejor 'por su causa' / 'por cuenta de ustedes'; 'a su cuenta' suena incorrecto o ambiguo.
  revised_spanish_text: 'Pero Yahvé se enojó conmigo por causa de ustedes y no me escuchó[a], y Yahvé me dijo: «¡Basta![b] No me hables más de este asunto»'
  revised_footnotes:
  - marker: a
    text: O «por su causa» / «por cuenta de ustedes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Basta para ti», un modismo de rechazo tajante.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad al hebreo y a las decisiones del POB, pero se mejora la naturalidad del español en la fórmula de rechazo רַב לָךְ con «¡Basta!», dejando en nota la literalidad hebrea «Basta para ti». También se corrige la nota [a] para usar alternativas idiomáticas en español.
