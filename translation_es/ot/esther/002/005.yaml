translation:
  language: es
  text: Había un hombre judío[a] en Susa, la ciudadela[b], y su nombre era Mardoqueo, hijo de Jair, hijo de Simei, hijo de Quis[c], un benjaminita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un judeano' para 'un hombre judío'.
    reason: lexical_alternative
  - marker: b
    text: O 'en la ciudadela de Susa'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo 'hijo de' también puede señalar ascendencia más remota en contextos genealógicos.
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ יְהוּדִי
  english_pob_choice: a Jewish man
  chosen_spanish: un hombre judío
  alternatives_spanish:
  - un hombre judeo
  - un judeano
  lexicon: HALOT
  rationale: En este contexto narrativo de la diáspora persa, el adjetivo judío comunica de modo natural la identidad étnica y religiosa del personaje. 'Judeano' o 'judeo' sonarían más marcados o menos idiomáticos en español actual.
- source_word: הָיָה
  english_pob_choice: There was
  chosen_spanish: Había
  alternatives_spanish:
  - Hubo
  - Estaba
  lexicon: HALOT
  rationale: El verbo introductorio existencial en español se expresa bien con 'Había', que reproduce la función narrativa de presentar al personaje sin añadir matiz de localización o permanencia indebido.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  english_pob_choice: in Susa the citadel
  chosen_spanish: en Susa la ciudadela
  alternatives_spanish:
  - en la ciudadela de Susa
  - en Susa la fortaleza
  lexicon: HALOT
  rationale: 'La expresión hebrea es appositiva: el nombre del lugar seguido del título del complejo fortificado. ''Ciudadela'' conserva el valor de recinto fortificado/fortaleza real y fluye mejor en español que una construcción más pesada.'
- source_word: וּשְׁמוֹ
  english_pob_choice: and his name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y se llamaba
  - y su nombre fue
  lexicon: HALOT
  rationale: La fórmula introductoria se vierte con una estructura directa y natural en español. 'Era' conserva el tono narrativo, y evita forzar una construcción relativa menos fiel al hebreo.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordejai
  - Mordecai
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, manteniendo claridad para lectores de iglesia sin perder identificación con el hebreo.
- source_word: בֶּן יָאִיר בֶּן שִׁמְעִי בֶּן קִישׁ
  english_pob_choice: son of Jair, son of Shimei, son of Kish
  chosen_spanish: hijo de Jair, hijo de Simei, hijo de Quis
  alternatives_spanish:
  - descendiente de Jair, descendiente de Simei, descendiente de Quis
  lexicon: HALOT
  rationale: En esta genealogía se conserva 'hijo de' para reflejar la cadena genealógica de manera transparente. 'Descendiente de' comunica la posibilidad de ascendencia más amplia, pero el hebreo literal favorece 'hijo de'.
- source_word: אִישׁ יְמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: un benjaminita
  alternatives_spanish:
  - un hombre de Benjamín
  - un benjamita
  lexicon: HALOT
  rationale: '''Benjaminita'' es el equivalente español más claro y natural para indicar afiliación tribal. Evita circunloquios y mantiene la precisión del gentilicio bíblico.'
theological_decisions:
- issue: Valor de la genealogía y alcance de 'hijo de'
  english_pob_reading: Hebrew 'son of' may also indicate more distant ancestry in genealogical contexts.
  chosen_spanish_reading: '''Hijo de'' se entiende aquí como fórmula genealógica que puede abarcar ascendencia más amplia, no necesariamente filiación inmediata en cada eslabón.'
  alternative_spanish_readings:
  - '''Descendiente de'' en cada eslabón'
  - '''Heredero de'''
  rationale: 'La nota preserva la tensión documentada: la cadena genealógica es literal en forma, pero funcionalmente puede señalar linaje ancestral más amplio. No se debe reducir a una filiación biológica estricta.'
  doctrine_reference: Uso genealógico bíblico de בֶּן / 'son of' en listas y linajes
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior eliminando la referencia no anclada [c]. Ahora solo se incluyen notas con marcadores presentes en el texto español: [a] y [b]. La redacción mantiene la equivalencia funcional del original hebreo y el rastro de auditoría en inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica en este versículo; no hay sustituciones de términos divinos.
  - '''Judío'' se usa como identidad étnico-religiosa coherente con el contexto persa de Ester.'
  - '''Ciudadela'' traduce el valor fortificado de הַבִּירָה sin sobrecargar la sintaxis.'
  - Los nombres propios siguen formas españolas reconocibles y consistentes con el uso bíblico.
  - La genealogía conserva la repetición de 'hijo de' para reflejar el hebreo y la posible amplitud ancestral.
