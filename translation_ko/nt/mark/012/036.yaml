id: MRK.12.36
reference: Mark 12:36
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀αὐτὸς Δαυὶδ εἶπεν ἐν ⸂τῷ πνεύματι τῷ⸃ ἁγίῳ· ⸀Εἶπεν ⸀κύριος τῷ κυρίῳ μου· ⸀Κάθου ἐκ δεξιῶν μου ἕως ἂν θῶ τοὺς ἐχθρούς σου ⸀ὑποκάτω τῶν ποδῶν σου.
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/036.yaml
  text: David himself said in the Holy Spirit[a], ‘The Lord said to my Lord[b], “Sit at my right hand until I put your enemies under your feet.”’
  footnotes:
  - marker: a
    text: The quotation is from Psalm 110:1. In the Hebrew text, the first 'Lord' represents the divine name (YHWH, traditionally rendered 'the LORD'), while the second refers to David's lord.
    reason: cross_reference
  - marker: b
    text: Or 'by the Holy Spirit.'
    reason: alternative_reading
translation:
  language: ko
  text: 다윗 자신이 성령으로 말했습니다. 「야훼께서 내 주께 말씀하셨다. 「내가 네 원수들을 네 발 아래에 둘 때까지, 내 오른쪽에 앉아 있어라.」」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 12:36 시편 110:1 인용에서 첫 κύριος = YHWH, 둘째 κύριος = 메시아 호칭
  chosen_reading: 첫 κύριος = 야훼, 둘째 κύριος = 주
  alternative_readings:
  - 둘 다 「주」
  - 둘 다 「야훼」
  rationale: '시편 110:1(MT: נְאֻם יְהוָה לַאדֹנִי)의 LXX 인용은 첫 κύριος = יהוה, 둘째 κύριος = אֲדוֹנִי(나의 주)이다. 한국 전통의 「주께서 내 주께」는 두 호칭을 평탄화하여 다윗의 메시아 식별 논증의 핵심을 흐린다. 본문은 첫 κύριος를 「야훼」로 드러내고 둘째 κύριος는 「주」로 두어, 두 호칭의 구별이 곧 35-37절 논쟁의 토대임을 보존한다.'
  doctrine_reference: 'DOCTRINE.md: Glossary — κύριος (= YHWH) → 야훼; κύριος (of Jesus) → 주'
