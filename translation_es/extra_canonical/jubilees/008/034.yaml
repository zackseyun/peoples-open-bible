    changes_summary: Smoothed 'work injustice' to the more natural 'do injustice' while preserving the source sense; kept the rest unchanged.
translation:
  language: es
  text: Y todos se vendieron para cometer injusticia y derramar mucha sangre, y la tierra se llenó de injusticia.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: sold himself
  english_pob_choice: sold himself
  chosen_spanish: se vendieron
  alternatives_spanish:
  - se entregaron
  - se vendió a sí mismo
  lexicon: sell oneself
  rationale: En español, el plural impersonal con valor colectivo («se vendieron») comunica la idea de entregarse voluntariamente a una conducta sin añadir elementos no presentes en el texto. «Se vendió a sí mismo» sería más literal pero menos natural para el colectivo del versículo.
- source_word: do injustice
  english_pob_choice: do injustice
  chosen_spanish: hacer injusticia
  alternatives_spanish:
  - cometer injusticia
  - practicar injusticia
  lexicon: do injustice
  rationale: «Hacer injusticia» conserva de cerca la fuerza verbal del audit trail inglés y suena natural en español bíblico contemporáneo. «Cometer injusticia» es posible, pero desplaza el giro hacia un lenguaje más jurídico que el del texto.
- source_word: pour out much blood
  english_pob_choice: pour out much blood
  chosen_spanish: derramar mucha sangre
  alternatives_spanish:
  - verter mucha sangre
  - causar mucho derramamiento de sangre
  lexicon: pour out blood
  rationale: «Derramar sangre» es la equivalencia idiomática directa y fiel para la imagen de violencia extrema. «Causar mucho derramamiento de sangre» explica más de lo que el texto dice y pierde concisión.
- source_word: the earth was filled with injustice
  english_pob_choice: the earth was filled with injustice
  chosen_spanish: la tierra se llenó de injusticia
  alternatives_spanish:
  - la tierra se llenó de maldad
  - la tierra quedó llena de injusticia
  lexicon: filled with injustice
  rationale: «Se llenó de injusticia» reproduce con transparencia la imagen de plenitud/cobertura del original. Se evita «maldad» porque el texto repite el mismo término conceptual que aparece al inicio y debe conservarse.
theological_decisions:
- issue: Repetición de «injusticia» al inicio y al final
  english_pob_reading: And everyone sold himself to do injustice... and the earth was filled with injustice.
  chosen_spanish_reading: Y todos se vendieron para hacer injusticia... y la tierra se llenó de injusticia.
  alternative_spanish_readings:
  - Y todos se vendieron para hacer mal... y la tierra se llenó de maldad.
  rationale: 'La repetición del mismo término preserva la tensión retórica del versículo: la conducta humana y la condición del mundo quedan unidas por la misma realidad moral. Sustituirla por «maldad» suavizaría la correspondencia léxica.'
  doctrine_reference: Énfasis bíblico en la corrupción moral generalizada y sus efectos sociales.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que prefirió «do injustice» sobre «work injustice». Por eso se evita cualquier equivalente que sugiera labor o producción y se conserva el valor ético-verbal del enunciado.
  spanish_consistency_notes:
  - Se mantiene «injusticia» dos veces para reflejar la repetición del texto base.
  - Se usa un español sobrio y bíblico sin recurrir a términos eclesiásticos añadidos.
  - La imagen de «derramar mucha sangre» conserva el lenguaje figurado de violencia del original.
