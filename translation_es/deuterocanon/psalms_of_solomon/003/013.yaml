translation:
  language: es
  text: Ha caído[a], porque su caída es mala, y no se levantará. La destrucción del pecador es para siempre[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «su caída es grave» o «su caída es funesta». El griego πονηρόν puede abarcar no solo mal moral, sino también calamidad o severidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posible lectura, siguiendo una redacción previa: «su caída es mala».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἔπεσεν
  english_pob_choice: He has fallen
  chosen_spanish: Ha caído
  alternatives_spanish:
  - Cayó
  - Ha caído
  lexicon: BDAG
  rationale: El perfecto griego expresa una caída ocurrida con efecto presente; en español, «ha caído» conserva bien ese resultado vigente sin volver la frase artificial.
- source_word: πτῶμα
  english_pob_choice: downfall
  chosen_spanish: caída
  alternatives_spanish:
  - ruina
  - derrota
  - desplome
  lexicon: BDAG
  rationale: El contexto empareja el sustantivo con «cayó» y «no se levantará», por lo que «caída» mantiene el vínculo léxico y la imagen de derrumbe irreversible.
- source_word: πονηρόν
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  - funesta
  - grave
  lexicon: BDAG
  rationale: En español, «caída mala» resulta más natural que «caída malvada» y evita insinuar que la caída misma tenga agencia moral. Aun así, conserva la valoración negativa fuerte del griego, que puede abarcar maldad y calamidad.
- source_word: ἀνιστήσεται
  english_pob_choice: he will not rise
  chosen_spanish: no se levantará
  alternatives_spanish:
  - no resucitará
  - no se alzará
  - no volverá a levantarse
  lexicon: BDAG
  rationale: «Levantarse» reproduce la idea básica de ponerse de pie y mantiene la dureza de la clausura; «resucitará» introduciría un matiz más técnico de resurrección no explicitado en el texto.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - pérdida
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» es la correspondencia más directa y sobria para el sustantivo, y evita el registro más eclesiástico de «perdición».
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  - para el siglo
  lexicon: BDAG
  rationale: La frase temporal en este contexto de juicio comunica permanencia indefinida; «para siempre» es la opción más clara y natural en español contemporáneo.
translation_notes:
  revision_awareness: 'Tomé como base el texto griego de Swete 1909 y el audit trail inglés. Mantengo la estructura breve y paralelística del versículo, con la imagen de caída irreversible y el énfasis final en la permanencia de la destrucción. El punto de mayor tensión lexical es πονηρόν: aunque el inglés volvió a «evil», en español «mala» preserva mejor la naturalidad sin borrar la valoración negativa; por eso la nota ofrece alternativas como «grave» y «funesta».'
  spanish_consistency_notes:
  - Conservé el pasado perfecto compuesto («ha caído») para reflejar bien el valor resultativo del griego.
  - Preferí «caída» para πτῶμα por coherencia con el verbo inicial y para evitar una lectura de cadáver que el contexto no exige.
  - Mantuve «destrucción» y no «perdición» por la preferencia documental del audit trail inglés y por claridad en español.
  - Usé «para siempre» para εἰς τὸν αἰῶνα, una equivalencia natural y suficientemente fuerte en un contexto de sentencia definitiva.
