translation:
  language: es
  text: Sosténganme con tortas de pasas[a]; refrésquenme con manzanas[b], porque estoy enferma de amor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con tortas de uvas pasas» o «con tortas de uva prensada».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo tradicionalmente vertido «manzanas» quizá se refiera de manera más amplia a un fruto fragante; la identificación botánica exacta es incierta.
    reason: cultural_note
  - marker: c
    text: O «con mal de amores».
    reason: lexical_alternative
lexical_decisions:
- source_word: סַמְּכ֨וּ/נִי֙
  english_pob_choice: Sustain me
  chosen_spanish: Sostenedme
  alternatives_spanish:
  - Sostenedme
  - Sustentadme
  - Apoyadme
  lexicon: HALOT
  rationale: El imperativo plural de סמך expresa sostener, apoyar o mantener en pie. En español, «Sostenedme» conserva bien la fuerza de apoyo físico/emocional y mantiene el tono poético del plural imperativo.
- source_word: בָּֽ/אֲשִׁישׁ֔וֹת
  english_pob_choice: with raisin cakes
  chosen_spanish: con tortas de pasas
  alternatives_spanish:
  - con tortas de pasas
  - con tortas de uvas pasas
  - con tortas de uva prensada
  lexicon: HALOT
  rationale: אֲשִׁישׁוֹת alude a tortas o panes prensados, comúnmente entendidos como de pasas o uva. «Tortas de pasas» es natural en español y conserva la referencia alimentaria sin sobreespecificar más allá de la evidencia léxica.
- source_word: רַפְּד֖וּ/נִי
  english_pob_choice: refresh me
  chosen_spanish: refrescadme
  alternatives_spanish:
  - refrescadme
  - reanimadme
  - confortadme
  lexicon: HALOT
  rationale: El verbo רפד puede transmitir la idea de aliviar, restaurar o refrescar. «Refrescadme» refleja el sentido de alivio/restauración en paralelo con el primer imperativo y funciona bien en el registro poético español.
- source_word: בַּ/תַּפּוּחִ֑ים
  english_pob_choice: with apples
  chosen_spanish: con manzanas
  alternatives_spanish:
  - con manzanas
  - con frutas fragantes
  - con albaricoques
  lexicon: HALOT
  rationale: תַּפּוּחַ se traduce tradicionalmente como «manzana», aunque la identificación botánica exacta es incierta. Se mantiene la forma convencional en el texto principal por fidelidad y claridad, dejando la incertidumbre en nota.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de las peticiones. «Porque» expresa con naturalidad la causalidad en español y encaja en el flujo poético.
- source_word: חוֹלַ֥ת אַהֲבָ֖ה
  english_pob_choice: sick with love
  chosen_spanish: enferma de amor
  alternatives_spanish:
  - enferma de amor
  - amorosa hasta el malestar
  - lovesick
  lexicon: HALOT
  rationale: La expresión hebrea denota estar aquejada por amor. «Enferma de amor» preserva la metáfora con claridad y dignidad poética en español, más natural que un calco rígido.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: estoy
  alternatives_spanish:
  - estoy
  - soy
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la afirmación personal. En español, «estoy» comunica mejor el estado temporal de malestar que «soy» y mantiene la fuerza del hebreo.
translation_notes:
  revision_awareness: Coincide con la lectura auditada en inglés y no requiere revisiones respecto del último pase; se preserva la imagen poética de sostén, alimento y dolencia amorosa con una formulación española natural.
  spanish_consistency_notes:
  - Se mantiene el plural imperativo para reproducir la dirección a un grupo en el hebreo.
  - Se conserva la imagen alimentaria concreta sin sustituirla por una paráfrasis más abstracta.
  - Se evita «SEÑOR» u այլ terminología teológica porque el versículo no contiene referencia divina.
  - La nota sobre el fruto mantiene la incertidumbre botánica sin debilitar el sentido principal.
  - La expresión final se vierte como estado afectivo/físico, no como mera metáfora psicológica.
