id: PRO.1.18
reference: Proverbs 1:18
source:
  edition: WLC
  text: וְ֭/הֵם לְ/דָמָ֣/ם יֶאֱרֹ֑בוּ יִ֝צְפְּנ֗וּ לְ/נַפְשֹׁתָֽ/ם׃
translation:
  text: But they lie in wait for their own blood[b][a]; they set an ambush for their own lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'blood' is retained rather than paraphrased as 'bloodshed' or 'death,' preserving the concrete image and the irony that their violence turns back on them.
    reason: lexical_alternative
  - marker: b
    text: Or 'they hide for their own lives.' The Hebrew verb can more literally mean 'hide/conceal,' but here likely refers to setting a concealed ambush.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵם
  chosen: But they
  alternatives:
  - And they
  - Yet they
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrast with the previous verse's warning about birds. 'But they' brings out the adversative sense in context while keeping the explicit pronoun.
- source_word: לְדָמָם
  chosen: for their own blood
  alternatives:
  - for their blood
  - against their own blood
  lexicon: HALOT
  rationale: דָּם literally means 'blood' and in wisdom literature often stands metonymically for bloodshed or violent death. Retaining 'blood' preserves the vivid Hebrew image. 'Their own' reflects the 3mp suffix and the irony that their violence recoils on themselves.
- source_word: יֶאֱרֹבוּ
  chosen: lie in wait
  alternatives:
  - ambush
  - lurk
  lexicon: HALOT
  rationale: The verb ארב commonly denotes lying in wait or ambushing. 'Lie in wait' is a natural English verbal rendering that preserves the predatory nuance.
- source_word: יִצְפְּנוּ
  chosen: set an ambush
  alternatives:
  - hide secretly
  - lurk secretly
  - lie hidden
  lexicon: HALOT
  rationale: The verb צפן fundamentally means to hide or conceal, but in this parallel context with 'lie in wait' it carries the sense of concealed ambush. 'Set an ambush' communicates the practical force in idiomatic English while preserving the parallelism of violent plotting.
- source_word: לְנַפְשֹׁתָם
  chosen: for their own lives
  alternatives:
  - for themselves
  - for their own souls
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here the context is violent death, so 'lives' best fits. 'Their own' again highlights the reflexive irony that they target themselves.
