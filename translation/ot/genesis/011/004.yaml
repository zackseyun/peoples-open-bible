theological_decisions:
- issue: Scope of הָאָרֶץ in the Babel narrative
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In Genesis 11's primeval context, the narrative concerns humanity's spread over the inhabited world, not merely a local territory. Rendering הָאָרֶץ as 'earth' best fits the literary setting and the contrast with humanity's unified settlement.
