base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/002.yaml
  text: David said to Achish[a], “Then you will know what your servant will do.” And Achish said to David, “Very well[b], I will make you keeper of my head for all your days.”
  footnotes:
