translation:
  language: es
  text: Y los sacaré de entre los pueblos[a], y los reuniré de entre las tierras, y los traeré a su propia tierra; y los pastorearé en los montes de Israel, junto a los cauces, y en todos los lugares habitados de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a los barrancos», «en los cauces de agua» o «en los lechos de torrente». El término hebreo puede referirse a cauces, torrenteras o barrancos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִים
  english_pob_choice: I will bring them out
  chosen_spanish: los sacaré
  alternatives_spanish:
  - los traeré fuera
  - los haré salir
  lexicon: HALOT
  rationale: El causativo de יצא pide una acción divina que hace salir al pueblo. «Sacaré» conserva bien ese movimiento de liberación y evita una construcción demasiado pesada en español.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y naciones
  lexicon: HALOT
  rationale: «Pueblos» mantiene el plural étnico del hebreo y se distingue de «tierras» en la línea paralela siguiente.
- source_word: וְקִבַּצְתִּים
  english_pob_choice: gather them
  chosen_spanish: los reuniré
  alternatives_spanish:
  - los juntaré
  - los congregaré
  lexicon: HALOT
  rationale: קבץ expresa reunir a los dispersos; «reuniré» es natural en español y conserva la idea de restauración.
- source_word: הָאֲרָצוֹת
  english_pob_choice: the lands
  chosen_spanish: las tierras
  alternatives_spanish:
  - los países
  - las naciones
  lexicon: HALOT
  rationale: El plural de ארץ apunta a diversos territorios de donde serán recogidos. «Tierras» sigue de cerca el hebreo y mantiene el paralelo con «pueblos».
- source_word: וַהֲבִיאֹתִים
  english_pob_choice: bring them into
  chosen_spanish: los traeré a
  alternatives_spanish:
  - los llevaré a
  - los introduciré en
  lexicon: HALOT
  rationale: El hifil de בוא significa hacer entrar o traer. En español, «traeré a» suena claro y conserva la repetición de la acción divina.
- source_word: אַדְמָתָם
  english_pob_choice: their own land
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su tierra
  - su suelo
  lexicon: HALOT
  rationale: אַדמה puede ser suelo/tierra/territorio. Aquí el sufijo posesivo expresa restitución al lugar que les pertenece; «su propia tierra» refleja ese matiz sin exceder el texto.
- source_word: וּרְעִיתִים
  english_pob_choice: I will pasture them
  chosen_spanish: los pastorearé
  alternatives_spanish:
  - los apacentaré
  - los alimentaré
  lexicon: HALOT
  rationale: רעה puede significar pastorear, apacentar o alimentar. Dado que el verso sigue con lugares aptos para el pastoreo, «pastorearé» conserva la imagen pastoral completa.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  english_pob_choice: on the mountains of Israel
  chosen_spanish: en los montes de Israel
  alternatives_spanish:
  - sobre los montes de Israel
  - en la región montañosa de Israel
  lexicon: HALOT
  rationale: Aunque אֶל suele ser «a», con רעה introduce el ámbito donde pastan. «En los montes de Israel» expresa bien el escenario pastoril en español.
- source_word: בָּאֲפִיקִים
  english_pob_choice: by the streams
  chosen_spanish: junto a los cauces
  alternatives_spanish:
  - junto a los arroyos
  - en los barrancos
  - en los cauces de agua
  lexicon: HALOT
  rationale: אפיקים puede referirse a cauces, torrenteras, barrancos o lechos de agua. «Junto a los cauces» es suficientemente abierto y permite conservar la ambigüedad topográfica.
- source_word: וּבְכֹל מוֹשְׁבֵי הָאָרֶץ
  english_pob_choice: in all the inhabited places of the land
  chosen_spanish: en todos los lugares habitados de la tierra
  alternatives_spanish:
  - en todas las poblaciones de la tierra
  - en todos los asentamientos de la tierra
  lexicon: HALOT
  rationale: מושבי הארץ designa lugares donde se habita. «Lugares habitados» es claro y amplio, sin restringir innecesariamente el alcance del hebreo.
theological_decisions:
- issue: Restauración territorial en אַדְמָתָם
  english_pob_reading: their own land
  chosen_spanish_reading: su propia tierra
  alternative_spanish_readings:
  - su tierra
  - su territorio
  rationale: El sufijo posesivo señala pertenencia y restitución. «Su propia tierra» comunica la restauración al lugar que les corresponde sin añadir desarrollos doctrinales ajenos al pasaje.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto base: no se documentaron cambios posteriores y el cotejo indicó alta concordancia, con un acuerdo total en la solución inglesa de referencia.'
  spanish_consistency_notes:
  - 'Se mantuvo la triple progresión del hebreo: sacar de entre los pueblos, reunir de entre las tierras y traer a la propia tierra.'
  - Se preservó la imaginería pastoral con «pastorearé» para reflejar el vínculo entre el verbo רעה y los lugares de pastoreo mencionados.
  - «Tierras» y «pueblos» se distinguieron para conservar el paralelismo lexical del hebreo.
  - La nota [a] se colocó en «pueblos» para vincular la alternativa topográfica del término הבאפיקים con la traducción inglesa auditada, aunque el español principal opta por «cauces» en una formulación más natural.
