  text: '그리고 나는 하늘에서 또 다른 음성을 들었는데, 이렇게 말씀하셨습니다. 「내 백성아, 그에게서 나오너라. 너희가 그의 죄에 동참하지 않게 하고, 그의 재앙들을 받지 않게 하려 함이다.'
  philosophy: optimal-equivalence
