revisions:
- from: 'Entonces Labán dijo a Jacob: «Mira este montón[a], y mira la estela[b] que he puesto entre yo y tú».'
  to: 'Entonces Labán dijo a Jacob: «Mira este montón[a], y mira el pilar[b] que he puesto entre mí y ti».'
  rationale: Se corrigió «entre yo y tú» a «entre mí y ti» por gramática española estándar y fidelidad idiomática. Se reemplazó «estela» por «pilar» para alinearse mejor con la decisión léxica auditada del POB y evitar matices españoles no requeridos por מַצֵּבָה, conservando «piedra erguida» en nota como alternativa significativa.
