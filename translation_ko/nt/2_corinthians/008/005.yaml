id: 2CO.8.5
reference: '2 Corinthians 8:5'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ οὐ καθὼς ἠλπίσαμεν ἀλλ’ ἑαυτοὺς ἔδωκαν πρῶτον τῷ κυρίῳ καὶ ἡμῖν διὰ θελήματος θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/005.yaml
  text: And not as we expected[a], but they gave themselves first to the Lord and to us through the will of God[b],
translation:
  language: ko
  text: 그들은 우리가 기대한 것과 같지 않게[a], 하나님의 뜻에 따라[b] 먼저 자기 자신을 주께 드렸고, 또 우리에게도 드렸습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리가 소망한 대로가 아니라」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님의 뜻으로 말미암아」, 「하나님의 뜻에 부합하게」. 헬라어 διά는 수단·근거·합치를 모두 함의할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑαυτοὺς ἔδωκαν
  english_pob_choice: they gave themselves
  chosen_korean: 자기 자신을 드렸고
  lexicon: BDAG
  rationale: 재귀대명사 + δίδωμι 구조를 살려 「자기 자신을 드리다」로 옮긴다. 단순한 재정적 기여가 아니라 인격적 자기 헌신임을 보존한다.
  alternatives_korean:
  - 자신을 헌신하였고
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_korean: 주께
  lexicon: BDAG
  rationale: κύριος가 그리스도를 가리키는 바울의 표준 호칭. 「주께」가 합쇼체 문맥에서 자연스럽다.
  alternatives_korean:
  - 주님께
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: through the will of God
  chosen_korean: 하나님의 뜻에 따라
  lexicon: BDAG
  rationale: διά + 속격은 수단·매개·합치를 모두 함의할 수 있어 모호함을 보존한다. 「~에 따라」가 한국어에서 그 폭을 가장 잘 유지한다.
  alternatives_korean:
  - 하나님의 뜻으로 말미암아
  - 하나님의 뜻에 부합하게
