review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura general del hebreo y preserva la teología de «tu nombre está en esta casa». Sin embargo, atenúa o desplaza varios elementos léxicos importantes del original y del rastro POB en puntos clave: רָעָה se vuelve «algún mal» en vez de una calamidad/desastre definido por la lista siguiente; רָעָב se traduce «hambre» en vez de «hambre/hambruna» colectiva o «hambre generalizada», perdiendo el matiz de famine; y נַעַמְדָה se lleva a condicional potencial («nos pondríamos») cuando el contexto condicional pide mejor una promesa de futuro («nos pondremos en pie»).'
  spanish_quality_summary: El español es claro y legible, con registro bíblico moderno adecuado. No obstante, «algún mal» suena impreciso, «nos pondríamos en pie» debilita la resolución del voto, y «hambre» queda menos exacto que «hambruna» o «hambre generalizada» para רָעָב. También conviene reflejar la nota alternativa sobre el modismo del nombre en la casa, ya que el inglés POB la conserva y en español ayuda a evitar una lectura demasiado literalista.
  glossary_alignment: 'No hay conflictos con terminología principal del proyecto como Yahvé/Mesías/etc. La mayor cuestión de alineación es con las decisiones léxicas auditadas: conservar «casa», «juicio», «peste/pestilencia», «clamar», y el modismo «tu nombre está en esta casa» es correcto; pero debe ajustarse la fuerza de «disaster», «famine» y «we will stand», y añadirse la nota léxica equivalente para «tu nombre ... en esta casa».'
  issues:
  - severity: medium
    issue: «algún mal» para רָעָה
    rationale: El hebreo habla de calamidad/desastre que viene sobre el pueblo; «algún mal» suena más vago e incluso puede sugerir mal moral. «desastre» o «calamidad» encajan mejor con la lista de espada, juicio, peste y hambruna.
  - severity: medium
    issue: «nos pondríamos en pie» para נַעַמְדָה
    rationale: El cohortativo en esta condición expresa lo que harán si ocurre el desastre; en español suena mejor y más fiel «nos pondremos en pie» que el condicional potencial, que introduce una distancia no marcada en el hebreo.
  - severity: medium
    issue: «hambre» para רָעָב
    rationale: El término se refiere a famine, una escasez colectiva severa. «hambre» puede entenderse como sensación individual; «hambruna» o «hambre generalizada» preserva mejor el alcance del original.
  - severity: low
    issue: Falta la nota alternativa sobre «tu nombre está en esta casa»
    rationale: El inglés POB preserva una alternativa importante («tu nombre está sobre esta casa» / «esta casa lleva tu nombre»). En español conviene mantenerla para reflejar el mismo rastro léxico y la tensión teológica documentada.
