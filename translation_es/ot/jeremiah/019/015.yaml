translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel: «He aquí, yo traigo sobre esta ciudad y sobre todas sus poblaciones[a] toda la calamidad[b] que he hablado contra ella, porque endurecieron su cerviz[c] para no oír mis palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas sus ciudades».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el desastre»; aquí רָעָה se refiere a calamidad de juicio, no a mal moral.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «endurecieron su cerviz», un modismo para la negativa obstinada a escuchar o someterse.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama, siguiendo el criterio POB de no enmascararlo con un título. 'Yahvé' es la forma establecida en español para mantener la referencia personal y pactual de Dios.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'ejércitos' comunica de modo natural el sentido de צְבָאוֹת sin depender del anglicismo 'hosts'. Mantiene la amplitud de fuerzas celestiales y terrenales implícita en el título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa e idiomática en español, preservando la identificación pactual entre Dios e Israel.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Miren, yo estoy
  alternatives_spanish:
  - He aquí, yo estoy
  - Miren, yo
  lexicon: HALOT
  rationale: '''Miren'' conserva la función de llamada solemne y deíctica en un registro natural para el español moderno; ''yo estoy'' refleja la inmediatez enfática del hebreo.'
- source_word: מבי
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - haciendo venir
  - trayendo sobre
  lexicon: HALOT
  rationale: '''Trayendo sobre'' expresa de manera natural la idea de hacer venir juicio sobre la ciudad, sin perder la direccionalidad del verbo hebreo ni suavizar la acción divina.'
- source_word: אֶל ... וְעַל
  english_pob_choice: on ... and on
  chosen_spanish: sobre ... y sobre
  alternatives_spanish:
  - contra ... y contra
  - sobre ... contra
  lexicon: HALOT
  rationale: '''Sobre'' es idiomático en español con calamidad o juicio que cae sobre un lugar. Mantiene la imagen de carga/judgment coming down sin forzar una lectura exclusivamente hostil de ''contra''.'
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esta urbe
  lexicon: HALOT
  rationale: Demostrativo directo y claro, sin añadidos interpretativos.
- source_word: כָּל עָרֶיהָ
  english_pob_choice: all its towns
  chosen_spanish: todas sus ciudades
  alternatives_spanish:
  - todos sus pueblos
  - todas sus localidades
  lexicon: HALOT
  rationale: El hebreo puede referirse a ciudades o poblaciones dependientes; 'ciudades' conserva mejor la forma urbana del plural עָרִים. Se añade nota para reconocer la alternativa 'pueblos/towns' que el inglés POB abrió.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: toda la calamidad
  alternatives_spanish:
  - todo el desastre
  - todo el mal
  lexicon: HALOT
  rationale: En contexto de juicio, רָעָה significa calamidad o desastre, no mal moral. 'Calamidad' preserva mejor la carga de juicio que 'mal' en español.
- source_word: דִּבַּרְתִּי עָלֶיהָ
  english_pob_choice: I have spoken against it
  chosen_spanish: he hablado contra ella
  alternatives_spanish:
  - hablé contra ella
  - he pronunciado contra ella
  lexicon: HALOT
  rationale: Se conserva la referencia profética de habla judicial. 'He hablado contra ella' sigue de cerca el hebreo y permite la continuidad entre la palabra pronunciada y su cumplimiento.
- source_word: הִקְשׁוּ אֶת עָרְפָּם
  english_pob_choice: they have stiffened their neck
  chosen_spanish: endurecieron su cerviz
  alternatives_spanish:
  - endurecieron el cuello
  - pusieron rígida su cerviz
  lexicon: HALOT
  rationale: '''Cerviz'' mantiene el idiomatismo bíblico y el tono solemne; ''endurecieron'' comunica la terquedad rebelde. Se evita trivializar la imagen con un coloquialismo demasiado moderno.'
- source_word: לְבִלְתִּי שְׁמֹעַ
  english_pob_choice: so as not to hear
  chosen_spanish: para no oír
  alternatives_spanish:
  - a fin de no escuchar
  - para no prestar oído
  lexicon: HALOT
  rationale: '''Para no oír'' mantiene el vínculo léxico con ''oír'' y preserva la fuerza de la negativa a atender la palabra divina.'
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mis dichos
  lexicon: HALOT
  rationale: El plural hebreo se conserva en español como plural; en contexto profético apunta a los mensajes concretos de Yahvé.
theological_decisions:
- issue: Rendering the divine name in prophetic formula
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  rationale: Se mantiene el Tetragrama como nombre propio divino, siguiendo la política POB. 'De los ejércitos' traduce de forma clara y reverente צְבָאוֹת sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Semantic force of רָעָה in a judgment oracle
  english_pob_reading: all the disaster
  chosen_spanish_reading: toda la calamidad
  alternative_spanish_readings:
  - todo el desastre
  - todo el mal
  rationale: En un anuncio de juicio, רָעָה describe calamidad enviada o permitida por Dios, no mal moral. 'Calamidad' protege esa distinción y evita una lectura ética equivocada.
  doctrine_reference: HALOT on רָעָה; contextual judgment usage in prophetic discourse
- issue: Hebrew neck-stiffening idiom
  english_pob_reading: they have stiffened their neck
  chosen_spanish_reading: endurecieron su cerviz
  alternative_spanish_readings:
  - endurecieron el cuello
  - se pusieron tercos
  rationale: La metáfora corporal es parte de la denuncia profética y conviene preservarla. 'Cerviz' ofrece una equivalencia bíblica y solemne en español, evitando diluir el idioma original.
  doctrine_reference: Prophetic idiom in Jeremiah; cf. recurring 'stiff neck' language in the Hebrew Bible
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés sin trasladar mecánicamente las soluciones del inglés. Se mantuvo la tensión léxica de רָעָה como calamidad judicial, la metáfora de la cerviz endurecida y el nombre divino Yahvé, con ajustes naturales para el español bíblico contemporáneo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' conforme a la terminología POB para el Tetragrama.
  - '''De los ejércitos'' se usa como equivalente idiomático de צְבָאוֹת en español.'
  - '''Calamidad'' se emplea en lugar de ''mal'' para no borrar el matiz judicial de רָעָה.'
  - La imagen de 'cerviz' mantiene continuidad con el lenguaje profético tradicional y con la metáfora hebrea.
  - Las comillas y la puntuación siguen el uso editorial español, con nota al pie anclada en el término ambiguo.
