base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/007/012.yaml
  text: For wisdom is a shelter just as money is a shelter[b][a], but the advantage of knowledge is that wisdom preserves the life of its possessors.
  footnotes:
  - marker: a
    text: Literally, 'For in the shadow of wisdom, in the shadow of money.' The Hebrew uses 'shadow' as an image of protection or shelter.
    reason: lexical_alternative
  - marker: b
    text: Or 'the profit of knowledge is that wisdom gives life to its possessors.' The verb can also be rendered 'gives life to' or 'keeps alive.'
    reason: lexical_alternative
