translation:
  language: es
  text: La rectitud de los rectos los rescata[a], pero los traicioneros son atrapados por su propio deseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero los traicioneros son atrapados en su ruina» o «por su destrucción». El sustantivo hebreo puede denotar tanto deseo o codicia destructiva como calamidad o ruina; el texto principal lo entiende como el deseo interno que los enreda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקַת
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - righteousness transliterado no procede
  lexicon: HALOT
  rationale: En proverbios, צְדָקָה puede expresar la cualidad moral de estar en lo correcto. En español, "justicia" conserva ese peso moral y encaja con el paralelo sapiencial; "rectitud" también es posible, pero aquí "justicia" suena más natural y mantiene la fuerza ética del término.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los upright
  - los justos
  lexicon: HALOT
  rationale: יָׁשָׁרִים describe a personas moralmente rectas. "Los rectos" es claro, breve y mantiene la categoría sapiencial sin añadir matices jurídicos que no están explícitos en el hebreo.
- source_word: תַּצִּילֵם
  english_pob_choice: rescues them
  chosen_spanish: los rescata
  alternatives_spanish:
  - los libra
  - los salva
  lexicon: HALOT
  rationale: El הִפְעִיל de נצל tiene sentido de librar o rescatar. "Rescata" conserva la imagen dinámica de arrancar del peligro y suena natural en español contemporáneo.
- source_word: וּבְהַוַּת
  english_pob_choice: by their own desire
  chosen_spanish: por su propio deseo
  alternatives_spanish:
  - por su ruina
  - por su destrucción
  - por su deseo
  lexicon: HALOT
  rationale: El sustantivo הַוָּה puede referirse a deseo/destructividad o a ruina/calamidad. Siguiendo el criterio del texto inglés auditado, la traducción principal toma el valor interno de deseo, y el posesivo "propio" refuerza que la trampa procede de ellos mismos.
- source_word: בֹּגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: los traicioneros
  alternatives_spanish:
  - los infieles
  - los pérfidos
  - los traidores
  lexicon: HALOT
  rationale: בגד expresa actuar con traición o deslealtad. "Traicioneros" reproduce bien el rasgo caracterológico general sin restringirlo sólo a traición política o sólo a infidelidad pactal.
- source_word: יִלָּכֵדוּ
  english_pob_choice: are caught
  chosen_spanish: son atrapados
  alternatives_spanish:
  - quedan atrapados
  - son apresados
  - son cogidos
  lexicon: HALOT
  rationale: El nifal de לכד indica ser capturado o atrapado. "Son atrapados" comunica bien la pasividad del sujeto y la imagen proverbial de quedar preso en una trampa.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo WLC y toma en cuenta la lectura auditada en inglés, especialmente la decisión revisada sobre הַוָּה: no se neutraliza como mero “ruina”, sino que se conserva su ambigüedad léxica con preferencia por el sentido de deseo interno que atrapa al malvado.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '"Justicia" se prefirió aquí sobre "rectitud" por naturalidad y porque el contexto sapiencial permite la cualidad moral de estar en lo correcto.'
  - '"Traicioneros" evita un término demasiado técnico o eclesiástico y conserva el tono proverbial.'
  - La nota al pie mantiene la alternativa semántica importante de הַוָּה sin diluirla.
