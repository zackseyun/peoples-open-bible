translation:
  language: es
  text: El que se burla del pobre insulta a su Hacedor[a][b]; el que se alegra de la calamidad no quedará impune[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se mofa de» o «ridiculiza a».
    reason: lexical_alternative
  - marker: b
    text: O «su Creador».
    reason: lexical_alternative
  - marker: c
    text: O «no será absuelto» o «no será tenido por inocente».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹעֵג
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - se mofa de
  - ridiculiza a
  - se burla de
  lexicon: HALOT
  rationale: El participio expresa desprecio verbal y actitud de escarnio. «Se burla de» es natural en español y conserva la agresión social del verbo sin volverlo demasiado técnico.
- source_word: לָרָשׁ
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el indigente
  - el pobre
  lexicon: HALOT
  rationale: רָשׁ designa a una persona pobre o desposeída. En singular proverbial, «el pobre» suena más directo y reproduce bien el valor colectivo/representativo del hebreo.
- source_word: חֵרֵף
  english_pob_choice: insults
  chosen_spanish: insulta
  alternatives_spanish:
  - reprocha
  - afrenta
  - insulta
  lexicon: HALOT
  rationale: El verbo expresa trato despectivo o reproche. «Insulta» comunica con claridad el forcejeo interpersonal y no introduce un matiz cultual más fuerte que el exigido por el texto.
- source_word: עֹשֵׂהוּ
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - su Creador
  - el que lo hizo
  - su Hacedor
  lexicon: HALOT
  rationale: La forma con sufijo apunta al pobre como objeto hecho por Dios. «Hacedor» mantiene el vínculo personal con el ser humano y conserva el peso teológico de que despreciar al pobre ofende a Dios como creador.
- source_word: שָׂמֵחַ
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se goza
  - está contento
  - se alegra
  lexicon: HALOT
  rationale: La forma participial indica una disposición gozosa o complaciente. «Se alegra» es un equivalente verbal natural en proverbio español y preserva la continuidad con la segunda cola.
- source_word: לְאֵיד
  english_pob_choice: at calamity
  chosen_spanish: de la calamidad
  alternatives_spanish:
  - ante la desgracia
  - de la calamidad
  - por la desgracia
  lexicon: HALOT
  rationale: אֵיד se refiere a desastre, ruina o desgracia. «Calamidad» mantiene un registro sobrio y suficientemente amplio para el alcance proverbial del término.
- source_word: לֹא יִנָּקֶה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará impune
  alternatives_spanish:
  - no será absuelto
  - no será tenido por inocente
  - no quedará impune
  lexicon: HALOT
  rationale: El nifal de נקה puede significar ser absuelto o quedar sin castigo. En español jurídico-moral, «no quedará impune» refleja bien la consecuencia judicial sin forzar una sola lectura técnica.
theological_decisions:
- issue: Referente de “su Hacedor”
  english_pob_reading: The poor person's maker is God, and mocking the poor is therefore an affront to God.
  chosen_spanish_reading: «Su Hacedor» se entiende como Dios, el Creador del pobre, de modo que burlarse del pobre es afrentar al mismo Dios.
  alternative_spanish_readings:
  - «su Hacedor» podría leerse de modo más general como «el que lo hizo»
  - «su Creador» explicitaría más directamente la idea
  rationale: El sufijo de עֹשֵׂהוּ remite naturalmente al pobre. La traducción conserva la relación creador-criatura y la carga teológica de la proverbio sin añadir glosa al texto principal.
  doctrine_reference: Sabiduría bíblica sobre la dignidad humana ante Dios; cf. Génesis 1:27
- issue: Valor genérico singular masculino
  english_pob_reading: Use mixed English forms ('Whoever... he who...') to preserve the generic singular force without flattening the source.
  chosen_spanish_reading: Se usa el singular genérico masculino («El que... el que...») para conservar la forma proverbial del hebreo.
  alternative_spanish_readings:
  - Usar formas completamente inclusivas como «quien... quien...»
  - 'Usar plural genérico: «los que...»'
  rationale: El hebreo emplea participios y formas masculinas singulares de valor genérico. En español, «el que... el que...» suena natural, es fiel al patrón proverbial y evita perder la referencia singular del original.
  doctrine_reference: Principios de traducción del POB sobre fidelidad de forma y sentido
translation_notes:
  revision_awareness: El texto fuente y el pasaje inglés del POB muestran acuerdo alto y no presentan revisiones aplicadas; por ello se mantiene la lectura proverbially paralela con equivalentes españoles directos y se conservan las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en «su Hacedor» siguiendo el valor teológico documentado del POB.
  - Se conserva «impune» para reflejar el campo judicial de נקה sin sobrerrestringirlo a una sola formulación forense.
  - El registro es sobrio y proverbial, con singular genérico masculino coherente con el hebreo.
