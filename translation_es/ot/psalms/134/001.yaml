translation:
  language: es
  text: Cántico de las subidas. He aquí[a], bendigan a Yahvé, todos ustedes, siervos de Yahvé[b], que están de pie en la casa de Yahvé por la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «Vean» para la partícula inicial.
    reason: lexical_alternative
  - marker: b
    text: «Casa de Yahvé» se refiere al santuario del templo.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensiones
  alternatives_spanish:
  - Cántico de subidas
  - Cántico de peregrinación
  lexicon: HALOT
  rationale: El hebreo presenta un título superscrito tradicional. 'Ascensiones' conserva con mayor transparencia el sustantivo מַעֲלוֹת que una paráfrasis interpretativa como 'peregrinación', manteniendo la forma breve y litúrgica del encabezado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: La partícula introduce una exhortación enfática. 'He aquí' preserva ese valor de llamada de atención en un registro elevado y natural en español bíblico contemporáneo.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendecid
  alternatives_spanish:
  - alaben
  - bendigan
  lexicon: HALOT
  rationale: El verbo ברך en este contexto litúrgico se entiende como una exhortación a bendecir a Yahvé. Se conserva el sentido de 'bendecir' y el tono imperativo plural; 'alaben' estrecha demasiado el campo semántico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ''Yahvé'' reproduce el Tetragrama sin ocultarlo tras una convención sustitutiva. ''El SEÑOR'' y ''Jehová'' se evitan por fidelidad al estándar terminológico de POB.'
- source_word: כָּל עַבְדֵי יְהוָה
  english_pob_choice: all you servants of Yahweh
  chosen_spanish: todos ustedes, siervos de Yahvé
  alternatives_spanish:
  - todos los siervos de Yahvé
  - todos ustedes, esclavos de Yahvé
  lexicon: HALOT
  rationale: 'La estructura vocativa exige un español explícito para el destinatario: ''todos ustedes''. Se eligió ''siervos'' para la función cultual y relacional del verso; ''esclavos'' comunica una fuerza léxica posible, pero en español aquí sonaría excesivamente duro sin que el contexto la requiera.'
- source_word: הָעֹמְדִים
  english_pob_choice: who stand
  chosen_spanish: que están de pie
  alternatives_spanish:
  - que están
  - que sirven
  lexicon: HALOT
  rationale: El participio describe a los servidores en actitud de presencia/estar de pie. 'Que están de pie' conserva la imagen concreta; 'que sirven' sería interpretativo y perdería el gesto espacial del hebreo.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: '''Casa de Yahvé'' reproduce el hebreo de forma transparente. ''Templo'' es una glosa cultural válida, pero el texto base dice ''casa'', y la lectura literal sigue siendo inteligible en español.'
- source_word: בַּלֵּילוֹת
  english_pob_choice: by night
  chosen_spanish: por la noche
  alternatives_spanish:
  - en las noches
  - de noche
  lexicon: HALOT
  rationale: El plural hebreo se vierte idiomáticamente en español como una referencia temporal general. 'Por la noche' conserva el valor temporal poético sin forzar un plural poco natural.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea editorial del POB usa el nombre propio del pacto en lugar de una sustitución reverencial. En español, 'Yahvé' mantiene esa decisión con un uso asentado y reconocible.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de 'servants of Yahweh'
  english_pob_reading: all you servants of Yahweh
  chosen_spanish_reading: todos ustedes, siervos de Yahvé
  alternative_spanish_readings:
  - todos los siervos de Yahvé
  - todos ustedes, esclavos de Yahvé
  rationale: No se documenta en este verso una exigencia teológica para intensificar el vínculo a 'esclavos'. 'Siervos' preserva la relación de servicio cultual y evita una carga sociológica que el contexto no enfatiza.
  doctrine_reference: 'DOCTRINE.md Contested terms: עֶבֶד / δοῦλος'
- issue: Referencia a la casa de Yahvé
  english_pob_reading: the house of Yahweh refers to the temple sanctuary
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  - el santuario de Yahvé
  rationale: Se mantiene la expresión concreta del hebreo y se deja la identificación cultual implícita, como hace el audit trail inglés. La glosa explicativa no entra en el cuerpo del verso para no sobreinterpretar.
  doctrine_reference: POB editorial note on cultural referent
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador español sigue el mismo sentido textual y la misma decisión editorial sobre el nombre divino, con ajustes naturales de idiomaticidad en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el paralelismo vocativo con 'todos ustedes, siervos de Yahvé'.
  - '''Casa de Yahvé'' evita sustituir prematuramente el hebreo por ''templo'' en el texto base.'
  - La estructura breve del superscrito se conserva como encabezado poético separado.
