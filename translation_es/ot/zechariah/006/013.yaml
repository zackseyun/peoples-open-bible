translation:
  language: es
  text: Sí, él edificará el templo de Yahvé, y llevará majestad[a], y se sentará y gobernará sobre su trono. Y será sacerdote sobre su trono[b], y el consejo de paz estará entre los dos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevará honor» o «llevará esplendor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y habrá un sacerdote sobre su trono»; el hebreo permite distinguir al sacerdote del gobernante entronizado.'
    reason: alternative_reading
  - marker: c
    text: «Entre los dos» puede referirse a las funciones real y sacerdotal, o a dos figuras distintas, como un gobernante y un sacerdote.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - el palacio de Yahvé
  - el santuario de Yahvé
  lexicon: HALOT
  rationale: הֵיכָל puede significar templo o palacio; en este contexto profético, el sentido más natural y claro en español es «templo». Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como «Yahvé» para conservar el nombre propio divino, no sustituirlo por un título.
- source_word: יִשָּׂא הוֹד
  english_pob_choice: will bear majesty
  chosen_spanish: llevará majestad
  alternatives_spanish:
  - llevará honor
  - llevará esplendor
  lexicon: HALOT
  rationale: נשא con הוֹד expresa portar o cargar majestad/gloria. «Llevará majestad» conserva la imagen concreta del verbo y el matiz real, sin reducirlo a una abstracción.
- source_word: וְיָשַׁב וּמָשַׁל עַל כִּסְאוֹ
  english_pob_choice: and he will sit and rule on his throne
  chosen_spanish: y se sentará y gobernará sobre su trono
  alternatives_spanish:
  - y se sentará y regirá sobre su trono
  - y se sentará entronizado y gobernará
  lexicon: HALOT
  rationale: La secuencia presenta entronización y ejercicio de dominio. «Gobernará sobre su trono» mantiene el paralelismo y la imaginería real con un español natural.
- source_word: וְהָיָה כֹהֵן עַל כִּסְאוֹ
  english_pob_choice: and he will be a priest on his throne
  chosen_spanish: Y será sacerdote sobre su trono
  alternatives_spanish:
  - Y habrá un sacerdote sobre su trono
  - Y ejercerá como sacerdote sobre su trono
  lexicon: HALOT
  rationale: La gramática hebrea mantiene el mismo sujeto masculino singular; por eso se conserva «será sacerdote». «Sacerdote» se prefiere a «sacerdote» sin suavizar la tensión de unir sacerdocio y trono.
- source_word: וַעֲצַת שָׁלוֹם
  english_pob_choice: the counsel of peace
  chosen_spanish: el consejo de paz
  alternatives_spanish:
  - el plan de paz
  - el consejo pacífico
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo, plan o propósito. «Consejo de paz» preserva la construcción compacta del hebreo y coincide con la lectura revisada del POB inglés.
- source_word: בֵּין שְׁנֵיהֶם
  english_pob_choice: between the two of them
  chosen_spanish: entre los dos
  alternatives_spanish:
  - entre ambos
  - entre los dos de ellos
  lexicon: HALOT
  rationale: El hebreo es breve y deliberadamente ambiguo. «Entre los dos» conserva esa indeterminación sin añadir explicaciones que el texto no formula.
theological_decisions:
- issue: Relación entre el sujeto real y el sacerdotal, y el referente de «entre los dos»
  english_pob_reading: Retain the singular subject throughout ('he will be a priest on his throne') while preserving the final phrase's ambiguity as 'between the two of them.'
  chosen_spanish_reading: Se mantiene un solo sujeto en todo el versículo («él… será sacerdote…»), y la frase final queda ambigua con «entre los dos».
  alternative_spanish_readings:
  - «Y habrá un sacerdote sobre su trono», separando al sacerdote del gobernante entronizado
  - «entre ambos oficios», identificando los dos con realeza y sacerdocio
  rationale: La sintaxis hebrea favorece un solo sujeto, pero la expresión final introduce una dualidad no resuelta. La traducción conserva esa tensión sin decidir prematuramente si se trata de dos figuras distintas o de dos funciones en una sola persona.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que cambió «a counsel of peace» por «the counsel of peace» por ser una versión más natural y precisa del hebreo. También se preservó la tensión interpretativa sobre el sujeto sacerdotal y el referente de «los dos».
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se mantuvo «templo» como término principal para הֵיכַל en este contexto.
  - Se conservó «majestad» para הוֹד, evitando suavizar el tono regio.
  - Se eligió «consejo de paz» para reflejar la construcción compacta del hebreo y la revisión inglesa más reciente.
  - Se preservó la ambigüedad de «entre los dos» sin especificar en el texto principal los referentes.
