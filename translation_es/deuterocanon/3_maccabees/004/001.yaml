revisions:
- from: Y por todas partes donde llegaba este decreto, se organizaba entre las naciones un banquete público[a] con gritos y alegría[b], como si el odio que desde mucho antes saltaba en su mente contra ellos se manifestara ahora abiertamente con audacia.
  to: Y por todas partes donde llegaba este decreto, se organizaba entre las naciones una celebración pública[a] con gritos y alegría[b], como si el odio que desde mucho antes danzaba en sus mentes contra ellos se manifestara ahora abiertamente con audacia.
  rationale: Se ajusta εὐωχία a 'celebración pública' para no reducir el sentido a una comida, en línea con la decisión documentada del POB. También se mejora la expresión difícil de προκατεσκιρωμένης con 'danzaba en sus mentes', que conserva la imagen viva del original y suena más natural en español que 'saltaba en su mente'.
