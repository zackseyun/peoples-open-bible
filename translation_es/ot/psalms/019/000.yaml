translation:
  language: es
  text: Para el director del coro. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; la expresión hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de canto
  - Para el director musical
  - Para el líder
  lexicon: HALOT
  rationale: El hebreo de los sobrescritos de salmos remite al encargado de la ejecución musical. «Director del coro» comunica de manera natural esa función en español y conserva el sentido de destinación del prefijo ל con «para».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canción
  - Melodía
  - Canto
  lexicon: HALOT
  rationale: מִזְמוֹר funciona aquí como rótulo de género. «Salmo» es el equivalente español establecido y más preciso; «canción» o «canto» serían demasiado generales.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los sobrescritos puede indicar autoría, asociación o dedicación. «De David» mantiene esa ambigüedad sin resolverla de forma más fuerte, como hace la POB en inglés con «of David».
theological_decisions:
- issue: Relación exacta de David con el salmo en el sobrescrito
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a decidir entre autoría, pertenencia o dedicación. Se preserva esa tensión interpretativa con una formulación abierta en español.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente corrigió en inglés la ubicación del marcador de nota para que acompañe a «David» y no a «choirmaster». En español se sigue ese criterio colocando la nota en «David», que es el término afectado por la ambigüedad de לְדָוִד.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y litúrgico, pero con español natural.
  - «Director del coro» mantiene la función musical sin imponer una solución exegética adicional.
  - «de David» preserva la ambigüedad del sobrescrito, conforme al audit trail en inglés.
