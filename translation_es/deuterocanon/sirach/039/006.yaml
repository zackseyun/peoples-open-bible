    rationale: La marca [a] aparece en «Yahvé[a]», pero la nota ofrece como alternativa «si el gran Señor quiere», que abarca toda la cláusula inicial, no solo el nombre divino. Eso rompe la disciplina de anclaje de notas.
  - severity: low
    issue: «Será llenado» es menos idiomático que alternativas españolas naturales
    rationale: Aunque es fiel al pasivo griego, en español bíblico actual «será lleno de» o «será colmado de» suena más natural sin pérdida de sentido.
