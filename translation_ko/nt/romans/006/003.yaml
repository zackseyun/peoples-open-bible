  lexicon: BDAG
  rationale: 방향성 εἰς. 「~께로」가 자연스럽고 메시아와의 연합 함의도 살림.
- source_word: εἰς τὸν θάνατον αὐτοῦ
  english_pob_choice: into his death
  chosen_korean: 그분의 죽음 속으로
  lexicon: BDAG
  rationale: 방향·연합 εἰς. 죽음과의 합일 의미.
theological_decisions:
- issue: εἰς Χριστόν / εἰς τὸν θάνατον의 의미
  chosen_reading: 메시아 그리고 그분의 죽음과의 연합으로 들어가는 행위로서 세례
  alternative_readings:
  - 단순 의례적 표시
  rationale: 바울이 세례를 죽음과의 신비적 연합으로 풀어내는 6:3-11 전체 논증의 토대.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
