    text: 'O: «te agotarás». El hebreo usa un infinitivo absoluto seguido de un imperfecto del mismo verbo para dar énfasis: literalmente, «desgastándote, te desgastarás».'
    reason: lexical_alternative
  revision_rationale: Se añadió 'Sin duda' para representar en español el énfasis del infinitivo absoluto hebreo sin recurrir a una construcción artificiosa. También se simplificó la frase final a 'No podrás hacerlo solo', que mantiene el sentido de לְבַדֶּךָ de manera más natural y menos enfática que 'tú solo'.
