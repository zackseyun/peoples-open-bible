translation:
  language: es
  text: Y aconteció[a] que, cuando ella vio que él había dejado su prenda en su mano y había huido fuera,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ropa»; el término hebreo es general y no requiere concretarse como una prenda específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce transición de relato; en español, «aconteció» comunica ese enlace de manera natural y digna, sin perder el valor de evento narrativo del hebreo.
- source_word: כִּרְאוֹתָהּ
  english_pob_choice: when she saw
  chosen_spanish: al verla ella
  alternatives_spanish:
  - cuando ella vio
  - cuando la vio
  lexicon: HALOT
  rationale: 'La construcción temporal con כ + infinitivo constructo expresa simultaneidad: «al verla ella» mantiene la relación temporal y deja claro el sujeto femenino del verbo hebreo.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que efectivamente
  - cómo
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo percibido por ella; «que» es la manera natural en español de marcar la cláusula de contenido.
- source_word: עָזַב
  english_pob_choice: had left
  chosen_spanish: había dejado
  alternatives_spanish:
  - dejado
  - había abandonado
  lexicon: HALOT
  rationale: «Dejado» conserva el sentido básico de «dejar, soltar, abandonar» y encaja con el orden temporal de la cláusula de contenido en español.
- source_word: בִּגְדוֹ
  english_pob_choice: his garment
  chosen_spanish: su vestido
  alternatives_spanish:
  - su ropa
  - su prenda
  - su vestidura
  lexicon: HALOT
  rationale: El término hebreo es general para una prenda; «vestido» funciona como equivalente amplio y natural en español, sin imponer la especificidad de «manto» o «capa».},{
theological_decisions:
- issue: Valor del comienzo narrativo וַיְהִי
  english_pob_reading: And it happened
  chosen_spanish_reading: Y aconteció
  alternative_spanish_readings:
  - Y sucedió
  - Y pasó
  rationale: No hay cuestión doctrinal, sino de registro narrativo. Se preserva la función discursiva del hebreo como introducción de evento, evitando una paráfrasis excesiva.
  doctrine_reference: None
- issue: Referente de בגד
  english_pob_reading: his garment
  chosen_spanish_reading: su vestido
  alternative_spanish_readings:
  - su ropa
  - su prenda
  - su vestidura
  rationale: La POB inglesa mantiene la amplitud léxica de בגד y evita precisar «cloak». En español, «vestido» conserva un valor genérico de prenda; no se introduce una connotación litúrgica o tradicional que el hebreo no exige.
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue de cerca el paso final de la auditoría inglesa, que añadió «it happened» para reflejar וַיְהִי. Se conserva la progresión temporal del contenido («cuando la vio / que él había dejado... y había huido») sin calcar de manera rígida el orden inglés.
  spanish_consistency_notes:
  - Se usa «Y aconteció» para mantener el tono narrativo bíblico sin recurrir a la máscara «SEÑOR» ni a arcaísmos innecesarios.
  - Se eligió «vestido» como equivalente amplio de בגד; si en el contexto canónico se prefiriera neutralidad todavía mayor, «ropa» quedaría como alternativa en nota.
  - Se mantiene «afuera» para הַחוּצָה por ser claro y fiel a la idea direccional de salida.
