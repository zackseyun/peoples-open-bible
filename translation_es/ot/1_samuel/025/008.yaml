  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Siervos' para עֲבָדֶיךָ es defendible por contexto deferente documentado. 'Jóvenes' mantiene la ligazón léxica con נְעָרִים. La nota [a] como alternativa 'favor' está bien orientada, pero conviene que el texto principal use precisamente 'favor', que es la opción más natural aquí.
