translation:
  language: es
  text: Él frustra los planes de los astutos[a], de modo que sus manos no logran nada eficaz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los prudentes»; el hebreo admite también un sentido positivo de prudencia o sagacidad, aunque aquí el contexto favorece el matiz de astucia.
    reason: lexical_alternative
  - marker: b
    text: O «sus manos no consiguen nada sólido»; el término hebreo también puede referirse a «sabiduría sana» o «sabiduría sólida» en otros contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפֵר
  english_pob_choice: frustrates
  chosen_spanish: frustra
  alternatives_spanish:
  - quebranta
  - desbarata
  - anula
  lexicon: HALOT
  rationale: El causativo de פרר expresa hacer que planes queden sin efecto o se rompan. "Frustra" comunica esa fuerza causal en español moderno sin volver la línea demasiado literal o pesada.
- source_word: מַחְשְׁב֣וֹת
  english_pob_choice: schemes
  chosen_spanish: planes
  alternatives_spanish:
  - planes urdidos
  - maquinaciones
  - designios
  lexicon: HALOT
  rationale: En contexto con "los astutos", el término apunta a proyectos o cálculos estratégicos. "Planes" es natural en español y mantiene la idea de intención organizada sin cargar más negatividad de la necesaria.
- source_word: עֲרוּמִ֑ים
  english_pob_choice: the crafty
  chosen_spanish: los astutos
  alternatives_spanish:
  - los prudentes
  - los astutos y sagaces
  - los cuerdos
  lexicon: HALOT
  rationale: El adjetivo puede ser positivo o negativo según el contexto. Aquí, porque Dios invalida sus planes, el matiz negativo/ambiguo se conserva mejor con "astutos" que con "prudentes".
- source_word: וְלֹא
  english_pob_choice: so that ... no
  chosen_spanish: de modo que ... no
  alternatives_spanish:
  - y no
  - con el resultado de que no
  lexicon: HALOT
  rationale: La secuencia introduce resultado, no mera coordinación. "De modo que" expresa bien la relación consecutiva en español.
- source_word: תַעֲשֶׂינָה
  english_pob_choice: accomplish
  chosen_spanish: logran
  alternatives_spanish:
  - hacen
  - producen
  - llevan a cabo
  lexicon: HALOT
  rationale: Con "sus manos" el verbo señala ejecución eficaz. "Logran" preserva la idea de conseguir un resultado, no solo de actuar.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus obras
  - su mano
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de agencia y capacidad. En español, "sus manos" sigue siendo comprensible y mantiene la imagen corporal del original.
- source_word: תּוּשִׁיָּה
  english_pob_choice: nothing sound
  chosen_spanish: nada sólido
  alternatives_spanish:
  - nada sensato
  - ninguna sabiduría sólida
  - nada eficaz
  lexicon: HALOT
  rationale: 'El término tiene un rango debatido: puede apuntar a sabiduría sólida, eficacia o éxito efectivo. La revisión inglesa optó por una traducción más cercana al término; en español, "nada sólido" conserva la ambigüedad productiva entre solidez, eficacia y sabiduría sin decidir solo por una paráfrasis. Se evita cerrar el sentido con un equivalente demasiado interpretativo.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la última cláusula desde una paráfrasis de eficacia a una formulación más cercana a תּוּשִׁיָּה, procurando no perder la ambigüedad léxica. La versión española refleja ese mismo ajuste con una expresión breve y abierta, "nada sólido", en vez de una solución más explicativa.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" por norma del proyecto, pero en este versículo el sujeto está implícito en el pronombre "Él", siguiendo la economía del hebreo y el flujo natural del español.
  - '"astutos" conserva la tensión semántica de עֲרוּמִים sin imponer de antemano una lectura moral más fuerte que la que exige el contexto.'
  - '"nada sólido" busca ser fiel a la ambigüedad de תּוּשִׁיָּה; no se reduce a "éxito" ni se fija solo como "sabiduría".'
