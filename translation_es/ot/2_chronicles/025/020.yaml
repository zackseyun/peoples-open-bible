translation:
  language: es
  text: Pero Amasías no quiso escuchar, porque esto provenía de Dios, para entregarlos al poder[a] de sus enemigos, ya que habían buscado a los dioses de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «en la mano»; un modismo hebreo que significa «en el poder» de otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: would not listen
  chosen_spanish: no quiso escuchar
  alternatives_spanish:
  - no escuchó
  - no quiso oír
  lexicon: HALOT
  rationale: En este contexto, שָׁמַע implica atender o hacer caso, no solo percibir sonidos. «No quiso escuchar» conserva la negativa volitiva que el inglés POB expresa con «would not listen» y suena natural en español.
- source_word: מֵהָאֱלֹהִים הִיא
  english_pob_choice: it was from God
  chosen_spanish: era de parte de Dios
  alternatives_spanish:
  - venía de Dios
  - procedía de Dios
  lexicon: HALOT
  rationale: La frase hebrea usa un pronombre femenino que probablemente retoma la situación o el desenlace. «Era de parte de Dios» preserva la causalidad divina sin precisar más de lo que el hebreo dice.
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: Aquí el marcador introduce propósito o resultado. «Para» comunica esa relación de modo directo en español, sin perder la fuerza final de la construcción.
- source_word: תִּתָּם
  english_pob_choice: to give them
  chosen_spanish: entregarlos
  alternatives_spanish:
  - darlos
  - ponerlos
  lexicon: HALOT
  rationale: El verbo נתן seguido de la expresión «en mano» funciona como idiomático de entregar o poner bajo el poder de otro. «Entregarlos» mantiene la idea verbal y evita una traducción demasiado literal que sonaría incompleta en español.
- source_word: בְּיָד
  english_pob_choice: into the hand of their enemies
  chosen_spanish: en mano
  alternatives_spanish:
  - en manos
  - en poder
  lexicon: HALOT
  rationale: La expresión hebrea «en la mano» es un modismo para dominio o control. En español, «en mano» conserva el núcleo idiomático; el contexto narrativo ya identifica a los destinatarios de esa entrega.
- source_word: דָרְשׁוּ
  english_pob_choice: had sought
  chosen_spanish: habían buscado
  alternatives_spanish:
  - habían consultado
  - habían acudido a
  lexicon: HALOT
  rationale: Con un objeto divino, דרשׁ puede implicar buscar o recurrir religiosamente. «Habían buscado» preserva la amplitud semántica sin imponer una lectura más específica como «consultar».
- source_word: אֱלֹהֵי אֱדוֹם
  english_pob_choice: the gods of Edom
  chosen_spanish: los dioses de Edom
  alternatives_spanish:
  - los dioses edomitas
  - Edom tenía dioses
  lexicon: HALOT
  rationale: La cadena constructa se refiere a las deidades asociadas con Edom. «Los dioses de Edom» es claro, fiel y mantiene el plural de la frase hebrea.
theological_decisions:
- issue: Causación divina y responsabilidad humana
  english_pob_reading: Amaziah's refusal to listen was from God, with the purpose/result that he would be given over to defeat because of idolatry.
  chosen_spanish_reading: Amasías no quiso escuchar, porque era de parte de Dios, para entregarlos en mano, ya que habían buscado a los dioses de Edom.
  alternative_spanish_readings:
  - Amasías no escuchó, porque Dios lo permitió...
  - Amasías no quiso escuchar, porque Dios lo había dispuesto...
  rationale: 'La traducción conserva la tensión del texto: la negativa de Amasías se presenta como procedente de Dios, y eso conduce a su entrega por causa de la idolatría. No se suaviza a mera permisividad ni se agrega una explicación teológica que el versículo no ofrece.'
  doctrine_reference: Mantener la tensión bíblica entre soberanía divina y culpa humana sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto del audit trail inglés y no introduce cambios sustantivos respecto de la lectura aprobada; se mantiene la causalidad divina, el modismo de «mano» y el valor religioso de דרשׁ.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלֹהִים.
  - Se conserva «dioses» en plural para אֱלֹהֵי אֱדֹום.
  - Se mantiene un español moderno, digno y directamente publicable, sin recurrir a «SEÑOR» como sustituto.
  - El modismo «en mano» queda anclado con nota para preservar la literalidad auditable del hebreo.
