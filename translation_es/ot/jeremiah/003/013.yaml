translation:
  language: es
  text: Solo reconoce tu culpa, que te has rebelado contra Yahvé tu Dios y has esparcido tus caminos entre los extraños[a], debajo de todo árbol frondoso, y no has obedecido mi voz[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has esparcido tus caminos a dioses extraños». El hebreo dice «a/entre extraños», probablemente dentro de la metáfora de adulterio e idolatría, pero no menciona explícitamente «dioses».
    reason: alternative_reading
  - marker: b
    text: «Debajo de todo árbol frondoso» reproduce una fórmula profética recurrente para lugares de culto ilícito.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Solo esto
  lexicon: HALOT
  rationale: 'La partícula restrictiva introduce una limitación enfática: se llama a la persona a hacer esto y nada más aquí. «Solo» comunica bien ese matiz en español sin volver la frase rígida.'
- source_word: דְּעִי
  english_pob_choice: acknowledge
  chosen_spanish: reconoce
  alternatives_spanish:
  - conoce
  - admite
  - reconoce
  lexicon: HALOT
  rationale: El verbo literalmente es «saber/conocer», pero con «tu culpa» funciona como reconocimiento confesional. «Reconoce» conserva esa fuerza de admitirlo ante Dios y suena natural en español bíblico actual.
- source_word: עֲוֺנֵךְ
  english_pob_choice: your guilt
  chosen_spanish: tu culpa
  alternatives_spanish:
  - tu iniquidad
  - tu maldad
  - tu pecado
  lexicon: HALOT
  rationale: Aquí el sentido es de culpa confesable más que de término técnico arcaizante. «Culpa» mantiene el peso moral y el tono de confesión sin perder inteligibilidad.
- source_word: פָּשָׁעַתְּ
  english_pob_choice: you have rebelled
  chosen_spanish: te has rebelado
  alternatives_spanish:
  - has transgredido
  - has sido infiel
  - has quebrantado
  lexicon: HALOT
  rationale: פָּשַׁע expresa rebelión o ruptura de lealtad, especialmente en contexto de pacto. «Te has rebelado» conserva mejor el matiz de desafío contra la autoridad legítima.
- source_word: בַּיהוָה אֱלֹהַיִךְ
  english_pob_choice: against Yahweh your God
  chosen_spanish: contra Yahvé tu Dios
  alternatives_spanish:
  - contra Yahvé, tu Dios
  - contra el Señor tu Dios
  lexicon: HALOT
  rationale: 'La preposición con פשע tiene valor adversativo: «contra». Se mantiene «Yahvé» según la norma del proyecto, y «tu Dios» preserva la relación de pacto.'
- source_word: וַתְּפַזְּרִי
  english_pob_choice: scattered
  chosen_spanish: has esparcido
  alternatives_spanish:
  - has dispersado
  - has repartido
  - has extendido
  lexicon: HALOT
  rationale: El verbo significa esparcir/dispersar. «Has esparcido» suena natural en español y conserva la imagen de multiplicar o repartir errantemente los caminos.
- source_word: אֶת דְּרָכַיִךְ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tu conducta
  - tus sendas
  - tu manera de vivir
  lexicon: HALOT
  rationale: «Caminos» reproduce el hebraísmo de conducta o manera de proceder sin explicarlo demasiado. En español conserva la metáfora bíblica y permite que el contexto la precise.
- source_word: לַזָּרִים
  english_pob_choice: among strangers
  chosen_spanish: entre los extraños
  alternatives_spanish:
  - entre extranjeros
  - a los extraños
  - a los extraños dioses
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a/para los extraños». Siguiendo la revisión inglesa que naturaliza la idea sin explicitar «dioses», «entre los extraños» preserva la imagen de dispersión en relaciones ilícitas o idólatras sin resolver la ambigüedad interpretativa.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - bajo todo árbol verde
  - bajo cada árbol frondoso
  - debajo de todo árbol verde
  lexicon: HALOT
  rationale: Es una fórmula profética fija para lugares de culto ilícito. «Frondoso» comunica bien el valor de עַנָּן/rַעֲנָן y evita la literalidad poco natural de «verde» en este contexto.
- source_word: וּבְקוֹלִי לֹא שְׁמַעְתֶּם
  english_pob_choice: you have not obeyed my voice
  chosen_spanish: y no has escuchado mi voz
  alternatives_spanish:
  - y no me has escuchado
  - y no has obedecido mi voz
  - y no habéis escuchado mi voz
  lexicon: HALOT
  rationale: El hebreo «oír la voz» puede implicar obedecer. «Escuchar mi voz» conserva el idioma original y sigue siendo claro en español; se mantiene la forma singular del discurso directo como en el texto hebreo transmitido, sin forzar la corrección al plural del contexto inmediato.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - declara el Señor
  lexicon: HALOT
  rationale: Es la fórmula profética habitual. «Declara Yahvé» es formal, breve y fiel al valor de enunciación solemne del hebreo.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa «Yahvé» para el Tetragrámaton. Se mantiene esa decisión para transparencia textual y coherencia con la política terminológica establecida, evitando el ocultamiento mediante «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Explicitar o no la alusión idólatra en לַזָּרִים
  english_pob_reading: to strangers / among strangers
  chosen_spanish_reading: entre los extraños
  alternative_spanish_readings:
  - a los extraños
  - entre extranjeros
  - a extraños dioses
  rationale: El contexto amplio apunta a infidelidad e idolatría, pero el hebreo no dice explícitamente «dioses». Se conserva la ambigüedad del texto, porque resolverla en la línea principal iría más allá de la evidencia lexical. La formulación española mantiene la tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Valor de שָׁמַע / escuchar en contexto de pacto
  english_pob_reading: you have not obeyed my voice
  chosen_spanish_reading: no has escuchado mi voz
  alternative_spanish_readings:
  - no me has obedecido
  - no has obedecido mi voz
  rationale: El hebreo usa el idiomático «oír la voz». En español, «escuchar mi voz» preserva la imagen auditiva primaria y deja que el contexto de reproche covenantal produzca la implicación de desobediencia, sin perder naturalidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2: Preserve source imagery unless clarity requires expansion'
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje hebreo de Jeremías 3:13 y el aparato inglés auditado. La revisión inglesa reciente ajustó «to strangers» a «among strangers» para mayor naturalidad; en español se reflejó con «entre los extraños». También se preservó la decisión auditada de no explicitar «dioses» en la línea principal, reservando la posibilidad interpretativa en nota, y se mantuvo la forma de la fórmula profética final.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se evitó «Señor» como sustituto del nombre divino.
  - Se mantuvo el registro bíblico moderno y solemne, sin calcos innecesarios.
  - Se conservó la ambigüedad de לַזָּרִים en el cuerpo principal.
  - La forma singular de la segunda persona en español sigue de cerca el hebreo transmitido, aunque el contexto inmediato en hebreo mezcla número gramatical.
