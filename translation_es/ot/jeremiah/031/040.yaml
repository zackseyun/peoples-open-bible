base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/040.yaml
  text: And the whole valley of the corpses and the ashes[a], and all the terraces as far as the Kidron Valley, as far as the corner of the Horse Gate toward the east, shall be holy to Yahweh[c][b]. It shall not be uprooted or overthrown again forever.
  footnotes:
  - marker: a
    text: Or 'fields' or 'slopes' for the difficult Hebrew term traditionally understood of the terraced areas around Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''Kidron Valley'' could also be rendered ''Kidron Brook,'' since the Hebrew term can refer to a wadi or seasonal watercourse as well as its valley.'
    reason: lexical_alternative
  - marker: c
    text: Or 'shall not be plucked up or torn down ever again.'
    reason: lexical_alternative
