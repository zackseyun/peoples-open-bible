    text: O ‘el arca’, si se toma el término hebreo de manera más literal; aquí se refiere al recipiente de las ofrendas, no al arca del pacto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘plata’; en este contexto administrativo la palabra se refiere al dinero reunido.
    reason: lexical_alternative
  revision_rationale: Se cambió ‘arca’ por ‘cofre’ para reflejar la decisión contextual principal y evitar una confusión teológica innecesaria con el arca del pacto, conservando ‘arca’ como alternativa más literal en nota. Se sustituyó ‘al encargo del rey’ por ‘a la supervisión del rey’ para expresar mejor el sentido administrativo de פְּקֻדַּת הַמֶּלֶךְ. Se corrigió ‘entraban’ a ‘venían’ para ajustarse al verbo hebreo. También se pulió la fluidez con ‘día tras día’ y con pronombres más naturales (‘lo llevaban’).
