translation:
  language: es
  text: Por su aliento los cielos quedan hermoseados[a]; su mano atravesó[b] la serpiente fugitiva[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por su Espíritu» o «Por su viento». La palabra hebrea puede significar aliento, viento o espíritu.
    reason: lexical_alternative
  - marker: b
    text: O «su mano formó la serpiente fugitiva». El verbo puede entenderse de otra manera, aunque «atravesó» encaja mejor con la imaginería de combate de la línea.
    reason: alternative_reading
  - marker: c
    text: «La serpiente fugitiva» probablemente evoca una serpiente cósmica de caos; compárese Isaías 27:1.
    reason: cross_reference
lexical_decisions:
- source_word: בְּרוּחוֹ
  english_pob_choice: By his breath
  chosen_spanish: Con su aliento
  alternatives_spanish:
  - Por su Espíritu
  - Con su viento
  lexicon: HALOT
  rationale: רוּחַ puede significar aliento, viento o espíritu. En este contexto poético de acción creadora, «aliento» conserva la imagen viva e instrumental del hebreo sin decidir de antemano por una lectura personal de «Espíritu».
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «los cielos», que suena natural en español y mantiene el registro elevado y cósmico del poema.
- source_word: שִׁפְרָה
  english_pob_choice: are made fair
  chosen_spanish: se embellecen
  alternatives_spanish:
  - son hechos hermosos
  - se hacen resplandecientes
  - se vuelven bellos
  lexicon: HALOT
  rationale: La forma expresa un resultado de belleza o esplendor. «Se embellecen» comunica ese efecto de manera clara y poética en español sin forzar una paráfrasis.
- source_word: חֹלֲלָה
  english_pob_choice: pierced
  chosen_spanish: atravesó
  alternatives_spanish:
  - hirió
  - perforó
  - formó
  lexicon: HALOT
  rationale: La POB inglesa opta por «pierced» para sostener la imaginería de combate. En español, «atravesó» conserva la acción violenta y la fuerza poética mejor que una lectura más neutra como «formó».
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su diestra
  - su poder
  lexicon: HALOT
  rationale: «Mano» preserva la imagen corporal concreta del hebreo y su valor de acción/poder. No se sustituye por una abstracción para no perder la vividez del verso.
- source_word: נָחָשׁ בָּרִיחַ
  english_pob_choice: the fleeing serpent
  chosen_spanish: la serpiente fugitiva
  alternatives_spanish:
  - la serpiente huidiza
  - la serpiente que huye
  - Leviatán
  lexicon: HALOT
  rationale: «בָּרִיחַ» admite la idea de huida o deslizamiento; la POB inglesa eligió «fleeing serpent» y se mantiene esa imagen. «Serpiente fugitiva» es fiel y deja abierta la referencia sin identificarla más allá del texto.
theological_decisions:
- issue: 'Sentido de רוּחַ: ¿«Espíritu» o «aliento»?'
  english_pob_reading: Rendered 'breath' in the main text
  chosen_spanish_reading: Se traduce «aliento» en el texto principal
  alternative_spanish_readings:
  - Espíritu
  - viento
  rationale: El hebreo permite esas tres opciones, pero el contexto no obliga a una referencia explícita al Espíritu Santo. «Aliento» mantiene la tensión lexical y el lenguaje de poder creador sin adelantar una interpretación doctrinal.
  doctrine_reference: Translation philosophy §3
- issue: 'Identidad de la serpiente: ¿nombrarla como Leviatán, Satanás o conservar la imagen?'
  english_pob_reading: Kept as 'the fleeing serpent'
  chosen_spanish_reading: Se conserva «la serpiente fugitiva»
  alternative_spanish_readings:
  - Leviatán
  - una serpiente de caos mítica
  - Satanás (lectura tipológica)
  rationale: El versículo presenta imaginería de combate cósmico, pero no identifica explícitamente a la serpiente con Satanás. La traducción mantiene la imagen y evita resolver el referente más allá de lo que el texto dice.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; el estado más reciente indica que el texto permaneció sin cambios y con alta concordancia entre revisores.
  spanish_consistency_notes:
  - Se mantuvo «cielos» en plural para reflejar שָׁמַיִם.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton; el referente es la acción de Dios implícita en el poema.
  - «Aliento» conserva la ambigüedad de רוּחַ sin fijarla como término técnico.
  - «La serpiente fugitiva» sigue la decisión auditada de la POB inglesa y no interpreta el referente en el texto principal.
