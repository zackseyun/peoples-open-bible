translation:
  language: es
  text: Porque no fija más tiempo a un hombre para ir ante Dios en juicio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque no fija un tiempo más para que un hombre vaya ante Dios en juicio». El hebreo es difícil y comprimido; el sentido probable es que Dios no necesita conceder una audiencia adicional ni un aplazamiento antes de juzgar.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del enunciado anterior; en español, «Porque» conserva bien ese valor causal/discursivo.
- source_word: לֹא
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es que
  - nunca
  lexicon: HALOT
  rationale: Negación simple y directa, acorde con la concisión del hebreo.
- source_word: עַל אִישׁ
  english_pob_choice: for a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - para un hombre
  - sobre un hombre
  lexicon: HALOT
  rationale: Con שׂים, עַל puede marcar lo que se pone o se impone sobre alguien. En español, «a un hombre» mantiene la referencia humana sin forzar una preposición interpretativa demasiado explícita.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino del hebreo como genérico, siguiendo la decisión inglesa de no neutralizar indebidamente el sustantivo.
- source_word: יָשִׂים
  english_pob_choice: set
  chosen_spanish: fija
  alternatives_spanish:
  - pone
  - determina
  - señala
  lexicon: HALOT
  rationale: El verbo es amplio («poner, colocar, establecer»). Aquí el contexto judicial sugiere establecer o fijar un plazo; «fija» expresa con naturalidad ese matiz sin añadir demasiado.
- source_word: עוֹד
  english_pob_choice: a time
  chosen_spanish: más tiempo
  alternatives_spanish:
  - tiempo adicional
  - todavía
  lexicon: HALOT
  rationale: El hebreo es difícil y comprimido. Siguiendo la nota inglesa, se entiende la idea de un plazo o demora adicional; «más tiempo» preserva esa noción sin resolver en exceso la elipsis.
- source_word: לַהֲלֹךְ
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para presentarse
  - para acudir
  lexicon: HALOT
  rationale: Infinitivo de הלך. En español, «ir» mantiene la sencillez del verbo y funciona con el marco judicial del verso.
- source_word: אֶל אֵל
  english_pob_choice: before God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - delante de Dios
  lexicon: HALOT
  rationale: Literalmente es «a Dios»; en español, «a Dios» respeta mejor la estructura de movimiento del hebreo. La lectura judicial queda disponible por el contexto y por la frase final.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en juicio
  alternatives_spanish:
  - en el juicio
  - para juicio
  - en un proceso judicial
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser «juicio, justicia» o un procedimiento legal. «En juicio» conserva la fuerza forense y la ambigüedad útil del hebreo.
theological_decisions:
- issue: Sentido de la cláusula difícil con עוֹד y el objeto implícito de יָשִׂים
  english_pob_reading: God does not need to appoint a further time for a man to appear before him for judgment.
  chosen_spanish_reading: Dios no necesita fijar un tiempo adicional para que el hombre vaya a él en juicio.
  alternative_spanish_readings:
  - Dios no establece una nueva cita para que el hombre comparezca ante él en juicio.
  - No le concede más plazo al hombre para ir a Dios en juicio.
  rationale: El hebreo es compacto y permite más de una reconstrucción. La versión española conserva la idea de una demora/plazo adicional sin eliminar la tensión del pasaje ni sobreexplicarlo. La redacción principal mantiene el sentido judicial general y deja abierta la precisión del objeto implícito.
  doctrine_reference: Translation philosophy §3; preservar la tensión textual y no resolver la ambigüedad más allá de lo que el hebreo permite.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta redacción sigue la lectura auditada sin introducir ajustes no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, no «Yahvé», porque el hebreo aquí usa אֵל y la propia auditoría inglesa lo entiende como God, no como el nombre divino.
  - Se conserva el campo forense con «juicio» para מִשְׁפָּט, evitando «justicia» por su mayor ambigüedad en este contexto.
  - Se usa un masculino genérico («un hombre») en coherencia con el hebreo אִישׁ y con la decisión inglesa documentada.
  - La frase «a Dios en juicio» reproduce la compresión del hebreo sin añadir explícitamente «ante», aunque esa sería una glosa posible en español.
