translation:
  language: es
  text: 'Pero el hombre de Dios dijo al rey[a]: «Si me dieras la mitad de tu casa, no iría contigo, ni comería pan ni bebería agua en este lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la mitad de tu casa». La frase puede implicar idiomáticamente una recompensa o patrimonio muy grande, pero la traducción conserva el giro literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Conserva la expresión hebrea convencional y su fuerza bíblica establecida. «Hombre de Dios» es más directo que «profeta de Dios» y evita introducir una interpretación que el hebreo no explicita aquí.
- source_word: אִם תִּתֶּן לִי אֶת חֲצִי בֵיתֶךָ
  english_pob_choice: If you were to give me half your house
  chosen_spanish: Si me dieras la mitad de tu casa
  alternatives_spanish:
  - Si me dieras la mitad de tus posesiones
  - Si me dieras la mitad de tu patrimonio
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «casa» y la hipérbole de «la mitad» sin expandirla a «posesiones» o «patrimonio». El subjuntivo imperfecto en español comunica bien la condición hipotética del original.
- source_word: בֵיתֶךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa/tu hogar
  - tu casa/tu hacienda
  lexicon: HALOT
  rationale: «Casa» reproduce el término hebreo básico y permite en español tanto el sentido literal como la posible amplitud idiomática del ofrecimiento real sin forzar una explicación.
- source_word: לֹא אָבֹא עִמָּךְ
  english_pob_choice: I would not go with you
  chosen_spanish: no iría contigo
  alternatives_spanish:
  - no vendría contigo
  - no iré contigo
  lexicon: HALOT
  rationale: «Iría» traslada con naturalidad el valor condicional del inglés y del hebreo. «Contigo» conserva la relación de acompañamiento sin perder claridad en español.
- source_word: לֹא אֹכַל לֶחֶם
  english_pob_choice: nor would I eat bread
  chosen_spanish: ni comería pan
  alternatives_spanish:
  - ni comería comida
  - ni tomaría alimento
  lexicon: HALOT
  rationale: «Pan» conserva el término literal לֶחֶם y su valor de alimento básico. Se evita generalizar a «comida» para no perder la textura del hebreo.
- source_word: לֹא אֶשְׁתֶּה מַּיִם
  english_pob_choice: or drink water
  chosen_spanish: ni bebería agua
  alternatives_spanish:
  - ni bebería agua en absoluto
  - ni siquiera bebería agua
  lexicon: HALOT
  rationale: La coordinación con «ni» mantiene el paralelismo negativo del hebreo. «Agua» es una traducción directa y natural.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en este sitio
  lexicon: HALOT
  rationale: «En este lugar» conserva el demostrativo y el matiz enfático del hebreo mejor que un simple «aquí», al tiempo que resulta natural en español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y mantiene la elección literal de «casa» para חֲצִי בֵיתֶךָ, en continuidad con el registro de la POB inglesa y sin cambios detectados en la última revisión.
  spanish_consistency_notes:
  - Se mantiene «hombre de Dios» como expresión bíblica estable.
  - Se conserva «casa» y no se amplía a «posesiones» para respetar la imagen hebrea.
  - El paralelismo negativo se vierte con «ni... ni...».
  - El tono es sobrio y publicable en español neutral, sin arcaísmos innecesarios.
