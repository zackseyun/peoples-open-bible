translation:
  language: es
  text: Y, adelantándose corriendo, le informó a Juan en Gazara que su padre y sus hermanos habían perecido[a], y que había enviado a alguien para matarte también.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa más literal: «y que te ha enviado también para ser matado». El griego deja implícito el objeto de «había enviado»; aquí se añade «a alguien» para que la frase suene natural en español, sin cambiar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προδραμὼν
  english_pob_choice: ran on ahead
  chosen_spanish: corrió delante
  alternatives_spanish:
  - corrió adelante
  - se adelantó corriendo
  - fue delante con prisa
  lexicon: LSJ
  rationale: El participio expresa ir adelante con rapidez. «Corrió delante» conserva el movimiento y la urgencia sin sonar forzado en español.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: lo informó
  alternatives_spanish:
  - lo reportó
  - lo comunicó
  - le dio aviso
  lexicon: BDAG
  rationale: El verbo indica llevar un mensaje o noticia. «Lo informó» funciona bien en español moderno y mantiene el tono de aviso formal sin exagerarlo.
- source_word: εἰς Γάζαρα
  english_pob_choice: in Gazara
  chosen_spanish: en Gazara
  alternatives_spanish:
  - a Gazara
  - hasta Gazara
  lexicon: LSJ
  rationale: Con el contexto de localizar a Juan, la referencia espacial se entiende naturalmente en español como «en Gazara».
- source_word: ἀπώλετο
  english_pob_choice: had perished
  chosen_spanish: habían perecido
  alternatives_spanish:
  - habían muerto
  - habían perecido en la muerte
  - habían sido destruidos
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí comunica muerte violenta o pérdida fatal sin precisar el mecanismo. «Habían perecido» conserva esa fuerza y evita especificar más de lo que el griego dice.
- source_word: Ἀπέσταλκεν
  english_pob_choice: he had sent men
  chosen_spanish: había enviado
  alternatives_spanish:
  - había mandado
  - había despachado
  lexicon: BDAG
  rationale: El perfecto señala una acción ya realizada con efecto presente. El griego no expresa explícitamente el objeto de «enviar»; en español se omite para no añadir «hombres» sin base directa, dejando que el infinitivo siguiente complete el sentido.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill you also
  chosen_spanish: a matarte
  alternatives_spanish:
  - para matarte
  - a darte muerte también
  lexicon: BDAG
  rationale: ἀποκτείνω significa «matar». «A matarte» sigue el giro natural del infinitivo final en español y conserva el objetivo del envío.
translation_notes:
  revision_awareness: Se integró el aviso del audit trail sobre el objeto implícito de Ἀπέσταλκεν, pero se optó por una redacción española que preserve la ambigüedad del griego en vez de especificar «hombres».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «perecido» para reflejar la muerte violenta sin introducir un matiz doctrinal no presente en el texto.
  - Se evitó «Cristo/Mesías» y otros términos teológicos no pertinentes al versículo.
  - «Gazara» se conservó como transliteración estable del topónimo, coherente con el contexto histórico.
