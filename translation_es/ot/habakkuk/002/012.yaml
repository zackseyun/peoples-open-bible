translation:
  language: es
  text: ¡Ay de quien edifica una ciudad con derramamiento de sangre[a] y establece una ciudad[b] con injusticia!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con sangres», un modismo para derramamiento de sangre o culpa de sangre.'
    reason: lexical_alternative
  - marker: b
    text: O «funda una ciudad» para «establece una ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay del que...!
  - ¡Ay de quien...!
  lexicon: Interjección profética de denuncia y juicio
  rationale: ‘Woe’ en el inglés POB expresa una exclamación profética de condena, no solo tristeza. En español, ‘¡Ay de...!’ transmite bien ese tono de denuncia/jamamiento oracular. Se mantiene la estructura impersonal para conservar el paralelismo con el participio hebreo.
- source_word: בֹּנֶה
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - está construyendo
  - edifica
  lexicon: Participio qal usado de modo descriptivo
  rationale: El hebreo presenta al agente como ‘el que edifica’. ‘Edifica’ conserva el valor verbal y el registro sobrio del oráculo. ‘Construye’ sería correcto, pero ‘edifica’ suena más natural en español bíblico sin volverse arcaizante.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - una ciudad
  - una población
  - una urbe
  lexicon: עִיר = ciudad
  rationale: ‘Ciudad’ es el equivalente directo y claro. Se conserva el sustantivo principal del paralelismo sin introducir matices innecesarios.
- source_word: בְּדָמִים
  english_pob_choice: with bloodshed
  chosen_spanish: con derramamiento de sangre
  alternatives_spanish:
  - con sangre
  - mediante sangre
  - con sangre derramada
  lexicon: Plural idiomático de ‘sangres’ para violencia/culpa de sangre
  rationale: El plural hebreo no se vierte literalmente como ‘sangres’ porque en español sería opaco. ‘Derramamiento de sangre’ comunica el sentido idiomático de violencia culpable y preserva la fuerza del juicio. En la nota se deja abierta la alternativa más literal para no borrar la tensión léxica.
- source_word: וְכוֹנֵן
  english_pob_choice: and establishes
  chosen_spanish: y establece
  alternatives_spanish:
  - y funda
  - y asienta
  - y hace firme
  lexicon: כּוּן en sentido de fijar/establecer firmemente
  rationale: ‘Establece’ reproduce bien la idea de dar firmeza o permanencia a la obra urbana. Es paralela a ‘edifica’ y refleja el carácter de consolidación del verbo hebreo.
- source_word: קִרְיָה
  english_pob_choice: town
  chosen_spanish: una población
  alternatives_spanish:
  - una ciudad
  - un poblado
  - una villa
  lexicon: Término poético/near-synonym de עִיר
  rationale: El inglés POB varía entre ‘city’ y ‘town’ para reflejar el paralelismo. En español, ‘población’ permite mantener la variación sin repetir ‘ciudad’, aunque también puede entenderse como asentamiento urbano. Se deja la alternativa ‘ciudad’ en nota por ser semánticamente plausible.
- source_word: בְּעַוְלָה
  english_pob_choice: by injustice
  chosen_spanish: con injusticia
  alternatives_spanish:
  - por injusticia
  - mediante injusticia
  - con maldad
  lexicon: עַוְלָה = injusticia, torcedura moral
  rationale: ‘Con injusticia’ conserva el valor instrumental del prefijo בְּ. ‘Injusticia’ es la opción más directa para el sustantivo hebreo y mantiene la acusación ética del versículo.
theological_decisions:
- issue: Tono profético de condena
  english_pob_reading: A prophetic woe against violent and unjust empire-building
  chosen_spanish_reading: Una denuncia profética contra la construcción de una ciudad mediante violencia e injusticia
  alternative_spanish_readings:
  - Un lamento general por la corrupción cívica
  - Una maldición contra una ciudad violenta
  rationale: 'La versión española conserva el tono de juicio y denuncia del hebreo, sin convertirlo en una simple queja moral. No se especifica un sistema histórico concreto más allá de lo que el texto afirma: construcción urbana asentada sobre sangre e injusticia.'
  doctrine_reference: Principio de lectura llana del texto profético; no añadir sistematizaciones posteriores
translation_notes:
  revision_awareness: El texto base en inglés no requirió cambios en la revisión más reciente; la presente propuesta mantiene esa lectura estable y traslada sus decisiones léxicas al español con equivalentes naturales y auditables.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ o sustituciones litúrgicas porque el verso no contiene el nombre divino.
  - ‘Ciudad’ y ‘población’ mantienen el paralelismo de עִיר / קִרְיָה sin forzar sinónimos idénticos.
  - ‘Con derramamiento de sangre’ explicita el modismo hebreo sin perder su fuerza condenatoria.
  - El tono exclamativo de ‘¡Ay de...!’ corresponde al oráculo de juicio del hebreo הוֹי.
