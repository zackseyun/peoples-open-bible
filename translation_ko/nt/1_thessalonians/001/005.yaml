id: 1TH.1.5
reference: 1 Thessalonians 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι τὸ εὐαγγέλιον ἡμῶν οὐκ ἐγενήθη εἰς ὑμᾶς ἐν λόγῳ μόνον ἀλλὰ καὶ ἐν δυνάμει καὶ ἐν πνεύματι ἁγίῳ ⸀καὶ πληροφορίᾳ πολλῇ, καθὼς οἴδατε οἷοι ἐγενήθημεν ⸀ἐν ὑμῖν δι’ ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/005.yaml
  text: because our gospel did not come to you in word only[a], but also in power and in the Holy Spirit and with great conviction[b], just as you know what kind of men we proved to be among you for your sake.
  footnotes:
  - marker: a
    text: Or ‘with great conviction’ or ‘with much certainty’ for ‘with great full assurance.’
    reason: lexical_alternative
  - marker: b
    text: Or ‘what sort of people we proved to be among you.’
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 복음이 여러분에게 말로만이 아니라 능력과 성령과 큰 확신[a] 가운데 임하였기 때문입니다. 여러분이 아시는 대로 우리는 여러분 가운데서 여러분을 위하여 어떠한 사람[b]이 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「큰 충만한 확신」, 「많은 확신」. 헬라어 πληροφορία πολλή는 확신·확실성의 충만함을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「어떤 부류의 사람들」. 헬라어 οἷοι는 인격과 됨됨이의 성격을 묻는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_korean: 복음
  alternatives_korean:
  - 좋은 소식
  lexicon: BDAG
  rationale: 바울 신학의 무게를 담은 정립된 한국어 어휘.
- source_word: ἐγενήθη εἰς ὑμᾶς
  english_pob_choice: did not come to you
  chosen_korean: 여러분에게 임하였기
  alternatives_korean:
  - 여러분에게 이르렀기
  - 여러분 가운데 나타났기
  lexicon: BDAG
  rationale: γίνομαι + εἰς는 복음이 청중에게 도달·역사함을 가리킨다. 「임하다」는 신적 효력을 동반한 도래를 자연스럽게 담는다.
- source_word: ἐν λόγῳ μόνον
  english_pob_choice: in word only
  chosen_korean: 말로만
  alternatives_korean:
  - 말씀으로만
  - 언어로만
  lexicon: BDAG
  rationale: 단순한 말 자체와 동반된 신적 능력의 대조. 「말로만」이 한국어로 가장 분명한 대조를 만든다.
- source_word: ἐν δυνάμει
  english_pob_choice: in power
  chosen_korean: 능력과
  alternatives_korean:
  - 능력 가운데
  lexicon: BDAG
  rationale: 한국어 어순상 세 개의 ἐν 구를 「~과 ~과 ~ 가운데」로 묶어 병렬의 리듬을 보존한다.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_korean: 성령과
  alternatives_korean:
  - 거룩한 영
  lexicon: BDAG
  rationale: 글로사리 기본값에 따라 신적 영의 의미가 분명한 문맥에서는 「성령」을 채택한다. 본문은 단순한 영적 분위기가 아닌 신적 행위 주체를 가리킨다.
- source_word: πληροφορίᾳ πολλῇ
  english_pob_choice: with great conviction
  chosen_korean: 큰 확신
  alternatives_korean:
  - 큰 충만한 확신
  - 많은 확실성
  lexicon: BDAG
  rationale: πληροφορία는 확신·확실성의 충만함을 의미한다. 「확신」이 가장 일상적이고 분명한 한국어 등가어이며, 폭넓은 의미는 각주로 살린다.
- source_word: καθὼς οἴδατε
  english_pob_choice: just as you know
  chosen_korean: 여러분이 아시는 대로
  alternatives_korean:
  - 여러분이 아는 바와 같이
  lexicon: BDAG
  rationale: καθώς의 비교·확증 어감을 「~대로」로 자연스럽게 옮기며, 합쇼체 경어 「아시는」을 사용한다.
- source_word: οἷοι ἐγενήθημεν
  english_pob_choice: what kind of men we proved to be
  chosen_korean: 어떠한 사람이 되었습니다
  alternatives_korean:
  - 어떤 사람이 되었는지를
  - 어떤 부류의 사람이었는지를
  lexicon: BDAG
  rationale: οἷοι는 인격과 됨됨이의 성격을 묻는다. 「어떠한 사람」이 자연스럽고, ἐγενήθημεν의 「되다」를 보존하여 한국어 종결로 마무리한다. 한국어 「사람」은 성별 중립이지만 본문에서는 바울 일행을 가리키므로 의미 손실은 없다.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_korean: 여러분 가운데서
  alternatives_korean:
  - 여러분 안에서
  - 여러분과 함께
  lexicon: BDAG
  rationale: 처소·공동체 가운데의 어감으로 「가운데서」가 가장 자연스럽다.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 여러분 때문에
  - 여러분을 위해
  lexicon: BDAG
  rationale: διά + 대격이 목적·유익을 가리키는 문맥. 한국어 「~을 위하여」가 그 의미를 가장 잘 담는다.
theological_decisions:
- issue: πνεῦμα ἅγιον의 신적 영으로서의 의미
  chosen_reading: 성령
  alternative_readings:
  - 거룩한 영
  - 영적 능력
  rationale: 무관사형이지만 바울 용법과 문맥(능력·확신의 동반)에서 신적 행위 주체로서의 성령을 가리킨다. 글로사리 기본값(divine context → 성령)을 따른다.
  doctrine_reference: 'DOCTRINE.md: Affirmations; KOREAN_PIPELINE.md Glossary — πνεῦμα'
