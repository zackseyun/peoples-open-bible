  text: וּ/בָרָ֣א יְהוָ֡ה עַל֩ כָּל מְכ֨וֹן הַר צִיּ֜וֹן וְ/עַל מִקְרָאֶ֗/הָ עָנָ֤ן יוֹמָם֙ וְ/עָשָׁ֔ן וְ/נֹ֛גַהּ אֵ֥שׁ לֶהָבָ֖ה לָ֑יְלָה כִּ֥י עַל כָּל כָּב֖וֹד חֻפָּֽה־־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/004/005.yaml
  text: Then Yahweh will create over the whole site of Mount Zion and over her assemblies a cloud by day[a], and smoke, and the brightness of a flaming fire by night[d][c][b]; for over all the glory there will be a canopy.
  footnotes:
  - marker: a
    text: Or 'her convocations.' The Hebrew term can refer to appointed assemblies or gatherings called together.
    reason: lexical_alternative
  - marker: b
    text: Or 'the glow of a blazing fire by night.'
    reason: lexical_alternative
  - marker: c
    text: The imagery recalls the LORD's cloud and fire in the wilderness (for example, Exodus 13:21–22).
    reason: cross_reference
  - marker: d
    text: Or 'a covering'; the Hebrew can also suggest a wedding canopy.
    reason: lexical_alternative
