translation:
  language: es
  text: Entonces se levantó y se fue[a], y Jonatán entró en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Se fue» reproduce de manera natural el valor de וַיֵּלַךְ en este contexto de separación; también podría traducirse «partió» o «se marchó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then he arose
  chosen_spanish: Entonces se levantó
  alternatives_spanish:
  - Entonces se puso de pie
  - Entonces se alzó
  lexicon: HALOT
  rationale: El wayyiqtol de קום introduce avance narrativo y expresa la acción de levantarse o ponerse en pie. «Se levantó» conserva ese valor narrativo con un español natural y digno.
- source_word: וַיֵּלַךְ
  english_pob_choice: and went away
  chosen_spanish: y se fue
  alternatives_spanish:
  - y partió
  - y se marchó
  lexicon: HALOT
  rationale: En este contexto de separación, הלך no solo indica movimiento sino alejamiento. «Se fue» reproduce bien el valor de salida sin sobrecargar el texto.
- source_word: וִיהוֹנָתָן
  english_pob_choice: and Jonathan
  chosen_spanish: y Jonatán
  alternatives_spanish:
  - y Jonathan
  lexicon: Nombre propio
  rationale: Se usa la forma española habitual «Jonatán», plenamente reconocible y fiel al nombre propio hebreo.
- source_word: בָּא
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - vino a
  - llegó a
  lexicon: HALOT
  rationale: בוא con destino concreto expresa entrada o llegada. «Entró» sigue de cerca el sentido del inglés auditado «entered» y funciona bien en español bíblico moderno.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudadela
  - el pueblo
  lexicon: HALOT
  rationale: עיר se traduce de manera directa como «ciudad». No hay indicación aquí de un matiz menor como «pueblo».
translation_notes:
  revision_awareness: El inglés auditado pasó de «went into the city» a «entered the city» para reflejar con más naturalidad בָּא הָעִיר. La versión española adopta directamente esa decisión con «entró en la ciudad», manteniendo el avance narrativo de los dos verbos previos.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jonatán» en forma española usual.
  - Se evita la traducción mecánica de הלך con un calco rígido; el español requiere un verbo de salida contextualizado.
  - La secuencia verbal conserva el valor narrativo de los wayyiqtol hebreos.
  - No hay tensiones doctrinales en este versículo.
