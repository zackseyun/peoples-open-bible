translation:
  language: es
  text: Amalec habita[a] en la tierra del Négueb[b], y los hititas, los jebuseos y los amorreos habitan en la región montañosa, y los cananeos habitan junto al mar y a lo largo del Jordán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vive» en todo el versículo; el participio hebreo enfatiza residencia estable.
    reason: lexical_alternative
  - marker: b
    text: «Négueb» también puede traducirse «sur» o «región del sur», pero aquí probablemente designa la zona geográfica concreta de Canaán.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «junto al lado del Jordán»; idiomáticamente, «junto al Jordán» o «a lo largo del Jordán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalec
  lexicon: HALOT
  rationale: Nombre propio étnico; en español se adapta la transliteración a la forma de uso bíblico estándar sin perder la referencia al pueblo.
- source_word: יוֹשֵׁב / יֹשֵׁב
  english_pob_choice: lives
  chosen_spanish: habita
  alternatives_spanish:
  - vive
  - mora
  - reside
  lexicon: HALOT
  rationale: El participio expresa residencia asentada. «Habita» conserva ese matiz mejor que un verbo meramente circunstancial y suena natural en español bíblico contemporáneo.
- source_word: בְּאֶרֶץ הַנֶּגֶב
  english_pob_choice: in the land of the Negev
  chosen_spanish: en la tierra del Négueb
  alternatives_spanish:
  - en el Négueb
  - en la tierra del Neguev
  - en la región del Négueb
  lexicon: HALOT
  rationale: «Négueb» mantiene el valor regional casi propio del hebreo; «tierra de» refleja אֶרֶץ sin volver la frase rígida. Se evita «sur» porque aquí parece tratarse de una región concreta.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - los heteos
  - el hitita
  lexicon: HALOT
  rationale: Como etnónimo colectivo, el plural es el equivalente natural en español; «hititas» es el uso bíblico más reconocible y fiel al referente del grupo.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  lexicon: HALOT
  rationale: Plural étnico español para un colectivo de pueblo, manteniendo la referencia al grupo habitante de la zona.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Plural étnico español para un pueblo; conserva el valor colectivo que el hebreo comunica en este contexto geográfico.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en la serranía
  - en la zona montañosa
  lexicon: HALOT
  rationale: El hebreo puede referirse al macizo o zona alta de la región; en español «región montañosa» comunica el sentido geográfico sin forzar «montes» ni sonar demasiado técnico.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Etnónimo colectivo en plural, que es la forma natural en español para referirse al pueblo.
- source_word: עַל הַיָּם
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - por el mar
  - al lado del mar
  - sobre el mar
  lexicon: HALOT
  rationale: La preposición expresa ubicación adyacente; «junto al mar» es claro y no introduce especificaciones como costa o litoral que no están en el hebreo.
- source_word: וְעַל יַד הַיַּרְדֵּן
  english_pob_choice: along the Jordan
  chosen_spanish: y junto al Jordán
  alternatives_spanish:
  - y al lado del Jordán
  - y a lo largo del Jordán
  - y junto a la ribera del Jordán
  lexicon: HALOT
  rationale: «יַד» en este modismo denota el lado o zona contigua. «Junto al Jordán» conserva la idea de proximidad lineal y evita añadir una imagen más específica que la del texto.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de una formulación más literal ('along the side of the Jordan') a una más natural ('along the Jordan'). La versión española sigue esa misma dirección, usando «junto al Jordán» para mantener el sentido idiomático sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se conservan nombres propios y etnónimos en forma española bíblica estándar.
  - «Habita» se usa de manera uniforme para el participio de יָשַׁב, siguiendo la residencia estable indicada por el hebreo.
  - «Junto al Jordán» refleja la revisión inglesa hacia una forma más natural sin perder la idea de adyacencia.
  - No se introduce «SEÑOR» ni lenguaje teológico ajeno al versículo.
