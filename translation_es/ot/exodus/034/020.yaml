translation:
  language: es
  text: Redimirás el primogénito de un asno con un cordero[a]; y si no lo redimes, le quebrarás la nuca. Redimirás a todo primogénito de tus hijos varones. Y no se presentarán ante mí[b] con las manos vacías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una oveja» o, más ampliamente, «con un animal del rebaño». El hebreo שֶׂה puede referirse a una oveja o una cabra del rebaño.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ante mi rostro». Es un modismo hebreo para presentarse en la presencia de Dios.
    reason: lexical_alternative
  - marker: c
    text: Es decir, no sin un don u ofrenda.
    reason: cultural_note
lexical_decisions:
- source_word: פֶטֶר חֲמוֹר
  english_pob_choice: the firstborn of a donkey
  chosen_spanish: el primogénito de un asno
  alternatives_spanish:
  - el primer nacido de un asno
  - lo primero que abre el vientre de un asno
  lexicon: HALOT
  rationale: פֶטֶר nombra lo que abre primero el vientre; en este mandato legal, «primogénito» comunica con naturalidad el valor jurídico y cultual. «Asno» mantiene el referente animal explícito del hebreo, como en la traducción inglesa auditada.
- source_word: תִּפְדֶּה
  english_pob_choice: you shall redeem
  chosen_spanish: redimirás
  alternatives_spanish:
  - deberás redimir
  - rescatarás
  lexicon: HALOT
  rationale: En contextos legales y cultuales, פדה expresa redención por sustitución o pago. «Redimirás» conserva mejor ese sentido que «rescatarás», que en español puede sonar más general o menos ritual.
- source_word: בְשֶׂה
  english_pob_choice: with a lamb
  chosen_spanish: con un cordero
  alternatives_spanish:
  - con una oveja
  - con una res menor del rebaño
  lexicon: HALOT
  rationale: שֶׂה puede referirse a una cría del rebaño, oveja o cabra. Siguiendo el criterio de la POB inglesa, «cordero» es la opción más natural y cultual en español, sin negar la amplitud del término hebreo.
- source_word: וַעֲרַפְתּוֹ
  english_pob_choice: you shall break its neck
  chosen_spanish: le quebrarás la nuca
  alternatives_spanish:
  - le quebrarás el cuello
  - lo desnucarás
  lexicon: HALOT
  rationale: ערף apunta específicamente a quebrar el cuello/nuca. «Le quebrarás la nuca» es una forma española precisa y sobria; mantiene la crudeza legal del mandato sin suavizarlo.
- source_word: כֹּל בְּכוֹר בָּנֶיךָ
  english_pob_choice: every firstborn of your sons
  chosen_spanish: todo primogénito de tus hijos
  alternatives_spanish:
  - cada primogénito de tus hijos
  - todo primogénito entre tus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo primogénito de tus hijos», y la POB inglesa preservó el masculino explícito. En español, «hijos» puede funcionar genéricamente; se mantiene la forma más cercana al giro hebreo, aunque no excluye la lectura masculina del texto.
- source_word: יֵרָאוּ פָנַי
  english_pob_choice: shall appear before me
  chosen_spanish: se presentarán ante mí
  alternatives_spanish:
  - aparecerán ante mí
  - se presentarán delante de mi rostro
  lexicon: HALOT
  rationale: La expresión hebrea «ver mi rostro» es un modismo para presentarse ante Dios. «Se presentarán ante mí» comunica el sentido idiomático en español sin perder la relación personal y directa de la primera persona divina.
- source_word: רֵיקָם
  english_pob_choice: empty-handed
  chosen_spanish: vacíos
  alternatives_spanish:
  - con las manos vacías
  - sin ofrenda
  lexicon: HALOT
  rationale: En este contexto de peregrinación y culto, רֵיקָם significa no presentarse sin don u ofrenda. «Vacíos» reproduce el valor semántico básico del hebreo, aunque en español la idea de «manos vacías» sea una aclaración posible.
theological_decisions:
- issue: Presencia divina en la cláusula final
  english_pob_reading: before me
  chosen_spanish_reading: ante mí
  alternative_spanish_readings:
  - delante de mí
  - ante mi presencia
  rationale: El hebreo dice literalmente «mi rostro», pero el sentido idiomático es comparecer en la presencia de Dios. «Ante mí» mantiene la inmediatez de la voz divina sin introducir una formulación más interpretativa que el original.
  doctrine_reference: Principios de traducción POB; tratamiento de expresiones idiomáticas en lenguaje de presencia divina.
- issue: Mantenimiento del masculino explícito en בָּנֶיךָ
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tus hijos, varones
  rationale: El hebreo usa una forma masculina explícita. En español, «hijos» puede abarcar el masculino específico del texto; se evita neutralizarlo con un término más amplio que borraría una distinción marcada por el original.
  doctrine_reference: Principio de fidelidad lexical y de preservación de marcadores gramaticales del original.
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo y con el audit trail inglés en la lectura legal de פדה, en el valor sacrificial de שֶׂה, en el carácter idiomático de יֵרָאוּ פָנַי y en la carga cultual de רֵיקָם. No se aplicaron revisiones posteriores en el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene el registro legal-cultual con verbos en futuro de mandato («redimirás», «quebrarás», «se presentarán»).
  - Se conserva la referencia directa a Dios en primera persona («mí») sin reemplazarla por una fórmula impersonal.
  - La nota [a] preserva la alternativa semántica de שֶׂה que el inglés auditado documenta.
  - La nota [b] distingue el modismo hebreo de su equivalencia española natural.
  - La nota [c] aclara la implicación de ofrenda en el contexto de culto y peregrinación.
