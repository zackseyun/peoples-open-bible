translation:
  language: es
  text: Por mi propia causa[a], por mi propia causa, actuaré; pues ¿cómo podría ser profanado? Y mi gloria no la daré a otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿cómo debería ser profanado mi nombre?». El hebreo deja implícito el objeto.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעֲנִי
  english_pob_choice: for my own sake
  chosen_spanish: por mi propia causa
  alternatives_spanish:
  - por mi propio bien
  - por mi causa
  lexicon: HALOT
  rationale: La repetición enfática del hebreo pide una expresión reflexiva y enfática en español. 'Por mi propia causa' conserva la idea de motivo final y la intensificación de la repetición sin sonar demasiado literal.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will act
  chosen_spanish: actuaré
  alternatives_spanish:
  - haré
  - obraré
  lexicon: HALOT
  rationale: El verbo hebreo es amplio, pero aquí funciona como una declaración divina de intervención decidida. 'Actuaré' comunica bien esa acción intencional sin introducir un objeto no presente.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, 'porque' expresa con naturalidad la relación explicativa que introduce la pregunta retórica siguiente.
- source_word: אֵיךְ
  english_pob_choice: how can
  chosen_spanish: ¿cómo podría
  alternatives_spanish:
  - ¿cómo puede
  - ¿de qué modo podría
  lexicon: HALOT
  rationale: La pregunta es retórica. '¿Cómo podría' mantiene el tono de imposibilidad/incredulidad del hebreo y suena idiomático en español.
- source_word: יֵחָל
  english_pob_choice: it be profaned
  chosen_spanish: ser profanado
  alternatives_spanish:
  - ser deshonrado
  - ser mancillado
  - ser profanado
  lexicon: HALOT
  rationale: El nifal de חלל suele significar 'ser profanado'. En español, 'ser profanado' conserva el campo semántico religioso y la tensión del texto sin resolver el referente implícito.
- source_word: וּכְבוֹדִי
  english_pob_choice: And my glory
  chosen_spanish: Y mi gloria
  alternatives_spanish:
  - y mi honor
  lexicon: HALOT
  rationale: '''Gloria'' es la equivalencia más adecuada para כָּבוֹד en este contexto de autoafirmación divina y se ajusta al uso teológico español.'
- source_word: לְאַחֵר
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro alguno
  - a alguien más
  lexicon: HALOT
  rationale: La forma breve 'a otro' preserva la tersura y el contraste polémico del hebreo, sin precisar más de lo que el texto dice.
- source_word: אֶתֵּן
  english_pob_choice: I will not give
  chosen_spanish: no la daré
  alternatives_spanish:
  - no se la daré
  - no la entregaré
  lexicon: HALOT
  rationale: En español, el verbo 'dar' mantiene la correspondencia formal con נתן y la cláusula final. El pronombre femenino 'la' remite naturalmente a 'mi gloria'.
theological_decisions:
- issue: Objeto implícito de la profanación
  english_pob_reading: Retain the clause without supplying 'my name' in the main text.
  chosen_spanish_reading: 'Mantener la pregunta sin explicitar el objeto: ''¿cómo podría ser profanado?'''
  alternative_spanish_readings:
  - ¿cómo podría ser profanado mi nombre?
  - ¿cómo podría ser profanada mi gloria?
  rationale: El hebreo deja el objeto implícito, y la POB inglesa conserva esa ambigüedad. El español puede hacer lo mismo sin sacrificar claridad; una nota preserva la lectura explícita probable.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión revisada más reciente no introdujo cambios; el pasaje se mantiene conforme al pasaje de alta concordancia, con solo la decisión menor de cómo reflejar en español la ambigüedad del objeto implícito en la pregunta retórica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso no contiene el Tetragrámaton explícito en el texto fuente.
  - Se conservó 'gloria' para כָּבוֹד por coherencia teológica y estilística.
  - Se evitó 'Señor' y otras sustituciones interpretativas que no aparecen en el hebreo.
  - La pregunta retórica se dejó abierta en el cuerpo principal para preservar la tensión textual documentada.
