translation:
  language: es
  text: Y ahora[a], escriban este cántico para ustedes, y enséñenselo a los hijos de Israel; pónganlo en sus bocas, para que este cántico me sirva de testigo[b] contra los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora». El hebreo combina la conjunción con un adverbio temporal que introduce la exhortación con urgencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre los hijos de Israel». El hebreo usa una preposición que puede leerse más literalmente como «en/entre», pero aquí el sentido probable es adversativo: que el cántico sirva de testigo contra ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene el valor de transición y urgencia del hebreo, conservando la conjunción inicial con una forma natural en español.
- source_word: כִּתְבוּ לָכֶם
  english_pob_choice: write this song for yourselves
  chosen_spanish: escriban este cántico para ustedes
  alternatives_spanish:
  - escriban este cántico para sí mismos
  - escriban este canto para ustedes
  lexicon: HALOT
  rationale: El plural imperativo y el dativo reflexivo se reflejan con 'para ustedes'. 'Cántico' funciona bien para un poema/canto sagrado y suena más natural en español bíblico que 'poema'.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: este cántico
  alternatives_spanish:
  - esta canción
  - este canto
  lexicon: HALOT
  rationale: '''שִׁירָה'' se entiende primariamente como canción/cántico. ''Cántico'' conserva el tono litúrgico y poético sin alejarse del sentido directo.'
- source_word: וְלַמְּדָהּ
  english_pob_choice: and teach it
  chosen_spanish: y enséñenselo
  alternatives_spanish:
  - y enséñenla
  - y enséñenlo
  lexicon: HALOT
  rationale: El sufijo femenino remite al 'cántico'. En español, la referencia se expresa de manera natural con 'se lo', evitando una traducción rígida ('enséñenla') que puede sonar poco idiomática para algo que se memoriza y recita.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la forma masculina explícita del hebreo con 'hijos de Israel'. 'Hijos' es una equivalencia tradicional y clara en español, sin neutralizar la forma del original.
- source_word: שִׂימָהּ בְּפִיהֶם
  english_pob_choice: put it in their mouths
  chosen_spanish: pónganlo en su boca
  alternatives_spanish:
  - pónganlo en sus bocas
  - háganlo entrar en su boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo para la idea de memorizar y recitar. En español, el singular genérico 'su boca' suena más natural como idioma colectivo que el plural.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa bien la finalidad del verbo siguiente con un español claro y digno.
- source_word: תִּהְיֶה לִּי
  english_pob_choice: may be a witness for me
  chosen_spanish: me sea por testigo
  alternatives_spanish:
  - sea para mí un testigo
  - me sirva de testigo
  lexicon: HALOT
  rationale: '''Ser por testigo'' conserva la fuerza funcional del hebreo y evita suavizarlo demasiado. ''Me'' refleja el dativo y la dirección del testimonio hacia Yahvé.'
- source_word: לְעֵד
  english_pob_choice: a witness
  chosen_spanish: por testigo
  alternatives_spanish:
  - como testigo
  - por testimonio
  lexicon: HALOT
  rationale: '''עֵד'' se traduce mejor por ''testigo'' en este marco judicial/covenantal. ''Por testigo'' reproduce bien la construcción idiomática en español.'
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: against the sons of Israel
  chosen_spanish: contra los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - en los hijos de Israel
  lexicon: HALOT
  rationale: El contexto del cántico como testimonio de acusación favorece 'contra'. Se mantiene la lectura interpretativa documentada por el POB inglés.
theological_decisions:
- issue: Forma masculina explícita en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel (nota explicativa)
  rationale: Se conserva la forma masculina del hebreo en el texto principal, conforme a la preferencia del proyecto por no neutralizar sin base textual. Dado que 'hijos' puede percibirse como inclusivo o explícitamente masculino según el lector, no se añaden aclaraciones innecesarias en el cuerpo del verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza adversativa de בִּבְנֵי יִשְׂרָאֵל en la cláusula del testigo
  english_pob_reading: against the sons of Israel
  chosen_spanish_reading: contra los hijos de Israel
  alternative_spanish_readings:
  - entre los hijos de Israel
  - en los hijos de Israel
  rationale: El contexto inmediato de advertencia y la función judicial del cántico apoyan la lectura adversativa. Se mantiene la tensión interpretativa del POB inglés en vez de suavizarla a una lectura meramente espacial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se detectaron cambios necesarios en el texto base inglés; esta versión española sigue la lectura auditada sin introducir ampliaciones doctrinales nuevas.'
  spanish_consistency_notes:
  - Se mantuvo 'hijos de Israel' para conservar la forma masculina del original.
  - Se usó 'cántico' en lugar de 'canción' por registro bíblico más adecuado y para reflejar el carácter poético.
  - Se preservó la metáfora corporal de 'ponerlo en su boca', alineada con la nota de recitación/memorización.
  - '''Contra'' refleja la lectura judicial del contexto, no una mera ubicación espacial.'
