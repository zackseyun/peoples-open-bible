review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: una advertencia contra la autoexaltación ante un rey y contra ocupar la posición reservada a personas prominentes. Sin embargo, reemplaza el verbo literal ''estar de pie/ponerse de pie'' por la paráfrasis ''te pongas'', lo cual es aceptable en español pero pierde algo de la imaginería de עמד. También la nota al pie inglesa sobre בִּמְקוֹם גְּדֹלִים no fue preservada, mientras que se añadió una nota sobre ''delante de un rey'' que no refleja la nota del POB inglés.'
  spanish_quality_summary: El español es natural y legible. 'No te engrías' suena idiomático y transmite bien la autoexaltación presuntuosa. No obstante, conviene ajustar la segunda mitad a 'no te pongas de pie en el lugar de los grandes' para reflejar mejor תַּעֲמֹד sin volverla torpe. Además, la documentación interna contiene un error tipográfico ('engrás') que confirma la necesidad de reparación menor.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión 'engreírse' para תִּתְהַדַּר es defendible y fiel al razonamiento auditado. Para גְּדֹלִים, 'los grandes' es una buena solución española, y conviene conservar en nota la alternativa inclusiva/documentada ('personas importantes') junto con 'el lugar de los grandes'.
  issues:
  - severity: medium
    issue: La nota al pie no coincide con la evidencia auditada en inglés.
    rationale: El POB inglés marca una nota en 'a king' solo por anclaje, pero el contenido de la nota trata la expresión בִּמְקוֹם גְּדֹלִים ('in the place of the great' / 'among important people'), no variantes de לִפְנֵי מֶלֶךְ. En español debe preservarse esa alternativa léxica relevante.
  - severity: low
    issue: La segunda cláusula atenúa la imaginería de עמד.
    rationale: '''Ni te pongas en el lugar'' comunica el sentido general, pero עמד es literalmente ''estar de pie'' o ''ponerse de pie''. ''No te pongas de pie en el lugar de los grandes'' conserva mejor la forma verbal y sigue siendo natural en español.'
  - severity: low
    issue: Error tipográfico en la documentación léxica española.
    rationale: La decisión léxica dice 'engrás' en lugar de 'engreírse' o 'te engrías'. Aunque no afecta directamente el texto principal, indica necesidad de corrección editorial.
  revised_spanish_text: No te engrías delante de un rey, ni te pongas de pie en el lugar[a] de los grandes.
  revised_footnotes:
  - marker: a
    text: O «en el lugar de los grandes» o «entre personas importantes».
