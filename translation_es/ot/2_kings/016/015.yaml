  text: Then King Ahaz commanded Uriah the priest[a], saying, “On the great altar offer up the morning burnt offering and the evening grain offering, and the king’s burnt offering and his grain offering, and the burnt offering of all the people of the land and their grain offerings and their drink offerings; and throw on it all the blood of the burnt offering and all the blood of the sacrifice. But the bronze altar shall be for me to inquire by.”
