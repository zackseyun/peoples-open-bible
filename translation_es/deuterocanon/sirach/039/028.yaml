revisions:
- from: Hay espíritus creados para juicio[a], y en su ira hacen temblar montes; en el tiempo de la furia muestran su poder[b], y provocan una tormenta desde el campo abierto.
  to: Hay espíritus creados para juicio[a], y en su ira mueven montes; en el tiempo de la ira muestran su poder[b], y levantan una tormenta desde campo abierto.
  rationale: Se ajustó 'hacen temblar montes' a 'mueven montes' para reflejar mejor הרים יעתיקו y el audit trail inglés. Se cambió 'furia' por 'ira' para mayor coherencia semántica y registro bíblico. Se suavizó la última frase con 'levantan una tormenta desde campo abierto', que conserva la imagen de שדה/open country con mejor naturalidad en español.
