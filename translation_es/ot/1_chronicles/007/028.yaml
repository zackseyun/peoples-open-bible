base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/007/028.yaml
  text: Their holdings and settlements were Bethel and its daughter towns[a], and to the east Naaran, and to the west Gezer and its daughter towns, and Shechem and its daughter towns[c][b], as far as Ayyah and its daughter towns.
  footnotes:
  - marker: a
    text: Naaran is rendered by some as 'Naarah' based on a related place-name tradition elsewhere.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'daughter towns' is an idiom for smaller dependent towns or villages belonging to a larger city.
    reason: cultural_note
  - marker: c
    text: The Hebrew text reads 'Ayyah'; some ancient witnesses and translations instead reflect 'Gaza.'
    reason: textual_variant
