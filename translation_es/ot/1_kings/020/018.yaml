review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el sentido del hebreo: dos condiciones paralelas y el mismo mandato de capturarlos vivos en ambos casos. También preserva bien la repetición retórica del mandato. La nota alternativa refleja adecuadamente las opciones léxicas del inglés auditado.'
  spanish_quality_summary: El texto es claro, pero «para paz» y «para batalla» suenan poco naturales en español bíblico actual. «En son de paz» y «a la batalla» conservan el propósito/intención del hebreo con mejor legibilidad. El resto del versículo es sólido y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. «Captúrenlos vivos» es adecuado para תפשׂוּם חַיִּים. La revisión propuesta mejora la idiomaticidad sin apartarse de las decisiones léxicas documentadas.
  issues:
