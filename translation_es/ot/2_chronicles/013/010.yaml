translation:
  language: es
  text: Pero en cuanto a nosotros[a], Yahvé es nuestro Dios, y no lo hemos abandonado; y los sacerdotes que ministran a Yahvé son los hijos de Aarón, y los levitas están en su labor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero nosotros».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «los levitas en la labor», es decir, ocupados en su servicio asignado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  english_pob_choice: But as for us
  chosen_spanish: Pero en cuanto a nosotros
  alternatives_spanish:
  - Pero nosotros
  - Y nosotros
  lexicon: HALOT
  rationale: La construcción introduce contraste discursivo con el grupo previo; «en cuanto a nosotros» reproduce bien el valor contrastivo de la combinación hebrea sin sonar mecánica en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton según la convención POB en español: «Yahvé», en lugar de una sustitución titulada o una transliteración tradicional distinta.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológico, el referente es singular y pactal; «nuestro Dios» expresa con naturalidad el valor monoteísta del texto.
- source_word: וְלֹא עֲזַבְנֻהוּ
  english_pob_choice: and we have not forsaken him
  chosen_spanish: y no lo hemos abandonado
  alternatives_spanish:
  - y no lo hemos forsacado
  - y no lo abandonamos
  lexicon: HALOT
  rationale: «Abandonar» comunica de forma clara la fuerza de עזב en este contexto de fidelidad al pacto. Se evita un calco duro y también una formulación arcaizante; el matiz de «forsake» queda preservado por la negación con valor de lealtad continua.
- source_word: וְכֹהֲנִים
  english_pob_choice: and the priests
  chosen_spanish: y los sacerdotes
  alternatives_spanish:
  - y sacerdotes
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente natural en español para el oficio cultual mencionado; se mantiene el artículo por la lectura de clase definida en el contexto.
- source_word: מְשָׁרְתִים
  english_pob_choice: who minister
  chosen_spanish: que ministran
  alternatives_spanish:
  - que sirven
  - sirviendo
  lexicon: HALOT
  rationale: Se conserva el valor de servicio litúrgico con «ministran», término más específico que el genérico «sirven» y más fiel al contexto sacerdotal.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: El ל marca dirección/relación del servicio rendido al destinatario; en español, «a Yahvé» suena natural con «ministran» y mantiene la orientación del servicio.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: Se preserva la expresión hereditaria literal del hebreo, importante para la línea sacerdotal; «descendientes» sería más interpretativo.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levitas
  lexicon: HALOT
  rationale: Se mantiene el grupo levítico como clase cultual reconocible en español con la forma estándar «levitas».
- source_word: בַּמְלָאכֶת
  english_pob_choice: in their work
  chosen_spanish: en su labor
  alternatives_spanish:
  - en su trabajo
  - en su servicio
  - en sus tareas
  lexicon: HALOT
  rationale: «Labor» conserva el sentido de tarea asignada o cometido oficial en un registro digno; evita reducir el término a mera ocupación manual y funciona bien en contexto cultual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención POB de usar el nombre divino en transliteración reverente y transparente, sin ocultarlo detrás de un título. «Yahvé» es la forma establecida en el proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de fidelidad del perfecto hebreo en וְלֹא עֲזַבְנֻהוּ
  english_pob_reading: we have not forsaken him
  chosen_spanish_reading: no lo hemos abandonado
  alternative_spanish_readings:
  - no lo abandonamos
  - no lo hemos forsacado
  rationale: El perfecto hebreo en esta afirmación retórica expresa continuidad de lealtad, no solo un hecho pasado. El pretérito perfecto compuesto español transmite mejor esa persistencia de fidelidad pactal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés revisado: conserva el contraste inicial, el nombre divino sin sustitución titulada, el matiz de fidelidad continua en «no lo hemos abandonado» y la estructura cultual de sacerdotes y levitas, con un registro español natural y publicable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la terminología POB en español.
  - Se mantiene «Dios» para אֱלֹהֵים en singular referencial.
  - «Sacerdotes» y «levitas» reflejan el léxico cultual estándar sin reformular el texto.
  - «Labor» se escogió para reproducir el campo semántico de מְלָאכָה sin caer en un calco rígido.
