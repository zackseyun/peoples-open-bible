translation:
  language: es
  text: Y sucederá que, si no te creen y no escuchan la voz de la primera señal, creerán la voz de la señal posterior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Posterior» refleja el hebreo אַחֲרוֹן sin implicar necesariamente que no pueda haber otra señal después.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula narrativa/condicional hebrea introduce el resultado de la hipótesis. «Sucederá» preserva el valor de acontecimiento futuro sin sonar rígido en español.
- source_word: יַאֲמִינוּ לָךְ
  english_pob_choice: they do not believe you
  chosen_spanish: no te creen
  alternatives_spanish:
  - no confían en ti
  - no te creen a ti
  lexicon: HALOT
  rationale: El Hiphil de אמן con ל expresa creer o confiar en alguien. En este contexto, «te creen» comunica de forma natural la aceptación del testimonio de Moisés.
- source_word: יִשְׁמְעוּ
  english_pob_choice: listen
  chosen_spanish: escuchan
  alternatives_spanish:
  - oyen
  - hacen caso
  lexicon: HALOT
  rationale: Con «la voz de la señal», el verbo tiene valor de atención receptiva, no solo de percepción auditiva. «Escuchan» mantiene esa idea sin forzar obediencia explícita.
- source_word: לְקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - el mensaje de
  lexicon: HALOT
  rationale: «Voz» conserva la imagen hebrea de la señal como si hablara evidencialmente. No se reduce a «mensaje», porque eso aplanaría la metáfora del texto.
- source_word: הָאֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - señal milagrosa
  lexicon: HALOT
  rationale: «Señal» es un equivalente claro y bíblico en español. En este contexto puede implicar un prodigio, pero el hebreo no añade aquí el adjetivo «milagrosa».
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la primera señal
  - la anterior
  lexicon: HALOT
  rationale: רִאשׁוֹן significa «primero/primera». El femenino concuerda con «señal» y mantiene el contraste ordinal directo.
- source_word: וְהֶאֱמִינוּ
  english_pob_choice: then they will believe
  chosen_spanish: creerán
  alternatives_spanish:
  - y creerán
  - entonces creerán
  lexicon: HALOT
  rationale: El verbo continúa la secuencia condicional como resultado esperado. En español, el futuro simple ya puede expresar esa consecuencia sin añadir una partícula innecesaria.
- source_word: הָאַחֲרוֹן
  english_pob_choice: the latter
  chosen_spanish: la señal posterior
  alternatives_spanish:
  - la última señal
  - la señal siguiente
  lexicon: HALOT
  rationale: אַחֲרוֹן puede significar «posterior» o «último». Se eligió «posterior» para evitar sugerir finalidad absoluta y conservar la precisión del contraste con «la primera».
translation_notes:
  revision_awareness: 'Se siguió el ajuste final del audit trail en inglés: la oposición entre «the first sign» y «the latter sign» se mantuvo como contraste ordinal preciso, evitando «última» por su posible matiz de final definitivo. La traducción española conserva la estructura condicional del hebreo y la metáfora de la «voz» de la señal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma predeterminada del proyecto para el tetragrámaton, aunque en este versículo no aparece.
  - «Señal» se usó de manera consistente para אֹת.
  - El español conserva el paralelismo entre «la primera señal» y «la señal posterior» sin intensificar el texto con explicaciones ajenas al verso.
