revisions:
- from: Entonces pasaron hombres madianitas, comerciantes[a]; y sacaron a José y lo subieron[b] del pozo, y vendieron a José a los ismaelitas por veinte de plata[c]. Luego llevaron a José a Egipto.
  to: Entonces pasaron hombres madianitas[a], comerciantes; y sacaron a José y lo subieron del pozo, y vendieron a José a los ismaelitas por veinte piezas de plata[b][c]. Luego llevaron a José a Egipto.
  rationale: Se ajusta una expresión poco natural ('veinte de plata') a un español claro y fiel, manteniendo la elipsis hebrea en nota. También se restaura la nota importante del expediente inglés sobre la ambigüedad de los sujetos plurales, sin resolverla en el texto. El resto del verso puede conservarse con cambios mínimos.
