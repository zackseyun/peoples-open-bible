base_translation:
  language: en
  yaml_path: translation/ot/genesis/027/029.yaml
  text: Let peoples serve you[a], and nations bow down to you. Be master over your brothers, and let your mother's sons bow down to you. Cursed be those who curse you[b], and blessed be those who bless you.
  footnotes:
  - marker: a
    text: Or 'pay homage to you' for the repeated 'bow down to you.' The Hebrew verb can denote prostration before a superior, whether human or divine; here the context favors homage rather than worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'Be lord over your brothers.' 'Master' is used in the main text to avoid confusion with the divine title 'Lord.'
    reason: lexical_alternative
