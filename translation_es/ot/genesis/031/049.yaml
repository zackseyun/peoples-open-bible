translation:
  language: es
  text: 'Y Mizpá[a], porque dijo: «Yahvé vigile entre mí y ti cuando estemos ocultos[b] el uno del otro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mizpá suena como el hebreo relacionado con ‘vigilar’ o ‘atalaya’, lo que enlaza el nombre del lugar con la frase «Yahvé vigile».
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando estemos fuera de la vista el uno del otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמִּצְפָּה
  english_pob_choice: And Mizpah
  chosen_spanish: Y Mizpá
  alternatives_spanish:
  - Y la atalaya
  - Y el puesto de observación
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración, porque aquí funciona como topónimo y la frase mantiene el juego de palabras con la raíz de ‘vigilar’. En español, «Mizpá» es la forma más clara y publicable para el nombre.
- source_word: אֲשֶׁר אָמַר
  english_pob_choice: because he said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - ya que dijo
  lexicon: HALOT
  rationale: La secuencia introduce la explicación del nombre. «Porque dijo» reproduce la relación explicativa sin añadir elementos no expresos, como ‘lo llamó’.
- source_word: יִצֶף
  english_pob_choice: watch
  chosen_spanish: vigile
  alternatives_spanish:
  - vigile atentamente
  - esté vigilando
  lexicon: HALOT
  rationale: El jussivo expresa un deseo o ruego de vigilancia. «Vigile» conserva el valor exhortativo y suena natural en español; además mantiene el vínculo semántico con Mizpá/צפה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre yo y tú
  - entre nosotros
  lexicon: HALOT
  rationale: En español, el orden natural es «entre tú y yo». Aunque invierte el orden hebreo, comunica con claridad la relación recíproca sin pérdida de sentido.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - mientras
  - si
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal bajo la cual ocurre la vigilancia. «Cuando» expresa mejor ese valor en español que un causal «porque».
- source_word: נִסָּתֵר
  english_pob_choice: we are hidden
  chosen_spanish: estemos ocultos
  alternatives_spanish:
  - estemos escondidos
  - seamos ocultados
  lexicon: HALOT
  rationale: El nifal expresa quedar ocultos o fuera de la vista. «Estemos ocultos» conserva el matiz pasivo/reflexivo y resulta idiomático en la cláusula temporal.
- source_word: אִישׁ מֵרֵעֵהוּ
  english_pob_choice: from each other
  chosen_spanish: uno del otro
  alternatives_spanish:
  - el uno del otro
  - de su compañero
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y recíproca. «Uno del otro» comunica bien la separación mutua sin sobrecargar el texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La base auditada del POB opta por transliterar el Nombre. En español, «Yahvé» es la forma coherente con esa decisión y con la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada de «keep watch» a «watch» por naturalidad. En español se optó por «vigile», que conserva la fuerza del jussivo y la conexión etimológica con Mizpá sin volver la frase mecánica. También se preservó la estructura explicativa breve del hebreo, sin introducir ‘lo llamó’ porque no aparece de forma explícita en el versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Nombre divino, conforme al criterio del proyecto.
  - Se transliteró «Mizpá» como topónimo y se explicó el juego de palabras en nota.
  - La cláusula final se mantuvo recíproca y sobria, sin ampliar más allá del sentido de ‘ocultos uno del otro’.
