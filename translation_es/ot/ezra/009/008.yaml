translation:
  language: es
  text: Pero ahora, por un breve momento, ha venido un favor de parte de Yahvé nuestro Dios, para dejarnos un remanente que ha escapado y para darnos una estaca[a] en su lugar santo, para que nuestro Dios alumbre nuestros ojos[b] y nos dé un poco de vida en nuestra esclavitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un apoyo firme'; el hebreo conserva la imagen concreta de algo fijado firmemente en un lugar.
    reason: lexical_alternative
  - marker: b
    text: O 'dé luz a nuestros ojos'; este modismo expresa vitalidad o esperanza renovadas.
    reason: lexical_alternative
  - marker: c
    text: O 'en nuestra servidumbre' o 'en nuestra esclavitud'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְחִנָּה
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - misericordia
  - súplica
  lexicon: HALOT
  rationale: En este contexto la idea no es la acción de rogar, sino el favor concedido por Yahvé. 'Favor' conserva el matiz de benevolencia otorgada sin introducir una carga teológica posterior que en español podría sugerir 'gracia'.
- source_word: פְּלֵיטָה
  english_pob_choice: a remnant that has escaped
  chosen_spanish: un remanente que escapó
  alternatives_spanish:
  - unos sobrevivientes
  - un remanente de escapados
  - unos que sobrevivieron
  lexicon: HALOT
  rationale: El hebreo señala a los que escaparon o sobrevivieron. 'Remanente' mantiene la resonancia histórico-covenantal, y 'que escapó' preserva el valor de supervivencia sin diluir el sentido colectivo.
- source_word: יָתֵד
  english_pob_choice: a peg
  chosen_spanish: un apoyo
  alternatives_spanish:
  - una estaca
  - un clavo
  - un punto de apoyo
  lexicon: HALOT
  rationale: La imagen hebrea es concreta, pero en español 'un apoyo' comunica mejor la función metafórica de algo firme y fijado. Se conserva la idea de estabilidad que el POB inglés mantiene con 'peg', aunque aquí se adapta para evitar una imagen oscura o poco natural en español.
- source_word: בִּמְקוֹם קָדְשׁוֹ
  english_pob_choice: in his holy place
  chosen_spanish: en su lugar santo
  alternatives_spanish:
  - en su santo lugar
  - en su santuario
  - en su lugar sagrado
  lexicon: HALOT
  rationale: '''Lugar santo'' reproduce con naturalidad la construcción hebrea y conserva la referencia al espacio sagrado sin especificar más de lo que el texto dice. ''Santuario'' sería interpretativamente posible, pero más explícito que el hebreo.'
- source_word: לְהָאִיר עֵינֵינוּ
  english_pob_choice: brighten our eyes
  chosen_spanish: nos ilumine los ojos
  alternatives_spanish:
  - alumbre nuestros ojos
  - dé luz a nuestros ojos
  - restaure nuestro ánimo
  lexicon: HALOT
  rationale: La expresión conserva el giro idiomático del hebreo. 'Ilumine los ojos' mantiene la metáfora y sigue siendo natural en español, dejando abierta la idea de renovar vida, esperanza o ánimo sin explicitarla demasiado.
- source_word: מִחְיָה
  english_pob_choice: reviving
  chosen_spanish: revivificación
  alternatives_spanish:
  - revivimiento
  - renuevo
  - renovación de vida
  lexicon: HALOT
  rationale: El sustantivo apunta a preservación o restauración de vida. 'Revivificación' conserva el valor de reanimación o restauración vital de modo más preciso que una simple 'renovación', aunque sigue siendo una opción algo formal para respetar el peso del término.
- source_word: בְּעַבְדֻתֵנוּ
  english_pob_choice: in our slavery
  chosen_spanish: en nuestra esclavitud
  alternatives_spanish:
  - en nuestra servidumbre
  - en nuestra servidumbre forzada
  - en nuestro cautiverio
  lexicon: HALOT
  rationale: Se conserva la fuerza del término con 'esclavitud', como hace el POB inglés con 'slavery'. Esto mantiene el sentido de sujeción real bajo dominio imperial y evita suavizarlo con 'servicio' o 'servidumbre'.
- source_word: כִּמְעַט רֶגַע
  english_pob_choice: for a brief moment
  chosen_spanish: por un breve momento
  alternatives_spanish:
  - por un instante breve
  - por un momento corto
  - por poco tiempo
  lexicon: HALOT
  rationale: La combinación enfatiza brevedad e insignificancia temporal. 'Por un breve momento' es idiomático en español y conserva la restricción temporal.
- source_word: הָיְתָה ... מֵאֵת יְהוָה אֱלֹהֵינוּ
  english_pob_choice: has come from Yahweh our God
  chosen_spanish: ha venido de Yahvé nuestro Dios
  alternatives_spanish:
  - ha sido concedido por Yahvé nuestro Dios
  - ha provenido de Yahvé nuestro Dios
  - nos ha venido de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: '''Ha venido de'' reproduce bien la procedencia expresada por מֵאֵת y suena natural en español. Mantiene la idea de que el favor no es humano sino que procede de Yahvé.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto para el Tetragrámaton es traducirlo como 'Yahvé'. Se preserva así el nombre propio del pacto sin el reemplazo litúrgico por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de 'favor' frente a 'gracia'
  english_pob_reading: favor has come from Yahweh our God
  chosen_spanish_reading: ha venido favor de Yahvé nuestro Dios
  alternative_spanish_readings:
  - ha venido gracia de Yahvé nuestro Dios
  - ha venido misericordia de Yahvé nuestro Dios
  rationale: El hebreo תְחִנָּה en este contexto comunica benevolencia concedida. 'Favor' preserva esa lectura sin cargar la frase con el lenguaje técnico de 'gracia', aunque este último sería posible en otros contextos.
  doctrine_reference: HALOT; contextual decision in Ezra 9:8
- issue: Imagen concreta de יָתֵד
  english_pob_reading: a peg
  chosen_spanish_reading: un apoyo
  alternative_spanish_readings:
  - una estaca
  - un clavo
  - un punto de apoyo
  rationale: Aunque el inglés POB conserva la imagen concreta, en español una equivalencia demasiado literal puede sonar opaca. 'Un apoyo' expone la función metafórica del objeto fijado sin traicionar su sentido de estabilidad en un lugar santo.
  doctrine_reference: HALOT; lexical metaphor management
- issue: בְּעַבְדֻתֵנוּ y la fuerza social del término
  english_pob_reading: in our slavery
  chosen_spanish_reading: en nuestra esclavitud
  alternative_spanish_readings:
  - en nuestra servidumbre
  - en nuestra bondage
  rationale: La traducción conserva la dureza del estado de sujeción y evita eufemismos. Esto protege la tensión histórica del texto sobre la situación del pueblo bajo dominio extranjero.
  doctrine_reference: HALOT; socio-historical context of post-exilic subjection
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente del inglés marcó el pasaje como sin cambios y con alto grado de acuerdo entre revisores; por eso no se introdujeron ajustes textuales novedosos, solo se adaptó la traducción española al mismo perfil léxico y teológico auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se conservó 'favor' para תְחִנָּה y 'esclavitud' para בְּעַבְדֻתֵנוּ, en línea con la fuerza semántica documentada.
  - La metáfora de 'iluminar los ojos' se dejó explícita sin sustituirla por una paráfrasis interpretativa.
  - El sustantivo 'remanente' reproduce la lectura histórico-covenantal del grupo preservado.
  - La nota sobre 'apoyo' recoge la alternativa concreta del hebreo para יָתֵד sin duplicar marcadores.
