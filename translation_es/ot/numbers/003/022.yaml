    rationale: Es entendible, pero 'de un mes de edad en adelante' expresa con mayor claridad la fórmula hebrea fija de edad mínima en contextos censales.
  revised_spanish_text: Los inscritos[a] de ellos, según el número de todo varón de un mes de edad en adelante, eran siete mil quinientos.
