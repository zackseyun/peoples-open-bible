    changes_summary: Changed 'nor even' to 'or even' for more natural English after the negative clause 'did not know,' while preserving the sense and completeness of the Hebrew.
translation:
  language: es
  text: Y todos los de aquella generación también fueron reunidos con sus padres[a], y se levantó otra generación después de ellos, que no conocía a Yahvé[b], ni siquiera la obra que él había hecho para Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «fueron reunidos con sus padres», un modismo para morir y reunirse con sus antepasados.'
    reason: cultural_note
  - marker: b
    text: 'O: «no reconocía a Yahvé»; el hebreo puede indicar conocimiento relacional o de pacto, no solo información factual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: and ... also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: La partícula añade énfasis e inclusión; en español, "también" reproduce esa función sin recargar la sintaxis. Mantiene el enlace con el contexto anterior.
- source_word: כָּל הַדּוֹר הַהוּא
  english_pob_choice: that generation
  chosen_spanish: toda aquella generación
  alternatives_spanish:
  - aquella generación
  - toda esa generación
  lexicon: HALOT
  rationale: '"דור" se refiere al grupo humano de una época; "generación" es el equivalente natural. "Toda aquella" conserva el alcance total del hebreo y la referencia anafórica.'
- source_word: נֶאֶסְפוּ אֶל אֲבוֹתָיו
  english_pob_choice: were gathered to their fathers
  chosen_spanish: fue reunida con sus padres
  alternatives_spanish:
  - fue reunida con sus antepasados
  - murió y fue reunida con sus padres
  lexicon: HALOT
  rationale: Se conserva el idiomismo hebreo de reunión con los padres, entendido como muerte y reunión con los antepasados. En español, "fue reunida con sus padres" mantiene la forma figurada sin explicitar de más el sentido.
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - surgió
  - apareció
  lexicon: HALOT
  rationale: El verbo narrativo de emergencia de una nueva generación admite "se levantó" en español bíblico moderno y mantiene la imagen de surgimiento.
- source_word: דּוֹר אַחֵר
  english_pob_choice: another generation
  chosen_spanish: otra generación
  alternatives_spanish:
  - una generación distinta
  - una generación posterior
  lexicon: HALOT
  rationale: '"Otra generación" expresa con naturalidad la sucesión de un nuevo grupo humano.'
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: después de ellos
  alternatives_spanish:
  - tras ellos
  - a continuación de ellos
  lexicon: HALOT
  rationale: La sucesión temporal queda clara con "después de ellos", una formulación directa y fluida.
- source_word: לֹא יָדְעוּ אֶת יְהוָה
  english_pob_choice: did not know Yahweh
  chosen_spanish: no conocía a Yahvé
  alternatives_spanish:
  - no reconocía a Yahvé
  - no sabía de Yahvé
  lexicon: HALOT
  rationale: '"Conocer" preserva la amplitud relacional/covenantal del hebreo יָדַע. En singular impersonal por concordancia con "generación", se mantiene la persona divina con el nombre de Yahvé según el estándar del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el uso por defecto del proyecto para el nombre divino, sin sustituirlo por una convención de ocultamiento.
- source_word: וְגַם אֶת הַמַּעֲשֶׂה
  english_pob_choice: or even the work
  chosen_spanish: ni siquiera la obra
  alternatives_spanish:
  - ni la obra
  - y ni siquiera la obra
  lexicon: HALOT
  rationale: Después de la negación, "ni siquiera" expresa la fuerza aditiva-negativa que el audit trail inglés resolvió con "or even". "Obra" traduce מַעֲשֶׂה con un sustantivo natural y suficientemente amplio.
- source_word: אֲשֶׁר עָשָׂה לְיִשְׂרָאֵל
  english_pob_choice: that he had done for Israel
  chosen_spanish: que él había hecho para Israel
  alternatives_spanish:
  - que había hecho por Israel
  - que hizo para Israel
  lexicon: HALOT
  rationale: La preposición ל en este contexto es benefactiva; "para Israel" conserva esa dirección favorable. El pluscuamperfecto sigue el valor narrativo-retrospectivo del inglés POB y del hebreo en contexto.
theological_decisions:
- issue: Meaning of 'did not know the LORD'
  english_pob_reading: Covenantal/relational ignorance is left broad in the main text
  chosen_spanish_reading: La ignorancia no se reduce a datos; se deja abierta la dimensión relacional y de lealtad de pacto.
  alternative_spanish_readings:
  - no tenía conocimiento factual de Yahvé
  - no obedecía a Yahvé
  rationale: El hebreo יָדַע puede implicar conocimiento relacional, reconocimiento y lealtad pactal. La traducción mantiene esa amplitud sin resolver la tensión hacia una sola interpretación.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre divino según la política del proyecto, evitando la convención de máscara litúrgica.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'nor even' a 'or even' por naturalidad tras la negación. En español, esa relación negativa-aditiva se expresa mejor con 'ni siquiera', que conserva el énfasis sin sonar forzado. La decisión sobre 'to Israel' se mantiene como benefactiva ('para Israel') siguiendo la revisión y el contexto de los actos salvadores en Jueces 2:7.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''generación'' traduce dּוֹר de forma consistente y natural.'
  - '''reunida con sus padres'' preserva el modismo hebreo sin explicarlo en el texto principal.'
  - La concordancia singular ('conocía') se ajusta a 'toda aquella generación' como sujeto colectivo.
