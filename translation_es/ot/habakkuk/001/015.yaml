translation:
  language: es
  text: A todos los saca con un anzuelo[a]; los arrastra con su red y los recoge con su red de arrastre[b]. Por eso se alegra y se regocija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo saca con su red». El hebreo alterna entre imagen colectiva y singular en la presa capturada.'
    reason: lexical_alternative
  - marker: b
    text: 'Aquí aparecen dos términos hebreos distintos para redes de pesca: «red» y «red de arrastre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלֹּה
  english_pob_choice: all of them
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a cada uno de ellos
  lexicon: HALOT
  rationale: El hebreo presenta un objeto colectivo; en español, «a todos» comunica naturalmente ese valor colectivo sin forzar una lectura singular ni perder el movimiento poético.
- source_word: בְּחַכָּה
  english_pob_choice: with a hook
  chosen_spanish: con anzuelo
  alternatives_spanish:
  - con un gancho
  - con un anzuelo de pesca
  lexicon: HALOT
  rationale: חַכָּה es un implemento de pesca. «Anzuelo» es preciso y claro en español, y preserva la imagen sin volverla técnica en exceso.
- source_word: הֵעֲלָה
  english_pob_choice: brings ... up
  chosen_spanish: saca
  alternatives_spanish:
  - hace subir
  - levanta
  lexicon: HALOT
  rationale: El verbo describe hacer salir la presa del agua. «Saca» expresa bien la acción en español y evita una perífrasis más pesada.
- source_word: יְגֹרֵהוּ
  english_pob_choice: he drags them away
  chosen_spanish: los arrastra
  alternatives_spanish:
  - los lleva arrastrando
  - los tira de
  lexicon: HALOT
  rationale: El verbo transmite arrastre violento. «Los arrastra» conserva la fuerza física y encaja con el paralelismo poético.
- source_word: בְחֶרְמוֹ
  english_pob_choice: with his net
  chosen_spanish: con su red
  alternatives_spanish:
  - con su malla
  - con su red de pesca
  lexicon: HALOT
  rationale: חֵרֶם aquí designa una red de pesca. «Red» es la opción más natural y transparente en español, y mantiene el paralelo con el término siguiente.
- source_word: וְיַאַסְפֵהוּ
  english_pob_choice: and gathers them in
  chosen_spanish: y los recoge
  alternatives_spanish:
  - y los reúne
  - y los junta
  lexicon: HALOT
  rationale: אָסַף comunica reunir o recoger. «Los recoge» conserva la idea de juntar la presa después del arrastre, con fluidez en español.
- source_word: בְּמִכְמַרְתּוֹ
  english_pob_choice: with his dragnet
  chosen_spanish: con su red de arrastre
  alternatives_spanish:
  - con su arrastre
  - con su red extendida
  lexicon: HALOT
  rationale: מִכְמֶרֶת es una red de captura distinta de חֵרֶם. «Red de arrastre» distingue bien ambos términos en español y preserva la diferencia léxica señalada en el texto fuente.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La frase marca consecuencia. «Por eso» comunica el enlace causal de forma natural y mantiene el tono poético.
- source_word: יִשְׂמַח
  english_pob_choice: he rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se goza
  - se regocija
  lexicon: HALOT
  rationale: שׂמח es gozo/alegría. «Se alegra» es la forma más directa y clara en español.
- source_word: וְיָגִיל
  english_pob_choice: and exults
  chosen_spanish: y se regocija
  alternatives_spanish:
  - y exulta
  - y salta de gozo
  lexicon: HALOT
  rationale: גיל intensifica la alegría. «Se regocija» eleva el segundo miembro sin caer en un sinónimo demasiado coloquial, y deja visible la progresión intensiva del hebreo.
theological_decisions:
- issue: Imagen metafórica del conquistador como pescador
  english_pob_reading: The verse continues the metaphor of the Chaldean conqueror as a fisherman capturing peoples like fish, without making the imagery literal.
  chosen_spanish_reading: El versículo mantiene la metáfora del conquistador como pescador que captura pueblos como si fueran peces, sin literalizar la imagen.
  alternative_spanish_readings:
  - Imagen de pesca literal sin referencia política
  - Parábola moral general sin referente histórico
  rationale: El contexto inmediato de Habacuc 1:14–17 usa el lenguaje de pesca para describir violencia imperial. La traducción española conserva esa metáfora sin explicarla de más en el texto principal.
  doctrine_reference: Habacuc 1:14–17; metáfora profética de juicio y conquista
translation_notes:
  revision_awareness: La redacción sigue la revisión del texto inglés que corrigió la oscilación entre singular y plural en la presa capturada. En español, se optó por un colectivo plural uniforme («a todos», «los arrastra», «los recoge») para reflejar con claridad el sentido del hebreo sin perder la alternancia imagética.
  spanish_consistency_notes:
  - Se mantiene un español bíblico contemporáneo, claro y digno.
  - Se distingue «red» de «red de arrastre» para reflejar dos lexemas hebreos diferentes.
  - Se preserva el tono poético con verbos breves y paralelismo.
  - No se introduce terminología eclesiástica ajena al contexto profético.
