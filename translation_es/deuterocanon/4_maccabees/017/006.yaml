translation:
  language: es
  text: Porque tu maternidad fue de Abraham, el siervo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el niño». El griego παῖς puede significar «niño» o «siervo»; aquí «siervo» encaja mejor en español y en el contexto reverencial aplicado a Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦ γὰρ
  english_pob_choice: For ... was
  chosen_spanish: Porque ... fue
  alternatives_spanish:
  - Pues ... era
  - Porque ... era
  lexicon: BDAG
  rationale: γάρ aporta una relación explicativa, bien expresada por «porque». El imperfecto de εἰμί se vierte con pasado simple o imperfecto según el contexto; aquí «fue» mantiene la afirmación breve y solemne del griego.
- source_word: ἡ παιδοποιία
  english_pob_choice: your childbearing
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu concepción
  - tu maternidad
  - tu fecundidad
  lexicon: LSJ
  rationale: El sustantivo puede referirse a la generación/bear de hijos, pero en español «childbearing» suena más técnico que natural. Dado que el contexto apunta a linaje/origen familiar, «descendencia» comunica mejor la idea de origen de la línea familiar sin forzar un matiz biológico más estrecho de lo que el verso exige.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - tuya
  lexicon: BDAG
  rationale: Pronombre posesivo de segunda persona singular, dirigido directamente a la mujer del contexto.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - procedente de
  - desde
  lexicon: BDAG
  rationale: Aquí marca origen o procedencia; en español «de» es la forma más natural para expresar pertenencia o procedencia genealógica.
- source_word: Ἀβραὰμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: transliteration
  rationale: Nombre propio estándar en español.
- source_word: τοῦ παιδός
  english_pob_choice: the child / the servant
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el servidor
  - el siervo
  lexicon: BDAG
  rationale: El griego παῖς admite «niño/niño(a)», «hijo/a» y «siervo/esclavo». Aunque el audit trail inglés reconsidera «servant» y favorece «child», en español la lectura más directa y menos interpretativa es «el niño». Mantiene la ambigüedad léxica sin introducir «siervo», que en esta frase podría sobrerrepresentar un matiz honorífico no explicitado por el verso.
theological_decisions:
- issue: Sentido de παῖς aplicado a Abraham
  english_pob_reading: the child
  chosen_spanish_reading: el niño
  alternative_spanish_readings:
  - el siervo
  - el esclavo
  rationale: La secuencia griega permite varias lecturas. El audit trail inglés osciló entre «servant» y «child», con revisión reciente hacia «child». En español, «el niño» refleja de modo más transparente la opción textual adoptada en la última revisión, sin cerrar del todo el campo semántico del término griego.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión léxica documentada y no resolverla sin base textual'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que cambió «servant» por «child» para reflejar con mayor precisión τοῦ παιδός. La presente versión española sigue esa decisión revisada, pero conserva en nota la alternativa «siervo» porque el término griego sigue siendo semánticamente ambivalente y el contexto no elimina por completo la lectura honorífica.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier máscara para el nombre divino porque no aparece el Tetragrámaton en este verso.
  - Se eligió «descendencia» para expresar el origen genealógico con naturalidad en español, sin expandir el sustantivo griego más allá de lo necesario.
  - Se mantuvo la ambigüedad de παῖς mediante una nota, conforme al principio de no borrar tensiones léxicas documentadas.
