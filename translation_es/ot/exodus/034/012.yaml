translation:
  language: es
  text: Ten cuidado[a], no sea que hagas un pacto[b] con los habitantes de la tierra en la que entras[c], no sea que llegue a ser una trampa[d] en medio de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Guárdate» o «Ten cuidado de ti mismo». La forma hebrea es una advertencia reflexiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cortar un pacto», modismo que significa «hacer un pacto».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a la que vas entrando» o «a la que vas».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «un lazo». La imagen sugiere enredo o tropiezo espiritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Esté atento
  lexicon: HALOT
  rationale: La forma nifal imperativa con לְךָ expresa advertencia reflexiva. «Ten cuidado» transmite bien el tono exhortativo en español sin sonar rígido ni sobrecargar el matiz reflexivo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - lest
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia negativa. En español, «no sea que» reproduce de manera natural ese valor precautorio y puede repetirse como en el hebreo.
- source_word: תִּכְרֹת בְּרִית
  english_pob_choice: you make a covenant
  chosen_spanish: hagas pacto
  alternatives_spanish:
  - hagas un pacto
  - cortes pacto
  lexicon: HALOT
  rationale: כרת ברית es un modismo literal de «cortar pacto», pero en español «hacer pacto» comunica con claridad el sentido convencional. Se conserva «pacto» por fidelidad al campo semántico y por la carga contextual del pasaje.
- source_word: לְיוֹשֵׁב הָאָרֶץ
  english_pob_choice: with the inhabitants of the land
  chosen_spanish: con los habitantes de la tierra
  alternatives_spanish:
  - con los que habitan la tierra
  - con el habitante de la tierra
  lexicon: HALOT
  rationale: El participio singular funciona de modo colectivo. «Habitantes de la tierra» expresa naturalmente el colectivo en español y mantiene la referencia territorial.
- source_word: אֲשֶׁר אַתָּה בָּא עָלֶיהָ
  english_pob_choice: into which you are going
  chosen_spanish: en la que entras
  alternatives_spanish:
  - que estás entrando
  - a la que vas
  lexicon: HALOT
  rationale: La cláusula identifica la tierra hacia la cual Israel se dirige. «En la que entras» suena idiomático y preserva la idea de ingreso inminente sin añadir interpretación.
- source_word: יִהְיֶה
  english_pob_choice: it become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - sea
  - se convierta
  lexicon: HALOT
  rationale: El verbo singular se entiende mejor como referido al pacto mencionado. «Llegue a ser» conserva la idea de devenir en un peligro, con un tono de advertencia acorde al hebreo.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - una red
  lexicon: HALOT
  rationale: מוֹקֵשׁ puede expresarse como «trampa» o «lazo». Aquí se elige «trampa» porque comunica con claridad el peligro de enredo y tropiezo; se mantiene la imagen figurada del término.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu interior
  - entre ustedes
  lexicon: HALOT
  rationale: La expresión apunta a la esfera comunitaria o relacional. «En medio de ti» conserva el valor colectivo y el marco del pueblo, sin psicologizar indebidamente el giro.
theological_decisions:
- issue: Referente del verbo y del predicado final
  english_pob_reading: The covenant with the land's inhabitants is the thing that becomes a snare.
  chosen_spanish_reading: El pacto con los habitantes de la tierra es lo que puede llegar a ser una trampa.
  alternative_spanish_readings:
  - Los habitantes mismos llegan a ser una trampa
  - La situación en general llega a ser una trampa
  rationale: El antecedente más próximo y coherente del verbo singular es el pacto. Esto concuerda con la advertencia del contexto contra alianzas que conduzcan a infidelidad e idolatría, sin desplazar el foco hacia los habitantes como si fueran el sujeto principal.
  doctrine_reference: Ex 34:12; cf. el contexto inmediato de Éxodo 34 sobre separación del pueblo y peligro de compromiso idolátrico.
translation_notes:
  revision_awareness: He seguido el juicio revisado del inglés POB que suaviza el reflejo excesivamente literal de לְךָ y mantiene el resto del versículo con una advertencia breve y natural. También tomé en cuenta la decisión auditada de preservar el modismo de 'cut/make a covenant' como pacto, y el valor metafórico de מוֹקֵשׁ como peligro de enredo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en la obra general, pero en este versículo no aparece el nombre divino explícito.
  - Se conserva el tono admonitorio con repetición de «no sea que», reflejando la estructura hebrea.
  - «Tierra» se mantiene para הָאָרֶץ conforme al contexto de la tierra prometida, sin introducir glosa interpretativa.
  - La puntuación y el orden buscan una lectura pública fluida sin perder la correspondencia con el hebreo.
