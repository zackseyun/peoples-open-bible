revisions:
- from: Y haré con ellos un pacto de paz[a], y quitaré de la tierra animales salvajes dañinos[b]; habitarán con seguridad en el desierto y dormirán en los bosques.
  to: Haré un pacto de paz[a] con ellos, y quitaré de la tierra a los animales salvajes peligrosos[b], para que habiten seguros en el desierto y duerman en los bosques.
  rationale: Se corrigió la relación entre marcadores y contenido de notas para que cada una explique el elemento correcto del texto. También se mejoró la naturalidad del español con 'Haré un pacto de paz con ellos' y se pulió 'dañinos' a 'peligrosos', que suena más idiomático en este contexto. Se mantuvo 'desierto' por ser aceptable y cercano al borrador, aunque 'estepa' o una formulación más amplia también podrían defenderse.
