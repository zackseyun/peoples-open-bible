translation:
  language: es
  text: Y supe que las porciones asignadas a los levitas no habían sido dadas[a], así que los levitas y los cantores que hacían el trabajo huyeron cada uno a su campo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las porciones prescritas» para los levitas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un hombre a su campo»; es decir, cada uno a su propio campo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵדְעָה
  english_pob_choice: And I learned
  chosen_spanish: Y supe
  alternatives_spanish:
  - Y aprendí
  - Y me enteré
  lexicon: HALOT
  rationale: El verbo ידע en este contexto introduce el descubrimiento de una situación. «Supe» comunica la adquisición de conocimiento de manera natural y directa en español, sin volverlo meramente estático.
- source_word: מְנָיוֹת
  english_pob_choice: the portions
  chosen_spanish: las porciones
  alternatives_spanish:
  - las partes
  - las raciones
  - las porciones prescritas
  lexicon: HALOT
  rationale: El sustantivo alude a asignaciones o provisiones debidas a los levitas. «Porciones» conserva la brevedad y encaja bien en el contexto de sustento cultual.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Es el equivalente estándar y más claro del grupo levítico en español bíblico contemporáneo.
- source_word: לֹא נִתָּנָה
  english_pob_choice: had not been given
  chosen_spanish: no habían sido dadas
  alternatives_spanish:
  - no habían sido provistas
  - no se habían dado
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma singular, el referente conceptual es plural («porciones»). El plural español resulta más natural y mantiene el pasivo sin forzar la concordancia.
- source_word: וַיִּבְרְחוּ
  english_pob_choice: had each fled
  chosen_spanish: huyeron cada uno
  alternatives_spanish:
  - habían huido cada uno
  - huyeron
  lexicon: HALOT
  rationale: ברח significa «huir». La frase distributiva se conserva con «cada uno», reflejando el sentido del hebreo junto con אִישׁ.
- source_word: אִישׁ לְשָׂדֵהוּ
  english_pob_choice: to his field
  chosen_spanish: a su campo
  alternatives_spanish:
  - a su propio campo
  - a su terreno
  lexicon: HALOT
  rationale: La expresión idiomática apunta a la propia parcela o terreno agrícola de cada uno. «Campo» es idiomático y natural en español, y comunica la idea sin añadir explicaciones innecesarias.
- source_word: וְהַמְשֹׁרְרִים
  english_pob_choice: and the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores del templo
  - los cantores litúrgicos
  lexicon: HALOT
  rationale: «Cantores» expresa bien el oficio cultual en español y evita una traducción demasiado general si se dijera solo «cantantes».
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: who did the work
  chosen_spanish: que hacían el trabajo
  alternatives_spanish:
  - que hacían la obra
  - los que trabajaban
  lexicon: HALOT
  rationale: El participio describe a quienes estaban ocupados en la labor asignada. «Hacían el trabajo» reproduce la relación participial de manera clara y fiel, sin especificar más de lo que da el hebreo.
theological_decisions:
- issue: Sustento debido a los levitas y su efecto en el servicio del templo
  english_pob_reading: The Levites' portions had not been given, so they and the singers who did the work fled to their fields.
  chosen_spanish_reading: Las porciones de los levitas no habían sido dadas, así que los levitas y los cantores que hacían el trabajo huyeron cada uno a su campo.
  alternative_spanish_readings:
  - las porciones prescritas no habían sido dadas
  - las asignaciones de los levitas no habían sido entregadas
  rationale: 'La versión española mantiene la tensión del texto: no se trata solo de un retraso administrativo, sino de la omisión de un sustento que afectó el servicio levítico. No se suaviza con términos más eclesiásticos o interpretativos.'
  doctrine_reference: Nehemías 13:10; contexto de provisión levítica y servicio del templo
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «for the Levites» a «of the Levites» para reflejar mejor el constructo. La traducción española sigue ese ajuste con «de los levitas» y conserva el sentido distributivo de «each to his field» mediante «cada uno a su campo».
  spanish_consistency_notes:
  - Se mantiene «levitas» y «cantores» de forma consistente para el grupo cultual.
  - «Porciones» se usa para reflejar el sustento asignado sin sustituirlo por terminología eclesiástica posterior.
  - El distributivo hebreo se preserva con «cada uno», evitando perder el matiz individual de la huida.
