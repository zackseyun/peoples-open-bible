translation:
  language: es
  text: ¡Vuélvete, vuélvete, oh sulamita; vuélvete, vuélvete, para que te contemplemos.[a] ¿Por qué miráis a la sulamita como a la danza de Mahanaim?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y te miremos».'
    reason: stylistic_alternative
  - marker: b
    text: 'O: «¿Qué veis en la sulamita?—como la danza de Mahanaim». El hebreo de esta cláusula es difícil, y algunas traducciones entienden la pregunta con «qué» en lugar de «por qué». Mahanaim es probablemente el nombre del lugar Mahanaim; el nombre puede significar «dos campamentos».'
    reason: alternative_reading_and_cultural_note
lexical_decisions:
- source_word: שׁוּבִי
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Vuelve
  - Regresa
  lexicon: HALOT
  rationale: El imperativo femenino singular de שוב pide un mandato directo. En español, «vuélvete» conserva la repetición enfática y puede expresar tanto volver como darse la vuelta, sin fijar innecesariamente si el movimiento es físico o relacional.
- source_word: הַשּׁוּלַמִּית
  english_pob_choice: Shulammite
  chosen_spanish: sulamita
  alternatives_spanish:
  - la sulamita
  - la mujer de Sulam
  lexicon: HALOT
  rationale: Se mantiene el apelativo como transliteración/adaptación del designativo hebreo, siguiendo la práctica del POB de conservar términos nominales ambiguos. «Sulamita» preserva la ambigüedad de si es gentilicio, título o nombre poético.
- source_word: וְנֶחֱזֶה בָּךְ
  english_pob_choice: that we may look at you
  chosen_spanish: para que te contemplemos
  alternatives_spanish:
  - y te veamos
  - para mirarte
  lexicon: HALOT
  rationale: La forma cohortativa expresa finalidad. «Contemplemos» conserva el componente visual y la intensidad poética sin volver el español rígido; la alternativa «mirarte» sería más llana, pero menos solemne.
- source_word: מַה
  english_pob_choice: Why
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Por qué?
  lexicon: HALOT
  rationale: La hebra presenta una dificultad sintáctica reconocida por el POB inglés. Se conserva la posibilidad semántica de «qué» para no cerrar la ambigüedad del original, en lugar de fijar de manera absoluta «por qué».
- source_word: תֶּחֱזוּ
  english_pob_choice: do you look
  chosen_spanish: veis
  alternatives_spanish:
  - miráis
  - contempláis
  lexicon: HALOT
  rationale: El verbo חזה se traduce aquí con un verbo de percepción visual en plural, manteniendo el vínculo léxico con וְנֶחֱזֶה. «Veis» es natural y suficientemente amplio; «miráis» o «contempláis» aumentarían o desplazarían el matiz.
- source_word: כִּמְחֹלַת
  english_pob_choice: as at the dance of
  chosen_spanish: como en la danza de
  alternatives_spanish:
  - como la danza de
  - cual la danza de
  lexicon: HALOT
  rationale: El prefijo comparativo כ se vierte con «como». «En la danza de» reproduce de manera idiomática la comparación con una escena o evento asociado a Mahanaim, sin sobreinterpretar la construcción.
- source_word: הַמַּחֲנָיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanaim
  alternatives_spanish:
  - las dos campamentos
  - los dos campamentos
  lexicon: HALOT
  rationale: Se conserva el topónimo en transliteración. Traducirlo como «los dos campamentos» explicaría el etimológico, pero perdería la probable fuerza de nombre de lugar reconocida por el POB inglés.
theological_decisions:
- issue: Ambigüedad de מַה en la cláusula interrogativa
  english_pob_reading: Why do you look at the Shulammite?
  chosen_spanish_reading: ¿Qué veis en la sulamita?
  alternative_spanish_readings:
  - ¿Por qué miráis a la sulamita?
  - ¿Qué veis en la sulamita—como en la danza de Mahanaim?
  rationale: El hebreo es reconocido como difícil y permite más de una construal. Se opta por una formulación española que preserve la ambigüedad y no cierre de antemano la pregunta, en línea con la nota del POB inglés.
  doctrine_reference: Ninguna; decisión de sintaxis y alcance interrogativo.
translation_notes:
  revision_awareness: Se revisó la formulación para mantener la ambigüedad sintáctica observada en el hebreo y en la nota inglesa, evitando resolverla de manera unilateral. También se conservó el topónimo Mahanaim como nombre propio, con nota explicativa breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en otros registros, aunque este versículo no lo contiene.
  - Se conserva la transliteración de nombres propios ambiguos como criterio general del POB.
  - Se prefieren verbos de percepción visual («ver», «mirar», «contemplar») para mantener la conexión léxica entre las dos cláusulas verbales hebreas.
