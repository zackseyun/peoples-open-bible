translation:
  language: es
  text: 'Jonatán respondió a Saúl, su padre, y le dijo: «¿Por qué ha de ser puesto[a] a muerte? ¿Qué ha hecho?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué debe ser puesto a muerte?». El hebreo lleva una forma causativa pasiva de מות, así que no significa simplemente «morir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en fórmulas narrativas de diálogo puede significar 'responder'. En español, 'respondió' conserva el sentido de réplica directa y suena natural en este contexto.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española establecida del nombre propio, transparente para lectura eclesial en español.
- source_word: אֶת שָׁאוּל אָבִיו
  english_pob_choice: Saul his father
  chosen_spanish: Saúl, su padre
  alternatives_spanish:
  - Saúl, su padre
  - su padre Saúl
  lexicon: HALOT
  rationale: El hebreo identifica primero a Saúl y luego lo especifica como 'su padre'. En español, la aposición con coma conserva esa relación sin sonar forzada.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le dijo
  - y dijo a él
  lexicon: HALOT
  rationale: El dativo explícito se expresa naturalmente con 'le'. 'A él' sería más pesado en español y menos idiomático.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Para qué
  lexicon: HALOT
  rationale: '''לָמָּה'' introduce una pregunta causal; ''¿Por qué?'' es la forma natural y fiel en español.'
- source_word: יוּמַת
  english_pob_choice: should he be put to death
  chosen_spanish: haya de ser puesto a muerte
  alternatives_spanish:
  - deba ser puesto a muerte
  - haya de morir
  - sea muerto
  lexicon: HALOT
  rationale: La forma hophal de מות expresa 'ser hecho morir / ser puesto a muerte'. 'Puesto a muerte' preserva la fuerza causativa/passiva que el audit trail inglés destacó; 'haya de' comunica la fuerza deliberativa/interrogativa sin sonar artificial.
- source_word: מֶה עָשָׂה
  english_pob_choice: What has he done?
  chosen_spanish: ¿Qué ha hecho?
  alternatives_spanish:
  - ¿Qué hizo?
  - ¿Qué ha cometido?
  lexicon: HALOT
  rationale: El modismo pregunta por la supuesta falta u ofensa. '¿Qué ha hecho?' reproduce bien la referencia a una acción ya realizada y su relevancia presente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvo la distinción léxica de יוּמַת como causativo/pasivo (''puesto a muerte'') y la pregunta breve de לָמָּה como ''¿Por qué?''. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se conservó un tono bíblico claro y moderno, evitando el calco excesivo.
  - Se usó 'Jonatán' y 'Saúl' como formas españolas estándar para nombres propios.
  - La puntuación reproduce la apertura narrativa seguida de discurso directo, con comillas angulares propias del español.
