translation:
  language: es
  text: El que sacrifica un buey es como el que mata a un hombre; el que sacrifica un cordero, como el que quiebra el cuello de un perro; el que ofrece una ofrenda de grano, como el que ofrece sangre de cerdo; el que hace una ofrenda memorial de incienso, como el que bendice la maldad[a]. También ellos han escogido sus propios caminos, y su alma se complace en sus abominaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el que bendice a un ídolo». El hebreo אָוֶן puede denotar maldad, iniquidad o maldad idolátrica; aquí se ha optado por «maldad» para conservar el peso moral sin estrechar demasiado el sentido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «su alma se complace», con singular usado colectivamente para el pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹחֵט הַשּׁוֹר
  english_pob_choice: the one who slaughters an ox
  chosen_spanish: el que sacrifica un toro
  alternatives_spanish:
  - el que degüella un toro
  - el que mata un toro
  - el que sacrifica un buey
  lexicon: HALOT
  rationale: En español, «sacrifica» preserva el campo cultual y caracteriza la acción como acto sacrificial. «Toro» es un equivalente natural para שׁוֹר en este contexto, sin forzar el sexo del animal ni volverlo técnico en exceso.
- source_word: מַכֵּה אִישׁ
  english_pob_choice: is like one who strikes down a man
  chosen_spanish: como el que mata a un hombre
  alternatives_spanish:
  - como el que hiere a un hombre
  - como el que golpea a un hombre
  - como el que abate a un hombre
  lexicon: HALOT
  rationale: «מַכֵּה» puede abarcar golpear, herir o matar. «Mata» transmite mejor la gravedad de la equivalencia profética en español, y el contexto de la serie de actos abominables favorece una violencia mortal.
- source_word: זוֹבֵחַ הַשֶּׂה
  english_pob_choice: the one who sacrifices a lamb
  chosen_spanish: el que sacrifica un cordero
  alternatives_spanish:
  - el que sacrifica una oveja
  - el que ofrece un cordero
  - el que inmola un cordero
  lexicon: HALOT
  rationale: «שֶׂה» puede ser animal menor del rebaño; «cordero» es natural en español bíblico y mantiene la imaginería sacrificial. «Sacrifica» conserva el paralelismo con la primera cláusula.
- source_word: עֹרֵף כֶּלֶב
  english_pob_choice: like one who breaks a dog’s neck
  chosen_spanish: como el que quiebra el cuello de un perro
  alternatives_spanish:
  - como el que degüella un perro
  - como el que rompe el cuello de un perro
  - como el que descoyunta el cuello de un perro
  lexicon: HALOT
  rationale: La raíz ערף apunta a quebrar el cuello, no simplemente a matar o degollar. «Quiebra el cuello» comunica bien la crudeza ritual/violenta del hebreo sin suavizarla.
- source_word: מַעֲלֵה מִנְחָה
  english_pob_choice: the one who offers a grain offering
  chosen_spanish: el que presenta una ofrenda vegetal
  alternatives_spanish:
  - el que ofrece una ofrenda de cereal
  - el que presenta una ofrenda de grano
  - el que ofrece una oblación
  lexicon: HALOT
  rationale: En español contemporáneo, «ofrenda vegetal» refleja el sentido de מִנְחָה como ofrenda no sanguínea y evita un calco demasiado técnico. «Presenta» funciona para el verbo cultual, y la frase mantiene la oposición con los sacrificios sangrientos.
- source_word: דַּם חֲזִיר
  english_pob_choice: like one who offers pig’s blood
  chosen_spanish: como el que ofrece sangre de cerdo
  alternatives_spanish:
  - como el que ofrece sangre de puerco
  - como el que presenta sangre de cerdo
  - como el que derrama sangre de cerdo
  lexicon: HALOT
  rationale: «Cerdo» es claro, neutral y comprensible en español general. «Ofrece sangre de cerdo» conserva el valor chocante de la imagen impura y el paralelismo con las demás ofrendas.
- source_word: מַזְכִּיר לְבֹנָה
  english_pob_choice: the one who makes a memorial offering of frankincense
  chosen_spanish: el que hace una ofrenda memorial de incienso
  alternatives_spanish:
  - el que hace una ofrenda memorial de olíbano
  - el que presenta incienso memorial
  - el que recuerda incienso
  lexicon: HALOT
  rationale: «מַזְכִּיר» en el ámbito sacrificial alude a una ofrenda memorial. «Incienso» es el término más transparente para el público general; «ofrenda memorial» conserva el matiz cultual y sigue de cerca el giro del inglés POB revisado.
- source_word: מְבָרֵךְ אָוֶן
  english_pob_choice: like one who blesses wickedness
  chosen_spanish: como el que bendice la maldad
  alternatives_spanish:
  - como el que bendice la iniquidad
  - como el que bendice la perversidad
  - como el que bendice un ídolo
  lexicon: HALOT
  rationale: «אָוֶן» puede ser maldad, iniquidad o, en algunos contextos, idolatría malvada. «Maldad» preserva la ambigüedad moral y no introduce «ídolo» sin base explícita en el texto consonántico.
- source_word: גַּם הֵמָּה בָּחֲרוּ בְּדַרְכֵיהֶם
  english_pob_choice: They too have chosen their own ways
  chosen_spanish: También ellos han escogido sus propios caminos
  alternatives_spanish:
  - Ellos también han escogido sus caminos
  - También ellos eligieron sus propios caminos
  - Ellos también prefirieron sus caminos
  lexicon: HALOT
  rationale: «También ellos» reproduce el énfasis de גַּם הֵמָּה. «Han escogido» es una forma natural y solemne en español, y «sus propios caminos» conserva el matiz de autoafirmación rebelde.
- source_word: וּבְשִׁקּוּצֵיהֶם נַפְשָׁם חָפֵצָה
  english_pob_choice: and their soul delights in their abominations
  chosen_spanish: y su alma se complace en sus abominaciones
  alternatives_spanish:
  - y su alma se deleita en sus abominaciones
  - y su alma desea sus abominaciones
  - y se complacen en sus abominaciones
  lexicon: HALOT
  rationale: «Su alma» preserva la singularidad colectiva del hebreo. «Se complace» comunica bien חָפֵץ en un registro bíblico claro, y «abominaciones» mantiene el tono profético de שִׁקּוּצִים.
theological_decisions:
- issue: Equivalencia moral entre sacrificios y actos abominables
  english_pob_reading: Render the clauses as moral equivalences by supplying 'is like' in English rather than flattening them into simple apposition.
  chosen_spanish_reading: Conservar la comparación explícita con «como» en cada miembro, sin volverlo una simple enumeración de actos.
  alternative_spanish_readings:
  - Traducir como apposición directa, sin «como»
  - Interpretar las cláusulas como mera descripción de hipócritas
  rationale: El hebreo presenta participios y sintagmas nominales con fuerza comparativa implícita. El español necesita la partícula «como» para comunicar la equivalencia escandalosa sin suavizarla ni explicar demasiado el mecanismo de rechazo divino.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence'
- issue: Sentido de אָוֶן
  english_pob_reading: wickedness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - iniquidad
  - idolatría
  - mal
  rationale: «Maldad» conserva el peso moral y permite dejar abierta la posible resonancia idolátrica sin imponerla. Eso respeta la tensión lexical documentada en el audit trail.
  doctrine_reference: Original-language primacy over translation tradition
- issue: Singular colectivo en «su alma se complace»
  english_pob_reading: their soul delights, with a singular noun and verb used collectively for the people
  chosen_spanish_reading: su alma se complace
  alternative_spanish_readings:
  - sus almas se complacen
  - ellos se complacen
  rationale: La forma singular en español reproduce la rareza del hebreo y mantiene el valor colectivo. Evita nivelar el texto a una pluralidad más lisa que la fuente no da.
  doctrine_reference: Preserve collective singulars where the source marks them
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB para מַזְכִּיר לְבֹנָה, que aclara el giro como «memorial offering of frankincense». En español se siguió esa clarificación con «ofrenda memorial de incienso», manteniendo el carácter cultual y la naturalidad del español bíblico. También se respetó el consenso alto del audit trail en cuanto a las equivalencias morales y la lectura colectiva de «su alma».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Ofrenda vegetal» se usa aquí como equivalente funcional de מִנְחָה en este contexto sacrificial, evitando calcos innecesarios.
  - Se conservó la serie paralelística con «como» para cada comparación, siguiendo la estructura retórica del hebreo.
  - Los marcadores [a] y [b] aparecen exactamente en el texto donde corresponden, sin notas huérfanas.
