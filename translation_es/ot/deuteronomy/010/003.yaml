translation:
  language: es
  text: Así hice un arca de madera de acacia, y tallé dos tablas de piedra, como las primeras[a]; y subí al monte con las dos tablas en mi mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «heché dos tablas de piedra, como las primeras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - caja
  - arca del pacto
  lexicon: HALOT
  rationale: En este contexto de las tablas del pacto, el término hebreo designa un contenedor sagrado. «Arca» conserva ese valor cultual y es el equivalente español natural de la opción inglesa «ark». No añado «del pacto» porque el hebreo aquí no lo dice explícitamente.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - madera de acacias
  - madera de shittim
  lexicon: HALOT
  rationale: La expresión hebrea literalmente habla de madera de acacias. «Madera de acacia» es natural en español, mantiene la especie y evita la transliteración técnica «shittim», que no ayuda a la claridad del lector.
- source_word: וָאֶפְסֹל
  english_pob_choice: cut
  chosen_spanish: tallé
  alternatives_spanish:
  - corté
  - heché
  lexicon: HALOT
  rationale: El verbo פסל expresa labrar o dar forma cortando la piedra. «Tallé» comunica mejor la acción de trabajar las tablas que un simple «corté», y conserva la fuerza artesanal del hebreo.
- source_word: לֻחֹת אֲבָנִים
  english_pob_choice: stone tablets
  chosen_spanish: tablas de piedra
  alternatives_spanish:
  - tablas de piedra labrada
  - tablas de piedra
  lexicon: HALOT
  rationale: La construcción hebrea se refiere a tablas hechas de piedra. «Tablas de piedra» refleja de forma directa la materia y el objeto; «labrada» sería una ampliación no exigida por el texto.
- source_word: כָּרִאשֹׁנִים
  english_pob_choice: like the first ones
  chosen_spanish: como las primeras
  alternatives_spanish:
  - como las primeras tablas
  - como las anteriores
  lexicon: HALOT
  rationale: La comparación indica correspondencia con las tablas previas. «Como las primeras» es breve y fiel; el contexto ya permite entender que se trata de las primeras tablas.
- source_word: וָאַעַל הָהָרָה
  english_pob_choice: I went up the mountain
  chosen_spanish: subí al monte
  alternatives_spanish:
  - subí a la montaña
  - ascendí al monte
  lexicon: HALOT
  rationale: El hebreo expresa ascenso al monte con dirección. «Subí al monte» es idiomático en español bíblico moderno y conserva el movimiento sin volverlo demasiado literal o pesado.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mis manos
  - en mi poder
  lexicon: HALOT
  rationale: El singular hebreo se mantiene en español como «en mi mano». Aunque el español podría usar plural por naturalidad, el singular conserva mejor la imagen concreta del texto.
- source_word: וָאַעַשׂ
  english_pob_choice: I made
  chosen_spanish: hice
  alternatives_spanish:
  - hice para mí
  - fabriqué
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio, «hacer». «Hice» reproduce el valor básico sin sobreespecificar el modo de producción. El contexto ya aclara que se trata de construir un arca.
theological_decisions:
- issue: Nombre del recipiente sagrado donde se guardan las tablas
  english_pob_reading: ark
  chosen_spanish_reading: arca
  alternative_spanish_readings:
  - caja
  - arca del pacto
  rationale: No hay una tensión doctrinal aquí, pero sí una decisión terminológica. «Arca» preserva la resonancia cultual del objeto sin añadir contenido ausente. Evito «arca del pacto» porque en este versículo el hebreo solo dice «arca».
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El contexto inglés final quedó sin cambios en la revisión más reciente, con alta concordancia y sin observaciones pendientes; por eso la versión española sigue de cerca la línea ya aprobada, ajustando solo la naturalidad idiomática necesaria en español.
  spanish_consistency_notes:
  - Mantengo «Yahvé» fuera del versículo porque aquí no aparece el tetragrámaton en la línea hebrea dada.
  - Uso «arca» y no «arca del pacto» para no añadir un determinante ausente en el hebreo.
  - Conservo el singular «en mi mano» conforme al hebreo.
  - La nota al pie preserva la alternativa verbal de «hewed/cut» sin imponerla en el texto principal.
