translation:
  language: es
  text: Y se emitió un decreto por mí, y buscaron y hallaron que esta ciudad desde días antiguos se ha alzado contra los reyes[a], y en ella se han cometido rebelión e insurrección[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha exaltado contra los reyes». El verbo arameo puede sugerir autoexaltación, pero aquí el contexto favorece el sentido de alzarse en oposición.
    reason: lexical_alternative
  - marker: b
    text: O «rebelión e insurrección se han hecho en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  english_pob_choice: a decree was issued
  chosen_spanish: se emitió un decreto
  alternatives_spanish:
  - se dio un decreto
  - se promulgó un decreto
  lexicon: HALOT
  rationale: La locución aramea expresa la fijación/emisión de una orden oficial. En español, «se emitió un decreto» reproduce bien el sentido administrativo y la pasiva impersonal del texto sin volverlo forzado.
- source_word: וּמִנִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - de mí
  lexicon: HALOT
  rationale: La marca de origen autoritativo del decreto se expresa naturalmente en español con «por mí» en una construcción pasiva; mantiene que el rey es la fuente de la orden.
- source_word: וּבַקַּרוּ
  english_pob_choice: they searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - investigaron
  - examinaron
  lexicon: HALOT
  rationale: En el contexto de una indagación archivística, «buscaron» conserva la sencillez del par inglés elegido y encaja con «hallaron». Aunque «investigaron» es posible, suena más técnico que el paralelo arameo exige.
- source_word: וְהַשְׁכַּחוּ
  english_pob_choice: found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: HALOT
  rationale: «Hallaron» mantiene el tono formal y el paralelismo con la búsqueda previa. Es una opción natural y digna en español bíblico moderno.
- source_word: קִרְיְתָא דָךְ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: HALOT
  rationale: El demostrativo apunta a la ciudad objeto del expediente. «Esta ciudad» conserva la deíxis del informe real.
- source_word: מִן יוֹמָת עָלְמָא
  english_pob_choice: from ancient days
  chosen_spanish: desde días antiguos
  alternatives_spanish:
  - desde tiempos antiguos
  - desde tiempos remotos
  lexicon: HALOT
  rationale: La expresión fija antigüedad remota. «Desde días antiguos» sigue de cerca la forma aramea y suena idiomática en español bíblico contemporáneo.
- source_word: עַל מַלְכִין מִתְנַשְּׂאָה
  english_pob_choice: has ... risen up against kings
  chosen_spanish: se ha alzado contra los reyes
  alternatives_spanish:
  - se ha levantado contra los reyes
  - se ha exaltado contra los reyes
  lexicon: HALOT
  rationale: El verbo arameo puede sugerir autoexaltación o levantamiento en oposición. Aquí, como en el POB inglés, el contexto político favorece «se ha alzado contra», que preserva la tensión entre elevación y rebelión sin reducirla a un solo matiz.
- source_word: וּמְרַד
  english_pob_choice: rebellion
  chosen_spanish: rebelión
  alternatives_spanish:
  - revueltas
  - revuelta
  lexicon: HALOT
  rationale: Término político básico para oposición al poder real; «rebelión» es el equivalente más directo y estable en español.
- source_word: וְאֶשְׁתַּדּוּר
  english_pob_choice: sedition
  chosen_spanish: insurrección
  alternatives_spanish:
  - sedición
  - subversión
  lexicon: HALOT
  rationale: El segundo sustantivo debe distinguirse del primero sin perder el campo semántico político. «Insurrección» comunica desorden subversivo y conserva la diferencia que el POB inglés expresa con «sedition».
- source_word: מִתְעֲבֶד בַּהּ
  english_pob_choice: have been carried out in it
  chosen_spanish: se han cometido ... en ella
  alternatives_spanish:
  - se han practicado ... en ella
  - se han hecho ... en ella
  lexicon: HALOT
  rationale: La pasiva/impersonal del arameo indica que esos actos ocurren o se practican dentro de la ciudad. «Se han cometido» naturaliza el español jurídico y mantiene la idea de actos realizados allí.
translation_notes:
  revision_awareness: El borrador sigue el pasaje tal como aparece en el paquete fuente y el auditable inglés del POB; no se registran revisiones textuales ni cambios posteriores que requieran ajuste.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la terminología del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Se evitó «Señor» porque el texto no lo exige y el informe es administrativo, no litúrgico.
  - Se distinguieron los dos sustantivos políticos para no fusionarlos en una sola idea.
  - La puntuación reproduce una sola cláusula narrativa larga, acorde con el estilo del versículo y del POB inglés.
