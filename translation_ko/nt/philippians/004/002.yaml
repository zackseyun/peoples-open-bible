id: PHP.4.2
reference: Philippians 4:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐοδίαν παρακαλῶ καὶ Συντύχην παρακαλῶ τὸ αὐτὸ φρονεῖν ἐν κυρίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/002.yaml
  text: I urge Euodia, and I urge Syntyche, to think the same way in the Lord.
translation:
  language: ko
  text: 나는 유오디아에게 권면하고, 또 순두게에게 권면합니다. 주 안에서 같은 마음을 품으십시오[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「같은 것을 생각하라」. 헬라어 φρονέω는 단순한 사고가 아니라 마음의 지향·태도까지 포함하므로, 「같은 마음을 품다」가 본문의 뜻을 더 온전히 담는다. 「의견을 같이하라」는 더 좁은 의미가 된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐοδίαν
  english_pob_choice: Euodia
  chosen_korean: 유오디아
  alternatives_korean:
  - 유오디아스
  lexicon: BDAG
  rationale: 한국 교회 번역에서 정착된 「유오디아」를 채택한다. 외래어 표기법에도 부합한다.
- source_word: Συντύχην
  english_pob_choice: Syntyche
  chosen_korean: 순두게
  alternatives_korean:
  - 신튀케
  - 순튀케
  lexicon: BDAG
  rationale: 개역개정·새번역 등 한국 교회 전통에서 정착된 「순두게」를 그대로 사용한다. 학술적 음역 「신튀케/순튀케」도 가능하나 회중 가독성을 우선한다.
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_korean: 권면합니다
  alternatives_korean:
  - 권합니다
  - 간곡히 부탁합니다
  lexicon: BDAG
  rationale: παρακαλέω의 진지하고 인격적인 호소 성격을 합쇼체로 살린다. 「권면」은 신약 서신의 παρακαλέω에 대한 한국 교회의 표준 등가어이며, 바울이 두 여인 각자에게 반복한 동사를 한국어에서도 두 번 살려 강조를 보존한다.
- source_word: τὸ αὐτὸ φρονεῖν
  english_pob_choice: to think the same way
  chosen_korean: 같은 마음을 품으십시오
  alternatives_korean:
  - 같은 생각을 가지십시오
  - 한마음이 되십시오
  - 의견을 같이하십시오
  lexicon: BDAG
  rationale: φρονέω는 인지(認知)와 정향(定向)이 결합된 동사이다. 「같은 마음을 품다」는 사고와 태도 양면을 함께 담아 본문의 뜻을 가장 균형 있게 전달한다. 단순한 「의견 일치」(「의견을 같이하다」)는 너무 좁다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주 안에
  - 주와 연합하여
  lexicon: BDAG
  rationale: 두 여인의 일치가 단지 인간적 화해가 아니라 「주 안에」 뿌리내린 것임을 강조하므로 정형 표현을 그대로 보존한다.
