  source_alignment_summary: El borrador no preserva fielmente toda la información fuente. El griego διʼ οὗ es neutro/instrumental ('por medio de lo cual' / 'a través de lo cual'), no personal ('por medio de quien'). Además, el texto principal omite por completo οἱ τῇ σῇ σκεπαζόμενοι χειρί ('los que estaban resguardados/cubiertos por tu mano'), relegándolo indebidamente a nota. El resto de la cláusula —'la nación entera' y 'habiendo visto maravillas prodigiosas'— refleja razonablemente πανεθνεὶ y θεωρήσαντες θαυμάσια τέρατα.
  spanish_quality_summary: El español es fluido en partes, pero la oración queda sintácticamente incompleta y confusa al decir 'por medio de quien[a] pasaron, la nación entera[b]...'; falta el sujeto explícito y el relativo personal suena incorrecto con el antecedente implícito del camino/medio de paso. Una reparación menor produce un español claro y digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto en nombres divinos o títulos. Sin embargo, la decisión teológica documentada de mantener 'tu mano' en el texto principal no se cumplió; esa imagen debe restaurarse en el cuerpo del versículo, no solo en nota.
  issues:
  - severity: high
    issue: διʼ οὗ fue traducido como 'por medio de quien'
    rationale: El relativo griego aquí es mejor entendido como neutro/instrumental, refiriéndose al medio o ruta previa en contexto, no a una persona. 'Quien' introduce un referente personal ausente y altera el sentido.
  - severity: high
    issue: Se omitió en el texto principal 'los que estaban resguardados por tu mano'
    rationale: El segmento οἱ τῇ σῇ σκεπαζόμενοι χειρί forma parte esencial de la cláusula y de la imaginería teológica. No puede reducirse a una nota alternativa.
  - severity: medium
    issue: La nota [b] está anclada en 'la nación entera' pero comenta θαυμάσια τέρατα
    rationale: El marcador debe aparecer junto a la expresión que la nota explica, es decir, 'maravillas prodigiosas'.
  - severity: low
    issue: '''habiendo visto'' es fiel pero algo rígido'
    rationale: Puede mantenerse por cercanía formal, aunque 'después de ver' sería más idiomático. No es necesario cambiarlo para una revisión menor.
  revised_spanish_text: por medio de lo cual pasaron los que estaban resguardados por tu mano, la nación entera, habiendo visto maravillas prodigiosas[a].
