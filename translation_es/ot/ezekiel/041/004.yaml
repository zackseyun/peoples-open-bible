translation:
  language: es
  text: 'Entonces midió su longitud: veinte codos[a], y la anchura: veinte codos, delante de la nave; y me dijo: «Este es el Lugar Santísimo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Santo de los Santos».
