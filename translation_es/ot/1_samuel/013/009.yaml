translation:
  language: es
  text: 'Entonces Saúl dijo[b][a]: «Tráiganme el holocausto y las ofrendas de paz». Y él ofreció el holocausto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Las ofrendas de paz» también puede entenderse como «las ofrendas de comunión» o «de bienestar», según el matiz del hebreo שְׁלָמִים.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final se entiende de manera más natural como que Saúl mismo realizó el ofrecimiento del holocausto, aunque algunos la toman de forma indirecta.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: So Saul said
  chosen_spanish: Entonces Saúl dijo
  alternatives_spanish:
  - Y Saúl dijo
  - Luego Saúl dijo
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa con fluidez natural en español.
- source_word: הַגִּשׁוּ אֵלַי
  english_pob_choice: Bring near to me
  chosen_spanish: Traedme
  alternatives_spanish:
  - Traed cerca de mí
  - Presentadme
  lexicon: WLC / HALOT
  rationale: El imperativo Hifil de נגשׁ expresa acercar o presentar para un acto sacrificial. En español, el verbo simple «traer» funciona de manera natural aquí; el matiz de acercamiento queda implícito en el contexto ritual.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda holocausto
  lexicon: WLC / HALOT
  rationale: «עֹלָה» es el sacrificio que sube/ascendió por completo; en español bíblico, «holocausto» es el término cultual preciso y tradicional para este tipo de ofrenda.
- source_word: וְהַשְּׁלָמִים
  english_pob_choice: and the peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de bienestar
  - las ofrendas de comunión
  lexicon: WLC / HALOT
  rationale: Se mantiene el valor cultual de שְׁלָמִים con «ofrendas de paz», que es el equivalente español más asentado y claro; «fellowship offerings» quedaría más interpretativo.
- source_word: וַיַּעַל
  english_pob_choice: And he offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en holocausto
  - hizo subir
  lexicon: WLC / HALOT
  rationale: En contexto sacrificial, עלה significa ofrecer. En español, «ofreció» comunica el acto sacrificial de forma idiomática; el contexto ya especifica que se trata del holocausto.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  lexicon: WLC / HALOT
  rationale: Se repite el mismo término cultual para mantener consistencia y claridad en la cláusula final.
theological_decisions:
- issue: Agencia en la cláusula final
  english_pob_reading: Saul himself offered the burnt offering
  chosen_spanish_reading: Saúl mismo ofreció el holocausto
  alternative_spanish_readings:
  - Saúl hizo que se ofreciera el holocausto
  - Saúl mandó ofrecer el holocausto
  rationale: La forma verbal singular y el contexto inmediato favorecen leer a Saúl como agente directo del sacrificio, no solo como quien ordena presentarlo. La traducción mantiene esa fuerza sin añadir explicación interpretativa.
  doctrine_reference: 1 Samuel 13:9; comparación narrativa con el reproche posterior en 1 Samuel 13:13-14
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] directamente en el texto español, sin agregar notas sin anclaje. La redacción sigue el testimonio hebreo y el audit trail inglés, manteniendo el valor cultual de los términos y la agencia directa en la última cláusula.
  spanish_consistency_notes:
  - Se usa «holocausto» de manera consistente para עֹלָה.
  - Se usa «ofrendas de paz» para שְׁלָמִים, con nota de alternativa léxica.
  - Se conserva la lectura de agencia directa en la última cláusula.
  - Se emplea español neutral y apto para lectura eclesial.
