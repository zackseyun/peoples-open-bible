translation:
  language: es
  text: 'Entonces Daniel fue llevado ante el rey. El rey respondió y dijo a Daniel[a]: «¿Eres tú aquel Daniel, de entre los exiliados de Judá, a quien el rey mi padre trajo de Judá?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi predecesor»; en el uso real, «padre» puede referirse a un antepasado o a un rey anterior, no solo al padre biológico inmediato.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces mismo
  lexicon: HALOT
  rationale: Marca narrativa de secuencia; «Entonces» conserva el avance del relato con naturalidad en español.
- source_word: הֻעַל
  english_pob_choice: was brought in
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue traído
  - fue conducido
  lexicon: HALOT
  rationale: El pasivo indica que Daniel fue hecho comparecer ante el rey; «fue llevado» comunica bien la acción sin añadir detalles que el arameo no explicita.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - en presencia del rey
  - delante del rey
  lexicon: HALOT
  rationale: La expresión aramea es idiomática de comparecencia; «ante el rey» es una equivalencia española natural y solemne.
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: HALOT
  rationale: Se conserva la pareja verbal semítica, evitando reducirla a un simple «dijo».
- source_word: אַנְתָּה הוּא
  english_pob_choice: Are you that
  chosen_spanish: ¿Eres tú aquel
  alternatives_spanish:
  - ¿Eres tú el
  - ¿Tú eres aquel
  lexicon: HALOT
  rationale: La pregunta de identificación tiene fuerza reconocitiva; «aquel Daniel» preserva el matiz levemente distante del original y del inglés auditado.
- source_word: מִן בְּנֵי גָלוּתָא
  english_pob_choice: one of the exiles
  chosen_spanish: de entre los exiliados
  alternatives_spanish:
  - uno de los exiliados
  - de los desterrados
  lexicon: HALOT
  rationale: «De entre los exiliados» conserva la pertenencia al grupo deportado sin sonar demasiado literal o rígido.
- source_word: יְהוּד
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  - los judíos
  lexicon: HALOT
  rationale: En este contexto exílico el referente es el territorio/pueblo de Judá; «Judá» es la forma bíblica y más precisa.
- source_word: דִּי הַיְתִי מַלְכָּא אַבִי מִן יְהוּד
  english_pob_choice: whom the king my father brought from Judah
  chosen_spanish: a quien el rey, mi padre, trajo de Judá
  alternatives_spanish:
  - a quien el rey, mi antecesor, trajo de Judá
  - a quien mi padre el rey trajo de Judá
  lexicon: HALOT
  rationale: Se mantiene el orden y la referencia explícita a «mi padre» como en el arameo; «trajo de Judá» refleja la procedencia sin sobreinterpretar el verbo.
theological_decisions:
- issue: Sentido de «mi padre» (אַבִי) en lenguaje real
  english_pob_reading: Rendered as 'my father' in the main text while understanding it as a royal predecessor term.
  chosen_spanish_reading: Se traduce «mi padre» en el texto principal y se entiende como fórmula real de predecesor.
  alternative_spanish_readings:
  - mi antecesor
  - mi predecesor
  rationale: El arameo dice literalmente «mi padre»; conservarlo evita borrar una tensión histórica conocida del lenguaje monárquico antiguo. La aclaración pertenece a la documentación, no al cuerpo del verso.
  doctrine_reference: Conservar el dato textual sin resolverlo en la traducción; uso histórico del lenguaje real.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: secuencia narrativa simple, conservación de la fórmula semítica «respondió y dijo», y preservación de «mi padre» como lenguaje real de predecessor sin ocultarlo en el texto principal. No se documentan cambios revisados adicionales.'
  spanish_consistency_notes:
  - Se usa «Judá» de manera consistente con el referente exílico del texto.
  - Se prefiere «ante el rey» para la comparecencia oficial en corte.
  - La nota textual de «fue llevado» mantiene abierta la posibilidad de «fue traído» sin añadir interpretación.
  - La puntuación y comillas siguen norma española y tono bíblico formal.
