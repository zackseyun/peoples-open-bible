base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/021.yaml
  text: And the inhabitants of one city will go to another[a], saying[b], ‘Let us go at once to entreat the favor of Yahweh and to seek Yahweh of hosts.’ ‘I too will go.’
  footnotes:
  - marker: a
    text: Or, 'Let us go at once' or 'Come, let us go'; the Hebrew uses an emphatic construction ('let us go, going') to intensify the invitation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to entreat the face of the LORD,' an idiom meaning to seek his favor.
    reason: lexical_alternative
