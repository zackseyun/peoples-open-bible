base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/035.yaml
  text: This is the anointed portion of Aaron and the anointed portion of his sons from the food offerings of Yahweh[b][a], on the day when he presented them to serve as priests to Yahweh.
  footnotes:
  - marker: a
    text: Or “anointing portion.” The Hebrew term is related to anointing, but here likely refers to the allotted priestly share associated with consecration.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, “offerings by fire of the LORD.”
    reason: lexical_alternative
