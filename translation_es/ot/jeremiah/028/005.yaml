    issue: Concordancia en «todo el pueblo que estaba de pie»
    rationale: El hebreo usa el participio plural הָעֹמְדִים, refiriéndose a las personas del pueblo presentes. Aunque «pueblo» puede admitir singular colectivo, en esta construcción española «que estaban de pie» suena más natural y preserva mejor el matiz del original.
  - severity: low
