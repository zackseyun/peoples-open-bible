base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/018.yaml
  text: You will eat the flesh of mighty men[a], and you will drink the blood of the princes of the earth—rams, lambs, male goats, and bulls[b], all of them fattened ones of Bashan.
  footnotes:
  - marker: a
    text: The animal terms ('rams, lambs, male goats, and bulls') are metaphorical sacrificial imagery for the slain rulers and warriors.
    reason: cultural_note
  - marker: b
    text: Or 'fatlings of Bashan.' Bashan was known for rich pasture and well-fed livestock.
    reason: lexical_alternative
