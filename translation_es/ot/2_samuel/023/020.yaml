translation:
  language: es
  text: Y Benaía hijo de Joiadá, hijo de un hombre valiente, grande en hazañas, de Cabseel, mató a los dos hijos de Ariel[a] de Moab; bajó y mató al león dentro del pozo en un día de nieve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אֲרִאֵל ('ariel') es incierto aquí. Puede referirse a un nombre o título, o sugerir sentidos como “héroes” u “hombres leoninos”; el texto principal conserva “Ariel” para no imponer una sola interpretación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן יְהוֹיָדָע
  english_pob_choice: son of Jehoiada
  chosen_spanish: hijo de Joiadá
  alternatives_spanish:
  - hijo de Jehoiadá
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo en forma castellana usual; 'Joiadá' sigue la forma tradicional más reconocible y mantiene la referencia genealógica sin añadir interpretación.
- source_word: אִישׁ חַי
  english_pob_choice: a valiant man
  chosen_spanish: un hombre valiente
  alternatives_spanish:
  - un hombre vivo
  - un hombre de vigor
  - un hombre poderoso
  lexicon: HALOT
  rationale: El hebreo es idiomático y, en este contexto de elogio genealógico/militar, expresa valor o fortaleza más que mera existencia física. 'Valiente' comunica ese matiz en español con naturalidad.
- source_word: רַב פְּעָלִים
  english_pob_choice: great in deeds
  chosen_spanish: grande en hechos
  alternatives_spanish:
  - abundante en acciones
  - de muchos hechos
  - grande en obras
  lexicon: HALOT
  rationale: '''Grande'' conserva el valor evaluativo de רַב, y ''hechos'' mantiene el sentido concreto de פְּעָלִים como actos realizados, sin suavizar la idea de hazañas.'
- source_word: מִקַּבְצְאֵל
  english_pob_choice: from Kabzeel
  chosen_spanish: de Quibseel
  alternatives_spanish:
  - de Kabseel
  lexicon: HALOT
  rationale: Se usa la forma castellana del topónimo para mayor legibilidad, manteniendo el referente geográfico. La preposición hebrea de origen puede expresarse naturalmente con 'de' en español.
- source_word: שְׁנֵי אֲרִאֵל מוֹאָב
  english_pob_choice: the two sons of Ariel of Moab
  chosen_spanish: los dos hijos de Ariel de Moab
  alternatives_spanish:
  - los dos ariels de Moab
  - los dos héroes de Moab
  - los dos hombres leoninos de Moab
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que preserva la transparencia y la ambigüedad del término אֲרִאֵל. 'Hijos de Ariel' permite una lectura relacional sin decidir entre 'héroes', 'leoninos' o un nombre propio/título.
- source_word: יָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue abajo
  lexicon: HALOT
  rationale: '''Descendió'' refleja con claridad el movimiento hacia abajo en el relato y mantiene un registro sobrio y bíblico en español.'
- source_word: הָאֲרִי
  english_pob_choice: the lion
  chosen_spanish: el león
  alternatives_spanish:
  - un león
  lexicon: HALOT
  rationale: 'El sustantivo es directo y no presenta ambigüedad: se traduce literalmente como ''león''.'
- source_word: בְּתוֹךְ הַבּוֹר
  english_pob_choice: in the midst of the pit
  chosen_spanish: en medio del pozo
  alternatives_spanish:
  - dentro del pozo
  - en el interior del pozo
  - en medio de la cisterna
  lexicon: HALOT
  rationale: '''Pozo'' cubre el campo semántico básico de בּוֹר y es comprensible en español. ''En medio de'' conserva la fuerza locativa de בְּתוֹךְ mejor que un simple ''dentro de''.'
- source_word: בְּיוֹם הַשָּׁלֶג
  english_pob_choice: on a snowy day
  chosen_spanish: en día de nieve
  alternatives_spanish:
  - en un día de nieve
  - en un día nevado
  - cuando nevaba
  lexicon: HALOT
  rationale: Se mantiene la imagen temporal del hebreo sin forzar una paráfrasis. 'Día de nieve' es una expresión breve y fiel; la alternativa 'un día nevado' suaviza algo la literalidad.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que aclaró la frase de אֲרִאֵל como 'the two sons of Ariel of Moab', preservando la ambigüedad de base y evitando una interpretación más fuerte que el hebreo no exige. La forma española sigue esa misma cautela.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se prefirió un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - Se conservó la ambigüedad de אֲרִאֵל sin convertirla en una explicación doctrinal o interpretativa cerrada.
