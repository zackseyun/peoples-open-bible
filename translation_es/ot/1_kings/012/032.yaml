translation:
  language: es
  text: Jeroboam hizo una fiesta en el octavo mes[a], el día quince del mes, como la fiesta que había en Judá; y subió al altar.[b] Así hizo en Betel, sacrificando a los becerros que había hecho; y estableció en Betel a los sacerdotes de los lugares altos que él había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La fiesta en Judá probablemente alude a la Fiesta de los Tabernáculos, celebrada el día quince del séptimo mes; Jeroboam estableció una fiesta rival un mes después.
    reason: cross_reference
  - marker: b
    text: 'O: «subió sobre el altar». La expresión hebrea puede traducirse más literalmente, pero en contexto se refiere a acercarse o subir al altar para oficiar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ ... חָג
  english_pob_choice: made a feast
  chosen_spanish: hizo una fiesta
  alternatives_spanish:
  - celebró una fiesta
  - instituyó una fiesta
  lexicon: HALOT
  rationale: El verbo עשה con חג expresa celebrar u organizar una fiesta. «Hizo una fiesta» conserva la cercanía al hebreo y suena natural en español, sin añadir matices no explícitos.
- source_word: בַּחֹדֶשׁ הַשְּׁמִינִי
  english_pob_choice: in the eighth month
  chosen_spanish: en el octavo mes
  alternatives_spanish:
  - durante el octavo mes
  lexicon: HALOT
  rationale: Es una fórmula calendárica directa. «En» reproduce bien la preposición hebrea en este contexto.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם לַחֹדֶשׁ
  english_pob_choice: on the fifteenth day of the month
  chosen_spanish: el día quince del mes
  alternatives_spanish:
  - el quince del mes
  lexicon: HALOT
  rationale: La fecha se expresa de forma idiomática en español con «el día quince del mes», manteniendo el orden y la precisión temporal del original.
- source_word: כֶּחָג אֲשֶׁר בִּיהוּדָה
  english_pob_choice: like the feast that was in Judah
  chosen_spanish: como la fiesta que estaba en Judá
  alternatives_spanish:
  - como la fiesta que había en Judá
  - como la fiesta celebrada en Judá
  lexicon: HALOT
  rationale: La comparación explícita se conserva sin nombrar la fiesta. «Que estaba en Judá» sigue la construcción relativa del hebreo y evita importar una identificación que el versículo no formula.
- source_word: וַיַּעַל עַל הַמִּזְבֵּחַ
  english_pob_choice: he went up to the altar
  chosen_spanish: subió al altar
  alternatives_spanish:
  - subió hacia el altar
  - ascendió al altar
  lexicon: HALOT
  rationale: En español, «subió al altar» comunica el valor cultual de עלה על sin sugerir de manera extraña una escalada física; mantiene el gesto ritual que el contexto describe.
- source_word: כֵּן עָשָׂה בְּבֵית אֵל
  english_pob_choice: Thus he did in Bethel
  chosen_spanish: Así hizo en Betel
  alternatives_spanish:
  - De este modo hizo en Betel
  - Así procedió en Betel
  lexicon: HALOT
  rationale: «Así» conserva la correspondencia con lo anterior. «Hizo» sigue el paralelismo del hebreo y mantiene el estilo sobrio de la fuente.
- source_word: לְזַבֵּחַ לָעֲגָלִים
  english_pob_choice: sacrificing to the calves
  chosen_spanish: sacrificando a los becerros
  alternatives_spanish:
  - para sacrificar a los becerros
  - sacrificando a los terneros
  lexicon: HALOT
  rationale: «Becerros» comunica היטב el referente literal de עגלים y, en contexto idólatra, evita suavizar el sentido. La frase participial reproduce la función de propósito/resultado del infinitivo.
- source_word: וְהֶעֱמִיד
  english_pob_choice: he stationed
  chosen_spanish: estableció
  alternatives_spanish:
  - instaló
  - colocó
  lexicon: HALOT
  rationale: En este contexto de personal cultual, «estableció» expresa la colocación formal de los sacerdotes sin forzar una interpretación adicional. Es suficientemente cercano a «stationed» y natural en español.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  english_pob_choice: the priests of the high places
  chosen_spanish: los sacerdotes de los lugares altos
  alternatives_spanish:
  - los sacerdotes de los altos lugares
  - los sacerdotes de los santuarios altos
  lexicon: HALOT
  rationale: La expresión establecida «lugares altos» traduce בָּמוֹת de manera comprensible y reconocible en español bíblico, conservando el carácter de cultos locales ilícitos sin expandir el texto.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que él había hecho
  - que hizo
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja bien la secuencia narrativa y enlaza tanto los becerros como los lugares altos con la acción de Jeroboam, como en el inglés POB.
theological_decisions:
- issue: Referencia de la fiesta de Judá
  english_pob_reading: Render generically as 'the feast that was in Judah' without naming it explicitly.
  chosen_spanish_reading: 'Mantener la referencia genérica: «la fiesta que estaba en Judá» sin nombrarla en el texto principal.'
  alternative_spanish_readings:
  - la Fiesta de las Cabañas
  - la Fiesta de los Tabernáculos
  rationale: El contexto sugiere fuertemente la Fiesta de los Tabernáculos, pero el hebreo no la nombra. Para no introducir en el cuerpo del texto una identificación que no está expresada, se conserva la formulación genérica y se deja la identificación probable en nota.
  doctrine_reference: Primacía de la fuente original; no importar información contextual como si fuera explícita del versículo.
- issue: Evaluación cultual de las acciones de Jeroboam
  english_pob_reading: Translate descriptively without adding condemnatory adjectives in the main text.
  chosen_spanish_reading: Describir las acciones sin añadir calificativos como «ídolos» o «ilegítimos» en el cuerpo principal.
  alternative_spanish_readings:
  - sacrificando a los ídolos
  - estableció a los sacerdotes ilegítimos
  rationale: Aunque el conjunto narrativo juzga negativamente este culto, el versículo se limita a describir las acciones. La traducción conserva esa sobriedad y deja que el contexto mayor exprese la evaluación.
  doctrine_reference: Fidelidad descriptiva al texto; evitar expansión interpretativa no verbalizada.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se mantuvieron «Thus» y «stationed» como guía de registro y de cercanía al hebreo, pero se optó por «estableció» por ser más natural y transparente en español para la colocación formal de sacerdotes. También se respetó la decisión de no nombrar explícitamente la fiesta de Judá en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en esta serie, aunque este versículo no lo contiene.
  - «Mes»/«día del mes» se mantiene con registro bíblico moderno y claro.
  - «Betel» se translitera de manera consistente como nombre propio.
  - No se añade el artículo ni la caracterización de «ídolos» porque el hebreo habla de «becerros» y el contexto narrativo ya define su valoración.
