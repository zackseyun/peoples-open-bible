translation:
  language: es
  text: Y sobre el altar de oro extenderán un paño azul, y lo cubrirán con una cubierta de cuero fino[a], y pondrán en su lugar sus varas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con una cubierta de cuero de tachás’; el animal preciso designado por tachás es incierto. Entre las propuestas figuran ‘cuero fino’, ‘piel de dugongo’ y otros términos de piel duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַזָּהָב
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  - el altar de oro fino
  lexicon: HALOT
  rationale: El hebreo expresa literalmente un constructo “altar del oro”. En español, “altar de oro” mantiene la estructura y la referencia material con naturalidad. “Altar dorado” es posible, pero aquí se prefiere la relación nominal más directa del hebreo.
- source_word: יִפְרְשׂוּ
  english_pob_choice: they shall spread
  chosen_spanish: extenderán
  alternatives_spanish:
  - pondrán extendido
  - desplegarán
  lexicon: HALOT
  rationale: El verbo פרשׂ significa extender o desplegar sobre una superficie. “Extenderán” comunica bien la acción ritual de colocar la tela sobre el altar sin sonar forzado en español.
- source_word: בֶּגֶד תְּכֵלֶת
  english_pob_choice: a blue cloth
  chosen_spanish: un paño azul
  alternatives_spanish:
  - una tela azul
  - un paño de azul
  - un paño azul-púrpura
  lexicon: HALOT
  rationale: בגד aquí funciona como pieza de tela/vestidura colocada sobre el altar. “Paño” es una opción clara y digna en español. “Azul” conserva la referencia cultual de תכלת sin sobreespecificar el matiz exacto del color.
- source_word: וְכִסּוּ אֹתוֹ
  english_pob_choice: and cover it
  chosen_spanish: y lo cubrirán
  alternatives_spanish:
  - y lo cubrirán por encima
  - y lo taparán
  lexicon: HALOT
  rationale: La forma verbal continúa la secuencia de instrucciones y se traduce naturalmente como futuro de mandato. “Cubrirán” conserva la acción ritual sin introducir explicaciones ajenas al texto.
- source_word: בְּמִכְסֵה עוֹר תָּחַשׁ
  english_pob_choice: with a covering of fine leather
  chosen_spanish: con una cubierta de cuero fino
  alternatives_spanish:
  - con una cubierta de piel de tachás
  - con un revestimiento de cuero
  - con una cubierta de piel resistente
  lexicon: HALOT
  rationale: מכסה es “cubierta” y עור puede rendirse como “cuero” o “piel”. Dado que תחש es un término de identificación incierta, “cuero fino” preserva la idea de un recubrimiento duradero sin fijar indebidamente un animal concreto. Se mantiene la tensión lexicográfica mediante nota.
- source_word: וְשָׂמוּ אֶת בַּדָּיו
  english_pob_choice: and put its poles in place
  chosen_spanish: y pondrán en su lugar sus varas
  alternatives_spanish:
  - y colocarán sus varas
  - y asentarán sus varas de transporte
  lexicon: HALOT
  rationale: בדים son las varas usadas para transportar el altar. “Varas” es el equivalente más natural y bíblico en español; “en su lugar” expresa la acción de fijarlas/ponerlas listas para su uso.
theological_decisions:
- issue: Identificación del objeto como “altar de oro”/“altar dorado”
  english_pob_reading: the golden altar
  chosen_spanish_reading: el altar de oro
  alternative_spanish_readings:
  - el altar dorado
  rationale: No hay decisión doctrinal en disputa; la cuestión es de formulación. Se conserva el referente cultual específico sin sustituirlo por terminología eclesial posterior.
  doctrine_reference: Ninguna
- issue: Traducción de תחש sin precisar el animal
  english_pob_reading: fine leather; the precise animal denoted by tachash is uncertain
  chosen_spanish_reading: cuero fino
  alternative_spanish_readings:
  - piel de tachás
  - piel resistente
  - cuero de animal no identificado
  rationale: La POB inglesa preserva la incertidumbre léxica. En español, ‘cuero fino’ comunica la función y calidad del recubrimiento sin falsear la identidad zoológica. La incertidumbre se documenta en nota.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió “golden altar” por naturalidad formal; en español se optó por mantener el constructo más cercano del hebreo (“altar de oro”) por transparencia source-grounded, sin perder fluidez. También se preservó la nota de incertidumbre sobre תחש mediante una nota lexical equivalente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como forma estándar del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ o lenguaje eclesial no motivado por el hebreo.
  - ‘Varas’ se emplea para בדים en sentido de transporte, coherente con el uso tabernacular.
  - ‘Cuero fino’ mantiene la ambigüedad de תחש sin introducir una identificación animal no demostrada.
