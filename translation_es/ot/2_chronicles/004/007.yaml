base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/004/007.yaml
  text: He made ten gold lampstands according to their prescribed design[a], and he placed them in the temple[c][b], five on the right side and five on the left.
  footnotes:
  - marker: a
    text: Or 'according to their ordinance' or 'according to their pattern.' The Hebrew term can denote a prescribed rule, procedure, or design.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'five on the right and five on the left'; these may correspond to the south and north sides depending on temple orientation.
    reason: cultural_note
  - marker: c
    text: Or 'in the main hall' or 'in the sanctuary'; the Hebrew refers to the temple building proper rather than the wider complex.
    reason: lexical_alternative
