translation:
  language: es
  text: 'Para el director del coro: según “Lirios”. Testimonio. Un salmo de Asaf.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el jefe de coro
  - Al director del coro
  lexicon: HALOT
  rationale: En los encabezamientos de salmo, la expresión indica dirección musical o litúrgica. «Director del coro» conserva esa función con español claro y sobrio, sin forzar una especificación más estrecha que el hebreo no exige.
- source_word: אֶל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - a
  - sobre
  - con la melodía de
  lexicon: HALOT
  rationale: En esta clase de superscripción, la preposición introduce una designación musical o litúrgica. «Según» comunica bien esa relación de referencia sin convertirla en una afirmación literal sobre contenido.
- source_word: שֹׁשַׁנִּים
  english_pob_choice: Lilies
  chosen_spanish: “Lirios”
  alternatives_spanish:
  - “Lilas”
  - “Lirios” en plural sin comillas
  - “Las flores”
  lexicon: HALOT
  rationale: Probablemente es un nombre de melodía o designación litúrgica. Mantenerlo como título entre comillas preserva la ambigüedad del hebreo y evita reducirlo a una referencia floral literal.
- source_word: עֵדוּת
  english_pob_choice: a Testimony
  chosen_spanish: Un testimonio
  alternatives_spanish:
  - Testimonio
  - Un testimonio
  - Un testimonio litúrgico
  lexicon: HALOT
  rationale: El texto hebreo separa este término de «Lirios», y la revisión inglesa reciente también lo separa. En español, «Un testimonio» conserva la ambigüedad de posible rótulo musical o litúrgico sin sobreexplicarlo.
- source_word: לְאָסָף
  english_pob_choice: A psalm of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - de Asaf
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: 'La construcción final funciona naturalmente en español como atribución: «un salmo de Asaf». Así se mantiene la ambigüedad del hebreo entre autoría, asociación o pertenencia a una colección.'
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Salmo
  - Un canto
  - Una composición
  lexicon: HALOT
  rationale: Es el rótulo genérico del género. «Un salmo» es la equivalencia española más directa y reconocible en un encabezamiento bíblico.
translation_notes:
  revision_awareness: La versión inglesa más reciente separa «Lilies» y «A testimony» en lugar de combinarlos; por eso el español también los mantiene como unidades distintas. Se evitó añadir notas al pie para no introducir marcadores no anclados en el texto.
  spanish_consistency_notes:
  - Se usa «Asaf» con la forma hispanizada habitual del nombre propio.
  - Se evitó «SEÑOR» porque aquí no hay Tetragrámaton, sino una superscripción musical/litúrgica.
  - Se mantuvo el orden y la segmentación del encabezamiento para reflejar la ambigüedad del hebreo.
  - Se prefirió un registro bíblico moderno y publicable, sin arcaísmos innecesarios.
