lexical_decisions:
- source_word: אֵילוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ayalón
  alternatives_spanish:
  - Aijalón
  - Elón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista fronteriza; se translitera, no se traduce. En español, «Ayalón» conserva mejor la correspondencia con la forma hebrea y con la transliteración moderna cercana, mientras que «Aijalón» refleja más la forma tradicional inglesa y «Elón» es menos distintivo para este topónimo concreto.
- source_word: תִמְנָתָה
  english_pob_choice: Timnah
  chosen_spanish: Timná
  alternatives_spanish:
  - Timná
  - Timnata
  lexicon: HALOT
  rationale: Es un topónimo con terminación locativa; la forma breve y reconocible en español puede mantenerse como transliteración directa. «Timná» respeta la vocal final breve percibida en la tradición de transliteración, mientras que «Timnathah» o «Timnath» serían más artificiales en español.
- source_word: עֶקְרוֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ekron
  - Ekrón
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español bíblico es natural adaptar la grafía a «Ecrón», conservando el valor fonético y la identificación del sitio. «Ekron» es una transliteración más cercana al inglés, pero menos idiomática en español.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea se repite en la lista. En español, «y» reproduce de manera natural la coordinación acumulativa; «e» solo sería obligatorio ante /i/ inicial, lo cual no ocurre aquí.
translation_notes:
  revision_awareness: El texto fuente hebreo es una lista breve de nombres propios sin variantes textuales señaladas en el paquete aportado. La revisión inglesa no introdujo cambios y el control cruzado pidió revisión, pero no ofrece una variante concreta que deba reflejarse en el español.
  spanish_consistency_notes:
  - Se mantiene el estilo de lista nominal propio de un versículo de fronteras/catálogo geográfico.
  - Los nombres propios se adaptan a una ortografía española bíblica legible, sin añadir artículos ni glosas.
  - Se conserva la coordinación simple con «y» para reflejar el polisíndeton hebreo de manera natural en español.
