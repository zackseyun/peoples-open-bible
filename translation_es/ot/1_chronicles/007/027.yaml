translation:
  language: es
  text: Nun[a] su hijo, Josué su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite la fórmula «su hijo» después de cada nombre, un estilo genealógico normal que indica descendencia sucesiva: «Nun su hijo, Josué su hijo».'
