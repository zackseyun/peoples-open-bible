translation:
  language: es
  text: Y cuando subió, estaba orando al Señor Dios de Israel para que dirigiera su camino para la exaltación[a] de los hijos de su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la restauración» o «para la elevación» de los hijos de su pueblo. El sustantivo griego es raro y puede sugerir un levantamiento en estado o condición, no solo movimiento físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió
  - ascendió
  - fue hacia arriba
  lexicon: LSJ
  rationale: El aoristo de ἀναβαίνω expresa movimiento ascendente. «Subió» es natural en español y conserva el movimiento espacial sin añadir matices no exigidos por el griego.
- source_word: ἐδέετο
  english_pob_choice: was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - estaba orando
  - estaba suplicando
  - rogaba
  lexicon: BDAG
  rationale: Como el objeto es «el Señor Dios de Israel», el verbo tiene sentido claramente orante. El imperfecto se refleja con una forma progresiva para mantener la acción continua.
- source_word: κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: the Lord God of Israel
  chosen_spanish: el Señor Dios de Israel
  alternatives_spanish:
  - el Señor, Dios de Israel
  - el Señor Dios de Israel
  lexicon: LSJ
  rationale: Se conserva la fórmula reverencial cercana al griego. «Señor» sigue el valor de κύριος en este contexto, sin sustituirlo por una normalización litúrgica que ocultaría la forma del texto.
- source_word: κατευθῦναι
  english_pob_choice: to direct
  chosen_spanish: para que dirigiera
  alternatives_spanish:
  - para que enderezara
  - para que guiara
  - para que dirigiese
  lexicon: BDAG
  rationale: El infinitivo puede significar «enderezar, dirigir, guiar». «Dirigiera» mantiene la idea de orientar un camino y suena natural en español.
- source_word: τὴν ὁδὸν αὐτῆς
  english_pob_choice: her way
  chosen_spanish: su camino
  alternatives_spanish:
  - su camino
  - su senda
  - su ruta
  lexicon: BDAG
  rationale: ὁδός puede ser camino literal o curso de acción. «Su camino» conserva esa amplitud en español y evita restringirlo innecesariamente a un trayecto físico.
- source_word: εἰς ἀνάστημα
  english_pob_choice: for the exaltation
  chosen_spanish: para la exaltación
  alternatives_spanish:
  - para la elevación
  - para el levantamiento
  - para la restauración
  lexicon: LSJ
  rationale: ἀνάστημα es raro y puede sugerir elevación, alzamiento o exaltación. «Exaltación» sigue la revisión inglesa y preserva el sentido de elevación en estado o condición, no solo movimiento físico.
- source_word: τῶν υἱῶν τοῦ λαοῦ αὐτοῦ
  english_pob_choice: of the sons of his people
  chosen_spanish: de los hijos de su pueblo
  alternatives_spanish:
  - de los hijos de su pueblo
  - de los hijos de su gente
  - de los hijos de su pueblo
  lexicon: BDAG
  rationale: Se conserva υἱῶν con «hijos», siguiendo la forma masculina del griego y evitando neutralizar indebidamente el término. «Pueblo» reproduce el genitivo colectivo de manera natural.
theological_decisions:
- issue: Tratamiento de κύριος en una oración judía deuterocanónica
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Maestro
  rationale: En este contexto, «Señor» es la forma más fiel y transparente en español, manteniendo la referencia reverente sin convertirla en una convención tipográfica de ocultamiento del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Conservación de υἱῶν con lenguaje masculino
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - niños
  - personas
  - descendientes
  rationale: El griego es explícitamente masculino plural. Se conserva la referencia masculina para no borrar un rasgo léxico del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
- issue: Alcance de ἀνάστημα
  english_pob_reading: exaltation
  chosen_spanish_reading: exaltación
  alternative_spanish_readings:
  - restauración
  - elevación
  - levantamiento
  rationale: El sustantivo griego es poco frecuente y puede implicar elevación de condición, no mera subida física. «Exaltación» mantiene esa amplitud y el valor de alzamiento en dignidad o estado.
  doctrine_reference: LSJ; English revision pass 2026-04-23
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que reemplazó «raising up» por «exaltation» para reflejar mejor ἀνάστημα. La redacción española adopta ese ajuste con «exaltación» y conserva el resto de la estructura de oración, movimiento y finalidad.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, conforme al tratamiento POB del término en este contexto.
  - Se conservó el paralelismo entre movimiento («subió») y oración continua («estaba orando»).
  - Se evitó «SEÑOR» como convención de ocultamiento, ya que el griego aquí expresa un título reverente dentro de una oración dirigida al Dios de Israel.
  - El término «hijos» reproduce el masculino plural del griego y no se neutralizó a «personas».
