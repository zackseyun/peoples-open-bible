translation:
  language: es
  text: Entonces Josué tomó a Acán hijo de Zera, la plata, el manto, la barra de oro[a], sus hijos, sus hijas, su buey, su asno, su rebaño, su tienda, y todo lo que le pertenecía —y todo Israel con él—, y los llevaron al valle de Acor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lengua de oro», es decir, una pieza de oro con forma de lengua; tradicionalmente, «una cuña de oro».'
    reason: lexical_alternative
  - marker: b
    text: Acor suena en hebreo como una palabra relacionada con «aflicción» o «desgracia».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then Joshua took
  chosen_spanish: Entonces Josué tomó
  alternatives_spanish:
  - Y Josué tomó
  - Luego Josué tomó
  lexicon: HALOT
  rationale: El valor narrativo del waw-consecutivo se expresa de manera natural en español con 'Entonces'. 'Tomó' conserva el sentido básico de לקח sin añadir fuerza de 'apoderarse' o 'arrebatar'.
- source_word: עָכָן בֶּן זֶרַח
  english_pob_choice: Achan son of Zerah
  chosen_spanish: Acán hijo de Zera
  alternatives_spanish:
  - Acán, hijo de Zera
  - Acán hijo de Zérah
  lexicon: HALOT
  rationale: Se conserva la forma de nombre propio en español con transliteración sobria. 'Hijo de Zera' reproduce el patronímico sin desarrollar más de lo que el hebreo dice.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - las piezas de plata
  lexicon: HALOT
  rationale: כסף significa literalmente 'plata', y en este contexto remite al metal robado ya identificado. 'Plata' mantiene mejor la correspondencia léxica que 'dinero'.
- source_word: הָאַדֶּרֶת
  english_pob_choice: the cloak
  chosen_spanish: el manto
  alternatives_spanish:
  - la capa
  - el abrigo
  lexicon: HALOT
  rationale: אַדֶּרֶת designa una prenda exterior notable, algo más formal que una capa común. 'Manto' es una equivalencia digna y ampliamente inteligible en español bíblico.
- source_word: לְשׁוֹן הַזָּהָב
  english_pob_choice: the bar of gold
  chosen_spanish: la barra de oro
  alternatives_spanish:
  - la lengua de oro
  - la cuña de oro
  lexicon: HALOT
  rationale: 'Se preserva la imagen de una pieza alargada de oro sin caer en una traducción demasiado literal que sonaría extraña en español. ''Barra de oro'' comunica con claridad el objeto y corresponde a la decisión inglesa de traducir por forma, no por metáfora. '
- source_word: בָּנָיו ... בְּנֹתָיו
  english_pob_choice: his sons, his daughters
  chosen_spanish: sus hijos, sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - sus niños
  lexicon: HALOT
  rationale: El hebreo distingue varones y mujeres; en español, 'sus hijos, sus hijas' conserva esa especificidad. 'Hijos e hijas' sería posible, pero la repetición resulta más cercana al listado hebreo.
- source_word: שׁוֹרוֹ
  english_pob_choice: his ox
  chosen_spanish: su buey
  alternatives_spanish:
  - su toro
  - su ganado
  lexicon: HALOT
  rationale: שור puede ser 'buey' u otro bovino; en una lista singular de bienes domésticos, 'buey' suena natural y concreto. 'Ganado' volvería el término demasiado colectivo.
- source_word: חֲמֹרוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su burro
  - su mula
  lexicon: HALOT
  rationale: '''Asno'' es la correspondencia tradicional y adecuada del hebreo חמור. En español bíblico sigue siendo claro y precisa el animal sin modernizarlo en exceso.'
- source_word: צֹאנוֹ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - sus ovejas
  - su ganado menor
  lexicon: HALOT
  rationale: צאן es un colectivo para ganado menor; 'rebaño' preserva ese valor colectivo sin especificar especie. 'Sus ovejas' reduciría demasiado el campo semántico.
- source_word: אָהֳלוֹ
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su tienda de campaña
  - su toldo
  lexicon: HALOT
  rationale: אָהֶל significa 'tienda'; en español bíblico 'tienda' es natural y preciso. 'Tienda de campaña' explicaría demasiado.
- source_word: כָּל אֲשֶׁר לוֹ
  english_pob_choice: all that belonged to him
  chosen_spanish: todo lo que le pertenecía
  alternatives_spanish:
  - todo lo que tenía
  - todo lo que era suyo
  lexicon: HALOT
  rationale: La frase resume posesión total. 'Le pertenecía' conserva el sentido posesivo con buena fluidez en español y evita una paráfrasis más amplia.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y todo Israel con él
  alternatives_spanish:
  - y todo Israel con Josué
  - y todo Israel junto con él
  lexicon: HALOT
  rationale: 'Se mantiene la relación pronominal natural: el sufijo ''con él'' se entiende referenciado a Josué por el contexto inmediato. La forma es directa y ajustada al hebreo.'
- source_word: וַיַּעֲלוּ אֹתָם
  english_pob_choice: and they brought them up
  chosen_spanish: y los hicieron subir
  alternatives_spanish:
  - y los llevaron arriba
  - y los subieron
  lexicon: HALOT
  rationale: עלה con objeto expresa movimiento hacia arriba. 'Los hicieron subir' conserva la idea de traslado al valle sin necesidad de especificar demasiado el agente, y funciona bien con el grupo mixto de personas y bienes.
- source_word: עֵמֶק עָכוֹר
  english_pob_choice: the Valley of Achor
  chosen_spanish: el valle de Acor
  alternatives_spanish:
  - el valle de Achor
  - el valle de la Aflicción
  lexicon: HALOT
  rationale: Como topónimo, conviene transliterar el nombre propio. 'Acor' mantiene el vínculo con el nombre del lugar; el matiz semántico de 'trouble' se conserva en nota, no en el texto principal.
theological_decisions:
- issue: El grado de implicación de la familia de Acán
  english_pob_reading: Retain the straightforward wording 'his sons, his daughters' without explanatory qualification
  chosen_spanish_reading: Mantener 'sus hijos, sus hijas' sin aclaración interpretativa
  alternative_spanish_readings:
  - Añadir una nota que sugiera que fueron cómplices
  - Añadir una nota que sugiera que fueron solo acompañantes inocentes
  rationale: Este versículo enumera a la familia entre los elementos llevados al valle, pero no especifica aquí su grado de culpa o participación. La traducción conserva la tensión interpretativa en lugar de resolverla sin base textual directa.
  doctrine_reference: Preservar tensión teológica e interpretativa sin añadir una conclusión que el versículo no expone.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura del POB inglés de revisión más reciente, sin cambios de sentido respecto al audit trail. Se conservan las decisiones ya validadas sobre 'silver/plata', 'cloak/manto', 'bar of gold/barra de oro' y el topónimo 'Acor', y se mantiene la ausencia de expansión interpretativa sobre la familia de Acán.
  spanish_consistency_notes:
  - Se usa 'Josué' como forma estable del nombre propio, coherente con el corpus bíblico en español.
  - Se preserva la secuencia narrativa con 'Entonces' para reflejar el avance del waw-consecutivo.
  - Se mantiene el nombre del lugar 'Acor' en vez de traducirlo en el texto principal.
  - Se opta por 'manto' y 'barra de oro' como equivalencias dignas y legibles, evitando arcaísmos innecesarios.
  - La lista de bienes se mantiene en singular donde el hebreo es singular, respetando la acumulación detallada del original.
