translation:
  language: es
  text: 'Setenta semanas[a] están decretadas sobre tu pueblo y sobre tu ciudad santa: para poner fin a la transgresión, para sellar los pecados, para hacer expiación por la iniquidad, para traer justicia eterna, para sellar la visión y el profeta[c][b], y para ungir el lugar santísimo[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «setenta sietes»; muchos entienden esto como setenta semanas de años.'
    reason: lexical_alternative
  - marker: b
    text: O «para poner fin a los pecados».
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «visión y profeta»; algunos intérpretes antiguos y modernos entienden «visión y profecía».
    reason: alternative_reading
  - marker: d
    text: O «para ungir una persona santísima»; la frase hebrea puede referirse al lugar o a un objeto santísimo, y algunos la interpretan personalmente.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁבֻעִים שִׁבְעִים
  english_pob_choice: Seventy weeks
  chosen_spanish: Setenta semanas
  alternatives_spanish:
  - Setenta sevens
  - Setenta semanas de años
  lexicon: HALOT
  rationale: שָׁבֻעִים designa literalmente unidades de siete o semanas. En español, «semanas» comunica con naturalidad la base semántica del hebreo, mientras que «sevens» sería antinatural. La lectura más interpretativa («semanas de años») se conserva en nota.
- source_word: נֶחְתַּךְ
  english_pob_choice: are decreed
  chosen_spanish: están decretadas
  alternatives_spanish:
  - están determinadas
  - están cortadas
  lexicon: HALOT
  rationale: El nifal de חתך expresa una determinación fija o asignada. «Están decretadas» mantiene la idea de una decisión establecida sin perder claridad en español.
- source_word: עַל עַמְּךָ וְעַל עִיר קָדְשֶׁךָ
  english_pob_choice: concerning your people and your holy city
  chosen_spanish: sobre tu pueblo y sobre tu ciudad santa
  alternatives_spanish:
  - concerniente a tu pueblo y a tu ciudad santa
  - para tu pueblo y para tu ciudad santa
  lexicon: HALOT
  rationale: עַל admite varias relaciones. «Sobre» conserva el vínculo preposicional del hebreo y sugiere el alcance del decreto sin forzar una paráfrasis interpretativa.
- source_word: לְכַלֵּא הַפֶּשַׁע
  english_pob_choice: to finish the transgression
  chosen_spanish: para acabar con la transgresión
  alternatives_spanish:
  - para poner fin a la transgresión
  - para restringir la transgresión
  lexicon: HALOT
  rationale: כלה en este contexto transmite terminar o llevar a su fin. «Acabar con» conserva la fuerza telética y suena natural en español; «transgresión» mantiene el singular definido del hebreo.
- source_word: וְלַחְתֹּם חטאות
  english_pob_choice: to seal up sins
  chosen_spanish: para sellar los pecados
  alternatives_spanish:
  - para sellar los pecados [como cierre]
  - para poner fin a los pecados
  lexicon: HALOT
  rationale: חתם literalmente es «sellar». «Sellar los pecados» mantiene la metáfora y permite la ambigüedad de cierre, confirmación o terminación, sin explicarla en exceso.
- source_word: וּלְכַפֵּר עָוֺן
  english_pob_choice: to make atonement for iniquity
  chosen_spanish: para hacer expiación por la iniquidad
  alternatives_spanish:
  - para hacer propiciación por la iniquidad
  - para expiar la iniquidad
  lexicon: HALOT
  rationale: כפר es un verbo teológico clave. «Hacer expiación» preserva el valor sacrificial y reconciliador en un registro bíblico claro; «iniquidad» conserva el peso moral de עָוֺן.
- source_word: וּלְהָבִיא צֶדֶק עֹלָמִים
  english_pob_choice: to bring in everlasting righteousness
  chosen_spanish: para traer justicia eterna
  alternatives_spanish:
  - para traer rectitud eterna
  - para introducir justicia eterna
  lexicon: HALOT
  rationale: ביא con צֶדֶק permite la idea de traer o introducir. En español, «traer justicia eterna» es conciso y fiel; «justicia» mantiene el peso jurídico/covenantal del hebreo, con «eterna» para עֹלָמִים.
- source_word: וְלַחְתֹּם חָזוֹן וְנָבִיא
  english_pob_choice: to seal up vision and prophet
  chosen_spanish: para sellar la visión y el profeta
  alternatives_spanish:
  - para sellar la visión y la profecía
  - para autenticar la visión y el profeta
  lexicon: HALOT
  rationale: El texto consonántico lee נָבִיא, «profeta», no el abstracto «profecía». Por eso se conserva «visión y el profeta»; la alternativa esperada por muchos lectores se reserva en nota.
- source_word: וְלִמְשֹׁחַ
  english_pob_choice: to anoint
  chosen_spanish: para ungir
  alternatives_spanish:
  - para consagrar con aceite
  lexicon: HALOT
  rationale: משׁח se traduce de forma directa y estándar por «ungir», que en español bíblico transmite el rito sin añadidos.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: the most holy place
  chosen_spanish: el lugar santísimo
  alternatives_spanish:
  - un ser santísimo
  - el Santo de los Santos
  - lo santísimo
  lexicon: HALOT
  rationale: La frase puede referirse a un espacio, cosa o persona suprema en santidad. Aquí «el lugar santísimo» es la opción más natural y pública en español, sin cerrar indebidamente la posibilidad de una lectura personal.
theological_decisions:
- issue: Referente de קֹדֶשׁ קָדָשִׁים
  english_pob_reading: the most holy place
  chosen_spanish_reading: el lugar santísimo
  alternative_spanish_readings:
  - un ser santísimo
  - el Santo de los Santos
  rationale: La frase hebrea suele designar el ámbito o cosa más santa, y el contexto inmediato no nombra explícitamente una persona. «El lugar santísimo» evita imponer una identificación mesiánica en el texto principal, preservando la tensión interpretativa del hebreo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla más allá del texto.'
- issue: Naturaleza de שָׁבֻעִים en la profecía
  english_pob_reading: weeks
  chosen_spanish_reading: semanas
  alternative_spanish_readings:
  - sevens
  - semanas de años
  rationale: El hebreo dice literalmente unidades de siete; como el versículo no añade «años», el texto principal mantiene «semanas». La lectura de heptadas o semanas de años queda abierta en la nota.
  doctrine_reference: 'Translation philosophy §1 y §3: primacía del original; mantener ambigüedad genuina.'
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; se mantuvo la ambigüedad de שָׁבֻעִים, el valor metafórico de חתם, la distinción entre «pecados» e «iniquidad», y la posible referencialidad de קֹדֶשׁ קָדָשִׁים sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo explícitamente lo requiere; aquí no aparece.
  - Se mantiene «justicia» para צֶדֶק en continuidad con el registro jurídico-covenantal.
  - Se usa «expiación» para כפר por su valor teológico técnico en español bíblico.
  - «Profeta» se conserva en singular conforme al texto consonántico, con nota para la lectura «profecía».
