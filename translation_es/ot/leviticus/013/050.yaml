review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: el sacerdote examina el área afectada y luego la aparta por siete días. ‘Examinará’ para וְרָאָה y ‘aislará’ para וְהִסְגִּיר son elecciones fieles y naturales. Sin embargo, la anotación de notas al pie no preserva correctamente la lógica del rastro inglés: la nota sobre ‘aislar/encerrar’ fue puesta sobre ‘la lesión’ y no sobre el verbo de aislamiento, y además un mismo marcador [b] se reutiliza para dos asuntos distintos en el texto. También conviene mantener dos notas distintas para las dos alternativas léxicas documentadas en inglés.'
  spanish_quality_summary: 'El español es claro y legible, con buen registro. ‘La lesión’ es comprensible, aunque ‘área afectada’ estaría más cerca del matiz explicativo del POB inglés; no obstante, ‘lesión’ puede aceptarse en este contexto. El problema principal es técnico-editorial y semántico en las notas: deben anclarse correctamente y con marcadores únicos. Una leve mejora estilística es usar ‘durante siete días’, aunque ‘por siete días’ no es incorrecto.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. ‘Sacerdote’ y ‘aislará’ están bien. ‘Lesión’ no contradice el glosario, aunque es algo más estrecho que ‘área afectada’; aun así, sigue dentro del rango permitido si se mantiene la nota explicativa.
  issues:
  - severity: high
    issue: El marcador [b] se reutiliza para dos elementos distintos y no sigue la disciplina requerida de marcadores únicos.
    rationale: Las instrucciones exigen marcadores únicos en orden y prohíben reutilizar un marcador para dos notas diferentes en el mismo registro.
  - severity: high
    issue: La nota sobre alternativas de הִסְגִּיר (‘aislar’, ‘encerrar’, ‘shut up’) falta en el texto español y fue sustituida por una nota léxica sobre נגע.
    rationale: El rastro inglés conserva una nota específica para el verbo de aislamiento; debe preservarse también en español, anclada al verbo correspondiente.
  - severity: medium
    issue: La nota léxica sobre נגע está anclada también sobre ‘aislará’, lo cual crea confusión semántica.
    rationale: La nota sobre el sustantivo debe anclarse a ‘lesión’ o equivalente, no al verbo.
  revised_spanish_text: Y el sacerdote examinará[a] la lesión[b], y la aislará[c] durante siete días.
  revised_footnotes:
  - marker: a
    text: O ‘inspeccionará’. El verbo hebreo implica aquí una revisión oficial del caso, no solo una mirada casual.
    reason: lexical_alternative
  - marker: b
    text: O ‘la mancha’, ‘la infección’ o, de manera más tradicional, ‘la plaga’. El hebreo señala el área afectada bajo examen sacerdotal, no necesariamente una categoría médica moderna.
    reason: lexical_alternative
  - marker: c
    text: O ‘la pondrá en aislamiento’ o, más literalmente, ‘la encerrará’. El sentido es un confinamiento temporal para observación.
    reason: lexical_alternative
