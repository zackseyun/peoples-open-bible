translation:
  language: es
  text: 'Y sea que la joven a quien yo diga: “Te ruego, inclina tu cántaro para que yo beba”, y que responda: “Bebe, y también daré de beber a tus camellos”, sea la que has designado para tu siervo, para Isaac[a]. Por esto sabré que has mostrado tu amor leal a mi señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “para tu siervo Isaac”. El hebreo puede leerse en aposición, pero el texto principal entiende “tu siervo” como el hablante en oración y “para Isaac” como una frase separada.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And let it be
  chosen_spanish: Y que sea que
  alternatives_spanish:
  - Y suceda que
  - Y llegue a ser que
  - Y sea
  lexicon: HALOT
  rationale: La forma introduce una petición deseada en contexto de oración. ‘Y que sea que’ conserva el matiz volitivo sin sonar áspero ni demasiado arcaico en español.
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la joven mujer
  - la doncella
  lexicon: HALOT
  rationale: נַעֲרָה alude aquí a una mujer joven en edad casadera. ‘La joven’ es natural y sobrio; evita tanto ‘muchacha’ como ‘doncella’, que pueden sonar más marcadas o anticuadas.
- source_word: הַטִּי נָא כַדֵּךְ
  english_pob_choice: Please lower your jar
  chosen_spanish: Te ruego, inclina tu cántaro
  alternatives_spanish:
  - Te ruego, baja tu cántaro
  - Por favor, inclina tu jarro
  - Te ruego, baja tu jarra
  lexicon: HALOT
  rationale: הטה significa inclinar/ladear. ‘Inclina tu cántaro’ conserva la imagen del recipiente cargado y es suficientemente claro en español bíblico contemporáneo. ‘Te ruego’ representa נָא con un tono respetuoso.
- source_word: וְאֶשְׁתֶּה
  english_pob_choice: so that I may drink
  chosen_spanish: para que yo beba
  alternatives_spanish:
  - y beberé
  - para beber
  lexicon: HALOT
  rationale: El valor de propósito/solicitud se expresa bien con ‘para que yo beba’, que mantiene el sentido dependiente del ruego previo.
- source_word: וְאָמְרָה שְׁתֵה
  english_pob_choice: and who says, ‘Drink,’
  chosen_spanish: 'y que responda: “Bebe,”'
  alternatives_spanish:
  - 'y que diga: “Bebe,”'
  - 'y diga: “Bebe,”'
  lexicon: HALOT
  rationale: La secuencia condicional futura en español fluye naturalmente con ‘que responda’. ‘Bebe’ preserva la brevedad imperativa del hebreo.
- source_word: וְגַם גְּמַלֶּיךָ אַשְׁקֶה
  english_pob_choice: and I will also water your camels
  chosen_spanish: y también daré de beber a tus camellos
  alternatives_spanish:
  - y también les daré de beber a tus camellos
  - y también abrevaré a tus camellos
  lexicon: HALOT
  rationale: ‘Dar de beber’ reproduce bien el verbo causativo de dar agua/bebida. ‘Abrevar’ es correcto pero más regional o literario; ‘daré de beber’ resulta claro y natural.
- source_word: אֹתָהּ הֹכַחְתָּ
  english_pob_choice: let her be the one you have appointed
  chosen_spanish: sea la que has designado
  alternatives_spanish:
  - sea la que has señalado
  - sea la que has elegido
  - sea la que has nombrado
  lexicon: HALOT
  rationale: הוכחת aquí se entiende como determinar/designar por señal providencial. ‘Designado’ conserva esa fuerza sin sobrecargar con ‘probar’ o ‘demostrar’.
- source_word: לְעַבְדְּךָ לְיִצְחָק
  english_pob_choice: for your servant, for Isaac
  chosen_spanish: para tu siervo Isaac
  alternatives_spanish:
  - para tu siervo, para Isaac
  - para tu siervo, Isaac
  - para Isaac, tu siervo
  lexicon: HALOT
  rationale: El hebreo puede leerse con una relación apposicional o con dos dativos. En español, ‘para tu siervo Isaac’ preserva la opción más compacta y natural sin eliminar la tensión interpretativa del texto base.
- source_word: וּבָהּ אֵדַע
  english_pob_choice: By this I will know
  chosen_spanish: Por esto sabré
  alternatives_spanish:
  - Por ella sabré
  - Con esto sabré
  - En esto sabré
  lexicon: HALOT
  rationale: La preposición con sufijo femenino puede referirse a la joven como señal o al hecho/circunstancia por el que se la reconoce. ‘Por esto’ mantiene abierta la referencia, como hace la revisión inglesa más reciente.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor constante
  - misericordia leal
  - bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד es un término denso que implica bondad leal y relacional. ‘Amor leal’ comunica bien el valor de fidelidad afectiva y no lo reduce a simple cortesía.
- source_word: עִם אֲדֹנִי
  english_pob_choice: to my master
  chosen_spanish: a mi señor
  alternatives_spanish:
  - con mi señor
  - para mi señor
  lexicon: HALOT
  rationale: En español, ‘mostrar amor leal a’ es idiomático y conserva la relación de beneficio hacia el señor del siervo. ‘A mi señor’ sigue de cerca el sentido relacional del hebreo.
theological_decisions:
- issue: Valor del signo en la oración del siervo
  english_pob_reading: The chosen woman functions as the sign by which the servant will know God's guidance.
  chosen_spanish_reading: La joven es la señal providencial por la que el siervo reconocerá la guía de Dios.
  alternative_spanish_readings:
  - La joven misma es la señal por la que el siervo reconocerá la guía de Dios.
  - Por este hecho sabrá el siervo que Dios ha guiado la elección.
  rationale: El hebreo permite que el sufijo femenino apunte a la joven o al medio circunstancial del discernimiento. ‘Por esto sabré’ mantiene la ambigüedad útil y evita cerrar el texto demasiado pronto.
  doctrine_reference: Providencia divina y discernimiento mediante señal en la narración patriarcal.
- issue: Sentido de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - bondad fiel
  - misericordia leal
  rationale: Se preserva la carga relacional y fiel del término sin reducirlo a simple amabilidad. ‘Amor leal’ funciona bien en español para expresar una bondad comprometida y persistente.
  doctrine_reference: Bondad fiel de Dios / חֶסֶד en el AT.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés POB: el inicio volitivo se mantuvo, la frase final se resolvió con ‘por esto’ para reflejar el valor instrumental/indicativo de וּבָהּ, y se evitó una estructura redundante. En español, además, se optó por ‘para tu siervo Isaac’ como solución compacta que conserva la posible apposición sin forzar una glosa.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos como ‘jarra’ si ‘cántaro’ transmite mejor el recipiente de contexto.
  - No se usó ‘SEÑOR’ para el Tetragrámaton en esta unidad porque el versículo no lo contiene; sí se conservó ‘mi señor’ para אֲדֹנִי, en sentido humano.
  - Se prefirió ‘amor leal’ para חֶסֶד por coherencia con el audit trail de ‘steadfast love’ y para evitar diluir el contenido relacional del término.
  - Se preservó la tensión interpretativa de לְעַבְדְּךָ לְיִצְחָק con una formulación natural en español, sin introducir una nota textual al no ser necesaria en esta unidad.
