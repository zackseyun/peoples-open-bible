    issue: קָנֶה אֶחָד se tradujo como 'un codo'
    rationale: El hebreo distingue claramente entre קָנֶה ('caña', unidad de medición mayor) y אַמָּה ('codo'). En el mismo versículo aparecen ambas; traducir ambas como 'codo' borra una distinción esencial del texto fuente y contradice la decisión lexical auditada del POB inglés.
  - severity: medium
    issue: הַתָּא / הַתָּאִים se tradujo como 'cámara(s)' en vez de reflejar la función de guardia
    rationale: Aunque 'cámara' puede ser una alternativa posible, el POB inglés documenta 'guardroom' como elección principal por el contexto de una estructura de puerta. En español, 'cuarto de guardia' o 'aposento de guardia' preserva mejor ese valor contextual.
  - severity: low
    issue: מֵהַבַּיִת se tradujo como 'en el interior'
    rationale: No es incorrecto, pero la nota inglesa explica que la idea es el lado interior del complejo de la puerta. 'Del lado interior' lo expresa con un matiz espacial algo más preciso en español.
