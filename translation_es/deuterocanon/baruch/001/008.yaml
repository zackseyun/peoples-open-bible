    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λαβεῖν
  english_pob_choice: when he received
  chosen_spanish: cuando él recibió
  alternatives_spanish:
  - al recibir
  - cuando recibió
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo concomitante. En español, «cuando él recibió» conserva el valor temporal de forma clara y natural; el pronombre explícito ayuda a mantener la referencia al sujeto del contexto.
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasos
  - recipientes
  - vasijas
  lexicon: BDAG
  rationale: En contexto del templo, σκεύη puede abarcar objetos/implementos cultuales. «Utensilios» es amplio, formal y evita restringir indebidamente el conjunto a solo vasijas o recipientes.
- source_word: οἴκου Κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa del Señor
  alternatives_spanish:
  - la casa de Yahvé
  - la casa del Yahvé
  - la casa del Señor
  lexicon: BDAG
  rationale: El inglés POB opta por 'Lord' para Κυρίου en esta frase cultual. En español, «Señor» reproduce ese equivalente sin forzar una paráfrasis, y mantiene el registro litúrgico del sintagma 'casa del Señor'.
- source_word: τὰ ἐξενεχθέντα ἐκ τοῦ ναοῦ
  english_pob_choice: that had been carried out from the temple
  chosen_spanish: que habían sido sacados del templo
  alternatives_spanish:
  - que habían sido llevados fuera del templo
  - que habían sido sacados del santuario
  lexicon: BDAG
  rationale: El participio aoristo pasivo indica una acción previa ya cumplida. «Habían sido sacados» conserva la pasiva y la anterioridad, y «templo» traduce ναός con claridad en este contexto.
- source_word: ἀποστρέψαι
  english_pob_choice: to return them
  chosen_spanish: para devolverlos
  alternatives_spanish:
  - para llevarlos de vuelta
  - para restituirlos
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Devolverlos» comunica bien el movimiento de retorno de los utensilios al territorio de Judá y evita una construcción demasiado literal o poco natural.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - la tierra de Judá
  - el país de Judá
  - Judá
  lexicon: BDAG
  rationale: «Tierra» reproduce el valor territorial de γῆ y se ajusta al uso bíblico español. Mantiene la referencia geográfica sin reducirla solo al nombre propio.
- source_word: τῇ δεκάτῃ τοῦ Σειουάν
  english_pob_choice: on the tenth of Sivan
  chosen_spanish: el día diez de Siván
  alternatives_spanish:
  - el diez de Siván
  - el décimo día de Siván
  lexicon: BDAG
  rationale: La fórmula fecha-mes se vuelve natural en español con «el día diez de Siván». Se conserva el nombre convencional del mes hebreo en transliteración española corriente.
- source_word: σκεύη ἀργυρᾶ
  english_pob_choice: silver vessels
  chosen_spanish: utensilios de plata
  alternatives_spanish:
  - vasos de plata
  - objetos de plata
  - vasijas de plata
  lexicon: BDAG
  rationale: La construcción adjetival puede traducirse como material del que están hechos los objetos. «Utensilios de plata» mantiene la idea de objetos cultuales y la especificación material.
- source_word: ἐποίησεν
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había fabricado
  - había realizado
  lexicon: BDAG
  rationale: El pluscuamperfecto español expresa bien que la fabricación de los utensilios antecede al momento narrado. «Había hecho» es fiel y suficientemente sobrio.
theological_decisions:
- issue: Tratamiento de Κύριος en una referencia al templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto griego dice Κυρίου. Siguiendo el criterio del POB inglés para este pasaje, se conserva la referencia mediante «Señor» en español, sin sustituirla por una máscara tipográfica ni por una reconstrucción explícita del nombre divino cuando el contexto inmediato no lo exige.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Relación entre ναός y el lugar sagrado de donde fueron sacados los utensilios
  english_pob_reading: from the temple
  chosen_spanish_reading: del templo
  alternative_spanish_readings:
  - del santuario
  - de la casa de Dios
  rationale: «Templo» sigue el valor contextual del griego ναός en el audit trail inglés. Evita una precisión técnica innecesaria y conserva la transparencia entre el texto fuente y la traducción.
  doctrine_reference: BDAG / audit trail lexical decision for ναός
translation_notes:
  revision_awareness: El registro sigue el pasaje tal como aparece en la capa de traducción preparada y coincide con el audit trail inglés revisado, sin cambios posteriores señalados en la última pasada de revisión.
  spanish_consistency_notes:
  - Se usa «Siván» como transliteración española convencional del mes Σειουάν.
  - Se mantiene «tierra de Judá» para conservar el matiz territorial de γῆ.
  - La puntuación con raya final reproduce el cierre incompleto de la unidad en el original griego y en el inglés auditado.
