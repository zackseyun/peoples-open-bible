base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/007/007.yaml
  text: When the Philistines heard that the sons of Israel had gathered at Mizpah[a], the rulers of the Philistines went up against Israel. When the sons of Israel heard it[b], they were afraid because of the Philistines.
  footnotes:
