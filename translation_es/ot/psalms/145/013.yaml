    text: 'O: «por toda generación» o «a través de toda generación». El hebreo literalmente dice: «en toda generación y generación».'
    reason: lexical_alternative
  revision_rationale: Se conserva la repetición poética de «reino» y la formulación «de todas las edades» por fidelidad a la decisión POB, pero se sustituye «por cada generación» por «de generación en generación» porque expresa con mayor naturalidad y precisión el modismo hebreo de continuidad a través de generaciones sucesivas. También se añade una nota para documentar la alternativa temporal correspondiente al rastro de auditoría inglés.
