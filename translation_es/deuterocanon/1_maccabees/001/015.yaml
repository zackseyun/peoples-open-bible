translation:
  language: es
  text: y se hicieron prepucios para sí[a], y se apartaron del santo pacto, y se unieron en yugo con las naciones, y se vendieron para hacer el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «se hicieron prepucios para sí»; es decir, ocultaron o revirtieron la señal visible de la circuncisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν ἑαυτοῖς ἀκροβυστίαν
  english_pob_choice: they made themselves foreskins
  chosen_spanish: se hicieron prepucios para sí
  alternatives_spanish:
  - se restauraron el prepucio
  - se hicieron incircuncisos
  lexicon: LSJ
  rationale: 'El griego es literal y chocante: ''hicieron prepucio para sí''. En español, ''prepucios'' conserva la concreción corporal del original mejor que una paráfrasis abstracta. La construcción reflexiva mantiene la idea de autoalteración deliberada, y la nota preserva la posible lectura idiomática de revertir la marca visible de la circuncisión.'
- source_word: ἀπέστησαν
  english_pob_choice: turned away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - apostataron
  - se retiraron
  - se desviaron
  lexicon: LSJ
  rationale: El verbo expresa separación o deserción. 'Se apartaron' es natural en español y comunica con claridad la ruptura de lealtad sin imponer un tecnicismo eclesiástico posterior como 'apostataron'.
- source_word: διαθήκης ἁγίας
  english_pob_choice: the holy covenant
  chosen_spanish: el santo pacto
  alternatives_spanish:
  - el pacto santo
  - un pacto santo
  lexicon: LSJ
  rationale: '''Diathēkē'' en este contexto bíblico se refiere al pacto establecido con Dios. ''Santo pacto'' mantiene el valor covenantal y la cualidad sagrada. El artículo definido se justifica por el contexto israelita concreto, como en la lectura inglesa.'
- source_word: ἐζευγίσθησαν
  english_pob_choice: yoked themselves
  chosen_spanish: se unieron al
  alternatives_spanish:
  - se yugaron con
  - se ataron con
  - se ligaron a
  lexicon: LSJ
  rationale: El verbo conserva la imagen de ser unidos bajo un yugo. En español, 'se unieron al' comunica el enlace con las naciones, aunque el sentido de dependencia y conformidad queda reforzado por la imagen del yugo en la nota léxica/alternativa del inglés. La forma estrictamente metafórica 'se yugaron con' suena menos natural aquí.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: En este contexto judío, 'las naciones' es la equivalencia más directa y menos cargada teológicamente. Mantiene el contraste pactal con Israel sin sustituirlo por un término más confesional como 'gentiles'.
- source_word: ἐπράθησαν
  english_pob_choice: sold themselves
  chosen_spanish: se vendieron
  alternatives_spanish:
  - se entregaron
  - fueron vendidos
  lexicon: LSJ
  rationale: El verbo medio/passivo apunta a autoentrega o autoventa moral. 'Se vendieron' reproduce la fuerza del original y conserva la idea de esclavización voluntaria implícita en el griego y en la versión inglesa.
- source_word: τοῦ ποιῆσαι πονηρόν
  english_pob_choice: to do evil
  chosen_spanish: para hacer el mal
  alternatives_spanish:
  - para hacer lo malo
  - para cometer maldad
  lexicon: LSJ
  rationale: La construcción final expresa propósito. 'Para hacer el mal' es natural en español, fiel al griego y suficientemente fuerte para retener el juicio moral del texto sin sobrecargarlo.
theological_decisions:
- issue: Cómo verter en español la expresión cruda sobre la circuncisión invertida
  english_pob_reading: Retain the literal expression 'made themselves foreskins' in the main text
  chosen_spanish_reading: Conservar 'se hicieron prepucios para sí' en el texto principal
  alternative_spanish_readings:
  - '''se restauraron el prepucio'''
  - '''se hicieron incircuncisos'''
  rationale: La frase literal preserva la concreción escandalosa del griego, que subraya la ruptura visible con la señal del pacto. Una paráfrasis más suave aclararía el sentido, pero perdería la fuerza retórica del pasaje. La nota permite al lector captar el valor idiomático sin borrar la imagen.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se registran revisiones sustantivas en la fuente inglesa. La versión española sigue esa línea, conservando la literalidad marcada del primer miembro y el paralelismo de las cláusulas posteriores.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino explícito.
  - '''Las naciones'' se usa de forma consistente para ἔθνη en este contexto judío.'
  - La expresión 'santo pacto' conserva la referencia covenantal sin introducir formulación litúrgica posterior.
