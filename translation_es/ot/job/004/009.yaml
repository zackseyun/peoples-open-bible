translation:
  language: es
  text: Por el soplo de Dios perecen[a], y por la ráfaga[b] de su ira llegan a su fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «desde el soplo de Dios». El hebreo מִן puede entenderse como origen o medio; aquí se traduce con valor instrumental para expresar mejor la acción causal en español.'
    reason: lexical_alternative
  - marker: b
    text: «Ráfaga» traduce רוּחַ, que también puede significar «viento», «aliento» o «espíritu». En este contexto, la imagen apunta a una emanación destructiva asociada con la ira divina.
    reason: lexical_alternative
  - marker: c
    text: 'O: «son consumidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנִּשְׁמַת
  english_pob_choice: by the breath of
  chosen_spanish: por el soplo de
  alternatives_spanish:
  - por el aliento de
  - desde el soplo de
  lexicon: HALOT
  rationale: נשמה designa respiración, soplo o aliento de vida. En español, «soplo» comunica bien la imagen poética y mantiene la fuerza causal/instrumental del hebreo con la preposición מִן entendida como medio o causa.
- source_word: אֱלוֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - Dios [Eloah]
  lexicon: HALOT
  rationale: אֱלוֹהַ es la forma singular poética «Dios», frecuente en Job. «Dios» es el equivalente natural y fiel, sin añadir títulos que no están en el texto.
- source_word: יֹאבֵדוּ
  english_pob_choice: they perish
  chosen_spanish: perecen
  alternatives_spanish:
  - son destruidos
  - desaparecen
  lexicon: HALOT
  rationale: אבד en qal expresa la idea básica de perecer o ser destruido. «Perecen» conserva el valor intransitivo y el paralelismo poético sin precisar indebidamente el modo de la ruina.
- source_word: וּמֵרוּחַ
  english_pob_choice: and by the blast of
  chosen_spanish: y por el soplo de
  alternatives_spanish:
  - y por el viento de
  - y por el espíritu de
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, aliento o espíritu. Aquí, en paralelo con «soplo» y en relación con la ira divina, el español «soplo» preserva la fuerza imagística sin introducir la acepción teológica «espíritu» ni repetir de forma innecesaria otra imagen distinta.
- source_word: אַפּוֹ
  english_pob_choice: his anger
  chosen_spanish: su ira
  alternatives_spanish:
  - su enojo
  - sus narices
  lexicon: HALOT
  rationale: אַף denota literalmente nariz/ventana de la nariz, y por extensión ira. En este giro, el sentido idiomático es la ira divina; «su ira» es claro y fiel, mientras que la imagen corporal queda insinuada por «soplo».
- source_word: יִכְלֽוּ
  english_pob_choice: they come to an end
  chosen_spanish: llegan a su fin
  alternatives_spanish:
  - son consumidos
  - terminan
  lexicon: HALOT
  rationale: כלה en qal puede significar acabar, llegar a su fin o ser consumido. «Llegan a su fin» conserva el resultado final del verbo y armoniza con el paralelo de «perecen».
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a la ira divina
  english_pob_reading: Translate אַפּוֹ idiomatically as 'his anger' while retaining the breath/blast imagery in the parallel line.
  chosen_spanish_reading: Traducir אַפּוֹ como «su ira» y conservar en la segunda hemistiquio la imagen del «soplo».
  alternative_spanish_readings:
  - su nariz
  - su enojo
  - su furor
  rationale: El hebreo usa lenguaje antropomórfico, pero la fuerza semántica es la ira divina. Traducirlo de forma literal como «su nariz» oscurecería el sentido; «su ira» mantiene la claridad y deja intacta la imagen poética del soplo destructivo.
  doctrine_reference: Conservar la tensión poética sin resolverla ni suavizarla; lectura clara y reverente.
translation_notes:
  revision_awareness: El texto en inglés del POB mantiene una lectura poética e instrumental («by the breath of God») y resuelve אַפּוֹ idiomáticamente como «his anger». La versión española sigue esa misma línea, pero elige «soplo» para mantener la imagen y «su ira» para conservar el sentido idiomático. No hay revisiones aplicadas en el expediente fuente.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «perecen» y «llegan a su fin» sin intensificar innecesariamente la destrucción.
  - «Soplo» se usa en ambos hemistiquios para dar cohesión poética, mientras que la segunda cláusula explicita la ira divina.
  - Se evita «SEÑOR» por tratarse de אֱלוֹהַ y no del tetragrámaton.
