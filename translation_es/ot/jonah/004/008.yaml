revisions:
- from: 'Cuando salió el sol[a], Dios dispuso un viento del este abrasador, y el sol golpeó la cabeza de Jonás, de modo que desfalleció. Entonces pidió morir y dijo[b]: «Mi muerte es mejor que mi vida».'
  to: 'Cuando salió el sol[a], Dios dispuso un viento del este abrasador, y el sol azotó la cabeza de Jonás, de modo que desfalleció. Y pidió morir y dijo[b]: «Mi muerte es mejor que mi vida».'
  rationale: 'Se hace una reparación menor para mejorar la fidelidad discursiva y la naturalidad del español: se elimina «Entonces», que añadía una secuencia más marcada de la que exige el hebreo, y se sustituye «golpeó» por «azotó», que suena más idiomático en este contexto sin perder la fuerza de la imagen. El resto del texto y las notas pueden mantenerse.'
  reviewer_model: gpt-5.4
