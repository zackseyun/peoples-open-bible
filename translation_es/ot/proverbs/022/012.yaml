translation:
  language: es
  text: Los ojos de Yahvé preservan el conocimiento[a], pero él subvierte[b] las palabras del traicionero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guardan». El verbo hebreo puede significar «guardar», «mantener» o «preservar».
    reason: lexical_alternative
  - marker: b
    text: O «trastorna» o «pervierte». El verbo hebreo puede transmitir la idea de torcer o subvertir algo.
    reason: lexical_alternative
  - marker: c
    text: O «el infiel». El término hebreo designa a quien actúa con traición o deslealtad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי יְהוָה
  english_pob_choice: The eyes of Yahweh
  chosen_spanish: Los ojos de Yahvé
  alternatives_spanish:
  - Los ojos de Yahvé
  - Los ojos de Yahvé son
  lexicon: HALOT
  rationale: Conserva la imagen antropomórfica de vigilancia divina sin sustituir el nombre propio por una convención de ocultamiento; «ojos» mantiene la metáfora hebrea de atención y observación.
- source_word: נָצְרוּ
  english_pob_choice: preserve
  chosen_spanish: preservan
  alternatives_spanish:
  - guardan
  - custodian
  - protegen
  lexicon: HALOT
  rationale: «Preservan» reproduce el sentido de guardar/retener con naturalidad en español y armoniza con el contraste de la segunda cola; evita sobreinterpretar la acción como mera vigilancia.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el saber
  - el conocimiento
  lexicon: HALOT
  rationale: «Conocimiento» es la opción más directa y sobria para דעת en Proverbios; mantiene el énfasis sapiencial sin ampliar indebidamente a «entendimiento».
- source_word: וַיְסַלֵּף
  english_pob_choice: he overturns
  chosen_spanish: trastorna
  alternatives_spanish:
  - subvierte
  - pervierte
  - derriba
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar torcer, subvertir u ocasionar el fracaso de algo; «trastorna» comunica de forma idiomática el efecto de desbaratar las palabras de los traicioneros sin perder la fuerza activa del sujeto divino.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las expresiones de
  lexicon: HALOT
  rationale: «Palabras» es el equivalente más inmediato y fiel al plural constructo, y encaja con el objeto directo de la acción divina en el paralelismo.
- source_word: בֹגֵד
  english_pob_choice: the treacherous
  chosen_spanish: el traicionero
  alternatives_spanish:
  - el infiel
  - el que traiciona
  - el pérfido
  lexicon: HALOT
  rationale: «Traicionero» refleja la cualidad de בוגד como alguien que actúa con traición o deslealtad; evita fijar sin necesidad un matiz exclusivamente pactual o exclusivamente interpersonal.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: La pauta del proyecto en español pide «Yahvé» para יְהוָה, preservando el nombre divino y evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Agente divino en la segunda cola
  english_pob_reading: he overturns the words of the treacherous
  chosen_spanish_reading: él trastorna las palabras del traicionero
  alternative_spanish_readings:
  - Yahvé trastorna las palabras del traicionero
  - él subvierte las palabras del traicionero
  rationale: El hebreo mantiene a Yahvé como sujeto implícito; el pronombre español explícito conserva la sintaxis natural sin perder la referencia. «Trastorna» mantiene la oposición activa de Dios frente al habla falsa.
  doctrine_reference: 'Proverbs wisdom theology: divine opposition to treachery and false speech'
translation_notes:
  revision_awareness: El texto inglés de control conserva alta concordancia con la hebrea y no registra revisiones sustantivas; se siguió la lectura existente, ajustando únicamente la formulación española para reflejar el nombre divino y la fuerza verbal del hebreo con naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - Se evitó «SEÑOR» como máscara tipográfica para no borrar el nombre divino.
  - «Preservan» y «trastorna» forman un paralelismo claro y natural en español.
  - Se eligió singular colectivo «el traicionero» para reflejar el sustantivo hebreo sin añadir género o número no presentes.
