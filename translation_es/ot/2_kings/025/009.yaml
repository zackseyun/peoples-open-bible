    rationale: La nota [b] comenta כָּל בֵּית גָּדוֹל («toda/cada casa grande/importante»), pero en el borrador aparece después de «Jerusalén». Esto desorienta al lector y no cumple la disciplina de anclar la nota en la frase relevante.
