review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: mantiene la vergüenza de pedir fuerzas montadas y de a pie como escolta por seguridad frente a personas hostiles. También respeta correctamente que el texto se ancle en la LXX y no en el paralelo masorético no coincidente. Sin embargo, «caballería» en el texto principal desplaza el matiz literal de ἵππεις (‘jinetes’/‘hombres a caballo’) hacia un sustantivo colectivo más técnico; dado que la nota ya ofrece la alternativa más técnica, conviene acercar el cuerpo principal al valor léxico del griego.'
  spanish_quality_summary: 'El español es claro y natural, pero «pedir caballería y tropas de a pie como escolta» suena algo desigual: un colectivo técnico («caballería») junto a una expresión descriptiva («tropas de a pie»). «Hombres a caballo y soldados de a pie» o similar mejora la simetría y la legibilidad sin perder dignidad. El resto de la frase fluye bien.'
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La decisión principal aquí es léxica-militar: conviene evitar en el texto principal un término más interpretativo/técnico («caballería») cuando el inglés POB prefirió la forma más cercana («horsemen») y dejó «cavalry» como alternativa en nota. La nota puede conservar «caballería e infantería».'
  issues:
  - severity: medium
    issue: «caballería» en el texto principal es más técnico y menos literal que ἵππεις
    rationale: El griego se refiere literalmente a hombres montados/horsemen. El inglés auditado escogió la forma más cercana en el texto y reservó «cavalry» para nota. En español, «caballería» funciona, pero conviene reflejar mejor el matiz base en el cuerpo principal.
  - severity: low
    issue: Asimetría estilística entre «caballería» y «tropas de a pie»
    rationale: La combinación mezcla un colectivo militar técnico con una descripción más perifrástica. Una pareja paralela como «hombres a caballo y soldados de a pie» lee mejor en español y representa con más equilibrio ambos términos griegos.
  revised_spanish_text: Porque me avergoncé de pedir hombres a caballo y soldados de a pie como escolta, por seguridad contra los que nos eran hostiles[a].
  revised_footnotes:
  - marker: a
    text: O «caballería e infantería como escolta».
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal para reflejar más de cerca el valor léxico de ἵππεις y πεζούς, dejando la formulación más técnica en la nota, en línea con la auditoría inglesa y con mejor equilibrio estilístico en español.
