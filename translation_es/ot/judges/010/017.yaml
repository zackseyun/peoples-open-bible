translation:
  language: es
  text: Entonces los amonitas fueron convocados[a] y acamparon en Galaad, y los hijos de Israel se reunieron y acamparon en Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces los amonitas clamaron y acamparon en Galaad». El verbo hebreo puede significar «clamar», aunque en este contexto probablemente se refiere a ser convocados o reunidos para la batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֲקוּ
  english_pob_choice: were summoned
  chosen_spanish: fueron reunidos
  alternatives_spanish:
  - fueron convocados
  - se juntaron
  - clamaron
  lexicon: HALOT
  rationale: El hebreo puede significar 'clamar', pero en este contexto militar y con el verbo siguiente sobre el campamento, el sentido probable es de convocatoria o reunión para la guerra. 'Fueron reunidos' conserva ese valor de movilización sin forzar un matiz inexistente en español.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - los hombres de Amón
  lexicon: HALOT
  rationale: Como en inglés, el nombre del pueblo se vierte con el etnónimo natural en español. 'Amonitas' mantiene claridad y fluidez, y sigue el referente colectivo del hebreo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - establecieron campamento
  lexicon: HALOT
  rationale: חנה describe tender o plantar campamento. 'Acamparon' es la forma más natural y conserva el sentido militar.
- source_word: בַּגִּלְעָד
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en Gilead
  lexicon: HALOT
  rationale: Se usa el topónimo tradicional 'Galaad' en español bíblico, equivalente al 'Gilead' inglés del aparato. La preposición 'en' reproduce el valor locativo del hebreo.
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered together
  chosen_spanish: se juntaron
  alternatives_spanish:
  - se reunieron
  - se congregaron
  lexicon: HALOT
  rationale: אסף expresa reunir o juntar. 'Se juntaron' comunica la acción colectiva de forma clara y mantiene la simetría narrativa con el campamento.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión formal del hebreo, siguiendo la decisión inglesa de retener la forma masculina literal. 'Hijos de Israel' preserva transparencia y el eco bíblico del texto fuente.
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpah
  lexicon: HALOT
  rationale: El hebreo nombra el lugar de reunión/acampar; en español 'en' funciona naturalmente con topónimos. 'Mizpa' es la forma usual en español bíblico.
translation_notes:
  revision_awareness: La versión inglesa auditada traduce וַיִּצָּעֲקוּ como 'were summoned' y conserva en nota la alternativa 'cried out' por la amplitud semántica del verbo. La redacción española sigue esa decisión principal con 'fueron reunidos' y preserva la alternativa en nota, manteniendo también el paralelismo narrativo con el campamento en Galaad y la reunión de Israel en Mizpa. No hubo revisiones posteriores que alteraran la lectura.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o equivalentes porque no aparece el nombre divino en este versículo.
  - Se mantuvo 'los hijos de Israel' para conservar la transparencia formal del hebreo y la coherencia con el expediente inglés.
  - Se prefirió 'Mizpa' y 'Galaad' como topónimos bíblicos habituales en español.
  - La nota [a] marca la única ambigüedad lexical relevante del verbo inicial, siguiendo el expediente inglés.
