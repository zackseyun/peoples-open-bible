theological_decisions:
- issue: How to render the programmatic phrase εὐσεβὴς λογισμός in 4 Maccabees
  chosen_reading: devout reason
  alternative_readings:
  - pious reason
  - godly reason
  rationale: This book emphasizes reason governed by reverence toward God. The rendering should preserve both elements without importing later philosophical or doctrinal categories. 'Devout reason' is faithful to the Greek and readable in modern English.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve theological tension rather than resolve it'
- issue: How to express πρόσκαιρον φιλοτεκνίαν without implying maternal love is morally bad in itself
  chosen_reading: her temporary love for her children
  alternative_readings:
  - her transient maternal affection
  rationale: The adjective contrasts temporal natural affection with steadfast piety under martyrdom. The translation preserves that contrast without overstating the text into a condemnation of motherhood itself.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; do not import doctrinal claims the text does not make'
