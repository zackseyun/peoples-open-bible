review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: sacerdotes y levitas en todo Israel, su alineación con Roboam, y su procedencia desde sus diversos territorios. También preserva correctamente la ambigüedad documentada de הִתְיַצְּבוּ עָלָיו mediante nota. Sin embargo, «se pusieron con él» suena incompleto en español y no comunica con suficiente claridad el valor idiomático de «tomar posición / ponerse de parte».'
  spanish_quality_summary: La redacción es generalmente clara, pero «se pusieron con él» resulta poco natural y algo ambigua en español eclesial general. «Se pusieron de parte de él» o «tomaron posición con él» expresarían mejor la idea. Además, «de todas sus regiones» es aceptable, pero «desde todos sus territorios» refleja mejor מִכָּל גְּבוּלָם y enlaza más directamente con la idea de procedencia geográfica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdotes», «levitas» e «Israel» están bien. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión es de precisión idiomática y legibilidad en la representación de הִתְיַצְּבוּ עָלָיו.
  issues:
  - severity: medium
    issue: «se pusieron con él» es una formulación española poco natural
    rationale: Aunque intenta conservar la tensión del hebreo, en español suena elíptica y puede entenderse solo como cercanía física, no como toma de posición leal.
  - severity: low
    issue: «de todas sus regiones» pierde algo del matiz territorial de גְּבוּלָם
    rationale: «Regiones» es comprensible, pero «territorios» corresponde mejor al campo semántico documentado y a la traducción auditada en inglés.
  revised_spanish_text: Y los sacerdotes y los levitas que estaban en todo Israel se pusieron de parte de él[a] desde todos sus territorios.
  revised_footnotes:
