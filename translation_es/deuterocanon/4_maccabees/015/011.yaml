revisions:
- from: Sin embargo[a], aunque había tantas cosas de afecto maternal que atraían a la madre hacia la compasión, los tormentos de toda clase no pudieron torcer su razonamiento[b].
  to: Sin embargo[a], aunque había tantos impulsos de afecto maternal que atraían a la madre hacia la compasión, los tormentos de toda clase no pudieron, por ninguno de ellos, desviar su razón[b].
  rationale: Se ajusta 'tantas cosas' a 'tantos impulsos' para reflejar mejor φιλοτεκνία y mejorar la naturalidad; se cambia 'su razonamiento' por 'su razón' para alinearse con la decisión léxica y temática del inglés POB sobre λογισμός; y se sustituye 'torcer' por 'desviar' para representar mejor μετατρέψαι. También se explicita 'por ninguno de ellos' en la misma posición enfática que el inglés auditado y el griego permiten.
