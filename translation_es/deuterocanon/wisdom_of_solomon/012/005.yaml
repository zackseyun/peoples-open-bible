    text: «Iniciados de su compañía de orgía ritual» traduce lenguaje cultual griego para personas admitidas en un grupo ritual (thiasos).
    reason: cultural_note
  revision_rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre la expresión relacionada con σπλαγχνοφάγων, se reemplazó la construcción antinatural «desde en medio de» por «de entre», y se cambió «banda de jolgorio» por una formulación menos coloquial que preserve el trasfondo cultual de θίασος. También se afinó «implacables» a «despiadados» por mayor naturalidad y precisión semántica.
