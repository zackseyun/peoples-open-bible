revisions:
- from: 'Y harás una placa de oro puro[a], y grabarás sobre ella, con grabado de sello: «Santo para Yahvé[b]».


    [a] O: “placa”; también puede entenderse como “lámina” u “ornamento frontal”.

    [b] O: “Santidad para Yahvé”.'
  to: 'Y harás una placa de oro puro[a], y grabarás sobre ella, como los grabados de un sello: «Santo para Yahvé[b]».'
  rationale: Se ajusta la frase de técnica artesanal para reflejar mejor el comparativo hebreo y el plural implícito en ‘grabados de un sello’, y se limpia una nota redundante para dejar solo alternativas léxicas útiles. Se mantiene «Yahvé» y la fórmula inscrita «Santo para Yahvé» con la alternativa tradicional en nota.
