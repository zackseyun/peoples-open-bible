  - Se mantiene el estilo narrativo breve propio de una nota de itinerario.
  - Se conserva la transliteración de nombres propios y topónimos cuando el contexto funciona como designación geográfica.
  - «Frontera» se eligió para reflejar el valor locativo de גְּבוּל sin ampliar el sentido a territorio interior.
