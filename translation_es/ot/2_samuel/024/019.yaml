  text: Así David subió conforme a la palabra de Gad, tal como Yahvé había mandado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: El verbo hebreo עלה conserva la idea direccional de ascender/subir. En español, «subió» reproduce esa imagen con naturalidad narrativa. «Fue» perdería el matiz, y «ascendió» suena más solemne de lo que pide el contexto.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre propio.
- source_word: כִּדְבַר
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: La construcción hebrea incluye explícitamente la idea de «palabra». «Conforme a la palabra de» conserva esa referencia y suena natural en español bíblico actual. «Según» o «de acuerdo con» serían posibles, pero algo más generales.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - —
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre del profeta.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - justo como
  - así como
  lexicon: HALOT
  rationale: La conjunción comparativa expresa correspondencia exacta entre la palabra de Gad y el mandato de Yahvé. «Tal como» comunica bien esa equivalencia en español natural.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: «Mandar» conserva el valor de orden divina. El pluscuamperfecto español ayuda a marcar que el mandato de Yahvé precedía a la acción de David, como en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El proyecto español usa «Yahvé» como forma principal del nombre divino. Se mantiene la decisión teológica de no sustituir el nombre por un título como «SEÑOR».
theological_decisions:
- issue: Forma del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En español, la forma de proyecto es «Yahvé», preservando el nombre personal divino en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió notas ni revisiones; la versión española conserva la misma relación causal y temporal: David actúa conforme a la palabra de Gad, y esa palabra corresponde al mandato previo de Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con la terminología del proyecto en español.
  - Se eligió una construcción sintáctica natural («conforme a la palabra de») sin perder el sustantivo explícito «palabra».
  - El pluscuamperfecto («había mandado») conserva el orden temporal del original y del audit trail inglés.
