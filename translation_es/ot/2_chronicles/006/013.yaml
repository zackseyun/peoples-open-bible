revisions:
- from: Porque Salomón había hecho un [a] recipiente de bronce y lo había puesto en medio del atrio; medía cinco codos de largo, cinco codos de ancho y tres codos de alto. Se puso sobre él, luego se arrodilló delante de toda la congregación de Israel y extendió sus manos hacia el cielo.
  to: Porque Salomón había hecho una plataforma[a] de bronce y la había puesto en medio del atrio; medía cinco codos de largo, cinco codos de ancho y tres codos de alto. Se puso de pie sobre ella, luego se arrodilló delante de toda la asamblea de Israel y extendió sus manos hacia el cielo.
  rationale: 'Se corrige el punto central auditado: el término principal debe comunicar una estructura elevada, no una vasija. ''Plataforma de bronce'' preserva el sentido contextual documentado por la POB, mientras la nota conserva la anomalía léxica del hebreo. También se afina ''Se puso de pie sobre ella'' para reflejar con más claridad la acción narrativa. ''Asamblea'' se prefiere aquí por claridad y por cercanía con la decisión inglesa ''assembly'', aunque ''congregación'' también sería defendible.'
