translation:
  language: es
  text: y servirá a los que lo engendraron como a amos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como a señores»; el término griego designa a personas con autoridad plena, y aquí se emplea como una comparación fuerte para honrar a los padres.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπόταις
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - dueños
  lexicon: BDAG
  rationale: δεσπόταις expresa autoridad fuerte o dominio. En español, «amos» conserva mejor la relación de subordinación intensa sin cargar un matiz político excesivo como «señores» ni uno posesivo demasiado literal como «dueños».
- source_word: δουλεύσει
  english_pob_choice: will serve
  chosen_spanish: servirá
  alternatives_spanish:
  - será esclavo de
  - prestará servicio a
  lexicon: BDAG
  rationale: El futuro de δουλεύω comunica una acción de servicio en condición subordinada. «Servirá» mantiene naturalidad en español y conserva la fuerza del verbo sin suavizarla a una mera cortesía.
- source_word: ἐν τοῖς γεννήσασιν αὐτόν
  english_pob_choice: those who begot him
  chosen_spanish: los que lo engendraron
  alternatives_spanish:
  - sus padres
  - los que le dieron nacimiento
  lexicon: BDAG
  rationale: La forma participial señala de manera explícita a quienes lo engendraron o dieron a luz. «Los que lo engendraron» sigue de cerca el griego y preserva el énfasis en el vínculo de parentela, en vez de reducirlo interpretativamente a «sus padres».
theological_decisions:
- issue: Intensidad de la imagen de subordinación filial
  english_pob_reading: Retain the simile of serving parents 'as masters' without softening it to mere respect or attendance.
  chosen_spanish_reading: 'Conservar la comparación fuerte: «como a amos».'
  alternative_spanish_readings:
  - como a señores
  - con respeto a sus padres
  - como si fueran sus dueños
  rationale: El griego usa δεσπόταις y δουλεύσει, una combinación deliberadamente fuerte. Traducirla con un término más suave diluiría el peso ético del dicho. «Como a amos» conserva la dureza comparativa sin introducir un sentido ajeno de propiedad absoluta.
  doctrine_reference: 'DOCTRINE.md: primacía del original; consistencia terminológica salvo excepción documentada.'
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no se identificaron cambios necesarios en el pasaje fuente ni en la lectura inglesa de auditoría.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no hay lenguaje mesiánico en el texto.
  - Se conserva el paralelo fuerte entre autoridad y servicio, sin convertirlo en una exhortación genérica a la cortesía.
