revisions:
- from: Pero, de entre todas las madres, la madre de los siete llegó a ser la más afectuosa con sus hijos[a], ella que, mediante siete embarazos, tenía profundamente injertado dentro de sí el cariño hacia ellos.
  to: Pero, de entre todas las madres[a], la madre de los siete fue la más entregada a sus hijos, ella que, mediante siete embarazos, tenía profundamente plantado en ella el afecto por ellos.
  rationale: Se ajusta el texto para reflejar con más precisión el comparativo de φιλοτεκνωτέρα y para expresar de forma más natural en español la metáfora de ἐπιφυτευομένην. También se ancla la nota [a] al sintagma relevante «madres»/comparación inicial según el inglés POB, preservando la nota léxica sobre «la madre de los siete» en el mismo versículo sin pérdida de información. La revisión mantiene el sentido del original y mejora el registro literario.
