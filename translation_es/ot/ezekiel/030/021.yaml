review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé ha quebrado el brazo de Faraón y este no ha sido tratado para recuperar su capacidad militar. Conserva adecuadamente la imaginería médica y la secuencia de infinitivos. Sin embargo, hay dos ajustes de fidelidad: el español usa ''brazo'' pero luego lo trata con masculino (''vendado'', ''fortalecerlo''), cuando el referente es זְרוֹעַ, femenino en hebreo y naturalmente femenino en español si se vierte como ''el brazo'' puede mantenerse, pero la construcción con ''ponerle remedios'' suena menos precisa que la idea de aplicar tratamiento al miembro herido. Además, la nota b está anclada en ''ponerle'' en vez de en ''remedios'', que es donde recae la decisión léxica auditada.'
  spanish_quality_summary: El texto es legible y digno, pero 'Hijo de hombre' suena algo calcado y menos natural que 'Hijo de hombre' tradicional; eso puede conservarse por consistencia con Ezequiel. La principal mejora estilística es sustituir 'ponerle remedios' por 'aplicarle remedios', que suena más natural en español médico general y coincide mejor con la explicación del audit trail. También conviene mover la marca de nota al sustantivo relevante.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Faraón', 'Egipto', 'espada' y la imaginería médica están bien. No hay términos teológicos sensibles en este versículo. La decisión 'Hijo de hombre' es aceptable como fórmula profética fija de Ezequiel.
  issues:
  - severity: medium
    issue: La expresión 'ponerle remedios' es menos natural y menos precisa que 'aplicarle remedios'.
    rationale: El hebreo לָתֵת רְפֻאוֹת se refiere a administrar/aplicar tratamiento médico; el inglés auditado lo fijó como 'apply remedies'. En español, 'aplicarle remedios' preserva mejor esa idea concreta.
  - severity: medium
    issue: La nota [b] está anclada en 'ponerle' en vez de en 'remedios'.
    rationale: La nota explica el plural hebreo רְפֻאוֹת, por lo que debe anclarse en la palabra 'remedios', no en el verbo o pronombre adyacente.
  revised_spanish_text: Hijo de hombre[a], he quebrado el brazo de Faraón, rey de Egipto; y he aquí, no ha sido vendado para aplicarle remedios[b], para ponerle un vendaje, para vendarlo, para fortalecerlo, para que pueda asir la espada.
  revised_footnotes:
  - marker: a
    text: Vocativo profético tradicional de Ezequiel; se conserva la forma idiomática sin reinterpretarla.
    reason: source_note
  - marker: b
    text: El hebreo usa el plural רְפֻאוֹת ("remedios"), por eso se traduce con un plural concreto y no con un abstracto como "sanidad".
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la fidelidad y la naturalidad del español: ''aplicarle remedios'' refleja mejor la idea médica del hebreo y del audit trail inglés que ''ponerle remedios''. También se reubicó la nota al término ''remedios'', que es la palabra explicada por la nota léxica.'
