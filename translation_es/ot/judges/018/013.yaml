translation:
  language: es
  text: Desde allí pasaron por la región montañosa de Efraín[a] y llegaron hasta la casa de Mica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «la región montañosa de Efraín»; tradicionalmente también «Monte Efraín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: they passed through
  chosen_spanish: pasaron por
  alternatives_spanish:
  - atravesaron
  - pasaron a través de
  lexicon: HALOT
  rationale: עבר expresa aquí movimiento a través de un territorio. En español, «pasaron por» comunica de forma natural el paso por una región sin volverlo demasiado literal ni añadir matices de cruce no exigidos por el contexto.
- source_word: מִשָּׁם
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: HALOT
  rationale: Es un adverbio deíctico de salida; «Desde allí» conserva la referencia al lugar anterior con español claro y fluido.
- source_word: הַר אֶפְרָיִם
  english_pob_choice: the hill country of Ephraim
  chosen_spanish: la serranía de Efraín
  alternatives_spanish:
  - la región montañosa de Efraín
  - el monte de Efraín
  lexicon: HALOT
  rationale: El hebreo usa literalmente «montaña/montes de Efraín», pero en contexto designa una región. «Serranía» evita la impresión de un solo cerro o monte y mantiene el valor geográfico regional del original y del POB inglés.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y acudieron
  lexicon: HALOT
  rationale: בוא en este encadenamiento narrativo indica llegada. «Llegaron» expresa mejor el resultado del movimiento en español actual que un simple «vinieron».
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hasta llegar a
  lexicon: HALOT
  rationale: La preposición marca el límite alcanzado. En español, «hasta» comunica ese alcance con precisión y sin sobrecargar la frase.
- source_word: בֵּית מִיכָה
  english_pob_choice: Micah’s house
  chosen_spanish: la casa de Micaía
  alternatives_spanish:
  - la casa de Mica
  - la casa de Miqueas
  lexicon: HALOT
  rationale: El constructo hebreo significa literalmente «casa de Micah». En español, la forma posesiva natural es «la casa de…». Se translitera el nombre como Micaía para mantener cercanía al hebreo y evitar la forma tradicional de Miqueas, que puede sugerir indebidamente el profeta en contextos donde aquí se trata de la persona local.
translation_notes:
  revision_awareness: 'Se mantuvo la secuencia narrativa simple del hebreo: salida desde un lugar previo, paso por la región de Efraín y llegada a la casa de Micah. La revisión inglesa mostró acuerdo alto y no requirió cambios sustantivos; en español se optó por una formulación más natural, sin perder el sentido espacial del original.'
  spanish_consistency_notes:
  - Se preservó el nombre propio como Micaía para evitar confusión con el profeta homónimo en español tradicional.
  - «Serranía» se usa aquí como equivalente regional de הַר אֶפְרָיִם, no como referencia a una sola montaña.
  - No se añadió ninguna nota teológica porque el versículo es puramente narrativo y no contiene un término doctrinalmente cargado.
