translation:
  language: es
  text: Desciende y siéntate en el polvo[a], virgen hija de Babilonia[b]; siéntate en el suelo, sin trono[c], hija de los caldeos. Porque ya no te llamarán tierna y delicada[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Baja y siéntate en el polvo».'
    reason: lexical_alternative
  - marker: b
    text: «Virgen hija de Babilonia» y «hija de los caldeos» son títulos poéticos que personifican a la ciudad/imperio como una mujer joven y real.
    reason: cultural_note
  - marker: c
    text: 'O: «no hay trono» o «sin un trono».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «suave y regalada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְדִי
  english_pob_choice: Come down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ven abajo
  lexicon: HALOT
  rationale: Es el imperativo femenino singular de ירד. «Desciende» conserva el valor de movimiento hacia abajo y suena más natural y solemne en español bíblico que una forma más coloquial.
- source_word: וּשְׁבִי / שְׁבִי
  english_pob_choice: sit / sit
  chosen_spanish: siéntate / siéntate
  alternatives_spanish:
  - siéntate y permanece
  - siéntate
  lexicon: HALOT
  rationale: El verbo ישב, en esta secuencia, expresa tomar un asiento bajo y humillante. Repetir «siéntate» preserva el paralelismo retórico del hebreo.
- source_word: עַל עָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - sobre el polvo
  - en el polvo de la humillación
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre polvo», pero en español «en el polvo» comunica mejor la imagen de abatimiento sin perder la metáfora.
- source_word: בְּתוּלַת בַּת בָּבֶל
  english_pob_choice: virgin daughter Babylon
  chosen_spanish: virgen hija de Babilonia
  alternatives_spanish:
  - virgen hija Babilonia
  - doncella hija de Babilonia
  lexicon: HALOT
  rationale: Se conserva la personificación poética de la ciudad como mujer joven no humillada por conquista, manteniendo «virgen» como rasgo imaginal y «hija de Babilonia» como título constructo.
- source_word: לָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el suelo
  lexicon: HALOT
  rationale: Con el imperativo «siéntate», la frase indica el lugar donde debe sentarse. «En la tierra» sigue de cerca el sustantivo hebreo y mantiene el descenso de estatus.
- source_word: אֵין כִּסֵּא
  english_pob_choice: without a throne
  chosen_spanish: sin trono
  alternatives_spanish:
  - sin un trono
  - no hay trono
  lexicon: HALOT
  rationale: La construcción nominal expresa privación de realeza. «Sin trono» es breve, natural y conserva la fuerza de humillación política.
- source_word: בַּת כַּשְׂדִּים
  english_pob_choice: daughter of the Chaldeans
  chosen_spanish: hija de los caldeos
  alternatives_spanish:
  - hija de Caldea
  - hija caldea
  lexicon: HALOT
  rationale: Se mantiene el gentilicio plural del hebreo y la personificación paralela a «hija de Babilonia». «Caldeos» es el equivalente más directo en español bíblico.
- source_word: כִּי לֹא תוֹסִיפִי
  english_pob_choice: For they will no longer
  chosen_spanish: Porque ya no
  alternatives_spanish:
  - Porque no volverás a
  - Porque nunca más
  lexicon: HALOT
  rationale: La partícula con יסף expresa cese de una condición anterior. «Ya no» comunica bien la pérdida definitiva del estado descrito.
- source_word: יִקְרְאוּ לָךְ
  english_pob_choice: they will ... call you
  chosen_spanish: te llamarán
  alternatives_spanish:
  - dirán de ti
  - te nombrarán
  lexicon: HALOT
  rationale: El sujeto plural tiene valor impersonal; en español basta con «te llamarán», que conserva la idea de apelación pública sin forzar un pasivo.
- source_word: רַכָּה
  english_pob_choice: tender
  chosen_spanish: tierna
  alternatives_spanish:
  - suave
  - delicada
  lexicon: HALOT
  rationale: Describe suavidad o ternura en el trato y el porte. «Tierna» funciona bien con el adjetivo siguiente y evita un calco rígido.
- source_word: וַעֲנֻגָּה
  english_pob_choice: delicate
  chosen_spanish: delicada
  alternatives_spanish:
  - refinada
  - regalada
  lexicon: HALOT
  rationale: El término apunta a delicadeza asociada a vida lujosa o mimada. «Delicada» conserva el sentido básico y la pareja «tierna y delicada» suena natural en español.
theological_decisions:
- issue: Personificación femenina de Babilonia en un oráculo de humillación
  english_pob_reading: Retain the feminine personification as 'virgin daughter Babylon' and 'daughter of the Chaldeans' without flattening to merely 'Babylon.'
  chosen_spanish_reading: Conservar la personificación como «virgen hija de Babilonia» y «hija de los caldeos», sin reducirla a un simple nombre de ciudad.
  alternative_spanish_readings:
  - Babilonia, virgen hija
  - Babilonia humillada
  rationale: La fuerza literaria y profética del pasaje depende de la imagen de una ciudad-empire tratada como mujer real humillada. Traducir así preserva la carga retórica y la ironía del juicio.
  doctrine_reference: Isaías 47:1; oráculo profético de humillación imperial
translation_notes:
  revision_awareness: El texto en inglés POB mantiene un tono de taunt/judgment con personificación femenina y notas sobre alternativas léxicas ('go down', 'there is no throne', 'soft and pampered'). La versión española conserva esa estructura, evita normalizar la imagen poética y refleja las mismas tensiones semánticas con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se conserva «Babilonia» y «caldeos» como nombres/títulos poéticos consistentes con el hebreo.
  - Se mantiene el paralelismo de dos imperativos con repetición de «siéntate».
  - «Tierna y delicada» reproduce la pareja adjetival sin introducir intensificación ajena al hebreo.
