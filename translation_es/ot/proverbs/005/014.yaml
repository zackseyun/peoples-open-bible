revisions:
- from: Casi caí en todo mal, en medio de la asamblea[a] y congregación.
  to: Casi estuve en toda clase de mal, en medio de la asamblea y congregación[a].
  rationale: Se reemplaza «caí» por «estuve» para reflejar fielmente הָיִיתִי y evitar una interpretación no explícita en el hebreo. Se ajusta «en todo mal» a «en toda clase de mal» para sonar más natural en español y mantener la amplitud del original. La nota conserva las alternativas documentadas sobre ruina total o «todo mal».
