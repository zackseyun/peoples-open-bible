translation:
  language: es
  text: 'Entonces Booz dijo a los ancianos y a todo el pueblo: «Ustedes son testigos hoy de que he adquirido[a] de la mano de Noemí[b] todo lo que pertenecía a Elimélec y todo lo que pertenecía a Quelión y a Mahlón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «he comprado» o «he adquirido mediante compra»; el verbo hebreo puede denotar adquirir por compra en una transacción legal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la mano de Noemí», un modismo que alude a su posesión o control.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» preserva la secuencia con fluidez natural en español.
- source_word: לַזְּקֵנִים וְכָל הָעָם
  english_pob_choice: to the elders and all the people
  chosen_spanish: a los ancianos y a todo el pueblo
  alternatives_spanish:
  - a los ancianos y a toda la gente
  lexicon: HALOT
  rationale: Conserva los dos grupos presentes en la declaración legal y mantiene un registro claro y solemne.
- source_word: עֵדִים אַתֶּם הַיּוֹם
  english_pob_choice: You are witnesses today
  chosen_spanish: Ustedes son testigos hoy
  alternatives_spanish:
  - Testigos son ustedes hoy
  - Ustedes son testigos en este día
  lexicon: HALOT
  rationale: Se mantiene el predicado nominal y el valor temporal de הַיּוֹם sin forzar un calco inglés.
- source_word: קָנִיתִי
  english_pob_choice: I have acquired
  chosen_spanish: he adquirido
  alternatives_spanish:
  - he comprado
  - he comprado y adquirido
  lexicon: HALOT
  rationale: En contexto jurídico de transferencia de derechos, «adquirido» refleja la operación legal sin reducirla necesariamente a una mera compra de objeto material.
- source_word: אֶת כָּל אֲשֶׁר לֶאֱלִימֶלֶךְ
  english_pob_choice: all that belonged to Elimelech
  chosen_spanish: todo lo que pertenecía a Elimélec
  alternatives_spanish:
  - todo lo que era de Elimélec
  - todo lo que pertenecía a Elimelec
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica posesión/adscripción patrimonial; «pertenecía a» comunica la idea con naturalidad en español.
- source_word: וְאֵת כָּל אֲשֶׁר לְכִלְיוֹן וּמַחְלוֹן
  english_pob_choice: and all that belonged to Chilion and Mahlon
  chosen_spanish: y todo lo que pertenecía a Quelión y a Mahlón
  alternatives_spanish:
  - y todo lo que era de Quelión y Mahlón
  - y todo lo que pertenecía a Quelión y Mahlón
  lexicon: HALOT
  rationale: Se preserva el paralelismo con la frase anterior y el sentido de pertenencia patrimonial aplicado a ambos nombres.
- source_word: מִיַּד נָעֳמִי
  english_pob_choice: from the hand of Naomi
  chosen_spanish: de la mano de Noemí
  alternatives_spanish:
  - de Noemí
  - de la posesión de Noemí
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de «mano» para no perder el matiz legal de control/posesión, siguiendo la nota auditada del POB en inglés.
theological_decisions:
- issue: Naturaleza de la adquisición en un contexto legal
  english_pob_reading: Render the legal transfer with 'acquired' rather than language that could imply purchase of persons.
  chosen_spanish_reading: «he adquirido» en lugar de un verbo que obligue a entender una compra de personas.
  alternative_spanish_readings:
  - he comprado
  - he comprado/pagado por
  rationale: El pasaje trata de una transferencia patrimonial en un marco jurídico. «He adquirido» conserva la fuerza legal sin añadir una implicación antropológica o económica no explícita en el texto.
  doctrine_reference: Principio de primacía del original y restricción semántica al alcance del hebreo; no importar inferencias doctrinales ajenas al enunciado.
translation_notes:
  revision_awareness: La versión auditada en inglés ya fue revisada y quedó sin cambios; esta propuesta sigue esa lectura de alta concordancia, conservando la estructura legal y el hebraísmo de «de la mano de Noemí» en español.
  spanish_consistency_notes:
  - 'Se usan los nombres propios en forma española estándar: Booz, Noemí, Elimélec, Quelión y Mahlón.'
  - Se evita sustituir el lenguaje jurídico por una paráfrasis más libre; el verbo principal mantiene el valor de transferencia patrimonial.
  - La puntuación y el discurso directo siguen una forma publicable y natural en español latinoamericano.
  - Se mantiene «de la mano de Noemí» en el cuerpo del texto para preservar la imagen idiomática; la nota explica su alcance semántico.
