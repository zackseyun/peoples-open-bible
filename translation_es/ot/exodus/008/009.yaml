translation:
  language: es
  text: Yahvé hizo conforme a la palabra de Moisés, y las ranas murieron en las casas, en los patios y en los campos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino y la línea editorial en inglés lo conserva como transliteración. En español, «Yahvé» reproduce ese nombre propio de forma reconocible y evita la sustitución por un título.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  lexicon: HALOT
  rationale: El verbo עשה es amplio, pero en esta construcción la opción natural y fiel en español es «hizo», que mantiene la sencillez del relato y la relación con «conforme a la palabra de Moisés».
- source_word: כִּדְבַר מֹשֶׁה
  english_pob_choice: according to the word of Moses
  chosen_spanish: conforme a la palabra de Moisés
  alternatives_spanish:
  - según la palabra de Moisés
  - como había dicho Moisés
  lexicon: HALOT
  rationale: «דבר» puede ser «palabra» o «asunto». «Conforme a la palabra de Moisés» conserva la forma hebrea y la idea de obediencia a la palabra mediadora sin volverlo una paráfrasis.
- source_word: וַיָּמֻתוּ
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - perecieron
  lexicon: HALOT
  rationale: El verbo מות tiene el sentido ordinario de morir. «Murieron» es la equivalencia directa y natural en español.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las sapos
  lexicon: HALOT
  rationale: En español, el animal de la plaga se expresa con más naturalidad como «ranas». Aunque el hebreo puede cubrir anfibios de forma amplia, «ranas» comunica el referente sin exceso de tecnicismo.
- source_word: מִן
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: HALOT
  rationale: La repetición de מִן en hebreo indica procedencia o salida desde esos lugares. En español, «de» permite una construcción fluida y conserva la idea de retirada de cada ámbito.
- source_word: הַבָּתִּים
  english_pob_choice: the houses
  chosen_spanish: las casas
  alternatives_spanish:
  - las viviendas
  lexicon: HALOT
  rationale: «בָּתִּים» aquí se refiere a casas concretas. «Casas» es la traducción directa y más transparente.
- source_word: הַחֲצֵרֹת
  english_pob_choice: the courtyards
  chosen_spanish: los patios
  alternatives_spanish:
  - los atrios
  - los recintos
  lexicon: HALOT
  rationale: «חֲצֵרֹת» designa patios o espacios cercados junto a las casas. «Patios» es claro y natural en español contemporáneo.
- source_word: הַשָּׂדֹת
  english_pob_choice: the fields
  chosen_spanish: los campos
  alternatives_spanish:
  - las tierras
  - los terrenos
  lexicon: HALOT
  rationale: «שָׂדֹת» se refiere a campos o tierras abiertas. «Campos» mantiene el paralelo con los otros lugares mencionados y es idiomático en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera directa. Se conserva como nombre propio para no ocultar el nombre personal de Dios tras un título, siguiendo la línea editorial auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión en inglés cambió «died out of» por «died from» para reflejar mejor la preposición repetida del hebreo sin perder naturalidad. En español, la serie con «de» cumple esa misma función de forma fluida y conserva el paralelismo de los lugares enumerados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como representación del nombre divino, en lugar de «SEÑOR».
  - Se usa un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - Se conserva la enumeración triple de lugares con una preposición repetida para reflejar la estructura hebrea.
  - «Ran as» se eligió por naturalidad española; no se introduce una nota porque no hay ambigüedad relevante en este verso.
