translation:
  language: es
  text: Egipto se convertirá en desolación, y Edom en un desierto de desolación, por la violencia contra[a] los hijos de Judá[b], cuya sangre inocente[c] derramaron en su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la violencia hecha a los hijos de Judá».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Judá»; puede funcionar colectivamente por el pueblo de Judá.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la sangre de los inocentes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico y nacional; en español se mantiene el topónimo estándar sin añadir explicación no presente en el texto.
- source_word: לִשְׁמָמָה תִהְיֶה
  english_pob_choice: will become a desolation
  chosen_spanish: se convertirá en desolación
  alternatives_spanish:
  - será una desolación
  - se volverá desolación
  lexicon: HALOT
  rationale: El hebreo expresa un cambio de estado hacia la desolación; 'se convertirá en' conserva ese valor resultativo mejor que un adjetivo simple.
- source_word: וֶאֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: HALOT
  rationale: Nombre propio conservado; 'Edom' es la forma bíblica directa y más fiel al hebreo.
- source_word: לְמִדְבַּר שְׁמָמָה
  english_pob_choice: a desolate wilderness
  chosen_spanish: en un desierto de desolación
  alternatives_spanish:
  - en un desierto desolado
  - en un desierto de ruina
  lexicon: HALOT
  rationale: מִדְבָּר se traduce mejor aquí como 'desierto' o 'región desértica'; שְׁמָמָה añade la idea de devastación. 'Desierto de desolación' conserva ambos sustantivos y la fuerza intensiva del hebreo.
- source_word: מֵחֲמַס
  english_pob_choice: because of the violence done to
  chosen_spanish: por la violencia hecha a
  alternatives_spanish:
  - a causa de la violencia contra
  - por la violencia contra
  lexicon: HALOT
  rationale: La preposición causal מִן permite 'por/a causa de'. 'Violencia hecha a' mantiene la relación de daño expresada en el hebreo sin alejarse del sustantivo חָמָס.
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hijos varones de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: '''Hijos de Judá'' reproduce la construcción hebrea y es idiomático en español bíblico. Se conserva el valor colectivo posible sin resolverlo de forma explícita.'
- source_word: דָם נָקִיא
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre de inocentes
  - la sangre del inocente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a sangre derramada de quienes no tenían culpa; en español 'sangre inocente' es natural y fiel.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en la tierra de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal se entiende más naturalmente referido a Judá en este contexto. 'Su tierra' mantiene la referencia posesiva sin sobreespecificar.
theological_decisions:
- issue: Relación causal de la violencia con el juicio sobre Egipto y Edom
  english_pob_reading: because of the violence done to the sons of Judah
  chosen_spanish_reading: por la violencia hecha a los hijos de Judá
  alternative_spanish_readings:
  - a causa de la violencia contra los hijos de Judá
  - por la violencia contra Judá
  rationale: El texto acusa a las naciones por un acto concreto de violencia; 'por' conserva la causalidad y evita intensificar más allá del hebreo. Se mantiene el sujeto colectivo 'hijos de Judá' como en el original.
  doctrine_reference: Preserve theological tension rather than smoothing the accusatory force of the oracle.
- issue: Referente de 'su tierra' en בְּאַרְצָם
  english_pob_reading: the land belongs to the sons of Judah ('their land')
  chosen_spanish_reading: su tierra refiere a los hijos de Judá
  alternative_spanish_readings:
  - su tierra puede leerse como la tierra de Egipto y Edom
  - el referente queda intencionalmente ambiguo
  rationale: El antecedente más cercano y coherente es 'los hijos de Judá'; el contexto de la denuncia por sangre derramada en territorio de Judá favorece esa lectura. Se evita introducir una ambigüedad no apoyada por el flujo del verso.
  doctrine_reference: Contextual antecedent and covenant judgment against nations for violence against Judah.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail, que indica que no hubo cambios necesarios respecto de la última pasada. La versión española mantiene la lectura causal de מֵחֲמַס, conserva el paralelismo entre Egipto y Edom, y refleja la tensión interpretativa de 'los hijos de Judá' y 'su tierra' sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa 'desolación' para שְׁמָמָה y 'desierto de desolación' para מִדְבַּר שְׁמָמָה, manteniendo la duplicación intensiva del hebreo.
  - Se conserva 'hijos de Judá' como forma colectiva posible, en línea con el audit trail inglés.
  - '''Sangre inocente'' refleja el collocation dָם נָקִיא sin recurrir a una paráfrasis más interpretativa.'
  - Se evita 'SEÑOR' o sustitutos para el nombre divino porque este versículo no contiene el Tetragrámaton.
