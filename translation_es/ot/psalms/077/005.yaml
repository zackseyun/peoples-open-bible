    rationale: 'Las notas existen y su contenido es adecuado, pero el marcado actual invierte el orden esperado de aparición/secuencia: la explicación del modismo de los ojos debería ir en [a] en su primera aparición, y la alternativa de «turbado» en [b] después. Es una corrección menor pero necesaria para la disciplina editorial pedida.'
  - severity: low
