translation:
  language: es
  text: Cuando Abram oyó que su pariente[a] había sido hecho cautivo, sacó[b] a sus hombres entrenados, nacidos en su casa, trescientos dieciocho, y los persiguió hasta Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hermano»; el hebreo אָחִיו puede referirse a un pariente cercano, no solo a un hermano literal.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede entenderse como «sacó para fuera», «movilizó» o posiblemente «armó».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבָּה
  english_pob_choice: had been taken captive
  chosen_spanish: había sido hecho cautivo
  alternatives_spanish:
  - había sido capturado
  - había sido hecho prisionero
  lexicon: HALOT
  rationale: El niphal de שׁבה indica ser tomado cautivo en contexto bélico. «Hecho cautivo» conserva ese sentido militar y suena natural en español; «capturado» es posible, pero es más general; «hecho prisionero» también es válido, aunque menos literal al matiz de cautiverio.
- source_word: אָחִיו
  english_pob_choice: his kinsman
  chosen_spanish: su pariente
  alternatives_spanish:
  - su hermano
  - su familiar cercano
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «su hermano», en este contexto se refiere a un pariente cercano, es decir, Lot. En español, «pariente» comunica ese alcance sin perder la tensión lexical entre literalidad y sentido contextual.
- source_word: וַיָּרֶק
  english_pob_choice: led out
  chosen_spanish: sacó
  alternatives_spanish:
  - sacó fuera
  - movilizó
  - armó
  lexicon: HALOT
  rationale: El verbo es difícil y puede implicar desplegar, sacar o preparar a los hombres para la acción. «Sacó» refleja el movimiento de ponerlos en marcha sin decidir en exceso entre las lecturas debatidas.
- source_word: חֲנִיכָיו
  english_pob_choice: his trained men
  chosen_spanish: sus hombres entrenados
  alternatives_spanish:
  - sus hombres adiestrados
  - sus servidores entrenados
  - sus entrenados
  lexicon: HALOT
  rationale: La expresión señala a los que habían sido formados bajo la autoridad de Abram. «Hombres entrenados» es claro y preserva la referencia militar; «adiestrados» sería otra opción válida, pero menos común.
- source_word: יְלִידֵי בֵיתוֹ
  english_pob_choice: born in his household
  chosen_spanish: nacidos en su casa
  alternatives_spanish:
  - nacidos en su casa
  - nacidos en su casa y familia
  - de su casa
  lexicon: HALOT
  rationale: La frase identifica su procedencia doméstica. «Nacidos en su casa» es idiomático y mantiene la noción social de pertenencia al hogar de Abram.
- source_word: שְׁמֹנָה עָשָׂר וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred and eighteen
  chosen_spanish: trescientos dieciocho
  alternatives_spanish:
  - '318'
  lexicon: HALOT
  rationale: El hebreo presenta el número completo. En español bíblico formal es preferible escribirlo con palabras para conservar el tono narrativo y la fluidez de lectura.
- source_word: וַיִּרְדֹּף
  english_pob_choice: pursued them
  chosen_spanish: persiguió a los invasores
  alternatives_spanish:
  - los persiguió
  - los siguió persiguiendo
  lexicon: HALOT
  rationale: רדף expresa persecución militar. «Persiguió» mantiene la fuerza verbal; «a los invasores» explicita el referente contextual implícito, sin cambiar el sentido de base.
- source_word: עַד דָּן
  english_pob_choice: as far as Dan
  chosen_spanish: hasta Dan
  alternatives_spanish:
  - hasta Dan
  - al llegar a Dan
  lexicon: HALOT
  rationale: עַד marca el límite de la persecución. «Hasta Dan» expresa con precisión ese alcance geográfico.
theological_decisions:
- issue: Preservación de la tensión lexical en אָחִיו
  english_pob_reading: Retain 'his kinsman' in the main text, while noting the broader kinship sense behind 'his brother'.
  chosen_spanish_reading: Traducir «su pariente» en el cuerpo del texto, en vez de suavizarlo como «su hermano».
  alternative_spanish_readings:
  - su hermano
  - su sobrino
  rationale: En el contexto de Lot, la relación no es de hermandad literal. «Su pariente» conserva la relación de cercanía sin imponer una precisión genealógica que el hebreo no exige en este versículo.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de וַיָּרֶק
  english_pob_reading: '''led out'' reflects the difficult verb without overcommitting to ''mustered'' or ''armed''.'
  chosen_spanish_reading: «sacó» como solución sobria para el verbo, sin convertirlo en «armó» ni en «movilizó».
  alternative_spanish_readings:
  - armó
  - movilizó
  - sacó fuera
  rationale: El texto no permite fijar con total seguridad si el énfasis recae en armar, reunir o desplegar. «Sacó» deja abierta la tensión textual y sigue siendo natural en español narrativo.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El borrador sigue la revisión que prefirió expresar אָחִיו por una relación de parentesco más amplia en el contexto de Lot, y que entendió וַיָּרֶק como un verbo de despliegue/salida más que como «mustered» o «armed». También conserva el número escrito con palabras y mantiene el cierre geográfico «hasta Dan» conforme al flujo narrativo revisado.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí no aparece el Tetragrámaton.
  - Se mantiene el tono narrativo formal, evitando arcaísmos innecesarios.
  - «Nacidos en su casa» conserva la estructura de pertenencia doméstica sin introducir ‘siervos’ donde el hebreo no lo dice explícitamente.
  - «Persiguió a los invasores» explicita el objeto implícito de la persecución para claridad en español, sin alterar el contenido del verbo hebreo.
