  rationale: Se reemplaza 'ni te provoques contra ellos' por 'ni entres en contienda con ellos' para expresar en español natural el sentido hostil de וְאַל תִּתְגָּר בָּם sin añadir 'guerra' ni reducirlo a provocación verbal. Se ajusta levemente la nota b para reflejar mejor la alternativa léxica documentada.
