translation:
  language: es
  text: Lo que hizo fue malo a los ojos de Yahvé, por eso él también[a] lo hizo morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «también» marca que Onán recibió el mismo juicio que la persona mencionada antes en el contexto inmediato.
    reason: source_note
lexical_decisions:
- source_word: וַיֵּרַע
  english_pob_choice: was evil
  chosen_spanish: fue malo
  alternatives_spanish:
  - fue evil
  - fue perverso
  - fue desagradable
  lexicon: HALOT
  rationale: El hebreo expresa evaluación moral negativa; en español, «fue malo» transmite de manera natural esa valoración sin suavizarla a un mero disgusto. «Perverso» sería más fuerte de lo que el contexto exige, y «desagradable» perdería la fuerza moral.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - en la vista de Yahvé
  - delante de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y señala evaluación divina. «A los ojos de Yahvé» conserva la metáfora y suena natural en español bíblico contemporáneo. «Ante Yahvé» es posible, pero atenúa la imagen visual del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. «Yahvé» preserva el nombre propio del pacto y evita el sustituto litúrgico «SEÑOR». «Jehová» no se adopta por ser menos consistente con el criterio del proyecto.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: What he did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - lo que había hecho
  - aquello que hizo
  - lo que había realizado
  lexicon: HALOT
  rationale: El relativo retoma la acción previa de Onán. «Lo que hizo» es la forma más natural y fiel en español, sin añadir matiz temporal no garantizado por la forma hebrea.
- source_word: וַיָּמֶת
  english_pob_choice: he put him to death
  chosen_spanish: lo hizo morir
  alternatives_spanish:
  - lo puso a muerte
  - lo mató
  - lo causó morir
  lexicon: HALOT
  rationale: El verbo tiene fuerza causativa. «Lo hizo morir» preserva esa causatividad en español y evita diluir la agencia divina en una pasiva impersonal. «Lo mató» es posible, pero es más abrupto y menos transparente respecto de la forma causativa.
- source_word: גַּם אֹתוֹ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - asimismo
  - igual que a él
  lexicon: HALOT
  rationale: El adverbio conecta a Onán con el juicio previo sobre Er. «También» reproduce con claridad la idea de que fue alcanzado por la misma sentencia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; la versión española mantiene el nombre propio como forma transparente y auditable, de acuerdo con la práctica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Agencia divina en וַיָּמֶת
  english_pob_reading: so he put him to death also
  chosen_spanish_reading: así que también lo hizo morir
  alternative_spanish_readings:
  - así que también lo mató
  - por eso también lo causó morir
  rationale: La lectura conserva la atribución directa de la muerte a Yahvé sin reducirla a un simple fallecimiento pasivo. «Lo hizo morir» mantiene el valor causativo del hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #3'
translation_notes:
  revision_awareness: El contexto auditado confirma un alto acuerdo con la revisión más reciente y no introduce cambios sustantivos; la versión inglesa final mantiene la lectura causativa y el nombre divino como Yahweh, reflejados aquí como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto para conservar transparencia textual.
  - La construcción «lo hizo morir» preserva la agencia causativa del hebreo con español natural.
  - El marcador [a] se coloca en la palabra evaluativa y [b] en el adverbio de conexión para sostener las notas sin sobrecargar el verso.
