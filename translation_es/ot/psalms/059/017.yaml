revisions:
- from: Pero yo cantaré de tu poder[a]; cantaré con alegría de tu amor leal[b] por la mañana, porque has sido para mí un baluarte, y un refugio en el día de mi angustia.
  to: Pero yo cantaré de tu fuerza[a]; cantaré en voz alta de tu amor leal[b] por la mañana[c], porque has sido para mí una fortaleza y un refugio en el día de mi angustia.
  rationale: Se revisa para acercar la traducción al valor léxico auditado del hebreo y al registro natural del español. 'Tu fuerza' refleja mejor עֻזֶּךָ que 'tu poder'; 'cantaré en voz alta' preserva mejor el matiz jubiloso y sonoro de וַאֲרַנֵּן que 'cantaré con alegría'; 'fortaleza' resulta más transparente que 'baluarte' para una audiencia eclesial amplia sin perder fuerza poética. También se añade la nota correspondiente al historial de la auditoría inglesa para preservar la alternativa de orden sintáctico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:40:03Z'
