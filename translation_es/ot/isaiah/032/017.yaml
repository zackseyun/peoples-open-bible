source:
  edition: WLC
  text: וְ/הָיָ֛ה מַעֲשֵׂ֥ה הַ/צְּדָקָ֖ה שָׁל֑וֹם וַֽ/עֲבֹדַת֙ הַ/צְּדָקָ֔ה הַשְׁקֵ֥ט וָ/בֶ֖טַח עַד עוֹלָֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/032/017.yaml
  text: And the work of righteousness will be peace[a], and the effect of righteousness[c][b], quietness and security forever.
  footnotes:
  - marker: a
    text: Or 'the effect/result of righteousness will be peace.' The Hebrew מַעֲשֵׂה can denote both the work itself and what it produces.
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' may also be rendered ''justice'' here, since צדקה in prophetic contexts can include social rightness as well as moral righteousness.'
    reason: alternative_reading
  - marker: c
    text: '''Peace'' (shalom) carries the broader sense of wholeness and well-being, not merely the absence of conflict.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
