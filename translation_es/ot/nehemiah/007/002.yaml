  text: וָ/אֲצַוֶּ֞ה אֶת חֲנָ֣נִי אָחִ֗/י וְ/אֶת חֲנַנְיָ֛ה שַׂ֥ר הַ/בִּירָ֖ה עַל יְרוּשָׁלִָ֑ם כִּי הוּא֙ כְּ/אִ֣ישׁ אֱמֶ֔ת וְ/יָרֵ֥א אֶת הָ/אֱלֹהִ֖ים מֵ/רַבִּֽים־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/002.yaml
  text: Then I appointed my brother Hanani and Hananiah[a], the commander of the fortress, over Jerusalem[b], because he was a faithful man and feared God more than many.
  footnotes:
