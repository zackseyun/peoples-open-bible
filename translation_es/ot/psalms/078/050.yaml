    text: 'O: «hizo un camino para su ira».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su alma»; aquí el sentido es «su vida».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «pestilencia».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la expresión no idiomática «no escatimó su vida de la muerte» por «no libró su vida de la muerte», que preserva mejor el sentido de חָשַׂךְ ... מִמָּוֶת en español natural. Se sustituyó «trazó» por «allanó» para reflejar mejor יְפַלֵּס, y «su existencia» por «su vida» para evitar abstracción innecesaria. También se reubicó correctamente la nota [c] sobre «peste».
