    text: 'O: «Retornen a mi reprensión» o «Arrepiéntanse ante mi reprensión».'
    reason: lexical_alternative
  - marker: b
    text: «mi espíritu» también puede entenderse como «mi mente» o «mi pensamiento interior»; algunos lectores ven aquí una resonancia canónica más amplia con el Espíritu de Dios, aunque el versículo presenta a la Sabiduría personificada hablando.
    reason: alternative_reading
  revision_rationale: Se ajusta 'sobre ustedes' a 'a ustedes' para reflejar mejor לָכֶם y la decisión inglesa auditada. Se conservan el resto de las elecciones por su fidelidad general al hebreo y a la racionalidad documentada. También se armoniza la razón de la nota a con la categoría léxica documentada y se mejora ligeramente 'mi interior' a 'mi pensamiento interior' para mayor claridad en español.
