review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en casi todos los puntos: futuro predictivo, «allí», «dioses», «obra de manos humanas», materiales de fabricación y la serie negativa sensorial. Sin embargo, hay un desajuste importante de persona verbal: וַעֲבַדְתֶּם es 2ª persona plural («ustedes servirán / serviréis»), pero el español tiene 3ª plural («servirán»), lo que altera el referente y debe corregirse.'
  spanish_quality_summary: El español es claro y natural, con buen ritmo y tono bíblico moderno. «Obra de manos humanas» y «que ni ven ni oyen ni comen ni huelen» funcionan bien. La nota al pie es formalmente correcta, pero resulta redundante porque repite exactamente la misma redacción ya presente en el texto en vez de ofrecer una alternativa real.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «dioses» preserva אֱלֹהִים frente a la glosa más interpretativa «ídolos»; «manos humanas» refleja bien el valor genérico de אָדָם; no hay términos del glosario mayor en disputa. La principal corrección es gramatical, no terminológica.'
  issues:
  - severity: high
    issue: Persona verbal incorrecta en «servirán»
    rationale: El hebreo וַעֲבַדְתֶּם es 2ª persona plural; «servirán» es 3ª plural. Esto cambia el sujeto de la advertencia de Moisés. Debe ser «servirán ustedes» o, más naturalmente en español bíblico neutral, «serviréis» / «ustedes servirán» según el registro escogido.
  - severity: medium
    issue: La nota al pie [a] no aporta una alternativa real
    rationale: La nota dice «más literalmente» pero repite exactamente «que ni ven ni oyen ni comen ni huelen», que ya es el texto principal. Si se conserva una nota de alternativa, debe ofrecer una variante genuina como «que no ven ni oyen ni comen ni huelen»; de lo contrario, debe eliminarse.
  revised_spanish_text: Y allí serviréis a dioses, obra de manos humanas, de madera y de piedra, que ni ven ni oyen ni comen ni huelen.
  revision_rationale: Se corrige la persona verbal de 3ª plural a 2ª plural para reflejar fielmente el hebreo. También se elimina la nota al pie porque no preservaba una alternativa distinta del texto principal y, por tanto, no cumplía una función útil en español.
