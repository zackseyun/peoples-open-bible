    text: 'O: «Los leones rugen por la presa»; el término hebreo denota más específicamente a leones jóvenes.'
    reason: lexical_alternative
  revision_rationale: Se revisa «cachorros de león» a «leones jóvenes» para reflejar mejor כְּפִירִים según el análisis léxico y la nota del POB en inglés. Se cambia «su comida de Dios» por «de Dios su alimento» para lograr un español natural y digno sin perder el sentido de מֵאֵל ni la variación léxica entre «presa» y «alimento». No se requiere adjudicación adicional porque el ajuste es claro y de bajo riesgo doctrinal.
