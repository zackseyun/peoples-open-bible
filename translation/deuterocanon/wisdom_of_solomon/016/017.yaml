lexical_decisions:
- source_word: παραδοξότατον
  chosen: most astonishing
  alternatives:
  - most extraordinary
  - most paradoxical
  - most surprising
  lexicon: LSJ
  rationale: Superlative of παράδοξος, denoting what is contrary to expectation or astonishing. 'Most astonishing' is natural English and preserves the sense of marvel at an unexpected phenomenon better than the more technical 'most paradoxical.'
- source_word: σβεννύντι
  chosen: extinguishes
  alternatives:
  - quenches
  - puts out
  lexicon: LSJ
  rationale: The participle describes water in its normal function with respect to fire. 'Extinguishes' is slightly broader and more idiomatic with 'everything' than 'quenches,' while still preserving the fire-related sense.
- source_word: πλεῖον ἐνήργει
  chosen: had even greater power
  alternatives:
  - worked more strongly
  - was more active
  - operated more
  lexicon: LSJ
  rationale: The imperfect ἐνήργει conveys effective operation or activity; with πλεῖον it indicates intensified efficacy. 'Had even greater power' communicates the sense of increased effectiveness in context without sounding wooden.
- source_word: ὑπέρμαχος
  chosen: fights on behalf of
  alternatives:
  - is champion for
  - is defender of
  - is ally of
  lexicon: LSJ
  rationale: 'ὑπέρμαχος can function adjectivally or substantivally for one who fights for or defends another. Because κόσμος is the subject, a verbal rendering in English best captures the clause''s force: creation itself acts as defender for the righteous.'
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the universe
  - creation
  - the ordered world
  lexicon: LSJ
  rationale: κόσμος here refers to the ordered created world. 'The world' is the most direct rendering; the broader sense of creation acting in solidarity with the righteous is preserved by the clause as a whole.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: LSJ
  rationale: The genitive plural refers to righteous persons generally. 'The righteous' is concise, idiomatic, and preserves the moral-theological category without unnecessary expansion.
