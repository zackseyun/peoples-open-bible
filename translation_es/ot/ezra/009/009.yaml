review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mantiene ''esclavos / esclavitud'', la negación de que Dios los haya dejado, la gracia mostrada ante los reyes de Persia, y la serie final de propósitos. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: (1) la nota [a] está anclada a ''esclavos'' pero comenta la pareja léxica ''esclavos / esclavitud'', no una alternativa real del término; (2) la nota [c] sobre ''cerca protectora'' corresponde a גָדֵר ''muro'', pero está anclada erróneamente en ''sus ruinas''. Además, ''favor leal'' para חֶסֶד es posible pero menos fiel a la decisión inglesa revisada ''steadfast love'' y menos natural en español bíblico que ''amor constante'' o ''amor fiel''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay detalles mejorables. 'Porque esclavos somos nosotros' suena algo rígido; 'Porque somos esclavos' es más natural sin perder énfasis. 'Inclinó sobre nosotros su favor leal' suena poco idiomático; 'extendió sobre nosotros su amor constante' o 'nos mostró su amor constante' fluye mejor y refleja mejor el hebreo וַיַּט ... חֶסֶד. También conviene recolocar la nota del 'muro/cerca protectora' en 'muro'.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto en ''Dios'', ''esclavos'', ''Judá'', ''Jerusalén''. No aparece el nombre divino ni otros términos sensibles del glosario. El principal punto léxico-teológico es חֶסֶד: ''favor leal'' no refleja tan bien la decisión auditada de ''steadfast love'' como ''amor constante'' o ''amor fiel'', y además resulta menos idiomático en español eclesial amplio.'
  issues:
  - severity: high
    issue: La nota [c] está anclada al lugar equivocado.
    rationale: La nota explica alternativas de גָדֵר ('muro', 'cerca protectora', 'cerco'), pero el marcador [c] aparece en 'sus ruinas'. Esto crea una correspondencia incorrecta entre texto y nota y debe corregirse.
  - severity: medium
    issue: La nota [a] no funciona bien como nota textual.
    rationale: Está anclada a 'esclavos' pero no ofrece una alternativa de traducción útil para ese punto; más bien comenta la relación entre 'esclavos' y 'esclavitud'. Puede omitirse sin pérdida, ya que la decisión léxica ya queda bien expresada en el texto principal.
  - severity: medium
    issue: '''Favor leal'' para חֶסֶד es menos natural y menos alineado con la revisión inglesa.'
    rationale: La auditoría inglesa revisó a 'steadfast love'. En español, 'amor constante' o 'amor fiel' preserva mejor el peso relacional de חֶסֶד y suena más natural que 'favor leal', que puede sentirse abstracto o forzado.
  - severity: low
    issue: El orden 'Porque esclavos somos nosotros' suena algo calco.
    rationale: Aunque comprensible, 'Porque somos esclavos' es más natural en español general y mantiene el mismo sentido.
