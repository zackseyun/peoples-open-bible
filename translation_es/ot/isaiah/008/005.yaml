translation:
  language: es
  text: 'Yahvé me habló de nuevo[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y añadió Yahvé a hablarme otra vez, diciendo»; es un giro idiomático que significa simplemente «Yahvé me habló de nuevo, diciendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: spoke ... again
  chosen_spanish: me habló de nuevo
  alternatives_spanish:
  - continuó hablándome
  - añadió a hablarme
  lexicon: HALOT
  rationale: El hebreo usa יסף con un verbo de habla para introducir una nueva instancia de discurso. En español, «me habló de nuevo» comunica con naturalidad el valor iterativo sin perder la idea de repetición ya auditada en el texto inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La POB en inglés conserva el nombre divino como Yahweh; en español, el equivalente adoptado es «Yahvé», transliteración estable y reverente del Tetragrámaton, evitando la sustitución por un título.
- source_word: דַּבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló conmigo
  lexicon: HALOT
  rationale: דבר en este marco de discurso profético se rinde naturalmente como «habló». Mantiene el acto de comunicación divina y enlaza bien con la cláusula introductoria siguiente.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - conmigo
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona señala dirección hacia el profeta; en español, el clítico «me» expresa de forma natural ese destinatario.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - todavía
  lexicon: HALOT
  rationale: עוֹד aquí marca repetición de la palabra divina. «De nuevo» conserva el sentido repetitivo con un registro sobrio y bíblicamente claro.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo. «Diciendo» preserva la fórmula narrativa formal y prepara la cita que sigue.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; la POB en inglés lo vierte como Yahweh. En español, «Yahvé» mantiene el nombre propio del pacto sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Estructura idiomática de יסף + verbo de habla
  english_pob_reading: spoken ... again
  chosen_spanish_reading: me habló de nuevo
  alternative_spanish_readings:
  - volvió a hablarme
  - continuó hablándome
  rationale: La lectura doctrinal y lexical evita una traducción mecánica de «añadió a hablar». La frase española seleccionada preserva la repetición del acto de revelación y la naturalidad del español.
  doctrine_reference: 'Audit trail lexical: idiom of renewal in divine speech'
translation_notes:
  revision_awareness: El cotejo de revisión indica que no hubo cambios necesarios; la presente propuesta sigue la lectura aprobada y adapta al español las decisiones léxicas ya auditadas en inglés, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme para el nombre divino.
  - Se conserva el valor iterativo de עוֹד con una expresión idiomática natural en español.
  - La fórmula introductoria de discurso queda abierta para la cita del versículo siguiente.
