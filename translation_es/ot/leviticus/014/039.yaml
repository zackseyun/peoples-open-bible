review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia procedimental del hebreo: el sacerdote regresa, observa, y se constata que la afección se ha extendido en las paredes de la casa. También preserva la alternativa léxica de הַנֶּגַע como «mancha». Sin embargo, «al séptimo día» no refleja de manera natural ni exacta el temporal בַּיּוֹם הַשְּׁבִיעִי; en español bíblico y general debe ser «el séptimo día» o «en el séptimo día».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «volverá al séptimo día» suena poco natural en español y puede sugerir plazo/meta más que tiempo de inspección. «El séptimo día» mejora la legibilidad y la fidelidad. «Y he aquí» es aceptable y refleja bien הִנֵּה en este contexto.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. «Sacerdote», «infección» y «paredes de la casa» están alineados con la línea POB. La nota léxica con «mancha» está bien preservada.
  issues:
  - severity: medium
    issue: La frase temporal «al séptimo día» es poco natural e imprecisa para בַּיּוֹם הַשְּׁבִיעִי.
    rationale: El hebreo indica tiempo específico de la acción («en/el séptimo día»), no movimiento hacia un plazo. En español, «volverá el séptimo día» transmite mejor la instrucción procedural.
  revised_spanish_text: Entonces el sacerdote volverá el séptimo día y mirará, y he aquí, si la infección se ha extendido[a] en las paredes de la casa,
  revised_footnotes:
  - marker: a
