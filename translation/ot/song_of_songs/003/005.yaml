theological_decisions:
- issue: Referent and personification of 'love' in the closing clause
  chosen_reading: Render 'love' as the subject of the feminine verb without specifying a male or female human referent.
  alternative_readings:
  - until she pleases
  - until he pleases
  rationale: The Hebrew feminine singular verb most naturally agrees with the feminine noun 'love.' Some translations personalize the referent as 'he' or 'she,' but the text itself does not require identifying a specific person here. Preserving 'love' as the subject maintains the poem's ambiguity and avoids importing an interpretive decision not demanded by the Hebrew.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
