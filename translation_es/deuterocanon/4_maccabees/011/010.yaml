translation:
  language: es
  text: Atándolo de rodillas, y fijándolas con grilletes[a] de hierro, le doblaron la cintura sobre la cuña de la rueda[b]; alrededor de la cual, completamente doblado hacia atrás sobre la rueda como un escorpión[c], era desmembrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con grillos de hierro» o «con argollas de hierro para los pies»; el término griego se refiere específicamente a ataduras colocadas en los pies o las piernas.
    reason: lexical_alternative
  - marker: b
    text: La expresión «la cuña de la rueda» refleja un elemento técnico de un aparato de tortura; el detalle mecánico exacto no puede precisarse más a fondo solo a partir del griego.
    reason: cultural_note
  - marker: c
    text: O «doblado hacia atrás como un escorpión»; la comparación probablemente evoca el cuerpo arqueado o curvado hacia atrás bajo tortura.
    reason: lexical_alternative
lexical_decisions:
- source_word: δήσαντες
  english_pob_choice: binding
  chosen_spanish: Atándolo
  alternatives_spanish:
  - Habiéndolo atado
  - Sujetándolo
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa de sujeción. «Atándolo» mantiene la secuencia y suena natural en español sin perder la fuerza activa del hecho.
- source_word: ἐπὶ τὰ γόνατα
  english_pob_choice: onto his knees
  chosen_spanish: de rodillas
  alternatives_spanish:
  - sobre sus rodillas
  - encima de sus rodillas
  lexicon: LSJ
  rationale: La idea es una postura impuesta. «De rodillas» comunica el estado corporal de modo idiomático en español, aunque el griego literalmente describe la colocación sobre las rodillas.
- source_word: ποδάγραις σιδηραῖς
  english_pob_choice: with iron shackles
  chosen_spanish: grilletes de hierro
  alternatives_spanish:
  - fierros para los pies
  - hierros para las piernas
  lexicon: LSJ
  rationale: El término griego designa ataduras para pies o piernas. «Grilletes de hierro» conserva la función de restricción y es claro para el lector moderno; no se opta por «siervos» ni por otra terminología más eclesiástica.
- source_word: ἐφαρμόσαντες
  english_pob_choice: fastening
  chosen_spanish: fijándolas
  alternatives_spanish:
  - ajustándolas
  - aplicándolas
  lexicon: LSJ
  rationale: La forma describe el acto de asegurar las ataduras. «Fijándolas» expresa bien la acción material y remite al objeto femenino plural implícito en español (las ataduras/grilletes).
- source_word: τὴν ὀσφὺν αὐτοῦ
  english_pob_choice: his waist
  chosen_spanish: la cintura
  alternatives_spanish:
  - los lomos
  - la parte baja de la espalda
  lexicon: LSJ
  rationale: ὀσφύς puede ser cintura, lomos o zona lumbar. «La cintura» evita arcaísmo y mantiene una imagen corporal comprensible, sin añadir interpretación médica.
- source_word: τροχιαῖον σφῆνα
  english_pob_choice: the wheel’s wedge
  chosen_spanish: la cuña de la rueda
  alternatives_spanish:
  - la cuña de la rueda
  - la cuña del mecanismo de la rueda
  lexicon: LSJ
  rationale: Se preserva la imagen concreta del dispositivo de tortura sin sobreespecificar su mecánica. «Cuña de la rueda» es la equivalencia más directa y auditable frente a la nota inglesa sobre la dificultad del término técnico.
- source_word: κατέκαμψαν
  english_pob_choice: they bent
  chosen_spanish: le doblaron
  alternatives_spanish:
  - le inclinaron
  - lo forzaron a doblarse
  lexicon: LSJ
  rationale: El verbo expresa doblar o curvar hacia abajo. En contexto, «le doblaron» reproduce la acción ejercida sobre el cuerpo con claridad y mantiene el agente implícito.
- source_word: σκορπίου τρόπον
  english_pob_choice: like a scorpion
  chosen_spanish: como un escorpión
  alternatives_spanish:
  - a la manera de un escorpión
  - cual escorpión
  lexicon: LSJ
  rationale: El griego marca comparación de modo. «Como un escorpión» conserva la imagen viva y es el equivalente español más natural.
- source_word: ἀνακλώμενος
  english_pob_choice: twisted back
  chosen_spanish: completamente echado hacia atrás
  alternatives_spanish:
  - doblado hacia atrás
  - torcido hacia atrás
  lexicon: LSJ
  rationale: El participio sugiere estar doblado o retorcido hacia atrás. «Completamente echado hacia atrás» busca reflejar el alcance intensivo de ὅλος en el contexto de la tortura, sin decir que la rueda misma está «entera».
- source_word: ἐξεμελίζετο
  english_pob_choice: he was being dismembered
  chosen_spanish: era desmembrado
  alternatives_spanish:
  - lo estaban desmembrando
  - era descuartizado
  lexicon: LSJ
  rationale: El imperfecto pasivo expresa un proceso continuo. «Era desmembrado» mantiene la pasividad y la gravedad del acto, sin exagerar con un verbo más coloquial o más violento de lo que exige el griego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión reciente del POB en inglés: evita añadir la idea de «forzarlo hacia abajo», traduce ἐφʼ ὃν de manera relacional («a él») y conserva el valor de ὅλος referido al hombre, no a la rueda. También se mantiene la nota sobre el dispositivo técnico de tortura y la comparación con el escorpión.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «Mesías/Cristo» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene un registro solemne y lectura pública, evitando calcos innecesarios.
  - Las notas usan marcadores únicos y cada una está anclada a su frase correspondiente en el texto.
  - Se preserva la dureza del pasaje sin suavizar el proceso de tortura ni ampliar la imagen más allá del griego.
