translation:
  language: es
  text: y la mesa con sus utensilios, y el candelabro[a] puro[b] con todos sus utensilios, y el altar del incienso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la menorá». El término hebreo se refiere al candelabro del santuario; el texto principal traduce el sustantivo común en vez de transliterarlo.
    reason: lexical_alternative
  - marker: b
    text: «Puro» puede aludir a la pureza ritual y, en este contexto del tabernáculo, probablemente también resonar con que el candelabro estaba hecho de oro puro en descripciones relacionadas.
    reason: cultural_note
  - marker: c
    text: O «el altar de incienso».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa del pan de la Presencia
  lexicon: HALOT
  rationale: שֻׁלְחָן designa una mesa. En español, «mesa» es el equivalente natural y claro. Aunque el contexto tabernacular identifica de qué mesa se trata, el hebreo de este verso no repite la denominación más larga.
- source_word: כֵּלָיו
  english_pob_choice: its utensils
  chosen_spanish: sus utensilios
  alternatives_spanish:
  - sus vasos
  - sus artículos
  - sus implementos
  lexicon: HALOT
  rationale: כְּלִי abarca objetos, instrumentos o recipientes. «Utensilios» preserva la amplitud semántica y suena natural en el contexto de objetos del santuario.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  - la lámpara
  - el lampadario
  lexicon: HALOT
  rationale: מְנוֹרָה nombra un soporte para lámparas. En español bíblico, «candelabro» comunica bien la función del objeto sin transliterar el término, conforme al criterio de traducir el sustantivo común.
- source_word: הַטְּהֹרָה
  english_pob_choice: the pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - purificado
  lexicon: HALOT
  rationale: טָהוֹר puede significar limpio o puro. En el contexto cultual del tabernáculo, «puro» es la opción más adecuada y además puede evocar, por asociación, el oro puro mencionado en otros pasajes relacionados.
- source_word: כָּל כֵּלֶיהָ
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus artículos
  - todos sus implementos
  lexicon: HALOT
  rationale: כָּל expresa totalidad y כֵּלֶיהָ se refiere a los objetos asociados al candelabro. «Todos sus utensilios» conserva la idea de conjunto completo sin perder naturalidad en español.
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar de incienso
  - el altar del sahumerio
  lexicon: HALOT
  rationale: La cadena constructa significa «altar de incienso». En español, «altar del incienso» es transparente y fiel. «Incienso» mantiene el referente cultual sin introducir una paráfrasis.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: Hebrew grammar
  rationale: La partícula repetida introduce los elementos de una lista. En español se expresa naturalmente con «y», manteniendo la estructura enumerativa del original.
theological_decisions:
- issue: Rending of טָהוֹר in a cultic context
  english_pob_reading: '''Pure'' may refer to ritual purity and, in this tabernacle context, likely also resonates with the lampstand''s being made of pure gold in related descriptions.'
  chosen_spanish_reading: «puro» puede aludir a la pureza ritual y también resonar con el oro puro del candelabro en textos paralelos.
  alternative_spanish_readings:
  - «limpio»
  - «purificado»
  rationale: La elección mantiene la tensión cultual señalada por el POB inglés sin reducirla a una sola dimensión. «Puro» funciona tanto ritualmente como en la alusión material del objeto.
  doctrine_reference: Éxodo 25:31-39; Éxodo 37:17-24
- issue: Whether to transliterate מְנוֹרָה
  english_pob_reading: Or 'the menorah.' The Hebrew term refers to the sanctuary lampstand; the main text translates the common noun rather than transliterating it.
  chosen_spanish_reading: Se traduce como «candelabro» en el texto principal, reservando «menorá» solo como alternativa.
  alternative_spanish_readings:
  - «menorá»
  - «lámpara»
  rationale: La política de la serie favorece traducir el sustantivo común cuando existe un equivalente claro. «Candelabro» es comprensible y mantiene el sentido funcional del objeto sagrado.
  doctrine_reference: Éxodo 25:31-40; Éxodo 37:17-24
translation_notes:
  revision_awareness: 'Se revisó el texto inglés POB y su aparato crítico: no hubo cambios de revisión aplicados y el estado final muestra alta concordancia. La propuesta española conserva esa lectura estable, manteniendo las tres unidades del versículo y las mismas alternativas léxicas relevantes documentadas por el POB inglés.'
  spanish_consistency_notes:
  - Se usó puntuación enumerativa clara en español y se mantuvo la repetición de la conjunción para reflejar la lista hebrea.
  - «Candelabro» se eligió como equivalente funcional de מְנוֹרָה; «menorá» queda en nota como alternativa documentada.
  - «Puro» se mantuvo sin intensificar a «limpio», para respetar el matiz cultual y material del término hebreo.
  - «Incienso» conserva el carácter cultual del altar sin añadir explicación extra al texto principal.
