id: 1TH.5.12
reference: 1 Thessalonians 5:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐρωτῶμεν δὲ ὑμᾶς, ἀδελφοί, εἰδέναι τοὺς κοπιῶντας ἐν ὑμῖν καὶ προϊσταμένους ὑμῶν ἐν κυρίῳ καὶ νουθετοῦντας ὑμᾶς,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/012.yaml
  text: Now we ask you[a], brothers, to acknowledge those who labor among you and lead you in the Lord and admonish you[c][b],
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers,' used here as a congregational address.
    reason: lexical_alternative
  - marker: b
    text: Or 'respect' or 'recognize' those who labor among you.
    reason: lexical_alternative
  - marker: c
    text: Or 'are over you in the Lord.'
    reason: alternative_reading
translation:
  language: ko
  text: 형제[a] 여러분, 우리는 여러분에게 요청합니다. 여러분 가운데서 수고하며 주 안에서 여러분을 이끌고[c] 여러분을 권고하는 분들을 알아주십시오[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매」. 헬라어 「형제」가 회중 호칭으로 사용된다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「존경하다」, 「인정하다」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「주 안에서 여러분 위에 있는 분들」.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδέναι
  english_pob_choice: to acknowledge
  chosen_korean: 알아주십시오
  alternatives_korean:
  - 인정해 주십시오
  - 존중해 주십시오
  lexicon: BDAG
  rationale: οἶδα가 본 문맥에서 단순한 「앎」이 아니라 「인정·존중」의 의미. 「알아주다」가 한국어로 그 인정의 정서를 자연스럽게 담는다.
- source_word: τοὺς κοπιῶντας ἐν ὑμῖν
  english_pob_choice: those who labor among you
  chosen_korean: 여러분 가운데서 수고하며
  alternatives_korean:
  - 여러분 가운데 힘써 일하며
  - 여러분 가운데서 애쓰며
  lexicon: BDAG
  rationale: κοπιάω의 「고된 수고」를 「수고」로 옮긴다. 2:9의 「수고와 노고」와 일관성.
- source_word: προϊσταμένους ὑμῶν ἐν κυρίῳ
  english_pob_choice: lead you in the Lord
  chosen_korean: 주 안에서 여러분을 이끌고
  alternatives_korean:
  - 주 안에서 여러분 위에 있는
  - 주 안에서 여러분을 다스리는
  lexicon: BDAG
  rationale: προΐστημι의 「앞에 섬·이끎」 의미. 「이끌다」가 직책적 「다스림」보다 본 절의 자상한 사역 정황에 가깝다. 각주에 「위에 있는」 가능성을 둔다.
- source_word: νουθετοῦντας ὑμᾶς
  english_pob_choice: admonish you
  chosen_korean: 여러분을 권고하는
  alternatives_korean:
  - 여러분에게 경계의 말을 하는
  - 여러분을 훈계하는
  lexicon: BDAG
  rationale: νουθετέω의 「마음에 두도록 함·권고」 의미. 「권고」가 「훈계」보다 부드러운 사역 어감.
