review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: mantiene el énfasis de αὐτὸς con «él mismo», refleja συντρίψει con una opción fuerte («aplastará»), y traduce πρὸ προσώπου ἡμῶν de forma natural como «delante de nosotros». Sin embargo, μὴ φοβηθῆτε ἀπʼ αὐτῶν se expresa mejor en español como una prohibición directa («no les teman» o «no tengan miedo de ellos») y no como «no teman a causa de ellos», que suena menos natural y no refleja tan claramente el objeto del temor.'
  spanish_quality_summary: La frase es clara, pero «pero ustedes, no teman a causa de ellos» resulta algo rígida y poco idiomática. La coma tras «ustedes» también entorpece el flujo. Una formulación más natural y digna en español eclesial amplio es «pero ustedes no les teman» o «pero ustedes no tengan miedo de ellos».
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. El tratamiento de «él mismo» preserva bien la decisión teológica documentada. «Aplastará» es una buena correspondencia para συντρίψει. La única reparación necesaria es la prohibición final para ajustarla mejor al griego y al español natural.
  issues:
  - severity: medium
    issue: «no teman a causa de ellos» es una traducción poco natural de μὴ φοβηθῆτε ἀπʼ αὐτῶν
    rationale: El griego expresa directamente «no los teman / no tengan miedo de ellos». «A causa de ellos» convierte el complemento en una causa más abstracta y suena forzado en español, aunque no distorsiona gravemente el sentido.
  - severity: low
    issue: Puntuación innecesaria en «pero ustedes, no teman»
    rationale: La coma tras «ustedes» no corresponde a una pausa necesaria y hace más trabada la exhortación.
  revised_spanish_text: Y él mismo los aplastará delante de nosotros; pero ustedes no les teman.
  revision_rationale: 'Se ajusta la prohibición final a una forma más fiel al objeto directo del temor en griego y más natural en español: «no les teman». También se elimina la coma innecesaria después de «ustedes». No hacen falta notas.'
