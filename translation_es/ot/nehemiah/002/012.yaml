base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/012.yaml
  text: So I arose in the night[a], I and a few men with me, and I had not told anyone what my God was putting into my heart to do for Jerusalem[c][b]. And there was no animal with me except the animal on which I was riding.
  footnotes:
  - marker: a
    text: Or 'I had told no one.' The Hebrew says literally 'I had not told any man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what my God had put into my heart' or 'what my God was prompting in my heart.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'animal' (or 'beast'), a general term for a riding animal.
    reason: lexical_alternative
