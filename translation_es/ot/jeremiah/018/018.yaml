translation:
  language: es
  text: 'Entonces dijeron: «Vamos, tramemos planes contra Jeremías, porque no perecerá la instrucción del sacerdote, ni el consejo del sabio, ni la palabra del profeta. Vamos, golpeémoslo con la lengua[a], y no prestemos atención a ninguna de sus palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ataquémoslo con la lengua», es decir, por medio de calumnia o acusación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then they said
  chosen_spanish: Entonces dijeron
  alternatives_spanish:
  - Y dijeron
  - Y entonces dijeron
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces dijeron» conserva la secuencia y suena natural en español bíblico contemporáneo.
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vamos
  - Vengan ahora
  lexicon: HALOT
  rationale: Es una exhortación colectiva; «Vengan» funciona como invitación a una acción conjunta y mantiene el tono imperativo.
- source_word: וְנַחְשְׁבָה ... מַחֲשָׁבוֹת
  english_pob_choice: let us devise plans
  chosen_spanish: tramemos planes
  alternatives_spanish:
  - hagamos planes
  - maquinemos planes
  - tracemos planes
  lexicon: HALOT
  rationale: La combinación verbo-sustantivo expresa deliberación hostil. «Tramemos planes» preserva la intención conspirativa sin perder la intensidad del hebreo.
- source_word: עַל יִרְמְיָהוּ
  english_pob_choice: against Jeremiah
  chosen_spanish: contra Jeremías
  alternatives_spanish:
  - acerca de Jeremías
  - sobre Jeremías
  lexicon: HALOT
  rationale: El contexto es claramente adversativo; «contra» reproduce el sentido hostil de עַל aquí.
- source_word: לֹא תֹאבַד תּוֹרָה
  english_pob_choice: instruction will not perish
  chosen_spanish: no perecerá la instrucción
  alternatives_spanish:
  - no desaparecerá la instrucción
  - no se perderá la enseñanza
  - no faltará la instrucción
  lexicon: HALOT
  rationale: תּוֹרָה en este contexto es instrucción sacerdotal, no «ley» en sentido legal estrecho. «Perecerá» conserva la idea de cesar o desaparecer.
- source_word: מִכֹּהֵן
  english_pob_choice: from the priest
  chosen_spanish: del sacerdote
  alternatives_spanish:
  - de un sacerdote
  - del sacerdote en turno
  lexicon: HALOT
  rationale: El hebreo es singular representativo; en español, «del sacerdote» expresa esa clase funcional de modo natural.
- source_word: וְעֵצָה
  english_pob_choice: nor counsel
  chosen_spanish: ni el consejo
  alternatives_spanish:
  - ni el asesoramiento
  - ni el consejo sabio
  lexicon: HALOT
  rationale: «Consejo» es el equivalente más directo y solemne para עֵצָה en un marco de sabiduría y dirección.
- source_word: מֵחָכָם
  english_pob_choice: from the wise man
  chosen_spanish: del sabio
  alternatives_spanish:
  - de un sabio
  - del hombre sabio
  lexicon: HALOT
  rationale: Se mantiene el singular representativo masculino del hebreo. «Sabio» es la forma más natural y fiel en español para esta categoría.
- source_word: וְדָבָר מִנָּבִיא
  english_pob_choice: nor word from the prophet
  chosen_spanish: ni la palabra del profeta
  alternatives_spanish:
  - ni un mensaje del profeta
  - ni palabra del profeta
  lexicon: HALOT
  rationale: דָבָר aquí apunta a una palabra o mensaje profético; «palabra» conserva la amplitud semántica y el paralelismo del verso.
- source_word: וְנַכֵּהוּ בַלָּשׁוֹן
  english_pob_choice: let us strike him with the tongue
  chosen_spanish: golpeémoslo con la lengua
  alternatives_spanish:
  - atacémoslo con la lengua
  - herámoslo con la lengua
  - difamémoslo
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. «Golpeémoslo con la lengua» mantiene la imagen y deja abierta la referencia a ataque verbal.
- source_word: וְאַל נַקְשִׁיבָה
  english_pob_choice: and let us not pay attention
  chosen_spanish: y no prestemos atención
  alternatives_spanish:
  - y no escuchemos
  - y no le hagamos caso
  - y no atendamos
  lexicon: HALOT
  rationale: קשׁב implica atender con cuidado; «prestar atención» comunica bien la decisión deliberada de no escucharle.
- source_word: אֶל כָּל דְּבָרָיו
  english_pob_choice: to any of his words
  chosen_spanish: a ninguna de sus palabras
  alternatives_spanish:
  - a todas sus palabras
  - a nada de lo que dice
  lexicon: HALOT
  rationale: Con negación, «ninguna» transmite el valor totalizador de כָּל en español de forma idiomática.
theological_decisions:
- issue: Naturaleza de תּוֹרָה en el contexto
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: En este versículo la referencia es a la función instructiva del sacerdote, no a la Torá como corpus legal. «Instrucción» preserva el matiz funcional sin sobrecargarlo con asociaciones legales no primarias aquí.
  doctrine_reference: Jeremías 18:18; uso contextual de תּוֹרָה según HALOT
- issue: Lectura del ataque con la lengua
  english_pob_reading: strike him with the tongue, i.e. by slander or accusation
  chosen_spanish_reading: golpeémoslo con la lengua
  alternative_spanish_readings:
  - atacémoslo con la lengua
  - difamémoslo
  - acusémoslo
  rationale: El hebreo mantiene una metáfora abierta; el español debe conservarla para no borrar la tensión entre imagen literal y sentido figurado. La frase deja espacio para la nota explicativa sobre difamación o acusación.
  doctrine_reference: POB lexical note on idiom and hostility in Jer 18:18
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el cierre del audit trail inglés: conserva la secuencia narrativa, el paralelismo de sacerdote/sabio/profeta y la metáfora de atacar con la lengua, sin suavizar el tono hostil. No se requirieron revisiones respecto del pasaje base auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma de referencia al nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «Jeremías» como nombre propio bíblico estándar en español.
  - «Instrucción», «consejo» y «palabra» reproducen el paralelismo semántico del hebreo sin introducir vocabulario eclesiástico ajeno al contexto.
  - La negación final se formula con «ninguna de sus palabras» para reflejar el valor totalizador de כָּל en español natural.
