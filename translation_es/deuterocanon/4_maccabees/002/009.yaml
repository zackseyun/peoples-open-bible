translation:
  language: es
  text: 'Y aun si alguien es avaro, es refrenado por la ley por medio de la razón, sin recoger lo que quedó sin cosechar ni volver a pasar por las viñas[a]. Y también en las demás cosas se puede reconocer esto: que la razón domina sobre las pasiones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «repasar las viñas»; es decir, recoger lo que queda después de la primera pasada de la cosecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: φειδωλός
  english_pob_choice: stingy
  chosen_spanish: avaro
  alternatives_spanish:
  - tacaño
  - mezquino
  - miserable
  lexicon: LSJ
  rationale: El griego describe aquí una disposición a retener con exceso o a aferrarse, en un contexto moralmente negativo. En español, "avaro" conserva mejor esa carga ética que "frugal", que podría sonar positivo, y evita la dureza excesiva de "mezquino" o "miserable".
- source_word: κρατεῖται
  english_pob_choice: is restrained
  chosen_spanish: está dominado
  alternatives_spanish:
  - está retenido
  - está controlado
  - está contenido
  lexicon: LSJ
  rationale: El pasivo expresa que la persona queda sometida o vencida por la ley. "Está dominado" comunica con naturalidad en español esa idea de control efectivo sin perder la fuerza del verbo griego.
- source_word: διὰ τὸν λογισμόν
  english_pob_choice: through reason
  chosen_spanish: por medio de la razón
  alternatives_spanish:
  - por la razón
  - mediante la razón
  - a través de la razón
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός tiene un valor filosófico-moral de juicio racional que gobierna las pasiones. "Por medio de la razón" conserva ese sentido instrumental y resulta claro en español.
- source_word: ἐπικαρπούμενος τοὺς ἀμήτους
  english_pob_choice: gleaning the unharvested crops
  chosen_spanish: sin recoger los restos de la cosecha
  alternatives_spanish:
  - sin espigar lo no cosechado
  - sin recoger lo que quedó sin segar
  - sin aprovechar lo no cosechado
  lexicon: LSJ
  rationale: La imagen agrícola apunta a tomar lo que queda después de la primera recolección o de la siega. "Restos de la cosecha" es más natural en español que un calco técnico, y mantiene la idea de no aprovechar lo que todavía no corresponde tomar.
- source_word: ἐπιρρωγολογούμενος τοὺς ἀμπελῶνας
  english_pob_choice: going over the vineyards again
  chosen_spanish: volver a pasar por las viñas
  alternatives_spanish:
  - repasar las viñas
  - espigar las viñas
  - volver a recorrer los viñedos
  lexicon: LSJ
  rationale: El verbo raro sugiere volver por la viña para recoger lo remanente después del primer paso. "Volver a pasar por las viñas" conserva la imagen de una segunda pasada y es más transparente que una traducción demasiado técnica.
- source_word: ἐπὶ τῶν ἑτέρων
  english_pob_choice: in other matters as well
  chosen_spanish: en las demás cosas
  alternatives_spanish:
  - en otros casos también
  - respecto de otras cosas también
  - en lo demás también
  lexicon: LSJ
  rationale: La expresión amplía el ejemplo agrícola a otros ámbitos. "En las demás cosas" mantiene esa extensión general y es idiomática en español.
- source_word: ἐπιγνῶναι
  english_pob_choice: to recognize
  chosen_spanish: reconocer
  alternatives_spanish:
  - percibir
  - discernir
  - llegar a saber
  lexicon: LSJ
  rationale: Aquí el verbo expresa discernir una conclusión a partir de los ejemplos. "Reconocer" es una equivalencia natural y suficiente para el español contemporáneo.
- source_word: παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - las emociones
  - los impulsos
  - los deseos
  lexicon: LSJ
  rationale: En este marco filosófico-moral, πάθη no es un simple conjunto de sentimientos, sino impulsos desordenados que deben ser gobernados. "Pasiones" preserva ese sentido técnico mejor que opciones más psicológicas.
- source_word: ὁ λογισμὸς κρατῶν
  english_pob_choice: reason is the master over
  chosen_spanish: la razón domina
  alternatives_spanish:
  - la razón gobierna
  - la razón es dueña de
  - la razón tiene el dominio sobre
  lexicon: LSJ
  rationale: La construcción subraya el ejercicio de autoridad de la razón sobre las pasiones. "Domina" expresa bien el matiz de gobierno y resulta más natural en español que una fórmula más literal como "es el maestro sobre".
theological_decisions:
- issue: Valor antropológico-filosófico de λογισμός en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el juicio racional
  - la mente racional
  - el razonamiento
  rationale: El libro desarrolla la tesis de que la razón fiel gobierna las pasiones. Traducir λογισμός consistentemente como "la razón" conserva el hilo temático sin cargar el español con tecnicismos filosóficos innecesarios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Fuerza moral de πάθη
  english_pob_reading: the passions
  chosen_spanish_reading: las pasiones
  alternative_spanish_readings:
  - los impulsos
  - las emociones
  - los deseos
  rationale: El texto no contrasta emociones neutras con razón, sino impulsos que deben ser sometidos. "Las pasiones" mantiene la tensión moral central del argumento.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: Se revisó el contexto griego y el auditorio inglés de POB. La versión inglesa opta por un equivalente óptimo con nota para la imagen agrícola; la redacción española conserva esa misma decisión básica, pero ajusta la metáfora a un español más natural sin perder la tensión ética ni el paralelismo entre la agricultura y el dominio racional sobre las pasiones.
  spanish_consistency_notes:
  - Se mantiene "la razón" para λογισμός de manera uniforme en todo el versículo.
  - Se preserva la oposición conceptual entre "la razón" y "las pasiones".
  - '"Viñas" y "cosecha" buscan naturalidad en español sin borrar el trasfondo agrícola del griego.'
  - No se usa "SEÑOR" ni terminología litúrgica ajena al pasaje, porque aquí no aparecen términos divinos que lo requieran.
