translation:
  language: es
  text: Así como se reúnen plata, bronce[a], hierro, plomo y estaño en medio de un horno, para avivar el fuego sobre ellos y derretirlos, así yo los reuniré en mi ira y en mi furor[b], los pondré allí y los derretiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bronce» sigue la elección del POB en inglés; también es posible «cobre» para נְחֹשֶׁת.
    reason: lexical_alternative
  - marker: b
    text: La expresión final continúa la metáfora del horno; también puede entenderse como «los fundiré».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְבֻצַת
  english_pob_choice: As silver and bronze and iron and lead and tin are gathered
  chosen_spanish: Así como se reúnen
  alternatives_spanish:
  - Como se junta
  - Tal como se reúnen
  lexicon: HALOT
  rationale: 'El hebreo abre con una comparación idiomática que en español se expresa con naturalidad mediante una cláusula comparativa: «Así como se reúnen». Conserva el valor comparativo sin introducir un sujeto ajeno al texto.'
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - oro blanco
  lexicon: HALOT
  rationale: El metal es plata, el equivalente directo y normal en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En esta lista de metales para fundición, «bronce» sigue la decisión inglesa y refleja bien el valor probable del término en contextos bíblicos de metalurgia. Se mantiene la alternativa de «cobre» por la ambigüedad lexical documentada.
- source_word: בַרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - ferro
  lexicon: HALOT
  rationale: Correspondencia léxica directa y clara.
- source_word: עוֹפֶרֶת
  english_pob_choice: lead
  chosen_spanish: plomo
  alternatives_spanish:
  - metal blando
  lexicon: HALOT
  rationale: Es la traducción estándar y precisa del término.
- source_word: בְדִיל
  english_pob_choice: tin
  chosen_spanish: estaño
  alternatives_spanish:
  - aleación
  lexicon: HALOT
  rationale: La lista metalúrgica pide el equivalente directo «estaño». Se conserva la posible amplitud semántica solo como alternativa, sin imponerla en el texto principal.
- source_word: אֶל תּוֹךְ כּוּר
  english_pob_choice: into the midst of a furnace
  chosen_spanish: en medio de un horno
  alternatives_spanish:
  - dentro de un horno
  - en el centro de un horno de fundición
  lexicon: HALOT
  rationale: «En medio de» reproduce תּוֹךְ y «horno» hace inteligible כּוּר; «de fundición» sería explicativo, pero el contexto metalúrgico ya lo sostiene.
- source_word: לָפַחַת עָלָיו אֵשׁ
  english_pob_choice: to blow fire on it
  chosen_spanish: para soplarle fuego
  alternatives_spanish:
  - para avivar el fuego sobre ello
  - para atizarle el fuego
  lexicon: HALOT
  rationale: El infinitivo de נפח es «soplar»; en español, «soplarle fuego» comunica de manera viva la acción de avivar el calor sobre el metal sin perder la imagen.
- source_word: לְהַנְתִּיךְ
  english_pob_choice: in order to melt it
  chosen_spanish: y derretirlo
  alternatives_spanish:
  - y fundirlo
  - y derretirlo para fundirlo
  lexicon: HALOT
  rationale: «Derretir» conserva con claridad la acción de licuar el metal para la imagen del horno. «Fundir» es viable, pero «derretirlo» resulta más transparente para lectores modernos.
- source_word: כֵּן אֶקְבֹּץ
  english_pob_choice: so I will gather you
  chosen_spanish: así yo los reuniré
  alternatives_spanish:
  - así los juntaré
  - de este modo los reuniré
  lexicon: HALOT
  rationale: Se conserva la correlación comparativa de כֵּן y el verbo de reunión. «Reuniré» mantiene la formalidad y la resonancia del hebreo sin sonar mecánico.
- source_word: בְּאַפִּי וּבַחֲמָתִי
  english_pob_choice: in my anger and in my wrath
  chosen_spanish: en mi ira y en mi furor
  alternatives_spanish:
  - en mi enojo y en mi ira
  - en mi ira y en mi cólera
  lexicon: HALOT
  rationale: «Ira» y «furor» preservan el paralelismo intensificado del hebreo. Se evita diluir el par con un único término suave.
- source_word: וְהִנַּחְתִּי
  english_pob_choice: and I will place you there
  chosen_spanish: los pondré allí
  alternatives_spanish:
  - los colocaré allí
  - los dejaré allí
  lexicon: HALOT
  rationale: En el flujo de la metáfora, el verbo expresa situar a los destinatarios en el lugar del juicio. «Pondré allí» es claro y conserva la fuerza de ubicación.
- source_word: וְהִתַּכְתִּי אֶתְכֶם
  english_pob_choice: and melt you
  chosen_spanish: y los derretiré
  alternatives_spanish:
  - y los fundiré
  - y los haré fundirse
  lexicon: HALOT
  rationale: Se mantiene la continuación del cuadro del horno. «Derretiré» es la forma más inmediata y comprensible para el lector español, sin suavizar la severidad del juicio.
theological_decisions:
- issue: Conservar la metáfora de juicio metalúrgico sin convertirla en refinamiento positivo
  english_pob_reading: 'Retain the furnace/smelting imagery as a depiction of divine judgment: ''I will gather you... and melt you.'''
  chosen_spanish_reading: Mantener la imagen del horno, la reunión de metales y el derretimiento como juicio divino severo.
  alternative_spanish_readings:
  - Purificaré a ustedes
  - Los probaré como metal
  rationale: El contexto inmediato es punitivo, no de purificación benevolente. Traducir con imágenes de refinamiento suavizaría indebidamente la advertencia profética. La versión española conserva la tensión teológica del original.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión teológica
- issue: Cómo reflejar la intensificación de ira y furor sin normalizarla
  english_pob_reading: in my anger and in my wrath
  chosen_spanish_reading: en mi ira y en mi furor
  alternative_spanish_readings:
  - en mi enojo y en mi furia
  - en mi cólera y en mi ira
  rationale: El hebreo acumula términos de indignación divina. «Ira» y «furor» mantienen esa acumulación y su registro solemne.
  doctrine_reference: Uso contextual de léxico afectivo-divino sin atenuación
translation_notes:
  revision_awareness: 'La base inglesa revisada prefirió una comparación explícita con ''As ... are gathered'' en lugar de introducir un sujeto impersonal. La redacción española refleja esa comparación directa con «Así como se reúnen». También conserva la progresión completa de la metáfora: recolección de metales, horno, fuego, derretimiento, y luego la aplicación a Israel.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma de proyecto cuando el Tetragrámaton sea pertinente; en este versículo no aparece.
  - Se usó «furor» para preservar el paralelismo intensificado con «ira».
  - Se evitó «refinar» o «purificar» para no borrar el sentido de juicio del pasaje.
  - Se eligió «reúnen/reuniré» para conservar la repetición conceptual del verbo קבץ.
  - Se prefirió una construcción española fluida sin perder la correspondencia con el hebreo comparativo.
