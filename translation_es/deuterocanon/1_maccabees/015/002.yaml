translation:
  language: es
  text: 'Y contenían esta forma: «El rey Antíoco, a Simón, el sumo sacerdote y etnarca[a], y a la nación de los judíos[b], salud.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «se leían así».
    reason: lexical_alternative
  - marker: b
    text: O «la nación de los judeanos». El griego Ἰουδαίων puede referirse tanto a judíos como a judeanos en sentido geográfico.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν περιέχουσαι
  english_pob_choice: they contained
  chosen_spanish: contenía
  alternatives_spanish:
  - decía
  - llevaba
  - presentaba
  lexicon: LSJ
  rationale: La frase griega describe el contenido de cartas o documentos previos. En español, ‘contenía’ conserva el sentido documental de que el escrito llevaba estas palabras, sin forzar una paráfrasis más libre que oculte la estructura del original.
- source_word: τὸν τρόπον τοῦτον
  english_pob_choice: this form
  chosen_spanish: esta forma
  alternatives_spanish:
  - lo siguiente
  - esta redacción
  - de la siguiente manera
  lexicon: LSJ
  rationale: τρόπος aquí señala la forma o redacción del escrito. ‘Esta forma’ mantiene el valor formular y documental, con español natural y fiel al matiz del griego.
- source_word: ἱερεῖ μεγάλῳ
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: LSJ
  rationale: En el uso judío y helenístico, la expresión designa el cargo de ‘high priest’. ‘Sumo sacerdote’ es la equivalencia española estable y más fiel que una traducción literal como ‘gran sacerdote’.
- source_word: ἐθνάρχῃ
  english_pob_choice: ethnarch
  chosen_spanish: etnarca
  alternatives_spanish:
  - gobernante del pueblo
  - líder nacional
  lexicon: LSJ
  rationale: El término es un título histórico específico. ‘Etnarca’ conserva el cargo sin diluirlo en una descripción genérica y mantiene la transparencia terminológica del POB inglés.
- source_word: ἔθνει Ἰουδαίων
  english_pob_choice: the nation of the Jews
  chosen_spanish: el pueblo de los judíos
  alternatives_spanish:
  - la nación de los judíos
  - el pueblo de Judea
  - la nación de Judea
  lexicon: LSJ
  rationale: ἔθνος puede referirse a un pueblo o nación. ‘Pueblo de los judíos’ reproduce bien la referencia colectiva y evita fijar demasiado la lectura geográfica, aunque la alternativa ‘judeanos’ sigue siendo posible en el fondo de la frase.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - que tengas salud
  lexicon: LSJ
  rationale: En fórmulas epistolares, χαίρειν funciona como saludo convencional. ‘Salud’ es una equivalencia breve, digna y tradicional en español que refleja esa función sin convertirla en un mandato de ‘gozar’ o ‘alegrarse’.
theological_decisions:
- issue: Rango de Ἰουδαίων en una fórmula real
  english_pob_reading: Jews, with a footnote that Judeans is possible
  chosen_spanish_reading: judíos, con nota de que también puede leerse judeanos
  alternative_spanish_readings:
  - judeanos
  - la comunidad judía
  rationale: El contexto habla del colectivo destinatario del documento; ‘judíos’ comunica bien el sentido de pueblo y coincide con la opción principal del POB inglés. Sin embargo, el griego permite una lectura étnico-geográfica (‘judeanos’), por lo que la nota conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Mantenimiento del título histórico ἐθνάρχῃ
  english_pob_reading: ethnarch
  chosen_spanish_reading: etnarca
  alternative_spanish_readings:
  - gobernante del pueblo
  - líder nacional
  rationale: No hay motivo textual para reemplazar un título histórico por una descripción genérica. ‘Etnarca’ preserva la carga política e institucional del término y evita borrar una distinción importante del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió ‘contained’ frente a una forma más literal. En español se ha tomado esa misma decisión de naturalidad controlada con ‘contenía’, manteniendo el formulario epistolar y los títulos históricos sin ampliar el texto más allá de lo evidenciado.
  spanish_consistency_notes:
  - Se mantiene ‘Y’ al inicio para reflejar la coordinación narrativa del griego.
  - Se usa ‘Y’ en vez de ‘Yahvé’ porque este versículo no contiene el nombre divino ni un sustituto directo.
  - ‘Etnarca’ se conserva como título técnico, coherente con la estrategia del POB en el inglés.
  - La fórmula de saludo se vierte como ‘salud’ para conservar el valor epistolar convencional de χαίρειν.
