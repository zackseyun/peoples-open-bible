lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchos de los israelitas
  lexicon: LSJ
  rationale: «Muchos» conserva la brevedad cuantitativa del griego sin añadir un sustantivo que el texto no expresa.
- source_word: ἐκραταιώθησαν
  english_pob_choice: were determined
  chosen_spanish: se afirmaron
  alternatives_spanish:
  - se determinaron
  - fueron fortalecidos
  lexicon: LSJ
  rationale: El verbo expresa ser fortalecidos o hechos firmes en resolución; «se afirmaron» comunica bien la idea de firmeza/resolución en español sin perder la pasiva de resultado.
- source_word: ὠχυρώθησαν
  english_pob_choice: were strengthened
  chosen_spanish: se fortalecieron
  alternatives_spanish:
  - fueron fortificados
  - se hicieron fuertes
  lexicon: LSJ
  rationale: Se mantiene el segundo verbo de refuerzo con un matiz distinto del anterior, conservando la duplicación retórica del griego.
- source_word: ἐν αὐτοῖς
  english_pob_choice: in themselves
  chosen_spanish: en sí mismos
  alternatives_spanish:
  - entre ellos
  - dentro de sí
  lexicon: LSJ
  rationale: La preposición con el pronombre se entiende de forma más directa como interioridad/resolución propia; «en sí mismos» sigue de cerca el valor del audit trail inglés y evita interpretar solidaridad grupal donde el griego es más compacto.
- source_word: τοῦ μὴ φαγεῖν
  english_pob_choice: so as not to eat
  chosen_spanish: para no comer
  alternatives_spanish:
  - a fin de no comer
  - no comer
  lexicon: LSJ
  rationale: El infinitivo articular con μή expresa propósito; «para no comer» lo reproduce de manera natural y fiel.
- source_word: κοινά
  english_pob_choice: defiled food
  chosen_spanish: cosas comunes
  alternatives_spanish:
  - alimentos profanados
  - comida impura
  lexicon: LSJ
  rationale: Se conserva la tensión lexical documentada. «Comunes» refleja el sentido literal de κοινά y deja visible el trasfondo ritual; la nota aclara que en este contexto puede entenderse como comida ritualmente impura o profanada.
theological_decisions:
- issue: Término ritual κοινά en un contexto de ley judía
  english_pob_reading: defiled food
  chosen_spanish_reading: cosas comunes
  alternative_spanish_readings:
  - comida impura
  - alimentos profanados
  rationale: El griego usa un término que literalmente significa «común», pero en este contexto ceremonial alude a alimentos considerados ritualmente contaminados. Traducirlo literalmente preserva la tensión textual y la nota explica el sentido ritual para el lector español.
  doctrine_reference: Consistencia con primacía del original y preservación de matices léxicos en contextos de pureza ritual.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «stood firm»/«among themselves» a «were determined»/«in themselves» para acercarse más al valor léxico directo de los verbos griegos. La redacción española procura reflejar esa doble fuerza verbal sin borrar la ambigüedad ritual de κοινά.
  spanish_consistency_notes:
  - Se usó «cosas comunes» para dejar visible el valor literal de κοινά y no neutralizar la tensión ritual del pasaje.
  - Se evitó «Señor» o terminología eclesiástica tradicional no presente en el texto, porque aquí no aparece el nombre divino ni un título cristológico.
  - La duplicación verbal («se afirmaron» / «se fortalecieron») intenta reproducir dos verbos distintos del griego en vez de fusionarlos en una sola idea.
