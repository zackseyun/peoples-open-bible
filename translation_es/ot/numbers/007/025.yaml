revisions:
- from: Su ofrenda fue un plato de plata[a], de peso de ciento treinta siclos, una palangana de plata[b] de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite para ofrenda vegetal.
  to: Su ofrenda fue un plato de plata[a], que pesaba ciento treinta siclos, un tazón de plata[b] de setenta siclos, según el siclo del santuario[c]; ambos estaban llenos de flor de harina mezclada con aceite para ofrenda vegetal.
  rationale: Se ajustó una construcción poco natural («de peso de ciento treinta siclos») a una forma española más fluida y precisa («que pesaba ciento treinta siclos»). También se reemplazó «palangana», que suena doméstico y desacertado para un contexto ritual, por «tazón», manteniendo la nota con la alternativa «cuenco». No se tocaron las notas ni la parte final del versículo porque ya preservaban adecuadamente el sentido fuente y la decisión cultual sobre מִנְחָה.
  reviewer_model: gpt-5.4
