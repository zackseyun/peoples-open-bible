    reason: lexical_alternative
  - marker: b
    text: O «el Sur»; hebreo «el Neguev», una región meridional de Judá.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «bajo la mano del que cuenta», preservando la imagen de un pastor que cuenta el ganado al pasar.'
    reason: cultural_note
  revision_rationale: Se corrige la desalineación grave entre la nota [a] y su ancla, se ajusta הַשְּׁפֵלָה a un equivalente geográfico más accesible en el texto principal con el topónimo técnico en nota, y se reemplaza «las ovejas» por «los rebaños» para reflejar mejor el valor colectivo de הַצֹּאן. También se conserva la coordinación repetida del hebreo con «y» para mayor fidelidad al ritmo enumerativo.
