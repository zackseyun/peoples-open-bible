translation:
  language: es
  text: Celebrarás la fiesta de las cabañas[a] por siete días, cuando recojas de tu era y de tu lagar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la fiesta de los tabernáculos». El hebreo se refiere literalmente a cabañas o refugios temporales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַג הַסֻּכּוֹת
  english_pob_choice: the Feast of Booths
  chosen_spanish: la fiesta de las cabañas
  alternatives_spanish:
  - la fiesta de los tabernáculos
  - la fiesta de las enramadas
  - la fiesta de las tiendas
  lexicon: HALOT
  rationale: חַג nombra una fiesta solemne o festiva; en español, «fiesta» conserva ese carácter cultual. סֻכּוֹת se refiere literalmente a cabañas, chozas o refugios temporales; «cabañas» es transparente para el lector moderno y evita asociarlo con el tabernáculo del santuario. Se mantiene la imagen concreta del texto hebreo.
- source_word: תַּעֲשֶׂה לְךָ
  english_pob_choice: you shall keep
  chosen_spanish: harás
  alternatives_spanish:
  - celebrarás
  - observarás
  - harás para ti
  lexicon: HALOT
  rationale: Aunque עשה puede significar «hacer», en contexto festivo-legal expresa la observancia de la fiesta. En español, «harás» conserva la fuerza verbal del hebreo sin introducir una paráfrasis más interpretativa como «celebrarás»; el complemento implícito queda claro por el objeto festivo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - siete días
  lexicon: HALOT
  rationale: La expresión hebrea indica duración; «por siete días» es natural en español y mantiene con claridad el alcance temporal.
- source_word: בְּאָסְפְּךָ
  english_pob_choice: when you gather in
  chosen_spanish: cuando recojas
  alternatives_spanish:
  - cuando juntes
  - al recoger
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica tiempo. «Cuando recojas» comunica el momento de la cosecha sin agregar una idea posterior que el hebreo no exige.
- source_word: מִגָּרְנְךָ
  english_pob_choice: from your threshing floor
  chosen_spanish: de tu era
  alternatives_spanish:
  - de tu era de trillar
  - de tu piso de trilla
  lexicon: HALOT
  rationale: גֹּרֶן es la era o lugar de trilla. «Era» es el equivalente más directo y breve en español bíblico; conserva la imagen agrícola concreta que el texto menciona.
- source_word: וּמִיִּקְבֶךָ
  english_pob_choice: and from your winepress
  chosen_spanish: y de tu lagar
  alternatives_spanish:
  - y de tu prensa de vino
  - y de tu lagar de uvas
  lexicon: HALOT
  rationale: יֶקֶב corresponde al lagar o prensa de vino. «Lagar» es el término tradicional y claro en español, y preserva la referencia al fruto de la vendimia.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de Deuteronomio 16:13 y el audit trail inglés: se mantiene la fiesta como observancia cultual, se conserva la imagen concreta de cabañas, era y lagar, y no se suaviza el lenguaje agrícola. No se detectaron revisiones textuales relevantes en el registro inglés; el acuerdo de revisión indica alta concordancia.'
  spanish_consistency_notes:
  - Se prefirió «cabañas» sobre «tabernáculos» para evitar ambigüedad con el santuario y reflejar mejor el valor literal de סֻכּוֹת.
  - «Era» y «lagar» conservan el paralelismo agrícola del verso; no se generalizó a «cosecha» para no perder la concreción semítica.
  - Se usó un imperativo futuro («harás») para corresponder al imperfecto hebreo en una instrucción legal, manteniendo un registro digno y bíblico.
