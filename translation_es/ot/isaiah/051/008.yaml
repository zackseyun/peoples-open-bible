translation:
  language: es
  text: Porque la polilla los comerá como un vestido, y el gusano los comerá como lana; pero mi rectitud[a] será para siempre, y mi salvación de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi justicia». El hebreo puede abarcar tanto la idea de rectitud moral como la de justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o base de lo dicho antes. «Porque» conserva bien la conexión causal en español y suena natural en un registro bíblico moderno.
- source_word: כַבֶּגֶד
  english_pob_choice: like a garment
  chosen_spanish: como a un vestido
  alternatives_spanish:
  - como a una prenda
  - como un vestido
  lexicon: HALOT
  rationale: בֶּגֶד designa una prenda de vestir. «Vestido» comunica la imagen en español sin sonar demasiado técnica; la preposición «a» refleja el valor comparativo idiomático con naturalidad.
- source_word: יֹאכְלֵם
  english_pob_choice: will eat them
  chosen_spanish: los comerá
  alternatives_spanish:
  - los consumirá
  - los devorará
  lexicon: HALOT
  rationale: El verbo אכל significa literalmente «comer». «Comerá» conserva la metáfora vívida y la forma futura contextual.
- source_word: עָשׁ
  english_pob_choice: the moth
  chosen_spanish: la polilla
  alternatives_spanish:
  - el insecto
  - la polilla de la ropa
  lexicon: HALOT
  rationale: El término apunta al insecto que destruye tejidos. «Polilla» es transparente y natural en español, y mantiene la imagen de deterioro de la ropa.
- source_word: וְכַצֶּמֶר
  english_pob_choice: and ... like wool
  chosen_spanish: como a lana
  alternatives_spanish:
  - como lana
  - como a la lana
  lexicon: HALOT
  rationale: צֶמֶר es «lana». «Como a lana» mantiene el paralelismo con la primera comparación y funciona bien en español bíblico sin forzar el ritmo.
- source_word: סָס
  english_pob_choice: the worm
  chosen_spanish: el gusano
  alternatives_spanish:
  - la larva
  - la polilla
  lexicon: HALOT
  rationale: El término hebreo designa un organismo que daña telas; «gusano» mantiene la generalidad y la imagen de destrucción sin sobreespecificar.
- source_word: וְצִדְקָתִי
  english_pob_choice: but my righteousness
  chosen_spanish: pero mi justicia
  alternatives_spanish:
  - y mi justicia
  - pero mi rectitud
  lexicon: HALOT
  rationale: El hebreo צִדְקָה puede abarcar «justicia» y «rectitud/righteousness». En este contexto poético, el contraste con lo perecedero y la nota auditada del inglés justifican mantener «justicia» como alternativa lexical válida en español.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida y permanente. «Para siempre» es la forma más natural y clara en español.
- source_word: תִּהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - permanecerá
  lexicon: HALOT
  rationale: El verbo de ser/existir en futuro se traduce de forma simple y directa. «Será» preserva la concisión del hebreo.
- source_word: וִישׁוּעָתִי
  english_pob_choice: and my salvation
  chosen_spanish: y mi salvación
  alternatives_spanish:
  - y mi liberación
  - y mi rescate
  lexicon: HALOT
  rationale: יְשׁוּעָה en Isaías suele referirse a la acción salvadora de Dios. «Salvación» es la equivalencia teológica y literaria más adecuada.
- source_word: לְדֹר דּוֹרִים
  english_pob_choice: to generation after generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por todas las generaciones
  - de una generación a otra
  lexicon: HALOT
  rationale: El modismo expresa continuidad sucesiva. «De generación en generación» es el equivalente español establecido y fiel al ritmo del hebreo.
theological_decisions:
- issue: Sentido de צִדְקָה en paralelo con וִישׁוּעָה
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia recta
  rationale: Aunque el inglés POB opta por «righteousness» y marca «justice» como alternativa, en español «justicia» conserva mejor la amplitud semántica de צִדְקָה y la fuerza de contraste con la fragilidad humana. «Rectitud» queda como alternativa válida, pero puede sonar menos natural aquí.
  doctrine_reference: 'DOCTRINE.md: contested terms; mantener la amplitud semántica sin borrar la alternativa lexical.'
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones aplicadas y fue verificado con alto grado de acuerdo; esta versión española sigue la misma decisión básica, pero ajusta el léxico al uso natural del español y explicita la amplitud de צִדְקָה.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos imágenes de destrucción textil/animal para conservar la poesía del versículo.
  - Se evitó el calco «gusano» como especificación excesiva; el español «gusano» mantiene la generalidad del hebreo.
  - Se preservó la tensión lexical entre «justicia» y «rectitud» en nota, sin neutralizarla con un término más débil.
  - «Salvación» se mantiene por coherencia con el uso profético de Isaías y con el audit trail inglés.
  - La secuencia final «de generación en generación» sigue el modismo hebreo y su equivalente idiomático español.
