translation:
  language: es
  text: Y cuando sacrifiquen un sacrificio de ofrendas de paz a Yahvé, lo sacrificarán[a] para su aceptación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «para su aceptación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Cuando
  lexicon: HALOT
  rationale: En la sintaxis legal hebrea, כִּי introduce una cláusula de caso con matiz temporal/condicional. «Y cuando» conserva el enlace con lo anterior y suena natural en español, sin convertirlo en una mera hipótesis.
- source_word: תִזְבְּחוּ
  english_pob_choice: you sacrifice
  chosen_spanish: sacrifiquen
  alternatives_spanish:
  - ofrezcan
  - sacrifiquen en holocausto
  lexicon: HALOT
  rationale: El verbo זבח se refiere aquí al acto sacrificial. «Sacrifiquen» mantiene la fuerza cultual y evita suavizarlo con un verbo más general.
- source_word: זֶבַח שְׁלָמִים
  english_pob_choice: a sacrifice of peace offerings
  chosen_spanish: un sacrificio de ofrendas de paz
  alternatives_spanish:
  - una ofrenda de paz
  - un sacrificio de comunión
  lexicon: HALOT
  rationale: La estructura hebrea combina el sustantivo general «sacrificio» con la categoría específica שְׁלָמִים. «Ofrendas de paz» conserva la denominación tradicional transparente en español y mantiene explícita la construcción del original.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino en español según la directriz del proyecto. El preposición ל con verbo sacrificial expresa dedicación/destino; «a Yahvé» es idiomático y fiel.
- source_word: לִֽ/רְצֹנְ/כֶם
  english_pob_choice: for your acceptance
  chosen_spanish: para su aceptación
  alternatives_spanish:
  - para que ustedes sean aceptados
  - según su voluntad
  lexicon: HALOT
  rationale: רָצוֹן en contexto sacrificial apunta a aceptabilidad ante Dios. «Para su aceptación» sigue de cerca el hebreo y conserva la ambigüedad útil entre aceptación de la ofrenda y aceptación de la persona, sin imponer una paráfrasis más interpretativa.
- source_word: תִּזְבָּחֻֽ/הוּ
  english_pob_choice: you shall sacrifice it
  chosen_spanish: lo sacrificarán
  alternatives_spanish:
  - lo ofrecerán
  - lo inmolarán
  lexicon: HALOT
  rationale: La repetición del verbo con sufijo objeto reafirma la instrucción sobre el mismo sacrificio. «Lo sacrificarán» reproduce esa repetición y mantiene el carácter normativo del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente; la política del proyecto pide no ocultarlo tras un título. «Yahvé» es la forma establecida en el español de la POB para preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לִרְצֹנְכֶם en contexto sacrificial
  english_pob_reading: for your acceptance
  chosen_spanish_reading: para su aceptación
  alternative_spanish_readings:
  - para que ustedes sean aceptados
  - para su agrado
  rationale: La frase expresa aceptabilidad cultual delante de Dios. «Para su aceptación» mantiene el vínculo con el original y evita desplazar el sentido hacia preferencia humana o simple agrado personal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés, que volvió más literal לִרְצֹנְכֶם con «for your acceptance» y mantuvo explícito el sustantivo sacrificial en זֶבַח שְׁלָמִים. La versión española refleja esa misma decisión de forma auditable: conserva la estructura nominal («un sacrificio de ofrendas de paz») y traduce el final con una fórmula literal y cultualmente clara («para su aceptación»).'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología del proyecto para יהוה.
  - «Ofrendas de paz» mantiene la categoría sacrificial tradicional sin sustituirla por una paráfrasis interpretativa.
  - La frase «para su aceptación» queda anotada para mostrar la alternativa más literal y la posible ambigüedad entre aceptación de la ofrenda y del oferente.
  - El plural de tratamiento en español («sacrifiquen», «lo sacrificarán») sigue el sujeto plural del hebreo.
