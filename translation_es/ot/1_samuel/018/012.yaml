translation:
  language: es
  text: Saúl tuvo miedo de David[a], porque Yahvé estaba con él y se había apartado de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Saúl temió a David». El hebreo dice literalmente «Saúl tuvo miedo de delante de David», un giro idiomático que presenta a David como el objeto o la causa del temor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  - estuvo atemorizado
  lexicon: HALOT
  rationale: El hebreo expresa temor real. «Tuvo miedo» suena natural en español moderno y conserva la fuerza emocional mejor que «temió», que puede sonar más formal o bíblico.
- source_word: מִלִּפְנֵי
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - ante
  - por causa de
  - desde delante de
  lexicon: HALOT
  rationale: En esta construcción idiomática con ירא y una persona, el sentido es el objeto o causa del temor. «De David» reproduce bien ese valor en español sin forzar la frase.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del temor de Saúl. «Porque» es la equivalencia causal más clara y natural en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: transliteración de יהוה como «Yahvé», preservando el nombre propio y evitando la sustitución por un título.'
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con David
  lexicon: HALOT
  rationale: El pronombre se refiere naturalmente a David por el contexto inmediato. «Con él» conserva la forma pronominal del hebreo y deja clara la referencia por el contexto.
- source_word: וּמֵעִם שָׁאוּל סָר
  english_pob_choice: and had departed from Saul
  chosen_spanish: y se había apartado de Saúl
  alternatives_spanish:
  - y había salido de Saúl
  - y se había retirado de Saúl
  - y había partido de Saúl
  lexicon: HALOT
  rationale: סָר significa apartarse, retirarse, desviarse. «Se había apartado» comunica bien la idea de alejamiento/retirada y mantiene la tensión teológica del texto sin ampliarla ni redefinirla.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La política del proyecto para יְהוָה es usar la transliteración del nombre divino. «Yahvé» es la forma establecida en esta traducción española para preservar el nombre personal de Dios y no reemplazarlo por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La salida de Yahvé de Saúl
  english_pob_reading: the LORD had departed from Saul
  chosen_spanish_reading: se había apartado de Saúl
  alternative_spanish_readings:
  - el Espíritu de Yahvé se había apartado de Saúl
  - Yahvé se había alejado de Saúl
  - se había retirado de Saúl
  rationale: El hebreo de este versículo dice solo que Yahvé estaba con David y se apartó de Saúl; no menciona explícitamente al Espíritu. La traducción conserva esa formulación y su tensión teológica, sin resolverla con una explicación más específica que el texto no da aquí.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'No se observaron revisiones sustanciales en el audit trail: la versión inglesa más reciente permanece sin cambios y los revisores indicaron alto grado de acuerdo. Por eso la propuesta española sigue de cerca el sentido ya estabilizado, con ajuste natural al español y sin añadir contenido interpretativo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma fija para el nombre divino.
  - Se conserva el pronombre en «con él» para respetar la referencia contextual a David.
  - Se evita introducir «Espíritu» en la segunda cláusula, porque el hebreo de este versículo no lo dice explícitamente.
  - La nota al pie recoge la alternativa verbal «temió» sin duplicar el sentido principal del texto.
