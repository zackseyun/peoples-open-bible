  to: 'Se levantaron temprano[a], y cuando estaba despuntando el alba, Samuel llamó a Saúl en la azotea, diciendo: «Levántate, y te enviaré en tu camino[b]». Entonces Saúl se levantó, y los dos, él y Samuel, salieron.'
  rationale: La revisión corrige la nota [b] para que preserve una alternativa genuina conforme al audit trail inglés, mejora la naturalidad del español («azotea», «salieron»), y mantiene la estructura y el sentido del hebreo sin sobreparáfrasis. «Te enviaré en tu camino» reproduce bien el matiz cortés de שׁלח en este contexto, mientras la nota conserva «te despediré / te dejaré partir» como alternativas viables.
