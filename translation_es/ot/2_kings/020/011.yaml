base_translation:
  language: en
  yaml_path: translation/ot/2_kings/020/011.yaml
  text: And Isaiah the prophet cried out to Yahweh[a], and he brought the shadow back the ten steps by which it had gone down on the steps of Ahaz.
  footnotes:
