translation:
  language: es
  text: Tu esposa será como una vid fructífera en los recovecos de tu casa; tus hijos[a] serán como retoños de olivo alrededor de tu mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hijos varones», si se quiere reflejar de manera más estricta el masculino plural hebreo; también puede entenderse representativamente como descendencia en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁתְּךָ
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  lexicon: HALOT
  rationale: El posesivo y el sustantivo designan aquí a la esposa en contexto matrimonial. «Esposa» comunica con naturalidad y precisión el vínculo conyugal, mientras que «mujer» sería posible pero menos específico en español.
- source_word: כְּגֶפֶן
  english_pob_choice: like a vine
  chosen_spanish: como una vid
  alternatives_spanish:
  - como una viña
  lexicon: HALOT
  rationale: La comparación con גפן apunta a la planta de la vid. «Vid» es más exacto que «viña», que puede sugerir el terreno o el conjunto de vides.
- source_word: פֹּרִיָּה
  english_pob_choice: fruitful
  chosen_spanish: fructífera
  alternatives_spanish:
  - fecunda
  - dadora de fruto
  lexicon: HALOT
  rationale: El adjetivo expresa productividad y bendición. «Fructífera» conserva la imagen agrícola sin sonar forzado; «fecunda» es posible, pero en español puede inclinarse más hacia el campo de la fertilidad humana.
- source_word: בְּיַרְכְּתֵי בֵיתֶךָ
  english_pob_choice: in the recesses of your house
  chosen_spanish: en los recovecos de tu casa
  alternatives_spanish:
  - en los rincones de tu casa
  - en las partes más retiradas de tu casa
  lexicon: HALOT
  rationale: יַרְכְּתֵי señala las partes remotas o retiradas. «Recovecos» mantiene la idea espacial de interior apartado y suena más natural que una paráfrasis demasiado pesada.
- source_word: בָּנֶיךָ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y puede leerse como «hijos», el contexto de bendición familiar permite en español la referencia general a los descendientes dentro del hogar. Dado que el POB inglés revisó este punto hacia «children», se conserva la amplitud contextual con «hijos».
- source_word: כִּשְׁתִלֵי זֵיתִים
  english_pob_choice: like olive shoots
  chosen_spanish: como retoños de olivo
  alternatives_spanish:
  - como brotes de olivo
  - como plantones de olivo
  lexicon: HALOT
  rationale: שתילי transmite la idea de brotes/plantones jóvenes. «Retoños de olivo» conserva la imagen de vitalidad nueva y resulta idiomático en español bíblico contemporáneo.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: Adverbio espacial simple; «alrededor de» es claro y natural en español.
- source_word: לְשֻׁלְחָנֶךָ
  english_pob_choice: your table
  chosen_spanish: tu mesa
  alternatives_spanish:
  - tu mesa de comer
  lexicon: HALOT
  rationale: «Mesa» traduce literalmente שֻׁלְחָן y mantiene la escena doméstica y familiar del versículo.
theological_decisions:
- issue: Representación del sustantivo masculino plural בָּנֶיךָ
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tus descendientes
  rationale: El hebreo marca masculino plural. En español, «hijos» puede funcionar de forma genérica para descendencia dentro de una escena familiar, sin forzar una nota de género que el contexto poético no exige de manera excluyente. Así se preserva la amplitud que el POB inglés señaló al revisar su propio texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral), con sensibilidad al uso genérico contextual en poesía
- issue: Imagen doméstica y bendición familiar
  english_pob_reading: wife ... in the recesses of your house; children ... around your table
  chosen_spanish_reading: esposa ... en los recovecos de tu casa; hijos ... alrededor de tu mesa
  alternative_spanish_readings:
  - esposa ... en las partes más retiradas de tu casa; hijos ... en torno a tu mesa
  rationale: 'La versión española mantiene la tensión espacial del poema: la esposa en el ámbito privado e interior del hogar, y los hijos alrededor de la mesa común. Se conserva así la distribución imagética del hebreo sin homogeneizar las dos escenas.'
  doctrine_reference: Poética hebrea de bendición doméstica en Salmos 128:3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió 'sons' a 'children' por contexto; por eso la traducción española usa «hijos» como término naturalmente colectivo en español, sin introducir una nota de alternativa no anclada. También se evitó reproducir la antigua redundancia 'within the inner parts'/'recesses' mediante una solución española más directa.
  spanish_consistency_notes:
  - Se mantiene «vid» para גפן y no «viña», por exactitud léxica.
  - Se evita «SEÑOR»; no aparece el Tetragrámaton ni κύριος en este versículo.
  - No se usan notas al pie porque el texto español no contiene anclajes de variantes y la decisión sobre בָּנֶיךָ se integra en el texto principal.
  - El registro es bíblico contemporáneo, claro y digno, sin calcos innecesarios.
