translation:
  language: es
  text: ¡Mira![a] Se han vuelto como rastrojo; el fuego los consume. No pueden librarse de la mano de la llama. No hay brasa para calentarse, ni fuego delante del cual sentarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí». La partícula hebrea introduce una llamada enfática de atención; «¡Mira!» conserva mejor el tono natural del español contemporáneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce un llamado enfático de atención. «¡Mira!» comunica en español actual la deíctica y la fuerza exhortativa sin caer en un tono arcaico.
- source_word: הָיוּ כְקַשׁ
  english_pob_choice: have become like stubble
  chosen_spanish: Se han vuelto como rastrojo
  alternatives_spanish:
  - han quedado como rastrojo
  - se han vuelto como paja
  lexicon: HALOT
  rationale: 'El perfecto expresa un estado resultante: ahora están reducidos a algo seco y fácilmente consumible. «Rastrojo» conserva la imagen agrícola de algo desechado y combustible.'
- source_word: אֵשׁ שְׂרָפָתַם
  english_pob_choice: fire burns them up
  chosen_spanish: el fuego los consume
  alternatives_spanish:
  - el fuego los quema
  - un fuego los consume
  lexicon: HALOT
  rationale: El verbo שׂרף tiene la idea de quemar/consumir. «Consume» transmite la destrucción total y suena natural en español bíblico contemporáneo.
- source_word: לֹא יַצִּילוּ אֶת נַפְשָׁם
  english_pob_choice: They cannot rescue themselves
  chosen_spanish: No pueden librarse
  alternatives_spanish:
  - No pueden salvarse
  - No pueden rescatarse
  lexicon: HALOT
  rationale: נצל en hifil es rescatar/liberar. En este contexto, «librarse» comunica el fracaso de escapar de la destrucción sin sobrecargar el texto con un matiz soteriológico.
- source_word: מִיַּד לֶהָבָה
  english_pob_choice: from the hand of the flame
  chosen_spanish: de la mano de la llama
  alternatives_spanish:
  - de la mano de la llama ardiente
  - del poder de la llama
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «mano» como poder o alcance, porque el texto enfatiza el dominio de la llama sobre ellos. «Llama» sigue de cerca לֶהָבָה.
- source_word: אֵין גַּחֶלֶת
  english_pob_choice: There is no coal
  chosen_spanish: No hay brasa
  alternatives_spanish:
  - No hay carbón
  - No hay carbón encendido
  lexicon: HALOT
  rationale: גַּחֶלֶת puede referirse a una brasa o carbón encendido. «Brasa» es la opción más natural para el contraste con un fuego útil de hogar.
- source_word: לַחְמָם
  english_pob_choice: to warm oneself
  chosen_spanish: para calentarse
  alternatives_spanish:
  - para calentarse uno
  - para entrar en calor
  lexicon: HALOT
  rationale: 'El POB inglés entiende la cláusula como función doméstica de la brasa: no sirve para calentar. «Para calentarse» preserva la genericidad impersonal y el sentido práctico.'
- source_word: א֖וּר לָשֶׁבֶת נֶגְדּוֹ
  english_pob_choice: no fire to sit before
  chosen_spanish: ni fuego para sentarse frente a él
  alternatives_spanish:
  - ni fuego para sentarse delante de él
  - ni lumbre para sentarse junto a él
  lexicon: HALOT
  rationale: אוּר se toma como fuego, no solo luz. «Frente a él» sigue la idea de sentarse ante el fuego, como en un hogar, y mantiene el paralelismo con la línea anterior.
theological_decisions:
- issue: Alcance de la imagen de juicio
  english_pob_reading: The verse is rendered as temporal, destructive judgment on Babylon's counselors/occult practitioners, without importing later doctrinal notions of final punishment.
  chosen_spanish_reading: La versión presenta un juicio destructivo e ისტორico sobre Babilonia, sin convertir la imagen en una descripción explícita del castigo final.
  alternative_spanish_readings:
  - Una lectura más general de juicio divino
  - Una lectura escatológica explícita
  rationale: El contexto inmediato es una burla profética contra Babilonia. Conviene mantener la fuerza devastadora de la imagen sin resolver su alcance teológico más allá de lo que el pasaje dice.
  doctrine_reference: Preservar la tensión teológica del pasaje sin sobreespecificarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del POB inglés: mantiene «hand of the flame» como «mano de la llama» por precisión léxica; traduce אֵין con «No hay»; y conserva el contraste entre una llama destructiva y una brasa útil para calentarse. También se ha evitado suavizar la metáfora de הִנֵּה y el verbo consumptivo de שׂרף.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino.
  - «Rastrojo» se usa para כַּשׁ siguiendo el valor de residuo seco combustible.
  - «Llama» se conserva para לֶהָבָה y no se sustituye por «fuego» para no perder el matiz léxico entre los dos términos de fuego del verso.
  - La nota al pie queda anclada en la interjección inicial para reflejar la alternativa «He aquí» sin duplicar el contenido del texto principal.
