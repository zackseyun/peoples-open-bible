revisions:
- from: ¿Por qué habrías de ser como un hombre aturdido[a], como un guerrero que no puede salvar? Sin embargo, tú estás en medio de nosotros, Yahvé, y tu nombre es invocado sobre nosotros; no nos abandones.
  to: ¿Por qué habrías de ser como un hombre aturdido, como un guerrero que no puede salvar? Sin embargo, tú estás en medio de nosotros, Yahvé, y tu nombre es llamado sobre nosotros[a]; no nos abandones.
  rationale: Se corrige la fórmula pactal para reflejar el verbo hebreo 'ser llamado' y alinearse con la decisión lexical/theológica del POB, manteniendo en nota la alternativa idiomática natural en español. No se requieren otros cambios.
