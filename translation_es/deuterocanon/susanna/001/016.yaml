  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad idiomática: «después de volver» conserva el participio de ἀνακάμψαντες sin rigidez, «al mismo lugar[a]» mantiene la decisión principal para ἐπὶ τὸ αὐτό con su alternativa en nota, y «acordaron un momento en que» expresa mejor συνετάξαντο καιρόν ὅτε que «concertaron un tiempo cuando». No se añade nota a «deseo» porque la POB inglesa solo conservó esa alternativa en el aparato, no necesariamente como nota obligatoria en el texto español.'
