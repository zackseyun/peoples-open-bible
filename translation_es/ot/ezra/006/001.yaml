    reason: alternative_reading
  - marker: b
    text: Literalmente, «casa de los libros/documentos», es decir, un repositorio oficial de registros.
    reason: lexical_alternative
  - marker: c
    text: «Tesoros» también puede entenderse más ampliamente como bienes valiosos o depósitos guardados en ese complejo de archivos.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «promulgó» por «emitió» para una formulación más natural y ajustada al contexto administrativo, y se restaura en la nota [a] la alternativa de lectura documentada en la auditoría inglesa sobre el verbo plural con posible valor impersonal, manteniendo las demás notas léxicas pertinentes.
