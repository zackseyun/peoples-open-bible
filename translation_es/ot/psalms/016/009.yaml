  glossary_alignment: 'Buena alineación con las pautas del proyecto: no hay términos conflictivos de Yahvé/Mesías aquí; כְּבוֹדִי se conserva como «mi gloria» con alternativas apropiadas; בְּשָׂרִי se traduce «mi carne», en línea con la preferencia por preservar la imaginería literal. No hay desviaciones teológicas indebidas.'
