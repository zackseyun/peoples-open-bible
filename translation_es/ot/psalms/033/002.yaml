translation:
  language: es
  text: Den gracias a Yahvé con la lira[a]; háganle música con un arpa de diez cuerdas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con un nebel de diez cuerdas»; el nombre exacto del instrumento antiguo es incierto y puede verterse también como «arpa», «laúd» o «lira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Confiesen
  lexicon: HALOT
  rationale: El imperativo plural de הודה en este contexto de culto expresa acción de gratitud y alabanza. «Den gracias» conserva el sentido litúrgico sin ampliar innecesariamente a una alabanza más general.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino explícito en español según la norma del proyecto para יהוה. «a Yahvé» refleja el Tetragrámaton sin sustituirlo por un título genérico.
- source_word: בְּכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con la lira
  alternatives_spanish:
  - con el arpa
  - con la cítara
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerda identificado con mayor precisión como «lira». En español, «lira» es más específico que «arpa» y evita mezclarlo con el otro instrumento del verso.
- source_word: בְּנֵבֶל עָשׂוֹר
  english_pob_choice: with a ten-stringed harp
  chosen_spanish: con un arpa de diez cuerdas
  alternatives_spanish:
  - con un salterio de diez cuerdas
  - con un laúd de diez cuerdas
  - con un instrumento de diez cuerdas
  lexicon: HALOT
  rationale: נֵבֶל es otro instrumento de cuerda cuya identificación exacta es discutida; «arpa» es una equivalencia española natural y tradicional, y «de diez cuerdas» preserva la especificación עָשׂוֹר. Se evita una traducción demasiado técnica o incierta que oscurezca el paralelismo poético.
- source_word: זַמְּרוּ לוֹ
  english_pob_choice: make music to him
  chosen_spanish: háganle música
  alternatives_spanish:
  - cántenle alabanzas
  - tañan para él
  lexicon: HALOT
  rationale: זמר en este contexto musical-cultual se refiere a hacer música o cantar alabanzas. «Háganle música» conserva la amplitud del hebreo y encaja con la mención de instrumentos en la línea anterior.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La pauta del proyecto para el Tetragrámaton es usar «Yahvé» en el texto principal. Esto preserva el nombre de pacto revelado en el hebreo y evita el ocultamiento devocional por un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés POB más reciente mantiene una equivalencia óptima y una nota léxica para נֵבֶל עָשׂוֹר; la versión española conserva esa cautela, pero adapta la instrumentación a un español natural y legible, manteniendo la distinción entre la lira y el arpa de diez cuerdas. No se documentan revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como forma principal para יהוה, coherente con la política del proyecto en español.
  - Se distinguió «lira» para כִּנּוֹר y «arpa de diez cuerdas» para נֵבֶל עָשׂוֹר, evitando colapsar ambos instrumentos en un solo término.
  - «Háganle música» mantiene el valor cultual y musical de זמר sin convertirlo en una paráfrasis más libre.
