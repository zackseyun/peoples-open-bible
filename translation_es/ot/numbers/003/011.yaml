translation:
  language: es
  text: Entonces Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y habló Yahvé a Moisés, diciendo». La conjunción inicial también puede traducirse «y».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Entonces» conserva ese flujo sin sonar rígido. «Habló» mantiene con más precisión el valor formal de דבר frente a «dijo», que es posible pero menos específico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La POB en inglés preserva el nombre divino propio y no lo sustituye por un título. En español, «Yahvé» es la forma de transliteración/representación establecida para el Tetragrámaton y mantiene esa decisión auditada.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario del discurso; «a» es el equivalente natural en español para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introduce el discurso siguiente. «Diciendo» conserva la función introductoria y la cercanía al hebreo sin convertirlo en una paráfrasis.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la línea documental de la POB, se preserva el nombre divino en lugar de sustituirlo por un título, manteniendo la referencia al nombre pactal revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el hebreo masorético y con la auditoría inglesa: no hay variantes textuales ni revisiones aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se conserva la fórmula narrativa breve y abierta, adecuada para introducir el discurso que continúa en el versículo siguiente.
  - «Yahvé» se usa de manera consistente para יְהוָה, en consonancia con la política terminológica del proyecto.
  - La coma antes de «diciendo» refleja la función de fórmula introductoria y la puntuación del inglés auditado.
