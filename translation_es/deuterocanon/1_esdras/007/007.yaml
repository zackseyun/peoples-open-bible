translation:
  language: es
  text: Y ofrecieron para la dedicación del templo[a] de Yahvé cien toros, doscientos carneros y cuatrocientos corderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Templo» traduce aquí ἱερόν, que puede designar el templo o el recinto sagrado; el audit trail inglés optó por “temple” por mayor precisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήνεγκαν
  english_pob_choice: they offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - trajeron
  lexicon: BDAG
  rationale: En contexto de sacrificios para una dedicación, «ofrecieron» conserva el valor cultual de presentar ofrendas, más que un simple traslado material.
- source_word: ἐγκαινισμὸν
  english_pob_choice: dedication
  chosen_spanish: dedicación
  alternatives_spanish:
  - consagración
  - inauguración
  lexicon: LSJ
  rationale: El sustantivo señala una ocasión dedicatoria; «dedicación» es natural en español y comunica bien el acto sin sobrecargar el matiz ritual.
- source_word: ἱεροῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: LSJ
  rationale: El griego ἱερόν puede referirse al templo o a su recinto sagrado. Aquí «templo» sigue la revisión del audit trail y suena más preciso en español bíblico contemporáneo.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: Según la política del proyecto, el nombre divino se expresa como «Yahvé» en el texto principal. Aunque el griego usa κύριος, aquí funciona como referencia al nombre divino en el contexto del templo.
- source_word: ταύρους ἑκατόν
  english_pob_choice: one hundred bulls
  chosen_spanish: cien toros
  alternatives_spanish:
  - cien bueyes
  lexicon: LSJ
  rationale: «Toros» reproduce con claridad el animal sacrificial y evita una equivalencia menos precisa como «bueyes».
- source_word: κριοὺς διακοσίους
  english_pob_choice: two hundred rams
  chosen_spanish: doscientos carneros
  alternatives_spanish:
  - doscientos machos de oveja
  lexicon: LSJ
  rationale: «Carneros» es el equivalente natural y preciso en español para κριοί en listas sacrificiales.
- source_word: ἄρνας τετρακοσίας
  english_pob_choice: four hundred lambs
  chosen_spanish: cuatrocientos corderos
  alternatives_spanish:
  - cuatrocientos corderos machos
  lexicon: LSJ
  rationale: «Corderos» es idiomático y fiel; el griego puede implicar animales jóvenes de sacrificio sin necesidad de marcar el sexo en español.
theological_decisions:
- issue: Cómo traducir ἱερόν en la frase «τοῦ ἱεροῦ τοῦ κυρίου»
  english_pob_reading: temple of the Lord
  chosen_spanish_reading: templo de Yahvé
  alternative_spanish_readings:
  - santuario de Yahvé
  - recinto sagrado de Yahvé
  rationale: El audit trail inglés corrigió «house» a «temple» por mayor precisión para ἱερόν. En español, «templo» mantiene esa precisión y evita diluir el referente cultual.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tratamiento de κύριος cuando apunta al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La guía del proyecto pide «Yahvé» para יהוה; aunque el texto griego usa κύριος, aquí el sintagma funciona como referencia al Dios de Israel en contexto del templo. No se usa «SEÑOR» como máscara.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: El contexto inglés pasó de «house of the Lord» a «temple of the Lord» en la revisión más reciente, indicando una preferencia final por la precisión de ἱερόν. La versión española sigue esa decisión y adapta el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el orden numérico y la lista sacrificial del griego.
  - Se evitó «SEÑOR» y se usó «Yahvé» conforme a la terminología del proyecto.
  - «Toros», «carneros» y «corderos» conservan el registro cultual sin arcaísmos innecesarios.
  - La puntuación reproduce la cadencia de una lista de ofrendas en español natural.
