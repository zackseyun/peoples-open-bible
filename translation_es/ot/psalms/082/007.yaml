translation:
  language: es
  text: Sin embargo, morirán como hombres[a], y caerán como uno de los príncipes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como Adán», si la frase se entiende como una alusión al primer hombre y no a la humanidad en general.
    reason: alternative_reading
  - marker: b
    text: O «gobernantes» para «príncipes».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Con todo
  - Ciertamente
  lexicon: HALOT
  rationale: Marca el giro enfático y concesivo desde la afirmación anterior hacia la sentencia de mortalidad. «Sin embargo» transmite bien el contraste en español actual sin sonar rígido.
- source_word: כְאָדָם
  english_pob_choice: like men
  chosen_spanish: como hombres
  alternatives_spanish:
  - como hombre
  - como humanidad
  - como Adán
  lexicon: HALOT
  rationale: La forma hebrea puede leerse de manera representativa o aludiendo a Adán. Aquí el sentido general contrasta su supuesta elevación con la mortalidad humana ordinaria; «como hombres» comunica ese valor genérico con naturalidad en español, manteniendo abierta la alternativa adámica en nota.
- source_word: תְּמוּתוּן
  english_pob_choice: you will die
  chosen_spanish: morirán
  alternatives_spanish:
  - moriréis
  - ustedes morirán
  lexicon: HALOT
  rationale: Verbo qal imperfecto de מות con sentido predictivo/judicial. En español, «morirán» es claro y solemne; el sujeto queda implícito por el contexto de segunda persona plural.
- source_word: וּכְאַחַד
  english_pob_choice: and like one of
  chosen_spanish: y como uno de
  alternatives_spanish:
  - y como uno
  - e incluso como uno de
  lexicon: HALOT
  rationale: La construcción introduce comparación con un miembro individual de un grupo. «Y como uno de» sigue de cerca la sintaxis y suena natural antes del sustantivo plural que sigue.
- source_word: הַשָּׂרִים
  english_pob_choice: the princes
  chosen_spanish: los príncipes
  alternatives_spanish:
  - los gobernantes
  - los oficiales
  - los jefes
  lexicon: HALOT
  rationale: שׂרים puede significar príncipes, gobernantes u কর্মকর্তarios. «Príncipes» preserva el valor léxico tradicional de alto rango y mantiene el paralelismo con la imagen de autoridades juzgadas.
- source_word: תִּפֹּלוּ
  english_pob_choice: fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - serán derribados
  lexicon: HALOT
  rationale: El qal imperfecto de נפל expresa aquí caída bajo juicio, no necesariamente tropiezo literal. «Caerán» conserva la metáfora y es idiomático en español.
theological_decisions:
- issue: 'Sentido de כְאָדָם: lectura genérica versus alusión a Adán'
  english_pob_reading: The English POB keeps the main text as 'like men' and preserves 'like Adam' as a footnoted alternative.
  chosen_spanish_reading: como hombres
  alternative_spanish_readings:
  - como hombre
  - como Adán
  - como humanidad
  rationale: La lectura genérica expresa que los destinatarios, pese a su estatus, compartirán la mortalidad propia de la humanidad. La posible alusión a Adán se conserva en nota para no borrar la tensión interpretativa documentada.
  doctrine_reference: 'DOCTRINE.md: אָדָם default ''man / humankind (context)'' y preservar la tensión teológica cuando la ambigüedad es genuina.'
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde 'like man' a 'like men' para reflejar mejor el valor genérico de כְאָדָם; la versión española adopta ese sentido colectivo con «como hombres», manteniendo la alternativa adámica en nota. También se conserva el contraste enfático de אָכֵן con una expresión española natural.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; en este versículo no aparecen.
  - «Príncipes» se mantiene como opción léxica principal para שׂרים, coherente con el audit trail inglés.
  - La segunda persona plural hebrea queda implícita en español por la conjugación verbal, sin necesidad de pronombre explícito.
