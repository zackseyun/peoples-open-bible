translation:
  language: es
  text: Ahora, sepa el rey que, si esta ciudad es reconstruida y sus muros quedan terminados, no pagarán tributo, impuesto ni peaje, y al final dañará los ingresos de los reyes.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y finalmente causará pérdida a los reyes». La expresión aramea es concisa, y el matiz exacto de la pérdida se infiere del contexto de tributo, impuesto y peaje no pagados.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  lexicon: HALOT
  rationale: Marca de discurso que introduce la advertencia de manera formal. «Ahora» es natural en español y conserva el valor transicional sin añadir causalidad excesiva.
- source_word: יְדִיעַ לֶהֱוֵא
  english_pob_choice: let it be known
  chosen_spanish: sea dado a conocer
  alternatives_spanish:
  - hágase saber
  - sea sabido
  lexicon: HALOT
  rationale: La fórmula aramea es epistolar y oficial. «Sea dado a conocer» preserva el registro formal y el valor pasivo-impersonal del anuncio.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  lexicon: HALOT
  rationale: Dativo de destinatario del mensaje. «Al rey» es la equivalencia idiomática más natural en español.
- source_word: דִּי הֵן
  english_pob_choice: that if
  chosen_spanish: que, si
  alternatives_spanish:
  - que en caso de que
  - que si
  lexicon: HALOT
  rationale: Introduce el contenido del aviso con una condición. La coma mantiene visible la estructura subordinante sin forzar un calco.
- source_word: קִרְיְתָא דָךְ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: HALOT
  rationale: El demostrativo apunta a la ciudad mencionada por los escribientes; en español, «esta» reproduce mejor la deixis del hebreo/arameo y la lectura del contexto.
- source_word: תִּתְבְּנֵא
  english_pob_choice: is rebuilt
  chosen_spanish: es reedificada
  alternatives_spanish:
  - sea reconstruida
  - es reconstruida
  lexicon: HALOT
  rationale: El verbo de edificar/reconstruir se vierte con «reedificada» para mantener el campo semántico de reconstrucción urbana y el registro formal.
- source_word: וְשׁוּרַיָּה
  english_pob_choice: and its walls
  chosen_spanish: y sus muros
  alternatives_spanish:
  - y sus murallas
  - y las murallas
  lexicon: HALOT
  rationale: El plural con sufijo pronominal se refiere a las defensas de la ciudad. «Muros» es fiel y sobrio; «murallas» también sería posible, pero puede sonar más interpretativo según el contexto.
- source_word: יִשְׁתַּכְלְלוּן
  english_pob_choice: are completed
  chosen_spanish: son terminados
  alternatives_spanish:
  - son completados
  - quedan terminados
  lexicon: HALOT
  rationale: El verbo expresa culminación de la obra. «Son terminados» conserva la idea de finalización sin sobretraducir con un matiz excesivamente técnico.
- source_word: מִנְדָּה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - impuesto
  - contribución
  lexicon: HALOT
  rationale: En la tríada fiscal persa, este término denota una carga tributaria. «Tributo» mantiene la distinción tradicional dentro del conjunto fiscal sin perder claridad.
- source_word: בְלוֹ
  english_pob_choice: tax
  chosen_spanish: impuesto
  alternatives_spanish:
  - tributo
  - arbitrio
  lexicon: HALOT
  rationale: Se distingue del primer término de la serie. «Impuesto» es un equivalente claro y general en español moderno.
- source_word: הֲלָךְ
  english_pob_choice: toll
  chosen_spanish: peaje
  alternatives_spanish:
  - derecho de paso
  - arancel
  lexicon: HALOT
  rationale: Probablemente alude a una exacción vinculada con tránsito o paso. «Peaje» comunica bien esa idea en español actual y conserva la tercera pieza de la triada.
- source_word: לָא יִנְתְּנוּן
  english_pob_choice: they will not pay
  chosen_spanish: no darán
  alternatives_spanish:
  - no pagarán
  - no entregarán
  lexicon: HALOT
  rationale: Literalmente, el verbo es «dar», y el español también puede sostener ese valor en el contexto de tributos. Se evita imponer «pagarán» para no perder el sabor administrativo del original.
- source_word: וְאַפְּתֹם
  english_pob_choice: and in the end
  chosen_spanish: y al final
  alternatives_spanish:
  - y finalmente
  - y por último
  lexicon: HALOT
  rationale: Expresa un resultado eventual. «Al final» mantiene la fuerza conclusiva sin precisar más de lo que el arameo garantiza.
- source_word: מַלְכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  lexicon: HALOT
  rationale: Se conserva el plural, como en el arameo y en la POB inglesa. Evita reducirlo a un singular y deja abierta la referencia administrativa/dinástica.
- source_word: תְּהַנְזִק
  english_pob_choice: it will damage the kings' revenue
  chosen_spanish: dañará los ingresos de los reyes
  alternatives_spanish:
  - causará pérdida a los reyes
  - perjudicará la renta de los reyes
  lexicon: HALOT
  rationale: El verbo indica daño o pérdida; en este contexto económico se entiende como pérdida de ingresos. «Ingresos» hace explícito el sentido fiscal inferido por la acumulación de tributos, impuestos y peaje.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «the revenue of the kings» a «the kings' revenue» por naturalidad. En español, se optó por «los ingresos de los reyes», que preserva el mismo sentido económico sin introducir una paráfrasis más amplia que el arameo no exija.
  spanish_consistency_notes:
  - Se mantiene el registro administrativo-formal propio de correspondencia imperial.
  - 'Se conserva la tríada fiscal con distinción léxica clara: tributo, impuesto y peaje.'
  - No se usa «SEÑOR» ni terminología devocional ajena al contexto, porque el versículo es un informe político-administrativo.
  - «Reyes» se mantiene en plural para reflejar el arameo y la decisión inglesa de no singularizar la referencia.
