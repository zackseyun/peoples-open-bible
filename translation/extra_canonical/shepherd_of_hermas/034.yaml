  text: Φοβήθητι, φησί, τὸν Κύριον καὶ φύλασσε τὰς ἐντολὰς αὐτοῦ· φυλάσσων οὖν τὰς ἐντολὰς τοῦ Θεοῦ ἔσῃ δυνατὸς ἐν πάσῃ πράξει, καὶ ἡ πρᾶξίς σου ἀσύγκριτος ἔσται. φοβούμενος γὰρ τὸν Κύριον πάντα καλῶς ἐργάσῃ· οὗτος δέ ἐστιν ὁ φόβος, ὃν δεῖ σε φοβηθῆναι καὶ σωθήσῃ. 2. τὸν δὲ διάβολον μὴ φοβηθῇς· φοβούμενος γὰρ τὸν Κύριον κατακυριεύσεις τοῦ διαβόλου, ὅτι δύναμις ἐν αὐτῷ οὐκ ἔστιν. ἐν ᾧ [δὲ] δύναμις οὐκ ἔστιν, οὐδὲ φόβος· ἐν ᾧ δὲ δύναμις ᾖ ἔνδοξος, καὶ φόβος ἐν αὐτῷ. πᾶς γὰρ ὁ δύναμιν ἔχων φόβον ἔχει· ὁ δὲ μὴ ἔχων δύναμιν ὑπὸ πάντων καταφρονεῖται. 3. φοβήθητι δὲ τὰ ἔργα τοῦ διαβόλου, ὅτι πονηρά ἐστι. φοβούμενος οὖν τὸν Κύριον φοβηθήσῃ τὰ ἔργα τοῦ διαβόλου, καὶ οὐκ ἐργάσῃ αὐτά, ἀλλ᾽ ἀφέξῃ ἀπ᾽ αὐτῶν. 4. δισσοὶ οὖν εἰσὶν οἱ φόβοι· ἐὰν γὰρ θέλῃς τὸ πονηρὸν ἐργάσασθαι, φοβοῦ τὸν Κύριον καὶ οὐκ ἐργάσῃ αὐτό· ἐὰν δὲ θέλῃς πάλιν τὸ ἀγαθὸν ἐργάσασθαι, φοβοῦ τὸν Κύριον καὶ ἐργάσῃ αὐτό. ὥστε ὁ φόβος τοῦ Κυρίου ἰσχυρός ἐστι καὶ μέγας καὶ ἔνδοξος. φοβήθητι οὖν τὸν Κύριον, καὶ ζήσῃ αὐτῷ· καὶ ὅσοι ἂν φοβηθῶσιν αὐτὸν τῶν φυλασσόντων τὰς ἐντολὰς αὐτοῦ, ζήσονται τῷ Θεῷ. 5. Διατί, φημί, κύριε, εἶπας περὶ τῶν τηρούντων τὰς ἐντολὰς αὐτοῦ· Ζήσονται τῷ Θεῷ; Ὅτι, φησί, πᾶσα ἡ κτίσις φοβεῖται τὸν Κύριον, τὰς δὲ ἐντολὰς αὐτοῦ οὐ φυλάσσει. τῶν οὖν φοβουμένων αὐτὸν καὶ φυλασσόντων τὰς ἐντολὰς αὐτοῦ, ἐκείνων ἡ ζωή ἐστι παρὰ τῷ Θεῷ· τῶν δὲ μὴ φυλασσόντων τὰς ἐντολὰς αὐτοῦ οὐδὲ ζωὴ ἐν αὐτῷ.
