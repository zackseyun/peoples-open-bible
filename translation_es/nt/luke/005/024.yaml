  spanish_quality_summary: El español es claro, natural y digno. «Pero para que sepan», «Te digo» y «levántate... y vete a tu casa» leen bien. La principal mejora de legibilidad y precisión es sustituir «camilla» por «estera», que en este contexto evita una imagen médica moderna. También conviene ajustar la nota alternativa del título para que no suene truncada ni poco idiomática.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «el Hijo del Hombre», «autoridad», «perdonar pecados». No hay conflicto con Yahvé/Mesías u otros términos sensibles. La única desalineación relevante es lexical: κλινίδιον no queda idealmente representado por «camilla» dada la razón léxica auditada; «estera» en texto con nota «lecho» preserva mejor el rango semántico.'
  issues:
