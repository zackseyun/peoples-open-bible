revisions:
- from: Palabras de Amós[a], que estuvo entre los pastores de Tecoa, lo que vio acerca de Israel en los días de Uzías, rey de Judá, y en los días de Jeroboam, hijo de Joás, rey de Israel, dos años antes del terremoto.
  to: Palabras de Amós[a], que era de entre los pastores de Tecoa, lo que vio acerca de Israel[b] en los días de Uzías, rey de Judá, y en los días de Jeroboam, hijo de Joás, rey de Israel, dos años antes del terremoto.
  rationale: Se añade la nota omitida para preservar la alternativa semántica de עַל יִשְׂרָאֵל documentada en el POB inglés, y se hace un ajuste leve de naturalidad en 'que era de entre los pastores' sin alterar el sentido ni la estructura formal de la superscripción.
