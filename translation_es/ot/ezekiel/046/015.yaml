translation:
  language: es
  text: Y proveerán el cordero, la ofrenda de grano y el aceite, mañana tras mañana, para un holocausto regular[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un holocausto continuo'. El hebreo enfatiza la regularidad continua de esta ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  english_pob_choice: they shall provide
  chosen_spanish: proveerán
  alternatives_spanish:
  - harán
  - prepararán
  - ofrecerán
  lexicon: HALOT
  rationale: En este contexto cultual, עשה no significa simplemente 'hacer' en abstracto, sino disponer/proveer lo necesario para el sacrificio. 'Proveerán' conserva ese valor de suministro sin sugerir que el cordero sea fabricado. 'Ofrecerán' sería posible, pero desplaza el foco hacia el acto sacrificial completo más que hacia los elementos listados.
- source_word: הַכֶּבֶשׂ
  english_pob_choice: the lamb
  chosen_spanish: el cordero
  alternatives_spanish:
  - el cordero macho
  lexicon: HALOT
  rationale: כֶּבֶשׂ denota un cordero; en español 'cordero' es natural y claro. No se añade 'macho' porque esa precisión no aparece explícitamente en esta forma y no es necesaria para la comprensión.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda
  - la ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en el ámbito sacrificial se refiere a la ofrenda de cereal/grano. 'Ofrenda de cereal' comunica esa especificidad de manera transparente para el lector moderno y evita la ambigüedad de 'ofrenda' sola.
- source_word: הַשֶּׁמֶן
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן significa 'aceite'. Aunque en la práctica sería aceite de oliva, el hebreo no lo explicita; por eso se mantiene el término general sin añadir una precisión no expresada en el texto.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana después de mañana
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva e idiomática, indicando una acción diaria y continua. 'Mañana tras mañana' conserva mejor el ritmo reiterativo que 'cada mañana' y suena natural en español bíblico moderno.
- source_word: עוֹלַת תָּמִיד
  english_pob_choice: for a regular burnt offering
  chosen_spanish: para un holocausto regular
  alternatives_spanish:
  - para un holocausto continuo
  - para el holocausto regular
  - como holocausto regular
  lexicon: HALOT
  rationale: עוֹלָה es el holocausto, y תָּמִיד expresa continuidad/regularidad. 'Holocausto regular' reproduce bien el sentido cultual sin forzar una perífrasis. 'Para' refleja la relación funcional introducida por la revisión inglesa, es decir, los elementos provistos quedan destinados a ese holocausto continuo.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al incorporar la conjunción inicial equivalente a 'And' y al expresar la relación final con 'para' en vez de 'como', de modo que los elementos enumerados queden claramente destinados al holocausto continuo. No se agrega una nota textual porque el hebreo y el audit trail inglés convergen en la idea de regularidad continua, sin variantes críticas relevantes aquí.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la conjunción hebrea וְ.
  - '''Ofrenda de cereal'' se usa de forma consistente para מִנְחָה en contexto sacrificial.'
  - '''Holocausto'' se emplea para עוֹלָה, siguiendo el uso cultual tradicional y claro en español.'
  - '''Regular'' se reserva para תָּמִיד con el sentido de continuidad ritual, no de mera frecuencia ocasional.'
