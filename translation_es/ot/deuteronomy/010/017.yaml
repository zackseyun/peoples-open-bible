revisions:
- from: Porque Yahvé, tu Dios, es Dios de dioses y Señor de señores[a], el Dios grande, poderoso y temible[b], que no hace acepción de personas y no acepta soborno.
  to: Porque Yahvé, tu Dios, es Dios de dioses y Señor de señores, el Dios grande, poderoso y temible[a], que no hace acepción de personas y no acepta soborno.
  rationale: Se corrigen los anclajes de las notas para que la única nota léxica preservada corresponda a נוֹרָא/«temible». Se elimina la nota extra sobre «acepción de personas» porque no forma parte del aparato auditado inglés y no es necesaria para la claridad del texto. El cuerpo del versículo se mantiene sustancialmente igual por ser fiel al hebreo y legible en español.
