translation:
  language: es
  text: 'Entonces Isaac dijo a Jacob[a]: «Acércate, por favor, para que yo te palpe, hijo mío, si de verdad eres mi hijo Esaú o no».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acércate, por favor, y deja que yo te palpe, hijo mío, si de verdad eres mi hijo Esaú o no».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Isaac said
  chosen_spanish: Entonces Isaac dijo
  alternatives_spanish:
  - Y dijo Isaac
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «entonces» da continuidad natural en español sin perder la secuencia.
- source_word: גְּשָׁה נָּא
  english_pob_choice: Please come near
  chosen_spanish: Acércate, por favor
  alternatives_spanish:
  - Ven acá, por favor
  - Acércate, te ruego
  lexicon: HALOT
  rationale: El imperativo pide proximidad física; «acércate» es natural y fiel. «Por favor» refleja la partícula de ruego/politesse נָא.
- source_word: וַאֲמֻשְׁךָ
  english_pob_choice: that I may feel you
  chosen_spanish: para que yo te palpe
  alternatives_spanish:
  - para que yo te toque
  - y te palpe
  lexicon: HALOT
  rationale: מושׁ en este contexto implica palpar/examinar con el tacto. «Palpar» conserva mejor la idea de prueba física que un simple «tocar».
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: La forma vocativa en español suena más natural como «hijo mío» y conserva el tono afectivo de la repetición.
- source_word: הַאַתָּה זֶה
  english_pob_choice: whether you are really
  chosen_spanish: a ver si eres realmente
  alternatives_spanish:
  - si eres de veras
  - si en verdad eres
  lexicon: HALOT
  rationale: La construcción interrogativa se vierte de modo idiomático; «a ver si» transmite el examen dudoso y la búsqueda de verificación.
- source_word: בְּנִי עֵשָׂו
  english_pob_choice: my son Esau
  chosen_spanish: mi hijo Esaú
  alternatives_spanish:
  - Esaú, mi hijo
  lexicon: HALOT
  rationale: Se conserva la relación filial y la identidad específica en una apposición natural en español.
- source_word: אִם לֹא
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - o no lo eres
  lexicon: HALOT
  rationale: La construcción final de la pregunta indirecta se expresa con el equivalente idiomático español «o no».
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefirió una formulación directa con «that I may feel you» en lugar de «so that I may feel you». En español se refleja esa naturalidad con una oración final sencilla («para que yo te palpe») sin añadir explicaciones no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Esaú» como forma estable del nombre propio.
  - Se usa el registro reverente pero moderno, evitando arcaísmos innecesarios.
  - «Palpar» se eligió por su valor semántico de examen táctil, en contraste con un simple contacto casual.
  - La nota al pie preserva una alternativa cercana al expediente inglés sin duplicar el sentido en el cuerpo principal.
