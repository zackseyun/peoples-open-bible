translation:
  language: es
  text: Y si me sobreviene algún mal[a] por medio de él, todo el que oiga se guardará de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si me sobreviene daño por medio de él … todo el que oiga se guardará de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακά
  english_pob_choice: harm
  chosen_spanish: mal
  alternatives_spanish:
  - daño
  - desgracia
  - maldad
  lexicon: BDAG; LXX usage of κακά as adverse outcome
  rationale: En este contexto, el plural neutro se refiere a consecuencias adversas que le ocurren al hablante, no a mal moral cometido por él. «Mal» conserva esa amplitud en español y permite la tensión entre daño y desgracia sin especificar de más.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: BDAG
  rationale: El dativo señala a la persona afectada. En español, con «me sobreviene» la referencia personal queda natural y clara.
- source_word: συμβήσεται
  english_pob_choice: comes
  chosen_spanish: sobreviene
  alternatives_spanish:
  - me sucede
  - me acontece
  - me llega
  lexicon: BDAG
  rationale: El verbo expresa que algo ocurre o acontece. «Sobreviene» preserva el sentido de evento adverso que cae sobre alguien y suena digno en español bíblico contemporáneo.
- source_word: διʼ αὐτόν
  english_pob_choice: through him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a través de él
  - por él
  - debido a él
  lexicon: BDAG
  rationale: La preposición con acusativo puede expresar causa o razón. «Por causa de él» comunica de manera explícita la relación causal que el griego sugiere, sin convertirla en un simple medio físico.
- source_word: πᾶς ὁ ἀκούων
  english_pob_choice: everyone who hears
  chosen_spanish: todo el que lo oiga
  alternatives_spanish:
  - todo el que oye
  - cada uno que lo oye
  - todo oyente
  lexicon: BDAG
  rationale: El participio sustantivado tiene fuerza general. «Todo el que lo oiga» conserva el valor genérico y el objeto implícito del rumor o noticia que se escucha, sin añadir «de ello» como glosa no explicitada.
- source_word: φυλάξεται
  english_pob_choice: will guard himself
  chosen_spanish: se guardará
  alternatives_spanish:
  - se pondrá en guardia
  - se cuidará
  - se apartará
  lexicon: BDAG
  rationale: El futuro medio indica tomar precauciones para uno mismo. «Se guardará» mantiene la reflexividad y funciona de forma natural en español; evita perder el matiz de autoprotección que tiene el griego.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - contra él
  - lejos de él
  lexicon: BDAG
  rationale: La preposición marca separación respecto de una persona considerada peligrosa. «De él» encaja con «se guardará» y mantiene la referencia personal sin añadir una hostilidad más fuerte que la del griego.
theological_decisions:
- issue: Valor genérico de πᾶς ὁ ἀκούων
  english_pob_reading: everyone who hears
  chosen_spanish_reading: todo el que lo oiga
  alternative_spanish_readings:
  - todo oyente
  - cada uno que lo oiga
  - todo hombre que lo oiga
  rationale: El griego usa una construcción masculina singular con valor genérico. «Todo el que lo oiga» conserva ese alcance inclusivo sin restringirlo a varones, conforme a la filosofía de traducción del proyecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tensión lexical entre mal moral y mal como daño
  english_pob_reading: harm
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - daño
  - desgracia
  - males
  rationale: El texto habla de un mal que sobreviene al hablante a causa de otra persona; no es una afirmación sobre la maldad moral del sujeto. «Mal» mantiene abierta la ambigüedad útil del original y permite que el lector perciba tanto daño como desgracia.
  doctrine_reference: BDAG / LXX semantic range of κακά
translation_notes:
  revision_awareness: El inglés auditado pasó de «because of him» a «through him» para acercarse a διʼ αὐτόν y eliminó «of it» por no estar explícito. La versión española evita esa glosa añadida y conserva la relación causal con «por causa de él», manteniendo también la idea de precaución reflexiva en «se guardará».
  spanish_consistency_notes:
  - 'Se siguió el estilo de la POB española: léxico auditable, sin recurso a «SEÑOR» ni a formulaciones eclesiásticas no requeridas por el griego.'
  - Se mantuvo «mal» en vez de una paráfrasis más interpretativa para no borrar la amplitud semántica documentada en el original.
  - «Se guardará» se eligió por su valor reflexivo y su naturalidad en español bíblico contemporáneo.
