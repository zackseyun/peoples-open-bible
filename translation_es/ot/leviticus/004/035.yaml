review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo en la secuencia ritual: quitar toda la grasa, compararla con la grasa del cordero del sacrificio de paz, quemarla en el altar, y luego la expiación y el perdón. Sin embargo, hay un desajuste importante entre el anclaje de la nota y la expresión hebrea עַל אִשֵּׁי יְהוָה: la nota [a] está colocada en ''grasa'', pero la alternativa documentada corresponde a ''ofrendas hechas por fuego a Yahvé'', no a ''grasa''. Además, ''alimentos ofrendados a Yahvé'' comunica la intención del inglés auditado, pero puede sonar algo menos natural y menos técnico que una formulación más clara en español manteniendo la nota alternativa.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero la puntuación y la ubicación de la nota necesitan corrección. 'Los alimentos ofrendados a Yahvé' es comprensible, aunque algo forzado en español bíblico; 'las ofrendas de alimento[a] de Yahvé' o similar suena más natural dentro del registro cultual. 'Hará arder' es aceptable; 'hará expiación por él' también. La frase final es legible, aunque conviene acercarla a la construcción auditada con 'respecto al pecado que cometió' para reflejar mejor עַל.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יְהוָה. La categoría sacrificial está razonablemente preservada con 'ofrendas de paz'. 'Expiación' es aceptable para כפר en este contexto sacerdotal. No hay conflicto mayor con la terminología del proyecto, salvo que la nota léxica debe anclarse a la expresión sacrificial técnica correspondiente, no a 'grasa'.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a 'grasa', pero su contenido explica עַל אִשֵּׁי יְהוָה.
    rationale: Esto induce a error al lector y no preserva el rastro léxico auditado. La alternativa 'ofrendas hechas por fuego a Yahvé' corresponde a la expresión sacrificial técnica, no a חלב.
  - severity: medium
    issue: '''Los alimentos ofrendados a Yahvé'' suena poco idiomático en español bíblico.'
    rationale: Aunque intenta reflejar 'food offerings', en español eclesial resulta más natural 'ofrendas de alimento' o, con nota, una formulación que mantenga el carácter técnico sacrificial.
  - severity: low
    issue: '''Por el pecado que cometió'' podría reflejar mejor el hebreo con ''respecto al pecado que cometió''.'
    rationale: El inglés auditado fue revisado precisamente a 'concerning the sin'; en español 'respecto al' o 'en cuanto al' conserva mejor la relación sin sonar forzado.
  revised_spanish_text: Y quitará toda su grasa, como se quita la grasa del cordero del sacrificio de las ofrendas de paz; y el sacerdote la hará arder sobre el altar, sobre las ofrendas de alimento[a] de Yahvé. Así el sacerdote hará expiación por él respecto al pecado que cometió, y será perdonado.
  revised_footnotes:
