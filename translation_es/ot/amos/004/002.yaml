translation:
  language: es
  text: 'El Señor Yahvé ha jurado por su santidad: «Porque, he aquí, vienen días sobre ustedes en que los levantarán con ganchos[b], y su posteridad[a] con anzuelos de pesca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las últimas de ustedes' o 'su remanente'; el término hebreo puede denotar su fin, su futuro o las que queden.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de 'ganchos' y 'anzuelos de pesca' es difícil; algunos entienden la imagen de manera más general como ser arrastrados con instrumentos agudos usados como aparejos de pesca.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: The Lord GOD
  chosen_spanish: El Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: En español, el título compuesto conserva ambos elementos sin la duplicación artificial 'Señor SEÑOR'. 'Yahvé' representa el nombre divino y 'Señor' traduce אֲדֹנָי con dignidad y naturalidad bíblica.
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - jura
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un juramento solemne con fuerza actual en el discurso profético; 'ha jurado' lo comunica de manera natural en español.
- source_word: בְּקָדְשׁוֹ
  english_pob_choice: by his holiness
  chosen_spanish: por su santidad
  alternatives_spanish:
  - por su santuario
  - por lo santo que es
  lexicon: HALOT
  rationale: Aquí קדשׁ apunta con más probabilidad a la santidad divina como base del juramento, no al lugar santo. 'Santidad' mantiene el valor abstracto y teológico.
- source_word: כִּי הִנֵּה
  english_pob_choice: For behold
  chosen_spanish: Porque, he aquí
  alternatives_spanish:
  - Porque, miren
  - Pues, he aquí
  lexicon: HALOT
  rationale: La combinación causal y enfática se expresa bien con 'Porque, he aquí', que conserva la solemnidad profética y la transición discursiva.
- source_word: יָמִים בָּאִים עֲלֵיכֶם
  english_pob_choice: days are coming upon you
  chosen_spanish: vienen días sobre ustedes
  alternatives_spanish:
  - se acercan días sobre ustedes
  - vienen sobre ustedes días
  lexicon: HALOT
  rationale: '''Vienen días sobre ustedes'' reproduce la fórmula profética con un orden natural en español y conserva la fuerza amenazante de עַל.'
- source_word: וְנִשָּׂא אֶתְכֶם
  english_pob_choice: they will lift you away
  chosen_spanish: los levantarán
  alternatives_spanish:
  - los llevarán
  - los arrebatarán
  lexicon: HALOT
  rationale: El verbo permite la imagen de ser alzados y removidos con violencia. En español, 'levantarán' mantiene esa concreción; el sujeto impersonal queda implícito como en el hebreo.
- source_word: בְּצִנּוֹת
  english_pob_choice: with hooks
  chosen_spanish: con ganchos
  alternatives_spanish:
  - con anzuelos
  - con garfios
  lexicon: HALOT
  rationale: El término es difícil y se entiende de implementos agudos usados para arrastrar. 'Ganchos' es amplio y coherente con la imagen, sin fijar demasiado el objeto.
- source_word: וְאַחֲרִיתְכֶן
  english_pob_choice: your posterity
  chosen_spanish: a su posteridad
  alternatives_spanish:
  - a su remanente
  - a su último resto
  lexicon: HALOT
  rationale: '''אַחֲרִית'' puede denotar ''posteridad'', ''fin'' o ''lo que queda''. Siguiendo la revisión inglesa más reciente, ''posteridad'' conserva la idea de los que vienen después / lo que queda como resto bajo juicio.'
- source_word: בְּסִירוֹת דּוּגָה
  english_pob_choice: with fishhooks
  chosen_spanish: con anzuelos de pesca
  alternatives_spanish:
  - con ganchos de pesca
  - con utensilios de pesca
  lexicon: HALOT
  rationale: La frase es oscura, pero el paralelismo con 'ganchos' y el contexto de captura favorecen un implemento de pesca. 'Anzuelos de pesca' transmite bien la imagen y la dificultad del hebreo.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: The Lord GOD
  chosen_spanish_reading: El Señor Yahvé
  alternative_spanish_readings:
  - El Señor Dios
  - el Señor Yahvé
  rationale: La política española del proyecto pide Yahvé para יהוה. En el título compuesto, 'Señor Yahvé' conserva la distinción entre אֲדֹנָי y el nombre propio divino, sin convertirlo en una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de אַחֲרִיתְכֶן
  english_pob_reading: your posterity
  chosen_spanish_reading: su posteridad
  alternative_spanish_readings:
  - su remanente
  - su final
  rationale: El hebreo puede expresar 'fin', 'lo que queda' o 'posteridad'. La revisión inglesa favoreció 'posterity' para reflejar el después/trasfondo del término bajo el juicio total; en español, 'posteridad' conserva esa amplitud sin imponer una lectura exclusivamente temporal.
  doctrine_reference: HALOT 1/?? (sin numeración inventada); contexto profético de juicio total
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el pasaje pasó de ''look'' a ''behold'' por registro, y de ''remnant'' a ''posterity'' para אַחֲרִיתְכֶן. La versión española adopta un registro solemne con ''he aquí'' y opta por ''posteridad'' en la cola del verso, manteniendo la ambigüedad profética sin forzar ''remanente''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conserva el tono profético solemne con 'he aquí'.
  - 'No se mecaniza desde el inglés: ''por su santidad'' y ''con anzuelos de pesca'' buscan claridad española sin perder la dificultad del hebreo.'
  - El marcador [b] aparece exactamente en el texto principal y la nota correspondiente está anclada correctamente.
