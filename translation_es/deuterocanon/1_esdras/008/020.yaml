translation:
  language: es
  text: Asimismo, hasta cien cors de trigo y cien medidas de vino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - De igual modo
  - También
  lexicon: LSJ
  rationale: La partícula añade otro elemento en la lista de autorizaciones; «Asimismo» conserva el valor aditivo y suena natural en español formal.
- source_word: ἕως
  english_pob_choice: up to
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta un máximo de
  - como mucho
  lexicon: LSJ
  rationale: En este contexto administrativo indica límite máximo, y «hasta» lo expresa de manera clara y fiel.
- source_word: πυροῦ
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: LSJ
  rationale: πυρός designa específicamente trigo; «trigo» preserva esa precisión agrícola.
- source_word: κόρων ἑκατόν
  english_pob_choice: one hundred cors
  chosen_spanish: cien coros
  alternatives_spanish:
  - cien cors
  - cien medidas
  lexicon: LSJ
  rationale: κόρος es una medida antigua de capacidad seca. Se translitera como «coros» para no diluir el valor técnico del término en una medida genérica.
- source_word: οἴνου
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: LSJ
  rationale: Es el equivalente directo y natural de οἶνος en español.
- source_word: μετρητῶν ἑκατόν
  english_pob_choice: one hundred measures
  chosen_spanish: cien medidas
  alternatives_spanish:
  - cien metretas
  - cien medidas de capacidad
  lexicon: LSJ
  rationale: μετρητής significa literalmente una medida. Dado que la revisión inglesa final evitó importar una unidad más específica no explícita en el griego, «medidas» refleja el texto con sobriedad; no se añade «batos» ni otra equivalencia no atestiguada aquí.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete como ancla primaria y toma en cuenta la revisión inglesa más reciente, que corrigió la especificación excesiva de la unidad de vino: μετρητῶν se deja en «medidas» y no se importa una unidad semítica no presente en el griego. Se preserva «coros» para κόρων por tratarse de una medida técnica antigua.'
  spanish_consistency_notes:
  - Se mantiene un estilo administrativo breve y enumerativo, acorde con la oración griega.
  - Se evita la normalización a vocabulario eclesiástico tradicional cuando el pasaje habla de cantidades y unidades de medida.
  - La puntuación sigue el español moderno y conserva la coordinación simple del original.
