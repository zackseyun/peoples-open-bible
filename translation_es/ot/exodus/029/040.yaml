translation:
  language: es
  text: y una décima parte[a] de flor de harina mezclada con un cuarto de un hin de aceite batido[b], y una libación de un cuarto de un hin de vino, para el cordero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «una décima parte de un efa». El hebreo usa «una décima parte» como medida estándar de la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: «Batido» se refiere al aceite obtenido de aceitunas machacadas o batidas; algunas traducciones dicen «prensado».
    reason: lexical_alternative
  - marker: c
    text: O, «para un cordero»; en contexto, probablemente se refiere al primero de los dos corderos diarios mencionados en los versículos circundantes.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עִשָּׂרֹן
  english_pob_choice: a tenth
  chosen_spanish: una décima parte
  alternatives_spanish:
  - un décimo
  - una décima parte de un efa
  lexicon: HALOT
  rationale: En contextos sacrificiales, עִשָּׂרוֹן designa una medida de décima. En español, «una décima parte» conserva con claridad la relación fraccional del hebreo sin añadir una unidad implícita en el texto base; la expansión «de un efa» queda como alternativa interpretativa.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - flor de harina fina
  lexicon: HALOT
  rationale: סֹלֶת es la harina finamente molida apta para ofrendas. «Flor de harina» es el equivalente español tradicional y claro; mantiene el valor técnico sin sonar excesivamente moderno o explicativo.
- source_word: בָּל֨וּל
  english_pob_choice: mixed
  chosen_spanish: mezclada
  alternatives_spanish:
  - mezclado
  - revuela
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina está mezclada con aceite. En español concuerda con «flor de harina» y reproduce la preparación cultual de manera natural.
- source_word: בְּ/שֶׁ֤מֶן
  english_pob_choice: with ... oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - en aceite
  lexicon: HALOT
  rationale: La preposición ב expresa el medio o sustancia de mezcla. «Con aceite» es la forma más directa y fluida en español.
- source_word: כָּתִית
  english_pob_choice: beaten
  chosen_spanish: batido
  alternatives_spanish:
  - prensado
  - machacado
  lexicon: HALOT
  rationale: כָּתִית describe aceite obtenido por machacar o batir aceitunas. «Batido» preserva el rasgo procesual señalado por el hebreo y mantiene el paralelo con la decisión inglesa de no suavizar el término a un simple «aceite».
- source_word: רֶ֣בַע הַ/הִ֔ין
  english_pob_choice: a quarter of a hin
  chosen_spanish: un cuarto de un hin
  alternatives_spanish:
  - un cuarto de hin
  - la cuarta parte de un hin
  lexicon: HALOT
  rationale: Se conserva la unidad antigua y la fracción exacta sin convertirla a medidas modernas. La repetición de «de un hin» sigue de cerca la sintaxis hebrea y permanece inteligible en español.
- source_word: וְ/נֵ֕סֶךְ
  english_pob_choice: and a drink offering
  chosen_spanish: y una libación
  alternatives_spanish:
  - y una ofrenda de libación
  - y una ofrenda derramada
  lexicon: HALOT
  rationale: נֶסֶךְ es el término técnico para la ofrenda derramada de vino. «Libación» es preciso y transparente para el lector bíblico en español; evita sustituir el término cultual por una paráfrasis más amplia.
- source_word: רְבִעִ֥ית הַ/הִ֖ין
  english_pob_choice: a quarter of a hin
  chosen_spanish: un cuarto de un hin
  alternatives_spanish:
  - un cuarto de hin
  - la cuarta parte de un hin
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia que en la primera medida para conservar consistencia terminológica y métrica.
- source_word: יָ֑יִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: יַיִן es el vino común. «Vino» es el equivalente natural y suficiente en español; no hay indicio de que deba especificarse más.
- source_word: לַ/כֶּ֖בֶשׂ הָ/אֶחָֽד
  english_pob_choice: for the one lamb
  chosen_spanish: para el cordero uno
  alternatives_spanish:
  - para un cordero
  - para el primer cordero
  lexicon: HALOT
  rationale: El hebreo conserva la forma definida con numeral. «El cordero uno» refleja esa estructura de cerca, aunque suene marcada en español; se elige para no borrar la posible referencia anafórica al primer cordero mencionado en el contexto.
theological_decisions:
- issue: Identidad de la medida sacrificial עִשָּׂרֹן
  english_pob_reading: a tenth, with a note that this is more explicitly one-tenth of an ephah
  chosen_spanish_reading: una décima parte, con nota de que en contexto equivale a una décima parte de un efa
  alternative_spanish_readings:
  - un décimo
  - una décima parte de un efa
  rationale: La frase hebrea nombra la fracción sin repetir la unidad mayor. En español, la nota preserva la equivalencia cultual sin introducirla en el texto principal, manteniendo la tensión entre literalidad y medida implícita.
  doctrine_reference: Éxodo 29:40; ofrendas diarias en el culto del tabernáculo
- issue: Sentido técnico de כָּתִית
  english_pob_reading: beaten oil
  chosen_spanish_reading: aceite batido
  alternative_spanish_readings:
  - aceite prensado
  - aceite machacado
  rationale: El texto no describe una cualidad espiritual sino un modo concreto de preparación del aceite. «Batido» conserva el carácter técnico y la imaginería de producción, sin perder accesibilidad.
  doctrine_reference: Éxodo 27:20; 29:2, 40; terminología de ofrenda
- issue: Valor contextual de לַכֶּבֶשׂ הָאֶחָד
  english_pob_reading: for the one lamb, likely the first of the two daily lambs mentioned in context
  chosen_spanish_reading: para el cordero uno, entendible como el primero de los dos corderos diarios según el contexto
  alternative_spanish_readings:
  - para un cordero
  - para el primer cordero
  rationale: La referencia inmediata en el pasaje sugiere el primer cordero del holocausto cotidiano. Se conserva la forma hebrea en el texto y se deja la aclaración contextual en la nota para no convertir una inferencia contextual en el enunciado principal.
  doctrine_reference: Éxodo 29:38-42
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la auditoría inglesa muestran alto acuerdo y se mantiene la solución equivalente ya establecida.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, aunque este versículo no lo contiene.
  - Se conserva la unidad antigua «hin» en vez de convertirla a medidas modernas.
  - Se usa «libación» para el término técnico נֶסֶךְ, en continuidad con la terminología cultual estándar.
  - «Flor de harina» refleja el valor sacrificial de סֹלֶת y evita una paráfrasis excesiva.
  - La nota de contexto sobre el cordero preserva la tensión entre la forma hebrea definida y la referencia probable al primer cordero del sacrificio diario.
