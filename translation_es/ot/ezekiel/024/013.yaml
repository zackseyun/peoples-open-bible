review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea principal del POB inglés: impureza/lascivia, purificación no lograda y juicio hasta que la ira divina se complete. Sin embargo, dos decisiones no preservan de la mejor manera el sentido auditado: (1) «no te purificaste» desplaza el foco desde el resultado/pasiva del hebreo y del POB («no fuiste purificada / no quedaste purificada») hacia una acción reflexiva de la ciudad; (2) «haya dado descanso a mi ira» suena poco idiomático en español y comunica peor el sentido documentado de ira plenamente descargada. Además, la nota [b] está anclada en un lugar incorrecto para su contenido actual.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «ya no te purificarás más» resulta algo redundante, y «haya dado descanso a mi ira» suena forzado en español eclesial general. Una redacción más natural y fiel sería «ya no serás purificada más» o «ya no volverás a ser purificada», y «hasta que haya satisfecho mi ira contra ti» o «hasta que haya descargado por completo mi ira contra ti».
  glossary_alignment: 'No hay conflicto con los términos del glosario mayor. «Impureza» y «ira» son aceptables en contexto. «Lascivia» es posible para זִמָּה, aunque algo estrecha; aquí puede mantenerse por su carga sexual en Ezequiel. El principal problema no es terminológico sino sintáctico/idiomático: conviene evitar el reflexivo donde el hebreo y el POB enfatizan el estado resultante de no quedar purificada.'
  issues:
  - severity: medium
    issue: «pero no te purificaste» introduce un matiz reflexivo no ideal
    rationale: וְלֹא טָהַרְתְּ contrasta con la acción previa de Dios y expresa mejor el resultado negativo («no quedaste/fuiste purificada») que una acción reflexiva de Jerusalén.
  - severity: high
    issue: «hasta que haya dado descanso a mi ira contra ti» es poco idiomático y no comunica bien el sentido auditado
    rationale: El audit trail inglés documenta que el modismo significa que la ira llega a reposar porque ya fue plenamente descargada. «Dar descanso a mi ira» suena artificial en español y puede confundir.
  - severity: low
    issue: La nota [b] no corresponde al contenido más útil ni al mejor anclaje
    rationale: La nota inglesa b explica el modismo final de la ira, pero la nota española b comenta «de tu impureza», algo innecesario. Conviene trasladar la nota al final del versículo para aclarar el idiomatismo hebreo.
  revised_spanish_text: En tu impureza hay lascivia[a]. Porque te purifiqué, pero no fuiste purificada de tu impureza; ya no serás purificada más, hasta que haya satisfecho mi ira contra ti[b].
