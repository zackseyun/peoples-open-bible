  glossary_alignment: No hay términos teológicos sensibles en este verso. Las decisiones léxicas principales concuerdan con el expediente inglés. La revisión propuesta solo afina la naturalidad poética del español y la fuerza visual de תְּהוֹם לְשֵׂיבָה.
