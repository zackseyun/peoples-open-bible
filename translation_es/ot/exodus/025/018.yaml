translation:
  language: es
  text: Y harás dos querubines de oro; de obra martillada los harás[a], en los dos extremos del propiciatorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la cubierta de expiación». El término hebreo se refiere a la cubierta del arca y, en este contexto cultual, se traduce tradicionalmente «propiciatorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Y debes hacer
  lexicon: HALOT
  rationale: En español, la orden instruccional suena natural con futuro exhortativo. Conservar el enlace inicial «Y» refleja la secuencia del mandato hebreo sin volverlo más pesado de lo necesario.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Número cardinal directo y sin tensión interpretativa.
- source_word: כְּרֻבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  lexicon: HALOT
  rationale: En español bíblico, «querubines» comunica el referente específico mejor que una transliteración más técnica. No se usa «querubes» ni una forma coloquial que desviaría el sentido.
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - de oro
  lexicon: HALOT
  rationale: La construcción material en español se expresa naturalmente con «de oro». No se añade «puro» porque el hebreo no lo explicita aquí.
- source_word: מִקְשָׁה
  english_pob_choice: of hammered work
  chosen_spanish: de obra martillada
  alternatives_spanish:
  - de trabajo martillado
  - martillada
  lexicon: HALOT
  rationale: La idea es manufactura por martilleo o batido del metal. «Obra martillada» conserva el sentido técnico sin imponer la implicación interpretativa de «de una sola pieza» como si fuera el valor principal del término.
- source_word: תַּעֲשֶׂה אֹתָם
  english_pob_choice: you shall make them
  chosen_spanish: los harás
  alternatives_spanish:
  - los harás tú
  - los harás a ellos
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo en español con una segunda forma del mandato. El pronombre enclítico «los» mantiene la referencia explícita a los querubines.
- source_word: מִשְּׁנֵי קְצֹוֹת
  english_pob_choice: at the two ends of
  chosen_spanish: en los dos extremos de
  alternatives_spanish:
  - a los dos extremos de
  - en ambos extremos de
  lexicon: HALOT
  rationale: «En los dos extremos de» es el equivalente espacial más natural en español para esta instrucción de ubicación.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la cubierta
  lexicon: HALOT
  rationale: Se adopta «propiciatorio» como término cultual tradicional en español para el objeto del arca, equivalente funcional de «mercy seat». Se evita sustituirlo por una paráfrasis amplia que borre su identidad ritual. El término también permite mantener la tensión entre cobertura material y función sacrificial sin resolverla de manera excesiva.
theological_decisions:
- issue: Rendering of הַכַּפֹּרֶת in cultic context
  english_pob_reading: the mercy seat
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta de expiación
  - la cubierta
  rationale: El objeto no es una cubierta cualquiera, sino la pieza sagrada del arca vinculada al rito de expiación y a la presencia divina. «Propiciatorio» conserva esa identidad cultual en español con un registro bíblico reconocible, mientras que una glosa más transparente queda como alternativa léxica.
  doctrine_reference: Éxodo 25:17-22; Levítico 16; Romanos 3:25 (solo como trasfondo conceptual, no como dependencia textual directa)
translation_notes:
  revision_awareness: El audit trail inglés mantiene «mercy seat» con nota alternativa «atonement cover». En español se eligió «propiciatorio» por su equivalencia cultual establecida y por su capacidad de preservar la tensión terminológica sin caer en una paráfrasis explicativa excesiva. No hubo revisiones aplicadas en el pass más reciente, y el acuerdo con la revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y claro, evitando formas arcaizantes innecesarias.
  - «Querubines» conserva el término técnico sin coloquializarlo.
  - «Propiciatorio» se usa de forma consistente para הַכַּפֹּרֶת en contexto tabernacular, con nota alternativa transparente.
  - Se preserva la estructura imperativa/instruccional del hebreo con futuro exhortativo español.
