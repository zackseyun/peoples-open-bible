- from: Saúl consultó a Yahvé[a], pero Yahvé no le respondió[b], ni por sueños ni por el Urim ni por los profetas.
  to: Saúl consultó a Yahvé, pero Yahvé no le respondió ni por sueños[a] ni por el Urim[b] ni por los profetas.
