translation:
  language: es
  text: 'Y le habló a él: «Así dice Yahvé: Porque has enviado mensajeros para consultar a Baal-zebub,[b] dios de Ecrón, ¿acaso no hay Dios en Israel para consultar su palabra?[a] Por tanto, no bajarás del lecho al que subiste,[c] porque ciertamente morirás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «consultar su palabra», probablemente con el sentido de buscar de él un mensaje divino u oráculo.'
    reason: lexical_alternative
  - marker: b
    text: El nombre aparece en el texto hebreo como Baal-zebub; una tradición posterior presenta la forma relacionada Baal-zebul.
    reason: alternative_reading
  - marker: c
    text: 'O: «del lecho al que subiste allí»; el hebreo conserva el adverbio «allí» dentro de la cláusula relativa.'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלָיו
  english_pob_choice: And he spoke to him
  chosen_spanish: Y le habló
  alternatives_spanish:
  - Y le dijo
  lexicon: HALOT
  rationale: דבר en este contexto introduce una declaración profética solemne; «habló» conserva el verbo de hablar y permite distinguirlo de la fórmula oracular siguiente «Así dice». El pronombre clítico «le» mantiene el destinatario directo del mensaje.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa naturalmente en español con «Así dice». YHWH se rinde según el estándar del proyecto como «Yahvé», preservando el nombre divino en vez de enmascararlo.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: La combinación introduce la base causal del juicio. «Porque» es claro, formal y fiel sin añadir matiz que el hebreo no exige.
- source_word: שָׁלַחְתָּ מַלְאָכִים
  english_pob_choice: you sent messengers
  chosen_spanish: has enviado mensajeros
  alternatives_spanish:
  - enviaste mensajeros
  - has mandado mensajeros
  lexicon: HALOT
  rationale: 'El perfecto hebreo se refleja mejor con pretérito perfecto compuesto en esta sentencia profética: «has enviado». מַלְאָכִים aquí son mensajeros humanos, por eso se traduce «mensajeros» y no «ángeles».'
- source_word: לִדְרֹשׁ בְּבַעַל זְבוּב
  english_pob_choice: to inquire of Baal-zebub
  chosen_spanish: para consultar a Baal-zebub
  alternatives_spanish:
  - para inquirir de Baal-zebub
  - para buscar respuesta de Baal-zebub
  lexicon: HALOT
  rationale: דרש en este contexto es pedir orientación oracular o consultar a una deidad; «consultar» comunica esa fuerza en un español natural. Se conserva la forma MT «Baal-zebub» como lectura principal.
- source_word: אֱלֹהֵי עֶקְרוֹן
  english_pob_choice: the god of Ekron
  chosen_spanish: dios de Ecrón
  alternatives_spanish:
  - el dios de Ecrón
  - la deidad de Ecrón
  lexicon: HALOT
  rationale: La cadena constructa identifica a Baal-zebub como la deidad asociada a Ecrón. «Dios» aquí va en minúscula porque se trata de una deidad pagana; el nombre propio de la ciudad se adapta a la forma castellana usual «Ecrón».
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  english_pob_choice: is it because there is no God in Israel
  chosen_spanish: ¿acaso no hay Dios en Israel
  alternatives_spanish:
  - ¿es porque no hay Dios en Israel
  - ¿acaso es que no hay Dios en Israel
  lexicon: HALOT
  rationale: La pregunta retórica expresa reproche por buscar fuera de Israel. Se mantiene «Dios» en singular para reflejar al Dios de Israel, aunque el hebreo use אֱלֹהִים.
- source_word: לִדְרֹשׁ בִּדְבָרוֹ
  english_pob_choice: to inquire of his word
  chosen_spanish: para consultar su palabra
  alternatives_spanish:
  - para consultar su mensaje
  - para inquirir de su palabra
  lexicon: HALOT
  rationale: 'Se preserva la referencia explícita a דָבָר con sufijo: no solo se busca a Dios, sino su «palabra». «Consultar su palabra» conserva la literalidad y su sentido de respuesta oracular, evitando omitir el sustantivo.'
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca la consecuencia judicial de la acción del rey. «Por tanto» mantiene el tono formal y profético.
- source_word: הַמִּטָּה אֲשֶׁר עָלִיתָ שָּׁם
  english_pob_choice: the bed to which you have gone up
  chosen_spanish: la cama a la que subiste allí
  alternatives_spanish:
  - la cama a la que has subido
  - el lecho al que subiste allí
  lexicon: HALOT
  rationale: מִטָּה se rinde como «cama»; «lecho» sería posible pero más literario. Se conserva el movimiento ascendente de עלה con «subiste», y se incluye «allí» para reflejar el adverbio hebreo שָּׁם, aun si suena algo redundante en español.
- source_word: לֹא תֵרֵד מִמֶּנָּה
  english_pob_choice: you shall not come down from it
  chosen_spanish: no bajarás de
  alternatives_spanish:
  - no descenderás de
  - no te bajarás de
  lexicon: HALOT
  rationale: 'ירד se expresa con el verbo común «bajar»; así se conserva el contraste ascenso/descenso del texto. La referencia pronominal se entiende por el sustantivo previo: «de la cama».'
- source_word: כִּי מוֹת תָּמוּת
  english_pob_choice: for you shall surely die
  chosen_spanish: porque ciertamente morirás
  alternatives_spanish:
  - pues morirás sin falta
  - porque de cierto morirás
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la certeza. «Ciertamente morirás» reproduce esa fuerza sin sonar arcaico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo el estándar del proyecto, se mantiene el nombre divino como «Yahvé» en español para preservar la transparencia textual y la continuidad con el testimonio del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Consulta a una deidad pagana y la frase «su palabra»
  english_pob_reading: to inquire of his word
  chosen_spanish_reading: consultar su palabra
  alternative_spanish_readings:
  - consultar su mensaje
  - consultar su respuesta
  rationale: 'La frase hebrea incluye explícitamente דָבָר con sufijo, indicando más que una simple consulta genérica: se busca una respuesta u oráculo. «Su palabra» conserva esa tensión entre literalidad y sentido oracular, sin borrar el término.'
  doctrine_reference: Lexical-theological note on לִדְרֹשׁ בִּדְבָרוֹ
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente del inglés que ajustó el perfecto («has enviado») y la clausula final («the bed to which you have gone up»). En español se reflejó el perfecto con «has enviado» y se mantuvo el movimiento ascendente/descendente con «subiste» / «bajarás», conservando además el adverbio resumptivo «allí» como parte de la tensión literal del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «Baal-zebub» como lectura principal y se anota la variante tradicional relacionada en nota.
  - Se distingue «Dios» para el Dios de Israel y «dios» para la deidad pagana de Ecrón.
  - Se traduce דרש en contexto oracular como «consultar», pero se conserva «su palabra» para no borrar דָבָר.
  - Se mantiene el paralelismo ascenso/descenso con «subiste» / «bajarás» para reflejar עלה / ירד.
