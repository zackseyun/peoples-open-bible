    text: Or, more literally, 'according to the law of Moses'; in context the sense is that giving her to another man would violate that law and make Raguel liable to death.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'because it is fitting for you to receive the inheritance than every man,' an idiomatic way of saying that you have the prior claim over any other man.
    reason: lexical_alternative
