translation:
  language: es
  text: ¡Bendito eres, que me has dado sabiduría; y a ti te doy gracias[a], Soberano de los padres!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ti te confieso» / «a ti te reconozco». El griego ὁμολογῶ puede expresar confesión o reconocimiento; aquí se traduce «te doy gracias» por el tono de alabanza y agradecimiento del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: ¡Bendito
  alternatives_spanish:
  - Alabado
  - Bendecido
  lexicon: BDAG
  rationale: En una alabanza dirigida a Dios, 'bendito' reproduce de modo natural la fórmula doxológica sin perder el tono de invocación.
- source_word: εἶ
  english_pob_choice: are
  chosen_spanish: eres
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: La cópula explícita debe mantenerse en español para conservar la forma directa de la bendición.
- source_word: ἔδωκάς μοι σοφίαν
  english_pob_choice: have given me wisdom
  chosen_spanish: me has dado sabiduría
  alternatives_spanish:
  - me diste sabiduría
  lexicon: BDAG
  rationale: El perfecto español ('has dado') comunica una acción ya cumplida con vigencia presente, igual que el inglés auditado y el contexto de oración de gratitud.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  lexicon: BDAG
  rationale: '''Sabiduría'' es la equivalencia directa y más natural para σοφία; ''entendimiento'' sería más interpretativo.'
- source_word: σοὶ ὁμολογῶ
  english_pob_choice: to you I give thanks
  chosen_spanish: a ti te doy gracias[a]
  alternatives_spanish:
  - a ti te confieso
  - a ti te reconozco
  - te alabo
  lexicon: BDAG
  rationale: En este contexto de bendición, ὁμολογῶ expresa un reconocimiento/devoción hacia Dios; 'te doy gracias' comunica esa fuerza doxológica sin sugerir confesión de culpa.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: δέσποτα denota autoridad absoluta y pertenencia. 'Dueño' preserva mejor esa fuerza de dominio que 'Señor', evitando confundirlo con κύριος; 'Soberano' es más interpretativo.
- source_word: τῶν πατέρων
  english_pob_choice: of the fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de nuestros padres
  - de los antepasados
  lexicon: BDAG
  rationale: El griego no incluye un posesivo explícito; 'de los padres' sigue de cerca la forma fuente. En español, 'padres' es una fórmula bíblica tradicional y transparente.
theological_decisions:
- issue: Título divino δέσποτα y distinción frente a κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: 'Se conserva la distinción léxica del griego: δέσποτα no se nivela con el habitual ''Señor''. ''Dueño'' comunica posesión, autoridad y dependencia, en línea con la fuerza de absolute authority señalada en el audit trail.'
  doctrine_reference: 'DOCTRINE.md: contested terms and documented exception principle'
- issue: Sentido devocional de ὁμολογῶ
  english_pob_reading: I give thanks
  chosen_spanish_reading: te doy gracias
  alternative_spanish_readings:
  - te confieso
  - te reconozco
  - te alabo
  rationale: En una oración de bendición tras recibir sabiduría, la lectura agradecida evita que el verbo suene como confesión de pecado. El español mantiene el valor de reconocimiento adorante.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern Spanish'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal donde corresponde a la alternativa de ὁμολογῶ.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para σοφία y no se sustituyó por 'entendimiento'.
  - Se evitó 'Señor' para δέσποτα a fin de conservar la distinción léxica del texto griego.
  - Se usó un estilo bíblico claro y actual, sin calco mecánico del inglés.
