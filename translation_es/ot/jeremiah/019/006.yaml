translation:
  language: es
  text: Por tanto, he aquí, vienen días, declara Yahvé, cuando a este lugar ya no se llamará Topet[a] o el Valle de Ben-hinom[b], sino el Valle de la Matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Topet: también se escribe ''Topheth'' en inglés.'
    reason: lexical_alternative
  - marker: b
    text: Ben-hinom es el nombre de lugar hebreo tradicionalmente vertido como 'hijo de Hinom'; el uso judío y cristiano posterior asocia este valle con 'Gehena', pero ese término posterior no se usa aquí.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa la conclusión inferencial del oráculo previo de manera natural y sobria en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mirad
  alternatives_spanish:
  - he aquí
  - mirad bien
  lexicon: HALOT
  rationale: Mantiene el valor enfático y deíctico de la fórmula profética sin recurrir a un giro demasiado arcaico o mecánico.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están por venir días
  lexicon: HALOT
  rationale: Conserva el idiomatismo profético en español; 'vienen días' es breve y fiel al anuncio de futuro inminente.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el nombre divino y reproduce la fórmula profética con tono formal.
- source_word: וְלֹא יִקָּרֵא
  english_pob_choice: will no longer be called
  chosen_spanish: ya no se le llamará más
  alternatives_spanish:
  - no volverá a ser llamado
  - ya no se llamará
  lexicon: HALOT
  rationale: El pasivo impersonal del hebreo se expresa con naturalidad en español mediante 'se le llamará', preservando la idea de cambio de designación.
- source_word: לַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - a este lugar este
  lexicon: HALOT
  rationale: Traducción directa y idiomática del referente local específico bajo juicio.
- source_word: הַתֹּפֶת
  english_pob_choice: Topheth
  chosen_spanish: Topet
  alternatives_spanish:
  - Topet
  - Tophet
  lexicon: HALOT
  rationale: Translitera el topónimo con una forma española transparente; se conserva la variante inglesa/documental en la nota para el nombre propio.
- source_word: גֵיא בֶן הִנֹּם
  english_pob_choice: the Valley of Ben-hinnom
  chosen_spanish: el Valle de Ben-hinom
  alternatives_spanish:
  - el Valle del hijo de Hinom
  - el Valle de Gehenna
  lexicon: HALOT
  rationale: Se preserva el valor topónimo y la estructura nominal hebrea, evitando importar el término posterior 'Gehenna' que no aparece aquí.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - excepto que
  lexicon: HALOT
  rationale: En la estructura de sustitución nominal del hebreo, 'sino' comunica mejor el contraste con la denominación anterior.
- source_word: גֵּיא הַהֲרֵגָה
  english_pob_choice: the Valley of Slaughter
  chosen_spanish: el Valle de la Matanza
  alternatives_spanish:
  - el Valle de la Degollina
  - el Valle de la Muerte
  lexicon: HALOT
  rationale: '''Matanza'' transmite bien el sentido de destrucción violenta de הֲרֵגָה en un registro claro y solemne para español.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto prescribe 'Yahvé' como forma principal en español para el Tetragrama, preservando el nombre pactal sin enmascararlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de alternancia toponímica ('Topheth' / 'Valley of Ben-hinnom')
  english_pob_reading: Topheth or the Valley of Ben-hinnom
  chosen_spanish_reading: Topet ni el Valle de Ben-hinom
  alternative_spanish_readings:
  - Topet o el Valle de Ben-hinom
  - Topet y el Valle de Ben-hinom
  rationale: El hebreo presenta dos denominaciones previas del mismo lugar; 'ni' con negación refleja la cesación conjunta de ambos nombres, siguiendo la revisión auditada que corrigió 'and' por 'or'.
  doctrine_reference: Jeremías 19:6 lexical audit trail
translation_notes:
  revision_awareness: La revisión auditada cambió 'look' por 'behold' y 'and' por 'or' para reflejar mejor el contraste entre los nombres del lugar. Esta versión española adopta una solución equivalente con 'mirad' y la estructura negativa 'ya no se le llamará más ... ni ... sino ...', manteniendo el valor profético y la alternancia nominal sin sobreexplicar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Topet'' conserva la transliteración breve y la nota registra la variante inglesa ''Tophet''.'
  - '''Valle de Ben-hinom'' preserva el nombre propio sin introducir ''Gehenna'', que no está en el versículo.'
  - '''Matanza'' reproduce el campo semántico de הֲרֵגָה con tono grave y comprensible para lectores de español.'
