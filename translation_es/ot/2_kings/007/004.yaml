translation:
  language: es
  text: 'Si decimos: «Entremos en la ciudad», el hambre está en la ciudad, y moriremos allí. Y si nos quedamos aquí, moriremos. Así que ahora, vamos, entreguémonos[a] al campamento de Aram[b]. Si nos dejan vivir, viviremos; y si nos dan muerte, moriremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caigamos en el campamento de Aram». El hebreo idiomático נפל אל puede expresar la idea de pasarse a otra fuerza o rendirse a ella.
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre hebreo que a menudo se traduce «Siria» o «los arameos».
    reason: cultural_note
lexical_decisions:
- source_word: אִם אָמַרְנוּ / נָב֨וֹא
  english_pob_choice: If we say, ‘Let us enter’
  chosen_spanish: 'Si decimos: «Entremos»'
  alternatives_spanish:
  - 'Si dijéramos: «Entremos»'
  - 'Si pensamos: «Entremos»'
  lexicon: HALOT
  rationale: La construcción condicional introductoria con ‘אם’ y el verbo en primera persona plural funciona como habla propuesta; en español natural, «Si decimos» conserva el arranque condicional y «Entremos» expresa el valor exhortativo/cohortativo de נבוא.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - el pueblo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo común «ciudad», que preserva el texto hebreo sin especificar más de lo que dice el original.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - la escasez
  lexicon: HALOT
  rationale: En el contexto de sitio militar, רעב describe la condición de hambre extrema que asola la ciudad. «El hambre» suena natural en español y conserva la fuerza de crisis alimentaria; «hambruna» sería posible, pero aquí el hebreo usa un sustantivo más directo.
- source_word: וָמַתְנוּ / וָמָתְנוּ
  english_pob_choice: we will die
  chosen_spanish: moriremos
  alternatives_spanish:
  - vamos a morir
  - moriremos allí
  lexicon: HALOT
  rationale: El hebreo expresa el resultado esperado en la cadena condicional. «Moriremos» es breve, solemne y fiel; el adverbio «allí» se mantiene solo donde el hebreo lo explicita con שָׁם.
- source_word: יָשַׁבְנוּ פֹה
  english_pob_choice: we sit here
  chosen_spanish: nos quedamos aquí
  alternatives_spanish:
  - nos sentamos aquí
  - permanecemos aquí
  lexicon: HALOT
  rationale: Aunque ישב puede ser literalmente «sentarse», en este contexto deliberativo la idea es permanecer/seguir en un lugar. «Nos quedamos aquí» comunica el sentido sin forzar el español con una imagen menos natural.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: La expresión marca consecuencia e impulso hacia la acción. «Así que ahora» refleja bien el valor inferencial del hebreo.
- source_word: לְכוּ
  english_pob_choice: come
  chosen_spanish: vamos
  alternatives_spanish:
  - venid
  - vamos, pues
  lexicon: HALOT
  rationale: El mandato plural exhortativo en español suele sonar más natural como «vamos» cuando el hablante se incluye entre los destinatarios y sigue la invitación a la acción.
- source_word: וְנִפְּלָה אֶל
  english_pob_choice: let us fall into
  chosen_spanish: lancémonos al
  alternatives_spanish:
  - arrojémonos al
  - caigamos en
  lexicon: HALOT
  rationale: נפל אל en este contexto militar puede implicar rendirse o pasarse al otro bando. «Lancémonos al» conserva la imagen de movimiento abrupto hacia el campamento, sin borrar la tensión de la posible rendición; en una nota se preserva la alternativa más explícita.
- source_word: מַחֲנֵה אֲרָם
  english_pob_choice: the camp of Aram
  chosen_spanish: el campamento de Aram
  alternatives_spanish:
  - el campamento arameo
  - el campamento de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» por la política terminológica del proyecto. «Campamento» suena más militar y concreto que «campamento» como simple albergue; corresponde al escenario de sitio.
- source_word: יְחַיֻּנוּ
  english_pob_choice: they let us live
  chosen_spanish: nos dejan vivir
  alternatives_spanish:
  - nos perdonan la vida
  - nos mantienen con vida
  lexicon: HALOT
  rationale: El verbo causativo expresa permitir/hacer vivir. «Nos dejan vivir» es cercano, directo y mantiene la simetría con «viviremos».
- source_word: נִחְיֶה
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - seguiremos vivos
  - viviremos de veras
  lexicon: HALOT
  rationale: Se traduce con el futuro simple para conservar la estructura condicional apretada del hebreo.
- source_word: יְמִיתֻנוּ
  english_pob_choice: they put us to death
  chosen_spanish: nos dan muerte
  alternatives_spanish:
  - nos matan
  - nos ejecutan
  lexicon: HALOT
  rationale: El causativo de מות pide una expresión que conserve la idea de hacer morir. «Nos dan muerte» es sobrio, literario y mantiene el tono del pasaje.
theological_decisions:
- issue: Sentido de נפל אל en contexto militar
  english_pob_reading: ‘let us fall into the camp of Aram’ with a note that it can mean surrendering or yielding
  chosen_spanish_reading: «lancémonos al campamento de Aram» con nota que admite «rendirnos al campamento de Aram»
  alternative_spanish_readings:
  - «rindámonos al campamento de Aram»
  - «caigamos en el campamento de Aram»
  rationale: No se borra la metáfora hebrea de movimiento brusco, pero tampoco se oculta la posibilidad semántica de rendición. La nota preserva la tensión léxica documentada por el audit trail.
  doctrine_reference: Lexical semantics; no doctrinal issue
- issue: Tratamiento de אֲרָם como nombre propio
  english_pob_reading: ‘Aram’ is the Hebrew name often rendered ‘Syria’ or ‘the Arameans.’
  chosen_spanish_reading: Se conserva «Aram» en el texto principal.
  alternative_spanish_readings:
  - Siria
  - los arameos
  rationale: La política del proyecto privilegia la forma hebrea cuando el texto nombra a Aram. Las alternativas se reservan para nota o contextos explicativos, evitando sustituir el nombre por una equivalencia tradicional no requerida por el hebreo.
  doctrine_reference: Project terminology / proper name rendering
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no se necesitaban cambios adicionales y que el pasaje tenía alta concordancia con el texto fuente y el audit trail inglés. No se introdujeron ajustes textuales no respaldados por el hebreo ni por las decisiones auditadas.
  spanish_consistency_notes:
  - Se mantiene «Aram» en todo el texto principal, conforme a la terminología del proyecto.
  - Se conserva la repetición enfática de «moriremos / viviremos» para reflejar la estructura condicional del hebreo.
  - Se eligió un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - La nota [a] preserva la ambigüedad lexical de נפל אל sin convertirla en una sola interpretación.
  - La traducción de «el hambre» intenta reproducir la fuerza concreta del contexto de sitio sin sobreespecificar con terminología no exigida por el hebreo.
