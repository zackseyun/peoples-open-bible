id: PHP.1.7
reference: Philippians 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καθώς ἐστιν δίκαιον ἐμοὶ τοῦτο φρονεῖν ὑπὲρ πάντων ὑμῶν, διὰ τὸ ἔχειν με ἐν τῇ καρδίᾳ ὑμᾶς, ἔν τε τοῖς δεσμοῖς μου καὶ ἐν τῇ ἀπολογίᾳ καὶ βεβαιώσει τοῦ εὐαγγελίου συγκοινωνούς μου τῆς χάριτος πάντας ὑμᾶς ὄντας·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/007.yaml
  text: For it is right for me to think this about all of you, because I have you in my heart[a], since both in my chains and in the defense and confirmation of the gospel, all of you are fellow partakers with me of grace.
translation:
  language: ko
  text: 내가 여러분 모두에 대하여 이렇게 생각하는 것은 마땅합니다. 내가 여러분을 마음에 품고 있기 때문이며[a], 또한 내가 매인 중에서나 복음을 변호하고 굳건히 세우는 일에서나 여러분 모두가 나와 함께 은혜에 동참한 자들이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 나를 마음에 품고 있기 때문에」. 헬라어는 ἔχειν의 주어와 목적어가 모두 대격이어서 양방향으로 읽힐 수 있다. 문맥의 흐름에 따라 바울이 빌립보 성도를 마음에 품는 것으로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: δίκαιον
  english_pob_choice: it is right
  chosen_korean: 마땅합니다
  alternatives_korean:
  - 정당합니다
  - 옳습니다
  lexicon: BDAG
  rationale: 「마땅하다」는 윤리적·정당성의 함의를 함께 담는 한국어 표현으로, 「옳다」보다 격식의 무게가 있다.
- source_word: φρονεῖν
  english_pob_choice: to think
  chosen_korean: 생각하는
  alternatives_korean:
  - 마음에 두는
  - 품는
  lexicon: BDAG
  rationale: φρονέω는 단순한 사고를 넘어 「태도·정념」을 포함하지만, 「생각하다」가 합쇼체 산문에서 가장 간결하고 자연스럽다.
- source_word: διὰ τὸ ἔχειν με ἐν τῇ καρδίᾳ ὑμᾶς
  english_pob_choice: because I have you in my heart
  chosen_korean: 내가 여러분을 마음에 품고 있기 때문이며
  alternatives_korean:
  - 여러분이 나를 마음에 품고 있기 때문에
  lexicon: BDAG
  rationale: 헬라어 구문은 με와 ὑμᾶς가 모두 대격이라 양방향 해석이 가능하다. 영어 POB와 같이 바울이 빌립보 성도를 품는 방향을 본문으로 채택하되, 다른 해석을 각주로 보존한다.
- source_word: δεσμοῖς
  english_pob_choice: chains
  chosen_korean: 매인 중
  alternatives_korean:
  - 사슬
  - 결박
  - 옥에 갇힘
  lexicon: BDAG
  rationale: δεσμοί는 구체적 「사슬」의 형상을 가진다. 한국어 「매인 중에서」가 구속 상태와 옥중 상황을 자연스럽게 함께 담는다.
- source_word: ἀπολογίᾳ
  english_pob_choice: defense
  chosen_korean: 변호
  alternatives_korean:
  - 변증
  - 답변
  lexicon: BDAG
  rationale: ἀπολογία는 복음을 위한 법정적·공적 변호를 가리킨다. 「변호」가 법정 함의와 공적 진술의 무게를 함께 담는다.
- source_word: βεβαιώσει
  english_pob_choice: confirmation
  chosen_korean: 굳건히 세우는 일
  alternatives_korean:
  - 확증
  - 견고히 함
  lexicon: BDAG
  rationale: βεβαίωσις는 복음의 진리를 굳건히 확립함을 의미한다. 「변호」와 짝을 이루는 동작 명사로 「굳건히 세우는 일」이 자연스럽다.
- source_word: συγκοινωνούς
  english_pob_choice: fellow partakers with me
  chosen_korean: 나와 함께 ~에 동참한 자들
  alternatives_korean:
  - 나의 동역자들
  - 함께 나누는 자들
  lexicon: BDAG
  rationale: σύν- 접두어와 μου의 결합이 강한 결속을 표현한다. 「나와 함께 동참한 자들」이 그 공동 참여의 무게를 살린다.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_korean: 은혜
  alternatives_korean:
  - 호의
  lexicon: BDAG
  rationale: χάρις는 바울의 핵심 신학 어휘이며, 「은혜」가 바울 서신의 정립된 한국어 등가어이다.
theological_decisions:
- issue: 마음에 품는 주체의 방향 모호성
  chosen_reading: 내가 여러분을 마음에 품고 있기 때문
  alternative_readings:
  - 여러분이 나를 마음에 품고 있기 때문
  rationale: 헬라어 구문이 양방향 해석을 허용하므로, 영어 POB의 결정을 따라 바울이 성도를 품는 방향을 본문으로 채택한다. 본문의 애정과 사역적 결속을 잇는 흐름에 자연스럽다. 다른 해석은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
