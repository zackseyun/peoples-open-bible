translation:
  language: es
  text: Si Yahvé no hubiera estado por nosotros, cuando se levantaron hombres contra nosotros,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si Yahvé no hubiera estado de nuestro lado cuando se levantaron hombres contra nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  english_pob_choice: If ... had not
  chosen_spanish: Si ... no hubiera
  alternatives_spanish:
  - A menos que
  - Si no hubiera
  lexicon: HALOT
  rationale: La partícula introduce una condición contrafactual. En español, «Si ... no hubiera» expresa con naturalidad el sentido irreal del pasado que en inglés se plasmó con «If ... had not».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa directamente el nombre divino del pacto; por la terminología del proyecto, se conserva como «Yahvé» en vez de sustituirlo por un título.
- source_word: שֶׁהָיָה
  english_pob_choice: had not been
  chosen_spanish: hubiera estado
  alternatives_spanish:
  - no estaba
  - hubiera sido
  lexicon: HALOT
  rationale: Con la condición contrafactual de לוּלֵי, el imperfecto más pluscuamperfecto/subjuntivo en español transmite mejor la irrealis pasada que un simple pretérito.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - de nuestro lado
  lexicon: HALOT
  rationale: La construcción con היה aquí expresa apoyo o favor. En español, «por nosotros» comunica esa idea de manera natural y cercana al hebreo, sin volverla una paráfrasis demasiado interpretativa.
- source_word: בְּקוּם
  english_pob_choice: when ... rose up
  chosen_spanish: cuando ... se levantó
  alternatives_spanish:
  - al levantarse
  - cuando ... se alzó
  lexicon: HALOT
  rationale: 'El infinitivo constructo con prefijo ב marca el tiempo: «cuando». Para קום en contexto hostil, «se levantó» mantiene la imagen verbal y la fuerza idiomática.'
- source_word: עָלֵינוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - en contra de nosotros
  lexicon: HALOT
  rationale: En este contexto adversativo, la preposición hebrea tiene fuerza de oposición. «Contra nosotros» lo expresa de forma directa y idiomática en español.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - la humanidad
  - los hombres
  lexicon: HALOT
  rationale: Aunque el sustantivo es singular masculino, funciona de modo genérico/colectivo para el atacante humano. «El hombre» preserva mejor esa forma y la concisión poética del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en vez de un sustituto titulado, conforme al criterio del proyecto y al texto hebreo directo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y solo ajustó la capitalización inicial; no hubo cambios de contenido. La presente propuesta sigue de cerca el hebreo y conserva la misma estructura contrafactual y la misma referencia al nombre divino.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יְהוָה, conforme al estándar del proyecto.
  - «Por nosotros» se eligió como equivalente natural de la relación de apoyo expresada por היה con לָנוּ; la nota ofrece la alternativa «de nuestro lado» en línea con el audit trail inglés.
  - La frase mantiene el paralelismo poético y no introduce explicaciones interpretativas ajenas al verso.
