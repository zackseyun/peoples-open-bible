translation:
  language: es
  text: Ahora déjame[a], para que mi ira se encienda contra ellos y los consuma[b]; y te haré una gran nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «déjame solo».
    reason: lexical_alternative
  - marker: b
    text: O «para que mi ira arda contra ellos y los destruya».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּיחָה
  english_pob_choice: leave me alone
  chosen_spanish: déjame
  alternatives_spanish:
  - déjame en paz
  - déjame solo
  - deja que me quede así
  lexicon: HALOT
  rationale: El imperativo expresa la idea de desistir de impedir o retener. "Déjame" es natural en español y conserva la fuerza directa de la orden mejor que una formulación más explicativa.
- source_word: וְיִחַר אַפִּי
  english_pob_choice: so that my anger may burn
  chosen_spanish: para que mi ira se encienda
  alternatives_spanish:
  - para que mi ira arda
  - para que mi furor se encienda
  - y mi ira se encenderá
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente remite a la ira que arde. "Se encienda" conserva la metáfora sin sonar forzado en español, y mantiene el tono de juicio.
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi enojo
  - mi cólera
  lexicon: HALOT
  rationale: En el idioma bíblico, el término designa la ira. "Ira" es claro y digno en español; "furor" o "cólera" serían posibles, pero menos neutrales.
- source_word: בָהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en su contra
  - hacia ellos
  lexicon: HALOT
  rationale: La preposición en contexto expresa dirección hostil. "Contra ellos" hace explícita esa relación sin añadir interpretación.
- source_word: וַאֲכַלֵּם
  english_pob_choice: I may consume them
  chosen_spanish: los consuma
  alternatives_spanish:
  - los destruya
  - los acabe
  - los devore
  lexicon: HALOT
  rationale: כלה en este contexto puede ser consumir, acabar o destruir. "Consuma" preserva la imagen verbal que el inglés POB también retuvo y deja abierta la fuerza de juicio.
- source_word: וְאֶעֱשֶׂה אוֹתְךָ
  english_pob_choice: and I will make you
  chosen_spanish: y te haré
  alternatives_spanish:
  - y haré de ti
  - y te convertiré en
  - y te formaré como
  lexicon: HALOT
  rationale: עָשָׂה con objeto y complemento expresa hacer a alguien algo. "Te haré" es la forma más directa y fiel en español, sin sobreexplicar la transformación implícita.
- source_word: לְגוֹי גָּדֽוֹל
  english_pob_choice: into a great nation
  chosen_spanish: una nación grande
  alternatives_spanish:
  - una gran nación
  - un pueblo grande
  - una nación numerosa
  lexicon: HALOT
  rationale: גוי se refiere a nación/pueblo. En español, "nación grande" mantiene la sencillez del hebreo; la preposición incorporada en el verbo "haré" comunica bien la idea de llegada a ese estado.
theological_decisions:
- issue: Antropopatismo de la ira divina
  english_pob_reading: Retain the metaphor of God's anger burning without softening it into abstract displeasure.
  chosen_spanish_reading: Conservar la imagen de la ira que se enciende, sin convertirla en una simple molestia o desaprobación.
  alternative_spanish_readings:
  - mi enojo puede aumentar
  - me enfadaré con ellos
  - mi indignación se volverá contra ellos
  rationale: El hebreo presenta lenguaje antropopático fuerte. La traducción española preserva esa tensión narrativa y teológica en vez de neutralizarla con una formulación abstracta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza del mandato a Moisés
  english_pob_reading: Translate straightforwardly as a real imperative without explaining in the main text whether it is rhetorical or invitational.
  chosen_spanish_reading: Traducirlo como un mandato real, sin introducir en el texto principal una explicación sobre si es retórico o una invitación implícita.
  alternative_spanish_readings:
  - déjame, por favor
  - suéltame
  - retírate
  rationale: La cláusula hebrea se presenta como una orden directa. La traducción no debe importar una interpretación secundaria que el versículo no explicita.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve tension where present.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el ciclo más reciente; el texto se mantiene alineado con el acuerdo alto del control cruzado y con la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece el nombre divino.
  - Se mantiene «ira» para אַף en lugar de «enojo» para conservar un registro más bíblico y solemne.
  - «Consumir» conserva la imagen de fin o aniquilación sin cerrar del todo la amplitud semántica de כלה.
  - La preposición hostil se expresa con «contra ellos», como en la lectura inglesa auditada.
