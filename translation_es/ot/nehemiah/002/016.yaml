translation:
  language: es
  text: Pero los oficiales no sabían dónde había ido o qué estaba haciendo[a], y hasta entonces no se lo había dicho a los judíos, a los sacerdotes, a los nobles, a los oficiales ni al resto que hacía el trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos» para «los judíos». El hebreo יְהוּדִים puede denotar al pueblo de Judá en sentido regional o a la comunidad judía en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los delegados
  - los prefectos
  - los gobernantes
  lexicon: HALOT
  rationale: סְגָנִים designa subordinados con función administrativa o de mando. «Oficiales» mantiene esa fuerza sin forzar un título persa más específico de lo que el hebreo exige.
- source_word: יָדְעוּ
  english_pob_choice: did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no estaban al tanto
  - no conocían
  lexicon: HALOT
  rationale: ידע en qal expresa conocimiento simple. El imperfecto narrativo en español se comunica naturalmente con «no sabían».
- source_word: אָ֣נָה
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - hacia dónde
  - a dónde
  lexicon: HALOT
  rationale: La partícula pregunta por el destino o dirección. En este contexto, después de «sabían», «dónde había ido» es la equivalencia más natural y fiel.
- source_word: הָלַ֔כְתִּי
  english_pob_choice: I had gone
  chosen_spanish: había ido
  alternatives_spanish:
  - fui
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español refleja bien la retrospectiva del relato: los oficiales no sabían el destino de una ida ya ocurrida.'
- source_word: וּמָה אֲנִי עֹשֶׂה
  english_pob_choice: or what I was doing
  chosen_spanish: qué estaba haciendo
  alternatives_spanish:
  - qué hacía
  - qué iba a hacer
  lexicon: HALOT
  rationale: El participio עֹשֶׂה comunica acción en curso. En español, «qué estaba haciendo» conserva ese matiz sin añadir más de lo que el hebreo da. La omisión de «o» en la frase principal responde al paralelismo castellano natural dentro de una pregunta indirecta con doble contenido.
- source_word: לַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: יְהוּדִים puede referirse al pueblo de Judá o a la comunidad judía en sentido amplio. Se conserva «judíos» como el equivalente más conocido y compatible con el uso del pasaje, sin cerrar la posible referencia regional.
- source_word: לַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: כֹּהֲנִים se traduce directamente por «sacerdotes», el equivalente normal y exacto en español bíblico.
- source_word: לַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los aristócratas
  - los notables
  lexicon: HALOT
  rationale: חֹרִים en este contexto social-administrativo señala a los notables de rango alto. «Nobles» reproduce bien esa idea en español.
- source_word: וּלְיֶתֶר
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - los demás
  - lo restante
  lexicon: HALOT
  rationale: יֶתֶר indica lo que queda. «El resto» sigue de cerca el valor colectivo del hebreo y funciona de manera natural en la lista.
- source_word: עֹשֵׂה הַמְּלָאכָה
  english_pob_choice: who were doing the work
  chosen_spanish: que hacía la obra
  alternatives_spanish:
  - que estaban haciendo la obra
  - los que trabajaban
  lexicon: HALOT
  rationale: 'El participio singular con sentido colectivo puede quedar en español con una relativa singular: «que hacía la obra». «Obra» mantiene el registro bíblico del trabajo de reconstrucción y evita una paráfrasis excesiva.'
- source_word: עַד כֵּן
  english_pob_choice: until then
  chosen_spanish: hasta entonces
  alternatives_spanish:
  - hasta ese momento
  - hasta aquel entonces
  lexicon: HALOT
  rationale: La locución temporal se expresa de forma directa en español con «hasta entonces».
- source_word: הִגַּדְתִּי
  english_pob_choice: I had not told
  chosen_spanish: no lo había dicho
  alternatives_spanish:
  - no había informado
  - no lo había comunicado
  lexicon: HALOT
  rationale: נגד en hiphil significa decir, declarar o hacer saber. «No lo había dicho» refleja con sencillez la negativa a comunicarlo; el pronombre neutro «lo» recoge el contenido omitido en el hebreo.
theological_decisions:
- issue: ¿Traducir יְהוּדִים como «judíos» o «judeanos»?
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: No hay una tensión doctrinal, pero sí una posible tensión identitaria. El audit trail inglés reconoce que el hebreo puede ser regional o comunitario. En español se mantiene «judíos» por claridad y recepción amplia, sin negar la posible referencia a Judá; esa posibilidad queda explicada en la nota.
  doctrine_reference: No aplica; decisión lexical-identitaria, no doctrinal.
translation_notes:
  revision_awareness: Se ha seguido el estado de alta concordancia del audit trail inglés, sin introducir revisiones sustantivas. La redacción española conserva el paralelismo del hebreo y el mismo alcance semántico que la versión inglesa aprobada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - «Oficiales», «sacerdotes» y «nobles» conservan el registro administrativo-social del contexto.
  - Se usa «obra» para mantener el lenguaje de reconstrucción propio de Nehemías y no reducirlo a trabajo genérico.
