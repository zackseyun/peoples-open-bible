revisions:
- from: Y en la parte superior de los pilares había trabajo de lirio[a], y la obra de los pilares quedó terminada[b].
  to: Y en la parte superior de los pilares había una obra en forma de lirio[a], y la obra de los pilares quedó terminada[b].
  rationale: Se reemplaza ‘trabajo de lirio’ por ‘una obra en forma de lirio’ para expresar de manera natural en español el sentido ornamental de מַעֲשֵׂה שׁוֹשָׁן, manteniendo la imagen floral y el valor arquitectónico. Se conserva ‘parte superior’ para evitar el tecnicismo ‘capitel’, y se deja la segunda nota como alternativa léxica más idiomática.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:08:44Z'
