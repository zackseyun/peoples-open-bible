review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: agentes plurales sacan y llevan a Urías, luego sujeto singular lo ejecuta y desecha su cadáver. También conserva el tono deshonroso de נִבְלָתוֹ y del entierro entre sepulturas comunes. Sin embargo, dos decisiones no siguen fielmente el sentido auditado: ''lo hirió con la espada'' debilita el claro sentido letal de וַיַּכֵּהוּ בֶּחָרֶב en contexto, y ''de los hijos del pueblo'' calca demasiado el hebreo donde el POB inglés justificó explícitamente el sentido social ''the common people''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'los sepulcros de los hijos del pueblo' suena forzado y poco natural para lectura eclesial amplia. 'Joacim' es una forma tradicional posible, pero 'Joaquim' es más reconocible en español general y evita rareza innecesaria. La nota al pie también arrastra una formulación poco natural al hablar de 'lugares de sepultura' cuando el texto puede expresarse mejor como 'sepulturas' o 'tumbas'.
  glossary_alignment: No hay conflictos con términos teológicos mayores del glosario. La principal cuestión léxica es respetar la decisión auditada de בְּנֵי הָעָם como referencia a la gente común, no mantener una literalidad opaca ('hijos del pueblo'). También conviene reflejar el matiz letal de נכה + 'con la espada' con 'lo mató a espada' o equivalente más claro que 'lo hirió'.
  issues:
  - severity: high
    issue: '"lo hirió con la espada" subtraduce la fuerza contextual de וַיַּכֵּהוּ בֶּחָרֶב'
    rationale: Aunque נכה por sí solo puede significar herir o golpear, aquí el complemento 'con la espada' y la referencia inmediata al cadáver hacen evidente el resultado letal. El POB inglés eligió 'struck him down' justamente para preservar esa letalidad sin aplanarla; en español 'lo hirió' sugiere que pudo sobrevivir.
  - severity: high
    issue: '"de los hijos del pueblo" no comunica bien el sentido de בְּנֵי הָעָם'
    rationale: La documentación inglesa explica que la frase se refiere a la gente común en contraste con una sepultura honorable. En español, 'hijos del pueblo' resulta literalista y ambiguo, y no preserva adecuadamente el sentido social que el audit trail decidió priorizar.
  - severity: medium
    issue: Forma del nombre "Joacim" menos natural que "Joaquim"
    rationale: Ambas formas existen, pero 'Joaquim' es más reconocible para lectores amplios y se acerca mejor al uso bíblico español moderno sin perder fidelidad.
  - severity: low
    issue: La nota al pie puede expresarse con español más natural
    rationale: La idea de 'burial places belonging to ordinary people' puede decirse en español de manera más limpia como 'las sepulturas del pueblo' y 'sepulturas de la gente común'.
  revised_spanish_text: Sacaron a Urías de Egipto y lo llevaron al rey Joaquim[a]; y él lo mató a espada y arrojó su cadáver a los sepulcros de la gente común.
  revised_footnotes:
  - marker: a
    text: 'O: «los sepulcros del pueblo». El hebreo puede referirse más literalmente a las sepulturas pertenecientes a la gente común, en contraste con un entierro honroso.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el sentido documentado del hebreo y del POB inglés: se cambia ''lo hirió con la espada'' por ''lo mató a espada'' para expresar la letalidad contextual; se sustituye ''los hijos del pueblo'' por ''la gente común'' para comunicar el contraste social explícitamente señalado en la auditoría; se normaliza ''Joaquim'' para mayor legibilidad en español amplio; y se pule la nota al pie para que suene natural y preserve la alternativa léxica.'
