  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «los cielos» y el manejo de la posible alusión a Zafón están alineados. La decisión de mantener «las estrellas de Dios» sin resolver su simbolismo también coincide con la rationale documentada.
