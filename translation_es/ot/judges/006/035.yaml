translation:
  language: es
  text: Y envió mensajeros por todo Manasés, y también fue convocado tras él. También envió mensajeros por Aser, Zabulón y Neftalí, y subieron para salirles al encuentro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y subieron para salirle al encuentro". El hebreo puede entenderse como una referencia a Gedeón; sin embargo, el sufijo plural apunta más naturalmente a las fuerzas contrarias.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: En este contexto de convocatoria militar, el término designa agentes humanos que llevan un llamado, no ángeles. 'Mensajeros' conserva bien ese sentido y es natural en español.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Es la equivalencia narrativa normal de la acción de enviar, clara y sobria en español.
- source_word: בְּכָל מְנַשֶּׁה
  english_pob_choice: throughout all Manasseh
  chosen_spanish: por todo Manasés
  alternatives_spanish:
  - a través de todo Manasés
  - en todo Manasés
  lexicon: HALOT
  rationale: La preposición con el nombre tribal indica recorrido amplio por el territorio; 'por todo' comunica bien la extensión de la convocatoria sin sonar forzado.
- source_word: וַיִּזָּעֵק
  english_pob_choice: was called out
  chosen_spanish: fue llamado a reunirse
  alternatives_spanish:
  - fue convocado
  - fue llamado
  - fue reunido
  lexicon: HALOT
  rationale: 'El nifal tiene fuerza pasiva/reflexiva en un marco militar: la tribu fue llamada a agruparse. ''Llamado a reunirse'' conserva el matiz de convocatoria y evita perder la idea de movilización.'
- source_word: גַּם הוּא
  english_pob_choice: it too
  chosen_spanish: él también
  alternatives_spanish:
  - también ello
  - también fue
  lexicon: HALOT
  rationale: Aunque la referencia es a la entidad tribal/territorial, en español resulta más natural mantener la concordancia tradicional con un antecedente colectivo masculino como 'Manasés'.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - detrás de él
  - siguiéndolo
  lexicon: HALOT
  rationale: La expresión indica que se alinearon siguiendo a Gedeón. 'Tras él' reproduce de modo directo y fluido el hebreo.
- source_word: בְּאָשֵׁר וּבִזְבֻלוּן וּבְנַפְתָּלִי
  english_pob_choice: through Asher, Zebulun, and Naphtali
  chosen_spanish: a Aser, a Zabulón y a Neftalí
  alternatives_spanish:
  - por Aser, Zabulón y Neftalí
  - en Aser, Zabulón y Neftalí
  lexicon: HALOT
  rationale: Con los nombres tribales, el español admite mejor la serie con 'a' para marcar el envío de mensajeros hacia esas zonas. Mantiene el sentido de convocatoria sin forzar una repetición pesada de 'por'.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - marcharon
  lexicon: HALOT
  rationale: El verbo literalmente significa 'subieron'. En movimiento militar, esta forma conserva el idiomático hebreo y funciona bien en español.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: para salirles al encuentro
  alternatives_spanish:
  - para encontrarlos
  - para ir al encuentro de ellos
  lexicon: HALOT
  rationale: '''Salir al encuentro'' transmite con naturalidad la idea de ir a encontrarse con otro grupo. Se mantiene el plural del sufijo en ''les'', como en el texto inglés de referencia.'
theological_decisions:
- issue: Referente de לִקְרָאתָם
  english_pob_reading: the summoned tribes went up to meet the enemy forces
  chosen_spanish_reading: los convocados subieron para salirles al encuentro a las fuerzas enemigas
  alternative_spanish_readings:
  - subieron para salirle al encuentro a Gedeón
  - subieron para encontrarse con Gedeón y sus fuerzas
  rationale: El sufijo plural no identifica de manera explícita a su antecedente. En el contexto inmediato de Jueces 6, la lectura más probable es que se trate de las fuerzas enemigas ya reunidas. Aun así, la ambigüedad merece preservarse como posibilidad interpretativa en nota.
  doctrine_reference: Preservar una ambigüedad textual/interpretiva genuina sin resolverla dogmáticamente donde el hebreo no es explícito.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y el rastro de auditoría en inglés. Se retuvo la decisión revisada de expresar וַיִּזָּעֵק con una fórmula de convocatoria/movilización, evitando traducirlo como simple ‘gritó’. También se mantuvo la lectura plural de לִקְרָאתָם en el cuerpo principal, con una nota que preserva la alternativa documentada.
  spanish_consistency_notes:
  - Se usa 'Manasés' para el nombre tribal, por coherencia con el uso bíblico en español.
  - 'Se conserva ''mensajeros'' para מַלְאָכִים por la misma razón lexical que en la auditoría inglesa: son agentes humanos de convocatoria, no ángeles.'
  - Se mantiene un tono sobrio y narrativo, sin añadir detalles militares que no estén en el hebreo.
  - La nota al pie usa una alternativa explícita en español para reflejar la ambigüedad del sufijo plural sin imponer una solución interpretativa.
