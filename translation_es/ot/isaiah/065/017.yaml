  glossary_alignment: 'No hay conflicto con la terminología del proyecto. No aparece Yahvé en este versículo. «Cielos nuevos», «tierra nueva», «mente» y el alcance cósmico están bien resueltos. La única decisión léxica que conviene corregir es הָרִאשֹׁנוֹת: mejor «las cosas anteriores» que «las cosas primeras».'
