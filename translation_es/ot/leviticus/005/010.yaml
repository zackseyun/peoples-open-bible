- from: Y ofrecerá el segundo como holocausto, conforme al orden prescrito[a], y el sacerdote hará expiación por él por el pecado que ha cometido[b], y le será perdonado.
  to: Y ofrecerá el segundo como holocausto, según el procedimiento prescrito[a], y el sacerdote hará expiación por él por el pecado que ha cometido, y se le perdonará[b].
  rationale: Se ajusta כַּמִּשְׁפָּט a una expresión española más natural y más cercana al valor procedural del hebreo, en línea con la alternativa documentada por el POB. También se mejora la fórmula final a «se le perdonará», que conserva la pasiva reverente sin nombrar explícitamente a Dios y suena mejor en español contemporáneo.
