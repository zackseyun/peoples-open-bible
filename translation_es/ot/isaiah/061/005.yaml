revisions:
- from: Forasteros se pondrán y pastorearán tus rebaños[a][b], y los hijos de forasteros serán tus labradores y tus viñadores.
  to: Forasteros estarán allí y pastorearán tus rebaños[a][b], y los hijos de forasteros serán tus labradores y tus viñadores.
  rationale: Se reemplaza «se pondrán» por «estarán allí» para preservar mejor el sentido llano de וְעָמְדוּ, conforme a la rationale del POB inglés, y a la vez mantener un español natural. También se corrige un detalle tipográfico en la nota b. No se requieren cambios doctrinales ni reestructuración mayor.
