translation:
  language: es
  text: Y tomó a uno de la descendencia real, e hizo un pacto con él[a], poniéndolo bajo juramento, y tomó a los poderosos de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘bajo una maldición-juramento’; el término hebreo puede incluir un juramento acompañado de maldición por romperlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזֶּרַע הַמְּלוּכָה
  english_pob_choice: one of the royal offspring
  chosen_spanish: de la semilla real
  alternatives_spanish:
  - de la descendencia real
  - de un descendiente real
  - de la simiente real
  lexicon: HALOT
  rationale: זֶרַע conserva la imagen de ‘semilla’, pero en contexto humano designa descendencia. En español, ‘semilla real’ preserva la metáfora y el carácter dinástico de הַמְּלוּכָה sin volverlo una paráfrasis excesiva; ‘de la descendencia real’ es una alternativa más explicativa, pero menos cercana a la imagen hebrea.
- source_word: וַיִּכְרֹת אִתּוֹ בְּרִית
  english_pob_choice: made a covenant with him
  chosen_spanish: hizo pacto con él
  alternatives_spanish:
  - hizo un pacto con él
  - cortó pacto con él
  - concertó un pacto con él
  lexicon: HALOT
  rationale: כרת ברית es el giro normal ‘cortar/hacer pacto’. En español bíblico-readable, ‘hizo pacto’ conserva el valor solemne y evita reducirlo a un simple arreglo político. ‘Cortó pacto’ sería demasiado literal y poco natural en español.
- source_word: וַיָּבֵא אֹתוֹ בְּאָלָה
  english_pob_choice: bringing him under an oath
  chosen_spanish: poniéndolo bajo juramento
  alternatives_spanish:
  - metiéndose bajo juramento
  - bajo un juramento de maldición
  - bajo maldición-juramento
  lexicon: HALOT
  rationale: אָלה puede abarcar juramento con sanción de maldición. ‘Poniéndolo bajo juramento’ comunica la obligación vinculante en español claro, mientras que la nota preserva la posibilidad de una ‘maldición-juramento’ sin resolver en exceso la tensión semántica.
- source_word: אֵילֵי הָאָרֶץ
  english_pob_choice: the mighty men of the land
  chosen_spanish: los poderosos de la tierra
  alternatives_spanish:
  - los nobles de la tierra
  - los fuertes de la tierra
  - los dirigentes de la tierra
  lexicon: HALOT
  rationale: אֵילִים es una imagen figurada de fuerza/poder y puede referirse a nobles o líderes. ‘Los poderosos de la tierra’ mantiene la fuerza metafórica y es idiomático en español; ‘nobles’ sería más específico de lo que el hebreo exige.
- source_word: לָקָח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - arrebató
  - capturó
  lexicon: HALOT
  rationale: El verbo final retoma la acción narrativa sin especificar violencia adicional. ‘Tomó’ es el equivalente más sobrio y fiel, y deja abierta la idea de que los principales hombres fueron removidos del país sin añadir matices no señalados por el texto.
theological_decisions:
- issue: Terminología pactual en un contexto político
  english_pob_reading: Retain 'covenant' rather than reducing the term to a merely secular 'treaty.'
  chosen_spanish_reading: Mantener ‘pacto’ y no reducirlo a ‘tratado’.
  alternative_spanish_readings:
  - tratado
  - acuerdo
  - alianza
  rationale: בְּרִית es el término habitual de pacto y debe conservar su peso solemne aun en un contexto político. ‘Pacto’ en español transmite mejor esa carga que ‘tratado’, que suena más secular y diplomático.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de אָלָה (juramento con posible maldición)
  english_pob_reading: Render with 'oath' in the main text while preserving curse-sanction nuance in a footnote.
  chosen_spanish_reading: Traducir con ‘juramento’ en el texto principal y preservar la posibilidad de maldición en la nota.
  alternative_spanish_readings:
  - maldición
  - juramento de maldición
  - maldición-juramento
  rationale: El hebreo permite tanto juramento como la sanción de maldición. ‘Juramento’ es natural y preciso, y la nota evita perder la tensión teológica/legal del término sin sobrecargar el verso.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el archivo auditado en inglés: conserva el giro pactual, la imagen dinástica de זֶרַע, el valor coercitivo de בְּאָלָה y la referencia figurada a los ‘poderosos’ de la הארץ, sin introducir una lectura más política o más explicativa de la que el original exige.'
  spanish_consistency_notes:
  - Se prefirió ‘pacto’ sobre ‘tratado’ por consistencia con la terminología pactual de POB.
  - Se mantuvo una nota para no cerrar el campo semántico de בְּאָלָה.
  - ‘De la semilla real’ conserva la metáfora de descendencia; en este contexto no se suavizó a ‘descendencia’ en el texto principal.
  - ‘Los poderosos de la tierra’ refleja la imagen figurada de אֵילֵי הָאָרֶץ sin especificar un cargo social no explícito.
