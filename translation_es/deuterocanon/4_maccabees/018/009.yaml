    rationale: Aunque intenta seguir de cerca βίον ἐπιστήσας, la expresión no suena idiomática. Un ajuste como «después de conocer lo que era tener buenos hijos» conserva el sentido de experiencia/conocimiento previo y mejora la legibilidad.
  - severity: medium
    issue: εὐτεκνίας queda subtraducido como «tener hijos»
    rationale: 'La evidencia y la nota inglesa destacan una valoración positiva: hijos buenos, bendición con hijos, o descendencia favorable/abundante. El texto español debe preservar mejor ese matiz.'
