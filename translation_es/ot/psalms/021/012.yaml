translation:
  language: es
  text: Porque intentaron el mal contra ti[a]; idearon una maquinación[b], pero no pudieron llevarla a cabo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., 'extendieron/dirigieron el mal contra ti'. El hebreo usa un giro idiomático para expresar que dirigieron o intentaron el mal contra ti.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'un complot' o 'un plan malicioso'. 'Maquinación' conserva el matiz de intriga hostil del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Pues bien
  lexicon: HALOT
  rationale: Introduce de manera natural en español la relación explicativa con lo anterior, manteniendo la fuerza causal o consecuencial del hebreo sin sonar rígido.
- source_word: נָטוּ עָלֶיךָ רָעָה
  english_pob_choice: intended evil against you
  chosen_spanish: tramaron mal contra ti
  alternatives_spanish:
  - intentaron mal contra ti
  - dirigieron mal contra ti
  - extendieron mal contra ti
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático literalmente cercano a 'extender/dirigir mal', pero el contexto pide la idea de intención hostil. 'Tramaron mal' comunica esa intención maliciosa de forma natural y conserva la carga moral de רָעָה.
- source_word: חָשְׁבוּ מְזִמָּה
  english_pob_choice: devised a scheme
  chosen_spanish: concibieron una maquinación
  alternatives_spanish:
  - idearon un plan
  - tramaron un complot
  - pensaron una trama
  lexicon: HALOT
  rationale: חשׁב expresa planificación deliberada, y מְזִמָּה suele tener matiz de plan astuto o malicioso. 'Concibieron una maquinación' conserva el carácter calculado y la connotación negativa sin volverlo excesivamente interpretativo.
- source_word: בַּל יוּכָלוּ
  english_pob_choice: but they could not carry it out
  chosen_spanish: pero no pudieron llevarla a cabo
  alternatives_spanish:
  - pero no pudieron realizarla
  - pero no pudieron lograrlo
  - pero no pudieron ejecutarla
  lexicon: HALOT
  rationale: La negación poética בַּל se vierte con una oposición natural en español. 'Llevarla a cabo' explicita el objeto implícito del poder/aptitud de יוּכָלוּ y mantiene la referencia a la maquinación femenina singular.
translation_notes:
  revision_awareness: 'He seguido de cerca el audit trail inglés: se mantiene el valor idiomático de נָטָה + עַל como intención hostil, y מְזִמָּה se vierte con un término español que conserve su matiz negativo. No se detectaron revisiones textuales relevantes en el pasaje.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' como nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se usó una estructura verbal natural en español para conservar la paralelidad del hebreo sin mecanicismo.
  - '''Mal'' traduce רָעָה con valor moral, no meramente de daño físico.'
