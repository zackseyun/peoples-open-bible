translation:
  language: es
  text: Casa de Leví[a], bendigan a Yahvé; ustedes que temen a Yahvé[b], bendigan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Casa de Leví», designación corporativa para la línea o comunidad levítica.'
    reason: cultural_note
  - marker: b
    text: O «los que temen a Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית הַלֵּוִי
  english_pob_choice: House of Levi
  chosen_spanish: Casa de Leví
  alternatives_spanish:
  - casa del levita
  - casa de los levitas
  lexicon: HALOT
  rationale: El constructo hebreo expresa literalmente 'casa de Levi' y, en este contexto litúrgico junto con otras designaciones corporativas, funciona como un llamado al grupo levítico. 'Casa de Leví' conserva esa estructura de casa/linaje sin convertirla en una mera referencia biográfica.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendecid
  alternatives_spanish:
  - alabad
  - bendigan
  lexicon: HALOT
  rationale: ברך en este marco de adoración conserva su fuerza litúrgica de bendecir; 'bendecid' reproduce mejor el mandato coral y paralelo del salmo que 'alabad', que debilitaría la correspondencia verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La convención proyectual para יְהוָה es 'Yahvé', transliteración del nombre divino, no una sustitución por título. 'Yahvé' mantiene el nombre propio y su valor de pacto.
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: you who fear Yahweh
  chosen_spanish: ustedes que temen a Yahvé
  alternatives_spanish:
  - los que temen a Yahvé
  - temerosos de Yahvé
  lexicon: HALOT
  rationale: El participio designa a un grupo caracterizado por la reverencia obediente a Yahvé. En español, el vocativo directo 'ustedes que temen a Yahvé' conserva el tono de llamada inmediata y funciona naturalmente con el imperativo plural.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo la política del POB, no se lo sustituye por un título. 'Yahvé' es la transliteración española establecida para preservar el nombre pactual de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor corporativo de 'Casa de Leví'
  english_pob_reading: House of Levi
  chosen_spanish_reading: Casa de Leví
  alternative_spanish_readings:
  - familia de Leví
  - los levitas
  rationale: La expresión no solo nombra un linaje, sino una unidad convocada al culto. 'Casa de Leví' mantiene la tensión entre genealogía y corporación litúrgica sin reducirla a una paráfrasis sociológica.
  doctrine_reference: Parallel liturgical summons in Psalms 135:19-21
translation_notes:
  revision_awareness: 'Coincide con el sentido y la estructura del texto fuente hebreo y con la auditoría inglesa: llamado paralelo a una casa/linaje y a un grupo definido por temer a Yahvé, manteniendo la repetición litúrgica de ''bendecid''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - '''bendecid'' mantiene el imperativo plural formal que corresponde al hebreo בָּרֲכוּ.'
  - '''Casa de Leví'' conserva el paralelismo corporativo del salmo sin introducir singular/plural no presentes en el hebreo.'
