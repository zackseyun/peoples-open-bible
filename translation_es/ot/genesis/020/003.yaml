translation:
  language: es
  text: 'Pero Dios vino a Abimelec en un sueño por la noche y le dijo: «Mira[a], eres un hombre muerto a causa de la mujer que has tomado[b], porque ella está casada[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Mira, eres un hombre muerto», «Mira, estás muerto» o «Mira, morirás». El hebreo expresa una muerte segura e inminente.'
    reason: lexical_alternative
  - marker: b
    text: Aquí se mantiene el valor general de «tomar», sin añadir violencia explícita que el verbo hebreo no requiere.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «porque ella pertenece a un esposo» o «porque ella tiene esposo», es decir, ya tiene marido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se presentó
  lexicon: HALOT
  rationale: El verbo de movimiento en la secuencia narrativa se expresa de manera natural con «vino», que mantiene el avance del relato sin sobreespecificar un desplazamiento físico dentro de la escena onírica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - dioses
  lexicon: HALOT
  rationale: El contexto narrativo y la concordancia verbal singular señalan al Dios de Israel; por eso se traduce en singular como «Dios».
- source_word: בַּחֲלוֹם הַלָּיְלָה
  english_pob_choice: in a dream by night
  chosen_spanish: en un sueño de noche
  alternatives_spanish:
  - en un sueño durante la noche
  - en un sueño nocturno
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «En un sueño de noche» conserva el valor temporal y el matiz revelatorio sin volver la frase artificial en español.
- source_word: וַיֹּאמֶר ל֗וֹ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y dijo a él
  lexicon: HALOT
  rationale: La construcción verbal con pronombre dativo se expresa de forma idiomática y directa con «le dijo», que comunica la dirección del discurso de manera clara.
- source_word: הִנְּךָ
  english_pob_choice: Behold / Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: Este marcador discursivo introduce una advertencia solemne. «Mira» conserva la fuerza de llamada de atención en español moderno sin recurrir a una formulación excesivamente arcaica.
- source_word: מֵת
  english_pob_choice: you are a dead man
  chosen_spanish: eres un hombre muerto
  alternatives_spanish:
  - estás muerto
  - vas a morir
  lexicon: HALOT
  rationale: El participio predicativo expresa sentencia cierta e inminente. «Eres un hombre muerto» reproduce esa fuerza advertencial en español natural, sin suavizarla a mera posibilidad futura.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por culpa de
  lexicon: HALOT
  rationale: Aquí עַל introduce la causa de la condena. «A causa de» es una equivalencia clara y neutra que conserva el valor causal sin añadir matices más fuertes que el hebreo.
- source_word: לָקַחְתָּ
  english_pob_choice: have taken
  chosen_spanish: has tomado
  alternatives_spanish:
  - tomaste
  - has llevado
  lexicon: HALOT
  rationale: «Tomado» refleja el verbo en contextos matrimoniales sin importar una violencia que el hebreo no explicita. El perfecto mantiene la relevancia actual de la acción de Abimelec.
- source_word: בְּעֻלַת בָּעַל
  english_pob_choice: she is married
  chosen_spanish: está casada
  alternatives_spanish:
  - es una mujer casada
  - tiene marido
  lexicon: HALOT
  rationale: La frase hebrea subraya que la mujer ya pertenece a una relación marital establecida. «Está casada» comunica ese estado de forma natural y fiel, sin introducir formulaciones redundantes que suenan poco idiomáticas en español.
theological_decisions:
- issue: Renderización de la sentencia divina expresada con הִנְּךָ מֵת
  english_pob_reading: Behold, you are a dead man
  chosen_spanish_reading: Mira, eres un hombre muerto
  alternative_spanish_readings:
  - Mira, estás muerto
  - Mira, vas a morir
  rationale: El hebreo comunica una advertencia cierta e inminente, no solo una amenaza futura. «Eres un hombre muerto» conserva la gravedad de la sentencia y su valor performativo en la escena.
  doctrine_reference: Translation philosophy §6 (claridad moderna sin perder la fuerza del juicio)
translation_notes:
  revision_awareness: 'La versión inglesa pasó por ajustes importantes en dos puntos sensibles: la advertencia de muerte y la cláusula final sobre la mujer. La revisión más reciente volvió a una formulación más formal («Behold, you are a dead man» / «she is married»), tras una fase más idiomática («as good as dead» / «she has a husband»). La propuesta española mantiene la fuerza formal de la advertencia, pero conserva una expresión natural para el estado marital («está casada»), atendiendo al hebreo y al español publicado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en coherencia con el contexto singular.
  - Se usa «Mira» para el marcador discursivo de advertencia, en lugar de «He aquí» o «Hele», por legibilidad contemporánea.
  - Se evita «SEÑOR» porque el texto hebreo dice אֱלֹהִים, no el tetragrámaton.
  - «Estar casada» conserva el estado relacional sin forzar una literalidad torpe como «married to a husband».
  - El estilo general es reverente pero moderno, acorde con una edición pública y auditable.
