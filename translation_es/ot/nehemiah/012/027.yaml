translation:
  language: es
  text: En la dedicación del muro de Jerusalén, buscaron[a] a los levitas desde todos sus lugares, para traerlos a Jerusalén, para celebrar la dedicación con alegría, con acciones de gracias, y con cántico, con címbalos, arpas[b], y liras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buscaron a los levitas»; contextualmente, «convocaron a los levitas». El verbo hebreo significa primariamente «buscar».
    reason: lexical_alternative
  - marker: b
    text: La distinción exacta entre los instrumentos aquí traducidos «arpas» y «liras» es incierta; el hebreo nombra dos instrumentos de cuerda diferentes.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַחֲנֻכַּת
  english_pob_choice: At the dedication of
  chosen_spanish: En la dedicación de
  alternatives_spanish:
  - Durante la dedicación de
  - Y en la dedicación de
  lexicon: HALOT
  rationale: La preposición con el sustantivo חֲנֻכָּה se entiende aquí como marco temporal/ocasional. «Dedicación» conserva el valor nominal del hebreo y evita una paráfrasis excesiva.
- source_word: חוֹמַת יְרוּשָׁלַםִ
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: el muro de Jerusalén
  alternatives_spanish:
  - la muralla de Jerusalén
  - el muro de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: «Muro» es una equivalencia clara y digna para חוֹמָה; «muralla» también es posible, pero «muro» mantiene mejor la simplicidad del hebreo y la formulación de la POB en inglés.
- source_word: בִּקְשׁוּ
  english_pob_choice: they sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - siguieron a la búsqueda de
  - llamaron a
  lexicon: HALOT
  rationale: בקׁש significa primariamente «buscar». En este contexto implica localizar y reunir a los levitas; «buscaron» preserva esa fuerza sin convertirlo de manera innecesaria en un «llamamiento» formal.
- source_word: מִכָּל מְקֹמֹתָם
  english_pob_choice: from all their places
  chosen_spanish: de todos sus lugares
  alternatives_spanish:
  - de todos sus asentamientos
  - de todos los lugares donde estaban
  lexicon: HALOT
  rationale: «Lugares» reproduce מקום de forma amplia. «Sus lugares» refleja el sufijo pronominal plural sin añadir la interpretación específica de «asentamientos».
- source_word: לַהֲבִיאָם לִירוּשָׁלָם
  english_pob_choice: to bring them to Jerusalem
  chosen_spanish: para traerlos a Jerusalén
  alternatives_spanish:
  - para hacerlos venir a Jerusalén
  - para llevarlos a Jerusalén
  lexicon: HALOT
  rationale: El hiphil de בוא es causativo; «traerlos» comunica esa causación de modo natural en español. «Llevarlos» sería posible, pero «traerlos» se ajusta mejor al movimiento hacia Jerusalén desde la perspectiva de los organizadores.
- source_word: לַעֲשֹׂת חֲנֻכָּה
  english_pob_choice: to celebrate the dedication
  chosen_spanish: para celebrar la dedicación
  alternatives_spanish:
  - para hacer la dedicación
  - para realizar la dedicación
  lexicon: HALOT
  rationale: Aunque literalmente es «hacer una dedicación», en español «celebrar la dedicación» expresa con naturalidad el sentido ceremonial del contexto, manteniendo el evento sin sonar mecánico.
- source_word: וְשִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: HALOT
  rationale: שִׂמְחָה abarca alegría/regocijo. «Alegría» es claro y natural en español; no fuerza un matiz devocional que el término no exige por sí mismo.
- source_word: וּבְתוֹדוֹת
  english_pob_choice: with thanksgivings
  chosen_spanish: con acciones de gracias
  alternatives_spanish:
  - con agradecimientos
  - con gracias
  lexicon: HALOT
  rationale: תּוֹדוֹת es plural de acción de gracias/agradecimiento. «Acciones de gracias» preserva el plural y el matiz litúrgico sin reducirlo a una simple expresión genérica de gratitud.
- source_word: וּבְשִׁיר
  english_pob_choice: and with song
  chosen_spanish: y con cántico
  alternatives_spanish:
  - y con canto
  - y con canción
  lexicon: HALOT
  rationale: שִׁיר es un sustantivo de canción/canto. «Cántico» es una opción digna y bíblica en español que mantiene el sustantivo y evita la lectura demasiado amplia de «canto» como acto general.
- source_word: מְצִלְתַּיִם
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - platillos
  - címbalos musicales
  lexicon: HALOT
  rationale: Es el equivalente usual del instrumento. «Címbalos» conserva la tradición léxica y la referencia instrumental precisa.
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - liras
  - arpas o liras
  lexicon: HALOT
  rationale: נֵבֶל designa un instrumento de cuerda cuyo equivalente exacto es incierto. La POB inglesa opta por «harps» para distinguirlo de כִּנּוֹרוֹת; en español «arpas» cumple esa misma función diferenciadora, aunque la distinción antigua no sea totalmente segura.
- source_word: וּבְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: y liras
  alternatives_spanish:
  - y arpas
  - y instrumentos de cuerda
  lexicon: HALOT
  rationale: 'כִּנּוֹר suele rendirse «lira» en español bíblico. Traducirlo así permite diferenciarlo de נְבָלִים, como hace la POB inglesa con «harps» y «lyres». '
theological_decisions:
- issue: Cómo traducir חֲנֻכָּה en un contexto de ceremonia pública
  english_pob_reading: to celebrate the dedication
  chosen_spanish_reading: celebrar la dedicación
  alternative_spanish_readings:
  - hacer la dedicación
  - realizar la dedicación
  rationale: 'No hay una tensión doctrinal aquí, pero sí una decisión hermenéutica: el hebreo usa un verbo genérico («hacer») con un sustantivo ceremonial. En español conviene expresar el acto como celebración sin perder el sustantivo «dedicación» que el texto exige.'
  doctrine_reference: Uso bíblico de ceremonias de dedicación; sentido lexical/cultural del pasaje
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la revisión más reciente de la POB en inglés, que solo añadió comas para mejorar la coordinación. No se requiere nota textual adicional en español para este versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton ni un equivalente contextual directo.
  - Se evitó «SEÑOR» como convención de ocultamiento, conforme al criterio del proyecto.
  - 'Se usó terminología bíblica natural y consistente: «levitas», «acciones de gracias», «címbalos», «arpas» y «liras».'
  - No se incluyeron notas al pie porque no hay marcador anclado necesario en el texto español y se evitó crear ambigüedad no marcada.
