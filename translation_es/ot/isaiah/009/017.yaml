translation:
  language: es
  text: Porque la maldad arde como fuego; consume espino y zarza, y enciende los matorrales del bosque, y se arremolinan[a] en una columna de humo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «suben arremolinándose en humo ascendente». El hebreo de la cláusula final es difícil; la traducción sigue el sentido probable del humo que asciende en remolinos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָעֲרָה
  english_pob_choice: burns
  chosen_spanish: arde
  alternatives_spanish:
  - quema
  - está ardiendo
  lexicon: HALOT
  rationale: 'El perfecto hebreo con valor vívido se traduce de forma natural en español con presente: ''arde''. Conserva la imagen de fuego activo sin forzar una perífrasis menos idiomática.'
- source_word: רִשְׁעָה
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la impiedad
  - la perversidad
  lexicon: HALOT
  rationale: '''Maldad'' comunica bien el campo moral del término y funciona de manera fluida en español. Mantiene la abstracción personificada que actúa como sujeto del verbo.'
- source_word: שָׁמִיר וָשַׁיִת
  english_pob_choice: brier and thorn
  chosen_spanish: espino y zarza
  alternatives_spanish:
  - zarzas y espinos
  - espinos y cardos
  lexicon: HALOT
  rationale: La pareja hebrea designa vegetación espinosa y difícil de precisar botánicamente. 'Espino y zarza' preserva el paralelismo y la imagen de maleza áspera sin sobreespecificar especies.
- source_word: תֹּאכֵל
  english_pob_choice: it devours
  chosen_spanish: consume
  alternatives_spanish:
  - devora
  - se come
  lexicon: HALOT
  rationale: '''Consume'' mantiene el sentido figurado de fuego que devora o arrasa y es natural en español bíblico contemporáneo.'
- source_word: וַתִּצַּת
  english_pob_choice: kindles
  chosen_spanish: enciende
  alternatives_spanish:
  - prende
  - prende fuego a
  lexicon: HALOT
  rationale: 'El verbo causativo pide una forma que exprese ''prender fuego''. ''Enciende'' conserva la progresión del versículo: el fuego pasa del matorral a los bosques.'
- source_word: סִבְכֵי הַיַּעַר
  english_pob_choice: the thickets of the forest
  chosen_spanish: los matorrales del bosque
  alternatives_spanish:
  - las espesuras del bosque
  - los matorrales del monte
  lexicon: HALOT
  rationale: סבך apunta a vegetación densa y entrelazada; 'matorrales del bosque' transmite esa idea con claridad en español moderno.
- source_word: וַיִּתְאַבְּכּוּ
  english_pob_choice: they swirl upward
  chosen_spanish: se arremolinan
  alternatives_spanish:
  - suben arremolinándose
  - se elevan en torbellino
  lexicon: HALOT
  rationale: El verbo es difícil; la imagen probable es de humo que asciende con movimiento de remolino. 'Se arremolinan' conserva el dinamismo visual sin fijar de más el matiz exacto.
- source_word: גֵּאוּת עָשָׁן
  english_pob_choice: in a column of smoke
  chosen_spanish: en una columna de humo
  alternatives_spanish:
  - en humo que asciende
  - en una nube de humo
  lexicon: HALOT
  rationale: La expresión final describe el ascenso y la forma elevada del humo. 'Columna de humo' reproduce bien la imagen resultante y sigue de cerca la decisión inglesa.
theological_decisions:
- issue: Retener el tono profético de juicio mediante la personificación de la maldad como fuego
  english_pob_reading: Wickedness burns like a fire; ...
  chosen_spanish_reading: La maldad arde como fuego; ...
  alternative_spanish_readings:
  - La impiedad arde como fuego; ...
  - La perversidad arde como fuego; ...
  rationale: El hebreo presenta la maldad como sujeto activo que consume y enciende. La formulación española conserva esa personificación sin suavizarla ni moralizarla en exceso.
  doctrine_reference: Juicio profético en Isaías 9:17
translation_notes:
  revision_awareness: El inglés revisado eliminó el sujeto repetido antes de 'kindles' y cambió 'roll upward' por 'swirl upward'. La versión española refleja esa revisión con una sola cláusula coordinada antes de 'enciende' y con 'se arremolinan', que preserva mejor la imagen del humo ascendiendo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió 'maldad' para רִשְׁעָה por claridad y naturalidad; 'perversidad' queda como alternativa si se quisiera un matiz más intenso.
  - 'Se preserva el paralelismo de imágenes de fuego: arder, consumir, encender, y finalmente humo ascendiendo.'
