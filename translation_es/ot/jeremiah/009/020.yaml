translation:
  language: es
  text: Porque la muerte ha subido por nuestras ventanas; ha entrado en nuestros palacios, para arrebatar a los niños[a] de fuera, y a los jóvenes de las calles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los infantes» o «los pequeños». El hebreo עוֹלָל puede designar a un niño muy pequeño; en este contexto también puede tener sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «de las plazas». El término hebreo puede referirse a lugares amplios y públicos de la ciudad, no solo a calles en sentido estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el lamento precedente. «Porque» conserva el valor causal/explicativo de forma natural en español.
- source_word: עָלָה
  english_pob_choice: has climbed in
  chosen_spanish: ha subido
  alternatives_spanish:
  - ha escalado
  - ha entrado subiendo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «subió/ascendió»; en español «ha subido» conserva la imagen sin forzar una calca extraña. La metáfora de invasión sigue activa por el contexto de «ventanas».
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Traducción directa del sustantivo. Mantiene la personificación de la muerte como intrusa.
- source_word: בְּחַלּוֹנֵינוּ
  english_pob_choice: in through our windows
  chosen_spanish: por nuestras ventanas
  alternatives_spanish:
  - a través de nuestras ventanas
  - en nuestras ventanas
  lexicon: HALOT
  rationale: El sintagma indica entrada por medio de las ventanas; «por nuestras ventanas» es natural en español y conserva la idea de paso/entrada. La preposición «por» permite una imagen fluida sin perder concreción.
- source_word: בָּא
  english_pob_choice: has entered
  chosen_spanish: ha entrado
  alternatives_spanish:
  - ha venido
  - ha ingresado
  lexicon: HALOT
  rationale: Refuerza la imagen de invasión ya expresada por el verbo anterior. «Ha entrado» es idiomático con «nuestros palacios».
- source_word: בְּאַרְמְנוֹתֵינוּ
  english_pob_choice: our palaces
  chosen_spanish: nuestros palacios
  alternatives_spanish:
  - nuestros palacios fortificados
  - nuestros alcázares
  lexicon: HALOT
  rationale: «ארמון» normalmente denota palacio o residencia real/alta. «Nuestros palacios» es la equivalencia transparente y fiel.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para cortar
  alternatives_spanish:
  - para destruir
  - para extirpar
  lexicon: HALOT
  rationale: El hifil de כרת conserva la fuerza de «cortar»; en este contexto expresa la eliminación de la población joven. «Para cortar» mantiene la crudeza lexical sin suavizarla con «destruir».
- source_word: עוֹלָל
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los infantes
  lexicon: HALOT
  rationale: El término puede abarcar un niño muy pequeño o, en sentido colectivo, «niños». El contexto y la revisión inglesa favorecen el plural colectivo; «los niños» preserva esa amplitud sin especificar más de lo que el hebreo exige.
- source_word: מִחוּץ
  english_pob_choice: from outside
  chosen_spanish: de afuera
  alternatives_spanish:
  - desde afuera
  - del exterior
  lexicon: HALOT
  rationale: Con «cortar» y «niños», la frase indica el ámbito externo del cual son apartados. «De afuera» es natural y mantiene el contraste espacial.
- source_word: בַּחוּרִים
  english_pob_choice: the young men
  chosen_spanish: a los jóvenes
  alternatives_spanish:
  - a los muchachos
  - a los varones jóvenes
  lexicon: HALOT
  rationale: El plural masculino señala jóvenes en edad de vigor/servicio. «A los jóvenes» comunica el grupo de forma clara y amplia en español.
- source_word: מֵרְחֹבוֹת
  english_pob_choice: from the streets
  chosen_spanish: de las calles
  alternatives_spanish:
  - de las plazas
  - de los espacios públicos
  lexicon: HALOT
  rationale: El término puede referirse a lugares anchos o plazas públicas; la opción inglesa tomó «streets» como la forma más natural. En español, «de las calles» conserva esa naturalidad y el contraste con «de afuera».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó עוֹלָל a un sentido colectivo/plural («children») y simplificó el paralelismo con בַּחוּרִים. La versión española sigue esa lectura colectiva con «los niños» y mantiene el contraste poético con «los jóvenes».
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió una formulación sobria y literal-idiomática para preservar la personificación de la muerte y el paralelismo hebreo.
  - «Los niños» mantiene la amplitud semántica de עוֹלָל sin fijarlo demasiado en «infantes».
