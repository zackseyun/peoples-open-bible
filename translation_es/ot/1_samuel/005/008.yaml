revisions:
- from: 'Entonces enviaron y reunieron a todos los señores de los filisteos junto a ellos, y dijeron: «¿Qué haremos con el arca del Dios de Israel?» Y dijeron: «Que el arca del Dios de Israel sea llevada a Gat[a]». Así llevaron el arca del Dios de Israel alrededor.'
  to: 'Entonces enviaron y reunieron a todos los señores de los filisteos ante ellos, y dijeron: «¿Qué haremos con el arca del Dios de Israel?». Y dijeron: «Que el arca del Dios de Israel sea llevada a Gat[a]». Entonces trasladaron el arca del Dios de Israel a Gat.'
  rationale: Se corrige el final para evitar el español confuso «alrededor» y expresar claramente el traslado del arca a Gat, que es el sentido contextual del hebreo y de la auditoría inglesa. También se mejora la naturalidad de «junto a ellos» a «ante ellos». Se mantiene la nota léxica alternativa sobre el verbo de movimiento.
