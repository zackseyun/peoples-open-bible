review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del versículo está bien alineada con el hebreo y con el audit trail inglés: el carácter habitual de las acciones de Job, el sentido cultual de «consagraba» y «holocaustos», y la idea de correspondencia numérica se conservan adecuadamente. Sin embargo, el punto clave וּבֵרֲכוּ אֱלֹהִים no debe quedarse en el texto principal como «han bendecido a Dios», porque el propio POB inglés decidió correctamente verter el sentido contextual eufemístico como «cursed God» y dejar la forma literal en nota. Además, el marcador [a] está mal anclado: aparece tras «terminado» pero la nota corresponde a la frase sobre «bendecir/maldecir» a Dios.'
  spanish_quality_summary: El español es en general claro y digno. No obstante, la colocación de la nota crea confusión, y «han bendecido a Dios» en el cuerpo del texto resulta gravemente engañoso para lectores hispanos, porque suena piadoso donde el contexto exige impiedad. También conviene ajustar «en su corazón» a «en sus corazones» para corresponder más naturalmente al plural «mis hijos», aunque el singular colectivo no sea imposible.
  glossary_alignment: No hay conflicto con los términos base del proyecto salvo en la decisión teológica-lexical sobre ברך con Dios. El POB documentó que el sentido en el texto principal debe ser «maldecir»/«cursed», con nota para la forma literal «bendecir». Esa decisión debe mantenerse también en español. Los demás términos («Dios», «holocaustos», «consagraba») están alineados.
  issues:
  - severity: high
    issue: El texto principal traduce וּבֵרֲכוּ אֱלֹהִים como «han bendecido a Dios».
    rationale: Esto contradice la decisión documentada del POB inglés, que vierte el sentido contextual eufemístico como «cursed God» en el cuerpo del texto. En español, dejar «bendecido» en el texto principal induce una lectura opuesta al sentido del pasaje.
  - severity: high
    issue: La nota [a] está anclada a «terminado» en vez de a la frase sobre «maldecir/bendecir» a Dios.
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. La nota actual no corresponde al lugar donde está insertada, lo que rompe la trazabilidad y confunde al lector.
  - severity: low
    issue: «en su corazón» suena menos natural con sujeto plural que «en sus corazones».
    rationale: Aunque el singular colectivo puede defenderse, el plural comunica con mayor claridad en español la interioridad de «mis hijos» y refleja mejor la lectura habitual del giro.
  revised_spanish_text: 'Y cuando los días del banquete habían terminado, Job enviaba y los consagraba; se levantaba muy de mañana y ofrecía holocaustos según el número de todos ellos. Porque Job decía: «Quizá mis hijos han pecado y han maldecido a Dios[a] en sus corazones». Así hacía Job continuamente.'
  revised_footnotes:
