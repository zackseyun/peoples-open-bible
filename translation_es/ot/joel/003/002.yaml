translation:
  language: es
  text: Y también sobre los esclavos y sobre las esclavas[a], en aquellos días derramaré mi Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los esclavos y las siervas». Los términos hebreos denotan personas, hombres y mujeres, en estado servil; aquí se usa «esclavos/esclavas» para conservar esa realidad social.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And even
  chosen_spanish: Y aun
  alternatives_spanish:
  - Y también
  - Aun
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la conjunción y el matiz enfático de גַם; en español, «y aun» reproduce bien la inclusión sorprendente sin sonar forzado.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - en
  lexicon: HALOT
  rationale: Con el verbo de derramar, «sobre» mantiene la imagen de efusión dirigida hacia personas, de modo más natural que un calco como «en».
- source_word: הָעֲבָדִים
  english_pob_choice: the male slaves
  chosen_spanish: los esclavos varones
  alternatives_spanish:
  - los esclavos
  - los siervos varones
  - los varones esclavos
  lexicon: HALOT
  rationale: עֲבָדִים denota personas en estado servil; «esclavos» preserva esa fuerza social, y «varones» explicita el contraste con el femenino siguiente.
- source_word: הַשְּׁפָחוֹת
  english_pob_choice: the female slaves
  chosen_spanish: las esclavas
  alternatives_spanish:
  - las esclavas
  - las siervas
  - las esclavas mujeres
  lexicon: HALOT
  rationale: El término femenino paralelo designa mujeres en estado servil; «esclavas» conserva la correspondencia léxica y la realidad de dependencia, más fuerte que «siervas».
- source_word: בַּיָּמִים הָהֵמָּה
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: HALOT
  rationale: Es la equivalencia temporal idiomática más natural en español para la fórmula profética, sin alterar su referencia escatológica o futura.
- source_word: אֶשְׁפּוֹךְ
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - derramaré
  - vaciaré
  lexicon: HALOT
  rationale: En español bíblico, «derramar» transmite mejor la metáfora de efusión abundante que «pour out»; evita una literalidad menos natural sin perder la imagen.
- source_word: אֶת רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  lexicon: HALOT
  rationale: En este contexto profético, el referente es el Espíritu de Dios; la mayúscula señala el referente personal/divino sin introducir contenido ajeno al texto.
theological_decisions:
- issue: Renderización de los términos sociales עֲבָדִים / שְׁפָחוֹת
  english_pob_reading: male slaves / female slaves
  chosen_spanish_reading: esclavos varones / esclavas
  alternative_spanish_readings:
  - siervos / siervas
  - esclavos / esclavas
  rationale: La pareja hebrea subraya estado servil y diferenciación de género. «Esclavos» preserva mejor el peso social que «siervos», y «varones» explicita el contraste que el texto mismo marca.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; criterio de preservar el sentido social cuando es saliente
- issue: Referente de רוּחִי
  english_pob_reading: my Spirit
  chosen_spanish_reading: mi Espíritu
  alternative_spanish_readings:
  - mi espíritu
  rationale: En Joel, el contexto apunta al don del Espíritu de Dios, no a mera disposición humana ni a «viento/aliento». La mayúscula es una convención interpretativa útil en español para reflejar ese referente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; preservación del referente contextual sin borrar la ambigüedad cuando existe
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada del hebreo y coincide con la revisión más reciente, que no requirió cambios. Se ha mantenido la prominencia de la pareja social/sexual y la metáfora de efusión divina, sin suavizar el término servil.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - «Espíritu» se capitaliza por el contexto profético y el referente divino, en línea con la auditoría inglesa.
  - Se preserva la fuerza de estado servil con «esclavos/esclavas», evitando la atenuación de «siervos» sin respaldo contextual.
