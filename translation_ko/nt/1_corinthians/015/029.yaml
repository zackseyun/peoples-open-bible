source:
  edition: SBLGNT
  text: Ἐπεὶ τί ποιήσουσιν οἱ βαπτιζόμενοι ὑπὲρ τῶν νεκρῶν; εἰ ὅλως νεκροὶ οὐκ ἐγείρονται, τί καὶ βαπτίζονται ὑπὲρ ⸀αὐτῶν;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/029.yaml
  text: Otherwise[a], what will those do who are being baptized on behalf of the dead? If the dead are not raised at all, why then are they being baptized on their behalf?
  footnotes:
  - marker: a
    text: Or 'for the dead,' 'because of the dead,' or less likely 'over the dead.' The Greek preposition can be understood in more than one way, and the exact practice Paul refers to is uncertain.
    reason: lexical_alternative
translation:
  language: ko
  text: 그렇지 않다면, 죽은 자들을 위하여 침례를 받는 사람들은 무엇을 하겠습니까? 만일 죽은 자들이 전혀 일으킴을 받지 않는다면, 그들이 어찌하여 그들을 위하여 침례를 받습니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 βαπτίζομαι ὑπὲρ τῶν νεκρῶν의 정확한 관습이 무엇이었는지에 대해 학자들의 해석이 갈리며, 본문은 이 관습을 명시적으로 옹호하지도 책망하지도 않는다.
    reason: cultural_note
lexical_decisions:
- source_word: βαπτιζόμενοι
  english_pob_choice: are being baptized
  chosen_korean: 침례를 받는 사람들
  alternatives_korean:
  - 세례를 받는 사람들
  lexicon: BDAG
  rationale: 헬라어 βαπτίζω의 본래 의미(잠금)에 충실하여 「침례」를 채택한다. 「세례」도 한국 전통에서 통용되나 본 번역은 원어 함의를 우선한다.
