review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y del POB inglés: mantiene la conexión explicativa, la fuerza deíctica de הִנֵּה, la expresión corporativa ''la casa de Israel'', la dispersión ''entre todas las naciones'' y la tensión entre sacudimiento y preservación. Sin embargo, dos elecciones debilitan la fidelidad de la imagen: ''haré temblar'' desplaza la metáfora de sacudir/agitar hacia temblor, y ''trozo compacto'' no representa bien la imagen concreta de צְרוֹר ni su función en la nota léxica.'
  spanish_quality_summary: El texto es generalmente claro, pero 'yo estoy mandando' suena poco natural en español bíblico fluido, 'como se agita en una criba' queda algo impersonal sin referente, y 'ni un solo trozo compacto' suena forzado e impropio del registro. Una leve revisión mejora naturalidad y precisión sin perder la compacidad del original.
  glossary_alignment: No hay conflictos con los términos doctrinales del proyecto. 'Casa de Israel' está bien preservado. La principal cuestión léxica es que נוע se representa mejor con 'sacudir' en este contexto de criba, y צְרוֹר conviene verterlo con un sustantivo concreto y natural como 'guijarro', manteniendo en nota las otras posibilidades ('grano', 'piedra').
  issues:
  - severity: medium
    issue: '''haré temblar'' para וַהֲנִעוֹתִי'
    rationale: Aunque comunica movimiento, 'temblar' introduce el matiz de temblor más que el de sacudir/agitar, y además rompe la coherencia con la comparación explícita de la criba.
  - severity: high
    issue: '''trozo compacto'' para צְרוֹר'
    rationale: Es demasiado abstracto y antinatural en español. El hebreo alude a un objeto pequeño y compacto dentro de una imagen física concreta; el POB inglés prefirió 'pebble' con nota de alternativas. En español debe mantenerse una imagen concreta y legible.
  - severity: low
    issue: '''yo estoy mandando'' suena poco idiomático'
    rationale: Preserva el participio, pero en español resulta más natural 'estoy dando la orden' o simplemente 'estoy ordenando'. La primera mantiene mejor la idea de mandato en curso.
  - severity: low
    issue: Ubicación del marcador [b]
    rationale: El marcador debe anclarse limpiamente al término pertinente sin interrumpir la lectura de modo extraño. En la revisión se integra directamente en la palabra anotada.
