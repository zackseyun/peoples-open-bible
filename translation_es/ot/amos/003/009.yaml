base_translation:
  language: en
  yaml_path: translation/ot/amos/003/009.yaml
  text: Proclaim to the citadels in Ashdod and to the citadels in the land of Egypt[a], and say, “Assemble on the mountains of Samaria, and see the many tumults within her[d][c][b], and the oppressions in her midst.”
  footnotes:
  - marker: a
    text: Or “palaces” for “citadels.” The Hebrew term can denote grand fortified residences.
    reason: lexical_alternative
  - marker: b
    text: Or “the hills of Samaria.”
    reason: lexical_alternative
  - marker: c
    text: Or “great unrest” / “many disturbances” for “many tumults.”
    reason: lexical_alternative
  - marker: d
    text: Or “acts of oppression”; the Hebrew may be read more abstractly, but “the oppressed” best fits the form and context.
    reason: alternative_reading
