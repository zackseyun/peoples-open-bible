translation:
  language: es
  text: 'De los hijos de Asaf: Zacur[a], José, Netanías y Asarela, hijos de Asaf, bajo la dirección de Asaf, que profetizaba bajo la dirección del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mano de Asaf ... por mano del rey». El hebreo expresa aquí agencia, supervisión o dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - A los hijos de
  lexicon: HALOT
  rationale: En un encabezado de lista, el prefijo ל con בני introduce pertenencia o categoría. «De los hijos de» suena natural en español y conserva el valor de clasificación del hebreo.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaph
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico es más natural y legible «Asaf» que la grafía inglesa «Asaph».
- source_word: זַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zacur
  alternatives_spanish:
  - Zaccur
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa al español, adaptando la grafía a la ortografía castellana sin alterar el referente.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma plenamente asentada en español.
- source_word: נְתַנְיָה
  english_pob_choice: Nethaniah
  chosen_spanish: Netanías
  alternatives_spanish:
  - Natanías
  - Netanía
  lexicon: HALOT
  rationale: Nombre propio; «Netanías» conserva la forma bíblica reconocible en español y refleja bien la base hebrea.
- source_word: אֲשַׂרְאֵלָה
  english_pob_choice: Asharelah
  chosen_spanish: Asarela
  alternatives_spanish:
  - Asharela
  - Asarela
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente al español, con forma más fluida y consistente con la ortografía española.
- source_word: בְּנֵי אָסָף
  english_pob_choice: the sons of Asaph
  chosen_spanish: hijos de Asaf
  alternatives_spanish:
  - los hijos de Asaf
  - la casa de Asaf
  lexicon: HALOT
  rationale: Se mantiene la repetición hebrea de la pertenencia a Asaf, pero en español la segunda mención funciona mejor sin artículo para evitar pesadez y preservar la estructura del registro.
- source_word: עַל יַד
  english_pob_choice: under the direction of
  chosen_spanish: bajo la dirección de
  alternatives_spanish:
  - por mano de
  - bajo la mano de
  lexicon: HALOT
  rationale: El idiomatismo hebreo puede expresar agencia o supervisión. «Bajo la dirección de» comunica con naturalidad el sentido administrativo sin ocultar la metáfora subyacente.
- source_word: הַנִּבָּא
  english_pob_choice: who prophesied
  chosen_spanish: el que profetizaba
  alternatives_spanish:
  - que profetizaba
  - el profeta
  lexicon: HALOT
  rationale: Se conserva el verbo «profetizar» para no suavizar la afirmación teológica del texto. La forma relativa mantiene la referencia a Asaf en un estilo natural en español.
- source_word: עַל יְדֵי הַמֶּלֶךְ
  english_pob_choice: under the direction of the king
  chosen_spanish: bajo la dirección del rey
  alternatives_spanish:
  - por orden del rey
  - bajo la mano del rey
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el matiz de autoridad mediada. «Dirección» transmite mejor que una simple instrumentalidad física el sentido del hebreo.
theological_decisions:
- issue: El sentido de 'profetizaba' en contexto levítico-musical
  english_pob_reading: Retain 'prophesied' in the main text for Asaph's inspired musical/ministerial activity.
  chosen_spanish_reading: Mantener «profetizaba» en el texto principal para la actividad inspirada de Asaf en su ministerio musical.
  alternative_spanish_readings:
  - cantaba inspiradamente
  - ejercía un ministerio profético
  rationale: El Cronista usa נבא para músicos del templo; no conviene reducirlo a simple ejecución musical. «Profetizaba» conserva la afirmación teológica y deja que el contexto ministerial explique su expresión concreta.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del idioma original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: Se incorporó la lectura revisada del audit trail al evitar el artículo repetido en «hijos de Asaf» y al conservar la simetría entre las dos frases con עַל יַד / עַל יְדֵי mediante «bajo la dirección de».
  spanish_consistency_notes:
  - Se usó «Asaf» en lugar de «Asaph» para uniformidad con el español bíblico.
  - Se preservó la repetición estructural del hebreo sin volverla demasiado rígida en castellano.
  - La nota [a] está anclada explícitamente en «Zacur[a]» para cumplir la validación de marcador presente en el texto.
