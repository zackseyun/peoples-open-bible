translation:
  language: es
  text: 'Estos son los nombres de los valientes que pertenecían a David: Josheb-basshebeth[a], un tahkemonita, jefe de los Tres[b]. Él era Adino el eznita[c], que blandió su lanza contra ochocientos caídos en una sola ocasión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de este versículo es difícil. 'Josheb-basshebeth' sigue el Texto Masorético; el pasaje paralelo en 1 Crónicas 11:11 dice 'Jasobeam, un hachmonita'.
    reason: textual_variant
  - marker: b
    text: O 'jefe de los Treinta', según algunos testigos antiguos e intérpretes; el Texto Masorético dice 'jefe de los Tres'.
    reason: alternative_reading
  - marker: c
    text: Hebreo 'Adino el eznita', una frase muy difícil. Muchos la entienden más bien como algo como 'que blandió su lanza' o 'que agitó su lanza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּבֹּרִים
  english_pob_choice: the mighty men
  chosen_spanish: los hombres valientes
  alternatives_spanish:
  - los valientes
  - los guerreros
  - los hombres poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים puede referirse a guerreros valientes o a hombres de gran proeza. En español, 'hombres valientes' conserva la fuerza militar sin sonar como un título técnico eclesiástico.
- source_word: אֲשֶׁר לְדָוִד
  english_pob_choice: who belonged to David
  chosen_spanish: que pertenecían a David
  alternatives_spanish:
  - que eran de David
  - que estaban con David
  lexicon: HALOT
  rationale: La relación con לְדָוִד expresa afiliación/pertenencia. 'Pertenecían a David' reproduce bien esa asociación sin implicar propiedad en sentido moderno fuerte.
- source_word: יֹשֵׁב בַּשֶּׁבֶת
  english_pob_choice: Josheb-basshebeth
  chosen_spanish: Josheb-basshebeth
  alternatives_spanish:
  - Josheb-basesebet
  - el que se sienta en el asiento
  lexicon: HALOT
  rationale: Siguiendo la decisión del POB en inglés, se preserva la forma masorética transliterada como nombre propio, ya que el hebreo es difícil y la armonización con Crónicas no se impone en el texto principal.
- source_word: תַּחְכְּמֹנִי
  english_pob_choice: a Tahkemonite
  chosen_spanish: un tahkemonita
  alternatives_spanish:
  - un hachmonita
  - el tahkemonita
  lexicon: HALOT
  rationale: Se translitera el gentilicio/patronímico con una forma española naturalizada en minúscula. Se evita sustituirlo por la forma paralela de Crónicas, que corresponde a otra tradición textual.
- source_word: רֹאשׁ הַשָּׁלִשִׁי
  english_pob_choice: chief of the Three
  chosen_spanish: jefe de los Tres
  alternatives_spanish:
  - cabeza de los Tres
  - jefe de la Treintena
  lexicon: HALOT
  rationale: La lectura masorética apunta a 'los Tres'. 'Jefe' comunica el sentido jerárquico de רֹאשׁ y mantiene la capitalización referencial del grupo elite, evitando una corrección al 'treinta' en el texto principal.
- source_word: עֲדִינוֹ הָעֶצְנוֹ
  english_pob_choice: Adino the Eznite
  chosen_spanish: Adino el eznita
  alternatives_spanish:
  - Adino el eznita, o bien 'que blandió su lanza'
  - el eznita Adino
  lexicon: HALOT
  rationale: La frase es oscura en hebreo. Se conserva la forma transmitida como nombre/título, porque el POB en inglés también retiene esa lectura en el texto principal y documenta la alternativa verbal en nota.
- source_word: עַל שְׁמֹנֶה מֵאוֹת חָלָל
  english_pob_choice: against eight hundred slain
  chosen_spanish: contra ochocientos caídos
  alternatives_spanish:
  - contra ochocientos muertos
  - contra ochocientos abatidos
  lexicon: HALOT
  rationale: חָלָל puede denotar 'muerto/caído en batalla'. 'Caídos' suena natural en español y conserva el matiz militar sin restringir innecesariamente el término a un tecnicismo forense.
- source_word: בְּפַעַם אֶחָד
  english_pob_choice: at one time
  chosen_spanish: en una sola ocasión
  alternatives_spanish:
  - de una vez
  - en un solo momento
  lexicon: HALOT
  rationale: La locución idiomática señala un único episodio. 'En una sola ocasión' es claro y solemne en español, y mantiene el valor temporal del hebreo.
- source_word: הוּא
  english_pob_choice: He was
  chosen_spanish: Él era
  alternatives_spanish:
  - Era él
  - Fue
  lexicon: HALOT
  rationale: El pronombre independiente introduce una identificación ulterior. 'Él era' conserva la progresión sintáctica de la frase sin sonar forzado en español.
theological_decisions:
- issue: Cómo reflejar la lista de guerreros sin suavizar el peso militar de גִּבּוֹרִים
  english_pob_reading: the mighty men
  chosen_spanish_reading: los hombres valientes
  alternative_spanish_readings:
  - los guerreros
  - los poderosos
  rationale: 'No hay una tensión doctrinal, pero sí lexical: el español debe sonar natural y a la vez preservar la referencia a guerreros de élite. ''Hombres valientes'' mantiene esa fuerza sin introducir una connotación devocional ajena al contexto.'
  doctrine_reference: Ninguna; decisión de registro y semántica léxica.
- issue: Tratamiento del pasaje textual difícil sobre Josheb-basshebeth y el paralelo de Crónicas
  english_pob_reading: preserve the Masoretic Text in transliteration and note the parallel in Chronicles
  chosen_spanish_reading: preservar la forma masorética transliterada en el texto principal
  alternative_spanish_readings:
  - armonizar con 1 Crónicas 11:11
  - reconstruir el nombre mediante conjetura
  rationale: La POB en inglés retiene la forma del Texto Masorético y documenta la variante en nota. En español conviene hacer lo mismo para no borrar la tensión textual ni fingir certeza donde el hebreo es discutido.
  doctrine_reference: Crítica textual; no doctrinal.
- issue: Cómo traducir רֹאשׁ הַשָּׁלִשִׁי sin imponer la lectura de 'treinta'
  english_pob_reading: chief of the Three
  chosen_spanish_reading: jefe de los Tres
  alternative_spanish_readings:
  - jefe de la Treintena
  - jefe de los treinta
  rationale: La lectura masorética y el audit trail del POB favorecen 'los Tres'. Traducir así preserva la tensión textual frente a las variantes antiguas y evita sustituirla por una tradición interpretativa distinta.
  doctrine_reference: Crítica textual; no doctrinal.
translation_notes:
  revision_awareness: 'Se siguió el audit trail de la POB en inglés sin introducir armonización con 1 Crónicas en el texto principal. Se preservaron las dos zonas de dificultad señaladas por el original: el nombre Josheb-basshebeth y la frase oscura Adino el eznita. También se mantuvo la lectura masorética ''jefe de los Tres'' frente a la variante ''treinta''.'
  spanish_consistency_notes:
  - Se mantuvo 'David' sin artículo posesivo para respetar la afiliación del hebreo.
  - Se usó mayúscula en 'Tres' por tratarse de un grupo identificado en la lista.
  - '''Lanza'' da una solución española natural para el objeto de combate indicado por la nota textual, aunque el verbo principal sigue el texto transmitido en la línea base.'
