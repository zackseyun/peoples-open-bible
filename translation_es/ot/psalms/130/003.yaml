translation:
  language: es
  text: Si tú, Yah[a], llevaras cuenta de las iniquidades, Señor, ¿quién podría mantenerse en pie?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé». El hebreo tiene יָהּ, la forma breve poética del nombre divino, distinta de אֲדֹנָי («Señor»).
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: HALOT
  rationale: La cláusula hebrea introduce una condición; «Si» reproduce de manera natural y fiel ese valor condicional en español.
- source_word: עֲוֺנוֹת
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - pecados
  - culpas
  - deudas
  lexicon: HALOT
  rationale: עָוֹן suele llevar el peso de culpa/iniquidad más que un simple «pecado». «Iniquidades» conserva mejor esa carga moral y judicial.
- source_word: תִּשְׁמָר
  english_pob_choice: should keep watch over
  chosen_spanish: guardar as cuenta de
  alternatives_spanish:
  - guardar
  - vigilar
  - llevar registro de
  lexicon: HALOT
  rationale: שׁמר significa «guardar/vigilar». En este contexto judicial, el sentido es mantener un registro o retener en cuenta las faltas; por eso «guardar cuenta de» comunica la imagen sin perderla en una paráfrasis excesiva.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yah
  - Señor
  lexicon: HALOT
  rationale: El texto hebreo tiene la forma breve poética יָהּ, distinta del tetragrámaton pleno. Sin embargo, en español de esta serie la forma establecida para el nombre divino es «Yahvé»; se preserva así la referencia al nombre propio de Dios con un registro lectormente reconocible.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Maestro
  lexicon: HALOT
  rationale: Aquí funciona como título divino en oración directa; «Señor» es la equivalencia española natural y sobria, sin convertirlo en un sustituto mecánico del nombre divino.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  - ¿quién podría
  lexicon: HALOT
  rationale: Es el pronombre interrogativo directo que introduce la pregunta retórica.
- source_word: יַעֲמֹד
  english_pob_choice: could stand
  chosen_spanish: podría mantenerse en pie
  alternatives_spanish:
  - podría estar en pie
  - podría permanecer de pie
  - podría resistir
  lexicon: HALOT
  rationale: עמד literalmente es «estar de pie/ponerse en pie». En este contexto de juicio, la expresión idiomática española «mantenerse en pie» transmite la idea de resistir y no caer bajo acusación.
theological_decisions:
- issue: Distinción entre el nombre breve יָהּ y el título אֲדֹנָי
  english_pob_reading: Render יָהּ as 'Yah' and אֲדֹנָי as 'Lord'
  chosen_spanish_reading: Mantener la distinción entre el nombre divino breve y el título de señorío, aunque en español el nombre poético se vierte con la forma usual «Yahvé» y el título con «Señor».
  alternative_spanish_readings:
  - «Yah» y «Señor»
  - «Señor» para ambos
  - «Yahvé» y «Mi Señor»
  rationale: El hebreo presenta dos designaciones distintas de Dios en la misma línea. La traducción conserva esa doble referencia sin fundirla; usar «Yahvé» para el nombre divino y «Señor» para el título es una decisión de estabilidad terminológica en español, no una nivelación del texto.
  doctrine_reference: Translation philosophy §1, §2; Contested terms table entry for יְהוָה YHWH
- issue: Sentido judicial de תִּשְׁמָר en el contexto del pecado
  english_pob_reading: Express as keeping watch/account over sins rather than merely noticing them
  chosen_spanish_reading: Expresar la idea de llevar cuenta de las iniquidades, no solo de verlas.
  alternative_spanish_readings:
  - guardar
  - vigilar
  - marcar
  - llevar registro de
  rationale: El punto del salmo no es mera observación, sino la retención de culpa ante Dios. «Guardar cuenta de» comunica la dimensión de cómputo judicial que el contexto exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se ajustó la redacción para que el condicional y la pregunta retórica sean naturales en español, conservando la imagen judicial de «guardar cuenta de» y evitando una nota sin anclaje en el texto. También se corrigió la forma del nombre divino para que el versículo quede listo para publicación sin marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene un tono bíblico sobrio y contemporáneo, sin calco excesivo del inglés.
  - «Señor» se usa para אֲדֹנָי como título divino; «Yahvé» se reserva para el nombre divino en la tradición de esta serie.
  - «Iniquidades» preserva el peso moral del plural hebreo.
  - «Mantenerse en pie» expresa la fuerza idiomática del juicio sin introducir vocabulario ajeno al verso.
