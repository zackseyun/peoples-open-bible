base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/018.yaml
  text: Then the king said to Doeg[a], “Turn and strike down the priests.” So Doeg the Edomite turned and struck down the priests, and on that day he put to death eighty-five men who wore a linen ephod.
  footnotes:
  - marker: a
    text: Or 'attack the priests' / 'fall upon the priests.' The Hebrew verb can denote violent assault more broadly; 'strike down' was chosen to fit the execution context while preserving the action before the summary statement that he 'put to death' eighty-five men.
    reason: lexical_alternative
