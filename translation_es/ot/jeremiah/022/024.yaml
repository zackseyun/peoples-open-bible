base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/024.yaml
  text: As I live[a], declares Yahweh, even if Coniah son of Jehoiakim, king of Judah, were a signet ring on my right hand[b], even from there I would tear you off.
  footnotes:
