    issue: עֲבָדֶיךָ se tradujo como 'tus esclavos'
    rationale: En este versículo la expresión es autodesignación deferencial ante un gobernante, no descripción de estatus jurídico. El audit trail inglés eligió 'your servants' precisamente por el contexto cortesano. En español, 'esclavos' sobrecarga el sentido y puede distorsionar la escena.
  - severity: medium
    issue: וַיֹּאמְרוּ se tradujo como 'Y les dijeron'
    rationale: El hebreo solo dice 'Y dijeron'. Aunque el destinatario se infiere por contexto, añadir 'les' introduce un elemento no expreso. 'Y dijeron' preserva mejor la formulación narrativa simple del original.
  revised_spanish_text: 'Y dijeron[a]: “Nosotros, tus siervos, somos doce hermanos, hijos de un solo hombre en la tierra de Canaán. Y he aquí, el menor está hoy con nuestro padre, y uno ya no está.”'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «y uno no está», una expresión eufemística que puede significar «ha desaparecido» o implicar muerte.'
    reason: lexical_alternative
