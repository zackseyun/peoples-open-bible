translation:
  language: es
  text: Y cuando oigas el sonido de marcha[a] en las copas de los árboles de bálsamo[b], entonces sal a la batalla, porque Dios ha salido delante de ti para golpear al campamento de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasos»; el hebreo puede referirse al sonido de marcha o de pasos.
    reason: lexical_alternative
  - marker: b
    text: O «árboles baca» o tradicionalmente «moreras»; la especie precisa indicada por el hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y será que cuando
  - Y sucederá que cuando
  lexicon: HALOT
  rationale: La construcción waw + היה introduce una cláusula temporal. En español, «Y cuando» comunica esa relación sin forzar un futuro perifrástico innecesario.
- source_word: כְּשָׁמְעֲךָ
  english_pob_choice: when you hear
  chosen_spanish: oigas
  alternatives_spanish:
  - cuando oigas
  - cuando hayas oído
  lexicon: HALOT
  rationale: 'El valor temporal se expresa de forma natural con el subjuntivo en español: «cuando oigas». Mantiene la inmediatez temporal sin añadir matices no explícitos.'
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: Aquí קוֹל designa un fenómeno audible ligado al movimiento, no una voz humana. «Sonido» es la equivalencia más clara y sobria.
- source_word: הַצְּעָדָה
  english_pob_choice: marching
  chosen_spanish: avance
  alternatives_spanish:
  - marcha
  - pasos
  - el sonido de pasos
  lexicon: HALOT
  rationale: En contexto militar, צעדָה se entiende como avance o marcha. «Avance» preserva la fuerza militar y fluye mejor en español que una expresión demasiado literal como «pasos».
- source_word: בְּרָאשֵׁי
  english_pob_choice: in the tops of
  chosen_spanish: en las copas de
  alternatives_spanish:
  - en las partes altas de
  - en la parte superior de
  lexicon: HALOT
  rationale: La idea locativa de בראשי se expresa de modo natural en español con «en las copas de» al hablar de árboles.
- source_word: הַבְּכָאִים
  english_pob_choice: the balsam trees
  chosen_spanish: los árboles de bálsamo
  alternatives_spanish:
  - los árboles baca
  - los moreros
  lexicon: HALOT
  rationale: El término hebreo nombra una especie arbórea cuya identificación precisa es incierta. «Árboles de bálsamo» mantiene una identificación común sin afirmar más de lo que permite el texto.
- source_word: תֵּצֵא בַמִּלְחָמָה
  english_pob_choice: go out to battle
  chosen_spanish: sal a la batalla
  alternatives_spanish:
  - saldrás a la batalla
  - sal a pelear
  lexicon: HALOT
  rationale: יצא conserva la idea de salir/ir hacia un combate. «Sal a la batalla» reproduce bien el mandato militar y suena natural en español.
- source_word: יָצָא הָאֱלֹהִים לְפָנֶיךָ
  english_pob_choice: God has gone out before you
  chosen_spanish: Dios ha salido delante de ti
  alternatives_spanish:
  - Dios ha ido delante de ti
  - Dios sale delante de ti
  lexicon: HALOT
  rationale: El perfecto comunica una acción ya iniciada con efecto presente. «Ha salido delante de ti» conserva tanto la iniciativa divina como la imaginería militar de ir al frente.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike down
  chosen_spanish: para herir
  alternatives_spanish:
  - para golpear
  - para derribar
  - para destruir
  lexicon: HALOT
  rationale: El hiphil de נכה puede abarcar herir, golpear o derrotar. Dado el paralelo con el ejército enemigo, «herir» retiene la fuerza del verbo sin sobreespecificar el resultado más allá del hebreo.
- source_word: מַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the camp of the Philistines
  chosen_spanish: al campamento de los filisteos
  alternatives_spanish:
  - al campamento filisteo
  - al ejército de los filisteos
  lexicon: HALOT
  rationale: מַחֲנֶה es literalmente «campamento». «Al campamento de los filisteos» sigue de cerca el hebreo y preserva la metonimia militar.
theological_decisions:
- issue: הָאֱלֹהִים como sujeto singular
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: Aunque אֱלֹהִים es morfológicamente plural, el verbo singular y el contexto de Israel señalan al Dios único. En español, «Dios» evita una lectura errónea sin perder el dato gramatical del hebreo.
  doctrine_reference: Monoteísmo bíblico; concordancia singular del verbo con אֱלֹהִים en este contexto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y el cierre auditado del POB en inglés. Se conservan las decisiones clave: cláusula temporal inicial, señal sonora en los árboles, mandato militar inmediato y causa explicativa con Dios como sujeto singular. Se mantiene la incertidumbre botánica mediante nota al pie, sin imponer una identificación más precisa que la que permite el texto.'
  spanish_consistency_notes:
  - Se usó «Dios» para הָאֱלֹהִים por referencia inequívoca al Dios de Israel en singular.
  - Se prefirió «salir»/«sal a la batalla» para conservar el movimiento militar del hebreo.
  - Se evitó «SEÑOR» porque aquí el hebreo no usa el tetragrámaton en esta forma, sino אֱלֹהִים.
  - «Árboles de bálsamo» es una solución publicable y transparente para el término botánico incierto, con alternativa explícita en nota.
