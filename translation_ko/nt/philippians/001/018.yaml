id: PHP.1.18
reference: Philippians 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τί γάρ; πλὴν ⸀ὅτι παντὶ τρόπῳ, εἴτε προφάσει εἴτε ἀληθείᾳ, Χριστὸς καταγγέλλεται, καὶ ἐν τούτῳ χαίρω· ἀλλὰ καὶ χαρήσομαι,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/018.yaml
  text: What then? Only that in every way, whether in pretense or in truth, Messiah is being proclaimed, and in this I rejoice. Yes, and I will rejoice.
translation:
  language: ko
  text: 그러니 어떻습니까? 어떤 방식으로든, 곧 거짓된 동기[a]로든 진실로든, 메시아가 선포되고 있다는 것, 오직 이것만은 분명하니, 나는 이로 인하여 기뻐합니다. 참으로, 앞으로도 기뻐할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「구실로」 또는 「가식으로」. 헬라어 πρόφασις는 표면적·위장된 동기를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ
  english_pob_choice: What then?
  chosen_korean: 그러니 어떻습니까?
  alternatives_korean:
  - 그러면 어떠합니까?
  - 그래서 어찌하랴?
  lexicon: BDAG
  rationale: 바울의 짧은 수사적 전환을 한국어 의문문 「그러니 어떻습니까?」로 자연스럽게 옮긴다.
- source_word: πλὴν ὅτι
  english_pob_choice: Only that
  chosen_korean: 오직 ~만은 분명하니
  alternatives_korean:
  - 다만 ~이라는 것
  - 그러나 ~이라는 것
  lexicon: BDAG
  rationale: 동기 여부와 무관하게 가장 중요한 사실로 좁히는 πλήν의 한정 기능을 「오직 ~만은 분명하니」로 자연스럽게 살린다.
- source_word: παντὶ τρόπῳ
  english_pob_choice: in every way
  chosen_korean: 어떤 방식으로든
  alternatives_korean:
  - 모든 방식으로
  - 어떤 모양으로든
  lexicon: BDAG
  rationale: 분배적 여격을 자연스러운 한국어 「어떤 ~으로든」으로 옮긴다.
- source_word: προφάσει
  english_pob_choice: in pretense
  chosen_korean: 거짓된 동기
  alternatives_korean:
  - 구실
  - 가식
  - 거짓 명분
  lexicon: BDAG
  rationale: πρόφασις는 표면적·위장된 동기를 가리킨다. 「거짓된 동기」가 그 함의를 자연스럽게 담는다.
- source_word: ἀληθείᾳ
  english_pob_choice: in truth
  chosen_korean: 진실로
  alternatives_korean:
  - 진정으로
  - 참되게
  lexicon: BDAG
  rationale: προφάσει와의 대조를 간결하게 보존하기 위해 「진실로」로 옮긴다.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: καταγγέλλεται
  english_pob_choice: is being proclaimed
  chosen_korean: 선포되고 있다
  alternatives_korean:
  - 전파되고 있다
  - 알려지고 있다
  lexicon: BDAG
  rationale: 현재 수동을 살려 「선포되고 있다」로 진행성을 보존한다.
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_korean: 이로 인하여
  alternatives_korean:
  - 이 일로
  - 이 때문에
  lexicon: BDAG
  rationale: 한국어로 자연스러운 인과적 「이로 인하여」가 「이 안에서」보다 흐름이 자연스럽다.
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_korean: 기뻐합니다
  alternatives_korean:
  - 즐거워합니다
  lexicon: BDAG
  rationale: 바울의 신학적 기쁨의 무게를 「기뻐하다」가 살린다.
- source_word: ἀλλὰ καὶ χαρήσομαι
  english_pob_choice: Yes, and I will rejoice
  chosen_korean: 참으로, 앞으로도 기뻐할 것입니다
  alternatives_korean:
  - 그뿐 아니라 나는 기뻐할 것입니다
  - 정녕 나는 계속 기뻐할 것입니다
  lexicon: BDAG
  rationale: ἀλλά + καί의 강조·추가 기능을 「참으로」와 「앞으로도」로 살린다. 미래 시제를 「~ 것입니다」로 옮긴다.
