- from: Porque él apartará a tu hijo de seguirme[a], y servirán a otros dioses; entonces la ira de Yahvé[b] se encenderá contra ustedes, y los destruirá pronto.
  to: Porque él apartará a tu hijo de seguirme[a], y servirán[b] a otros dioses; entonces la ira de Yahvé[c] se encenderá contra ustedes, y te destruirá pronto.
  rationale: Se corrige la cláusula final a singular («te destruirá») para ajustarse al sufijo hebreo y al inglés POB. Se añade la nota sobre el cambio de singular a plural en «servirán», ya que esa tensión sí está en el texto fuente y en la auditoría inglesa. Se conserva «Yahvé» conforme al estándar del proyecto.
