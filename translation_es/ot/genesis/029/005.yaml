translation:
  language: es
  text: 'Él les dijo: «¿Conocen a Labán, hijo de Nacor?» Ellos respondieron: «Lo conocemos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Conocemos», con el objeto implícito por el contexto; el español lo expresa con el pronombre «lo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Y él les dijo
  - Les dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español natural puede omitirse el enlace inicial sin perder secuencia. Se conserva el sujeto explícito para claridad narrativa, y el dativo לָהֶם queda bien reflejado en les.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona plural se expresa naturalmente con el dativo indirecto les. En el estilo bíblico español, 'les dijo' es claro y fiel.
- source_word: הֲיְדַעְתֶּם
  english_pob_choice: Do you know
  chosen_spanish: ¿Conocen a
  alternatives_spanish:
  - ¿Saben de
  - ¿Han conocido a
  lexicon: HALOT
  rationale: La pregunta busca conocimiento/acquaintance respecto de una persona. En español, 'conocer a' transmite mejor la relación personal que 'saber'. El plural formal de ustedes se adapta al interlocutor desconocido de la escena.
- source_word: לָבָן
  english_pob_choice: Laban
  chosen_spanish: Labán
  alternatives_spanish:
  - Laban
  lexicon: Nombres propios transliterados
  rationale: Se translitera el nombre propio al español como Labán, forma inteligible y tradicional en biblias españolas, manteniendo la identidad del personaje sin castellanizarlo indebidamente.
- source_word: בֶּן נָחוֹר
  english_pob_choice: son of Nahor
  chosen_spanish: hijo de Nacor
  alternatives_spanish:
  - descendiente de Nacor
  - el hijo de Nacor
  lexicon: HALOT
  rationale: בֶּן se mantiene en su sentido genealógico básico como 'hijo'. 'Nacor' sigue la transliteración hispana del nombre propio. No se amplía a 'descendiente' porque el texto presenta una identificación directa.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: They said
  chosen_spanish: Ellos respondieron
  alternatives_spanish:
  - Y dijeron
  - Ellos dijeron
  lexicon: HALOT
  rationale: El contexto muestra una respuesta a la pregunta, por lo que 'respondieron' comunica con naturalidad la función discursiva del verbo sin añadir contenido ajeno. La repetición narrativa del verbo de decir sigue presente.
- source_word: יָדָעְנוּ
  english_pob_choice: We know him
  chosen_spanish: lo conocemos
  alternatives_spanish:
  - sí, lo conocemos
  - conocemos a Labán
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hemos sabido / sabemos', con el objeto implícito. En español, la respuesta idiomática es 'lo conocemos', que conserva el sentido de familiaridad y evita una construcción artificial. Se puede añadir 'sí' como refuerzo conversacional sin alterar el contenido.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y el criterio del POB en inglés: mantiene la pregunta de conocimiento personal, conserva la respuesta breve y explicita en español el objeto implícito que en hebreo queda sobrentendido. Se evitó traducir mecánicamente desde el inglés, dando prioridad al valor relacional de יָדַע y a la fluidez bíblica natural en español.'
  spanish_consistency_notes:
  - Se usa Labán y Nacor como transliteraciones hispanas consistentes.
  - Se evita 'SEÑOR' o vocabulario teológico no pertinente; el versículo no contiene términos divinos.
  - Se mantiene el tono narrativo sobrio y directo, apto para lectura pública.
  - La respuesta 'lo conocemos' conserva la familiaridad implícita del hebreo sin sobreexplicar.
