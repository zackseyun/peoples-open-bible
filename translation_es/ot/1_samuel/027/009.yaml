review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría en lo esencial: David hiere/ataca el territorio, no deja vivo ni a hombre ni a mujer, toma ganado y bienes, y vuelve a Aquis. También preserva adecuadamente la nota alternativa para וְלֹא יְחַיֶּה. Sin embargo, dos elecciones españolas debilitan la fidelidad semántica: ''golpeó la tierra'' suena poco natural y puede sugerir golpear el suelo en vez de atacar/asolar un territorio; y ''la tierra'' aquí queda ambigua en español entre suelo/mundo/territorio.'
  spanish_quality_summary: El español es generalmente claro, pero 'golpeó la tierra' no es idiomático en este contexto narrativo y afecta la legibilidad. 'Luego regresó y vino a Aquis' es comprensible, aunque 'vino' desde la perspectiva del narrador es menos natural que 'fue a presentarse ante Aquis' o 'vino ante Aquis'; con todo, puede mantenerse si se quiere reflejar los dos verbos. El resto de la lista de botín suena natural y digna.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Los nombres y términos comunes están bien manejados. La principal cuestión léxica es אֶרֶץ: en este contexto conviene ''la región'' o ''el territorio'' antes que ''la tierra''. Para וְהִכָּה, ''atacó'' o ''asoló'' funciona mejor en español que ''golpeó'', sin caer en expansión excesiva.'
  issues:
  - severity: high
    issue: '''golpeó la tierra'' no representa bien וְהִכָּה אֶת הָאָרֶץ en español natural'
    rationale: Aunque 'struck the land' funciona en inglés, en español 'golpear la tierra' suena literalista y puede entenderse físicamente. El hebreo habla de una incursión violenta contra un territorio/población. 'Atacó la región' o 'asoló la región' comunica mejor el sentido sin sobreinterpretar.
  - severity: medium
    issue: '''la tierra'' es ambiguo para הָאָרֶץ'
    rationale: En este contexto no se refiere al suelo ni al planeta, sino al territorio/región donde vivían esos pueblos. 'La región' o 'el territorio' reduce ambigüedad y mejora la fidelidad contextual.
  - severity: low
    issue: '''vino a Aquis'' es menos natural en español narrativo'
    rationale: Es comprensible y refleja וַיָּבֹא, pero en español puede sonar marcado. Aun así, no constituye error grave; puede mantenerse si se desea conservar ambos verbos de movimiento.
  revised_spanish_text: David atacó la región y no dejó con vida[a] ni a hombre ni a mujer, y tomó ovejas, ganado, asnos, camellos y ropa. Luego regresó y vino a Aquis.
  revised_footnotes:
