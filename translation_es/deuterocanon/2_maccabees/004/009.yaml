  yaml_path: translation/deuterocanon/2_maccabees/004/009.yaml
  text: In addition to these things[a], he promised to register another fifty talents beyond the one hundred, if he were granted authority to establish for himself a gymnasium and an enrollment of young men[b], and to enroll those in Jerusalem as Antiochenes.
  footnotes:
