    issue: El texto principal dice «cincocientos/ cinquecientos cañas»
    rationale: 'Es un error morfológico en español. El numeral debe concordar con «cañas»: «quinientas cañas». Además, la inconsistencia ortográfica entre texto y decisiones léxicas muestra falta de control editorial.'
  - severity: medium
