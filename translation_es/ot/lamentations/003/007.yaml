translation:
  language: es
  text: Me ha cercado y no puedo salir; ha hecho pesada mi cadena[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «mi grillete de bronce» o simplemente «mi cadena». El término hebreo está relacionado con «bronce» y probablemente designa un instrumento metálico de sujeción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדַר
  english_pob_choice: has walled me in
  chosen_spanish: me ha cercado
  alternatives_spanish:
  - me ha cercado con un muro
  - me ha vallado
  - me ha encerrado
  lexicon: HALOT
  rationale: El verbo expresa cerrar o cercar con una barrera. «Me ha cercado» conserva la imagen de confinamiento sin volverla demasiado explicativa.
- source_word: בַּעֲדִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - alrededor de mí
  - a mi alrededor
  lexicon: HALOT
  rationale: Con גָּדַר, el pronombre ya comunica que el hablante queda encerrado; en español no es necesario repetir la preposición de modo literal.
- source_word: וְלֹא אֵצֵא
  english_pob_choice: so that I cannot get out
  chosen_spanish: para que no pueda salir
  alternatives_spanish:
  - y no puedo salir
  - de modo que no pueda salir
  - y no saldré
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y no salgo/no puedo salir». En español, «para que no pueda salir» expresa bien el efecto del cercado dentro de una construcción natural.
- source_word: הִכְבִּיד
  english_pob_choice: has made my chain heavy
  chosen_spanish: ha hecho pesado
  alternatives_spanish:
  - ha cargado
  - ha vuelto pesado
  - ha hecho gravoso
  lexicon: HALOT
  rationale: El hifil de כבד significa hacer pesado. Se mantiene la imagen concreta de peso sin añadir una interpretación que el texto no explicita.
- source_word: נְחָשְׁתִּי
  english_pob_choice: my chain
  chosen_spanish: mi grillete
  alternatives_spanish:
  - mi cadena
  - mi fetro de bronce
  - mi cadena de bronce
  lexicon: HALOT
  rationale: El término está relacionado con «bronce/cobre», pero el contexto favorece un instrumento de sujeción más que el material. «Grillete» preserva la idea de restricción; se evita fijar «bronce» en el cuerpo principal, en línea con la revisión inglesa.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente retiró «bronze» de la traducción principal de נְחָשְׁתִּי, pero mantuvo la relación léxica con el bronce en nota. La versión española refleja esa misma decisión: el texto principal dice «mi grillete», y la nota conserva la alternativa con «bronce».'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se evita «SEÑOR» y también una traducción demasiado tradicionalizante; el verso mantiene la imagen de confinamiento físico y peso.
  - '«Cercado» y «grillete» forman un par de imágenes coherentes: encierro externo y sujeción interna.'
