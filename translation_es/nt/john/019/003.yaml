translation:
  language: es
  text: 'Y se acercaban a él y le decían: «¡Salve[a], Rey de los judíos!» Y le daban bofetadas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saludos». El griego usa una fórmula de salutación formal en un contexto de burla.
    reason: lexical_alternative
  - marker: b
    text: O «le daban golpes» / «lo abofeteaban». La expresión griega es literalmente «le daban golpes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρχοντο πρὸς αὐτόν
  english_pob_choice: they came up to him
  chosen_spanish: se acercaban a él
  alternatives_spanish:
  - venían hacia él
  - se iban acercando a él
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o progresiva; «se acercaban» conserva ese matiz sin sonar forzado en español.
- source_word: ἔλεγον
  english_pob_choice: said
  chosen_spanish: le decían
  alternatives_spanish:
  - decían
  - seguían diciendo
  lexicon: BDAG
  rationale: El plural imperfecto en contexto de burla admite repetición. «Le decían» mantiene la naturalidad del diálogo y el destinatario implícito.
- source_word: Χαῖρε
  english_pob_choice: Hail
  chosen_spanish: ¡Salve!
  alternatives_spanish:
  - ¡Salud!
  - ¡Viva!
  lexicon: BDAG
  rationale: En un saludo real formal con tono irónico, «Salve» reproduce mejor la forma solemne y la carga burlona que «Saludos».
- source_word: ὁ βασιλεὺς τῶν Ἰουδαίων
  english_pob_choice: King of the Jews
  chosen_spanish: Rey de los judíos
  alternatives_spanish:
  - el Rey de los judíos
  lexicon: BDAG
  rationale: Se conserva el título directo y su peso político-mesiánico sin suavizarlo. En español el artículo puede omitirse naturalmente en la aclamación.
- source_word: ἐδίδοσαν αὐτῷ ῥαπίσματα
  english_pob_choice: they were slapping him
  chosen_spanish: le daban bofetadas
  alternatives_spanish:
  - le abofeteaban
  - le daban golpes
  lexicon: BDAG
  rationale: ῥαπίσματα son golpes dados con la mano; «bofetadas» comunica el sentido con naturalidad y mantiene la idea de agresión repetida del imperfecto.
theological_decisions:
- issue: Carácter de la aclamación a Jesús
  english_pob_reading: Render the greeting as mocking royal homage rather than sincere salutation.
  chosen_spanish_reading: La aclamación se traduce como homenaje real burlón, no como saludo respetuoso.
  alternative_spanish_readings:
  - 'un saludo neutral: «Saludos, Rey de los judíos»'
  - una fórmula meramente literal sin captar la ironía
  rationale: El contexto de la pasión exige preservar la ironía degradante de la escena. «Salve» mantiene la solemnidad del saludo y, en este pasaje, su tono sarcástico.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve meaning in context'
translation_notes:
  revision_awareness: Seguí el cierre revisado del audit trail para ῥαπίσματα como «slapping him», pero en español opté por «le daban bofetadas» porque expresa con mayor naturalidad la agresión repetida y la fuerza idiomática del sustantivo griego. También conservé el imperfecto narrativo con «se acercaban» y «le decían», en línea con la nota de iteración del griego.
  spanish_consistency_notes:
  - Se mantiene «judíos» en minúscula, según el uso referencial del título en la frase.
  - Se prefirió un registro digno y directo, evitando calco rígido de la estructura inglesa.
  - Los marcadores [a] y [b] aparecen exactamente en el texto principal, ligados a los dos términos con alternativas documentadas.
