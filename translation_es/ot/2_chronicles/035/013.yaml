base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/013.yaml
  text: They cooked the Passover in the fire according to the ordinance[a], and they boiled the holy offerings in pots, kettles, and bowls, and quickly brought them to all the people.
  footnotes:
  - marker: a
    text: Or, more specifically, 'roasted the Passover lamb in the fire.' The Hebrew verb can mean 'cook' broadly, but Passover law required roasting rather than boiling (cf. Exod 12:8–9).
