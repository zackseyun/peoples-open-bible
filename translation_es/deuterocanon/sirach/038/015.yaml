translation:
  language: es
  text: Quien peca ante su Hacedor se mostrará rebelde[a] ante un médico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «caerá en manos de un médico». El hebreo dice: «se mostrará rebelde ante un médico».'
    reason: alternative_reading
lexical_decisions:
- source_word: אשר
  english_pob_choice: Whoever
  chosen_spanish: Quien
  alternatives_spanish:
  - El que
  - Quienquiera que
  lexicon: HALOT
  rationale: La cláusula relativa generaliza un caso proverbial. «Quien» mantiene esa fuerza universal con naturalidad en español.
- source_word: חואט
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - hace mal
  - yerra
  lexicon: HALOT
  rationale: El verbo expresa pecado en sentido moral/religioso; «peca» conserva mejor esa carga que una formulación más débil.
- source_word: לפני
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial y relacional de לפני en este dicho sapiencial, sin forzar un matiz adversativo que el hebreo no exige.
- source_word: עושהו
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - el que lo hizo
  - su Creador
  lexicon: HALOT
  rationale: «Hacedor» conserva el tono sapiencial y la relación de creación implícita en עשה con sufijo, con un registro digno y comprensible.
- source_word: יתנכר
  english_pob_choice: will be defiant
  chosen_spanish: se mostrará desafiante
  alternatives_spanish:
  - se volverá como extraño
  - se apartará
  - actuará con hostilidad
  lexicon: HALOT
  rationale: El hitpael de נכר puede sugerir extrañamiento o conducta de forastero; el contexto con el médico favorece una actitud de resistencia o rechazo. «Se mostrará desafiante» comunica esa tensión sin borrar la ambigüedad básica del hebreo.
- source_word: רופא
  english_pob_choice: a physician
  chosen_spanish: un médico
  alternatives_spanish:
  - un médico[a]
  - un curandero
  - un sanador
  lexicon: HALOT
  rationale: «Médico» es el equivalente natural en español para el contexto de sabiduría y atención corporal. El indefinido hebreo queda bien reflejado con «un».
theological_decisions:
- issue: Divergencia hebreo-griego en la segunda cola
  english_pob_reading: 'Follow the extant Hebrew: ''will be defiant before a physician'''
  chosen_spanish_reading: 'Seguir el hebreo transmitido: «se mostrará desafiante delante de un médico»'
  alternative_spanish_readings:
  - «caerá en manos de un médico»
  - «caerá en manos de un médico» siguiendo el griego
  rationale: En Sirácida, el hebreo conservado tiene prioridad cuando está disponible y es confiable. Aquí el hebreo difiere del griego en la imagen final; por eso el texto principal sigue el hebreo y se preserva la lectura griega en nota para transparencia.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; mantener las alternativas textuales en notas cuando exista una divergencia significativa'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios. Se conserva la preferencia por el hebreo en la cola final y se refleja la divergencia griega solo en la nota.
  spanish_consistency_notes:
  - «Hacedor» mantiene el término preferido para עשה con sentido creador.
  - «Médico» se usa aquí por el contexto sanitario; no se reemplaza por «sanador» para no desplazar el matiz concreto del hebreo y del paralelo griego.
  - La nota a conserva la tensión textual entre hebreo y griego sin armonizarla artificialmente.
