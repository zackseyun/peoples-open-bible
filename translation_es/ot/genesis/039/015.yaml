    text: 'O: «alcé mi voz y llamé a gritos»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dejó su prenda conmigo»'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene fielmente el sentido del hebreo y del audit trail inglés, pero mejora la gramática y la naturalidad del español. 'Y cuando oyó' representa adecuadamente ויהי כשמעו sin calco pesado; 'levanté mi voz y grité' expresa con claridad los dos verbos hebreos; 'su prenda' conserva el singular concreto; y 'salió' evita un pleonasmo innecesario, manteniendo el movimiento de salida implícito en ויצא החוצה.
