translation:
  language: es
  text: 'Mi mano hizo todas estas cosas, y así todas estas cosas llegaron a ser, dice Yahvé. Pero en este fijaré mi mirada: en el pobre y contrito de espíritu[a], y en el que tiembla ante mi palabra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «afligido y quebrantado de espíritu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדִי עָשָׂתָה
  english_pob_choice: My hand made
  chosen_spanish: Mi mano hizo
  alternatives_spanish:
  - Mi mano ha hecho
  - Mi mano hizo/made
  lexicon: HALOT
  rationale: Se conserva la expresión antropomórfica y el acto completo de creación. En español, «hizo» comunica de manera natural la acción realizada por la mano de Yahvé sin diluir la fuerza del hebreo.
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: HALOT
  rationale: El deíctico plural remite a lo creado previamente; «cosas» explicita en español la referencia contextual que el hebreo deja implícita.
- source_word: וַיִּהְיוּ
  english_pob_choice: came to be
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - existieron
  - vinieron a ser
  lexicon: HALOT
  rationale: La frase mantiene la idea de existencia resultante de la acción creadora. «Llegaron a ser» preserva mejor el matiz de acontecer/existir que un simple «fueron».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito según la norma del proyecto. «Dice» es una fórmula profética natural en español y suficientemente solemne; no se sustituye por «SEÑOR».
- source_word: וְאֶל זֶה אַבִּיט
  english_pob_choice: But to this one I will look
  chosen_spanish: Pero a este miraré
  alternatives_spanish:
  - Y a éste miraré
  - Mas a este miraré
  - Pero a éste prestaré atención
  lexicon: HALOT
  rationale: «Mirar» conserva el hebraísmo de favor/atención divina sin sobreinterpretarlo. El contraste con la frase anterior se marca con «Pero».
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el humilde
  - el necesitado
  lexicon: HALOT
  rationale: Se mantiene el núcleo léxico «pobre», que en este contexto puede abarcar pobreza, aflicción o humildad espiritual. La ambigüedad se conserva para no cerrar demasiado el campo semántico.
- source_word: נְכֵה רוּחַ
  english_pob_choice: contrite in spirit
  chosen_spanish: contrito de espíritu
  alternatives_spanish:
  - quebrantado de espíritu
  - herido de espíritu
  - abatido de espíritu
  lexicon: HALOT
  rationale: En español, «contrito» comunica de forma compacta la idea de quebranto/humillación interior. Se evita añadir «y» para no dividir indebidamente la unidad de la frase hebrea.
- source_word: חָרֵד עַל דְּבָרִי
  english_pob_choice: the one who trembles at my word
  chosen_spanish: al que tiembla ante mi palabra
  alternatives_spanish:
  - el que tiembla por mi palabra
  - el que teme mi palabra
  - el que tiembla a causa de mi palabra
  lexicon: HALOT
  rationale: «Tiembla ante» expresa reverencia y temor frente a la palabra divina de modo natural en español. Se mantiene el singular «palabra» como en el hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y el proyecto español adopta «Yahvé» como forma principal. Se evita el sustituto litúrgico «SEÑOR» para conservar transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Posible tensión semántica de עָנִי + נְכֵה רוּחַ
  english_pob_reading: the poor and contrite in spirit
  chosen_spanish_reading: el pobre y contrito de espíritu
  alternative_spanish_readings:
  - el afligido y quebrantado de espíritu
  - el humilde y contrito de espíritu
  rationale: El hebreo permite una franja semántica entre pobreza material, aflicción y humildad. La redacción conserva esa tensión sin reducirla exclusivamente a una virtud interior ni exclusivamente a una condición social.
  doctrine_reference: HALOT; contexto poético-profético de Isaías 66:2
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase «contrito[a] de espíritu». No se introdujeron notas sin anclaje en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la política española del proyecto para יְהוָה.
  - Se evitó «SEÑOR» y se mantuvo la transparencia del nombre divino.
  - Se preservó la repetición enfática de «todas estas cosas» para reflejar el paralelismo hebreo.
  - La traducción mantiene un registro bíblico moderno, claro y apto para publicación.
