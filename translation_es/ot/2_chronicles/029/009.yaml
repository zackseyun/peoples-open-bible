translation:
  language: es
  text: Y he aquí[a], nuestros padres han caído a espada[b], y nuestros hijos, nuestras hijas y nuestras esposas están en cautiverio por causa de esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». El marcador discursivo hebreo llama enfáticamente la atención sobre la declaración que sigue.
    reason: lexical_alternative
  - marker: b
    text: O «han sido llevados en cautiverio». El hebreo dice literalmente «en cautiverio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática de atención. «He aquí» conserva el tono solemne y directo del hebreo, mientras que «Y» refleja la conjunción inicial sin forzar un calco rígido.
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han sido derribados
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «caer»; en este contexto de muerte violenta, «han caído» mantiene el modismo bíblico y la gravedad del pasaje sin añadir una interpretación más explícita que el texto.
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: El hebreo dice de manera específica «nuestros padres». «Padres» conserva la referencia generacional concreta; «antepasados» sería más general y suavizaría el término específico del original.
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - a filo de espada
  lexicon: HALOT
  rationale: La preposición hebrea con «espada» funciona como idiomatismo de muerte violenta. «A espada» es una equivalencia natural y sobria en español bíblico moderno; «a filo de espada» es posible, pero añade una precisión que el hebreo no expresa aquí.
- source_word: וּבָנֵינוּ
  english_pob_choice: our sons
  chosen_spanish: nuestros hijos
  alternatives_spanish:
  - nuestros varones
  - nuestros muchachos
  lexicon: HALOT
  rationale: Aunque el hebreo distingue varones, en español «hijos» en este contexto familiar puede abarcar la descendencia masculina y es más natural para lectores actuales. Se mantiene la distinción con «hijas» en la línea siguiente.
- source_word: וּבְנוֹתֵינוּ
  english_pob_choice: our daughters
  chosen_spanish: nuestras hijas
  alternatives_spanish:
  - nuestras muchachas
  lexicon: HALOT
  rationale: Equivalente directo y claro del hebreo, preservando la distinción explícita entre hijos e hijas.
- source_word: וְנָשֵׁינוּ
  english_pob_choice: our wives
  chosen_spanish: nuestras esposas
  alternatives_spanish:
  - nuestras mujeres
  lexicon: HALOT
  rationale: En esta lista familiar posesiva, el sentido más preciso es «esposas». «Mujeres» sería más amplio y menos específico; «esposas» comunica la relación familiar concreta del texto.
- source_word: בַּשְּׁבִי
  english_pob_choice: are in captivity
  chosen_spanish: están en cautiverio
  alternatives_spanish:
  - están cautivos
  - están presos
  lexicon: HALOT
  rationale: El sustantivo hebreo expresa la condición de cautiverio, no meramente encarcelamiento. «Están en cautiverio» reproduce bien el valor estático del original y el matiz de haber sido llevados cautivos.
- source_word: עַל זֹאת
  english_pob_choice: because of this
  chosen_spanish: por causa de esto
  alternatives_spanish:
  - a causa de esto
  - por esto
  lexicon: HALOT
  rationale: La expresión marca causalidad y remite al juicio resultante de la infidelidad mencionada en el contexto. «Por causa de esto» es clara, sobria y fiel al valor causal del hebreo.
theological_decisions:
- issue: Conservación del modismo de muerte violenta sin explicitación interpretativa
  english_pob_reading: have fallen by the sword
  chosen_spanish_reading: han caído a espada
  alternative_spanish_readings:
  - han sido muertos en batalla
  - han caído por la espada
  rationale: Se preserva el modismo hebreo de manera reconocible en español. «Han caído a espada» mantiene la solemnidad y evita sobretraducir a una explicación bélica más amplia que el texto no formula.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lista familiar diferenciada en contexto de juicio
  english_pob_reading: our sons and our daughters and our wives
  chosen_spanish_reading: nuestros hijos y nuestras hijas y nuestras esposas
  alternative_spanish_readings:
  - nuestros hijos e hijas y nuestras mujeres
  - nuestra descendencia y nuestras mujeres
  rationale: Se conservan las distinciones del hebreo entre hijos, hijas y esposas. No se neutraliza a un colectivo genérico porque el texto subraya la magnitud concreta del desastre familiar.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador inglés finalizó en un registro formal con «behold» tras una revisión desde «look». La versión española adopta un equivalente igualmente formal, «he aquí», y conserva el paralelismo de la lista familiar y la causalidad final sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - 'Se preserva el paralelismo sintáctico de la enumeración: padres / hijos / hijas / esposas.'
  - Se evita «SEÑOR» por no haber aquí un término divino que deba enmascararse.
  - Se usa «cautiverio» para reflejar el estado expresado por el sustantivo hebreo, no una simple prisión.
