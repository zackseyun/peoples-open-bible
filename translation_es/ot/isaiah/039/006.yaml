translation:
  language: es
  text: Mira[a], vienen días en que todo lo que hay en tu casa, y lo que tus padres[b] han guardado hasta este día, será llevado a Babilonia; no quedará nada, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí» o «Mira».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tus padres». También puede entenderse «tus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: El hebreo introduce una proclamación profética solemne y deíctica. «Mira» conserva esa fuerza apelativa en un español natural y moderno; «He aquí» suena más arcaico en español contemporáneo.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - están viniendo días
  - los días vienen
  - se acercan días
  lexicon: HALOT
  rationale: La expresión anuncia un futuro cierto de juicio. «Vienen días» mantiene el valor idiomático y la inminencia sin endurecer el español con una construcción demasiado literal.
- source_word: וְנִשָּׂא
  english_pob_choice: will be carried
  chosen_spanish: será llevado
  alternatives_spanish:
  - será transportado
  - será arrastrado
  - será tomado y llevado
  lexicon: HALOT
  rationale: El nifal aquí es pasivo y se refiere a la remoción de bienes hacia el exilio. «Será llevado» comunica bien la pasividad y la dirección del traslado sin añadir color interpretativo.
- source_word: כָּל אֲשֶׁר בְּבֵיתֶךָ
  english_pob_choice: all that is in your house
  chosen_spanish: todo lo que hay en tu casa
  alternatives_spanish:
  - todo lo que está en tu casa
  - todas las cosas de tu casa
  - todo cuanto hay en tu casa
  lexicon: HALOT
  rationale: Se conserva «casa» porque el hebreo usa literalmente ese término. «Todo lo que hay» es una forma natural de expresar la totalidad sin convertirlo en una paráfrasis más amplia como «posesiones» o «palacio».
- source_word: וַאֲשֶׁר אָצְרוּ אֲבֹתֶיךָ
  english_pob_choice: and what your fathers have stored up
  chosen_spanish: y lo que tus padres han acumulado
  alternatives_spanish:
  - y lo que tus antepasados han guardado
  - y lo que tus padres han almacenado
  - y lo que tus padres han atesorado
  lexicon: HALOT
  rationale: אָצְרוּ expresa guardar o reunir reservas, a menudo con sentido de tesoro o acopio. «Han acumulado» refleja ese resultado material de reunir bienes y evita una posible connotación demasiado devocional de «atesorar».
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres varones
  - tus padres/padres antecesores
  lexicon: HALOT
  rationale: El hebreo es literalmente «tus padres» en masculino plural. En español, «padres» comunica de forma breve y natural la referencia genealógica; «antepasados» es una alternativa válida pero menos literal.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  - hasta esta fecha
  lexicon: HALOT
  rationale: La locución temporal marca continuidad hasta el presente. «Hasta hoy» es idiomático en español y mantiene el valor de acumulación temporal.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  - Babilonia
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico estándar en español, «Babilonia».
- source_word: לֹא יִוָּתֵר דָּבָר
  english_pob_choice: not a thing will be left
  chosen_spanish: no quedará nada
  alternatives_spanish:
  - no quedará cosa alguna
  - no permanecerá nada
  - no quedará ni una cosa
  lexicon: HALOT
  rationale: La expresión hebrea subraya la pérdida total. «No quedará nada» transmite con claridad y fuerza esa totalidad en español contemporáneo.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - ha dicho Yahvé
  - dice el Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio editorial del proyecto para el nombre divino: יְהוָה se vierte «Yahvé». El presente profético «dice» reproduce la fórmula oracular del hebreo con naturalidad.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; conforme a la terminología del proyecto, la forma castellana normalizada es «Yahvé», no un sustituto como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia genealógica אֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  - tus padres varones
  rationale: Se preserva el valor literal y masculino plural del hebreo sin forzar una neutralización que diluya la forma del texto. En español, «padres» es una equivalencia breve y fiel en este contexto histórico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Se siguió el trazo de la revisión más reciente sin cambios sustantivos: el sentido es estable y el cotejo de alta concordancia confirma que no se requieren ajustes textuales adicionales para esta unidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - 'Se preservó el paralelismo de dos cláusulas de contenido totalizante: «todo lo que hay en tu casa» / «lo que tus padres han acumulado hasta hoy».'
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - Se eligió un registro solemne pero actual, apto para lectura eclesial pública.
