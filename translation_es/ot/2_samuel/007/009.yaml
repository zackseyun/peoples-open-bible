translation:
  language: es
  text: Y yo estuve contigo por dondequiera que anduviste, y eliminé a todos tus enemigos de delante de ti. Y haré para ti un gran nombre[a], como el nombre de los grandes[b] que hay en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gran renombre'. En hebreo, 'nombre' suele implicar reputación o fama, pero el texto principal conserva la expresión bíblica.
    reason: lexical_alternative
  - marker: b
    text: O 'como el nombre de los grandes hombres que hay en la tierra'.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶהְיֶה עִמְּךָ
  english_pob_choice: I was with you
  chosen_spanish: yo estuve contigo
  alternatives_spanish:
  - yo he estado contigo
  - yo estaba contigo
  lexicon: HALOT
  rationale: El hebreo con וָאֶהְיֶה en secuencia narrativa se refleja mejor con un pasado simple. 'Estuve contigo' mantiene la presencia de apoyo y compañía implícita en עִמְּךָ.
- source_word: בְּכֹל אֲשֶׁר הָלַכְתָּ
  english_pob_choice: wherever you went
  chosen_spanish: por dondequiera que anduviste
  alternatives_spanish:
  - dondequiera que fuiste
  - en todo lo que anduviste
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y abarca todo el recorrido y las circunstancias de David. 'Por dondequiera que anduviste' conserva la amplitud y suena natural en español.
- source_word: וָאַכְרִתָה
  english_pob_choice: I cut off
  chosen_spanish: exterminé
  alternatives_spanish:
  - corté de raíz
  - eliminé
  lexicon: HALOT
  rationale: Aunque 'cortar' preserva la imagen concreta, en español 'exterminé' comunica con más claridad el valor intensivo de la forma causativa en este contexto bélico de remover completamente a los enemigos. Se mantiene el tono fuerte del hebreo sin atenuarlo.
- source_word: אֶת כָּל אֹיְבֶיךָ
  english_pob_choice: all your enemies
  chosen_spanish: a todos tus enemigos
  alternatives_spanish:
  - a todos tus adversarios
  - a todos tus enemigos
  lexicon: HALOT
  rationale: Se conserva el totalizador 'todos' y el objeto directo simple 'tus enemigos', que corresponde al sentido inmediato de אֹיְבֶיךָ.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - delante de ti
  lexicon: HALOT
  rationale: La frase hebrea es espacial e idiomática; 'de delante de ti' transmite bien la retirada de los enemigos de la esfera inmediata de David y conserva la imagen bíblica.
- source_word: וְעָשִׂיתִי לְךָ
  english_pob_choice: And I will make for you
  chosen_spanish: Y haré para ti
  alternatives_spanish:
  - Y te haré
  - Y he de hacerte
  lexicon: HALOT
  rationale: En el contexto promesivo, el qatal funciona como futuro. 'Haré para ti' respeta la intención de promesa y mantiene el matiz benefactivo de לְךָ.
- source_word: שֵׁם גָּדוֹל
  english_pob_choice: a great name
  chosen_spanish: un nombre grande
  alternatives_spanish:
  - una gran fama
  - una gran reputación
  lexicon: HALOT
  rationale: Se mantiene el sustantivo 'nombre' porque en hebreo suele implicar reputación o renombre, pero el texto bíblico conserva la forma idiomática. 'Grande' sigue de cerca el adjetivo original.
- source_word: כְּשֵׁם הַגְּדֹלִים
  english_pob_choice: like the name of the great ones
  chosen_spanish: como el nombre de los grandes
  alternatives_spanish:
  - como el nombre de los grandes hombres
  - como el renombre de los grandes
  lexicon: HALOT
  rationale: '''Los grandes'' reproduce la expresión hebrea sin añadir innecesariamente ''hombres'', que en español podría restringir el referente. Se conserva el paralelismo con ''nombre''.'
- source_word: אֲשֶׁר בָּאָרֶץ
  english_pob_choice: who are on the earth
  chosen_spanish: que hay en la tierra
  alternatives_spanish:
  - que están en la tierra
  - que están sobre la tierra
  lexicon: HALOT
  rationale: בָּאָרֶץ puede ser 'en la tierra' o 'en la tierra/país' según el contexto. Aquí la comparación amplia favorece 'la tierra', y 'que hay' resulta natural en español para una clase de personas notables.
theological_decisions:
- issue: Valor temporal de וְעָשִׂיתִי en un discurso divino de promesa
  english_pob_reading: 'Render as future: ''And I will make for you a great name'''
  chosen_spanish_reading: Y haré para ti un nombre grande
  alternative_spanish_readings:
  - Y he hecho para ti un nombre grande
  - Y hice para ti un nombre grande
  rationale: Aunque la forma verbal es morfológicamente perfecta, en este contexto de promesa divina el sentido discursivo es futuro. Traducirlo como futuro evita oscurecer la promesa y coincide con la lógica profética del pasaje.
  doctrine_reference: 2 Samuel 7; 1 Crónicas 17:8
- issue: La expresión 'nombre grande' como renombre otorgado por Dios
  english_pob_reading: Or 'great renown.' Hebrew 'name' often carries the sense of reputation or fame, but the main text preserves the biblical idiom.
  chosen_spanish_reading: un nombre grande
  alternative_spanish_readings:
  - una gran fama
  - una gran reputación
  rationale: En español, 'nombre' también puede expresar prestigio o renombre. Mantener la metáfora evita perder la resonancia bíblica y deja visible la tensión entre el sentido literal y el valor idiomático.
  doctrine_reference: Génesis 12:2; 2 Samuel 7:9
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo WLC y es plenamente concordante con la pauta inglesa auditada. Se adoptó una equivalencia óptima: se preservó la idiomaticidad bíblica de ''nombre'', se mantuvo el valor totalizador de ''todos'', y se hizo explícito el matiz promesivo futuro de וְעָשִׂיתִי. No se requieren correcciones respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa 'tierra' para בָּאָרֶץ en el sentido amplio del pasaje, en continuidad con la comparación internacional de renombre.
  - Se mantiene el estilo bíblico con paralelismo entre 'nombre grande' y 'nombre de los grandes'.
  - '''De delante de ti'' conserva la imagen espacial de מִפָּנֶיךָ sin volverla abstracta.'
