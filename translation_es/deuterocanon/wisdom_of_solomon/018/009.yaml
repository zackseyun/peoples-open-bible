base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/018/009.yaml
  text: For the holy children of good men were secretly offering sacrifices[a], and in harmony they agreed on the divine law, that the holy ones would share alike in the same good things and dangers[c][b], while their fathers were already singing beforehand praises.
  footnotes:
  - marker: a
    text: Or 'in secret.' The Greek κρυφῇ emphasizes that the sacrificial action was carried out covertly.
    reason: lexical_alternative
  - marker: b
    text: Or 'the law of divinity.' The phrase is unusual; 'the divine law' is chosen as the clearest English rendering of τὸν τῆς θειότητος νόμον.
    reason: lexical_alternative
  - marker: c
    text: Or 'the saints.' The Greek τοὺς ἁγίους more literally means 'the holy ones.'
    reason: alternative_reading
