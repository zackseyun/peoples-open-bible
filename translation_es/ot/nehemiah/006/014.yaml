revisions:
- from: Acuérdate, Yahvé, de Tobías y de Sanbalat[a], conforme a estos hechos suyos; y también de Noadías la profetisa y del resto de los profetas, que estaban tratando de infundirme miedo.
  to: Acuérdate, Dios mío, de Tobías y de Sanbalat, conforme a estos hechos suyos; y también de Noadía la profetisa y del resto de los profetas, que estaban tratando de infundirme miedo[a].
  rationale: Se corrige el error principal de fuente al traducir אֱלֹהַי como 'Dios mío' en vez de 'Yahvé'. Se ajusta 'Noadías' a 'Noadía' para una transliteración más fiel y se reubica la nota al pie en la cláusula verbal correspondiente, donde realmente aplica la alternativa léxica.
