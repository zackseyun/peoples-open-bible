source:
  edition: SBLGNT
  text: Ἀλλ’ οὐκ ἐν πᾶσιν ἡ γνῶσις· τινὲς δὲ τῇ ⸀συνηθείᾳ ⸂ἕως ἄρτι τοῦ εἰδώλου⸃ ὡς εἰδωλόθυτον ἐσθίουσιν, καὶ ἡ συνείδησις αὐτῶν ἀσθενὴς οὖσα μολύνεται.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/007.yaml
  text: But not everyone has this knowledge[a]. Some, through familiarity with the idol until now, eat it as food sacrificed to an idol, and their conscience, being weak[b], is defiled.
  footnotes:
  - marker: a
    text: 'Or more literally, ''because of habit/custom until now with the idol.'' The Greek phrase is difficult; the sense is that some still live under the influence of their former connection with idol worship.'
    reason: lexical_alternative
  - marker: b
    text: 'Some manuscripts read ''conscience of the idol'' or have related variation in this clause; the main text follows the SBLGNT reading.'
    reason: textual_variant
translation:
  language: ko
  text: 그러나 모든 사람에게 이 지식이 있는 것은 아닙니다. 어떤 이들은 지금까지 우상에 익숙해 있어 그것을 우상에게 바쳐진 음식으로 알고 먹습니다. 그래서 그들의 양심이 약하기에 더럽혀집니다.
  philosophy: optimal-equivalence
