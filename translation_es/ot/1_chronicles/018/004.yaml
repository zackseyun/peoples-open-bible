translation:
  language: es
  text: David capturó de él mil carros de guerra[a], siete mil jinetes[b] y veinte mil hombres de a pie. Entonces David desjarretó a todos los caballos de los carros[a], pero dejó suficientes de ellos para cien carros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'carros' o 'la fuerza de carros'; como el verbo 'desjarretó' no puede aplicarse a vehículos, aquí se entiende metonímicamente de los caballos pertenecientes a la fuerza de carros.
    reason: lexical_alternative
  - marker: b
    text: 2 Samuel 8:4 dice 'mil setecientos jinetes' en lugar de 'siete mil jinetes'. Esta es una diferencia numérica en la tradición textual de un pasaje paralelo.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - apresó
  lexicon: HALOT
  rationale: El verbo hebreo expresa captura en contexto bélico. 'Capturó' conserva el valor militar y suena natural en español contemporáneo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: El sufijo singular remite a Hadadézer; en español conviene mantener el referente singular explícito.
- source_word: אֶלֶף רֶכֶב
  english_pob_choice: 1,000 chariots
  chosen_spanish: mil carros de guerra
  alternatives_spanish:
  - mil carros
  - mil carros de combate
  lexicon: HALOT
  rationale: Con numerales, רֶכֶב funciona de manera natural como unidades de carro de guerra. 'Carros de guerra' hace explícito el sentido militar sin perder fidelidad.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - soldados a caballo
  lexicon: HALOT
  rationale: El término designa guerreros montados. 'Jinetes' es una equivalencia directa, clara y amplia en español.
- source_word: אִישׁ רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: hombres de a pie
  alternatives_spanish:
  - soldados de infantería
  - infantería
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hombre de pie'. 'Hombres de a pie' preserva la imagen concreta y resulta natural en español; 'infantería' sería más técnico.
- source_word: וַיְעַקֵּר
  english_pob_choice: hamstrung
  chosen_spanish: inutilizó con el corte de los tendones
  alternatives_spanish:
  - desjarretó
  - hizo inútiles
  lexicon: HALOT
  rationale: El verbo se refiere al desjarrete de caballos en contexto militar. En español, 'inutilizó con el corte de los tendones' comunica el acto sin depender de un arcaísmo poco transparente.
- source_word: אֶת כָּל הָרֶכֶב
  english_pob_choice: all the chariot horses
  chosen_spanish: a todos los caballos de los carros
  alternatives_spanish:
  - a todos los carros
  - a toda la caballería de carros
  lexicon: HALOT
  rationale: Aunque רֶכֶב puede denotar el conjunto de carros, aquí el verbo exige un referente animado. La lectura metonímica apunta a los caballos asociados al carro; por eso se explicita 'caballos de los carros'.
- source_word: וַיּוֹתֵר מִמֶּנּוּ מֵאָה רָכֶב
  english_pob_choice: but left enough of them for 100 chariots
  chosen_spanish: pero dejó suficientes para cien carros
  alternatives_spanish:
  - pero dejó de ellos suficientes para cien carros
  - pero preservó suficientes para cien carros
  lexicon: HALOT
  rationale: Se mantiene la idea de remanente sin forzar una paráfrasis. 'Suficientes para cien carros' refleja el hebreo y deja implícita la metonimia del contexto, como en el auditorio POB inglés.
translation_notes:
  revision_awareness: La redacción sigue el pasaje paralelo y la revisión inglesa más reciente, que prefirió un remanente expresado con naturalidad ('left enough of them for 100 chariots'). En español se conserva esa fluidez sin perder la tensión metonímica del hebreo entre 'carros' y los caballos asociados.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el contexto inmediato, conforme al estándar del proyecto.
  - '''Carros de guerra'' mantiene el registro militar y evita la ambigüedad de ''carros'' aislado en español.'
  - '''Jinetes'' y ''hombres de a pie'' equilibran claridad con cercanía al hebreo, sin convertirlos en tecnicismos innecesarios.'
