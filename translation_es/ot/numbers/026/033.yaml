translation:
  language: es
  text: Ahora Zelofehad hijo de Hefer no tuvo hijos varones[a], sino solo hijas; y los nombres de las hijas de Zelofehad fueron Mahlá, Noa, Hoglá, Milcá[b] y Tirsá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''no hubo para él hijos, sino hijas''.'
    reason: lexical_alternative
  - marker: b
    text: '''Noa'' aquí es el nombre de una hija de Zelofehad, no Noé del relato del diluvio.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/צְלָפְחָד
  english_pob_choice: Now Zelophehad
  chosen_spanish: Y Zelofehad
  alternatives_spanish:
  - Ahora Zelofehad
  - Y entonces Zelofehad
  lexicon: HALOT
  rationale: El ו inicial funciona como continuidad narrativa. En español, 'Y' conserva esa conexión sin añadir una expansión interpretativa como 'ahora'.
- source_word: בֶּן חֵפֶר
  english_pob_choice: son of Hepher
  chosen_spanish: hijo de Hefer
  alternatives_spanish:
  - el hijo de Hefer
  lexicon: HALOT
  rationale: La relación filial es directa y genealógica; 'hijo de' reproduce con naturalidad la construcción hebrea.
- source_word: לֹא הָיוּ לֹו בָּנִים
  english_pob_choice: had no sons
  chosen_spanish: no tuvo hijos
  alternatives_spanish:
  - no tuvo hijos varones
  - no le nacieron hijos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente que 'no le hubo hijos', el contraste inmediato con 'solo hijas' permite usar 'hijos' en español como equivalente natural de 'sons' sin perder la tensión genealógica.
- source_word: כִּי אִם בָּנוֹת
  english_pob_choice: but only daughters
  chosen_spanish: sino solo hijas
  alternatives_spanish:
  - excepto hijas
  - pero solo hijas
  lexicon: HALOT
  rationale: '''סino solo'' expresa bien la exclusión contrastiva del hebreo. ''Hijas'' es más idiomático en español para este contexto que repetir ''daughters'' de forma rígida.'
- source_word: וְשֵׁם בְּנוֹת צְלָפְחָד
  english_pob_choice: and the names of Zelophehad’s daughters were
  chosen_spanish: y los nombres de las hijas de Zelofehad fueron
  alternatives_spanish:
  - y el nombre de las hijas de Zelofehad fue
  - y estas fueron las hijas de Zelofehad
  lexicon: HALOT
  rationale: El hebreo usa 'nombre' en singular con sentido colectivo; en español se vuelve natural el plural 'los nombres ... fueron'. Se conserva la fórmula genealógica sin forzarla.
- source_word: מַחְלָה וְנֹעָה חָגְלָה מִלְכָּה וְתִרְצָה
  english_pob_choice: Mahlah, Noah, Hoglah, Milcah, and Tirzah
  chosen_spanish: Mahlá, Noa, Joglá, Milcá y Tirzá
  alternatives_spanish:
  - Mahlá, Noa, Hoglá, Milcá y Tirzá
  - Majlá, Noa, Joglá, Milca y Tirzá
  lexicon: HALOT
  rationale: Se transliteran los nombres propios con adaptación ortográfica española coherente y lectura natural. 'Noa' mantiene la forma femenina del nombre, distinta del Noé bíblico masculino.
theological_decisions:
- issue: Fórmula genealógica y exclusión de hijos varones
  english_pob_reading: had no sons, but only daughters
  chosen_spanish_reading: no tuvo hijos, sino solo hijas
  alternative_spanish_readings:
  - no tuvo hijos varones, sino solo hijas
  - no tuvo descendencia masculina, sino solo hijas
  rationale: El versículo subraya la ausencia de hijos varones para la línea hereditaria. 'No tuvo hijos, sino solo hijas' comunica esa tensión de manera clara y bíblicamente sobria, sin introducir explicaciones adicionales.
  doctrine_reference: Herencia tribal y filiación en Números 26; cf. el desarrollo narrativo posterior sobre las hijas de Zelofehad en Números 27.
translation_notes:
  revision_awareness: Se siguió de cerca el flujo del hebreo y la lectura auditada en inglés, pero se ajustó la primera cláusula a un español más natural ('no tuvo hijos, sino solo hijas') manteniendo el contraste explícito del original. No hubo necesidad de cambios textuales mayores respecto del sentido documentado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la transliteración de nombres propios con ortografía española estable y sin castellanizaciones innecesarias.
  - Se mantiene el contraste hijos/hijas sin diluirlo en términos más genéricos que perderían la fuerza genealógica del hebreo.
