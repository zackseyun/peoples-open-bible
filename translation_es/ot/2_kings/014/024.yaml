revisions:
- from: Hizo lo malo a los ojos de Yahvé. No se apartó de ninguno de los pecados de Jeroboam hijo de Nabat[a], con los cuales hizo pecar a Israel.
  to: Hizo lo malo a los ojos de Yahvé. No se apartó de ninguno de los pecados de Jeroboam hijo de Nebat[a], por los cuales hizo pecar a Israel.
  rationale: Se ajusta «Nabat» a «Nebat» por mejor consistencia onomástica en español bíblico. Se cambia «con los cuales» por «por los cuales» para expresar de manera más natural la lectura instrumental de la cláusula relativa, manteniendo la nota con la alternativa de que el relativo se refiera directamente a Jeroboam. No se requiere adjudicación adicional porque la decisión está bien documentada en el audit trail inglés y la revisión es menor.
