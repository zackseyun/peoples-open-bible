  to: Entonces Salomón consagró el centro del atrio[a] que estaba delante de la casa de Yahvé, porque allí ofreció[b] los holocaustos y las porciones grasas de los sacrificios de paz[c]; porque el altar de bronce que Salomón había hecho no podía contener el holocausto, la ofrenda de cereal y las porciones grasas.
  rationale: 'Se corrige el aparato de notas para que siga la evidencia fuente y el rastro auditado del POB inglés: [b] ahora anota el modismo sacrificial de עָשָׂה y [c] la alternativa de חֶלְבֵי הַשְּׁלָמִים en su primera mención. También se ajusta מִנְחָה a «ofrenda de cereal» para alineación terminológica con ‘grain offering’, y se mejora la naturalidad de «partes grasas» a «porciones grasas».'
