    rationale: Aunque intenta reflejar el ל hebreo, 'santos para su Dios' no es la opción más idiomática ni la más clara en español. Una formulación como 'sean santos para con su Dios' preserva mejor la relación/referencia sin sonar extraña.
  - severity: low
