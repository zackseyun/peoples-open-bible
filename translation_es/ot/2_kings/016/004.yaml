translation:
  language: es
  text: Sacrificó y quemó incienso en los lugares altos, sobre los collados, y debajo de todo árbol frondoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de todo árbol lozano» o «debajo de todo árbol verde». El adjetivo hebreo puede describir algo verde, fresco o exuberante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְזַבֵּחַ
  english_pob_choice: He sacrificed
  chosen_spanish: Sacrificó
  alternatives_spanish:
  - Ofreció sacrificios
  - Hizo sacrificios
  lexicon: HALOT
  rationale: זבח expresa el acto cultual de sacrificar. En español, «sacrificó» conserva la acción concreta sin añadir un objeto que el hebreo no da.
- source_word: וַיְקַטֵּר
  english_pob_choice: burned incense
  chosen_spanish: hizo humear incienso
  alternatives_spanish:
  - quemó incienso
  - ofreció incienso
  lexicon: HALOT
  rationale: En contexto cultual, קטר puede referirse a hacer humear una ofrenda o incienso. «Hizo humear incienso» mantiene la imagen verbal del hebreo y evita una formulación demasiado interpretativa.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - en los altos lugares
  - en los santuarios altos
  lexicon: HALOT
  rationale: בָּמוֹת designa sitios de culto elevados. «Lugares altos» es la traducción bíblica tradicional y comunica mejor el sentido cultual que un simple dato topográfico.
- source_word: וְעַל הַגְּבָעוֹת
  english_pob_choice: on the hills
  chosen_spanish: sobre los collados
  alternatives_spanish:
  - sobre los montes
  - sobre las colinas
  lexicon: HALOT
  rationale: גְּבָעוֹת son elevaciones o colinas. «Collados» distingue esta referencia de «lugares altos» y suena natural en registro bíblico español.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - debajo de todo árbol verde
  - debajo de todo árbol lozano
  - debajo de todo árbol fresco
  lexicon: HALOT
  rationale: רַעֲנָן puede significar verde, fresco o exuberante/lozano. «Frondoso» comunica en español la idea de un árbol con abundante follaje y preserva el tono idiomático sin imponer una sola glosa adjetival.
theological_decisions:
- issue: Mantener la fórmula de culto ilícito sin explicitar una acusación adicional
  english_pob_reading: 'Retained the concrete cultic/topographical language: ''sacrificed and burned incense on the high places, on the hills, and under every green tree.'''
  chosen_spanish_reading: 'Se conserva el lenguaje concreto de acción y lugar: «Sacrificó e hizo humear incienso en los lugares altos, sobre los collados, y debajo de todo árbol frondoso».'
  alternative_spanish_readings:
  - Practicó culto pagano en santuarios sobre colinas y bajo todo árbol frondoso.
  - Ofreció idolatría en los lugares altos, sobre los collados, y debajo de todo árbol frondoso.
  rationale: El hebreo enumera acciones y ubicaciones sin calificar explícitamente la práctica con un término evaluativo en este versículo. La traducción mantiene esa concreción y deja que el contexto mayor aporte la valoración negativa, siguiendo la primacía del texto fuente.
  doctrine_reference: 'Principio de traducción: no introducir juicios doctrinales o evaluativos que el versículo no formula explícitamente.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin cambios aplicados en la revisión más reciente; se conserva la solución inglesa establecida para el paralelismo cultual y la nota léxica sobre רַעֲנָן, adaptada al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton en este texto.
  - Se tradujo בָּמוֹת con una expresión tradicional y transparente («lugares altos») para conservar el sentido cultual.
  - 'Se distinguieron los dos complementos de lugar: «en los lugares altos» y «sobre los collados».'
  - La nota[a] se ancla en «árbol frondoso» para reflejar la ambigüedad léxica de רַעֲנָן sin perder la lectura fluida.
