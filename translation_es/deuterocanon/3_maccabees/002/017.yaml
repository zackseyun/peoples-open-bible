revisions:
- from: Nosotros hemos hollado la casa de la santificación[a], así como se hollen las casas de los habitantes de Jerusalén[b].
  to: Hollamos la casa de la santidad[a], así como son holladas las casas de los habitantes de Jerusalén[b].
  rationale: Se corrige la gramática española, se ajusta el tiempo verbal a un pasado simple más natural para el aoristo griego, y se alinea la elección principal de ἁγιασμοῦ con la revisión auditada del English POB (‘holiness’), manteniendo en nota las alternativas léxicas más literales.
  reviewer_model: gpt-5.4
