translation:
  language: es
  text: Ahora bien, los primeros que habitaron en sus posesiones, en sus ciudades, fueron Israel, los sacerdotes, los levitas y los servidores del templo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los netineos», transliteración tradicional para una clase asignada al servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹשְׁבִים
  english_pob_choice: the inhabitants
  chosen_spanish: los habitantes
  alternatives_spanish:
  - los que habitaban
  - los moradores
  lexicon: HALOT
  rationale: El participio de ישׁב expresa residencia o asentamiento; «habitantes» es natural en español y conserva el sentido de población asentada.
- source_word: הָרִאשֹׁנִים
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los antiguos
  - los anteriores
  lexicon: HALOT
  rationale: En este contexto histórico, el adjetivo indica los primeros en asentarse; «los primeros» mantiene esa referencia sin añadir interpretación excesiva.
- source_word: בַּאֲחֻזָּתָם
  english_pob_choice: in their possession
  chosen_spanish: en sus posesiones
  alternatives_spanish:
  - en su heredad
  - en sus propiedades
  lexicon: HALOT
  rationale: אֲחֻזָּה puede denotar posesión heredada o territorio poseído. «Posesiones» preserva la amplitud semántica y suena natural en español.
- source_word: בְּעָרֵיהֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus poblaciones
  - en sus poblados
  lexicon: HALOT
  rationale: עָרִים refiere a centros habitados; «ciudades» es la equivalencia estándar y coherente con el registro histórico-genealógico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo «Israel» como en el texto hebreo y en la POB inglesa, manteniendo la formulación apposicional del listado.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: כֹּהֲנִים se traduce de manera estándar como «sacerdotes»; en español bíblico es claro y fiel al oficio designado.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: La tribu/clase levítica se rinde con el etnónimo tradicional «levitas», equivalente directo y ampliamente entendido.
- source_word: וְהַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netineos
  - los netinim
  lexicon: HALOT
  rationale: La POB inglesa opta por la función («temple servants») y no por la transliteración. En español, «servidores del templo» comunica la clase funcional sin perder el vínculo cultual; se evita una transliteración opaca en el texto principal.
theological_decisions:
- issue: Valor de יִשְׂרָאֵל en la lista apposicional
  english_pob_reading: Israel, the priests, the Levites, and the temple servants
  chosen_spanish_reading: Israel, los sacerdotes, los levitas y los servidores del templo
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo enumera grupos en aposición. Mantener «Israel» como nombre colectivo preserva la estructura del texto y evita aclaraciones que el hebreo no explicita. La traducción no convierte el término en una explicación doctrinal ni en una paraphrase expansion.
  doctrine_reference: Jerome/Biblical Hebrew apposition; no doctrinal issue beyond textual structure
- issue: Traducción funcional de נְתִינִים
  english_pob_reading: the temple servants
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netineos
  - los dados para el templo
  rationale: El término designa una clase vinculada al servicio del santuario. Seguir la equivalencia funcional de la POB inglesa evita oscurecer el referente en español. La transliteración se puede consignar como alternativa, pero no se impone en el texto principal sin necesidad contextual.
  doctrine_reference: Lexical/temple-service terminology; cf. Ezr 2:43; Neh 7:46
translation_notes:
  revision_awareness: La redacción inglesa más reciente añadió «Now» para naturalidad y ajustó «in their possession» a «lived in their possessions». En español se reflejó ese inicio con «Ahora bien» y se optó por «vivían en sus posesiones», conservando el sentido de residencia estable en territorios poseídos. También se mantuvo la lista final de grupos sin ampliar el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el tetragrama aparezca explícitamente; aquí no corresponde.
  - Se mantuvo «servidores del templo» para coherencia con la elección funcional de la POB inglesa.
  - «Sacerdotes» y «levitas» siguen el registro bíblico estándar en español sin introducir arcaísmos.
  - La puntuación reproduce la enumeración del hebreo con claridad en español, sin añadir conectores interpretativos innecesarios.
