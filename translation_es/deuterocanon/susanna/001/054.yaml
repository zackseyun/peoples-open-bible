translation:
  language: es
  text: 'Ahora bien[a], si viste a esta mujer, di: ¿bajo qué árbol los viste hablando entre sí? Y él dijo: «Bajo un lentisco».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
