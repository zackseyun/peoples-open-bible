- from: Así la lepra[a] de Naamán se te pegará a ti y a tu descendencia para siempre.” Y salió de su presencia leproso[b], blanco como la nieve.
  to: Así la enfermedad de la piel[a] de Naamán se te pegará a ti y a tu descendencia para siempre.” Y salió de su presencia afectado por esa enfermedad, blanco como la nieve.
  rationale: 'Se revisa el texto principal para ajustarlo a la evidencia hebrea y a la decisión léxica auditada del POB: una afección grave de la piel, no específicamente lepra moderna. Se conserva la formulación tradicional en una sola nota, eliminando duplicación. ''Afectado por esa enfermedad'' mantiene la relación léxica con la cláusula anterior sin usar ''leproso''.'
