review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: un niño que aún mama juega junto al agujero de una serpiente venenosa y un niño ya destetado pone/extiende su mano hacia la morada de otra serpiente venenosa. También preserva el contraste paralelo entre יוֹנֵק y גָּמוּל, y mantiene las alternativas léxicas del POB inglés.'
  spanish_quality_summary: 'El español es claro y legible, pero hay una mejora importante de naturalidad y precisión contextual: «sobre el agujero» y «sobre la madriguera» suenan menos idiomáticos para un niño que interactúa con la abertura o entrada; «junto al agujero» y «en la madriguera»/«en la guarida» comunican mejor la escena. Además, «madriguera de la víbora» funciona, pero «guarida» evita una asociación demasiado zoológica de mamíferos excavadores. El resto del verso está bien logrado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «cobra», «víbora», «niño de pecho», «niño destetado» y «jugará» concuerdan con el expediente inglés y con un español eclesial claro. Las notas léxicas a y b deben conservarse. La marca [b] anclada en «cobra» sigue el precedente del POB inglés aunque la alternativa verbal corresponde a la segunda cláusula; no es ideal estilísticamente, pero puede conservarse para mantener trazabilidad con la auditoría inglesa.
  issues:
  - severity: medium
    issue: La preposición «sobre» se repite en dos lugares donde el español idiomático pide otra relación espacial.
    rationale: Hebreo עַל puede cubrir varios matices. En esta escena, «jugará sobre el agujero» suena rígido; «junto al agujero» comunica mejor la imagen de proximidad segura. En la segunda cláusula, «pondrá su mano sobre la madriguera» es menos natural que «en la guarida/madriguera» o «hacia la guarida», dado que la mano se dirige al lugar de la serpiente.
  - severity: low
    issue: «Madriguera» es entendible, pero «guarida» encaja mejor con una serpiente venenosa en registro bíblico general.
    rationale: El hebreo מְאוּרַת denota la morada/apertura de la serpiente. «Madriguera» no es incorrecto, pero en español suele evocar más fácilmente mamíferos; «guarida» suena más amplio y natural aquí.
  revised_spanish_text: El niño de pecho jugará junto al agujero de la cobra[b][a], y el niño destetado pondrá su mano en la guarida de la víbora.
  revised_footnotes:
  - marker: a
    text: O «áspid» para «cobra». El término hebreo denota una serpiente venenosa, tradicionalmente identificada con el áspid/cobra.
    reason: lexical_alternative
  - marker: b
    text: O «extenderá su mano» en lugar de «pondrá su mano».
    reason: lexical_alternative
  revision_rationale: La revisión hace ajustes menores de español idiomático y de imagen espacial sin cambiar el sentido fuente ni las decisiones léxicas principales del POB. «Junto al agujero» y «en la guarida» representan mejor la escena en español natural.
