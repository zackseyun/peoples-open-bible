translation:
  language: es
  text: Porque, oh Amo, hemos llegado a ser más pequeños[a] que todas las naciones, y hoy estamos humillados en toda la tierra[b] por causa de nuestros pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos sido reducidos por debajo de todas las naciones». El verbo griego puede expresar ser hecho pequeño o disminuido en estatus.
    reason: lexical_alternative
  - marker: b
    text: O «en todo el país». El griego γῇ puede significar «tierra» o «país»; aquí el sentido más amplio encaja bien con la referencia a las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Maestro
  - Señor
  lexicon: BDAG
  rationale: δέσποτα es un vocativo de fuerte autoridad, más específico que κύριε. En español, «Soberano» conserva el tono de dominio y gobierno sin confundirse con el uso litúrgico habitual de «Señor», que aquí podría aplanar la distinción lexical que la POB documenta.
- source_word: ἐσμικρύνθημεν
  english_pob_choice: we have become smaller
  chosen_spanish: hemos sido rebajados
  alternatives_spanish:
  - hemos sido reducidos
  - hemos quedado empequeñecidos
  - nos hemos hecho más pequeños
  lexicon: LSJ
  rationale: El verbo expresa ser hecho pequeño o disminuido en estatus. «Hemos sido rebajados» comunica bien la humillación y la pérdida de rango, manteniendo la idea de disminución sin sonar extraño en español.
- source_word: παρὰ πάντα τὰ ἔθνη
  english_pob_choice: than all the nations
  chosen_spanish: más que todas las naciones
  alternatives_spanish:
  - que todas las naciones
  - por encima de todas las naciones
  - entre todas las naciones
  lexicon: LSJ
  rationale: 'Con el valor comparativo de παρά, la frase pide una comparación: «más que». «Naciones» conserva el referente colectivo de ἔθνη en este contexto de oración confesional.'
- source_word: ταπεινοὶ
  english_pob_choice: humbled
  chosen_spanish: humillados
  alternatives_spanish:
  - humildes
  - abatidos
  - rebajados
  lexicon: BDAG
  rationale: Aunque el adjetivo puede significar «humilde» o «bajo», aquí describe un estado producido por juicio y deshonra. «Humillados» mantiene esa carga pasiva y circunstancial mejor que «humildes».
- source_word: ἐν πάσῃ τῇ γῇ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitada
  - en toda la región
  - en todo el país
  lexicon: LSJ
  rationale: γῇ puede significar «tierra» o «país/land». Dado el paralelo con «todas las naciones», «en toda la tierra» conserva el alcance amplio que la POB privilegia en inglés, sin forzar una referencia local estrecha.
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: because of our sins
  chosen_spanish: por causa de nuestros pecados
  alternatives_spanish:
  - a causa de nuestros pecados
  - por nuestros pecados
  - debido a nuestros pecados
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por causa de» mantiene la relación causal explícita y solemne, adecuada para una confesión penitencial.
theological_decisions:
- issue: Tono del vocativo δέσποτα
  english_pob_reading: Master
  chosen_spanish_reading: Soberano
  alternative_spanish_readings:
  - Señor
  - Maestro
  rationale: La POB distingue δέσποτα de κύριος para no nivelar ambos títulos. En español, «Soberano» preserva la idea de autoridad suprema y evita confundir este vocativo con el habitual «Señor» aplicado al nombre divino.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source meaning over translation tradition.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue el mismo sentido general del texto inglés auditado, pero ajusta la dicción española para preservar la distinción entre el vocativo δέσποτα y el término comparativo de humillación sin introducir paráfrasis indebidas.
  spanish_consistency_notes:
  - Se usa «Soberano» para δέσποτα con el fin de conservar la diferencia frente a κύριος, evitando el uso automático de «Señor».
  - Se mantiene el campo semántico de disminución/humillación de ἐσμικρύνθημεν y ταπεινοί con una combinación natural en español.
  - «Tierra» se emplea para γῇ siguiendo el valor amplio preferido por la POB en inglés, no una lectura restringida de «país».
  - «Pecados» traduce ἁμαρτίαι en plural, conservando la confesión colectiva explícita del original.
