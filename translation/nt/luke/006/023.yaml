id: LUK.6.23
reference: Luke 6:23
source:
  edition: SBLGNT
  text: χάρητε ἐν ἐκείνῃ τῇ ἡμέρᾳ καὶ σκιρτήσατε, ἰδοὺ γὰρ ὁ μισθὸς ὑμῶν πολὺς ἐν τῷ οὐρανῷ· κατὰ ⸂τὰ αὐτὰ⸃ γὰρ ἐποίουν τοῖς προφήταις οἱ πατέρες αὐτῶν.
translation:
  text: Rejoice in that day and leap for joy[a], for behold, your reward is great in heaven[b]; for in the same way their fathers used to do to the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be glad in that day and leap.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'for according to the same things their fathers were doing to the prophets'; the sense is that their forefathers treated the prophets in the same way.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρητε
  chosen: Rejoice
  alternatives:
  - Be glad
  lexicon: BDAG
  rationale: Aorist imperative plural of χαίρω calls for an active command of joy. 'Rejoice' is more direct and elevated than 'be glad' while remaining natural English.
- source_word: σκιρτήσατε
  chosen: leap for joy
  alternatives:
  - jump
  - skip
  - leap
  lexicon: BDAG
  rationale: The verb denotes exuberant physical expression. 'Leap for joy' captures both the bodily action and the joyful sense in idiomatic English better than bare 'leap' or colloquial 'jump'.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού marks attention to the reason that follows. 'Behold' preserves the discourse force with suitable biblical register; 'look' would sound too colloquial.
- source_word: μισθὸς
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: In this context the sense is positive recompense from God, not earned wages in a narrow economic sense. 'Reward' is the clearest natural rendering.
- source_word: πολὺς
  chosen: great
  alternatives:
  - large
  - abundant
  lexicon: BDAG
  rationale: Predicate adjective describing the reward. 'Great' is idiomatic with 'reward' in English and preserves the emphatic sense.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Singular οὐρανός here refers to the heavenly realm. 'In heaven' is standard, natural English; 'in the heavens' would be more wooden without improving sense.
- source_word: κατὰ τὰ αὐτά
  chosen: in the same way
  alternatives:
  - according to the same things
  - similarly
  lexicon: BDAG
  rationale: This idiom means 'in the same manner.' 'In the same way' is the clearest optimal-equivalence rendering.
- source_word: ἐποίουν
  chosen: used to do
  alternatives:
  - did
  - were doing
  lexicon: BDAG
  rationale: Imperfect tense suggests customary past action. 'Used to do' brings out the iterative/habitual force better than simple 'did'.
- source_word: τοῖς προφήταις
  chosen: to the prophets
  alternatives:
  - against the prophets
  lexicon: BDAG
  rationale: The dative with ποιέω is somewhat compressed in English; 'do to the prophets' preserves the Greek structure and leaves the hostile treatment implicit from context. 'Against the prophets' is interpretive.
- source_word: οἱ πατέρες αὐτῶν
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: BDAG
  rationale: πατέρες literally means 'fathers' and often refers to forefathers/ancestors. The more literal 'their fathers' preserves the intergenerational polemic and biblical idiom; 'ancestors' is possible but less textually transparent.
