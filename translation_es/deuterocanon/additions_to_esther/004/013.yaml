translation:
  language: es
  text: 'Y le dijo: «Te vi, señor, como[a] un ángel de Dios, y mi corazón se turbó por temor de tu gloria.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te vi como un ángel de Dios». El griego ὡς admite traducirse «como» o «cual», pero aquí la idea es comparativa, no de identidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶδόν
  english_pob_choice: I saw
  chosen_spanish: Te vi
  alternatives_spanish:
  - Te he visto
  lexicon: BDAG
  rationale: 'El aoristo narrativo de ὁράω se expresa de manera natural en español con pretérito simple: «vi». Mantiene el valor puntual de la percepción en la escena.'
- source_word: κύριε
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - Señor
  - amo
  lexicon: BDAG
  rationale: Aquí es un vocativo de cortesía dirigido a una figura humana. «señor» conserva el honorífico sin sugerir necesariamente un uso divino, como en la decisión inglesa de usar minúscula.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - cual
  lexicon: BDAG
  rationale: La comparación es claramente similitiva, no identificatoria; «como» reproduce con claridad la relación comparativa.
- source_word: ἄγγελον θεοῦ
  english_pob_choice: an angel of God
  chosen_spanish: un ángel de Dios
  alternatives_spanish:
  - un mensajero de Dios
  - el ángel de Dios
  lexicon: BDAG
  rationale: «Ángel» conserva mejor la imagen de majestad celestial y temor reverente que provoca la comparación. El griego anartro favorece una traducción indefinida en español.
- source_word: ἐταράχθη
  english_pob_choice: was troubled
  chosen_spanish: se turbó
  alternatives_spanish:
  - fue turbado
  - se perturbó
  lexicon: BDAG
  rationale: El pasivo aoristo de ταράσσω expresa agitación interior; «se turbó» es idiomático y mantiene el matiz emocional sin exagerar hacia «terrorizó».
- source_word: ἡ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi alma
  lexicon: BDAG
  rationale: Se conserva el idiomismo antropológico griego para el centro emocional e interior de la persona.
- source_word: ἀπὸ φόβου
  english_pob_choice: from fear
  chosen_spanish: por temor
  alternatives_spanish:
  - a causa del temor
  - debido al temor
  lexicon: BDAG
  rationale: En español, «por temor» comunica de manera natural la causa de la turbación y refleja bien el ἀπό causal que introdujo la revisión inglesa más cercana al griego.
- source_word: τῆς δόξης σου
  english_pob_choice: because of your glory
  chosen_spanish: de tu gloria
  alternatives_spanish:
  - de tu esplendor
  - por tu gloria
  lexicon: BDAG
  rationale: «Gloria» preserva la resonancia teológica de δόξα y, en este contexto, el temor nace ante esa gloria visible/majestuosa. La preposición se integra en la expresión causal anterior.
theological_decisions:
- issue: Tratamiento de κύριε en el marco de la escena de Ester
  english_pob_reading: lowercase 'lord' referring to a human ruler
  chosen_spanish_reading: «señor» en minúscula para un destinatario humano
  alternative_spanish_readings:
  - «Señor» con mayúscula
  - «amo»
  rationale: El contexto inmediato es el acercamiento temeroso a una figura real/humana, no una invocación a Dios. La minúscula evita una identificación teológica indebida y preserva el tono honorífico.
  doctrine_reference: 'DOCTRINE.md: κύριος normalmente se traduce ''Lord'', salvo cuando el contexto exige variación documentada.'
- issue: Comparación no identificatoria con ἄγγελον θεοῦ
  english_pob_reading: like an angel of God
  chosen_spanish_reading: «como un ángel de Dios»
  alternative_spanish_readings:
  - «como si fueras un ángel de Dios»
  - «como ángel de Dios»
  rationale: El texto describe semejanza y asombro, no identidad. Mantener «como» preserva la tensión comparativa documentada por la POB inglesa.
  doctrine_reference: 'POB lexical policy: conservar comparaciones donde el griego usa ὡς y no absolutizarlas.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que ajustó la relación de ἀπὸ φόβου τῆς δόξης σου hacia una causalidad más directa («from fear of»). En español, «por temor de tu gloria» refleja esa misma causalidad de forma natural y sobria. También se preservó la decisión inglesa de mantener κύριε como referencia humana honorífica y de traducir ὡς de modo comparativo, no identificatorio.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «gloria» para δόξα, evitando sustituir la resonancia bíblica por términos más interpretativos.
  - «señor» se escribió en minúscula conforme al referente humano del pasaje y a la decisión auditada en inglés.
  - La puntuación conserva comillas españolas y una estructura verbal fluida para lectura pública.
  - No se usó «Cristo», «SEÑOR» ni «siervo», porque el pasaje y el audit trail no lo justifican.
