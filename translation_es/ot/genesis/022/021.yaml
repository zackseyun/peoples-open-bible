translation:
  language: es
  text: Uz, su primogénito[a], Buz, su hermano, y Quemuel, el padre de Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Quemuel, el ancestro de Aram». En genealogías, «padre» a veces puede denotar un progenitor o fundador, no necesariamente un padre inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֥וּץ
  english_pob_choice: Uz
  chosen_spanish: Uz
  alternatives_spanish:
  - Uts
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración consagrada en español bíblico y no se traduce.
- source_word: בְּכֹר֖וֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo mayor
  lexicon: HALOT
  rationale: בכור señala al hijo nacido primero y puede implicar estatus; «primogénito» preserva ese valor genealógico mejor que «hijo mayor».
- source_word: בּ֣וּז
  english_pob_choice: Buz
  chosen_spanish: Buz
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la forma transliterada habitual.
- source_word: אָחִ֑יו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona se vierte naturalmente con «su» en español; el referente queda claro por el contexto genealógico.
- source_word: קְמוּאֵ֖ל
  english_pob_choice: Kemuel
  chosen_spanish: Quemuel
  alternatives_spanish:
  - Kemuel
  - Qemuel
  lexicon: HALOT
  rationale: Nombre propio; se adopta la transliteración española «Quemuel», más natural para la lectura en español y consistente con la fonología del nombre.
- source_word: אֲבִ֥י
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - ancestro de
  - progenitor de
  lexicon: HALOT
  rationale: En contextos genealógicos, אבי puede indicar relación paterna inmediata o de ascendencia. El texto base inglés conserva «the father of»; en español se mantiene esa formulación directa, sin ampliar el sentido en el cuerpo principal.
- source_word: אֲרָֽם
  english_pob_choice: Aram
  chosen_spanish: Aram
  lexicon: HALOT
  rationale: Nombre propio; se conserva sin glosa adicional porque el texto no especifica más.
theological_decisions:
- issue: Alcance genealógico de «el padre de Aram»
  english_pob_reading: Kemuel the father of Aram
  chosen_spanish_reading: Quemuel, el padre de Aram
  alternative_spanish_readings:
  - Quemuel, el ancestro de Aram
  - Quemuel, el progenitor de Aram
  rationale: El hebreo constructo admite una relación paterna directa o una ascendencia más amplia. Para no imponer una interpretación histórica/étnica que el verso no explicita, el texto principal conserva la lectura directa; la alternativa se documenta en nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador sigue el trazado auditado en inglés y mantiene la misma decisión genealógica principal, adaptada con transliteración y sintaxis naturales en español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo genealógico del hebreo con tres miembros unidos por comas y la conjunción «y».
  - Se evita sustituir «primogénito» por «mayor» para conservar la fuerza léxica de בכור.
  - La nota al pie conserva la alternativa documentada sin introducir una glosa interpretativa más allá del alcance del texto.
