source:
  edition: WLC
  text: כֹּ֛ל אֲשֶׁר יִגַּ֥ע בִּ/בְשָׂרָ֖/הּ יִקְדָּ֑שׁ וַ/אֲשֶׁ֨ר יִזֶּ֤ה מִ/דָּמָ/הּ֙ עַל הַ/בֶּ֔גֶד אֲשֶׁר֙ יִזֶּ֣ה עָלֶ֔י/הָ תְּכַבֵּ֖ס בְּ/מָק֥וֹם קָדֹֽשׁ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/006/020.yaml
  text: Anything that touches its flesh shall become holy[a], and if any of its blood is spattered on a garment, you shall wash that on which it was spattered in a holy place.
  footnotes:
  - marker: a
    text: Or 'is sprinkled.' The Hebrew verb can denote ritual sprinkling, but here 'spattered' was chosen because the blood lands on a garment and the context concerns washing it afterward.
    reason: lexical_alternative
