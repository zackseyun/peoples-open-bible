translation:
  language: es
  text: Y ahora clamemos al cielo; si nos favorece[a], él recordará el pacto de nuestros padres y aplastará este campamento ante nosotros hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si se complace en nosotros». El griego dice literalmente «si nos quiere», una expresión que señala la disposición favorable de Dios hacia su pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βοήσωμεν
  english_pob_choice: let us cry out
  chosen_spanish: clamemos
  alternatives_spanish:
  - clamemos a voz en cuello
  - gritemos
  - clamemos al cielo
  lexicon: BDAG
  rationale: Es una exhortación voluntativa con matiz de urgencia. «Clamemos» comunica bien la súplica intensa sin reducirla meramente al volumen de la voz.
- source_word: εἰς οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - a los cielos
  - hacia el cielo
  lexicon: BDAG
  rationale: «Al cielo» conserva la imagen direccional del griego y su valor de apelación a Dios sin explicitarlo de forma interpretativa en el texto principal.
- source_word: εἰ θελήσει ἡμᾶς
  english_pob_choice: if he is willing toward us
  chosen_spanish: si se muestra favorable a nosotros
  alternatives_spanish:
  - si nos quiere
  - si nos favorece
  - si se complace en nosotros
  lexicon: BDAG
  rationale: El griego literalmente usa θέλω con objeto personal, expresando disposición favorable. En español, «se muestra favorable a nosotros» preserva esa idea y suena natural; evita una literalidad extraña como «nos desea».
- source_word: μνησθήσεται
  english_pob_choice: he will remember
  chosen_spanish: recordará
  alternatives_spanish:
  - se acordará de
  - tendrá presente
  lexicon: BDAG
  rationale: «Recordará» es el equivalente bíblico natural para la memoria con eficacia de pacto, manteniendo la resonancia teológica de la acción divina.
- source_word: διαθήκης πατέρων
  english_pob_choice: the covenant of our fathers
  chosen_spanish: el pacto de nuestros padres
  alternatives_spanish:
  - el pacto con nuestros padres
  - el pacto de los padres
  lexicon: BDAG
  rationale: «Pacto» comunica bien διαθήκη en un contexto de alianza divina; «de nuestros padres» preserva el genitivo ancestral y el vínculo con los patriarcas.
- source_word: συντρίψει
  english_pob_choice: crush
  chosen_spanish: aplastará
  alternatives_spanish:
  - quebrantará
  - destrozará
  - quebrará
  lexicon: BDAG
  rationale: «Aplastará» conserva la fuerza violenta del verbo en contexto militar y evita debilitarlo con «romper» o «quebrar».
- source_word: τὴν παρεμβολὴν ταύτην
  english_pob_choice: this camp
  chosen_spanish: este campamento
  alternatives_spanish:
  - este ejército
  - este campamento enemigo
  - esta hueste
  lexicon: BDAG
  rationale: παρεμβολή puede ser campamento o fuerza acampada. «Campamento» mantiene la imagen concreta del griego; «este» conserva la inmediatez del demonstrativo.
- source_word: κατὰ πρόσωπον ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - en frente de nosotros
  - ante nosotros
  lexicon: BDAG
  rationale: «Delante de nosotros» es una forma natural en español para el valor idiomático de κατὰ πρόσωπον, sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Significado de εἰ θελήσει ἡμᾶς
  english_pob_reading: if he is willing toward us / if he favors us / if he is pleased with us
  chosen_spanish_reading: si se muestra favorable a nosotros
  alternative_spanish_readings:
  - si nos favorece
  - si se complace en nosotros
  - si nos quiere
  rationale: 'La frase griega es marcada: no solo dice «si quiere», sino voluntad orientada personalmente hacia el pueblo. «Se muestra favorable a nosotros» conserva la idea de disposición benevolente sin perder claridad en español.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Sujeto implícito de los verbos posteriores al condicional
  english_pob_reading: he will remember ... and crush ...
  chosen_spanish_reading: él recordará ... y aplastará ...
  alternative_spanish_readings:
  - recordará ... y aplastará ...
  rationale: El sujeto implícito es Dios, al que se dirige el clamor «al cielo». En español conviene explicitar «él» para claridad sintáctica, manteniendo la referencia divina.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «if he will desire us» a «if he is willing toward us» para mayor naturalidad y precisión. La redacción española sigue esa revisión, evitando una literalidad extraña y conservando el matiz favorable del verbo griego θέλω con objeto personal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto lo exija; este versículo no contiene el nombre divino explícito, por lo que el destinatario queda implícito en «al cielo».
  - Se prefirió «pacto» para διαθήκη en coherencia con el registro bíblico usado en español de este proyecto, sin borrar el trasfondo de alianza.
  - Se mantuvo «campamento» para παρεμβολή, conservando la imagen militar concreta del griego.
