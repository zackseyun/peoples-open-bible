translation:
  language: es
  text: 'Y me dijo: «Hijo de hombre, ¿ves lo que ellos están haciendo, las grandes abominaciones que la casa de Israel está haciendo aquí, para alejarme[a] de mi santuario? Sin embargo, verás abominaciones aún mayores[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacerme ir lejos de mi santuario»; también puede entenderse como «para apartarme de mi santuario».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite «grandes abominaciones»; en español se expresa la escalada como «abominaciones aún mayores».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - hijo de Adán
  - ser humano
  lexicon: HALOT
  rationale: Mantiene la forma profética establecida y conserva la correspondencia formal con el hebreo, sin sustituirla por una paráfrasis interpretativa.
- source_word: הֲרֹאֶה אַתָּה
  english_pob_choice: do you see
  chosen_spanish: ¿ves
  alternatives_spanish:
  - ¿estás viendo?
  - ¿has visto?
  lexicon: HALOT
  rationale: En español, la pregunta directa en presente simple transmite de manera natural la interrogación inmediata del hebreo.
- source_word: תּוֹעֵבוֹת גְּדֹלוֹת
  english_pob_choice: great abominations
  chosen_spanish: las grandes abominaciones
  alternatives_spanish:
  - las abominaciones grandes
  - las grandes cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» preserva la fuerza cultual y profética de תּוֹעֵבָה; «grandes» conserva el énfasis intensivo del adjetivo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la designación colectiva y covenantal del original, tal como en el texto inglés auditado.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio deíctico simple y natural en español; evita sobreexplicar el punto de referencia.
- source_word: לְרָחֳקָה מֵעַל מִקְדָּשִׁי
  english_pob_choice: to drive me far from my sanctuary
  chosen_spanish: para alejarme de mi santuario
  alternatives_spanish:
  - para apartarme de mi santuario
  - para hacerme ir lejos de mi santuario
  - para alejarme lejos de mi santuario
  lexicon: HALOT
  rationale: El hebreo expresa la idea de causar distancia; en español, «alejarme de mi santuario» comunica de forma natural la fuerza causativa sin añadir explicación no requerida.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» es el equivalente más preciso y menos interpretativo; «templo» sería más estrecho y más contextual.
- source_word: וְעוֹד תָּשׁוּב תִּרְאֶה
  english_pob_choice: Yet you will see even greater abominations
  chosen_spanish: Sin embargo, todavía verás
  alternatives_spanish:
  - Y verás de nuevo
  - Pero volverás a ver
  lexicon: HALOT
  rationale: La secuencia verbal introduce una continuación y escalada de la visión; «Sin embargo» conserva el giro discursivo, y «todavía verás» mantiene la continuidad del ver.
- source_word: תּוֹעֵבֹות גְּדֹלוֹת
  english_pob_choice: even greater abominations
  chosen_spanish: abominaciones todavía mayores
  alternatives_spanish:
  - abominaciones más grandes
  - abominaciones aún mayores
  lexicon: HALOT
  rationale: El hebreo repite el lenguaje de «grandes abominaciones» para intensificar la escena; en español, «todavía mayores» comunica la escalada sin perder el eco del original.
theological_decisions:
- issue: 'Sentido de לְרָחֳקָה מֵעַל מִקְדָּשִׁי: si describe actos realizados lejos del santuario o actos que provocan la retirada divina'
  english_pob_reading: their abominations are described as driving God far from his sanctuary
  chosen_spanish_reading: para alejarme de mi santuario
  alternative_spanish_readings:
  - para hacerme ir lejos de mi santuario
  - hechas lejos de mi santuario
  - para apartarme de mi santuario
  rationale: La forma causativa y el sufijo posesivo en «mi santuario» favorecen la lectura de que estas abominaciones provocan distancia respecto de Yahvé y su santuario. No se disimula la tensión; se expresa de manera directa y compatible con el contexto de Ezequiel.
  doctrine_reference: Ezequiel 8; coherencia interna del libro sobre la retirada de la gloria divina
- issue: 'Escalada final: repetición de תּוֹעֵבֹות גְּדֹלוֹת y su matiz comparativo'
  english_pob_reading: greater abominations
  chosen_spanish_reading: abominaciones todavía mayores
  alternative_spanish_readings:
  - mayores abominaciones
  - abominaciones aún mayores
  rationale: El hebreo repite literalmente «grandes abominaciones», pero el movimiento discursivo exige en español una comparación explícita. «Todavía mayores» conserva la escalada sin borrar el eco léxico del original.
  doctrine_reference: Principio de intensificación retórica profética
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo y la decisión del POB inglés de leer la segunda ocurrencia como intensificación. También conserva el matiz causativo de לְרָחֳקָה sin convertirlo en una paráfrasis doctrinalmente cerrada. Se adoptó «Sin embargo» para reflejar la transición discursiva hacia una revelación aún peor, en línea con la revisión final del inglés.
  spanish_consistency_notes:
  - Se mantiene «Hijo de hombre» como fórmula profética estable.
  - «Santuario» se usa de manera consistente para מִקְדָּשׁ.
  - «Abominaciones» preserva la terminología profética fuerte del original.
  - No se sustituye el lenguaje de escalada por una explicación suavizada; se conserva el contraste entre las dos menciones de תּוֹעֵבֹות גְּדֹלוֹת.
