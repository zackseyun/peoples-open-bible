    rationale: Aunque fiel al campo semántico, «Conságrense» corresponde mejor al inglés auditado «Consecrate yourselves» y comunica mejor el matiz de apartarse/prepararse para la acción divina en español actual.
  revised_spanish_text: 'Entonces Josué dijo al pueblo: «Conságrense, porque mañana Yahvé hará maravillas[a] entre ustedes[b]».'
