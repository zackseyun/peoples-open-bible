id: PSS.2.6
reference: Psalms of Solomon 2:6
source:
  edition: lxx-swete-1909
  text: υἱοὶ καὶ θυγατέρες ἐν αἰχμαλωσίᾳ πονηρᾷ, ἐν σφραγῖδι ὁ τράχηλος αὐτῶν, ἐν ἐπισήμῳ ἐν τοῖς ἔθνεσιν.
  language: Greek
  pages:
  - 789
  validation: swete_direct
translation:
  text: Sons and daughters were in evil captivity[a], their necks in a seal[b], with a mark among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “their neck in a seal, in a mark among the nations.” The Greek imagery is compressed; it may evoke captives being publicly marked or treated as slaves.
    reason: lexical_alternative
  - marker: b
    text: “Branded” could also be rendered more generally as “marked” or “made conspicuous.”
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ καὶ θυγατέρες
  chosen: Sons and daughters
  alternatives:
  - sons and the daughters
  - children
  lexicon: LSJ
  rationale: A direct rendering preserves the paired, gender-specific expression in the Greek. “Children” is smoother but loses the source’s explicit sons/daughters wording.
- source_word: αἰχμαλωσίᾳ πονηρᾷ
  chosen: in cruel captivity
  alternatives:
  - in grievous captivity
  - in evil captivity
  - in harsh captivity
  lexicon: LSJ
  rationale: αἰχμαλωσία is straightforwardly “captivity.” πονηρός here describes the captivity as grievous or cruel rather than morally evil, so “cruel captivity” gives natural English while keeping the severity.
- source_word: ἐν σφραγῖδι
  chosen: marked with a seal
  alternatives:
  - under a seal
  - with a seal
  - sealed
  lexicon: LSJ
  rationale: 'σφραγίς means “seal,” “stamp,” or “signet impression.” Because the Greek phrase is compressed and attached to “their neck,” the translation makes the implied result explicit: the neck was marked by a seal or stamp. This preserves the image without wooden English.'
- source_word: ὁ τράχηλος αὐτῶν
  chosen: their necks
  alternatives:
  - their neck
  - the neck of them
  lexicon: LSJ
  rationale: Although the Greek uses a singular collective noun, idiomatic English normally pluralizes it when referring to multiple persons.
- source_word: ἐν ἐπισήμῳ
  chosen: branded
  alternatives:
  - marked
  - made conspicuous
  - bearing a mark
  lexicon: LSJ
  rationale: ἐπίσημος can denote something marked, distinguished, or branded. In this captivity context, following the neck/seal imagery, “branded” best conveys public marking and humiliation, though a broader sense of “marked” remains possible.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - among the peoples
  lexicon: LSJ
  rationale: “Among the nations” is the most transparent rendering and fits the exilic/public-shame setting well.
