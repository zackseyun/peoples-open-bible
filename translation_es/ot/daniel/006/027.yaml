revisions:
- from: 'De parte de mí[a] se emite un decreto: que en todo el dominio de mi reino tiendan a temblar y a temer ante[b] el Dios de Daniel, porque él es el Dios vivo y permanece para siempre; y su reino no será destruido[c], y su dominio hasta el fin.'
  to: 'Por mí[a] se emite un decreto: que en todo el dominio de mi reino tiemblen y teman ante[b] el Dios de Daniel, porque él es el Dios vivo y permanece para siempre; y su reino no será destruido[c], y su dominio será hasta el fin.'
  rationale: 'Se corrigieron dos puntos necesarios para la fidelidad y la naturalidad: el mandato deóntico del decreto ahora se expresa con ''tiemblen y teman'' en vez de ''tiendan a temblar y a temer'', y la cláusula final se completó como ''su dominio será hasta el fin'' para reflejar el sentido verbal del arameo y evitar una frase truncada en español. También se ajustó la apertura a ''Por mí'' por mayor idiomaticidad en contexto de decreto.'
