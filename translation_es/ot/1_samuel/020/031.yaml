revisions:
- from: Porque mientras el hijo de Isaí viva sobre la tierra[a], ni tú ni tu reino serán establecidos. Ahora pues, envía y tráelo a mí, porque es un hombre condenado a muerte.
  to: Porque mientras el hijo de Isaí viva sobre la tierra, ni tú ni tu reino quedarán establecidos. Ahora pues, envía y tráelo a mí, porque es un hijo de muerte[a].
  rationale: Se revisa para alinear el español con el hebreo y con la decisión documentada del POB inglés de conservar el modismo «son of death» en el texto principal y explicarlo en nota. También se reubica correctamente el marcador de nota y se suaviza una construcción pasiva poco natural en español con «quedarán establecidos».
  reviewer_model: gpt-5.4
