translation:
  language: es
  text: Con canto[a], proverbio, enigma y dicho[b], asombraste a los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en cantos y proverbios y parábolas y en interpretación, las tierras se maravillaron de ti». Esto respalda el sentido de asombro extendido y conserva «interpretación» como alternativa posible para el último término.'
    reason: alternative_reading
  - marker: b
    text: 'El verbo hebreo es difícil aquí; la traducción sigue el hebreo, tomando en cuenta el paralelo griego, que ofrece un sentido más claro: «se maravillaron de ti».'
    reason: textual_variant
lexical_decisions:
- source_word: בשיר
  english_pob_choice: With song
  chosen_spanish: Con canto
  alternatives_spanish:
  - En canto
  - Por canto
  lexicon: HALOT
  rationale: El prefijo ב aquí expresa esfera o medio; en español, «con canto» conserva bien el valor instrumental y suena natural en una enumeración de formas literarias. «Canto» es más idiomático que «canción» en un registro bíblico breve.
- source_word: משל
  english_pob_choice: proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - parábola
  - máxima
  lexicon: HALOT
  rationale: En literatura sapiencial, משל suele ser un proverbio o dicho sapiencial. «Proverbio» mantiene la forma sentenciosa sin forzar la imagen de «parábola», aunque esa sea una posibilidad contextual.
- source_word: חידה
  english_pob_choice: riddle
  chosen_spanish: enigma
  alternatives_spanish:
  - acertijo
  - dicho oscuro
  lexicon: HALOT
  rationale: «Enigma» comunica el carácter difícil o velado de חידה en un español digno y bíblico, sin perder el valor sapiencial. «Acertijo» sería más coloquial.
- source_word: ומליצה
  english_pob_choice: saying
  chosen_spanish: dicho
  alternatives_spanish:
  - expresión
  - discurso
  - interpretación
  lexicon: HALOT
  rationale: La revisión inglesa simplificó la decisión a «saying»; en español, «dicho» conserva una forma breve y sentenciosa acorde con la serie de géneros literarios. Evita sobredeterminar el término hacia «interpretación», aunque el paralelo griego lo permita.
- source_word: עמים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las gentes
  lexicon: HALOT
  rationale: «Los pueblos» preserva el plural colectivo de עמים y coincide con el eco del griego χῶραι en el paralelo, sin restringirlo a entidades políticas.
- source_word: הסערתה
  english_pob_choice: you astounded the peoples
  chosen_spanish: asombraste a los pueblos
  alternatives_spanish:
  - agitaste a los pueblos
  - los pueblos quedaron asombrados de ti
  lexicon: HALOT
  rationale: El hebreo es difícil; la forma puede sugerir sacudir o agitar, pero el paralelo griego apunta claramente a asombro generalizado. «Asombraste» sigue la lectura final del POB inglés y expresa el resultado semántico sin introducir una idea de tumulto no respaldada por el contexto.
theological_decisions:
- issue: Uso del paralelo griego para resolver el verbo hebreo difícil
  english_pob_reading: The Hebrew verb is difficult here; the translation follows the Hebrew wording while taking account of the Greek parallel's clearer sense, 'marveled at you.'
  chosen_spanish_reading: La traducción sigue el hebreo, pero deja que el paralelo griego confirme el sentido de asombro.
  alternative_spanish_readings:
  - seguir solo el hebreo y decir «agitaste a los pueblos»
  - seguir solo el griego y decir «los pueblos se maravillaron de ti»
  rationale: La evidencia hebrea y griega no coincide plenamente. En español, «asombraste a los pueblos» mantiene la forma activa del hebreo y a la vez refleja el sentido más claro del griego de una reacción de admiración.
  doctrine_reference: Principio de crítica textual y de traducción por testigos paralelos; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que redujo «eloquent saying» a «saying» y pasó de una idea de agitación a la formulación más directa «astounded the peoples». La versión española sigue esa línea revisada, pero conserva la nota sobre la dificultad del verbo hebreo y el apoyo del griego.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo» y otras fórmulas litúrgicas no pertinentes.
  - Se mantuvo un español bíblico claro y moderno, con léxico sapiencial directo.
  - Los sustantivos de la lista se uniformaron en singular para reflejar la serie de formas literarias del hebreo.
  - «Los pueblos» se usó para mantener el plural colectivo de עמים sin especificar más.
