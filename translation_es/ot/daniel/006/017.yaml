base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/017.yaml
  text: Then the king gave the command[a], and they brought Daniel and threw him into the den of lions. The king answered and said to Daniel, “Your God, whom you continually serve[b], he will deliver you.”
  footnotes:
