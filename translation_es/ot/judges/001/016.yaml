    text: O «entre el pueblo». Algunos testigos antiguos leen «con Amalec» en lugar de «con el pueblo».
    reason: alternative_reading
  revision_rationale: Se corrige «tierra despoblada» a «desierto de Judá» para reflejar con mayor fidelidad מִדְבַּר y el audit trail inglés. También se mejora la naturalidad de la narración con «y fue y se estableció», manteniendo el singular documentado en nota. Se reubica la nota sobre «Ciudad de las Palmeras» junto a su expresión correspondiente y se conserva la ambigüedad de «con el pueblo», añadiendo en la nota la alternativa auditada «entre el pueblo» junto con la variante antigua «con Amalec».
