  glossary_alignment: 'Alineación general buena con la terminología del proyecto: ''Yahvé'' está correctamente usado para יְהוָה; ''voz'' preserva בְּקוֹל; ''comandantes de las fuerzas'' es aceptable para שָׂרֵי הַחֲיָלִים; ''pueblo'' para עָם es natural. La desviación principal es el nombre propio ''Jonatán'', que no concuerda con el hebreo ni con la audit trail inglesa.'
