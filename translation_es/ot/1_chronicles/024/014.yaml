  revision_awareness: El pasaje está en alto acuerdo textual y la revisión más reciente no introdujo cambios. La traducción sigue el hebreo masorético y el criterio auditado del inglés POB para convertir cardinales en ordinales por el contexto de reparto de suertes.
  spanish_consistency_notes:
