translation:
  language: es
  text: 'Dirán entre sí, arrepintiéndose, y gemirán por la angustia del espíritu: «Este era aquel a quien una vez tuvimos por objeto de burla[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quien una vez tratamos como burla» / «a quien una vez consideramos motivo de burla».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐροῦσιν
  english_pob_choice: They will say
  chosen_spanish: Se dirán
  alternatives_spanish:
  - Dirán
  - Se hablarán
  lexicon: BDAG
  rationale: El futuro de λέγω se expresa de manera natural en español con un futuro de decir. Como el griego presenta una խոս speech colectiva, «se dirán» conserva la interacción entre ellos y el sentido de discurso mutuo.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - dentro de sí
  - para sí
  lexicon: BDAG
  rationale: La expresión admite una lectura interna o recíproca. «Entre sí» refleja bien el carácter colectivo del pasaje sin excluir la interioridad del remordimiento.
- source_word: μετανοοῦντες
  english_pob_choice: repenting
  chosen_spanish: arrepintiéndose
  alternatives_spanish:
  - cambiando de mente
  - sintiendo remordimiento
  lexicon: BDAG
  rationale: El participio tiene fuerza moral y religiosa. «Arrepintiéndose» preserva esa carga mejor que un mero «lamentando» o «remordiéndose».
- source_word: διὰ στενοχωρίαν πνεύματος
  english_pob_choice: because of anguish of spirit
  chosen_spanish: por la angustia del espíritu
  alternatives_spanish:
  - a causa de la angustia del espíritu
  - por estrechez de espíritu
  - por angustia interior
  lexicon: BDAG
  rationale: στενοχωρία denota angustia o aflicción; πνεύματος aquí funciona como genitivo de esfera o cualidad interior. «Angustia del espíritu» mantiene la imagen y evita reducirla a simple emoción.
- source_word: στενάξονται
  english_pob_choice: will groan
  chosen_spanish: gemirán
  alternatives_spanish:
  - suspirarán
  - se lamentarán
  lexicon: BDAG
  rationale: En español, «gemirán» comunica con naturalidad el dolor audible e intenso del verbo στενάζω. «Lamentarán» sería más interpretativo.
- source_word: Οὗτος ἦν ὃν ἔσχομέν ποτε
  english_pob_choice: This is the one whom we once held
  chosen_spanish: Este era aquel a quien antes tuvimos
  alternatives_spanish:
  - Éste fue aquel a quien antes tuvimos
  - Este era el que antes tuvimos por
  lexicon: BDAG
  rationale: El griego mira retrospectivamente a una persona objeto de desprecio; el imperfecto se refleja con «era» y «antes tuvimos» para conservar la perspectiva pasada de su juicio.
- source_word: εἰς γέλωτα
  english_pob_choice: in derision
  chosen_spanish: en derision
  alternatives_spanish:
  - para burla
  - como objeto de burla
  - para escarnio
  lexicon: BDAG
  rationale: La expresión designa a alguien tratado como objeto de risa despreciativa. «En derision» es breve y digno, y corresponde al valor escogido por el POB en inglés.
theological_decisions:
- issue: Fuerza de μετανοοῦντες en la voz de los impíos
  english_pob_reading: repenting
  chosen_spanish_reading: arrepintiéndose
  alternative_spanish_readings:
  - lamentándose
  - mostrando remordimiento
  rationale: 'La escena describe reconocimiento moral real, no solo tristeza. «Arrepintiéndose» preserva la tensión del texto: expresa cambio interior sin resolver aquí si ese arrepentimiento es salvador o meramente tardío.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3
translation_notes:
  revision_awareness: 'El texto base y la lectura inglesa auditada muestran acuerdo alto y no requieren revisión sustantiva. Se conservó la secuencia del original griego: habla colectiva, arrepentimiento, gemido por la angustia del espíritu y referencia al trato despreciativo previo.'
  spanish_consistency_notes:
  - Se mantuvo «espíritu» para πνεύματος, evitando «ánimo» porque el contexto es más intenso y conserva mejor la imagen del griego.
  - Se prefirió «en derision»/«derision» como equivalente sobrio de γέλωτα, aunque «burla» también sería posible; la nota recoge la alternativa semántica.
  - Se usó «arrepintiéndose» para μετανοοῦντες según la decisión inglesa POB, sin suavizarlo a «lamentándose».
  - La puntuación con dos puntos y comillas reproduce el cambio a discurso directo del original.
