revisions:
- from: Estas son las estatutos, los juicios y las leyes que Yahvé dio entre él y los hijos de Israel en el monte Sinaí por mano de Moisés[a][b].
  to: Estos son los estatutos, los juicios y las leyes que Yahvé dio entre él y los hijos de Israel en el monte Sinaí por mano de Moisés[a][b].
  rationale: Se corrigió la concordancia gramatical cambiando 'las estatutos' por 'los estatutos' y, para mantener la concordancia deíctica más natural en la apertura, 'Estas son' por 'Estos son'. También se normalizó la puntuación editorial de la nota b. No se requieren cambios de fondo en la exégesis ni en la terminología del proyecto.
