translation:
  language: es
  text: Porque no quedé silenciado[a] por causa de la oscuridad, ni porque la densa tiniebla cubriera mi rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no fui cortado»; o: «no fui destruido». El hebreo de este versículo es difícil, especialmente en el sentido de נִצְמַתִּי y en si la última cláusula significa «cubriera mi rostro» o «cubriera delante de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior. «Porque» comunica la relación causal con naturalidad en español y mantiene el flujo discursivo del hebreo.
- source_word: נִצְמַתִּי
  english_pob_choice: I was not silenced
  chosen_spanish: no fui silenciado
  alternatives_spanish:
  - no fui cortado
  - no fui destruido
  - no fui llevado a término
  lexicon: HALOT
  rationale: El nifal de צמת admite el sentido de quedar silenciado, cortado o consumido. «No fui silenciado» sigue la lectura de la POB inglesa y preserva la tensión del texto, que puede aludir tanto al cese de la voz como al fin de la persona.
- source_word: מִפְּנֵי חֹשֶׁךְ
  english_pob_choice: because of the darkness
  chosen_spanish: por causa de la oscuridad
  alternatives_spanish:
  - debido a la oscuridad
  - por delante de la oscuridad
  - desde la oscuridad
  lexicon: HALOT
  rationale: La construcción con פְּנֵי expresa causalidad u ocasión aquí. «Por causa de la oscuridad» conserva ese valor causal en español y evita imponer una lectura espacial.
- source_word: וּמִפָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - ante mí
  - de mi presencia
  lexicon: HALOT
  rationale: Con el sufijo de primera persona en פָּנִים, la lectura más directa es un sustantivo personal. «Mi rostro» permite traducir el paralelismo con naturalidad poética sin resolver indebidamente la ambigüedad hacia un adverbio.
- source_word: כִּסָּה
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - veló
  - ocultó
  lexicon: HALOT
  rationale: Verbo común de cubrir o ocultar. «Cubrió» es la opción más directa y conserva el carácter concreto de la imagen.
- source_word: אֹפֶל
  english_pob_choice: deep gloom
  chosen_spanish: la densa tiniebla
  alternatives_spanish:
  - la profunda oscuridad
  - la oscuridad espesa
  - la tiniebla
  lexicon: HALOT
  rationale: אֹפֶל es más fuerte que חֹשֶׁךְ y suele indicar tiniebla espesa o profunda. «Densa tiniebla» distingue este segundo término del primero y mantiene el tono intensificado del hebreo.
theological_decisions:
- issue: 'Sentido difícil de נִצְמַתִּי: ¿silenciado, cortado, destruido?'
  english_pob_reading: I was not silenced
  chosen_spanish_reading: No fui silenciado
  alternative_spanish_readings:
  - No fui cortado
  - No fui destruido
  - No fui llevado a término
  rationale: La POB inglesa opta por «silenced» sin eliminar las demás posibilidades. En español, «silenciado» conserva la posibilidad de que Job hable de su voz, su vida o su continuidad ante la aflicción, sin cerrar la ambigüedad del nifal.
  doctrine_reference: Poética sapiencial; preservación de ambigüedad lexical
- issue: 'Cláusula final: ¿cubrió mi rostro o cubrió delante de mí?'
  english_pob_reading: nor because deep gloom covered my face
  chosen_spanish_reading: ni la densa tiniebla cubrió mi rostro
  alternative_spanish_readings:
  - ni la densa tiniebla cubrió delante de mí
  - ni la densa tiniebla me cubrió
  rationale: El sufijo de 1cs en פָּנַי favorece la referencia a «mi rostro», como en la lectura inglesa de la POB. Se mantiene la dificultad del hebreo sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Exégesis poética; ambigüedad sintáctica
- issue: Intensificación lexical entre חֹשֶׁךְ y אֹפֶל
  english_pob_reading: darkness / deep gloom
  chosen_spanish_reading: oscuridad / densa tiniebla
  alternative_spanish_readings:
  - oscuridad / tiniebla espesa
  - oscuridad / profunda oscuridad
  rationale: Se preserva la distinción semántica entre un término general y otro más intenso. La traducción evita nivelar ambos vocablos como simple repetición.
  doctrine_reference: Poética hebrea; paralelismo léxico
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente indicado como sin cambios necesarios (2026-04-23), y se conservó la solución de la POB inglesa para las dos zonas difíciles: נִצְמַתִּי y la cláusula final con פָּנַי. También se mantuvo la distinción entre חֹשֶׁךְ y אֹפֶל mediante dos equivalentes españoles distintos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conserva el registro poético y la ambigüedad del hebreo sin expandir el sentido.
  - «Oscuridad» y «densa tiniebla» distinguen los dos sustantivos hebreos relacionados pero no idénticos.
  - La nota al pie marca la incertidumbre textual/lexical sin imponer una sola solución.
