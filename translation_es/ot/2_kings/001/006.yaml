review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura narrativa, el nombre divino «Yahvé», la reprensión retórica y la sentencia de muerte. Sin embargo, hay dos problemas de fidelidad/estilo relevantes: (1) «y díganle» borra la distinción entre דבר («hablar») y אמר («decir») que el expediente inglés quiso preservar; y (2) «la cama a la que subiste allí no bajarás de ella» suena poco natural en español y ordena la frase de manera torpe, aunque intenta reflejar el hebreo. Conviene reparar ambos puntos sin perder el sentido de ascenso/descenso.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta una literalidad poco idiomática en «a la que subiste allí no bajarás de ella» y una nota b deficiente: «aquello sobre lo que subiste allí» es demasiado vaga y pierde el referente «cama/lecho». También «dios de Ecrón» funciona, pero «el dios de Ecrón» suena más natural en aposición explicativa en español.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé», אֱלֹהִים → «Dios», nombre propio «Baal-zebub» conservado. No hay conflictos doctrinales mayores. La única desviación terminológica significativa es la preferencia documentada por mantener la distinción verbal en וְדִבַּרְתֶּם אֵלָיו, mejor como «háblenle» o equivalente, no «díganle».'
  issues:
  - severity: medium
    issue: Se pierde la distinción léxica entre דבר y אמר con «díganle».
    rationale: El expediente inglés documenta explícitamente «and speak to him» para preservar la diferencia frente a אמר. En español, «háblenle» mantiene mejor esa decisión sin volver extraña la frase.
  - severity: medium
    issue: La cláusula «la cama… no bajarás de ella» es gramaticalmente torpe y poco natural.
    rationale: Aunque intenta seguir el hebreo de cerca, el orden resulta pesado en español. Una formulación como «no bajarás de la cama a la que subiste» conserva el sentido y mejora mucho la legibilidad.
  - severity: low
    issue: 'La nota b propuesta es imprecisa: «aquello sobre lo que subiste allí».'
    rationale: Esa alternativa introduce vaguedad inexistente en el hebreo, que sí tiene un referente concreto («la cama/el lecho»). La nota debe limitarse a alternativas fieles como «el lecho» o una observación sobre «a la que subiste allí».
  - severity: low
    issue: «dios de Ecrón» sin artículo es posible pero menos natural en aposición.
    rationale: En español, «Baal-zebub, el dios de Ecrón» suena más completo y claro; además refleja bien la identificación explicativa del original.
  revised_spanish_text: 'Y ellos le dijeron[a]: «Un hombre subió a encontrarnos y nos dijo: “Vayan, vuelvan al rey que los envió, y háblenle: ‘Así dice Yahvé: ¿Es porque no hay Dios en Israel que tú estás enviando a consultar a Baal-zebub, el dios de Ecrón? Por tanto, no bajarás de la cama[b] a la que subiste, porque ciertamente morirás’”».'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Es por falta de un Dios en Israel que estás enviando a consultar a Baal-zebub…?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del lecho». Lit. «de la cama a la que subiste allí».'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos principales: preserva mejor la distinción léxica del hebreo con «háblenle» para וְדִבַּרְתֶּם, y reordena la sentencia sobre la cama para que suene natural en español sin perder la imagen de subir y no bajar. También mejora la nota b para que ofrezca una alternativa fiel y útil, y hace más natural la aposición «el dios de Ecrón».'
