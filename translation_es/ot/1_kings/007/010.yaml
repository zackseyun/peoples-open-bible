translation:
  language: es
  text: Y el cimiento era de piedras costosas[a], piedras grandes, piedras de diez codos y piedras de ocho codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras preciosas». El hebreo enfatiza el alto valor o la calidad de las piedras; en este contexto arquitectónico, «piedras costosas» es menos probable que sugiera gemas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְיֻסָּד
  english_pob_choice: And the foundation was
  chosen_spanish: Y el cimiento era
  alternatives_spanish:
  - Y el fundamento era
  - Y la base era
  lexicon: HALOT
  rationale: El participio pasivo se entiende aquí en sentido arquitectónico y predicativo. En español, «cimiento» expresa naturalmente la base estructural sin forzar un sujeto explícito que el hebreo no desarrolla.
- source_word: אֲבָנִים יְקָרוֹת
  english_pob_choice: of costly stones
  chosen_spanish: de piedras preciosas
  alternatives_spanish:
  - de piedras costosas
  - de piedras valiosas
  lexicon: HALOT
  rationale: El hebreo subraya piedras de alto valor o calidad. En español, «preciosas» puede reflejar tanto el valor como la nobleza del material, aunque también permite la alternativa señalada por la nota; se conserva la tensión semántica que en contexto constructivo no apunta a gemas.
- source_word: אֲבָנִים גְּדֹל֑וֹת
  english_pob_choice: large stones
  chosen_spanish: piedras grandes
  alternatives_spanish:
  - piedras enormes
  - grandes piedras
  lexicon: HALOT
  rationale: גדולות describe tamaño físico. «Piedras grandes» es una equivalencia directa, natural y fiel al orden nominal del hebreo.
- source_word: אַבְנֵי עֶשֶׂר אַמּוֹת
  english_pob_choice: stones of ten cubits
  chosen_spanish: piedras de diez codos
  alternatives_spanish:
  - piedras de diez codos de largo
  - piedras de diez codos de medida
  lexicon: HALOT
  rationale: Se mantiene la construcción de genitivo y la unidad antigua sin convertirla ni precisar el eje de medida, porque el hebreo tampoco lo hace.
- source_word: וְאַבְנֵי שְׁמֹנֶה אַמּוֹת
  english_pob_choice: and stones of eight cubits
  chosen_spanish: y piedras de ocho codos
  alternatives_spanish:
  - y piedras de ocho codos de largo
  - y piedras de ocho codos de medida
  lexicon: HALOT
  rationale: Se conserva el paralelismo del hebreo y la misma solución que en la frase anterior para mantener consistencia estilística y métrica.
- source_word: אַמּוֹת
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos antiguos
  lexicon: HALOT
  rationale: «Codos» es el equivalente español convencional para la unidad antigua אַמָּה y preserva la referencia histórica sin interpretarla.
translation_notes:
  revision_awareness: La revisión en inglés quedó sin cambios, con acuerdo alto entre revisores; por eso esta versión española sigue de cerca la lectura ya estabilizada, conservando la misma estructura sintáctica y la misma distinción entre valor, tamaño y medida.
  spanish_consistency_notes:
  - Se mantiene «codo» para אַמָּה, coherente con el registro bíblico y con la traducción inglesa auditada.
  - Se conserva la coordinación acumulativa del hebreo («piedras preciosas, piedras grandes, piedras de diez codos y piedras de ocho codos»), sin añadir verbos o detalles no presentes en la fuente.
  - La nota lexical permite la alternativa «piedras costosas» para reflejar la ambigüedad documentada entre valor económico y calidad material.
