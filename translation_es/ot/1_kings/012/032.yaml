base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/032.yaml
  text: Jeroboam made a feast in the eighth month[a], on the fifteenth day of the month, like the feast that was in Judah, and he went up to the altar. Thus he did in Bethel, sacrificing to the calves that he had made[b]; and he stationed in Bethel the priests of the high places that he had made.
  footnotes:
  - marker: a
    text: The feast in Judah likely refers to the Feast of Booths (Tabernacles), held on the fifteenth day of the seventh month; Jeroboam set his rival feast one month later.
    reason: cross_reference
  - marker: b
    text: Or 'he went up on the altar.' The Hebrew expression can be rendered more literally, but in context it refers to approaching/ascending the altar to officiate.
    reason: lexical_alternative
