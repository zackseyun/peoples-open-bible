translation:
  language: es
  text: Los labios veraces permanecen firmes para siempre[b][a], pero la lengua mentirosa dura solo un momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El labio de verdad permanece firme para siempre, pero la lengua de falsedad dura solo un momento».'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea de la segunda línea es difícil; el sentido es que el habla falsa es breve en contraste con la permanencia de la verdad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂפַת
  english_pob_choice: lip
  chosen_spanish: labio
  alternatives_spanish:
  - labios
  - habla
  - voz
  lexicon: HALOT
  rationale: El hebreo está en singular constructo, literalmente «labio de». En español, «un labio de verdad» conserva mejor esa imagen singular que pluralizarlo. «Habla» o «voz» suavizan demasiado la metáfora.
- source_word: אֱמֶת
  english_pob_choice: truthful
  chosen_spanish: verdad
  alternatives_spanish:
  - verdadero
  - veraz
  - de verdad
  lexicon: HALOT
  rationale: 'La construcción hebrea funciona de manera nominal: «labio de verdad». En español, mantener el sustantivo «verdad» preserva la fuerza proverbial y evita forzar un adjetivo donde el original es más compacto.'
- source_word: תִּכּוֹן
  english_pob_choice: is established
  chosen_spanish: permanece firme
  alternatives_spanish:
  - será establecida
  - está establecida
  - se mantiene
  lexicon: HALOT
  rationale: El nifal de כון comunica ser establecido, afirmado o hecho firme. «Permanece firme» expresa la estabilidad duradera con naturalidad proverbial en español.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para perpetuidad
  lexicon: HALOT
  rationale: La expresión indica permanencia continua. «Para siempre» es la equivalencia natural y clara en español, y mantiene el contraste con la brevedad del segundo hemistiquio.
- source_word: וְעַד
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y hasta
  - mientras que
  - y
  lexicon: HALOT
  rationale: Aunque la forma es «y/hasta», en el paralelismo antitético funciona como contraste. «Pero» comunica mejor el giro poético entre permanencia y brevedad.
- source_word: אַרְגִּיעָה
  english_pob_choice: lasts only a moment
  chosen_spanish: dura solo un momento
  alternatives_spanish:
  - dura un instante
  - es solo por un momento
  - permanece un momento
  lexicon: HALOT
  rationale: La forma es difícil; en contexto, el sentido apunta a brevedad temporal frente a la permanencia de la verdad. «Dura solo un momento» hace explícita esa brevedad sin añadir contenido ajeno.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - labio
  - habla
  - lenguaje
  lexicon: HALOT
  rationale: «Lengua» conserva la metáfora corporal habitual en la sabiduría bíblica y hace buen paralelo con «labio» en la primera línea.
- source_word: שָׁקֶר
  english_pob_choice: lying
  chosen_spanish: mentirosa
  alternatives_spanish:
  - falsa
  - de mentira
  - engañosa
  lexicon: HALOT
  rationale: Como modificador de «lengua», «mentirosa» es natural en español y reproduce la cualidad ética del hebreo. «Falsa» podría sonar más abstracto; «mentirosa» mantiene la personificación proverbial.
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo WLC y el análisis del POB inglés. Se mantuvo la antítesis entre permanencia y brevedad, y se resolvió la segunda línea con una traducción contextual de la expresión difícil אַרְגִּיעָה sin ocultar la tensión léxica.
  spanish_consistency_notes:
  - 'Se preservó la metáfora corporal del hebreo: «labio» / «lengua».'
  - Se prefirió «verdad» como sustantivo en la primera línea para respetar la estructura constructa hebrea.
  - Se usó «pero» para reflejar el contraste poético de וְעַד en este paralelismo antitético.
  - La nota b conserva la ambigüedad de la segunda línea en lugar de fijar una sola solución como definitiva.
