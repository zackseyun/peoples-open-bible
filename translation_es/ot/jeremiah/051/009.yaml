translation:
  language: es
  text: Intentamos sanar a Babilonia[a], pero no fue sanada. Déjenla, y que cada uno vaya a su propia tierra[b], porque su juicio[c] ha llegado hasta el cielo y ha sido elevado hasta los cielos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tratamos de sanar». El hebreo expresa una acción realizada o intentada, con el resultado explícito de que no fue sanada.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «a su tierra»; el hebreo es singular masculino distributivo: «cada uno a su tierra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sentencia» o «condena»; מִשְׁפָּט puede tener matiz judicial y punitivo.'
    reason: lexical_alternative
  - marker: d
    text: «Los cielos» traduce un término hebreo para las alturas nubosas o los cielos superiores.
    reason: cultural_note
lexical_decisions:
- source_word: רפאנו
  english_pob_choice: We tried to heal
  chosen_spanish: Intentamos sanar
  alternatives_spanish:
  - Sanamos
  - Quisimos sanar
  lexicon: HALOT
  rationale: El perfecto verbal aquí expresa una acción intentada o emprendida que no logró el resultado esperado, como muestra la cláusula siguiente. 'Intentamos sanar' conserva el sentido de esfuerzo realizado sin afirmar éxito.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonía
  lexicon: HALOT
  rationale: Nombre propio histórico y bíblico estándar en español.
- source_word: נִרְפָּתָה
  english_pob_choice: was not healed
  chosen_spanish: no sanó
  alternatives_spanish:
  - no pudo ser sanada
  - no fue sanada
  lexicon: HALOT
  rationale: La pasiva hebrea puede expresarse naturalmente como resultado fallido en español. 'No sanó' mantiene la idea central de no haber sido curada, sin perder la relación con el intento previo.
- source_word: עִזְבוּהָ
  english_pob_choice: Leave her
  chosen_spanish: Déjenla
  alternatives_spanish:
  - Abandonenla
  - Déjenla sola
  lexicon: HALOT
  rationale: El imperativo plural con sufijo femenino singular se traduce de forma directa y natural. 'Déjenla' conserva el mandato de apartarse de Babilonia.
- source_word: וְנֵלֵךְ אִישׁ לְאַרְצוֹ
  english_pob_choice: and let each one go to his own land
  chosen_spanish: y que cada uno vaya a su propia tierra
  alternatives_spanish:
  - y que cada hombre vaya a su propia tierra
  - y que cada uno vuelva a su país
  lexicon: HALOT
  rationale: La construcción distributiva hebrea 'a un hombre a su tierra' se expresa con 'cada uno' para conservar el valor singular representativo sin masculinizar de más ni convertirlo en plural abstracto.
- source_word: מִשְׁפָּטָהּ
  english_pob_choice: her judgment
  chosen_spanish: su juicio
  alternatives_spanish:
  - su sentencia
  - su condena
  - su justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar decisión judicial, juicio o sentencia. 'Juicio' preserva la ambigüedad legal-teológica del texto y evita fijar prematuramente el matiz punitivo.
- source_word: נָגַע אֶל הַשָּׁמַיִם
  english_pob_choice: has reached to heaven
  chosen_spanish: ha llegado hasta el cielo
  alternatives_spanish:
  - ha tocado el cielo
  - ha alcanzado los cielos
  lexicon: HALOT
  rationale: נגע con אֶל expresa llegar o tocar. 'Ha llegado hasta el cielo' es idiomático en español y conserva la imagen de un límite alcanzado.
- source_word: וְנִשָּׂא עַד שְׁחָקִים
  english_pob_choice: and has been lifted up to the skies
  chosen_spanish: y ha sido elevado hasta las nubes
  alternatives_spanish:
  - y ha sido levantado hasta los cielos
  - y ha sido alzado hasta las nubes
  lexicon: HALOT
  rationale: שְׁחָקִים designa las alturas nubosas o los altos cielos. 'Nubes' en español refleja bien esa imaginería elevada y mantiene el paralelismo con 'cielo'.
theological_decisions:
- issue: Alcance de מִשְׁפָּטָהּ aplicado a Babilonia
  english_pob_reading: The verse speaks of Babylon's judicial case/condemnation rising before God, not of Babylon's moral righteousness.
  chosen_spanish_reading: El versículo presenta el caso judicial y la condena de Babilonia ante Dios, no su rectitud moral.
  alternative_spanish_readings:
  - su sentencia ha llegado hasta el cielo
  - su castigo ha llegado hasta el cielo
  rationale: '''Juicio'' en español permite mantener tanto la dimensión forense como la posible carga de condena, sin reducir el término a un solo aspecto. Esto respeta la tensión del hebreo y el contexto de oráculo contra Babilonia.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'The English POB audit trail retains the key interpretive choices: an attempted healing that failed, the distributive singular in ''each one,'' and the legal-theological force of מִשְׁפָּט together with the elevated imagery of heaven/skies. I aligned the Spanish draft with those decisions while keeping the text publication-readable. I also noted the latest English revision that changed ''let us each go'' to ''let each one go,'' which is reflected in Spanish as ''que cada uno vaya.'''
  spanish_consistency_notes:
  - Uso 'Babilonia' como nombre propio uniforme.
  - Conservo el paralelismo 'cielo / nubes' para reflejar 'heaven / skies'.
  - Mantengo 'juicio' como término principal para מִשְׁפָּט, con alternativas en nota para no perder la ambigüedad judicial.
  - El imperativo plural 'Déjenla' respeta el mandato directo del hebreo.
