- from: Y el sacerdote hará expiación por él delante de Yahvé con el carnero de la ofrenda por la culpa[a], por el pecado que cometió; y le será perdonado por el pecado que cometió.
  to: Y el sacerdote hará expiación por él delante de Yahvé con el carnero de la ofrenda por la culpa[a], por el pecado que cometió; y se le perdonará el pecado que cometió.
