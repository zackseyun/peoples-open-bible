review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: κληρονομία = «herencia», ἀπώλεια = «destrucción», σκότος = «oscuridad», διώξεται = «perseguirá», y preserva correctamente ᾅδης como «Hades» en vez de «infierno». Sin embargo, ἀνομία se aleja de la decisión léxica auditada «lawlessness» al usar «iniquidad», que generaliza el término y pierde la conexión con la idea de falta de ley. Además, la frase final «hasta Hades abajo» es poco natural en español; el original y la auditoría inglesa piden mantener tanto ἕως como κάτω, pero con una formulación española más idiomática.'
  spanish_quality_summary: 'El texto es mayormente claro, pero presenta dos asperezas importantes: «iniquidad» no refleja tan bien el matiz de ἀνομία en este proyecto, y «Hades abajo» suena calcado y poco legible. Una reparación menor puede mantener plena fidelidad y mejorar la naturalidad: «su rebeldía contra la ley los perseguirá hasta el Hades de abajo».'
  glossary_alignment: 'Hay buena alineación con el glosario en «Hades», «pecadores» y el registro general. La principal desviación terminológica está en ἀνομία: dado que el POB inglés documentó expresamente «lawlessness» para preservar la conexión léxica, el español debe acercarse más a «falta de ley» o una formulación equivalente. «Rebeldía contra la ley» comunica mejor ese valor en español eclesial legible que «iniquidad».'
  issues:
  - severity: medium
    issue: «iniquidad» para ἀνομία debilita el matiz de «lawlessness»
    rationale: La auditoría inglesa justificó «lawlessness» precisamente para no generalizar el término a maldad abstracta. «Iniquidad» en español suena más tradicional, pero pierde la referencia más directa a la ley.
  - severity: medium
    issue: «hasta Hades abajo» es poco idiomático en español
    rationale: Aunque intenta reflejar κάτω, la colocación resulta torpe. «Hasta el Hades de abajo» conserva el matiz espacial y es más natural y comprensible.
  - severity: low
    issue: Falta artículo con «Hades» en una construcción donde ayuda a la fluidez
    rationale: En español, «hasta el Hades de abajo» fluye mejor que «hasta Hades abajo», sin alterar el referente griego.
  revised_spanish_text: Y la herencia de los pecadores es destrucción y oscuridad[a], y su rebeldía contra la ley los perseguirá hasta el Hades de abajo.
