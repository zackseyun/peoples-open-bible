translation:
  language: es
  text: Ellos cruzaron el Jordán y acamparon en Aroer, a la derecha[a] de la ciudad que está en medio del valle[b] de Gad, y hacia Jazer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a la derecha de la ciudad». Algunos intérpretes entienden esto geográficamente como «al sur de la ciudad», pero aquí se conserva la expresión hebrea.
    reason: lexical_alternative
  - marker: b
    text: O «que está en medio del wadi/barranco/cauce estacional de Gad». El hebreo נחל puede referirse a un valle, barranco o cauce estacional.
    reason: lexical_alternative
  - marker: c
    text: O «a Jazer». La preposición hebrea puede indicar tanto dirección hacia un lugar como movimiento hasta él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: They crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: HALOT
  rationale: El wayyiqtol de עבר en un relato de desplazamiento expresa cruce de un límite o río. «Cruzar» comunica de forma natural esa acción sin perder el sentido espacial del hebreo.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Como nombre propio del río, «el Jordán» sigue el uso bíblico sobrio y coincide con el valor directo del hebreo sin añadir una glosa innecesaria.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - levantaron el campamento
  lexicon: HALOT
  rationale: חנה se usa para establecer campamento. «Acamparon» es la equivalencia natural y clara en español contemporáneo.
- source_word: בַעֲרוֹעֵר
  english_pob_choice: at Aroer
  chosen_spanish: en Aroer
  alternatives_spanish:
  - a Aroer
  - junto a Aroer
  lexicon: HALOT
  rationale: En un itinerario de asentamiento, la preposición con topónimo se traduce bien como ubicación simple. «En Aroer» conserva la localización sin sobreinterpretar movimiento interno o proximidad.
- source_word: יְמִין הָעִיר
  english_pob_choice: on the right side of the city
  chosen_spanish: a la derecha de la ciudad
  alternatives_spanish:
  - del lado derecho de la ciudad
  - al sur de la ciudad
  lexicon: HALOT
  rationale: ימין significa literalmente «derecha / lado derecho». Mantener la referencia espacial literal preserva la precisión del hebreo y evita convertirla en una interpretación direccional no exigida por el texto.
- source_word: אֲשֶׁר בְּתוֹךְ הַנַּחַל
  english_pob_choice: that is in the middle of the valley
  chosen_spanish: que está en medio del valle
  alternatives_spanish:
  - que está dentro del cauce
  - que está en medio del barranco
  lexicon: HALOT
  rationale: בְּתוֹךְ expresa interioridad o medio; נחל puede abarcar valle, wadi o cauce estacional. «En medio del valle» comunica de forma clara la ubicación geográfica sin cerrar el posible matiz de wadi/cauce.
- source_word: הַגָּד
  english_pob_choice: of Gad
  chosen_spanish: de Gad
  alternatives_spanish:
  - de la región de Gad
  - gadita
  lexicon: HALOT
  rationale: Se conserva la designación genitiva simple del hebreo. «De Gad» mantiene la relación territorial o asociativa sin añadir una explicación que el versículo no desarrolla.
- source_word: וְאֶל יַעְזֵר
  english_pob_choice: and toward Jazer
  chosen_spanish: y hacia Jazer
  alternatives_spanish:
  - y a Jazer
  - y en dirección a Jazer
  lexicon: HALOT
  rationale: אל puede indicar dirección o destino. Dado que el contexto es un itinerario, «hacia» preserva la orientación sin afirmar necesariamente llegada, y mantiene la tensión documentada en el audit trail inglés.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo WLC y el audit trail inglés POB, manteniendo las decisiones léxicas clave: «cruzaron» para עבר, «acamparon» para חנה, la referencia espacial literal «a la derecha de la ciudad» para ימין, la noción geográfica amplia de נחל como «valle», y la dirección no concluyente de וְאֶל como «hacia». No se adopta una paráfrasis que suprima la posible ambigüedad del itinerario.'
  spanish_consistency_notes:
  - Se usa «Jordán» como nombre del río, no «río Jordán», en continuidad con el estilo bíblico conciso.
  - «Aroer» y «Jazer» se transliteran de forma estable como topónimos propios.
  - Se mantiene el orden sintáctico natural en español sin alterar las relaciones espaciales del hebreo.
  - No se introduce puntuación interpretativa que cierre el sentido de la ruta más allá de lo que el hebreo sostiene.
