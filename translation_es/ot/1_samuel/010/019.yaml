translation:
  language: es
  text: 'Pero hoy han rechazado a su Dios, que él mismo los salva de todas sus calamidades y angustias[a], y le han dicho: «No, más bien, pon un rey sobre nosotros». Ahora, pues, preséntense delante de Yahvé por sus tribus y por sus millares[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todos sus males y angustias». Los términos hebreos pueden referirse a males sufridos, calamidades, problemas o aflicciones.
    reason: lexical_alternative
  - marker: b
    text: O «por sus clanes» o «por sus unidades de mil». El hebreo «millares» puede designar subdivisiones sociales o militares, no solo una cantidad literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַסְתֶּם
  english_pob_choice: have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han desechado
  - han despreciado
  - han rechazado de sí
  lexicon: HALOT
  rationale: מָאַס expresa rechazar o desechar con fuerza de repudio. En español, «han rechazado» conserva bien el valor relacional y de alianza del reproche sin añadir el matiz emotivo más fuerte de «despreciado».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: El referente es el Dios único de Israel, no «dioses». En español, «su Dios» funciona de modo natural en el contexto de discurso directo y mantiene la referencia singular clara.
- source_word: מוֹשִׁיעַ
  english_pob_choice: saves
  chosen_spanish: salva
  alternatives_spanish:
  - libra
  - rescata
  - está salvando
  lexicon: HALOT
  rationale: El participio comunica acción característica o habitual. «Salva» es la forma más natural y amplia en español para la acción divina continua de rescatar.
- source_word: מִכָּל רָעוֹתֵיכֶם
  english_pob_choice: from all your calamities
  chosen_spanish: de todas sus calamidades
  alternatives_spanish:
  - de todos sus males
  - de todas sus desgracias
  - de todos sus males y calamidades
  lexicon: HALOT
  rationale: רָעוֹת puede abarcar males, calamidades o desgracias sufridas. «Calamidades» sigue bien la revisión inglesa y suena más natural que un calco como «males».
- source_word: וְצָרֹתֵיכֶם
  english_pob_choice: and distresses
  chosen_spanish: y angustias
  alternatives_spanish:
  - y tribulaciones
  - y aflicciones
  - y apuros
  lexicon: HALOT
  rationale: צָרוֹת denota aflicción, opresión o angustia. «Angustias» mantiene la pareja semántica con «calamidades» sin colapsar ambos términos en uno solo.
- source_word: כִּי
  english_pob_choice: 'No'
  chosen_spanish: No, sino
  alternatives_spanish:
  - No, pero
  - Pues
  - Porque
  lexicon: HALOT
  rationale: 'En este contexto de réplica enfática, כִּי introduce la insistencia contraria: «No, sino pon un rey sobre nosotros». «No, sino» preserva la fuerza adversativa sin forzar una lectura explicativa.'
- source_word: תָּשִׂים
  english_pob_choice: set
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - establece
  - pondrás
  lexicon: HALOT
  rationale: שׂוּם aquí tiene sentido de poner o colocar. «Pon» es directo, idiomático y fiel al mandato citado.
- source_word: הִתְיַצְּבוּ
  english_pob_choice: present yourselves
  chosen_spanish: preséntense
  alternatives_spanish:
  - pónganse de pie
  - prepárense
  - presenten su presencia
  lexicon: HALOT
  rationale: El hitpael pide colocarse formalmente delante de Yahvé para el sorteo o la identificación. «Preséntense» reproduce bien la formalidad reflexiva en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino «Yahvé» según la terminología estándar del proyecto en español. Evita la sustitución por un título y conserva el nombre propio del pacto.
- source_word: לְשִׁבְטֵיכֶם
  english_pob_choice: by your tribes
  chosen_spanish: por sus tribus
  alternatives_spanish:
  - según sus tribus
  - por tribus
  lexicon: HALOT
  rationale: La preposición ל aquí señala agrupación o distribución. «Por sus tribus» es natural en español y comunica el criterio organizativo.
- source_word: וּלְאַלְפֵיכֶם
  english_pob_choice: and by your thousands
  chosen_spanish: y por sus millares
  alternatives_spanish:
  - y por sus mil
  - y por sus clanes
  - y por sus unidades de mil
  lexicon: HALOT
  rationale: אֶלֶף puede designar unidades sociales o militares además del número literal. «Millares» conserva la transparencia del hebreo en el texto principal, mientras la ambigüedad queda señalada en nota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre divino propio revelado en el texto hebreo. La forma «Yahvé» es la convención española del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la cita de la petición del pueblo
  english_pob_reading: ‘No, but set a king over us.’
  chosen_spanish_reading: «No, sino pon un rey sobre nosotros»
  alternative_spanish_readings:
  - «No, pon un rey sobre nosotros»
  - «No, pero pon un rey sobre nosotros»
  - «Pues pon un rey sobre nosotros»
  rationale: La respuesta enfática en el hebreo no es solo informativa sino correctiva/opositiva. «No, sino» conserva la oposición marcada que la revisión inglesa quiso explicitar con «No, but».
  doctrine_reference: 'DOCTRINE.md: Discourse force and adversative particles'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «evils» por «calamities» y añadió «but» en la réplica citada. Esta versión española refleja ambas decisiones con «calamidades» y la secuencia «No, sino», manteniendo la oposición enfática sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme para יְהוָה.
  - Se conserva la distinción semántica entre «calamidades» y «angustias» para reflejar el par hebreo רָעוֹת / צָרוֹת.
  - «Preséntense» evita el calco rígido y suena natural en español formal para una asamblea ritual.
  - «Millares» preserva la ambigüedad administrativa del hebreo, con explicación en nota.
