translation:
  language: es
  text: Lo arrastraron fuera rápidamente, sobrecogidos por un temor[a] abrumador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «con temor que sobrepasa», una expresión que significa un temor más allá de la medida ordinaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - con rapidez
  - pronto
  - de inmediato
  lexicon: LSJ
  rationale: Adverbio de rapidez; 'rápidamente' reproduce la inmediatez de la acción con español natural y digno.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - al hombre
  - a ese
  lexicon: LSJ
  rationale: Pronombre objeto directo masculino singular. En español, 'lo' es la forma más directa y fiel.
- source_word: ἐξείλκυαν
  english_pob_choice: dragged ... out
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo arrastraron fuera
  - lo sacaron a la fuerza
  - lo tiraron fuera
  lexicon: LSJ
  rationale: El compuesto expresa extracción hacia afuera con fuerza. 'Lo sacaron' conserva el movimiento de salida; el contexto de temor hace innecesario explicitar 'a la fuerza' en el texto principal. La nota preserva la fuerza del griego.
- source_word: ὑπερβάλλοντι
  english_pob_choice: overwhelming
  chosen_spanish: abrumador
  alternatives_spanish:
  - excesivo
  - extremo
  - sobremanera grande
  lexicon: LSJ
  rationale: Adjetivo intensificador unido a φόβῳ; 'abrumador' comunica la idea de algo que sobrepasa la medida normal y funciona bien con 'temor' en español.
- source_word: καταπεπληγμένοι
  english_pob_choice: struck
  chosen_spanish: sobrecogidos
  alternatives_spanish:
  - atónitos
  - heridos
  - espantados
  lexicon: LSJ
  rationale: Participio perfecto que denota un estado resultante de ser golpeado/afectado por el temor. 'Sobrecogidos' expresa bien el impacto repentino y el estado producido, sin perder el matiz de ser alcanzados por el miedo.
- source_word: φόβῳ
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - terror
  - espanto
  lexicon: LSJ
  rationale: '''Temor'' es un equivalente amplio, sobrio y apto para un registro bíblico; además, combina naturalmente con ''abrumador''.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego: ταχέως se vierte con ''rápidamente''; ἐξείλκυαν con un verbo de extracción en movimiento hacia afuera; y καταπεπληγμένοι φόβῳ se entiende como un estado resultante provocado por un temor intensísimo. La nota conserva la observación auditada del inglés sobre la locución ὑπερβάλλοντι.'
  spanish_consistency_notes:
  - Se usa 'temor' para φόβος en un registro sobrio y bíblico; en este contexto no se requiere distinguirlo de 'miedo'.
  - El texto principal evita sobrecargar la frase con dobles intensificadores, pero la nota explica la fuerza idiomática del griego.
  - '''Sobrecogidos'' mantiene la pasividad/resultativo de καταπεπληγμένοι mejor que una simple emoción estática.'
