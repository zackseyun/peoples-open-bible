review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: prohibición de tomar viuda o divorciada, restricción positiva a vírgenes de la descendencia de la casa de Israel, y excepción para una viuda vinculada a un sacerdote. Sin embargo, la nota al pie está mal anclada y mal formulada respecto del original inglés y del hebreo: el marcador [a] está puesto sobre «mujer divorciada», pero la alternativa léxica corresponde a la cláusula final sobre «viuda ... de sacerdote».'
  spanish_quality_summary: El español es claro y digno. «No tomarán para sí como esposas» y «de la descendencia de la casa de Israel» son naturales y conservan el tono jurídico. La única frase algo pesada es «una viuda que sea viuda de sacerdote»; puede mejorarse a «una viuda que haya quedado viuda de un sacerdote», que suena más idiomático sin perder el doble énfasis del hebreo. También conviene ajustar «pero» a «sin embargo» para reflejar mejor el giro exceptivo añadido.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Viuda», «mujer divorciada», «vírgenes», «casa de Israel» y «sacerdote» están bien alineados con las decisiones léxicas auditadas. La excepción es la nota, que no preserva la alternativa inglesa documentada y además crea una lectura ajena al lugar donde está anclada.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «mujer divorciada», pero su contenido trata la cláusula final sobre la viuda de sacerdote.
    rationale: Esto desinforma al lector y no preserva correctamente la alternativa léxica del inglés POB, que pertenece a la última cláusula del versículo.
  - severity: high
    issue: El contenido de la nota al pie no corresponde a la nota inglesa auditada.
    rationale: 'La nota inglesa dice, más literalmente, «a widow who became a widow from a priest». La nota española ofrece otra cosa: «una viuda que sea viuda de sacerdote», que no es una alternativa más literal sino prácticamente la misma formulación del texto principal y además omite el matiz de «llegó a ser/quedó viuda».'
  - severity: medium
    issue: «una viuda que sea viuda de sacerdote» suena forzado en español.
    rationale: Aunque intenta reflejar la repetición hebrea, en español resulta torpe. Una redacción como «una viuda que haya quedado viuda de un sacerdote» conserva mejor el valor verbal y la relación con el sacerdote fallecido.
  revised_spanish_text: No tomarán para sí como esposas a una viuda ni a una mujer divorciada, sino solamente vírgenes de la descendencia de la casa de Israel; sin embargo, podrán tomar a una viuda que haya quedado viuda de un sacerdote[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «una viuda que llegó a ser viuda de un sacerdote».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a la cláusula final, en conformidad con el audit trail inglés y el hebreo. También se reformuló la excepción final a un español más natural («haya quedado viuda de un sacerdote») sin perder el sentido legal ni el doble énfasis del original. La nota ahora preserva la alternativa más literal documentada en inglés.
