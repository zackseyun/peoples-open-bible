  - 의도
  lexicon: BDAG
  rationale: 「작정」이 영구적 결정을 함의한다.
- source_word: βουλὴν τοῦ θελήματος
  english_pob_choice: counsel of his will
  chosen_korean: 뜻의 결의
  alternatives_korean:
  - 뜻의 계획
  - 의지의 의논
  lexicon: BDAG
  rationale: βουλή는 「숙고·결의」를 가리키므로 「결의」로 옮긴다.
