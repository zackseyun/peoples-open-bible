translation:
  language: es
  text: 'Así dice Yahvé: Ponte de pie en el atrio[a] de la casa de Yahvé, y habla a todas las ciudades de Judá[b] que vienen a adorar en la casa de Yahvé, todas las palabras que te he mandado hablarles; no omitas una sola palabra[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «patio». Hebreo חָצֵר puede significar «atrio» o «patio», es decir, el espacio abierto del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «contra» o «acerca de» todas las ciudades de Judá. La preposición hebrea admite más de una relación; el texto principal la entiende como destinatario del discurso.
    reason: lexical_alternative
  - marker: c
    text: O «no dejes fuera una palabra» o «no disminuyas una palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto es lo que dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética hebrea pide una cadencia solemne y directa. «Así dice» conserva el tono de anuncio formal sin volverlo arcaico. «Yahvé» refleja el nombre divino יְהוָה según el criterio del proyecto.
- source_word: עֲמֹד
  english_pob_choice: Stand
  chosen_spanish: Ponte de pie
  alternatives_spanish:
  - Permanece de pie
  - Párate
  lexicon: HALOT
  rationale: El imperativo de עמד aquí ordena colocarse en una postura firme. «Ponte de pie» es natural en español y mantiene la fuerza del mandato; evita la rigidez de un calco como «está de pie».
- source_word: בַּחֲצַר בֵּית יְהוָה
  english_pob_choice: in the court of the house of Yahweh
  chosen_spanish: en el atrio[a] de la casa de Yahvé
  alternatives_spanish:
  - en el patio de la casa de Yahvé
  - en la corte de la casa de Yahvé
  - en el atrio/courtyard de la casa de Yahvé
  lexicon: HALOT
  rationale: חָצֵר puede ser «patio», «atrio» o «corral/courtyard» según contexto. «Atrio» comunica bien el espacio sagrado del templo en español bíblico y moderno; se deja nota para la alternativa semántica. «Casa de Yahvé» conserva la formulación hebrea sin sustituirla por «templo».
- source_word: וְדִבַּרְתָּ
  english_pob_choice: and speak
  chosen_spanish: y habla
  alternatives_spanish:
  - y hablarás
  - y proclama
  lexicon: HALOT
  rationale: La secuencia imperativa en español se expresa con otro imperativo coordinado. «Habla» mantiene la oralidad profética y el paralelismo con el mandato anterior.
- source_word: עַל כָּל עָרֵי יְהוּדָה
  english_pob_choice: to all the cities of Judah
  chosen_spanish: a todas las ciudades de Judá[b]
  alternatives_spanish:
  - contra todas las ciudades de Judá
  - acerca de todas las ciudades de Judá
  - sobre todas las ciudades de Judá
  lexicon: HALOT
  rationale: Con דבר, עַל puede introducir el destinatario o el ámbito del discurso. Como el contexto inmediato define a los que vienen desde esas ciudades, «a todas las ciudades de Judá» comunica el destino del mensaje sin imponer una lectura hostil que el contexto no exige. Se conserva nota de alternativa por la ambigüedad preposicional.
- source_word: הַבָּאִים לְהִשְׁתַּחֲוֺת
  english_pob_choice: that come to worship
  chosen_spanish: que vienen a postrarse
  alternatives_spanish:
  - que vienen a adorar
  - que vienen a inclinarse en adoración
  - que vienen a rendir culto
  lexicon: HALOT
  rationale: השתחוה tiene el sentido básico de inclinarse/postrarse, aunque en contexto religioso implica adoración. Aquí se eligió «postrarse» para conservar la imagen corporal concreta del hebreo; el acto cultual queda claro por el contexto y por «casa de Yahvé».
- source_word: בֵּית יְהוָה
  english_pob_choice: at the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: Se mantiene «casa de Yahvé» para reflejar el hebreo de forma consistente y evitar sustituir la expresión por «templo», que es interpretativa.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - cada una de las palabras
  - todos los dichos
  lexicon: HALOT
  rationale: דְּבָרִים se traduce literalmente como «palabras» para conservar el énfasis en el contenido exacto del mensaje. El plural intensifica la totalidad del encargo.
- source_word: אֲשֶׁר צִוִּיתִיךָ לְדַבֵּר אֲלֵיהֶם
  english_pob_choice: that I have commanded you to speak to them
  chosen_spanish: que te he mandado hablarles
  alternatives_spanish:
  - que te he ordenado decirles
  - que te he mandado hablar a ellos
  lexicon: HALOT
  rationale: «Mandado» expresa bien ציווה y mantiene el tono de comisión profética. «Hablarles» conserva la conexión con דִּבֵּר y evita una paráfrasis demasiado general como «decirles».
- source_word: אַל תִּגְרַע דָּבָר
  english_pob_choice: do not hold back a word
  chosen_spanish: no omitas una sola palabra[c]
  alternatives_spanish:
  - no retires una palabra
  - no disminuyas una palabra
  - no dejes fuera una palabra
  lexicon: HALOT
  rationale: גרע significa disminuir, quitar u omitir. En este contexto de transmisión exacta de un mensaje profético, «no omitas una sola palabra» comunica la prohibición con claridad y fuerza; «una sola» refuerza la totalidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide «Yahvé» en español para mantener el nombre personal de Dios y no sustituirlo por un título. Se evita «SEÑOR» porque ocultaría el dato textual que el audit trail preserva.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Revisé el paquete fuente hebreo, la traducción inglesa auditada y sus notas. No se detectaron revisiones aplicadas en el registro inglés; por eso la redacción española sigue de cerca la lectura estable del POB, preservando las alternativas semánticas relevantes en notas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה de manera consistente con el criterio del proyecto.
  - Se conservó «casa de Yahvé» en vez de «templo» para reflejar el hebreo בית sin interpretación adicional.
  - «Atrio» se eligió como equivalente principal de חָצֵר por ser comprensible y reverente en español eclesial.
  - La frase final usa una negación enfática («no omitas una sola palabra») para conservar la totalidad exigida por אַל תִּגְרַע דָּבָר.
  - Se prefirió «postrarse» para mantener la concreción del verbo hebreo, sin perder el sentido cultual por el contexto.
