revisions:
- from: Di a los que revocan con cal que caerá[a]. Habrá una lluvia torrencial[b], y ustedes, oh piedras de granizo, caerán, y un viento de tormenta la romperá en pedazos.
  to: Di a los que la encalan con blanqueo que caerá. Habrá una lluvia torrencial[b], y ustedes, oh piedras de granizo, caerán[a], y un viento de tormenta la romperá en pedazos.
  rationale: Se reubica la nota [a] al lugar correcto para reflejar fielmente la alternativa literal documentada por el POB. Se ajusta 'revocan con cal' a 'la encalan con blanqueo' para preservar mejor el matiz de whitewash y la referencia contextual a la pared, sin perder naturalidad en español. Se mantienen la lluvia torrencial, la apostrofación a las piedras de granizo y la destrucción de la pared implícita.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y preserva correctamente la apostrofación vívida a las piedras de granizo, la lluvia destructiva y el viento de tormenta que destruye la pared implícita. Sin embargo, hay dos desajustes importantes con el rastro auditado: la nota [a] está anclada en el lugar equivocado, porque la alternativa literal hebrea corresponde a la cláusula de las piedras de granizo, no a ''caerá''; y ''cal'' no comunica tan claramente como ''blanqueo'' o ''cal blanqueadora'' el matiz de ''whitewash'' como recubrimiento superficial y engañoso.'
  spanish_quality_summary: El español es generalmente natural y legible, pero 'revocan con cal' suena algo técnico/regional y atenúa la idea de encalar o blanquear superficialmente. 'La romperá en pedazos' es comprensible, aunque 'la hará pedazos' o 'la despedazará' sería más idiomático; con todo, no es necesario cambiarlo si se mantiene la fuerza. Conviene mejorar el anclaje de las notas y hacer más transparente el vocativo de las piedras de granizo.
  glossary_alignment: No hay términos de glosario mayor en disputa. El punto léxico clave es טָחֵי תָפֵל, donde el inglés POB documenta específicamente 'plaster with whitewash'; en español conviene reflejar más de cerca la noción de 'encalar/blanquear' que solo 'cal'. También debe preservarse la fuerza apostrófica de וְאַתֵּנָה mediante 'ustedes, oh piedras de granizo' o equivalente.
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'caerá' en vez de en la cláusula 'ustedes, oh piedras de granizo, caerán'.
    rationale: El inglés POB documenta que la alternativa literal hebrea es precisamente la dirección directa a las piedras de granizo. Anclar la nota en 'caerá' desinforma al lector sobre qué rasgo del hebreo se está explicando.
  - severity: medium
    issue: '''Revocan con cal'' no refleja con suficiente claridad el matiz de ''whitewash'' como recubrimiento superficial.'
    rationale: טָחֵי תָפֵל en contexto habla de un recubrimiento cosmético y engañoso sobre una pared defectuosa. 'Encalan' o 'revocan con blanqueo' comunica mejor el valor semántico documentado por el POB.
  - severity: low
    issue: La formulación de la nota [a] puede sonar poco natural con 'apostrofación'.
    rationale: En español eclesial general, 'apóstrofe directa' o 'dirigiéndose directamente' se entiende mejor que 'apostrofación'.
  revised_spanish_text: Di a los que la encalan con blanqueo que caerá. Habrá una lluvia torrencial[b], y ustedes, oh piedras de granizo, caerán[a], y un viento de tormenta la romperá en pedazos.
  revised_footnotes:
