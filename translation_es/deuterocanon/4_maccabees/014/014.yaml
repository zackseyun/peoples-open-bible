  - severity: low
    issue: «los que nacen de ellos» es menos natural que una referencia explícita a la descendencia
    rationale: La frase reproduce la estructura griega, pero en español resulta algo dura e impersonal en este contexto. «Su propia descendencia» comunica el referente de forma más idiomática, mientras la nota conserva la literalidad del original.
