translation:
  language: es
  text: Entonces me volví, alcé mis ojos y vi, y he aquí, cuatro carros salían de entre dos montes[a], y los montes eran montes de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse «de entre los dos montes». El hebreo tiene el artículo definido: «los dos montes».'
    reason: lexical_alternative
  - marker: b
    text: «Bronce» también puede traducirse «cobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשֻׁב
  english_pob_choice: Then I turned
  chosen_spanish: Entonces me volví
  alternatives_spanish:
  - Y me volví
  - Volví
  lexicon: HALOT
  rationale: שׁוּב en esta fórmula visionaria expresa giro o retorno de la atención. «Me volví» preserva el movimiento narrativo con español natural; «Entonces» reproduce bien el waw secuencial sin acumular «y» innecesarios.
- source_word: וָאֶשָּׂא עֵינַי
  english_pob_choice: lifted up my eyes
  chosen_spanish: alcé mis ojos
  alternatives_spanish:
  - levanté mis ojos
  - miré hacia arriba
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo para dirigir la mirada. «Alcé mis ojos» mantiene el tono idiomático y solemne, más cercano al valor literal que una paráfrasis como «miré hacia arriba».
- source_word: וָאֶרְאֶה
  english_pob_choice: and saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y yo vi
  lexicon: HALOT
  rationale: Verbo de percepción visionaria traducido de forma directa. La forma breve es natural en español y conserva la secuencia de la visión.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - he aquí
  - y mira
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza de presentación súbita y el tono profético. Se mantiene con «y» para reflejar el flujo del hebreo y la solución auditada en inglés.
- source_word: אַרְבַּע מַרְכָּבוֹת
  english_pob_choice: four chariots
  chosen_spanish: cuatro carros
  alternatives_spanish:
  - cuatro carros de guerra
  - cuatro carruajes
  lexicon: HALOT
  rationale: מַרְכָּבוֹת designa carros, especialmente en contexto de visión y guerra simbólica. «Carros» es breve, bíblico y suficientemente preciso sin introducir «de guerra» que el hebreo aquí no explicita.
- source_word: יֹצְאֹת
  english_pob_choice: were coming out
  chosen_spanish: salían
  alternatives_spanish:
  - estaban saliendo
  - venían saliendo
  lexicon: HALOT
  rationale: El participio sugiere acción en desarrollo. «Salían» comunica bien la escena visionaria en español; «estaban saliendo» sería más explícito, pero menos ágil.
- source_word: מִבֵּין שְׁנֵי הֶהָרִים
  english_pob_choice: from between two mountains
  chosen_spanish: de entre dos montes
  alternatives_spanish:
  - de entre los dos montes
  - entre dos montes
  lexicon: HALOT
  rationale: Se conserva el valor espacial de מִבֵּין con «de entre». El artículo hebreo en «los dos montes» es una posibilidad, pero el español fluye mejor sin forzarlo; la nota preserva esa alternativa.
- source_word: וְהֶהָרִים הָרֵי נְחֹשֶׁת
  english_pob_choice: and the mountains were mountains of bronze
  chosen_spanish: y los montes eran montes de bronce
  alternatives_spanish:
  - y los montes eran montes de cobre
  - y eran montes de bronce
  lexicon: HALOT
  rationale: Se mantiene la repetición hebrea de «montes» para reflejar énfasis y estilo. נְחֹשֶׁת puede ser «bronce» o «cobre»; se adopta «bronce» como lectura principal por ser la más asentada en este contexto, sin borrar la alternativa.
theological_decisions:
- issue: Material metalúrgico de נְחֹשֶׁת
  english_pob_reading: bronze
  chosen_spanish_reading: bronce
  alternative_spanish_readings:
  - cobre
  rationale: No es una cuestión doctrinal, sino lexical. «Bronce» es la opción principal en español bíblico para esta imagen monumental; «cobre» queda como alternativa válida para no ocultar la amplitud semántica del término hebreo.
  doctrine_reference: Lexical transparency; no doctrinal distinction
translation_notes:
  revision_awareness: Se revisó la relación entre el hebreo y la traducción auditada en inglés, especialmente en el modismo de la visión («alcé mis ojos») y en la repetición enfática de «montes». No hubo cambios editoriales previos en el archivo fuente, y la redacción española conserva la tensión lexical entre «bronce» y «cobre» sin resolverla de manera indebida.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se prefirió «montes» en vez de «montañas» para mantener cercanía con el paralelismo hebreo y el registro bíblico.
  - Se conservó la repetición de «montes» para reflejar la estructura intensiva del hebreo.
  - La puntuación con punto y coma ayuda a reproducir la progresión visual del versículo sin sobrecargarlo.
