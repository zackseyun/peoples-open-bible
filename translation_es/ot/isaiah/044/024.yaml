base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/024.yaml
  text: 'Thus says Yahweh[a], your Redeemer, who formed you from the womb: I am Yahweh, who makes all things, who alone stretched out the heavens, who spread out the earth by myself.'
  footnotes:
