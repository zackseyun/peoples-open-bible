translation:
  language: es
  text: Y Simón y los que estaban con él salieron de la ciudad y prendieron fuego a las máquinas de asedio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las máquinas» o «los ingenios»; en contexto se trata de dispositivos militares usados en el ataque a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ Σίμων καὶ οἱ μετʼ αὐτοῦ
  english_pob_choice: And Simon and those with him
  chosen_spanish: Y Simón y los que estaban con él
  alternatives_spanish:
  - Y Simón y sus hombres
  - Y Simón y los que iban con él
  lexicon: LSJ
  rationale: La frase griega usa un participio sustantivado amplio; en español, «los que estaban con él» conserva esa amplitud sin añadir de forma innecesaria una identificación militar más estrecha que la del texto.
- source_word: ἐξῆλθον ἐκ τῆς πόλεως
  english_pob_choice: went out from the city
  chosen_spanish: salieron de la ciudad
  alternatives_spanish:
  - salieron fuera de la ciudad
  - salieron desde la ciudad
  lexicon: LSJ
  rationale: «Salieron de la ciudad» es la forma natural y fiel en español para expresar la salida explícita indicada por el griego, sin recargar la preposición.
- source_word: ἐνεπύρισαν
  english_pob_choice: set fire to
  chosen_spanish: prendieron fuego a
  alternatives_spanish:
  - incendiaron
  - quemaron
  lexicon: LSJ
  rationale: El verbo expresa la acción de poner algo en fuego. «Prendieron fuego a» comunica con claridad el acto intencional, mientras que «quemaron» podría sonar más ambiguo sobre si se trata del acto o del resultado.
- source_word: τὰς μηχανάς
  english_pob_choice: the siege engines
  chosen_spanish: las máquinas de asedio
  alternatives_spanish:
  - las máquinas
  - los ingenios de guerra
  - los artilugios de asedio
  lexicon: LSJ
  rationale: En este contexto bélico, μηχαναί designa artefactos de asedio. «Máquinas de asedio» preserva el sentido técnico y, en español moderno, resulta comprensible para lectores bíblicos.
