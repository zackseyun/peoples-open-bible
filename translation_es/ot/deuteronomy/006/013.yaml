translation:
  language: es
  text: A Yahvé tu Dios[a] temerás, y a él servirás[b], y por su nombre jurarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reverenciarás a Yahvé tu Dios'; el verbo hebreo incluye temor reverente y asombro, no mero terror.
    reason: lexical_alternative
  - marker: b
    text: O 'adorarás'; el verbo hebreo suele significar 'servir' y, en contexto, incluye servicio de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal en forma española reconocible y reverente, conforme al criterio del proyecto. No se sustituye por un título como 'el SEÑOR', porque el audit trail inglés ya decidió transliterar el Tetragrámaton.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, Yahvé
  - tu Dios y Yahvé
  lexicon: HALOT
  rationale: El sufijo posesivo de 2ª persona singular se expresa de manera natural como 'tu Dios'. La coordinación con YHWH en el hebreo queda reflejada sin sobrecargar la frase.
- source_word: תִּירָא
  english_pob_choice: you shall fear
  chosen_spanish: Teme
  alternatives_spanish:
  - Reverencia
  - Temerás
  lexicon: HALOT
  rationale: Se mantiene 'temer' para conservar la fuerza semántica y teológica de ירא en contexto de pacto. En español, el imperativo funciona bien y no atenúa la combinación de temor reverente y obediencia.
- source_word: וְאֹתוֹ
  english_pob_choice: and him
  chosen_spanish: y a él
  alternatives_spanish:
  - y a él solo
  - y solamente a él
  lexicon: HALOT
  rationale: El pronombre directo se reproduce explícitamente en español como complemento personal enfático. No se añade 'solo' porque no está expresado de forma directa en este versículo, aunque la exclusividad se presupone por el contexto.
- source_word: תַעֲבֹד
  english_pob_choice: you shall serve
  chosen_spanish: servirás
  alternatives_spanish:
  - adorarás
  - darás culto
  lexicon: HALOT
  rationale: '''Servir'' conserva el alcance léxico de עבד y evita reducirlo a un sentido puramente litúrgico. En español, la forma verbal futura mantiene el valor exhortativo del hebreo y es natural en este contexto.'
- source_word: וּבִשְׁמוֹ
  english_pob_choice: and by his name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - en su nombre
  - con su nombre
  lexicon: HALOT
  rationale: La preposición ב con juramento se entiende aquí como base o autoridad invocada; 'por su nombre' comunica con claridad ese valor instrumental/jurídico en español.
- source_word: תִּשָּׁבֵעַ
  english_pob_choice: you shall swear
  chosen_spanish: jurarás
  alternatives_spanish:
  - harás juramento
  - te jurarás
  lexicon: HALOT
  rationale: '''Jurar'' es la forma más idiomática y concisa en español para el verbo de juramento. Mantiene el sentido jurídico del hebreo sin añadir una paráfrasis innecesaria.'
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce de forma separada]'
  lexicon: HALOT
  rationale: El marcador de objeto directo no tiene equivalente léxico independiente en español; su función se integra en la sintaxis del enunciado.
theological_decisions:
- issue: 'Cómo traducir ירא en un mandato dirigido a Dios: ''temer'' o ''reverenciar'''
  english_pob_reading: Retain 'fear' in the main text
  chosen_spanish_reading: Teme
  alternative_spanish_readings:
  - Reverencia
  - Ten en reverencia
  - Ten temor reverente
  rationale: Se conserva 'temer' en la línea principal para no debilitar la seriedad del mandamiento. 'Reverenciar' explicita una parte del sentido, pero puede perder el peso de asombro, obediencia y santa gravedad que el hebreo comunica.
  doctrine_reference: Translation philosophy §3, §6
- issue: 'Cómo rendir עבד en contexto de lealtad de pacto: ''servir'' o ''adorar'''
  english_pob_reading: Render as 'serve'
  chosen_spanish_reading: servir
  alternative_spanish_readings:
  - adorar
  - rendir culto
  rationale: '''Servir'' conserva el campo semántico amplio del verbo y mantiene visible la idea de lealtad práctica a Yahvé. ''Adorar'' puede ser una implicación legítima, pero en español estrecha más el verbo que el hebreo.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del control cruzado y no introduce cambios respecto del último pase revisado; conserva la decisión del audit trail inglés de mantener 'fear' y 'serve' como opciones principales, con notas alternativas donde el español podría sugerir una matización interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - 'Se conserva el paralelismo verbal con una secuencia breve y directa: teme / servirás / jurarás.'
  - Las notas al pie distinguen alternativas léxicas sin desplazar el texto principal.
  - Se evita 'el SEÑOR' porque el proyecto español sigue la transliteración del nombre divino en el texto principal.
