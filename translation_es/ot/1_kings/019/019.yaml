base_translation:
  language: en
  yaml_path: translation/ot/1_kings/019/019.yaml
  text: So he went from there and found Elisha son of Shaphat[a], and he was plowing with twelve yoke-pairs before him, and he was with the twelfth[b]. Elijah passed by him and threw his cloak over him.
  footnotes:
