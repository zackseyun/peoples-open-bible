translation:
  language: es
  text: 'Luego me dijo: «Estas aguas salen hacia la región oriental y descienden al Arabá; después entran en el mar. Cuando se vacían en el mar[a][c], las aguas quedan sanadas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Mar Muerto». La expresión hebrea es difícil y suele entenderse como el mar salado al oriente de Judá.
    reason: alternative_reading
  - marker: b
    text: 'O «las aguas se vuelven frescas». El hebreo dice literalmente: «las aguas quedan sanadas».'
    reason: lexical_alternative
  - marker: c
    text: O «el mar de aguas estancadas».
    reason: previous_rendering
lexical_decisions:
- source_word: הַמַּיִם הָאֵלֶּה
  english_pob_choice: these waters
  chosen_spanish: Estas aguas
  alternatives_spanish:
  - esta agua
  lexicon: WLC / HALOT
  rationale: El hebreo usa מַיִם en plural con demostrativo; «estas aguas» conserva mejor la pluralidad del original. En español es posible singularizar, pero aquí la forma plural refleja con mayor fidelidad el texto.
- source_word: יוֹצְאִים
  english_pob_choice: flow out
  chosen_spanish: salen
  alternatives_spanish:
  - fluyen
  - van saliendo
  lexicon: HALOT
  rationale: El participio expresa movimiento continuo del agua. «Salen» es natural en español y no introduce una metáfora más fuerte que la del hebreo. «Fluyen» sería posible, pero añade un matiz más estilizado que el simple salir.
- source_word: הַגְּלִילָה הַקַּדְמוֹנָה
  english_pob_choice: eastern region
  chosen_spanish: la región oriental
  alternatives_spanish:
  - el distrito oriental
  - la zona oriental
  lexicon: HALOT
  rationale: גְּלִילָה puede designar una región o distrito. «Región oriental» mantiene la amplitud geográfica y evita una formulación demasiado técnica o anacrónica.
- source_word: וְיָרְדוּ עַל הָעֲרָבָה
  english_pob_choice: go down into the Arabah
  chosen_spanish: descienden al Arabá
  alternatives_spanish:
  - descienden al Arabá
  - bajan hacia el Arabá
  lexicon: HALOT
  rationale: וירד expresa descenso; «descienden» lo reproduce de modo directo. Se conserva «Arabá» como nombre geográfico propio, en lugar de generalizarlo como «la llanura».
- source_word: הַיָּמָּה
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el lago
  lexicon: HALOT
  rationale: El término básico יָם se traduce normalmente por «mar». En este contexto el referente es el gran cuerpo de agua terminal del valle, pero el hebreo no lo nombra aquí con un tecnicismo distinto.
- source_word: הַמּוּצָאִים
  english_pob_choice: When they are emptied into the sea
  chosen_spanish: Cuando se vacían en el mar
  alternatives_spanish:
  - Cuando son arrojadas al mar
  - Cuando salen al mar
  lexicon: WLC / HALOT
  rationale: La forma pasiva/causativa participial de יצא aquí apunta a la acción de ser llevadas hacia afuera o vaciadas. «Se vacían» comunica el movimiento del agua hacia el mar sin introducir una identificación interpretativa ajena al hebreo.
- source_word: וְנרפאו הַמָּיִם
  english_pob_choice: the waters are healed
  chosen_spanish: las aguas son sanadas
  alternatives_spanish:
  - las aguas sanan
  - las aguas se curan
  lexicon: HALOT
  rationale: רפא significa literalmente «sanar / curar». Se mantiene la metáfora personificadora del texto. «Sanadas» preserva el paralelismo con el lenguaje del original mejor que «hechas frescas» o una paráfrasis explicativa.
theological_decisions:
- issue: Conservación de la metáfora de sanidad aplicada al agua
  english_pob_reading: the waters are healed
  chosen_spanish_reading: las aguas son sanadas
  alternative_spanish_readings:
  - las aguas se vuelven frescas
  - las aguas se purifican
  rationale: El hebreo usa רפא, verbo de sanidad, aplicado figuradamente a las aguas. Mantener la imagen evita borrar la tensión poética del texto y respeta el lenguaje del original. En español, «son sanadas» conserva esa personificación sin convertirla en una explicación naturalizante.
  doctrine_reference: Ninguna doctrina específica; decisión de imaginería bíblica y semántica verbal.
- issue: Identificación geográfica del mar final
  english_pob_reading: the sea
  chosen_spanish_reading: el mar
  alternative_spanish_readings:
  - el Mar Muerto
  - el mar salado
  rationale: El hebreo aquí dice simplemente יָם y no nombra explícitamente el Mar Muerto. Para no adelantar una identificación interpretativa en el cuerpo del texto, se conserva el genérico «el mar».
  doctrine_reference: Ninguna doctrina específica; decisión de cautela textual/geográfica.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail que corrigió la parte final para reflejar con mayor precisión el hebreo: «When they are emptied into the sea, the waters are healed». También se evitó la lectura previa errónea que convertía הַמּוּצָאִים en una descripción del mar; por eso el español refleja una acción de vaciarse/llevarse hacia el mar, no una glosa interpretativa. La traducción de הַגְּלִילָה הַקַּדְמוֹנָה como «región oriental» se ajustó a la revisión inglesa posterior.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - «Arabá» se escribe con mayúscula por tratarse de un topónimo.
  - Se evitó «SEÑOR» o «Cristo» porque no corresponden al texto.
  - La construcción pasiva «son sanadas» conserva el paralelismo verbal del hebreo y la imagen de sanidad sin sobreexplicarla.
