- from: Habiendo sido salvados por Dios de grandes peligros[a], le damos muchas gracias, como si estuviéramos ordenados en batalla contra un rey.
  to: Habiendo sido salvados por Dios de grandes peligros[a], le damos muchas gracias, como si estuviéramos puestos en formación de batalla contra un rey.
