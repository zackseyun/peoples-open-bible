    reason: lexical_alternative
  - marker: c
    text: Literally, 'Do not take me in/for the length of your anger,' an idiom meaning 'in your patience/long-suffering do not take me away.'
    reason: lexical_alternative
  - marker: d
    text: Or 'know that I bear reproach on your account.'
    reason: lexical_alternative
