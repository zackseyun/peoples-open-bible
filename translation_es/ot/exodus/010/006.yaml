translation:
  language: es
  text: Y llenarán tus casas, las casas de todos tus siervos, y las casas de todo Egipto—algo[a] que tus padres y los padres de tus padres no han visto desde el día en que estuvieron sobre la tierra[b] hasta este día.” Entonces se volvió y salió de la presencia de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “que tus padres y los padres de tus padres no han visto”. La cláusula se refiere a la plaga sin precedentes que acaba de describirse.
    reason: lexical_alternative
  - marker: b
    text: “La tierra” también puede verterse “el suelo” o “la tierra habitable”, según el matiz que se quiera resaltar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָלְאוּ
  english_pob_choice: And they will fill
  chosen_spanish: Y se llenarán
  alternatives_spanish:
  - Y llenarán
  - Y serán llenadas
  lexicon: HALOT
  rationale: El hebreo continúa la fuerza futura del anuncio de la plaga. En español, la pasiva refleja mantiene la inevitabilidad del acontecimiento y evita introducir un sujeto explícito que el contexto ya aporta.
- source_word: בָתֶּיךָ ... וּבָתֵּי כָל עֲבָדֶיךָ ... וּבָתֵּי כָל מִצְרַיִם
  english_pob_choice: your houses, the houses of all your servants, and the houses of all Egypt
  chosen_spanish: tus casas, las casas de todos tus siervos, y las casas de todo Egipto
  alternatives_spanish:
  - tu casa, las casas de todos tus servidores, y las casas de todo Egipto
  - tus casas, las casas de todos tus oficiales, y las casas de todo Egipto
  lexicon: HALOT
  rationale: Se conserva la repetición de 'casas' para reflejar la estructura escalonada del hebreo. 'Tus casas' respeta el plural del original, y 'siervos' se usa de modo amplio para los subordinados de la corte sin forzar un matiz técnico de 'oficiales'.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus oficiales
  - tus esclavos
  lexicon: HALOT
  rationale: En este contexto real, el término puede referirse a los subordinados de Faraón. 'Siervos' conserva la amplitud del hebreo y la relación de dependencia, sin especificar más de lo que el texto exige.
- source_word: אֲשֶׁר לֹא רָאוּ
  english_pob_choice: something ... have not seen
  chosen_spanish: algo que ... no han visto
  alternatives_spanish:
  - algo que ... no han visto jamás
  - que ... no han visto
  lexicon: HALOT
  rationale: La relativa explica la singularidad de la plaga descrita. En español, 'algo que' hace natural la construcción sin perder la referencia al acontecimiento extraordinario ya anunciado.
- source_word: אֲבֹתֶיךָ וַאֲבֹת אֲבֹתֶיךָ
  english_pob_choice: your fathers and your fathers’ fathers
  chosen_spanish: tus padres y los padres de tus padres
  alternatives_spanish:
  - tus padres y tus abuelos
  - tus antepasados y los antepasados de tus antepasados
  lexicon: HALOT
  rationale: '''Padres'' mantiene la fórmula genealógica tradicional del hebreo y evita reducir indebidamente el segundo miembro a ''abuelos''. La repetición en español conserva el paralelismo generacional.'
- source_word: מִיּוֹם הֱיוֹתָם עַל הָאֲדָמָה
  english_pob_choice: from the day they were on the land
  chosen_spanish: desde el día en que estuvieron sobre la tierra
  alternatives_spanish:
  - desde el día en que fueron sobre la tierra
  - desde el día en que habitaron la tierra
  - desde el día en que estuvieron en el país
  lexicon: HALOT
  rationale: El hebreo expresa el comienzo de su existencia o presencia en la tierra. 'Estuvieron sobre la tierra' reproduce de forma bastante literal la imagen espacial y el valor temporal de 'desde el día'.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: Aunque el POB inglés eligió 'the land' por naturalidad, en español 'la tierra' es la forma más directa y solemne para este contexto de existencia humana y memoria generacional. No se limita a 'suelo', que sería demasiado físico.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es un modismo temporal solemne y muy cercano al hebreo. 'Hasta este día' conserva la deixis del texto y su tono formal.
- source_word: וַיִּפֶן וַיֵּצֵא מֵעִם פַּרְעֹה
  english_pob_choice: Then he turned and went out from Pharaoh
  chosen_spanish: Entonces él se volvió y salió de la presencia de Faraón
  alternatives_spanish:
  - Entonces se volvió y salió de Faraón
  - Y se volvió y salió de la presencia de Faraón
  lexicon: HALOT
  rationale: '''Se volvió'' y ''salió'' reproducen la secuencia verbal narrativa. ''De la presencia de Faraón'' expresa naturalmente מֵעִם en un registro bíblico claro y evita la ambigüedad de un simple ''de Faraón''.'
theological_decisions:
- issue: Tetragrámaton no presente; relación con la voz narrativa de autoridad divina
  english_pob_reading: The verse is a continuation of the plague announcement, with no explicit divine name in the line itself.
  chosen_spanish_reading: No se introduce ningún término divino adicional en el versículo; se conserva el anuncio directo sin explicitar Yahvé aquí.
  alternative_spanish_readings:
  - Yahvé dice que...
  - Entonces Yahvé hará que...
  rationale: El hebreo del verso presenta la continuación del discurso sin nombrar a Dios en esta línea. Agregar un nombre divino sería interpretativo y no está respaldado por el texto de este versículo aislado.
  doctrine_reference: Éxodo 10:6; discurso directo en contexto narrativo
translation_notes:
  revision_awareness: He seguido de cerca el último estado revisado del audit trail inglés, especialmente la preferencia por una expresión temporal más natural para מִיּוֹם הֱיוֹתָם עַל הָאֲדָמָה. También mantuve la estructura acumulativa de 'casas' y el cierre narrativo con el movimiento de salida de Moisés. No se detectaron tensiones textuales mayores en este versículo; las decisiones principales fueron de ajuste idiomático al español sin alterar el sentido del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' como nombre propio tradicional en español.
  - Se usa 'casas' en plural para reflejar el hebreo plural constructo repetido.
  - '''Siervos'' se conserva por su amplitud semántica y por coherencia con el registro bíblico, sin imponer una lectura sociológica más específica.'
  - '''La tierra'' se usa de manera consistente con la imaginería bíblica y el valor temporal del hebreo.'
  - No se emplea 'SEÑOR' ni se introduce 'Cristo'; no corresponden a este versículo.
