  yaml_path: translation/ot/numbers/014/018.yaml
  text: Yahweh is slow to anger and abundant in steadfast love[a], forgiving iniquity and transgression, but he will by no means leave unpunished[d][c][b], visiting the iniquity of fathers on children to the third and the fourth generation.
