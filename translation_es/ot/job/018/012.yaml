translation:
  language: es
  text: Su fuerza está consumida por el hambre, y la calamidad está lista[a] a su lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lista para su tropiezo». El hebreo puede entenderse como «lado» o, por extensión en algunas interpretaciones, como «tropiezo/cojera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - llega a estar
  - viene a estar
  lexicon: HALOT
  rationale: En poesía hebrea, el imperfecto descriptivo puede funcionar como estado presente. En español, «está» comunica mejor el estado actual y conserva la fuerza poética sin volverlo volitivo.
- source_word: רָעֵב
  english_pob_choice: famished
  chosen_spanish: hambrienta
  alternatives_spanish:
  - hambriento
  - muriéndose de hambre
  - hambriento en extremo
  lexicon: HALOT
  rationale: El inglés POB eligió una intensidad mayor que «hungry». En español, «hambrienta» mantiene la idea de hambre severa sin sonar excesivamente explicativa; concuerda con «fuerza» en género gramatical.
- source_word: אֹנוֹ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su vigor
  - su poder
  - sus recursos
  lexicon: HALOT
  rationale: «Fuerza» es la equivalencia más directa y natural para אֹן en este contexto de debilitamiento y juicio. Mantiene el paralelismo con la imagen de ruina inminente.
- source_word: וְאֵיד
  english_pob_choice: and calamity
  chosen_spanish: y la calamidad
  alternatives_spanish:
  - y el desastre
  - y la ruina
  lexicon: HALOT
  rationale: «Calamidad» conserva el registro elevado del hebreo y coincide con la opción inglesa, sin perder la idea de desgracia destructiva.
- source_word: נָכוֹן
  english_pob_choice: is ready
  chosen_spanish: está lista
  alternatives_spanish:
  - está preparada
  - permanece lista
  - está dispuesta
  lexicon: HALOT
  rationale: La forma hebrea comunica algo firme y preparado. «Está lista» es idiomático en español y preserva la imagen de peligro inminente.
- source_word: לְצַלְעוֹ
  english_pob_choice: at his side
  chosen_spanish: a su lado
  alternatives_spanish:
  - junto a su costado
  - para su tropiezo
  - para su caída
  lexicon: HALOT
  rationale: Siguiendo la lectura principal del POB inglés, «a su lado» refleja la proximidad concreta del peligro. En español, «costado» sería posible, pero «lado» es más claro y natural en esta línea poética.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue esa lectura estable y mantiene la misma decisión léxica principal del POB inglés, con la alternativa semántica preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el paralelismo poético breve con léxico sobrio y sin añadir glosas al cuerpo principal.
  - La nota reproduce la ambigüedad relevante de צלע sin imponer una sola interpretación.
