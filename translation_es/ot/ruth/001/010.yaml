translation:
  language: es
  text: 'Pero ellas le dijeron[a]: «No, volveremos contigo a tu pueblo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «porque contigo volveremos a tu pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְנָה
  english_pob_choice: But they said
  chosen_spanish: Pero ellas le dijeron
  alternatives_spanish:
  - Y dijeron
  - Entonces dijeron
  lexicon: HALOT
  rationale: El waw consecutivo introduce la réplica en la narración; en español, «Pero» comunica bien el contraste con la insistencia previa de Noemí, y «le dijeron» mantiene el acto de habla plural femenino sin forzar una construcción extraña.
- source_word: לָּהּ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a Noemí
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ª femenina singular señala a Noemí como objeto indirecto. En español, el dativo «le» es natural y fiel; el referente queda claro por el contexto inmediato.
- source_word: כִּי
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - porque
  - ciertamente
  - en verdad
  lexicon: HALOT
  rationale: Aquí כִּי funciona como rechazo enfático en respuesta a la exhortación de Noemí. «No» conserva la fuerza de la negativa en el diálogo mejor que un conectivo causal literal.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - junto a ti
  lexicon: HALOT
  rationale: La preposición con sufijo de 2ª femenina singular indica compañía con Noemí. «Contigo» es la forma idiomática y mantiene la relación de acompañamiento.
- source_word: נָשׁוּב
  english_pob_choice: we will return
  chosen_spanish: volveremos
  alternatives_spanish:
  - regresaremos
  - volveremos a
  lexicon: HALOT
  rationale: שׁוּב se traduce normalmente por «volver»/«regresar». «Volveremos» es natural en español y conserva el motivo léxico de retorno presente en el capítulo.
- source_word: לְעַמֵּךְ
  english_pob_choice: to your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - a tu gente
  - a tu nación
  lexicon: HALOT
  rationale: עַם aquí designa al pueblo/ comunidad étnica de Noemí. «Pueblo» es la opción más natural en español y preserva el sentido comunitario más que una traducción restringida a familia o parentesco.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, con la misma tensión entre una negativa idiomática y una lectura más literal de כִּי en nota. No se registraron revisiones posteriores que alteren la decisión base.
  spanish_consistency_notes:
  - Se mantuvo la concordancia femenina plural implícita en «ellas» para reflejar que hablan las nueras.
  - Se preservó el motivo de «volver» para enlazar con el léxico de Ruth 1.
  - Se usó «pueblo» para עַם, conforme al uso comunitario del término en este contexto.
