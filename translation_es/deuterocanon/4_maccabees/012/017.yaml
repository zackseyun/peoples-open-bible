review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: Οὐκ + ἀπαντυμολοῶ se vierte naturalmente como «No renunciaré», y τῆς τῶν ἀδελφῶν μου μαρτυρίας como «al testimonio de mis hermanos». Se preserva correctamente la tensión de μαρτυρία como «testimonio» con resonancia martirial, sin sobretraducirla como «martirio».'
  spanish_quality_summary: 'La frase principal es clara, natural y digna en español. La única reparación necesaria está en la nota: «la declaración» no corresponde bien al campo semántico ni a la alternativa documentada en la auditoría inglesa, que es «the witness». En español conviene «el testimonio» / «el testimonio dado» o mejor «el testimonio de mis hermanos» frente a «la declaración».'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Hermanos» respeta el referente masculino contextual. «Testimonio» sigue la decisión lexical y teológica del POB. No se requiere ajuste de nombres divinos, mesiánicos ni otros términos de glosario global.
  issues:
  - severity: medium
    issue: La nota léxica usa «la declaración» como alternativa para μαρτυρίας.
    rationale: La auditoría inglesa documenta «witness» como alternativa, no «declaration». «Declaración» en español reduce el matiz de testimonio/witness y pierde la resonancia martirial que sí conserva «testimonio» o «dar testimonio».
  revised_spanish_text: No renunciaré al testimonio de mis hermanos[a].
  revised_footnotes:
  - marker: a
    text: O «el testimonio de mis hermanos» puede entenderse como «el testimonio dado por mis hermanos»; en este contexto la palabra también evoca matices asociados con el martirio.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, idiomático y teológicamente preciso. Solo se corrige la nota para alinearla con la alternativa léxica auditada («witness») y evitar «declaración», que es menos fiel al griego μαρτυρία.
