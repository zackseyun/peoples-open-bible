translation:
  language: es
  text: Y Job retomó su discurso y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su proverbio», «su parábola» o «su oráculo». El hebreo mashal tiene un campo semántico amplio; aquí introduce el extenso discurso poético de Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: again took up / continued
  chosen_spanish: volvió a tomar
  alternatives_spanish:
  - siguió
  - continuó
  - tomó de nuevo
  lexicon: HALOT
  rationale: El hebreo expresa la idea idiomática de añadir o retomar la acción. En español, «volvió a tomar» conserva el valor de repetición y el gesto de reanudar, sin forzar una calca poco natural.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - Ijob
  lexicon: Nombre propio tradicional
  rationale: Se mantiene la forma usual en español bíblico y en la tradición de lectura, sin alterar el nombre propio.
- source_word: שְׂאֵת
  english_pob_choice: taking up
  chosen_spanish: tomar
  alternatives_spanish:
  - alzar
  - levantar
  - pronunciar
  lexicon: HALOT
  rationale: En la construcción hebrea נשׂא משל, el verbo aporta la imagen de «alzar/tomar» un dicho o discurso. «Tomar su discurso» reproduce esa imagen con naturalidad en español y permite conservar el matiz de iniciativa retórica.
- source_word: מְשָׁלוֹ
  english_pob_choice: his discourse
  chosen_spanish: su discurso
  alternatives_spanish:
  - su proverbio
  - su parábola
  - su dicho
  lexicon: HALOT
  rationale: En Job, מָשָׁל no se limita a «proverbio»; introduce una pieza poética extensa. «Discurso» es la opción más fiel al contexto literario y al sentido que el POB inglés documenta.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - diciendo
  lexicon: HALOT
  rationale: Es la fórmula narrativa normal para introducir el discurso directo y resulta natural en español formal.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «continued, taking up his discourse» a «again took up his discourse», enfatizando más directamente la reanudación idiomática. La traducción española adopta esa misma idea con «volvió a tomar», manteniendo el paralelismo con el giro hebreo y la naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene «Job» como forma tradicional del nombre propio.
  - Se traduce מָשָׁל como «discurso» en el cuerpo principal por el contexto de un habla poética extensa, preservando en nota las alternativas semánticas más literales.
  - Se usa puntuación española con coma antes de «y dijo» para reflejar la fórmula introductoria sin sobrecargar la frase.
