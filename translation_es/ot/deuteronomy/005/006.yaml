translation:
  language: es
  text: Yo soy Yahvé tu Dios[a], que te saqué de la tierra de Egipto, de la casa de esclavitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la casa de esclavos». El hebreo es literalmente «de la casa de esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy
  lexicon: HALOT
  rationale: El pronombre independiente con copula implícita en hebreo se expresa naturalmente en español con «Yo soy», que conserva la solemnidad de la autodeclaración inicial del Decálogo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un sustituto titulado. «Yahvé» sigue el criterio doctrinal del proyecto para יְהוָה.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: El sufijo de 2ª persona singular se refleja con «tu», y el contexto de pacto con YHWH exige «Dios» y no un dios genérico.
- source_word: הוֹצֵאתִיךָ
  english_pob_choice: brought you out
  chosen_spanish: te saqué
  alternatives_spanish:
  - te hice salir
  - te saqué fuera
  - te conduje fuera
  lexicon: HALOT
  rationale: El hiphil de יצא expresa causar salir o sacar. En español, «te saqué» es idiomático, fiel y suficientemente fuerte para el contexto del éxodo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición de origen se expresa con «de». Como el verbo ya comunica la salida, no hace falta repetir «fuera de»; «tierra» reproduce bien אֶרֶץ.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: out of the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de esclavos
  - de la casa de servidumbre
  - de la casa de cautiverio
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de la fórmula del éxodo. «Esclavitud» comunica el estado de opresión con naturalidad en español; «casa de esclavos» es más literal, pero menos idiomática.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragramatón directamente. Siguiendo la pauta doctrinal del proyecto, se mantiene el nombre del pacto en español como «Yahvé» para no ocultar el nombre propio con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Meaning of עֲבָדִים in the Exodus formula
  english_pob_reading: slavery
  chosen_spanish_reading: esclavitud
  alternative_spanish_readings:
  - esclavos
  - servidumbre
  - cautiverio
  rationale: Aunque el hebreo es literalmente plural «esclavos», el giro español «casa de esclavitud» conserva el contenido social y teológico de la opresión de forma más natural que un plural nominal en esta construcción fija.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; lexical note on preserving bonded status
translation_notes:
  revision_awareness: 'La traducción española sigue el acuerdo alto del expediente inglés: mantiene el nombre divino como transliteración, conserva el marco del éxodo y evita la expresión tradicional «casa de servidumbre» cuando el hebreo y el audit trail favorecen una referencia más concreta a la esclavitud. También ajusta la preposición final a una solución española natural sin perder el valor de origen.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - Se prefirió «esclavitud» para reflejar el campo semántico de עֲבָדִים sin introducir una perífrasis demasiado explicativa.
  - La nota al pie preserva la alternativa literal «casa de esclavos» porque el hebreo usa un sustantivo plural concreto y el inglés POB también la documenta como opción.
  - El tono general es solemne y publicable, con sintaxis española natural y sin calco excesivo.
