translation:
  language: es
  text: Lleven también a su hermano[a], levántense[b] y vuelvan al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su hermano»; por el contexto, se refiere a Benjamín.'
    reason: cross_reference
  - marker: b
    text: 'O: «levántense, vuelvan».'
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: HALOT
  rationale: La partícula conjuntiva con el marcador de objeto introduce un elemento adicional que debe llevarse. En español, «también» expresa de forma natural ese valor aditivo sin traducir mecánicamente el marcador de objeto.
- source_word: אֲחִי/כֶם
  english_pob_choice: your brother
  chosen_spanish: vuestro hermano
  alternatives_spanish:
  - su hermano
  - vuestro hermano Benjamín
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vuestro hermano». Conservar la forma directa evita importar el nombre propio al texto principal, aunque el contexto se refiere a Benjamín.
- source_word: קָחוּ
  english_pob_choice: take
  chosen_spanish: tomad
  alternatives_spanish:
  - llevad
  - tomadlo
  lexicon: HALOT
  rationale: El imperativo plural de לקח puede rendirse como «tomad» en español bíblico digno. Mantiene la fuerza de mandato y la cercanía semántica de «take» sin volverlo interpretativo como «traed».
- source_word: וְ/ק֖וּמוּ
  english_pob_choice: arise
  chosen_spanish: levantaos
  alternatives_spanish:
  - poneos en pie
  - alzaos
  lexicon: HALOT
  rationale: «Levantaos» transmite el imperativo de קום con naturalidad en español. Conserva el matiz de ponerse en pie para partir, equivalente funcional de «arise».
- source_word: שׁ֥וּבוּ
  english_pob_choice: return
  chosen_spanish: volved
  alternatives_spanish:
  - regresad
  - volved de nuevo
  lexicon: HALOT
  rationale: El verbo שוב, en contexto de desplazamiento, se expresa bien con «volved». Es una forma directa y fiel para el mandato de regresar.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección se vierte naturalmente con «a» en español.
- source_word: הָ/אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: El hebreo usa artículo definido, no demostrativo. «El hombre» preserva la referencia al oficial egipcio sin sobrerinterpretar.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando ambos marcadores de nota directamente en el texto español y manteniendo una secuencia verbal natural que refleje el hebreo asindético.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución, porque este versículo no contiene el nombre divino.
  - Se mantuvo un registro formal y bíblico, con imperativos plurales coherentes con el hebreo.
  - La ausencia de conjunción entre los dos últimos verbos se respeta en el español principal mediante una cadena breve de mandatos.
