translation:
  language: es
  text: No seas sabio[a] ante tus propios ojos; teme a Yahvé[b] y apártate[c] del mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No llegues a ser sabio»; el hebreo admite tanto la idea de estado como la de volverse sabio en esa autoevaluación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «reverencia a Yahvé». El verbo hebreo puede expresar temor reverente o asombro ante Dios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «aléjate». El verbo puede significar apartarse o desviarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תְּהִי חָכָם
  english_pob_choice: Do not be wise
  chosen_spanish: No seas sabio
  alternatives_spanish:
  - No llegues a ser sabio
  - No te creas sabio
  lexicon: HALOT
  rationale: La construcción prohibitiva con אַל + imperfecto/jusivo de היה seguida de un adjetivo predicativo se expresa de forma natural en español con «No seas sabio». Conserva la fuerza de la prohibición sin volverla más interpretativa de lo que permite el hebreo.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your own eyes
  chosen_spanish: a tus propios ojos
  alternatives_spanish:
  - en tus propios ojos
  - según tu propia opinión
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la propia estimación. «A tus propios ojos» conserva la metáfora visual del original y reproduce el matiz reflexivo que el POB inglés señaló con «in your own eyes».
- source_word: יְרָא
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - reverencia
  - ten reverente temor de
  lexicon: HALOT
  rationale: El imperativo de ירא en literatura sapiencial puede abarcar temor reverente. «Teme» conserva el peso bíblico y la tensión teológica del verbo mejor que una paráfrasis suavizada como «reverencia».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino explícito como «Yahvé», siguiendo la decisión doctrinal del proyecto de no sustituir el Tetragrámaton por un título. «Yahvé» es la forma española correspondiente al «Yahweh» del audit trail inglés.
- source_word: וְסוּר
  english_pob_choice: and turn away
  chosen_spanish: y apártate
  alternatives_spanish:
  - y aléjate
  - y desvía tu camino
  lexicon: HALOT
  rationale: El verbo סור significa apartarse o desviarse. En español, el imperativo pronominal «apártate» comunica bien la acción voluntaria de alejarse del mal, con un registro natural y fiel.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de la maldad
  - de lo malo
  lexicon: HALOT
  rationale: רָע aquí tiene sentido moral general. «Del mal» conserva la concisión y el paralelismo del hebreo, sin restringir el término a un solo acto o conducta.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el POB, se traduce con el nombre propio de Dios y no con una sustitución litúrgica. «Yahvé» es la adaptación española estándar del transliterado «Yahweh».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of the warning in wisdom parallelism
  english_pob_reading: Do not be wise in your own eyes; fear Yahweh and turn away from evil.
  chosen_spanish_reading: No seas sabio a tus propios ojos; teme a Yahvé y apártate del mal.
  alternative_spanish_readings:
  - No te creas sabio; teme a Yahvé y aléjate del mal.
  - No te consideres sabio; teme a Yahvé y evita el mal.
  rationale: El paralelismo sapiencial une la autosuficiencia intelectual con la reverencia a Dios y la conducta moral. La versión española mantiene esas tres líneas sin suavizar la advertencia ni convertirla en una mera exhortación ética general.
  doctrine_reference: 'Sabiduría bíblica: humildad ante Dios y rechazo del mal'
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones textuales: mantiene alto acuerdo y conserva la lectura estándar de la prohibición sapiencial, el temor reverente ante Yahweh y el apartarse del mal. La versión española sigue esas decisiones sin introducir cambios de sentido.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preservó la metáfora de «ojos» para בְּעֵינֶיךָ porque comunica la autoevaluación del hebreo sin perder transparencia.
  - «Teme» se conserva como verbo principal para יְרָא, evitando reemplazarlo por un término más débil que borraría la carga reverencial.
  - «Apártate» refleja bien סור en un registro bíblico natural para el español actual.
