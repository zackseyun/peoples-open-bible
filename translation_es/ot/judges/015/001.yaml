translation:
  language: es
  text: 'Y después de algunos días, en los días de la siega del trigo, Sansón visitó a su mujer con un cabrito. Y dijo: «Déjame ir a mi mujer, al aposento interior[a]». Pero su padre no le permitió entrar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la cámara». El hebreo probablemente se refiere a una habitación interna; en el contexto implica el aposento privado conyugal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי מִיָּמִים
  english_pob_choice: And after some days
  chosen_spanish: Y después de algunos días
  alternatives_spanish:
  - Y aconteció después de algunos días
  - Y después de un tiempo
  lexicon: HALOT
  rationale: El hebreo marca un lapso transcurrido; en español, «después de algunos días» conserva ese valor temporal con naturalidad y sin el calco impersonal de «aconteció».
- source_word: בִּימֵי קְצִיר חִטִּים
  english_pob_choice: in the days of the wheat harvest
  chosen_spanish: en los días de la siega del trigo
  alternatives_spanish:
  - durante la siega del trigo
  - en tiempo de la siega del trigo
  lexicon: HALOT
  rationale: Se mantiene la construcción temporal del hebreo y el referente agrícola específico, con una formulación idiomática en español.
- source_word: וַיִּפְקֹד
  english_pob_choice: visited
  chosen_spanish: visitó
  alternatives_spanish:
  - fue a ver
  - hizo una visita a
  lexicon: HALOT
  rationale: Aquí פקד significa visitar o atender a alguien, no censar ni castigar. «Visitó» es fiel y natural.
- source_word: אֶת אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: a su mujer
  alternatives_spanish:
  - a su esposa
  - a su mujer, que era su esposa
  lexicon: HALOT
  rationale: «Mujer» reproduce bien el valor relacional del hebreo en este contexto; «esposa» sería posible, pero «mujer» sigue de cerca la formulación bíblica sin perder claridad.
- source_word: בִּגְדִי עִזִּים
  english_pob_choice: with a young goat
  chosen_spanish: con un cabrito
  alternatives_spanish:
  - con un macho cabrío joven
  - llevando un cabrito
  lexicon: HALOT
  rationale: «Cabrito» expresa de forma clara y natural el animal joven de la frase; evita la posible ambigüedad de «young goat» traducido mecánicamente.
- source_word: אָבֹאָה אֶל אִשְׁתִּי
  english_pob_choice: Let me go in to my wife
  chosen_spanish: Déjame entrar a mi mujer
  alternatives_spanish:
  - Permíteme ir a mi mujer
  - Déjame ir adonde está mi mujer
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática de entrar a la esposa como fórmula de acceso conyugal. En español, «entrar a mi mujer» mantiene el valor del hebreo y la cohesión con la réplica posterior.
- source_word: הֶחָדְרָה
  english_pob_choice: into the inner room
  chosen_spanish: en el aposento interior
  alternatives_spanish:
  - en la cámara interior
  - en el cuarto interior
  lexicon: HALOT
  rationale: El hebreo apunta a una habitación interna. «Aposento interior» preserva la referencia espacial sin imponer demasiado una equivalencia moderna como «dormitorio».
- source_word: וְלֹא נְתָנוֹ אָבִיהָ לָבוֹא
  english_pob_choice: But her father would not allow him to go in
  chosen_spanish: Pero su padre no le permitió entrar
  alternatives_spanish:
  - Pero su padre no le dejó entrar
  - Pero su padre no permitió que entrara
  lexicon: HALOT
  rationale: El hebreo expresa una negativa activa de acceso. «No le permitió entrar» es claro y mantiene la relación con el «entrar» de la cláusula previa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audito inglés aprobado, conservando la secuencia narrativa, el regalo del cabrito y la expresión idiomática de «entrar» para el acceso conyugal. Se ajustó la sintaxis para que suene natural en español sin perder la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» en la política general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «mujer» para אִשְׁתּוֹ por coherencia con el hebreo y con el inglés POB; en español moderno sigue siendo comprensible y evita suavizar el matiz relacional.
  - «Entrar» se repite en ambas cláusulas para reflejar el juego verbal del hebreo y la cohestión del audit trail inglés.
  - «Aposento interior» deja abierta la posibilidad de una cámara o cuarto interno, como indica la nota inglesa sobre el sentido probable en contexto.
