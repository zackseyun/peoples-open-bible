  rationale: Se mantiene íntegro el sentido del original y del POB inglés, pero se ajusta ‘conforme a’ a ‘según’ para una expresión más natural y más cercana al valor organizativo de לְבֵית אֲבֹתָם, y se suaviza la puntuación antes de ‘doce varas’. No se requieren cambios doctrinales ni léxicos mayores.
