    text: O «las cosas santas» o «el lugar santo»; el griego transmitido aquí es difícil.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre el término textualmente difícil («santuario»). Se reemplaza «estableciera hombres sobre» por «nombrara hombres a cargo de» para reflejar mejor el sentido administrativo de καθιστάναι ... ἐπὶ en español natural. Se cambia «sus trabajos» por «sus obras» para conservar mejor el valor de ἔργα en este contexto. «Territorio» mejora la fluidez administrativa respecto de «tierra» sin apartarse del sentido de χώρα.
