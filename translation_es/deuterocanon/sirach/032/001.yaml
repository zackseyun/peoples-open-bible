  glossary_alignment: No hay términos teológicos de proyecto en juego. La principal cuestión léxica es ראש נבחרת, donde conviene preferir «líder» o «jefe del grupo/banquete» sobre «cabeza» por claridad y legibilidad en español. «Recuéstate» preserva bien תסב en clave cultural. «Prepara lo necesario» representa prudentemente הכן מרכם. «Toma tu lugar» es válido para תרבץ.
