translation:
  language: es
  text: Los llenó de conocimiento y de entendimiento[a], y les mostró el bien y el mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego expresa una sola idea compacta: «conocimiento» caracterizado por entendimiento o discernimiento.'
    reason: lexical_clarity
  - marker: b
    text: 'O: «cosas buenas y cosas malas». El griego puede denotar categorías morales o cosas beneficiosas y perjudiciales; el contexto favorece el discernimiento moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστήμην
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento
  lexicon: BDAG
  rationale: ‘ἐπιστήμην’ expresa conocimiento o comprensión adquirida; ‘conocimiento’ es el equivalente natural y digno en español, y conserva mejor la amplitud semántica que un mero ‘saber’.
- source_word: συνέσεως
  english_pob_choice: of understanding
  chosen_spanish: del entendimiento
  alternatives_spanish:
  - de la comprensión
  - de la percepción
  - de la discernimiento
  lexicon: BDAG
  rationale: El genitivo califica a ‘conocimiento’ y no introduce un segundo objeto distinto. ‘Del entendimiento’ preserva la relación compacta del griego y sugiere conocimiento caracterizado por comprensión.
- source_word: ἐνέπλησεν
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - colmó
  - llenó
  lexicon: BDAG
  rationale: ‘Llenó’ reproduce con claridad el sentido de acción completa del verbo sin añadir matices no presentes en el texto.
- source_word: ἀγαθὰ καὶ κακὰ
  english_pob_choice: good and evil
  chosen_spanish: el bien y el mal
  alternatives_spanish:
  - lo bueno y lo malo
  - bienes y males
  - el bien y el mal
  lexicon: BDAG
  rationale: Aunque la forma griega admite también la idea de cosas beneficiosas y perjudiciales, el contexto favorece categorías morales. ‘El bien y el mal’ mantiene esa tensión ética y la formulación tradicional en español.
- source_word: ὑπέδειξεν
  english_pob_choice: showed
  chosen_spanish: les mostró
  alternatives_spanish:
  - les señaló
  - les indicó
  - les mostró
  lexicon: BDAG
  rationale: El verbo significa mostrar, señalar o indicar. ‘Les mostró’ es directo, idiomático y suficiente para la construcción con objeto indirecto.
theological_decisions:
- issue: Si ἀγαθὰ καὶ κακὰ debe entenderse como categorías morales o como cosas útiles y dañinas
  english_pob_reading: Rendered as 'good and evil'
  chosen_spanish_reading: ‘el bien y el mal’
  alternative_spanish_readings:
  - ‘cosas buenas y cosas malas’
  - ‘lo bueno y lo malo’
  rationale: 'La lectura contextual más fuerte es moral: el verso habla de la capacidad humana para discernir. Se conserva esa fuerza sin suavizarla a meramente útil/perjudicial.'
  doctrine_reference: Primacía del sentido del texto original; conservar la tensión léxica y teológica cuando el griego admite más de una posibilidad.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la decisión optimizante ‘knowledge of understanding’ y la lectura moral de ‘good and evil’, sin revisiones posteriores. La versión española sigue esa misma línea, haciendo explícita la relación genitiva con ‘del entendimiento’ y conservando la ambigüedad léxica solo en nota.
  spanish_consistency_notes:
  - Se evitó ‘sabiduría’ porque el griego aquí usa ἐπιστήμη/σύνεςις, no σοφία.
  - ‘El bien y el mal’ reproduce la lectura moral que el contexto favorece, aunque el griego también puede abarcar cosas provechosas y nocivas.
  - Se usó ‘Yahvé’ no porque aparezca en este versículo, sino para mantener la consistencia terminológica del proyecto en contextos donde corresponda.
