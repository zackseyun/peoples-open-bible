translation:
  language: es
  text: Las palabras de Yirmeyahu[a], hijo de Hilqiyahu, uno de los sacerdotes que estaban en Anatot, en la tierra de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las versiones españolas tradicionales suelen leer «Jeremías hijo de Hilquías». Este borrador translitera los nombres hebreos más directamente como «Yirmeyahu» y «Hilqiyahu», conforme a la política del proyecto para nombres personales.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  - Los asuntos de
  - Las palabras
  lexicon: HALOT
  rationale: דִּבְרֵי es un plural constructo de דָּבָר y funciona como encabezado del libro. En español, «Las palabras de» reproduce con naturalidad la fórmula introductoria sin limitar el sentido a discurso oral ni a profecía exclusivamente.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: HALOT
  rationale: Aunque el POB inglés translitera el nombre propio para seguir la forma hebrea, en español bíblico «Jeremías» es la forma estable y plenamente inteligible para los lectores. Aquí se mantiene el valor identificador del nombre propio sin introducir una transliteración menos reconocible para este registro.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación genealógica se expresa de manera directa y natural en español con «hijo de».
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilqiyahu
  chosen_spanish: Hilquías
  alternatives_spanish:
  - Hilqiyahu
  lexicon: HALOT
  rationale: El nombre aparece en hebreo con la terminación teofórica -yahu, pero la forma española tradicional y ampliamente reconocible es «Hilquías». Dado que el texto fuente identifica a una persona concreta y el contexto eclesial en español entiende este nombre de forma estable, se usa la forma consagrada sin alterar la referencia.
- source_word: מִן הַכֹּהֲנִים
  english_pob_choice: one of the priests
  chosen_spanish: uno de los sacerdotes
  alternatives_spanish:
  - de los sacerdotes
  - entre los sacerdotes
  - perteneciente a los sacerdotes
  lexicon: HALOT
  rationale: El hebreo con מִן es partitivo; el sentido no es origen espacial sino pertenencia a un grupo. «Uno de los sacerdotes» expresa bien esa relación en español y conserva la lectura idiomática del inglés auditado.
- source_word: אֲשֶׁר
  english_pob_choice: who were
  chosen_spanish: que estaban
  alternatives_spanish:
  - que eran
  - que se hallaban
  lexicon: HALOT
  rationale: En español se necesita completar la relativa. «Estaban» comunica la ubicación del grupo en Anatot sin añadir una cualidad no explícita del hebreo.
- source_word: בַּעֲנָתוֹת
  english_pob_choice: in Anathoth
  chosen_spanish: en Anatot
  alternatives_spanish:
  - en Anathoth
  lexicon: HALOT
  rationale: Se adapta el topónimo a la forma española habitual «Anatot», manteniendo la referencia geográfica del original.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  english_pob_choice: in the land of Benjamin
  chosen_spanish: en la tierra de Benjamín
  alternatives_spanish:
  - en el territorio de Benjamín
  - en la región de Benjamín
  lexicon: HALOT
  rationale: אֶרֶץ aquí señala territorio o región tribal. «Tierra de Benjamín» conserva ese matiz territorial con una formulación bíblica natural en español, sin convertirla en una paráfrasis moderna.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto base: no hay cambios textuales relevantes reportados en el pasaje fuente ni en el audit trail inglés. La principal decisión española es adaptar los nombres propios a las formas tradicionales del español bíblico cuando ello no crea pérdida de fidelidad referencial.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden informativo del encabezado hebreo: título, nombre del profeta, filiación, pertenencia sacerdotal y ubicación.'
  - Se preservó el valor partitivo de מִן con «uno de», evitando una traducción más literal pero menos idiomática.
  - Se usó «tierra de Benjamín» para reflejar el alcance territorial de אֶרֶץ sin sobredimensionarlo.
  - No se introdujeron términos doctrinales ajenos al versículo; el texto es un superscrito genealogicogeográfico.
