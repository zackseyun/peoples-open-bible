translation:
  language: es
  text: Y piedras de granizo, llenas de furor[a], serán arrojadas desde una honda; el agua del mar se enfurecerá contra ellos, y los ríos los anegarán[b] de repente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llenas de furor que lanza piedras» o «llenas de furor pedregoso». El griego comprime la imagen en la expresión poco común πετροβόλου θυμοῦ.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «bruscamente» o «violentamente»: «los ríos los anegarán bruscamente/violentamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πετροβόλου
  english_pob_choice: from a sling / full of furious force
  chosen_spanish: desde una honda
  alternatives_spanish:
  - lanzadas como piedras
  - con fuerza arrojadora de piedras
  - desde un tirador de piedras
  lexicon: LSJ
  rationale: El griego comprime la imagen de algo relacionado con arrojar piedras. En español, «honda» transmite de manera natural el instrumento de lanzamiento y mantiene la fuerza imagética sin forzar una paráfrasis explicativa.
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - cólera
  - enojo
  lexicon: LSJ
  rationale: En este contexto judicial y violento, «furor» conserva la intensidad elevada de θυμός mejor que un término más cotidiano. Mantiene el tono poético y destructivo del pasaje.
- source_word: πλήρεις
  english_pob_choice: full of
  chosen_spanish: llenas de
  alternatives_spanish:
  - colmadas de
  - llenas por completo de
  lexicon: LSJ
  rationale: Es una equivalencia directa y natural en español, acorde con el sujeto plural «piedras de granizo».
- source_word: ῥιφήσονται
  english_pob_choice: will be hurled
  chosen_spanish: serán arrojadas
  alternatives_spanish:
  - serán lanzadas
  - serán echadas
  - serán despedidas
  lexicon: LSJ
  rationale: El futuro pasivo pide un verbo que conserve la imagen de proyectiles. «Serán arrojadas» es fiel y idiomático.
- source_word: χάλαζαι
  english_pob_choice: hailstones
  chosen_spanish: piedras de granizo
  alternatives_spanish:
  - granizos
  - bolas de granizo
  - piedras de hielo
  lexicon: LSJ
  rationale: El plural griego individualiza los impactos. «Piedras de granizo» mantiene esa concreción sin perder inteligibilidad, y evita que el lector entienda solo el fenómeno general del granizo.
- source_word: ἀγανακτήσει
  english_pob_choice: will rage
  chosen_spanish: se indignará
  alternatives_spanish:
  - se enfurecerá
  - rugirá
  - se alzará con furia
  lexicon: LSJ
  rationale: Aunque el sujeto es «el agua del mar», el griego conserva una personificación que implica reacción indignada. «Se indignará» preserva ese matiz sin convertirlo en mero ruido o violencia impersonal.
- source_word: ὕδωρ θαλάσσης
  english_pob_choice: the water of the sea
  chosen_spanish: el agua del mar
  alternatives_spanish:
  - el agua marina
  - las aguas del mar
  - el mar
  lexicon: LSJ
  rationale: La construcción genitiva se refleja de forma literal y clara en español. «El agua del mar» conserva la personificación del sustantivo singular.
- source_word: συγκλύσουσιν
  english_pob_choice: will overwhelm
  chosen_spanish: anegarán
  alternatives_spanish:
  - inundarán
  - cubrirán
  - arrastrarán
  lexicon: LSJ
  rationale: El verbo expresa la idea de cubrir por una crecida o inundación. «Anegarán» comunica bien el sentido de inundar y destruir por agua, con una fuerza más concreta que «inundarán».
- source_word: ἀποτόμως
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - bruscamente
  - violentamente
  - repentinamente
  lexicon: LSJ
  rationale: El adverbio puede indicar abruptez o violencia. «De repente» conserva la inmediatez del golpe final en español natural.
theological_decisions:
- issue: Personificación de fuerzas naturales como agentes de juicio
  english_pob_reading: Retained the personification of sea water and rivers acting in wrathful judgment.
  chosen_spanish_reading: Se conserva la personificación del agua del mar y de los ríos como agentes de juicio contra los impíos.
  alternative_spanish_readings:
  - Reducirlo a una descripción impersonal de desastre natural
  - Neutralizar la personificación y dejar solo la inundación
  rationale: El versículo presenta la creación participando activamente en el juicio. En español se conserva esa retórica sin suavizarla a lenguaje meteorológico impersonal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
- issue: Metáfora instrumental de πετροβόλου
  english_pob_reading: full of furious force / from a sling
  chosen_spanish_reading: «desde una honda» mantiene la metáfora del lanzamiento de piedras sin explicarla en exceso.
  alternative_spanish_readings:
  - 'Agregar una explicación: ''como lanzadas por una honda'''
  - Traducir solo 'con furor pedregoso'
  rationale: La honda es el equivalente español más natural para el campo imagético del texto. Permite que el lector perciba la violencia del golpe y la imagen de proyectiles sin diluir el término griego.
  doctrine_reference: 'DOCTRINE.md: Preserve original-language imagery and lexical tension when recoverable in target language.'
translation_notes:
  revision_awareness: La versión griega de trabajo procede de la capa normalizada de traducción del corpus adjudicado. La auditoría inglesa revisó una formulación anterior y la ajustó para reflejar καλύτερα la imagen de πετροβόλου; en español se ha preservado esa tensión entre la metáfora de la honda y el furor destructivo, manteniendo además la personificación del mar y de los ríos.
  spanish_consistency_notes:
  - Se usó «Y» al inicio para reflejar la coordinación poética del griego.
  - Se prefirió «el agua del mar» en singular para conservar la personificación del texto fuente.
  - «Piedras de granizo» mantiene la concreción del plural χάλαζαι y su carácter de proyectiles.
  - No se sustituyó la imagen de la honda por una paráfrasis doctrinal o explicativa.
  - «Anegarán» se eligió por su fuerza de inundación destructiva, compatible con συγκλύσουσιν.
