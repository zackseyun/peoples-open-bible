  to: Espinos crecerán sobre sus palacios, ortigas y zarzas en sus fortalezas; y se convertirá en guarida de chacales[b], en pastizal para avestruces[a].
  rationale: Se reemplaza «subirán» por «crecerán sobre» para reflejar mejor el uso idiomático hebreo de vegetación que invade y cubre estructuras en ruinas. Se reubica la nota [a] junto a «avestruces», que es la frase a la que realmente corresponde, y se conserva [b] en «chacales».
