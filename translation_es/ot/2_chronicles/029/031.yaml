    issue: Cambio de persona en גֹּשׁוּ
    rationale: 'El hebreo manda a los oyentes: «acérquense». El borrador dice «Acerquémonos», incluyendo al hablante y cambiando la fuerza del imperativo. Además crea discordancia con «traigan».'
  - severity: medium
