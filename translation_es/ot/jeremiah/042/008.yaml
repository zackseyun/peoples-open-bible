translation:
  language: es
  text: Entonces llamó a Johanán hijo de Carea, a todos los comandantes de las fuerzas que estaban con él, y a todo el pueblo, desde el menor hasta el mayor,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: Then he called
  chosen_spanish: Entonces llamó
  alternatives_spanish:
  - Y llamó
  - Entonces convocó
  lexicon: HALOT
  rationale: El valor consecutivo del waw narrativo se expresa naturalmente con «Entonces»; «llamó» conserva el sentido básico de קרא sin intensificarlo innecesariamente con «convocó».
- source_word: אֶל
  english_pob_choice: —
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: En español, el destinatario del llamado se expresa de modo natural con «a»; repetirla delante de cada grupo mantiene la claridad del hebreo sin forzar el orden.
- source_word: יֽוֹחָנָן
  english_pob_choice: Johanan
  chosen_spanish: Johanán
  alternatives_spanish:
  - Johanan
  - Yohanán
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración española directa; «Johanán» refleja mejor la pronunciación habitual en español bíblico que la forma inglesa.
- source_word: בֶּן־קָרֵחַ
  english_pob_choice: son of Kareah
  chosen_spanish: hijo de Carea
  alternatives_spanish:
  - hijo de Kareah
  - descendiente de Carea
  lexicon: HALOT
  rationale: El patronímico se mantiene con «hijo de». «Carea» adapta el nombre propio a ortografía española usual sin cambiar la referencia.
- source_word: כָּל שָׂרֵי הַחֲיָלִים
  english_pob_choice: all the commanders of the forces
  chosen_spanish: todos los comandantes de las fuerzas
  alternatives_spanish:
  - todos los jefes de las fuerzas
  - todos los capitanes de las fuerzas
  lexicon: HALOT
  rationale: «שָׂרִים» tiene sentido de jefes/mandos; «comandantes» comunica bien el rango militar sin perder el matiz de autoridad. «Fuerzas» sigue la decisión inglesa de mantener el colectivo militar.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban junto a él
  - que lo acompañaban
  lexicon: HALOT
  rationale: La cláusula relativa describe la presencia conjunta de esos comandantes; «que estaban con él» es la forma más natural y fiel en español.
- source_word: וּלְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y a todo el pueblo
  alternatives_spanish:
  - y a todo el pueblo allí reunido
  - y a toda la gente
  lexicon: HALOT
  rationale: «הָעָם» se traduce aquí como «todo el pueblo», término más solemne y preciso que «gente» para un colectivo nacional/reunido.
- source_word: לְמִקָּטֹן וְעַד גָּדוֹל
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - desde el menor hasta el mayor
  - desde el más humilde hasta el más encumbrado
  lexicon: HALOT
  rationale: Se conserva el idiomatismo de totalidad social. «Más pequeño / más grande» reproduce el contraste hebreo sin cargarlo de una interpretación social más específica de la que el texto exige.
translation_notes:
  revision_awareness: La versión inglesa reciente permanece sin cambios; el borrador español sigue de cerca el texto hebreo y la decisión inglesa de mantener el alcance inclusivo del idiomatismo final.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo.
  - Se conserva la secuencia narrativa con «Entonces».
  - No se añaden notas porque el versículo no presenta variantes textuales ni tensiones lexicoteológicas relevantes en este recorte.
