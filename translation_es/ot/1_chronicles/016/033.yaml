    text: O 'está por venir a juzgar la tierra'. La forma verbal hebrea puede expresar una acción venidera con certeza vívida en contexto poético.
    reason: lexical_alternative
  - marker: c
    text: O 'la tierra', en sentido más local. Aquí el contexto amplio favorece 'la tierra' en sentido universal.
    reason: alternative_reading
  revision_rationale: Se hicieron ajustes menores para mejorar la naturalidad y dignidad del español sin alterar el sentido fuente ni las decisiones teológicas del expediente POB. 'Cantarán de alegría' suena más idiomático que 'cantarán de gozo'; la nota verbal se reformuló para una alternativa española más natural; y la nota sobre הָאָרֶץ se afinó para evitar el coloquialismo 'el país' manteniendo la posibilidad de un sentido local.
