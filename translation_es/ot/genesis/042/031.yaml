translation:
  language: es
  text: 'Y le dijimos: «Somos hombres honestos[a]; no hemos sido espías[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hombres íntegros» / «hombres rectos».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no éramos espías» o «no estábamos espiando».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  english_pob_choice: And we said
  chosen_spanish: Y dijimos
  alternatives_spanish:
  - Entonces dijimos
  - Así que dijimos
  lexicon: HALOT
  rationale: El wayyiqtol marca la siguiente acción narrativa; «Y dijimos» conserva la secuencia sin cargar más sentido que el hebreo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él
  - le
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de 3ª persona masculina singular se rinde de forma directa como «a él»; se evita «le» en el texto principal para mantener la transparencia del referente.
- source_word: כֵּנִים
  english_pob_choice: honest
  chosen_spanish: honestos
  alternatives_spanish:
  - íntegros
  - rectos
  - sinceros
  lexicon: HALOT
  rationale: El término describe su autodefensa como personas rectas y confiables ante la acusación. «Honestos» es natural en español actual y conserva el valor moral/general del término mejor que una paráfrasis más amplia.
- source_word: לֹא הָיִינוּ
  english_pob_choice: we have not been
  chosen_spanish: no hemos sido
  alternatives_spanish:
  - no éramos
  - no fuimos
  lexicon: HALOT
  rationale: La negación con היה y participio expresa un estado/condición negada en el pasado. «No hemos sido» reproduce bien ese valor en español, manteniendo la afirmación sostenida que niegan.
- source_word: מְרַגְּלִים
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - exploradores secretos
  - espionaje
  lexicon: HALOT
  rationale: El participio funciona aquí como sustantivo para personas que espían; «espías» es la equivalencia natural y exacta en español.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador sigue de cerca el texto hebreo y el audit trail inglés, sin introducir ajustes textuales no sustentados.
  spanish_consistency_notes:
  - Se conserva el paralelismo breve de la frase hebrea con una sintaxis natural en español.
  - Se evita sustituir el matiz moral de כֵּנִים por un equivalente demasiado técnico o eclesiástico.
  - «Espías» mantiene el valor sustantivo del participio sin convertirlo en verbo o en una paráfrasis.
  - La puntuación de cita respeta el estilo español y mantiene el discurso directo claro.
