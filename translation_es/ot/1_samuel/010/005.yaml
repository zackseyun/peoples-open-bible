  to: Después de eso, llegarás a Guibeat-ha-Elohim[a], donde está la guarnición filistea[b]. Y cuando entres allí, en la ciudad, te encontrarás con un grupo de profetas que descienden del lugar alto, con arpa, pandero, flauta y lira delante de ellos[c], y estarán profetizando.
