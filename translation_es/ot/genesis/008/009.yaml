translation:
  language: es
  text: Pero la paloma no halló lugar de reposo[a] para la planta de su pie[b], y volvió a él, al arca, porque las aguas estaban sobre la superficie de toda la tierra[c]. Entonces él extendió su mano, la tomó y la trajo hacia sí al arca[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lugar de descanso'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'para la planta de su pie'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''las aguas estaban sobre la superficie de toda la tierra''.'
    reason: lexical_alternative
  - marker: d
    text: O 'la trajo a sí al arca'.
    reason: previous_rendering
lexical_decisions:
- source_word: מָצְאָה
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - halló un lugar de reposo
  lexicon: HALOT
  rationale: מצא en qal significa normalmente ‘hallar/encontrar’. ‘Halló’ mantiene el valor narrativo directo y es natural en español bíblico contemporáneo sin sonar arcaizante.
- source_word: מָנוֹחַ
  english_pob_choice: resting place
  chosen_spanish: lugar de reposo
  alternatives_spanish:
  - reposo
  - lugar de descanso
  lexicon: HALOT
  rationale: El sustantivo expresa un sitio o estado de descanso. ‘Lugar de reposo’ conserva el matiz concreto de un punto donde la paloma pudiera posarse.
- source_word: לְכַף רַגְלָהּ
  english_pob_choice: for the sole of her foot
  chosen_spanish: para la planta de su pie
  alternatives_spanish:
  - para la suela de su pie
  - para su pie
  lexicon: HALOT
  rationale: כַּף con ‘pie’ alude a la planta o palma del pie. ‘Planta de su pie’ preserva la imagen hebrea con una formulación clara en español.
- source_word: וַתָּשָׁב אֵלָיו
  english_pob_choice: so she returned to him
  chosen_spanish: y volvió a él
  alternatives_spanish:
  - y regresó a él
  - así que volvió a él
  lexicon: HALOT
  rationale: שׁוּב significa ‘volver/regresar’. ‘Volvió a él’ reproduce bien el movimiento de regreso; el contexto ya explica la causa en la cláusula siguiente.
- source_word: אֶל הַתֵּבָה
  english_pob_choice: to the ark
  chosen_spanish: al arca
  alternatives_spanish:
  - hacia el arca
  - a el arca
  lexicon: HALOT
  rationale: אֶל indica dirección hacia. ‘Al arca’ es la forma natural y precisa en español; la entrada efectiva al arca se expresa más adelante.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce causa. ‘Porque’ conserva la relación causal de manera directa y clara.
- source_word: מַיִם עַל־פְּנֵי כָל־הָאָרֶץ
  english_pob_choice: the waters were on the surface of all the earth
  chosen_spanish: las aguas estaban sobre la superficie de toda la tierra
  alternatives_spanish:
  - las aguas cubrían toda la tierra
  - las aguas estaban sobre toda la faz de la tierra
  lexicon: HALOT
  rationale: פְּנֵי expresa literalmente ‘superficie/faz’. ‘Sobre la superficie de toda la tierra’ sigue de cerca la imagen hebrea y evita suavizarla con una paráfrasis excesiva.
- source_word: וַיִּשְׁלַח יָדוֹ
  english_pob_choice: he stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: שׁלח con ‘mano’ funciona idiomáticamente como ‘extender’. ‘Extendió su mano’ es natural en español y conserva el gesto narrativo.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la asió
  - la recogió
  lexicon: HALOT
  rationale: לקח significa ampliamente ‘tomar’. ‘La tomó’ es la traducción directa y suficiente en el flujo narrativo.
- source_word: וַיָּבֵא אֹתָהּ אֵלָיו אֶל הַתֵּבָה
  english_pob_choice: brought her to himself into the ark
  chosen_spanish: la hizo entrar consigo en el arca
  alternatives_spanish:
  - la llevó consigo al arca
  - la trajo consigo al arca
  lexicon: HALOT
  rationale: 'El hebreo conserva dos direcciones: ‘a él’ y ‘al arca’. En español, ‘la hizo entrar consigo en el arca’ mantiene ambas ideas sin la pesadez de un calco literal, y refleja el resultado de llevarla al interior con él.'
theological_decisions:
- issue: La relación entre ‘a él’ y ‘al arca’ en la última cláusula
  english_pob_reading: brought her to himself into the ark
  chosen_spanish_reading: la hizo entrar consigo en el arca
  alternative_spanish_readings:
  - la llevó a él en el arca
  - la trajo a sí en el arca
  rationale: La fuente hebrea incluye tanto אֵלָיו (‘a él/consigo’) como אֶל הַתֵבָה (‘al arca’). En español, una traducción muy literal suena forzada; ‘consigo’ conserva la referencia personal y ‘en el arca’ conserva el destino espacial, sin borrar ninguno de los dos elementos.
  doctrine_reference: No doctrinal issue; matters of semantic and syntactic preservation from the Hebrew text.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma en cuenta la revisión inglesa más reciente que reordenó la cláusula final para reflejar mejor la secuencia original. En español, se preserva esa doble referencia mediante una formulación natural (‘la hizo entrar consigo en el arca’) que evita omitir cualquiera de los dos complementos hebreos.
  spanish_consistency_notes:
  - Se usa ‘arca’ para תֵבָה, conforme al uso bíblico tradicional y al audit trail inglés.
  - Se mantiene ‘Yahvé’ no aplica en este versículo; no hay forma divina explícita en el texto.
  - ‘Paloma’ traduce יונה de manera directa y estable.
  - La puntuación reproduce el quiebre narrativo entre la causa y la acción de Noé.
  - No se usa ‘SEÑOR’ ni otras sustituciones no presentes en el hebreo.
