translation:
  language: es
  text: Así, Dios hizo recaer sobre Abimelec el mal que había hecho a su padre al matar a sus setenta hermanos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le devolvió a Abimelec el mal». El modismo hebreo expresa que Dios hizo volver sobre él su propio mal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: repaid
  chosen_spanish: devolvió
  alternatives_spanish:
  - repagó
  - retribuyó
  - hizo volver
  lexicon: HALOT
  rationale: El verbo hiphil de שוב aquí expresa la idea idiomática de hacer volver el mal sobre alguien, con sentido de retribución. En español, «devolvió» comunica esa acción causal de retorno sin volver la frase artificiosa; «retribuyó» sonaría más interpretativo y menos ligado al retorno idiomático.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  - el Dios
  lexicon: HALOT
  rationale: La forma plural con verbo singular designa al único Dios de Israel actuando en juicio. «Dios» conserva la referencia singular y es el equivalente normal y directo en español.
- source_word: רָעַת
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - la malicia
  - el daño
  lexicon: HALOT
  rationale: Aquí רָעָה designa la acción moralmente mala de Abimelec, no solo un daño accidental. «El mal» mantiene la fuerza ética del término y permite que la cláusula siguiente explique en qué consistió.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelech
  lexicon: convención onomástica del proyecto
  rationale: Se translitera el nombre propio con la forma usual en español bíblico del proyecto, adaptando la grafía al español sin alterar la identidad del personaje.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - el cual había hecho
  lexicon: HALOT
  rationale: La referencia retrospectiva requiere un perfecto pluscuamperfecto en español para ubicar la acción previa de Abimelec respecto del juicio narrado.
- source_word: לְאָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - contra su padre
  - para su padre
  lexicon: HALOT
  rationale: En esta construcción, ל marca a la persona afectada por el acto. «A su padre» es natural en español y deja que el infinitivo siguiente precise la agresión.
- source_word: לַהֲרֹג
  english_pob_choice: by killing
  chosen_spanish: al matar
  alternatives_spanish:
  - por matar
  - matando
  lexicon: HALOT
  rationale: El infinitivo con ל explica el contenido o el modo del mal hecho. «Al matar» conserva la relación explicativa y suena más fluido en español que una traducción demasiado mecánica.
- source_word: שִׁבְעִים אֶחָיו
  english_pob_choice: his seventy brothers
  chosen_spanish: sus setenta hermanos
  alternatives_spanish:
  - setenta de sus hermanos
  lexicon: HALOT
  rationale: La frase expresa directamente la relación fraterna y el número completo de las víctimas. «Sus setenta hermanos» es natural en español y mantiene el golpe narrativo del crimen.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: God actively repaid Abimelech for his evil.
  chosen_spanish_reading: Dios devolvió a Abimelec el mal que había hecho.
  alternative_spanish_readings:
  - Dios permitió que el mal de Abimelec volviera sobre él
  - Dios retribuyó a Abimelec por su maldad
  rationale: El hebreo presenta a Dios como sujeto explícito del verbo causativo; la traducción debe conservar esa agencia judicial directa. «Devolvió» mantiene la idea de retorno del mal sin suavizarla a mera permisión.
  doctrine_reference: Transparencia verbal y agencia divina en juicio, según la filosofía de traducción del proyecto
- issue: Relación entre el mal cometido y el castigo
  english_pob_reading: the evil that he had done to his father by killing his seventy brothers
  chosen_spanish_reading: el mal que había hecho a su padre, al matar a sus setenta hermanos
  alternative_spanish_readings:
  - la maldad que había hecho contra su padre, al matar a sus setenta hermanos
  - el mal que hizo a su padre matando a sus setenta hermanos
  rationale: La frase hebrea vincula el mal con el acto concreto del asesinato. La versión española conserva ese enlace causal y explicativo sin introducir conceptos externos.
  doctrine_reference: Coherencia semántica del juicio retributivo en Jueces
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal y que no existan notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים por tratarse del sujeto singular de juicio.
  - Se prefirió «Abimelec» como forma española estable del nombre propio.
  - Se evitó «SEÑOR» porque el texto hebreo dice אֱלֹהִים, no el tetragrámaton.
  - Se conservó el valor retributivo del verbo hebreo sin convertirlo en una paráfrasis moralizante.
