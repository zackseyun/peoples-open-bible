translation:
  language: es
  text: Yahvé hará que la plaga[a] se adhiera a ti hasta consumirte[b] y quitarte de la tierra que vas a entrar para poseer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pestilencia»; el hebreo puede referirse a una enfermedad epidémica mortal enviada como juicio.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que te haya consumido»; la cláusula puede entenderse con Yahvé como sujeto implícito, con la plaga como medio de su juicio. También puede entenderse «hasta que ella te haya consumido», refiriéndose a la plaga.
    reason: alternative_reading
lexical_decisions:
- source_word: יַדְבֵּק
  english_pob_choice: will make ... cling
  chosen_spanish: hará que ... se pegue
  alternatives_spanish:
  - hará que ... se adhiera
  - hará que ... se aferre
  lexicon: HALOT
  rationale: 'El hiphil de דבק tiene fuerza causativa: ‘hacer que se pegue / adhiera’. En español, ‘se pegue’ conserva la imagen vívida de una aflicción que no se desprende, sin sonar forzado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal con la forma de la serie POB en español, ‘Yahvé’, en lugar de sustituirlo por un título.
- source_word: הַדָּבֶר
  english_pob_choice: the pestilence / the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la peste
  - la pestilencia
  - la enfermedad
  lexicon: HALOT
  rationale: דבר en contexto de maldición del pacto designa una aflicción epidémica enviada como juicio. ‘Plaga’ comunica bien esa severidad en español moderno; ‘peste/pestilencia’ son alternativas posibles pero menos naturales aquí.
- source_word: עַד כַּלֹּתוֹ אֹתְךָ
  english_pob_choice: until he has consumed you
  chosen_spanish: hasta consumirte
  alternatives_spanish:
  - hasta que te consuma
  - hasta terminar contigo
  - hasta destruirte
  lexicon: HALOT
  rationale: כלה expresa terminar/consumir hasta el fin. El infinitivo con sufijo se vierte de forma natural en español con ‘hasta consumirte’, conservando la idea de agotamiento total sin sobreexplicar el sujeto implícito.
- source_word: מֵעַל הָאֲדָמָה
  english_pob_choice: from off the land
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de la tierra
  - de encima de la tierra
  - de la tierra
  lexicon: HALOT
  rationale: מֵעַל marca ‘de encima de / de sobre’. ‘De sobre la tierra’ refleja mejor esa relación espacial que un simple ‘de la tierra’, y mantiene el matiz formal del hebreo.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: that you are entering
  chosen_spanish: que vas a entrar
  alternatives_spanish:
  - que estás entrando
  - a la que vas a entrar
  - que entrarás
  lexicon: HALOT
  rationale: בוא con שמה es un giro idiomático de entrar. ‘Que vas a entrar’ reproduce el sentido de inminencia y movimiento hacia la posesión sin sonar acartonado.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: a poseer
  alternatives_spanish:
  - para poseerla
  - a tomar posesión de ella
  - a heredarla
  lexicon: HALOT
  rationale: ירש en Deuteronomio tiene el sentido de entrar en posesión hereditaria de la tierra. ‘A poseer’ es breve y fiel; ‘tomar posesión’ sería más explícito, y ‘heredar’ añade un matiz menos directo.
theological_decisions:
- issue: Naturaleza de הַדָּבֶר en una maldición del pacto
  english_pob_reading: the pestilence / the plague
  chosen_spanish_reading: la plaga
  alternative_spanish_readings:
  - la peste
  - la pestilencia
  - la enfermedad
  rationale: Se conserva la tensión del hebreo entre una aflicción epidémica concreta y su función como juicio del pacto. ‘Plaga’ es suficientemente amplio para no estrechar el alcance y a la vez mantiene la severidad del castigo.
  doctrine_reference: Juicios del pacto en Deuteronomio; mantener el peso teológico del texto sin suavizarlo.
- issue: Sujeto implícito de כַּלֹּתוֹ
  english_pob_reading: until he has consumed you
  chosen_spanish_reading: hasta consumirte
  alternative_spanish_readings:
  - hasta que te consuma la plaga
  - hasta que él te consuma
  rationale: La construcción hebrea permite entender el sujeto implícito como Yahvé, con la plaga como medio de su juicio. El español evita imponer de forma explícita un sujeto añadido y conserva la ambigüedad funcional del original.
  doctrine_reference: Preservar la tensión gramatical y teológica del texto; no resolver en exceso la relación entre agente divino y medio de juicio.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente favorece ‘pestilence’, ‘consumed’, y ‘from off the land’. Esta propuesta española mantiene la equivalencia semántica de esa revisión, pero adapta el registro a un español bíblico claro: ‘plaga’, ‘hasta consumirte’, y ‘de sobre la tierra’ captan el matiz sin sonar artificiales.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al criterio POB para el nombre divino.
  - Se traduce דבק de manera causativa con ‘hacer que ... se pegue’.
  - Se conserva la terminología de juicio epidémico con ‘plaga’, sin domesticarla a ‘enfermedad’.
  - ‘Poseer’ mantiene el valor de ירש en contexto de tierra prometida.
  - La preposición compuesta ‘de sobre’ intenta reflejar מֵעַל con naturalidad española.
