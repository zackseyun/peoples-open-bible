base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/030.yaml
  text: 'And you[a], you shall prophesy all these words against them, and you shall say to them: Yahweh will roar from on high, and from his holy dwelling he will give his voice; he will surely roar against his pasture. He will shout like those who tread grapes[c][b], against all the inhabitants of the earth.'
  footnotes:
  - marker: a
    text: Or 'over his habitation.' The Hebrew נָוֶה can mean 'pasture,' 'abode,' or 'habitation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will cry out.' The verb is literally 'answer,' likely describing a responsive shout like that of grape-treaders.
    reason: lexical_alternative
  - marker: c
    text: Or 'to all the inhabitants of the earth.' The preposition can be read more neutrally as 'to,' though the context of judgment supports 'against.'
    reason: alternative_reading
