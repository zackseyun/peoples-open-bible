revisions:
- from: 'Y dijeron[a]: «Vengan, edifiquemos para nosotros una ciudad y una torre, con su cima en los cielos, y hagámonos un nombre[b], para que no seamos dispersados sobre la faz de toda la tierra».'
  to: 'Y dijeron: «Vamos, edifiquemos para nosotros una ciudad y una torre, con su cima en los cielos[a], y hagámonos un nombre, para que no seamos dispersados[b] sobre la faz de toda la tierra».'
  rationale: Se corrigió el anclaje de la nota [a] para que recaiga sobre la frase que realmente comenta, se reparó la nota [b] para que preserve una alternativa léxica genuina, y se ajustó «Vengan» a «Vamos» por mayor naturalidad en una exhortación inclusiva sin alterar el sentido fuente.
