    reason: lexical_alternative
  revision_rationale: Se ajustó «se le llamó» a «fue llamado» por naturalidad y dignidad estilística; «mira» a «he aquí» para reflejar mejor הִנֵּה en registro bíblico; y «me quitó mi primogenitura» a «tomó mi primogenitura» para apegarse más al verbo simple לָקָח y al paralelismo del versículo. Se mantuvo la nota sobre el juego de palabras con Jacob/suplantar. También se añadió el marcador [a] a «dijo» para corresponder exactamente con la única nota disponible en el expediente, ya que la POB inglesa la ancla allí.
