translation:
  language: es
  text: no sea que comas y te sacies[a], y construyas buenas casas y habites en ellas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y estés satisfecho». El verbo hebreo puede enfatizar quedar físicamente lleno o quedar plenamente satisfecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de modo que no
  - no vaya a ser que
  lexicon: HALOT
  rationale: Expresa bien la fuerza advertidora y de prevención del hebreo פֶּן en un español natural y bíblicamente claro.
- source_word: תֹּאכַ֖ל
  english_pob_choice: when you have eaten
  chosen_spanish: comas
  alternatives_spanish:
  - hayas comido
  - comas y
  lexicon: HALOT
  rationale: En esta cláusula de advertencia, el imperfecto hebreo funciona como situación futura hipotética; en español, el subjuntivo tras 'no sea que' preserva ese valor sin forzar una perífrasis.
- source_word: וְשָׂבָ֑עְתָּ
  english_pob_choice: and are satisfied
  chosen_spanish: te sacies
  alternatives_spanish:
  - quedes satisfecho
  - estés satisfecho
  - te llenes
  lexicon: HALOT
  rationale: שׂבע puede expresar quedar saciado o satisfecho; 'te sacies' mantiene la imagen de plenitud física y el matiz contextual de estar plenamente provisto.
- source_word: וּבָתִּ֥ים טוֹבִ֛ים
  english_pob_choice: good houses
  chosen_spanish: casas buenas
  alternatives_spanish:
  - buenas casas
  - casas agradables
  - casas hermosas
  lexicon: HALOT
  rationale: Se conserva el adjetivo literal 'buenas' para no exagerar ni interpretar el nivel de prosperidad; 'casas' es el equivalente natural de בָּתִּים.
- source_word: תִּבְנֶ֖ה
  english_pob_choice: have built
  chosen_spanish: construyas
  alternatives_spanish:
  - edifiques
  - hagas
  - hayas construido
  lexicon: HALOT
  rationale: El verbo hebreo expresa acción futura dentro de la secuencia de advertencia; 'construyas' mantiene el aspecto prospectivo sin añadir una perfectividad no requerida por el hebreo.
- source_word: וְיָשָֽׁבְתָּ
  english_pob_choice: and lived in them
  chosen_spanish: y habites en ellas
  alternatives_spanish:
  - y vivas en ellas
  - y residas en ellas
  - y te establezcas en ellas
  lexicon: HALOT
  rationale: ישׁב se refiere a morar o habitar; 'habites' conserva el valor bíblico de residencia estable. El antecedente implícito es 'casas', por eso el femenino plural 'ellas' es necesario en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Deuteronomio 8:12 y el audit trail inglés: se mantiene la secuencia de advertencia introducida por פֶּן, pero en español se opta por subjuntivo natural tras ''no sea que'' en lugar de calcar la estructura inglesa con ''cuando''. No hay cambios textuales en el pasaje base reportado por el control de revisión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la literalidad sobria de 'casas buenas' sin intensificar a 'hermosas' o 'lujosas'.
  - '''Te sacies'' mantiene la posible ambigüedad entre plenitud física y satisfacción plena, reflejada en la nota.'
  - El pronombre final 'ellas' se añade por claridad española y concuerda con 'casas'.
