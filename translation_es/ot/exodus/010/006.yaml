review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del hebreo y la progresión ''tus casas ... las casas de todos tus siervos ... las casas de todo Egipto''. Sin embargo, hay varios desajustes entre texto y notas: las notas a/b/c/d están ancladas en palabras equivocadas respecto de los motivos documentados en el POB inglés. Además, ''Y se llenarán'' debilita el sujeto contextual implícito (''las langostas'') frente al activo hebreo con fuerza futura; ''y llenarán'' preserva mejor el sentido. La nota inglesa sobre ''the land'' fue trasladada pero anclada indebidamente en el texto, y la nota sobre la cláusula relativa debe ir donde corresponde.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la distribución de notas confunde la lectura y la justificación léxica. 'Entonces él se volvió' suena un poco cargado; 'Entonces se volvió' es más natural. 'De la presencia de Faraón' es aceptable y bíblico; no requiere cambio. La frase 'estuvieron sobre la tierra' es comprensible, aunque algo rígida; aun así puede mantenerse por cercanía al original.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. ''Siervos'' es aceptable aquí por la razón contextual documentada. El principal problema no es glosario sino fidelidad formal y disciplina de notas: los marcadores deben corresponder exactamente a las notas pertinentes y en orden.'
  issues:
  - severity: medium
    issue: La voz verbal 'Y se llenarán' cambia el activo contextual del hebreo a una formulación media/pasiva.
    rationale: 'וּמָלְאוּ, en contexto, continúa el anuncio de las langostas como sujeto implícito: ''y llenarán''. La forma reflexiva/pasiva en español hace que las casas parezcan sujeto del llenarse, lo cual atenúa la imagen agente del original.'
  - severity: high
    issue: Los marcadores de notas no corresponden a los contenidos documentados.
    rationale: La nota sobre la cláusula 'algo que...' está anclada en 'casas'; la nota sobre 'la tierra' está anclada en 'siervos'; la nota sobre 'siervos' está anclada en 'Egipto'; y la nota sobre el valor temporal está aparte. Esto viola la disciplina de anclar cada nota en la frase relevante.
  - severity: medium
    issue: Se añadieron notas no alineadas con el aparato inglés sin necesidad y con riesgo de confusión.
    rationale: 'El POB inglés conserva dos notas: una para la cláusula relativa y otra para ''the land''. En español puede añadirse una aclaración si crea nueva ambigüedad, pero aquí basta con reanclar correctamente esas dos, sin multiplicar notas redundantes.'
  - severity: low
    issue: '''Entonces él se volvió'' suena menos natural en español.'
    rationale: El sujeto ya está claro por el contexto narrativo; omitir 'él' mejora la fluidez sin perder sentido.
  revised_spanish_text: Y llenarán tus casas, las casas de todos tus siervos, y las casas de todo Egipto—algo[a] que tus padres y los padres de tus padres no han visto desde el día en que estuvieron sobre la tierra[b] hasta este día.” Entonces se volvió y salió de la presencia de Faraón.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, “que tus padres y los padres de tus padres no han visto”. La cláusula se refiere a la plaga sin precedentes que acaba de describirse.
    reason: lexical_alternative
  - marker: b
    text: “La tierra” también puede verterse “el suelo” o “la tierra habitable”, según el matiz que se quiera resaltar.
    reason: lexical_alternative
  revision_rationale: Se corrigió la voz verbal a 'Y llenarán' para reflejar mejor el activo contextual del hebreo; se reubicaron y redujeron las notas para que coincidan con los puntos léxicos realmente documentados; y se suavizó 'Entonces él se volvió' a 'Entonces se volvió' para mejorar la naturalidad del español sin alterar el sentido.
