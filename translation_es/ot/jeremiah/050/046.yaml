translation:
  language: es
  text: Al sonido de la captura de Babilonia[a], la tierra tiembla, y se oye un clamor entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al sonido de que Babilonia es capturada». El hebreo puede expresarse en español con una construcción más nominal («la captura de Babilonia») o con una más verbal/finita («Babilonia es capturada»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - A causa del sonido de
  - Cuando se oye
  lexicon: HALOT
  rationale: מִן con קוֹל introduce la ocasión o causa del acontecimiento. «Al sonido de» conserva ese valor causal-temporal en español de manera natural y no añade interpretación ajena al texto.
- source_word: נִתְפְּשָׂה
  english_pob_choice: being captured
  chosen_spanish: la captura
  alternatives_spanish:
  - el ser capturada
  - haber sido capturada
  - cuando es capturada
  lexicon: HALOT
  rationale: 'El niphal de תפשׂ expresa pasivo: Babilonia es tomada/capturada. En español, el sustantivo «captura» permite reflejar el hebreo de forma fluida después de «Al sonido de», sin perder el hecho verbal.'
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: Uso bíblico estándar
  rationale: «Babilonia» es la forma española habitual y transparente del topónimo, adecuada para lectura pública.
- source_word: נִרְעֲשָׁה
  english_pob_choice: trembles
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se sacude
  lexicon: HALOT
  rationale: El niphal de רעשׁ denota sacudirse/temblar. «Tiembla» es la equivalencia española más natural y cercana al efecto cósmico del verso.
- source_word: הָ/אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/ el país
  - la tierra habitada
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede ser «tierra» o «país», aquí el paralelo con «entre las naciones» favorece una amplitud internacional. En español, «la tierra» conserva esa escala amplia sin sonar forzado.
- source_word: וּ/זְעָקָה
  english_pob_choice: and a cry
  chosen_spanish: y un clamor
  alternatives_spanish:
  - y un grito
  - y una voz de angustia
  lexicon: HALOT
  rationale: זְעָקָה es un clamor de angustia o grito de auxilio. «Clamor» mantiene la intensidad y la solemnidad profética mejor que un simple «grito».
- source_word: בַּ/גּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: גּוֹיִם suele referirse a las naciones/pueblos gentiles. «Entre las naciones» reproduce bien la difusión internacional del eco de la caída de Babilonia.
- source_word: נִשְׁמָע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es oído
  - se escucha
  lexicon: HALOT
  rationale: 'El niphal de שׁמע indica pasivo: «es oído». En español, «se oye» suena más natural y mantiene el foco en la difusión del clamor sin introducir un sujeto agente.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: mantiene la estructura causal-temporal de מִקּוֹל, el pasivo de נִתְפְּשָׂה, la amplitud de הָאָרֶץ y el reportaje impersonal de נִשְׁמָע. Se evitó calcar mecánicamente el inglés y se optó por un español publicable y bíblicamente sobrio.'
  spanish_consistency_notes:
  - Se usa «Babilonia» como topónimo estándar español.
  - Se evitó «SEÑOR» o terminología no presente en el versículo.
  - «Clamor» y «se oye» mantienen un registro bíblico claro sin arcaísmo innecesario.
  - La nota alternativa preserva la tensión entre una lectura nominal y otra verbal de נִתְפְּשָׂה.
