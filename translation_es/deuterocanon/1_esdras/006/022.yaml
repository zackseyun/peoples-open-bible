translation:
  language: es
  text: 'Entonces el rey Darío ordenó que se hiciera una búsqueda en los archivos guardados en Babilonia, y en Ecbatana, la fortaleza en la tierra de Media, se halló un rollo en el cual estaban registradas estas cosas:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: El aoristo de προστάσσω expresa una orden con autoridad real. «Ordenó» es natural en español moderno y conserva el tono de mandato sin sonar arcaico.
- source_word: ἐπισκέψασθαι
  english_pob_choice: a search to be made
  chosen_spanish: que se hiciera una búsqueda
  alternatives_spanish:
  - que se examinara
  - que se investigara
  - que se buscara
  lexicon: BDAG
  rationale: La construcción con infinitivo expresa una acción oficial de averiguación. «Que se hiciera una búsqueda» transmite bien el matiz administrativo y evita una formulación rígida.
- source_word: βιβλιοφυλακίοις
  english_pob_choice: archives
  chosen_spanish: archivos
  alternatives_spanish:
  - registros
  - oficinas de archivos
  - bibliotecas
  lexicon: LSJ
  rationale: El contexto es la consulta de documentos oficiales, no de una biblioteca general. «Archivos» es el equivalente natural en español y conserva la función documental.
- source_word: τοῖς κειμένοις
  english_pob_choice: kept
  chosen_spanish: guardados
  alternatives_spanish:
  - depositados
  - conservados
  - almacenados
  lexicon: BDAG
  rationale: El participio comunica que los archivos estaban allí resguardados o almacenados. «Guardados» es claro y acorde con el uso archivístico en español.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en la ciudad de Babilonia
  lexicon: BDAG
  rationale: Es una referencia locativa directa; «en Babilonia» reproduce el sentido sin añadir precisión innecesaria.
- source_word: Ἐκβατάνοις
  english_pob_choice: Ecbatana
  chosen_spanish: Ecbatana
  alternatives_spanish:
  - Ecbátana
  lexicon: BDAG
  rationale: Se conserva la transliteración estándar del nombre propio. «Ecbatana» es la forma más reconocible y publicada en español bíblico.
- source_word: τῇ βάρει
  english_pob_choice: the fortress
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la ciudadela
  - la acrópolis
  lexicon: LSJ
  rationale: El término griego designa un centro fortificado o administrativo. «Fortaleza» comunica bien la idea en español contemporáneo; «ciudadela» es una alternativa válida, pero menos directa.
- source_word: ἐν Μηδείᾳ χώρᾳ
  english_pob_choice: in the land of Media
  chosen_spanish: de la tierra de Media
  alternatives_spanish:
  - en la tierra de Media
  - en la región de Media
  lexicon: BDAG
  rationale: χώρα puede expresar tierra, región o país. «De la tierra de Media» suena natural en español después de «la fortaleza» y mantiene el valor geográfico del original.
- source_word: τόπος
  english_pob_choice: a scroll was found
  chosen_spanish: se halló un rollo
  alternatives_spanish:
  - se halló un lugar
  - se halló un documento
  lexicon: BDAG
  rationale: La revisión inglesa ya decidió que el contexto apunta a un documento escrito, no a un lugar físico. «Rollo» sigue esa lectura documental y es el término bíblico más transparente en español.
- source_word: ὑπομνημάτιστο
  english_pob_choice: had been recorded
  chosen_spanish: habían sido registradas
  alternatives_spanish:
  - habían sido escritas como registro
  - estaban registradas
  lexicon: LSJ
  rationale: El verbo indica un registro escrito o memorial. «Habían sido registradas» conserva el carácter oficial del documento y evita una paráfrasis excesiva.
- source_word: τάδε
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - lo siguiente
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo introduce el contenido del documento descubierto. «Estas cosas» sigue de cerca el griego y mantiene abierta la transición al versículo siguiente.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente al entender τόπος en contexto como un documento/rollo y no como un lugar físico. También conserva la apertura administrativa del pasaje: búsqueda oficial, archivos reales y hallazgo de un registro escrito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantiene el lenguaje documental («archivos», «rollo», «registradas») para reflejar el carácter administrativo del texto.
  - Se conservan los nombres propios «Darío» y «Ecbatana» sin adaptación adicional, por ser formas estándar en español bíblico.
