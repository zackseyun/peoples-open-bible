translation:
  language: es
  text: Y ahora, haz conmigo conforme a lo que te agrada[a]. Ordena que mi espíritu[b] sea tomado, para que yo sea liberado y llegue a ser tierra[c]. Porque me conviene más morir que vivir, ya que he oído falsos reproches, y hay gran tristeza dentro de mí. Ordena que yo sea liberado ahora de esta angustia al lugar eterno[d], y no apartes tu rostro de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como te parezca bien». El griego literalmente dice «según lo agradable para ti», una forma reverente de pedir que Dios actúe conforme a su beneplácito.
    reason: lexical_alternative
  - marker: b
    text: O «sea recibido». El griego usa un verbo de ‘tomar arriba’; se conserva «espíritu» para πνεῦμα y no se reduce a «vida».
    reason: lexical_alternative
  - marker: c
    text: O «llegue a ser polvo». El griego literalmente dice «llegue a ser tierra», una expresión de muerte que puede entenderse como retorno a la materia mortal.
    reason: lexical_alternative
  - marker: d
    text: 'La expresión griega es amplia: «lugar eterno». No precisa aquí un término doctrinal más desarrollado para el destino de los muertos.'
    reason: cultural_note
lexical_decisions:
- source_word: κατὰ τὸ ἀρεστόν σου
  english_pob_choice: according to what is pleasing to you
  chosen_spanish: conforme a lo que te agrada
  alternatives_spanish:
  - según lo que te agrada
  - como te parezca bien
  lexicon: BDAG
  rationale: La frase expresa conformidad con la voluntad o beneplácito de Dios. «Conforme a lo que te agrada» conserva el sentido dirigido a Dios y suena natural en español sin rebajar la solemnidad del ruego.
- source_word: ἐπίταξον
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Manda
  - Comanda
  lexicon: BDAG
  rationale: El imperativo pide una acción autoritativa de Dios. «Ordena» mantiene la fuerza directa y la dignidad del ruego, con buen registro en español bíblico contemporáneo.
- source_word: ἀναλαβεῖν τὸ πνεῦμά μου
  english_pob_choice: that my spirit be taken up
  chosen_spanish: que mi espíritu sea recogido
  alternatives_spanish:
  - que mi espíritu sea tomado
  - que recibas mi espíritu
  lexicon: BDAG
  rationale: Se preserva «espíritu» para πνεῦμα, sin reducirlo a «vida». «Sea recogido» intenta reflejar la idea de ser tomado arriba/recibido sin imponer una fórmula doctrinal posterior.
- source_word: ἀπολυθῶ
  english_pob_choice: I may be released
  chosen_spanish: yo sea librado
  alternatives_spanish:
  - yo sea liberado
  - yo sea soltado
  lexicon: BDAG
  rationale: El verbo expresa ser soltado o liberado y funciona como circunloquio reverente de la muerte. «Sea librado» conserva ese matiz en un español sobrio y bíblico.
- source_word: γένωμαι γῆ
  english_pob_choice: become dust
  chosen_spanish: llegue a ser tierra
  alternatives_spanish:
  - me vuelva tierra
  - me vuelva polvo
  lexicon: LSJ
  rationale: El griego dice literalmente «llegue a ser tierra». Se mantiene esa imagen para no perder el eco literal y la tensión funeraria del texto; se evita imponer «polvo» porque la tradición griega aquí habla de γῆ, no de χοῦς.
- source_word: λυσιτελεῖ μοι
  english_pob_choice: it is better for me
  chosen_spanish: me conviene más
  alternatives_spanish:
  - es mejor para mí
  - me resulta más provechoso
  lexicon: LSJ
  rationale: La expresión significa ser ventajoso o beneficioso. «Me conviene más» comunica el sentido comparativo sin sonar meramente utilitario en castellano actual.
- source_word: ὀνειδισμοὺς ψευδεῖς
  english_pob_choice: false reproaches
  chosen_spanish: falsos reproches
  alternatives_spanish:
  - reproches mentirosos
  - insultos falsos
  lexicon: BDAG
  rationale: Se conserva la combinación de reproche e inexactitud/falseamiento. «Falsos reproches» sigue de cerca el griego y mantiene el peso acusatorio sin añadir tono interpretativo.
- source_word: λύπη ἐστὶν πολλὴ ἐν ἐμοί
  english_pob_choice: there is great grief within me
  chosen_spanish: hay gran tristeza dentro de mí
  alternatives_spanish:
  - hay mucho dolor dentro de mí
  - estoy muy afligido
  lexicon: BDAG
  rationale: La cláusula describe un estado interno. «Tristeza» es una equivalencia amplia y clara en español; «dentro de mí» preserva el énfasis interior del griego.
- source_word: τῆς ἀνάγκης
  english_pob_choice: this distress
  chosen_spanish: de esta angustia
  alternatives_spanish:
  - de esta aflicción
  - de esta necesidad
  lexicon: BDAG
  rationale: ἀνάγκη puede ser necesidad, presión o angustia. En este lamento, «angustia» refleja mejor la experiencia de opresión y sufrimiento que el mero dato abstracto de necesidad.
- source_word: εἰς τὸν αἰώνιον τόπον
  english_pob_choice: into the everlasting place
  chosen_spanish: hacia el lugar eterno
  alternatives_spanish:
  - al lugar eterno
  - al lugar perpetuo
  lexicon: LSJ
  rationale: Se conserva la expresión amplia sin precisar un concepto doctrinal más definido que el texto no nombra. «Lugar eterno» reproduce el valor de αἰώνιος con naturalidad; «hacia» refleja el movimiento implícito del ruego de ser enviado allí.
- source_word: μὴ ἀποστρέψῃς τὸ πρόσωπόν σου ἀπʼ ἐμοῦ
  english_pob_choice: do not turn your face away from me
  chosen_spanish: no apartes tu rostro de mí
  alternatives_spanish:
  - no vuelvas tu rostro de mí
  - no escondas tu rostro de mí
  lexicon: BDAG
  rationale: La imagen bíblica del rostro expresa atención y favor. «No apartes tu rostro de mí» preserva la metáfora directa y su fuerza relacional en español.
theological_decisions:
- issue: Wording about the inner being requested in death
  english_pob_reading: my spirit be taken up
  chosen_spanish_reading: mi espíritu sea recogido
  alternative_spanish_readings:
  - mi vida sea tomada
  - recibe mi espíritu
  rationale: El griego usa πνεῦμα, por lo que se mantiene «espíritu» en vez de reducirlo a «vida». «Sea recogido» conserva la ambigüedad reverente del verbo sin convertirlo en una fórmula posterior que el texto no exige.
  doctrine_reference: Preservar la tensión antropológica sin resolverla
- issue: Destination after death
  english_pob_reading: the everlasting place
  chosen_spanish_reading: el lugar eterno
  alternative_spanish_readings:
  - la morada eterna
  - el sepulcro
  - el lugar de los muertos
  rationale: El griego habla de un «lugar eterno» sin nombrar conceptos más específicos como cielo, Hades o sepulcro. La traducción mantiene esa amplitud para no importar una doctrina desarrollada ajena a la expresión del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el audit trail inglés de POB, manteniendo las decisiones clave: πνεῦμα como «espíritu», ἀπολυθῶ como liberación reverente de la muerte y εἰς τὸν αἰώνιον τόπον como una expresión amplia, sin especificar más allá del griego. No se detectaron revisiones aplicadas en la versión inglesa más reciente, así que el borrador español refleja ese estado estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en la dirección del habla a Dios, sin necesidad de repetir el nombre en este versículo.
  - «Espíritu» se conserva como término antropológico, distinto de «vida» o «alma», conforme al texto griego y al audit trail.
  - «Lugar eterno» evita equivalencias doctrinales más estrechas y mantiene la amplitud del original.
  - El registro es sobrio y bíblico, con vocabulario accesible para lectura eclesial amplia.
