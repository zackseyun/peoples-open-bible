translation:
  language: es
  text: Y aconteció[a], al comienzo de su asentamiento allí, que no temían a Yahvé; por eso Yahvé envió leones entre ellos, y estaban matando a algunos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no reverenciaban a Yahvé». El hebreo «temer» incluye reverencia y consideración de pacto, no solo terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּתְחִלַּת
  english_pob_choice: at the beginning of
  chosen_spanish: al comienzo de
  alternatives_spanish:
  - cuando apenas comenzaron
  - al principio de
  lexicon: HALOT
  rationale: La expresión marca el inicio de la etapa de asentamiento. «Al comienzo de» conserva el valor temporal inicial con un español natural y fiel al matiz formal del hebreo.
- source_word: שִׁבְתָּם
  english_pob_choice: their dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su vivir allí
  - su asentamiento
  lexicon: HALOT
  rationale: El sustantivo de ישׁב refiere a residir o habitar. «Morada» comunica el hecho de estar establecidos allí sin volver demasiado abstracto el término.
- source_word: יָרְאוּ אֶת־יְהוָה
  english_pob_choice: did not fear Yahweh
  chosen_spanish: no temían a Yahvé
  alternatives_spanish:
  - no reverenciaban a Yahvé
  - no respetaban a Yahvé
  lexicon: HALOT
  rationale: «Temer a Yahvé» en español bíblico puede expresar tanto temor como reverencia y lealtad del pacto. Se mantiene el verbo «temer» para no perder esa carga semántica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la directriz del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: וַיְשַׁלַּח ... בָּהֶם
  english_pob_choice: sent lions among them
  chosen_spanish: envió leones entre ellos
  alternatives_spanish:
  - envió leones contra ellos
  - desató leones sobre ellos
  lexicon: HALOT
  rationale: La preposición ב en este contexto indica movimiento hacia el interior del grupo; «entre ellos» refleja mejor la imagen de leones en su medio que una versión meramente hostil como «contra ellos».
- source_word: הָאֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  lexicon: HALOT
  rationale: Equivalente directo y transparente del sustantivo plural.
- source_word: וַיִּהְיוּ הֹרְגִים בָּהֶם
  english_pob_choice: and they were killing some of them
  chosen_spanish: y éstos estaban matando a algunos de ellos
  alternatives_spanish:
  - y mataban a algunos de ellos
  - y seguían matando a algunos de ellos
  lexicon: HALOT
  rationale: La construcción con היה + participio expresa acción en curso o repetida. «Estaban matando» conserva ese aspecto. «Algunos de ellos» refleja el sentido partitivo que el contexto sugiere sin afirmar más de lo que el hebreo dice.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton, y la norma del proyecto en español es transliterarlo como «Yahvé». Esto preserva el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de «temer a Yahvé»
  english_pob_reading: did not fear Yahweh; note that fear includes reverence and covenantal regard, not merely terror
  chosen_spanish_reading: no temían a Yahvé
  alternative_spanish_readings:
  - no reverenciaban a Yahvé
  - no respetaban a Yahvé
  rationale: Se conserva «temer» porque el hebreo ירא con Dios incluye reverencia, lealtad y reconocimiento del pacto, no solo terror. En español, la expresión bíblica «temer a Yahvé» mantiene esa tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md: Semantic ranges — ירא (fear/revere)'
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente sin cambios sustanciales; la solución coincide con el juicio de alta concordancia y conserva las tensiones léxicas documentadas, especialmente en ירא y en la acción continua de los leones.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene un registro bíblico moderno y sobrio, evitando calcos innecesarios.
  - «Estaban matando» preserva el aspecto durativo del participio hebreo con היה.
  - La nota al pie está anclada correctamente en «temían» y ofrece la alternativa documental «reverenciaban».
