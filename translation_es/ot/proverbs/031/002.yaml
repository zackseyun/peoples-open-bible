translation:
  language: es
  text: ¿Qué[a], hijo mío? ¿Y qué, hijo de mi vientre? ¿Y qué, hijo de mis votos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «¿Qué diré, hijo mío? ¿Qué diré, hijo de mi vientre? ¿Qué diré, hijo de mis votos?». El hebreo conserva el repetido «¿Qué?» para efecto retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué[a]
  alternatives_spanish:
  - ¿Qué cosa?
  - ¿Qué es?
  - ¿Qué diré?
  lexicon: HALOT
  rationale: El interrogativo repetido expresa un clamor retórico y no una búsqueda de información. «¿Qué?» conserva la brevedad, la fuerza emocional y la repetición del hebreo sin añadir palabras explicativas ajenas al texto.
- source_word: בְּרִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío, querido
  lexicon: HALOT
  rationale: La forma procede de בַּר, «hijo», con sufijo de primera persona. «Hijo mío» mantiene el valor filial y el tono directo del vocativo en español, con una naturalidad digna.
- source_word: בַּר
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - descendiente de
  lexicon: HALOT
  rationale: La repetición de בַּר exige conservar el sustantivo «hijo» para reflejar la tríada poética del hebreo. «Hijo de» es la forma más clara y fiel en español.
- source_word: בִּטְנִי
  english_pob_choice: my womb
  chosen_spanish: mi vientre
  alternatives_spanish:
  - mi seno
  - mi matriz
  lexicon: HALOT
  rationale: En español, «vientre» comunica de manera natural el sentido corporal/materno de בֶּטֶן y evita un tecnicismo innecesario. Aunque «vientre» no marca exactamente «womb» en sentido anatómico técnico, reproduce bien la imagen materna y suena más idiomático que «mi matriz» en este contexto poético.
- source_word: נְדָרָי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas
  - mis votos solemnes
  lexicon: HALOT
  rationale: «Votos» es el equivalente bíblico tradicional y preciso para נֶדֶר. «Mis votos» conserva el plural y la posible alusión a compromisos hechos ante Dios sin sobreexplicar su contenido.
theological_decisions:
- issue: Preservación de la fuerza retórica de la triple pregunta
  english_pob_reading: 'Three abrupt questions: ''What... ? And what... ? And what... ?'''
  chosen_spanish_reading: 'Tres preguntas breves y repetidas: «¿Qué...? ¿Y qué...? ¿Y qué...?».'
  alternative_spanish_readings:
  - «¿Qué diré, hijo mío? ¿Qué diré, hijo de mi vientre? ¿Qué diré, hijo de mis votos?»
  - «¿Qué debo decir...? »
  rationale: El hebreo es elíptico y afectivo. Mantener la repetición de «¿Qué?» preserva el impacto poético y no introduce un verbo ausente en el texto fuente. La versión idiomática con «¿Qué diré?» explica bien el sentido, pero va más allá de la forma del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conservación del lenguaje filial masculino
  english_pob_reading: '''my son'' / ''son of my womb'' / ''son of my vows'''
  chosen_spanish_reading: '''hijo mío'' / ''hijo de mi vientre'' / ''hijo de mis votos'''
  alternative_spanish_readings:
  - '''mi hijo'' / ''hijo de mi seno'' / ''hijo de mis promesas'''
  - '''hija mía'' / ...'
  rationale: El hebreo usa בַּר, un término masculino, tres veces. La traducción mantiene ese valor de manera consistente en español y evita neutralizarlo sin base textual.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas en la fuente inglesa; por eso se mantiene la estructura retórica básica, con una decisión española que privilegia la concisión del hebreo y una nota alternativa para la lectura más idiomática.
  spanish_consistency_notes:
  - Se mantiene «hijo» para בַּר en las tres apariciones, conforme al paralelismo del hebreo.
  - Se usa «votos» para נְדָרָי en vez de «promesas» para conservar el registro bíblico y la precisión léxica.
  - Se evita introducir «decir» en el texto principal para no expandir una elipsis que el hebreo deja abierta.
  - La nota [a] va anclada en el primer «¿Qué?» porque allí se explica la posible lectura idiomática de toda la tríada.
