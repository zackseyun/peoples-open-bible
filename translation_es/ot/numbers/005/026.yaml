translation:
  language: es
  text: Entonces el sacerdote tomará un puñado de la ofrenda de cereal[a], su porción memorial, y la quemará sobre el altar; después hará beber a la mujer el agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el agua amarga'; el contexto más amplio identifica así esta agua, pero este versículo dice simplemente 'el agua'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָמַץ
  english_pob_choice: shall take a handful
  chosen_spanish: tomará una porción con la mano
  alternatives_spanish:
  - tomará un puñado
  - sacará un puñado
  lexicon: HALOT
  rationale: En contexto sacrificial, קמץ designa la acción ritual de tomar una porción del cereal ofrecido. En español, 'tomar una porción con la mano' conserva la idea funcional sin sonar forzado, y evita importar un matiz excesivamente coloquial que 'puñado' podría sugerir.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el sacerdote
  lexicon: HALOT
  rationale: כֹּהֵן es el término cultual normal. 'Sacerdote' es la equivalencia más natural y transparente en español eclesial, y mantiene el registro litúrgico del pasaje.
- source_word: מִן־הַמִּנְחָה
  english_pob_choice: from the grain offering
  chosen_spanish: de la ofrenda de cereal
  alternatives_spanish:
  - de la ofrenda
  - de la ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal se refiere a la ofrenda de cereal/grano. 'Ofrenda de cereal' comunica el tipo de sacrificio con claridad en español y evita la ambigüedad de 'ofrenda' a secas.
- source_word: אֶת אַזְכָּרָתָהּ
  english_pob_choice: its memorial portion
  chosen_spanish: su porción memorial
  alternatives_spanish:
  - su porción recordatoria
  - su porción para memoria
  lexicon: HALOT
  rationale: אַזְכָּרָה es la porción destinada a memorial en el altar. 'Porción memorial' conserva la terminología técnica del acto ritual sin convertirla en una paráfrasis devocional.
- source_word: וְהִקְטִיר
  english_pob_choice: and burn it
  chosen_spanish: y la quemará
  alternatives_spanish:
  - y la hará arder
  - y la ofrecerá en humo
  lexicon: HALOT
  rationale: En uso sacrificial, הקטיר implica quemar/hacer subir en humo una ofrenda. 'La quemará' es la forma más natural y directa en español, sin perder el acto cultual.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - en dirección al altar
  lexicon: HALOT
  rationale: El sufijo direccional de מִזְבֵּחָה se expresa idiomáticamente en español como 'sobre el altar'.
- source_word: וְאַחַר
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - y después
  lexicon: HALOT
  rationale: Marca la secuencia temporal del rito. 'Después' es breve, claro y fiel.
- source_word: יַשְׁקֶה
  english_pob_choice: he shall make ... drink
  chosen_spanish: hará beber
  alternatives_spanish:
  - dará a beber
  - hará que beba
  lexicon: HALOT
  rationale: El hifil de שׁקה es causativo. 'Hará beber' preserva esa fuerza causal con naturalidad en español, mejor que una formulación más explicativa.
- source_word: אֶת הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a la mujer
  lexicon: HALOT
  rationale: Se mantiene el objeto directo del verbo causativo con una construcción española normal.
- source_word: אֶת הַמָּיִם
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  - el agua amargosa
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el agua'. El texto español debe conservar esa generalidad y no importar 'amarga' desde el contexto cercano.
theological_decisions:
- issue: Si identificar el agua como 'amarga' en el texto principal a partir del contexto ritual más amplio
  english_pob_reading: Retain the simple phrase 'the water'
  chosen_spanish_reading: Conservar 'el agua'
  alternative_spanish_readings:
  - el agua amarga
  - las aguas amargas
  rationale: El versículo no contiene el adjetivo 'amarga'; añadirlo resolvería anticipadamente una aclaración que pertenece al contexto inmediato, no a esta línea concreta. Por fidelidad al hebreo y a la trazabilidad textual, se conserva la forma simple.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el flujo más reciente; el pase final indicó alta concordancia y dejó el texto sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'sacerdote' para כֹּהֵן y 'ofrenda de cereal' para מִנְחָה en coherencia con el registro cultual del pasaje.
  - '''Porción memorial'' conserva la terminología técnica sin expandirla a una paráfrasis interpretativa.'
  - Se evita introducir 'amarga' en el cuerpo del versículo para respetar el alcance inmediato del hebreo.
  - La secuencia temporal se expresa con 'Entonces' y 'después' para reflejar el orden ritual del original.
