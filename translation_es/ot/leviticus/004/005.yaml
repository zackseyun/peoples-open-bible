translation:
  language: es
  text: Y el sacerdote ungido tomará[a] de la sangre del toro y la llevará[b] dentro de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «de la sangre del toro». La preposición hebrea probablemente tiene sentido partitivo: el sacerdote toma una porción de la sangre.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a la tienda de reunión». «Dentro de» explicita el sentido contextual del movimiento, ya que las acciones siguientes ocurren en el santuario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: And ... shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - y tomará
  - entonces tomará
  lexicon: HALOT
  rationale: El hebreo waw + qatal en esta instrucción ritual tiene valor secuencial/instructivo. En español, el futuro simple expresa mejor esa fuerza procedimental que un pasado narrativo.
- source_word: הַכֹּהֵן הַמָּשִׁיחַ
  english_pob_choice: the anointed priest
  chosen_spanish: el sacerdote ungido
  alternatives_spanish:
  - el sacerdote consagrado
  - el sacerdote ungido y consagrado
  lexicon: HALOT
  rationale: Se conserva el sentido léxico de מָשִׁיחַ como 'ungido' y el referente sacerdotal sin introducir el título interpretativo 'sumo sacerdote' en el texto principal.
- source_word: מִדַּם
  english_pob_choice: some of ... blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - una porción de la sangre
  - de la sangre
  lexicon: HALOT
  rationale: 'La preposición מִן aquí es partitiva: no se toma toda la sangre, sino una porción. ''Parte de la sangre'' comunica esa relación con naturalidad en español.'
- source_word: הַפָּר
  english_pob_choice: the bull's
  chosen_spanish: del toro
  alternatives_spanish:
  - del novillo
  - del buey
  lexicon: HALOT
  rationale: פַּר designa un toro. En español bíblico neutral, 'toro' es claro y evita un giro posesivo artificial.
- source_word: וְהֵבִיא אֹתוֹ
  english_pob_choice: and bring it
  chosen_spanish: la llevará
  alternatives_spanish:
  - la traerá
  - la introducirá
  lexicon: HALOT
  rationale: El objeto pronominal se refiere a la sangre, femenino en español. Dado el contexto ritual, 'llevará' comunica el traslado hacia el espacio sagrado sin forzar el doblete 'traer'/'llevar'.
- source_word: אֶל אֹהֶל מוֹעֵד
  english_pob_choice: into the tent of meeting
  chosen_spanish: al tabernáculo de reunión
  alternatives_spanish:
  - a la tienda de reunión
  - al tabernáculo de cita
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד se rinde con la forma establecida 'tabernáculo de reunión' para máxima inteligibilidad litúrgica en español. 'Al' conserva el אֶל del hebreo; el contexto ritual permite entender el ingreso al recinto.
theological_decisions:
- issue: Título sacerdotal הַכֹּהֵן הַמָּשִׁיחַ
  english_pob_reading: the anointed priest
  chosen_spanish_reading: el sacerdote ungido
  alternative_spanish_readings:
  - el sacerdote consagrado
  - el sumo sacerdote
  rationale: Se evita 'sumo sacerdote' porque introduce una interpretación funcional no explicitada por la expresión hebrea. 'Ungido' preserva la tensión léxica con מָשִׁיחַ sin cargar el término con un sentido mesiánico cristológico dentro de este versículo.
  doctrine_reference: Translation philosophy §§1, 2, 5
- issue: Direccionalidad de אֶל אֹהֶל מוֹעֵד
  english_pob_reading: into the tent of meeting
  chosen_spanish_reading: al tabernáculo de reunión
  alternative_spanish_readings:
  - a la tienda de reunión
  - dentro del tabernáculo de reunión
  rationale: El hebreo usa אֶל ('a/ hacia'). En el contexto sacrificial, el movimiento implica entrada al área sagrada; en español, 'al tabernáculo de reunión' mantiene esa orientación sin añadir una preposición que el hebreo no exige literalmente.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del aparato inglés y no introduce cambios sustanciales respecto del juicio revisado. Se conservaron las dos precisiones principales del POB: el valor partitivo de מִדַּם y la orientación ritual de אֶל, expresándolas con notas en español.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no lo contiene.
  - '''Ungido'' se usa para מָשִׁיחַ en sentido sacerdotal, no ''Cristo''.'
  - '''Tabernáculo de reunión'' se eligió por claridad y tradición española, aunque el hebreo literal sea ''tienda de reunión''.'
  - 'La sangre se trató como sustantivo femenino en español para concordancia natural: ''la llevará''.'
