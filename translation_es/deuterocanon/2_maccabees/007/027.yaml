  yaml_path: translation/deuterocanon/2_maccabees/007/027.yaml
  text: 'But bending down to him[a], and mocking the savage tyrant, she spoke in her native tongue as follows: “My son, have mercy on me, who carried you in the womb for nine months, nursed you for three years, raised you, brought you to this age[b], and cared for you.”'
