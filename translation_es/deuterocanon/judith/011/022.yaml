translation:
  language: es
  text: 'Holofernes le dijo: «Dios ha hecho bien al enviarte delante del pueblo, para que el poder estuviera en nuestras manos[a]; pero para los que han tratado con desprecio a mi señor, hay destrucción[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que el poder esté en nuestras manos». El griego permite una formulación más cercana al resultado presentado de manera general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero destrucción para los que han despreciado a mi señor». El griego antepone «destrucción» para darle énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὖ ἐποίησεν
  english_pob_choice: has done well
  chosen_spanish: ha obrado bien
  alternatives_spanish:
  - ha hecho bien
  - ha actuado bien
  lexicon: LSJ
  rationale: La expresión griega es una valoración favorable. «Ha obrado bien» conserva el juicio positivo y suena natural en español, sin perder el tono verbal de la frase.
- source_word: ἀποστεῖλας
  english_pob_choice: to send
  chosen_spanish: al enviarte
  alternatives_spanish:
  - al haberte enviado
  - por haberte enviado
  lexicon: LSJ
  rationale: El participio aoristo se expresa con una construcción final/causal natural en español. «Al enviarte» mantiene la relación con la acción de Dios sin volver la frase pesada.
- source_word: ἔμπροσθεν τοῦ λαοῦ
  english_pob_choice: ahead of the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - antes del pueblo
  - en frente del pueblo
  lexicon: LSJ
  rationale: «Delante del pueblo» reproduce bien la idea espacial de ἔμπροσθεν y funciona de manera clara en español bíblico contemporáneo.
- source_word: τοῦ γενήθηναι
  english_pob_choice: so that ... might come
  chosen_spanish: para que ... esté
  alternatives_spanish:
  - para que ... hubiera
  - a fin de que ... estuviera
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. En español, «para que» comunica claramente la finalidad. Se eligió una forma natural del resultado esperado en el contexto militar.
- source_word: ἐν χερσὶν ἡμῶν
  english_pob_choice: in our hands
  chosen_spanish: en nuestras manos
  alternatives_spanish:
  - en nuestras manos poder
  - en nuestro poder
  lexicon: LSJ
  rationale: La imagen idiomática se conserva literalmente porque en español «en nuestras manos» expresa bien control y dominio, como en el griego.
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - el dominio
  - el poderío
  lexicon: LSJ
  rationale: «Poder» es la equivalencia más directa y natural para κράτος en este contexto político-militar, sin añadir matices excesivos.
- source_word: φαυλίσασι
  english_pob_choice: have treated ... with contempt
  chosen_spanish: han tratado con desprecio
  alternatives_spanish:
  - han despreciado
  - han menospreciado
  lexicon: LSJ
  rationale: El verbo griego implica rebajar, tratar como indigno o vil. «Han tratado con desprecio» conserva el matiz activo del menosprecio mejor que un simple «despreciado».
- source_word: τὸν κύριόν μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi soberano
  lexicon: LSJ
  rationale: Aquí κύριος se refiere a un superior humano, no al Dios de Israel. En español, «mi señor» preserva el valor de título respetuoso sin introducir una resonancia divina no presente en el contexto.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: «Destrucción» es el equivalente más claro y directo. Mantiene la amenaza final del texto sin cargarla con matices doctrinales posteriores.
theological_decisions:
- issue: Uso de κύριος para un superior humano
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - mi soberano
  rationale: El contexto muestra que Holofernes habla de un señor humano, no de Yahvé. Por eso se mantiene un título de respeto humano en español. «Mi señor» evita tanto la confusión con el nombre divino como una domesticación excesiva del registro.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve context-sensitive κύριος without importing divine overtones'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste revisado en el audit trail inglés: «power might be in our hands». Se prefirió «el poder esté en nuestras manos» para conservar la cercanía al griego εἰς/ἐν χερσὶν ἡμῶν κράτος y el énfasis del resultado, sin forzar una estructura ajena al español. También se mantuvo la oposición final entre el grupo favorecido por Dios y los que han tratado con desprecio al señor humano de Holofernes.'
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se mantiene «mi señor» para κύριος en contexto humano, sin mayúscula ni carga divina.
  - «Poder» se conserva como término político-militar, no como fuerza abstracta o autoridad espiritual.
  - La estructura con dos miembros separados por punto y coma refleja el contraste del griego y ayuda a preservar el orden enfático de ἀπώλεια.
