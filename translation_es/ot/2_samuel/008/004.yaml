base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/004.yaml
  text: David captured from him 1,700 horsemen and 20,000 foot soldiers[a]. Then David hamstrung all the chariot horses[c][b], but left enough for 100 chariots.
  footnotes:
  - marker: a
    text: The Hebrew text reads '1,700 horsemen.' The parallel in 1 Chronicles 18:4 reads '7,000 horsemen.'
    reason: textual_variant
  - marker: b
    text: Hebrew 'all the chariot force'; the translation makes explicit that the horses were hamstrung, since that is the action described.
    reason: lexical_alternative
  - marker: c
    text: Or 'but left enough of them for 100 chariots'.
    reason: previous_rendering
