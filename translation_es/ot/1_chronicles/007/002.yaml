review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: lista de hijos de Tola, su condición como jefes de casas paternas, referencia genealógica y total numérico en tiempos de David. Sin embargo, hay problemas de precisión en dos puntos: (1) el marcador [c] se usa indebidamente también sobre ''según sus generaciones'', aunque la nota c solo explica גִּבּוֹרֵי חַיִל y no לְתֹלְדוֹתָם; (2) ''hombres poderosos'' debilita el matiz de valor/aptitud de גִּבּוֹרֵי חַיִל, que en este contexto censal-genealógico aún conserva fuerza tradicional de ''hombres valerosos'' o similar. También conviene añadir ''sus'' en ''sus casas paternas'' para reflejar el sufijo posesivo.'
  spanish_quality_summary: 'El español es generalmente claro y legible, pero presenta un problema formal importante de notas al pie: reutiliza [c] para dos funciones distintas, lo cual infringe las reglas del proyecto y crea ambigüedad. Además, la nota [a] es internamente inconsistente porque el texto principal ya usa ''Uzzi'', mientras la nota dice que también podría entenderse como ''Uzzi''. La frase ''jefes de las casas paternas de Tola'' es comprensible, pero ''jefes de sus casas paternas, pertenecientes a Tola'' suena más fiel al reparto sintáctico del hebreo.'
  glossary_alignment: No hay conflictos con términos teológicos mayores del glosario del proyecto. Los nombres propios son aceptables en español. La principal desalineación léxica está en גִּבּוֹרֵי חַיִל, donde el inglés auditado preserva 'mighty men of valor' y el español 'hombres poderosos' reduce el componente de valentía/valor. 'Casas paternas' encaja bien para בֵית אָבוֹת.
  issues:
  - severity: high
    issue: Marcador de nota [c] reutilizado y mal anclado
    rationale: El texto coloca [c] tanto en 'hombres poderosos' como en 'según sus generaciones', pero la nota c solo trata la expresión גִּבּוֹרֵי חַיִל. Además, el proyecto exige marcadores únicos y anclados exactamente a la nota correspondiente.
  - severity: medium
    issue: '''Hombres poderosos'' no preserva adecuadamente גִּבּוֹרֵי חַיִל'
    rationale: La expresión hebrea incluye connotación de valentía/valor y, en listas como esta, suele referirse a hombres valientes o guerreros de valía. 'Poderosos' por sí solo puede sugerir estatus o poder, no necesariamente valor.
  - severity: medium
    issue: Falta el posesivo en 'las casas paternas'
    rationale: לְבֵית אֲבוֹתָם incluye sufijo posesivo 'sus'. En español, 'sus casas paternas' refleja mejor el original que la forma genérica 'las casas paternas'.
  - severity: low
    issue: Nota [a] sobre Uzzi/Uzi está formulada de manera incoherente
    rationale: Si el texto principal ya dice 'Uzzi', la nota no debe presentar 'Uzzi' como alternativa a sí mismo. Basta señalar la variante 'Uzi' si se desea conservar una nota.
  revised_spanish_text: 'Los hijos de Tola: Uzzi[a], Refaías, Jeriel, Jahmai, Ibsam y Samuel, jefes[b] de sus casas paternas, pertenecientes a Tola, hombres valerosos[c] según sus generaciones[d]. Su número en los días de David era veintidós mil seiscientos.'
  revised_footnotes:
