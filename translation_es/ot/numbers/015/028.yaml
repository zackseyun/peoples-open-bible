translation:
  language: es
  text: Y el sacerdote hará expiación[a] por la persona que yerra al pecar inadvertidamente, delante de Yahvé, para hacer expiación por él; y se le perdonará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expiación traduce aquí el verbo sacerdotal כפר; no es simplemente “perdón”, sino el acto ritual que conduce al perdón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - hará atonación
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal expresa la acción cultual de expiar/realizar expiación. 'Hará expiación' mantiene el sentido técnico y resulta natural en español bíblico contemporáneo. 'Propiciación' sería posible, pero en español puede desplazar el foco hacia la ofrenda más que hacia el acto sacerdotal.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: El término designa al oficiante cultual. 'Sacerdote' es la equivalencia directa y clara en español.
- source_word: עַל הַנֶּפֶשׁ
  english_pob_choice: for the person
  chosen_spanish: por la persona
  alternatives_spanish:
  - por el individuo
  - por el alma
  lexicon: HALOT
  rationale: נפש aquí refiere a la persona, no al alma en sentido metafísico. 'Por la persona' conserva el alcance personal sin introducir una antropología ajena al contexto.
- source_word: הַשֹּׁגֶגֶת
  english_pob_choice: who errs
  chosen_spanish: que yerra
  alternatives_spanish:
  - que se desvía
  - que comete una falta por error
  lexicon: HALOT
  rationale: El participio de שׁגג señala a quien yerra o se equivoca en forma inadvertida. 'Que yerra' reproduce la idea de error con un verbo natural en español y evita una paráfrasis excesiva.
- source_word: בְּחֶטְאָה בִשְׁגָגָה
  english_pob_choice: by sinning unintentionally
  chosen_spanish: por haber pecado inadvertidamente
  alternatives_spanish:
  - al pecar inadvertidamente
  - por pecar sin intención
  lexicon: HALOT
  rationale: La expresión repite y especifica que la falta ocurrió sin intención. 'Por haber pecado inadvertidamente' integra el matiz causal/resultativo y conserva la referencia explícita al pecado sin volver la frase torpe o redundante.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: El hebreo expresa ubicación relacional 'delante de'. 'Delante de Yahvé' es fiel, claro y sigue la decisión terminológica del proyecto para el Tetragrámaton.
- source_word: לְכַפֵּר עָלָיו
  english_pob_choice: to make atonement for him
  chosen_spanish: para hacer expiación por él
  alternatives_spanish:
  - para hacer expiación a favor de él
  - para expiar por él
  lexicon: HALOT
  rationale: La infinitiva de propósito se mantiene con 'para'. 'Hacer expiación por él' conserva la repetición de כפר y el sentido sacerdotal sin forzar una construcción menos transparente.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: El pasivo de סלח comunica la concesión del perdón como resultado del rito. 'Le será perdonado' suena natural en español y conserva el matiz pasivo mejor que una formulación activa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y la norma del proyecto pide 'Yahvé' en el texto principal. Se preserva así el nombre pactal sin recurrir al sustituto litúrgico 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre 'pecado inadvertido' y la descripción de la persona que yerra
  english_pob_reading: who errs by sinning unintentionally
  chosen_spanish_reading: que yerra por haber pecado inadvertidamente
  alternative_spanish_readings:
  - que peca inadvertidamente
  - que yerra al pecar sin intención
  rationale: El hebreo combina el participio 'el que yerra' con una frase que recalca la inadvertencia del pecado. La versión española conserva ambas piezas para no borrar la tensión entre error y culpa real, pero no intencional.
  doctrine_reference: Numbers 15:28 lexical/theological structure
- issue: Sentido cultual de כפר
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - expiar
  rationale: '''Expiación'' mantiene el valor cultual sacrificial del verbo sin reducirlo a perdón abstracto. Esto deja visible que el perdón resulta del acto sacerdotal, conforme al flujo del versículo.'
  doctrine_reference: Levitical atonement terminology
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que sustituyó una repetición demasiado literal por la idea natural de 'errs by sinning unintentionally'. La redacción española evita la repetición rígida pero conserva tanto el error como la inadvertencia, y mantiene el doble כפר con dos ocurrencias de 'expiación'.
  spanish_consistency_notes:
  - Se siguió la terminología del proyecto para יְהוָה como 'Yahvé'.
  - Se mantuvo 'persona' para נֶפֶשׁ en lugar de 'alma', por el valor referencial del contexto.
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - '''Expiación'' se usó en sentido técnico, coherente con el resto del pasaje.'
  - 'La frase final conserva el pasivo: ''le será perdonado''.'
