    issue: «Ten compasión de nosotros» desplaza el sentido principal de חָנֵּנוּ
    rationale: Aunque חנן puede incluir misericordia, la decisión auditada del POB enfatiza favor/gracia y evita una matización penitencial más fuerte. En español, «ten compasión» suena más estrecho que el hebreo y que la elección inglesa documentada.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota [b] explica la expresión idiomática «porque mucho nos hemos saciado de desprecio / estamos hartos de desprecio», no la segunda repetición de la súplica. Debe marcarse junto a la cláusula final correspondiente.
  - severity: low
    issue: Las alternativas léxicas incluyen formas poco idiomáticas
    rationale: Opciones como «Ten gracia de nosotros» o «Mira con favor a nosotros» no son español natural. Esto no afecta el texto principal, pero confirma la necesidad de una formulación principal más idiomática.
  revised_spanish_text: Sé favorable a nosotros[a], Yahvé; sé favorable a nosotros, porque estamos hartos de desprecio[b].
