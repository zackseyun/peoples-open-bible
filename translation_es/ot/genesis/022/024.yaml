translation:
  language: es
  text: Y su concubina[a], cuyo nombre era Reumá, también[b] dio a luz a Tebah, Gaham, Tahash y Maacá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su nombre era Reumá»; el hebreo es formalmente coordinado.
    reason: lexical_alternative
  - marker: b
    text: O «ella también dio a luz», conservando el pronombre explícito y el énfasis de גַּם הִוא.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִילַגְשׁוֹ
  english_pob_choice: And his concubine
  chosen_spanish: Y su concubina
  alternatives_spanish:
  - Y su esposa secundaria
  - Y su compañera
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ designa una concubina o esposa secundaria. "Concubina" conserva la distinción social y legal sin suavizar el término. Se mantiene el enlace inicial con "Y" como en el hebreo y en el audit trail inglés.
- source_word: וּשְׁמָהּ
  english_pob_choice: whose name was
  chosen_spanish: cuyo nombre era
  alternatives_spanish:
  - y su nombre era
  lexicon: HALOT
  rationale: El hebreo dice literalmente "y su nombre"; en español, "cuyo nombre era" fluye con naturalidad y preserva la relación posesiva con la mujer mencionada.
- source_word: רְאוּמָה
  english_pob_choice: Reumah
  chosen_spanish: Reúma
  alternatives_spanish:
  - Reuma
  lexicon: convención transliteración
  rationale: Se translitera el nombre propio. Se usa acentuación gráfica para evitar una lectura llana impropia en español.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En este contexto genealógico, ילד significa dar a luz. "Dio a luz" es natural en español y conserva el sentido biológico del hebreo.
- source_word: גַּם הִוא
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - ella también
  - ella misma también
  lexicon: HALOT
  rationale: 'La combinación añade énfasis de inclusión: no solo Milca, sino también Reúma. "También" expresa bien esa suma sin necesidad de sobrecargar la frase; el matiz enfático del pronombre puede explicarse en nota.'
- source_word: אֶת טֶבַח וְאֶת גַּחַם וְאֶת תַּחַשׁ וְאֶת מַעֲכָה
  english_pob_choice: Tebah, Gaham, Tahash, and Maacah
  chosen_spanish: Tebaj, Gajam, Tajas y Maaca
  alternatives_spanish:
  - Teba, Gajam, Tajas y Maaca
  - Tebaj, Gaham, Tahas y Maacá
  lexicon: convención transliteración
  rationale: Los nombres propios se transliteran directamente desde el hebreo, procurando una forma legible para el español y una correspondencia auditiva razonable con los nombres masoréticos. Se conserva la serie nominal sin añadidos interpretativos.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Génesis 22:24 y refleja el mismo estado textual que el audit trail inglés: no hay revisiones aplicadas ni variantes textuales relevantes en este versículo. Se ha conservado la coordinación formal del hebreo en la nota a, y el énfasis de גַּם הִוא en la nota b.'
  spanish_consistency_notes:
  - Se usa "concubina" de manera consistente con el valor léxico documentado para פִּילֶגֶשׁ.
  - Se transliteran los nombres propios sin sustituirlos por formas castellanas tradicionales no atestiguadas en el audit trail.
  - Se mantiene "dio a luz" como equivalente de nacimiento genealógico, sin convertirlo en una paráfrasis más amplia.
  - La puntuación y el orden de los nombres siguen el estilo narrativo bíblico en español.
