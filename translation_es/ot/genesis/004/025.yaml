translation:
  language: es
  text: 'Y Adán conoció otra vez a su esposa[a], y ella dio a luz un hijo y le puso por nombre Set[b], porque dijo: «Dios ha puesto para mí otra descendencia en lugar de Abel, pues Caín lo mató».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «conoció»; usado con la esposa, funciona como eufemismo para relaciones sexuales y preserva el tono del original.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo hace un juego de palabras entre «Set» y el verbo «ha puesto/establecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: conoció
  alternatives_spanish:
  - tuvo relaciones con
  - yació con
  lexicon: HALOT
  rationale: En español, «conocer» puede conservar el eufemismo sexual del hebreo יָדַע sin volverlo tosco. «Tuvo relaciones con» explicita más de lo que el texto dice; «yació con» suena más arcaico de lo necesario.
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - el hombre
  lexicon: HALOT
  rationale: Aquí corresponde el nombre propio, no una referencia genérica a la humanidad. «Adán» es la forma estable en español y preserva el paralelo narrativo.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: HALOT
  rationale: Expresa de manera natural la repetición del acto marital anterior.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: she bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: «Dar a luz» es una equivalencia clara y digna para ילד con בן. «Tuvo un hijo» debilita el acto de nacimiento; «parió» resulta más áspero.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo nombró
  - llamó su nombre
  lexicon: HALOT
  rationale: En español, «poner por nombre» comunica bien la fórmula hebrea sin sonar mecánica. «Llamó su nombre» es más literal pero menos natural.
- source_word: שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Seth
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio para lectura eclesial amplia.
- source_word: שָׁת
  english_pob_choice: has appointed
  chosen_spanish: me ha dado
  alternatives_spanish:
  - ha puesto
  - ha establecido
  - ha nombrado
  lexicon: HALOT
  rationale: El hebreo שָׁת permite la idea de «poner/establecer». En español, «me ha dado» comunica la interpretación teológica de Eva como don concedido por Dios, sin perder la nota de provisión. La alusión verbal con el nombre Set queda preservada en nota.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: linaje
  alternatives_spanish:
  - descendencia
  - semilla
  lexicon: HALOT
  rationale: «Linaje» es más idiomático en español bíblico para una descendencia continuada. «Descendencia» también es posible; «semilla» sería demasiado literal y puede sonar extraño.
- source_word: אַחֵר
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - distinto
  lexicon: HALOT
  rationale: Equivalente directo y natural en español.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: «En lugar de» expresa con claridad el sentido de sustitución/reemplazo.
- source_word: הֶבֶל
  english_pob_choice: Abel
  chosen_spanish: Abel
  lexicon: HALOT
  rationale: Nombre propio estándar.
- source_word: הֲרָגוֹ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo asesinó
  - lo asesinó a él
  lexicon: HALOT
  rationale: El verbo hebreo es el común para matar. «Lo mató» mantiene la sencillez del original; «lo asesinó» agrega especificidad moral que el verbo no exige.
theological_decisions:
- issue: Cómo expresar la interpretación de Eva sobre el nombre de Set y la provisión divina
  english_pob_reading: God has appointed for me another offspring in place of Abel
  chosen_spanish_reading: Dios me ha dado otro linaje en lugar de Abel
  alternative_spanish_readings:
  - Dios ha puesto para mí otro linaje en lugar de Abel
  - Dios me ha concedido otra descendencia en lugar de Abel
  rationale: El hebreo contiene un juego de palabras entre Set y el verbo שָׁת. En español, «me ha dado» transmite la convicción de Eva de que el nacimiento es un don de Dios; «linaje» comunica la idea de descendencia continua. La redacción evita una traducción demasiado rígida que oscurezca el sentido narrativo y teológico.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Mantenimiento del eufemismo sexual de יָדַע
  english_pob_reading: And Adam knew his wife again
  chosen_spanish_reading: Y Adán conoció otra vez a su esposa
  alternative_spanish_readings:
  - Y Adán tuvo relaciones con su esposa otra vez
  - Y Adán yació otra vez con su esposa
  rationale: Se preserva el registro literario del hebreo y la discreción del eufemismo, sin forzar una explicitación innecesaria.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El testimonio inglés final quedó sin cambios en la última revisión; se mantuvo el enfoque de equivalencia óptima con preservación del eufemismo y del juego de palabras de Set, ajustando solo la formulación española para naturalidad y claridad.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al criterio POB.
  - Se usa «Adán» como nombre propio y «Set» como forma española tradicional del nombre.
  - Se conserva «linaje» para זֶרַע por su valor colectivo y de descendencia continua.
  - La nota sobre el nombre de Set se vincula al punto exacto en el texto para auditar el juego de palabras.
