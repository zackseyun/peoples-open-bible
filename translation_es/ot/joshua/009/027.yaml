translation:
  language: es
  text: Entonces Josué los hizo leñadores y sacadores de agua[a] en aquel día, para la congregación y para el altar de Yahvé, hasta el día de hoy, en el lugar que él escogería.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cargadores de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵם
  english_pob_choice: made them
  chosen_spanish: los hizo
  alternatives_spanish:
  - los nombró
  - los designó
  lexicon: HALOT
  rationale: En esta construcción, נתן expresa asignación o establecimiento en una función. «Los hizo» comunica bien en español la idea causativa de convertirlos en un grupo de servicio, sin perder el valor idiomático del hebreo.
- source_word: חֹטְבֵי עֵצִים
  english_pob_choice: woodcutters
  chosen_spanish: leñadores
  alternatives_spanish:
  - cortadores de leña
  - hendedores de madera
  lexicon: HALOT
  rationale: La expresión denota personas cuya tarea es cortar madera. «Leñadores» es natural, claro y fiel al oficio descrito.
- source_word: וְשֹׁאֲבֵי מַיִם
  english_pob_choice: water carriers
  chosen_spanish: cargadores de agua
  alternatives_spanish:
  - sacadores de agua
  - sacadores de agua
  lexicon: HALOT
  rationale: El participio remite a quienes extraen o acarrean agua; en contexto importa la función laboral. «Cargadores de agua» transmite la labor de servicio con naturalidad en español. Se conserva la posibilidad más literal en la nota.
- source_word: לָעֵדָה
  english_pob_choice: for the congregation
  chosen_spanish: para la congregación
  alternatives_spanish:
  - para la asamblea
  - para la comunidad
  lexicon: HALOT
  rationale: «Congregación» preserva el sentido corporativo y cultual de עֵדָה mejor que un término más general como «comunidad».
- source_word: וּלְמִזְבַּח יְהוָה
  english_pob_choice: and for the altar of Yahweh
  chosen_spanish: y para el altar de Yahvé
  alternatives_spanish:
  - y para el altar de Yahweh
  - y para el altar del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה. «Altar de Yahvé» conserva la relación genitiva de forma transparente y natural en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - todavía hoy
  lexicon: HALOT
  rationale: La fórmula idiomática expresa continuidad desde el evento narrado hasta el presente del autor. «Hasta el día de hoy» es la equivalencia más estable y pública en español bíblico contemporáneo.
- source_word: אֶל הַמָּקוֹם אֲשֶׁר יִבְחָר
  english_pob_choice: in the place that he would choose
  chosen_spanish: en el lugar que él escogería
  alternatives_spanish:
  - en el lugar que él escogerá
  - en el lugar que escogiera
  lexicon: HALOT
  rationale: El futuro relativo en contexto narrativo mira hacia la elección divina futura desde el punto de vista de Josué. «Escogería» conserva ese valor prospectivo sin volver la frase impersonal. «En el lugar» sigue la revisión inglesa que prefirió la preposición más natural con el hebreo.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. Se conserva su transliteración tradicional en español del proyecto, en vez de sustituirlo por un título, para mantener la visibilidad del nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de «él escogería»
  english_pob_reading: he refers implicitly to the LORD
  chosen_spanish_reading: él se refiere implícitamente a Yahvé
  alternative_spanish_readings:
  - el lugar que sería escogido
  - el lugar que escogieran
  rationale: El hebreo y la tradición deuteronomista aluden a la elección soberana de Yahvé del lugar del santuario. Se mantiene el sujeto personal implícito para no borrar ese énfasis teológico.
  doctrine_reference: Deuteronomio 12; Joshua 9:27
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que prefirió «in the place» por mayor naturalidad con la preposición hebrea; el español refleja esa misma relación con «en el lugar». No se introdujeron cambios doctrinales respecto del audit trail, salvo la adaptación normal de «Yahweh» a la forma española del proyecto, «Yahvé».
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto para el Nombre divino: Yahvé.'
  - «Congregación» conserva el matiz cultual/corporativo de עֵדָה.
  - «Leñadores» y «cargadores de agua» son equivalencias de oficio, no descripciones literales de material o acción aislada.
  - Se preserva el valor prospectivo de «escogería» para יִבְחָר en contexto narrativo.
  - La nota[a] se ancla en «cargadores de agua» para conservar la alternativa léxica tradicional.
