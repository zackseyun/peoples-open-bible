translation:
  language: es
  text: Porque tú bendices al justo[a], Yahvé; como un escudo, el favor lo rodea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el favor lo corona como un escudo». El verbo hebreo puede significar «coronar» o «rodear/encerrar»; la imagen del escudo favorece aquí el sentido de protección envolvente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación previa. En español, «Porque» conserva bien la relación causal/expositiva sin sonar forzado.
- source_word: תְּבָרֵךְ
  english_pob_choice: bless
  chosen_spanish: bendices
  alternatives_spanish:
  - bendecirás
  - bendices
  - bendice
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa acción característica o segura; el presente español comunica esa certeza de modo natural. El singular divino se mantiene en contexto.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al justo
  - al recto
  - al hombre justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «Al justo» conserva el sentido genérico y suena idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el Tetragrámaton con una forma reverente y reconocible en español.
- source_word: כַּצִּנָּה
  english_pob_choice: like a shield
  chosen_spanish: como un escudo
  alternatives_spanish:
  - como un escudo
  - cual escudo
  - como escudo
  lexicon: HALOT
  rationale: La partícula comparativa pide una equivalencia directa. «Escudo» reproduce bien la imagen sin añadir especificaciones no exigidas por el texto.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: el favor
  alternatives_spanish:
  - la gracia
  - la benevolencia
  - el favor
  lexicon: HALOT
  rationale: En este contexto denota disposición favorable/protectora de Dios. «Favor» es la opción más precisa y sobria en español.
- source_word: תַּעְטְרֶנּוּ
  english_pob_choice: surrounds him
  chosen_spanish: lo rodea
  alternatives_spanish:
  - lo rodea
  - lo corona
  - lo ciñe
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «coronar», el paralelo con «como un escudo» favorece la idea de protección envolvente. «Lo rodea» conserva esa imagen con naturalidad en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título genérico. Esto preserva la referencia del pacto y sigue la convención del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «como un escudo» y el verbo תַּעְטְרֶנּוּ
  english_pob_reading: like a shield, favor surrounds him
  chosen_spanish_reading: como un escudo, el favor lo rodea
  alternative_spanish_readings:
  - como un escudo, el favor lo corona
  - como un escudo, el favor lo ciñe
  rationale: 'Se conserva la tensión lexical documentada: el verbo puede admitir una lectura de «coronar», pero el contexto imaginal del escudo apoya la idea de cercar/proteger. La traducción principal refleja esa decisión sin borrar la alternativa.'
  doctrine_reference: 'DOCTRINE.md: Translation principles — preserve documented lexical tensions'
translation_notes:
  revision_awareness: Se revisó el tramo hebreo y el audit trail en inglés. No se detectaron cambios posteriores que alteraran la decisión de base. La versión española conserva la ambigüedad verbal documentada mediante nota y adopta un orden natural para el español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «el justo» como sustantivo genérico sin singularizar indebidamente.
  - «Favor» se conserva como término relacional/protectivo, no como simple cortesía humana.
  - La imagen del escudo se mantiene literal y no se reemplaza por una metáfora doctrinal ajena al texto.
