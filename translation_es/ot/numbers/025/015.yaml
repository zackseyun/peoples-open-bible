base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/015.yaml
  text: And the name of the Midianite woman who was struck down was Cozbi daughter of Zur[b][a], who was head of the clans of a father's house in Midian.
  footnotes:
  - marker: a
    text: Or 'the head of the peoples of a father's house in Midian.' The Hebrew term can denote 'peoples' or, in this kinship context, clan-groups.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'father's house,' a kinship term for an extended family or ancestral household.
    reason: cultural_note
