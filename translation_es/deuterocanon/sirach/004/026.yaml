translation:
  language: es
  text: No te avergüences de apartarte de la iniquidad, y no te detengas ante la corriente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No te avergüences de confesar tus pecados, y no fuerces la corriente de un río». El hebreo y el griego difieren en la primera cláusula y ligeramente en la segunda; aquí se sigue el hebreo, mientras el griego aclara la imagen de la corriente.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֵּבוֹשׁ
  english_pob_choice: Do not be ashamed
  chosen_spanish: No te avergüences
  alternatives_spanish:
  - No te sientas avergonzado
  - No te ruborices
  lexicon: HALOT
  rationale: בוש expresa vergüenza o quedar avergonzado. 'No te avergüences' es natural en español y conserva el paralelo con el griego μὴ αἰσχυνθῇς.
- source_word: לָשׁוּב
  english_pob_choice: to turn back
  chosen_spanish: volver atrás
  alternatives_spanish:
  - regresar
  - volver
  lexicon: HALOT
  rationale: שוב significa literalmente volver/retornar. 'Volver atrás' conserva la imagen de retroceso sin convertirla en una fórmula técnica de arrepentimiento que el hebreo no explicita.
- source_word: מֵעָוֹן
  english_pob_choice: from iniquity
  chosen_spanish: de la iniquidad
  alternatives_spanish:
  - del pecado
  - de la culpa
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o maldad. 'Iniquidad' mantiene el peso moral y sigue de cerca la elección inglesa basada en el hebreo.
- source_word: וְאַל תַּעֲמוֹד
  english_pob_choice: and do not stand
  chosen_spanish: y no te pongas
  alternatives_spanish:
  - y no permanezcas
  - y no te quedes
  lexicon: HALOT
  rationale: עמד es 'estar de pie, ponerse'. En español, 'no te pongas' comunica mejor la postura de colocarse ante algo peligroso que un calco rígido.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  lexicon: HALOT
  rationale: La preposición puede significar 'delante de' o 'ante'. 'Delante de' es claro y conserva la escena espacial del aviso.
- source_word: שִׁבֹּלֶת
  english_pob_choice: the current
  chosen_spanish: la corriente
  alternatives_spanish:
  - el torrente
  - el flujo
  lexicon: HALOT
  rationale: El hebreo es inusual, pero el paralelo griego ῥοῦν ποταμοῦ apunta a una imagen de corriente o flujo de agua. 'La corriente' mantiene la imagen sin añadir 'de un río', que el texto hebreo no dice en esta forma.
theological_decisions:
- issue: Si traducir שוב con lenguaje penitencial explícito
  english_pob_reading: to turn back from iniquity
  chosen_spanish_reading: volver atrás de la iniquidad
  alternative_spanish_readings:
  - arrepentirte del pecado
  - volver del pecado
  rationale: Se preserva la tensión entre un simple 'volver' y una lectura penitencial más técnica. El contexto moral la sugiere, pero ni el hebreo ni la estrategia inglesa obligan a decir explícitamente 'arrepentirse'.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Cómo reflejar la discrepancia entre el hebreo y el griego en la primera cláusula
  english_pob_reading: The Hebrew and Greek differ in the first clause; the English follows the extant Hebrew while using the Greek to clarify the river image.
  chosen_spanish_reading: se sigue el hebreo en la primera cláusula, con la imagen de corriente coherente con el griego
  alternative_spanish_readings:
  - confesar tus pecados
  - reconocer tus pecados
  rationale: La redacción española debe seguir el testimonio hebreo principal sin borrar que el griego ofrece una variante más explícita ('confesar tus pecados'). La nota de pie conserva esa tensión textual.
  doctrine_reference: Translation philosophy §2, Source-priority with auditable parallels.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador de nota [a] directamente en el texto principal. La frase se ajustó para que el anclaje aparezca exactamente donde corresponde y la nota explique la divergencia hebreo/griego sin añadir 'de un río', de acuerdo con la revisión del texto fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Iniquidad'' se conserva por coherencia con la decisión inglesa basada en el hebreo.'
  - '''Corriente'' reproduce la imagen acuática sin forzar una especificación ausente en el hebreo.'
  - La formulación evita 'arrepentirse' para no resolver una tensión lexical que el original deja abierta.
