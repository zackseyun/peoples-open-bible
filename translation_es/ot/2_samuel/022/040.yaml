revisions:
- from: Me armaste con fuerza para la batalla[a]; hiciste que los que se levantaban contra mí se inclinaran[b] debajo de mí.
  to: Me armaste con fuerza para la batalla[a]; hiciste que los que se alzaban contra mí se inclinaran[b] y quedaran debajo de mí.
  rationale: La revisión hace más natural la segunda cláusula sin perder la imaginería hebrea de obligar a los adversarios a doblarse y quedar por debajo del hablante. También mejora ligeramente «se levantaban» por «se alzaban» para reflejar mejor la oposición hostil del participio.
