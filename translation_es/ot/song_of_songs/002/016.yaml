translation:
  language: es
  text: Mi amado es mío[a][b][c], y yo soy suyo—el que apacienta entre los lirios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «mi amante» para «mi amado».
    reason: lexical_alternative
  - marker: b
    text: El participio hebreo también puede traducirse «el que pastorea» o simplemente «apacentando entre los lirios».
    reason: lexical_alternative
  - marker: c
    text: La flor exacta designada por «lirios» es incierta; puede referirse más ampliamente a una flor vistosa.
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado(a)
  - mi amante
  lexicon: HALOT
  rationale: En Cantar de los Cantares, דּוֹדִי expresa una relación afectiva e ինտimista; «mi amado» es el equivalente natural en español bíblico y conserva la ternura sin volverlo demasiado carnal como «mi amante».
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es de mí
  lexicon: HALOT
  rationale: La forma breve posesiva del hebreo se refleja mejor con «es mío», que mantiene la concisión poética y la reciprocidad del paralelismo.
- source_word: וַאֲנִי לוֹ
  english_pob_choice: and I am his
  chosen_spanish: y yo soy suya
  alternatives_spanish:
  - y yo soy de él
  - y le pertenezco
  lexicon: HALOT
  rationale: «Soy suya» reproduce la mutua pertenencia del verso y evita sobreexplicar con «pertenezco», aunque la relación implícita sigue siendo la misma.
- source_word: הָרֹעֶה
  english_pob_choice: he who grazes
  chosen_spanish: él, que pastorea
  alternatives_spanish:
  - el que apacienta
  - el que pastorea
  - el que alimenta
  lexicon: HALOT
  rationale: El participio admite varias posibilidades; en español «pastorea» conserva el valor verbal y permite reflejar la tensión documentada entre «grazing», «shepherding» y «feeding» sin forzar una sola imagen.
- source_word: בַּשּׁוֹשַׁנִּים
  english_pob_choice: among the lilies
  chosen_spanish: entre los lirios
  alternatives_spanish:
  - entre las flores
  - entre los lotos
  lexicon: HALOT
  rationale: «Lirios» conserva la traducción tradicional del término, y «entre» expresa naturalmente el valor locativo/relacional del hebreo en poesía.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el cotejo externo indica alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «amado» en lugar de «Cristo» o lenguaje eclesial, porque el texto poético del Cantar y el audit trail inglés apoyan un referente amoroso literal.
  - Se conserva la reciprocidad breve del hebreo («es mío / soy suya») sin ampliarla a una formulación explicativa.
  - Se preserva la ambigüedad del participio רעה mediante una nota de alternativa, ya que la evidencia permite más de una imagen verbal.
  - Se usa «lirios» como equivalente estándar, con nota sobre la incertidumbre botánica documentada.
