revisions:
- from: 'Lo que es más pesado que tú[a], no lo lleves; y con uno más rico que tú, no te asocies. ¿Con qué puede un tiesto unirse a una vasija? Él lo golpea, y se rompe. ¿O qué puede unirse: un hombre rico con un pobre?'
  to: 'Lo que es más pesado que tú[a], no lo lleves; y con alguien más rico que tú, no te asocies. ¿Qué puede unir a un tiesto con una vasija? Esta lo golpea, y se rompe. ¿O qué puede unirse: un rico con un pobre?'
  rationale: 'Se hacen ajustes menores para reflejar con más precisión la sintaxis y la imagen del hebreo: se corrige la pregunta del tiesto y la vasija para evitar el matiz instrumental no presente en la fuente, se aclara quién golpea a quién, y se suaviza ligeramente «uno» a «alguien» para mejor naturalidad en español general. Se mantiene la nota textual sobre la expansión griega y la fidelidad al hebreo en el cuerpo principal.'
