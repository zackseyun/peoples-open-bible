translation:
  language: es
  text: Las caravanas[a] de Tema miraron[c]; los viajeros de Saba pusieron en ellos[b] su esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Caravanas» refleja el sentido contextual de un grupo de viajeros, aunque el hebreo puede referirse literalmente a «caminos» o «sendas».
    reason: lexical_alternative
  - marker: b
    text: El pronombre «ellos» se refiere a las corrientes o cauces de agua mencionados en los versículos anteriores.
    reason: cross_reference
  - marker: c
    text: «Miraron» traduce de manera breve el verbo hebreo; también puede entenderse como «miraron con expectativa» o «buscaron».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבִּיטוּ
  english_pob_choice: looked
  chosen_spanish: miraron
  alternatives_spanish:
  - miraron fijamente
  - pusieron la vista en
  lexicon: HALOT
  rationale: El verbo hebreo expresa mirar o fijar la vista. En el contexto de viajeros buscando corrientes de agua, «miraron» conserva la sobriedad del original sin añadir intensidad no documentada.
- source_word: אָרְחוֹת
  english_pob_choice: caravans
  chosen_spanish: caravanas
  alternatives_spanish:
  - caminos
  - rutas
  - grupos de viajeros
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar literalmente «caminos» o «sendas», el contexto poético de Job 6:18–19 y el paralelo con «los viajeros de Saba» favorecen el sentido metonímico de grupos viajeros. «Caravanas» comunica bien ese valor en español.
- source_word: תֵּמָא
  english_pob_choice: Tema
  chosen_spanish: Tema
  alternatives_spanish:
  - Temá
  lexicon: toponym
  rationale: Nombre propio transliterado de forma estándar.
- source_word: הֲלִיכֹת
  english_pob_choice: travelers
  chosen_spanish: viajeros
  alternatives_spanish:
  - caravanas
  - caminantes
  - compañías de viaje
  lexicon: HALOT
  rationale: La forma está relacionada con «idas/jornadas», pero aquí designa a quienes viajan. «Viajeros» conserva el paralelismo con la primera cola y evita una literalidad artificial.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Saba
  alternatives_spanish:
  - Sheba
  lexicon: toponym
  rationale: Nombre propio transliterado según uso español habitual; «Saba» es la forma natural en español bíblico y evita una grafía menos idiomática.
- source_word: קִוּוּ
  english_pob_choice: hoped
  chosen_spanish: esperaron
  alternatives_spanish:
  - tuvieron esperanza
  - aguardaron
  - esperaban
  lexicon: HALOT
  rationale: El verbo קוה puede significar esperar o esperar con esperanza. Aquí, con caravanas desérticas anhelando agua, «esperaron» mantiene el valor de expectativa sin forzar una formulación devocional ajena al contexto.
- source_word: לָמוֹ
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - para ellos
  - por esas aguas
  - por las aguas
  lexicon: HALOT
  rationale: El sufijo pronominal remite a las aguas/cauces mencionados en el contexto inmediato. En español, «por ellos» reproduce la referencia pronominal de manera natural y concisa; el antecedente queda recuperable por el contexto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alta concordancia. Mantengo esa lectura estable, ajustando solo el español para que suene natural y conserve las decisiones léxicas del auditoría inglesa.
  spanish_consistency_notes:
  - Se usó «Saba» como forma española natural del topónimo.
  - 'Se mantuvo la relación entre las dos mitades del versículo: grupos viajeros de Tema / viajeros de Saba.'
  - Se preservó la referencia pronominal implícita a las aguas o cauces del contexto inmediato.
  - No se introdujo vocabulario teológico ajeno al hebreo ni se suavizó la expectativa expresada por קוה.
