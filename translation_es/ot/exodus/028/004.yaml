translation:
  language: es
  text: 'Y estas son las vestiduras que harán: un pectoral[a], un efod[b], un manto, una túnica cuadriculada[c], un turbante y una faja. Harán vestiduras santas[d] para Aarón tu hermano y para sus hijos varones, para servirme como sacerdote.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pieza para el pecho»; «pectoral» evita sugerir una coraza o armadura.
    reason: lexical_alternative
  - marker: b
    text: Término técnico hebreo para una prenda sacerdotal distintiva sin equivalente exacto en español.
    reason: cultural_note
  - marker: c
    text: O «túnica de trabajo cuadriculado» o «túnica de tejido trabajado»; el hebreo probablemente se refiere a una prenda con diseño tejido.
    reason: lexical_alternative
  - marker: d
    text: O «vestiduras sagradas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropa
  - prendas
  lexicon: HALOT
  rationale: Para el contexto sacerdotal, «vestiduras» comunica un registro digno y litúrgico sin volverse tan eclesiástico como «ornamentos». Conserva la idea general de prendas de vestir para el servicio sagrado.
- source_word: יַעֲשׂוּ
  english_pob_choice: they shall make
  chosen_spanish: harán
  alternatives_spanish:
  - deberán hacer
  - han de hacer
  lexicon: HALOT
  rationale: El imperfecto en contexto de mandato se puede expresar naturalmente en español con futuro. «Harán» mantiene la fuerza directiva sin calco innecesario.
- source_word: חֹשֶׁן
  english_pob_choice: breastpiece
  chosen_spanish: pectoral
  alternatives_spanish:
  - breastpiece
  - breastplate
  lexicon: HALOT
  rationale: «Pectoral» transmite el objeto que va sobre el pecho y evita la sugerencia bélica de «breastplate»/«coraza». En español es claro y adecuado para un objeto sacerdotal.
- source_word: אֵפוֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - delantal sacerdotal
  - prenda sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico por no tener equivalente exacto en español. La transliteración mantiene la especificidad cultual del objeto.
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - ropa exterior
  - túnica exterior
  lexicon: HALOT
  rationale: «Manto» comunica bien una prenda exterior larga y digna. Evita la redundancia de repetir «túnica» para una prenda distinta dentro del conjunto.
- source_word: כְתֹנֶת תַּשְׁבֵּץ
  english_pob_choice: checkered tunic
  chosen_spanish: túnica cuadriculada
  alternatives_spanish:
  - túnica ajedrezada
  - túnica tejida con diseño
  lexicon: HALOT
  rationale: «Cuadriculada» conserva la noción de patrón o trabajo tejido señalada por תַּשְׁבֵּץ, aunque no obliga a precisar más de lo que el hebreo garantiza. Se evita «bordada» por ser más específica de lo que el término requiere.
- source_word: מִצְנֶפֶת
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - tocado
  - headdress
  lexicon: HALOT
  rationale: «Turbante» es el equivalente claro y natural en español para la cobertura sacerdotal de la cabeza.
- source_word: אַבְנֵט
  english_pob_choice: sash
  chosen_spanish: cinto
  alternatives_spanish:
  - faja
  - cinturón
  lexicon: HALOT
  rationale: «Cinto» funciona bien en registro bíblico y conserva la idea de una banda ceñida. Es más ceremonioso que «cinturón» y menos regional que «faja».
- source_word: בִגְדֵי קֹדֶשׁ
  english_pob_choice: holy garments
  chosen_spanish: vestiduras santas
  alternatives_spanish:
  - vestiduras sagradas
  - ropas santas
  lexicon: HALOT
  rationale: «Santas» conserva el lenguaje de santidad del texto hebreo con fuerza cultual. «Sagradas» es viable, pero «santas» resuena mejor con el léxico bíblico de consagración.
- source_word: לְאַהֲרֹן אָחִיךָ
  english_pob_choice: for Aaron your brother
  chosen_spanish: para Aarón tu hermano
  alternatives_spanish:
  - para Aarón, tu hermano
  - para tu hermano Aarón
  lexicon: HALOT
  rationale: Se mantiene el orden natural del español y la relación fraternal dirigida a Moisés. La traducción no pierde el énfasis relacional del hebreo.
- source_word: וּלְבָנָיו
  english_pob_choice: and for his sons
  chosen_spanish: y para sus hijos
  alternatives_spanish:
  - y para sus hijos varones
  - y para sus descendientes
  lexicon: HALOT
  rationale: El hebreo se refiere a los hijos varones de Aarón en línea sacerdotal. «Hijos» es claro y natural en español; el contexto sacerdotal impide entenderlo de manera genérica.
- source_word: לְכַהֲנוֹ
  english_pob_choice: for him to serve as priest
  chosen_spanish: para que me sirva como sacerdote
  alternatives_spanish:
  - para ejercer el sacerdocio para mí
  - para ministrar como sacerdote para mí
  lexicon: HALOT
  rationale: «Servir como sacerdote» preserva el valor verbal y funcional del infinitivo. Se añade «me» por el dativo final del hebreo, haciendo explícito que el servicio es dirigido a Yahvé.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: En español, el dativo se expresa con naturalidad mediante el clítico «me» dentro de la cláusula final. Mantiene la relación de servicio directo a Yahvé.
theological_decisions:
- issue: Terminología sacerdotal sin sobrerreligiosidad posterior
  english_pob_reading: Use ordinary but precise terms for priestly garments while keeping technical cultic distinctives like 'ephod'.
  chosen_spanish_reading: 'Usar términos comunes pero precisos: «pectoral», «manto», «túnica», «turbante», «cinto», y conservar «efod».'
  alternative_spanish_readings:
  - Usar «coraza» en lugar de «pectoral»
  - Usar «ornamentos» o «vestiduras litúrgicas»
  rationale: El texto enumera ropa sacerdotal del tabernáculo. «Pectoral» evita la imagen de armadura; «efod» se translitera porque no tiene equivalente exacto. La redacción mantiene claridad moderna sin importar un vocabulario eclesiástico posterior.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; lexical specificity over traditional masking'
- issue: Santidad de las vestiduras
  english_pob_reading: holy garments
  chosen_spanish_reading: vestiduras santas
  alternative_spanish_readings:
  - vestiduras sagradas
  - vestiduras consagradas
  rationale: La expresión hebrea marca pertenencia a la esfera de la santidad. «Santas» conserva la resonancia bíblica del término sin desactivar su carga cultual.
  doctrine_reference: Holiness language / cultic consecration
- issue: Hijos de Aarón como sucesión sacerdotal masculina
  english_pob_reading: and for his sons
  chosen_spanish_reading: y para sus hijos
  alternative_spanish_readings:
  - y para sus descendientes
  - y para su familia
  rationale: El hebreo es específico sobre los hijos varones llamados al sacerdocio. La traducción evita neutralizar el referente y mantiene la precisión genealógica y cultual.
  doctrine_reference: Gender-accurate translation
translation_notes:
  revision_awareness: Tomé como punto de partida el auditrack inglés de POB, en especial la decisión tardía de traducir תַּשְׁבֵּץ como 'checkered tunic' en lugar de 'woven tunic'. En español opté por «túnica cuadriculada» para reflejar esa revisión sin sobredeterminar el patrón textil. También preservé la distinción entre el término técnico «efod» y los nombres comunes de las demás prendas, evitando calcos desde el inglés cuando una solución española más natural podía mantener con mayor claridad el sentido del hebreo.
  spanish_consistency_notes:
  - He usado «Yahvé» para el nombre divino según la norma del proyecto; aquí no aparece explícitamente en el versículo, pero la última cláusula se entiende referida a él por el contexto.
  - He mantenido un registro reverente pero moderno, evitando arcaísmos innecesarios como «gárrnmentos» o «mote» de estilo tradicional.
  - «Pectoral» y «efod» conservan la especificidad cultual del texto sin convertirlo en una explicación extensiva.
  - «Para que me sirva como sacerdote» reproduce el propósito del infinitivo hebreo y su dative final de manera natural en español.
