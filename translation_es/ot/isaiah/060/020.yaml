translation:
  language: es
  text: Tu sol ya no se pondrá[a], ni tu luna se retirará[b]; porque Yahvé será tu luz eterna, y los días de tu luto habrán terminado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ya no se ocultará’. El hebreo literalmente dice ‘vendrá’, un modismo aquí para la puesta del sol.
    reason: lexical_alternative
  - marker: b
    text: O ‘tu luna no será recogida’, es decir, no será retirada ni apartada de brillar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֥וֹא עוֹד
  english_pob_choice: will no longer go down
  chosen_spanish: no se pondrá más
  alternatives_spanish:
  - no se pondrá nunca más
  - no se ocultará más
  - ya no se pondrá
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘vendrá’ con el sol como sujeto; en español, la forma idiomática natural para el ocaso del sol es ‘ponerse’. ‘No se pondrá más’ conserva el sentido idiomático sin perder la imagen del ocaso.
- source_word: שִׁמְשֵׁךְ
  english_pob_choice: your sun
  chosen_spanish: tu sol
  alternatives_spanish:
  - tu sol resplandeciente
  - el sol tuyo
  lexicon: HALOT
  rationale: Se mantiene el posesivo de segunda persona singular femenino implícito en el texto, dirigido a Sion/Jerusalén. ‘Tu sol’ es directo y fiel.
- source_word: וִירֵחֵךְ
  english_pob_choice: and your moon
  chosen_spanish: tu luna
  alternatives_spanish:
  - tu luna
  - y tu luna
  lexicon: HALOT
  rationale: La coordinación hebrea puede quedar naturalmente en español sin repetir la conjunción si el ritmo lo permite. Se conserva la referencia astral literal.
- source_word: יֵאָסֵף
  english_pob_choice: will not withdraw
  chosen_spanish: se retirará
  alternatives_spanish:
  - será recogida
  - será retirada
  - se ocultará
  lexicon: HALOT
  rationale: El niphal de אסף tiene la idea básica de ‘ser recogido/quitado’. En este paralelismo con el sol, ‘retirarse’ preserva la imagen de ser apartado de la vista o del resplandor, sin reducirlo a una sola explicación astronómica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: transliterar el nombre divino como ‘Yahvé’ en lugar de sustituirlo por un título. Es la forma prevista para el texto español.'
- source_word: יִהְיֶה לָּךְ לְאוֹר עוֹלָם
  english_pob_choice: will be your everlasting light
  chosen_spanish: será tu luz eterna
  alternatives_spanish:
  - será para ti luz eterna
  - será tu luz perpetua
  - será tu luz para siempre
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘será para ti por luz de eternidad’. ‘Tu luz eterna’ expresa la misma predicación en un español fluido, conservando el valor durativo de עוֹלָם mediante ‘eterna’.
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - para siempre
  - de duración perpetua
  lexicon: HALOT
  rationale: ‘Eterna’ comunica duración sin fin en un registro bíblico natural. Se evita diluir el matiz escatológico del término.
- source_word: וְשָׁלְמ֖וּ
  english_pob_choice: will be ended
  chosen_spanish: serán cumplidos
  alternatives_spanish:
  - terminarán
  - serán acabados
  - se completarán
  lexicon: HALOT
  rationale: El verbo שלם expresa aquí que los días llegan a su plena consumación. ‘Serán cumplidos’ mantiene la idea de completarse hasta el fin previsto, sin forzar un giro interpretativo excesivo.
- source_word: יְמֵי אֶבְלֵךְ
  english_pob_choice: the days of your mourning
  chosen_spanish: los días de tu luto
  alternatives_spanish:
  - los días de tu duelo
  - los días de tu lamentación
  - los días de tu tristeza
  lexicon: HALOT
  rationale: ‘Luto’ es el equivalente más natural de אבל en este contexto funerario/lamentoso y preserva mejor el registro bíblico que ‘tristeza’. Se mantiene el vínculo con la cesación del duelo.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología del proyecto, se conserva el nombre divino en español como ‘Yahvé’, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preserving the cosmic imagery of sun and moon
  english_pob_reading: Retain the cosmic imagery literally rather than reducing it to a mere metaphor of comfort
  chosen_spanish_reading: Conservar literalmente la imagen cósmica del sol y la luna
  alternative_spanish_readings:
  - reducirlo a una metáfora de consuelo
  - interpretarlo solo como prosperidad figurada
  rationale: El versículo presenta la luz de Yahvé como superior a los ciclos creados de sol y luna. La traducción mantiene esa imagen profética sin suavizarla ni resolverla en una paráfrasis más genérica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que mantuvo sin cambios la decisión de traducir יהוה como ‘Yahvé’ y de conservar la imaginería cósmica literal. No se detectaron revisiones pendientes relevantes.
  spanish_consistency_notes:
  - Se mantiene la política del proyecto para יהוה como ‘Yahvé’ en el texto principal.
  - Se conserva el paralelismo sol/luna sin reinterpretarlo como simple lenguaje ornamental.
  - ‘Luto’ se usa de manera consistente con el campo semántico de אבל en contexto de duelo.
  - La puntuación y el orden de cláusulas buscan naturalidad en español sin añadir contenido no explicitado por el hebreo.
