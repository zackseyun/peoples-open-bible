  am’ to nominal phrases, echoing the poem’s cadence. Internal sonic parallelism (‘voice
  … voices … angels … word … shout’) is preserved. No contradictory pair is explicit
  here; the paradox works through layered identities (garment/voice/word/gods) rather
  than antithetical opposites.
voice_check: First-person declarative identity (‘I am …’) is preserved throughout
  to retain the authoritative, encompassing voice characteristic of Thunder. Where
  the Coptic likely continues an ellipsis of ‘I am,’ we supplied it to maintain the
  poem’s rhetorical drive.
