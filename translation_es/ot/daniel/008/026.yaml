translation:
  language: es
  text: Y la visión de la tarde y la mañana[a], que fue dicha, es verdadera; pero tú, sella la visión, porque es para muchos días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las tardes y las mañanas». La expresión hebrea refleja de cerca la referencia temporal anterior y puede entenderse colectivamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «para muchos días». El sentido es que la visión corresponde a un tiempo distante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - aparición
  - lo que se vio
  lexicon: HALOT
  rationale: En el contexto apocalíptico de Daniel, מַרְאֵה se refiere a una revelación vista, no a una simple apariencia visual. «Visión» conserva ese valor técnico y es natural en español bíblico.
- source_word: הָעֶרֶב וְהַבֹּקֶר
  english_pob_choice: the evening and the morning
  chosen_spanish: el atardecer y de la mañana
  alternatives_spanish:
  - las tardes y las mañanas
  - el atardecer y la mañana
  lexicon: HALOT
  rationale: El hebreo alude a la secuencia temporal del período ya mencionado. «Atardecer» comunica el sentido de עֶרֶב con naturalidad en español, aunque la construcción conserva la coordinación del original; la referencia a «la mañana» mantiene el paralelo verbal con el hebreo.
- source_word: אֲשֶׁר נֶאֱמַר
  english_pob_choice: that was spoken
  chosen_spanish: que fue dicha
  alternatives_spanish:
  - que fue hablada
  - que fue declarada
  lexicon: HALOT
  rationale: El nifal de אמר es pasivo. En español, «que fue dicha» reproduce la pasividad de forma idiomática y sin agregar matices no presentes en el texto.
- source_word: אֱמֶת הוּא
  english_pob_choice: is true
  chosen_spanish: es verdadera
  alternatives_spanish:
  - es verdad
  - es cierta
  lexicon: HALOT
  rationale: La cláusula afirma la fiabilidad de la revelación. «Verdadera» conserva el predicado adjetival y suena natural en español, sin convertirlo en una abstracción.
- source_word: סְתֹם
  english_pob_choice: shut up
  chosen_spanish: sella
  alternatives_spanish:
  - cierra
  - guarda
  - enciérrala
  lexicon: HALOT
  rationale: El imperativo tiene la fuerza de cerrar o mantener resguardada la visión. En español, «sella» preserva el valor de cerrar para preservación/ocultamiento, manteniendo la tensión apocalíptica sin sonar extrañamente coloquial.
- source_word: הֶחָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la revelación
  lexicon: HALOT
  rationale: חָזוֹן es el término estándar para una visión profética. Mantener «la visión» distingue este sustantivo sin necesidad de sustituirlo por un equivalente más interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón para sellar la visión. «Porque» expresa causalidad de manera clara y plenamente idiomática.
- source_word: לְיָמִים רַבִּים
  english_pob_choice: for many days from now
  chosen_spanish: es para muchos días
  alternatives_spanish:
  - es para largo tiempo
  - es para muchos días por venir
  lexicon: HALOT
  rationale: La frase literalmente significa «para muchos días», y el inglés POB aclara que apunta a distancia temporal. En español, «es para muchos días» conserva la literalidad y permite entender la lejanía temporal sin sobreparafrasear.
theological_decisions:
- issue: Sentido de «sellar / cerrar» la visión
  english_pob_reading: A command to preserve/conceal the revelation because its fulfillment lies in the more distant future.
  chosen_spanish_reading: Un mandato de sellar la visión para guardarla, porque su cumplimiento queda para un tiempo lejano.
  alternative_spanish_readings:
  - Un mandato meramente de autenticar la visión
  - Un mandato de dejar de hablar de la visión
  rationale: En el contexto profético-apocalíptico, סתם expresa cerrar o sellar algo para su conservación y resguardo, no negar su verdad. La mención de «muchos días» apoya claramente la distancia temporal del cumplimiento.
  doctrine_reference: Daniel 8:26; Daniel 12:4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «shut up» para סְתֹם, manteniendo el valor de cerrar/sellar con un verbo español equivalente. También se preservó la nota alternativa sobre la expresión temporal de «las tardes y las mañanas» y la lejanía futura de «muchos días».
  spanish_consistency_notes:
  - Se mantuvo «visión» para מַרְאֵה y הֶחָזוֹן, como en el inglés POB, por ser el término técnico más natural en Daniel.
  - «Yahvé» no aparece en este versículo; no se requirió decisión sobre el nombre divino.
  - Se prefirió una construcción cercana al texto hebreo sin oscurecer la sintaxis española.
  - La nota a conserva la ambigüedad colectiva de la expresión temporal sin resolverla unilateralmente.
