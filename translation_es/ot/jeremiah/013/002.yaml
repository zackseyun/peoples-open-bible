revisions:
- from: Entonces compré el cinto[a], conforme a la palabra de Yahvé, y lo puse sobre mi cintura.
  to: Así que compré la faja[a], conforme a la palabra de Yahvé, y me la puse en la cintura.
  rationale: La revisión mejora la naturalidad y la precisión semántica en español. «La faja» expresa mejor que se trata de una prenda ceñida al cuerpo, en línea con la rationale del inglés POB para «loincloth», mientras la nota preserva alternativas léxicas. «Me la puse en la cintura» evita un calco menos idiomático y mantiene fielmente la acción de vestir la prenda. «Así que» conserva bien la progresión narrativa consecutiva del wayyiqtol en contexto.
