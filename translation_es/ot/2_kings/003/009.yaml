translation:
  language: es
  text: Entonces el rey de Israel fue, junto con el rey de Judá y el rey de Edom, y dieron un rodeo de siete días de camino; pero no había agua para el campamento ni para los animales[a] que iban tras ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘los animales que estaban a sus pies’, un modismo para los animales que los acompañaban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - avanzó
  - marchó
  lexicon: HALOT
  rationale: El wayyiqtol de הלך introduce el movimiento narrativo. ‘Fue’ conserva el valor básico de desplazamiento sin añadir una connotación militar que el verbo hebreo no exige por sí solo.
- source_word: מֶלֶךְ יִשְׂרָאֵל ... וּמֶלֶךְ יְהוּדָה ... וּמֶלֶךְ אֱדוֹם
  english_pob_choice: the king of Israel ... the king of Judah and the king of Edom
  chosen_spanish: el rey de Israel ... el rey de Judá y el rey de Edom
  alternatives_spanish:
  - el monarca de Israel ...
  - el rey de Israel ... el rey de Judá y el rey de Edom
  lexicon: HALOT
  rationale: Se conservan los títulos y la coordinación tripartita del hebreo. ‘Rey de’ es la forma natural y fiel en español, y los nombres propios se mantienen como nombres geográficos/políticos.
- source_word: וַיָּסֹבּוּ
  english_pob_choice: they made a circuit
  chosen_spanish: dieron un rodeo
  alternatives_spanish:
  - hicieron un circuito
  - rodearon
  - tomaron un desvío
  lexicon: HALOT
  rationale: סבב expresa un movimiento en torno a algo o un desvío. ‘Dieron un rodeo’ comunica con naturalidad la idea de trayecto indirecto, sin perder el sentido de circunvalación presente en el POB inglés.
- source_word: דֶּרֶךְ שִׁבְעַת יָמִים
  english_pob_choice: a circuit of seven days' journey
  chosen_spanish: de siete días
  alternatives_spanish:
  - de un viaje de siete días
  - durante siete días
  - en una jornada de siete días
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí señala recorrido o trayecto. En español, la expresión idiomática más clara dentro de la frase es ‘de siete días’, que mantiene la medida temporal del recorrido sin forzar una construcción pesada.
- source_word: וְלֹא הָיָה מַיִם
  english_pob_choice: there was no water
  chosen_spanish: no había agua
  alternatives_spanish:
  - no había agua disponible
  - carecían de agua
  lexicon: HALOT
  rationale: La cláusula existencial con היה se vierte de forma directa con ‘no había agua’, que es la forma más natural y transparente en español.
- source_word: לַמַּחֲנֶה
  english_pob_choice: for the camp
  chosen_spanish: para el campamento
  alternatives_spanish:
  - para el campamento militar
  - para la hueste
  - para el ejército
  lexicon: HALOT
  rationale: מַחֲנֶה puede ser campamento o campamento militar. ‘Campamento’ conserva la amplitud del hebreo sin añadir especificación más allá del contexto.
- source_word: וְלַבְּהֵמָה
  english_pob_choice: for the livestock
  chosen_spanish: ni para el ganado
  alternatives_spanish:
  - ni para los animales
  - ni para el ganado de carga
  - ni para las bestias
  lexicon: HALOT
  rationale: בְּהֵמָה en este contexto alude a animales de carga o acompañamiento. ‘Ganado’ funciona en español como colectivo comprensible y cercano al valor de ‘livestock’ del POB inglés.
- source_word: אֲשֶׁר בְּרַגְלֵיהֶם
  english_pob_choice: that followed them
  chosen_spanish: que iba tras ellos
  alternatives_spanish:
  - que estaba a sus pies
  - que iba con ellos
  - que los seguía
  lexicon: HALOT
  rationale: La expresión literal ‘en/por sus pies’ es idiomática. ‘Que iba tras ellos’ conserva el sentido de acompañamiento sin perder la imagen de seguimiento, y evita una literalidad poco natural en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre divino en este versículo
  english_pob_reading: No explicit divine name occurs in the verse; the English POB does not introduce any masking convention here.
  chosen_spanish_reading: No se introduce ningún equivalente de Yahvé ni se añade una referencia divina implícita en el texto principal.
  alternative_spanish_readings:
  - insertar una nota sobre la ausencia del nombre divino
  - usar ‘SEÑOR’ por convención tradicional
  rationale: El verso no contiene יהוה ni un κύριος citando el nombre divino. Por fidelidad textual, no se incorpora terminología divina que no está presente.
  doctrine_reference: Tetragrama / fidelidad textual
- issue: Sentido colectivo de בְּהֵמָה
  english_pob_reading: for the livestock
  chosen_spanish_reading: ni para el ganado
  alternative_spanish_readings:
  - ni para los animales
  - ni para las bestias
  rationale: No se doctrinaliza el término; se preserva el valor colectivo y práctico del contexto de marcha. ‘Ganado’ es suficientemente amplio en español para animales de carga o de acompañamiento.
  doctrine_reference: Lexicografía contextual
- issue: Imagen idiomática de בְּרַגְלֵיהֶם
  english_pob_reading: that followed them
  chosen_spanish_reading: que iba tras ellos
  alternative_spanish_readings:
  - que estaba a sus pies
  - que seguía a sus pies
  rationale: Se mantiene la idiomaticidad del hebreo sin convertir la frase en una imagen extraña para el lector moderno. La nota conserva la tensión lexical de la expresión original.
  doctrine_reference: Figuración idiomática / semántica hebrea
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión final del POB en inglés, que prefirió ‘made a circuit of seven days' journey’ frente a una formulación más literal pero menos natural. Por eso se optó por ‘dieron un rodeo de siete días’, que conserva el valor de trayecto indirecto y el marco temporal del hebreo sin sobrecargar la sintaxis. También se mantuvo la nota idiomática sobre ‘a sus pies / tras ellos’ para reflejar la tensión lexical documentada.
  spanish_consistency_notes:
  - Se usa ‘rey de’ de manera uniforme para los tres monarcas, preservando la coordinación del hebreo.
  - ‘Campamento’ y ‘ganado’ mantienen un registro claro y bíblico sin caer en arcaísmos innecesarios.
  - La nota [a] se ancla en ‘fue’ para alertar sobre el hebraísmo idiomático asociado al movimiento y al sustantivo animales que va en la cláusula final.
  - No se emplea ‘Cristo’, ‘SEÑOR’ ni otra terminología eclesiástica no presente en el versículo.
