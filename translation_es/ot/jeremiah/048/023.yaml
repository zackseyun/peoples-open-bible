lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - también contra
  lexicon: HALOT
  rationale: En un oráculo de juicio, עַל con valor direccional hostil se expresa naturalmente en español con «contra». Se conserva la repetición de la conjunción y la preposición en cada nombre para mantener el ritmo del hebreo.
- source_word: קִרְיָתַיִם
  english_pob_choice: Kiriathaim
  chosen_spanish: Quiriataim
  alternatives_spanish:
  - Kiriataim
  - Quiriataim
  lexicon: HALOT
  rationale: Es un topónimo y debe transliterarse, no traducirse. Se eligió la forma española con Q inicial para reflejar la ortografía habitual en español bíblico y mantener la pronunciación aproximada del nombre.
- source_word: בֵּית גָּמוּל
  english_pob_choice: Beth-gamul
  chosen_spanish: Bet-gamul
  alternatives_spanish:
  - Bet Gamul
  - Casa de Gamul
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se conserva transliterado. «Bet» reproduce de manera natural el elemento toponímico hebreo בֵּית sin convertirlo en «casa» en el texto principal, siguiendo la práctica de mantener el nombre asentado del lugar.
- source_word: בֵּית מְעוֹן
  english_pob_choice: Beth-meon
  chosen_spanish: Bet-meón
  alternatives_spanish:
  - Bet Meón
  - Casa de Meón
  lexicon: HALOT
  rationale: También se trata de un topónimo compuesto y se translitera en español. Se usa acentuación gráfica en «meón» para una lectura española clara, sin alterar el carácter de nombre propio.
theological_decisions:
- issue: Repetición de la fórmula de juicio «and against» / וְעַל
  english_pob_reading: and against ... and against ... and against ...
  chosen_spanish_reading: y contra ... y contra ... y contra ...
  alternative_spanish_readings:
  - contra ... contra ... contra ...
  - y sobre ... y sobre ... y sobre ...
  rationale: La repetición no es redundante accidentalmente; forma parte del encadenamiento profético del anuncio de juicio. En español se preserva para no aplanar la cadencia ni debilitar el tono de amenaza.
  doctrine_reference: Oráculos proféticos de juicio; retórica hebrea
- issue: Topónimos transliterados frente a traducción semántica
  english_pob_reading: Kiriathaim, Beth-gamul, Beth-meon
  chosen_spanish_reading: Quiriataim, Bet-gamul, Bet-meón
  alternative_spanish_readings:
  - Ciudades dobles / Casa de Gamul / Casa de Meón
  - Kiriataim / Bet Gamul / Bet Meón
  rationale: El pasaje enumera lugares concretos; traducirlos como expresiones comunes borraría su función geográfica y literaria. La transliteración conserva la identificación histórica y la textura del texto profético.
  doctrine_reference: Toponimia bíblica y lectura histórica del texto
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin revisiones aplicadas; se mantiene la estructura breve del versículo y la repetición hebrea, ajustando solo la transliteración al uso natural del español.
  spanish_consistency_notes:
  - Se usa «contra» para la fuerza hostil de עַל en contexto de juicio.
  - Se mantiene «Bet-» como forma breve y reconocible de בֵּית en topónimos compuestos.
  - Se elige «Quiriataim» con Q inicial para una transliteración más natural al español bíblico.
  - El guion largo final refleja la pausa conclusiva del hebreo y del inglés auditado.
