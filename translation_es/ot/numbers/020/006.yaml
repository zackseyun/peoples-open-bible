translation:
  language: es
  text: Entonces Moisés y Aarón fueron desde delante de[a] la asamblea[b] hasta la entrada de la tienda de reunión, y cayeron sobre sus rostros; y la gloria de Yahvé se les apareció[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde delante de», un modismo que significa desde la presencia del pueblo reunido.'
    reason: source_note
  - marker: b
    text: O «la congregación».
    reason: lexical_alternative
  - marker: c
    text: O «apareció a ellos la gloria de Yahvé». Tradicionalmente, «la gloria del SEÑOR apareció ante ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: salieron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: HALOT
  rationale: El contexto narrativo indica movimiento desde la asamblea hacia la entrada de la tienda. En español, 'salieron de delante de' expresa con naturalidad la retirada desde la presencia del pueblo, sin perder el sentido direccional de בוא en esta escena.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - alejándose de
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y literalmente espacial. 'De delante de' conserva esa relación de proximidad/presencia y refleja el matiz auditado en el inglés sin volverlo explicativo en exceso.
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el pueblo reunido
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce bien קהל como grupo reunido y evita una formulación eclesiástica más tradicional que el contexto no exige. La alternativa ''congregación'' queda como posible matiz, pero ''asamblea'' es más neutral y directa.'
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la puerta
  lexicon: HALOT
  rationale: '''Entrada'' es el equivalente natural de פֶּתַח en este marco tabernacular y mantiene la referencia al punto de acceso sin añadir detalles no presentes en el hebreo.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la Tienda de Reunión
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' sigue de cerca el hebreo אֹהֶל מוֹעֵד y es comprensible en español. Se evita ''tabernáculo'' por ser más interpretativo/tradicional y menos transparente para el lector moderno.'
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם
  english_pob_choice: fell on their faces
  chosen_spanish: se postraron sobre sus rostros
  alternatives_spanish:
  - cayeron sobre sus rostros
  - se postraron rostro en tierra
  lexicon: HALOT
  rationale: El hebreo expresa una postura de humillación/súplica mediante un modismo corporal. 'Se postraron sobre sus rostros' preserva el idiomatismo y su fuerza reverencial. 'Rostro' mantiene el plural posesivo implícito del original ('sus rostros').
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se manifestó
  - fue visto
  lexicon: HALOT
  rationale: La forma nifal de ראה indica manifestación visible. 'Apareció' es la equivalencia española más natural y fiel al uso narrativo.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria del SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva la terminología POB para el nombre divino: יְהוָה → ''Yahvé''. ''Gloria'' traduce כבוד en su sentido de manifestación visible/presencia majestuosa, sin suavizar el peso teológico del sintagma.'
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - a ellos
  - sobre ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'a ellos', en este contexto de aparición divina el español fluye mejor con 'ante ellos' y conserva la orientación de la manifestación sin sonar forzado. Se mantiene la dirección hacia Moisés y Aarón.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el criterio doctrinal del proyecto: transliterar el Tetragramatón como ''Yahvé'', no sustituirlo por un título. Esto preserva el nombre pactal revelado en el texto hebreo y evita el ocultamiento convencional del nombre divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Manifestación de la gloria divina
  english_pob_reading: the glory of Yahweh appeared to them
  chosen_spanish_reading: la gloria de Yahvé apareció ante ellos
  alternative_spanish_readings:
  - la gloria de Yahvé se apareció a ellos
  - apareció ante ellos la gloria de Yahvé
  rationale: '''Gloria'' mantiene el peso de כבוד como manifestación visible de la presencia divina. ''Ante ellos'' comunica correctamente la aparición dirigida a Moisés y Aarón, sin diluir el carácter teofánico del pasaje.'
  doctrine_reference: Teofanía y presencia manifiesta en el Pentateuco
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético (WLC) y el audit trail inglés. La principal decisión fue mantener la transparencia del modismo מִפְּנֵי הַקָּהָל con una nota, y reflejar la terminología del proyecto para el nombre divino como 'Yahvé'. No se detectaron cambios necesarios respecto del sentido base del versículo.
  spanish_consistency_notes:
  - Se conserva 'asamblea' para קהל, coherente con un registro neutral y no eclesiástico.
  - '''Tienda de reunión'' sigue la forma literal del hebreo y armoniza con el uso del Pentateuco.'
  - '''Yahvé'' se usa de manera consistente para יְהוָה, en línea con la política del proyecto.'
  - El modismo corporal 'se postraron sobre sus rostros' preserva la imagen hebrea sin paraphrasearla excesivamente.
