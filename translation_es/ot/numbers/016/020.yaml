lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר introduce avance narrativo y una fórmula de discurso. En español, 'habló' conserva el acto de comunicación sin confundirlo con אמר, que la POB inglesa distinguió con 'spoke' frente a 'said'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre divino propio. La pauta del proyecto pide 'Yahvé' en el texto principal, manteniendo el nombre del pacto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca al destinatario del habla. En español, 'a' es la equivalencia natural para introducir el complemento indirecto de persona.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: La coordinación con repetición de la preposición se preserva explícitamente como 'y a', manteniendo dos destinatarios distintos, tal como hace la POB inglesa con 'and to'.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Como introductor de discurso, 'diciendo' reproduce la función hebrea del infinitivo constructo sin expandir innecesariamente la frase.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'La lectura de la POB inglesa identifica el Tetragrámaton como el nombre divino y no como un título. En español se sigue la terminología del proyecto: ''Yahvé'', que preserva el nombre personal del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El control cruzado del paquete fuente indica alta concordancia y sin cambios requeridos en la revisión más reciente; por ello se mantiene la estructura breve del versículo y la decisión estable de rendir el nombre divino de forma transliterada.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve sin añadir sujeto explícito ni palabras interpretativas.
  - Se conserva la coordinación doble 'a Moisés y a Aarón' para no fusionar los destinatarios.
  - El texto usa 'Yahvé' en coherencia con la terminología por defecto del proyecto para יְהוָה.
