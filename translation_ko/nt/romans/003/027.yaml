source:
  edition: SBLGNT
  text: Ποῦ οὖν ἡ καύχησις; ἐξεκλείσθη. διὰ ποίου νόμου; τῶν ἔργων; οὐχί, ἀλλὰ διὰ νόμου πίστεως.
base_translation:
  language: en
  yaml_path: translation/nt/romans/003/027.yaml
  text: Where, then, is boasting? It has been excluded. Through what kind of law? A law of works? No, but through a law of faith.
translation:
  language: ko
  text: 그러면 자랑이 어디 있습니까? 배제되었습니다. 어떤 종류의 법을 통해서입니까? 행위의 법입니까? 아닙니다. 도리어 믿음의 법을 통해서입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νόμου
  english_pob_choice: law
  chosen_korean: 법
  alternatives_korean:
  - 원리
  - 율법
  lexicon: BDAG
  rationale: 여기 νόμος는 모세 율법이 아니라 「원리·체계」를 가리키는 일반화된 용법이므로 용어집의 일반 「법」 옵션을 채택한다.
theological_decisions:
- issue: 3:27 νόμος의 두 함의 — 모세 율법 vs 원리
  chosen_reading: 믿음의 법
  alternative_readings:
  - 믿음의 율법
  - 믿음의 원리
  rationale: 본 절의 νόμος는 모세 율법이 아니라 「원리/체계」의 의미로 쓰였다. 용어집의 단서 조항 — 일반 원리는 「법」으로 옮김 — 에 따라 「법」을 채택한다. 「율법」으로 옮기면 바울이 동일한 모세 율법을 가리키는 것으로 오독될 수 있다.
  doctrine_reference: DOCTRINE.md §1 — preserve author's intended distinction
