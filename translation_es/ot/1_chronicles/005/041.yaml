revisions:
- from: Y Jehozadac fue[a] cuando Yahvé hizo exiliar a Judá y a Jerusalén por mano de Nabucodonosor.
  to: Y Jehozadac se fue[a] cuando Yahvé exilió a Judá y a Jerusalén por mano de Nabucodonosor.
  rationale: Se ajusta הָלַךְ a un español natural ('se fue') que conserva el movimiento de salida en contexto de exilio. Se reemplaza 'hizo exiliar' por 'exilió', que expresa con claridad la agencia divina ya presente en el hebreo y en el análisis inglés, sin introducir una construcción española forzada. Se conserva 'por mano de' para mantener el modismo de agencia instrumental.
  reviewer_model: gpt-5.4
