  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: relativa indefinida («a quienes quieran»), doble acción política («ayudar» / «hacer rey») y la cláusula final de engrandecimiento. Sin embargo, «los remueven» suena poco idiomático en español bíblico-natural para una destitución política, y el pie de nota omite la alternativa de la nota inglesa sobre la cláusula final «fueron exaltados grandemente».'
  spanish_quality_summary: 'El texto es mayormente claro, pero requiere un ajuste de naturalidad y precisión: «hacen rey» debe llevar complemento predicativo más natural en español («hacen reyes» o «hacen rey a…»), y «remueven» resulta forzado donde «deponen» o «quitan del poder» comunica mejor el sentido político. La frase final es legible, aunque conviene conservar en nota la alternativa más literal del griego.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. Las decisiones léxicas políticas están en general bien encaminadas, pero «remover» como verbo transitivo personal en este contexto no es la mejor opción para un español eclesial general. También debe corregirse un error en las alternativas léxicas del borrador («los dependen»).
  issues:
  - severity: medium
    issue: «los remueven» es poco natural en este contexto político
    rationale: Aunque influido por el inglés 'remove', en español general «remover a alguien» suena menos directo y más administrativo. El contexto de quitar a gobernantes del cargo se expresa mejor con «deponen»; además, esa alternativa ya está documentada en la auditoría inglesa.
  - severity: medium
    issue: Falta en nota la alternativa más literal para ὑψώθησαν σφόδρα
    rationale: La auditoría inglesa preserva la posibilidad «were exalted greatly». Como el español opta por una formulación idiomática («han llegado a ser muy grandes»), conviene mantener la alternativa literal en nota para transparencia.
  - severity: low
    issue: 'Hay un error en las alternativas léxicas del borrador: «los dependen»'
    rationale: Es un error evidente de forma que debe corregirse en la revisión editorial, aunque no afecta directamente el texto principal.
