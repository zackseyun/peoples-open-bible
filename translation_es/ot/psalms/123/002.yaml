review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura comparativa del hebreo y preserva correctamente Yahvé / nuestro Dios. Sin embargo, se aparta del sentido preferido documentado para עֲבָדִים/שִׁפְחָה y, sobre todo, para חנן. El inglés POB eligió 'servants' en el texto principal por enfoque contextual y dejó 'slaves' como alternativa; además eligió 'shows us favor' como lectura principal, con 'be gracious' y 'have mercy' en nota. El español invierte esas prioridades al poner 'esclavos/esclava' y 'tenga misericordia de nosotros' en el texto principal.
  spanish_quality_summary: El español es claro y digno, pero 'están hacia la mano' suena algo calcado; 'puestos en la mano' o 'vueltos hacia la mano' sería más natural. También la nota a dice 'O «Mira», «Ve» o «He aquí»', repitiendo la forma principal dentro de las alternativas. Conviene pulir la frase para mayor naturalidad y mejor correspondencia con la lógica del POB.
  glossary_alignment: Alinea bien 'Yahvé' y 'Dios'. No hay conflicto doctrinal serio. Sí hay desalineación con la decisión contextual inglesa de evitar cargar el texto principal con 'esclavos' aquí, y con la preferencia léxica principal de חנן como favor/gracia antes que misericordia.
  issues:
  - severity: medium
    issue: עֲבָדִים / שִׁפְחָה se traduce en el texto principal como «esclavos / esclava»
    rationale: Aunque léxicamente posible, el POB inglés documentó 'servants / female servant' como elección principal por el enfoque de dependencia atenta más que estatus de esclavitud. En español conviene reflejar esa misma priorización y dejar «esclavos» como alternativa en nota.
  - severity: high
    issue: חנן se traduce en el texto principal como «tenga misericordia de nosotros»
    rationale: La auditoría inglesa establece como lectura principal 'until he shows us favor', preservando 'be gracious' y 'have mercy' como alternativas. El borrador español desplaza indebidamente la preferencia léxica hacia misericordia.
  - severity: low
    issue: «están hacia la mano» suena poco natural en español
    rationale: Es comprensible, pero es un calco innecesario. Una formulación como «están puestos en la mano» conserva la imagen de dependencia y señal del superior con mejor español.
  - severity: low
    issue: La nota [a] formula mal las alternativas
    rationale: Dice «O “Mira”, “Ve” o “He aquí”» cuando «Mira» ya es la lectura principal. Debe presentar verdaderas alternativas, p. ej. «Ve» o «He aquí».
  revised_spanish_text: 'Mira[a]: así como los ojos de los siervos están puestos en la mano de sus amos, como los ojos de una sierva están puestos en la mano de su señora, así nuestros ojos están puestos en Yahvé, nuestro Dios, hasta que nos muestre favor[b].'
  revised_footnotes:
