translation:
  language: es
  text: Y ahora[a], ven, y yo te enviaré a Faraón, y saca a mi pueblo, los hijos de Israel, de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Así que ahora
  lexicon: HALOT
  rationale: Mantiene el valor conectivo-discursivo de וְ con עַתָּה sin volverlo demasiado literal. «Y ahora» suena natural en español y conserva el giro de transición en la comisión divina.
- source_word: לְכָה
  english_pob_choice: come
  chosen_spanish: ve
  alternatives_spanish:
  - ven
  - vamos
  lexicon: HALOT
  rationale: En este mandato dirigido a Moisés, el hebreo usa una forma idiomática de urgencia. «Ve» preserva el movimiento implícito hacia la misión y evita sonar demasiado coloquial o redundante en español.
- source_word: וְאֶשְׁלָחֲךָ
  english_pob_choice: and I will send you
  chosen_spanish: y yo te enviaré
  alternatives_spanish:
  - y te enviaré
  - y yo te mandaré
  lexicon: HALOT
  rationale: «Enviar» refleja bien el acto de comisión divina. Se mantiene el sujeto explícito «yo» para la fuerza enfática del hablante y para transparentar la relación personal del envío.
- source_word: אֶל־פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - ante Faraón
  - hacia Faraón
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente con «a» en español. Se conserva «Faraón» como transliteración tradicional del nombre/título real.
- source_word: וְהוֹצֵא
  english_pob_choice: and bring ... out
  chosen_spanish: y sacarás
  alternatives_spanish:
  - y harás salir
  - y traerás ... fuera
  lexicon: HALOT
  rationale: El causativo de יצא se expresa de modo natural con «sacar» en español. «Sacarás» preserva la fuerza de hacer salir al pueblo, sin forzar una paráfrasis.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi propio pueblo
  lexicon: HALOT
  rationale: Se conserva el lenguaje de posesión pactual de forma directa. «Mi pueblo» reproduce con claridad la relación de pertenencia y elección.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la forma familiar y genealógica del hebreo. Aunque «los israelitas» es más idiomático, «los hijos de Israel» preserva mejor la expresión original y su carga ancestral.
- source_word: מִמִּצְרָיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con «sacar» en español, la idea de salida ya está incorporada; por eso «de Egipto» resulta natural y suficiente. Evita sobrecargar la frase con una duplicación innecesaria del movimiento.
theological_decisions:
- issue: 'Designación del pueblo del pacto: בְנֵי יִשְׂרָאֵל'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la forma masculina y genealógica del hebreo, acorde con la política de precisión de género del POB. En español, esta opción retiene el vínculo pactual e histórico del nombre colectivo sin neutralizarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El pasaje revisado en el contexto inglés quedó sin cambios en la última pasada; la versión española sigue ese mismo criterio de estabilidad, sin introducir variantes textuales ni ajustes doctrinales adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero aquí el texto fuente inmediato no contiene el tetragrámaton ni un equivalente directo que requiera esa sustitución.
  - Se mantiene «Faraón» como título propio tradicional y ampliamente reconocible en español.
  - Se opta por «los hijos de Israel» para respetar la forma hebrea y la decisión de precisión de género, dejando la alternativa idiomática en nota.
