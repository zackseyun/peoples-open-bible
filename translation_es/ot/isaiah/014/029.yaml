    text: Or 'whole Philistia.' The Hebrew addresses Philistia as a feminine singular collective.
    reason: lexical_alternative
  - marker: b
    text: Or 'its offspring will be a fiery flying serpent.' Hebrew 'fruit' is kept in the main text to preserve the metaphor.
    reason: lexical_alternative
