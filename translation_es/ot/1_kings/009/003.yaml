translation:
  language: es
  text: 'Y Yahvé le dijo: «He oído tu oración y tu súplica[a] que presentaste delante de mí. He consagrado esta casa[b] que has construido, para poner mi nombre allí para siempre, y mis ojos y mi corazón estarán allí todos los días[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu petición humilde' o 'tu ruego'; תְּחִנָּה expresa una súplica humilde que busca favor.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''esta casa''; se refiere al templo que Salomón construyó.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''mis ojos y mi corazón estarán allí todos los días'', una expresión antropomórfica del cuidado y la atención continuos de Yahvé.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: N/A
  rationale: Se sigue el uso del proyecto para el nombre divino, preservando la referencia explícita al nombre propio del texto hebreo en vez de reemplazarlo por un título encubierto.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - Escuché
  lexicon: N/A
  rationale: El perfecto español comunica una acción ya realizada con relevancia presente, equivalente al valor del perfecto inglés y al contexto de respuesta divina.
- source_word: תְּפִלָּתְךָ
  english_pob_choice: your prayer
  chosen_spanish: tu oración
  alternatives_spanish:
  - tu plegaria
  lexicon: N/A
  rationale: Oración es el equivalente natural y fiel en contexto de petición dirigida a Dios.
- source_word: תְּחִנָּתְךָ
  english_pob_choice: your plea for favor
  chosen_spanish: tu súplica
  alternatives_spanish:
  - tu ruego
  - tu petición humilde
  - tu entreato
  lexicon: N/A
  rationale: Súplica conserva el matiz de ruego humilde y persistente. Se evita un segundo sinónimo idéntico a 'oración' para mantener la distinción léxica documentada.
- source_word: הִתְחַנַּנְתָּה
  english_pob_choice: that you made
  chosen_spanish: que presentaste
  alternatives_spanish:
  - que hiciste
  - que imploraste
  - que suplicaste
  lexicon: N/A
  rationale: '''Presentaste'' suena natural en español y mantiene la idea de una súplica llevada delante de Dios, sin forzar una redundancia con el sustantivo ''súplica''. La intensidad del verbo hebreo queda sostenida por el sustantivo escogido y la frase completa.'
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  lexicon: N/A
  rationale: Se conserva el valor idiomático de presencia directa, con una formulación clara y reverente en español.
- source_word: הִקְדַּשְׁתִּי
  english_pob_choice: I have consecrated
  chosen_spanish: He consagrado
  alternatives_spanish:
  - He santificado
  - He dedicado
  lexicon: N/A
  rationale: '''Consagrado'' reproduce bien el sentido cultual de apartar algo para uso santo, sin depender de una terminología eclesiástica más estrecha.'
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: N/A
  rationale: Se mantiene 'casa' para respetar el término hebreo y su resonancia teológica; una nota puede aclarar que se refiere al templo de Salomón.
- source_word: לָשׂוּם שְׁמִי שָׁם
  english_pob_choice: to put my name there
  chosen_spanish: para poner mi nombre allí
  alternatives_spanish:
  - para colocar mi nombre allí
  - para que mi nombre esté allí
  lexicon: N/A
  rationale: Se preserva el idiomatismo del nombre divino 'puesto' en el lugar sin explicitar más de lo que el hebreo dice.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - perpetuamente
  lexicon: N/A
  rationale: '''Para siempre'' es la equivalencia natural y fiel del hebreo en este contexto de permanencia pactal.'
- source_word: עֵינַי וְלִבִּי
  english_pob_choice: my eyes and my heart
  chosen_spanish: mis ojos y mi corazón
  alternatives_spanish:
  - mi atención y mi corazón
  - mi mirada y mi corazón
  lexicon: N/A
  rationale: Se conserva la imagen antropomórfica literal, como hace el POB inglés, para no perder la textura teológica del texto.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - cada día
  - siempre
  lexicon: N/A
  rationale: La fórmula concreta del hebreo se conserva en español sin abstraerla innecesariamente.
theological_decisions:
- issue: Distinción entre 'oración' y 'súplica'
  english_pob_reading: The English POB distinguishes תְּפִלָּה and תְּחִנָּה as prayer and plea for favor.
  chosen_spanish_reading: '''oración'' y ''súplica'' mantienen dos términos relacionados pero no idénticos.'
  alternative_spanish_readings:
  - '''oración'' y ''plegaria'''
  - '''oración'' y ''petición'''
  rationale: 'La distinción ayuda a preservar la doble formulación hebrea: una oración general y una súplica humilde. ''Súplica'' conserva mejor el tono de dependencia y favor pedido.'
  doctrine_reference: Translation philosophy §1, lexical distinction should not be flattened
- issue: Antropomorfismo divino en 'mis ojos y mi corazón'
  english_pob_reading: Retain the anthropomorphic expression literally.
  chosen_spanish_reading: 'Se conserva literalmente: ''mis ojos y mi corazón''.'
  alternative_spanish_readings:
  - '''mi atención y mi cuidado'''
  - '''mi mirada y mi afecto'''
  rationale: La literalidad respeta el recurso hebreo y evita resolver la tensión teológica. El lector puede captar la expresión figurada sin que la traducción la elimine.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: '''Poner mi nombre allí'' como fórmula cultual del templo'
  english_pob_reading: Preserve the temple-name idiom without expanding it into a doctrinal paraphrase.
  chosen_spanish_reading: '''para poner mi nombre allí'' preserva el giro del texto.'
  alternative_spanish_readings:
  - '''para que mi nombre habite allí'''
  - '''para ser invocado allí'''
  rationale: El hebreo formula una relación pactal con el lugar; traducirlo de forma más explicativa podría borrar esa precisión. La formulación elegida mantiene el idioma bíblico y su ambigüedad controlada.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del texto hebreo y del audit trail inglés. Se mantuvieron las distinciones léxicas clave (oración/súplica, casa/templo, nombre divino explícito) y la imaginería antropomórfica, sin añadir paráfrasis doctrinales no presentes en la fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se prefiere 'consagrado' para הִקְדַּשְׁתִּי por claridad moderna y fuerza cultual.
  - '''Casa'' se conserva donde el hebreo dice בַּיִת; la referencia al templo queda para la nota.'
  - La puntuación y las comillas siguen el uso español moderno y el tono reverente del pasaje.
