base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/036.yaml
  text: When Abigail came to Nabal[a], behold, he was holding a feast in his house like the feast of a king, and Nabal’s heart was merry within him, and he was very drunk. So she told him nothing at all, small or great[b], until the light of morning.
  footnotes:
  - marker: a
    text: 'Hebrew: ''small or great,'' an idiom meaning ''nothing at all.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''until daybreak.'' Hebrew: ''until the light of morning.'''
    reason: lexical_alternative
