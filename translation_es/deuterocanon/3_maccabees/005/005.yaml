revisions:
- from: Y además, los asistentes, al salir al atardecer, ataban las manos de los que sufrían, y disponían el resto de la seguridad nocturna acerca de ellos, pensando que juntos llevarían a esa tribu[a] al fin de la destrucción[b].
  to: Y además, los asistentes, al salir al atardecer, ataban las manos de los que sufrían, y maquinaban el resto de la seguridad nocturna en torno a ellos, pensando que juntos llevarían al pueblo[a] al fin de la destrucción[b].
  rationale: Se corrige «esa tribu» a «el pueblo» para reflejar con fidelidad el referente colectivo de τὸ φύλον y ajustarse a la rationale inglesa. Se cambia «disponían» por «maquinaban» para conservar mejor el matiz de ἐμηχανῶντο. Se reemplaza «acerca de ellos» por «en torno a ellos» para lograr un español más natural sin alejarse del sentido. Se mantiene «al fin de la destrucción» y la nota sobre «consumación».
  reviewer_model: gpt-5.4
