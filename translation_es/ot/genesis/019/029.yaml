translation:
  language: es
  text: Y sucedió[a] que, cuando Dios destruyó las ciudades de la llanura, Dios se acordó de Abraham[b] e hizo salir a Lot de en medio de la catástrofe[c], cuando volcó[d] las ciudades en las cuales Lot había vivido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así sucedió, cuando Dios destruyó las ciudades de la llanura, que».
    reason: previous_rendering
  - marker: b
    text: «Dios se acordó de Abraham» es un modismo hebreo de consideración fiel y acción, no la sugerencia de que Dios lo hubiera olvidado.
    reason: theological_note
  - marker: c
    text: O «de en medio del derrocamiento» o «de la destrucción». El hebreo usa un sustantivo relacionado con «volcó/derribó», haciendo eco del verbo siguiente.
    reason: lexical_alternative
  - marker: d
    text: O «cuando derribó» o «cuando destruyó». La frase verbal repite la misma familia léxica del sustantivo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: So it happened
  chosen_spanish: Así sucedió
  alternatives_spanish:
  - Y sucedió
  - Entonces sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el marco temporal sin añadir interpretación. «Así sucedió» conserva ese arranque discursivo de manera natural en español y mantiene el valor de evento narrativo.
- source_word: בְּשַׁחֵת
  english_pob_choice: when God destroyed
  chosen_spanish: cuando Dios destruyó
  alternatives_spanish:
  - al destruir Dios
  - mientras Dios destruía
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ marca circunstancia temporal. «Cuando Dios destruyó» expresa bien esa relación temporal en español sin perder el sujeto divino explícito.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El referente es el Dios verdadero, en singular. «Dios» es la forma natural y fiel al contexto.
- source_word: עָרֵי הַכִּכָּר
  english_pob_choice: the cities of the plain
  chosen_spanish: las ciudades de la llanura
  alternatives_spanish:
  - las ciudades del valle
  - las ciudades de la región
  lexicon: HALOT
  rationale: כִּכָּר en Génesis 13 y 19 designa la llanura del Jordán. «Llanura» comunica ese sentido geográfico con claridad y evita una paráfrasis excesiva.
- source_word: וַיִּזְכֹּר אֱלֹהִים אֶת אַבְרָהָם
  english_pob_choice: God remembered Abraham
  chosen_spanish: Dios se acordó de Abraham
  alternatives_spanish:
  - Dios recordó a Abraham
  - Dios tuvo presente a Abraham
  lexicon: HALOT
  rationale: Se conserva el idiomismo hebreo de זכר aplicado a Dios, que en contexto implica consideración fiel y acción consecuente. «Se acordó» mantiene la expresión bíblica sin convertirla en paráfrasis interpretativa.
- source_word: וַיְשַׁלַּח אֶת לוֹט
  english_pob_choice: and sent Lot out
  chosen_spanish: y sacó a Lot
  alternatives_spanish:
  - y envió a Lot
  - y hizo salir a Lot
  lexicon: HALOT
  rationale: Aunque שׁלח es «enviar», en este contexto el resultado es la extracción de Lot del peligro. «Sacó» comunica la acción efectiva en español y evita la ambigüedad de «envió».
- source_word: מִתּוֹךְ הַהֲפֵכָה
  english_pob_choice: out of the midst of the overthrow
  chosen_spanish: de en medio de la destrucción
  alternatives_spanish:
  - de en medio del derrocamiento
  - del centro del trastorno
  lexicon: HALOT
  rationale: Se preserva la idea de «en medio de» y el sustantivo catastrófico. «Destrucción» es una opción legítima en español, aunque el hebreo mantiene un vínculo léxico con el verbo siguiente; por eso se documenta la alternativa «derrocamiento/volteamiento».
- source_word: בַּהֲפֹךְ
  english_pob_choice: when he overthrew
  chosen_spanish: al destruir
  alternatives_spanish:
  - cuando trastornó
  - al voltear
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ marca simultaneidad o circunstancia temporal. «Al destruir» expresa esa función de forma idiomática, aunque el hebreo literalmente enlaza con la noción de «voltear/derrocar».
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - aquellas ciudades
  lexicon: HALOT
  rationale: Se mantiene el referente definido y plural sin añadir matices no presentes en el hebreo.
- source_word: אֲשֶׁר יָשַׁב בָּהֵן לוֹט
  english_pob_choice: in which Lot had lived
  chosen_spanish: en las cuales Lot había vivido
  alternatives_spanish:
  - donde Lot había vivido
  - en las que Lot habitaba
  lexicon: HALOT
  rationale: La relativa describe la residencia previa de Lot. El pluscuamperfecto «había vivido» respeta la secuencia narrativa y suena natural en español.
theological_decisions:
- issue: Sentido de «Dios se acordó de Abraham»
  english_pob_reading: Retain the idiom 'remembered Abraham' in the main text without expanding it to an interpretive paraphrase.
  chosen_spanish_reading: Mantener «Dios se acordó de Abraham» como modismo bíblico principal, sin ampliarlo en el texto a una explicación causal.
  alternative_spanish_readings:
  - Dios actuó en favor de Abraham
  - Dios tuvo presente a Abraham
  rationale: En hebreo, «recordar» aplicado a Dios suele implicar consideración fiel que se manifiesta en acción. La frase principal conserva ese valor idiomático; la nota explica que no significa olvido previo sino actuación consecuente. Así se respeta la tensión lexical y teológica del original.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre «destrucción» y el verbo «destruir/voltear»
  english_pob_reading: Or 'out of the destruction.' The Hebrew uses a noun related to 'overthrow,' echoing the following verb 'when he overthrew.'
  chosen_spanish_reading: Traducir con «destrucción» en el sustantivo principal, pero señalar la relación léxica con el verbo de «destruir/al destruir» y la posibilidad de «derrocamiento/volteamiento».
  alternative_spanish_readings:
  - derrocamiento
  - volteamiento
  - trastorno
  rationale: El hebreo repite la familia semántica de הפך/הפכה. «Destrucción» es comprensible y legítimo en español, pero la nota conserva la alternativa para no borrar el eco léxico del original y su enlace con el verbo siguiente.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa al reflejar la secuencia narrativa con «Así sucedió, cuando… que…», pero adapta la sintaxis para que suene natural en español. Se conservó la relación léxica entre la destrucción de las ciudades y la acción verbal posterior, sin diluir la nota idiomática de «recordó a Abraham».
  spanish_consistency_notes:
  - Se usa «Dios» de manera uniforme para אֱלֹהִים.
  - Se optó por «llanura» para כִּכָּר, coherente con el uso establecido en Génesis 13 y 19.
  - Se mantuvo el nombre «Abraham» sin variación.
  - Se prefirió «Lot» como forma estándar en español bíblico.
  - La secuencia verbal busca equilibrio entre fidelidad al hebreo y fluidez pública en español.
