translation:
  language: es
  text: y guardar como día notable el día trece del duodécimo mes —llamado Adar en la lengua siria[a]—, un día antes del día de Mardoqueo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en la lengua común’ o ‘en la lengua vernácula’; la expresión griega es inusual aquí, y el testimonio fuente puede reflejar una formulación difícil para la designación local siria/aramaica.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el día anterior a la observancia asociada con Mardoqueo, probablemente una alusión a la celebración de Purim.
    reason: cross_reference
lexical_decisions:
- source_word: ἔχειν
  english_pob_choice: to keep
  chosen_spanish: tener como día notable
  alternatives_spanish:
  - observar
  - guardar
  lexicon: LSJ
  rationale: En este contexto calendárico-festivo, ἔχειν con ἐπίσημον expresa tratar un día como señalado o distinguido. En español, “tener como día notable” conserva esa idea sin añadir una formalidad litúrgica más fuerte de la que permite el griego.
- source_word: ἐπίσημον
  english_pob_choice: notable
  chosen_spanish: notable
  alternatives_spanish:
  - señalado
  - distinguido
  - celebrado
  lexicon: LSJ
  rationale: ἐπίσημον significa “marcado/distinguido”. “Notable” preserva la idea de singularidad reconocida sin convertir el término en “festivo” o “solemne” más allá del texto.
- source_word: προκαδεκάτην
  english_pob_choice: thirteenth day
  chosen_spanish: día trece
  alternatives_spanish:
  - el día trece
  - el día anterior al catorce
  lexicon: LSJ
  rationale: El compuesto ordinal apunta al decimotercer día del mes. “Día trece” es claro en español y mantiene el valor calendárico directo.
- source_word: δωδεκάτου μηνός
  english_pob_choice: of the twelfth month
  chosen_spanish: del duodécimo mes
  alternatives_spanish:
  - del mes duodécimo
  - del mes doce
  lexicon: LSJ
  rationale: La construcción genitiva se traduce de forma directa y natural como “del duodécimo mes”.
- source_word: Ἀδὰρ
  english_pob_choice: Adar
  chosen_spanish: Adar
  alternatives_spanish:
  - adar
  lexicon: LSJ
  rationale: El nombre del mes se translitera, según la práctica del proyecto para nombres propios semíticos.
- source_word: τῇ κυριακῇ φωνῇ
  english_pob_choice: in the Syrian language
  chosen_spanish: en la lengua siria
  alternatives_spanish:
  - en la lengua común
  - en la lengua vernácula
  - en siríaco
  lexicon: LSJ
  rationale: La frase es inusual y el expediente inglés conserva la incertidumbre. “Lengua siria” reproduce la referencia local/lengua del nombre sin resolver de modo excesivo la ambigüedad del griego.
- source_word: πρὸ μιᾶς ἡμέρας
  english_pob_choice: one day before
  chosen_spanish: un día antes
  alternatives_spanish:
  - el día antes
  - un día previo
  lexicon: LSJ
  rationale: La expresión temporal es directa; “un día antes” comunica con precisión la relación cronológica.
- source_word: τῆς Μαρδοχαϊκῆς ἡμέρας
  english_pob_choice: Mordecai's day
  chosen_spanish: el día de Mardoqueo
  alternatives_spanish:
  - el día de Mordecai
  - la festividad de Mardoqueo
  lexicon: LSJ
  rationale: “Mardoqueo” mantiene el nombre bíblico en español; “día de Mardoqueo” conserva el vínculo alusivo al observancia asociada con él sin introducir una interpretación más específica en el cuerpo del texto.
theological_decisions:
- issue: Naturaleza de la observancia descrita por ἐπίσημον
  english_pob_reading: A marked/notable commemorative day
  chosen_spanish_reading: un día notable conmemorativo
  alternative_spanish_readings:
  - un día de fiesta
  - un día oficialmente establecido
  rationale: 'El griego marca el día como distinguido, pero no obliga a llamarlo “fiesta” ni “día oficial”. “Día notable” conserva la tensión: es una conmemoración destacada, pero el texto no amplía su estatus más allá de lo dicho.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de τῇ κυριακῇ φωνῇ
  english_pob_reading: ‘in the Syrian language’ with lexical uncertainty preserved
  chosen_spanish_reading: ‘en la lengua siria’ con incertidumbre léxica preservada
  alternative_spanish_readings:
  - ‘en la lengua común’
  - ‘en la lengua vernácula’
  rationale: El expediente reconoce que la expresión griega es inusual y puede aludir al nombre local del mes. La traducción mantiene una opción concreta pero no cierra la discusión, evitando sobreinterpretar la frase.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia general con el expediente inglés; no hubo revisiones aplicadas en la última pasada. Se mantuvo la incertidumbre en τῇ κυριακῇ φωνῇ y se evitó ampliar ἐπίσημον a una terminología festiva más fuerte que la del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Mardoqueo' como forma española estable del nombre.
  - Se tradujo el mes como 'Adar' por transliteración coherente con el proyecto.
  - Se preservó una sintaxis breve y calendárica, adecuada al tono del versículo.
  - Se evitó 'SEÑOR' u otra sustitución teológica porque el texto no contiene aquí el nombre divino.
