translation:
  language: es
  text: Todos los rebaños de Kedar serán reunidos para ti; los carneros de Nebaiot te servirán. Subirán con aceptación[a] a mi altar, y yo embelleceré mi casa gloriosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Subirán aceptablemente a mi altar». El hebreo combina «subir» con la idea de aceptación favorable.'
    reason: lexical_alternative
  - marker: b
    text: «Mi casa gloriosa» se refiere al templo; literalmente, «la casa de mi belleza/gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - manadas
  - ganados menores
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor; en español, «rebaños» comunica bien el conjunto de animales sin restringirlo solo a ovejas. Conserva el valor colectivo que el inglés POB preservó con 'flocks'.
- source_word: קֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Cedar
  alternatives_spanish:
  - Quedar
  - Kedar
  lexicon: HALOT
  rationale: Es un nombre propio transliterado; «Cedar» sigue la forma hispana más reconocible y mantiene el referente geográfico/étnico sin interpretación adicional.
- source_word: יִקָּבְצוּ לָךְ
  english_pob_choice: will be gathered to you
  chosen_spanish: serán reunidos para ti
  alternatives_spanish:
  - serán congregados para ti
  - se reunirán para ti
  lexicon: HALOT
  rationale: El nifal de קבץ es pasivo/reflexivo; «serán reunidos» conserva esa pasividad. Se eligió «para ti» porque el dativo לָךְ expresa dirección/beneficio, como en el audit trail inglés.
- source_word: אֵילֵי
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos de ovejas macho
  - machos de oveja
  lexicon: HALOT
  rationale: El paralelismo con rebaños, sacrificio y altar muestra que se trata del animal. «Carneros» es el equivalente natural en español y mantiene la fuerza concreta de la imagen.
- source_word: נְבָיוֹת
  english_pob_choice: Nebaioth
  chosen_spanish: Nebaiot
  alternatives_spanish:
  - Nebaiot
  - Nebayot
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma española estándar sin añadir explicación al texto principal.
- source_word: יְשָׁרְתוּנֶךְ
  english_pob_choice: will minister to you
  chosen_spanish: te servirán
  alternatives_spanish:
  - te ministrarán
  - te ministrarán en servicio
  lexicon: HALOT
  rationale: שרת puede significar servir en contexto cultual. En español, «te servirán» es más natural y suficientemente amplio; evita una palabra eclesiástica más marcada que no añade precisión al hebreo.
- source_word: יַעֲלוּ
  english_pob_choice: will go up
  chosen_spanish: Subirán
  alternatives_spanish:
  - Ascenderán
  - Serán ofrecidos
  lexicon: HALOT
  rationale: עלה significa literalmente «subir»; se mantiene la imagen del movimiento hacia el altar. No se sustituye por «serán ofrecidos» para no perder la metáfora verbal del hebreo.
- source_word: עַל רָצוֹן
  english_pob_choice: with acceptance
  chosen_spanish: con aceptación
  alternatives_spanish:
  - aceptablemente
  - para beneplácito
  lexicon: HALOT
  rationale: La frase expresa recepción favorable. «Con aceptación» reproduce la lectura del audit trail inglés y sugiere que la ofrenda es recibida favorablemente, sin sobreexplicar.
- source_word: מִזְבְּחִי
  english_pob_choice: my altar
  chosen_spanish: mi altar
  alternatives_spanish:
  - mi altar de sacrificio
  lexicon: HALOT
  rationale: Renderización directa del sustantivo con sufijo de primera persona. Se conserva el referente cultual explícito.
- source_word: בֵית תִּפְאַרְתִּי
  english_pob_choice: my glorious house
  chosen_spanish: la casa de mi gloria
  alternatives_spanish:
  - mi casa gloriosa
  - la casa de mi esplendor
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de mi belleza/gloria». Se prefirió «la casa de mi gloria» para retener el sustantivo abstracto y reflejar mejor la tensión léxica que el inglés POB anota en su nota.
- source_word: אֲפָאֵר
  english_pob_choice: I will beautify
  chosen_spanish: embelleceré
  alternatives_spanish:
  - glorificaré
  - adornarÉ
  lexicon: HALOT
  rationale: פאֵר en piel puede significar embellecer/adornar/glorificar. «Embelleceré» conserva la imagen concreta de ornamentación/restauración sin perder dignidad ni forzar el sentido litúrgico.
theological_decisions:
- issue: Referencia de la segunda persona singular femenina («ti/te»)
  english_pob_reading: Addressed to Zion/Jerusalem personified, receiving the nations' wealth and sacrificial tribute
  chosen_spanish_reading: Dirigido a Sion/Jerusalén personificada, que recibe el tributo sacrificial de las naciones
  alternative_spanish_readings:
  - Dirigido al pueblo de Dios en sentido amplio
  rationale: El contexto inmediato de Isaías 60 personifica a Sion/Jerusalén como destinataria femenina. Mantener «ti/te» preserva esa personificación sin convertirla en una identificación doctrinal cerrada en el texto principal.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla prematuramente.
- issue: Sentido cultual de los animales y su ascenso al altar
  english_pob_reading: The verse depicts acceptable sacrificial offerings brought from foreign peoples
  chosen_spanish_reading: El versículo presenta ofrendas sacrificiales aceptables traídas por pueblos extranjeros
  alternative_spanish_readings:
  - Una imagen general de tributo y servicio sin fuerza sacrificial explícita
  rationale: La mención de rebaños, carneros, altar y aceptación sostiene con fuerza la imagen sacrificial. La traducción la conserva explícita, sin expandirla más allá del hebreo.
  doctrine_reference: Mantener el sentido cultual donde el texto lo exige.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés POB y el hebreo WLC. No se introdujeron cambios respecto del sentido principal: se mantuvieron la pasiva de קבץ, el valor cultual de שרת/עלה y la tensión léxica de בית תפארתי / אפאר. Se ajustó la frase final a una solución más natural en español, conservando el sustantivo abstracto «gloria» para reflejar la nota del POB sobre la ambigüedad belleza/gloria.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se evitó «SEÑOR» como sustituto por norma del proyecto.
  - «Servirán» se prefirió sobre «ministrarán» para no introducir lenguaje eclesiástico no exigido por el hebreo.
  - «Carneros» mantiene el paralelismo sacrificial con «rebaños» y el altar.
  - Las notas a pie de página usan marcadores únicos y aparecen ancladas en el texto principal.
