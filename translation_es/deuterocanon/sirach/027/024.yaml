translation:
  language: es
  text: Muchas cosas he aborrecido, y no me he hecho semejante a él; y Yahvé lo aborrecerá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολλὰ
  english_pob_choice: many things
  chosen_spanish: Muchas cosas
  alternatives_spanish:
  - muchas
  - muchas cosas
  lexicon: LSJ
  rationale: El neutro plural funciona de modo sustantivo; en español, 'muchas cosas' expresa con naturalidad que el objeto del aborrecimiento son varias cosas, no una sola cualidad abstracta.
- source_word: ἐμίσησα
  english_pob_choice: I have hated
  chosen_spanish: he aborrecido
  alternatives_spanish:
  - he odiado
  - aborrecí
  lexicon: LSJ
  rationale: El aoristo puede reflejarse como pasado simple o perfecto; aquí el perfecto mantiene el tono proverbial y acumulativo del hablante. 'Aborrecer' conserva la fuerza de μισέω sin sonar tan coloquial como 'odiar'.
- source_word: οὐχ ὡμοίωσα αὐτῷ
  english_pob_choice: I have not become like him
  chosen_spanish: no me he hecho semejante a él
  alternatives_spanish:
  - no he llegado a ser como él
  - no me he parecido a él
  - no me he hecho como él
  lexicon: LSJ
  rationale: Ὁμοιόω puede significar 'hacer semejante' o 'llegar a ser semejante'. En español, 'me he hecho semejante a él' conserva la relación moral/comparativa del texto sin volverlo mecánico.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: LSJ
  rationale: En la política terminológica del proyecto, el nombre divino se vierte como 'Yahvé'. Aunque el inglés POB usa 'the Lord' por convención, el trasfondo sapiencial aquí apunta al nombre divino, no a un simple título humano.
- source_word: μισήσει
  english_pob_choice: will hate
  chosen_spanish: aborrecerá
  alternatives_spanish:
  - odiará
  - detestará
  lexicon: LSJ
  rationale: Se mantiene la fuerza de μισέω sin suavizar la oposición divina. 'Aborrecerá' preserva mejor la severidad y suena más natural en registro bíblico español que un calco literal repetido con 'odiar'.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a ese hombre
  lexicon: LSJ
  rationale: El pronombre masculino singular se refiere al individuo mencionado; en español, el objeto directo átono 'lo' es la forma más natural y concisa.
theological_decisions:
- issue: Lenguaje de odio atribuido a Dios
  english_pob_reading: the Lord will hate him
  chosen_spanish_reading: Yahvé lo aborrecerá
  alternative_spanish_readings:
  - Yahvé lo odiará
  - Yahvé le será hostil
  rationale: El griego repite μισέω para el hablante y para la respuesta divina. El español conserva esa correspondencia semántica con 'aborrecerá', evitando atenuar el paralelismo por razones doctrinales. Se mantiene la tensión retórica del proverbio sapiencial.
  doctrine_reference: Translation philosophy §§1, 3, 6; contested divine-action language
translation_notes:
  revision_awareness: La revisión auditada no aplicó cambios; el texto inglés quedó sin modificaciones en el último pase. Se respeta esa estabilidad, pero la decisión española introduce 'Yahvé' según la terminología del proyecto, con justificación contextual desde el hebreo/trasfondo divino.
  spanish_consistency_notes:
  - Se evita 'Señor' como máscara automática del nombre divino, conforme a la terminología del proyecto.
  - Se usa 'aborrecer' para mantener la fuerza del griego μισέω en ambos miembros.
  - La frase 'me he hecho semejante a él' conserva el matiz comparativo/moral de ὁμοιόω sin sobreexplicar.
