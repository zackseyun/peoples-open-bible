  rationale: Se reemplaza 'entrará en esta ciudad' por 'vendrá a esta ciudad' para reflejar con mayor fidelidad el verbo hebreo יָבֹא repetido en la segunda cláusula. Se conserva la anáfora explícita 'por él' para representar בָּהּ. Se pule la nota alternativa para un español más natural sin perder el sentido de 'la misma ruta'.
