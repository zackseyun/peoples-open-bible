  rationale: LXX 사 40:6 인용에서 σάρξ는 「모든 죽을 인생」을 가리킨다. 「육체」로 옮기되 도덕적 부정의 σάρξ가 아님은 문맥으로 분명하다.
- source_word: ἄνθος χόρτου
  english_pob_choice: the flower of grass
  chosen_korean: 풀의 꽃
  alternatives_korean:
  - 풀에 핀 꽃
  lexicon: BDAG
  rationale: 셈어식 속격을 그대로 보존하여 시적 운율을 살린다.
theological_decisions:
- issue: 사 40:6-8 인용의 보존
  chosen_reading: '인용 부호로 묶고 OT citation 각주 표시; 1:24-25를 한 문장의 인용으로 처리'
  alternative_readings:
