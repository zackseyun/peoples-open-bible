translation:
  language: es
  text: y para todo el ofrecer holocaustos[a] a Yahvé en los sábados, en las lunas nuevas y en las fiestas señaladas, por número, conforme a la ordenanza acerca de ellos, continuamente delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para toda la presentación de holocaustos a Yahvé». El hebreo usa un infinitivo más el sustantivo «holocaustos» para expresar la acción sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  english_pob_choice: and for all
  chosen_spanish: y para todo
  alternatives_spanish:
  - y para todo lo concerniente a
  - y para todo
  lexicon: HALOT
  rationale: La construcción con וּלְ + כֹל introduce otro rubro del servicio levítico. «Y para todo» conserva la suma de obligaciones sin volver la frase innecesariamente pesada en español.
- source_word: הַעֲלוֹת עֹלוֹת
  english_pob_choice: the burnt offerings offered
  chosen_spanish: el subir de holocaustos
  alternatives_spanish:
  - la ofrenda de holocaustos
  - el ofrecer holocaustos
  lexicon: HALOT
  rationale: El hebreo usa un infinitivo de עלה con el sustantivo עֹלוֹת para expresar la acción ritual de presentar holocaustos. «Subir» mantiene el valor verbal de עלה; «holocaustos» preserva el término cultual para עֹלוֹת, aunque en español eclesial también podría decirse «ofrendas totalmente quemadas». Se conserva la tensión entre acto y ofrenda que el hebreo expresa.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יהוה: «Yahvé» en el texto principal, no una sustitución por «Señor». Con lenguaje sacrificial, «a Yahvé» expresa presentación directa de la ofrenda.'
- source_word: לַשַּׁבָּתוֹת
  english_pob_choice: on the Sabbaths
  chosen_spanish: para los sábados
  alternatives_spanish:
  - en los sábados
  - para los sábados
  lexicon: HALOT
  rationale: El plural hebreo apunta a las ocasiones sabáticas. «Para los sábados» conserva la referencia calendárico-cultual y mantiene el paralelismo con las otras fechas festivas.
- source_word: לֶחֳדָשִׁים
  english_pob_choice: at the new moons
  chosen_spanish: para las lunas nuevas
  alternatives_spanish:
  - en las lunas nuevas
  - para las nuevas lunas
  lexicon: HALOT
  rationale: En contexto litúrgico, חֳדָשִׁים se refiere a las observancias de luna nueva. «Lunas nuevas» es transparente y acorde con el uso bíblico de calendario.
- source_word: וְלַמֹּעֲדִים
  english_pob_choice: and at the appointed feasts
  chosen_spanish: y para las fiestas señaladas
  alternatives_spanish:
  - y para las fechas señaladas
  - y para las festividades señaladas
  lexicon: HALOT
  rationale: מוֹעֲדִים en esta serie cultual designa celebraciones fijadas. «Fiestas señaladas» comunica el carácter establecido del calendario sin perder la nota sacra.
- source_word: בְּמִסְפָּר
  english_pob_choice: by number
  chosen_spanish: por número
  alternatives_spanish:
  - en número
  - según el número
  lexicon: HALOT
  rationale: La preposición indica especificación numérica. «Por número» es conciso y cercano al hebreo, sin oscurecer el sentido administrativo.
- source_word: כְּמִשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al orden establecido
  alternatives_spanish:
  - según la ordenanza
  - conforme al juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí no es «juicio» judicial, sino norma prescrita para el culto. «Orden establecido» conserva la idea de regulación concreta sin sonar excesivamente técnica en español; se mantiene el matiz normativo que la POB inglesa expresó con «ordinance».
- source_word: עֲלֵיהֶם
  english_pob_choice: concerning them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - para ellos
  lexicon: HALOT
  rationale: La frase apunta a la regulación relativa a estas ofrendas/ocasiones. «Acerca de ellos» evita fijar de más el antecedente y refleja la referencia general del hebreo.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - de continuo
  - regularmente
  lexicon: HALOT
  rationale: El adverbio expresa continuidad cultual. «Continuamente» es natural en español y preserva la idea de regularidad permanente.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión fija un marco cultual de servicio en la presencia divina. «Delante de Yahvé» es literal y bíblicamente idiomático en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige preservar el nombre divino en forma auditable. «Yahvé» mantiene la distinción frente a sustitutos litúrgicos y sigue la decisión teológica ya documentada en el contexto inglés.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de כְּמִשְׁפָּט en un contexto cultual
  english_pob_reading: according to the ordinance
  chosen_spanish_reading: conforme al orden establecido
  alternative_spanish_readings:
  - según la ordenanza
  - según el juicio
  rationale: En este versículo, מִשְׁפָּט expresa norma ritual, no sentencia judicial. «Orden establecido» evita una traducción que en español podría sugerir un tribunal o un veredicto, pero conserva el carácter obligatorio y regulado del servicio.
  doctrine_reference: Uso cultual de מִשְׁפָּט en listas levíticas; coherencia semántica con el texto fuente
translation_notes:
  revision_awareness: El contexto inglés quedó sin cambios en la última revisión y obtuvo alta concordancia en la verificación cruzada. Esta versión española sigue la lectura aprobada, manteniendo la estructura enumerativa y la tensión hebrea entre la acción de «hacer subir» y la ofrenda de holocaustos, con el nombre divino renderizado como Yahvé según la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo Yahvé de forma consistente para יהוה.
  - Se prefirió «holocaustos» para עֹלוֹת por la equivalencia cultual estable, aunque se anotó una alternativa más descriptiva.
  - «Lunas nuevas» y «fiestas señaladas» conservan el registro calendárico-litúrgico del pasaje.
  - «Delante de Yahvé» mantiene el marco de presencia cultual sin desplazarlo a una paráfrasis más libre.
