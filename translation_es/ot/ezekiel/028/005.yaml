  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: la abundancia/grandeza de la sabiduría en contexto mercantil, el aumento de la riqueza y el corazón enaltecido por esa riqueza. También mantiene adecuadamente el valor contextual de חֵיל como riqueza y el modismo de orgullo en לְבָבְךָ. Sin embargo, una nota al pie introduce una alternativa duplicada e incorrectamente formulada frente al texto principal.'
  spanish_quality_summary: 'El español es claro, digno y natural. «Con la abundancia de tu sabiduría en tu comercio» es fiel, aunque algo pesado; sigue siendo aceptable. «Tu corazón se enalteció» funciona bien en registro bíblico moderno. El ajuste necesario es en la nota [a], que actualmente ofrece «en tu comercio» como alternativa aunque ya está en el texto; debe reflejar las alternativas auditadas: «por tu comercio» o «en tu actividad comercial».'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario general. La elección de «riqueza» para חֵיל y «se enalteció» para el modismo del corazón concuerda con la justificación léxica y teológica documentada.
  issues:
  - severity: medium
    issue: La nota [a] repite el mismo giro que aparece en el texto principal
    rationale: El texto dice «en tu comercio», pero la nota [a] ofrece «O «en tu comercio» o «por tu comercio»». Una nota de alternativa no debe repetir como alternativa exacta la lectura ya adoptada; además no reproduce bien la auditoría inglesa, que preserva alternativas distintas como «por tu comercio» o una formulación más explícita de actividad comercial.
  revised_spanish_text: Con la abundancia de tu sabiduría en tu comercio aumentaste tu riqueza[a][c], y tu corazón se enalteció[b] a causa de tu riqueza.
