translation:
  language: es
  text: La mujer era sumamente delicada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy refinada», «muy suave» o «muy hermosa en su delicadeza»; el adjetivo griego τρυφερά puede sugerir suavidad o refinamiento delicado, no necesariamente debilidad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Pero ... era
  alternatives_spanish:
  - Y ... era
  - Ahora ... era
  lexicon: LSJ
  rationale: δέ aquí funciona como un conector suave que avanza la narración. En español, «Pero» mantiene bien ese enlace discursivo sin volver demasiado fuerte la oposición; «era» reproduce el estado descriptivo.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». En este enunciado el foco está en describir a Susana misma, no en explicitar su relación con Joacim; por eso «la mujer» / «la mujer» en español natural es la opción más directa.
- source_word: τρυφερά
  english_pob_choice: delicate
  chosen_spanish: delicada
  alternatives_spanish:
  - refinada
  - suave
  - tierna
  - muy hermosa en su delicadeza
  lexicon: LSJ
  rationale: τρυφερός puede expresar suavidad, delicadeza o refinamiento. «Delicada» conserva esa idea de finura o suavidad sin introducir una connotación moral de debilidad ni una paráfrasis excesiva.
- source_word: σφόδρα
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - muy
  - grandemente
  - en extremo
  lexicon: BDAG
  rationale: σφόδρα intensifica con fuerza el adjetivo. «Sumamente» transmite bien esa intensificación en un registro digno y fluido en español.
