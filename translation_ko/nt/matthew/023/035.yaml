  text: ὅπως ἔλθῃ ἐφ’ ὑμᾶς πᾶν αἷμα δίκαιον ἐκχυννόμενον ἐπὶ τῆς γῆς ἀπὸ τοῦ αἵματος Ἅβελ τοῦ δικαίου ἕως τοῦ αἵματος Ζαχαρίου υἱοῦ Βαραχίου, ὃν ἐφονεύσατε μεταξὺ τοῦ ναοῦ καὶ τοῦ θυσιαστηρίου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/035.yaml
  text: so that upon you may come all the righteous blood being poured out on the earth[a], from the blood of righteous Abel to the blood of Zechariah son of Berechiah[b], whom you murdered between the sanctuary and the altar.
  footnotes:
  - marker: a
    text: Or 'on the land.' The Greek word can mean either 'earth' or 'land.'
    reason: lexical_alternative
  - marker: b
    text: The identity of 'Zechariah son of Berechiah' is debated. Some connect him with the prophet Zechariah; others with Zechariah son of Jehoiada (2 Chr 24:20–22). The translation follows the Greek text as written.
    reason: alternative_reading
translation:
  language: ko
  text: 그래서 의로운 아벨의 피로부터 너희가 성소와 제단 사이에서 죽인 베레갸의 아들 사가랴의 피에 이르기까지, 땅 위에 쏟긴 모든 의로운 피가 너희에게 임할 것이다.
  philosophy: optimal-equivalence
