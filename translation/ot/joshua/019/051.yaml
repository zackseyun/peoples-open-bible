theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered kinship expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  - the children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones when the source is grammatically masculine and representative. Here the formal expression is retained in the main text to reflect the Hebrew wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
