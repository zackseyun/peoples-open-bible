revisions:
- from: Entonces harán con él lo mismo que él había intentado hacer a su hermano[a]. Así extirparás el mal de en medio de ti.
  to: Entonces le harán lo mismo que él tenía pensado hacer a su hermano[a]. Así extirparás el mal de en medio de ti.
  rationale: Se ajusta 'לוֹ' a 'le harán' para reflejar mejor el dativo del hebreo en español natural. Se cambia 'había intentado' por 'tenía pensado' para evitar la idea de tentativa ya ejecutada y preservar el valor de intención/plan de זָמַם en este contexto legal. Se mantiene 'a su hermano' con nota, y se conserva 'Así extirparás el mal de en medio de ti' como una formulación aceptable y fuerte de la fórmula deuteronómica.
