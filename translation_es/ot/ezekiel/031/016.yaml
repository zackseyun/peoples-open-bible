translation:
  language: es
  text: Al estruendo de su caída hice temblar a las naciones, cuando lo hice bajar al Seol[a] con los que descienden a la fosa; y todos los árboles de Edén, lo escogido y lo mejor del Líbano, todos los que beben agua, fueron consolados en la tierra de abajo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro» o «al reino de los muertos» para «Seol».
    reason: lexical_alternative
  - marker: b
    text: O «fueron consolados» o «tomaron consuelo». El sentido puede ser que las potencias caídas hallaron un sombrío consuelo cuando este gran árbol también descendió.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la tierra inferior» o «la tierra de abajo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al oírse
  alternatives_spanish:
  - Por el sonido de
  - A causa del sonido de
  lexicon: HALOT
  rationale: קוֹל puede ser ‘sonido’ o ‘voz’; aquí, por el contexto de la caída de un árbol/imperio, ‘Al oírse’ transmite de modo natural el efecto desencadenado por el ruido de la caída y conserva la fuerza causal-temporal del hebreo.
- source_word: מַפַּלְתוֹ
  english_pob_choice: his fall
  chosen_spanish: su caída
  alternatives_spanish:
  - su derrumbe
  - su desplome
  lexicon: HALOT
  rationale: El sustantivo expresa la caída o derrumbe. ‘Su caída’ conserva la imagen y funciona bien tanto para la metáfora arbórea como para la lectura política del juicio.
- source_word: הִרְעַשְׁתִּי
  english_pob_choice: I made ... quake
  chosen_spanish: hice temblar
  alternatives_spanish:
  - hice estremecer
  - sacudí
  lexicon: HALOT
  rationale: 'El hifil es causativo: Dios provoca el temblor de las naciones. ‘Hice temblar’ mantiene esa causación en español y suena natural.'
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: En el contexto de juicio internacional de Ezequiel, גוים se refiere a naciones/pueblos en general. ‘Las naciones’ es la opción más directa y fiel.
- source_word: בְּהוֹרִדִי אֹתוֹ
  english_pob_choice: when I brought him down
  chosen_spanish: cuando lo hice bajar
  alternatives_spanish:
  - cuando lo bajé
  - al hacerlo descender
  lexicon: HALOT
  rationale: La construcción con infinitivo se vierte temporalmente. ‘Hice bajar’ conserva el matiz causativo de ירד en hifil sin volverse rígido en español.
- source_word: שְׁאוֹלָה
  english_pob_choice: to Sheol
  chosen_spanish: al Seol
  alternatives_spanish:
  - al sepulcro
  - al reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no reducir el concepto hebreo a ‘sepulcro’ ni imponer una interpretación posterior. ‘Al Seol’ preserva el mundo conceptual del texto.
- source_word: אֶת יֹרְדֵי בוֹר
  english_pob_choice: with those who go down to the pit
  chosen_spanish: con los que descienden a la fosa
  alternatives_spanish:
  - con los que bajan al pozo
  - con los que van bajando a la fosa
  lexicon: HALOT
  rationale: 'Aunque אֶת puede marcar objeto directo, aquí funciona mejor en sentido asociativo: ‘con’. ‘Descienden a la fosa’ mantiene el paralelismo con Seol y el lenguaje funerario/metafórico.'
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: la fosa
  alternatives_spanish:
  - el pozo
  - la cisterna
  lexicon: HALOT
  rationale: En poesía de juicio, בור alude a la fosa de la muerte, no a una cisterna literal. ‘Fosa’ conserva la imagen sepulcral en un español digno y claro.
- source_word: וַיִּנָּחֲמוּ
  english_pob_choice: were comforted
  chosen_spanish: fueron consolados
  alternatives_spanish:
  - se consolaron
  - tomaron consuelo
  lexicon: HALOT
  rationale: El nifal expresa recibir consuelo. ‘Fueron consolados’ conserva la pasiva y deja intacta la ironía del pasaje.
- source_word: בְּאֶרֶץ תַּחְתִּית
  english_pob_choice: in the earth beneath
  chosen_spanish: en la tierra de abajo
  alternatives_spanish:
  - en la tierra inferior
  - en la tierra baja
  lexicon: HALOT
  rationale: Literalmente es ‘en la tierra inferior/baja’. ‘La tierra de abajo’ reproduce la imagen espacial descendente sin introducir una cosmología ajena.
- source_word: כָּל עֲצֵי עֵדֶן
  english_pob_choice: all the trees of Eden
  chosen_spanish: todos los árboles de Edén
  alternatives_spanish:
  - todos los árboles del Edén
  lexicon: HALOT
  rationale: Se conserva la metáfora arbórea y la alusión a Edén de manera bastante literal, como en el texto fuente.
- source_word: מִבְחַר וְטוֹב לְבָנוֹן
  english_pob_choice: the choice and best of Lebanon
  chosen_spanish: la elección y lo mejor del Líbano
  alternatives_spanish:
  - lo escogido y lo mejor del Líbano
  - la parte escogida y mejor del Líbano
  lexicon: HALOT
  rationale: La frase appositiva se mantiene con valor de superlativo. ‘La elección y lo mejor’ conserva la cualidad selecta del hebreo sin sobreexplicar el giro.
- source_word: כָּל שֹׁתֵי מָיִם
  english_pob_choice: all that drink water
  chosen_spanish: todos los que beben agua
  alternatives_spanish:
  - todos los bebedores de agua
  - todos los que toman agua
  lexicon: HALOT
  rationale: La expresión es literalmente ‘todos los bebedores de agua’. ‘Todos los que beben agua’ respeta la personificación de los árboles y suena natural en español.
theological_decisions:
- issue: Renderización de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - sepulcro
  - reino de los muertos
  rationale: La transliteración preserva el término hebreo y su carga conceptual sin reducirlo a una sola interpretación doctrinal o imagética.
  doctrine_reference: Principio POB de primacía del original y preservación de tensión conceptual
- issue: El consuelo de los árboles/naciones en el inframundo
  english_pob_reading: were comforted
  chosen_spanish_reading: fueron consolados
  alternative_spanish_readings:
  - se consolaron
  - tomaron consuelo
  rationale: 'La versión conserva la imagen poética y la tensión teológica: el texto presenta a las potencias caídas recibiendo consuelo por la caída de otra grandeza, sin resolver más allá de lo que afirma el pasaje.'
  doctrine_reference: Principio POB de preservar la tensión teológica del texto
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail en inglés y la revisión más reciente, que no introdujo cambios. La redacción española busca equivalencia óptima, con conservación de las imágenes de caída, Seol/fosa y el consuelo irónico de las potencias caídas.
  spanish_consistency_notes:
  - Se usa ‘Seol’ de forma consistente para שְׁאוֹל, conforme al criterio POB.
  - Se usa ‘fosa’ para בור en contexto poético-funerario.
  - Se mantiene el orden y la imagen del paralelismo hebreo sin añadir explicaciones interpretativas al texto principal.
  - ‘Las naciones’ traduce גוים sin cargarlo con un sentido técnico posterior de ‘gentiles’.
