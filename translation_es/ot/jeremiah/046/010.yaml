base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/046/010.yaml
  text: That day belongs to the Lord GOD of Armies[a], a day of vengeance, to avenge himself on his foes. The sword will devour and be satisfied and drink its fill of their blood, for the Lord GOD of Armies has a sacrifice in the land of the north[b], by the Euphrates River.
  footnotes:
  - marker: a
    text: Or, 'for there is a sacrifice for the Lord GOD of Armies.' The Hebrew can be taken as an existential clause rather than the more idiomatic 'has a sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'LORD of hosts' for 'Lord GOD of Armies.'
    reason: lexical_alternative
