    text: 'Hebreo: «con él». Aunque el pronombre es singular, se refiere colectivamente a Israel; por eso en español se traduce por sentido como «ellos». También podría traducirse: «actuemos sabiamente con ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'O «y salir de la tierra». Hebreo literalmente: «y subir fuera de la tierra».'
    reason: lexical_alternative
  revision_rationale: Se corrige el referente colectivo para que el español no sugiera erróneamente un individuo, en línea con la decisión documentada del POB. También se añade en nota la alternativa léxica de נתחכמה y se hace más nítida la alternativa literal de ועלה מן הארץ. El resto del versículo se mantiene cercano al sentido fuente, con español natural y fiel.
