translation:
  language: es
  text: La quinta suerte salió para la tribu de los hijos de Aser[a], según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La quinta suerte fue sacada para la tribu de los hijos de Aser, según sus familias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió sorteada
  - fue sacada
  lexicon: HALOT
  rationale: El hebreo literalmente dice que la suerte ‘salió’. En español, ‘salió’ conserva la imagen del resultado que emerge sin introducir más interpretación del mecanismo. ‘Fue sacada’ acerca demasiado el texto a una pasiva explicativa; ‘salió sorteada’ explicita el procedimiento más de lo que el hebreo exige.
- source_word: הַגּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - azar
  lexicon: HALOT
  rationale: En castellano bíblico, ‘suerte’ comunica bien la noción de la porción determinada por sorteo y mantiene la imagen del reparto. ‘Lote’ puede sonar más técnico o moderno; ‘azar’ desplaza el sentido desde la práctica de echar suertes hacia la casualidad general.
- source_word: הַחֲמִישִׁי
  english_pob_choice: fifth
  chosen_spanish: quinta
  alternatives_spanish:
  - quinto
  lexicon: HALOT
  rationale: El ordinal concuerda con ‘suerte’ en femenino en español. El sentido es inequívocamente el de la quinta en orden.
- source_word: לְמַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: para la tribu de
  alternatives_spanish:
  - para la vara de
  - para la tribu
  lexicon: HALOT
  rationale: Aunque מַטֶּה puede significar literalmente ‘vara’ o ‘bastón’, en este contexto de reparto tribal el sentido establecido es ‘tribu’. ‘Para la tribu de’ conserva el valor contextual reconocido por la POB inglesa y su naturalidad en español.
- source_word: בְנֵי אָשֵׁר
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Asher
  alternatives_spanish:
  - los hijos varones de Asher
  - los descendientes de Asher
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica del hebreo. ‘Hijos de Asher’ es natural en español bíblico y mantiene la estructura formal del original mejor que una expansión a ‘descendientes’.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת en este contexto designa agrupaciones internas de la tribu, no solo familias en sentido amplio. ‘Clanes’ preserva esa diferenciación social y el valor distributivo de לְ mejor que ‘familias’."
theological_decisions:
- issue: Estructura de sorteo como medio de asignación territorial
  english_pob_reading: The fifth lot came out ... according to their clans.
  chosen_spanish_reading: La quinta suerte salió ... según sus clanes.
  alternative_spanish_readings:
  - La quinta suerte fue sacada ...
  - La quinta porción correspondió ...
  rationale: No se suaviza la imagen del sorteo hacia una formulación abstracta como ‘correspondió’, porque el hebreo y la POB inglesa preservan explícitamente el lenguaje del sorteo. La opción elegida mantiene la transparencia del proceso narrativo y evita borrar la acción divina providencial implícita en el reparto por suertes.
  doctrine_reference: Josué 18–19; reparto por suertes en la distribución de la tierra
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden estrechamente; no se documentan revisiones aplicadas en el expediente. La traducción española sigue el valor literal-contextual de יצא y גורל, manteniendo la fórmula de reparto por clanes sin expandirla.
  spanish_consistency_notes:
  - Se usa ‘suerte’ para גורל en coherencia con el lenguaje bíblico de sorteo, y no ‘lote’ ni ‘allotment’.
  - Se conserva ‘los hijos de Asher’ para reflejar la genealogía tribal del hebreo.
  - ‘Clanes’ se emplea para מִשְׁפְּחוֹת, distinguiéndolo de ‘familias’ en sentido general.
  - La nota al pie marca una alternativa verbal, no una variante textual.
