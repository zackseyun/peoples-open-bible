    reason: lexical_alternative
  revision_rationale: Se ajusta «vaya» a «venga» para reflejar mejor בָא según la decisión léxica auditada y la perspectiva de acercamiento del hebreo. Se afina «¿Cuál es su nombre?» a «¿Qué nombre tiene?» para acercarse más a la forma directa de מַה שְּׁמוֹ sin perder naturalidad en español. El resto del borrador es fiel y legible.
