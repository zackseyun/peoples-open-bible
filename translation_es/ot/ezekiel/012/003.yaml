  rationale: Se revisa para restaurar el sentido explícito de destierro/exilio en las dos ocurrencias de גלה y para reemplazar «útiles» por una expresión más natural y precisa en español. Se conserva «hijo de hombre», la repetición de la visibilidad pública y la ambigüedad de «vean».
