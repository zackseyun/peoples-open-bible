translation:
  language: es
  text: He aquí[a] que he hecho tu rostro firme ante sus rostros, y tu frente firme ante sus frentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «duro» en ambos miembros; el hebreo puede expresar firmeza o dureza frente a la oposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, pues
  lexicon: HALOT
  rationale: La fórmula introduce una declaración solemne y enfática. «He aquí» conserva mejor ese tono que una forma más coloquial, y es natural en español bíblico sin sonar arcaica en exceso.
- source_word: נָתַתִּי
  english_pob_choice: I have made
  chosen_spanish: he hecho
  alternatives_spanish:
  - he dado
  - he puesto
  lexicon: HALOT
  rationale: 'Aunque el verbo básico es «dar», en esta construcción con partes del cuerpo y un adjetivo expresa causación: Dios hace que el rostro y la frente sean firmes. «He hecho» comunica bien ese valor causal en español.'
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu semblante
  lexicon: HALOT
  rationale: «Rostro» mantiene el registro bíblico y la imagen corporal sin perder naturalidad. «Cara» suena menos solemne; «semblante» puede sugerir más aspecto que cara física.
- source_word: חֲזָקִים
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - duro
  - firme
  lexicon: HALOT
  rationale: El adjetivo admite la idea de fuerza o dureza. «Fuerte» conserva la fuerza literal y la posibilidad de firmeza frente a la oposición, sin cargar de inmediato la connotación negativa de «duro».
- source_word: לְעֻמַּת
  english_pob_choice: against
  chosen_spanish: frente a
  alternatives_spanish:
  - contra
  - opuesto a
  lexicon: HALOT
  rationale: La expresión marca colocación en confrontación. «Frente a» reproduce bien la idea de estar puesto de cara a otros, y en español permite conservar la imagen corporal del hebreo. «Contra» enfatiza más el conflicto que la disposición frente a frente.
- source_word: פְּנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus semblantes
  lexicon: HALOT
  rationale: Se mantiene la pluralidad y la imagen paralela del hebreo. «Rostros» armoniza con «rostro» en la primera cláusula y suena digno en el registro bíblico.
- source_word: מִצְחֲךָ
  english_pob_choice: your forehead
  chosen_spanish: tu frente
  alternatives_spanish:
  - tu frente
  - tu ceño
  lexicon: HALOT
  rationale: «Frente» es el equivalente natural y concreto para el hebreo, y conserva la metáfora visible de firmeza. «Ceño» introduciría una zona distinta del rostro y sería menos exacto.
- source_word: חָזָק
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - duro
  - firme
  lexicon: HALOT
  rationale: Se repite el mismo adjetivo y conviene mantener la correspondencia. «Fuerte» preserva el paralelismo de la primera mitad del versículo.
- source_word: מִצְחָם
  english_pob_choice: their foreheads
  chosen_spanish: sus frentes
  alternatives_spanish:
  - sus frentes
  - sus ceños
  lexicon: HALOT
  rationale: Se conserva la imagen exacta del hebreo y el paralelismo con «tu frente». La repetición subraya la confrontación firmemente sostenida.
theological_decisions:
- issue: Imagen corporal de firmeza otorgada por Dios
  english_pob_reading: Render as concrete bodily imagery ('face,' 'forehead') expressing God-given firmness in prophetic confrontation.
  chosen_spanish_reading: Mantener la imagen concreta de «rostro» y «frente» para expresar la firmeza profética dada por Dios.
  alternative_spanish_readings:
  - Parafrasear como «te he vuelto obstinado contra ellos»
  - Interpretar solo como una actitud interior sin las imágenes corporales
  rationale: El hebreo presenta una metáfora corporal que conviene conservar. Así se refleja la dureza de la oposición y, a la vez, se evita atribuir a Ezequiel una obstinación pecaminosa o un sentido excesivamente abstracto que el texto no exige.
  doctrine_reference: Principio de fidelidad al texto fuente y preservación de la imagen literaria.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la fórmula enfática inicial, conserva la metáfora corporal de rostro y frente, y refleja la misma decisión de traducir נָתַתִּי con un valor causal («he hecho») en vez de un simple «he dado».'
  spanish_consistency_notes:
  - Se usó «rostro»/«frente» de manera consistente para preservar el paralelismo hebreo.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo un registro bíblico contemporáneo, comprensible para lectura pública y estudio.
  - La nota de alternativa se ancla en la tensión léxica fuerte/duro documentada en el POB inglés.
