translation:
  language: es
  text: Pero si no nos escuchan[a] y no se circuncidan[b], entonces tomaremos a nuestra hija y nos iremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no nos oyen» o «no nos hacen caso». שׁמע con אֶל puede significar escuchar, prestar atención o hacer caso; se prefirió «escuchan» por ser la opción más directa en español.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «para ser circuncidados» o «a circuncidarse». El infinitivo hebreo expresa la acción requerida al escucharles; en español se formuló como coordinación para conservar el sentido con naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La conjunción abre una condición con valor contrastivo respecto de la oferta anterior; «Pero si» conserva ese matiz adversativo de manera natural en español.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - 'no'
  lexicon: HALOT
  rationale: Negación simple y directa del verbo siguiente.
- source_word: תִשְׁמְעוּ אֵלֵינוּ
  english_pob_choice: you will not listen to us
  chosen_spanish: no nos escuchan
  alternatives_spanish:
  - no nos oyen
  - no nos hacen caso
  - no nos obedecen
  lexicon: HALOT
  rationale: שׁמע con אֶל/אלינוּ expresa oír/escuchar con atención; «escuchar» es la equivalencia más directa y pública en español. «Nos hacen caso» o «nos obedecen» explicitan más de lo que el hebreo inmediato dice.
- source_word: לְ/הִמּוֹל
  english_pob_choice: to be circumcised
  chosen_spanish: para ser circuncidados
  alternatives_spanish:
  - a ser circuncidados
  - para circuncidarse
  - con miras a la circuncisión
  lexicon: HALOT
  rationale: El infinitivo constructo de מול expresa la acción requerida. En español, «para ser circuncidados» preserva el valor final/condicional y la pasiva/reflexiva del acto sin convertirlo en instrumento de escucha.
- source_word: וְ/לָקַחְנוּ
  english_pob_choice: then we will take
  chosen_spanish: entonces tomaremos
  alternatives_spanish:
  - y tomaremos
  - luego tomaremos
  lexicon: HALOT
  rationale: El waw con perfecto funciona como continuación consecuente de la condición; «entonces» transmite bien la consecuencia futura en español.
- source_word: אֶת בִּתֵּנוּ
  english_pob_choice: our daughter
  chosen_spanish: a nuestra hija
  alternatives_spanish:
  - a nuestra hija
  - nuestra hija
  lexicon: HALOT
  rationale: El objeto directo con אֶת se expresa naturalmente con «a». En contexto se refiere a Dina, pero el texto hebreo dice literalmente «nuestra hija».
- source_word: וְ/הָלָכְנוּ
  english_pob_choice: and go
  chosen_spanish: nos iremos
  alternatives_spanish:
  - iremos
  - partiremos
  - nos marcharemos
  lexicon: HALOT
  rationale: הלך aquí tiene sentido de irse/retirarse; «nos iremos» refleja el movimiento de salida con naturalidad y sin añadir una glosa más fuerte que el hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado revisado del POB inglés, que separa con coma la frase infinitiva («listen to us, to be circumcised») para conservar la estructura del hebreo. En español se reflejó esa misma relación con una coma y una frase final («para ser circuncidados»), evitando la idea instrumental incorrecta descartada en la revisión anterior.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, conforme al estándar del proyecto.
  - Se evitó «obedecer» porque el hebreo inmediato de שׁמע enfatiza escuchar/atender más que obedecer de forma explícita.
  - «ser circuncidados» conserva la voz pasiva/reflexiva implícita y evita una paráfrasis excesiva.
  - El pronombre posesivo se adaptó al contexto narrativo como «nuestra hija», en paralelo con el inglés POB y el hebreo literal.
  - Se mantuvo un tono bíblico moderno y legible, sin recurrir a un registro arcaizante.
