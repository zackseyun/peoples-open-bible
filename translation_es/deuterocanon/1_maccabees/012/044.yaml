translation:
  language: es
  text: 'Y le dijo a Jonatán[a]: «¿Por qué has abatido a todo este pueblo, cuando ninguna guerra nos amenaza?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «¿Por qué has cortado/abatido a todo este pueblo, no estando la guerra presente para nosotros?». La formulación es algo abrupta en griego; la traducción la hace más natural en español sin perder el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνα τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Por qué razón
  lexicon: LSJ
  rationale: 'La secuencia interrogativa griega es abrupta; en español, la forma natural y fiel al sentido es una pregunta simple de causa: «¿Por qué?». Evita reproducir la rareza sintáctica sin perder el valor interrogativo.'
- source_word: ἔκοψας
  english_pob_choice: have you cut down
  chosen_spanish: has abatido
  alternatives_spanish:
  - has derribado
  - has cortado
  - has destruido
  lexicon: LSJ
  rationale: En contexto bélico, κόπτω puede expresar herir o derribar violentamente. «Abatido» comunica la idea de derribo o aniquilación de personas sin forzar más allá del griego ni sonar demasiado literal en español.
- source_word: πάντα τὸν λαὸν τοῦτον
  english_pob_choice: all this people
  chosen_spanish: todo este pueblo
  alternatives_spanish:
  - todo este pueblo
  - a todo este pueblo
  - a todo este pueblo entero
  lexicon: LSJ
  rationale: λαός significa «pueblo» y aquí lleva un demostrativo singular. En español, «todo este pueblo» conserva la referencia colectiva y la cercanía del demostrativo, con un registro natural y bíblico.
- source_word: πολέμου μὴ ἐνεστῶτος ἡμῖν
  english_pob_choice: when no war is pressing upon us
  chosen_spanish: cuando no hay guerra sobre nosotros
  alternatives_spanish:
  - cuando la guerra no está sobre nosotros
  - mientras no nos acecha la guerra
  - cuando no se nos ha presentado la guerra
  lexicon: LSJ
  rationale: El participio de ἐνίστημι con πολέμου y dativo expresa la ausencia de una guerra presente o encima de ellos. «No hay guerra sobre nosotros» conserva la fuerza de amenaza inmediata del griego sin introducir una lectura demasiado interpretativa.
- source_word: τῷ Ἰωναθάν
  english_pob_choice: to Jonathan
  chosen_spanish: a Jonatán
  alternatives_spanish:
  - a Jonathan
  lexicon: LSJ
  rationale: Se adapta el nombre al uso español bíblico «Jonatán», manteniendo la identificación directa del destinatario del discurso.
translation_notes:
  revision_awareness: El contexto inglés pasó de «cut off» a «cut down» para afinar el matiz violento de κόπτω en contexto militar. La versión española sigue esa revisión con «abatido», que conserva el golpe físico/letal sin sobretraducir ni suavizar el verbo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se usa «Jonatán» como forma castellana estándar del nombre propio bíblico.
  - No se añade vocabulario doctrinal ajeno al versículo; la frase final reproduce la relación de guerra presente/ausente del griego con naturalidad española.
