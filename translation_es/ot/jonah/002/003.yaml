    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural en español. Se corrige la nota [a] para alinearla con la evidencia fuente y con el audit trail inglés: debe comentar «vientre» (מִבֶּטֶן) y preservar la alternativa léxica «matriz», no introducir una observación sobre «desde mi angustia» ni anclarse en «Y dijo». Se mantiene la nota sobre «Sheol» y el uso de «Yahvé» conforme a la terminología del proyecto.'
