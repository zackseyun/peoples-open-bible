translation:
  language: es
  text: Mira[a], la mano de Yahvé no es demasiado corta para salvar[b], ni su oído está demasiado embotado para oír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí» o «Ciertamente» para la partícula inicial.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «La mano de Yahvé no se ha acortado para salvar, ni su oído se ha hecho pesado para oír».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - He aquí
  - Ciertamente
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática y llama la atención sobre lo que sigue. «¡Mira!» comunica esa fuerza discursiva en español moderno con naturalidad; «He aquí» sería más literal pero más marcado como arcaico.
- source_word: קָצְרָה
  english_pob_choice: is ... too short
  chosen_spanish: no es demasiado corta
  alternatives_spanish:
  - no es corta
  - no se ha acortado
  - está demasiado corta
  lexicon: HALOT
  rationale: Con «mano» como sujeto, el hebreo expresa incapacidad o insuficiencia mediante la metáfora de la longitud. «No es demasiado corta» preserva esa imagen sin volverla una abstracción.
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - fuerza
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica concreta del texto hebreo, en vez de explicarla como «poder».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el término de proyecto para el nombre divino, preservando el Tetragrámaton con una forma española reverente y auditables. «Yahvé» corresponde a la convención indicada para el texto principal.
- source_word: מֵהוֹשִׁיעַ
  english_pob_choice: to save
  chosen_spanish: para salvar
  alternatives_spanish:
  - de salvar
  - para librar
  - para rescatar
  lexicon: HALOT
  rationale: 'La construcción con infinitivo expresa incapacidad o límite: «no es demasiado corta para salvar». «Salvar» reproduce directamente el verbo hebreo y encaja mejor que una paráfrasis.'
- source_word: כָבְדָה
  english_pob_choice: is too dull
  chosen_spanish: es demasiado pesado
  alternatives_spanish:
  - es demasiado torpe
  - está demasiado adormecido
  - es demasiado duro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ser pesado»; con «oído» conserva la metáfora semítica del órgano que no responde con facilidad. Aunque en español suena más idiomático «sordo» o «dull», se mantiene la metáfora por fidelidad al texto y al paralelismo con «mano». Se deja la tensión semántica documentada en la nota.
- source_word: אָזְנוֹ
  english_pob_choice: his ear
  chosen_spanish: su oído
  alternatives_spanish:
  - su oído
  - su oreja
  lexicon: HALOT
  rationale: «Oído» mantiene el sentido fisiológico-funcional del hebreo y su paralelismo con «mano», sin introducir una imagen menos natural en español como «oreja».
- source_word: מִשְּׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - de oír
  - para escuchar
  lexicon: HALOT
  rationale: Completa el giro «su oído no es demasiado pesado para oír». «Oír» corresponde de manera directa al verbo hebreo; «escuchar» añadiría una matización voluntaria que el texto no exige.
theological_decisions:
- issue: Cómo traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el nombre del pacto. Se evita la sustitución por un título en mayúsculas y se conserva el nombre divino conforme a la guía del proyecto, manteniendo transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservar la metáfora corporal en vez de una explicación abstracta
  english_pob_reading: hand / ear ... too short / too dull
  chosen_spanish_reading: mano ... no es demasiado corta / oído ... no es demasiado pesado
  alternative_spanish_readings:
  - poder ... no es insuficiente / no está sordo
  - capacidad ... no falla
  rationale: La línea hebrea usa paralelismo y metáforas corporales para afirmar la capacidad de Yahvé para salvar y oír. La traducción mantiene esas imágenes en lugar de convertirlas en una explicación abstracta, para no perder el recurso retórico ni la fuerza poética.
  doctrine_reference: 'Poética bíblica: paralelismo sinónimo y antropomorfismo legítimo'
translation_notes:
  revision_awareness: El inglés auditado pasó de «too heavy» a «too dull» para naturalidad; en español se optó por mantener la metáfora base del hebreo («pesado») para preservar el paralelismo original y documentar la tensión semántica en la nota. Se siguió además la decisión establecida de renderizar el nombre divino como Yahvé. El resultado conserva el sentido completo sin perder la imagen corporal del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el criterio del proyecto.
  - Se conserva la metáfora corporal «mano/oído» en vez de sustituirla por «poder/capacidad», para respetar el paralelismo hebreo.
  - «Oír» se usa como equivalente directo de מִשְּׁמֹעַ, sin introducir «escuchar» como matiz volitivo no explícito.
  - La nota [b] explicita la forma más literal y preserva la tensión entre una versión idiomática y la metáfora semítica del texto.
