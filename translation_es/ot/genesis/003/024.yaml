base_translation:
  language: en
  yaml_path: translation/ot/genesis/003/024.yaml
  text: So he drove out the man[a], and to the east of the garden of Eden he stationed the cherubim and the flame of the sword that turns every way[b], to guard the way to the tree of life.
  footnotes:
  - marker: a
    text: Or 'east of the garden of Eden' or 'on the east side of the garden of Eden.' The Hebrew expression refers to the eastern side/front of the garden.
    reason: lexical_alternative
  - marker: b
    text: Traditionally rendered 'the flaming sword that turned every way.' The Hebrew is more literally 'the flame of the sword that turns itself/turns every way.'
    reason: lexical_alternative
