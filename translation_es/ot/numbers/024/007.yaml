translation:
  language: es
  text: El agua fluirá de sus cubos[a], y su simiente[b] estará en muchas aguas; su rey será más alto que Agag, y su reino será exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «de sus ramas», si el sustantivo se entiende metafóricamente y no en su sentido habitual de «cubos».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «descendencia» o «posteridad»; el hebreo puede evocar tanto progenie como imaginería de fertilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזַּל
  english_pob_choice: will flow
  chosen_spanish: fluirá
  alternatives_spanish:
  - goteará
  - se derramará
  lexicon: HALOT
  rationale: נזל expresa un fluir o correr de líquido; «fluirá» conserva la imagen de movimiento continuo sin debilitarla como «goteará», y sin añadir la intensidad de «se derramará».
- source_word: מַיִם
  english_pob_choice: Water
  chosen_spanish: El agua
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: Aunque el hebreo usa forma plural, en español «el agua» funciona como sustantivo colectivo natural. Mantiene el sentido básico sin forzar un plural idiomático.
- source_word: מִדָּלְיוֹ
  english_pob_choice: from his buckets
  chosen_spanish: de sus cubos[a]
  alternatives_spanish:
  - de sus baldes
  - de sus ramas
  lexicon: HALOT
  rationale: דלי denota normalmente un cubo o balde para sacar agua. «Cubos» conserva el sentido léxico directo; la lectura metafórica «ramas» queda registrada como alternativa textual/lexical en la nota.
- source_word: וְזַרְעוֹ
  english_pob_choice: and his seed
  chosen_spanish: su descendencia[b]
  alternatives_spanish:
  - su simiente
  - sus hijos
  lexicon: HALOT
  rationale: זֶרַע puede abarcar semilla, prole o descendencia. En español, «descendencia» comunica claramente la posible referencia genealógica y evita una expresión ambigua como «simiente»; la nota conserva la amplitud poética del término.
- source_word: בְּמַיִם רַבִּים
  english_pob_choice: in abundant waters
  chosen_spanish: en muchas aguas
  alternatives_spanish:
  - junto a muchas aguas
  - en aguas abundantes
  lexicon: HALOT
  rationale: La preposición ב aquí puede expresar ubicación. «En muchas aguas» sigue de cerca el hebreo y sugiere un ambiente de abundancia y fertilidad; «aguas abundantes» sería más explicativo, pero menos directo.
- source_word: וְיָרֹם
  english_pob_choice: will be higher
  chosen_spanish: será más alto
  alternatives_spanish:
  - será exaltado
  - subirá
  lexicon: HALOT
  rationale: רוּם conserva el sentido de altura. «Más alto» reproduce el comparativo del hebreo frente a Agag y mantiene la imagen, mientras que «será exaltado» ya aparece en el miembro paralelo siguiente.
- source_word: מֵאֲגַג
  english_pob_choice: than Agag
  chosen_spanish: que Agag
  alternatives_spanish:
  - por encima de Agag
  lexicon: HALOT
  rationale: Después de una comparación de altura, español pide normalmente «más alto que». Agag se deja como nombre propio sin interpretación adicional.
- source_word: מַלְכּוֹ
  english_pob_choice: his king
  chosen_spanish: su rey
  alternatives_spanish:
  - su soberano
  - su monarca
  lexicon: HALOT
  rationale: מֶלֶךְ significa «rey». En español, «su rey» preserva la relación posesiva y la sencillez del hebreo sin especificar un referente histórico que el texto no nombra.
- source_word: וְתִנַּשֵּׂא
  english_pob_choice: will be exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - será levantado
  - será enaltecido
  lexicon: HALOT
  rationale: נשא en esta forma expresa elevación/exaltación. «Será exaltado» es la opción más natural y mantiene el paralelismo con la línea anterior.
- source_word: מַלְכֻתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su dominio real
  lexicon: HALOT
  rationale: מַלְכוּת denota reino, reinado o realeza. «Su reino» es la opción más clara y estándar en español, y preserva el alcance político-corporativo del término.
theological_decisions:
- issue: Alcance de «su descendencia»
  english_pob_reading: Retained as 'his seed' without specifying whether it refers to agricultural fertility, descendants, or both.
  chosen_spanish_reading: «Su descendencia» sin precisar si el verso mira a la fecundidad agrícola, a la prole, o a ambas cosas.
  alternative_spanish_readings:
  - su simiente
  - sus hijos
  - su posteridad
  rationale: El hebreo זרע sostiene una ambigüedad deliberada entre imagen de fertilidad y descendencia humana. La traducción no resuelve esa tensión y usa una palabra española amplia que permite ambas lecturas.
  doctrine_reference: Translation philosophy §3
- issue: Identidad del rey y relación con Agag
  english_pob_reading: Translated generically as 'his king will be higher than Agag' without identifying the king as Saul, David, the Messiah, or another figure.
  chosen_spanish_reading: «Su rey será más alto que Agag» sin identificar a ese rey como Saúl, David, el Mesías u otra figura.
  alternative_spanish_readings:
  - anticipación de la monarquía de Israel
  - lectura tipológica mesiánica
  rationale: El texto no especifica la identidad del rey; la versión conserva la formulación abierta para no importar una conclusión histórica o doctrinal no explicitada en el versículo.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del POB inglés en la preferencia por una preposición locativa directa en la segunda colon: «en muchas aguas», manteniendo la imagen de abundancia sin convertirla en paráfrasis. También conserva la decisión revisada de no explicitar el referente de «seed».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no se presenta.
  - «Mesías» no se introduce porque el hebreo aquí habla de un rey de forma genérica y el audit trail inglés evitó una identificación doctrinal.
  - Se evita «siervo» para דלי porque el contexto inmediato es de recipientes de agua, y la alternativa metafórica queda documentada en nota.
  - «Descendencia» se usa como equivalente español amplio de זרע para preservar la doble resonancia genealógica y agrícola.
  - 'El paralelismo poético se conserva con dos miembros de exaltación: «más alto que Agag» / «será exaltado».'
