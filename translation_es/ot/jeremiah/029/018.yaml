translation:
  language: es
  text: Y los perseguiré con la espada, con hambre y con peste; y los haré un horror[a] para todos los reinos de la tierra, una maldición, una desolación, objeto de silbidos[b] y oprobio entre todas las naciones adonde los he expulsado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un terror». El hebreo puede denotar horror, terror o estremecimiento; aquí describe que llegarán a ser objeto de espanto ante los reinos.
    reason: lexical_alternative
  - marker: b
    text: O «un silbido», es decir, objeto de burla y desprecio expresados con silbidos o chiflidos escarnecedores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָדַפְתִּי אַחֲרֵיהֶם
  english_pob_choice: And I will pursue them
  chosen_spanish: Y los perseguiré
  alternatives_spanish:
  - Y los buscaré persiguiéndolos
  - Y los acosaré
  lexicon: HALOT
  rationale: רָדַף con אַחֲרֵי expresa perseguir/correr tras alguien. «Perseguiré» conserva el impulso activo y continuo sin introducir una idea más específica como «acosar».
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: La preposición instrumental en contexto de juicio se vierte naturalmente con «con» en español. «Espada» mantiene la imagen concreta del juicio militar.
- source_word: בָּרָעָב
  english_pob_choice: with famine
  chosen_spanish: con el hambre
  alternatives_spanish:
  - con la hambruna
  - por hambre
  lexicon: HALOT
  rationale: Aunque «hambruna» es posible, «hambre» conserva mejor la brevedad del trío profético y puede abarcar la calamidad colectiva. Se mantiene el sentido de escasez extrema sin alargar demasiado la expresión.
- source_word: וּבַדָּבֶר
  english_pob_choice: and with pestilence
  chosen_spanish: y con la peste
  alternatives_spanish:
  - y con la pestilencia
  - y con la plaga
  lexicon: HALOT
  rationale: דֶּבֶר designa una enfermedad devastadora de juicio. «Peste» es el equivalente más natural y tradicional en español bíblico para ese campo semántico, sin rebajar el peso de la calamidad.
- source_word: וּנְתַתִּים לְזַוֲעָה
  english_pob_choice: and I will make them a horror
  chosen_spanish: y los haré un horror
  alternatives_spanish:
  - y los haré un terror
  - y los convertiré en objeto de horror
  lexicon: HALOT
  rationale: El valor de זועה es el de un objeto de espanto o estremecimiento. «Un horror» reproduce la función nominal del hebreo y mantiene la tensión entre horror/terror que el POB inglés documenta.
- source_word: לְכֹל מַמְלְכֹת הָאָרֶץ
  english_pob_choice: to all the kingdoms of the earth
  chosen_spanish: para todos los reinos de la tierra
  alternatives_spanish:
  - entre todos los reinos de la tierra
  - ante todos los reinos de la tierra
  lexicon: HALOT
  rationale: El lamed expresa relación/resultando en efecto público. «Para» funciona bien en español como marca de propósito/resultado en una lista de predicativos, sin forzar una localización estricta.
- source_word: לְאָלָה
  english_pob_choice: a curse
  chosen_spanish: por maldición
  alternatives_spanish:
  - como maldición
  - para maldición
  lexicon: HALOT
  rationale: En la serie de sustantivos de vergüenza pública, «maldición» es la forma más directa. Se usa «por» para reflejar el encadenamiento de resultados/predicativos en español.
- source_word: וּלְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: por desolación
  alternatives_spanish:
  - como desolación
  - por devastación
  lexicon: HALOT
  rationale: שַׁמָּה expresa desolación/arruinamiento. «Desolación» preserva la distinción con los otros términos de vergüenza y calamidad.
- source_word: וְלִשְׁרֵקָה
  english_pob_choice: an object of hissing
  chosen_spanish: por objeto de silbido
  alternatives_spanish:
  - por objeto de silbidos
  - por silbido
  lexicon: HALOT
  rationale: שְׁרֵקָה alude al silbido burlón o de desprecio. «Objeto de silbido» conserva la idea de ser blanco de la burla, aunque es menos idiomático que «silbidos»; se elige por cercanía semántica al inglés POB y al hebreo.
- source_word: וּלְחֶרְפָּה
  english_pob_choice: and a reproach
  chosen_spanish: y por oprobio
  alternatives_spanish:
  - y por afrenta
  - y por reproche
  lexicon: HALOT
  rationale: חֶרְפָּה implica vergüenza pública, reproche y deshonra. «Oprobio» recoge bien esa carga de deshonra pública en un registro bíblico digno.
- source_word: בְּכָל הַגּוֹיִם
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - en medio de todas las naciones
  - entre todos los pueblos
  lexicon: HALOT
  rationale: '«Entre» reproduce mejor el valor social y relacional del hebreo: su condición de vergüenza será visible en medio de las naciones.'
- source_word: אֲשֶׁר הִדַּחְתִּים שָׁם
  english_pob_choice: where I have driven them
  chosen_spanish: adonde los he arrojado
  alternatives_spanish:
  - adonde los he dispersado
  - adonde los he echado
  lexicon: HALOT
  rationale: הִדַּחְתִּים expresa expulsar/arrojar lejos, con la fuerza de dispersión del exilio. «He arrojado» mantiene la agencia divina explícita y la violencia del verbo, sin suavizarla a una mera dispersión.
theological_decisions:
- issue: Agencia divina explícita en el juicio y el exilio
  english_pob_reading: 'Retain explicit first-person divine actions: ''I will pursue,'' ''I will make,'' ''I have driven.'''
  chosen_spanish_reading: 'Mantener los verbos en primera persona divina: «los perseguiré», «los haré», «los he arrojado».'
  alternative_spanish_readings:
  - pasivas o impersonales como «serán perseguidos»
  - formas atenuadas como «los dejaré»
  rationale: El hebreo atribuye directamente a Yahvé tanto el castigo como la dispersión. La traducción conserva esa afirmación sin suavizarla, porque forma parte del sentido teológico del pasaje.
  doctrine_reference: Translation philosophy §3
- issue: Tensión léxica entre horror/terror y burla pública
  english_pob_reading: a horror ... an object of hissing ... a reproach
  chosen_spanish_reading: «un horror ... por objeto de silbido ... por oprobio»
  alternative_spanish_readings:
  - «un terror ... por objeto de burla ... por vergüenza»
  - «un espanto ... por objeto de escarnio ... por afrenta»
  rationale: El hebreo acumula términos distintos de vergüenza y desprecio. La versión española preserva esa serie sin fundirla en una sola idea general.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se siguió de cerca el cierre de alta concordancia del audít de inglés POB (status: high_agreement; verdict: agree), sin cambios de contenido respecto del trazo inglés. La única adaptación principal es la selección de equivalentes españoles naturales que preservan la serie hebrea de juicio y vergüenza pública.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito mediante la primera persona divina, conforme al estilo del proyecto cuando el hebreo habla en primera persona.
  - «Espada / hambre / peste» conserva el trío profético de juicio sin introducir explicaciones.
  - 'Se prefirió un registro bíblico actual pero digno: «oprobio», «desolación», «silbido».'
  - No se sustituyó «silbido» por una paráfrasis más amplia para preservar la metáfora de burla auditiva del hebreo.
