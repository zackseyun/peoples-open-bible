    text: Or 'from his lair.' The Hebrew term refers to dense cover or tangled brush from which a lion emerges.
    reason: lexical_alternative
  - marker: b
    text: Or 'Your cities will be laid waste, with no one dwelling in them.'
    reason: lexical_alternative
