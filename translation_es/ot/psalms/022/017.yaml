translation:
  language: es
  text: Porque perros me han rodeado[a]; una banda de malhechores me ha cercado; como un león están mis manos y mis pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los Manuscritos del Mar Muerto, la Septuaginta y muchas traducciones leen: «me horadaron las manos y los pies» o «me perforaron las manos y los pies», en lugar del difícil texto masorético: «como un león están mis manos y mis pies».'
    reason: textual_variant
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o causal del lamento; «Porque» preserva la fuerza discursiva sin forzar una interpretación más fuerte que el hebreo.
- source_word: סְבָבוּנִי
  english_pob_choice: have surrounded me
  chosen_spanish: me han rodeado
  alternatives_spanish:
  - me rodearon
  - me han cercado
  lexicon: HALOT
  rationale: El verbo expresa rodear/encerrar; el perfecto se rinde de forma natural con valor actual de un acto hostil ya completado.
- source_word: כְּלָבִים
  english_pob_choice: dogs
  chosen_spanish: perros
  alternatives_spanish:
  - canes
  lexicon: HALOT
  rationale: Se conserva la imagen literal de animales despreciados y hostiles, sin interpretarla ni suavizarla.
- source_word: עֲדַת מְרֵעִים
  english_pob_choice: a company of evildoers
  chosen_spanish: una compañía de malhechores
  alternatives_spanish:
  - una asamblea de malvados
  - un grupo de perversos
  lexicon: HALOT
  rationale: עֲדַת indica un conjunto reunido; מְרֵעִים son quienes hacen el mal. «Compañía de malhechores» mantiene el matiz colectivo y resulta natural en español bíblico actual.
- source_word: הִקִּיפוּנִי
  english_pob_choice: has encircled me
  chosen_spanish: me ha cercado
  alternatives_spanish:
  - me ha rodeado
  - me ha envuelto
  lexicon: HALOT
  rationale: El segundo verbo refuerza la imagen de cerco. «Cercado» reproduce el matiz de encerrar/rodear con una leve variación léxica respecto del primer hemistiquio.
- source_word: כָּאֲרִי
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como león
  - como una fiera
  lexicon: HALOT
  rationale: Se sigue la lectura masorética difícil del texto hebreo, conservando en el cuerpo principal la comparación literal «como un león» en vez de sustituirla por la variante textualmente debatida.
- source_word: יָדַי וְרַגְלָי
  english_pob_choice: my hands and my feet
  chosen_spanish: mis manos y mis pies
  alternatives_spanish:
  - las manos y los pies de mí
  lexicon: HALOT
  rationale: Traducción directa de las partes del cuerpo en construcción posesiva, manteniendo la literalidad de la cláusula final.
theological_decisions:
- issue: Lectura contestada de כָּאֲרִי en Salmo 22:17
  english_pob_reading: Main text follows the Masoretic reading 'like a lion'; alternative readings include 'they pierced my hands and my feet' or 'they have dug through my hands and my feet' in some witnesses.
  chosen_spanish_reading: 'El texto principal sigue la lectura masorética: «como un león están mis manos y mis pies».'
  alternative_spanish_readings:
  - «me horadaron las manos y los pies»
  - «me perforaron las manos y los pies»
  rationale: La prioridad va al texto hebreo masorético extante, aunque difícil. La lectura alternativa es antigua y teológicamente relevante, por lo que se preserva en nota en vez de reemplazar el texto principal con una paráfrasis cristológica más fluida.
  doctrine_reference: Principios POB §§1, 3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés que evitó una expansión interpretativa y volvió a la literalidad difícil de la lectura masorética. Por eso el español principal conserva una cláusula breve y literal («como un león están mis manos y mis pies») sin añadir explicación interpretativa en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando corresponda al Tetragrámaton, pero este versículo no lo contiene.
  - Se mantiene «Mesías/Cristo» fuera de este versículo, que no presenta ese término.
  - «Malhechores» se eligió por su tono bíblico y su transparencia semántica frente a «malvados».
  - La comparación final se dejó en forma difícil para respetar la tensión textual documentada.
