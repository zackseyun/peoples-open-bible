revisions:
- from: Saquearán tu riqueza y robarán tu mercancía. Derribarán tus muros y demolerán tus casas espléndidas. Arrojarán tus piedras[a], tus maderos y tu polvo al medio de las aguas.
  to: Saquearán tu riqueza y despojarán tu mercancía. Derribarán tus muros y demolerán tus casas espléndidas. Arrojarán tus piedras[a], tus maderos y tu polvo en medio de las aguas.
  rationale: Se ajusta בָזְזוּ a «despojarán» para conservar mejor el matiz de pillaje bélico sin repetir «saquearán». Se cambia «al medio de las aguas» por «en medio de las aguas» por naturalidad idiomática y mejor correspondencia con בְּתוֹךְ מַיִם. Se mantiene la nota léxica existente, que sigue siendo válida para la alternativa contextual asociada al material arrojado al agua.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del hebreo: saqueo de riquezas y mercancías, derribo de muros y casas lujosas, y arrojamiento de materiales de la ciudad al agua. Las decisiones principales para שָׁלְלוּ, חֵילֵךְ, רְכֻלָּתֵךְ, הָרְסוּ, חוֹמוֹתַיִךְ, בָתֵּי חֶמְדָּתֵךְ, יִתֹּצוּ, אֲבָנַיִךְ, עֵצַיִךְ, עֲפָרֵךְ e יָשִׂימוּ son mayormente fieles. Sin embargo, «robarán» para בָזְזוּ debilita el matiz de pillaje bélico paralelo a שָׁלְלוּ, y «al medio de las aguas» no es la formulación más natural ni precisa para בְּתוֹךְ מַיִם en español.'
  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. No obstante, requiere dos ajustes menores para mayor fidelidad y naturalidad: reemplazar «robarán» por un verbo de saqueo/despojo más fuerte y sustituir «al medio de las aguas» por «en medio de las aguas», que es español idiomático y conserva la imagen hebrea.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las elecciones léxicas clave son apropiadas en general. La nota sobre «polvo» está bien encaminada, pero su redacción actual («O “tu polvo”») no funciona porque el texto principal ya dice «tus piedras[a]»; conviene reformularla como alternativa para «tus piedras» en este contexto de ruina.
  issues:
  - severity: medium
    issue: «robarán» para בָזְזוּ
    rationale: Aunque comunica toma ilícita, suena más general y menos militar que el hebreo y que el POB inglés «loot». «Saquearán» repetiría el verbo previo; «despojarán» mantiene mejor el paralelismo de pillaje sin sonar débil.
  - severity: medium
    issue: «al medio de las aguas»
    rationale: Esta construcción no es la más idiomática en español general. «En medio de las aguas» es natural y refleja bien בְּתוֹךְ מַיִם; el movimiento ya queda expresado por «arrojarán».
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La nota dice «O “tu polvo”», pero está anclada en «tus piedras[a]». Debe explicar que el hebreo puede entenderse literalmente como «tu polvo» o, por contexto, como escombros/debris, sin presentar una alternativa desconectada del ancla.
  revised_spanish_text: Saquearán tu riqueza y despojarán tu mercancía. Derribarán tus muros y demolerán tus casas espléndidas. Arrojarán tus piedras[a], tus maderos y tu polvo en medio de las aguas.
  revised_footnotes:
  - marker: a
    text: O «tu polvo». El hebreo puede significar «polvo», «tierra» o, en este contexto, los escombros de una ciudad demolida.
    reason: lexical_alternative
  revision_rationale: Se ajusta בָזְזוּ a «despojarán» para conservar mejor el matiz de pillaje bélico sin repetir «saquearán». Se cambia «al medio de las aguas» por «en medio de las aguas» por naturalidad idiomática y mejor correspondencia con בְּתוֹךְ מַיִם. Se mantiene la nota léxica existente, que sigue siendo válida para la alternativa contextual asociada al material arrojado al agua.
