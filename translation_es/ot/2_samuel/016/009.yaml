translation:
  language: es
  text: 'Entonces Abisai hijo de Sarvia dijo al rey: «¿Por qué habría de maldecir este perro muerto a mi señor el rey? Por favor, déjame ir allá y quitarle la cabeza[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y remover su cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia narrativa con naturalidad en español.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה
  english_pob_choice: Abishai son of Zeruiah
  chosen_spanish: Abisai hijo de Sarvia
  alternatives_spanish:
  - Abisai, hijo de Sarvia
  lexicon: Convención onomástica
  rationale: Se transliteran los nombres propios con la forma usual en español bíblico, manteniendo identificabilidad y lectura fluida.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  lexicon: HALOT
  rationale: La preposición direccional con artículo se expresa naturalmente como «al rey».
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habría de...
  alternatives_spanish:
  - ¿Por qué...
  lexicon: HALOT
  rationale: La pregunta retórica con imperfecto expresa objeción; «¿Por qué habría de...?» conserva mejor esa fuerza que un presente llano.
- source_word: יְקַלֵּל
  english_pob_choice: curse
  chosen_spanish: maldecir
  alternatives_spanish:
  - proferir maldición contra
  - insultar
  lexicon: HALOT
  rationale: קלל en piel aquí significa maldecir verbalmente; «maldecir» es la equivalencia directa y clara en español.
- source_word: הַכֶּלֶב הַמֵּת הַזֶּה
  english_pob_choice: this dead dog
  chosen_spanish: este perro muerto
  alternatives_spanish:
  - este perro muerto y despreciable
  - este perro miserable
  lexicon: HALOT
  rationale: Se conserva el insulto metafórico y su aspereza sin suavizarlo con paráfrasis.
- source_word: אֶת אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: a mi señor el rey
  alternatives_spanish:
  - a mi señor, el rey
  lexicon: HALOT
  rationale: אֲדֹנִי expresa un tratamiento reverencial; en español bíblico sobrio, «mi señor el rey» mantiene el tono cortesano y la relación deferente.
- source_word: אֶעְבְּרָה נָּא
  english_pob_choice: Please let me go over
  chosen_spanish: Por favor, déjame pasar
  alternatives_spanish:
  - Por favor, déjame cruzar
  - Déjame pasar, por favor
  lexicon: HALOT
  rationale: El cohortativo con נָא es una petición cortés; «Por favor» y «déjame pasar» comunican bien la solicitud inmediata en español.
- source_word: וְאָסִירָה אֶת רֹאשׁוֹ
  english_pob_choice: and take off his head
  chosen_spanish: quitarle la cabeza
  alternatives_spanish:
  - cortarle la cabeza
  - separarle la cabeza
  lexicon: HALOT
  rationale: El hebreo es literalmente «quitar su cabeza», una manera idiomática de describir la decapitación; «quitarle la cabeza» preserva esa literalidad sin perder inteligibilidad.
theological_decisions:
- issue: Tratamiento reverencial del rey en la expresión אֲדֹנִי הַמֶּלֶךְ
  english_pob_reading: my lord the king
  chosen_spanish_reading: mi señor el rey
  alternative_spanish_readings:
  - a mi señor el rey
  rationale: No se trata de doctrina sino de registro honorífico. Se conserva la deferencia cortesana del hebreo sin reemplazarla por una forma más eclesiástica o moderna que diluya el matiz.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto español junto a la frase correspondiente.'
  spanish_consistency_notes:
  - Se prefirió «Abisai» y «Sarvia» como formas habituales en español bíblico.
  - Se mantuvo la metáfora insultante «perro muerto» sin suavizarla.
  - La orden final se expresó con una construcción idiomática española que conserva la idea literal de decapitación.
  - No se introdujo lenguaje eclesiástico innecesario; el tono permanece narrativo y cortesano.
