translation:
  language: es
  text: Y Onías[a], cuando reconoció claramente esto, se retiró a un lugar de asilo en Dafne, que está cerca de Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «a un lugar de refugio». El griego especifica un lugar de asilo inviolable, con un matiz probablemente jurídico y sacral, no solo de seguridad general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σαφῶς
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - con claridad
  - de manera clara
  lexicon: LSJ
  rationale: El adverbio modifica la percepción de Onias y expresa una comprensión nítida; «claramente» conserva ese valor sin añadir matiz interpretativo.
- source_word: ἐπεγνωκὼς
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - comprendió
  - percibió plenamente
  - llegó a reconocer
  lexicon: LSJ
  rationale: El participio de ἐπιγινώσκω sugiere reconocimiento definido y completo; «reconoció» es natural en español y mantiene la fuerza cognitiva.
- source_word: ἀπήνεγκεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se fue
  - se alejó
  lexicon: LSJ
  rationale: Aunque el verbo puede tener sentido más literal de 'llevar', aquí el contexto muestra retirada a un lugar protegido; «se retiró» transmite el movimiento de apartarse del peligro.
- source_word: ἀποκεχωρηκὼς
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - habiéndose apartado
  - habiendo ido aparte
  - habiendo partido
  lexicon: LSJ
  rationale: El participio perfecto refuerza la idea de retirada; en español queda absorbido de manera natural en la misma acción verbal para evitar redundancia forzada.
- source_word: εἰς ἄσυλον τόπον
  english_pob_choice: to a place of asylum
  chosen_spanish: a un lugar de asilo
  alternatives_spanish:
  - a un lugar de refugio
  - a un santuario
  - a un lugar inviolable
  lexicon: LSJ
  rationale: «Asilo» preserva la noción legal-sacral de inviolabilidad indicada por ἄσυλον mejor que un simple «refugio».
- source_word: ἐπὶ Δάφνης
  english_pob_choice: at Daphne
  chosen_spanish: en Dafne
  alternatives_spanish:
  - a Dafne
  - junto a Dafne
  lexicon: LSJ
  rationale: Con topónimo, ἐπί funciona con valor locativo; «en Dafne» es idiomático en español y mantiene la ubicación.
- source_word: τῆς πρὸς Ἀντιοχίας κειμένης
  english_pob_choice: which lies near Antioch
  chosen_spanish: que está situada cerca de Antioquía
  alternatives_spanish:
  - que yace cerca de Antioquía
  - situada junto a Antioquía
  - que queda cerca de Antioquía
  lexicon: LSJ
  rationale: La frase participial identifica la célebre Dafne próxima a Antioquía; «está situada cerca de» conserva claridad geográfica sin recargar el estilo.
theological_decisions:
- issue: 'ἄσυλον τόπον: valor legal-sacral de «asilo» frente a un refugio genérico'
  english_pob_reading: The Greek specifies an inviolable asylum location, likely with legal-sacral overtones rather than only general safety.
  chosen_spanish_reading: «lugar de asilo» conserva la idea de inviolabilidad y protección reconocida, no solo de seguridad física.
  alternative_spanish_readings:
  - lugar de refugio
  - lugar inviolable
  - santuario
  rationale: La evidencia griega apunta a un espacio protegido con tono jurídico y sagrado; «asilo» es el término español más preciso para ese matiz.
  doctrine_reference: 2 Macabeos 4:33; uso léxico de ἄσυλος en LSJ
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó una coma antes de ''at Daphne'' sin alterar el contenido. La redacción española refleja esa misma unidad sintáctica: se integra la localización en una sola frase fluida, sin pausa innecesaria antes de «en Dafne».'
  spanish_consistency_notes:
  - Se mantiene «Y Onias» para reproducir el inicio conjuntivo del griego.
  - Se usa «Dafne» como transliteración estándar del topónimo.
  - «Asilo» se conserva de manera consistente con la decisión inglesa y con el valor técnico de ἄσυλον.
  - No se añadió puntuación que separara artificialmente el lugar de la acción principal.
