revisions:
- from: 'Y Yahvé dijo a Moisés[a]: «Habla a Aarón, tu hermano, y que no entre[b] en ningún momento al Lugar Santo, detrás del velo, delante del propiciatorio[c] que está sobre el arca; así no morirá. Porque en la nube me manifestaré sobre el propiciatorio».'
  to: 'Y Yahvé dijo a Moisés: «Dile a Aarón tu hermano que no entre[a] al Lugar Santo, al interior del velo, delante de la cubierta de expiación[b] que está sobre el arca, no en cualquier momento, para que no muera. Porque en la nube me apareceré sobre la cubierta de expiación».'
  rationale: 'Se ajustó el texto para seguir más de cerca el sentido del hebreo y la auditoría léxica del POB: «no en cualquier momento» por la restricción de בְּכָל עֵת; «al interior del velo» por מִבֵּית לַפָּרֹכֶת; «cubierta de expiación» como equivalente funcional de הַכַּפֹּרֶת, conservando «propiciatorio» en nota; y se mejoró la fluidez española con «Dile a Aarón tu hermano» y «para que no muera». También se eliminó la nota innecesaria sobre «Yahvé».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite la estructura general del versículo y preserva bien el nombre divino «Yahvé», la prohibición de acceso y la razón teofánica. Sin embargo, varias decisiones no siguen fielmente el sentido documentado del hebreo y del POB inglés: «en ningún momento» endurece בְּכָל עֵת más allá de «no en cualquier momento»; «detrás del velo» es más interpretativo que «dentro del velo»/«al interior del velo» para מִבֵּית לַפָּרֹכֶת; y «propiciatorio» se aparta de la preferencia terminológica auditada «atonement cover», que en español debe reflejarse de manera funcional y no solo tradicional.'
  spanish_quality_summary: El español es fluido y digno, pero algunos giros pueden afinarse para mayor precisión y naturalidad bíblica contemporánea. «Habla a Aarón» suena algo menos idiomático que «Dile a Aarón». «Así no morirá» funciona, pero «para que no muera» refleja mejor la relación de propósito/resultado. También conviene eliminar la nota sobre «Yahweh», porque el texto principal ya usa correctamente «Yahvé» según la norma del proyecto y la alternativa inglesa no aporta claridad al lector español.
  glossary_alignment: 'Alineación parcial. Correcto: יְהוָה -> «Yahvé», הָאָרֹן -> «el arca», בֶּעָנָן -> «en la nube». Desalineado con la racionalidad del POB: הַכַּפֹּרֶת debe reflejar la opción funcional tipo «cubierta de expiación» más que «propiciatorio», dejando la alternativa tradicional en nota; בְּכָל עֵת debe comunicar acceso no irrestricto («no en cualquier momento») y no prohibición absoluta («en ningún momento»).'
  issues:
  - severity: high
    issue: «propiciatorio» no sigue la decisión léxica principal auditada para הַכַּפֹּרֶת.
    rationale: El POB inglés escogió deliberadamente «atonement cover» por transparencia semántica y reservó «mercy seat» como alternativa tradicional. En español, «propiciatorio» reproduce más bien la alternativa tradicional; para conservar la filosofía del proyecto, conviene usar una forma funcional como «cubierta de expiación» y dejar «propiciatorio» en nota.
  - severity: high
    issue: «en ningún momento» sobrerrestringe בְּכָל עֵת.
    rationale: La expresión hebrea, según la auditoría, prohíbe entrar arbitrariamente o a voluntad, no absolutamente nunca. «No en cualquier momento» preserva mejor la restricción contextual.
  - severity: medium
    issue: «detrás del velo» es más interpretativo que la opción auditada.
    rationale: La decisión inglesa documentó «inside the veil» y evitó una formulación más interpretativa. En español, «al interior del velo» o «dentro del velo» mantiene mejor la imagen espacial sin cambiar el punto de vista.
  - severity: medium
    issue: La nota [a] sobre «Yahweh» es innecesaria y poco útil para el lector español.
    rationale: El texto principal ya emplea correctamente «Yahvé», que es la forma establecida por el proyecto para español. La nota no preserva una alternativa fuente significativa para este registro.
  - severity: low
    issue: «Habla a Aarón» y «así no morirá» pueden mejorarse por naturalidad y precisión.
    rationale: «Dile a Aarón» es más idiomático para el valor de דַּבֵּר aquí, y «para que no muera» refleja mejor la finalidad o consecuencia evitada de וְלֹא יָמוּת.
  revised_spanish_text: 'Y Yahvé dijo a Moisés: «Dile a Aarón tu hermano que no entre[a] al Lugar Santo, al interior del velo, delante de la cubierta de expiación[b] que está sobre el arca, no en cualquier momento, para que no muera. Porque en la nube me apareceré sobre la cubierta de expiación».

    '
  revised_footnotes:
  - marker: a
    text: Literalmente, «no entre en todo tiempo»; el sentido es que no debe entrar de manera indiscriminada o cuando quiera.
    reason: alternative_reading
  - marker: b
    text: O «propiciatorio», la traducción tradicional de este término ritual.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el texto para seguir más de cerca el sentido del hebreo y la auditoría léxica del POB: «no en cualquier momento» por la restricción de בְּכָל עֵת; «al interior del velo» por מִבֵּית לַפָּרֹכֶת; «cubierta de expiación» como equivalente funcional de הַכַּפֹּרֶת, conservando «propiciatorio» en nota; y se mejoró la fluidez española con «Dile a Aarón tu hermano» y «para que no muera». También se eliminó la nota innecesaria sobre «Yahvé».'
