  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: fórmula narrativa, aspecto progresivo de εἰσεπορεύετο, captura de Antíoco y Lisias por fuerzas militares, y propósito de llevarlos ante el referente final. Sin embargo, «la casa real de sus padres» en español se entiende con demasiada facilidad como la familia real o la casa dinástica, mientras que el griego apunta al edificio/residencia real de sus antepasados. Conviene aclararlo con una formulación más natural y precisa.'
  spanish_quality_summary: El español es claro y digno, pero «casa real» introduce una ambigüedad innecesaria en español eclesial moderno, donde suele significar la dinastía/familia real más que el palacio o residencia. «Palacio real de sus antepasados» o «casa real de sus antepasados» resolvería esto; la primera es la más idiomática. También mejora la naturalidad sustituir «sus padres» por «sus antepasados» en el texto principal, ya que en español «padres» suena a progenitores inmediatos.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones léxicas relevantes están bien encaminadas, excepto que la preferencia inglesa por mantener visible la idea de «house» puede conservarse en nota mientras el texto español use una forma idiomática no ambigua como «palacio real».
  issues:
  - severity: medium
    issue: «casa real» es ambigua en español
    rationale: En español contemporáneo, «casa real» suele referirse a la dinastía o familia real, no al edificio. Eso puede desviar el sentido de οἶκον βασιλείας, que aquí se refiere a la residencia/palacio.
  - severity: medium
    issue: «de sus padres» suena demasiado literal y potencialmente equívoco
    rationale: Aunque refleja el griego πατέρων, en español normalmente se entenderá como sus padres inmediatos. Dado el contexto dinástico, «de sus antepasados» expresa mejor el sentido sin traicionar el original.
  - severity: low
    issue: La nota actual privilegia una opción literal menos adecuada para el texto principal
    rationale: La nota puede conservar «casa del reino» como alternativa más literal, pero el texto principal debe evitar una expresión española que oscurezca el referente.
  revised_spanish_text: Y aconteció[a] que, cuando iba entrando en el palacio real de sus antepasados, las tropas apresaron a Antíoco y a Lisias para llevarlos ante él.
