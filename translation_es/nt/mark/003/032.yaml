translation:
  language: es
  text: 'Y una multitud estaba sentada alrededor de él, y le dijeron: «Mira, tu madre y tus hermanos están afuera buscándote[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te buscan». El verbo griego puede significar «buscar» o «andar buscando»; aquí probablemente se refiere a tratar de encontrarlo físicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθητο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentada
  alternatives_spanish:
  - se sentaba
  - estaba sentada
  lexicon: BDAG
  rationale: El imperfecto griego presenta la escena como en desarrollo; «estaba sentada» conserva ese trasfondo durativo en un español natural. Se mantiene el género gramatical de ὄχλος como colectivo con adjetivo femenino concordando con «multitud».
- source_word: περὶ αὐτὸν ὄχλος
  english_pob_choice: a crowd was sitting around him
  chosen_spanish: una multitud estaba sentada alrededor de él
  alternatives_spanish:
  - una multitud se sentaba alrededor de él
  - una multitud estaba sentada en torno a él
  lexicon: BDAG
  rationale: περί con acusativo indica rodeando espacialmente; «alrededor de él» reproduce esa imagen sin forzar el castellano. «Multitud» comunica bien ὄχλος en un registro natural.
- source_word: λέγουσιν
  english_pob_choice: they said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - decían
  - le decían
  lexicon: BDAG
  rationale: Aunque el presente puede funcionar como histórico, el español narrativo fluye mejor con pretérito perfecto simple. El dativo αὐτῷ se expresa de forma natural con «le».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: Como partícula deíctica de atención, «Mira» conserva la fuerza inmediata y evita el tono arcaico de «He aquí».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madre
  lexicon: BDAG
  rationale: Término de parentesco directo, sin necesidad de expansión.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos
  - hermanos varones
  lexicon: BDAG
  rationale: Se conserva el sentido directo del plural masculino. En español «hermanos» es la forma natural y no añade una interpretación ajena al texto.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - afuera
  - fuera
  lexicon: BDAG
  rationale: Adverbio locativo simple; «afuera» suena natural en el diálogo y comunica bien la ubicación exterior.
- source_word: ζητοῦσίν σε
  english_pob_choice: looking for you
  chosen_spanish: buscándote
  alternatives_spanish:
  - buscándote
  - buscándote / buscándote para verte
  lexicon: BDAG
  rationale: En este contexto narrativo ζητέω apunta a la búsqueda física de Jesús. «Buscándote» evita sobretraducir con «buscando encontrarte» y mantiene la naturalidad del español.
theological_decisions:
- issue: Referencia de «hermanos»
  english_pob_reading: Render ἀδελφοί as 'brothers' without interpretive expansion.
  chosen_spanish_reading: Traducir ἀδελφοί como «hermanos» sin expandir a «parientes» o «hermanos/medio hermanos».
  alternative_spanish_readings:
  - parientes
  - hermanos/medio hermanos
  - familiares
  rationale: El versículo usa el término kinship ordinario y no explica la relación familiar. La traducción mantiene la forma directa y deja la discusión interpretativa abierta, como en el inglés POB.
  doctrine_reference: Affirmations; Translation philosophy §3, §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] exactamente en la palabra «buscándote», que corresponde al matiz léxico de ζητοῦσίν σε. No se introdujeron notas sin ancla en el texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto para el nombre divino, pero este versículo no contiene el tetragrámaton ni una cita explícita.
  - Se mantuvo un registro narrativo claro y publicable, con puntuación española estándar y sin calcos innecesarios.
  - «Hermano(s)» se traduce sin neutralización para respetar el valor léxico directo del plural masculino griego.
