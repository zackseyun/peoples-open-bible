translation:
  language: es
  text: Traían sandalias gastadas y remendadas en sus pies[a], y ropas gastadas encima; y todo el pan de su provisión estaba seco y desmigajado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mohoso”. El término hebreo traducido aquí como “desmigajado” es raro y puede denotar pan seco y roto en pedazos; algunos lo entienden como “mohoso”.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְעָלוֹת
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - zapatos
  lexicon: HALOT
  rationale: El término hebreo se refiere al calzado antiguo de tipo abierto; en español, "sandalias" es más preciso y natural que "zapatos".
- source_word: בָּלוֹת
  english_pob_choice: worn-out
  chosen_spanish: gastadas
  alternatives_spanish:
  - viejas
  - desgastadas
  - raídas
  lexicon: HALOT
  rationale: Expresa bien la idea de algo deteriorado por el uso. "Gastadas" mantiene la condición física sin sonar demasiado literario.
- source_word: מְטֻלָּאוֹת
  english_pob_choice: patched
  chosen_spanish: remendadas
  alternatives_spanish:
  - parchadas
  - arregladas
  lexicon: HALOT
  rationale: El participio pasivo indica que fueron reparadas con parches o remiendos. "Remendadas" es idiomático en español y conserva la imagen de reparación visible.
- source_word: בְּרַגְלֵיהֶם
  english_pob_choice: on their feet
  chosen_spanish: en sus pies
  alternatives_spanish:
  - sobre sus pies
  - a sus pies
  lexicon: HALOT
  rationale: La locución locativa se conserva de forma directa y natural en español, manteniendo el detalle concreto del calzado.
- source_word: שְׂלָמוֹת
  english_pob_choice: clothes
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  - vestiduras
  lexicon: HALOT
  rationale: El hebreo puede abarcar ropa o mantos; "vestidos" comunica la idea general de prendas usadas sobre el cuerpo sin forzar una especificación mayor.
- source_word: עֲלֵיהֶם
  english_pob_choice: on themselves
  chosen_spanish: sobre sí
  alternatives_spanish:
  - encima de ellos
  - sobre ellos
  lexicon: HALOT
  rationale: '"Sobre sí" es una solución natural en español para indicar que llevaban la ropa puesta, conservando la imagen corporal del hebreo.'
- source_word: לֶחֶם צֵידָם
  english_pob_choice: the bread of their provision
  chosen_spanish: el pan de su provisión
  alternatives_spanish:
  - su comida de viaje
  - el pan de sus provisiones
  lexicon: HALOT
  rationale: Se mantiene la concreción hebrea de "pan" y la idea de provisiones de viaje; "provisión" conserva el matiz de abastecimiento para el camino.
- source_word: יָבֵשׁ הָיָה
  english_pob_choice: was dry
  chosen_spanish: estaba seco
  alternatives_spanish:
  - había secado
  - era seco
  lexicon: HALOT
  rationale: La construcción verbal describe un estado, no solo un proceso; "estaba seco" es la forma más natural en español.
- source_word: נִקֻּדִים
  english_pob_choice: crumbly
  chosen_spanish: desmenuzable
  alternatives_spanish:
  - moldoso
  - quebradizo
  - desmigajado
  lexicon: HALOT
  rationale: La palabra es rara y el contexto apunta a pan deteriorado en fragmentos secos. "Desmenuzable" conserva esa textura sin imponer de entrada la lectura de moho.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Josué 9:5 y conserva la tensión léxica de נִקֻּדִים como término raro. Se adopta una solución española que mantiene el sentido narrativo de provisiones deterioradas sin cerrar indebidamente la alternativa de “mohoso”, reflejada en la nota.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se prefirió "sandalias" frente a "zapatos" por precisión histórica y cultural.
  - '"Vestidos" se usa aquí en sentido amplio de prendas o ropa, sin restringirlo a un tipo específico de manto.'
  - '"Desmenuzable" intenta reproducir la rareza de נִקֻּדִים sin forzar una equivalencia única.'
