translation:
  language: es
  text: Entonces se levantaron los jefes de las casas paternas de Judá y Benjamín, y los sacerdotes y los levitas—todos aquellos cuyo espíritu Dios había despertado[a]—, para subir a edificar la casa de Yahvé[b], que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos aquellos cuyo espíritu Dios había movido» o «todos aquellos a quienes Dios había movido en espíritu».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; es decir, el templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֜וּמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca el inicio de una acción respondida. En español, «se levantaron» conserva ese movimiento narrativo sin añadir la idea de salida o viaje que no está explícita en el verbo.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de las familias
  lexicon: HALOT
  rationale: La expresión hebrea es técnica y genealógica. «Casas paternas» mantiene visible la estructura de parentesco del מקור hebreo, mientras que «familias» sería más suave pero menos transparente.
- source_word: לִיהוּדָה וּבִנְיָמִן
  english_pob_choice: of Judah and Benjamin
  chosen_spanish: de Judá y Benjamín
  alternatives_spanish:
  - para Judá y Benjamín
  - pertenecientes a Judá y Benjamín
  lexicon: HALOT
  rationale: El prefijo ל indica afiliación o pertenencia. «De Judá y Benjamín» es la forma natural en español para expresar esa adscripción tribal.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del culto
  lexicon: HALOT
  rationale: כהנים se traduce de manera estándar por «sacerdotes» en contextos cultuales y genealógicos.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: לויים corresponde al grupo tribal y cultual conocido en español como «levitas».
- source_word: לְכֹל הֵעִיר הָאֱלֹהִים אֶת רוּחוֹ
  english_pob_choice: everyone whose spirit God had stirred
  chosen_spanish: a todos los que Dios había movido el espíritu
  alternatives_spanish:
  - a todos los cuyo espíritu Dios había despertado
  - a todos los que Dios había impulsado interiormente
  lexicon: HALOT
  rationale: La construcción es distributiva y el hebreo atribuye a Dios el impulso interior. «Mover el espíritu» conserva la imagen semántica de הֵעִיר con רוח sin convertirla en una explicación doctrinal más fuerte de lo que el texto dice.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el ánimo
  - el interior
  lexicon: HALOT
  rationale: Aquí רוח se refiere a la disposición interior o impulso personal. «El espíritu» preserva el término hebreo y su resonancia teológica; se evita «ánimo» porque debilita esa conexión.
- source_word: לַעֲלוֹת
  english_pob_choice: to go up
  chosen_spanish: para subir
  alternatives_spanish:
  - para ascender
  lexicon: HALOT
  rationale: עלה es el verbo convencional para subir a Jerusalén. «Para subir» conserva el sentido topográfico y peregrino en español con naturalidad.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: a edificar
  alternatives_spanish:
  - a construir
  lexicon: HALOT
  rationale: El hebreo dice simplemente «construir/edificar». En español bíblico, «edificar» es claro y digno, y no introduce necesariamente la idea de reconstrucción más allá del verbo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea «casa» en vez de sustituirla por «templo», porque eso es más interpretativo. Se usa «Yahvé» conforme al criterio del proyecto para el Nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה. «Yahvé» preserva el Nombre divino sin ocultarlo bajo un sustituto litúrgico.
- source_word: אֲשֶׁר בִּירוּשָׁלִָם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que estaba en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación de la casa. «Que está en Jerusalén» funciona naturalmente en español y evita sugerir que el templo ya no existe, sin necesidad de añadir información.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión de mantener un nombre propio en español preserva la transparencia del original y evita el ocultamiento convencional detrás de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: How to render הֵעִיר הָאֱלֹהִים אֶת רוּחוֹ
  english_pob_reading: everyone whose spirit God had stirred
  chosen_spanish_reading: a todos los que Dios había movido el espíritu
  alternative_spanish_readings:
  - a todos los que Dios había despertado interiormente
  - a todos los que Dios había impulsado
  rationale: El hebreo atribuye una acción divina interna sin especificar mecanismo psicológico o religioso. La traducción conserva esa tensión entre iniciativa divina y respuesta humana, sin amplificarla más de lo que permite el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del pasaje en la auditoría inglesa, sin cambios de fondo respecto a la última revisión. Se conserva la misma lectura teológica del Nombre divino, de la acción interior de Dios y de la metáfora «casa de Yahvé», adaptadas al español con formulación natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Nombre divino, coherente con el criterio del proyecto.
  - Se conserva la metáfora «casa» para בֵּית יְהוָה, con nota explicativa para el lector.
  - «Casas paternas» reproduce la estructura genealógica hebrea y evita sustituirla por una generalización.
  - La nota sobre el espíritu refleja la alternativa semántica del inglés auditado sin borrar la ambigüedad del hebreo.
  - «Subir» conserva el valor direccional tradicional de עלה hacia Jerusalén.
