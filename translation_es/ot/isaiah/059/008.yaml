  text: דֶּ֤רֶךְ שָׁלוֹם֙ לֹ֣א יָדָ֔עוּ וְ/אֵ֥ין מִשְׁפָּ֖ט בְּ/מַעְגְּלוֹתָ֑/ם נְתִיבֽוֹתֵי/הֶם֙ עִקְּשׁ֣וּ לָ/הֶ֔ם כֹּ֚ל דֹּרֵ֣ךְ בָּ֔/הּ לֹ֥א יָדַ֖ע שָׁלֽוֹם׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/008.yaml
  text: They do not know the way of peace[a], and there is no justice in their paths; they have made their roads crooked for themselves[b]; everyone who walks in them does not know peace.
  footnotes:
