translation:
  language: es
  text: Ahora[a], Yahvé Dios, que se confirme tu palabra a David mi padre, porque tú me has hecho rey sobre un pueblo tan numeroso como el polvo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se establezca tu promesa a David mi padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - SEÑOR Dios
  - Yahvé, Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio español del proyecto, y אֱלֹהִים se vierte naturalmente como 'Dios' en aposición.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Es un marcador discursivo-temporal de apertura; 'Ahora' reproduce el valor de inicio sin añadir una conjunción no presente.
- source_word: יֵאָמֵן
  english_pob_choice: let ... be confirmed
  chosen_spanish: que se confirme
  alternatives_spanish:
  - que sea հաստատada
  - que quede establecida
  lexicon: HALOT
  rationale: 'El nifal expresa un ruego pasivo: que la palabra sea confirmada/establecida. ''Que se confirme'' conserva ese matiz y funciona de modo natural en español.'
- source_word: דְּבָרְךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu promesa
  - tu dicho
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tu palabra'. Se mantiene esa forma en el texto principal para no desplazar el término hacia 'promesa', aunque el contexto sea promissorio.
- source_word: עִם דָּוִיד אָבִי
  english_pob_choice: to David my father
  chosen_spanish: con David, mi padre
  alternatives_spanish:
  - respecto de David, mi padre
  - para David, mi padre
  lexicon: HALOT
  rationale: Se conserva más de cerca la preposición עִם como 'con', dado que el texto hebreo la usa explícitamente. En español suena ligeramente menos idiomático que 'para', pero preserva mejor la forma del original.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base de la súplica. 'Porque' expresa con claridad la relación causal en español contemporáneo.
- source_word: הִמְלַכְתַּנִי
  english_pob_choice: you have made me king
  chosen_spanish: me has hecho rey
  alternatives_spanish:
  - me has constituido rey
  - me has entronizado
  lexicon: HALOT
  rationale: El hifil de מלך indica hacer rey/constituir rey. 'Me has hecho rey' conserva el sentido causal sin forzar una equivalencia litúrgica.
- source_word: עַל עַם רַב
  english_pob_choice: over a people as numerous
  chosen_spanish: sobre un pueblo tan numeroso
  alternatives_spanish:
  - sobre un pueblo grande
  - sobre un pueblo muy numeroso
  lexicon: HALOT
  rationale: רַב puede ser 'grande' o 'numeroso'; el símil siguiente cuantifica la multitud. 'Tan numeroso' enlaza bien con el comparativo posterior.
- source_word: כַּעֲפַר הָאָרֶץ
  english_pob_choice: as the dust of the earth
  chosen_spanish: como el polvo de la tierra
  alternatives_spanish:
  - como el polvo de la tierra firme
  - como el polvo del suelo
  lexicon: HALOT
  rationale: Es un símil hebreo convencional de innumerabilidad. 'Polvo de la tierra' es la versión más directa y natural en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. El proyecto español adopta 'Yahvé' para preservar el nombre del pacto sin enmascararlo como un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre 'word' y 'promise'
  english_pob_reading: your word
  chosen_spanish_reading: tu palabra
  alternative_spanish_readings:
  - tu promesa
  - tu palabra/promesa en nota
  rationale: Aunque el contexto remite a la promesa hecha a David, el hebreo no usa aquí el sustantivo 'promesa'. Se conserva 'palabra' en el texto principal y se deja la carga promissoria al contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español, anclado en 'Ahora[a]'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' conforme al criterio del proyecto.
  - Se conserva 'tu palabra' en el cuerpo principal para no sobreinterpretar el sustantivo hebreo.
  - La preposición 'con' en 'con David, mi padre' sigue de cerca עִם, aunque en español pueda leerse idiomáticamente como referencia a la palabra dada a David.
