translation:
  language: es
  text: Ahora bien, el resto de los hechos de Ezequías, y toda su fuerza[a], y cómo hizo la alberca[b] y el conducto[c], y trajo el agua a la ciudad—¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder»; el hebreo puede referirse a fuerza, vigor o proezas notables.
    reason: lexical_alternative
  - marker: b
    text: O «reservorio» para «alberca»; el término hebreo puede designar una cuenca o depósito de agua construido.
    reason: lexical_alternative
  - marker: c
    text: O «canal» para «conducto»; el hebreo se refiere a un curso de agua o canal de agua construido. Probablemente alude a las obras hidráulicas de Ezequías en Jerusalén; compárese 2 Crónicas 32:30.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר דִּבְרֵי
  english_pob_choice: the rest of the acts
  chosen_spanish: el resto de los hechos
  alternatives_spanish:
  - el resto de las acciones
  - el resto de los actos
  - lo demás que hizo
  lexicon: HALOT
  rationale: La fórmula historiográfica de Reyes pide un equivalente natural en español. «Hechos» conserva el sentido amplio de actuaciones o acontecimientos de su reinado sin volverse demasiado abstracto ni demasiado jurídico.
- source_word: גְּבוּרָתוֹ
  english_pob_choice: his might
  chosen_spanish: su valentía
  alternatives_spanish:
  - su poder
  - su fuerza
  - sus hazañas
  lexicon: HALOT
  rationale: El hebreo puede expresar fuerza, valor o proeza. Aquí «valentía» comunica bien el campo de vigor/heroísmo y mantiene la tensión entre una cualidad general y las obras concretas que siguen. Se evita reducirlo solo a poder físico.
- source_word: וַאֲשֶׁר עָשָׂה
  english_pob_choice: and how he made
  chosen_spanish: y cómo hizo
  alternatives_spanish:
  - y lo que hizo
  - y que hizo
  - y cómo construyó
  lexicon: HALOT
  rationale: «Cómo hizo» reproduce la transición a un ejemplo concreto de sus acciones y suena natural en español. No se sobreespecifica como «construyó» en el texto principal, porque el hebreo solo dice «hizo».
- source_word: הַבְּרֵכָה
  english_pob_choice: the pool
  chosen_spanish: la alberca
  alternatives_spanish:
  - la piscina
  - el estanque
  - el reservorio
  lexicon: HALOT
  rationale: El término puede designar un depósito o reservorio de agua. «Alberca» es un español amplio y comprensible para una obra hidráulica construida; conserva la posibilidad de un depósito sin imponer el tecnicismo moderno de «piscina».
- source_word: הַתְּעָלָה
  english_pob_choice: the conduit
  chosen_spanish: el conducto
  alternatives_spanish:
  - el canal
  - la acequia
  - la conducción
  lexicon: HALOT
  rationale: «Conducto» expresa bien la idea de un canal artificial para el agua y es suficientemente neutral para no fijar de más la forma exacta de la obra.
- source_word: וַיָּבֵא אֶת־הַמַּיִם הָעִירָה
  english_pob_choice: and brought the water into the city
  chosen_spanish: y trajo el agua a la ciudad
  alternatives_spanish:
  - y llevó el agua a la ciudad
  - y metió el agua en la ciudad
  - y condujo el agua a la ciudad
  lexicon: HALOT
  rationale: El hebreo enfatiza el movimiento dirigido del agua hacia la ciudad. «Trajo» mantiene esa idea sin añadir una construcción demasiado técnica en español. Se conserva el objeto definido «el agua».
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos?
  alternatives_spanish:
  - ¿acaso no están escritos?
  - ¿no se hallan escritos?
  - ¿no están registrados?
  lexicon: HALOT
  rationale: La fórmula retórica de cierre se conserva de manera directa. «Están escritos» refleja el pasivo resultativo del hebreo y mantiene el tono de remisión a una fuente histórica.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el Libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de los hechos de los días
  lexicon: HALOT
  rationale: Es un título de fuente histórica. «Crónicas» es el equivalente español natural y tradicional para esta fórmula documental, y el contexto deja claro que se trata de un registro de referencia.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - de los monarcas de Judá
  lexicon: HALOT
  rationale: 'Se conserva la relación posesiva/documental del título fuente: el libro pertenece al ámbito de los reyes de Judá. «Reyes» es la forma más directa y natural en español.'
theological_decisions:
- issue: Tratamiento de la obra hidráulica de Ezequías sin sobreinterpretar el texto
  english_pob_reading: This likely refers to Hezekiah's well-known waterworks in Jerusalem; compare 2 Chronicles 32:30.
  chosen_spanish_reading: Se alude de manera directa a la alberca, el conducto y el agua llevada a la ciudad, sin añadir identificación explícita en el texto principal.
  alternative_spanish_readings:
  - probablemente se refiere a las obras hidráulicas de Ezequías en Jerusalén
  - a saber, el túnel y el reservorio de Jerusalén
  rationale: El hebreo nombra la obra sin explicar su localización. La nota de la POB inglesa permite reconocer la referencia histórica, pero el texto español principal evita una glosa interpretativa que exceda el versículo.
  doctrine_reference: 2 Crónicas 32:30
- issue: Valor de גְּבוּרָתוֹ entre fuerza, poder y hazañas
  english_pob_reading: his might
  chosen_spanish_reading: su valentía
  alternative_spanish_readings:
  - su fuerza
  - su poder
  - sus hazañas
  rationale: El término hebreo tiene un campo semántico amplio que puede incluir vigor, proeza y valor. «Valentía» preserva el matiz de excelencia/heroísmo y no borra la referencia a hechos concretos; se mantiene la tensión semántica para que el lector pueda oír tanto la cualidad como sus manifestaciones.
  doctrine_reference: HALOT, entrada גְּבוּרָה
translation_notes:
  revision_awareness: 'Se siguió de cerca la lectura inglesa auditada sin depender mecánicamente de ella: se mantuvo la fórmula historiográfica, se preservó el cierre retórico y se incorporaron notas para las ambigüedades léxicas de בְּרֵכָה, גְּבוּרָה y la posible referencia histórica a las obras de agua de Ezequías. No se documentaron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «reyes de Judá» como título documental natural en español.
  - Se evitó traducir «gְּבוּרָתוֹ» de forma unívoca como «fuerza» para no perder el matiz heroico del hebreo.
  - Se mantuvo el estilo de pregunta retórica final con puntuación española y remisión explícita a una fuente histórica.
