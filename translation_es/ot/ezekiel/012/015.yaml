translation:
  language: es
  text: Y sabrán que yo soy Yahvé cuando los disperse entre las naciones y los esparza por las tierras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And they will know
  chosen_spanish: Y sabrán
  alternatives_spanish:
  - Y conocerán
  - Y llegarán a saber
  lexicon: HALOT
  rationale: El verbo ידע en este contexto profético expresa reconocimiento/certeza futura. «Sabrán» es natural en español y conserva bien la fuerza resultativa.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el SEÑOR
  - que yo soy Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», siguiendo el criterio del proyecto en lugar de ocultarlo tras un título. La estructura «que yo soy» reproduce la fórmula de reconocimiento.
- source_word: בַּהֲפִיצִי
  english_pob_choice: when I scatter
  chosen_spanish: cuando los disperse
  alternatives_spanish:
  - cuando los esparza
  - al dispersarlos
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo se vierte de manera natural como «cuando». El sentido causativo de פוץ se expresa con «disperse».
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones
  lexicon: HALOT
  rationale: «Naciones» mantiene el valor bíblico habitual de גּוֹיִם en contexto de exilio. «Entre» refleja bien la localización dentro de esos pueblos.
- source_word: וְזֵרִיתִי
  english_pob_choice: and disperse
  chosen_spanish: y los esparza
  alternatives_spanish:
  - y los disperse
  - y los avente
  lexicon: HALOT
  rationale: זרה puede significar dispersar/esparcir, con posible imagen de aventar. En español, «esparza» evita repetición excesiva con «disperse» y conserva la idea de distribución amplia.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  lexicon: HALOT
  rationale: «Tierras» reproduce bien el plural hebreo sin modernizar indebidamente a «países». La preposición «por» conserva el matiz de dispersión extendida.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español del POB, la forma adoptada es «Yahvé», por fidelidad al nombre propio divino y coherencia con el principio editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto en inglés fue revisado y quedó sin cambios sustanciales; la traducción española sigue de cerca el hebreo y adopta el nombre divino «Yahvé» según la política del proyecto. No se detectaron variantes textuales que requirieran nota.
  spanish_consistency_notes:
  - Se mantuvo la repetición pronominal («los disperse ... los esparza») para reflejar los dos objetos directos del hebreo.
  - «Naciones» y «tierras» conservan el paralelismo geográfico del verso.
  - El ritmo breve y profético se preserva sin añadir explicaciones interpretativas.
