translation:
  language: es
  text: Entonces la ira de Dios se levantó contra ellos, y mató a los más robustos[a] de entre ellos; abatió a los jóvenes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘sus gordos’ o ‘sus corpulentos’; probablemente se refiere a sus hombres más robustos o fuertes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף / אַף
  english_pob_choice: Then the anger
  chosen_spanish: Entonces la ira
  alternatives_spanish:
  - Y la ira
  - Entonces el furor
  - Y el furor
  lexicon: HALOT
  rationale: אַף nombra literalmente la ‘nariz’ y por extensión la ira. En este contexto judicial, la expresión idiomática pide ‘ira’ en español; ‘entonces’ conserva el avance narrativo del waw, como en la solución inglesa con ‘Then’.
- source_word: אֱלֹהִים
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  - de los dioses
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios de Israel, no a seres divinos plurales. En español, ‘la ira de Dios’ transmite de manera natural la relación genitiva del hebreo y conserva el sentido del audit trail inglés.
- source_word: עָלָה בָהֶם
  english_pob_choice: rose against them
  chosen_spanish: se levantó contra ellos
  alternatives_spanish:
  - subió contra ellos
  - se alzó contra ellos
  - subió sobre ellos
  lexicon: HALOT
  rationale: El verbo עָלָה con ב expresa subida en sentido hostil. ‘Se levantó contra ellos’ mantiene la imagen de movimiento ascendente y la dirección de oposición sin sonar forzado en español.
- source_word: וַיַּהֲרֹג
  english_pob_choice: he killed
  chosen_spanish: hirió
  alternatives_spanish:
  - mató
  - dio muerte a
  - hizo morir
  lexicon: HALOT
  rationale: El hebreo dice que él mató/derribó en juicio. Como el verso ya sigue con un segundo verbo de abatimiento, ‘hirió’ conserva el acto de golpe fatal de forma sobria y poética; la alternativa más directa sería ‘mató’.
- source_word: בְּמִשְׁמַנֵּיהֶם
  english_pob_choice: the stoutest among them
  chosen_spanish: a los más robustos
  alternatives_spanish:
  - a sus más gordos
  - a sus más recios
  - a los más fuertes
  lexicon: HALOT
  rationale: El hebreo usa un término relacionado con ‘graso/robusto’. La POB inglesa preserva la tensión entre literalidad y sentido contextual con ‘stoutest’. En español, ‘los más robustos’ comunica la idea de vigor o corpulencia sin caer en una expresión extraña como ‘los más gordos’.
- source_word: וּבַחוּרֵי יִשְׂרָאֵל
  english_pob_choice: the young men of Israel
  chosen_spanish: los jóvenes de Israel
  alternatives_spanish:
  - los muchachos de Israel
  - los varones jóvenes de Israel
  - la juventud de Israel
  lexicon: HALOT
  rationale: בָּחוּר designa a un hombre joven, a menudo en la fuerza de la vida y con matiz militar. ‘Los jóvenes de Israel’ es fiel, claro y suficientemente amplio en español.
- source_word: הִכְרִיעַ
  english_pob_choice: he struck down
  chosen_spanish: abatió
  alternatives_spanish:
  - derribó
  - humilló
  - postró
  lexicon: HALOT
  rationale: El hifil de כרע implica hacer doblar o caer. ‘Abatió’ refleja bien la idea de derribo en juicio y armoniza con el paralelismo del verso mejor que una traducción meramente mecánica.
theological_decisions:
- issue: Antropopatismo de la ira divina
  english_pob_reading: Then the anger of God rose against them
  chosen_spanish_reading: Entonces la ira de Dios se levantó contra ellos
  alternative_spanish_readings:
  - Entonces Dios se enojó con ellos
  - Entonces vino sobre ellos la ira de Dios
  rationale: Se conserva la imagen idiomática de la ira que ‘se levanta’ para no aplanar el hebreo en una simple paráfrasis psicológica. La formulación sigue siendo inteligible en español y mantiene la tensión poética del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió ‘stoutest’ sobre ‘strongest’ para reflejar mejor el hebreo relacionado con ‘graso/robusto’. Por eso el español evita ‘fuertes’ como opción principal y usa ‘más robustos’, manteniendo el registro formal y la imagen semántica del texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים en coherencia con el estándar del proyecto cuando no hay necesidad de otra matización.
  - Se mantiene ‘ira’ y no ‘furor’ porque el verso combina la imagen idiomática con un juicio divino explícito.
  - ‘Abatió’ conserva el paralelismo con ‘hirió’ sin introducir una lectura doctrinal ajena al texto.
