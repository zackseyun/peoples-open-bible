  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido del hebreo: la vida de Metusalén después de engendrar a Lamec, la duración de 782 años y el engendramiento de hijos e hijas. Sin embargo, el nombre propio está mal establecido para el español bíblico común: «Metusalén» debería ser «Matusalén».'
