base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/009.yaml
  text: Over the mountains I will lift up weeping and wailing[a], and over the pastures of the wilderness a lament, because they are laid waste so that no man passes through, and they do not hear the sound of livestock. From the birds of the heavens to the beasts, they have fled[c][b]; they are gone.
  footnotes:
  - marker: a
    text: Or 'they are laid waste' for 'they are burned up.' The Hebrew passive verb can denote devastation more generally, though the imagery of burning is likely present.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no man passes through,' with 'man' used generically for any person.
    reason: lexical_alternative
  - marker: c
    text: Or 'birds of the sky.' Hebrew 'heavens' is a common way to refer to the sky.
    reason: lexical_alternative
