translation:
  language: es
  text: 'Los vigilantes vieron a un hombre que salía de la ciudad, y le dijeron: «Por favor, muéstranos la entrada[a] de la ciudad, y te trataremos con bondad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo entrar en la ciudad».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo hesed; a menudo se traduce «bondad», «lealtad» o «amor constante», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁמְרִים
  english_pob_choice: the watchers
  chosen_spanish: los vigilantes
  alternatives_spanish:
  - los que vigilaban
  - los guardias
  - los observadores
  lexicon: HALOT
  rationale: שמְרִים en participio describe a quienes están haciendo guardia o vigilancia. «Vigilantes» conserva el sentido verbal de vigilancia sin forzar una referencia militar más específica que el hebreo no exige.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: אִישׁ nombra de manera directa a una persona masculina individual. «Un hombre» es la correspondencia más natural y precisa en español.
- source_word: יוֹצֵא
  english_pob_choice: coming out
  chosen_spanish: que salía
  alternatives_spanish:
  - que iba saliendo
  - que salía afuera
  lexicon: HALOT
  rationale: El participio de יצא indica movimiento desde el interior hacia afuera. En español, «que salía» transmite ese proceso de salida de modo natural desde la perspectiva de los vigilantes.
- source_word: מְבוֹא
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la vía de entrada
  - la entrada a la ciudad
  lexicon: HALOT
  rationale: מְבוֹא puede referirse al punto de acceso o entrada. «La entrada» es breve, natural y mantiene la posibilidad de la alternativa espacial que el POB inglés preservó en nota.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - por favor te pedimos
  lexicon: HALOT
  rationale: La partícula de cortesía נָא se traduce de forma normal y moderna como «por favor», que expresa la suavización de la súplica sin añadir color arcaico.
- source_word: חָסֶד
  english_pob_choice: we will deal kindly with you
  chosen_spanish: te trataremos con bondad
  alternatives_spanish:
  - te mostraremos bondad
  - te haremos bien
  - te trataremos con misericordia
  lexicon: HALOT
  rationale: חֶסֶד aquí señala un trato favorable o benévolo, no necesariamente el peso teológico pleno de «lealtad del pacto». «Tratar con bondad» conserva la relación interpersonal y el carácter de favor prometido.
theological_decisions:
- issue: Alcance de חֶסֶד en esta negociación narrativa
  english_pob_reading: kindness/favorable treatment rather than covenant-faithfulness language
  chosen_spanish_reading: bondad o trato favorable, no «lealtad del pacto»
  alternative_spanish_readings:
  - lealtad del pacto
  - amor constante
  - misericordia
  rationale: El contexto es una negociación práctica con un desconocido para obtener información. En este marco, חֶסֶד apunta a un favor concreto ofrecido a cambio de ayuda; una traducción más cargada teológicamente exageraría el sentido narrativo inmediato.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje mantiene el mismo sentido general que el borrador inglés auditado. No se detectaron revisiones textuales sustanciales en el paquete de fuente; la principal decisión fue mantener el valor narrativo de חֶסֶד como bondad/trato favorable, conforme al análisis inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene una sintaxis directa y narrativa, acorde con un relato de acción breve.
  - «Vigilantes» se eligió por su neutralidad y por preservar la idea de observación activa sin convertirlos en un cuerpo militar técnico.
