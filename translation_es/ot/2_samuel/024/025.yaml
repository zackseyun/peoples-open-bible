translation:
  language: es
  text: Allí David edificó un altar a Yahvé y ofreció holocaustos y sacrificios de paz[a]. Entonces Yahvé respondió favorablemente por la tierra[b][c], y la plaga fue detenida de sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacrificios de comunión'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente 'Yahvé respondió a la tierra'; la expresión puede entenderse también como 'Yahvé respondió favorablemente por la tierra' o 'Yahvé atendió la oración por la tierra'.
    reason: alternative_reading
  - marker: c
    text: '''Yahvé'' traduce el nombre divino YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: En contexto narrativo, בנה expresa la acción de construir un altar. 'Edificó' suena natural en español bíblico y mantiene el matiz formal de una obra levantada para culto.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En ese lugar
  - Allá
  lexicon: HALOT
  rationale: El adverbio local remite al sitio ya mencionado. 'Allí' es conciso, claro y mantiene la referencia espacial.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: Término técnico establecido para el lugar de sacrificio; no requiere expansión.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino explícito del hebreo como 'Yahvé', según la terminología POB. La preposición marca dirección/dedicación del altar, por lo que 'a Yahvé' es natural en español.
- source_word: וַיַּעַל
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en holocausto
  - subió
  lexicon: HALOT
  rationale: Con ofrendas sacrificiales, עלה tiene sentido idiomático de ofrecer. En español, 'ofreció' ya comunica adecuadamente el acto sacrificial; el contexto de 'holocaustos' mantiene la especificidad.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente tradicional y preciso para עֹלָה en plural, conservando el sentido de ofrendas totalmente consumidas por el fuego.'
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: Se conserva la categoría sacrificial con una expresión transparente en español. 'Ofrendas de paz' es suficientemente literal y evita sustituir sin base el término por una formulación más interpretativa.
- source_word: וַיֵּעָתֵר
  english_pob_choice: responded to the land
  chosen_spanish: respondió a la tierra
  alternatives_spanish:
  - respondió favorablemente a la tierra
  - atendió a la tierra
  lexicon: HALOT
  rationale: El hebreo presenta un verbo de respuesta favorable/entreaty. 'Respondió a la tierra' sigue de cerca la forma del texto, preservando la tensión semántica sin explicitar indebidamente el contenido de la respuesta.
- source_word: לָאָרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - por la tierra
  - para la tierra
  lexicon: HALOT
  rationale: Se traduce de forma directa la preposición y el sustantivo. 'Tierra' mantiene la referencia territorial amplia; el contexto de Israel hace que la expresión sea comprensible en español.
- source_word: וַתֵּעָצַר
  english_pob_choice: was restrained
  chosen_spanish: fue detenida
  alternatives_spanish:
  - fue contenida
  - cesó
  lexicon: HALOT
  rationale: עצר expresa que algo queda contenido o detenido. 'Fue detenida' comunica con claridad la acción pasiva sobre la plaga.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la peste
  - la mortandad
  lexicon: HALOT
  rationale: '''Plaga'' es claro y natural en español para la calamidad mortal del contexto. Mantiene el sentido general sin introducir una interpretación más específica.'
- source_word: מֵעַל יִשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: lejos de Israel
  alternatives_spanish:
  - de sobre Israel
  - de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de sobre Israel'. En español, 'lejos de Israel' expresa con naturalidad que la plaga fue retirada/alejada, preservando la imagen espacial implícita.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama; se mantiene como nombre propio divino en español, conforme al estándar del proyecto. Se evita la sustitución por 'SEÑOR', que ocultaría la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de la respuesta divina en וַיֵּעָתֵר יְהוָה לָאָרֶץ
  english_pob_reading: Yahweh responded to the land
  chosen_spanish_reading: Yahvé respondió a la tierra
  alternative_spanish_readings:
  - Yahvé respondió favorablemente por la tierra
  - Yahvé atendió la súplica por la tierra
  rationale: El hebreo no explicita un objeto como 'plea' en esta cláusula; por eso se conserva una formulación breve y cercana al original. Así no se resuelve artificialmente la tensión entre respuesta divina y la relación exacta con la oración implícita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Naturaleza de la cesación de la plaga
  english_pob_reading: the plague was restrained from Israel
  chosen_spanish_reading: la plaga fue detenida lejos de Israel
  alternative_spanish_readings:
  - la plaga fue contenida fuera de Israel
  - la plaga cesó sobre Israel
  rationale: La cláusula final afirma la detención de la plaga 'de sobre Israel'. 'Fue detenida lejos de Israel' conserva la imagen de alejamiento y el sentido pasivo sin exagerar el mecanismo de la cesación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail en inglés pasó de 'responded to the plea for the land' a 'responded to the land' para ajustarse más al hebreo, que no menciona explícitamente la súplica en esta cláusula. La versión española sigue esa revisión y evita añadir un objeto implícito no expresado en el texto fuente. También conserva la elección revisada de una respuesta divina breve y la noción de que la plaga fue frenada/alejada de Israel, sin desarrollar más de lo que el hebreo afirma.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para el Tetragrama.
  - 'Se prefiere vocabulario sacrificial transparente: ''altar'', ''holocaustos'', ''ofrendas de paz''.'
  - '''Tierra'' y ''Israel'' se conservan según el paralelismo espacial del hebreo.'
  - La sintaxis intenta seguir el orden narrativo del original sin sonar forzada en español.
