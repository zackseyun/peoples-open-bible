translation:
  language: es
  text: El temor de Yahvé es gloria y honor, grandeza y una corona de esplendor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una lectura sustancialmente distinta: «El temor del Señor alegra el corazón, y da gozo, alegría y larga vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאַת / φόβος
  english_pob_choice: the fear of / The fear of the LORD
  chosen_spanish: el temor de
  alternatives_spanish:
  - el miedo de
  - la reverencia de
  - la reverencia hacia
  lexicon: HALOT; BDAG
  rationale: En la sabiduría bíblica, la construcción idiomática «temor de Yahvé»/«temor del Señor» se conserva mejor en español como «el temor de». «Reverencia» suaviza y explicita más de lo que el hebreo y el griego dicen aquí.
- source_word: יְהֹוָה / κυρίου
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: 'Se aplica el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal. Aunque el griego dice κύριος, el contexto remite al nombre divino del hebreo preservado en la fuente primaria de este verso.'
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - honra
  - peso
  lexicon: HALOT
  rationale: «Gloria» reproduce bien la dignidad elevada del término hebreo y mantiene el primer miembro de la serie nominal.
- source_word: וִיקָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - preciosidad
  - valor
  - esplendor
  lexicon: HALOT
  rationale: «Honor» es la mejor correspondencia natural en español para este segundo término, sin borrar la pareja semántica con כָּבוֹד.
- source_word: וּגְדֻלָּה
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - majestad
  - exaltación
  lexicon: HALOT
  rationale: «Grandeza» es directo y transparente, y conserva el tono de la enumeración nominal.
- source_word: וְעֲטֶרֶת תִּפְאָרֶת
  english_pob_choice: and a crown of splendor
  chosen_spanish: y una corona de esplendor
  alternatives_spanish:
  - y una corona de gloria
  - y una diadema de esplendor
  - y una corona de belleza
  lexicon: HALOT
  rationale: «Corona de esplendor» sigue de cerca la imagen hebrea y evita banalizar תִּפְאָרֶת. «Esplendor» funciona mejor en español que repetir «gloria».
- source_word: φόβος κυρίου τέρψει καρδίαν ... εὐφροσύνην ... χαρὰν ... μακροημέρευσιν
  english_pob_choice: 'Greek has a substantially different reading: ''The fear of the Lord delights the heart, and gives gladness and joy and long life.'''
  chosen_spanish: «El temor del Señor alegra el corazón, y da gozo, alegría y larga vida.»
  alternatives_spanish:
  - «El temor del Señor deleita el corazón, y da regocijo, alegría y larga vida.»
  - «El temor del Señor produce alegría en el corazón, y da felicidad, gozo y larga vida.»
  lexicon: BDAG
  rationale: Se preserva como lectura alternativa la forma verbal y la serie de beneficios del griego, ya que diverge de la lista nominal hebrea y el expediente inglés la marcó como variante significativa.
theological_decisions:
- issue: Prioridad entre el hebreo conservado y el paralelo griego divergente en Sirach 1:11
  english_pob_reading: Follow the Hebrew nominal description in the main text, preserving the Greek alternative in a footnote.
  chosen_spanish_reading: Seguir la descripción nominal hebrea en el texto principal, con la alternativa griega en nota.
  alternative_spanish_readings:
  - 'Seguir el griego como texto principal: «El temor del Señor alegra el corazón, y da gozo, alegría y larga vida.»'
  rationale: La política del proyecto da primacía al hebreo donde se conserva en Sirácides, pero usa el griego como testimonio real y preserva honestamente la divergencia. Por eso el texto principal sigue la serie nominal hebrea y la nota ofrece la lectura griega.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as input and preserve uncertainty honestly.'
translation_notes:
  revision_awareness: Sin cambios respecto del último repaso; la lectura principal sigue el hebreo conservado y la variante griega se mantiene explícita en nota por tratarse de una divergencia material.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el criterio del proyecto.
  - Se mantiene la serie nominal del hebreo sin convertirla en verbo, porque eso borraría la tensión textual con el griego.
  - «Esplendor» se reserva para תִּפְאָרֶת y evita duplicar «gloria».
  - La nota conserva la alternativa griega con sintaxis natural en español, sin ocultar que el testimonio griego difiere sustancialmente.
