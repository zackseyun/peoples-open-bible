translation:
  language: es
  text: ¡He aquí![a] Viene, y sucederá, declara el Señor Yahvé. Este es el día del que he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «He aquí, ha venido y ha sucedido»; el hebreo usa formas que pueden presentar el futuro como tan cierto que se habla de él como ya cumplido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: Reproduce la interjección profética de llamada de atención. En español, «¡Mira!» comunica mejor la inmediatez y el tono exhortativo que «He aquí», sin perder la solemnidad del anuncio.
- source_word: בָאָה
  english_pob_choice: it is coming
  chosen_spanish: Está viniendo
  alternatives_spanish:
  - Viene
  - Está por venir
  - Ha venido
  lexicon: HALOT
  rationale: El hebreo usa una forma perfecta en un contexto profético de certeza futura. «Está viniendo» mantiene esa inminencia en español de forma natural, sin convertirla en un pasado ni exigir una paráfrasis explicativa en el texto principal.
- source_word: וְנִהְיָתָה
  english_pob_choice: and it will happen
  chosen_spanish: y sucederá
  alternatives_spanish:
  - y acontecerá
  - y será
  - y ha sucedido
  lexicon: HALOT
  rationale: La raíz expresa llegar a ser o acontecer. «Sucederá» es una solución clara y digna para el cumplimiento seguro del anuncio, conservando el enlace con la frase anterior.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Declara» preserva el carácter formal de la proclamación divina y evita tecnicismos menos transparentes para el lector general.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la convención española del proyecto, y se mantiene el título reverente «el Señor» para אֲדֹנָי. El orden elegido evita una repetición torpe y refleja el compuesto honorífico del hebreo.
- source_word: הוּא
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Éste es
  - Es este
  lexicon: HALOT
  rationale: El pronombre es enfático y señala identificando el día anunciado. «Este es» reproduce bien la fuerza demostrativa del hebreo en español actual.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - aquel día
  - ese día
  lexicon: HALOT
  rationale: Se mantiene el artículo definido del hebreo. No se fuerza «aquel día» porque el texto presenta el día como identificado por el contexto inmediato, no necesariamente distante.
- source_word: אֲשֶׁר
  english_pob_choice: of which
  chosen_spanish: del que
  alternatives_spanish:
  - de que
  - que
  lexicon: HALOT
  rationale: En español, la relación con «el día» se expresa de manera más natural con una relativa preposicional. «Del que» conserva la dependencia sintáctica sin añadir interpretación.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - dije
  lexicon: HALOT
  rationale: El perfecto hebreo mantiene la relevancia presente de la palabra ya pronunciada por Dios. «He hablado» refleja bien esa vigencia profética en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה en un compuesto con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  - Yahvé, el Señor
  rationale: El texto hebreo distingue el nombre pactal יהוה y el título אֲדֹנָי. En el POB español se mantiene «Yahvé» para el Tetragrámaton; por claridad y fidelidad al compuesto, se usa además «el Señor» para אֲדֹנָי. Esta combinación evita la sustitución tradicional por mayúsculas o un simple «Señor» que borraría el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido y las decisiones auditadas del texto fuente hebreo y del POB inglés. Se conserva la tensión profética del perfecto hebreo con una formulación natural en español, y se mantiene sin ocultarla la distinción entre el nombre divino יהוה y el título אֲדֹנָי.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme a la política del proyecto.
  - Se evita «Cristo» y otras equivalencias no pertinentes; el versículo no contiene léxico mesiánico.
  - La estructura breve y declarativa conserva el tono oracular del hebreo.
  - La nota a pie de página refleja la alternativa formal documentada en el POB inglés sin sustituir el texto principal.
