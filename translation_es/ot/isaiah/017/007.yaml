translation:
  language: es
  text: En aquel día[a] el hombre[b] mirará a su Hacedor, y sus ojos mirarán al Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "En ese día".'
    reason: lexical_alternative
  - marker: b
    text: '"El hombre" aquí es un singular representativo, es decir, la humanidad en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: Mantiene el idiomatismo profético y la fuerza temporal/esatológica del hebreo sin forzar una lectura más específica que la del texto.
- source_word: יִשְׁעֶה
  english_pob_choice: will look to
  chosen_spanish: mirará a
  alternatives_spanish:
  - volverá la mirada a
  - prestará atención a
  - mirará hacia
  lexicon: HALOT
  rationale: El verbo expresa dirigir la mirada o la atención hacia alguien. 'Mirará a' conserva la relación visual y de orientación sin introducir explícitamente 'confiar' o 'arrepentirse', que el hebreo no enuncia de forma directa.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: Se conserva el singular representativo del hebreo. 'El hombre' reproduce la forma y el valor genérico del original con registro natural en español.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: Con 'mirar' en español, 'a' es la preposición más natural para expresar dirección hacia un objeto o persona de atención.
- source_word: עֹשֵׂהוּ
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - el que lo hizo
  - su creador
  lexicon: HALOT
  rationale: El participio con sufijo significa 'el que lo hizo'. 'Hacedor' es una equivalencia sobria y fiel, y conserva el matiz relacional del posesivo. Se evita 'Creador' porque el hebreo usa el verbo hacer, no el léxico específico de crear.
- source_word: וְעֵינָיו
  english_pob_choice: and his eyes
  chosen_spanish: y sus ojos
  alternatives_spanish:
  - y su mirada
  - y sus ojos mismos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del paralelismo hebreo. 'Sus ojos' mantiene la concreción poética sin reinterpretar la metáfora.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional simple; con 'mirarán' funciona de manera natural en español.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  lexicon: HALOT
  rationale: Se traduce el título isaiano consagrado en español bíblico, preservando el valor de título divino sin transliteración.
- source_word: תִּרְאֶינָה
  english_pob_choice: will look
  chosen_spanish: mirarán
  alternatives_spanish:
  - verán
  - contemplarán
  lexicon: HALOT
  rationale: En este paralelismo, ראה también denota dirigir la vista. 'Mirarán' preserva la correspondencia con el primer colon y evita reducirlo a mera percepción visual.
theological_decisions:
- issue: Valor representativo de הָאָדָם
  english_pob_reading: '''Man'' here is a representative singular, meaning humanity in general.'
  chosen_spanish_reading: '''El hombre'' aquí es un singular representativo, es decir, la humanidad en general.'
  alternative_spanish_readings:
  - '''La humanidad'''
  - '''Las personas'''
  rationale: Se conserva el singular gramatical del hebreo y su función representativa, sin perder el alcance colectivo señalado en el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; contested term אָדָם
- issue: Preservación de la tensión semántica entre mirar, atender y volver la mirada
  english_pob_reading: '''will look to'' and ''will look'' without overstating trust or repentance'
  chosen_spanish_reading: '''mirará a'' / ''mirarán'' sin explicitar ''confiará en'' ni ''se arrepentirá'''
  alternative_spanish_readings:
  - '''confiará en'''
  - '''volverá a'''
  - '''se volverá a'''
  rationale: El texto profético sugiere una orientación renovada hacia Dios, pero las formas verbales elegidas en hebreo describen mirar/regardar. La traducción conserva esa tensión y evita cerrar el sentido demasiado pronto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El paquete inglés presenta acuerdo alto y no registra revisiones aplicadas; la redacción española sigue esa lectura estable y conserva las decisiones léxicas y teológicas auditadas, especialmente el singular representativo de הָאָדָם y el paralelismo entre mirar y mirar.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino.
  - '''Santo de Israel'' se conserva como título isaiano tradicional y plenamente traducido.'
  - Se usa 'Hacedor' para reflejar el participio de 'hacer' y no se sustituye por 'Creador' sin base léxica directa.
  - El paralelismo verbal se preserva con 'mirará' / 'mirarán' para evitar una distinción artificial entre orientación interior y visión física.
