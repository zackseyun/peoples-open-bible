translation:
  language: es
  text: 'Y Elías dijo[a]: «Tan cierto como que vive Yahvé de los Ejércitos, delante de quien estoy, hoy me presentaré ante él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me apareceré ante él» / «me mostraré ante él». El verbo hebreo puede significar ser visto o presentarse uno mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh of hosts lives
  chosen_spanish: ¡Vive Yahvé de los ejércitos!
  alternatives_spanish:
  - Vive Yahvé
  - ¡Por la vida de Yahvé de los ejércitos!
  - ¡Tan cierto como que Yahvé de los ejércitos vive!
  lexicon: HALOT
  rationale: 'En español, la fórmula juratoria hebrea se expresa con naturalidad como una proclamación de vida: «Vive Yahvé de los ejércitos». Conserva el carácter solemne e idiomático del juramento sin convertirlo en una paráfrasis explicativa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en la forma normativa del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» preserva la amplitud del título divino sin restringirlo solo a un sentido militar, y es transparente en español.
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  english_pob_choice: before whom I stand
  chosen_spanish: ante quien estoy de pie
  alternatives_spanish:
  - en cuya presencia estoy
  - delante de quien sirvo
  - ante quien estoy
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de estar delante de un superior. «Ante quien estoy de pie» reproduce la relación de presencia y servicio sin borrar la metáfora original.
- source_word: אֵרָאֶה אֵלָיו
  english_pob_choice: I will surely present myself to him
  chosen_spanish: me presentaré ante él
  alternatives_spanish:
  - me apareceré ante él
  - me mostraré ante él
  - seré visto por él
  lexicon: HALOT
  rationale: El nifal de ראה admite el matiz de aparecer/presentarse. En español, «me presentaré ante él» comunica ese sentido intencional y mantiene la ambigüedad controlada entre aparecer y presentarse, como refleja el aparato en inglés.
theological_decisions:
- issue: Nombre divino יהוה en el juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa el Tetragrámaton de manera directa, y el proyecto POB lo vierte como nombre propio divino. En español, «Yahvé» preserva esa decisión y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del verbo אֵרָאֶה
  english_pob_reading: I will surely present myself to him / I will appear before him / I will show myself to him
  chosen_spanish_reading: me presentaré ante él
  alternative_spanish_readings:
  - me apareceré ante él
  - me mostraré ante él
  rationale: La nota inglesa deja abierta la tensión entre aparecer y presentarse. El español «me presentaré ante él» conserva la fuerza reflexiva del hebreo y la opción de aparición voluntaria, sin cerrar indebidamente la ambigüedad.
  doctrine_reference: HALOT, s.v. ראה (Nifal)
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reportó alto acuerdo; por eso la redacción española sigue de cerca las decisiones léxicas ya auditadas en inglés, especialmente el juramento con Yahvé de los ejércitos y la ambigüedad del nifal de ראה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se conserva «de los ejércitos» para צְבָאוֹת, evitando sustituciones interpretativas.
  - Se respeta la construcción reverente «ante quien estoy de pie» para la frase de presencia/servicio.
  - La nota de pie marca la alternativa semántica del verbo final sin duplicar la ambigüedad en el cuerpo principal.
