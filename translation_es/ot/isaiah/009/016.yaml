translation:
  language: es
  text: Por tanto, el Señor no se regocija por sus jóvenes[a], ni tiene compasión de sus huérfanos y de sus viudas; porque todos ellos son impíos y malhechores, y toda boca habla insensatez[b]. Con todo esto, su ira no se ha apartado, y todavía su mano está extendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «sus jóvenes ... sus huérfanos ... sus viudas»; el español usa posesivos plurales para reflejar el referente colectivo del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «toda boca habla vileza», «locura vil» o «cosas vergonzosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la relación inferencial y causal del hebreo sin sonar mecánico; en español bíblico actual, «Por tanto» expresa bien la conclusión del juicio precedente.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: HALOT
  rationale: El texto hebreo usa el título divino; en esta serie se ha fijado Yahvé como representación del nombre divino, no la máscara «SEÑOR». Aunque la forma morfológica puede relacionarse con lectura reverencial, el referente es el Dios de Israel.
- source_word: בַּחוּרָיו
  english_pob_choice: their young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus hombres jóvenes
  - sus muchachos
  lexicon: HALOT
  rationale: בָּחוּר designa a un joven en la plenitud de la fuerza. «Jóvenes» conserva el sentido y evita una perífrasis pesada; «sus» refleja el referente colectivo del pueblo en contexto.
- source_word: יְתֹמָיו
  english_pob_choice: their fatherless
  chosen_spanish: sus huérfanos
  alternatives_spanish:
  - sus huérfanos de padre
  - sus huérfanos y desamparados
  lexicon: HALOT
  rationale: «Huérfanos» comunica directamente el término hebreo. Aunque «padreless» subraya la ausencia del padre, en español «huérfanos» es el equivalente natural y mantiene la carga social del texto profético.
- source_word: אַלְמְנֹתָיו
  english_pob_choice: their widows
  chosen_spanish: sus viudas
  alternatives_spanish:
  - las viudas de ellos
  lexicon: HALOT
  rationale: Correspondencia directa y natural del plural con sufijo; el posesivo colectivo «sus» evita una lectura individual del sufijo singular hebreo.
- source_word: יְרַחֵם
  english_pob_choice: have compassion
  chosen_spanish: tiene compasión
  alternatives_spanish:
  - se compadece
  - muestra misericordia
  lexicon: HALOT
  rationale: «Tener compasión» reproduce bien la fuerza compasiva del verbo sin perder claridad. Mantiene la relación semántica con misericordia, pero en español suena más directo y actual.
- source_word: כֻלּוֹ
  english_pob_choice: every one of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  - todo el pueblo
  lexicon: HALOT
  rationale: El singular colectivo hebreo se expresa naturalmente en plural distributivo en español. «Todos ellos» conserva la totalidad sin introducir un matiz demasiado individualizador.
- source_word: חָנֵף
  english_pob_choice: godless
  chosen_spanish: impíos
  alternatives_spanish:
  - profanos
  - hipócritas
  lexicon: HALOT
  rationale: En el contexto profético, el término apunta a irreligiosidad/impiedad más que a simple apariencia externa. «Impíos» conserva la censura moral-religiosa del original.
- source_word: מֵרַע
  english_pob_choice: an evildoer
  chosen_spanish: malhechores
  alternatives_spanish:
  - los que hacen el mal
  - malos
  lexicon: HALOT
  rationale: El participio describe a quienes practican el mal; «malhechores» es conciso, idiomático y mantiene la idea de conducta dañina.
- source_word: כָל פֶּה דֹּבֵר נְבָלָה
  english_pob_choice: every mouth speaks folly
  chosen_spanish: toda boca habla vileza
  alternatives_spanish:
  - toda boca habla locura
  - toda boca dice cosas viles
  lexicon: HALOT
  rationale: «נְבָלָה» puede abarcar discurso vergonzoso, vil o torpe. «Vileza» preserva el peso moral del término mejor que «locura»; mantiene el tono severo del reproche. En nota se deja abierta la alternativa de lectura.
- source_word: בְּכָל זֹאת
  english_pob_choice: For all this
  chosen_spanish: Con todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Pese a todo esto
  lexicon: HALOT
  rationale: Reproduce la fórmula de Isaías con una construcción natural en español que expresa la persistencia del juicio divino pese a lo dicho previamente.
- source_word: לֹא שָׁב אַפּוֹ
  english_pob_choice: his anger has not turned away
  chosen_spanish: no se ha vuelto su ira
  alternatives_spanish:
  - no se ha apartado su ira
  - su ira no ha retrocedido
  lexicon: HALOT
  rationale: El hebreo usa el idioma de «volver/retornar» para la ira. «No se ha vuelto» conserva el giro idiomático y la idea de que el enojo divino no ha cedido.
- source_word: יָדוֹ נְטוּיָה
  english_pob_choice: his hand is still stretched out
  chosen_spanish: todavía su mano está extendida
  alternatives_spanish:
  - su mano sigue extendida
  - su mano permanece extendida
  lexicon: HALOT
  rationale: Conserva la imagen de juicio en curso. «Está extendida» mantiene la metáfora bíblica sin forzar una interpretación explicativa.
theological_decisions:
- issue: Título divino אֲדֹנָי en un contexto de juicio profético
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: Dado el criterio editorial del proyecto, el nombre divino se representa como Yahvé. En Isaías el referente es inequívocamente el Dios de Israel; usar una sustitución reverencial ocultaría esa transparencia textual. La decisión no altera el contenido teológico, sino que hace visible el nombre divino donde el hebreo lo presupone.
  doctrine_reference: Principio POB sobre יהוה / YHWH → Yahvé; transparencia textual del nombre divino
- issue: Sujeto colectivo con sufijos singulares en «sus jóvenes / sus huérfanos / sus viudas»
  english_pob_reading: their young men ... their fatherless ... their widows
  chosen_spanish_reading: sus jóvenes ... sus huérfanos ... sus viudas
  alternative_spanish_readings:
  - sus jóvenes ... sus huérfanos de padre ... sus viudas
  - sus jóvenes ... los huérfanos de ellos ... las viudas de ellos
  rationale: El hebreo tiene sufijos singulares, pero el referente es la comunidad completa. En español, el posesivo plural colectivo comunica mejor el sentido sin sugerir un propietario individual. Así se preserva la lectura corporativa que el audit trail inglés ya documenta.
  doctrine_reference: Tratamiento de referentes colectivos; correspondencia semántica de sufijos pronominales
- issue: Valor semántico de נְבָלָה
  english_pob_reading: folly
  chosen_spanish_reading: vileza
  alternative_spanish_readings:
  - locura
  - disparate
  - cosas viles
  rationale: El inglés dejó abierta la ambigüedad entre tontería, vileza y cosas vergonzosas. En español, «vileza» mantiene el componente moral y vergonzoso mejor que una simple «locura», sin apagar la tensión semántica del término hebreo. La nota conserva la alternativa léxica.
  doctrine_reference: Preservación de tensiones léxicas; no reducción de נְבָלָה a un solo matiz
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene la lectura colectiva de los sufijos y deja abierta la ambigüedad de נְבָלָה con una nota alternativa. Esta versión española sigue esa misma línea: conserva el referente corporativo con posesivos plurales, mantiene el juicio en curso con la imagen de la mano extendida y traduce נְבָלָה con un término que retiene su fuerza moral, dejando en nota la posibilidad de otra matización léxica.'
  spanish_consistency_notes:
  - Se usa Yahvé conforme al criterio editorial del proyecto para el nombre divino.
  - Se evita «SEÑOR» como máscara tipográfica, aunque el inglés POB diga «the Lord», porque el hebreo aquí apunta al nombre divino.
  - «Impíos» y «malhechores» mantienen el doble reproche moral del hebreo sin suavizarlo.
  - «Vileza» en el cuerpo del texto preserva el tono severo; la nota ofrece la alternativa de «locura» para reflejar la amplitud semántica de נְבָלָה.
  - El posesivo plural «sus» se emplea por coherencia con el referente colectivo, no por una lectura de posesión individual.
