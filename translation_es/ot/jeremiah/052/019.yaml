  text: And the bowls[a], the firepans, the basins, the pots, the lampstands, the cups, and the vessels for pouring—whatever was gold, gold, and whatever was silver[d][c][b], silver—the captain of the guard took.
  footnotes:
  - marker: a
    text: Or 'the cups' for 'the bowls' (הַסִּפִּים); the exact distinction among several temple vessel terms in this list is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the censers' for 'the firepans.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew repeats ''gold, gold'' and ''silver, silver'' for emphasis: ''whatever was of gold, gold, and whatever was of silver, silver.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'the chief of the executioners' for 'the captain of the guard.'
    reason: lexical_alternative
