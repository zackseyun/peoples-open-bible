translation:
  language: es
  text: Recuerda a tu congregación, la que adquiriste[a] desde antiguo[b], la que redimiste como la tribu[c] de tu heredad—el monte Sion[d], donde has habitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Adquiriste» también puede entenderse como «compraste» o, menos probablemente aquí, «creaste».
    reason: lexical_alternative
  - marker: b
    text: O «de antaño».
    reason: lexical_alternative
  - marker: c
    text: O «cetro» o «vara»; aquí «tribu» encaja mejor con el pueblo redimido.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «este», en referencia al monte Sion.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Recuerda
  lexicon: HALOT
  rationale: Imperativo de segunda persona singular dirigido a Dios. «Recuerda» es natural en español bíblico y conserva el tono de súplica sin caer en arcaísmo excesivo.
- source_word: עֲדָתְךָ
  english_pob_choice: your congregation
  chosen_spanish: tu congregación
  alternatives_spanish:
  - tu asamblea
  - tu comunidad
  lexicon: HALOT
  rationale: El término denota el pueblo reunido como cuerpo. «Congregación» preserva el sentido colectivo y covenantal, y es comprensible en español eclesial.
- source_word: קָנִיתָ
  english_pob_choice: you acquired
  chosen_spanish: adquiriste
  alternatives_spanish:
  - compraste
  - poseíste
  - creaste
  lexicon: HALOT
  rationale: El hebreo puede abarcar adquirir/comprar/poseer y, en algunos contextos, crear. Aquí el paralelismo con «redimiste» favorece la idea de que Yahvé tomó a Israel como suyo; «adquiriste» conserva esa amplitud sin fijar indebidamente una metáfora comercial.
- source_word: קֶּדֶם
  english_pob_choice: long ago
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde hace mucho
  - desde tiempos antiguos
  - de antaño
  lexicon: HALOT
  rationale: El sustantivo/adverbio marca antigüedad temporal. «Desde antiguo» es una forma breve, digna y fiel al valor de remota antigüedad.
- source_word: גָּאַלְתָּ
  english_pob_choice: you redeemed
  chosen_spanish: redimiste
  alternatives_spanish:
  - rescataste
  - libraste con rescate
  lexicon: HALOT
  rationale: «Redimir» conserva el peso teológico y el trasfondo de rescate familiar/covenantal del verbo גאל mejor que un verbo más general.
- source_word: שֵׁבֶט נַחֲלָתֶךָ
  english_pob_choice: the tribe of your inheritance
  chosen_spanish: la tribu de tu heredad
  alternatives_spanish:
  - el cetro de tu heredad
  - la vara de tu heredad
  lexicon: HALOT
  rationale: Aunque שֵׁבֶט puede significar cetro o vara, el contexto habla del pueblo redimido de Dios; por eso «tribu» es la lectura más coherente. «Heredad» reproduce נַחֲלָה con el matiz de posesión hereditaria/covenantal.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sion
  alternatives_spanish:
  - Monte Sion
  - el monte de Sion
  lexicon: HALOT
  rationale: En español, «el monte Sion» es claro, reverente y mantiene el nombre propio del lugar sin añadir elementos.
- source_word: שָׁכַנְתָּ בּוֹ
  english_pob_choice: where you have dwelled
  chosen_spanish: donde has habitado
  alternatives_spanish:
  - donde habitaste
  - donde has morado
  - en el cual has habitado
  lexicon: HALOT
  rationale: שכן expresa habitar/establecer morada, con resonancias de presencia divina. «Has habitado» refleja bien el perfecto hebreo y su valor de acción pasada con relevancia presente.
theological_decisions:
- issue: Posible sentido de קָנִיתָ como «crear» en vez de «adquirir»
  english_pob_reading: covenant acquisition of Israel as God's people
  chosen_spanish_reading: adquisición de pacto de Israel como pueblo de Dios
  alternative_spanish_readings:
  - creaste a tu congregación
  - formaste a tu congregación
  rationale: El contexto inmediato une «adquiriste» con «redimiste», lo que apunta a la apropiación histórica y pactal del pueblo, no a la creación ex nihilo. La traducción elegida preserva esa tensión sin sobreespecificar.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de שֵׁבֶט como «tribu» frente a «cetro/vara»
  english_pob_reading: tribe
  chosen_spanish_reading: tribu
  alternative_spanish_readings:
  - cetro
  - vara
  rationale: La secuencia «tu congregación... la que redimiste» se refiere al pueblo de Yahvé. En ese marco, «tribu» mantiene el referente corporativo y evita introducir simbolismo realista no pedido por el contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la expansión apposicional «this mountain» porque era innecesaria y algo incómoda; por eso el español también omite una glosa equivalente y deja «el monte Sion» como referente suficiente. Asimismo, el inglés ajustó el tiempo a «where you have dwelled», así que el español usa «donde has habitado» para reflejar el perfecto con naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo el hebreo usa forma verbal dirigida a Dios sin el nombre divino, así que no se introduce.
  - Se usa «heredad» para נַחֲלָה en armonía con el registro bíblico y para conservar la idea de posesión pactal.
  - «Congregación» se elige por su amplitud comunitaria; no se reemplaza por «iglesia» para evitar anacronismo.
  - 'Se conserva el paralelismo verbal con dos perfectos españoles: «adquiriste / redimiste», y luego «has habitado» para reflejar el cambio de matiz temporal del hebreo.'
