revisions:
- from: y cuando el pecado que cometieron llegue a ser conocido[a], la asamblea ofrecerá un toro, un hijo del ganado, como sacrificio por el pecado, y lo llevará delante de la tienda de reunión.
  to: y cuando el pecado que cometieron llegue a ser conocido[a], la asamblea ofrecerá un toro del ganado como sacrificio por el pecado, y lo traerá ante la tienda de reunión.
  rationale: Se ajustó una literalidad excesiva ('un hijo del ganado') a un español natural y fiel ('un toro del ganado'), y se mejoró el verbo/dirección cultual con 'lo traerá ante' para reflejar mejor וְהֵבִיאוּ אֹתוֹ לִפְנֵי. Se mantuvo la nota léxica sobre el doble sentido de חַטָּאת.
