translation:
  text: And after saying this[a], the devout young man breathed his last.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'gave up his soul.' Here the Greek expression is an idiom for dying.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: LSJ
  rationale: Standard connective introducing the next action in sequence.
- source_word: ταῦτα εἰπών
  chosen: after saying this
  alternatives:
  - having said this
  - and when he had said these things
  lexicon: LSJ
  rationale: Aorist participle plus demonstrative naturally gives a temporal sense in English. 'After saying this' is idiomatic and preserves the sequence without unnecessary stiffness.
- source_word: ὁ ἱεροπρεπὴς
  chosen: the reverent
  alternatives:
  - the holy
  - the noble in sacred bearing
  - the priestly
  lexicon: LSJ
  rationale: ἱεροπρεπής denotes what is fitting for sacred matters, reverent, or holy in demeanor. 'Reverent' best captures the moral-religious quality here without implying the youth held priestly office.
- source_word: νεανίας
  chosen: young man
  alternatives:
  - youth
  - young warrior
  lexicon: LSJ
  rationale: The term refers to a young male person. 'Young man' is clear modern English and more natural than the somewhat literary 'youth.'
- source_word: ἀπέρρηξεν τὴν ψυχήν
  chosen: gave up his life
  alternatives:
  - expired
  - breathed his last
  - gave up his soul
  lexicon: LSJ
  rationale: This idiom refers to death. 'Gave up his life' communicates the sense clearly in modern English. 'Gave up his soul' is more literal but can mislead modern readers into a more technical anthropological statement than the idiom requires.
