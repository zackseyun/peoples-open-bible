  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» se usa correctamente; no hay conflictos con términos doctrinales clave. «Tu confianza» es aceptable para כִּסְלֶךָ, con «tu seguridad» como alternativa válida en nota. Se recomienda evitar una alternativa española excesivamente literal como «en tus lomos» en la nota principal, y preferir «a tu lado» como la opción literal más comprensible.'
