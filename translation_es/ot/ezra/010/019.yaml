translation:
  language: es
  text: Dieron su mano[a] para despedir a sus esposas, y, siendo culpables[b], ofrecieron un carnero del rebaño por su culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «dieron su mano», un hebraísmo para sellar un compromiso o acuerdo vinculante.
    reason: lexical_alternative
  - marker: b
    text: 'O, más explícitamente: «ofrecieron un carnero del rebaño como ofrenda por la culpa, por su culpa».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנוּ יָדָם
  english_pob_choice: They gave their hand
  chosen_spanish: Les dieron la mano
  alternatives_spanish:
  - se comprometieron
  - dieron su palabra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en contexto, señala un compromiso solemne. En español, «les dieron la mano» conserva la imagen literal del hebreo y mantiene la fuerza de un pacto o acuerdo vinculante, tal como el audit trail inglés optó por una forma más literal que «pledged themselves».
- source_word: לְהוֹצִיא
  english_pob_choice: to send away
  chosen_spanish: despedir
  alternatives_spanish:
  - enviar fuera
  - repudiar
  lexicon: HALOT
  rationale: El infinitivo causativo expresa hacer salir o apartar. En este contexto matrimonial, «despedir» comunica con naturalidad la acción de apartar o separar a las esposas, sin añadir una carga interpretativa mayor que la del hebreo.
- source_word: נְשֵׁיהֶם
  english_pob_choice: their wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: HALOT
  rationale: El contexto es matrimonial, por lo que «esposas» es el sentido claro y preciso. «Mujeres» sería demasiado amplio y menos exacto.
- source_word: וַאֲשֵׁמִים
  english_pob_choice: and being guilty
  chosen_spanish: y, siendo culpables
  alternatives_spanish:
  - y eran culpables
  - y como culpables
  lexicon: HALOT
  rationale: El adjetivo describe su estado de culpa en conexión con la ofrenda que sigue. «Siendo culpables» conserva el valor predicativo y enlaza bien con el motivo sacrificial.
- source_word: אֵיל צֹאן
  english_pob_choice: a ram of the flock
  chosen_spanish: un carnero del rebaño
  alternatives_spanish:
  - un carnero de la grey
  - un carnero del ganado
  lexicon: HALOT
  rationale: La frase designa un carnero como animal sacrificial. «Del rebaño» es una traducción natural y suficientemente formal; preserva la concreción del sustantivo hebreo sin forzar un tecnicismo innecesario.
- source_word: עַל אַשְׁמָתָם
  english_pob_choice: for their guilt
  chosen_spanish: por su culpa
  alternatives_spanish:
  - a causa de su culpa
  - por su culpa-ofensa
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa la base o motivo de la ofrenda. «Por su culpa» es breve, natural y fiel al sentido causal/sacrificial del texto.
theological_decisions:
- issue: Si conviene explicitar «ofrenda por la culpa» en el texto principal
  english_pob_reading: Kept the text as 'they offered a ram of the flock for their guilt' rather than inserting 'as a guilt offering'
  chosen_spanish_reading: Conservar «ofrecieron un carnero del rebaño por su culpa» sin añadir en el cuerpo del texto el tecnicismo completo «ofrenda por la culpa»
  alternative_spanish_readings:
  - ofrecieron un carnero del rebaño como ofrenda por la culpa
  - ofrecieron un carnero del rebaño como ofrenda expiatoria por su culpa
  rationale: El hebreo menciona el carnero y la culpa, pero no formula aquí un sustantivo separado equivalente a «ofrenda». Para no sobreespecificar, el texto principal mantiene una redacción sobria y deja la alternativa más explícita como nota.
  doctrine_reference: 'Principio de fidelidad semántica: no añadir precisión técnica que el texto fuente no exprese de manera explícita.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y la decisión revisada del audit trail inglés: mantiene el valor idiomático de «dar la mano» en forma natural y conserva la referencia sacrificial sin ampliar indebidamente el tecnicismo de la ofrenda. También respeta la revisión inglesa que prefirió una forma más literal para la primera cláusula y una formulación formal para el carnero «del rebaño».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia divina explícita.
  - Se prefirió «culpa» para אַשְׁמָה, evitando «delito» o «culpabilidad» porque el contexto es sacrificial y relacional.
  - «Esposas» se mantiene por coherencia con el contexto matrimonial y para evitar ambigüedad.
  - El texto principal no inserta «ofrenda por la culpa» como parte obligatoria de la línea, para no eclipsar la estructura hebrea de carnero + culpa.
