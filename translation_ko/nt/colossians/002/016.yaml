id: COL.2.16
reference: Colossians 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μὴ οὖν τις ὑμᾶς κρινέτω ἐν βρώσει ⸀ἢ ἐν πόσει ἢ ἐν μέρει ἑορτῆς ἢ νουμηνίας ἢ σαββάτων,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/016.yaml
  text: Therefore, let no one judge you in food or in drink, or with regard to a festival or a new moon or Sabbaths.
translation:
  language: ko
  text: 그러므로 먹는 것이나 마시는 것으로, 혹은 절기나 초하루[a]나 안식일들에 관한 일로 아무도 여러분을 판단하지 못하게 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「초하루」는 헬라어 νουμηνία로, 매월 새 달이 뜨는 날의 절기를 가리킨다. 「절기·초하루·안식일들」은 연·월·주 단위의 유대 예전 달력을 함께 가리킨다.
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ οὖν τις
  english_pob_choice: Therefore, let no one
  chosen_korean: 그러므로 ... 아무도 ... 못하게 하십시오
  alternatives_korean:
  - 그러므로 누구도 ~하지 못하게
  lexicon: BDAG
  rationale: 추론적 οὖν와 금지 명령을 합쇼체 종결로 자연스럽게 옮긴다.
- source_word: κρινέτω
  english_pob_choice: let no one judge
  chosen_korean: 판단하지
  alternatives_korean:
  - 정죄하지
  - 비판하지
  lexicon: BDAG
  rationale: κρίνω의 정죄적 「판단」을 「판단하다」로 옮긴다.
- source_word: ἐν βρώσει ἢ ἐν πόσει
  english_pob_choice: in food or in drink
  chosen_korean: 먹는 것이나 마시는 것으로
  alternatives_korean:
  - 음식이나 음료에 관하여
  - 식음의 일로
  lexicon: BDAG
  rationale: βρῶσις/πόσις는 「먹음·마심」과 「음식·음료」를 함께 담을 수 있다. 한국어 자연성을 위해 「먹는 것·마시는 것」으로 옮긴다.
- source_word: ἐν μέρει ἑορτῆς ἢ νουμηνίας ἢ σαββάτων
  english_pob_choice: with regard to a festival or a new moon or Sabbaths
  chosen_korean: 절기나 초하루나 안식일들에 관한 일로
  alternatives_korean:
  - 절기·초하루·안식일에 대하여
  - 절기의 일부, 초하루, 안식일들에서
  lexicon: BDAG
  rationale: ἐν μέρει는 「~에 관한 일로」 관용. σάββατα의 복수형을 「안식일들」로 보존.
