translation:
  language: es
  text: Ahora bien, la mujer tenía en la casa[a] un ternero cebado[b], y se apresuró y lo degolló[c]. Luego tomó harina, la amasó y horneó panes sin levadura[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en su casa".
    reason: alternative_reading
  - marker: b
    text: O "ternero alimentado en establo" o tradicionalmente "ternero engordado".
    reason: lexical_alternative
  - marker: c
    text: El verbo puede usarse para sacrificio en algunos contextos, pero aquí se refiere a matar al animal para preparar una comida.
    reason: lexical_alternative
  - marker: d
    text: O "tortas sin levadura".
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵגֶל
  english_pob_choice: calf
  chosen_spanish: ternero
  alternatives_spanish:
  - becerro
  - novillo joven
  lexicon: HALOT
  rationale: El hebreo designa un bovino joven. En español, "ternero" comunica bien esa imagen en narrativa y evita la ambigüedad de "becerro" en registros más cultuales o tradicionales.
- source_word: מַרְבֵּק
  english_pob_choice: fattened
  chosen_spanish: cebado
  alternatives_spanish:
  - engordado
  - alimentado en establo
  lexicon: HALOT
  rationale: El término indica un animal engordado, probablemente para consumo. "Cebado" es natural en español bíblico actual y conserva la idea de un animal preparado para ser comido.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en su casa
  - en el hogar
  lexicon: HALOT
  rationale: La expresión es locativa y concreta. "En la casa" sigue de cerca el sentido del hebreo sin volverlo idiomático en exceso.
- source_word: וַתְּמַהֵר
  english_pob_choice: she hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se dio rápidamente
  lexicon: HALOT
  rationale: El verbo expresa urgencia narrativa. "Se apresuró" es la opción más clara y digna en español.
- source_word: וַתִּזְבָּחֵהוּ
  english_pob_choice: slaughtered it
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  lexicon: HALOT
  rationale: Aunque el verbo puede tener uso sacrificial, aquí el contexto es la preparación de una comida. "Degolló" mantiene el acto de sacrificar/degollar animal sin imponer un sentido cultual que el contexto no requiere.
- source_word: קֶמַח
  english_pob_choice: flour
  chosen_spanish: harina
  alternatives_spanish:
  - harina fina
  - molienda
  lexicon: HALOT
  rationale: El término se refiere a harina para cocinar o panificar. "Harina" es la equivalencia más natural y clara.
- source_word: וַתָּלָשׁ
  english_pob_choice: kneaded it
  chosen_spanish: la amasó
  alternatives_spanish:
  - la trabajó hasta hacer masa
  - la sobó
  lexicon: HALOT
  rationale: El verbo alude a amasar masa. En español, "amasó" transmite con precisión la acción de convertir la harina en masa.
- source_word: וַתֹּפֵהוּ
  english_pob_choice: baked unleavened bread
  chosen_spanish: horneó panes sin levadura
  alternatives_spanish:
  - coció panes sin levadura
  - hizo tortas sin levadura
  lexicon: HALOT
  rationale: El hebreo indica la cocción del producto final junto con מַצּוֹת. "Horneó panes sin levadura" conserva el resultado y suena natural en español.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - tortas sin levadura
  - matzot
  lexicon: HALOT
  rationale: El plural designa panes sin fermento. "Panes sin levadura" mantiene la idea general sin introducir un tecnicismo innecesario.
theological_decisions:
- issue: Uso del verbo para el animal preparado y su matiz de sacrificio vs. cocina
  english_pob_reading: Although the verb can be used for sacrificial slaughter, here it refers to butchering the animal for a meal.
  chosen_spanish_reading: Aunque el verbo puede sugerir un acto sacrificial, aquí se entiende como el degüello del animal para la comida.
  alternative_spanish_readings:
  - lo sacrificó
  - lo mató
  rationale: El contexto inmediato es doméstico y culinario, no cultual. Mantener ese matiz evita añadir una lectura ritual no apoyada por la escena.
  doctrine_reference: Narrative context and lexical semantics; no doctrinal issue.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directamente y refleja el mismo resultado que el último pase inglés: una acción doméstica breve y secuencial, sin añadir material ausente en la fuente. También se evitó el calco de una fórmula cultual para el verbo de degollar, en línea con la nota auditada del POB inglés.'
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo: tenía -> se apresuró -> lo degolló -> tomó -> la amasó -> horneó.'
  - Se conserva el sentido concreto de un animal cebado para comida, no una ofrenda.
  - Se prefiere "panes sin levadura" por claridad y para mantener el plural de מַצּוֹת.
