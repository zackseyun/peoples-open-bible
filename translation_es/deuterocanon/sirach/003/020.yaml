translation:
  language: es
  text: Porque son muchas las misericordias de Dios, y a los humildes les revela[a] su secreto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque grande es el dominio del Señor, y por los humildes es glorificado». El testimonio hebreo aquí difiere considerablemente del griego.'
    reason: alternative_reading
  - marker: b
    text: O «su consejo». La palabra hebrea puede significar un secreto compartido en confianza íntima, no sólo información oculta.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - grandes
  - numerosas
  lexicon: HALOT
  rationale: En español, con «misericordias» en plural, «muchas» reproduce bien la abundancia cuantitativa del hebreo sin forzar un giro más interpretativo. Mantiene el paralelismo con la pluralidad concreta del término hebreo.
- source_word: רַחֲמֵי
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - actos de misericordia
  lexicon: HALOT
  rationale: «Misericordias» conserva el plural hebreo y es una forma natural y reverente en español bíblico contemporáneo. También transmite la idea de acciones compasivas repetidas o abundantes.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «Dios». En este verso no hay base para sustituirlo por «el Señor», y la lectura hebrea debe preservarse frente al paralelo griego.
- source_word: וְלַעֲנָוִים
  english_pob_choice: to the humble
  chosen_spanish: a los humildes
  alternatives_spanish:
  - a los mansos
  - a los meek
  lexicon: HALOT
  rationale: «A los humildes» es la equivalencia más clara y natural en español para el sentido ético y sapiencial de ענוים. Evita un matiz más restringido que podría traer «mansos».
- source_word: יְגַלֶּה
  english_pob_choice: he reveals
  chosen_spanish: les revela
  alternatives_spanish:
  - les descubre
  - les da a conocer
  lexicon: HALOT
  rationale: «Revela» corresponde bien a גלה con objeto como סוד y suena natural en español. El dativo «les» explicita el destinatario del acto de revelación.
- source_word: סוֹדוֹ
  english_pob_choice: his secret
  chosen_spanish: su secreto
  alternatives_spanish:
  - su consejo
  - su confidencia
  lexicon: HALOT
  rationale: «Secreto» es la traducción más directa. En nota se preserva la alternativa «consejo», porque סוד puede implicar también una comunicación confidencial o íntima, no sólo información oculta.
theological_decisions:
- issue: Diferencia sustancial entre el hebreo preservado y el paralelo griego
  english_pob_reading: 'Follow the Hebrew main text: ''For the mercies of God are many, and to the humble he reveals his secret.'''
  chosen_spanish_reading: 'Seguir el texto hebreo: «Porque son muchas las misericordias de Dios, y a los humildes les revela su secreto».'
  alternative_spanish_readings:
  - «Porque grande es el dominio del Señor, y por los humildes es glorificado».
  - «Porque grande es el poderío del Señor, y por los humildes es glorificado».
  - «Porque grande es la soberanía del Señor, y por los humildes es glorificado».
  - «Porque muchas son las misericordias del Señor, y a los humildes les revela su consejo».
  - «Porque muchas son las compasiones de Dios, y a los humildes les da a conocer su consejo».
  - «Porque muchas son las misericordias de Dios, y a los humildes les revela su secreto».
  rationale: La política del proyecto da primacía al hebreo cuando está conservado. Sin embargo, el paralelo griego atestigua una forma muy distinta del versículo; por eso la traducción principal sigue el hebreo y la alternativa griega se preserva en nota, sin disolver la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; DOCTRINE.md: preservar la tensión textual y teológica en vez de resolverla silenciosamente.'
translation_notes:
  revision_awareness: 'El registro coincide con la revisión más reciente: no se registraron cambios sustanciales y el control cruzado reporta alta concordancia entre los testigos. Por eso la redacción española sigue de cerca el hebreo preservado, dejando constancia de la lectura griega en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, conforme al testimonio hebreo y al criterio del proyecto.
  - Se usó «misericordias» en plural para reflejar רַחֲמֵי sin reducirlo a un abstracto singular.
  - Se eligió «secreto» como traducción principal de סוד, pero se preservó «consejo» en nota por su amplitud semántica.
  - La nota griega se formuló en español natural, pero conserva el contraste de sentido con el texto hebreo.
  - Se evitó introducir «el Señor» en el texto principal porque no corresponde al hebreo base de este versículo.
