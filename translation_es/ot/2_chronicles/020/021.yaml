translation:
  language: es
  text: 'Después de consultar con el pueblo, designó cantores para Yahvé, que alababan el esplendor de la santidad[a], al salir delante de la vanguardia[b], diciendo: «Den gracias a Yahvé, porque su amor fiel[c] perdura para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la belleza de la santidad» o «la hermosura de la santidad». La expresión hebrea también puede entenderse como «esplendor santo».
    reason: lexical_alternative
  - marker: b
    text: O «delante de las tropas de avanzada» o «delante del frente».
    reason: lexical_alternative
  - marker: c
    text: O «porque su misericordia perdura para siempre». El hebreo חֶסֶד incluye la idea de amor leal, fidelidad de pacto y misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעַץ אֶל הָעָם
  english_pob_choice: After consulting with the people
  chosen_spanish: Después de consultar con el pueblo
  alternatives_spanish:
  - y consultó al pueblo
  - habiendo consultado con el pueblo
  lexicon: HALOT
  rationale: El nifal de יעץ expresa tomar consejo/consultar. En español, «después de consultar con el pueblo» conserva la participación del pueblo y la relación temporal sin sonar forzado.
- source_word: וַיַּעֲמֵד
  english_pob_choice: he appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - estableció
  - designó
  lexicon: HALOT
  rationale: El hiphil de עמד puede implicar poner, establecer o designar. Aquí la acción es administrativa en un contexto litúrgico; «puso» es breve y natural, aunque «designó» también sería posible.
- source_word: מְשֹׁרֲרִים
  english_pob_choice: singers
  chosen_spanish: cantores
  alternatives_spanish:
  - cantores
  - cantantes
  - músicos
  lexicon: HALOT
  rationale: El sustantivo deriva de שׁיר y se refiere específicamente a personas que cantan. «Cantores» mantiene el matiz litúrgico y evita la amplitud de «músicos».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: La preposición ל admite aquí dirección o dedicación. En español, «para Yahvé» expresa bien la función dedicada de los cantores; se conserva el nombre divino según la pauta del proyecto.
- source_word: וּמְהַלְלִים
  english_pob_choice: who praised
  chosen_spanish: que alababan
  alternatives_spanish:
  - alabando
  - y alababan
  - los que alababan
  lexicon: HALOT
  rationale: El participio funciona de manera descriptiva respecto de los cantores. «Que alababan» reproduce bien la relación apposicional y evita una traducción demasiado técnica.
- source_word: לְהַדְרַת קֹדֶשׁ
  english_pob_choice: the splendor of holiness
  chosen_spanish: el esplendor de la santidad
  alternatives_spanish:
  - la hermosura de la santidad
  - el esplendor santo
  - la belleza de la santidad
  lexicon: HALOT
  rationale: La expresión admite varias lecturas cercanas. «Esplendor de la santidad» es fiel y transparente; mantiene la tensión entre una cualidad sagrada y una belleza vinculada a lo santo.
- source_word: בְּצֵאת
  english_pob_choice: as they went out
  chosen_spanish: al salir
  alternatives_spanish:
  - cuando salían
  - mientras salían
  - cuando salieron
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica acción concomitante. «Al salir» es idiomático en español y conserva la simultaneidad.
- source_word: לִפְנֵי הֶחָלוּץ
  english_pob_choice: before the vanguard
  chosen_spanish: delante de la vanguardia
  alternatives_spanish:
  - delante de los que iban al frente
  - ante la vanguardia
  - delante de las tropas de avanzada
  lexicon: HALOT
  rationale: הֶחָלוּץ se refiere a quienes van delante, es decir, la avanzada o vanguardia. «Delante de la vanguardia» reproduce con claridad el valor espacial y militar.
- source_word: וְאֹמְרִים
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: HALOT
  rationale: Es la introducción normal del discurso directo. «Diciendo» es la forma más directa y natural en español.
- source_word: הוֹדוּ לַיהוָה
  english_pob_choice: Give thanks to the LORD
  chosen_spanish: Den gracias a Yahvé
  alternatives_spanish:
  - Alaben a Yahvé
  - Den gracias al Señor
  - Confiesen a Yahvé
  lexicon: HALOT
  rationale: En contexto de culto, ידה en hiphil expresa acción de agradecimiento/alabanza. «Den gracias» conserva el sentido de gratitud explícita que el segundo hemistiquio explica.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  english_pob_choice: for his steadfast love endures forever
  chosen_spanish: porque para siempre es su misericordia
  alternatives_spanish:
  - porque para siempre es su amor fiel
  - porque su misericordia es para siempre
  - porque perdura para siempre su amor leal
  lexicon: HALOT
  rationale: חֶסֶד incluye misericordia, amor leal y fidelidad de pacto. En español, «misericordia» es comprensible y tradicional, pero la nota explica la amplitud semántica; «para siempre es» refleja la frase nominal hebrea sin añadir más de lo necesario.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Conforme a la terminología base del proyecto, se mantiene el nombre propio «Yahvé» en vez de ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Sentido de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor fiel
  - amor leal
  - amor constante
  rationale: El término hebreo combina misericordia, lealtad de pacto y amor constante. «Misericordia» funciona en lectura pública, y la nota preserva la tensión semántica que el inglés POB también documenta.
  doctrine_reference: Lexical note on חֶסֶד in the English audit trail
- issue: Valor de לְהַדְרַת קֹדֶשׁ
  english_pob_reading: the splendor of holiness
  chosen_spanish_reading: el esplendor de la santidad
  alternative_spanish_readings:
  - la belleza de la santidad
  - la hermosura de la santidad
  - esplendor santo
  rationale: La frase hebrea puede entenderse como esplendor perteneciente a la santidad o como belleza caracterizada por lo santo. La opción elegida es suficientemente literal y deja abierta la riqueza del hebreo.
  doctrine_reference: Lexical note on לְהַדְרַת קֹדֶשׁ in the English audit trail
translation_notes:
  revision_awareness: 'Se tomó como base el texto hebreo WLC y se contrastó con el audit trail inglés. Se respetó la estructura del versículo: consulta al pueblo, designación de cantores, descripción de su alabanza, movimiento delante de la vanguardia y fórmula de acción de gracias. Se siguieron las revisiones inglesas que afinan la relación del participio con los cantores, manteniéndola en español como proposición relativa («que alababan»).'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יהוה, conforme al estándar del proyecto.
  - Se eligió «cantores» para preservar el matiz litúrgico y no generalizar a «músicos».
  - «Misericordia» se usa por claridad pública, pero la nota conserva la amplitud de חֶסֶד.
  - La puntuación y el discurso directo siguen el orden del hebreo y la solución final del inglés audit trail, con naturalidad en español.
