theological_decisions:
- issue: Hebrews 11:21 reflects the LXX-related reading 'staff' rather than the Masoretic 'bed' in this clause.
  chosen_reading: bed
  alternative_readings:
  - staff
  rationale: For Genesis, the draft follows the Masoretic Hebrew before us, which points הַמִּטָּה ('the bed'). Because the consonantal text can also underlie 'staff' and the alternative is canonically significant through Hebrews 11:21, the alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension rather than resolve it)
