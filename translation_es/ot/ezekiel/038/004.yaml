review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea y la fuerte agencia divina: «haré… pondré… sacaré». También conserva adecuadamente la cadena militar: ejército, caballos y jinetes, equipamiento completo, y la multitud armada. Sin embargo, «Te haré dar la vuelta» suena poco natural en español bíblico legible, y «garfios» introduce una imagen algo más agresiva o específica que el hebreo/POB no requiere; «ganchos» comunica mejor la imagen de control. Además, «vestidos de completo equipo de guerra» es comprensible pero torpe; una formulación más idiomática mejora la fidelidad funcional sin perder contenido.'
  spanish_quality_summary: 'La redacción general es clara, pero contiene giros poco naturales: «Te haré dar la vuelta» y «vestidos de completo equipo de guerra». «Quijadas» es posible, pero «mandíbulas» o «mejillas» serían menos marcadas; aun así, puede mantenerse si se conserva la nota alternativa. «Escudo y broquel» es aceptable en registro formal y coincide con la decisión auditada del inglés. La puntuación y el flujo sintáctico son buenos.'
  glossary_alignment: 'No hay conflicto con los términos teológicos de proyecto. La agencia de Yahvé queda preservada. La elección «escudo y broquel» está alineada con la revisión inglesa documentada. Conviene ajustar las decisiones léxicas a un español más natural: «te haré volver» para וְשׁוֹבַבְתִּיךָ y «ganchos» para חַחִים; «con armadura completa» comunica mejor לְבֻשֵׁי מִכְלוֹל en este contexto militar.'
  issues:
  - severity: medium
    issue: «Te haré dar la vuelta» suena forzado en español
    rationale: Aunque reproduce literalmente la idea de redirección, no es una formulación idiomática ni digna en español bíblico moderno. «Te haré volver» o «te haré volver atrás» preserva mejor el valor causativo sin rigidez.
  - severity: medium
    issue: «garfios» no es la mejor opción para חַחִים
    rationale: «Garfios» puede sugerir instrumentos punzantes o garras; «ganchos» es más neutral, natural y suficiente para la imagen de control en la mandíbula/mejilla.
  - severity: medium
    issue: «vestidos de completo equipo de guerra» es poco natural
    rationale: La frase comunica la idea, pero la sintaxis es torpe. «Vestidos con armadura completa» o «equipados por completo para la guerra» suena mejor y sigue el contexto marcial inmediato.
  - severity: low
    issue: La nota [a] puede simplificarse
    rationale: La alternativa principal tras la revisión será precisamente «te haré volver», por lo que la nota debe reflejar la otra posibilidad léxica relevante en lugar de repetir la lectura principal.
