translation:
  language: es
  text: Yo caminaré entre ustedes, y seré su Dios[a], y ustedes serán mi pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Yo caminaré en medio de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְהַלַּכְתִּי
  english_pob_choice: I will walk
  chosen_spanish: yo caminaré
  alternatives_spanish:
  - yo andaré
  - yo me pasearé
  - yo moraré
  lexicon: HALOT
  rationale: «Caminaré» conserva la imagen concreta de movimiento/presencia del hebreo y corresponde bien al valor del hitpael en este contexto de presencia covenantal. «Moraré» interpretaría demasiado el verbo; «andaré» es posible pero menos natural en este registro.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: among you
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - dentro de ustedes
  lexicon: HALOT
  rationale: La expresión hebrea señala presencia en medio del pueblo. «En medio de ustedes» reproduce con precisión esa idea y evita la ambigüedad de «dentro de ustedes», que sugeriría interioridad individual.
- source_word: וְהָיִיתִי לָכֶם לֵאלֹהִים
  english_pob_choice: and will be your God
  chosen_spanish: y seré su Dios
  alternatives_spanish:
  - y seré Dios para ustedes
  - y seré el Dios de ustedes
  lexicon: HALOT
  rationale: En español, «seré su Dios» comunica de manera natural la fórmula de pacto hebrea. «Seré Dios para ustedes» es más literal, pero menos idiomática; «seré el Dios de ustedes» suena más analítica y menos directa.
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: HALOT
  rationale: En este contexto de pacto, אֱלֹהִים se refiere al único Dios de Israel; por eso corresponde «Dios», no «un dios».
- source_word: וְאַתֶּם תִּהְיוּ לִי לְעָם
  english_pob_choice: and you will be my people
  chosen_spanish: y ustedes serán mi pueblo
  alternatives_spanish:
  - y ustedes serán un pueblo para mí
  - y ustedes serán el pueblo mío
  lexicon: HALOT
  rationale: «Mi pueblo» es la forma natural y fiel en español para la fórmula recíproca de pacto. La opción «un pueblo para mí» es más literal, pero menos fluida y menos reconocible como fórmula bíblica.
theological_decisions:
- issue: Fórmula de pacto recíproca
  english_pob_reading: I will be your God, and you will be my people.
  chosen_spanish_reading: Seré su Dios, y ustedes serán mi pueblo.
  alternative_spanish_readings:
  - Seré Dios para ustedes, y ustedes serán un pueblo para mí.
  rationale: La estructura hebrea expresa una relación de alianza recíproca. La traducción elegida preserva esa reciprocidad sin añadir contenido doctrinal ajeno ni suavizar la formulación convencional del pacto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; conservar la tensión y la forma relacional del pacto.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del audit trail inglés; se mantiene la equivalencia óptima y la fórmula de pacto sin ampliación interpretativa.'
  spanish_consistency_notes:
  - Se usa «ustedes» como tratamiento plural neutral y consistente con el tono público del texto.
  - Se preserva «Dios» con mayúscula para el referente divino del pacto.
  - «En medio de ustedes» mantiene la imagen espacial del hebreo sin convertirla en una explicación teológica más amplia.
