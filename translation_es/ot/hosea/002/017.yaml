    text: Or 'she will sing there'; the Hebrew verb can denote a responsive answer and, in context, may imply singing.
    reason: lexical_alternative
  - marker: b
    text: The Valley of Achor recalls the place associated with Achan's judgment (Josh 7:24-26), turning a place of trouble into a doorway of hope.
    reason: cross_reference
