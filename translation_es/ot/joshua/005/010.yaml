translation:
  language: es
  text: Y los hijos de Israel acamparon en Gilgal[a], y celebraron la Pascua el día catorce del mes, al atardecer, en los llanos de Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y masculina plural. 'Hijos de Israel' conserva mejor esa forma que 'israelitas', que es más idiomático pero menos transparente al hebreo. 'Niños de Israel' sería engañoso en español.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se establecieron en campamento
  lexicon: HALOT
  rationale: חנה denota acampar o levantar campamento. 'Acamparon' es natural en español y conserva la acción concreta sin endurecer el estilo.
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - junto a Gilgal
  lexicon: HALOT
  rationale: Con un topónimo de lugar de campamento, el español idiomático pide 'en Gilgal'. 'En' preserva la localización sin añadir matices no atestiguados.
- source_word: וַיַּעֲשׂוּ אֶת־הַפֶּסַח
  english_pob_choice: they kept the Passover
  chosen_spanish: celebraron la Pascua
  alternatives_spanish:
  - guardaron la Pascua
  - observaron la Pascua
  lexicon: HALOT
  rationale: עשה con פסח funciona como una expresión fija para realizar/celebrar la festividad. 'Celebraron la Pascua' comunica el acto ritual en español de manera natural y fiel; 'guardaron' puede sonar demasiado general y 'observaron' es correcto pero menos litúrgicamente claro.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la pascua
  lexicon: HALOT
  rationale: La festividad se designa en español bíblico y eclesial como 'la Pascua'. 'Pésaj' sería más transliterado y menos accesible; 'pascua' en minúscula no es la convención adecuada aquí.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - en el día catorce del mes
  - a los catorce días del mes
  lexicon: HALOT
  rationale: La fórmula calendárica normal en español es 'el día catorce del mes'. Es precisa y evita un calco rígido.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - en la tarde
  - por la tarde
  - al anochecer
  lexicon: HALOT
  rationale: עֶרֶב puede abarcar el inicio del ocaso o la tarde avanzada. 'Al atardecer' mantiene esa zona temporal sin obligar a una hora más estrecha de lo que el hebreo da. 'En la tarde' o 'por la tarde' podrían sonar demasiado amplios en este contexto ritual.
- source_word: בְּעַרְבוֹת יְרִיחוֹ
  english_pob_choice: on the plains of Jericho
  chosen_spanish: en los llanos de Jericó
  alternatives_spanish:
  - en las llanuras de Jericó
  - en la estepa de Jericó
  lexicon: HALOT
  rationale: עַרְבוֹת designa una zona llana/esteparia. 'Llanos de Jericó' es claro y relativamente literal en español; 'llanuras' también serviría, pero 'llanos' evita una expansión innecesaria.
theological_decisions:
- issue: Forma masculina plural de 'בְנֵי יִשְׂרָאֵל' y política de precisión de género
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos e hijas de Israel
  rationale: No hay controversia doctrinal, pero sí una decisión de fidelidad morfológica. La forma hebrea es explícitamente masculina plural; 'los hijos de Israel' preserva esa señal con más transparencia que 'los israelitas', que diluye la forma familiar del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de וַיַּעֲשׂוּ אֶת־הַפֶּסַח
  english_pob_reading: they kept the Passover
  chosen_spanish_reading: celebraron la Pascua
  alternative_spanish_readings:
  - guardaron la Pascua
  - hicieron la Pascua
  rationale: 'La cuestión es teológica-litúrgica solo en el sentido del lenguaje del culto: la frase hebrea nombra la celebración pascual, no una acción genérica. ''Celebraron'' expresa observancia ritual sin borrar el carácter técnico del evento.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Source transparency and controlled idiom)
- issue: Topónimo y artículo en 'Gilgal' / 'Jericó'
  english_pob_reading: at Gilgal ... on the plains of Jericho
  chosen_spanish_reading: en Gilgal ... en los llanos de Jericó
  alternative_spanish_readings:
  - en el Gilgal ... en las llanuras de Jericó
  - junto a Gilgal ... cerca de Jericó
  rationale: No hay disputa doctrinal; la decisión afecta la claridad geográfica. Se evita añadir preposiciones interpretativas como 'junto a' o 'cerca de' porque el hebreo solo sitúa el campamento y la celebración dentro de la región.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Source-governed rendering)
translation_notes:
  revision_awareness: El pasaje fue revisado en la pasada más reciente y se mantuvo sin cambios; el control cruzado informó alta concordancia y recomendó mantener la redacción base. Esta versión sigue esa lectura sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se conserva 'Pascua' como término festivo estándar y no se sustituye por una perífrasis más larga.
  - Se usa 'hijos de Israel' para reflejar la forma hebrea masculina plural, en coherencia con la política de precisión de género.
  - '''Al atardecer'' se eligió para no estrechar indebidamente el valor temporal de בָּעֶרֶב.'
  - El topónimo 'Jericó' se mantiene sin artículos añadidos fuera de la estructura española normal del sintagma geográfico.
