review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: oprimir al pobre equivale a insultar a su Hacedor, y mostrar favor al necesitado honra a Dios. Sin embargo, la nota al pie invierte la alternativa documentada en el English POB. La lectura principal toma «lo honra» como referido a Dios; la alternativa debe ser «pero el que honra al pobre es generoso con el necesitado», no «el que honra a Dios es generoso con el necesitado».'
  spanish_quality_summary: El español es claro, natural y digno. «El que oprime al pobre insulta a su Hacedor» funciona bien. En la segunda cola, «es generoso con el necesitado» es legible, pero atenúa el matiz léxico de חֹנֵן ('mostrar gracia/favor'). Aun así, no es un error grave; la reparación indispensable está en la nota. El conjunto es plenamente comprensible para lectura eclesial amplia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hacedor» corresponde bien a עֹשֵׂהוּ en literatura sapiencial. «Necesitado» preserva la distinción con «pobre». La decisión teológica sobre el pronombre en וּמְכַבְּדוֹ coincide con el expediente inglés. La única desalineación sustantiva es la formulación de la nota de alternativa.
  issues:
  - severity: high
    issue: La nota al pie presenta incorrectamente la lectura alternativa.
    rationale: 'El expediente inglés dice que la alternativa es: «but whoever honors the poor is gracious to the needy». El borrador español dice: «pero el que honra a Dios es generoso con el necesitado», que en realidad repite la lectura principal y no la alternativa documentada.'
  - severity: medium
    issue: «Es generoso con» suaviza el vínculo léxico con חֹנֵן.
    rationale: El hebreo expresa mostrar favor/gracia. «Es generoso con» es natural, pero menos cercano que «es bondadoso con» o «muestra gracia/favor a». Como el English POB eligió 'is gracious to', conviene una formulación española un poco más próxima si se revisa el texto.
  revised_spanish_text: El que oprime al pobre insulta a su Hacedor[a], pero el que muestra favor al necesitado lo honra.
  revised_footnotes:
  - marker: a
    text: 'O: «pero el que honra al pobre es generoso con el necesitado». El hebreo permite que el pronombre de «lo honra» se refiera ya sea al pobre o a su Hacedor; el texto principal lo toma como referido a Dios por el paralelismo.'
    reason: alternative_reading
  revision_rationale: Se corrige la nota al pie para reflejar con precisión la alternativa documentada en el expediente inglés. Además, se ajusta «es generoso con» a «muestra favor al» para acercarse mejor al valor léxico de חֹנֵן sin perder naturalidad en español.
