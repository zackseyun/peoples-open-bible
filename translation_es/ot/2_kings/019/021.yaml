translation:
  language: es
  text: 'Esta es la palabra que Yahvé ha hablado acerca de él: «La virgen hija de Sion te desprecia[a]; se burla de ti. La hija de Jerusalén menea la cabeza[b] detrás de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la virgen hija de Sion te desprecia; te escarnece».'
    reason: lexical_alternative
  - marker: b
    text: «Menea la cabeza» es un modismo de burla o escarnio.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el dicho
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘mensaje’; en una fórmula profética introductoria, ‘la palabra’ conserva bien la fuerza formal del anuncio divino y suena natural en español.
- source_word: דִּבֶּר יְהוָה עָלָיו
  english_pob_choice: the LORD has spoken concerning him
  chosen_spanish: Yahvé ha hablado acerca de él
  alternatives_spanish:
  - Yahvé habló contra él
  - Yahvé ha hablado sobre él
  lexicon: HALOT
  rationale: El valor de עַל en esta construcción señala el asunto del oráculo; por eso ‘acerca de él’ sigue de cerca el sentido sin forzar una lectura necesariamente hostil en la frase misma, aunque el contexto sí es de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la terminología POB en español, evitando la sustitución por un título.
- source_word: בָּזָה
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - desprecia con desdén
  - desestima
  lexicon: HALOT
  rationale: El verbo expresa tratar con desprecio; ‘desprecia’ transmite bien la fuerza del insulto en un contexto de burla y desprecio.
- source_word: לָעֲגָה
  english_pob_choice: mocks
  chosen_spanish: se burla de ti
  alternatives_spanish:
  - te escarnece
  - te ridiculiza
  lexicon: HALOT
  rationale: El verbo significa burlarse o mofarse. ‘Se burla de ti’ es claro, moderno y mantiene el paralelismo con ‘desprecia’.
- source_word: בְּתוּלַת בַּת צִיּוֹן
  english_pob_choice: Virgin Daughter Zion
  chosen_spanish: la Virgen Hija de Sion
  alternatives_spanish:
  - la virgen hija de Sion
  - la Doncella Hija de Sion
  lexicon: HALOT
  rationale: Se conserva la personificación poética y la imagen de integridad/inviolabilidad implícita en בְּתוּלָה. ‘Virgen’ se mantiene por fidelidad léxica; ‘Hija de Sion’ respeta la construcción nominal del hebreo.
- source_word: אַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - tras de ti
  - a tus espaldas
  lexicon: HALOT
  rationale: La expresión espacial se vierte de manera natural como ‘detrás de ti’, acorde con la escena de desprecio mientras el enemigo se aleja.
- source_word: רֹאשׁ הֵנִיעָה
  english_pob_choice: shakes her head
  chosen_spanish: menea la cabeza
  alternatives_spanish:
  - sacude la cabeza
  - niega con la cabeza
  lexicon: HALOT
  rationale: El hebreo usa un gesto idiomático de escarnio. ‘Menea la cabeza’ conserva el matiz cultural de burla señalado en la tradición de traducción POB.
- source_word: בַּת יְרוּשָׁלִָם
  english_pob_choice: Daughter Jerusalem
  chosen_spanish: la Hija de Jerusalén
  alternatives_spanish:
  - la hija de Jerusalén
  - Daughter Jerusalem
  lexicon: HALOT
  rationale: Se mantiene la personificación de la ciudad con una forma transparente en español; la mayúscula en ‘Hija’ refleja su valor titular y poético en paralelo con ‘Hija de Sion’.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB en inglés traduce el Tetragrámaton como ‘Yahweh’; en español, la forma de proyecto correspondiente es ‘Yahvé’, preservando el nombre personal de Dios sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido idiomático de ‘menea la cabeza’
  english_pob_reading: Shakes her head is an idiom of scorn or mockery.
  chosen_spanish_reading: ‘menea la cabeza’ como gesto idiomático de burla
  alternative_spanish_readings:
  - sacude la cabeza como señal de desprecio
  - niega con la cabeza
  rationale: Se conserva el valor cultural del gesto como escarnio, no como un simple movimiento físico. Esto mantiene la tensión poética y la ironía del contexto.
  doctrine_reference: Nota cultural/retórica del hebreo poético; no doctrinal en sentido estricto
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y ninguna revisión aplicada; se siguió la solución inglesa POB en la estructura del verso, conservando la fórmula profética, el nombre divino y el paralelismo poético, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con el estándar POB en español para יהוה.
  - Se mantiene la personificación poética con ‘Virgen Hija de Sion’ y ‘Hija de Jerusalén’.
  - El gesto final se traduce con un modismo español natural que conserva el sentido de burla.
  - La puntuación refleja el estilo bíblico de cita directa con comillas angulares y dos puntos tras la cláusula introductoria.
