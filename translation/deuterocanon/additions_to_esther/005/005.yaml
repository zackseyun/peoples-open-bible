theological_decisions:
- issue: Referent of the feminine subject implied by the verbs
  chosen_reading: Render with generic 'she' without identifying the referent in the text
  alternative_readings:
  - Fortune
  - the king's anger
  - a personified destructive impulse
  rationale: The Greek verbs are feminine singular, but this verse alone does not explicitly name the subject. The translation preserves the grammatical referent as 'she' rather than importing an interpretive identification not stated in the immediate wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
