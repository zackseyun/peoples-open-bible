    issue: La nota [a] está anclada a «trabajo», pero su contenido corresponde a «en todos sus lugares de habitación».
    rationale: El rastro inglés pone la nota b sobre «dwelling places», no sobre «work». En español debe preservarse esa relación semántica para no confundir al lector sobre qué expresión tiene alternativas.
  - severity: medium
    issue: «Lugares de habitación» es una expresión poco natural en español bíblico contemporáneo.
    rationale: Aunque comprensible, suena calco y menos legible que «lugares donde habiten», «moradas» o «asentamientos». El objetivo del proyecto pide español moderno y digno, evitando rigidez innecesaria.
  - severity: low
    issue: «Por todas sus generaciones» puede mejorarse a una formulación más natural.
    rationale: «A través de sus generaciones» o «por todas las generaciones» comunica mejor el valor durativo de לְדֹרֹתֵיכֶם en español corriente.
  revised_spanish_text: No harán ningún trabajo. Es un estatuto permanente[a] a través de sus generaciones, en todos los lugares donde habiten[b].
