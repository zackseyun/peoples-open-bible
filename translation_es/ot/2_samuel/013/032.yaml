translation:
  language: es
  text: 'Entonces Jonadab hijo de Simea, hermano de David, respondió y dijo: «No diga mi señor: “Han matado a todos los jóvenes, los hijos del rey”, porque solo Amnón ha muerto. Pues esto había quedado determinado por orden de Absalón desde el día en que humilló[a] a Tamar, su hermana».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo también puede traducirse «violó» o, con un matiz menos explícito, «humilló» o «ultrajó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» conserva el valor narrativo de introducir una réplica formal. Se añadió «y dijo» porque el hebreo combina ambos verbos y la versión inglesa también los mantiene.
- source_word: אֲחִי דָוִד
  english_pob_choice: David’s brother
  chosen_spanish: hermano de David
  alternatives_spanish:
  - el hermano de David
  - pariente de David
  lexicon: HALOT
  rationale: La relación de parentesco es directa; «hermano de David» es la formulación natural y fiel al constructo hebreo.
- source_word: אַל יֹאמַר אֲדֹנִי
  english_pob_choice: Let not my lord say
  chosen_spanish: No diga mi señor
  alternatives_spanish:
  - No diga mi señor
  - Que no diga mi señor
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición/jussivo cortés. «No diga mi señor» conserva el tono deferente sin forzar un calco poco natural en español.
- source_word: הַנְּעָרִים בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the young men, the king’s sons
  chosen_spanish: los jóvenes, los hijos del rey
  alternatives_spanish:
  - los muchachos, los hijos del rey
  - los jóvenes, los hijos del rey
  lexicon: HALOT
  rationale: נְעָרִים puede ser «jóvenes» o «mozos»; aquí el paralelismo con «hijos del rey» aclara quiénes son. Se preserva la aposición, como en la traducción inglesa.
- source_word: הֵמִיתוּ
  english_pob_choice: they have killed
  chosen_spanish: han matado
  alternatives_spanish:
  - han dado muerte
  - han asesinado
  lexicon: HALOT
  rationale: El hiphil de מות es causativo («matar»). «Han matado» reproduce bien el valor verbal sin cargar una connotación que el contexto no exige explícitamente.
- source_word: אַמְנוֹן לְבַדּוֹ מֵת
  english_pob_choice: Amnon alone is dead
  chosen_spanish: Amnón solo ha muerto
  alternatives_spanish:
  - solo Amnón ha muerto
  - Amnón únicamente ha muerto
  lexicon: HALOT
  rationale: «Solo» refleja לְבַדּוֹ y mantiene la exclusividad. El perfecto español «ha muerto» comunica el estado resultante que el hebreo presenta como hecho consumado.
- source_word: עַל פִּי אַבְשָׁלוֹם
  english_pob_choice: by Absalom
  chosen_spanish: por orden de Absalón
  alternatives_spanish:
  - según la orden de Absalón
  - por la palabra de Absalón
  lexicon: HALOT
  rationale: La expresión idiomática «por orden de» hace explícita la fuerza de עַל־פִּי como palabra/mandato/decisión. En este contexto se ajusta a la lectura documentada del plan fijado por Absalón.
- source_word: הָיְתָה שׂוּמָה
  english_pob_choice: had been determined
  chosen_spanish: había sido determinado
  alternatives_spanish:
  - había sido fijado
  - había sido establecido
  - había sido planeado
  lexicon: HALOT
  rationale: La construcción pasiva/resultativa de שׂוּם con היה apunta a algo ya fijado o establecido. «Había sido determinado» mantiene el sentido de resolución asentada.
- source_word: מִיּוֹם עַנֹּתוֹ
  english_pob_choice: from the day he violated
  chosen_spanish: desde el día en que humilló
  alternatives_spanish:
  - desde el día en que violó
  - desde el día en que deshonró
  lexicon: HALOT
  rationale: El pi‘el de ענה en este contexto señala una agresión sexual contra Tamar. «Humilló» preserva una opción semántica posible y menos explícita; la nota recoge la alternativa más fuerte documentada por la POB inglesa.
- source_word: אֵת תָּמָר אֲחֹתֽוֹ
  english_pob_choice: Tamar his sister
  chosen_spanish: a Tamar, su hermana
  alternatives_spanish:
  - a Tamar, hermana de él
  - a Tamar, su hermana
  lexicon: HALOT
  rationale: La relación posesiva es clara y la puntuación en español ayuda a enlazar el complemento directo con su aposición. Se conserva la referencia narrativa directa a Tamar como hermana de Absalón.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se conserva la pausa introducida por la cita directa en la primera cláusula y se hace explícito el matiz de עַל־פִּי אַבְשָׁלוֹם como una orden/mandato fijado por Absalón. Para el segmento final, se mantuvo una opción española sobria que refleja la fuerza de ענה sin sobrerinterpretar más allá de lo atestiguado por la evidencia y por la nota lexical inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere explícitamente; aquí no aparece.
  - Se mantiene «Absalón» y «Amnón» como formas españolas estables de nombres propios bíblicos.
  - Se conserva la aposición «los jóvenes, los hijos del rey» en una forma natural de español, siguiendo la estructura hebrea y la traducción auditada en inglés.
  - No se sustituye el valor de עַל־פִּי por un mero «por» en sentido ambiguo; la nota lexical documenta la decisión contextual.
  - La elección de «humilló» para ענה respeta la tensión semántica registrada por la POB inglesa sin imponer de forma principal una explicitación más fuerte que el hebreo, mientras la nota conserva esa alternativa.
