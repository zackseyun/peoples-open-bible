  text: Then the satraps[a], the prefects, and the governors, the counselors, the treasurers, the judges, the magistrates, and all the officials of the provinces were assembled for the dedication of the image that King Nebuchadnezzar had set up, and they stood before the image that Nebuchadnezzar had set up.
