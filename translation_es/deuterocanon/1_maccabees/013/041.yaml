translation:
  language: es
  text: En el año ciento setenta y primero[a], el yugo de las naciones fue quitado de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los gentiles'. El término griego puede significar 'naciones' en general o, en uso judío, 'gentiles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους ἑκατοστοῦ ἑβδομηκοστοῦ πρώτῃ
  english_pob_choice: In the one hundred seventy-first year
  chosen_spanish: En el año ciento setenta y uno
  alternatives_spanish:
  - En el año ciento setenta y primero
  - En el año ciento setenta y un
  lexicon: LSJ
  rationale: La expresión griega es una fórmula de datación. En español, 'En el año ciento setenta y uno' comunica naturalmente el ordinal histórico sin forzar una construcción demasiado pesada; mantiene el valor de año fechado y el orden secuencial del original.
- source_word: ὁ ζυγὸς
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la carga
  - la dominación
  lexicon: LSJ
  rationale: ζυγός conserva la imagen concreta de 'yugo' y su fuerza metafórica de sujeción/opresión. 'El yugo' reproduce mejor la imagen que una abstracción como 'dominación'.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: LSJ
  rationale: ἐθνῶν puede significar 'naciones' y, en contexto judío, también 'gentiles'. Aquí la lectura más cercana al griego es 'naciones'; 'gentiles' es posible pero introduce un matiz interpretativo adicional no exigido por el texto.
- source_word: ἀπὸ τοῦ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de encima de Israel
  - fuera de Israel
  lexicon: LSJ
  rationale: ἀπό expresa separación o alejamiento. 'De Israel' es la manera natural en español de decir que el yugo fue removido, sin perder la idea de alejamiento del pueblo de Israel.
theological_decisions:
- issue: 'τῶν ἐθνῶν: ''naciones'' vs. ''gentiles'''
  english_pob_reading: of the nations
  chosen_spanish_reading: de las naciones
  alternative_spanish_readings:
  - de los gentiles
  rationale: Se conserva la literalidad del plural griego y se evita estrechar el alcance del texto con una lectura confesional más marcada de lo que exige la forma griega. La frase celebra el fin de la dominación extranjera sobre Israel sin precisar más allá de 'naciones'.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y preservación de tensiones léxicas cuando el texto lo permite.'
translation_notes:
  revision_awareness: No se requirieron revisiones aplicadas respecto del último pase; la redacción mantiene la lectura literal y la decisión contextual del audito en inglés, sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en principio como terminología del proyecto, pero este versículo no contiene el nombre divino; no aplica aquí.
  - Se mantuvo 'el yugo' para preservar la metáfora concreta del griego.
  - Se evitó 'SEÑOR' y otras sustituciones eclesiásticas no presentes en el texto fuente.
  - La nota al pie marca la alternativa léxica relevante sin duplicar el sentido principal del versículo.
