translation:
  language: es
  text: Hay un camino que parece correcto a un hombre[a], pero su fin son los caminos de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «parece correcto ante un hombre». El hebreo dice literalmente «delante de un hombre», un modismo que expresa lo que parece correcto desde la propia perspectiva de la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial se expresa naturalmente en español con 'Hay', conservando el tono proverbial de una afirmación general.
- source_word: דֶּרֶךְ
  english_pob_choice: a way
  chosen_spanish: un camino
  alternatives_spanish:
  - una senda
  - una vía
  lexicon: HALOT
  rationale: '''Camino'' transmite bien la metáfora sapiencial de una forma de vida o conducta, y mantiene la repetición léxica con el plural final ''caminos''.'
- source_word: יָשָׁר
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - correcto
  - justo
  lexicon: HALOT
  rationale: En español, 'recto' conserva el sentido básico de algo que parece enderezado o correcto, sin forzar un juicio moral explícito que el contexto todavía no ha desarrollado.
- source_word: לִפְנֵי אִישׁ
  english_pob_choice: before a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - ante un hombre
  - a los ojos de un hombre
  - según le parece a un hombre
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática que el POB inglés decidió explicitar como percepción personal. 'A un hombre' comunica de manera natural que el camino parece recto desde la perspectiva del individuo, sin sobrecargar el verso con una glosa interpretativa en el texto principal.
- source_word: וְאַחֲרִיתָהּ
  english_pob_choice: but its end
  chosen_spanish: pero su fin
  alternatives_spanish:
  - y su fin
  - pero su desenlace
  - y su desenlace
  lexicon: HALOT
  rationale: El contraste adversativo se expresa con 'pero'. 'Fin' reproduce de forma breve y proverbial el valor de אַחֲרִית como término o desenlace final.
- source_word: דַּרְכֵי
  english_pob_choice: the ways of
  chosen_spanish: los caminos de
  alternatives_spanish:
  - las sendas de
  - los caminos hacia
  lexicon: HALOT
  rationale: El plural constructo se conserva con 'los caminos de', manteniendo el vínculo léxico con el primer 'camino' y respetando la pluralidad enfática del hebreo.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - destrucción
  lexicon: HALOT
  rationale: Se mantiene el sustantivo directo 'muerte', porque el texto sapiencial dice eso de manera tajante y no pide una ampliación interpretativa.
theological_decisions:
- issue: Sujeto genérico masculino אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  - a alguien
  rationale: El hebreo usa singular masculino con valor representativo. Se conserva ese rasgo en español para no neutralizar la forma del texto fuente sin necesidad contextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre 'camino' singular y 'caminos' plural
  english_pob_reading: a way ... the ways of death
  chosen_spanish_reading: un camino ... los caminos de la muerte
  alternative_spanish_readings:
  - un camino ... el camino de la muerte
  - un camino ... caminos mortales
  rationale: El cambio de singular a plural al final pertenece al hebreo y se respeta para no aplanar el giro proverbial ni perder la tensión entre una sola elección aparente y sus múltiples desenlaces mortales.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'to a man' en lugar de 'before a man' por naturalidad y exactitud contextual; en español, 'a un hombre' recoge esa misma naturalidad sin perder el matiz idiomático del hebreo. También se preservó el plural final 'caminos' para reflejar דַּרְכֵי.
  spanish_consistency_notes:
  - Se usó 'camino' como equivalente principal de דֶּרֶךְ, en continuidad con el léxico sapiencial común.
  - Se evitó 'SEÑOR' u otra sustitución litúrgica, pues el versículo no contiene el nombre divino.
  - Se mantuvo 'muerte' en sentido directo, sin añadir 'ruina' o 'destrucción', para respetar la formulación del hebreo.
