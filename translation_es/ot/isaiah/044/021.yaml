translation:
  language: es
  text: Recuerda estas cosas, Jacob, e Israel, porque tú eres mi siervo; yo te formé; tú eres un siervo para mí. Israel, no serás olvidado por mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no me olvidarás». La forma hebrea puede entenderse así, y algunos intérpretes la toman como exhortación más que como reafirmación.'
    reason: alternative_reading
lexical_decisions:
- source_word: זְכָר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate de
  - Recuerda bien
  lexicon: HALOT 2142
  rationale: El imperativo qal pide una orden directa. «Recuerda» es natural en español y mantiene la fuerza exhortativa sin añadir explicaciones.
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - estos asuntos
  lexicon: HALOT 428
  rationale: El demostrativo plural retoma el contenido precedente; «estas cosas» explicita el referente de modo idiomático, como en la solución inglesa auditada.
- source_word: יַעֲקֹב וְיִשְׂרָאֵל
  english_pob_choice: Jacob, and Israel
  chosen_spanish: Jacob, e Israel
  alternatives_spanish:
  - Jacob e Israel
  - Jacob, Israel
  lexicon: HALOT 3290; 3478
  rationale: Se conserva la doble apelación vocativa a la comunidad del pacto. Se usa «e» por eufonía antes de «Israel».
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT 5650
  rationale: La POB inglesa opta por «my servant» por el matiz relacional, pero en español aquí «esclavo» preserva con más fuerza la carga léxica de עבד, que el proyecto suele mantener cuando esa fuerza es relevante; además armoniza con el paralelismo posterior «un esclavo para mí».
- source_word: יְצַרְתִּיךָ
  english_pob_choice: I formed you
  chosen_spanish: yo te formé
  alternatives_spanish:
  - yo te modelé
  - yo te formé a ti
  lexicon: HALOT 3335
  rationale: «Formé» reproduce el verbo de modelar/formar con naturalidad y sin perder la imagen creadora del hebreo.
- source_word: עֶבֶד לִי
  english_pob_choice: a servant to me
  chosen_spanish: un esclavo para mí
  alternatives_spanish:
  - un siervo para mí
  - para ser mi esclavo
  lexicon: HALOT 5650
  rationale: Se mantiene la repetición léxica de עבד con «esclavo» para no diluir el paralelismo con «mi esclavo» y porque el hebreo repite el sustantivo de forma enfática. «Para mí» refleja לִי sin sobreparafrasear.
- source_word: לֹא תִנָּשֵׁנִי
  english_pob_choice: you will not be forgotten by me
  chosen_spanish: no serás olvidado por mí
  alternatives_spanish:
  - no me olvidarás
  - 'no serás olvidado por mí, o: no me olvidarás'
  lexicon: HALOT 5382
  rationale: 'Se preserva la lectura principal de la POB inglesa como pasiva/receptiva: Israel no será olvidado por Yahvé. En español, «olvidado por mí» comunica esa lectura de manera clara y reverente, sin resolver la ambigüedad del consonántico.'
theological_decisions:
- issue: 'Ambigüedad de לֹא תִנָּשֵׁנִי: promesa divina o exhortación a no olvidar a Dios'
  english_pob_reading: 'A divine reassurance: ''you will not be forgotten by me'''
  chosen_spanish_reading: 'Una promesa de fidelidad divina: «no serás olvidado por mí»'
  alternative_spanish_readings:
  - 'Una exhortación: «no me olvidarás»'
  - 'Una lectura mixta: «no serás olvidado por mí / no me olvidarás»'
  rationale: El contexto inmediato enfatiza que Yahvé formó a Israel y concluye con seguridad de recuerdo/cuidado divino. Por eso se privilegia la lectura de consuelo, pero se conserva la tensión semántica en nota para no borrar la posibilidad gramatical alternativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del audit trail: se evita comprimir la segunda cláusula de formación en una sola frase interpretativa y se mantiene la estructura breve del hebreo: mandato, fundamento, afirmación de identidad y cierre con la ambigüedad de לֹא תִנָּשֵׁנִי preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el contexto del libro lo requiera en esta serie, pero en este versículo el nombre divino no aparece explícitamente en el texto hebreo; por eso la traducción usa «mí» en concordancia con el sufijo de primera persona.
  - Se conserva «esclavo» por la decisión léxica del proyecto para עבד cuando el paralelo y la intensidad del término lo justifican, evitando suavizarlo a «siervo».
  - La puntuación reproduce la enumeración vocativa del hebreo y separa las dos cláusulas de la formación para reflejar su estructura sintáctica.
