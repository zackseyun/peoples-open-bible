translation:
  language: es
  text: 'Y Yahvé dijo a Samuel: «¿Hasta cuándo seguirás lamentándote por Saúl, puesto que yo lo he rechazado para que no reine sobre Israel? Llena tu cuerno con aceite y ve; te envío a Isaí, el de Belén, porque he provisto para mí[a] un rey entre sus hijos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque he visto para mí un rey entre sus hijos». El verbo hebreo es literalmente «he visto», pero en este contexto puede implicar selección o provisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino mediante transliteración, de acuerdo con la política del proyecto; «Yahvé» mantiene la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: מִתְאַבֵּל
  english_pob_choice: grieve
  chosen_spanish: te lamentarás
  alternatives_spanish:
  - estarás de duelo
  - seguirás lamentándote
  lexicon: HALOT
  rationale: El verbo expresa duelo o lamento continuo; «te lamentarás» comunica bien la acción emocional sostenida y suena natural en español bíblico moderno.
- source_word: מְאַסְתִּי/ו
  english_pob_choice: have rejected him
  chosen_spanish: lo he rechazado
  alternatives_spanish:
  - lo he desechado
  - lo he desestimado
  lexicon: HALOT
  rationale: «Rechazar» reproduce el valor de מאס sin añadir una carga emocional mayor que la del hebreo y encaja con el contexto de descalificación real.
- source_word: מִמְלֹךְ עַל יִשְׂרָאֵל
  english_pob_choice: from being king over Israel
  chosen_spanish: para que no reine sobre Israel
  alternatives_spanish:
  - de reinar sobre Israel
  - de ser rey sobre Israel
  lexicon: HALOT
  rationale: La construcción hebrea expresa exclusión de la función real; en español, la finalidad negativa «para que no reine» comunica de manera idiomática esa exclusión sin perder el sentido.
- source_word: מַלֵּא קַרְנְךָ שֶׁמֶן
  english_pob_choice: Fill your horn with oil
  chosen_spanish: Llena tu cuerno con aceite
  alternatives_spanish:
  - Llena tu cuerno de aceite
  - Llena tu cuerno con óleo
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de קֶרֶן como «cuerno», que en este contexto puede ser el recipiente de la unción; «aceite» traduce שֶׁמֶן de forma directa.
- source_word: אֶשְׁלָחֲךָ
  english_pob_choice: I am sending you
  chosen_spanish: te enviaré
  alternatives_spanish:
  - te estoy enviando
  - te mandaré
  lexicon: HALOT
  rationale: El imperfecto en discurso directo puede expresar acción inminente; «te enviaré» es natural en español y conserva el acto de comisión divina.
- source_word: יִשַׁי בֵּית הַלַּחְמִי
  english_pob_choice: Jesse the Bethlehemite
  chosen_spanish: Isaí, el de Belén
  alternatives_spanish:
  - Isaí, el belenita
  - Isaí, el betlemita
  lexicon: HALOT
  rationale: «El de Belén» evita un gentilicio poco transparente y refleja la identificación de Jesse por su origen; se mantiene el referente geográfico sin forzar una forma arcaizante.
- source_word: רָאִיתִי לִי
  english_pob_choice: I have provided for myself
  chosen_spanish: he provisto para mí
  alternatives_spanish:
  - he escogido para mí
  - he elegido para mí
  lexicon: HALOT
  rationale: 'Se sigue la revisión del POB inglés: aunque la raíz de ראה es «ver», el contexto idiomático comunica provisión/selección. «He provisto para mí» conserva esa fuerza sin ocultar el carácter idiomático del hebreo.'
- source_word: בְּבָנָיו
  english_pob_choice: among his sons
  chosen_spanish: entre sus hijos
  alternatives_spanish:
  - entre sus hijos varones
  - de entre sus hijos
  lexicon: HALOT
  rationale: El valor distributivo de בְּ se expresa naturalmente con «entre»; «hijos» corresponde al grupo de descendientes varones en este contexto de sucesión real.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo es indefinido; «un rey» respeta esa indefinición y mantiene el énfasis en la elección divina sin nombrar todavía a David.
theological_decisions:
- issue: Alcance de la afirmación divina sobre Saúl
  english_pob_reading: since I have rejected him from being king over Israel
  chosen_spanish_reading: puesto que yo lo he rechazado para que no reine sobre Israel
  alternative_spanish_readings:
  - puesto que yo lo he rechazado de ser rey sobre Israel
  - puesto que yo lo he rechazado del reinado sobre Israel
  rationale: 'Se preserva la tensión teológica del texto: Yahvé declara la descalificación de Saúl respecto del reinado, sin expandir el enunciado a juicios más amplios que el versículo no explicita.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefería «I have provided for myself a king among his sons» en lugar de una traducción más literal de «he visto». La versión española adopta esa decisión contextual con «he provisto para mí».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al criterio del proyecto.
  - Se mantiene «rey»/«reine» para el campo semántico real, evitando sustituirlo por términos eclesiásticos.
  - La nota al pie está anclada explícitamente en [a] dentro del texto para evitar desajustes de validación.
