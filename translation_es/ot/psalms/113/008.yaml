translation:
  language: es
  text: para sentarlo con los nobles[a], con los nobles de su pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los príncipes»; el sustantivo hebreo puede designar nobles o personas de rango principesco.
    reason: lexical_alternative
  - marker: b
    text: O «los nobles de su pueblo»; el «su» puede referirse al que fue levantado, aunque el contexto favorece que se refiera a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/הוֹשִׁיבִ֥י
  english_pob_choice: to seat him
  chosen_spanish: para sentarlo
  alternatives_spanish:
  - para hacerlo sentar
  - para hacerlo ocupar asiento
  lexicon: HALOT
  rationale: El hebreo es un infinitivo causativo de ישׁב con valor de propósito. En español, «para sentarlo» conserva la idea de causar que alguien ocupe un lugar de honra sin volverla demasiado literal o pesada.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  lexicon: HALOT
  rationale: La preposición repetida expresa compañía y paralelismo poético. «Con» refleja de manera directa esa relación en español.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los príncipes
  - los magnates
  lexicon: HALOT
  rationale: «Nobles» comunica rango social elevado sin imponer de antemano una lectura monárquica más fuerte que la que exige el hebreo.
- source_word: נְדִיבֵי
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los príncipes
  - los magnates
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia que para נְדִיבִים para conservar la repetición poética y la coherencia léxica.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - el pueblo de él
  - su nación
  lexicon: HALOT
  rationale: עַם se refiere naturalmente a un pueblo como comunidad. «Su pueblo» es la forma más idiomática en español y preserva la ambigüedad del sufijo posesivo tal como la conserva el audit trail en inglés.
theological_decisions:
- issue: Referente de «su» en «su pueblo»
  english_pob_reading: '''his'' refers to the LORD, so the phrase means ''the nobles of his people'' = the nobles belonging to the LORD''s people.'
  chosen_spanish_reading: '«su» puede entenderse principalmente como referido a Yahvé: «los nobles de su pueblo», es decir, los nobles del pueblo de Yahvé.'
  alternative_spanish_readings:
  - '«su» podría referirse al hombre levantado, dando: «los nobles de su pueblo»'
  rationale: En el contexto del Salmo 113, el sujeto de las acciones es Yahvé, por lo que ese antecedente es el más probable. Sin embargo, como el hebreo permite una ambigüedad real, conviene no eliminarla en la formulación española ni forzar una interpretación más cerrada de la necesaria.
  doctrine_reference: Salmo 113:7-8; antecedente pronominal en poesía hebrea
translation_notes:
  revision_awareness: La fuente hebrea y el audit trail inglés coinciden en el valor causativo de לְ/הוֹשִׁיבִ֥י, en la repetición enfática de עִם y en la ambigüedad del sufijo de עַמּוֹ. No se requieren revisiones respecto al pasaje base; se mantiene la tensión pronominal documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la terminología del proyecto cuando aparece el nombre divino en el contexto inmediato del salmo, pero aquí el verso solo contiene el posesivo sufijado del hebreo.
  - «Nobles» se mantiene de forma consistente para נָדִיב en este verso, evitando alternar con «príncipes» sin necesidad contextual.
  - La construcción española conserva el paralelismo hebreo con dos miembros introducidos por «con».
