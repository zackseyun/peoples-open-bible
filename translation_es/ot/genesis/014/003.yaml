review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: כָּל אֵלֶּה = «Todos estos», חָבְרוּ = «se unieron», y la explicación geográfica final está correctamente preservada. También mantiene la nota alternativa sobre el nombre posterior «Mar Muerto». Sin embargo, la nota está anclada indebidamente a «Sidim» en vez de al elemento explicativo «Mar de la Sal/Mar Muerto», y «Mar de la Sal» suena algo poco idiomático frente a una opción más natural que sigue siendo fiel al hebreo.'
  spanish_quality_summary: El español es claro y digno, pero «Mar de la Sal» resulta menos natural en español bíblico general que «Mar Salado», que comunica el mismo referente con mejor fluidez. Además, el anclaje de la nota debe moverse al nombre alternativo, no al topónimo «Sidim».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Los nombres propios y la estructura explicativa están bien. La decisión clave es estilística y de anclaje de nota: mantener la primacía del hebreo «Salt Sea» con un español natural («Mar Salado») y reservar «Mar Muerto» para la nota alternativa.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «Sidim» en lugar de al nombre geográfico alternativo.
    rationale: La nota «O, por el nombre posterior, el Mar Muerto» explica «el Mar de la Sal / Mar Salado», no el topónimo «Sidim». El marcador debe aparecer junto al referente correcto para reflejar con precisión la relación semántica.
  - severity: low
    issue: «Mar de la Sal» es comprensible pero menos natural que «Mar Salado».
    rationale: El hebreo יָם הַמֶּלַח significa literalmente «mar de la sal / mar salado». En español amplio y legible, «Mar Salado» suena más idiomático y mantiene la fidelidad al original sin recurrir al nombre posterior «Mar Muerto» en el texto principal.
  revised_spanish_text: Todos estos se unieron en el valle de Sidim, es decir, el Mar Salado[a].
  revised_footnotes:
  - marker: a
    text: O, por el nombre posterior, el Mar Muerto.
