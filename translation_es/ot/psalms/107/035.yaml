translation:
  language: es
  text: Él convierte[a] un yermo[b] en un estanque de agua, y la tierra seca en manantiales[c] de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace»; el verbo hebreo también puede significar «poner» o «hacer», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «desierto».
    reason: lexical_alternative
  - marker: c
    text: O «fuentes de agua» o «nacimientos de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  english_pob_choice: He turns
  chosen_spanish: Él convierte
  alternatives_spanish:
  - Él hace
  - Él pone
  - Él transforma
  lexicon: HALOT
  rationale: El verbo hebreo puede significar poner, hacer o establecer; en este contexto poético expresa un cambio real de una condición a otra. «Convierte» comunica bien ese giro transformador sin perder la base semántica del verbo.
- source_word: מִדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - un desierto inhóspito
  - un yermo
  - una soledad
  lexicon: HALOT
  rationale: Aunque «wilderness» puede abarcar más que «desert», en español «desierto» reproduce con claridad la idea de tierra árida y vacía, y aquí mantiene el contraste con el agua de manera natural.
- source_word: לַאֲגַם מַיִם
  english_pob_choice: into a pool of water
  chosen_spanish: en estanque de aguas
  alternatives_spanish:
  - en laguna de aguas
  - en charca de aguas
  - en depósito de aguas
  lexicon: HALOT
  rationale: אֲגַם designa una acumulación de agua, como estanque o laguna. «Estanque de aguas» conserva la imagen de agua reunida y es una formulación clara en español bíblico contemporáneo.
- source_word: וְאֶרֶץ צִיָּה
  english_pob_choice: and dry land
  chosen_spanish: y la tierra seca
  alternatives_spanish:
  - y la tierra árida
  - y la tierra sedienta
  - y la tierra reseca
  lexicon: HALOT
  rationale: צִיָּה expresa sequedad o aridez; «tierra seca» es una equivalencia sobria y natural en español. Mantiene el paralelismo con la primera mitad del versículo.
- source_word: לְמֹצָאֵי מָיִם
  english_pob_choice: into springs of water
  chosen_spanish: en manantiales de aguas
  alternatives_spanish:
  - en fuentes de aguas
  - en nacimientos de aguas
  - en fuentes de agua
  lexicon: HALOT
  rationale: מוֹצָאֵי מָיִם puede referirse a salidas, fuentes o manantiales de agua. «Manantiales de aguas» conserva la imagen de agua que brota y refleja bien el plural intensivo del hebreo poético.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y concuerda con el audit trail inglés: verbo de transformación, contraste tierra árida/agua abundante y cierre con fuentes o manantiales de agua. No se registran revisiones posteriores ni cambios de última pasada.'
  spanish_consistency_notes:
  - Se usa «desierto» para מִדְבָּר por claridad y naturalidad en español, sin forzar la idea de un desierto arenoso específico.
  - «Estanque de aguas» y «manantiales de aguas» conservan el plural hebreo de מַיִם en una construcción fluida.
  - No se introducen notas al pie porque el sentido principal del verso en español no requiere una alternativa textual obligatoria.
