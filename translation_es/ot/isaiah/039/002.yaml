  text: וַ/יִּשְׂמַ֣ח עֲלֵי/הֶם֮ חִזְקִיָּהוּ֒ וַ/יַּרְאֵ֣/ם אֶת בֵּ֣ית נכת/ה אֶת הַ/כֶּסֶף֩ וְ/אֶת הַ/זָּהָ֨ב וְ/אֶת הַ/בְּשָׂמִ֜ים וְ/אֵ֣ת הַ/שֶּׁ֣מֶן הַ/טּ֗וֹב וְ/אֵת֙ כָּל בֵּ֣ית כֵּלָ֔י/ו וְ/אֵ֛ת כָּל אֲשֶׁ֥ר נִמְצָ֖א בְּ/אֹֽצְרֹתָ֑י/ו לֹֽא הָיָ֣ה דָבָ֗ר אֲ֠שֶׁר לֹֽא הֶרְאָ֧/ם חִזְקִיָּ֛הוּ בְּ/בֵית֖/וֹ וּ/בְ/כָל מֶמְשַׁלְתּֽ/וֹ־־־־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/039/002.yaml
  text: And Hezekiah was glad because of them[a], and he showed them his treasure house—the silver, the gold, the spices, the fine oil, all his armory, and all that was found in his storehouses[e][d][c][b]. There was nothing in his house or in all his dominion that Hezekiah did not show them.
  footnotes:
  - marker: a
    text: Or 'rejoiced over them' or 'was pleased with them.' The Hebrew idiom can be understood either as joy because of the envoys/gifts or joy directed toward them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of his precious things'; traditionally understood as his treasury or treasure house.
    reason: lexical_alternative
  - marker: c
    text: Or 'all his equipment house'; many understand this as 'all his armory' from the context and the parallel in 2 Kings 20:13.
    reason: alternative_reading
  - marker: d
    text: Or 'treasuries.'
    reason: lexical_alternative
  - marker: e
    text: Or 'realm' or 'kingdom.'
    reason: lexical_alternative
