  rationale: The verse is part of a parable. The translation should preserve the imagery and let interpretation arise from context rather than embedding it in the wording.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
