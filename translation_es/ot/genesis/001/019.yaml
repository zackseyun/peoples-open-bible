translation:
  language: es
  text: Y hubo atardecer[a], y hubo mañana—el cuarto día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y hubo atardecer y hubo mañana, un cuarto día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: and there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y fue
  - y era
  - y aconteció
  lexicon: HALOT
  rationale: El wayyiqtol de היה funciona aquí como fórmula narrativa que marca la clausura de cada día de la creación. En español, 'hubo' conserva el valor existencial y suena natural en esta secuencia repetida, sin imponer una idea de 'llegar a ser'.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: tarde
  alternatives_spanish:
  - atardecer
  - noche
  lexicon: HALOT
  rationale: El término hebreo designa la parte del día asociada con el anochecer/vespertino. 'Tarde' mantiene la brevedad del refrán y es una opción idiomática en español; 'atardecer' sería más específico, pero menos paralelo al ritmo del texto.
- source_word: וַיְהִי
  english_pob_choice: and there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y fue
  - y era
  - y aconteció
  lexicon: HALOT
  rationale: La repetición del verbo se conserva con la misma solución para mantener la cadencia y la estructura del hebreo.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: mañana
  alternatives_spanish:
  - alba
  - amanecer
  lexicon: HALOT
  rationale: El sustantivo denota la mañana del nuevo ciclo diurno. 'Mañana' es la equivalencia directa y natural en español para el refrán de la creación.
- source_word: יוֹם רְבִיעִי
  english_pob_choice: the fourth day
  chosen_spanish: el cuarto día
  alternatives_spanish:
  - un cuarto día
  - día cuarto
  lexicon: HALOT
  rationale: La construcción hebrea identifica el día por ordinal. En español, el artículo definido es la forma idiomática normal y conserva la referencia a la serie de días de la creación.
theological_decisions:
- issue: Cómo reflejar la fórmula de cierre de los días de creación sin resolver debates sobre la duración o naturaleza de esos días
  english_pob_reading: And there was evening, and there was morning—the fourth day.
  chosen_spanish_reading: 'Y hubo tarde, y hubo mañana: el cuarto día.'
  alternative_spanish_readings:
  - Y hubo tarde y hubo mañana, un cuarto día
  - 'Y fue tarde, y fue mañana: el cuarto día'
  rationale: La traducción conserva el refrán hebreo de manera sobria y no añade explicaciones cronológicas. 'El cuarto día' mantiene la identificación ordinal natural del texto, sin intentar cerrar tensiones interpretativas más amplias.
  doctrine_reference: Preservar la tensión teológica y narrativa; no resolver debates de cronología de la creación
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado en inglés: no hubo revisiones aplicadas y el revisor indicó alto acuerdo; por tanto, se mantiene una solución española sobria, formulaica y fiel al refrán hebreo.'
  spanish_consistency_notes:
  - Se mantiene la repetición verbal para reflejar la cadencia del hebreo.
  - Se evita 'SEÑOR' o vocabulario litúrgico ajeno al verso, porque no aparece el Tetragrámaton aquí.
  - '''Tarde'' y ''mañana'' conservan la oposición temporal básica del texto sin ampliar el sentido.'
  - El artículo en 'el cuarto día' responde al uso natural del español y al mismo ajuste idiomático reconocido en el audit trail inglés.
