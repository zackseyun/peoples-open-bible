translation:
  language: es
  text: 'Y les dijo a los levitas que enseñaban a todo Israel[a] y que eran santos para Yahvé: «Pongan el arca santa en la casa que edificó Salomón hijo de David, rey de Israel. Ya no tienen que cargarla sobre sus hombros[c][b]. Ahora sirvan a Yahvé su Dios y a su pueblo Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los levitas que daban entendimiento a todo Israel» o «los levitas que estaban instruidos para todo Israel». El participio hebreo puede expresar tanto discernimiento o instrucción recibida como el acto de impartir instrucción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la casa»; es decir, el templo edificado por Salomón.'
    reason: cultural_note
  - marker: c
    text: 'Literalmente: «no hay para ustedes carga sobre el hombro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ה/מבונים
  english_pob_choice: who taught
  chosen_spanish: los que enseñaban
  alternatives_spanish:
  - los que eran instruidos
  - los que tenían entendimiento
  - los que daban instrucción
  lexicon: HALOT
  rationale: El participio de בין en este contexto permite tanto la idea de tener entendimiento como la de instruir. En español, «los que enseñaban» comunica con naturalidad la función de los levitas en Crónicas y conserva la decisión funcional de la POB inglesa sin volverla más rígida de lo que el hebreo exige.
- source_word: הַ/קְּדוֹשִׁים לַ/יהוָה
  english_pob_choice: who were holy to Yahweh
  chosen_spanish: los que eran santos para Yahvé
  alternatives_spanish:
  - los consagrados a Yahvé
  - los santos de Yahvé
  - los que estaban consagrados a Yahvé
  lexicon: HALOT
  rationale: קדושים con ליהוה expresa estado de pertenencia y consagración. «Santos para Yahvé» conserva el lenguaje cultual de santidad sin reemplazarlo por una perífrasis más interpretativa. Se evita «SEÑOR» por la convención del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración en español, conforme al criterio del proyecto. «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: תְּנ֤וּ אֶת אֲרוֹן הַ/קֹּדֶשׁ בַּ/בַּיִת
  english_pob_choice: Put the holy ark in the house
  chosen_spanish: Pongan el arca santa en la casa
  alternatives_spanish:
  - Pongan el arca sagrada en el templo
  - Coloquen el arca santa en la casa
  lexicon: HALOT
  rationale: נתן con el complemento locativo pide una acción de colocar/poner. «Arca santa» refleja אֲרוֹן הַקֹּדֶשׁ con un sintagma claro y fiel. «Casa» conserva בית, dejando que el contexto identifique luego el templo de Salomón.
- source_word: אֲרוֹן הַ/קֹּדֶשׁ
  english_pob_choice: the holy ark
  chosen_spanish: el arca santa
  alternatives_spanish:
  - el arca sagrada
  - el arca de santidad
  lexicon: HALOT
  rationale: «Arca santa» es la equivalencia más natural y fiel al constructo hebreo. Mantiene el énfasis en la santidad del arca sin introducir una abstracción innecesaria.
- source_word: בַּ/בַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el templo
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar בית de manera transparente y porque el verso mismo especifica después que se trata de la casa edificada por Salomón. Así no se pierde la forma hebrea ni se adelanta una aclaración que el texto desarrolla.
- source_word: אֵין לָ/כֶם מַשָּׂא בַּ/כָּתֵף
  english_pob_choice: You no longer have to carry it on your shoulders
  chosen_spanish: Ya no tienen que cargarla sobre sus hombros
  alternatives_spanish:
  - No tienen carga sobre el hombro
  - Ya no les corresponde llevarla sobre el hombro
  - No hay para ustedes carga sobre el hombro
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «no hay para ustedes carga sobre el hombro». En español, «Ya no tienen que cargarla sobre sus hombros» comunica el sentido idiomático y el referente implícito del arca, manteniendo la imagen física sin volverla extraña.
- source_word: עַתָּה עִבְדוּ
  english_pob_choice: Now serve
  chosen_spanish: Ahora sirvan
  alternatives_spanish:
  - Ahora ministren
  - Ahora adoren
  lexicon: HALOT
  rationale: עבד en este contexto cultual abarca servir y desempeñar funciones sagradas. «Sirvan» es suficientemente amplio para incluir el servicio litúrgico y administrativo exigido aquí.
- source_word: וְ/אֵת עַמּ֥/וֹ יִשְׂרָאֵל
  english_pob_choice: and his people Israel
  chosen_spanish: y a su pueblo Israel
  alternatives_spanish:
  - y a Israel, su pueblo
  - y a su pueblo, Israel
  lexicon: HALOT
  rationale: La frase hebrea expresa la relación de pertenencia de Israel con Yahvé. «A su pueblo Israel» conserva la construcción relacional y suena natural en español.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio de Dios en español como «Yahvé», conforme a la política del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identidad y función de los levitas en ה/מבונים
  english_pob_reading: the Levites who taught all Israel
  chosen_spanish_reading: los levitas, los que enseñaban a todo Israel
  alternative_spanish_readings:
  - los levitas, los que eran instruidos para todo Israel
  - los levitas, los que daban entendimiento a todo Israel
  rationale: El participio admite la tensión entre ‘entender’ y ‘enseñar’. En Crónicas, los levitas cumplen a menudo una función instructiva; por eso se traduce de manera funcional como enseñanza, sin borrar la posibilidad semántica de discernimiento.
  doctrine_reference: HALOT; contexto cronicano de instrucción levítica
- issue: Referencia cultual de la casa de Salomón
  english_pob_reading: the house that Solomon son of David, king of Israel, built
  chosen_spanish_reading: la casa que edificó Salomón hijo de David, rey de Israel
  alternative_spanish_readings:
  - el templo que edificó Salomón hijo de David, rey de Israel
  rationale: «Casa» conserva בית y su ambigüedad controlada, mientras que el propio verso identifica la edificación de Salomón. «Templo» sería correcto en sentido referencial, pero suaviza la transparencia del hebreo.
  doctrine_reference: Uso bíblico de בית en contexto del santuario
- issue: Carga en el hombro como idiomatismo
  english_pob_reading: there is no burden for you on the shoulder
  chosen_spanish_reading: Ya no tienen que cargarla sobre sus hombros
  alternative_spanish_readings:
  - No hay para ustedes carga sobre el hombro
  - No les corresponde llevar carga sobre el hombro
  rationale: La frase hebrea describe la ausencia de la tarea de transportar el arca. Se mantiene la imagen corporal y se aclara en español que la obligación ya no recae sobre ellos.
  doctrine_reference: Sentido literal-idiomático del hebreo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo final reportó alta concordancia; por eso se conserva la solución de fondo del borrador inglés, ajustada a un español natural y transparente sin perder la tensión léxica de ה/מבונים ni la imagen de la carga sobre el hombro.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «casa» en vez de «templo» en el cuerpo principal para reflejar בית, con nota aclaratoria.
  - «Arca santa» mantiene la santidad del sintagma hebreo sin sobreinterpretar.
  - «Sirvan» preserva el valor cultual amplio de עבד.
  - El marcador [c] se coloca antes de [b] siguiendo el orden de notas heredado del audit trail inglés.
