translation:
  language: es
  text: 'Ella le dijo: «No, mi hermano, no me violes[a], porque algo así no se hace en Israel[b]. No hagas esta vileza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no me humilles» o «no me ultrajes». El verbo hebreo puede denotar violación con matices de humillación y deshonra.
    reason: lexical_alternative
  - marker: b
    text: O «esta infamia» o «este acto vergonzoso». El término hebreo alude a una acción moralmente escandalosa, no a simple necedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר ל֗וֹ
  english_pob_choice: She said to him
  chosen_spanish: Ella le dijo
  alternatives_spanish:
  - Y ella le dijo
  lexicon: HALOT
  rationale: La forma narrativa וַתֹּאמֶר introduce el discurso de Tamar; en español, «le dijo» comunica de manera natural la acción verbal y el destinatario implícito por el pronombre átono, sin perder la sucesión narrativa.
- source_word: אַל
  english_pob_choice: No / do not
  chosen_spanish: No / no
  alternatives_spanish:
  - Por favor, no
  lexicon: HALOT
  rationale: El primer אַל funciona como exclamación urgente antes del vocativo, por eso se traduce «No». El segundo y tercero introducen prohibiciones, por eso se repiten como «no» para mantener la fuerza imperativa sin suavizar el tono.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  lexicon: HALOT
  rationale: Se conserva el término de parentesco directo con sufijo de primera persona. En español, «hermano mío» suena natural y mantiene la intensidad relacional del ruego.
- source_word: תְּעַנֵּנִי
  english_pob_choice: violate me
  chosen_spanish: me humilles
  alternatives_spanish:
  - me violes
  - me afliges
  lexicon: HALOT
  rationale: ענה en este contexto sexual incluye la idea de humillación/violación. Opto por «me humilles» porque preserva explícitamente la vergüenza y el ultraje que el inglés POB destaca como parte del rango léxico; en español, «violes» es posible, pero estrecha más el sentido al acto sexual y pierde algo de la carga de deshonra. La tensión lexical queda marcada en la nota.
- source_word: כִּ֛י לֹא יֵֽעָשֶׂ֥ה כֵ֖ן בְּ/יִשְׂרָאֵ֑ל
  english_pob_choice: for such a thing is not done in Israel
  chosen_spanish: porque algo así no se hace en Israel
  alternatives_spanish:
  - porque eso no se hace en Israel
  - pues así no se hace en Israel
  lexicon: HALOT
  rationale: El nifal impersonal de עשה expresa una norma moral comunitaria. «Algo así no se hace en Israel» suena idiomático en español y conserva la apelación a la norma compartida del pueblo.
- source_word: אַֽל תַּעֲשֵׂ֖ה
  english_pob_choice: Do not do
  chosen_spanish: No hagas
  alternatives_spanish:
  - No cometas
  - No hagas esto
  lexicon: HALOT
  rationale: Se mantiene la prohibición directa del hebreo con «No hagas». El objeto que sigue especifica la acción moralmente reprobable.
- source_word: הַ/נְּבָלָ֥ה הַ/זֹּֽאת
  english_pob_choice: this disgraceful thing
  chosen_spanish: esta vileza
  alternatives_spanish:
  - este acto vergonzoso
  - esta infamia
  - esta cosa vil
  lexicon: HALOT
  rationale: נְבָלָה designa una acción moralmente escandalosa y vergonzosa. «Vileza» conserva la fuerza moral negativa y es suficientemente amplia para incluir la deshonra y la atrocidad del acto; evita debilitar el término a simple «locura» o restringirlo solo a un delito técnico.
theological_decisions:
- issue: La carga moral y social de נְבָלָה
  english_pob_reading: “this disgraceful thing” / “this outrageous thing” / “this vile act”
  chosen_spanish_reading: “esta vileza”
  alternative_spanish_readings:
  - “este acto vergonzoso”
  - “esta infamia”
  rationale: La palabra hebrea no describe mera tontería, sino un acto escandaloso y vergonzoso contra el orden moral y social. «Vileza» comunica ese peso ético sin forzar una precisión jurídica que el texto no explicita.
  doctrine_reference: Sabiduría bíblica y moralidad del pacto
- issue: El verbo ענה en contexto de violencia sexual y humillación
  english_pob_reading: '“violate me” with note: humiliate/rape me'
  chosen_spanish_reading: “me humilles”
  alternative_spanish_readings:
  - “me violes”
  - “me ultrajes”
  rationale: El inglés POB preserva la tensión entre violencia física y humillación. En español, «me humilles» retiene con claridad la dimensión de vergüenza y abuso; la nota explica que el hebreo puede abarcar también la violación sexual. Así no se borra la ambivalencia lexical del original.
  doctrine_reference: Ética sexual bíblica y dignidad humana
translation_notes:
  revision_awareness: La redacción sigue de cerca el auditor inglés de POB, manteniendo la secuencia narrativa, la prohibición triple y la distinción entre el verbo de violencia/humillación (ענה) y el sustantivo de vileza moral (נְבָלָה). No se introdujeron ampliaciones interpretativas ajenas al pasaje, y se preservó la tensión léxica documentada en las notas.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en este proyecto; aquí no aparece ningún nombre divino.
  - Se mantiene «hermano mío» como vocativo afectivo y retórico, sin suavizar la urgencia del ruego.
  - Se evita «SEÑOR» o equivalentes tradicionales no requeridos por el texto.
  - «Vileza» se emplea con valor moral fuerte, no como simple grosería.
  - La puntuación reproduce la separación entre súplica, explicación y nueva prohibición, como en el inglés POB.
