translation:
  language: es
  text: Y persiguió a los inicuos[a], rastreándolos[b], y quemó a los que perturbaban a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or «persiguió a los inicuos, buscándolos».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede entenderse como «buscándolos» o «buscándolos hasta hallarlos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωξεν
  english_pob_choice: hunted down
  chosen_spanish: persiguió
  alternatives_spanish:
  - acosó
  - perseguió
  - dio caza a
  lexicon: LSJ
  rationale: El griego expresa una persecución activa. En español, «persiguió» comunica esa acción directa de forma natural y digna; «dio caza a» sería más vívido pero más idiomático y menos sobrio. No conviene cargar el verso con un matiz técnico ajeno al contexto.
- source_word: ἀνόμους
  english_pob_choice: the lawless
  chosen_spanish: los inicuos
  alternatives_spanish:
  - los sin ley
  - los impíos
  - los transgresores
  lexicon: LSJ
  rationale: «ἀνόμους» conserva una fuerza moral y legal. En español, «los inicuos» mantiene el juicio ético sin sonar tan jurídico como «los sin ley», y evita restringirlo a criminalidad civil. Aunque «los sin ley» sería más literal, puede sonar poco natural; «los transgresores» debilita el valor del adjetivo.
- source_word: ἐξερευνῶν
  english_pob_choice: searching them out
  chosen_spanish: rastreándolos
  alternatives_spanish:
  - buscándolos
  - indagando sobre ellos
  - persiguiéndolos
  lexicon: LSJ
  rationale: El participio añade la idea de búsqueda diligente. «Rastreándolos» comunica la acción de seguir huellas o señales para encontrarlos, acercándose al valor de «searching them out». Se prefiere sobre «buscándolos» por ser más preciso y sobre «indagando» por ser demasiado intelectual.
- source_word: παράσσοντας
  english_pob_choice: troubled
  chosen_spanish: perturbaban
  alternatives_spanish:
  - molestaban
  - afligían
  - oprimían
  lexicon: LSJ
  rationale: El participio describe a quienes causaban daño o desorden al pueblo. «Perturbaban» conserva un rango amplio de molestia, trastorno y daño, cercano al «troubled» de la traducción inglesa, sin forzar una noción de opresión política más específica de lo que exige el griego.
- source_word: ἐφλόγισεν
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - incendió
  - prendió fuego a
  - consumió con fuego
  lexicon: LSJ
  rationale: El verbo indica quemar de manera directa. «Quemó» es la equivalencia más natural y transparente en español, y preserva la severidad del acto sin añadir explicación. «Incendió» puede sugerir accidentalidad o un matiz distinto; «consumió con fuego» sería más explicativo de lo debido.
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  - su pueblo
  lexicon: LSJ
  rationale: «λαός» designa al colectivo del pueblo. «Su pueblo» es la forma más natural y fiel en español, y mantiene el sentido comunitario/covenantal del contexto macabeo.
theological_decisions:
- issue: Fuerza moral-legal de ἀνόμους
  english_pob_reading: the lawless
  chosen_spanish_reading: los inicuos
  alternative_spanish_readings:
  - los sin ley
  - los impíos
  - los transgresores
  rationale: La expresión griega no es solo descriptiva; marca a quienes actúan contra el orden de Dios y de la comunidad. «Los inicuos» preserva el juicio moral sin diluirlo en una categoría meramente legal o policial. Así se mantiene la tensión entre legalidad y maldad implícita en el término.
  doctrine_reference: Translation philosophy §1, §5
- issue: Severidad de ἐφλόγισεν
  english_pob_reading: he burned those who troubled his people
  chosen_spanish_reading: quemó a los que perturbaban a su pueblo
  alternative_spanish_readings:
  - incendió a los que perturbaban a su pueblo
  - quemó a quienes molestaban a su pueblo
  rationale: El griego presenta la acción con dureza. «Quemó» conserva esa severidad sin suavizarla ni introducir detalles no presentes. Se evita atenuar el acto con perífrasis más eufemísticas; también se evita «incendió» porque puede sonar más técnico o menos directo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y la solución inglesa auditada, sin cambios respecto del último pase indicado como sin modificaciones. Se mantiene la dureza del verbo final y la doble idea de persecución más búsqueda diligente. No se han introducido ampliaciones narrativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - Se evitó «Mesías»/«Cristo» porque no corresponde al pasaje.
  - Se prefirió «los inicuos» en vez de «los sin ley» para conservar la naturalidad del español sin perder la carga moral del término.
  - El giro final conserva la fuerza de un acto violento sin añadir matices interpretativos ajenos al griego.
