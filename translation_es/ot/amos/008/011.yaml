translation:
  language: es
  text: 'He aquí[a], vienen días —declara el Señor Yahvé— en que enviaré hambre en la tierra: no hambre de pan, ni sed de agua, sino por oír las palabras de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren». El hebreo introduce una solemne proclamación profética; aquí se eligió «He aquí» para conservar mejor ese tono elevado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren ustedes!
  lexicon: HALOT
  rationale: La fórmula introduce una proclamación profética solemne y llama la atención del oyente. «¡Miren!» conserva el impulso exhortativo sin sonar arcaico, aunque mantiene la fuerza de anuncio de «Behold».
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: Vienen días
  alternatives_spanish:
  - Días vienen
  - Ya vienen días
  lexicon: HALOT
  rationale: Es un modismo profético de inminencia. «Vienen días» suena natural en español y conserva el anuncio de futuro cercano sin agregar un artículo que el hebreo no exige.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula profética de declaración. Se conserva con «declara». אֲדֹנָי יְהוִה se traduce con el título «Señor Yahvé» para mantener el nombre divino explícito según la norma del proyecto, sin recurrir a un reemplazo encubridor.
- source_word: וְהִשְׁלַחְתִּי
  english_pob_choice: when I will send
  chosen_spanish: en que enviaré
  alternatives_spanish:
  - cuando enviaré
  - y enviaré
  lexicon: HALOT
  rationale: El waw introduce el contenido del anuncio futuro. En español, «en que enviaré» enlaza de forma fluida con «Vienen días» y conserva la primera persona divina de la acción.
- source_word: רָעָב
  english_pob_choice: a famine
  chosen_spanish: un hambre
  alternatives_spanish:
  - una hambruna
  - un hambre extrema
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo de «hambre/famine». Dado el paralelismo con pan y agua, «un hambre» conserva mejor la imagen de privación general y la tensión metafórica del versículo.
- source_word: בָּאָרֶץ
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «tierra/país». «Sobre la tierra» reproduce el valor de juicio que cae encima del territorio y sigue la decisión inglesa de expresar la afección sobre el ámbito castigado.
- source_word: לֹא רָעָב לַלֶּחֶם
  english_pob_choice: not a famine for bread
  chosen_spanish: no un hambre de pan
  alternatives_spanish:
  - no hambre de pan
  - no una hambruna de pan
  lexicon: HALOT
  rationale: Se conserva el paralelismo y la negación del elemento literal. «Pan» mantiene la imagen concreta del hebreo, y «hambre de pan» refleja la construcción con לְ de finalidad/relación.
- source_word: וְלֹא צָמָא לַמַּיִם
  english_pob_choice: nor a thirst for water
  chosen_spanish: ni una sed de agua
  alternatives_spanish:
  - ni sed de agua
  - ni una sed por agua
  lexicon: HALOT
  rationale: La coordinación negativa en español queda bien con «ni». «Sed de agua» preserva el paralelismo formal con «hambre de pan» y mantiene la imagen literal.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - más bien
  lexicon: HALOT
  rationale: 'En español, «sino» expresa con precisión el contraste correctivo: no se trata de pan y agua, sino de otra privación distinta.'
- source_word: לִשְׁמֹעַ
  english_pob_choice: for hearing
  chosen_spanish: de oír
  alternatives_spanish:
  - para oír
  - de escuchar
  lexicon: HALOT
  rationale: El infinitivo expresa el objeto de la carencia metafórica. «De oír» conserva el enlace natural con «hambre/sed» y mantiene el paralelismo sin explicitar más de lo que el hebreo dice.
- source_word: דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - las palabras del Señor
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: El plural constructo se traduce de manera directa como «las palabras». Se mantiene «Yahvé» por la decisión del proyecto de no enmascarar el Nombre divino; el plural evita reducir indebidamente el matiz de mensajes/expresiones divinas.
theological_decisions:
- issue: Representación del Nombre divino יהוה / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene explícitamente el Nombre divino. Conforme a la guía del proyecto, se traduce como «Yahvé» en el texto principal, preservando la identidad del nombre del pacto y evitando la convención de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza del hambre anunciada
  english_pob_reading: a metaphorical famine consisting in deprivation of hearing the words of Yahweh
  chosen_spanish_reading: un hambre metafórica que consiste en la privación de oír las palabras de Yahvé
  alternative_spanish_readings:
  - hambre literal acompañada de privación espiritual
  - hambre de la palabra de Yahvé
  rationale: El propio versículo niega hambre literal de pan y sed literal de agua, y luego identifica la verdadera carencia como la de oír las palabras divinas. La traducción mantiene esa tensión metafórica sin resolverla en una explicación más doctrinal que el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se revisó el expediente inglés y la observación textual: el hebreo usa explícitamente el Nombre divino יְהוָה y una construcción metafórica de hambre/sed que no debe resolverse como simple escasez física. La versión española conserva el paralelismo de pan/agua y el contraste correctivo de כִּי אִם mediante «sino».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, según la terminología del proyecto.
  - Se prefirió «oír» sobre «escuchar» para conservar la relación sintáctica con «hambre/sed de».
  - «Hambre» y «sed» se usaron en paralelo para reflejar la estructura hebrea sin convertirla en paráfrasis explicativa.
  - La puntuación con guiones y dos puntos busca reproducir el avance solemne del anuncio profético en español natural.
