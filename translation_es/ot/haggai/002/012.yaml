base_translation:
  language: en
  yaml_path: translation/ot/haggai/002/012.yaml
  text: Suppose a man carries holy meat in the fold of his garment[a], and with his fold touches bread, stew, wine, oil, or any food—does it become holy? And the priests answered and said[b], “No.”
