translation:
  language: es
  text: 'Pero ellos guardaron silencio y no le respondieron ni una palabra[a], porque la orden del rey era esta: «No le respondan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no le respondieron ni una palabra», una expresión idiomática que significa que no dieron ninguna respuesta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲרִישׁוּ
  english_pob_choice: they kept silent
  chosen_spanish: guardaron silencio
  alternatives_spanish:
  - se mantuvieron en silencio
  - callaron
  lexicon: HALOT
  rationale: El hebreo expresa silencio deliberado en contexto narrativo. “Guardaron silencio” conserva esa fuerza intencional con un español natural y digno.
- source_word: וְלֹא עָנוּ אֹתוֹ דָּבָר
  english_pob_choice: and did not answer him a word
  chosen_spanish: y no le respondieron ni una palabra
  alternatives_spanish:
  - y no le respondieron palabra alguna
  - y no le contestaron nada
  lexicon: HALOT
  rationale: La construcción hebrea es un idiomatismo que enfatiza ausencia total de respuesta. “Ni una palabra” mantiene el énfasis y suena natural en español.
- source_word: מִצְוַת הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: la orden del rey
  alternatives_spanish:
  - el mandato del rey
  - el mandato del rey
  lexicon: HALOT
  rationale: מִצְוָה aquí denota una instrucción con autoridad. En español, “orden” comunica bien esa fuerza imperativa sin perder el matiz de autoridad real.
- source_word: לֹא תַעֲנֻהוּ
  english_pob_choice: Do not answer him
  chosen_spanish: No le respondan
  alternatives_spanish:
  - No le contesten
  - No le den respuesta
  lexicon: HALOT
  rationale: El plural masculino en imperativo negativo dirige la prohibición al grupo. “Respondan” preserva el mandato colectivo y mantiene la relación semántica con ענה.
theological_decisions:
- issue: El mandato del rey funciona como la causa inmediata del silencio, sin añadir matices doctrinales externos.
  english_pob_reading: for the king’s command was, saying, “Do not answer him.”
  chosen_spanish_reading: 'porque la orden del rey era: “No le respondan”.'
  alternative_spanish_readings:
  - 'pues la orden del rey era: “No le respondan”'
  - 'porque el rey había ordenado: “No le respondan”'
  rationale: La frase mantiene la explicación causal del hebreo sin intensificar ni suavizar la autoridad del rey. Se conserva la relación entre mandato y obediencia narrativa.
  doctrine_reference: Narrative authority / royal command
translation_notes:
  revision_awareness: Concordancia general alta con el audit trail inglés. Se mantuvo la estructura explicativa causal, el idiomatismo de “ni una palabra” y el mandato directo en forma plural. No se requirieron cambios de revisión adicionales.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se prefirió “orden” para מִצְוָה en este contexto narrativo de autoridad real.
  - Se mantuvo el paralelismo entre silencio previo y ausencia total de respuesta mediante la expresión idiomática “ni una palabra”.
