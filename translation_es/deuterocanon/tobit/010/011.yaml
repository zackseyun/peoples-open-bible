translation:
  language: es
  text: 'Entonces Ragüel se levantó y le dio a su esposa Sara, y la mitad de sus bienes: siervos[a], ganado y plata; y, después de bendecirlos, los despidió, diciendo: «Que el Dios del cielo los prospere[b], hijos, antes de que yo muera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esclavos». El griego literalmente dice «cuerpos» en una lista de propiedad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «El Dios del cielo los prosperará». El futuro griego puede funcionar como una bendición o deseo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de Ragüel al prepararse para actuar. En español, 'se levantó' es natural, narrativo y fiel al movimiento del original sin sonar arcaico.
- source_word: ἔδωκεν αὐτῷ Σάρραν τὴν γυναῖκα αὐτοῦ
  english_pob_choice: gave him Sarah his wife
  chosen_spanish: le dio a Sara, su esposa
  alternatives_spanish:
  - le entregó a Sara, su esposa
  - le dio a su esposa Sara
  lexicon: BDAG
  rationale: Se conserva el sentido legal/familiar de entregar a la novia/esposa al marido. El orden español se ajusta a la sintaxis natural sin perder la relación posesiva explícita del griego.
- source_word: τὰ ἥμισυ τῶν ὑπαρχόντων
  english_pob_choice: half of his possessions
  chosen_spanish: la mitad de sus bienes
  alternatives_spanish:
  - la mitad de sus posesiones
  - la mitad de lo que tenía
  lexicon: BDAG
  rationale: '''Bienes'' comunica el conjunto de propiedades con un registro digno y bíblico, y en español evita la repetición pesada de ''posesiones''.'
- source_word: σώματα
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - criados
  lexicon: LSJ
  rationale: Aunque el sentido literal es 'cuerpos', aquí designa personas contadas entre la propiedad. En español, 'siervos' preserva el peso social del término sin afirmar más explícitamente la categoría jurídica que el griego no nombra con δοῦλοι.
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales de crianza
  - bestias
  lexicon: BDAG
  rationale: Término general para animales domésticos o de valor económico. 'Ganado' es claro, natural y suficientemente amplio en español bíblico.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: BDAG
  rationale: Se conserva el concreto 'plata', que en contexto antiguo puede funcionar como medio de pago. Esto mantiene la imagen económica del original.
- source_word: εὐλογήσας αὐτοὺς
  english_pob_choice: after blessing them
  chosen_spanish: después de bendecirlos
  alternatives_spanish:
  - y bendiciéndolos
  - habiéndolos bendecido
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa o concurrente a despedirlos. 'Después de bendecirlos' comunica bien la secuencia en español.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió
  - los mandó ir
  lexicon: BDAG
  rationale: En el contexto de partida, 'despedir' conserva la idea de enviar fuera con una bendición, y suena más idiomático que una traducción más mecánica.
- source_word: Εὐοδώσει ὑμᾶς
  english_pob_choice: May ... prosper you
  chosen_spanish: Que ... los prospere
  alternatives_spanish:
  - Que ... les dé éxito
  - Que ... haga próspero su camino
  lexicon: BDAG
  rationale: El futuro griego puede funcionar como bendición o deseo. En español, la fórmula optativa 'Que ...' preserva el carácter benedictivo sin forzar una simple predicción.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos míos
  - niños
  lexicon: BDAG
  rationale: Como vocativo afectuoso al despedirlos, 'hijos' es natural en español; el possessivo no está explícito en el griego y no se añade.
- source_word: ὁ θεὸς τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios celestial
  - el Dios de los cielos
  lexicon: BDAG
  rationale: Se mantiene el título reverencial estándar sin sustituirlo por una formulación más interpretativa.
- source_word: πρὸ τοῦ μὲ ἀποθανεῖν
  english_pob_choice: before I die
  chosen_spanish: antes de que yo muera
  alternatives_spanish:
  - antes de morir
  - antes de mi muerte
  lexicon: BDAG
  rationale: Se traduce de forma idiomática y directa el infinitivo temporal, conservando la inmediatez del discurso.
theological_decisions:
- issue: Valor del futuro Εὐοδώσει en contexto de bendición
  english_pob_reading: 'Rendered as a wish/prayer: ''May the God of heaven prosper you'''
  chosen_spanish_reading: 'Se expresa como deseo benedictivo: ''Que el Dios del cielo los prospere'''
  alternative_spanish_readings:
  - '''El Dios del cielo los prosperará'''
  - '''El Dios del cielo les dará éxito'''
  rationale: En una despedida con bendición, el futuro funciona de modo performativo/optativo. El español con 'Que ...' conserva la función litúrgica de la frase sin decidir indebidamente entre promesa y predicción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Sentido de σώματα en una lista de bienes
  english_pob_reading: Main text 'servants' with 'slaves' preserved as an alternative
  chosen_spanish_reading: '''siervos'' en el texto principal, con reconocimiento de la referencia a personas contadas como propiedad'
  alternative_spanish_readings:
  - '''esclavos'''
  - '''criados'''
  rationale: El sustantivo griego literalmente dice 'cuerpos', pero en el inventario patrimonial apunta a personas dependientes. 'Siervos' mantiene la tensión entre humanidad y pertenencia patrimonial sin imponer de entrada una terminología más fuerte que la que el griego explicita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5; Contested terms table for δοῦλος by analogy
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el texto griego de Swete 1909 y con el audit trail inglés. La revisión más reciente no introdujo cambios; por eso se preservan las mismas decisiones semánticas principales: el futuro benedictivo de Εὐοδώσει, la referencia patrimonial de σώματα, y el carácter de despedida con bendición.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto griego o el contexto lo exigieran; aquí aparece 'el Dios del cielo', no el tetragrama.
  - '''Sara'' se escribe sin h aspirada, conforme al uso español.'
  - '''Siervos'' se eligió como equivalente principal de σώματα siguiendo la nota inglesa y evitando una mecanización de ''esclavos'' en el texto principal.'
  - Se preservó la puntuación y el ritmo de una sola oración extensa, acorde con el relato.
  - Las notas a pie reflejan alternativas reales del griego, no ampliaciones devocionales.
