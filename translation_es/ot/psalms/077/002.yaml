revisions:
- from: Mi voz es para Dios[a], y clamo; mi voz es para Dios[b], y él me presta oído.
  to: A Dios dirijo mi voz[a], y clamo; a Dios dirijo mi voz[b], y él me presta oído.
  rationale: Se reemplaza 'Mi voz es para Dios' por 'A Dios dirijo mi voz' para expresar de manera natural en español la dirección de אֶל sin perder el énfasis poético en 'mi voz' ni el paralelismo repetido. Se conserva 'y clamo' por su fuerza poética y 'y él me presta oído' por el matiz atencional de אזן. La nota b se corrige para ofrecer una alternativa literal real y no repetir el texto principal.
