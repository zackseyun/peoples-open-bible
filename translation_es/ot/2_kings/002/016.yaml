translation:
  language: es
  text: 'Entonces le dijeron: «Mira ahora, hay entre tus siervos cincuenta hombres fuertes. Por favor, deja que vayan y busquen a tu maestro, no sea que el Espíritu de Yahvé[a] lo haya llevado y lo haya arrojado sobre uno de los montes o en uno de los valles». Pero él dijo: «No los envíen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el viento de Yahvé lo haya llevado». La palabra hebrea רוּחַ puede significar «espíritu» o «viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira pues
  lexicon: HALOT
  rationale: La combinación deíctica e interjectiva pide una llamada de atención inmediata; «Mira ahora» conserva la fuerza discursiva sin arcaísmo.
- source_word: יֵשׁ אֶת עֲבָדֶיךָ
  english_pob_choice: there are ... among your servants
  chosen_spanish: hay entre tus siervos
  alternatives_spanish:
  - tus siervos tienen
  - hay con tus siervos
  lexicon: HALOT
  rationale: יֵשׁ expresa existencia; «entre tus siervos» comunica con naturalidad que estos hombres están dentro del grupo de sus servidores/acompañantes.
- source_word: חֲמִשִּׁים אֲנָשִׁים
  english_pob_choice: fifty ... men
  chosen_spanish: cincuenta hombres
  alternatives_spanish:
  - cincuenta varones
  - cincuenta personas
  lexicon: HALOT
  rationale: Es un sintagma numérico directo; «hombres» preserva el referente masculino del hebreo.
- source_word: בְּנֵי חַיִל
  english_pob_choice: mighty men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres fuertes
  - hombres capaces
  - hombres esforzados
  lexicon: HALOT
  rationale: La expresión denota hombres de capacidad y fortaleza. En español, «valientes» conserva el matiz de vigor/competencia sin sonar excesivamente militar si se usa con cuidado en contexto narrativo.
- source_word: יֵלְכוּ נָא
  english_pob_choice: Please let them go
  chosen_spanish: Por favor, deja que vayan
  alternatives_spanish:
  - Por favor, permíteles ir
  - Deja que vayan, por favor
  lexicon: HALOT
  rationale: El jussivo con נָא requiere una petición cortés dirigida a Elíseo; en español, «deja que vayan» refleja la modalidad permisiva implícita.
- source_word: וִיבַקְשׁוּ אֶת אֲדֹנֶיךָ
  english_pob_choice: and seek your master
  chosen_spanish: y busquen a tu señor
  alternatives_spanish:
  - y busquen a tu maestro
  - y busquen a tu amo
  lexicon: HALOT
  rationale: בקשׁ aquí es «buscar» con objeto personal. Se conserva «señor» porque el hebreo אֲדֹנֶיךָ designa a Elías como autoridad de Elíseo; «maestro» sería posible, pero «señor» sigue mejor el rango relacional del texto.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - por si acaso
  - tal vez
  lexicon: HALOT
  rationale: פֶּן introduce una eventualidad temida; «no sea que» es la forma española más natural para ese valor prevenido.
- source_word: נְשָׂא/וֹ רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh has carried him away
  chosen_spanish: el Espíritu de Yahvé los haya llevado
  alternatives_spanish:
  - el viento de Yahvé lo haya llevado
  - el Espíritu de Yahvé lo haya arrebatado
  lexicon: HALOT
  rationale: 'El texto hebreo presenta la ambigüedad de רוּחַ; el contexto narrativo favorece «Espíritu». Mantengo el plural pronominal «los» tal como aparece en el pedido de búsqueda: en esta formulación española el referente resultante puede sonar colectivo por concordancia contextual, aunque la referencia narrativa principal sea Elías; se deja la tensión para evitar una suavización no fundada.'
- source_word: וַיַּשְׁלִכֵהוּ
  english_pob_choice: and cast him
  chosen_spanish: y lo haya arrojado
  alternatives_spanish:
  - y lo haya lanzado
  - y lo haya echado
  lexicon: HALOT
  rationale: El verbo significa arrojar/lanzar; «arrojar» conserva mejor la fuerza del movimiento violento que un simple «poner» o «dejar».
- source_word: בְּאַחַד הֶהָרִים
  english_pob_choice: on one of the mountains
  chosen_spanish: sobre uno de los montes
  alternatives_spanish:
  - en uno de los montes
  - sobre una de las montañas
  lexicon: HALOT
  rationale: הרים puede rendirse por «montes/montañas». «Sobre» reproduce bien la idea de haber sido depositado en la superficie de un monte.
- source_word: בְּאַחַת הַגֵּאָיוֹת
  english_pob_choice: in one of the valleys
  chosen_spanish: en uno de los valles
  alternatives_spanish:
  - en uno de los barrancos
  - en una de las quebradas
  lexicon: HALOT
  rationale: גֵּיאָוֹת designa valles o hondonadas; «valles» es la opción más clara y amplia para lectura pública.
- source_word: לֹא תִשְׁלָחוּ
  english_pob_choice: Do not send them
  chosen_spanish: No los envíen
  alternatives_spanish:
  - No los manden
  - No los despachen
  lexicon: HALOT
  rationale: La prohibición plural se dirige al grupo que propone la misión; en español, el objeto directo «los» se explicita para claridad y naturalidad.
theological_decisions:
- issue: Rendering of רוּחַ יְהוָה
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el viento de Yahvé
  rationale: En este contexto profético, la agencia personal divina domina la escena, por lo que «Espíritu» es la lectura principal. Se conserva la alternativa léxica por la ambigüedad normal de רוּחַ, sin borrar la tensión textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, evitando el sustituto litúrgico y manteniendo transparencia con el texto hebreo.
  doctrine_reference: Project default terminology for יהוה / YHWH
translation_notes:
  revision_awareness: 'La redacción española toma en cuenta las revisiones del POB en inglés: se sigue la decisión final favorable a «mighty men» con un equivalente español que conserve fuerza; también se refleja la preferencia por un verbo más fuerte que «search»/«look for» y por una formulación formal pero natural para «cast» y la localización «in/on» en valles y montes. Se mantiene la nota de ambigüedad para רוּחַ, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene una sintaxis pública y sobria, sin arcaísmos innecesarios.
  - Se conserva la tensión léxica de רוּחַ mediante nota de pie de página.
  - «Señor» se reserva aquí para אֲדֹנֶיךָ según el uso relacional del pasaje, no como sustituto del Tetragrámaton.
