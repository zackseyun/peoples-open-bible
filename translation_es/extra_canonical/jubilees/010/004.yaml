translation:
  language: es
  text: porque tu gracia ha sido grande conmigo, y grande es tu misericordia para mi vida; que tu gracia sea engrandecida sobre mis hijos, y no permitas que espíritus malos dominen sobre ellos, no sea que los destruyan de la tierra.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: grace
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: χάρις / חֵן
  rationale: Conserva el término central del original y del POB en español bíblico claro. "Favor" puede servir en algunos contextos, pero aquí la repetición con "grande" favorece "gracia" como término más natural y teológicamente estable.
- source_word: mercy
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: ἔλεος / חֶסֶד
  rationale: '"Misericordia" reproduce bien el matiz de benevolencia salvadora hacia la vida del hablante y es la opción más transparente en español eclesial contemporáneo.'
- source_word: let your grace be magnified
  english_pob_choice: let your grace be magnified
  chosen_spanish: que tu gracia sea magnificada
  alternatives_spanish:
  - que tu gracia sea exaltada
  - que tu gracia sea engrandecida
  lexicon: ʿ-b-y / גָּדַל
  rationale: Sigue la revisión auditada que corrige "lifted up" por "magnified" y preserva la relación léxica con "ha sido grande" mediante un verbo de aumento/ensalzamiento inteligible en español.
- source_word: wicked spirits
  english_pob_choice: wicked spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus perversos
  - espíritus impíos
  lexicon: רוּחַ / πνεῦμα
  rationale: '"Espíritus malos" mantiene la simplicidad del POB inglés y comunica la cualidad moral sin cargar con un término más técnico que podría sonar menos natural en español.'
theological_decisions:
- issue: Relación entre gracia y misericordia en la petición
  english_pob_reading: for your grace has been great toward me, and great is your mercy toward my life—let your grace be magnified over my sons
  chosen_spanish_reading: porque tu gracia ha sido grande para conmigo, y grande es tu misericordia para mi vida; que tu gracia sea magnificada sobre mis hijos
  alternative_spanish_readings:
  - porque tu favor ha sido grande para conmigo
  - '... que tu favor sea engrandecido sobre mis hijos'
  rationale: Mantengo la repetición intencional entre la grandeza ya experimentada y la petición futura. No diluyo "gracia" en la segunda cláusula, porque el texto enlaza la misma cualidad divina con una intensificación sobre los hijos.
  doctrine_reference: Divine mercy/grace language; covenantal favor
- issue: Naturaleza y agencia de los espíritus
  english_pob_reading: do not let wicked spirits rule over them
  chosen_spanish_reading: no permitas que espíritus malos dominen sobre ellos
  alternative_spanish_readings:
  - no dejes que espíritus malos gobiernen sobre ellos
  - no permitas que espíritus malos se enseñoreen de ellos
  rationale: '"Dominen" comunica autoridad opresiva sin introducir un matiz de señorío humano demasiado técnico. Preserva la idea de control espiritual dañino y la necesidad de intervención divina.'
  doctrine_reference: Spiritual oppression / demonic agency
translation_notes:
  revision_awareness: La revisión auditada corrigió la antigua lectura "lifted up" a "magnified" por fidelidad al verbo ge'ez de la raíz de 'ser grande'. La traducción española refleja esa decisión con "sea magnificada" y mantiene la conexión léxica con "ha sido grande".
  spanish_consistency_notes:
  - Se conserva "gracia" en ambas cláusulas para reflejar la repetición del original y del POB auditado.
  - '"Misericordia" se usa para la segunda cláusula porque el paralelismo admite un matiz complementario sin perder continuidad semántica.'
  - '"Espíritus malos" evita una tecnicidad innecesaria y mantiene la transparencia del texto.'
  - La nota al pie está anclada explícitamente en "magnificada[a]" para cumplir la referencia visible en el texto.
