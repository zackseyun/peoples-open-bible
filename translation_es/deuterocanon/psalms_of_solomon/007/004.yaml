revisions:
- from: Porque si envías la muerte[a], tú le darás orden acerca de nosotros; porque eres misericordioso, y no te enojarás[b] hasta destruirnos por completo.
  to: Porque si envías la muerte[a], tú le ordenarás respecto de nosotros; porque eres misericordioso, y no te enojarás de modo que nos lleves al fin.[b]
  rationale: Se ajusta la cláusula final para reflejar correctamente el infinitivo griego de resultado y evitar la ambigüedad temporal de «hasta destruirnos». También se mejora la naturalidad de ἐντελῇ con «le ordenarás» y se mantiene «muerte» conforme al texto base y al fallo auditado en inglés. La nota se consolida para explicar tanto la alternativa léxica como la relación sintáctica relevante.
