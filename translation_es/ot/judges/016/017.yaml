revisions:
- from: 'Así le descubrió todo su corazón y le dijo: «Navaja no ha subido sobre mi cabeza, porque soy nazareo[a] de Dios desde el vientre de mi madre. Si me rapan, entonces mi fuerza se apartará de mí y me debilitaré, y seré como cualquier otro hombre[b]».'
  to: 'Y le abrió todo su corazón[a] y le dijo: «Una navaja nunca ha pasado por mi cabeza, porque soy nazareo[b] de Dios desde el vientre de mi madre. Si me rapan, entonces mi fuerza se apartará de mí y me debilitaré, y seré como cualquier otro hombre[c]».'
  rationale: Se eliminó «Así» por no estar respaldado por el hebreo; se sustituyó «le descubrió» por «le abrió» para una expresión más natural que conserva la metáfora de revelar el corazón; se ajustó el modismo de la navaja para evitar un calco oscuro en español, manteniendo el sentido de que jamás ha pasado sobre su cabeza. Se añadió una nota léxica en [a] para preservar la alternativa del POB inglés sobre el modismo del corazón, y se retuvieron las notas relevantes sobre «nazareo» y la cláusula final.
  reviewer_model: gpt-5.4
