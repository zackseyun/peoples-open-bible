id: 1PE.5.5
reference: 1 Peter 5:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁμοίως, νεώτεροι, ὑποτάγητε πρεσβυτέροις. πάντες δὲ ἀλλήλοις τὴν ταπεινοφροσύνην ἐγκομβώσασθε, ὅτι Ὁ θεὸς ὑπερηφάνοις ἀντιτάσσεται ταπεινοῖς δὲ δίδωσιν χάριν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/005.yaml
  text: 'Likewise, you younger men, submit yourselves to the elders. And all of you, clothe yourselves with humility toward one another, because God opposes the proud, but gives grace to the humble.'
translation:
  language: ko
  text: '젊은 사람들 여러분도 마찬가지로 장로들에게 복종하십시오. 또 여러분 모두는 서로에게 겸손을 두르십시오. 「하나님은 교만한 자들을 대적하시되, 겸손한 자들에게는 은혜를 베푸시기 때문입니다.」[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 잠언 3:34 (LXX) 인용. 야고보서 4:6에도 동일하게 인용됨.
    reason: ot_citation
lexical_decisions:
- source_word: νεώτεροι
  english_pob_choice: younger men
  chosen_korean: 젊은 사람들
  alternatives_korean:
  - 청년들
  - 더 어린 사람들
  lexicon: BDAG
  rationale: νεώτεροι는 「더 젊은」 비교급. 「젊은 사람들」로 평이하게.
- source_word: ὑποτάγητε
  english_pob_choice: submit yourselves
  chosen_korean: 복종하십시오
  alternatives_korean:
  - 순복하십시오
  lexicon: BDAG
  rationale: 2:13·3:1과 어휘 일관성.
- source_word: τὴν ταπεινοφροσύνην ἐγκομβώσασθε
  english_pob_choice: clothe yourselves with humility
  chosen_korean: 겸손을 두르십시오
  alternatives_korean:
  - 겸손으로 자기 자신을 띠라
  - 겸손을 옷처럼 입으십시오
  lexicon: BDAG
  rationale: ἐγκομβόομαι는 「(노예의) 작업 앞치마를 두름」 어감. 「두르다」로 옮긴다. 3:8의 ταπεινόφρονες와 어근 동일.
- source_word: Ὁ θεὸς ὑπερηφάνοις ἀντιτάσσεται ταπεινοῖς δὲ δίδωσιν χάριν
  english_pob_choice: God opposes the proud, but gives grace to the humble
  chosen_korean: 하나님은 교만한 자들을 대적하시되, 겸손한 자들에게는 은혜를 베푸시기
  alternatives_korean:
  - 하나님은 교만한 자를 물리치시고 겸손한 자에게 은혜를 주십니다
  lexicon: BDAG
  rationale: LXX 잠 3:34 인용. 한국 성서 전통의 「교만한 자를 대적하시고 겸손한 자에게 은혜를 주신다」 표현 유지.
