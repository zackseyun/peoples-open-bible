- from: Y Yahvé engrandeció a Salomón sobremanera a la vista de todo Israel, y le dio majestad real[a], como no la había tenido ningún rey antes de él sobre Israel.
  to: Y Yahvé engrandeció a Salomón sobremanera ante los ojos de todo Israel, y le dio majestad real[a], como no había estado sobre ningún rey antes de él sobre Israel.
  rationale: Se ajusta la cláusula comparativa para reflejar más de cerca la construcción hebrea ‘no había estado sobre ningún rey’, se mejora el modismo público de לְעֵינֵי con ‘ante los ojos de todo Israel’, y se afina la nota léxica para ofrecer alternativas más naturales en español sin perder el sentido fuente.
