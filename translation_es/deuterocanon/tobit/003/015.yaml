base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/003/015.yaml
  text: And I have not defiled my name[a], nor the name of my father, in the land of my captivity. I am my father’s only child, and he has no child who will inherit him, nor a near kinsman, nor does he have a son, that I should keep myself as a wife for him. Already seven have perished from me; why should I live? But if it does not seem good to you to put me to death, command that you look upon me and have mercy on me[c][b], and that I no longer hear reproach.
  footnotes:
  - marker: a
    text: Or 'a close kinsman'; the Greek literally says 'a near brother,' likely referring more broadly to a near male relative in the family line.
    reason: lexical_alternative
  - marker: b
    text: That is, seven husbands in the narrative context, though the Greek here says only 'seven.'
    reason: alternative_reading
  - marker: c
    text: The clause about 'a near brother' and 'a son' is textually and syntactically difficult in Greek; this translation stays close to the wording without claiming more certainty than the source allows.
    reason: textual_variant
