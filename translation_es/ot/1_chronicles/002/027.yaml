translation:
  language: es
  text: 'Los hijos de Ram: Jerameel, el primogénito[a], Maaz, Jamín y Eker.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Y los hijos de Ram fueron: Jerameel el primogénito, Maaz, Jamín y Eker».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: '[understood in the verbless-style list as introducing the genealogy]'
  chosen_spanish: se introduce la lista genealógica con dos puntos
  alternatives_spanish:
  - y fueron
  - y estaban
  lexicon: HALOT
  rationale: En español, una genealogía suena natural con una construcción introductoria seguida de lista. Los dos puntos conservan la función enumerativa del hebreo sin forzar un verbo auxiliar innecesario.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En este contexto genealógico, 'hijos de' mantiene la relación de filiación del hebreo y es idiomático en español bíblico y moderno. Se evita 'descendientes' porque suaviza el valor filial concreto.
- source_word: רָם
  english_pob_choice: Ram
  chosen_spanish: Ram
  alternatives_spanish:
  - Rám
  lexicon: onoma
  rationale: Nombre propio transliterado de forma estándar. Se conserva sin adaptación semántica.
- source_word: בְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el hijo primogénito
  lexicon: HALOT
  rationale: '''Primogénito'' es la forma natural y precisa en español para el valor de orden de nacimiento. En apposición al nombre, conserva la relación del hebreo sin añadir ''hijo'' que no aparece explícitamente.'
- source_word: יְרַחְמְאֵל
  english_pob_choice: Jerahmeel
  chosen_spanish: Jerameel
  alternatives_spanish:
  - Jerahmeel
  lexicon: onoma
  rationale: Se usa la transliteración española habitual 'Jerameel', más transparente para lectores hispanos que la forma inglesa. No se traduce el nombre.
- source_word: מַעַץ
  english_pob_choice: Maaz
  chosen_spanish: Maaz
  alternatives_spanish:
  - Maats
  lexicon: onoma
  rationale: Nombre propio conservado por transliteración convencional en español.
- source_word: יָמִין
  english_pob_choice: Jamin
  chosen_spanish: Jamín
  alternatives_spanish:
  - Jamin
  - Yamín
  lexicon: onoma
  rationale: Se adopta la forma española con acento prosódico natural 'Jamín' para lectura pública clara, manteniendo la identidad del nombre propio sin convertirlo en el sustantivo común 'derecha'.
- source_word: עֵקֶר
  english_pob_choice: Eker
  chosen_spanish: Eker
  alternatives_spanish:
  - Aker
  lexicon: onoma
  rationale: Nombre propio transliterado según la convención habitual en español bíblico.
theological_decisions:
- issue: Valor genealógico de la fórmula verbal hebrea
  english_pob_reading: The verb functions idiomatically to introduce a genealogical list.
  chosen_spanish_reading: La fórmula se vierte como introducción genealógica con dos puntos.
  alternative_spanish_readings:
  - Y fueron los hijos de Ram...
  - Y estaban los hijos de Ram...
  rationale: 'No hay contenido teológico disputado, pero sí una decisión de forma: el hebreo usa un verbo de existencia para abrir una lista. En español, una introducción nominal respeta mejor la función del texto y evita una redacción poco natural.'
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: el verbo hebreo funciona como introducción de lista genealógica y los nombres propios se transliteran. La revisión automática indicó que no había cambios necesarios; aquí se preserva esa lectura, adaptándola a una sintaxis española natural sin perder el paralelo hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'hijos de' como término genealógico estándar del proyecto.
  - Se conserva el orden de los nombres del texto hebreo.
  - La nota al pie marca la alternativa literal hebrea sin duplicar el sentido en el cuerpo principal.
  - '''Primogénito'' se usa en minúscula por funcionar como apelativo descriptivo, no como título independiente.'
