translation:
  language: es
  text: 'Pero Acaz dijo: «No pediré, ni pondré a prueba a Yahvé».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No pediré, y no pondré a prueba a Yahvé». El hebreo usa una conjunción simple; en español se expresa con naturalidad como «ni».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּ֖אמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración, y en este contexto la negativa de Ajaz responde a la invitación previa; en español, 'pero' comunica mejor el giro adversativo que 'y' o 'entonces'.
- source_word: אָחָ֑ז
  english_pob_choice: Ahaz
  chosen_spanish: Ajaz
  alternatives_spanish:
  - Acaz
  - Ahaz
  lexicon: Transliteración tradicional española
  rationale: Se mantiene el nombre propio con una forma castellana legible. 'Ajaz' conserva la pronunciación aproximada y evita una forma demasiado anglicada.
- source_word: לֹא אֶשְׁאַ֥ל
  english_pob_choice: I will not ask
  chosen_spanish: No pediré
  alternatives_spanish:
  - No preguntaré
  - No solicitaré
  lexicon: HALOT
  rationale: En este contexto, שׁאל expresa la petición de una señal, no una simple pregunta. 'Pediré' comunica mejor la acción de solicitar que 'preguntaré'.
- source_word: וְ/לֹֽא אֲנַסֶּ֖ה
  english_pob_choice: and I will not test
  chosen_spanish: y no pondré a prueba
  alternatives_spanish:
  - ni pondré a prueba
  - y no tentaré
  lexicon: HALOT
  rationale: נסה en piel significa 'probar, poner a prueba'. 'Pondré a prueba' es natural en español y conserva el sentido sin cargarlo con el matiz moral más fuerte de 'tentaré'.
- source_word: אֶת יְהוָֽה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se traduce directamente el nombre divino con la forma de proyecto 'Yahvé', manteniendo visible el Tetragrámaton y evitando la sustitución litúrgica por 'SEÑOR'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa el nombre propio del pacto, no un título. La forma 'Yahvé' preserva esa identidad y se ajusta al criterio del proyecto de traducir el Tetragrámaton de manera auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֲנַסֶּה respecto de Dios
  english_pob_reading: test
  chosen_spanish_reading: poner a prueba
  alternative_spanish_readings:
  - tentar
  - probar
  rationale: En este pasaje el verbo señala la acción de someter a Dios a una prueba. 'Poner a prueba' conserva el valor léxico sin sugerir necesariamente seducción al mal, que en español puede asociarse con 'tentar'.
  doctrine_reference: HALOT, נסה
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto fuente; el borrador sigue el pasaje hebreo directamente, con atención al audit trail inglés y a la convención del proyecto para YHWH.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en el texto principal conforme al criterio del proyecto para יְהוָה.
  - Se eligió una solución verbal idiomática ('pediré', 'poner a prueba') que conserva el sentido lexical y la relación sintáctica del hebreo.
  - Se evitó 'Cristo', 'SEÑOR' y 'tentar' por no corresponder al sentido aquí documentado.
