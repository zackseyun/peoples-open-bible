translation:
  language: es
  text: Los ojos de Yahvé están vueltos hacia los justos[a], y sus oídos hacia su clamor de auxilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su súplica de auxilio'. El término hebreo se refiere a un clamor que brota de la angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  english_pob_choice: The eyes of
  chosen_spanish: Los ojos de
  alternatives_spanish:
  - los ojos
  lexicon: HALOT
  rationale: Se conserva la imagen corporal plural del hebreo para mantener el paralelismo poético y la fuerza antropomórfica, sin reinterpretarla como simple 'vigila'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino en español, según el criterio del proyecto. 'Yahvé' preserva el nombre del pacto y evita la sustitución por un título.
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - sobre
  lexicon: HALOT
  rationale: La preposición expresa orientación direccional. 'Hacia' funciona naturalmente en español y conserva el sentido relacional de atención dirigida a alguien.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: HALOT
  rationale: '''צַדִּיקִים'' es un sustantivo/adjetivo plural con valor sustantivo. ''Los justos'' es la equivalencia más natural en español y mantiene el matiz moral-covenantal.'
- source_word: וְאָזְנָיו
  english_pob_choice: and his ears
  chosen_spanish: y sus oídos
  alternatives_spanish:
  - y su oído
  lexicon: HALOT
  rationale: Se conserva el plural antropomórfico del hebreo para paralelismo con 'ojos'. 'Oídos' es la forma más fiel y clara en español.
- source_word: שַׁוְעָתָם
  english_pob_choice: their cry for help
  chosen_spanish: su clamor por ayuda
  alternatives_spanish:
  - su grito de auxilio
  - su petición de ayuda
  - su clamor
  lexicon: HALOT
  rationale: El término denota un grito o clamor surgido de la angustia. 'Clamor por ayuda' comunica ese sentido sin reducirlo a un simple 'grito' ni volverlo demasiado interpretativo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión doctrinal del POB inglés usa el nombre propio divino en lugar de una sustitución. En español, 'Yahvé' es el equivalente editorial consistente con ese principio y con la transparencia del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje antropomórfico de percepción divina
  english_pob_reading: Preserve 'eyes' and 'ears' literally
  chosen_spanish_reading: Conservar 'ojos' y 'oídos' literalmente
  alternative_spanish_readings:
  - el SEÑOR vigila a los justos y escucha su clamor
  - Dios mira a los justos y oye su oración
  rationale: El hebreo usa imágenes concretas del cuerpo para expresar atención y respuesta divina. Mantenerlas en español respeta la poesía y evita una paráfrasis que borraría el paralelismo original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without paraphrase'
translation_notes:
  revision_awareness: 'El borrador sigue sin cambios respecto del estado de revisión más reciente: el contexto de auditoría indica alta concordancia y ninguna modificación pendiente.'
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente con la política del proyecto para יְהוָה.
  - '''Los justos'' y ''su clamor por ayuda'' conservan la relación direccional del hebreo sin suavizar la imagen poética.'
  - La nota textual/lexical ofrece una alternativa española legítima para שַׁוְעָתָם, reflejando la misma tensión semántica que preservó el inglés POB.
