translation:
  language: es
  text: 'Y he dicho[a]: «Yo los haré subir[b] de la aflicción de Egipto[c] a la tierra de los cananeos, los hititas, los amorreos, los perizitas, los heveos y los jebuseos, a una tierra que fluye[d] con leche y miel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y dije: “Yo los haré subir ...”». El verbo hebreo está formalmente en pasado; el texto principal lo vierte con relevancia presente en contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Yo los sacaré». El hebreo conserva la imagen de ascenso asociada con el éxodo.'
    reason: lexical_alternative
  - marker: c
    text: «Aflicción de Egipto» también puede entenderse como «opresión en Egipto» o «miseria de Egipto».
    reason: lexical_alternative
  - marker: d
    text: La expresión hebrea es un modismo de abundancia y fertilidad.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I have said
  chosen_spanish: Y he dicho
  alternatives_spanish:
  - Y dije
  - Y he dicho, “
  lexicon: HALOT
  rationale: El hebreo es formalmente pasado, pero en el contexto funciona como una declaración divina ya establecida y vigente. «He dicho» conserva esa relevancia presente mejor que un pretérito simple, sin ampliar el sentido.
- source_word: אַעֲלֶה
  english_pob_choice: I will bring you up
  chosen_spanish: Yo los sacaré
  alternatives_spanish:
  - Yo los llevaré arriba
  - Yo los haré subir
  lexicon: HALOT
  rationale: El hebreo usa el Hifil de עלה, literalmente «hacer subir / subir». En español, «sacaré» comunica con naturalidad la acción de liberación y salida implicada por el éxodo, aunque pierde la imagen vertical; se conserva en nota la lectura más literal del inglés POB.
- source_word: מֵעֳנִי מִצְרַיִם
  english_pob_choice: out of the affliction of Egypt
  chosen_spanish: de la aflicción de Egipto
  alternatives_spanish:
  - de la opresión de Egipto
  - de la miseria de Egipto
  lexicon: HALOT
  rationale: עֳנִי abarca aflicción, miseria u opresión. «Aflicción de Egipto» sigue de cerca la construcción hebrea y mantiene la amplitud semántica sin forzar una sola interpretación.
- source_word: אֶל אֶרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - a la región
  lexicon: HALOT
  rationale: «A la tierra» es la equivalencia natural de אֶל אֶרֶץ en este contexto de destino prometido.
- source_word: הַכְּנַעֲנִי ... הַיְבוּסִי
  english_pob_choice: the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites
  chosen_spanish: los cananeos, los hititas, los amorreos, los perizitas, los heveos y los jebuseos
  alternatives_spanish:
  - el cananeo ... el jebuseo
  lexicon: HALOT
  rationale: Aunque el hebreo usa formas singulares, el español bíblico actual entiende mejor los etnónimos en plural cuando se habla de pueblos. Se preserva así la referencia colectiva a los habitantes de la tierra.
- source_word: אֶל אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: to a land flowing with milk and honey
  chosen_spanish: a una tierra que fluye leche y miel
  alternatives_spanish:
  - a una tierra que mana leche y miel
  - a una tierra fluida de leche y miel
  lexicon: HALOT
  rationale: La imagen idiomática de abundancia se conserva. «Que fluye leche y miel» mantiene el simbolismo del hebreo y es suficientemente transparente en español; «mana» sería también posible, pero «fluye» sigue más de cerca la formulación del inglés auditado.
theological_decisions:
- issue: Valor discursivo del verbo en pasado en boca de Yahvé
  english_pob_reading: And I have said, 'I will bring you up ...'
  chosen_spanish_reading: 'Y he dicho: «Yo los sacaré...»'
  alternative_spanish_readings:
  - 'Y dije: «Yo los sacaré...»'
  rationale: Se conserva la tensión entre la forma verbal pasada y su función de promesa vigente. «He dicho» suena a declaración ya establecida y no borra el matiz de resolución divina presente en el contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imagen del éxodo como ascenso
  english_pob_reading: I will bring you up
  chosen_spanish_reading: Yo los sacaré
  alternative_spanish_readings:
  - Yo los haré subir
  - Yo los subiré
  rationale: El hebreo enfatiza el ‘subir’, pero en español la expresión natural para la liberación de Egipto es «sacar». Se elige una forma idiomática que comunica la acción redentora sin negar la metáfora; la nota lexical registra la diferencia.
  doctrine_reference: Éxodo 3:17; práctica traductológica del POB
translation_notes:
  revision_awareness: 'El texto se ajusta al audit trail inglés con alta concordancia: se conservó la relevancia presente de וָאֹמַר, se mantuvo la imagen de destino prometido y se tradujo el modismo final de abundancia sin perder su valor metafórico. No se detectaron revisiones pendientes en el expediente inglés.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparece el nombre divino explícito; aquí el versículo está en discurso divino sin el Tetragrámaton explícito.
  - Se prefirió «los cananeos / hititas / amorreos...» en plural por naturalidad y fidelidad colectiva al hebreo.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
  - La puntuación de comillas y la colocación de notas siguen el estilo bíblico moderno en español.
