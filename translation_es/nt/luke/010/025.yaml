translation:
  language: es
  text: 'Entonces, un experto en la ley[a] se levantó para ponerlo a prueba, diciendo: «Maestro, ¿qué debo hacer para heredar vida eterna?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un abogado». El término griego se refiere a un especialista en la ley judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí[a]
  alternatives_spanish:
  - Y mira
  - Y he aquí
  lexicon: BDAG
  rationale: Mantiene el marcador discursivo y el efecto de atención de ἰδού sin omitirlo. En español, «he aquí» conserva mejor la solemnidad y la vivacidad narrativa que una simple unión coordinante.
- source_word: νομικός τις
  english_pob_choice: a lawyer
  chosen_spanish: un experto en la ley
  alternatives_spanish:
  - un letrado
  - un especialista en la ley
  lexicon: BDAG
  rationale: νομικός aquí designa a un especialista en la ley de Moisés. «Experto en la ley» evita el posible anacronismo de «abogado» y comunica el sentido religioso-jurídico del contexto.
- source_word: ἀνέστη
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: La acción narrativa se expresa de forma natural en español con «se levantó», que transmite la idea de incorporarse para hablar.
- source_word: ἐκπειράζων αὐτὸν
  english_pob_choice: testing him
  chosen_spanish: probándolo
  alternatives_spanish:
  - poniéndolo a prueba
  - tentándolo
  lexicon: BDAG
  rationale: «Probar»/«poner a prueba» recoge el sentido de ἐκπειράζω con intención hostil o de examen. «Tentándolo» puede sugerir con demasiada fuerza la incitación al pecado, así que se evita.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - Profesor
  lexicon: BDAG
  rationale: «Maestro» reproduce bien el trato respetuoso y es idiomático en español bíblico contemporáneo. «Rabí» sería más marcado culturalmente y «Profesor» resulta demasiado moderno y escolar.
- source_word: τί ποιήσας
  english_pob_choice: what must I do
  chosen_spanish: ¿qué debo hacer?
  alternatives_spanish:
  - ¿qué haré?
  - ¿qué he de hacer?
  lexicon: BDAG
  rationale: La estructura griega exige una reexpresión idiomática en español. «¿Qué debo hacer?» comunica la pregunta sobre el requisito o medio para alcanzar el resultado sin volverla mecánica.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna futura
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia natural y fiel. Otras opciones serían más explicativas o más literales, pero menos transparentes para la lectura pública.
- source_word: κληρονομήσω
  english_pob_choice: inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir en herencia
  - obtener como herencia
  lexicon: BDAG
  rationale: Conserva la metáfora de la herencia presente en el griego y en la traducción auditada en inglés, sin rebajarla a un simple «obtener».
theological_decisions:
- issue: Sentido de νομικός en contexto judío del Segundo Templo
  english_pob_reading: Rendered as 'lawyer' meaning a specialist in the law of Moses, not a modern secular attorney.
  chosen_spanish_reading: «Experto en la ley» en el sentido de especialista en la ley de Moisés, no de abogado moderno.
  alternative_spanish_readings:
  - «abogado»
  - «letrado»
  rationale: La redacción evita un anacronismo jurídico moderno y conserva la referencia a la interpretación de la Torá. Esto respeta el trasfondo judío del personaje introducido.
  doctrine_reference: Contexto histórico-gramatical; evitar anacronismo.
- issue: Fuerza de τί ποιήσας ... κληρονομήσω
  english_pob_reading: Idiomatic English 'what must I do to inherit eternal life?'
  chosen_spanish_reading: «¿qué debo hacer para heredar vida eterna?»
  alternative_spanish_readings:
  - «¿qué haré para heredar vida eterna?»
  - «¿qué, habiendo hecho, heredaré vida eterna?»
  rationale: La formulación conserva la orientación práctica y orientada a obras de la pregunta sin resolver la tensión teológica. La pregunta sigue sonando como un requisito humano para obtener la vida eterna.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente: sin cambios sustantivos respecto del audit trail inglés; se mantiene la lectura de alta concordancia y la decisión de preservar el matiz de νομικός y la metáfora de la herencia.'
  spanish_consistency_notes:
  - Se usó «vida eterna» de manera consistente con la tradición bíblica y con el audit trail inglés.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no lo contiene.
  - La puntuación y las comillas siguen el uso español contemporáneo y separan claramente la cita directa.
  - El marcador [a] se colocó en el primer sintagma discursivo para anclar la alternativa léxica sobre νομικός.
