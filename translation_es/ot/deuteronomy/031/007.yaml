translation:
  language: es
  text: 'Entonces Moisés llamó a Josué y le dijo, a la vista de todo Israel[a]: «Sé fuerte y valiente, porque tú entrarás con este pueblo en la tierra que Yahvé juró a sus padres darles[b], y tú se la darás como herencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de todo Israel». El hebreo dice literalmente «a los ojos de todo Israel», subrayando el carácter público y visible de la exhortación.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «a sus padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa la acción de llamar a alguien para dirigirse a él. «Llamó» es natural en español y conserva la sencillez del texto sin añadir formalidad innecesaria.
- source_word: לִיהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se translitera según la forma bíblica usual en español, equivalente al ‘Joshua’ del texto inglés.
- source_word: לְעֵינֵי כָל יִשְׂרָאֵל
  english_pob_choice: in the sight of all Israel
  chosen_spanish: a la vista de todo Israel
  alternatives_spanish:
  - en presencia de todo Israel
  - delante de todo Israel
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a los ‘ojos’ de Israel. «A la vista de» preserva el carácter público y visible de la escena sin sonar forzado en español.
- source_word: חֲזַק וֶאֱמָץ
  english_pob_choice: Be strong and courageous
  chosen_spanish: Sé fuerte y valiente
  alternatives_spanish:
  - Sé fuerte y valiente de corazón
  - Sé fuerte y resuelto
  lexicon: HALOT
  rationale: La fórmula exhortativa pide fortaleza y ánimo resuelto para la tarea de liderazgo. «Fuerte y valiente» comunica bien esa pareja semántica en español bíblico actual.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exhortación; «porque» expresa claramente la relación causal.
- source_word: תָּבוֹא אֶת הָעָם הַזֶּה
  english_pob_choice: you will go with this people
  chosen_spanish: tú entrarás con este pueblo
  alternatives_spanish:
  - tú irás con este pueblo
  - tú llevarás a este pueblo
  lexicon: HALOT
  rationale: La construcción con בוא y אֶת puede indicar entrar con el pueblo más que causarlo a entrar. «Entrarás con este pueblo» conserva esa ambigüedad controlada y refleja la lectura preferida por el POB inglés.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En español bíblico, «tierra» reproduce el término covenantal habitual y mantiene la continuidad temática del territorio prometido.
- source_word: נִשְׁבַּע יְהוָה
  english_pob_choice: the LORD swore
  chosen_spanish: Yahvé juró
  alternatives_spanish:
  - Yahvé prometió con juramento
  - el SEÑOR juró
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino יְהוָה y el verbo de juramento. «Yahvé juró» es directo, preciso y conserva el nombre propio divino según la política del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: 'DOCTRINE.md contested term: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto de representar el Tetragrámaton con «Yahvé» en el texto principal, en lugar de sustituirlo por un título.
- source_word: לַאֲבֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus padres varones
  - a sus antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a sus padres», en español «padres» puede sugerir únicamente progenitores humanos inmediatos; en este contexto de promesa patriarcal, «padres» funciona naturalmente y preserva el vínculo con los patriarcas.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: darles
  alternatives_spanish:
  - dárselas
  - darlo a ellos
  lexicon: HALOT
  rationale: 'La construcción infinitiva expresa el contenido del juramento: dar la tierra a ellos. «Darles» es la forma más concisa y clara en español.'
- source_word: וְאַתָּה תַּנְחִילֶנָּה אוֹתָם
  english_pob_choice: and you will give it to them as an inheritance
  chosen_spanish: y tú se la darás en posesión
  alternatives_spanish:
  - y tú se la heredarás
  - y tú la repartirás entre ellos
  lexicon: HALOT
  rationale: El hifil de נחל expresa causar a heredar o asignar como herencia. «Dar en posesión» comunica la idea hereditaria de forma comprensible en español y evita una perífrasis demasiado técnica. El pronombre «se la» mantiene la referencia a la tierra.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El hebreo presenta el Nombre propio divino, no un título. En coherencia con la política del proyecto, se usa «Yahvé» en español para preservar la identidad del nombre revelado.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH'
- issue: Sentido de תָּבוֹא אֶת הָעָם הַזֶּה
  english_pob_reading: you will go with this people
  chosen_spanish_reading: tú entrarás con este pueblo
  alternative_spanish_readings:
  - tú llevarás a este pueblo
  - tú entrarás con este pueblo hacia la tierra
  rationale: La sintaxis permite entender que Josué entra con el pueblo, no solo que lo introduce. Se conserva esa lectura para respetar la tensión textual y no armonizarla prematuramente con el verbo siguiente sobre la herencia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Término de promesa patriarcal לַאֲבֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: Se mantiene el parentesco masculino explícito del hebreo. En este contexto, «padres» conserva el nexo con los patriarcas y la formulación pactal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron cambios sustanciales respecto de la lectura preferida por POB. La principal decisión interpretativa conserva la ambigüedad de תָּבוֹא אֶת הָעָם como «entrar con este pueblo», y se mantuvo el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo un registro consistente de Yahvé para יְהוָה.
  - «Tierra» se usa para הָאָרֶץ conforme al lenguaje pactal bíblico.
  - 'La pareja exhortativa חזק ואמץ se tradujo con una fórmula española natural y solemne: «Sé fuerte y valiente».'
  - La posesión/inheritance nuance de נחל se expresó como «dar en posesión» para evitar una expansión explicativa excesiva.
