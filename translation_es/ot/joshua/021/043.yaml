translation:
  language: es
  text: Así que Yahvé dio a Israel toda la tierra que había jurado dar a sus padres, y la tomaron en posesión y vivieron en ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino YHWH. En español, "Yahvé" conserva la referencia directa al nombre propio sin enmascararlo como título, y evita la convención litúrgica de "SEÑOR".
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: HALOT
  rationale: נתן aquí expresa un acto simple de dar. "Dio" reproduce de forma natural y fiel la acción de concesión divina sin añadir matices interpretativos.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la región
  lexicon: HALOT
  rationale: '"Tierra" comunica bien el campo semántico de אָרֶץ en el contexto del territorio prometido a Israel. "Toda" preserva el valor totalizador de כָּל.'
- source_word: אֲשֶׁר נִשְׁבַּע לָתֵת
  english_pob_choice: that he had sworn to give
  chosen_spanish: que había jurado dar
  alternatives_spanish:
  - que había prometido bajo juramento dar
  - que juró dar
  lexicon: HALOT
  rationale: El nifal de שׁבע implica jurar. "Había jurado dar" conserva la prioridad temporal del juramento previo y su fuerza vinculante, en español idiomático.
- source_word: לַאֲבוֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres patriarcas
  lexicon: HALOT
  rationale: Se mantiene el término familiar masculino explícito del hebreo. "Padres" evita neutralizar el texto y corresponde a los patriarcas referidos por el pasaje.
- source_word: וַיִּרָשׁוּהָ
  english_pob_choice: they took possession of it
  chosen_spanish: la tomaron en posesión
  alternatives_spanish:
  - la poseyeron
  - la heredaron
  lexicon: HALOT
  rationale: ירשׁ puede abarcar la idea de poseer/heredar en contextos de pacto. "La tomaron en posesión" conserva la adquisición concreta del territorio y a la vez deja visible la tensión con el matiz de herencia, sin reducirlo a una sola lectura abstracta.
- source_word: וַיֵּשְׁבוּ בָהּ
  english_pob_choice: lived in it
  chosen_spanish: y vivieron en ella
  alternatives_spanish:
  - y habitaron en ella
  - y moraron en ella
  lexicon: HALOT
  rationale: ישׁב con ב indica residir/habitar. "Vivieron en ella" sigue de cerca el sentido directo adoptado por el POB inglés revisado, y suena natural en español contemporáneo.
theological_decisions:
- issue: Alcance de la afirmación de cumplimiento de la promesa de la tierra
  english_pob_reading: The verse states straightforwardly that Yahweh gave Israel all the land he had sworn to give, and that Israel possessed and lived in it, without importing harmonizations that weaken the explicit 'all'.
  chosen_spanish_reading: El versículo afirma de manera directa que Yahvé dio a Israel toda la tierra que había jurado dar, y que Israel la tomó en posesión y vivió en ella, sin suavizar el "toda" explícito del texto.
  alternative_spanish_readings:
  - Introducir una lectura más limitada o parcial para armonizar con otros textos de conquista
  - Atenuar el totalizador de 'toda la tierra' con una paráfrasis menos enfática
  rationale: La frase hebrea usa כָּל y una secuencia narrativa cerrada de donación, posesión y residencia. La traducción debe mantener esa fuerza de cumplimiento sin resolver por adelantado tensiones canónicas más amplias.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción española sigue el último estado revisado del POB en inglés, en particular la preferencia por un verbo más directo para וַיֵּשְׁבוּ ('vivieron' en lugar de un equivalente más interpretativo como 'se establecieron'). También conserva el cierre resultativo introducido por 'Así que' para reflejar el waw consecutivo inicial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en coherencia con el proyecto.
  - '''Padres'' conserva el valor masculino explícito de לַאֲבוֹתָם.'
  - '''Tierra'' se usa para אָרֶץ en sentido territorial/covenantal, no como ''tierra'' elemental.'
  - No se introducen notas al pie porque el texto español no requiere una alternativa textual o lexical obligatoria más allá de las decisiones registradas en los campos de léxico y teología.
