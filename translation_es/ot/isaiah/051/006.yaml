review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: imperativos paralelos, contraste cielos/tierra, desaparición de la creación frente a la permanencia de la salvación divina. También conserva la nota sobre el verbo difícil נִמְלָחוּ. Sin embargo, se aparta del rastro auditado de la POB en un punto importante: traduce וְצִדְקָתִי como «mi justicia» en el texto principal, cuando la decisión inglesa documentada prefiere «my righteousness» y reserva «my justice» para nota alternativa. Además, «la tierra debajo» suena incompleto en español; el sentido de מִתַּחַת se expresa mejor como «la tierra abajo» o «la tierra que está abajo».'
  spanish_quality_summary: El español es en general claro y digno, pero tiene detalles mejorables de naturalidad y precisión. «La tierra debajo» es poco idiomático sin complemento expreso. «Como un vestido» es entendible, pero «como una prenda» o «como un vestido» ambos son posibles; no es error grave. «No será quebrantada» es fiel, aunque «no será hecha pedazos» sería menos tradicional; la forma actual es aceptable en registro bíblico. La corrección principal es restaurar «mi rectitud» o mejor «mi justicia/rectitud» según la auditoría; dado el proyecto y la POB inglesa, «mi rectitud» en el texto con nota «mi justicia» preserva mejor la decisión fuente.
  glossary_alignment: 'Alineación parcial. No hay términos divinos conflictivos en este versículo. La decisión sobre צִדְקָה no sigue la preferencia documentada: el proyecto pide preservar la racionalidad lexical auditada, y aquí la POB inglesa escogió «righteousness» con «justice» en nota. En español, «rectitud» refleja mejor esa preferencia en el cuerpo del texto, con «justicia» en nota. El resto de las decisiones léxicas concuerdan razonablemente con la evidencia fuente y el estilo del proyecto.'
  issues:
  - severity: high
    issue: צִדְקָתִי se tradujo «mi justicia» en el texto principal
    rationale: La auditoría inglesa eligió «my righteousness» como lectura principal por su amplitud teológica y reservó «my justice» para nota alternativa. El español debe reflejar esa decisión documentada, no invertirla.
  - severity: medium
    issue: «la tierra debajo» es poco natural en español
    rationale: מִתַּחַת marca la oposición espacial con los cielos; en español neutro suena más natural «la tierra abajo» o «la tierra que está abajo».
  - severity: low
    issue: La nota b duplica el texto principal actual
    rationale: 'Si el cuerpo del texto dice «mi justicia», la nota «O: mi justicia» deja de funcionar como alternativa. Debe ajustarse junto con la corrección del texto principal.'
