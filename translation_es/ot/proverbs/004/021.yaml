  to: No dejes que se aparten de tus ojos[a]; guárdalos dentro de tu corazón[b].
  rationale: 'La revisión hace dos mejoras menores sin cambiar el sentido: (1) explicita en español el matiz exhortativo dirigido al oyente con «No dejes que se aparten», que suena más natural y refleja mejor el valor de la prohibición en contexto; (2) sustituye «en medio de tu corazón» por «dentro de tu corazón» para expresar la interioridad de בְּתוֹךְ de forma más idiomática. Se conservan la imagen literal «de tus ojos» y la nota sobre «corazón» conforme al rastro de auditoría del POB inglés.'
