translation:
  language: es
  text: Cuando se puso vestiduras de honor y se vistió de vestiduras de esplendor, cuando subió al altar de gloria[a], adornó el atrio del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «al subir él al altar santo, glorificó la vestidura/el atrio del santuario». El hebreo lee «el altar de gloria» y «el atrio del santuario».'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲטוֹתוֹ
  english_pob_choice: when he put on
  chosen_spanish: Cuando se puso
  alternatives_spanish:
  - Cuando se vistió
  - Cuando se colocó
  lexicon: HALOT
  rationale: La forma hebrea introduce la acción de vestirse. En español, «se puso» es natural y conserva el inicio escénico sin endurecer la sintaxis.
- source_word: בִּגְדֵי כָבוֹד
  english_pob_choice: garments of honor
  chosen_spanish: vestiduras de honor
  alternatives_spanish:
  - vestiduras gloriosas
  - vestiduras honrosas
  lexicon: HALOT
  rationale: «כָבוֹד» combina honor y gloria; «de honor» mantiene ese campo semántico y funciona bien en un contexto sacerdotal.
- source_word: וְהִתְלַבְּשׁוֹ
  english_pob_choice: and clothed himself
  chosen_spanish: y se vistió
  alternatives_spanish:
  - y se revistió
  - y se puso
  lexicon: HALOT
  rationale: El reflexivo hebreo se refleja con claridad en «se vistió», que suena natural en español y conserva la acción deliberada.
- source_word: בִּגְדֵי תִפְאָרֶת
  english_pob_choice: garments of splendor
  chosen_spanish: vestiduras de esplendor
  alternatives_spanish:
  - vestiduras de belleza
  - vestiduras gloriosas
  lexicon: HALOT
  rationale: «תִפְאָרֶת» puede significar esplendor, belleza o adorno; «esplendor» evita repetir «gloria» y preserva la dignidad del paralelismo.
- source_word: בַּעֲלוֹתוֹ
  english_pob_choice: when he went up
  chosen_spanish: cuando subió
  alternatives_spanish:
  - cuando ascendió
  - cuando fue arriba
  lexicon: HALOT
  rationale: «Subió» es la forma más idiomática en español para el movimiento hacia un lugar elevado o sagrado, sin perder el sentido literal.
- source_word: מִזְבַּח הוֹד
  english_pob_choice: the altar of glory
  chosen_spanish: el altar de gloria
  alternatives_spanish:
  - el altar glorioso
  - el altar de majestad
  lexicon: HALOT
  rationale: El hebreo pide un sintagma de cualidad («de gloria»). Se conserva esa relación nominal de forma directa y acorde con el audit trail revisado.
- source_word: וַיֶּהְדַּר
  english_pob_choice: he adorned
  chosen_spanish: adornó
  alternatives_spanish:
  - embelleció
  - engalanó
  - glorificó
  lexicon: HALOT
  rationale: La raíz הדר expresa adornar/embellecer/magnificar; «adornó» reproduce mejor el matiz causativo y sigue de cerca la revisión inglesa más reciente.
- source_word: עֲזֶרֶת מִקְדָּשׁ
  english_pob_choice: the court of the sanctuary
  chosen_spanish: el atrio del santuario
  alternatives_spanish:
  - el patio del santuario
  - el atrio sagrado
  lexicon: HALOT
  rationale: «עֲזֶרֶת» designa un espacio cercado del recinto sagrado. «Atrio» es la opción tradicional y transparente en español para ese tipo de espacio cultual.
theological_decisions:
- issue: Base hebrea con control del paralelo griego en Sirácida
  english_pob_reading: Translate from the extant Hebrew while checking the Greek for coherence; retain the Hebrew's emphasis on the altar's splendor in the main text.
  chosen_spanish_reading: Traducir desde el hebreo conservado, verificando el griego como control de coherencia, y mantener en el texto principal el énfasis hebreo en el altar de gloria.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «el altar santo» y el «atrio/vestidura del santuario»'
  - mezclar ambas lecturas en el cuerpo principal
  rationale: El hebreo disponible es de alta confianza y determina la redacción principal. El griego confirma el marco litúrgico, pero difiere en detalles; por eso no debe desplazar al hebreo sin causa textual suficiente.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácida se traduce desde el hebreo cuando está conservado, usando el griego como testigo paralelo y no como sustituto automático.'
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando la nota [a] directamente en el texto principal. La redacción española sigue el hebreo conservado, mientras que la nota preserva la alternativa textual griega señalada en el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera; aquí no aparece el tetragrámaton.
  - Se mantuvo «altar de gloria» para respetar la lectura hebrea y el ajuste revisado del POB en inglés.
  - «Atrio» se eligió por claridad cultual y coherencia con el término hebreo עֲזֶרֶת.
  - No se introdujo «Cristo», «SEÑOR» ni otras sustituciones no sustentadas por el expediente textual.
