lexical_decisions:
- source_word: הָעֲשִׂירִי
  english_pob_choice: the tenth
  chosen_spanish: el décimo
  alternatives_spanish:
  - el décimo lote
  - la décima división
  lexicon: HALOT
  rationale: El hebreo presenta un ordinal con artículo en una serie de asignaciones. En español, 'el décimo' conserva la misma brevedad y deja que el contexto del reparto se entienda por la lista misma, como en la versión inglesa auditada.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Shimei
  alternatives_spanish:
  - Simei
  lexicon: HALOT
  rationale: Es un nombre propio hebreo; se conserva la transliteración de la forma adoptada por la POB en inglés para mantener trazabilidad y reconocimiento textual.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus niños
  lexicon: HALOT
  rationale: בנים con sufijo masculino singular en este registro genealógico/listado puede traducirse naturalmente por 'hijos' en español, sin perder el valor masculino del conjunto ni sonar artificial. 'Hijos varones' sería más explícito, pero no es necesario aquí.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: Se mantiene la relación fraterna directa del hebreo. En este contexto de turnos o repartos familiares, 'hermanos' es transparente y no añade una interpretación más amplia que el texto no obliga a poner en la línea principal.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: Número cardinal estándar. En la frase final funciona como total asociado al grupo mencionado, y en español basta con 'doce' para preservar la fórmula concisa del original.
translation_notes:
  revision_awareness: La versión inglesa POB no requirió cambios en su última revisión y mantiene alta concordancia con el texto hebreo; esta propuesta conserva esa lectura breve y formula en español una equivalencia natural sin ampliar indebidamente el enunciado.
  spanish_consistency_notes:
  - Se mantiene 'Shimei' como nombre propio para consistencia con la POB inglesa y con el paquete fuente.
  - Se usa 'hijos' y 'hermanos' de forma literal y sobria, evitando sustituirlos por términos más interpretativos como 'parientes' sin apoyo textual directo.
  - El ordinal 'décimo' se deja en forma breve en el cuerpo, con nota para la implicación contextual del sorteo o asignación.
