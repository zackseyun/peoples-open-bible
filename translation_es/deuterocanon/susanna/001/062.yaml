translation:
  language: es
  text: a su prójimo[a], para hacer conforme a la ley de Moisés; y les dieron muerte. Y se evitó derramar sangre inocente ese día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más idiomática según el flujo de la oración, «para hacer contra su prójimo conforme a la ley de Moisés». El griego aquí está ligado sintácticamente al versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ πλησίον
  english_pob_choice: to the neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - al prójimo
  - contra su prójimo
  - a su vecino
  lexicon: LSJ
  rationale: El dativo griego, en continuidad sintáctica con el versículo anterior, conserva una referencia relacional compacta. En español, «a su prójimo» mantiene esa brevedad y el matiz de dirección implícita sin forzar una paráfrasis excesiva; «prójimo» es el equivalente bíblico más natural para el sentido de fellow person.
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: para obrar
  alternatives_spanish:
  - para hacer
  - para actuar
  - para llevar a cabo
  lexicon: LSJ
  rationale: Aunque el inglés POB mantiene «to do», en español «obrar» comunica mejor una acción deliberada en un contexto jurídico y narrativo. «Para obrar» conserva la relación con la frase legal siguiente sin sonar mecánico.
- source_word: κατὰ τὸν νόμον Μωϋσῆ
  english_pob_choice: according to the law of Moses
  chosen_spanish: conforme a la ley de Moisés
  alternatives_spanish:
  - según la ley de Moisés
  - de acuerdo con la ley de Moisés
  lexicon: LSJ
  rationale: «Conforme a» reproduce bien la fórmula normativa griega κατὰ con un registro jurídico claro y natural en español. «Ley de Moisés» conserva el referente mosaico sin cambiar el tenor legal.
- source_word: ἀπέκτειναν
  english_pob_choice: they put them to death
  chosen_spanish: los mataron
  alternatives_spanish:
  - los dieron muerte
  - los ejecutaron
  - los hicieron morir
  lexicon: LSJ
  rationale: El verbo griego permite tanto «matar» como «dar muerte». Opto por «los mataron» porque es directo, fiel y suficientemente grave; no añado una tecnicidad penal que el griego por sí solo no exige.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los dos
  lexicon: LSJ
  rationale: El objeto directo en español queda claro con «los», que remite naturalmente a los dos ancianos del contexto inmediato.
- source_word: ἐσώθη
  english_pob_choice: was spared
  chosen_spanish: fue preservada
  alternatives_spanish:
  - fue librada
  - fue salvada
  - quedó a salvo
  lexicon: LSJ
  rationale: Para αἷμα, el inglés POB eligió una solución idiomática («was spared») para expresar la evitación de derramamiento injusto. En español, «fue preservada» comunica con dignidad que esa sangre no fue derramada; «salvada» podría sonar demasiado personal aplicado a «sangre».
- source_word: αἷμα ἀναίτιον
  english_pob_choice: innocent blood
  chosen_spanish: la sangre inocente
  alternatives_spanish:
  - sangre inocente
  - sangre sin culpa
  - sangre sin culpa derramada
  lexicon: LSJ
  rationale: «Sangre inocente» es la equivalencia bíblica estable de αἷμα ἀναίτιον y conserva el peso teológico de la sangre injustamente derramada o evitada.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: LSJ
  rationale: «Aquel día» reproduce bien el demostrativo enfático del griego y su valor narrativo retrospectivo. «En aquel día» es más solemne y acorde con el registro bíblico.
theological_decisions:
- issue: Matiz jurídico de ἀπέκτειναν en un juicio bajo la ley de Moisés
  english_pob_reading: they put them to death
  chosen_spanish_reading: los mataron
  alternative_spanish_readings:
  - los ejecutaron
  - los dieron muerte
  rationale: El contexto legal es claro, pero el griego no obliga a introducir una terminología penal más técnica que la narración misma. «Los mataron» conserva la seriedad judicial sin sobreinterpretar el procedimiento.
  doctrine_reference: Translation philosophy §1, §6
- issue: Expresión idiomática de αἷμα ἀναίτιον
  english_pob_reading: innocent blood was spared
  chosen_spanish_reading: la sangre inocente fue preservada
  alternative_spanish_readings:
  - la sangre inocente fue salvada
  - la sangre inocente quedó a salvo
  rationale: La idea no es que la sangre fuera rescatada como sujeto personal, sino que se evitó su derramamiento injusto. «Fue preservada» conserva esa tensión bíblica en español sin perder claridad.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
