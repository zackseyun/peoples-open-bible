id: 1ES.3.29
reference: 1 Esdras 3:29
source:
  edition: lxx-swete-1909
  text: καὶ ὅσοι οὐ στρατεύονται οὐδὲ πολεμοῦσιν ἀλλὰ γεωργοῦσιν τὴν γῆν, πάλιν ὅταν σπείρωσιν, θερίσαντες ἀναφέρουσιν τῷ βασιλεῖ· καὶ ἕτερος τὸν ἕτερον ἀναγκάζοντες ἀναφέρουσι τοὺς φόρους τῷ βασιλεῖ.
  language: Greek
