translation:
  language: es
  text: 'Y él les dijo[a]: «Así dice Yahvé, el Dios de Israel, a quien ustedes me enviaron para presentar su súplica delante de él:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para presentar su súplica delante de él”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces él les dijo
  - Y dijo a ellos
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa del wayyiqtol con una fórmula natural en español; ‘les dijo’ hace explícito el destinatario como en el hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: HALOT
  rationale: El dativo pronominal en español comunica de manera directa el destinatario del discurso sin sobrecargar la frase.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene solemne y natural en español. ‘Así dice’ preserva el valor mensajero del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB en español para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa y eclesialmente clara, manteniendo la identificación pactual de Yahvé como Dios de Israel.
- source_word: אֲשֶׁר
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: El relativo con sentido direccional se expresa en español con ‘a quien’, que integra la relación hacia la persona mencionada.
- source_word: שְׁלַחְתֶּם אֹתִי אֵלָיו
  english_pob_choice: you sent me to him
  chosen_spanish: ustedes me enviaron para presentar... delante de él
  alternatives_spanish:
  - ustedes me enviaron a él
  - ustedes me mandaron a él
  lexicon: HALOT
  rationale: Se mantiene el hecho de que fueron enviados a Dios y se preserva el complemento direccional. En español, la construcción final evita una repetición áspera y conserva el sentido del envío.
- source_word: לְהַפִּיל
  english_pob_choice: to present
  chosen_spanish: para presentar
  alternatives_spanish:
  - para llevar
  - para poner delante de
  lexicon: HALOT
  rationale: Sigue la revisión inglesa que entendió la expresión idiomática como ‘presentar’ una petición ante alguien, evitando una traducción literal de ‘hacer caer’ que oscurecería el sentido.
- source_word: תְּחִנַּתְכֶם
  english_pob_choice: your plea
  chosen_spanish: su súplica
  alternatives_spanish:
  - su ruego
  - su petición
  lexicon: HALOT
  rationale: ‘Súplica’ conserva el matiz de petición ferviente y humilde, adecuado para la fuerza semántica del sustantivo hebreo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: ‘Delante de él’ reproduce con fidelidad la imagen espacial del hebreo y funciona de modo natural en registro bíblico moderno.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre personal del pacto divino en vez de sustituirlo por un título como ‘Señor’. Esta decisión coincide con la convención doctrinal del proyecto y evita ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic expression לְהַפִּיל תְּחִנָּה לִפְנֵי
  english_pob_reading: to present your plea before him
  chosen_spanish_reading: para presentar su súplica delante de él
  alternative_spanish_readings:
  - para presentar su ruego delante de él
  - para poner su súplica delante de él
  rationale: La frase hebrea no comunica un acto físico de ‘hacer caer’ sino la acción de presentar una petición. ‘Súplica’ y ‘delante de él’ conservan el tono reverente y la fuerza de la escena.
  doctrine_reference: Jeremiah 42:9 lexical idiom
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió ‘lay your plea’ a ‘present your plea’ para reflejar mejor el hebreo idiomático. La versión española sigue esa decisión y evita una traducción demasiado literal del verbo לְהַפִּיל.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma española del nombre divino para coherencia con la terminología POB.
  - Se usó ‘súplica’ para conservar el tono reverente del hebreo y del inglés auditado.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación.
