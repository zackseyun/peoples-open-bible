    text: 'Hebreo literalmente: «mi esperanza de Yahvé», una expresión elíptica que puede significar esperanza que viene de Yahvé o esperanza puesta en Yahvé.'
    reason: lexical_alternative
  revision_rationale: Se corrige el principal desajuste con la fuente al restaurar la preposición «de» en lugar de «en», preservando la elipsis hebrea documentada por el POB inglés. Se reubican y rehacen las notas para que sus marcadores correspondan exactamente a los términos explicados. También se fortalece אָבַד con «ha perecido» y se añade la alternativa léxica de נִצְחִי. «Mi aguante» comunica bien la idea de capacidad de continuar en español natural; si se prefiriera un registro algo más formal, «mi resistencia» también sería viable, pero la revisión propuesta suena menos técnica y más lamentativa.
