revisions:
- from: Y estuvo allí por muchos días[a], porque una gran tristeza se había renovado sobre él, y pensó que estaba muriendo.
  to: Y estuvo allí por muchos días[a], porque una gran tristeza vino sobre él, y pensó que estaba muriendo.
  rationale: Se reemplaza «se había renovado sobre él» por «vino sobre él» para reflejar mejor el aoristo griego y lograr un español más natural en el texto principal, mientras se conserva en nota la alternativa léxica que expresa renovación o reactivación del dolor.
