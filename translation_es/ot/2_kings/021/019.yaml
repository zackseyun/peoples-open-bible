translation:
  language: es
  text: Amón tenía veintidós años cuando comenzó a reinar, y reinó dos años en Jerusalén. El nombre de su madre era Meshulémet, hija de Haruz, procedente de Jotbá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: was twenty-two years old
  chosen_spanish: tenía veintidós años
  alternatives_spanish:
  - era de veintidós años
  - era hijo de veintidós años
  lexicon: HALOT
  rationale: La fórmula hebrea de edad se expresa de manera natural en español con 'tener X años'. Mantiene el sentido idiomático sin calco innecesario ni pérdida de información.
- source_word: בְּמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - al comenzar a reinar
  - en su reinar
  lexicon: HALOT
  rationale: El prefijo temporal y el infinitivo constructo señalan el momento de su acceso al trono. 'Cuando comenzó a reinar' comunica bien esa función temporal en español.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: El verbo indica el ejercicio efectivo del reinado, no solo la posesión del título. 'Reinó' conserva esa fuerza verbal.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa pide una equivalencia directa y natural en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Conserva el giro genealógico del hebreo con sintaxis española natural. No introduce matices ajenos al texto.
- source_word: מְשֻׁלֶּמֶת
  english_pob_choice: Meshullemeth
  chosen_spanish: Mesulémet
  alternatives_spanish:
  - Meshullemeth
  - Mesulemét
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio al español de forma legible y consistente, conservando su identidad onomástica.
- source_word: בַּת חָרוּץ
  english_pob_choice: daughter of Haruz
  chosen_spanish: hija de Haruz
  alternatives_spanish:
  - descendiente de Haruz
  lexicon: HALOT
  rationale: La relación genealógica se mantiene con 'hija de', equivalente directo del patronímico hebreo.
- source_word: מִן יָטְבָה
  english_pob_choice: from Jotbah
  chosen_spanish: de Jotbá
  alternatives_spanish:
  - procedente de Jotbá
  - originaria de Jotbá
  lexicon: HALOT
  rationale: La preposición מִן indica origen; en español, 'de' preserva ese valor de procedencia de manera sobria y natural. Se conserva el topónimo con acento españolizado.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alto acuerdo; no se registran revisiones sustantivas ni variantes textuales relevantes para esta cláusula genealógica y cronológica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo o el contexto lo requieren; este versículo no contiene el nombre divino.
  - Se mantiene 'reinó' para מָלַךְ por su valor verbal de ejercicio del reinado.
  - Los nombres propios se transliteran con forma española legible, sin añadir identificación histórica extra.
  - '''Jotbá'' refleja la adaptación ortográfica española del topónimo inglés ''Jotbah'' para fluidez y consistencia de lectura.'
