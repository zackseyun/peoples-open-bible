base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/009/009.yaml
  text: Enjoy life with the wife whom you love all the days of your fleeting life that he has given you under the sun—all your fleeting days—for that is your portion in life and in your labor at which you toil under the sun[a][b][c].
  footnotes:
  - marker: a
    text: Or 'See life with the wife whom you love.' The Hebrew idiom 'see life' can mean to experience or enjoy life.
    reason: lexical_alternative
  - marker: b
    text: Hebrew hebel, often rendered 'vanity' or 'vapor'; here it conveys the fleeting, insubstantial character of life.
    reason: lexical_alternative
  - marker: c
    text: The subject of 'has given' is implicit in Hebrew; the wider context suggests God, though he is not named in this clause.
    reason: alternative_reading
