translation:
  language: es
  text: 'No está en el cielo[a], para que digas: «¿Quién subirá al cielo por nosotros, y la tomará por nosotros, y nos la hará oír, para que la pongamos por obra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién ascenderá por nosotros al cielo, y la tomará por nosotros, y nos hará oírla, para que la pongamos por obra?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo celestial
  lexicon: HALOT
  rationale: El hebreo plural designa la esfera celestial inaccesible en contraste con lo cercano y alcanzable. En español, «el cielo» comunica de forma natural esa esfera; «los cielos» sería posible, pero aquí puede sonar más marcado litúrgicamente y menos directo.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - se encuentra
  lexicon: HALOT
  rationale: El pronombre femenino singular retoma el mandato/la palabra mencionada en el contexto. En español, «está» permite una formulación natural sin forzar el género del antecedente ni volverla demasiado abstracta.
- source_word: לֵאמֹר
  english_pob_choice: that you should say
  chosen_spanish: para que digas
  alternatives_spanish:
  - diciendo
  - como para decir
  lexicon: HALOT
  rationale: La función discursiva aquí introduce una objeción hipotética. «Para que digas» conserva la finalidad/resultado implícito de la construcción y suena natural en español.
- source_word: מִי יַעֲלֶה לָּנוּ
  english_pob_choice: Who will go up for us
  chosen_spanish: ¿Quién subirá al cielo por nosotros?
  alternatives_spanish:
  - ¿Quién ascenderá al cielo por nosotros?
  - ¿Quién irá al cielo por nosotros?
  lexicon: HALOT
  rationale: עלה conserva su fuerza de ascenso; «subirá» es el equivalente más natural y fiel. El dativo benefactivo לָנוּ se expresa con «por nosotros», que en español comunica mejor la idea de hacerlo en nuestro favor que «para nosotros» en este contexto.
- source_word: הַשָּׁמַיְמָה
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - hacia el cielo
  - hasta el cielo
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el cielo. «Al cielo» preserva la dirección de manera breve y fluida.
- source_word: וְיִקָּחֶהָ לָּנוּ
  english_pob_choice: and get it for us
  chosen_spanish: y la tomará por nosotros
  alternatives_spanish:
  - y la traerá por nosotros
  - y la obtendrá para nosotros
  lexicon: HALOT
  rationale: לקח aquí puede implicar tomar/traer/obtener. «La tomará por nosotros» conserva la literalidad del verbo y mantiene la serie verbal del versículo sin añadir una interpretación más específica que el hebreo no obliga.
- source_word: וְיַשְׁמִעֵנוּ אֹתָהּ
  english_pob_choice: and make us hear it
  chosen_spanish: y nos la hará oír
  alternatives_spanish:
  - y nos la hará escuchar
  - y nos la hará oír a nosotros
  lexicon: HALOT
  rationale: El Hiphil de שמע es causativo. «Nos la hará oír» conserva ese valor causativo con un español natural; «escuchar» podría sonar más activo, pero «oír» refleja mejor la idea de causar percepción auditiva.
- source_word: וְנַעֲשֶׂנָּה
  english_pob_choice: so that we may do it
  chosen_spanish: para que la pongamos por obra
  alternatives_spanish:
  - para que la hagamos
  - para que la obedezcamos
  lexicon: HALOT
  rationale: עָשָׂה en este contexto implica hacer/poner en práctica el mandamiento. «Poner por obra» es una expresión española estable para cumplir algo, sin desviar el sentido hacia una paráfrasis excesiva.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión final del inglés auditado: ''go up to heaven for us'' se refleja como ''subirá al cielo por nosotros'', evitando el orden menos natural de una traducción demasiado literal. También se conserva la secuencia verbal del hebreo con un español fluido y no se atenúa la fuerza causativa de שמע.'
  spanish_consistency_notes:
  - Se mantuvo «cielo» en singular para reflejar el contraste idiomático con la esfera celestial, aunque el hebreo use forma plural.
  - Se preservó la serie de acciones del hebreo (subir, tomar, hacer oír, hacer) sin compactarlas en una sola paráfrasis.
  - «Por nosotros» se eligió para el beneficio personal/comunitario de לָנוּ, siguiendo el valor auditado en el inglés 'for us'.
