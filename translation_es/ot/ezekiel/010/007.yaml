base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/010/007.yaml
  text: Then the cherub stretched out his hand from among the cherubim to the fire that was among the cherubim[a], and he lifted it up and put it into the palms of the one clothed in linen[b], who took it and went out.
  footnotes:
  - marker: a
    text: Or, more formally, 'from between the cherubim' ... 'the fire that was between the cherubim.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the palms of the one clothed in linen'; in context this is the same figure earlier called 'the man clothed in linen' (10:2, 10:6).
    reason: cross_reference
