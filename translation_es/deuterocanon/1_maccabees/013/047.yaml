review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del griego: Simón llegó a un acuerdo con ellos, no luchó contra ellos, los sacó de la ciudad, limpió/cultualmente purificó las casas donde estaban los ídolos, y entró con celebración litúrgica. Sin embargo, hay un desajuste menor entre el texto principal y la nota b: el texto dice que los ídolos ''estaban'' allí, conforme al griego y al ajuste inglés final, pero la nota dice ''habían estado''. Conviene armonizarla con la evidencia fuente.'
  spanish_quality_summary: El español es claro, natural y digno. 'Llegó a un acuerdo con ellos' funciona bien para συνευδὼν, y 'con himnos y bendiciones' es legible y fiel al tono. 'Purificó' es defendible por la dimensión cultual, aunque 'limpió ritualmente' sería más explícito; no es necesario cambiarlo. La única reparación necesaria es la nota b para evitar inconsistencia.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ídolos', 'himnos' y 'bendiciones' están bien alineados con el expediente léxico. No aparecen términos de glosario sensible como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: La nota b contradice levemente el texto principal y la decisión inglesa revisada
    rationale: El griego ἦν ('estaban/eran') y la versión inglesa final usan presente pasado simple ('were'). La nota española dice 'habían estado', lo que introduce una distancia temporal no presente en la fuente y desarmoniza con 'estaban los ídolos' en el texto.
  revised_spanish_text: Y Simón llegó a un acuerdo con ellos y no peleó contra ellos[a]. Los expulsó de la ciudad y purificó las casas en las cuales estaban los ídolos[b]; y así entró en ella con himnos y bendiciones.
  revised_footnotes:
  - marker: a
    text: O «llegó a un arreglo con ellos». El participio griego puede sugerir una acomodación práctica más que un combate directo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, casas donde estaban imágenes idolátricas; la purificación probablemente fue tanto religiosa como material.
    reason: cultural_note
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota b para alinearla con el griego y con el texto principal: los ídolos estaban en esas casas, no meramente habían estado antes.'
