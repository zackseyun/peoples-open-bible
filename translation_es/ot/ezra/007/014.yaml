translation:
  language: es
  text: porque eres enviado desde la presencia del rey[a] y de sus siete consejeros para averiguar acerca de Judá y de Jerusalén, conforme a la ley de tu Dios que está en tu mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de parte del rey». El giro arameo de corte subraya que la comisión de Esdras procede de la presencia real.
    reason: lexical_alternative
  - marker: b
    text: O «que está en tu posesión» o «que te ha sido confiada». Literalmente, «que está en tu mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  - pues
  lexicon: HALOT
  rationale: El arameo introduce la razón del decreto. «Porque» expresa la causalidad de manera natural en español moderno sin perder el valor explicativo del giro idiomático.
- source_word: מִן קֳדָם מַלְכָּא
  english_pob_choice: from before the king
  chosen_spanish: de parte del rey
  alternatives_spanish:
  - de delante del rey
  - de la presencia del rey
  lexicon: HALOT
  rationale: La expresión de corte apunta al envío/encargo procedente de la presencia real. En español, «de parte del rey» comunica bien la comisión oficial y conserva el matiz de procedencia sin sonar forzado.
- source_word: וְשִׁבְעַת יָעֲטֹהִי
  english_pob_choice: and his seven counselors
  chosen_spanish: y de sus siete consejeros
  alternatives_spanish:
  - y de sus siete asesores
  lexicon: HALOT
  rationale: El término se refiere a consejeros de la corte. «Consejeros» es transparente en español y mantiene el marco político-administrativo.
- source_word: שְׁלִיחַ
  english_pob_choice: you are sent
  chosen_spanish: eres enviado
  alternatives_spanish:
  - eres comisionado
  - eres despachado
  lexicon: HALOT
  rationale: El participio pasivo describe el estatus oficial de Ezra. «Eres enviado» es claro y fiel; evita sobreinterpretar el matiz con un verbo más técnico que el hebreo/arameo no exige aquí.
- source_word: לְבַקָּרָא
  english_pob_choice: to inquire
  chosen_spanish: para investigar
  alternatives_spanish:
  - para inquirir
  - para examinar
  lexicon: HALOT
  rationale: El verbo puede abarcar indagación, examen o averiguación. «Investigar» transmite bien la acción oficial de examinar una situación, aunque con tono contemporáneo; se conserva el carácter judicial/administrativo del contexto.
- source_word: עַל יְהוּד וְלִירוּשְׁלֶם
  english_pob_choice: concerning Judah and Jerusalem
  chosen_spanish: acerca de Judá y de Jerusalén
  alternatives_spanish:
  - sobre Judá y Jerusalén
  - respecto de Judá y de Jerusalén
  lexicon: HALOT
  rationale: Con esta construcción, el sentido es la materia de la investigación. «Acerca de» es natural y preciso en español; se mantiene el paralelismo de los dos objetos con preposición repetida.
- source_word: בְּדָת אֱלָהָךְ
  english_pob_choice: according to the law of your God
  chosen_spanish: conforme a la ley de tu Dios
  alternatives_spanish:
  - según la ley de tu Dios
  - de acuerdo con la ley de tu Dios
  lexicon: HALOT
  rationale: La preposición indica norma o estándar. «Conforme a» expresa mejor ese carácter normativo en español bíblico actual sin recurrir a fórmulas demasiado rígidas.
- source_word: דִּי בִידָךְ
  english_pob_choice: that is in your hand
  chosen_spanish: que está en tu mano
  alternatives_spanish:
  - que está en tu poder
  - que te ha sido confiada
  lexicon: HALOT
  rationale: Se conserva la metáfora literal de la mano, que en arameo puede implicar posesión, custodia o autoridad. Mantenerla evita aplanar la expresión y respeta el texto base.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto arameo y el auditable inglés POB, manteniendo los dos lugares de tensión léxica principales: la fórmula de procedencia cortesana en מִן קֳדָם מַלְכָּא y la metáfora de «la mano» en דִּי בִידָךְ. No se aplicaron revisiones posteriores al pasaje en el expediente inglés, y el cotejo informado fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלָהָךְ, conforme al criterio del proyecto.
  - Se usa «ley» para דָת, por su valor normativo en contexto administrativo-bíblico.
  - Se mantiene la repetición de preposición en «Judá y de Jerusalén» para reflejar la estructura del original.
  - Se evita «SEÑOR» en favor de la forma personal «tu Dios», ya que el verso no contiene el nombre divino en esta posición.
