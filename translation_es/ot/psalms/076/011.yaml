  glossary_alignment: 'No hay conflicto con la terminología clave del proyecto. La elección de «alabará» y «te ceñirás» concuerda con las decisiones léxicas y teológicas auditadas. Falta alinear las notas con el audit trail inglés: debe incluirse la alternativa «restringir/refrenar» para la cláusula final difícil. La nota actual sobre «te dará gracias» no corresponde a una nota preservada por el inglés y no es la ambigüedad principal que requiere señalamiento aquí.'
