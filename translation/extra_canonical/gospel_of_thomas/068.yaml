    it," serving as the mandatory resumptive pronoun for the relative clause ⲉⲛⲧⲁⲩⲇⲓⲱⲕⲉ
    ⲙⲙⲱⲧⲛ ("which they persecuted you [in it]"). The translation "to enter into it"
    is a grammatical impossibility that distorts the text. | Azure: The proposed deletion
    should be applied because the rationale correctly identifies the Coptic construction:
    ϩⲣⲁⲓ ⲛϩⲏⲧϥ is an adverb + prepositional/pronominal phrase meaning essentially
    “in it,” not a'
