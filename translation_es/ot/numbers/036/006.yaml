translation:
  language: es
  text: 'Esta es la palabra que Yahvé ha mandado acerca de las hijas de Zelofehad, diciendo: «Que lleguen a ser esposas de quien les parezca bueno[a]; solo que lleguen a ser esposas dentro de la familia de la tribu de su padre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de quien les parezca mejor». El hebreo dice literalmente: «al bueno en sus ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dentro del clan de la tribu de su padre». El hebreo combina lenguaje de familia/clan y de tribu para subrayar que la herencia permanezca en la línea tribal paterna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the word
  chosen_spanish: Esta es la palabra
  alternatives_spanish:
  - Esta es la cosa
  - Esta es la declaración
  - Este es el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘asunto’ o ‘cosa’. Aquí introduce una disposición formal de Yahvé; ‘palabra’ conserva mejor el tono de decreto autoritativo y es natural en español.
- source_word: צִוָּה יְהוָה
  english_pob_choice: Yahweh has commanded
  chosen_spanish: Yahvé ha mandado
  alternatives_spanish:
  - Yahvé mandó
  - Yahvé ha ordenado
  - el Señor ha mandado
  lexicon: HALOT
  rationale: צוה expresa mandar/ordenar. Se usa ‘mandado’ para reflejar el perfecto con vigencia presente en el contexto legal. Se mantiene ‘Yahvé’ conforme al criterio del proyecto para יְהוָה.
- source_word: לִבְנוֹת צְלָפְחָד
  english_pob_choice: concerning the daughters of Zelophehad
  chosen_spanish: acerca de las hijas de Zelofehad
  alternatives_spanish:
  - concerniente a las hijas de Zelofehad
  - para las hijas de Zelofehad
  - a las hijas de Zelofehad
  lexicon: HALOT
  rationale: El ל aquí marca el ámbito u objeto de la disposición. ‘Acerca de’ reproduce bien esa relación sin sugerir que la orden es solo una mera alocución a ellas. Se usa la forma castellana habitual ‘Zelofehad’.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - de este modo
  lexicon: HALOT
  rationale: Es la introducción quotativa estándar; ‘diciendo’ mantiene la conexión formal con la cita siguiente sin añadir contenido.
- source_word: לַטּוֹב בְּעֵינֵיהֶם
  english_pob_choice: to whomever seems good in their eyes
  chosen_spanish: a quien les parezca bueno
  alternatives_spanish:
  - a quien les parezca mejor
  - a quien ellos consideren mejor
  - al que sea bueno a sus ojos
  lexicon: HALOT
  rationale: El modismo hebreo es literalmente ‘al bueno en sus ojos’. En español, ‘les parezca bueno’ conserva el valor idiomático de aprobación o conveniencia sin sonar forzado. Se evita añadir ‘casarse’ porque el verbo ya aparece en la cláusula de estado matrimonial.
- source_word: תִּהְיֶינָה לְנָשִׁים
  english_pob_choice: Let them become wives
  chosen_spanish: Que sean dadas por esposas
  alternatives_spanish:
  - Que lleguen a ser esposas
  - Que se casen
  - Que sean esposas
  lexicon: HALOT
  rationale: 'La forma hebrea expresa un estado relacional: ‘ser para esposas’. En español, ‘ser dadas por esposas’ preserva la pasiva/relacional implícita y evita la idea moderna de simple iniciativa subjetiva de casarse, que no es el foco del hebreo.'
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: pero
  alternatives_spanish:
  - solo
  - sin embargo
  - no obstante
  lexicon: HALOT
  rationale: Aquí אַךְ introduce una restricción contrastiva. En español, ‘pero’ funciona de modo natural para marcar la limitación respecto de la concesión anterior, y permite una lectura fluida del mandato.
- source_word: לְמִשְׁפַּחַת מַטֵּה אֲבִיהֶם
  english_pob_choice: within the family of the tribe of their father
  chosen_spanish: dentro de la familia de la tribu de su padre
  alternatives_spanish:
  - dentro del clan de la tribu de su padre
  - en la familia de la tribu de su padre
  - dentro del clan de la tribu paterna
  lexicon: HALOT
  rationale: La expresión combina familia/clan y tribu para restringir la unión dentro de la línea tribal paterna. ‘Dentro de la familia de la tribu de su padre’ mantiene ambos niveles semánticos explícitos en español.
- source_word: תִּהְיֶינָה לְנָשִׁים
  english_pob_choice: they must become wives
  chosen_spanish: que sean dadas por esposas
  alternatives_spanish:
  - que deben ser dadas por esposas
  - que han de ser dadas por esposas
  - que sean esposas
  lexicon: HALOT
  rationale: La repetición del verbo en la cláusula final adquiere fuerza normativa bajo la restricción. Se conserva la misma estructura española para reflejar el paralelismo hebreo y la obligación implícita.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la terminología del proyecto, se traduce con el nombre propio ‘Yahvé’ en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Restricción tribal/paternal en la cláusula final
  english_pob_reading: within the family of the tribe of their father
  chosen_spanish_reading: dentro de la familia de la tribu de su padre
  alternative_spanish_readings:
  - dentro del clan de la tribu de su padre
  - dentro de la parentela de la tribu de su padre
  rationale: La combinación de ‘familia’ y ‘tribu’ conserva la tensión lexical del hebreo entre línea familiar y pertenencia tribal. No se reduce a ‘clan’ como única opción, porque el texto enfatiza ambos niveles a la vez.
  doctrine_reference: Numbers 36:6 legal inheritance context
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente hebreo, la traducción inglesa auditada y sus notas. El inglés opta por ‘concerning’, ‘to whomever seems good in their eyes’ y ‘within the family of the tribe of their father’; aquí se preserva ese análisis, pero se ajusta la sintaxis al español con una formulación más natural y se mantiene la ambigüedad útil en las notas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar para יְהוָה.
  - Se evita ‘SEÑOR’ como máscara tipográfica.
  - ‘Esposas’ reproduce el valor relacional del hebreo תִּהְיֶינָה לְנָשִׁים sin convertirlo en una paráfrasis más libre.
  - Las notas a y b conservan las dos alternativas léxicas principales del audit trail inglés.
