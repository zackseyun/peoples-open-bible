theological_decisions:
- issue: Retributive imagery of evil returning on the evildoer
  chosen_reading: Preserve the metaphor of evil rolling back onto the perpetrator rather than flattening it to a generic statement of consequences.
  alternative_readings:
  - Whoever does evil, it will come back on him
  - The evil he does will recoil on him
  rationale: The verse teaches moral retribution in proverbial form. The Greek image of rolling is significant and should remain visible in the main text rather than being reduced to an abstract paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning and imagery unless context plainly demands otherwise.'
