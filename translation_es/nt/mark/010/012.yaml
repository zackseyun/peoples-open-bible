translation:
  language: es
  text: y si ella[a] divorcia a su esposo y se casa con otro hombre, comete adulterio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'despide a su esposo' o 'envía lejos a su esposo'. En este contexto matrimonial, el sentido es 'divorcia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: BDAG
  rationale: Conector simple que enlaza esta cláusula con la afirmación previa; en español 'y' mantiene la continuidad sin añadir matiz innecesario.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: BDAG
  rationale: Introduce una condición general; 'si' es la forma más natural en español para esta sentencia moral/jurídica.
- source_word: αὐτὴ
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - la mujer
  - ella misma
  lexicon: BDAG
  rationale: El griego marca explícitamente el sujeto femenino. 'Ella' conserva esa referencia personal sin sobrecargar el estilo con una redundancia innecesaria.
- source_word: ἀπολύσασα
  english_pob_choice: divorces
  chosen_spanish: divorcia
  alternatives_spanish:
  - despide
  - deja
  - repudia
  lexicon: BDAG
  rationale: En este contexto matrimonial, ἀπολύω tiene fuerza legal de disolver el matrimonio. 'Divorcia' expresa mejor ese valor que el sentido literal de 'enviar lejos'.
- source_word: τὸν ἄνδρα αὐτῆς
  english_pob_choice: her husband
  chosen_spanish: a su esposo
  alternatives_spanish:
  - a su marido
  - a su hombre
  lexicon: BDAG
  rationale: ἄνδρα puede significar 'hombre' o 'esposo'; aquí el contexto matrimonial exige 'esposo'. 'Esposo' es claro y natural en español.
- source_word: γαμήσῃ ἄλλον
  english_pob_choice: marries another man
  chosen_spanish: se casa con otro hombre
  alternatives_spanish:
  - se casa con otro
  - toma a otro hombre por esposo
  lexicon: BDAG
  rationale: El griego usa un masculino explícito con ἄλλον. 'Otro hombre' preserva esa especificidad; 'se casa con' es idiomático en español y comunica bien el acto matrimonial.
- source_word: μοιχᾶται
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - está cometiendo adulterio
  - adultera
  lexicon: BDAG
  rationale: La forma verbal se entiende naturalmente en español como una afirmación declarativa. 'Comete adulterio' es la equivalencia directa, clara y digna.
theological_decisions:
- issue: Conservar el sujeto femenino y el objeto masculino explícitos
  english_pob_reading: 'Use explicit feminine subject and masculine object: ''if she divorces her husband and marries another man'''
  chosen_spanish_reading: '''si ella divorcia a su esposo y se casa con otro hombre'''
  alternative_spanish_readings:
  - si una mujer divorcia a su esposo y se casa con otro
  - si ella deja a su esposo y se casa con otro
  rationale: El griego es marcadamente específico en el género gramatical y el paralelismo con el dicho anterior. Mantener 'ella' y 'otro hombre' evita neutralizar una precisión deliberada del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Cómo rendir ἀπολύω en contexto matrimonial
  english_pob_reading: Render as 'divorces'
  chosen_spanish_reading: '''divorcia'''
  alternative_spanish_readings:
  - despide
  - repudia
  - la deja
  rationale: Aquí no se trata de una simple separación, sino de la disolución del matrimonio. 'Divorcia' comunica la fuerza legal y relacional del verbo sin depender de una paráfrasis.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 6
