translation:
  language: es
  text: Yahvé[a] puso en confusión a Sisara, a todos los carros[b] y a todo el ejército[c], delante de Barac, por la espada[d]. Entonces Sisara bajó del carro y huyó a pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el nombre propio divino יְהוָה; se mantiene «Yahvé» para no sustituirlo por un título.
    reason: theological_note
  - marker: b
    text: También puede entenderse como «carros de guerra» o, de modo más colectivo, «fuerza de carros».
    reason: lexical_alternative
  - marker: c
    text: O «campamento» / «hueste»; aquí el contexto militar favorece «ejército».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «por la boca/filo de la espada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּהָם
  english_pob_choice: threw ... into confusion
  chosen_spanish: puso en confusión
  alternatives_spanish:
  - derribó en confusión
  - aterrorizó
  - desbarató
  lexicon: HALOT
  rationale: El verbo המם puede expresar causar pánico, desorden o confusión en batalla. «Puso en confusión» conserva el valor causativo sin añadir la idea de derrota total más allá del contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יְהוָה. Se mantiene la forma recomendada «Yahvé» para preservar el nombre del pacto y no sustituirlo por un título.
- source_word: אֶת סִיסְרָא וְאֶת כָּל הָרֶכֶב וְאֶת כָּל הַמַּחֲנֶה
  english_pob_choice: Sisera, all his chariots, and all his army
  chosen_spanish: a Sisara, a todos sus carros y a todo el ejército
  alternatives_spanish:
  - a Sisara, a toda la caballería de carros y a todo el campamento
  - a Sisara, a todo el carro de guerra y a todo el host
  lexicon: HALOT
  rationale: La cadena de objetos directos enumera a Sisara, el conjunto de carros y la fuerza militar entera. En español, «ejército» comunica mejor el sentido militar de מַחֲנֶה que «campamento».
- source_word: הָרֶכֶב
  english_pob_choice: his chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  - carros de guerra de Sisara
  lexicon: HALOT
  rationale: רֶכֶב designa los carros de guerra como fuerza colectiva. «Carros» es breve y natural en español; el contexto bélico aclara el sentido.
- source_word: הַמַּחֲנֶה
  english_pob_choice: his army
  chosen_spanish: ejército
  alternatives_spanish:
  - campamento
  - host
  - fuerza
  lexicon: HALOT
  rationale: En contexto militar, מַחֲנֶה puede referirse al contingente armado. «Ejército» evita la posible ambigüedad de «campamento» en español.
- source_word: לְפִי חֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a filo de espada
  - con la espada
  - por el filo de la espada
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a la «boca/filo de la espada». «Por la espada» mantiene la fuerza idiomática en un español claro y natural; la nota conserva la literalidad.
- source_word: לִפְנֵי בָרָק
  english_pob_choice: before Barak
  chosen_spanish: delante de Barac
  alternatives_spanish:
  - en presencia de Barac
  - ante Barac
  lexicon: HALOT
  rationale: La preposición indica lo que ocurrió frente a Barac mientras avanzaba en combate. «Delante de» es una formulación natural y fiel al movimiento narrativo.
- source_word: וַיֵּרֶד
  english_pob_choice: got down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se apeó
  - se desmontó
  lexicon: HALOT
  rationale: Aunque «bajó» sería más coloquial, «descendió» preserva bien el cambio de postura desde el carro sin perder el tono narrativo.
- source_word: מֵעַל הַמֶּרְכָּבָה
  english_pob_choice: from the chariot
  chosen_spanish: de encima del carro
  alternatives_spanish:
  - del carro
  - del carro de guerra
  - de su carro
  lexicon: HALOT
  rationale: El hebreo expresa movimiento desde arriba del vehículo. «De encima del carro» refleja con más precisión la imagen de desmontar.
- source_word: וַיָּנָס בְּרַגְלָיו
  english_pob_choice: fled on foot
  chosen_spanish: huyó a pie
  alternatives_spanish:
  - fue huyendo a pie
  - huyó corriendo
  - huyó con sus pies
  lexicon: HALOT
  rationale: El modismo contrasta con ir en carro y significa huir sin vehículo. «A pie» es la equivalencia natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa preserva el nombre propio divino. En español, «Yahvé» mantiene esa decisión y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó los posesivos para seguir más de cerca el hebreo: «all the chariots», «all the army» y «from the chariot». La versión española sigue esa misma precisión estructural, evitando añadir posesivos no presentes y conservando el orden narrativo: acción divina, derrota de la fuerza militar y huida de Sisara a pie.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - «Barac» sigue la transliteración española habitual del nombre propio en este contexto.
  - Se prefirió «carros» en lugar de una perífrasis más larga para conservar fluidez sin perder el referente bélico.
  - «Huyó a pie» transmite el contraste con el carro de modo idiomático en español moderno.
  - La frase «por la espada» conserva el modismo hebreo sin sobrecargar el verso con una nota explicativa en el cuerpo del texto.
