base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/004.yaml
  text: The Rock—his work is perfect[a], for all his ways are justice. He is a God of faithfulness and without injustice[c][b], righteous and upright is he.
  footnotes:
  - marker: a
    text: Or 'all his ways are just judgment.' The Hebrew מִשְׁפָּט can denote 'justice,' 'judgment,' or what is legally right.
    reason: lexical_alternative
  - marker: b
    text: '''A God of faithfulness'' may also be understood as ''a faithful God'' or, less likely in this context, ''a God of truth.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'there is no wrong in him' / 'without iniquity.' The Hebrew עָוֶל covers moral wrong, injustice, or iniquity.
    reason: lexical_alternative
