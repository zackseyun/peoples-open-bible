  to: Pero Sihón, rey de Hesbón, no quiso[a] dejarnos pasar por su tierra, porque Yahvé tu Dios endureció su espíritu y afirmó su corazón, para entregarlo en tu mano, como sucede hoy.
  rationale: Se ajusta «por él» a «por su tierra» para expresar en español el sentido contextual del pronombre hebreo con claridad y naturalidad, sin perder fidelidad al original. Se cambia «como hasta este día» por «como sucede hoy» para reflejar mejor la fórmula deuteronómica כַּיּוֹם הַזֶּה. No se requieren cambios en «Yahvé», «endureció su espíritu» ni «afirmó su corazón».
