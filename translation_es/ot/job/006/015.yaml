translation:
  language: es
  text: Mis hermanos han obrado traicioneramente como un uadi[a], como los cauces de los uadis que desaparecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un arroyo… como los cauces de corrientes». El hebreo נחל puede referirse a un arroyo, un valle de torrente o un curso de agua estacional; «uadi» se usa aquí para conservar la imaginería de tierra árida de este pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis amigos
  lexicon: HALOT
  rationale: El hebreo dice literalmente "mis hermanos". En Job puede extenderse a allegados cercanos, pero el término familiar es el dato léxico primario; por eso se conserva en español sin neutralizarlo a "hermanos y hermanas" ni reinterpretarlo como "amigos".
- source_word: בָּגְדוּ
  english_pob_choice: have dealt treacherously
  chosen_spanish: han obrado traicioneramente
  alternatives_spanish:
  - han actuado con engaño
  - han sido infieles
  - han traicionado
  lexicon: HALOT
  rationale: El verbo expresa traición, infidelidad o deslealtad relacional. "Han obrado traicioneramente" conserva el peso moral del verbo sin reducirlo a un acto puntual ni a una mera falta de sinceridad.
- source_word: נָחַל
  english_pob_choice: a wadi
  chosen_spanish: un uadi
  alternatives_spanish:
  - un arroyo
  - un cauce seco
  - un torrente
  lexicon: HALOT
  rationale: El POB inglés eligió "wadi" para preservar la imagen de un curso de agua estacional en tierra árida. En español, "uadi" mantiene ese referente técnico y evita la pérdida de precisión que produciría "arroyo" o "arroyo de montaña".
- source_word: כַאֲפִיק
  english_pob_choice: like the channels of
  chosen_spanish: como los cauces de
  alternatives_spanish:
  - como los lechos de
  - como los canales de
  lexicon: HALOT
  rationale: אפיק designa el cauce o lecho por donde corre el agua. "Cauces de" comunica bien la metáfora hidrológica en español y mantiene el paralelismo con el primer miembro del verso.
- source_word: נְחָלִים
  english_pob_choice: wadis
  chosen_spanish: los uadis
  alternatives_spanish:
  - los arroyos
  - los torrentes
  lexicon: HALOT
  rationale: Se mantiene el mismo campo semántico que en la primera mitad del verso para conservar la imaginería del desierto y la transitoriedad. Traducirlo como "arroyos" debilitaría la referencia geográfica y climática del texto.
- source_word: יַעֲבֹרוּ
  english_pob_choice: pass away
  chosen_spanish: se agotan
  alternatives_spanish:
  - desaparecen
  - pasan
  - se secan
  lexicon: HALOT
  rationale: El sentido básico es pasar, pero en este contexto la idea es la desaparición estacional del agua. "Se agotan" transmite la fugacidad y la pérdida de caudal que desarrolla la imagen en el contexto inmediato.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura final inglesa: mantiene la metáfora de los cursos de agua estacionales y sugiere transitoriedad sin suavizar la acusación de traición. No se registran revisiones textuales sustantivas en el paquete de fuente.'
  spanish_consistency_notes:
  - Se mantuvo la repetición del campo léxico hidrológico en ambos miembros del verso para reflejar el paralelismo hebreo.
  - Se prefirió "uadi" como préstamo técnico ya apoyado por la decisión inglesa, con nota explicativa para lectores no familiarizados.
  - '"Han obrado traicioneramente" preserva el tono acusatorio sin intensificar más allá del hebreo.'
