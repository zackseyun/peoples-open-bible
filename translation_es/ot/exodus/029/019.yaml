translation:
  language: es
  text: Entonces tomarás el segundo carnero, y Aarón y sus hijos pondrán sus manos sobre la cabeza del carnero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Tomarás
  lexicon: HALOT
  rationale: El hebreo marca una secuencia procedimental en un contexto instructivo. «Entonces» expresa bien la progresión, y el futuro con valor de mandato conserva la fuerza directiva del original.
- source_word: הָאַיִל הַשֵּׁנִי
  english_pob_choice: the second ram
  chosen_spanish: el segundo carnero
  alternatives_spanish:
  - el otro carnero
  - el segundo ram
  lexicon: HALOT
  rationale: אֵיל designa un carnero; en español «carnero» es natural y preciso. הַשֵּׁנִי es ordinal, por lo que «segundo» es más fiel que «otro».
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrán
  alternatives_spanish:
  - apoyarán
  - impondrán
  - pondrá
  lexicon: HALOT
  rationale: En el rito sacrificial, סָמַךְ describe el acto concreto de poner o imponer las manos sobre el animal. «Pondrán» es claro y directo en español; evita cargar el gesto con explicaciones no presentes en el verso.
- source_word: אַהֲרֹן וּבָנָיו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y sus hijos
  alternatives_spanish:
  - Aarón y sus hijos varones
  - Aarón y sus descendientes
  lexicon: HALOT
  rationale: בָּנִים aquí se refiere a los hijos de Aarón en el marco de la consagración sacerdotal. «Hijos» es el equivalente natural y no añade especificaciones innecesarias.
- source_word: אֶת יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  - su mano
  lexicon: HALOT
  rationale: El plural hebreo exige plural en español. «Sus manos» conserva la referencia múltiple sin forzar una construcción menos idiomática.
- source_word: עַל רֹאשׁ הָאָיִל
  english_pob_choice: on the head of the ram
  chosen_spanish: sobre la cabeza del carnero
  alternatives_spanish:
  - encima de la cabeza del carnero
  - sobre la cabeza del ram
  lexicon: HALOT
  rationale: עַל se refleja bien con «sobre». «Cabeza» mantiene la singularidad del hebreo y el sustantivo «carnero» sigue la elección léxica del mismo verso.
theological_decisions:
- issue: Descripción del gesto ritual sin explicación interpretativa añadida
  english_pob_reading: shall lay their hands on the head of the ram
  chosen_spanish_reading: pondrán sus manos sobre la cabeza del carnero
  alternative_spanish_readings:
  - apoyarán sus manos sobre la cabeza del carnero
  - impondrán sus manos sobre la cabeza del carnero
  rationale: El verso presenta la acción ritual de manera concreta. La versión española conserva el gesto sin introducir ideas sobre transferencia, identificación u ordenación que el texto no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje coincide con la evaluación de alta concordancia del auditor inglés; no se requirieron revisiones posteriores. La redacción española sigue de cerca el acto ritual y la secuencia narrativa del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Aarón» con acento diacrítico en español.
  - Se eligió «carnero» de forma consistente para אַיִל en este versículo.
  - Se evitó «Señor» o terminología cultual ajena al texto; el verso no contiene el nombre divino.
