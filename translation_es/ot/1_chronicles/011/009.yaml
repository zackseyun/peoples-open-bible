- from: Y David iba creciendo cada vez más[a], y Yahvé de los ejércitos estaba con él.
  to: Y David se hacía cada vez más grande[a], y Yahvé de los Ejércitos estaba con él.
  rationale: Se ajusta el modismo hebreo para reflejar más específicamente el engrandecimiento progresivo de David, se normaliza el título divino en español bíblico y se afina la nota explicativa. No hay incertidumbre doctrinal ni textual que requiera adjudicación adicional.
