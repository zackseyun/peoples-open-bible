translation:
  language: es
  text: Bendito sea únicamente Yahvé, que puso estas cosas en el corazón del rey.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido es difícil en este punto. El sentido probable es que Dios puso esta resolución en el corazón del rey; por eso la traducción sigue el contexto y no intenta forzar una sintaxis incierta.
    reason: textual_variant
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Alabado sea
  lexicon: BDAG
  rationale: La forma griega funciona como una bendición/aclamación. En español, «Bendito sea» conserva el valor exhortativo y suena natural en una fórmula litúrgica sin volverla mecánica.
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: LSJ
  rationale: «μόνος» enfatiza exclusividad. «Solo» mantiene ese énfasis en español de manera directa y natural, evitando sobreexplicar la fórmula.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Se aplica el default del proyecto para יהוה/YHWH en el texto principal. Aunque el griego dice κύριος, aquí funciona como referencia al nombre divino; por eso se traduce «Yahvé» y no se mascara como «Señor».
- source_word: ὁ δοὺς
  english_pob_choice: who put
  chosen_spanish: que puso
  alternatives_spanish:
  - que dio
  - que colocó
  lexicon: BDAG
  rationale: Con καρδίαν, el verbo expresa la acción de introducir o hacer surgir una intención en el interior; «puso» conserva esa idiomática bíblica mejor que «dio».
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas
  lexicon: BDAG
  rationale: El plural griego se conserva con «estas cosas» para no reducir el alcance del referente y mantener la amplitud del original.
- source_word: εἰς τὴν καρδίαν
  english_pob_choice: into the heart
  chosen_spanish: en el corazón
  alternatives_spanish:
  - dentro del corazón
  - al corazón
  lexicon: BDAG
  rationale: En español, «poner ... en el corazón» es una formulación idiomática natural que preserva el sentido de impulso interno o resolución sin sonar forzada.
- source_word: μου τοῦ βασιλέως
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - de mi rey
  - de mi señor el rey
  lexicon: BDAG
  rationale: 'La tradición textual griega es difícil en este punto, y el contexto apunta al rey como receptor de la impulsión divina. En español se mantiene la lectura segura y contextual: «del rey», sin añadir un posesivo que el griego no exige.'
theological_decisions:
- issue: Cómo traducir κύριος en una doxología breve vinculada al nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Dado el criterio editorial del proyecto, el título griego se entiende aquí como referencia al nombre divino. Mantener «Yahvé» evita el ocultamiento del nombre y preserva la transparencia fuente-lectora.
  doctrine_reference: 'DOCTRINE.md: Yahvé / κύριος en el texto principal'
- issue: Manejo de la dificultad sintáctica de μου τοῦ βασιλέως
  english_pob_reading: the king
  chosen_spanish_reading: del rey
  alternative_spanish_readings:
  - de mi rey
  - de mi señor el rey
  rationale: La nota inglesa reconoce la dificultad y el probable sentido contextual. La versión española opta por una lectura sobria y no especulativa, suficientemente fiel al flujo del pasaje y al testimonio griego transmitido.
  doctrine_reference: 'DOCTRINE.md: traducción con transparencia ante variantes y pasajes difíciles'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del audit trail que corrigió la frase inglesa hacia «the king» y la nota que reconoce la dificultad del griego transmitido. Por eso el español evita cualquier expansión posesiva y mantiene una formulación contextual, breve y sobria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como default del proyecto para el nombre divino.
  - Se usa «corazón» para καρδία en sentido interno/volitivo, no como órgano físico.
  - La frase se conserva benedictoria y no se convierte en una paráfrasis explicativa.
  - No se añadió ningún posesivo que no esté sustentado por el griego o por una clara exigencia del español.
