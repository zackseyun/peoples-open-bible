- from: Salmo. Canten a Yahvé un cántico nuevo[a], porque ha hecho cosas maravillosas; su mano derecha y su santo brazo le han brindado salvación.
  to: Salmo. Canten a Yahvé un cántico nuevo, porque ha hecho maravillas; su mano derecha y su santo brazo le han logrado salvación[a].
  rationale: Se elimina la nota innecesaria sobre ‘cántico nuevo’ y se reemplaza por la alternativa léxica realmente documentada en el audit trail inglés para הוֹשִׁיעָה לּוֹ. También se fortalece la cláusula final con ‘le han logrado salvación’, que refleja mejor la idea de salvación efectuada por la mano y el brazo de Yahvé. ‘Ha hecho maravillas’ mejora la naturalidad poética sin apartarse del sentido fuente.
