review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: Esaú responde con contraste suave, expresa abundancia y declina la oferta de Jacob diciendo que lo suyo siga siendo suyo. También conserva la alternativa léxica de רָב como «suficiente». Sin embargo, la formulación final «sea tuyo lo que es tuyo» suena algo rígida y menos natural en español que una inversión más idiomática, sin perder la fidelidad lexical.'
  spanish_quality_summary: El texto es claro y comprensible, pero «Yo tengo mucho» y especialmente «sea tuyo lo que es tuyo» resultan algo duros estilísticamente. «Tengo mucho» basta sin el pronombre expreso, y «que sea tuyo lo que es tuyo» mejora la fluidez. También «mi hermano» es más natural y ampliamente legible que «hermano mío» en este contexto vocativo, manteniendo la calidez relacional.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios y el contenido semántico están bien alineados. No aparecen términos teológicos sensibles del glosario global. La nota alternativa es adecuada y preserva la decisión léxica documentada.
  issues:
  - severity: medium
    issue: La cláusula final «sea tuyo lo que es tuyo» es demasiado rígida en español.
    rationale: Aunque es léxicamente cercana, la estructura suena forzada. «Que sea tuyo lo que es tuyo» conserva el jussivo/politez y mejora la naturalidad sin añadir significado.
  - severity: low
    issue: «Hermano mío» es menos natural que «mi hermano» en español bíblico moderno neutral.
    rationale: Ambas son posibles, pero «mi hermano» suena más idiomático y mantiene el matiz afectuoso del vocativo hebreo.
  - severity: low
    issue: El pronombre expreso «Yo» no es necesario.
    rationale: En español, «Tengo mucho» expresa suficientemente la posesión; omitir «Yo» mejora la fluidez y evita una leve pesadez.
  revised_spanish_text: 'Pero Esaú dijo[a]: «Tengo mucho, mi hermano; que sea tuyo lo que es tuyo».'
