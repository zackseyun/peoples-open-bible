translation:
  language: es
  text: Todo su pueblo gime, buscando pan; han dado sus cosas preciosas[a] por alimento, para restaurar la vida[b]. Mira, Yahvé, y contempla, porque he llegado a ser despreciada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus tesoros’ / ‘sus cosas deseables’.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘para restaurar el alma/la vida’; aquí el sentido es recuperar fuerzas o preservar la vida.
    reason: lexical_alternative
  - marker: c
    text: O ‘vil’ / ‘despreciable’.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱנָחִים
  english_pob_choice: groan
  chosen_spanish: gime
  alternatives_spanish:
  - suspira
  - se lamenta
  - gime de dolor
  lexicon: HALOT
  rationale: ‘Gime’ expresa dolor audible y encaja con el tono de lamento por hambre y aflicción. Mantiene la fuerza idiomática de ‘groan’ sin volverlo demasiado explicativo.
- source_word: מְבַקְּשִׁים לֶחֶם
  english_pob_choice: seeking bread
  chosen_spanish: buscando pan
  alternatives_spanish:
  - buscando alimento
  - buscando comida
  lexicon: HALOT
  rationale: ‘Pan’ conserva el término concreto del original y su valor representativo de alimento básico. ‘Buscando pan’ es natural en español y mantiene la imagen literal.
- source_word: מחמודיהם
  english_pob_choice: their precious things
  chosen_spanish: sus cosas preciosas
  alternatives_spanish:
  - sus tesoros
  - sus cosas deseables
  - sus objetos valiosos
  lexicon: HALOT
  rationale: ‘Cosas preciosas’ conserva el campo semántico amplio de bienes apreciados o valiosos sin restringirlo a dinero o tesoros monetarios. Evita precisar más de lo que el hebreo permite.
- source_word: בְּאֹכֶל
  english_pob_choice: for food
  chosen_spanish: por alimento
  alternatives_spanish:
  - por comida
  - a cambio de comida
  lexicon: HALOT
  rationale: 'La preposición expresa intercambio: dieron sus bienes a cambio de comida. ‘Por alimento’ es breve, formal y fiel al sentido de provisión para subsistir.'
- source_word: לְהָשִׁיב נָפֶשׁ
  english_pob_choice: to restore life
  chosen_spanish: para restaurar la vida
  alternatives_spanish:
  - para reanimar el alma
  - para sostener la vida
  - para devolver el aliento
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ apunta a vida/supervivencia más que a ‘alma’ en sentido estrecho. ‘Restaurar la vida’ comunica el objetivo de preservar o recuperar fuerzas sin espiritualizar indebidamente el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. ‘Yahvé’ preserva la identificación directa del Tetragrámaton sin sustituirlo por un título.
- source_word: רְאֵה ... וְהַבִּיטָה
  english_pob_choice: Look ... and see
  chosen_spanish: Mira ... y contempla
  alternatives_spanish:
  - Mira ... y ve
  - Observa ... y mira
  lexicon: HALOT
  rationale: El par imperativo intensifica la súplica. ‘Mira ... y contempla’ conserva la duplicación enfática y su tono de apelación urgente.
- source_word: זוֹלֵלָה
  english_pob_choice: despised
  chosen_spanish: despreciada
  alternatives_spanish:
  - vile
  - condenada al desprecio
  - tenida por vil
  lexicon: HALOT
  rationale: En el lamento, el sentido es ser objeto de desprecio social y humillación. ‘Despreciada’ comunica esa vergüenza pública en un español claro y fiel.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el criterio del proyecto para el Tetragrámaton, evitando el reemplazo por un título genérico. ‘Yahvé’ es la forma establecida en el marco editorial dado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se verificó el audit trail inglés y no se registraron revisiones aplicadas; el borrador sigue el estado más reciente, con alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se preservó ‘Yahvé’ para יְהוָה conforme al criterio del proyecto.
  - Se mantuvo la metáfora concreta de ‘pan’ y el intercambio por ‘alimento’ sin ampliar el texto.
  - ‘Restaurar la vida’ conserva נֶפֶשׁ como vida/supervivencia, no como ‘alma’ en sentido doctrinal estrecho.
  - ‘Despreciada’ traduce el cierre con un valor de humillación social, coherente con el lamento.
  - El tono general busca ser bíblico y digno en español moderno, sin calco mecánico del inglés.
