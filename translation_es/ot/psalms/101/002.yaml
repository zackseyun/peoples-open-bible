revisions:
- from: Quiero prestar atención al camino intachable[a]; ¿cuándo vendrás a mí? Andaré con integridad de corazón dentro de mi casa[b].
  to: Prestaré atención al camino intachable; ¿cuándo vendrás a mí?[a] Andaré con integridad de corazón dentro de mi casa[b].
  rationale: 'Se ajusta el verbo inicial para reflejar mejor el futuro volitivo hebreo sin añadir un matiz desiderativo innecesario. Se reordenan y corrigen las notas para alinearlas con la auditoría inglesa: una nota para la ambigüedad del sujeto en «vendrás» y otra para las alternativas léxicas de אַשׂכילה + בְּדֶרֶךְ תָּמִים. El resto del texto español es fiel, natural y doctrinalmente prudente.'
