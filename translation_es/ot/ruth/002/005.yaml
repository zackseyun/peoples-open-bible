translation:
  language: es
  text: 'Entonces Booz dijo a su joven servidor, el que estaba puesto sobre los segadores[a]: «¿De quién es esta joven?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que estaba encargado de los segadores». El hebreo puede expresar tanto ubicación supervisora como designación oficial sobre ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿A quién pertenece esta joven?». El hebreo pregunta por su afiliación o vínculo con un hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» preserva la secuencia con fluidez natural en español sin forzar un calco repetitivo de «y».
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Boaz
  alternatives_spanish:
  - Booz
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma estable y reconocible para lectores bíblicos en español.
- source_word: לְנַעֲרוֹ
  english_pob_choice: to his young man
  chosen_spanish: a su joven
  alternatives_spanish:
  - a su siervo
  - a su ayudante
  - a su muchacho
  lexicon: HALOT
  rationale: נַעַר puede significar joven, siervo o asistente; aquí se conserva el valor léxico básico «joven» y la relación posesiva del contexto, sin absorber todavía la función supervisora que expresa la frase siguiente.
- source_word: הַנִּצָּב עַל הַקּוֹצְרִים
  english_pob_choice: who was set over the reapers
  chosen_spanish: el que estaba puesto sobre los segadores
  alternatives_spanish:
  - el que estaba encargado de los segadores
  - el que estaba sobre los segadores
  - el que dirigía a los segadores
  lexicon: HALOT
  rationale: El participio nifal de נצב con עַל expresa colocación o designación sobre otros; «estaba puesto sobre» conserva esa pasividad funcional. «Segadores» corresponde de manera directa a קֹצְרִים.
- source_word: לְמִי
  english_pob_choice: Whose
  chosen_spanish: ¿De quién es...?
  alternatives_spanish:
  - ¿A quién pertenece...?
  - ¿De quién pertenece...?
  lexicon: HALOT
  rationale: La pregunta hebrea indaga pertenencia o afiliación doméstica; en español, «¿De quién es...?» transmite de forma natural esa relación sin perder el matiz social.
- source_word: הַנַּעֲרָה
  english_pob_choice: young woman
  chosen_spanish: esta joven
  alternatives_spanish:
  - esta muchacha
  - esta muchacha joven
  - esta muchacha/sierva
  lexicon: HALOT
  rationale: נַעֲרָה denota una joven mujer; «joven» es natural en español y evita tanto «muchacha» como posible connotación infantil como «maiden» o sobrecargar el estatus de servidumbre.
- source_word: הַזֹּאת
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: HALOT
  rationale: El demostrativo simple se expresa de forma directa con «esta».
translation_notes:
  revision_awareness: 'Corregido para anclar la nota al texto principal: se añadió el marcador [a] junto a «los segadores» y se mantuvo la nota como alternativa léxica coherente con el audit trail inglés.'
  spanish_consistency_notes:
  - Se evitó «siervo» para נַעַר porque el contexto inmediato ya especifica la función de supervisión.
  - Se conservó «segadores» para קֹצְרִים, un término claro y bíblicamente adecuado en español.
  - Se prefirió «¿De quién es esta joven?» por ser idiomático y mantener el matiz de pertenencia/afiliación que señala la nota inglesa.
