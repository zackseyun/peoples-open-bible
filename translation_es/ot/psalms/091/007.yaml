translation:
  language: es
  text: Caiga[a] mil a tu lado, y diez mil a tu diestra; pero no se acercará[b] a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Caerá». El imperfecto hebreo puede leerse con valor modal o futuro en este contexto poético.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no se acercará a ti». El sujeto queda implícito en hebreo; el contexto apunta al peligro o calamidad amenazante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפֹּל
  english_pob_choice: may fall
  chosen_spanish: Caerán
  alternatives_spanish:
  - Pueden caer
  - Caerá
  lexicon: HALOT
  rationale: El imperfecto hebreo en poesía admite valor futuro o modal. En español, el plural «caerán» conserva el movimiento profético del verso y el paralelismo, sin añadir una modalidad que suene forzada en esta oración breve.
- source_word: מִצִּדְּךָ
  english_pob_choice: at your side
  chosen_spanish: a tu lado
  alternatives_spanish:
  - junto a ti
  - de tu lado
  lexicon: HALOT
  rationale: La preposición con este verbo expresa ubicación relativa más que procedencia literal. «A tu lado» reproduce la imagen espacial de manera natural en español.
- source_word: אֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - un millar
  - a thousand
  lexicon: HALOT
  rationale: «Mil» es la forma directa y natural en español, manteniendo la cifra exacta y el paralelismo poético.
- source_word: וּרְבָבָה
  english_pob_choice: and ten thousand
  chosen_spanish: y diez mil
  alternatives_spanish:
  - y una miríada
  - y diez millares
  lexicon: HALOT
  rationale: רְבָבָה denota una cantidad muy grande y, en uso estándar, suele equivaler a diez mil. «Diez mil» preserva la intensificación del hebreo con claridad idiomática.
- source_word: מִימִינֶךָ
  english_pob_choice: at your right hand
  chosen_spanish: a tu diestra
  alternatives_spanish:
  - a tu derecha
  - a tu mano derecha
  lexicon: HALOT
  rationale: «Diestra» conserva el paralelismo bíblico y el valor espacial del hebreo sin perder inteligibilidad en español moderno.
- source_word: אֵלֶיךָ
  english_pob_choice: near you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - cerca de ti
  lexicon: HALOT
  rationale: En el giro final, el hebreo combina el movimiento hacia la persona con el verbo de acercamiento. En español, la estructura natural es completar con «a ti» junto con «acercarse», lo cual evita una redundancia pesada.
- source_word: לֹא יִגָּשׁ
  english_pob_choice: it will not come near you
  chosen_spanish: no se acercará
  alternatives_spanish:
  - no se llegará
  - no vendrá
  lexicon: HALOT
  rationale: El verbo נגשׁ significa acercarse/venir cerca; el sujeto no está expresado en hebreo. En español, la construcción impersonal reflexiva reproduce bien la idea de una amenaza que no logra aproximarse.
theological_decisions:
- issue: Sujeto implícito del verbo final
  english_pob_reading: The unstated subject is rendered as impersonal 'it,' referring to the calamity/plague described in the psalm's context.
  chosen_spanish_reading: 'Se mantiene una formulación impersonal: «no se acercará», sin identificar explícitamente el sujeto.'
  alternative_spanish_readings:
  - no se acercará el mal
  - no se acercará la calamidad
  - no se acercará él
  rationale: El hebreo deja el sujeto tácito y el contexto sugiere un peligro genérico. En español, la forma impersonal evita imponer una identificación más estrecha que la del texto y conserva la tensión poética.
  doctrine_reference: Preservar la ambigüedad contextual del hebreo sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente inglés; la redacción española sigue de cerca la decisión auditada de leer los imperfectos con valor futuro/modal y de mantener implícito el sujeto del último verbo.
  spanish_consistency_notes:
  - Se usa «tu» en segunda persona singular, coherente con el hebreo con sufijo de 2ms.
  - Se conserva el paralelismo numérico «mil / diez mil».
  - «A tu diestra» mantiene el registro bíblico sin oscurecer el sentido.
  - La forma impersonal «no se acercará» evita añadir un sujeto no expresado en el hebreo.
