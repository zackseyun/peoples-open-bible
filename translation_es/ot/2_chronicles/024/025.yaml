translation:
  language: es
  text: Cuando se fueron de él —pues lo dejaron con muchas enfermedades—, sus siervos conspiraron contra él por la sangre de los hijos de Jehoiada, el sacerdote[a], y lo mataron en su cama, y murió. Lo sepultaron en la ciudad de David, pero no lo sepultaron en los sepulcros de los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Jehoiada, el sacerdote». En este contexto puede referirse específicamente al «hijo de Jehoiada», es decir, Zacarías (24:20–22).'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְלֶכְתָּם
  english_pob_choice: When they departed
  chosen_spanish: Cuando se fueron
  alternatives_spanish:
  - Y cuando se fueron
  - Al irse
  lexicon: HALOT
  rationale: El valor temporal de la construcción se expresa naturalmente con «Cuando se fueron». «Se fueron» conserva la idea de partir/dejar el lugar sin sobrecargar el español con un calco.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - alejándose de él
  lexicon: HALOT
  rationale: El sufijo se refiere a Joás; «de él» es directo y fiel.
- source_word: כִּי עָזְבוּ אֹתוֹ בְּמַחֳלָיִם רַבִּים
  english_pob_choice: for they left him with many diseases
  chosen_spanish: pues lo dejaron con muchas enfermedades
  alternatives_spanish:
  - porque lo dejaron muy enfermo
  - pues lo dejaron con grandes padecimientos
  lexicon: HALOT
  rationale: «Pues» da la causa; «enfermedades» mantiene el plural y el sentido físico de מַחֳלָיִם, sin reducirlo a una sola dolencia ni espiritualizarlo.
- source_word: הִתְקַשְּׁרוּ
  english_pob_choice: conspired
  chosen_spanish: conspiraron
  alternatives_spanish:
  - trazaron un complot
  - se confabularon
  lexicon: HALOT
  rationale: El hitpael de קשר expresa conspiración; «conspiraron» es la equivalencia más natural y precisa en español.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: En contexto real puede aludir a funcionarios de corte, pero «siervos» conserva el valor lexical directo y es compatible con el registro bíblico en español.
- source_word: בִּדְמֵי
  english_pob_choice: because of the blood of
  chosen_spanish: por la sangre de
  alternatives_spanish:
  - a causa de la sangre de
  - por derramar la sangre de
  lexicon: HALOT
  rationale: La preposición causal se traduce de forma concisa. «Por la sangre de» mantiene abierta la relación de culpa o motivo sin añadir precisión interpretativa que el hebreo no explicita por sí solo.
- source_word: בְּנֵי יְהוֹיָדָע הַכֹּהֵן
  english_pob_choice: the sons of Jehoiada the priest
  chosen_spanish: los hijos de Jehoiada, el sacerdote
  alternatives_spanish:
  - el hijo de Jehoiada, el sacerdote
  lexicon: HALOT
  rationale: El texto hebreo leído aquí está en plural («hijos»). En español se preserva esa forma en el cuerpo principal; «el sacerdote» se coloca en aposición como en el original.
- source_word: וַיַּהַרְגֻהוּ עַל מִטָּתוֹ
  english_pob_choice: and they killed him on his bed
  chosen_spanish: y lo mataron en su cama
  alternatives_spanish:
  - y lo asesinaron en su cama
  - y lo dieron muerte en su cama
  lexicon: HALOT
  rationale: «Mataron» reproduce el verbo ordinario הרג. «En su cama» conserva el detalle narrativo de la escena y su carga de asesinato en condición de debilidad.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa simple y sobria del hebreo.
- source_word: וַיִּקְבְּרֻהוּ בְּעִיר דָּוִיד
  english_pob_choice: They buried him in the city of David
  chosen_spanish: Lo sepultaron en la ciudad de David
  alternatives_spanish:
  - Y lo sepultaron en la ciudad de David
  - Lo enterraron en la ciudad de David
  lexicon: HALOT
  rationale: «Sepultar» es más natural en registro bíblico español para una inhumación formal y mantiene la dignidad del contexto.
- source_word: וְלֹא קְבָרֻהוּ בְּקִבְרוֹת הַמְּלָכִים
  english_pob_choice: but they did not bury him in the tombs of the kings
  chosen_spanish: pero no lo sepultaron en los sepulcros de los reyes
  alternatives_spanish:
  - pero no lo enterraron en las tumbas de los reyes
  - pero no lo sepultaron entre los reyes
  lexicon: HALOT
  rationale: «Sepulcros» preserva la idea de un conjunto funerario real y suena más adecuado que «tumbas» para el contraste honorífico del pasaje.
theological_decisions:
- issue: Plural hebreo «hijos de Jehoiada» frente al contexto inmediato que sugiere a un solo mártir (Zacarías, hijo de Jehoiada)
  english_pob_reading: Retain the MT-based main text 'sons of Jehoiada' and preserve the singular in a footnote.
  chosen_spanish_reading: Mantener «los hijos de Jehoiada» en el texto principal, con una nota que reconozca la posible referencia singular.
  alternative_spanish_readings:
  - el hijo de Jehoiada
  - Zacarías, hijo de Jehoiada
  rationale: El texto fuente hebreo provisto es plural y debe conservarse. Al mismo tiempo, el contexto narrativo anterior apunta con fuerza a un individuo concreto; por eso la nota evita armonizar en silencio y preserva la tensión textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español y esté anclado a la frase relevante.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo donde el versículo no lo contiene; no se introdujo terminología ajena al texto.
  - «Sepultaron/sepulcros» se usó de manera consistente para el acto funerario formal.
  - Se preservó la diferencia entre el plural hebreo del texto y la referencia contextual singular mediante nota, sin armonización silenciosa.
