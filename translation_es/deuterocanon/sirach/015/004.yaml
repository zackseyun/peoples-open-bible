review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien el paralelismo hebreo y mantiene correctamente el referente femenino de la Sabiduría personificada. Sin embargo, 'no será sacudido' no es la mejor equivalencia para וְלֹא יִמּוֹט en español bíblico natural; el sentido es más bien 'no vacilará / no será conmovido', es decir, no perderá firmeza. Además, el rastro de auditoría inglés conserva alternativas significativas mediante notas, y aquí conviene trasladar al menos la aclaración del referente femenino y las alternativas léxicas principales.
  spanish_quality_summary: El texto es claro y legible, pero 'será sacudido' suena algo físico y menos idiomático que 'vacilará' en este contexto sapiencial. 'No será avergonzado' es aceptable, aunque en español más natural y directo suena mejor 'no será avergonzado' o 'no quedará avergonzado'; se puede conservar la primera por cercanía formal. La puntuación y el registro son adecuados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva 'ella' para la Sabiduría personificada, en línea con la decisión teológica auditada. No aparecen términos con defaults sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: '''no será sacudido'' debilita la equivalencia de וְלֹא יִמּוֹט'
    rationale: El hebreo מוֹט y el paralelo griego κλιθῇ expresan ceder, tambalear, vacilar o ser movido de su firmeza; 'ser sacudido' introduce una imagen algo distinta y menos natural en español para este contexto.
  - severity: low
    issue: Faltan notas que preserven decisiones auditadas significativas
    rationale: El inglés conserva la referencia a la Sabiduría personificada y alternativas léxicas relevantes ('no vacilará / no será movido'; 'no será avergonzado / no será decepcionado'). Dado que en español también son útiles y no generan sobrecarga, conviene incluirlas.
  revised_spanish_text: Se apoyará en ella[a] y no vacilará[b]; confiará en ella y no será avergonzado[c].
