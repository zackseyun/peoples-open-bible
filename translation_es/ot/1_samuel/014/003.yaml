translation:
  language: es
  text: Y Ahías, hijo de Ahitob, hermano de Icabod, hijo de Finees, hijo de Elí, sacerdote de Yahvé en Silo, llevaba un efod[a]. Y el pueblo no sabía que Jonatán se había ido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vestía un efod'. El hebreo dice literalmente 'llevando/portando un efod'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲחִיָּה
  english_pob_choice: Now Ahijah
  chosen_spanish: Ahora Ahías
  alternatives_spanish:
  - Y Ahías
  lexicon: HALOT
  rationale: El waw narrativo inicia y avanza la escena; en español, 'Ahora' comunica mejor esa transición discursiva que un simple 'Y' al comienzo de oración. El nombre propio se adapta a la forma española habitual.
- source_word: בֶן אֲחִטוּב
  english_pob_choice: son of Ahitub
  chosen_spanish: hijo de Ahitob
  alternatives_spanish:
  - hijo de Ahitub
  lexicon: HALOT
  rationale: Se conserva la construcción genealógica directa. La forma del nombre se ajusta a la transliteración española más fluida sin perder identidad con el hebreo.
- source_word: אֲחִי אִיכָבוֹד
  english_pob_choice: brother of Ichabod
  chosen_spanish: hermano de Icabod
  alternatives_spanish:
  - pariente de Icabod
  lexicon: HALOT
  rationale: Se mantiene el sentido básico de אֲחִי como 'hermano', tal como lo hace la POB en inglés. No hay razón textual inmediata para debilitarlo a 'pariente'.
- source_word: בֶּן פִּינְחָס בֶּן עֵלִי
  english_pob_choice: son of Phinehas, son of Eli
  chosen_spanish: hijo de Finees, hijo de Elí
  alternatives_spanish:
  - hijo de Phinehas, hijo de Eli
  lexicon: HALOT
  rationale: Se preserva la cadena genealógica completa. 'Finees' y 'Elí' son formas españolas tradicionales y comprensibles, sin alterar la relación de descendencia.
- source_word: כֹּהֵן יְהוָה
  english_pob_choice: priest of Yahweh
  chosen_spanish: sacerdote de Yahvé
  alternatives_spanish:
  - sacerdote de Yahweh
  - sacerdote de YHWH
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' conforme al estándar del proyecto para el Nombre divino. 'Sacerdote' es la equivalencia directa y conserva la función cultual y genealógica del título.
- source_word: בְּ/שִׁל֖וֹ
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  - en Silo
  lexicon: HALOT
  rationale: El hebreo permite una localización en 'en/at'; en español, 'en Silo' es natural para la mención del santuario. Se adopta la forma española del topónimo.
- source_word: נֹשֵׂא אֵפ֑וֹד
  english_pob_choice: was carrying an ephod
  chosen_spanish: estaba llevando un efod
  alternatives_spanish:
  - estaba portando un efod
  - estaba vistiendo un efod
  lexicon: HALOT
  rationale: Se conserva la fuerza de נשא como 'llevar/portar', que la POB en inglés destacó al preferir 'carrying'. 'Llevar' es natural en español y evita asumir demasiado rápido 'vestir' como interpretación.
- source_word: וְ/הָ/עָם
  english_pob_choice: And the people
  chosen_spanish: Y el pueblo
  alternatives_spanish:
  - Y la gente
  lexicon: HALOT
  rationale: La referencia colectiva se traduce de forma directa. 'Pueblo' mantiene el registro bíblico y puede abarcar al grupo reunido con Saúl sin precisar más de lo que el hebreo da.
- source_word: לֹ֣א יָדַ֔ע
  english_pob_choice: did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no se daba cuenta
  - no estaba enterado
  lexicon: HALOT
  rationale: La negación del conocimiento se expresa con un imperfecto natural en español. 'No sabía' reproduce claramente el estado de ignorancia de la gente.
- source_word: כִּ֥י הָלַ֖ךְ יוֹנָתָֽן
  english_pob_choice: that Jonathan had gone
  chosen_spanish: que Jonatán se había ido
  alternatives_spanish:
  - que Jonatán había ido
  - que Jonatán había salido
  lexicon: HALOT
  rationale: Después de ידע, כִּי introduce la cláusula de contenido. 'Se había ido' comunica el valor perfectivo de הלך en este contexto y el movimiento de Jonathan fuera de la escena.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la política del proyecto de no ocultar el Nombre divino tras una sustitución. 'Yahvé' preserva el valor propio del Tetragrama y es transparente para el lector español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título sacerdotal en una genealogía narrativa
  english_pob_reading: priest of Yahweh at Shiloh
  chosen_spanish_reading: sacerdote de Yahvé en Silo
  alternative_spanish_readings:
  - el sacerdote de Yahvé en Silo
  - sacerdote del SEÑOR en Silo
  rationale: Se conserva el título como identificación narrativa específica, sin añadir el artículo innecesario. Esto refleja el ajuste de la POB en inglés y mantiene fluidez en español.
  doctrine_reference: Syntactic/narrative identification consistent with the English POB revision
- issue: Sentido de נֹשֵׂא אֵפוד
  english_pob_reading: was carrying an ephod
  chosen_spanish_reading: estaba llevando un efod
  alternative_spanish_readings:
  - llevaba un efod
  - estaba vistiendo un efod
  rationale: Se retiene la tensión lexical entre 'llevar' y 'vestir' sin resolverla prematuramente. El hebreo literalmente habla de portar/llevar; la opción española deja abierta la posible función cultual del efod.
  doctrine_reference: Lexical note from English POB footnote on נָשָׂא + אֵפוֹד
translation_notes:
  revision_awareness: La POB en inglés mantuvo la genealogía explícita, ajustó la identificación de 'priest of Yahweh at Shiloh' para evitar el artículo repetido y conservó la nota lexical sobre נֹשֵׂא אֵפוד ('carrying' frente a 'wearing'). Esta versión española sigue esas decisiones, preservando el nombre divino como Yahvé y manteniendo la ambigüedad útil del verbo 'llevar'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se usan formas españolas corrientes de nombres propios bíblicos cuando no afectan la identificación textual.
  - Se mantiene el nivel de literalidad suficiente para una nota genealógica y narrativa breve.
  - Se conserva la nota lexical sobre el efod porque el español también admite la alternativa 'vestir', creando la misma tensión que el inglés POB documentó.
