    text: 'O: «Por favor, acepta pasar la noche, y alégrate de corazón».'
    reason: lexical_alternative
  revision_rationale: Se ajustó el inicio narrativo para un registro más natural y digno, se eliminó la nota innecesaria sobre «la muchacha», y se reformuló הוֹאֶל נָא con «quédate a pasar la noche» para un español más fluido, preservando la invitación cortés. Se añadió una nota léxica útil que conserva más explícitamente la idea de consentimiento de הוֹאֶל.
