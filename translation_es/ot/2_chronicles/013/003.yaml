review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva los números, la selección de tropas y la oposición entre Abías y Jeroboam. Sin embargo, suaviza indebidamente וַיֶּאְסֹר ('entró/se trabó en batalla') como 'se preparó para la batalla', lo cual desplaza el sentido desde el inicio/entablar combate hacia mera preparación. También 'hombres valientes de guerra' suena menos natural y menos preciso que una formulación española más idiomática para גִּבּוֹר חָיִל.
  spanish_quality_summary: El español es generalmente claro y digno, pero 'se preparó para la batalla' no refleja bien el modismo militar hebreo ni el inglés auditado. 'Hombres valientes de guerra' resulta algo forzado. Una leve revisión mejora fidelidad y naturalidad sin perder tono bíblico legible.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. 'Escogidos' para בָּחוּר y 'ejército' para בְּחַיִל están bien. Conviene alinear mejor el modismo de וַיֶּאְסֹר con 'entró en batalla' y expresar גִּבּוֹר חָיִל como 'hombres valientes' o 'valientes guerreros' según contexto.
  issues:
  - severity: high
    issue: '''se preparó para la batalla'' para וַיֶּאְסֹר'
    rationale: El hebreo idiomático significa entablar o entrar en batalla, no solo prepararse para ella. La versión actual reduce la acción militar efectiva a una fase previa.
  - severity: medium
    issue: Nota [a] no acompaña bien la elección principal
    rationale: Si el texto dice 'se preparó para la batalla', la alternativa 'se trabó en batalla' deja ver que la opción principal no refleja el mejor sentido base. La nota funciona mejor si el texto principal ya expresa entrar en combate.
  - severity: low
    issue: '''hombres valientes de guerra'' suena poco idiomático'
    rationale: Aunque intenta reflejar el giro militar hebreo, en español suena rígido. 'hombres valientes' o 'valientes guerreros' preserva mejor claridad y registro.
  revised_spanish_text: Abías entró en batalla con un ejército de cuatrocientos mil hombres escogidos[a], guerreros valientes; y Jeroboam se dispuso para la batalla contra él con ochocientos mil hombres escogidos[b], hombres valientes.
  revised_footnotes:
  - marker: a
    text: 'O: «se trabó en batalla»; el hebreo usa un modismo militar literalmente cercano a «atar la batalla».'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea equivale a una fórmula militar para combatientes capaces y valientes.
    reason: cultural_note
  revision_rationale: Se corrige el verbo principal para reflejar que Abías entabló combate, no que solo se preparó. También se suaviza la frase final a un español más natural sin perder la fuerza militar del hebreo ni la nota cultural preservada por el POB inglés.
