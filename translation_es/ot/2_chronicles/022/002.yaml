base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/002.yaml
  text: Ahaziah was forty-two years old when he became king[a], and he reigned one year in Jerusalem. His mother’s name was Athaliah[b], the daughter of Omri.
  footnotes:
  - marker: a
    text: 'Hebrew: ''forty-two years old.'' The parallel in 2 Kgs 8:26 reads ''twenty-two years old,'' so some understand this as a textual problem or propose another way of reckoning the number.'
    reason: textual_variant
  - marker: b
    text: Or 'descendant of Omri.' Hebrew 'daughter' can sometimes be used more broadly for a female descendant.
    reason: lexical_alternative
