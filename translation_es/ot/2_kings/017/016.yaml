translation:
  language: es
  text: Abandonaron todos los mandamientos de Yahvé su Dios, e hicieron para sí imágenes fundidas, dos becerros, e hicieron una Asera[a], y se postraron ante toda la hueste del cielo, y sirvieron a Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un poste de Asera»; el término hebreo Asera puede referirse a la diosa cananea o a su objeto de culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  lexicon: HALOT
  rationale: עזב aquí expresa abandono del pacto, no solo una salida física. 'Abandonaron' conserva esa fuerza en español actual y mantiene el tono de infidelidad religiosa.
- source_word: כָּל מִצְוֺת
  english_pob_choice: all the commandments
  chosen_spanish: todos los mandamientos
  alternatives_spanish:
  - todos los preceptos
  - todos los mandatos
  lexicon: HALOT
  rationale: מִצְוֺת en este contexto de alianza se vierte con naturalidad como 'mandamientos'. Se conserva el alcance total con 'todos'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre del pacto se traduce con el equivalente editorial del POB en español, 'Yahvé', para no ocultar el nombre divino tras un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - su propio Dios
  lexicon: HALOT
  rationale: El sufijo posesivo indica relación de pertenencia y pacto. 'Su Dios' es idiomático en español y conserva la referencia relacional.
- source_word: וַיַּעֲשׂוּ לָהֶם
  english_pob_choice: made for themselves
  chosen_spanish: se hicieron para sí
  alternatives_spanish:
  - se hicieron
  - hicieron para sí mismos
  lexicon: HALOT
  rationale: El dativo pronominal expresa beneficio o destinación para ellos mismos. 'Se hicieron para sí' refleja ese matiz sin sonar forzado.
- source_word: מַסֵּכָה
  english_pob_choice: cast image
  chosen_spanish: imágenes fundidas
  alternatives_spanish:
  - imagen fundida
  - ídolos fundidos
  lexicon: HALOT
  rationale: מַסֵּכָה alude a una figura hecha por fundición. En español, el plural 'imágenes fundidas' sigue la revisión del POB inglés, que entendió un sentido plural/apositivo con los becerros.
- source_word: שנים עֲגָלִים
  english_pob_choice: two calves
  chosen_spanish: dos becerros
  alternatives_spanish:
  - dos terneros
  - dos novillos
  lexicon: HALOT
  rationale: עֲגָלִים puede referirse a becerros/terneros; 'becerros' es la forma tradicional y clara para este culto del norte, y conserva la resonancia bíblica.
- source_word: אֲשֵׁירָה
  english_pob_choice: an Asherah
  chosen_spanish: una Asera
  alternatives_spanish:
  - un poste de Asera
  - la diosa Asera
  lexicon: HALOT
  rationale: El hebreo mantiene una ambigüedad entre la deidad y su objeto cultual. 'Una Asera' preserva el término hebreo sin resolver la tensión, como hace el POB inglés con 'an Asherah'.
- source_word: וַיִּשְׁתַּחֲווּ
  english_pob_choice: bowed down
  chosen_spanish: se postraron
  alternatives_spanish:
  - se inclinaron
  - se arrodillaron
  lexicon: HALOT
  rationale: El verbo denota prosternación física; 'se postraron' la expresa con precisión y evita reducirlo prematuramente al sentido general de 'adorar'.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: to all the host of heaven
  chosen_spanish: ante todo el ejército de los cielos
  alternatives_spanish:
  - ante todo el ejército celestial
  - ante toda la hueste del cielo
  lexicon: HALOT
  rationale: '''Host of heaven'' se puede verter de forma más literal como ''ejército de los cielos''. ''Ante'' ayuda a expresar el movimiento de postración delante de ellos.'
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - prestaron culto
  lexicon: HALOT
  rationale: עבד en contextos idolátricos implica servicio/culto. 'Sirvieron' preserva la distinción frente al verbo anterior 'se postraron'.
- source_word: הַבָּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Se conserva el nombre de la deidad como nombre propio en español. El artículo hebreo no se refleja porque sonaría artificial en uso corriente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto en español exige traducir el Tetragrámaton como 'Yahvé'. Esto mantiene visible el nombre pactal de Dios y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Ambigüedad de אֲשֵׁירָה
  english_pob_reading: an Asherah
  chosen_spanish_reading: una Asera
  alternative_spanish_readings:
  - un poste de Asera
  - la diosa Asera
  rationale: El texto permite tanto la referencia a la diosa como a un objeto de culto. 'Una Asera' conserva la ambigüedad documentada en el audit trail en lugar de resolverla de forma indebida.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Relación entre postración y servicio cultual
  english_pob_reading: bowed down ... and served Baal
  chosen_spanish_reading: se postraron ... y sirvieron a Baal
  alternative_spanish_readings:
  - adoraron ... y sirvieron a Baal
  - se inclinaron ... y rindieron culto a Baal
  rationale: Se conserva la diferencia verbal entre prosternarse y servir, porque el hebreo distingue acto físico de sumisión cultual. Esto evita fusionar ambos matices en un solo verbo.
  doctrine_reference: HALOT, verbos prostración y servicio idolátrico
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB inglés, que corrigió la relación entre מַסֵּכָה y שנים עֲגָלִים para reflejar mejor un sentido plural/apositivo: no ''una imagen fundida—dos becerros'', sino ''imágenes fundidas, dos becerros''. También conserva la nota de tensión interpretativa sobre Asera.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar español del proyecto.
  - '''Baal'' se mantiene como nombre propio, sin artículo español artificial.'
  - Se distingue entre 'se postraron' y 'sirvieron' para reproducir los dos verbos hebreos.
  - '''Asera'' preserva la ambigüedad cultual del hebreo y la nota de alternativa se ancla con [a].'
