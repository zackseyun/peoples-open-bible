translation:
  language: es
  text: 'Por tanto, digo[a]: «Escúchame; yo también declararé lo que sé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, dije: “Escúchame; yo también declararé lo que sé”». El hebreo perfecto אָמַרְתִּי puede leerse como pasado simple, pero en este contexto probablemente tiene fuerza performativa de presente en el discurso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: El marcador introduce una conclusión lógica a partir del contexto previo. «Por tanto» conserva esa relación inferencial con un registro claro y digno en español.
- source_word: אָמַרְתִּי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - dije
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, aquí funciona con fuerza performativa en el discurso. En español, el presente «digo» reproduce mejor esa vivacidad que el pasado simple.
- source_word: שִׁמְעָה
  english_pob_choice: Listen
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Oye
  - Atiéndeme
  lexicon: HALOT
  rationale: El imperativo singular de שׁמע pide atención directa. «Escúchame» es natural y conserva el mandato personal.
- source_word: לִּי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Con «escuchar», el español expresa el complemento directo/indirecto con clítico; «me» resulta más idiomático que una construcción más literal.
- source_word: אֲחַוֶּה
  english_pob_choice: will declare
  chosen_spanish: declararé
  alternatives_spanish:
  - diré
  - expondré
  - daré a conocer
  lexicon: HALOT
  rationale: El verbo transmite el acto de hacer saber algo de manera formal. «Declararé» conserva el tono retórico sin ampliar indebidamente el sentido a «explicar».
- source_word: דֵּעִי
  english_pob_choice: my knowledge
  chosen_spanish: mi conocimiento
  alternatives_spanish:
  - mi saber
  - mi entendimiento
  - mi opinión
  lexicon: HALOT
  rationale: El sustantivo remite al campo de «conocimiento/saber». «Mi conocimiento» es la correspondencia más directa y mantiene la carga epistémica que el texto reivindica.
- source_word: אַף אָנִי
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - aun yo
  lexicon: HALOT
  rationale: La partícula enfática incluye a Elihú entre quienes hablarán. «Yo también» reproduce bien esa adición enfática en español.
translation_notes:
  revision_awareness: 'Se siguió el hilo auditado del POB inglés: לָכֵן como conclusión, אָמַרְתִּי con fuerza performativa en presente, שִׁמְעָה como imperativo directo, אֲחַוֶּה como declaración formal y דֵּעִי como conocimiento epistémico. No se registraron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantuvo una sintaxis española natural sin suavizar la pretensión del hablante.
  - «Conocimiento» preserva mejor la afirmación de saber que opciones más interpretativas como «opinión».
  - El marcador de nota [a] se colocó en «digo» para reflejar la tensión entre presente performativo y pasado simple.
