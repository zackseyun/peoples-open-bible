translation:
  language: es
  text: Después de haber sido vendido[a], habrá redención para él; uno de sus hermanos podrá redimirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en sentido más amplio, «uno de sus parientes podrá redimirlo». El hebreo dice literalmente «uno de sus hermanos», refiriéndose a un varón de la familia que actúa como redentor de parentesco.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Luego de
  - Tras
  lexicon: HALOT
  rationale: La preposición temporal introduce la circunstancia legal en la que aplica la disposición. «Después de» expresa con naturalidad la secuencia temporal sin perder formalidad.
- source_word: נִמְכַּר
  english_pob_choice: he has been sold
  chosen_spanish: haber sido vendido
  alternatives_spanish:
  - haber sido vendido ya
  - ser vendido
  lexicon: HALOT
  rationale: 'El nifal de מכר es pasivo: «ser vendido». En español, el infinitivo compuesto encaja bien después de «después de» y conserva la anterioridad del hecho respecto de la norma siguiente.'
- source_word: גְּאֻלָּה
  english_pob_choice: redemption shall be available for him
  chosen_spanish: habrá redención para él
  alternatives_spanish:
  - tendrá redención
  - podrá ser redimido
  lexicon: HALOT
  rationale: Se conserva el sustantivo «redención» para reflejar el sustantivo hebreo y su tono jurídico. «Habrá ... para él» comunica disponibilidad o derecho sin convertir innecesariamente el sustantivo en verbo.
- source_word: תִּהְיֶה לּוֹ
  english_pob_choice: redemption shall be available for him
  chosen_spanish: habrá ... para él
  alternatives_spanish:
  - le será concedida
  - le corresponderá
  lexicon: HALOT
  rationale: La construcción existencial/legal se vierte de manera impersonal en español para mantener el sentido de disponibilidad jurídica. «Habrá» refleja bien la idea de que la redención queda abierta para él.
- source_word: אֶחָד מֵאֶחָיו
  english_pob_choice: one of his brothers
  chosen_spanish: uno de sus hermanos
  alternatives_spanish:
  - uno de sus parientes
  - uno de sus familiares
  lexicon: HALOT
  rationale: Se conserva el plural masculino explícito «hermanos», en línea con la decisión inglesa de no neutralizar el término principal en el texto base. «Parientes» se reserva como alternativa interpretativa, no como sustituto principal.
- source_word: יִגְאָלֶנּוּ
  english_pob_choice: may redeem him
  chosen_spanish: lo redimirá
  alternatives_spanish:
  - podrá redimirlo
  - lo rescatará
  lexicon: HALOT
  rationale: El verbo גאל se traduce por «redimir» para mantener la carga jurídica y teológica. En español, el futuro simple comunica adecuadamente la acción permitida/esperada en una norma legal; «rescatar» es posible, pero menos preciso para la redención de parentesco.
theological_decisions:
- issue: Relación entre redención legal y parentesco
  english_pob_reading: redemption shall be available for him; one of his brothers may redeem him
  chosen_spanish_reading: habrá redención para él; uno de sus hermanos lo redimirá
  alternative_spanish_readings:
  - se le concederá redención; uno de sus hermanos lo redimirá
  - podrá ser redimido; uno de sus hermanos lo redimirá
  rationale: La redacción conserva el carácter legal de la provisión y la mediación familiar del redentor de parentesco. No se diluye «redención» en un simple «rescate», porque el término bíblico tiene peso jurídico y covenantal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; léxico de גאל / גאולה
- issue: Alcance de אֶחָיו (sus hermanos)
  english_pob_reading: one of his brothers
  chosen_spanish_reading: uno de sus hermanos
  alternative_spanish_readings:
  - uno de sus parientes
  - uno de sus familiares
  rationale: El hebreo es explícitamente masculino plural y el contexto legal apunta a varones de la familia capacitados para actuar como redentor. Se mantiene «hermanos» en el texto principal y se deja abierta la lectura más amplia en la tradición interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del auditorio inglés al conservar una formulación sustantiva para גְּאֻלָּה («habrá redención para él») en vez de una perífrasis verbal, manteniendo también la segunda cláusula con el lenguaje de parentesco y redención. Se refleja además el matiz legal de disponibilidad, no solo de posibilidad abstracta.
  spanish_consistency_notes:
  - Se usa «redención» y «redimir» de forma coherente con el léxico POB para גאל / גאולה.
  - Se mantiene «hermanos» en sentido masculino explícito, con nota para la ampliación kinship.
  - El tono es formal y bíblico sin recurrir a calcos arcaizantes innecesarios.
