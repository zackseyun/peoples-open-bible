translation:
  language: es
  text: 'Y Hosá, de entre los hijos de Merari, tuvo hijos: Simri, el jefe; aunque[a] no era el primogénito, su padre lo hizo jefe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pues no era el primogénito»; la conjunción hebrea puede leerse también de manera explicativa, no solo concesiva.
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְחֹסָה
  english_pob_choice: And Hosah
  chosen_spanish: Y Hosá
  alternatives_spanish:
  - Y para Hosá
  - Y respecto de Hosá
  lexicon: HALOT
  rationale: El hebreo abre la nota genealógica con una partícula que enlaza el registro anterior y presenta a Hosá dentro de la lista. En español, «Y» conserva el enlace discursivo sin forzar una estructura más pesada. El nombre propio se translitera como Hosá siguiendo la forma española de nombres bíblicos.
- source_word: מִן בְּנֵי מְרָרִי
  english_pob_choice: from the sons of Merari
  chosen_spanish: de entre los hijos de Merari
  alternatives_spanish:
  - de los hijos de Merari
  - merarita
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de entre los hijos de Merari». «De entre» preserva mejor la relación de procedencia/clan que un simple genitivo español, y mantiene visible la estructura genealógica. «Merarita» sería más interpretativo y menos transparente.
- source_word: בָּנִים
  english_pob_choice: had sons
  chosen_spanish: tuvo hijos
  alternatives_spanish:
  - tuvo hijos varones
  - tenía hijos
  lexicon: HALOT
  rationale: El sustantivo hebreo «hijos» aparece en una lista genealógica donde el español necesita un verbo de posesión/existencia. «Tuvo hijos» es la expansión mínima y natural; «hijos» solo quedaría demasiado elíptico en español.
- source_word: שִׁמְרִי
  english_pob_choice: Shimri
  chosen_spanish: Shimri
  alternatives_spanish:
  - Sिमri
  lexicon: HALOT
  rationale: Nombre propio; se conserva transliterado. No se intenta traducir ni adaptar su significado, ya que el texto funciona genealógicamente.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el principal
  - el líder
  lexicon: HALOT
  rationale: En este contexto רֹאשׁ designa rango o función dentro de la familia, no la parte del cuerpo. «Jefe» comunica con claridad la idea de liderazgo sin caer en calco. «Cabeza» sería posible, pero en español suena menos natural y más semítico.
- source_word: כִּי לֹא הָיָה בְכוֹר
  english_pob_choice: though he was not the firstborn
  chosen_spanish: aunque no era el primogénito
  alternatives_spanish:
  - porque no era el primogénito
  - pues no era el primogénito
  lexicon: HALOT
  rationale: La conjunción כִּי admite lectura explicativa o concesiva. Aquí se refleja mejor el contraste de estatus con «aunque», como en la auditoría inglesa. «Primogénito» es el equivalente natural de בְכוֹר en español bíblico y contemporáneo.
- source_word: בְכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» es el término establecido y preciso para el hijo nacido primero. Evita una paráfrasis más larga sin perder exactitud.
- source_word: וַיְשִׂימֵהוּ אָבִיהוּ לְרֹאשׁ
  english_pob_choice: his father made him chief
  chosen_spanish: su padre lo hizo jefe
  alternatives_spanish:
  - su padre lo nombró jefe
  - su padre lo puso como jefe
  - su padre lo estableció como jefe
  lexicon: HALOT
  rationale: שׂים con ל expresa asignación o designación a un cargo. «Lo hizo jefe» reproduce con concisión la misma relación verbal que la versión inglesa, y enlaza bien con «el jefe» antes mencionado. «Nombró» sería válido, pero introduce un matiz más administrativo que no es necesario.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; este borrador mantiene esa lectura general y ajusta solo la naturalidad del español, preservando la ambigüedad de כִּי señalada en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «jefe» para רֹאשׁ con el mismo valor funcional que en la auditoría inglesa.
  - Se conserva la ambigüedad de כִּי mediante una nota de alternativa, sin fijar indebidamente solo el valor causal.
  - Los nombres propios se transliteran de forma consistente y no se traducen.
