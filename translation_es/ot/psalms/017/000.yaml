source:
  edition: WLC
  text: תְּפִלָּ֗ה לְ/דָ֫וִ֥ד שִׁמְעָ֤/ה יְהוָ֨ה צֶ֗דֶק הַקְשִׁ֥יבָ/ה רִנָּתִ֗/י הַאֲזִ֥ינָ/ה תְפִלָּתִ֑/י בְּ֝/לֹ֗א שִׂפְתֵ֥י מִרְמָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/017/000.yaml
  text: A prayer of David. Hear righteousness[a], Yahweh; pay attention to my cry; give ear to my prayer from lips without deceit.
  footnotes:
  - marker: a
    text: Or 'Hear righteousness'—that is, hear what is right or just. The Hebrew צֶדֶק can denote righteousness, justice, or a just cause; here it likely refers to the psalmist's righteous case.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:18Z'
    unchanged: false
    changes_summary: Completed the verse beyond the superscription, adding the addressed petition clauses and preserving Yahweh. Rendered the final phrase naturally as 'from lips without deceit.'
translation:
  language: es
  text: Oración de David. Escucha, Yahvé, una causa justa[a]; atiende a mi clamor; presta oído a mi oración de labios sin engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escucha la justicia». El hebreo צֶדֶק puede referirse a justicia, rectitud o a una causa justa; aquí probablemente alude al caso justo del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer
  chosen_spanish: Oración
  alternatives_spanish:
  - Plegaria
  - Súplica
  lexicon: תְּפִלָּה
  rationale: «Oración» es el equivalente natural y culto en español para una composición devocional dirigida a Dios, sin añadir matices no presentes en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: יהוה
  rationale: Se mantiene el nombre divino con la forma de proyecto «Yahvé», conforme a la norma del POB en español y al texto fuente hebreo.
- source_word: צֶדֶק
  english_pob_choice: righteousness / a just cause
  chosen_spanish: una causa justa
  alternatives_spanish:
  - justicia
  - rectitud
  - una causa recta
  lexicon: צֶדֶק
  rationale: En este contexto, la petición no parece ser «escucha la justicia» en abstracto, sino que Yahvé escuche la causa del orante; por eso se adopta una expresión natural en español que conserva la fuerza forense/ética de צֶדֶק.
- source_word: רִנָּה
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi voz
  - mi súplica
  lexicon: רִנָּה
  rationale: «Clamor» recoge bien el valor de un llamado intenso y audible sin reducirlo a un simple «grito» ni a una mera plegaria interna.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - inclina tu oído
  - da oído
  lexicon: אזן
  rationale: «Presta oído» es claro y digno en español; conserva la imagen hebrea de atención deliberada sin sonar arcaico.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi súplica
  lexicon: תְּפִלָּה
  rationale: Se mantiene la traducción consistente con el inicio del versículo y con el registro litúrgico natural del español.
- source_word: שִׂפְתֵי מִרְמָה
  english_pob_choice: lips without deceit
  chosen_spanish: de labios sin engaño
  alternatives_spanish:
  - de labios sin fraude
  - de labios sin mentira
  lexicon: שָׂפָה / שְׂפָתַיִם + מִרְמָה
  rationale: La construcción española reproduce el hebraísmo de procedencia («de labios...») y expresa fielmente la ausencia de engaño sin exagerar el alcance moral del término.
theological_decisions:
- issue: Sentido de צֶדֶק en la invocación inicial
  english_pob_reading: Hear righteousness, Yahweh; … The Hebrew צֶדֶק can denote righteousness, justice, or a just cause; here it likely refers to the psalmist's righteous case.
  chosen_spanish_reading: Escucha, Yahvé, una causa justa
  alternative_spanish_readings:
  - Escucha la justicia, Yahvé
  - Escucha, Yahvé, mi justicia
  rationale: El hebreo admite varias lecturas, pero el contexto de súplica judicial/devocional favorece entender una causa o caso justo presentado ante Dios. La traducción conserva esa tensión sin cerrar indebidamente el sentido.
  doctrine_reference: Salmo 17:1; uso semántico de צֶדֶק en contexto judicial y devocional
- issue: Nombre divino en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El POB en español debe reflejar el nombre propio del texto hebreo. Se evita el reemplazo litúrgico por «SEÑOR» para no borrar la referencia explícita a יהוה.
  doctrine_reference: Éxodo 3:15; convención editorial POB para יהוה
- issue: 'Última cláusula: integridad verbal del orante'
  english_pob_reading: from lips without deceit
  chosen_spanish_reading: de labios sin engaño
  alternative_spanish_readings:
  - con labios sin engaño
  - de labios sin mentira
  rationale: La frase se entiende mejor en español como una caracterización de la oración que procede de labios honestos. «De labios sin engaño» conserva la relación sintáctica del hebreo sin forzar una paráfrasis interpretativa.
  doctrine_reference: Salmo 17:1; integridad del habla en la piedad bíblica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que el auditorio inglés revisó la cláusula inicial y la reordenó para reflejar mejor la vocación hebrea. En español se siguió esa misma lógica: el vocativo «Yahvé» va intercalado naturalmente en la primera petición, y se preservó la ambigüedad de צֶדֶק mediante una solución que puede leerse tanto judicial como moralmente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al proyecto.
  - Se usó «oración» para תְּפִלָּה de manera consistente en todo el versículo.
  - Se evitó «siervo» o términos eclesiásticos no presentes en el hebreo.
  - La puntuación busca reflejar las tres peticiones paralelas del hebreo sin introducir subordinación excesiva.
  - La nota de pie de página se ancla solo en la expresión con posible ambigüedad lexical, no en el resto del versículo.
