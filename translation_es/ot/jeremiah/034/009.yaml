    rationale: En español, 'esclava' ya marca el femenino; añadir 'mujer' resulta redundante y poco idiomático. Si se quiere reflejar el contraste explícito, 'su esclava' basta, dado que el par 'el hebreo y la hebrea' ya preserva la distinción sexual del original.
  - severity: low
    issue: '''su esclavo varón'' es comprensible pero rígido'
    rationale: Aunque reproduce el contraste con el femenino inglés, en español suena mejor 'su esclavo'. La distinción de género sigue presente por contraste con 'su esclava' y por 'el hebreo y la hebrea'.
  revised_spanish_text: para que cada hombre dejara libre a su esclavo y cada hombre a su esclava, el hebreo y la hebrea, para que quedaran libres, de modo que ninguno esclavizara a un judío, su hermano, entre ellos.[a]
