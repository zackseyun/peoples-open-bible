translation:
  language: es
  text: Frente al mal está el bien, y frente a la muerte, la vida; así, frente al piadoso, el pecador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - en contraste con
  - frente de
  lexicon: LSJ
  rationale: La preposición repetida organiza el verso como una serie de pares antitéticos. «Frente a» comunica bien la relación de oposición sin sonar tan rígido como un calco directo, y mantiene el ritmo proverbial en español.
- source_word: τοῦ κακοῦ
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  - el mal moral
  lexicon: LSJ
  rationale: «Mal» conserva el contraste moral directo con «bien» y funciona de manera natural como sustantivo en español. «Maldad» sería más abstracto, y «lo malo» debilita el paralelismo.
- source_word: τὸ ἀγαθόν
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bueno
  lexicon: LSJ
  rationale: En español, «el bien» es la contraparte moral más natural de «el mal» y preserva la estructura sentenciosa del original. «Lo bueno» suena más cualitativo que proverbial.
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  lexicon: LSJ
  rationale: Traducción directa y unívoca en el paralelismo con «vida».
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: LSJ
  rationale: Traducción directa y unívoca; el artículo definido ayuda al equilibrio formal con «la muerte».
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - por tanto
  lexicon: LSJ
  rationale: «Así» introduce con naturalidad la aplicación proverbial de los dos pares anteriores y conserva la cadencia del griego.
- source_word: εὐσεβοῦς
  english_pob_choice: the godly
  chosen_spanish: el piadoso
  alternatives_spanish:
  - el justo
  - el devoto
  - el temeroso de Dios
  lexicon: LSJ
  rationale: El adjetivo εὐσεβής apunta a piedad/devoción reverente. «Piadoso» es la opción más cercana y comprensible en español bíblico sin introducir la carga más técnica de «justo». Se mantiene el singular substantivado del griego.
- source_word: ἁμαρτωλός
  english_pob_choice: sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el que peca
  - el impío
  lexicon: LSJ
  rationale: «Pecador» es el equivalente usual del sustantivo/adjetivo ἁμαρτωλός y reproduce el contraste personal singular con «el piadoso».
theological_decisions:
- issue: Cómo reflejar el sustantivo/adjetivo singular masculino εὐσεβοῦς sin masculinizar de más ni perder la simetría proverbial
  english_pob_reading: the godly
  chosen_spanish_reading: el piadoso
  alternative_spanish_readings:
  - el piadoso hombre
  - el devoto
  - el justo
  rationale: El griego usa un singular masculino substantivado en paralelo con ἁμαρτωλός. «El piadoso» conserva ese singular personal sin añadir «hombre», que sería innecesario en español y más interpretativo. También evita la abstracción pluralizada que podría diluir la sentencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Mantener el contraste sapiencial moral sin suavizar la oposición del texto
  english_pob_reading: Opposite evil is good, and opposite death is life; so opposite the godly is the sinner.
  chosen_spanish_reading: Frente al mal está el bien, y frente a la muerte, la vida; así, frente al piadoso, el pecador.
  alternative_spanish_readings:
  - Opuesto al mal está el bien, y opuesta a la muerte la vida; así, opuesto al piadoso, el pecador.
  - Frente al mal está el bien, y frente a la muerte la vida; así, frente al piadoso está el pecador.
  rationale: La forma proverbial del pasaje se preserva mejor con pares directos y simétricos. La traducción elegida mantiene la oposición moral fuerte y la estructura de máximas breves, sin añadir elementos no presentes en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete con alta concordancia y toma en cuenta la revisión inglesa que prefirió «the godly» frente a «a godly man» para reflejar el singular substantivado; en español se resuelve con «el piadoso», manteniendo el paralelo con «el pecador» sin introducir un sustantivo adicional.
  spanish_consistency_notes:
  - Se preserva el tono sapiencial conciso del original.
  - Se mantiene la oposición léxica bien/mal y vida/muerte de forma paralela.
  - «Piadoso» se usa aquí como equivalente de εὐσεβής; no se emplea «santo» ni «justo» porque desplazarían el matiz semántico.
  - No se añaden notas al pie porque el español no requiere una alternativa textual adicional para este verso.
