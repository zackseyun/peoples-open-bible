translation:
  language: es
  text: 'Entonces ellas se acercaron delante de Eleazar el sacerdote, delante de Josué hijo de Nun y delante de los líderes, diciendo: «Yahvé mandó a Moisés darnos una herencia entre nuestros hermanos[a]». Así les dio, conforme al mandato de Yahvé[b], una herencia entre los hermanos de su padre[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre nuestros hermanos»; las hijas piden una porción dentro del reparto asignado a los varones de su clan.'
    reason: cultural_note
  - marker: b
    text: Más literalmente, «según la boca de Yahvé». El modismo hebreo expresa conformidad con su mandato.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los hermanos de su padre», es decir, dentro de la rama paterna del clan.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּקְרַבְנָה
  english_pob_choice: they came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se presentaron
  - se acercaron para comparecer
  lexicon: HALOT
  rationale: El verbo קרב expresa acercamiento físico o formal. En este contexto judicial/público, 'se acercaron' comunica bien la comparecencia ante las autoridades sin añadir explicaciones innecesarias.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: '''Delante de'' mantiene la repetición formal del hebreo y resulta natural en español. ''Ante'' sería también posible, pero aquí la duplicación retórica suena más fluida con ''delante de''.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-altar
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן designa el oficio sacerdotal; 'sacerdote' es la equivalencia directa y clara en español. No hay motivo para ampliar ni para usar terminología eclesiástica distinta.
- source_word: הַנְּשִׂיאִים
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los jefes tribales
  lexicon: HALOT
  rationale: נְשִׂיאִים se refiere a dirigentes comunitarios o tribales. 'Líderes' evita la carga monárquica de 'príncipes' y coincide con la decisión auditada en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino יהוה. En la política española del proyecto, la forma principal es 'Yahvé', que preserva el nombre propio en vez de sustituirlo por un título.
- source_word: צִוָּה אֶת מֹשֶׁה
  english_pob_choice: commanded Moses
  chosen_spanish: mandó a Moisés
  alternatives_spanish:
  - ordenó a Moisés
  - dio mandato a Moisés
  lexicon: HALOT
  rationale: צוה tiene fuerza imperativa. 'Mandó a Moisés' conserva el valor verbal directo; se evita un giro demasiado pesado y se mantiene la relación agente-receptor del mandato.
- source_word: לָתֶת לָנוּ נַחֲלָה
  english_pob_choice: to give us an inheritance
  chosen_spanish: darnos una herencia
  alternatives_spanish:
  - darnos una heredad
  - darnos una posesión hereditaria
  lexicon: HALOT
  rationale: נַחֲלָה en Josué es la porción hereditaria de tierra/asignación. 'Herencia' mantiene la palabra tradicional del proyecto en español y comunica bien la idea de una porción asignada por derecho familiar/covenantal.
- source_word: בְּתוֹךְ אַחֵינוּ
  english_pob_choice: among our brothers
  chosen_spanish: entre nuestros hermanos
  alternatives_spanish:
  - entre nuestros parientes varones
  - entre nuestros hermanos varones
  lexicon: HALOT
  rationale: La frase debe conservar la referencia masculina específica del hebreo, porque las hijas están pidiendo una porción dentro del reparto de los varones de su clan. 'Entre nuestros hermanos' es fiel y natural; la nota aclara la fuerza inclusiva dentro del clan.
- source_word: וַיִּתֵּן
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - dio
  - les concedió
  lexicon: HALOT
  rationale: El verbo simple נתן se rinde naturalmente con 'dio'. Se explicita el dativo con 'les' para claridad en español sin alterar el sentido del hebreo.
- source_word: אֶל פִּי יְהוָה
  english_pob_choice: according to the command of Yahweh
  chosen_spanish: conforme al mandato de Yahvé
  alternatives_spanish:
  - según el mandato de Yahvé
  - de acuerdo con la orden de Yahvé
  lexicon: HALOT
  rationale: El hebreo idiomático 'según la boca de Yahvé' expresa conformidad con su mandato/orden. 'Conforme al mandato de Yahvé' reproduce la fuerza normativa sin calcar una imagen extraña en español.
- source_word: אֲחֵי אֲבִיהֶן
  english_pob_choice: their father's brothers
  chosen_spanish: los hermanos de su padre
  alternatives_spanish:
  - sus tíos paternos
  - los parientes de su padre
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'los hermanos de su padre'. Esa forma preserva el parentesco exacto y deja que el lector perciba la estructura clanica del reparto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto, no un título sustituto. La forma española de referencia del proyecto es 'Yahvé', coherente con la decisión auditada de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Kinship phrase אַחֵינוּ in a request for inheritance
  english_pob_reading: among our brothers
  chosen_spanish_reading: entre nuestros hermanos
  alternative_spanish_readings:
  - entre nuestros parientes
  - entre nuestros hermanos varones
  rationale: 'Se mantiene la especificidad de género y de reparto tribal: las hijas solicitan participar en la porción asignada a los varones de su familia. No se neutraliza el término porque el contexto legal es parte del sentido.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Specific kinship structure אֲחֵי אֲבִיהֶן
  english_pob_reading: their father's brothers
  chosen_spanish_reading: los hermanos de su padre
  alternative_spanish_readings:
  - sus tíos paternos
  - los parientes de su padre
  rationale: La frase hebrea no dice simplemente 'familia' ni 'tíos', sino el vínculo fraterno del padre. Mantenerlo evita perder la precisión del reparto entre ramas paternas del clan.
  doctrine_reference: Apoyo lexical de HALOT para relaciones de parentesco
translation_notes:
  revision_awareness: 'La redacción sigue la lectura auditada más reciente del inglés POB: ''according to the command of Yahweh'' para אֶל־פִּי יְהוָה, evitando calcos excesivos y manteniendo el registro formal. También conserva la precisión de parentesco y la visibilidad del nombre divino, como en la revisión y el consenso de alto acuerdo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la política española del proyecto.
  - Se mantiene 'herencia' para נַחֲלָה porque en Josué designa la porción hereditaria asignada por el reparto territorial.
  - '''Líderes'' traduce נְשִׂיאִים sin recurrir a ''príncipes'', que introduciría una connotación ajena al contexto.'
  - La frase 'los hermanos de su padre' preserva la estructura de parentesco del hebreo y la organización clanica del pasaje.
