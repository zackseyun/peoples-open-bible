translation:
  language: es
  text: Los demás hechos de Jeroboam[a], y todo lo que hizo, y su poderío, cómo combatió, y cómo restauró Damasco y Hamat a Judá en Israel, ¿no están escritos en el Libro de las Crónicas de los Reyes de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Judá en Israel». La frase es difícil. Puede significar territorio restaurado para Israel que antes había pertenecido a Judá, o bien conservar una designación geopolítica más antigua. El texto principal mantiene el giro hebreo sin resolver la ambigüedad.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֶתֶר דִּבְרֵי
  english_pob_choice: Now the rest of the acts of
  chosen_spanish: Ahora, el resto de los hechos de
  alternatives_spanish:
  - Ahora, el resto de los actos de
  - Ahora, lo demás de los hechos de
  - Y el resto de los hechos de
  lexicon: HALOT
  rationale: En esta fórmula regia de resumen, דִּבְרֵי no es solo 'palabras' sino el conjunto de hechos/relatos del reinado. 'Hechos' transmite bien el valor historiográfico en español sin volverlo demasiado libre.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: '''Hizo'' conserva la amplitud de עָשָׂה con una construcción natural en español y mantiene el carácter general del resumen.'
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might
  chosen_spanish: y su poder
  alternatives_spanish:
  - y su valentía
  - y su fuerza
  - y sus hazañas
  lexicon: HALOT
  rationale: En este contexto militar, גְּבוּרָה puede abarcar fuerza, valor o potencia bélica. 'Poder' es breve y amplio, y permite que la siguiente cláusula especifique la expresión concreta de ese poder al guerrear.
- source_word: אֲשֶׁר נִלְחָם
  english_pob_choice: how he fought
  chosen_spanish: cómo guerreó
  alternatives_spanish:
  - cómo peleó
  - que combatió
  - cómo hizo la guerra
  lexicon: HALOT
  rationale: El hebreo explica en qué consistió su 'poder'. 'Guerreó' mantiene el matiz bélico de נִלְחָם y su relación explicativa con la frase anterior, sin sonar demasiado coloquial.
- source_word: וַאֲשֶׁר הֵשִׁיב
  english_pob_choice: and how he restored
  chosen_spanish: y cómo restituyó
  alternatives_spanish:
  - y cómo restauró
  - y cómo recuperó
  - y cómo devolvió
  lexicon: HALOT
  rationale: הֵשִׁיב aquí tiene fuerza de 'restaurar' o 'hacer volver' en un contexto territorial-político. 'Restituyó' preserva esa idea de recuperación/retorno con tono sobrio y formal.
- source_word: אֶת דַּמֶּשֶׂק וְאֶת חֲמָת
  english_pob_choice: Damascus and Hamath
  chosen_spanish: Damasco y Hamat
  alternatives_spanish:
  - Damasco y Jamat
  - Damasco y Hamat
  lexicon: HALOT
  rationale: Se mantienen los topónimos en forma usual en español. 'Hamat' sigue la transliteración más extendida en español bíblico; 'Damasco' es la forma estándar.
- source_word: לִיהוּדָה בְּיִשְׂרָאֵל
  english_pob_choice: to Judah in Israel
  chosen_spanish: a Judá en Israel
  alternatives_spanish:
  - para Judá en Israel
  - a Judá, en Israel
  - a Judá que estaba en Israel
  lexicon: HALOT
  rationale: El hebreo es breve y ambiguo; se conserva la misma tensión sin resolverla. 'A Judá en Israel' refleja la concatenación de los términos y evita imponer una aclaración interpretativa que el texto no da.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿acaso no están escritos
  - ¿no se hallan escritos
  lexicon: HALOT
  rationale: La pregunta retórica final sigue la fórmula convencional de los libros de Reyes. 'Están escritos' conserva el pasivo y el tono archivístico.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el Libro de las Crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de los acontecimientos
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'sobre el libro de los asuntos de los días', el español bíblico reconoce bien el título archivístico tradicional. 'Crónicas' mantiene el sentido de registro histórico y la relación con la fórmula regia.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los Reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  lexicon: HALOT
  rationale: En el título del documento, la relación de לְ se expresa naturalmente con 'de'. Se conserva el valor de nombre archivístico sin convertirlo en una preposición final.
theological_decisions:
- issue: 'La frase territorial final es ambigua: לִיהוּדָה בְּיִשְׂרָאֵל.'
  english_pob_reading: The main text keeps the Hebrew wording as closely as possible without resolving the ambiguity.
  chosen_spanish_reading: a Judá en Israel
  alternative_spanish_readings:
  - para Judá en Israel
  - a Judá que estaba en Israel
  - a Judá, en Israel
  rationale: No se debe armonizar la expresión ni explicarla demasiado en el texto principal. La redacción española conserva la misma ambigüedad y la relación compacta entre Judá e Israel, tal como hace el inglés POB.
  doctrine_reference: Principio de transparencia textual y prudencia exegética en pasajes históricamente ambiguos.
translation_notes:
  revision_awareness: Se revisó el precedente inglés y se conservó su decisión principal de mantener la tensión de la frase territorial final sin interpretación explicativa en el cuerpo del texto. No hubo cambios aplicados en la revisión más reciente del registro inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Judá' e 'Israel' como nombres propios sin reinterpretación teológica adicional.
  - '''Crónicas'' se conserva como título archivístico convencional para no perder la fórmula regia del hebreo.'
