  text: וַ/יַּ֧עַשׂ אֶת הַ/חֹ֛שֶׁן מַעֲשֵׂ֥ה חֹשֵׁ֖ב כְּ/מַעֲשֵׂ֣ה אֵפֹ֑ד זָהָ֗ב תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן וְ/תוֹלַ֥עַת שָׁנִ֖י וְ/שֵׁ֥שׁ מָשְׁזָֽר־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/039/008.yaml
  text: 'He made the breastpiece[a], the work of a skillful designer, like the work of the ephod: of gold, blue, purple, scarlet yarn[b], and finely twisted linen.'
  footnotes:
  - marker: a
    text: Or "the work of an artistic weaver" for "the work of a skillful designer." The Hebrew phrase emphasizes skilled patterned craftsmanship.
    reason: lexical_alternative
  - marker: b
    text: Traditionally "breastplate." "Breastpiece" is used here to avoid suggesting metal armor.
    reason: lexical_alternative
