    reference: Sirach 16:3
translation:
  text: Do not trust in their life[a], and do not rely on their future; for one who does what is pleasing is better than a thousand[c][b], and to die childless than to have many children in unrighteousness and a lawless end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''do not fix on their place'' or ''do not rely on their position,'' where the Hebrew reads ''their future/outcome.'''
    reason: textual_variant
  - marker: b
    text: Or 'one who does the will'; the Hebrew likely implies doing what is pleasing to God, though 'to God' is not explicit.
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be understood as 'than from a presumptuous/wicked end.' The Hebrew wording is compressed and somewhat difficult, but it contrasts childless death with many children marked by wrongdoing and a bad end.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּאֲמִין
  chosen: Do not trust
  alternatives:
  - Do not believe
  - Do not put confidence in
  lexicon: HALOT
  rationale: The Hifil of אמן here takes a preposition and concerns placing confidence rather than mere intellectual belief. 'Trust' is natural English and matches the warning sense.
- source_word: בְּחַיֵּיהֶם
  chosen: in their life
  alternatives:
  - in their lives
  - in their lifetime
  lexicon: HALOT
  rationale: Hebrew חַיִּים can function as 'life' or 'lives.' The singular collective 'life' keeps the idiom concise, though the referent is plural. It points to the apparent vitality/prosperity of the wicked offspring in context.
- source_word: וְאַל תִּבְטַח
  chosen: and do not rely on
  alternatives:
  - and do not trust
  - and do not be secure in
  lexicon: HALOT
  rationale: בטח overlaps with 'trust,' so varying to 'rely on' avoids awkward repetition while preserving the sense of depending on something for security.
- source_word: בְּעִקְבוֹתָם
  chosen: their future
  alternatives:
  - their end
  - their outcome
  - their footsteps
  lexicon: HALOT
  rationale: The Hebrew literally relates to what comes after/at the heel, hence sequel or outcome. The immediately following phrase 'there will not be for them a good end' supports an outcome/future sense rather than literal footsteps. The Greek parallel's 'place' appears to reflect a different understanding, but the Hebrew context favors 'future' or 'outcome.'
- source_word: אַחֲרִית טוֹבָה
  chosen: a good end
  alternatives:
  - a good future
  - a good outcome
  lexicon: HALOT
  rationale: אַחֲרִית commonly denotes end, latter end, or outcome. Although not carried as a separate clause in the final English, it informs the rendering of בְּעִקְבוֹתָם as 'future' and the concluding 'lawless end.'
- source_word: טוֹב אֶחָד
  chosen: one ... is better than a thousand
  alternatives:
  - one good man is better than a thousand
  - one is better than a thousand
  lexicon: HALOT
  rationale: The Hebrew is elliptical. The Greek confirms the comparative sense 'one is better than a thousand.' I supplied 'one who does what is pleasing' from the following participle to make the English complete without over-paraphrasing.
- source_word: עוֹשֶׂה רָצוֹן
  chosen: who does what is pleasing
  alternatives:
  - who does the will
  - who does what is acceptable
  - who does what is desired
  lexicon: HALOT
  rationale: רָצוֹן can mean favor, acceptance, or will. In wisdom context it likely means what is pleasing/acceptable to God, but the object is not explicit. 'Does what is pleasing' preserves the moral-religious sense without adding 'to God' into the main text.
- source_word: עֲרִירִי
  chosen: childless
  alternatives:
  - without children
  - bereft of children
  lexicon: HALOT
  rationale: The term denotes being stripped of children or lacking offspring. 'Childless' is the clearest modern equivalent.
- source_word: בְּעַוְלָה
  chosen: in unrighteousness
  alternatives:
  - in injustice
  - wickedly
  lexicon: HALOT
  rationale: עַוְלָה denotes wrongdoing, injustice, or unrighteousness. 'In unrighteousness' preserves the noun's moral quality and fits the phrase about children characterized by wickedness.
- source_word: זָדוֹן
  chosen: lawless
  alternatives:
  - arrogant
  - presumptuous
  - wicked
  lexicon: HALOT
  rationale: זָדוֹן often carries the sense of insolence or presumptuous wickedness. In the phrase 'a lawless end,' 'lawless' communicates morally defiant evil in readable English, though 'presumptuous' is a possible nuance.
- source_word: μὴ ἔπεχε ἐπὶ τὸν τόπον αὐτῶν
  chosen: do not rely on their future
  alternatives:
  - do not hold fast to their place
  - do not attend to their position
  lexicon: BDAG
  rationale: The Greek parallel diverges from the Hebrew, reading 'place' rather than 'outcome/future.' Because the Hebrew is the primary witness where extant, the main text follows Hebrew; the Greek alternative is preserved in a footnote as a notable variant in sense.
