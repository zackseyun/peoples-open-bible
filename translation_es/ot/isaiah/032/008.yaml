translation:
  language: es
  text: Pero un hombre noble planea cosas nobles[a][b], y él permanece en pie sobre cosas nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘planea cosas generosas’ y ‘sobre cosas generosas permanece en pie’. El hebreo נָדִיב / נְדִיבוֹת puede expresar nobleza o generosidad.
    reason: lexical_alternative
  - marker: b
    text: O ‘y por cosas nobles permanece en pie’ o ‘y está establecido en cosas nobles’. La expresión hebrea con עַל ... יָקוּם es concisa y permite más de un matiz cercano.
    reason: alternative_reading
lexical_decisions:
- source_word: נָדִיב
  english_pob_choice: a noble man
  chosen_spanish: un hombre noble
  alternatives_spanish:
  - una persona noble
  - el generoso
  - el príncipe
  lexicon: HALOT
  rationale: נָדִיב puede expresar nobleza, generosidad o rango principesco. Aquí, por el contraste literario con el hombre vil del contexto inmediato, “hombre noble” conserva el valor moral-social y la forma masculina singular sin forzar un rango político específico. “Hombre” mantiene la referencia masculina del sustantivo/adjetivo hebreo.
- source_word: נְדִיבוֹת
  english_pob_choice: noble things
  chosen_spanish: cosas nobles
  alternatives_spanish:
  - cosas generosas
  - acciones nobles
  - obras nobles
  lexicon: HALOT
  rationale: El plural abstracto admite la idea de cosas, intenciones o actos nobles/generosos. “Cosas nobles” reproduce la repetición con נָדִיב y conserva amplitud semántica. “Generosas” es posible, pero en español “nobles” mantiene mejor el contraste ético del pasaje.
- source_word: יָעָץ
  english_pob_choice: plans
  chosen_spanish: planea
  alternatives_spanish:
  - aconseja
  - delibera
  - propone
  lexicon: HALOT
  rationale: El verbo puede significar aconsejar o planear. Aquí el sujeto forma propósitos, por lo que “planea” comunica con naturalidad la acción intencional sin alejarse del valor verbal de aconsejar/idear.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - por
  - apoyado en
  lexicon: HALOT
  rationale: La preposición con קום es idiomática y admite la imagen de estar de pie o establecido sobre algo. “Sobre” conserva esa imagen hebrea y permite la lectura de estabilidad o apoyo.
- source_word: יָקוּם
  english_pob_choice: he stands
  chosen_spanish: se mantiene firme
  alternatives_spanish:
  - se pone de pie
  - permanece
  - está establecido
  lexicon: HALOT
  rationale: קוּם literalmente es “levantarse / ponerse de pie”, pero en este contexto expresa permanencia firme o establecimiento. “Se mantiene firme” preserva la fuerza concreta del verbo y hace clara la idea ética de perseverar en lo noble.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al hacer explícito el sujeto de la segunda cláusula. El español conserva el paralelismo del hebreo, la repetición de נָדִיב / נְדִיבוֹת y la ambigüedad controlada de עַל ... יָקוּם.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ o terminología tradicional no presente en este versículo, porque el texto hebreo no contiene el nombre divino.
  - Se prefirió un español moderno y claro, pero sin paraphrasear más allá de lo que permite el hebreo.
  - Las notas al pie preservan las alternativas léxicas y de lectura que el audit trail documenta.
