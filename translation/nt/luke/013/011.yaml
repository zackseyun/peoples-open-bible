id: LUK.13.11
reference: Luke 13:11
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ⸀γυνὴ πνεῦμα ἔχουσα ἀσθενείας ἔτη ⸀δεκαοκτώ, καὶ ἦν συγκύπτουσα καὶ μὴ δυναμένη ἀνακύψαι εἰς τὸ παντελές.
translation:
  text: And behold[a], there was a woman who had a spirit of infirmity for eighteen years, and she was bent over and unable to straighten up completely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a disabling spirit' or 'a spirit of infirmity.' The Greek explicitly mentions 'spirit,' which may denote spiritual agency in her affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  lexicon: BDAG
  rationale: Rendered as the attention-getting interjection 'look' to preserve the vividness of the narrative in readable modern English; 'behold' is more traditional but archaic for the target audience.
- source_word: γυνὴ
  chosen: a woman
  lexicon: BDAG
  rationale: Indefinite in context, introducing a female individual into the scene.
- source_word: πνεῦμα ἔχουσα ἀσθενείας
  chosen: who had a spirit of weakness
  alternatives:
  - who had a disabling spirit
  - who had a spirit of infirmity
  lexicon: BDAG
  rationale: The Greek literally combines 'spirit' with a genitive 'of weakness/infirmity.' The wording preserves the text's explicit reference to a spirit without over-interpreting whether this is direct demonic possession or a spirit-caused affliction. 'Weakness' reflects ἀσθένεια broadly; alternatives are viable but either more interpretive ('disabling') or more traditional ('infirmity').
- source_word: ἀσθενείας
  chosen: weakness
  alternatives:
  - infirmity
  - illness
  lexicon: BDAG
  rationale: Chose 'weakness' as a natural gloss that preserves the broad semantic range of physical debility. 'Infirmity' is accurate but less current; 'illness' is possible but narrows the sense.
- source_word: ἔτη δεκαοκτώ
  chosen: for eighteen years
  alternatives:
  - eighteen years
  lexicon: BDAG
  rationale: English idiom normally supplies 'for' with duration, making the temporal extent explicit.
- source_word: συγκύπτουσα
  chosen: bent over
  alternatives:
  - bent double
  - stooped over
  lexicon: BDAG
  rationale: Conveys the woman's physical condition in clear modern English. 'Bent double' is vivid but slightly more interpretive in degree; 'stooped over' is possible but less forceful.
- source_word: μὴ δυναμένη ἀνακύψαι
  chosen: unable to straighten up
  alternatives:
  - not able to stand upright
  - unable to raise herself up
  lexicon: BDAG
  rationale: Captures both inability and the sense of returning to an upright posture. 'Straighten up' is idiomatic and fits the physical context.
- source_word: εἰς τὸ παντελές
  chosen: completely
  alternatives:
  - fully
  - altogether
  lexicon: BDAG
  rationale: 'This phrase intensifies the inability: she could not straighten up fully. ''Completely'' is natural and precise in context.'
