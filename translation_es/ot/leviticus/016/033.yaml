translation:
  language: es
  text: Así[a] hará expiación por el santuario santo, por la Tienda del Encuentro y por el altar; hará expiación por los sacerdotes y por todo el pueblo de la asamblea[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hará expiación / purgará»; en este contexto cultual, el verbo hebreo כפר puede enfatizar la remoción de impureza además de la expiación.
    reason: lexical_alternative
  - marker: b
    text: «Pueblo de la asamblea» también puede rendirse como «pueblo de la congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר / יְכַפֵּר
  english_pob_choice: make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonamiento
  - hará propiciación
  - hará expiación por
  lexicon: HALOT
  rationale: En este contexto cultual de Levítico, כפר expresa la acción ritual sobre objetos sagrados y personas. «Hará expiación» conserva la fuerza técnica del verbo sin reducirlo a una sola teoría doctrinal; además, en español suena natural y bíblico. Se evita «atonamiento» por ser menos transparente, y «propiciación» por ser más interpretativo.
- source_word: מִקְדַּשׁ הַקֹּדֶשׁ
  english_pob_choice: the Holy Sanctuary
  chosen_spanish: el santuario del lugar santo
  alternatives_spanish:
  - el santuario santo
  - el santuario de santidad
  - el lugar santísimo
  lexicon: HALOT
  rationale: La expresión hebrea combina «santuario» con «lo santo/la santidad». El inglés POB opta por «Holy Sanctuary» sin identificar explícitamente «Most Holy Place». En español, «el santuario del lugar santo» conserva la relación literal y el matiz cultual sin sobreespecificar; «lugar santísimo» sería una interpretación más fuerte de la que el hebreo aquí exige.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the Tent of Meeting
  chosen_spanish: la Tienda del Encuentro
  alternatives_spanish:
  - la Tienda de Reunión
  - el Tabernáculo del Encuentro
  - la tienda de reunión
  lexicon: HALOT
  rationale: «Tienda del Encuentro» es la forma más transparente y asentada para אֹהֶל מוֹעֵד en español, preservando la imagen de la tienda y su función cultual. «Tabernáculo» es posible, pero aquí «Tienda» sigue de cerca el hebreo y evita una terminología más tradicional que no aporta precisión adicional.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT
  rationale: Término cultual directo y estándar en español bíblico. «Ara» sería más litúrgico y menos transparente.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - para
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: Con כפר, עַל se entiende idiomáticamente como la relación sobre la cual se efectúa la expiación. «Por» reproduce bien la construcción española con «hacer expiación por» y mantiene la repetición del hebreo.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Correspondencia directa y común en español. «Sacerdotes» es el equivalente natural de כוהנים; no hay motivo para introducir un término eclesiástico posterior.
- source_word: כָּל עַם הַקָּהָל
  english_pob_choice: all the people of the assembly
  chosen_spanish: todo el pueblo de la asamblea
  alternatives_spanish:
  - todo el pueblo de la congregación
  - todo el pueblo reunido
  - todo el pueblo de la congregación reunida
  lexicon: HALOT
  rationale: El hebreo une «pueblo» y «asamblea» para destacar la corporatividad del grupo. «Asamblea» preserva la dimensión de reunión colectiva que el inglés POB también quiso resguardar con «assembly». Se evita «congregación» como término eclesial más marcado y menos neutral.
theological_decisions:
- issue: Repetición de כפר aplicada tanto a objetos sagrados como a personas
  english_pob_reading: Use the same English expression 'make atonement for' across sanctuary, tent, altar, priests, and people.
  chosen_spanish_reading: Usar la misma expresión «hacer expiación por» en todos los casos, para el santuario, la Tienda, el altar, los sacerdotes y el pueblo.
  alternative_spanish_readings:
  - variar con «purificar» para los objetos sagrados y «hacer expiación por» para las personas
  - variar con «reconciliar» en el caso de personas
  rationale: El hebreo repite deliberadamente כפר en todos los miembros del versículo. Mantener una fórmula repetida en español evita dividir artificialmente el rito entre purificación de objetos y expiación de personas. «Hacer expiación» conserva la unidad teológica y ritual del pasaje.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el borrador español sigue la lectura final estable del texto fuente y conserva la repetición de כפר sin introducir divisiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando el hebreo lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se preserva la terminología cultual básica («santuario», «Tienda del Encuentro», «altar», «sacerdotes», «asamblea») para consistencia con el resto de Levítico.
  - Se evita «SEÑOR» o equivalentes de sustitución porque el hebreo de este versículo no contiene יהוה ni κύριος.
