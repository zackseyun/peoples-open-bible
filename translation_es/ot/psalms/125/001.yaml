translation:
  language: es
  text: Cántico de subidas. Los que confían en Yahvé son como el monte Sión[a], que no puede ser sacudido, sino que permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «no será movido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Canto de ascensos
  - Cántico de subidas
  - Canto de peregrinación
  lexicon: HALOT
  rationale: La fórmula es un encabezado literario establecido en los Salmos 120–134. 'Cántico' conserva el valor poético y litúrgico; 'ascensos' mantiene el sentido léxico de מַעֲלוֹת sin imponer una paráfrasis más libre.
- source_word: הַבֹּטְחִים
  english_pob_choice: Those who trust
  chosen_spanish: Los que confían
  alternatives_spanish:
  - Los que están confiando
  - Los confiados
  - Los que se fían
  lexicon: HALOT
  rationale: El participio describe una clase de personas caracterizada por la confianza continua. 'Los que confían' es natural en español y conserva ese valor habitual/general.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino en la forma adoptada por el proyecto: ''Yahvé''. La preposición expresa el objeto de la confianza de modo directo y fiel al hebreo.'
- source_word: כְּהַר צִיּוֹן
  english_pob_choice: like Mount Zion
  chosen_spanish: como el monte Sión
  alternatives_spanish:
  - como el monte de Sión
  - igual que el monte Sión
  lexicon: HALOT
  rationale: כְּ introduce comparación. 'Monte Sión' es la forma transparente y fiel en español, conservando el paralelismo con la imagen del monte sin añadir interpretación.
- source_word: לֹא יִמּוֹט
  english_pob_choice: it cannot be shaken
  chosen_spanish: no puede ser sacudido
  alternatives_spanish:
  - no será movido
  - no vacilará
  - no podrá ser removido
  lexicon: HALOT
  rationale: מוֹט en nifal transmite la idea de ser movido, tambalear o sacudir. 'No puede ser sacudido' conserva la imagen de inestabilidad física en un español claro y sobrio, sin perder la fuerza de la negación.
- source_word: לְעוֹלָם יֵשֵׁב
  english_pob_choice: remains forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - habita para siempre
  - se sienta para siempre
  - permanece eternamente
  lexicon: HALOT
  rationale: יָשַׁב puede significar sentarse, habitar o permanecer. Con לְעוֹלָם, la idea es continuidad duradera; 'permanece para siempre' comunica bien la permanencia poética en español sin sobreliteralidad.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio divino y se usa la forma española habitual en este proyecto, 'Yahvé', en lugar de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Relación comparativa e imagen de estabilidad
  english_pob_reading: Those who trust in Yahweh are like Mount Zion, which cannot be shaken, but remains forever.
  chosen_spanish_reading: Los que confían en Yahvé son como el monte Sión, que no puede ser sacudido, sino que permanece para siempre.
  alternative_spanish_readings:
  - Los que confían en Yahvé se asemejan al monte Sión, que no puede ser movido, y permanece para siempre.
  - 'Quienes confían en Yahvé son como Sión: no vacila, y permanece para siempre.'
  rationale: La comparación debe mantenerse explícita, y la estabilidad del monte Sión debe reflejar el contraste entre la imposibilidad de ser movido y la permanencia duradera. 'Sino que' refleja bien el giro adversativo del hebreo y evita endurecer la sintaxis.
  doctrine_reference: Poética hebrea y paralelismo sintáctico del verso
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó la puntuación para acercarse más a la comparación hebrea y a la secuencia verbal singular. La versión española sigue esa misma línea: conserva una sola comparación principal, con coma antes de la relativa y una oposición suave (''sino que'') para reflejar el flujo poético sin fragmentarlo en exceso.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino en el texto principal.
  - '''Monte Sión'' se conserva sin artículo posesivo ni explicaciones añadidas, para respetar la imagen poética.'
  - '''No puede ser sacudido'' reproduce la fuerza de la imagen de inestabilidad y deja abierta la alternativa más literal ''no puede ser movido''.'
  - '''Permanece para siempre'' equilibra fidelidad y naturalidad en español, en línea con la decisión inglesa de evitar una literalidad rígida.'
