  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Los hijos de Israel», «levitas», «heredad» y «posesión» son aceptables aquí. El ajuste propuesto no altera la teología ni el léxico clave, sino que mejora la claridad del contraste proporcional que expresa מֵאֵת הָרַב ... וּמֵאֵת הַמְעַט.
