lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En este contexto genealógico, בני funciona como fórmula de filiación/listado. «Los hijos de» es la correspondencia más directa y natural en español, sin ampliar innecesariamente a «descendientes». La conjunción inicial queda implícita por el hebreo con prefijo y puede omitirse en español para mayor fluidez.
- source_word: יָהְדָּי
  english_pob_choice: Jahdai
  chosen_spanish: Yahdai
  alternatives_spanish:
  - Jahdai
  lexicon: Nombre propio transliterado
  rationale: Es un nombre propio y debe transliterarse. Se prefiere «Yahdai» para reflejar con mayor transparencia el inicio consonántico del hebreo, manteniendo la referencia nominal sin traducirla.
- source_word: רֶגֶם
  english_pob_choice: Regem
  chosen_spanish: Regem
  alternatives_spanish:
  - Régem
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; se conserva en forma transliterada sencilla y reconocible.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotam
  - Jotán
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; en español resulta más natural «Jotam» que la forma inglesa «Jotham». Evita una grafía innecesariamente anglicada y conserva la identificación del nombre.
- source_word: גֵישָׁן
  english_pob_choice: Geshan
  chosen_spanish: Geshán
  alternatives_spanish:
  - Geshan
  - Geishán
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; se mantiene la transliteración. La tilde ayuda a la lectura española sin alterar la forma base del nombre.
- source_word: פֶלֶט
  english_pob_choice: Pelet
  chosen_spanish: Pelet
  alternatives_spanish:
  - Pélet
  - Peleth
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; se conserva la forma breve y establecida. No hay razón contextual para castellanizar más allá de la transliteración.
- source_word: עֵיפָה
  english_pob_choice: Ephah
  chosen_spanish: Efá
  alternatives_spanish:
  - Efa
  - Eifah
  lexicon: Nombre propio transliterado
  rationale: Aquí funciona como nombre propio, no como la medida de grano. Se escoge «Efá» para una forma española legible y cercana al valor fonético, manteniendo la distinción nominal.
- source_word: שָׁעַף
  english_pob_choice: Shaaph
  chosen_spanish: Shaaf
  alternatives_spanish:
  - Sáaf
  - Shaafh
  lexicon: Nombre propio transliterado
  rationale: Nombre propio; se conserva la transliteración. La forma «Shaaf» sigue de cerca la audit trail inglesa y evita introducir una consonante final no sustentada por el hebreo.
translation_notes:
  revision_awareness: El texto base en inglés muestra alta concordancia con la fuente hebrea y no presenta revisiones aplicadas; la adaptación española se limita a transliteración consistente y a la naturalización mínima de la fórmula genealógica.
  spanish_consistency_notes:
  - Se mantiene «Yahdai» en lugar de la forma inglesa «Jahdai» para preservar la transparencia respecto del hebreo inicial.
  - Se evita «Cristo», «Señor» u այլ terminología teológica porque el versículo es una lista genealógica sin carga doctrinal explícita.
  - «Efá» se usa como nombre propio, no como unidad de medida.
  - Se normaliza la puntuación con dos puntos tras el encabezado genealógico, siguiendo el sentido del hebreo y la práctica editorial en español.
