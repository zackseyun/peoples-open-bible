id: 2CH.1.16
reference: 2 Chronicles 1:16
source:
  edition: WLC
  text: וּ/מוֹצָ֧א הַ/סּוּסִ֛ים אֲשֶׁ֥ר לִ/שְׁלֹמֹ֖ה מִ/מִּצְרָ֑יִם וּ/מִ/קְוֵ֕א סֹחֲרֵ֣י הַ/מֶּ֔לֶךְ מִ/קְוֵ֥א יִקְח֖וּ בִּ/מְחִֽיר׃
translation:
  text: And the source of Solomon’s horses was Egypt and Kue[b][a], and the king’s merchants would obtain them from Kue for a price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and from a collection/depot'; the Hebrew term מִקְוֵא is difficult and has also been understood as a common noun rather than the place name Kue.
    reason: alternative_reading
  - marker: b
    text: Or, 'the king’s merchants would buy them from a depot at a price.' This reflects the alternative understanding of מִקְוֵא as a place of collection rather than a geographic name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמוֹצָא
  chosen: the source
  alternatives:
  - the importation
  - the export
  - the origin
  lexicon: HALOT
  rationale: מוֹצָא can denote place/source of going out or origin. In this trade context, 'source' best captures the sense without over-paraphrasing to 'importation.'
- source_word: הַסּוּסִים
  chosen: the horses
  lexicon: HALOT
  rationale: Straightforward plural noun meaning 'horses.'
- source_word: אֲשֶׁר לִשְׁלֹמֹה
  chosen: that belonged to Solomon
  alternatives:
  - for Solomon
  - of Solomon
  lexicon: HALOT
  rationale: The lamed with Solomon indicates possession/association here; 'that belonged to Solomon' is idiomatic English and reflects the genitival sense.
- source_word: מִמִּצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Proper place name, standard English transliteration/translation.
- source_word: וּמִקְוֵא
  chosen: and Kue
  alternatives:
  - and from Kue
  - and from Keveh
  - and from a gathering/place of collection
  lexicon: HALOT
  rationale: The form is difficult and debated. In this context, following the likely toponymic sense parallel to 1 Kgs 10:28, it is best taken as the place name 'Kue' (Cilicia region), not a common noun such as 'collection.' The conjunction is retained, while the prepositional force is absorbed naturally into the clause.
- source_word: סֹחֲרֵי הַמֶּלֶךְ
  chosen: the king’s merchants
  alternatives:
  - the king's traders
  lexicon: HALOT
  rationale: Participle used substantivally for traders/merchants. 'Merchants' fits the commercial setting.
- source_word: מִקְוֵא
  chosen: from Kue
  alternatives:
  - from Keveh
  - from a depot
  - from a drove
  lexicon: HALOT
  rationale: Second occurrence likely repeats the place name. Rendering it consistently as 'Kue' avoids introducing a different sense without clear warrant.
- source_word: יִקְחוּ
  chosen: would obtain
  alternatives:
  - would take
  - would buy
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in a trade context 'obtain' communicates the commercial acquisition naturally without adding more specificity than the text states.
- source_word: בִּמְחִיר
  chosen: for a price
  alternatives:
  - at a price
  - for payment
  lexicon: HALOT
  rationale: This phrase indicates purchase/payment. 'For a price' is natural and preserves the transactional sense.
