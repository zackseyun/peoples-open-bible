translation:
  language: es
  text: Y todo hombre de Israel[a], al ver al hombre, huyó de su presencia y tenía mucho miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘de delante de él’, un modismo que significa ‘de su presencia’ o simplemente ‘de él’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל אִישׁ יִשְׂרָאֵל
  english_pob_choice: And every man of Israel
  chosen_spanish: Y todo hombre de Israel
  alternatives_spanish:
  - Y todos los hombres de Israel
  - Y cada hombre de Israel
  - Y todo israelita varón
  lexicon: HALOT
  rationale: 'כֹל con אִישׁ en singular tiene sentido distributivo: ‘todo/cada hombre’. ‘Todo hombre de Israel’ conserva la singularidad distributiva y la referencia colectiva a los varones de combate de Israel, sin desplazar el matiz hacia una formulación menos literal.'
- source_word: בִּרְאוֹתָם
  english_pob_choice: when he saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando lo vio
  - cuando vieron
  - al verlo
  lexicon: HALOT
  rationale: El infinitivo con ב expresa aquí una circunstancia temporal. ‘Al ver’ es natural en español y mantiene la relación temporal sin agregar un sujeto explícito que el hebreo no requiere en esta cláusula.
- source_word: אֶת הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al hombre aquel
  - a ese hombre
  - a Goliat
  lexicon: HALOT
  rationale: ‘El hombre’ conserva la referencia nominal del hebreo y su énfasis dramático. En español, por la construcción con ‘al ver’, el objeto se expresa mejor como ‘al hombre’.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  - se fue huyendo
  lexicon: HALOT
  rationale: נוס significa ‘huir/fugarse’. El singular español ‘huyó’ sigue el acuerdo distributivo del hebreo con ‘todo hombre’ y conserva la fuerza del verbo sin suavizarla.
- source_word: מִפָּנָיו
  english_pob_choice: from before him
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de él
  - de ante él
  - de su rostro
  lexicon: HALOT
  rationale: La frase hebrea es un modismo literal ‘de delante de su rostro/presencia’. ‘De su presencia’ comunica el sentido idiomático en español y mantiene la tensión entre literalidad y claridad que el POB inglés documenta.
- source_word: וַיִּירְאוּ מְאֹד
  english_pob_choice: was very afraid
  chosen_spanish: tuvo mucho miedo
  alternatives_spanish:
  - estuvo muy atemorizado
  - temió mucho
  - quedó muy asustado
  lexicon: HALOT
  rationale: ירא expresa miedo intenso. ‘Tuvo mucho miedo’ es una equivalencia natural en español que conserva la intensidad; el singular concuerda con el distributivo ‘todo hombre’ del primer hemistiquio.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que corrigió el acuerdo a singular en inglés (‘every man... he saw... fled... was very afraid’). La redacción española refleja ese acuerdo distributivo con singular genérico ('todo hombre', 'huyó', 'tuvo').
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y publicable, sin calcos innecesarios.
  - Se conservó la fuerza narrativa del hebreo con un español natural.
  - ‘De su presencia’ se eligió para transparentar el modismo sin oscurecerlo.
  - No se introdujo el nombre ‘Goliat’ en el texto principal para no adelantar una glosa no presente en el hebreo inmediato.
