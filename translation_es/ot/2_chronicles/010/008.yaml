translation:
  language: es
  text: Pero él abandonó el consejo de los ancianos que le habían dado, y consultó con los jóvenes que se habían criado con él, que estaban delante de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «que lo atendían» o «que le servían», reflejando un modismo cortesano en «estaban delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - rechazó
  - abandonó
  lexicon: HALOT
  rationale: עזב puede significar dejar, abandonar o apartar. En este contexto Roboam no solo deja pasar el consejo, sino que lo desecha en favor de otra orientación; por eso «abandonó» transmite bien la fuerza del verbo.
- source_word: עֲצַת
  english_pob_choice: advice
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo
  - consejo asesor
  - asesoramiento
  lexicon: HALOT
  rationale: עֵצָה puede ser «consejo» o «asesoramiento». En español bíblico y natural, «consejo» comunica de manera clara la orientación ofrecida por los ancianos sin perder el valor de sabiduría y deliberación.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos
  - los viejos
  lexicon: HALOT
  rationale: Aunque el término se relaciona con la edad, aquí designa consejeros de rango y experiencia. «Ancianos» conserva esa doble referencia de edad y función social mejor que una forma más literal como «viejos».
- source_word: יְעָצֻהוּ
  english_pob_choice: they had given him
  chosen_spanish: le habían dado
  alternatives_spanish:
  - le habían aconsejado
  - le habían dado consejo
  lexicon: HALOT
  rationale: Como el objeto «consejo» ya aparece explícito, en español resulta más natural decir «que le habían dado» para evitar repetición, sin perder el sentido de que el consejo fue impartido por los ancianos.
- source_word: וַיִּוָּעַץ
  english_pob_choice: consulted with
  chosen_spanish: consultó con
  alternatives_spanish:
  - tomó consejo con
  - buscó consejo de
  lexicon: HALOT
  rationale: La forma niphal expresa entrar en consulta. «Consultó con» es idiomático y suficientemente formal en español para reproducir esa acción deliberativa.
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes
  lexicon: HALOT
  rationale: Aunque ילד puede referirse a niños, el contexto muestra que son compañeros de corte que crecieron con el rey. «Los jóvenes» evita la idea engañosa de niños literales y conserva la referencia generacional.
- source_word: גָּדְלוּ אִתּוֹ
  english_pob_choice: had grown up with him
  chosen_spanish: se habían criado con él
  alternatives_spanish:
  - habían crecido con él
  - habían sido criados con él
  lexicon: HALOT
  rationale: La expresión describe una crianza compartida. «Se habían criado con él» comunica de forma natural en español la idea de haber pasado su desarrollo junto al rey.
- source_word: הָעֹמְדִים לְפָנָיו
  english_pob_choice: who stood before him
  chosen_spanish: los cuales estaban delante de él
  alternatives_spanish:
  - los cuales le servían
  - los cuales lo atendían
  - los cuales estaban delante de él
  lexicon: HALOT
  rationale: La imagen literal de «estar delante de él» preserva el hebraísmo del texto. El inglés POB nota la posible carga cortesana («servir/atender»), pero en el texto principal español se mantiene la forma más cercana al original, sin cerrar de antemano esa posible inferencia.
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del pasaje en el audito inglés, sin cambios sustantivos respecto a la lectura base. Se mantiene la tensión lexical del cierre («estaban delante de él») y se ofrece en nota la alternativa idiomática cortesana preservada por el POB inglés.
  spanish_consistency_notes:
  - Se usó «ancianos» para הַזְּקֵנִים, coherente con el valor social del término en contextos narrativos.
  - Se prefirió «consejo» a «asesoramiento» por ser más natural y bíblicamente claro en español.
  - 'Se mantuvo el paralelismo narrativo de dos acciones sucesivas: abandonar el consejo y consultar con los jóvenes.'
  - La nota de pie conserva la ambigüedad del modismo de corte sin reemplazarlo en el texto principal.
