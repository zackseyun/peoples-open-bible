revisions:
- from: Siempre que la nube era tomada de sobre el tabernáculo[a], los hijos de Israel partían en todos sus viajes.
  to: Siempre que la nube era alzada de sobre el tabernáculo, los hijos de Israel partían en todas sus jornadas[a].
  rationale: Se ajusta «era tomada» a «era alzada» para reflejar con español natural el sentido de הֵעָלֹת / «was taken up». Se cambia «viajes» por «jornadas» para representar mejor los desplazamientos por etapas en el desierto. La nota se simplifica para que corresponda exactamente a la alternativa léxica real del texto revisado; no debe decir al mismo tiempo «los hijos de Israel» como alternativa si esa ya es la lectura principal. No se requiere adjudicación adicional.
