translation:
  language: es
  text: En sus días no tembló ante nadie[a], y ninguna carne dominó su espíritu. Ninguna palabra fue demasiado maravillosa para él[b], y debajo de él fue creada su carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La última línea refleja el hebreo transmitido, que aquí es difícil; el paralelo griego lee: «y en su sueño su cuerpo profetizó».'
    reason: textual_variant
  - marker: b
    text: 'O: «Ningún asunto fue demasiado maravilloso para él». Hebreo dabar puede significar «palabra» o «asunto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מימיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante su vida
  - En su tiempo
  lexicon: HALOT
  rationale: La expresión temporal se conserva de modo idiomático en español y mantiene el tono sobrio del texto sapiencial.
- source_word: לא זע מכל
  english_pob_choice: he did not tremble before anyone
  chosen_spanish: no tembló ante nadie
  alternatives_spanish:
  - no se estremeció ante nadie
  - no fue sacudido por nadie
  lexicon: HALOT
  rationale: זע comunica la idea de temblar o estremecerse; «ante nadie» reproduce la fuerza personal del contexto sin volverlo rígidamente literal.
- source_word: ולא משל ברוחו כל בשר
  english_pob_choice: and no flesh mastered his spirit
  chosen_spanish: y ninguna carne dominó su espíritu
  alternatives_spanish:
  - y ningún ser humano dominó su espíritu
  - y ningún mortal tuvo poder sobre su espíritu
  lexicon: HALOT
  rationale: Se conserva «carne» para reflejar el hebraísmo כל בשר y «dominar» para משל con la fuerza de ejercer señorío sobre el espíritu.
- source_word: כל דבר לא נפלא ממנו
  english_pob_choice: No word was too wondrous for him
  chosen_spanish: Ninguna palabra fue demasiado maravillosa para él
  alternatives_spanish:
  - Ningún asunto fue demasiado maravilloso para él
  - Nada estuvo fuera de su alcance
  lexicon: HALOT
  rationale: Se mantiene «palabra» por el paralelo griego λόγος y por la nota inglesa, pero en español se evita un giro extraño usando «demasiado maravillosa» para conservar el matiz de נפלא.
- source_word: ומתחתיו נברא בשרו
  english_pob_choice: and beneath him his flesh was created
  chosen_spanish: y debajo de él su carne fue creada
  alternatives_spanish:
  - y tras él su carne fue formada
  - y debajo de él fue formada su carne
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que opta por una lectura literal del hebreo transmitido, aun reconociendo que el hemistiquio es difícil; «debajo de él» conserva la preposición y «fue creada» reproduce נברא.
theological_decisions:
- issue: 'Cola final textualemente difícil: hebreo transmitido vs. paralelo griego'
  english_pob_reading: 'Mainly Hebrew for the verse, but the final colon is rendered according to the Greek parallel: ''and in his sleep his body prophesied.'''
  chosen_spanish_reading: 'Se traduce el final según el hebreo transmitido: «y debajo de él su carne fue creada».'
  alternative_spanish_readings:
  - y en su sueño su cuerpo profetizó
  - y en el dormir su cuerpo profetizó
  rationale: La revisión inglesa más reciente prioriza el hebreo de la edición base en este hemistiquio, aunque la nota textual admite la dificultad. En español se conserva esa decisión para no borrar la tensión textual documentada, y se deja constancia de la variante griega en la nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está disponible, registrando honestamente la dificultad textual y las variantes paralelas.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que corrigió el final para reflejar más de cerca el hebreo «ומתחתיו נברא בשרו». Al mismo tiempo, se mantiene la nota sobre el paralelo griego para no ocultar la variante textual documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera explícitamente; este versículo no lo contiene.
  - Se conservó «carne» para כל בשר según la terminología del proyecto.
  - Se mantuvo «espíritu» para רוח en sentido antropológico, no como Espíritu Santo.
  - «Palabra» se eligió por coherencia con el hebreo דבר y la observación del paralelo griego λόγος.
