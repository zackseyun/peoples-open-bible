review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene «Yahvé», conserva el paralelismo con la repetición de «su pueblo», y traduce adecuadamente עֹז como «fuerza» y בַשָּׁלוֹם como «con paz». También sigue correctamente la decisión del POB de leer los imperfectos como presente declarativo. Sin embargo, la nota [a] reduce demasiado la alternativa verbal, ya que el audit trail inglés documenta la lectura futura para ambos verbos y para toda la cláusula, no solo «dará».'
  spanish_quality_summary: 'El texto principal es natural y claro en español eclesial general. La única reparación necesaria está en las notas: [a] debe reflejar la alternativa completa «dará... bendecirá», y [b] contiene una intrusión de inglés («wholeness») que debe sustituirse por español natural.'
  glossary_alignment: 'La terminología principal está bien alineada con el glosario del proyecto: יְהוָה -> «Yahvé», עֹז -> «fuerza», שָׁלוֹם -> «paz» con ampliación semántica en nota. No hay conflicto teológico ni terminológico serio; solo hace falta ajustar las notas para que coincidan con la documentación inglesa y el estilo español.'
  issues:
  - severity: medium
    issue: La nota [a] documenta solo «dará» en vez de la alternativa futura de ambos imperfectos.
    rationale: 'El POB inglés preserva como alternativa: «The LORD will give strength to his people; the LORD will bless his people with peace». En español debe reflejarse la lectura completa, no solo el primer verbo.'
  - severity: medium
    issue: La nota [b] mezcla español con inglés al usar «wholeness».
    rationale: Esto perjudica la legibilidad y no cumple el objetivo de español natural. Debe reemplazarse por una equivalencia española como «integridad» o mantenerse con «plenitud» y «bienestar».
  revised_spanish_text: Yahvé da[a] fuerza a su pueblo; Yahvé bendice a su pueblo con paz[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Yahvé dará fuerza a su pueblo; Yahvé bendecirá a su pueblo con paz». Los verbos imperfectos hebreos también pueden entenderse con fuerza futura.'
    reason: alternative_reading
  - marker: b
    text: «Paz» traduce shalom, término que también puede incluir bienestar, plenitud e integridad.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el POB. Se corrigen únicamente las notas para reflejar con precisión la alternativa verbal documentada en inglés y para eliminar el anglicismo en la explicación de shalom.
