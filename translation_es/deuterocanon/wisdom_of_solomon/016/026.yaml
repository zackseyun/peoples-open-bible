  spanish_quality_summary: 'El texto es claro y digno, pero la cláusula final necesita ajuste para sonar plenamente natural en español: «sino tu palabra preserva...» debe repararse a «sino tu palabra es la que preserva...» o equivalente. También conviene mantener la nota [a] anclada en «confían en ti», no en «hijos», porque la alternativa documentada corresponde a πιστεύοντας, no a υἱοί.'
