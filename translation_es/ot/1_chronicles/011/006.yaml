translation:
  language: es
  text: 'Y David dijo[a]: «Cualquiera que derribe primero a un jebuseo será jefe y comandante». Entonces Joab, hijo de Sarvia, subió primero[b], y llegó a ser jefe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será cabeza y comandante».'
    reason: lexical_alternative
  - marker: b
    text: El verbo «subió» puede implicar una subida en el asalto contra la fortaleza, pero el hebreo dice simplemente «subió».
    reason: cultural_note
lexical_decisions:
- source_word: כָּל מַכֵּה יְבוּסִי
  english_pob_choice: Whoever strikes down a Jebusite
  chosen_spanish: Cualquiera que derribe primero a un jebuseo
  alternatives_spanish:
  - Todo el que hiera a un jebuseo
  - Quienquiera que golpee a un jebuseo
  lexicon: HALOT
  rationale: כָּל + participio en este contexto funciona como relativo indefinido, por eso «cualquiera que». מַכֵּה en marco militar implica derrotar o derribar, más que solo «golpear»; «derribe» conserva la fuerza bélica. El singular יְבוּסִי se entiende genericamente como un jebuseo, por lo que uso un sustantivo indefinido singular en español.
- source_word: בָּרִאשׁוֹנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - de primero
  - en primer lugar
  lexicon: HALOT
  rationale: El valor adverbial indica prioridad en la acción. «Primero» es natural en español y preserva la idea de prioridad sin añadir interpretación.
- source_word: יִהְיֶה לְרֹאשׁ וּלְשָׂר
  english_pob_choice: shall become chief and commander
  chosen_spanish: será jefe y comandante
  alternatives_spanish:
  - será cabeza y comandante
  - será jefe y príncipe
  lexicon: HALOT
  rationale: לְרֹאשׁ expresa posición de cabeza o jefe; en español «jefe» comunica bien el cargo. שָׂר puede referirse a oficial o comandante; «comandante» mantiene el matiz de autoridad militar sin arcaísmo. No repito una traducción litúrgica fija porque el texto distingue dos funciones.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - avanzó
  lexicon: HALOT
  rationale: עלה significa literalmente «subir». En este contexto puede insinuar una acción militar contra la fortaleza, pero el hebreo dice solo «subió», así que conservo la literalidad con «subió».
- source_word: יוֹאָב בֶּן צְרוּיָה
  english_pob_choice: Joab son of Zeruiah
  chosen_spanish: Joab, hijo de Sarvia
  alternatives_spanish:
  - Joab, hijo de Zeruía
  lexicon: HALOT
  rationale: Conservo los nombres propios de forma reconocible para lectores hispanos. Para la madre de Joab, «Sarvia» es la forma tradicional bien asentada en español bíblico y no altera la referencia.
- source_word: וַיְהִי לְרֹאשׁ
  english_pob_choice: and he became chief
  chosen_spanish: y llegó a ser jefe
  alternatives_spanish:
  - y fue jefe
  - y se convirtió en jefe
  lexicon: HALOT
  rationale: «Llegó a ser» refleja היטב el valor resultativo de היה con לְ sin forzar un pasivo. Mantiene el vínculo léxico con רֹאשׁ mediante «jefe».
theological_decisions:
- issue: 'Título de liderazgo: רֹאשׁ y שָׂר'
  english_pob_reading: chief and commander
  chosen_spanish_reading: jefe y comandante
  alternative_spanish_readings:
  - cabeza y comandante
  - jefe y capitán
  rationale: No suavizo el par de términos. «Jefe» conserva la noción de cabeza/liderazgo, y «comandante» preserva el componente de mando. Así se mantiene la tensión entre cargo general y función militar.
  doctrine_reference: N/A (lexical/thematic leadership language)
- issue: Valor militar de «went up»
  english_pob_reading: went up first
  chosen_spanish_reading: subió primero
  alternative_spanish_readings:
  - ascendió primero
  - avanzó primero
  rationale: 'Sigo la lectura prudente del POB: el verbo puede sugerir asalto ascendente, pero el hebreo mismo solo expresa movimiento hacia arriba. La traducción no explicita más de lo que el texto dice.'
  doctrine_reference: N/A (narrative/historical detail)
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y sin cambios recientes; se siguió la lectura óptima ya estabilizada, preservando las alternativas léxicas relevantes donde el español también admite más de una opción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «jefe» para רֹאשׁ, en continuidad con el valor de liderazgo del contexto y con el vínculo interno del versículo.
  - Se evitó «captitán» por sonar más arcaico en español actual; «comandante» comunica el oficio militar sin perder formalidad.
