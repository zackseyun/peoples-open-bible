  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. Los nombres propios Hoshea/Josué están bien manejados en español bíblico. «La tierra» refleja adecuadamente הָאָרֶץ en contexto.
