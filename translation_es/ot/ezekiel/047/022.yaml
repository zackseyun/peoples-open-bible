review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: reparto de la tierra como herencia tanto para Israel como para los גרים, inclusión de los residentes establecidos con descendencia, y recepción de herencia entre las tribus. Sin embargo, no refleja del todo la decisión auditada de POB sobre בָנִים como descendencia genérica (''children''), pues ''hijos'' en español tiende a sonar más específicamente masculino. Además, ''forasteros'' capta extranjería pero debilita el matiz de residencia reconocida de גֵּר, que en este contexto jurídico-territorial conviene hacer más explícito en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor precisión y naturalidad bíblica-jurídica. 'Extranjeros residentes' suena más exacto que 'forasteros' en este contexto de derecho de herencia. 'Han tenido hijos' o 'han tenido descendencia' evita una especificidad masculina innecesaria; aquí conviene la primera por fluidez. El resto del versículo está bien construido y es legible.
  glossary_alignment: No hay conflicto con términos de proyecto como Yahvé/Mesías. Sí conviene alinear mejor גֵּר con una expresión que preserve su estatus de residente no nativo reconocido, en vez de 'forasteros'. La elección de 'herencia' es correcta para נַחֲלָה. 'Nativo' para כְּאֶזְרָח y 'entre los hijos de Israel' para בִּבְנֵי יִשְׂרָאֵל son aceptables.
  issues:
  - severity: medium
    issue: '''forasteros'' debilita el matiz legal-residencial de גֵּר'
    rationale: En Ezequiel 47:22 el punto es la inclusión de no nativos establecidos dentro de la comunidad en el reparto de la tierra. 'Forasteros' puede sugerir solo alguien de fuera, sin comunicar bien residencia reconocida. 'Extranjeros residentes' o similar preserva mejor el valor contextual y la rationale auditada.
  - severity: medium
    issue: '''han engendrado hijos'' no sigue la decisión POB de sentido genérico para בָנִים'
    rationale: La auditoría inglesa eligió 'children' para evitar sobreespecificar varones, manteniendo la idea de continuidad familiar establecida. En español, 'hijos' puede funcionar genéricamente, pero aquí unido a 'engendrado' refuerza demasiado la lectura masculina/formal. 'Han tenido hijos' comunica mejor el sentido contextual, con nota para la forma literal.
  - severity: low
    issue: La nota c podría sonar algo menos natural
    rationale: '''Como un nacido en la tierra'' es comprensible, pero ''como un nativo de nacimiento'' o simplemente ''como un nacido allí'' sería más idiomático. No obstante, la nota es secundaria y no afecta gravemente la fidelidad.'
  revised_spanish_text: Y sucederá que la repartirán como herencia para ustedes y para los extranjeros residentes[a] que residen entre ustedes, que han tenido hijos[b] entre ustedes; y serán para ustedes como un nativo[c] entre los hijos de Israel. Con ustedes recibirán herencia entre las tribus de Israel.
  revised_footnotes:
