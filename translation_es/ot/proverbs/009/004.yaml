translation:
  language: es
  text: 'Cualquiera que sea simple, ¡que entre aquí! Al que le falta entendimiento[a] le dice:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «falto de corazón». En el hebreo sapiencial, «corazón» suele referirse al entendimiento o al juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que sea
  alternatives_spanish:
  - Quien sea
  - Quiénquiera que sea
  lexicon: HALOT
  rationale: El hebreo introduce un destinatario genérico e indefinido. «Cualquiera que sea» mantiene ese valor inclusivo y funciona con naturalidad en español.
- source_word: פֶתִי
  english_pob_choice: simple
  chosen_spanish: simple
  alternatives_spanish:
  - ingenuo
  - incauto
  - necio
  lexicon: HALOT
  rationale: En Proverbios, פתי designa al ingenuo o fácilmente influenciable. «Simple» conserva la categoría sapiencial y el tono tradicional sin añadir una glosa más fuerte de la que exige el texto.
- source_word: יָסֻר הֵנָּה
  english_pob_choice: let him turn in here
  chosen_spanish: que entre aquí
  alternatives_spanish:
  - que se desvíe hacia aquí
  - que vuelva aquí
  - que se acerque aquí
  lexicon: HALOT
  rationale: El conjunto expresa una invitación a dirigirse al lugar del hablante. En español, «que entre aquí» comunica bien la invitación y el movimiento hacia el espacio de la Sabiduría, manteniendo la naturalidad.
- source_word: חֲסַר לֵב
  english_pob_choice: lacks sense
  chosen_spanish: le falta entendimiento
  alternatives_spanish:
  - carece de juicio
  - le falta corazón
  - carece de discernimiento
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «falto de corazón», donde «corazón» alude a entendimiento o juicio. «Le falta entendimiento» conserva el sentido idiomático sin ocultar la metáfora en la nota.
- source_word: אָמְרָה
  english_pob_choice: she says
  chosen_spanish: le dice
  alternatives_spanish:
  - dice
  - dice ella
  - le dijo
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en este marco discursivo funciona como introducción viva del discurso directo. «Le dice» refleja ese valor presente y conserva la fluidez narrativa.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a tal persona
  - para él
  lexicon: HALOT
  rationale: El pronombre masculino singular se mantiene en español con «le», que suena natural y preserva la referencia singular genérica del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y el audit trail inglés, especialmente en el valor genérico de מִי, la invitación direccional de יָסֻר הֵנָּה, y el idiomático חֲסַר לֵב. No se detectaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usó «simple» para פתי como término sapiencial, en línea con la decisión inglesa.
  - Se mantuvo un sujeto implícito femenino en «le dice» para אָמְרָה, como en el hebreo.
  - La nota de pie conserva la tensión literal/idiomática de «corazón» sin reemplazarla en el texto principal.
