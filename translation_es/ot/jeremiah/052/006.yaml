translation:
  language: es
  text: En el cuarto mes, el día nueve del mes, la hambruna se agravó en la ciudad, y no había pan para el pueblo de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la gente común». La expresión hebrea «pueblo de la tierra» puede, en algunos contextos, referirse más específicamente a la población o a la gente común.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרְבִיעִי
  english_pob_choice: In the fourth month
  chosen_spanish: En el cuarto mes
  alternatives_spanish:
  - En el cuarto mes del año
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula de datación; en español, «en el cuarto mes» reproduce de forma natural y fiel el valor temporal sin añadir «del año», que no está explícito en el texto.
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ
  english_pob_choice: on the ninth day of the month
  chosen_spanish: a los nueve días del mes
  alternatives_spanish:
  - el día nueve del mes
  - el nueve del mes
  lexicon: HALOT
  rationale: La construcción hebrea es la fórmula normal de fecha. «A los nueve días del mes» conserva el sentido y suena idiomático en español bíblico moderno; «día» puede añadirse, pero no es estrictamente necesario para la claridad.
- source_word: וַיֶּחֱזַק
  english_pob_choice: became severe
  chosen_spanish: se agravó
  alternatives_spanish:
  - se hizo fuerte
  - se intensificó
  - prevaleció
  lexicon: HALOT
  rationale: Aunque el verbo בסיס significa literalmente «ser fuerte», con «el hambre» como sujeto la idea es que la situación empeoró o se volvió más intensa. «Se agravó» comunica esa intensificación sin perder la fuerza verbal del hebreo.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre por escasez
  lexicon: HALOT
  rationale: En este contexto de sitio, el término apunta a escasez extrema de alimento. «El hambre» es un español claro y suficientemente fuerte; «hambruna» es posible, pero suena menos directo y más interpretativo.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La frase es locativa simple. «En la ciudad» preserva la referencia sin explicitar Jerusalén, que el contexto ya presupone.
- source_word: וְלֹא הָיָה לֶחֶם
  english_pob_choice: and there was no bread
  chosen_spanish: y no había pan
  alternatives_spanish:
  - y no había comida
  lexicon: HALOT
  rationale: לֶחֶם es literalmente «pan». Aunque puede abarcar comida en ciertos contextos, aquí el literal mantiene la imagen concreta de la carencia.
- source_word: לְעַם הָאָרֶץ
  english_pob_choice: for the people of the land
  chosen_spanish: para el pueblo de la tierra
  alternatives_spanish:
  - para la gente del país
  - para los habitantes de la tierra
  - para la gente común
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «pueblo de la tierra». Mantenerla así preserva la forma del original; en esta cláusula no parece necesario decidir por «gente común», aunque esa posibilidad queda indicada en la nota.
theological_decisions:
- issue: Sentido de לְעַם הָאָרֶץ
  english_pob_reading: The Hebrew phrase 'people of the land' can, in some contexts, refer more specifically to the populace or common people.
  chosen_spanish_reading: «Pueblo de la tierra» se mantiene literal, con la posibilidad de entenderse como «gente común» según el contexto.
  alternative_spanish_readings:
  - pueblo del país
  - gente común
  - los habitantes
  rationale: El hebreo permite un rango semántico que en algunos pasajes apunta a la población común, pero aquí el audit trail de POB prefiere conservar la formulación literal. La nota española preserva esa tensión sin cerrarla artificialmente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directamente y se alineó la redacción española con la decisión de POB en inglés. No se requirieron revisiones adicionales; el texto inglés y la valoración de control muestran alta concordancia y sin cambios pendientes.
  spanish_consistency_notes:
  - 'Se mantuvo el orden temporal natural del español: fecha, estado de la hambruna y carencia de pan.'
  - Se eligió «pan» para לֶחֶם por fidelidad literal, sin ampliar a «comida».
  - Se conservó la expresión literal «pueblo de la tierra» para no borrar la ambigüedad léxica documentada.
