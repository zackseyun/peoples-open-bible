translation:
  language: es
  text: Tres cosas ha odiado mi alma[a], y me causa mucha angustia su manera de vivir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego difiere fuertemente: «la armonía de los hermanos, y la amistad de los vecinos, y una mujer y un hombre que conviven bien». El hebreo y el griego parecen reflejar formas textuales distintas en este punto.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלֹשׁ
  english_pob_choice: Three things
  chosen_spanish: Tres cosas
  alternatives_spanish:
  - Tres
  lexicon: HALOT
  rationale: En español conviene explicitar el sustantivo implícito con «cosas» para que la enumeración suene natural y complete la referencia plural sin añadir contenido ajeno.
- source_word: שָׂנְאָה
  english_pob_choice: has hated
  chosen_spanish: ha odiado
  alternatives_spanish:
  - odia
  - odió
  lexicon: HALOT
  rationale: El perfecto español conserva el valor de estado establecido con relevancia presente, como en la decisión inglesa, sin volverlo una acción momentánea.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mí mismo
  lexicon: HALOT
  rationale: Se mantiene la expresión antropológica directa para preservar la intensidad afectiva del hebreo y evitar reducirla a una simple primera persona.
- source_word: וְצַר לִי מְאֹד
  english_pob_choice: and I am greatly distressed
  chosen_spanish: y me angustian mucho
  alternatives_spanish:
  - y me afligen mucho
  - y estoy muy inquieto
  lexicon: HALOT
  rationale: La frase hebrea expresa fuerte aflicción personal; en español, un verbo en plural concordado con «cosas» comunica esa carga de forma natural sin perder la fuerza emocional.
- source_word: בְּחַיֵּיהֶם
  english_pob_choice: by their lives
  chosen_spanish: sus vidas
  alternatives_spanish:
  - en sus vidas
  - por su vida
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una traducción más directa de בְּחַיֵּיהֶם; en español, «sus vidas» mantiene la literalidad básica sin la expansión interpretativa de «modo de vida».
theological_decisions:
- issue: Desfase textual mayor entre hebreo y griego en Sirácida 25:2
  english_pob_reading: 'The Hebrew main text is translated in the verse body, with the Greek reading preserved in a footnote because it differs substantially: harmony of brothers, friendship of neighbors, and a wife and a husband living well together.'
  chosen_spanish_reading: 'Se traduce el hebreo conservado como texto principal y se expone en nota la lectura griega distinta: la armonía de los hermanos, la amistad de los vecinos y la buena convivencia entre esposa y esposo.'
  alternative_spanish_readings:
  - la armonía entre hermanos, la amistad entre vecinos y la convivencia de esposo y esposa
  - la concordia de los hermanos, la amistad de los cercanos y el trato mutuo de mujer y varón
  rationale: Dado que el hebreo transmitido y el griego presentan contenidos materialmente distintos, el texto principal sigue el hebreo, mientras la nota preserva la alternativa griega para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; exponer honestamente la incertidumbre y las variantes textuales'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que ajustó «their way of life» a «their lives» para reflejar más de cerca בְּחַיֵּיהֶם sin expansión interpretativa. La redacción española sigue esa revisión y evita introducir «modo de vida».
  spanish_consistency_notes:
  - Se conserva «alma» para נַפְשִׁי en lugar de reducirlo a un simple pronombre.
  - «Angustian mucho» refleja la intensidad emocional sin añadir una glosa interpretativa.
  - La nota de variante textual mantiene visible el gran desfase entre hebreo y griego, como exige el expediente auditado.
  - Se evita «Señor» o terminología cristiana ajena al pasaje, porque aquí no aparecen los nombres divinos ni cristológicos del material fuente.
