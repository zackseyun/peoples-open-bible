translation:
  language: es
  text: Hijo mío[a], no te burles de la vida del pobre, y no entristezcas un alma[b] pobre y amarga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No prives al pobre de su vida», que también puede entenderse como «No prives al pobre de su sustento».'
    reason: alternative_reading
  - marker: b
    text: Hebreo נֶפֶשׁ puede significar «alma», «vida», «ser» o «persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, hijo
  - Hijo mío, muchacho
  lexicon: HALOT
  rationale: La fórmula sapiencial directa del hebreo se conserva mejor con «Hijo mío». En español es natural y mantiene el tono instruccional personal del original.
- source_word: אַל תִּלְעַג
  english_pob_choice: do not mock
  chosen_spanish: no te burles
  alternatives_spanish:
  - no te mofes
  - no te ridiculices
  lexicon: HALOT
  rationale: El verbo expresa desprecio o escarnio. «No te burles» comunica esa actitud en un español claro y digno, sin suavizar la fuerza moral del mandato.
- source_word: לְחַיֵּי עָנִי
  english_pob_choice: the life of the poor
  chosen_spanish: de la vida del pobre
  alternatives_spanish:
  - del sustento del pobre
  - de la subsistencia del pobre
  lexicon: HALOT
  rationale: Se mantiene la referencia literal a «vida», como hace el texto hebreo, pero en español se expresa de forma fluida con «de la vida del pobre». La alternativa económica queda abierta por el testimonio griego, pero no se impone en el texto principal.
- source_word: וְאַל תַּדְאִיב
  english_pob_choice: do not grieve
  chosen_spanish: no entristezcas
  alternatives_spanish:
  - no causes dolor a
  - no aflijas
  lexicon: HALOT
  rationale: El verbo tiene el sentido de causar dolor o pena. «No entristezcas» conserva el impacto afectivo y encaja bien con el paralelismo poético.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ puede denotar vida, yo o interioridad. «Alma» mantiene la profundidad antropológica del hebreo y suena natural en español bíblico contemporáneo.
- source_word: עָנֵי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - afligido
  lexicon: HALOT
  rationale: El término describe pobreza o vulnerabilidad social. «Pobre» es la opción más directa y clara en español.
- source_word: וּמַר נָפֶשׁ
  english_pob_choice: and bitter soul
  chosen_spanish: y amarga
  alternatives_spanish:
  - y de alma amarga
  - y amargada en su interior
  lexicon: HALOT
  rationale: 'La frase hebrea literalmente es «amargo de alma». En español, para evitar una repetición pesada, se integra el adjetivo con «alma» implícita en el sustantivo anterior: «alma pobre y amarga». Esto preserva la amargura interior sin perder naturalidad.'
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en el primer hemistiquio
  english_pob_reading: Translate the Hebrew main text as 'do not mock the life of the poor' while allowing the Greek to inform the sense of social harm.
  chosen_spanish_reading: Mantener «no te burles de la vida del pobre» como texto principal, sin borrar que el alcance puede incluir el sustento o la condición vital del pobre.
  alternative_spanish_readings:
  - no prives al pobre de su sustento
  - no le quites la vida al pobre
  rationale: El hebreo conservado es la base principal, pero el griego ἀποστερήσῃς sugiere una acción más concreta de despojo. La traducción principal se apega al hebreo y la nota preserva la alternativa de alcance económico-social que el griego aporta.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
- issue: Tratamiento de נֶפֶשׁ y la amargura interior
  english_pob_reading: '''soul'' can also mean ''life,'' ''self,'' or ''person.'''
  chosen_spanish_reading: «Alma» como forma principal, entendida como interioridad o vida personal.
  alternative_spanish_readings:
  - vida
  - persona
  - ser
  rationale: En español, «alma» conserva bien la polisemia de נֶפֶשׁ y la tonalidad sapiencial. La segunda cola queda inteligible como una persona interiormente herida, sin reducir el término a un solo sentido.
  doctrine_reference: DOCTRINE.md § lexical range of nephesh in wisdom literature
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta modificar el borrador; el control cruzado mostró alta concordancia con observación de cuestiones menores. Se mantuvo la opción de texto principal anclado en el hebreo, con la alternativa griega preservada en nota.
  spanish_consistency_notes:
  - Se conserva el registro sapiencial directo con vocativo inicial.
  - «Pobre» se usa de manera consistente para עָנִי/עָנֵי en este contexto social.
  - «Alma» se mantiene como equivalencia principal de נֶפֶשׁ, con nota para su rango semántico.
  - La nota sobre el griego evita borrar la tensión entre vida, sustento y condición social.
