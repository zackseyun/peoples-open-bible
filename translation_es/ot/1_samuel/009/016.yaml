translation:
  language: es
  text: Mañana a esta hora te enviaré un hombre de la tierra de Benjamín, y tú lo ungirás como gobernante[a] sobre mi pueblo Israel. Él salvará a mi pueblo de la mano de los filisteos, porque he visto a mi pueblo,[b] pues su clamor ha llegado hasta mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo «nagid»; también posible: «líder» o, tradicionalmente, «príncipe». El término denota a uno designado para gobernar, no solo una figura ceremonial.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «su clamor ha llegado hasta mí», con un sufijo singular que se refiere al sustantivo colectivo «mi pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּעֵת מָחָר
  english_pob_choice: About this time tomorrow
  chosen_spanish: Por este tiempo mañana
  alternatives_spanish:
  - Mañana a esta hora
  - Más o menos a esta hora mañana
  lexicon: HALOT
  rationale: La expresión hebrea combina una referencia temporal concreta con la idea de proximidad aproximada. En español, «Por este tiempo mañana» conserva la naturalidad y la precisión temporal sin volverla rígida o mecánica.
- source_word: אֶשְׁלַח אֵלֶיךָ
  english_pob_choice: I will send to you
  chosen_spanish: yo te enviaré
  alternatives_spanish:
  - yo enviaré a ti
  - te enviaré
  lexicon: HALOT
  rationale: El hebreo incluye la dirección hacia el destinatario; en español, el dativo clítico «te» comunica bien esa relación sin sonar forzado. El sujeto explícito «yo» mantiene el énfasis del hebreo y la voz divina implícita.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo es singular y masculino. «Un hombre» conserva la especificidad del hebreo y la referencia histórica concreta a Saúl.
- source_word: מֵאֶרֶץ בִּנְיָמִן
  english_pob_choice: from the land of Benjamin
  chosen_spanish: de la tierra de Benjamín
  alternatives_spanish:
  - de Benjamín
  - del territorio de Benjamín
  lexicon: HALOT
  rationale: אֶרֶץ expresa tierra/territorio. «De la tierra de Benjamín» refleja bien el matiz geográfico del original y sigue siendo claro para el lector en español.
- source_word: וּמְשַׁחְתּוֹ
  english_pob_choice: and you shall anoint him
  chosen_spanish: y tú lo ungirás
  alternatives_spanish:
  - y lo ungirás
  - y ungirás a él
  lexicon: HALOT
  rationale: El verbo de unción es directo y debe mantenerse. «Lo ungirás» es natural; el pronombre explícito «tú» reproduce la forma imperativa/mandato dirigida a Samuel.
- source_word: לְנָגִיד
  english_pob_choice: as ruler
  chosen_spanish: como gobernante
  alternatives_spanish:
  - como líder
  - como príncipe
  lexicon: HALOT
  rationale: נָגִיד señala a uno nombrado para dirigir/gobernar. «Gobernante» mantiene la función de autoridad sin importar una terminología monárquica posterior que podría sonar más fuerte o más anacrónica que el hebreo.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo, Israel
  lexicon: HALOT
  rationale: Se conserva la relación de autoridad («sobre») y la posesión divina («mi pueblo»). No hace falta ampliar más el sintagma.
- source_word: וְהוֹשִׁיעַ
  english_pob_choice: He will save
  chosen_spanish: Él salvará
  alternatives_spanish:
  - y salvará
  - él librará
  lexicon: HALOT
  rationale: יׂשַׁע expresa rescate/salvación. «Salvará» es la opción más directa y mantiene el valor de liberación histórico-redentora del verbo.
- source_word: מִיַּד פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de la mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» como poder o control se conserva de manera transparente en español. «De la mano de» es idiomática y mantiene la metáfora bíblica.
- source_word: כִּי רָאִיתִי אֶת עַמִּי
  english_pob_choice: for I have seen my people
  chosen_spanish: porque he visto a mi pueblo
  alternatives_spanish:
  - pues he visto a mi pueblo
  - porque he mirado a mi pueblo
  lexicon: HALOT
  rationale: El hebreo expresa la razón de la acción divina. «He visto a mi pueblo» transmite la atención compasiva de Dios sin sobreinterpretación.
- source_word: כִּי בָּאָה צַעֲקָתוֹ אֵלָי
  english_pob_choice: because their cry has come to me
  chosen_spanish: pues su clamor ha llegado hasta mí
  alternatives_spanish:
  - porque su clamor ha llegado a mí
  - pues su grito ha llegado hasta mí
  lexicon: HALOT
  rationale: El sufijo singular del hebreo puede referirse al colectivo «mi pueblo». En español, «su clamor» conserva esa referencia colectiva implícita sin perder el valor singular del original. «Clamor» expresa mejor la queja intensa que «grito» en este contexto.
theological_decisions:
- issue: Título de autoridad para נָגִיד
  english_pob_reading: ruler
  chosen_spanish_reading: gobernante
  alternative_spanish_readings:
  - líder
  - príncipe
  rationale: El término designa a alguien investido por Dios para dirigir al pueblo, pero no exige el título técnico de «rey». «Gobernante» preserva la función política y evita cargar el texto con resonancias institucionales posteriores que el hebreo no demanda.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sufijo singular en צַעֲקָתוֹ
  english_pob_reading: their cry
  chosen_spanish_reading: su clamor
  alternative_spanish_readings:
  - su grito
  - el clamor de ellos
  rationale: El hebreo usa un sufijo singular con un antecedente colectivo («mi pueblo»). «Su clamor» mantiene la referencia colectiva sin hacer visible una discordancia innecesaria para el lector en español. La ambigüedad sigue siendo respetada en la base semántica.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo base y coincide con el audit trail inglés en los puntos clave: temporalidad («por este tiempo mañana»), envío dirigido («yo te enviaré»), unción, función de נָגִיד, metáfora de «la mano» y el tratamiento del sufijo colectivo en «su clamor». No se aplicaron revisiones adicionales frente al texto auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; aquí el hablante divino se sobreentiende, así que el texto mantiene el pronombre de primera persona según el hebreo.
  - Se mantiene «Benjamín» como topónimo tribal/geográfico en forma natural para el español.
  - «Ungirás» conserva el lenguaje técnico bíblico sin sustituirlo por una paráfrasis.
  - «Gobernante» se prefiere a «príncipe» para evitar ambigüedad moderna y seguir la fuerza de נָגִיד.
  - La metáfora «de la mano de» se mantiene por fidelidad idiomática al hebreo.
