translation:
  language: es
  text: 'Entonces cayeron rostro en tierra y dijeron: «Dios, Dios de los espíritus de toda carne[a], ¿un solo hombre pecará[b], y te enojarás con toda la congregación?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios del aliento de toda carne», destacando a Dios como dador de la vida a todo ser viviente.
    reason: lexical_alternative
  - marker: b
    text: '«Un solo hombre» puede funcionar de modo representativo: la súplica es que el pecado de un individuo no traiga ira sobre toda la congregación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְּלוּ עַל־פְּנֵיהֶם
  english_pob_choice: they fell on their faces
  chosen_spanish: se postraron sobre sus rostros
  alternatives_spanish:
  - cayeron sobre sus rostros
  - se inclinaron rostro en tierra
  lexicon: HALOT
  rationale: La imagen hebrea expresa humillación e intercesión. «Se postraron» conserva la acción idiomática en español sin perder la concreción de «sobre sus rostros».
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: ¡Oh Dios!
  alternatives_spanish:
  - Dios
  - ¡Dios!
  lexicon: HALOT
  rationale: Es un vocativo directo. En español, «¡Oh Dios!» hace explícita la apelación y mantiene el tono de súplica.
- source_word: אֱלֹהֵי הָרוּחֹת לְכָל־בָּשָׂר
  english_pob_choice: the God of the spirits of all flesh
  chosen_spanish: Dios de los espíritus de toda carne
  alternatives_spanish:
  - Dios de los espíritus de todo ser humano
  - Dios de la respiración de toda carne
  lexicon: HALOT
  rationale: Se conserva la estructura genitiva y la expresión bíblica «toda carne». «Espíritus» sigue la decisión del POB en inglés y mantiene la referencia al interior personal bajo el conocimiento soberano de Dios.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - personas
  - humanidad
  lexicon: HALOT
  rationale: «Carne» preserva el giro hebreo y la amplitud antropológica de la frase. No se neutraliza a «personas» para no borrar la formulación original.
- source_word: הָאִישׁ אֶחָד
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - una sola persona
  - un hombre
  lexicon: HALOT
  rationale: Se mantiene el masculino singular del hebreo. «Un solo hombre» también comunica mejor el valor representativo posible de la expresión.
- source_word: יֶחֱטָא
  english_pob_choice: shall one man sin
  chosen_spanish: pecará
  alternatives_spanish:
  - si un hombre peca
  - cometerá pecado
  lexicon: HALOT
  rationale: El verbo hebreo se traduce con el valor simple de pecado; en la interrogación española, el futuro reproduce bien el sentido deliberativo de la pregunta.
- source_word: וְעַל כָּל־הָעֵדָה
  english_pob_choice: with the whole congregation
  chosen_spanish: con toda la congregación
  alternatives_spanish:
  - contra toda la congregación
  - sobre toda la congregación
  lexicon: HALOT
  rationale: Aunque עַל puede señalar el objeto de la ira, en español la pregunta queda natural y fiel con «con». Se conserva «congregación» como término bíblico establecido.
- source_word: תִּקְצֹף
  english_pob_choice: will you be angry
  chosen_spanish: te enojarás
  alternatives_spanish:
  - te indignarás
  - arderá tu ira
  lexicon: HALOT
  rationale: «Enojarás» expresa claramente la ira divina en español moderno. Se evita una fórmula más rígida para conservar legibilidad, sin suavizar el juicio implícito.
theological_decisions:
- issue: Sentido de «Dios de los espíritus de toda carne»
  english_pob_reading: A title for God emphasizing his sovereign knowledge of and authority over the inner life of every human being.
  chosen_spanish_reading: Un título para Dios que subraya su conocimiento soberano y su autoridad sobre la vida interior de todo ser humano.
  alternative_spanish_readings:
  - Un título que enfatiza a Dios como dador del aliento/vida a toda criatura
  - Una referencia a la vida espiritual de toda la humanidad
  rationale: El contexto es una súplica para que Dios distinga la culpa individual del castigo colectivo. «Espíritus» mantiene la tensión del hebreo y apoya esa lógica sin reducirla solo a «aliento».
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document contextual choice.'
- issue: Valor representativo de «un solo hombre»
  english_pob_reading: 'One man may function representatively: the plea is that the sin of an individual should not bring wrath on the entire congregation.'
  chosen_spanish_reading: '«Un solo hombre» puede funcionar de modo representativo: la súplica es que el pecado de un individuo no traiga ira sobre toda la congregación.'
  alternative_spanish_readings:
  - «Una sola persona» puede funcionar representativamente
  - El pecado de uno no debería afectar a todos
  rationale: Se conserva el masculino singular del hebreo y, a la vez, se deja abierta su posible función representativa, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: Revisado contra el texto hebreo masorético y el audit trail inglés. No se detectaron cambios sustanciales en la última pasada; se mantuvo la lectura óptima con ajustes de español natural para vocativo, sintaxis de pregunta y preservación del valor representativo de «un solo hombre».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma preferente para el nombre divino en español, pero aquí el versículo usa el vocativo אֵל y no requiere esa sustitución.
  - «Congregación» se conserva para עֵדָה por coherencia bíblica interna.
  - «Carne» y «espíritus» se preservan para mantener la tensión antropológica del hebreo.
