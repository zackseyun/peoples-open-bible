translation:
  language: es
  text: La tierra dará su fruto, y comerán hasta saciarse, y habitarán[a] en ella con seguridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vivirán seguros en ella'. El verbo hebreo puede traducirse 'vivir' o 'habitar', y la frase enfatiza una residencia segura en la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנָה
  english_pob_choice: will yield
  chosen_spanish: dará
  alternatives_spanish:
  - producirá
  - rendirá
  lexicon: HALOT
  rationale: נתן con la tierra como sujeto expresa producir o dar fruto. En español, «dará» conserva la imagen directa de que la tierra entrega su fruto sin volverla innecesariamente técnica.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En Levítico 25 el referente es la tierra prometida y su fertilidad agrícola. «La tierra» es natural en español y mantiene tanto el sentido geográfico como el agrícola.
- source_word: פִּרְיָהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  lexicon: HALOT
  rationale: פְּרִי significa literalmente «fruto» y puede ampliarse a producción agrícola. «Su fruto» conserva la imagen concreta del hebreo y funciona bien en español.
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and you will eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y comeréis
  - y ustedes comerán
  lexicon: HALOT
  rationale: Es la forma directa del verbo אכל en segunda persona plural. «Comerán» ofrece español actual y neutral, adecuado para texto bíblico de lectura amplia.
- source_word: לָשֹׂבַע
  english_pob_choice: your fill
  chosen_spanish: hasta saciarse
  alternatives_spanish:
  - hasta la satisfacción
  - en abundancia
  lexicon: HALOT
  rationale: שֹׂבַע denota saciedad o plenitud. «Hasta saciarse» expresa esa idea con naturalidad en español y conserva el matiz de comer plenamente.
- source_word: וִישַׁבְתֶּם
  english_pob_choice: and live
  chosen_spanish: y habitarán
  alternatives_spanish:
  - y vivirán
  - y morarán
  lexicon: HALOT
  rationale: ישב suele significar «habitar» o «vivir» en una tierra. Aquí «habitarán» mantiene el tono bíblico y la idea de residencia estable sin sonar arcaico.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguros
  - en seguridad
  lexicon: HALOT
  rationale: בֶּטַח expresa seguridad o confianza. «Con seguridad» comunica bien la estabilidad y protección del habitar en la tierra.
- source_word: עָלֶיהָ
  english_pob_choice: on it
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - allí
  lexicon: HALOT
  rationale: La preposición hebrea remite a la tierra. «En ella» es más natural en español que «sobre ella» para expresar la residencia en la tierra, sin cambiar el referente.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y concuerda con la decisión inglesa de mantener la imagen agrícola concreta de la tierra que produce fruto y del pueblo que habita en seguridad. No se requieren notas textuales ni variantes adicionales para esta frase.
  spanish_consistency_notes:
  - Se preserva «la tierra» como referente concreto del contexto levítico, no como abstracción universal.
  - 'Se mantiene el paralelismo verbal del hebreo: producción de la tierra, consumo pleno y habitación segura.'
  - No se introduce terminología eclesiástica ajena al contexto; el registro es bíblico y claro para lectura pública.
