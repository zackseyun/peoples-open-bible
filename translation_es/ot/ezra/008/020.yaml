translation:
  language: es
  text: Y de entre los servidores del templo[a], que David y los oficiales habían asignado al servicio de los levitas, había doscientos veinte servidores del templo; todos ellos fueron registrados por nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נְתִינִים (Netinim), término técnico para una clase de servidores del templo.
    reason: lexical_alternative
  - marker: b
    text: 'O: "todos ellos fueron designados por nombre".'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנְּתִינִים / נְתִינִים
  english_pob_choice: temple servants
  chosen_spanish: netinim
  alternatives_spanish:
  - servidores del templo
  - sirvientes del templo
  - Nethinim
  lexicon: HALOT
  rationale: El término es técnico y designa una clase reconocida de servidores del templo. En español, mantener 'netinim' conserva la especificidad histórica del vocablo; se acompaña de nota para no dejarlo opaco.
- source_word: שֶׁנָּתַן
  english_pob_choice: had assigned
  chosen_spanish: habían asignado
  alternatives_spanish:
  - habían dado
  - habían nombrado
  - habían designado
  lexicon: HALOT
  rationale: En este contexto administrativo, 'asignado' comunica mejor la acción de destinar personas para un servicio concreto que un simple 'dar'.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  - los gobernantes
  lexicon: HALOT
  rationale: '''Oficiales'' refleja el papel administrativo de los שָּׂרִים en este marco postexílico y evita la arcaización de ''príncipes''.'
- source_word: לַעֲבֹדַת הַלְוִיִּם
  english_pob_choice: to the service of the Levites
  chosen_spanish: al servicio de los levitas
  alternatives_spanish:
  - para la obra de los levitas
  - para servir a los levitas
  lexicon: HALOT
  rationale: '''Servicio'' preserva el sentido cultual y funcional de עֲבֹדָה sin forzar una explicación adicional.'
- source_word: מָאתַיִם וְעֶשְׂרִים
  english_pob_choice: '220'
  chosen_spanish: doscientos veinte
  alternatives_spanish:
  - '220'
  lexicon: HALOT
  rationale: En español bíblico leído públicamente, la forma con palabras resulta más natural y solemne que la cifra arábiga.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: La expresión completa mantiene con claridad el énfasis distributivo del hebreo.
- source_word: נִקְּבוּ בְשֵׁמוֹת
  english_pob_choice: were designated by name
  chosen_spanish: habían sido designados por nombre
  alternatives_spanish:
  - habían sido listados por nombre
  - habían sido registrados por nombre
  - habían sido nombrados
  lexicon: HALOT
  rationale: '''Designados por nombre'' conserva el matiz formal y administrativo del pasivo hebreo; ''por nombre'' reproduce la locución literal sin perder fluidez en español.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene el valor técnico de נְתִינִים, como en el expediente inglés, pero opta por conservar el término transliterado en el cuerpo para evitar una equivalencia demasiado interpretativa. La cifra se expresa con palabras por naturalidad española.
  spanish_consistency_notes:
  - Se ha mantenido 'levitas' en minúscula por referirse al grupo sacerdotal/tribal como nombre común en español bíblico.
  - '''Designados por nombre'' preserva la ambigüedad entre registro formal y simple enumeración, tal como lo hace la nota alternativa del POB inglés.'
