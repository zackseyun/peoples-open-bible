review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וַיָּשָׁב = «volvió», שֵׁנִית = «por segunda vez», וַיִּגַּע בּוֹ = «lo tocó», y el mandato causal queda bien representado. También preserva correctamente el nombre divino como «Yahvé» y mantiene la alternativa léxica para מַלְאָךְ. La única debilidad relevante está en רַב מִמְּךָ הַדָּרֶךְ: «el camino es demasiado para ti» suena incompleto o poco idiomático en español, y no comunica con suficiente claridad que el trayecto excede sus fuerzas.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero la cláusula final necesita un ajuste idiomático. «El camino es demasiado para ti» resulta algo calcado; en español bíblico legible conviene explicitar que el trayecto es excesivo para sus fuerzas. «El viaje es demasiado para ti» mejora algo, pero «el camino es demasiado largo» reduciría indebidamente el sentido. Una formulación como «el camino es demasiado para tus fuerzas» preserva mejor el valor de sobrepasar la capacidad del oyente.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יהוה, «ángel» con nota alternativa «mensajero», y estilo moderno-digno. No hay conflicto teológico ni terminológico mayor; solo se recomienda ajustar la expresión final por naturalidad y precisión semántica.'
  issues:
  - severity: medium
    issue: La frase «el camino es demasiado para ti» suena poco idiomática en español.
    rationale: Aunque refleja de cerca el hebreo, en español queda elíptica y algo extraña. El hebreo expresa que el camino/jornada excede la capacidad de Elías; conviene explicitar ese matiz para mantener fidelidad y buena legibilidad.
  - severity: low
    issue: «camino» puede entenderse solo como ruta física y no como trayecto exigente.
    rationale: הַדָּרֶךְ puede mantenerse como «camino», pero la construcción necesita apoyo contextual para transmitir que se trata de una jornada superior a sus fuerzas, no meramente de un sendero.
  revised_spanish_text: 'Entonces el ángel de Yahvé volvió por segunda vez, lo tocó y dijo[a]: «Levántate y come, porque el camino es demasiado para tus fuerzas».'
  revised_footnotes:
