translation:
  language: es
  text: Y murieron esos hombres[a], los que habían difundido un mal informe sobre la tierra, por la plaga delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esos hombres» refleja el valor anafórico del hebreo, que señala a los exploradores ya mencionados; también podría traducirse «los hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמֻתוּ
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - y murieron
  lexicon: HALOT
  rationale: El verbo פשוט de מות se rinde de forma natural en pasado narrativo con «murieron». En español puede omitirse o conservarse la conjunción inicial; aquí se conserva la fuerza secuencial con «Y» al inicio de la cláusula.
- source_word: הָאֲנָשִׁים
  english_pob_choice: those men
  chosen_spanish: esos hombres
  alternatives_spanish:
  - los hombres
  - aquellos hombres
  lexicon: HALOT
  rationale: El demostrativo ayuda a recuperar la referencia anafórica a los exploradores ya mencionados. «Esos hombres» mantiene esa proximidad discursiva sin sonar pesado en español.
- source_word: מוֹצִאֵי דִבַּת הָאָרֶץ רָעָה
  english_pob_choice: who had brought out a bad report about the land
  chosen_spanish: los que habían sacado un mal informe sobre la tierra
  alternatives_spanish:
  - los que habían difundido un mal informe sobre la tierra
  - los que habían traído un mal informe sobre la tierra
  lexicon: HALOT
  rationale: La construcción participial identifica a los hombres por su acción previa. «Sacar» conserva mejor la imagen verbal de הוציא que «difundir»; «mal informe» refleja la carga negativa de דִבָּה sin forzar «calumnia», que sería más interpretativa.
- source_word: רָעָה
  english_pob_choice: bad
  chosen_spanish: mal
  alternatives_spanish:
  - malo
  - perverso
  lexicon: HALOT
  rationale: En español «mal informe» es más idiomático y mantiene la valoración negativa del texto. «Malo» suena menos fijo con «informe»; «perverso» intensifica indebidamente el matiz.
- source_word: בַּמַּגֵּפָה
  english_pob_choice: by the plague
  chosen_spanish: por la plaga
  alternatives_spanish:
  - por medio de la plaga
  - a causa de la plaga
  lexicon: HALOT
  rationale: La preposición בְּ aquí expresa medio/instrumento en un contexto de juicio. «Por la plaga» comunica de manera natural la causa inmediata de la muerte en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» conforme a la terminología del proyecto. «Delante de» reproduce la imagen espacial de לִפְנֵי y mantiene el sentido solemne de estar expuestos ante Dios.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del SEÑOR
  - ante el Señor
  rationale: El texto hebreo usa explícitamente el nombre divino, no un título genérico. Por la norma del proyecto, se conserva «Yahvé» en el cuerpo principal, evitando la sustitución por un equivalente reverencial que borre la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se siguió el mismo juicio del audit trail inglés: mantener el valor anafórico de «those men», traducir דִבָּה como «mal informe» y conservar el nombre divino como Yahvé. No hubo revisiones posteriores en el paquete fuente, y el control cruzado indica alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «plaga» para מַגֵּפָה, evitando suavizar el juicio.
  - «Mal informe» conserva la carga negativa sin añadir interpretaciones no atestiguadas.
