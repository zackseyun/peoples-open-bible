    issue: «a los fondos» suena poco natural en este contexto poético
    rationale: Aunque מְצוֹלֹת puede referirse a los fondos del mar, en español bíblico y literario «descendieron a los fondos» resulta más torpe que «a las profundidades» y no mejora claramente la fidelidad.
  - severity: medium
    issue: La nota b no corresponde a una alternativa textual útil para el lector
    rationale: La instrucción pide preservar alternativas significativas, no añadir una nota de taller de traducción. La distinción léxica entre תְּהֹמֹת y מְצוֹלֹת puede resolverse en la traducción sin explicarse en nota si no crea ambigüedad relevante.
  revised_spanish_text: Los abismos[a] los cubrieron; descendieron a las profundidades como una piedra.
