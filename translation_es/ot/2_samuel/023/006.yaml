translation:
  language: es
  text: Pero los malvados[a] son todos como espinos echados a un lado, porque no se los puede tomar con la mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo beliyya‘al aquí probablemente significa 'malvados' o 'gente sin valor', no el nombre propio posterior 'Belial'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְלִיַּעַל
  english_pob_choice: worthless men
  chosen_spanish: hombres indignos
  alternatives_spanish:
  - hombres perversos
  - hombres sin valor
  - Belial
  lexicon: HALOT
  rationale: El contexto exige referencia personal plural, no un nombre propio. 'Indignos' comunica la idea de gente moralmente depravada o sin valor, y evita la ambigüedad de 'Belial' como figura posterior.
- source_word: כְּקוֹץ
  english_pob_choice: like thorns
  chosen_spanish: como espinos
  alternatives_spanish:
  - como espinas
  - como un espino
  - como arbustos espinosos
  lexicon: HALOT
  rationale: La comparación es colectiva y natural en español con plural genérico. 'Espinos' mantiene la imagen de algo punzante y peligroso sin introducir más concreción de la que da el hebreo.
- source_word: מֻנָד
  english_pob_choice: cast aside
  chosen_spanish: arrojados
  alternatives_spanish:
  - echados fuera
  - apartados
  - rechazados
  lexicon: HALOT
  rationale: El participio pasivo expresa ser lanzado o apartado con fuerza. 'Arrojados' conserva el movimiento de rechazo y encaja con la imagen de espinos desechados.
- source_word: לֹא בְיָד יִקָּחוּ
  english_pob_choice: they cannot be taken with the hand
  chosen_spanish: no se los puede tomar con la mano
  alternatives_spanish:
  - no pueden tomarse con la mano
  - no se los toma con la mano
  - no pueden ser agarrados con la mano
  lexicon: HALOT
  rationale: 'La construcción impersonal en español reproduce bien el valor general del hebreo: no se agarran directamente con la mano. ''Con la mano'' refleja la preposición hebrea de manera natural en español.'
theological_decisions:
- issue: ¿Traducir וּבְלִיַּעַל como nombre propio o como descripción moral?
  english_pob_reading: '''worthless men'' indicates common noun sense, not the later personified Belial.'
  chosen_spanish_reading: 'descripción moral: ''hombres indignos'''
  alternative_spanish_readings:
  - Belial
  - hombres de Belial
  - hombres malvados
  rationale: La evidencia contextual y la auditoría inglesa favorecen un sentido descriptivo, no onomástico. En español, 'hombres indignos' conserva la carga moral sin importar una personificación ausente aquí.
  doctrine_reference: Lexical semantics of biblical Hebrew; no doctrinal issue.
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada de 'in the hand' a 'with the hand' para reflejar mejor la preposición hebrea. La versión española sigue ese mismo ajuste con 'con la mano' y mantiene el tono formal-equivalente del pasaje. No se detectan otros cambios relevantes en la base auditada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Espinos'' se eligió por claridad y naturalidad; ''espinas'' habría sido igualmente posible, pero ''espinos'' armoniza mejor con la imagen de plantas arrojadas.'
  - Se conservó la estructura causal de כִּי con 'porque', sin intensificarla a 'pues' o 'ya que'.
