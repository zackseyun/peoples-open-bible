    text: Or, 'your salvation, O God, will set me on high.' The Hebrew verb may also be read as a future statement rather than a prayerful request.
    reason: alternative_reading
  - marker: b
    text: '''Set me on high'' renders a Hebrew verb meaning to place in a high, secure place; hence also ''protect me'' or ''make me secure.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'let your salvation, O God, set me on high'.
    reason: previous_rendering
