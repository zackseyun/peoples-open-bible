review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea general, conserva correctamente «Yahvé», distingue macho/hembra y mantiene «sin defecto» para תמים/תמימה. Sin embargo, no preserva fielmente la decisión auditada para לְחַטָּאת: el inglés POB mantiene «sin offering» en el texto principal y solo da «purification offering» como alternativa en nota. El español «para expiación» cambia la categoría sacrificial a una abstracción/resultante y pierde la taxonomía explícita de la fuente. Además, las notas están desancladas/traspuestas: [a] aparece en «holocausto» pero su contenido corresponde a חטאת, mientras [b] y [c] duplican/expanden שְׁלָמִים más allá del rastro auditado.'
  spanish_quality_summary: El español es legible y digno, pero «cordero macho» suena algo menos natural que «cordero» con el sexo implícito aclarado por contraste o «cordero macho» si se desea máxima explicitud; no es error. El problema principal de calidad es la incoherencia entre anclas y notas. También conviene simplificar la puntuación interna para un fluir más natural.
  glossary_alignment: Alinea bien con el glosario en «Yahvé», «holocausto», «sin defecto» y «ofrendas de paz». No alinea con la preferencia documentada para חַטָּאת en este contexto; debe ser «ofrenda por el pecado» en el texto principal, con nota alternativa «ofrenda de purificación».
  issues:
  - severity: high
    issue: «para expiación» no traduce adecuadamente לְחַטָּאת en esta legislación sacrificial
    rationale: El hebreo nombra una categoría de sacrificio, no simplemente el efecto abstracto de expiación. El English POB auditado retuvo «sin offering» en el texto principal y dejó la alternativa en nota. «Expiación» altera el sentido y la taxonomía cultual.
  - severity: high
    issue: Las notas al pie están mal ancladas
    rationale: La nota [a] está colocada en «holocausto» pero habla de חַטָּאת; la nota [b] está en «expiación» pero habla de שְׁלָמִים; y [c] añade otra nota sobre שְׁלָמִים sin respaldo necesario del rastro inglés. Esto rompe la trazabilidad.
  - severity: medium
    issue: Duplicación innecesaria de notas para שְׁלָמִים
    rationale: El rastro inglés conserva una sola nota con alternativas léxicas para «peace offerings». En español basta una sola nota anclada a «ofrendas de paz».
  - severity: low
    issue: Puntuación algo recargada con comas alrededor de «sin defecto»
    rationale: No es incorrecto, pero sin las comas la enumeración legal fluye mejor en español moderno y sigue siendo clara.
  revised_spanish_text: 'Y él presentará su ofrenda a Yahvé: un cordero macho de un año sin defecto para holocausto, y una cordera de un año sin defecto para ofrenda por el pecado[a], y un carnero sin defecto para ofrendas de paz[b].'
  revised_footnotes:
  - marker: a
    text: O «ofrenda de purificación» para «ofrenda por el pecado». El hebreo חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con la purificación de la impureza o la culpa.
    reason: alternative_reading
  - marker: b
    text: O «ofrendas de bienestar» o «ofrendas de comunión» para «ofrendas de paz».
    reason: lexical_alternative
  revision_rationale: Se corrigió חַטָּאת a «ofrenda por el pecado» para preservar la categoría sacrificial explícita de la fuente y alinearse con la decisión principal del English POB, dejando «ofrenda de purificación» como alternativa en nota. Se reubicaron las notas en sus términos correctos y se eliminó la nota duplicada sobre שְׁלָמִים. También se aligeró la puntuación para un español más natural sin pérdida de precisión.
