review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: mantiene la fórmula narrativa, el sentido judicial de כְּהִשָּׁפֵט, la expresión dinástica ''casa de Acab'', la relación explícita ''los hijos de los hermanos de Ocozías'' y el participio ''sirviendo''. Sin embargo, ''sobre la casa de Acab'' suena poco natural en español con ''ejecutar juicio'', y el giro inicial ''Y aconteció[a] que'' queda innecesariamente pesado. Una leve reparación mejora la fidelidad funcional sin apartarse del sentido fuente.'
  spanish_quality_summary: 'El texto es comprensible y de registro bíblico sobrio, pero tiene dos roces de naturalidad: ''Y aconteció[a] que'' es más arcaizante de lo necesario, y ''ejecutando juicio sobre la casa de Acab'' resulta menos idiomático que ''contra la casa de Acab'' o una reestructuración equivalente. El resto lee bien y conserva claridad.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Nombres propios en forma tradicional española son aceptables aquí. 'Oficiales', 'sirviendo' y 'los mató' están bien alineados con las decisiones auditadas. La principal mejora es sintáctica/idiomática, no terminológica.
  issues:
  - severity: medium
    issue: '''ejecutando juicio sobre la casa de Acab'' suena forzado en español'
    rationale: Aunque 'sobre' calca bien el inglés 'on', en español con 'ejecutar juicio' la construcción más natural para acción punitiva dirigida a un objeto es 'contra'. Esto preserva mejor la fuerza judicial documentada sin sonar calcado.
  - severity: low
    issue: '''Y aconteció[a] que'' es pesado y algo arcaizante'
    rationale: La fórmula hebrea ויהי puede mantenerse con dignidad en español como 'Y sucedió[a] que' o similar. 'Aconteció' no es incorrecto, pero la meta del proyecto pide español moderno y legible, evitando arcaísmo innecesario.
  revised_spanish_text: Y sucedió[a] que, cuando Jehú estaba ejecutando juicio contra la casa de Acab, halló a los oficiales de Judá y a los hijos de los hermanos de Ocozías, sirviendo a Ocozías[b], y los mató.
  revised_footnotes:
  - marker: a
    text: 'O: «cuando Jehú estaba juzgando la casa de Acab».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hijos de los hermanos de Ocozías»; es decir, los sobrinos de Ocozías.'
    reason: lexical_alternative
  revision_rationale: 'Se hacen dos ajustes menores: ''Y sucedió'' mejora la legibilidad moderna manteniendo la función narrativa de ויהי, y ''contra la casa de Acab'' hace idiomático en español el sentido punitivo/judicial de כְּהִשָּׁפֵט עִם בֵּית אַחְאָב mejor que ''sobre''. No se requieren cambios en las notas ni en las demás decisiones léxicas.'
