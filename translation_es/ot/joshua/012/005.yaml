    issue: «y gobernando sobre» es gramatical pero poco natural como arranque de versículo en español.
    rationale: El participio hebreo sí continúa la descripción previa, pero en español una relativa explicativa o continuación con verbo finito suena más idiomática. «que gobernaba sobre» conserva la continuidad sin sonar forzado.
  - severity: medium
    issue: «Salca» no refleja bien la forma documentada en la auditoría inglesa («Salecah»).
    rationale: La forma española puede adaptarse, pero «Salecá» o similar mantiene mejor la correspondencia con el topónimo fuente y evita una reducción no justificada.
  - severity: low
