    text: Or 'a righteous shoot' or 'a righteous sprout.' The Hebrew metaphor denotes a Davidic offshoot arising from David's line.
    reason: lexical_alternative
  - marker: b
    text: Or 'deal wisely' or 'prosper.' The Hebrew verb can include both wise action and resulting success.
    reason: lexical_alternative
