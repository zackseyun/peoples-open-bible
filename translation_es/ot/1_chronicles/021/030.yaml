translation:
  language: es
  text: Pero David no pudo ir delante de ella[a] para buscar a Dios, porque estaba aterrorizado por la espada del ángel de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de él», si el pronombre se toma como referencia a Dios en vez del tabernáculo de Gabaón.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Ahora ... no
  lexicon: HALOT
  rationale: La conjunción introduce una continuidad narrativa con leve contraste respecto del versículo anterior; en español, «Pero» comunica ese matiz de transición sin volver la frase artificiosa.
- source_word: יָכֹל
  english_pob_choice: could
  chosen_spanish: pudo
  alternatives_spanish:
  - fue capaz de
  - no fue capaz de
  lexicon: HALOT
  rationale: El verbo expresa capacidad; «no pudo» es la forma natural en español con el infinitivo siguiente.
- source_word: לָ/לֶכֶת
  english_pob_choice: go
  chosen_spanish: ir
  alternatives_spanish:
  - caminar
  - venir
  lexicon: HALOT
  rationale: Aquí el infinitivo de הלך expresa desplazamiento hacia un lugar; «ir» es idiomático y fiel al contexto.
- source_word: לְ/פָנָי/ו
  english_pob_choice: before it
  chosen_spanish: para buscar a Dios[a]
  alternatives_spanish:
  - ante él
  - ante ese lugar
  - ante ello
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular admite una referencia ambigua; siguiendo el audit trail inglés, se mantiene la posibilidad textual con una nota que explica que puede referirse al tabernáculo/lugar de culto o, alternativamente, a Dios. En el cuerpo español, «para buscar a Dios» conserva la función de finalidad del infinitivo siguiente y evita forzar una referencia incorrecta en una sola palabra.
- source_word: לִ/דְרֹ֣שׁ אֱלֹהִ֑ים
  english_pob_choice: to seek God
  chosen_spanish: buscar a Dios
  alternatives_spanish:
  - consultar a Dios
  - inquirir de Dios
  lexicon: HALOT
  rationale: דָרַשׁ con Dios puede tener el sentido de buscarle devotamente o consultarle; «buscar a Dios» preserva ese alcance religioso sin reducirlo a consulta técnica.
- source_word: כִּ֣י
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón por la que David no pudo ir; «porque» expresa con claridad esa relación causal.
- source_word: נִבְעַ֔ת
  english_pob_choice: was terrified
  chosen_spanish: se aterrorizó
  alternatives_spanish:
  - tuvo miedo
  - se espantó
  - se atemorizó
  lexicon: HALOT
  rationale: El nifal comunica quedar sobrecogido por terror o pavor; «se aterrorizó» refleja con fuerza esa intensidad en español.
- source_word: מִ/פְּנֵ֕י
  english_pob_choice: by
  chosen_spanish: ante
  alternatives_spanish:
  - a causa de
  - por
  - desde la presencia de
  lexicon: HALOT
  rationale: Con un verbo de temor, la preposición expresa la fuente del miedo. «Ante» conserva la imagen de confrontación/presencia que el hebreo permite y encaja con la escena.
- source_word: חֶ֖רֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - filo
  - arma
  lexicon: HALOT
  rationale: El arma literal está en vista en la narración; «espada» mantiene la concreción del texto.
- source_word: מַלְאַ֥ךְ יְהוָֽה
  english_pob_choice: the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del Señor
  lexicon: HALOT
  rationale: מַלְאַךְ se entiende aquí como ser celestial, por lo que «ángel» es apropiado. YHWH se rinde como «Yahvé» según el estándar del proyecto, no como una sustitución reverencial impersonal.
- source_word: יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino.
theological_decisions:
- issue: Referente de לְפָנָיו ('before it/him')
  english_pob_reading: The pronoun refers to the tabernacle/tent at Gibeon rather than to God or the angel.
  chosen_spanish_reading: El pronombre queda implícitamente ligado al lugar de culto en el contexto inmediato, sin fijarlo de manera excesiva en la línea principal; la nota permite también la lectura «ante él» si se toma como referencia a Dios.
  alternative_spanish_readings:
  - ante él
  - ante ese lugar
  rationale: El contexto inmediato del versículo anterior menciona el tabernáculo y el altar en Gabaón. Para no cerrar indebidamente una ambigüedad real, el texto español evita una elección rígida en la línea principal y la nota preserva la alternativa documentada.
  doctrine_reference: Ambigüedad pronominal del hebreo y contexto narrativo de 1 Crónicas 21:29-30
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios y fue confirmado con alto acuerdo en la verificación cruzada. La redacción española mantiene la ambigüedad documentada del pronombre con una nota, y conserva el tono narrativo y la intensidad de miedo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «ángel» y no «mensajero» porque el contexto narra un ser celestial con espada.
  - «Buscar a Dios» conserva el matiz devocional de דרש sin volverlo técnico.
  - La construcción «se aterrorizó» refleja la fuerza del nifal mejor que un simple «tuvo miedo».
