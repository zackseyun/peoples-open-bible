translation:
  language: es
  text: No recibo gloria[a] de los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'honor' o 'alabanza' para 'gloria'.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: ''de los hombres''; el término también puede significar ''de la gente'' o ''de los seres humanos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - alabanza
  lexicon: BDAG
  rationale: δόξα aquí puede abarcar honor, alabanza o estima. En español, 'gloria' conserva el vínculo joánico con el tema de la gloria y, en este contexto, comunica de forma natural la aprobación humana que Jesús niega recibir como fuente de validación.
- source_word: παρὰ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de la gente
  - de los seres humanos
  lexicon: BDAG
  rationale: La construcción con παρά + genitivo expresa procedencia, por lo que 'de' reproduce bien el valor de origen. 'De los hombres' mantiene la forma masculina plural del griego y conserva la precisión del audit trail, aunque el sentido sea genérico para la humanidad.
- source_word: οὐ λαμβάνω
  english_pob_choice: I do not receive
  chosen_spanish: No recibo
  alternatives_spanish:
  - No acepto
  - No estoy recibiendo
  lexicon: BDAG
  rationale: λαμβάνω se traduce de manera directa con 'recibir'. En presente simple, 'No recibo' es natural en español y preserva la fuerza de la declaración sin introducir 'busco' o 'acepto' en el texto principal.
theological_decisions:
- issue: Sentido de la negación respecto al honor humano
  english_pob_reading: A denial that his mission or identity depends on human acclaim
  chosen_spanish_reading: Una negación de que su misión o identidad dependan de la aprobación humana
  alternative_spanish_readings:
  - Una negación de que reciba jamás ningún honor humano en ningún sentido
  - Una afirmación de que no busca gloria humana
  rationale: El griego y el contexto permiten entender que Jesús no afirma una negación absoluta de cualquier honra humana, sino que no deriva su validación de ella. La traducción principal evita añadir 'busco' y mantiene la tensión interpretativa del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma explicativa en el texto principal
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el criterio auditado del POB en inglés. No se introdujeron cambios interpretativos adicionales; se mantuvo la distinción entre 'gloria' y el posible rango semántico de 'honor/alabanza', así como la procedencia expresada por παρά + genitivo.
  spanish_consistency_notes:
  - Se mantiene 'gloria' como término joánico coherente con el resto del proyecto.
  - '''De los hombres'' conserva la forma genérica masculina del original, con nota para aclarar su alcance inclusivo.'
  - La negación simple 'No recibo' preserva el tiempo presente y evita una paráfrasis excesiva.
