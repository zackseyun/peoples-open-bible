translation:
  language: es
  text: porque actuaron con infidelidad contra mí entre los hijos de Israel[a], en las aguas de Meribat-Cadés[b], en el desierto de Zin, porque no me trataron como santo[c] entre los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los israelitas» por «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «Meribá de Cadés» o, más literalmente, «las aguas de la contienda de Cadés».
    reason: lexical_alternative
  - marker: c
    text: O «no me santificaron» o «no honraron mi santidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַלְתֶּם
  english_pob_choice: acted unfaithfully
  chosen_spanish: actuaron con infidelidad
  alternatives_spanish:
  - fueron infieles
  - cometieron una traición
  - obraron con deslealtad
  lexicon: HALOT
  rationale: El verbo מעל expresa una ruptura de fidelidad con matiz de culpa relacional y pactal. «Actuaron con infidelidad» mantiene el valor verbal y el tono moral del pasaje sin volverlo demasiado técnico.
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mí
  - conmigo
  lexicon: HALOT
  rationale: Con מעל, el complemento marca a la persona ofendida. En español, «contra mí» transmite mejor el sentido idiomático que una traducción más literal como «en mí».
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - en medio de los hijos de Israel
  - entre los israelitas
  - en medio del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma fuente «hijos de Israel» para respetar la textura del hebreo y la repetición del verso. «Entre» expresa bien בְּתוֹךְ en español natural.
- source_word: בְּמֵי מְרִיבַת קָדֵשׁ
  english_pob_choice: at the waters of Meribath-kadesh
  chosen_spanish: en las aguas de Meribat-Cadés
  alternatives_spanish:
  - en las aguas de la contienda de Cadés
  - en las aguas de Meribá de Cadés
  lexicon: HALOT
  rationale: El hebreo funciona como designación tradicional de un lugar/evento. Se conserva el nombre propio transliterado para no perder su carácter referencial, siguiendo la decisión del POB inglés.
- source_word: מִדְבַּר צִן
  english_pob_choice: in the wilderness of Zin
  chosen_spanish: en el desierto de Zin
  alternatives_spanish:
  - en el desierto de Sin
  - en la estepa de Zin
  lexicon: HALOT
  rationale: «Desierto» es la equivalencia más natural y reconocible en español bíblico para מִדְבָּר; aquí mantiene el registro sin sonar forzado.
- source_word: לֹא קִדַּשְׁתֶּם אֹתִי
  english_pob_choice: you did not treat me as holy
  chosen_spanish: no me trataron como santo
  alternatives_spanish:
  - no me santificaron
  - no honraron mi santidad
  - no reconocieron mi santidad
  lexicon: HALOT
  rationale: קדשׁ en este contexto no apunta a hacer santo a Dios, sino a reconocerlo y honrarlo como santo delante del pueblo. «Tratar como santo» comunica bien ese valor relacional y público en español contemporáneo.
theological_decisions:
- issue: Valor de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se preserva la forma explícita del hebreo, como hace el POB inglés. Aunque «israelitas» sería más idiomático, «hijos de Israel» conserva mejor la correspondencia textual y la repetición interna del verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de קִדַּשְׁתֶּם אֹתִי
  english_pob_reading: you did not treat me as holy
  chosen_spanish_reading: no me trataron como santo
  alternative_spanish_readings:
  - no me santificaron
  - no proclamaron mi santidad
  - no honraron mi santidad
  rationale: El punto teológico es el fracaso de Moisés y Aarón al representar la santidad de Dios delante de Israel, no una falta en la santidad intrínseca de Dios. La formulación elegida evita confusión y conserva el sentido público-relacional del verbo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; esta redacción mantiene ese resultado y conserva las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene una sola terminología para בְּנֵי יִשְׂרָאֵל como «hijos de Israel» en todo el versículo.
  - «Meribat-Cadés» se conserva como nombre propio compuesto, siguiendo el tratamiento del POB inglés.
  - «Desierto» se usa de forma consistente para מִדְבָּר en este contexto.
  - «Trataron como santo» preserva el matiz de reconocimiento público de la santidad divina sin añadir explicación interpretativa al texto principal.
