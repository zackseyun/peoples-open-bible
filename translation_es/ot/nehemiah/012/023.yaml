translation:
  language: es
  text: Los hijos de Leví, jefes de casas paternas, estaban inscritos en el libro de las crónicas[a], hasta los días de Johanán[b], hijo de Eliasib.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El libro de las crónicas» se refiere aquí a un registro histórico oficial o anales, no necesariamente a los libros bíblicos de Crónicas.
    reason: cultural_note
  - marker: b
    text: También puede transliterarse «Johanán» como «Johanan». El nombre hebreo יוֹחָנָן admite ambas formas en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי לֵוִי
  english_pob_choice: The sons of Levi
  chosen_spanish: Los hijos de Leví
  alternatives_spanish:
  - Los levitas
  lexicon: HALOT
  rationale: Se conserva la estructura constructa del hebreo (“hijos de Leví”) porque el verso precisa enseguida una subcategoría (“cabezas de casas paternas”). Aunque “levitas” es una equivalencia natural, aquí la forma más literal ayuda a reflejar la organización interna del texto.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de casas paternas
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de casas ancestrales
  lexicon: HALOT
  rationale: La expresión apunta a jefes de linaje o familia. “Casas paternas” mantiene el valor de casa/linaje del hebreo y “cabezas” conserva el paralelismo con el inglés auditado sin volverlo demasiado interpretativo.
- source_word: כְּתוּבִים
  english_pob_choice: were recorded
  chosen_spanish: estaban inscritos
  alternatives_spanish:
  - fueron registrados
  - estaban escritos
  lexicon: HALOT
  rationale: El participio pasivo indica que estos nombres quedaron asentados por escrito. “Inscritos” comunica bien el sentido administrativo de registro y evita reducirlo al mero acto material de “escribir”.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the book of the chronicles
  chosen_spanish: en el libro de las crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de los registros históricos
  lexicon: HALOT
  rationale: Aunque עַל es literalmente “sobre”, en español la inclusión dentro de un registro se expresa naturalmente con “en”. “Crónicas” sigue el valor de דִּבְרֵי הַיָּמִים como anales históricos, sin forzar una referencia al libro bíblico homónimo.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - el tiempo de
  - los tiempos de
  lexicon: HALOT
  rationale: Se mantiene la fórmula temporal directa del hebreo. “Los días de” conserva el límite cronológico del registro y su tono bíblico sin perder claridad en español.
- source_word: יֽוֹחָנָ֥ן
  english_pob_choice: Yohanan
  chosen_spanish: Johanán
  alternatives_spanish:
  - Johanan
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo de forma cercana al original. “Johanán” preserva mejor la vocalización semítica que “Johanan”, aunque esta última se reconoce como alternativa en otras tradiciones de transliteración.
- source_word: בֶּן אֶלְיָשִׁיב
  english_pob_choice: son of Eliashib
  chosen_spanish: hijo de Eliasib
  alternatives_spanish:
  - hijo de Elia-sib
  lexicon: HALOT
  rationale: Es un patronímico directo. “Hijo de Eliasib” es la forma natural en español y mantiene la relación familiar sin añadir interpretación.
theological_decisions:
- issue: Alcance de “libro de las crónicas”
  english_pob_reading: “The book of the chronicles” refers to an official historical record or annals, not necessarily the biblical books of Chronicles.
  chosen_spanish_reading: “el libro de las crónicas” se entiende como un registro histórico oficial, no necesariamente los libros bíblicos de Crónicas.
  alternative_spanish_readings:
  - “el libro de Crónicas”
  - “el libro de los anales”
  rationale: El contexto exige un archivo o acta histórica, no una alusión automática al libro canónico de Crónicas. La redacción conserva la ambigüedad funcional y evita identificar indebidamente el documento.
  doctrine_reference: historiografía bíblica / contexto literario
- issue: Transliteración de יוֹחָנָן
  english_pob_reading: The Hebrew name יוֹחָנָן may be transliterated either way in English.
  chosen_spanish_reading: Johanán
  alternative_spanish_readings:
  - Johanan
  rationale: No hay diferencia doctrinal, pero sí una decisión de forma. Se prefirió una transliteración más cercana al hebreo para el cuerpo del texto y se preserva la variante tradicional como alternativa.
  doctrine_reference: ninguna
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético y el expediente auditado en inglés. No hubo revisiones aplicadas en la fuente inglesa, y la coincidencia de control fue alta, así que la versión española sigue de cerca la estructura del original sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantiene “Leví” y “Eliasib” con grafía española estándar de nombres bíblicos.
  - Se evitó “SEÑOR” u otras sustituciones porque el verso no contiene el nombre divino.
  - La formulación “en el libro” se usa por idiomática española, aunque el hebreo literal diga “sobre un libro”.
  - “Crónicas” se deja en minúscula por tratarse de un registro, no del título canónico.
