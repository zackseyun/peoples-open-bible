translation:
  language: es
  text: Con trompetas y el sonido del cuerno[a], lancen una aclamación delante del Rey, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el sonido del cuerno de carnero». El hebreo שׁוֹפָר suele referirse de modo específico a un cuerno de carnero, distinto de las trompetas mencionadas antes en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲצֹצְרוֹת
  english_pob_choice: With trumpets
  chosen_spanish: Con trompetas
  alternatives_spanish:
  - Con trompetas de plata
  - Con trompetas,
  - Con bocinas
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת designa trompetas, probablemente el instrumento metálico recto, distinto del שׁוֹפָר. El prefijo ב se vierte instrumentalmente como 'con'. No se añade 'de plata' porque el hebreo no lo expresa aquí.
- source_word: וְקוֹל שׁוֹפָר
  english_pob_choice: and the sound of the horn
  chosen_spanish: y el sonido del cuerno
  alternatives_spanish:
  - y el sonido del cuerno de carnero
  - y la voz del cuerno
  - y el sonido del shofar
  lexicon: HALOT
  rationale: קוֹל es 'sonido/voz' y שׁוֹפָר nombra el instrumento de cuerno. 'Cuerno' preserva la distinción léxica respecto de las 'trompetas'. 'Cuerno de carnero' es una alternativa válida y más específica, por eso se conserva en nota.
- source_word: הָרִיעוּ
  english_pob_choice: raise a shout
  chosen_spanish: den un grito
  alternatives_spanish:
  - aclámenlo con un grito
  - prorrumpan en gritos
  - den un clamor
  lexicon: HALOT
  rationale: El imperativo hifil plural de רוע aquí exige una exclamación fuerte y festiva. 'Den un grito' comunica bien el acto de alzar una aclamación audible sin añadir una glosa interpretativa que el hebreo no exige.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: '''Delante de'' expresa de manera natural la relación espacial-relacional de לִפְנֵי en español contemporáneo.'
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El sustantivo definido se traduce como 'el Rey'. La mayúscula refleja que el contexto identifica al Rey como Yahvé, manteniendo el valor de título divino sin cambiar el sentido léxico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se vierte el Tetragrámaton con el nombre propio 'Yahvé' para preservar el nombre divino revelado, en vez de sustituirlo por un título.
theological_decisions:
- issue: Relación entre 'el Rey' y 'Yahvé'
  english_pob_reading: 'appositional: ''the King, the LORD'''
  chosen_spanish_reading: 'aposicional: ''el Rey, Yahvé'''
  alternative_spanish_readings:
  - delante de Yahvé, el Rey
  - delante del Rey, el SEÑOR
  rationale: 'La secuencia hebrea הַמֶּלֶךְ יְהוָה se entiende naturalmente como aposición: Yahvé es el Rey. El español mantiene esa identificación con claridad y sin perder la estructura del original.'
  doctrine_reference: 'DOCTRINE.md: Divine name / title identification'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La política terminológica del proyecto exige usar 'Yahvé' para el Nombre divino. Esto conserva la distinción entre nombre propio y título, y evita la sustitución tradicional por 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide en lo esencial con la auditoría inglesa. Se mantiene la distinción entre חֲצֹצְרוֹת ('trompetas') y שׁוֹפָר ('cuerno'), así como la lectura aposicional 'el Rey, Yahvé'. No se introducen elementos ausentes en el original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la distinción léxica entre 'trompetas' y 'cuerno'.
  - '''Delante de'' mantiene la relación espacial-relacional de לִפְנֵי en un español natural.'
  - La mayúscula en 'Rey' refleja su función como título divino en este contexto.
