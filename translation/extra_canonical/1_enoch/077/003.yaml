translation:
  text: 'And the fourth wind[a], whose name is the North, is divided into three parts: one part for a dwelling for humankind, and another is over the seas of water of water, and over the abysses, and over the forests, and over the rivers, and over darkness, and over mist[g][f][e][d][c][b]; and the third part is in the garden of righteousness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name 'Mesʿ' is transliterated from the Ge'ez; its meaning is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'seas of water' is literal and may simply mean 'the seas,' but the fuller wording has been retained to reflect the Ge'ez.
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'mist' is uncertain and could also be understood as 'fog,' 'cloud,' or a similar atmospheric vapor.
    reason: lexical_alternative
  - marker: d
    text: '''Garden of righteousness'' may evoke Eden or Paradise, but the translation keeps the Ge''ez expression without specifying the identification.'
    reason: cross_reference
  - marker: e
    text: Or 'whose name is Mesʿ'.
    reason: previous_rendering
  - marker: f
    text: Or 'over the valleys'.
    reason: previous_rendering
  - marker: g
    text: Or 'over the wilderness'.
    reason: previous_rendering
