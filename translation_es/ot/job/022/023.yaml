review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés en los puntos principales: condicional inicial, שוב como ''vuelves'', שדי como ''Todopoderoso'', תִּבָּנֶה como restauración metafórica, y ''tienda'' para אָהֶל. Sin embargo, el hebreo presenta una construcción condicional asindética/yuxtapuesta en la segunda mitad (''[si] alejas la iniquidad de tu tienda''), y el inglés la hace explícita con un segundo ''if''. Eso es aceptable en español, pero la puntuación final del borrador deja la oración incompleta de forma más abrupta que el original. Además, la nota b no refleja fielmente las alternativas documentadas en inglés para עַוְלָה.'
  spanish_quality_summary: El español es claro y digno, pero requiere un pequeño ajuste en la nota léxica b y una mejora estilística mínima para que la frase final suene más natural y precisa. 'hacer injusto' no es una alternativa válida para el sustantivo עַוְלָה. 'Apartas' funciona, pero 'alejas' refleja mejor el matiz de 'poner lejos' y armoniza con la nota inglesa 'put far'.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'el Todopoderoso' para שדי es correcto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La elección 'injusticia' para עַוְלָה es aceptable, con alternativas mejor formuladas en nota.
  issues:
  - severity: medium
    issue: 'La nota b contiene una alternativa incorrecta: ''hacer injusto''.'
    rationale: עַוְלָה es un sustantivo ('injusticia', 'maldad', 'iniquidad', 'agravio'), no una expresión verbal como 'hacer injusto'. La nota debe preservar alternativas léxicas fieles al sustantivo, en línea con el audit trail inglés.
  - severity: low
    issue: '''Apartas'' es aceptable, pero ''alejas'' comunica con más precisión el causativo ''poner lejos''.'
    rationale: תַּרְחִיק (hiphil) denota hacer que algo esté lejos. 'Alejas' suena más exacto y natural que 'apartas' en este contexto moral.
  - severity: low
    issue: La puntuación final puede mejorarse para reflejar mejor la continuidad del versículo.
    rationale: El texto fuente continúa sin cierre fuerte conceptual aquí; en español una coma final tras la segunda cláusula condicional mantiene mejor la sensación de continuación que un punto tras una frase elíptica.
  revised_spanish_text: Si vuelves al Todopoderoso[a], serás restaurado; si alejas la injusticia[b] de tu tienda,
  revised_footnotes:
  - marker: a
    text: O 'serás edificado' o 'serás reconstruido'. El verbo hebreo significa literalmente 'ser construido' y se usa metafóricamente para restauración o restablecimiento.
    reason: lexical_alternative
  - marker: b
    text: O 'maldad', 'agravio' o 'iniquidad'.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y del POB inglés, pero se corrige una alternativa léxica errónea en la nota b, se afina el verbo a 'alejas' para reflejar mejor el causativo hebreo, y se ajusta la puntuación para que el español represente mejor la continuidad sintáctica del versículo.
