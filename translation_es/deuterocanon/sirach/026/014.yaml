translation:
  language: es
  text: La gracia de la esposa deleita a su esposo[a], y su entendimiento pone carne en sus huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su conocimiento engorda sus huesos». El griego conserva una metáfora corporal del efecto fortalecedor de una esposa sabia.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - encanto
  - favor
  - amabilidad
  lexicon: BDAG
  rationale: En este contexto, χάρις expresa una cualidad agradable y benévola de la esposa. «Gracia» conserva esa amplitud moral y estética sin reducirla a simple atractivo físico. Además, encaja con el audit trail inglés y mantiene la concisión del paralelismo.
- source_word: γυναικός
  english_pob_choice: wife's
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: Aunque γυνή puede significar «mujer» o «esposa», la mención inmediata de «su esposo» inclina claramente hacia la relación conyugal. «Esposa» comunica mejor el vínculo contextual en español.
- source_word: τέρψει
  english_pob_choice: delights
  chosen_spanish: deleita
  alternatives_spanish:
  - alegra
  - da placer a
  lexicon: BDAG
  rationale: El futuro de τέρπω expresa causar deleite o placer. «Deleita» reproduce con naturalidad esa fuerza afectiva en español y mantiene el tono positivo del hemistiquio.
- source_word: ἐπιστήμη
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - conocimiento
  - discernimiento
  - buen juicio
  lexicon: BDAG
  rationale: En este contexto sapiencial doméstico, ἐπιστήμη no apunta solo a información, sino a comprensión práctica. «Entendimiento» conserva esa amplitud y suena natural en español bíblico contemporáneo.
- source_word: πιανεῖ
  english_pob_choice: puts flesh on
  chosen_spanish: pone carne sobre
  alternatives_spanish:
  - engorda
  - fortalece
  - hace robusto
  lexicon: LSJ
  rationale: El verbo conserva una metáfora corporal de robustecer. «Pone carne sobre» mantiene la imagen concreta del griego y evita una abstracción que perdería el efecto físico del texto.
- source_word: τὰ ὀστᾶ αὐτοῦ
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - su cuerpo
  - su estructura
  lexicon: BDAG
  rationale: «Huesos» reproduce de manera directa la imagen corporal del griego. En español, el plural literal conserva mejor la metáfora de fortaleza y vitalidad que una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (LXX 1909) y el audit trail inglés. La versión española conserva el paralelismo y la metáfora corporal, evitando suavizar el verbo ni sustituir la imagen por una explicación.
  spanish_consistency_notes:
  - Se mantuvo «gracia» para χάρις, en línea con el registro del proyecto.
  - «Esposa/esposo» refleja el contexto relacional explícito del verso.
  - La nota al pie preserva la alternativa semántica documentada para πιανεῖ/ἐπιστήμη sin perder la lectura principal.
  - Se conservaron los «huesos» literales para no diluir la metáfora sapiencial.
