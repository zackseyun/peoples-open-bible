translation:
  language: es
  text: Con mi voz clamo a Yahvé[a][b][c]; con mi voz suplico misericordia a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con mi voz clamo a Yahvé; con mi voz suplico misericordia a Yahvé».'
    reason: alternative_reading
  - marker: b
    text: El hebreo repite «con mi voz» para dar énfasis y paralelismo poético.
    reason: lexical_alternative
  - marker: c
    text: 'Otra traducción anterior: «… suplico por misericordia a Yahvé».'
    reason: previous_rendering
lexical_decisions:
- source_word: ק֭וֹלִי
  english_pob_choice: with my voice
  chosen_spanish: con mi voz
  alternatives_spanish:
  - mi voz
  - en voz alta
  lexicon: HALOT
  rationale: El hebreo pone delante el sustantivo «voz» con sufijo de 1ª persona; «con mi voz» conserva el valor concreto del término y su prominencia poética, mejor que una reformulación adverbial como «en voz alta».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Yahvé. En español, «a» funciona de manera natural con verbos de clamor y súplica y mantiene esa orientación relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en su forma transliterada «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֶזְעָק
  english_pob_choice: I cry out
  chosen_spanish: clamo
  alternatives_spanish:
  - grito
  - clamo a voces
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso y audible. «Clamo» comunica bien esa fuerza en español y encaja con la repetición de «con mi voz» sin volver el verso pesado.
- source_word: אֶתְחַנָּן
  english_pob_choice: I plead for mercy
  chosen_spanish: suplico ... por misericordia
  alternatives_spanish:
  - imploro ... favor
  - ruego ... misericordia
  - pido gracia
  lexicon: HALOT
  rationale: El hitpael de חנן expresa una petición insistente de favor/compasión. «Suplico ... por misericordia» preserva la fuerza de la petición y evita un giro demasiado técnico como «hago súplica».
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio «Yahvé» para conservar la distinción entre nombre personal y título, coherente con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Intensidad de la súplica final
  english_pob_reading: I plead for mercy
  chosen_spanish_reading: suplico ... por misericordia
  alternative_spanish_readings:
  - imploro ... favor
  - ruego ... misericordia
  rationale: No se atenúa el sentido del hitpael de חנן. «Por misericordia» mantiene la orientación del pedido hacia la obtención de compasión o favor, sin convertirlo en una mera oración formal.
  doctrine_reference: HALOT; uso contextual de חנן en peticiones de favor divino
translation_notes:
  revision_awareness: Se siguió el auditable inglés POB, respetando la repetición enfática de «with my voice» y la lectura de ׳חנן׳ como súplica de misericordia. La redacción española conserva el paralelismo hebreo sin calcar de forma rígida la sintaxis inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al criterio general del proyecto.
  - «Con mi voz» conserva la repetición de קוֹלִי en ambos cola.
  - «Clamo» y «suplico» distinguen bien entre el grito intenso y la petición de favor.
  - «Misericordia» mantiene el campo semántico de חנן en un español eclesial claro y moderno.
