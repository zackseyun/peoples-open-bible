    text: 'O: «permaneció». El hebreo expresa que el arca siguió estando allí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «anheló a Yahvé» o «se lamentó hacia Yahvé». El hebreo dice literalmente: «lamentó tras Yahvé», un giro idiomático que puede expresar duelo y orientación hacia él.'
    reason: alternative_reading
  revision_rationale: Se ajusta el idiomatismo temporal a un español más natural y cercano al sentido fuente ('los días se hicieron muchos') y se corrige la nota [a] para que describa con precisión el valor de שֶׁבֶת. También se mejora levemente la alternativa de la nota [b] para español más natural ('anheló a Yahvé'). No se requiere adjudicación adicional porque el sentido general y la teología ya están bien documentados en el audit trail.
