revisions:
- from: Y el sacerdote examinará la zona afectada[a], y he aquí, su apariencia está más profunda que la piel, y en ella hay pelo amarillo fino; entonces el sacerdote lo declarará impuro; es un enredamiento[b], lepra del cabeza o de la barba.
  to: Y el sacerdote examinará la zona afectada, y he aquí, su apariencia es más profunda que la piel, y en ella hay pelo amarillo fino; entonces el sacerdote lo declarará impuro; es una comezón[a], una enfermedad de la piel[b] de la cabeza o de la barba.
  rationale: 'Se corrigen dos errores sustanciales de fidelidad y terminología: ''enredamiento'' se reemplaza por ''comezón'' para reflejar el término específico נֶתֶק con una nota que preserva la alternativa tradicional y la incertidumbre, y ''lepra'' se reemplaza por ''enfermedad de la piel'' conforme al criterio documentado del POB para צָרַעַת. También se corrigen la ancla de la nota, la gramática de ''de la cabeza'' y la naturalidad de ''su apariencia es más profunda que la piel''.'
