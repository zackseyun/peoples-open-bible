revisions:
- from: Muy justamente[a]; porque, ya que había cometido muchos pecados contra el altar, cuyo fuego y ceniza eran santos[b], recibió la muerte en ceniza.
  to: Muy justamente[a]; porque había cometido muchos pecados contra el altar, cuyo fuego y cuyas cenizas eran sagrados, encontró la muerte en cenizas[b].
  rationale: La revisión corrige redundancia causal, mejora la gramática española en la descripción cultual del altar, y reemplaza la poco idiomática expresión 'en ceniza' por 'en cenizas', que comunica mejor el sentido en español sin perder el eco deliberado del griego. 'Encontró la muerte' también suena más natural que 'recibió la muerte' y sigue representando bien τὸν θάνατον ἐκομίσατο.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:55:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido griego general: enfatiza que la muerte fue merecida, mantiene ''muchos pecados contra el altar'' y conserva la ironía de morir en relación con la ceniza del altar. Sin embargo, dos elecciones españolas no preservan bien la naturalidad ni del todo la fuerza del original: ''cuyo fuego y ceniza eran santos'' suena gramaticalmente forzado en español porque ''fuego'' y ''ceniza'' no comparten género, y ''en ceniza'' resulta poco idiomático donde el griego colectivo σποδός se expresa mejor en español como ''cenizas''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere pulido para sonar natural en español eclesial contemporáneo. 'Muy justamente' funciona. 'Porque, ya que' es redundante y pesada la transición causal; basta 'porque'. 'Recibió la muerte en ceniza' es comprensible, pero menos idiomático que 'encontró la muerte en cenizas' o 'murió entre cenizas'. Para conservar cercanía al inglés POB y al griego, 'encontró la muerte en cenizas' equilibra literalidad y buena lectura.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ''Pecados'', ''altar'' y la lectura cultual de ἁγνός como santidad/consagración están bien encaminadas. La principal corrección terminológica es estilística: en español conviene repetir el posesivo y ajustar número/género en ''cuyo fuego y cuyas cenizas eran santos/as'' o reformular. También conviene usar ''cenizas'' para σποδός aquí, porque en español el plural es la forma más natural tanto para la referencia al altar como para la frase final ecoica.'
  issues:
  - severity: medium
    issue: 'Construcción causal redundante: ''porque, ya que'''
    rationale: ἐπεὶ γὰρ introduce una causa enfática, pero en español juntar 'porque' y 'ya que' sobrecarga la frase. 'Porque' por sí solo expresa bien la relación causal.
  - severity: high
    issue: '''cuyo fuego y ceniza eran santos'' es gramatical y estilísticamente deficiente'
    rationale: El español no maneja bien un adjetivo plural masculino ('santos') para un par coordinado de sustantivos de distinto género en este contexto. Conviene reformular a 'cuyo fuego y cuyas cenizas eran sagrados' o mejor 'porque tanto el fuego como las cenizas de ese altar eran sagrados'.
  - severity: high
    issue: '''en ceniza'' es poco idiomático en español'
    rationale: Aunque busca reproducir el singular colectivo griego, en español bíblico y general la expresión natural es 'en cenizas'. Esto además preserva el eco con el altar y sus cenizas santas.
  - severity: medium
    issue: La nota [b] explica una literalidad que no coincide bien con el español revisado
    rationale: Si se revisa el texto principal a 'en cenizas', la nota debe aclarar que el griego dice literalmente 'en ceniza recibió la muerte', manteniendo la observación sobre el eco verbal.
  revised_spanish_text: Muy justamente[a]; porque había cometido muchos pecados contra el altar, cuyo fuego y cuyas cenizas eran sagrados, encontró la muerte en cenizas[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Muy rectamente». La apertura griega intensifica que su destino fue merecido.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «en ceniza recibió la muerte», probablemente en eco de sus pecados contra el altar y sus cenizas sagradas.
    reason: lexical_alternative
  revision_rationale: La revisión corrige redundancia causal, mejora la gramática española en la descripción cultual del altar, y reemplaza la poco idiomática expresión 'en ceniza' por 'en cenizas', que comunica mejor el sentido en español sin perder el eco deliberado del griego. 'Encontró la muerte' también suena más natural que 'recibió la muerte' y sigue representando bien τὸν θάνατον ἐκομίσατο.
