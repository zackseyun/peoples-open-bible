id: PHP.1.4
reference: Philippians 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πάντοτε ἐν πάσῃ δεήσει μου ὑπὲρ πάντων ὑμῶν, μετὰ χαρᾶς τὴν δέησιν ποιούμενος,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/004.yaml
  text: 'always in every prayer of mine for all of you, praying with joy,'
translation:
  language: ko
  text: 언제나 여러분 모두를 위한 나의 모든 간구마다 기쁨으로 간구하면서,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: always
  chosen_korean: 언제나
  alternatives_korean:
  - 항상
  lexicon: BDAG
  rationale: 시간 부사로 「언제나」가 합쇼체 산문에서 가장 자연스럽다.
- source_word: ἐν πάσῃ δεήσει μου
  english_pob_choice: in every prayer of mine
  chosen_korean: 나의 모든 간구마다
  alternatives_korean:
  - 나의 모든 기도마다
  - 나의 각 간구에서
  lexicon: BDAG
  rationale: δέησις는 「청원·간구」의 어감이 강하므로 일반 「기도(προσευχή)」와 구분하여 「간구」로 옮긴다. πᾶσῃ + 단수 명사는 분배적 「~마다」로 옮긴다.
- source_word: ὑπὲρ πάντων ὑμῶν
  english_pob_choice: for all of you
  chosen_korean: 여러분 모두를 위한
  alternatives_korean:
  - 여러분 모두를 위하여
  lexicon: BDAG
  rationale: 「~을 위한 ~마다」 구조가 한국어 어순으로 가장 매끄럽다.
- source_word: μετὰ χαρᾶς τὴν δέησιν ποιούμενος
  english_pob_choice: praying with joy
  chosen_korean: 기쁨으로 간구하면서
  alternatives_korean:
  - 기쁨으로 그 간구를 드리면서
  - 즐거이 간구하면서
  lexicon: BDAG
  rationale: ποιούμενος(중간태 분사)는 바울이 그 간구를 「드리는」 행위 주체임을 강조한다. 한국어 분사 구문 「간구하면서」가 간결하면서도 행위의 진행성을 보존한다. 영어 POB가 「praying with joy」로 간결화한 흐름을 그대로 따른다.
