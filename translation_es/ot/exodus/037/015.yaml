translation:
  language: es
  text: Hizo las varas de madera de acacia y las recubrió de oro, para llevar la mesa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El verbo narrativo de acción secuencial se rinde de forma natural en español con «hizo». Mantiene el avance de la escena sin forzar una conjunción innecesaria.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los postes
  - las pértigas
  lexicon: HALOT
  rationale: En el contexto del mobiliario del santuario, el término designa piezas de transporte. «Varas» comunica bien esa función en español bíblico contemporáneo y evita el calco de «poles», que puede sonar técnico o ambiguo. Se mantiene el plural y el valor instrumental.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La construcción hebrea expresa el material. «Madera de acacia» es el equivalente claro y natural en español; conserva la referencia botánica sin introducir el término transliterado innecesariamente.
- source_word: וַיְצַף אֹתָם זָהָב
  english_pob_choice: and overlaid them with gold
  chosen_spanish: y las recubrió de oro
  alternatives_spanish:
  - y las cubrió de oro
  - y las plateó de oro
  lexicon: HALOT
  rationale: צפה en este contexto artesanal indica aplicar una capa metálica. «Recubrió de oro» transmite mejor la idea de cubrir con una capa que simplemente «cubrió» y evita una formulación demasiado técnica como «plateó», aunque esa sería una alternativa válida.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para cargar
  - para transportar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para llevar» es idiomático y suficientemente amplio para el uso ritual de las varas. «Transportar» es más técnico; «cargar» puede sonar demasiado coloquial en este contexto.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - el tablero
  lexicon: HALOT
  rationale: El sustantivo hebreo designa una mesa; en español «mesa» es la forma más directa y comprensible. En este contexto tabernacular se entiende como la mesa sagrada, pero el hebreo no añade especificación adicional en este versículo.
translation_notes:
  revision_awareness: El texto base inglés y el control de revisión indican alta concordancia y ausencia de cambios necesarios; por eso la versión española sigue de cerca el contenido hebreo y la decisión lexical ya auditada, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque en este versículo no aparece el nombre divino.
  - Se mantiene un español sobrio y narrativo, apto para lectura pública.
  - Se conserva el valor funcional de las varas como instrumentos para llevar la mesa, sin agregar detalles no presentes en el hebreo.
