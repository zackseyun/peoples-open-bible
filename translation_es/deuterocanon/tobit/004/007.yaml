base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/004/007.yaml
  text: From what you have[a], give alms, and do not let your eye be grudging when you give alms. Do not turn your face away from any poor person[c][b], and the face of God will not be turned away from you.
  footnotes:
  - marker: a
    text: Or 'do not let your eye envy' / 'do not be stingy' when giving; the Greek idiom speaks of a grudging or resentful attitude in almsgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'from any poor person.' The Greek has masculine singular with generic force.
    reason: lexical_alternative
  - marker: c
    text: Or 'the presence of God,' though the Greek literally says 'the face of God' and echoes the previous clause's 'your face.'
    reason: lexical_alternative
