source:
  edition: SBLGNT
  text: καὶ ταῦτά τινες ἦτε· ἀλλὰ ἀπελούσασθε, ἀλλὰ ἡγιάσθητε, ἀλλὰ ἐδικαιώθητε ἐν τῷ ὀνόματι τοῦ κυρίου ⸀Ἰησοῦ καὶ ἐν τῷ πνεύματι τοῦ θεοῦ ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/011.yaml
  text: And such were some of you[a]. But you washed yourselves, but you were sanctified[c][b], but you were justified in the name of the Lord Jesus and in the Spirit of our God.
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''And such were some of you.'''
    reason: lexical_alternative
  - marker: b
    text: 'The Greek form for ''were washed'' can also be understood as ''washed yourselves.'' In context, many understand it as part of a sequence of God''s saving actions.'
    reason: alternative_reading
  - marker: c
    text: 'Or ''And some of you were these things.''.'
    reason: previous_rendering
translation:
  language: ko
  text: 여러분 중 어떤 이들은 그런 사람이었습니다. 그러나 여러분은 우리 하나님의 영 안에서 주 예수의 이름으로 씻음을 받았고, 거룩하게 되었고, 의롭다 함을 받았습니다.
  philosophy: optimal-equivalence
