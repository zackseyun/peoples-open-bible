revisions:
- from: No se enriquecerá, ni su riqueza permanecerá, ni se inclinará a la tierra su abundancia[a].
  to: No se enriquecerá, ni su riqueza permanecerá, ni su fruto[a] se doblará hasta la tierra.
  rationale: Se reemplazó «su abundancia» por «su fruto» para reflejar mejor la decisión principal auditada sobre el término hebreo raro y para conservar la imagen concreta de algo que se dobla hacia la tierra. También se ajustó «se inclinará a la tierra» a «se doblará hasta la tierra», más natural en español y más fiel a la imagen contextual. La nota se reescribió para preservar tanto las alternativas léxicas como la lectura más general documentada en el POB inglés.
