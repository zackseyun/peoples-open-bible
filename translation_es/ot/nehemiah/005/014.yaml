    reason: lexical_alternative
  revision_rationale: Se cambia «el pan del gobernador» por «la asignación de comida del gobernador» para reflejar la decisión documentada de que לֶחֶם aquí es idiomático-administrativo, no pan literal; la alternativa literal se conserva en nota. También se ajusta «yo y mis hermanos» a «mis hermanos y yo» por naturalidad del español, y se pule la puntuación del inciso.
