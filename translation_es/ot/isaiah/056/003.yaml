revisions:
- from: 'No diga el extranjero que se ha unido a Yahvé[a]: «Yahvé ciertamente me apartará de su pueblo»; ni diga el eunuco: «He aquí[c], yo soy un árbol seco[b]».'
  to: 'No diga el extranjero que se ha unido a Yahvé[a]: «Yahvé ciertamente me apartará[b] de su pueblo»; ni diga el eunuco[c]: «He aquí, yo soy un árbol seco».'
  rationale: 'Se corrigen las notas para que correspondan al hebreo y al precedente de la auditoría inglesa: el énfasis se marca en «ciertamente me apartará», no en «árbol seco»; y la nota sobre «eunuco» se restituye como alternativa léxica contextual. Se elimina la nota metatraductológica sobre la revisión inglesa, innecesaria para el lector final.'
