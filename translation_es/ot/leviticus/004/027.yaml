- from: Y si una persona[a] del pueblo de la tierra peca inadvertidamente al hacer uno[b] de los mandamientos de Yahvé que no deben hacerse, y queda culpable.
  to: Y si una persona del pueblo de la tierra[a] peca inadvertidamente al hacer uno de los mandamientos de Yahvé que no deben hacerse, y se hace culpable[b],
  rationale: Se corrigieron las notas para alinearlas con el audit trail inglés y con las verdaderas decisiones léxicas significativas del versículo. También se ajustó 'queda culpable' a 'se hace culpable' para reflejar mejor el valor resultativo de וְאָשֵׁם, y se reemplazó el punto final por coma para mantener la continuidad sintáctica del original.
