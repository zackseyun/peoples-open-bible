  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: el impío recibe la noticia, se enfurece, extiende su hostilidad de Alejandría a los de fuera de la ciudad, ordena reunirlos y procura darles muerte. También preserva adecuadamente la carga de δυσσεβής como «el impío» y el circunloquio de τοῦ ζῇν μεταστῆσαι mediante nota. Sin embargo, hay un desajuste importante de anclaje de nota: la nota [b] explica χώρα, pero en el texto está colocada en «un mismo lugar», donde en realidad corresponde ἐπὶ τὸ αὐτό. Además, «los del país» puede sonar demasiado nacional en español; dado el contraste con Alejandría, «los de la región» o «los del campo/la campiña» comunica mejor la referencia a la zona fuera de la ciudad.'
