translation:
  language: es
  text: 'Di ahora a la casa rebelde[a]: «¿No saben qué significan estas cosas[b]?». Di: «He aquí, el rey de Babilonia vino a Jerusalén, tomó a su rey y a sus oficiales[c], y los llevó a Babilonia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa de la rebeldía». El hebreo puede entenderse como una expresión corporativa de identidad o como una caracterización del pueblo por su rebeldía.'
    reason: alternative_reading
  - marker: b
    text: 'O: «qué son estas cosas». El hebreo probablemente pregunta si la casa rebelde entiende el significado de la alegoría.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sus príncipes». El término hebreo puede referirse a líderes reales o gobernantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית הַמֶּרִי
  english_pob_choice: the rebellious house
  chosen_spanish: la casa rebelde
  alternatives_spanish:
  - la casa de rebelión
  - la casa rebelde de
  lexicon: HALOT
  rationale: Conserva el sustantivo figurado «casa» y reproduce con naturalidad el rasgo caracterizador «rebelde». En español suena más fiel y fluido que una construcción explicativa como «casa de rebelión».
- source_word: הֲלֹא יְדַעְתֶּם
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben?
  alternatives_spanish:
  - ¿No entienden?
  - ¿No conocen?
  lexicon: HALOT
  rationale: «Saber» mantiene el valor cognitivo del hebreo y funciona bien en la pregunta retórica. «Entender» sería más interpretativo.
- source_word: מָה אֵלֶּה
  english_pob_choice: what these things mean
  chosen_spanish: qué significan estas cosas
  alternatives_spanish:
  - qué son estas cosas
  - qué quieren decir estas cosas
  lexicon: HALOT
  rationale: La pregunta apunta al sentido del acto simbólico; «significan» comunica ese valor sin añadir más interpretación de la necesaria.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: Es un marcador de atención. «Mira» conserva la fuerza deíctica en un español moderno y digno, aunque es menos formal que «He aquí».
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: La construcción posesiva natural en español es «de Babilonia».
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - capturó
  lexicon: HALOT
  rationale: «Tomó» sigue de cerca el valor básico de לקח y permite que el contexto de deportación haga el resto. «Se llevó» añadiría mayor interpretación.
- source_word: מַלְכָּהּ
  english_pob_choice: its king
  chosen_spanish: su rey
  alternatives_spanish:
  - el rey de ella
  lexicon: HALOT
  rationale: La referencia es a Jerusalén, ciudad gramaticalmente femenina en hebreo, pero en español «su rey» es la forma más natural y no exige marcar género del referente.
- source_word: שָׂרֶיהָ
  english_pob_choice: its officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  lexicon: HALOT
  rationale: «Oficiales» refleja adecuadamente la élite gobernante en este contexto histórico. «Príncipes» es posible, pero puede sugerir connotaciones monárquicas más específicas.
- source_word: וַיָּבֵא אוֹתָם אֵלָיו
  english_pob_choice: brought them to him
  chosen_spanish: los llevó con él
  alternatives_spanish:
  - los llevó a él
  - los trajo ante él
  lexicon: HALOT
  rationale: El hebreo expresa traslado hacia el rey de Babilonia; «los llevó con él» comunica la idea de llevarlos a su esfera/destino sin introducir un reflexivo poco natural en español.
- source_word: בָּבֶלָה
  english_pob_choice: in Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - en Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional marca movimiento hacia Babilonia. En español, después de «los llevó», «a Babilonia» es la equivalencia más directa y natural.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se prefirió una forma más directa para הִנֵּה y se siguió la lectura revisada de «to him» sin reflexivo. En español, la solución elegida evita tanto el calco rígido como la paráfrasis excesiva, preservando el tono profético e imperativo del original.'
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio sin artículo.
  - 'Se conserva el paralelismo de órdenes: «Di... Di...».'
  - «Casa rebelde» se usa de manera consistente con el lenguaje profético de Ezequiel.
  - Se evitó «Cristo» o terminología ajena al pasaje.
  - La frase final se resolvió con un verbo de movimiento natural en español para reflejar el destino indicado por el hebreo.
