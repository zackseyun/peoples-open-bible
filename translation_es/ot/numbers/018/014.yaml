  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico de כָּל חֵרֶם בְּיִשְׂרָאֵל לְךָ יִהְיֶה: totalidad de la categoría, término técnico cultual, ubicación/esfera ''en Israel'' y asignación posesiva a Aarón. Sin embargo, ''lo consagrado'' suaviza demasiado חֵרֶם, que no es mera consagración general sino una dedicación irrevocable/puesta bajo prohibición. La nota intenta compensarlo, pero el texto principal puede preservar mejor el tecnicismo.'
  spanish_quality_summary: El español es claro y natural. No obstante, 'lo consagrado' suena demasiado amplio y puede confundirse con קדש u otras formas generales de dedicación. 'Todo anatema' sería poco natural; 'todo lo dedicado irrevocablemente' o similar mejora precisión, pero la opción más fiel y legible aquí es mantener una formulación técnica con apoyo de nota.
  glossary_alignment: 'No hay conflicto con los términos globales del proyecto como Yahvé/Mesías. El punto clave es la consistencia teológica y léxica para חֵרֶם: conviene evitar una equivalencia demasiado genérica como ''consagrado'' sin calificación. La alternativa con ''anatema'' debe quedar en nota, pero el texto principal también debería reflejar mejor la irrevocabilidad técnica del término.'
  issues:
