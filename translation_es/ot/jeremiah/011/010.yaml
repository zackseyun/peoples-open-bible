translation:
  language: es
  text: Han vuelto a las iniquidades de sus antepasados de antaño[a], quienes rehusaron escuchar[b] mis palabras, y han ido tras otros dioses para servirles. La casa de Israel y la casa de Judá han quebrantado mi pacto, que hice[c] con sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: ''sus padres anteriores'' o ''sus antepasados''. El hebreo dice literalmente ''sus primeros padres'', refiriéndose a generaciones anteriores.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''escuchar mis palabras''; en contexto también puede implicar ''prestar atención'' u ''obedecer''.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ''corté'' mi pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבוּ
  english_pob_choice: have returned
  chosen_spanish: han vuelto
  alternatives_spanish:
  - han regresado
  - han dado vuelta atrás
  lexicon: HALOT
  rationale: El perfecto hebreo expresa regreso a un patrón previo de conducta; 'han vuelto' reproduce bien esa idea en español natural y digno.
- source_word: עַל עֲוֺנֹת
  english_pob_choice: to the iniquities
  chosen_spanish: a las iniquidades
  alternatives_spanish:
  - a los pecados
  - a las culpas
  lexicon: HALOT
  rationale: עוֹן conserva fuerza moral y de culpa/iniquidad; 'iniquidades' mantiene mejor ese peso que un término más genérico como 'pecados'.
- source_word: אֲבוֹתָם הָרִאשֹׁנִים
  english_pob_choice: their former fathers
  chosen_spanish: sus padres antiguos
  alternatives_spanish:
  - sus primeros padres
  - sus antepasados antiguos
  - sus padres anteriores
  lexicon: HALOT
  rationale: La frase hebrea señala a generaciones anteriores. 'Padres antiguos' preserva la referencia genealógica y suena más natural que una calca rígida; se mantiene la nota de anterioridad sin borrar el matiz histórico.
- source_word: מֵאֲנוּ לִשְׁמֹעַ אֶת דְּבָרַי
  english_pob_choice: refused to hear my words
  chosen_spanish: rehusaron escuchar mis palabras
  alternatives_spanish:
  - se negaron a oír mis palabras
  - rehusaron obedecer mis palabras
  lexicon: HALOT
  rationale: מֵאֵן es 'rehusar/refusar'. En español, 'escuchar' comunica mejor la relación activa con las palabras que un simple 'oír'; no se traduce directamente como 'obedecer' porque el hebreo conserva primero el nivel de oír con respuesta.
- source_word: הָלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  english_pob_choice: have gone after other gods
  chosen_spanish: han ido tras otros dioses
  alternatives_spanish:
  - han seguido a otros dioses
  - han caminado tras otros dioses
  lexicon: HALOT
  rationale: La expresión idiomática de seguir detrás de otros dioses se expresa con naturalidad en español como 'ir tras', conservando el sentido de lealtad/culto indebido.
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: para servirles
  alternatives_spanish:
  - para adorarlos
  - para servirlos
  lexicon: HALOT
  rationale: עבד, referido a deidades, incluye servicio cultual. 'Servirles' mantiene la fuerza verbal y evita reducir el sentido a solo 'adorar'.
- source_word: הֵפֵרוּ
  english_pob_choice: have broken
  chosen_spanish: han quebrantado
  alternatives_spanish:
  - han roto
  - han violado
  - han infringido
  lexicon: HALOT
  rationale: En contexto de pacto, פרר significa quebrantar/violar. 'Han quebrantado' preserva el matiz jurídico-covenantal de forma clara en español.
- source_word: בֵית יִשְׂרָאֵל וּבֵית יְהוּדָה
  english_pob_choice: The house of Israel and the house of Judah
  chosen_spanish: La casa de Israel y la casa de Judá
  alternatives_spanish:
  - Israel y Judá
  - el pueblo de Israel y el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la fórmula 'casa de' porque en el texto tiene valor covenantal e identitario, no solo geográfico o político.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: Aunque 'covenant' suele corresponder a 'pacto' en español bíblico, 'pacto' aquí comunica bien la relación formal establecida por Dios. Se evita 'alianza' por resonancias menos precisas en este contexto.
- source_word: כָּרַתִּי
  english_pob_choice: made
  chosen_spanish: hice
  alternatives_spanish:
  - concerté
  - establecí
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'corté', pero el inglés POB opta por 'made'. En español, 'hice' es la equivalencia directa y natural; la metáfora de 'cortar' se reserva para nota si fuera necesario.
- source_word: אֶת אֲבוֹתָם
  english_pob_choice: with their fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres antiguos
  lexicon: HALOT
  rationale: La partícula אֵת marca compañía. 'Con sus padres' refleja con claridad la relación del pacto con generaciones previas sin sobrecargar el verso.
theological_decisions:
- issue: Continuidad del juicio entre generaciones y ruptura del pacto
  english_pob_reading: The verse is rendered to show that the present people have reverted to the sins of earlier generations and have broken the covenant God made with those earlier generations.
  chosen_spanish_reading: El verso muestra que el pueblo actual ha regresado a las iniquidades de generaciones anteriores y ha quebrantado el pacto que Dios hizo con esos padres.
  alternative_spanish_readings:
  - Una lectura más débil que lo deje solo como referencia histórica pasada sin implicación para el presente.
  - Una lectura que diluya la responsabilidad colectiva de Israel y Judá.
  rationale: La sintaxis española mantiene la relación entre retorno al pecado ancestral y ruptura actual del pacto; no se suaviza la dimensión colectiva ni la continuidad histórica del juicio.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Preservación del lenguaje de pacto
  english_pob_reading: my covenant that I made with their fathers
  chosen_spanish_reading: mi pacto, que hice con sus padres
  alternative_spanish_readings:
  - mi alianza, que establecí con sus antepasados
  - mi convenio, que concerté con sus padres
  rationale: '''Pacto'' conserva la terminología bíblica de ברית sin sustituirla por un término eclesiástico moderno menos preciso. La forma ''hice'' mantiene la naturalidad sin borrar el acto fundacional de Dios.'
  doctrine_reference: Heb 8; Jer 31 (covenantal continuity)
- issue: Sentido de 'escuchar' frente a 'obedecer'
  english_pob_reading: refused to hear my words
  chosen_spanish_reading: rehusaron escuchar mis palabras
  alternative_spanish_readings:
  - rehusaron oír mis palabras
  - rehusaron obedecer mis palabras
  rationale: 'Se preserva la tensión lexical: el hebreo habla de oír con receptividad, sin traducir de modo automático a ''obedecer''. ''Escuchar'' deja abierta la implicación obediencial sin imponerla.'
  doctrine_reference: Deut 6:4-5; Jer 7:23
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor: se cambió ''first fathers'' por ''former fathers'' por naturalidad, y se eliminó un énfasis pronominal innecesario. La traducción española sigue esa última lectura revisada, manteniendo el matiz de anterioridad en ''padres antiguos'' y sin añadir énfasis no sustentado por el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'casa de Israel' y 'casa de Judá' para respetar la fórmula covenantal.
  - Se prefirió 'pacto' como término estable para בְּרִית.
  - Se usó 'Yahvé' no porque aparezca explícito en este versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda; aquí no se introduce en el texto.
  - Se evitó traducir 'servir' como 'adorar' para no estrechar el sentido cultual de עבד.
  - La nota de pie c[c] se coloca sobre 'quebrantado' para reflejar el valor literal de 'cortar' el pacto sin recargar el texto principal.
