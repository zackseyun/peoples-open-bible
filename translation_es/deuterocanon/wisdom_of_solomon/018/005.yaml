translation:
  language: es
  text: Cuando habían resuelto matar a los infantes de los consagrados, y un niño[a] había sido expuesto y rescatado, quitaste su multitud de hijos como reproche, y los destruiste a todos juntos en agua poderosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probable alusión a Moisés, el niño expuesto y luego preservado con vida (Éx 2:3–10).
    reason: cross_reference
  - marker: b
    text: O «en agua violenta» o «en agua desbordante». El griego dice literalmente «en agua poderosa», refiriéndose al mar como instrumento de destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλευσαμένους
  english_pob_choice: had resolved
  chosen_spanish: habían resuelto
  alternatives_spanish:
  - habían planeado
  - habían decidido
  - habiendo tomado consejo
  lexicon: LSJ
  rationale: El participio expresa deliberación y propósito previo. «Habían resuelto» mantiene esa idea de intención firme en un español natural y sin cargar el texto con una paráfrasis.
- source_word: τὰ τῶν ὁσίων ... νήπια
  english_pob_choice: the infants of the holy ones
  chosen_spanish: los infantes de los santos
  alternatives_spanish:
  - los infantes de los santos de Dios
  - los hijos de los santos
  - los infantes de los fieles
  lexicon: LSJ
  rationale: «Santos» conserva el valor de ὅσιοι como el pueblo de Dios consagrado a él, y «infantes» refleja bien νήπια como niños muy pequeños. Se evita sustituirlo por terminología eclesial más cargada sin base inmediata en el griego.
- source_word: ἑνὸς ... τέκνου
  english_pob_choice: one child
  chosen_spanish: un niño
  alternatives_spanish:
  - un hijo
  - un infante
  - una criatura
  lexicon: LSJ
  rationale: τέκνον es un término amplio para niño o hijo. «Niño» funciona bien en español y conserva la indefinición del griego respecto del sexo, a la vez que prepara la alusión narrativa.
- source_word: ἐκτεθέντος
  english_pob_choice: had been exposed
  chosen_spanish: había sido expuesto
  alternatives_spanish:
  - había sido puesto fuera
  - había sido abandonado
  - había sido dejado expuesto
  lexicon: LSJ
  rationale: «Expuesto» reproduce el sentido técnico de exponer a un niño, sobre todo dejarlo fuera para que muera o sea recogido. Es la opción más precisa y reconocible en este contexto.
- source_word: σωθέντος
  english_pob_choice: rescued
  chosen_spanish: rescatado
  alternatives_spanish:
  - salvado
  - preservado
  lexicon: LSJ
  rationale: «Rescatado» expresa libramiento de peligro sin añadir una carga teológica mayor que la que exige el contexto. En español resulta más concreto que «salvado» para esta escena.
- source_word: εἰς ἔλεγχον
  english_pob_choice: as a rebuke
  chosen_spanish: como reprensión
  alternatives_spanish:
  - para reprensión
  - como reproche
  - para reprobación
  lexicon: LSJ
  rationale: La frase comunica una acción de corrección/denuncia. «Como reprensión» mantiene el valor judicial y moral del término con una formulación natural en español.
- source_word: ἀφεῖλον
  english_pob_choice: you took away
  chosen_spanish: quitaste
  alternatives_spanish:
  - retiraste
  - apartaste
  - quitaste de en medio
  lexicon: LSJ
  rationale: El aoristo indica remoción. «Quitaste» es directo, idiomático y suficientemente fuerte para el contexto del juicio sobre Egipto.
- source_word: πλῆθος τέκνων
  english_pob_choice: their multitude of children
  chosen_spanish: su multitud de hijos
  alternatives_spanish:
  - su gran cantidad de hijos
  - su muchedumbre de hijos
  - su gran número de hijos
  lexicon: LSJ
  rationale: «Multitud» conserva la densidad retórica de πλῆθος y mantiene el contraste con «un niño». «Hijos» sigue el sentido amplio de τέκνα, con un plural natural en español bíblico.
- source_word: ὁμοθυμαδόν
  english_pob_choice: all together
  chosen_spanish: a todos juntos
  alternatives_spanish:
  - todos a la vez
  - con una sola intención
  - unidos
  lexicon: LSJ
  rationale: El adverbio enfatiza una acción colectiva y simultánea. «A todos juntos» comunica bien esa idea en español actual sin perder el énfasis distributivo/colectivo.
- source_word: ἐν ὕδατι σφοδρῷ
  english_pob_choice: in mighty water
  chosen_spanish: en agua poderosa
  alternatives_spanish:
  - en agua violenta
  - en agua impetuosa
  - en agua desbordante
  lexicon: LSJ
  rationale: Se conserva «agua» en singular como en el griego. «Poderosa» refleja σφοδρῷ como fuerza intensa o violenta, sin cerrar el matiz hacia una sola imagen. En nota se puede explicitar la referencia al mar/inundación.
theological_decisions:
- issue: Referencia del «un niño» expuesto y rescatado
  english_pob_reading: An allusion to the exposed and rescued child Moses, contrasted with Egypt's many children.
  chosen_spanish_reading: Una alusión probable al niño expuesto y rescatado, identificado tradicionalmente con Moisés, en contraste con la multitud de hijos de Egipto.
  alternative_spanish_readings:
  - Una referencia genérica a un niño israelita preservado por Dios
  rationale: El griego mantiene la formulación general, pero el contexto narrativo evoca con fuerza Éxodo 2. La redacción española conserva esa apertura y, a la vez, permite reconocer la alusión sin imponerla de manera exclusiva.
  doctrine_reference: Primacía del original y conservación de la tensión interpretativa; no resolver de forma dogmática una alusión literaria.
- issue: Valor de ὅσιοι
  english_pob_reading: holy ones rather than saints
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - piadosos
  - los santos de Dios
  rationale: En español, «santos» es la forma más natural y transparente para ὅσιοι en este contexto, entendiendo el término como el pueblo apartado para Dios. Se evita una traducción más descriptiva que debilitaría el paralelismo con el lenguaje bíblico.
  doctrine_reference: Primacía del original; uso contextual de terminología bíblica sin sobrecargarla con sentidos posteriores.
- issue: «agua poderosa» para ἐν ὕδατι σφοδρῷ
  english_pob_reading: in mighty water, referring to the sea as the instrument of destruction.
  chosen_spanish_reading: «agua poderosa», con la posibilidad de entender el mar como instrumento de destrucción.
  alternative_spanish_readings:
  - agua violenta
  - agua impetuosa
  - agua desbordante
  rationale: La expresión mantiene el singular del griego y la fuerza del adjetivo sin reducir prematuramente la imagen. En una nota puede explicarse que se trata del mar o de aguas destructoras.
  doctrine_reference: Fidelidad a la imaginería del original y preservación del matiz poético-judicial.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del texto fuente y del audit trail inglés, sin cambios posteriores requeridos; la traducción española refleja la lectura aprobada y sus notas alternativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - Se evitó «Cristo» y «Señor» como sustituciones no motivadas por el griego.
  - 'Se conservó la fuerza retórico-judicial del pasaje: resolución humana, contraste con un solo niño, reprensión y destrucción colectiva.'
  - Se mantuvo el singular «agua» para respetar la imagen del griego y su posible referencia al mar.
