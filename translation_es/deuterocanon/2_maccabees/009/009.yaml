translation:
  language: es
  text: de modo que incluso del cuerpo del impío brotaban gusanos[a], y mientras aún vivía, en dolores y agonías, su carne se iba desprendiendo[b], y por su hedor todo el campamento quedaba agobiado por la podredumbre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bullían gusanos»; el verbo griego sugiere más literalmente que “hervían” o “se agitaban” hacia arriba.
    reason: lexical_alternative
  - marker: b
    text: Lit. «su carne se iba cayendo» mientras aún vivía.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσσεβοῦς
  english_pob_choice: ungodly man
  chosen_spanish: del impío
  alternatives_spanish:
  - del hombre impío
  - del irreverente
  - del malvado
  lexicon: LSJ
  rationale: δυσσεβής señala falta de reverencia para con Dios; «impío» conserva mejor esa fuerza que un término meramente moral como «malvado». Se evita «no creyente», que no corresponde al matiz griego.
- source_word: σκώληκας ἀναζεῖν
  english_pob_choice: worms swarmed
  chosen_spanish: brotaban gusanos
  alternatives_spanish:
  - se agitaban gusanos
  - bullían gusanos
  - salían gusanos hirviendo
  lexicon: LSJ
  rationale: ἀναζέω tiene la imagen de hervir/se agitar hacia arriba. En español, «brotaban» comunica el surgimiento vívido sin forzar una metáfora de ebullición que sonaría menos natural; se preserva el carácter grotesco del pasaje.
- source_word: ζῶντος
  english_pob_choice: while he was still alive
  chosen_spanish: mientras aún vivía
  alternatives_spanish:
  - viviendo aún
  - mientras vivía
  lexicon: LSJ
  rationale: La construcción enfatiza que la corrupción ocurría antes de la muerte. «Mientras aún vivía» reproduce claramente esa fuerza temporal.
- source_word: ἐν ὀδύναις καὶ ἀλγηδόσιν
  english_pob_choice: in pains and agonies
  chosen_spanish: en dolores y angustias
  alternatives_spanish:
  - en dolores y agonías
  - en tormentos y angustias
  - en sufrimientos y agonías
  lexicon: LSJ
  rationale: Ambos sustantivos expresan sufrimiento físico intenso. «Dolores y angustias» mantiene el paralelismo y suena natural en español, sin atenuar la severidad.
- source_word: τὰς σάρκας αὐτοῦ διαπίπτειν
  english_pob_choice: his flesh fell away
  chosen_spanish: su carne se iba desprendiendo
  alternatives_spanish:
  - su carne caía
  - su carne se iba cayendo
  - su carne se iba deshaciendo
  lexicon: LSJ
  rationale: σάρξ aquí es literal, por lo que «carne» es la correspondencia adecuada. διαπίπτω sugiere desmoronarse o caerse; «se iba desprendiendo» conserva el proceso gradual y la imagen corporal sin exagerar más allá del griego.
- source_word: ὑπὸ δὲ τῆς ὀσμῆς αὐτοῦ
  english_pob_choice: because of his stench
  chosen_spanish: por su hedor
  alternatives_spanish:
  - a causa de su hedor
  - por su olor
  - debido a su olor
  lexicon: LSJ
  rationale: El contexto de corrupción cadavérica exige una palabra ofensiva; «hedor» expresa mejor que «olor» el sentido contextual de ὀσμή.
- source_word: πᾶν τὸ στρατόπεδον
  english_pob_choice: the whole camp
  chosen_spanish: todo el campamento
  alternatives_spanish:
  - el campamento entero
  - todo el ejército acampado
  - toda la tropa
  lexicon: LSJ
  rationale: στρατόπεδον es el campamento militar. «Todo el campamento» es fiel, claro y suficientemente concreto en español.
- source_word: βαρύνεσθαι τὴν σαπρίαν
  english_pob_choice: was burdened by the rottenness
  chosen_spanish: quedaba agobiado por la podredumbre
  alternatives_spanish:
  - era cargado por la podredumbre
  - quedaba oprimido por la putrefacción
  - era pesado por la podredumbre
  lexicon: LSJ
  rationale: El griego expresa que el campamento era oprimido/gravado por la corrupción fétida. «Quedaba agobiado» conserva la idea de carga y efecto continuo; «podredumbre» traduce σαπρία con un término natural en español que mantiene la idea de descomposición.
theological_decisions:
- issue: Caracterización moral-religiosa de Antioquía/Antíoco en δυσσεβοῦς
  english_pob_reading: ungodly man
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el hombre impío
  - el malvado
  - el irreverente
  rationale: La escena presenta el castigo corporal como correspondiente a la impiedad del personaje. «Impío» conserva la dimensión teológica de irreverencia hacia Dios, sin introducir una interpretación doctrinal adicional.
  doctrine_reference: Principio de primacía del idioma original; preservación del juicio moral-religioso del texto.
translation_notes:
  revision_awareness: 'El texto sigue la lectura revisada del audit trail inglés: se mantiene el orden natural «de modo que…», se evita sobrecargar el verbo con una calca de «boiled up», y se conserva «burdened» mediante «quedaba agobiado», con un registro más natural en español. Se han incluido solo notas ancladas en el texto, cada una con su marcador visible.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Impío» se usa como equivalente de δυσσεβής, no «malvado», para mantener el matiz de impiedad.
  - «Carne» se mantiene para σάρξ por su literalidad corporal.
  - «Hedor» y «podredumbre» preservan la fuerza física y sensorial del pasaje.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto, sin notas huérfanas.
