  to: 'Y lo tomó de sus manos, lo labró con un instrumento de grabado[a], y lo hizo un becerro fundido. Entonces dijeron: «Estos son tus dioses, Israel[b][c], que te hicieron subir de la tierra de Egipto».'
  rationale: Se corrige una explicitación innecesaria («el oro»), se elimina una nota redundante, y se ajusta «te sacaron» a «te hicieron subir» para alinearlo mejor con el hebreo y con la decisión léxica/theológica auditada. Se conservan la pluralidad de la aclamación idolátrica, la agencia directa del sujeto y la secuencia de acciones del texto fuente.
  reviewer_model: gpt-5.4
