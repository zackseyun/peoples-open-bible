lexical_decisions:
- source_word: וּגְדוֹר
  english_pob_choice: and Gedor
  chosen_spanish: y Gedor
  alternatives_spanish:
  - Gedor
  lexicon: HALOT
  rationale: El hebreo presenta un nombre propio dentro de una lista genealógica; por eso se translitera como nombre y se conserva la conjunción serial con «y». Se mantiene «Gedor» como forma española transparente y reconocible.
- source_word: וְאַחְיוֹ
  english_pob_choice: and Ahio
  chosen_spanish: y Ahío
  alternatives_spanish:
  - Ahio
  lexicon: HALOT
  rationale: אַחְיוֹ es un nombre propio y se translitera en español como «Ahío», ajustando la acentuación para lectura natural en español. La conjunción inicial se mantiene como «y» para reproducir la secuencia del listado.
- source_word: וָזָכֶר
  english_pob_choice: and Zecher
  chosen_spanish: y Zequer
  alternatives_spanish:
  - Zequer
  - Záquer
  lexicon: HALOT
  rationale: El nombre זָכֶר se representa con transliteración española cercana al valor consonántico y a la vocalización masorética. Se evita el calco desde la forma inglesa «Zecher» y se conserva la posibilidad de otra convención transliterada, pero «Zequer» resulta legible en español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto al nombre correspondiente. No se hicieron cambios textuales de fondo respecto al sentido del versículo, que sigue siendo una simple lista de nombres propios.'
  spanish_consistency_notes:
  - Se conservó el estilo enumerativo con repetición de la conjunción «y», acorde con una lista genealógica breve.
  - Se prefirió una transliteración española estable y legible para nombres propios, sin introducir glosas innecesarias en el texto principal.
  - La nota al pie solo trata la alternativa ortográfica del último nombre, siguiendo el audit trail inglés.
