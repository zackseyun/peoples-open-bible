translation:
  language: es
  text: para que tus ojos estén abiertos hacia esta casa día y noche[a], hacia el lugar donde dijiste que pondrías tu nombre[b], para oír la oración que tu siervo ora hacia este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estén atentos hacia esta casa». El hebreo dice literalmente «tus ojos estén abiertos», un modismo de atención vigilante.
    reason: lexical_alternative
  - marker: b
    text: «Poner tu nombre» es un modismo del templo que se refiere a la asociación elegida por Dios con este lugar, no a una contención literal de Dios allí.
    reason: cultural_note
lexical_decisions:
- source_word: עֵינֶיךָ פְתֻחוֹת
  english_pob_choice: your eyes may be open
  chosen_spanish: tus ojos estén abiertos
  alternatives_spanish:
  - tus ojos sean atentos
  - tus ojos estén atentos
  lexicon: HALOT
  rationale: La imagen hebrea es concreta y antropomórfica; en español, «estén abiertos» preserva el símil sin convertirlo en paráfrasis interpretativa. «Atentos» es posible, pero suaviza la metáfora física que la POB inglesa conserva.
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - a esta casa
  - sobre esta casa
  lexicon: HALOT
  rationale: אֶל expresa dirección u orientación. «Hacia» comunica bien el movimiento de la mirada y de la oración, y mantiene la claridad en español.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - continuamente
  lexicon: HALOT
  rationale: Es un merismo de duración continua. «Día y noche» es la forma natural y fiel en español.
- source_word: הַמָּקוֹם אֲשֶׁר אָמַרְתָּ לָשׂוּם שִׁמְךָ שָׁם
  english_pob_choice: the place where you said you would put your name
  chosen_spanish: el lugar del cual dijiste que pondrías tu nombre allí
  alternatives_spanish:
  - el lugar donde dijiste que pondrías tu nombre
  - el lugar que dijiste para poner allí tu nombre
  lexicon: HALOT
  rationale: Se conserva el idiomático «poner tu nombre» como en el audit trail inglés, sin reemplazarlo por una expansión teológica. «Del cual» refleja bien la relación del hebreo con אֲשֶׁר, y «allí» retiene el valor locativo de שָׁם.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu presencia
  lexicon: HALOT
  rationale: La expresión es una fórmula teológica de asociación divina con el lugar. Debe permanecer como «tu nombre» para no borrar la tensión entre presencia y trascendencia.
- source_word: לִשְׁמֹעַ אֶל הַתְּפִלָּה
  english_pob_choice: to hear the prayer
  chosen_spanish: para escuchar la oración
  alternatives_spanish:
  - para oír la oración
  - para atender la oración
  lexicon: HALOT
  rationale: «Escuchar» comunica bien la receptividad de Dios sin perder el valor bíblico de oír con atención. «Oración» es el término natural para תְּפִלָּה.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: Aunque el proyecto suele preferir «esclavo» para δοῦλος, כאן/ aquí el hebreo עֶבֶד en oración a Dios funciona como fórmula reverente de servicio; por eso en español litúrgico y bíblico «siervo» resulta más fiel al registro.
- source_word: יִתְפַּלֵּל
  english_pob_choice: prays
  chosen_spanish: ora
  alternatives_spanish:
  - ora hacia
  - presenta oración
  lexicon: HALOT
  rationale: En español, el verbo «orar» es más idiomático en este contexto devocional que un calco con futuro o perífrasis. Mantiene el aspecto de acción habitual/presentativa en la relativa.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: toward this place
  chosen_spanish: hacia este lugar
  alternatives_spanish:
  - a este lugar
  - sobre este lugar
  lexicon: HALOT
  rationale: Como antes con אֶל, «hacia» expresa orientación espacial y mantiene la cohesión lexical del versículo.
theological_decisions:
- issue: Antropomorfismo en «tus ojos estén abiertos»
  english_pob_reading: Preserve the anthropomorphic expression literally
  chosen_spanish_reading: Mantener la imagen corporal de la atención divina
  alternative_spanish_readings:
  - parafrasear como «estés atento»
  - «vigiles sobre»
  rationale: El hebreo usa lenguaje corporal para hablar de la atención de Dios. La traducción española conserva esa imagen para no perder el relieve retórico ni resolverla prematuramente en abstracción.
  doctrine_reference: Translation philosophy §1, §3
- issue: Idiomático templo-teológico «poner tu nombre»
  english_pob_reading: Retain the idiom 'put your name' without explanatory expansion
  chosen_spanish_reading: Retener «poner tu nombre» sin sustituirlo por una explicación
  alternative_spanish_readings:
  - «hacer habitar tu presencia allí»
  - «asociar tu nombre con este lugar»
  rationale: La expresión es compacta y teológicamente cargada. «Tu nombre» debe permanecer visible para preservar la tensión entre presencia divina real y no localizable en términos materiales.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto base y con la revisión más reciente: no se registran cambios sustanciales en el audit trail inglés, y la versión española conserva las decisiones clave sobre antropomorfismo, dirección espacial e идиoma del templo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial general cuando el texto lo requiera; aquí el versículo usa lenguaje dirigido a Dios sin el tetragrámaton explícito.
  - Se usa «hacia» de forma consistente para אֶל en este versículo, evitando alternancia innecesaria entre «a» y «hacia».
  - Se conserva «tu nombre» como fórmula teológica, sin expandirla a «presencia» en el texto principal.
  - Se prefiere «siervo» en este contexto orante por fidelidad de registro y uso bíblico en español.
  - Las notas al pie usan marcadores únicos y corresponden exactamente a los puntos de tensión lexical preservados en el texto.
