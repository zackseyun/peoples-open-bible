revisions:
- from: El hombre justo no menospreciará ser disciplinado por el Señor[a][b]; su deleite está continuamente delante del Señor.
  to: El justo no menospreciará recibir la disciplina del Señor[a]; su complacencia[b] está siempre ante el Señor.
  rationale: 'Se ajusta el español para mayor naturalidad y precisión semántica sin apartarse del análisis fuente ni del expediente POB: «el justo» simplifica el sujeto; «recibir la disciplina del Señor» conserva el sentido correctivo de παιδεύω con mejor fluidez; y «su complacencia» representa mejor εὐδοκία en español bíblico legible que «su deleite». Se conserva la nota textual sobre la forma griega irregular y una nota léxica para las alternativas de εὐδοκία.'
  reviewer_model: gpt-5.4
