translation:
  language: es
  text: Obrar con rectitud y justicia es más aceptable para Yahvé que el sacrificio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'es preferido por Yahvé'; el hebreo literalmente dice 'es elegido para/por Yahvé', expresando preferencia o aceptabilidad divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֹׂה
  english_pob_choice: to do
  chosen_spanish: practicar
  alternatives_spanish:
  - hacer
  - obrar
  lexicon: HALOT
  rationale: El infinitivo constructo funciona de manera sustantiva, presentando la acción evaluada. En español, 'practicar' comunica bien la conducta continua o habitual en un proverbio sapiencial y evita la rigidez de un simple infinitivo 'hacer'.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue 'righteousness' de 'justice', en español 'justicia' puede abarcar con naturalidad la conducta conforme al orden correcto. Aquí se combina mejor con משפט en la pareja proverbial sin forzar una duplicación poco idiomática.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and justice
  chosen_spanish: y el derecho
  alternatives_spanish:
  - y la justicia
  - y el juicio
  lexicon: HALOT
  rationale: משפט puede referirse a justicia, derecho o juicio. En este contexto sapiencial, 'el derecho' conserva el matiz de orden/justo proceder y permite distinguirlo de צדקה, manteniendo la pareja conceptual sin repetir 'justicia'.
- source_word: נִבְחָר
  english_pob_choice: is more acceptable
  chosen_spanish: es más aceptable
  alternatives_spanish:
  - es preferido
  - es elegido
  lexicon: HALOT
  rationale: El participio niphal de בחר implica preferencia/elección. La formulación 'más aceptable' transmite en español la idea de preferencia divina y encaja con el paralelo comparativo frente al sacrificio.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de usar 'Yahvé' para יהוה. Con נבחר, en español 'para Yahvé' expresa naturalmente la orientación de aceptabilidad o preferencia hacia Dios.
- source_word: מִזָּבַח
  english_pob_choice: than sacrifice
  chosen_spanish: que el sacrificio
  alternatives_spanish:
  - que un sacrificio
  - que el sacrificio ritual
  lexicon: HALOT
  rationale: 'El prefijo מן introduce comparación: ''más que''. El singular colectivo ''el sacrificio'' conserva el valor proverbial general y suena natural en español.'
theological_decisions:
- issue: Cómo expresar יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto establece 'Yahvé' como forma principal en español para el Tetragrámaton, preservando el nombre divino explícito del texto hebreo en vez de enmascararlo con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación semántica de נִבְחָר con la ofrenda sacrificial
  english_pob_reading: is more acceptable / preferred
  chosen_spanish_reading: es más aceptable
  alternative_spanish_readings:
  - es preferido
  - es más grato
  rationale: El hebreo literalmente dice 'es elegido/preferido'. La traducción evita reducirlo a simple 'agrado' y conserva la tensión entre elección/preferencia divina y aceptabilidad cultual.
  doctrine_reference: HALOT / contexto sapiencial del proverbio
translation_notes:
  revision_awareness: El veredicto de revisión previo indica alta concordancia y ausencia de cambios necesarios; esta versión conserva la decisión central del inglés POB sobre נבחר como aceptabilidad/preferencia, pero la expresa con sintaxis española natural y con el nombre divino según la norma del proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma consistente para יהוה.
  - Se evitó 'SEÑOR' por la política terminológica del proyecto.
  - Se distinguió צדקה de משפט con 'justicia' y 'derecho' para conservar la pareja conceptual del hebreo.
  - La nota al pie preserva la alternativa lexical del inglés POB sobre נבחר sin introducir una paráfrasis extensa.
