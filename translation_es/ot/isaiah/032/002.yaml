translation:
  language: es
  text: Y un hombre será como un escondite del viento[a], y un refugio de la tempestad[b], como corrientes de agua en tierra seca[c], como la sombra de una roca maciza en tierra cansada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un refugio del viento».
    reason: lexical_alternative
  - marker: b
    text: O «un refugio del aguacero» o «de la tormenta».
    reason: lexical_alternative
  - marker: c
    text: La expresión «un hombre» puede referirse representativamente al gobernante ideal del versículo anterior, a cada gobernante justo, o tipológicamente más allá de ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Entonces ... será
  - Y ... llegará a ser
  lexicon: HALOT
  rationale: La forma narrativa profética se vierte naturalmente en futuro en español. Conservar "Y" mantiene la conexión con el contexto inmediato, como en el audit trail inglés.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - cada hombre
  lexicon: HALOT
  rationale: El hebreo es singular masculino. "Un hombre" respeta la forma léxica y deja abierta la referencia representativa o tipológica sin resolverla en el texto principal.
- source_word: מַחֲבֵא רוּחַ
  english_pob_choice: a hiding place from the wind
  chosen_spanish: un escondedero contra el viento
  alternatives_spanish:
  - un refugio contra el viento
  - un lugar de escondite frente al viento
  lexicon: HALOT
  rationale: '"מַחֲבֵא" expresa un lugar de ocultamiento o refugio. "Escondedero" conserva la imagen concreta mejor que una abstracción más general; "contra el viento" refleja la función protectora del complemento.'
- source_word: סֵתֶר זָרֶם
  english_pob_choice: a shelter from the storm
  chosen_spanish: un refugio contra la tempestad
  alternatives_spanish:
  - un cobijo contra el aguacero
  - un escondedero contra la tormenta
  lexicon: HALOT
  rationale: '"סֵתֶר" es cobertura/refugio; "זָרֶם" puede referirse a tormenta, aguacero o torrente. "Tempestad" conserva el sentido amenazante y permite el paralelismo con el verso sin estrecharlo a solo lluvia.'
- source_word: פַלְגֵי מַיִם
  english_pob_choice: streams of water
  chosen_spanish: corrientes de agua
  alternatives_spanish:
  - arroyos de agua
  - canales de agua
  lexicon: HALOT
  rationale: La frase designa cursos de agua o corrientes vivas. "Corrientes de agua" es natural en español y preserva la imagen de frescura y vida.
- source_word: בְּצָיוֹן
  english_pob_choice: in a dry place
  chosen_spanish: en tierra seca
  alternatives_spanish:
  - en un lugar seco
  - en tierra árida
  lexicon: HALOT
  rationale: El sustantivo expresa sequedad/aridez. "Tierra seca" mantiene la imagen compacta y evita especificar más de lo que exige el hebreo.
- source_word: צֵל סֶלַע כָּבֵד
  english_pob_choice: the shade of a massive rock
  chosen_spanish: la sombra de una roca maciza
  alternatives_spanish:
  - la sombra de una gran roca
  - la sombra de una roca pesada
  lexicon: HALOT
  rationale: '"צֵל" es sombra; "סֶלַע" es roca/peñasco; "כָבֵד" literalmente es pesado, pero aquí describe solidez e imponencia. "Maciza" comunica mejor la protección robusta sin volverlo extrañamente literal en español.'
- source_word: בְּאֶרֶץ עֲיֵפָה
  english_pob_choice: in a weary land
  chosen_spanish: en tierra cansada
  alternatives_spanish:
  - en tierra fatigada
  - en tierra agotada
  lexicon: HALOT
  rationale: '"עֲיֵפָה" significa cansada, fatigada, exhausta. "Tierra cansada" conserva la metáfora y el paralelo poético del inglés, con un español claro y digno.'
theological_decisions:
- issue: Referente de "un hombre" en el contexto
  english_pob_reading: Rendered generically as 'a man' without specifying messianic or merely collective reference.
  chosen_spanish_reading: Traducido como "un hombre" sin determinar si alude al rey ideal del v. 1, a cada gobernante justo, o tipológicamente al Mesías.
  alternative_spanish_readings:
  - el rey del versículo anterior
  - cada gobernante justo
  - una figura tipológica del Mesías
  rationale: El contexto inmediato sugiere una referencia representativa, pero el hebreo no obliga a fijarla. La traducción conserva la tensión interpretativa en lugar de resolverla doctrinalmente.
  doctrine_reference: Preservar la ambigüedad responsable del texto; fidelidad al referente singular y representativo.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del testigo inglés: alta concordancia, sin revisiones aplicadas y con lectura estable. Se mantuvo la equivalencia óptima del audit trail, respetando la metáfora de protección y la ambigüedad del referente humano.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como término base del proyecto, pero este versículo no lo contiene.
  - '"Hombre" conserva el singular masculino del hebreo, coherente con la política del proyecto para formas lexicales marcadas.'
  - '"Espíritu" no aparece aquí; se conserva el contraste natural de viento/tempestad/agua/sequedad sin forzar sentidos.'
  - '"Roca maciza" traduce el valor descriptivo de כָּבֵד sin sustituirlo por terminología eclesiástica o interpretativa.'
