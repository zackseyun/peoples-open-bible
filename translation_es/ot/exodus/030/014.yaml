review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura legal del hebreo, conserva la imagen de «pasar» y usa correctamente «Yahvé» para יְהוָה. Sin embargo, «a los contados» suena poco natural y algo opaco en español; además, el texto principal pierde parte de la claridad procedimental que el inglés auditado retiene con «to those who are counted».
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «pase a los contados» resulta rígido y poco idiomático. «De veinte años de edad para arriba» es comprensible, aunque «de veinte años para arriba» o «de veinte años en adelante» sería más natural; no obstante, no es un problema serio. La mejor reparación es hacer más natural la expresión censal sin borrar la imagen verbal.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → «Yahvé», תְּרוּמָה → «contribución», y preservación de עבר con «pase». La excepción necesaria es ajustar «הַפְּקֻדִים» a una forma española más natural: «los contados» debe reemplazarse por «los que son contados» para conservar sentido y legibilidad.'
  issues:
  - severity: medium
    issue: «a los contados» es poco natural en español
    rationale: Aunque intenta reflejar el hebreo de forma compacta, en español suena forzado y puede leerse como etiqueta extraña más que como grupo censado. «A los que son contados» conserva el sentido sin parafrasear demasiado.
  - severity: low
    issue: La nota al pie repite «los contados»
    rationale: La nota preserva bien la alternativa, pero conviene armonizarla con una formulación más natural en el texto principal y mantener la alternativa «entre los contados» solo como nota lexical.
  revised_spanish_text: Todo el que pase a los que son contados[a], de veinte años de edad para arriba, dará la contribución de Yahvé.
  revised_footnotes:
