translation:
  language: es
  text: Y su asentamiento fue desde Mesha, al ir hacia Sefar, la región montañosa del oriente.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y su morada fue desde Mesha hacia Sefar, la montaña del oriente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: fue
  alternatives_spanish:
  - era
  - estaba
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una afirmación narrativa de ubicación/alcance territorial. En español, «fue» comunica con sobriedad el valor verbal sin forzar un calco como «y fue» al inicio de la frase.
- source_word: מוֹשָׁבָם
  english_pob_choice: their settlement
  chosen_spanish: su asentamiento
  alternatives_spanish:
  - su morada
  - su habitación
  - el lugar donde habitaban
  lexicon: HALOT
  rationale: El sustantivo señala un lugar de residencia, y en este contexto genealógico-territorial «asentamiento» preserva bien el sentido colectivo y geográfico de la expresión.
- source_word: מִמֵּשָׁא
  english_pob_choice: from Mesha
  chosen_spanish: desde Mesá
  alternatives_spanish:
  - desde Mesha
  - de Mesá
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se conserva la transliteración con forma española simple («Mesá») para facilitar la lectura, manteniendo la referencia geográfica.
- source_word: בֹּאֲכָה
  english_pob_choice: as you go toward
  chosen_spanish: en dirección de
  alternatives_spanish:
  - cuando vas hacia
  - al ir hacia
  - hacia
  lexicon: HALOT
  rationale: La construcción direccional indica rumbo o trayectoria. «En dirección de» expresa esa orientación geográfica de manera natural en español sin añadir un sujeto explícito innecesario.
- source_word: סְפָרָה
  english_pob_choice: Sephar
  chosen_spanish: Sefar
  alternatives_spanish:
  - Sefar
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa «Sefar» para una adaptación gráfica más fluida al español, manteniendo el mismo referente que la forma inglesa del POB.
- source_word: הַר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - el monte
  - la montaña
  - la zona montañosa
  lexicon: HALOT
  rationale: En este tipo de delimitación territorial, הַר puede designar una zona montañosa más que una montaña individual. «Región montañosa» conserva el sentido regional de la frase inglesa.
- source_word: הַקֶּדֶם
  english_pob_choice: of the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - oriental
  - del oriente
  lexicon: HALOT
  rationale: El término señala la orientación este/oriental. «Del oriente» es una forma bíblica clara y natural en español, compatible con el valor territorial del hebreo.
translation_notes:
  revision_awareness: El texto inglés revisado cambió «extended» por «was» para ajustarse más al verbo hebreo. La versión española sigue esa revisión con «fue», manteniendo el carácter descriptivo de un límite o extensión territorial sin añadir una idea de expansión inexistente en el hebreo.
  spanish_consistency_notes:
  - Se preservó el tono geográfico y genealógico del versículo sin añadir comentarios interpretativos.
  - Los nombres propios se transliteran de manera consistente y breve para lectura pública.
  - «Oriente» se mantiene como término direccional bíblico para conservar el registro del pasaje.
