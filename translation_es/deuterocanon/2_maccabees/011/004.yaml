revisions:
- from: sin en modo alguno tener en cuenta el poder de Yahvé[a][b], sino engreído por las miríadas de infantes y las millares de jinetes y los ochenta elefantes.
  to: sin tener en cuenta en absoluto el poder de Dios[a], sino engreído por las miríadas[b] de infantes y los miles de jinetes y los ochenta elefantes.
  rationale: La revisión corrige un problema terminológico importante al traducir θεοῦ como «Dios» en vez de «Yahvé», mejora la naturalidad de la negación enfática con «sin tener en cuenta en absoluto», y reemplaza la expresión no idiomática «las millares de jinetes» por «los miles de jinetes». Se mantiene «miríadas» con nota para preservar la decisión léxica documentada y el matiz abierto del griego.
