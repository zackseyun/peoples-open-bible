  text: She said to him[a], “Please give me a blessing, because you have given me the land of the Negev[b]; give me also springs of water.” So Caleb gave her the upper springs and the lower springs.
  footnotes:
  - marker: a
    text: Or 'the land of the South.' The Hebrew negev can function as a regional name ('Negev') or a directional/topographical description ('southland').
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression may refer to springs, pools, or other water sources; 'springs' best fits the context of a dry region needing reliable water.
    reason: lexical_alternative
