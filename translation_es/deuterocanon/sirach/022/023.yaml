translation:
  language: es
  text: Gana confianza[a] con tu prójimo en la pobreza, para que en sus bienes[b] seas saciado junto con él. En tiempo de angustia permanece con él, para que heredes con él en su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “fe” o “fidelidad”; πίστις aquí puede llevar el sentido relacional de confianza, no solo el de fe abstracta.
    reason: lexical_alternative
  - marker: b
    text: “Sus bienes” también puede entenderse como “su prosperidad” o “sus posesiones”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν κτῆσαι
  english_pob_choice: Gain trust
  chosen_spanish: Gana confianza
  alternatives_spanish:
  - Adquiere confianza
  - Gana fe
  - Consigue fidelidad
  lexicon: BDAG
  rationale: En este contexto de amistad y lealtad, πίστις puede expresar confianza relacional más que “fe” en sentido abstracto. κτῆσαι exige una idea de adquirir o ganar; por eso “gana confianza” conserva el valor interpersonal y evita una lectura demasiado doctrinal en el texto principal.
- source_word: ἐν πτωχείᾳ
  english_pob_choice: in poverty
  chosen_spanish: en pobreza
  alternatives_spanish:
  - en tu pobreza
  - en la pobreza
  - en indigencia
  lexicon: BDAG
  rationale: πτωχεία denota pobreza de manera directa. “En pobreza” es breve, fiel y natural en español; “tu pobreza” añade un posesivo que no está en el griego.
- source_word: μετὰ τοῦ πλησίον
  english_pob_choice: with your neighbor
  chosen_spanish: con tu prójimo
  alternatives_spanish:
  - con tu vecino
  - con tu compañero
  - con tu semejante
  lexicon: BDAG
  rationale: πλησίον se refiere al cercano, al prójimo o vecino en sentido relacional. “Prójimo” comunica bien ese valor en español bíblico actual sin quedar demasiado restringido a “vecino” geográfico.
- source_word: ἐν τοῖς ἀγαθοῖς αὐτοῦ
  english_pob_choice: in his good things
  chosen_spanish: en sus bienes
  alternatives_spanish:
  - en su prosperidad
  - en sus cosas buenas
  - en sus posesiones
  lexicon: BDAG
  rationale: ἀγαθά puede abarcar bienes, beneficios o prosperidad. “Sus bienes” es más natural en español que “sus cosas buenas” y mantiene la posibilidad material que el pasaje sugiere, aunque no excluye beneficios más amplios.
- source_word: ὁμοῦ πλησθῇς
  english_pob_choice: you may be filled together
  chosen_spanish: seas saciado junto con él
  alternatives_spanish:
  - seas lleno junto con él
  - seas satisfecho con él
  - participes plenamente con él
  lexicon: BDAG
  rationale: πλησθῇς expresa ser llenado o saciado. “Saciado” es idiomático en español y preserva la imagen de abundancia compartida; “junto con él” refleja ὁμοῦ con claridad.
- source_word: ἐν καιρῷ θλίψεως
  english_pob_choice: In a time of distress
  chosen_spanish: En tiempo de angustia
  alternatives_spanish:
  - En tiempo de aflicción
  - En tiempo de tribulación
  - En una temporada de angustia
  lexicon: BDAG
  rationale: θλῖψις puede ser angustia, aflicción o trouble/distress. “Angustia” es una opción amplia y natural en español; “tiempo” corresponde a καιρός como momento oportuno o circunstancia.
- source_word: διάμενε αὐτῷ
  english_pob_choice: remain with him
  chosen_spanish: permanece con él
  alternatives_spanish:
  - quédate con él
  - persiste con él
  - mantente con él
  lexicon: BDAG
  rationale: διαμένω implica permanecer, continuar o mantenerse firme. “Permanece con él” conserva la fuerza de constancia y lealtad sin introducir matices ajenos.
- source_word: συνκληρονομήσῃς
  english_pob_choice: inherit with him
  chosen_spanish: heredes con él
  alternatives_spanish:
  - heredes junto con él
  - compartas la herencia con él
  - heredes con él juntamente
  lexicon: BDAG
  rationale: El verbo compuesto indica heredar juntamente con otro. “Heredes con él” es natural y conserva la co-participación sin cargar la frase con tecnicismos.
- source_word: ἐν τῇ κληρονομίᾳ αὐτοῦ
  english_pob_choice: in his inheritance
  chosen_spanish: en su herencia
  alternatives_spanish:
  - en su heredad
  - en su patrimonio
  - en la herencia de él
  lexicon: BDAG
  rationale: κληρονομία se traduce directamente como herencia o heredad. “Herencia” es transparente para lectores modernos y mantiene la conexión con el verbo de heredar.
theological_decisions:
- issue: πίστις en contexto sapiencial e interpersonal
  english_pob_reading: trust; with alternative readings faith / faithfulness preserved in audit trail
  chosen_spanish_reading: confianza
  alternative_spanish_readings:
  - fe
  - fidelidad
  rationale: En este proverbio de lealtad mutua, πίστις no se limita con naturalidad a “fe” doctrinal. “Confianza” expresa mejor la relación interpersonal, sin borrar que el término griego conserva una tensión entre confianza y fidelidad que queda documentada en las alternativas.
  doctrine_reference: 'DOCTRINE.md: contested terms — πίστις may denote trust/faithfulness in relational contexts'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió “trust” sobre “faith” para πίστιν y simplificó la fórmula de herencia conjunta. En español, se adoptó esa preferencia semántica con “confianza” y se mantuvo la co-participación de forma natural con “heredes con él”.
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona singular en imperativo y subjuntivo, coherente con el tono sapiencial.
  - Se evita “SEÑOR” u otras sustituciones no presentes en este pasaje, ya que no aparece el nombre divino en el texto fuente.
  - “Prójimo” se usa para πλησίον por ser más amplio y bíblicamente reconocible que “vecino” en español.
  - Se mantiene la ambigüedad útil de ἀγαθά mediante la nota, sin estrechar indebidamente el sentido a prosperidad material.
