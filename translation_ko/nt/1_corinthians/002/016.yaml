id: 1CO.2.16
reference: '1 Corinthians 2:16'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τίς γὰρ ἔγνω νοῦν κυρίου, ὃς συμβιβάσει αὐτόν; ἡμεῖς δὲ νοῦν Χριστοῦ ἔχομεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/016.yaml
  text: For who has known the mind of the Lord[b][a], that he may instruct him? But we have the mind of Messiah.
  footnotes:
  - marker: a
    text: Or, “the mind of Christ.”
    reason: lexical_alternative
  - marker: b
    text: 'Paul echoes Isaiah 40:13.'
    reason: cross_reference
translation:
  language: ko
  text: 이는 「누가 주의 마음을 알아서 그분을 가르치겠는가?」 함이 있기 때문입니다. 그러나 우리는 메시아의 마음을 가지고 있습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νοῦν κυρίου
  english_pob_choice: the mind of the Lord
  chosen_korean: 주의 마음
  alternatives_korean:
  - 주의 생각
  lexicon: BDAG
  rationale: '사 40:13 LXX 인용. νοῦς를 「마음/생각」으로 옮긴다.'
- source_word: συμβιβάσει
  english_pob_choice: may instruct
  chosen_korean: 가르치겠는가
  alternatives_korean:
  - 조언하겠는가
  lexicon: BDAG
  rationale: 미래 능동. 「그분에게 가르침을 줄」 자가 없다는 수사적 의문.
- source_word: νοῦν Χριστοῦ ἔχομεν
  english_pob_choice: have the mind of Messiah
  chosen_korean: 메시아의 마음을 가지고 있습니다
  alternatives_korean:
  - 그리스도의 마음을 가지고 있습니다
  lexicon: BDAG
  rationale: 앞 인용구의 「주(=κύριος, 이사야의 야훼)의 마음」과 「메시아의 마음」을 동일선상에 두는 고기독론적 진술.
