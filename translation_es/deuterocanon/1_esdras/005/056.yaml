    reason: alternative_reading
  - marker: c
    text: El término griego raro ἐργοδιῶκται designa a quienes dirigen o supervisan la labor.
    reason: lexical_alternative
  - marker: d
    text: El griego usa el plural ἔργα/ἔργων en dos lugares; algunas traducciones suavizan a singular «obra».
    reason: lexical_alternative
  revision_rationale: 'La revisión es pequeña pero necesaria: se alinea κύριος con la terminología principal del proyecto usando «Yahvé» en las tres ocurrencias, y se corrige una nota para español natural y correcto. El resto del contenido se conserva porque refleja adecuadamente el griego, la racionalidad del POB en los nombres y la distinción entre «casa» y «templo».'
