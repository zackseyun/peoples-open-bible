    a rare noun ⲙⲧⲟ (''cover''). This is a severe grammatical error. ⲥⲉϭⲟⲗⲡ ⲧⲏⲣⲟⲩ
    ⲉⲃⲟⲗ simply means ''they are all revealed'' (present tense, not future), and ⲙ̄
    ⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ ⲛ̄ ⲧⲡⲉ means ''before heaven''. | Azure: The proposed change corrects
    a genuine grammatical mistake. In the Coptic, ⲙ̄ ⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ ⲛ̄ is the common prepositional
    expression meaning “before, in the presence of,” not a noun phrase involving ⲙⲧⲟ'
