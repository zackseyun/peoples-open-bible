lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo formulaico ענה en este contexto introduce una respuesta en diálogo. En español, "respondió" comunica con naturalidad el avance narrativo y el valor de réplica sin perder el sentido de contestación.
- source_word: בִּלְדַּד
  english_pob_choice: Bildad
  chosen_spanish: Bildad
  alternatives_spanish:
  - Bildad
  lexicon: nombre propio
  rationale: Se conserva la transliteración del nombre propio, como en el texto inglés auditado.
- source_word: הַשֻּׁחִי
  english_pob_choice: the Shuhite
  chosen_spanish: el suhita
  alternatives_spanish:
  - el shuíta
  - el shuahita
  lexicon: HALOT
  rationale: El gentilicio identifica a Bildad por origen o pertenencia; "suhita" reproduce ese valor con una forma breve y legible en español, sin añadir una explicación que el hebreo no da.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y declaró
  lexicon: HALOT
  rationale: El verbo אמר se traduce de forma directa como "dijo". Mantenerlo junto con "respondió" conserva la fórmula hebrea de introducción de discurso sin fusionarla indebidamente.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: HALOT
  rationale: La waw narrativa inicial marca progresión temporal. "Entonces" preserva ese avance de manera natural en español moderno.
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales ni variantes relevantes en el paquete auditado; la redacción sigue el patrón narrativo hebreo con una decisión estilística en la partícula inicial y el gentilicio.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se conserva la doble fórmula verbal hebrea («respondió y dijo») por transparencia auditiva.
  - No se introduce terminología doctrinal ajena al verso.
  - El gentilicio se vierte de modo consistente como designación de origen, no como título teológico.
