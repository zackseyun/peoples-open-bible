    issue: הַעֲבוֹט no está representado léxicamente en el texto principal
    rationale: El hebreo nombra explícitamente el objeto legal tomado en garantía. Reducirlo a «lo» hace el español menos preciso y atenúa el matiz jurídico que el inglés auditado preserva con «the pledge».
  - severity: low
    issue: «Sin falta se lo devolverás» es algo rígido
    rationale: Comunica el énfasis, pero una formulación como «Sin falta le devolverás la prenda» o «Debes devolverle sin falta la prenda» resulta más natural y precisa en español bíblico actual.
  revised_spanish_text: Sin falta le devolverás la prenda[a] al ponerse el sol, para que pueda acostarse con su manto y te bendiga; y te será justicia[b] delante de Yahvé tu Dios.
