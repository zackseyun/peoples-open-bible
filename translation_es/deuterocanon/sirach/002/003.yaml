review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo y del paralelo griego: adhesión perseverante a Dios, no apartarse, y una promesa relativa al desenlace final. Sin embargo, ''Pégate a él'' suena demasiado coloquial y físico para el registro sapiencial, y ''seas engrandecido'' es comprensible pero menos natural que una formulación que mantenga la tensión entre ''hacerse grande'' y ''ser exaltado''.'
  spanish_quality_summary: 'El español es mayormente claro, pero hay dos puntos de estilo/legibilidad: ''Pégate a él'' resulta poco digno en un texto bíblico y puede sugerir contacto físico; ''tu postrimería'' sí funciona en registro bíblico, pero conviene acompañarla con una formulación verbal más idiomática. ''Aférrate a él'' suena más natural y solemne sin perder la fuerza de דבק/κολλήθητι.'
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. El pronombre personal para Dios está bien preservado. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La revisión propuesta mejora la fidelidad estilística sin apartarse de las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: '''Pégate a él'' es demasiado coloquial para el registro bíblico buscado'
    rationale: Aunque transmite adhesión, en español neutral latinoamericano suena físico y cotidiano. 'Aférrate a él' conserva la fuerza de apego firme y es más digno y eclesialmente legible.
  - severity: low
    issue: '''seas engrandecido'' es menos idiomático que alternativas cercanas'
    rationale: La frase no es incorrecta, pero suena algo forzada. 'seas exaltado' encaja mejor con la elección inglesa principal, mientras la nota puede preservar 'crezcas'/'seas aumentado' como alternativas.
  revised_spanish_text: Aférrate a él y no te apartes, para que seas exaltado[a] en tu postrimería.
  revised_footnotes:
  - marker: a
    text: 'O: «para que crezcas o seas engrandecido en tu postrimería». El hebreo dice «llegar a ser grande», mientras que el paralelo griego tiene «ser aumentado».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo inicial a un registro más natural y digno en español bíblico ('Aférrate' en vez de 'Pégate') y se alinea mejor la cláusula final con la decisión principal del POB inglés ('seas exaltado'), conservando en la nota la amplitud léxica del hebreo y del griego. No se requiere adjudicación adicional porque la evidencia fuente y la trayectoria de decisiones están suficientemente claras.
