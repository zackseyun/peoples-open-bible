translation:
  language: es
  text: Los llaman plata rechazada[a], porque Yahvé los ha rechazado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «plata desechada» o «plata despreciada». La expresión hebrea usa una metáfora de refinación para un metal considerado inútil después de la prueba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - metal precioso
  - plata refinada
  lexicon: HALOT
  rationale: En este contexto profético la imagen es metal refinado, no dinero. En español, 'plata' conserva de forma natural la metáfora del metal examinado y rechazado.
- source_word: נִמְאָס
  english_pob_choice: rejected
  chosen_spanish: desechada
  alternatives_spanish:
  - rechazada
  - despreciada
  - inútil
  lexicon: HALOT
  rationale: El verbo expresa el sentido de ser considerado sin valor tras la prueba. 'Desechada' comunica bien ese juicio y mantiene una resonancia semántica con el rechazo divino del final del versículo.
- source_word: קָרְאוּ לָהֶם
  english_pob_choice: they are called / they call them
  chosen_spanish: Llaman a ...
  alternatives_spanish:
  - Los llaman ...
  - Se les llama ...
  lexicon: HALOT
  rationale: 'El hebreo usa una construcción con verbo en plural e objeto indirecto que la revisión inglesa decidió reflejar activamente: ''they call them''. ''Llaman a...'' conserva ese valor sin volverlo impersonal en exceso.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del apelativo; 'porque' es la opción más directa y natural en español.
- source_word: מָאַס
  english_pob_choice: has rejected
  chosen_spanish: ha desechado
  alternatives_spanish:
  - ha rechazado
  - ha despreciado
  lexicon: HALOT
  rationale: Se mantiene el mismo campo semántico del rechazo, pero 'desechado' permite una correspondencia estilística con 'plata desechada' y sugiere el acto de apartar algo como inútil.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el Nombre divino, usando 'Yahvé' en el texto principal en vez de sustituirlo por un título.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo emplea el Tetragrámaton directamente; el proyecto pide conservar el Nombre divino en español. 'Yahvé' es la forma establecida en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metáfora de la plata probada y desechada
  english_pob_reading: rejected silver
  chosen_spanish_reading: plata desechada
  alternative_spanish_readings:
  - plata rechazada
  - plata despreciada
  rationale: La frase conserva la metáfora de metal refinado declarado inútil. 'Desechada' permite un español claro y mantiene el matiz de metal evaluado y apartado tras la prueba.
  doctrine_reference: HALOT, lema כֶּסֶף / נִמְאָס; nota auditada en la POB inglesa
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de una construcción pasiva a una activa: ''They call them rejected silver''. La redacción española sigue esa decisión con ''Llaman a la plata desechada'', manteniendo además el paralelismo con el rechazo final de Yahvé. Se conserva la metáfora metalúrgica y el juego verbal entre נִמְאָס / מָאַס mediante ''desechada'' / ''ha desechado''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה según el estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del Nombre divino.
  - '''Plata'' conserva la imagen metálica; no se interpreta como moneda.'
  - La solución verbal mantiene una voz activa acorde con la revisión auditada en inglés.
