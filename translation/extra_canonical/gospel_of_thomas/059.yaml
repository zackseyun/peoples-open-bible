translation:
  text: Jesus said[a], “Seek after the Living One while you are living[g][f][e][d][c][b],
    so that you do not die and then seek to see him—and you will not be able to see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Seek after” renders ϭⲱϣⲧ with ⲛⲥⲁ; alternatives include “seek” or “search.”
    reason: lexical_alternative
  - marker: b
    text: “Living One” translates the relative phrase ⲡⲉⲧⲉⲣⲉⲱⲛϩ; literally, “the one
      who is living.”
    reason: lexical_alternative
  - marker: c
    text: The negative purpose construction (ϩⲓⲛⲁ ϫⲉ … ⲛⲛⲉ … ⲙⲟⲩ) can be rendered
      “so that you do not die” or more compactly “lest you die.”
    reason: lexical_alternative
  - marker: d
    text: ϣⲓⲛⲉ can mean “seek” or “try”; “try to see” brings out the nuance of attempted
      action distinct from the initial ϭⲱϣⲧ.
    reason: lexical_alternative
  - marker: e
    text: ϣϭⲙϭⲟⲙ literally “be strong,” idiomatically “be able,” commonly followed
      by ⲛⲁ + infinitive (here, ⲛⲁ ⲉⲛⲁⲩ, “to see”).
    reason: cultural_note
  - marker: f
    text: The manuscript’s ⲉⲣⲟϥ is a common object-marker form; Dilley’s normalized
      text uses ⲉⲛⲧⲟϥ. Both mean “him.”
    reason: dialect_note
  - marker: g
    text: Or 'try to see him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϭⲱϣⲧ
  chosen: seek after
  alternatives:
  - seek
  - search
  lexicon: Crum; Layton
  rationale: With the preposition ⲛⲥⲁ, ϭⲱϣⲧ commonly means “seek after.” Retaining
    “after” preserves the Coptic construction and Thomas’s terse diction.
- source_word: ⲛⲥⲁ
  chosen: after
  alternatives:
  - for
  lexicon: Crum
  rationale: Preposition meaning “after/behind.” In this verb phrase it shades the
    seeking as pursuit; keeping it avoids smoothing.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: the Living One
  alternatives:
  - the one who is living
  - the living one
  lexicon: Layton (relative construction)
  rationale: Relative construction “the one who is living.” Title-like in Thomas;
    capitalized to mark the expression’s weight without importing a specific christological
    identification.
- source_word: ϩⲱⲥ ⲉⲣⲉ…ⲱⲛϩ
  chosen: while (you are) living
  alternatives:
  - as you are living
  lexicon: Lambdin §157; Layton
  rationale: Circumstantial ⲉⲣⲉ-clause with ϩⲱⲥ gives a temporal sense “while.”
- source_word: ϩⲓⲛⲁ ϫⲉ
  chosen: so that
  alternatives:
  - in order that
  - lest
  lexicon: Lambdin §167; Layton
  rationale: Standard purpose connector; with following negative expresses prevention
    (“so that … not”). “Lest” is possible but slightly archaic.
- source_word: ⲛⲛⲉ … ⲙⲟⲩ
  chosen: you do not die
  alternatives:
  - you may not die
  - lest you die
  lexicon: Lambdin; Crum (ⲙⲟⲩ)
  rationale: Negative purpose with pronominal subject + infinitive. ⲙⲟⲩ = “to die.”
- source_word: ϣⲓⲛⲉ
  chosen: try (to seek)
  alternatives:
  - seek
  - look for
  lexicon: Crum
  rationale: Here governs ⲉⲛⲁⲩ “to see.” Choosing “try” differentiates it from initial
    ϭⲱϣⲧ and captures the nuance of attempted action.
- source_word: ⲉⲛⲁⲩ
  chosen: to see
  alternatives:
  - to look at
  lexicon: Crum
  rationale: Common verb “see.” Direct object is explicit earlier (ⲉⲛⲧⲟϥ) and then
    elided; English can mirror that elision in the final clause.
- source_word: ⲉⲛⲧⲟϥ / ⲉⲣⲟϥ
  chosen: him
  alternatives: []
  lexicon: Layton (pronominal objects)
  rationale: 3ms object referring back to the Living One; manuscript has ⲉⲣⲟϥ; normalized
    to ⲉⲛⲧⲟϥ.
- source_word: ϣϭⲙϭⲟⲙ
  chosen: be able
  alternatives:
  - be strong
  - have power
  lexicon: Crum
  rationale: Idiomatic use with ⲛⲁ + infinitive expresses ability; hence “be able
    (to see).”
textual_note: 'No lacunae or restorations are marked by Dilley for this saying. Orthography
  shows expected Lycopolitan/Sahidic features: the manuscript reads ⲡⲉⲧⲟⲛϩ (contracted
  for ⲡⲉⲧⲉⲣⲉⲱⲛϩ) and uses ⲉⲣⲟϥ as the object marker, which Dilley normalizes to ⲉⲛⲧⲟϥ.
  The phrase ⲁⲩⲱ ⲛⲧⲉⲛⲧⲱⲧⲛϣⲓⲛⲉ is best parsed as ⲁⲩⲱ ⲛⲧⲉ ⲛⲧⲱⲧⲛ ϣⲓⲛⲉ (“and for you to
  seek”), the Coptic ⲛⲧⲉ + subject + infinitive construction indicating purpose/contingency.
  The final ⲉⲛⲁⲩ lacks an explicit object, implicitly carried over from the previous
  clause; this ellipsis is retained in translation.'
