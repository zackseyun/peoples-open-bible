translation:
  language: es
  text: Si no escuchan[a], y si no lo toman en serio para dar gloria a mi nombre, dice Yahvé de los Ejércitos[b], entonces enviaré entre ustedes la maldición, y maldeciré sus bendiciones; sí, ya las he maldecido[c], porque ustedes no lo toman en serio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''obedecen'' o ''hacen caso''. El hebreo שׁמע puede incluir la idea de obedecer en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''Yahvé de las Huestes''.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo también puede entenderse: ''sí, también las maldeciré''; o, con sentido singular, ''sí, la he maldecido''.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁמְעוּ
  english_pob_choice: listen
  chosen_spanish: escuchan
  alternatives_spanish:
  - oyen
  - atienden
  lexicon: HALOT
  rationale: שׁמע puede significar 'oír' o 'escuchar', y en contexto de advertencia pactal implica prestar oído con obediencia implícita. 'Escuchan' conserva el verbo auditivo sin forzar una paráfrasis moral explícita.
- source_word: תָשִׂימוּ עַל לֵב
  english_pob_choice: take it to heart
  chosen_spanish: ponen atención
  alternatives_spanish:
  - lo toman a pecho
  - lo ponen en su corazón
  - lo toman en serio
  lexicon: HALOT
  rationale: El modismo hebreo expresa interiorizar y atender seriamente. 'Ponen atención' es natural en español y preserva la idea de consideración cuidadosa; aquí se evita una forma demasiado literal que sonaría poco idiomática.
- source_word: לָתֵת כָּבוֹד לִשְׁמִי
  english_pob_choice: to give glory to my name
  chosen_spanish: dar gloria a mi nombre
  alternatives_spanish:
  - dar honor a mi nombre
  - rendir gloria a mi nombre
  lexicon: HALOT
  rationale: כָּבוֹד se rinde bien como 'gloria' en lenguaje profético. 'Mi nombre' mantiene el foco covenantal en la reputación revelada de Yahvé, y 'dar gloria' preserva la estructura verbal del hebreo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos
  - Yahvé de los Ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva 'Yahvé' para el nombre divino según la pauta del proyecto, y צְבָאוֹת se traduce de manera transparente como 'los Ejércitos'. 'Ejércitos' es más directo en español que 'Hostes' y mantiene la transparencia del título.
- source_word: וְשִׁלַּחְתִּי בָכֶם אֶת הַמְּאֵרָה
  english_pob_choice: I will send the curse among you
  chosen_spanish: enviaré entre ustedes la maldición
  alternatives_spanish:
  - enviaré sobre ustedes la maldición
  - enviaré la maldición contra ustedes
  lexicon: HALOT
  rationale: הַמְּאֵרָה designa una maldición/curse específica de juicio pactal. 'La maldición' retiene la definitud del artículo y 'entre ustedes' refleja bien בָכֶם en español, sugiriendo su irrupción en medio del pueblo.
- source_word: וְאָרוֹתִי אֶת בִּרְכוֹתֵיכֶם
  english_pob_choice: I will curse your blessings
  chosen_spanish: maldeciré sus bendiciones
  alternatives_spanish:
  - maldeciré las bendiciones de ustedes
  - convertiré en maldición sus bendiciones
  lexicon: HALOT
  rationale: El objeto directo es 'vuestras/sus bendiciones', por lo que 'sus bendiciones' mantiene el paralelismo. 'Maldeciré' conserva el verbo simple sin sobreexplicar cómo opera la maldición.
- source_word: וְגַם אָרוֹתִיהָ
  english_pob_choice: indeed, I have already cursed them
  chosen_spanish: sí, ya las he maldecido
  alternatives_spanish:
  - y también las maldeciré
  - sí, también las he maldecido
  lexicon: HALOT
  rationale: Se conserva la tensión del perfecto hebreo como acción ya efectiva, sin resolverla hacia futuro. 'Ya las he maldecido' comunica la fuerza de un juicio que ya está en curso; 'las' recoge naturalmente el antecedente colectivo de 'bendiciones'.
- source_word: כִּי אֵינְכֶם שָׂמִים עַל לֵב
  english_pob_choice: because you are not taking it to heart
  chosen_spanish: porque ustedes no ponen atención
  alternatives_spanish:
  - porque no lo toman a pecho
  - porque no lo consideran seriamente
  lexicon: HALOT
  rationale: Se conserva el motivo final del versículo con una expresión española clara. Aunque 'poner atención' no reproduce exactamente la metáfora de 'corazón', sí transmite la misma idea de no atender interiormente el aviso.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: El texto hebreo usa el Tetragrama directamente; por la pauta del proyecto, no se enmascara como 'SEÑOR'. 'Yahvé' preserva la identidad pactal del nombre divino y es legible en español bíblico contemporáneo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the final perfect אָרוֹתִיהָ
  english_pob_reading: I have already cursed them
  chosen_spanish_reading: sí, ya las he maldecido
  alternative_spanish_readings:
  - y también las he maldecido
  - las he maldecido
  rationale: El perfecto puede expresar una acción ya iniciada o plenamente vigente. 'Ya las he maldecido' conserva esa tensión profética sin cerrarla artificialmente a un simple futuro; 'sí' reproduce el énfasis de וְגַם.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Basado en el texto hebreo de WLC y en el audit trail inglés POB, sin revisiones posteriores aplicadas; se mantiene la lectura de la maldición como juicio pactal específico y la tensión del perfecto final.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en lugar de 'SEÑOR' para el Tetragrama, conforme a la terminología del proyecto.
  - '''Ejércitos'' traduce צְבָאוֹת de forma transparente y coherente con el español bíblico moderno.'
  - Se mantuvo el paralelismo de la maldición y las bendiciones sin expandir el alcance semántico.
  - Las notas al pie preservan la ambigüedad del hebreo donde el POB inglés la documenta.
