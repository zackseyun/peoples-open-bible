translation:
  language: es
  text: Entonces se curvó hacia el norte y salió a En-Semes[a], y salió a Gelilot[b], que está frente a la subida de Adumim[c], y bajó hasta la piedra de Bohán hijo de Rubén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En-Semes» conserva el nombre propio; literalmente significa «Fuente del Sol».
    reason: lexical_alternative
  - marker: b
    text: «Gelilot» puede entenderse léxicamente como «círculos» o «distritos», pero aquí se trata como nombre de lugar.
    reason: lexical_alternative
  - marker: c
    text: 'O: «el paso de Adumim».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר
  english_pob_choice: Then it curved
  chosen_spanish: Entonces se curvó
  alternatives_spanish:
  - y se extendió
  - y se desvió
  - y se inclinó
  lexicon: HALOT
  rationale: En descripciones de límites, תאר expresa el trazado o la desviación del contorno. «Se curvó» comunica bien en español el cambio de dirección de la frontera sin perder el carácter topográfico del hebreo.
- source_word: מִצָּפוֹן
  english_pob_choice: northward
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - desde el norte
  - por el norte
  - al norte
  lexicon: HALOT
  rationale: El contexto es direccional y sigue una secuencia de movimiento fronterizo. «Hacia el norte» conserva ese valor adverbial mejor que una lectura de origen.
- source_word: וְיָצָא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se extendió
  - llegó
  - se encaminó
  lexicon: HALOT
  rationale: En fórmulas de delimitación territorial, יצא se usa para el avance del límite. «Salió» preserva el giro idiomático bíblico en un español claro y natural.
- source_word: עֵין שֶׁמֶשׁ
  english_pob_choice: En-shemesh
  chosen_spanish: En-Semes[a]
  alternatives_spanish:
  - Fuente del Sol
  - Manantial del Sol
  lexicon: HALOT
  rationale: El topónimo se translitera como nombre propio, siguiendo la práctica de la POB. «Semes» refleja la forma española usual del elemento שֶׁמֶשׁ, mientras la nota mantiene la alternativa léxica literal.
- source_word: גְּלִילוֹת
  english_pob_choice: Geliloth
  chosen_spanish: Gelilot[b]
  alternatives_spanish:
  - círculos
  - distritos
  lexicon: HALOT
  rationale: Aquí funciona como nombre de lugar, por lo que se translitera en vez de traducirse. La nota conserva la tensión léxica documentada entre topónimo y sentido común de la raíz.
- source_word: נֹכַח
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - delante de
  lexicon: HALOT
  rationale: En un contexto espacial, נֹכַח indica localización enfrente de otro punto de referencia. «Frente a» es natural en español y mantiene la relación geográfica.
- source_word: מַעֲלֵה אֲדֻמִּים
  english_pob_choice: the Ascent of Adummim
  chosen_spanish: la subida de Adumim[c]
  alternatives_spanish:
  - el ascenso de Adumim
  - el paso de Adumim
  lexicon: HALOT
  rationale: מַעֲלֵה describe una subida o paso ascendente; «subida» es transparente en español. Se conserva Adumim como nombre propio, y la nota recoge la alternativa topográfica tradicional de «paso».
- source_word: וְיָרַד
  english_pob_choice: and it went down
  chosen_spanish: y bajó
  alternatives_spanish:
  - y descendió
  - y fue hacia abajo
  lexicon: HALOT
  rationale: En lenguaje de fronteras, ירד marca movimiento cuesta abajo. «Bajó» es idiomático y reproduce la progresión del itinerario territorial.
- source_word: אֶבֶן בֹּהַן בֶּן רְאוּבֵן
  english_pob_choice: the stone of Bohan son of Reuben
  chosen_spanish: la piedra de Bohán, hijo de Rubén
  alternatives_spanish:
  - la piedra de Bohán, descendiente de Rubén
  - la piedra de Bohán, el hijo de Rubén
  lexicon: HALOT
  rationale: La cadena constructa identifica un mojón/landmark llamado por Bohán y relacionado con Rubén. «Piedra» es una traducción transparente de אֶבֶן; «hijo de Rubén» mantiene la forma genealógica breve del hebreo y del auditor inglés.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones posteriores; el borrador español sigue la misma lectura topográfica y la misma decisión de transliterar los topónimos, manteniendo el paralelismo del encadenamiento verbal.
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa con los verbos de movimiento en pasado simple, coherente con el estilo de listas territoriales.
  - Se preserva la transliteración de los topónimos principales para no borrar la distinción entre nombre propio y posible sentido léxico.
  - «Hijo de Rubén» sigue la relación genealógica compacta del hebreo sin expandirla innecesariamente.
