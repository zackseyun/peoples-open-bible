id: LEV.25.34
reference: Leviticus 25:34
source:
  edition: WLC
  text: וּֽ/שְׂדֵ֛ה מִגְרַ֥שׁ עָרֵי/הֶ֖ם לֹ֣א יִמָּכֵ֑ר כִּֽי אֲחֻזַּ֥ת עוֹלָ֛ם ה֖וּא לָ/הֶֽם־׃ס
translation:
  text: But the field of pastureland belonging to their cities must not be sold[b][a], for it is their permanent possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common land' or 'open land' for 'pastureland' (מִגְרָשׁ), referring to the land around Levitical cities.
    reason: lexical_alternative
  - marker: b
    text: Or 'everlasting possession.' The Hebrew עוֹלָם can denote enduring permanence; here it refers to the land's non-transferable status.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/שְׂדֵה
  chosen: But the field
  alternatives:
  - And the field
  - Now the field
  lexicon: HALOT
  rationale: שָׂדֶה means 'field.' The prefixed conjunction is rendered 'But' to mark contrast with the preceding allowance about houses in Levitical cities; 'and' would be more mechanically formal but less clear in English discourse.
- source_word: מִגְרַשׁ
  chosen: pastureland
  alternatives:
  - common land
  - open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pasture area around a city, especially associated with Levitical towns. 'Pastureland' is clear modern English and fits the land-use sense in context.
- source_word: עָרֵיהֶם
  chosen: belonging to their cities
  alternatives:
  - of their cities
  - around their cities
  lexicon: HALOT
  rationale: The construct chain שְׂדֵה מִגְרַשׁ עָרֵיהֶם denotes the field/land of the pasture area of their cities. 'Belonging to their cities' expresses the possessive relationship naturally in English without obscuring the construct linkage.
- source_word: לֹא יִמָּכֵר
  chosen: must not be sold
  alternatives:
  - shall not be sold
  - is not to be sold
  lexicon: HALOT
  rationale: 'The Niphal imperfect of מכר is passive/reflexive in sense: ''be sold.'' ''Must not be sold'' conveys the legal prohibition in contemporary English; ''shall not'' is possible but more archaic/legalistic.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces the reason for the prohibition. 'For' is concise and idiomatic in legal discourse.
- source_word: אֲחֻזַּת עוֹלָם
  chosen: permanent possession
  alternatives:
  - everlasting possession
  - perpetual holding
  lexicon: HALOT
  rationale: אֲחֻזָּה is a landed possession/holding; עוֹלָם here denotes enduring permanence within the covenantal legal framework. 'Permanent possession' is natural English and avoids overstating metaphysical eternity that 'everlasting' might suggest.
- source_word: הוּא לָהֶם
  chosen: it is their
  alternatives:
  - it belongs to them as
  - it is for them as
  lexicon: HALOT
  rationale: The pronoun plus prepositional phrase identifies the pastureland as belonging to them. English idiom compresses this to 'it is their' before 'permanent possession.'
