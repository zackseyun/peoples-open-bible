    rationale: 'El sufijo hebreo -ךָ es segunda persona masculina singular: los israelitas dicen al rey que Judá «te ha robado» o «te ha robado para sí». Cambiarlo a «nos han robado» invierte el sentido y contradice el inglés auditado.'
  - severity: medium
    issue: «todo hombre de Israel venía» es gramatical y estilísticamente deficiente
    rationale: כָּל אִישׁ יִשְׂרָאֵל es un colectivo masculino. En español neutral y legible, «todos los hombres de Israel» comunica mejor el colectivo sin la rigidez extraña del singular distributivo.
  - severity: medium
    issue: «venía» en singular no concuerda con el colectivo representado y suena impropio en la narración
    rationale: 'Aunque el hebreo combina singular colectivo con participio plural, en español la mejor equivalencia narrativa es plural: «vinieron» o «venían». El POB inglés escogió pasado simple; «vinieron» funciona mejor aquí.'
  - severity: medium
    issue: «han pasado al rey» no conserva bien el causativo de וַיַּעֲבִרוּ
    rationale: El hebreo expresa ‘hicieron cruzar / llevaron al otro lado’. «Han pasado al rey» en español es poco idiomático y puede entenderse como ‘lo omitieron’ o ‘pasaron junto a él’. Debe decirse «hicieron cruzar» o «llevaron ... al otro lado».
