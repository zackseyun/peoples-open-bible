translation:
  language: es
  text: 'Porque así dice Yahvé: Incluso los cautivos del poderoso serán quitados, y la presa[a] del tirano escapará; y yo mismo contenderé con el que contiende contigo, y yo mismo salvaré a tus hijos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el botín del tirano».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tus hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre divino propio en la política del proyecto, preservando la referencia explícita al Tetragrámaton sin sustituirlo por una convención litúrgica.
- source_word: שְׁבִי
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - cautiverio
  - cautivo
  lexicon: HALOT
  rationale: En contexto con el pasivo de ‘ser quitados’, el sustantivo designa personas retenidas como presa, no la abstracción ‘cautiverio’. El plural ‘cautivos’ transmite bien ese sentido colectivo en español.
- source_word: גִבּוֹר
  english_pob_choice: the mighty
  chosen_spanish: el poderoso
  alternatives_spanish:
  - el fuerte
  - el guerrero
  - el héroe
  lexicon: HALOT
  rationale: En este paralelo de opresión, ‘poderoso’ comunica la idea de una persona dominante o superior en fuerza/posición. ‘Guerrero’ sería más específico de lo que el contexto exige.
- source_word: יֻקָּח
  english_pob_choice: will be taken away
  chosen_spanish: serán quitados
  alternatives_spanish:
  - serán tomados
  - serán llevados
  - serán arrebatados
  lexicon: HALOT
  rationale: El pasivo de לקח expresa remoción de la posesión del captor. ‘Serán quitados’ conserva esa idea de traslado o despojo con naturalidad en español.
- source_word: מַלְקוֹחַ
  english_pob_choice: the prey
  chosen_spanish: el botín
  alternatives_spanish:
  - la presa
  - lo arrebatado
  - el saqueo
  lexicon: HALOT
  rationale: El sustantivo nombra lo que ha sido capturado o arrebatado. ‘Botín’ mantiene el campo semántico de presa despojada y permite buen paralelismo con la primera cola.
- source_word: עָרִיץ
  english_pob_choice: the ruthless
  chosen_spanish: el tirano
  alternatives_spanish:
  - el cruel
  - el violento
  - el opresor
  lexicon: HALOT
  rationale: La POB inglesa preservó una alternativa para ‘tyrant’, mostrando que el término puede nombrar al opresor violento. En español, ‘tirano’ recoge mejor esa fuerza concreta que ‘implacable’ o ‘ruthless’ calcado.
- source_word: יִמָּלֵט
  english_pob_choice: will escape
  chosen_spanish: escapará
  alternatives_spanish:
  - será librado
  - se librará
  - huirá
  lexicon: HALOT
  rationale: El nifal de מלט tiene valor de escape o liberación. ‘Escapará’ conserva la imagen de salida de la mano del opresor y sigue de cerca el paralelo del verso.
- source_word: יְרִיבֵךְ
  english_pob_choice: the one who contends with you
  chosen_spanish: el que contiende contigo
  alternatives_spanish:
  - tu adversario
  - el que disputa contigo
  - el que pleitea contigo
  lexicon: HALOT
  rationale: Se conserva el verbo jurídico-contencioso de ריב y el singular con sufijo femenino, evitando un término demasiado general como ‘adversario’.
- source_word: אָרִיב
  english_pob_choice: will contend
  chosen_spanish: contenderé
  alternatives_spanish:
  - pleitearé
  - defenderé tu causa
  - disputaré
  lexicon: HALOT
  rationale: La raíz ריב mantiene el mismo campo semántico que en la cola anterior; ‘contenderé’ preserva la correspondencia léxica y la posible resonancia forense.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo ciertamente
  - yo en persona
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. ‘Yo mismo’ refleja bien la intervención personal e intensiva de Yahvé en ambas cláusulas.
- source_word: בָּנַיִךְ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tu descendencia
  - tus hijos varones
  - tus vástagos
  lexicon: HALOT
  rationale: Aunque el inglés POB generaliza a ‘children’, el hebreo dice literalmente ‘tus hijos’. Como el destinatario es femenino singular (Sion), el plural masculino puede funcionar colectivamente; aquí se conserva la literalidad básica y se aclara la opción colectiva en nota.
- source_word: אוֹשִׁיעַ
  english_pob_choice: will save
  chosen_spanish: salvaré
  alternatives_spanish:
  - libraré
  - rescataré
  lexicon: HALOT
  rationale: El hifil de ישע suele significar salvar o librar. ‘Salvaré’ es la opción más directa y teológicamente transparente en español.
theological_decisions:
- issue: Alcance colectivo de בָּנַיִךְ en el discurso a Sion
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tu descendencia
  rationale: El texto se dirige a una figura femenina singular (Sion/Jerusalén). El hebreo usa un plural masculino que puede funcionar colectivamente. Para auditar la literalidad, se mantiene ‘tus hijos’ en el cuerpo y se señala la alternativa más literal de género en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Valor de יְהוָה como nombre propio divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino conforme al estándar del proyecto y se evita la sustitución por una mayúscula litúrgica. Esto mantiene visible el Tetragrámaton en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: Se incorporó la revisión auditada del inglés POB que cambió la coordinación de la segunda mitad del versículo de un posible valor causal a una coordinación simple (‘y yo mismo contenderé’). En español se refleja con ‘y yo mismo contenderé’ para mantener el flujo paralelo del hebreo. También se respetó la lectura consolidada de ‘Yahvé’ y la decisión de hacer explícita la intervención personal con ‘yo mismo’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del nombre divino en el texto principal.
  - Se mantiene la correspondencia léxica entre ‘contenderá/contenderé’ para la raíz ריב.
  - ‘Cautivos’ y ‘botín’ preservan el paralelismo de personas retenidas y lo arrebatado.
  - El sufijo femenino singular implícito en el hebreo se entiende como Sion/Jerusalén, de acuerdo con el contexto profético.
