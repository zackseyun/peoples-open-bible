translation:
  language: es
  text: 'Entonces llamó rápidamente al joven que llevaba sus armas y le dijo[a]: «Saca tu espada y mátame, para que no digan de mí: “Una mujer lo mató”.» Entonces su escudero lo atravesó, y murió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «su escudero» para «el joven que llevaba sus armas». Más adelante, el hebreo repite literalmente «su joven», pero en español se traduce «su escudero» para mayor claridad y naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: Then he ... called
  chosen_spanish: Entonces llamó
  alternatives_spanish:
  - Y llamó
  - Así llamó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la acción; «Entonces» expresa bien la secuencia sin endurecer el español. «Llamó» mantiene el verbo base sin añadir matices no presentes.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - apresuradamente
  lexicon: HALOT
  rationale: El adverbio indica premura. «Rápidamente» es natural, claro y conserva el valor adverbial sin excesiva interpretación.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  lexicon: HALOT
  rationale: En este contexto, נַעַר se refiere al asistente portador de armas; «joven» preserva el valor léxico básico y evita imponer «siervo» o «escudero» sin necesidad.
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: who carried his weapons
  chosen_spanish: que llevaba sus armas
  alternatives_spanish:
  - que portaba sus armas
  - su escudero
  lexicon: HALOT
  rationale: La expresión es literalmente «portador de sus utensilios/armas». «Que llevaba sus armas» es transparente y fiel; «escudero» sería más idiomático pero más interpretativo.
- source_word: שְׁלֹף
  english_pob_choice: Draw
  chosen_spanish: Saca
  alternatives_spanish:
  - Desenvaina
  - Arranca
  lexicon: HALOT
  rationale: El imperativo pide extraer la espada. «Saca» es idiomático en español y reproduce bien la orden directa; «desenvaina» es posible, pero introduce un matiz más técnico.
- source_word: חַרְבְּךָ
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - tu sable
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo con sufijo de 2ms. «Espada» es la opción normal y clara en español.
- source_word: וּמוֹתְתֵנִי
  english_pob_choice: and kill me
  chosen_spanish: y mátame
  alternatives_spanish:
  - y dame muerte
  - y ponme a muerte
  lexicon: HALOT
  rationale: La forma causativa expresa pedir la muerte. «Mátame» es la equivalencia más directa y natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - no vaya a ser que
  lexicon: HALOT
  rationale: 'Introduce una finalidad negativa: evitar una posible vergüenza pública. «Para que no» expresa bien esa relación sin arcaísmo.'
- source_word: יֹאמְרוּ לִי
  english_pob_choice: they say of me
  chosen_spanish: digan de mí
  alternatives_spanish:
  - hablen de mí
  - me digan
  lexicon: HALOT
  rationale: El hebreo dice literalmente «me digan», pero el sentido es lo que se dirá acerca de Abimelec. «Digan de mí» conserva ese valor discursivo.
- source_word: אִשָּׁה הֲרָגָתְהוּ
  english_pob_choice: ‘A woman killed him’
  chosen_spanish: «Una mujer lo mató»
  alternatives_spanish:
  - «Una mujer lo hirió de muerte»
  - «Una mujer lo mató a él»
  lexicon: HALOT
  rationale: La frase enfoca la vergüenza honorífica de morir a manos de una mujer. «Lo mató» comunica el acto sin suavizar la fuerza del texto.
- source_word: וַיִּדְקְרֵהוּ
  english_pob_choice: pierced him through
  chosen_spanish: lo atravesó
  alternatives_spanish:
  - lo traspasó
  - lo hirió de punta
  lexicon: HALOT
  rationale: El verbo describe una acción de punzar o atravesar con arma. «Lo atravesó» conserva la violencia específica mejor que un simple «lo hirió».
- source_word: נַעֲרוֹ
  english_pob_choice: his young man
  chosen_spanish: su joven
  alternatives_spanish:
  - su muchacho
  - su servidor
  lexicon: HALOT
  rationale: Se mantiene la repetición del sustantivo anterior para reflejar el hebreo. «Su joven» suena un poco menos interpretativo que «su servidor».
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y así murió
  - y falleció
  lexicon: HALOT
  rationale: Cierre narrativo directo y sobrio. «Murió» reproduce con precisión el resultado final.
translation_notes:
  revision_awareness: 'Se corrigió la validación previa: la nota [a] ahora aparece anclada en el texto español en «le dijo[a]». Se conservó la alternativa lexical documentada por el POB inglés, pero formulada en español y vinculada al punto exacto de ambigüedad.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el joven portador de armas y la referencia repetida a «su joven» al final del versículo.
  - No se introdujo «siervo» ni «armero/escudero» en el texto principal para no cerrar indebidamente la ambigüedad léxica de נַעַר.
  - La estructura narrativa sigue de cerca el hebreo sin calco rígido; «entonces» y «rápidamente» expresan el avance del relato con naturalidad española.
