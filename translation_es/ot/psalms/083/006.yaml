review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: כִּי como explicación, נוֹעֲצוּ en contexto hostil como conspiración deliberada, לֵב יַחְדָּו como unidad interior, y עָלֶיךָ ... בְּרִית יִכְרֹתוּ como pacto hostil contra Dios. Sin embargo, «pacto» debilita ligeramente el peso de בְּרִית frente a la decisión auditada de «covenant», y la nota b no preserva con suficiente precisión la alternativa inglesa, que apunta a la idea de deliberación mutua ‘consulted together with one heart’.'
  spanish_quality_summary: El español es claro y natural. «Porque conspiraron con un mismo corazón» es legible, pero «de común acuerdo» no sería fiel a la imagen; por eso conviene conservar «corazón». Aun así, «con un mismo corazón» suena algo rígido; «de un solo corazón» es más idiomático y conserva la metáfora. «Contra ti hacen un pacto» es comprensible, pero «hacen un pacto» suena algo plano para בְּרִית; «hacen una alianza» sería más político, mientras que «hacen un pacto» sigue siendo aceptable. Mejor aún, «hacen un pacto» puede mantenerse si se fortalece con una nota precisa, pero en este proyecto «pacto» suele ser menos marcado que «pacto solemne» o «covenio».
  glossary_alignment: 'No hay conflicto con los términos teológicos por defecto del proyecto. No aparece Yahvé en este versículo. La principal cuestión léxica es בְּרִית: el rastro inglés justifica un término formal y vinculante. En español eclesial amplio, «pacto» es natural, pero «convenio» sería demasiado administrativo; «alianza» suaviza el anclaje léxico. Se puede conservar «pacto» si la nota literal queda exacta. También conviene ajustar la nota alternativa para reflejar mejor «consultaron juntos» sin redundancia innecesaria.'
  issues:
  - severity: medium
    issue: «pacto» puede quedar algo menos cargado que בְּרִית en este contexto
    rationale: La auditoría inglesa subraya el carácter formal y grave de בְּרִית como ‘covenant’. En español, «pacto» es aceptable, pero requiere una formulación cuidadosa para no sonar demasiado informal o débil.
  - severity: low
    issue: La expresión «con un mismo corazón» es fiel pero algo rígida en español
    rationale: La imagen hebrea debe conservarse, pero «de un solo corazón» suena más natural en español general sin perder el valor metafórico.
  - severity: medium
    issue: La nota b no refleja con suficiente precisión la alternativa auditada
    rationale: El inglés conserva la opción ‘consulted together with one heart’. La nota española actual («consultaron juntos con un mismo corazón») es comprensible, pero conviene ajustarla a una formulación más natural y más cercana a la decisión léxica documentada.
  revised_spanish_text: Porque conspiraron juntos de un solo corazón[a][b]; contra ti hacen un pacto.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «cortan un pacto contra ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «consultaron juntos de un solo corazón».'
    reason: previous_rendering
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad sin cambiar el sentido: se añadió «juntos» para reflejar explícitamente יַחְדָּו, se cambió «con un mismo corazón» por «de un solo corazón» por ser más idiomático en español y mantener la metáfora hebrea, y se afinó la nota alternativa para alinearla mejor con el rastro inglés auditado. No se requiere adjudicación adicional.'
