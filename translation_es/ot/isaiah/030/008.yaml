translation:
  language: es
  text: Ahora, ven, escríbelo ante ellos en una tablilla, e inscríbelo en un rollo, para que sea para un día posterior[a], para siempre y eternamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el día postrero» o «para el último día».
    reason: alternative_reading
  - marker: b
    text: O «para siempre»; el hebreo también puede subrayar que el escrito permanezca como testimonio perdurable.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: El adverbio temporal introduce una orden inmediata. «Ahora» es natural en español y mantiene la urgencia del original sin añadir matices no expresados.
- source_word: בּוֹא
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - acércate
  lexicon: HALOT
  rationale: En discurso profético, el imperativo funciona como llamado directo de atención. «Ven» conserva ese impulso imperativo de manera sobria y idiomática.
- source_word: כָתְבָהּ
  english_pob_choice: write it
  chosen_spanish: escríbelo
  alternatives_spanish:
  - escribe esto
  - anótalo
  lexicon: HALOT
  rationale: El sufijo pronominal femenino singular remite al mensaje u oráculo. «Escríbelo» preserva el objeto sin especificarlo más de lo que exige el hebreo.
- source_word: עַל ל֛וּחַ
  english_pob_choice: on a tablet
  chosen_spanish: en una tabla
  alternatives_spanish:
  - sobre una tabla
  - en una tablilla
  lexicon: HALOT
  rationale: לוּחַ designa una superficie/tablilla para escribir. «Tabla» mantiene la imagen física y es comprensible en español; «tablilla» también sería posible, pero puede sonar menos natural en este contexto.
- source_word: אִתָּם
  english_pob_choice: before them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - delante de ellos
  - en su presencia
  lexicon: HALOT
  rationale: Aunque la preposición puede significar «con», aquí el contexto de testimonio público favorece el sentido de presencia pública. «Ante ellos» conserva esa idea sin sobreexplicarla.
- source_word: וְעַל סֵפֶר
  english_pob_choice: and ... in a scroll
  chosen_spanish: e inscríbelo en un rollo
  alternatives_spanish:
  - y escríbelo en un rollo
  - y en un rollo
  lexicon: HALOT
  rationale: סֵפֶר aquí se refiere mejor a un documento/rollo que a «libro». «Rollo» evita un anacronismo y mantiene el medio escrito antiguo.
- source_word: חֻקָּהּ
  english_pob_choice: inscribe it
  chosen_spanish: inscríbelo
  alternatives_spanish:
  - grábalo
  - regístralo
  lexicon: HALOT
  rationale: El verbo asociado a חקק transmite la idea de inscribir o grabar con permanencia. «Inscríbelo» conserva ese matiz formal y duradero sin forzar una imagen literal de piedra.
- source_word: לְיוֹם אַחֲרוֹן
  english_pob_choice: for a later day
  chosen_spanish: para un día posterior
  alternatives_spanish:
  - para un día futuro
  - para el día postrero
  lexicon: HALOT
  rationale: La expresión puede referirse a un tiempo venidero sin exigir un tecnicismo escatológico. «Día posterior» mantiene la apertura semántica y evita cerrar el sentido a una sola lectura.
- source_word: עַד עוֹלָם
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y eternamente
  alternatives_spanish:
  - por siempre y para siempre
  - por la eternidad
  lexicon: HALOT
  rationale: La duplicación intensifica la duración. «Para siempre y eternamente» comunica ese énfasis en español con dignidad y claridad, sin reducir la fuerza de la expresión.
theological_decisions:
- issue: Alcance de לְיוֹם אַחֲרוֹן
  english_pob_reading: for a later day
  chosen_spanish_reading: para un día posterior
  alternative_spanish_readings:
  - para el día postrero
  - para un día futuro
  rationale: El hebreo admite una referencia futura general sin obligar a una lectura técnica de «fin de los tiempos». La versión principal conserva esa amplitud y deja abiertas las alternativas más literales.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la línea revisada del POB inglés que eliminó «stand» y «as a witness» porque no están expresados explícitamente en este verso, manteniendo el resto del contenido con equivalencia óptima y sin sobrecargar el español con una interpretación añadida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este verso no lo contiene.
  - Se usa «Rollo» en lugar de «libro» para סֵפֶר por coherencia con el medio escrito antiguo.
  - «Ante ellos» refleja mejor el valor público de אִתָּם en este contexto que una traducción meramente instrumental de «con ellos».
  - Se evita «Cristo/Mesías» porque no aparecen en el versículo.
  - Se conserva la duplicación final con un binomio español que expresa intensidad temporal sin introducir elementos ausentes del hebreo.
