translation:
  language: es
  text: No saquen una carga de sus casas el día de sábado[a], y no hagan ningún trabajo, sino santifiquen el día de sábado, como mandé a sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lleven una carga fuera de sus casas».
    reason: lexical_alternative
  - marker: b
    text: «Sus padres» se refiere a las generaciones anteriores de Israel a quienes Dios dio este mandamiento.
    reason: cultural_note
lexical_decisions:
- source_word: תוֹצִיאוּ
  english_pob_choice: carry ... out
  chosen_spanish: saquen
  alternatives_spanish:
  - saquen fuera
  - lleven fuera
  - saquen de
  lexicon: HALOT
  rationale: El verbo causativo expresa hacer salir algo; en español, «sacar» comunica de modo natural la acción física de retirar un objeto de la casa. En este contexto legal sabático, evita la dureza de un calco y conserva la dirección del movimiento.
- source_word: מַשָּׂא
  english_pob_choice: a load
  chosen_spanish: una carga
  alternatives_spanish:
  - un bulto
  - un peso
  - una carga
  lexicon: HALOT
  rationale: El sustantivo designa algo llevado o transportado. «Carga» mantiene el valor concreto y funciona mejor en español bíblico actual que «bulto» o una abstracción como «peso».
- source_word: מִבָּתֵּיכֶם
  english_pob_choice: out of your houses
  chosen_spanish: de sus casas
  alternatives_spanish:
  - de sus hogares
  - fuera de sus casas
  - desde sus casas
  lexicon: HALOT
  rationale: La preposición marca origen/salida. «De sus casas» es natural en español con el verbo «sacar» y conserva la referencia doméstica del mandato. Se usa tercera persona por el discurso profético directo al pueblo.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en el día de sábado
  - en sábado
  - en el día del sábado
  lexicon: HALOT
  rationale: La frase temporal se conserva de forma transparente. «Día de sábado» mantiene el énfasis explícito de «día» y evita reemplazar el término con una formulación eclesiástica no presente en el hebreo.
- source_word: מְלָאכָה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - labor
  - obra
  lexicon: HALOT
  rationale: En la legislación del sábado, el término apunta a actividad u obra prohibida. «Obra» permite una resonancia bíblica amplia y evita reducirlo a empleo remunerado; aquí encaja con el paralelismo del mandato.
- source_word: וְקִדַּשְׁתֶּם
  english_pob_choice: sanctify
  chosen_spanish: santifiquen
  alternatives_spanish:
  - santifiquen
  - consagren
  - hagan santo
  lexicon: HALOT
  rationale: El piel de קדש expresa apartar como santo. «Santifiquen» reproduce con precisión el valor verbal y conserva el registro formal del mandato. Se prefirió esta opción sobre una frase más interpretativa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  - como
  lexicon: HALOT
  rationale: La partícula introduce comparación con el mandato previo. «Como» es la opción más natural en español y conserva la relación normativa sin añadir matiz explicativo extra.
- source_word: צִוִּיתִי
  english_pob_choice: I commanded
  chosen_spanish: mandé
  alternatives_spanish:
  - mandé
  - ordené
  - di mandato
  lexicon: HALOT
  rationale: El verbo señala un mandato divino directo. «Mandé» es breve, claro y suficientemente fuerte para el registro profético; «ordené» habría sonado más jurídico sin necesidad.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus padres
  - sus antepasados
  - sus padres/antepasados
  lexicon: HALOT
  rationale: Se conserva el término de parentesco masculino que usa el hebreo, según la política de precisión de género. En español, «sus padres» mantiene esa forma sin neutralizarla, y el contexto profético hace claro que se refiere a los antepasados de Israel.
theological_decisions:
- issue: Lenguaje de santificación del sábado
  english_pob_reading: sanctify the Sabbath day
  chosen_spanish_reading: santifiquen el día de sábado
  alternative_spanish_readings:
  - santifiquen el sábado
  - consagren el día de sábado
  - traten como santo el día de sábado
  rationale: El hebreo no solo prohíbe trabajo, sino que manda apartar el día como santo. «Santifiquen» reproduce mejor el acto de consagración que una mera observancia externa. Se mantuvo la mención explícita de «día» para respetar la forma del hebreo.
  doctrine_reference: Translation philosophy §§5-6
- issue: Término de parentesco masculino
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus padres
  rationale: La forma hebrea es masculina y el POB inglés la conservó. En español, «sus padres» mantiene la referencia generacional masculina sin borrar la tensión de género presente en la fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación más idiomática para וְקִדַּשְׁתֶּם («keep the Sabbath day holy») a «sanctify the Sabbath day» para reflejar con mayor precisión el verbo hebreo. La presente redacción española sigue esa revisión optando por «santifiquen», que conserva la fuerza cultual y el registro formal del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - «sábado» se traduce de forma contextual para שַׁבָּת, sin introducir glosas litúrgicas adicionales.
  - Se evitó «siervo» o vocabulario de obediencia no presente en el hebreo; el versículo es principalmente una cadena de mandatos negativos y positivos.
  - «Obra» preserva el alcance amplio de מְלָאכָה en el contexto sabático; no se restringe a trabajo asalariado.
