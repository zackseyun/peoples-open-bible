    rationale: 'El hebreo pasa de 2ms («tu encargo») a 2mp («ustedes»), pero en español del texto bíblico resulta más natural y fiel al destinatario principal usar «tú» en la advertencia final: «tanto ellos como tú», sin perder que Aarón representa al grupo sacerdotal.'
