    text: Hebrew literally, “in one of the cities of the field,” meaning a town in the countryside as opposed to the royal city.
    reason: lexical_alternative
  - marker: b
    text: Or “and I will dwell there.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, “the city of the kingdom.”
    reason: lexical_alternative
