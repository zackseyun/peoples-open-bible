review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Dios está presente en la ciudad, ella no será desestabilizada y Dios la ayudará al amanecer. Sin embargo, en dos puntos no sigue del todo el rastro auditado del POB: (1) el texto principal usa «en medio de ella», mientras que la elección inglesa principal fue «within her» y dejó «in her midst» como alternativa; en español conviene reflejar eso con «dentro de ella» o equivalente, dejando «en medio de ella» en nota. (2) «será conmovida» no comunica con naturalidad en español la imagen de estabilidad/inestabilidad de מוט; «será sacudida» o «tambaleará» captan mejor el verbo, y «no será sacudida» funciona mejor en el texto principal.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «será conmovida» suena poco natural y puede sugerir emoción interior más que inestabilidad. Además, la nota a repite exactamente el texto principal en vez de ofrecer la alternativa. «Cuando despunte la mañana» es natural y fiel; no requiere cambio. El conjunto necesita una reparación menor para legibilidad y consistencia de notas.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto: «Dios» para אֱלֹהִים es correcto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión pronominal femenina se conserva adecuadamente. La principal corrección es de matiz léxico y naturalidad, no de glosario doctrinal.'
  issues:
  - severity: medium
    issue: La elección principal «en medio de ella» no sigue la decisión principal auditada «within her».
    rationale: El inglés POB fijó como texto principal una presencia interior («within her») y dejó «in her midst» como alternativa. En español, «dentro de ella» refleja mejor esa decisión, mientras que «en medio de ella» puede conservarse en nota.
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de dar una alternativa real.
    rationale: Si el texto principal dice «en medio de ella», la nota «O «en medio de ella»» es inválida. Las notas deben preservar alternativas significativas, no duplicar el texto anclado.
  - severity: medium
    issue: «No será conmovida» suena antinatural y semánticamente imprecisa en español actual.
    rationale: '«Conmovida» suele asociarse a emoción, no a ser movida o sacudida físicamente/metafóricamente. El hebreo מוט en este contexto pide una imagen de firmeza: «no será sacudida» en el texto y «no tambaleará / no será movida» en nota funcionan mejor.'
  revised_spanish_text: Dios está dentro de ella[a]; no será sacudida[b]. Dios la ayudará cuando despunte la mañana[c].
  revised_footnotes:
