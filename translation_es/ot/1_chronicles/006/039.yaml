  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la mayoría de las decisiones léxicas del hebreo: מוֹשְׁבוֹתָם = ''moradas'', לְטִירוֹתָם = ''asentamientos'', בִּגְבוּלָם = ''dentro de su territorio'', y las expresiones genealógicas están bien conservadas. Sin embargo, la cláusula final כִּי לָהֶם הָיָה הַגּוֹרָל no queda bien representada por ''porque el sorteo les pertenecía'', ya que הַגּוֹרָל aquí apunta al lote/suerte asignada, no al evento del sorteo como tal.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'el sorteo les pertenecía' suena poco natural y semánticamente impreciso en este contexto de repartición territorial. Una formulación como 'porque el lote era de ellos' o 'porque la suerte era de ellos' refleja mejor el hebreo; 'lote' encaja especialmente bien con el contexto de asignación territorial.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Coatitas' es apropiado para הַקְּהָתִי en plural colectivo. La única corrección necesaria es preferir 'lote' frente a 'sorteo' para הַגּוֹרָל en este versículo, en línea con la justificación auditada de asignación por suerte.
  issues:
