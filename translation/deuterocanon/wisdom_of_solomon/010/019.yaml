theological_decisions:
- issue: Imagery of judgment in the sea
  chosen_reading: Retain concrete water-judgment imagery without explicitly adding 'drowned' or 'dead bodies' to the text.
  alternative_readings:
  - Render more interpretively as 'drowned their enemies and brought them up from the depths'
  rationale: The verse evokes the Exodus judgment motif, but the Greek wording itself uses two vivid verbs rather than an explicit statement of death. The translation preserves that tension and imagery rather than resolving it interpretively.
