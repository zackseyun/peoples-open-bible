translation:
  language: es
  text: Cuando Ezequías vio que Senaquerib había venido y que su rostro estaba vuelto hacia la guerra contra Jerusalén,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su rostro estaba para la guerra contra Jerusalén», un modismo que significa que estaba resuelto a hacerle guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: HALOT
  rationale: El verbo ראה en esta narrativa se expresa naturalmente con «vio». Conserva el ritmo del hebreo y permite que el contexto explique la comprensión implícita.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que Ezequías vio; «que» reproduce la función subordinante de forma natural en español.
- source_word: בָא
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - vino
  - estaba viniendo
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto reporta una acción anterior a la percepción de Ezequías; «había venido» comunica bien esa anterioridad.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennacherib
  lexicon: transliteración estándar
  rationale: En español es habitual la forma «Senaquerib» para el nombre propio, y resulta más reconocible para lectores bíblicos hispanohablantes.
- source_word: וּפָנָיו
  english_pob_choice: his face was set
  chosen_spanish: su rostro estaba puesto
  alternatives_spanish:
  - su cara estaba orientada
  - estaba resuelto
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «rostro» y la expresión idiomática de estar orientado o dispuesto hacia algo. «Su rostro estaba puesto» mantiene la metáfora sin volverla puramente explicativa.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: HALOT
  rationale: «Guerra» preserva la fuerza del sustantivo hebreo y encaja con el giro idiomático del versículo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra de
  lexicon: HALOT
  rationale: Con מלחמה y Jerusalén, la preposición indica hostilidad dirigida a la ciudad; «contra» es la equivalencia más clara y natural.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: uso bíblico estándar
  rationale: Se conserva el nombre propio en su forma española estándar.
theological_decisions:
- issue: Idiom of "his face was set" / intention and resolve
  english_pob_reading: his face was set for war against Jerusalem
  chosen_spanish_reading: su rostro estaba puesto para la guerra contra Jerusalén
  alternative_spanish_readings:
  - su propósito era hacer guerra contra Jerusalén
  - estaba decidido a hacer guerra contra Jerusalén
  rationale: No se borra la metáfora hebrea ni se la sustituye por una paráfrasis abstracta. La frase española conserva el hebraísmo y deja visible la determinación hostil del rey asirio, como en el texto fuente y en la nota inglesa.
  doctrine_reference: Hebreo idiomático narrativo; cf. conservación de imagen semítica en traducción bíblica
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una explicación más interpretativa («his purpose was to make war») a una formulación más cercana al hebreo («his face was set for war»). La traducción española sigue esa revisión y preserva la imagen idiomática en lugar de sustituirla por una explicación abstracta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton, aunque este versículo no lo contiene.
  - Se usa «guerra» y no un eufemismo más suave para conservar la fuerza del hebreo מלחמה.
  - «Rostro» conserva el paralelismo con la metáfora hebrea; no se reemplaza por «propósito» en el texto principal para no perder la tensión idiomática documentada.
