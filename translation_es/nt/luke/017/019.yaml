translation:
  language: es
  text: 'Y le dijo: «Levántate y ve; tu fe[a] te ha salvado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza». La palabra griega para «fe» también puede denotar confianza o fidelidad, aunque aquí «fe» es la traducción principal.
    reason: lexical_alternative
  - marker: b
    text: O «te ha hecho bien» o «te ha sanado». El verbo griego puede referirse a rescate, sanidad o salvación.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: BDAG
  rationale: El verbo narrativo de decir se rinde de forma natural con «dijo», sin añadir matiz que el griego no exige.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a aquel hombre
  lexicon: BDAG
  rationale: El dativo pronominal se expresa con el complemento indirecto «le», que en español suena natural y evita sobreespecificar al destinatario.
- source_word: Ἀναστὰς
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Álzate
  lexicon: BDAG
  rationale: La forma participial con fuerza imperativa se vierte como mandato directo. «Levántate» conserva la concisión y la fuerza exhortativa del griego.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - anda
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι se expresa de modo idiomático en español con «vete», que transmite la acción de marcharse de manera natural y directa.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» es la equivalencia principal en español y preserva la amplitud semántica de πίστις; las alternativas quedan disponibles porque el contexto también permite el sentido de confianza.
- source_word: σέσωκέν
  english_pob_choice: has saved
  chosen_spanish: ha salvado
  alternatives_spanish:
  - te ha hecho bien
  - te ha sanado
  lexicon: BDAG
  rationale: Se mantiene el valor amplio de σῴζω con «ha salvado», en lugar de reducirlo a curación física. En español, este verbo conserva la tensión entre salvación y recuperación corporal.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El pronombre de objeto directo se rinde con «te», la forma normal y más fluida en español.
theological_decisions:
- issue: Alcance de σέσωκέν σε en un contexto de sanidad
  english_pob_reading: has saved you
  chosen_spanish_reading: te ha salvado
  alternative_spanish_readings:
  - te ha sanado
  - te ha hecho bien
  rationale: Se conserva la lectura amplia de σῴζω para no reducir la declaración a una mejora física. Así se mantiene la tensión narrativa entre la curación recibida y la salvación más plena sugerida por la respuesta de Jesús.
  doctrine_reference: 'Translation philosophy §3; términos en tensión: σῴζω / salvación y sanidad'
- issue: Valor de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: «Fe» es la forma estable y teológicamente transparente en español. Se preservan las alternativas porque el contexto puede implicar confianza personal en Jesús, sin borrar el término tradicional.
  doctrine_reference: Tabla de términos en tensión para πίστις
translation_notes:
  revision_awareness: No se requieren cambios respecto al último pase auditado; la decisión principal se mantiene en preservar el sentido amplio de σῴζω con una traducción española natural y no reductiva.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς cuando aparezca en el pasaje o contexto inmediato.
  - Se usa vocabulario bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Fe» se emplea como término principal, con alternativas registradas para la ambigüedad semántica de πίστις.
  - La nota al pie se ancla en «salvado» para reflejar la alternativa de sanidad sin alterar el texto principal.
