translation:
  language: es
  text: Y en aquellos tiempos no había paz para el que salía ni para el que entraba[b], porque muchos tumultos[a] estaban sobre todos los habitantes de las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tumultos» refleja el hebreo מְהוּמֹת; también puede entenderse como «perturbaciones», «confusiones» o «pánicos».
    reason: lexical_alternative
  - marker: b
    text: La expresión «el que sale y el que entra» es un modismo hebreo para el movimiento ordinario de la vida diaria, especialmente viaje o actividad pública.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָעִתִּים הָהֵם
  english_pob_choice: And in those times
  chosen_spanish: Y en aquellos tiempos
  alternatives_spanish:
  - Y en esos tiempos
  - Y en aquellos días
  lexicon: HALOT
  rationale: La expresión temporal introduce una situación histórica concreta; «aquellos tiempos» conserva el demonstrativo y suena natural en español.
- source_word: אֵין שָׁלוֹם
  english_pob_choice: there was no peace
  chosen_spanish: no había paz
  alternatives_spanish:
  - no había bienestar
  - no había seguridad
  lexicon: HALOT
  rationale: «Paz» mantiene el alcance amplio de שָׁלוֹם y funciona bien en el contexto de inestabilidad y peligro social.
- source_word: לַיּוֹצֵא וְלַבָּא
  english_pob_choice: for the one going out or for the one coming in
  chosen_spanish: para el que salía ni para el que entraba
  alternatives_spanish:
  - para el que salía y para el que entraba
  - para quienes salían y entraban
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y general; en español se mantiene con dos participios sustantivados, y la negación coordina naturalmente ambos miembros.
- source_word: מְהוּמֹת רַבּוֹת
  english_pob_choice: many disturbances
  chosen_spanish: muchas conmociones
  alternatives_spanish:
  - muchos tumultos
  - muchas perturbaciones
  - muchas confusiones
  lexicon: HALOT
  rationale: El hebreo puede denotar tumulto, confusión o pánico. «Conmociones» conserva fuerza y amplitud sin reducir el sentido a una sola matización.
- source_word: עַל כָּל יוֹשְׁבֵי הָאֲרָצוֹת
  english_pob_choice: were upon all the inhabitants of the lands
  chosen_spanish: estaban sobre todos los habitantes de las tierras
  alternatives_spanish:
  - caían sobre todos los habitantes de las tierras
  - pesaban sobre todos los habitantes de las tierras
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de algo que «está sobre» las personas. «Las tierras» refleja el plural hebreo y evita estrecharlo a un solo país.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. También se mantuvo la decisión de no suavizar la imagen hebrea de turbulencia generalizada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preservó la imagen espacial «sobre» para עַל, en vez de convertirla en una abstracción como «afectaban», para respetar el hebreo.
  - El plural hebreo «las tierras» se conservó en español para no singularizar indebidamente el referente.
