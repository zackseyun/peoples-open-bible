revisions:
- from: Subieron contra Judá e invadieron[a] la tierra, y se llevaron todas las posesiones halladas en la casa del rey, y también a sus hijos y a sus mujeres; de modo que no le quedó hijo, excepto Jehoahaz, el menor de sus hijos.
  to: Subieron contra Judá y la invadieron, y se llevaron todas las posesiones halladas en la casa del rey, y también a sus hijos y a sus mujeres; de modo que no le quedó hijo, excepto Joacaz[a], el menor de sus hijos.
  rationale: Se corrigió el anclaje de la nota para que recaiga sobre el nombre propio al que realmente explica. También se ajustó ‘Jehoahaz’ a la forma española ‘Joacaz’, más adecuada para una traducción bíblica en español y fiel a la decisión de conservar la lectura masorética en el texto principal. Finalmente, ‘invadieron la tierra’ se simplificó a ‘la invadieron’ para evitar añadir un sustantivo no expreso en el hebreo.
