translation:
  language: es
  text: 'Y ella dijo a su padre: «Que se haga para mí este asunto: déjame libre[a] por dos meses, para que pueda ir y vagar por los montes, y llorar por mi virginidad[b], yo y mis compañeras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «concédeme licencia» / «déjame en paz» por dos meses.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «llorar sobre mi virginidad»; el texto subraya su estado de no casada y sin hijos, sin resolver aquí la cuestión interpretativa más amplia del relato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעָשֶׂה לִּי הַדָּבָר הַזֶּה
  english_pob_choice: Let this thing be done for me
  chosen_spanish: Que se haga para mí este asunto
  alternatives_spanish:
  - Que se haga esto para mí
  - Concédeme esta petición
  lexicon: HALOT
  rationale: El nifal con valor jussivo se expresa naturalmente en español con «Que se haga». «Este asunto» conserva el demostrativo hebreo y evita sustituirlo por una paráfrasis más interpretativa como «petición».
- source_word: הַרְפֵּה מִמֶּנִּי
  english_pob_choice: leave me alone
  chosen_spanish: déjame libre
  alternatives_spanish:
  - déjame sola
  - déjame en paz
  - concédeme licencia
  lexicon: HALOT
  rationale: La petición idiomática de estar libre o ser dejado aparte se vierte con una expresión natural en español. «Déjame libre» mantiene la idea de separación temporal sin cargar el texto con un tono excesivamente coloquial.
- source_word: שְׁנַיִם חֳדָשִׁים
  english_pob_choice: two months
  chosen_spanish: por dos meses
  alternatives_spanish:
  - durante dos meses
  - dos meses
  lexicon: HALOT
  rationale: La duración temporal es directa; «por dos meses» es claro y idiomático en español.
- source_word: וְאֵלְכָה וְיָרַדְתִּי עַל הֶהָרִים
  english_pob_choice: that I may go and wander on the mountains
  chosen_spanish: para que pueda ir y vagar por los montes
  alternatives_spanish:
  - para que vaya y ande por los montes
  - para ir y recorrer los montes
  lexicon: HALOT
  rationale: Se preservan los dos verbos coordinados sin forzar un calco de «descender». La revisión inglesa ya entendía el giro como movimiento por la serranía; «vagar por los montes» comunica ese desplazamiento sin añadir más de lo que el hebreo permite.
- source_word: וְאֶבְכֶּה עַל בְּתוּלַי
  english_pob_choice: and weep over my virginity
  chosen_spanish: y lloraré sobre mi virginidad
  alternatives_spanish:
  - y lloraré por mi virginidad
  - y haré duelo por mi virginidad
  lexicon: HALOT
  rationale: Se mantiene el objeto explícito «mi virginidad», porque el hebreo lo hace. «Lloraré sobre» conserva el valor de lamento/duelo de בכה על sin resolver la tensión interpretativa del pasaje.
- source_word: אָנֹכִי וְרֵעוֹתָי
  english_pob_choice: I and my companions
  chosen_spanish: yo y mis compañeras
  alternatives_spanish:
  - yo y mis amigas
  - yo y mis acompañantes femeninas
  lexicon: HALOT
  rationale: El plural femenino del término exige una referencia femenina. «Compañeras» es fiel, digno y natural en español.
theological_decisions:
- issue: El lamento sobre la virginidad de la hija de Jefté
  english_pob_reading: The translation preserves the text's wording about mourning her virginity without resolving whether the broader narrative implies literal sacrifice, perpetual virginity, or both dimensions.
  chosen_spanish_reading: La traducción conserva el lamento por la virginidad sin decidir si el trasfondo narrativo apunta a sacrificio literal, virginidad perpetua o ambas dimensiones.
  alternative_spanish_readings:
  - Lamenta la cercanía de la muerte y la ausencia de descendencia
  - Lamenta una dedicación de por vida más que una muerte inminente
  rationale: El versículo enfatiza la virginidad de manera explícita y no nombra aquí la muerte. En fidelidad a la tensión reconocida por la POB, la redacción española no la resuelve mediante una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se evitó un calco de «go and go down» y se prefirió una formulación natural para el hebreo idiomático («ir y vagar por los montes»). También se mantuvo la formulación formal con «para que pueda» y el objeto explícito de «mi virginidad».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; en este versículo no aparece.
  - Se mantuvo «virginidad» para בְּתוּלַי, conforme al valor léxico documentado.
  - «Compañeras» refleja el femenino plural de רֵעוֹתָי.
  - Los corchetes de nota están anclados exactamente en el texto principal para evitar notas huérfanas.
