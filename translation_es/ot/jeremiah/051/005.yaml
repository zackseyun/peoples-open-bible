- from: Porque Israel y Judá no están huérfanos[a] de su Dios, de Yahvé de los Ejércitos[b], aunque su tierra está llena de culpa contra el Santo de Israel.
  to: Porque Israel y Judá no han quedado viudos[a] de su Dios, de Yahvé de los Ejércitos[b], aunque su tierra está llena de culpa contra el Santo de Israel.
  rationale: Se reemplaza «huérfanos» por «han quedado viudos» para preservar la metáfora conyugal de אַלְמָן, central en la evidencia fuente y en la decisión lexical auditada. Se conserva una nota alternativa más interpretativa («desamparados») por si el lector necesita apoyo semántico. También se corrige la nota sobre «Yahvé de los Ejércitos» para que aporte una alternativa tradicional real en vez de repetir el texto principal.
