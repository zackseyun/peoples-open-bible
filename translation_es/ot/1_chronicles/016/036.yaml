translation:
  language: es
  text: 'Bendito sea Yahvé[a], el Dios de Israel, de eternidad a eternidad. Entonces todo el pueblo dijo[b]: «¡Amén!» y alabó a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde la eternidad hasta la eternidad»; también puede entenderse «para siempre y para siempre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo compacto: «Amén, y alabanza a Yahvé» / «Amén, y alabaron a Yahvé»; aquí se refleja el sentido de la respuesta del pueblo en secuencia narrativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Sea bendito
  lexicon: HALOT
  rationale: La forma hebrea funciona en una fórmula doxológica; en español, «Bendito sea» conserva el tono litúrgico y la fuerza optativa/jussiva mejor que un simple adjetivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, según la pauta del proyecto, evitando la sustitución por un título genérico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La cadena constructa se expresa de manera directa y natural en español, manteniendo la identificación pactual de Yahvé con Israel.
- source_word: מִן הָעוֹלָם וְעַד הָעֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad hasta la eternidad
  alternatives_spanish:
  - de eternidad a eternidad
  - para siempre y para siempre
  - de siglo en siglo
  lexicon: HALOT
  rationale: «עוֹלָם» aquí indica duración sin límites en una fórmula de alabanza; «desde la eternidad hasta la eternidad» preserva el alcance temporal elevado sin reducirlo a una simple idea de duración indefinida.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La partícula narrativa introduce la respuesta del pueblo; «Entonces» mantiene la secuencia con naturalidad en español.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - la asamblea
  lexicon: HALOT
  rationale: «עָם» se refiere al grupo reunido; «todo el pueblo» es la forma más directa y reverente en español bíblico contemporáneo.
- source_word: אָמֵן
  english_pob_choice: Amen!
  chosen_spanish: ¡Amén!
  alternatives_spanish:
  - ¡Así sea!
  - ¡Verdaderamente!
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional, que funciona como respuesta congregacional reconocible y fiel al hebreo.
- source_word: וְהַלֵּל לַיהוָה
  english_pob_choice: and praised Yahweh
  chosen_spanish: y alabó a Yahvé
  alternatives_spanish:
  - y dio alabanza a Yahvé
  - 'y dijo: «¡Alaben a Yahvé!»'
  lexicon: HALOT
  rationale: La raíz הלל se traduce con «alabar»; en este contexto narrativo, la forma verbal española expresa adecuadamente la respuesta del pueblo sin forzar una cita independiente.
theological_decisions:
- issue: Nombre divino en traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa explícitamente יְהוָה; se preserva el nombre propio en vez de una sustitución titulada, conforme a la política del proyecto y al valor pactual del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de עוֹלָם
  english_pob_reading: from everlasting to everlasting
  chosen_spanish_reading: desde la eternidad hasta la eternidad
  alternative_spanish_readings:
  - de eternidad a eternidad
  - para siempre y para siempre
  rationale: La expresión hebrea comunica un horizonte ilimitado de tiempo en forma doxológica; la elección española conserva esa amplitud sin convertirla en una paráfrasis filosófica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
