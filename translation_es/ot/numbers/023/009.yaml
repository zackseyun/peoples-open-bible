revisions:
- from: Porque desde la cumbre de las peñas[a] lo veo, y desde los collados lo contemplo. Mira, un pueblo que habita aparte, y no es contado entre las naciones.
  to: Porque desde la cumbre de las peñas lo veo, y desde los collados lo contemplo. Mira, un pueblo que habita aparte, y no se cuenta[a] entre las naciones.
  rationale: Se cambia el cierre a «no se cuenta entre las naciones» para reflejar en el texto principal la lectura reflexiva/media elegida en el audit trail inglés para יִתְחַשָּׁב. Se traslada la lectura pasiva a nota, que es donde el POB conserva esa alternativa. Se elimina la nota menor sobre «peñas/rocas» para no desplazar la ambigüedad más significativa del verso.
