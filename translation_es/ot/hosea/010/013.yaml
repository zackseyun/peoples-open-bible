translation:
  language: es
  text: Ustedes han arado maldad; han segado injusticia; han comido el fruto de engaño[a], porque has confiado en tu camino[b], en la multitud de tus guerreros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘falsedad’ o ‘mentiras’ para ‘engaño’.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de verbos en plural (‘ustedes han arado / han segado / han comido’) a formas singulares (‘has confiado ... tu camino ... tus guerreros’), probablemente tratando a Israel como un singular colectivo.
    reason: cultural_note
  - marker: c
    text: O ‘tus hombres poderosos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲרַשְׁתֶּם
  english_pob_choice: you have plowed
  chosen_spanish: han arado
  alternatives_spanish:
  - han labrado
  - han cultivado
  lexicon: HALOT
  rationale: Se conserva la imagen agrícola literal de arar, que en español comunica bien la metáfora de sembrar y cosechar conducta moral. El perfecto hebreo se vierte con perfecto compuesto para mantener la fuerza acusatoria del contexto.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - impiedad
  - perversidad
  lexicon: HALOT
  rationale: ‘Maldad’ expresa el valor moral negativo de forma natural en español y encaja con la imagen de algo que se ‘ara’. ‘Perversidad’ sería más intenso, pero menos neutro; ‘impiedad’ introduciría un matiz religioso más específico que no exige el término hebreo.
- source_word: עַוְלָתָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: HALOT
  rationale: Se mantiene la distinción respecto de רֶשַׁע mediante ‘injusticia’, que conserva el matiz social/legal del término y armoniza con la metáfora de la cosecha moral.
- source_word: קְצַרְתֶּם
  english_pob_choice: you have reaped
  chosen_spanish: han segado
  alternatives_spanish:
  - han cosechado
  - han recogido
  lexicon: HALOT
  rationale: ‘Segar’ mantiene el paralelismo agrícola con ‘arar’ y ‘comer el fruto’, y es suficientemente natural en español bíblico sin caer en calco rígido.
- source_word: אֲכַלְתֶּם
  english_pob_choice: you have eaten
  chosen_spanish: han comido
  alternatives_spanish:
  - han devorado
  - han consumido
  lexicon: HALOT
  rationale: Se conserva el verbo básico ‘comer’ porque continúa la secuencia metafórica de cosecha y consumo. ‘Consumido’ sería más interpretativo.
- source_word: פְּרִי
  english_pob_choice: the fruit of
  chosen_spanish: el fruto de
  alternatives_spanish:
  - el producto de
  - la cosecha de
  lexicon: HALOT
  rationale: La construcción posesiva se reproduce de manera directa y transparente; ‘fruto de’ es idiomático en español y preserva la metáfora original.
- source_word: כָּחַשׁ
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - mentira
  - falseedad
  lexicon: HALOT
  rationale: ‘Engaño’ recoge bien el carácter de falsedad activa y resulta más natural en español que ‘falseedad’. Frente a ‘mentira’, mantiene un campo semántico más amplio, compatible con la noción de fraude o falsedad.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce de forma clara la causa de la denuncia. ‘Porque’ es la opción más directa y pública en español contemporáneo.
- source_word: בָטַחְתָּ
  english_pob_choice: you trusted
  chosen_spanish: has confiado
  alternatives_spanish:
  - has puesto tu confianza
  - has dependido
  lexicon: HALOT
  rationale: ‘Confiado’ reproduce el núcleo semántico de भरो/בטח con naturalidad en español. El perfecto compuesto mantiene la vividez del reproche, y la concordancia singular sigue el giro del hebreo que pasa de plural a singular en la segunda parte del verso.
- source_word: בְדַרְכְּךָ
  english_pob_choice: in your way
  chosen_spanish: en tu camino
  alternatives_spanish:
  - en tu senda
  - en tu proceder
  lexicon: HALOT
  rationale: ‘Camino’ conserva la metáfora hebrea de conducta o curso de vida; ‘proceder’ explicaría el sentido, pero debilitaría la imagen textual.
- source_word: בְּרֹב
  english_pob_choice: in the multitude of
  chosen_spanish: en la multitud de
  alternatives_spanish:
  - en la abundancia de
  - por la multitud de
  lexicon: HALOT
  rationale: Se mantiene la construcción cuantitativa del hebreo. ‘Multitud’ funciona de forma natural en español y preserva la idea de número como objeto de confianza.
- source_word: גִּבּוֹרֶיךָ
  english_pob_choice: your warriors
  chosen_spanish: tus guerreros
  alternatives_spanish:
  - tus valientes
  - tus hombres poderosos
  lexicon: HALOT
  rationale: ‘Guerreros’ comunica en español moderno el sentido de fuerza militar del término sin recurrir a una expresión demasiado arcaica. Mantiene el enfoque en el apoyo bélico en el que Israel confió.
theological_decisions:
- issue: 'Cambio de número en la dirección del discurso: de plural a singular'
  english_pob_reading: The Hebrew shifts from plural verbs ('you have plowed/reaped/eaten') to singular forms ('you trusted ... your way ... your warriors'), likely addressing Israel as a collective singular.
  chosen_spanish_reading: Se traduce con ‘han arado / han segado / han comido’ y luego ‘has confiado / tu camino / tus guerreros’, dejando visible en la sintaxis española el paso del plural al singular.
  alternative_spanish_readings:
  - 'Uniformar todo en singular: ‘has arado... has segado... has comido... porque has confiado...’'
  - 'Uniformar todo en plural: ‘han confiado... su camino... sus guerreros...’'
  rationale: 'El hebreo conserva una oscilación retórica importante. En español se puede reproducir sin explicación intrusiva: el contraste entre ‘han’ y ‘has’ mantiene la tensión textual y evita aplanarla.'
  doctrine_reference: Principio de fidelidad textual y preservación de rasgos discursivos del original.
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso de la edición inglesa POB y no introduce revisiones posteriores; se mantiene la lectura altamente concordante del pasaje, con la misma tensión léxica entre ‘deceit/engaño’ y el cambio de número en el discurso.
  spanish_consistency_notes:
  - 'Se preserva la metáfora agrícola completa: arar, segar, comer, fruto.'
  - Se evita el calco eclesiástico ‘SEÑOR’ porque este verso no contiene el nombre divino.
  - ‘Guerreros’ se usa de manera consistente para el campo semántico militar de גִּבּוֹרִים.
  - Las notas mantienen alternativas reales en español sin diluir la opción principal.
  - La puntuación con punto y coma refleja la progresión paralela del hebreo.
