  glossary_alignment: No hay conflicto con la terminología base del proyecto. «juzgará», «naciones», «cadáveres» y «aplastará» concuerdan con las decisiones léxicas documentadas. Se preserva correctamente «la cabeza» en singular y no se introduce una resolución teológica indebida.
