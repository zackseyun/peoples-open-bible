translation:
  language: es
  text: 'Hizo un voto y dijo: «Yahvé de los ejércitos, si de veras miras la aflicción de tu sierva, y te acuerdas de mí, y no olvidas a tu sierva, sino que le das a tu sierva un hijo varón[a], entonces yo se lo daré a Yahvé todos los días de su vida[b], y no pasará navaja sobre su cabeza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «descendencia/semilla de varones», un giro idiomático que aquí significa un hijo varón.'
    reason: lexical_alternative
  - marker: b
    text: La frase de que «no pasará navaja sobre su cabeza» evoca la consagración especial asociada con un voto nazareo; el texto, sin embargo, expresa explícitamente la prohibición del cabello sin usar ese rótulo.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּדֹּר נֶדֶר
  english_pob_choice: She made a vow
  chosen_spanish: Hizo un voto
  alternatives_spanish:
  - Votó un voto
  - Hizo un juramento
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva con cognado ('votó un voto'). En español, 'hizo un voto' comunica la acción formal sin sonar forzado; 'juramento' sería menos preciso porque el texto habla de un voto, no necesariamente de un juramento.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé Todopoderoso
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el estándar del proyecto, y צְבָאוֹת se rinde por su valor de 'hosts/ejércitos'. 'De los ejércitos' es claro en español moderno y mantiene el matiz de poder y majestad.
- source_word: אִם רָאֹה תִרְאֶה
  english_pob_choice: if you will indeed look on
  chosen_spanish: si de veras miras
  alternatives_spanish:
  - si ciertamente miras
  - si realmente miras
  lexicon: HALOT
  rationale: La infinitiva absoluta con verbo finito intensifica la acción. 'De veras' comunica esa intensidad en un español natural, sin perder la idea de una mirada atenta y efectiva.
- source_word: בָּעֳנִי
  english_pob_choice: the affliction
  chosen_spanish: la aflicción
  alternatives_spanish:
  - la miseria
  - la humillación
  lexicon: HALOT
  rationale: '''Aflicción'' abarca sufrimiento y abatimiento social; es el equivalente más estable para עֳנִי en este contexto de oración.'
- source_word: אֲמָתֶךָ / לַאֲמָתְךָ
  english_pob_choice: your female servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  lexicon: HALOT
  rationale: Aunque el término puede ser 'sierva' o 'esclava', aquí la fórmula de humildad en oración en español se expresa con 'sierva', que mantiene dignidad y claridad. Se evita 'criada' por rebajar el registro y 'esclava' por sonar más duro de lo que el uso devocional español normalmente exige en esta forma.
- source_word: וּזְכַרְתַּנִי
  english_pob_choice: remember me
  chosen_spanish: te acuerdas de mí
  alternatives_spanish:
  - me recuerdas
  - te acuerdas de mí
  lexicon: HALOT
  rationale: '''Acordarse de mí'' expresa con naturalidad el valor peticional y relacional del hebreo. Además, encaja con el paralelismo del versículo y con el tono de súplica.'
- source_word: וְלֹא תִשְׁכַּח אֶת אֲמָתֶךָ
  english_pob_choice: and not forget your female servant
  chosen_spanish: y no olvidas a tu sierva
  alternatives_spanish:
  - y no te olvidas de tu sierva
  - y no olvides a tu sierva
  lexicon: HALOT
  rationale: Mantiene el paralelismo con 'te acuerdas de mí' y conserva el valor de petición continua. El presente de cortesía/posibilidad en español funciona bien para el ruego implícito del hebreo.
- source_word: וְנָתַתָּה לַאֲמָתְךָ זֶרַע אֲנָשִׁים
  english_pob_choice: but give your female servant a male child
  chosen_spanish: sino que le das a tu sierva descendencia masculina
  alternatives_spanish:
  - sino que le das a tu sierva un hijo varón
  - sino que le das a tu sierva simiente de varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'semilla/descendencia de varones'. Se evita reducirlo de entrada a 'hijo' para no borrar el giro idiomático; 'descendencia masculina' conserva el sentido y el carácter algo marcado de la expresión. 'Sino que' refleja la corrección adversativa del contexto.
- source_word: וּנְתַתִּיו לַיהוָה
  english_pob_choice: then I will give him to Yahweh
  chosen_spanish: entonces yo se lo daré a Yahvé
  alternatives_spanish:
  - entonces lo dedicaré a Yahvé
  - entonces lo entregaré a Yahvé
  lexicon: HALOT
  rationale: '''Dar'' reproduce mejor el verbo hebreo y evita introducir ''dedicar'', que sería interpretativo. El clítico ''se lo'' expresa de forma natural la entrega a Yahvé.'
- source_word: כָּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - por toda su vida
  - mientras viva
  lexicon: HALOT
  rationale: Es la equivalencia española directa y formal, preservando la totalidad y duración del voto.
- source_word: וּמוֹרָה לֹא יַעֲלֶה עַל רֹאשׁוֹ
  english_pob_choice: and no razor shall come upon his head
  chosen_spanish: y navaja no subirá sobre su cabeza
  alternatives_spanish:
  - y no pasará navaja sobre su cabeza
  - y no le tocará navaja la cabeza
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de 'subir sobre la cabeza' y se usa 'navaja' como posible sentido de מוֹרָה en contexto. La formulación conserva la restricción concreta del texto sin añadir el rótulo 'nazireo' al cuerpo principal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto requiere traducir el Tetragrámaton como 'Yahvé'. Se preserva así el nombre del pacto en vez de enmascararlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Possible Nazirite resonance of the razor prohibition
  english_pob_reading: Retain the concrete vow language without importing the label 'Nazirite' into the main text
  chosen_spanish_reading: Mantener la prohibición concreta de la navaja sin introducir el rótulo 'nazireo'
  alternative_spanish_readings:
  - Declarar explícitamente que era un nazareo/nazireo
  - Traducir de manera más explicativa el voto
  rationale: El versículo describe la prohibición y la dedicación de por vida, pero no nombra la institución. El texto principal conserva esa prudencia; la resonancia cultural queda para la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El borrador sigue el pase más reciente sin cambios sustantivos. Se mantiene la lectura de 'Yahvé', la petición intensiva de mirada y recuerdo, la expresión idiomática de 'descendencia masculina', y la prohibición concreta de la navaja sin importar el término 'nazireo' al texto principal.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה en todo el versículo.
  - '''Tu sierva'' se usa consistentemente para אֲמָתֶךָ / לַאֲמָתְךָ, evitando alternar con ''esclava'' en el cuerpo principal.'
  - La intensificación hebrea de רָאֹה תִרְאֶה se refleja con 'si de veras'.
  - El paralelismo peticional 'te acuerdas de mí / no olvidas a tu sierva' se mantiene en español.
  - El cierre conserva la imagen corporal 'navaja no subirá sobre su cabeza' en vez de sustituirla por una paráfrasis más explícita.
