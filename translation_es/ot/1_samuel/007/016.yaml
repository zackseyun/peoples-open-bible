translation:
  language: es
  text: Y él iba[a] año tras año y recorría Betel, Gilgal y Mizpa[b], y juzgaba a Israel en todos estos lugares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de año en año» o «cada año».
    reason: lexical_alternative
  - marker: b
    text: O «recorrer»; el hebreo sugiere hacer un circuito regular entre estas ciudades.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלַךְ
  english_pob_choice: he would go
  chosen_spanish: iba
  alternatives_spanish:
  - iría
  - solía ir
  lexicon: HALOT
  rationale: El hebreo expresa acción habitual en pasado con valor iterativo; en español, «iba» comunica esa costumbre de manera natural. «Solía ir» también sería posible, pero «iba» conserva mejor la fluidez del ritmo narrativo.
- source_word: מִדֵּי שָׁנָה בְּשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - de año en año
  - cada año
  lexicon: HALOT
  rationale: La expresión idiomática denota recurrencia anual. «Año tras año» reproduce bien el sentido repetitivo y suena idiomático en español.
- source_word: וְסָבַב
  english_pob_choice: make the circuit of
  chosen_spanish: recorría
  alternatives_spanish:
  - daba la vuelta por
  - andaba por un circuito entre
  lexicon: HALOT
  rationale: Aquí סבב describe una ruta regular entre varias localidades. «Recorría» transmite esa idea de itinerario establecido sin sonar forzado en español. Se conserva la noción de desplazamiento continuo sin reducirla a un simple «ir alrededor».
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: HALOT
  rationale: Se usa la forma habitual en español para el topónimo.
- source_word: הַגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  lexicon: HALOT
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: הַמִּצְפָּה
  english_pob_choice: Mizpah
  chosen_spanish: Mizpa
  alternatives_spanish:
  - Mizpe
  lexicon: HALOT
  rationale: Se adopta la forma usual en español de este topónimo.
- source_word: וְשָׁפַט
  english_pob_choice: he judged
  chosen_spanish: juzgaba
  alternatives_spanish:
  - administraba justicia a
  - gobernaba
  lexicon: HALOT
  rationale: שפט en este contexto incluye función judicial y liderazgo. «Juzgaba» mantiene el vínculo léxico directo con el hebreo y permite que el trasfondo de autoridad judicial quede implícito.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  - sobre Israel
  lexicon: HALOT
  rationale: El objeto directo es la nación/pueblo de Israel. En español, la preposición «a» marca el complemento personal del verbo «juzgar».
- source_word: אֵת כָּל הַמְּקוֹמֹות הָאֵלֶּה
  english_pob_choice: in all these places
  chosen_spanish: en todos estos lugares
  alternatives_spanish:
  - en todos estos sitios
  - por todos estos lugares
  lexicon: HALOT
  rationale: La frase funciona adverbialmente, indicando los lugares donde ejercía su juicio. «En todos estos lugares» es claro y natural en español, y conserva el valor locativo del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios respecto del estado previo; se mantiene el acuerdo alto con la fuente y la solución optativa-equivalente ya establecida.
  spanish_consistency_notes:
  - Se conserva el tiempo imperfecto para expresar hábito iterativo en pasado.
  - 'Los nombres propios se mantienen en formas españolas estándar: Betel, Gilgal, Mizpa.'
  - Se preserva la ambigüedad funcional de שפט como acción judicial con dimensión de gobierno, sin expandirla más allá de lo que el contexto exige.
