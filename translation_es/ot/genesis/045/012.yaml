translation:
  language: es
  text: Y miren[a], sus ojos ven, y los ojos de mi hermano Benjamín, que mi propia boca es la que les habla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Miren» traduce el valor enfático de וְהִנֵּה; también podría verterse más formalmente como «He aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: ¡Y miren[a]!
  alternatives_spanish:
  - Y vean
  - He aquí
  - Y miren
  lexicon: HALOT
  rationale: La expresión introduce atención enfática y deíctica. «Miren» comunica esa llamada directa en un español moderno y digno; el añadido de exclamación reproduce la fuerza discursiva sin volver el texto arcaico.
- source_word: עֵינֵיכֶם
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - ustedes mismos
  - sus miradas
  lexicon: HALOT
  rationale: Se conserva el sustantivo corporal explícito, porque el hebreo subraya la evidencia visual directa. «Sus ojos» mantiene esa concreción y el paralelismo con «los ojos de mi hermano Benjamín».
- source_word: רֹאוֹת
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - están viendo
  - pueden ver
  lexicon: HALOT
  rationale: El participio presenta una percepción actual. «Ven» comunica naturalmente esa acción presente en español sin sobrecargar el aspecto.
- source_word: וְעֵינֵי אָחִי בִנְיָמִין
  english_pob_choice: and the eyes of my brother Benjamin
  chosen_spanish: y también los ojos de mi hermano Benjamín
  alternatives_spanish:
  - y los ojos de mi hermano Benjamín
  - y también los ojos de mi hermano Benjamín
  lexicon: HALOT
  rationale: Se conserva la estructura paralela con «sus ojos» y la identificación apposicional de Benjamín como hermano de José. «También» ayuda a reflejar el encadenamiento enfático del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que confirman sus ojos. En español, «que» es la forma más natural y fiel para abrir la oración explicativa.
- source_word: פִי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mis propias palabras
  - mi boca misma
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi boca». En español, «mi boca» conserva la imagen concreta y el énfasis en la presencia personal de José hablando directamente.
- source_word: הַמְדַבֵּר אֲלֵיכֶם
  english_pob_choice: speaking to you
  chosen_spanish: la que les habla
  alternatives_spanish:
  - la que está hablándoles
  - que les está hablando
  - hablando con ustedes
  lexicon: HALOT
  rationale: 'El participio con artículo funciona sustantivamente. En español, el relativo femenino singular concuerda con «boca» y mantiene la idea: es precisamente su boca la que les habla. Esto preserva el sentido del original sin una construcción forzada.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se mantiene la fuerza deíctica de וְהִנֵּה, el paralelismo entre «sus ojos» y «los ojos de mi hermano Benjamín», y el énfasis concreto de «mi boca». Frente al inglés, se optó por una construcción española natural («la que les habla») para reflejar el participio sustantivado sin perder la transparencia del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «Benjamín» con ortografía española estándar.
  - No se introdujo «Cristo/Mesías» ni terminología doctrinal ajena al pasaje.
  - La puntuación busca reproducir la pausa enfática del hebreo y la fluidez del español publicado.
