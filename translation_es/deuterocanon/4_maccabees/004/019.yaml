translation:
  language: es
  text: de modo que no solo edificó un gimnasio en la misma ciudadela[a] de nuestra patria, sino que también abolió la tutela[b] del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Acra», si ἄκρα se entiende como el nombre específico de la ciudadela de Jerusalén y no solo como «ciudadela».
    reason: alternative_reading
  - marker: b
    text: O «la custodia/supervisión del templo» o «el cuidado del templo». El griego habla de abolir su administración custodial, no de derribar el templo mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: LSJ
  rationale: Conserva el valor consecutivo/resultativo de la construcción sin forzar una conclusión lógica más fuerte que la del griego.
- source_word: μὴ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino que también
  alternatives_spanish:
  - no meramente ... sino incluso
  - no solo ... pero también
  lexicon: LSJ
  rationale: Reproduce la correlación retórica natural en español y mantiene el énfasis balanceado del original.
- source_word: ἐπʼ αὐτῇ τῇ ἄκρᾳ
  english_pob_choice: at the very citadel
  chosen_spanish: en la misma ciudadela
  alternatives_spanish:
  - en la misma acrópolis
  - en la misma altura fortificada
  lexicon: LSJ
  rationale: '"Ciudadela" comunica la idea de fortaleza elevada y urbana. Se evita fijar de entrada el nombre técnico "Acra" en el texto principal, aunque se deja abierta la alternativa histórica en nota.'
- source_word: τῆς πατρίδος ἡμῶν
  english_pob_choice: of our homeland
  chosen_spanish: de nuestra patria
  alternatives_spanish:
  - de nuestra tierra natal
  - de nuestro país
  lexicon: LSJ
  rationale: '"Patria" conserva el matiz ancestral y cívico de πατρίς mejor que opciones más modernas o más geográficas.'
- source_word: γυμνάσιον
  english_pob_choice: gymnasium
  chosen_spanish: gimnasio
  alternatives_spanish:
  - escuela gimnástica
  - institución gimnásica
  lexicon: LSJ
  rationale: En este contexto helenístico, el término designa la institución cultural concreta; "gimnasio" es la forma española más transparente y reconocible, aunque conserva la carga histórica del préstamo.
- source_word: κατασκευάσαι
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - erigió
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa la acción de hacer/levantar una construcción; "edificó" suena natural en español y mantiene el sentido de construir una obra institucional.
- source_word: καταλῦσαι
  english_pob_choice: abolished
  chosen_spanish: abolió
  alternatives_spanish:
  - suprimió
  - derribó
  - desmanteló
  lexicon: LSJ
  rationale: El objeto es una disposición institucional, no el edificio del templo; "abolió" conserva la fuerza de anular o derogar una tutela administrativa.
- source_word: κηδεμονίαν
  english_pob_choice: guardianship
  chosen_spanish: tutela
  alternatives_spanish:
  - guarda
  - custodia
  - administración tutelar
  lexicon: LSJ
  rationale: '"Tutela" expresa bien la idea de cuidado/autoridad protectora sobre algo encomendado. En español evita sonar demasiado técnico y mantiene el matiz institucional de la palabra griega.'
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  lexicon: LSJ
  rationale: '"Templo" es la equivalencia más clara para ἱερόν en este contexto, sin añadir interpretaciones que el texto no especifica.'
theological_decisions:
- issue: ἄκρα como descripción común o como nombre histórico técnico
  english_pob_reading: rendered descriptively as 'citadel' rather than transliterated as 'Acra'
  chosen_spanish_reading: '"ciudadela" en el texto principal, con posibilidad de leerlo como el Acra histórico'
  alternative_spanish_readings:
  - '"Acra"'
  - '"acrópolis"'
  rationale: El griego admite tanto una descripción general como una referencia específica a la fortaleza de Jerusalén. El texto principal prioriza inteligibilidad, pero la nota preserva la alternativa histórica sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy: preserve historical and lexical tension rather than over-specifying place-identifications.'
- issue: κηδεμονίαν τοῦ ἱεροῦ como estructura administrativa y no destrucción material
  english_pob_reading: '''the guardianship of the temple'' as an institutional oversight that was abolished'
  chosen_spanish_reading: '"la tutela del templo" como autoridad/custodia institucional abolida'
  alternative_spanish_readings:
  - '"la custodia del templo"'
  - '"la administración del templo"'
  - '"el cuidado del templo"'
  rationale: El griego apunta a la supresión de una función de custodia u organización vinculada al templo, no a su demolición. "Tutela" mantiene esa tensión y evita desplazar el sentido hacia la destrucción física.
  doctrine_reference: 'Translation philosophy: preserve the institutional force of the source without importing a stronger claim than the text states.'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del auditor inglés, que no registró cambios adicionales tras la última revisión; la traducción española conserva la ambigüedad histórica de ἄκρα y la fuerza institucional de κηδεμονίαν sin ampliarlas más allá del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» y demás terminología estándar del proyecto, aunque este versículo no los contiene.
  - Se prefirió «tutela» frente a «guardianship» literal para evitar un calco torpe y mantener la función administrativa del término.
  - Se usó «edificó» como verbo natural en español para el aoristo infinitivo de construcción, sin convertirlo en presente narrativo.
