translation:
  language: es
  text: 'Y ambos soñaron un sueño[a], cada hombre su propio sueño, en una misma noche, cada uno según la interpretación de su sueño: el copero y el panadero, que pertenecían al rey de Egipto[c], que estaban presos en la casa de la cárcel[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: «y ambos tuvieron un sueño... en la misma noche». El hebreo usa una construcción cognada, literalmente «soñaron un sueño», y una expresión temporal literalmente «en una noche».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que servían al rey de Egipto». El hebreo puede expresar pertenencia o vinculación oficial al servicio del rey.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «en la prisión». El hebreo dice literalmente «en la casa de la cárcel», una expresión compuesta que conserva mejor el sabor del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחַלְמוּ חֲלוֹם
  english_pob_choice: dreamed a dream
  chosen_spanish: soñaron un sueño
  alternatives_spanish:
  - tuvieron un sueño
  - soñaron
  lexicon: HALOT
  rationale: Conservo la construcción cognada verbo + sustantivo para reflejar el énfasis hebreo. «Soñaron un sueño» suena natural en español y preserva mejor la textura del original que simplificar a solo «tuvieron un sueño».
- source_word: שְׁנֵיהֶם
  english_pob_choice: the two of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos de ellos
  lexicon: HALOT
  rationale: «Ambos» transmite de forma clara y natural el valor dual de la forma hebrea, sin perder la referencia a dos personas concretas.
- source_word: אִישׁ חֲלֹמוֹ
  english_pob_choice: each man his own dream
  chosen_spanish: cada hombre su propio sueño
  alternatives_spanish:
  - cada uno su propio sueño
  - cada hombre su sueño
  lexicon: HALOT
  rationale: Mantiene el distributivo de אִישׁ ... אִישׁ y el vínculo posesivo con חֲלֹמוֹ. «Hombre» aquí es específico de los dos oficiales varones, no genérico.
- source_word: בְּלַיְלָה אֶחָד
  english_pob_choice: in one night
  chosen_spanish: en una sola noche
  alternatives_spanish:
  - en una noche
  - la misma noche
  lexicon: HALOT
  rationale: «En una sola noche» reproduce bien la frase temporal hebrea y conserva la idea de simultaneidad sin añadir interpretación.
- source_word: אִישׁ כְּפִתְרוֹן חֲלֹמוֹ
  english_pob_choice: each according to the interpretation of his dream
  chosen_spanish: cada uno según la interpretación de su sueño
  alternatives_spanish:
  - cada uno con la interpretación de su sueño
  - cada sueño con su interpretación
  lexicon: HALOT
  rationale: La preposición כְ expresa correspondencia. «Según la interpretación de su sueño» conserva esa relación de ajuste entre sueño e interpretación.
- source_word: הַמַּשְׁקֶה
  english_pob_choice: the cupbearer
  chosen_spanish: el copero
  alternatives_spanish:
  - el servidor de la copa
  - el mayordomo del vino
  lexicon: HALOT
  rationale: «Copero» es el equivalente español más directo y natural para el oficial de bebidas de la corte.
- source_word: הָאֹפֶה
  english_pob_choice: the baker
  chosen_spanish: el panadero
  alternatives_spanish:
  - el repostero
  lexicon: HALOT
  rationale: «Panadero» es el equivalente directo y claro del participio sustantivado hebreo.
- source_word: אֲשֶׁר לְמֶלֶךְ מִצְרַיִם
  english_pob_choice: who belonged to the king of Egypt
  chosen_spanish: que pertenecían al rey de Egipto
  alternatives_spanish:
  - que servían al rey de Egipto
  - que estaban al servicio del rey de Egipto
  lexicon: HALOT
  rationale: El לְ indica relación o pertenencia oficial. «Pertenecían» conserva esa afiliación sin forzar una especificación funcional que el hebreo no exige aquí.
- source_word: אֲסוּרִים
  english_pob_choice: were confined
  chosen_spanish: encerrados
  alternatives_spanish:
  - confinados
  - presos
  lexicon: HALOT
  rationale: El participio pasivo de אסר puede ser «atados»/«encarcelados». En español, «encerrados» comunica bien la custodia carcelaria y fluye mejor con la frase siguiente.
- source_word: בֵּית הַסֹּהַר
  english_pob_choice: the prison house
  chosen_spanish: la casa de la cárcel
  alternatives_spanish:
  - la cárcel
  - la prisión
  lexicon: HALOT
  rationale: Conservo el matiz compuesto de «house of confinement». «La casa de la cárcel» refleja más de cerca la forma hebrea que un simple «cárcel».
translation_notes:
  revision_awareness: Tomé en cuenta el ajuste del audit trail inglés que prefiere la estructura participial final («confined») para evitar una cadena pesada de relativas. En español opté por «encerrados» como participio final, que conserva la función del participio hebreo אֲסוּרִים y evita recargar la cláusula con dos relativos seguidos. También mantuve la correspondencia distributiva de «cada uno» para reflejar la repetición de אִישׁ.
  spanish_consistency_notes:
  - Usé «Yahvé» no aplica aquí.
  - Mantuve «copero» y «panadero» como términos de oficio, sin añadir «principal» porque no está en el versículo.
  - Conservé el paralelismo cognado «soñaron un sueño» para reflejar el hebreo.
  - Preferí «casa de la cárcel» para conservar el sabor del compuesto בֵּית הַסֹּהַר.
