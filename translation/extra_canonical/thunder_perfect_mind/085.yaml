translation:
  text: 'Vision and self-control

    of the heart[a], existing within me—

    I am the hearing that is attainable to everyone[d][c][b],

    and the speech that cannot be grasped.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some render the opening as “a lamp of the heart,” but the OCR here reads
      Greek loans ϩⲟⲣⲁⲥⲓⲥ (vision) and ⲧⲉⲅⲕⲣⲁⲧⲓⲁ (self-control).
    reason: lexical_alternative
  - marker: b
    text: The phrase translated “that is attainable” (ⲉⲧϣⲏⲡ) may mean “that is available/comes
      to,” expressing ease of access rather than human achievement.
    reason: lexical_alternative
  - marker: c
    text: “Cannot be grasped” could also be “cannot be comprehended,” since the verb
      can carry both physical and cognitive senses.
    reason: lexical_alternative
  - marker: d
    text: Or 'of the heart that is within me—'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϩⲟⲣⲁⲥⲓⲥ
  chosen: vision
  alternatives:
  - sight
  - seeing
  lexicon: Greek loan in Coptic (horasis)
  rationale: Standard meaning “vision/sight”; preserves abstract, inner-perceptive
    sense fitting the heart context.
- source_word: ⲧⲉⲅⲕⲣⲁⲧⲓⲁ
  chosen: self-control
  alternatives:
  - restraint
  - temperance
  lexicon: Greek loan (enkrateia)
  rationale: Common rendering of ἐγκράτεια in Koine; “self-control” reads clearly
    in modern English without moralizing shift of “temperance.”
- source_word: ⲙⲫⲏⲧ
  chosen: of the heart
  alternatives:
  - in the heart
  - heart’s
  lexicon: Sahidic Coptic ⲡⲏⲧ/ⲫⲏⲧ = heart; m- = genitive/locative
  rationale: m- here best as genitival “of,” with locative nuance supplied by the
    following ⲛϩⲏⲧ; keeps the close bond to “heart.”
- source_word: ⲉⲥϣⲟⲟⲡ
  chosen: that is present
  alternatives:
  - that exists
  - that dwells
  lexicon: Coptic ϣⲟⲟⲡ = be, exist, be present
  rationale: Relative clause marker ⲉ- + ϣⲟⲟⲡ; “present” fits idiomatic English and
    the interior setting.
- source_word: ⲛϩⲏⲧ ⲁⲛⲟⲕ
  chosen: within me
  alternatives:
  - within (me)
  - inside me
  lexicon: Coptic ⲛϩⲏⲧ = inside/within; ⲁⲛⲟⲕ = I (independent pronoun)
  rationale: Read as prepositional phrase with independent pronoun; yields coherent
    sense “within me,” though construction is somewhat marked.
- source_word: ⲡⲥⲱⲧⲙ
  chosen: the hearing
  alternatives:
  - the listening
  - obedience
  lexicon: Coptic ⲥⲱⲧⲙ = hear; nominal ⲡⲥⲱⲧⲙ = hearing
  rationale: Retains the concrete sense needed for the paradox with “speech”; “obedience”
    would shift the semantic field.
- source_word: ⲉⲧϣⲏⲡ
  chosen: that is attainable
  alternatives:
  - that is available
  - that happens (to)
  - that comes to
  lexicon: Contextual; cf. Thunder tradition; ϣⲏⲡ has nuance of ease/possibility/approachability
    in some dialectal usage
  rationale: Parallels the well-attested line “hearing ... attainable to all”; chosen
    for idiomatic clarity while marking uncertainty.
- source_word: ⲛⲟⲩⲟⲛ ⲛⲓⲙ
  chosen: to everyone
  alternatives:
  - to all people
  - for all
  lexicon: Coptic expression for universality (“everyone/all”)
  rationale: Conveys universal scope in smooth English.
- source_word: ⲡϣⲁϫⲉ
  chosen: the speech
  alternatives:
  - the word
  - the utterance
  lexicon: Coptic ⲥⲁϫⲉ = speak; ⲡϣⲁϫⲉ = speech/word
  rationale: “Speech” pairs naturally with “hearing”; “word” could narrow to a single
    item.
- source_word: ⲉⲧⲉ ⲙⲁⲧϣⲉ
  chosen: that cannot be grasped
  alternatives:
  - that cannot be comprehended
  - that cannot be seized
  lexicon: Negated relative; ϣⲉ with nuance of seizing/understanding in Thunder’s
    paradox; ⲙⲁ- = negation in relative construction
  rationale: “Grasped” preserves the bodily-cognitive double sense fitting the poem’s
    paradoxes.
parallelism_check: 'This block preserves the deliberate paradox: “the hearing that
  is attainable to everyone” is set against “the speech that cannot be grasped.” The
  pairing (hearing/speech; accessible/ungraspable) remains intact and antithetical.
  Initial nominal phrase (“Vision and self-control of the heart that is within me”)
  stands as a preparatory identification linked to the speaker, maintaining the catalog-like
  cadence found elsewhere in Thunder.'
voice_check: The authoritative first-person voice is explicit in “I am the hearing...,”
  and the prior clause anchors “vision and self-control” within the speaker (“within
  me”). I avoided smoothing or recasting into third person and retained the stark
  “I am” formulation where present.
alignment_risk_note: 'Overall alignment is medium. Key uncertainties: (1) Reading
  ⲛϩⲏⲧ ⲁⲛⲟⲕ as “within me” is plausible but syntactically marked; it could alternatively
  be construed as “within (the heart)” without specifying the pronoun. (2) The gloss
  of ⲉⲧϣⲏⲡ as “attainable” follows common Thunder renderings but the underlying semantic
  range is debated; it could indicate availability or occurrence (“that happens to
  all”). (3) Line breaks may conflate “ⲛⲟⲩⲟⲛ ⲛⲓⲙ” (everyone) with the following ⲙⲛ
  (“and”) introducing “speech,” but the overall sense remains the well-known paradox
  pair.'
