theological_decisions:
- issue: Nature of exclusion from priestly role
  chosen_reading: excluded from serving as priests pending lack of genealogical proof
  alternative_readings:
  - excluded from the priesthood in an absolute sense
  rationale: The verse describes an administrative-genealogical disqualification, not a doctrinal statement about priesthood in general. Rendering the infinitive as service language preserves the procedural force of the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
