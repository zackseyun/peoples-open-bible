translation:
  language: es
  text: 'Y pondré sobre ellos cuatro clases[a], declara Yahvé: la espada para matar, los perros para arrastrar, y las aves de los cielos[b] y las bestias de la tierra para devorar y destruir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuatro familias/clanes»; aquí el término se usa figuradamente para cuatro categorías de agentes de juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las aves del cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will appoint over
  chosen_spanish: pondré sobre
  alternatives_spanish:
  - nombraré sobre
  - encargaré sobre
  - visitaré sobre
  lexicon: HALOT
  rationale: פקד tiene un rango amplio que incluye atender, poner al frente, encomendar y castigar. En este contexto de juicio con agentes enumerados, «pondré sobre» conserva la idea de asignación/colocación sobre ellos sin forzar un verbo exclusivamente punitivo.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - sobre ellos mismos
  lexicon: HALOT
  rationale: La preposición עַל puede ser «sobre», «contra» o «encima de». «Sobre ellos» mantiene la relación de autoridad o designación que el contexto exige.
- source_word: אַרְבַּע מִשְׁפָּחוֹת
  english_pob_choice: four kinds
  chosen_spanish: cuatro clases
  alternatives_spanish:
  - cuatro familias
  - cuatro clanes
  - cuatro grupos
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת literalmente significa familias o clanes, pero aquí funciona figuradamente para cuatro categorías de agentes de juicio. «Clases» comunica bien el valor clasificatorio en español, sin ocultar la figura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en la forma establecida para este proyecto: «Yahvé», en lugar de sustituirlo por un título. Así se mantiene la referencia directa al Tetragrámaton.'
- source_word: הַחֶרֶב לַהֲרֹג
  english_pob_choice: the sword to kill
  chosen_spanish: la espada para matar
  alternatives_spanish:
  - la espada para asesinar
  - la espada para herir de muerte
  lexicon: HALOT
  rationale: El infinitivo de propósito se traduce de manera directa y natural. «Matar» es claro y fiel al valor básico aquí, sin intensificar más allá del hebreo.
- source_word: הַכְּלָבִים לִסְחֹב
  english_pob_choice: the dogs to drag away
  chosen_spanish: los perros para arrastrar
  alternatives_spanish:
  - los perros para llevarse
  - los perros para jalar
  lexicon: HALOT
  rationale: סחב significa arrastrar, tirar o llevar a rastras. «Arrastrar» conserva la viveza del escenario de juicio y corresponde bien al uso de perros carroñeros.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  lexicon: HALOT
  rationale: La expresión hebrea es literal. «Aves de los cielos» conserva la construcción y el registro profético; «cielos» mantiene la forma plural del hebreo.
- source_word: בֶּהֱמַת הָאָרֶץ
  english_pob_choice: the beasts of the earth
  chosen_spanish: las bestias de la tierra
  alternatives_spanish:
  - los animales de la tierra
  - las fieras de la tierra
  lexicon: HALOT
  rationale: La frase es amplia, pero en este contexto de juicio suena mejor «bestias». Mantiene el tono elevado y la posible connotación de animales salvajes.
- source_word: לֶאֱכֹל
  english_pob_choice: to devour
  chosen_spanish: para devorar
  alternatives_spanish:
  - para comer
  - para consumir
  lexicon: HALOT
  rationale: Aunque el verbo básico es «comer», en este contexto de carroña la idea es devorar. «Devorar» expresa con mayor fuerza el cuadro de juicio.
- source_word: וּלְהַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: y destruir
  alternatives_spanish:
  - y arruinar
  - y devastar
  lexicon: HALOT
  rationale: השחית significa destruir, arruinar o devastar. «Destruir» reproduce con claridad el término final y mantiene el paralelismo con «devorar».
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - oráculo de Yahvé
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva «Yahvé» como nombre propio, y la fórmula «dice» mantiene la breve fórmula profética sin sobrecargarla.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cuatro מִשְׁפָּחוֹת como figura de juicio
  english_pob_reading: four kinds
  chosen_spanish_reading: cuatro clases
  alternative_spanish_readings:
  - cuatro familias
  - cuatro clanes
  rationale: La POB inglesa reconoce que el sustantivo hebreo se usa figuradamente para cuatro categorías de agentes de juicio. En español conviene mantener esa interpretación explícita, sin borrar la metáfora de familias/clanes.
  doctrine_reference: HALOT; audit trail for figurative use
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo y el auditoría inglesa revisada: se conserva la figura de cuatro categorías sin añadir «de destrucción», se mantiene el paralelismo final «devorar y destruir», y se evita mecanizar la tradición de «SEÑOR» al usar el nombre divino como Yahvé. Se tomó en cuenta la revisión inglesa que eliminó un añadido no presente en el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «aves de los cielos» para mantener el plural hebreo y el registro profético.
  - «Bestias» conserva el matiz de animales salvajes o carroñeros en contexto de juicio.
  - La fórmula «para matar / para arrastrar / para devorar y destruir» refleja los infinitivos de propósito sin explicitar más de lo que el hebreo dice.
