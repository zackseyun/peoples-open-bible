translation:
  language: es
  text: 'Y Judit dijo desde lejos a los que guardaban las puertas: «Abran, abran la puerta; porque Dios, nuestro Dios[a], está con nosotros, para mostrar todavía fortaleza en Israel y poder contra nuestros enemigos, tal como hoy lo ha hecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Dios, Dios de nosotros»; la repetición es enfática y significa «Dios, nuestro Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde una distancia
  lexicon: LSJ
  rationale: El adverbio señala separación espacial. «Desde lejos» es una expresión natural en español y conserva el valor de distancia sin añadir interpretación.
- source_word: τοῖς φυλάσσουσιν ἐπὶ τῶν πυλῶν
  english_pob_choice: to those guarding the gates
  chosen_spanish: a los que guardaban las puertas
  alternatives_spanish:
  - a los guardias de las puertas
  - a los que vigilaban las puertas
  lexicon: LSJ
  rationale: El participio se vierte de modo sustantivado en español. «Guardaban» conserva la función de custodia; «puertas» refleja el plural griego y es el equivalente más natural de πύλαι en este contexto.
- source_word: Ἀνοίξατε, ἀνοίξατε δὴ τὴν πύλην
  english_pob_choice: Open, open the gate
  chosen_spanish: Abrid, abrid la puerta
  alternatives_spanish:
  - Abre, abre la puerta
  - Abran, abran la puerta
  lexicon: LSJ
  rationale: Se preserva la repetición imperativa para la urgencia. «Abrid» mantiene el plural dirigido a varios guardianes; «la puerta» conserva el singular de τὴν πύλην.
- source_word: ὁ θεὸς ὁ θεὸς ἡμῶν
  english_pob_choice: God, our God
  chosen_spanish: Dios, nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - Dios nuestro Dios
  lexicon: LSJ
  rationale: La repetición enfática de θεός se conserva en español sin colapsarla. «Dios, nuestro Dios» reproduce la tensión retórica y la confesión intensificada del texto.
- source_word: ποιῆσαι ἔτι ἰσχὺν
  english_pob_choice: to show strength still
  chosen_spanish: para mostrar todavía fortaleza
  alternatives_spanish:
  - para mostrar todavía fuerza
  - para seguir mostrando fortaleza
  - para manifestar todavía fortaleza
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad. «Mostrar» recoge la idea de hacer patente o manifestar el poder; «todavía» vierte ἔτι y «fortaleza» funciona como equivalente digno de ἰσχύς.
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fortaleza
  alternatives_spanish:
  - fuerza
  - poder
  lexicon: LSJ
  rationale: En este contexto militar y de liberación, ἰσχύς puede expresarse como «fortaleza» para evitar el sonido demasiado físico de «fuerza» y distinguirlo de κράτος.
- source_word: κράτος
  english_pob_choice: might
  chosen_spanish: poder
  alternatives_spanish:
  - poderío
  - mando
  - fuerza
  lexicon: LSJ
  rationale: κράτος indica poder efectivo o prevaleciente. «Poder» es claro y digno en español; se evita sobreinterpretarlo como dominación política.
- source_word: κατὰ τῶν ἐχθρῶν ἡμῶν
  english_pob_choice: against our enemies
  chosen_spanish: contra nuestros enemigos
  alternatives_spanish:
  - sobre nuestros enemigos
  - frente a nuestros enemigos
  lexicon: LSJ
  rationale: La preposición κατά con genitivo tiene fuerza adversativa. «Contra» es la correspondencia más directa y natural.
- source_word: καθὰ καὶ σήμερον ἐποίησεν
  english_pob_choice: just as he has done today
  chosen_spanish: tal como hoy lo ha hecho
  alternatives_spanish:
  - tal como hoy lo hizo
  - así como lo hizo hoy
  lexicon: LSJ
  rationale: La comparación se mantiene con «tal como». El aoristo se hace legible en español con el perfecto compuesto, que enlaza la acción terminada con el momento de habla.
theological_decisions:
- issue: Repetición enfática de θεός en ὁ θεὸς ὁ θεὸς ἡμῶν
  english_pob_reading: God, our God
  chosen_spanish_reading: Dios, nuestro Dios
  alternative_spanish_readings:
  - nuestro Dios
  - Dios nuestro Dios
  rationale: Se preserva la repetición sin suavizarla. La traducción mantiene el énfasis confesional y no lo reduce a una sola referencia.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Translate titles'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se mantuvo la urgencia de la doble orden, se respetó el matiz comparativo final y se optó por una formulación española formal y natural sin añadir glosa interpretativa innecesaria. La nota de la repetición divina se ancla en el texto con [a].'
  spanish_consistency_notes:
  - Se usa «Judit» para el nombre propio según uso bíblico en español.
  - Se mantiene la distinción entre «fortaleza» (ἰσχύς) y «poder» (κράτος) para reflejar la duplicación semántica del griego.
  - Se conserva el plural en la invocación a los guardianes y el singular en «la puerta», conforme al griego.
  - Se evita «SEÑOR» para θεός, siguiendo el texto fuente y la terminología POB.
  - La puntuación y el tratamiento de comillas siguen norma tipográfica española.
