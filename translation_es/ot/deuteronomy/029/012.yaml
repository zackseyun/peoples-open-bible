translation:
  language: es
  text: para que hoy te establezca como un pueblo para él[a], y él mismo sea tu Dios, así como te habló y así como juró a tus padres[b], a Abraham, a Isaac y a Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'para él como un pueblo'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'tus padres'; es decir, los patriarcas Abraham, Isaac y Jacob.
    reason: cultural_note
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor de propósito/resulto de la cláusula final sin añadir matices no presentes en el hebreo.
- source_word: הָקִים
  english_pob_choice: may establish
  chosen_spanish: te establezca
  alternatives_spanish:
  - te confirme
  - te levante
  lexicon: HALOT
  rationale: En este contexto pactual, 'establecer' transmite bien la idea de hacer que Israel quede firmemente constituido en una relación de pacto.
- source_word: אֹתְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: El pronombre directo singular se conserva de forma natural en español, manteniendo el адресamiento corporativo al pueblo.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' es la forma más clara y natural en español para el valor temporal inmediato del pacto.'
- source_word: לְעָם לוֹ
  english_pob_choice: as a people for himself
  chosen_spanish: como un pueblo para él
  alternatives_spanish:
  - como su pueblo
  - para ser su pueblo
  lexicon: HALOT
  rationale: Se preserva la relación de pertenencia y finalidad del hebreo, evitando borrar la precisión formal 'para él' que el texto destaca.
- source_word: וְהוּא יִהְיֶה לְךָ לֵאלֹהִים
  english_pob_choice: and he himself may be your God
  chosen_spanish: y él mismo sea para ti Dios
  alternatives_spanish:
  - y él mismo sea tu Dios
  - y sea para ti como Dios
  lexicon: HALOT
  rationale: '''Dios para ti'' refleja con fidelidad la fórmula pactual לְךָ לֵאלֹהִים; se conserva el énfasis de ''él mismo'' para el hebreo וְהוּא.'
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  english_pob_choice: just as he spoke to you
  chosen_spanish: así como te habló
  alternatives_spanish:
  - como te dijo
  - tal como te habló
  lexicon: HALOT
  rationale: '''Hablar'' mantiene la fuerza literal de דִּבֶּר sin importar ''prometer'', que el texto reserva para el juramento posterior.'
- source_word: וְכַאֲשֶׁר נִשְׁבַּע
  english_pob_choice: and as he swore
  chosen_spanish: y así como juró
  alternatives_spanish:
  - y como juró
  - y así como hizo juramento
  lexicon: HALOT
  rationale: '''Jurar'' comunica de manera directa el acto solemne del hebreo y conserva la relación con la cláusula anterior.'
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  - a tus padres/fundadores
  lexicon: HALOT
  rationale: Aunque 'padres' es literal, en español 'padres' puede sonar ambiguo o demasiado estrecho; 'padres' aquí funciona como término patrimonial-pactual. Se mantiene el plural masculino sin sustituirlo por un genérico que diluya la referencia patriarcal.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac, y a Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se conservan los nombres propios y la cadencia del hebreo con las preposiciones repetidas, posible en español solemne y claro.
theological_decisions:
- issue: Fórmula de pacto 'su pueblo' / 'un pueblo para él'
  english_pob_reading: a people for himself
  chosen_spanish_reading: un pueblo para él
  alternative_spanish_readings:
  - su pueblo
  - para ser su pueblo
  rationale: '''Un pueblo para él'' conserva la dirección relacional y evita convertir la fórmula en una posesión posesiva más estrecha de lo que el hebreo exige. Mantiene la tensión entre pertenencia y propósito.'
  doctrine_reference: Translation philosophy §§3, 6
- issue: Fórmula pactual 'tu Dios'
  english_pob_reading: your God
  chosen_spanish_reading: Dios para ti
  alternative_spanish_readings:
  - tu Dios
  - Dios tuyo
  rationale: El hebreo dice literalmente 'para ti, por Dios'. 'Dios para ti' mantiene la estructura relacional y el matiz formal del pacto sin sonar forzado en español.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Referencia patriarcal de 'tus padres'
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  rationale: Se preserva la referencia masculina y pactual del hebreo, que se aclara por la enumeración inmediata de Abraham, Isaac y Jacob. No se neutraliza el término con un genérico que borre la señal textual.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El contexto auditado en inglés revisó 'as his people' a 'as a people for himself' para reflejar mejor לְעָם לוֹ. La redacción española sigue esa revisión y evita suavizarla a 'su pueblo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda; en este versículo no aparece explícitamente.
  - Se mantiene 'Dios' sin artículo para reflejar la fórmula pactual לֵאלֹהִים.
  - Se conserva el singular del destinatario ('te') porque el hebreo dirige la cláusula al pueblo como unidad.
  - La puntuación mantiene la cadencia solemne y la repetición de la cláusula comparativa 'así como'.
