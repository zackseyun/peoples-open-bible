  to: Pero yo[a], como mis hermanos, entrego tanto el cuerpo como la vida por las leyes de nuestros padres, invocando a Dios para que pronto tenga misericordia de la nación, y para que tú, mediante tormentos y azotes[b], confieses que solo él es Dios.
