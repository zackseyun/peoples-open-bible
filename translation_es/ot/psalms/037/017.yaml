translation:
  language: es
  text: Porque los brazos de los impíos serán quebrados[a], pero Yahvé sostiene a los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «brazos». La imagen probablemente representa la fuerza o el poder de los impíos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón o explicación del dicho anterior; «Porque» conserva bien esa relación causal en español sin sonar forzada.
- source_word: זְרוֹע֣וֹת
  english_pob_choice: arms
  chosen_spanish: brazos
  alternatives_spanish:
  - brazos
  - fuerza
  - poder
  lexicon: HALOT
  rationale: La imagen corporal se mantiene de forma concreta. «Brazos» es el equivalente natural en español para el plural literal, y deja visible la posible metáfora de fuerza o poder.
- source_word: רְ֭שָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los injustos
  lexicon: HALOT
  rationale: Como sustantivo plural que designa a personas, «los impíos» es una forma bíblica clara y sobria en español, adecuada al registro sapiencial.
- source_word: תִּשָּׁבַ֑רְנָה
  english_pob_choice: will be broken
  chosen_spanish: serán quebrados
  alternatives_spanish:
  - serán rotos
  - serán hechos pedazos
  - serán quebrantados
  lexicon: HALOT
  rationale: El pasivo comunica bien el hebreo nifal. «Quebrados» conserva la idea de ruptura con tono bíblico natural en español.
- source_word: סוֹמֵ֖ךְ
  english_pob_choice: upholds
  chosen_spanish: sostiene
  alternatives_spanish:
  - sustenta
  - apoya
  - sostiene y mantiene
  lexicon: HALOT
  rationale: El participio expresa acción continua. «Sostiene» es idiomático y transmite apoyo activo y duradero, sin perder la fuerza del contraste poético.
- source_word: צַדִּיקִ֣ים
  english_pob_choice: the righteous
  chosen_spanish: a los justos
  alternatives_spanish:
  - a los rectos
  - a los justos y rectos
  lexicon: HALOT
  rationale: «Los justos» es el equivalente estándar y transparente para el plural substantivado, manteniendo el valor moral y judicial del término.
- source_word: יְהוָֽה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en español según la convención del proyecto: «Yahvé» en lugar de una sustitución por título, reflejando el Tetragrámaton directamente.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el nombre propio de Dios. Se opta por «Yahvé» para preservar ese nombre en el cuerpo del texto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metonymy in זְרוֹע֣וֹת
  english_pob_reading: arms
  chosen_spanish_reading: brazos [imagen de fuerza/poder]
  alternative_spanish_readings:
  - fuerza
  - poder
  rationale: La imagen corporal debe conservarse porque el hebreo usa un sustantivo concreto. En poesía, los «brazos» pueden representar fuerza o poder; el contexto permite esa implicación sin sustituirla en la traducción principal.
  doctrine_reference: 'POB lexical policy: preserve concrete poetic imagery unless clarity requires otherwise'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin cambios en la revisión más reciente; no se requieren ajustes respecto del sentido base. La decisión principal en español es mantener la imagen concreta de «brazos» y el nombre divino «Yahvé» de manera consistente con la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el contraste poético entre destrucción de los impíos y sostén de los justos.
  - Se preservó el nombre divino «Yahvé» de forma uniforme con la terminología del proyecto.
  - «Los impíos» y «los justos» conservan el tono sapiencial bíblico sin ampliar innecesariamente el sentido.
