review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la mayor parte del versículo: conserva el modismo de ''inclinar el oído'', la urgencia de מְהֵרָה, la distinción entre ''rescatarme'' y ''salvarme'', y mantiene las imágenes de ''roca'' y ''casa''. Sin embargo, la nota [a] está anclada en la frase equivocada: la alternativa documentada en el POB inglés corresponde a לְצוּר מָעוֹז (''roca de refugio'' / ''roca fuerte''), no a ''inclina tu oído hacia mí''. También conviene ajustar la expresión de urgencia para reflejar mejor el adverbio hebreo sin introducir un nuevo imperativo separado.'
  spanish_quality_summary: 'El español es claro y digno, pero una mejora pequeña lo haría más natural y fiel: ''rápidamente, rescátame'' o ''rescátame pronto'' refleja mejor מְהֵרָה que ''apresúrate a rescatarme'', que cambia la forma de la petición. Además, las notas deben corresponder exactamente a sus anclajes en el texto; actualmente [a] y [b] están desalineadas con el contenido de las notas.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: ''rescatarme'' para הַצִּילֵנִי, ''roca de refugio'' para לְצוּר מָעוֹז y ''casa fortificada'' para לְבֵית מְצוּדוֹת. La corrección requerida es de anclaje de nota y de matiz sintáctico en la urgencia, no de glosario teológico.'
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre 'hacia mí' pero su contenido real debería tratar la alternativa de 'roca de refugio'.
    rationale: En el POB inglés, la nota a corresponde a לְצוּר מָעוֹז ('a rock of refuge' / 'a strong rock'), no al modismo 'incline your ear to me'. Esto rompe la trazabilidad del expediente auditado y confunde al lector.
  - severity: medium
    issue: La nota [b] explica tanto 'roca fuerte' como 'fortaleza' aunque está anclada solo en 'roca de refugio'.
    rationale: 'Las alternativas documentadas en inglés están divididas en dos notas separadas: una para ''rock of refuge'' y otra para ''fortified house''. En español deben separarse o reanclarse correctamente para preservar la lógica del aparato de notas.'
  - severity: medium
    issue: '''Apresúrate a rescatarme'' introduce un imperativo verbal adicional que no refleja tan directamente el adverbial מְהֵרָה.'
    rationale: El hebreo expresa urgencia adverbial ('rápidamente', 'sin demora') con הַצִּילֵנִי. En español, 'rescátame pronto' o 'rápidamente, rescátame' preserva mejor la estructura y evita una leve reformulación interpretativa.
  revised_spanish_text: Inclina tu oído hacia mí; rápidamente, rescátame. Sé para mí una roca de refugio[a], una casa fortificada[b] para salvarme.
  revised_footnotes:
