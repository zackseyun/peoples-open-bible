translation:
  text: But because of our sacred murder[a], you will, by divine justice[b], endure a sufficient eternal torment by fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacrilegious murder' or 'the murder of holy people' for 'our sacred murder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an eternal torment by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μιεροφονίαν
  chosen: sacred murder
  alternatives:
  - sacrilegious murder
  - murder of the holy ones
  - impious bloodshed
  lexicon: LSJ
  rationale: The compound denotes murder with a sacrilegious or holy-profane dimension. 'Sacred murder' preserves the compact force of the Greek and the context of killing those devoted to God, while avoiding over-interpretive expansion. Because the term is unusual in English, an alternative is preserved in a footnote.
- source_word: αὐτάρκη καρτερήσεις
  chosen: you will endure
  alternatives:
  - you will bear fully
  - you will sustain sufficiently
  - you will endure to the full
  lexicon: LSJ
  rationale: 'The phrase intensifies the verb of endurance: the addressee will bear the punishment in full. Smooth English prefers ''you will endure''; the adverbial force of αὐτάρκη is absorbed into the severity of the clause rather than rendered woodenly.'
- source_word: θείας δίκης
  chosen: divine justice
  alternatives:
  - the divine judgment
  - God's justice
  - divine penalty
  lexicon: LSJ
  rationale: δίκη can denote justice, penalty, or judicial retribution. 'Divine justice' preserves both the judicial and moral sense without narrowing it merely to a sentence or punishment.
- source_word: αἰώνιον βάσανον
  chosen: an eternal torment
  alternatives:
  - eternal torture
  - everlasting torment
  - eternal punishment
  lexicon: LSJ
  rationale: βάσανος/βάσανον commonly denotes severe torment or torture. 'Torment' is strong but idiomatic and avoids importing later technical doctrinal language beyond the text itself.
- source_word: διὰ πυρός
  chosen: of fire
  alternatives:
  - by fire
  - through fire
  - in fire
  lexicon: LSJ
  rationale: The preposition with genitive can indicate means or instrumentality. In English, 'torment of fire' naturally conveys a fire-based torment while staying close to the Greek. The more literal 'by fire' is preserved as an alternative.
