revisions:
- from: ¡Enaltecido seas[a], Yahvé[b], en tu poder! Cantaremos y haremos música acerca de tu poderío.
  to: ¡Sé exaltado[a], Yahvé, en tu fuerza! Cantaremos y haremos música a tu poderío.
  rationale: Se ajusta el primer verbo a una forma más natural y litúrgicamente clara en español («Sé exaltado»), se acerca עֹז a «fuerza» para reflejar mejor el audit trail y distinguirlo de גְּבוּרָה («poderío»), y se elimina «acerca de», que sonaba explicativo y poco poético. Se conserva la nota de alternativa léxica relevante para רוּמָה y se retira la nota redundante sobre «Yahvé».
