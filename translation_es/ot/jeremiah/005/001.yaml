revisions:
- from: Recorred las calles de Jerusalén[a], y, por favor, mirad y sabed, y buscad en sus plazas, si halláis un hombre, si hay uno que haga justicia, que busque fidelidad[b], y yo la perdonaré.
  to: Recorran las calles[a] de Jerusalén, y por favor miren y sepan, y busquen en sus plazas, si hallan a un hombre[b], si hay uno que haga justicia, que busque fidelidad[c], y yo la perdonaré.
  rationale: La revisión corrige el anclaje de notas para que correspondan a las palabras pertinentes, restaura la nota importante sobre «un hombre» como singular masculino representativo, y mantiene las decisiones léxicas principales del expediente inglés. También adapta levemente el registro a un español más neutral latinoamericano con «recorran / miren / sepan / busquen», sin apartarse del sentido fuente.
  reviewer_model: gpt-5.4
