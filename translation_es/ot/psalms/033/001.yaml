translation:
  language: es
  text: ¡Griten de alegría en Yahvé[a], ustedes, los justos! La alabanza[b] es apropiada para los rectos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Canten con júbilo en Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «la alabanza es hermosa para los rectos» o «la alabanza corresponde a los rectos».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַנְּנוּ
  english_pob_choice: Shout for joy
  chosen_spanish: ¡Canten con júbilo!
  alternatives_spanish:
  - ¡Griten de alegría!
  - ¡Regocíjense!
  lexicon: HALOT
  rationale: El imperativo plural pide una expresión vocal jubilosa. En español, «canten con júbilo» conserva el matiz audible y celebrativo sin sonar forzado.
- source_word: צַדִּיקִים
  english_pob_choice: you righteous
  chosen_spanish: ustedes, los justos
  alternatives_spanish:
  - los justos
  - ustedes, los rectos
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo. «Ustedes, los justos» hace explícito el llamado directo y mantiene el valor sustantivado del adjetivo.
- source_word: בַּיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvé Dios
  - ante Yahvé
  lexicon: HALOT
  rationale: 'La preposición ב expresa aquí el ámbito de la alegría: alegrarse en Yahvé. Se conserva el nombre divino «Yahvé» según la pauta del proyecto, en lugar de sustituirlo por un título.'
- source_word: לַיְשָׁרִים
  english_pob_choice: for the upright
  chosen_spanish: para los rectos
  alternatives_spanish:
  - para los justos
  - a los rectos
  lexicon: HALOT
  rationale: La preposición ל marca relación o conveniencia. «Para los rectos» comunica bien la idea de lo que corresponde o es propio de ellos.
- source_word: נָאוָה
  english_pob_choice: is fitting
  chosen_spanish: es apropiado
  alternatives_spanish:
  - es hermoso
  - es decoroso
  - es conveniente
  lexicon: HALOT
  rationale: El adjetivo expresa adecuación, conveniencia o belleza moral. «Es apropiado» transmite la idea de lo que corresponde sin exagerar el matiz estético.
- source_word: תְהִלָּה
  english_pob_choice: praise
  chosen_spanish: alabar
  alternatives_spanish:
  - alabanza
  - canto de alabanza
  lexicon: HALOT
  rationale: 'El sustantivo denota alabanza; aquí, por la estructura gnómica, el español fluye mejor con una construcción verbal: «alabar es apropiado». Mantiene el sentido general sin añadir contenido no explícito.'
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español, y se ajustó la redacción para que los pies de página correspondan exactamente a las palabras marcadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se mantiene el paralelismo poético con dos miembros breves.
  - «Justos» y «rectos» preservan la tensión léxica entre צַדִּיקִים y יְשָׁרִים sin fusionarlos.
