translation:
  language: es
  text: Y Manasés se acostó con sus padres y fue sepultado en el jardín de su casa[a], en el jardín de Uzá. Y Amón su hijo llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «durmió con sus padres», conservando más literalmente el modismo hebreo real de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: En el contexto de las fórmulas regias de muerte, שׁכב funciona como eufemismo convencional. «Se acostó» conserva el giro idiomático sin volverlo demasiado literal o ambiguo en español.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: «Con sus padres» reproduce la fórmula tradicional hebrea con un equivalente natural en español. «Antepasados» explicita el sentido, pero pierde la forma idiomática repetida en Reyes.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue inhumado
  lexicon: HALOT
  rationale: La pasiva de קבר pide una forma natural y formal. «Sepultado» mantiene el registro digno de un obituario real y es plenamente transparente en español bíblico.
- source_word: בְּגַן בֵּיתוֹ
  english_pob_choice: in the garden of his house
  chosen_spanish: en el huerto de su casa
  alternatives_spanish:
  - en el jardín de su casa
  - en el huerto de su palacio
  lexicon: HALOT
  rationale: «גן» puede ser «huerto» o «jardín». Aquí «huerto» conserva el matiz de recinto cultivado y evita importar «palacio», que no está explícito en el hebreo. «Casa» mantiene ביתו sin ampliar indebidamente el referente.
- source_word: בְּגַן עֻזָּא
  english_pob_choice: in the garden of Uzza
  chosen_spanish: en el huerto de Uzá
  alternatives_spanish:
  - en el jardín de Uzá
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la frase anterior. «Uzá» translitera el nombre propio; «huerto» sigue la misma decisión léxica para גן y mantiene la consistencia interna del versículo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - llegó a ser rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: En esta cláusula de sucesión, מלך señala la entronización. «Reinó» es la forma castellana más natural y sobria para expresar la transición real, sin añadir la perífrasis «llegó a ser rey».
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: «En su lugar» transmite la sustitución dinástica con claridad y conserva el valor de sucesión de תחת en este contexto.
translation_notes:
  revision_awareness: 'Se revisó la nota de pie para asegurar que cada marcador aparezca explícitamente en el texto principal. También se ajustó la terminología para mantener consistencia con el auditable English POB: el giro idiomático de muerte, la pasiva de sepultura, la secuencia locativa del huerto/jardín y la fórmula de sucesión real.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «el huerto de su casa» y «el huerto de Uzá» para reflejar la repetición del hebreo.
  - «Se acostó con sus padres» conserva el modismo real sin traducirlo automáticamente como «murió».
  - «Reinó en su lugar» expresa la sucesión dinástica de manera natural y fiel.
