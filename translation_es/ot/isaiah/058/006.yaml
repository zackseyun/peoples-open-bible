source:
  edition: WLC
  text: הֲ/ל֣וֹא זֶה֮ צ֣וֹם אֶבְחָרֵ/הוּ֒ פַּתֵּ֨חַ֙ חַרְצֻבּ֣וֹת רֶ֔שַׁע הַתֵּ֖ר אֲגֻדּ֣וֹת מוֹטָ֑ה וְ/שַׁלַּ֤ח רְצוּצִים֙ חָפְשִׁ֔ים וְ/כָל מוֹטָ֖ה תְּנַתֵּֽקוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/058/006.yaml
  text: 'Is not this the fast that I choose: to loosen the bonds of wickedness[a], to undo the straps of the yoke, to let the oppressed go free[c][b], and to break every yoke?'
  footnotes:
  - marker: a
    text: Or 'bonds of wickedness' for 'chains of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the crushed' for 'the oppressed.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew repeats 'yoke' twice for emphasis, portraying oppression as a physical restraint to be removed.
    reason: cultural_note
