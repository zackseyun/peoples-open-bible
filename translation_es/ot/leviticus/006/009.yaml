translation:
  language: es
  text: Lo que quede de ella, Aarón y sus hijos lo comerán[a]. Se comerá sin levadura[c] en un lugar santo[b]; lo comerán en el atrio de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el remanente' o 'lo que resta'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en un lugar santo'', no ''en el lugar santo''; la cláusula siguiente especifica ese lugar como el atrio de la tienda de reunión.'
    reason: lexical_alternative
  - marker: c
    text: O 'ázimo'. El hebreo se refiere a que la ofrenda debe comerse en estado sin levadura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתֶרֶת
  english_pob_choice: What is left
  chosen_spanish: Lo que quede
  alternatives_spanish:
  - lo restante
  - lo que permanece
  - el remanente
  lexicon: HALOT
  rationale: El sustantivo participial con artículo funciona como referencia sustantivada a la porción sobrante de la ofrenda. 'Lo que quede' conserva el sentido de resto disponible y suena natural en español legal-litúrgico.
- source_word: מִמֶּנָּה
  english_pob_choice: of it
  chosen_spanish: de ella
  alternatives_spanish:
  - de eso
  - de la ofrenda
  - de ella misma
  lexicon: HALOT
  rationale: El sufijo femenino singular retoma la ofrenda. En español, 'de ella' mantiene la referencia sin forzar una traducción más mecánica como 'de ella misma'.
- source_word: יֹאכְלוּ
  english_pob_choice: shall eat
  chosen_spanish: lo comerán
  alternatives_spanish:
  - habrán de comerlo
  - deberán comerlo
  - lo comerán
  lexicon: HALOT
  rationale: En contexto jurídico, el imperfecto expresa instrucción. El futuro español puede cumplir esa función normativa con naturalidad sin perder el tono prescriptivo.
- source_word: אַהֲרֹן וּבָנָיו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y sus hijos
  alternatives_spanish:
  - Aarón y sus hijos varones
  - Aarón y sus descendientes
  lexicon: HALOT
  rationale: בנים aquí designa específicamente a los descendientes sacerdotales de Aarón. 'Hijos' conserva la relación familiar y la designación cultual sin introducir una glosa interpretativa.
- source_word: מַצּוֹת
  english_pob_choice: unleavened
  chosen_spanish: sin levadura
  alternatives_spanish:
  - en forma ázima
  - como panes sin levadura
  - ázimo
  lexicon: HALOT
  rationale: El hebreo indica el estado de la comida, no añade una categoría de 'pan' en el verso. 'Sin levadura' sigue de cerca la precisión revisada del inglés POB y evita sobredeterminar la forma.
- source_word: תֵּאָכֵל
  english_pob_choice: It shall be eaten
  chosen_spanish: Se comerá
  alternatives_spanish:
  - deberá comerse
  - ha de comerse
  - será comida
  lexicon: HALOT
  rationale: El nifal pasivo con fuerza prescriptiva se expresa con una pasiva refleja natural en español. 'Se comerá' preserva la voz pasiva y el carácter normativo.
- source_word: בְּמָקוֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el lugar santo
  lexicon: HALOT
  rationale: El hebreo carece de artículo en 'lugar', así que 'un lugar santo' reproduce mejor la indefinición del original que 'el lugar santo'. 'Santo' conserva la consagración cultual.
- source_word: בַּחֲצַר
  english_pob_choice: in the court
  chosen_spanish: en el atrio
  alternatives_spanish:
  - en el patio
  - en la corte
  lexicon: HALOT
  rationale: En lenguaje del tabernáculo, 'atrio' es el equivalente castellano más estable para el espacio cercado del santuario. Mantiene la terminología cultual sin ambigüedad moderna.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' traduce directamente el sintagma hebreo y preserva la imagen de la morada sagrada. Se evita ''tabernáculo'' por ser más interpretativo y menos transparente al original.'
- source_word: יֹאכְלוּהָ
  english_pob_choice: they shall eat it
  chosen_spanish: lo comerán
  alternatives_spanish:
  - lo habrán de comer
  - deberán comerlo
  lexicon: HALOT
  rationale: El verbo repetido con sufijo objeto refuerza la instrucción y especifica el objeto. En español se conserva la repetición sin sobrecargarla, manteniendo la fuerza exhortativa del hebreo.
theological_decisions:
- issue: Alcance de 'lugar santo' sin artículo definido
  english_pob_reading: Hebrew 'in a holy place,' not 'in the holy place'; the next clause specifies that place as the court of the tent of meeting.
  chosen_spanish_reading: en un lugar santo; lo comerán en el atrio de la tienda de reunión
  alternative_spanish_readings:
  - en el lugar santo
  - en un lugar sagrado
  rationale: 'Se preserva la tensión documentada: el verso no identifica genéricamente ''el'' lugar santo, sino cualquier lugar consagrado dentro del recinto que luego se precisa como el atrio. La traducción evita resolver de más la referencia antes de la cláusula final.'
  doctrine_reference: Santificación del espacio cultual; precisión textual sobre localización ritual
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'as unleavened bread' a 'unleavened' para mayor precisión. La redacción española sigue esa revisión y evita introducir 'pan' donde el hebreo solo exige una condición de consumo sin levadura.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito donde el versículo no lo contiene.
  - Se usó 'tienda de reunión' de forma consistente con la nomenclatura del santuario.
  - Se prefirió 'atrio' por consistencia con el vocabulario cultual del tabernáculo.
  - Se conservó la repetición final del mandato ('lo comerán') para reflejar el énfasis del hebreo.
