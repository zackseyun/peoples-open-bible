base_translation:
  language: en
  yaml_path: translation/ot/judges/013/016.yaml
  text: And the angel of Yahweh said to Manoah[a], “If you detain me, I will not eat your food. But if you prepare a burnt offering[b], offer it up to Yahweh.” For Manoah did not know that he was the angel of Yahweh.
  footnotes:
  - marker: a
    text: Or, more literally, “I will not eat your bread.” Here “bread” likely means food or a meal more generally.
    reason: lexical_alternative
  - marker: b
    text: Or “If you make a burnt offering, you must offer it to the LORD.” The Hebrew uses one verb for making/preparing the offering and another for offering it up.
    reason: lexical_alternative
