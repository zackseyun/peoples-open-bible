translation:
  language: es
  text: 'Estos son los hijos de Bilhá[a], que Labán dio a Raquel, su hija, y ella dio a luz a estos a Jacob: siete personas en total.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todas las personas, siete»; un modismo que significa un total de siete personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: La construcción identificativa plural en español requiere normalmente el verbo copulativo explícito; 'Estos son' conserva el valor deíctico y el tono de introducción genealógica.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos
  - descendientes de
  lexicon: HALOT
  rationale: En español, 'hijos de' mantiene la relación genealógica natural sin forzar el género como lo haría 'hijos' aislado; en este contexto lista la descendencia masculina de Bilhá.
- source_word: בִלְהָה
  english_pob_choice: Bilhah
  chosen_spanish: Bilhá
  alternatives_spanish:
  - Bilha
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con adaptación ortográfica española habitual y acento gráfico para la pronunciación.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: whom Laban gave
  chosen_spanish: que Labán dio
  alternatives_spanish:
  - a quien Labán dio
  - que Labán entregó
  lexicon: HALOT
  rationale: El relativo 'que' funciona naturalmente en español para retomar a Bilhá; 'dio' preserva el verbo básico del hebreo sin intensificarlo innecesariamente.
- source_word: לְרָחֵל בִּתּוֹ
  english_pob_choice: to Rachel his daughter
  chosen_spanish: a Raquel, su hija
  alternatives_spanish:
  - para Raquel, su hija
  - a Raquel, hija de él
  lexicon: HALOT
  rationale: La preposición 'a' refleja el dativo de נתן, y 'su hija' explicita el sufijo posesivo del hebreo de manera natural en español.
- source_word: וַתֵּלֶד
  english_pob_choice: and she bore
  chosen_spanish: y ella dio a luz
  alternatives_spanish:
  - y parió
  - y tuvo
  lexicon: HALOT
  rationale: '''Dar a luz'' es la forma española clara y digna para el contexto genealógico; conserva a la madre como sujeto y evita rusticidad innecesaria.'
- source_word: אֶת אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - a estos
  - estos hijos
  lexicon: HALOT
  rationale: El demostrativo retoma a los descendientes ya mencionados; en español puede repetirse sin problema y evita una explicitación añadida que el hebreo no exige.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  lexicon: HALOT
  rationale: En esta fórmula genealógica, 'para' expresa con naturalidad la relación de descendencia/entrega del nacimiento; se mantiene la referencia a Jacob sin cargarla con una formulación técnica.
- source_word: כָּל נֶפֶשׁ
  english_pob_choice: persons in all
  chosen_spanish: personas en total
  alternatives_spanish:
  - almas en total
  - 'todos: siete personas'
  lexicon: HALOT
  rationale: '''Nefesh'' en este cómputo significa personas, no ''alma'' en sentido abstracto; ''personas en total'' preserva el idiomático conteo hebreo sin perder claridad en español.'
- source_word: שִׁבְעָה
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - '7'
  lexicon: HALOT
  rationale: Número cardinal directo, sin necesidad de variantes.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no se requirieron cambios y el cotejo crítico mostró acuerdo alto; la redacción española sigue de cerca esa decisión estable sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se usa 'Bilhá' con acento, 'Raquel' y 'Jacob' en formas españolas estándar.
  - Se evita 'almas' en el cuerpo del texto para no oscurecer el modismo de conteo; la nota explica la literalidad hebrea.
  - La puntuación con dos puntos mantiene el valor de resumen final del conteo, en paralelo con la solución inglesa auditada.
