  source_alignment_summary: 'El borrador español capta bien la estructura del griego: ''sabiduría'' para σοφία, ''tesoro'' para θησαυρός, y la pregunta retórica sobre la utilidad de ambos. Sin embargo, ''invisible'' para ἀφανής no es la mejor correspondencia aquí; el griego apunta más naturalmente a algo no visto / no manifiesto / oculto, no necesariamente metafísicamente invisible. Además, la nota al pie está mal anclada: dice que el texto principal usa una formulación idiomática distinta, pero el texto principal ya dice exactamente ''en ambos'', que es la alternativa literal/formal de la nota.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'tesoro invisible' suena menos natural y algo más fuerte de lo necesario; 'tesoro oculto' o 'tesoro no visto' lee mejor en español bíblico moderno. También conviene corregir la nota para que refleje una verdadera alternativa léxica en español y no contradiga el texto principal.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión clave es léxica: mantener el paralelismo entre κεκρυμμένη y ἀφανής sin forzar ''invisible''. En español, puede aceptarse repetir la idea con matiz distinto como ''escondida ... oculto'', preservando el sentido sapiencial de inaccesibilidad.'
  issues:
  - severity: medium
    issue: '''Invisible'' para ἀφανής es demasiado fuerte y menos natural en este contexto.'
    rationale: ἀφανής aquí describe algo no visible o no manifiesto; 'invisible' en español puede sugerir una cualidad intrínseca, no simplemente estar fuera de vista. 'Oculto' conserva mejor el sentido contextual.
  - severity: medium
    issue: La nota al pie contradice el texto principal.
    rationale: La nota dice que el texto principal usa una formulación idiomática para expresar el sentido, pero el texto principal ya usa la formulación formal 'en ambos'. Debe revisarse para ofrecer una alternativa real, como 'en cualquiera de los dos' o 'en uno u otro'.
  - severity: low
    issue: El anclaje de la nota en 'invisible' no corresponde al problema léxico principal.
    rationale: La variación explicada en la auditoría inglesa recae sobre ἐν ἀμφοτέροις, no sobre ἀφανής. El marcador debe ir al segmento final relacionado con 'ambos'.
