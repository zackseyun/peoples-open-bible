translation:
  text: Therefore they will receive the kingdom of splendor and the crown of beauty from the hand of the Lord[a], because with his right hand he will shelter them[b], and with his arm he will defend them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the diadem of beauty.' The Greek uses a specifically royal term for the headpiece.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'he will defend them' is literally 'he will defend on behalf of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: LSJ
  rationale: Standard inferential phrase linking this verse to the preceding vindication of the righteous; 'Therefore' is concise and natural in English.
- source_word: λήμψονται
  chosen: they will receive
  alternatives:
  - they will take
  - they will obtain
  lexicon: LSJ
  rationale: Future middle of λαμβάνω here indicates reception of a gift from the Lord rather than seizure; 'receive' fits the following phrase 'from the hand of the Lord.'
- source_word: τὸ βασίλειον
  chosen: the kingdom
  alternatives:
  - the royal dominion
  - the kingship
  lexicon: LSJ
  rationale: The noun can denote kingship or royal rule, but with the paired regalia image ('diadem/crown') it is best rendered concretely as 'kingdom,' preserving the exalted reward imagery without over-interpreting.
- source_word: τῆς εὐπρεπείας
  chosen: of splendor
  alternatives:
  - of majesty
  - of comeliness
  - of honor
  lexicon: LSJ
  rationale: εὐπρέπεια denotes fitting beauty, grace, or magnificence. 'Splendor' communicates regal magnificence in this context better than the more dated 'comeliness' or the narrower 'honor.'
- source_word: τὸ διάδημα
  chosen: the crown
  alternatives:
  - the diadem
  lexicon: LSJ
  rationale: διάδημα specifically denotes a royal headpiece. 'Crown' is more accessible modern English; the royal nuance is retained by the surrounding imagery. 'Diadem' remains a viable lexical alternative.
- source_word: τοῦ κάλλους
  chosen: of beauty
  alternatives:
  - of glory
  - of loveliness
  lexicon: LSJ
  rationale: κάλλος most directly means beauty. Retaining 'beauty' preserves the aesthetic dimension of the Greek rather than shifting to the more interpretive 'glory.'
- source_word: ἐκ χειρὸς Κυρίου
  chosen: from the hand of the Lord
  alternatives:
  - from the Lord's hand
  lexicon: LSJ
  rationale: A transparent rendering of the idiom that preserves the personal agency of the Lord in bestowing the reward. κύριος follows the project's default 'Lord'.
- source_word: τῇ δεξιᾷ
  chosen: with his right hand
  alternatives:
  - by his right hand
  - at his right hand
  lexicon: LSJ
  rationale: Instrumental dative here expresses means. 'With his right hand' is idiomatic and preserves the anthropomorphic image of divine protection.
- source_word: σκεπάσει
  chosen: he will shelter
  alternatives:
  - he will cover
  - he will shield
  lexicon: LSJ
  rationale: The verb conveys covering/protecting. 'Shelter' captures protective covering in clear English and avoids redundancy with the following military verb.
- source_word: τῷ βραχίονι
  chosen: with his arm
  alternatives:
  - by his arm
  lexicon: LSJ
  rationale: Another instrumental dative. 'Arm' preserves the biblical image of divine strength in action.
- source_word: ὑπερασπιεῖ αὐτῶν
  chosen: he will defend them
  alternatives:
  - he will fight for them
  - he will protect them
  lexicon: LSJ
  rationale: The verb means to defend or champion on behalf of someone. Although the Greek construction literally has 'on behalf of them,' idiomatic English is 'defend them.' This also creates a meaningful distinction from the prior 'shelter.'
