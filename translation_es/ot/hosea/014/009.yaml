translation:
  language: es
  text: Efraín—¿qué tengo yo ya que ver con los ídolos? Yo le he respondido y cuidaré de él.[a] Yo soy como un ciprés frondoso; de mí se halla tu fruto.[c][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Efraín dice: “¿Qué tengo yo ya que ver con los ídolos?”». El hebreo puede leerse como la confesión de Efraín antes de la respuesta de Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'O: «lo miro» o «cuido de él».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de mí procede tu fruto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: nombre propio bíblico
  rationale: Se translitera el nombre propio de forma natural en español. Aquí designa al reino del norte/personificación del pueblo, como en el inglés POB.
- source_word: מַה לִּי עוֹד לָעֲצַבִּים
  english_pob_choice: what have I to do anymore with idols?
  chosen_spanish: ¿qué tengo yo ya que ver con los ídolos?
  alternatives_spanish:
  - ¿qué más tengo yo que ver con los ídolos?
  - ¿qué tengo yo todavía con los ídolos?
  lexicon: HALOT
  rationale: La locución idiomática expresa disociación o rechazo; en español '¿qué tengo yo que ver con...?' comunica bien esa fuerza. 'Ya' rinde עוֹד en un español natural sin perder el matiz de 'ya no / todavía'. 'Ídolos' conserva el sentido profético de עֲצַבִּים.
- source_word: עָנִיתִי
  english_pob_choice: I have answered
  chosen_spanish: Yo le he respondido
  alternatives_spanish:
  - Yo respondo
  - Yo he respondido
  lexicon: HALOT
  rationale: ענה en este contexto significa 'responder'. El perfecto hebreo se vierte con pretérito perfecto compuesto para expresar respuesta ya dada con efecto presente, como en el POB inglés.
- source_word: וַאֲשׁוּרֶנּוּ
  english_pob_choice: and will look after him
  chosen_spanish: y lo atenderé
  alternatives_spanish:
  - y lo miraré
  - y cuidaré de él
  - y lo observaré
  lexicon: HALOT
  rationale: שור aquí tiene el valor de mirar/velar/atender. 'Atenderé' conserva la idea de cuidado atento sin forzar un giro demasiado interpretativo; mantiene la línea natural en español y la cercanía con el inglés POB revisado.
- source_word: כִּבְרוֹשׁ רַעֲנָן
  english_pob_choice: like a flourishing cypress
  chosen_spanish: como un ciprés frondoso
  alternatives_spanish:
  - como un ciprés floreciente
  - como un ciprés verde
  lexicon: HALOT
  rationale: בְרוֹשׁ se traduce normalmente 'ciprés' en español moderno. רַעֲנָן expresa frescura/vitalidad; 'frondoso' comunica vigor vegetal de modo idiomático y digno, sin agregar una especie no atestiguada.
- source_word: מִמֶּנִּי פֶּרְיְךָ נִמְצָא
  english_pob_choice: from me your fruit is found
  chosen_spanish: de mí procede tu fruto
  alternatives_spanish:
  - tu fruto se halla en mí
  - de mí tu fruto es hallado
  - de mí sale tu fruto
  lexicon: HALOT
  rationale: נמצא en niphal puede conservarse con 'se halla', pero en español 'procede de mí' comunica con claridad la dependencia y origen divino del fruto. Se mantiene la relación teológica sin una literalidad pesada. En el POB inglés quedó una lectura más formal; en español esta equivalencia óptima evita ambigüedad sintáctica.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo soy
  lexicon: forma enfática
  rationale: La repetición enfática de la primera persona se conserva con 'Yo' al inicio de la cláusula, reforzando el paralelismo y el contraste con los ídolos.
theological_decisions:
- issue: Identidad del hablante en la cláusula inicial
  english_pob_reading: The opening clause is rendered as part of the LORD's speech concerning Ephraim, while preserving the Hebrew ambiguity in a footnote.
  chosen_spanish_reading: La línea principal mantiene el flujo de la voz divina, pero la nota preserva la posibilidad de que Efraín sea el que habla en la primera cláusula.
  alternative_spanish_readings:
  - Efraín—¿qué tengo yo ya que ver con los ídolos?
  - 'Efraín dice: ¿qué tengo yo ya que ver con los ídolos?'
  rationale: El hebreo permite leer la primera cláusula como confesión de Efraín o como parte del discurso de Yahvé. Como los verbos siguientes siguen en primera persona divina, la línea principal se integra al habla de Yahvé; sin embargo, la tensión interpretativa se conserva explícitamente en nota, como exige la filosofía de la POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación entre el fruto y su origen divino
  english_pob_reading: from me your fruit is found
  chosen_spanish_reading: de mí procede tu fruto
  alternative_spanish_readings:
  - de mí tu fruto es hallado
  - tu fruto viene de mí
  rationale: El texto afirma la dependencia del pueblo respecto de Dios como fuente de su fecundidad. 'Procede de mí' comunica esa procedencia de modo claro para el lector español, sin negar la textura hebrea ni el valor teológico del pasivo.
  doctrine_reference: Dependencia de Dios como fuente de vida y fruto espiritual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'look after him' frente a 'watch over him' por mayor naturalidad y precisión. En español se reflejó esa actualización con 'lo atenderé', manteniendo el tono formal y el sentido de cuidado atento. También se respetó la decisión revisada de conservar la fuerza idiomática de la primera cláusula y la simetría de la imagen arbórea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la tradición del proyecto cuando corresponde, pero en este versículo el texto no nombra explícitamente el tetragrámaton; por eso no aparece aquí.
  - Se mantuvo 'ídolos' para עֲצַבִּים por ser el equivalente profético más claro en español.
  - '''Yo'' al inicio de la segunda y tercera cláusula conserva el énfasis del hebreo.'
  - '''Lo atenderé'' evita introducir un matiz de vigilancia que no es necesario en español y sigue la revisión inglesa.'
  - Las notas usan marcadores únicos en orden y cada uno aparece anclado en el texto.
