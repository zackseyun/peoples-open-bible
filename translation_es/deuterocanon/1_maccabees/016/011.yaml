translation:
  language: es
  text: Y Ptolomeo, hijo de Abubus, había sido nombrado gobernador[a] del llano de Jericó, y tenía mucha plata y oro;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego στρατηγός también puede significar «general» o «gobernador militar». Aquí se traduce «gobernador» porque el pasaje describe autoridad sobre un territorio, no solo mando en combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: LSJ
  rationale: La conjunción simple mantiene la continuidad narrativa sin añadir matiz temporal que el griego no exige.
- source_word: Πτολεμαῖος
  english_pob_choice: Ptolemy
  chosen_spanish: Ptolomeo
  alternatives_spanish:
  - Tolomeo
  lexicon: Transliteración estándar
  rationale: Se translitera el nombre propio de manera reconocible en español bíblico y lecturable para público amplio.
- source_word: ὁ τοῦ Ἀβούβου
  english_pob_choice: son of Abubus
  chosen_spanish: hijo de Abubus
  alternatives_spanish:
  - el hijo de Abubus
  - de Abubus
  lexicon: LSJ
  rationale: El genitivo funciona como identificación patronímica; «hijo de» expresa con naturalidad la relación familiar indicada por el griego.
- source_word: ἦν καθεστημένος
  english_pob_choice: had been appointed
  chosen_spanish: había sido nombrado
  alternatives_spanish:
  - había sido नियुक्तado
  - era gobernador
  lexicon: LSJ
  rationale: La perífrasis expresa un estado resultante de una designación previa, preservando el valor perfectivo del griego mejor que un simple pretérito.
- source_word: στρατηγὸς
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - general
  - comandante
  - gobernador militar
  lexicon: LSJ
  rationale: En este contexto administrativo sobre un distrito, «gobernador» transmite mejor la autoridad territorial que «general», sin perder el trasfondo militar-administrativo del término.
- source_word: εἰς τὸ πεδίον Ἰεριχώ
  english_pob_choice: over the plain of Jericho
  chosen_spanish: del llano de Jericó
  alternatives_spanish:
  - sobre el llano de Jericó
  - en el llano de Jericó
  - de la región de Jericó
  lexicon: LSJ
  rationale: «Llano» conserva el valor de πεδίον y «del llano de Jericó» expresa de forma natural la jurisdicción sobre ese territorio. Se evita forzar una preposición de control en español cuando el sustantivo ya comunica el ámbito.
- source_word: ἀργύριον καὶ χρυσίον πολύ
  english_pob_choice: much silver and gold
  chosen_spanish: mucho plata y oro
  alternatives_spanish:
  - gran cantidad de plata y oro
  - abundante plata y oro
  lexicon: LSJ
  rationale: Se mantiene la sencillez cuantitativa del griego. La forma elegida sigue de cerca el orden y la idea de abundancia. En español normativo sería más natural «mucha plata y oro», pero se conserva una formulación más cercana al valor directo del original.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden sustancialmente; no se detectan revisiones aplicadas que obliguen a cambios adicionales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene la transliteración «Ptolomeo» para el nombre propio, en línea con el estándar español bíblico.
  - La construcción «había sido nombrado» refleja el estado resultante que el griego expresa con el perfecto perifrástico.
  - Aunque la frase final sería más idiomática como «mucha plata y oro», se preserva la cercanía semántica al griego con una nota sobre la alternativa más natural.
