  - severity: low
    issue: 'La nota al pie usa una alternativa poco idiomática: ''preparen la guerra''.'
    rationale: Aunque formalmente cercana, en español suena menos natural que 'prepárense para la guerra' o 'preparen para la guerra', y la función de la nota es ofrecer una alternativa inteligible al lector.
