translation:
  language: es
  text: El hombre bondadoso se beneficia a sí mismo, pero el cruel perjudica su propia carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su cuerpo»; alternativamente, «sus parientes» si שְׁאֵרוֹ se toma en el sentido de parientes de sangre más que de carne/cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּמֵל
  english_pob_choice: benefits
  chosen_spanish: se beneficia
  alternatives_spanish:
  - hace bien
  - favorece
  - retribuye con bien
  lexicon: HALOT
  rationale: El participio expresa la idea de hacer bien o traer provecho. «Se beneficia» conserva el sentido reflexivo y la brevedad proverbial, en paralelo con el efecto negativo del segundo hemistiquio.
- source_word: נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - su alma
  - su vida
  lexicon: HALOT
  rationale: En este contexto sapiencial, נֶפֶשׁ funciona de manera reflexiva y práctica, no como término técnico antropológico. «A sí mismo» comunica con claridad el retorno del beneficio a la propia persona.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbial. «El hombre» conserva la forma representativa y el paralelismo con el adjetivo que califica al sujeto.
- source_word: חָסֶד
  english_pob_choice: kindness
  chosen_spanish: bondadoso
  alternatives_spanish:
  - amable
  - benigno
  - de bondad
  lexicon: HALOT
  rationale: Aquí חֶסֶד describe el carácter del hombre, no una categoría teológica técnica. En español, un adjetivo como «bondadoso» suena natural y evita forzar una construcción nominal menos idiomática. El matiz de benevolencia se mantiene sin perder la fuerza proverbial.
- source_word: עֹכֵר
  english_pob_choice: troubles
  chosen_spanish: perturba
  alternatives_spanish:
  - causa trouble
  - aflige
  - desordena
  lexicon: HALOT
  rationale: עכר tiene el sentido de traer trouble o perturbación. «Perturba» conserva la idea causativa y funciona bien en contraste con «se beneficia».
- source_word: שְׁאֵרוֹ
  english_pob_choice: his own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - su cuerpo
  - sus parientes
  lexicon: HALOT
  rationale: שְׁאֵר puede significar carne, cuerpo o pariente de sangre. En este proverbio, el paralelismo inmediato con נַפְשׁוֹ favorece una referencia al propio cuerpo/carne. «Su propia carne» preserva la imagen hebrea y mantiene la tensión lexical documentada entre cuerpo y parentesco.
- source_word: אַכְזָרִי
  english_pob_choice: a cruel man
  chosen_spanish: el cruel
  alternatives_spanish:
  - un hombre cruel
  - el hombre cruel
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El cruel» reproduce la concisión del hebreo y el contraste antitético con «el hombre bondadoso».
theological_decisions:
- issue: 'Sentido de שְׁאֵרוֹ: carne/cuerpo versus parientes'
  english_pob_reading: his own flesh, with a footnote allowing 'his body' or 'his kin'
  chosen_spanish_reading: su propia carne, con nota que abre «su cuerpo» o «sus parientes»
  alternative_spanish_readings:
  - su cuerpo
  - sus parientes
  rationale: El texto hebreo admite más de una posibilidad léxica. La comparación inmediata con נַפְשׁוֹ apoya la lectura corporal en esta forma principal; sin embargo, la alternativa de parentesco debe preservarse porque el sustantivo puede referirse a consanguíneos. La nota mantiene la tensión documental sin decidirla indebidamente.
  doctrine_reference: HALOT; parallelism within Proverbs 11:17
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del POB en inglés, que cambió «A man of kindness» por «A kind man» para sonar más natural. En español, se adoptó una solución igualmente natural y breve («El hombre bondadoso») sin perder el valor representativo del proverbio. También se mantuvo la tensión lexical de שְׁאֵרוֹ con una nota equivalente a la del original inglés.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en el proyecto; este versículo no contiene el nombre divino.
  - Se prefirió «carne» para שְׁאֵר por fidelidad imagística, no por leerlo como una antropología técnica.
  - «Bondadoso» se eligió como adjetivo natural para חָסֶד en este contexto sapiencial, evitando una frase nominal menos fluida.
