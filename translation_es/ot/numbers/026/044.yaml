    rationale: No impiden la comprensión ni contradicen claramente el hebreo, pero una transliteración más transparente podría considerarse en revisión amplia. No es necesario escalarlo aquí.
  revised_spanish_text: 'Los hijos de Aser, por sus clanes[a]: de Imna, el clan de los imnitas; de Isví, el clan de los isvitas; de Bería[b], el clan de los beriitas.'
