translation:
  language: es
  text: He aquí, Dios es exaltado en su poder[a]; ¿quién es maestro como él?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su poder» o «mediante su fuerza».
    reason: lexical_alternative
  - marker: b
    text: O «¿quién es como él como maestro?»
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula introduce una observación solemne y de atención. «Mira» conserva el tono exhortativo del hebreo sin sonar tan arcaico como «He aquí», y evita una paráfrasis añadida.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios fuerte
  - Dios poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común, no como nombre propio. «Dios» es la correspondencia natural y mantiene la referencia directa al sujeto divino.
- source_word: יַשְׂגִּיב
  english_pob_choice: is exalted
  chosen_spanish: es exaltado
  alternatives_spanish:
  - se eleva
  - actúa con grandeza
  - está en lo alto
  lexicon: HALOT
  rationale: El hifil de שׂגב expresa elevación, grandeza o estar en alto. «Es exaltado» sigue de cerca el valor del inglés POB y preserva la idea poética de elevación ligada a Dios.
- source_word: בְּכֹחוֹ
  english_pob_choice: in his power
  chosen_spanish: en su poder
  alternatives_spanish:
  - por su poder
  - por su fuerza
  - mediante su poder
  lexicon: HALOT
  rationale: La preposición ב admite matiz locativo o instrumental. «En su poder» mantiene la concisión hebrea y la ambigüedad razonable del texto, sin fijar indebidamente el valor instrumental.
- source_word: מִי כָמֹהוּ
  english_pob_choice: who is ... like him?
  chosen_spanish: ¿quién es ... como él?
  alternatives_spanish:
  - ¿quién se le compara?
  - ¿quién es semejante a él?
  lexicon: HALOT
  rationale: La pregunta retórica de incomparabilidad se expresa de forma natural en español con «¿quién es... como él?», conservando el énfasis en la singularidad divina.
- source_word: מוֹרֶה
  english_pob_choice: a teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - enseñante
  - instructor
  - maestro que enseña
  lexicon: HALOT
  rationale: El sustantivo designa a uno que enseña. «Maestro» es claro y digno en español; en este contexto preserva la fuerza retórica de que nadie instruye como Dios.
theological_decisions:
- issue: Sentido de la exaltación de Dios en relación con su poder
  english_pob_reading: The verse states God's exalted status or self-exaltation in connection with his power, without specifying a broader doctrinal claim beyond divine incomparability and instruction.
  chosen_spanish_reading: El versículo afirma la elevación y singular grandeza de Dios en conexión con su poder, sin cargar el texto con una afirmación doctrinal más específica que la del hebreo.
  alternative_spanish_readings:
  - Dios obra poderosamente
  - Dios hace seguro por su poder
  rationale: El hebreo admite matices de ser alto, exaltarse o mostrar poder eficaz. La redacción española conserva la incomparabilidad y la función de maestro de Dios, sin imponer una explicación más amplia que la que el texto sustenta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el control de revisión más reciente: no se detectaron cambios aplicados en la etapa auditada; la traducción española sigue el sentido confirmado por la revisión de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל como título divino común, no como nombre propio.
  - Se mantiene «poder» para בְּכֹחוֹ, preservando la ambigüedad entre esfera y medio.
  - «Maestro» traduce מוֹרֶה con una solución breve y natural, evitando una paráfrasis explicativa.
  - La puntuación sigue el patrón poético del original con pregunta retórica final.
