translation:
  language: es
  text: ¿Por qué habría yo de tomar mi carne entre mis dientes y poner mi vida en mi mano?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué habría yo de tomar mi carne con mis dientes?». La expresión hebrea es idiomática y difícil; comunica una actitud de arriesgarse temerariamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi alma». נפש puede significar «vida», «alma» o «ser»; aquí «mi vida» encaja mejor con el sentido de exponerse a peligro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מָה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habría yo de...
  alternatives_spanish:
  - ¿Para qué...
  - ¿Por qué...
  lexicon: HALOT
  rationale: La expresión introduce una pregunta retórica de motivo o propósito. «¿Por qué habría yo de...?» conserva ese valor interrogativo en un español natural y digno, sin convertirlo en una formulación mecánica.
- source_word: אֶשָּׂא
  english_pob_choice: should I take
  chosen_spanish: tomar
  alternatives_spanish:
  - levantar
  - llevar
  - alzar
  lexicon: HALOT
  rationale: נשא puede significar «levantar, cargar, tomar». En esta construcción idiomática, «tomar» comunica bien la acción figurada de llevar la carne a la boca, y funciona con fluidez en español.
- source_word: בְשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi carne
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi carne». Se conserva la imagen corporal concreta, que es importante para la fuerza del dicho y para no suavizar el hebraísmo a «cuerpo».
- source_word: בְשִׁנַּי
  english_pob_choice: in my teeth
  chosen_spanish: entre mis dientes
  alternatives_spanish:
  - con mis dientes
  - en mis dientes
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y difícil. En español, «entre mis dientes» reproduce mejor la imagen de algo sostenido o llevado a la boca, y evita una literalidad extraña que podría sonar menos natural.
- source_word: וְנַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi vida
  lexicon: HALOT
  rationale: נפש puede significar «vida, alma, ser». Aquí, por el paralelismo con el riesgo personal y con «en mi mano», «mi vida» expresa mejor la idea de exponerse al peligro sin perder la tensión del original.
- source_word: אָשִׂים
  english_pob_choice: put
  chosen_spanish: poner
  alternatives_spanish:
  - colocar
  - poner
  - dejar
  lexicon: HALOT
  rationale: שׂים significa comúnmente «poner, colocar». «Poner» es el verbo más directo y claro en español para esta imagen idiomática.
- source_word: בְּכַפִּי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi palma
  - en mi mano
  lexicon: HALOT
  rationale: כף puede referirse a la palma o la mano. En español, «en mi mano» mantiene el valor idiomático de exponer la propia vida al peligro sin especificar innecesariamente «palma».
translation_notes:
  revision_awareness: El inglés POB mantiene una traducción dinámica controlada con dos notas alternativas. El presente borrador conserva la misma estructura retórica y el mismo par de tensiones léxicas (בשר/נפש), procurando una equivalencia óptima en español sin perder la imaginería ni la dificultad idiomática del hebreo.
  spanish_consistency_notes:
  - Se preserva la imagen corporal concreta de בשר como «carne», coherente con el enfoque POB de no suavizar la metáfora.
  - Se mantiene la tensión semántica de נפש con «vida», y se ofrece «alma» en nota para reflejar la amplitud del hebreo.
  - La pregunta retórica se formula con un español natural («¿Por qué habría yo de...?») para reproducir la fuerza del original sin calco innecesario.
  - 'Se conserva la estructura paralela del versículo: carne/dientes y vida/mano.'
