  text: וַ/יֹּאמַ֓ר יְהוָ֗ה אֱלֹהֵי֙ אֲדֹנִ֣/י אַבְרָהָ֔ם הַקְרֵה נָ֥א לְ/פָנַ֖/י הַ/יּ֑וֹם וַ/עֲשֵׂה חֶ֕סֶד עִ֖ם אֲדֹנִ֥/י אַבְרָהָֽם׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/012.yaml
  text: And he said[a], “O Yahweh, God of my master Abraham, please grant success before me today[c][b], and show steadfast love to my master Abraham.”
  footnotes:
  - marker: a
    text: Or “cause it to happen before me today.” The Hebrew verb asks God to bring about the desired encounter providentially.
    reason: lexical_alternative
  - marker: b
    text: “Steadfast love” translates Hebrew hesed, a term that can also mean loyal kindness or covenant faithfulness.
    reason: lexical_alternative
  - marker: c
    text: Or 'grant it to happen'.
    reason: previous_rendering
