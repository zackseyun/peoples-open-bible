  yaml_path: translation/ot/ezekiel/023/004.yaml
  text: 'Their names were Oholah the elder and Oholibah her sister[a]. They became mine and bore sons and daughters. As for their names: Samaria is Oholah[b], and Jerusalem is Oholibah.'
  footnotes:
