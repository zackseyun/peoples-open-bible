translation:
  language: es
  text: Porque el mandamiento es lámpara, y la instrucción[a] es luz; y las reprensiones de la disciplina[b] son el camino de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enseñanza» para תּוֹרָה; en este contexto sapiencial el término probablemente se refiere a una enseñanza autorizada más que específicamente a «ley».
    reason: lexical_alternative
  - marker: b
    text: O «reprensiones correctivas» o «reprensiones de corrección»; la expresión hebrea combina corrección verbal (תּוֹכְחוֹת) con disciplina formativa (מוּסָר).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces the explanatory relation to la exhortación previa. «Porque» conserva el valor causal/explicativo del hebreo y suena natural en español sapiencial.
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - antorcha
  lexicon: HALOT
  rationale: נֵר designa un objeto concreto de iluminación, no la luz abstracta. «Lámpara» preserva la imagen metafórica y su paralelismo con אוֹר.
- source_word: מִצְוָה
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  - orden
  lexicon: HALOT
  rationale: «Mandamiento» comunica bien la fuerza normativa y autorizada del término. En español bíblico es claro y mantiene el peso de una instrucción obligatoria.
- source_word: תּוֹרָה
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - ley
  - enseñanza
  lexicon: HALOT
  rationale: En Proverbios, תּוֹרָה suele apuntar a enseñanza formativa más que a «ley» en sentido estrecho. «Instrucción» evita restringir indebidamente el término y conserva su autoridad.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  lexicon: HALOT
  rationale: «Luz» es la equivalencia natural y mantiene el contraste poético con «lámpara».
- source_word: דֶרֶךְ חַיִּים
  english_pob_choice: the way of life
  chosen_spanish: el camino de la vida
  alternatives_spanish:
  - la senda de la vida
  - el camino que lleva a la vida
  lexicon: HALOT
  rationale: La expresión sapiencial se entiende de manera idiomática en español como «el camino de la vida». Conserva la metáfora de conducta y destino.
- source_word: תּוֹכְחוֹת
  english_pob_choice: reproofs
  chosen_spanish: reprensiones
  alternatives_spanish:
  - reproches
  - correcciones
  lexicon: HALOT
  rationale: «Reprensiones» mantiene el sentido de corrección verbal y moral del término. En español suena natural junto a «disciplina» y preserva el matiz admonitorio.
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר incluye formación correctiva y entrenamiento moral. «Disciplina» transmite bien ese valor formativo sin reducirlo a castigo.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto sapiencial
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: La decisión evita importar el sentido más estrecho de «ley» cuando el contexto de Proverbios favorece una enseñanza autorizada y formativa. Así se respeta la tensión entre autoridad normativa y sabiduría pedagógica.
  doctrine_reference: 'Translation philosophy: primacía del texto original y de su contexto sapiencial; no se impone una lectura técnica posterior.'
- issue: Relación entre תּוֹכְחוֹת y מוּסָר
  english_pob_reading: reproofs of discipline
  chosen_spanish_reading: reprensiones de la disciplina
  alternative_spanish_readings:
  - reprensiones correctivas
  - reproches de disciplina
  rationale: La expresión hebrea une corrección verbal y formación disciplinaria. «Reprensiones de la disciplina» conserva ambos elementos sin diluir el paralelismo ni transformar el giro en una paráfrasis interpretativa.
  doctrine_reference: 'Sabiduría bíblica: corrección como medio de formación moral, no solo como censura.'
translation_notes:
  revision_awareness: 'Concordante con la revisión más reciente: no se detectaron cambios necesarios respecto del análisis auditado en inglés; se mantuvo la equivalencia óptima con atención al paralelismo poético y a la carga formativa de los términos sapienciales.'
  spanish_consistency_notes:
  - Se mantuvo «mandamiento» para מִצְוָה y «instrucción» para תּוֹרָה, evitando fusionar ambos términos.
  - «Lámpara» y «luz» preservan el paralelismo concreto del hebreo.
  - «Reprensiones de la disciplina» intenta reflejar los dos sustantivos hebreos sin suavizar el tono correctivo.
  - El orden y la puntuación siguen la cadencia poética del texto fuente.
