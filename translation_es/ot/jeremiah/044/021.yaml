translation:
  language: es
  text: ¿No fue el incienso[a] que ustedes quemaron en las ciudades de Judá y en las calles de Jerusalén—ustedes y sus padres, sus reyes, sus jefes y el pueblo del país—lo que Yahvé recordó, y subió[b] a su corazón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El incienso» traduce el sustantivo hebreo ligado al acto de quemar incienso; el texto conserva la referencia al objeto/ofrenda, no solo a la acción.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y subió a su corazón», un hebraísmo que expresa que el asunto llegó a su consideración o recuerdo; se conserva la imagen para no suavizarla demasiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue...
  alternatives_spanish:
  - ¿No era...
  - ¿Acaso no fue...
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo espera afirmación; en español, «¿No fue...?» mantiene bien ese valor interrogativo y suena natural en registro bíblico moderno.
- source_word: הַקִּטֵּר
  english_pob_choice: the incense
  chosen_spanish: el incienso
  alternatives_spanish:
  - la quema de incienso
  - la ofrenda de incienso
  lexicon: HALOT
  rationale: El sustantivo derivado del verbo de quemar incienso se refiere aquí al incienso/ofrenda misma; «incienso» es breve, claro y coherente con el verbo siguiente.
- source_word: קִטַּרְתֶּם
  english_pob_choice: you burned
  chosen_spanish: quemaron
  alternatives_spanish:
  - quemaron incienso
  - hicieron ofrenda de humo
  lexicon: HALOT
  rationale: El verbo expresa la acción cultual de quemar; como el objeto ya está dado por «incienso», «quemaron» evita redundancia y conserva el acto.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en las urbes de Judá
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural del sintagma locativo.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  english_pob_choice: and in the streets of Jerusalem
  chosen_spanish: y en las calles de Jerusalén
  alternatives_spanish:
  - y en las plazas de Jerusalén
  lexicon: HALOT
  rationale: חֻצוֹת puede abarcar calles o espacios abiertos; «calles» es la opción más natural en español sin perder la referencia a ámbitos públicos urbanos.
- source_word: אַתֶּם וַאֲבֹתֵיכֶם מַלְכֵיכֶם וְשָׂרֵיכֶם וְעַם הָאָרֶץ
  english_pob_choice: you and your fathers, your kings and your officials, and the people of the land
  chosen_spanish: ustedes, sus padres, sus reyes, sus jefes y el pueblo de la tierra
  alternatives_spanish:
  - ustedes, sus antepasados, sus reyes, sus príncipes y el pueblo de la tierra
  - ustedes y sus padres, sus reyes, sus oficiales y el pueblo de la tierra
  lexicon: HALOT
  rationale: Se conserva la lista completa de participantes. «Padres» mantiene la correspondencia formal con אבותיכם; «jefes» refleja שָׂרִים sin imponer el matiz monárquico de «príncipes».
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el pueblo del país
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea de manera transparente, sin cargarla aquí con una lectura sociológica que el contexto no exige explícitamente.
- source_word: זָכַר יְהוָה
  english_pob_choice: the LORD remembered
  chosen_spanish: Yahvé recordó
  alternatives_spanish:
  - Yahvé se acordó
  - el Señor recordó
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé». «Recordó» reproduce el verbo básico זכר sin suavizar su fuerza.'
- source_word: וַתַּעֲלֶה עַל לִבּוֹ
  english_pob_choice: and it came up upon his heart
  chosen_spanish: y subió a su corazón
  alternatives_spanish:
  - y le subió al corazón
  - y vino a su corazón
  - y le vino a la mente
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de «subir al corazón», preservando la tensión antropomórfica y el sentido de recuerdo/consideración divina sin resolverlo en una paráfrasis mentalista.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se aplica el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto conserva el nombre del pacto y evita el ocultamiento mediante mayúsculas o sustituciones litúrgicas.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiom antropomórfico עַל לִבּוֹ
  english_pob_reading: it came up upon his heart
  chosen_spanish_reading: subió a su corazón
  alternative_spanish_readings:
  - vino a su corazón
  - se le vino a la mente
  rationale: 'La frase se conserva como imagen idiomática en español para no borrar la tensión teológica: Yahvé es presentado con lenguaje humano de memoria/atención. La versión no lo reduce a un simple acto cognitivo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB inglés, que prefirió «it came up upon his heart» para reflejar con más precisión el hebreo y evitar que Yahvé aparezca como agente directo de «hacer subir» el asunto. En español se mantiene esa misma decisión al conservar «subió a su corazón» como giro idiomático, no como paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, según la norma del proyecto.
  - «Jefes» se eligió para שָׂרֵיכֶם por ser más neutral y funcional en español que «príncipes».
  - Se preserva la enumeración con comas para reflejar la acumulación del hebreo.
  - El artículo «el incienso» corresponde al sustantivo colectivo/abstracto del hebreo; no se añadió una aclaración interpretativa al texto principal.
  - La nota sobre «subió a su corazón» mantiene la ambigüedad útil entre memoria, consideración y atención divina.
