  to: Larga vida[a] está en su mano derecha; en su mano izquierda hay riquezas y honor.
  rationale: Se reemplaza «Largura de días» por «Larga vida» para lograr un español natural y ampliamente legible, conservando en nota la alternativa más literal que refleja el modismo hebreo. Se cambia «honra» por «honor» para alinearse mejor con la decisión léxica documentada del POB inglés y con el español moderno neutral. También se añade «hay» en la segunda cláusula para una sintaxis española más natural, sin alterar el sentido ni el paralelismo del original.
