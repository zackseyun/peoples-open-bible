revisions:
- from: 'Entonces Samuel vino a Saúl, y Saúl le dijo: «Bendito[a] seas para Yahvé[b]; he cumplido la palabra de Yahvé».'
  to: 'Entonces Samuel vino a Saúl, y Saúl le dijo: «Bendito[a] seas de parte de Yahvé; he cumplido[b] la palabra de Yahvé».'
  rationale: Se reemplazó «para Yahvé» por «de parte de Yahvé» para conservar la fuerza de la fórmula hebrea de bendición con una expresión natural y clara en español. También se movió el marcador [b] a «he cumplido», donde corresponde al verbo הֲקִימֹתִי, y se ajustaron las notas para que coincidan exactamente con sus anclas textuales.
  reviewer_model: gpt-5.4
