translation:
  language: es
  text: Mira a nuestro escudo[a], oh Dios, y mira el rostro de tu ungido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nuestro protector'. El hebreo dice 'nuestro escudo', una metáfora poética que puede referirse a Dios como protector o al rey.
    reason: lexical_alternative
  - marker: b
    text: Heb. 'tu ungido'. La palabra proviene de la misma raíz que 'Mesías'; aquí probablemente se refiere primero al rey davídico, con posible resonancia mesiánica más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: מָגִנֵּנוּ
  english_pob_choice: our shield
  chosen_spanish: nuestro escudo
  alternatives_spanish:
  - nuestro protector
  lexicon: HALOT
  rationale: 'מָגֵן denota literalmente un escudo. En el contexto poético puede funcionar como metáfora de protección, pero la imagen concreta se mantiene bien en español y conserva la ambigüedad del referente: puede aludir a Dios como protector o al rey como escudo del pueblo.'
- source_word: רְאֵה
  english_pob_choice: look on
  chosen_spanish: mira con favor
  alternatives_spanish:
  - mira
  - considera
  - mira sobre
  lexicon: HALOT
  rationale: El imperativo ראה aquí no expresa mera visión, sino una petición de atención favorable. 'Mira con favor' comunica esa fuerza idiomática en español sin alejarse demasiado del verbo base. En la segunda línea se repite simplemente 'mira' para reflejar el paralelismo verbal.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Se trata de un vocativo en oración. 'Oh Dios' marca de manera natural el llamado directo en español y no añade contenido teológico nuevo.
- source_word: וְהַבֵּט
  english_pob_choice: and look on
  chosen_spanish: y mira
  alternatives_spanish:
  - y contempla
  - y vuelve tus ojos a
  lexicon: HALOT
  rationale: נבט implica una mirada dirigida y atenta. Dado que el texto hebreo empareja dos imperativos paralelos, 'y mira' mantiene la simetría y la claridad en español. No se fuerza una distinción demasiado marcada entre los dos verbos.
- source_word: פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: el rostro de
  alternatives_spanish:
  - la presencia de
  lexicon: HALOT
  rationale: פָּנִים significa literalmente 'rostro' y suele conservar su valor relacional. 'Rostro' reproduce mejor la imagen hebrea que 'presencia', que interpretaría más de lo que el texto exige.
- source_word: מְשִׁיחֶךָ
  english_pob_choice: your anointed
  chosen_spanish: tu ungido
  alternatives_spanish:
  - tu Mesías
  - tu ungido rey
  lexicon: HALOT
  rationale: מָשִׁיחַ significa 'ungido'. En este salmo probablemente se refiere primero al rey davídico; por eso se conserva el título funcional 'ungido' en lugar de 'Mesías', que podría sobrecargar el versículo con una lectura más específica que la del contexto inmediato.
theological_decisions:
- issue: Ambigüedad de 'nuestro escudo'
  english_pob_reading: Retained as the metaphor 'our shield' without specifying whether it refers to God or the king.
  chosen_spanish_reading: Se conserva la metáfora 'nuestro escudo' sin precisar si alude a Dios o al rey.
  alternative_spanish_readings:
  - 'Interpretarlo como Dios: ''mira con favor a nuestro escudo, oh Dios, es decir, a nuestro protector'''
  - 'Interpretarlo como el rey: ''mira a nuestro escudo'', entendiendo al rey davídico'
  rationale: El hebreo permite esta ambigüedad y el paralelismo con 'tu ungido' parece deliberado. Mantener la metáfora evita resolver la tensión poética y teológica más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referente de 'tu ungido'
  english_pob_reading: Rendered as 'your anointed' with no capitalization.
  chosen_spanish_reading: Se traduce como 'tu ungido' sin capitalizar ni convertirlo en 'Mesías'.
  alternative_spanish_readings:
  - tu Mesías
  - tu Ungido
  rationale: En el contexto inmediato del salmo, la referencia más probable es al rey davídico. Capitalizar o usar 'Mesías' introduciría una especificación cristológica que el hebreo no exige en este punto, aunque la relación léxica con 'Mesías' se conserva implícitamente.
  doctrine_reference: 'Translation philosophy §2: Translate titles; transliterate names; source primacy over tradition.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés al preferir una formulación paralela y natural para los dos imperativos, evitando una diferenciación excesiva entre ellos. Se conserva la metáfora 'escudo' y el título 'ungido' conforme al audit trail, y se marca en nota la posible resonancia de 'Mesías'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'ungido' para מְשִׁיחֶךָ, conforme a las convenciones del proyecto.
  - '''Mira con favor'' funciona como equivalente idiomático de la petición hebrea de atención favorable; en la segunda cola se usa simplemente ''mira'' para reflejar el paralelismo.'
  - El vocativo 'oh Dios' se usa por claridad natural en español sin introducir una formulación litúrgica rígida.
  - Se evita 'Señor' para יהוה porque el versículo no contiene el Tetragrámaton en este caso.
