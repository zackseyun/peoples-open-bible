translation:
  language: es
  text: Escucha[a], oh Yahvé, nuestra oración y nuestra súplica, y líbranos por tu propia causa, y concédenos favor delante de los que nos llevaron cautivos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oye», «Atiéndenos». El imperativo griego pide una escucha atenta y respondiente en lenguaje de oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσάκουσον
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Atiéndenos
  lexicon: BDAG
  rationale: El imperativo pide una escucha atenta y respondiente en lenguaje de oración. «Escucha» conserva la fuerza directa y natural en español sin perder el tono suplicante.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Oh Yahvé
  lexicon: BDAG
  rationale: Aunque el griego dice Κύριε, el contexto del POB español sigue la convención de traducir el nombre divino como «Yahvé» cuando la invocación se dirige a Dios. Se mantiene la vocatividad con «oh» en la frase.
- source_word: προσευχῆς
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - plega
  lexicon: BDAG
  rationale: προσευχή es la oración en general; «oración» es el equivalente más natural y claro en español para esta petición amplia.
- source_word: δεήσεως
  english_pob_choice: supplication
  chosen_spanish: súplica
  alternatives_spanish:
  - ruego
  - petición
  - suplicación
  lexicon: BDAG
  rationale: δέησις expresa una petición intensa y urgente. «Súplica» conserva mejor la intensidad y el registro formal que un término más débil.
- source_word: ἐξελοῦ
  english_pob_choice: deliver
  chosen_spanish: líbranos
  alternatives_spanish:
  - delívanos
  - rescátanos
  - sálvanos
  lexicon: BDAG
  rationale: ἐξαιρέω aquí significa sacar/liberar de una situación opresiva. «Líbranos» es idiomático en español bíblico y evita ampliar el sentido hacia salvación general o rescate físico específico.
- source_word: ἕνεκεν σοῦ
  english_pob_choice: for your own sake
  chosen_spanish: por amor de ti
  alternatives_spanish:
  - por tu propia causa
  - por ti mismo
  - por tu propio nombre
  lexicon: BDAG
  rationale: La frase fundamenta la petición en Dios mismo. «Por amor de ti» comunica de modo natural la motivación centrada en Yahvé, sin forzar una formulación demasiado explicativa.
- source_word: χάριν
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: BDAG
  rationale: En este contexto, χάρις describe la aceptación o benevolencia concedida por otros, no principalmente «gracia» en sentido soteriológico. «Favor» preserva ese valor relacional e idiomático.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: BDAG
  rationale: La locución idiomática expresa posición relacional ante otros. «Delante de» es natural en español y conserva la idea de estar bajo la mirada o ante el juicio de ellos.
- source_word: τῶν ἀποικισάντων ἡμᾶς
  english_pob_choice: those who carried us away captive
  chosen_spanish: aquellos que nos llevaron cautivos
  alternatives_spanish:
  - los que nos exiliaron
  - los que nos deportaron
  - los que nos llevaron al cautiverio
  lexicon: LSJ
  rationale: El participio alude a quienes removieron a Judá a la cautividad. «Nos llevaron cautivos» preserva la concreción del destierro forzado sin perder fluidez en español.
theological_decisions:
- issue: Tratamiento del nombre divino en una invocación griega a Κύριε
  english_pob_reading: The English POB renders the divine address as 'O Lord' while preserving the prayer’s direct appeal.
  chosen_spanish_reading: Se traduce la invocación como «oh Yahvé» para reflejar el nombre divino que subyace al uso de Κύριε en este contexto de oración.
  alternative_spanish_readings:
  - oh Señor
  - Señor
  rationale: En el marco del POB español, el nombre divino no se oculta con una convención de máscara. Dado que la oración se dirige a Dios, «Yahvé» hace explícita la referencia divina sin alterar el carácter de súplica.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve divine-name transparency'
- issue: Sentido de ἕνεκεν σοῦ
  english_pob_reading: for your own sake
  chosen_spanish_reading: por amor de ti
  alternative_spanish_readings:
  - por tu propio bien
  - por tu nombre
  - por tu causa
  rationale: La petición se fundamenta en Dios mismo, no en mérito humano. «Por amor de ti» mantiene esa motivación teocéntrica de modo natural en español y evita sobreespecificar la lógica teológica.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete con el mismo orden básico que la POB inglesa revisada: imperativo de escucha, doble mención de oración/súplica, petición de liberación por la causa de Dios y solicitud de favor ante los responsables del cautiverio. Se conserva la lectura revisada de δέησις como «súplica» y se refleja la nota léxica sobre el participio final con una formulación española natural.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para el nombre divino, manteniendo la invocación directa con «oh».
  - «Oración» y «súplica» distinguen la petición general de la petición intensa, en paralelo con προσευχή / δέησις.
  - «Favor» evita introducir un sentido doctrinalmente cargado de χάρις que aquí es relacional.
  - «Nos llevaron cautivos» conserva el matiz de deportación/exilio sin tecnicismo excesivo.
  - La puntuación y el orden buscan claridad litúrgica sin alejarse del griego.
