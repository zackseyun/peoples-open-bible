translation:
  language: es
  text: 'Entonces midió el pórtico de la puerta: ocho codos, y sus pilares laterales[a] dos codos; y el pórtico de la puerta estaba hacia el templo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus jambas», «sus pilastras» o «sus postes», según el término arquitectónico exacto de אֵיל.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa»; en esta visión del templo, el término se refiere al edificio del templo.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción siguiente en la visión. «Entonces» conserva la progresión narrativa natural en español sin forzar un matiz adicional.
- source_word: אֻלָם
  english_pob_choice: portico
  chosen_spanish: pórtico
  alternatives_spanish:
  - vestíbulo
  - porche
  lexicon: HALOT
  rationale: En el contexto arquitectónico del templo, «pórtico» comunica bien un espacio de entrada elevado o delantero y evita el tono demasiado coloquial de «porche».
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de entrada
  - el portal
  lexicon: HALOT
  rationale: Aunque שער puede ser «puerta» o «portón», en español «puerta» funciona de manera clara y natural aquí, manteniendo la referencia a la estructura de acceso que se está midiendo.
- source_word: שְׁמֹנֶה אַמּוֹת
  english_pob_choice: eight cubits
  chosen_spanish: ocho codos
  alternatives_spanish:
  - ocho codos de largo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para no convertir una medida de arquitectura sagrada y mantener la precisión del texto fuente.
- source_word: ו/איל/ו
  english_pob_choice: and its side pillars
  chosen_spanish: y sus pilares laterales
  alternatives_spanish:
  - y sus jambas
  - y sus postes
  - y sus pilastras
  lexicon: HALOT
  rationale: איל nombra un soporte arquitectónico de la abertura. «Pilares laterales» es una solución clara y sobria; se preserva la ambigüedad técnica con alternativas conocidas en la nota.
- source_word: שְׁתַּיִם אַמּוֹת
  english_pob_choice: two cubits
  chosen_spanish: dos codos
  alternatives_spanish:
  - dos codos de ancho
  lexicon: HALOT
  rationale: Correspondencia directa de la medida, manteniendo la unidad antigua como en el texto fuente.
- source_word: וְאֻלָם הַשַּׁעַר
  english_pob_choice: and the portico of the gate
  chosen_spanish: y el pórtico de la puerta
  alternatives_spanish:
  - y el pórtico de la puerta de entrada
  lexicon: HALOT
  rationale: Se repite la misma estructura en español para reflejar la repetición del hebreo y la descripción arquitectónica continua.
- source_word: מֵהַבָּיִת
  english_pob_choice: was toward the temple
  chosen_spanish: estaba hacia el templo
  alternatives_spanish:
  - estaba del lado del templo
  - miraba hacia el templo
  lexicon: HALOT
  rationale: En esta visión, בית se refiere al edificio del templo. «Hacia el templo» expresa la orientación espacial sin sobreinterpretar la frase.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura arquitectónica de אֻלָם como «portico» y conserva la referencia espacial «toward the temple» para מֵהַבָּיִת; la versión española sigue esas decisiones con equivalencias naturales. No hubo revisiones aplicadas en el último pase, y el consenso de revisión fue alto.
  spanish_consistency_notes:
  - Se mantuvo «pórtico» para אֻלָם de forma coherente con el pasaje.
  - Se tradujo שער de manera consistente como «puerta», más natural en español que «portal» en este contexto.
  - Se conservaron las unidades antiguas («codos») por consistencia con la serie de medidas del capítulo.
  - Se evitó usar «SEÑOR» u otra sustitución teológica, ya que no aparece el nombre divino en este versículo.
  - La nota sobre «la casa» conserva la aclaración contextual del audit trail inglés sin desplazar el sentido arquitectónico.
