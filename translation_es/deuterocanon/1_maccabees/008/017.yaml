translation:
  language: es
  text: Y Judas escogió a Eupólemo, hijo de Juan[a], hijo de Accos, y a Jasón, hijo de Eleazar, y los envió a Roma para establecer amistad y alianza con ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Eupólemo, hijo de Juan de Accos», si el genitivo final se entiende unido directamente a Juan y no como un segundo patronímico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: El verbo expresa una elección concreta dentro del relato; «escogió» reproduce bien la selección intencional sin añadir matices administrativos que no están en el griego.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: los envió
  alternatives_spanish:
  - los despachó
  - los mandó
  lexicon: BDAG
  rationale: «Envió» es la equivalencia narrativa natural y fiel; conserva la simplicidad del verbo griego y encaja con el contexto diplomático.
- source_word: στῆσαι
  english_pob_choice: to establish
  chosen_spanish: establecer
  alternatives_spanish:
  - fundar
  - consolidar
  - asegurar
  lexicon: BDAG
  rationale: En este contexto de misión diplomática, el infinitivo de propósito indica procurar una relación formal; «establecer» mantiene ese valor sin exagerar.
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - relaciones amistosas
  - amistad política
  lexicon: LSJ
  rationale: «Amistad» conserva el término base del griego. Aunque aquí tiene una dimensión diplomática, en español no conviene cargarlo de explicación dentro del texto principal.
- source_word: συμμαχίαν
  english_pob_choice: alliance
  chosen_spanish: alianza
  alternatives_spanish:
  - pacto de alianza
  - alianza militar
  lexicon: LSJ
  rationale: «Alianza» traduce de manera directa el sentido político del sustantivo. No se añade «militar» porque el texto inmediato solo habla de una alianza formal.
- source_word: τοῦ Ἀκχώς
  english_pob_choice: the son of Accos
  chosen_spanish: hijo de Accos
  alternatives_spanish:
  - de Accos
  lexicon: LSJ
  rationale: 'Sigo la lectura genealógica más transparente en español: «hijo de Juan, hijo de Accos». Esto preserva la cadena patronímica que el griego permite.'
- source_word: αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para ellos
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «with them» para reflejar el dativo relacional, en español «con ellos» expresa mejor la finalidad diplomática de la frase con φυσικό español.
theological_decisions:
- issue: Relación diplomática expresada por φιλίαν καὶ συμμαχίαν
  english_pob_reading: friendship and alliance
  chosen_spanish_reading: amistad y alianza
  alternative_spanish_readings:
  - amistad y pacto de alianza
  - relaciones amistosas y alianza
  rationale: No hay necesidad de doctrinalizar el pasaje; la frase debe leerse como lenguaje político-diplomático. «Amistad y alianza» conserva la tensión entre relación amistosa y pacto formal.
  doctrine_reference: No doctrinal issue; historical-diplomatic context
- issue: Cadena patronímica de Eupólemo
  english_pob_reading: Eupolemus son of John, the son of Accos
  chosen_spanish_reading: Eupólemo, hijo de Juan, hijo de Accos
  alternative_spanish_readings:
  - Eupólemo, hijo de Juan de Accos
  rationale: La puntuación española puede hacer visible que el texto admite una ambigüedad de enlace entre «Juan» y «Accos». Mantener la cadena en la forma principal evita borrar esa posibilidad textual.
  doctrine_reference: No doctrinal issue; textual/onomastic ambiguity
translation_notes:
  revision_awareness: Coincido con el expediente inglés en la lectura general y en la necesidad de conservar la ambigüedad onomástica de τοῦ Ἀκχώς. No se registran revisiones posteriores; el estado de alta concordancia permite una traducción directa y estable.
  spanish_consistency_notes:
  - He mantenido «Y Judas» para reflejar la coordinación narrativa inicial del griego.
  - 'Conservo nombres propios en forma española habitual: Eupólemo, Jasón, Juan, Eleazar, Roma, Accos.'
  - La frase final queda abierta, como en el original, sin agregar un objeto explícito distinto de la relación a establecer.
  - No se introduce terminología eclesiástica ni doctrinal ajena al contexto histórico del pasaje.
