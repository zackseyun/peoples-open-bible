translation:
  language: es
  text: Sus flecheros me rodean[a]; él hiende mis riñones[b] y no perdona; derrama mi hiel[c] sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus grandes” o “sus jefes”. La forma hebrea es difícil; “sus flecheros” encaja con la imagen de ataque del versículo y con el contexto más amplio.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: “mis riñones”, una expresión literal para los órganos internos de una persona y, por extensión idiomática en hebreo, su ser más íntimo.'
    reason: cultural_note
  - marker: c
    text: O “mi bilis”; algunos toman el término figuradamente como “mi amargura”, pero el sentido corporal concuerda mejor con la violencia del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסֹבּוּ / רַבָּיו
  english_pob_choice: His archers surround me
  chosen_spanish: Sus flecheros me rodean
  alternatives_spanish:
  - Sus grandes me rodean
  - Sus jefes me rodean
  - Me cercan sus flecheros
  lexicon: HALOT
  rationale: La forma consonántica admite una lectura difícil (“sus grandes/jefes”), pero el contexto inmediato es de ataque violento y cuerpo herido. Siguiendo el criterio auditado del POB inglés, “flecheros” conserva la imagen bélica y hace natural el plural colectivo en español.
- source_word: יְפַלַּח
  english_pob_choice: splits open
  chosen_spanish: me abre
  alternatives_spanish:
  - me raja
  - me hiende
  - me parte
  lexicon: HALOT
  rationale: El verbo expresa una acción violenta de desgarrar. En español, “me abre las entrañas” comunica con claridad la fuerza del hebreo sin volverlo excesivamente técnico o oscuro.
- source_word: כִּלְיוֹתַי
  english_pob_choice: my kidneys
  chosen_spanish: las entrañas
  alternatives_spanish:
  - mis riñones
  - mis vísceras
  - mis partes internas
  lexicon: HALOT
  rationale: El POB inglés retiene “kidneys” por primacía de la fuente, pero en español “mis riñones” suena menos natural y puede debilitar el paralelismo poético. “Las entrañas” conserva el valor corporal e idiomático del sufrimiento interior, aunque no sea una equivalencia anatómica exacta.
- source_word: לֹא יַחְמוֹל
  english_pob_choice: does not spare
  chosen_spanish: no tiene compasión
  alternatives_spanish:
  - no perdona
  - no se apiada
  - no escatima
  lexicon: HALOT
  rationale: En un contexto de violencia, “no tiene compasión” expresa bien el matiz de חמל y resulta natural en español. Mantiene la dureza del juicio/ataque sin añadir un tono doctrinal ajeno.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: he pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - vacía
  - echa
  lexicon: HALOT
  rationale: “Derrama” reproduce con fidelidad el gesto físico de verter algo líquido y suena fluido en español bíblico contemporáneo.
- source_word: מְרֵרָתִי
  english_pob_choice: my gall
  chosen_spanish: mi hiel
  alternatives_spanish:
  - mi bilis
  - mi amargura
  - mi bilis amarga
  lexicon: HALOT
  rationale: El inglés POB eligió “gall” por el sentido corporal. En español, “hiel” es el equivalente bíblico y léxico más reconocido para este campo semántico, y preserva la posible resonancia de amargura sin forzarla como abstracción principal.
theological_decisions:
- issue: Conservación del lenguaje corporal violento en poesía de sufrimiento
  english_pob_reading: Retain the concrete bodily terms ('kidneys,' 'gall') in the main text.
  chosen_spanish_reading: Conservar el lenguaje corporal concreto en la traducción principal, con ajuste idiomático donde el español lo requiera.
  alternative_spanish_readings:
  - Reemplazar por 'partes internas' y 'amargura'
  - Suavizar con términos más generales como 'corazón'
  rationale: La poesía de Job usa anatomía vívida para expresar sufrimiento real. En español, mantener el campo corporal evita perder la fuerza retórica; sin embargo, 'entrañas' e 'hiel' permiten una lectura publicable y fiel, más natural que un calco rígido de 'riñones'.
  doctrine_reference: Translation philosophy §1, §6
- issue: Ambigüedad de רַבָּיו
  english_pob_reading: '''his archers'' fits the attack imagery of the verse and the wider context.'
  chosen_spanish_reading: Tomar la lectura bélica 'sus flecheros' en el texto principal.
  alternative_spanish_readings:
  - '''sus grandes'''
  - '''sus jefes'''
  rationale: La secuencia verbal y el paralelo con el daño corporal favorecen la imagen de atacantes armados. La traducción conserva la tensión textual documentada sin ocultar que existe otra posible lectura léxica.
  doctrine_reference: Translation philosophy §1, §4
- issue: Sentido de no mostrar compasión en un ataque divino/permitido
  english_pob_reading: does not spare
  chosen_spanish_reading: no tiene compasión
  alternative_spanish_readings:
  - no perdona
  - no se apiada
  rationale: La formulación española evita introducir una lectura demasiado jurídica y mantiene la dureza afectiva del verbo hebreo en un contexto poético de aflicción.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó estable y el acuerdo de revisión fue alto. Se mantiene el criterio del POB inglés de conservar el imaginario corporal y la lectura bélica de רַבָּיו, adaptando solo la expresión española para mayor naturalidad sin perder transparencia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el registro poético y violento sin suavizarlo.
  - '''Hiel'' se usa como equivalente español bíblico de ''gall'' para preservar la imagen corporal y la resonancia de amargura.'
  - La nota sobre 'entrañas' aclara la literalidad hebrea de 'riñones' para evitar que la adaptación idiomática oculte la fuente.
