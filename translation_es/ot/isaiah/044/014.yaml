    text: Hebrew תִּרְזָה refers to a tree species with uncertain identification; possible renderings include cypress, holm oak, terebinth, or elm.
    reason: lexical_alternative
  - marker: b
    text: Or 'and strengthens it for himself among the trees of the forest'; the Hebrew clause is difficult and may describe either cultivating the tree or selecting a strong tree from the forest.
    reason: alternative_reading
  - marker: c
    text: Hebrew אֹרֶ refers to a tree species with uncertain identification; possible renderings include pine, fir, ash, or laurel.
    reason: lexical_alternative
