translation:
  language: es
  text: Y no se hallaron mujeres tan hermosas como las hijas de Job en toda la región[a], y su padre les dio una herencia entre sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en toda la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְצָא
  english_pob_choice: were found
  chosen_spanish: se hallaron
  alternatives_spanish:
  - fueron encontradas
  - no se encontró
  lexicon: HALOT
  rationale: El pasivo de מצא expresa hallazgo/existencia. En español, la pasiva refleja «se hallaron» suena natural y conserva la idea de que tales mujeres resultaron encontrarse en el ámbito descrito.
- source_word: נָשִׁים יָפוֹת
  english_pob_choice: women ... as beautiful
  chosen_spanish: mujeres tan hermosas
  alternatives_spanish:
  - mujeres tan bellas
  - mujeres hermosas
  lexicon: HALOT
  rationale: נָשִׁים significa «mujeres» y יָפוֹת comunica belleza física/visible. «Tan hermosas» refleja bien la comparación implícita por כ sin volver el español forzado.
- source_word: כִּבְנוֹת אִיּוֹב
  english_pob_choice: as Job’s daughters
  chosen_spanish: como las hijas de Job
  alternatives_spanish:
  - como las hijas de Job
  - igual que las hijas de Job
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. En español, «como las hijas de Job» reproduce la comparación de manera idiomática y clara.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - en toda la región
  - en todo el país
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «land» por el contexto narrativo, el hebreo admite «tierra» y en español conserva mejor la amplitud idiomática de la expresión superlativa sin limitarla innecesariamente.
- source_word: וַיִּתֵּן לָהֶם
  english_pob_choice: gave them
  chosen_spanish: les dio
  alternatives_spanish:
  - les entregó
  - les concedió
  lexicon: HALOT
  rationale: נתן con sufijo dativo se expresa naturalmente con «les dio» en español, manteniendo sencillez y claridad.
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una heredad
  - una porción de herencia
  lexicon: HALOT
  rationale: נַחֲלָה designa una posesión hereditaria. «Una herencia» es la equivalencia más natural y suficientemente precisa en español.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  english_pob_choice: among their brothers
  chosen_spanish: entre sus hermanos
  alternatives_spanish:
  - en medio de sus hermanos
  - junto con sus hermanos
  lexicon: HALOT
  rationale: בְּתוֹךְ puede significar «en medio de/entre». Mantener «hermanos» preserva el término masculino explícito del hebreo y la observación social del pasaje.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: in all the land
  chosen_spanish_reading: en toda la tierra
  alternative_spanish_readings:
  - en toda la tierra
  - en toda la región
  rationale: El hebreo puede significar «tierra» o «país/land». En español, «tierra» mantiene la amplitud proverbial de la comparación sin introducir una restricción geográfica moderna.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Termino de parentesco masculino explícito
  english_pob_reading: among their brothers
  chosen_spanish_reading: entre sus hermanos
  alternative_spanish_readings:
  - entre sus hermanos
  - entre sus hermanas y hermanos
  rationale: El hebreo usa el plural masculino אֲחֵיהֶם. Se conserva el masculino en español para no neutralizar un detalle textual relevante, especialmente porque el versículo destaca que las hijas recibieron herencia junto con los varones.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el acuerdo alto del auditorio en inglés: conserva la comparación de belleza, el sentido de hallazgo pasivo, el alcance amplio de la expresión territorial y el detalle social/legal de la herencia otorgada a las hijas entre sus hermanos. No se introdujeron cambios respecto al sentido base del versículo, solo ajustes idiomáticos naturales al español.'
  spanish_consistency_notes:
  - Se mantiene «hermanos» para reflejar el masculino explícito del hebreo.
  - Se usa «tierra» como equivalente idiomático amplio de הָאָרֶץ, con nota alternativa para la lectura «land».
  - La comparación con כ se resuelve en español con «tan ... como», evitando una paráfrasis excesiva.
