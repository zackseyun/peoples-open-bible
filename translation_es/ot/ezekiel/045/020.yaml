review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea del English POB en los puntos principales: conexión discursiva, referencia al séptimo día del mes, pecado involuntario/simplicidad, y expiación de la casa/templo. Sin embargo, hay dos desajustes importantes: (1) «harás expiación» cambia indebidamente el número de וְכִפַּרְתֶּם (2mp, «harán/haréis»), y (2) la nota [a] está anclada en «error» aunque su contenido mezcla alternativas para שֹׁגֶה y פֶּתִי, sin marcar claramente la alternativa de dos clases de personas que sí preserva el English POB.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «en el séptimo día del mes» suena menos natural que «el séptimo día del mes». «Por cualquiera que peca» también resulta algo tosco; «por cualquiera que peque» o «por cualquier persona que peque» fluye mejor. Mantener «la casa» en el texto principal es posible, pero en español bíblico contemporáneo aquí «el templo» comunica mejor el referente y coincide con la decisión principal auditada en inglés.
  glossary_alignment: No hay conflicto con los términos teológicos globales. «Expiación»/«hacer expiación» es adecuado para כפר. «Simplicidad» es defendible para פֶּתִי, pero conviene conservar en nota la alternativa «el simple/ingenuo» para reflejar la posible distinción de clases personales. Dado el audit trail, es preferible «el templo» en el texto principal y dejar «la casa» en nota.
  issues:
  - severity: high
    issue: Desajuste de persona/número en «así harás expiación»
    rationale: El hebreo וְכִפַּרְתֶּם es 2ª persona plural, no singular. El borrador pasa de singular («harás») a una forma singular también en la segunda cláusula, lo que no preserva la forma verbal fuente.
  - severity: medium
    issue: Anclaje y contenido imprecisos de la nota [a]
    rationale: La nota aparece sobre «error», pero comenta también פֶּתִי. Además, el English POB preserva la alternativa de leer dos clases de personas («el que yerra» y «el simple»), lo cual debería reflejarse con más claridad en español.
  - severity: medium
    issue: «En el séptimo día del mes» suena poco natural
    rationale: Aunque comprensible, en español natural y digno la expresión más fluida es «el séptimo día del mes» o «en el día séptimo del mes».
  - severity: medium
    issue: «La casa» en el texto principal reduce claridad innecesariamente
    rationale: El hebreo literal es «la casa», pero en este contexto de Ezequiel el referente es el templo/santuario. El English POB eligió «the temple» como forma principal por claridad; el español debería hacer lo mismo y dejar el literal en nota.
  revised_spanish_text: Y así harás el séptimo día del mes, por cualquiera que peque por error o por simplicidad[a]; así haréis expiación por el templo[b].
  revised_footnotes:
  - marker: a
    text: 'O: «por el que yerra y por el simple». El hebreo puede distinguir dos clases de personas, y פֶּתִי también puede traducirse «ingenuo» o «inexperto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa», refiriéndose aquí al templo/santuario.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el número verbal de וְכִפַּרְתֶּם a plural («haréis»), se mejoró la naturalidad de la fecha, se mantuvo la fuerza genérica de אִישׁ con una formulación más fluida, y se alineó el referente principal de הַבָּיִת con el English POB usando «el templo» en el texto y «la casa» en nota. También se rehízo la nota [a] para reflejar con precisión la alternativa léxica y sintáctica documentada en la auditoría inglesa.
