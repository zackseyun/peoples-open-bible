  - severity: low
    issue: «Y él dijo» suena más pesado de lo necesario.
    rationale: El hebreo wayyiqtol puede representarse naturalmente como «Y dijo»; el sujeto explícito no es necesario aquí para claridad.
  - severity: low
    issue: «Los hijos de Amón» es menos natural que «los amonitas» en el texto principal.
    rationale: Aunque es más formalmente cercano, el español eclesial y general entiende mejor el etnónimo. Además, el inglés auditado eligió «the Ammonites» por naturalidad.
