review_pass:
  verdict: revise
  source_alignment_summary: El borrador español acierta en la estructura básica del versículo, mantiene «Yahvé» correctamente y refleja bien «entra», «escóndete» y «en el polvo». Sin embargo, no preserva fielmente el matiz clave de מִפְּנֵי («de delante de / de la presencia de») al traducir «a causa de», que reduce una huida desde la presencia a mera causalidad. Además, «esplendidez» no corresponde bien al uso natural ni al mejor equivalente de הָדָר en español; «esplendor» preserva mejor el par poético con «majestad».
  spanish_quality_summary: El texto es generalmente legible, pero «a causa del terror» debilita la imagen espacial y «esplendidez» suena poco natural y algo forzado en español bíblico actual. «Peña» es aceptable, pero «roca» sería más neutral; aun así no es necesario cambiarlo para fidelidad. La revisión propuesta mejora naturalidad y precisión sin expandir indebidamente el texto.
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé» para יְהוָה. «Terror» para פַּחַד también está bien en contexto de juicio. El principal desajuste terminológico está en מִפְּנֵי, donde debe conservarse mejor el sentido de presencia/alejamiento, y en הָדָר, donde «esplendor» es la forma española preferible frente a «esplendidez».
  issues:
  - severity: high
    issue: «a causa de» para מִפְּנֵי
    rationale: El hebreo expresa alejamiento ‘de delante de / desde la presencia de’, no solo causa. La nota reconoce el matiz, pero el texto principal lo pierde, en contra del audit trail inglés que lo preserva expresamente con ‘from before’.
  - severity: medium
    issue: «esplendidez» para הָדָר
    rationale: Aunque intenta distinguirse de «majestad», la palabra es poco natural y no es la mejor equivalencia española. «Esplendor» mantiene el valor léxico y la claridad literaria.
  - severity: low
    issue: Ligera tensión entre texto principal y nota en el marcador b
    rationale: La nota explica correctamente el matiz espacial, pero el texto principal lo contradice con una solución causal, de modo que la nota queda como corrección más que como alternativa.
