translation:
  language: es
  text: Florezcan sus huesos como un lirio[a], y sea renovado[b] su nombre en sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''como un lirio''; algunos han traducido la flor más generalmente o como ''rosa'', pero ''lirio'' es el sentido más probable de שושנה.'
    reason: lexical_alternative
  - marker: b
    text: O 'su nombre sea transmitido en sus hijos'. El verbo hebreo puede sugerir renovación o sucesión; la idea es que su nombre continúe en descendientes honrados.
    reason: lexical_alternative
lexical_decisions:
- source_word: תפרחנה / ἀναθάλοι
  english_pob_choice: blossom
  chosen_spanish: crezcan
  alternatives_spanish:
  - florezcan
  - retoñen
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego usan una imagen vegetal de brotar/florecer. En español, "crezcan" comunica el movimiento vital sin forzar una metáfora demasiado literal que sonaría extraña aplicada a huesos; conserva la imagen de vida emergente.
- source_word: עצמותם / τὰ ὀστᾶ αὐτῶν
  english_pob_choice: their bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - sus restos
  - sus osamentas
  lexicon: HALOT; LSJ
  rationale: Se preserva el término concreto "huesos" porque tanto el hebreo como el griego lo expresan así. "Restos" suavizaría la imagen y perdería la coincidencia léxica con el paralelo griego.
- source_word: כשושנה
  english_pob_choice: like a lily
  chosen_spanish: como lirio
  alternatives_spanish:
  - como azucena
  - como rosa
  lexicon: HALOT
  rationale: '"Lirio" es el equivalente más natural y fiel al valor floral de שושנה en este contexto. Mantiene la imagen botánica tradicional sin introducir una flor menos probable en la evidencia léxica.'
- source_word: ושמם / τὸ ὄνομα αὐτῶν
  english_pob_choice: their name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su reputación
  - su memoria
  lexicon: HALOT; LSJ
  rationale: Se conserva el sustantivo "nombre" para respetar el idiomatismo bíblico de memoria, fama y continuidad familiar. Esto deja abiertas las resonancias memoriales sin explicitar una sola interpretación.
- source_word: תחליף / ἀντικαταλλασσόμενον
  english_pob_choice: be renewed
  chosen_spanish: sea renovado
  alternatives_spanish:
  - sea pasado
  - continúe
  - sea intercambiado
  lexicon: HALOT; LSJ
  rationale: El verbo admite matices de renovación, sucesión o reemplazo. "Sea renovado" expresa bien la continuidad viva del nombre en la descendencia sin reducirlo a mera sustitución ni hacerlo sonar mecánico.
- source_word: לבניהם / ἐφʼ υἱοῖς δεδοξασμένων αὐτῶν
  english_pob_choice: in their sons
  chosen_spanish: en sus hijos
  alternatives_spanish:
  - en sus hijos varones
  - por medio de sus hijos
  lexicon: HALOT; LSJ
  rationale: Aunque el hebreo dice literalmente "sus hijos varones", en español bíblico "hijos" puede conservar la filiación dinástica de modo comprensible y natural. Se evita una formulación pesada, pero la nota permite recordar la especificidad masculina del hebreo y el griego.
theological_decisions:
- issue: Alcance de la imagen de los huesos floreciendo
  english_pob_reading: Memorial/restoration imagery without forcing bodily resurrection
  chosen_spanish_reading: 'Imaginería de memoria y honra: crezcan sus huesos como lirio'
  alternative_spanish_readings:
  - resurrección corporal
  - simple metáfora de prosperidad
  rationale: La línea describe honor póstumo y continuidad de la memoria; no obliga a leer una doctrina de resurrección corporal en este versículo aislado. "Crezcan" y "como lirio" preservan la fuerza poética sin sobrecargar el pasaje doctrinalmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Especificidad filial en el segundo hemistiquio
  english_pob_reading: their name be renewed in their sons
  chosen_spanish_reading: sea renovado su nombre en sus hijos
  alternative_spanish_readings:
  - sea renovado su nombre en sus descendientes
  - se conserve su nombre en su linaje
  rationale: Se mantiene la referencia a "hijos" porque el texto hebreo y el griego la concretan. Aunque el sentido incluye sucesión dinástica, la traducción no debe diluir la especificidad textual sin necesidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El hebreo de Kahana y el paralelo griego coinciden en la imagen de huesos que florecen y en la continuidad del nombre por la descendencia. La revisión inglesa retiró la frase 'from their place' por no estar en el hebreo provisto; por eso el español evita añadirla y sigue de cerca la lectura hebrea confirmada, sin perder la ayuda interpretativa del griego en el segundo hemistiquio.
  spanish_consistency_notes:
  - Se usa "huesos" en vez de suavizar a "restos" para mantener la concreción del original.
  - Se mantiene el paralelismo poético de dos miembros con estructura equivalente.
  - '"Lirio" se conserva como equivalente floral estándar y claro en español bíblico.'
  - No se introduce puntuación explicativa que rompa el ritmo sentencioso del verso.
