  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Dios'', ''Israel'' y ''gloria de Dios'' están bien. La corrección necesaria es léxica-contextual: para ταπεινοῦσθαι corresponde ''sean rebajadas'' o equivalente físico, no ''sean humilladas''.'
