translation:
  language: es
  text: Pero cada hombre morirá por su propia iniquidad; toda persona que come las uvas agrias[a] tendrá dentera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uvas inmaduras». El hebreo בֹּסֶר designa uvas que aún no han madurado; de ahí el sentido de «agrias».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Sino
  - Pero más bien
  lexicon: HALOT
  rationale: La pareja conjuntiva introduce contraste correctivo frente al proverbio rechazado en el versículo anterior. «Pero» comunica bien esa oposición en español sin forzar una paráfrasis.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - cada uno
  - un hombre
  lexicon: HALOT
  rationale: El sustantivo es singular y distributivo. «Cada hombre» conserva la fuerza individual y la referencia humana concreta del hebreo, con un registro natural en español bíblico.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: for his own iniquity
  chosen_spanish: por su propia iniquidad
  alternatives_spanish:
  - en su iniquidad
  - por su propio pecado
  - por su propia culpa
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o el castigo asociado. Aquí el texto enfatiza la causa moral personal de la muerte; «por su propia iniquidad» mantiene ese matiz y el sufijo posesivo.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - ha de morir
  lexicon: HALOT
  rationale: El futuro simple transmite la declaración profética de modo natural en español.
- source_word: כָּל הָאָדָם
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - todo hombre
  - cada persona
  - todo ser humano
  lexicon: HALOT
  rationale: אָדָם aquí es genérico. «Toda persona» evita la repetición de «hombre» y reproduce bien el valor distributivo sin perder la referencia humana universal.
- source_word: הָאֹכֵל
  english_pob_choice: who eats
  chosen_spanish: que coma
  alternatives_spanish:
  - que come
  - comiendo
  - el que coma
  lexicon: HALOT
  rationale: El participio funciona como relativo; en español, el subjuntivo «que coma» expresa adecuadamente la generalidad de la cláusula descriptiva dentro del enunciado proverbial.
- source_word: הַבֹּסֶר
  english_pob_choice: the sour grapes
  chosen_spanish: las uvas agrias
  alternatives_spanish:
  - las uvas verdes
  - las uvas inmaduras
  - las uvas ácidas
  lexicon: HALOT
  rationale: בֹּסֶר se refiere a uvas no maduras, con sabor agrio. «Uvas agrias» conserva la imagen proverbial y evita una traducción demasiado técnica o demasiado interpretativa.
- source_word: תִּקְהֶינָה שִׁנָּיו
  english_pob_choice: his teeth will be set on edge
  chosen_spanish: sus dientes se le pondrán ásperos
  alternatives_spanish:
  - sus dientes se le pondrán en punta
  - sus dientes se le adormecerán
  - sus dientes se le volverán ásperos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe el efecto desagradable de comer uvas agrias. En español, «se le pondrán ásperos» mantiene el efecto físico de forma comprensible sin depender de un modismo menos natural.
theological_decisions:
- issue: Responsabilidad individual frente al proverbio previo
  english_pob_reading: Each individual dies for his own iniquity, overturning the proverb's implication of transgenerational punishment in this context.
  chosen_spanish_reading: Cada hombre muere por su propia iniquidad; la imagen del proverbio no se mantiene aquí como regla de castigo heredado.
  alternative_spanish_readings:
  - Es solo una repetición proverbial sin énfasis doctrinal
  - La frase habla del pecado colectivo de una familia
  rationale: El hebreo contrasta deliberadamente con el dicho anterior. La traducción conserva esa corrección sin resolver más allá del versículo la tensión bíblica más amplia sobre responsabilidad individual y consecuencias comunitarias.
  doctrine_reference: Preservar la tensión teológica del texto; no importar conclusiones doctrinales que el versículo no enuncia explícitamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al mantener la segunda cláusula con una designación distributiva más natural («toda persona») y al conservar la equivalencia idiomática del efecto de comer uvas agrias. Se evitó repetir «hombre» dos veces en español, como también hizo la revisión inglesa al pasar de 'every man' a 'every person'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera; este versículo no lo contiene.
  - Se optó por «uvas agrias» para preservar el valor proverbial de בֹּסֶר y la nota lexical cubre la alternativa «uvas inmaduras».
  - Se conservó la estructura contrastiva del hebreo con «Pero» al inicio, sin suavizarla a una explicación.
  - La última cláusula se traduce como efecto idiomático más que como descripción anatómica literal, para reflejar el hebreo y leer con naturalidad en español.
