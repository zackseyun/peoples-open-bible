translation:
  language: es
  text: La justicia exalta a una nación[a], pero el pecado es una vergüenza para los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la segunda línea es difícil. Tradicionalmente se entiende que el pecado trae reproche o deshonra sobre los pueblos; alternativamente, la palabra traducida «pecado» puede entenderse como «desgracia», y la otra palabra de la cláusula también ha sido tomada en el sentido raro de «reproche».
    reason: alternative_reading

lexical_decisions:
- source_word: צְדָקָה
  english_pob_choice: Righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: En este proverbio sapiencial, צְדָקָה expresa lo que es moral y socialmente correcto. 'Justicia' conserva bien el valor ético amplio y permite una antítesis natural con 'pecado' en español. 'Rectitud' sería posible, pero aquí 'justicia' suena más idiomática y mantiene la fuerza pública del dicho.
- source_word: תְרוֹמֵם
  english_pob_choice: exalts
  chosen_spanish: exalta
  alternatives_spanish:
  - levanta
  - eleva
  lexicon: HALOT
  rationale: El verbo de רום indica levantar o poner en alto. 'Exalta' comunica esa elevación figurada en un registro proverbial y público, muy cercano al sentido del inglés POB sin sonar mecánico en español.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: una nación
  alternatives_spanish:
  - un pueblo
  - una gente
  lexicon: HALOT
  rationale: Aquí גּוֹי designa una colectividad política o étnica de modo general. 'Nación' es la equivalencia más natural en español y preserva el contraste con el plural final.
- source_word: חֶסֶד
  english_pob_choice: sin
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - reproche
  - maldad
  lexicon: HALOT
  rationale: El texto consonántico presenta חֶסֶד, pero el audit trail inglés documenta la dificultad del segundo hemistiquio y la lectura tradicional de un sentido negativo asociado a la vergüenza pública. En español, 'vergüenza' refleja bien el valor resultante del proverbio sin ocultar la tensión textual; además evita forzar el sentido usual de חֶסֶד como 'bondad/lealtad' contra el paralelismo.
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: El plural pide conservar la referencia a varios grupos colectivos. 'Los pueblos' mantiene el plural y la relación poética con la singular 'nación' del primer verso.
- source_word: חַטָּאת
  english_pob_choice: a disgrace
  chosen_spanish: el pecado
  alternatives_spanish:
  - una ofensa
  - la culpa
  lexicon: HALOT
  rationale: 'El inglés POB toma el sustantivo en el sentido de pecado que produce vergüenza. En español, ''el pecado'' expresa con claridad la acción/cualidad culpable, mientras que la vergüenza resultante se recoge en la segunda cola mediante ''vergüenza''. Esto conserva la antítesis: justicia exalta, pecado deshonra.'
theological_decisions:
- issue: Lectura de la segunda línea hebrea, difícil y ambigua
  english_pob_reading: '''but sin is a disgrace to peoples'''
  chosen_spanish_reading: '''pero el pecado es una vergüenza para los pueblos'''
  alternative_spanish_readings:
  - '''pero la lealtad/benignidad para los pueblos es pecado'''
  - '''pero la vergüenza es pecado para los pueblos'''
  rationale: La tradición interpretativa entiende que el paralelismo pide un contraste negativo con 'justicia'. Aunque חֶסֶד normalmente significa bondad/lealtad, el contexto proverbiale hace que la línea comunique vergüenza o deshonra pública causada por el pecado. La redacción española conserva esa lectura tradicional sin borrar la dificultad textual indicada por el POB inglés.
  doctrine_reference: Translation philosophy §3 (preserve genuine ambiguity where contested)
translation_notes:
  revision_awareness: El inglés POB más reciente no registra cambios respecto del texto base. La presente propuesta sigue esa lectura estable y traslada al español la tensión del segundo hemistiquio con una solución clara pero auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva «justicia» para צְדָקָה en coherencia con el valor ético amplio usado en sabiduría.
  - Se evita traducir חֶסֶד mecánicamente como «bondad» porque el audit trail documenta una lectura problemática y negativa en este contexto.
  - Se usa el plural «los pueblos» para לְאֻמִּים sin aplastar la simetría poética con «una nación».
