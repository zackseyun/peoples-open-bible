translation:
  language: es
  text: Al principio, cuando Dios creó los cielos y la tierra[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradicionalmente se traduce como una oración completa: «Al principio, Dios creó los cielos y la tierra». El hebreo (בְּרֵאשִׁית sin artículo definido + verbo finito בָּרָא) se lee con más naturalidad como una cláusula temporal dependiente, en paralelo con Gn 2:4b. La cláusula principal aparece en el v. 3 («Dijo Dios: “Sea la luz”»).'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרֵאשִׁית
  english_pob_choice: In the beginning, when … created
  chosen_spanish: En el principio, cuando … creó
  alternatives_spanish:
  - En el principio, Dios creó
  - Cuando Dios comenzó a crear
  lexicon: HALOT
  rationale: La forma hebrea בְּרֵאשִׁית, sin artículo y seguida de un verbo finito, favorece una construcción temporal dependiente. En español, «En el principio, cuando Dios creó…» conserva ese valor temporal y refleja la lectura auditada del POB en inglés, sin forzar una cláusula principal independiente que el hebreo no exige con claridad.
- source_word: בָּרָא
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - formó
  - hizo
  lexicon: HALOT
  rationale: בָּרָא es el verbo estándar para la acción creadora de Dios en hebreo bíblico. «Creó» es la equivalencia directa y natural en español, y no introduce detalles sobre el modo de la creación que el texto no especifica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, aquí lleva verbo singular y el contexto señala inequívocamente al Dios de Israel. «Dios» preserva ese referente singular sin perder la fuerza del hebreo.
- source_word: אֵת
  english_pob_choice: '[not translated; direct-object marker]'
  chosen_spanish: '[no se traduce; marca de objeto directo]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: אֵת funciona como marcador del objeto directo definido en hebreo y no tiene equivalente léxico en español. Se deja sin traducir para no añadir material ajeno al texto.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «los cielos». En esta merisma con «la tierra», la pluralidad formal del hebreo se preserva mejor que con el singular «el cielo».
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: HALOT
  rationale: En contraste con «los cielos», אָרֶץ en este contexto cósmico designa la tierra como parte del conjunto creado. «La tierra» es la opción más directa y fiel en español.
theological_decisions:
- issue: Estructura sintáctica del inicio
  english_pob_reading: 'Dependent temporal clause: ''In the beginning, when God created the heavens and the earth—'''
  chosen_spanish_reading: 'Cláusula temporal dependiente: «En el principio, cuando Dios creó los cielos y la tierra—»'
  alternative_spanish_readings:
  - 'Cláusula independiente: «En el principio, Dios creó los cielos y la tierra.»'
  rationale: La evidencia hebrea favorece leer בְּרֵאשִׁית con verbo finito como una cláusula temporal dependiente. La traducción española sigue esa lectura para preservar la tensión documentada por el POB inglés, en lugar de resolverla de manera automática con la formulación tradicional de cláusula principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Merisma cosmológica
  english_pob_reading: '''the heavens and the earth'' as a totality of the created order'
  chosen_spanish_reading: «los cielos y la tierra» como totalidad de lo creado
  alternative_spanish_readings:
  - «el cielo y la tierra»
  - «el universo»
  rationale: La pareja hebrea funciona como merisma para la totalidad de la creación. Se conserva la forma dual de la expresión en español para mantener la resonancia bíblica y la transparencia respecto del hebreo, en vez de resumirla con un término abstracto.
  doctrine_reference: Génesis 1:1; cf. la función de merisma en el texto hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que adoptó la formulación híbrida equivalente a una cláusula temporal dependiente y afinó la nota para mencionar la alternativa tradicional, el fundamento gramatical y el lugar donde aparece la cláusula principal.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, acorde con el verbo singular y la referencia singular.
  - Se prefirió «cielos» en plural para respetar la forma hebrea y la merisma con «la tierra».
  - Se evitó «SEÑOR» o equivalentes de ocultamiento para el nombre divino, porque este versículo usa אֱלֹהִים, no יהוה.
  - La puntuación con raya final reproduce la expectativa sintáctica de una cláusula dependiente, en línea con la lectura auditada.
