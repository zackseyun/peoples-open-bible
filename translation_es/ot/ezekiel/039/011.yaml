translation:
  language: es
  text: Y acontecerá en aquel día que daré a Gog un lugar de sepultura[a] allí en Israel, el Valle de los que pasan[b], al oriente del mar[c]; y bloqueará a los que pasan. Allí sepultarán a Gog y a toda su multitud, y lo llamarán el Valle de Hamón-gog[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un lugar allí para una tumba» / «un sitio de sepultura allí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el valle de los pasantes» / «el valle de los que pasan por allí».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «frente al mar»; la expresión hebrea puede indicar orientación espacial, no necesariamente dirección estrictamente oriental.'
    reason: lexical_alternative
  - marker: d
    text: «Hamón-gog» probablemente significa «multitud de Gog».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם שָׁם קֶבֶר
  english_pob_choice: a burial place there
  chosen_spanish: un lugar para sepultura
  alternatives_spanish:
  - un lugar allí para una tumba
  - un sitio de sepultura allí
  lexicon: HALOT
  rationale: La combinación hebrea une 'lugar', 'allí' y 'sepultura/tumba'. 'Un lugar para sepultura' conserva la idea funeraria sin forzar un giro poco natural en español. El adverbio 'allí' mantiene שָׁם en la frase principal.
- source_word: גֵּי הָעֹבְרִים
  english_pob_choice: the Valley of the Passersby
  chosen_spanish: el Valle de los que pasan
  alternatives_spanish:
  - el Valle de los Pasantes
  - el valle de los que pasan por allí
  lexicon: HALOT
  rationale: הָעֹבְרִים es un participio sustantivado de עבר, 'los que pasan'. En español, 'los que pasan' transmite mejor el sentido que un sustantivo como 'viajeros', que sería más interpretativo. Mantengo el valor toponímico con mayúscula en 'Valle'.
- source_word: קִדְמַת הַיָּם
  english_pob_choice: east of the sea
  chosen_spanish: al oriente del mar
  alternatives_spanish:
  - frente al mar
  - hacia el oriente del mar
  lexicon: HALOT
  rationale: קִדְמַת puede significar 'en frente de' o indicar orientación geográfica. 'Al oriente del mar' conserva la localización direccional de forma clara y digna en español, sin cerrar innecesariamente la posible matización espacial.
- source_word: וְחֹסֶמֶת הִיא אֶת הָעֹבְרִים
  english_pob_choice: and it will block the passersby
  chosen_spanish: y bloqueará a los que pasan
  alternatives_spanish:
  - y cerrará el paso a los que pasan
  - y obstaculizará a los que pasan
  lexicon: HALOT
  rationale: חסם significa bloquear, cerrar o obstruir. 'Bloqueará a los que pasan' es directo y fiel al efecto de impedir el tránsito, sin añadir una explicación ausente del hebreo. Reemplacé la referencia impersonal por el objeto humano explícito para que el español fluya naturalmente.
- source_word: הֲמוֹנֹה
  english_pob_choice: his multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su muchedumbre
  - su gente
  lexicon: HALOT
  rationale: הָמוֹן suele expresar multitud, masa o muchedumbre. 'Su multitud' preserva la amplitud del término y el poseedor pronominal, evitando una carga bélica que el hebreo no exige por sí sola.
- source_word: גֵּיא הֲמוֹן גּוֹג
  english_pob_choice: the Valley of Hamon-gog
  chosen_spanish: el Valle de Hamón-gog
  alternatives_spanish:
  - el Valle de la multitud de Gog
  - el valle de Gog-multitud
  lexicon: HALOT
  rationale: Como topónimo nuevo, conviene transliterar la forma compuesta para preservar su carácter de nombre propio. En español, 'Hamón-gog' deja visible el elemento הֲמוֹן ('multitud') sin convertir el nombre en una paráfrasis poco natural.
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  english_pob_choice: And it will be in that day
  chosen_spanish: Y acontecerá en aquel día
  alternatives_spanish:
  - Y será en aquel día
  - Y sucederá en aquel día
  lexicon: HALOT
  rationale: La fórmula profética se presta bien a 'acontecerá en aquel día', que conserva solemnidad bíblica y fluidez en español. 'En aquel día' refleja la deíxis temporal de la expresión hebrea.
- source_word: אֶתֵּן לְגוֹג
  english_pob_choice: I will give Gog
  chosen_spanish: daré a Gog
  alternatives_spanish:
  - concederé a Gog
  - asignaré a Gog
  lexicon: HALOT
  rationale: נתן con ל expresa dar o conceder algo a alguien. El contexto muestra que lo dado es un lugar de sepultura; por eso 'daré a Gog' es suficientemente fiel y evita añadir elementos que el versículo ya desarrolla después.
theological_decisions:
- issue: Cómo reflejar el topónimo final sin perder su sentido composicional
  english_pob_reading: Transliterate as 'Hamon-gog' in the main text
  chosen_spanish_reading: Transliterar como 'Hamón-gog' en el texto principal
  alternative_spanish_readings:
  - traducir como 'la multitud de Gog'
  - escribir 'Gog-multitud'
  rationale: El final funciona como nombre de lugar recién acuñado; por eso la transliteración preserva su estatus de topónimo. La nota puede exponer su sentido composicional sin borrar la forma nominal que el texto crea.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El inglés auditado pasó de 'Travelers' a 'Passersby' para reflejar más directamente הָעֹבְרִים; por eso la versión española usa 'los que pasan' y mantiene esa coherencia en ambas ocurrencias. También se respetó la decisión de transliterar el topónimo final en lugar de traducirlo semánticamente.
  spanish_consistency_notes:
  - Se mantiene 'Gog' sin adaptación, como nombre propio del original.
  - Se conserva 'Valle' con mayúscula por tratarse de un topónimo.
  - '''Al oriente del mar'' mantiene la orientación geográfica sin introducir ''frente a'' en el texto principal.'
  - La fórmula profética 'Y acontecerá en aquel día' preserva el tono solemne del hebreo sin caer en un calco excesivamente rígido.
  - '''Los que pasan'' reproduce el participio sustantivado הָעֹבְרִים con naturalidad en español, evitando ''viajeros'' por ser más interpretativo.'
