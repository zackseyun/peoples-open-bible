    rationale: Dado que el texto principal habla de «la tierra», conviene que la nota explique de forma transparente que el verbo hebreo también puede entenderse con un sujeto personal implícito en otras interpretaciones, evitando confusión para el lector.
  revised_spanish_text: 'Y dirá[a]: «No soy profeta; soy un hombre que trabaja la tierra, porque la tierra ha sido mi posesión desde mi juventud».

