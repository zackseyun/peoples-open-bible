translation:
  language: es
  text: Porque los amalecitas y los cananeos están allí delante de ustedes, y caerán a espada, porque se apartaron de seguir a Yahvé, y Yahvé no estará con ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia previa; en español, «Porque» comunica con naturalidad la relación explicativa sin perder la fuerza causal del hebreo.
- source_word: הָעֲמָלֵקִי
  english_pob_choice: the Amalekites
  chosen_spanish: los amalecitas
  alternatives_spanish:
  - el amalecita
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el referente es un grupo étnico; el plural español es el equivalente más natural y claro.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: and the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Igual que con «amalecitas», el nombre funciona colectivamente; el plural evita una lectura artificial en español.
- source_word: שָׁם לִפְנֵיכֶם
  english_pob_choice: are there before you
  chosen_spanish: están allí delante de ustedes
  alternatives_spanish:
  - están allí frente a ustedes
  - están allí ante ustedes
  lexicon: HALOT
  rationale: Conserva el sentido espacial de «allí» y la relación de presencia/oposición de «delante de ustedes», en un español fluido y fiel.
- source_word: וּנְפַלְתֶּם
  english_pob_choice: and you will fall
  chosen_spanish: y caerán
  alternatives_spanish:
  - y ustedes caerán
  - y serán abatidos
  lexicon: HALOT
  rationale: En contexto bélico, נפל implica derrota o muerte; «caerán» mantiene el valor verbal básico y la fuerza narrativa del anuncio.
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «a espada» reproduce bien el instrumento de muerte en combate y evita una formulación más pesada.
- source_word: כִּי עַל כֵּן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - por eso
  lexicon: HALOT
  rationale: La expresión da la base causal de la sentencia; «porque» permite expresar esa relación de forma directa y natural.
- source_word: שַׁבְתֶּם מֵאַחֲרֵי יְהוָה
  english_pob_choice: you have turned back from following Yahweh
  chosen_spanish: se han vuelto de seguir a Yahvé
  alternatives_spanish:
  - han vuelto atrás de Yahvé
  - se han apartado de seguir a Yahvé
  lexicon: HALOT
  rationale: «Volverse de seguir» conserva la imagen de retroceso desde el seguimiento, sin reducirla a una mera renuncia abstracta. Se mantiene «Yahvé» según la política del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se translitera como «Yahvé», conforme al estándar del proyecto, preservando el nombre personal del pacto y no sustituyéndolo por un título.
- source_word: וְלֹא יִהְיֶה יְהוָה עִמָּכֶם
  english_pob_choice: and Yahweh will not be with you
  chosen_spanish: y Yahvé no estará con ustedes
  alternatives_spanish:
  - y Yahvé no será con ustedes
  - y Yahvé no estará junto a ustedes
  lexicon: HALOT
  rationale: «Estará con ustedes» expresa con claridad la presencia pactual; el futuro negativo sigue de manera directa la advertencia del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La línea editorial del POB documenta la transliteración del nombre divino en lugar de una sustitución por un título, por lo que en español se conserva «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión inglesa indicada como unchanged; no se documentan cambios posteriores. La traducción sigue la lectura estable del audit trail inglés y adapta la sintaxis al español sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - Se usa plural para los nombres étnicos colectivos («amalecitas», «cananeos») por claridad natural en español.
  - La imagen de «seguir» se conserva para mantener la relación de discipulado/covenantalidad implícita en מֵאַחֲרֵי.
  - «A espada» reproduce el instrumento de muerte en clave bíblica sin sobreexplicar.
