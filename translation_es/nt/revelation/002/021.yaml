review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todo: ἔδωκα → «le di», χρόνον → «tiempo», θέλει → «quiere», y πορνείας → «inmoralidad sexual» son decisiones fieles y naturales. El problema principal está en la nota al pie: el inglés documenta la alternativa más literal «from her sexual immorality», mientras que la nota española repite esencialmente la lectura principal con «de», por lo que no preserva la distinción lexical de ἐκ.'
  spanish_quality_summary: El texto base es claro, natural y de registro digno para español eclesial contemporáneo. «Y le di tiempo para que se arrepintiera, pero no quiere arrepentirse de su inmoralidad sexual» lee bien. Solo conviene corregir la nota para que refleje de verdad la alternativa literal. También es preferible quitar las comillas sobrantes dentro de la nota.
  glossary_alignment: 'Alinea bien con los defaults del proyecto: μετανοέω se traduce apropiadamente como «arrepentirse» en contexto de pecado; πορνεία como «inmoralidad sexual» mantiene la especificidad lexical sin sobreinterpretar; no hay conflictos con terminología fija del proyecto.'
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa literal documentada para ἐκ.
    rationale: El inglés conserva una nota para la diferencia entre el idiomático «repent of» y el más literal «repent from». La nota española actual dice «arrepentirse de su inmoralidad sexual», que no aporta alternativa real porque coincide con la preposición ya usada en el texto principal.
  - severity: low
    issue: Puntuación/estilo de la nota al pie innecesariamente cargados.
    rationale: 'Las comillas simples y dobles en la nota («''O, más literalmente: ...''») se sienten mecánicas. Una redacción limpia mejora legibilidad sin afectar el contenido.'
  revised_spanish_text: Y le di tiempo para que se arrepintiera[a], pero no quiere arrepentirse de su inmoralidad sexual.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «arrepentirse de entre su inmoralidad sexual».'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal porque es fiel y natural. Se corrige únicamente la nota para preservar la razón lexical documentada en inglés: el griego usa ἐκ («de entre / desde fuera de»), mientras que el español idiomático del cuerpo del texto usa «de». «De entre su inmoralidad sexual» no es la opción más pulida para el texto principal, pero sí funciona como alternativa más literal en nota.'
