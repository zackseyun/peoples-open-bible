review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: el modismo שְׂאוּ אֶת־רֹאשׁ se entiende como mandato censal, mantiene toda la congregación, conserva ''los hijos de Israel'', refleja el umbral de edad y la organización por casas paternas, y expresa la referencia militar de כָּל יֹצֵא צָבָא. Sin embargo, hay dos desajustes importantes: el verbo hebreo está en plural (''ustedes''), no singular (''Haz''); y la nota [a] omite ''de toda la congregación'', que forma parte del modismo completo documentado en el English POB.'
  spanish_quality_summary: El español es mayormente claro y eclesialmente legible, pero 'Haz un censo' falla en concordancia con el imperativo plural del original. Además, 'desde los veinte años de edad y más' suena algo rígido; 'de veinte años para arriba' o 'de veinte años en adelante' sería más natural. También conviene evitar el relativo plural masculino 'todos los que' cuando puede simplificarse a 'todos en Israel que salen a la guerra', más cercano al inglés auditado y más fluido.
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. 'Los hijos de Israel' respeta la decisión auditada sobre בְּנֵי יִשְׂרָאֵל. 'Congregación' y 'casas paternas' están bien alineados. 'La guerra' para צָבָא en esta construcción es defendible y coincide con el rastro inglés.
  issues:
  - severity: high
    issue: Imperativo singular en vez de plural
    rationale: שְׂאוּ es imperativo masculino plural. 'Haz un censo' cambia el número del mandato. Debe ser 'Hagan un censo' o equivalente plural.
  - severity: medium
    issue: Nota [a] incompleta frente al audit trail inglés
    rationale: La nota inglesa explica literalmente 'Lift up the head of the whole congregation'. La nota española dice solo 'Levanta la cabeza', omitiendo 'de toda la congregación', lo cual reduce la evidencia literal preservada.
  - severity: low
    issue: Expresión de edad poco natural
    rationale: '''Desde los veinte años de edad y más'' es comprensible pero suena forzada en español. ''De veinte años para arriba'' o ''de veinte años en adelante'' conserva bien el sentido y mejora la naturalidad.'
  revised_spanish_text: Hagan un censo[a] de toda la congregación de los hijos de Israel, de veinte años para arriba[b], por sus casas paternas, todos en Israel que salen a la guerra[c].
  revised_footnotes:
