revisions:
- from: Pero los hombres no quisieron escucharle[a], así que el hombre se aferró a su concubina y la sacó hacia ellos. Y ellos la conocieron y la abusaron toda la noche hasta la mañana; luego la despidieron al alba.
  to: Pero los hombres no quisieron escucharlo, así que el hombre agarró a su concubina y la sacó afuera, a donde estaban ellos. Y la conocieron[a] y la maltrataron toda la noche hasta la mañana; luego la dejaron ir al alba.
  rationale: 'Se corrigieron tres puntos principales: (1) «agarró» reemplaza «se aferró a» para reflejar la acción coercitiva de וַיַּחֲזֵק; (2) «la maltrataron» reemplaza «la abusaron» por ser español natural y fiel al sentido degradante de וַיִּתְעַלְּלוּ בָהּ; (3) «la sacó afuera, a donde estaban ellos» expresa con claridad la expulsión hacia los agresores, manteniendo הַחוּץ sin torpeza. La nota se reubicó sobre «la conocieron» porque allí pertenece el eufemismo hebreo documentado en el POB inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:02:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y del POB inglés: la negativa de los hombres, la acción coercitiva del hombre con su concubina, el eufemismo sexual «la conocieron», el abuso prolongado durante la noche, y su liberación al amanecer. Sin embargo, varias decisiones españolas no representan bien el valor léxico ni suenan naturales: «se aferró a» no corresponde bien a וַיַּחֲזֵק en este contexto de apoderarse de ella; «la abusaron» es impropio en español estándar; y «la sacó hacia ellos» es menos natural que una formulación con «a donde estaban ellos» o «se la sacó».'
  spanish_quality_summary: 'La redacción actual es entendible, pero contiene giros poco idiomáticos o incorrectos para español bíblico claro: «se aferró a su concubina» sugiere aferrarse para no soltar, no tomarla por la fuerza; «la abusaron» no es una construcción estándar; y «la sacó hacia ellos» resulta torpe. Conviene mantener el eufemismo «la conocieron» con nota, pero mejorar el resto para dignidad y naturalidad.'
  glossary_alignment: No hay conflictos con la terminología doctrinal global. «Concubina» está bien. La nota sobre «la conocieron» preserva correctamente el eufemismo hebreo. La mejora principal es léxica y estilística, no terminológica del glosario.
  issues:
  - severity: high
    issue: «se aferró a su concubina» no refleja adecuadamente וַיַּחֲזֵק
    rationale: El hebreo aquí expresa tomarla/agarrarla con fuerza para entregarla; «aferrarse a» en español suele significar sujetarse a algo o no soltarlo, lo que desvía la escena.
  - severity: high
    issue: «la abusaron» es español no natural o incorrecto
    rationale: En español general se dice «abusaron de ella» o, mejor aquí, «la maltrataron» / «la ultrajaron». La forma transitiva directa «abusaron» no es adecuada para una traducción bíblica cuidada.
  - severity: medium
    issue: «la sacó hacia ellos» suena torpe y no idiomático
    rationale: Aunque intenta reflejar dirección, el resultado no es natural. El sentido de וַיֹּצֵא אֲלֵיהֶם הַחוּץ se expresa mejor con «la sacó afuera, a donde estaban ellos» o similar.
  - severity: low
    issue: La nota [a] está anclada en «escucharle» en vez de en «la conocieron»
    rationale: La nota explica el eufemismo de וַיֵּדְעוּ אֹתָהּ, por lo que debe aparecer sobre esa frase para claridad editorial.
  revised_spanish_text: Pero los hombres no quisieron escucharlo, así que el hombre agarró a su concubina y la sacó afuera, a donde estaban ellos. Y la conocieron[a] y la maltrataron toda la noche hasta la mañana; luego la dejaron ir al alba.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «la conocieron», un eufemismo para violación sexual en este contexto.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron tres puntos principales: (1) «agarró» reemplaza «se aferró a» para reflejar la acción coercitiva de וַיַּחֲזֵק; (2) «la maltrataron» reemplaza «la abusaron» por ser español natural y fiel al sentido degradante de וַיִּתְעַלְּלוּ בָהּ; (3) «la sacó afuera, a donde estaban ellos» expresa con claridad la expulsión hacia los agresores, manteniendo הַחוּץ sin torpeza. La nota se reubicó sobre «la conocieron» porque allí pertenece el eufemismo hebreo documentado en el POB inglés.'
