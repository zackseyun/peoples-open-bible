    issue: 'Expresión poco natural: «y le es añadido más»'
    rationale: Aunque intenta reflejar la pasividad/resultatividad de וְנוֹסָף עוֹד, en español suena rígido y menos idiomático que «pero aumenta aún más» o «y gana aún más». El proverbio requiere fluidez memorable.
  - severity: medium
    issue: 'Resultado final débil: «para la escasez»'
    rationale: לְמַחְסוֹר en este contexto sapiencial apunta al desenlace de carencia/pobreza. «Para la escasez» es extraño en español y menos contundente que «a la pobreza».
  - severity: high
    issue: Nota al pie mal anclada
    rationale: El marcador [a] está puesto en «reparte», pero la nota explica la dificultad de מִיֹּשֶׁר, correspondiente a «más de lo justo». Esto incumple la disciplina de notas y puede confundir al lector.
