  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: no aparece el nombre divino aquí; «los hijos de Israel» respeta la decisión pactal; «gavilla» con nota sobre «omer» refleja correctamente la rationale documentada; «sacerdote» es estándar y fiel.'
