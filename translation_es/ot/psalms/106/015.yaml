translation:
  language: es
  text: Así les dio lo que pidieron[a], pero envió consunción[b] a su alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su petición».
    reason: lexical_alternative
  - marker: b
    text: O «emaciación» o «desgaste».
    reason: lexical_alternative
  - marker: c
    text: Hebreo nephesh; a menudo «alma», pero también «vida», «ser» o «persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  - les otorgó
  lexicon: HALOT
  rationale: דָּתָן/נתן expresa dar de manera directa; en español, «dio» conserva la sencillez del verbo hebreo sin introducir matices más interpretativos como «concedió» o «otorgó».
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento indirecto se expresa naturalmente con «les» en español, manteniendo la relación verbal sin redundancia.
- source_word: שֶׁאֱלָתָם
  english_pob_choice: what they asked for
  chosen_spanish: lo que pidieron
  alternatives_spanish:
  - su petición
  - lo que solicitaron
  - su pedido
  lexicon: HALOT
  rationale: שֶׁאֱלָה denota «pedido, cosa pedida». «Lo que pidieron» conserva el valor de objeto pedido y suena natural en español; «su petición» es posible, pero nombra la cosa más que el acto/resultante.
- source_word: וַיְשַׁלַּח
  english_pob_choice: but sent
  chosen_spanish: pero envió
  alternatives_spanish:
  - y envió
  - mas envió
  lexicon: HALOT
  rationale: 'El hebreo coordina con contraste narrativo: Dios satisfizo el pedido y, a la vez, trajo juicio. «Pero envió» reproduce ese giro adversativo de forma clara sin sobreparafrasear.'
- source_word: רָזוֹן
  english_pob_choice: leanness
  chosen_spanish: desmedro
  alternatives_spanish:
  - delgadez
  - consunción
  - emaciación
  lexicon: HALOT
  rationale: רָזוֹן puede significar leanness, wasting, emaciation. «Desmedro» comunica pérdida, debilitamiento y deterioro en un español culto y comprensible; evita la apariencia demasiado física o técnica de «emaciación», aunque esa sigue siendo una alternativa válida.
- source_word: בְּנַפְשָׁם
  english_pob_choice: into their soul
  chosen_spanish: a su alma
  alternatives_spanish:
  - en su alma
  - en su vida
  - en su ser
  lexicon: HALOT
  rationale: 'נֶפֶשׁ tiene un campo semántico amplio: alma, vida, ser, persona. «A su alma» sigue de cerca la lectura de la POB en inglés y conserva la profundidad antropológica del término; la preposición «a» puede expresar aquí el alcance/intromisión del juicio.'
theological_decisions:
- issue: Alcance de נֶפֶשׁ en un contexto de juicio
  english_pob_reading: Retain 'soul' in the main text
  chosen_spanish_reading: Mantener «alma» en el texto principal
  alternative_spanish_readings:
  - vida
  - ser
  - persona
  rationale: Aunque «alma» no agota el sentido de נֶפֶשׁ, preserva el peso teológico del texto y su resonancia bíblica. Una nota puede recordar que el hebreo también puede significar vida, ser o persona.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Concordé la redacción con el audit trail inglés: mantuve la estructura de dos cláusulas, el contraste adversativo y el paralelismo entre el don concedido y el juicio enviado. No se registraron revisiones aplicadas en el expediente base.'
  spanish_consistency_notes:
  - Usé «Yahvé» para el nombre divino solo cuando el texto lo requiriera; en este versículo no aparece.
  - Preferí «alma» para נֶפֶשׁ siguiendo la decisión auditada en inglés, con nota explicativa para no estrechar indebidamente el campo semántico.
  - Mantengo un registro bíblico natural en español, evitando calcos como «leanness» o «soul» y conservando la tensión teológica del versículo.
