translation:
  language: es
  text: Y tomó Jazer y sus aldeas[a], y regresó a Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus hijas», un modismo para los asentamientos menores dependientes de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: προκατελάβε
  english_pob_choice: captured
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - ocupó
  - se apoderó de
  lexicon: LSJ
  rationale: El verbo compuesto en contexto militar expresa la toma de posesión de una plaza. En español, «tomó» conserva la concisión narrativa y la acción militar sin forzar un calco; «capturó» también sería posible, pero aquí «tomó» suena más natural y sigue siendo fiel al sentido de conquista.
- source_word: Ἰαζήρ
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Jazér
  lexicon: transliteración bíblica tradicional
  rationale: Se conserva la transliteración estable «Jazer», que corresponde al referente geográfico del texto griego y es inteligible para lectores bíblicos en español.
- source_word: θυγατέρας
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - pueblos dependientes
  - ciudades hijas
  lexicon: LSJ
  rationale: El griego usa «hijas» como idiomática de asentamientos satélite. «Aldeas» comunica de forma clara y natural el valor geográfico en español, manteniendo la relación de dependencia implícita sin imponer una paráfrasis excesiva.
- source_word: ἀπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - se volvió
  lexicon: LSJ
  rationale: El verbo significa volver o retornar. «Regresó» es idiomático en español y preserva la brevedad del relato militar.
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la tierra de Judea
  - Judá
  lexicon: uso geográfico helenístico
  rationale: En este contexto Ἰουδαία designa la región de Judea, no el antiguo territorio tribal de Judá. La forma «Judea» es precisa y convencional.
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con la versión inglesa auditada: solo presenta una escena militar breve con un modismo geográfico. La revisión disponible indica sin cambios y acuerdo alto; por ello se mantiene una traducción sobria y directa, conservando el valor idiomático de θυγατέρας en nota.'
  spanish_consistency_notes:
  - Se mantiene la transliteración «Jazer» para el topónimo.
  - Se traduce ἀπέστρεψεν con un verbo simple y narrativo («regresó») para conservar el ritmo breve del versículo.
  - Se evita «SEÑOR» u այլ terminología no pertinente, ya que el versículo no contiene lenguaje divino.
  - La nota [a] se ancla en «aldeas» para señalar el modismo de «hijas» sin oscurecer el sentido.
