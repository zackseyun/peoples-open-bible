translation:
  language: es
  text: Muchas son las aflicciones[a] del justo[b], pero Yahvé lo libra de todas ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «males», «dificultades» o «calamidades». El hebreo רָעוֹת puede abarcar diversas clases de desgracias; aquí se refiere a las dificultades que sobrevienen al justo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el justo», forma masculina singular que puede funcionar de manera representativa para la persona justa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  english_pob_choice: Many are
  chosen_spanish: Muchas son
  alternatives_spanish:
  - Numerosas son
  lexicon: HALOT
  rationale: El hebreo abre con un adjetivo predicativo en posición enfática. «Muchas son» conserva esa estructura natural en español sin perder el énfasis cuantitativo.
- source_word: רָעוֹת
  english_pob_choice: afflictions
  chosen_spanish: aflicciones
  alternatives_spanish:
  - males
  - males/troubles
  - tribulaciones
  - calamidades
  lexicon: HALOT
  rationale: En este contexto, el término describe adversidades que le suceden al justo, no mal moral cometido por él. «Aflicciones» expresa bien ese sentido sin suavizar la dureza del original.
- source_word: צַדִּיק
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo varón
  - el justo hombre
  - los justos
  lexicon: HALOT
  rationale: El hebreo es singular masculino sustantivado. En español, «el justo» conserva la forma singular y la fuerza representativa sin añadir una palabra innecesaria como «varón», que sonaría más marcada de lo que exige el versículo.
- source_word: וּמִכֻּלָּם
  english_pob_choice: but ... out of them all
  chosen_spanish: pero ... de todas ellas
  alternatives_spanish:
  - y de todas ellas
  - sin excepción de todas
  - y de todas
  lexicon: HALOT
  rationale: El valor contrastivo del miembro final se expresa con «pero». «De todas ellas» conserva la amplitud de כֻּלָּם y su referencia a las aflicciones mencionadas.
- source_word: יַצִּילֶנּוּ
  english_pob_choice: delivers him
  chosen_spanish: lo libra
  alternatives_spanish:
  - lo rescata
  - lo saca
  - lo salva
  lexicon: HALOT
  rationale: El verbo hiphil de נצל puede significar rescatar o librar. «Lo libra» es idiomático en español bíblico contemporáneo y mantiene la idea de liberación efectiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. En el español de POB, la forma establecida para el nombre divino es «Yahvé», conservando el nombre propio en lugar de sustituirlo por un título.
theological_decisions:
- issue: Forma representativa del singular masculino en צַדִּיק
  english_pob_reading: the righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el justo varón
  - los justos
  - una persona justa
  rationale: Se preserva el singular masculino del hebreo sin convertirlo en plural ni neutralizarlo por completo. «El justo» funciona de modo representativo en español y evita cargar el verso con una precisión explicativa que no está en el texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Valor semántico de רָעוֹת respecto del justo
  english_pob_reading: afflictions
  chosen_spanish_reading: aflicciones
  alternative_spanish_readings:
  - males
  - tribulaciones
  - calamidades
  rationale: «Aflicciones» conserva el sentido de adversidades reales que sobrevienen al justo y evita sugerir que el justo sea moralmente malo. Mantiene la tensión léxica sin diluirla.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo emplea el nombre propio divino. Se mantiene la decisión doctrinal del proyecto de no ocultarlo tras «SEÑOR» y se usa la forma española establecida «Yahvé».
  doctrine_reference: 'DOCTRINE.md § Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el control cruzado mostró alto acuerdo; por ello se mantiene la solución estable, con adaptación española directa y sin alterar las decisiones léxicas o teológicas del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar de este proyecto para יְהוָה.
  - «El justo» conserva la singularidad masculina del hebreo y su función representativa.
  - «Aflicciones» evita una lectura de mal moral y suena natural en español bíblico contemporáneo.
  - La puntuación en español refleja la antítesis del hebreo con «pero».
