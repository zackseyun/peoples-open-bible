translation:
  language: es
  text: Su riqueza será botín, y sus casas, una desolación[a]; edificarán casas, pero no las habitarán; y plantarán viñas, pero no beberán su vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y sus casas, una desolación», una expresión compacta que significa que sus casas quedarán arruinadas y desiertas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus bienes
  - su fuerza
  - su ejército
  lexicon: HALOT
  rationale: חַיִל puede referirse a riqueza, recursos, bienes o fuerza militar según el contexto. Aquí, en un oráculo de juicio sobre posesiones y casas, «riqueza» comunica de manera natural el sentido de recursos patrimoniales sin forzar una lectura militar.
- source_word: לִמְשִׁשָּׂה
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - saqueo
  lexicon: HALOT
  rationale: El sustantivo denota algo tomado por pillaje. «Botín» es breve, claro y mantiene el valor de juicio y despojo del término hebreo.
- source_word: וּבָתֵּיהֶם לִשְׁמָמָה
  english_pob_choice: and their houses a desolation
  chosen_spanish: y sus casas, una desolación
  alternatives_spanish:
  - y sus casas para desolación
  - y sus casas arrasadas
  lexicon: HALOT
  rationale: 'La lamed expresa resultado: sus casas llegarán a ser desolación. En español, la construcción nominal «una desolación» conserva la dureza y la compacta fuerza del hebreo.'
- source_word: וּבָנוּ בָתִּים
  english_pob_choice: they will build houses
  chosen_spanish: edificarán casas
  alternatives_spanish:
  - construirán casas
  - edificarán viviendas
  lexicon: HALOT
  rationale: El verbo se entiende futuramente en el flujo profético. «Edificarán» es solemne y fiel al registro del pasaje, sin perder claridad.
- source_word: וְלֹא יֵשֵׁבוּ
  english_pob_choice: but not inhabit them
  chosen_spanish: pero no las habitarán
  alternatives_spanish:
  - pero no vivirán en ellas
  - pero no residirán en ellas
  lexicon: HALOT
  rationale: ישב significa habitar/dwelling. «Habitarán» mantiene cercanía semántica y un registro más formal, conforme al ajuste revisado en el audit trail inglés.
- source_word: וְנָטְעוּ כְרָמִים
  english_pob_choice: and plant vineyards
  chosen_spanish: y plantarán viñas
  alternatives_spanish:
  - y sembrarán viñedos
  - y establecerán viñas
  lexicon: HALOT
  rationale: El hebreo presenta una imagen agrícola concreta de prosperidad estable. «Plantarán viñas» es natural en español y conserva la imagen original.
- source_word: וְלֹא יִשְׁתּוּ אֶת יֵינָם
  english_pob_choice: but not drink their wine
  chosen_spanish: pero no beberán su vino
  alternatives_spanish:
  - pero no beberán el vino de ellas
  - pero no disfrutarán de su vino
  lexicon: HALOT
  rationale: 'El sufijo posesivo se refiere de forma natural al fruto de las viñas poseídas. «Su vino» es idiomático en español y preserva la ironía del texto: lo que producen no llegará a ser disfrutado por ellos.'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión inglesa más reciente, especialmente en la elección de un registro más formal para לֹא יֵשֵׁבוּ («habitarán») en lugar de una paráfrasis más coloquial. También conserva el paralelismo del oráculo: riqueza despojada, casas arruinadas, construcción frustrada y viñas no disfrutadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - 'Se mantiene el paralelismo de juicio con sustantivos concretos: «riqueza», «botín», «casas», «viñas», «vino».'
  - Se evita «SEÑOR» o un eufemismo similar porque el versículo no lo exige y el punto lexical principal es la imagen de despojo y frustración de la obra humana.
