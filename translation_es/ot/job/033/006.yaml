translation:
  language: es
  text: Mira[a], ante Dios yo soy como tú; yo también fui formado[b] de barro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «yo soy como tu boca para Dios». La frase puede significar «tu portavoz/tu boca ante Dios», «según tu deseo ante Dios» o posiblemente «tu igual ante Dios».'
    reason: alternative_reading
  - marker: b
    text: O «fui hecho de barro». El verbo hebreo puede evocar ser sacado, modelado o formado del barro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: Es una partícula discursiva de llamado de atención; en español, «Mira» conserva la fuerza deíctica y resulta natural y digna sin sonar arcaica.
- source_word: כְפִיךָ לָאֵל
  english_pob_choice: I am toward God as you are
  chosen_spanish: yo soy para Dios como tú eres
  alternatives_spanish:
  - yo soy hacia Dios como tú eres
  - soy ante Dios como tú eres
  - soy para Dios como tú
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y debatida. «Para Dios» preserva la relación direccional/relacional de לָאֵל sin forzar una expansión interpretativa como «voz» o «portavoz»; «como tú eres» mantiene el paralelo humano con Job que el contexto exige.
- source_word: מֵחֹמֶר
  english_pob_choice: from clay
  chosen_spanish: de barro
  alternatives_spanish:
  - de arcilla
  - de barro arcilloso
  - de la arcilla
  lexicon: HALOT
  rationale: חֹמֶר puede referirse a barro o material arcilloso. «Barro» suena natural en español y conserva la imagen de materia moldeable ligada a la creación humana.
- source_word: קֹרַצְתִּי
  english_pob_choice: was formed
  chosen_spanish: fui formado
  alternatives_spanish:
  - fui modelado
  - fui hecho
  - fui moldeado
  lexicon: HALOT
  rationale: El verbo puede evocar la acción concreta de «pinchar/recortar/modelar» desde la arcilla. En español, «fui formado» transmite bien el resultado sin perder la idea de manufactura de origen terrestre.
- source_word: גַם אָנִי
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  - también
  lexicon: HALOT
  rationale: Refuerza la solidaridad de Eliú con Job como igualmente humano; «yo también» es la forma más clara y natural en español.
theological_decisions:
- issue: 'Sentido de כְפִיךָ לָאֵל: posible mediación, equivalencia o postura ante Dios'
  english_pob_reading: Elihu enfatiza su humanidad compartida con Job; el hebreo es deliberadamente compacto y no obliga a una mediación explícita.
  chosen_spanish_reading: Eliú se presenta como otro ser humano ante Dios, en la misma condición que Job, sin introducir «portavoz» ni una teología mediadora que el texto no exprese directamente.
  alternative_spanish_readings:
  - yo soy tu portavoz ante Dios
  - yo soy tu igual ante Dios
  - yo soy según tu boca ante Dios
  rationale: La segunda cola («yo también fui formado de barro») orienta el sentido hacia la criatura compartida. La traducción debe conservar la tensión del hebreo y no resolverla con una glosa excesiva.
  doctrine_reference: Preservar la tensión lexical y contextual; primacía del texto original sobre una lectura devocional fija.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que prefería una traducción más literal de כְפִיךָ לָאֵל y una formulación más natural de קֹרַצְתִּי. Para el español se optó por conservar la ambigüedad principal del hebreo sin expandirla a «portavoz», pero manteniendo la relación relacional/direccional con «para Dios».
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el hebreo no contiene el tetragrámaton.
  - «Barro» se emplea como equivalente idiomático de חֹמֶר en este contexto de creación humana.
  - «fui formado» mantiene el paralelismo con la confesión de común origen humano sin añadir una imagen doctrinal ajena al versículo.
