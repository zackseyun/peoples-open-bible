translation:
  language: es
  text: El rostro de Yahvé está contra los que hacen el mal,[a] para cortar de la tierra[b] la memoria de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La presencia de Yahvé está contra los malhechores».
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra», si se entiende en un sentido más local que universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנֵי
  english_pob_choice: The face of
  chosen_spanish: La mirada de
  alternatives_spanish:
  - El rostro de
  - La presencia de
  lexicon: HALOT
  rationale: En español, «la mirada de» conserva la imagen corporal de פְּנֵי sin sonar tan rígido como «el rostro de» en este giro. También comunica bien la orientación hostil de Yahvé hacia los malhechores, que en el hebreo se expresa con lenguaje de ‘rostro/faz’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé» y no sustituirlo por un título. Esto preserva el nombre personal de Dios en el texto español.'
- source_word: בְּעֹשֵׂי רָע
  english_pob_choice: against those who do evil
  chosen_spanish: contra los que hacen lo malo
  alternatives_spanish:
  - contra los malhechores
  - contra quienes hacen el mal
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘en/contra hacedores de mal’, con sentido de oposición. «Los que hacen lo malo» conserva el valor participial sin convertirlo de entrada en una etiqueta más abstracta.
- source_word: לְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para cortar
  alternatives_spanish:
  - para destruir
  - para extirpar
  lexicon: HALOT
  rationale: «Cortar» reproduce la fuerza básica de כרת y evita suavizar la imagen judicial de exclusión o aniquilación. En contexto, el complemento aclara que se trata de cortar la memoria de ellos de la tierra.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la región
  lexicon: HALOT
  rationale: Aunque el inglés optó por «earth», en español «la tierra» comunica bien el mismo alcance general y suena natural. Se mantiene la ambigüedad entre sentido universal y local, como permite la nota inglesa.
- source_word: זִכְרָם
  english_pob_choice: the memory of them
  chosen_spanish: la memoria de ellos
  alternatives_spanish:
  - su memoria
  - su recuerdo
  lexicon: HALOT
  rationale: «La memoria de ellos» sigue de cerca la estructura hebrea y preserva la referencia explícita del sufijo pronominal. Se evita reducirlo a una formulación más fluida que pudiera borrar la fuerza formal del hebreo.
theological_decisions:
- issue: La imagen antropomórfica del ‘rostro/faz’ de Yahvé como oposición activa
  english_pob_reading: A concrete anthropomorphic expression of Yahweh's active opposition to evildoers is retained.
  chosen_spanish_reading: Se conserva la imagen de la ‘mirada’ de Yahvé como expresión concreta de oposición activa contra los que hacen lo malo.
  alternative_spanish_readings:
  - Yahvé está contra los que hacen lo malo
  - El rostro de Yahvé está contra los que hacen lo malo
  rationale: El hebreo emplea lenguaje corporal para describir la postura divina. «La mirada de Yahvé está contra...» preserva esa imaginería sin deshacerla en una abstracción plana. La traducción no pretende negar la tensión antropomórfica, sino mantenerla en un español natural.
  doctrine_reference: 'Translation philosophy: preservar el significado del texto fuente y su fuerza poética-teológica sin aplanar la imagen.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la propuesta sigue de cerca el texto hebreo y el criterio auditado del POB inglés, manteniendo la ambigüedad interpretativa donde el original la permite.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva el tono judicial de «cortar» para לְהַכְרִית.
  - «La tierra» mantiene la ambigüedad de מֵאֶרֶץ entre ‘tierra’ y posible referencia local.
  - Se evita «SEÑOR» para no ocultar el nombre divino en el texto principal.
