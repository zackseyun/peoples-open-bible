translation:
  language: es
  text: Y desde el borde del suelo[a] hasta la plataforma inferior[b] habrá dos codos, con un ancho de un codo; y desde la plataforma menor hasta la plataforma mayor habrá cuatro codos[c], con un ancho de un codo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo חֵיק הָאָרֶץ: literalmente, ''el seno de la tierra''; puede referirse a la base del altar, a un rebaje o a una repisa al nivel del suelo.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo עֲזָרָה en este pasaje designa niveles escalonados de la estructura del altar; en español puede rendirse como 'plataforma', 'repisa' o 'saliente'.
    reason: lexical_alternative
  - marker: c
    text: La frase final es literalmente 'y el ancho del codo'; probablemente significa 'con un ancho de un codo', en paralelo con la medida anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיק הָאָרֶץ
  english_pob_choice: the ledge of the ground
  chosen_spanish: el seno de la tierra
  alternatives_spanish:
  - el borde de la tierra
  - la hendidura de la tierra
  - la base de la tierra
  lexicon: HALOT
  rationale: חֵיק puede denotar 'seno', 'pecho' o una cavidad/receso. Dado el contexto arquitectónico del altar, el español conserva la imagen concreta sin forzar una interpretación técnica cerrada. 'Seno de la tierra' mantiene la literalidad auditable y deja abierta la posible referencia a la base o rebaje inferior del altar.
- source_word: עֲזָרָה
  english_pob_choice: platform
  chosen_spanish: plataforma
  alternatives_spanish:
  - repisa
  - saliente
  - escalón
  lexicon: HALOT
  rationale: En este pasaje la palabra describe niveles estructurales del altar. 'Plataforma' comunica con claridad la idea de una superficie escalonada y evita el término tradicional 'settle', que no es transparente en español.
- source_word: הַתַּחְתּוֹנָה
  english_pob_choice: lower
  chosen_spanish: inferior
  alternatives_spanish:
  - baja
  - de abajo
  - más baja
  lexicon: HALOT
  rationale: Se traduce como adjetivo relacional, en correspondencia con el nivel mayor del segundo hemistiquio. 'Inferior' conserva el contraste arquitectónico sin añadir un superlativo no exigido por el hebreo.
- source_word: שְׁתַּיִם אַמּוֹת
  english_pob_choice: two cubits
  chosen_spanish: dos codos
  alternatives_spanish:
  - dos codos de alto
  lexicon: HALOT
  rationale: El hebreo da la medida directamente; la altura se infiere por el movimiento descriptivo del pasaje. En español se mantiene la medición desnuda para no sobreexplicar lo que el texto no formula explícitamente.
- source_word: וְרֹחַב אַמָּה אֶחָת
  english_pob_choice: with a width of one cubit
  chosen_spanish: con un ancho de un codo
  alternatives_spanish:
  - y de un codo de ancho
  - con una anchura de un codo
  lexicon: HALOT
  rationale: רֹחַב expresa anchura/ancho. 'Ancho' es natural en español contemporáneo y mantiene la medida como atributo de la estructura, no como paráfrasis.
- source_word: הֳעֲזָרָה הַקְּטַנָּה
  english_pob_choice: the smaller platform
  chosen_spanish: la plataforma menor
  alternatives_spanish:
  - la plataforma pequeña
  - la repisa menor
  lexicon: HALOT
  rationale: El comparativo es relacional, no necesariamente absoluto. 'Menor' reproduce bien la oposición con 'mayor' y conserva la lógica escalonada del altar.
- source_word: הָעֲזָרָה הַגְּדוֹלָה
  english_pob_choice: the larger platform
  chosen_spanish: la plataforma mayor
  alternatives_spanish:
  - la plataforma grande
  - la plataforma mayor
  lexicon: HALOT
  rationale: '''Mayor'' refleja mejor la comparación estructural que ''grande'', y se corresponde con la pareja menor/mayor del pasaje. Evita un matiz de magnificencia que el contexto no exige.'
- source_word: אַרְבַּע אַמּוֹת
  english_pob_choice: four cubits
  chosen_spanish: cuatro codos
  alternatives_spanish:
  - cuatro codos de alto
  lexicon: HALOT
  rationale: Como en la primera medida, se conserva la formulación simple del hebreo. La verticalidad queda implícita en la sintaxis de la descripción.
- source_word: וְרֹחַב הָאַמָּה
  english_pob_choice: with a width of one cubit
  chosen_spanish: con un ancho de un codo
  alternatives_spanish:
  - y el ancho de un codo
  - con una anchura de un codo
  lexicon: HALOT
  rationale: La frase final repite la medida de ancho. Se unifica la terminología con la primera cláusula para mantener consistencia estilística y auditiva en español.
theological_decisions:
- issue: Terminología arquitectónica del templo/altar sin suavizar la literalidad del hebreo
  english_pob_reading: The verse describes measured structural levels of the altar using 'ledge/platform' language; the English POB preserves the architectural precision and notes the lexical tension.
  chosen_spanish_reading: Se mantiene una traducción estructural y medida de las partes del altar, sin convertirlas en términos litúrgicos generales ni resolver la ambigüedad del hebreo más allá de lo que permite el contexto.
  alternative_spanish_readings:
  - la base de la tierra ... la repisa inferior
  - el borde del suelo ... el escalón inferior
  rationale: El pasaje es técnico y descriptivo. Traducirlo de forma demasiado interpretativa podría borrar la tensión entre base, rebaje y nivel escalonado que el POB inglés documenta. 'Plataforma' y 'seno de la tierra' conservan la concreción sin cerrar indebidamente el sentido.
  doctrine_reference: Descripción cultual/arquitectónica del templo en Ezequiel 40–48; no implica una afirmación doctrinal directa.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado para suprimir un ''up'' añadido y dejar ambas cláusulas más cercanas al hebreo. La versión española sigue esa decisión: evita añadir desplazamientos verticales no explicitados y conserva la segunda medida como una repetición paralela de ancho.'
  spanish_consistency_notes:
  - Se mantuvo 'codo' de manera uniforme para אַמָּה.
  - Se usó 'ancho' en ambas cláusulas para reflejar רֹחַב con consistencia.
  - Se eligió 'plataforma' para עֲזָרָה en ambos casos, con comparativos 'menor/mayor' para preservar la relación entre los niveles.
  - Se evitó 'Señor' o 'SEÑOR' porque el versículo no contiene el Tetragrámaton ni un equivalente directo.
