revisions:
- from: Pero tus descendientes, que engendres después de ellos, serán tuyos[a][b]; serán llamados por el nombre de sus hermanos en su heredad.
  to: Pero los hijos que tengas después de ellos serán tuyos[a][b]; serán llamados por el nombre de sus hermanos en la herencia de ellos.
  rationale: Se reemplaza «tus descendientes» por «los hijos» para reflejar mejor el referente inmediato del hebreo en contexto. Se cambia «que engendres» por «que tengas» en el texto principal para lograr español más natural, preservando la alternativa más literal en nota. Se ajusta el tramo final a «en la herencia de ellos» para expresar con mayor claridad el posesivo plural del hebreo y su relación con los hermanos ya mencionados.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:22:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: la descendencia posterior a Efraín y Manasés seguirá siendo de José y será contada bajo el nombre de sus hermanos en la herencia. Sin embargo, «descendientes» puede sonar demasiado amplio genealógicamente para מוֹלַדְתְּךָ en este contexto inmediato de hijos nacidos después; además, «engendres» suena forzado en español corriente. También conviene ajustar «en su heredad» a plural para corresponder mejor a «sus hermanos»/«their inheritance» en el marco tribal.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «que engendres» resulta poco natural en español bíblico moderno y «descendientes» puede alejarse del referente inmediato. «Hijos que tengas» o «hijos que engendres» funciona mejor; en el cuerpo del texto conviene una formulación más natural. «En la heredad de ellos» es comprensible, pero «en su herencia» o «en la heredad de sus hermanos» puede aclarar mejor la relación. La frase revisada mejora naturalidad sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La elección de «heredad» es aceptable por contexto tribal. La revisión propuesta se alinea mejor con la decisión inglesa alternativa preservada en nota («your children whom you beget after them») y con el valor contextual de מוֹלַדְתְּךָ.
  issues:
  - severity: medium
    issue: «tus descendientes» puede ser demasiado amplio para el contexto inmediato
    rationale: Aunque léxicamente posible, aquí Jacob habla de hijos nacidos después de Efraín y Manasés, no de descendencia remota en general. «Tus hijos» preserva mejor la referencia contextual.
  - severity: medium
    issue: «que engendres» suena rígido y poco idiomático en español general
    rationale: El hebreo hiphil de ילד expresa engendrar/father, pero en español de lectura amplia «que tengas» en el texto principal suena más natural, dejando «engendres» como alternativa en nota si se desea.
  - severity: low
    issue: «en su heredad» deja algo difusa la referencia posesiva
    rationale: El hebreo בְּנַחֲלָתָם es plural posesivo. En español, «en su herencia» puede entenderse, pero «en la herencia de sus hermanos» aclara el vínculo con el antecedente inmediato y el contexto tribal.
  revised_spanish_text: Pero los hijos que tengas después de ellos serán tuyos[a][b]; serán llamados por el nombre de sus hermanos en la herencia de ellos.
  revised_footnotes:
  - marker: a
    text: O «tus descendientes que engendres después de ellos»
    reason: lexical_alternative
  - marker: b
    text: Es decir, no recibirán una heredad tribal separada, sino que serán contados bajo Efraín y Manasés.
    reason: cross_reference
  revision_rationale: Se reemplaza «tus descendientes» por «los hijos» para reflejar mejor el referente inmediato del hebreo en contexto. Se cambia «que engendres» por «que tengas» en el texto principal para lograr español más natural, preservando la alternativa más literal en nota. Se ajusta el tramo final a «en la herencia de ellos» para expresar con mayor claridad el posesivo plural del hebreo y su relación con los hermanos ya mencionados.
