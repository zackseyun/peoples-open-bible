- from: Que tu amor leal esté sobre nosotros[a], Yahvé, según hemos esperado en ti.
  to: Que tu amor leal esté sobre nosotros, Yahvé, como esperamos en ti[a].
  rationale: Se cambia «según hemos esperado en ti» por «como esperamos en ti» para reflejar mejor el valor del imperfecto hebreo, mejorar la naturalidad del español y mantener la correspondencia del original. Se traslada la nota al verbo final para preservar la alternativa léxica documentada en el POB inglés. Se mantiene «amor leal» y «Yahvé», que son fieles al proyecto y al sentido del texto.
