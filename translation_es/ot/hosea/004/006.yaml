review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: destrucción por falta de conocimiento, rechazo recíproco, exclusión del sacerdocio y olvido recíproco. Sin embargo, hay dos desajustes significativos con la línea auditada: (1) וְאֶמְאָסְאֲךָ fue documentado en el POB inglés como presente recíproco (''I also reject you''), no futuro, y en español suena mejor ''también te rechazo''; (2) בָּנֶיךָ fue decidido en el audit trail como sentido colectivo ''your children'', por lo que ''tus hijos'' estrecha innecesariamente el alcance. Además, ''para que no seas sacerdote para mí'' introduce una finalidad consecutiva no expresada; una formulación más ceñida es ''de ser sacerdote para mí''.'
  spanish_quality_summary: 'El español es claro y legible, pero puede afinarse para mayor fidelidad y naturalidad bíblica. ''Mi pueblo es destruido'' funciona, aunque el plural ''Mi pueblo es destruido'' como colectivo es aceptable. La frase ''yo también te rechazaré para que no seas sacerdote para mí'' suena más explicativa que traducción. ''Puesto que olvidaste'' es natural, pero ''has olvidado'' mantiene mejor la relación con la acusación vigente del original y con el POB inglés. ''Tus hijos'' en el texto principal entra en tensión con la nota que sugiere un sentido más restringido; si se mantiene nota, el texto principal debe usar ''tus hijos e hijas'' o mejor ''tus hijos'' no sirve. Lo más fiel al audit trail es ''tus hijos[a?]'' no; mejor ''tus hijos e hijas'' sería demasiado expansivo. Por tanto conviene ''tus hijos'' cambiar a ''tus hijos'' note? No, siguiendo POB: ''tus hijos'' debe cambiarse a ''tus hijos'' no resuelve. La mejor opción es ''tus hijos'' -> ''tus hijos'' no. Se recomienda
    ''tus hijos'' sustituir por ''tus hijos e hijas'' solo si se explicita, pero eso añade. En español neutral, ''tus hijos'' suele poder ser genérico, pero el audit trail prefirió evitar estrechamiento; ''tus hijos'' debe reemplazarse por ''tus hijos e hijas'' o ''tu descendencia''. La opción más natural y breve es ''tus hijos'' no. Se propone ''tus hijos e hijas'' en nota? Mejor ''tu descendencia'' para mantener colectividad sin expansión de sexo.'
  glossary_alignment: 'No aparecen términos del glosario mayor como Yahvé/Mesías. ''Ley'' para תּוֹרָה está bien y la nota sobre ''torá/instrucción'' debe conservarse. ''Conocimiento'' preserva correctamente הדעת sin expandir a ''de Dios''. El principal problema terminológico es בָּנֶיךָ: el audit trail inglés adoptó un valor colectivo (''children''), y el español debe reflejarlo con una opción colectiva natural, preferiblemente ''tu descendencia'' en este contexto profético.'
  issues:
  - severity: high
    issue: Tiempo/aspecto de וְאֶמְאָסְאֲךָ
    rationale: El POB inglés auditado eligió 'I also reject you' para subrayar la reciprocidad inmediata; 'yo también te rechazaré' desplaza el efecto al futuro y se aparta de la decisión documentada.
  - severity: medium
    issue: Construcción de מִכַּהֵן לִי
    rationale: '''Para que no seas sacerdote para mí'' introduce un matiz de finalidad/consecuencia no presente en el hebreo. ''De ser sacerdote para mí'' o ''de ejercer como sacerdote para mí'' refleja mejor la exclusión.'
  - severity: high
    issue: בָּנֶיךָ traducido como 'tus hijos'
    rationale: El audit trail inglés decidió un sentido colectivo ('your children'). 'Tus hijos' puede entenderse solo como varones y estrecha el alcance. En español conviene una forma colectiva como 'tu descendencia'.
  - severity: low
    issue: Correspondencia aspectual en וַתִּשְׁכַּח
    rationale: '''Olvidaste'' no es incorrecto, pero ''has olvidado'' mantiene mejor el vínculo con la culpabilidad presente y con la simetría del pasaje según la línea inglesa.'
  - severity: low
    issue: Nota al pie c ya no encaja con el mejor texto español
    rationale: Si el texto principal usa una forma colectiva como 'tu descendencia', la nota debe explicar la alternativa más literal 'tus hijos' o 'tus hijos varones', no repetir el texto actual.
  revised_spanish_text: Mi pueblo es destruido por falta de conocimiento[a]. Porque tú has rechazado el conocimiento, yo también te rechazo de ser sacerdote para mí. Puesto que has olvidado la ley de tu Dios[b], yo también olvidaré tu descendencia[c].
  revised_footnotes:
