translation:
  language: es
  text: 'Los hijos de Judá: Pérez[a], Hezrón, Carmi, Hur y Shobal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En genealogías, «hijos de» puede significar también «descendientes de», no solo hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En genealogías, el constructo plural de בֵּן puede referirse a hijos directos o, más ampliamente, a descendientes. En español, «hijos de» comunica bien esa relación genealógica sin sonar tan rígido como una calca de «sons of», y mantiene la flexibilidad heredada del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio del antepasado/tribu. En español bíblico es la forma estándar y transparente.
- source_word: פֶּרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peres
  - Pharez
  lexicon: HALOT
  rationale: Nombre propio. «Pérez» es la transliteración española habitual y reconoce la forma hebrea sin depender de la grafía tradicional inglesa «Pharez».
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  - Hesrón
  lexicon: HALOT
  rationale: Nombre propio. «Hezrón» conserva la consonancia hebrea y se adapta a la ortografía española de manera legible.
- source_word: כַרְמִי
  english_pob_choice: Carmi
  chosen_spanish: Carmi
  alternatives_spanish:
  - Carmi
  lexicon: HALOT
  rationale: Nombre propio; la forma española no requiere ajuste significativo respecto del nombre transliterado.
- source_word: חוּר
  english_pob_choice: Hur
  chosen_spanish: Hur
  alternatives_spanish:
  - Jur
  lexicon: HALOT
  rationale: Nombre propio; la forma breve ya es comprensible y fiel.
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Sobal
  alternatives_spanish:
  - Shobal
  - Sobal
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere «Sobal» para una grafía española natural, manteniendo la identificación del nombre hebreo.
theological_decisions:
- issue: Valor genealógico de «hijos de»
  english_pob_reading: Hebrew 'sons of' can function genealogically for direct sons or more broadly for descendants.
  chosen_spanish_reading: «Hijos de» conserva la relación genealógica y puede abarcar descendientes, no solo hijos inmediatos.
  alternative_spanish_readings:
  - descendientes de
  - hijos de
  rationale: 'No hay carga doctrinal, pero sí una tensión semántica importante: el hebreo permite un uso más amplio que la filiación inmediata. La redacción española mantiene esa amplitud sin explicitarla en el texto principal.'
  doctrine_reference: Uso genealógico del hebreo bíblico; genealogías de Crónicas.
translation_notes:
  revision_awareness: El texto hebreo es una lista genealógica breve. El audit trail en inglés no introduce variantes textuales ni revisiones sustantivas; por eso la propuesta española sigue de cerca la estructura del original, ajustando solo la naturalidad del orden y la grafía de los nombres propios.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico breve y enumerativo del hebreo.
  - Se usa «Judá» para el nombre propio y «Pérez» con la grafía española usual.
  - La coma antes de la lista final y la conjunción «y» reflejan la coordinación simple del hebreo.
  - No se añade información interpretativa que no esté en el verso.
