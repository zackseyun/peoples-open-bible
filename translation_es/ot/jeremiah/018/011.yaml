translation:
  language: es
  text: 'Ahora pues[a], di a los hombres de Judá y a los habitantes de Jerusalén: «Así dice Yahvé: He aquí, yo estoy formando una calamidad[b] contra ustedes y trazando un plan contra ustedes. Vuélvanse[c], por favor, cada uno de su mal camino[d], y hagan buenos sus caminos y sus obras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y ahora». La frase marca transición desde la imagen del alfarero y mantiene el matiz de consecuencia del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «formando un desastre contra ustedes». El verbo alude a la imaginería del alfarero del contexto inmediato.
    reason: lexical_alternative
  - marker: c
    text: O «Regresen, por favor» o «Arrepiéntanse, por favor».
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «cada uno de su mal camino»; el singular es distributivo y dirige la exhortación miembro por miembro.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Así que ahora
  lexicon: HALOT
  rationale: La partícula marca transición inferencial desde la imagen del alfarero en el contexto inmediato. «Ahora pues» conserva tanto el valor temporal como el consecuencial, de modo natural en español.
- source_word: אֱמָר נָא
  english_pob_choice: say
  chosen_spanish: habla, te ruego
  alternatives_spanish:
  - di, por favor
  - habla, por favor
  lexicon: HALOT
  rationale: El imperativo es dirigido a Jeremías. El matiz de urgencia/cortesía de נָא se expresa con «te ruego», que suena más natural en español que añadir «por favor» al verbo de decir sin más contexto.
- source_word: אֶל אִישׁ יְהוּדָה
  english_pob_choice: to the men of Judah
  chosen_spanish: a los hombres de Judá
  alternatives_spanish:
  - a cada hombre de Judá
  - al pueblo de Judá
  lexicon: HALOT
  rationale: אִישׁ es singular formal pero colectivo/distributivo. «Hombres de Judá» preserva el valor masculino-gramatical y el sentido colectivo sin neutralizar indebidamente el hebreo.
- source_word: וְעַל יוֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: and to the inhabitants of Jerusalem
  chosen_spanish: y a los habitantes de Jerusalén
  alternatives_spanish:
  - y acerca de los habitantes de Jerusalén
  - y contra los habitantes de Jerusalén
  lexicon: HALOT
  rationale: Con אמר, עַל puede señalar destinatarios del discurso. «A los habitantes de Jerusalén» es idiomático en español y refleja el contexto de exhortación directa.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar y el nombre divino según la pauta del proyecto. «Así dice» mantiene el carácter oracular presente en el hebreo.
- source_word: הִנֵּה אָנֹכִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Miren, yo estoy
  - He aquí que yo
  lexicon: HALOT
  rationale: La fórmula de anuncio solemne se mantiene con «He aquí». Se añade «yo estoy» para reflejar con naturalidad la fuerza del participio en español sin perder gravedad.
- source_word: יוֹצֵר
  english_pob_choice: shaping
  chosen_spanish: formando
  alternatives_spanish:
  - moldeando
  - dando forma a
  lexicon: HALOT
  rationale: El verbo enlaza con la imaginería del alfarero en el contexto. «Formando» es natural y preserva la continuidad metafórica sin forzar un calco.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: una calamidad
  alternatives_spanish:
  - desastre
  - mal
  lexicon: HALOT
  rationale: En este contexto de juicio, el término apunta a daño/castigo, no a mal moral en Dios. «Calamidad» comunica el juicio anunciado y evita una implicación teológica errónea.
- source_word: וְחֹשֵׁב ... מַחֲשָׁבָה
  english_pob_choice: and devising a plan
  chosen_spanish: y trazando un plan
  alternatives_spanish:
  - y planeando un plan
  - y maquinando un plan
  lexicon: HALOT
  rationale: La repetición cognada hebrea se conserva en sentido, no de forma mecánica. «Trazando un plan» expresa intención deliberada y mantiene un paralelismo natural en español.
- source_word: שׁוּבוּ נָא
  english_pob_choice: Turn back, please
  chosen_spanish: Vuélvanse, por favor
  alternatives_spanish:
  - Regresen, por favor
  - Arrepiéntanse, por favor
  lexicon: HALOT
  rationale: שׁוּב aquí llama a apartarse del mal obrar. «Vuélvanse» conserva la imagen concreta del giro; «por favor» refleja נָא sin imponer un matiz técnico de «arrepentirse».
- source_word: אִישׁ מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: each man from his evil way
  chosen_spanish: cada uno de su mal camino
  alternatives_spanish:
  - cada hombre de su mal camino
  - cada uno de su camino malo
  lexicon: HALOT
  rationale: Se mantiene el valor distributivo de אִישׁ y la metáfora profética de «camino» para conducta. «De su mal camino» es idiomático en español y conserva la referencia ética.
- source_word: וְהֵיטִיבוּ
  english_pob_choice: and make ... good
  chosen_spanish: y hagan buenos
  alternatives_spanish:
  - y mejoren
  - y enderecen
  lexicon: HALOT
  rationale: 'El hifil de יטב tiene fuerza causativa: hacer bueno, obrar bien. «Hagan buenos» preserva esa causalidad y se enlaza bien con los objetos siguientes.'
- source_word: דַרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus conductas
  - sus senderos
  lexicon: HALOT
  rationale: En el lenguaje profético, «caminos» conserva la metáfora de conducta y conecta con el singular anterior «camino».
- source_word: וּמַעַלְלֵיכֶם
  english_pob_choice: and your deeds
  chosen_spanish: y sus obras
  alternatives_spanish:
  - y sus acciones
  - y sus hechos
  lexicon: HALOT
  rationale: «Obras» transmite actos concretos y tiene peso moral/profético adecuado en español, manteniendo la serie de conducta personal y comunitaria.
theological_decisions:
- issue: Renderizado de רָעָה cuando se atribuye a la acción de Yahvé
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - desastre
  - mal
  rationale: El contexto es una advertencia de juicio, no una afirmación de maldad moral en Dios. «Calamidad» preserva el sentido de daño/jucio y evita una lectura doctrinal indebida.
  doctrine_reference: 'Translation philosophy: equivalencia óptima y no introducir afirmaciones doctrinales ajenas al contexto.'
- issue: Mantenimiento del lenguaje masculino distributivo אִישׁ ... אִישׁ
  english_pob_reading: men of Judah ... each man
  chosen_spanish_reading: los hombres de Judá ... cada uno
  alternative_spanish_readings:
  - el pueblo de Judá ... cada uno
  - las personas de Judá ... cada uno
  rationale: El hebreo usa formas masculinas singulares con valor colectivo/distributivo. La traducción preserva ese rasgo sin neutralizarlo, conforme a la política de precisión gramatical del proyecto.
  doctrine_reference: 'Translation philosophy §4: precisión de género gramatical cuando es relevante en el texto fuente.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la revisión más reciente no introdujo cambios y que el control cruzado reportó alta concordancia con observaciones menores, por lo que se mantuvo la lectura principal del entorno POB: fórmula profética, nombre divino explícito, valor distributivo de אִישׁ y traducción contextual de רָעָה como juicio/calamidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología base del proyecto.
  - Se conservó la metáfora de «camino(s)» para conducta, coherente con el pasaje.
  - Se usó una solución natural para נָא con «por favor / te ruego» sin diluir el imperativo.
  - No se reemplazó el lenguaje masculino distributivo por neutralización genérica.
  - La puntuación sigue el español estándar con comillas angulares internas adaptadas a publicación bíblica.
