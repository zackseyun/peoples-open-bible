translation:
  language: es
  text: Te sentaste sobre un lecho espléndido[a], con una mesa dispuesta delante de este, y sobre la mesa pusiste mi incienso y mi aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene sufijos femeninos en «delante de este» y en la expresión traducida «sobre la mesa», y pueden entenderse de otra manera; por ejemplo, «delante de ella» refiriéndose a la mujer, en lugar de al arreglo del lecho y la mesa.
    reason: alternative_reading
lexical_decisions:
- source_word: יָשַׁבְתְּ
  english_pob_choice: you sat
  chosen_spanish: te sentaste
  alternatives_spanish:
  - te sentaste
  - estabas sentada
  lexicon: HALOT
  rationale: El qal perfecto 2fs expresa una acción pasada dirigida a la figura femenina; «te sentaste» conserva la naturalidad del español y el valor narrativo directo.
- source_word: מִטָּה
  english_pob_choice: couch
  chosen_spanish: diván
  alternatives_spanish:
  - cama
  - sofá
  lexicon: HALOT
  rationale: En este contexto de lujo y banquete, el referente es un mueble para recostarse. «Diván» comunica mejor un asiento reclinable o de descanso que «cama», sin perder la imagen de ostentación.
- source_word: כְבוּדָּה
  english_pob_choice: splendid
  chosen_spanish: espléndido
  alternatives_spanish:
  - lujoso
  - magnífico
  - honorable
  lexicon: HALOT
  rationale: El término proviene de la raíz de peso/honor/gloria y aquí describe el mueble como imponente y opulento. «Espléndido» transmite bien ese matiz en español.
- source_word: שֻׁלְחָן עָרוּךְ
  english_pob_choice: a table set
  chosen_spanish: una mesa dispuesta
  alternatives_spanish:
  - una mesa preparada
  - una mesa arreglada
  lexicon: HALOT
  rationale: El participio pasivo indica algo arreglado o preparado. «Mesa dispuesta» es idiomático y mantiene la escena de banquete.
- source_word: לְפָנֶיהָ
  english_pob_choice: before it
  chosen_spanish: delante de él
  alternatives_spanish:
  - delante de ella
  - frente a él
  lexicon: HALOT
  rationale: La terminación femenina de 3fs es ambigua en español si se conserva el referente del mobiliario. Siguiendo la lectura de la POB inglesa, «él» en español remite al diván, de modo que «delante de él» preserva la disposición espacial de la mesa frente al mueble. La ambigüedad sobre si el sufijo puede leerse de otro modo queda indicada en nota.
- source_word: קְטָרְתִּי
  english_pob_choice: my incense
  chosen_spanish: mi incienso
  alternatives_spanish:
  - mi incienso aromático
  - mi perfume
  lexicon: HALOT
  rationale: 'El sufijo de 1cs conserva el matiz posesivo y teológico: es incienso que pertenece a Yahvé. «Mi incienso» es breve y fiel al hebreo.'
- source_word: שַׁמְנִי
  english_pob_choice: my oil
  chosen_spanish: mi aceite
  alternatives_spanish:
  - mi óleo
  - mi aceite de unción
  lexicon: HALOT
  rationale: El hebreo dice simplemente «aceite». En español, «aceite» preserva la generalidad del sustantivo; «óleo» o «aceite de unción» añaden especificación no expresada explícitamente en el texto.
- source_word: שַׂמְתְּ עָלֶיהָ
  english_pob_choice: you placed ... on it
  chosen_spanish: pusiste ... sobre él
  alternatives_spanish:
  - colocaste ... sobre él
  - lo pusiste ... encima
  lexicon: HALOT
  rationale: El verbo שׂים indica poner/colocar. «Pusiste ... sobre él» mantiene la concreción de la acción y conserva el antecedente masculino elegido para la disposición del mobiliario en español.
theological_decisions:
- issue: Referente de los sufijos femeninos en לְפָנֶיהָ y עָלֶיהָ
  english_pob_reading: The suffixes refer to the couch/table furnishing arrangement, rendered impersonally as 'before it' and 'on it.'
  chosen_spanish_reading: Los sufijos se leen principalmente con el diván y la mesa como parte de la disposición del mueble, por lo que el texto habla de la mesa delante de él y de lo que se pone sobre él.
  alternative_spanish_readings:
  - delante de ella / sobre ella, entendiendo que el sufijo apunta a la mujer
  - delante de la mesa / sobre la mesa, tomando otro antecedente del arreglo
  rationale: La imagen profética presenta una escena cuidadosamente montada de lujo y abuso cultual. Mantener el referente en el arreglo del mobiliario hace más coherente la secuencia espacial y evita resolver en exceso una ambigüedad que el hebreo permite. La nota conserva la posibilidad alternativa reconocida en la POB inglesa.
  doctrine_reference: Preservar la tensión textual y la ambigüedad referencial; no forzar una armonización interpretativa.
translation_notes:
  revision_awareness: La POB inglesa fue revisada y quedó sin cambios sustanciales; se mantuvo la decisión léxica y la nota de ambigüedad referencial, ahora adaptadas al español con antecedente masculino para la disposición del mueble.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino en el texto principal.
  - «Diván» se eligió por naturalidad en español frente a «cama», que podría sugerir un contexto de dormir más que de banquete y recostamiento.
  - Se mantuvo la posesión de primera persona en «mi incienso» y «mi aceite» para resaltar el trasfondo cultual del pasaje.
