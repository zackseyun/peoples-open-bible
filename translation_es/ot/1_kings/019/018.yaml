review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo y del POB inglés: Yahvé ha preservado/dejado para sí un remanente de siete mil en Israel que no ha rendido homenaje a Baal ni con las rodillas ni con la boca. Sin embargo, omite la imaginería corporal explícita de כָּל הַבִּרְכַּיִם al convertirla en ‘todos los que’, mientras el expediente inglés la preserva deliberadamente como ‘all the knees’. También ‘se han doblado’ es menos preciso que una forma que haga visible la rodilla o el arrodillarse.'
  spanish_quality_summary: 'El español es natural y legible, pero puede mejorarse sin volverse rígido. ‘He dejado para mí en Israel siete mil’ suena algo calcado; ‘me he reservado en Israel a siete mil’ sería posible, pero el expediente privilegia ‘left for myself’. Una solución más fiel y todavía natural es mantener ‘he dejado para mí en Israel siete mil: todas las rodillas…’. La puntuación con dos puntos ayuda a que la apposición corporal suene bien en español. La nota a es útil; la nota b está bien.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ‘Baal’, ‘Israel’ y el lenguaje de homenaje idolátrico están bien manejados. La principal desviación no es glosarial sino de filosofía de traducción: el borrador sustituye la imagen concreta ‘rodillas’ por una paráfrasis personal, contrario al razonamiento léxico auditado.'
  issues:
  - severity: medium
    issue: Se pierde la imagen corporal explícita de ‘todas las rodillas’.
    rationale: El hebreo כָּל הַבִּרְכַּיִם y el POB inglés retienen deliberadamente la expresión corporal. ‘Todos los que no se han doblado’ parafrasea el referente humano y borra un rasgo semántico que el expediente considera importante.
  - severity: medium
    issue: ‘Se han doblado ante Baal’ es menos preciso que una formulación con ‘rodillas’ o ‘arrodillarse’.
    rationale: כָּרְעוּ expresa arrodillarse/doblar la rodilla en homenaje. En español ‘doblarse’ puede sugerir ceder o inclinarse de modo inespecífico; ‘no se han arrodillado ante Baal’ o ‘no se han doblado ante Baal’ con ‘rodillas’ explícitas mejora la precisión.
  - severity: low
    issue: La colocación de ‘siete mil[a]’ sin aclaración estructural puede sonar algo abrupta en español.
    rationale: 'No es incorrecto, pero una pausa fuerte antes de la aposición (‘siete mil[a]: todas las rodillas…’) hace más claro que las frases corporales explican quiénes son esos siete mil.'
  revised_spanish_text: 'Sin embargo, he dejado para mí en Israel siete mil[a]: todas las rodillas que no se han arrodillado ante Baal[b], y toda boca que no lo ha besado.'
