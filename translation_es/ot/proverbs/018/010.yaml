revisions:
- from: El nombre de Yahvé[a] es torre fuerte; el justo[b] corre hacia ella y es puesto en alto con seguridad[c].
  to: El nombre de Yahvé[a] es torre fuerte; el justo[b] corre a refugiarse en ella y queda en alto y a salvo[c].
  rationale: Se corrige la preposición para reflejar mejor la idea hebrea de entrar/refugiarse en la torre, se suaviza la cláusula final para un español más natural sin perder la imagen de seguridad elevada, y se ajusta la nota b para no introducir un plural ajeno al singular representativo del texto fuente.
