translation:
  language: es
  text: Hizo expiación por pecado involuntario[a] con ayuno y humillando su alma[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la ignorancia»; también: «por un error cometido por ignorancia».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «humillando su alma», un modismo bíblico de abnegación o aflicción de sí.'
    reason: cultural_note
  - marker: c
    text: 'O: «por la ignorancia», entendida en sentido cultual como falta no deliberada.'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξιλάσατο
  english_pob_choice: made atonement
  chosen_spanish: hizo expiación
  alternatives_spanish:
  - hizo atonamiento
  - expiaba
  - propició
  lexicon: BDAG
  rationale: El verbo tiene fuerza cultual de expiación/reconciliación. En español, 'hizo expiación' conserva ese valor sacrificial sin depender de un tecnicismo menos natural como 'propició'.
- source_word: περὶ ἀγνοίας
  english_pob_choice: for ignorance / for unintentional sin
  chosen_spanish: por la ignorancia
  alternatives_spanish:
  - por pecado involuntario
  - por error cometido por ignorancia
  - por ignorancia involuntaria
  lexicon: BDAG
  rationale: El griego dice literalmente 'ignorancia'. En este contexto cultual puede implicar pecado involuntario, pero el texto fuente no añade explícitamente 'pecado'; por eso mantengo 'ignorancia' y explico la lectura alternativa en nota.
- source_word: ἐν νηστείᾳ
  english_pob_choice: by fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - por medio del ayuno
  - mediante ayuno
  - en ayuno
  lexicon: BDAG
  rationale: La preposición aquí es instrumental o modal. 'Con ayuno' expresa de forma natural el medio sin alejarse del griego.
- source_word: καὶ ταπεινώσει ψυχὴν αὐτοῦ
  english_pob_choice: and humbling his soul
  chosen_spanish: y humillando su alma
  alternatives_spanish:
  - y afligiendo su alma
  - y humillándose
  - y humillando su vida
  lexicon: BDAG
  rationale: Conservo 'alma' para reproducir la expresión semítica del original y no diluirla en un reflexivo genérico. 'Humillando su alma' suena bíblico en español y mantiene la tensión idiomática.
theological_decisions:
- issue: Alcance de ἀγνοία en contexto cultual
  english_pob_reading: unintentional sin
  chosen_spanish_reading: ignorancia con sentido de falta involuntaria / pecado no deliberado
  alternative_spanish_readings:
  - ignorancia
  - pecado involuntario
  - error cometido sin saberlo
  rationale: La revisión inglesa reciente entiende ἀγνοία como término cultual para pecado involuntario, no mera falta de información. En el texto principal mantengo el equivalente léxico 'ignorancia' para no sobretraducir, pero la nota permite la lectura cultual plena.
  doctrine_reference: Levítico 4; Hebreos 9:7; uso cultual de faltas no deliberadas
- issue: Valor de ἐξιλάσατο
  english_pob_reading: made atonement
  chosen_spanish_reading: hizo expiación
  alternative_spanish_readings:
  - hizo atonamiento
  - expiaba
  - hizo propiciación
  rationale: '''Expiación'' comunica el acto sacrificial sin cargar el texto con una elección dogmática más específica que la del griego. Evita también la máscara eclesiástica de ''reconciliar'' que no corresponde al verbo aquí.'
  doctrine_reference: Lenguaje sacrificial/expiatorio del AT y judaísmo del Segundo Templo
- issue: Expresión 'humbling his soul'
  english_pob_reading: Literally, 'humbling his soul,' a biblical idiom for self-denial or self-affliction.
  chosen_spanish_reading: humillando su alma como modismo bíblico de abnegación o aflicción de sí
  alternative_spanish_readings:
  - humillándose
  - afligiéndose
  - mortificando su alma
  rationale: La nota preserva el modismo sin borrarlo en la fluidez del español. 'Humillar el alma' puede sonar extraño, pero justamente refleja la textura semítica que el audit trail quiso conservar.
  doctrine_reference: Modismos bíblicos de humillación/ayuno; cf. Salmo 35:13
translation_notes:
  revision_awareness: La revisión más reciente del inglés cambió el tiempo verbal al pasado simple para reflejar el aoristo griego, pero el contexto del verso anterior en la tradición de trabajo había favorecido una lectura gnómica/presente. En español, el aoristo se vierte de forma natural en pasado simple; sin embargo, como este fragmento aislado no incluye el marco de continuidad completo, la redacción mantiene un pasado simple sobrio ('Hizo expiación') y conserva la ambigüedad cultual de ἀγνοία mediante nota, siguiendo el audit trail sin exagerar la paráfrasis.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en esta serie cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conserva 'alma' por la idiomaticidad bíblica del modismo, no como antropología técnica.
  - '''Expiación'' se prefiere a ''propiciación'' para evitar introducir una distinción dogmática no presente en el griego.'
  - El orden de los complementos ('con ayuno y humillando su alma') sigue de cerca el griego y la versión inglesa auditada, pero con sintaxis natural en español.
