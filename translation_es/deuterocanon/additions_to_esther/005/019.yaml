  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: ἀντίγραφον = «una copia», ἐπιστολή = «carta», ἐκθέντες = acción pública de exhibir/publicar, ἐν παντὶ τόπῳ = «en todo lugar», ἐᾶν... χρῆσθαι τοῖς ἑαυτῶν νομίμοις = permitir a los judíos usar/valerse de sus propias leyes. La única desviación relevante es que la nota al pie se desplazó de νόμιμα a παρρησία; el rastro inglés documenta la alternativa léxica en «laws/customs», no en «openly/publicly».'
  spanish_quality_summary: El español es claro y digno, pero el orden «publicar en todo lugar, abiertamente, una copia...» suena algo trabado. Reordenar a «después de fijar una copia... en todo lugar, abiertamente» o similar mejora la naturalidad y sigue más de cerca la sintaxis participial griega y el contexto administrativo. También conviene mover la nota a «leyes» para preservar la ambigüedad de νόμιμα.
  glossary_alignment: No hay términos del glosario teológico principal en juego. «Carta», «copia», «permitir» y «hacer uso de» concuerdan con las decisiones auditadas. Debe conservarse la alternativa de νόμιμα como «costumbres» en nota al pie, según el POB inglés.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «abiertamente» en vez de en «sus propias leyes».
    rationale: El POB inglés preserva la alternativa léxica de νόμιμα = «laws/customs». La nota española actual introduce una alternativa para παρρησία que no corresponde al punto principal documentado en la auditoría.
  - severity: low
    issue: El orden sintáctico del español resulta algo poco fluido.
    rationale: «Y después de publicar en todo lugar, abiertamente, una copia de esta carta...» es entendible, pero una colocación más natural de «una copia de esta carta» antes del complemento locativo/modal suena mejor en español administrativo.
