translation:
  language: es
  text: No hubo ni una palabra[a] de todo lo que Moisés mandó que Josué no leyera delante de toda la asamblea de Israel, y de las mujeres, los niños pequeños y el extranjero residente[b] que andaba[c] entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hubo nada de todo lo que Moisés mandó que Josué no leyera».'
    reason: lexical_alternative
  - marker: b
    text: «Extranjero residente» se refiere a un no israelita que vivía entre Israel.
    reason: cultural_note
  - marker: c
    text: 'O: «que vivía entre ellos» o «que estaba entre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָבָר
  english_pob_choice: word
  chosen_spanish: mandato
  alternatives_spanish:
  - palabra
  - cosa
  - asunto
  lexicon: HALOT
  rationale: En este contexto no se trata de una sola “palabra” aislada, sino de cada parte de lo que Moisés mandó. “Mandato” conserva el sentido de precepto/orden del texto legal-covenantal y suena natural con el verbo “leer” en español.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había ordenado
  alternatives_spanish:
  - había mandado
  - había dado instrucciones
  lexicon: HALOT
  rationale: El hebreo expresa una orden con autoridad. “Había ordenado” mantiene ese valor normativo sin sonar excesivamente arcaico.
- source_word: קָרָא
  english_pob_choice: read
  chosen_spanish: leyera
  alternatives_spanish:
  - leía
  - proclamara
  - recitara
  lexicon: HALOT
  rationale: En el contexto de la lectura pública de la ley, “leer” es la equivalencia directa y más precisa. El subjuntivo en la cláusula relativa reproduce bien la estructura negativa enfática del hebreo.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: “Delante de” comunica claramente la lectura pública ante la asamblea y evita un giro demasiado formal o eclesiástico.
- source_word: קְהַל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - reunión
  lexicon: HALOT
  rationale: “Asamblea” preserva el carácter formal del grupo reunido sin importar un matiz denominacional que “congregación” podría sugerir.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  lexicon: HALOT
  rationale: Se mantiene la inclusión explícita de las mujeres en la audiencia de la lectura.
- source_word: הַטַּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los dependientes
  lexicon: HALOT
  rationale: טַף suele referirse a niños pequeños o dependientes. “Niños pequeños” comunica bien el referente humano joven y dependiente en español.
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el extranjero residente
  - el peregrino
  lexicon: HALOT
  rationale: En español, “forastero” aquí puede expresar al no israelita que habita entre el pueblo. Se evita “peregrino”, que sugiere otra clase de desplazamiento, y “extranjero residente” resulta más técnico.
- source_word: הַהֹלֵךְ בְּקִרְבָּם
  english_pob_choice: who walked among them
  chosen_spanish: que andaba entre ellos
  alternatives_spanish:
  - que vivía entre ellos
  - que estaba entre ellos
  lexicon: HALOT
  rationale: El participio conserva la imagen de movimiento/habitación. “Andaba entre ellos” sigue de cerca la metáfora hebrea sin volverla extraña en español; “vivía” sería una interpretación más idiomática, pero menos literal.
- source_word: לֹא הָיָה ... אֲשֶׁר לֹא
  english_pob_choice: There was not ... that ... did not
  chosen_spanish: No quedó sin ser leído ningún... que Josué no leyera
  alternatives_spanish:
  - No hubo ni un mandato que Josué no leyera
  - No faltó ningún mandato que Josué no leyera
  lexicon: HALOT
  rationale: La construcción hebrea de doble negación exige en español una formulación equivalente de totalidad. “No quedó sin ser leído ningún...” conserva el énfasis exhaustivo, aunque una redacción más lisa también sería posible.
theological_decisions:
- issue: Alcance comunitario de la lectura de la ley
  english_pob_reading: The verse is rendered to emphasize that the entire covenant community present—including women, little children, and the resident sojourner—heard the reading.
  chosen_spanish_reading: La traducción mantiene la enumeración explícita de mujeres, niños pequeños y forastero, para mostrar que nadie presente quedó fuera de la lectura pública.
  alternative_spanish_readings:
  - Subsumir estos grupos dentro de “toda la asamblea de Israel”
  - Simplificar la lista a “todo Israel”
  rationale: El hebreo no deja implícitos estos grupos; los nombra de forma expresa. La versión española conserva esa inclusión explícita para reflejar el alcance comunitario del acto.
  doctrine_reference: Principios de consistencia terminológica y fidelidad a la estructura del texto fuente
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final inglesa que volvió a una estructura más literal del hebreo (“There was not a word... that Joshua did not read”) y mantuvo el participio final (“walked among them”). En español se conserva el paralelismo negativo con una formulación natural: “No quedó sin ser leído ningún mandato... que Josué no leyera”. También se mantiene la inclusión explícita de mujeres, niños pequeños y el forastero, como en la tradición auditada.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el nombre divino aparece explícitamente; este versículo no lo requiere.
  - Se prefirió “asamblea” para קְהַל por coherencia con el registro público-covenantal.
  - “Forastero” se usa aquí como equivalente funcional de גֵּר, con nota aclaratoria para evitar confusión con un simple visitante.
  - El cierre participial se traduce con “andaba entre ellos” para preservar la imagen verbal del hebreo sin sobrecargar la sintaxis.
