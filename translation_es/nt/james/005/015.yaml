translation:
  language: es
  text: Y la oración de fe[a] salvará[b] al enfermo, y el Señor lo levantará. Y si ha cometido pecados[c], le serán perdonados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oración de fe» también puede entenderse como oración caracterizada por la confianza, o, menos probablemente aquí, por la fidelidad.
    reason: lexical_alternative
  - marker: b
    text: O «sanará» o «lo hará bien»; el griego dice «salvará».
    reason: lexical_alternative
  - marker: c
    text: O «incluso si ha cometido pecados».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχὴ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - ruego
  - petición
  - voto
  lexicon: BDAG
  rationale: En el contexto inmediato de los ancianos orando por el enfermo (v. 14), εὐχή se entiende naturalmente como oración, no como voto. «Oración» es la equivalencia más clara y normal en español.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: 'Sigo la decisión base del proyecto para πίστις: «fe». En esta construcción genitiva, expresa oración caracterizada por fe/confianza en Dios. «Fidelidad» es posible en abstracto, pero menos probable aquí, por lo que queda solo como alternativa.'
- source_word: σώσει
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - sanará
  - restaurará
  - hará bien
  lexicon: BDAG
  rationale: σῴζω conserva su fuerza propia con «salvará». En este contexto de enfermedad, la sanidad corporal está incluida por el contexto, pero el verbo no se reduce al sentido médico.
- source_word: τὸν κάμνοντα
  english_pob_choice: the one who is sick
  chosen_spanish: al enfermo
  alternatives_spanish:
  - al cansado
  - al débil
  - al agotado
  lexicon: BDAG
  rationale: κάμνω puede significar estar cansado o estar enfermo. Aquí, por el marco de enfermedad, unción y levantamiento, «al enfermo» comunica el sentido de modo idiomático y fiel.
- source_word: ἐγερεῖ
  english_pob_choice: will raise up
  chosen_spanish: lo levantará
  alternatives_spanish:
  - lo restaurará
  - lo despertará
  lexicon: BDAG
  rationale: ἐγείρω significa literalmente «levantar» o «poner en pie». «Lo levantará» preserva la imagen verbal y funciona bien en español sin perder la referencia al restablecimiento del enfermo.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Por la convención del NT y el uso teológico del término, κύριος se traduce «el Señor». Aquí la mayúscula no altera el sentido y mantiene la referencia reverente a la acción divina.
- source_word: κἂν ἁμαρτίας ᾖ πεποιηκώς
  english_pob_choice: if he has committed sins
  chosen_spanish: si ha cometido pecados
  alternatives_spanish:
  - aunque haya cometido pecados
  - incluso si ha cometido pecados
  - si resulta que ha cometido pecados
  lexicon: BDAG
  rationale: La construcción expresa una concesión condicional. «Si ha cometido pecados» es claro y reproduce la estructura sin convertirla en una afirmación universal sobre la causa de toda enfermedad. La alternativa concesiva se conserva implícita, no explicitada en la línea principal.
- source_word: ἀφεθήσεται
  english_pob_choice: he will be forgiven
  chosen_spanish: le serán perdonados
  alternatives_spanish:
  - será perdonado
  - se le perdonará
  lexicon: BDAG
  rationale: El pasivo futuro de ἀφίημι aquí se refiere al perdón de pecados. «Le serán perdonados» mantiene el pasivo divino de forma natural en español y hace explícito que el objeto del perdón son los pecados.
theological_decisions:
- issue: 'Alcance de σώσει: sanidad física o salvación más amplia'
  english_pob_reading: The main text says 'will save,' preserving lexical breadth while the sickness context makes healing apparent.
  chosen_spanish_reading: «Salvará» conserva la amplitud del verbo; el contexto de enfermedad deja claro que la sanidad corporal está implicada.
  alternative_spanish_readings:
  - «Sanará»
  - «lo curará»
  - «lo restablecerá»
  rationale: No se debe reducir σῴζω solo a curación médica, pero tampoco oscurecer el contexto. «Salvará» preserva la carga semántica amplia y deja que el contexto precise el sentido inmediato.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: πίστις'
- issue: Si la traducción debe sugerir una sanidad automática o garantizada
  english_pob_reading: The future indicatives are rendered straightforwardly without added qualifiers or doctrinal hedging.
  chosen_spanish_reading: La versión declara la promesa tal como está, sin añadir límites interpretativos ni absolutizar más allá del texto.
  alternative_spanish_readings:
  - «puede sanar»
  - «sanará ciertamente en todo caso»
  rationale: El griego usa futuros; la traducción debe respetarlos. No conviene suavizar la fuerza de la afirmación ni convertirla en una garantía doctrinal formulada por el traductor.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Relación entre pecados y enfermedad
  english_pob_reading: 'The conditional clause is translated conditionally: ''if he has committed sins, he will be forgiven.'''
  chosen_spanish_reading: La cláusula condicional permanece condicional, sin convertirla en una causa universal de toda enfermedad.
  alternative_spanish_readings:
  - Sugerir que toda enfermedad proviene del pecado personal
  - Desconectar por completo el perdón de la cláusula condicional
  rationale: El texto presenta el pecado como posibilidad, no como regla universal. La traducción debe conservar esa tensión y evitar sobreinterpretaciones.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el análisis previo y no requiere cambios sustanciales; se conservaron las decisiones del texto inglés auditado, ajustándolas a español natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo una equivalencia consistente para σῴζω como «salvar» y no se redujo a una sola lectura médica.
  - «Pecados» se conservó en plural para reflejar ἁμαρτίας.
  - Se evitó añadir artículos o giros que suavicen la estructura condicional del griego.
  - «El Señor» se usa como equivalente estable de κύριος en este contexto.
  - 'El orden de las cláusulas sigue de cerca el original para preservar la progresión: salvará / levantará / perdonará.'
