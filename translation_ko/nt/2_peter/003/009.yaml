id: 2PE.3.9
reference: 2 Peter 3:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ βραδύνει ⸀κύριος τῆς ἐπαγγελίας, ὥς τινες βραδύτητα ἡγοῦνται, ἀλλὰ μακροθυμεῖ εἰς ⸀ὑμᾶς, μὴ βουλόμενός τινας ἀπολέσθαι ἀλλὰ πάντας εἰς μετάνοιαν χωρῆσαι.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/009.yaml
  text: The Lord is not slow concerning the promise[a], as some consider slowness, but is patient toward you[c][b], not wanting any to perish but all to come to repentance.
  footnotes:
  - marker: a
    text: Or 'as some count it slowness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is patient with you.'
    reason: lexical_alternative
  - marker: c
    text: The scope of 'any' and 'all' is left as stated in the Greek; interpreters differ on whether Peter refers specifically to his readers or more broadly to humanity.
    reason: alternative_reading
translation:
  language: ko
  text: 주님께서는 어떤 사람들이 더디다고 여기는 것처럼 약속에 대하여 더디신 것이 아니라, 여러분에 대하여 오래 참으시는 것입니다. 아무도 멸망하지 않고 모두 회개에 이르기를 원하시기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βραδύνει ... βραδύτητα
  english_pob_choice: slow ... slowness
  chosen_korean: 더디시다 ... 더디다
  alternatives_korean:
  - 지체하시다 ... 지체
  lexicon: BDAG
  rationale: 용어집 표준. 동족어를 일관되게 「더디다」로 보존.
- source_word: μακροθυμεῖ
  english_pob_choice: is patient
  chosen_korean: 오래 참다
  alternatives_korean:
  - 인내하다
  lexicon: BDAG
  rationale: μακροθυμία의 「길게 견딤」.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_korean: 회개
  lexicon: BDAG
  rationale: 용어집 표준.
