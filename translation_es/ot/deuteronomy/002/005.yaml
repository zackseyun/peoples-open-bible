revisions:
- from: No contiendan con ellos[a], porque no les daré nada de su tierra, ni siquiera lo suficiente para que la planta de un pie la pise[b], porque he dado el monte Seír[c] a Esaú como posesión.
  to: No entren en conflicto con ellos[a], porque no les daré nada de su tierra, ni siquiera lo suficiente para que la planta de un pie pise, porque he dado el monte Seír[c] a Esaú como posesión[b].
  rationale: Se ajusta el español para mayor naturalidad ('No entren en conflicto con ellos') mientras se mantiene el sentido de hostilidad prohibida del hebreo. Se simplifica levemente el modismo del pie para evitar una construcción forzada. Sobre todo, se restaura la nota léxica documentada para יְרֻשָּׁה ('posesión/herencia'), anclándola correctamente en el texto, y se conserva la nota cultural sobre Monte Seír.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: prohibición de entrar en conflicto con Edom, negación total de cualquier porción de su tierra, y fundamento teológico en la concesión divina de Seír a Esaú. También conserva adecuadamente la alternativa léxica sobre הַר שֵׂעִיר como región montañosa. Sin embargo, hay un desajuste de notas: la nota [b] en español explica el modismo de ''huella/paso'', mientras que en el rastro inglés la nota sobre ''posesión/herencia'' también debe preservarse. Además, la construcción ''para que la planta de un pie la pise'' suena algo pesada en español.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero 'No contiendan con ellos' resulta algo rígido en español bíblico contemporáneo; 'No entren en conflicto con ellos' comunica mejor el sentido sin sobreespecificar guerra formal. Asimismo, 'ni siquiera lo suficiente para que la planta de un pie pise' suena más natural sin el pronombre 'la', y conviene añadir la nota de 'posesión/herencia' anclada en esa frase para mantener la documentación léxica del POB.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Esaú', 'Dios' implícito por la primera persona divina, y 'posesión' son adecuados. 'Monte Seír' es aceptable con nota cultural. La decisión de no usar 'herencia' en el texto principal está bien, pero la alternativa debe conservarse en nota.
  issues:
  - severity: medium
    issue: Falta en español la nota léxica sobre 'como posesión' / 'como herencia'.
    rationale: El English POB preserva explícitamente esa alternativa para יְרֻשָּׁה. El borrador español omite esa nota y en su lugar usa [b] para otra alternativa del modismo, alterando el rastro de decisiones documentadas.
  - severity: low
    issue: La frase 'para que la planta de un pie la pise' suena algo forzada.
    rationale: El hebreo expresa el mínimo espacio para pisar con la planta del pie. En español, la idea se puede mantener con mejor fluidez como 'para que la planta de un pie pise' o equivalente, sin perder precisión.
  - severity: low
    issue: '''No contiendan con ellos'' es comprensible pero algo acartonado.'
    rationale: Aunque fiel, en español actual eclesial suena menos natural que 'No entren en conflicto con ellos', que conserva la fuerza de hostilidad contenida en תתגרו בם sin limitarlo a provocación verbal.
  revised_spanish_text: No entren en conflicto con ellos[a], porque no les daré nada de su tierra, ni siquiera lo suficiente para que la planta de un pie pise, porque he dado el monte Seír[c] a Esaú como posesión[b].
  revised_footnotes:
