translation:
  language: es
  text: Entonces el rey se levantó al amanecer[a], a primera luz, y con prisa[b] fue al foso de los leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al rayar el día ... cuando clareó». El verso usa dos expresiones de amanecer muy cercanas para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: «Con prisa» también puede sugerir «con alarma» o «con urgencia ansiosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  - Entonces, pues
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia. «Entonces» preserva la progresión narrativa de forma natural en español.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: La forma enfática con artículo se refleja bien con «el rey», manteniendo la referencia definida del relato.
- source_word: בִּשְׁפַּרְפָּרָא
  english_pob_choice: at dawn
  chosen_spanish: al amanecer
  alternatives_spanish:
  - al alba
  - al rayar el día
  - al despuntar el día
  lexicon: HALOT
  rationale: El término arameo apunta al inicio del día. «Al amanecer» es idiomático y conserva la primera de las dos expresiones temporales sin sonar repetitivo.
- source_word: יְקוּם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  - se levantó de madrugada
  lexicon: HALOT
  rationale: Verbo de levantarse/ponerse en pie. «Se levantó» comunica el movimiento narrativo con naturalidad y sin perder el matiz de acción iniciada.
- source_word: בְּנָגְהָא
  english_pob_choice: at first light
  chosen_spanish: a primera luz
  alternatives_spanish:
  - cuando clareó
  - cuando hubo luz
  - al clarear
  lexicon: HALOT
  rationale: La imagen es de luz/claridad. Como el verso ya dice «al amanecer», conviene distinguir esta segunda expresión sin aplanarla; «a primera luz» preserva la repetición enfática del original.
- source_word: וּבְהִתְבְּהָלָה
  english_pob_choice: and in haste
  chosen_spanish: y en prisa
  alternatives_spanish:
  - y apresuradamente
  - y con premura
  - y con ansiedad
  lexicon: HALOT
  rationale: El sustantivo arameo expresa prisa, agitación o urgencia ansiosa. «En prisa» mantiene el valor adverbial y deja abierta la posible tensión emocional que el inglés POB también reconoció.
- source_word: לְגֻבָּא
  english_pob_choice: to the den
  chosen_spanish: al foso
  alternatives_spanish:
  - a la cueva
  - al hoyo
  lexicon: HALOT
  rationale: En Daniel 6 el lugar es el recinto para leones. «Foso» es la equivalencia más precisa y reconocible en español bíblico para este contexto.
- source_word: אַרְיָוָתָא
  english_pob_choice: the lions
  chosen_spanish: de los leones
  alternatives_spanish:
  - de los leones
  lexicon: HALOT
  rationale: El plural definido se traduce de manera directa. El complemento «de los leones» especifica el foso mencionado en el relato.
theological_decisions:
- issue: Doble expresión temporal de inmediatez matinal
  english_pob_reading: The verse uses two closely related dawn expressions for emphasis.
  chosen_spanish_reading: 'Se conservan dos expresiones distintas: «al amanecer» y «a primera luz».'
  alternative_spanish_readings:
  - 'usar una sola expresión: «al amanecer»'
  - fusionarlas en «al rayar el día»
  rationale: El hebreo/arameo presenta dos fórmulas temporales cercanas, y el POB inglés preserva esa redundancia enfática. En español conviene mantener ambas sin volverlas idénticas para no perder el énfasis.
  doctrine_reference: Ninguno; decisión de estilo y fidelidad léxica.
- issue: Tono de urgencia en la marcha del rey
  english_pob_reading: '''In haste'' may also carry the sense ''in alarm'' or ''in anxious urgency.'''
  chosen_spanish_reading: «y en prisa» conserva la urgencia sin fijarla como miedo explícito.
  alternative_spanish_readings:
  - «y apresuradamente»
  - «y con alarma»
  - «y con ansiedad urgente»
  rationale: La forma aramea admite prisa, agitación o urgencia ansiosa. La versión española debe reflejar la acción rápida sin resolver de manera cerrada una carga emocional que el contexto inmediato no obliga a explicitar.
  doctrine_reference: Ninguno; matiz léxico-narrativo.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de POB sin depender mecánicamente de él: se mantuvo la duplicación temporal del arameo con dos equivalentes españoles distintos, y se preservó la ambigüedad de la urgencia del rey sin intensificarla indebidamente. No se reportaron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa «foso» para el lugar de los leones, en continuidad con el contexto narrativo de Daniel 6.
  - Se evita «Cristo/Mesías» porque no aplica en este versículo.
  - Se conserva un español bíblico claro y contemporáneo, sin arcaísmos innecesarios.
