review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el imperativo de זָכוֹר y el propósito de לְקַדְּשׁוֹ. Sin embargo, «día de reposo» sustituye el término identificable הַשַּׁבָּת por una paráfrasis, mientras que la evidencia fuente y la auditoría inglesa tratan «Sabbath»/«sábado de reposo» como designación específica del día. En español, «sábado» preserva mejor la referencia léxica directa sin perder inteligibilidad.
  spanish_quality_summary: El español es claro y natural, pero «Acuérdate» seguido de «del día de reposo» suena más tradicional que directo, y la frase completa puede mejorarse para reflejar mejor el término bíblico específico. «Recuerda el día sábado[a], para santificarlo» es más fiel al hebreo y ampliamente comprensible en español latinoamericano eclesial.
  glossary_alignment: No hay términos del glosario mayor involucrados salvo la necesidad de respetar el valor específico de שַׁבָּת. El borrador se aparta de la decisión inglesa documentada al preferir una paráfrasis semántica («día de reposo») en vez de un equivalente identificable del título del día. «Sábado» mantiene mejor la alineación léxica y teológica.
  issues:
  - severity: medium
    issue: «día de reposo» reemplaza «el sábado / el día de sábado»
    rationale: הַשַּׁבָּת nombra el día específico del pacto, no solo la idea general de reposo. La paráfrasis comunica parte del sentido, pero pierde la identificación terminológica que la fuente y la auditoría conservan.
  - severity: low
    issue: La nota al pie no refleja la mejor alternativa española para קדשׁ
    rationale: La nota actual es aceptable, pero conviene mantener una formulación más natural y precisa como «apartarlo como santo» en paralelo con la auditoría inglesa.
  revised_spanish_text: Recuerda el día sábado[a], para santificarlo.
  revised_footnotes:
  - marker: a
    text: O «el día de reposo»; también «para hacerlo santo» o «para apartarlo como santo».
    reason: lexical_alternative
  revision_rationale: Se revisa «día de reposo» a «día sábado» para conservar mejor la referencia específica de הַשַּׁבָּת como nombre del día, en vez de solo su función. Se mantiene «santificarlo» porque representa fielmente קדשׁ con buen peso teológico y español natural.
