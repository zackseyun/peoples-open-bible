  text: נִשְׂקַד֩ עֹ֨ל פְּשָׁעַ֜/י בְּ/יָד֗/וֹ יִשְׂתָּֽרְג֛וּ עָל֥וּ עַל צַוָּארִ֖/י הִכְשִׁ֣יל כֹּחִ֑/י נְתָנַ֣/נִי אֲדֹנָ֔/י בִּ/ידֵ֖י לֹא אוּכַ֥ל קֽוּם־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/014.yaml
  text: The yoke of my transgressions is bound by his hand[a]; they are woven together, they have come up upon my neck; he has made my strength fail[c][b]. The Lord has given me into hands from which I cannot rise.
  footnotes:
  - marker: a
    text: Or 'is watched over'; the Hebrew verb is rare and difficult. The context favors the sense that the yoke is fastened or bound.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are intertwined' or 'twisted together.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into hands'; the expression leaves the oppressors indefinite.
    reason: lexical_alternative
