translation:
  language: es
  text: Y cada uno dejó su lugar y se fue a su propia tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - se apartó de
  lexicon: BDAG
  rationale: El aoristo de καταλείπω aquí expresa que alguien deja un lugar atrás. «Dejó» comunica con naturalidad ese movimiento sin cargarlo con el matiz más fuerte de «abandonó».
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada persona
  lexicon: BDAG
  rationale: «Cada uno» preserva la distribución individual del sujeto griego y mantiene el sentido narrativo sin introducir especificidad de género que no está en la forma.
- source_word: τὸν τόπον αὐτοῦ
  english_pob_choice: his place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su puesto
  - su posición
  lexicon: BDAG
  rationale: τόπος significa de manera básica «lugar». En este contexto narrativo militar o político podría insinuar una estación, pero el sintagma es lo bastante amplio para que «su lugar» sea la equivalencia más fiel y natural.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: ἀπέρχομαι denota irse o alejarse. «Se fue» reproduce ese movimiento de salida de manera fluida en español y encadena bien con «dejó su lugar».
- source_word: εἰς τὴν γῆν αὐτοῦ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su país
  lexicon: BDAG
  rationale: γῆ puede significar tierra, territorio o país. Aquí se trata del territorio de origen de cada uno; «su propia tierra» conserva la idea posesiva de αὐτοῦ y evita la resonancia moderna de «país».
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada muestran total concordancia de sentido; no hay variantes textuales ni tensiones lexicoteológicas que requieran nota adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero en español natural.
  - No se introduce terminología eclesiástica posterior; el verso es narrativo y descriptivo.
  - «Su propia tierra» sigue de cerca la fuerza posesiva del griego sin sonar artificial.
