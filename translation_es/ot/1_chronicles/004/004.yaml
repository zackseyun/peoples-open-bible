theological_decisions:
- issue: Relación genealógica expresada por 'padre de'
  english_pob_reading: the father of
  chosen_spanish_reading: padre de
  alternative_spanish_readings:
  - fundador de
  - antepasado de
  rationale: La fórmula puede señalar progenitor, fundador o antepasado, especialmente vinculada a pueblos o clanes. Se conserva la ambigüedad histórica sin sobreinterpretar el vínculo.
  doctrine_reference: Cronologías y genealogías del Antiguo Testamento; uso idiomático de patronímicos y fundación de asentamientos.
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con la revisión inglesa más reciente: no hubo cambios textuales ni decisiones de revisión que afecten el español. Se mantiene la equivalencia óptima con los nombres propios transliterados y la fórmula genealógica literal.'
  spanish_consistency_notes:
  - Se conserva 'padre de' como calco controlado para respetar el hebreo genealógico.
  - Se usa 'primogénito' para reflejar el estatus del término hebreo sin añadir 'hijo' que el texto no explicita.
  - Se adopta 'Belén' y 'Efrata' como formas españolas establecidas y comprensibles.
  - Los nombres propios se transliteran de forma consistente sin armonizarlos con variantes de otros libros.
