translation:
  language: es
  text: 'Porque ciertamente habría sido apropiado inscribir aun estas palabras en su misma lápida[a], dichas como memorial a los de la nación:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la misma inscripción funeraria». El griego ἐπιτάφιον puede referirse a la inscripción del sepulcro o al monumento que la lleva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξιον ἦν
  english_pob_choice: it would indeed have been fitting
  chosen_spanish: habría sido digno
  alternatives_spanish:
  - habría sido apropiado
  - habría sido conveniente
  lexicon: LSJ
  rationale: La expresión impersonal transmite conveniencia o justeza. En español, «habría sido digno» conserva el valor de lo apropiado o merecido sin sonar rígido, y mantiene el matiz valorativo del griego.
- source_word: ἐπὶ αὐτοῦ τοῦ ἐπιταφίου
  english_pob_choice: on his very tombstone
  chosen_spanish: en su misma lápida
  alternatives_spanish:
  - sobre la misma inscripción funeraria
  - en su epitafio mismo
  lexicon: LSJ
  rationale: El griego puede referirse a la inscripción o al monumento funerario. «Lápida» comunica bien el objeto físico en español moderno; «misma» refleja el énfasis de αὐτοῦ τοῦ. Se conserva la ambigüedad parcial del término griego mediante la nota.
- source_word: ἀναγράψαι
  english_pob_choice: to inscribe
  chosen_spanish: inscribir
  alternatives_spanish:
  - escribir
  - grabar
  lexicon: LSJ
  rationale: «Inscribir» es el equivalente más preciso para una inscripción funeraria y mantiene el registro formal del texto.
- source_word: καὶ ταῦτα
  english_pob_choice: even these words
  chosen_spanish: aun estas palabras
  alternatives_spanish:
  - también estas cosas
  - estas también
  lexicon: LSJ
  rationale: El demostrativo apunta al contenido memorial que sigue. «Aun estas palabras» conserva la fuerza enfática de καὶ y hace explícito en español que se trata de un dicho o inscripción.
- source_word: τοῖς ἀπὸ τοῦ ἔθνους
  english_pob_choice: to those of the nation
  chosen_spanish: para los del pueblo
  alternatives_spanish:
  - para los de la nación
  - para los del linaje
  lexicon: LSJ
  rationale: En 4 Macabeos, ἔθνος suele referirse al pueblo judío. «Pueblo» suena natural en español bíblico y conserva el sentido colectivo sin imponer una paráfrasis excesiva.
- source_word: εἰς μνείαν
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - para recuerdo
  - para memorial
  lexicon: LSJ
  rationale: «Memorial» reproduce bien la función conmemorativa y es una forma estable en español religioso/literario. Mantiene la finalidad del texto.
- source_word: λεγόμενα
  english_pob_choice: spoken
  chosen_spanish: dichas
  alternatives_spanish:
  - pronunciadas
  - proferidas
  lexicon: LSJ
  rationale: El participio describe las palabras como dichas/expresadas para conmemoración. «Dichas» es natural en español y conserva el vínculo con el acto de hablar.
theological_decisions:
- issue: Sentido de ἔθνος en 4 Macabeos
  english_pob_reading: those of the nation
  chosen_spanish_reading: los del pueblo
  alternative_spanish_readings:
  - los de la nación
  - nuestro pueblo
  rationale: No hay un desarrollo doctrinal directo, pero sí una carga identitaria. Opto por «pueblo» porque en castellano bíblico comunica mejor la colectividad histórica sin añadir posesivo que el griego no expresa explícitamente.
  doctrine_reference: identidad colectiva del pueblo de Dios en literatura deuterocanónica
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del griego y la decisión inglesa de entender ἐπιτάφιον como objeto funerario inscribible, pero en español se eligió «lápida» por naturalidad y lectura pública. También se mantuvo la orientación memorial de εἰς μνείαν con «como memorial», y se conservó la referencia colectiva de τοῖς ἀπὸ τοῦ ἔθνους sin convertirla en un posesivo no explicitado.
  spanish_consistency_notes:
  - Se mantuvo «memorial» para εἰς μνείαν, coherente con un registro bíblico-literario.
  - «Pueblo» se usa aquí como equivalente de ἔθνος en sentido nacional/colectivo, sin borrar su referencia histórica específica.
  - «Dichas» preserva el participio pasivo/medio en una construcción española natural, sin añadir un sujeto que el griego no exige.
