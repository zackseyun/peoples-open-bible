translation:
  language: es
  text: 'Los mensajeros volvieron y dijeron[a]: «Así dice Ben-hadad: “Aunque te envié este mensaje: ‘Me darás tu plata, tu oro, tus esposas y tus hijos’”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Porque te envié este mensaje: …». La partícula hebrea כי puede traducirse de varias maneras; aquí se entiende de modo concesivo («Aunque») a la luz de la escalada que continúa en el versículo siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - volvieron de regreso
  lexicon: HALOT
  rationale: El verbo שוב en narrativa secuencial indica que los enviados retornan al lugar de origen. «Volvieron» es natural en español y conserva el movimiento de regreso sin carga interpretativa adicional.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los enviados
  - los emisarios
  lexicon: HALOT
  rationale: El contexto político-militar muestra que se trata de seres humanos enviados en comisión, no de ángeles. «Mensajeros» mantiene la amplitud semántica y es fiel al contexto.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula mensajera hebrea se conserva con una construcción solemne y natural en español. «Ha dicho» expresa bien el anuncio formal en discurso citado.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio en transliteración. En español, «Ben-adad» es una forma clara y lecturable; la variante con h también sería posible, pero aquí se opta por una grafía más fluida.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: a decir
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo introduce la cita directa y aquí depende de «te envié». «A decir» refleja la estructura hebrea sin forzar un calco pesado.
- source_word: שָׁלַחְתִּי אֵלֶיךָ
  english_pob_choice: I sent to you
  chosen_spanish: te envié
  alternatives_spanish:
  - te mandé
  - te envié mensaje
  lexicon: HALOT
  rationale: El perfecto verbal se refiere a una acción ya realizada por el rey. «Te envié» reproduce el sentido con naturalidad y sin añadir un sustantivo no explícito en el hebreo.
- source_word: כַּסְפְּךָ וּזְהָבְךָ
  english_pob_choice: your silver and your gold
  chosen_spanish: tu plata y tu oro
  alternatives_spanish:
  - tu dinero y tu oro
  - tus riquezas de plata y oro
  lexicon: HALOT
  rationale: «Plata» y «oro» conservan el valor concreto de los metales preciosos del texto. El singular colectivo en español es natural y fiel.
- source_word: וְנָשֶׁיךָ
  english_pob_choice: your wives
  chosen_spanish: tus mujeres
  alternatives_spanish:
  - tus esposas
  - tus esposas y mujeres
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «wives» por precisión contextual, el hebreo usa «mujeres». En español, «tus mujeres» preserva mejor la forma léxica del original sin perder el sentido de posesión marital en este contexto.
- source_word: וּבָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos y descendientes
  lexicon: HALOT
  rationale: בנים puede referir a hijos varones, pero en español «hijos» comunica de manera natural la referencia familiar en esta lista de bienes y dependientes. La precisión masculina queda implícita por el contexto de la forma hebrea y el destinatario masculino singular.
- source_word: לִי תִתֵּן
  english_pob_choice: You shall give me
  chosen_spanish: me darás
  alternatives_spanish:
  - me debes dar
  - me has de dar
  lexicon: HALOT
  rationale: El imperfecto en discurso directo expresa exigencia u obligación. «Me darás» conserva la fuerza de demanda y suena natural en español moderno, sin perder la coerción implícita.
theological_decisions:
- issue: Valor de כי en la cita de Ben-adad
  english_pob_reading: Though / concessive nuance prepared for the next verse; footnote notes possible 'For'
  chosen_spanish_reading: Porque te envié a decir...
  alternative_spanish_readings:
  - Pues te envié a decir...
  - Aunque te envié a decir...
  rationale: El hebreo כי admite varias lecturas. Siguiendo el texto base, se mantiene una traducción que puede leerse causalmente en esta sola línea, mientras la nota preserva la alternativa concesiva observada por el POB en inglés. Esto evita fijar en el texto principal una interpretación excesivamente explicativa.
  doctrine_reference: N/A (disputa de partícula y sintaxis, no doctrinal)
- issue: Relación entre 'hijos' y el hebreo בנים
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - descendientes
  rationale: El hebreo masculino plural puede ser específico de varones, pero en español «hijos» es la forma más natural y comprensible en esta enumeración. Se evita expandir a «descendientes», que sería demasiado interpretativo.
  doctrine_reference: N/A (decisión léxica)
- issue: Forma del nombre Ben-hadad
  english_pob_reading: Ben-hadad
  chosen_spanish_reading: Ben-adad
  alternative_spanish_readings:
  - Ben-hadad
  rationale: Se conserva la transliteración del nombre propio. La forma elegida sigue siendo identificable y no altera el referente histórico; la variación ortográfica no afecta al contenido teológico.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el contexto de auditoría del POB inglés, que no introdujo cambios de revisión en esta unidad y mantiene acuerdo alto con el texto fuente. La principal tensión trasladada al español es la partícula כי, cuya ambigüedad se conserva mediante nota; también se ajustó el nombre propio Ben-hadad/Ben-adad con una transliteración española estable.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo lo requiere; aquí no aparece el nombre divino.
  - Se mantuvo un registro solemne pero idiomático, con discurso directo anidado y puntuación española estándar.
  - Se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una formulación más natural en español, especialmente en la cita introductoria y en el infinitivo לֵאמֹר.
  - Se preservó la tensión léxica de נָשֶׁיךָ con «tus mujeres», sin imponer una equivalencia más interpretativa que el hebreo no exige.
