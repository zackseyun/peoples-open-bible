  yaml_path: translation/ot/isaiah/035/008.yaml
  text: And there shall be a highway there[a], and a road, and it shall be called the Holy Way. The unclean shall not pass over it, but it shall be for them[b]; whoever walks on the way—even fools—shall not go astray.
  footnotes:
