review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB en casi todos los puntos: נֶפֶשׁ como ''persona'', נגע como ''toca'', la serie de tres ejemplos de impureza por cadáver, la cláusula ''le queda oculto'' para וְנֶעְלַם מִמֶּנּוּ, y la progresión ''está inmundo ... se hace culpable''. Sin embargo, שֶׁרֶץ se acerca mejor a ''criatura que pulula/se arrastra'' que a ''animal que se arrastra'' solo, porque el hebreo enfatiza la categoría de seres pequeños que pululan, no meramente reptiles o animales rastreros. También conviene alinear la nota del ocultamiento con la nota inglesa, que va sobre esa cláusula y no sobre ''persona''.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico legible. 'Cualquier cosa inmunda', 'animal silvestre inmundo' y 'ganado inmundo' funcionan bien. 'Le queda oculto' es aceptable, pero suena un poco menos natural que 'le está oculto'; aun así conserva la perspectiva hebrea. El problema principal de legibilidad/precisión está en 'animal que se arrastra', que puede estrechar indebidamente la categoría. Además, la nota [a] actual sobre 'persona' no responde a una ambigüedad importante del español, mientras que sí sería útil conservar la alternativa del POB en 'le está oculto'.
  glossary_alignment: 'La terminología principal está alineada con las decisiones del proyecto: טָמֵא como ''inmundo'' mantiene la categoría ritual; no hay conflictos con Yahvé/Mesías/etc. ''Cadáver'' es defendible para נִבְלַת, aunque ''carcasa'' también sería posible; no requiere cambio. ''Se hace culpable'' preserva razonablemente וְאָשֵׁם. La excepción recomendada es ajustar שֶׁרֶץ a ''criatura que pulula'' para reflejar mejor la decisión auditada en inglés (''swarming creature'').'
  issues:
  - severity: medium
    issue: La traducción de שֶׁרֶץ como 'animal que se arrastra' es más estrecha que el hebreo y que la decisión del POB.
    rationale: שֶׁרֶץ abarca seres pequeños que pululan/andan en enjambre, no solo animales rastreros. 'Criatura que pulula' o similar preserva mejor la categoría levítica.
  - severity: medium
    issue: La nota [a] está anclada en 'persona', pero la nota correspondiente del POB trata de וְנֶעְלַם מִמֶּנּוּ ('le está oculto/he is unaware of it').
    rationale: El aparato de notas debería conservar la alternativa significativa del original auditado donde realmente surge la ambigüedad léxica. La nota sobre 'persona' no es necesaria aquí y desplaza una nota más importante.
  - severity: low
    issue: '''Le queda oculto'' es aceptable, pero ''le está oculto'' suena más directo y formal.'
    rationale: Ambas expresan la idea de que el hecho está oculto para la persona; 'le está oculto' se acerca un poco más al valor estático del hebreo y suena más idiomático en registro bíblico moderno.
