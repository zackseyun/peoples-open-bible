revisions:
- from: Entonces los árboles del bosque cantarán de gozo[a] delante de Yahvé, porque viene[b] a juzgar la tierra[c].
  to: Entonces los árboles del bosque cantarán de alegría[a] delante de Yahvé, porque viene[b] a juzgar la tierra[c].
  rationale: Se hicieron ajustes menores para mejorar la naturalidad y dignidad del español sin alterar el sentido fuente ni las decisiones teológicas del expediente POB. 'Cantarán de alegría' suena más idiomático que 'cantarán de gozo'; la nota verbal se reformuló para una alternativa española más natural; y la nota sobre הָאָרֶץ se afinó para evitar el coloquialismo 'el país' manteniendo la posibilidad de un sentido local.
