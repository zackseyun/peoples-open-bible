translation:
  language: es
  text: 'Como dice el proverbio[a] antiguo: «De los malvados sale la maldad», pero mi mano no estará contra ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como dice el proverbio de los antiguos». El adjetivo hebreo puede entenderse como «antiguo» o como referido a «los antiguos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: Introduzco la fórmula de cita proverbial con una comparación natural en español. «Como» comunica bien el valor comparativo/citatorio sin sonar forzado.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - ha dicho
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí de modo gnómico; en español, el presente «dice» mantiene el valor proverbial y la viveza de una sentencia vigente.
- source_word: מְשַׁל
  english_pob_choice: proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - dicho
  - máxima
  - refrán
  lexicon: HALOT
  rationale: «Proverbio» refleja el carácter de dicho sapiencial breve y tradicional, y encaja con el registro bíblico sin diluir el género.
- source_word: הַקַּדְמֹנִי
  english_pob_choice: ancient
  chosen_spanish: antiguo
  alternatives_spanish:
  - de los antiguos
  - de antaño
  - viejo
  lexicon: HALOT
  rationale: El adjetivo puede referirse a lo antiguo o a «los antiguos». En la frase española, «antiguo» es la opción más natural y conserva la ambigüedad amplia del hebreo; la nota conserva la alternativa lexical.
- source_word: מֵרְשָׁעִים
  english_pob_choice: from the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los perversos
  - de los injustos
  lexicon: HALOT
  rationale: «Impíos» mantiene la categoría moral fuerte del hebreo y su registro bíblico; además, permite un paralelismo claro con «impiedad». Se evita suavizarlo a «malos».
- source_word: יֵצֵא
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - procede
  - brota
  lexicon: HALOT
  rationale: «Sale» reproduce de forma breve el sentido de salida/procedencia del verbo y suena natural en la estructura proverbial del español.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: impiedad
  alternatives_spanish:
  - maldad
  - perversidad
  - iniquidad
  lexicon: HALOT
  rationale: Aquí el hebreo nombra la cualidad moral que «sale» de los impíos. «Impiedad» mantiene el vínculo léxico con «impíos» y reproduce el contraste ético del proverbio. «Maldad» sería posible, pero pierde algo del matiz de impiedad como conducta y condición moral.
- source_word: וְיָדִי
  english_pob_choice: but my hand
  chosen_spanish: pero mi mano
  alternatives_spanish:
  - y mi mano
  - sin embargo, mi mano
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «mano» como idiomática para acción o violencia. «Pero» recoge bien el contraste adversativo implícito en el contexto.
- source_word: לֹא תִהְיֶה בָּךְ
  english_pob_choice: will not be against you
  chosen_spanish: no será contra ti
  alternatives_spanish:
  - no estará sobre ti
  - no te tocará
  - no caerá sobre ti
  lexicon: HALOT
  rationale: La expresión hebrea literalmente comunica una mano que no estará «en/contra» la otra persona. «No será contra ti» preserva la metáfora y la fuerza hostil sin volverla demasiado interpretativa.
theological_decisions:
- issue: Sentido de la sentencia proverbial sobre la fuente de la maldad
  english_pob_reading: Wickedness comes out from the wicked.
  chosen_spanish_reading: De los impíos sale la impiedad.
  alternative_spanish_readings:
  - De los impíos sale la maldad.
  - La maldad sale de los impíos.
  rationale: No se debe aplanar el juego léxico hebreo entre el plural colectivo moral y el sustantivo de cualidad. «Impíos» / «impiedad» conserva la correspondencia interna y deja visible la idea de que el obrar brota del carácter.
  doctrine_reference: Sabiduría proverbial y antropología moral bíblica, sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: He seguido el texto hebreo y el audit trail inglés sin depender mecánicamente de él. La versión inglesa opta por «wickedness/wicked» y una nota sobre «ancient/of the ancients»; en español he preservado ese juego léxico con «impíos/impiedad» y he dejado abierta la alternativa interpretativa en la nota.
  spanish_consistency_notes:
  - He mantenido «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - He preservado la metáfora de la mano como imagen de acción hostil, evitando una explicación demasiado libre.
  - He usado un registro bíblico contemporáneo y sobrio, evitando arcaísmos innecesarios.
  - La nota al pie solo cubre la ambigüedad lexical de הַקַּדְמֹנִי, igual que en el auditable inglés.
