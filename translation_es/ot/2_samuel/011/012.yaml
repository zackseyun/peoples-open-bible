review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia narrativa, el mandato de permanecer, la referencia a Jerusalén y la doble indicación temporal. Sin embargo, introduce un problema de anclaje de nota y una alternativa poco precisa para אֲשַׁלְּחֶךָּ. El hebreo dice literalmente «mañana te enviaré», con contexto de despacho/salida; la traducción principal «te enviaré» es aceptable, pero la nota debe ofrecer alternativas más fieles al campo semántico de שׁלח y el marcador debe anclarse a la expresión pertinente, no quedar suelto al final de la oración.
  spanish_quality_summary: El español es natural, claro y de registro digno. «Quédate aquí hoy también» y «Así que Urías se quedó» leen bien. La frase final «aquel día y el siguiente» es comprensible, pero «al día siguiente» suena un poco más natural y explícito en español bíblico actual. También conviene mover el marcador de nota para cumplir la convención del proyecto.
  glossary_alignment: No hay términos del glosario mayor en juego. La elección de «Urías», «Jerusalén» y «se quedó» es adecuada. Para שׁלח, «te enviaré» está bien como texto principal; en la nota, mejor «te mandaré de vuelta» o «te despacharé» que «te despediré», ya que «despedir» en español puede sugerir cesar a alguien de un cargo o decir adiós.
  issues:
  - severity: medium
    issue: Marcador de nota mal colocado
    rationale: 'El marcador [a] aparece al final de «te enviaré» como elemento suelto de la cita. Según la disciplina requerida, el marcador debe aparecer en la palabra o frase relevante dentro del texto, p. ej. «te enviaré[a]». '
  - severity: medium
    issue: Contenido de la nota léxica mejorable
    rationale: La alternativa «te despediré» no es la mejor equivalencia para שׁלח en este contexto y puede sonar ambigua en español. Debe sustituirse por alternativas más fieles como «te despacharé» o «te mandaré de vuelta».
  - severity: low
    issue: Expresión final algo elíptica
    rationale: «Aquel día y el siguiente» se entiende, pero «aquel día y al día siguiente» es más natural y explícito en español sin apartarse del hebreo.
  revised_spanish_text: 'Entonces David dijo a Urías: «Quédate aquí hoy también, y mañana te enviaré[a].» Así que Urías se quedó en Jerusalén aquel día y al día siguiente.'
  revised_footnotes:
  - marker: a
    text: 'O: «y mañana te despacharé» o «y mañana te mandaré de vuelta».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para cumplir el formato requerido, se mejora la nota léxica para reflejar mejor el sentido de שׁלח en español, y se hace más natural la última expresión temporal con «al día siguiente». No se requiere adjudicación adicional.
