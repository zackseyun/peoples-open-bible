translation:
  language: es
  text: Los aventarás[a], y el viento los llevará, y la tormenta los esparcirá; pero tú te alegrarás en Yahvé[b]; en el Santo de Israel te gloriarás[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los esparcirás». El verbo hebreo puede denotar dispersión en general, pero «aventarás» preserva la imagen de la trilla del contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Yahvé», el nombre divino YHWH.'
    reason: alternative_reading
  - marker: c
    text: 'O: «te alegrarás en el Santo de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּזְרֵם
  english_pob_choice: you will winnow them
  chosen_spanish: Los aventarás
  alternatives_spanish:
  - Los aventarás como grano
  - Los esparcirás
  lexicon: HALOT
  rationale: La imagen hebrea procede de זרה, con fuerza de aventar/winnow y también esparcir. En español, «aventar» conserva el campo agrícola de separar el grano y la paja sin perder la idea de dispersión general; «esparcir» sería más genérico y borra mejor la metáfora del trillo.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el espíritu
  - el aliento
  lexicon: HALOT
  rationale: El paralelismo con «tormenta» y la acción de llevarse lo aventado exige el sentido meteorológico. «Espíritu» o «aliento» introducirían un sentido ajeno al contexto inmediato.
- source_word: תִּשָּׂאֵם
  english_pob_choice: will carry them away
  chosen_spanish: los llevará
  alternatives_spanish:
  - los cargará
  - los levantará
  lexicon: HALOT
  rationale: נשׂא conserva la idea de levantar/cargar. En español, «los llevará» comunica con naturalidad el efecto resultante del viento sobre aquello que ha sido aventado, sin forzar una perífrasis pesada.
- source_word: סְעָרָה
  english_pob_choice: storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el vendaval
  - el huracán
  lexicon: HALOT
  rationale: El hebreo apunta a una tempestad violenta. «Tormenta» es la opción amplia y clara; «vendaval» o «huracán» restringirían o intensificarían demasiado el término.
- source_word: תָּפִיץ
  english_pob_choice: will scatter
  chosen_spanish: los esparcirá
  alternatives_spanish:
  - los dispersará
  - los arrojará lejos
  lexicon: HALOT
  rationale: El hifil de פוץ expresa causar dispersión. «Esparcirá» mantiene la fuerza dispersiva y combina bien con la imagen de chaff arrastrado por el viento.
- source_word: תָּגִיל
  english_pob_choice: you will rejoice
  chosen_spanish: te alegrarás
  alternatives_spanish:
  - te regocijarás
  - exultarás
  lexicon: HALOT
  rationale: גיל denota gozo jubiloso. «Te alegrarás» es natural en español y suficientemente fuerte; «regocijarás» o «exultarás» suenan más marcados o literarios, pero no son necesarios aquí.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוָה: «Yahvé» como nombre divino explícito, no el reemplazo tradicional «SEÑOR». La preposición «en» conserva la esfera/ámbito de la alegría.'
- source_word: בִּקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: in the Holy One of Israel
  chosen_spanish: en el Santo de Israel
  alternatives_spanish:
  - en el Santo de Israel
  - en el Santo de Israel mismo
  lexicon: HALOT
  rationale: El título isaiano קדושׁ ישראל se traduce completo como título divino estable. «Santo de Israel» preserva el valor titular y la estructura paralela con «en Yahvé».
- source_word: תִּתְהַלָּל
  english_pob_choice: you will boast
  chosen_spanish: te jactarás
  alternatives_spanish:
  - te gloriarás
  - te gloriarás en ti mismo
  lexicon: HALOT
  rationale: El hitpael de הלל aquí expresa jactarse/gloriarse. «Te jactarás» reproduce bien la fuerza reflexiva y el contraste con la jactancia humana ordinaria, mientras que el contexto positivamente teológico apunta a jactarse en Dios, no a autosuficiencia.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: 'Se aplica el estándar editorial del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. Esto mantiene visible el nombre del pacto y evita la convención de sustitución litúrgica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del verbo final de alabanza/gloria
  english_pob_reading: you will boast
  chosen_spanish_reading: te jactarás
  alternative_spanish_readings:
  - te gloriarás
  - te alabarás
  rationale: El hebreo reflexivo no indica alabanza dirigida a Dios, sino el acto de gloriarse/jactarse en relación con Dios. «Te jactarás» conserva esa fuerza semántica sin borrar la tensión teológica positiva del contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
translation_notes:
  revision_awareness: La revisión más reciente mantiene el texto sin cambios y el dictamen de alta concordancia; la presente propuesta sigue esa lectura estable, preservando la imagen agrícola inicial, el paralelismo viento/tormenta y la terminología del nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva la metáfora de aventar/trilla en lugar de una dispersión plana.
  - «Santo de Israel» se mantiene como título divino completo y no se parafrasea.
  - La preposición «en» se conserva en ambos miembros finales para reproducir el paralelismo hebreo.
  - Se evita «Cristo» u այլ terminología no presente en el texto fuente.
