revisions:
- from: Y lo que quede será para el príncipe[a], a ambos lados de la ofrenda santa y de la propiedad de la ciudad, junto a los veinticinco mil de la ofrenda hasta el límite oriental, y al oeste junto a los veinticinco mil hasta el límite occidental, en correspondencia con las porciones para el príncipe. Y la ofrenda santa y el santuario de la casa estarán en medio de ella.
  to: Y lo que quede será para el príncipe, a ambos lados de la ofrenda santa y de la propiedad de la ciudad, junto a los veinticinco mil[a] de la ofrenda hasta el límite oriental, y al oeste junto a los veinticinco mil hasta el límite occidental, paralelo a las porciones para el príncipe. Y la ofrenda santa y el santuario del templo estarán en medio de ella.
  rationale: Se corrige una literalidad poco clara ('santuario de la casa' → 'santuario del templo'), se fortalece la precisión espacial ('en correspondencia con' → 'paralelo a'), y se reubica la nota al pie al elemento que realmente explica, sin alterar el sentido general bien preservado del borrador.
