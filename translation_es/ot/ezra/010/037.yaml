lexical_decisions:
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Matanías
  - Mattenías
  lexicon: Nombre propio hebreo
  rationale: Se trata de un nombre personal en una lista genealógica; en español conviene transliterarlo, no traducirlo. La forma con -ías reproduce de manera reconocible la terminación frecuente de nombres hebreos y mantiene cercanía con el valor tradicional del nombre sin depender del inglés.
- source_word: מַתְּנַי
  english_pob_choice: Mattenai
  chosen_spanish: Mattenai
  alternatives_spanish:
  - Matenai
  - Mattenay
  lexicon: Nombre propio hebreo
  rationale: También es un nombre propio en contexto de lista. Se conserva la transliteración, manteniendo la forma breve del hebreo y la uniformidad con la tradición transliterada del nombre.
- source_word: ו/יעשו
  english_pob_choice: and Jaasai
  chosen_spanish: y Jaasai
  alternatives_spanish:
  - y Jeshai
  - y Yasai
  lexicon: HALOT
  rationale: La conjunción waw se rinde naturalmente por 'y'. El nombre final es raro y presenta variación en versiones antiguas y modernas; 'Jaasai' sigue de cerca la forma consonántica vocalizada del Texto Masorético y preserva la decisión del audit trail de tratarlo como nombre propio transliterado.
translation_notes:
  revision_awareness: El pasaje no muestra revisiones sustanciales en el historial auditado; el texto inglés final quedó sin cambios y la versión española sigue esa misma lectura estable de lista nominal.
  spanish_consistency_notes:
  - Se mantiene el orden de los tres nombres del hebreo.
  - No se introduce puntuación explicativa adicional porque el versículo es una lista breve de nombres.
  - Se usa 'y' como equivalente directo de la conjunción hebrea en la última posición.
