translation:
  language: es
  text: Y ahora[a], si en verdad escuchan mi voz y guardan mi pacto, ustedes serán para mí mi posesión preciada[b] de entre todos los pueblos[c], porque mía es toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si de veras escuchan mi voz». El hebreo dice literalmente: «si escuchando escuchan», una forma enfática que puede expresar oír con atención o con obediencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi posesión especial» o «mi propia posesión».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, de entre todos los pueblos o naciones; la cláusula siguiente aclara que toda la tierra sigue perteneciendo a Dios.
    reason: cross_reference
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la conjunción inicial ו y el matiz temporal de inicio de una cláusula de consecuencia pactal, de modo natural en español.
- source_word: שָׁמֹעַ תִּשְׁמְעוּ
  english_pob_choice: you will indeed listen
  chosen_spanish: si en verdad escuchan
  alternatives_spanish:
  - si escuchan de verdad
  - si ciertamente escuchan
  lexicon: HALOT
  rationale: La construcción intensiva hebrea se refleja con una intensificación adverbial en español. 'Escuchar' preserva el valor concreto de oír/atender, sin anticipar en la base la traducción interpretativa 'obedecer'.
- source_word: בְּקֹלִי
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - la voz que yo pronuncio
  lexicon: HALOT
  rationale: En español, la expresión idiomática se comunica mejor sin forzar un dativo preposicional; el sentido de atender la voz de Yahvé queda preservado por el contexto pactal.
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: and keep
  chosen_spanish: y guardan
  alternatives_spanish:
  - y guardan fielmente
  - y observan
  lexicon: HALOT
  rationale: '''Guardar'' mantiene bien el valor de cumplir fielmente un pacto en español bíblico contemporáneo, sin perder la concreción de שׁמר.'
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: '''Pacto'' es la forma más estable y clara para ברית en este contexto sinaítico; ''alianza'' es posible, pero menos precisa para el registro del POB.'
- source_word: וִהְיִיתֶם לִי
  english_pob_choice: then you will be my
  chosen_spanish: ustedes serán para mí
  alternatives_spanish:
  - y serán míos
  - entonces serán para mí
  lexicon: HALOT
  rationale: 'La construcción resultante se expresa con naturalidad en español como pertenencia relacional: ''serán para mí''. Mantiene la formulación de covenant membership sin añadir un ''entonces'' que ya queda implícito por la condición anterior.'
- source_word: סְגֻלָּה
  english_pob_choice: treasured possession
  chosen_spanish: un tesoro especial
  alternatives_spanish:
  - mi posesión especial
  - mi propiedad preciosa
  - un tesoro de pertenencia
  lexicon: HALOT
  rationale: '''סגֻלָּה'' denota propiedad valiosa y apartada. ''Tesoro especial'' comunica valor y singularidad en español, aunque no fija excesivamente la metáfora jurídica de posesión; por eso se conserva la nota de alternativa para ‘special possession’.'
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: out of all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - de entre todos los pueblos
  - de entre todos los pueblos y naciones
  lexicon: HALOT
  rationale: '''Entre'' transmite la elección desde dentro del conjunto sin sugerir exclusión absoluta. Respeta la relación con la cláusula siguiente, que afirma la soberanía universal de Dios.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la base explicativa de la promesa anterior: la pertenencia especial de Israel se fundamenta en la propiedad universal de Yahvé.'
- source_word: לִי כָּל הָאָרֶץ
  english_pob_choice: all the earth is mine
  chosen_spanish: mía es toda la tierra
  alternatives_spanish:
  - toda la tierra es mía
  - me pertenece toda la tierra
  lexicon: HALOT
  rationale: Conserva la posesión enfática del hebreo con un orden natural en español. 'Tierra' sigue la amplitud universal de אָרֶץ en esta cláusula de fundamento.
theological_decisions:
- issue: Cómo traducir el intensivo de שמע en contexto de pacto sin borrar la tensión entre oír y obedecer
  english_pob_reading: listen ... to my voice
  chosen_spanish_reading: escuchar mi voz
  alternative_spanish_readings:
  - obedecer mi voz
  - escuchar atentamente mi voz
  rationale: Se preserva el valor literal de oír/escuchar, dejando que 'guardar mi pacto' exprese la respuesta obediente. Así no se aplana la riqueza del hebreo ni se reemplaza el juego semántico por un equivalente demasiado interpretativo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo expresar סגֻלָּה sin convertirlo en lenguaje eclesial tradicional no sustentado por el contexto
  english_pob_reading: my treasured possession out of all the peoples
  chosen_spanish_reading: un tesoro especial entre todos los pueblos
  alternative_spanish_readings:
  - mi posesión especial entre todos los pueblos
  - mi propio tesoro de entre todos los pueblos
  rationale: La frase afirma elección y pertenencia distintiva, pero la cláusula final insiste en la soberanía universal de Dios. 'Tesoro especial' comunica el valor elegido sin exagerar exclusividad ni perder el matiz de propiedad/precio que el hebreo sugiere.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que mantuvo sin cambios la redacción inglesa de referencia. No se identificaron revisiones aplicadas; la versión española conserva ese mismo equilibrio entre literalidad y claridad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término base del proyecto, pero en este versículo la fuente hebrea no contiene el Tetragrámaton explícito en el texto corriente; por eso la cláusula se traduce sin introducir una sustitución adicional.
  - '''Pacto'' se mantiene de forma consistente para בְּרִית.'
  - '''Tierra'' se usa con alcance universal, no como ''país'' o ''territorio''.'
  - La puntuación y el orden sintáctico buscan una lectura pública natural en español, sin borrar la estructura condicional y causal del hebreo.
