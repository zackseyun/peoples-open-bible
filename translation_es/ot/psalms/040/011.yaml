review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del hebreo: no ocultar internamente la justicia/rectitud de Dios, proclamar su fidelidad y salvación, y no encubrir su חסד y verdad ante la asamblea. Sin embargo, en לְקָהָל רָב la opción principal inglesa auditada es ''from the great assembly'', con ''before the great assembly'' solo como alternativa. El español principal ''ante la gran asamblea'' invierte esa prioridad y debilita el matiz natural con כחד (''no oculté de'').'
  spanish_quality_summary: 'El español es claro y digno. No obstante, hay dos mejoras importantes: (1) el primer pie de nota a dice ''O «tu justicia»'' aunque el texto principal ya dice «tu justicia», por lo que no funciona como alternativa real; (2) ''ante la gran asamblea'' es menos preciso que ''a la gran asamblea'' o ''de la gran asamblea'' en esta sintaxis. Además, conviene alinear mejor חסד con la terminología POB mediante ''amor fiel'' o equivalente más cercano que ''amor constante''.'
  glossary_alignment: 'Buena alineación general: צדקה -> «justicia» es defendible con nota; אֱמוּנָה -> «fidelidad»; תְּשׁוּעָה -> «salvación»; אֱמֶת -> «verdad». El punto más flojo es חסד: la auditoría inglesa privilegia ''steadfast love'' con alternativa ''covenant love''; «amor constante» es aceptable, pero «amor fiel» preserva mejor la lealtad pactual. También debe corregirse la nota de «justicia/rectitud» para que la alternativa sea real.'
  issues:
  - severity: medium
    issue: La nota [a] repite la lectura principal en lugar de ofrecer una alternativa real.
    rationale: El texto principal dice «tu justicia[a]», pero la nota dice «O «tu justicia»». Debe ofrecer «tu rectitud» u otra alternativa documentada, no duplicar la lectura principal.
  - severity: medium
    issue: La frase principal «ante la gran asamblea» no sigue la prioridad semántica documentada para לְקָהָל רָב con כחד.
    rationale: La POB inglesa eligió como lectura principal 'from the great assembly', dejando 'before the great assembly' como alternativa. En español conviene reflejar ese valor con «a la gran asamblea» o reestructurar para mantener el sentido de no ocultar algo a un público.
  - severity: low
    issue: «Amor constante» para חסד es comprensible, pero no expresa tan claramente la lealtad de pacto como otras opciones españolas.
    rationale: «Amor fiel» mantiene mejor la dimensión de lealtad/constancia del término y queda natural en español eclesial amplio.
