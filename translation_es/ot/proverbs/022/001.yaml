translation:
  language: es
  text: Un nombre[a] es preferible[b] más que las grandes riquezas, y el favor[c] es mejor que la plata y el oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nombre» conserva la imagen hebrea y, en este contexto sapiencial, implica reputación u honor.
    reason: cultural_note
  - marker: b
    text: 'O: «debe ser escogido» o «es más deseable». El hebreo expresa una preferencia de valor, no solo una elección puntual.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «gracia». Aquí חֵן denota favor o aceptación favorable; no se usa en sentido técnico-teológico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְחָר
  english_pob_choice: is to be chosen
  chosen_spanish: es preferible
  alternatives_spanish:
  - debe ser escogido
  - es más deseable
  - se prefiere
  lexicon: HALOT
  rationale: El participio nifal expresa valor preferible en un dicho sapiencial. En español, 'es preferible' conserva la fuerza comparativa natural sin volver la frase extraña o demasiado literal.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - fama
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de 'nombre', que en el contexto sapiencial incluye la idea de reputación u honor. El español permite esa carga implícita sin necesidad de explicitarla en el texto principal.
- source_word: מֵעֹשֶׁר רָב
  english_pob_choice: rather than great wealth
  chosen_spanish: a grandes riquezas
  alternatives_spanish:
  - que grandes riquezas
  - más que grandes riquezas
  - que mucha riqueza
  lexicon: HALOT
  rationale: La comparación con מִן queda bien expresada en español con 'a'. 'Grandes riquezas' transmite el valor intensivo de רָב sin forzar un calco pesado.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: el favor
  alternatives_spanish:
  - la gracia
  - la aceptación
  - el aprecio
  lexicon: HALOT
  rationale: Se conserva 'favor' porque en este proverbio el término apunta al buen trato o la aceptación benévola, no necesariamente a la gracia en sentido teológico.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: es mejor
  alternatives_spanish:
  - es bueno
  - supera
  - vale más
  lexicon: HALOT
  rationale: Aunque literalmente 'bueno', la estructura comparativa exige en español 'es mejor' para expresar la relación de preferencia entre el favor y los metales preciosos.
translation_notes:
  revision_awareness: La versión inglesa auditada eliminó 'good' antes de 'name' por fidelidad al hebreo. La redacción española sigue esa decisión y mantiene el paralelismo proverbial con un comparativo natural.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o sustituciones devocionales; no hay Tetragrámaton en este versículo.
  - Se mantuvo 'nombre'/'favor' como imágenes sapienciales directas, con notas para su sentido contextual.
  - La comparación quedó explícita en español con 'es preferible... es mejor', coherente con la fuerza del hebreo y la revisión inglesa.
