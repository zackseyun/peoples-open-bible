translation:
  language: es
  text: Y ellos tomarán el oro, y el azul[a], y la púrpura, y el hilo escarlata[b], y el lino fino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el hilo azul'; el hebreo puede designar material textil teñido, no solo el color en abstracto. Lo mismo puede aplicarse a 'la púrpura'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'escarlata del gusano', un giro idiomático para material escarlata teñido con una sustancia de origen insectil; por eso se traduce 'hilo escarlata'.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: And they
  chosen_spanish: Y tomarán
  alternatives_spanish:
  - Y ellos tomarán
  - Y ellos mismos tomarán
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza al sujeto; en español, ese énfasis suele quedar naturalizado en la conjugación verbal. Aquí se conserva el valor exhortativo del mandato con un inicio directo e idiomático.
- source_word: יִקְחוּ
  english_pob_choice: shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - habrán de tomar
  - deberán tomar
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona como instrucción en este contexto. En español, el futuro simple transmite bien la orden o indicación normativa sin volver la frase pesada.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el oro refinado
  - el metal oro
  lexicon: HALOT
  rationale: El hebreo nombra el material precioso. 'Oro' es la forma natural y fiel en español para el sustantivo del material, sin necesidad de calco artículo + sustantivo abstracto.
- source_word: הַתְּכֵלֶת
  english_pob_choice: the blue
  chosen_spanish: el azul
  alternatives_spanish:
  - el azul teñido
  - el hilo azul
  - la tela azul
  lexicon: HALOT
  rationale: Como en el texto hebreo y en la tradición POB, el término puede abarcar material teñido, no solo el color abstracto. En español, 'azul' conserva la brevedad del listado; la nota recoge la posible referencia a material textil.
- source_word: הָאַרְגָּמָן
  english_pob_choice: the purple
  chosen_spanish: la púrpura
  alternatives_spanish:
  - el púrpura
  - el hilo púrpura
  - la tela púrpura
  lexicon: HALOT
  rationale: אַרְגָּמָן designa material teñido de púrpura. 'La púrpura' preserva el nombre del tinte/material y suena más natural en una enumeración litúrgica que 'morado'.
- source_word: תּוֹלַעַת הַשָּׁנִי
  english_pob_choice: the scarlet yarn
  chosen_spanish: el hilo escarlata
  alternatives_spanish:
  - la escarlata
  - el hilo carmesí
  - el hilo teñido de escarlata
  lexicon: HALOT
  rationale: La expresión hebrea alude a material teñido con el color escarlata, literalmente relacionado con el insecto del tinte. 'Hilo escarlata' comunica el sentido textil del contexto sin sobreexplicar en el cuerpo del versículo.
- source_word: הַשֵּׁשׁ
  english_pob_choice: the fine linen
  chosen_spanish: el lino fino
  alternatives_spanish:
  - el lino fino de calidad
  - la tela de lino fino
  - el lino
  lexicon: HALOT
  rationale: En contextos del tabernáculo, שֵׁשׁ se entiende como lino fino. 'Lino fino' refleja con claridad la calidad del material y mantiene la forma breve del inventario.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail en inglés y el hebreo masorético, manteniendo la lista de materiales con equivalentes españoles naturales y conservando la ambigüedad material/color donde el original lo permite. No se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'lino fino' para שֵׁשׁ en armonía con el uso técnico del tabernáculo.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este versículo.
  - La serie mantiene artículos definidos para reflejar la lista hebrea sin recargar la sintaxis española.
  - '''Azul'' y ''púrpura'' se entienden como materiales teñidos, no solo colores abstractos.'
