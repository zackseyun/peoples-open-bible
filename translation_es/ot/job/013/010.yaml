    rationale: La intensificación puede reflejarse en el texto con «ciertamente» o «de veras/seguramente» y explicarse en decisiones léxicas; no hace falta una nota al lector si no preserva una alternativa significativa.
  revised_spanish_text: Ciertamente los reprenderá si, en secreto, muestran parcialidad[a].
