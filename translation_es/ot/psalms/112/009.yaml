translation:
  language: es
  text: Él ha distribuido libremente; ha dado a los pobres. Su rectitud[a] permanece para siempre; su cuerno[b] será levantado en honor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su justicia permanece para siempre». El término hebreo puede denotar tanto rectitud como justicia.'
    reason: lexical_alternative
  - marker: b
    text: «Cuerno» es una metáfora hebrea de fuerza, dignidad o estatus exaltado.
    reason: cultural_note
  - marker: c
    text: 'O: «será exaltado con honor» o «en gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּזַּר
  english_pob_choice: has distributed freely
  chosen_spanish: ha distribuido libremente
  alternatives_spanish:
  - ha esparcido
  - ha dispersado
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar la idea de esparcir o repartir; en este contexto de generosidad hacia los necesitados, 'ha distribuido libremente' conserva la imagen de reparto abierto y evita una literalidad que sonaría extraña en español.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural del perfecto hebreo, y mantiene el paralelismo poético con la primera cola del versículo.
- source_word: לָאֶבְיוֹנִים
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  lexicon: HALOT
  rationale: אֶבְיוֹן designa a los pobres o necesitados; 'a los pobres' es breve, claro y apropiado al registro poético del salmo.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: HALOT
  rationale: El término puede abarcar justicia o rectitud. Aquí el POB inglés preserva la alternativa 'justice'; en español, 'justicia' comunica bien la idea de la conducta justa del hombre generoso y mantiene la amplitud semántica sin reducirla a mera filantropía.
- source_word: עֹמֶדֶת לָעַד
  english_pob_choice: stands forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - permanece eternamente
  - se mantiene para siempre
  lexicon: HALOT
  rationale: La construcción expresa permanencia duradera. 'Permanece para siempre' es natural en español y conserva la idea de duración continua que el hebreo enfatiza.
- source_word: קַרְנוֹ
  english_pob_choice: his horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su poder
  - su fuerza
  - su honor
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de 'cuerno', que en poesía bíblica denota fuerza, dignidad o estatus exaltado. Mantenerla evita borrar la imaginería original.
- source_word: תָּרוּם
  english_pob_choice: will be lifted up
  chosen_spanish: será levantado
  alternatives_spanish:
  - será exaltado
  - se alzará
  lexicon: HALOT
  rationale: El verbo expresa elevación/exaltación. 'Será levantado' mantiene la imagen verbal sin perder naturalidad en español.
- source_word: בְּכָבוֹד
  english_pob_choice: in honor
  chosen_spanish: en honra
  alternatives_spanish:
  - en honor
  - con honra
  - en gloria
  lexicon: HALOT
  rationale: כָּבוֹד puede significar honra o gloria. 'En honra' preserva el matiz de dignidad pública y evita una formulación más interpretativa; 'en honor' es una alternativa válida, pero 'honra' se ajusta bien al paralelismo poético.
theological_decisions:
- issue: Sentido de צִדְקָתוֹ en relación con dar a los pobres
  english_pob_reading: The phrase refers to the enduring righteous character/deed of the generous person, without narrowing it to meritorious salvation or reducing it merely to social philanthropy.
  chosen_spanish_reading: La frase se entiende como la justicia/rectitud duradera del justo generoso, sin reducirla a mera filantropía ni convertirla en una afirmación técnica de mérito salvífico.
  alternative_spanish_readings:
  - Sus actos de caridad permanecen para siempre
  - Su justicia se refiere principalmente a la justicia del pacto
  rationale: El verso alaba la generosidad del justo y declara que su justicia permanece para siempre. 'Su justicia' conserva la amplitud del término hebreo y deja abierta la relación entre carácter justo y obras de misericordia, en línea con el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Metáfora de 'cuerno' en poesía hebrea
  english_pob_reading: '''Horn'' is a Hebrew metaphor for strength, dignity, or exalted status.'
  chosen_spanish_reading: Se conserva la metáfora de 'cuerno' como imagen de fuerza, dignidad o estatus exaltado.
  alternative_spanish_readings:
  - su fuerza será exaltada
  - su dignidad será elevada
  rationale: La poesía hebrea usa 'cuerno' como metáfora convencional. Retenerla en el texto principal mantiene la audibilidad del símil y evita reemplazarlo por una explicación que borre la imagen bíblica.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión revisada más reciente no introdujo cambios; el estado de la traducción inglesa se reporta como sin cambios y con alto acuerdo, así que esta propuesta española sigue de cerca el audit trail establecido sin añadir novedades no sustentadas.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la metáfora poética de 'cuerno' para alinear el español con la decisión inglesa auditada.
  - '''Justicia'' se usa aquí para צִדְקָתוֹ por coherencia con la alternativa lexical documentada en el inglés POB.'
  - El registro es solemne pero moderno, evitando fórmulas eclesiásticas arcaizantes que no aportan precisión adicional.
