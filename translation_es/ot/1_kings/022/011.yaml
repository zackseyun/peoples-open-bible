translation:
  language: es
  text: 'Entonces Sedequías hijo de Quenaana se hizo[a] cuernos de hierro y dijo: «Así dice Yahvé: Con estos embestirás[b] a Aram hasta que sean destruidos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «se hizo para sí», para explicitar el valor reflexivo probable del hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «empujarás a Aram», con el verbo conservando la imagen de un animal cornudo que hiere al embestir; también puede expresarse como «acornearás».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hasta que sean consumidos» / «hasta que lleguen a su fin».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: made horns of iron for himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - hizo para sí
  - se hizo para sí
  lexicon: HALOT
  rationale: El hebreo expresa que hizo el objeto para su propio uso o como su propia acción simbólica. En español, «se hizo» suena natural y conserva la idea reflexiva sin sobrecargar la frase. La nota a explica la alternativa más explícita de «para sí».
- source_word: צִדְקִיָּה בֶן־כְּנַעֲנָה
  english_pob_choice: Zedekiah son of Chenaanah
  chosen_spanish: Sedequías hijo de Quenaana
  alternatives_spanish:
  - Zedequías hijo de Quenaana
  lexicon: conventional transliteration
  rationale: Se transliteran los nombres propios de manera estándar en español bíblico, manteniendo la identificación del personaje sin añadir interpretación.
- source_word: קַרְנֵי בַרְזֶל
  english_pob_choice: horns of iron
  chosen_spanish: cuernos de hierro
  alternatives_spanish:
  - cuernos de hierro forjado
  - astas de hierro
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «cuernos de hierro». «Cuernos» conserva la imagen animal y el simbolismo de poder y ataque; «astas» es posible, pero menos natural en el contexto.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética directa con el nombre divino YHWH rendido como «Yahvé» según los criterios del proyecto. «Así dice» es una forma natural y fiel de la fórmula mensajera.
- source_word: בְּאֵלֶּה
  english_pob_choice: With these
  chosen_spanish: Con estos
  alternatives_spanish:
  - Con estas
  - Por medio de estos
  lexicon: HALOT
  rationale: El demostrativo apunta a los cuernos recién hechos. «Con estos» mantiene la referencia inmediata y permite que el lector entienda que se trata de los objetos simbólicos mencionados.
- source_word: תְּנַגַּח
  english_pob_choice: you will gore
  chosen_spanish: embestirás
  alternatives_spanish:
  - acornearás
  - golpearás con los cuernos
  lexicon: HALOT
  rationale: El verbo נגח conserva la imagen de un animal con cuernos que arremete; en español «embestir» reproduce bien la fuerza del golpe sin sonar artificial. «Acornearás» mantiene más literalmente la imagen, pero es menos idiomático.
- source_word: אֶת אֲרָם
  english_pob_choice: Aram
  chosen_spanish: a Aram
  alternatives_spanish:
  - contra Aram
  - a los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico/étnico «Aram» como en el texto base. El complemento con «a» funciona con el verbo de acción en español y no fuerza una paráfrasis étnica innecesaria.
- source_word: עַד כַּלֹּתָם
  english_pob_choice: until they are finished off
  chosen_spanish: hasta que sean consumidos
  alternatives_spanish:
  - hasta que sean acabados
  - hasta que los destruyas
  lexicon: HALOT
  rationale: El verbo כלה expresa llegar a su fin; en contexto militar implica consumación o aniquilación. «Consumidos» mantiene la idea de total finalización sin introducir un agente explícito que el hebreo aquí no marca directamente en la clausula final.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton יְהוָה. De acuerdo con el criterio editorial del proyecto, se vierte como «Yahvé», preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética y fuerza del verbo נגח
  english_pob_reading: With these you will gore Aram
  chosen_spanish_reading: Con estos embestirás a Aram
  alternative_spanish_readings:
  - Con estos acornearás a Aram
  - Con éstos arremeterás contra Aram
  rationale: La imagen del verbo es la de un animal que ataca con los cuernos. «Embestirás» comunica fuerza y movimiento agresivo sin perder el carácter figurado de la acción; no se suaviza a un mero 'vencer', porque eso borraría la metáfora.
  doctrine_reference: HALOT, נגח; contexto narrativo de la señal profética
translation_notes:
  revision_awareness: La redacción española sigue el ajuste de la última revisión inglesa en el sentido de mantener la referencia plural del final («sean consumidos») y de conservar la naturalidad del orden sintáctico. También preserva la tensión imagética del verbo נגח sin diluirla en una equivalencia demasiado general.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la transliteración «Aram» en lugar de «Siria» para no desplazar el término hebreo.
  - «Cuernos de hierro» conserva la imagen literal de la señal profética y su carga simbólica.
  - La puntuación reproduce una cita directa profética con comillas españolas y dos puntos tras «Yahvé».
