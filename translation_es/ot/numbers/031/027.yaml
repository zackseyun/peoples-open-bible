translation:
  language: es
  text: Y dividirás el botín[a] entre los que participaron en la guerra, que salieron a la batalla, y toda la congregación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la presa», «el saqueo» o «el despojo». El término hebreo se refiere a lo tomado en la guerra.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda la congregación»; también posible: «toda la comunidad» o «toda la asamblea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָצִיתָ
  english_pob_choice: And divide
  chosen_spanish: Y dividirás
  alternatives_spanish:
  - Y partirás
  - Y repartirás
  - Y aporcionarás
  lexicon: HALOT
  rationale: El verbo hebreo חצה expresa partir o dividir. En español, «dividirás» conserva la idea central y funciona bien como instrucción directa en una serie de mandatos. «Repartirás» es posible, pero «dividirás» refleja mejor la imagen de partir en dos o más partes.
- source_word: הַמַּלְקוֹחַ
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - el plunder
  - la presa
  - el saqueo
  - el despojo
  lexicon: HALOT
  rationale: מַלְקוֹחַ designa lo tomado en la guerra. «Botín» es natural en español bíblico y conserva ese campo semántico. Se prefiere sobre «despojo» o «saqueo» porque nombra el resultado obtenido, no la acción.
- source_word: תֹּפְשֵׂי הַמִּלְחָמָה
  english_pob_choice: those who took part in the war
  chosen_spanish: los que participaron en la guerra
  alternatives_spanish:
  - los que tomaron parte en la guerra
  - los guerreros
  - los combatientes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude a los que «agarran/manejan» la guerra, es decir, quienes combatieron. «Participaron en la guerra» sigue de cerca la decisión inglesa revisada y evita una paráfrasis más libre como «guerreros», que sería correcta pero menos fiel al matiz del hebreo.
- source_word: הַיֹּצְאִים לַצָּבָא
  english_pob_choice: who went out to battle
  chosen_spanish: los que salieron a la campaña militar
  alternatives_spanish:
  - los que salieron al ejército
  - los que fueron a la batalla
  - los que salieron para la guerra
  lexicon: HALOT
  rationale: צָבָא aquí tiene sentido militar de campaña o servicio armado. «Campaña militar» conserva ese matiz con claridad en español y evita reducirlo solo a «batalla», que puede sonar más puntual que el hebreo.
- source_word: וּבֵין כָּל הָעֵדָה
  english_pob_choice: and all the congregation
  chosen_spanish: y toda la congregación
  alternatives_spanish:
  - y toda la comunidad
  - y toda la asamblea
  lexicon: HALOT
  rationale: עֵדָה suele designar al pueblo reunido como comunidad del pacto. «Congregación» mantiene ese sentido bíblico tradicional sin ocultar el referente colectivo. «Comunidad» o «asamblea» también serían posibles, pero «congregación» conserva mejor la fórmula heredada y sigue siendo inteligible.
theological_decisions:
- issue: Distribución del botín entre combatientes y toda la asamblea del pueblo
  english_pob_reading: The plunder is divided between those who fought and all the congregation.
  chosen_spanish_reading: El botín se divide entre los que combatieron, los que salieron a la campaña militar y toda la congregación.
  alternative_spanish_readings:
  - El botín se divide entre los guerreros y toda la congregación.
  - El botín se divide entre todos los participantes y la asamblea.
  rationale: 'No hay una tensión doctrinal mayor, pero sí una distribución corporativa importante: el botín no queda solo para los combatientes, sino que se comparte con toda la congregación. La redacción elegida conserva tanto el grupo militar como el cuerpo comunitario, sin diluir el contraste.'
  doctrine_reference: Distribución del botín en el pueblo de Israel; responsabilidad corporativa y participación comunitaria (cf. Nm 31:26-31).
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés, que corrigió «warriors» por una expresión más cercana a תֹּפְשֵׂי הַמִּלְחָמָה: se evitó un equivalente demasiado libre y se mantuvo el paralelismo con «los que salieron a la campaña militar». También se conservó «congregación» como término de comunidad del pacto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, aunque en este versículo no se requiere.
  - Se conserva «congregación» como término técnico consistente con la POB en español para עֵדָה.
  - «Botín» se usa aquí por su precisión y naturalidad en español bíblico, sin borrar la gama semántica de lo tomado en guerra.
