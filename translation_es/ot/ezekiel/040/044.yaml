    text: 'O: «junto al costado de la puerta del norte». El hebreo usa «hombro» de modo metafórico para el costado o flanco de una estructura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al lado de la puerta del oriente». El hebreo vuelve a usar «hombro» para el costado de la puerta.'
    reason: lexical_alternative
