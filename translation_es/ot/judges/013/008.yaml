base_translation:
  language: en
  yaml_path: translation/ot/judges/013/008.yaml
  text: Then Manoah entreated Yahweh and said[a], “Please, Lord[c][b], let the man of God whom you sent come again to us and teach us what we should do for the boy who is to be born.”
