    text: O ‘que no esperan a un hombre, ni aguardan a los hijos de hombre’. Los verbos hebreos pueden llevar la idea de esperar o de tener esperanza; la línea enfatiza que el rocío y la lluvia vienen sin mediación humana.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘hijos de hombre’, una expresión hebrea para seres humanos.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar fidelidad y español natural sin alterar el sentido: ‘chubascos’ refleja mejor רְבִיבִים; ‘los seres humanos’ evita un calco poco idiomático de בני אדם, preservado en nota; y se reubicó la nota [b] al lugar correcto.'
