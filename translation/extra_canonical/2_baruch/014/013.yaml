  rationale: The phrase 'trusting in gladness' can be misread in English as 'putting
    their trust in gladness' rather than 'trusting [God], with gladness.' The Syriac
    uses the adverbial form 'tkylynyt' (trustingly/confidently) alongside 'in joy/gladness'.
    Rendering it as 'trustingly, with gladness' or 'with confident joy' clarifies
    the adverbial nature of their trust.
