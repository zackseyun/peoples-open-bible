translation:
  language: es
  text: Y el fuego sobre el altar se mantendrá encendido sobre él; no se apagará. El sacerdote quemará leña sobre él cada mañana[a], y dispondrá sobre él el holocausto, y quemará sobre él las porciones de grasa de los sacrificios de paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mañana tras mañana». El hebreo repite «mañana» con sentido distributivo.
    reason: lexical_alternative
  - marker: b
    text: O «las ofrendas de bienestar» o «los sacrificios de comunión» para שְׁלָמִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוּקַד
  english_pob_choice: shall be kept burning
  chosen_spanish: será mantenido encendido
  alternatives_spanish:
  - seguirá ardiendo
  - será encendido
  lexicon: HALOT
  rationale: El hifil pasivo pide una idea de mantenimiento continuo del fuego, no solo que el fuego exista. «Será mantenido encendido» conserva ese valor cultual y continuo mejor que una forma más simple como «seguirá ardiendo».
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  lexicon: HALOT
  rationale: Para el altar, el español natural es «sobre él», porque se trata de la superficie donde se coloca la leña y las ofrendas. «En él» sería más literal pero menos idiomático en este contexto.
- source_word: לֹא תִכְבֶּה
  english_pob_choice: it shall not go out
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no será extinguida
  lexicon: HALOT
  rationale: La expresión pide continuidad del fuego. «No se apagará» es natural en español y conserva la prohibición de que el fuego cese.
- source_word: וּבִעֵר
  english_pob_choice: shall burn
  chosen_spanish: quemará leña
  alternatives_spanish:
  - hará arder leña
  - encenderá leña
  lexicon: HALOT
  rationale: En este contexto el sacerdote alimenta el fuego con madera. «Quemará leña» comunica la acción ritual sin sugerir que inicia un fuego nuevo; «hará arder» sería más analítico, pero menos directo.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: every morning
  chosen_spanish: cada mañana
  alternatives_spanish:
  - mañana tras mañana
  - mañana por mañana
  lexicon: HALOT
  rationale: La repetición hebrea tiene sentido distributivo. «Cada mañana» transmite con claridad la acción diaria y continua; la alternativa más literal puede sonar forzada en español.
- source_word: וְעָרַךְ
  english_pob_choice: shall arrange
  chosen_spanish: dispondrá
  alternatives_spanish:
  - ordenará
  - colocará en orden
  lexicon: HALOT
  rationale: En el lenguaje sacrificial, ערך es colocar la ofrenda en su debido orden sobre el altar. «Dispondrá» conserva el acto ritual ordenado sin la rigidez de una traducción demasiado técnica.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda ascendente
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «holocausto» es el término tradicional y claro para la עולה. «Ofrenda quemada» sería descriptiva, pero menos estable como categoría sacrificial.
- source_word: וְהִקְטִיר
  english_pob_choice: burn up
  chosen_spanish: hará humear
  alternatives_spanish:
  - quemará
  - ofrecerá por fuego
  lexicon: HALOT
  rationale: El verbo cultual apunta a hacer subir en humo la grasa sobre el altar. «Hará humear» comunica ese resultado ritual mejor que simplemente «quemará», que puede sonar demasiado general.
- source_word: חֶלְבֵי
  english_pob_choice: the fat portions
  chosen_spanish: las grasas
  alternatives_spanish:
  - las porciones grasas
  - las partes grasas
  lexicon: HALOT
  rationale: Aquí חלב se refiere a la grasa destinada al fuego sacrificial. «Las grasas» mantiene la referencia precisa y funciona de manera natural en la frase española.
- source_word: הַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de comunión
  alternatives_spanish:
  - los sacrificios de paz
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: Aunque «peace offerings» suele traducirse tradicionalmente «ofrendas pacíficas» o «de paz», en español contemporáneo «sacrificios de comunión» comunica mejor el sentido relacional del término y evita una lectura meramente emocional de «paz». Se preserva la categoría sacrificial sin borrar su matiz de comunión.
theological_decisions:
- issue: Terminología sacrificial de עֹלָה y שְׁלָמִים
  english_pob_reading: Use established sacrificial terms ('burnt offering,' 'peace offerings') while keeping the ritual actions explicit.
  chosen_spanish_reading: Usar «holocausto» y «sacrificios de comunión» como categorías sacrificiales claras, con las acciones rituales explícitas.
  alternative_spanish_readings:
  - «ofrenda quemada» y «ofrendas de paz»
  - «ofrenda ascendente» y «ofrendas de bienestar»
  rationale: El versículo es instrucción cultual. En español, «holocausto» está bien asentado y «sacrificios de comunión» preserva el carácter relacional de שְׁלָמִים sin reducirlo a una paz abstracta. Esto mantiene la taxonomía sacrificial y la función litúrgica del texto.
  doctrine_reference: Levítico 6:5; terminología cultual del AT
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del hebreo y el audit trail en inglés, pero adapta la formulación para un español bíblico moderno y publicable. Se mantuvo la continuidad del fuego como mandato cultual, se conservó la repetición distributiva de «cada mañana», y se prefirió una equivalencia española estable para las categorías sacrificiales sin depender de calcos innecesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - «Holocausto» se mantiene como término sacrificial estándar en español bíblico.
  - «Sacrificios de comunión» se usa para שְׁלָמִים siguiendo una decisión léxica explícita, no como sustitución automática.
  - 'El orden de las cláusulas sigue el hebreo y el inglés POB para preservar la secuencia ritual: fuego, leña, holocausto, grasa de los sacrificios.'
