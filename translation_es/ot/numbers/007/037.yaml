  to: Su ofrenda fue un plato[a] de plata; su peso era de ciento treinta siclos; una vasija[b] de plata de setenta siclos, según el siclo del santuario[c]. Ambos estaban llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
