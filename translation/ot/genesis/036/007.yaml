id: GEN.36.7
reference: Genesis 36:7
source:
  edition: WLC
  text: כִּֽי הָיָ֧ה רְכוּשָׁ֛/ם רָ֖ב מִ/שֶּׁ֣בֶת יַחְדָּ֑ו וְ/לֹ֨א יָֽכְלָ֜ה אֶ֤רֶץ מְגֽוּרֵי/הֶם֙ לָ/שֵׂ֣את אֹתָ֔/ם מִ/פְּנֵ֖י מִקְנֵי/הֶֽם־׃
translation:
  text: For their possessions were too great for them to dwell together[b][a], and the land of their sojourning could not support them because of their livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land where they were staying'; Hebrew 'the land of their sojourning' preserves the idea of temporary residence as resident aliens.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'could not bear them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Esau's separation from Jacob in the preceding context. 'For' fits natural English while preserving the explanatory force.
- source_word: רְכוּשָׁם
  chosen: their possessions
  alternatives:
  - their property
  - their goods
  - their wealth
  lexicon: HALOT
  rationale: רְכוּשׁ denotes movable property/possessions. 'Possessions' is broad and natural, fitting the context of accumulated goods and animals.
- source_word: רָב
  chosen: too great
  alternatives:
  - great
  - many
  - abundant
  lexicon: HALOT
  rationale: Predicate adjective indicating abundance to the point of practical consequence. 'Too great' brings out the implied excess in relation to the following clause.
- source_word: מִשֶּׁבֶת יַחְדָּו
  lemma: מִן
  chosen: for them to live together
  alternatives:
  - than to dwell together
  - for dwelling together
  lexicon: HALOT
  rationale: The preposition מִן with infinitive construct after רָב expresses excess/inadequacy relative to living together. 'Live together' is idiomatic modern English for the sense of dwelling in one place together.
- source_word: אֶרֶץ מְגֻרֵיהֶם
  chosen: the land of their sojourning
  alternatives:
  - the land where they were staying
  - the land of their temporary residence
  lexicon: HALOT
  rationale: מָגוּר/מְגוּרִים refers to sojourning or temporary residence. 'Sojourning' preserves the patriarchal motif of resident-alien status better than a flatter paraphrase.
- source_word: לָשֵׂאת אֹתָם
  chosen: could not support them
  alternatives:
  - could not bear them
  - could not sustain them
  lexicon: HALOT
  rationale: נשא literally means 'bear/carry,' but with land as subject and people/livestock as burden, 'support' communicates the practical sense in clear English.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - on account of
  - from before
  lexicon: HALOT
  rationale: 'Here the phrase marks cause: the land could not support them because of the scale of what they owned.'
- source_word: מִקְנֵיהֶם
  chosen: their livestock
  alternatives:
  - their cattle
  - their herds
  lexicon: HALOT
  rationale: מִקְנֶה commonly refers to livestock as acquired property. 'Livestock' is accurate and broad, avoiding the narrower 'cattle'.
