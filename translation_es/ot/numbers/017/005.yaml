review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: memorial/recordatorio para Israel, finalidad preventiva, exclusión del no autorizado del incienso ante Yahvé, advertencia por el ejemplo de Coré y su grupo, e idiomático ''por medio de Moisés'' con nota sobre ''por la mano''. Sin embargo, ''forastero'' en español sugiere demasiado una persona de fuera o extranjera y no preserva tan bien como el contexto exige el sentido cultual de ''persona ajena/no autorizada''. También ''a él'' suena poco natural en español bíblico corriente; puede mantenerse por fidelidad, pero conviene una formulación más natural con nota explicativa.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: ''forastero'' introduce una connotación étnico-geográfica menos adecuada que el hebreo sacerdotal, y ''tal como Yahvé habló por medio de Moisés a él'' suena forzado en español. El resto es legible y fiel. ''Recordatorio'', ''hijos de Israel'', ''delante de Yahvé'' y ''compañía'' funcionan bien.'
  glossary_alignment: Alinea correctamente 'Yahvé' para יהוה y mantiene la línea lexical del POB en casi todo. La principal desviación de la intención documentada es אִישׁ זָר -> 'forastero', que en español no comunica tan limpiamente 'persona ajena/no autorizada' en un contexto sacerdotal. No hay conflicto relevante con otros términos del glosario.
  issues:
  - severity: medium
    issue: '''forastero'' para אִישׁ זָר'
    rationale: En español, 'forastero' suele evocar a alguien de fuera o extranjero/localmente ajeno. Aquí el énfasis es la falta de autorización sacerdotal, no procedencia geográfica o étnica. 'ajeno' o una formulación equivalente preserva mejor la decisión lexical auditada.
  - severity: low
    issue: '''a él'' al final suena poco idiomático'
    rationale: Aunque reproduce el pronombre hebreo לוֹ, en español queda tosco. 'a este' conserva la referencia expresa y suena más natural, mientras la nota puede seguir aclarando que probablemente se refiere a Aarón.
