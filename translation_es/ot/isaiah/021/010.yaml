translation:
  language: es
  text: Mi trillado[a], hijo de mi era[b], lo que he oído de Yahvé de los ejércitos, el Dios de Israel, les he declarado a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi machacado’ o ‘mi aplastado’; el hebreo conserva la imagen de la trilla como metáfora de aflicción severa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘hijo de mi era’, una metáfora ligada a la imagen de trillar y probablemente dirigida a un pueblo golpeado o procesado como grano.'
    reason: cultural_note
lexical_decisions:
- source_word: מְדֻשָׁתִי
  english_pob_choice: my threshed one
  chosen_spanish: mi trillado
  alternatives_spanish:
  - mi machacado
  - mi aplastado
  lexicon: HALOT
  rationale: El hebreo conserva la imagen agrícola de trillar. ‘Trillado’ mantiene esa metáfora en español con un participio pasivo natural, sin resolverla prematuramente en una abstracción como ‘oprimido’.
- source_word: וּבֶן גָּרְנִי
  english_pob_choice: and son of my threshing floor
  chosen_spanish: y hijo de mi era
  alternatives_spanish:
  - y hijo de mi trilla
  - y descendiente de mi era
  lexicon: HALOT
  rationale: ‘בן’ se rinde literalmente como ‘hijo’, y ‘góren’ es ‘era’ o ‘era de trillar’. ‘Hijo de mi era’ conserva el paralelismo e imagen del texto fuente; ‘trilla’ explicaría más, pero pierde la forma nominal del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: HALOT
  rationale: En este contexto introduce el contenido de lo oído. ‘Lo que’ es la equivalencia idiomática más natural en español y conserva la función relativa sin añadir interpretación.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  - he escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo admite presente perfecto o pasado simple. ‘He oído’ mantiene el valor de experiencia recibida y la relación con la declaración profética inmediata.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - procedente de
  lexicon: HALOT
  rationale: La preposición marca origen del mensaje. En español, ‘de Yahvé’ es natural y suficiente; ‘de parte de’ sería más explícito pero menos directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino explícito según la terminología POB en español. ‘Yahvé’ evita la sustitución por un título y corresponde al Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - todopoderoso
  lexicon: HALOT
  rationale: Aunque ‘hosts’ tiene tradición bíblica, en español ‘ejércitos’ comunica de manera clara y digna la idea de multitudes celestiales o armadas sin oscurecer el título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción posesiva directa y estable. ‘El Dios de Israel’ conserva el vínculo de pacto e identificación nacional-teológica sin expansión.
- source_word: הִגַּדְתִּי
  english_pob_choice: I have declared
  chosen_spanish: se lo he declarado
  alternatives_spanish:
  - se lo he dicho
  - se lo he anunciado
  lexicon: HALOT
  rationale: ‘Higgadti’ expresa hacer saber o declarar formalmente. ‘He declarado’ preserva el tono profético; el clítico ‘se lo’ refleja el destinatario plural de forma idiomática en español.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes todos
  lexicon: HALOT
  rationale: El hebreo es plural masculino. ‘A ustedes’ hace explícita la pluralidad en español latinoamericano, manteniendo el destinatario plural sin marcar registro peninsular.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino y no se lo enmascara con un título. ‘Yahvé’ sigue la convención POB y mantiene la transparencia textual del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metáfora del trillar
  english_pob_reading: Preserve the agricultural metaphor in the main text
  chosen_spanish_reading: Preservar la imagen de trillar/era en el texto principal
  alternative_spanish_readings:
  - ‘mi afligido’ / ‘mi oprimido’ como interpretación
  - ‘mi triturado’ como intensificación
  rationale: El hebreo usa una metáfora concreta y la POB opta por mantenerla. ‘Trillado’ y ‘era’ dejan visible la tensión imagética y permiten al lector percibir la aflicción sin convertir el símil en una paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; esta propuesta sigue la lectura auditada y conserva la metáfora agrícola, el nombre divino explícito y el destinatario plural.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton conforme al estándar POB en español.
  - Se evita ‘SEÑOR’ como sustituto, para preservar transparencia textual.
  - ‘a ustedes’ refleja el plural hebreo de לָכֶם.
  - La frase final usa un registro profético formal y comprensible en español contemporáneo.
