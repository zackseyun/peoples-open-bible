lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo de discurso introduce una nueva intervención divina. En español, «habló» conserva el registro formal y la cadencia de la fórmula hebrea mejor que una repetición mecánica de «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la decisión doctrinal del proyecto, el Tetragrama se vierte como el nombre propio divino «Yahvé» en español, no como sustitución titular. «Jehová» queda como alternativa histórica, pero no es la preferida del POB.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, la preposición natural y precisa es «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moses
  lexicon: HALOT
  rationale: Nombre propio bíblico en la forma española estándar y ampliamente reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce el discurso directo de manera formularia. «Diciendo» conserva esa función convencional en español sin forzar una paráfrasis.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo presenta explícitamente el nombre propio del pacto. La redacción española mantiene ese valor personal y no lo oculta tras un título, siguiendo la política del POB y la evidencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés de referencia ya estaba estabilizado y no registró revisiones posteriores; la presente redacción española sigue ese estado sin introducir cambios textuales no justificados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve y directa del hebreo.
  - Se conserva el nombre divino como «Yahvé» de manera consistente con la terminología del proyecto.
  - «Diciendo» funciona como fórmula introductoria y no añade contenido interpretativo.
