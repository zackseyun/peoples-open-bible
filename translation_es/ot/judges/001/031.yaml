- from: Aser no expulsó a los habitantes de Acó[a], ni a los habitantes de Sidón, ni a Ahlab, ni a Aksib, ni a Helba, ni a Afec[b], ni a Rehob.
  to: Aser no expulsó a los habitantes de Acó[a][b], ni a los habitantes de Sidón, ni a Ahlab, ni a Aczib, ni a Helbah, ni a Afec, ni a Rehob.
