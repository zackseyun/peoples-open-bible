revisions:
- from: Su luz es retenida de los impíos[a], y el brazo enaltecido[b] es quebrado.
  to: A los impíos se les niega su luz, y el brazo levantado[a] es quebrado[b].
  rationale: La revisión mejora la naturalidad del español sin apartarse del hebreo ni del audit trail. «A los impíos se les niega su luz» expresa con claridad la privación indicada por וְיִמָּנַע מֵרְשָׁעִים אוֹרָם. «Brazo levantado» conserva mejor la imagen literal de רָמָה que «enaltecido». Las notas se reordenan para que una preserve el valor metafórico de «brazo» y la otra la alternativa aspectual documentada para תִּשָּׁבֵר.
