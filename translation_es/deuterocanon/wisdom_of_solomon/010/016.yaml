review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: sujeto femenino implícito referido a la Sabiduría, entrada en el alma, oposición a reyes temibles y la frase final «con ... y ...» como medio o circunstancia. Sin embargo, falla en una decisión léxica importante: θεράποντος no debe endurecerse a «esclavo». El expediente inglés documenta «servant» precisamente porque θεράπων denota servidor/atendiente con dignidad, no el término más fuerte para esclavo. También falta en español la nota contextual sobre que el referente es Moisés, que el POB inglés preservó.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Ella entró en el alma...» y «se enfrentó a reyes temibles» funcionan bien. La combinación «con prodigios y señales» también suena natural. La principal mejora necesaria es sustituir «esclavo» por «siervo», que aquí es más fiel y más idiomático en contexto religioso. Conviene además ajustar las notas para reflejar la alternativa instrumental y la identificación contextual de Moisés sin recargar el texto principal.
  glossary_alignment: Buen ajuste general en «alma», «Señor», «reyes», «temibles» y «prodigios y señales». Pero el default del proyecto sobre δοῦλος -> «esclavo» no aplica mecánicamente aquí porque el griego usa θεράπων, no δοῦλος; por tanto, «siervo» es la mejor decisión contextual y audit-trail-consistent. «Señor» para Κυρίου es aceptable aquí, dado que la fuente inmediata es κύριος y no el tetragrámaton en el texto griego del versículo.
  issues:
  - severity: high
    issue: «esclavo» para θεράποντος
    rationale: θεράπων no es el término griego normal para esclavo (p. ej., δοῦλος), sino un servidor/atendiente con dignidad. El audit trail inglés escogió «servant» por esa razón. «Esclavo» sobrecarga el sentido y se aparta del fundamento léxico documentado.
  - severity: medium
    issue: La nota [a] no coincide con la decisión del POB inglés
    rationale: La nota española presenta «siervo» solo como alternativa, cuando en realidad es la mejor traducción principal. Además, el POB inglés conserva una nota contextual indicando que el siervo es entendido como Moisés; esa información debe mantenerse en español.
  - severity: low
    issue: Orden de notas distinto del expediente inglés
    rationale: No es un error sustancial, pero al rehacer las notas conviene asignar marcadores de forma clara y secuencial según los anclajes del texto revisado.
  revised_spanish_text: Ella entró en el alma de un siervo del Señor[a], y se enfrentó a reyes temibles con prodigios y señales[b].
  revised_footnotes:
  - marker: a
    text: El «siervo del Señor» se entiende por el contexto como Moisés.
    reason: cross_reference
  - marker: b
    text: O «mediante prodigios y señales». La frase griega puede expresar medio o circunstancia acompañante.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «esclavo» por «siervo» porque θεράπων implica servicio personal con dignidad y no corresponde al término más fuerte para esclavo. Se conserva la nota contextual sobre Moisés y la alternativa instrumental de la frase final, en línea con el expediente inglés y con mejor fidelidad léxica al griego.
