translation:
  language: es
  text: Él sacará el toro fuera del campamento y lo quemará, como quemó el primer toro. Es la ofrenda por el pecado[a] de la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo puede enfatizar la función de la ofrenda de quitar la impureza, además de tratar el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצִיא
  english_pob_choice: He shall bring ... out
  chosen_spanish: sacará
  alternatives_spanish:
  - lo sacará
  - hará salir
  lexicon: HALOT
  rationale: El hifil de יצא expresa sacar/hacer salir. «Sacará» es natural en español y conserva el movimiento del animal fuera del campamento sin añadir elementos no presentes.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el bull
  - el novillo
  lexicon: HALOT
  rationale: פַּר nombra un toro/buey destinado al sacrificio. «Toro» es claro y digno en español; «novillo» podría sonar más específico de edad sin exigencia del contexto inmediato.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - al exterior del campamento
  - a fuera del campamento
  lexicon: HALOT
  rationale: La secuencia preposicional indica traslado a un lugar fuera del perímetro del campamento. «Fuera del campamento» es idiomático y preciso en español.
- source_word: וְשָׂרַף אֹתוֹ
  english_pob_choice: and burn it
  chosen_spanish: y lo quemará
  alternatives_spanish:
  - y lo quemará con fuego
  - y lo incinerará
  lexicon: HALOT
  rationale: שׂרף significa quemar. «Lo quemará» conserva el acto ritual sin sobretraducir con términos más técnicos o enfáticos.
- source_word: כַּאֲשֶׁר שָׂרַף
  english_pob_choice: just as he burned
  chosen_spanish: como quemó
  alternatives_spanish:
  - tal como quemó
  - así como quemó
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marca correspondencia con el procedimiento previo. «Como quemó» transmite la comparación con sencillez; el adverbio «just» del inglés queda implícito por el paralelismo.
- source_word: הַפָּר הָרִאשׁוֹן
  english_pob_choice: the first bull
  chosen_spanish: el primer toro
  alternatives_spanish:
  - el toro anterior
  - el toro primero
  lexicon: HALOT
  rationale: רִאשׁוֹן remite al toro ya mencionado antes en el mismo ritual. «Primer toro» mantiene la referencia anafórica y sigue el orden natural del español.
- source_word: חַטַּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - sacrificio por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: En este contexto sacrificial, חַטָּאת nombra la ofrenda ritual vinculada al pecado y a la purificación. «Ofrenda por el pecado» conserva la fuerza cultual y evita imponer como única lectura la etiqueta tradicional fija.
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad
  lexicon: HALOT
  rationale: קָהָל designa al pueblo reunido como cuerpo colectivo. «Asamblea» preserva ese sentido corporativo sin cargarlo de un matiz eclesiástico específico.
- source_word: הוּא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Es él
  - Esto es
  lexicon: HALOT
  rationale: El pronombre hebreo funciona predicativamente para identificar el sacrificio. En español, la cópula basta para expresar la identificación de manera natural.
theological_decisions:
- issue: חַטַּאת en legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El hebreo puede subrayar tanto el pecado como la función purificadora de la ofrenda. Aquí, como en el POB inglés, se mantiene la referencia cultual al sacrificio, pero en español se prefiere una formulación más transparente que conserve la tensión entre expiación y purificación sin restringirla a una sola fórmula tradicional.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, con excepción documentada)
- issue: Identificación final del sacrificio
  english_pob_reading: It is the sin offering for the assembly.
  chosen_spanish_reading: Es la ofrenda por el pecado de la asamblea.
  alternative_spanish_readings:
  - Es la ofrenda de purificación de la asamblea.
  - Es el sacrificio por el pecado de la asamblea.
  rationale: La frase hebrea concluye identificando al animal como la ofrenda correspondiente al cuerpo comunitario. La traducción mantiene esa identificación directa sin añadir interpretación doctrinal externa.
  doctrine_reference: Translation philosophy §2 (claridad sin paráfrasis excesiva)
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el consenso de revisión es alto y no hay cambios pendientes. Esta versión española sigue de cerca las decisiones léxicas del POB, con ajuste idiomático para la claridad en español y con atención especial a חַטַּאת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se usa «ofrenda por el pecado» de manera consistente con el valor cultual de חַטַּאת en este contexto, dejando la alternativa de purificación en nota.
  - «Asamblea» traduce קָהָל para conservar el sentido corporativo del pueblo reunido.
  - 'El paralelismo verbal se conserva con una estructura simple y directa: sacar / quemar / quemó / es.'
