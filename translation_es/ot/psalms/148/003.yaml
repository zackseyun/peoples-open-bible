translation:
  language: es
  text: ¡Alábenlo, sol y luna; alábenlo, todas las estrellas de luz[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede expresarse más idiomáticamente como «todas las estrellas luminosas»; aquí se conserva el giro poético «estrellas de luz» del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְלוּהוּ
  english_pob_choice: Praise him
  chosen_spanish: ¡Alaben[a]
  alternatives_spanish:
  - ¡Alaben
  - ¡Dénle alabanza
  lexicon: HALOT
  rationale: El verbo הלל en imperativo plural con sufijo de 3.ª masc. sing. exige una orden dirigida a las luminarias para que alaben a Yahvé. «Alaben» conserva el imperativo plural y el valor directo del original; el pronombre implícito en español evita la repetición mecánica pero mantiene el referente con la nota anclada.
- source_word: שֶׁמֶשׁ
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - sol
  lexicon: HALOT
  rationale: Equivalente léxico estándar y preciso para el astro mencionado.
- source_word: וְיָרֵחַ
  english_pob_choice: and moon
  chosen_spanish: y la luna
  alternatives_spanish:
  - y luna
  lexicon: HALOT
  rationale: Conserva el sustantivo común español y el nexo coordinante del hebreo; el artículo resulta natural en español y no altera el sentido.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - todo
  lexicon: HALOT
  rationale: El cuantificador colectivo se adapta naturalmente a «todas» para concordar con «estrellas» y mantener la amplitud del llamado poético.
- source_word: כּוֹכְבֵי
  english_pob_choice: stars of
  chosen_spanish: estrellas de
  alternatives_spanish:
  - estrellas
  lexicon: HALOT
  rationale: El constructo plural hebreo se refleja con una construcción posesiva/preposicional en español. «Estrellas de» preserva la relación con el término siguiente sin sobrecargar el verso.
- source_word: אוֹר
  english_pob_choice: light / shining
  chosen_spanish: luz
  alternatives_spanish:
  - brillo
  - resplandor
  - luminosas
  lexicon: HALOT
  rationale: El hebreo puede entenderse literalmente como «de luz» o de manera más idiomática como «shining stars». En español, «estrellas de luz» conserva la huella poética del constructo y la ambigüedad productiva entre luz y brillo, sin forzar una paráfrasis más interpretativa.
theological_decisions:
- issue: Personificación de los cuerpos celestes como adoradores
  english_pob_reading: Retain the direct imperative address to sun, moon, and stars as poetic summons to creation to praise God.
  chosen_spanish_reading: Conservar el imperativo directo dirigido al sol, la luna y las estrellas, como llamado poético a toda la creación para alabar a Yahvé.
  alternative_spanish_readings:
  - Convertirlo en una afirmación impersonal de que la creación declara la gloria de Dios
  - Suavizar el mandato a una simple descripción
  rationale: El hebreo usa imperativos en segunda persona plural. La traducción debe conservar esa dirección exhortativa y la personificación sin reinterpretarla como mera descripción.
  doctrine_reference: Teología bíblica de la creación que alaba a Dios; Salmo 148
translation_notes:
  revision_awareness: 'Se atendió la revisión inglesa que prefirió una formulación más natural para כּוֹכְבֵי אוֹר (“all shining stars”) sin abandonar la construcción hebrea. En español se optó por una solución de equilibrio: mantener el constructo («estrellas de luz») para reflejar la forma original, pero con un español lector-friendly y con nota sobre la alternativa idiomática.'
  spanish_consistency_notes:
  - Se usa «alaben» para reflejar el imperativo plural hebreo y la personificación del sol, la luna y las estrellas.
  - Se mantiene «Yahvé» conforme al estándar del proyecto cuando el referente es el nombre divino.
  - «Estrellas de luz» preserva la ambigüedad poética de כּוֹכְבֵי אֽוֹר; la nota aclara la lectura más idiomática posible sin reemplazar el texto base.
