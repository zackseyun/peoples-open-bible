translation:
  language: es
  text: ¿Has entrado en los almacenes de la nieve[a], o has visto los almacenes del granizo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tesoros de la nieve ... tesoros del granizo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבָאתָ
  english_pob_choice: Have you entered
  chosen_spanish: ¿Has entrado
  alternatives_spanish:
  - ¿Has llegado
  - ¿Has ido
  - ¿Has entrado hasta
  lexicon: HALOT
  rationale: El verbo בוא, en esta pregunta retórica, comunica la idea de entrar en un lugar concreto. «Has entrado» conserva la imagen espacial y suena natural en español.
- source_word: אֶל
  english_pob_choice: the
  chosen_spanish: en
  alternatives_spanish:
  - a
  - hasta
  - dentro de
  lexicon: HALOT
  rationale: La preposición marca dirección hacia un lugar; en español se integra naturalmente con «entrado en». Así se evita una construcción forzada sin perder el movimiento hacia adentro.
- source_word: אֹצְרוֹת
  english_pob_choice: storehouses
  chosen_spanish: almacenes
  alternatives_spanish:
  - tesoros
  - depósitos
  - tesorerías
  lexicon: HALOT
  rationale: אֹצָר puede referirse a depósito, reserva o tesoro. En este contexto de fenómenos meteorológicos reservados por Dios, «almacenes» comunica bien la imagen de lugar de provisión sin cargarla hacia lo monetario.
- source_word: שָׁלֶג
  english_pob_choice: snow
  chosen_spanish: la nieve
  alternatives_spanish:
  - nieve
  lexicon: HALOT
  rationale: Término meteorológico estándar. Se mantiene el sustantivo con artículo porque el español lo pide naturalmente en esta construcción.
- source_word: וְאֹצְרוֹת
  english_pob_choice: or have you seen the storehouses of
  chosen_spanish: o has visto los almacenes de
  alternatives_spanish:
  - y los almacenes de
  - o has contemplado los almacenes de
  lexicon: HALOT
  rationale: La conjunción une la segunda pregunta con la primera en paralelo retórico. «O has visto» reproduce mejor el giro interrogativo del hebreo que un simple «y».
- source_word: בָּרָד
  english_pob_choice: hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - granizo
  lexicon: HALOT
  rationale: Término meteorológico estándar. «El granizo» mantiene el paralelismo con «la nieve» y conserva el sentido concreto.
translation_notes:
  revision_awareness: El texto base inglés fue revisado para cerrar con signo de interrogación; la versión española refleja igualmente la forma interrogativa completa y conserva el paralelismo retórico del hebreo.
  spanish_consistency_notes:
  - Se prefirió «almacenes» para אֹצְרוֹת siguiendo la decisión inglesa de evitar una lectura demasiado monetaria de «treasuries».
  - Se mantuvo la alternancia nieve/granizo con artículos definidos para mayor naturalidad en español, sin alterar el paralelismo semántico.
  - La nota al pie preserva la alternativa lexical importante del hebreo, equivalente a la nota inglesa sobre «treasuries».
