translation:
  language: es
  text: Tu mano encontrará[a] a todos tus enemigos; tu diestra encontrará a los que te odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alcanzará» o «dará alcance a»; el hebreo «encontrar» puede implicar aquí alcanzar o apoderarse con éxito de los enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְצָא
  english_pob_choice: will find
  chosen_spanish: encontrará
  alternatives_spanish:
  - alcanzará
  - dará alcance a
  - aprehenderá
  lexicon: HALOT
  rationale: Mantengo el verbo básico «encontrar» para conservar la imagen hebrea, como hace el POB inglés con «will find». En este contexto bélico, el verbo implica alcanzar o tomar a los enemigos con éxito, pero «encontrará» sigue siendo natural en español y deja intacta la tensión léxica.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu fuerza
  lexicon: HALOT
  rationale: Conservo el miembro corporal concreto porque el texto usa imagen antropomórfica de acción y poder. «Tu mano» comunica mejor la metáfora que una abstracción como «tu poder».
- source_word: לְכָל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno de
  - a todos y cada uno de
  lexicon: HALOT
  rationale: «A todos» reproduce la fuerza inclusiva de כל en una construcción natural en español con el complemento directo humano.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus opositores
  lexicon: HALOT
  rationale: «Enemigos» es el equivalente estándar y directo de אויב; mantiene el tono militar del versículo.
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  lexicon: HALOT
  rationale: Opto por «diestra» para conservar el paralelismo poético y una formulación bíblica natural en español, sin perder el sentido literal de «mano derecha».
- source_word: שֹׂנְאֶיךָ
  english_pob_choice: those who hate you
  chosen_spanish: los que te odian
  alternatives_spanish:
  - tus odiadores
  - tus enemigos
  lexicon: HALOT
  rationale: Sigo la observación del POB inglés al preservar el valor verbal del participio. «Los que te odian» es claro en español y evita colapsar el matiz en un sustantivo más genérico.
theological_decisions:
- issue: Imaginería corporal para la acción victoriosa de Yahvé/rey
  english_pob_reading: Retained the concrete imagery 'hand' and 'right hand' rather than abstracting to 'power' or 'strength.'
  chosen_spanish_reading: Conservo «mano» y «diestra» en lugar de abstraer a «poder» o «fuerza».
  alternative_spanish_readings:
  - Tu poder alcanzará a todos tus enemigos
  - Tu fuerza vencerá a los que te odian
  rationale: El hebreo presenta un paralelismo corporal que es poético y teológicamente significativo. La traducción española debe preservar esa imaginería para no perder la fuerza retórica ni la correspondencia entre los dos hemistiquios.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin revisiones en la versión más reciente; el acuerdo de revisión es alto y no se documentan cambios posteriores que afecten la decisión léxica principal.
  spanish_consistency_notes:
  - 'Mantengo un registro uniforme de segunda persona singular con tuteo bíblico: «tu», «te».'
  - Conservo el paralelismo entre «mano» y «diestra» con una solución española natural y poética.
  - Evito reemplazar la imagen concreta por abstracciones como «poder» o «fuerza», en coherencia con el POB inglés.
