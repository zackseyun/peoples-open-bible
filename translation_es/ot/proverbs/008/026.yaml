translation:
  language: es
  text: antes de que hiciera la tierra y los campos[a], o el comienzo[b] del polvo del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los espacios abiertos'. En otros contextos, חוּצוֹת puede significar 'calles', pero aquí el contexto de la creación favorece un sentido no urbano como 'campos' o 'campo abierto'.
    reason: lexical_alternative
  - marker: b
    text: O 'el primero del polvo del mundo'. La frase hebrea es breve y algo inusual; probablemente alude al suelo o polvo más primitivo, del cual fue formado el mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד לֹא
  english_pob_choice: before ... had
  chosen_spanish: antes de haber
  alternatives_spanish:
  - antes de que hubiera
  - antes de haber hecho
  lexicon: HALOT
  rationale: La construcción temporal hebrea marca prioridad anterior a la acción creadora; en español, 'antes de haber' reproduce de manera natural ese valor anterior sin sobrecargar el verso.
- source_word: עָשָׂה
  english_pob_choice: had made
  chosen_spanish: haber hecho
  alternatives_spanish:
  - haber creado
  - haber formado
  - haber hecho
  lexicon: HALOT
  rationale: עָשָׂה es el verbo común 'hacer'. 'Haber hecho' conserva la amplitud léxica y encaja con la construcción temporal del hebreo.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la región
  lexicon: HALOT
  rationale: En el contexto de creación junto con תֵּבֵל, el sentido global es 'tierra' como el ámbito terrestre; 'país' o 'región' estrecharían indebidamente el alcance.
- source_word: חוּצוֹת
  english_pob_choice: the fields
  chosen_spanish: los campos
  alternatives_spanish:
  - los campos
  - los espacios abiertos
  - las calles
  lexicon: HALOT
  rationale: El audit trail inglés descartó el sentido urbano de 'streets' y prefirió un referente no urbano. 'Campos' comunica bien los espacios abiertos de la creación y es más natural en español que calcar 'open fields'.
- source_word: רֹאשׁ עָפְרֹות
  english_pob_choice: the first of the dust
  chosen_spanish: el primero del polvo
  alternatives_spanish:
  - el primero del polvo
  - el comienzo del polvo
  - la primera porción del polvo
  lexicon: HALOT
  rationale: La frase hebrea es compacta y algo inusual. 'El primero del polvo' mantiene la estructura mínima del original y la idea de prioridad/primacía sin suavizar la tensión interpretativa.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - del mundo
  - de la tierra habitada
  lexicon: HALOT
  rationale: תֵּבֵל suele referirse al mundo ordenado o habitable. 'Mundo' es claro y fiel; 'tierra habitada' explicita el matiz pero añade más que el texto base.
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail inglés: se prefirió una lectura directa de חוּצוֹת no urbana (''fields'' -> ''campos'') y se mantuvo la alternativa interpretativa con ''o'' para reflejar la incertidumbre textual/semántica de la construcción final.'
  spanish_consistency_notes:
  - Se mantuvo 'tierra' para אֶרֶץ y 'mundo' para תֵּבֵל, preservando la distinción cosmológica del hebreo.
  - Se evitó 'SEÑOR' u otras sustituciones, porque el verso no contiene el nombre divino ni un equivalente contextual que lo requiera.
  - La frase 'el primero del polvo' conserva la rareza del hebreo sin convertirla en paráfrasis explicativa en el texto principal.
