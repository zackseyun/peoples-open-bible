revisions:
- from: 'Te acercaste en el día en que te invoqué; dijiste[a]: «No temas».'
  to: 'Te acercaste[a] el día que te llamé; dijiste: «No temas».'
  rationale: Se ajusta el texto principal para reflejar mejor la amplitud léxica de קרא («te llamé») y se reubica la nota al segmento donde realmente cae la alternativa documentada. También se aligera la expresión temporal para un español más natural sin perder fidelidad. La nota conserva tanto la alternativa de mayor intensidad («clamé a ti») como la de cercanía («viniste cerca / te aproximaste») de manera comprensible para el lector español.
