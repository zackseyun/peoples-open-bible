translation:
  language: es
  text: 'Así dice Yahvé: He aquí, estoy levantando contra Babilonia, y contra los habitantes de Leb-kamai[a], un viento destructor[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Leb-kamai es probablemente un nombre cifrado (atbash) para Caldea/Babilonia; alternativamente, la expresión puede entenderse más literalmente como 'el corazón de mis adversarios'.
    reason: alternative_reading
  - marker: b
    text: O 'un espíritu destructor'; la palabra hebrea también puede significar 'viento', 'espíritu' o 'aliento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino del pacto. 'Yahvé' conserva la referencia directa al Tetragrámaton sin sustituirlo por una convención litúrgica de máscara, y es la forma marcada por la política terminológica del POB en español.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Mira, yo estoy
  - Miren, yo estoy
  lexicon: HALOT
  rationale: La forma hebrea introduce una घोषणा profética de acción inmediata. 'He aquí' preserva el tono solemne y deíctico de 'Behold', y 'yo estoy' refleja con naturalidad el valor enfático de la construcción.
- source_word: מֵעִיר
  english_pob_choice: stirring up
  chosen_spanish: levantando
  alternatives_spanish:
  - despertando
  - incitando
  - suscitando
  lexicon: HALOT
  rationale: En este contexto de juicio, el verbo en hifil expresa poner en movimiento o suscitar un agente contra Babilonia. 'Levantando' comunica bien la iniciativa divina y el movimiento provocado, sin cargar de manera innecesaria un matiz psicológico que el hebreo no exige aquí.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: La preposición tiene fuerza adversativa en un anuncio de juicio. 'Contra' reproduce con claridad esa orientación hostil que el contexto demanda.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: '''Babilonia'' es la forma española estándar para el topónimo en este contexto histórico-profético y mantiene inteligibilidad inmediata para el lector.'
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitan en
  - los moradores de
  lexicon: HALOT
  rationale: El participio plural designa colectivamente a quienes residen allí. 'Los habitantes de' es la solución natural en español y conserva el sentido colectivo del hebreo.
- source_word: לֵב קָמָי
  english_pob_choice: Leb-kamai
  chosen_spanish: Leb-kamai
  alternatives_spanish:
  - el corazón de mis adversarios
  - el corazón de mis enemigos
  lexicon: HALOT
  rationale: Se conserva el nombre cifrado por transliteración, como en el texto base inglés, para no borrar la señal textual del atbash. La alternativa interpretativa se documenta aparte porque el hebreo también puede leerse como una frase transparente con sentido figurado.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: En la combinación con 'destructor' y dentro del marco de juicio contra Babilonia, 'viento' es la lectura más natural y mantiene la imagen de un agente devastador enviado por Yahvé. Se preserva la amplitud semántica del término en nota.
- source_word: מַשְׁחִית
  english_pob_choice: destroying
  chosen_spanish: destructor
  alternatives_spanish:
  - destructivo
  - que destruye
  lexicon: HALOT
  rationale: Como participio que califica a 'viento', el término describe su carácter y efecto. 'Destructor' conserva la fuerza activa del hebreo y suena más natural que una perífrasis en español.
theological_decisions:
- issue: Sentido de רוּחַ en el anuncio de juicio
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El pasaje presenta un instrumento de juicio levantado contra Babilonia. En este contexto inmediato, 'viento' mantiene mejor la imaginería concreta y no convierte la frase en una referencia personal o pneumatológica que el texto no exige. La ambigüedad léxica se reconoce sin resolverla artificialmente.
  doctrine_reference: Conservar la tensión léxica cuando el hebreo permite más de una lectura legítima.
translation_notes:
  revision_awareness: El texto español sigue de cerca el acuerdo alto del expediente inglés sin introducir revisiones pendientes. Se preserva la lectura codificada de 'Leb-kamai' y la ambigüedad léxica de רוּחַ mediante nota, como en el audit trail, sin suavizar el matiz de juicio del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto en español.
  - Se conserva 'Leb-kamai' como transliteración del nombre cifrado para no perder la pista textual del atbash.
  - '''Babilonia'' se mantiene como topónimo histórico estándar en español.'
  - '''Viento'' se elige como lectura principal de רוּחַ, pero la nota conserva las alternativas ''espíritu'' y ''aliento''.'
  - '''Destructor'' refleja el participio hebreo con un sustantivo/adjetivo activo y natural en español.'
