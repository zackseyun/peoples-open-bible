revisions:
- from: 'Y Yahvé me dijo[a]: «Desde el norte se abrirá el desastre[b] contra todos los habitantes de la tierra[c]».'
  to: 'Y Yahvé me dijo: «Desde el norte irrumpirá el desastre[a] contra todos los habitantes de la tierra[b]».'
  rationale: Se reemplaza «se abrirá» por «irrumpirá» para reflejar mejor תִּפָּתַח en contexto de juicio anunciado y para sonar natural en español. Se eliminó la nota innecesaria sobre «me dijo». Se mantiene «la tierra» en el texto con nota contextual, pero ya sin reforzar una lectura universal en el cuerpo del versículo; esto respeta mejor la decisión documentada de referencia probable a Judá, preservando la alternativa más amplia en nota.
