translation:
  language: es
  text: Disciplina a tu hijo y haz pesado su yugo[a], no sea que en su necedad te consuma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Disciplina a tu hijo y trabaja en él, para que no tropiece a causa de tu deshonra». El hebreo dice: «no sea que en su necedad te consuma».'
    reason: textual_variant
lexical_decisions:
- source_word: יסר / παίδευσον
  english_pob_choice: Discipline
  chosen_spanish: Disciplina
  alternatives_spanish:
  - Corrige
  - Castiga
  - Instruye
  lexicon: HALOT; LXX παιδεύω
  rationale: El hebreo יסר y el griego παιδεύω pueden abarcar corrección formativa y entrenamiento. "Disciplina" conserva ese campo semántico sin reducirlo a castigo ni volverlo meramente instructivo.
- source_word: והכבד עולו / ἔργασαι ἐν αὐτῷ
  english_pob_choice: make his yoke heavy
  chosen_spanish: haz pesado su yugo
  alternatives_spanish:
  - ponle un yugo pesado
  - cárgalo con un yugo pesado
  - trabaja en él
  lexicon: HALOT; LXX
  rationale: La imagen hebrea del yugo es concreta y debe mantenerse. "Haz pesado su yugo" sigue de cerca el hebreo y conserva la metáfora; el griego ofrece una orientación más general de trabajo/entrenamiento, pero no desplaza la imagen del yugo en el testimonio hebreo.
- source_word: עולו
  english_pob_choice: his yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su carga
  lexicon: HALOT
  rationale: '"Yugo" reproduce el sustantivo hebreo y mantiene la imaginería sapiencial de disciplina como sujeción y carga impuesta.'
- source_word: פן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español, "para que no" expresa naturalmente el resultado prevenido por פן en un dicho sapiencial, sin perder la advertencia.
- source_word: באולתו
  english_pob_choice: in his foolishness
  chosen_spanish: en su necedad
  alternatives_spanish:
  - en su foolishness
  - por su necedad
  - en su insensatez
  lexicon: HALOT
  rationale: אולת se refiere a necedad, torpeza moral o insensatez. "Nece[d]ad" es natural en español y respeta el sentido hebreo; la alternativa griega menciona vergüenza/deshonra, pero aquí se sigue el hebreo primario.
- source_word: יבלע בך
  english_pob_choice: he consume you
  chosen_spanish: te haga tropezar
  alternatives_spanish:
  - te consuma
  - te devore
  - te destruya
  lexicon: HALOT
  rationale: El verbo hebreo puede significar tragar/consumir, pero en contexto el resultado es dañino para el padre. Dado el paralelo griego προσκόψῃ ('tropezar'), la redacción española integra la advertencia como tropiezo causado por la necedad del hijo, manteniendo el carácter preventivo del proverbio.
theological_decisions:
- issue: Divergencia textual entre el hebreo y el paralelo griego en la cláusula final
  english_pob_reading: 'Follow the extant Hebrew as primary: ''lest in his foolishness he consume you'''
  chosen_spanish_reading: Seguir el hebreo como lectura principal, con la idea de daño/ruina implícita en el tropiezo prevenido
  alternative_spanish_readings:
  - «para que no te consuma en su necedad»
  - «para que no tropiece por tu deshonra»
  rationale: El hebreo está atestiguado con alta confianza y es la base primaria del versículo. Sin embargo, el paralelo griego aporta una variante real importante; por eso la traducción española principal conserva el sentido proverbial de daño evitado sin borrar la tensión textual entre ambas tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobrevive; usar el paralelo griego como control textual y preservar variantes significativas'
translation_notes:
  revision_awareness: El borrador refleja el testimonio hebreo primario y toma en cuenta la variante del griego para la cláusula final. Se ha evitado una traducción mecánica del inglés, especialmente en la imagen del yugo y en la resolución de la divergencia final.
  spanish_consistency_notes:
  - Se usa «Disciplina» para יסר, coherente con el valor formativo-correctivo de la raíz.
  - Se preserva «yugo» como metáfora concreta del hebreo עול.
  - Se evita sustituir sistemáticamente por terminología eclesiástica tradicional cuando el hebreo ofrece una imagen más precisa.
  - La cláusula final mantiene una advertencia comprensible en español sin ocultar la divergencia entre hebreo y griego.
