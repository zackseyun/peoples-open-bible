  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: אִם לֹא se entiende correctamente como partícula aseverativa, קִימָנוּ se toma de forma contextual como referencia a adversarios, וְיִתְרָם como remanente, y אָכְלָה אֵשׁ como consumo destructivo por fuego. Sin embargo, «han sido cortados» suena poco natural en español para personas en este contexto y no refleja tan bien la fuerza idiomática de נִכְחַד como «han sido destruidos».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor naturalidad y fidelidad idiomática. «Ciertamente nuestros adversarios…» funciona bien. La nota [a] es útil, pero «substancia» conviene modernizarse a «bienes» o «posesiones». La nota [b] actualmente justifica una alternativa, pero el texto principal debería adoptar la opción más natural en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. La elección de «adversarios» concuerda con la decisión léxica documentada. Conviene preferir «destruidos» en el texto principal para נִכְחַד, dejando «cortados» fuera por sonar calcado del inglés.
  issues:
  - severity: medium
    issue: «han sido cortados» es un calco poco natural
    rationale: Aunque «cut off» es válido en inglés, en español aplicado a personas aquí suena rígido y ambiguo. «Han sido destruidos» o «han perecido» comunica mejor el valor de נִכְחַד en contexto.
  - severity: low
    issue: La nota [a] usa «substancia», forma menos natural y algo arcaizante
    rationale: El POB inglés habla de 'substance/possessions'. En español eclesial y general, «bienes» o «posesiones» es más claro que «substancia».
