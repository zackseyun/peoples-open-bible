    issue: Inicio temporal algo poco idiomático
    rationale: «Desde la mañana hasta la tarde» no es incorrecto, pero «De la mañana a la tarde» fluye mejor y conserva el mismo sentido proverbiales.
  - severity: medium
    issue: Nota b con español menos natural
    rationale: «rápidas a la vista de Yahvé» suena forzado en español. «rápidas ante Yahvé» o «a los ojos de Yahvé» expresa mejor la alternativa documentada.
  - severity: low
    issue: «Veloces» en la línea principal es algo rígido
    rationale: Es fiel al griego y aceptable, pero menos natural que «rápidas». No obstante, no constituye error de sentido; puede mantenerse o suavizarse editorialmente.
