review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la tierra/la tierra firme se sacude por los campamentos/fuerzas, y el combate queda entablado durante toda la jornada. Sin embargo, la nota al pie está mal anclada y no corresponde al lugar ni al contenido de la alternativa inglesa documentada. Además, «por causa de sus campamentos» es defendible, pero «a causa de sus campamentos» o una formulación más directa suena un poco más natural en español; el punto principal a corregir es la nota.'
  spanish_quality_summary: 'El español es claro y digno. «La batalla se trabó» es idiomático y fiel a la intención de evitar una expansión como «rugió» o «arreció». «Fue sacudida» conserva bien el valor pasivo, aunque «tembló» también sería posible. La principal deficiencia de calidad es editorial: la nota [a] está colocada tras «campamentos» pero explica una alternativa para la segunda cláusula, lo que confunde al lector.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son aceptables: γῆ -> «tierra», παρεμβολῶν -> «campamentos», πόλεμος -> «batalla». συνηγμένος -> «se trabó» encaja bien con la revisión inglesa «was joined».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «campamentos» pero su contenido trata la frase «la batalla se trabó desde la mañana hasta la tarde».
    rationale: Las notas deben aparecer en el lugar exacto al que se refieren. Aquí la alternativa documentada pertenece a la segunda cláusula, no a «campamentos». Esto crea una incoherencia editorial y puede inducir a error.
  - severity: low
    issue: La redacción de la nota usa «más literalmente» para una frase que en realidad coincide con el texto principal en español.
    rationale: En el rastro inglés, la nota preserva una alternativa frente a una formulación más dinámica anterior. En español revisado, el texto principal ya adopta esa opción literal («se trabó»), por lo que la nota resulta innecesaria y redundante.
  revised_spanish_text: Y la tierra fue sacudida a causa de sus campamentos; y la batalla se trabó desde la mañana hasta la tarde.
  revision_rationale: Se elimina la nota porque está mal anclada y además ya no aporta una alternativa real frente al texto principal. Se ajusta «por causa de» a «a causa de» por mayor naturalidad en español, manteniendo el mismo valor causal/originario del griego ἀπό en contexto.
