translation:
  language: es
  text: Y vio Esaú que las hijas de Canaán eran malas[a] a los ojos de su padre Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «eran desfavorables a los ojos de su padre Isaac». El hebreo puede significar «malas» o «desfavorables»; aquí probablemente se refiere a la opinión negativa de Isaac sobre las mujeres cananeas como esposas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: And Esau saw
  chosen_spanish: Y vio
  alternatives_spanish:
  - Entonces vio
  - Así vio
  - Y se dio cuenta
  lexicon: WLC / HALOT
  rationale: La raíz ראה se traduce de forma directa como 'ver'; el waw consecutivo avanza la narración con una simple conjunción 'Y'. 'Se dio cuenta' sería inferencial y menos fiel al verbo explícito.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio con la forma española habitual 'Esaú'.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo visto; en español 'que' es la manera natural de mantener esa estructura sin volverla causal.
- source_word: רָעוֹת
  english_pob_choice: were evil
  chosen_spanish: eran malas
  alternatives_spanish:
  - eran malas a sus ojos
  - eran perversas
  - eran evil
  lexicon: HALOT
  rationale: El hebreo permite 'bad/evil'. En este contexto relacional, 'malas' conserva la fuerza léxica sin sobreactuar una afirmación moral absoluta sobre las mujeres; además el juicio está encuadrado por la evaluación de Isaac. Se evita 'desagradables' porque suaviza demasiado el término hebreo.
- source_word: בְּנוֹת כְּנָעַן
  english_pob_choice: the daughters of Canaan
  chosen_spanish: las hijas de Canaán
  alternatives_spanish:
  - las hijas de los cananeos
  - las mujeres de Canaán
  lexicon: HALOT
  rationale: Se mantiene la expresión formal del hebreo 'hijas de Canaán', que preserva el paralelismo nominal y el marco étnico-geográfico del texto.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en los ojos de
  lexicon: HALOT
  rationale: La locución idiomática hebrea expresa evaluación o aprecio. 'Ante los ojos de' reproduce el modismo de manera transparente en español; 'a los ojos de' también sería posible, pero 'ante' suena más natural aquí.
- source_word: יִצְחָק אָבִי/ו
  english_pob_choice: Isaac his father
  chosen_spanish: Isaac su padre
  alternatives_spanish:
  - Isaac su padre
  - su padre Isaac
  lexicon: Nombre propio bíblico / relación de posesión
  rationale: Se conserva la relación de posesión. El orden 'Isaac su padre' sigue de cerca el hebreo; en español, 'Isaac su padre' es legible y respeta la estructura.
theological_decisions:
- issue: Valor moral de רָעוֹת en un contexto evaluativo
  english_pob_reading: were evil ... likely refers to Isaac's unfavorable view of the Canaanite women as marriage partners
  chosen_spanish_reading: eran malas ... probablemente expresa la valoración desfavorable de Isaac acerca de las mujeres cananeas como candidatas para matrimonio
  alternative_spanish_readings:
  - eran evil
  - eran perversas
  - eran desagradables
  rationale: El texto no afirma una condena abstracta de toda su persona, sino una valoración negativa en el marco del matrimonio y la aprobación paterna. 'Malas' mantiene la tensión entre el sentido léxico fuerte y el contexto evaluativo sin diluirlo.
  doctrine_reference: Génesis 28:8; cf. la nota inglesa sobre el valor contextual de רָעוֹת
translation_notes:
  revision_awareness: La versión inglesa revisó 'displeasing' a 'evil' para reflejar más directamente רָעוֹת sin perder el modismo 'in the eyes of'. La presente línea sigue esa decisión al usar 'malas' para retener la fuerza semántica básica de 'bad/evil', pero la nota aclara la lectura contextual evaluativa sugerida por el audit trail.
  spanish_consistency_notes:
  - Se conserva el nombre propio 'Esaú' con acento español estándar.
  - '''ante los ojos de'' mantiene el modismo hebreo בְּעֵינֵי sin sustituirlo por una paráfrasis interpretativa.'
  - La nota usa 'malas' como alternativa principal y explica la posibilidad de traducir con más fuerza moral, siguiendo la tensión documentada en el inglés.
