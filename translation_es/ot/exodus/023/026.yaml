base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/026.yaml
  text: There shall be none miscarrying or barren in your land[b][a]; I will fulfill the number of your days.
  footnotes:
  - marker: a
    text: Or 'bereaved.' The Hebrew term can refer more broadly to being deprived of children, but in this context, paired with 'barren,' it likely refers specifically to miscarriage or loss of offspring in childbirth.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will fill the number of your days,' that is, 'I will bring your lifespan to its full measure.'
    reason: lexical_alternative
