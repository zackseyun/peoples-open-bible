translation:
  language: es
  text: 'Los hijos de Moisés: Gershom y Eliezer.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los niños de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי introduce relación de filiación. En español, "los hijos de" conserva la forma directa y natural sin ampliar el sentido a "descendientes" más de lo que exige el contexto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moishe
  lexicon: HALOT
  rationale: Nombre propio bíblico con equivalente español establecido. "Moisés" es la forma estándar y plenamente reconocible en español.
- source_word: גֵּרְשֹׁם
  english_pob_choice: Gershom
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersom
  - Gershom
  lexicon: HALOT
  rationale: El hebreo de este versículo corresponde al nombre גֵּרְשֹׁם; en español bíblico suele normalizarse como "Gersón". Se evita confundirlo con otras transliteraciones menos asentadas en español.
- source_word: וֶ/אֱלִיעֶזֶר
  english_pob_choice: and Eliezer
  chosen_spanish: y Eliezer
  alternatives_spanish:
  - y Eleazar
  lexicon: HALOT
  rationale: La conjunción ו se vierte naturalmente como "y". El nombre es אֱלִיעֶזֶר, que en español se mantiene como "Eliezer"; no debe sustituirse por "Eleazar", que es otro nombre distinto.
