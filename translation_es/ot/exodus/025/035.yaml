review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura repetitiva del hebreo y refleja adecuadamente תַּחַת, שְׁנֵי הַקָּנִים, לְשֵׁשֶׁת הַקָּנִים, הַיֹּצְאִים y מִן הַמְּנֹרָה. Sin embargo, מִמֶּנָּה es pronombre femenino singular ('de ella'), y el español 'de él' introduce un cambio de género no motivado por la fuente. Además, aunque 'bulbo' sigue la auditoría inglesa, en español suena menos natural para un adorno del candelabro que 'botón', que además preserva mejor la idea ornamental redondeada.
  spanish_quality_summary: La frase es legible, pero 'de él' suena torpe y gramaticalmente tensionado frente al antecedente implícito femenino del hebreo. También 'bulbo' resulta algo técnico o botánico en español bíblico; 'botón' es más idiomático y digno en este contexto cultual. Conviene ajustar ambos puntos para mayor naturalidad y fidelidad.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Candelabro' para מְנֹרָה y 'ramas' para קנים encajan bien. La excepción propuesta es apartarse del inglés auditado 'bulb' para כפתר y usar 'botón' en español por mejor idoneidad léxica y legibilidad, manteniendo una nota que preserve la alternativa 'bulbo'.
  issues:
  - severity: medium
    issue: El pronombre 'de él' no refleja el femenino singular de מִמֶּנָּה.
    rationale: La fuente hebrea usa un sufijo femenino singular; aunque el referente español 'candelabro' sea masculino, la traducción literal 'de él' crea desajuste con la anáfora de la fuente y suena menos natural. 'De ella' preserva mejor el hebreo, o podría explicitarse 'del candelabro'; aquí conviene mantener la anáfora con 'de ella'.
  - severity: medium
    issue: '''Bulbo'' es poco natural en español para כפתר en este contexto.'
    rationale: Aunque sigue la revisión inglesa, en español eclesial y descriptivo 'botón' comunica mejor un adorno redondeado del candelabro. 'Bulbo' puede sonar botánico o técnico; la nota puede conservarlo como alternativa vinculada al audit trail inglés.
