translation:
  language: es
  text: Porque tú tendrás compasión del pueblo de Israel para siempre[a], y no los desecharás[b]; y estaremos bajo tu yugo para siempre, y bajo la vara de tu disciplina[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendencia de Israel' o 'familia de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'rechazarás'.
    reason: lexical_alternative
  - marker: c
    text: '''Disciplina'' también puede entenderse como ''instrucción'' o ''formación''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκτειρήσεις
  english_pob_choice: will have compassion
  chosen_spanish: tendrás compasión
  alternatives_spanish:
  - tendrás misericordia
  - te apiadarás
  lexicon: BDAG
  rationale: En el contexto de oración solemne, 'tener compasión' conserva el tono afectivo y promesa divina sin caer en arcaísmo. 'Apiadarse' y 'tener misericordia' son posibles, pero la primera es menos natural en español actual y la segunda puede sonar más formularia que el matiz del griego aquí.
- source_word: γένος
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - descendencia
  - familia
  - linaje
  lexicon: BDAG
  rationale: El POB inglés eligió 'people' para una referencia colectiva y nacional a Israel. 'Pueblo' comunica esa fuerza en español mejor que 'raza' o 'linaje', y evita una lectura biológica excesiva que el contexto no exige.
- source_word: ἀπώσεις
  english_pob_choice: cast them off
  chosen_spanish: desecharás
  alternatives_spanish:
  - rechazarás
  - los arrojarás lejos
  - los apartarás
  lexicon: BDAG
  rationale: '''Desechar'' preserva la idea de rechazo fuerte o expulsión del favor, que corresponde bien al verbo griego y al tono de pacto. ''Rechazar'' es posible, pero en español puede sonar más débil; las opciones más literales resultan más duras o menos idiomáticas.'
- source_word: ζυγόν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - carga
  lexicon: BDAG
  rationale: Se conserva la imagen literal y bíblica de subordinación a la autoridad divina. 'Carga' suavizaría la metáfora y perdería el valor visual y teológico del 'yugo'.
- source_word: μάστιγα
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - látigo
  - azote
  - castigo
  lexicon: BDAG
  rationale: Aunque el griego puede sugerir un instrumento de golpeo, la revisión inglesa pasó a 'rod' para adecuar el registro y la relación con παιδίας. En español, 'vara' mantiene la imagen disciplinaria formal y se alinea con esa decisión auditada sin convertirla en mera violencia punitiva.
- source_word: παιδίας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: BDAG
  rationale: '''Disciplina'' conserva el rango semántico de παιδεία entre corrección, formación e instrucción. En combinación con ''vara'', expresa tanto el aspecto correctivo como el formativo sin reducirlo solo a castigo.'
theological_decisions:
- issue: Referencia del objeto implícito en 'no los desecharás'
  english_pob_reading: The object is 'the people of Israel,' rendered as 'them.'
  chosen_spanish_reading: Se mantiene 'los' como objeto explícito, retomando 'el pueblo de Israel'.
  alternative_spanish_readings:
  - no nos desecharás, si se entendiera que la oración se funde con el hablante colectivo
  - no lo desecharás, tomando 'pueblo' como singular colectivo
  rationale: El griego refiere de manera directa al 'γένος Ἰσραήλ'; por eso el objeto se verbaliza en tercera persona plural. El pronombre plural en español conserva la referencia colectiva y evita borrar la distancia gramatical que el texto mantiene entre el hablante y el pueblo mencionado.
  doctrine_reference: Gramática del referente colectivo en el texto de súplica; no implica una decisión doctrinal distinta.
- issue: Tiempo verbal de la cláusula con sujeto implícito 'ἡμεῖς'
  english_pob_reading: 'Rendered as future: ''we will be under your yoke forever''.'
  chosen_spanish_reading: Estaremos bajo tu yugo para siempre.
  alternative_spanish_readings:
  - estamos bajo tu yugo para siempre
  - quedaremos bajo tu yugo para siempre
  rationale: La cláusula griega es verbless, pero está en paralelo con futuros explícitos y con el marcador temporal 'para siempre'. En español, el futuro mantiene mejor esa proyección promesaria y la continuidad del paralelismo sintáctico, evitando convertirla en una simple confesión presente.
  doctrine_reference: Coherencia aspectual y paralelismo literario del texto de súplica-pacto.
- issue: Valor de παιδεία en la expresión final
  english_pob_reading: '''Discipline'' may also be understood as ''instruction'' or ''training''.'
  chosen_spanish_reading: '''Disciplina'' con nota de alternativa semántica implícita.'
  alternative_spanish_readings:
  - instrucción
  - formación
  - corrección
  - enseñanza
  rationale: La combinación con 'vara' favorece el matiz correctivo; sin embargo, παιδεία también incluye formación e instrucción. 'Disciplina' permite conservar esa tensión sin fijarla de modo exclusivo en castigo físico.
  doctrine_reference: Tensión semántica pedagógica/correctiva de παιδεία.
translation_notes:
  revision_awareness: Seguí el pasaje fuente griego de Psalms of Solomon 7:8 y la trayectoria auditada del POB en inglés. Conservé la secuencia de futuros y el paralelismo de la cláusula final, pero adapté el inglés 'rod' a 'vara' en español por registro y coherencia con παιδίας. Mantengo la tensión semántica de γένος y παιδεία mediante notas alternativas, sin diluir la metáfora del yugo ni suavizar indebidamente la negativa divina a desechar a Israel.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige explícitamente; aquí no aparece el nombre divino, por lo que se traduce con pronombre de segunda persona.
  - Se preserva 'Israel' como nombre propio colectivo sin glosa.
  - '''Yugo'' se mantiene como metáfora de sujeción; no se reemplaza por ''carga'' para no perder la imagen bíblica.'
  - La clausula final se formula en futuro ('estaremos') para respetar el valor prospectivo del griego y el audit trail inglés.
  - '''Vara de tu disciplina'' conserva la relación entre instrumento correctivo y παιδεία sin introducir una traducción doctrinalmente cerrada.'
