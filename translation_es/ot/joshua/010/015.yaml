translation:
  language: es
  text: Entonces Josué volvió, y todo Israel con él, al campamento de Gilgal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una declaración similar de regreso a Gilgal aparece en Josué 10:43; algunos intérpretes consideran este versículo anticipatorio o desplazado textualmente, pero aquí se traduce el hebreo tal como está.
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then ... returned
  chosen_spanish: Entonces ... volvió
  alternatives_spanish:
  - Y ... volvió
  - Luego ... regresó
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; en español, «entonces» reproduce bien ese hilo discursivo y «volvió» comunica con naturalidad la idea de regresar a un punto previo sin perder el valor verbal del hebreo.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: Nombre propio bíblico estándar
  rationale: En español bíblico estándar, «Josué» es la forma transparente y reconocible del nombre, equivalente al uso de «Joshua» en la traducción inglesa.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  - y todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación colectiva del hebreo. «Todo Israel» mantiene la amplitud corporativa del texto sin especificar más de lo que el מקור ofrece.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: La preposición con sufijo se vierte de forma directa y natural en español con «con él».
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - al real
  - al encampamento
  lexicon: HALOT
  rationale: «Campamento» es el equivalente natural de מַחֲנֶה en este contexto militar/narrativo. «Al» expresa adecuadamente el movimiento indicado por אֶל.
- source_word: הַגִּלְגָּלָה
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - a Gilgal
  - al campamento de Gilgal
  lexicon: HALOT
  rationale: El topónimo con terminación direccional sugiere movimiento hacia Gilgal; en español, la relación locativa se expresa con naturalidad como «en Gilgal» dentro de la frase «al campamento en Gilgal», preservando el sentido de destino sin sobrecargar la sintaxis.
theological_decisions:
- issue: Posible duplicación o desplazamiento literario respecto de Josué 10:43
  english_pob_reading: Translate the Masoretic Text as given without harmonizing or omitting the verse.
  chosen_spanish_reading: Traducir el texto hebreo recibido tal como está, sin armonizarlo ni omitir el versículo.
  alternative_spanish_readings:
  - Suprimir o reubicar el versículo por la duplicación aparente
  - Parafrasear para resolver la tensión con Josué 10:43
  rationale: La cuestión es literaria/textual, no doctrinal. La traducción debe reflejar fielmente el texto masorético recibido y dejar la discusión crítica para nota, no para el cuerpo principal.
  doctrine_reference: Crítica textual y transmisión del texto bíblico; fidelidad al texto recibido
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió cambios de fondo: se mantuvo la decisión de traducir el texto masorético recibido sin armonización, conservando el movimiento narrativo y la referencia a Gilgal. La nota textual se preserva en español porque el paralelismo con Josué 10:43 también genera la misma observación crítica en esta lengua.'
  spanish_consistency_notes:
  - Se usa «Josué» como forma bíblica estándar del nombre propio, consistente con el registro español.
  - «Todo Israel» conserva la fuerza colectiva del hebreo sin expandirlo innecesariamente a «los israelitas».
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Campamento» se mantiene como traducción uniforme de מַחֲנֶה para contexto militar/narrativo.
