base_translation:
  language: en
  yaml_path: translation/ot/2_kings/012/010.yaml
  text: Then Jehoiada the priest took one chest[a], bored a hole in its lid, and set it beside the altar, on the right as a man enters the house of Yahweh[c][b]; and the priests who guarded the threshold put there all the silver that was brought into the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'as one enters the house of the LORD.' The Hebrew reads literally 'as a man enters,' a generic singular orienting the reader to the right side from the entrant's perspective.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in its door.' In context this likely refers to the chest's lid or cover.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the money.' Hebrew 'silver' can also function as a term for money.
    reason: lexical_alternative
