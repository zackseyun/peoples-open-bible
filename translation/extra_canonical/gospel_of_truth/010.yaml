  rationale: Both are possible; 'sound' avoids implying a speaking subject (e.g.,
    Logos) for the numbers while preserving the acoustic metaphor linked immediately
    to 'the Father'.
- issue: ⲙⲉⲉⲩⲉ as 'knowledge' vs. 'thought'
  chosen_reading: '''knowledge'''
  alternative_readings:
  - '''thought'''
  - '''understanding'''
  rationale: Given the repeated gnosis/Error polarity, 'knowledge' keeps the soteriological
    load of the term rather than reducing it to cognitive activity.
