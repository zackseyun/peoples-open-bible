translation:
  language: es
  text: Porque es fácil a los ojos de Yahvé, en un momento repentino, hacer rico a un pobre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Porque es fácil ante Yahvé, en el día de la muerte, dar a un hombre conforme a sus caminos». El griego refleja una forma sustancialmente distinta del versículo frente al hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֹכַח
  english_pob_choice: easy
  chosen_spanish: fácil
  alternatives_spanish:
  - simple
  - ligero
  - claro
  lexicon: HALOT
  rationale: En este contexto, con la idea de algo que no cuesta esfuerzo para Dios, «fácil» comunica bien la noción de facilidad/ausencia de dificultad. Evita el calco «ligero», que en español suena menos natural aquí.
- source_word: בְּעֵינֵי יי
  english_pob_choice: in the eyes of the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea usa un modismo de percepción/presencia divina. En español, «ante Yahvé» conserva la relación idiomática sin sonar tan literal como «en los ojos de».
- source_word: בְּפֶתַע פִּתְאֹם
  english_pob_choice: in a sudden moment
  chosen_spanish: en un momento repentino
  alternatives_spanish:
  - de repente
  - en un instante
  - de pronto
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de súbito. «En un momento repentino» mantiene el matiz temporal y la intensidad sin perder claridad.
- source_word: לְהַעֲשִׁיר
  english_pob_choice: to make ... rich
  chosen_spanish: hacer rico
  alternatives_spanish:
  - enriquecer
  - volver rico
  lexicon: HALOT
  rationale: El hifil causal se refleja mejor con una construcción causal directa. «Hacer rico» es transparente y evita una abstracción innecesaria.
- source_word: דָּל
  english_pob_choice: poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - una persona pobre
  - el pobre
  lexicon: HALOT
  rationale: El hebreo singular puede funcionar de modo genérico. «Un pobre» es natural en español y conserva el valor personal sin añadir información no explicitada.
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El texto hebreo tiene una escritura reverencial para el nombre divino. Según la convención del proyecto en español, se vierte como «Yahvé» y no se enmascara con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | the LORD'
- issue: Competing Hebrew and Greek forms of the verse
  english_pob_reading: Follow the extant Hebrew as main text, with the Greek as an alternative footnote
  chosen_spanish_reading: Seguir el hebreo conservado en el texto principal, dejando la forma griega para nota
  alternative_spanish_readings:
  - Traducir la forma griega en el texto principal
  - Fusionar ambas formas en una sola redacción
  rationale: Aquí el hebreo conservado es el testimonio principal para Sirácida, mientras que el griego muestra una forma sustancialmente distinta del versículo. Por fidelidad textual, la variante griega debe preservarse en nota y no mezclarse con el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: Sefaria Ben Sirach ... we translate from the Hebrew where it survives and from the Greek where it does not.'
translation_notes:
  revision_awareness: Sin cambios respecto del último pase de revisión; se corrige la ancladura de la nota para que el marcador [a] aparezca en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el nombre divino.
  - Se conserva la tensión textual entre el hebreo y el griego mediante una nota anclada.
  - La redacción evita calcos innecesarios y sigue el hebreo conservado como texto principal.
