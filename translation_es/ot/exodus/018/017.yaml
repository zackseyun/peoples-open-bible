translation:
  language: es
  text: 'El suegro de Moisés le dijo: «No es bueno lo que estás haciendo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El asunto que estás haciendo no es bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español puede reflejarse con «Y» al inicio o con la simple forma verbal. Mantengo «Y dijo» para conservar el enlace narrativo sin volverlo pesado.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses' father-in-law
  chosen_spanish: el suegro de Moisés
  alternatives_spanish:
  - el padre de la esposa de Moisés
  - el suegro de Moisés
  lexicon: HALOT
  rationale: La construcción hebrea denota al suegro de Moisés; «suegro» es la equivalencia natural y fiel en español.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Moisés
  lexicon: HALOT
  rationale: El pronombre remite a Moisés. En español, el dativo «le» es la forma más natural y directa para mantener la referencia sin repetir el nombre.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: No está bien
  alternatives_spanish:
  - No es bueno
  - No es correcto
  lexicon: HALOT
  rationale: טוֹב tiene un campo amplio; aquí expresa juicio evaluativo sobre la acción. «No está bien» comunica con naturalidad la valoración negativa sin forzar una lectura moral más estrecha que la evidencia.
- source_word: הַדָּבָר
  english_pob_choice: what / the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la materia
  lexicon: HALOT
  rationale: Aunque el texto hebreo dice literalmente «el דבר», el contexto permite una referencia general a la práctica de Moisés. «La cosa» conserva esa amplitud; no se impone una paráfrasis más interpretativa como «lo que haces».
- source_word: אֲשֶׁר אַתָּה עֹשֶׂה
  english_pob_choice: you are doing
  chosen_spanish: que estás haciendo
  alternatives_spanish:
  - que haces
  - que realizas
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Estás haciendo» reproduce bien el aspecto progresivo y mantiene el vínculo con la cláusula relativa.
theological_decisions:
- issue: Valor evaluativo de לֹא טוֹב
  english_pob_reading: What you are doing is not good.
  chosen_spanish_reading: No está bien la cosa que estás haciendo.
  alternative_spanish_readings:
  - No es bueno lo que estás haciendo
  - No es correcto lo que estás haciendo
  rationale: No hay una afirmación doctrinal explícita; la decisión es de alcance semántico. Se evita endurecer «טוֹב» en una corrección moral absoluta, preservando su juicio evaluativo amplio.
  doctrine_reference: No aplica; valoración ética general del texto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo fue de alta concordancia; esta versión mantiene esa lectura sin introducir ajustes innecesarios.
  spanish_consistency_notes:
  - Se mantiene «Moisés» para el referente personal y «suegro» para חֹתֵן, conforme al valor de parentesco del hebreo.
  - Se conserva una estructura cercana al original, pero con sintaxis española natural.
  - No se usa «Señor» ni terminología teológica ajena al versículo.
  - La nota formal alternativa se deja como posibilidad estilística, no como corrección del texto principal.
