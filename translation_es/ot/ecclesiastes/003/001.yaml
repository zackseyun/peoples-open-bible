translation:
  language: es
  text: Para todo hay un tiempo, y un momento para cada asunto[a] bajo los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propósito»; el hebreo חֵפֶץ puede significar «asunto», «actividad» o «propósito».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכֹּל
  english_pob_choice: for everything
  chosen_spanish: Para todo
  alternatives_spanish:
  - Para todas las cosas
  - Para cada cosa
  lexicon: HALOT
  rationale: La preposición ל con כֹּל introduce el alcance total. «Para todo» conserva esa amplitud en español y suena natural, sin volver la línea innecesariamente pesada.
- source_word: זְמָן
  english_pob_choice: season
  chosen_spanish: tiempo
  alternatives_spanish:
  - estación
  - momento señalado
  - tiempo مقرر
  lexicon: HALOT
  rationale: זְמָן puede expresar un tiempo fijado o adecuado. En español, «tiempo» mantiene la categoría temporal y evita introducir una distinción artificial frente a עֵת que el hebreo no exige explícitamente.
- source_word: וְעֵת
  english_pob_choice: and a time
  chosen_spanish: y un momento
  alternatives_spanish:
  - y un tiempo
  - y una ocasión
  lexicon: HALOT
  rationale: עֵת es el término común para tiempo u ocasión. «Momento» conserva la idea de una ocasión concreta y diferencia ligeramente el paralelismo sin perder naturalidad en español.
- source_word: לְכָל חֵפֶץ
  english_pob_choice: for every matter
  chosen_spanish: para cada asunto
  alternatives_spanish:
  - para cada cosa
  - para todo propósito
  - para cada actividad
  lexicon: HALOT
  rationale: חֵפֶץ puede significar asunto, actividad, deseo o propósito. Aquí, por el contexto inmediato de 3:2–8, «asunto» preserva la amplitud semántica sin cargar el verso con una idea teleológica más fuerte de lo que el hebreo requiere.
- source_word: תַּחַת הַשָּׁמָיִם
  english_pob_choice: under the heavens
  chosen_spanish: bajo los cielos
  alternatives_spanish:
  - bajo los cielos
  - bajo el cielo
  lexicon: HALOT
  rationale: La expresión hebrea es plural y elevada en registro. «Bajo los cielos» conserva esa forma y el tono sapiencial; además, evita aplanarla a un singular más común en español.
theological_decisions:
- issue: Si חֵפֶץ debe traducirse como «propósito», sugiriendo una teleología fuerte para cada evento
  english_pob_reading: matter
  chosen_spanish_reading: asunto
  alternative_spanish_readings:
  - propósito
  - cosa
  - actividad
  rationale: El versículo afirma tiempos apropiados para todo lo que ocurre, pero el sustantivo hebreo no obliga a afirmar aquí una doctrina filosófica de propósito en cada caso. «Asunto» preserva la amplitud y deja que la tensión teológica se determine por el contexto más amplio.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el texto sigue de cerca el análisis del hebreo y la solución óptima de la POB inglesa, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre las dos expresiones temporales sin forzar una repetición idéntica.
  - «Los cielos» conserva el plural hebreo y el registro de Eclesiastés.
  - «Asunto» evita cerrar el sentido de חֵפֶץ en una sola dirección doctrinal.
