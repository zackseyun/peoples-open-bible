translation:
  language: es
  text: 'Y Elías dijo a Eliseo[a]: «Por favor, quédate aquí, porque Yahvé me ha enviado a Betel». Pero Eliseo dijo: «Vive Yahvé[b], y por tu vida, no te dejaré». Y descendieron a Betel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «me ha enviado hasta Betel»; algunas traducciones simplifican a «me ha enviado a Betel».'
    reason: lexical_alternative
  - marker: b
    text: 'Fórmula de juramento hebrea: «Vive Yahvé, y vive tu vida»; es decir, «no te dejaré». En español, «y por tu vida» expresa naturalmente el sentido juratorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁב נָא פֹה
  english_pob_choice: Please stay here
  chosen_spanish: Por favor, quédate aquí
  alternatives_spanish:
  - Por favor, permanece aquí
  - Quédate aquí, por favor
  lexicon: HALOT
  rationale: שֵׁב puede significar 'sentarse', 'quedarse' o 'permanecer' según el contexto. Aquí Elías pide a Eliseo que no siga el viaje, así que 'quédate aquí' comunica con naturalidad el sentido situacional. נָא expresa cortesía, por eso se traduce con 'por favor'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto. No se sustituye por un título como 'el SEÑOR', para preservar el nombre personal del pacto.
- source_word: שְׁלָחַנִי עַד בֵּית אֵל
  english_pob_choice: has sent me as far as Bethel
  chosen_spanish: me ha enviado a Betel
  alternatives_spanish:
  - me ha enviado hasta Betel
  - me ha enviado as a Betel
  lexicon: HALOT
  rationale: Aunque עַד puede marcar 'hasta / as far as', en este contexto narrativo el español fluye mejor con 'a Betel'. La redacción mantiene el destino del envío sin sobrecargar la frase; la alternativa con 'hasta' queda como posible matiz de alcance.
- source_word: חַי יְהוָה
  english_pob_choice: As the LORD lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Vive Yahvé,
  - Por vida de Yahvé
  lexicon: HALOT
  rationale: En el juramento hebreo, la fórmula afirma la vida de Yahvé. En español, 'Vive Yahvé' conserva el valor solemne y directo del hebreo, evitando una paráfrasis demasiado libre.
- source_word: וְחֵי נַפְשְׁךָ
  english_pob_choice: and as you live
  chosen_spanish: y vive tu vida
  alternatives_spanish:
  - y como tú vives
  - y por tu vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona en una fórmula de juramento ligada a la vida de la persona. 'Vive tu vida' conserva la referencia a la vida del interlocutor sin imponer 'alma' en un contexto donde el sentido juratorio es el decisivo.
- source_word: אִם אֶעֶזְבֶךָּ
  english_pob_choice: I will not leave you
  chosen_spanish: que no te dejaré
  alternatives_spanish:
  - no te dejaré
  - si te dejara
  lexicon: HALOT
  rationale: Tras la fórmula de juramento, אִם introduce una negación elíptica. En español, se explicita como 'que no te dejaré' para reflejar con claridad el compromiso de Eliseo.
- source_word: וַיֵּרְדוּ
  english_pob_choice: they went down
  chosen_spanish: Y descendieron
  alternatives_spanish:
  - Y bajaron
  - Y fueron descendiendo
  lexicon: HALOT
  rationale: ירד significa 'bajar / descender'. 'Descendieron' conserva el movimiento geográfico y mantiene un registro digno.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: HALOT
  rationale: Se usa la transliteración usual en español, 'Betel', para el topónimo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en español como 'Yahvé', de acuerdo con la política del proyecto y el texto hebreo, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de juramento con חי יהוה וחי נפשך
  english_pob_reading: As the LORD lives, and as you live
  chosen_spanish_reading: Vive Yahvé, y vive tu vida
  alternative_spanish_readings:
  - Por vida de Yahvé, y por tu vida
  - Vive Yahvé, y como tú vives
  rationale: La expresión hebrea es una fórmula juratoria solemne. La traducción conserva el paralelismo y la fuerza de juramento sin borrar el componente de vida personal presente en נֶפֶשׁ.
  doctrine_reference: Nota de estilo y fidelidad retórica a fórmulas juratorias hebreas
- issue: Implicación negativa de אִם אֶעֶזְבֶךָּ
  english_pob_reading: I will not leave you
  chosen_spanish_reading: que no te dejaré
  alternative_spanish_readings:
  - no te dejaré
  - si te dejara
  rationale: En la frase de juramento, el hebreo usa una construcción elíptica donde la negación se sobreentiende. El español la hace explícita para evitar ambigüedad y preservar el sentido pretendido.
  doctrine_reference: Observación sintáctica del hebreo bíblico
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en cuanto a la lectura natural de עַד y la fórmula juratoria, pero mantiene el nombre divino como Yahvé según la norma española del proyecto. También ajusta la segunda cláusula para que el paralelo hebreo quede claro en español sin perder solemnidad.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה en todo el versículo, conforme al criterio editorial.
  - Betel se mantiene como topónimo transliterado estable en español.
  - Se conserva el registro solemne de la escena sin arcaísmos innecesarios.
  - Las notas a pie están ancladas en el texto con [a] y [b] para evitar referencias sin soporte textual.
