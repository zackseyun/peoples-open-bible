translation:
  language: es
  text: Porque estos cuatro valientes porteros, que eran levitas, estaban encargados[a] de las cámaras y de los almacenes[b] de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en fidelidad» / «fielmente»; el hebreo enfatiza la confiabilidad o la fidelidad con que estos cuatro porteros desempeñaban su oficio.
    reason: lexical_alternative
  - marker: b
    text: O «tesorerías».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶאֱמוּנָה
  english_pob_choice: were entrusted
  chosen_spanish: estaban encargados de
  alternatives_spanish:
  - en fidelidad
  - fielmente
  - eran confiados con
  lexicon: HALOT
  rationale: El hebreo comunica la idea de confiabilidad o fidelidad en un cargo administrativo. En español, «estaban encargados de» conserva la noción de responsabilidad oficial sin borrar ese trasfondo de confianza.
- source_word: הֵמָּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - ellos
  lexicon: HALOT
  rationale: El pronombre es retomativo y enfático; «estos» señala de manera natural a los porteros ya mencionados.
- source_word: אַרְבַּעַת
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Número cardinal directo en concordancia con el sustantivo siguiente.
- source_word: גִּבֹּרֵי
  english_pob_choice: mighty
  chosen_spanish: valientes
  alternatives_spanish:
  - poderosos
  - fuertes
  - hombres valientes
  lexicon: HALOT
  rationale: En este contexto de funcionarios del templo, גִּבּוֹרִים no apunta solo a fuerza física sino a prominencia y capacidad. «Valientes» preserva bien esa fuerza léxica en un español natural.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - guardianes de las puertas
  lexicon: HALOT
  rationale: «Porteros» es el equivalente castellano tradicional y claro para el personal del templo encargado de las puertas. Se evita «doorkeepers» por ser menos natural en español.
- source_word: הֵם הַלְוִיִּם
  english_pob_choice: who were Levites
  chosen_spanish: que eran levitas
  alternatives_spanish:
  - los cuales eran levitas
  - ellos, los levitas
  lexicon: HALOT
  rationale: La cláusula identifica a estos porteros como levitas. «Que eran levitas» mantiene la identificación sin forzar una lectura más rígida de apposición.
- source_word: וְהָיוּ עַל
  english_pob_choice: were entrusted with
  chosen_spanish: estaban encargados de
  alternatives_spanish:
  - estaban sobre
  - tenían cargo de
  - eran responsables de
  lexicon: HALOT
  rationale: El verbo con עַל expresa supervisión o responsabilidad. Dado el matiz de confianza ya presente en בֶאֱמוּנָה, «estaban encargados de» comunica bien ambos elementos.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - los cuartos
  lexicon: HALOT
  rationale: En contexto del templo, לְשָׁכוֹת designa dependencias o cuartos de servicio. «Cámaras» conserva el registro formal y la terminología tradicional en español bíblico.
- source_word: הָאֹצְרוֹת
  english_pob_choice: the storehouses
  chosen_spanish: los almacenes
  alternatives_spanish:
  - los tesoros
  - las bodegas
  - los depósitos
  lexicon: HALOT
  rationale: אֹצְרוֹת puede referirse a depósitos de provisiones o valores. «Almacenes» es suficientemente amplio y no limita el sentido a dinero; en notas puede preservarse la alternativa «tesoros».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la transparencia del hebreo con «casa de Dios», que preserva la imagen y el lenguaje del texto fuente.
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada de POB: el verso se entiende como una afirmación explicativa de la responsabilidad confiada a cuatro porteros levitas, con el matiz de fidelidad/responsabilidad administrativa preservado en español.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» por transparencia con el hebreo y coherencia con el estándar POB.
  - Se eligió «porteros» como equivalente natural y eclesiástico para הַשֹּׁעֲרִים.
  - «Cámaras» y «almacenes» reflejan dependencias y depósitos del templo sin restringir indebidamente el alcance semántico de los sustantivos hebreos.
