translation:
  language: es
  text: 'Yahvé dijo a Samuel: «Escucha la voz del pueblo[a] en todo lo que te digan, porque no te han rechazado a ti, sino que a mí me han rechazado[b] de ser rey sobre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «escucha al pueblo»; la expresión hebrea conserva la imagen de «voz» para indicar lo que el pueblo pide.
    reason: lexical_alternative
  - marker: b
    text: O, «de reinar sobre ellos»; el hebreo también permite esta formulación, pero aquí se conserva el énfasis en la realeza personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrámaton, siguiendo el principio POB de no sustituirlo por un título. «Yahvé» es la forma española estable para este proyecto y preserva la referencia personal del nombre revelado.
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Presta atención
  lexicon: HALOT
  rationale: El imperativo pide atender a lo que dice el pueblo. «Escucha» es natural en español y conserva mejor el tono de atención/obediencia implícita que un calco más rígido.
- source_word: בְּקוֹל הָעָם
  english_pob_choice: to the voice of the people
  chosen_spanish: la voz del pueblo
  alternatives_spanish:
  - lo que dice el pueblo
  - la voz de la gente
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «voz» sin convertirla de forma innecesaria en una paráfrasis. En español, «escuchar la voz del pueblo» es comprensible y retiene el matiz idiomático del original.
- source_word: לְכֹל אֲשֶׁר יֹאמְרוּ אֵלֶיךָ
  english_pob_choice: in all that they say to you
  chosen_spanish: en todo lo que te digan
  alternatives_spanish:
  - en todo cuanto te digan
  - según todo lo que te digan
  lexicon: HALOT
  rationale: La frase amplía el mandato de escuchar de manera exhaustiva. «En todo lo que te digan» sigue de cerca la estructura del hebreo y suena idiomática en español contemporáneo.
- source_word: מָאַס
  english_pob_choice: rejected
  chosen_spanish: rechazado
  alternatives_spanish:
  - despreciado
  - desdeñado
  - rechazado de
  lexicon: HALOT
  rationale: «Rechazado» reproduce bien el valor de מָאַס como rechazo/repudio y evita endurecer indebidamente el verbo hacia «despreciar», aunque el trasfondo relacional y de pacto sigue presente.
- source_word: כִּי לֹא אֹתְךָ מָאָסוּ כִּי אֹתִי מָאֲסוּ
  english_pob_choice: for they have not rejected you, but they have rejected me
  chosen_spanish: porque no te han rechazado a ti, sino que a mí me han rechazado
  alternatives_spanish:
  - porque no te rechazaron a ti, sino a mí me rechazaron
  - pues no a ti han rechazado, sino a mí
  lexicon: HALOT
  rationale: Se explicita el contraste con «sino que» para reflejar la oposición del hebreo y mantener la fuerza retórica. La duplicación del verbo se conserva con un segundo «rechazado» para no debilitar el paralelismo.
- source_word: מִמְּלֹךְ עֲלֵיהֶם
  english_pob_choice: from being king over them
  chosen_spanish: de ser rey sobre ellos
  alternatives_spanish:
  - de reinar sobre ellos
  - de ser su rey
  lexicon: HALOT
  rationale: La construcción infinitiva con מִן expresa la idea de apartar a Dios de ejercer la realeza sobre el pueblo. «De ser rey sobre ellos» preserva el énfasis personal de la realeza, coherente con la revisión inglesa más reciente que privilegia «being king».
theological_decisions:
- issue: La negativa del pueblo como rechazo de la realeza divina
  english_pob_reading: The people's request is a rejection of Yahweh's kingship over them.
  chosen_spanish_reading: La petición del pueblo se presenta como rechazo de la realeza de Yahvé sobre ellos.
  alternative_spanish_readings:
  - El rechazo es solo de Samuel, no de Yahvé directamente
  - La frase solo indica descontento político
  rationale: El hebreo contrapone explícitamente a Samuel con Yahvé y atribuye a Dios el rechazo final. La traducción mantiene esa carga teológica sin añadir explicación doctrinal extra.
  doctrine_reference: '1 Sam 8:7; Translation philosophy #3'
- issue: Tensión entre rechazo personal y rechazo del gobierno divino
  english_pob_reading: they have not rejected you, but they have rejected me
  chosen_spanish_reading: no te han rechazado a ti, sino que a mí me han rechazado
  alternative_spanish_readings:
  - no te han despreciado a ti, sino a mí
  - no te han rechazado a ti; me han rechazado a mí
  rationale: Se conserva la tensión entre el rechazo de la persona de Samuel y el rechazo más profundo de Dios como rey. No se suaviza el contraste para que siga audible la implicación teológica del texto.
  doctrine_reference: 1 Sam 8:7; soberanía divina
- issue: Realeza expresada como función personal
  english_pob_reading: from being king over them
  chosen_spanish_reading: de ser rey sobre ellos
  alternative_spanish_readings:
  - de reinar sobre ellos
  - de ejercer como rey sobre ellos
  rationale: Se prefirió una formulación personal («ser rey») porque el propio audit trail inglés revisó la frase para conservar el énfasis en la realeza personal. En español, esto evita diluir el matiz en una noción solo abstracta de gobierno.
  doctrine_reference: monarquía de Yahvé; 1 Sam 8:7
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que ajustó el cierre de «from reigning over them» a «from being king over them» para reflejar con más precisión el infinitivo hebreo con מִן y su matiz de realeza personal. También se preservó el contraste retórico y teológico entre el rechazo de Samuel y el rechazo de Yahvé. No se incorporaron calcos innecesarios del inglés cuando el español exigía una formulación más natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se mantuvo «rechazado» para מָאַס en ambos miembros del contraste, siguiendo la repetición del hebreo.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al texto ni a la terminología del proyecto en este caso.
  - «De ser rey sobre ellos» preserva el matiz de realeza personal más que una mera noción abstracta de gobierno.
