translation:
  language: es
  text: 'Entonces Yahvé[a] dijo a Moisés: «Ve, sube de aquí, tú y el pueblo que hiciste subir de la tierra de Egipto, a la tierra que juré a Abraham, a Isaac y a Jacob, diciendo[b]: “Se la daré a tu descendencia”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente «el SEÑOR». En este proyecto se vierte como «Yahvé» para preservar el Nombre divino.'
    reason: alternative_reading
  - marker: b
    text: O «a tu simiente». El hebreo usa un singular colectivo que puede significar descendencia o posteridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto fuente usa el Nombre divino, no un título; por eso se traslada con un nombre propio reverente. En español, el equivalente establecido en este proyecto es «Yahvé», manteniendo el valor de nombre de pacto sin reemplazarlo por una sustitución litúrgica.
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... habló
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; en español «Entonces ... dijo» es natural y conserva la transición. «Dijo» comunica de manera directa la introducción de discurso.
- source_word: לֵךְ עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve, sube
  - Sube de aquí
  lexicon: HALOT
  rationale: Los dos imperativos forman una orden enfática. En español, «Sube» transmite de forma natural la idea de ascender y salir del lugar; el complemento «de aquí» expresa מִזֶּה sin cargar la frase.
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - de este lugar
  - desde aquí
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más clara para el deíctico hebreo. «De aquí» conserva la referencia espacial inmediata sin sobreexplicar.
- source_word: אַתָּה וְהָעָם
  english_pob_choice: you and the people
  chosen_spanish: tú y el pueblo
  alternatives_spanish:
  - tú y el pueblo aquel
  - tú y esta gente
  lexicon: HALOT
  rationale: El hebreo tiene artículo con «pueblo», no demostrativo; por eso se mantiene el referente genérico en español. «Pueblo» es más fiel y solemne que «gente» en este contexto.
- source_word: אֲשֶׁר הֶעֱלִיתָ
  english_pob_choice: whom you brought up
  chosen_spanish: que sacaste
  alternatives_spanish:
  - que subiste
  - que hiciste subir
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es ‘hacer subir / traer arriba’, en el contexto del éxodo la idea resultante es ‘sacar’. En español, «que sacaste» comunica con claridad la acción realizada sobre el pueblo, sin perder el movimiento de salida del Egipto.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: «Tierra» suena natural y digno en español bíblico y conserva el alcance territorial del hebreo. Se evita la reducción a «Egipto» para no perder el matiz de país/territorio.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - hacia la tierra
  - a esa tierra
  lexicon: HALOT
  rationale: La preposición direccional se rinde de forma simple. «La tierra» mantiene el referente de la tierra prometida sin añadir demostrativos no presentes.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - hice juramento
  - me comprometí con juramento
  lexicon: HALOT
  rationale: Es la forma más directa y solemne para el acto de jurar en español. Conserva el valor pactal del verbo sin amplificación innecesaria.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  - a Abraham, a Isaac, y a Jacob
  lexicon: HALOT
  rationale: La repetición de la preposición se mantiene en español por claridad y para preservar el cadencioso formulario del juramento. Los nombres propios se conservan en su forma estándar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Introduce correctamente el contenido citado del juramento. «Diciendo» respeta la función subordinante del hebreo sin recargar la sintaxis.
- source_word: לְזַרְעֲךָ
  english_pob_choice: to your offspring
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu simiente
  - a tus descendientes
  lexicon: HALOT
  rationale: «Descendencia» preserva el sentido colectivo singular del término hebreo y es natural en español bíblico. Se evita «simiente» por ser menos transparente para el lector moderno.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: I will give it
  chosen_spanish: se la daré
  alternatives_spanish:
  - la daré
  - se la entregaré
  lexicon: HALOT
  rationale: El hebreo retoma «la tierra» como objeto femenino. En español, «se la daré» conserva el objeto directo femenino y la referencia indirecta a la descendencia sin sonar forzado.
theological_decisions:
- issue: Nombre divino יהוה en un discurso directo de Yahvé
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El original presenta el Tetragrama de forma explícita. La traducción en español conserva el nombre propio en vez de una sustitución por título, para mantener la transparencia del texto fuente y el valor de pacto del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre הֶעֱלִיתָ y el contexto del éxodo
  english_pob_reading: whom you brought up
  chosen_spanish_reading: que sacaste
  alternative_spanish_readings:
  - que subiste
  - que hiciste subir
  rationale: Aunque el hebreo conserva el verbo de ‘subir’, el contexto histórico-teológico del éxodo en español se expresa con más naturalidad como ‘sacar’. Esta elección no borra el movimiento ascendente implícito, pero sí prioriza la inteligibilidad del acto salvífico en el español bíblico.
  doctrine_reference: Ex 33:1; conexión narrativa con el éxodo
- issue: Forma de la promesa sobre לְזַרְעֲךָ
  english_pob_reading: to your offspring
  chosen_spanish_reading: a tu descendencia
  alternative_spanish_readings:
  - a tu simiente
  - a tus descendientes
  rationale: El singular colectivo del hebreo merece un equivalente que pueda abarcar posteridad como conjunto. «Descendencia» conserva esa amplitud sin introducir una metáfora extraña al español contemporáneo.
  doctrine_reference: Gén 12:7; 15:18; 26:3; 28:13
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; se conserva la estructura básica del versículo y se ajustan los puntos sensibles al español (Nombre divino, verbo del éxodo y singular colectivo de זרע) sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se preserva la fórmula de juramento con repetición de preposiciones en la lista de patriarcas.
  - «Descendencia» se usa para el singular colectivo de זרע, coherente con el proyecto.
  - La cita directa conserva puntuación española y cierre de comillas angulares.
  - «Tierra de Egipto» se mantiene uniforme con la terminología bíblica del proyecto.
