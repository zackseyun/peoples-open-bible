    issue: «se extenderá» para תִּסְרַח
    rationale: El hebreo y la auditoría inglesa apuntan a la idea concreta de colgar o caer sobre la parte posterior; «se extenderá» sugiere más bien despliegue o extensión, y reduce la imagen espacial del sobrante colgando.
  - severity: low
    issue: Registro algo técnico de «excedente»
    rationale: «Excedente» es fiel y aceptable, pero suena más administrativo que espacial. Aun así, no requiere cambio obligatorio porque el POB inglés revisado optó por «excess» y la nota ya ofrece «sobrante» como alternativa.
  - severity: low
