    issue: La frase «que juró a ellos» es poco natural en español.
    rationale: 'Aunque intenta reflejar literalmente לָהֶם, el español idiomático requiere pronombre dativo enclítico o proclítico: «que les juró». Esto preserva el mismo sentido con mejor legibilidad y dignidad.'
  - severity: medium
