review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: prohibición de llevar a la casa de Yahvé tanto el pago de una prostituta como el precio de un perro, en relación con cualquier voto, porque ambos son abominación. Conserva correctamente «Yahvé» y mantiene «perro» en el texto principal con nota alternativa. Sin embargo, hay dos problemas de fidelidad formal: la nota está anclada al sintagma equivocado, y «para ningún voto» suena menos directo que el hebreo לְכָל נֶדֶר y puede percibirse como giro negativo español más interpretativo que «por/para cualquier voto».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para naturalidad y precisión. «La paga de una prostituta» es comprensible, aunque «el salario» o «la paga» son posibles; no es necesario cambiarlo. En cambio, la nota al pie debe ir en «perro», no en «prostituta», porque la alternativa interpretativa afecta כֶּלֶב. Además, la redacción de la nota tiene un leve tropiezo idiomático en «prostituto varón culto»; debe decir «prostituto de culto» o equivalente.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; תוֹעֲבָה -> «abominación» correctamente; כֶּלֶב se conserva literalmente como «perro» en el texto principal, con alternativa en nota, conforme al audit trail. No hay conflicto doctrinal nuevo.'
  issues:
  - severity: high
    issue: La nota al pie [a] está colocada sobre «prostituta» en vez de sobre «perro».
    rationale: La alternativa documentada en el audit trail se refiere a כֶּלֶב («dog») entendido posiblemente como término despectivo para un prostituto de culto masculino. Anclarla a «prostituta» induce una interpretación errónea y no preserva fielmente la justificación lexical.
  - severity: medium
    issue: La nota usa la expresión poco natural «prostituto varón culto».
    rationale: En español neutral y eclesialmente legible, la idea es «prostituto de culto» o «prostituto masculino de culto». La redacción actual suena gramaticalmente defectuosa y puede confundir.
  - severity: low
    issue: «Para ningún voto» es menos natural que «por cualquier voto» o «para cualquier voto».
    rationale: Aunque comunica prohibición total en contexto, el hebreo לְכָל נֶדֶר corresponde más directamente a «por/para cualquier voto». La forma negativa española puede sentirse más interpretativa de lo necesario.
  revised_spanish_text: No llevarás a la casa de Yahvé tu Dios la paga de una prostituta ni el precio de un perro[a], por cualquier voto, porque ambos son una abominación para Yahvé tu Dios.
