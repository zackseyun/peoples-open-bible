  rationale: 헬라어 πάντων ὑμῶν μᾶλλον γλώσσαις λαλῶ는 비교 대상이 「여러분 모두」이므로, 바울이 그들 모두를 합한 것보다 더 많이 방언으로 말한다는 강한 진술이다. 14장의 예언 우선 논증은 방언 자체를 폄하하지 않음을 분명히 한다.
