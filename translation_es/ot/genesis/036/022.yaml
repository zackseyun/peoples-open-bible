review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura genealógica del hebreo: los hijos de Lotán son Hori y Hemam, y su hermana es Timna. Sin embargo, altera indebidamente el nombre הֵימָם al poner «Hemán», lo cual no preserva fielmente la forma del texto fuente ni la decisión léxica auditada. Además, la nota [b] fue mal aplicada: en el POB inglés la alternativa léxica corresponde a «Timna/Timnah», no a «Hemam».'
  spanish_quality_summary: El español es claro y natural, con buena sintaxis genealógica. «Los hijos de Lotán fueron...» y «la hermana de Lotán fue...» son formulaciones legibles y dignas. No obstante, la combinación de notas [b][a] sobre «Hemán» resulta confusa, y el contenido de [b] contradice el anclaje textual. Corregido eso, el verso queda plenamente idiomático.
  glossary_alignment: 'No hay términos teológicos clave en disputa aquí. La transliteración de nombres propios sí importa: «Lotán» y «Timna» son aceptables en español; «Hori» también. Pero «Hemán» no sigue la forma hebrea documentada «Hemam», y no debe regularizarse sin base auditada. La nota sobre «Timna/Timnah» debe anclarse a «Timna», no al nombre de Hemam.'
  issues:
  - severity: high
    issue: El nombre הֵימָם fue traducido como «Hemán» en lugar de «Hemam».
    rationale: El texto fuente y la auditoría inglesa especifican «Hemam» como la forma que refleja este versículo; «Homam» pertenece a la variante de 1 Crónicas 1:39. «Hemán» introduce una forma distinta no sustentada por la evidencia presentada.
  - severity: high
    issue: La nota [b] está anclada al nombre equivocado y su contenido no corresponde.
    rationale: La nota inglesa [b] explica la alternativa ortográfica de «Timna/Timnah». En el borrador español, [b] aparece tras «Hemán» y además habla erróneamente de «Timna» dentro de una nota sobre «Hemam», creando confusión y desalineación con la auditoría.
  - severity: medium
    issue: La racionalización léxica de regularizar «Hemam» a «Hemán» no está justificada por la política del proyecto.
    rationale: La filosofía del POB para nombres propios aquí es transliterar con fidelidad razonable, no adaptar libremente para una supuesta pronunciación más natural cuando eso cambia la forma reconocible del nombre.
  revised_spanish_text: Los hijos de Lotán fueron Hori y Hemam[a], y la hermana de Lotán fue Timna[b].
