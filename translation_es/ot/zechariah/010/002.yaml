review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB en casi todos los segmentos: terafim/ídolos domésticos, adivinos, mentiras, sueños vacíos, consuelo vano, consecuencia causal y ausencia de pastor. La nota léxica sobre תְּרָפִים también preserva la alternativa del POB. El único problema significativo es la frase ''andan errantes como ovejas'', que suena algo redundante y menos natural en español; una formulación más directa como ''andan como ovejas'' o ''vagan como ovejas'' preserva mejor la imagen de movimiento desorientado.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. 'Hablan maldad', 'ven mentiras' y 'dan consuelo vano' son fieles y comprensibles. La principal mejora es de naturalidad idiomática en 'andan errantes como ovejas', donde el participio duplica el sentido del verbo. El resto del versículo es plenamente legible.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. 'Ídolos domésticos' concuerda con la decisión documentada para הַתְּרָפִים, con 'terafines' conservado correctamente en nota. 'Adivinos', 'pastor' y 'afligidos' están alineados con el expediente inglés.
  issues:
  - severity: medium
    issue: La expresión 'andan errantes como ovejas' es poco natural y semánticamente redundante.
    rationale: נָסְעוּ כְמוֹ צֹאן describe deambular/moverse como ovejas sin guía. En español, 'andar errante' duplica la idea y suena forzado. 'Vagan como ovejas' o 'andan como ovejas' transmite mejor la imagen pastoral y mantiene la fidelidad.
  revised_spanish_text: Porque los ídolos domésticos[a] hablan maldad, y los adivinos ven mentiras; hablan sueños vacíos y dan consuelo vano. Por eso vagan como ovejas[b]; están afligidos, porque no hay pastor.
  revised_footnotes:
  - marker: a
    text: O “terafines”, término hebreo para objetos cultuales domésticos o ídolos.
    reason: lexical_alternative
  - marker: b
    text: O “son oprimidos” para “están afligidos”.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de estilo y naturalidad: ''andan errantes como ovejas'' se cambió a ''vagan como ovejas'', que suena más idiomático en español y refleja mejor el sentido contextual de נָסְעוּ כְמוֹ צֹאן sin alterar el significado. No se requieren otros cambios.'
