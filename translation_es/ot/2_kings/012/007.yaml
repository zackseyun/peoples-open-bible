  to: Y sucedió que, en el año veintitrés del rey Joás, los sacerdotes no habían reparado los daños[a] de la casa.
  rationale: Se restauró la función narrativa de וַיְהִי con 'Y sucedió que' y se reemplazó 'el daño de la casa' por 'los daños de la casa', una expresión más natural en español y más adecuada para el sentido de בדק הבית como deterioros o brechas que requerían reparación. También se eliminó 'aún' por no ser necesario para reflejar el hebreo.
