revisions:
- from: Venid[a], mirad las obras de Yahvé[b], que ha hecho desolaciones en la tierra.
  to: Vengan, vean las obras de Yahvé, que ha hecho desolaciones en la tierra[a].
  rationale: Se ajusta el imperativo al español neutral latinoamericano ('Vengan, vean') sin perder la fuerza invitacional del hebreo, y se reemplaza la nota innecesaria sobre 'Yahvé/Yahveh' por la nota lexical relevante sobre אֶרֶץ, en línea con el audit trail inglés. El resto del verso se mantiene por ser fiel al sentido fuente y a la terminología del proyecto.
