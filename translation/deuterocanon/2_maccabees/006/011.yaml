theological_decisions:
- issue: Meaning of τὴν ἑβδομάδα in this persecution context
  chosen_reading: the week
  alternative_readings:
  - the Sabbath
  - the sabbatical observance
  rationale: The Greek text reads 'the week,' not the more explicit σάββατον. Since the source wording should govern, the main text keeps 'week,' but the likely reference to Sabbath observance is preserved in a footnote because the narrative context concerns refusal to fight on the sacred day.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Interpretation of the victims' refusal to act
  chosen_reading: they scrupled to defend themselves out of reverence for the sacred day
  alternative_readings:
  - they refused to help one another
  - they refrained from any action because of piety
  rationale: The reflexive sense of βοηθῆσαι αὐτοῖς most naturally means helping themselves, i.e., defending themselves. This fits the immediate historical context without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §3
