id: PHP.3.21
reference: Philippians 3:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς μετασχηματίσει τὸ σῶμα τῆς ταπεινώσεως ⸀ἡμῶν σύμμορφον τῷ σώματι τῆς δόξης αὐτοῦ κατὰ τὴν ἐνέργειαν τοῦ δύνασθαι αὐτὸν καὶ ὑποτάξαι ⸀αὑτῷ τὰ πάντα.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/021.yaml
  text: who will transform our lowly body to be like the body of his glory[c][b][a], by the power that enables him even to subject all things to himself.
  footnotes:
  - marker: a
    text: Literally, 'the body of our humiliation.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the body of his glory.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to the working by which he is able.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그분께서 우리의 낮은 몸[a]을 자기 영광의 몸[b]과 같은 형체로 변화시키실 것입니다. 그것은 그분이 만물을 자기에게 복종시키실 수 있는 능력을 따라 이루어집니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「우리의 낮아짐의 몸」. 부활 이전의 비천한 신체 상태를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「그분의 영광의 몸」. 부활하신 메시아의 영광스러운 신체를 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그분이 능히 행하실 수 있게 하는 그 역사를 따라」. 헬라어 ἐνέργεια는 실효적·역동적 능력의 작용을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετασχηματίσει
  english_pob_choice: will transform
  chosen_korean: 변화시키실 것입니다
  alternatives_korean:
  - 바꾸실 것입니다
  - 새 모습으로 만드실 것입니다
  lexicon: BDAG
  rationale: 미래 능동형으로 실제적 형체의 변화를 가리킨다. 「변화시키다」가 자연스럽고 종말론적 행위의 무게를 담는다.
- source_word: τὸ σῶμα τῆς ταπεινώσεως ἡμῶν
  english_pob_choice: our lowly body
  chosen_korean: 우리의 낮은 몸
  alternatives_korean:
  - 우리의 낮아짐의 몸
  - 비천한 우리 몸
  lexicon: BDAG
  rationale: 직역의 「낮아짐의 몸」보다 「낮은 몸」이 한국어로 자연스러우면서도 비천한 현재 신체 상태의 함의를 잘 담는다. 더 문자적인 형태는 각주에 둔다.
- source_word: σύμμορφον
  english_pob_choice: to be like
  chosen_korean: 같은 형체로
  alternatives_korean:
  - ~과 같은 모양으로
  - ~에 본받은 모습으로
  lexicon: BDAG
  rationale: σύμμορφον은 「동일한 형체를 가진」을 뜻한다. 「같은 형체로」가 강한 형태적 일치 함의를 보존한다. 영어 POB의 「to be like」는 다소 약하므로, 본 한국어 번역은 형체적 일치 어휘 「형체」를 명시한다.
- source_word: τῷ σώματι τῆς δόξης αὐτοῦ
  english_pob_choice: the body of his glory
  chosen_korean: 자기 영광의 몸
  alternatives_korean:
  - 그분의 영광스러운 몸
  - 그분의 영광에 속한 몸
  lexicon: BDAG
  rationale: 속격 구문의 직역적 형태를 보존하여, 「영광」과 「몸」의 신학적 결속을 살린다. 「영광스러운 몸」으로 풀면 명사 구조가 약화된다. 주어가 같으므로 「자기」를 사용한다.
- source_word: κατὰ τὴν ἐνέργειαν
  english_pob_choice: by the power
  chosen_korean: 능력을 따라
  alternatives_korean:
  - 역사를 따라
  - 능동적 작용을 따라
  - 작용에 따라
  lexicon: BDAG
  rationale: κατά + 대격은 「~을 따라/~에 의거하여」. 「능력을 따라」가 자연스러우며 ἐνέργεια의 실효적 작용 함의를 담는다.
- source_word: τοῦ δύνασθαι αὐτὸν
  english_pob_choice: that enables him
  chosen_korean: 그분이 ~ 하실 수 있는
  alternatives_korean:
  - 그분이 ~ 할 수 있는
  - 그분에게 능력이 있는
  lexicon: BDAG
  rationale: 부정사 구문이 능력의 내용을 설명한다. 「그분이 ~ 하실 수 있는」으로 합쇼체 존대와 능력의 함의를 자연스럽게 결합한다.
- source_word: ὑποτάξαι ἑαυτῷ τὰ πάντα
  english_pob_choice: to subject all things to himself
  chosen_korean: 만물을 자기에게 복종시키실
  alternatives_korean:
  - 모든 것을 자기 권세 아래 두실
  - 만물을 자기에게 종속시키실
  lexicon: BDAG
  rationale: 「복종시키다」가 ὑποτάσσω의 표준 한국어 등가어이며 한국 성서 전통과도 일치. 「만물(τὰ πάντα)」의 포괄적 범위를 「모든 것」 대신 「만물」로 살린다.
theological_decisions:
- issue: 현재의 비천한 신체 상태와 미래의 영광스러운 변화의 관계
  chosen_reading: 본 절은 현재의 낮은 신체 상태가 메시아의 영광스러운 몸과 같은 형체로 미래에 변화되는 것을 묘사한다. 본문은 부활의 메커니즘에 대해 헬라어가 진술하는 이상을 더하지 않는다.
  alternative_readings:
  - 부활 용어를 더 명시적으로 부각하는 해석적 번역도 가능하다.
  rationale: 헬라어는 신체의 변화와 영광의 몸과의 일치를 분명히 말하지만, 그 메커니즘을 본 절에서 더 풀지 않는다. 본 번역은 신학적 무게를 보존하되, 본문에 없는 교리적 표현을 도입하지 않는다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
