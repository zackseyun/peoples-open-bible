translation:
  language: es
  text: 'Llama ahora: ¿acaso hay quien te responda? ¿Y a cuál de los seres santos[a] te dirigirás?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos» o «los seres celestiales». El hebreo «seres santos» probablemente se refiere aquí a seres celestiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  english_pob_choice: Call
  chosen_spanish: Clama
  alternatives_spanish:
  - Llama
  - Grita
  - Clama en voz alta
  lexicon: HALOT
  rationale: El imperativo pide una exhortación desafiante de Elifaz. «Clama» conserva la fuerza exhortativa sin sonar mecánico; «llama» sería más neutro, y «grita» intensifica más de lo que el hebreo exige.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - pues
  - ya
  lexicon: HALOT
  rationale: La partícula aporta urgencia en este contexto de desafío. «Ahora» reproduce bien esa inmediatez en español y evita el matiz de cortesía de «por favor».
- source_word: הֲיֵשׁ
  english_pob_choice: is there
  chosen_spanish: ¿acaso hay
  alternatives_spanish:
  - ¿hay
  - ¿existe
  lexicon: HALOT
  rationale: La interrogación hebrea es retórica. «¿Acaso hay?» preserva mejor el tono desafiante que un simple «¿hay?», sin añadir más de lo necesario.
- source_word: עוֹנֶךָ
  english_pob_choice: who will answer you
  chosen_spanish: quien te responda
  alternatives_spanish:
  - quien te conteste
  - el que te responda
  - uno que te responda
  lexicon: HALOT
  rationale: 'La forma funciona sustantivamente: «uno que responde/contestará». En español, «quien te responda» mantiene la relación verbal y la fuerza del reto retórico.'
- source_word: וְאֶל־מִי
  english_pob_choice: And to which
  chosen_spanish: ¿Y a cuál
  alternatives_spanish:
  - ¿Y a quién
  - ¿Y a cuál de
  lexicon: HALOT
  rationale: El hebreo introduce una segunda pregunta. «¿Y a cuál…?» conserva el paralelismo con la primera y el valor selectivo del interrogativo.
- source_word: מִקְּדֹשִׁים
  english_pob_choice: of the holy ones
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos seres
  - de los seres santos
  - de los seres celestiales
  lexicon: HALOT
  rationale: El término hebreo puede referirse a seres celestiales santos; en español, «santos» es la opción más breve y natural, pero puede sugerir «santos» humanos. Se deja la aclaración en nota para preservar la ambigüedad interpretativa documentada por el POB inglés.
- source_word: תִּפְנֶה
  english_pob_choice: will you turn
  chosen_spanish: te volverás
  alternatives_spanish:
  - te dirigirás
  - apelarás
  - volverás tu mirada
  lexicon: HALOT
  rationale: «Volverse» conserva la metáfora de פנָה (‘girar/dirigirse hacia’) y encaja con la pregunta sobre a quién acudirías. «Dirigirte» sería más explícito pero menos imagístico.
theological_decisions:
- issue: Identidad de los «santos» / «holy ones»
  english_pob_reading: heavenly holy ones/angelic beings left untranslated as 'holy ones'
  chosen_spanish_reading: seres celestiales santos dejados en el texto como «los santos» con nota explicativa
  alternative_spanish_readings:
  - los ángeles
  - los santos humanos
  - los seres santos
  rationale: En Job el contexto favorece seres celestiales, no cristianos ni fallecidos humanos. Para no importar asociaciones doctrinales posteriores, el texto principal mantiene una forma breve y literal, y la nota aclara la lectura probable.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del control cruzado y no incorpora cambios respecto al estado revisado más reciente; mantiene la solución del inglés POB para מִקְּדֹשִׁים y la traslada al español con una nota aclaratoria.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponde al tetragrámaton; este versículo no lo contiene.
  - Se prefirió el registro bíblico moderno «Clama ahora» para respetar el tono desafiante y evitar un calco rígido.
  - La nota sobre «los santos» preserva la ambigüedad entre seres celestiales y otras posibles lecturas, sin resolverla de manera excesiva.
