translation:
  language: es
  text: Y cuando todos se habían maravillado de su firme valor, los guardias llevaron al segundo en edad después del primero[a], y, después de ajustar unas garras de hierro sobre sus manos[b], lo ataron a los instrumentos y a la catapulta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el siguiente mayor después del primero». El griego identifica al hermano por orden de edad.
    reason: lexical_alternative
  - marker: b
    text: La expresión parece referirse a un dispositivo de tortura con proyecciones semejantes a garras o uñas aplicado a las manos, más que a «manos de hierro» en sentido literal.
    reason: cultural_note
  - marker: c
    text: O «el torno» o «el potro»; el griego dice literalmente «catapulta».
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμασάντων
  english_pob_choice: had marveled
  chosen_spanish: se habían maravillado
  alternatives_spanish:
  - se asombraron
  - habían quedado maravillados
  lexicon: LSJ
  rationale: El participio genitivo absoluto exige una acción anterior a la principal. «Se habían maravillado» conserva esa anterioridad y el matiz de admiración ya consumada.
- source_word: καρτεροψυχίαν
  english_pob_choice: steadfast courage
  chosen_spanish: firme valor
  alternatives_spanish:
  - fortaleza de ánimo
  - valor constante
  - fortaleza
  lexicon: LSJ
  rationale: El compuesto apunta a firmeza del alma/ánimo en la prueba. «Firme valor» comunica resolución interior y valentía sin sonar artificial en español.
- source_word: δορυφόροι
  english_pob_choice: guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los escoltas
  - los guardias armados
  - los lanceros
  lexicon: LSJ
  rationale: Aunque literalmente es «portadores de lanza», en la escena funcionan como custodios o ejecutores. «Guardias» preserva la función narrativa sin forzar una imagen militar específica.
- source_word: τὸν καθʼ ἡλικίαν τοῦ προτέρου δεύτερον
  english_pob_choice: the second after the first in age
  chosen_spanish: el segundo en edad después del primero
  alternatives_spanish:
  - el siguiente mayor después del primero
  - el segundo después del primero en edad
  - el próximo de mayor edad tras el primero
  lexicon: LSJ
  rationale: La frase identifica al hermano por orden de edad. La versión española mantiene la relación ordinal y la referencia al primer hermano sin añadir precisión no explicitada.
- source_word: σιδηρᾶς ... χεῖρας
  english_pob_choice: iron claws onto his hands
  chosen_spanish: garras de hierro sobre sus manos
  alternatives_spanish:
  - manos de hierro sobre sus manos
  - garras de hierro en sus manos
  - unos hierros con garras sobre sus manos
  lexicon: LSJ
  rationale: La revisión inglesa aclaró que el sentido es un aparato de tortura con proyecciones tipo garra aplicado a las manos. «Garras de hierro» conserva la imagen extraña del griego y la hace comprensible en español.
- source_word: ὀξέσι τοῖς ὄνυξιν
  english_pob_choice: with sharp claws
  chosen_spanish: garras de hierro
  alternatives_spanish:
  - uñas agudas
  - uñas afiladas
  - clavos agudos
  lexicon: LSJ
  rationale: ὄνυξ puede ser uña, garra o talón. En este contexto de tormento, la imagen de garras/agudos apéndices es más natural que «uñas» en español y evita una suavización indebida.
- source_word: ὀργάνοις
  english_pob_choice: the instruments
  chosen_spanish: los instrumentos
  alternatives_spanish:
  - los implementos
  - los aparatos
  - los utensilios
  lexicon: LSJ
  rationale: El término es genérico y el contexto ya lo restringe a instrumentos de tortura. «Los instrumentos» es suficientemente literal y sobrio.
- source_word: καταπέλτῃ
  english_pob_choice: the catapult
  chosen_spanish: la catapulta
  alternatives_spanish:
  - el torno
  - el potro
  - el aparato
  lexicon: LSJ
  rationale: El griego dice literalmente «catapulta». Aunque en contexto martirial puede designar un artefacto de tortura, la traducción principal mantiene el término histórico-documental y no lo reemplaza por una paráfrasis más interpretativa.
- source_word: προσεδήσαν
  english_pob_choice: they bound him
  chosen_spanish: lo ataron
  alternatives_spanish:
  - lo sujetaron
  - lo aseguraron
  - lo amarraron
  lexicon: LSJ
  rationale: El verbo significa atar o sujetar a algo. «Lo ataron» es directo e idiomático en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que corrigió una formulación anterior demasiado oscura sobre «iron hands» para aclarar que el griego apunta a garras/implementos de hierro aplicados sobre las manos. La traducción española adopta esa aclaración sin perder la literalidad básica ni eliminar la ambigüedad documentada de καταπέλτῃ.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» como norma general del proyecto, pero este versículo no contiene teónimos.
  - Se evita «Cristo» porque el texto no lo requiere.
  - Se conserva la secuencia narrativa con participio anterior mediante pretérito pluscuamperfecto.
  - «Catapulta» se conserva como término literal con nota, siguiendo la tensión lexical documentada en el audit trail.
