revisions:
- from: Azufre y sal[a], un ardiente desolamiento, son toda su tierra; no se siembra, no germina, y no sube en ella ninguna hierba, como la subversión de Sodoma y Gomorra, de Admá y de Zeboím, que Yahvé subvirtió en su ira y en su furor.
  to: Azufre y sal[a], una desolación ardiente, son toda su tierra; no se siembra, no brota, y no crece en ella ninguna hierba, como la destrucción de Sodoma y Gomorra, Admá y Zeboím, que Yahvé destruyó en su ira y en su furor.
  rationale: 'Se corrigen tres problemas principales: (1) se reemplaza ''subversión / subvirtió'' por ''destrucción / destruyó'' para evitar un sentido falso en español, aunque se pierda la raíz cognada exacta; aquí la fidelidad semántica debe primar. (2) se mejora la naturalidad de שְׂרֵפָה con ''una desolación ardiente'', más comprensible que ''un ardiente desolamiento''. (3) se sustituye el calco ''no sube en ella'' por ''no crece en ella'', español natural y fiel al resultado descrito. También se limpia la enumeración de ciudades y se adapta la nota al pie al lector en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: la tierra queda caracterizada por azufre, sal y combustión; se conserva la triple negación de infertilidad; se mantienen los nombres de las ciudades y el nombre divino Yahvé. Sin embargo, varias elecciones léxicas no preservan con fidelidad el sentido natural ni el registro del original/POB: ''ardiente desolamiento'', ''sube en ella'', y especialmente ''subversión / subvirtió'' introducen sentidos poco naturales o erróneos en español para הפך/מַהְפֵּכָה.'
  spanish_quality_summary: La redacción actual suena forzada en varios puntos y reduce la legibilidad eclesial amplia. 'Un ardiente desolamiento' no es español natural; 'no sube en ella ninguna hierba' es un calco innecesario; 'subversión / subvirtió' en español moderno sugiere rebelión política o ideológica, no destrucción catastrófica. Conviene una reparación menor pero clara para lograr español natural y digno sin perder la repetición léxica importante.
  glossary_alignment: Alinea correctamente Yahvé para יְהוָה y azufre para גפרית. No hay conflicto con términos doctrinales mayores. La principal desalineación está en intentar conservar la raíz cognada הפך con 'subversión / subvirtió', solución que no funciona en español; es mejor priorizar fidelidad semántica y claridad con 'destrucción / destruyó' o 'catástrofe / destruyó'.
  issues:
  - severity: high
    issue: '''subversión / subvirtió'' para מַהְפֵּכַת / הָפַךְ'
    rationale: En español, 'subversión' normalmente significa agitación o trastorno del orden político/social, no una devastación judicial como la de Sodoma. 'Subvirtió' tampoco comunica de forma natural 'derribó/destruyó/volcó'. Esto distorsiona el sentido central del pasaje.
  - severity: medium
    issue: '''un ardiente desolamiento'' para שְׂרֵפָה'
    rationale: La frase resulta poco idiomática y abstracta. El hebreo describe una condición de quemazón/devastación. 'Una tierra quemada' o 'un desierto abrasado' serían interpretaciones más libres; para un ajuste mínimo, 'una desolación ardiente' sigue siendo mejor español que la forma actual.
  - severity: medium
    issue: '''no sube en ella ninguna hierba'''
    rationale: Es un calco del verbo hebreo que suena antinatural en español bíblico contemporáneo. 'No crece' o 'no brota' comunica fielmente la imagen sin pérdida de sentido.
  - severity: low
    issue: Nota al pie conserva 'brimstone' en inglés
    rationale: La nota debe ofrecer alternativa en español. Mantener una palabra inglesa no ayuda al lector hispanohablante. Puede explicarse como 'azufre' frente a un equivalente tradicional inglés, o simplemente omitir la alternativa arcaizante no idiomática en español.
  revised_spanish_text: Azufre y sal[a], una desolación ardiente, son toda su tierra; no se siembra, no brota, y no crece en ella ninguna hierba, como la destrucción de Sodoma y Gomorra, Admá y Zeboím, que Yahvé destruyó en su ira y en su furor.
  revised_footnotes:
  - marker: a
    text: O 'azufre y sal, ardor de quemazón'. 'Azufre' es el equivalente moderno claro; el inglés tradicional usa a veces 'brimstone'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres problemas principales: (1) se reemplaza ''subversión / subvirtió'' por ''destrucción / destruyó'' para evitar un sentido falso en español, aunque se pierda la raíz cognada exacta; aquí la fidelidad semántica debe primar. (2) se mejora la naturalidad de שְׂרֵפָה con ''una desolación ardiente'', más comprensible que ''un ardiente desolamiento''. (3) se sustituye el calco ''no sube en ella'' por ''no crece en ella'', español natural y fiel al resultado descrito. También se limpia la enumeración de ciudades y se adapta la nota al pie al lector en español.'
