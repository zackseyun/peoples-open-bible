    text: 'Hebreo: Gashmu. Muchas versiones en inglés lo vierten como Geshem.'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia defectuosa, se mejora la naturalidad de la expresión de intención ('piensan rebelarse') para reflejar mejor חֹשְׁבִים לִמְרוֹד, y se eleva levemente el registro con 'llegarás a ser su rey'. También se ajusta 'Se ha informado' a 'Se informa' para una acusación rumorística más directa y fluida en español.
