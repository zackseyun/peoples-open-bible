id: ROM.14.23
reference: Romans 14:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ διακρινόμενος ἐὰν φάγῃ κατακέκριται, ὅτι οὐκ ἐκ πίστεως· πᾶν δὲ ὃ οὐκ ἐκ πίστεως ἁμαρτία ⸀ἐστίν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/023.yaml
  text: But the one who doubts is condemned if he eats, because it is not from faith; and everything that is not from faith is sin.
translation:
  language: ko
  text: 그러나 의심하는 자가 먹으면 정죄받습니다. 그것이 믿음에서 나오지 않기 때문입니다. 무엇이든 믿음에서 나오지 않는 것은 죄입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ διακρινόμενος
  english_pob_choice: the one who doubts
  chosen_korean: 의심하는 자
  alternatives_korean:
  - 망설이는 자
  - 갈팡질팡하는 자
  lexicon: BDAG
  rationale: 중간태로 마음의 둘로 나뉨. 「의심하는 자」가 정형.
- source_word: κατακέκριται
  english_pob_choice: is condemned
  chosen_korean: 정죄받다
  alternatives_korean:
  - 정죄되다
  lexicon: BDAG
  rationale: 완료 시제. 「정죄받다」가 정형이며 14:3의 「판단하다(κρίνω)」보다 강도가 분명.
- source_word: ἐκ πίστεως
  english_pob_choice: from faith
  chosen_korean: 믿음에서 나오다
  alternatives_korean:
  - 믿음으로부터
  - 믿음에 기인하다
  lexicon: BDAG
  rationale: ἐκ + 속격의 근원. 「믿음에서 나오다」가 자연스러움.
- source_word: ἁμαρτία ἐστίν
  english_pob_choice: is sin
  chosen_korean: 죄이다
  lexicon: BDAG
  rationale: 직역.
theological_decisions:
- issue: 본 구절의 진술 범위
  chosen_reading: 본문 자체의 일반화된 명제(「믿음에서 나오지 않는 모든 것은 죄」)를 그대로 보존한다
  alternative_readings:
  - 음식 문제에만 한정된 진술로 좁혀 해석
  - 칭의/구원론 일반 원리로 확장
  rationale: 본문은 음식 분쟁의 결론으로 진술하면서도 보편적 원리로 일반화한다. 한국어 번역도 둘 다 가능한 무게를 그대로 보존한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장을 보존하라'
