    reason: lexical_alternative
  revision_rationale: 'Se conserva la fórmula de bendición y la triple repetición de ''fruto'', pero se corrige la parte final para evitar dos reducciones injustificadas del hebreo: ''parto'' se reemplaza por ''crías'', y ''vacas/ovejas'' por colectivos que reflejan mejor el sentido de ganado mayor y rebaños. La nota se mantiene y se pule ligeramente para sonar más natural en español.'
