translation:
  text: 'Jesus said[d][c][b][a], “Woe to the Pharisees! For they are like a dog lying
    on the manger of the cattle: it neither eats nor lets the cattle eat.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Manger” renders ⲡⲟⲩⲟⲙϥ, often glossed as “feeding-trough.” Either fits
      the image.
    reason: lexical_alternative
  - marker: b
    text: ⲉϩⲉ denotes domestic animals/cattle. Many translations choose “oxen,” but
      the Coptic is generic; hence “cattle.”
    reason: cultural_note
  - marker: c
    text: The codex line has damaged letters that can resemble ⲛⲛⲉϩⲟⲟⲩ (“days”), but
      Dilley’s normalization reads ⲛϩⲉⲛⲉϩⲉ (“of the cattle”), confirmed by the following
      ⲛⲡⲉϩⲉ (“the cattle”).
    reason: lacuna_or_restoration
  - marker: d
    text: 'ⲕⲱ with an infinitive has the sense “to allow/let”; with negation here:
      “it does not let the cattle eat.”'
    reason: dialect_note
lexical_decisions:
- source_word: ⲟⲩⲟⲓ
  chosen: Woe to
  alternatives:
  - Alas for
  lexicon: Crum
  rationale: Idiomatic interjection of denunciation; standard rendering preserves
    the condemnatory force and Thomas’s terseness.
- source_word: ⲉⲓⲛⲉ
  chosen: are like
  alternatives:
  - resemble
  - are similar to
  lexicon: Layton
  rationale: Stative/resumptive sense “to be like”; “are like” is concise and idiomatic
    English.
- source_word: ⲟⲩϩⲟⲣ
  chosen: dog
  alternatives:
  - hound
  lexicon: Crum
  rationale: Basic lexeme for dog; “dog” keeps the blunt tone of the simile.
- source_word: ⲛⲛⲕⲟⲧⲕ
  chosen: lying
  alternatives:
  - lying down
  - sleeping
  lexicon: Crum
  rationale: Here describes posture; “lying” is exact and not interpretively loaded
    as “sleeping.”
- source_word: ϩⲓϫⲛ
  chosen: 'on'
  alternatives:
  - upon
  lexicon: Lambdin
  rationale: Spatial preposition; “on” keeps the terseness; “upon” would be acceptable
    but more archaic.
- source_word: ⲡⲟⲩⲟⲙϥ
  chosen: manger
  alternatives:
  - feeding-trough
  lexicon: Layton
  rationale: Widely glossed as “manger/feeding trough” in this logion; “manger” is
    concise and natural in English while fitting the context.
- source_word: ⲛϩⲉⲛⲉϩⲉ / ⲡⲉϩⲉ
  chosen: cattle
  alternatives:
  - oxen
  - beasts
  lexicon: Crum
  rationale: ⲉϩⲉ denotes domestic animals/cattle; while “oxen” is traditional, “cattle”
    reflects the generic sense and aligns both occurrences (genitive plural and collective
    singular).
- source_word: ⲟⲩⲱⲙ
  chosen: eat
  alternatives:
  - feed
  lexicon: Crum
  rationale: Primary verb meaning “to eat”; simple, direct.
- source_word: ⲕⲱ (ⲛⲡⲉϩⲉ ⲉⲟⲩⲱⲙ)
  chosen: let / allow
  alternatives:
  - permit
  - allow … to eat
  - prevent (negative)
  lexicon: Crum
  rationale: In construction with infinitive ⲉⲟⲩⲱⲙ, the sense is to allow/let; with
    negation it yields “does not let … eat.”
- source_word: ϫⲉ (causal)
  chosen: for
  alternatives:
  - because
  lexicon: Lambdin
  rationale: Second ϫⲉ introduces causal clauses; “for” keeps the compact causal flow
    characteristic of Thomas.
textual_note: 'Dialect: Sahidic with Lycopolitan touches. Orthography in NHAM02.50
  shows bracketed/uncertain letters: line 2 has [ϫⲉⲟ]ⲩⲟⲉⲓ normalized to ⲟⲩⲟⲓ; line
  3 has [ⲛⲛ̄]ⲟⲩⲟⲩϩⲟⲣ normalized to ⲛⲟⲩⲟⲩϩⲟⲣ. The phrase ⲉⲣⲉⲛⲧⲟϥⲛⲛⲕⲟⲧⲕ is the periphrastic
  construction for “(with) it lying.” A notable ambiguity occurs in NHAM02.50 / lb
  4–5: the manuscript has traces that could be read as ⲛ̄ⲛⲉϩⲟⲟⲩ (“days”), but Dilley
  normalizes to ⲛϩⲉⲛⲉϩⲉ and later ⲛⲡⲉϩⲉ (“of the cattle / the cattle”), which fits
  the sense and yields the coherent phrase “the manger of the cattle … nor (does it)
  let the cattle eat.” We follow the normalized reading. No restorations from Greek
  are involved; no POxy fragment overlaps this saying. The semantics of ⲕⲱ here are
  permissive (with negation: “does not let”).'
