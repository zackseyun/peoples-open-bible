translation:
  language: es
  text: Estos fueron en los días de Joiakim hijo de Jesúa, hijo de Yozadac, y en los días de Nehemías el gobernador y de Esdras el sacerdote, el escriba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el sacerdote-escriba». El hebreo da a Esdras dos títulos en aposición: «el sacerdote» y «el escriba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Esto fue
  alternatives_spanish:
  - Estos fueron
  - Esto era
  lexicon: HALOT
  rationale: El hebreo abre con un demostrativo plural en una cláusula nominal. En español, para una referencia resumida a un conjunto de personas y sus tiempos, «Esto fue» expresa naturalmente la identificación histórica sin forzar un plural nominal poco idiomático.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - en tiempos de
  - durante los días de
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de datación histórica. «En los días de» mantiene la forma y el valor temporal del original con buena naturalidad en español.
- source_word: יוֹיָקִים
  english_pob_choice: Joiakim
  chosen_spanish: Joiakim
  alternatives_spanish:
  - Jehoiaquim
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional para esta figura sacerdotal postexílica, distinguiéndola del rey Jehoiaquim.
- source_word: בֶּן יֵשׁוּעַ בֶּן יוֹצָדָק
  english_pob_choice: son of Jeshua, son of Jozadak
  chosen_spanish: hijo de Jesúa, hijo de Yozadac
  alternatives_spanish:
  - descendiente de Jesúa, descendiente de Yozadac
  lexicon: HALOT
  rationale: La cadena genealógica usa בֶּן en sentido literal y genealógico. «Hijo de» reproduce ese valor sin ampliar innecesariamente a «descendiente».
- source_word: נְחֶמְיָה הַפֶּחָה
  english_pob_choice: Nehemiah the governor
  chosen_spanish: Nehemías, el gobernador
  alternatives_spanish:
  - Nehemías, el prefecto
  lexicon: HALOT
  rationale: פֶּחָה designa un cargo provincial bajo administración imperial. «Gobernador» es el equivalente español más claro y comunicativo, sin perder la función administrativa.
- source_word: וְעֶזְרָא הַכֹּהֵן הַסּוֹפֵר
  english_pob_choice: and Ezra the priest, the scribe
  chosen_spanish: y de Esdras, el sacerdote, el escriba
  alternatives_spanish:
  - y de Esdras, el sacerdote y escriba
  - y de Esdras, el sacerdote-escriba
  lexicon: HALOT
  rationale: 'El hebreo presenta dos títulos en aposición: «el sacerdote» y «el escriba». Se conservan ambos con puntuación apposicional para no fusionar indebidamente los oficios ni perder la doble designación.'
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conserva la estructura temporal repetida, la genealogía y la doble titulación de Esdras. No se requiere nota textual adicional porque la ambigüedad de ''priest, the scribe'' puede resolverse con puntuación en español sin alterar el sentido.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando corresponda; aquí no aparece el Tetragrámaton.
  - «Esdras» y «Nehemías» se mantienen en sus formas españolas usuales.
  - Se conserva el valor genealógico de «hijo de» conforme al hebreo.
  - Se evita traducir el cargo פֶּחָה con un término eclesiástico; se opta por «gobernador» por precisión administrativa.
