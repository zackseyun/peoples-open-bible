  to: Y comerás delante de Yahvé tu Dios[a], en el lugar que él escoja para hacer habitar allí su nombre, el diezmo de tu grano, de tu mosto y de tu aceite, y los primogénitos de tu ganado y de tu rebaño, para que aprendas a temer a Yahvé tu Dios todos tus días.
  rationale: 'Se hicieron ajustes menores para conformar mejor el texto al estilo meta del proyecto y a la precisión semántica documentada: se reemplazó el arcaizante «escogiere» por «escoja», se corrigió la puntuación para seguir la sintaxis del hebreo y se cambió «todos los días» por «todos tus días» para reflejar mejor כָּל הַיָּמִים / «all your days». Se conservó la nota léxica sobre la fórmula deuteronómica del nombre que habita allí.'
