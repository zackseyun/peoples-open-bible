translation:
  language: es
  text: Esta es la ley para todo caso de lepra y para una picazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para una erupción escamosa»; tradicionalmente, «y para tiña». El término hebreo se refiere a una afección cutánea específica, especialmente del cuero cabelludo o de la barba, pero su equivalente médico exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Esta
  lexicon: HALOT
  rationale: 'El demostrativo femenino singular introduce una fórmula de resumen; en español natural requiere la cópula explícita: «Esta es».'
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  lexicon: HALOT
  rationale: En este cierre jurídico de Levítico 13–14, «ley» comunica bien la regulación prescrita y mantiene el tono legal del pasaje.
- source_word: לְכָל
  english_pob_choice: for every
  chosen_spanish: para todo
  alternatives_spanish:
  - para cada
  - con respecto a todo
  lexicon: HALOT
  rationale: La preposición con כָּל expresa alcance aplicable a cada caso; «para todo» reproduce esa amplitud de manera idiomática.
- source_word: נֶגַע
  english_pob_choice: case
  chosen_spanish: caso
  alternatives_spanish:
  - aflicción
  - mancha
  - plaga
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente puede referirse a una marca o afección, aquí el contexto legal pide un equivalente procedimental; «caso» conserva ese sentido de expediente o instancia bajo examen.
- source_word: הַצָּרַעַת
  english_pob_choice: leprous disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - lepra ritual
  - afección de lepra
  lexicon: HALOT
  rationale: POB eligió una forma ligada a la tradición léxica y luego la revisó para acercarse más a צָרַעַת. En español, «lepra» es la forma más reconocible y conserva la conexión terminológica, aunque el término bíblico no equivale exactamente a la lepra moderna.
- source_word: וְלַנָּתֶק
  english_pob_choice: and for an itch
  chosen_spanish: y para un eccema
  alternatives_spanish:
  - y para una erupción escamosa
  - y para una tiña
  - y para un brote
  lexicon: HALOT
  rationale: נָתֶק designa una afección específica de cuero cabelludo o barba; «eccema» no pretende identificarla clínicamente, pero sirve como término general de afección cutánea. Se conserva así la incertidumbre médica documentada sin usar un término arcaico.
theological_decisions:
- issue: Alcance legal de la fórmula conclusiva
  english_pob_reading: This is the law for every case ...
  chosen_spanish_reading: Esta es la ley para todo caso ...
  alternative_spanish_readings:
  - Esta es la instrucción para todo caso ...
  - Esta es la norma para todo caso ...
  rationale: La frase funciona como rúbrica legal final; «ley» mantiene la lectura normativa y no introduce una carga doctrinal adicional.
  doctrine_reference: Pentateuco legal; Levítico 13–14 como regulación ritual/procedimental
translation_notes:
  revision_awareness: La revisión inglesa elevó צָרַעַת de «skin disease» a «leprous disease» para ajustar la consistencia formal; en español se optó por «lepra» para reflejar esa formalidad terminológica, y se mantuvo una equivalencia abierta para נָתֶק mediante «eccema», con nota que preserva la incertidumbre del referente.
  spanish_consistency_notes:
  - Se usa «ley» en lugar de «instrucción» para conservar el tono jurídico del cierre levítico.
  - Se evitó «SEÑOR» o terminología cultual no presente en el hebreo de este versículo.
  - «lepra» se emplea como término bíblico tradicional, no como diagnóstico médico moderno.
  - «eccema» funciona aquí como aproximación amplia; la nota conserva la alternativa más técnica documentada por el POB inglés.
