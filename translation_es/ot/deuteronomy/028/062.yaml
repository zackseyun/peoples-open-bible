  to: Y quedaréis pocos en número[a], aunque habíais llegado a ser como las estrellas de los cielos en multitud[b], porque no escuchaste[c] la voz de Yahvé tu Dios.
  rationale: 'Se corrige la distribución de número para reflejar el hebreo: plural en las primeras dos cláusulas y singular colectivo solo en la causa final. Se sustituye ''reducido a muy pocos'' por ''pocos en número'' para respetar mejor el idiomatismo hebreo y la decisión léxica del POB. Se conservan ''Yahvé'' y ''escuchar la voz'' según la terminología y rationale del proyecto.'
