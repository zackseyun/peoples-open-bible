translation:
  language: es
  text: Después de reunir unos ochenta mil hombres y toda la caballería[a], vino contra los judíos, pensando hacer de la ciudad una morada para los griegos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «unos ocho miríadas»; es decir, unos ochenta mil.
    reason: lexical_alternative
  - marker: b
    text: La frase continúa en el versículo siguiente, donde se completa el plan opuesto introducido por «la ciudad».
    reason: cross_reference
lexical_decisions:
- source_word: συναθροίσας
  english_pob_choice: After gathering
  chosen_spanish: Después de reunir
  alternatives_spanish:
  - habiendo reunido
  - tras reunir
  lexicon: LSJ
  rationale: El participio aoristo antecede a la acción principal; en español, «Después de reunir» preserva la secuencia temporal con naturalidad y sin sobrecargar la frase.
- source_word: περὶ τὰς ὀκτὼ μυριάδας
  english_pob_choice: about eighty thousand men
  chosen_spanish: unos ochenta mil hombres
  alternatives_spanish:
  - alrededor de ochenta mil
  - cerca de ochenta mil hombres
  lexicon: LSJ
  rationale: μυριάς equivale a diez mil; ocho μυριάδες son ochenta mil. «Unos» expresa la aproximación de περὶ. «Hombres» es un complemento contextual legítimo en un recuento militar.
- source_word: τὴν ἵππον ἅπασαν
  english_pob_choice: all the cavalry
  chosen_spanish: toda la caballería
  alternatives_spanish:
  - toda la fuerza de caballería
  - todos los jinetes
  lexicon: LSJ
  rationale: En contexto militar ἵππος puede referirse al arma/cuerpo de caballería. «Caballería» evita una traducción demasiado literal y conserva el sentido colectivo. «Toda» refleja ἅπασαν.
- source_word: παρεγένετο ἐπὶ τοὺς Ἰουδαίους
  english_pob_choice: he came against the Jews
  chosen_spanish: vino contra los judíos
  alternatives_spanish:
  - avanzó contra los judíos
  - se presentó contra los judíos
  lexicon: LSJ
  rationale: Con ἐπί + acusativo en un contexto bélico, el verbo indica movimiento hostil hacia un enemigo. «Vino contra» mantiene esa fuerza y resulta idiomático en español.
- source_word: λογιζόμενος
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - proponiéndose
  - calculando
  lexicon: LSJ
  rationale: El participio expresa la intención o cálculo mental del sujeto. «Pensando» conserva esa dimensión sin convertirla indebidamente en una resolución absoluta.
- source_word: τὴν μὲν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: LSJ
  rationale: La referencia es a la ciudad conocida en el contexto; en español no hace falta reproducir explícitamente μὲν aquí porque el contraste continúa en el versículo siguiente.
- source_word: Ἕλλησιν
  english_pob_choice: for Greeks
  chosen_spanish: para los griegos
  alternatives_spanish:
  - para los helenos
  - en beneficio de los griegos
  lexicon: LSJ
  rationale: El dativo expresa propósito o ventaja con ποιήσειν. «Griegos» es claro y natural en español; «helenos» sería más técnico y menos transparente.
- source_word: οἰκητήριον ποιήσειν
  english_pob_choice: to make a dwelling place
  chosen_spanish: hacer de la ciudad un lugar de habitación
  alternatives_spanish:
  - convertir la ciudad en morada
  - hacerla residencia
  lexicon: LSJ
  rationale: La expresión verbal indica transformar la ciudad en un sitio habitable para otro grupo. «Lugar de habitación» conserva la idea de residencia/habitación sin añadir matices ajenos al griego.
translation_notes:
  revision_awareness: 'El pasaje griego presenta una estructura participial y una frase final que queda sintácticamente abierta, tal como refleja el audit trail inglés. La versión española conserva esa apertura con una coma final y mantiene el orden lógico: reunión de tropas, avance hostil y plan mental de transformar la ciudad.'
  spanish_consistency_notes:
  - Se mantuvo «griegos» como equivalente de Ἕλλησιν siguiendo el audit trail inglés y la claridad española.
  - Se prefirió «caballería» por el valor militar colectivo de ἵππον en este contexto.
  - La equivalencia numérica de «ocho miríadas» a «ochenta mil» queda explicada en nota para preservar la transparencia textual.
  - Se conservó la frase abierta al final porque el enunciado continúa en el versículo siguiente.
