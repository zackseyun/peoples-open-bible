translation:
  language: es
  text: 'Y Yahvé me dijo[a]: «Israel infiel se ha mostrado más justa que la traicionera Judá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel descarriada se ha mostrado más justa que la traicionera Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, manteniendo el nombre del pacto con una forma española natural y reconocible.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: me dijo
  alternatives_spanish:
  - declaró
  - habló
  lexicon: HALOT
  rationale: El hebreo narra una acción de habla directa; en español, «me dijo» conserva la sencillez narrativa y refleja el sufijo de primera persona de אֵלַי.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: En español, el clítico de objeto indirecto expresa de manera natural el complemento de destinatario del habla; el valor de primera persona queda claro sin sobrecarga.
- source_word: צִדְּקָה נַפְשָׁהּ
  english_pob_choice: has shown herself more righteous
  chosen_spanish: se ha mostrado más justa
  alternatives_spanish:
  - se ha justificado
  - es más justa
  lexicon: HALOT
  rationale: La construcción refleja una comparación de justicia/vindicación, no una inocencia absoluta. «Se ha mostrado más justa» conserva el matiz reflexivo y comparativo del hebreo.
- source_word: מְשֻׁבָה
  english_pob_choice: Faithless
  chosen_spanish: infiel
  alternatives_spanish:
  - apóstata
  - rebelde
  lexicon: HALOT
  rationale: Como etiqueta descriptiva de Israel, el término comunica deslealtad de pacto. «Infiel» es natural en español y mantiene la idea relacional sin imponer un tecnicismo más fuerte de lo que exige el contexto.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio estándar.
- source_word: מִבֹּגֵדָה
  english_pob_choice: than treacherous
  chosen_spanish: que la traicionera
  alternatives_spanish:
  - que la infiel
  - que la pérfida
  lexicon: HALOT
  rationale: El comparativo con מִ expresa «más ... que». «Traicionera» preserva el peso de בגד como traición/covenant breach y encaja naturalmente con la comparación.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio estándar del reino del sur.
theological_decisions:
- issue: Righteousness language in a comparative covenant judgment
  english_pob_reading: Israel is more righteous relative to Judah, not morally innocent.
  chosen_spanish_reading: Israel es más justa que Judá en esta comparación, sin que ello implique inocencia moral absoluta.
  alternative_spanish_readings:
  - Israel ha sido justificada frente a Judá
  - Israel se presenta como recta sobre Judá
  rationale: El hebreo usa צדק en un marco comparativo entre dos comunidades culpables. La traducción debe conservar la tensión retórica sin suavizarla ni resolverla teológicamente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios sustantivos; se mantiene la lectura comparativa y la etiqueta de infidelidad/traición para reflejar el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - '«Infiel» y «traicionera» distinguen los dos miembros del paralelismo: deslealtad de pacto y traición activa.'
  - «Más justa» preserva la comparación sin convertirla en declaración de inocencia plena.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - La puntuación y las comillas se ajustan al español moderno de registro bíblico.
