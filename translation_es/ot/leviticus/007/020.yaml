  text: וְ/הַ/נֶּ֜פֶשׁ אֲשֶׁר תֹּאכַ֣ל בָּשָׂ֗ר מִ/זֶּ֤בַח הַ/שְּׁלָמִים֙ אֲשֶׁ֣ר לַ/יהוָ֔ה וְ/טֻמְאָת֖/וֹ עָלָ֑י/ו וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵ/עַמֶּֽי/הָ־׃
