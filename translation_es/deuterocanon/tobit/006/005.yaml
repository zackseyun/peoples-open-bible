translation:
  language: es
  text: 'Y el ángel le dijo: «Abre el pez, y toma el corazón, el hígado y la hiel[a], y guárdalos bien».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la bilis».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνάτεμε
  english_pob_choice: Cut open
  chosen_spanish: Corta
  alternatives_spanish:
  - Abre
  - Corta abriendo
  - Parte
  lexicon: LSJ
  rationale: El imperativo exige una acción concreta sobre el pez para extraer sus partes. En español, «corta» transmite de manera natural y directa la acción sin añadir tecnicismo ni suavizarla.
- source_word: τὸν ἰχθύν
  english_pob_choice: the fish
  chosen_spanish: el pez
  alternatives_spanish:
  - este pez
  - el pescado
  lexicon: LSJ
  rationale: El artículo definido del griego se refleja con «el pez». «Pescado» sería menos exacto como animal vivo y «este pez» añade cercanía no explicitada.
- source_word: καὶ λαβὼν
  english_pob_choice: and take
  chosen_spanish: y toma
  alternatives_spanish:
  - y después toma
  - tomando
  - y habiendo tomado
  lexicon: LSJ
  rationale: El participio aoristo se coordina de forma natural en español con el imperativo siguiente. «Y toma» conserva la secuencia simple del griego y evita una redundancia artificial.
- source_word: τὴν καρδίαν
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el pecho
  - la sede del corazón
  lexicon: LSJ
  rationale: Es el término anatómico normal y no requiere paráfrasis.
- source_word: τὸ ἧπαρ
  english_pob_choice: the liver
  chosen_spanish: el hígado
  alternatives_spanish:
  - las entrañas
  lexicon: LSJ
  rationale: Término anatómico estándar en español, correspondiente de modo directo al griego.
- source_word: τὴν χολὴν
  english_pob_choice: the gall
  chosen_spanish: la hiel
  alternatives_spanish:
  - la bilis
  - la hiel / bilis
  lexicon: LSJ
  rationale: «Χολή» puede ser «gall» o «bile». En español, «hiel» mantiene un matiz tradicional y relativamente cercano a «gall», mientras que «bilis» explicita el sentido físico. Aquí se eligió «hiel» para conservar la concisión y la resonancia del término, sin excluir la equivalencia semántica.
- source_word: θὲς
  english_pob_choice: put them away
  chosen_spanish: ponlos a salvo
  alternatives_spanish:
  - ponlos aparte
  - guárdalos
  - sepáralos
  lexicon: LSJ
  rationale: El verbo pide guardar las partes extraídas para uso posterior. «Ponlos a salvo» comunica almacenamiento seguro y corresponde bien a la idea de preservar los elementos sin especificar un contenedor.
- source_word: ἀσφαλῶς
  english_pob_choice: safely
  chosen_spanish: a salvo
  alternatives_spanish:
  - seguramente
  - con seguridad
  - de forma segura
  lexicon: LSJ
  rationale: «Ἀσφαλῶς» expresa seguridad, resguardo o protección. «A salvo» es una fórmula natural en español y encaja con la instrucción de guardar estos elementos sin riesgo.
theological_decisions:
- issue: Identificación del hablante como ὁ ἄγγελος
  english_pob_reading: the angel
  chosen_spanish_reading: el ángel
  alternative_spanish_readings:
  - el mensajero
  rationale: En el marco narrativo de Tobit, el personaje es claramente angélico. «El ángel» preserva ese sentido directo sin convertir la frase en una reflexión doctrinal adicional.
  doctrine_reference: Sentido llano narrativo; no introducir ambigüedad innecesaria.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La redacción mantiene la secuencia griega simple: mandato de cortar, coordinación con tomar, y preservación segura de los órganos extraídos.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno.
  - «Ángel» se usa en sentido narrativo inmediato, acorde con el contexto de Tobit.
  - No se añadió nota sobre «hiel/bilis» para evitar pie de página sin anclaje; la opción léxica se explica en decisiones léxicas.
  - La puntuación con comillas angulares es compatible con el estilo editorial en español.
