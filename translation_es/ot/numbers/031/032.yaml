revisions:
- from: Ahora el botín[a], el resto del despojo que el pueblo del ejército había despojado, fue 675,000 ovejas.
  to: Y el botín[a], el resto del despojo que había saqueado el pueblo del ejército, fue de 675,000 ovejas.
  rationale: Se reemplazó «Ahora» por «Y» para un arranque narrativo más natural en español, «había despojado» por «había saqueado» para expresar correctamente el acto de tomar botín, y se añadió «de» en «fue de 675,000 ovejas» para mejorar la gramática española. Se mantuvo «botín / despojo» para preservar la distinción léxica del hebreo y del POB inglés.
