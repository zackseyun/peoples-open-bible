translation:
  language: es
  text: 'diciendo[a]: «Si tú eres el Mesías, dínos». Pero él les dijo: «Si yo les digo, ustedes de ningún modo creerán;»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - ellos decían
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del desafío del consejo; «diciendo» conserva la relación participial con la narración anterior y suena natural en español. Mantiene la continuidad sintáctica sin añadir un sujeto explícito innecesario.
- source_word: Εἰ σὺ εἶ
  english_pob_choice: If you are
  chosen_spanish: Si tú eres
  alternatives_spanish:
  - ¿Eres tú?
  lexicon: BDAG
  rationale: 'Se preserva la forma condicional explícita del griego, que suavemente mantiene el tono de reto: «Si tú eres…». Evita convertirlo en una pregunta directa que borre la estructura condicional.'
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Como título mesiánico en este contexto, Χριστός se vierte como «Mesías» para conservar su sentido judío y no convertirlo en un nombre eclesiástico fijo. Es la opción preferida por el audit trail inglés y la terminología POB.
- source_word: εἰπὸν ἡμῖν
  english_pob_choice: tell us
  chosen_spanish: dínoslo
  alternatives_spanish:
  - dinos
  lexicon: BDAG
  rationale: El imperativo de λέγω con dativo se expresa de forma idiomática en español como «dínoslo», que transmite la petición/orden con fuerza natural. Se añade el pronombre enclítico para reflejar el objeto directo implícito en el contexto discursivo.
- source_word: εἶπεν δὲ αὐτοῖς
  english_pob_choice: But he said to them
  chosen_spanish: Pero él les dijo
  alternatives_spanish:
  - Y él les dijo
  lexicon: BDAG
  rationale: «Pero» comunica bien la leve transición/contraste de δέ ante la respuesta de Jesús. Se mantiene el pronombre explícito «él» para la claridad narrativa del español, aunque el griego lo exprese por la forma verbal.
- source_word: Ἐὰν ὑμῖν εἴπω
  english_pob_choice: If I tell you
  chosen_spanish: Si yo les digo
  alternatives_spanish:
  - Si les dijera
  lexicon: BDAG
  rationale: El condicional se conserva de manera clara y directa en español. «Les digo» refleja el valor del subjuntivo griego dentro de la prótasis condicional sin forzar una perífrasis más pesada.
- source_word: οὐ μὴ πιστεύσητε
  english_pob_choice: you will certainly not believe
  chosen_spanish: ustedes de ningún modo creerán
  alternatives_spanish:
  - ustedes ciertamente no creerán
  - ustedes no creerán en absoluto
  lexicon: BDAG
  rationale: La combinación οὐ μή + subjuntivo expresa negación enfática; «de ningún modo» comunica esa fuerza con claridad en español contemporáneo. «Creerán» conserva el verbo de fe/confianza sin introducir explicaciones adicionales.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En esta interrogación el término funciona como título y no como nombre propio litúrgico. Traducirlo como «Mesías» preserva la expectativa judía implícita y evita desactivar la tensión del pasaje con un préstamo no necesario.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Negación enfática de futura incredulidad
  english_pob_reading: you will certainly not believe
  chosen_spanish_reading: ustedes de ningún modo creerán
  alternative_spanish_readings:
  - ustedes ciertamente no creerán
  - ustedes no creerán en absoluto
  rationale: οὐ μή con subjuntivo tiene un valor enfático fuerte; la versión española debe conservar esa contundencia sin suavizarla a una simple negación. «De ningún modo» mantiene la fuerza retórica de Jesús al responder a la demanda.
  doctrine_reference: BDAG on οὐ μή; Greek syntax of emphatic negation
translation_notes:
  revision_awareness: Revisado contra el paquete fuente griego SBLGNT y el audit trail inglés POB. No hay revisiones aplicadas en el registro inglés; la decisión principal estable pendiente es Χριστός como «Mesías». La puntuación española se ajusta para un estilo publicable, manteniendo la estructura condicional y la negación enfática del original.
  spanish_consistency_notes:
  - Se conserva «Mesías» para Χριστός conforme a la política POB y al contexto interrogativo del título.
  - Se evita traducir el participio inicial como una oración independiente para no romper la continuidad narrativa.
  - La negación final se formula con fuerza equivalente a οὐ μή, evitando una simple negación débil.
  - Se usa el pronombre explícito «él» por claridad natural del español, sin alterar el referente griego.
