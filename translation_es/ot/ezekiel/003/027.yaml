translation:
  language: es
  text: 'Pero cuando yo hable contigo[a], abriré tu boca, y les dirás: «Así dice el Señor Yahvé: El que oye, oiga; y el que se abstiene, absténgase, porque ellos son una casa rebelde[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuando hable contigo». El hebreo puede entenderse temporalmente («cuando») y la construcción también admite el matiz «hable contigo / te hable».
    reason: alternative_reading
  - marker: b
    text: Hebreo «casa rebelde», expresión recurrente de Ezequiel para el pueblo de Israel en su rebeldía obstinada.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְדַבְּרִי
  english_pob_choice: But when I speak with you
  chosen_spanish: Pero cuando yo hable contigo
  alternatives_spanish:
  - Y cuando yo hable contigo
  - cuando yo hable contigo
  lexicon: HALOT
  rationale: Conserva el valor temporal de בְּ + infinitivo y el contraste de וּ/בְּ como “pero” en este contexto, donde se contrasta con el mutismo impuesto previamente. “Contigo” mantiene la cercanía del complemento אֹתְךָ sin forzar una fórmula menos natural.
- source_word: אֶפְתַּח אֶת פִּיךָ
  english_pob_choice: I will open your mouth
  chosen_spanish: abriré tu boca
  alternatives_spanish:
  - abriré tu boca
  - abriré tu boca para que hables
  lexicon: HALOT
  rationale: Se preserva la imagen corporal literal y el acto divino de habilitar el habla. “Boca” corresponde directamente a פֶּה; no se añadió una explicación causal que el hebreo no expresa explícitamente.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: and you shall say to them
  chosen_spanish: y dirás a ellos
  alternatives_spanish:
  - y les dirás
  - y dirás a ellos
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa y el destinatario plural. “A ellos” conserva la construcción preposicional del hebreo, aunque “les” sería más idiomático en español.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética admite presente o perfecto con valor declarativo. “Así ha dicho” es una forma bíblica natural en español y conserva el tono formal del mensajero profético.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para יְהוָה como “Yahvé”, evitando el ocultamiento bajo “SEÑOR”. “Señor” traduce אֲדֹנָי y “Yahvé” preserva el nombre divino del texto fuente.
- source_word: הַשֹּׁמֵעַ יִשְׁמָע
  english_pob_choice: The one who hears, let him hear
  chosen_spanish: El que oye, oiga
  alternatives_spanish:
  - El que oye, oiga
  - El que escucha, escuche
  lexicon: HALOT
  rationale: Se conserva el paralelismo volitivo con una construcción natural en español. “Oye/oiga” refleja bien שׁמע en este llamado a prestar atención obediente.
- source_word: וְהֶחָדֵל יֶחְדָּל
  english_pob_choice: and the one who refrains, let him refrain
  chosen_spanish: y el que se detiene, deténgase
  alternatives_spanish:
  - y el que se detiene, deténgase
  - y el que se abstiene, absténgase
  - y el que se reprime, reprímase
  lexicon: HALOT
  rationale: El hebreo חדל tiene la idea de cesar, desistir o abstenerse; “se detiene” capta esa cesación sin añadir la dureza interpretativa de “rechaza”. La forma imperativa refleja el paralelo volitivo del verso.
- source_word: כִּי בֵּית מְרִי הֵמָּה
  english_pob_choice: for they are a rebellious house
  chosen_spanish: porque ellos son una casa rebelde
  alternatives_spanish:
  - porque ellos son una casa rebelde
  - porque son una casa de rebelión
  lexicon: HALOT
  rationale: Se preserva la expresión fija de Ezequiel “casa rebelde”, que tiene peso retórico y teológico como fórmula recurrente de denuncia del pacto. Se mantiene la metáfora de “casa” en vez de suavizarla a “pueblo”.
theological_decisions:
- issue: Rendering of the divine name יְהוִה in the prophetic formula
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: 'La política del proyecto exige traducir YHWH como “Yahvé” en el texto principal. En la fórmula compuesta אֲדֹנָי יְהוִה, “Señor Yahvé” preserva ambos elementos: título soberano y nombre del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Representative masculine singular in הַשֹּׁמֵעַ ... וְהֶחָדֵל
  english_pob_reading: The one who hears, let him hear; and the one who refrains, let him refrain
  chosen_spanish_reading: El que oye, oiga; y el que se detiene, deténgase
  alternative_spanish_readings:
  - Quien oye, oiga; y quien se detiene, deténgase
  - El que oye, que oiga; y el que se detiene, que se detenga
  rationale: Se conserva el singular masculino representativo del hebreo y el paralelismo volitivo. No se neutraliza con pluralización ni se diluye el carácter exhortativo del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del expediente inglés: la opción final prefiere “refrains/refrains” como cese o desistimiento. En español se eligió “se detiene” para reflejar la idea de cesar o abstenerse sin cargar el verbo con una interpretación más fuerte que la respaldada por el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוִה conforme a la norma del proyecto.
  - 'Se preservó la fórmula profética en registro bíblico natural: “Así ha dicho el Señor Yahvé”.'
  - Se conservó la metáfora “casa rebelde” por ser una expresión técnica recurrente en Ezequiel.
  - 'Se empleó un paralelismo volitivo claro en español: “El que oye, oiga; y el que se detiene, deténgase”.'
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal donde corresponden.
