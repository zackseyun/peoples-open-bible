translation:
  language: es
  text: Así Abram subió de Egipto[a], él y su esposa, y todo lo que tenía, y Lot con él, al Néguev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacia el sur'. El hebreo néguev puede referirse tanto a la región meridional conocida como el Néguev como, de manera más general, al sur o a la tierra del sur.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba; en español, 'subió' conserva ese valor verbal y suena natural en un relato bíblico. 'Ascendió' es más formal pero menos idiomático aquí.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición מן con el nombre propio se expresa de forma directa como 'de Egipto'; 'desde Egipto' también sería posible, pero 'de' mantiene la relación de salida sin recargar el estilo.
- source_word: הוּא וְאִשְׁתּוֹ
  english_pob_choice: he and his wife
  chosen_spanish: él y su esposa
  alternatives_spanish:
  - él y su mujer
  - él, junto con su esposa
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis o aclaración. 'Él y su esposa' reproduce bien la enumeración, y 'esposa' es más neutral y digno que 'mujer' en este registro.
- source_word: וְכָל אֲשֶׁר לוֹ
  english_pob_choice: and all that he had
  chosen_spanish: y todo lo que tenía
  alternatives_spanish:
  - y todo lo que le pertenecía
  - y todas sus posesiones
  lexicon: HALOT
  rationale: La frase abarca de manera amplia todo lo perteneciente a Abram, sin restringirlo a bienes materiales. 'Todo lo que tenía' mantiene esa amplitud de forma natural en español.
- source_word: וְלוֹט עִמּוֹ
  english_pob_choice: and Lot with him
  chosen_spanish: y Lot con él
  alternatives_spanish:
  - y Lot iba con él
  - y también Lot con él
  lexicon: HALOT
  rationale: La construcción añadida presenta a Lot como acompañante en el viaje. 'Con él' conserva la brevedad hebrea y el enlace narrativo.
- source_word: הַנֶּגְבָּה
  english_pob_choice: to the Negev
  chosen_spanish: hacia el Negev
  alternatives_spanish:
  - al Negev
  - hacia el sur
  - a la región del Negev
  lexicon: HALOT
  rationale: נֶגֶב puede referirse al área geográfica del Negev o, en general, al sur/surland. Como destino geográfico, 'hacia el Negev' conserva el nombre propio y también la orientación direccional implícita.
translation_notes:
  revision_awareness: El inglés POB se mantiene sin cambios en la revisión más reciente; el borrador español sigue esa lectura de alta concordancia y conserva el valor narrativo y geográfico del hebreo sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma proyectual solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - '''Negev'' se dejó como nombre geográfico transliterado, con nota alternativa sobre el valor direccional del hebreo.'
  - La puntuación y el orden de miembros siguen de cerca la enumeración hebrea para conservar el ritmo narrativo.
