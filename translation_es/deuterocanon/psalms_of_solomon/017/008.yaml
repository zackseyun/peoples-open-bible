translation:
  language: es
  text: Destruyeron el trono de David con arrogante usurpación[a]. Pero tú, oh Dios, los derribarás y quitarás de la tierra a su descendencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la arrogancia del reemplazo». El griego es compacto; «usurpación» explicita el sentido político probable.
    reason: lexical_alternative
  - marker: b
    text: O «los derribarás y quitarás».
    reason: previous_rendering
lexical_decisions:
- source_word: ἠρήμωσαν
  english_pob_choice: laid waste
  chosen_spanish: destruyeron
  alternatives_spanish:
  - devastaron
  - arrasaron
  - dejaron desolado
  lexicon: BDAG
  rationale: El verbo expresa la ruina efectiva de algo, no solo daño parcial. En español, «destruyeron» transmite esa fuerza con naturalidad y sin forzar una imagen demasiado literal.
- source_word: τὸν θρόνον Δαυίδ
  english_pob_choice: the throne of David
  chosen_spanish: el trono de David
  alternatives_spanish:
  - el trono davídico
  - el trono de David
  lexicon: BDAG
  rationale: Se conserva la referencia dinástica y real de forma directa. «Trono de David» es claro, fiel y suficientemente solemne para el registro del texto.
- source_word: ἐν ὑπερηφανίᾳ ἀλλάγματος
  english_pob_choice: in arrogant usurpation
  chosen_spanish: con arrogante usurpación
  alternatives_spanish:
  - en la arrogancia del reemplazo
  - con orgulloso reemplazo
  - en la arrogancia de la sustitución
  lexicon: LSJ
  rationale: El griego combina ὑπερηφανία («arrogancia») con ἀλλάγματος, que literalmente remite a cambio/intercambio pero aquí apunta a una sustitución ilegítima del orden davídico. «Usurpación» explicita ese sentido político sin perder la tensión semántica del original.
- source_word: καταβαλεῖς
  english_pob_choice: will cast ... down
  chosen_spanish: los derribarás
  alternatives_spanish:
  - los bajarás
  - los harás caer
  - los abatirás
  lexicon: BDAG
  rationale: El verbo comunica abatimiento/derrota decisiva. «Derribarás» preserva el tono de juicio divino y funciona bien en español bíblico contemporáneo.
- source_word: ἀρεῖς
  english_pob_choice: will remove
  chosen_spanish: quitarás
  alternatives_spanish:
  - removerás
  - eliminarás
  - arrancarás
  lexicon: BDAG
  rationale: αἴρω aquí significa quitar o remover. «Quitarás» es idiomático en español y evita sobredeterminar el modo exacto del juicio.
- source_word: σπέρμα αὐτῶν
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - sus descendientes
  - su semilla
  lexicon: BDAG
  rationale: Aunque «semilla» es más literal, en español suena demasiado técnico o arcaico. «Descendencia» mantiene el sentido generacional y suena natural en un registro bíblico digno.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del mundo
  - de la tierra/país
  lexicon: BDAG
  rationale: Se conserva «tierra» porque el griego puede abarcar el ámbito de la existencia humana sobre la tierra y no obliga a estrechar el sentido a un territorio específico.
theological_decisions:
- issue: Tensión temporal de los verbos futuros griegos en un contexto narrativo retrospectivo
  english_pob_reading: The English audit trail ultimately kept future forms ('will cast them down and remove') to match the Greek morphology, though earlier revision notes argued for past tense because the passage describes a completed historical judgment.
  chosen_spanish_reading: los derribarás y quitarás
  alternative_spanish_readings:
  - los derribaste y quitaste
  - los vas a derribar y quitar
  - los derribarás y removerás
  rationale: Se conserva el futuro formal del griego, que en este tipo de texto profético puede funcionar como futuro de certeza o declaración judicial. En español, el futuro mantiene la relación con el texto fuente sin cerrar la dimensión histórica que el contexto más amplio sugiere.
  doctrine_reference: Narrativa profética / futuro de certeza en lenguaje bíblico
- issue: Conectivo adversativo de ἀλλά
  english_pob_reading: But you, O God
  chosen_spanish_reading: Pero tú, oh Dios
  alternative_spanish_readings:
  - Y tú, oh Dios
  - Mas tú, oh Dios
  rationale: ἀλλά introduce contraste real entre la acción humana y la respuesta divina. «Pero» reproduce con claridad ese giro adversativo en español actual.
  doctrine_reference: Retórica bíblica de contraste/jucio divino
translation_notes:
  revision_awareness: El contexto de revisión en inglés muestra una tensión no resuelta entre el valor morfológico futuro del griego y el valor narrativo retrospectivo sugerido por el marco del poema. Para esta versión española se priorizó la transparencia hacia la forma del texto fuente, manteniendo el futuro, pero con léxico natural y sin atenuar la fuerza judicial del pasaje. También se conservó el contraste de ἀλλά con «Pero».
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva el registro bíblico solemne sin caer en calco rígido.
  - «Descendencia» mantiene la fuerza generacional de σπέρμα sin sonar arcaico.
  - El futuro español en la apódosis sigue la forma griega y el audit trail más reciente.
  - «Usurpación» se emplea por la fuerza contextual del reemplazo ilegítimo del trono davídico.
