revisions:
- from: Como he visto[a][b], los que aran iniquidad y siembran angustia, eso mismo cosechan.
  to: Como he visto[a][b], los que aran iniquidad y siembran aflicción la cosechan.
  rationale: La revisión conserva el sentido del hebreo y la línea del POB inglés, pero mejora la precisión léxica en español. «Aflicción» representa mejor עָמָל que «angustia», porque mantiene un sentido más amplio de daño/miseria. «La cosechan» refleja con mayor economía y fidelidad el sufijo singular de יִקְצְרֻהוּ sin perder la metáfora agrícola ni la idea de correspondencia moral.
