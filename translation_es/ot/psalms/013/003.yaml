review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: conserva la doble repetición de «¿Hasta cuándo?», la deliberación interna de עֵצוֹת בְּנַפְשִׁי, el paralelismo con «tristeza en mi corazón», y la imagen vertical de יָרוּם עָלַי. Sin embargo, hay pequeños problemas de naturalidad y precisión idiomática en español: «habré de tomar consejo» suena algo forzado, y «mi enemigo se exaltará sobre mí» puede sugerir autoexaltación más que superioridad sobre el salmista. La nota a también necesita limpieza formal.'
  spanish_quality_summary: El texto es legible y digno, pero se beneficia de una reparación menor para sonar más natural en español eclesial general. «Tomar consejo en mi alma» puede mejorarse a «deliberar en mi alma», que mantiene el sentido de consejo interno sin rigidez. Para יָרוּם, «será exaltado sobre mí» refleja mejor el valor del verbo y coincide con la nota explicativa. Las notas deben corregirse tipográficamente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «alma», «corazón» y «enemigo» están bien elegidos. La decisión sobre יָרוּם debe mantenerse cercana a «ser exaltado» más que «triunfar», dejando «triunfará» como alternativa en nota. No hay cuestiones teológicas especiales.
  issues:
  - severity: medium
    issue: «habré de tomar consejo» suena poco natural en español
    rationale: Aunque calca razonablemente el inglés «take counsel», en español bíblico general «tomar consejo en mi alma» resulta rígido. «Deliberar en mi alma» o «hacer planes dentro de mí» comunican mejor la acción interna de אָשִׁית עֵצוֹת.
  - severity: medium
    issue: «mi enemigo se exaltará sobre mí» puede malentenderse
    rationale: «Se exaltará» en español suele sugerir que el sujeto se ensalza a sí mismo. El hebreo יָרוּם aquí expresa estado/elevación sobre el salmista; «será exaltado sobre mí» o «se alzará sobre mí» preserva mejor la imagen.
  - severity: low
    issue: La nota a está mal formulada tipográficamente
    rationale: 'La redacción actual contiene comillas y puntuación torpes («''O: ...''»). Debe normalizarse para claridad editorial.'
  revised_spanish_text: ¿Hasta cuándo habré de deliberar en mi alma[a], con tristeza en mi corazón todo el día? ¿Hasta cuándo mi enemigo será exaltado sobre mí[b]?
