translation:
  language: es
  text: 'Según sus hechos, así él retribuirá: ira a sus adversarios, retribución a sus enemigos; a las regiones costeras[a] retribuirá lo debido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las islas». El término hebreo puede designar islas o regiones marítimas lejanas; en Isaías a menudo se refiere en general a naciones distantes junto al mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַל
  english_pob_choice: According to
  chosen_spanish: Según
  alternatives_spanish:
  - De acuerdo con
  - Conforme a
  lexicon: HALOT
  rationale: La preposición comparativa introduce la medida o norma de la retribución. «Según» conserva bien ese valor proporcional en español natural.
- source_word: גְּמֻלוֹת
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus recompensas
  lexicon: HALOT
  rationale: La raíz גמל aquí apunta a acciones que merecen paga. «Hechos» comunica con claridad la base de la retribución sin volver demasiado abstracto el término.
- source_word: יְשַׁלֵּם
  english_pob_choice: he will repay
  chosen_spanish: él pagará
  alternatives_spanish:
  - él retribuirá
  - él recompensará
  lexicon: HALOT
  rationale: El piel de שלם expresa pagar/repagar. «Pagará» es directo y mantiene la idea judicial de devolución proporcional.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - cólera
  lexicon: HALOT
  rationale: «Furor» conserva el tono intenso y judicial del término, sin sonar tan coloquial como «ira» en este contexto.
- source_word: לְצָרָיו
  english_pob_choice: to his adversaries
  chosen_spanish: a sus adversarios
  alternatives_spanish:
  - a sus enemigos
  - a sus opresores
  lexicon: HALOT
  rationale: «Adversarios» mantiene el matiz formal de oposición hostil y no especifica más de lo que el hebreo dice.
- source_word: גְּמוּל
  english_pob_choice: repayment
  chosen_spanish: retribución
  alternatives_spanish:
  - pago
  - recompensa
  - retribución debida
  lexicon: HALOT
  rationale: El sustantivo repite el campo semántico de pagar/repagar. «Retribución» preserva ese eco judicial y recompensatorio en español.
- source_word: לְאֹיְבָיו
  english_pob_choice: to his enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a sus hostiles
  - a quienes lo odian
  lexicon: HALOT
  rationale: Es la equivalencia natural y precisa de אויב en este contexto de hostilidad.
- source_word: לָאִיִּים
  english_pob_choice: to the coastlands
  chosen_spanish: a las costas
  alternatives_spanish:
  - a las islas
  - a las costas marítimas
  - a los países del mar
  lexicon: HALOT
  rationale: En Isaías, איים suele referir a regiones marítimas lejanas. «Costas» conserva esa amplitud geográfica y el uso profético habitual mejor que «islas» en español general.
- source_word: גְּמוּל יְשַׁלֵּם
  english_pob_choice: he will repay what is due
  chosen_spanish: les pagará lo debido
  alternatives_spanish:
  - les pagará la retribución
  - les pagará el pago debido
  lexicon: HALOT
  rationale: La repetición del sustantivo y el verbo crea énfasis. En español, «lo debido» reproduce la idea de algo que corresponde pagar sin sonar forzado.
theological_decisions:
- issue: Sujeto implícito de los verbos en tercera persona singular
  english_pob_reading: Render simply as 'he' without specifying 'the LORD' in the verse itself
  chosen_spanish_reading: Mantener solo «él» en el verso, sin explicitar «Yahvé»
  alternative_spanish_readings:
  - Yahvé pagará
  - el Señor pagará
  rationale: El contexto inmediato identifica al agente divino, pero el verso mismo mantiene la tercera persona singular. Dejar «él» respeta el flujo del texto y evita introducir un nombre no repetido aquí.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor del campo גמל en el arranque y en el cierre
  english_pob_reading: Take it as the basis of judgment ('According to their deeds') rather than as an abstract noun repeated woodenly ('According to recompenses')
  chosen_spanish_reading: Traducir el inicio como referencia a los hechos, mientras se conserva el motivo de retribución en el resto del verso
  alternative_spanish_readings:
  - Según su retribución
  - Conforme a sus recompensas
  rationale: El hebreo une la base del juicio con el acto de pagar. «Sus hechos» aclara el fundamento de la retribución, y «retribución / lo debido» conserva después el léxico de pago.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios; esta versión sigue la misma lectura de alta concordancia y mantiene el enfoque de equivalencia óptima con terminología de retribución y costas.
  spanish_consistency_notes:
  - Se conserva la distinción entre «hechos» como base del juicio y «retribución / lo debido» como respuesta divina.
  - «Costas» se usa como equivalente profético de איים, con nota para la variante «islas».
  - No se explicita el nombre divino en el verso para respetar el sujeto implícito de los verbos, tal como en el hebreo.
