  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro de auditoría inglés: וַתַּרְבֶּה se conserva bien con «Sin embargo, ella multiplicó»; תַּזְנוּתֶיהָ con «sus prostituciones» mantiene el plural de actos repetidos; לִזְכֹּר se vierte naturalmente como «al recordar»; יְמֵי נְעוּרֶיהָ como «los días de su juventud»; אֲשֶׁר זָנְתָה como «cuando se prostituyó»; y בְּאֶרֶץ מִצְרַיִם como «en la tierra de Egipto». No hay pérdida material de sentido ni suavización indebida de la metáfora profética.'
