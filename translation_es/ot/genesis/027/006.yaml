translation:
  language: es
  text: 'Y Rebeca dijo a Jacob su hijo[a]: «Mira, oí a tu padre hablar a Esaú tu hermano, diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su hijo Jacob».'
    reason: alternativa de orden appositivo igualmente fiel al hebreo
lexical_decisions:
- source_word: וְ/רִבְקָה
  english_pob_choice: And Rebekah
  chosen_spanish: Y Rebeca
  alternatives_spanish:
  - Ahora Rebeca
  - Entonces Rebeca
  lexicon: HALOT
  rationale: Conservo el valor narrativo simple de la conjunción וְ con «Y», sin cargarla con una relación temporal más fuerte que la del hebreo. El nombre propio se translitera como «Rebeca» según el uso español estándar.
- source_word: אָֽמְרָה
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אָמַר en introducción de discurso directo se rinde naturalmente como «dijo» en español, con registro claro y fiel.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural en español con «a» delante del destinatario.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Nombre propio conservado en su forma usual en español.
- source_word: בְּנָהּ
  english_pob_choice: her son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo Jacob
  lexicon: HALOT
  rationale: Mantengo la relación posesiva explícita. El hebreo identifica a Jacob como «su hijo»; el nombre ya está presente en la cláusula anterior, de modo que no es necesario repetirlo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Oye
  lexicon: HALOT
  rationale: «Mira» comunica la función de atención de הִנֵּה en español actual sin el peso arcaizante de «He aquí».
- source_word: שָׁמַעְתִּי
  english_pob_choice: I heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  lexicon: HALOT
  rationale: Uso el perfecto compuesto porque en español suena natural para una noticia traída al presente de la conversación. El hebreo perfecto reporta un hecho ya cumplido; «he oído» preserva bien esa inmediatez discursiva.
- source_word: אֶת אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre,
  - de tu padre
  lexicon: HALOT
  rationale: El marcador אֶת no se traduce; el destinatario se expresa con «a». Evito añadir explicaciones que el hebreo no requiere.
- source_word: מְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - hablando
  lexicon: HALOT
  rationale: 'En español, después de «he oído», la construcción más natural es infinitiva: «he oído ... hablar». Así se conserva el valor verbal del participio sin forzar una perífrasis menos idiomática.'
- source_word: אֶל עֵשָׂו
  english_pob_choice: to Esau
  chosen_spanish: a Esaú
  alternatives_spanish:
  - con Esaú
  lexicon: HALOT
  rationale: La preposición אֶל expresa dirección hacia un destinatario; «a Esaú» lo reproduce con fidelidad.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  lexicon: HALOT
  rationale: Conservo la identificación relacional directa, como en el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: El segundo לֵאמֹר introduce el contenido del discurso que continúa en el siguiente versículo. «Diciendo» mantiene la señal de cita abierta; en español no es necesario reproducir literalmente una coma inglesa, pero sí la continuidad sintáctica.
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa, que conservó el participio en «speaking» y el segundo לֵאמֹר como «saying». En español decidí evitar la duplicación poco natural «hablando, diciendo» y opté por una frase fluida con infinitivo + gerundio implícito en el contexto; aun así, mantengo abierto el enlace de cita para que el lector vea que el discurso continúa en el versículo siguiente.
  spanish_consistency_notes:
  - Usé «Rebeca», «Jacob» y «Esaú» con las formas españolas estándar ya consolidadas.
  - Mantuve «Y» al inicio para reflejar la conjunción narrativa del hebreo.
  - 'Conservé «su hijo» con nota alternativa para no perder la posibilidad de una lectura más explícita: «a su hijo Jacob».'
  - Elegí «Mira» para הִנֵּה por claridad moderna y registro bíblico digno.
  - La secuencia verbal «he oído ... hablar ... diciendo» intenta respetar tanto la acción oída como la introducción de la cita, sin traducir mecánicamente el orden inglés.
