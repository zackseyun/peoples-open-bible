  yaml_path: translation/ot/1_samuel/020/030.yaml
  text: Then Saul’s anger burned against Jonathan[a], and he said to him, “You son of a perverse, rebellious woman! Do I not know that you have chosen the son of Jesse[c][b], to your own shame and to the shame of your mother’s nakedness?”
  footnotes:
