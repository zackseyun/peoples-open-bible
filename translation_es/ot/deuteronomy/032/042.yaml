translation:
  language: es
  text: 'Embriagaré mis flechas con sangre, y mi espada devorará carne: con la sangre de los muertos y de los cautivos, de las cabezas[a] de los líderes del enemigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «de las cabezas cabelludas del enemigo» o «de la cabeza de los líderes del enemigo». El hebreo es difícil, especialmente la palabra rara פַּרְעוֹת.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁכִּיר
  english_pob_choice: I will make drunk
  chosen_spanish: Embriagaré
  alternatives_spanish:
  - Empaparé
  - Embriagaré completamente
  lexicon: HALOT
  rationale: El hebreo hifil de שׁכר expresa literalmente ‘hacer beber en exceso / embriagar’. En español, ‘embriagaré’ conserva la metáfora viva y el tono poético de juicio, mejor que una neutralización como ‘empaparé’.
- source_word: חִצַּי
  english_pob_choice: my arrows
  chosen_spanish: mis flechas
  alternatives_spanish:
  - mis saetas
  - mis dardos
  lexicon: HALOT
  rationale: ‘Flechas’ es la opción natural y clara en español moderno, sin perder la imaginería bélica del plural con sufijo posesivo.
- source_word: מִדָּם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - de sangre
  - a causa de sangre
  lexicon: HALOT
  rationale: 'Aunque la preposición מִן puede leerse literalmente ‘de/desde’, el contexto idiomático de ‘hacer embriagar’ pide una expresión instrumental en español: ‘con sangre’.'
- source_word: תֹּאכַל בָּשָׂר
  english_pob_choice: will devour flesh
  chosen_spanish: devorará carne
  alternatives_spanish:
  - comerá carne
  - consumirá carne
  lexicon: HALOT
  rationale: ‘Devorará’ transmite el valor violento e idiomático de ‘comer carne’ en un contexto de guerra y juicio, sin suavizarlo.
- source_word: חָלָל
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los heridos de muerte
  lexicon: HALOT
  rationale: En este contexto bélico, חָלָל designa a los caídos en combate, es decir, a los muertos por la violencia. ‘Los muertos’ es más natural en español y mantiene el sentido general del término.
- source_word: וְשִׁבְיָה
  english_pob_choice: and the captives
  chosen_spanish: y de los cautivos
  alternatives_spanish:
  - y los prisioneros
  - y de los cautivos hechos prisioneros
  lexicon: HALOT
  rationale: ‘Cautivos’ conserva la referencia personal del sustantivo en el contexto militar. Se evita ‘cautiverio’, que sería más abstracto.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the heads of
  chosen_spanish: desde las cabezas de
  alternatives_spanish:
  - de las cabezas de
  - desde la cabeza de
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la cabeza/cabezas, que el texto hebreo deja sin resolver de forma explícita.
- source_word: פַּרְעוֹת
  english_pob_choice: enemy leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los guerreros de cabellera suelta
  - los cabellerudos
  lexicon: HALOT
  rationale: 'La palabra es rara y discutida. En el texto principal se adopta una solución legible y sobria: ‘líderes’, siguiendo la línea del inglés POB de referirla a figuras principales enemigas, sin forzar una equivalencia especulativa.'
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: del enemigo
  alternatives_spanish:
  - del adversario
  - del foe
  lexicon: HALOT
  rationale: El singular colectivo ‘enemigo’ funciona de modo natural en español y conserva la fuerza genérica del hebreo.
theological_decisions:
- issue: La frase difícil מֵרֹאשׁ פַּרְעוֹת אוֹיֵב
  english_pob_reading: from the heads of the enemy leaders
  chosen_spanish_reading: desde las cabezas de los líderes del enemigo
  alternative_spanish_readings:
  - desde la cabeza de los líderes del enemigo
  - desde las cabezas de los cabellos sueltos del enemigo
  - desde las cabezas de los guerreros del enemigo
  rationale: No se trata de un problema doctrinal sino léxico-sintáctico. La opción principal conserva la imagen de juicio sobre figuras dirigentes enemigas y evita imponer una interpretación demasiado literal o demasiado técnica de פַּרְעוֹת, que sigue siendo debatido.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo poético y coincide con el sentido general de la auditoría en inglés: sangre como medio de saturación, carne como objeto devorado, y una clausura difícil que se interpreta de manera sobria como referencia a líderes enemigos. No se introducen revisiones textuales nuevas ni cambios doctrinales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en otros versículos del proyecto, aunque este versículo no lo contiene.
  - Se usa «cautivos» para conservar el matiz personal de וְשִׁבְיָה.
  - Se evita «Señor» o fórmulas de sustitución donde no corresponde, y se preserva el lenguaje bélico directo del pasaje.
  - La solución de פַּרְעוֹת prioriza claridad pública sin borrar la tensión lexical documentada en la nota.
