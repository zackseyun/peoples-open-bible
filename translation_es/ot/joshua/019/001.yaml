translation:
  language: es
  text: La segunda suerte[a] salió para Simeón, para la tribu de los hijos de Simeón, según sus clanes[b], y su herencia estaba dentro de la herencia de los hijos de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La segunda suerte cayó para Simeón». El hebreo dice literalmente «salió», refiriéndose al resultado de echar suertes.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Simeón» y «hijos de Judá» son designaciones tribales hebreas; se refieren a los descendientes o miembros de esas tribus.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - se echó
  - salió la suerte
  lexicon: HALOT
  rationale: El hebreo literalmente dice que ‘salió’. En el contexto del reparto por suertes, ‘salió’ conserva la imagen procedimental del texto sin volverse antinatural en español.
- source_word: הַגּוֹרָל
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - sorteo
  lexicon: HALOT
  rationale: En español bíblico, ‘suerte’ transmite bien el objeto del sorteo y la distribución territorial. ‘Lote’ podría sonar más técnico o administrativo; ‘suerte’ mantiene la conexión con el acto de echar suertes.
- source_word: הַשֵּׁנִי
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - segundo
  lexicon: HALOT
  rationale: Ajuste de género para concordar con ‘suerte’.
- source_word: לְשִׁמְעוֹן
  english_pob_choice: for Simeon
  chosen_spanish: para Simeón
  alternatives_spanish:
  - a Simeón
  lexicon: HALOT
  rationale: La preposición ל marca al destinatario o beneficiario del reparto; ‘para Simeón’ es natural y fiel en español.
- source_word: לְמַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: para la tribu de
  alternatives_spanish:
  - para el bastón de
  - para la rama de
  lexicon: HALOT
  rationale: En contexto tribal, מַטֶּה significa ‘tribu’. Se conserva el valor genealógico y territorial.
- source_word: בְנֵי שִׁמְעוֹן
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - los descendientes de Simeón
  - la casa de Simeón
  lexicon: HALOT
  rationale: ‘Hijos de’ reproduce el idiomatismo hebreo y coincide con el uso pactual/tribal del texto. Se evita ‘descendientes’ porque suaviza la forma concreta del hebreo.
- source_word: לְמִשְׁפְּחוֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En estos contextos, מִשְׁפָּחוֹת no se limita a la familia nuclear; ‘clanes’ comunica mejor la unidad social tribal sin perder claridad.
- source_word: וַיְהִי
  english_pob_choice: and ... was
  chosen_spanish: y ... estaba
  alternatives_spanish:
  - y fue
  - y resultó
  lexicon: HALOT
  rationale: Aquí היה introduce el estado resultante de la heredad; ‘estaba’ suena natural en español y preserva la relación estática del versículo.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión
  lexicon: HALOT
  rationale: ‘Herencia’/‘heredad’ son ambas posibles; ‘herencia’ es más transparente para lectores actuales y mantiene el sentido de lote territorial otorgado.
- source_word: בְּתוֹךְ
  english_pob_choice: within
  chosen_spanish: dentro de
  alternatives_spanish:
  - en medio de
  - en el interior de
  lexicon: HALOT
  rationale: ‘Dentro de’ expresa bien la ubicación interna dentro del territorio de Judá y evita una formulación demasiado literaria.
- source_word: נַחֲלַת בְּנֵי יְהוּדָה
  english_pob_choice: the inheritance of the sons of Judah
  chosen_spanish: la herencia de los hijos de Judá
  alternatives_spanish:
  - la heredad de los hijos de Judá
  - el territorio de los hijos de Judá
  lexicon: HALOT
  rationale: Se mantiene la terminología de ‘herencia’ para נַחֲלָה y la fórmula tribal ‘hijos de Judá’ para respetar el paralelismo del hebreo y la consistencia interna del pasaje.
translation_notes:
  revision_awareness: 'El texto hebreo es breve y coincide estrechamente con la traducción inglesa auditada. Se mantuvieron las decisiones nucleares del POB: salida de la suerte, lenguaje tribal filial, y herencia territorial dentro de Judá. No se detectaron revisiones previas aplicables al versículo.'
  spanish_consistency_notes:
  - Se conserva ‘suerte’ para גּוֹרָל y ‘herencia’ para נַחֲלָה, manteniendo la distinción entre el sorteo y el territorio asignado.
  - Se mantiene la fórmula tribal ‘hijos de X’ para reflejar el hebreo y la coherencia con otros pasajes del mismo bloque.
  - ‘Dentro de’ traduce בְּתוֹךְ con claridad moderna sin perder la relación espacial de inclusión.
