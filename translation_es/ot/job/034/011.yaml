translation:
  language: es
  text: Porque él retribuye al hombre conforme a su obra[a], y le hace encontrar conforme al camino de un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hace que le sobrevenga» o «trae sobre él», reflejando el sentido causativo del verbo hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación anterior. «Porque» preserva la fuerza causal/explicativa de כִּי en un español natural y digno.
- source_word: פֹעַל
  english_pob_choice: deed
  chosen_spanish: obra
  alternatives_spanish:
  - hecho
  - acción
  lexicon: HALOT
  rationale: El sustantivo apunta a lo realizado por la persona. «Obra» mantiene el sentido de acto concreto y encaja bien con el marco retributivo del versículo; en español resulta más natural que una repetición rígida de «deed» como «hazaña» o un calco demasiado abstracto.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al ser humano
  lexicon: HALOT
  rationale: Se conserva el singular representativo del hebreo. «Al hombre» mantiene la forma general/genérica del original y su paralelismo con אִישׁ sin neutralizar innecesariamente la referencia.
- source_word: יְשַׁלֶּם לוֹ
  english_pob_choice: he repays a man
  chosen_spanish: paga ... conforme
  alternatives_spanish:
  - recompensa
  - retribuye
  lexicon: HALOT
  rationale: El piel de שלם expresa pagar/retribuir según conducta. «Paga» comunica la idea básica de retribución en español actual; «conforme» ayuda a explicitar la correspondencia sin sobrecargar el verbo.
- source_word: וּכְאֹרַח
  english_pob_choice: according to ... way
  chosen_spanish: conforme al camino
  alternatives_spanish:
  - según el camino
  - de acuerdo con la senda
  lexicon: HALOT
  rationale: אֹרַח es literalmente «camino/senda» y aquí es metafórico de modo de vida o conducta. «Camino» conserva la metáfora bíblica sin forzar una paráfrasis.
- source_word: אִישׁ
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de cada hombre
  lexicon: HALOT
  rationale: Mantiene el paralelismo con אָדָם y el valor representativo del sustantivo singular masculino. «Del hombre» suena natural en español y conserva el eco genérico del hebreo.
- source_word: יַמְצִאֶנּוּ
  english_pob_choice: he makes him find
  chosen_spanish: lo hace hallar
  alternatives_spanish:
  - lo hace encontrarse con
  - lo hace experimentar
  lexicon: HALOT
  rationale: El hifil de מצא puede expresar causar que alguien encuentre o experimente algo. «Lo hace hallar» sigue de cerca la forma verbal hebrea y preserva la ambigüedad entre encontrar y verse confrontado con las consecuencias.
theological_decisions:
- issue: Retribución divina según la conducta humana
  english_pob_reading: The verse states that God repays each human in accordance with his deeds and way, without importing a broader doctrinal claim that all suffering in Job is a direct one-to-one punishment.
  chosen_spanish_reading: 'El versículo afirma un principio general de justicia retributiva: Dios paga al ser humano conforme a su obra y a su camino, sin convertirlo en una explicación total de todo sufrimiento en Job.'
  alternative_spanish_readings:
  - Todo sufrimiento es una punición exacta por cada pecado personal
  - El texto no habla de retribución
  rationale: La redacción debe conservar la tensión del libro. El hebreo expresa un principio general de correspondencia moral, pero no obliga a resolver simplistamente la cuestión del sufrimiento en Job.
  doctrine_reference: Preservar la tensión teológica del libro de Job.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y solo señaló observaciones menores, sin afectar la sustancia del versículo.
  spanish_consistency_notes:
  - Se mantiene «Dios» solo cuando el contexto lo requiera; en este versículo el sujeto implícito sigue el hebreo sin necesidad de nombrarlo.
  - Se conservó la metáfora de «camino» para אֹרַח en vez de reemplazarla por una paráfrasis moralizante.
  - «Hallar» se usó para respetar la cercanía formal con יַמְצִאֶנּוּ y permitir la nota con alternativas interpretativas.
  - No se introdujo lenguaje eclesiástico tradicional que altere el tono sapiencial/jurídico del hebreo.
