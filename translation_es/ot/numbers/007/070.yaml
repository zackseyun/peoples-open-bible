translation:
  language: es
  text: un macho cabrío para una ofrenda por el pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "como ofrenda por el pecado". El hebreo חַטָּאת puede significar "pecado" o, en contextos sacrificiales como este, "ofrenda por el pecado".
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho de las cabras
  alternatives_spanish:
  - macho cabrío
  - cabro
  - cabrío macho
  lexicon: HALOT
  rationale: El hebreo designa un macho de la especie caprina en contexto sacrificial. En español, "macho de las cabras" conserva con claridad el valor zoológico y evita introducir un término más técnico o regional que podría oscurecer el registro inventarial del capítulo. "Macho cabrío" también sería posible, pero la formulación elegida sigue de cerca la estructura del sustantivo compuesto sin perder naturalidad.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: El numeral expresa la cantidad exacta del animal ofrecido. En español, "uno" mantiene el conteo explícito del inventario ritual, aunque en esta posición también podría leerse naturalmente como artículo indefinido; el contexto numérico favorece la lectura numeral.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para una ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para expiación
  - para un sacrificio por el pecado
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede referirse metonímicamente a la ofrenda por el pecado. En español, "ofrenda por el pecado" comunica ese sentido cultual sin reducirlo a la abstracción de "pecado". "Para" refleja bien el ל prefijado en una lista de ofrendas, y "una" conserva el carácter contable del elemento listado.
theological_decisions:
- issue: Valor cultual de חַטָּאת
  english_pob_reading: The Hebrew can mean 'sin' or, in sacrificial contexts like this one, 'sin offering.'
  chosen_spanish_reading: En este contexto, חַטָּאת se entiende como una ofrenda por el pecado.
  alternative_spanish_readings:
  - pecado
  - ofrenda por el pecado
  rationale: El versículo forma parte de un inventario de ofrendas, por lo que la lectura cultual es exigida por el contexto. Traducir simplemente "pecado" debilitaría el sentido sacrificial y desharía la equivalencia con la nota inglesa auditada.
  doctrine_reference: Levítico 4; Números 7
translation_notes:
  revision_awareness: El pasaje coincide con el estado revisado más reciente del inglés POB y fue confirmado sin cambios; no se detectan revisiones textuales adicionales que afecten la decisión española.
  spanish_consistency_notes:
  - Se mantiene el registro inventarial breve propio de Números 7.
  - Se conserva el sentido sacrificial de חַטָּאת mediante "ofrenda por el pecado" en lugar de un equivalente más abstracto.
  - El marcador de nota [a] se ancla en la frase "ofrenda por el pecado" para reflejar la alternativa lexical auditada.
