translation:
  language: es
  text: Y vendrán muchos pueblos y naciones poderosas para buscar a Yahvé de los ejércitos en Jerusalén y para implorar el favor[a] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rostro de Yahvé». El hebreo dice literalmente «el rostro de Yahvé», un modismo que significa pedir su favor o su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a
  - llegarán
  lexicon: HALOT
  rationale: El perfecto con waw consecutiva en contexto profético expresa futuro; «vendrán» suena natural en español y conserva el valor predictivo.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchos pueblos y gentes
  - muchas naciones
  lexicon: HALOT
  rationale: «Pueblos» refleja היטב עַמִּים y mantiene la distinción con el siguiente גּוֹיִם, evitando borrar la diferencia semántica entre ambos términos.
- source_word: וְגוֹיִם עֲצוּמִים
  english_pob_choice: mighty nations
  chosen_spanish: naciones poderosas
  alternatives_spanish:
  - naciones fuertes
  - naciones poderosas y numerosas
  lexicon: HALOT
  rationale: «Naciones» conserva el sentido político-colectivo de גּוֹיִם; «poderosas» transmite la fuerza de עֲצוּמִים de manera idiomática en español.
- source_word: לְבַקֵּשׁ אֶת יְהוָה צְבָאוֹת
  english_pob_choice: to seek Yahweh of hosts
  chosen_spanish: para buscar a Yahvé de los ejércitos
  alternatives_spanish:
  - para buscar a Yahvé de los ejércitos de
  - para buscar a Yahvé de los ejércitos
  lexicon: HALOT
  rationale: «Buscar» corresponde a בקשׁ en este contexto de búsqueda religiosa. Se conserva «Yahvé» como nombre divino y «de los ejércitos» para צְבָאוֹת, siguiendo la preferencia del proyecto por no ocultar el título hebreo.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa simple se traduce de forma directa; «en Jerusalén» es la opción natural y fiel para el marco de peregrinación.
- source_word: וּלְחַלּוֹת אֶת פְּנֵי יְהוָה
  english_pob_choice: and to entreat the favor of Yahweh
  chosen_spanish: y para implorar el favor[a] de Yahvé
  alternatives_spanish:
  - y para implorar el rostro de Yahvé
  - y para pedir el favor de Yahvé
  - y para suplicar ante el rostro de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa el modismo «hacer suave/ablandar el rostro»; en español, «implorar el favor» comunica el valor idiomático de petición de gracia sin volverlo extraño. Se ancla la nota porque el texto literal menciona «el rostro».
theological_decisions:
- issue: Renderizado del Tetragrámaton YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene יְהוָה directamente; el proyecto manda usar «Yahvé» en español para preservar el nombre divino y evitar el ocultamiento devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de צְבָאוֹת
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - Todopoderoso
  - de las huestes
  rationale: «De los ejércitos» conserva la imaginería militar/cósmica del título hebreo y sigue la preferencia del POB por una equivalencia cercana antes que una abstracción como «Todopoderoso».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Modismo חלה את־פני
  english_pob_reading: to entreat the favor of Yahweh
  chosen_spanish_reading: implorar el favor de Yahvé
  alternative_spanish_readings:
  - implorar el rostro de Yahvé
  - buscar el favor de Yahvé
  - suplicar la presencia de Yahvé
  rationale: 'La metáfora de «rostro» se mantiene en la nota, pero en el cuerpo español se opta por el sentido idiomático claro: pedir favorablemente la atención/divina benevolencia.'
  doctrine_reference: HALOT; uso idiomático del hebreo bíblico
translation_notes:
  revision_awareness: El audit trail inglés indica acuerdo alto y ningún cambio en la última revisión; la redacción española sigue de cerca las decisiones léxicas confirmadas, especialmente la distinción entre עַמִּים y גּוֹיִם, el nombre divino Yahvé y el modismo de «buscar/implorar el favor» con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se traduce צְבָאוֹת como «de los ejércitos» para preservar el título hebreo.
  - «Pueblos» y «naciones» se distinguen deliberadamente para reflejar el paralelo hebreo.
  - La nota de pie de página ancla la alternativa literal «rostro» sin sustituir la traducción idiomática principal.
