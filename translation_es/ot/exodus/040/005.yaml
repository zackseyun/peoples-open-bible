revisions:
- from: Y pondrás el altar de oro[a] para incienso delante del arca del testimonio[b], y pondrás el velo de la entrada del tabernáculo.
  to: Y pondrás el altar de oro[a] para incienso delante del arca del testimonio[b], y pondrás la cortina de la entrada del tabernáculo.
  rationale: Se reemplaza «velo» por «cortina» para reflejar mejor מָסַךְ y preservar la distinción terminológica documentada frente al velo interior. Se corrige la nota [a] para que la alternativa tradicional conserve el rasgo explícito «de oro» presente en el hebreo y en la auditoría inglesa. Se mantiene «pondrás» en ambos verbos por naturalidad del español y porque sigue siendo fiel al sentido fuente.
