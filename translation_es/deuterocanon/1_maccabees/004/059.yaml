review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la decisión formal de Judas, sus hermanos y toda la asamblea de Israel; la observancia anual de los días de dedicación del altar; su duración de ocho días; su inicio el día veinticinco del mes; y el tono festivo final. Sin embargo, «se celebraran» reduce ligeramente la fuerza de ἵνα ἄγωνται, que en el contexto apunta más ampliamente a la observancia/celebración establecida de una fiesta recurrente. Además, la nota textual inglesa está anclada de manera poco necesaria en «celebraran» en vez de en el nombre del mes, donde realmente corresponde la variante transliterada.'
  spanish_quality_summary: El español es claro, natural y digno. «Asamblea», «decretaron», «año tras año» y «con alegría y gozo» funcionan bien. No obstante, «se observaran» preserva mejor el matiz de observancia litúrgica periódica que «se celebraran», sin perder naturalidad. También conviene mover la llamada de nota al nombre del mes para mayor precisión editorial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Asamblea» para ἐκκλησία está bien justificado y evita anacronismo eclesial. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La transliteración «Quisleu» es aceptable en español, y la nota con alternativa «Kislev» debe conservarse, pero anclada en el mes.
  issues:
  - severity: medium
    issue: «se celebraran» atenúa el sentido de observancia anual de ἵνα ἄγωνται
    rationale: El griego, en contexto de días festivos fijados año tras año, expresa la observancia/celebración establecida de una fiesta. «Se observaran» o «se guardaran» conserva mejor ese valor institucional y calendárico que «se celebraran», que puede sonar más solo festivo.
  - severity: low
    issue: La nota [a] está anclada en «celebraran» en vez de en «Quisleu»
    rationale: La nota explica la transliteración de Χασελεύ, por lo que debe marcar el nombre del mes, no el verbo de observancia. Esto mejora fidelidad editorial y legibilidad.
  revised_spanish_text: Y Judas, sus hermanos y toda la asamblea de Israel decretaron que los días de la dedicación del altar se observaran en sus tiempos señalados, año tras año, durante ocho días, desde el vigésimo quinto día del mes de Quisleu[a], con alegría y gozo.
  revised_footnotes:
  - marker: a
    text: El griego Χασελεύ refleja el nombre judío del mes, frecuentemente escrito «Quisleu» o «Kislev» en español.
    reason: lexical_alternative
  revision_rationale: Se ajusta «se celebraran» a «se observaran» para reflejar mejor la fuerza de observancia festiva recurrente de ἵνα ἄγωνται en este contexto. También se reubica la nota textual al nombre del mes, que es donde corresponde la explicación de la transliteración Χασελεύ/Quisleu.
