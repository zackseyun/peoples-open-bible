    reason: lexical_alternative
  - marker: b
    text: '"Vapor" traduce hebel, palabra hebrea de transitoriedad o insustancialidad semejante al aliento; tradicionalmente, "vanidad".'
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción principal porque es fiel y natural, pero se corrige la nota [a] para reflejar con precisión la alternativa documentada en el POB inglés, sin desplazar indebidamente 'con reprensiones' al texto alternativo. También se ajusta la puntuación final de 'Selah'.
