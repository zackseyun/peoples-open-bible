id: 1PE.2.8
reference: 1 Peter 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ λίθος προσκόμματος καὶ πέτρα σκανδάλου· οἳ προσκόπτουσιν τῷ λόγῳ ἀπειθοῦντες· εἰς ὃ καὶ ἐτέθησαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/008.yaml
  text: 'and, "a stone of stumbling and a rock of offense." They stumble because they disobey the word, and to this they were also appointed.'
translation:
  language: ko
  text: '또한 「걸려 넘어지게 하는 돌이요 거치게 하는 바위」[a]도 됩니다. 그들은 말씀에 순종하지 아니하므로 걸려 넘어지는데, 이것에 정해져 있기도 한 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 8:14 인용.
    reason: ot_citation
lexical_decisions:
- source_word: λίθος προσκόμματος καὶ πέτρα σκανδάλου
  english_pob_choice: a stone of stumbling and a rock of offense
  chosen_korean: 걸려 넘어지게 하는 돌이요 거치게 하는 바위
  alternatives_korean:
  - 거치는 돌이요 부딪치게 하는 바위
  - 부딪치는 돌과 함정의 바위
  lexicon: BDAG
  rationale: 사 8:14 LXX 인용. πρόσκομμα(걸려 넘어지게 함), σκάνδαλον(올무·함정)을 한국어 어감에 맞게 「걸려 넘어지게 하는」, 「거치게 하는」으로 옮긴다.
- source_word: τῷ λόγῳ ἀπειθοῦντες
  english_pob_choice: because they disobey the word
  chosen_korean: 말씀에 순종하지 아니하므로
  alternatives_korean:
  - 말씀에 불순종함으로
  lexicon: BDAG
  rationale: ἀπειθέω의 「불순종함」을 평이하게 「순종하지 아니하다」로 옮긴다.
- source_word: εἰς ὃ καὶ ἐτέθησαν
  english_pob_choice: to this they were also appointed
  chosen_korean: 이것에 정해져 있기도 한 것입니다
  alternatives_korean:
  - 이 일에 정함을 받기도 하였습니다
  - 이를 위하여 두심을 받기도 한 것입니다
  lexicon: BDAG
  rationale: 신적 수동의 어감을 「정해져 있다」로 살리되, 「예정」 교리를 본문에 박지 않는다. 가리키는 대상(걸려 넘어짐인가 불순종인가)은 본문에서 모호하므로 그대로 둔다.
theological_decisions:
- issue: 「이것에 정해져 있다」의 지시 대상
  chosen_reading: '「이것」의 지시 대상을 본문대로 모호하게 두고 해석을 강요하지 않음'
  alternative_readings:
  - 걸려 넘어짐 자체로 한정
  - 불순종으로 한정
  rationale: 헬라어 본문이 의도적으로 모호하므로 번역도 그 모호성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존'
