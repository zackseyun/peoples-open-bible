translation:
  language: es
  text: La tierra está totalmente destrozada[a]; la tierra está completamente hecha pedazos; la tierra está violentamente sacudida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El país está totalmente destrozado; el país está completamente hecho pedazos; el país está violentamente sacudido».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעָה / הִתְרֹעֲעָה
  english_pob_choice: is utterly shattered
  chosen_spanish: está totalmente destrozada
  alternatives_spanish:
  - está completamente quebrada
  - está totalmente rota
  - está hecha pedazos
  lexicon: HALOT
  rationale: El hebreo intensifica la idea de ruptura mediante la forma verbal reforzada. «Totalmente destrozada» conserva el sentido de ruina extrema y la intensificación sin sonar forzado en español.
- source_word: הָ/אָ֑רֶץ / אֶרֶץ / אָֽרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra habitable
  lexicon: HALOT
  rationale: En este contexto de juicio cósmico, la referencia es global. «La tierra» mantiene la amplitud de «the earth» y permite repetir el sustantivo como en el hebreo.
- source_word: פּוֹר / הִתְפּוֹרְרָה
  english_pob_choice: is completely broken apart
  chosen_spanish: está completamente deshecha
  alternatives_spanish:
  - está desmenuzada
  - está totalmente fragmentada
  - está completamente partida
  lexicon: HALOT
  rationale: El hebreo comunica desintegración o desmoronamiento distinto del primer verbo. «Deshecha» expresa la fragmentación del conjunto con naturalidad en español y conserva la fuerza de la repetición intensiva.
- source_word: מוֹט / הִתְמוֹטְטָה
  english_pob_choice: is violently shaken
  chosen_spanish: está violentamente sacudida
  alternatives_spanish:
  - está tambaleándose con violencia
  - está fuertemente estremecida
  - está violentamente tambaleante
  lexicon: HALOT
  rationale: El verbo מוט indica sacudida, vacilación o tambaleo. «Violentemente sacudida» refleja bien la convulsión catastrófica y distingue esta cláusula de las anteriores.
translation_notes:
  revision_awareness: El texto base inglés fue revisado una vez y quedó sin cambios; la concordancia general con el análisis de referencia es alta. La versión española sigue de cerca esa lectura y conserva la repetición triple del sustantivo para reflejar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se prefirió «la tierra» a «el país» por el marco de juicio universal del pasaje.
  - Se mantuvo la triple repetición de «la tierra» para reproducir el énfasis retórico del hebreo.
  - «Destrozada», «deshecha» y «sacudida» distinguen los tres verbos hebreos sin perder la intensificación.
  - Se evitó suavizar el primer y segundo miembros para no borrar la fuerza acumulativa del original.
