  yaml_path: translation/ot/1_kings/010/009.yaml
  text: Blessed be Yahweh your God[a], who delighted in you to set you on the throne of Israel. Because Yahweh loved Israel forever, he has made you king to administer justice and righteousness.
  footnotes:
