translation:
  language: es
  text: Conoce bien el estado de tu rebaño[a]; pon tu corazón en los rebaños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Conoce, conoce el rostro de tu rebaño». La expresión hebrea es idiomática y significa conocer bien su condición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los hatos». El término final puede abarcar grupos de ganado en general; también puede solaparse en sentido con «rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֹעַ תֵּדַע
  english_pob_choice: Know well
  chosen_spanish: Conoce bien
  alternatives_spanish:
  - Conoce con certeza
  - Conoce diligentemente
  - Bien conoce
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica el mandato. «Conoce bien» comunica esa fuerza enfática en español natural, sin perder el tono exhortativo.
- source_word: פְּנֵי
  english_pob_choice: the condition of
  chosen_spanish: el estado de
  alternatives_spanish:
  - la cara de
  - la condición de
  - la apariencia de
  lexicon: HALOT
  rationale: Literalmente es «rostro/cara de», pero el uso idiomático apunta al estado observable o situación del rebaño. «Estado de» conserva el sentido sin calco duro.
- source_word: צֹאנְךָ
  english_pob_choice: your flock
  chosen_spanish: tu rebaño
  alternatives_spanish:
  - tu rebaño de ovejas
  - tus ovejas
  - tu ganado menor
  lexicon: HALOT
  rationale: צֹאן suele designar ganado menor, especialmente ovejas y cabras. «Rebaño» es idiomático y suficientemente amplio para el contexto pastoral del proverbio.
- source_word: שִׁית
  english_pob_choice: set
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - dirige
  - aplica
  lexicon: HALOT
  rationale: El imperativo expresa poner o fijar la atención. «Pon tu corazón» funciona de manera natural en español y conserva el valor exhortativo.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu atención
  - tu interés
  lexicon: HALOT
  rationale: Se conserva «corazón» para reflejar la antropología hebrea y el estilo proverbial, donde incluye atención, intención y cuidado.
- source_word: לַעֲדָרִים
  english_pob_choice: the herds
  chosen_spanish: los hatos
  alternatives_spanish:
  - los rebaños
  - los rodeos
  - los hatos de animales
  lexicon: HALOT
  rationale: עֲדָרִים puede referirse a grupos de animales. «Hatos» permite distinguir este segundo término de צֹאן, que ya se traduce como «rebaño», y mantiene el paralelismo del verso.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa de referencia coinciden en el sentido general. Se ajustó el español para evitar un calco literal de «rostro» y para distinguir con naturalidad entre צֹאן y עֲדָרִים mediante «rebaño» / «hatos».
  spanish_consistency_notes:
  - Se mantuvo un registro proverbial, breve y exhortativo.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el verso.
  - La elección de «hatos» para עֲדָרִים preserva la distinción léxica frente a צֹאן en el primer hemistiquio.
