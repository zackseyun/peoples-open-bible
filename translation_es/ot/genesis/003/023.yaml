translation:
  language: es
  text: Entonces Yahvé Dios lo envió fuera del jardín de Edén para trabajar[a] la tierra, de la cual había sido tomado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cultivar». El verbo hebreo puede significar «trabajar», «servir» o, en este contexto, «cultivar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלְּחֵהוּ
  english_pob_choice: sent him out
  chosen_spanish: lo expulsó
  alternatives_spanish:
  - lo envió fuera
  - lo mandó salir
  lexicon: HALOT
  rationale: El hebreo שׁלח en esta forma puede expresar un envío con fuerza de alejamiento. En español, «lo expulsó» comunica con naturalidad la salida forzada del huerto, mientras que conserva el movimiento expulsivo del contexto inmediato, aunque la versión inglesa optó por un matiz menos fuerte. Mantengo el efecto narrativo sin añadir un verbo más técnico que el hebreo no exige por sí mismo.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - Yahvé, el Dios
  lexicon: DOCTRINE default + Hebrew compound designation
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al marco terminológico del proyecto, y se une con «Dios» para reflejar la designación compuesta יְהוָה אֱלֹהִים. No se oculta el nombre propio detrás de «SEÑOR».
- source_word: מִגַּן עֵדֶן
  english_pob_choice: from the garden of Eden
  chosen_spanish: del jardín de Edén
  alternatives_spanish:
  - desde el jardín de Edén
  - fuera del jardín de Edén
  lexicon: HALOT
  rationale: La preposición מִן indica separación de un lugar; en español, «del jardín de Edén» suena natural y mantiene la relación locativa sin sobretraducirla. «Jardín» es más idiomático que «huerto» en este contexto para la mayoría de lectores, sin perder el referente bíblico.
- source_word: לַעֲבֹד
  english_pob_choice: to work
  chosen_spanish: para trabajar
  alternatives_spanish:
  - para cultivar
  - para servir
  lexicon: HALOT
  rationale: עבד puede significar «trabajar», «servir» o, en contexto agrícola, «cultivar». Se eligió «trabajar» como equivalente amplio y claro en español; la nota conserva la posibilidad de «cultivar», tal como el audit trail inglés preservó la alternativa lexical.
- source_word: אֶת הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivable
  lexicon: HALOT
  rationale: אֲדָמָה remite a la tierra/suelo del relato de Génesis 2–3. «La tierra» es más natural en español que «el suelo» y conserva la conexión con el material de origen del hombre y del cultivo.
- source_word: אֲשֶׁר לֻקַּח מִשָּׁם
  english_pob_choice: from which he had been taken
  chosen_spanish: de la cual había sido tomado
  alternatives_spanish:
  - de donde había sido tomado
  - de la que fue tomado
  lexicon: HALOT
  rationale: La relativa modifica «la tierra» en español. El pluscuamperfecto «había sido tomado» refleja que la toma antecede a la expulsión, como en el inglés auditado. «De la cual» mantiene el antecedente femenino («tierra») con precisión gramatical.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión terminológica del proyecto de representar יְהוָה como «Yahvé» en el texto principal, en lugar de usar un sustituto reverencial. Esto preserva el nombre propio del pacto y evita borrar la referencia explícita del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default Yahvé'
- issue: Ambito de לַעֲבֹד aplicado a la tierra
  english_pob_reading: to work the ground
  chosen_spanish_reading: para trabajar la tierra
  alternative_spanish_readings:
  - para cultivar la tierra
  - para servir a la tierra
  rationale: El hebreo permite una gama semántica que incluye trabajo y cultivo. La redacción española mantiene el sentido básico sin estrecharlo demasiado; la nota al pie conserva la alternativa agrícola de «cultivar».
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético y concuerda con la auditoría inglesa: el verbo de expulsión se conserva con un matiz expulsivo natural en español; el nombre divino se traduce según la política del proyecto como Yahvé; y la ambigüedad de עבד se preserva con una nota que permite «cultivar» sin imponerla en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יְהוָה.
  - «Tierra» traduce aquí אֲדָמָה por claridad idiomática y cohesión con el pasaje, sin borrar la asociación con el suelo/ground.
  - La nota al pie usa una sola alternativa lexical y no introduce variantes doctrinales.
  - La construcción «de la cual había sido tomado» respeta el antecedente femenino de «tierra» y el tiempo previo a la expulsión.
