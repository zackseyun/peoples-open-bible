translation:
  language: es
  text: 'Y siete mujeres se asirán de un solo hombre en aquel día, diciendo: “Comeremos nuestro propio pan y vestiremos nuestra propia ropa; solo que tu nombre sea llamado sobre nosotras[a]. Quita nuestro oprobio[b].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “déjanos ser llamadas por tu nombre”; probablemente implica matrimonio o una vinculación legal/social con el hombre.
    reason: lexical_alternative
  - marker: b
    text: “Oprobio” se refiere a deshonra o vergüenza social; en este contexto, probablemente al estigma de carecer del nombre y la protección de un esposo después de la devastación descrita antes.
    reason: cultural_note
lexical_decisions:
- source_word: וְהֶחֱזִיקוּ
  english_pob_choice: will take hold of
  chosen_spanish: se asirán de
  alternatives_spanish:
  - tomarán por
  - agarrarán a
  - se aferrarán a
  lexicon: HALOT
  rationale: El verbo expresa un agarrar firme o urgente; “se asirán de” conserva esa fuerza directa sin añadir violencia que el contexto no exige.
- source_word: שֶׁבַע נָשִׁים
  english_pob_choice: seven women
  chosen_spanish: siete mujeres
  alternatives_spanish:
  - siete esposas
  - siete señoras
  lexicon: HALOT
  rationale: El hebreo dice literalmente “siete mujeres”; “esposas” introduciría una relación marital que todavía no está explicitada en el sustantivo.
- source_word: בְּאִישׁ אֶחָד
  english_pob_choice: of one man
  chosen_spanish: de un solo hombre
  alternatives_spanish:
  - a un solo hombre
  - sobre un solo hombre
  lexicon: HALOT
  rationale: La construcción se expresa con naturalidad en español como “de un solo hombre”; “un solo” preserva la unicidad enfática del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: “En aquel día” es una fórmula profética natural en español y mantiene el valor escatológico/judicial de la expresión.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Es la introducción normal del discurso directo y no requiere mayor expansión.
- source_word: לַחְמֵנוּ נֹאכֵל
  english_pob_choice: We will eat our own bread
  chosen_spanish: Comeremos nuestro propio pan
  alternatives_spanish:
  - Comeremos nuestro pan
  - Nos bastará nuestro pan
  lexicon: HALOT
  rationale: “Pan” traduce con precisión לחם; “propio” reproduce el énfasis de autosuficiencia que la POB destacó con “own.”
- source_word: וְשִׂמְלָתֵנוּ נִלְבָּשׁ
  english_pob_choice: and wear our own clothing
  chosen_spanish: y vestiremos nuestra propia ropa
  alternatives_spanish:
  - y nos pondremos nuestra ropa
  - y vestiremos nuestras vestiduras
  lexicon: HALOT
  rationale: “Vestiremos” expresa de forma natural נלבש; “ropa” comunica bien el sentido colectivo de שִׂמְלָה en español contemporáneo, y “propia” mantiene el énfasis.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo que
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: HALOT
  rationale: “Solo que” introduce la única condición solicitada con fluidez en español y conserva la restricción del hebreo.
- source_word: יִקָּרֵא שִׁמְךָ עָלֵינוּ
  english_pob_choice: let your name be called over us
  chosen_spanish: tu nombre sea llamado sobre nosotros
  alternatives_spanish:
  - seamos llamados por tu nombre
  - tu nombre sea invocado sobre nosotros
  lexicon: HALOT
  rationale: Se preserva el giro idiomático “ser llamado sobre” para no borrar la carga social/covenantal del hebreo; “tu nombre” reproduce el objeto gramatical de la forma pasiva/reflexiva.
- source_word: אֱסֹף
  english_pob_choice: Take away
  chosen_spanish: Quita
  alternatives_spanish:
  - Aparta
  - Retira
  lexicon: HALOT
  rationale: En este contexto, el verbo de “reunir/tomar” funciona idiomáticamente como “quitar”; “quita” es la forma más directa y natural en español.
- source_word: חֶרְפָּתֵנוּ
  english_pob_choice: our reproach
  chosen_spanish: nuestro oprobio
  alternatives_spanish:
  - nuestra vergüenza
  - nuestra deshonra
  lexicon: HALOT
  rationale: “Oprobio” preserva el peso social del término mejor que una mera sensación interna de vergüenza; mantiene el registro bíblico sin volverse arcaizante.
theological_decisions:
- issue: Sentido de “tu nombre sea llamado sobre nosotros”
  english_pob_reading: Retain the Hebrew idiom in the main text rather than making the implication explicit as “marry us.”
  chosen_spanish_reading: Mantener el giro idiomático “tu nombre sea llamado sobre nosotros” en el texto principal.
  alternative_spanish_readings:
  - cásate con nosotros
  - seamos llamadas por tu nombre
  - tu nombre sea puesto sobre nosotros
  rationale: El hebreo no usa un verbo ordinario de matrimonio; conservar la imagen evita sobreinterpretar. En español, la forma idiomática sigue siendo inteligible y deja abierta la carga social y de pertenencia implicada por el contexto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Matiz de “oprobio”
  english_pob_reading: Translate generally as social disgrace without specifying a single cause in the main text.
  chosen_spanish_reading: Traducirlo como “oprobio” sin precisar una sola causa en el texto principal.
  alternative_spanish_readings:
  - la vergüenza de no tener esposo
  - la deshonra de no tener hijos
  - la afrenta social
  rationale: El contexto apunta a una deshonra social vinculada con la devastación previa, pero el verso por sí solo no limita el sentido a una sola causa. “Oprobio” conserva amplitud semántica y el peso público del término.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión más reciente quedó sin cambios: alta concordancia con el texto fuente y con la auditoría inglesa; no fue necesario ajustar la redacción base.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se preserva el paralelismo verbal del hebreo con dos acciones cotidianas (“comeremos” / “vestiremos”) antes de la única petición.
  - Se evitó sustituir el giro idiomático por una paráfrasis matrimonial explícita en el texto principal para respetar la tensión documentada en la auditoría.
  - “Oprobio” se eligió por su peso social y público, en línea con el inglés POB “reproach.”
