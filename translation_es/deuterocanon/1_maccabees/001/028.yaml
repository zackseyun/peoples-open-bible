  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: ἐσείσθη → ''tembló''; ἡ γῆ → ''la tierra''; ἐπὶ τοὺς κατοικοῦντας αὐτήν → ''por los que habitaban en ella''; πᾶς ὁ οἶκος Ἰακώβ ἐνεδύσατο αἰσχύνην → ''toda la casa de Jacob se vistió de vergüenza''. La nota [a] es internamente incoherente: el texto dice ''la tierra tembló[a]'' pero la nota ofrece ''O «la tierra»'' como alternativa, que es exactamente lo mismo.'
  spanish_quality_summary: 'El texto principal es natural, digno y fiel al griego. La única reparación es la nota al pie: debe ofrecer ''el país'' como alternativa más estrecha a ''la tierra'', siguiendo el patrón del POB inglés (''Or the land shook'').'
  glossary_alignment: Sin conflictos terminológicos. 'Casa de Jacob' correcto. 'Vergüenza' para αἰσχύνη correcto.
  issues:
  - severity: medium
    issue: La nota [a] repite 'la tierra' como alternativa cuando el texto principal ya dice 'la tierra'.
    rationale: La nota inglesa dice 'Or the land shook'. En español la alternativa real a 'la tierra' (en sentido amplio) es 'el país' o 'la tierra/territorio', no repetir 'la tierra'.
  revised_spanish_text: Y la tierra tembló[a] por los que habitaban en ella, y toda la casa de Jacob se vistió de vergüenza.
  revised_footnotes:
  - marker: a
    text: O «el país tembló». El griego γῆ puede significar «tierra» o «país/territorio».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal por ser fiel al griego. Se corrige la nota para que exprese una alternativa léxica real ('el país') alineada con el POB inglés auditado.
