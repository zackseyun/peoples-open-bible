revisions:
- from: Anduvieron en desiertos[a], para que sus vidas fueran salvadas[b] del mal, y ante los ojos de la comunidad de los forasteros[c], una vida salvada de entre ellos fue preciosa.
  to: Vagaban en lugares desolados[a], para que sus vidas fueran salvadas[b] del mal, y a los ojos de la comunidad forastera[c], una vida salvada de entre ellos era preciosa.
  rationale: Se corrige una nota defectuosa, se mejora la naturalidad de ἐπλανῶντο con 'Vagaban', se sustituye 'desiertos' por 'lugares desolados' para reflejar mejor ἐρήμοις con una nota que preserve la alternativa 'desiertos', y se pule la expresión idiomática con 'a los ojos de' y 'comunidad forastera'. También se ajusta 'fue' a 'era' para una lectura más natural del predicado descriptivo.
