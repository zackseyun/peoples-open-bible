  text: By faith Abel offered to God a better sacrifice than Cain[a], through which he was attested as righteous, God testifying concerning his gifts; and through it, though he died[d][c][b], he still speaks.
  footnotes:
  - marker: a
    text: Or 'a greater sacrifice.' The comparative may emphasize either quality ('better') or magnitude ('greater').
    reason: lexical_alternative
  - marker: b
    text: Or 'he was commended to be righteous' or 'he was attested as righteous.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'through it' may refer to Abel's faith or to his sacrifice; the Greek is not fully explicit.
    reason: alternative_reading
  - marker: d
    text: Or 'he was testified to be righteous'.
    reason: previous_rendering
translation:
  language: ko
  text: 믿음으로 아벨은 가인보다 더 나은 제물을 하나님께 드렸으며, 그것을 통하여 의롭다고 인정받았습니다. 하나님께서 그의 예물에 대하여 증언하셨고, 그것을 통하여 그는 죽었으나 아직도 말합니다.
