translation:
  language: es
  text: Porque sabía que males se habían reunido contra él[a], y las fuerzas lo habían abandonado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidades se habían reunido contra él». El griego sugiere adversidades reunidas de manera concentrada y hostil contra él.
    reason: lexical_alternative
  - marker: b
    text: O «las tropas lo habían abandonado». «Las fuerzas» traduce el término militar δυνάμεις sin explicitar un posesivo que el griego no expresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  english_pob_choice: he knew
  chosen_spanish: sabía
  alternatives_spanish:
  - había sabido
  - se daba cuenta
  lexicon: LSJ
  rationale: El imperfecto de οἶδα expresa un estado de conocimiento en pasado; «sabía» comunica ese valor de manera natural en español.
- source_word: ἐπισυνῆκται
  english_pob_choice: had gathered
  chosen_spanish: habían reunidose
  alternatives_spanish:
  - se habían juntado
  - se habían congregado
  - se habían acumulado
  lexicon: LSJ
  rationale: La idea es de cosas/amenazas reunidas contra él en forma ya consumada; en español conviene una forma que conserve la concentración hostil del perfecto.
- source_word: ἐπʼ αὐτὸν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - en su contra
  lexicon: LSJ
  rationale: Con κακά y un verbo de reunión, la preposición acusativa se vuelve idiomáticamente «contra él» en español.
- source_word: κακά
  english_pob_choice: troubles
  chosen_spanish: males
  alternatives_spanish:
  - calamidades
  - desgracias
  - aflicciones
  lexicon: LSJ
  rationale: Aquí κακά no describe mal moral sino adversidad; «males» conserva amplitud y tono sobrio, aunque «calamidades» sería una alternativa posible.
- source_word: ἀφῆκαν
  english_pob_choice: had abandoned
  chosen_spanish: habían abandonado
  alternatives_spanish:
  - lo habían dejado
  - lo habían desamparado
  lexicon: LSJ
  rationale: El aoristo expresa que la ayuda o apoyo lo dejó atrás; «habían abandonado» refleja la fuerza de deserción que el contexto sugiere.
- source_word: αἱ δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - las tropas
  - los ejércitos
  lexicon: LSJ
  rationale: En contexto militar δυνάμεις apunta a fuerzas armadas; «las fuerzas» mantiene literalidad suficiente sin añadir posesivo no explícito.
translation_notes:
  revision_awareness: El testimonio inglés reciente cambió «had massed» por «had gathered» para mejorar la naturalidad; la versión española sigue esa misma decisión semántica con un verbo de reunión menos marcado. Se corrigió además la anclaje de notas para que cada nota aparezca exactamente en el texto.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico sin recurrir a fórmula eclesiástica añadida.
  - «Fuerzas» se conserva como término militar genérico, coherente con el audit trail inglés.
  - Las notas [a] y [b] están ancladas en el texto para evitar ambigüedad de validación.
