  lexicon: BDAG
  rationale: ἀφορμή의 「발판·빌미」 의미를 자연스럽게.
- source_word: δουλεύετε ἀλλήλοις
  english_pob_choice: serve one another
  chosen_korean: 서로 종노릇 하다
  alternatives_korean:
  - 서로 노예처럼 섬기다
