revisions:
- from: Oh Yahvé, Dios de los ejércitos[a], ¿hasta cuándo te enojarás contra la oración de tu pueblo?
  to: Yahvé, Dios de las huestes[a], ¿hasta cuándo te enojarás contra la oración de tu pueblo?
  rationale: Se ajusta el título divino a 'Dios de las huestes' para reflejar mejor el valor de צְבָאוֹת como título tradicional amplio, no limitado a ejércitos terrenales. Se elimina la interjección inicial para mejorar la naturalidad del español. Se corrige la nota para usar 'humear' en vez de 'fumar', preservando la metáfora hebrea sin introducir una asociación moderna impropia.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: invocación a Yahvé, título divino, fórmula de lamento ''¿hasta cuándo?'' y referencia a ''la oración de tu pueblo''. También respeta la política del proyecto de traducir יְהוָה como ''Yahvé''. Sin embargo, hay dos desajustes menores pero relevantes: (1) el vocativo ''Oh'' suena menos natural en español bíblico actual que ''Oh,'' o mejor sin interjección; y (2) ''de los ejércitos'' es aceptable, pero en este contexto el proyecto inglés documenta ''of hosts'' como título tradicional, y en español eclesial ''de las huestes'' preserva mejor el carácter titular sin restringirlo tanto a ejércitos terrestres. El manejo de עָשַׁנְתָּ como ''te enojarás'' es defendible dado el historial auditado en inglés, siempre que la nota conserve la metáfora de ''humear''.'
  spanish_quality_summary: La frase es clara y legible, pero puede pulirse para sonar más natural y digna en español neutro eclesial. 'Oh Yahvé, Dios de los ejércitos' funciona, aunque 'Yahvé, Dios de las huestes' lee mejor como título bíblico fijo. Además, la nota dice 'fumar', que en español moderno se asocia fuertemente con el acto de fumar tabaco y no conviene aquí; 'humear' o 'echar humo' transmite mejor la imagen hebrea.
  glossary_alignment: 'Alineación generalmente buena: ''Yahvé'' sigue la norma del proyecto; ''Dios'' para אֱלֹהִים es correcto; ''tu pueblo'' preserva bien el sentido pactual. El punto mejorable es צְבָאוֹת: ''ejércitos'' es posible, pero ''huestes'' refleja mejor el valor tradicional y cósmico documentado por el POB. La nota léxica debe evitar ''fumar'' y conservar la imagen de ''humear''.'
  issues:
  - severity: medium
    issue: Título divino 'de los ejércitos'
    rationale: Aunque comprensible, 'ejércitos' puede sonar más estrechamente militar y menos titular que 'huestes'. Dado que el inglés auditado prefirió 'hosts' precisamente para no sobreespecificar, el español 'huestes' preserva mejor esa amplitud tradicional.
  - severity: low
    issue: Interjección inicial 'Oh'
    rationale: No es incorrecta, pero resulta algo forzada en español contemporáneo. El versículo suena más natural y digno sin depender de esa interjección.
  - severity: low
    issue: Nota con 'fumar'
    rationale: En español moderno, 'fumar' se entiende primero como consumir tabaco. Para la imagen hebrea de ira, 'humear' o 'echar humo' es mucho más adecuado y menos equívoco.
  revised_spanish_text: Yahvé, Dios de las huestes[a], ¿hasta cuándo te enojarás contra la oración de tu pueblo?
  revised_footnotes:
  - marker: a
    text: 'O: «Dios de los ejércitos». Literalmente, el verbo hebreo evoca «humear» como imagen de ira; el texto principal expresa el sentido con naturalidad en español.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el título divino a 'Dios de las huestes' para reflejar mejor el valor de צְבָאוֹת como título tradicional amplio, no limitado a ejércitos terrenales. Se elimina la interjección inicial para mejorar la naturalidad del español. Se corrige la nota para usar 'humear' en vez de 'fumar', preservando la metáfora hebrea sin introducir una asociación moderna impropia.
