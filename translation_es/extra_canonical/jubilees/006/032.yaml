base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/032.yaml
  text: But if they transgress and do not observe them according to his command, then they will disturb all their seasons, and the years will be moved from this order, and they will transgress their ordinances.
  footnotes:
  - marker: a
    text: Or 'do not observe it'.
    reason: previous_rendering
  - marker: b
    text: Or 'all their seasons will be disturbed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:50Z'
    unchanged: false
    changes_summary: Changed 'them' to 'it' for singular agreement with the command/ordinance in context; removed the duplicated clause about seasons and years as likely secondary/repetitive material reflected in brackets; added the final clause 'and they will transgress their ordinances' to account for the closing source words.
translation:
  language: es
  text: Pero si transgreden y no observan esas observancias conforme a su mandamiento, entonces trastornarán todas sus estaciones, y los años se moverán fuera de este orden, y transgredirán sus estatutos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወኢገብርዎን
  english_pob_choice: do not observe them
  chosen_spanish: no observan estas[a]
  alternatives_spanish:
  - no las observan
  - no observan aquello
  - no observan el mandamiento
  lexicon: observe = guardar/observar; plural object suffix in Ge'ez
  rationale: El sufijo ge'ez es plural, y el contexto inmediato permite referirlo a los mandamientos/ordenanzas implícitos. En español, «estas» conserva esa pluralidad sin forzar un sustantivo repetido; por eso se deja la alternativa en nota.
- source_word: በከመ፡ ትእዛዙ፡ ሎቱ፡
  english_pob_choice: according to his command
  chosen_spanish: conforme a su mandamiento
  alternatives_spanish:
  - según su mandamiento
  - de acuerdo con su orden
  - conforme a su mandato
  lexicon: command = mandamiento/mandato
  rationale: «Mandamiento» es claro en español bíblico moderno y mantiene el valor normativo del término sin reducirlo a una simple instrucción.
- source_word: ያማስኑ፡ ጊዜያቲሆሙ፡
  english_pob_choice: they will disturb all their seasons
  chosen_spanish: ellos trastornarán todas sus estaciones
  alternatives_spanish:
  - ellos corromperán todas sus estaciones
  - alterarán todas sus estaciones
  - perturbarán todas sus estaciones
  lexicon: disturb/corrupt = trastornar/alterar
  rationale: 'El contexto y la revisión indican voz activa: los transgresores son el sujeto. «Trastornarán» comunica bien el desorden causado en sus ciclos/tiempos.'
- source_word: ወዓመታትሂ፡ ይትሐወሱ፡ እምውስተዝ
  english_pob_choice: and the years will be moved from this order
  chosen_spanish: y los años se moverán fuera de este orden
  alternatives_spanish:
  - y los años serán movidos fuera de este orden
  - y los años serán desplazados de este orden
  - y los años cambiarán de este orden
  lexicon: be moved = ser movidos/desplazarse
  rationale: «Se moverán» conserva la idea de desplazamiento sin introducir necesariamente un agente explícito, que el ge'ez no requiere aquí de modo inmediato. «Fuera de este orden» refleja el orden/ciclo establecido.
- source_word: ወይትዐደዉ፡ ሥርዐቶሙ
  english_pob_choice: and they will transgress their ordinances
  chosen_spanish: y transgredirán sus estatutos
  alternatives_spanish:
  - y quebrantarán sus ordenanzas
  - y violarán sus estatutos
  - y traspasarán sus ordenanzas
  lexicon: ordinances = statutes/ordinances
  rationale: «Estatutos» es un término bíblico español estable y suficientemente técnico para tradiciones normativas; evita el matiz demasiado eclesial de otras opciones y conserva el plural del original.
theological_decisions:
- issue: Relación entre mandamiento singular y objeto plural en la primera cláusula
  english_pob_reading: do not observe them according to his command
  chosen_spanish_reading: no observan estas conforme a su mandamiento
  alternative_spanish_readings:
  - no observan esto conforme a su mandamiento
  - no observan el mandamiento conforme a su mandamiento
  rationale: La tradición auditada mostró una oscilación entre singular y plural. El ge'ez conserva objeto plural; el español lo expresa con un deíctico plural («estas») para no perder la referencia a varias observancias/ordenanzas implícitas.
  doctrine_reference: Texto legal/cósmico de Jubileos sobre el orden de tiempos y observancias
- issue: Causa del desorden de estaciones y años
  english_pob_reading: they will disturb all their seasons, and the years will be moved from this order
  chosen_spanish_reading: ellos trastornarán todas sus estaciones, y los años se moverán fuera de este orden
  alternative_spanish_readings:
  - todas sus estaciones serán trastornadas, y los años serán movidos fuera de este orden
  - ellos corromperán todas sus estaciones, y los años serán desplazados de este orden
  rationale: La revisión textual confirmó voz activa para el primer verbo; por eso el desorden se atribuye a los transgresores. La segunda cláusula mantiene una formulación algo más neutral para reflejar el desplazamiento de los años sin sobreespecificar el agente.
  doctrine_reference: Orden creacional de los tiempos en Jubileos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la voz activa de «trastornarán» para el verbo ge'ez correspondiente, y la observación posterior sobre el objeto plural en la primera cláusula. También se evitó duplicar la idea de estaciones y años, siguiendo el pase de revisión que eliminó la repetición probable del material entre corchetes.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantuvo «mandamiento/estatutos» como lenguaje normativo bíblico, evitando sustituirlo por términos eclesiásticos más libres.
  - «Estaciones» se usa para los ciclos/tiempos del texto; no se traduce como «fiestas» porque el contexto inmediato habla del orden de tiempos y años.
  - El tono es formal y publicable, con sintaxis española natural pero sin perder la estructura legal del original.
