translation:
  language: es
  text: Al sonido de su trueno la tierra se retuerce[b][a]; las ráfagas del norte son tempestad y borrasca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «y a su aparición serán sacudidos los montes; por su voluntad sopla el viento del sur». Esta forma difiere de manera importante del hebreo conservado, cuyo segundo hemistiquio habla de las ráfagas del norte como tempestad y borrasca.'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo puede traducirse también «tiembla» o «se sacude», con la imagen de un movimiento convulsivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: קול רעמו / καὶ ... πνεύσεται
  english_pob_choice: sound / blows
  chosen_spanish: Al sonido de su trueno
  alternatives_spanish:
  - Con la voz de su trueno
  - Al oírse su trueno
  lexicon: HALOT; LXX parallel
  rationale: El hebreo indica el קול de su רעם, es decir, el sonido audible del trueno; en español, «al sonido de su trueno» conserva el valor acústico sin personalizarlo indebidamente. No se siguió el paralelo griego en el texto principal porque el hebreo conservado ofrece la línea sobre la tierra que se retuerce.
- source_word: יחיל
  english_pob_choice: writhes
  chosen_spanish: se retuerce
  alternatives_spanish:
  - tiembla
  - se estremece
  - se sacude
  lexicon: HALOT
  rationale: El verbo expresa movimiento convulsivo; «se retuerce» mantiene esa imagen intensa mejor que un simple «tiembla». En español suena natural aplicado a la tierra y refleja bien el matiz corporal/convulsivo señalado por la auditoría inglesa.
- source_word: ארצו
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - su tierra
  - su país
  - el mundo
  lexicon: HALOT
  rationale: Aunque el sufijo posesivo puede insinuar «su tierra», en español la formulación más clara y menos restrictiva es «la tierra». Se conserva así el alcance cósmico del verso sin forzar una referencia territorial estrecha.
- source_word: זלעפות
  english_pob_choice: blasts
  chosen_spanish: soplos
  alternatives_spanish:
  - ráfagas
  - embates
  - bofetadas
  lexicon: HALOT
  rationale: Para el hebreo de vientos violentos, «soplos» reproduce el campo semántico del aliento/viento y funciona bien con el genitivo «del norte». Se evitó «blasts» literalizado como «explosiones», que sería engañoso en español.
- source_word: צפון
  english_pob_choice: the north
  chosen_spanish: del norte
  alternatives_spanish:
  - del septentrión
  - del norte viento
  - norte
  lexicon: HALOT
  rationale: El hebreo dice simplemente «norte», con función meteorológica. «Del norte» conserva esa economía y permite entender que se trata del viento procedente del norte sin añadir una glosa innecesaria.
- source_word: סופה
  english_pob_choice: storm
  chosen_spanish: tempestad
  alternatives_spanish:
  - tormenta
  - torbellino
  - huracán
  lexicon: HALOT
  rationale: «Tempestad» refleja un fenómeno violento y mantiene una distinción útil frente al término siguiente. Es un registro digno y bíblico, pero sin caer en arcaísmo pesado.
- source_word: וסערה
  english_pob_choice: and tempest
  chosen_spanish: y borrasca
  alternatives_spanish:
  - y tormenta
  - y vendaval
  - y tempestad
  lexicon: HALOT
  rationale: «Borrasca» añade una segunda imagen de violencia atmosférica sin repetir exactamente «tempestad». Conserva la intensificación del hebreo y suena natural en español moderno culto.
theological_decisions:
- issue: Divergencia hebreo-griego en el segundo hemistiquio
  english_pob_reading: 'Main text follows the Hebrew: the north''s blasts are storm and tempest; Greek variant is preserved in a footnote.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado: los soplos del norte son tempestad y borrasca.'
  alternative_spanish_readings:
  - y, por su voluntad, sopla el viento del sur
  - y en sus visiones serán sacudidos los montes
  rationale: La filosofía del proyecto para Sirácides da prioridad al hebreo cuando está disponible, usando el griego como control y testimonio paralelo. La nota mantiene visible la tradición griega sin desplazar la lectura principal del hebreo.
  doctrine_reference: 'PHILOSOPHY.md; criterio editorial de Sirácides: hebreo primario, griego paralelo documentado.'
- issue: Posesivo divino en la imaginería meteorológica
  english_pob_reading: Rendered the suffix in רעמו as 'his thunder' but smoothed ארצו to 'the earth.'
  chosen_spanish_reading: Se conserva el posesivo implícito en «su trueno», pero no se repite en «la tierra».
  alternative_spanish_readings:
  - su tierra
  - su país
  - su mundo
  rationale: En español, repetir el posesivo con «tierra» sonaría forzado y podría estrechar indebidamente el sentido. Mantener «su trueno» conserva la atribución teológica; dejar «la tierra» evita una lectura territorial ajena al contexto cósmico.
  doctrine_reference: Principio POB de primacía del texto original con claridad idiomática controlada.
translation_notes:
  revision_awareness: No hubo revisiones posteriores sustanciales en el expediente; el pasaje llegó al estado actual con acuerdo moderado entre controles y sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija explícitamente; aquí el verso usa sufijos pronominales y no nombra el tetragrámaton.
  - Se evita «SEÑOR» como sustituto automático, conforme a la terminología del proyecto.
  - «Tempestad»/«borrasca» preservan la violencia atmosférica sin introducir vocabulario doctrinal ajeno al pasaje.
  - La puntuación con dos hemistiquios sigue la estructura poética del original.
