  text: וְ/הִנֵּ֣ה קַמְתֶּ֗ם תַּ֚חַת אֲבֹ֣תֵי/כֶ֔ם תַּרְבּ֖וּת אֲנָשִׁ֣ים חַטָּאִ֑ים לִ/סְפּ֣וֹת ע֗וֹד עַ֛ל חֲר֥וֹן אַף יְהוָ֖ה אֶל יִשְׂרָאֵֽל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/032/014.yaml
  text: And behold[a], you have risen up in your fathers’ place, a brood of sinful men[b], to add still more to the burning anger of Yahweh against Israel.
  footnotes:
  - marker: a
    text: Or 'an increase of sinful men' or 'offspring of sinful men.' The Hebrew תַּרְבּוּת can denote increase or progeny; 'a brood' is chosen to convey the rebuking tone in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the burning of the nose of the LORD,' a Hebrew idiom for intense anger.
    reason: lexical_alternative
