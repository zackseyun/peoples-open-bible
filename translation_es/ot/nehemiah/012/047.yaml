review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y el rastro POB en la mayoría de los puntos: conserva «todo Israel», repite «en los días de...», mantiene «cantores»/«porteros», y traduce correctamente מקדישים como «apartaban» sin añadir objeto. Sin embargo, «Y todo Israel ... daba ...; y apartaban ...» introduce una discordancia de número entre el sujeto singular colectivo y los verbos en singular/plural. Además, el inglés auditado decidió un pasado simple histórico («gave»), y en español aquí conviene igualmente una forma plural simple para resumir la práctica histórica. También es preferible alinear la nota c con el inglés POB: la alternativa es «los sacerdotes aarónicos», no meramente «los sacerdotes descendientes de Aarón».'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero la concordancia verbal necesita reparación para sonar natural y preciso. «Todo Israel ... daban ... apartaban» resuelve el problema y mantiene el valor colectivo. El resto del verso fluye bien y no suena acartonado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Hijos de Aarón» preserva bien בני אהרן, con alternativa adecuada en nota. «Apartaban» respeta la decisión teológica sobre מקדישים mejor que una paráfrasis como «daban».
  issues:
  - severity: medium
    issue: Discordancia entre «todo Israel» y «daba ... apartaban»
    rationale: El sujeto colectivo singular seguido por un verbo singular y luego plural dentro de la misma oración resulta torpe en español y debilita la claridad. La forma plural para ambas acciones principales encaja mejor con «todo Israel» entendido colectivamente.
  - severity: low
    issue: Aspecto verbal mejorable en «daba»
    rationale: Aunque el racional interno defendió el imperfecto, el rastro inglés auditado usa un resumen histórico en pasado simple. En español bíblico natural, «daban» funciona mejor aquí como descripción colectiva del conjunto histórico, además de resolver la concordancia.
  - severity: low
    issue: Nota c no refleja exactamente la alternativa inglesa documentada
    rationale: La alternativa auditada es «the Aaronic priests». «Los sacerdotes descendientes de Aarón» es correcta en sentido, pero menos alineada con la decisión léxica documentada.
  revised_spanish_text: Y todo Israel, en los días de Zorobabel y en los días de Nehemías, daban las porciones[a] para los cantores y los porteros, según lo que cada día requería[b]; y apartaban para los levitas, y los levitas apartaban para los hijos de Aarón[c].
  revised_footnotes:
  - marker: a
    text: 'O: «las porciones asignadas» para los cantores y los porteros.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la palabra/asunto de un día en su día»; es decir, lo que cada día requería.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los sacerdotes aarónicos».'
    reason: lexical_alternative
  revision_rationale: Se ajustó la concordancia verbal para que el sujeto colectivo «todo Israel» rija formas plurales naturales en español dentro de toda la oración, sin alterar el sentido. También se armonizó la nota c con la alternativa léxica documentada en el rastro inglés POB.
