  text: 디베료[a] 가이사 통치 제15년에, 본디오 빌라도가 유대를 다스리고 있었고, 헤롯이 갈릴리의 분봉왕이었으며, 그의 형제 빌립이 이두래와 드라고닛 지방의 분봉왕이었고, 루사니아가 아빌레네의 분봉왕이었습니다.
