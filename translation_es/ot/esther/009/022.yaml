translation:
  language: es
  text: como los días en que los judíos tuvieron descanso[a] de sus enemigos, y como el mes que se les había vuelto de tristeza a alegría y de luto a un día bueno[b], para hacerlos días de banquete y alegría, y de envío de porciones[c], cada hombre a su compañero, y de dones a los pobres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «descansaron» o «hallaron alivio». El hebreo expresa el cese de la presión enemiga.
    reason: lexical_alternative
  - marker: b
    text: O «a un día festivo» o «a un día de celebración». Literalmente, «a un día bueno».
    reason: lexical_alternative
  - marker: c
    text: «Envío de porciones» probablemente se refiere al envío de porciones de comida como regalos festivos.
    reason: cultural_note
lexical_decisions:
- source_word: נָחוּ
  english_pob_choice: had rest
  chosen_spanish: tuvieron descanso
  alternatives_spanish:
  - descansaron
  - hallaron alivio
  lexicon: HALOT
  rationale: El verbo נוח expresa cesar la presión y llegar a descanso. «Tuvieron descanso» suena natural en español y conserva la idea concreta de alivio frente a los enemigos sin perder el matiz de reposo.
- source_word: מֵאֹיְבֵיהֶם
  english_pob_choice: from their enemies
  chosen_spanish: de sus enemigos
  alternatives_spanish:
  - lejos de sus enemigos
  - a salvo de sus enemigos
  lexicon: HALOT
  rationale: 'La preposición מִן indica separación: el descanso se da en relación con la amenaza enemiga. «De sus enemigos» refleja bien esa relación y es idiomático en español.'
- source_word: נֶהְפַּךְ
  english_pob_choice: had been turned
  chosen_spanish: se les había vuelto
  alternatives_spanish:
  - se había transformado
  - se había cambiado
  lexicon: HALOT
  rationale: El nifal de הפך expresa un giro pasivo o una inversión. «Se les había vuelto» conserva la idea de reversión ocurrida para ellos, de manera natural en español.
- source_word: יָגוֹן
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - aflicción
  lexicon: HALOT
  rationale: Aunque «sorrow» puede ser «tristeza» o «dolor», aquí el contraste con alegría pide un término emocional claro. «Tristeza» comunica bien el campo semántico en español.
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: Este sustantivo denota alegría festiva. «Alegría» es la opción más transparente en español y mantiene el contraste con tristeza.
- source_word: אֵבֶל
  english_pob_choice: mourning
  chosen_spanish: luto
  alternatives_spanish:
  - duelo
  - llanto
  lexicon: HALOT
  rationale: אֵבֶל apunta al luto o duelo público por pérdida. «Luto» preserva mejor el matiz formal y ceremonial que solo «tristeza» o «dolor».
- source_word: לְיוֹם טוֹב
  english_pob_choice: to a good day
  chosen_spanish: a día bueno
  alternatives_spanish:
  - a un día festivo
  - a un día de celebración
  lexicon: HALOT
  rationale: Se mantiene la literalidad de la expresión hebrea «día bueno» porque el texto subraya la inversión verbal y luego la aclara con las frases sobre banquete y alegría. En español suena algo marcado, pero sigue siendo comprensible y fiel.
- source_word: לַעֲשׂוֹת אוֹתָם
  english_pob_choice: to make them
  chosen_spanish: para convertirlos
  alternatives_spanish:
  - para hacerlos
  - para establecerlos
  lexicon: HALOT
  rationale: En contexto, el infinitivo expresa el propósito de establecer esos días como una celebración. «Convertirlos» comunica bien la transformación funcional sin abandonar la base textual.
- source_word: יְמֵי מִשְׁתֶּה
  english_pob_choice: days of feasting
  chosen_spanish: días de banquete
  alternatives_spanish:
  - días de festín
  - días de comida celebrativa
  lexicon: HALOT
  rationale: מִשְׁתֶּה se refiere a un banquete o comida festiva. «Banquete» preserva el componente de comida celebratoria con dignidad y claridad.
- source_word: וְשִׂמְחָה
  english_pob_choice: and gladness
  chosen_spanish: y alegría
  alternatives_spanish:
  - y regocijo
  - y gozo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el primer uso de שִׂמְחָה, pero en español «alegría» funciona naturalmente como término general de celebración.
- source_word: וּמִשְׁלוֹחַ מָנוֹת
  english_pob_choice: and of sending portions
  chosen_spanish: y de envío de porciones
  alternatives_spanish:
  - y de enviar porciones
  - y de envío de alimentos
  lexicon: HALOT
  rationale: La frase hebrea es literalmente un envío de porciones. «Envío de porciones» conserva la forma sustantivada y deja abierta la posibilidad práctica de porciones de comida, como indica la nota inglesa.
- source_word: אִישׁ לְרֵעֵהוּ
  english_pob_choice: each man to his neighbor
  chosen_spanish: cada hombre a su compañero
  alternatives_spanish:
  - cada persona a otra
  - cada uno a su prójimo
  lexicon: HALOT
  rationale: Se conserva el distributivo masculino del hebreo con «cada hombre», pero «compañero» da un equivalente relacional natural en español para רֵעַ. «Prójimo» sería posible, pero introduciría un matiz más bíblico/tradicional que no es necesario aquí.
- source_word: וּמַתָּנוֹת לָאֶבְיוֹנִים
  english_pob_choice: and gifts to the poor
  chosen_spanish: y de dones a los pobres
  alternatives_spanish:
  - y de regalos a los pobres
  - y de obsequios a los necesitados
  lexicon: HALOT
  rationale: «Dones» es un término digno y suficientemente amplio para מַתָּנוֹת. «Los pobres» conserva el contraste social y la sencillez del hebreo.
theological_decisions:
- issue: Expresión distributiva masculina אִישׁ לְרֵעֵהוּ
  english_pob_reading: each man to his neighbor
  chosen_spanish_reading: cada hombre a su compañero
  alternative_spanish_readings:
  - cada persona a otra
  - cada uno a su prójimo
  rationale: Se mantiene la forma masculina singular del hebreo por fidelidad al texto, tal como hace la POB inglesa. En español, «cada hombre» conserva esa forma sin impedir el sentido distributivo general.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: La versión revisada en inglés no introdujo cambios sustanciales; la traducción española sigue el mismo perfil de decisiones léxicas y mantiene la equivalencia óptima con el texto hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no porque aparezca aquí, sino como convención general del proyecto; este versículo no contiene el nombre divino.
  - «Banquete» y «alegría» mantienen el paralelismo festivo del verso sin añadir explicaciones interpretativas.
  - Se evita sustituir «porciones» por una especificación de comida en el texto principal, para respetar la literalidad del hebreo y la nota cultural del original inglés.
