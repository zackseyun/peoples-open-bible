translation:
  language: es
  text: 'Entonces Dios dijo a Abraham[a]: «En cuanto a Sarai, tu esposa, no la llamarás Sarai, porque Sara es su nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «ya no llamarás Sarai a tu esposa; su nombre será Sara».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia con un español natural y solemne.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Todopoderoso
  lexicon: HALOT
  rationale: En este contexto el referente es el Dios singular de Israel; «Dios» es la forma directa y estándar en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para con
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; en español natural se expresa con «a».
- source_word: שָׂרַי
  english_pob_choice: Sarai
  chosen_spanish: Sarai
  alternatives_spanish:
  - Saraí
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado para mantener el contraste deliberado con «Sara».
- source_word: אִשְׁתְּךָ
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  lexicon: HALOT
  rationale: «Esposa» es claro y digno en un contexto narrativo y familiar; «mujer» sería más literal pero menos preciso en español actual.
- source_word: לֹא תִקְרָא
  english_pob_choice: you shall not call
  chosen_spanish: no llamarás
  alternatives_spanish:
  - no debes llamar
  - no has de llamar
  lexicon: HALOT
  rationale: La forma verbal funciona como prohibición/directiva divina. «No llamarás» preserva la fuerza solemne sin sobreexplicar.
- source_word: אֶת שְׁמָהּ
  english_pob_choice: her name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de ella
  - su nombre propio
  lexicon: HALOT
  rationale: En la fórmula de nombramiento, «nombre» reproduce el sustantivo hebreo de manera directa; el posesivo «su» mantiene la relación con Sarai.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición; «porque» comunica con claridad la explicación causal.
- source_word: שָׂרָה שְׁמָהּ
  english_pob_choice: Sarah is her name
  chosen_spanish: Sara es su nombre
  alternatives_spanish:
  - Su nombre es Sara
  - Sara será su nombre
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal que afirma el nuevo nombre. «Es su nombre» sigue de cerca la estructura y conserva la solemnidad del anuncio.
theological_decisions:
- issue: Forma del anuncio de cambio de nombre
  english_pob_reading: 'A direct naming declaration: ''you shall not call her name Sarai, for Sarah is her name.'''
  chosen_spanish_reading: 'Una prohibición seguida de una declaración nominal: «no llamarás su nombre Sarai, porque Sara es su nombre».'
  alternative_spanish_readings:
  - «ya no llamarás a Sarai; su nombre será Sara»
  - «no llamarás más su nombre Sarai; Sara será su nombre»
  rationale: El hebreo no añade explícitamente «ya no» ni un futuro perifrástico; mantiene una prohibición formal y una cláusula de identidad nominal. La traducción conserva esa tensión y evita suavizarla con una reformulación más interpretativa.
  doctrine_reference: Principio de equivalencia óptima; respeto de la fórmula de nombramiento y de la solemnidad del decreto divino.
translation_notes:
  revision_awareness: Se verificó el pasaje contra el hebreo WLC y el audit trail inglés. No hubo revisiones aplicadas en la fuente inglesa; se mantuvo la estructura de prohibición + declaración nominal sin introducir «ya no» ni futuro explícito fuera del hebreo. La única nota recoge la alternativa idiomática preservada por el POB inglés.
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים en este contexto singular.
  - Se mantiene el contraste entre los nombres propios «Sarai» y «Sara» como elemento semántico central.
  - La frase «tu esposa» evita el calco más áspero de «tu mujer» y suena natural en español bíblico contemporáneo.
  - «No llamarás» conserva el valor directivo de la forma verbal hebrea en segunda persona masculina singular.
