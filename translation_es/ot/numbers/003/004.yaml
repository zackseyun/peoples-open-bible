    reason: lexical_alternative
  - marker: b
    text: El hebreo dice específicamente «hijos varones». La expresión final también puede sugerir que Eleazar e Itamar sirvieron durante la vida de Aarón.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'no tuvieron hijos' a 'no tuvieron hijos varones' para preservar el valor específico de בָנִים en un contexto de sucesión sacerdotal. Se corrige la nota [a] para que aporte una alternativa real y se afina la nota [b] para explicar el matiz masculino del hebreo sin perder la observación ya documentada sobre la frase final.
