translation:
  language: es
  text: 'Se acostó a sus pies hasta la mañana[a], y se levantó antes de que un hombre pudiera reconocer a otro. Y él dijo[b]: «No se sepa que la mujer vino a la era».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que un hombre pudiera reconocer a su compañero». El modismo hebreo significa que todavía no había suficiente luz para distinguirse unos a otros.'
    reason: lexical_alternative
  - marker: b
    text: 'El hablante probablemente es Booz por el contexto, aunque el hebreo solo dice: «Y él dijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: מרגלתיו
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - al pie de donde él estaba acostado
  - en el lugar de sus pies
  lexicon: HALOT
  rationale: El hebreo expresa el lugar de los pies/las piernas; en español, «a sus pies» comunica de forma natural la posición sin añadir detalles no explícitos del texto.
- source_word: בטרום
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes
  - mientras aún no
  lexicon: HALOT
  rationale: La partícula marca anterioridad temporal. «Antes de que» conserva bien el valor temporal en un giro fluido de español.
- source_word: יכיר
  english_pob_choice: could recognize
  chosen_spanish: pudiera reconocer
  alternatives_spanish:
  - reconociera
  - pudiera identificar
  lexicon: HALOT
  rationale: El hifil de ידע/נכר aquí tiene valor de reconocer/identificar. El subjuntivo imperfecto en la subordinada temporal reproduce la idea de posibilidad previa a la luz del amanecer.
- source_word: איש את רעהו
  english_pob_choice: one man could recognize another
  chosen_spanish: un hombre pudiera reconocer a otro
  alternatives_spanish:
  - un hombre pudiera reconocer a su compañero
  - una persona pudiera reconocer a otra
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «un hombre a su compañero». La versión española mantiene el singular masculino y la relación mutua sin expandir más de lo que el texto exige.'
- source_word: ויאמר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Y dijo
  - Y Boaz dijo
  lexicon: HALOT
  rationale: El hebreo deja el sujeto implícito. Se conserva esa apertura con «él», evitando nombrar a Booz en el texto principal sin necesidad textual directa.
- source_word: אל יוודע
  english_pob_choice: Do not let it be known
  chosen_spanish: No se sepa
  alternatives_spanish:
  - No debe saberse
  - No dejen que se sepa
  lexicon: HALOT
  rationale: La forma negativa pasiva/jusiva pide una prohibición de no divulgación. «No se sepa» preserva el pasivo impersonal con naturalidad en español.
- source_word: האשה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo. «La mujer» refleja esa definitud y apunta a una mujer concreta en la escena, no a una mujer cualquiera.
- source_word: הגרן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - el lugar de la trilla
  lexicon: HALOT
  rationale: El sustantivo designa el lugar agrícola donde se trilla el grano. «La era» es el equivalente tradicional y claro en español; en este contexto, además, suena natural y preciso.
theological_decisions:
- issue: Identificación del hablante en ויאמר
  english_pob_reading: The speaker is most likely Boaz from the context, though the Hebrew text says only, “And he said.”
  chosen_spanish_reading: Y él dijo, sin nombrar explícitamente a Booz en el texto principal.
  alternative_spanish_readings:
  - Y Booz dijo
  - Entonces Booz dijo
  rationale: El contexto narrativo identifica probablemente a Booz, pero el hebreo no lo nombra. La redacción española conserva esa tensión textual y deja que el lector infiera el hablante por el contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido moral/sexual de que Rut durmiera a los pies de Booz
  english_pob_reading: Use the straightforward spatial wording 'she lay at his feet' without euphemistic or accusatory expansion.
  chosen_spanish_reading: Durmió a sus pies con lenguaje espacial directo, sin ampliar a una insinuación o negación explícita adicional.
  alternative_spanish_readings:
  - Usar una paráfrasis que sugiera relaciones sexuales
  - Añadir una explicación para excluir cualquier implicación sexual
  rationale: El versículo describe posición y tiempo, no un acto sexual explícito ni una negación explícita de ello. La traducción debe preservar la tensión narrativa sin resolverla más allá del hebreo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente sin cambios sustanciales; el texto inglés de referencia mantiene alta concordancia y no registra revisiones aplicadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la tradición del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene «la era» para הגרן por ser el equivalente agrícola natural en español.
  - Se preserva el sujeto implícito de ויאמר con «él» para no sobreespecificar el texto.
  - El marcador de nota [a] queda anclado en «mañana» y [b] en «dijo» para reflejar las dos decisiones auditadas.
