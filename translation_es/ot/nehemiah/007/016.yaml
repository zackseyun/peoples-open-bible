  lexicon: HALOT
  rationale: En listas genealógicas y censales, el plural constructo de בֵּן puede expresar pertenencia a un linaje o clan. En español, “hijos de” conserva bien la forma breve y tradicional del registro de lista, sin añadir una paráfrasis interpretativa como “descendientes de”.
- source_word: בֵבָי
  english_pob_choice: Bebai
  chosen_spanish: Bebai
  alternatives_spanish:
  - Bebái
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma simple y reconocible en español, sin intentar adaptar la vocalización más allá de la transliteración base del texto auditado.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וּשְׁמֹנָה
