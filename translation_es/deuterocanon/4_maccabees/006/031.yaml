review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura argumentativa básica: ὁμολογουμένως = reconocimiento general, οὖν = conclusión, τῶν παθῶν = las pasiones. Sin embargo, dos elecciones principales se apartan del mejor sentido auditado: λογισμός en 4 Macabeos se expresa mejor como «razón» que como «entendimiento», y δεσπότης aquí se acerca más a «amo» que a «señor», porque se trata de dominio controlador y no de un título honorífico.'
  spanish_quality_summary: El español es claro y digno, pero «el entendimiento piadoso es señor de las pasiones» suena algo rígido y menos idiomático en el registro filosófico-moral que «la razón piadosa es dueña/amo de las pasiones». «Razón» además enlaza mejor con el término clave repetido en 4 Macabeos.
  glossary_alignment: No hay conflicto con los términos base del proyecto. La revisión mejora la coherencia con la decisión inglesa «godly reason» al usar «razón piadosa», y con «master» al evitar «señor», que en contexto bíblico español puede rozar asociaciones teológicas no deseadas.
  issues:
  - severity: medium
    issue: «entendimiento» para λογισμός
    rationale: Aunque posible, en 4 Macabeos λογισμός es un término programático para la razón o razonamiento rector. «Entendimiento» desplaza el foco desde el ejercicio racional-moral hacia una facultad más estática.
  - severity: medium
    issue: «señor» para δεσπότης
    rationale: «Señor» en español bíblico puede sugerir título honorífico o teológico. El griego resalta dominio/maestría sobre las pasiones; «amo» o «dueño» lo refleja con más precisión en este contexto.
  revised_spanish_text: Por tanto, se reconoce que la razón piadosa es ama de las pasiones.
  revision_rationale: Se ajusta λογισμός a «razón», término central y más natural para el argumento de 4 Macabeos, y δεσπότης a «ama», que expresa dominio sobre las pasiones sin activar resonancias de título divino asociadas a «señor». Se conserva «piadosa» para εὐσεβής y «se reconoce» para ὁμολογουμένως como formulación natural de reconocimiento general.
