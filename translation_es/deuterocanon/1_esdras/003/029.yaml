base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/003/029.yaml
  text: And those who do not serve in the army or fight[a], but cultivate the land, again, when they have sown, after reaping they bring tribute to the king; and compelling one another[b], they bring the taxes to the king.
  footnotes:
  - marker: a
    text: Or 'present tribute to the king.' The verb 'bring' here carries the sense of delivering payment owed to a ruler.
    reason: lexical_alternative
  - marker: b
    text: Literally 'compelling one another.' The phrase likely describes mutual pressure to ensure the king's taxes are paid.
    reason: lexical_alternative
