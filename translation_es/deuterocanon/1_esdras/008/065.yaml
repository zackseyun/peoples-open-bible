translation:
  language: es
  text: 'Y cuando estas cosas se habían completado, los líderes vinieron a mí, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ τούτων τελεσθέντων
  english_pob_choice: And when these things had been completed
  chosen_spanish: Y cuando estas cosas se hubieron completado
  alternatives_spanish:
  - Y cuando estas cosas fueron terminadas
  - Después de haberse completado estas cosas
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa acción anterior ya concluida; en español, "se hubieron completado" conserva el valor de anterioridad y culminación sin sonar tan técnico como una traducción más literal. "Estas cosas" mantiene la referencia amplia del griego, que en el contexto apunta a los asuntos ya tratados.
- source_word: προσηλθόσαν μοι
  english_pob_choice: came to me
  chosen_spanish: se acercaron a mí
  alternatives_spanish:
  - vinieron a mí
  - se presentaron ante mí
  lexicon: BDAG
  rationale: El verbo προσέρχομαι puede significar "venir" o "acercarse". En español, "se acercaron a mí" refleja mejor el matiz espacial del verbo y conserva naturalidad narrativa. "Vinieron a mí" es posible, pero pierde un poco del sentido de aproximación.
- source_word: οἱ ἡγούμενοι
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los que estaban al frente
  - los principales
  lexicon: BDAG
  rationale: ἡγούμενοι designa a quienes ejercen liderazgo o están al frente. "Líderes" es transparente y no impone un oficio más específico de lo que el griego exige.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: y dijeron
  alternatives_spanish:
  - diciendo
  - y, diciendo
  lexicon: BDAG
  rationale: Aunque el participio literalmente sería "diciendo", en español la continuación inmediata de un discurso directo suele quedar más natural con "y dijeron". Esto mantiene la función introductoria del participio sin forzar una sintaxis pesada.
theological_decisions:
- issue: Valor narrativo del genitivo absoluto y secuencia de acciones
  english_pob_reading: when these things had been completed
  chosen_spanish_reading: cuando estas cosas se hubieron completado
  alternative_spanish_readings:
  - después de que estas cosas se terminaron
  - una vez concluidas estas cosas
  rationale: 'No hay una tensión doctrinal directa, pero sí una decisión de aspecto verbal: el texto marca una acción acabada previa a la llegada de los líderes. La forma elegida conserva esa anterioridad de modo claro y auditably cercano al griego.'
  doctrine_reference: Aspecto verbal y coherencia narrativa en traducción bíblica
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla primaria. El contexto inglés confirma la lectura de acción completada + aproximación + liderazgo + participio de habla, sin revisiones registradas ni variantes textuales que obliguen a notas.
  spanish_consistency_notes:
  - Se mantiene "líderes" para οἱ ἡγούμενοι, en línea con la decisión inglesa y sin sobredeterminar el cargo.
  - Se conserva una sintaxis fluida de español moderno, evitando calcos innecesarios, pero respetando la secuencia temporal del griego.
  - No se introdujeron notas de pie porque el verso no presenta variantes textuales ni ambigüedades teológicas que requieran alternativa publicada.
