translation:
  language: es
  text: Y las aguas prevalecieron sobre la tierra por 150 días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la tierra» por «sobre el mundo»; el hebreo אֶרֶץ puede significar «tierra» o «tierra/país» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבְּרוּ
  english_pob_choice: prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - se impusieron
  - fueron más fuertes
  - aumentaron
  lexicon: HALOT
  rationale: גבר en esta forma verbal comunica que las aguas llegaron a dominar o imponerse. «Prevalecieron» conserva esa idea de superioridad y continuidad narrativa sin caer en una paráfrasis excesiva.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja naturalmente en español con «las aguas», especialmente en el contexto del diluvio.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra firme
  - sobre el país
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra» o «tierra/país», en este contexto el español «tierra» reproduce bien el alcance amplio del relato sin requerir una decisión interpretativa más fuerte que el texto.
- source_word: חֲמִשִּׁים וּמְאַת יוֹם
  english_pob_choice: for 150 days
  chosen_spanish: por 150 días
  alternatives_spanish:
  - durante 150 días
  - por ciento cincuenta días
  lexicon: HALOT
  rationale: La expresión cardinal hebrea se traduce idiomáticamente como duración. «Por 150 días» suena natural en español y conserva el valor temporal del hebreo.
theological_decisions:
- issue: Alcance de אֶרֶץ en el relato del diluvio
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - suelo
  - país
  rationale: El contexto narrativo presenta el diluvio en términos amplios; «tierra» mantiene esa amplitud en español y evita restringir el pasaje a una región local.
  doctrine_reference: Génesis 7:24; coherencia narrativa del diluvio universal en el contexto inmediato
translation_notes:
  revision_awareness: El cotejo con el texto hebreo y el audit trail en inglés muestra alta concordancia; no se requieren revisiones respecto del sentido básico del versículo.
  spanish_consistency_notes:
  - Se conservó el plural «las aguas» para reflejar la morfología hebrea.
  - Se evitó «SEÑOR» u otra convención de ocultamiento porque no aparece el nombre divino en este versículo.
  - «Prevalecieron» mantiene la continuidad léxica con el audit trail inglés («prevailed»).
