  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים הִנֵּה֩ נָתַ֨תִּי לָ/כֶ֜ם אֶת כָּל עֵ֣שֶׂב זֹרֵ֣עַ זֶ֗רַע אֲשֶׁר֙ עַל פְּנֵ֣י כָל הָ/אָ֔רֶץ וְ/אֶת כָּל הָ/עֵ֛ץ אֲשֶׁר בּ֥/וֹ פְרִי עֵ֖ץ זֹרֵ֣עַ זָ֑רַע לָ/כֶ֥ם יִֽהְיֶ֖ה לְ/אָכְלָֽה־־׀־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/029.yaml
  text: And God said[a], “Behold, I have given you every seed-bearing plant that is on the face of all the earth, and every tree in which is the fruit of a tree bearing seed[c][b]. It will be for you as food.”
  footnotes:
  - marker: a
    text: Or “Behold,” preserving a more formal attention-getting particle for הִנֵּה.
    reason: lexical_alternative
  - marker: b
    text: Or “every herb yielding seed.” The Hebrew עֵשֶׂב can denote vegetation broadly; “plant” is used here for clearer modern English.
    reason: lexical_alternative
  - marker: c
    text: Or 'that has in it fruit bearing seed'.
    reason: previous_rendering
