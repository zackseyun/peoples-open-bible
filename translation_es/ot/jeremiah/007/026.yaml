translation:
  language: es
  text: Pero no me escucharon ni inclinaron su oído; endurecieron su cerviz y obraron peor que sus padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus antepasados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ אֵלַי
  english_pob_choice: did not listen to me
  chosen_spanish: no me escucharon
  alternatives_spanish:
  - no me oyeron
  - no obedecieron mi voz
  lexicon: HALOT
  rationale: שמע con אֶל/אֵלַי expresa aquí oír con atención, es decir, atender a la palabra dirigida por Yahvé. En español, 'escuchar' conserva esa fuerza relacional y volitiva mejor que 'oír'. 'Obedecer' sería posible en contexto, pero carga más interpretación que el hebreo inmediato.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: did not incline their ear
  chosen_spanish: ni inclinaron su oído
  alternatives_spanish:
  - ni prestaron atención
  - ni volvieron su oído
  lexicon: HALOT
  rationale: La imagen hebrea de 'inclinar el oído' se puede mantener de forma natural en español. 'Oído' funciona bien como equivalente de אָזֶן en este giro idiomático y conserva el paralelismo con 'me escucharon' sin aplanar la metáfora.
- source_word: וַיַּקְשׁוּ אֶת עָרְפָּם
  english_pob_choice: they stiffened their neck
  chosen_spanish: endurecieron su cerviz
  alternatives_spanish:
  - endurecieron su cuello
  - se pusieron tercos
  lexicon: HALOT
  rationale: עֹרֶף/עָרְפָּם es la parte posterior del cuello, y el hebreo usa la imagen de obstinación. 'Cerviz' mantiene el color bíblico y el sentido idiomático; 'cuello' sería más común, pero menos preciso para esta expresión fija.
- source_word: הֵרֵעוּ
  english_pob_choice: they acted more wickedly
  chosen_spanish: se portaron peor
  alternatives_spanish:
  - obraron más mal
  - hicieron más maldad
  lexicon: HALOT
  rationale: 'El verbo en este contexto, seguido por מֵאֲבוֹתָם, comunica una comparación: su conducta fue peor que la de sus antepasados. ''Se portaron peor'' expresa con claridad la fuerza comparativa y la evaluación moral sin volver el español artificial.'
- source_word: מֵאֲבוֹתָם
  english_pob_choice: than their fathers
  chosen_spanish: que sus padres
  alternatives_spanish:
  - que sus antepasados
  lexicon: HALOT
  rationale: אָבוֹת puede significar 'padres' o 'antepasados'. En español, 'padres' reproduce de manera directa la formulación del hebreo y mantiene la comparación generacional. 'Antepasados' queda como alternativa válida si se desea explicitar el sentido más amplio.
- source_word: וְ/לֹ֥א ... וְ/לֹ֥א ... וַ/יַּקְשׁוּ
  english_pob_choice: Yet ... and ... but ...
  chosen_spanish: Pero ... ni ...; ... y ...
  alternatives_spanish:
  - Y ... y ... y ...
  - Sin embargo ... ni ... ni ...
  lexicon: Hebrew syntax
  rationale: El hebreo acumula negaciones y luego pasa a una acción de endurecimiento con valor adversativo. En español, iniciar con 'Pero' transmite el contraste con el contexto inmediato; 'ni' coordina de modo natural la segunda negativa con la primera. La puntuación busca preservar el avance retórico del versículo.
theological_decisions:
- issue: Alcance de שׁמע en una denuncia profética
  english_pob_reading: did not listen to me
  chosen_spanish_reading: no me escucharon
  alternative_spanish_readings:
  - no me obedecieron
  - no atendieron a mi palabra
  rationale: El versículo denuncia rechazo a la voz de Yahvé. 'Escucharon' conserva el verbo básico y deja que el contexto profético exprese la desobediencia implícita, evitando sobredeterminar la traducción.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de אָבוֹת en la comparación histórica
  english_pob_reading: than their fathers
  chosen_spanish_reading: que sus padres
  alternative_spanish_readings:
  - que sus antepasados
  rationale: No hay una diferencia doctrinal aquí, pero sí una decisión de registro y fidelidad semántica. 'Padres' mantiene el vínculo con la formulación hebrea y con la comparación entre generaciones del pacto; 'antepasados' explicita el sentido más general.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: conserva la progresión negativa, mantiene el idiomismo de ''inclinar el oído'' y el hebraísmo de ''cerviz'', y refleja la comparación final sin suavizar el juicio moral.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en la tradición POB, aunque en este versículo no aparece explícitamente en el hebreo dado.
  - '''Oído'' se prefiere a ''oreja'' por naturalidad y porque el hebreo usa el sustantivo en sentido idiomático, no anatómico estrecho.'
  - '''Cerviz'' se mantiene como término bíblico reconocible en español y coherente con el estilo de la colección.'
