translation:
  language: es
  text: Y sucedió que en el tercer año de Hoshea, hijo de Elá[a], rey de Israel, Ezequías, hijo de Acaz, llegó a ser rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «comenzó a reinar». El verbo hebreo en esta fórmula regnal marca la accesión de Ezequías al trono.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: En
  alternatives_spanish:
  - Ahora
  - Y sucedió que
  lexicon: HALOT
  rationale: En fórmulas cronológicas introductorias, el hebreo funciona como transición narrativa. En español, ‘En’ introduce de forma natural el marco temporal sin añadir material interpretativo.
- source_word: בִּשְׁנַת שָׁלֹשׁ
  english_pob_choice: in the third year
  chosen_spanish: en el tercer año
  alternatives_spanish:
  - durante el tercer año
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar para la datación regnal y conserva el valor temporal del hebreo.
- source_word: לְהוֹשֵׁעַ בֶּן אֵלָה
  english_pob_choice: of Hoshea son of Elah
  chosen_spanish: de Hoshea, hijo de Elá
  alternatives_spanish:
  - de Oseas, hijo de Elá
  - perteneciente a Hoshea, hijo de Elá
  lexicon: HALOT
  rationale: La preposición de la fórmula regnal se vierte de manera natural como ‘de’. Se mantiene el nombre propio según la tradición de transliteración del proyecto y se conserva la relación filial.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica el cargo y el reino de Hoshea; ‘rey de Israel’ es directo y fiel.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: En esta fórmula regnal, el verbo marca la entronización/inicio del reinado. ‘Comenzó a reinar’ preserva el valor incoativo que el inglés POB anotó con ‘became king’ y evita una simple descripción durativa.
- source_word: חִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: HALOT
  rationale: Se usa la forma española consagrada y clara para lectores bíblicos.
- source_word: בֶן אָחָז
  english_pob_choice: son of Ahaz
  chosen_spanish: hijo de Acaz
  alternatives_spanish:
  - hijo de Ahaz
  lexicon: HALOT
  rationale: Se conserva la filiación real con la forma española usual de los nombres propios.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: El hebreo cierra con una apposición titulativa. En español, ‘comenzó a reinar sobre Judá’ fluye con naturalidad y mantiene el sentido de acceso al trono sin repetir una fórmula rígida.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: el sentido incoativo de מָלַךְ se conserva en español con una fórmula verbal que expresa la entronización. No se siguió mecánicamente la sintaxis inglesa cuando el español podía reflejar mejor la fórmula regnal hebrea.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico digno y moderno.
  - Se preservó la relación filial y la identificación geopolítica sin añadir interpretaciones.
  - La nota al pie está anclada explícitamente en la frase marcada con [a].
