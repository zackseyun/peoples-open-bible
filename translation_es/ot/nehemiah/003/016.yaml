translation:
  language: es
  text: Después de él, Nehemías hijo de Azbuc, jefe de la mitad del distrito de Bet-zur, hizo reparaciones hasta enfrente de las tumbas de David, y hasta el estanque que fue hecho[a], y hasta la casa de los guerreros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la alberca construida». El hebreo es literalmente «la hecha», y la forma deja abierto el matiz exacto de la obra.
    reason: lexical_alternative
  - marker: b
    text: O «la casa de los hombres poderosos». El hebreo puede referirse a una instalación militar, pero la identificación exacta no es segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Luego de él
  - Detrás de él
  lexicon: HALOT
  rationale: En la lista de reparación del muro, la expresión marca sucesión en la tarea. «Después de él» conserva el valor secuencial que la POB documenta para el inglés, sin forzar una lectura espacial que aquí no es la más directa.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hizo reparaciones
  alternatives_spanish:
  - fortaleció
  - reparó
  lexicon: HALOT
  rationale: 'El hifil de חזק en Nehemías 3 funciona como tecnicismo de obra: reparar/restaurar tramos del muro. «Hizo reparaciones» suena natural en español y mantiene el sentido idiomático de la serie.'
- source_word: שַׂר חֲצִי פֶּלֶךְ
  english_pob_choice: ruler of half the district
  chosen_spanish: jefe de la mitad del distrito
  alternatives_spanish:
  - gobernante de la mitad del distrito
  - oficial de la mitad del distrito
  lexicon: HALOT
  rationale: שַׂר designa un cargo de autoridad; en este contexto persa, פֶּלֶךְ apunta a un distrito. «Jefe de la mitad del distrito» comunica el rango administrativo con claridad en español y evita sobrerrepresentar la extensión política como «provincia».
- source_word: בֵּית צוּר
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-zur
  alternatives_spanish:
  - Beth-zur
  - Bet Zur
  lexicon: HALOT
  rationale: Es un topónimo que se translitera. «Bet-zur» sigue la adaptación castellana usual para nombres hebreos y conserva la identificación geográfica.
- source_word: עַד נֶגֶד קִבְרֵי דָוִיד
  english_pob_choice: as far as opposite the tombs of David
  chosen_spanish: hasta enfrente de las tumbas de David
  alternatives_spanish:
  - hasta frente a las tumbas de David
  - hasta opuesto a las tumbas de David
  lexicon: HALOT
  rationale: נֶגֶד expresa ubicación enfrente/opuesta. «Enfrente de» es la opción más natural en español y evita sugerir acceso o proximidad no indicada. «Tumbas» conserva el valor habitual de קִבְרֵי.
- source_word: הַבְּרֵכָה הָעֲשׂוּיָה
  english_pob_choice: the pool that was made
  chosen_spanish: la alberca hecha
  alternatives_spanish:
  - la piscina hecha
  - la alberca construida
  - la alberca que fue hecha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la hecha», con una forma pasiva/resultativa. «Alberca hecha» mantiene esa concisión sin añadir una explicación interpretativa sobre el modo de construcción. Se prefiere «alberca» por ser comprensible y apropiado para un depósito de agua antiguo.
- source_word: בֵּית הַגִּבֹּרִים
  english_pob_choice: the house of the mighty men
  chosen_spanish: la casa de los hombres valientes
  alternatives_spanish:
  - la casa de los guerreros
  - la casa de los hombres poderosos
  lexicon: HALOT
  rationale: גִּבֹּרִים puede significar «hombres valientes / guerreros». Dado que el referente exacto del edificio es incierto, se conserva una traducción bastante literal y abierta. «Hombres valientes» preserva el matiz de fuerza/heroísmo y evita definir el lugar como «cuartel» sin base suficiente.
theological_decisions:
- issue: Alcance de la expresión topográfica y sucesión en la lista de obras
  english_pob_reading: After him ... as far as opposite ... and as far as ...
  chosen_spanish_reading: Después de él ... hasta enfrente de ... y hasta ...
  alternative_spanish_readings:
  - Luego de él ...
  - Después de eso ... hasta frente a ...
  rationale: La frase organiza la narración de manera secuencial y espacial a la vez. Mantener «después de él» y «hasta enfrente de» preserva ambas dimensiones sin convertir el versículo en una paráfrasis interpretativa.
  doctrine_reference: Ninguna; se trata de estructura narrativa y geográfica.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin depender mecánicamente de él: se conservaron la secuencia narrativa, la referencia topográfica y la ambigüedad del edificio final. No se introdujeron cambios textuales sustantivos respecto del paquete fuente; solo ajustes naturales de español y una elección de transliteración consistente.'
  spanish_consistency_notes:
  - Se usa «Bet-zur» como transliteración uniforme del topónimo.
  - Se mantiene «hizo reparaciones» para el tecnicismo de Nehemías 3.
  - «Enfrente de» refleja la relación espacial de נֶגֶד sin sobredeterminarla.
  - «Alberca» se emplea como equivalente funcional de בְּרֵכָה en un contexto antiguo.
  - «Hombres valientes» preserva la ambigüedad entre valentía y carácter guerrero.
