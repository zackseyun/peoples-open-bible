review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: cláusula temporal («cuando se cumplan tus días»), modismo de muerte («ir… con tus padres»), sucesión davídica («tu descendencia después de ti»), procedencia de entre los hijos de David, y establecimiento del reino. Sin embargo, «la cual será de entre tus hijos» suena menos natural y, al concordar con «descendencia», puede difuminar que el referente final es un sucesor individual. También conviene ajustar la nota para alinearla con el texto revisado.'
  spanish_quality_summary: El español es claro y digno, pero «irte a estar con tus padres» resulta algo pesado, y «la cual será de entre tus hijos» suena rígido. Una redacción más natural y fiel en español sería «para ir a estar con tus padres» y «que será uno de tus hijos», que preserva mejor el sentido partitivo e individual del hebreo y del English POB auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Descendencia», «levantaré» y «reino» están bien elegidos. No hay lenguaje mesiánico importado indebidamente.
  issues:
  - severity: medium
    issue: «la cual será de entre tus hijos» es poco natural y puede oscurecer el referente individual
    rationale: El hebreo אֲשֶׁר יִהְיֶה מִבָּנֶיךָ especifica que el descendiente prometido será uno de los hijos de David. La concordancia con «descendencia» en femenino singular colectivo introduce una formulación rígida y menos directa que el sentido del texto.
  - severity: low
    issue: «irte a estar con tus padres» suena más coloquial/pesado de lo necesario
    rationale: Aunque comunica bien el modismo, «para ir a estar con tus padres» fluye mejor en español escrito y mantiene el tono digno.
  - severity: low
    issue: La nota al pie debe corresponder exactamente a la redacción anclada en el texto
    rationale: Si el texto revisado dice «ir a estar con tus padres», la nota no debe citar «irte con tus padres».
  revised_spanish_text: Y sucederá[a] que, cuando se cumplan tus días para ir a estar con tus padres, yo levantaré tu descendencia después de ti, que será uno de tus hijos, y estableceré su reino.
  revised_footnotes:
  - marker: a
    text: Literalmente, «ir con tus padres», un modismo hebreo para morir y reunirse con los antepasados.
    reason: cultural_note
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español: «para ir a estar» fluye mejor que «irte a estar», y «que será uno de tus hijos» representa con más claridad el sentido individual y partitivo de אֲשֶׁר יִהְיֶה מִבָּנֶיךָ, en línea con la revisión inglesa auditada. La nota se ajustó para corresponder exactamente al modismo reflejado en el texto.'
