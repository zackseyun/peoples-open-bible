translation:
  language: es
  text: Tendrás una pesa[a] completa y justa; tendrás una efa completa y justa, para que se prolonguen tus días sobre la tierra que Yahvé tu Dios te da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''piedra''; es decir, una pesa de piedra usada en el comercio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן
  english_pob_choice: weight
  chosen_spanish: pesa
  alternatives_spanish:
  - piedra
  - peso
  lexicon: HALOT
  rationale: En este contexto comercial, el hebreo literalmente dice 'piedra', pero se refiere a la pesa usada para medir. 'Pesa' conserva el referente práctico en español sin perder el trasfondo concreto.
- source_word: שְׁלֵמָה
  english_pob_choice: full
  chosen_spanish: completa
  alternatives_spanish:
  - plena
  - entera
  lexicon: HALOT
  rationale: El adjetivo expresa plenitud o integridad. Con pesas y medidas, 'completa' comunica que no falta nada y evita una calca poco natural.
- source_word: וָצֶדֶק
  english_pob_choice: and just
  chosen_spanish: y justa
  alternatives_spanish:
  - y recta
  - y honesta
  lexicon: HALOT
  rationale: En el marco de comercio y medidas, צדק apunta a lo correcto y equitativo. 'Justa' mantiene la dimensión moral y jurídica que el inglés auditado preserva con 'just'.
- source_word: יִהְיֶה לָּךְ
  english_pob_choice: you shall have
  chosen_spanish: Tendrás
  alternatives_spanish:
  - será para ti
  - deberás tener
  lexicon: HALOT
  rationale: La construcción hebrea expresa obligación o requisito legal. 'Tendrás' resulta natural en español y conserva la fuerza normativa del mandato.
- source_word: אֵיפָה
  english_pob_choice: ephah
  chosen_spanish: efa
  alternatives_spanish:
  - medida
  - vasija
  lexicon: HALOT
  rationale: Se trata de una medida seca específica; la transliteración 'efa' sigue la decisión auditada de conservar el término técnico sin sustituirlo por una equivalencia genérica.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce propósito o resultado. 'Para que' es idiomático en español y mantiene la relación causal-final del hebreo.
- source_word: יַאֲרִיכוּ יָמֶיךָ
  english_pob_choice: your days may be long
  chosen_spanish: se prolonguen tus días
  alternatives_spanish:
  - se alarguen tus días
  - vivan muchos años
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente sobre la longitud de los días. 'Se prolonguen tus días' conserva la imagen bíblica sin sonar forzado en español.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra prometida
  lexicon: HALOT
  rationale: '''Adamah'' puede ser ''tierra'' o ''suelo'', pero en Deuteronomio remite a la tierra del pacto. ''Sobre la tierra'' refleja el על y la referencia covenantal sin añadir explicaciones al texto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el Nombre divino. 'Yahvé' preserva la forma distintiva y evita el ocultamiento del Tetragrámaton.
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: te da
  alternatives_spanish:
  - está dándote
  - te está dando
  lexicon: HALOT
  rationale: El participio puede expresar acción característica o inminente. 'Te da' funciona con naturalidad en español y mantiene el carácter vigente de la donación divina.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el Nombre divino en forma audible y no se lo sustituye por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de 'justa' junto a medidas comerciales
  english_pob_reading: full and just
  chosen_spanish_reading: completa y justa
  alternative_spanish_readings:
  - plena y recta
  - entera y honesta
  rationale: La combinación no solo exige exactitud cuantitativa, sino también conformidad ética. 'Justa' preserva esa dimensión de equidad presente en צדק.
  doctrine_reference: Lexical ethics in commercial law passages
translation_notes:
  revision_awareness: 'El audit trail inglés fue estable y no requirió revisiones finales; la versión española sigue la misma solución básica: pesa/efa, ''completa y justa'', propósito con ''para que'' y Nombre divino rendido como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se prefirió 'pesa' para אֶבֶן en el contexto de comercio, evitando una traducción meramente literal que oscurecería el referente.
  - Se preservó la imagen bíblica de los 'días' que se prolongan, en vez de reemplazarla por una paráfrasis de longevidad.
  - Se usó 'tierra' para הָאֲדָמָה siguiendo el uso deuteronómico de la tierra del pacto.
