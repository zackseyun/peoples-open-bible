  rationale: Se conserva el texto principal porque es fiel y natural en español. Se corrigen las notas para reflejar una alternativa real del giro מִנֶּגֶד פְּנֵי יְהוָה y se elimina una nota [b] no sustentada por la evidencia ni por el razonamiento léxico documentado.
