  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones 'Si', 'hijo/hija', 'cornea' y 'juicio' son defendibles. La corrección principal es ajustar לּוֹ de 'con él' a un dativo español natural ('se le hará').
