revisions:
- from: ¡Oh[a], que la salvación de Israel viniera de Sion! Cuando Dios restaure la suerte de su pueblo, se alegrará Jacob; se gozará Israel.
  to: ¡Oh, que la salvación de Israel viniera de Sion! Cuando Dios restaure la suerte[a] de su pueblo, que Jacob se alegre; que Israel se goce.
  rationale: Se corrige el tono verbal de la segunda mitad para preservar el deseo/oración del hebreo y del POB auditado, y se reubica la nota al modismo que realmente explica. Se mantiene 'la suerte de su pueblo' como opción principal por su amplitud idiomática en español, con una nota más natural y más fiel a las alternativas documentadas.
