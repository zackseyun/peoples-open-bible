translation:
  language: es
  text: El cuarto[a], a Izri, sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en el contexto: «El cuarto lote cayó sobre Izri». El sustantivo «lote» está implícito por la lista circundante, pero no se expresa en este versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְבִיעִי
  english_pob_choice: The fourth
  chosen_spanish: El cuarto
  alternatives_spanish:
  - El cuarto lote
  - El cuarto turno
  - La cuarta parte
  lexicon: HALOT
  rationale: El hebreo presenta un ordinal elíptico en una lista de asignaciones. Como en el inglés POB, la forma breve mantiene la estructura del registro sin introducir en el texto principal una palabra que no aparece explícitamente en el versículo. 'Lote' queda implícito por el contexto inmediato.
- source_word: לַיִּצְרִי
  english_pob_choice: to Izri
  chosen_spanish: para Izri
  alternatives_spanish:
  - a Izri
  - de Izri
  lexicon: HALOT
  rationale: La preposición ל expresa aquí asignación o destino dentro de la lista. En español, 'para' comunica mejor esa relación de adjudicación que 'a', y conserva el valor funcional observado en el audit trail.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo puede ser más específico con 'hijos' en sentido masculino, en español 'sus hijos' es la forma natural y transparente para una lista genealógica. Se evita una redundancia dura, pero se mantiene el referente masculino por el contexto y por la inclusión posterior de 'hermanos'.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos
  lexicon: HALOT
  rationale: '''Hermanos'' es la traducción directa y auditable de אֶחִים. En este contexto administrativo/musical puede abarcar parientes o asociados cercanos, pero el término base se conserva sin suavizarlo a ''parientes'' en el texto principal.'
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: El hebreo cierra con el cardinal desnudo, y el español puede hacer lo mismo en una lista. No se añade verbo para no romper la concisión del original.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés que mantiene el ordinal elíptico en el cuerpo principal y reserva ''lot'' para una nota contextual; también se preservó el orden hebreo de adjudicación: ordinal + destinatario + posesivos + total final. No hubo cambios textuales posteriores que afecten el sentido de este versículo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto divino.
  - Se conserva el estilo listado y conciso del hebreo, evitando expandir 'doce' a una cláusula verbal innecesaria.
  - '''Sus hijos y sus hermanos'' reproduce el paralelismo nominal del original sin introducir conectores interpretativos.'
