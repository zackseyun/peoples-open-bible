  - severity: medium
    issue: ‘amantes de sus hermanos’ para φιλάδελφοι resulta torpe/ambiguo
    rationale: El griego denota afecto fraternal literal. En español, ‘amantes de’ puede sonar poco natural o producir una lectura equívoca. ‘Que amaban a sus hermanos’ preserva el sentido con claridad.
