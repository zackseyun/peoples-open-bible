    reason: lexical_alternative
  revision_rationale: Se corrige el español para que sea fiel tanto al hebreo como a las decisiones auditadas del POB en inglés, evitando calcos poco naturales. «De en medio del fuego» reproduce mejor מִתּוֹךְ הָאֵשׁ, y «el sonido de palabras» alinea el verso con la decisión documentada para קוֹל דְּבָרִים, manteniendo el énfasis en palabras audibles y articuladas. También se recoloca la nota [c] sobre «forma» en el punto correspondiente del texto.
