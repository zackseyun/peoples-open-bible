base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/024.yaml
  text: 'Thus says Yahweh: ‘Do not go up or fight against your brothers[a], the sons of Israel. Return, each man to his house[c][b], for this thing is from me.’ So they listened to the word of Yahweh and turned back to go according to the word of Yahweh.'
  footnotes:
  - marker: a
    text: Or 'against your brothers, the Israelites.' The Hebrew reads literally 'with your brothers, the sons of Israel,' but with 'fight' the preposition means fighting against them.
    reason: lexical_alternative
  - marker: b
    text: Or 'for this matter is from me.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your brothers.' The kinship language underscores that this would be war against fellow covenant people.
    reason: cultural_note
