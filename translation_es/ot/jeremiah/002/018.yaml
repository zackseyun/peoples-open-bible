translation:
  language: es
  text: Y ahora, ¿qué tienes tú que ver con el camino a Egipto, para beber las aguas de Sihor[a]? ¿Y qué tienes tú que ver con el camino a Asiria, para beber las aguas del Río[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sihor es probablemente un nombre del Nilo o de una de sus ramas orientales.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el río Éufrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: Conserva la conjunción inicial y el adverbio temporal como transición retórica. «Y ahora» suena natural en español y refleja el arranque del reproche sin añadir contraste que el hebreo no exige.
- source_word: מַה לָּךְ
  english_pob_choice: what have you to do with
  chosen_spanish: ¿qué tienes tú que ver con
  alternatives_spanish:
  - ¿qué tienes que ver con
  - ¿qué asunto tienes con
  lexicon: HALOT
  rationale: La idiomática hebrea expresa desapego o reprensión, no una pregunta informativa. En español, «¿qué tienes tú que ver con…?» mantiene esa fuerza idiomática y el matiz de reproche.
- source_word: לְדֶרֶךְ
  english_pob_choice: the way to
  chosen_spanish: el camino a
  alternatives_spanish:
  - el camino hacia
  - la vía a
  lexicon: HALOT
  rationale: «Derekh» puede ser «camino/way». En este contexto, el español natural es «camino a», que conserva la metáfora de ruta o orientación sin forzar un calco.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español.
- source_word: לִשְׁתּוֹת
  english_pob_choice: to drink
  chosen_spanish: para beber
  alternatives_spanish:
  - para tomar
  - a beber
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa naturalmente con «para beber», que conserva la finalidad de la construcción hebrea.
- source_word: מֵי שִׁחוֹר
  english_pob_choice: the waters of Shihor
  chosen_spanish: las aguas de Sihor
  alternatives_spanish:
  - las aguas del Nilo
  - las aguas de Shijor
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en el POB inglés. No se sustituye por «Nilo» en el texto principal para no borrar la alternativa lexical documentada y la incertidumbre del referente exacto.
- source_word: וּמַה לָּךְ
  english_pob_choice: And what have you to do with
  chosen_spanish: ¿Y qué tienes tú que ver con
  alternatives_spanish:
  - ¿Y qué tienes que ver con
  - ¿Y por qué vas a
  lexicon: HALOT
  rationale: Se repite el mismo giro de reproche para preservar el paralelismo del hebreo. «¿Y qué tienes tú que ver con…?» reproduce la reiteración sin suavizar el tono.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  lexicon: HALOT
  rationale: Nombre nacional estándar en español.
- source_word: מֵי נָהָר
  english_pob_choice: the waters of the River
  chosen_spanish: las aguas del Río
  alternatives_spanish:
  - las aguas del Éufrates
  - las aguas del gran río
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «el Río» en el texto principal, como hizo el POB inglés, para preservar la formulación fuente y la paralelismo con Sihor. La identificación interpretativa con el Éufrates queda para nota.
theological_decisions:
- issue: Sentido figurado de beber aguas extranjeras
  english_pob_reading: Retain the metaphor of drinking the waters of Egypt and Assyria as a rebuke of seeking political dependence or alliance with foreign powers, without making the interpretation explicit in the main text.
  chosen_spanish_reading: Conservar la metáfora de beber las aguas de Egipto y Asiria como reproche por buscar apoyo o dependencia en potencias extranjeras, sin explicitar la interpretación en el cuerpo del versículo.
  alternative_spanish_readings:
  - Parafrasear como buscar ayuda en Egipto y Asiria
  - Entenderlo de manera principalmente literal como viaje o acceso a agua
  rationale: El contexto de Jeremías da a la imagen un valor político-metafórico, pero el versículo mismo formula la metáfora, no su explicación. La traducción mantiene la imagen y evita una paráfrasis interpretativa que exceda el texto.
  doctrine_reference: Jeremías 2:18; contexto inmediato de Jeremías 2
- issue: Tratamiento de los nombres geográficos oscuros Sihor / Río
  english_pob_reading: Shihor is likely a name for the Nile or one of its eastern branches; 'the River' likely refers to the Euphrates.
  chosen_spanish_reading: Conservar «Sihor» y «el Río» en el texto principal, con identificación probable en nota.
  alternative_spanish_readings:
  - Sustituir por «Nilo» y «Éufrates» en el texto principal
  - Explicar la identificación solo en el cuerpo del texto
  rationale: El español puede perder la tensión textual si se sustituyen los nombres por equivalentes interpretativos. La nota permite la identificación probable sin borrar la forma heredada del hebreo y el paralelismo retórico del versículo.
  doctrine_reference: Jeremías 2:18; nota lexical sobre topónimos
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'road' por 'way' para dar mayor naturalidad y formalidad a derek. La redacción española sigue esa decisión con «camino», que es el equivalente más natural y digno en este contexto, manteniendo además la repetición retórica del hebreo y la preservación de los nombres propios en el texto principal.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como término general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - Se preserva el paralelo doble de la pregunta retórica con la misma estructura sintáctica en ambas cláusulas.
  - «Sihor» y «el Río» quedan transliterados/retendidos en el texto principal para no diluir la decisión lexical documentada.
  - No se introduce «Cristo/Mesías» ni otros términos teológicos ajenos al versículo.
