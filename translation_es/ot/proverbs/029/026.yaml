    text: 'O: «el favor de un gobernante». Literalmente: «el rostro de un gobernante».'
    reason: lexical_alternative
  - marker: b
    text: «Un hombre» es un singular genérico en hebreo, con referencia a cualquier persona en general.
    reason: cultural_note
