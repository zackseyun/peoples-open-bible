translation:
  language: es
  text: Y el profeta Isaías clamó a Yahvé, y él hizo retroceder la sombra diez peldaños, por los que había descendido en los peldaños de Acaz.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'diez grados'. El hebreo dice 'diez peldaños/subidas' (ma‘alot), tradicionalmente entendidos por algunos como parte de un dispositivo para medir la sombra; de ahí 'reloj de sol de Acaz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - llamó
  - clamó a gritos
  - oró
  lexicon: HALOT
  rationale: קרא con אֶל־יְהוָה expresa un llamado dirigido a Dios, con fuerza de súplica. 'Clamó' conserva el tono vivo del verbo sin volverlo meramente informativo; 'oró' explicita demasiado la acción y 'llamó' puede sonar más débil en español.
- source_word: יְשַׁעְיָהוּ הַנָּבִיא
  english_pob_choice: Isaiah the prophet
  chosen_spanish: Isaías el profeta
  alternatives_spanish:
  - el profeta Isaías
  - Isaías, el profeta
  lexicon: uso estándar del nombre propio y del título
  rationale: Se mantiene el nombre propio con la forma habitual en español y se traduce el título de manera directa, sin añadir puntuación explicativa que no está en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / nombre divino
  rationale: El texto hebreo usa el Tetragrámaton. Conforme al criterio del proyecto, se traslada como 'Yahvé' en el texto principal, no como una sustitución por 'SEÑOR'.
- source_word: וַיָּשֶׁב
  english_pob_choice: he brought ... back
  chosen_spanish: hizo retroceder
  alternatives_spanish:
  - hizo volver
  - volvió
  lexicon: HALOT
  rationale: El verbo causativo de שוב requiere una solución causativa en español. 'Hizo retroceder' expresa con naturalidad que la sombra fue movida hacia atrás por acción divina.
- source_word: אֶת הַצֵּל
  english_pob_choice: the shadow
  chosen_spanish: la sombra
  alternatives_spanish:
  - la sombra solar
  - la sombra del sol
  lexicon: HALOT
  rationale: El objeto directo es 'la sombra'; el hebreo no añade 'solar'. Se evita ampliar el referente más allá del texto.
- source_word: בַּמַּעֲלוֹת
  english_pob_choice: the ten steps / steps
  chosen_spanish: las diez gradas
  alternatives_spanish:
  - las diez gradas
  - los diez peldaños
  - las diez escaleras
  lexicon: HALOT
  rationale: מַעֲלוֹת significa literalmente 'subidas/gradas/peldaños'. 'Gradas' funciona bien en español para una estructura escalonada o de medición y evita el matiz interpretativo de 'diales'.
- source_word: אֲשֶׁר יָרְדָה
  english_pob_choice: by which it had gone down
  chosen_spanish: por las que había descendido
  alternatives_spanish:
  - por donde había bajado
  - que había descendido
  lexicon: HALOT
  rationale: La relativa describe el descenso previo de la sombra. 'Había descendido' refleja el movimiento hacia abajo con un registro algo más formal que 'había bajado'.
- source_word: בְּמַעֲלוֹת אָחָז
  english_pob_choice: on the steps of Ahaz
  chosen_spanish: sobre las gradas de Acaz
  alternatives_spanish:
  - en las gradas de Acaz
  - en la escalera de Acaz
  - sobre el aparato de Acaz
  lexicon: HALOT
  rationale: El hebreo menciona las 'gradas de Acaz' sin identificar explícitamente un dial. Se conserva el sustantivo textual 'gradas' y el nombre propio con la forma española habitual 'Acaz'.
- source_word: אֲחֹרַנִּית
  english_pob_choice: back
  chosen_spanish: retroceder
  alternatives_spanish:
  - hacia atrás
  - de nuevo
  lexicon: HALOT
  rationale: El adverbio indica movimiento inverso. En español, la idea ya queda integrada en 'hizo retroceder', evitando una repetición innecesaria.
- source_word: עֶשֶׂר מַעֲלוֹת
  english_pob_choice: ten steps
  chosen_spanish: las diez gradas
  alternatives_spanish:
  - diez gradas
  - diez peldaños
  - diez grados
  lexicon: HALOT
  rationale: Se conserva la misma equivalencia usada antes para mantener consistencia terminológica. 'Gradas' traduce el valor léxico básico de מַעֲלוֹת sin imponer la interpretación tradicional de 'grados'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El pasaje contiene el Tetragrámaton de forma directa. La política del proyecto pide conservar el nombre divino explícito en español; 'Yahvé' corresponde al uso del POB en el texto principal y mantiene visible la identidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Naturaleza de מַעֲלוֹת אָחָז
  english_pob_reading: steps of Ahaz
  chosen_spanish_reading: gradas de Acaz
  alternative_spanish_readings:
  - escalera de Acaz
  - escalones de Acaz
  - dial de Acaz
  rationale: El hebreo habla de 'gradas/peldaños' y no de un 'dial'. Para no resolver prematuramente una reconstrucción histórica, la traducción principal conserva el término más cercano al texto. La nota permite la alternativa interpretativa tradicional sin incorporarla al cuerpo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
- issue: Valor del verbo causativo con la sombra
  english_pob_reading: he brought the shadow back
  chosen_spanish_reading: hizo retroceder la sombra
  alternative_spanish_readings:
  - volvió la sombra
  - hizo volver la sombra
  rationale: 'La acción divina es causativa: no se describe un retorno autónomo, sino un hacer volver la sombra. ''Hizo retroceder'' comunica con claridad ese sentido dinámico y mantiene la tensión milagrosa del relato.'
  doctrine_reference: HALOT / lectura verbal del hiphil de שוב
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que añadió el artículo definido implícito en la secuencia numérica y mantuvo la equivalencia literal de ma‘alot como 'steps'. En español, se optó por 'las diez gradas' para conservar ese mismo nivel de literalidad con naturalidad idiomática. También se evitó introducir 'dial' en el texto principal, siguiendo la revisión que prefirió no resolver la reconstrucción histórica en la traducción base.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de una sustitución por 'SEÑOR', conforme al criterio del proyecto para el Tetragrámaton.
  - Se usa 'Acaz' como forma española estándar del nombre propio.
  - '''Gradas'' se usa de manera consistente para מַעֲלוֹת en el cuerpo y en la nota, para evitar alternancia con ''grados'' en el texto principal.'
  - La sintaxis conserva el orden narrativo del hebreo sin forzar una paráfrasis explicativa.
