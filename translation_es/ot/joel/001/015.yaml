translation:
  language: es
  text: ¡Ay por aquel día! Porque cercano está el día de Yahvé, y viene como destrucción[a] desde el Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como destrucción de Shaddai». El hebreo hace un juego de palabras entre שֹׁד («destrucción») y שַׁדַּי («Shaddai», el Todopoderoso).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Oh, no!
  - ¡Ay del día!
  lexicon: HALOT
  rationale: Es una interjección de lamento. «¡Ay!» comunica dolor y alarma de manera natural en español; el complemento «del día» se mantiene por el siguiente elemento hebreo lַיּוֹם y por el paralelo poético del versículo.
- source_word: לַיּוֹם
  english_pob_choice: for the day
  chosen_spanish: del día
  alternatives_spanish:
  - para el día
  - por el día
  - ¡ay del día!
  lexicon: HALOT
  rationale: La preposición ל en este contexto idiomático acompaña la exclamación de lamento. En español, «del día» integra mejor la construcción exclamativa que un calco más rígido.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en verdad
  lexicon: HALOT
  rationale: Introduce la razón del lamento. «Porque» conserva la fuerza explicativa y resulta natural al inicio de una cláusula profética.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: cerca está
  alternatives_spanish:
  - está cerca
  - se acerca
  - está próximo
  lexicon: HALOT
  rationale: Adjetivo predicativo de inminencia. «Cerca está» mantiene el orden enfático del hebreo y su cadencia poética en español.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahvé
  - el día de Yahveh
  - el día del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el criterio del proyecto. «Día de Yahvé» es la forma más directa y transparente para el hebreo יוֹם יְהוָה.
- source_word: וּכְשֹׁד
  english_pob_choice: and it comes like destruction
  chosen_spanish: y viene como destrucción[b]
  alternatives_spanish:
  - y viene como devastación
  - y viene como ruina
  - y viene como despojo
  lexicon: HALOT
  rationale: שֹׁד denota ruina violenta, devastación o destrucción. «Destrucción» comunica bien el impacto del término y deja espacio para la nota que preserva el juego de palabras hebreo.
- source_word: מִשַׁדַּי
  english_pob_choice: from the Almighty
  chosen_spanish: de parte del Todopoderoso
  alternatives_spanish:
  - del Todopoderoso
  - desde el Todopoderoso
  - de Shaddai
  lexicon: HALOT
  rationale: שַׁדַּי se traduce de manera convencional como «Todopoderoso». La expresión «de parte de» expresa fuente/origen con naturalidad en español y mantiene la relación semántica con el sustantivo anterior.
- source_word: יָבֹוא
  english_pob_choice: it comes
  chosen_spanish: viene
  alternatives_spanish:
  - vendrá
  - está viniendo
  - ha de venir
  lexicon: HALOT
  rationale: El imperfecto puede expresar futuro inminente o certeza profética. «Viene» reproduce la vivacidad del presente profético que el inglés POB también reflejó con «comes».
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue el criterio del proyecto para preservar el nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma establecida en el texto español de trabajo y es directamente audit-able respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Juego de palabras entre שֹׁד y שַׁדַּי
  english_pob_reading: like destruction from the Almighty
  chosen_spanish_reading: como destrucción... de parte del Todopoderoso
  alternative_spanish_readings:
  - como ruina... del Todopoderoso
  - como devastación... de parte del Todopoderoso
  - como destrucción de parte de Shaddai
  rationale: La decisión principal es conservar el contraste semántico entre la ruina que viene y el nombre divino. En español no se puede reproducir el sonido exacto de שֹׁד / שַׁדַּי sin forzar el texto, por lo que la nota explica el juego de palabras hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical/theological tension — Hebrew paronomasia should be preserved in notes when untranslatable in the main text'
translation_notes:
  revision_awareness: El inglés POB vigente fue revisado y confirmado como estable (pass final sin cambios). La versión española sigue ese mismo sentido, preservando el lamento inicial, la inminencia del día de Yahvé y la nota sobre el juego de palabras hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evita «Señor» como sustituto del nombre divino en el texto principal.
  - «Todopoderoso» se usa para שַׁדַּי, manteniendo claridad y la asociación con el juego de palabras hebreo.
  - El tono es poético y sobrio, acorde con una fórmula profética de lamentación.
