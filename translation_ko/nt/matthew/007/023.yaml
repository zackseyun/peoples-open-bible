lexical_decisions:
- source_word: ἀνομίαν
  english_pob_choice: lawlessness
  chosen_korean: 불법
  alternatives_korean:
  - 무법
  - 율법을 벗어남
  lexicon: BDAG
  rationale: ἀνομία는 「토라 없음」의 함의를 가진다. 한국 성서 정형 「불법」을 채택한다.
theological_decisions:
- issue: 심판의 선언 — 예수의 자기 권위적 발화
  chosen_reading: 『나는 너희를 도무지 알지 못한다. …내게서 떠나가라.』
  alternative_readings:
  - 『나는 너희를 알지 못한다. …떠나가십시오.』
  rationale: 심판자로서의 예수의 권위적 직접 발화는 합쇼체로 옮기지 않는다. 평어 명령형 「떠나가라」가 심판의 결정성·단호함을 본문 그대로 살린다. 본 번역의 합쇼체 원칙의 의도적 예외(심판 선언).
  doctrine_reference: 'Korean register policy: judgment declarations preserve decisive force'
