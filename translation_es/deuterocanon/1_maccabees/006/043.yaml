translation:
  language: es
  text: Entonces Eleazar el Avarán vio a una de las bestias[a] armada con corazas reales[b], y sobresalía por encima de todas las bestias, y pareció que el rey estaba sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'una de las bestias'; en este contexto se trata de elefantes de guerra.
    reason: cultural_note
  - marker: b
    text: '''Corazas'' refleja de manera más directa θώραξ que una traducción más general como ''armadura''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεάζαρ ὁ Σαυαρὰν
  english_pob_choice: Eleazar the Avaran
  chosen_spanish: Eleazar el Avarán
  alternatives_spanish:
  - Eleazar de Savarán
  - Eleazar hijo de Savarán
  lexicon: propio / transliteración histórica
  rationale: El epíteto funciona como designación propia. Se conserva en forma transliterada española para mantener la función onomástica del griego y la tradición de 1 Macabeos.
- source_word: ἐν τῶν θηρίων
  english_pob_choice: one of the beasts
  chosen_spanish: una de las bestias
  alternatives_spanish:
  - entre las bestias
  - una de los elefantes
  lexicon: θήριον
  rationale: El griego dice literalmente 'una de las bestias'. En contexto militar se trata de elefantes de guerra, pero la redacción española sigue el término del texto y deja que el contexto lo especifique.
- source_word: τεθωρακισμένον θώραξιν βασιλικοῖς
  english_pob_choice: armored with royal breastplates
  chosen_spanish: armada con corazas reales
  alternatives_spanish:
  - armada con petos reales
  - cubierta con armadura real
  lexicon: θωρακίζω / θώραξ / βασιλικός
  rationale: '''Coraza''/''corazas'' comunica el campo semántico de θώραξ sin sonar forzado en español. ''Reales'' refleja βασιλικοῖς. Se evita una repetición demasiado literal de ''armada con petos'' por naturalidad, sin perder el referente a una protección militar.'
- source_word: ὑπεράγον πάντα τὰ θηρία
  english_pob_choice: it towered above all the beasts
  chosen_spanish: sobresalía por encima de todas las bestias
  alternatives_spanish:
  - se alzaba por encima de todas las bestias
  - era superior a todas las bestias
  lexicon: ὑπεράγω
  rationale: El verbo expresa sobresalir o sobresalir por encima. 'Sobresalía por encima' conserva la imagen visual de superioridad/altura sin añadir una interpretación más abstracta.
- source_word: ὤφθη ὅτι ἐν αὐτῷ ἐστιν ὁ βασιλεύς
  english_pob_choice: it appeared that the king was on it
  chosen_spanish: pareció que el rey estaba sobre ella
  alternatives_spanish:
  - parecía que el rey estaba sobre ella
  - se vio que el rey estaba sobre ella
  lexicon: ὤφθη + ὅτι / ἐν αὐτῷ
  rationale: El griego expresa apariencia, no certeza. En español, 'pareció' mantiene el matiz de percepción/inferencia. 'Sobre ella' es la forma natural para un jinete o pasajero en un elefante, sin traducir mecánicamente el ἐν griego como 'en' cuando el contexto pide 'sobre'.
theological_decisions:
- issue: El grado de certeza sobre la presencia del rey
  english_pob_reading: it appeared that the king was on it
  chosen_spanish_reading: pareció que el rey estaba sobre ella
  alternative_spanish_readings:
  - parecía que el rey estaba sobre ella
  - se creyó que el rey estaba sobre ella
  rationale: La escena presenta una impresión visual, no una afirmación segura. 'Pareció' conserva esa tensión y evita convertir la observación en hecho confirmado.
  doctrine_reference: Narrative epistemology / cautious rendering of apparent perception
translation_notes:
  revision_awareness: La base inglesa revisó 'covered with royal armor' a 'armored with royal breastplates' para acercarse más al griego, y cambió una formulación subjetiva ('he thought') a una impersonal de apariencia ('it appeared'). La redacción española sigue esa revisión, pero adapta θώραξ con 'corazas' por naturalidad y mantiene el valor de apariencia con 'pareció'.
  spanish_consistency_notes:
  - Se mantiene 'Avarán' como transliteración del epíteto propio, evitando la traducción explicativa dentro del texto principal.
  - '''Bestias'' conserva el vocabulario del griego y de la auditoría inglesa; la nota aclara que en contexto son elefantes de guerra.'
  - Se usa 'pareció' para no afirmar certeza donde el griego expresa percepción aparente.
  - Se prefiere 'sobre ella' por idiomaticidad española para un elefante montado, sin perder la relación espacial del original.
