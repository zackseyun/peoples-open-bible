translation:
  language: es
  text: Pero debajo de la túnica de cada uno de los muertos encontraron objetos sagrados[a] de los ídolos de Jamnia, que la ley prohíbe a los judíos tener; y a todos les quedó claro que por esta causa estos hombres habían caído[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'objetos sagrados', 'ofrendas votivas' o, posiblemente, 'amuletos' de los ídolos de Jamnia.
    reason: lexical_alternative
  - marker: b
    text: '''Habían caído'' es un modismo bélico que significa que habían muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστου τῶν τεθνηκότων / under the tunic of each of the dead
  english_pob_choice: under the tunic of each of the dead
  chosen_spanish: debajo de la túnica de cada uno de los muertos
  alternatives_spanish:
  - bajo la túnica de cada uno de los caídos
  - debajo de la prenda interior de cada muerto
  lexicon: LSJ
  rationale: El griego usa singular distributivo ('de cada uno') y χιτών como prenda interior o túnica. 'Túnica' preserva precisión histórica y naturalidad en español, mientras que 'muertos' conserva el referente directo del texto.
- source_word: ἱερώματα
  english_pob_choice: sacred tokens
  chosen_spanish: objetos sagrados
  alternatives_spanish:
  - objetos consagrados
  - ofrendas votivas
  - amuletos
  lexicon: LSJ
  rationale: ἱερώματα admite varios matices cultuales. En español, 'objetos sagrados' es suficientemente amplio y no fuerza una identificación más específica que el griego no exige. Se evita 'amuletos' por ser más interpretativo.
- source_word: τῶν ἀπὸ Ἰαμνίας εἰδώλων
  english_pob_choice: of the idols from Jamnia
  chosen_spanish: de los ídolos de Jamnia
  alternatives_spanish:
  - de los ídolos procedentes de Jamnia
  - de los ídolos de la región de Jamnia
  lexicon: LSJ
  rationale: La relación genitiva se entiende de manera más directa en español como procedencia o asociación geográfica. 'De Jamnia' mantiene la vinculación sin sobreinterpretar el matiz sintáctico.
- source_word: ἀπήργει
  english_pob_choice: forbids
  chosen_spanish: prohíbe
  alternatives_spanish:
  - prohibía
  - impide
  - veta
  lexicon: LSJ
  rationale: El verbo expresa restricción legal. 'Prohíbe' reproduce de forma clara la fuerza normativa del texto y suena natural en español moderno.
- source_word: τοὺς Ἰουδαίους
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judíos del pueblo
  - a los judíos
  lexicon: LSJ
  rationale: Se conserva la designación étnico-religiosa del texto. En español, el dativo/objeto indirecto se expresa naturalmente como 'a los judíos' en la cláusula de prohibición.
- source_word: σαφὲς ἐγένετο
  english_pob_choice: it became clear
  chosen_spanish: les quedó claro
  alternatives_spanish:
  - se hizo claro
  - quedó claro
  lexicon: LSJ
  rationale: '''Les quedó claro'' transmite bien el resultado de comprensión general de ''a todos'' y mantiene un registro sobrio y fluido en español.'
- source_word: τούσδε πεπτωκέναι
  english_pob_choice: these men had fallen
  chosen_spanish: éstos habían caído
  alternatives_spanish:
  - éstos habían muerto
  - éstos habían sido derribados
  lexicon: LSJ
  rationale: El perfectivo de πίπτω conserva la imagen de 'caer'. 'Habían caído' mantiene el idiomático marcial del griego y evita resolver de más si el énfasis es muerte o derrota.
theological_decisions:
- issue: Relación causal entre los objetos idolátricos y la muerte de los soldados
  english_pob_reading: The verse states that it became clear to all that the men had fallen for this reason.
  chosen_spanish_reading: El versículo afirma que a todos les quedó claro que éstos habían caído por esta causa.
  alternative_spanish_readings:
  - El versículo sugiere una conclusión comunitaria, sin convertirla en explicación absoluta.
  - El versículo puede entenderse como una inferencia del narrador y de los presentes, no como una tesis doctrinal general.
  rationale: 'Se mantiene la conexión causal tal como la formula el griego y la lectura inglesa auditada, sin añadir una explicación teológica externa. La redacción española conserva la tensión: el texto presenta una inferencia clara, pero no la amplía más allá de lo dicho.'
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se respetó el singular distributivo (''de cada uno de los muertos'' / ''de cada uno de la túnica''), se mantuvo la relación geográfica ''de Jamnia'' y se aclaró la cláusula legal con una construcción natural en español (''prohíbe a los judíos tener''). La última cláusula conserva el idiomatismo bélico de πίπτω sin explicitar innecesariamente ''murieron''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evitó 'SEÑOR' como sustituto teológico innecesario.
  - '''Judíos'' se mantiene como designación del grupo en el marco legal del texto.'
  - '''Habían caído'' conserva el valor idiomático de combate, coherente con la práctica POB de no desactivar la imagen del original.'
