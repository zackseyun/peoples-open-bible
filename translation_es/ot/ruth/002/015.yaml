  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé/Mesías u otros términos sensibles. Las decisiones léxicas clave son mayormente adecuadas: «espigar», «gavillas», y una forma de «humillar/avergonzar». La mejor alineación con la rationale inglesa para תַכְלִימוּהָ sería «humillen» en el texto principal, dejando «avergüencen» como alternativa.'
