translation:
  language: es
  text: Y harás dos anillos de oro para él, debajo de su moldura[a]; en sus dos paneles laterales[b] los harás, en sus dos lados, y servirán como soportes para las varas[c], para llevarlo con ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de su borde» o «bajo su ribete»; זֵר designa la moldura decorativa que rodeaba el altar.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en sus dos estructuras laterales ... en sus dos lados», una formulación algo repetitiva que subraya la colocación en ambos lados.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «serán casas para las varas», es decir, receptáculos o soportes para los palos de carga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּעֹת זָהָב
  english_pob_choice: gold rings
  chosen_spanish: anillos de oro
  alternatives_spanish:
  - aros de oro
  - anillos dorados
  lexicon: HALOT
  rationale: טַבַּעַת designa un anillo o aro de metal; en español, «anillos de oro» conserva el material y la forma sin sonar forzado. «Aros» también es posible, pero «anillos» sigue mejor el valor general del término y el uso de la POB en inglés.
- source_word: מִתַּחַת לְזֵרוֹ
  english_pob_choice: under its molding
  chosen_spanish: debajo de su moldura
  alternatives_spanish:
  - debajo de su borde
  - bajo su ribete
  lexicon: HALOT
  rationale: זֵר en este contexto de mobiliario del tabernáculo se refiere a la moldura decorativa del altar. «Moldura» comunica mejor ese elemento arquitectónico que «borde» o «ribete», sin perder la ubicación relativa de «debajo de».
- source_word: צַלְעֹתָיו
  english_pob_choice: side panels
  chosen_spanish: sus dos costados
  alternatives_spanish:
  - sus paneles laterales
  - sus lados
  lexicon: HALOT
  rationale: צֵלָע puede significar costado, lado estructural o panel lateral. En español, «costados» conserva la idea de una pieza lateral construida y evita una interpretación demasiado técnica o demasiado anatómica; por eso se usa aquí, aunque la POB inglesa explicita «side panels».
- source_word: עַל שְׁנֵי צִדָּיו
  english_pob_choice: on its two sides
  chosen_spanish: sobre sus dos lados
  alternatives_spanish:
  - en ambos lados
  - sobre ambos lados
  lexicon: HALOT
  rationale: צַד es «lado». La repetición hebrea enfatiza la colocación bilateral; «sobre sus dos lados» mantiene esa redundancia con naturalidad en español.
- source_word: וְהָיָה לְבָתִּים לְבַדִּים
  english_pob_choice: they shall be holders for poles
  chosen_spanish: serán soportes para las varas
  alternatives_spanish:
  - serán receptáculos para las varas
  - serán alojamientos para las varas
  lexicon: HALOT
  rationale: בָּתִּים literalmente significa «casas», pero aquí funciona como receptáculos o soportes para las varas. «Soportes» transmite la función sin introducir una imagen demasiado doméstica; «varas» responde al valor de בַּדִּים en el contexto de transporte litúrgico.
- source_word: בַדִּים
  english_pob_choice: poles
  chosen_spanish: varas
  alternatives_spanish:
  - barras
  - pértigas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, בַּדִּים son las varas de carga para transportar el objeto sagrado. «Varas» es claro y más natural en español bíblico contemporáneo que «poles» calca o «pértigas».
- source_word: לָשֵׂאת אֹתוֹ בָּהֵמָּה
  english_pob_choice: with which to carry it
  chosen_spanish: para llevarlo con ellas
  alternatives_spanish:
  - para cargarlo con ellas
  - para transportarlo con ellas
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad y el pronombre se refiere a las varas. «Para llevarlo con ellas» conserva el sentido instrumental y evita una construcción rígida; «con ellas» hace explícito el medio de transporte.
- source_word: תַּעֲשֶׂה ... תַּעֲשֶׂה
  english_pob_choice: you shall make ... you shall make
  chosen_spanish: harás ... los harás
  alternatives_spanish:
  - deberás hacer ... deberás hacer
  - hacerás ... hacerás
  lexicon: HALOT
  rationale: La forma verbal instructiva en segunda persona masculina singular se traduce con futuro de mandato («harás») para mantener el tono directivo del hebreo y una lectura publicable en español.
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios y con acuerdo alto; esta propuesta conserva ese consenso, pero adapta el inglés auditado al español con decisiones léxicas equivalentes y sin añadir contenido no atestiguado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto; este versículo no lo contiene.
  - Se usa «varas» para בַּדִּים, en continuidad con el uso de piezas de transporte del tabernáculo.
  - Se evita «SEÑOR» como sustituto editorial y no aparece en este versículo.
  - La duplicación hebrea de la localización bilateral se conserva con «sobre sus dos costados ... sobre sus dos lados» y la nota b.
