  revision_rationale: Se ajusta «Acérquense a mí, por favor» para una colocación más natural del ruego cortés en español. Se reemplaza «su hermano» por «el hermano de ustedes» para reflejar con mayor claridad y fuerza la segunda persona plural del hebreo אֲחִיכֶם sin caer en una forma posesiva ambigua. También se simplifica «Entonces él dijo» a «Entonces dijo», que suena más idiomático en español y conserva plenamente el sentido.
