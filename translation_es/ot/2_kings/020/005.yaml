base_translation:
  language: en
  yaml_path: translation/ot/2_kings/020/005.yaml
  text: 'Go back and say to Hezekiah[a], the leader of my people, ‘Thus says Yahweh, the God of David your father: I have heard your prayer; I have seen your tears. Behold, I will heal you. On the third day you shall go up to the house of Yahweh.’'
  footnotes:
  - marker: a
    text: Or, 'I will heal you.' The Hebrew reads more literally, 'Look, I am healing you,' using a participle that can express imminent action.
    reason: lexical_alternative
