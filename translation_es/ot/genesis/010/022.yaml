review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura básica del hebreo: una lista genealógica con «Los hijos de Sem» seguida de cinco nombres. Conserva bien «Sem», «Elam», «Lud» y «Aram», y mantiene el valor genealógico de אַשּׁוּר y אֲרָם como nombres propios, no regiones. Sin embargo, el anclaje de la nota [a] está mal colocado: en el rastro inglés la nota léxica corresponde a «Arpachshad», no a «Elam». Además, la forma «Arpajshad» es menos natural y menos estable en español que una transliteración más transparente del hebreo como «Arpacsad», mientras que la nota debe preservar la alternativa tradicional influida por el griego.'
  spanish_quality_summary: El texto es claro y legible, pero requiere una corrección menor para alinear mejor notas y transliteración. «Asur» es aceptable en español para אַשּׁוּר dentro de una genealogía. La frase general suena natural y digna. La principal mejora es usar una forma más inteligible y convencional en español para אַרְפַּכְשַׁד y reubicar la nota léxica en ese nombre.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. En nombres propios, el borrador sigue razonablemente la política de transliterar según el hebreo y no sustituir por equivalentes geográficos («Asiria», «Siria»). La revisión propuesta mantiene esa orientación y mejora la coherencia con la decisión léxica documentada para אַרְפַּכְשַׁד.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Elam», pero la evidencia inglesa la asigna a «Arpachshad».
    rationale: La nota explica la alternativa tradicional del nombre אַרְפַּכְשַׁד frente a la forma influida por el griego; aplicada a «Elam» resulta incorrecta y confunde al lector.
  - severity: medium
    issue: La nota [a] actual no preserva la razón léxica documentada.
    rationale: La nota española habla de la transliteración de «Elam», pero la auditoría inglesa preserva una alternativa textual/nominativa para אַרְפַּכְשַׁד («Arphaxad»). La nota debe reflejar esa decisión.
  - severity: low
    issue: «Arpajshad» suena poco natural en español y puede dificultar la lectura.
    rationale: Aunque intenta acercarse al hebreo, la secuencia «jsh» es gráficamente extraña en español. «Arpacsad» mantiene mejor fidelidad funcional al hebreo y mejora la legibilidad.
  revised_spanish_text: 'Los hijos de Sem: Elam, Asur, Arpacsad[a], Lud[b] y Aram.'
  revised_footnotes:
