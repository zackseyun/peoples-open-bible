revisions:
- from: 'Toda carne se desgasta como un vestido[a], y el decreto eterno es: «Morir, morirán».'
  to: 'Toda carne se desgasta como una prenda[a], y el decreto eterno es: «Muriendo, morirán».'
  rationale: Se ajusta «vestido» a «prenda» para representar con más precisión el sentido genérico de בגד / ἱμάτιον en español. Se cambia «Morir, morirán» por «Muriendo, morirán» para preservar la fuerza enfática del original con una formulación más natural y comprensible en español, manteniendo además la nota sobre la dificultad del hebreo. Como el ancla [a] estaba en «vestido» pero la nota trata la cláusula final, se reubica el marcador junto a «prenda» solo si se desea alguna nota en el versículo; sin embargo, idealmente la nota debería anclarse en la cláusula final. Dado el requisito de marcadores exactos, se conserva un único marcador en el texto revisado.
