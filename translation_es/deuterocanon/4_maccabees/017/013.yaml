translation:
  language: es
  text: Eleazar tomaba la delantera en la contienda[a]; la madre de los siete hijos competía como atleta; y los hermanos contendían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa una serie de verbos de contienda: Eleazar «tomaba la delantera en la lucha», la madre «competía como atleta» y los hermanos «contendían». La traducción conserva esa imaginería compartida con una variación moderada en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προηγωνίζετο
  english_pob_choice: was taking the lead in the contest
  chosen_spanish: iba delante en la contienda
  alternatives_spanish:
  - iba al frente en la contienda
  - tomaba la delantera en la contienda
  - iba delante en el combate
  lexicon: LSJ
  rationale: El imperfecto medio de προαγωνίζομαι expresa ir delante o preceder a otros dentro de una lucha/contienda. «Iba delante» conserva la idea de precedencia sin volver demasiado literal la imagen inglesa, y «contienda» mantiene el campo agonístico del verso.
- source_word: ἐνήθλει
  english_pob_choice: was competing like an athlete
  chosen_spanish: estaba compitiendo como atleta
  alternatives_spanish:
  - estaba contendiendo como atleta
  - estaba compitiendo atléticamente
  - estaba luchando como atleta
  lexicon: LSJ
  rationale: El verbo derivado de ἀθλέω conserva un matiz atlético explícito. «Como atleta» preserva esa metáfora en español de manera natural y transparente.
- source_word: ἠγωνίζοντο
  english_pob_choice: were contending
  chosen_spanish: estaban contendiendo
  alternatives_spanish:
  - estaban compitiendo
  - estaban luchando
  - estaban esforzándose
  lexicon: BDAG
  rationale: ἀγωνίζομαι puede abarcar contender, competir o luchar. «Contendiendo» mantiene el paralelismo verbal del griego y no especifica más de lo que el texto exige.
- source_word: μήτηρ τῶν ἑπτὰ παίδων
  english_pob_choice: the mother of the seven sons
  chosen_spanish: la madre de los siete hijos
  alternatives_spanish:
  - la madre de los siete hijos varones
  - la madre de los siete muchachos
  - la madre de los siete hijos e hijas
  lexicon: LSJ
  rationale: Aunque el contexto identifica a varones, «hijos» es una forma natural en español para παῖδες y evita un giro recargado. El contexto narrativo ya deja claro que se trata de los siete hermanos.
- source_word: ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos varones
  - los hermanos del grupo
  - los hermanos de la madre
  lexicon: BDAG
  rationale: El plural masculino designa a los siete hermanos. «Los hermanos» es la equivalencia directa y clara en español.
theological_decisions:
- issue: Conservar la metáfora agonística del martirio
  english_pob_reading: Retain contest/athletic language across all three clauses
  chosen_spanish_reading: Conservar el lenguaje de contienda, competencia y contención en las tres cláusulas
  alternative_spanish_readings:
  - Suavizarlo con lenguaje general de sufrimiento o resistencia
  - Unificarlo en una sola palabra como 'luchar'
  rationale: El griego alterna verbos afines para presentar el martirio como una lucha noble. En español conviene mantener esa variedad sin reducirla a un mero relato de sufrimiento.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden en que no hacía falta cambiar el sentido. Se mantuvo la lectura agonística del versículo y la precisión de los sujetos, siguiendo el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo requiere.
  - Se mantuvo la terminología agonística con tres formas relacionadas para reflejar la variación verbal del griego.
  - «Hijos» se eligió por naturalidad en español y porque el contexto identifica claramente a los siete hermanos varones.
