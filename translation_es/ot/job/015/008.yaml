    text: O «el secreto/consejo de Dios». El hebreo סוֹד puede denotar un consejo confidencial, un círculo íntimo o una deliberación secreta.
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda mitad para un español más natural y fiel al sentido de apropiación exclusiva implicado por גרע + אֵלֶיךָ. También se elimina la repetición innecesaria de «has» para mejorar la fluidez sin cambiar el sentido. La nota léxica sobre סוֹד se conserva intacta.
