translation:
  language: es
  text: Cualquiera de los de Ahab que muera en la ciudad, los perros lo comerán[a]; y a cualquiera que muera en el campo, lo comerán las aves del cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «el muerto de Ahab»; la expresión significa cualquiera que pertenezca a la casa de Ahab y muera.
    reason: lexical_alternative
  - marker: b
    text: 'O: «las aves de los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת לְאַחְאָב
  english_pob_choice: anyone belonging to Ahab who dies
  chosen_spanish: el que muera de Ahab
  alternatives_spanish:
  - cualquiera que pertenezca a Ahab y muera
  - el que muera perteneciente a Ahab
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera genérica. En español, “el que muera de Ahab” conserva la relación de pertenencia/afiliación sin volver la frase torpemente explicativa en el cuerpo del texto.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en la urbe
  lexicon: HALOT
  rationale: Es una localización directa y natural en español; mantiene el contraste ciudad/campo del hebreo.
- source_word: יֹאכְלוּ הַכְּלָבִים
  english_pob_choice: the dogs will eat
  chosen_spanish: los perros lo comerán
  alternatives_spanish:
  - los perros lo devorarán
  - los perros comerán ese cadáver
  lexicon: HALOT
  rationale: Se conserva el verbo literal “comer” como en el hebreo אכל, y el objeto implícito se expresa con “lo” para dar fluidez en español sin añadir contenido no indicado.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: “Campo” es la forma más natural y mantiene el paralelismo espacial con “en la ciudad”.},{
theological_decisions:
- issue: La expresión genérica hebrea del destino de los muertos de la casa de Ahab
  english_pob_reading: anyone belonging to Ahab who dies
  chosen_spanish_reading: el que muera de Ahab
  alternative_spanish_readings:
  - cualquiera que pertenezca a Ahab y muera
  - el muerto de Ahab
  rationale: La frase no describe un individuo específico sino cualquier miembro asociado con la casa de Ahab que muera. El español elegido conserva la genericidad y la relación de pertenencia sin suavizar el juicio profético.
  doctrine_reference: 1 Reyes 21:24; juicio profético contra la casa de Ahab
- issue: El paralelismo de los agentes de deshonra postmortem
  english_pob_reading: the dogs ... the birds of the sky
  chosen_spanish_reading: los perros ... las aves del cielo
  alternative_spanish_readings:
  - los perros ... las aves del cielo
  - los perros ... las aves del aire
  rationale: Se mantiene el paralelismo literal del texto y la imagen de deshonra después de la muerte. “Del cielo” preserva la expresión bíblica hebrea sin ocultar su carácter figurado.
  doctrine_reference: 1 Reyes 21:24; Jeremías 7:33; Apocalipsis 19:17-18
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa en lectura óptima-equivalente: participios genéricos, pertenencia a Ahab, y paralelismo entre perros/aves. No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa “Ahab” para conservar el nombre propio como en la tradición textual del pasaje.
  - Se mantiene “cielo” en la expresión de las aves para reflejar el hebreo, aunque “cielo” aquí funciona como genitivo idiomático.
  - La sintaxis intenta ser publicación-readable sin perder la dureza literal del juicio.
