review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y las decisiones del POB en la mayoría de los puntos: «al otro lado del Jordán», «al oriente de Jericó», «designaron», los tres topónimos y la fórmula repetida «de la tribu de». También mantiene correctamente «Ramot en Galaad» en el texto principal. Sin embargo, el aparato de notas no preserva fielmente la evidencia inglesa: la nota sobre la forma tradicional «Ramot-galaad» está mal anclada en «Bézer[a]» y además se duplica innecesariamente con una segunda nota en «Ramot[b]».'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico contemporáneo. La puntuación con punto y coma funciona, aunque la coordinación simple también sería posible. Hay una leve tensión entre la decisión léxica documentada para בַּמִּדְבָּר («wilderness») y el texto español «desierto»; no es un error grave, pero «desierto» estrecha algo el sentido. El problema principal es editorial: las notas al pie están mal ubicadas y redundantes.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres propios «Rubén», «Gad», «Manasés», «Basán» y «Golán» son aceptables en español. «Designaron» concuerda con la decisión auditada para נָתְנוּ. La excepción más importante es la nota léxica de «Ramot en Galaad», que debe conservarse una sola vez y anclarse en «Ramot», no en «Bézer».
  issues:
  - severity: high
    issue: La nota léxica sobre «Ramot-galaad» está anclada a «Bézer[a]».
    rationale: La nota explica «Ramot en Galaad», no «Bézer». Esto desinforma al lector y rompe la correspondencia obligatoria entre ancla y contenido de la nota.
  - severity: medium
    issue: Hay dos notas redundantes sobre la misma alternativa tradicional de «Ramot-galaad».
    rationale: El inglés auditado conserva una sola nota léxica. Duplicarla añade ruido editorial sin aportar información nueva.
  - severity: low
    issue: «En el desierto» estrecha levemente el valor de בַּמִּדְבָּר frente a la decisión inglesa «in the wilderness».
    rationale: «Desierto» es comprensible y posible, pero «wilderness»/מִדְבָּר en este contexto geográfico también puede expresarse mejor con «la región desierta» o «el desierto». No requiere adjudicación especial; puede mantenerse o ajustarse por matiz.
  revised_spanish_text: Y al otro lado del Jordán, al oriente de Jericó, designaron a Bézer en el desierto, en la meseta, de la tribu de Rubén; y a Ramot[a] en Galaad, de la tribu de Gad; y a Golán en Basán, de la tribu de Manasés.
  revised_footnotes:
  - marker: a
    text: Tradicionalmente, «Ramot-galaad». El hebreo dice literalmente «Ramot en Galaad».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el aparato de notas para que preserve fielmente la decisión léxica auditada: una sola nota, anclada en «Ramot», con el contenido tradicional correspondiente. No se requiere cambiar el sentido principal del versículo.'
