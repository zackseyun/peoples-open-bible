translation:
  language: es
  text: Entrar en detalle y dar un amplio rodeo en el discurso[a], y ocuparse en exceso de los pormenores, le corresponde al iniciador de la historia;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «investigar a fondo y extenderse ampliamente en la discusión». El griego es retóricamente denso y varias expresiones son metafóricas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμβατεύειν
  english_pob_choice: to go into detail
  chosen_spanish: hacer un tratamiento detallado
  alternatives_spanish:
  - ir al detalle
  - entrar en detalle
  - exponer con amplitud
  lexicon: LSJ
  rationale: 'El griego aquí no parece físico, sino retórico: describe un tratamiento minucioso del tema. «Hacer un tratamiento detallado» conserva la idea de penetrar en el asunto sin sonar demasiado literal ni perder el matiz de amplitud.'
- source_word: περίπατον ποιεῖσθαι λόγῳ
  english_pob_choice: to make a circuit with the discourse
  chosen_spanish: dar una amplia vuelta en el discurso
  alternatives_spanish:
  - recorrer ampliamente el discurso
  - dar un rodeo en la discusión
  - extenderse ampliamente al hablar
  lexicon: LSJ
  rationale: La imagen es metafórica y poco común. «Dar una amplia vuelta en el discurso» preserva el movimiento retórico de rodear el tema, manteniendo la densidad figurada que refleja la traducción inglesa.
- source_word: πολυπραγμονεῖν
  english_pob_choice: to be overly busy
  chosen_spanish: ocuparse en exceso
  alternatives_spanish:
  - ser demasiado curioso
  - entremeterse demasiado
  - preocuparse excesivamente
  lexicon: LSJ
  rationale: Aquí el sentido no es principalmente moral de entremeterse en asuntos ajenos, sino de una ocupación excesiva con muchos detalles. «Ocuparse en exceso» reproduce esa sobrecarga de actividad o atención.
- source_word: ἐν τοῖς κατὰ μέρος
  english_pob_choice: with the particulars
  chosen_spanish: los pormenores
  alternatives_spanish:
  - los detalles
  - las cosas en particular
  - los asuntos uno por uno
  lexicon: LSJ
  rationale: La expresión apunta a lo particular, a lo tomado por partes. «Pormenores» es natural en español y conserva el valor de detalle itemizado sin volverlo demasiado técnico.
- source_word: τῷ τῆς ἱστορίας ἀρχηγενέτῃ
  english_pob_choice: to the originator of the history
  chosen_spanish: al originador de la historia
  alternatives_spanish:
  - al fundador de la narración
  - al autor de la historia
  - al primer historiador
  lexicon: LSJ
  rationale: ἀρχηγενέτης es raro y expresa a quien origina por primera vez algo. «Originador» conserva esa fuerza de origen mejor que «autor», y evita borrar la marca de primacía que tiene el término.
- source_word: καθήκει
  english_pob_choice: belongs to
  chosen_spanish: le corresponde
  alternatives_spanish:
  - le conviene
  - le es apropiado
  - le pertenece
  lexicon: LSJ
  rationale: El verbo expresa lo que es propio o debido a alguien. «Le corresponde» mantiene la noción de propriedad y deber sin endurecer el sintagma.
theological_decisions:
- issue: Valor retórico y no doctrinal de la afirmación sobre el historiador
  english_pob_reading: The verse frames expansive, detailed treatment as what belongs to the originator of the history.
  chosen_spanish_reading: El versículo presenta el tratamiento amplio y minucioso como algo propio del originador de la historia.
  alternative_spanish_readings:
  - El versículo afirma que entrar en detalles le toca al autor de la historia.
  - El versículo atribuye esa labor al primer historiador.
  rationale: No hay una afirmación doctrinal directa aquí; la decisión es conservar el carácter retórico y metahistórico del enunciado. El español debe reflejar que se habla de adecuación literaria, no de autoridad religiosa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el trazo auditado de la POB inglesa, manteniendo la densidad retórica del griego y evitando reducir las metáforas a una paráfrasis plana. La versión española busca equivalencia óptima con transparencia léxica.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología teológica ajena porque el versículo no contiene el Tetragrámaton ni un tema doctrinal directo.
  - Se mantuvo un registro sobrio y académico, acorde con el carácter metahistórico del pasaje.
  - «Originador» se eligió para preservar la rareza de ἀρχηγενέτης sin introducir un tecnicismo innecesario.
