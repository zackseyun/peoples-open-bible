    issue: '''Las columnas de los cielos'' es menos idiomático y menos alineado con la decisión POB que ''los pilares del cielo''.'
    rationale: El inglés auditado prefirió 'heaven' idiomático y preservó la imagen poética. En español bíblico natural, 'los pilares del cielo' suena más directo y literario que 'las columnas de los cielos', sin perder la imaginería.
