  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Judá», «pueblo» y «Telaim» están bien. «Soldados de a pie» es una buena equivalencia para רַגְלִי. La nota con «con corderos» está bien formulada.
