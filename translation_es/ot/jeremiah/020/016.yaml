revisions:
- from: Haga que ese hombre sea como las ciudades que Yahvé derribó sin arrepentirse[a], y que oiga un clamor por la mañana y una alarma[b] al mediodía.
  to: Que ese hombre sea como las ciudades que Yahvé derribó sin desistir[a], y que oiga un clamor por la mañana y una alarma[b] al mediodía.
  rationale: Se ajusta la apertura a una imprecación española más natural («Que ese hombre sea»). Se reemplaza «sin arrepentirse» por «sin desistir» para preservar el sentido judicial de נחם y evitar una lectura teológicamente errónea. Se mantiene la nota para conservar la alternativa interpretativa y la aclaración doctrinal. El resto del texto puede permanecer sustancialmente igual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:44Z'
