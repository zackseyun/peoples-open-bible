revisions:
- from: La memoria de los justos es una bendición[a], pero el nombre de los impíos se pudrirá.
  to: La memoria del justo es una bendición[a], pero el nombre de los impíos se pudrirá.
  rationale: Se ajusta «los justos» a «del justo» para reflejar con más precisión el singular representativo צַדִּיק del hebreo y conservar mejor el equilibrio proverbial. También se actualiza la nota alternativa para que coincida con esa corrección. No se requieren cambios adicionales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:36:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y la línea del POB en casi todos los elementos: «memoria» por זֵכֶר, «es una bendición» por לִבְרָכָה como predicado idiomático, «nombre» por שֵׁם, y «se pudrirá» por יִרְקָב preservan adecuadamente el contraste proverbial. La nota alternativa también corresponde bien al inglés auditado.'
  spanish_quality_summary: El texto es claro y legible en español eclesial moderno. Sin embargo, «los justos» introduce un plural que no está en el hebreo, donde צַדִּיק es singular representativo. Para mantener mejor el paralelismo proverbial con el singular colectivo y evitar una expansión innecesaria, conviene usar «del justo». El resto del verso suena natural y digno.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La elección «impíos» es defendible, pero aquí el hebreo רְשָׁעִים se corresponde más directamente con «malvados» o «perversos» que con una categoría primariamente cultual. Aun así, el problema principal es de número con צַדִּיק; se puede mantener «impíos» sin traicionar el sentido. La revisión propuesta ajusta el singular del justo y deja intacto el resto por estabilidad.
  issues:
  - severity: medium
    issue: «los justos» traduce en plural un singular hebreo representativo
    rationale: צַדִּיק está en singular y el proverbio contrasta «la memoria del justo» con «el nombre de los impíos». Aunque el plural puede sonar idiomático en español, aquí altera innecesariamente la forma y el equilibrio del original.
  - severity: low
    issue: La nota alternativa también reproduce el plural
    rationale: 'Si se corrige el texto principal al singular, la alternativa «La memoria de los justos es para bendición» debe armonizarse con la forma fuente: «del justo ... para bendición».'
  revised_spanish_text: La memoria del justo es una bendición[a], pero el nombre de los impíos se pudrirá.
  revised_footnotes:
  - marker: a
    text: 'O: «La memoria del justo es para bendición».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «los justos» a «del justo» para reflejar con más precisión el singular representativo צַדִּיק del hebreo y conservar mejor el equilibrio proverbial. También se actualiza la nota alternativa para que coincida con esa corrección. No se requieren cambios adicionales.
