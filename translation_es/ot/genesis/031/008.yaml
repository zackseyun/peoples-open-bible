translation:
  language: es
  text: 'Si decía: «Los [a]moteados serían tu salario», entonces todo el rebaño paría crías moteadas; y si decía: «Los [b]rayados serían tu salario», entonces todo el rebaño paría crías rayadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manchados» para נְקֻדִּים.
    reason: lexical_alternative
  - marker: b
    text: O «listados», «bandeados» o, más tradicionalmente, «anillados» para עֲקֻדִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם כֹּה יֹאמַר
  english_pob_choice: If he said
  chosen_spanish: Si él decía
  alternatives_spanish:
  - Si decía
  - Si decía así
  - Cada vez que decía
  lexicon: HALOT
  rationale: La construcción hebrea presenta un condicional repetido; en español, 'Si él decía' conserva esa estructura y suena natural sin añadir un demostrativo innecesario. El imperfecto 'decía' refleja bien el valor iterativo del contexto.
- source_word: נְקֻדִּים
  english_pob_choice: the speckled
  chosen_spanish: moteados
  alternatives_spanish:
  - manchados
  - punteados
  - moteados
  lexicon: HALOT
  rationale: El término describe animales con pequeñas manchas o puntitos. 'Moteados' comunica esa idea de manera clara en español y evita confundirlo con otros patrones; mantiene la distinción lexical frente a עֲקֻדִּים.
- source_word: יִהְיֶה שְׂכָרֶךָ
  english_pob_choice: will be your wages
  chosen_spanish: serán tu salario
  alternatives_spanish:
  - será tu salario
  - serán tus pagas
  - será tu paga
  lexicon: HALOT
  rationale: שָׂכָר denota remuneración, y 'salario' es una forma natural y digna en español. Se usa plural verbal por concordancia con el sujeto citado ('Los moteados'), aunque el hebreo use un sustantivo singular colectivo.
- source_word: וְיָלְדוּ
  english_pob_choice: then all the flock bore
  chosen_spanish: entonces todo el rebaño paría
  alternatives_spanish:
  - y todo el rebaño paría
  - entonces todo el rebaño daba a luz
  - y todo el rebaño daba cría
  lexicon: HALOT
  rationale: יַלַד en este contexto ganadero significa 'parir / dar a luz'. 'Paría' conserva el valor biológico del verbo y resulta más directo que una paráfrasis más amplia. 'Entonces' expresa el resultado implícito del hebreo y del contexto narrativo.
- source_word: כָל הַצֹּאן
  english_pob_choice: all the flock
  chosen_spanish: todo el rebaño
  alternatives_spanish:
  - todo el hato
  - todo el ganado menor
  - todo el rebaño
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, especialmente ovejas y cabras. 'Rebaño' preserva el sentido colectivo y es más fluido que una explicación más técnica; no se sobreespecifica más allá del hebreo.
- source_word: נְקֻדִּים (second occurrence)
  english_pob_choice: speckled young
  chosen_spanish: moteados
  alternatives_spanish:
  - crías moteadas
  - moteados hijos
  - crías manchadas
  lexicon: HALOT
  rationale: Tras 'paría', el adjetivo puede funcionar de manera elíptica en español sin añadir 'crías' si el contexto ya lo deja claro. Así se mantiene la concisión del hebreo y se evita sobreinterpretación.
- source_word: עֲקֻדִּים
  english_pob_choice: the streaked
  chosen_spanish: listados
  alternatives_spanish:
  - rayados
  - bandados
  - moteados
  lexicon: HALOT
  rationale: עֲקֻדִּים alude a animales marcados con bandas o rayas. 'Listados' es una opción válida, clara y distinguible de 'moteados'; evita el arcaísmo de 'ring-streaked' y mantiene el contraste lexical.
- source_word: עֲקֻדִּים (second occurrence)
  english_pob_choice: streaked young
  chosen_spanish: listados
  alternatives_spanish:
  - crías listadas
  - listados hijos
  - crías rayadas
  lexicon: HALOT
  rationale: Como en la primera cláusula, el contexto de 'paría' permite elipsis en español. Repetir el adjetivo sin añadir un sustantivo mantiene el paralelismo y la sobriedad del hebreo.
translation_notes:
  revision_awareness: Se siguió el patrón del audit trail en cuanto a la estructura condicional repetida y la distinción entre נְקֻדִּים y עֲקֻדִּים. En español, se optó por una formulación natural y breve, manteniendo el paralelismo del hebreo. Los marcadores de nota [a] y [b] están colocados exactamente en el texto donde corresponden.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' implícito no porque aparezca aquí, sino porque el versículo no contiene el nombre divino.
  - '''Salario'' traduce שָׂכָר con un término transparente y ampliamente comprensible.'
  - '''Rebaño'' mantiene el valor colectivo de צֹאן sin introducir ''ovejas y cabras'' de manera innecesaria.'
  - Las notas alternativas se anclan en las palabras problemáticas para evitar ambigüedad de lectura.
