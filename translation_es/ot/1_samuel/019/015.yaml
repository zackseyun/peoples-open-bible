review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, «mensajeros», «para ver», «diciendo», «en la cama» con nota alternativa, y el propósito final de matar a David. Sin embargo, «Subidlo hacia mí» no suena natural en español y no comunica bien la combinación de dirección y traslado del hebreo הַעֲלוּ ... אֵלַי. La orden se entiende mejor como traer/cargar a David ante Saúl, idealmente conservando el matiz de que sea llevado en la cama.
  spanish_quality_summary: El español es mayormente claro y digno, pero «Subidlo hacia mí» resulta forzado y poco idiomático en español general; además, el voseo plural «subidlo» desentona con el registro neutral latinoamericano solicitado. «Tráiganmelo en la cama» o «Llévenmelo en la cama» es mucho más natural y plenamente comprensible. También conviene elevar un poco «lo mate» a «le dé muerte» para reflejar el tono más formal de la orden real y del inglés auditado.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Mensajeros» está bien para הַמַּלְאָכִים. La nota sobre «en/sobre/con la cama» preserva correctamente la alternativa léxica documentada. El principal ajuste es estilístico-lexical en הַעֲלוּ ... אֵלַי y de registro en לַהֲמִתוֹ.
  issues:
  - severity: medium
    issue: «Subidlo hacia mí» es poco natural y semánticamente torpe.
    rationale: Aunque עלה puede tener matiz de ‘subir’, en español esta formulación no suena idiomática para ordenar el traslado de un enfermo/acostado. «Tráiganmelo» o «Llévenmelo» expresa mejor la orden en contexto.
  - severity: medium
    issue: Uso de «subidlo» en segunda persona plural peninsular.
    rationale: El encargo pide español neutral latinoamericano/broadly church-readable. La forma «subidlo» introduce un matiz regional evitable. «Tráiganmelo» mantiene neutralidad y claridad.
  - severity: low
    issue: «para que yo lo mate» es correcto pero menos digno que alternativas disponibles.
    rationale: El hebreo expresa propósito letal y el inglés auditado escogió una formulación algo más formal («put him to death»). «para que yo le dé muerte» conserva gravedad y buen español.
  revised_spanish_text: 'Entonces Saúl envió a los mensajeros para ver a David[a], diciendo: «Tráiganmelo en la cama, para que yo le dé muerte».'
  revised_footnotes:
  - marker: a
    text: También puede entenderse «sobre la cama» o «con la cama». La preposición hebrea permite más de una relación espacial; la orden probablemente significa que David debía ser transportado mientras seguía acostado.
    reason: lexical_alternative
