  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contraste inicial, autodescripción como pobre y necesitado, súplica urgente a Dios, confesión de que él es ayuda y libertador, e invocación final a Yahvé para que no se demore. Sin embargo, la decisión «apresúrate hacia mí» para חוּשָׁה לִי no suena idiomática en español y sobreinterpreta la direccionalidad con una preposición poco natural aquí. El hebreo/POB permite mejor «ven pronto a mí» o «apresúrate a ayudarme», conservando la urgencia y la relación con לִי sin torpeza.'
