    rationale: 'Empieza con comillas tras una comilla simple inicial (''O: «...'') y suena calcada. Conviene normalizarla a ''O bien:'' o ''O:'' sin puntuación extraña, manteniendo la misma información.'
  revised_spanish_text: Y sucedió que aquel día[a], Elí estaba acostado en su lugar, y sus ojos habían comenzado a oscurecerse; no podía ver.
