lexical_decisions:
- source_word: οἰκοδομήν
  english_pob_choice: building
  chosen_spanish: construcción
  alternatives_spanish:
  - edificación
  - obra de construcción
  lexicon: LSJ
  rationale: El sustantivo puede referirse al proceso o proyecto de edificar. En español, «construcción» expresa con naturalidad ese valor administrativo y material sin perder la referencia a la obra misma.
- source_word: ἱεροῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: LSJ
  rationale: En este contexto de restauración, «templo» es la equivalencia más clara y estándar para el espacio sagrado al que se destinan los recursos.
- source_word: δοθῆναι
  english_pob_choice: be given
  chosen_spanish: se entreguen
  alternatives_spanish:
  - se den
  - se concedan
  - se paguen
  lexicon: LSJ
  rationale: El infinitivo pasivo indica que los fondos deben ser provistos. «Se entreguen» conserva el sentido administrativo sin introducir de más una idea de donación piadosa o pago contractual.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  lexicon: LSJ
  rationale: La frase marca recurrencia anual. «Cada año» es natural en español y mantiene la repetición periódica.
- source_word: τάλαντα εἴκοσι
  english_pob_choice: twenty talents
  chosen_spanish: veinte talentos
  alternatives_spanish:
  - veinte talentos de peso
  - veinte unidades de talento
  lexicon: LSJ
  rationale: «Talentos» conserva la unidad antigua de peso y valor monetario, ya establecida en la tradición de traducción bíblica y adecuada aquí en un contexto fiscal.
- source_word: μέχρι τοῦ οἰκοδομηθῆναι
  english_pob_choice: until it is built
  chosen_spanish: hasta que esté edificado
  alternatives_spanish:
  - hasta que se construya
  - hasta su terminación
  lexicon: LSJ
  rationale: El giro expresa duración hasta la finalización. «Hasta que esté edificado» reproduce bien el pasivo y mantiene el foco en el templo sin forzar una paráfrasis.
translation_notes:
  revision_awareness: La traducción sigue de cerca el griego de Swete y coincide con la auditoría inglesa de alta concordancia; no se detectaron revisiones textuales relevantes ni cambios necesarios en el pasaje.
  spanish_consistency_notes:
  - Se conserva «templo» para ἱερόν, conforme al contexto de reconstrucción sacra.
  - Se mantiene «talentos» como unidad antigua reconocible; la nota explica su valor cultural.
  - Se prefiere una sintaxis española natural, pero sin alejarse del orden y sentido del griego.
