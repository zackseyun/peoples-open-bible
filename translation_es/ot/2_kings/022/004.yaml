translation:
  language: es
  text: Sube a Hilquías, el sumo sacerdote, y que haga el recuento de la plata que ha sido traída a la casa de Yahvé, la cual han recogido del pueblo los guardianes del umbral[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los porteros»; literalmente, «los guardianes del umbral».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Asciende
  lexicon: HALOT
  rationale: El imperativo de עלה conserva la idea direccional de movimiento ascendente. En español, «Sube» es natural, breve y fiel al mandato.
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilkiah
  chosen_spanish: Hilquías
  alternatives_spanish:
  - Hilkías
  lexicon: Convención onomástica bíblica
  rationale: Se translitera al español con forma readable y estable. «Hilquías» mantiene la identidad del nombre sin depender del calco inglés.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: Uso bíblico español
  rationale: La construcción hebrea designa el oficio máximo del sacerdocio. «Sumo sacerdote» es la equivalencia bíblica natural en español y comunica el rango sin perder el sentido superlativo de גדול.
- source_word: וְיַתֵּם
  english_pob_choice: let him sum up
  chosen_spanish: que él haga el recuento
  alternatives_spanish:
  - que él sume
  - que él complete el recuento
  - que él haga el cómputo
  lexicon: HALOT
  rationale: El verbo en contexto administrativo/financiero expresa contar o poner en orden el dinero. «Haga el recuento» conserva la idea de verificación y cómputo sin reducirlo a una suma aritmética estrecha.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: כסף es literalmente «plata», y en este contexto funciona como metal precioso usado como medio monetario. Mantener «la plata» preserva la concreción del hebreo.
- source_word: הַמּוּבָא
  english_pob_choice: that has been brought in
  chosen_spanish: que ha sido traída
  alternatives_spanish:
  - que ha sido introducida
  - que fue traída
  lexicon: HALOT
  rationale: El participio pasivo hebreo con valor resultativo se expresa bien con «ha sido traída», que refleja el estado ya alcanzado de los fondos.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahweh
  lexicon: Convención POB para יהוה
  rationale: 'Se sigue la convención del POB español: el nombre divino se vierte «Yahvé». «Casa» mantiene la literalidad de בית; «templo» sería más interpretativo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Convención POB para יהוה
  rationale: La forma española del nombre divino es «Yahvé», de acuerdo con la política editorial indicada. Se preserva el nombre propio y no se sustituye por un título.
- source_word: אָסְפוּ
  english_pob_choice: have collected
  chosen_spanish: han recogido
  alternatives_spanish:
  - han reunido
  - han juntado
  - han colectado
  lexicon: HALOT
  rationale: El verbo implica reunir/recoger contribuciones. «Han recogido» es natural en español y refleja la acción ya realizada por los guardianes.
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: the keepers of the threshold
  chosen_spanish: los guardianes del umbral
  alternatives_spanish:
  - los porteros
  - los guardianes de la entrada
  - los encargados del umbral
  lexicon: HALOT
  rationale: La traducción literal es «guardianes del umbral». Se mantiene la imagen concreta del hebreo; el término tradicional «porteros» queda como alternativa interpretativa más funcional.
- source_word: מֵאֵת הָעָם
  english_pob_choice: from the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de entre el pueblo
  - de la gente
  lexicon: HALOT
  rationale: La preposición más el sustantivo designan el origen de la recaudación. «Del pueblo» es una traducción sobria y fiel al referente colectivo.
theological_decisions:
- issue: Nombre divino יהוה en la frase בית יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto según la política editorial del proyecto. Esto evita la sustitución por un título y hace auditable la presencia de יהוה en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Título sacerdotal הַכֹּהֵן הַגָּדוֹל
  english_pob_reading: the high priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el gran sacerdote
  rationale: 'No hay tensión doctrinal, pero sí una decisión terminológica: «sumo sacerdote» es la forma bíblica estable en español y comunica la función suprema del cargo.'
  doctrine_reference: Uso bíblico español estándar
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del audit trail inglés, que prefirió «sum up» por sobre «total» para el verbo וְיַתֵּם. En español se refleja esa misma decisión con «haga el recuento», manteniendo el matiz administrativo y evitando una paráfrasis excesiva. También se conserva la elección revisada de un registro natural y formal, y se adapta el nombre divino a la convención española del proyecto («Yahvé»).
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para יהוה como «Yahvé» en todo el versículo.
  - «Casa» se conserva para בית; no se reemplaza por «templo» en el texto principal.
  - «Sumo sacerdote» se usa como equivalente bíblico establecido para הַכֹּהֵן הַגָּדוֹל.
  - La frase «guardianes del umbral» conserva la literalidad del hebreo y deja «porteros» como alternativa en nota.
  - «Del pueblo» traduce de forma sobria מֵאֵת הָעָם sin añadir restricciones que el hebreo no explicita.
