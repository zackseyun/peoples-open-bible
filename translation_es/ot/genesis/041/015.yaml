    text: 'O, más formalmente: «He oído acerca de ti, diciendo: “Oyes un sueño para interpretarlo”».'
    reason: alternative_more_formal_literal_rendering
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español sin alejarse del hebreo ni del rastro de auditoría inglés. «He soñado un sueño» conserva el acusativo cognado con mejor fluidez; «he oído de ti decir» expresa bien el reporte introducido por לֵאמֹר; y «Escuchas un sueño para interpretarlo» evita el calco más áspero «oyes un sueño» en el texto principal, preservando la opción más formal y más literal en nota al pie, como ya hace el inglés con su alternativa formal.
