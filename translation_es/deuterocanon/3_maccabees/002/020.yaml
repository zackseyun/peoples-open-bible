translation:
  language: es
  text: Allí, el Dios que vela sobre todos, el santo antepasado entre los santos[a], habiendo escuchado la súplica legítima, azotó a aquel que se había envanecido grandemente con insolencia y audacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santo en los lugares santos / en las cosas santas»; la expresión griega ἅγιος ἐν ἁγίοις es ambigua y puede tener un matiz cultual.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐνταῦθα
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - En ese lugar
  lexicon: LSJ
  rationale: El adverbio marca un lugar o escena narrativa más que una simple secuencia temporal. «Allí» conserva esa deixis situacional en español.
- source_word: ὁ πάντων ἐπόπτης θεός
  english_pob_choice: the God who watches over all
  chosen_spanish: el Dios que vela sobre todos
  alternatives_spanish:
  - el Dios que observa a todos
  - el Dios que vigila sobre todos
  lexicon: LSJ
  rationale: ἐπόπτης expresa vigilancia/inspección providencial. «Vela sobre» suena natural en español y mantiene la idea de cuidado soberano sin volverla institucional.
- source_word: προπάτωρ
  english_pob_choice: ancestor / forefather
  chosen_spanish: antepasado
  alternatives_spanish:
  - ancestro
  - padre de nuestros padres
  lexicon: LSJ
  rationale: El término es ancestral y relacional. «Antepasado» es claro y sobrio en español; evita sobretraducir a una fórmula fija que no está en el griego.
- source_word: ἅγιος ἐν ἁγίοις
  english_pob_choice: holy ... among the holy ones
  chosen_spanish: el santo entre los santos
  alternatives_spanish:
  - el santo en los lugares santos
  - el Santo entre los santos
  lexicon: LSJ
  rationale: La frase es comprimida y admite matiz cultual. «El santo entre los santos» conserva la ambigüedad entre descripción personal y trasfondo cultual sin forzar una paráfrasis.
- source_word: εἰσακούσας
  english_pob_choice: having heard
  chosen_spanish: habiendo escuchado
  alternatives_spanish:
  - habiendo oído
  - después de escuchar
  lexicon: LSJ
  rationale: El participio aoristo pide una relación temporal subordinada. «Habiendo escuchado» refleja bien la estructura y el carácter favorable de la respuesta divina.
- source_word: εὐθέσμου λιτανείας
  english_pob_choice: lawful supplication
  chosen_spanish: súplica legítima
  alternatives_spanish:
  - súplica lawful/leyes?
  - petición conforme a la ley
  - plegaria ordenada
  lexicon: LSJ
  rationale: εὐθέσμος denota lo conforme a norma, orden o ley. «Legítima» comunica bien la validez y corrección de la súplica en español contemporáneo, sin sonar arcaico.
- source_word: ἐμάστιξεν
  english_pob_choice: scourged
  chosen_spanish: azotó
  alternatives_spanish:
  - flageló
  - castigó con azotes
  lexicon: LSJ
  rationale: El verbo significa literalmente golpear con látigo. «Azotó» es idiomático y conserva la imagen de castigo corporal; «flageló» sería más técnico.
- source_word: ὕβρει
  english_pob_choice: insolence
  chosen_spanish: insolencia
  alternatives_spanish:
  - arrogancia
  - soberbia
  - hubris
  lexicon: LSJ
  rationale: ὕβρις connota desprecio violento y arrogancia ofensiva. «Insolencia» comunica bien esa carga moral en español.
- source_word: θράσει
  english_pob_choice: boldness
  chosen_spanish: audacia
  alternatives_spanish:
  - osadía
  - atrevimiento
  - temeridad
  lexicon: LSJ
  rationale: El término es negativo aquí, como osadía presuntuosa. «Audacia» es la opción más cercana y solemne; «osadía» también sería posible.
- source_word: ἐπηρμένον
  english_pob_choice: had been greatly puffed up
  chosen_spanish: se había envanecido grandemente
  alternatives_spanish:
  - estaba muy hinchado de orgullo
  - había sido muy levantado
  lexicon: LSJ
  rationale: El participio refleja elevación metafórica y orgullo. «Envanecido» preserva la imagen de orgullo inflado y funciona con naturalidad en español bíblico moderno.
theological_decisions:
- issue: Título divino y ancestro ancestral en una oración judía
  english_pob_reading: Render θεὸς as 'God' and retain the unusual ancestral epithet 'ancestor/forefather' rather than smoothing to a traditional formula like 'God of our fathers.'
  chosen_spanish_reading: Traducir θεός como «Dios» y προπάτωρ como «antepasado», sin convertirlo en la fórmula más conocida «Dios de nuestros padres».
  alternative_spanish_readings:
  - Dios de nuestros padres
  - Padre de nuestros padres
  rationale: El griego dice literalmente «Dios» y añade un epíteto ancestral poco común. Mantenerlo evita introducir una fórmula litúrgica más familiar pero no presente en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Ambigüedad de ἅγιος ἐν ἁγίοις
  english_pob_reading: 'Take the phrase personally/descriptively: ''holy ... among the holy ones.'''
  chosen_spanish_reading: 'Entender la frase de modo descriptivo/personal: «el santo entre los santos».'
  alternative_spanish_readings:
  - el santo en los lugares santos
  - el santo en las cosas santas
  rationale: La sintaxis inmediata califica a Dios. Como el griego admite también una lectura cultual, se conserva una redacción que deja abierta esa tensión sin borrarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El contexto inglés revisó «forefather» a «ancestor» por naturalidad y ajustó «heard» a una estructura participial («having heard»). La versión española refleja esa revisión con una construcción participial («habiendo escuchado») y mantiene el matiz ancestral con «antepasado».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se empleó «SEÑOR», conforme al criterio POB.
  - Se eligió «azotó» para preservar la violencia concreta de ἐμάστιξεν.
  - Se evitó «Cristo» o terminología cristiana posterior; el texto conserva el marco judío de la oración.
  - La ambigüedad de ἅγιος ἐν ἁγίοις queda señalada en nota sin desplazar la lectura principal del texto.
