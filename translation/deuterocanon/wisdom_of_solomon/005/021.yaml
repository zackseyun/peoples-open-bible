translation:
  text: Well-aimed bolts of lightning will go forth[a], and like from a well-drawn bow of clouds they will leap to the target[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the well-curved bow of the clouds'; the image may evoke the storm-bow or rainbow, but the Greek reads more literally 'bow of clouds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be hurled to the target' or 'they will spring to the mark.' The Greek verb is vivid and somewhat difficult, but the sense is rapid movement toward a target.
    reason: alternative_reading
lexical_decisions:
- source_word: πορεύσονται
  chosen: will go forth
  alternatives:
  - will go
  - will proceed
  lexicon: LSJ
  rationale: Future middle of πορεύομαι; in this poetic martial context, 'go forth' conveys movement into action more naturally than the flatter 'go' or 'proceed'.
- source_word: εὔστοχοι
  chosen: well-aimed
  alternatives:
  - true-aiming
  - accurate
  lexicon: LSJ
  rationale: The adjective denotes hitting the mark or being well-directed. 'Well-aimed' is idiomatic modern English and preserves the image of precise targeting.
- source_word: βολίδες
  chosen: bolts
  alternatives:
  - missiles
  - darts
  - shots
  lexicon: LSJ
  rationale: βολίς can denote a missile or dart. Because the noun is modified by 'of lightning,' 'bolts' best captures the established English collocation without adding imagery absent from the Greek.
- source_word: ἀστραπῶν
  chosen: of lightning
  alternatives:
  - of flashes of lightning
  lexicon: LSJ
  rationale: Genitive plural of ἀστραπή. 'Of lightning' is concise and natural in English while preserving the elemental weapon imagery.
- source_word: ὡς ἀπὸ εὐκύκλου τόξου τῶν νεφῶν
  chosen: like from a well-drawn bow of clouds
  alternatives:
  - as from a well-curved bow of the clouds
  - as from the well-rounded bow of clouds
  lexicon: LSJ
  rationale: εὐκύκλου literally suggests well-curved or well-rounded. In context of a bow launching projectiles, 'well-drawn' communicates functional readiness in idiomatic English, while 'of clouds' preserves the genitive image, likely evoking the storm-bow in the heavens without over-interpreting it as 'rainbow' in the main text.
- source_word: ἐπὶ σκοπόν
  chosen: to the target
  alternatives:
  - at the mark
  - toward the target
  lexicon: LSJ
  rationale: σκοπός is the mark or target. 'To the target' fits the motion verb and keeps the martial precision of the line.
- source_word: ἁλοῦνται
  chosen: they will leap
  alternatives:
  - they will be hurled
  - they will spring
  - they will fly
  lexicon: LSJ
  rationale: Given the poetic context and parallel with launched missiles, the verb is best taken as rapid movement toward the mark. 'Leap' preserves vividness without overcommitting to a technical ballistic term.
