review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la secuencia y el sentido del hebreo: reunión conjunta de Judá e Israel, establecimiento de un liderazgo unificado, ascenso desde la tierra, y la grandeza del día de Jezreel. Sin embargo, introduce problemas de forma que afectan la fidelidad funcional: «serán reunidos juntos» es redundante frente a יַחְדָּו; «un solo cabeza» es gramaticalmente incorrecto en español; y faltó la nota cultural sobre Jezreel preservada en el inglés POB.'
  spanish_quality_summary: 'La legibilidad necesita ajuste. «Entonces» no es incorrecto, pero «Luego» o «Después» fluye mejor proféticamente; lo principal es corregir «un solo cabeza» a «una sola cabeza» y evitar la redundancia de «reunidos... juntos». El resto del verso puede mantenerse con tono digno y natural. Las notas también deben alinearse mejor: la nota a sobre «serán congregados juntos» no ayuda, mientras que conviene conservar la nota sobre Jezreel.'
  glossary_alignment: No aparecen términos del glosario principal como Yahvé, Mesías, etc. En cuanto a decisiones léxicas del pasaje, conviene mantener «hijos» para בְּנֵי y «cabeza» para רֹאשׁ, pero en español debe ser «una sola cabeza». «de la tierra» preserva bien la apertura de הָאָרֶץ, y «Jezreel» está correcto. La metáfora debe mantenerse sin forzar una construcción antinatural.
  issues:
  - severity: medium
    issue: «serán reunidos[a] juntos» duplica innecesariamente la idea de יַחְדָּו
    rationale: 'El hebreo expresa dos elementos: ser reunidos y hacerlo juntos. En español, «serán reunidos juntos» suena pesado y redundante. «serán reunidos en uno» sería interpretativo; mejor reordenar como «serán reunidos, juntos» o usar «se reunirán juntos», pero eso perdería el matiz pasivo/reflexivo. La mejor solución idiomática es «serán reunidos juntos» simplificada a «serán reunidos juntos» no es ideal; más natural: «serán reunidos, juntos» o «serán reunidos en un solo pueblo» sería demasiado interpretativo. Se recomienda una reformulación sencilla: «serán reunidos juntos» → «serán reunidos juntos» no resuelve; por eso conviene «serán reunidos, y ...» con «juntos» más cerca del sujeto: «los hijos de Judá y los hijos de Israel serán reunidos juntos» sigue siendo dura. Mejor: «serán reunidos juntamente». Esto conserva ambos elementos con mejor español.'
  - severity: high
    issue: «un solo cabeza» es gramaticalmente incorrecto
    rationale: Aunque se quiera conservar la metáfora de רֹאשׁ, en español «cabeza» es femenino. La forma fiel y natural es «una sola cabeza». Mantiene la imagen hebrea sin introducir «líder» en el texto principal.
  - severity: medium
    issue: Falta la nota cultural sobre Jezreel presente en el English POB
    rationale: El rastro de auditoría inglés conserva una nota importante sobre la carga teológica del nombre Jezreel. Debe preservarse también en español, idealmente con un marcador en «Jezreel[c]», y desplazar la nota sobre «de la tierra» a otro marcador.
  - severity: low
    issue: La nota a actual no aporta bien la alternativa léxica documentada
    rationale: La alternativa inglesa para וְנִקְבְּצוּ no es una repetición literal sino opciones como «assemble». En español sería más útil «O “se congregarán”» o similar, no «El hebreo dice literalmente “serán reunidos”», que repite el texto principal.
  revised_spanish_text: Entonces los hijos de Judá y los hijos de Israel serán reunidos juntamente[a], y pondrán para sí una sola cabeza[b], y subirán de la tierra[c], porque grande será el día de Jezreel[d].
  revised_footnotes:
