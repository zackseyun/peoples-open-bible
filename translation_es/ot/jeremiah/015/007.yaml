review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: preserva la imagen agrícola de זרה, mantiene el implemento concreto de מִזְרֶה, expresa el juicio divino en dos verbos coordinados, y conserva la tensión de שׁוּב como ''volver'' más que fijarla como ''arrepentirse''. Sin embargo, hay dos desajustes importantes con el rastro auditado: la nota [a] introduce una alternativa no documentada en el inglés (''zarandeé'' en vez de algo como ''dispersé'' o ''cribé/aventé''), y las notas [a]-[b] quedaron intercambiadas respecto de los referentes del inglés POB. Además, en español ''no se volvieron de sus caminos'' suena menos natural que ''no se volvieron de sus caminos malos'' o ''no se apartaron de sus caminos''; pero para no sobreinterpretar, conviene mantener la imaginería de volver con una formulación más idiomática.'
  spanish_quality_summary: El texto es legible y digno, pero 'aventador' puede sonar al aparato o al viento más que al utensilio manual; 'bieldo' es más preciso bíblicamente aunque algo menos común. La frase 'en las puertas de la tierra' es comprensible, pero 'a las puertas del país/tierra' no mejora claramente. El mayor problema estilístico es 'no se volvieron de sus caminos', que en español suena forzado; 'no se volvieron de sus caminos' es inteligible, pero la construcción más natural para preservar el hebreo es 'no se volvieron de sus caminos' solo marginalmente. Aun así, con mínimos cambios el verso puede quedar fiel y natural.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto (no aparece Yahvé, Mesías, etc.). La elección ''mi pueblo'' está alineada. Se debe alinear mejor la nota sobre הָאָרֶץ con la decisión inglesa: en el texto principal conviene ''país'' o ''tierra'' según contexto, pero la nota debe explicar la alternativa ''tierra''/''toda la tierra'' o ''país'' con claridad y sin invertir los referentes de las marcas.'
  issues:
  - severity: medium
    issue: Las notas al pie [a] y [b] no corresponden a las mismas unidades semánticas que en el rastro inglés.
    rationale: En el inglés, la nota a explica 'land/earth' y la b trata el valor de 'turn back/repent'. En el borrador español, [a] se usa para el verbo de aventar y [b] para 'tierra/país', omitiendo la nota sobre שׁוּב. Esto rompe la preservación del aparato auditado.
  - severity: medium
    issue: La nota [a] introduce una alternativa española poco ajustada al razonamiento léxico auditado.
    rationale: '''Zarandeé'' no refleja tan bien la imagen de aventar/cribar con implemento; el inglés preservó ''scattered/sifted'', no una acción de sacudir. Conviene ofrecer una alternativa más cercana como ''Los dispersé'' o explicar ''Los aventé''.'
  - severity: low
    issue: '''No se volvieron de sus caminos'' es una formulación algo poco idiomática en español.'
    rationale: Aunque refleja literalmente שׁוּב + מִן, en español suena más natural 'no se apartaron de sus caminos' o 'no volvieron atrás de sus caminos'. Pero 'apartaron' pierde la tensión de 'volver', por lo que la reparación debe ser mínima y cauta.
  - severity: low
    issue: '''Aventador'' es menos preciso que un utensilio manual de aventar.'
    rationale: El hebreo denota un implemento de aventar. 'Bieldo' o 'horquilla de aventar' serían más específicos. Sin embargo, 'aventador' sigue comunicando la imagen y no exige adjudicación compleja.
  revised_spanish_text: Los aventé con un bieldo en las puertas del país[a]; dejé sin hijos, destruí a mi pueblo; no se volvieron de sus caminos[b].
