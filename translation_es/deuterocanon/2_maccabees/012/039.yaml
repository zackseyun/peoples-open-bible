revisions:
- from: Al día siguiente[a], los hombres que estaban con Judas llegaron, cuando ya había surgido la necesidad, para recoger los cuerpos de los que habían caído y depositarlos con sus parientes en las tumbas de sus antepasados.
  to: Al día siguiente[a], los hombres que estaban con Judas vinieron, cuando ya había surgido la necesidad, para recoger los cuerpos de los que habían caído y ponerlos a descansar con sus parientes en las tumbas de sus antepasados.
  rationale: La revisión conserva todos los elementos del griego y de la auditoría POB, pero mejora la naturalidad y el tono funerario en español. «Ponerlos a descansar» expresa mejor la colocación sepulcral que «depositarlos», sin borrar la relación con sus parientes y las tumbas ancestrales. La nota al pie se ajusta para reflejar con más precisión la alternativa documentada en inglés.
