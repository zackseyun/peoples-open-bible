translation:
  language: es
  text: ¿Debo mentir[a] acerca de mi derecho? Mi herida es incurable[b], aunque no hay transgresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Acerca de mi derecho, soy tenido por mentiroso», tomando el primer hemistiquio como una afirmación en vez de una pregunta retórica.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «mi flecha es incurable»; «flecha» probablemente es una metáfora de la herida o aflicción que se le ha infligido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  - contra
  lexicon: HALOT
  rationale: 'En combinación con מִשְׁפָּטִי y אֲכַזֵּב, la relación más natural en español es de referencia: «acerca de mi derecho». Evita forzar un sentido adversativo que el contexto no exige, y conserva la idea de que el tema de la mentira es la propia causa o derecho de Job.'
- source_word: מִשְׁפָּטִי
  english_pob_choice: my right
  chosen_spanish: mi derecho
  alternatives_spanish:
  - mi caso
  - mi juicio
  - mi justicia
  lexicon: HALOT
  rationale: El hebreo puede abarcar «derecho», «caso» o «sentencia/juicio». En este contexto jurídico y de auto-defensa, «mi derecho» transmite bien la noción de reclamación legítima sin sonar demasiado técnico. «Mi caso» queda como alternativa semántica cercana.
- source_word: אֲכַזֵּב
  english_pob_choice: Should I lie
  chosen_spanish: ¿Debo mentir?
  alternatives_spanish:
  - ¿Estoy mintiendo?
  - ¿He de resultar mentiroso?
  - Miento
  lexicon: HALOT
  rationale: El valor del verbo permite tanto una afirmación de falsedad como una pregunta retórica. En español, «¿Debo mentir?» reproduce de forma clara la fuerza interrogativa y el matiz de protesta sin introducir una lectura más fuerte de la que exige el hebreo.
- source_word: אָנ֖וּשׁ
  english_pob_choice: is incurable
  chosen_spanish: es incurable
  alternatives_spanish:
  - es desesperada
  - es gravísima
  - es mortal
  lexicon: HALOT
  rationale: El adjetivo comunica una condición sin remedio. «Incurable» es la equivalencia más directa y natural para una herida/aflicción en español moderno, preservando la intensidad del término.
- source_word: חִצִּי
  english_pob_choice: my wound
  chosen_spanish: mi herida
  alternatives_spanish:
  - mi flecha
  - mi dardo
  - mi herida causada por la flecha
  lexicon: HALOT
  rationale: Aunque literalmente es «mi flecha», el contexto sugiere una imagen metafórica de aflicción o herida. «Mi herida» comunica el sentido principal en la línea, mientras que la imagen original se conserva en la nota textual.
- source_word: בְלִי
  english_pob_choice: though there is no
  chosen_spanish: aunque no hay
  alternatives_spanish:
  - sin
  - a falta de
  - sin que haya
  lexicon: HALOT
  rationale: La partícula expresa ausencia con matiz concesivo. «Aunque no hay» refleja bien el enlace lógico con la cláusula anterior en español, sin perder la negación explícita.
- source_word: פָשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebeldía
  - ofensa
  - culpa
  lexicon: HALOT
  rationale: '«Transgresión» conserva el peso moral y jurídico del término mejor que un equivalente más general. Mantiene la tensión del texto: el sufrimiento permanece a pesar de la ausencia de falta moral.'
theological_decisions:
- issue: 'La construcción ambigua del primer hemistiquio: pregunta retórica o afirmación'
  english_pob_reading: Should I lie concerning my right?
  chosen_spanish_reading: ¿Debo mentir acerca de mi derecho?
  alternative_spanish_readings:
  - Acerca de mi derecho, soy tenido por mentiroso.
  - ¿He de mentir respecto de mi derecho?
  rationale: El hebreo admite una lectura interrogativa o una lectura enunciativa. La principal mantiene la forma de pregunta retórica, como en el inglés POB, y deja visible la protesta de inocencia sin resolver la ambigüedad. La alternativa en nota preserva la otra posibilidad reconocida por el audit trail.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa sin cerrarla prematuramente'
- issue: 'La imagen de חִצִּי: flecha literal o herida/metáfora de aflicción'
  english_pob_reading: My wound is incurable; literally, 'my arrow is incurable'
  chosen_spanish_reading: Mi herida es incurable.
  alternative_spanish_readings:
  - Mi flecha es incurable.
  - Mi flecha, es decir mi herida, es incurable.
  rationale: La metáfora de la flecha parece apuntar al dolor o la aflicción sufrida. En español, la lectura literal suena oscura; por eso el texto principal usa «herida» y la nota conserva la imagen de la flecha como alternativa textual/metafórica, tal como hace el inglés POB.
  doctrine_reference: Principio de equivalencia óptima con transparencia lexical
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el pasaje quedó estable en la pasada más reciente, con alta concordancia general y solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «derecho» para מִשְׁפָּטִי, coherente con el matiz jurídico del contexto.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en el versículo.
  - Se conserva «transgresión» para פשע, manteniendo el peso moral del cierre.
  - La nota sobre חִצִּי preserva la tensión entre la imagen literal de «flecha» y el sentido contextual de «herida».
