lexical_decisions:
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre ellos
  lexicon: LSJ
  rationale: '''Sobre'' comunica el valor espacial de ἐπὶ con naturalidad en español y mantiene la repetición paralela con ''cuerpos'' y ''cabezas''.'
- source_word: σῶμα
  english_pob_choice: bodies
  chosen_spanish: cuerpos
  alternatives_spanish:
  - cuerpos
  - cuerpo
  lexicon: LSJ
  rationale: El plural se entiende por αὐτῶν y por el contexto de los ídolos; 'cuerpos' conserva la referencia física concreta.
- source_word: κεφαλή
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - cabezas
  - cabeza
  lexicon: LSJ
  rationale: Se mantiene el plural implícito por αὐτῶν; 'cabezas' es la forma natural y literal en español.
- source_word: ἐφίπτανται
  english_pob_choice: alight
  chosen_spanish: se posan
  alternatives_spanish:
  - aligan
  - se asientan
  - vuelan sobre
  lexicon: LSJ
  rationale: '''Se posan'' expresa el movimiento de volar hasta un punto y quedar asentados, equivalente funcional de ''alight'' sin forzar un calco.'
- source_word: νυκτερίδες
  english_pob_choice: bats
  chosen_spanish: murciélagos
  alternatives_spanish:
  - murciélagos
  lexicon: LSJ
  rationale: Término zoológico estándar en español; corresponde directamente al griego.
- source_word: χελιδόνες
  english_pob_choice: swallows
  chosen_spanish: golondrinas
  alternatives_spanish:
  - golondrinas
  lexicon: LSJ
  rationale: Es la especie de ave designada por el griego; no hay razón para generalizar.
- source_word: τὰ ὄρνεα
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - las aves
  - los pájaros
  lexicon: LSJ
  rationale: El artículo colectivo se conserva con 'las aves', que suena más formal y amplio que 'pájaros'.
- source_word: ὡσαύτως δὲ καὶ
  english_pob_choice: and likewise also
  chosen_spanish: y asimismo también
  alternatives_spanish:
  - y asimismo
  - y de igual modo también
  - asimismo también
  lexicon: LSJ
  rationale: La acumulación enfática de la frase griega se refleja con una duplicación aditiva natural en español.
- source_word: οἱ αἴλουροι
  english_pob_choice: the cats
  chosen_spanish: los gatos
  alternatives_spanish:
  - los gatos
  lexicon: LSJ
  rationale: αἴλουρος suele significar 'gato'; se usa el masculino genérico plural en español para el animal, manteniendo el paralelo con el resto de la lista.
theological_decisions:
- issue: Carácter burlón y literal de la escena sobre los ídolos
  english_pob_reading: Translate the animal imagery literally as a demonstration of the idols' helplessness.
  chosen_spanish_reading: Traducir la imagen animal de manera literal como demostración de la impotencia de los ídolos.
  alternative_spanish_readings:
  - Interpretar la escena de modo simbólico
  - Suavizar la imagen para hacerla más devocional
  rationale: La evidencia griega presenta una lista concreta de animales posándose sobre cuerpos y cabezas; mantenerla literal preserva la fuerza de la burla sin añadir explicación ajena al texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La comparación con el texto inglés auditado y el griego muestra alta concordancia; no se documentan revisiones textuales relevantes, por lo que se mantiene una traducción literal con ajuste natural de estilo español.
  spanish_consistency_notes:
  - Se usa 'sobre' para ἐπὶ de forma consistente con el paralelismo del versículo.
  - Se conserva la enumeración de animales sin reinterpretarla alegóricamente.
  - '''Las aves'' mantiene el artículo colectivo del griego y el tono formal del pasaje.'
