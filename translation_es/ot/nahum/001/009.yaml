    text: 'O: «La aflicción no surgirá dos veces», o «La angustia no vendrá una segunda vez». El hebreo es conciso y puede referirse al ataque del enemigo o a que no será necesario repetir el juicio.'
    reason: alternative_reading
  revision_rationale: Se revisa para mejorar la naturalidad del español y alinearlo más de cerca con las decisiones léxicas y teológicas del POB inglés. «Maquinan» expresa mejor el sentido hostil de חשׁב en este contexto. «Él pondrá fin por completo» evita el calco rígido «hará un fin completo» mientras conserva la idea de כָּלָה y הוּא עֹשֶׂה como acción decisiva de Yahvé. «La aflicción» con nota ampliada preserva mejor la ambigüedad del hebreo y las alternativas registradas en la auditoría inglesa.
