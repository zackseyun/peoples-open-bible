translation:
  language: es
  text: Quedarán desolados entre tierras desoladas[a], y sus ciudades serán entre ciudades en ruinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «en medio de tierras desoladas ... en medio de ciudades en ruinas».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָשַׁמּוּ
  english_pob_choice: they will be desolated
  chosen_spanish: serán desolados
  alternatives_spanish:
  - quedarán desolados
  - serán arruinados
  - quedarán arruinados
  lexicon: HALOT
  rationale: El nifal de שׁמם expresa un estado/resultando de devastación. «Serán desolados» conserva esa pasividad/resultatividad y mantiene la conexión léxica con el sustantivo/adjetivo afín de la misma raíz en el verso.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - en
  lexicon: HALOT
  rationale: La preposición con תוך indica estar en medio de otros elementos. «Entre» es natural en español y preserva la idea comparativa de ubicación dentro de un conjunto.
- source_word: אֲרָצוֹת
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - países
  - territorios
  lexicon: HALOT
  rationale: Aquí אֶרֶץ en plural se refiere a regiones/territorios, no al mundo entero. «Tierras» es amplio, natural y funciona bien en un oráculo profético.
- source_word: נְשַׁמּוֹת
  english_pob_choice: desolate
  chosen_spanish: desoladas
  alternatives_spanish:
  - devastadas
  - arruinadas
  lexicon: HALOT
  rationale: El participio describe las tierras y conserva la raíz שׁמם. «Desoladas» enlaza léxicamente con «desolados» y reproduce la repetición enfática del hebreo.
- source_word: וְעָרָיו
  english_pob_choice: and its cities
  chosen_spanish: y sus ciudades
  alternatives_spanish:
  - y sus urbes
  - y las ciudades de ella
  lexicon: HALOT
  rationale: El sufijo de 3ª persona singular remite a Egipto como entidad nacional. En español, «sus» es la forma natural para un país o reino y evita personalizar innecesariamente el referente.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - villas
  lexicon: HALOT
  rationale: «Ciudades» es la correspondencia estándar de עִיר en este tipo de lenguaje profético y coincide con el nivel de escala del pasaje.
- source_word: נַחֲרָבוֹת
  english_pob_choice: ruined
  chosen_spanish: en ruinas
  alternatives_spanish:
  - arruinadas
  - destruidas
  - devastadas
  lexicon: HALOT
  rationale: La forma pasiva/descriptiva de חרב queda bien reflejada con «en ruinas», que es claro, natural y se usa comúnmente para ciudades devastadas.
- source_word: תִּהְיֶינָה
  english_pob_choice: will be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  - llegarán a estar
  lexicon: HALOT
  rationale: El verbo היה enlaza a las ciudades con su estado comparativo. «Estarán» comunica bien ese estado resultante en español y suena más fluido que una construcción más literal.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «be made desolate» a «be desolated» para corresponder más de cerca al pasivo del verbo. La versión española refleja directamente ese matiz con «serán desolados», sin perder la repetición enfática entre la forma verbal y el participio calificativo.
  spanish_consistency_notes:
  - Se mantiene «desolados/desoladas» para reproducir la raíz repetida de שׁמם.
  - Se prefiere «tierras» en lugar de «países» por la amplitud semántica de אֲרָצוֹת en contexto profético.
  - «Entre» traduce בְּתוֹךְ con una opción natural y auditable; la nota ofrece la alternativa más literal «en medio de».
  - Se conserva el posesivo singular «sus» para el referente nacional singular de Egipto.
  - «En ruinas» se usa para ciudades, porque en español describe con claridad el estado de devastación sin forzar una calca demasiado dura.
