base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/027.yaml
  text: And it happened in the thirty-seventh year of the exile of Jehoiachin king of Judah[a], in the twelfth month, on the twenty-seventh day of the month, that Evil-merodach king of Babylon, in the year of his reign[c][b], lifted up the head of Jehoiachin king of Judah out of the prison.
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''lifted up the head of,'' meaning he elevated Jehoiachin''s status or showed him favor, beginning with his release from prison.'
    reason: lexical_alternative
  - marker: b
    text: Evil-merodach is also known historically as Amel-Marduk.
    reason: cultural_note
  - marker: c
    text: '''In the year of his reign'' may mean ''in the first year of his reign.'''
    reason: alternative_reading
