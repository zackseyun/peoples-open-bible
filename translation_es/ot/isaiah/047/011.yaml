translation:
  language: es
  text: Pero el mal vendrá sobre ti[a]; no sabrás cómo conjurarlo. Y caerá sobre ti la desgracia[b]; no podrás apartarla. Y la ruina vendrá sobre ti de repente; no lo sabrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no sabrás su amanecer” o “no sabrás cómo apartarlo”. El hebreo de esta cláusula es difícil; aquí el sentido principal sigue la idea de que Babilonia no podrá usar sus artes ocultas para desviar el mal que viene.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no podrás aplacarla” o “no podrás expiarla”. El hebreo dice literalmente “hacer expiación por ella”, con la idea contextual de no poder apartar o neutralizar la desgracia una vez llegada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - desgracia
  - calamidad
  - mal moral
  lexicon: HALOT
  rationale: En este contexto de juicio sobre Babilonia, el término apunta a un daño destructor más que a maldad moral. 'Mal' conserva la amplitud del hebreo y deja que el paralelismo con 'desgracia' y 'ruina' concrete el sentido.
- source_word: שַׁחְרָהּ
  english_pob_choice: how to charm it away
  chosen_spanish: cómo conjurarlo
  alternatives_spanish:
  - cómo ahuyentarlo
  - su amanecer
  - cómo apartarlo
  lexicon: HALOT
  rationale: El hebreo es difícil y el contexto inmediato alude a artes ocultas. 'Conjurar' comunica la idea de intentar deshacer o desviar un mal mediante prácticas mágicas, manteniendo la fuerza contextual sin forzar una etimología menos segura.
- source_word: הֹוָה
  english_pob_choice: disaster
  chosen_spanish: desgracia
  alternatives_spanish:
  - desastre
  - calamidad
  - ruina
  lexicon: HALOT
  rationale: La palabra expresa un golpe ruinosa, paralelo al primer término. 'Desgracia' es natural en español y distingue este miembro de la serie sin perder el peso del juicio.
- source_word: כַּפְּרָהּ
  english_pob_choice: to avert it
  chosen_spanish: expirarla
  alternatives_spanish:
  - apaciguarla
  - evitarla
  - expiarla
  - repararla
  lexicon: HALOT
  rationale: El hebreo conserva el campo semántico de כפר, con el sentido de cubrir/purificar/propiciar. En este contexto no se trata de un rito expiatorio positivo, sino de la imposibilidad de deshacer o desviar la desgracia una vez llegada. 'Expirarla' intenta mantener la raíz de 'expiar' a la vez que expresa la idea de no poder neutralizarla; se deja la alternativa interpretativa en la nota.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - de improviso
  lexicon: HALOT
  rationale: Adverbio estándar de abruptedad. 'De repente' es natural y claro en español.
- source_word: שׁוֹאָה
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - devastación
  - desolación
  - destrucción
  lexicon: HALOT
  rationale: Denota ruina devastadora. 'Ruina' es breve, idiomática y mantiene el tono de juicio.
- source_word: לֹא תֵדָעִי
  english_pob_choice: which you do not know
  chosen_spanish: no la conocerás
  alternatives_spanish:
  - que no preverás
  - que no sabrás
  - que no conocerás
  lexicon: HALOT
  rationale: La repetición final expresa desconocimiento del evento que viene. 'No la conocerás' sigue de cerca la forma hebrea y evita añadir la idea de previsión que el original no exige.
theological_decisions:
- issue: Valor de כפר en un contexto de juicio
  english_pob_reading: retain the lexical idea with 'avert it' rather than flattening to a fully cultic 'atone for it' in the main text
  chosen_spanish_reading: usar un verbo que conserve el campo de 'expiar' pero que aquí signifique no poder deshacer el daño
  alternative_spanish_readings:
  - apaciguarla
  - evitarla
  - expiarla
  rationale: 'El hebreo es teológicamente cargado en toda la Biblia, pero aquí el uso es irónico y contextual: Babilonia no podrá neutralizar la calamidad. En español, mantener una forma derivada de ''expiar'' ayuda a preservar la transparencia léxica, mientras la nota aclara que el sentido práctico es el de no poder apartarla.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Tensión entre literalidad y sentido contextual en שַׁחְרָהּ
  english_pob_reading: how to charm it away
  chosen_spanish_reading: cómo conjurarlo
  alternative_spanish_readings:
  - su amanecer
  - cómo apartarlo
  - cómo ahuyentarlo
  rationale: La cláusula es semánticamente difícil. Dado el marco de hechicería de Babilonia, la traducción debe reflejar la imposibilidad de usar artes ocultas para librarse del mal, sin convertir el texto en una paráfrasis libre.
  doctrine_reference: Translation philosophy §3 (source transparency)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del texto base: la POB inglesa pasó de ''atone for it'' a ''avert it'' y ajustó la última cláusula a ''which you do not know''. La propuesta española sigue esa decisión de sentido contextual para כפר, pero conserva una señal léxica de la raíz en la nota, y traduce el cierre de forma cercana al hebreo sin expandirlo a ''prever''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió un registro bíblico moderno y sobrio, evitando calcos demasiado rígidos.
  - Se preservó la secuencia tripartita de juicio y la progresión retórica del hebreo.
