translation:
  language: es
  text: tal como Yahvé había mandado a Moisés[a], así los contó en el desierto de Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los pasó revista' o 'los numeró'. El verbo hebreo puede referirse a inscribir, pasar revista o hacer un censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: La construcción comparativa introduce conformidad con una acción anterior; 'tal como' conserva esa relación de ajuste sin sonar rígido en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: El verbo expresa dar una orden. 'Había mandado' es natural en español bíblico moderno y refleja la anterioridad narrativa del mandato frente al censo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre divino del hebreo, conforme al estándar del proyecto en español, en lugar de sustituirlo por un título.
- source_word: וַיִּפְקְדֵם
  english_pob_choice: he counted them
  chosen_spanish: los contó
  alternatives_spanish:
  - los pasó revista
  - los pasó en cuenta
  - los empadronó
  lexicon: HALOT
  rationale: En este contexto censal פקד indica hacer un recuento/muster. 'Los contó' es claro y fiel; evita sobreespecificar con un tecnicismo militar o administrativo que el hebreo aquí no obliga.
- source_word: בְּמִדְבַּר סִינָי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto del Sinaí
  - en el desierto de Sinái
  lexicon: HALOT
  rationale: מִדְבָּר puede traducirse por 'desierto' o 'despoblado'; aquí 'desierto de Sinaí' comunica bien el lugar geográfico y mantiene la relación constructa sin calcarla de forma extraña.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragramatón. La convención española del proyecto es rendirlo como 'Yahvé', manteniendo el nombre propio divino y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פקד en contexto censal
  english_pob_reading: he counted them
  chosen_spanish_reading: los contó
  alternative_spanish_readings:
  - los alistó
  - los pasó revista
  - los numeró
  rationale: En este pasaje la acción es un recuento de personas para el censo. 'Los contó' conserva el sentido básico sin introducir una lectura militar o técnica que no sea necesaria.
  doctrine_reference: HALOT / contexto de censo en Números 1
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios sustantivos en el contenido; se mantuvo la relación comparativa, el valor de anterioridad del mandato y el sentido censal de פקד. La única adaptación principal fue la terminología española de YHWH a 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular para יְהוָה.
  - Se usa 'desierto de Sinaí' para conservar la relación geográfica del hebreo.
  - '''Los contó'' se deja en el texto principal, con nota de alternativas para preservar la amplitud semántica documentada por el audit trail inglés.'
