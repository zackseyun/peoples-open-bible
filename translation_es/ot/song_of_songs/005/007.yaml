base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/005/007.yaml
  text: The watchmen who go about the city found me[a]; they struck me, they wounded me[b]; the keepers of the walls took my cloak from me.
  footnotes:
  - marker: a
    text: Or 'who patrol the city.' The Hebrew participle means 'going around' or 'circling,' and in context likely refers to making rounds as city watchmen.
    reason: lexical_alternative
  - marker: b
    text: Or 'took away my veil' or 'lifted my shawl off me.' The Hebrew רְדִיד refers to an outer wrap or covering garment.
    reason: lexical_alternative
