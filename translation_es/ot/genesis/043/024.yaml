- from: El hombre llevó a los hombres a la casa de José y les dio agua[a], y ellos se lavaron los pies[b]; luego les dio forraje a sus burros.
  to: El hombre llevó a los hombres a casa de José y les dio agua[a], y ellos se lavaron los pies[c][b]; luego dio forraje a sus asnos.
  rationale: La revisión conserva la fidelidad al hebreo y al expediente inglés, pero restaura una nota auditada importante sobre la identificación no explícita de los participantes, reemplaza una nota menos útil por una alternativa heredada del POB inglés, y eleva ligeramente el registro con «asnos». También ajusta «a la casa de José» a «a casa de José» para expresar de forma más natural en español el movimiento de entrada.
