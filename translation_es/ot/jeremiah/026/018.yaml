review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del audit trail inglés: identifica correctamente a Miqueas, conserva Yahvé, traduce צְבָאוֹת con sentido concreto, mantiene la imagen de Sión arada y la referencia al monte del templo. Sin embargo, hay dos problemas de fidelidad/claridad: (1) omite la alternativa léxica asociada a la cláusula final sobre las ''alturas boscosas/alturas de bosque'', que el English POB preserva; y (2) ''Jerusalén se volverá ruinas'' suena poco natural en español, donde conviene ''quedará en ruinas'' o ''se convertirá en ruinas'' para expresar תִּהְיֶה con mejor legibilidad sin pérdida de sentido.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero 'morastita' resulta menos establecido que 'morasteo' en español bíblico, y 'se volverá ruinas' es gramaticalmente áspero. La cláusula final elíptica puede conservarse, pero en español funciona mejor con verbo expreso para evitar una frase demasiado truncada. También conviene alinear notas y anclajes de forma más precisa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé''; צְבָאוֹת -> ''de los ejércitos''; nombre del profeta -> ''Miqueas''. Se mantiene ''Casa'' para el templo, lo cual es defendible por literalidad, aunque se explica con nota cultural. Hace falta conservar en español la alternativa léxica de la última cláusula, paralela a la nota inglesa sobre ''forested high places''.'
  issues:
  - severity: medium
    issue: '''Jerusalén se volverá ruinas'' es español poco natural.'
    rationale: Aunque intenta reflejar el cambio de estado, en español estándar bíblico resulta torpe. 'Jerusalén quedará en ruinas' transmite el mismo sentido de עִיִּים תִּהְיֶה con mejor legibilidad.
  - severity: medium
    issue: Falta una nota léxica para la cláusula final לְבָמוֹת יָעַר.
    rationale: El English POB preserva una alternativa significativa ('will become forested high places'). El español debería conservar una nota equivalente para no perder la decisión léxica documentada.
  - severity: low
    issue: '''morastita'' es menos idiomático/establecido que ''morasteo''.'
    rationale: El gentilicio hebreo puede representarse de varias maneras, pero 'morasteo' suele sonar más natural y reconocible para lectores bíblicos en español, sin perder la fuerza gentilicia.
  - severity: low
    issue: La elipsis final queda demasiado abrupta en español.
    rationale: Aunque el inglés auditado tolera una clausula muy elíptica, en español es preferible explicitar 'será' para conservar claridad formal sin añadir contenido ajeno.
