translation:
  language: es
  text: 'Y los hijos de Zera: Zimri, Etán, Hemán, Kalkol[a] y Dara[b]—cinco en total.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las versiones tradicionales suelen leer «Calcol» para כַלְכֹּל.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de este versículo lee «Dara»; el paralelo de 1 Reyes 4:31 presenta «Darda».
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos
  - Y los descendientes de
  lexicon: HALOT
  rationale: En contexto genealógico, בְּנֵי se refiere naturalmente a los descendientes varones de un antepasado, y en español bíblico-readable "los hijos de" mantiene la estructura de lista sin sonar forzado. La conjunción inicial ו se conserva con "Y" para reflejar la coordinación del registro genealógico.
- source_word: זֶרַח
  english_pob_choice: Zerah
  chosen_spanish: Zera
  alternatives_spanish:
  - Zérah
  - Zeraj
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español de manera transparente. Se omite la h final del patrón inglés porque en español no aporta valor fonológico y la forma breve es más natural.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  alternatives_spanish:
  - Zimrí
  lexicon: HALOT
  rationale: Nombre propio hebreo transliterado de forma directa. La acentuación gráfica no es necesaria en español porque la forma llana termina en vocal.
- source_word: וְאֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Etán
  alternatives_spanish:
  - Ethan
  lexicon: HALOT
  rationale: Nombre propio; en español se adapta a una transliteración fonéticamente clara. El acento marca la sílaba tónica final y evita una lectura castellana errónea.
- source_word: וְהֵימָן
  english_pob_choice: Heman
  chosen_spanish: Hemán
  alternatives_spanish:
  - Heman
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español con acento para reflejar la pronunciación aguda y evitar ambigüedad ortográfica.
- source_word: וְכַלְכֹּל
  english_pob_choice: Kalkol
  chosen_spanish: Calcol
  alternatives_spanish:
  - Kalkol
  lexicon: HALOT
  rationale: Se sigue la forma española tradicional más asentada en versiones bíblicas, aunque la transliteración más transparente del hebreo sería "Kalkol". Aquí se privilegia legibilidad y reconocimiento del nombre propio en español.
- source_word: וָדָרַע
  english_pob_choice: Dara
  chosen_spanish: Dara
  alternatives_spanish:
  - Darda
  lexicon: HALOT
  rationale: El hebreo de este versículo apoya "Dara"; se mantiene esa lectura sin armonizarla con el paralelo de 1 Reyes 4:31, donde aparece "Darda".
- source_word: כֻּלָּם
  english_pob_choice: in all
  chosen_spanish: en total
  alternatives_spanish:
  - todos juntos
  - todos ellos
  lexicon: HALOT
  rationale: La expresión hebrea comunica totalidad numérica. En español, "en total" preserva el valor resumidor de la cláusula final de la genealogía de manera natural.
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco personas
  lexicon: HALOT
  rationale: Número cardinal simple; se traduce directamente. El contexto genealógico deja claro el referente humano sin necesidad de añadirlo en el texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de 1 Crónicas 2:6 y conserva la diferencia nominal con el paralelo de 1 Reyes 4:31. No se observaron revisiones sustantivas en el pase más reciente; el acuerdo de control fue alto.
  spanish_consistency_notes:
  - Se mantiene un estilo genealógico sobrio, con nombres propios transliterados y sin expandir el texto con explicaciones ajenas al versículo.
  - Se usa «Y» inicial para reflejar la coordinación hebrea, pero el resto de la frase se ajusta al orden natural del español.
  - «En total» mantiene el sentido sumario de כֻּלָּם חֲמִשָּׁה sin sobrecargar la línea genealógica.
