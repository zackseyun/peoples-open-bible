translation:
  language: es
  text: Y tú, levanta un lamento[a] sobre los príncipes de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entona un lamento» o «alza una endecha»/«un canto fúnebre».
    reason: lexical_alternative
  - marker: b
    text: «Príncipes» puede referirse de manera específica a los gobernantes reales de Judá/Israel, no solo a dirigentes en sentido general.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: And you,
  chosen_spanish: Y tú,
  alternatives_spanish:
  - Y en cuanto a ti,
  - Ahora tú,
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente marca una transición directa y enfática. «Y tú,» conserva la continuidad discursiva y la focalización sobre el profeta sin sobrecargar el español.
- source_word: שָׂא
  english_pob_choice: raise
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - toma
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «levantar/cargar», y en esta construcción introduce el lamento. «Levanta» mantiene la metáfora de forma natural en español y corresponde al valor idiomático sin perder la imagen subyacente.
- source_word: קִינָה
  english_pob_choice: lamentation
  chosen_spanish: endecha
  alternatives_spanish:
  - lamentación
  - lamento
  - canto fúnebre
  lexicon: HALOT
  rationale: El sustantivo designa un canto fúnebre o lamento formal. «Endecha» comunica bien el género poético-fúnebre y evita la abstracción de «lamentación», aunque esta sigue siendo una alternativa válida.
- source_word: אֶל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - por
  - acerca de
  - contra
  lexicon: HALOT
  rationale: En el lenguaje de duelo, la preposición puede señalar el objeto del lamento. «Sobre» es la equivalencia española más idiomática para expresar que el duelo recae sobre esos personajes.
- source_word: נְשִׂיאֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - líderes
  - jefes
  - gobernantes
  lexicon: HALOT
  rationale: El término apunta a figuras elevadas del orden político, y en este contexto puede referirse específicamente a la casa real de Judá/Israel. «Príncipes» conserva ese matiz dinástico-político mejor que alternativas más genéricas.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio estándar; se mantiene sin traducir.
theological_decisions:
- issue: Alcance de «príncipes de Israel»
  english_pob_reading: Retain the broader dynastic-political term 'princes of Israel' in the main text.
  chosen_spanish_reading: Mantener «príncipes de Israel» sin reducirlo a «reyes» ni ampliarlo a «líderes».
  alternative_spanish_readings:
  - reyes de Israel
  - líderes de Israel
  - gobernantes de Israel
  rationale: El hebreo usa נְשִׂיאֵי, no el término más específico para «reyes». Aunque el contexto del capítulo apunta a la casa real, la traducción no debe estrechar el alcance del texto. «Príncipes» preserva la ambigüedad y la dignidad política del referente.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión inglesa más reciente; no se registran cambios aplicados en el flujo de revisión, por lo que la propuesta española sigue de cerca la decisión auditada de la POB en inglés.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton.
  - «Príncipes» se mantiene como término político-dinástico, coherente con la decisión inglesa auditada.
  - La puntuación sigue el ritmo profético breve del hebreo y el estilo publicable del español bíblico contemporáneo.
