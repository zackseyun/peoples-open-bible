    rationale: En español, «armada» se entiende normalmente como fuerza naval. La auditoría inglesa ya corrigió «fleet» a «army» precisamente por el contexto terrestre. Mantener «armada» reintroduce el problema semántico.
  - severity: medium
    issue: «un ejército pesado» para ὄχλῳ βαρεῖ
    rationale: Aunque intenta conservar «heavy force», en español «ejército pesado» no es una colocación natural y puede sugerir torpeza o categoría de armamento, no una fuerza numerosa o imponente. «Fuerza imponente» o «gran fuerza» comunica mejor el sentido militar.
