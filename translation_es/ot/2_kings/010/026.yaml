translation:
  language: es
  text: Entonces sacaron los pilares de la casa de Baal y los quemaron[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo lleva un sufijo de objeto singular en «y lo quemaron», aunque el sustantivo precedente es plural. En español se traduce colectivamente como plural por claridad y por el sentido del conjunto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «pilares sagrados» o «piedras erguidas». El término hebreo designa pilares de piedra asociados con el culto.
    reason: lexical_alternative
  - marker: c
    text: O «el templo de Baal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצִאוּ
  english_pob_choice: Then they brought out
  chosen_spanish: Entonces sacaron
  alternatives_spanish:
  - Y sacaron
  - Entonces hicieron salir
  lexicon: HALOT
  rationale: El hiphil de יצא expresa causar que algo salga o sacarlo. En español, «sacaron» comunica bien la acción narrativa sin añadir más de lo que el hebreo dice; «entonces» conserva el avance secuencial del waw consecutivo.
- source_word: מַצְּבוֹת
  english_pob_choice: pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las columnas
  - las piedras sagradas
  - los postes sagrados
  lexicon: HALOT
  rationale: El término puede referirse a una piedra/pilar cultual erigido. «Pilares» mantiene la referencia física y cultual sin extenderse demasiado; «columnas» suena más arquitectónico en español moderno y puede desviar el sentido.
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  lexicon: HALOT
  rationale: בַּיִת es literalmente «casa». En este contexto cultual puede equivaler a un templo, pero «casa de Baal» sigue más de cerca la forma hebrea y conserva la terminología POB.
- source_word: וַיִּשְׂרְפוּהָ
  english_pob_choice: and burned them
  chosen_spanish: y los quemaron
  alternatives_spanish:
  - y la quemaron
  - y lo quemaron
  lexicon: HALOT
  rationale: El hebreo tiene sufijo singular femenino, pero el antecedente inmediato «pilares» es plural. En español, el plural «los» expresa el sentido colectivo de manera natural y transparente; no conviene copiar el singular literal porque sería confuso.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final informó alta concordancia; por eso se mantiene la lectura directa del hebreo con la misma resolución de las ambigüedades léxicas ya documentadas.
  spanish_consistency_notes:
  - Se mantiene «Baal» como nombre propio cultual, sin normalizarlo a una forma tradicional distinta.
  - Se conserva la secuencia narrativa con «Entonces» para reflejar el waw consecutivo.
  - La elección de «casa» sobre «templo» sigue el paralelismo con el texto hebreo y la decisión inglesa auditada.
