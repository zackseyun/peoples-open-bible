base_translation:
  language: en
  yaml_path: translation/ot/2_kings/020/014.yaml
  text: Then Isaiah the prophet came to King Hezekiah and said to him[a], “What did these men say, and where did they come from to you?” And Hezekiah said, “They came to me from a distant land[b], from Babylon.”
  footnotes:
  - marker: a
    text: Or, more literally, “and from where do they come to you?” The Hebrew uses an imperfect form that can be rendered more formally, but the past sense fits the narrative context.
    reason: lexical_alternative
  - marker: b
    text: “From a distant land” is then specified as “from Babylon,” preserving Hezekiah’s emphasis on the visitors’ far-off origin before naming the place.
    reason: lexical_alternative
