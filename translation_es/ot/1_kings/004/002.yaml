translation:
  language: es
  text: 'Y estos eran los funcionarios[a] que eran suyos: Azarías hijo de Sadoc, el sacerdote[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los príncipes' o 'los oficiales'; el término hebreo puede designar gobernantes o administradores de alto rango.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''Azarías hijo de Sadoc, el sacerdote''. Algunos entienden que ''el sacerdote'' identifica a Sadoc; otros lo toman como título de Azarías. El texto no dice explícitamente ''sumo sacerdote''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos eran
  alternatives_spanish:
  - Ahora estos eran
  - Estos eran
  lexicon: HALOT
  rationale: La forma hebrea introduce una lista de cargos o nombres; en español, 'Y estos eran' mantiene la conexión narrativa y el valor introductorio sin sonar forzado.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los funcionarios
  alternatives_spanish:
  - los príncipes
  - los oficiales
  - los jefes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar príncipes, jefes u պաշտոնarios altos. En este contexto administrativo, 'funcionarios' comunica bien la idea de cargos de gobierno sin sugerir nobleza hereditaria.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: who were his
  chosen_spanish: que le pertenecían
  alternatives_spanish:
  - que eran suyos
  - que servían a él
  - que estaban a su cargo
  lexicon: HALOT
  rationale: La cláusula relativa con לֹו expresa pertenencia o relación con Salomón. 'Le pertenecían' refleja esa asociación de modo natural en español, sin precisar más de lo que el hebreo dice.
- source_word: עֲזַרְיָהוּ
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran con la forma española usual. 'Azarías' es la adaptación natural de עֲזַרְיָהוּ en español bíblico.
- source_word: בֶן צָדוֹק
  english_pob_choice: son of Zadok
  chosen_spanish: hijo de Sadoc
  alternatives_spanish:
  - hijo de Zadoc
  lexicon: HALOT
  rationale: La construcción filial se traduce literalmente. 'Sadoc' es la forma española bíblica habitual para צָדוֹק.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sacerdote
  lexicon: HALOT
  rationale: כהן se rinde de forma más natural en español bíblico como 'sacerdote'. Aunque la cláusula puede funcionar como título o como identificación de Sadoc, el hebreo no dice explícitamente 'sumo sacerdote', así que se mantiene el término simple.
theological_decisions:
- issue: Relación sintáctica de 'el sacerdote'
  english_pob_reading: Render straightforwardly as 'Azariah son of Zadok, the priest' without resolving whether 'the priest' functions as a formal title equivalent to 'high priest' or whether it appositionally identifies Zadok.
  chosen_spanish_reading: 'Traducir de manera directa: ''Azarías hijo de Sadoc, el sacerdote'', sin decidir si la frase identifica a Sadoc o si funciona como título de Azarías.'
  alternative_spanish_readings:
  - Azarías hijo de Sadoc el sacerdote
  - Azarías hijo de Sadoc, sacerdote principal
  rationale: El hebreo permite ambas posibilidades sintácticas, pero no explicita 'sumo sacerdote'. La puntuación conserva la ambigüedad del original y evita introducir una jerarquía eclesiástica que el texto no nombra.
  doctrine_reference: Principios de transparencia textual y no-expansión institucional
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una solución abierta para la frase final y no requiere cambios de revisión. La versión española preserva esa misma apertura y la vuelve natural en el orden nominal del español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en el pasaje; aquí no ocurre.
  - Se prefiere 'funcionarios' para שָׂרִים en contexto administrativo, coherente con la decisión inglesa de 'officials'.
  - '''Sadoc'' sigue la forma española bíblica estándar del nombre.'
  - La puntuación con coma antes de 'el sacerdote' mantiene la ambigüedad sintáctica del hebreo sin resolverla artificialmente.
