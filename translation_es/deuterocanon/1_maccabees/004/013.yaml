translation:
  language: es
  text: Y salieron del campamento para la batalla[a], y los que estaban con Judas tocaron las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que estaban con Judas tocaron la trompeta». El griego identifica al grupo que acompañaba a Judas; el plural en español mantiene el sentido colectivo del pasaje.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξῆλθαν
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - marcharon
  lexicon: BDAG
  rationale: El aoristo expresa simple salida desde un lugar. «Salieron» es natural en español y no añade el matiz militar de «marcharon», que el griego no exige.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - tienda
  lexicon: LEH
  rationale: En contexto militar, παρεμβολή designa el lugar de acampada. «Campamento» conserva el sentido militar y suena más natural en español que una traducción demasiado literal.
- source_word: εἰς πόλεμον
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para guerra
  lexicon: LEH
  rationale: La expresión apunta al propósito o a la entrada en combate. «Para la batalla» reproduce bien la idea y evita ampliar innecesariamente a «guerra».
- source_word: ἐσάλπισαν
  english_pob_choice: sounded the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron las trompetas
  - hicieron sonar las trompetas
  lexicon: BDAG
  rationale: El verbo significa dar la señal con trompeta. En español, «tocaron las trompetas» transmite de forma clara la acción militar colectiva sin forzar una construcción impersonal.
- source_word: οἱ παρὰ Ἰούδου
  english_pob_choice: those with Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los de Judas
  - los que iban con Judas
  lexicon: BDAG
  rationale: La frase identifica al grupo asociado con Judas sin decir explícitamente «sus hombres». «Los que estaban con Judas» mantiene la neutralidad del griego y el ajuste revisionado del inglés POB.
- source_word: Ἰούδου
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: Greek proper name tradition
  rationale: Aquí se trata de Judas Macabeo; en español, «Judas» es la transliteración estable y coincide con la tradición textual del libro.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «the men with Judas» a «those with Judas» para seguir más de cerca οἱ παρὰ Ἰούδου. La versión española adopta una formulación igualmente neutral («los que estaban con Judas») y conserva el plural del verbo por el valor colectivo del contexto militar.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y directo, sin añadir detalles como «avanzaron» o «marcharon» que no están explícitos en el griego.
  - «Tocaron las trompetas» se prefirió a una forma impersonal para mantener claridad y naturalidad en español.
  - No se usó «SEÑOR» ni terminología teológica adicional, porque el versículo no contiene referencias divinas explícitas.
