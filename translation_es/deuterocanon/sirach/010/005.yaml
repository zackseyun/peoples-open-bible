    rationale: El hebreo, según la decisión inglesa auditada, expresa levantar/establecer a alguien sobre el mundo en posición de autoridad. «Pondrá» puede entenderse, pero pierde el matiz de entronización o instalación de un gobernante.
  - severity: low
