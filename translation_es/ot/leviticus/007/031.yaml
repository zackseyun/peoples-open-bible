translation:
  language: es
  text: El sacerdote quemará la grasa sobre el altar[a], y la pechuga pertenecerá a Aarón y a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrecerá en humo la grasa sobre el altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: quemará
  alternatives_spanish:
  - hará arder
  - ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa hacer subir la ofrenda mediante fuego; en español, «quemará» comunica la acción ritual con naturalidad. La alternativa más explícita mantiene la noción de humo, pero el texto principal prioriza claridad sin perder el acto cultual.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote culto
  lexicon: HALOT
  rationale: Aunque el término técnico hebreo es כֹּהֵן, en español bíblico estándar «sacerdote» comunica bien la función cultual y resulta natural para lectores amplios. Se evita una calca que no aporte precisión adicional en este contexto.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la gordura
  lexicon: HALOT
  rationale: En la legislación levítica, חֵלֶב designa la porción grasa reservada para el altar. «La grasa» es comprensible y fiel; «sebo» puede sonar más técnico o regional, y no es necesario aquí.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: HALOT
  rationale: 'La terminación direccional del hebreo se integra naturalmente en español como ubicación de la acción ritual: la grasa se quema sobre el altar. «Sobre» conserva la imagen espacial sin forzar el giro.'
- source_word: וְהָיָה
  english_pob_choice: shall belong
  chosen_spanish: pertenecerá
  alternatives_spanish:
  - será de
  - quedará para
  lexicon: HALOT
  rationale: La construcción hebrea marca asignación/posesión, no mera existencia. «Pertenecerá» expresa la porción asignada a Aarón y sus hijos sin perder el matiz legal de adjudicación.
- source_word: הֶחָזֶה
  english_pob_choice: the breast
  chosen_spanish: el pecho
  alternatives_spanish:
  - la pechera
  - el pecho del animal
  lexicon: HALOT
  rationale: En este pasaje se trata de la porción anatómica destinada a los sacerdotes. «El pecho» es claro en español y refleja el valor asignado por el contexto sacrificial, aunque «pechera» también podría nombrar la porción técnica en ciertos registros.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - para Aarón y para sus hijos
  - de Aarón y de sus hijos
  lexicon: HALOT
  rationale: El ל hebreo de asignación se refleja con «a», manteniendo la relación de destino/entrega. La repetición evita suavizar demasiado la estructura posesiva del original.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están plenamente alineados; no se registran revisiones sustantivas. La versión española conserva el mismo sentido legal-sacrificial y la misma alternativa léxica para הקטיר en nota.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico sobrio y claro.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - La asignación sacerdotal se expresa con un verbo de pertenencia para reflejar el valor jurídico del hebreo.
  - La nota conserva la alternativa de humo, compatible con la auditoría inglesa.
