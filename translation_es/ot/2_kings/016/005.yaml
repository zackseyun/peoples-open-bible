base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/005.yaml
  text: Then Rezin king of Aram and Pekah son of Remaliah[a], king of Israel, came up to Jerusalem for war, and they besieged Ahaz, but they were not able to fight against him.
  footnotes:
