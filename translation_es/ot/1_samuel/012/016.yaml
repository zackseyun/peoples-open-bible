translation:
  language: es
  text: Ahora pues[a], permanezcan de pie y vean esta gran cosa que Yahvé está haciendo delante de sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם עַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  - Aun ahora
  lexicon: HALOT
  rationale: La combinación funciona como marcador discursivo solemne que introduce la orden siguiente. «Ahora pues» conserva la transición exhortativa de manera natural en español y evita una literalidad pesada.
- source_word: הִתְיַצְּבוּ
  english_pob_choice: stand still
  chosen_spanish: manténganse firmes
  alternatives_spanish:
  - párense firmes
  - permanezcan de pie
  - estén firmes
  lexicon: HALOT
  rationale: El hitpael imperativo llama a colocarse en actitud atenta y permanecer para observar. «Manténganse firmes» transmite la postura y la atención requerida sin sonar artificial en español.
- source_word: וּרְאוּ
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - observen
  - vean ustedes
  lexicon: HALOT
  rationale: El imperativo pide observación directa del signo. «Vean» es idiomático y conserva la fuerza de testimonio visual.
- source_word: הַדָּבָר הַגָּדוֹל הַזֶּה
  english_pob_choice: this great thing
  chosen_spanish: esta gran cosa
  alternatives_spanish:
  - este gran hecho
  - este gran asunto
  - esta gran obra
  lexicon: HALOT
  rationale: דָּבָר aquí apunta a un hecho o acontecimiento notable; «cosa» es amplia y fiel, y «gran» conserva el adjetivo sin especificar indebidamente la naturaleza del evento.
- source_word: אֲשֶׁר יְהוָה עֹשֶׂה
  english_pob_choice: that Yahweh is doing
  chosen_spanish: que Yahvé está haciendo
  alternatives_spanish:
  - que Yahvé hace
  - que Yahvé va a hacer
  - que Yahvé realiza
  lexicon: HALOT
  rationale: El participio עֹשֶׂה presenta la acción como en curso o inminente desde la perspectiva del hablante. El presente progresivo en español refleja bien esa vividez.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, sin sustituirlo por un título.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ustedes
  - ante sus ojos
  - en sus ojos
  lexicon: HALOT
  rationale: La expresión idiomática señala lo visible y público del acto. «Delante de sus ojos» suena natural en español y mantiene la imagen de observación directa.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del texto fuente usa el Tetragrámaton. En español se adopta «Yahvé» para preservar el nombre propio del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema del intento anterior: el marcador de nota [a] ahora aparece exactamente en el texto español junto al término correspondiente.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia exhortativa del hebreo con un giro natural en español.
  - Se preservó el contraste entre la orden de mantenerse y el llamado a ver, sin suavizar la urgencia.
  - Se usó «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Delante de sus ojos» conserva la visibilidad pública del acto anunciado.
