translation:
  language: es
  text: Le fundió cuatro anillos de oro y puso los anillos en las cuatro esquinas de sus cuatro patas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las cuatro esquinas correspondientes a sus cuatro patas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצֹק
  english_pob_choice: cast
  chosen_spanish: fundió
  alternatives_spanish:
  - fundió en metal
  - casteó
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, el verbo describe trabajo metalúrgico. En español, «fundió» comunica de manera natural la idea de moldear metal líquido; «fundió en metal» sería más explícito pero más pesado. Se evita «verter», porque debilita el sentido técnico.
- source_word: לוֹ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para ello
  - para eso
  lexicon: HALOT
  rationale: El sufijo pronominal remite al mueble mencionado antes. Como «mesa» es femenino en español, «para él» mantiene la referencia al objeto sin forzar una personificación. «Para ello» sonaría más abstracto y menos acorde al objeto concreto.
- source_word: טַבְּעֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - anillos de metal
  lexicon: HALOT
  rationale: Para los aros metálicos de sujeción, «anillos» es claro y natural en español bíblico actual. «Aros» también sería posible, pero «anillos» conserva mejor la forma redonda pequeña sugerida por el contexto. No se añade «de metal» porque el oro ya especifica el material.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - dorados
  lexicon: HALOT
  rationale: La materia se expresa naturalmente con «de oro». «De oro puro» agrega una precisión no presente aquí, y «dorados» podría sugerir recubrimiento en vez de material.
- source_word: וַיִּתֵּן
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - metió
  lexicon: HALOT
  rationale: «Puso» es la equivalencia más directa y natural para la acción de posicionar los anillos. «Colocó» sería igualmente válido pero algo más formal; «metió» no corresponde.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: «Sobre» reproduce la relación espacial de ubicación en la superficie o extremo del objeto. «En» sería demasiado general; «encima de» es más explicativo de lo necesario.
- source_word: פֵּאֹת
  english_pob_choice: corners
  chosen_spanish: las esquinas
  alternatives_spanish:
  - los extremos
  - las orillas
  lexicon: HALOT
  rationale: En español, «esquinas» es la manera más transparente de expresar las cuatro extremidades del mueble. «Extremos» también podría funcionar, pero es más abstracto; «orillas» no conviene para un objeto de madera.
- source_word: אֲשֶׁר לְאַרְבַּע רַגְלָיו
  english_pob_choice: at its four feet
  chosen_spanish: junto a sus cuatro patas
  alternatives_spanish:
  - a sus cuatro patas
  - en sus cuatro patas
  - correspondientes a sus cuatro patas
  lexicon: HALOT
  rationale: La frase hebrea sitúa las esquinas en relación con las patas del mueble. «Junto a» mantiene la relación espacial sin afirmar más de lo que el hebreo dice. «Patas» resulta más idiomático que «pies» para una mesa en español, aunque el hebreo use el término «pies».
translation_notes:
  revision_awareness: Se siguió el sentido metalúrgico de וַיִּצֹק/"cast" del audit trail inglés, pero en español se optó por «fundió» por naturalidad y precisión contextual. También se preservó la decisión revisada de mantener una colocación más fluida de la frase locativa final sin añadir contenido explicativo ajeno al hebreo.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico contemporáneo, sin recurrir a «SEÑOR» ni a terminología eclesiástica no presente en el versículo.
  - Se usó «anillos» para טַבְּעֹת de forma consistente con el uso técnico de piezas metálicas de sujeción en el tabernáculo.
  - «Patas» se eligió para la referencia de mobiliario en español, aunque el hebreo usa «pies», porque comunica mejor la imagen física sin perder fidelidad.
  - La nota alternativa conserva la tensión lexical entre «esquinas» y la relación específica con las patas, como en el audit trail inglés.
