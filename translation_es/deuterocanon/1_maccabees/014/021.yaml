translation:
  language: es
  text: Los enviados[a] que habían sido enviados a nuestro pueblo nos informaron acerca de su gloria y honor, y nos alegramos por su llegada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la embajada» o «la delegación» enviada a nuestro pueblo; el griego οἱ πρεσβεῖαι puede entenderse como la misión misma o como los enviados en persona. Aquí se prefiere «los enviados» porque la frase continúa hablando de su llegada.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πρεσβεῖαι
  english_pob_choice: the envoys
  chosen_spanish: los enviados
  alternatives_spanish:
  - la embajada
  - la delegación
  - los embajadores
  lexicon: LSJ
  rationale: 'El griego puede referirse tanto a la misión diplomática como a las personas enviadas. Como el participio siguiente y la frase final hablan de su llegada, en español es más natural y fiel entenderlos como personas: «los enviados».'
- source_word: οἱ ἀποσταλέντες
  english_pob_choice: who had been sent
  chosen_spanish: que habían sido mandados
  alternatives_spanish:
  - que habían sido enviados
  - que fueron enviados
  - habiendo sido enviados
  lexicon: LSJ
  rationale: El participio expresa una acción anterior respecto del informe. «Habían sido mandados» conserva el valor pasivo y el matiz de envío previo; en español bíblico resulta claro y sobrio.
- source_word: πρὸς τὸν δῆμον ἡμῶν
  english_pob_choice: to our people
  chosen_spanish: a nuestro pueblo
  alternatives_spanish:
  - a nuestra nación
  - a nuestro pueblo/cuerpo cívico
  - a nuestra asamblea
  lexicon: LSJ
  rationale: δῆμος aquí tiene sentido cívico-político. «Nuestro pueblo» es idiomático en español y mantiene amplitud suficiente sin reducirlo a una sola institución formal.
- source_word: ἀπήγγειλαν ἡμῖν
  english_pob_choice: reported to us
  chosen_spanish: nos informaron
  alternatives_spanish:
  - nos reportaron
  - nos anunciaron
  - nos dieron noticia
  lexicon: LSJ
  rationale: El verbo implica comunicación formal de noticias. «Nos informaron» suena natural en español y conserva el tono diplomático sin volverse demasiado técnico.
- source_word: περὶ τῆς δόξης ὑμῶν καὶ τιμῆς
  english_pob_choice: about your glory and honor
  chosen_spanish: acerca de vuestra gloria y honor
  alternatives_spanish:
  - acerca de vuestro esplendor y honor
  - acerca de vuestra gloria y estima
  - sobre vuestra gloria y honor
  lexicon: LSJ
  rationale: Se mantiene la pareja léxica «gloria y honor» porque refleja directamente δόξα y τιμή. Se conserva «vuestra» para respetar la forma plural del griego y el tono elevado.
- source_word: ηὐφράνθημεν
  english_pob_choice: we rejoiced
  chosen_spanish: nos alegró
  alternatives_spanish:
  - nos regocijamos
  - nos gozamos
  - nos llenó de alegría
  lexicon: LSJ
  rationale: El verbo expresa gozo o alegría. Dado que el sujeto explícito es «los enviados» y el griego literalmente enlaza la reacción con su llegada, en español «nos alegró su llegada» comunica bien el resultado emocional sin forzar una construcción más pesada.
- source_word: ἐπὶ τῇ ἐφόδῳ αὐτῶν
  english_pob_choice: at their arrival
  chosen_spanish: su llegada
  alternatives_spanish:
  - su venida
  - su arribo
  - su visita
  lexicon: LSJ
  rationale: ἐφόδος puede denotar acercamiento, llegada o visita. En este contexto, la referencia natural es a su llegada con el informe; por eso «su llegada» traduce con claridad la idea que el audit trail inglés ya discernió.
translation_notes:
  revision_awareness: 'Se siguió el juicio del texto inglés auditado al tomar οἱ πρεσβεῖαι en sentido personal, debido a la referencia posterior a su llegada. No se adoptó una traducción mecánica desde el inglés: se revisó el griego y se mantuvo la equivalencia funcional en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no contiene el nombre divino.
  - Se conserva el registro diplomático con «informaron», «gloria» y «honor» sin introducir vocabulario eclesiástico ajeno al contexto.
  - Se usa el pronombre plural formal «vuestra» para corresponder al plural griego y al tono de la carta.
