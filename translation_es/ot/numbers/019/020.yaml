  text: וְ/אִ֤ישׁ אֲשֶׁר יִטְמָא֙ וְ/לֹ֣א יִתְחַטָּ֔א וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מִ/תּ֣וֹךְ הַ/קָּהָ֑ל כִּי֩ אֶת מִקְדַּ֨שׁ יְהוָ֜ה טִמֵּ֗א מֵ֥י נִדָּ֛ה לֹא זֹרַ֥ק עָלָ֖י/ו טָמֵ֥א הֽוּא־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/020.yaml
  text: But the man who becomes unclean and does not purify himself—that person shall be cut off from the midst of the assembly[a], because he has defiled the sanctuary of Yahweh. The water for impurity has not been sprinkled on him[b]; he is unclean.
  footnotes:
  - marker: a
    text: Or 'that soul shall be cut off.' The Hebrew legal formula can refer to the person as a whole, not only the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'the water of impurity'; traditionally, 'the water of separation.' The phrase refers to the purification water prepared in this chapter.
    reason: lexical_alternative
