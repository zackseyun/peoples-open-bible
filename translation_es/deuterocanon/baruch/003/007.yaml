base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/003/007.yaml
  text: For because of this you have put your fear in our hearts[a], that we may call on your name; and we will praise you in our exile[d][c][b], because we have turned away from our hearts every unrighteousness of our fathers who sinned before you.
  footnotes:
