  text: But as for you, remain in what you learned and became convinced of, knowing from whom you learned it,
translation:
  language: ko
  text: 그러나 그대는 그대가 배워 확신하게 된 그것에 머무르십시오. 그대는 누구에게서 배웠는지를 알고 있고,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μένε ἐν οἷς ἔμαθες
  english_pob_choice: remain in what you learned
  chosen_korean: 그대가 배운 그것에 머무르십시오
  alternatives_korean:
  - 그대가 배운 그것 안에 거하십시오
  - 그대가 배운 것을 굳게 지키십시오
  lexicon: BDAG
  rationale: μένω는 「머물러 있음」. 「머무르다」가 자연스럽고 본문의 안정성·지속성을 살린다.
- source_word: ἐπιστώθης
  english_pob_choice: became convinced of
  chosen_korean: 확신하게 된
  alternatives_korean:
  - 굳게 믿게 된
  - 신뢰하게 된
  lexicon: BDAG
  rationale: πιστόομαι(수동)는 「확신을 갖게 됨」. 「확신하게 된」이 자연스럽다.
- source_word: παρὰ τίνων ἔμαθες
  english_pob_choice: from whom you learned it
  chosen_korean: 누구에게서 배웠는지
  alternatives_korean:
  - 어떤 사람들에게서 배웠는지
  lexicon: BDAG
  rationale: 본문의 사본 전통에서 단수/복수가 갈리지만 SBLGNT는 복수 τίνων을 채택. 한국어 「누구」는 단복수 미분화이므로 자연스럽게 양쪽을 포괄한다.
