translation:
  language: es
  text: para destruir a las naciones sin ley con la palabra de su boca, para hacer huir[a] a las naciones de delante de él por su amenaza[b], y para convencer de culpa[c] a los pecadores con la palabra de su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que las naciones huyan». El infinitivo griego es intransitivo y presenta a «las naciones» como sujeto de la huida; en español también puede expresarse de forma más directa así.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con su amenaza». La frase griega expresa medio o instrumento; «por su amenaza» conserva ese valor de manera fluida en español.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «exponer a los pecadores con la palabra de su corazón». El griego es comprimido y puede sugerir que su culpa queda al descubierto por su propia palabra o intención interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλοθρεῦσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - arrasar
  lexicon: LSJ
  rationale: «Destruir» expresa con naturalidad la fuerza del infinitivo aoristo sin exagerar más allá del griego.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: En este contexto de juicio regio, «naciones» conserva el sentido amplio de pueblos o entidades colectivas, sin convertirlo en un tecnicismo religioso posterior.
- source_word: παράνομα
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - ilegales
  - malvadas
  lexicon: LSJ
  rationale: «Sin ley» mantiene la relación con νόμος y el matiz moral-jurídico. «Ilegales» sonaría demasiado moderno; «malvadas» perdería el vínculo lexical con la ley.
- source_word: ἐν λόγῳ στόματος αὐτοῦ
  english_pob_choice: with the word of his mouth
  chosen_spanish: con la palabra de su boca
  alternatives_spanish:
  - con el dicho de su boca
  - con su palabra hablada
  lexicon: LSJ
  rationale: La imagen concreta de juicio por la palabra se conserva mejor con «palabra de su boca», una fórmula clara y fiel al griego.
- source_word: ἐν ἀπειλῇ αὐτοῦ
  english_pob_choice: by his threat
  chosen_spanish: por su amenaza
  alternatives_spanish:
  - a causa de su amenaza
  - con su amenaza
  lexicon: LSJ
  rationale: «Por su amenaza» comunica instrumento o medio en español de manera fluida y conserva la severidad del término.
- source_word: φυγεῖν
  english_pob_choice: to make ... flee
  chosen_spanish: huyan
  alternatives_spanish:
  - escapen
  - se alejen
  lexicon: LSJ
  rationale: El griego usa un infinitivo intransitivo con «las naciones» como sujeto; por eso en español conviene una construcción natural de finalidad con «huyan», no una causativa añadida.
- source_word: ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  lexicon: LSJ
  rationale: «De delante de él» conserva el color bíblico/judicial de la expresión sin volverse oscuro.
- source_word: ἐλέγξαι
  english_pob_choice: to convict
  chosen_spanish: reprender
  alternatives_spanish:
  - convencer de culpa
  - convictar
  lexicon: LSJ
  rationale: En este contexto mesiánico el verbo puede llevar fuerza judicial. «Reprender» es más natural en español litúrgico y sigue permitiendo el sentido de exposición o corrección; la ambigüedad se preserva en nota.
- source_word: ἐν λόγῳ καρδίας αὐτῶν
  english_pob_choice: by the word of their heart
  chosen_spanish: con la palabra de su corazón
  alternatives_spanish:
  - con la palabra de sus corazones
  - con lo que su corazón dice
  lexicon: LSJ
  rationale: 'Se mantiene la imagen comprimida y sorprendente del griego: una «palabra» que procede del corazón. El singular «su corazón» refleja mejor el singular καρδίας con antecedente plural.'
theological_decisions:
- issue: Juicio mesiánico mediante la palabra
  english_pob_reading: The verse portrays the ruler’s judgment as effected by his spoken word and threatening command, without explaining the mechanics beyond that.
  chosen_spanish_reading: El texto presenta el juicio del gobernante mediante su palabra y su amenaza, sin desarrollar más el mecanismo de esa acción.
  alternative_spanish_readings:
  - La palabra solo simboliza autoridad soberana, sin efecto directo.
  - La acción es meramente figurada y no literal.
  rationale: La secuencia griega enfatiza repetidamente boca, palabra y amenaza. La traducción conserva esa imagen de juicio por la palabra sin añadir una explicación doctrinal ajena al texto.
  doctrine_reference: Isaías 11:4; juicio mesiánico por la palabra
- issue: Valor de ἐλέγξαι en el cierre de la cláusula
  english_pob_reading: to convict sinners by the word of their heart
  chosen_spanish_reading: reprender a los pecadores con la palabra de su corazón
  alternative_spanish_readings:
  - convencer de culpa a los pecadores con la palabra de su corazón
  - exponer a los pecadores con la palabra de su corazón
  rationale: 'El griego admite varias lecturas: reprender, convencer o exponer. Se eligió «reprender» por claridad y fluidez, pero se conserva en el conjunto de decisiones la tensión entre corrección judicial y exposición interior.'
  doctrine_reference: Salmo 11:4; Isaías 11:4
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por correcciones importantes en la segunda y tercera cláusulas: se abandonó una lectura causativa de φυγεῖν en favor de su valor intransitivo con «las naciones» como sujeto, y se revisó ἐλέγξαι para mantener la fuerza judicial posible del verbo sin reducirlo solo a «exponer». También se conservó el singular distributivo de καρδίας. La redacción española sigue esas decisiones y evita duplicar las primeras cláusulas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija explícitamente; aquí no aparece.
  - Se prefirió «naciones» sobre «gentiles» por coherencia con el contexto judío-regio de juicio.
  - Se mantuvo la imagen concreta de «palabra de su boca» y «palabra de su corazón» para reflejar el paralelismo del griego.
  - Se preservó el singular «su corazón» para reflejar καρδίας con sentido distributivo plural.
  - No se introdujo lenguaje eclesiástico tradicional que suavice la fuerza jurídica del pasaje.
