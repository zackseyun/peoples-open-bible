- from: El que presenta la sangre de los sacrificios de paz y la grasa, de entre los hijos de Aarón, a él le corresponderá la pierna derecha como su porción[a].
  to: El que, de entre los hijos de Aarón, presenta la sangre de los sacrificios de paz[a] y la grasa, a él le corresponderá el muslo derecho como su porción.
  rationale: Se revisa 'pierna derecha' a 'muslo derecho' para ajustarse a la precisión léxica de שׁוֹק y al razonamiento auditado en inglés. También se mejora el orden de la oración para una lectura más natural en español sin alterar la estructura legal-ritual del original. Se conserva la nota alternativa para שְׁלָמִים.
