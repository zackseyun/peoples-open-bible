lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hombres de
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de pertenencia/clan típica de listas censales. «Hijos de» conserva la estructura formal del original y permite el sentido ampliado de grupo familiar o comunitario documentado por la POB inglesa.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: HALOT
  rationale: 'Nombre propio de lugar; en español bíblico se adapta comúnmente con tilde final para reflejar la acentuación natural: Ramá.'
- source_word: וָגָבַע
  english_pob_choice: and Geba
  chosen_spanish: y de Guibea
  alternatives_spanish:
  - y de Geba
  - y de Gueba
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se emplea «Guibea» como transliteración española más natural para el topónimo hebreo, manteniendo su carácter propio y evitando una simple calca del inglés.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וְאֶחָד
  english_pob_choice: six hundred twenty-one
  chosen_spanish: seiscientos veintiuno
  alternatives_spanish:
  - seiscientos veintiuno
  - seiscientos y veintiuno
  lexicon: HALOT
  rationale: Número cardinal censal. Se expresa de forma estándar y fluida en español moderno, sin el «y» que no corresponde en el uso normal entre centenas y decenas.
