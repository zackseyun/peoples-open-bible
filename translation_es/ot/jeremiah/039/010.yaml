translation:
  language: es
  text: Pero Nebuzaradán, el capitán de la guardia, dejó en la tierra de Judá a algunos de los más pobres del pueblo, que no tenían nada, y aquel día les dio viñas y campos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «cisternas» o «lagares» para el término final; el hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: But some of
  chosen_spanish: Pero a algunos de
  alternatives_spanish:
  - Y de
  - Pero de
  lexicon: HALOT
  rationale: La preposición con la conjunción expresa un matiz partitivo con contraste narrativo. En español, «Pero a algunos de» comunica naturalmente que Nebuzaradán dejó a una parte del pueblo, manteniendo la fuerza de contraste sin sonar rígido.
- source_word: הָעָם הַדַּלִּים
  english_pob_choice: the poorest of the people
  chosen_spanish: de los más pobres del pueblo
  alternatives_spanish:
  - de los pobres del pueblo
  - de la gente pobre
  lexicon: HALOT
  rationale: El hebreo señala a los pobres entre el pueblo, no simplemente al pueblo en general. «Los más pobres» preserva el valor partitivo y el matiz socioeconómico del grupo retenido en la tierra.
- source_word: אֲשֶׁר אֵין לָהֶם מְא֔וּמָה
  english_pob_choice: who had nothing
  chosen_spanish: que no tenían nada
  alternatives_spanish:
  - que no poseían nada
  - que no tenían absolutamente nada
  lexicon: HALOT
  rationale: La cláusula relativa enfatiza privación total. «No tenían nada» es natural en español y conserva el sentido absoluto de מְאוּמָה sin añadir más de lo que el hebreo exige.
- source_word: הִשְׁאִיר
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó permanecer
  - dejó atrás
  lexicon: HALOT
  rationale: El verbo en este contexto administrativo-militar se refiere a dejar quedarse a ciertos sobrevivientes. «Dejó» mantiene brevedad y fidelidad al hecho narrado.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los ejecutores
  - el jefe de los guardias
  lexicon: HALOT
  rationale: El título oficial se entiende mejor en español como función militar/guardia. «Capitán de la guardia» sigue el sentido contextual adoptado por la POB en inglés y evita sobrecargar el término con una etimología más literal que aquí no gobierna la traducción.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en el país de Judá
  - en Judá
  lexicon: HALOT
  rationale: «Tierra de Judá» conserva el valor territorial del hebreo ארץ y suena natural en español bíblico contemporáneo.
- source_word: וַיִּתֵּן לָהֶם
  english_pob_choice: he gave them
  chosen_spanish: les dio
  alternatives_spanish:
  - y les dio
  - les entregó
  lexicon: HALOT
  rationale: La secuencia narrativa wawyqtol se vierte con el pretérito simple. El dativo español «les dio» expresa con claridad el destinatario sin redundancia innecesaria.
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - viñas de uva
  lexicon: HALOT
  rationale: El término designa plantaciones de vid. «Viñas» es breve y bíblicamente reconocible en español, mientras que «viñedos» también sería posible; se eligió la forma más directa y usual en este registro.
- source_word: וִיגֵבִים
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - cisternas
  - lagares
  lexicon: HALOT
  rationale: El término es incierto en hebreo y la tradición ofrece varias posibilidades. La POB inglesa opta por «fields» como sentido agrícola probable; «campos» conserva esa lectura amplia de propiedad rural sin cerrar indebidamente la ambigüedad lexical.
theological_decisions:
- issue: Tratamiento del nombre divino en el topónimo histórico "Judá" y del contexto de devastación/restauración parcial
  english_pob_reading: The verse describes Nebuzaradan leaving a remnant of the poorest people in the land of Judah and giving them agricultural property.
  chosen_spanish_reading: El versículo describe que Nebuzaradán dejó a parte de la población pobre en la tierra de Judá y les dio viñas y campos.
  alternative_spanish_readings:
  - '...en la tierra de Yahudá...'
  - '...y les otorgó propiedades agrícolas...'
  rationale: No hay aquí una mención directa del Tetragrámaton en la superficie española del versículo, aunque el topónimo procede de יהודה. Se mantiene «Judá» como nombre territorial estándar, y se conserva el acto concreto de provisión agrícola sin convertirlo en una generalización interpretativa de restauración.
  doctrine_reference: None
- issue: Alcance social de "los pobres" frente a una posible lectura genérica de "el pueblo"
  english_pob_reading: the poorest of the people
  chosen_spanish_reading: los más pobres del pueblo
  alternative_spanish_readings:
  - los pobres del pueblo
  - la gente pobre
  rationale: 'La construcción partitiva muestra una selección dentro del pueblo. Traducir «los más pobres» preserva la tensión social del texto: no todo el pueblo fue dejado, sino una fracción vulnerable. Esta precisión es importante para no diluir el juicio histórico narrado.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reordenó el sujeto para mayor naturalidad sin cambiar el contenido. Esta versión española sigue la misma estructura natural: sujeto explícito («Nebuzaradán, el capitán de la guardia»), complemento partitivo («a algunos de los más pobres del pueblo»), cláusula relativa de privación, locativo territorial y la coordinación final con el don agrícola. Se conserva la ambigüedad léxica del último sustantivo mediante nota, como en el control inglés.'
  spanish_consistency_notes:
  - Se usa «Nebuzaradán» con acento gráfico por la acentuación normal en español de nombres propios adaptados.
  - Se mantiene «Judá» y no «Yahudá» porque el texto no está usando aquí una transliteración técnica sino el topónimo bíblico español estándar.
  - «Campos» se deja en plural para corresponder al plural hebreo y a la elección inglesa de 'fields'.
  - La nota al pie marca solo el término final incierto, sin duplicar marcadores.
