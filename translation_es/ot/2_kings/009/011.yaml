  to: 'Entonces Jehú salió hacia los siervos[a] de su señor, y uno le dijo: «¿Está todo bien? ¿Por qué vino este loco[b] a ti?». Y él les respondió: «Ustedes conocen al hombre y su manera de hablar[c]».'
