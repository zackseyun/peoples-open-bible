review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: posibilidad hipotética, metáfora pictórica, reacción de estremecimiento, madre de siete hijos, torturas variadas, y causa motivada por εὐσέβεια. Sin embargo, hay un problema de formulación en «como para un pintor», que suena poco idiomático en español y no representa bien la elipsis griega; conviene reformularlo como comparación de capacidad artística. También es preferible evitar anclar la segunda nota repetida con el mismo marcador dos veces para la misma nota léxica en un mismo versículo; aunque el contenido léxico es correcto, la anclación puede simplificarse a una sola nota en la primera ocurrencia, ya que no añade una ambigüedad nueva en la segunda.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «como para un pintor» resulta forzado. «Como lo haría un pintor» o «como un pintor» fluye mejor y mantiene la metáfora. «Los que la vieran» funciona, aunque «los que la vieran» depende del referente implícito del relato retratado; es aceptable. «Piedad» es legible en registro eclesial, pero en español puede sonar algo menos explícitamente teocéntrico que «devoción reverente a Dios»; aun así, está respaldado por la nota y por la alternativa del POB inglés.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. La decisión de εὐσέβεια como «piedad» es admisible porque el rastro inglés documenta «piety» como alternativa. Se preserva la repetición del término clave. No hay otros términos del glosario principal implicados.
  issues:
  - severity: medium
    issue: «como para un pintor» es poco natural y no representa bien ὥσπερ τινός, ζωγραφῆσαι
    rationale: La frase española suena calcada y torpe. El griego introduce una comparación con un pintor/artista capaz de representar visualmente; en español conviene una forma más idiomática que conserve la metáfora sin rigidez.
  - severity: low
    issue: El mismo marcador [a] aparece en ambas ocurrencias de «piedad»
    rationale: La instrucción prohíbe reutilizar un marcador para dos notas diferentes, pero aquí es la misma nota. Aun así, en este versículo basta una sola ancla en la primera ocurrencia, porque la nota ya explica que aplica a ambas; esto mejora limpieza editorial.
