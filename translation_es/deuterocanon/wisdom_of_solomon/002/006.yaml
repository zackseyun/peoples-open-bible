translation:
  language: es
  text: Vengan entonces[a], disfrutemos de los bienes existentes, y hagamos uso de la creación[c][b] con ardor, como en la juventud;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los bienes presentes» o «los bienes al alcance». El griego dice literalmente «los bienes existentes».
    reason: lexical_alternative
  - marker: b
    text: O «el mundo creado».
    reason: lexical_alternative
  - marker: c
    text: La expresión «como en la juventud» probablemente significa con el vigor o el desenfreno asociados con la juventud.
    reason: cultural_note
lexical_decisions:
- source_word: δεῦτε
  english_pob_choice: Come then
  chosen_spanish: Vengan entonces
  alternatives_spanish:
  - Vengan
  - Vengan ahora
  lexicon: LSJ
  rationale: Es un llamado exhortativo al grupo. «Vengan entonces» conserva el impulso de convocatoria y refleja naturalmente el valor inferencial de οὖν.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: LSJ
  rationale: Marca continuación lógica de la exhortación. «Entonces» funciona bien en español y evita una formulación demasiado formal como «por tanto».
- source_word: ἀπολαύσωμεν
  english_pob_choice: let us enjoy
  chosen_spanish: disfrutemos
  alternatives_spanish:
  - gocemos de
  - aprovechemos
  lexicon: LSJ
  rationale: El verbo expresa goce o disfrute. «Disfrutemos» comunica con claridad el matiz de deleite que el contexto hedonista requiere sin añadir explicación excesiva.
- source_word: τῶν ὄντων ἀγαθῶν
  english_pob_choice: the good things that exist
  chosen_spanish: los bienes existentes
  alternatives_spanish:
  - los bienes presentes
  - los bienes que existen
  lexicon: LSJ
  rationale: La formulación literal «los bienes existentes» preserva el sentido de «las cosas buenas que existen» y mantiene la ambigüedad entre bienes actuales y bienes disponibles, como en el inglés auditado.
- source_word: χρησώμεθα
  english_pob_choice: let us make use of
  chosen_spanish: usemos de
  alternatives_spanish:
  - hagamos uso de
  - utilicemos
  lexicon: LSJ
  rationale: El medio de χράομαι implica hacer uso de algo. «Usemos de» suena natural en español bíblico-literario y evita confundir este verbo con ἀπολαύσωμεν, que ya expresa el disfrute.
- source_word: τῇ κτίσει
  english_pob_choice: creation
  chosen_spanish: la creación
  alternatives_spanish:
  - el mundo creado
  - lo creado
  lexicon: LSJ
  rationale: «La creación» conserva la amplitud del griego κτίσις y evita estrechar el término a objetos materiales aislados.
- source_word: ὡς νεότητι
  english_pob_choice: as in youth
  chosen_spanish: como en la juventud
  alternatives_spanish:
  - como en nuestra juventud
  - como si fuéramos jóvenes
  lexicon: LSJ
  rationale: La construcción griega es comprimida y sugiere la energía o desenfreno asociado con la juventud. «Como en la juventud» conserva esa comparación sin añadir un posesivo no explícito.
- source_word: σπουδαίως
  english_pob_choice: eagerly
  chosen_spanish: con empeño
  alternatives_spanish:
  - con ardor
  - con ahínco
  lexicon: LSJ
  rationale: El adverbio puede expresar diligencia, intensidad o celo. «Con empeño» mantiene la fuerza y resulta natural en español, sin imponer una valoración moral positiva.
theological_decisions:
- issue: Sentido de τῶν ὄντων ἀγαθῶν
  english_pob_reading: the good things that exist
  chosen_spanish_reading: los bienes existentes
  alternative_spanish_readings:
  - los bienes presentes
  - los bienes que existen
  rationale: El griego puede leerse de manera casi ontológica («lo existente») o de forma contextual como los bienes disponibles en el presente. Se conserva una expresión cercana al original para no borrar esa tensión interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de τῇ κτίσει
  english_pob_reading: creation
  chosen_spanish_reading: la creación
  alternative_spanish_readings:
  - el mundo creado
  - lo creado
  rationale: No se restringe κτίσις a un objeto singular ni se lo traduce con terminología más técnica de lo que el contexto exige. «La creación» mantiene la amplitud del término y su referencia al orden creado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de ὡς νεότητι
  english_pob_reading: as in youth
  chosen_spanish_reading: como en la juventud
  alternative_spanish_readings:
  - como si fuéramos jóvenes
  - como en nuestra juventud
  rationale: La frase probablemente apunta al vigor, atrevimiento o desenfreno asociado con la juventud. La traducción conserva la comparación abierta sin explicitar más de lo que el texto garantiza.
  doctrine_reference: Translation philosophy §1, §5
