translation:
  language: es
  text: Tus aceites[a] tienen una fragancia agradable; tu nombre es aceite derramado; por eso las vírgenes[b] te aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque la fragancia de tus aceites es buena»; el hebreo presenta una sintaxis muy comprimida y poética.
    reason: alternative_reading
  - marker: b
    text: «Vírgenes» traduce el hebreo עֲלָמוֹת, que también puede traducirse «jóvenes» o «doncellas»; el término no exige de manera absoluta ese matiz en todos los contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְרֵיחַ
  english_pob_choice: The fragrance of
  chosen_spanish: de olor agradable
  alternatives_spanish:
  - la fragancia de
  - el aroma de
  - de fragancia agradable
  lexicon: HALOT
  rationale: El hebreo presenta una construcción poética comprimida. En español, «de olor agradable» comunica con naturalidad la idea de un aroma bueno sin sobrecargar la frase; conserva el valor elogioso de רֵיחַ y la ambigüedad sintáctica del original.
- source_word: שְׁמָנֶיךָ
  english_pob_choice: your oils
  chosen_spanish: tus ungüentos
  alternatives_spanish:
  - tus aceites
  - tus perfumes
  - tus aceites perfumados
  lexicon: HALOT
  rationale: שֶׁמֶן significa literalmente «aceite», pero en este contexto plural apunta a aceites perfumados o ungüentos aromáticos. «Ungüentos» evita una lectura demasiado culinaria de «aceites» y preserva mejor el matiz cosmético/aromático sugerido por el contexto poético.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - ungüento
  - perfume
  lexicon: HALOT
  rationale: Mantengo «aceite» en la metáfora central para conservar la conexión léxica con שְׁמָנֶיךָ y la imagen concreta del texto hebreo. «Ungüento» podría aclarar el sentido, pero borraría parte de la repetición figurada.
- source_word: תּוּרַק
  english_pob_choice: poured out
  chosen_spanish: derramado
  alternatives_spanish:
  - vertido
  - echado
  - vaciarse
  lexicon: HALOT
  rationale: La forma hophal expresa algo que ha sido vertido/derramado. «Derramado» es natural en español y conserva la imagen de algo que se extiende y libera su aroma.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «tu nombre». No lo parapraseo como «fama» o «renombre», aunque esas opciones expliquen el sentido, porque el texto poético vincula directamente nombre e imagen aromática.
- source_word: עַל־כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - de modo que
  lexicon: HALOT
  rationale: «Por eso» expresa la relación de consecuencia de manera clara y fluida en español, manteniendo el nexo inferencial del hebreo.
- source_word: עֲלָמוֹת
  english_pob_choice: young women / virgins
  chosen_spanish: las jóvenes
  alternatives_spanish:
  - las doncellas
  - las muchachas
  - las vírgenes
  lexicon: HALOT
  rationale: עֲלָמוֹת designa mujeres jóvenes en edad de casarse; no exige por sí mismo «vírgenes» en sentido técnico. «Las jóvenes» es más amplio y evita sobreespecificar la palabra hebrea, aunque el campo semántico pueda incluir ese matiz en algunos contextos poéticos.
- source_word: אֲהֵבוּךָ
  english_pob_choice: love you
  chosen_spanish: te aman
  alternatives_spanish:
  - te aman profundamente
  - te quieren
  - te aman con amor
  lexicon: HALOT
  rationale: El verbo אָהַב se traduce directamente como «amar». En español, el presente general «te aman» comunica bien la afirmación poética sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: ¿Debe explicitarse una lectura sexualizada o marital de la poesía?
  english_pob_reading: The line is kept as poetic praise of attractiveness; the English footnote notes lexical range for עֲלָמוֹת but does not force a sexual interpretation.
  chosen_spanish_reading: Se mantiene como elogio poético de atractivo y deseo, sin cargar el verso con una interpretación más específica de la que el hebreo exige.
  alternative_spanish_readings:
  - lectura explícitamente matrimonial
  - lectura explícitamente sexual
  - lectura de vírgenes en sentido técnico
  rationale: El texto es poesía amorosa y usa imágenes perfumadas y de atracción. La traducción debe conservar esa ambigüedad controlada sin imponer una lectura más fuerte que la del original ni borrar el campo semántico de עֲלָמוֹת.
  doctrine_reference: Principio de suficiencia textual y prudencia hermenéutica en poesía sapiencial/amorosa
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reforzó una primera cláusula más directa («Your oils have a pleasing fragrance») y mantuvo una lectura fuerte de עֲלָמוֹת como «virgins» en una etapa, aunque el audit trail final reconoce la alternativa lexical de «young women». En español se optó por una solución intermedia y prudente: «las jóvenes», que conserva el rango semántico amplio de עֲלָמוֹת sin imponer una especificación que el hebreo no exige de modo inequívoco.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el texto lo requiera; aquí no aplica.
  - Se mantiene el tono poético y compacto, sin convertir el verso en prosa explicativa.
  - «Ungüentos» y «aceite» se distinguen para preservar la metáfora y el paralelismo.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al verso.
