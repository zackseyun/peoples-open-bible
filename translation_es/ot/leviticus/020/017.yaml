review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en los puntos principales: conserva ''un hombre'', ''toma'', la aclaración sobre hermana por parte de padre o madre, el modismo legal de ''ver la desnudez'', el sentido negativo raro de חֶסֶד, la fórmula jurídica ambigua de ''serán cortados'', y ''llevará su culpa''. Sin embargo, hay dos ajustes de fidelidad/estilo importantes: (1) el anclaje [b] está colocado sobre ''cortados'', pero la nota explica toda la fórmula ''serán cortados''; eso está bien, aunque conviene mantenerla exacta en el texto revisado; (2) ''delante de los ojos de los hijos de su pueblo'' es demasiado calcado y menos natural que una formulación que aún preserve לְעֵינֵי בְּנֵי עַמָּם.'
  spanish_quality_summary: El español es mayormente claro, pero suena algo rígido en varios puntos. 'La desnudez de él' es gramatical pero poco natural; 'su propia desnudez' expresa mejor el referente en español sin perder el paralelismo. 'Delante de los ojos de los hijos de su pueblo' es comprensible, pero muy pesado; 'a la vista de los hijos de su pueblo' conserva el sentido y mejora la lectura. 'Infamia' es defendible, aunque 'una vergüenza' suena más natural y encaja bien con la nota sobre el uso raro de חֶסֶד. También conviene quitar la nota [a], ya que el inglés POB no la tiene y la alternativa 'toma para sí' no añade valor suficiente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La decisión de mantener 'serán cortados' respeta la política de preservar la fórmula legal. 'Llevará su culpa' alinea bien con la fórmula legal-teológica.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''la desnudez de él'''
    rationale: Aunque inteligible, en español bíblico contemporáneo suena forzada. 'Su propia desnudez' o 'la desnudez de él' no cambian el sentido, pero la primera es más natural y clara.
  - severity: medium
    issue: 'Calco pesado: ''delante de los ojos de los hijos de su pueblo'''
    rationale: Preserva demasiado literalmente el hebreo a costa de la legibilidad. 'A la vista de los hijos de su pueblo' mantiene la imagen jurídica y social con mejor español.
  - severity: low
    issue: Nota [a] innecesaria sobre 'toma'
    rationale: El rastro inglés no preserva una nota aquí. La decisión léxica principal ya explica 'toma', y la nota no resuelve una ambigüedad nueva del español ni aporta una alternativa esencial.
  - severity: low
    issue: '''Infamia'' es posible, pero menos natural que ''vergüenza'' o ''cosa vergonzosa'''
    rationale: No es error semántico, pero 'vergüenza' suena más idiomático en este contexto legal-moral y refleja bien el valor negativo raro de חֶסֶד.
  revised_spanish_text: Si un hombre toma a su hermana, hija de su padre o hija de su madre, y ve su desnudez, y ella ve su propia desnudez, es una vergüenza[a], y serán cortados[b] a la vista de los hijos de su pueblo. Él ha descubierto la desnudez de su hermana; llevará su culpa.
  revised_footnotes:
  - marker: a
    text: O 'una cosa vergonzosa' o 'un oprobio', porque el hebreo חֶסֶד aparece aquí en un sentido raro y negativo, no en su sentido usual de 'bondad' o 'amor leal'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'serán cortados' conserva la fórmula legal hebrea sin precisar si la pena es muerte, expulsión o alguna otra forma de remoción.
    reason: alternative_reading
  revision_rationale: 'Se revisa para mejorar la naturalidad del español sin apartarse del hebreo ni del audit trail inglés: se elimina una nota no necesaria; se cambia ''la desnudez de él'' por ''su propia desnudez'' para mayor claridad; se sustituye el calco rígido ''delante de los ojos de'' por ''a la vista de''; y se ajusta ''infamia'' a ''vergüenza'' con nota léxica, más idiomático y fiel al uso negativo raro de חֶסֶד.'
