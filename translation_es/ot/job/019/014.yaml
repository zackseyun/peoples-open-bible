review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien los cuatro elementos del hebreo: קְרֹבַי como ''mis parientes'', וּמְיֻדָּעַי como ''mis conocidos'', y שְׁכֵחוּנִי como ''me han olvidado''. El punto débil es חָדְלוּ: el hebreo dice literalmente ''han cesado'' con matiz contextual de retirada relacional; el inglés POB lo resolvió idiomáticamente como ''have failed me''. En español, ''han dejado de serlo'' introduce una idea más fuerte y específica: que ya no son parientes, lo cual no está en la fuente. Conviene una formulación que exprese abandono o retirada sin negar el parentesco.'
  spanish_quality_summary: El español es claro y natural, pero 'han dejado de serlo' suena interpretativo y algo pesado. Una opción como 'me han fallado' o 'ya no están para mí' sería más idiomática; de ellas, 'me han fallado' se alinea mejor con el audit trail inglés y mantiene la fuerza relacional. El resto del versículo es fluido y adecuado para un registro bíblico moderno y digno.
  glossary_alignment: No hay términos de glosario teológicamente sensibles en este versículo. 'Parientes' para קְרֹבַי y 'conocidos' para וּמְיֻדָּעַי concuerdan con la justificación documentada. La revisión propuesta mantiene la alternativa literal en nota para reflejar חדל como 'cesar'.
  issues:
  - severity: medium
    issue: '''han dejado de serlo'' sobretraduce חָדְלוּ'
    rationale: La frase española implica que los parientes dejaron de ser parientes, mientras que el hebreo expresa cese/retirada de su presencia o apoyo. El inglés POB ya documentó esta tensión y optó por 'have failed me' como equivalente idiomático contextual.
  - severity: low
    issue: La nota alternativa depende de una formulación principal menos fiel
    rationale: La nota literal es válida, pero la relación entre texto principal y nota mejora si el texto principal usa una solución idiomática más cercana al audit trail, como 'me han fallado'.
  revised_spanish_text: Mis parientes me han fallado[a], y mis conocidos me han olvidado.
