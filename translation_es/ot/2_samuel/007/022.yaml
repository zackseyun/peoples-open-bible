  spanish_quality_summary: 'El español es claro y digno. «Por tanto», «tú eres grande» y «conforme a todo lo que hemos oído con nuestros oídos» son naturales y fieles. La principal mejora es estilística-semántica: sustituir «no hay Dios fuera de ti» por «no hay Dios aparte de ti», que suena más idiomático y preciso para una confesión de exclusividad.'
