translation:
  language: es
  text: Y vio Trifón que había venido con una gran tropa, y tuvo miedo de extender las manos contra él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ponerle las manos encima». El giro griego «extender las manos contra él» puede denotar una acción hostil de manera más general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέστη
  english_pob_choice: had come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - se había presentado
  - había aparecido
  lexicon: LSJ
  rationale: El aoristo de παρέστη se entiende aquí como la llegada/presencia de Jonatán con tropas en el escenario narrativo. «Había llegado» conserva ese valor de presencia arribada y suena natural en español, sin volverlo estático.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with a large force
  chosen_spanish: con una gran fuerza
  alternatives_spanish:
  - con muchas tropas
  - con un gran ejército
  - con gran poder
  lexicon: LSJ
  rationale: En contexto militar, δύναμις puede referirse a tropa o fuerza armada. «Gran fuerza» mantiene la amplitud del griego y evita precisar indebidamente «ejército»; «tropas» sería posible, pero estrecha más el sentido.
- source_word: ἐκτείνειν χεῖρας ἐπʼ αὐτόν
  english_pob_choice: to stretch out his hands against him
  chosen_spanish: extender las manos contra él
  alternatives_spanish:
  - ponerle las manos encima
  - atacarlo
  - levantar la mano contra él
  lexicon: LSJ
  rationale: La frase conserva el giro idiomático griego de «extender las manos» y deja abierta la hostilidad concreta, como en el audit trail inglés. «Contra él» mantiene el matiz adversativo del original.
- source_word: ηὐλαβήθη
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  - se mostró cauteloso
  - retrocedió por miedo
  lexicon: BDAG
  rationale: El verbo expresa temor o cautela ante la acción propuesta. «Tuvo miedo» es claro, natural y fiel al motivo inmediato de la cláusula.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de 1 Macabeos 12:42 y toma como guía la solución inglesa auditada, especialmente la lectura revisada de παρέστη como «had come». Se conservó la imagen idiomática de «extender las manos contra él» y se añadió nota alternativa donde el español también puede sugerir la expresión más natural de agresión física.
  spanish_consistency_notes:
  - Se usa un español neutro y publicable, evitando calcos innecesarios pero conservando la imagen idiomática del original.
  - «Y vio Trifón» mantiene el orden narrativo y el sujeto propio del griego.
  - No se introdujo terminología eclesiástica; el lenguaje es estrictamente narrativo y militar.
