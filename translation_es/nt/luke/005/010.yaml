  text: ὁμοίως δὲ καὶ Ἰάκωβον καὶ Ἰωάννην υἱοὺς Ζεβεδαίου, οἳ ἦσαν κοινωνοὶ τῷ Σίμωνι. καὶ εἶπεν πρὸς τὸν Σίμωνα ⸀ὁ Ἰησοῦς· Μὴ φοβοῦ· ἀπὸ τοῦ νῦν ἀνθρώπους ἔσῃ ζωγρῶν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/005/010.yaml
  text: and likewise also James and John[a], Zebedee’s sons, who were partners with Simon. And Jesus said to Simon, “Do not be afraid[b]; from now on you will be catching people.”
  footnotes:
  - marker: a
    text: Or “catching men alive.” The Greek uses a term meaning to capture or take alive, preserving a life-giving nuance distinct from the more familiar “fishers of men” in Matthew 4:19 and Mark 1:17.
    reason: lexical_alternative
  - marker: b
    text: Compare Matthew 4:19 and Mark 1:17, where Jesus says, “I will make you fishers of men.” Luke’s wording here is distinct and should not be flattened into the parallel phrasing.
    reason: cross_reference
