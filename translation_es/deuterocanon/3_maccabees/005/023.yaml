translation:
  language: es
  text: Pero justo entonces, cuando el gallo había cantado al amanecer, Hermón, habiendo armado a las bestias, las iba arreando en el gran patio columnado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el gran peristilo» o «en la gran columnata». El griego περιστύλιον nombra un espacio arquitectónico columnado, como un patio peristilado o una estructura de columnas circundantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρτι δὲ
  english_pob_choice: But just then
  chosen_spanish: Pero justo entonces
  alternatives_spanish:
  - Y ahora
  - Pero ahora
  - En ese momento
  lexicon: LSJ
  rationale: ἄρτι expresa inmediatez temporal; δέ aporta transición leve. «Pero justo entonces» conserva el giro narrativo y la urgencia sin sobrerreformular.
- source_word: ἀλεκτρυὼν ἐκέκραγεν
  english_pob_choice: the rooster had crowed
  chosen_spanish: el gallo había cantado
  alternatives_spanish:
  - el gallo había cantado
  - el gallo cantó
  - el gallo había cacareado
  lexicon: LSJ
  rationale: ἀλεκτρυών es «gallo/rooster». En español bíblico y general, «el gallo había cantado» es natural y mantiene la señal temporal del relato.
- source_word: ὄρθρος
  english_pob_choice: at dawn
  chosen_spanish: al amanecer
  alternatives_spanish:
  - al alba
  - al despuntar el día
  - en la aurora
  lexicon: LSJ
  rationale: ὄρθρος indica el inicio del alba o amanecer. «Al amanecer» conserva la referencia temporal sin hacer de «amanecer» el sujeto de la frase.
- source_word: τὰ θηρία
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  - las bestias salvajes
  lexicon: LSJ
  rationale: En este contexto de espectáculo violento, θηρία apunta a animales feroces; «bestias» mantiene el tono amenazante sin añadir un adjetivo que el griego no exige.
- source_word: καθωπλικὼς
  english_pob_choice: having armed
  chosen_spanish: habiendo armado
  alternatives_spanish:
  - habiendo equipado
  - después de haber armado
  - habiéndolas preparado
  lexicon: LSJ
  rationale: El participio de καθοπλίζω puede significar armar o equipar completamente. «Habiendo armado» sigue de cerca la fuerza verbal que la POB inglesa retuvo.
- source_word: διεκίνει
  english_pob_choice: was driving them on
  chosen_spanish: las iba conduciendo
  alternatives_spanish:
  - las iba impulsando
  - las iba moviendo
  - las iba arreando
  lexicon: LSJ
  rationale: διακινέω puede significar mover, agitar o poner en marcha. En español, «las iba conduciendo» comunica la acción continua y la orientación activa del verbo en este escenario.
- source_word: ἐν τῷ μεγάλῳ περιστυλίῳ
  english_pob_choice: in the great colonnade
  chosen_spanish: en el gran pórtico columnado
  alternatives_spanish:
  - en el gran peristilo
  - en el gran patio columnado
  - en la gran galería columnada
  lexicon: LSJ
  rationale: περιστύλιον designa un espacio arquitectónico columnado. «Pórtico columnado» resulta comprensible y fiel; evita el tecnicismo «peristilo» en el texto principal, aunque lo conserva como alternativa posible.
- source_word: ὁ Ἕρμων
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: transliteration
  rationale: Nombre propio transliterado. En español, la acentuación «Hermón» ayuda a la pronunciación y no altera la identificación del personaje.
theological_decisions:
- issue: Naturaleza de τα θηρία en un contexto de violencia judicial/espectáculo
  english_pob_reading: the beasts
  chosen_spanish_reading: las bestias
  alternative_spanish_readings:
  - las fieras
  - las bestias salvajes
  rationale: No hay necesidad de suavizar el término ni convertirlo en un genérico. «Bestias» conserva la fuerza del contexto y la ambigüedad suficiente del griego.
  doctrine_reference: No aplica; decisión léxica-contextual.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue ajustada en la revisión más reciente para reflejar mejor la sintaxis griega: ἄρτι δέ como «But just then» y ἀλεκτρυὼν ἐκέκραγεν ὄρθρος como una escena temporal («when the rooster had crowed at dawn»), no como si «dawn» fuera el sujeto. La propuesta española sigue esa misma solución, manteniendo el orden narrativo y la relación temporal sin introducir una interpretación distinta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Bestias» traduce el valor amenazante de θηρία sin añadir información inexistente.
  - «Pórtico columnado» busca equilibrio entre claridad y precisión arquitectónica; el tecnicismo alternativo queda en nota.
