translation:
  language: es
  text: 'Entonces el oficial en cuya mano se apoyaba el rey respondió al hombre de Dios y dijo[a]: «Mira, si Yahvé hiciera ventanas en el cielo, ¿podría ocurrir esto?». Y él dijo: «Mira, lo verás con tus propios ojos, pero no comerás nada de ello».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si Yahvé abriera compuertas en el cielo». El hebreo dice literalmente «hiciera ventanas en el cielo», una metáfora de provisión extraordinaria desde arriba.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁלִישׁ
  english_pob_choice: the officer
  chosen_spanish: el oficial
  alternatives_spanish:
  - el capitán
  - el ayudante del rey
  - el oficial real
  lexicon: HALOT
  rationale: שָׁלִישׁ designa un funcionario de alto rango, militar o cortesano. «Oficial» comunica bien ese rango en español moderno sin fijar más precisión de la que el contexto aporta.
- source_word: נִשְׁעָן עַל יָדוֹ
  english_pob_choice: on whose hand the king leaned
  chosen_spanish: sobre cuya mano se apoyaba el rey
  alternatives_spanish:
  - sobre cuyo brazo se apoyaba el rey
  - el ayudante del rey
  lexicon: HALOT
  rationale: Conservo la imagen corporal de יָד con «mano», como en el hebreo y en la revisión inglesa final. «Se apoyaba» refleja el valor del participio con sentido habitual de sostén o apoyo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: La expresión hebrea es un título establecido para el profeta; «hombre de Dios» mantiene la forma tradicional y transparente sin sustituirla por una identificación interpretativa.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: «Mira» conserva la función discursiva de llamada de atención y el tono confrontativo del hablante, con naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Sigo el criterio editorial del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no como sustitución por título. Es la forma española más asentada y legible en este marco.'
- source_word: עֹשֶׂה אֲרֻבּוֹת בַּשָּׁמַיִם
  english_pob_choice: were making windows in the heavens
  chosen_spanish: hiciera ventanas en el cielo
  alternatives_spanish:
  - abriera compuertas en el cielo
  - hiciera ventanas en los cielos
  lexicon: HALOT
  rationale: «Ventanas en el cielo» preserva la metáfora literal del hebreo. En español, «cielo» funciona mejor que «cielos» en una expresión idiomática singular, aunque mantenga el sentido de lo alto y celestial.
- source_word: הֲיִהְיֶה הַדָּבָר הַזֶּה
  english_pob_choice: could this thing happen?
  chosen_spanish: ¿podría ocurrir esto?
  alternatives_spanish:
  - ¿podría ser esto?
  - ¿sería posible esto?
  lexicon: HALOT
  rationale: La pregunta expresa incredulidad sobre la posibilidad de un acontecimiento concreto. «Ocurrir» comunica mejor el matiz de suceso que una paráfrasis más abstracta.
- source_word: הִנְּכָה
  english_pob_choice: Look, you will see
  chosen_spanish: Mira, lo verás
  alternatives_spanish:
  - Mira, verás
  - Mira, tú verás
  lexicon: HALOT
  rationale: La forma enfática con pronombre de segunda persona introduce la respuesta directa. «Lo verás» mantiene el valor prospectivo sin añadir un matiz de inmediatez no explicitado.
- source_word: רֹאֶה בְּעֵינֶיךָ
  english_pob_choice: see it with your own eyes
  chosen_spanish: lo verás con tus propios ojos
  alternatives_spanish:
  - lo verás con tus ojos
  - verás con tus propios ojos
  lexicon: HALOT
  rationale: La expresión española idiomática «con tus propios ojos» refleja el énfasis hebreo de ver personalmente. El objeto explícito «lo» ayuda a ligar el pronombre a la provisión mencionada.
- source_word: וּמִשָּׁם לֹא תֹאכֵל
  english_pob_choice: but you will not eat any of it
  chosen_spanish: pero de allí no comerás
  alternatives_spanish:
  - pero no comerás de ello
  - pero no comerás nada de eso
  lexicon: HALOT
  rationale: El hebreo indica exclusión de participar en lo que se verá. «De allí» reproduce la referencia al lugar/provisión señalada por el contexto, evitando añadir «nada» o «de eso» más de lo necesario.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio del pacto, no un título genérico. Mantener «Yahvé» conserva esa identificación directa, de acuerdo con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de las «ventanas en el cielo»
  english_pob_reading: windows in the heavens
  chosen_spanish_reading: ventanas en el cielo
  alternative_spanish_readings:
  - compuertas en el cielo
  - ventanas en los cielos
  rationale: La frase hebrea es una metáfora de provisión extraordinaria desde arriba. Conservar «ventanas» evita neutralizar la imagen; las alternativas interpretativas pueden ir en nota, pero no deben reemplazar el texto principal sin necesidad.
  doctrine_reference: HALOT; English POB lexical note on אֲרֻבּוֹת
- issue: Valor del cierre «no comerás»
  english_pob_reading: you will not eat any of it
  chosen_spanish_reading: de allí no comerás
  alternative_spanish_readings:
  - no comerás nada de eso
  - no comerás de ello
  rationale: El hebreo no añade explícitamente «any of it»; esa es una clarificación contextual válida en inglés. En español, «de allí no comerás» conserva la restricción sin sobreespecificar el referente.
  doctrine_reference: Contextual inference from 2 Kings 7:1-2
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente de la fuente inglesa, que volvió de «arm» a «hand», redujo la explicitación de inmediatez en la respuesta de Eliseo y aclaró el sentido partitivo del final. La versión española mantiene esa mayor cercanía al hebreo: «mano» en lugar de «brazo», «lo verás» sin añadir inmediatez, y una clausula final breve que no sobretraduce el partitivo.'
  spanish_consistency_notes:
  - He usado «Yahvé» de manera consistente con la terminología del proyecto para יהוה.
  - He preservado «el hombre de Dios» como título profético estable, en vez de sustituirlo por «profeta».
  - He mantenido el estilo de comillas angulares y la puntuación española estándar.
  - El pie de nota solo acompaña la posible alternativa lexical de «mano»; no se han añadido otras notas para evitar sobrecargar un versículo muy breve.
