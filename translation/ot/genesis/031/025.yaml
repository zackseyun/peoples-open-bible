id: GEN.31.25
reference: Genesis 31:25
source:
  edition: WLC
  text: וַ/יַּשֵּׂ֥ג לָבָ֖ן אֶֽת יַעֲקֹ֑ב וְ/יַעֲקֹ֗ב תָּקַ֤ע אֶֽת אָהֳל/וֹ֙ בָּ/הָ֔ר וְ/לָבָ֛ן תָּקַ֥ע אֶת אֶחָ֖י/ו בְּ/הַ֥ר הַ/גִּלְעָֽד־־־׃
translation:
  text: And Laban caught up with Jacob[a]. Now Jacob had pitched his tent in the hill country[c][b], and Laban pitched with his kinsmen in the hill country of Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overtook Jacob.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his brothers'; here likely meaning his kinsmen or members of his clan.
    reason: lexical_alternative
  - marker: c
    text: Or 'on Mount Gilead' or 'in the mountains of Gilead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשֵּׂג
  chosen: caught up with
  alternatives:
  - overtook
  - reached
  lexicon: HALOT
  rationale: The verb נשׂג in this narrative context means to overtake or catch up to someone in pursuit. 'Caught up with' is natural modern English and preserves the pursuit nuance without implying capture.
- source_word: תָּקַע ... אָהֳלוֹ
  chosen: had pitched his tent
  alternatives:
  - pitched his tent
  - set up his tent
  lexicon: HALOT
  rationale: 'תקע with אהל is an idiom for pitching or setting up a tent. The pluperfect-like ''had pitched'' fits the discourse flow after Laban''s arrival: Jacob was already encamped when Laban caught up with him.'
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - on the mountain
  - in the mountains
  lexicon: HALOT
  rationale: הַר can mean mountain or hill country depending on context. Here the setting is a regional upland area rather than a single peak, so 'hill country' is the most idiomatic and contextually fitting rendering.
- source_word: תָּקַע אֶת אֶחָיו
  chosen: pitched his tents with his kinsmen
  alternatives:
  - pitched with his brothers
  - set up camp with his relatives
  lexicon: HALOT
  rationale: The object marker plus 'his brothers' is elliptical; the sense is that Laban encamped, accompanied by his group. Because אחים in Hebrew can denote broader kin-group rather than literal brothers, 'kinsmen' best fits the narrative. 'Tents' is supplied in English from the parallel clause and camping idiom.
- source_word: אֶחָיו
  chosen: his kinsmen
  alternatives:
  - his brothers
  - his relatives
  lexicon: HALOT
  rationale: Although literally 'his brothers,' the term often extends to clan-members or close relatives. Since Laban is traveling with a company, 'kinsmen' communicates the broader familial group more accurately in English.
- source_word: בְּהַר הַגִּלְעָד
  chosen: in the hill country of Gilead
  alternatives:
  - on Mount Gilead
  - in the mountains of Gilead
  lexicon: HALOT
  rationale: The construct phrase can be rendered more literally as 'in the mountain of Gilead,' but in context it denotes the upland region of Gilead. 'Hill country of Gilead' is both accurate and readable.
