translation:
  language: es
  text: Y así lo hicieron. Aarón extendió su mano con su vara y golpeó el polvo de la tierra, y los jejenes[a] vinieron sobre el hombre[b] y la bestia. Todo el polvo de la tierra se convirtió en jejenes por toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piojos»; el término hebreo כנים es incierto en su identificación zoológica precisa.
    reason: lexical_alternative
  - marker: b
    text: «Hombre» aquí es un término colectivo para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: And they did so
  chosen_spanish: Y lo hicieron así
  alternatives_spanish:
  - Y así lo hicieron
  - Y lo hicieron de ese modo
  lexicon: HALOT
  rationale: La fórmula narrativa expresa obediencia al mandato previo; «lo hicieron así» conserva la brevedad y naturalidad del hebreo sin sobretraducir.
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - alzò
  lexicon: HALOT
  rationale: נטה con la mano comunica extensión o alargamiento del gesto. «Extendió» es natural en español y mantiene la imagen.
- source_word: יָדוֹ בְמַטֵּהוּ
  english_pob_choice: his hand with his staff
  chosen_spanish: su mano con su vara
  alternatives_spanish:
  - su mano con su bastón
  - su mano con su cetro
  lexicon: HALOT
  rationale: El hebreo une mano y vara con valor de acompañamiento/instrumento. «Con su vara» conserva el vínculo explícito sin interpretarlo excesivamente.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  lexicon: HALOT
  rationale: נכה en narrativa admite «golpear»; aquí preserva la acción concreta y evita un matiz demasiado técnico en español.
- source_word: עֲפַר הָאָרֶץ
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el polvo del suelo
  - el polvo de la tierra
  lexicon: HALOT
  rationale: «Polvo» comunica bien עפר en este contexto de desintegración/material pulverizado; «de la tierra» reproduce la imagen de origen terrestre y la repetición del motivo.
- source_word: וַתְּהִי הַכִּנָּם
  english_pob_choice: the gnats came upon
  chosen_spanish: los mosquitos vinieron sobre
  alternatives_spanish:
  - los jejenes vinieron sobre
  - los piojos vinieron sobre
  lexicon: HALOT
  rationale: Se conserva la incertidumbre zoológica de כנים. «Mosquitos» es una opción comprensible para lectores actuales; se mantiene la idea de invasión sobre seres vivos.
- source_word: הַכִּנָּם / כִנִּים
  english_pob_choice: gnats
  chosen_spanish: mosquitos
  alternatives_spanish:
  - gnats
  - piojos
  - jejenes
  lexicon: HALOT
  rationale: El término hebreo es incierto en identificación precisa. En español, «mosquitos» funciona como equivalente general entendible, pero se documenta la alternativa tradicional y la incertidumbre en nota.
- source_word: בָּאָדָם וּבַבְּהֵמָה
  english_pob_choice: upon man and beast
  chosen_spanish: sobre el hombre y el ganado
  alternatives_spanish:
  - sobre las personas y los animales
  - sobre el ser humano y las bestias
  lexicon: HALOT
  rationale: Se conserva el paralelismo humano/animal. «Hombre» refleja el valor colectivo de אָדָם en el marco narrativo; «ganado» aclara el sentido de בְּהֵמָה en un contexto doméstico.
- source_word: כָּל עֲפַר הָאָרֶץ
  english_pob_choice: All the dust of the earth
  chosen_spanish: Todo el polvo de la tierra
  alternatives_spanish:
  - Todo el polvo del país
  - Todo el polvo de la tierra
  lexicon: HALOT
  rationale: Mantiene el totalizador כָּל y la repetición del motivo del polvo convertido en plaga.
- source_word: הָיָה כִנִּים
  english_pob_choice: became gnats
  chosen_spanish: se convirtió en mosquitos
  alternatives_spanish:
  - fue mosquitos
  - llegó a ser mosquitos
  lexicon: HALOT
  rationale: «Se convirtió en» expresa bien el resultado del hebreo היה en este contexto de transformación.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: por toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por todo el país de Egipto
  lexicon: HALOT
  rationale: «Por toda» expresa la distribución extensa del efecto. «Tierra de Egipto» conserva la formulación bíblica y su alcance geográfico.
theological_decisions:
- issue: Alcance colectivo de אָדָם
  english_pob_reading: man is a collective term for human beings
  chosen_spanish_reading: «el hombre» con sentido colectivo
  alternative_spanish_readings:
  - «las personas»
  - «los seres humanos»
  rationale: Se mantiene la dicción bíblica paralela a «el ganado», pero el referente incluye a seres humanos en general, no a varones solamente.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
- issue: Identificación incierta de כנים
  english_pob_reading: Or 'lice'; the Hebrew term כנים is uncertain in precise zoological identification.
  chosen_spanish_reading: «mosquitos» con nota de alternativa zoológica
  alternative_spanish_readings:
  - «piojos»
  - «jejenes»
  - «mosquitos/gnats»
  rationale: La traducción principal debe ser legible, pero la incertidumbre del término requiere preservarla en nota. No se debe fijar una identificación como segura cuando el hebreo no la garantiza.
  doctrine_reference: Principio de transparencia textual y retención de tensiones léxicas
translation_notes:
  revision_awareness: 'El texto sigue de cerca el patrón narrativo del hebreo y coincide con la decisión principal del POB inglés: fórmula de cumplimiento, gesto de Aarón con la vara, golpe al polvo, aparición de כנים en humanos y animales, y extensión por toda Egipto. Se ajustó la zoología al español con una opción comprensible, conservando la incertidumbre mediante nota. No se detectaron revisiones previas que obligaran a cambios adicionales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Mosquitos» traduce la lectura principal de כנים, pero la nota preserva «piojos» como alternativa tradicional.
  - «El hombre» refleja el valor colectivo de אָדָם sin cambiar el paralelismo bíblico.
  - «Tierra de Egipto» mantiene la cadencia bíblica frente a opciones más modernas como «país de Egipto».
