  rationale: El texto solo enumera nombres dentro del grupo sacerdotal; no añade verbos ni explicaciones. La traducción conserva esa sobriedad y no introduce inferencias narrativas.
  doctrine_reference: Éxodo 28–29; 1 Crónicas 24
- issue: Tratamiento del nombre divino no presente en este versículo
  english_pob_reading: No occurrence in verse
  chosen_spanish_reading: No aplica
  alternative_spanish_readings:
  - No aplica
  rationale: Aunque la política del proyecto usa «Yahvé» para יהוה, este versículo no contiene el tetragrámaton ni una alusión directa que exija una decisión específica.
  doctrine_reference: N/A
translation_notes:
