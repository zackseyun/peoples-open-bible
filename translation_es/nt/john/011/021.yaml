review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el griego y el audit trail inglés en la continuidad narrativa, el destinatario, la condición contrafactual y el sentido básico de κύριε. «Entonces Marta dijo a Jesús: “Señor, si hubieras estado aquí, mi hermano no habría muerto”» corresponde bien a εἶπεν οὖν … Κύριε, εἰ ἦς ὧδε οὐκ ἂν ἀπέθανεν ὁ ἀδελφός μου.'
  spanish_quality_summary: 'La redacción principal es clara, natural y digna en español eclesial moderno. El único problema real está en la nota al pie: la glosa alternativa está mal formulada porque dice «O “Señor”» cuando la alternativa documentada en inglés es «Sir», que en español debe explicarse como «señor» en sentido cortés/tratamiento respetuoso, no repetir la misma forma sin aclaración suficiente. Además, «rendición» suena menos natural que «traducción».'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: Ἰησοῦς → «Jesús» y κύριε/κύριος → «Señor», preservando el posible peso teológico joánico. No hay conflicto con los glosarios principales. La decisión de mantener «Señor» en el texto es correcta; solo conviene reparar la formulación de la nota para reflejar bien la alternativa semántica de cortesía.'
  issues:
  - severity: medium
    issue: La nota al pie no expresa correctamente la alternativa auditada para κύριε.
    rationale: El inglés dice «Or 'Sir'»; la nota española actual comienza «O “Señor” como tratamiento respetuoso», lo cual no presenta una alternativa real al texto principal y puede confundir al lector. Debe aclarar que también puede entenderse como «señor» en sentido de cortesía/tratamiento respetuoso.
  - severity: low
    issue: Uso poco natural de «rendición» en la nota.
    rationale: En contexto traductológico español, «traducción» o «equivalencia» es más idiomático que «rendición».
  revised_spanish_text: 'Entonces Marta dijo a Jesús[a]: «Señor, si hubieras estado aquí, mi hermano no habría muerto».'
  revised_footnotes:
  - marker: a
    text: O «señor» en sentido de tratamiento respetuoso; el griego κύριε puede funcionar como una forma de cortesía, pero «Señor» es la traducción por defecto del proyecto y también preserva su posible peso teológico en el Evangelio de Juan.
    reason: alternative_reading
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y natural. Solo se corrige la nota para que refleje con precisión la alternativa semántica auditada para κύριε y use una formulación española más idiomática.
