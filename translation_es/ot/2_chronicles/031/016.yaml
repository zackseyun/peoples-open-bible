base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/016.yaml
  text: apart from those enrolled by genealogy among the males from three years old and upward[a], everyone who entered the house of Yahweh, as each day's matter required[c][b], for their service in their duties according to their divisions.
  footnotes:
