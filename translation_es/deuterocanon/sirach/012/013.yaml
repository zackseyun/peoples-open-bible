translation:
  language: es
  text: No lo pongas junto a ti[a], no sea que te haga a un lado y ocupe tu lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «¿Quién se compadecerá de un encantador de serpientes mordido por una serpiente, y de todos los que se acercan a las fieras?». El testimonio griego refleja aquí una lectura sustancialmente distinta.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּעֲמִידֵהוּ
  english_pob_choice: Do not set him beside you
  chosen_spanish: No lo pongas junto a ti
  alternatives_spanish:
  - No lo coloques a tu lado
  - No lo pongas al lado de ti
  - No lo establezcas junto a ti
  lexicon: HALOT
  rationale: La Hifil de עמד expresa causar que alguien quede en una posición. En español, "poner" comunica bien la idea de situarlo cerca de uno sin añadir más fuerza de la necesaria.
- source_word: אֶצְלֶךָ
  english_pob_choice: beside you
  chosen_spanish: junto a ti
  alternatives_spanish:
  - a tu lado
  - cerca de ti
  - junto de ti
  lexicon: HALOT
  rationale: אצל indica proximidad. "Junto a ti" mantiene la imagen espacial de cercanía y suena natural en español bíblico moderno.
- source_word: לָמָּה
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de lo contrario
  - no vaya a
  lexicon: HALOT
  rationale: Aunque literalmente es "¿por qué?", aquí introduce la consecuencia que debe evitarse. "No sea que" reproduce la fuerza de advertencia sin perder naturalidad.
- source_word: יֶהְדָּפְךָ
  english_pob_choice: he push you aside
  chosen_spanish: te empuje
  alternatives_spanish:
  - te aparte
  - te arroje a un lado
  - te eche
  lexicon: HALOT
  rationale: הדף significa empujar o desplazar. "Te empuje" conserva el verbo de fuerza; el contexto ya sugiere el desplazamiento.
- source_word: וְיֲַעמֹד
  english_pob_choice: and stand
  chosen_spanish: y se ponga
  alternatives_spanish:
  - y esté
  - y permanezca
  - y se quede
  lexicon: HALOT
  rationale: Aunque literalmente es "y se ponga / esté de pie", en esta construcción el sentido es ocupar el lugar del otro. "Se ponga" retiene la imagen de ponerse en pie y puede implicar reemplazo.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: in your place
  chosen_spanish: en tu lugar
  alternatives_spanish:
  - en vez de ti
  - en tu sitio
  - en tu lugar bajo ti
  lexicon: HALOT
  rationale: תחת puede significar "en lugar de" en contexto de sustitución. "En tu lugar" es la forma más directa y clara en español.
theological_decisions:
- issue: Base hebrea frente al paralelo griego sustancialmente distinto
  english_pob_reading: Translate primarily from the Hebrew Cairo Geniza witness, with the Greek kept in view as a control on sense.
  chosen_spanish_reading: Traducir principalmente desde el testimonio hebreo conservado, manteniendo el griego como control de sentido.
  alternative_spanish_readings:
  - Traducir desde el griego como texto principal
  - fusionar ambos testimonios en una sola línea
  rationale: En este versículo el griego ofrece una sentencia muy distinta. Para una edición auditable de Sirácides, el hebreo conservado debe formar la base del texto español, y la divergencia griega debe señalarse sin absorberla en la redacción principal.
  doctrine_reference: 'PHILOSOPHY.md: Sirach is translated from Hebrew where it survives, with Greek used alongside.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que simplificó la primera cláusula y prefirió una formulación más literal de la clausula final. La versión española reproduce esa línea base hebrea, pero conserva en nota la divergencia notable del griego.
  spanish_consistency_notes:
  - Se usa "Yahvé" cuando aparezca el nombre divino; no aplica en este versículo.
  - Se evita introducir términos eclesiásticos no presentes en el hebreo.
  - La nota al pie marca explícitamente la divergencia textual griega para mantener la transparencia auditiva del proyecto.
