translation:
  language: es
  text: Sus cuerpos fueron reunidos en paz[a][b], y su nombre vive de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «su cuerpo fue sepultado en paz». El testimonio griego hace explícito el sentido funerario donde el hebreo dice «fueron reunidos en paz».'
    reason: alternative_reading
  - marker: b
    text: Masada conserva aquí una lectura más breve («si/en paz fueron reunidos»), mientras que el texto de la Genizá del Cairo dice «sus cuerpos fueron reunidos en paz».
    reason: textual_variant
lexical_decisions:
- source_word: גויתם
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus cadáveres
  - sus cuerpos mortales
  lexicon: HALOT; paralelo griego τὸ σῶμα αὐτῶν
  rationale: El hebreo גויתם se refiere al cuerpo o al cadáver; en español, 'sus cuerpos' conserva la referencia concreta sin volverla demasiado técnica o funeraria. 'Cadáveres' sería más explícito, pero introduce una dureza que el hebreo no exige en la línea principal.
- source_word: נאספו
  english_pob_choice: were gathered
  chosen_spanish: fueron reunidos
  alternatives_spanish:
  - fueron recogidos
  - fueron sepultados
  lexicon: HALOT
  rationale: El verbo pasivo recoge el sentido básico de 'reunir/ser reunido'. 'Fueron reunidos' conserva la imagen hebrea y permite que el contexto de muerte se entienda sin sustituirlo por un verbo más interpretativo como 'sepultados'.
- source_word: בשלום
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - en tranquilidad
  lexicon: HALOT
  rationale: '''En paz'' es la equivalencia directa y natural en español para la frase preposicional, además de mantener la correspondencia formal con el griego ἐν εἰρήνῃ. ''Pacíficamente'' suena más adverbial y menos fiel a la estructura del hebreo.'
- source_word: ושמם
  english_pob_choice: and their name
  chosen_spanish: y su nombre
  alternatives_spanish:
  - y su memoria
  - y su reputación
  lexicon: HALOT
  rationale: '''Nombre'' preserva el idioma bíblico del honor y la fama perdurable. Aunque ''memoria'' comunica la idea, atenúa la metáfora original y el paralelismo con el texto fuente.'
- source_word: חי
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - permanece vivo
  - subsiste
  lexicon: HALOT; griego ζῇ
  rationale: '''Vive'' reproduce la fuerza verbal del hebreo y coincide con el griego ζῇ. ''Subsiste'' o ''permanece vivo'' serían más explicativos, pero menos directos.'
- source_word: לדור ודור
  english_pob_choice: from generation to generation
  chosen_spanish: por generaciones
  alternatives_spanish:
  - de generación en generación
  - por todas las generaciones
  lexicon: HALOT
  rationale: '''Por generaciones'' transmite la continuidad idiomática de לדור ודור en un español natural y sobrio. ''De generación en generación'' sería totalmente legítimo, pero aquí ''por generaciones'' mantiene brevedad sin perder el sentido.'
theological_decisions:
- issue: 'Cómo reflejar el matiz funerario: hebreo ''fueron reunidos'' frente al griego explícito ''fueron sepultados'''
  english_pob_reading: Retain the Hebrew-based 'were gathered in peace' in the main text, with a footnote for the Greek funerary sense
  chosen_spanish_reading: Mantener 'fueron reunidos en paz' en el texto principal, con nota para el sentido funerario explícito del griego
  alternative_spanish_readings:
  - fueron sepultados en paz
  - fueron enterrados en paz
  rationale: La traducción española debe seguir el hebreo conservado como base principal en Sirácida, sin ocultar el apoyo del griego. 'Fueron reunidos' deja visible la formulación hebrea; la nota recoge que el testimonio griego hace explícito el entierro.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach''s Hebrew survives; use Greek parallel as actual input/check'
translation_notes:
  revision_awareness: 'La versión española sigue la decisión revisada del POB inglés: mantener la base hebrea ''fueron reunidos en paz'' y reflejar en nota la clarificación funeraria del griego, sin añadir reinterpretaciones no sostenidas por el texto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de lugar porque este versículo no contiene el nombre divino.
  - '''Nombre'' se conserva como término bíblico de fama perdurable, no como mero identificador personal.'
  - El plural 'sus cuerpos' respeta el hebreo גויתם, aunque el paralelo griego use un singular colectivo.
