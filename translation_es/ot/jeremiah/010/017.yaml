  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: imperativo femenino singular, pertenencias recogidas, y destinataria en condición de sitio. Sin embargo, «de la tierra» suena menos preciso y más ambiguo en español que «de la tierra/país» pretendía resolver; en este contexto de recoger pertenencias para partir, «del país» o «de la tierra» tienen matices distintos. Además, «bajo sitio» es comprensible pero menos idiomático y claro que «bajo asedio» para lector contemporáneo.'
  spanish_quality_summary: El español es mayormente natural, pero «tu bulto» puede sonar coloquial o físico de persona/cosa más que de pertenencias empacadas; sigue siendo defendible, aunque «tu equipaje» sería más claro. Dado que la POB inglesa documenta «bundle» y conserva alternativas en nota, puede mantenerse una opción concreta en el texto. La mejora principal es idiomática en «bajo asedio».
  glossary_alignment: No hay términos teológicos mayores en juego. Las decisiones léxicas respetan bien la auditoría inglesa. Conviene ajustar la nota para reflejar también la alternativa del destinatario como «habitante» y evitar sobrecargar «mercancía» como opción principal en español.
