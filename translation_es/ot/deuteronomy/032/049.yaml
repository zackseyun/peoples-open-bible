  yaml_path: translation/ot/deuteronomy/032/049.yaml
  text: Go up to this mountain of the Abarim[a], Mount Nebo, which is in the land of Moab, opposite Jericho, and see the land of Canaan[c][b], which I am giving to the sons of Israel as a possession.
