translation:
  language: es
  text: Y las siete vacas flacas y malas que subieron después de ellas son siete años, y las siete espigas vacías, quemadas por el viento del este[a], serán siete años de hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abrasadas por el viento del este».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרַקּוֹת
  english_pob_choice: thin
  chosen_spanish: flacas
  alternatives_spanish:
  - delgadas
  - magras
  lexicon: HALOT
  rationale: En vacas, el adjetivo expresa emaciación y estado pobre. «Flacas» comunica con naturalidad la imagen y conserva la fuerza descriptiva del sueño mejor que un calco más técnico.
- source_word: וְהָרָעוֹת
  english_pob_choice: bad
  chosen_spanish: malas
  alternatives_spanish:
  - feas
  - malas en condición
  lexicon: HALOT
  rationale: Aquí רַע describe la mala condición de las vacas, no maldad moral. «Malas» es la correspondencia más directa y natural en español, como en el inglés POB «bad».
- source_word: הָעֹלֹת אַחֲרֵיהֶן
  english_pob_choice: that came up after them
  chosen_spanish: que subían después de ellas
  alternatives_spanish:
  - que subieron después de ellas
  - que venían después de ellas
  lexicon: HALOT
  rationale: El participio con la preposición indica aparición posterior en la visión. «Que subían después de ellas» conserva el movimiento ascendente del hebreo y la secuencia temporal del relato.
- source_word: שֶׁבַע שָׁנִים הֵנָּה
  english_pob_choice: are seven years
  chosen_spanish: son siete años
  alternatives_spanish:
  - son siete años ellas
  - equivalen a siete años
  lexicon: HALOT
  rationale: La frase identifica simbólicamente los elementos del sueño con años. En español, «son siete años» transmite bien esa equivalencia sin añadir una paráfrasis innecesaria.
- source_word: הַשִׁבֳּלִים
  english_pob_choice: heads of grain
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - cabecillas de grano
  lexicon: HALOT
  rationale: El término puede referirse a «ears/heads of grain». El español bíblico y contemporáneo entiende naturalmente «espigas»; en la nota se preserva la alternativa lexical cuando la imagen se precisa como grano.
- source_word: הָרֵקוֹת
  english_pob_choice: empty
  chosen_spanish: vacías
  alternatives_spanish:
  - sin grano
  - vacías de grano
  lexicon: HALOT
  rationale: Para las espigas, el adjetivo expresa carencia de contenido, no simple delgadez. «Vacías» refleja la idea de falta de llenura con claridad en español.
- source_word: שְׁדֻפֹות הַקָּדִים
  english_pob_choice: scorched by the east wind
  chosen_spanish: quemadas por el viento del este
  alternatives_spanish:
  - azotadas por el viento del este
  - abrasadas por el viento del este
  lexicon: HALOT
  rationale: El participio pasivo indica daño por el viento cálido del este. «Quemadas» comunica el efecto devastador de forma vívida; «viento del este» evita una expresión menos transparente para lectores modernos.
- source_word: יִהְיוּ
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - van a ser
  - habrán de ser
  lexicon: HALOT
  rationale: El imperfecto aquí apunta al valor prospectivo de la interpretación de José. «Serán» conserva la predicción con estilo natural en español.
- source_word: שְׁנֵי רָעָב
  english_pob_choice: years of famine
  chosen_spanish: siete años de hambre
  alternatives_spanish:
  - siete años de hambre severa
  - siete años de escasez
  lexicon: HALOT
  rationale: En este contexto narrativo, רָעָב designa una hambruna; sin embargo, «hambre» es la opción más clara y ampliamente inteligible en español. Se mantiene la duración exacta indicada por el texto.
theological_decisions:
- issue: Equivalencia simbólica de las figuras del sueño con años
  english_pob_reading: The dream elements are identified as seven years.
  chosen_spanish_reading: Las figuras del sueño son interpretadas como siete años.
  alternative_spanish_readings:
  - Los símbolos del sueño representan siete años
  - Equivalen a siete años
  rationale: No se trata de alegoría libre sino de la interpretación explícita dada por José. El español debe expresar esa identificación sin suavizarla ni añadir explicaciones ajenas al texto.
  doctrine_reference: Genesis 41:27; coherencia narrativa de la interpretación profética en José
translation_notes:
  revision_awareness: El auditorio inglés actualizó pocas decisiones y mantuvo el texto sin cambios; el presente borrador sigue ese estado estable y conserva las dos alternativas léxicas documentadas en las notas, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de un equivalente de máscara porque este versículo no contiene el Tetragrámaton ni una cita directa donde deba decidirse ese punto.
  - Se optó por «espigas» como término principal, pero se preserva la alternativa «espigas de grano» para reflejar la ambigüedad léxica señalada en el audit trail inglés.
  - «Hambre» mantiene el sentido contextual de רָעָב; no se amplía a «hambruna» en el texto principal para conservar naturalidad, aunque el campo semántico incluye esa idea.
