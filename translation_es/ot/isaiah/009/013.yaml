translation:
  language: es
  text: Así Yahvé cortó de Israel cabeza y cola[a], rama de palma y junco[b], en un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, a toda la gama de la nación, desde los encumbrados hasta los humildes; la imagen se explica en el versículo siguiente.
    reason: cross_reference
  - marker: b
    text: O «caña» para «junco».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְרֵת
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó de raíz
  - eliminó
  - arrancó
  lexicon: HALOT
  rationale: El hebreo expresa una acción decisiva de separación/eliminación. En español, «cortó» conserva la fuerza del acto y funciona bien con la imagen corporal del versículo, sin explicitar más de lo que el contexto da.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como transliteración reverente y auditable del Tetragrámaton, conforme al criterio del proyecto para יְהוָה, evitando el reemplazo por un título.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - desde Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: La preposición marca separación desde dentro del pueblo. «De Israel» es natural en español y mantiene el sentido de remoción desde el conjunto nacional.
- source_word: רֹאשׁ וְזָנָב
  english_pob_choice: head and tail
  chosen_spanish: cabeza y cola
  alternatives_spanish:
  - cabeza y rabo
  - jefes y seguidores
  lexicon: HALOT
  rationale: Se preserva la metáfora concreta del hebreo. No se resuelve interpretivamente en el texto principal, porque el verso siguiente desarrolla la imagen.
- source_word: כִּפָּה
  english_pob_choice: palm branch
  chosen_spanish: palma
  alternatives_spanish:
  - rama de palma
  - fronda de palma
  - palm branch
  lexicon: HALOT
  rationale: El término se refiere a la parte alta o rama de una palma. En español, «palma» mantiene la imagen con buena fluidez; la expansión a «rama de palma» sería más explícita, pero no necesaria en el texto principal.
- source_word: וְאַגְמֹון
  english_pob_choice: reed
  chosen_spanish: junco
  alternatives_spanish:
  - caña
  - cañizo
  - reed
  lexicon: HALOT
  rationale: אגמון designa una planta de pantano, relacionada con un junco o caña. «Junco» preserva el contraste con la palma y es idiomático en español; «caña» podría sonar menos precisa en este contexto.
- source_word: יוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un mismo día
  - en un día solo
  lexicon: HALOT
  rationale: La expresión temporal enfatiza la rapidez y la completitud del juicio. «En un solo día» reproduce bien ese valor idiomático en español.
theological_decisions:
- issue: Conservar la metáfora de jerarquía y abatimiento sin interpretarla en el cuerpo del texto
  english_pob_reading: Preserve 'head and tail, palm branch and reed' in the main text
  chosen_spanish_reading: Conservar «cabeza y cola, palma y junco» en el texto principal
  alternative_spanish_readings:
  - interpretarlo como «jefes y seguidores, los altos y los bajos»
  - explicitar la metáfora en la traducción principal
  rationale: El hebreo usa imágenes concretas que el verso siguiente aclara. Mantenerlas en español respeta la forma del original y evita introducir una interpretación prematura en la traducción.
  doctrine_reference: Principio de primacía del texto fuente y preservación de la tensión interpretativa hasta que el propio contexto la explique.
translation_notes:
  revision_awareness: El contexto de revisión presenta alto acuerdo y sin cambios necesarios; esta redacción mantiene la lectura metafórica del original y la equivalencia óptima ya aprobada, adaptando el léxico al español con mínima intervención interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva la metáfora corporal sin resolverla en el texto principal.
  - «Palma» y «junco» mantienen el paralelismo imagen/contraste del hebreo.
  - Las notas a pie de página están ancladas solo donde hay decisión léxica o aclaración interpretativa.
