translation:
  language: es
  text: 'Entonces Jefté dijo a los ancianos de Galaad: «¿No me odiaron ustedes y me expulsaron de la casa de mi padre? Entonces, ¿por qué han venido a mí ahora, cuando están en angustia?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En angustia» traduce el hebreo כַּאֲשֶׁר צַר לָכֶם; también puede entenderse «en dificultad», «en estrechez» o «en problemas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les habló
  - declaró
  lexicon: HALOT
  rationale: El wayyiqtol de אמר en narrativa se expresa naturalmente en español con «dijo», que mantiene el valor básico de comunicación sin añadir matices no presentes en el hebreo.
- source_word: לְזִקְנֵי גִלְעָד
  english_pob_choice: the elders of Gilead
  chosen_spanish: a los ancianos de Galaad
  alternatives_spanish:
  - a los líderes de Galaad
  - a los mayores de Galaad
  lexicon: HALOT
  rationale: «Ancianos» conserva el valor sociopolítico de זקנים como miembros reconocidos del consejo comunitario, no simplemente personas de edad avanzada. «Galaad» sigue el nombre propio hebreo con forma española usual.
- source_word: הֲלֹא
  english_pob_choice: Did ... not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es verdad que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que presupone respuesta afirmativa. En español, «¿No ...?» comunica bien ese desafío sin sobreexplicar.
- source_word: שְׂנֵאתֶם
  english_pob_choice: hate
  chosen_spanish: odiaron
  alternatives_spanish:
  - aborrecieron
  - detestaron
  lexicon: HALOT
  rationale: «Odiaron» refleja con fuerza directa el verbo שׂנא y conserva la hostilidad relacional del contexto. Se evita suavizarlo con «rechazaron», que perdería intensidad.
- source_word: וַתְּגָרְשׁוּנִי
  english_pob_choice: drive me out
  chosen_spanish: me expulsaron
  alternatives_spanish:
  - me echaron
  - me arrojaron fuera
  lexicon: HALOT
  rationale: «Expulsaron» comunica bien el sentido de גרשׁ como acción forzosa. Frente a «echaron», mantiene mayor formalidad y fuerza jurídica/social.
- source_word: מִבֵּית אָבִי
  english_pob_choice: from my father’s house
  chosen_spanish: de la casa de mi padre
  alternatives_spanish:
  - de la familia de mi padre
  - del hogar de mi padre
  lexicon: HALOT
  rationale: La expresión hebrea es familiar y legal; «casa de mi padre» conserva ese ámbito de pertenencia/expulsión. En español, «de la casa de mi padre» suena más natural que un calco más rígido.
- source_word: וּמַדּוּעַ
  english_pob_choice: So why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Entonces por qué
  - ¿Por qué, pues
  lexicon: HALOT
  rationale: El valor consecutivo de וּמַדּוּעַ se expresa con «¿Y por qué», que enlaza la acusación previa con la pregunta siguiente sin forzar un adverbio interpretativo adicional.
- source_word: בָּאתֶם אֵלַי עַתָּה
  english_pob_choice: have you come to me now
  chosen_spanish: vienen ahora a mí
  alternatives_spanish:
  - han venido ahora a mí
  - se acercan ahora a mí
  lexicon: HALOT
  rationale: En diálogo directo, el perfecto hebreo se puede naturalizar en presente en español para expresar vigencia de la acción. «Vienen ahora a mí» reproduce el impacto inmediato del reclamo y evita una forma demasiado pesada.
- source_word: כַּאֲשֶׁר צַר לָכֶם
  english_pob_choice: when you are in distress
  chosen_spanish: cuando están en apuro
  alternatives_spanish:
  - cuando están en angustia
  - cuando están en dificultad
  - cuando se encuentran en estrechez
  lexicon: HALOT
  rationale: La cláusula צַר לָכֶם indica estar en aprieto/angustia. «En apuro» recoge el sentido de necesidad urgente y mantiene un español claro y moderno; se preserva la alternativa de «estrechez» porque el hebreo también admite esa idea.
translation_notes:
  revision_awareness: El inglés POB de referencia mantiene una sola nota léxica sobre כַּאֲשֶׁר צַר לָכֶם («when you are in distress / in trouble»). La versión española conserva esa tensión semántica con una nota alternativa, pero prefiere «en apuro» por fluidez y fuerza contextual. No se introdujeron cambios doctrinales; el resto del verso sigue estrechamente el hebreo y coincide sustancialmente con el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Jefté» con ortografía española estándar.
  - «Ancianos de Galaad» mantiene la función comunitaria del grupo.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - El tono retórico de la pregunta se mantiene con signos de interrogación y la repetición de la acusación previa.
