translation:
  language: es
  text: Porque así como en un huerto de pepinos no hay nada que lo guarde[a], así sus dioses son de madera, recubiertos de oro y plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega transmitida aquí es difícil; la idea es que el huerto queda sin protección ni vigilancia.
    reason: textual_variant
lexical_decisions:
- source_word: σικυηράτῳ
  english_pob_choice: cucumber patch
  chosen_spanish: huerto de calabazas
  alternatives_spanish:
  - plantación de pepinos
  - huerto de pepinos
  - huerto de calabazas
  lexicon: LSJ
  rationale: El término griego designa un lugar sembrado de cucurbitáceas; en español, 'huerto de calabazas' conserva la imagen agrícola y resulta natural para el lector, sin introducir una especificación excesiva. 'Pepinos' sería más literal respecto al inglés auditado, pero suena menos idiomático en español para este contexto.
- source_word: προβάσκάινόν οὐδὲν φυλάσσον
  english_pob_choice: there is nothing guarding it
  chosen_spanish: no hay nada que lo guarde
  alternatives_spanish:
  - no tiene quien lo guarde
  - sin guardián alguno
  - no hay nada que lo vigile
  lexicon: LSJ
  rationale: La frase transmitida es difícil; el sentido auditado en inglés es de un lugar desprotegido o sin vigilancia. 'No hay nada que lo guarde' preserva esa indeterminación y refleja el valor de φυλάσσον como proteger/guardar, sin forzar una reconstrucción más específica.
- source_word: φυλάσσον
  english_pob_choice: guarding
  chosen_spanish: lo guarde
  alternatives_spanish:
  - lo vigile
  - lo custodie
  - lo proteja
  lexicon: BDAG
  rationale: φυλάσσω suele significar guardar, vigilar o custodiar. 'Guardar' es la opción más directa y funciona bien con la imagen agrícola de un terreno expuesto.
- source_word: θεοὶ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  - divinidades
  lexicon: BDAG
  rationale: El griego dice 'dioses', no 'ídolos'. Mantener 'dioses' conserva la fuerza polémica del texto, que luego define su materialidad. 'Ídolos' interpretaría en lugar de traducir.
- source_word: ξύλινοι
  english_pob_choice: wooden
  chosen_spanish: de madera
  alternatives_spanish:
  - de madera
  - maderosos
  - hechos de madera
  lexicon: LSJ
  rationale: El adjetivo expresa materialidad. 'De madera' es natural en español y conserva la burla implícita del pasaje.
- source_word: περίχρυσοι
  english_pob_choice: overlaid with gold
  chosen_spanish: recubiertos de oro
  alternatives_spanish:
  - cubiertos de oro
  - forrados de oro
  - chapados en oro
  lexicon: LSJ
  rationale: El compuesto indica un recubrimiento de oro, no una sustancia sólida. 'Recubiertos de oro' mantiene la precisión y un registro digno.
- source_word: περιάργυροι
  english_pob_choice: overlaid with silver
  chosen_spanish: y de plata
  alternatives_spanish:
  - recubiertos de plata
  - cubiertos de plata
  - chapados en plata
  lexicon: LSJ
  rationale: Para evitar un encadenamiento demasiado pesado, se mantiene el paralelismo material con 'oro y de plata'. La idea de recubrimiento sigue implícita por el sintagma anterior y el contexto paralelo del versículo.
theological_decisions:
- issue: Retener 'dioses' en vez de reinterpretar como 'ídolos'
  english_pob_reading: their gods are wooden and overlaid with gold and silver
  chosen_spanish_reading: sus dioses son de madera y recubiertos de oro y de plata
  alternative_spanish_readings:
  - sus ídolos son de madera y recubiertos de oro y de plata
  rationale: La lectura inglesa auditada conserva el término 'gods' como parte de la ironía y la acusación. En español, 'dioses' preserva esa tensión polemética y permite que la materia del objeto sea la refutación, sin sustituir el vocablo por una interpretación.
  doctrine_reference: 'Translation philosophy §1: primacía del texto original sobre la tradición interpretativa'
- issue: Resolver la frase griega difícil sobre vigilancia/protección del huerto
  english_pob_reading: there is nothing guarding it
  chosen_spanish_reading: no hay nada que lo guarde
  alternative_spanish_readings:
  - sin guardián alguno
  - no hay nadie que lo vigile
  rationale: La forma griega es textualmente difícil y el inglés auditado reconoce esa dificultad. El español conserva esa cautela, expresando la ausencia de protección sin pretender precisar más de lo que permiten los testigos.
  doctrine_reference: Principio de cautela textual y transparencia de incertidumbre
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que eliminó una repetición innecesaria de 'with' antes de 'silver' sin cambiar el sentido. En español, esa economía se refleja de modo natural en 'de oro y de plata', manteniendo el paralelismo y evitando una repetición pesada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en otros contextos según el estándar del proyecto, pero aquí no aparece el tetragrámaton.
  - Se prefirió 'dioses' sobre 'ídolos' para respetar la forma lexical del griego y la decisión auditada del inglés.
  - '''De madera'' y ''recubiertos de oro y de plata'' conservan el material descriptivo y la sátira del pasaje sin añadir elementos interpretativos.'
