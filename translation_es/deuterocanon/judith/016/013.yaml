review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del léxico griego: ὑμνήσω → «Cantaré», τῷ θεῷ μου → «a mi Dios», ὕμνον καινόν → «un himno nuevo», y la secuencia de atributos divinos se conserva adecuadamente. Sin embargo, hay un desajuste importante en Κύριε: la evidencia fuente griega dice «Señor» en vocativo, no el nombre divino explícito «Yahvé». En este versículo no hay base textual suficiente para sustituir κύριος por «Yahvé».'
  spanish_quality_summary: El español es claro, natural y digno. «Cantaré a mi Dios un himno nuevo» y la cadena «grande eres y glorioso, admirable en poder, insuperable» leen bien. Conviene ajustar «Yahvé» a «Señor» por fidelidad al griego. También es preferible alinear la nota [b] con el término realmente anotado y, en español, mantener la alternativa principal en español («insuperable» / «incomparable» / «invencible»).
  glossary_alignment: Buena alineación general con la terminología del proyecto, excepto en κύριος. La política de «Yahvé» aplica por defecto a יהוה/YHWH, no autoriza automáticamente reemplazar cada κύριος griego con «Yahvé» sin evidencia contextual más fuerte de cita o alusión al nombre divino. Aquí debe mantenerse «Señor». «Himno» para ὕμνον y «insuperable» para ἀνυπέρβλητος están bien.
  issues:
  - severity: high
    issue: Κύριε fue traducido como «Yahvé» en lugar de «Señor».
    rationale: La fuente griega presenta el vocativo κύριε, y el English POB documenta explícitamente «Lord». No hay evidencia textual inmediata de que deba explicitarse el tetragrámaton aquí. Cambiarlo a «Yahvé» sobreinterpreta la fuente.
  - severity: medium
    issue: La nota [b] está anclada en «poder», pero explica ἀνυπέρβλητος.
    rationale: La nota lexical alternativa corresponde a «insuperable», no a «poder». El anclaje debe colocarse en la palabra pertinente para evitar confusión.
  - severity: low
    issue: La nota [b] usa una alternativa en inglés («incomparable») dentro del texto español.
    rationale: Las notas deben expresarse idiomáticamente en español; conviene usar «incomparable» e «invencible» como alternativas españolas sin mezclar idioma meta e inglés.
  revised_spanish_text: Cantaré a mi Dios un himno nuevo[a]. Señor, grande eres y glorioso, admirable en poder, insuperable[b].
  revised_footnotes:
  - marker: a
    text: O «un cántico nuevo». El griego dice ὕμνον καινόν, más específicamente «un himno nuevo», es decir, un canto de alabanza.
    reason: lexical_alternative
  - marker: b
    text: O «incomparable» o «invencible». El griego ἀνυπέρβλητος significa que no puede ser superado ni vencido.
    reason: lexical_alternative
  revision_rationale: Se corrige «Yahvé» a «Señor» para ajustarse fielmente a κύριε en la fuente griega y al razonamiento del English POB. Se reubica la nota [b] sobre «insuperable», que es el término realmente comentado, y se pule la redacción de la nota en español.
