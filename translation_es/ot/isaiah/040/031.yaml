translation:
  language: es
  text: Pero los que esperan a Yahvé[a] renovarán sus fuerzas; levantarán vuelo con alas como águilas[b]; correrán y no se fatigarán; caminarán y no desfallecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que esperan en Yahvé». El verbo hebreo incluye la idea de esperar con esperanza expectante.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como nesharim»; tradicionalmente «águilas», aunque el término también puede referirse de manera más amplia a aves rapaces grandes, incluso buitres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קוֹיֵ
  english_pob_choice: But those who wait for
  chosen_spanish: Pero los que esperan en
  alternatives_spanish:
  - Y los que esperan en
  - Pero los que confían en
  - Y los que aguardan en
  lexicon: HALOT
  rationale: El participio קוה conserva la idea de esperar con expectativa. «Esperan en» mantiene el valor de espera confiada sin reducirlo solo a una actitud interior. El «Pero» reproduce el contraste con el versículo previo, como en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: יַחֲלִ֣יפוּ כֹ֔חַ
  english_pob_choice: will renew their strength
  chosen_spanish: renovarán sus fuerzas
  alternatives_spanish:
  - renovarán su fuerza
  - cambiarán su fuerza
  - obtendrán nuevas fuerzas
  lexicon: HALOT
  rationale: חלף en esta construcción puede expresar renovar o reemplazar. «Renovarán sus fuerzas» comunica restauración de vigor en un español natural y conserva la tensión semántica mejor que una opción más literal como «cambiarán». El plural «fuerzas» es idiomático en español para כוח en este contexto poético.
- source_word: יַעֲל֥וּ אֵ֖בֶר
  english_pob_choice: they will rise up with wings
  chosen_spanish: levantarán vuelo con alas
  alternatives_spanish:
  - se elevarán con alas
  - subirán con alas
  - alzarán alas
  lexicon: HALOT
  rationale: עלה expresa subir/elevarse y אבר alude a alas/pluma de ala. «Levantarán vuelo con alas» transmite el movimiento ascendente y el valor imagístico del hebreo en una forma natural para el español; «levantarán vuelo» evita un calco demasiado rígido de «rise up with wings».
- source_word: כַּ/נְּשָׁרִים
  english_pob_choice: like eagles
  chosen_spanish: como las águilas
  alternatives_spanish:
  - como los águilas
  - como buitres
  lexicon: HALOT
  rationale: En la poesía bíblica, נשר suele funcionar de manera convencional como «águila». Se mantiene esa imagen por su fuerza poética y porque es la opción más reconocible en español; la alternativa zoológica queda implícita en el registro auditable, pero no se explicita en el texto principal.
- source_word: יָר֨וּצוּ
  english_pob_choice: they will run
  chosen_spanish: correrán
  alternatives_spanish:
  - irán corriendo
  - saldrán corriendo
  lexicon: HALOT
  rationale: רוץ se traduce de forma directa por «correr». El futuro conserva la secuencia profética/promisoria del hebreo.
- source_word: וְ/לֹ֣א יִיגָ֔עוּ
  english_pob_choice: and not grow weary
  chosen_spanish: y no se fatigarán
  alternatives_spanish:
  - y no se cansarán
  - y no crecerán cansados
  lexicon: HALOT
  rationale: יגע expresa cansancio por esfuerzo. «No se fatigarán» mantiene un registro digno y natural, con una leve diferencia de tono respecto de «cansarse» que encaja con el paralelismo poético.
- source_word: יֵלְכ֖וּ
  english_pob_choice: they will walk
  chosen_spanish: caminarán
  alternatives_spanish:
  - irán
  - andarán
  lexicon: HALOT
  rationale: הלך es el verbo ordinario de andar/caminar. «Caminarán» conserva el contraste con «correrán» y funciona bien en español contemporáneo.
- source_word: וְ/לֹ֥א יִיעָֽפוּ
  english_pob_choice: and not faint
  chosen_spanish: y no se agotarán
  alternatives_spanish:
  - y no desfallecerán
  - y no se desmayarán
  lexicon: HALOT
  rationale: יעף denota agotamiento o desfallecimiento. «No se agotarán» expresa bien la culminación de la serie poética en un español claro; se evita «desmayarán», que puede sonar más físico que el contexto permite.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton, y la política del proyecto pide transliterarlo como «Yahvé». Esto preserva el nombre personal del pacto en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of קוה in a promise context
  english_pob_reading: wait for the LORD
  chosen_spanish_reading: esperan en Yahvé
  alternative_spanish_readings:
  - aguardan en Yahvé
  - confían en Yahvé
  rationale: «Esperan en» conserva la imagen concreta de espera activa y no borra el matiz de esperanza expectante. La lectura de confianza queda implícita y no se resuelve de forma reductiva.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de control fue alto y el texto se mantiene alineado con el auditable inglés POB y el hebreo base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se conserva la secuencia poética de promesa: esperar -> renovar fuerzas -> elevarse -> correr -> caminar -> no fatigarse / no agotarse.'
  - El español evita calcos como «montarán» o «se levantarán con alas» cuando una formulación más natural comunica mejor el hebreo sin perder la imagen.
  - «Fuerzas» en plural se usa por naturalidad idiomática en español poético, aunque el hebreo tenga un sustantivo singular colectivo en este contexto.
