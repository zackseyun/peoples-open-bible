translation:
  language: es
  text: Las palabras de su boca son maldad y engaño; ha dejado de actuar con sabiduría[a], de hacer el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, 'ha dejado de obrar sabiamente y de hacer el bien'. Los infinitivos hebreos pueden entenderse como dos complementos paralelos que dependen de 'ha dejado de'.
