    issue: Los marcadores de notas al pie están anclados en las frases equivocadas.
    rationale: La nota [a] trata del verbo griego ἀνταποδοῦναι ('devolver/retribuir') y debe anclarse en «retribuirlo/devolverlo», no en «algún bien». La nota [b] explica el literal de «establecer un rey o quitarlo» y debe anclarse en la cláusula final, no en «retribuirlo». Esto afecta la fidelidad al audit trail y la usabilidad editorial.
