translation:
  language: es
  text: Bandas de arameos habían salido y habían llevado cautiva de la tierra de Israel a una muchacha[b] pequeña, y ella servía[c] a la mujer de Naamán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'O: «niña pequeña». La expresión hebrea נַעֲרָה קְטַנָּה enfatiza su juventud y su pequeñez.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «estaba delante de la mujer de Naamán», es decir, la atendía o la servía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרָם
  english_pob_choice: Now bands of Arameans
  chosen_spanish: bandas de arameos
  alternatives_spanish:
  - Aram
  - arameos
  lexicon: HALOT
  rationale: El hebreo presenta a ארם como sujeto con verbo plural, lo que en español se expresa mejor como el pueblo o grupo de arameos, no como el territorio. "Bandas" conserva la idea de partidas militares o incursiones, en línea con el valor contextual del término.
- source_word: יָצְאוּ
  english_pob_choice: had gone out
  chosen_spanish: habían salido
  alternatives_spanish:
  - salieron
  - habían ido
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien la acción de fondo anterior al secuestro/captura en la narración. "Habían salido" mantiene el matiz de movimiento previo sin forzar el orden narrativo.
- source_word: גְדוּדִים
  english_pob_choice: bands
  chosen_spanish: bandas
  alternatives_spanish:
  - partidas
  - tropas
  - bandas de incursión
  lexicon: HALOT
  rationale: El sustantivo designa grupos armados o de incursión. "Bandas" es breve y natural en español, y el contexto de llevar cautiva ya comunica su carácter hostil.
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: taken captive
  chosen_spanish: habían llevado cautiva
  alternatives_spanish:
  - capturaron
  - habían tomado cautiva
  - habían llevado como cautiva
  lexicon: HALOT
  rationale: La expresión española conserva el valor de tomar y trasladar a alguien como cautivo, no solo de capturar en abstracto. El femenino concuerda con "muchacha".
- source_word: מֵאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: from the land of Israel
  chosen_spanish: de la tierra de Israel
  alternatives_spanish:
  - de Israel
  - de la tierra de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión geográfica completa del hebreo. "Tierra de Israel" conserva el alcance territorial y evita reducirla a un simple topónimo.
- source_word: נַעֲרָה קְטַנָּה
  english_pob_choice: a small girl
  chosen_spanish: una muchacha pequeña
  alternatives_spanish:
  - una niña pequeña
  - una muchacha joven
  - una muchacha pequeña y joven
  lexicon: HALOT
  rationale: El hebreo enfatiza juventud y pequeñez/insignificancia social. "Muchacha pequeña" preserva ambos rasgos sin introducir la idea de servidumbre en el sintagma nominal.
- source_word: וַתְּהִי לִפְנֵי
  english_pob_choice: and she served before Naaman’s wife
  chosen_spanish: estaba al servicio delante de la mujer de Naamán
  alternatives_spanish:
  - servía delante de la mujer de Naamán
  - estaba delante de la mujer de Naamán
  - atendía a la mujer de Naamán
  lexicon: HALOT
  rationale: La construcción literal "estar delante de" conserva el hebraísmo y el valor de servicio/atención indicado por el audit trail. "Al servicio" comunica la función, y "delante de" mantiene el anclaje léxico sin suavizarlo demasiado.
- source_word: אֵשֶׁת נַעֲמָן
  english_pob_choice: Naaman’s wife
  chosen_spanish: la mujer de Naamán
  alternatives_spanish:
  - la esposa de Naamán
  - la mujer de Naamán
  lexicon: HALOT
  rationale: Aunque "esposa" sería idiomático, "la mujer de Naamán" sigue de cerca la relación constructa del hebreo y preserva el registro sobrio del pasaje.
theological_decisions:
- issue: Cómo reflejar el hebraísmo לִפְנֵי sin perder la función de servicio
  english_pob_reading: Literally, 'and she was before Naaman’s wife,' that is, she attended or served her.
  chosen_spanish_reading: estaba al servicio delante de la mujer de Naamán
  alternative_spanish_readings:
  - servía a la mujer de Naamán
  - atendía a la mujer de Naamán
  - estaba delante de la mujer de Naamán
  rationale: El hebreo usa una expresión espacial para una relación de servicio/atención. La redacción elegida deja visible la literalidad básica y a la vez comunica la función práctica, sin borrar la tensión entre forma y sentido.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: La redacción española sigue de cerca el ajuste final del POB inglés, que cambió de una paráfrasis más libre de servicio a una formulación más literal con «before / delante de». También preserva el valor de fondo del pluscuamperfecto narrativo para la acción previa de las incursiones y la captura.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún tetragrámaton ni κύριος alusivo.
  - Se mantuvo «Naamán» con acentuación española estándar y se eligió «arameos» para el grupo étnico-militar, coherente con el verbo plural.
  - «Muchacha» se prefirió a «sierva» porque el hebreo nombra primero edad/tamaño, no función; la función aparece en la cláusula verbal.
  - Se evitó «señora» o «esposa» para no introducir una equivalencia social más interpretativa que el hebreo explícito.
