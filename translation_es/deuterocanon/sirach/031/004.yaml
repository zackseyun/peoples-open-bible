translation:
  language: es
  text: Un hombre pobre se afana[a] hasta agotar sus fuerzas, y si descansa[b], sigue teniendo necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los testigos hebreos del texto fuente divergen: una forma dice: ''Un hombre pobre trabaja para mantener su casa, y si descansa, tendrá necesidad''; otra: ''Un hombre pobre se afana hasta agotar sus fuerzas, y si descansa, no tiene descanso.'''
    reason: textual_variant
  - marker: b
    text: 'El paralelo griego aquí conservado transmite un dicho completamente distinto: ''¿De lo impuro qué podrá purificarse? ¿Y de lo falso qué podrá hacerse verdadero?'' Esto sugiere una divergencia textual importante en la tradición de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: עני
  english_pob_choice: poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - una persona pobre
  - el pobre
  lexicon: HALOT
  rationale: El sustantivo singular masculino se conserva como tipo representativo de la sabiduría. En español, 'un hombre pobre' mantiene esa fuerza sin forzar una generalización neutral que atenúe el valor proverbial.
- source_word: עמל
  english_pob_choice: toils
  chosen_spanish: se afana
  alternatives_spanish:
  - trabaja duro
  - se fatiga
  - labora
  lexicon: HALOT
  rationale: El verbo expresa esfuerzo penoso y continuo. 'Se afana' comunica bien el trabajo agotador en español moderno y mantiene el matiz de esfuerzo intenso mejor que un simple 'trabaja'.
- source_word: לחסר כחו
  english_pob_choice: until his strength is spent
  chosen_spanish: hasta que se agota su fuerza
  alternatives_spanish:
  - hasta perder su fuerza
  - hasta que le falta fuerza
  - hasta extenuar su fuerza
  lexicon: HALOT
  rationale: 'La frase combina carencia y fuerza, y el español idiomático requiere expresar el resultado: agotamiento de la fuerza. ''Se agota su fuerza'' preserva el sentido causal y el desgaste físico.'
- source_word: ואם ינוח
  english_pob_choice: and if he rests
  chosen_spanish: y si descansa
  alternatives_spanish:
  - pero si descansa
  - y cuando descansa
  lexicon: HALOT
  rationale: La partícula condicional se traduce de forma directa. 'Y si' conserva la coordinación hebrea sin añadir contraste que el texto no exige.
- source_word: לא נחה לו / יהיה צריך
  english_pob_choice: he is still in need
  chosen_spanish: sigue necesitado
  alternatives_spanish:
  - no tiene descanso
  - permanece en necesidad
  - seguirá teniendo necesidad
  lexicon: HALOT
  rationale: El testimonio hebreo presenta una variación importante entre necesidad continua y ausencia de descanso. 'Sigue necesitado' recoge la idea más estable de carencia persistente sin cerrar indebidamente la tensión textual.
theological_decisions:
- issue: Base textual en un verso con variante hebrea y paralelo griego divergente
  english_pob_reading: Translate from the extant Hebrew witness, prioritizing the line 'עמל עני לחסר כחו, ואם ינוח לא נחה לו' while acknowledging the alternate Hebrew form 'יהיה צריך.'
  chosen_spanish_reading: Traducir el testimonio hebreo conservado, presentando la idea central de un pobre cuya fatiga no le quita la necesidad.
  alternative_spanish_readings:
  - 'Traducir la variante hebrea como: ''Un hombre pobre se afana para sostener su casa, y si descansa, tendrá necesidad.'''
  - 'Tomar el griego como texto principal: ''¿De lo impuro qué podrá purificarse? ¿Y de lo falso qué podrá hacerse verdadero?'''
  rationale: Siguiendo la filosofía del proyecto para Sirácida, el hebreo es primario donde se conserva. Como aquí el testimonio hebreo es inestable y el griego transmite otra sentencia, la traducción española debe ser transparente respecto de la incertidumbre sin presentar una solución como definitiva.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida se conserva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa en tono formal ('toils' -> 'se afana') y conserva la línea principal del hebreo, pero ajusta la sintaxis para sonar natural en español. Se evita traducir mecánicamente el paralelo griego, porque el propio expediente lo identifica como una tradición divergente.
  spanish_consistency_notes:
  - Se mantiene 'Dios'/'Yahvé' fuera del texto porque este verso no contiene el nombre divino ni un título teológico correspondiente.
  - '''Se afana'' conserva el valor de esfuerzo penoso sin elevarlo a un registro arcaico.'
  - '''Sigue necesitado'' es una solución prudente ante la variación hebrea, evitando decidir entre ''no hay descanso'' y ''tendrá necesidad'' como si el texto fuera uniforme.'
