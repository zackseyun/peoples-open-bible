id: ROM.14.17
reference: Romans 14:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν ἡ βασιλεία τοῦ θεοῦ βρῶσις καὶ πόσις, ἀλλὰ δικαιοσύνη καὶ εἰρήνη καὶ χαρὰ ἐν πνεύματι ἁγίῳ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/017.yaml
  text: For the kingdom of God is not eating and drinking, but righteousness and peace and joy in the Holy Spirit.
translation:
  language: ko
  text: 하나님 나라는 먹는 것과 마시는 것이 아니라, 의와 평화와 성령 안의 기쁨이기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_korean: 하나님 나라
  lexicon: BDAG
  rationale: 한국 성경 정형.
- source_word: βρῶσις καὶ πόσις
  english_pob_choice: eating and drinking
  chosen_korean: 먹는 것과 마시는 것
  alternatives_korean:
  - 음식과 음료
  lexicon: BDAG
  rationale: 명사이지만 행위를 가리키므로 「먹는 것/마시는 것」으로 자연스럽게.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_korean: 의
  lexicon: BDAG
  rationale: 정책 글로사리 δικαιοσύνη→의.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_korean: 평화
  alternatives_korean:
  - 평강
  lexicon: BDAG
  rationale: 「평화」가 일반어로 자연스러움. 「평강」은 전통적 대안.
- source_word: χαρὰ ἐν πνεύματι ἁγίῳ
  english_pob_choice: joy in the Holy Spirit
  chosen_korean: 성령 안의 기쁨
  alternatives_korean:
  - 거룩한 영 안의 기쁨
  lexicon: BDAG
  rationale: πνεῦμα ἅγιον의 분명한 신적 영 의미. 정책 글로사리 πνεῦμα(divine)→성령.
