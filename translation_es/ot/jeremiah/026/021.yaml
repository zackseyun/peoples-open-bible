revisions:
- from: Cuando el rey Joaquim[a], y todos sus valientes, y todos los oficiales[oíron] sus palabras, el rey buscó matarlo. Pero cuando Urías[b] oyó, tuvo miedo y huyó, y fue a Egipto.
  to: Cuando el rey Joacim[a], todos sus valientes y todos los oficiales oyeron sus palabras, el rey buscó matarlo. Pero cuando Urías oyó, tuvo miedo, huyó y fue a Egipto[b].
  rationale: 'Se corrigieron errores formales y de anclaje sin alterar el sentido: se eliminó el marcador intruso ''[oíron]'', se normalizó la sintaxis y la puntuación españolas, se reubicó la nota sobre ''vino/fue a Egipto'' al lugar correcto, y se ajustó ''Joaquim'' a ''Joacim'' por uso bíblico español más estándar. El resto de las decisiones léxicas se mantiene por ser fieles y naturales.'
