translation:
  language: es
  text: La luz de los ojos alegra el corazón[a]; las buenas noticias engordan los huesos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el brillo de los ojos», es decir, una mirada alegre o radiante.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «engorda el hueso»; la expresión es un modismo para indicar vigor corporal profundo o renovación.'
    reason: cultural_note
lexical_decisions:
- source_word: מְאוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - brillo
  - resplandor
  lexicon: HALOT
  rationale: מְאוֹר denota luz o brillo. «Luz» conserva la imagen concreta y permite también la lectura idiomática de un semblante alegre o radiante, como en la nota inglesa.
- source_word: עֵינַיִם
  english_pob_choice: of the eyes
  chosen_spanish: de los ojos
  alternatives_spanish:
  - en los ojos
  - desde los ojos
  lexicon: HALOT
  rationale: La relación constructa con מְאוֹר se refleja mejor con «de los ojos», manteniendo la imagen hebrea sin explicarla de más.
- source_word: יְשַׂמַּח
  english_pob_choice: gladdens
  chosen_spanish: alegra
  alternatives_spanish:
  - hace alegrar
  - regocija
  lexicon: HALOT
  rationale: El piel de שׂמח expresa causar alegría. «Alegra» es natural en español y conserva el sentido causativo de forma concisa.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  lexicon: HALOT
  rationale: «Corazón» es la equivalencia habitual para לֵב y mantiene la antropología hebrea del ser interior, no solo la emoción.
- source_word: שְׁמוּעָה
  english_pob_choice: news
  chosen_spanish: buenas noticias
  alternatives_spanish:
  - noticia
  - informe
  - nueva
  lexicon: HALOT
  rationale: En este contexto, el sustantivo significa noticia o reporte. Dado el paralelismo y la naturalidad moderna, «buenas noticias» expresa bien el valor positivo del dicho.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - favorables
  - agradables
  lexicon: HALOT
  rationale: El adjetivo califica directamente a שְׁמוּעָה. «Buenas» concuerda con «noticias» y reproduce de manera simple el sentido de טובָה.
- source_word: תְּדַשֶּׁן
  english_pob_choice: fattens
  chosen_spanish: engordan
  alternatives_spanish:
  - refrescan
  - nutren
  - hacen prosperar
  lexicon: HALOT
  rationale: דשׁן literalmente comunica hacer gordo o rico, y en sentido figurado, vigor o bienestar profundo. «Engordan» conserva la metáfora corporal fuerte del hebreo que la POB inglesa también preserva.
- source_word: עָצֶם
  english_pob_choice: the bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - el cuerpo
  - la estructura
  lexicon: HALOT
  rationale: Aunque el singular hebreo puede funcionar colectivamente, el español natural exige plural en esta imagen idiomática. «Los huesos» preserva el paralelismo corporal y la idea de vigor interno.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y conserva la imagen corporal del proverbio. Se mantuvo la tensión idiomática de «engorda los huesos» mediante nota, en paralelo con la auditoría inglesa. No se detectaron revisiones textuales relevantes en el paso más reciente; el estado de acuerdo alto sugiere que no se requieren cambios sustantivos.
  spanish_consistency_notes:
  - Se prefirió «corazón» para לֵב por consistencia con el uso bíblico hebreo.
  - Se mantuvo la metáfora física de «engordan los huesos» en lugar de una paráfrasis como «dan vigor», para no borrar la fuerza idiomática del original.
  - La nota [a] se ancla en «ojos» para reflejar la alternativa lexical documentada sin introducir una reinterpretación amplia.
