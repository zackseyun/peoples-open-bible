base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/011.yaml
  text: And the sons of Israel heard it said[a], “Look, the sons of Reuben and the sons of Gad and the half-tribe of Manasseh have built the altar opposite the land of Canaan, in the region of the Jordan[d][c][b], on the side of the sons of Israel.”
  footnotes:
  - marker: a
    text: Or “the Israelites heard, saying,” with לֵאמֹר taken more literally; the English main text smooths the Hebrew reporting formula.
    reason: lexical_alternative
  - marker: b
    text: Or “facing the land of Canaan” for “opposite the land of Canaan.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the districts/regions of the Jordan”; the exact geographical nuance of the phrase is uncertain.
    reason: cultural_note
  - marker: d
    text: Or “on the side of the sons of Israel” / “across from the sons of Israel.” The final geographical phrase is difficult and may indicate either the side belonging to Israel west of the Jordan or a position opposite them.
    reason: alternative_reading
