revisions:
- from: El camino del justo es recto; oh Recto[a], tú allanas el sendero del justo.
  to: La senda del justo es llana; oh Recto[a], tú allanas el sendero del justo.
  rationale: Se ajusta מֵישָׁרִים a «llana» para reflejar mejor el sentido de camino nivelado y distinguirlo de יָשָׁר. Se conserva la lectura vocativa adoptada por la POB inglesa, pero con puntuación española algo más natural. También se armoniza el primer sustantivo con «senda» para evitar una repetición pesada de «camino/sendero» y mantener un registro poético claro.
