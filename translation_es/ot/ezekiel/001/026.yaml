translation:
  language: es
  text: Y por encima de la expansión que estaba sobre sus cabezas había una semejanza de trono[a], con apariencia de piedra de zafiro; y sobre la semejanza del trono había una semejanza, con apariencia de hombre, por encima de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «piedra de lapislázuli»; el nombre exacto de la gema hebrea sappîr es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָקִיעַ
  english_pob_choice: expanse
  chosen_spanish: expansión
  alternatives_spanish:
  - extensión
  - firmamento
  lexicon: HALOT
  rationale: «Expansión» comunica la idea de una superficie extendida sin recurrir a «firmamento», que suena más tradicional pero también más cargado y menos transparente en español moderno. Mantiene el sentido espacial del contexto visionario.
- source_word: כְּמַרְאֵה
  english_pob_choice: in appearance like / with the appearance of
  chosen_spanish: en apariencia como / con la apariencia de
  alternatives_spanish:
  - como la apariencia de
  - a semejanza de
  lexicon: HALOT
  rationale: La fórmula subraya semejanza visible, no identidad directa. «En apariencia» preserva el matiz fenomenológico repetido en el hebreo.
- source_word: אֶבֶן סַפִּיר
  english_pob_choice: sapphire stone
  chosen_spanish: piedra de zafiro
  alternatives_spanish:
  - lapislázuli
  - piedra de lapislázuli
  - zafiro
  lexicon: HALOT
  rationale: «Piedra de zafiro» conserva el valor tradicional del inglés POB y hace claro que se trata de una piedra preciosa. La identificación exacta del hebreo sappîr es incierta, pero el español puede reflejar esa convención sin resolverla en exceso.
- source_word: דְּמוּת
  english_pob_choice: likeness
  chosen_spanish: semejanza
  alternatives_spanish:
  - figura
  - forma
  lexicon: HALOT
  rationale: '«Semejanza» reproduce bien la idea de relación por analogía y permite mantener la cautela del texto: el profeta no dice que vea directamente la realidad última, sino una semejanza.'
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  lexicon: HALOT
  rationale: En este contexto de visión y realeza, «trono» es el equivalente natural y teológicamente adecuado.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - persona
  lexicon: HALOT
  rationale: Aquí el término apunta a una figura humana singular, no a la humanidad en general. «Hombre» conserva esa referencia y sigue el valor del inglés POB.
- source_word: עָלָיו מִלְמָעְלָה
  english_pob_choice: above it
  chosen_spanish: sobre él
  alternatives_spanish:
  - por encima de él
  - encima de él
  lexicon: HALOT
  rationale: La locución final sitúa la figura humana por encima del trono. «Sobre él» es breve y natural en español, y reproduce la relación espacial sin añadir elementos no explicitados.
theological_decisions:
- issue: Descripción antropomórfica de la figura sobre el trono
  english_pob_reading: 'Retain the layered language of resemblance: "a likeness with the appearance of a man"'
  chosen_spanish_reading: 'Mantener el lenguaje en capas: «una semejanza con la apariencia de un hombre»'
  alternative_spanish_readings:
  - «alguien semejante a un hombre»
  - «una figura humana»
  rationale: El hebreo acumula דמות y כמראה para evitar una identificación plana de Dios con un cuerpo humano, pero también para afirmar una manifestación humaniforme. El español debe conservar esa tensión sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms: אָדָם → hombre / ser humano (context)'
- issue: Conservación de la relación visual sin concretar presencia corporal
  english_pob_reading: The visionary formula marks resemblance rather than direct identification
  chosen_spanish_reading: La fórmula visionaria marca semejanza y apariencia, no identificación directa
  alternative_spanish_readings:
  - «marca figura más que identidad»
  - «describe analogía visual»
  rationale: En español, «semejanza» y «apariencia» permiten conservar la reserva del texto. Así no se sobreinterpreta la visión como una descripción corporal literal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés auditado eliminó «seated», que no estaba explícito en el hebreo; por eso el español no introduce ningún verbo de asiento o permanencia. También se mantuvo la secuencia de semejanzas y apariencias para respetar el estilo cauteloso del texto fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se preservó la repetición de «semejanza» y «apariencia» para reflejar la cautela del hebreo.
  - Se evitó «firmamento» por ser más tradicional pero menos transparente en este contexto visionario.
  - No se añadió ninguna idea de estar sentado, en línea con la revisión auditada del inglés POB.
