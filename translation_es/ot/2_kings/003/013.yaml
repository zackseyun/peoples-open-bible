  yaml_path: translation/ot/2_kings/003/013.yaml
  text: And Elisha said to the king of Israel[a], “What have I to do with you? Go to the prophets of your father and to the prophets of your mother.” And the king of Israel said to him, “No[b], for Yahweh has called these three kings to give them into the hand of Moab.”
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''What is there to me and to you?''—a formula expressing distance or rejection.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Please do not, for the LORD has called these three kings to give them into the hand of Moab.' The Hebrew expression is difficult and may be read as a plea rather than a blunt objection.
    reason: alternative_reading
