translation:
  language: es
  text: 'Los hijos de Jehieli: Zetam y Joel, su hermano, estaban a cargo de las tesorerías de la casa de Yahvé[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «casa de Yahvé»; tradicionalmente se ha traducido «casa del SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En un contexto genealógico/administrativo, el plural constructo de בן se expresa de forma natural en español como «los hijos de». «Los descendientes de» sería posible, pero aquí suena más amplio de lo que pide el hebreo.
- source_word: יְחִיאֵלִי
  english_pob_choice: Jehieli
  chosen_spanish: Jehieli
  alternatives_spanish:
  - jefielita
  lexicon: HALOT
  rationale: La forma funciona aquí como nombre propio en aposición después de «los hijos de». Mantener «Jehieli» conserva la decisión auditada del POB inglés; traducir como adjetivo étnico o patronímico («jefielita») introduciría una interpretación menos segura.
- source_word: זֵתָם
  english_pob_choice: Zetham
  chosen_spanish: Zetam
  alternatives_spanish:
  - Zetam
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación mínima ortográfica para lectura natural, sin añadir valor interpretativo.
- source_word: וְיוֹאֵל
  english_pob_choice: and Joel
  chosen_spanish: y Joel
  alternatives_spanish:
  - e Joel
  lexicon: HALOT
  rationale: Coordinación simple del nombre propio con la conjunción «y», que es la forma no marcada en español ante este contexto.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano de él
  - su propio hermano
  lexicon: HALOT
  rationale: El sufijo singular de 3ms se refiere con naturalidad a Joel como hermano de Zetam. En español, «su hermano» reproduce la relación sin forzar una glosa innecesaria; el antecedente queda claro por la estructura del verso.
- source_word: עַל
  english_pob_choice: were over
  chosen_spanish: estaban a cargo de
  alternatives_spanish:
  - estaban sobre
  - tenían a su cargo
  lexicon: HALOT
  rationale: En contexto administrativo, עַל indica supervisión o responsabilidad. «Estaban a cargo de» comunica con claridad la función y evita el literalismo duro de «estaban sobre».
- source_word: אֹצְרוֹת
  english_pob_choice: the treasuries
  chosen_spanish: los tesoros
  alternatives_spanish:
  - los depósitos
  - las despensas
  lexicon: HALOT
  rationale: La palabra puede referirse a almacenes o reservas institucionales; en español bíblico, «tesoros» conserva la idea de bienes guardados bajo administración del templo y mantiene el campo semántico de reserva/valor.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la forma literal «casa» por fidelidad al hebreo בית, y se usa «Yahvé» según la directriz terminológica del proyecto para יְהוָה. «Templo» es una equivalencia contextual posible, pero aquí atenúa la imagen original de «casa».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh; footnote notes traditional English 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton de manera directa, y la norma del proyecto pide «Yahvé» en el texto principal. La nota aclara la alternativa tradicional inglesa, equivalente al masking eclesial «SEÑOR» en español, sin usarlo en el cuerpo del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: nombres propios transliterados, relación fraterna singular preservada, y la expresión administrativa עַל se entiende como responsabilidad/encargo. No hay cambios textuales ni revisiones adicionales indicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de una máscara litúrgica, conforme al estándar del proyecto.
  - «Los hijos de» y «estaban a cargo de» conservan el tono genealógico-administrativo sin sobrerrepresentar la frase hebrea.
  - «Los tesoros» es una elección funcional en español para אֹצְרוֹת dentro del contexto de administración del templo.
