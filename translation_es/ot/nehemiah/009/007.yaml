translation:
  language: es
  text: Tú eres Yahvé Dios[a], que escogiste a Abram, lo sacaste de Ur de los caldeos y le diste el nombre Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Yahvé, el Dios'. El hebreo usa el nombre divino YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton en forma transliterada y no una sustitución titular. En español, 'Yahvé' es la forma natural y reverente que corresponde al criterio del POB para יהוה.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Con יהוה en aposición, el sentido es 'Yahvé Dios'. En español, 'Dios' comunica con claridad la identificación sin añadir artículo innecesario.
- source_word: אַתָּה הוּא
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú mismo eres
  - Tú eres el mismo
  lexicon: HALOT
  rationale: La construcción enfática hebrea se expresa de forma natural en español con 'Tú eres', preservando la identificación directa sin sobrerrepresentar el énfasis.
- source_word: בָּחַרְתָּ
  english_pob_choice: chose
  chosen_spanish: escogiste
  alternatives_spanish:
  - elegiste
  - seleccionaste
  lexicon: HALOT
  rationale: '''Escoger'' es idiomático en español y mantiene el matiz electivo/covenantal de בחר sin introducir tecnicismos posteriores.'
- source_word: וְהוֹצֵאתוֹ
  english_pob_choice: brought him out
  chosen_spanish: lo sacaste
  alternatives_spanish:
  - lo sacaste fuera
  - lo trajiste fuera
  lexicon: HALOT
  rationale: El Hifil de יצא puede traducirse naturalmente como 'sacar'. En español, 'lo sacaste' conserva la fuerza de liberación y el movimiento desde Ur.
- source_word: מֵאוּר כַּשְׂדִּים
  english_pob_choice: from Ur of the Chaldeans
  chosen_spanish: de Ur de los caldeos
  alternatives_spanish:
  - desde Ur de los caldeos
  - de Ur de los caldeos
  lexicon: HALOT
  rationale: Se preserva el topónimo tradicional y su especificación étnico-geográfica. 'Caldeos' evita el arcaísmo de 'caldeos' como forma antigua inglesa 'Chaldees'.
- source_word: וְשַׂמְתָּ שְׁמוֹ
  english_pob_choice: gave him the name
  chosen_spanish: le pusiste por nombre
  alternatives_spanish:
  - le diste el nombre
  - pusiste su nombre
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa 'poner el nombre'. En español bíblico actual, 'le pusiste por nombre' es claro y fiel sin sonar forzado.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: HALOT
  rationale: Se conserva la forma tradicional y ampliamente reconocible del nombre renovado, que corresponde al contraste narrativo con Abram.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio divino יְהוָה. En la línea editorial del POB, no se oculta tras una sustitución como 'SEÑOR'. 'Yahvé' preserva el nombre del pacto y es la forma elegida para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el auditorio inglés del POB. No se registran revisiones aplicadas en el control más reciente; la traducción conserva esa lectura estable sin introducir cambios textuales o doctrinales nuevos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de manera consistente con el estándar del proyecto.
  - '''Abram'' y ''Abraham'' se distinguen para reflejar la secuencia narrativa y la importancia del cambio de nombre.'
  - '''Caldeos'' se conserva como designación geográfica-étnica tradicional, sin arcaizar la sintaxis española.'
