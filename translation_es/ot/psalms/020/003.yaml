    issue: 'Expresión poco natural en español: ''Que envíe tu ayuda'''
    rationale: 'Aunque עֶזְרְךָ literalmente puede ser ''tu ayuda'', tanto el análisis inglés como el uso idiomático español favorecen expresar el destinatario con pronombre dativo: ''te envíe ayuda''. Esto preserva mejor el sentido y mejora la legibilidad.'
  - severity: low
    issue: Rationale léxica interna inconsistente
    rationale: La explicación del borrador reconoce que 'que envíe tu ayuda' suena menos natural, pero aun así mantiene esa formulación. Conviene alinear la decisión léxica con el texto final.
