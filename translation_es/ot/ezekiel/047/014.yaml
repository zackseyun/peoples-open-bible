translation:
  language: es
  text: Ustedes la heredarán, cada uno como su hermano[b], acerca de la cual levanté mi mano[a] para dársela a sus padres; y esta tierra les caerá en heredad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levanté mi mano», un modismo de juramento; es decir, «juré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada uno igualmente con su hermano».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «les caerá», un modismo para indicar que se les asigna como herencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְחַלְתֶּם
  english_pob_choice: You shall inherit
  chosen_spanish: Ustedes la heredarán
  alternatives_spanish:
  - ustedes la recibirán en herencia
  - ustedes la poseerán como herencia
  lexicon: HALOT
  rationale: נחל en este contexto de repartición territorial expresa recibir una porción heredada. En español, «heredarán» conserva la idea de herencia sin perder claridad.
- source_word: אוֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El pronombre femenino singular refiere a la tierra; en español, el clítico «la» es natural y conserva el antecedente femenino.
- source_word: אִישׁ כְּאָחִיו
  english_pob_choice: each like his brother
  chosen_spanish: cada uno como su hermano
  alternatives_spanish:
  - cada hombre como su hermano
  - cada uno igualmente con su hermano
  lexicon: HALOT
  rationale: La frase hebrea es distributiva y masculina gramaticalmente. «Cada uno» mantiene el reparto individual sin introducir una formulación más marcada que la revisión inglesa consideró menos natural. Se conserva la referencia fraterna sin neutralizar innecesariamente la estructura.
- source_word: נָשָׂאתִי אֶת יָדִי
  english_pob_choice: I raised my hand
  chosen_spanish: levanté mi mano
  alternatives_spanish:
  - alzé mi mano
  - juré
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del juramento, como en la decisión inglesa, en vez de resolverla directamente con «juré» en el texto principal.
- source_word: לְתִתָּהּ
  english_pob_choice: to give it
  chosen_spanish: para dársela
  alternatives_spanish:
  - para darla
  - para concedérsela
  lexicon: HALOT
  rationale: El infinitivo con sufijo femenino se refiere a la tierra. «Dársela» mantiene la referencia pronominal y la finalidad del acto.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/patriarcas
  lexicon: HALOT
  rationale: Se mantiene el término concreto «padres» para reflejar la formulación del pacto y el vínculo con los patriarcas, siguiendo la especificidad del hebreo y del audit trail inglés.
- source_word: וְנָפְלָה
  english_pob_choice: shall fall
  chosen_spanish: les caerá
  alternatives_spanish:
  - caerá para ustedes
  - les corresponderá
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de «caer» para una herencia asignada. En español, «les caerá en heredad» conserva el giro idiomático con claridad natural.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra misma
  - la tierra esta
  lexicon: HALOT
  rationale: «Tierra» es el equivalente más natural en español bíblico para el contexto territorial de la promesa.
- source_word: לָכֶם בְּנַחֲלָה
  english_pob_choice: to you as an inheritance
  chosen_spanish: en heredad
  alternatives_spanish:
  - como herencia
  - como posesión heredada
  lexicon: HALOT
  rationale: «En heredad» reproduce de manera concisa la función nominal de נַחֲלָה como patrimonio asignado; además suena bíblico y claro en español.
theological_decisions:
- issue: El juramento expresado por «levanté mi mano»
  english_pob_reading: which I raised my hand to give it to your fathers
  chosen_spanish_reading: respecto de la cual levanté mi mano para dársela a sus padres
  alternative_spanish_readings:
  - que juré dar a sus padres
  - sobre la cual levanté mi mano para dársela a sus padres
  rationale: La POB inglesa conserva la imagen concreta del juramento y la aclara en nota. El español principal hace lo mismo, manteniendo la tensión entre imagen e interpretación sin borrar el modismo hebreo.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la imagen idiomática con aclaración auditada.'
- issue: La distribución igualitaria de אִישׁ כְּאָחִיו
  english_pob_reading: each like his brother
  chosen_spanish_reading: cada uno como su hermano
  alternative_spanish_readings:
  - cada hombre como su hermano
  - cada uno igualmente con su hermano
  rationale: El hebreo es distributivo y masculino gramaticalmente. «Cada uno» preserva el valor distributivo y evita una formulación torpe, sin perder la marca gramatical del original.
  doctrine_reference: 'Principio POB: precisión gramatical con legibilidad natural; evitar neutralización no justificada.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita «cada hombre» por una forma más natural y se conserva el valor relacional de «each like his brother»; asimismo, se respeta la imagen del juramento y el giro idiomático de herencia sin sustituirlos por paráfrasis explicativas en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «heredad» para mantener la terminología bíblica de asignación territorial.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se conserva el paralelismo entre el juramento y la asignación hereditaria para reflejar la estructura hebrea.
  - El pronombre femenino de la tierra se mantiene con «la / dársela» para concordancia natural en español.
