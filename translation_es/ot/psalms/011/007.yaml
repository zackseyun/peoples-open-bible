revisions:
- from: Porque Yahvé es justo[a]; ama las obras de justicia[b]; los rectos contemplarán su rostro[c].
  to: Porque Yahvé es justo; ama las obras justas; los rectos contemplarán su rostro[a][b].
  rationale: Se conserva el sentido principal del borrador, pero se corrigen los anclajes y el contenido de las notas para alinearlos con la evidencia fuente y el audit trail inglés. También se simplifica «obras de justicia» a «obras justas» por mayor naturalidad en español sin perder el sentido de actos rectos concretos.
