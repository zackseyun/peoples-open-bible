translation:
  language: es
  text: Que el rey nombre oficiales en todas las provincias de su reino, y que reúnan a toda joven virgen de hermoso aspecto, a Susa la ciudadela, a la casa de las mujeres[a], bajo la custodia de Hegai, eunuco del rey y guardián de las mujeres; y que se les den sus cosméticos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el harén». El hebreo es más literalmente «la casa de las mujeres».
    reason: lexical_alternative
  - marker: b
    text: O «sus tratamientos de belleza». El término hebreo puede referirse ampliamente a preparaciones cosméticas o tratamientos para embellecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַפְקֵד
  english_pob_choice: appoint
  chosen_spanish: nombre
  alternatives_spanish:
  - designe
  - nombre como oficiales
  lexicon: HALOT
  rationale: El hebreo en este contexto administrativo expresa nombrar o asignar funcionarios. «Nombre» es natural en español y conserva la idea de establecer autoridad sin sobrecargar el texto.
- source_word: פְּקִידִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - funcionarios
  - supervisores
  lexicon: HALOT
  rationale: Se refiere a agentes administrativos del rey. «Oficiales» comunica bien el carácter de autoridad delegada sin sugerir rango militar.
- source_word: מְדִינוֹת מַלְכוּתוֹ
  english_pob_choice: the provinces of his kingdom
  chosen_spanish: las provincias de su reino
  alternatives_spanish:
  - las jurisdicciones de su reino
  - las provincias de su dominio
  lexicon: HALOT
  rationale: «Provincias» es el equivalente más natural para el marco imperial de Ester y preserva la estructura administrativa del hebreo.
- source_word: וְיִקְבְּצוּ
  english_pob_choice: let them gather
  chosen_spanish: que reúnan
  alternatives_spanish:
  - que junten
  - que congreguen
  lexicon: HALOT
  rationale: El jussivo continúa la propuesta. «Que reúnan» es claro en español y mantiene la acción de traer a las jóvenes a un mismo lugar.
- source_word: כָּל נַעֲרָה בְתוּלָה
  english_pob_choice: every young virgin
  chosen_spanish: toda joven virgen
  alternatives_spanish:
  - toda joven, virgen
  - toda doncella virgen
  lexicon: HALOT
  rationale: 'Se preservan ambos rasgos: edad/condición juvenil y virginidad. «Joven virgen» evita perder uno de los dos elementos del hebreo.'
- source_word: טוֹבַת מַרְאֶה
  english_pob_choice: of beautiful appearance
  chosen_spanish: de hermoso aspecto
  alternatives_spanish:
  - de buena apariencia
  - de bello aspecto
  lexicon: HALOT
  rationale: La expresión literalmente apunta a «buena en apariencia». «Hermoso aspecto» conserva el énfasis visual en un español fluido.
- source_word: שׁוּשַׁן הַבִּירָה
  english_pob_choice: Susa the citadel
  chosen_spanish: Susa la ciudadela
  alternatives_spanish:
  - Susa la fortaleza
  - la ciudadela de Susa
  lexicon: HALOT
  rationale: «Ciudadela» transmite bien el complejo fortificado y real indicado por הַבִּירָה, siguiendo de cerca la equivalencia usada en el texto inglés.
- source_word: בֵּית הַנָּשִׁים
  english_pob_choice: the house of the women
  chosen_spanish: la casa de las mujeres
  alternatives_spanish:
  - el harem
  - la residencia de las mujeres
  lexicon: HALOT
  rationale: Se mantiene la transparencia formal del hebreo. «Casa de las mujeres» es más literal que «harem», que interpretaría el término con mayor carga cultural.
- source_word: אֶל יַד הֵגֶא
  english_pob_choice: into the custody of Hegai
  chosen_spanish: bajo el cuidado de Hegai
  alternatives_spanish:
  - bajo la custodia de Hegai
  - en manos de Hegai
  lexicon: HALOT
  rationale: El idiomático «en la mano de» expresa autoridad o responsabilidad. «Bajo el cuidado de» comunica con claridad la función de supervisión dentro de la escena sin perder el sentido de control.
- source_word: סְרִיס
  english_pob_choice: eunuch
  chosen_spanish: eunuco
  alternatives_spanish:
  - oficial de corte
  lexicon: HALOT
  rationale: En este contexto de las mujeres del palacio, el sentido lexical primario «eunuco» es el más probable y el que conserva la referencia histórica del texto.
- source_word: שֹׁמֵר הַנָּשִׁים
  english_pob_choice: keeper of the women
  chosen_spanish: guardián de las mujeres
  alternatives_spanish:
  - encargado de las mujeres
  - supervisor de las mujeres
  lexicon: HALOT
  rationale: La forma participial describe su función. «Guardián» es fiel al valor de custodiar y mantiene la relación con el sustantivo precedente.
- source_word: תַּמְרוּקֵיהֶן
  english_pob_choice: their cosmetics
  chosen_spanish: sus ungüentos
  alternatives_spanish:
  - sus cosméticos
  - sus tratamientos de belleza
  lexicon: HALOT
  rationale: El término puede abarcar preparaciones para embellecimiento, ungüentos o cosméticos. «Ungüentos» conserva mejor la amplitud material del hebreo y evita reducirlo solo a maquillaje.
theological_decisions:
- issue: Cómo traducir la escena administrativa y palaciega sin suavizar la coerción implícita
  english_pob_reading: The verse describes royal orders to gather the women into custody and provide them with beautifying preparations.
  chosen_spanish_reading: El verso presenta una orden real de reunir a las jóvenes y ponerlas bajo cuidado/custodia, con provisión de ungüentos.
  alternative_spanish_readings:
  - una convocatoria neutral
  - una invitación a presentarse
  rationale: El hebreo y la lectura inglesa muestran un mandato, no una invitación. La traducción conserva esa fuerza y la estructura de control palaciego sin exagerar ni atenuar el texto.
  doctrine_reference: Ninguna; decisión de fidelidad histórica y semántica al relato.
translation_notes:
  revision_awareness: Se ha seguido el consenso de alta concordancia del audit trail inglés sin aplicar revisiones pendientes; la redacción española mantiene la equivalencia óptima y preserva las alternativas léxicas relevantes del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el texto lo requiera; este verso no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en este pasaje.
  - Se conservó la estructura jussiva con «Que... y que...», adecuada para mandato indirecto en español.
  - «Eunuco» se mantuvo por la fuerza lexical histórica del contexto palaciego.
  - Las notas al pie preservan la alternativa de «casa de las mujeres» y el rango semántico de תַּמְרוּקִים.
