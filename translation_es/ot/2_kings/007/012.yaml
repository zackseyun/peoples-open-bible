translation:
  language: es
  text: 'Entonces el rey se levantó de noche y dijo a sus servidores: “Permítanme, por favor, contarles lo que Aram[a] ha hecho contra nosotros. Saben que tenemos hambre, así que han salido del campamento para esconderse en el campo, diciendo: ‘Cuando salgan de la ciudad, los tomaremos vivos y entraremos en la ciudad’”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los arameos”. El hebreo usa el nombre del lugar, Aram, para referirse al pueblo o al ejército de Aram.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo קום en narrativa expresa levantarse físicamente; en español, “se levantó” comunica de forma natural el inicio de la acción nocturna sin perder concreción. “Arose” del audit trail inglés pide un registro algo más formal, pero en español “se levantó” evita arcaísmo innecesario.
- source_word: לַיְלָה
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: El acusativo temporal funciona adverbialmente. “De noche” es idiomático en español y conserva el marco nocturno de la escena.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  - sus asistentes
  lexicon: HALOT
  rationale: עבד en contexto real puede referirse a servidores de la corte. Dado el valor de servicio subordinado y el estilo POB, “siervos” mantiene el vínculo semántico más directo, sin imponerse como término eclesiástico técnico.
- source_word: אַגִּידָה נָּא לָכֶם
  english_pob_choice: Let me tell you, please
  chosen_spanish: Permítanme, por favor, contarles
  alternatives_spanish:
  - Déjenme decirles, por favor
  - Permítanme decirles
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa solicitud/persuasión. En español, “Permítanme, por favor, contarles” reproduce la cortesía y la intención discursiva con naturalidad. “Contarles” transmite la introducción de una explicación, no solo un anuncio.
- source_word: אֵת אֲשֶׁר עָשׂוּ לָנוּ אֲרָם
  english_pob_choice: what Aram has done to us
  chosen_spanish: lo que Aram ha hecho contra nosotros
  alternatives_spanish:
  - lo que Aram ha hecho con nosotros
  - lo que los arameos han hecho contra nosotros
  lexicon: HALOT
  rationale: Se conserva “Aram” como nombre fuente, conforme al criterio POB, y se explicita la fuerza adversativa de la acción con “contra nosotros”, ya que el contexto es hostil. Esto evita suavizar el daño implícito del hebreo.
- source_word: יָדְעוּ כִּי רְעֵבִים אֲנַחְנוּ
  english_pob_choice: They know that we are hungry
  chosen_spanish: Saben que tenemos hambre
  alternatives_spanish:
  - Saben que estamos hambrientos
  - Saben que somos hambrientos
  lexicon: HALOT
  rationale: El estado resultante se expresa naturalmente en español con “tener hambre”. “Estamos hambrientos” es posible, pero “tenemos hambre” es más idiomático y claro.
- source_word: וַיֵּצְאוּ מִן הַמַּחֲנֶה
  english_pob_choice: they have gone out from the camp
  chosen_spanish: han salido del campamento
  alternatives_spanish:
  - salieron del campamento
  - han dejado el campamento
  lexicon: HALOT
  rationale: El presente perfecto en español refleja una acción reciente con relevancia inmediata, tal como el inglés audit trail. “Campamento” hace visible el contexto militar del encargo.
- source_word: לְהֵחָבֵה
  english_pob_choice: to hide themselves
  chosen_spanish: para esconderse
  alternatives_spanish:
  - para ocultarse
  - para esconderse a sí mismos
  lexicon: HALOT
  rationale: El infinitivo reflexivo comunica el valor de ocultamiento de forma natural en español. “Esconderse” es más idiomático que una glosa reflexiva explícita.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el llano
  - en la campiña
  lexicon: HALOT
  rationale: Aunque el inglés usa “field”, en español “campo” comunica mejor el espacio abierto fuera de la ciudad y sirve bien al contexto de emboscada.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - pensando
  - con estas palabras
  lexicon: HALOT
  rationale: Marca el contenido citado del plan de los arameos; “diciendo” conserva la función discursiva sin sobreinterpretar como mera intención.
- source_word: כִּי יֵצְאוּ מִן הָעִיר
  english_pob_choice: When they come out from the city
  chosen_spanish: Cuando salgan de la ciudad
  alternatives_spanish:
  - Si salen de la ciudad
  - Cuando salgan fuera de la ciudad
  lexicon: HALOT
  rationale: La cláusula introduce la circunstancia esperada del plan. “Cuando salgan” capta mejor la referencia a una salida prevista que un condicional, y “de la ciudad” es la formulación natural en español.
- source_word: וְנִתְפְּשֵׂם חַיִּים
  english_pob_choice: we will seize them alive
  chosen_spanish: los tomaremos vivos
  alternatives_spanish:
  - los capturaremos vivos
  - los aprehenderemos vivos
  lexicon: HALOT
  rationale: תפשׂ implica tomar/apresar con fuerza. “Tomarlos vivos” conserva el valor de captura sin cargar el español con tecnicismos; el adverbial “vivos” reproduce חַיִּים.
- source_word: וְאֶל הָעִיר נָבֹא
  english_pob_choice: and enter the city
  chosen_spanish: entraremos en la ciudad
  alternatives_spanish:
  - iremos a la ciudad
  - entraremos a la ciudad
  lexicon: HALOT
  rationale: בוא con אֶל expresa movimiento hacia/ingreso en la ciudad. “Entraremos en la ciudad” es la forma más natural y precisa en español.
theological_decisions:
- issue: Tratamiento de ארם (Aram)
  english_pob_reading: Aram as a place/name for the people or army of Aram, with a footnoted alternative 'the Arameans'
  chosen_spanish_reading: Aram en el texto principal, con nota que aclara que puede referirse a los arameos o al ejército de Aram
  alternative_spanish_readings:
  - los arameos
  - Siria
  rationale: Se mantiene el nombre propio fuente “Aram” para respetar el criterio POB y la ambigüedad documentada. La nota preserva la alternativa etnopolítica sin reemplazar el nombre por un equivalente tradicional no solicitado por la fuente.
  doctrine_reference: N/A
- issue: Reproducción del carácter hostil de la acción
  english_pob_reading: what Aram has done to us
  chosen_spanish_reading: lo que Aram ha hecho contra nosotros
  alternative_spanish_readings:
  - lo que Aram ha hecho con nosotros
  rationale: El hebreo y el contexto narrativo implican daño hostil; “contra nosotros” deja visible esa tensión sin ampliar más allá del texto. La alternativa “con nosotros” sería más ambigua y menos acorde al contexto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente, que prefirió un registro más formal (“arose”) y eliminó un “we will” redundante antes de “enter the city”. En español, mantuve un registro digno con “se levantó” y conservé la segunda acción sin repetir un auxiliar innecesario: “entraremos en la ciudad”.'
  spanish_consistency_notes:
  - Se preserva “Aram” como nombre propio, coherente con la política POB y con la nota de alternativa étnica.
  - Se evita “SEÑOR” o vocabulario de máscara teológica, pues el versículo no contiene el nombre divino.
  - Se usa “siervos” para עֲבָדָיו por ser el equivalente más directo y transparente en el contexto de la corte real.
  - La cita interna se ajusta a la puntuación española y mantiene la secuencia narrativa del hebreo sin añadir información interpretativa.
