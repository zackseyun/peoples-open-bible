translation:
  language: es
  text: Ponlo a trabajar como le conviene; y si no obedece, haz pesados sus grillos. Pero no te excedas con ninguna carne[a], y no hagas nada sin juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con cualquier persona». El griego dice literalmente «con toda carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἔργα κατάστησον
  english_pob_choice: Set him to work
  chosen_spanish: Colócalo para el trabajo
  alternatives_spanish:
  - Ponlo a trabajar
  - Asígnalo al trabajo
  lexicon: LSJ
  rationale: κατάστησον expresa poner o establecer en una función, y εἰς ἔργα añade la esfera del trabajo. «Colócalo para el trabajo» conserva la fuerza directiva sin volver el texto más duro o más interpretativo de lo necesario.
- source_word: καθὼς πρέπει αὐτῷ
  english_pob_choice: as is fitting for him
  chosen_spanish: como conviene a él
  alternatives_spanish:
  - como es apropiado para él
  - como le corresponde
  lexicon: LSJ
  rationale: πρέπει comunica lo que es debido o adecuado. «Conviene» mantiene la idea de conveniencia moral y práctica con un español natural.
- source_word: κἂν μὴ πειθαρχῇ
  english_pob_choice: if he does not obey
  chosen_spanish: si no obedece
  alternatives_spanish:
  - si no se somete
  - si no acata
  lexicon: LSJ
  rationale: πειθαρχῇ aquí exige una obediencia a autoridad o mandato; la revisión inglesa descartó añadir «disciplina». «Obedece» es la opción más directa y fiel en español.
- source_word: βάρυνον τὰς πέδας αὐτοῦ
  english_pob_choice: make his fetters heavy
  chosen_spanish: pon pesadas sus cadenas
  alternatives_spanish:
  - haz pesados sus grillos
  - aprieta sus cadenas
  lexicon: LSJ
  rationale: πέδας designa ataduras de restricción; en español «cadenas» comunica la imagen de sujeción con claridad. «Pesadas» conserva βάρυνον sin introducir una imagen ajena.
- source_word: μὴ περισσεύσῃς
  english_pob_choice: do not be excessive
  chosen_spanish: no te excedas
  alternatives_spanish:
  - no vayas más allá
  - no hagas excesos
  lexicon: LSJ
  rationale: περισσεύσῃς indica excederse o sobrepasar la medida. «No te excedas» es idiomático y mantiene la prohibición de ir más allá de lo debido.
- source_word: ἐν πάσῃ σαρκί
  english_pob_choice: with any flesh
  chosen_spanish: con ninguna carne
  alternatives_spanish:
  - con toda carne
  - con cualquier carne
  lexicon: LSJ
  rationale: El griego dice literalmente «en toda carne». Para conservar la tensión del original, se mantiene «carne» en el cuerpo del texto; el español requiere ajuste preposicional natural. No se sustituye por «persona» en el texto principal porque la POB inglesa retuvo la literalidad.
- source_word: ἄνευ κρίσεως
  english_pob_choice: without judgment
  chosen_spanish: sin juicio
  alternatives_spanish:
  - sin discernimiento
  - sin decisión
  lexicon: LSJ
  rationale: κρίσις puede ser juicio, decisión o discernimiento. «Sin juicio» reproduce de forma breve y fiel el valor ético de actuar sin evaluación justa.
- source_word: μὴ ποιήσῃς μηδέν
  english_pob_choice: do nothing
  chosen_spanish: no hagas nada
  alternatives_spanish:
  - no hagas absolutamente nada
  - no realices nada
  lexicon: LSJ
  rationale: La doble negación se vierte naturalmente como prohibición absoluta en español. «No hagas nada» conserva la fuerza completa del mandato.
theological_decisions:
- issue: Lenguaje coercitivo de disciplina y sujeción
  english_pob_reading: Retain the text's direct instructions about labor, obedience, and fetters without softening them into generic service language.
  chosen_spanish_reading: Mantener las instrucciones directas sobre trabajo, obediencia y cadenas, sin suavizarlas a un lenguaje de servicio genérico.
  alternative_spanish_readings:
  - Hacerlo más eufemístico con «siervo» y «restricción»
  - Reformular para centrar solo la corrección moral
  rationale: El griego habla de trabajo impuesto y de ataduras físicas. En español conviene preservar esa aspereza textual y no domesticarla, para respetar la transparencia del texto fuente.
  doctrine_reference: Principio POB de primacía del original y preservación de tensiones textuales; no parafrasear más allá de la evidencia.
- issue: Sentido de πάσῃ σαρκί
  english_pob_reading: Translate literally as 'any flesh' in the main text, preserving the anthropological wording.
  chosen_spanish_reading: Traducir de forma literal-concreta con «carne», manteniendo la amplitud antropológica del giro.
  alternative_spanish_readings:
  - con cualquier persona
  - con cualquier ser humano
  rationale: Aunque la frase puede referirse idiomáticamente a seres humanos, el griego usa σάρξ. Mantener «carne» conserva la textura del original y evita resolver una ambigüedad que el texto deja en pie.
  doctrine_reference: Principio POB de preservar la tensión léxica y no borrar el lenguaje concreto del original.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que corrigió la cláusula de πειθαρχῇ para no añadir «disciplina» explícitamente. También conserva la decisión del POB inglés de mantener la literalidad de σάρξ con una nota alternativa en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «carne» en el texto principal para reflejar σάρξ, con nota que ofrece la alternativa idiomática.
  - «Cadenas» funciona como equivalente natural de πέδας en español, sin perder la idea de restricción física.
  - El tono es sobrio y normativo, acorde con la sabiduría ética de Sirácides.
