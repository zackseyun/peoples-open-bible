translation:
  language: es
  text: Adina hijo de Siza, el rubenita, jefe de los rubenitas, y con él había treinta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y sobre él eran treinta». La preposición hebrea puede leerse de modo más literal, pero en esta lista militar probablemente significa que treinta hombres estaban adscritos a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדִינָא
  english_pob_choice: Adina
  chosen_spanish: Adina
  alternatives_spanish:
  - Adiná
  lexicon: nombre propio
  rationale: Es un nombre propio; se translitera al español para conservar la forma hebrea sin intentar traducirlo.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una lista genealógica y militar, בן expresa filiación directa; «hijo de» es natural y fiel en español.
- source_word: שִׁיזָא
  english_pob_choice: Shiza
  chosen_spanish: Siza
  alternatives_spanish:
  - Shiza
  lexicon: nombre propio
  rationale: Se conserva el nombre propio; en español la adaptación con S inicial refleja mejor la pronunciación probable y evita el grupo sh no usual en la ortografía común.
- source_word: הָרְאוּבֵנִי
  english_pob_choice: the Reubenite
  chosen_spanish: el rubenita
  alternatives_spanish:
  - el rubenita
  - el de Rubén
  lexicon: HALOT
  rationale: El gentilicio con artículo señala afiliación tribal. «Rubenita» mantiene la forma de pertenencia tribal sin convertirla en una perífrasis más larga.
- source_word: רֹאשׁ
  english_pob_choice: a chief
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - líder
  lexicon: HALOT
  rationale: En este contexto de lista militar, רֹאשׁ denota rango o dirección; «jefe» comunica bien la función sin sonar excesivamente técnico.
- source_word: לָרְאוּבֵנִי
  english_pob_choice: of the Reubenites
  chosen_spanish: de los rubenitas
  alternatives_spanish:
  - para los rubenitas
  - perteneciente a los rubenitas
  lexicon: HALOT
  rationale: La relación expresada por ל en esta construcción se entiende mejor como pertenencia/supervisión tribal; «de los rubenitas» reproduce la relación de jefatura de modo natural.
- source_word: וְעָלָיו
  english_pob_choice: and with him were
  chosen_spanish: y con él eran
  alternatives_spanish:
  - y sobre él eran
  - y encima de él eran
  lexicon: HALOT
  rationale: El POB inglés opta por el sentido contextual de adjunción de hombres a Adina en la lista militar. En español, «con él eran» conserva ese valor sin imponer un literalismo engañoso; el matiz más literal se preserva en la nota.
- source_word: שְׁלוֹשִׁים
  english_pob_choice: thirty
  chosen_spanish: treinta
  alternatives_spanish:
  - treinta hombres
  lexicon: HALOT
  rationale: El número cardinal se traduce directamente; el sustantivo «hombres» se sobreentiende por el contexto de la lista militar.
translation_notes:
  revision_awareness: El texto base y la lectura inglesa auditada muestran alta concordancia; no se introducen revisiones sustantivas. Se conserva la decisión contextual sobre וְעָלָיו como referencia a hombres asociados a Adina, con nota para la posibilidad literal alternativa.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio sin traducir: Adina.'
  - Se usa «rubenita/rubenitas» como gentilicio tribal uniforme.
  - Se conserva la relación militar contextual de «con él eran treinta» en el cuerpo, con la alternativa literal en nota.
  - El español adopta una sintaxis breve y de registro bíblico moderno, sin calcos innecesarios.
