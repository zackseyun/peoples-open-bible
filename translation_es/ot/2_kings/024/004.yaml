translation:
  language: es
  text: y también por la sangre inocente que había derramado[a], porque había llenado Jerusalén de sangre inocente, y Yahvé no quiso perdonar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sangre del inocente».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé no perdonaría».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: Conserva el valor aditivo y conjuntivo del hebreo. En español, «y también» suena natural y refleja que este motivo se suma a los anteriores.
- source_word: דַּם הַנָּקִי
  english_pob_choice: the innocent blood
  chosen_spanish: la sangre inocente
  alternatives_spanish:
  - la sangre del inocente
  - sangre inocente
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática para sangre derramada injustamente. «La sangre inocente» mantiene la carga acusatoria y la referencia a homicidio injusto sin explicitar más de lo que dice el texto.
- source_word: אֲשֶׁר שָׁפָךְ
  english_pob_choice: that he had shed
  chosen_spanish: que había derramado
  alternatives_spanish:
  - que derramó
  - que había vertido
  lexicon: HALOT
  rationale: Con sangre, «derramar» es el equivalente español natural de שׁפך. El pluscuamperfecto expresa el trasfondo retrospectivo del juicio en el contexto narrativo.
- source_word: וַיְמַלֵּא אֶת יְרוּשָׁלִַם דָּם נָקִי
  english_pob_choice: for he had filled Jerusalem with innocent blood
  chosen_spanish: porque había llenado Jerusalén de sangre inocente
  alternatives_spanish:
  - y había llenado Jerusalén de sangre inocente
  - pues había llenado Jerusalén de sangre inocente
  lexicon: HALOT
  rationale: El hebreo usa «llenó Jerusalén [de] sangre inocente». En español, «llenar de» reproduce la relación semántica con naturalidad. «Porque» mantiene el valor explicativo de la cláusula respecto al juicio.
- source_word: וְלֹא אָבָה
  english_pob_choice: and ... was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estaba dispuesto a
  - no fue de su voluntad
  lexicon: HALOT
  rationale: אָבָה denota voluntad o disposición. «No quiso» es breve, idiomático y fiel, sin suavizar la negativa divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrama se vierte como «Yahvé» en el texto principal, preservando el nombre divino sin sustitución por un título.'
- source_word: לִסְלֹחַ
  english_pob_choice: to forgive
  chosen_spanish: perdonar
  alternatives_spanish:
  - perdonar del todo
  - absolver
  lexicon: HALOT
  rationale: סלח en contextos divinos corresponde a «perdonar». Es la opción española más clara y fiel para la negativa de Yahvé a conceder perdón.
theological_decisions:
- issue: La negativa divina al perdón en el marco de sangre inocente acumulada
  english_pob_reading: The verse states that because of the innocent bloodshed filling Jerusalem, Yahweh was not willing to forgive at this point.
  chosen_spanish_reading: El versículo afirma que, debido a la sangre inocente derramada que llenó Jerusalén, Yahvé no quiso perdonar.
  alternative_spanish_readings:
  - Yahvé no estaba dispuesto a perdonar
  - Yahvé no quiso perdonar en ese momento
  rationale: La redacción mantiene la tensión judicial del texto sin rebajarla ni resolverla. «No quiso perdonar» preserva la fuerza de la negativa divina y su relación causal con la sangre inocente.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el texto español sigue de cerca la decisión auditada y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se conserva «sangre inocente» de manera consistente para דם נָקִי.
  - Se emplea un registro sobrio y bíblico en español moderno, sin caer en calcos forzados.
