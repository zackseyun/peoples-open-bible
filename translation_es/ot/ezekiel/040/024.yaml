translation:
  language: es
  text: Entonces me llevó por el camino del sur, y allí había una puerta orientada al sur[a]. Midió sus pilares laterales[b] y su pórtico según estas mismas medidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la puerta correspondía en sus dimensiones a las descritas antes.
    reason: cross_reference
  - marker: b
    text: O, más técnicamente, «sus jambas». El término arquitectónico hebreo probablemente se refiere a las estructuras laterales de sostén de la puerta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלִכֵנִי
  english_pob_choice: Then he led me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Entonces me condujo
  lexicon: HALOT
  rationale: El hebreo expresa causación de movimiento en narrativa; «me llevó» conserva el sentido directo y natural en español, mientras que «Entonces» refleja la secuencia discursiva del waw narrativo sin sobrecargar la frase.
- source_word: דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: by way of the south
  chosen_spanish: por el camino del sur
  alternatives_spanish:
  - hacia el sur
  - por la vía del sur
  lexicon: HALOT
  rationale: Se mantiene la imagen de «camino» del hebreo דֶּרֶךְ, en vez de reducirlo a una simple dirección; «del sur» preserva el valor espacial repetido en la visión.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y vi que había
  alternatives_spanish:
  - y he aquí
  - y he aquí que había
  lexicon: HALOT
  rationale: En español, «y vi que había» comunica la fuerza deíctica de atención del hebreo en un registro más natural que un calco rígido; la sorpresa o descubrimiento del profeta queda implícita en el contexto visionario.
- source_word: שַׁעַר דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: a gate facing south
  chosen_spanish: una puerta orientada al sur
  alternatives_spanish:
  - una puerta hacia el sur
  - una puerta que daba al sur
  lexicon: HALOT
  rationale: «Orientada al sur» expresa la función arquitectónica de ubicación sin añadir elementos ajenos; «puerta» es el equivalente español más natural para el acceso del templo, manteniendo el contexto de visión.
- source_word: אֵילוֹ
  english_pob_choice: its side pillars
  chosen_spanish: sus jambas
  alternatives_spanish:
  - sus pilares laterales
  - sus montantes
  lexicon: HALOT
  rationale: El término hebreo designa los apoyos laterales de la entrada; «jambas» es el equivalente arquitectónico más preciso en español y preserva mejor la posible tensión técnica que la traducción inglesa resolvió como «side pillars».
- source_word: וְאֵילַמּוֹ
  english_pob_choice: its porch
  chosen_spanish: su pórtico
  alternatives_spanish:
  - su vestíbulo
  - su portal
  lexicon: HALOT
  rationale: En el lenguaje arquitectónico del templo, אֵילָם se refiere a la estructura frontal de acceso; «pórtico» conserva la precisión técnica y resulta más fiel que un término demasiado doméstico como «porche».
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  english_pob_choice: according to these measurements
  chosen_spanish: según estas mismas medidas
  alternatives_spanish:
  - con estas mismas medidas
  - conforme a estas medidas
  lexicon: HALOT
  rationale: «Según» reproduce bien la conformidad comparativa del hebreo, y «estas mismas medidas» refleja la referencia retrospectiva a las dimensiones ya descritas, como señala la nota inglesa.
translation_notes:
  revision_awareness: 'Se respetó el estado sin revisiones aplicado del contexto inglés más reciente: no se incorporaron cambios editoriales posteriores ni se alteró la equivalencia consensuada del pasaje. Se ajustó únicamente la formulación española para expresar con naturalidad la misma lectura auditada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se usó «jambas» en el cuerpo del texto porque el hebreo arquitectónico es más técnico que «pilares laterales», pero se conservó la alternativa en nota por transparencia.
  - «Puerta» se prefirió a «portal» o «entrada» para evitar perder la referencia concreta al acceso del complejo en la visión.
  - La repetición de «sur» y la alusión a «estas mismas medidas» preservan la coherencia espacial y métrica del contexto inmediato.
