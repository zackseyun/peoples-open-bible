lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: HALOT
  rationale: Es el verbo narrativo estándar para אמר en una introducción de discurso directo. «Dijo» mantiene la sencillez y la fluidez de la secuencia narrativa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Conserva el sustantivo definido sin añadir el nombre propio, como en el hebreo y en el audit trail inglés.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: Imperativo natural de הלך en español. «Ve» es claro, digno y fiel al mandato breve del original.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: HALOT
  rationale: El hebreo expresa una despedida o bendición idiomática. «En paz» reproduce bien la fórmula sin añadir matices ajenos.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: La acción narrativa de קום se expresa naturalmente en español con «se levantó», que preserva el orden secuencial sin sonar arcaico.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: Para un movimiento narrativo desde un lugar, «se fue» comunica bien la salida y mantiene la naturalidad del español contemporáneo.
- source_word: חֶבְרוֹנָה
  english_pob_choice: to Hebron
  chosen_spanish: a Hebrón
  alternatives_spanish:
  - hacia Hebrón
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia la ciudad; en español se expresa normalmente con la preposición «a».
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios de sentido; la versión española conserva la misma secuencia narrativa, el imperativo de despedida y el destino geográfico sin añadir notas textuales o doctrinales.
  spanish_consistency_notes:
  - Se mantiene «rey» sin explicitar David, siguiendo el hebreo y el texto inglés auditado.
  - Se conserva la fórmula breve de despedida «Ve en paz» como equivalente idiomático de בְּשָׁלוֹם.
  - No se introduce terminología eclesiástica ni paráfrasis explicativa.
