translation:
  language: es
  text: Y ciertamente pediré cuenta de su sangre por sus vidas[a]. De mano de toda bestia pediré cuenta de ella[b], y de mano del hombre—de mano del hermano de cada uno[c]—pediré cuenta de la vida del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su sangre, por sus vidas». El hebreo relaciona literalmente la sangre con la vida; «por sus vidas» traduce esa relación sin introducir «alma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pediré cuenta de ello». El verbo puede llevar el matiz de exigir una rendición de cuentas por la sangre derramada.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «de mano del hombre, de mano de un hombre, su hermano». La expresión subraya la responsabilidad humana por la vida de otro ser humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַךְ
  english_pob_choice: And surely
  chosen_spanish: Y ciertamente
  alternatives_spanish:
  - Pero ciertamente
  - Ciertamente
  lexicon: HALOT
  rationale: אַךְ aporta una fuerza enfática de restricción o énfasis; en español, «ciertamente» comunica bien esa certeza solemne, y la «y» conserva la conexión del וְ inicial sin volver la frase rígida.
- source_word: דִּמְכֶם לְנַפְשֹׁתֵיכֶם
  english_pob_choice: your blood for your lives
  chosen_spanish: su sangre por sus vidas
  alternatives_spanish:
  - su sangre para sus vidas
  - su sangre, por sus vidas
  lexicon: HALOT
  rationale: El hebreo vincula sangre y vida de manera directa. En español, «su sangre por sus vidas» mantiene la relación semántica sin añadir una glosa como «sangre vital». Se opta por no usar «alma», porque aquí נֶפֶשׁ expresa vida concreta en contexto judicial.
- source_word: אֶדְרֹשׁ
  english_pob_choice: I will require
  chosen_spanish: pediré cuenta
  alternatives_spanish:
  - exigiré
  - requeriré
  - pediré cuentas
  lexicon: HALOT
  rationale: En este contexto forense, דרשׁ tiene valor de exigir responsabilidad por derramamiento de sangre. «Pediré cuenta» conserva el matiz judicial de rendición de cuentas mejor que un simple «requeriré» en español natural.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de mano de
  alternatives_spanish:
  - de la mano de
  - por mano de
  lexicon: HALOT
  rationale: La fórmula hebrea es un modismo de agencia y responsabilidad. «De mano de» conserva la estructura idiomática y el paralelismo repetido del versículo, aunque suene más bíblico que idiomático.
- source_word: כָּל חַיָּה
  english_pob_choice: every beast
  chosen_spanish: toda bestia
  alternatives_spanish:
  - todo animal
  - toda criatura viviente
  lexicon: HALOT
  rationale: חַיָּה aquí contrasta con הָאָדָם, por lo que «bestia» preserva el contraste solemne y la fuerza legal del pasaje. «Animal» sería más neutro, pero menos marcado.
- source_word: אֶדְרְשֶׁנּוּ
  english_pob_choice: I will require it
  chosen_spanish: pediré cuenta de ella
  alternatives_spanish:
  - lo pediré
  - pediré cuenta de eso
  - lo exigiré
  lexicon: HALOT
  rationale: El sufijo retoma la sangre/lifeblood mencionada previamente. «De ella» en español hace explícito el antecedente femenino de «sangre» y mantiene el sentido de requerir rendición de cuentas por esa sangre.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El singular representa a la humanidad en contraste con las bestias, pero el hebreo usa אָדָם con valor singular representativo. «El hombre» conserva esa forma y el paralelo con la primera mención.
- source_word: אִישׁ אָחִיו
  english_pob_choice: each man's brother
  chosen_spanish: de cada uno de su hermano
  alternatives_spanish:
  - de su hermano
  - de cada hombre, su hermano
  - de cada hombre su hermano
  lexicon: HALOT
  rationale: 'La estructura hebrea es compacta y apposicional: «de mano del hombre, de mano del hombre, su hermano». En español, «de cada uno de su hermano» mantiene la idea distributiva y fraternal, aunque no reproduzca de manera literal cada palabra. Se deja sin suavizar a «fellow man» para conservar el lazo de parentesco y la tensión ética.'
- source_word: נֶפֶשׁ הָאָדָם
  english_pob_choice: the life of the man
  chosen_spanish: la vida del hombre
  alternatives_spanish:
  - el alma del hombre
  - la vida humana
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí significa vida, no un alma separada. «La vida del hombre» preserva la concreción del juicio por homicidio y evita introducir una antropología ajena al contexto inmediato.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de sangre derramada
  english_pob_reading: Render נֶפֶשׁ as 'life' rather than 'soul'
  chosen_spanish_reading: Traducir נֶפֶשׁ como «vida», no como «alma»
  alternative_spanish_readings:
  - alma
  - alma viviente
  rationale: El pasaje enlaza sangre y vida de modo forense; el foco está en la responsabilidad por quitar vida. «Alma» en español podría sugerir una lectura más metafísica que el hebreo aquí no exige. «Vida» conserva el sentido inmediato y la fuerza legal del texto.
  doctrine_reference: 'Principio de traducción: no importar distinciones doctrinales ajenas al contexto cuando el hebreo habla concretamente de vida derramada.'
- issue: Uso de אָדָם en singular representativo
  english_pob_reading: Use 'man' in representative singular contexts
  chosen_spanish_reading: Usar «el hombre» en singular representativo
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  - los humanos
  rationale: El contraste con la bestia y la repetición de la cadena de responsabilidad favorecen un singular representativo. «El hombre» preserva la forma del hebreo y la progresión argumental del versículo.
  doctrine_reference: 'Contested terms table: אָדָם → man / humankind (context).'
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión del inglés que unió en una sola cláusula las frases de responsabilidad («from the hand of man—from the hand of each man's brother—»), y por eso la versión española también mantiene el inciso fraternal como aposición dentro de una sola oración. Asimismo, se evita una redundancia equivalente a «sangre por sus vidas» con glosa innecesaria, procurando una equivalencia óptima sin perder la relación hebrea sangre-vida.
  spanish_consistency_notes:
  - Se mantiene «pediré cuenta» para דרשׁ en contexto judicial, coherente con el tono forense del pasaje.
  - Se usa «de mano de» para reproducir el modismo repetido de מִיַּד y conservar el paralelismo.
  - Se traduce נֶפֶשׁ como «vida» de manera consistente con el contexto de sangre y homicidio.
  - Se conserva «el hombre» para אָדָם en singular representativo, evitando neutralizar el contraste con «bestia».
