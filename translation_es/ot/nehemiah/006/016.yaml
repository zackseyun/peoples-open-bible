translation:
  language: es
  text: Y aconteció que, cuando oyeron todos nuestros enemigos, y vieron todas las naciones que estaban a nuestro alrededor, cayeron mucho ante sus propios ojos[a], y supieron que esta obra había sido hecha por nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «perdieron mucha confianza en sí mismos»; «quedaron muy abatidos en su propia opinión». El hebreo conserva la imagen de caer ante los propios ojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: Mantiene la fórmula narrativa de transición sin una calca dura. 'Aconteció' conserva el valor idiomático del hebreo con registro bíblico natural en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - así como
  - al momento en que
  lexicon: HALOT
  rationale: Introduce de forma clara la cláusula temporal, sin añadir una precisión que el hebreo no exige.
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: '''Oyeron'' reproduce de manera directa el verbo de percepción auditiva. El contexto ya indica el contenido de lo oído.'
- source_word: כָּל אֹיְבֵינוּ
  english_pob_choice: all our enemies
  chosen_spanish: todos nuestros enemigos
  alternatives_spanish:
  - todos los enemigos que teníamos
  - todos nuestros adversarios
  lexicon: HALOT
  rationale: Equivale de modo directo a la construcción con sufijo posesivo y conserva la referencia comunitaria.
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - percibieron
  - observaron
  lexicon: HALOT
  rationale: El verbo común 'ver' preserva la simplicidad léxica del hebreo y el paralelismo con 'oyeron'.
- source_word: כָּל הַגּוֹיִם אֲשֶׁר סְבִיבֹתֵינוּ
  english_pob_choice: all the nations around us
  chosen_spanish: todas las naciones que estaban alrededor de nosotros
  alternatives_spanish:
  - todos los pueblos que nos rodeaban
  - todas las naciones alrededor de nosotros
  lexicon: HALOT
  rationale: '''Naciones'' traduce גּוֹיִם con valor contextual de pueblos circundantes, evitando una lectura teológica posterior de ''gentiles''. La relativa explicita la relación espacial implícita en el hebreo.'
- source_word: וַיִּפְּלוּ מְאֹד בְּעֵינֵיהֶם
  english_pob_choice: they fell greatly in their own eyes
  chosen_spanish: cayeron mucho en su propia estima
  alternatives_spanish:
  - fueron muy abatidos en su propia opinión
  - perdieron mucha confianza en sí mismos
  lexicon: HALOT
  rationale: La imagen hebrea de 'caer en sus ojos' se conserva mediante una expresión española inteligible que mantiene el sentido de humillación o pérdida de estima. 'Su propia estima' retiene el componente reflexivo sin borrar la tensión idiomática.
- source_word: וַיֵּדְעוּ
  english_pob_choice: and they knew
  chosen_spanish: y entendieron
  alternatives_spanish:
  - y supieron
  - y reconocieron
  lexicon: HALOT
  rationale: Aquí 'entendieron' comunica el reconocimiento resultante de los hechos observados. En español fluye bien con el contenido declarativo que sigue, sin perder la noción de certeza cognitiva.
- source_word: מֵאֵת אֱלֹהֵינוּ
  english_pob_choice: by our God
  chosen_spanish: por nuestro Dios
  alternatives_spanish:
  - de parte de nuestro Dios
  - por obra de nuestro Dios
  lexicon: HALOT
  rationale: La preposición hebrea expresa fuente o agencia. 'Por nuestro Dios' es la forma más natural en español para atribuir el hecho a la acción divina, sin desplazar el matiz de procedencia/causación.
- source_word: נֶעֶשְׂתָה
  english_pob_choice: had been done
  chosen_spanish: había sido hecha
  alternatives_spanish:
  - había sido realizada
  - había sido llevada a cabo
  lexicon: HALOT
  rationale: El pasivo refleja el nifal y mantiene el perfecto resultativo. 'Hecha' concuerda con 'obra' y conserva la voz pasiva sin sobreexplicar el proceso.
- source_word: הַמְּלָאכָה הַזֹּאת
  english_pob_choice: this work
  chosen_spanish: esta obra
  alternatives_spanish:
  - este trabajo
  - esta tarea
  lexicon: HALOT
  rationale: '''Obra'' funciona bien en español para el proyecto de reconstrucción y conserva un tono digno. Es preferible a ''trabajo'', que suena más cotidiano, y a ''tarea'', que puede estrechar el sentido.'
theological_decisions:
- issue: Atribución de la obra terminada a la acción de Dios
  english_pob_reading: by our God
  chosen_spanish_reading: por nuestro Dios
  alternative_spanish_readings:
  - de parte de nuestro Dios
  - por obra de nuestro Dios
  rationale: El texto atribuye explícitamente la realización de la obra a Dios. 'Por nuestro Dios' mantiene la agencia divina sin introducir una formulación más interpretativa que 'por obra de', y sin borrar el matiz causal reconocido en el audit trail inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés, sin cambios sustanciales respecto a la lectura estable: la cláusula temporal, la referencia a las naciones circundantes, el modismo de caer en su propia estima y la agencia divina se preservan en español con equivalentes naturales y transparentes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se eligió «obra» para הַמְּלָאכָה por coherencia con el proyecto de reconstrucción y con el registro bíblico español.
  - Se mantuvo «naciones» para גּוֹיִם conforme al valor contextual del texto, sin introducir «gentiles».
  - Se conservó la imagen del hebreo en el modismo de «caer» y se explicó la alternativa en nota para no perder la tensión lexical.
