translation:
  language: es
  text: un hombre de doble ánimo[a], inestable en todos sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona de doble ánimo, inestable en todos sus propios caminos». El griego es masculino singular, pero probablemente tiene fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: El griego usa un sustantivo masculino singular con fuerza representativa. En español, «hombre» conserva esa forma y su alcance genérico natural en este contexto, sin neutralizar el rasgo gramatical del original. «Persona» sería posible, pero perdería la correspondencia formal destacada por la POB inglesa.
- source_word: δίψυχος
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de dos almas
  - dividido en su interior
  - de mente dividida
  lexicon: BDAG
  rationale: La imagen literal sugiere duplicidad interior; en español, «de doble ánimo» es una expresión bíblica y comunicable que preserva la tensión entre una voluntad dividida y una lealtad inconstante. «De dos almas» resulta más literal pero menos natural; «de mente dividida» desplaza demasiado el matiz hacia lo cognitivo.
- source_word: ἀκατάστατος
  english_pob_choice: unstable
  chosen_spanish: inestable
  alternatives_spanish:
  - inconstante
  - inquieto
  - sin firmeza
  lexicon: BDAG
  rationale: «Inestable» reproduce bien la idea de falta de firmeza y fiabilidad en la conducta. «Inconstante» también es viable, pero puede sonar más a variación emocional; «inestable» se ajusta mejor a la amplitud de la vida descrita por «en todos sus caminos».
- source_word: ἐν πάσαις ταῖς ὁδοῖς αὐτοῦ
  english_pob_choice: in all his ways
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - en todos sus pasos
  - en toda su conducta
  - en todas sus sendas
  lexicon: BDAG
  rationale: «Caminos» conserva la metáfora hebreo-bíblica de ὁδοῖς para el patrón completo de vida y conducta. «Conducta» explicita el sentido, pero ya interpreta; «caminos» mantiene la imagen con buena naturalidad en español.
theological_decisions:
- issue: Lenguaje masculino con valor representativo
  english_pob_reading: Retain 'man' in the main text; masculine singular is representative, not restricted to males.
  chosen_spanish_reading: Mantener «hombre» en el texto principal, con valor representativo.
  alternative_spanish_readings:
  - una persona de doble ánimo, inestable en todos sus caminos
  rationale: La POB inglesa conservó la forma masculina del griego para respetar la referencia gramatical y su fuerza representativa. En español, «hombre» cumple esa misma función sin exigir una neutralización que borre el marcador formal del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente indicada en el expediente: no se registran cambios pendientes y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita del tetragrama.
  - Se mantiene la metáfora de «caminos» para conservar la imagen de conducta total.
  - «Doble ánimo» conserva la tensión semántica de δίψυχος sin volverlo una paráfrasis explicativa.
