id: ISA.53.3
reference: Isaiah 53:3
source:
  edition: WLC
  text: נִבְזֶה֙ וַ/חֲדַ֣ל אִישִׁ֔ים אִ֥ישׁ מַכְאֹב֖וֹת וִ/יד֣וּעַ חֹ֑לִי וּ/כְ/מַסְתֵּ֤ר פָּנִים֙ מִמֶּ֔/נּוּ נִבְזֶ֖ה וְ/לֹ֥א חֲשַׁבְנֻֽ/הוּ׃
translation:
  text: He was despised and rejected by men[a], a man of pains and acquainted with sickness; and like one from whom people hide their faces, he was despised[d][c][b], and we did not esteem him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rejected by men.' The Hebrew phrase is difficult; the traditional rendering emphasizes social repudiation, while 'forsaken by men' more directly reflects the underlying wording.
    reason: alternative_reading
  - marker: b
    text: Or 'a man of sorrows.'
    reason: lexical_alternative
  - marker: c
    text: Or 'acquainted with grief.' More literally, 'acquainted with sickness/illness.'
    reason: lexical_alternative
  - marker: d
    text: 'The Hebrew is elliptical: ''like a hiding of faces from him.'' The sense is that people turned their faces away from him.'
    reason: cultural_note
lexical_decisions:
- source_word: נִבְזֶה
  chosen: despised
  alternatives:
  - held in contempt
  - scorned
  lexicon: HALOT
  rationale: The Niphal participle from בזה denotes being despised or treated with contempt. 'Despised' is concise, natural English and preserves the passive/resultative sense.
- source_word: חֲדַל אִישִׁים
  chosen: forsaken by men
  alternatives:
  - rejected by men
  - lacking men
  - ceased from men
  lexicon: HALOT
  rationale: The phrase is difficult. While many traditional translations render 'rejected by men,' the underlying adjective/participle from חדל more basically suggests being lacking, left, or forsaken in relation to men. 'Forsaken by men' best captures social abandonment in idiomatic English without over-paraphrasing. 'Rejected by men' is preserved as an alternative because of strong translation tradition and contextual fit.
- source_word: אִישׁ מַכְאֹבוֹת
  chosen: a man of pains
  alternatives:
  - a man of sorrows
  - a man of suffering
  lexicon: HALOT
  rationale: מַכְאֹב denotes pain, sorrow, or suffering. 'Pains' is more concrete and closer to the lexical sense than the traditional 'sorrows,' while still allowing emotional and bodily dimensions. The traditional rendering is preserved in a footnote because of its prominence and possible contextual resonance.
- source_word: וִידוּעַ חֹלִי
  chosen: acquainted with sickness
  alternatives:
  - knowing sickness
  - acquainted with grief
  - familiar with disease
  lexicon: HALOT
  rationale: The passive participle of ידע with חֹלִי indicates one known by or acquainted with sickness/illness. 'Acquainted with sickness' is idiomatic and close to the Hebrew. 'Grief' is less precise lexically here, though contextually possible in some traditions.
- source_word: וּכְמַסְתֵּר פָּנִים מִמֶּנּוּ
  chosen: like one from whom people hide their faces
  alternatives:
  - as one hiding faces from us
  - like a hiding of faces from him
  lexicon: HALOT
  rationale: The construction is elliptical and debated. The sense is that he was treated as someone so repulsive or shameful that faces were hidden from him. Supplying 'people' makes the English readable while preserving the implied human subject. The preposition מִן supports 'from whom.'
- source_word: וְלֹא חֲשַׁבְנֻהוּ
  chosen: we did not esteem him
  alternatives:
  - we did not regard him
  - we did not account him anything
  lexicon: HALOT
  rationale: חשב in this context means to reckon, regard, or esteem. 'Esteem' fits the evaluative sense and matches the confessional tone of the speaker.
