  rationale: Se reubica la nota [b] al verbo/cláusula que realmente modifica, se ajusta [a] para reflejar con mayor fidelidad las alternativas preservadas en el audit trail inglés y se mejora levemente la naturalidad direccional con «al corazón de los mares».
