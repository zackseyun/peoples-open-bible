base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/015.yaml
  text: You shall keep the Feast of Unleavened Bread[a]. For seven days you shall eat unleavened bread, as I commanded you, at the appointed time in the month of Abib, for in it you came out from Egypt[b]. And no one shall appear before me empty-handed.
  footnotes:
