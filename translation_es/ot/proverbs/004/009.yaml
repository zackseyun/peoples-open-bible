translation:
  language: es
  text: Pondrá[a] sobre tu cabeza una guirnalda de gracia[b]; te otorgará una corona de hermosura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «te dará».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una corona de gracia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  english_pob_choice: she will place
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - pondrá sobre
  lexicon: HALOT
  rationale: El imperfecto femenino singular de נתן expresa aquí una acción futura en paralelo poético. «Pondrá» conserva la imagen concreta de poner algo sobre la cabeza y suena natural en español.
- source_word: לְרֹאשְׁךָ
  english_pob_choice: on your head
  chosen_spanish: sobre tu cabeza
  alternatives_spanish:
  - en tu cabeza
  - a tu cabeza
  lexicon: HALOT
  rationale: En el contexto de adorno, ל con «cabeza» se entiende mejor como ubicación física. «Sobre tu cabeza» reproduce el valor idiomático sin calco rígido.
- source_word: לִוְיַת חֵן
  english_pob_choice: a graceful wreath
  chosen_spanish: una corona de gracia
  alternatives_spanish:
  - una guirnalda de gracia
  - una corona graciosa
  lexicon: HALOT
  rationale: לִוְיַת designa un adorno circular o enrollado, cercano a «corona» o «guirnalda». «De gracia» conserva la ambigüedad de חֵן entre gracia, encanto y favor, sin reducirla a «graciosa» en sentido coloquial.
- source_word: עֲטֶרֶת תִּפְאֶרֶת
  english_pob_choice: a crown of beauty
  chosen_spanish: una diadema de hermosura
  alternatives_spanish:
  - una corona de hermosura
  - una diadema de esplendor
  lexicon: HALOT
  rationale: עֲטֶרֶת es «corona» o «diadema»; aquí «diadema» ayuda a distinguir el segundo miembro del paralelismo y evita repetir «corona». תִּפְאֶרֶת puede ser belleza, esplendor o gloria; «hermosura» mantiene el matiz estético del pasaje.
- source_word: תְּמַגְּנֶךָּ
  english_pob_choice: she will bestow on you
  chosen_spanish: te otorgará
  alternatives_spanish:
  - te dará
  - te concederá
  - te entregará
  lexicon: HALOT
  rationale: En este contexto el verbo expresa entregar o conferir, no proteger. «Te otorgará» preserva el sentido benefactivo y el tono elevado del paralelismo poético.
translation_notes:
  revision_awareness: El contexto auditado coincide en alto grado con la lectura propuesta y no registra revisiones sustantivas; la traducción inglesa aprobada usa «wreath» / «crown of beauty» y conserva la misma imagen de adorno para la cabeza, que aquí se refleja en español con equivalentes naturales.
  spanish_consistency_notes:
  - Se mantiene «gracia» para חֵן, en línea con la preferencia POB, evitando sustituirlo por «favor» salvo cuando el contexto lo exija.
  - Se usa «corona»/«diadema» para preservar la imagen ornamental sin cargarla con un sentido real o eclesiástico no indicado por el hebreo.
  - «Sobre tu cabeza» sigue la idiomaticidad del giro hebreo con ל y evita un calco innecesario.
