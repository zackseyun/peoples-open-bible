translation:
  language: es
  text: Mira, él sube como las nubes, y sus carros son como el torbellino; sus caballos son más veloces que las águilas[a]. ¡Ay de nosotros, porque estamos arruinados!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que los buitres»; el hebreo נְשָׁרִים puede referirse de manera más amplia a grandes aves carroñeras o rapaces, aunque «águilas» es la traducción tradicional aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Mira esto
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce una exclamación deíctica urgente. «¡Mira!» conserva la inmediatez y suena natural en español moderno, sin perder el tono profético.
- source_word: כַּעֲנָנִים
  english_pob_choice: like clouds
  chosen_spanish: como las nubes
  alternatives_spanish:
  - como nubes
  - como las nubadas
  lexicon: HALOT
  rationale: El prefijo comparativo exige una comparación directa. El plural «las nubes» preserva la imagen de una masa que avanza.
- source_word: יַעֲלֶה
  english_pob_choice: he comes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - viene subiendo
  - avanza
  lexicon: HALOT
  rationale: עלה expresa ascenso o movimiento hacia arriba, y aquí describe la aproximación del invasor. «Sube» mantiene la dirección del verbo sin sonar forzado en español.
- source_word: וְכַסּוּפָה
  english_pob_choice: and ... like the whirlwind
  chosen_spanish: como el torbellino
  alternatives_spanish:
  - como la tormenta
  - como el vendaval
  - como la tempestad
  lexicon: HALOT
  rationale: סוּפָה puede referirse a una tormenta violenta o remolino. «Torbellino» conserva la imagen dinámica y la fuerza del símil militar.
- source_word: מַרְכְּבוֹתָיו
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - sus cuadrigas
  lexicon: HALOT
  rationale: El hebreo designa carros o carros de combate. En español bíblico «carros» transmite el sentido básico sin añadir precisión no explicitada por el texto.
- source_word: קַלּוּ
  english_pob_choice: are swifter
  chosen_spanish: son más veloces
  alternatives_spanish:
  - son más rápidos
  - son más ligeros
  - son veloces
  lexicon: HALOT
  rationale: El verbo comunica ligereza/rapidez en comparación. «Más veloces» expresa bien la fuerza comparativa con el siguiente מן.
- source_word: מִנְּשָׁרִים
  english_pob_choice: than eagles
  chosen_spanish: que las águilas
  alternatives_spanish:
  - que los buitres
  - que las aves de rapiña
  lexicon: HALOT
  rationale: נשר puede abarcar grandes aves de rapiña. Se mantiene «águilas» por ser la traducción tradicional y la que mejor encaja con el símil de rapidez; la alternativa zoológica queda reflejada en la nota.
- source_word: סוּסָיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  lexicon: HALOT
  rationale: El sentido directo es posesivo y literal. «Caballos» es la opción más clara y fiel en español contemporáneo.
- source_word: אוֹי לָנוּ
  english_pob_choice: Woe to us
  chosen_spanish: ¡Ay de nosotros!
  alternatives_spanish:
  - ¡Ay para nosotros!
  - ¡Desdichados de nosotros!
  lexicon: HALOT
  rationale: Es una fórmula de lamento profético. «¡Ay de nosotros!» conserva el registro y la intensidad emotiva del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del lamento. «Porque» es la equivalencia natural en español.
- source_word: שֻׁדָּדְנוּ
  english_pob_choice: we are ruined
  chosen_spanish: estamos arruinados
  alternatives_spanish:
  - hemos sido devastados
  - estamos devastados
  - hemos sido saqueados
  lexicon: HALOT
  rationale: El pasivo de שׁדד expresa haber sido despojado/arrasado. «Estamos arruinados» capta el resultado devastador de forma idiomática y publicable en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantuvo la lectura óptima ya acordada. La versión española sigue de cerca el hebreo y conserva la alternativa zoológica para נְשָׁרִים en nota, como en el texto inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma preferente del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se preservó el registro profético breve y exclamativo mediante signos de admiración.
  - Se eligió «caballos» y «carros» por claridad natural, sin añadir especificaciones no presentes en el hebreo.
