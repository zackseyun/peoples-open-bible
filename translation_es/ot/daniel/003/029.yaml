translation:
  language: es
  text: 'Y por mí se emite un decreto: cualquier pueblo[a], nación o lengua que diga algo ofensivo contra el Dios de Sadrac, Mesac y Abed-nego será hecho pedazos[c], y su casa quedará hecha una ruina[b], porque no existe otro dios que pueda librar de este modo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''pronuncie blasfemia contra'' el Dios de Sadrac, Mesac y Abed-nego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''quedará hecha estiércol'' / ''quedará hecha un estercolero'', una lectura tradicional de la frase aramea para reducir una casa a una ruina humillante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''será desmembrado'' / ''será despedazado''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂים טְעֵם
  english_pob_choice: a decree is issued
  chosen_spanish: se emite un decreto
  alternatives_spanish:
  - yo decreto
  - se promulga un edicto
  lexicon: HALOT
  rationale: El giro arameo literalmente es 'poner un decreto/mandato'. 'Se emite un decreto' conserva el sentido de proclamación real en español natural, sin volverlo demasiado literal ni debilitar su fuerza jurídica.
- source_word: עַם אֻמָּה וְלִשָּׁן
  english_pob_choice: people, nation, or language
  chosen_spanish: pueblo, nación o lengua
  alternatives_spanish:
  - pueblo, nación y lengua
  - gente, nación o idioma
  lexicon: HALOT
  rationale: La tríada aramea abarca grupos etnolingüísticos del imperio. 'Lengua' mantiene el paralelismo con el texto y es una opción española sobria; 'idioma' sería más explicativo, pero menos cercano a la forma del original.
- source_word: יֵאמַר שלה עַל
  english_pob_choice: speaks anything offensive against
  chosen_spanish: diga algo ofensivo contra
  alternatives_spanish:
  - pronuncie blasfemia contra
  - hable mal contra
  lexicon: HALOT
  rationale: La voz שלה señala una palabra o expresión ofensiva, no necesariamente el término técnico posterior 'blasfemia'. 'Algo ofensivo' preserva la amplitud semántica documentada por la POB inglesa y evita cerrar el sentido demasiado pronto.
- source_word: אֱלָהֲהוֹן
  english_pob_choice: the God of
  chosen_spanish: el Dios de
  alternatives_spanish:
  - su Dios
  - el Dios de ellos
  lexicon: HALOT
  rationale: El sufijo es plural y se refiere a Sadrac, Mesac y Abed-nego. En español, 'el Dios de' transmite la relación posesiva sin sonar torpe; 'su Dios' podría ser ambiguo.
- source_word: הַדָּמִין יִתְעֲבֵד
  english_pob_choice: shall be torn limb from limb
  chosen_spanish: será hecho pedazos
  alternatives_spanish:
  - será despedazado
  - será desmembrado
  lexicon: HALOT
  rationale: La fórmula indica castigo corporal severo y fragmentación. 'Hecho pedazos' comunica la violencia judicial con claridad en español; 'desmembrado' sería más técnico y 'despedazado' más expresivo, pero menos neutro.
- source_word: וּבַיְתֵהּ נְוָלִי יִשְׁתַּוֵּה
  english_pob_choice: shall be made a ruin
  chosen_spanish: su casa quedará hecha una ruina
  alternatives_spanish:
  - su casa será convertida en escombros
  - su casa quedará hecha un estercolero
  lexicon: HALOT
  rationale: El arameo admite la idea de ruina humillante; la POB inglesa retiene el sentido de destrucción y deja la lectura tradicional de 'dunghill' como nota alternativa. En español, 'ruina' es la forma principal más clara y no introduce de manera forzada la imagen de estiércol.
- source_word: כָּל קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La relación causal es directa. 'Porque' es la equivalencia española más natural y mantiene la argumentación del decreto.
- source_word: לָא אִיתַי אֱלָה אָחֳרָן
  english_pob_choice: there is no other god
  chosen_spanish: no existe otro dios
  alternatives_spanish:
  - no hay otro dios
  - no existe ningún otro Dios
  lexicon: HALOT
  rationale: El enunciado existencial se conserva de manera simple. 'No existe otro dios' refleja bien la declaración de incomparableza sin añadir precisión doctrinal que el rey no formula explícitamente.
- source_word: יִכֻּל לְהַצָּלָה כִּדְנָה
  english_pob_choice: who is able to deliver like this
  chosen_spanish: que pueda salvar de este modo
  alternatives_spanish:
  - que pueda librar así
  - que pueda rescatar de esta manera
  lexicon: HALOT
  rationale: En este contexto narrativo, 'salvar' comunica el rescate del horno y funciona bien en español bíblico actual. 'De este modo' conserva el demostrativo del arameo y la referencia a la liberación recién mostrada.
theological_decisions:
- issue: Alcance de la confesión sobre la singularidad de Dios
  english_pob_reading: there is no other god who is able to deliver like this
  chosen_spanish_reading: no existe otro dios que pueda salvar de este modo
  alternative_spanish_readings:
  - no existe ningún otro Dios
  - no hay otro dios sino él
  rationale: El texto expresa la superioridad de Dios respecto de esta liberación, no necesariamente una formulación doctrinal completa de monoteísmo filosófico. La traducción mantiene esa tensión y no la resuelve con una confesión más amplia de la que el rey pronuncia.
  doctrine_reference: Preservar la tensión teológica sin sobre-interpretar el alcance de la confesión real.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo y el expediente auditado en inglés. Se conserva la tríada imperial 'pueblo, nación o lengua', el castigo corporal extremo, la ruina de la casa y la confesión final sobre la unicidad de Dios para salvar de este modo, sin suavizar las tensiones semánticas documentadas.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלָה y 'dios' en minúscula en la declaración genérica final, para reflejar la distinción contextual.
  - '''Mesac'' sigue la forma española común y coherente con el registro bíblico en español.'
  - Se prefirió 'salvar' sobre 'librar' o 'rescatar' por fluidez y porque el contexto inmediato es la liberación del horno, aunque las tres opciones son posibles en español bíblico.
