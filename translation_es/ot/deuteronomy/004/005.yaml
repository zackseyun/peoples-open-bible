revisions:
- from: Mira[a], yo les he enseñado estatutos y preceptos, tal como Yahvé mi Dios me mandó, para hacer así en medio de la tierra[b] a la que ustedes van entrando para tomar posesión de ella[c].
  to: Miren[a], yo les he enseñado estatutos y juicios, tal como Yahvé mi Dios me mandó, para actuar así en medio de la tierra[b] en la que ustedes entran para poseerla[c].
  rationale: Se cambió 'Mira' por 'Miren' para concordar con el plural 'ustedes/les'. Se sustituyó 'preceptos' por 'juicios' para preservar el valor legal de מִשְׁפָּטִים, en línea con la justificación léxica auditada. Se revisó 'van entrando' a 'entran' para un español más natural y fiel al sentido de entrada dirigida a la tierra. También se ajustó 'para hacer así' a 'para actuar así' para mejorar la fluidez sin perder el deíctico כֵּן.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo en la estructura general: imperativo discursivo, enseñanza de ''ḥuqqim'' y ''mishpatim'', conformidad con el mandato de Yahvé, y referencia a entrar en la tierra para poseerla. Sin embargo, ''preceptos'' debilita el matiz judicial de מִשְׁפָּטִים, y la construcción ''a la que ustedes van entrando'' suena menos fiel y menos natural que una formulación directa con ''entran'' o ''van a entrar''.'
  spanish_quality_summary: 'El español es mayormente claro, pero tiene dos puntos mejorables: ''preceptos'' no refleja bien el registro legal de ''mishpatim'', y ''para hacer así'' junto con ''a la que ustedes van entrando'' resulta algo torpe. Una revisión menor puede conservar la literalidad y mejorar la legibilidad con un tono digno y natural.'
  glossary_alignment: Alinea bien con la política del proyecto al usar 'Yahvé'. 'Estatutos' es adecuado para חֻקִּים. Para מִשְׁפָּטִים conviene 'juicios' para preservar la conexión legal/judicial documentada en el rastro inglés; si se teme aspereza, puede sostenerse por el registro jurídico del contexto. 'Tierra' y 'en medio de la tierra' están bien. 'Tomar posesión de ella' es fiel, aunque 'poseerla' también sería posible.
  issues:
  - severity: medium
    issue: מִשְׁפָּטִים fue traducido como 'preceptos'
    rationale: El rastro léxico inglés documenta 'judgments' precisamente para mantener la conexión con justicia/decisión judicial. 'Preceptos' generaliza demasiado y se acerca más a mandatos normativos que a juicios/ordenanzas judiciales.
  - severity: medium
    issue: '''a la que ustedes van entrando'' es poco natural y no refleja bien la sintaxis final del hebreo'
    rationale: בָּאִים שָׁמָּה לְרִשְׁתָּהּ expresa entrada dirigida a la tierra con propósito de posesión. En español, 'entran para poseerla' o 'van a entrar para poseerla' comunica mejor el sentido sin la torpeza de 'van entrando' en una relativa.
  - severity: low
    issue: '''para hacer así'' suena algo rígido'
    rationale: Aunque es defendible como reflejo de לַעֲשׂוֹת כֵּן, en español bíblico natural suele leerse mejor 'para actuar así' o 'para hacer así' según contexto. Aquí puede mantenerse, pero 'para actuar así' mejora fluidez sin alejarse del sentido.
  revised_spanish_text: Miren[a], yo les he enseñado estatutos y juicios, tal como Yahvé mi Dios me mandó, para actuar así en medio de la tierra[b] en la que ustedes entran para poseerla[c].
  revised_footnotes:
  - marker: a
    text: O 'decretos y ordenanzas' para 'estatutos y juicios'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en medio de la tierra''; muchas traducciones simplifican a ''en la tierra''.'
    reason: lexical_alternative
  - marker: c
    text: O 'ustedes entran para poseerla' o 'ustedes van a heredarla'.
    reason: lexical_alternative
  revision_rationale: Se cambió 'Mira' por 'Miren' para concordar con el plural 'ustedes/les'. Se sustituyó 'preceptos' por 'juicios' para preservar el valor legal de מִשְׁפָּטִים, en línea con la justificación léxica auditada. Se revisó 'van entrando' a 'entran' para un español más natural y fiel al sentido de entrada dirigida a la tierra. También se ajustó 'para hacer así' a 'para actuar así' para mejorar la fluidez sin perder el deíctico כֵּן.
