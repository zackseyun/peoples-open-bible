revisions:
- from: Pero los de la acrópolis seguían enviando enviados y presionándolo con insistencia para que viniera a ellos por el desierto y les enviara provisiones[a].
  to: Pero los de la ciudadela seguían enviando emisarios y lo apremiaban para que viniera a ellos[a] por el desierto y les enviara provisiones.
  rationale: Se revisa 'acrópolis' a 'ciudadela' para reflejar mejor ἄκρα en contexto militar y para mayor claridad en español. Se cambia 'seguían enviando enviados' por 'seguían enviando emisarios' para evitar una construcción torpe, manteniendo el matiz de representantes oficiales. Se conserva la nota sobre el singular griego 'a él' frente al sentido contextual plural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:00:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: acción imperfectiva continua (''seguían enviando''), urgencia insistente, la aclaración contextual de ''venir a ellos'' con nota, y el envío de suministros. Sin embargo, dos elecciones no preservan óptimamente el registro ni la naturalidad contextual del original y del POB inglés: ''acrópolis'' suena demasiado helenizante y menos claro que ''ciudadela'', y ''seguían enviando enviados'' resulta torpe en español.'
  spanish_quality_summary: El texto es comprensible y bastante fiel, pero puede mejorarse para un español más natural y eclesialmente legible. 'Ciudadela' comunica mejor el referente militar de ἄκρα en este contexto. 'Enviados' después de 'enviando' crea cacofonía y rigidez; 'emisarios' mantiene la idea de representantes oficiales con mejor fluidez. El resto del versículo es claro.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La cuestión principal es léxica/contextual: ἄκρα se expresa mejor como ''ciudadela'' que como ''acrópolis'' en español bíblico general, en línea con el inglés ''citadel''.'
  issues:
  - severity: medium
    issue: '"acrópolis" para ἄκρα'
    rationale: Aunque etimológicamente defendible, en español general suena técnico/helenizante y no transmite tan claramente la noción militar de fortaleza/citadela en 1 Macabeos. 'Ciudadela' preserva mejor el sentido contextual y la legibilidad.
  - severity: medium
    issue: '"seguían enviando enviados"'
    rationale: La repetición es poco natural en español y distrae del sentido. 'Emisarios' o 'delegados' mantiene el valor de πρεσβεύτας como representantes oficiales sin la torpeza estilística.
