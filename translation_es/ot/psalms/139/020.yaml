translation:
  language: es
  text: los que hablan de ti con mala intención[a]; tus enemigos toman tu nombre en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «levantan para falsedad a tus adversarios», o «tus adversarios te toman falsamente». El hebreo de la cláusula final es difícil, y «nombre» está implícito, no explícito, en el texto.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - que
  - quienes
  lexicon: HALOT
  rationale: La partícula relativa introduce una descripción de los impíos; en español, «los que» suena natural y mantiene el valor identificador del relativo en contexto poético.
- source_word: יֹאמְרֻךָ
  english_pob_choice: speak of you
  chosen_spanish: hablan de ti
  alternatives_spanish:
  - dicen de ti
  - mencionan de ti
  lexicon: HALOT
  rationale: El sufijo de 2 ms exige un complemento de segunda persona; como el contexto es hostil, «hablan de ti» conserva el sentido relacional sin forzar un objeto directo que el hebreo no expresa aquí de manera explícita.
- source_word: לִמְזִמָּה
  english_pob_choice: with evil intent
  chosen_spanish: con malicia
  alternatives_spanish:
  - con perversidad
  - con un plan malo
  - con mala intención
  lexicon: HALOT
  rationale: מְזִמָּה puede ser plan o designio, pero aquí califica la manera/propósito de la palabra hostil. «Con malicia» comunica bien la deliberación malvada en español sin sobrecargar la línea.
- source_word: נָשֻׂא
  english_pob_choice: take
  chosen_spanish: toman
  alternatives_spanish:
  - levantan
  - llevan
  - toman en vano
  lexicon: HALOT
  rationale: El verbo נשׂא tiene el sentido básico de levantar/cargar, pero en esta construcción idiomática con שָׁוְא permite una traducción verbal fluida. «Toman» conserva la fuerza idiomática y permite la lectura tradicional del giro.
- source_word: לַשָּׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para falsedad
  - falsamente
  - para lo vacío
  lexicon: HALOT
  rationale: שָׁוְא denota vacío, falsedad o vanidad. En la expresión con נשׂא, «en vano» es el equivalente idiomático más natural y transparente en español.
- source_word: עָרֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - los que te son hostiles
  lexicon: HALOT
  rationale: El final es difícil textualmente y el uso consonántico puede resultar opaco; siguiendo el audit trail inglés, se adopta la lectura contextual de adversarios de Dios, bien representada por «tus enemigos» en español.
theological_decisions:
- issue: Clausula final difícil y objeto implícito
  english_pob_reading: your enemies take your name in vain
  chosen_spanish_reading: tus enemigos toman tu nombre en vano
  alternative_spanish_readings:
  - tus adversarios te toman falsamente
  - levantan falsedad contra ti
  rationale: El hebreo no explicita «nombre», pero el paralelismo y la idiomaticidad de נשׂא + שׁוא favorecen entender un uso profanador del nombre divino. En español se mantiene la completación interpretativa por ser la lectura adoptada por la POB inglesa y por resultar comprensible en la alusión.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Revisado frente al hebreo masorético y al audit trail inglés: se conservó la decisión interpretativa de la cláusula final, pero se ajustó la formulación para un español bíblico natural y transparente. No se reportaron revisiones textuales posteriores.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar del proyecto cuando el texto explícitamente alude al nombre divino, aunque aquí la cláusula final lo expresa de forma implícita en la lectura interpretativa adoptada.
  - Se evitó «SEÑOR» como máscara convencional.
  - Se conservó un tono poético y de acusación hostil sin añadir contenido no sustentado por el hebreo.
  - La nota a pie preserva la tensión textual sin eliminar la lectura principal del verso.
