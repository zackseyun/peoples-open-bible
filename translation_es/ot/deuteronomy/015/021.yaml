review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura condicional, los defectos físicos específicos (cojo, ciego), la prohibición cultual y el nombre divino «Yahvé». Sin embargo, «a saber» no corresponde al hebreo, que presenta ejemplos sin esa glosa explicativa, y la nota al pie está mal anclada: el pie de página trata «cualquier defecto malo/evil», no «cojo». Además, «cualquier defecto malo» es demasiado poco idiomático en español; conviene conservar la cercanía léxica al hebreo/inglés auditado con una formulación más natural.'
  spanish_quality_summary: La redacción es generalmente clara, pero el guion largo con «a saber» suena añadido e innecesario, y el anclaje de la nota genera confusión. «Cualquier mal defecto» o «cualquier defecto malo» suena forzado; «cualquier defecto malo» es comprensible pero torpe. Una solución más fiel y legible es mantener «cualquier defecto malo[a]» en el texto pero mover correctamente la nota al sintagma pertinente y normalizar la puntuación española con rayas.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios», מוּם → «defecto». No hay conflicto doctrinal. La única corrección necesaria es de estilo/precisión de anclaje y de no introducir una glosa («a saber») que no está en la fuente.'
  issues:
  - severity: medium
    issue: Se añade «a saber», que no está en la fuente
    rationale: El hebreo enumera ejemplos de defecto («cojo o ciego») sin una partícula explicativa equivalente a «a saber». Esto introduce una explicación innecesaria.
  - severity: high
    issue: La nota al pie [a] está anclada a «cojo» pero comenta «cualquier defecto malo/evil»
    rationale: El marcador debe aparecer exactamente en la frase relevante; tal como está, induce a pensar que la nota explica «cojo», no «cualquier defecto malo».
  - severity: medium
    issue: Puntuación y estilo poco naturales con guion largo y glosa
    rationale: En español bíblico legible conviene usar rayas o comas con naturalidad, sin una inserción explicativa no presente en el original.
  revised_spanish_text: Pero si tiene un defecto—si es cojo o ciego, cualquier defecto malo[a]—no lo sacrificarás a Yahvé tu Dios.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «cualquier defecto malo», es decir, cualquier defecto físico serio o inaceptable.'
    reason: lexical_alternative
  revision_rationale: Se elimina «a saber» por no corresponder a la fuente, se reubica correctamente la nota al sintagma que realmente comenta, y se conserva la decisión léxica cercana al hebreo/POB para «cualquier defecto malo» con apoyo aclaratorio en nota. La estructura con rayas refleja bien la enumeración parentética del original sin añadir explicación.
