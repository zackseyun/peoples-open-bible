  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, esclavo u otros términos controlados. Las decisiones «naciones», «mató» y «reyes poderosos» son coherentes con la evidencia fuente y con el razonamiento léxico documentado.
