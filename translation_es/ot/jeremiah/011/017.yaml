translation:
  language: es
  text: 'Y Yahvé de los Ejércitos, que te plantó, ha anunciado calamidad contra ti por la maldad de la casa de Israel y de la casa de Judá, que hicieron para provocarme a ira al quemar incienso a Baal.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיהוָה / יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Eterno
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: usar el nombre divino «Yahvé» en el texto principal, manteniendo transparencia frente al hebreo y evitando la convención de ocultamiento con mayúsculas.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los huestes
  lexicon: HALOT
  rationale: El título expresa el mando sobre fuerzas numerosas y poderosas. «Ejércitos» conserva el valor militar/cósmico con un español claro y reverente.
- source_word: הַנּוֹטֵעַ אוֹתָךְ
  english_pob_choice: who planted you
  chosen_spanish: que te plantó
  alternatives_spanish:
  - tu plantador
  - que te sembró
  - que te plantó como árbol/vid
  lexicon: HALOT
  rationale: El participio con sufijo se vierte naturalmente como relativa. «Plantó» conserva la metáfora agrícola del contexto inmediato sin añadir elementos no explicitados.
- source_word: דִּבֶּר עָלַיִךְ רָעָה
  english_pob_choice: has spoken disaster against you
  chosen_spanish: ha hablado calamidad contra ti
  alternatives_spanish:
  - ha declarado mal contra ti
  - ha pronunciado desastre sobre ti
  lexicon: HALOT
  rationale: Aquí רָעָה se entiende como calamidad/juicio, no como mal moral. «Ha hablado calamidad» preserva la idea de discurso profético de juicio y suena natural en español.
- source_word: בִּגְלַל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - por motivo de
  lexicon: HALOT
  rationale: Se usa una causal simple y directa, adecuada al flujo del versículo.
- source_word: רָעַת בֵּית יִשְׂרָאֵל וּבֵית יְהוּדָה
  english_pob_choice: the evil of the house of Israel and the house of Judah
  chosen_spanish: la maldad de la casa de Israel y de la casa de Judá
  alternatives_spanish:
  - la malicia de la casa de Israel y de la casa de Judá
  - la perversidad de la casa de Israel y de la casa de Judá
  lexicon: HALOT
  rationale: Aquí רָעַת apunta a maldad moral. «Casa de» preserva la expresión corporativa/covenantal; «maldad» diferencia este uso del sentido de calamidad anterior.
- source_word: אֲשֶׁר עָשׂוּ לָהֶם
  english_pob_choice: which they did to provoke me to anger
  chosen_spanish: que hicieron para provocarme a ira
  alternatives_spanish:
  - que hicieron para enfurecerme
  - que cometieron para irritarme
  lexicon: HALOT
  rationale: 'Se refleja la revisión inglesa más reciente: el לָהֶם se integra idiomáticamente con la finalidad de provocar a Dios, en vez de traducirlo de modo literal y forzado.'
- source_word: לְהַכְעִסֵנִי
  english_pob_choice: provoking me to anger
  chosen_spanish: provocarme a ira
  alternatives_spanish:
  - hacerme enojar
  - irritarme
  lexicon: HALOT
  rationale: El causativo expresa provocar ira. «Ira» mantiene el registro bíblico y la fuerza del verbo sin caer en coloquialismo.
- source_word: לְקַטֵּר לַבָּעַל
  english_pob_choice: by burning incense to Baal
  chosen_spanish: al quemar incienso a Baal
  alternatives_spanish:
  - al hacer humo para Baal
  - al ofrecer incienso a Baal
  - al quemar ofrenda aromática a Baal
  lexicon: HALOT
  rationale: קטר se refiere específicamente a producir humo ritual, usualmente incienso. «Quemar incienso» reproduce bien la acción cultual y sigue la precisión lexicográfica del POB inglés.
theological_decisions:
- issue: Título divino יהוה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de los ejércitos
  rationale: Se conserva el nombre de pacto y se traduce el título para mantener transparencia y comprensión. «Ejércitos» comunica la amplitud del dominio divino sin recurrir a una forma litúrgica opaca.
  doctrine_reference: 'DOCTRINE.md: YHWH default rendering; translate titles, transliterate names'
- issue: Doble valor de רָעָה / רָעַת
  english_pob_reading: disaster ... evil
  chosen_spanish_reading: calamidad ... maldad
  alternative_spanish_readings:
  - mal ... maldad
  - desastre ... maldad
  - calamidad ... perversidad
  rationale: La traducción distingue el juicio anunciado por Dios del mal moral cometido por Judá e Israel, preservando la tensión teológica del hebreo y evitando atribuir maldad moral a Dios.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological tension without importing claims'
- issue: Infinitivo final לְקַטֵּר לַבָּעַל
  english_pob_reading: by burning incense to Baal
  chosen_spanish_reading: al quemar incienso a Baal
  alternative_spanish_readings:
  - por quemar incienso a Baal
  - al ofrecer incienso a Baal
  rationale: Se mantiene el carácter cultual específico del verbo y se evita una generalización excesiva como «hacer ofrendas», que podría diluir la precisión ritual del hebreo.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; lexical specificity'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se omite una construcción literal de ''a sí mismos'' para לָהֶם, integrando la cláusula final de forma idiomática; y se traduce לְקַטֵּר con la precisión cultual de ''quemar incienso'' en vez de una versión genérica de ''ofrecer''. También se conserva la distinción semántica entre la calamidad anunciada por Yahvé y la maldad moral de Judá e Israel.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de «SEÑOR» conforme al estándar del proyecto para יהוה.
  - Se eligió «Ejércitos» para צְבָאוֹת, coherente con el tratamiento transparente de títulos divinos.
  - «Calamidad» se reservó para רָעָה en el anuncio profético, mientras «maldad» traduce רָעַת en el motivo humano.
  - La preposición «al quemar incienso» reproduce bien el valor instrumental/causal del infinitivo final.
  - No se usó «Cristo», «siervo» ni otros equivalentes no pertinentes al pasaje.
