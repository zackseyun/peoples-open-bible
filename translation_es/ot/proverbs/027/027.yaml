review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: suficiencia de leche de cabras para provisión personal, de la casa y de las dependientes femeninas. También sigue adecuadamente las decisiones auditadas sobre לֶחֶם como alimento/provisión y וְחַיִּים como sustento. Sin embargo, la nota [a] no corresponde a la alternativa preservada por la POB inglesa: el inglés ancla la alternativa en la frase final (''and life for your maidservants''), mientras que el español la trasladó erróneamente a ''para tu alimento''.'
  spanish_quality_summary: El texto es claro y digno, pero 'tu casa' puede sonar más al edificio que a la unidad doméstica en este contexto, y 'siervas' es comprensible aunque algo menos natural que una forma que preserve explícitamente la idea de dependientes femeninas del hogar. La corrección necesaria principal es reubicar la nota [a] y ajustar su contenido para que refleje la alternativa fuente. Un leve ajuste a 'hogar' y 'sirvientas' mejora legibilidad sin perder el matiz social.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones sobre 'alimento' para לֶחֶם y 'sustento' para חַיִּים concuerdan con la auditoría inglesa. La representación de נַעֲרוֹתֶיךָ como 'siervas' es defendible, pero 'sirvientas' comunica mejor el referente doméstico de servant girls en español actual eclesial general.
  issues:
  - severity: high
    issue: La nota [a] está anclada y explicada incorrectamente.
    rationale: La POB inglesa preserva como alternativa 'and life for your maidservants' para וְחַיִּים לְנַעֲרוֹתֶיךָ, no una alternativa sobre לְלַחְמְךָ. En español, [a] debe ir en la frase final y explicar 'vida para tus sirvientas/siervas'.
  - severity: medium
    issue: '''Tu casa'' puede resultar menos preciso que ''tu hogar'' para בֵּיתֶךָ en sentido de household.'
    rationale: La decisión léxica inglesa explicitó household, no edificio. 'Hogar' en español evita ambigüedad y suena más natural en este contexto sapiencial.
  - severity: low
    issue: '''Siervas'' es correcto pero menos idiomático que ''sirvientas'' para servant girls en este contexto doméstico.'
    rationale: El hebreo apunta a dependientes femeninas de la unidad doméstica. 'Sirvientas' conserva la función social y se entiende mejor en español contemporáneo neutral que 'siervas', que puede sonar más bíblico-tradicional o más amplio.
  revised_spanish_text: Y habrá suficiente leche de cabras para tu alimento, para el alimento de tu hogar[b], y sustento[a] para tus sirvientas.
  revised_footnotes:
  - marker: a
    text: O «y vida para tus sirvientas». El hebreo literalmente dice «y vidas/vida para tus jóvenes mujeres/sirvientas», usando «vida» en el sentido de lo que sostiene la vida.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «pan» en ambos lugares, probablemente con el sentido más amplio de alimento o provisión, no solo pan literal.
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota [a] para que corresponda al segmento hebreo וְחַיִּים לְנַעֲרוֹתֶיךָ, en línea con la auditoría inglesa. También se mejoró la precisión contextual con 'hogar' para household y la naturalidad con 'sirvientas' para servant girls, sin alterar el sentido fuente.
