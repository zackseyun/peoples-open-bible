    reason: alternative_reading
  revision_rationale: Se ajusta 'lo sagrado' a 'lo santo' para reflejar mejor הַקֹּדֶשׁ y la formulación auditada 'holy thing', y se mejora la naturalidad de 'añadirá a ello' a 'le añadirá'. Se conserva el resto porque es fiel al hebreo y a las decisiones léxicas/teológicas documentadas.
