  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render מַלְאַךְ as 'angel' or 'messenger'
  chosen_reading: angel
  alternative_readings:
  - messenger
  rationale: Although the Hebrew term can denote either a human or heavenly messenger, the narrative setting and conventional sense in this theophanic context support 'angel.' This preserves the likely referent without importing extra doctrinal claims about the angel's identity.
