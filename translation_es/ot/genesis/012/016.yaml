revisions:
- from: Y trató bien a Abram[a] a causa de ella, y llegó a tener ovejas y ganado, y asnos machos y esclavos varones y esclavas y asnas y camellos.
  to: Y trató bien a Abram por causa de ella[a], y llegó a tener ovejas y ganado, y asnos machos, y esclavos y esclavas, y asnas y camellos.
  rationale: Se ajusta la expresión causal a un español más natural sin perder el sentido de בַּעֲבוּרָהּ, se corrige la nota para evitar una alternativa ambigua, y se aligera «esclavos varones» a «esclavos» en paralelo con «esclavas», conservando plenamente la distinción presente en la lista. No se requiere adjudicación adicional.
