revisions:
- from: porque me afligiste y me tuviste misericordia. Mira[a], veo a Tobías, mi hijo. Y su hijo entró gozoso, y le anunció a su padre las grandes cosas que le habían sucedido en Media.
  to: porque me afligiste y tuviste misericordia de mí. Mira[a], veo a Tobías, mi hijo. Y su hijo entró gozoso, y le contó a su padre las grandes cosas que le habían sucedido en Media.
  rationale: Se corrige «me tuviste misericordia» a «tuviste misericordia de mí» para un español fiel e idiomático. Se cambia «le anunció» por «le contó» para reflejar mejor el valor narrativo de ἀπήγγειλεν como dar un informe sobre lo sucedido. Se conserva «Mira» con nota por su naturalidad y adecuación al registro.
