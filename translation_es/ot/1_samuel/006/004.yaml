translation:
  language: es
  text: 'Y dijeron: «¿Cuál es la ofrenda por la culpa[a] que debemos devolverle?». Y dijeron: «Según el número de los gobernantes filisteos[b]: cinco tumores[c] de oro y cinco ratones de oro, porque una sola plaga estaba sobre todos ellos y sobre sus gobernantes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda de compensación» o «la ofrenda por la transgresión».
    reason: lexical_alternative
  - marker: b
    text: O «los señores filisteos».
    reason: lexical_alternative
  - marker: c
    text: El término hebreo probablemente se refiere a hinchazones o tumores relacionados con la plaga; algunos lo traducen más específicamente como «hemorroides».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de compensación
  - la ofrenda por la reparación
  - la ofrenda por el pecado
  lexicon: HALOT
  rationale: אָשָׁם en contexto cultual puede abarcar culpa/reparación/ofrenda expiatoria. En español, «ofrenda por la culpa» conserva la relación con culpa y la idea reparadora sin fijar innecesariamente una sola glosa técnica. Se evita «ofrenda por el pecado» porque desdibuja el matiz reparativo documentado en la tradición léxica.
- source_word: נָשִׁיב לוֹ
  english_pob_choice: we should return to him
  chosen_spanish: debemos devolverle
  alternatives_spanish:
  - debemos devolverlo
  - debemos devolverle a él
  - hemos de devolverle
  lexicon: HALOT
  rationale: El verbo hiphil de שוב expresa hacer volver/devolver. En español, «devolverle» reproduce la dirección personal del dativo masculino singular y conserva la referencia teológica al Dios de Israel, tal como la lectura auditada del inglés POB.
- source_word: מִסְפַּר סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: According to the number of the Philistine rulers
  chosen_spanish: Según el número de los señores filisteos
  alternatives_spanish:
  - Según el número de los gobernantes filisteos
  - Conforme al número de los señores filisteos
  - Al número de los jefes filisteos
  lexicon: HALOT
  rationale: La construcción indica correspondencia con el número de los dirigentes filisteos. «Según el número de» es idiomático en español y refleja bien el hebreo. «Señores» preserva la forma tradicional del título filisteo sin imponer «príncipes» o «gobernantes», que pueden sonar menos naturales o más interpretativos.
- source_word: סַרְנֵי
  english_pob_choice: rulers
  chosen_spanish: señores
  alternatives_spanish:
  - gobernantes
  - jefes
  - príncipes
  lexicon: HALOT
  rationale: סַרְנֵי es un título político filisteo para sus principales líderes. «Señores» comunica autoridad de modo natural en español y mantiene una equivalencia funcional cercana a la del inglés POB, mientras que «príncipes» introduciría una connotación nobiliaria menos segura.
- source_word: עפלי זָהָב
  english_pob_choice: golden tumors
  chosen_spanish: tumores de oro
  alternatives_spanish:
  - bultos de oro
  - hinchazones de oro
  - hemorroides de oro
  lexicon: HALOT
  rationale: El término hebreo probablemente alude a tumores/hinchazones ligados a la plaga. «Tumores de oro» conserva la imagen concreta y evita precisar médicamente más allá de lo que el texto y la nota auditada garantizan. Se deja abierta la tensión lexical documentada, sin forzar «hemorroides» como lectura exclusiva.
- source_word: עַכְבְּרֵי זָהָב
  english_pob_choice: golden mice
  chosen_spanish: ratones de oro
  alternatives_spanish:
  - ratones dorados
  - ratones de oro
  lexicon: HALOT
  rationale: עַכְבְּרֵי significa ratones. «Ratones de oro» sigue el hebreo de manera directa y natural en español, y conserva el paralelo con los «tumores de oro».
- source_word: מַגֵּפָה אַחַת
  english_pob_choice: one plague
  chosen_spanish: una sola plaga
  alternatives_spanish:
  - una plaga
  - la misma plaga
  - un solo azote
  lexicon: HALOT
  rationale: La expresión subraya la unicidad del castigo. «Una sola plaga» refleja con claridad el singular enfático del hebreo y su valor distributivo sobre todos los afectados.
- source_word: לְכֻלָּם
  english_pob_choice: on all of them
  chosen_spanish: sobre todos ellos
  alternatives_spanish:
  - en todos ellos
  - contra todos ellos
  - sobre cada uno de ellos
  lexicon: HALOT
  rationale: Con מַגֵּפָה, la preposición marca el alcance de la plaga. «Sobre todos ellos» es la forma más natural y precisa en español para indicar afectación/peso de la calamidad.
- source_word: וּלְסַרְנֵיכֶם
  english_pob_choice: and on your rulers
  chosen_spanish: y sobre sus señores
  alternatives_spanish:
  - y sobre sus gobernantes
  - y sobre sus jefes
  - y sobre vuestros señores
  lexicon: HALOT
  rationale: El sufijo de 2mp refleja a los filisteos como destinatarios colectivos. En español, «sus señores» mantiene la referencia a los mismos líderes mencionados antes y evita una repetición pesada de «sus gobernantes», que sonaría más técnico que el texto hebreo.
theological_decisions:
- issue: Referencia del pronombre לוֹ en «devolverle»
  english_pob_reading: Rendered 'to him,' referring to the God of Israel rather than to the ark as an impersonal object.
  chosen_spanish_reading: «devolverle» mantiene la referencia personal al Dios de Israel, no a un objeto impersonal.
  alternative_spanish_readings:
  - devolverlo, refiriéndose al arca
  - devolverlo a ello
  rationale: El contexto del pasaje trata de la reparación debida a Dios en relación con el arca capturada. En español, la forma dativa «devolverle» conserva esa referencia personal sin añadir explicaciones externas al texto.
  doctrine_reference: Teología bíblica del culto reparador; reverencia al nombre y persona de Yahvé en el contexto del arca.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con el hebreo y no presenta revisiones sustantivas. Se conserva la misma estructura discursiva, el doble «Y dijeron», el valor reparativo de אָשָׁם y la ambigüedad léxica de עפלי sin sobreespecificarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito por el dativo personal «le» en el verbo «devolverle», coherente con la política del proyecto para el nombre divino cuando el contexto lo presupone.
  - Se usa «señores» para סַרְנֵי de forma consistente con un título filisteo sin desplazarlo a «príncipes» o «gobernantes».
  - «Tumores de oro» preserva la ambigüedad médica documentada en la nota auditada y evita cerrar la lectura a una sola afección.
