translation:
  language: es
  text: tal como le diste autoridad sobre toda carne[a], para que a todos los que le has dado[b], él les dé vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre toda la humanidad'. El griego dice literalmente 'sobre toda carne', un modismo bíblico para los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'a todo lo que le has dado'. El griego usa una expresión neutra singular colectiva para las personas dadas al Hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: BDAG
  rationale: Expresa correspondencia comparativa de manera natural en español y conserva el valor de paralelo con la oración anterior sin sonar mecánico.
- source_word: ἔδωκας
  english_pob_choice: you gave
  chosen_spanish: le diste
  alternatives_spanish:
  - le has dado
  - le entregaste
  lexicon: BDAG
  rationale: El aoristo se vierte de forma natural como pasado simple; el dativo αὐτῷ se refleja con 'le'.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: '''Autoridad'' comunica mejor el sentido de potestad delegada y jurisdicción, no solo fuerza.'
- source_word: πάσης σαρκός
  english_pob_choice: over all flesh
  chosen_spanish: sobre toda carne[a]
  alternatives_spanish:
  - sobre toda la humanidad
  - sobre todo ser humano
  lexicon: BDAG
  rationale: Se conserva la imagen bíblica literal de σάρξ como 'carne', siguiendo la opción POB de no borrar el giro idiomático. La nota aclara que el sentido es humano/colectivo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: Introduce claramente la cláusula de propósito sin perder naturalidad en español.
- source_word: πᾶν ὃ
  english_pob_choice: all whom
  chosen_spanish: a todos los que
  alternatives_spanish:
  - a todo lo que
  - a todos aquellos que
  lexicon: BDAG
  rationale: Aunque el griego usa neutro singular colectivo, en español conviene explicitar el referente personal para evitar una lectura impersonal y mantener la referencia colectiva a las personas dadas por el Padre.
- source_word: δέδωκας
  english_pob_choice: you have given
  chosen_spanish: le has dado
  alternatives_spanish:
  - le diste
  - le has entregado
  lexicon: BDAG
  rationale: El perfecto indica una acción cumplida con relevancia vigente; 'has dado' preserva ese aspecto mejor que un simple pasado.
- source_word: δώσῃ
  english_pob_choice: he may give
  chosen_spanish: él les dé
  alternatives_spanish:
  - él pueda dar
  - él dé
  lexicon: BDAG
  rationale: Tras ἵνα, el subjuntivo español expresa finalidad/resultado. Se explicita 'les' porque el dativo αὐτοῖς funciona como destinatario de la vida eterna.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida perdurable
  lexicon: BDAG
  rationale: Es la expresión joánica estable y fiel al griego; 'vida eterna' comunica tanto duración como cualidad escatológica.
theological_decisions:
- issue: Alcance universal de la autoridad y alcance particular del don de vida
  english_pob_reading: Retain the universal scope of the Son's authority ('over all flesh') while also preserving the particular group who receive eternal life ('all whom you have given him') without importing a denominational system.
  chosen_spanish_reading: Se mantiene la autoridad universal de Jesús sobre toda carne, y a la vez se preserva que la vida eterna la recibe el grupo concreto de los que el Padre le ha dado.
  alternative_spanish_readings:
  - Reducir 'toda carne' a 'toda la humanidad'
  - Hacer explícita una lectura doctrinal cerrada del grupo dado
  rationale: La frase griega distingue entre la autoridad universal y el otorgamiento particular de vida eterna; la traducción conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se atendió la revisión más reciente que reordenó la cláusula para que 'a todos los que le has dado' quede claramente como complemento de 'les dé vida eterna', reflejando mejor el orden y la relación sintáctica del griego.
  spanish_consistency_notes:
  - Se usó 'autoridad' para ἐξουσίαν, coherente con el valor de potestad delegada del término.
  - Se conservó 'carne' en la expresión fija 'toda carne' por fidelidad al modismo semítico y para no borrar la tensión lexical documentada.
  - Se prefirió 'vida eterna' como equivalente habitual de ζωὴ αἰώνιον, manteniendo el registro joánico.
  - Se evitó 'siempre' o 'perpetua' porque no recogen con la misma claridad la carga escatológica de αἰώνιος.
