  language: en
  yaml_path: translation/ot/ezekiel/048/018.yaml
  text: And the remainder along the length[a], corresponding to the holy contribution, shall be ten thousand to the east and ten thousand to the west; it shall correspond to the holy contribution[b], and its produce shall be for food for the workers of the city.
