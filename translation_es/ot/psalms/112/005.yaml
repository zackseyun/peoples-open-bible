translation:
  language: es
  text: Es bueno el hombre que es generoso y presta[a]; dirige sus asuntos con justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus palabras». El hebreo דְּבָרָיו puede significar «sus asuntos» o «sus palabras»; en este contexto, «sus asuntos» encaja mejor con «presta» y «con justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Good is
  chosen_spanish: Bueno es
  alternatives_spanish:
  - Es bueno
  - Bueno es el
  lexicon: HALOT
  rationale: El hebreo abre con un predicado de valoración favorable. En español, 'Bueno es' reproduce esa apertura de manera natural y solemne, sin convertirla en una paráfrasis más interpretativa.
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - la persona
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo. 'El hombre' mantiene el paralelismo proverbial sin neutralizar el género gramatical del original.
- source_word: חוֹנֵן
  english_pob_choice: is gracious
  chosen_spanish: es clemente
  alternatives_spanish:
  - es generoso
  - es misericordioso
  - favorece
  lexicon: HALOT
  rationale: El participio expresa mostrar favor/gracia. 'Clemente' comunica bien esa disposición benévola y evita restringir el término a mera generosidad material.
- source_word: וּמַלְוֶה
  english_pob_choice: and lends
  chosen_spanish: y presta
  alternatives_spanish:
  - y da préstamos
  - y presta con liberalidad
  lexicon: HALOT
  rationale: '''Presta'' es el equivalente directo y natural del verbo hebreo en este contexto económico.'
- source_word: יְכַלְכֵּל
  english_pob_choice: he conducts
  chosen_spanish: dirige
  alternatives_spanish:
  - administra
  - conduce
  - maneja
  lexicon: HALOT
  rationale: El verbo en este contexto señala la manera en que ordena o maneja su vida/actuación. 'Dirige' funciona bien en español con 'sus asuntos' y conserva la idea de conducir la conducta con orden.
- source_word: דְּבָרָיו
  english_pob_choice: his affairs
  chosen_spanish: sus asuntos
  alternatives_spanish:
  - sus cosas
  - sus negocios
  - sus palabras
  lexicon: HALOT
  rationale: Aunque דְּבָרִים puede significar 'palabras', aquí el contexto de prestar y obrar con justicia favorece el sentido de asuntos o materias. 'Sus asuntos' es la opción más amplia y contextual, y deja abierta la alternativa 'palabras' sin imponerla en el texto principal.
- source_word: בְּמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - según justicia
  - con rectitud
  - con juicio
  lexicon: HALOT
  rationale: La preposición con el sustantivo mantiene el matiz ético-legal de manera directa. 'Con justicia' suena natural en español y preserva el valor normativo del término.
translation_notes:
  revision_awareness: Se siguió de cerca el hebreo y el auditorio textual inglés, pero se prefirió un español más natural que el calco. Se conservó la ambigüedad de דְּבָרָיו en nota, como en el POB inglés, porque la alternativa 'palabras' sigue siendo viable aunque el contexto favorece 'asuntos'.
  spanish_consistency_notes:
  - Se mantuvo 'Dios/Yahvé' fuera del versículo porque no aparece en el hebreo.
  - Se evitó 'Señor' y 'Cristo' por no corresponder al texto.
  - '''Clemente'' se eligió para reflejar la cualidad de favor/gracia sin reducirla a simple generosidad.'
