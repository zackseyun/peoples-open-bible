revisions:
- from: ¡Cómo han caído los poderosos en medio de la batalla! Jonatán yace muerto[a] sobre tus alturas.
  to: ¡Cómo han caído los valientes en medio de la batalla! Jonatán yace muerto sobre tus alturas[a].
