translation:
  language: es
  text: 'Entonces volvieron y le dijeron, y él dijo: «Es la palabra de Yahvé, que habló por medio de su siervo Elías el tisbita, diciendo: “En la porción[a] de Jezreel los perros comerán la carne de Jezabel”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En el territorio de Jezreel»; el hebreo חֵלֶק puede referirse a una porción, parcela o extensión de tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: So they returned
  chosen_spanish: Así que volvieron
  alternatives_spanish:
  - Entonces volvieron
  - Y volvieron
  lexicon: HALOT
  rationale: Conserva la secuencia narrativa del wayyiqtol con una conexión natural en español. «Volvieron» expresa el sentido básico de שוב sin añadir matices ajenos.
- source_word: וַיַּגִּידוּ לוֹ
  english_pob_choice: told him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le informaron
  - le reportaron
  lexicon: HALOT
  rationale: נגד en piel/hifil comunica dar aviso o relatar; en español, «le dijeron» es natural y fiel al acto de comunicar, sin volverlo más técnico de lo que el contexto exige.
- source_word: דְּבַר יְהוָה הוּא
  english_pob_choice: It is the word of Yahweh
  chosen_spanish: Es la palabra de Yahvé
  alternatives_spanish:
  - Es la palabra de Yahvé, eso es
  - Es la palabra de Yahvé misma
  lexicon: HALOT
  rationale: Se mantiene la cláusula nominal enfática con «Es la palabra de Yahvé». No se añade un pronombre explícito como «ello» porque en español la construcción ya transmite la identificación enfática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según el criterio del POB en español: transliteración del Tetragrámaton, no sustitución por un título.'
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: which he spoke
  chosen_spanish: la que él habló
  alternatives_spanish:
  - que él habló
  - la cual él habló
  lexicon: HALOT
  rationale: La relativa con antecedente femenino («palabra») pide «la que». «Habló» mantiene la conexión verbal directa con la profecía.
- source_word: בְּיַד עַבְדּוֹ
  english_pob_choice: by the hand of his servant
  chosen_spanish: por medio de su siervo
  alternatives_spanish:
  - por la mano de su siervo
  - a través de su siervo
  lexicon: HALOT
  rationale: El hebreo usa un idiomático בְּיַד para mediación/agencia. En español, «por medio de» preserva la función sin sonar artificial; «su siervo» es aquí el equivalente más natural de עבד en el servicio profético a Dios.
- source_word: אֵלִיָּהוּ הַתִּשְׁבִּי
  english_pob_choice: Elijah the Tishbite
  chosen_spanish: Elías el tisbita
  alternatives_spanish:
  - Elías de Tisbé
  - Elías, el tisbita
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se reproduce el gentilicio tradicional en forma clara y breve.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Fórmula introductoria estándar de discurso directo; «diciendo» conserva la relación sintáctica sin alterar el contenido.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  english_pob_choice: In the territory of Jezreel
  chosen_spanish: En la porción de Jezreel
  alternatives_spanish:
  - En el territorio de Jezreel
  - En el lote de Jezreel
  - En el parcelamiento de Jezreel
  lexicon: HALOT
  rationale: חֵלֶק puede significar porción, parcela o territorio. La opción «porción» mantiene la amplitud semántica de forma más directa que «territorio», sin decidir indebidamente por una sola delimitación geográfica. La nota aclara la alternativa posible.
- source_word: יֹאכְלוּ הַכְּלָבִים
  english_pob_choice: the dogs will eat
  chosen_spanish: los perros comerán
  alternatives_spanish:
  - los perros devorarán
  - los perros se comerán
  lexicon: HALOT
  rationale: יֹאכְלוּ se vierte de manera simple con futuro. «Comerán» conserva la crudeza del anuncio sin intensificarlo más allá del hebreo.
- source_word: בְּשַׂר אִיזָבֶל
  english_pob_choice: the flesh of Jezebel
  chosen_spanish: la carne de Jezabel
  alternatives_spanish:
  - el cuerpo de Jezabel
  - la carne de Jezabel
  lexicon: HALOT
  rationale: בָּשָׂר es literalmente «carne» y conviene mantener esa aspereza concreta en una profecía de juicio. «Carne» es más exacto que «cuerpo» aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita, y el criterio del POB en español es transliterarlo como «Yahvé» para preservar el nombre propio del Dios del pacto, no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Medición de la expresión בְּחֵלֶק יִזְרְעֶאל
  english_pob_reading: In the territory of Jezreel
  chosen_spanish_reading: En la porción de Jezreel
  alternative_spanish_readings:
  - En el territorio de Jezreel
  - En la parcela de Jezreel
  rationale: חֵלֶק admite un rango semántico que incluye porción, parcela o territorio. Se eligió «porción» para no cerrar prematuramente el alcance espacial del término; la nota mantiene visible la tensión lexical.
  doctrine_reference: Principio de transparencia lexical del POB
- issue: Fuerza concreta de בְּשַׂר
  english_pob_reading: the flesh of Jezebel
  chosen_spanish_reading: la carne de Jezabel
  alternative_spanish_readings:
  - el cuerpo de Jezabel
  - los restos de Jezabel
  rationale: El hebreo subraya la materialidad cruda del juicio. «Carne» conserva mejor esa dureza que «cuerpo» u otras suavizaciones.
  doctrine_reference: Principio de equivalencia lexical concreta
translation_notes:
  revision_awareness: 'Se ha mantenido alta concordancia con el audit trail inglés: se conserva la secuencia narrativa, el nombre divino como Yahvé, la mediación profética «por medio de», y la fuerza concreta de «carne». La única tensión lexical relevante está en חֵלֶק, que en español admite tanto «porción» como «territorio»; se optó por «porción» para reflejar mejor la amplitud del hebreo y se añadió nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se traduce עבד como «siervo» en el contexto profético, no «esclavo», porque aquí la relación de servicio a Dios es la que el texto activa.
  - Se conserva el tono narrativo sobrio y la cita directa con comillas angulares y comillas dobles internas, adecuados para publicación.
  - La nota de pie con marcador [a] está anclada en «porción», única palabra donde surge la alternativa lexical documentada.
