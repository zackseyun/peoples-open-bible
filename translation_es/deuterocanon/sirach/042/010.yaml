translation:
  language: es
  text: En su virginidad[a], no sea que sea seducida, y en la casa de su marido, no sea que se desvíe; en la casa de su padre, no sea que quede encinta, y en la casa de su marido[b], no sea que sea estéril.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «no sea que sea profanada», donde el hebreo tiene «no sea que sea seducida», haciendo explícito el sentido sexual.
    reason: alternative_reading
  - marker: b
    text: La última cláusula también puede traducirse más literalmente como «no sea que sea retenida», pero el paralelo griego favorece el sentido «no sea que sea estéril».
    reason: lexical_alternative
lexical_decisions:
- source_word: בבתוליה / ἐν παρθενίᾳ
  english_pob_choice: in her virginity
  chosen_spanish: en su virginidad
  alternatives_spanish:
  - mientras es virgen
  - en su estado de doncellez
  lexicon: HALOT; LSJ
  rationale: Conserva la referencia concreta al estado de virginidad/maidenhood sin amplificar el sentido. En español, "en su virginidad" mantiene la estructura breve del hebreo y del griego.
- source_word: פן תפתה / μὴ ποτε βεβηλωθῇ
  english_pob_choice: lest she be seduced / lest she be defiled
  chosen_spanish: para que no sea seducida
  alternatives_spanish:
  - para que no sea profanada
  - para que no sea corrompida
  lexicon: HALOT; BDAG
  rationale: El hebreo apunta a la seducción/engañosa vulneración sexual, y la POB inglesa ya distinguió la tensión con el griego, que expresa "defiled". En español, "seducida" preserva el matiz del hebreo y deja implícita la relación sexual comprometida.
- source_word: ובבית בעלה / μετὰ ἀνδρὸς οὖσα
  english_pob_choice: and in her husband’s house
  chosen_spanish: y en la casa de su marido
  alternatives_spanish:
  - y en el hogar de su marido
  - y viviendo con su marido
  lexicon: HALOT; LSJ
  rationale: '"Casa" traduce naturalmente el ámbito doméstico y social señalado por ambos testigos. Se conserva el referente marital explícito que el contexto exige.'
- source_word: לא תשטה / μὴ ποτε παραβῇ
  english_pob_choice: lest she go astray
  chosen_spanish: para que no se desvíe
  alternatives_spanish:
  - para que no se extravíe
  - para que no transgreda
  lexicon: HALOT; LSJ
  rationale: '"Desviarse" es un equivalente español natural para el hebreo de apartarse/errar y puede abarcar la dimensión moral y sexual sin precisar más allá de la fuente.'
- source_word: בבית אביה / ἐν τοῖς πατρικοῖς αὐτῆς
  english_pob_choice: in her father’s house
  chosen_spanish: en la casa de su padre
  alternatives_spanish:
  - en el hogar de su padre
  - en la casa paterna
  lexicon: HALOT; LSJ
  rationale: Es una equivalencia directa y transparente del entorno familiar previo al matrimonio.
- source_word: פן תהרה
  english_pob_choice: lest she become pregnant
  chosen_spanish: para que no quede encinta
  alternatives_spanish:
  - para que no quede embarazada
  - para que no conciba
  lexicon: HALOT; LSJ
  rationale: '"Quede encinta" es una fórmula bíblica clara y digna en español, muy cercana al sentido del hebreo de concebir/quedar preñada.'
- source_word: בבית אישה / συνῳκηκυῖα
  english_pob_choice: and in her husband’s house / and when married
  chosen_spanish: y en la casa de su marido
  alternatives_spanish:
  - y cuando esté casada
  - y en la casa de su esposo
  lexicon: HALOT; LSJ
  rationale: Se mantiene la misma forma doméstica del texto hebreo, ya que el segundo miembro retoma el ámbito matrimonial de manera paralela.
- source_word: פן תעצר / μὴ ποτε στειρώσῃ
  english_pob_choice: lest she be barren
  chosen_spanish: para que no sea estéril
  alternatives_spanish:
  - para que no sea incapaz de concebir
  - para que no quede estéril
  lexicon: HALOT; LSJ
  rationale: El griego apoya el sentido de esterilidad/barrenness frente a una lectura más literal como "reprimida/retenida". En español, "estéril" preserva la decisión auditada de la POB inglesa.
theological_decisions:
- issue: Relación entre el hebreo y el griego en la primera cláusula sexual
  english_pob_reading: Greek reads 'lest she be defiled' where the Hebrew has 'lest she be seduced,' making the sexual sense explicit.
  chosen_spanish_reading: se traduce "para que no sea seducida", con nota que reconoce la lectura griega de profanación/contaminación.
  alternative_spanish_readings:
  - para que no sea profanada
  - para que no sea deshonrada
  rationale: La traducción principal sigue el hebreo transmitido, pero la nota preserva la tensión textual documentada por la POB inglesa. Así no se borra la diferencia entre seducción y profanación sexual.
  doctrine_reference: 'PHILOSOPHY.md: Sirach se traduce desde el hebreo donde se conserva, usando el griego como apoyo y testimonio paralelo'
- issue: 'Sentido del final del versículo: barrenness versus restraint'
  english_pob_reading: The final clause could be rendered more literally 'lest she be restrained,' but the Greek parallel supports the sense 'lest she be barren.'
  chosen_spanish_reading: para que no sea estéril
  alternative_spanish_readings:
  - para que no sea retenida
  - para que no quede impedida
  rationale: Se sigue la interpretación confirmada por el griego y por la propia auditoría inglesa. "Estéril" comunica con claridad el resultado reproductivo que el paralelo griego hace probable.
  doctrine_reference: 'PHILOSOPHY.md: preferir el sentido corroborado por el paralelo cuando la literalidad hebrea queda oscura'
translation_notes:
  revision_awareness: 'Se ha revisado el versículo a la luz del hebreo de la edición Kahana y del paralelo griego de Swete. La decisión final coincide con la auditoría inglesa: hebreo como base textual principal, con el griego confirmando el matiz sexual de la primera advertencia y el sentido de esterilidad en la última cláusula.'
  spanish_consistency_notes:
  - Se mantiene "casa de su marido" de forma uniforme para las dos cláusulas matrimoniales, como reflejo del paralelismo del hebreo.
  - Se evita "Señor" o lenguaje eclesiástico no presente en el pasaje.
  - Se conserva un español sobrio y bíblico sin calcar mecánicamente la sintaxis hebrea o griega.
