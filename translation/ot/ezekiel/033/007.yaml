theological_decisions:
- issue: Retention of the recurring Ezekiel address בֶן אָדָם
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: Following the doctrine's gender-accurate principle and original-language primacy, the masculine singular idiom is retained in its familiar literal form rather than neutralized. In Ezekiel this is a stock address from God to the prophet, and preserving it avoids flattening its literary force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Rendering the prophetic commission with idiomatic English
  chosen_reading: I have made you a watchman ... when you hear ... you shall warn
  alternative_readings:
  - I have appointed you ... and you shall hear ... and you shall warn
  rationale: Optimal equivalence favors natural English while preserving the source's sequence and force. The translation avoids over-literal awkwardness but does not paraphrase beyond the Hebrew's commission structure.
  doctrine_reference: DOCTRINE.md §Translation philosophy; optimal equivalence
