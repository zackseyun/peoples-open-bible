translation:
  language: es
  text: Pero nosotros luchamos por nuestras vidas[a] y por nuestras leyes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestras almas». La palabra griega puede significar tanto «vidas» como «almas»; en este contexto de combate, «vidas» expresa mejor el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «nuestras costumbres legítimas» o «nuestras ordenanzas ancestrales».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Pero en cuanto a nosotros
  lexicon: LSJ
  rationale: δέ introduce contraste con lo anterior; «Pero nosotros» conserva el valor adversativo y el énfasis del sujeto explícito sin sonar artificial en español.
- source_word: πολεμοῦμεν
  english_pob_choice: are fighting
  chosen_spanish: luchamos
  alternatives_spanish:
  - estamos peleando
  - hacemos guerra
  lexicon: LSJ
  rationale: El presente indica una acción en curso; «luchamos» comunica combate real con naturalidad en español y evita un giro demasiado perifrástico.
- source_word: περὶ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en defensa de
  lexicon: LSJ
  rationale: Con un verbo de combate, περί expresa la causa o el interés en juego; «por» es la forma española más directa y fiel.
- source_word: τῶν ψυχῶν ἡμῶν
  english_pob_choice: our lives
  chosen_spanish: nuestras vidas
  alternatives_spanish:
  - nuestras almas
  - nuestras personas
  lexicon: LSJ
  rationale: ψυχή puede significar «vida» o «alma»; en este contexto militar la referencia inmediata es la preservación de la vida, por lo que «vidas» mantiene el sentido concreto.
- source_word: τῶν νομίμων ἡμῶν
  english_pob_choice: our laws
  chosen_spanish: nuestras leyes
  alternatives_spanish:
  - nuestras costumbres legítimas
  - nuestras ordenanzas ancestrales
  lexicon: LSJ
  rationale: νόμιμα denota lo establecido por ley o costumbre, con peso ancestral y religioso en 1 Macabeos. «Leyes» conserva esa seriedad y resulta más natural que una perífrasis explicativa en el texto principal.
theological_decisions:
- issue: Sentido de ψυχαί en un contexto bélico
  english_pob_reading: our lives
  chosen_spanish_reading: nuestras vidas
  alternative_spanish_readings:
  - nuestras almas
  rationale: El pasaje trata de guerra y supervivencia; traducir ψυχαί como «vidas» evita introducir una lectura dualista que el contexto no exige.
  doctrine_reference: Primacía del sentido inmediato del texto fuente sobre asociaciones doctrinales posteriores.
- issue: Alcance de νόμιμα
  english_pob_reading: our laws
  chosen_spanish_reading: nuestras leyes
  alternative_spanish_readings:
  - nuestras costumbres
  - nuestras ordenanzas ancestrales
  rationale: En 1 Macabeos, νόμιμα puede abarcar prácticas legales y ancestrales de la comunidad. «Leyes» preserva su gravedad normativa; las alternativas quedan como matices posibles.
  doctrine_reference: Equivalencia óptima con mantenimiento de la tensión léxica documentada.
translation_notes:
  revision_awareness: Coincide con la lectura revisada más reciente y con el dictamen de alta concordancia; no se detectaron cambios necesarios respecto del audit trail inglés.
  spanish_consistency_notes:
