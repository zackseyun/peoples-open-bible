review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la estructura del hebreo y varias decisiones léxicas importantes, pero falla en un punto clave: הִנֵּה נָא no significa «entiende», sino una llamada de atención como «mira»/«he aquí». Además, «sacos» para שַׂקִּים resulta demasiado literal y poco natural en español si no se expresa como tela de luto; y conviene preservar mejor la nota cultural sobre «sogas sobre nuestras cabezas».'
  spanish_quality_summary: El español es mayormente legible, pero «Por favor, entiende» suena semánticamente incorrecto y rompe el sentido del diálogo. «Sacos sobre nuestras cinturas» también suena tosco y puede sugerir bolsas, no vestidura de duelo. Una redacción más natural y fiel sería «Mira, por favor» y «tela áspera de luto sobre nuestras cinturas».
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Siervos» es aceptable para עֲבָדָיו en este contexto cortesano. «Casa de Israel» preserva correctamente בֵּית יִשְׂרָאֵל. «Reyes misericordiosos» refleja mejor מַלְכֵי חֶסֶד que «reyes de misericordia», aunque esta última no es imposible; se recomienda la forma adjetival por claridad y naturalidad en español.
  issues:
  - severity: high
    issue: Traducción incorrecta de הִנֵּה נָא como «Por favor, entiende»
    rationale: El hebreo introduce atención y cortesía/urgencia, no una apelación a comprender. «Entiende» altera el acto de habla y no preserva el sentido fuente ni la decisión léxica auditada en inglés.
  - severity: medium
    issue: «Sacos sobre nuestras cinturas» es demasiado literal y poco idiomático
    rationale: שַׂקִּים aquí se refiere a tela o vestidura de duelo/humillación. «Sacos» en español moderno puede malentenderse como bolsas. Conviene explicitar la idea con una formulación natural y fiel.
  - severity: medium
    issue: Falta la nota cultural equivalente para «sogas sobre nuestras cabezas»
    rationale: El rastro de auditoría en inglés conserva una nota cultural importante sobre el gesto de sumisión o rendición. Debe mantenerse también en español.
  - severity: low
    issue: «Reyes de misericordia» es menos natural que «reyes misericordiosos»
    rationale: Aunque intenta reflejar la construcción hebrea, en español suena rígido. La forma adjetival comunica con claridad la reputación de clemencia sin perder sentido.
