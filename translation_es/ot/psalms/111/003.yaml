lexical_decisions:
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: El hebreo הוֹד expresa resplandor, esplendor u honor. En español, «esplendor» conserva la idea de magnificencia radiante y funciona bien en paralelo con «majestad».
- source_word: הָדָר
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - hermosura
  - honor
  lexicon: HALOT
  rationale: En esta pareja poética, הָדָר suele expresar dignidad real, nobleza o majestad. «Majestad» mantiene el registro elevado y el paralelismo con «esplendor».
- source_word: פָּעֳלוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - sus obras
  lexicon: HALOT
  rationale: פֹּעַל puede significar obra, acto o actividad. «Su obra» refleja el singular hebreo y en español puede abarcar de manera natural el conjunto de sus actos.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: HALOT
  rationale: El término hebreo puede referirse a rectitud o justicia. Aquí el contexto alaba la calidad moral perdurable de Dios; «justicia» es una opción legítima y en español conserva esa amplitud semántica, mientras se mantiene la alternativa de «rectitud».
- source_word: עֹמֶדֶת
  english_pob_choice: stands
  chosen_spanish: permanece
  alternatives_spanish:
  - está en pie
  - se mantiene
  lexicon: HALOT
  rationale: El participio de עמד es literalmente «estar de pie». En español, «permanece» comunica continuidad duradera de manera natural, sin perder la idea de estabilidad.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión indica duración sin límite. «Para siempre» es la forma más clara y natural en español actual.
theological_decisions:
- issue: La traducción de צִדְקָתוֹ en un contexto de alabanza a la permanencia de Dios
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  rationale: El hebreo admite tanto «justicia» como «rectitud». Dado que el versículo afirma la estabilidad moral de Dios junto con la belleza de sus obras, «justicia» conserva bien el peso ético y jurídico del término sin restringirlo a un acto judicial específico.
  doctrine_reference: 'DOCTRINE.md: términos en disputa sobre δικαιοσύνη/צדק y su rango semántico entre justicia y rectitud.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios aplicados y el acuerdo de revisión es alto. La redacción española sigue el mismo sentido que la POB inglesa, preservando el paralelismo poético y la alternativa léxica principal en nota.'
  spanish_consistency_notes:
  - 'Se mantiene un paralelismo binario claro: «Esplendor y majestad».'
  - «Su obra» conserva el singular colectivo del hebreo.
  - «Para siempre» traduce la duración indefinida de לָעַד con estilo natural en español.
  - Se prefirió «justicia» como lectura principal, dejando «rectitud» en nota para reflejar la tensión léxica documentada.
