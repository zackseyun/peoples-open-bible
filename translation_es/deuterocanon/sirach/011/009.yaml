translation:
  language: es
  text: Hijo mío[a], no respondas a un asunto antes de oírlo, y no hables en medio de la conversación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No disputes sobre un asunto que no te hace falta, y no te sientes a juzgar con pecadores». El hebreo conservado y el griego difieren sustancialmente aquí; el texto principal sigue el testimonio hebreo, y el griego queda preservado como tradición textual alternativa.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, muchacho
  lexicon: HALOT
  rationale: Conserva el vocativo filial y el tono sapiencial directo del hebreo. En español, «Hijo mío» es natural y mantiene la relación maestro-discípulo sin añadir matices ausentes.
- source_word: אַל תָּשִׁיב דָּבָר
  english_pob_choice: do not answer a matter
  chosen_spanish: no respondas a un asunto
  alternatives_spanish:
  - no respondas a un asunto antes de oírlo
  - no contestes a una cuestión
  lexicon: HALOT
  rationale: «Responder» recoge el sentido básico de השיב en este contexto sapiencial. «Asunto» conserva la amplitud de דָּבָר como asunto/materia, y evita reducirlo indebidamente a una simple «palabra».
- source_word: טֶרֶם תִּשְׁמָע
  english_pob_choice: before you hear it
  chosen_spanish: antes de escucharlo
  alternatives_spanish:
  - antes de oírlo
  - antes de haberlo oído
  lexicon: HALOT
  rationale: «Escucharlo» suena más natural en español que una repetición rígida de «oírlo», pero sigue expresando la prioridad temporal de טֶרֶם y el acto receptivo de שמע.
- source_word: וּבְתוֹךְ שִׂיחָה
  english_pob_choice: in the midst of conversation
  chosen_spanish: en medio de la conversación
  alternatives_spanish:
  - en medio de la charla
  - durante la conversación
  lexicon: HALOT
  rationale: «Conversación» refleja bien שִׂיחָה y mantiene la formulación natural ya atestiguada en el audit trail inglés. No se añadió «ajena» porque el hebreo no lo explicita.
- source_word: אַל תְּדַבֵּר
  english_pob_choice: do not speak
  chosen_spanish: no hables
  alternatives_spanish:
  - no digas nada
  - no hables más
  lexicon: HALOT
  rationale: «Hablar» reproduce el verbo ordinario דבר con tono sobrio y general. En combinación con la primera cola, el sentido es no interrumpir ni adelantarse en la conversación.
- source_word: περὶ πράγματος οὗ οὐκ ἔστιν σοι χρεία μὴ ἔριζε
  english_pob_choice: do not quarrel about a matter you have no need of
  chosen_spanish: no respondas a un asunto antes de escucharlo
  alternatives_spanish:
  - no disputes sobre un asunto que no te incumbe
  - no riñas por un asunto que no necesitas
  lexicon: BDAG
  rationale: El texto principal sigue el hebreo conservado, no la formulación griega divergente. La tradición griega apoya el tema de no involucrarse precipitadamente en un asunto, pero no se traslada como base porque sería una relectura textual.
- source_word: καὶ ἐν κρίσει ἁμαρτωλῶν μὴ σύνεδρευε
  english_pob_choice: and do not sit in judgment with sinners
  chosen_spanish: y no hables en medio de la conversación
  alternatives_spanish:
  - y no te sientes a juzgar con pecadores
  - y no participes en el juicio de los pecadores
  lexicon: BDAG
  rationale: Este hemistiquio griego representa una tradición textual alternativa y no equivalente al hebreo. Se mantiene fuera del texto principal para respetar el testimonio hebreo base, pero se documenta como variante significativa.
theological_decisions:
- issue: Manejo de la divergencia textual entre el hebreo y el griego
  english_pob_reading: Main text follows the surviving Hebrew witness; the Greek is preserved as an alternative textual tradition.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; el griego se preserva como tradición textual alternativa.
  alternative_spanish_readings:
  - Adoptar el griego como texto base
  - mezclar el hebreo y el griego en una sola redacción
  rationale: La traducción de Sirácida en POB se rige por el testimonio hebreo cuando es extenso y confiable. Aquí el griego ofrece un contenido notablemente distinto, por lo que debe quedar registrado sin desplazar el texto principal.
  doctrine_reference: Textual criticism; source hierarchy in deuterocanonical translation practice
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la segunda mitad para reflejar más directamente el hebreo («in the midst of conversation»), y también la nota crítica que preserva la variante griega sustancialmente divergente. El español sigue el hebreo como texto principal y documenta la tradición griega en nota.
  spanish_consistency_notes:
  - Se mantuvo «Hijo mío» para conservar el vocativo sapiencial y la explicitud masculina del hebreo.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, porque este versículo no contiene el nombre divino.
  - «Asunto» y «conversación» sostienen un registro bíblico claro sin calco rígido.
  - La nota al pie señala la variante griega sin introducirla en el cuerpo principal, conforme al expediente auditado.
