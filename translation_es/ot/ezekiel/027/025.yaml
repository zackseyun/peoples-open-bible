translation:
  language: es
  text: Las naves de Tarsis eran tus portadoras[a][b], y te llenaste y te volviste muy pesada en el corazón de los mares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las naves de Tarsis eran portadoras de tus mercancías»; también, «... de tus mercaderías».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el corazón de los mares», un giro idiomático que significa en medio o en lo profundo del mar.'
    reason: cultural_note
lexical_decisions:
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: the ships of Tarshish
  chosen_spanish: Los barcos de Tarsis
  alternatives_spanish:
  - Los barcos de Tarshish
  - Los barcos tarsisitas
  - Las naves de Tarsis
  lexicon: HALOT
  rationale: Conservo la expresión constructa y el referente geográfico tradicional en español como Tarsis. 'Barcos' suena natural y comunica el valor náutico sin perder la imagen técnica/comercial del hebreo; 'naves' sería posible, pero menos directo en español moderno.
- source_word: שָׁרוֹתַיִךְ
  english_pob_choice: were your carriers
  chosen_spanish: fueron tus transportadores
  alternatives_spanish:
  - fueron tus cargueros
  - fueron tus portadores
  - fueron tus transportistas
  lexicon: HALOT
  rationale: El POB inglés revisado opta por el valor de transporte/servicio. En español, 'transportadores' reproduce mejor esa función de medio de traslado que 'cargueros', sin imponer un matiz inexistente de mercancía como oficio. Mantengo el posesivo femenino singular por el destinatario profético (Tiro).
- source_word: מַעֲרָבֵךְ
  english_pob_choice: for your merchandise
  chosen_spanish: de mercancías
  alternatives_spanish:
  - para tu mercancía
  - de tus mercaderías
  - para tus bienes
  lexicon: HALOT
  rationale: El sustantivo en este pasaje se refiere a bienes de comercio. 'Mercancías' es el equivalente español más natural y conserva el registro mercantil del lamento; 'mercadería' también sería posible, pero 'mercancías' suena más claro en español contemporáneo.
- source_word: וַתִּמָּלְאִי
  english_pob_choice: you were filled
  chosen_spanish: te llenaste
  alternatives_spanish:
  - fuiste llenada
  - quedaste llena
  - te colmaste
  lexicon: HALOT
  rationale: El valor resultativo del verbo se expresa de manera idiomática en español con 'te llenaste'. Evita la pasiva forzada y conserva la imagen de saturación de carga.
- source_word: וַתִּכְבְּדִי
  english_pob_choice: became very heavy
  chosen_spanish: te volviste muy pesada
  alternatives_spanish:
  - te hiciste muy pesada
  - te cargaste mucho
  - te volviste muy cargada
  lexicon: HALOT
  rationale: El hebreo usa la metáfora física del peso por la carga. 'Te volviste muy pesada' mantiene esa imagen sin introducir la abstracción de 'honor' que no encaja aquí. En español, el femenino concuerda con la ciudad representada en el discurso profético.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  - excesivamente
  lexicon: HALOT
  rationale: Intensificador estándar; 'muy' es la opción más natural y fiel en español actual.
- source_word: בְּלֵב יַמִּים
  english_pob_choice: in the heart of the seas
  chosen_spanish: en el corazón de los mares
  alternatives_spanish:
  - en medio de los mares
  - en lo profundo de los mares
  - en alta mar
  lexicon: HALOT
  rationale: Conservo la metáfora hebrea del 'corazón' para reflejar el giro idiomático y su fuerza poética. 'Mares' traduce el plural hebreo y mantiene la imagen amplificada del original.
theological_decisions:
- issue: Metáfora de peso y saturación en un oráculo contra Tiro
  english_pob_reading: you were filled and became very heavy in the heart of the seas
  chosen_spanish_reading: te llenaste y te volviste muy pesada en el corazón de los mares
  alternative_spanish_readings:
  - te llenaste y quedaste muy cargada en el corazón de los mares
  - te colmaste y te hiciste muy pesada en el corazón de los mares
  rationale: Sigo el paralelismo del hebreo entre llenura y peso, que describe el efecto del comercio sobre Tiro. 'Muy pesada' conserva la metáfora sin espiritualizarla ni suavizarla, y evita convertir el texto en una simple descripción económica.
  doctrine_reference: None
- issue: Sujeto corporativo femenino de Tiro
  english_pob_reading: you were filled... you became very heavy
  chosen_spanish_reading: te llenaste... te volviste muy pesada
  alternative_spanish_readings:
  - fuiste llenada... fuiste hecha muy pesada
  - se te llenó... se te hizo muy pesada
  rationale: El hebreo dirige el discurso a Tiro como entidad femenina singular; el español debe reflejar esa personificación con verbos en segunda persona singular femenina. Así se preserva la retórica profética y la coherencia pronominal del pasaje.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'caravans' por 'carriers' para ajustar mejor la función de los barcos como transportadores; la redacción española sigue esa revisión y evita una imagen de caravana terrestre. También se conservó la metáfora espacial 'heart of the seas' del inglés auditado, pero en español con 'corazón' para mantener la imagen original.
  spanish_consistency_notes:
  - Se usa 'Tarsis' de forma consistente para תַּרְשִׁישׁ.
  - Se mantiene el femenino singular para el destinatario (Tiro), coherente con el discurso profético.
  - '''Mercancías'' y ''transportadores'' sostienen el campo semántico comercial sin introducir terminología eclesiástica.'
  - Se conserva la metáfora náutica y espacial del original sin domesticarla a 'en alta mar'.
