  spanish_consistency_notes:
  - Se mantiene el orden de los nombres del hebreo y de la POB inglesa.
  - No se añaden artículos ni conectores, porque el hebreo presenta una simple lista nominal.
  - «Baruc» se usa como nombre propio españolizado; no se traduce el sentido léxico de בָּרוּךְ.
  - «Ginnetón» busca equilibrio entre transparencia al hebreo y fluidez en español.
