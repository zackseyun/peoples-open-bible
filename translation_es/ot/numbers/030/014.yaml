  rationale: Se corrige la estructura para que 'de afligir el alma' corresponda al conjunto de 'todo voto y todo juramento vinculante', tal como en el hebreo. También se reemplaza 'juramentación' por 'juramento vinculante' para reflejar mejor שְׁבֻעַת אִסָּר y mejorar la naturalidad del español, manteniendo la nota sobre las alternativas idiomáticas de לְעַנֹּת נָפֶשׁ.
