id: GEN.49.3
reference: Genesis 49:3
source:
  edition: WLC
  text: רְאוּבֵן֙ בְּכֹ֣רִ/י אַ֔תָּה כֹּחִ֖/י וְ/רֵאשִׁ֣ית אוֹנִ֑/י יֶ֥תֶר שְׂאֵ֖ת וְ/יֶ֥תֶר עָֽז׃
translation:
  text: Reuben[a], you are my firstborn, my strength and the firstfruits of my vigor[b], excelling in honor and excelling in power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the beginning of my strength"; the Hebrew phrase refers to the first expression of a father's generative vigor.
    reason: lexical_alternative
  - marker: b
    text: Or "preeminent in dignity and preeminent in power."
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹרִי
  chosen: my firstborn
  alternatives:
  - my eldest son
  lexicon: HALOT
  rationale: בכור denotes the firstborn son with both birth-order and status implications. 'My firstborn' preserves the familial and inheritance connotations better than the more merely chronological 'my eldest son.'
- source_word: כֹּחִי
  chosen: my strength
  alternatives:
  - my power
  lexicon: HALOT
  rationale: כח commonly means strength or power. 'My strength' fits the poetic parallelism and natural English in a paternal blessing/oracle context.
- source_word: רֵאשִׁית אֹנִי
  chosen: the firstfruits of my vigor
  alternatives:
  - the beginning of my strength
  - the first of my virility
  - the first issue of my manly vigor
  lexicon: HALOT
  rationale: The phrase is idiomatic and refers to the first expression of the father's generative strength. אֹן can denote vigor or virility. 'The firstfruits of my vigor' communicates both primacy and generative force in readable modern English, while avoiding overly clinical or archaic wording.
- source_word: יֶתֶר שְׂאֵת
  chosen: excelling in honor
  alternatives:
  - preeminent in dignity
  - surpassing in exaltation
  - abounding in rank
  lexicon: HALOT
  rationale: יתר conveys excess, superiority, or preeminence; שׂאת can denote elevation, exaltation, or dignity/honor. 'Excelling in honor' preserves the comparative force and reads naturally in English poetry.
- source_word: יֶתֶר עָז
  chosen: excelling in power
  alternatives:
  - preeminent in might
  - surpassing in strength
  lexicon: HALOT
  rationale: As in the previous phrase, יתר marks superiority. עז denotes strength, might, or power. 'Excelling in power' preserves the parallelism with the prior clause and avoids redundancy with earlier 'my strength' while keeping the semantic field.
- source_word: אַתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and functions predicatively here. Rendering it with 'you are' produces clear English and preserves the emphatic direct address.
