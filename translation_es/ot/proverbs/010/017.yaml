    rationale: La evidencia y el audit trail favorecen una idea direccional o resultativa («to life»). «Camino de la vida» puede leerse como genitivo descriptivo, no como trayectoria hacia la vida.
  - severity: medium
    issue: La nota alternativa no coincide con la alternativa inglesa auditada
    rationale: La POB inglesa documenta «is a path to life», no «es camino de vida». En español conviene conservar «es un camino a la vida» para reflejar fielmente la opción predicativa tersa.
  revised_spanish_text: Quien guarda la disciplina está en el camino[a] a la vida, pero el que abandona la reprensión extravía a otros.
