id: 1SA.10.9
reference: 1 Samuel 10:9
source:
  edition: WLC
  text: וְ/הָיָ֗ה כְּ/הַפְנֹת֤/וֹ שִׁכְמ/וֹ֙ לָ/לֶ֨כֶת֙ מֵ/עִ֣ם שְׁמוּאֵ֔ל וַ/יַּהֲפָךְ ל֥/וֹ אֱלֹהִ֖ים לֵ֣ב אַחֵ֑ר וַ/יָּבֹ֛אוּ כָּל הָ/אֹת֥וֹת הָ/אֵ֖לֶּה בַּ/יּ֥וֹם הַ/הֽוּא־־׃ס
translation:
  text: And it happened[a], when he turned his back to go from Samuel, that God gave him another heart[b], and all these signs came to pass on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he turned his back to leave.' The Hebrew literally says 'turned his shoulder,' an idiom for departing.
    reason: lexical_alternative
  - marker: b
    text: Or 'God gave him a different heart.' The Hebrew is literally 'God changed for him another heart.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol/introduction formula. 'And it happened' preserves the Hebrew discourse marker in readable modern English without archaic 'came to pass.'
- source_word: כְּהַפְנֹתוֹ שִׁכְמוֹ
  chosen: when he turned his shoulder
  alternatives:
  - when he turned his back
  - as he turned to leave
  lexicon: HALOT
  rationale: Literally 'when his turning his shoulder.' Retaining 'shoulder' reflects the Hebrew idiom more closely than smoothing to 'back,' while still making sense in English as a gesture of departure.
- source_word: לָלֶכֶת מֵעִם שְׁמוּאֵל
  chosen: to go from Samuel
  alternatives:
  - to leave Samuel
  - to go away from Samuel
  lexicon: HALOT
  rationale: Keeps the infinitive sense and the preposition 'from/away from' without over-paraphrasing. 'From Samuel' is slightly formal but transparent to the source.
- source_word: וַיַּהֲפָךְ
  chosen: changed
  alternatives:
  - turned
  - transformed
  lexicon: HALOT
  rationale: The verb means to turn/change. 'Changed' best fits the object 'heart' in idiomatic English while preserving the sense of divine alteration.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the plural form clearly takes singular sense with singular verb, referring to Israel's God. 'God' is the natural English rendering.
- source_word: לֵב אַחֵר
  chosen: another heart
  alternatives:
  - a different heart
  - a changed heart
  lexicon: HALOT
  rationale: Literally 'another heart.' This preserves the Hebrew expression and its theological nuance of inner disposition being altered, without importing later doctrinal language.
- source_word: וַיָּבֹאוּ
  chosen: came about
  alternatives:
  - came
  - happened
  - were fulfilled
  lexicon: HALOT
  rationale: With 'signs' as subject, 'came about' communicates occurrence/fulfillment naturally in English. 'Were fulfilled' would add interpretive weight not explicit in the verb alone.
- source_word: כָּל הָאֹתוֹת הָאֵלֶּה
  chosen: all these signs
  alternatives:
  - all those signs
  - all these tokens
  lexicon: HALOT
  rationale: Straightforward rendering of the demonstrative phrase, referring back to Samuel's predicted signs.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that very day
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is natural and sufficiently precise.
