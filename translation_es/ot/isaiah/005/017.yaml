review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo auditado: consecuencia de juicio (''Entonces''), animales que pastan, ruinas de los prósperos y reversión social. Sin embargo, la traducción de גרים como «forasteros» pierde parte del matiz de residentes de paso/sojourners que el POB inglés revisó explícitamente, y la nota d introduce inglés (''sojourners''), impropio en una edición bíblica española.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en precisión y naturalidad. «Forasteros» suena comprensible, aunque menos exacto que «residentes temporales» o una formulación equivalente. «Los engordados» es algo tosco en español bíblico; «los bien alimentados» suena más natural y sigue el rationale del inglés sin sobreinterpretar hacia «ricos». Además, las notas deben anclarse junto a las palabras relevantes, no todas acumuladas al final.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La principal desviación léxica es גרים: conviene reflejar el valor de ''sojourners'' en español. También conviene ajustar מֵחִים a «los bien alimentados» para alinearse mejor con la decisión inglesa ''well-fed'' y evitar una expresión española menos idiomática.'
  issues:
  - severity: medium
    issue: «forasteros» no preserva plenamente el matiz de גרים / 'sojourners'.
    rationale: גרים se refiere más específicamente a residentes de paso o foráneos asentados temporalmente, no solo a gente de fuera en sentido general. El POB inglés además revisó deliberadamente 'strangers' a 'sojourners'.
  - severity: medium
    issue: La nota d contiene el anglicismo «sojourners».
    rationale: Las notas de una Biblia en español deben estar plenamente en español. Puede explicarse como «residentes temporales», «forasteros residentes» o similar.
  - severity: low
    issue: «los engordados» es menos natural que «los bien alimentados».
    rationale: Aunque literaliza la imagen concreta, en español suena más duro y menos idiomático. «Bien alimentados» conserva la imagen física y la posible connotación social del original auditado.
  - severity: low
    issue: Los marcadores de nota están todos al final de la oración.
    rationale: Según las instrucciones, cada marcador debe aparecer en la palabra o frase pertinente. Acumularlos al final reduce claridad y no refleja bien qué nota corresponde a qué expresión.
  revised_spanish_text: Entonces los corderos[a] pastarán como en su pastizal[b], y los residentes temporales[d] comerán entre las ruinas de los bien alimentados[c].
  revised_footnotes:
