review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la finalidad de que Dios dirija el corazón del pueblo hacia sí, para andar en sus caminos y guardar la tríada legal del pacto. También preserva adecuadamente «padres» para אֲבֹתֵינוּ. Sin embargo, introduce una nota al pie sobre «nuestro corazón / nuestros corazones» que no está respaldada por el texto fuente ni por la auditoría inglesa, ya que el hebreo aquí lleva forma dual/plural constructa con sufijo 1cp y el POB inglés traduce «our hearts».'
  spanish_quality_summary: El español es claro, digno y generalmente natural. «Incline nuestro corazón hacia él» suena aceptable, pero «nuestros corazones hacia sí» se alinea mejor con el plural del hebreo y con el matiz del POB inglés «to himself». La redacción revisada mejora la fidelidad sin perder fluidez. La nota existente crea confusión innecesaria.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: se conservan «mandamientos», «estatutos» y «juicios», y «padres» mantiene la referencia masculina del hebreo. No hay conflicto con términos teológicos mayores del glosario. La única desviación relevante es la decisión de singularizar «corazón» y justificarlo con una nota no apoyada por la evidencia auditada.'
  issues:
  - severity: medium
    issue: «nuestro corazón» singulariza לְבָבֵנוּ frente al plural de la traducción auditada «our hearts».
    rationale: Aunque en español a veces puede usarse el singular colectivo, aquí no hay necesidad clara de apartarse del audit trail ni del valor morfológico esperado. «Nuestros corazones» suena natural y preserva mejor la antropología hebrea expresada en plural posesivo.
  - severity: high
    issue: La nota [a] del borrador introduce una alternativa textual/lexical incorrecta sobre «nuestro corazón / nuestros corazones».
    rationale: La nota afirma una oscilación que no corresponde a la evidencia presentada y desplaza la nota inglesa auténtica, que va con «nuestros padres / antepasados». Esto altera el registro de decisiones documentadas y debe corregirse.
  - severity: low
    issue: «hacia él» pierde levemente el matiz de «to himself».
    rationale: No es un error grave, pero «hacia sí» expresa mejor la dirección hacia Dios mismo y sigue siendo natural en español bíblico contemporáneo.
  revised_spanish_text: para que incline nuestros corazones hacia sí, para andar en todos sus caminos y para guardar sus mandamientos, sus estatutos y sus juicios, que mandó a nuestros padres[a].
  revised_footnotes:
