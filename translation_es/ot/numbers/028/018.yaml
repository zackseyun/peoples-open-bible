revisions:
- from: En el primer día habrá una convocación santa[a]; no harán ningún trabajo ordinario[b].
  to: El primer día habrá santa convocación[a]; no harán ningún trabajo ordinario[b].
  rationale: Se corrige la frase temporal para un español más natural ('El primer día'), se mejora el orden de la expresión cultual a 'santa convocación' sin perder el matiz de מִקְרָא קֹדֶשׁ, y se pule la nota alternativa para reflejar mejor 'sacred assembly' en español.
