translation:
  language: es
  text: 'Y para la tribu de los hijos de Neftalí[a], un líder: Pedahel, hijo de Ammihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “hijos de Neftalí”, una designación tribal estándar que significa los descendientes de Neftalí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En contextos de reparto tribal, מַטֶּה significa 'tribu' y no el objeto físico 'bastón/vara'. El conjunto prefijado con וּ/לְ se expresa de forma natural en español como 'Y para'.
- source_word: בְנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos varones de
  - los descendientes de
  lexicon: HALOT
  rationale: La expresión constructa בְנֵי נַפְתָּלִי es literalmente 'hijos de Neftalí'. En español, 'hijos de' conserva la forma tribal heredada sin borrar el valor masculino gramatical del hebreo.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: Nombre propio
  rationale: Se translitera el nombre tribal al español bíblico estándar como 'Neftalí', forma clara y reconocible para lector hispanohablante.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  - un caudillo
  lexicon: HALOT
  rationale: En esta lista administrativa, נָשִׂיא designa al responsable designado de la tribu. 'Líder' comunica la función sin introducir connotaciones monárquicas de 'príncipe'.
- source_word: פְּדַהְאֵל
  english_pob_choice: Pedahel
  chosen_spanish: Pedael
  alternatives_spanish:
  - Pedael
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio al español siguiendo la forma bíblica habitual y la pronunciación esperable en castellano.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La fórmula patronímica estándar se rinde de manera directa como 'hijo de', que es natural y precisa en español.
- source_word: עַמִּיהוּד
  english_pob_choice: Ammihud
  chosen_spanish: Ammihud
  alternatives_spanish:
  - Ammihud
  lexicon: Nombre propio
  rationale: Nombre propio transliterado sin cambios.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis auditado en inglés: mantiene la designación tribal idiomática ''hijos de Neftalí'', conserva la función administrativa de נָשִׂיא como ''líder'' y translitera los nombres propios sin reinterpretarlos. No se documentan revisiones textuales o teológicas adicionales en el expediente, y el pasaje presenta alto acuerdo entre fuentes.'
  spanish_consistency_notes:
  - 'Se preserva el orden informativo del hebreo y del POB inglés: marco tribal, cargo, nombre y patronímico.'
  - '''Neftalí'' y ''Pedael'' siguen la convención española bíblica; ''Ammihud'' se mantiene transliterado por ser nombre propio.'
  - La nota al pie explica la expresión tribal sin sustituirla por una paráfrasis interpretativa en el cuerpo del texto.
