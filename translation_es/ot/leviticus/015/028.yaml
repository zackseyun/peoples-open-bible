revisions:
- from: Pero si ella se ha limpiado[a] de su flujo, entonces contará para sí siete días, y después quedará limpia.
  to: Pero si ella ha quedado limpia[a] de su flujo, entonces contará para sí siete días, y después quedará limpia.
  rationale: Se revisa «se ha limpiado» a «ha quedado limpia» para reflejar con más naturalidad y precisión el valor ritual/resultativo de טָהֲרָה en español, evitando un matiz reflexivo innecesario. Se conserva la repetición de «limpia» para mantener la relación léxica entre ambas formas de טהר, y se mantiene la nota alternativa con «purificada».
