    reason: alternative_reading
  revision_rationale: 'Se corrige el texto principal para alinearlo con la evidencia hebrea y con las decisiones léxicas/teológicas documentadas: יָד וָשֵׁם se vierte mejor como «un monumento y un nombre» en el cuerpo del texto, mientras «memorial» queda como alternativa de nota; y se restituye el cambio de plural a singular en la cláusula final («le daré»), acompañado por una nota que explica esa individualización.'
