id: GEN.42.21
reference: Genesis 42:21
source:
  edition: WLC
  text: וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל אָחִ֗י/ו אֲבָל֮ אֲשֵׁמִ֣ים אֲנַחְנוּ֮ עַל אָחִי/נוּ֒ אֲשֶׁ֨ר רָאִ֜ינוּ צָרַ֥ת נַפְשׁ֛/וֹ בְּ/הִתְחַֽנְנ֥/וֹ אֵלֵ֖י/נוּ וְ/לֹ֣א שָׁמָ֑עְנוּ עַל כֵּן֙ בָּ֣אָה אֵלֵ֔י/נוּ הַ/צָּרָ֖ה הַ/זֹּֽאת־׀־־׃
translation:
  text: Then they said to one another[a], “Indeed, we are guilty concerning our brother, because we saw the distress of his soul when he pleaded with us, and we did not listen[b]. Therefore this distress has come upon us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his anguish.' The Hebrew literally says 'the distress of his soul,' an expression for deep personal anguish.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same root for Joseph's 'distress' and the brothers' present 'distress,' linking their past cruelty with their current suffering.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמְרוּ אִישׁ אֶל־אָחִיו
  chosen: Then they said to one another
  alternatives:
  - And they said, each to his brother
  - And they said to each other
  lexicon: HALOT
  rationale: The idiom אִישׁ אֶל־אָחִיו is a distributive expression meaning the brothers spoke among themselves. 'To one another' is natural English and preserves the reciprocal sense better than a wooden 'each to his brother.' 'Then' reflects the narrative waw in smooth English.
- source_word: אֲבָל
  chosen: Truly
  alternatives:
  - Indeed
  - Surely
  - Alas
  lexicon: HALOT
  rationale: Here אֲבָל introduces an emphatic acknowledgment rather than contrast. 'Truly' captures the force of solemn admission. 'Alas' would overemphasize lament, and 'but' would suggest contrast not primary here.
- source_word: אֲשֵׁמִים אֲנַחְנוּ
  chosen: we are guilty
  alternatives:
  - we are culpable
  - we are at fault
  lexicon: HALOT
  rationale: The adjective denotes guilt/liability. 'We are guilty' is the clearest and most idiomatic rendering in this confessional context.
- source_word: עַל־אָחִינוּ
  lemma: עַל
  chosen: concerning our brother
  alternatives:
  - because of our brother
  - with regard to our brother
  - against our brother
  lexicon: HALOT
  rationale: The preposition עַל here marks the matter in which their guilt lies. 'Concerning our brother' is precise and avoids overstating hostility with 'against,' though that nuance is possible contextually.
- source_word: אֲשֶׁר רָאִינוּ
  chosen: because we saw
  alternatives:
  - that we saw
  - for we saw
  lexicon: HALOT
  rationale: The relative clause explains the basis of their guilt. In English, 'because we saw' makes the causal relationship explicit and natural.
- source_word: צָרַת נַפְשׁוֹ
  chosen: the distress of his soul
  alternatives:
  - his anguish
  - the anguish of his life
  - his deep distress
  lexicon: HALOT
  rationale: Literally the phrase is 'the distress of his soul/life.' Retaining 'of his soul' preserves the Hebrew expression and emotional depth, while remaining understandable in English. A more idiomatic 'his anguish' is possible but less transparent to the source.
- source_word: בְּהִתְחַנְנוֹ אֵלֵינוּ
  chosen: when he pleaded with us
  alternatives:
  - as he begged us for mercy
  - in his pleading with us
  lexicon: HALOT
  rationale: The hitpael of חנן here conveys earnest supplication. 'Pleaded with us' is natural, accurate, and avoids adding 'for mercy' explicitly where the Hebrew leaves the object implicit.
- source_word: וְלֹא שָׁמָעְנוּ
  chosen: and we did not listen
  alternatives:
  - and we did not hear
  - but we would not listen
  lexicon: HALOT
  rationale: שׁמע in this context means not merely auditory hearing but heeding. 'Did not listen' best conveys refusal to heed his plea.
- source_word: עַל־כֵּן
  chosen: That is why
  alternatives:
  - Therefore
  - For this reason
  lexicon: HALOT
  rationale: This phrase marks consequence. 'That is why' is idiomatic modern English and preserves the causal connection.
- source_word: בָּאָה אֵלֵינוּ הַצָּרָה הַזֹּאת
  chosen: this distress has come upon us
  alternatives:
  - this trouble has come upon us
  - this calamity has come upon us
  lexicon: HALOT
  rationale: צָרָה echoes earlier צָרַת, creating a wordplay between Joseph's distress and their present distress. Rendering both with 'distress' preserves that lexical connection. 'Come upon us' reflects the Hebrew idiom naturally.
