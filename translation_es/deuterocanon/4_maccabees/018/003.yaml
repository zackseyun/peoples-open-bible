review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura principal del griego: la relación causal/consecutiva, la entrega de los cuerpos a los sufrimientos, el contraste «no solo… sino también», la admiración humana y la dignificación con «una porción divina». Sin embargo, «porque de su piedad» no refleja correctamente διὰ τὴν εὐσέβειαν y produce una construcción no idiomática; además, «cuando aquellos dieron» suena incompleto al omitir «hombres» o un referente claro para ἐκεῖνοι.'
  spanish_quality_summary: El español actual del borrador tiene problemas de naturalidad y claridad sintáctica. «Por esto» es posible, pero «Por esta razón» suena más natural en registro bíblico digno. «Porque de su piedad» es incorrecto en español. «Cuando aquellos dieron sus cuerpos» resulta torpe por el pronombre sin antecedente expreso. El resto del verso es mayormente claro y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Piedad» puede mantenerse para εὐσέβεια en este contexto, aunque debe ir con una construcción correcta («a causa de su piedad»). «Una porción divina» conserva adecuadamente la ambigüedad de θείας μερίδος, y la nota alternativa está bien orientada.
  issues:
  - severity: high
    issue: 'Construcción incorrecta: «porque de su piedad»'
    rationale: διὰ τὴν εὐσέβειαν significa «a causa de / por motivo de su piedad», no «porque de». La frase actual no es español aceptable y no representa fielmente la sintaxis del original.
  - severity: medium
    issue: Referente incompleto en «cuando aquellos dieron sus cuerpos»
    rationale: ἐκεῖνοι apunta a los previamente mencionados mártires/hombres. En español, «aquellos» solo, sin sustantivo explícito, suena brusco y menos claro que «aquellos hombres» o una reformulación equivalente.
  - severity: low
    issue: «Por esto» es menos natural que «Por esta razón»
    rationale: Aunque semánticamente cercano, «Por esta razón» refleja mejor el valor inferencial de ἀνθʼ ὧν en español culto y evita una apertura algo seca.
  revised_spanish_text: Por esta razón[a], a causa de su piedad, cuando aquellos hombres entregaron sus cuerpos a aquellos sufrimientos, no solo fueron admirados por los hombres, sino que también fueron considerados dignos de una porción divina.
  revised_footnotes:
  - marker: a
    text: O «una porción de Dios» o «una participación en lo divino». La frase griega es breve y puede referirse tanto a una recompensa asignada por Dios como a una participación en una porción divina.
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis defectuosa de «porque de su piedad» a «a causa de su piedad», se explicita el referente de ἐκεῖνοι con «aquellos hombres» para mayor claridad, y se mejora la naturalidad inicial con «Por esta razón». Se mantiene «una porción divina» con su nota para preservar la ambigüedad teológica documentada.
