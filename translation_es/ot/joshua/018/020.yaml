revisions:
- from: Y el Jordán formó su límite por el lado oriental[a]. Esta fue la herencia de los hijos de Benjamín, según sus límites alrededor[b], por sus clanes.
  to: Y el Jordán servía de límite para él por el lado oriental[a]. Esta fue la herencia de los hijos de Benjamín, según sus límites por todos lados[b], por sus clanes.
  rationale: Se ajusta el verbo principal para expresar de manera más natural en español que el Jordán funcionaba como frontera territorial, y se mejora la fluidez de la frase resumidora sobre los límites alrededor del territorio. Se conservan el contenido, la estructura y las decisiones léxicas clave del POB, con notas alineadas a las alternativas fuente.
