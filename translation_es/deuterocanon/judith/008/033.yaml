review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: instrucción de permanecer en la puerta esa noche, salida de Judit con su sierva, referencia al plazo mencionado por los líderes, y la acción de Dios hacia Israel por medio de ella. Sin embargo, hay dos puntos a reparar: (1) «Vosotros… dijisteis… entregaríais» no corresponde al estilo meta pedido (español neutral latinoamericano) y reduce la legibilidad eclesial amplia; (2) «dentro de los días después de los cuales» es demasiado calcado y poco natural en español, aunque intenta preservar el valor temporal. También conviene ajustar «el Señor» a «el Señor» o «Yahvé» según política; aquí, dado que la base inmediata es griega κύριος y el rastro inglés documenta ''Lord'', puede mantenerse «el Señor», pero debe constar que es una excepción contextual frente al valor por defecto del proyecto para YHWH.'
  spanish_quality_summary: La redacción es comprensible pero suena rígida. «Habéis de estar» y el voseo plural peninsular no encajan con el registro neutral latinoamericano solicitado. «Dentro de los días después de los cuales» es gramaticalmente posible pero muy poco idiomático; una formulación como «dentro de los días tras los cuales» o mejor «antes de que terminen los días después de los cuales» sería más clara, pero la primera conserva mejor la cercanía formal sin sobreexplicar. «Mi sierva» es digno y fiel. Las notas están bien enfocadas, aunque la nota a debe limpiarse de comillas sobrantes.
  glossary_alignment: Buena alineación en «sierva», «visitará», y «por mi mano». En cuanto a κύριος, aunque la preferencia global del proyecto usa «Yahvé» para el nombre divino, aquí la fuente inmediata es griega κύριος y el audit trail inglés documenta expresamente «the Lord»; por eso «el Señor» es defendible en esta unidad. No se requiere cambio doctrinal, solo dejar clara la justificación contextual. El principal desajuste no es terminológico sino dialectal y estilístico.
  issues:
  - severity: medium
    issue: Uso de «vosotros / habéis / dijisteis / entregaríais»
    rationale: No corresponde al objetivo de español neutral latinoamericano / ampliamente eclesial. Debe sustituirse por «ustedes / deben / dijeron / entregarían» o equivalente natural.
  - severity: medium
    issue: «dentro de los días después de los cuales» suena excesivamente calcado
    rationale: Aunque intenta seguir el griego, en español resulta torpe y dificulta la lectura. Se puede mantener la secuencia temporal con una formulación más natural como «dentro de los días tras los cuales».
  - severity: low
    issue: Nota [a] con puntuación y comillas poco limpias
    rationale: '«''O: «esta misma noche».» puede normalizarse a «O: “esta misma noche”.» para mayor corrección editorial.'
