translation:
  language: es
  text: 'Y Esdras se levantó y les dijo: «Ustedes han actuado contra la ley y se han casado con mujeres extranjeras[a], añadiendo pecado a Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han vivido con mujeres extranjeras» o «han tomado mujeres extranjeras por esposas». El griego literalmente significa «han vivido con», pero en este contexto se refiere a uniones ilícitas con mujeres de otros pueblos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la intervención de Esdras antes de su discurso. «Se levantó» es natural en español y conserva el movimiento narrativo sin añadir matices no presentes en el griego.
- source_word: ἠνομήσατε
  english_pob_choice: have acted lawlessly
  chosen_spanish: han obrado sin ley
  alternatives_spanish:
  - han pecado
  - han transgredido la ley
  - han obrado contra la ley
  lexicon: BDAG
  rationale: El verbo expresa conducta contraria a la ley. «Han obrado sin ley» mantiene el campo jurídico de la reprensión mejor que un genérico «han pecado», y evita perder la fuerza normativa del término.
- source_word: συνῳκίσατε
  english_pob_choice: have married
  chosen_spanish: se han casado
  alternatives_spanish:
  - han vivido con
  - han tomado por esposas
  - han contraído matrimonio
  lexicon: BDAG
  rationale: Aunque el verbo puede significar literalmente «vivir con», en este contexto la revisión inglesa ya decidió que el sentido adecuado es matrimonial. «Se han casado» comunica de forma clara y fiel la unión ilícita sin apartarse del alcance contextual del pasaje.
- source_word: γυναιξὶν ἀλλογενέσιν
  english_pob_choice: foreign women
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - mujeres de otro pueblo
  - mujeres de ascendencia extranjera
  - mujeres de pueblos ajenos
  lexicon: BDAG
  rationale: ἀλλογενής indica pertenencia a otro pueblo. «Mujeres extranjeras» es una equivalencia idiomática directa en español y conserva el valor étnico-social del griego.
- source_word: προσθεῖναι
  english_pob_choice: adding
  chosen_spanish: añadiendo
  alternatives_spanish:
  - para añadir
  - incrementando
  - sumando
  lexicon: BDAG
  rationale: El infinitivo expresa resultado o efecto. «Añadiendo» reproduce bien esa relación y mantiene el flujo sintáctico de la acusación.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  lexicon: BDAG
  rationale: En este contexto, «pecado» es la equivalencia natural y conserva la seriedad moral del término sin debilitarlo.
- source_word: τῷ Ἰσραήλ
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - sobre Israel
  - para Israel
  lexicon: BDAG
  rationale: El dativo se expresa con naturalidad como «a Israel» en español, manteniendo la idea corporativa de que la acción incrementa la culpa del pueblo.
theological_decisions:
- issue: Cómo representar el sentido de συνῳκίσατε sin diluir el juicio de Esdras
  english_pob_reading: The Greek literally means "have lived with," but in this context it refers to unlawful unions with women from other peoples. The revised English chooses "have married foreign women."
  chosen_spanish_reading: «Se han casado con mujeres extranjeras»
  alternative_spanish_readings:
  - «han vivido con mujeres extranjeras»
  - «han tomado mujeres extranjeras por esposas»
  rationale: La revisión inglesa corrige hacia el sentido contextual de matrimonio ilícito. En español, «se han casado» refleja esa lectura con claridad y sin oscurecer el problema legal y comunitario denunciado por Esdras.
  doctrine_reference: Translation philosophy §1, §5
- issue: La dimensión corporativa del pecado en la frase final
  english_pob_reading: adding sin to Israel
  chosen_spanish_reading: «añadiendo pecado a Israel»
  alternative_spanish_readings:
  - «añadiendo culpa a Israel»
  - «incrementando el pecado de Israel»
  - «trayendo pecado sobre Israel»
  rationale: La frase no describe solo una falta privada, sino un aumento del pecado colectivo de Israel. «Añadiendo pecado a Israel» preserva ese alcance comunitario sin introducir explicaciones ausentes del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «have lived with foreign women» a «have married foreign women» para reflejar con mayor precisión συνῳκίσατε en este contexto. La redacción española adopta esa decisión revisada y conserva la estructura breve de reprensión, junto con el matiz corporativo de «añadiendo pecado a Israel».
  spanish_consistency_notes:
  - Se usa «Esdras» para Ἔσρας, coherente con la tradición bíblica en español y con el nombre propio del texto fuente.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en el verso; no hay mención del nombre divino aquí.
  - «Pecado» se mantiene como equivalente directo de ἁμαρτίαν, sin desplazarlo por «culpa» en el texto principal para no perder la correspondencia lexical.
  - La nota de pie de página conserva la alternativa lexical documentada por el audit trail inglés y aclara el matiz contextual del verbo griego.
