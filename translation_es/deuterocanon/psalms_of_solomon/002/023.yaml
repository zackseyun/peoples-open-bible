translation:
  language: es
  text: Su[a] belleza fue arrojada[c] a tierra en deshonra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El femenino 'su' probablemente alude a un antecedente femenino en el contexto, quizá la ciudad personificada.
    reason: cross_reference
  - marker: b
    text: O 'en oprobio' o 'en vergüenza'.
    reason: lexical_alternative
  - marker: c
    text: O 'fue echada'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀτιμίᾳ
  english_pob_choice: in disgrace
  chosen_spanish: en deshonra
  alternatives_spanish:
  - en vergüenza
  - en oprobio
  - en ignominia
  lexicon: BDAG
  rationale: El sustantivo expresa deshonra pública o humillación. 'En deshonra' conserva ese campo semántico con un español natural y digno; evita reducir el matiz solo a emoción interna ('vergüenza').
- source_word: κάλλος
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - esplendor
  - lozanía
  lexicon: LSJ
  rationale: Aunque 'belleza' es el equivalente más directo, 'hermosura' mantiene el registro poético del salmo y puede abarcar la idea de belleza/gloria visible sin imponer una lectura más abstracta. Se conserva la tensión entre belleza externa y gloria de la ciudad personificada.
- source_word: ἀπερρίφη
  english_pob_choice: was thrown
  chosen_spanish: fue arrojada
  alternatives_spanish:
  - fue lanzada
  - fue echada
  - fue tirada
  lexicon: LSJ
  rationale: El verbo indica ser arrojada o echada con fuerza. 'Fue arrojada' reproduce mejor esa pasividad violenta y el tono elevado del texto que 'fue tirada'.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - sobre la tierra
  - al piso
  lexicon: BDAG
  rationale: Con verbo de movimiento, la preposición con acusativo señala desplazamiento hacia una superficie. 'A tierra' es breve, bíblico y fiel al gesto de caída; 'al suelo' sería más moderno, pero menos poético.
theological_decisions:
- issue: Referente femenino implícito
  english_pob_reading: The feminine 'her' likely refers to a feminine antecedent in context, probably the city personified.
  chosen_spanish_reading: '''Su'' y ''arrojada'' conservan el antecedente femenino implícito, probablemente la ciudad personificada.'
  alternative_spanish_readings:
  - '''Su'' podría referirse a otro antecedente femenino del contexto'
  - dejar el referente sin aclarar en el texto principal
  rationale: El griego usa un posesivo femenino que presupone un antecedente femenino contextual. En español conviene preservar esa ambigüedad controlada sin explicitarla en el versículo, porque el texto auditado no obliga a identificarla de manera definitiva.
  doctrine_reference: Personificación poética en la literatura profética/sapiencial
- issue: Matiz de humillación pública
  english_pob_reading: in disgrace / in dishonor / in shame
  chosen_spanish_reading: en deshonra
  alternative_spanish_readings:
  - en vergüenza
  - en oprobio
  rationale: No se trata solo de un sentimiento interno, sino de una condición de humillación pública ante otros. 'Deshonra' comunica mejor el efecto social y moral del término griego.
  doctrine_reference: Semántica de honor y vergüenza en el mundo bíblico
translation_notes:
  revision_awareness: El audit trail inglés pasó por una corrección de 'splendor' a 'beauty' para κάλλος; en español se optó por 'hermosura' para mantener un registro poético y abarcar el matiz de belleza/gloria sin forzar una literalidad estrecha. También se respetó la combinación final 'cast to the ground in disgrace' como imagen de caída humillante, evitando suavizar 'ἀπερρίφη'.
  spanish_consistency_notes:
  - Se mantuvo el referente femenino implícito con 'su' para conservar la personificación del contexto.
  - '''A tierra'' reproduce la dirección del movimiento sin añadir explicaciones interpretativas al texto principal.'
  - '''Deshonra'' se usa de manera consistente con el campo semántico de ἀτιμία, sin imponer la idea de mera emoción subjetiva.'
  - El registro es poético y bíblico, pero en español moderno y legible.
