  to: 'Y dirás: «Montes de Israel, oigan la palabra del Señor Dios Yahvé. Así dice el Señor Dios Yahvé a los montes y a los collados, a los barrancos[a] y a los valles: He aquí, yo mismo estoy trayendo contra ustedes una espada, y destruiré sus lugares altos[b]».'
  rationale: Se revisa la fórmula divina para representar mejor אֲדֹנָי יְהוִה en español sin ocultar el nombre «Yahvé», y se ajusta «traigo» a «estoy trayendo» para reflejar mejor el valor enfático e inminente del hebreo. El resto del texto y las notas se conservan con mínimos ajustes de estilo.
