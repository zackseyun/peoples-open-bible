translation:
  language: es
  text: Todo el día mi deshonra está delante de mí[a], y la vergüenza de mi rostro me ha cubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la vergüenza en mi rostro me ha cubierto». El hebreo, más literalmente, dice: «la vergüenza de mi rostro me ha cubierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַיּוֹם
  english_pob_choice: All day long
  chosen_spanish: Todo el día
  alternatives_spanish:
  - Todo el tiempo
  - Durante todo el día
  lexicon: HALOT
  rationale: La expresión es idiomática de duración continua. «Todo el día» conserva la fuerza temporal sin sonar forzado en español.
- source_word: כְּלִמָּתִי
  english_pob_choice: my disgrace
  chosen_spanish: mi deshonra
  alternatives_spanish:
  - mi vergüenza
  - mi humillación
  lexicon: HALOT
  rationale: El término apunta a deshonor público o afrenta. «Deshonra» comunica mejor esa dimensión social que «vergüenza», y evita duplicar el siguiente miembro.
- source_word: נֶגְדִּי
  english_pob_choice: is before me
  chosen_spanish: está delante de mí
  alternatives_spanish:
  - está frente a mí
  - está ante mí
  lexicon: HALOT
  rationale: La preposición expresa algo puesto a la vista o en la presencia del hablante. «Delante de mí» preserva la imagen de algo visible y presente.
- source_word: וּבֹשֶׁת
  english_pob_choice: and the shame
  chosen_spanish: y la vergüenza
  alternatives_spanish:
  - y la deshonra
  - y la humillación
  lexicon: HALOT
  rationale: «Vergüenza» traduce de forma directa el sustantivo y mantiene el paralelismo con el primer hemistiquio.
- source_word: פָּנַי
  english_pob_choice: of my face
  chosen_spanish: de mi rostro
  alternatives_spanish:
  - de mi cara
  - en mi rostro
  lexicon: HALOT
  rationale: «Rostro» es una forma natural y digna en español para conservar la imagen hebrea de la fisonomía visible.
- source_word: כִּסָּתְנִי
  english_pob_choice: has covered me
  chosen_spanish: me ha cubierto
  alternatives_spanish:
  - me cubre
  - me ha envuelto
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante; el presente perfecto español comunica que la vergüenza ya lo ha cubierto y permanece así.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio auditado de la POB inglesa. Se preserva el paralelismo entre כְּלִמָּתִי y בֹשֶׁת sin forzar sinonimia exacta, y se mantiene la metáfora facial del hebreo con una nota de alternativa literal.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - La nota al pie conserva la tensión entre una traducción más literal («de mi rostro») y una lectura española más natural («en mi rostro»).
