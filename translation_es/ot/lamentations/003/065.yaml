translation:
  language: es
  text: Tú les darás dureza de corazón[a][b]; tu maldición será sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «Que les des dureza de corazón; tu maldición contra ellos». El imperfecto hebreo puede oírse como imprecación.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «cubierta/escudo de corazón». La expresión es rara; «dureza de corazón» refleja el sentido probable en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתֵּן
  english_pob_choice: You will give
  chosen_spanish: Tú les darás
  alternatives_spanish:
  - Que les des
  - Tú darás
  lexicon: HALOT
  rationale: El imperfecto 2ms de נתן, dirigido a Yahvé en un contexto de lamentación y ruego, puede oírse como futuro solemne o como petición/imprecación. El español con futuro conserva bien ese valor sin volver demasiado explícita la modalidad.
- source_word: מְגִנַּת
  english_pob_choice: hardness
  chosen_spanish: dureza
  alternatives_spanish:
  - cubierta
  - escudo
  - endurecimiento
  - insensibilidad
  lexicon: HALOT
  rationale: La forma es rara y el inglés POB ya documenta la tensión entre un sentido literal de 'cubierta/escudo' y el sentido contextual de una disposición interior negativa. 'Dureza' transmite de modo natural la idea de endurecimiento del corazón en español.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - mente
  - interior
  lexicon: HALOT
  rationale: En hebreo designa el centro interior de la persona, no solo la emoción. 'Corazón' es la correspondencia normal y clara en español bíblico contemporáneo.
- source_word: תַּאֲלָתְךָ
  english_pob_choice: your curse
  chosen_spanish: tu maldición
  alternatives_spanish:
  - tu imprecación
  - tu maldición jurada
  - tu anatema
  lexicon: HALOT
  rationale: El término procede del campo de la maldición/juramento-curse. 'Maldición' es la equivalencia más natural y comprensible en español, conservando el tono imprecatorio.
- source_word: לָהֶם ... לָהֶם
  english_pob_choice: them ... upon them
  chosen_spanish: les ... sobre ellos
  alternatives_spanish:
  - a ellos ... a ellos
  - contra ellos ... contra ellos
  lexicon: HALOT
  rationale: La repetición de ל- marca destinatario y dirección del juicio. En español, 'sobre ellos' comunica mejor el efecto de caída/juzgamiento que un simple 'a ellos', sin perder el referente.
theological_decisions:
- issue: 'Fuerza del verso: oración o predicción imprecatoria'
  english_pob_reading: 'Rendered as an imprecatory address to God: ''You will give them hardness of heart; your curse will be upon them.'''
  chosen_spanish_reading: 'Se mantiene como dirección imprecatoria a Dios: ''Tú les darás dureza de corazón; tu maldición será sobre ellos.'''
  alternative_spanish_readings:
  - Que les des dureza de corazón; tu maldición contra ellos.
  - Les darás dureza de corazón; tu maldición caerá sobre ellos.
  rationale: El hebreo permite una lectura volitiva/jussiva o una formulación profética-imprecatoria. El español con futuro mantiene la ambigüedad reverente sin resolverla de forma excesiva; la frase final en futuro copulativo conserva el paralelismo y la carga judicial.
  doctrine_reference: Preservar la tensión interpretativa del texto sin suavizar la imprecación.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la decisión óptima entre un sentido más literal ('covering/shield of heart') y el sentido contextual ('hardness of heart'), y conserva la tensión entre futuro e imprecación. La versión española replica esa estrategia con 'dureza de corazón' y una construcción de futuro que sigue siendo compatible con una lectura volitiva.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero en este versículo el sujeto pronominal elíptico del hebreo queda bien representado con 'Tú' por tratarse de un ruego dirigido a Dios.
  - '''Corazón'' mantiene el valor antropológico bíblico del centro interior.'
  - '''Maldición'' conserva el registro judicial e imprecatorio sin introducir tecnicismos innecesarios.'
  - La puntuación con punto y coma refleja la relación estrecha entre las dos hemistiquias y evita sobreinterpretar la relación sintáctica.
