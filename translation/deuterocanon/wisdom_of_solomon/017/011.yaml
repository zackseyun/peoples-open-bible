translation:
  text: For wickedness is especially cowardly[a], being condemned by itself; and, being pressed by conscience, it always assumes the worst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For wickedness, being condemned, is peculiarly fearful, and, pressed by conscience, always expects dreadful things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δειλὸν
  chosen: cowardly
  alternatives:
  - timid
  - fearful
  - cowardly thing
  lexicon: LSJ
  rationale: The adjective denotes cowardice or cravenness. Rendering it as 'cowardly' preserves the moral quality attributed to wickedness better than the softer 'timid' or merely emotional 'fearful.'
- source_word: ἰδίως
  chosen: especially
  alternatives:
  - peculiarly
  - in a special way
  - by its very nature
  lexicon: LSJ
  rationale: The adverb intensifies the statement. 'Especially' is idiomatic modern English and captures the force without awkwardness.
- source_word: πονηρία
  chosen: wickedness
  alternatives:
  - evil
  - baseness
  - vice
  lexicon: LSJ
  rationale: '''Wickedness'' best conveys moral evil as an abstract quality. ''Evil'' is possible but broader; ''vice'' is too narrow and behavioral.'
- source_word: μαρτυρεῖ
  chosen: stands self-condemned
  alternatives:
  - testifies
  - bears witness
  - gives evidence
  lexicon: LSJ
  rationale: In context with the participle καταδικαζομένη, the sense is not bare testimony but testimony against itself. The English phrase makes explicit the reflexive condemnatory force natural in context.
- source_word: καταδικαζομένη
  chosen: self-condemned
  alternatives:
  - being condemned
  - convicted
  - judged guilty
  lexicon: LSJ
  rationale: The participle modifies wickedness and explains why it 'testifies' in a cowardly way. 'Self-condemned' captures the inward accusatory sense in conjunction with conscience in the next clause.
- source_word: προσειληφεν
  chosen: assumes
  alternatives:
  - expects
  - anticipates
  - takes on
  lexicon: LSJ
  rationale: The perfect verb here conveys taking to oneself or entertaining something mentally. In context of fear and conscience, 'assumes' fits the sense of expecting adverse outcomes.
- source_word: τὰ χαλεπὰ
  chosen: the worst
  alternatives:
  - hard things
  - terrible things
  - troubles
  lexicon: LSJ
  rationale: The phrase refers to grievous or dreadful possibilities anticipated by a guilty mind. 'The worst' is a natural English rendering that captures the idiomatic force of expecting dire outcomes.
- source_word: συνεχομένη τῇ συνειδήσει
  chosen: being pressed by conscience
  alternatives:
  - being constrained by conscience
  - being afflicted by conscience
  - being hemmed in by conscience
  lexicon: LSJ
  rationale: συνέχω can mean press, constrain, or oppress. With συνείδησις, the image is of inward pressure from conscience. 'Pressed by conscience' is concise and vivid.
- source_word: συνειδήσει
  chosen: conscience
  alternatives:
  - consciousness
  - awareness
  lexicon: LSJ
  rationale: The moral faculty is clearly intended, not mere awareness, especially in a context of guilt and self-condemnation.
