  to: No te acerques a una mujer ajena[a], no sea que caigas en sus trampas.
  rationale: Se reemplaza «mujer extraña» por «mujer ajena» porque en español moderno comunica mejor la idea sapiencial de una mujer fuera de los límites debidos, mientras evita la lectura de ‘mujer rara’. Se conserva la alternativa «mujer extranjera» en nota para reflejar el valor literal posible de זָרָה y la transparencia del expediente inglés.
