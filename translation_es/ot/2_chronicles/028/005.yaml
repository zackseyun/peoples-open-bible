translation:
  language: es
  text: Y Yahvé su Dios lo entregó en manos del rey de Aram[a], y lo atacaron, y le tomaron un gran número de cautivos[b], y los llevaron a Damasco. También fue entregado en manos del rey de Israel, quien le infligió un gran golpe[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el rey de Siria'; hebreo 'Aram'.
    reason: lexical_alternative
  - marker: b
    text: O 'le tomaron muchos cautivos'.
    reason: lexical_alternative
  - marker: c
    text: O 'le infligió una gran derrota'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre propio divino, no un título. En español, 'Yahvé' conserva ese valor nominal y sigue la convención del proyecto para יְהוָה.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica entrega al control de otro. 'En manos de' es natural en español y preserva la imagen sin explicitar más de lo que dice el texto.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: the king of Aram
  chosen_spanish: el rey de Aram
  alternatives_spanish:
  - el rey de Siria
  lexicon: HALOT
  rationale: Se conserva 'Aram' como nombre propio hebreo, siguiendo la decisión auditada de no sustituirlo por el rótulo geopolítico posterior 'Siria'.
- source_word: וַיַּכּוּ בוֹ
  english_pob_choice: they struck him
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo derrotaron
  lexicon: HALOT
  rationale: נכה puede abarcar herir, golpear o derrotar. 'Lo hirieron' mantiene el sentido concreto de agresión/daño y deja abierto el matiz militar que el contexto sugiere sin convertirlo en interpretación plena.
- source_word: וַיִּשְׁבּוּ מִמֶּנּוּ שִׁבְיָה גְדוֹלָה
  english_pob_choice: took from him a great number of captives
  chosen_spanish: le tomaron un gran número de cautivos
  alternatives_spanish:
  - se llevaron de él una gran cautividad
  - le capturaron a muchos
  lexicon: HALOT
  rationale: שִׁבְיָה denota cautivos/cautividad. En español, 'un gran número de cautivos' expresa el resultado concreto y conserva la fuerza cuantitativa de גְדוֹלָה.
- source_word: וַיָּבִיאוּ דַּרְמָשֶׂק
  english_pob_choice: and brought them to Damascus
  chosen_spanish: y los llevaron a Damasco
  alternatives_spanish:
  - y los trajeron a Damasco
  lexicon: HALOT
  rationale: El objeto tácito son los cautivos recién mencionados. 'Los llevaron' es natural en español y mantiene la referencia implícita sin añadir elementos nuevos.
- source_word: נִתָּן
  english_pob_choice: was given
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue dado
  - estuvo entregado
  lexicon: HALOT
  rationale: El pasivo de נתן retoma la idea de entrega a dominio ajeno. 'Fue entregado' preserva la pasiva teológica y armoniza con 'lo entregó' al inicio del versículo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  lexicon: HALOT
  rationale: Traducción directa del título real y del nombre nacional, sin alteraciones estilísticas.
- source_word: וַיַּךְ בּוֹ מַכָּה גְדוֹלָה
  english_pob_choice: who struck him with a great blow
  chosen_spanish: quien le infligió un gran golpe
  alternatives_spanish:
  - quien le dio un gran golpe
  - quien le causó una gran derrota
  lexicon: HALOT
  rationale: מַכָּה גְדוֹלָה es literalmente 'gran golpe/herida'. 'Infligió un gran golpe' conserva el paralelismo verbal con 'lo hirieron' y evita traducir prematuramente el resultado como 'derrota'.
theological_decisions:
- issue: Causa divina de las derrotas
  english_pob_reading: The verse explicitly presents the LORD as the one who gave Ahaz/Judah into the power of foreign kings.
  chosen_spanish_reading: El versículo presenta explícitamente a Yahvé como quien lo entregó en manos de reyes extranjeros.
  alternative_spanish_readings:
  - Una formulación meramente política o militar
  - Eliminación de la agencia divina en favor de una lectura histórica neutral
  rationale: El hebreo usa dos veces נתן ('entregar/dar') para enmarcar la derrota como acto bajo juicio divino. La traducción conserva esa causalidad teológica sin añadir comentario interpretativo.
  doctrine_reference: 2 Crónicas 28:5; traducción por equivalencia óptima
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La forma española debe reflejar el Nombre propio del texto hebreo, no sustituirlo por un título. 'Yahvé' es la convención del proyecto y conserva la identificación del Dios de Israel.
  doctrine_reference: Tetragrámaton יְהוָה / YHWH
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: mantiene Yahvé para יְהוָה, conserva Aram frente a ''Siria'', reproduce la doble pasiva de נתן (''lo entregó'' / ''fue entregado'') y evita intensificar ''mכה גדולה'' más allá de ''gran golpe'', dejando la alternativa interpretativa de ''gran derrota'' en nota.'
  spanish_consistency_notes:
  - Se preserva el paralelismo verbal entre 'lo entregó' y 'fue entregado' para reflejar la repetición de נתן.
  - '''En manos de'' se usa de forma consistente para בְּיַד en contextos de entrega a dominio ajeno.'
  - '''Yahvé'' se mantiene como forma estándar para יְהוָה en la serie de Crónicas.'
  - '''Aram'' se conserva como nombre propio hebreo, con la variante ''Siria'' solo en nota.'
  - '''Gran golpe'' conserva la literalidad del hebreo y deja abierta la lectura militar más amplia sin imponerla en el texto principal.'
