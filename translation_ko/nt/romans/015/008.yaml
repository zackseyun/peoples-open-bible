  rationale: 추상명사로 할례받은 집단(유대인)을 가리킴. 한국어 「할례받은 자들」.
- source_word: ὑπὲρ ἀληθείας θεοῦ
  english_pob_choice: for the sake of God's truth
  chosen_korean: 하나님의 진리를 위하여
  lexicon: BDAG
  rationale: 직역.
- source_word: βεβαιῶσαι τὰς ἐπαγγελίας τῶν πατέρων
  english_pob_choice: confirm the promises to the fathers
  chosen_korean: 조상들에게 주신 약속들을 확증하시다
  alternatives_korean:
  - 조상들에게 한 약속들을 굳건히 하시다
  lexicon: BDAG
  rationale: 속격이 「~에게 주신」 의미로 자연스러움.
