revisions:
- from: Porque la mente prudente[a] rechaza todos estos pasiones[viciosas], así como también la ira; pues también es dueña de esta.
  to: Porque la razón prudente[a] ahuyenta todas estas pasiones viciosas, así como también la ira; pues también domina incluso esto.
  rationale: Se corrige la concordancia y el sistema de notas, se alinea ὁ σώφρων νοῦς con la decisión auditada principal mediante «la razón prudente», se refuerza ἀπωθεῖται con «ahuyenta», y se reemplaza la cláusula final por una formulación más natural y fiel al sentido de dominio de δεσπόζει.
