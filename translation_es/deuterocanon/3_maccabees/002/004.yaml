translation:
  language: es
  text: Tú quemaste a los sodomitas, que practicaban la arrogancia y se habían hecho notorios[a] por sus maldades, con fuego y azufre[b], poniéndolos como ejemplo para los que vendrían después.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «se habían hecho manifiestos/conspicuos por sus maldades». La expresión griega es condensada y algo difícil; «notorios» comunica en español la idea probable.'
    reason: lexical_alternative
  - marker: b
    text: 'La fórmula tradicional en inglés suele decir «fire and brimstone». Aquí se prefiere el sentido directo de θείον: «azufre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπερηφανίαν ἐργαζομένους
  english_pob_choice: who practiced arrogance
  chosen_spanish: que practicaban la arrogancia
  alternatives_spanish:
  - que obraban soberbia
  - que actuaban con arrogancia
  - que practicaban soberbia
  lexicon: LSJ
  rationale: 'La construcción participial expresa una acción habitual o persistente: literalmente, ''trabajando/practicando arrogancia''. ''Practicaban la arrogancia'' conserva esa fuerza durativa sin sonar forzado en español.'
- source_word: Σοδομίτας
  english_pob_choice: the Sodomites
  chosen_spanish: los sodomitas
  alternatives_spanish:
  - la gente de Sodoma
  - los de Sodoma
  lexicon: LSJ
  rationale: El etnónimo nombra a los habitantes de Sodoma. 'Sodomitas' es el equivalente más directo y formal; aquí se refiere a los de Sodoma en el contexto bíblico, no a un uso posterior especializado del término en español.
- source_word: ἀδήλους ταῖς κακίαις γενομένους
  english_pob_choice: had become notorious for their evils
  chosen_spanish: se habían hecho notorios por sus maldades
  alternatives_spanish:
  - se habían vuelto manifiestos por sus maldades
  - se habían hecho evidentes por sus maldades
  - se habían vuelto conspicuos en sus perversidades
  lexicon: LSJ
  rationale: El griego es compacto y algo difícil. La idea es que llegaron a ser públicamente conocidos por sus malas obras. 'Notorios por sus maldades' reproduce bien esa exposición pública moral sin imponer una lectura demasiado técnica del adjetivo griego.
- source_word: πυρὶ καὶ θείῳ
  english_pob_choice: with fire and sulfur
  chosen_spanish: con fuego y azufre
  alternatives_spanish:
  - con fuego y azufre
  - con fuego y azufre ardiente
  - con fuego y azufre
  lexicon: LSJ
  rationale: θείον significa 'azufre'. 'Fuego y azufre' es la equivalencia más transparente en español moderno y mantiene la alusión al juicio de Sodoma.
- source_word: κατέφλεξας
  english_pob_choice: You burned up
  chosen_spanish: quemaste
  alternatives_spanish:
  - consumiste por fuego
  - quemaste por completo
  - arrasaste con fuego
  lexicon: LSJ
  rationale: El verbo intensifica la quema hasta la destrucción. 'Quemaste' en contexto, junto con 'con fuego y azufre', transmite suficientemente la aniquilación sin sobrecargar la frase.
- source_word: παράδειγμα
  english_pob_choice: an example
  chosen_spanish: como ejemplo
  alternatives_spanish:
  - como advertencia
  - como modelo
  - como muestra
  lexicon: LSJ
  rationale: El sustantivo designa algo puesto delante de otros como ejemplo. 'Como ejemplo' es la base semántica más clara; el matiz admonitorio queda reforzado por el contexto de juicio.
- source_word: τοῖς ἐπιγινομένοις
  english_pob_choice: for those who would come afterward
  chosen_spanish: para los que vendrían después
  alternatives_spanish:
  - para los que vendrán después
  - para las generaciones futuras
  - para los que llegaran después
  lexicon: LSJ
  rationale: El participio se refiere a quienes vienen después, sin necesidad de especificar 'generaciones'. 'Vendrían después' conserva la orientación prospectiva y suena natural en español.
theological_decisions:
- issue: Destrucción de Sodoma como juicio divino histórico sin importar lecturas posteriores ajenas al texto
  english_pob_reading: the verse is translated as a historical example of divine judgment on arrogant wickedness
  chosen_spanish_reading: el versículo se vierte como un ejemplo histórico del juicio divino sobre la arrogancia y las maldades
  alternative_spanish_readings:
  - lectura sexualizada del término 'sodomitas'
  - ampliar el pecado más allá de lo que el versículo expresa
  rationale: El griego menciona arrogancia y maldades en general. La redacción española evita introducir asociaciones posteriores que el texto no menciona explícitamente, manteniendo el foco en el juicio divino.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fórmula de juicio πυρὶ καὶ θείῳ
  english_pob_reading: fire and sulfur
  chosen_spanish_reading: fuego y azufre
  alternative_spanish_readings:
  - fuego y azufre
  - fuego y azufre ardiente
  - fuego y azufre (brimstone)
  rationale: '''Azufre'' expresa directamente el sentido léxico de θείον. Se evita depender de la fórmula tradicional ''fuego y azufre/brimstone'' como si fuera obligatoria, aunque sigue siendo reconocible para lectores bíblicos.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto inglés POB no fue revisado en la última pasada; la traducción española sigue de cerca la decisión óptima ya establecida, pero aclara en notas la ambigüedad del griego ἀδήλους ταῖς κακίαις γενομένους y la elección léxica de θείον como 'azufre'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar cuando aparezca el nombre divino; aquí el versículo usa segunda persona sin el nombre explícito.
  - '''Sodomitas'' se conserva como etnónimo bíblico, no como término moral moderno.'
  - '''Azufre'' se usa consistentemente para θείον, evitando calcos opacos como ''brimstone''.'
  - 'Se conserva el paralelismo causal y final del griego: conducta -> juicio -> ejemplaridad para los posteriores.'
