revisions:
- from: 'Por mí mismo he jurado[a]; de mi boca ha salido en justicia una palabra que no volverá: a mí se doblará toda rodilla, toda lengua jurará[b].'
  to: 'Por mí mismo he jurado[a]; de mi boca ha salido en justicia una palabra que no volverá: ante mí toda rodilla se doblará, toda lengua jurará lealtad[b].'
  rationale: 'Se revisa la cláusula final para reflejar mejor la decisión léxica y teológica documentada en el POB inglés: el hebreo no solo habla de pronunciar un juramento, sino de reconocimiento público de lealtad. «Jurará lealtad» preserva ese matiz sin sobreinterpretar si la sumisión es voluntaria o forzada. También se ajusta «a mí» a «ante mí» y el orden de la frase para mejorar la naturalidad española en un contexto de postración, sin apartarse del sentido del hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés en la estructura global: juramento divino por sí mismo, palabra que sale de la boca de Dios en justicia y no vuelve, y sumisión universal expresada con rodilla y lengua. Sin embargo, en la cláusula final pierde un matiz importante documentado por el POB inglés: el sentido idiomático de juramento/lealtad en תִּשָּׁבַע כָּל לָשׁוֹן queda demasiado abierto con «toda lengua jurará», mientras que el inglés principal explicitó «swear allegiance».'
  spanish_quality_summary: El español es mayormente claro y digno. «Por mí mismo he jurado» y «de mi boca ha salido en justicia una palabra que no volverá» son naturales y fieles. «Se doblará toda rodilla» es aceptable, aunque «toda rodilla se doblará» suena más idiomático. La mejora principal es explicitar «jurará lealtad» en el texto principal para preservar mejor la fuerza idiomática y teológica ya documentada, dejando la opción más literal en nota.
  glossary_alignment: No hay conflicto con los términos base del proyecto en este versículo. No aparece Yahvé en el texto fuente de este versículo. El tratamiento de justicia, juramento y sumisión universal está en línea general con la filosofía POB, salvo que conviene reflejar en español el valor de lealtad de תִּשָּׁבַע con «jurará lealtad» en el texto principal y reservar «jurará / prestará juramento» para la nota.
  issues:
  - severity: medium
    issue: La cláusula final «toda lengua jurará» subtraduce el valor idiomático de תִּשָּׁבַע כָּל לָשׁוֹן.
    rationale: El rastro inglés documenta que el hebreo con «lengua» implica juramento de lealtad/acknowledgment público, y por eso escogió «will swear allegiance» como texto principal. En español, dejar solo «jurará» conserva la literalidad, pero pierde un matiz semántico significativo que el POB ya decidió preservar en el texto principal.
  - severity: low
    issue: La nota [b] duplica exactamente la lectura principal actual.
    rationale: Si el texto principal dice «toda lengua jurará», la alternativa «O “toda lengua jurará”» no aporta información. Al revisar el texto principal a «jurará lealtad», la nota recupera utilidad real como alternativa literal.
  - severity: low
    issue: El orden «se doblará toda rodilla» es menos natural que «toda rodilla se doblará».
    rationale: Ambas opciones son comprensibles y fieles, pero el segundo orden suena más fluido en español general sin cambiar el sentido.
  revised_spanish_text: 'Por mí mismo he jurado[a]; de mi boca ha salido en justicia una palabra que no volverá: ante mí toda rodilla se doblará, toda lengua jurará lealtad[b].'
  revised_footnotes:
  - marker: a
    text: O «una palabra en justicia»; la frase hebrea puede enfatizar tanto la justicia de la palabra como que fue pronunciada en justicia.
    reason: lexical_alternative
  - marker: b
    text: O «toda lengua jurará» o «prestará juramento».
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula final para reflejar mejor la decisión léxica y teológica documentada en el POB inglés: el hebreo no solo habla de pronunciar un juramento, sino de reconocimiento público de lealtad. «Jurará lealtad» preserva ese matiz sin sobreinterpretar si la sumisión es voluntaria o forzada. También se ajusta «a mí» a «ante mí» y el orden de la frase para mejorar la naturalidad española en un contexto de postración, sin apartarse del sentido del hebreo.'
