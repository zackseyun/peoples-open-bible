  text: לְאֻמִּ֗ים כִּ/שְׁא֞וֹן מַ֤יִם רַבִּים֙ יִשָּׁא֔וּ/ן וְ/גָ֥עַר בּ֖/וֹ וְ/נָ֣ס מִ/מֶּרְחָ֑ק וְ/רֻדַּ֗ף כְּ/מֹ֤ץ הָרִים֙ לִ/פְנֵי ר֔וּחַ וּ/כְ/גַלְגַּ֖ל לִ/פְנֵ֥י סוּפָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/017/013.yaml
  text: The peoples roar like the roaring of many waters[a], but he rebukes them, and they flee far away, chased like chaff on the mountains before the wind[d][c][b], and like whirling dust before the storm.
  footnotes:
  - marker: a
    text: Or 'the nations roar like the roaring of many waters.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular forms ('he rebukes it ... it flees'), likely treating the many peoples as one collective mass or uproar.
    reason: alternative_reading
  - marker: c
    text: Or 'like a whirling thing' or 'like tumbleweed' before the storm.
    reason: lexical_alternative
  - marker: d
    text: '''Storm'' may also be rendered ''whirlwind'' or ''tempest.'''
    reason: lexical_alternative
