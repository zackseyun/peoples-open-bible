- from: Y él hizo los [a] dinteles sesenta codos, y la corte alcanzó a los dinteles de la puerta, todo alrededor.
  to: Y él hizo los postes[a] de sesenta codos,[b] y el atrio llegaba hasta los postes de la puerta, todo alrededor.
  rationale: Se reemplazó 'dinteles' por 'postes' para reflejar correctamente el sentido de אֵילִים/אֵיל como elementos laterales de la entrada, en línea con la decisión inglesa 'jambs' y sus alternativas documentadas. Se cambió 'la corte' por 'el atrio' para una lectura arquitectónica natural y precisa en español bíblico. También se añadió la nota de lectura alternativa que el audit trail inglés preserva para la cláusula sintácticamente difícil.
