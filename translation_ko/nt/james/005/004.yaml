id: JAS.5.4
reference: James 5:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: 'ἰδοὺ ὁ μισθὸς τῶν ἐργατῶν τῶν ἀμησάντων τὰς χώρας ὑμῶν ὁ ⸀ἀφυστερημένος ἀφ'' ὑμῶν κράζει, καὶ αἱ βοαὶ τῶν θερισάντων εἰς τὰ ὦτα Κυρίου Σαβαὼθ ⸀εἰσεληλύθασιν·'
base_translation:
  language: en
  yaml_path: translation/nt/james/005/004.yaml
  text: 'Look[a], the wages of the workers who harvested your fields, which have been withheld by you, are crying out, and the cries of those who did the harvesting have entered into the ears of the Lord of Hosts.'
translation:
  language: ko
  text: '보십시오. 여러분의 밭을 거둔 일꾼들의 품삯, 곧 여러분이 떼어먹은 그 품삯이 부르짖고 있으며, 추수한 자들의 외침이 만군의 야훼[a]의 귀에 들어갔습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 κύριος Σαβαώθ. 70인역이 히브리어 יהוה צבאות(YHWH 체바오트)를 옮긴 표현으로, 본문은 여기서 70인역의 어법을 그대로 인용한다. 따라서 한국어로도 「만군의 야훼」로 옮긴다.'
    reason: cultural_note
lexical_decisions:
- source_word: 'κύριος Σαβαώθ'
  english_pob_choice: 'the Lord of Hosts'
  chosen_korean: '만군의 야훼'
  alternatives_korean:
  - '만군의 주'
  - '만군의 여호와'
  lexicon: BDAG
  rationale: '70인역의 יהוה צבאות 인용. 본문이 분명히 YHWH의 칭호를 가리키므로 「만군의 야훼」로 옮긴다(글로서리 정책).'
theological_decisions:
- issue: '5:4의 κύριος를 YHWH로 회복'
  chosen_reading: '만군의 야훼'
  alternative_readings:
  - '만군의 주'
  rationale: 'σαβαώθ는 히브리어 צבאות의 음역이며, κύριος Σαβαώθ는 70인역의 정형 표현으로 YHWH 체바오트를 직접 가리킨다. 한국어에서 「주」로 마스킹하지 않고 「야훼」로 명시한다.'
  doctrine_reference: 'DOCTRINE.md: YHWH 본명 회복; 글로서리 κύριος (= YHWH) → 야훼'
