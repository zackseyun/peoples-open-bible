theological_decisions:
- issue: Ethical dualism in 'light' versus 'darkness' and 'law of the Lord' versus 'works of Beliar'
  chosen_reading: Translate the paired alternatives directly without softening them into abstract moral language.
  alternative_readings:
  - good versus evil
  - righteousness versus wickedness
  rationale: The Greek presents a sharp testamentary choice in parallel clauses. Preserving the imagery keeps the apocalyptic-moral texture and avoids interpretive reduction.
  doctrine_reference: 'PHILOSOPHY.md: preserve the source text''s plain sense and rhetorical texture'
- issue: Rendering Βελίαρ
  chosen_reading: Beliar
  alternative_readings:
  - Belial
  rationale: The Greek witness here reads Βελίαρ; transliteration of the attested form is more transparent than normalizing to the more familiar 'Belial.'
  doctrine_reference: 'DOCTRINE.md: translate titles; transliterate names'
