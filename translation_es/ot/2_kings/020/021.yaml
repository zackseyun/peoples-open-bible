translation:
  language: es
  text: Y Ezequías descansó con sus padres[a], y Manasés su hijo llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “durmió con sus padres”. El hebreo usa una fórmula real estándar para la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: El hebreo שׁכב, en esta fórmula real seguida de “con sus padres”, funciona como un eufemismo/idioma de muerte. En español, “se acostó” conserva la imagen verbal sin decir más de lo que el hebreo dice; “murió” explicita demasiado, y “durmió” puede sonar menos natural o desviar el matiz de la fórmula.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: Se mantiene la fórmula semítica tradicional en sentido directo. “Padres” reproduce mejor el hebreo que “antepasados” y conserva la resonancia genealógica y real del texto.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - reinó
  - fue rey
  lexicon: HALOT
  rationale: En la fórmula de sucesión, מלך señala la entrada al trono. “Llegó a ser rey” expresa bien el acto de acceder al reinado; “reinó” podría sugerir duración, y “fue rey” es menos dinámico para la sucesión.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: standard proper-name equivalence
  rationale: Nombre propio bíblico transliterado según la convención española habitual.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo
  lexicon: HALOT
  rationale: Designación filial directa y necesaria dentro de la nota de sucesión; “su hijo” es la forma natural en español.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La idea sucesoria de תחת en este contexto es de sustitución. “En su lugar” es idiomático en español y comunica con claridad la transferencia de reinado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto español junto a la expresión equivalente de la fórmula real.
  spanish_consistency_notes:
  - Se mantuvo el orden y la estructura de la cláusula de sucesión.
  - Se prefirió un español natural pero cercano a la imagen del hebreo, sin sustituir la fórmula real por una paráfrasis interpretativa.
  - Se conservó el paralelismo entre la muerte del rey y la entronización del sucesor.
