translation:
  language: es
  text: Las cuerdas de la muerte me rodearon, y las angustias del Seol[a] me encontraron; encontré tribulación y tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el sepulcro» o «el reino de los muertos». Hebreo: «Seol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲפָפוּנִי
  english_pob_choice: encircled me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me envolvieron
  lexicon: HALOT
  rationale: El verbo expresa estar cercado o rodeado por completo. «Me rodearon» comunica la imagen con naturalidad en español y conserva la fuerza concreta de la metáfora.
- source_word: חֶבְלֵי מָוֶת
  english_pob_choice: the cords of death
  chosen_spanish: los lazos de la muerte
  alternatives_spanish:
  - las cuerdas de la muerte
  - las sogas de la muerte
  lexicon: HALOT
  rationale: חבל puede significar cuerda, cordón o lazo. «Lazos» mantiene la imagen de aprisionamiento y suena natural en español, sin perder el sentido de atadura que sostiene la metáfora.
- source_word: וּמְצָרֵי שְׁאוֹל
  english_pob_choice: and the distresses of Sheol
  chosen_spanish: y las angustias del Seol
  alternatives_spanish:
  - y las estrecheces del Seol
  - y las aflicciones del Seol
  lexicon: HALOT
  rationale: מֵצַר transmite estrechez, aprieto o angustia. «Angustias» expresa bien la presión opresiva del paralelo poético, y «Seol» conserva el término hebreo transliterado en vez de reducirlo a una sola interpretación.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene la transliteración para preservar la carga cosmológica y teológica del término hebreo, evitando restringirlo prematuramente a «sepulcro» o a una sola explicación interpretativa.
- source_word: מְצָא֑וּ/נִי
  english_pob_choice: found me
  chosen_spanish: me encontraron
  alternatives_spanish:
  - me alcanzaron
  - me sobrevinieron
  lexicon: HALOT
  rationale: «Me encontraron» conserva el verbo de hallazgo y el paralelismo con el cierre del versículo, donde reaparece la misma raíz verbal. Aunque en español puede sonar personificado, refleja bien la repetición poética del hebreo.
- source_word: צָרָ֖ה
  english_pob_choice: trouble
  chosen_spanish: aflicción
  alternatives_spanish:
  - angustia
  - tribulación
  lexicon: HALOT
  rationale: צָרָה abarca trouble, distress y adversity. «Aflicción» encaja con el tono poético y combina bien con «dolor» en la segunda hemistiquio.
- source_word: וְיָגוֹן
  english_pob_choice: and sorrow
  chosen_spanish: y dolor
  alternatives_spanish:
  - y tristeza
  - y pesar
  lexicon: HALOT
  rationale: יָגוֹן denota sorrow o grief. «Dolor» es una opción legítima en español bíblico-poético; aquí se elige por su paralelismo sonoro y semántico con «aflicción».
- source_word: אֶמְצָא
  english_pob_choice: I found
  chosen_spanish: encontré
  alternatives_spanish:
  - hallé
  - me encontré con
  lexicon: HALOT
  rationale: Se conserva la misma raíz verbal que en «me encontraron» para mantener el juego verbal del hebreo. «Encontré» es la forma más directa y natural en español.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
