translation:
  language: es
  text: No capacitó a nadie[a] para proclamar sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declarar» sus obras; o «a nadie le concedió proclamar sus obras». El verbo griego es poco común y puede sugerir permiso, designación o habilitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐθενί
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie en particular
  lexicon: LSJ
  rationale: 'El dativo indefinido negativo se entiende mejor en español como complemento indirecto con valor de destinatario: «a nadie». Conserva la idea de que no se concedió esta posibilidad a persona alguna.'
- source_word: ἐξεποίησεν
  english_pob_choice: has enabled
  chosen_spanish: dio la capacidad de
  alternatives_spanish:
  - habilitó
  - permitió
  - hizo posible
  lexicon: LSJ
  rationale: El verbo es raro y el contexto pide una idea de causación o habilitación más que mera autorización. «Dar la capacidad de» expresa con claridad esa relación sin exagerar hacia una doctrina más fuerte que el griego.
- source_word: ἐξαγγεῖλαι
  english_pob_choice: to proclaim
  chosen_spanish: proclamar
  alternatives_spanish:
  - declarar
  - anunciar
  - dar a conocer
  lexicon: LSJ
  rationale: El infinitivo aoristo de ἐξαγγέλλω conserva un matiz público y declarativo. «Proclamar» mantiene mejor esa fuerza que opciones más débiles como «decir».
- source_word: τὰ ἔργα αὐτοῦ
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que ha hecho
  lexicon: LSJ
  rationale: «Obras» reproduce de manera directa el sustantivo plural y preserva el enlace formal con los actos divinos. «Hechos» o una cláusula explicativa estrecharían o suavizarían demasiado el sintagma.
theological_decisions:
- issue: Alcance de la afirmación sobre las obras de Dios
  english_pob_reading: The verse states that no human has been permitted or enabled to fully proclaim God's works.
  chosen_spanish_reading: El versículo afirma que a nadie se le concedió la capacidad de proclamar sus obras.
  alternative_spanish_readings:
  - No se permitió a nadie proclamar sus obras
  - Nadie pudo proclamar sus obras
  rationale: 'El griego es breve y el verbo raro deja entre permiso, habilitación y comisión. La redacción elegida conserva la tensión: no afirma imposibilidad absoluta ni reduce el sentido a una simple autorización externa.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla más allá de lo que dice.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que pasó de «allowed» a «enabled» para reflejar mejor ἐξεποίησεν. En español se optó por una fórmula equivalente de habilitación («dio la capacidad de») en vez de mera autorización.
  spanish_consistency_notes:
  - Se mantiene «obras» para τὰ ἔργα αὐτοῦ, en coherencia con el audit trail inglés.
  - Se eligió «proclamar» por su fuerza pública y declarativa.
  - El indefinido negativo se volcó como «a nadie» para una sintaxis natural en español.
  - La nota al pie conserva las alternativas lexicales relevantes sin borrar la ambigüedad del verbo griego.
