revisions:
- from: 'Maldito[a] el que se acueste con cualquier animal. Y todo el pueblo dirá: «Amén».'
  to: 'Maldito sea el que[a] se acueste con cualquier animal. Y todo el pueblo dirá: «Amén».'
  rationale: Se movió la nota al sujeto al que realmente afecta y se ajustó la fórmula a «Maldito sea…» para mejorar la gramática y la solemnidad del español sin cambiar el sentido fuente ni las decisiones léxicas auditadas.
