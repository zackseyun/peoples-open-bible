translation:
  language: es
  text: 'Y he aquí[a] la palabra de Yahvé vino a él, diciendo: «Este no será tu heredero; sino el que saldrá de tu propio cuerpo será tu heredero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y he aquí / y mira, la palabra de Yahvé vino a él, diciendo: ‘Este no te heredará ... el que saldrá de tus entrañas / partes internas, él te heredará’». El texto principal expresa el sentido idiomático como ‘ser tu heredero’ y aclara la descendencia física con ‘tu propio cuerpo’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ahora
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva de la partícula hebrea y el tono enfático del giro narrativo sin omitirlo. 'He aquí' es natural en español bíblico moderno y mantiene la vivacidad del original.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética literal 'palabra' en vez de suavizarla como 'mensaje'. Se usa 'Yahvé' según el estándar del proyecto para el nombre divino.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: vino a él
  alternatives_spanish:
  - vino sobre él
  - llegó a él
  lexicon: HALOT
  rationale: La preposición expresa dirección hacia Abram; en español, 'vino a él' reproduce con naturalidad la llegada de la palabra divina sin perder el sentido direccional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Conserva la construcción introductoria de cita de manera sobria y fiel, sin convertirla en una paráfrasis.
- source_word: לֹא יִירָשְׁךָ זֶה
  english_pob_choice: This one will not be your heir
  chosen_spanish: Este no será tu heredero
  alternatives_spanish:
  - Este no heredará de ti
  - Este no será quien te herede
  lexicon: HALOT
  rationale: El verbo ירשׁ con sufijo puede expresarse como 'ser heredero' en español, que suena más natural que 'heredarte'. Se conserva la referencia demostrativa masculina singular con 'Este' y el sentido correctivo de la negación.
- source_word: זֶה
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Éste
  - Este hombre
  lexicon: HALOT
  rationale: El demostrativo masculino singular apunta a una persona concreta. 'Este' refleja mejor la directividad hebrea que añadir 'hombre', que introduciría un matiz no requerido por el texto.
- source_word: כִּי אִם
  english_pob_choice: rather
  chosen_spanish: sino
  alternatives_spanish:
  - más bien
  - pero
  lexicon: HALOT
  rationale: 'La construcción es adversativa y correctiva: no este, sino otro. ''Sino'' reproduce bien esa corrección en español.'
- source_word: אֲשֶׁר יֵצֵא
  english_pob_choice: one who comes from
  chosen_spanish: el que saldrá de
  alternatives_spanish:
  - el que proceda de
  - el que venga de
  lexicon: HALOT
  rationale: '''Salir de'' conserva la imagen semítica del origen físico sin volverse demasiado literal o áspero. ''El que'' mantiene el valor relativo personal.'
- source_word: מִמֵּעֶיךָ
  english_pob_choice: your own body
  chosen_spanish: tus entrañas
  alternatives_spanish:
  - tu propio cuerpo
  - de tus partes internas
  lexicon: HALOT
  rationale: En este contexto, la expresión alude al origen biológico de la descendencia de Abram. 'Tus entrañas' conserva la imagen hebrea del interior corporal y evita imponer una equivalencia demasiado interpretativa como 'cuerpo'.
- source_word: הוּא יִירָשֶׁךָ
  english_pob_choice: will be your heir
  chosen_spanish: será tu heredero
  alternatives_spanish:
  - te heredará
  - será quien te herede
  lexicon: HALOT
  rationale: Se mantiene la misma idea verbal de herencia con una formulación natural en español. 'Heredero' conserva el valor relacional y evita el calco extraño 'te heredará'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrammaton. 'Yahvé' preserva el referente covenantal del texto sin sustituirlo por una convención de mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de descendencia física en מִמֵּעֶיךָ
  english_pob_reading: your own body
  chosen_spanish_reading: tus entrañas
  alternative_spanish_readings:
  - tu propio cuerpo
  - tus partes internas
  rationale: La frase subraya que el heredero procederá de la descendencia natural de Abram, en contraste con un heredero no biológico. 'Tus entrañas' preserva la fuerza semítica e idiomática del hebreo sin perder la referencia corporal.
  doctrine_reference: Génesis 15:4, sentido narrativo de descendencia prometida
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que ajustó 'This man' a 'This one' para reflejar con mayor precisión el demostrativo hebreo. Por eso el español usa 'Este' sin añadir 'hombre'. También se respetó la decisión auditada de mantener la fórmula 'word of Yahweh' y el sentido idiomático de herencia, pero con equivalente español natural.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - '''Heredero'' reproduce el campo semántico de ירשׁ en contexto de sucesión, evitando un calco innecesario.'
  - '''Tus entrañas'' mantiene la imagen corporal del hebreo y sugiere descendencia biológica sin explicar en exceso.'
  - La puntuación de cita sigue convenciones españolas y conserva el tono solemne del pasaje.
