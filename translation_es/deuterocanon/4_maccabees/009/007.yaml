revisions:
- from: Sigue, pues, tirano; y si matas nuestras almas[a] por causa de la piedad, no pienses que, al torturarnos, nos haces daño.
  to: Sigue, pues, tirano; y si nos quitas la vida[a] por causa de la piedad, no pienses que, al torturarnos, nos haces daño.
