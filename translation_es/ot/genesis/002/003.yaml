    rationale: En el POB inglés, la nota d es 'previous_rendering' ('Otra traducción anterior...'), no una segunda nota de alternativa con el mismo contenido de la nota c. La versión española actual repite 'que Dios había creado para hacer', que además ya está en el texto principal.
  - severity: low
    issue: '''Lo hizo santo'' es menos idiomático que ''lo santificó'' para un día consagrado.'
    rationale: Aunque fiel, 'hacer santo' aplicado a un día suena ligeramente forzado en español bíblico. 'Santificó' es claro, ampliamente comprensible y coincide con la alternativa ya documentada en la nota; mejora la naturalidad sin perder sentido.
  - severity: low
    issue: La nota c formula como alternativa una lectura idéntica al texto principal.
    rationale: Una nota de alternativas no debe presentar como alternativa exacta la misma redacción usada en el texto. Conviene limitarla a las opciones realmente distintas o explicar la dificultad sintáctica.
  revised_spanish_text: Así, Dios bendijo el séptimo día y lo santificó[a], porque en él reposó[b] de toda su obra que Dios había creado para hacer[c][d].
