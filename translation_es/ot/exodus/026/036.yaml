    text: O «velo» para la cobertura de la entrada; aquí se usa «cortina» para distinguirla del velo interior descrito en otras partes del capítulo.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «pantalla» por «cortina» porque en español actual y eclesial «pantalla» no describe naturalmente un colgante textil de entrada. «Cortina» mantiene la función de cobertura, lee con naturalidad, y la nota conserva la distinción contextual respecto del velo interior, que era la motivación documentada en el POB inglés.
