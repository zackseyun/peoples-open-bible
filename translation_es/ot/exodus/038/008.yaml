    text: Or 'the women who assembled at the entrance to the tent of meeting.' The Hebrew may emphasize organized gathering as well as service.
    reason: alternative_reading
  - marker: b
    text: Or 'from the polished metal mirrors.' Ancient mirrors were typically made of polished bronze rather than glass.
    reason: cultural_note
