review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: origen («De estos»), separación/división, regiones marítimas de las naciones, tierras, lengua, clanes y naciones. Sin embargo, hay un problema de fidelidad sintáctico-semántica: «las costas de las naciones se separaron» suena en español como si las costas mismas fueran el ente que se aparta, una imagen poco natural y confusa. Dado que el inglés auditado conservó «the coastlands of the nations were separated», en español conviene una formulación más idiomática que preserve la pasiva/media de נפרדו sin volver el sentido opaco.'
  spanish_quality_summary: 'La redacción es clara en la segunda mitad del versículo, pero la primera cláusula resulta torpe y poco natural. Además, las notas al pie están mal ancladas: la nota b explica «cada uno según su lengua», pero en el texto aparece en «clanes». También falta en español la nota de alternativa/previsión previa equivalente a la nota inglesa c si se quiere preservar por completo el rastro auditado; no obstante, no es indispensable en el texto español si no aporta claridad nueva. La mejor reparación es cambiar a «quedaron divididas» y mover la nota distributiva al segmento correcto.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Clanes» para מִשְׁפְּחֹתָם está bien. «Lengua» es adecuado. «Naciones» para גּוֹיֵהֶם es correcto. «Costas» es posible, aunque «costas/regiones costeras» puede sonar más natural que «costas» solas; aun así, con la nota sobre «islas» el término base puede mantenerse.
  issues:
  - severity: medium
    issue: La cláusula «se separaron las costas de las naciones» es poco natural y potencialmente confusa en español.
    rationale: Aunque formalmente sigue el hebreo/inglés, en español sugiere que las costas mismas se alejaron. «Quedaron divididas» conserva mejor el valor de נִפְרְדוּ en una formulación idiomática.
  - severity: high
    issue: La nota [b] está anclada en «clanes» pero explica «cada hombre/cada uno según su lengua».
    rationale: Esto rompe la correspondencia exigida entre marcador y palabra/frase relevante. El marcador debe ir junto a «cada uno según su lengua».
  revised_spanish_text: De estos quedaron divididas las costas de las naciones[a], en sus tierras, cada uno según su lengua[b], por sus clanes, en sus naciones.
  revised_footnotes:
  - marker: a
    text: 'También: «las islas de las naciones». El hebreo puede referirse a islas o, más ampliamente, a regiones costeras y marítimas.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «hombre según su lengua», una expresión distributiva que significa «cada uno según su lengua».'
    reason: lexical_alternative
  revision_rationale: Se ajustó la primera cláusula para que suene natural en español sin perder el sentido de separación/división del hebreo, y se corrigió la ubicación del marcador de nota para que coincida con la expresión que explica.
