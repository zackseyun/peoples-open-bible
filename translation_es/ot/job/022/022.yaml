translation:
  language: es
  text: Recibe instrucción[a] de su boca, y guarda sus palabras en tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ley» o «enseñanza» para «instrucción» (hebreo תּוֹרָה).
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: receive
  chosen_spanish: recibe
  alternatives_spanish:
  - toma
  - acepta
  lexicon: HALOT
  rationale: El imperativo hebreo literalmente es «tomar», pero en este exhorto sapiencial la idea es acoger la enseñanza; «recibe» conserva la fuerza de aceptar una instrucción y suena natural en español.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - ahora
  - te ruego
  lexicon: HALOT
  rationale: La partícula expresa ruego o insistencia, no tiempo. «Por favor» comunica bien el tono exhortativo en español actual.
- source_word: מִפִּיו
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de él
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la fuente inmediata de la enseñanza. «De su boca» preserva el giro hebreo sin volverlo abstracto.
- source_word: תּוֹרָה
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - ley
  - enseñanza
  lexicon: HALOT
  rationale: En Job, תּוֹרָה no necesita aludir específicamente a la ley mosaica; «instrucción» refleja mejor el ámbito sapiencial y la autoridad del consejo.
- source_word: וְשִׂים
  english_pob_choice: lay up
  chosen_spanish: guarda
  alternatives_spanish:
  - atrapa
  - atesora
  - pon
  lexicon: HALOT
  rationale: El verbo con el complemento «en tu corazón» expresa conservar interiormente. «Guarda» transmite bien la idea de reservar o almacenar en el interior sin sonar forzado.
- source_word: אֲמָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - sus expresiones
  lexicon: HALOT
  rationale: El plural de אמר se vierte de forma natural como «palabras», manteniendo el peso del contenido verbal.
- source_word: בִּלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - dentro de tu corazón
  - en tu interior
  lexicon: HALOT
  rationale: Se conserva el hebraísmo del corazón como sede interior del pensamiento y la voluntad. «En tu corazón» es literal e idiomático en español.
theological_decisions:
- issue: Sentido de תּוֹרָה en un discurso sapiencial
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: Traducir como «instrucción» evita imponer el sentido técnico de la Ley mosaica y respeta el contexto de exhortación a recibir enseñanza autorizada.
  doctrine_reference: Principio de primacía del texto original y de consistencia terminológica con excepciones justificadas por el contexto.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no se requieren revisiones textuales adicionales; se ha mantenido la imagen de «boca» y «corazón», y se ha optado por un equivalente español natural para la partícula de ruego y para תּוֹרָה en contexto sapiencial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «ley» en el cuerpo principal para no sobreespecificar el alcance de תּוֹרָה en Job.
  - «Corazón» se usa en sentido antropológico bíblico de interioridad, no solo emoción.
