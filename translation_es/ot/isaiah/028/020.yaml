translation:
  language: es
  text: Porque la cama es demasiado corta para estirarse en ella, y la cobija[a] demasiado angosta para cubrirse con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cobertor»; el sustantivo hebreo aquí se refiere a una prenda de cama para cubrirse, aunque en otros contextos una forma relacionada puede designar una imagen fundida. El contexto determina el sentido aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del dicho anterior; «porque» conserva bien el valor explicativo/causal en español natural.
- source_word: קָצַר
  english_pob_choice: is too short
  chosen_spanish: es demasiado corta
  alternatives_spanish:
  - es corta
  - ha quedado corta
  lexicon: HALOT
  rationale: El verbo expresa insuficiencia para el uso previsto; «demasiado corta» reproduce esa idea sin endurecer el texto.
- source_word: הַמַּצָּע
  english_pob_choice: the bed
  chosen_spanish: la cama
  alternatives_spanish:
  - el lecho
  - el diván
  - el lugar para recostarse
  lexicon: HALOT
  rationale: El término designa algo extendido para acostarse; «cama» es el equivalente moderno más claro y natural en español.
- source_word: מֵהִשְׂתָּרֵעַ
  english_pob_choice: to stretch oneself out on
  chosen_spanish: para estirarse en ella
  alternatives_spanish:
  - para tenderse en ella
  - para recostarse en ella
  - para echarse en ella
  lexicon: HALOT
  rationale: Mantiene el sentido reflexivo y la relación con la cama; «estirarse» conserva la imagen corporal del hebreo sin excesiva paráfrasis.
- source_word: וְהַמַּסֵּכָה
  english_pob_choice: and the covering
  chosen_spanish: y la cubierta
  alternatives_spanish:
  - y la cobija
  - y la manta
  - y la cobertura
  lexicon: HALOT
  rationale: Aquí el contexto es de ropa de cama, no de «imagen fundida»; «cubierta» es suficientemente amplio y fiel, y evita restringir el sentido a una manta específica.
- source_word: צָרָה
  english_pob_choice: too narrow
  chosen_spanish: demasiado angosta
  alternatives_spanish:
  - demasiado estrecha
  - angosta
  - estrecha
  lexicon: HALOT
  rationale: La idea es insuficiencia para cubrir el cuerpo; «demasiado angosta» comunica bien la imposibilidad práctica implícita.
- source_word: כְּהִתְכַּנֵּס
  english_pob_choice: to wrap oneself in
  chosen_spanish: para envolverse en ella
  alternatives_spanish:
  - para cubrirse con ella
  - para arrebujarse en ella
  - para recogerse en ella
  lexicon: HALOT
  rationale: El matiz reflexivo apunta a envolver el cuerpo con la cubierta; «envolverse» es una equivalencia directa y natural para el español.
translation_notes:
  revision_awareness: El texto en inglés y el juicio de revisión indican alta concordancia y no requieren cambios sustantivos; la versión española conserva la estructura proverbial, la imagen de la cama y la ambigüedad léxica resuelta por contexto en «cubierta».
  spanish_consistency_notes:
  - Se mantiene «Porque» para el valor explicativo de כִּי, en paralelo al inglés POB.
  - Se evita «SEÑOR» u otro término de sustitución, ya que este versículo no contiene el Tetragrámaton ni un título divino.
  - «Cubierta» se usa con nota para preservar la tensión lexical entre objeto de cama y otros posibles sentidos del sustantivo relacionado.
