translation:
  language: es
  text: 'Yahvé ha mandado acerca de ti: no se sembrará más tu nombre[a]. De la casa de tus dioses[b] cortaré la imagen tallada y la imagen fundida. Haré tu sepultura, porque eres despreciable[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no volverá a ser sembrada tu descendencia», es decir, tu linaje o dinastía no continuará.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del templo de tu dios». La forma hebrea puede traducirse más literalmente como «de la casa de tus dioses».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque eres vil» o «porque eres insignificante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha decretado
  lexicon: HALOT
  rationale: El perfecto con waw presenta un mandato ya emitido con vigencia actual. En español, «ha mandado» conserva bien la fuerza de una orden divina establecida, sin perder naturalidad.
- source_word: עָלֶיךָ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - contra ti
  - sobre ti
  lexicon: HALOT
  rationale: La preposición cubre el destinatario del oráculo. «Acerca de ti» mantiene amplitud semántica y no fuerza una hostilidad adicional que el contexto ya muestra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino en español y evita la sustitución por un título.
- source_word: לֹא יִזָּרַע מִשִּׁמְךָ עוֹד
  english_pob_choice: No more will your name be sown
  chosen_spanish: no se sembrará más tu nombre
  alternatives_spanish:
  - no habrá más descendencia sembrada de tu nombre
  - no se propagará más tu nombre
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola de זרע para transparencia textual. «Tu nombre» refleja la forma hebrea; el sentido dinástico queda implicado sin explicitarse en el cuerpo del verso.
- source_word: מִבֵּית אֱלֹהֶיךָ
  english_pob_choice: From the house of your gods
  chosen_spanish: De la casa de tus dioses
  alternatives_spanish:
  - Del templo de tus dioses
  - De la casa de tu dios
  lexicon: HALOT
  rationale: El plural morfológico de אֱלֹהֶיךָ se mantiene como plural posesivo («tus dioses»). «Casa» se conserva frente a «templo» para no aplanar la imagen original, aunque ambos son posibles según contexto.
- source_word: אַכְרִית
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - destruiré
  - extirparé
  lexicon: HALOT
  rationale: El verbo hebreo retiene la imagen de cortar/remover. «Cortaré» es breve y reproduce la aspereza judicial del original.
- source_word: פֶּסֶל
  english_pob_choice: carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo tallado
  - la imagen esculpida
  lexicon: HALOT
  rationale: «Imagen tallada» comunica el objeto manufacturado y evita un término más interpretativo como «ídolo», preservando la concreción del sustantivo.
- source_word: וּמַסֵּכָה
  english_pob_choice: cast image
  chosen_spanish: la imagen fundida
  alternatives_spanish:
  - la imagen vaciada
  - la imagen moldeada
  lexicon: HALOT
  rationale: «Fundida» expresa el proceso de metal fundido/cast y empareja bien con «tallada», manteniendo el paralelismo del hebreo.
- source_word: אָשִׂים קִבְרֶךָ
  english_pob_choice: I will make your grave
  chosen_spanish: Pondré tu sepultura
  alternatives_spanish:
  - haré tu sepultura
  - prepararé tu sepultura
  lexicon: HALOT
  rationale: El giro es conciso y difícil de volver más explícito sin añadir interpretación. «Pondré tu sepultura» preserva la dureza oracular; «sepultura» suena más natural que «grave» en español bíblico actual.
- source_word: כִּי קַלּוֹתָ
  english_pob_choice: for you are contemptible
  chosen_spanish: porque eres despreciable
  alternatives_spanish:
  - porque eres vil
  - porque eres insignificante
  lexicon: HALOT
  rationale: «Despreciable» comunica la valoración de bajeza/contempto en un registro claro y actual. Mantiene la fuerza evaluativa sin caer en arcaísmo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la política doctrinal del proyecto para el Nombre divino. En español, «Yahvé» es la forma habitual y legible para preservar el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretation of the line/name metaphor
  english_pob_reading: Retain the metaphor in the main text
  chosen_spanish_reading: Retener «tu nombre» y la imagen de sembrar
  alternative_spanish_readings:
  - 'Explicitar: «no tendrás más descendencia»'
  - «no continuará tu dinastía»
  rationale: La línea hebrea usa una metáfora agrícola con posible sentido dinástico. Se conserva la imagen en el texto principal y se reserva la aclaración interpretativa para nota, evitando sustituir el tropo por una paráfrasis cerrada.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Plurality of אֱלֹהֶיךָ
  english_pob_reading: your gods
  chosen_spanish_reading: tus dioses
  alternative_spanish_readings:
  - tu dios
  rationale: La forma hebrea es plural y el contexto polémico contra la idolatría favorece conservar ese plural. Traducir en singular ocultaría una decisión morfológica relevante.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin introducir cambios sustantivos respecto de la última revisión; se mantienen la metáfora de sembrar, el plural de «dioses» y la valoración final de desprecio.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה en el texto principal.
  - Se conserva la metáfora agrícola «sembrará» y se aclara su posible sentido dinástico en nota.
  - Se mantiene el paralelismo «imagen tallada / imagen fundida» para פֶּסֶל y וּמַסֵּכָה.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la terminología del proyecto.
