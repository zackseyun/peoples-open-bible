base_translation:
  language: en
  yaml_path: translation/ot/esther/005/001.yaml
  text: Now on the third day[a], Esther put on her royal robes and stood in the inner court of the king’s palace, opposite the king’s house, while the king was sitting on his royal throne in the royal house[b], opposite the entrance of the house.
  footnotes:
  - marker: a
    text: Or 'put on royalty,' that is, royal attire or regalia.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house' can also mean 'palace' in this court setting.
    reason: lexical_alternative
