translation:
  language: es
  text: Como el fuego quema un bosque[a], y como una llama pone en llamas los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como fuego quema el bosque, y como una llama quema los montes»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/אֵשׁ
  english_pob_choice: as fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como el fuego
  - así como fuego
  lexicon: HALOT
  rationale: El prefijo כ introduce comparación. En español, «como fuego» conserva la simetría poética del hebreo y evita añadir un artículo no exigido por el texto.
- source_word: תִּבְעַר
  english_pob_choice: burns
  chosen_spanish: arde
  alternatives_spanish:
  - quema
  - se consume
  - enciende
  lexicon: HALOT
  rationale: El qal de בער expresa la acción de arder de manera directa. «Arde» es natural en español y mantiene el verbo intransitivo de la primera mitad del paralelismo.
- source_word: יָעַר
  english_pob_choice: a forest
  chosen_spanish: un bosque
  alternatives_spanish:
  - el bosque
  - arboleda
  - selva
  lexicon: HALOT
  rationale: El sustantivo significa bosque/woodland. «Un bosque» reproduce bien el valor genérico del hebreo y funciona con el símil poético.
- source_word: וּ/כְ/לֶהָבָה
  english_pob_choice: and as a flame
  chosen_spanish: y como una llama
  alternatives_spanish:
  - y como fuego ardiente
  - y como una flama
  lexicon: HALOT
  rationale: לֶהָבָה es «llama». «Como una llama» preserva la imagen paralela con «fuego» sin sobreexplicar el matiz poético.
- source_word: תְּלַהֵט
  english_pob_choice: sets ... ablaze
  chosen_spanish: incendia
  alternatives_spanish:
  - quema
  - abrasa
  - prende fuego a
  lexicon: HALOT
  rationale: El piel intensifica o vuelve causativo el verbo de arder. «Incendia» comunica bien la fuerza intensiva del hebreo y permite un objeto plural natural en español.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: El plural con artículo se refleja mejor con «los montes». En español bíblico-poético, «montes» suena más idiomático que «montañas» y conserva la elevación imagética.
translation_notes:
  revision_awareness: La versión sigue de cerca el hebreo y coincide sustancialmente con la lectura auditada en inglés, con una leve adaptación idiomática al español en el segundo hemistiquio («incendia los montes») para reflejar el intensivo del piel.
  spanish_consistency_notes:
  - Se mantiene el paralelismo bimembre con dos comparaciones introducidas por «como».
  - Se evitó «SEÑOR» u այլ sustitución irrelevante, ya que el versículo no contiene el Tetragrámaton.
  - «Montes» se eligió por registro poético bíblico y por corresponder al plural hebreo con artículo.
