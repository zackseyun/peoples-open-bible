review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: afirmación de Dios y del pueblo amado, petición de mirar y compadecerse, afirmación de pertenencia, y ruego para que su misericordia no se aparte. Sin embargo, la última cláusula griega ἵνα μὴ ἐπιθῶνται ἡμῖν se refleja mejor con una formulación más cercana a ''vengan contra nosotros'' o ''arremetan contra nosotros'' que con ''se alcen contra nosotros'', que sugiere rebelión o levantamiento más que ataque/hostilidad.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor por naturalidad y precisión semántica en la última cláusula. 'Mira y ten compasión' es entendible, aunque 'Mira y ten piedad' o 'Mira y compadécete' serían alternativas válidas; no es necesario corregirlo. El resto del texto suena bien en español eclesial contemporáneo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. θεός se vierte correctamente como 'Dios'. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección 'misericordia' para ἔλεος concuerda con el rastro auditado.
  issues:
  - severity: medium
    issue: La frase 'para que no se alcen contra nosotros' no reproduce con suficiente precisión ἐπιθῶνται.
    rationale: El verbo griego aquí expresa venir hostilmente contra alguien / arremeter contra alguien. 'Se alcen contra nosotros' en español suele evocar sublevación o rebelión, y puede sonar más interpretativo que el inglés auditado 'come against us'. 'Vengan contra nosotros' conserva mejor la amplitud e indeterminación del sujeto.
  revised_spanish_text: Y ahora, tú eres Dios, y nosotros somos tu pueblo, a quien amaste. Mira y ten compasión, oh Dios de Israel, porque somos tuyos; y no retires de nosotros tu misericordia, para que no vengan contra nosotros.
  revision_rationale: Se ajusta únicamente la última cláusula para reflejar mejor el valor amplio de ἐπιθῶνται y alinearla con la decisión auditada 'lest they come against us', sin introducir una interpretación más fuerte como 'ataquen' ni una imagen menos precisa como 'se alcen'.
