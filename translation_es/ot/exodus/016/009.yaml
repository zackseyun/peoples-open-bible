translation:
  language: es
  text: 'Entonces Moisés dijo a Aarón: «Di a toda la congregación de los hijos de Israel[a]: “Acérquense delante de Yahvé[b], porque ha oído sus murmuraciones”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; es decir, el pueblo de Israel.'
    reason: lexical_alternative
  - marker: b
    text: O «ante Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la acción; «Entonces» comunica de manera natural la secuencia en español sin perder el flujo del relato.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: HALOT
  rationale: El imperativo a Aarón introduce discurso directo; «Di» es la equivalencia más natural y fiel en este contexto.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la congregación de los israelitas
  - toda la comunidad de los hijos de Israel
  lexicon: HALOT
  rationale: «Congregación» preserva la idea de asamblea reunida; «hijos de Israel» mantiene transparente la expresión hebrea que el POB inglés también conservó de forma literal.
- source_word: קִרְבוּ
  english_pob_choice: Come near
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Dénse acercar
  - Acercaos
  lexicon: HALOT
  rationale: El imperativo plural pide aproximación física a la presencia divina. «Acérquense» es claro, reverente y naturalmente español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» reproduce bien el valor locativo-relacional de לִפְנֵי y se ajusta al estilo bíblico en español. Se usa «Yahvé» por la norma terminológica del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto de verter el Tetragrámaton como «Yahvé», preservando el nombre divino propio en vez de sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» expresa de forma directa la causalidad en español.
- source_word: שָׁמַע
  english_pob_choice: he has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - oyó
  - ha escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo señala una acción ya realizada con relevancia presente; «ha oído» reproduce bien ese valor y mantiene el vínculo con la orden que sigue.
- source_word: תְּלֻנֹּתֵיכֶם
  english_pob_choice: your grumblings
  chosen_spanish: sus murmuraciones
  alternatives_spanish:
  - sus quejas
  - sus reclamos
  lexicon: HALOT
  rationale: «Murmuraciones» conserva el matiz de queja repetida y con tono de descontento que el POB inglés expresó como «grumblings».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea contiene el Nombre propio de Dios. En español del proyecto se adopta «Yahvé» para mantener auditable la referencia al Tetragrámaton sin la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de תְּלֻנֹּתֵיכֶם
  english_pob_reading: your grumblings
  chosen_spanish_reading: sus murmuraciones
  alternative_spanish_readings:
  - sus quejas
  - sus murmullos
  rationale: El contexto del desierto sugiere una queja insistente y tensa, no una simple observación. «Murmuraciones» conserva esa carga sin exagerar más allá del texto.
  doctrine_reference: HALOT lexical range for תלונה
translation_notes:
  revision_awareness: La comparación con el contexto inglés auditado muestra alta concordancia y ninguna revisión pendiente. Se mantuvo la estructura narrativa, el imperativo a Aarón, la expresión corporativa «congregación de los hijos de Israel», la causa introducida por «porque», y el valor perfectivo de «ha oído». La principal decisión terminológica fue seguir la norma del proyecto para יְהוָה como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene el tratamiento de plural formal en «Acérquense» para reflejar el plural hebreo.
  - «Delante de Yahvé» conserva el tono bíblico y evita una paráfrasis más libre.
  - La nota b preserva la transparencia del hebreo «hijos de Israel» sin reemplazarlo por una equivalencia explicativa en el texto principal.
  - Se prefirió «murmuraciones» por coherencia con el campo semántico ya documentado en el audit trail inglés.
