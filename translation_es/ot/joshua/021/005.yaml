translation:
  language: es
  text: Y para los demás hijos de Coat[a], de los clanes de la tribu de Efraín, de la tribu de Dan y de la media tribu de Manasés, hubo por sorteo diez ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el resto de los coatitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי
  english_pob_choice: And for the sons of
  chosen_spanish: Y para los hijos de
  alternatives_spanish:
  - Y para los descendientes de
  - Y a los hijos de
  lexicon: HALOT
  rationale: En este contexto de distribución de ciudades, el prefijo con בני introduce al grupo receptor. «Para» expresa bien la destinación distributiva en español sin forzar una lectura distinta.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Coat
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma reconocible en español bíblico. «Coat» mantiene la forma tradicional en español y corresponde al nombre del linaje.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining
  chosen_spanish: los restantes
  alternatives_spanish:
  - los que quedaron
  - el resto de
  lexicon: HALOT
  rationale: El participio indica el subconjunto que queda después de la asignación previa. «Los restantes» conserva ese valor sin añadir una paráfrasis excesiva.
- source_word: מִמִּשְׁפְּחֹת
  english_pob_choice: from the clans of
  chosen_spanish: de los clanes de
  alternatives_spanish:
  - de las familias de
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּחָה funciona como unidad tribal-subtribal. «Clanes» refleja mejor ese nivel que «familias», que en español suena demasiado reducido.
- source_word: מַטֵּה אֶפְרַיִם
  english_pob_choice: the tribe of Ephraim
  chosen_spanish: la tribu de Efraín
  alternatives_spanish:
  - el bastón de Efraín
  - la vara de Efraín
  lexicon: HALOT
  rationale: En este contexto מַטֶּה designa claramente una tribu, no un objeto literal. «Tribu de Efraín» es la equivalencia natural y fiel.
- source_word: וּמִמַּטֵּה דָן
  english_pob_choice: from the tribe of Dan
  chosen_spanish: de la tribu de Dan
  alternatives_spanish:
  - de la vara de Dan
  lexicon: HALOT
  rationale: La repetición del enlace se integra de manera fluida en español. Se mantiene la referencia tribal y el paralelismo con la frase anterior.
- source_word: וּמֵחֲצִי מַטֵּה מְנַשֶּׁה
  english_pob_choice: from the half-tribe of Manasseh
  chosen_spanish: de la media tribu de Manasés
  alternatives_spanish:
  - de la mitad de la tribu de Manasés
  - de la semi-tribu de Manasés
  lexicon: HALOT
  rationale: «Media tribu» es la fórmula más natural y estable en español para esta división territorial de Manasés; conserva el sentido distributivo del hebreo.
- source_word: בַּגּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - por lotes
  lexicon: HALOT
  rationale: El sustantivo גּוֹרָל expresa el procedimiento de asignación por sorteo. «Por sorteo» es claro en español y comunica el mismo mecanismo.
- source_word: עָרִים עָשֶׂר
  english_pob_choice: ten cities
  chosen_spanish: diez ciudades
  alternatives_spanish:
  - diez poblaciones
  - diez villas
  lexicon: HALOT
  rationale: «Ciudades» reproduce directamente עָרִים y mantiene el registro del texto de repartición territorial.
translation_notes:
  revision_awareness: El texto hebreo es una cláusula nominal de reparto; se ha mantenido la estructura distributiva sin añadir un verbo interpretativo fuerte. La solución española sigue de cerca la auditable lectura inglesa y conserva la alternativa léxica ya documentada para הַנּוֹתָרִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Coat» sigue la forma española tradicional para קְהָת, coherente con uso bíblico en español.
  - «Clanes» y «tribu» preservan la distinción social del reparto levítico.
  - No se introduce capitalización devocional innecesaria; el versículo es una nota de asignación territorial.
