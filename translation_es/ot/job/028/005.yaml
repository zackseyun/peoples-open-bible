- from: En cuanto a la tierra[a], de ella sale el pan, y por debajo de ella se revuelve como fuego.
  to: En cuanto a la tierra, de ella sale el pan, pero por debajo de ella es removida como por fuego[a].
  rationale: Se reemplaza 'se revuelve' por 'es removida' para reflejar mejor נֶהְפַּךְ en el contexto de excavación y trastorno del subsuelo. Se usa 'pero' para expresar con naturalidad el contraste ya reconocido en el POB inglés. La comparación final se formula como 'como por fuego' y se conserva la alternativa 'como fuego' en nota, ahora anclada correctamente en la frase afectada.
