- from: 'Entonces el jefe de la guardia[a] tomó a Jeremías y le dijo: «Yahvé tu Dios ha hablado este desastre[b] contra este lugar».'
  to: 'Entonces el jefe de la guardia[a] tomó a Jeremías y le dijo: «Yahvé tu Dios habló de este desastre[b] contra este lugar».'
