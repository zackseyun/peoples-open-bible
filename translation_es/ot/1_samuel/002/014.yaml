  rationale: Se corrigió el anclaje de la nota lexical para que recaiga sobre «tenedor», que es la palabra explicada por la nota. Se cambió «con todo Israel» por «a todo Israel» para reflejar mejor לְכָל. También se suavizó el español con «vasija» y «sartén», manteniendo la variedad de recipientes y el sentido del original. Se conserva el cambio hebreo de singular («el sacerdote») a plural («hacían»).
