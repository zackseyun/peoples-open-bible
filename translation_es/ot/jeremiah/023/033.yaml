  - severity: medium
    issue: «Yo los desecharé» para וְנָטַשְׁתִּי אֶתְכֶם
    rationale: «Desechar» en español suele usarse para objetos y no comunica tan bien el sentido de abandonar/forsake/cast off. «Los abandonaré» es más natural y más cercano al hebreo y a la decisión inglesa revisada.
