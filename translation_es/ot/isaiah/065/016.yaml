base_translation:
  language: en
  yaml_path: translation/ot/isaiah/065/016.yaml
  text: whoever blesses himself in the land will bless himself by the God of truth[a], and whoever swears in the land will swear by the God of truth; because the former troubles are forgotten[c][b], and because they are hidden from my eyes.
  footnotes:
  - marker: a
    text: Or 'pronounces himself blessed.' The Hebrew verb is reflexive.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the earth.' Hebrew אֶרֶץ can mean either 'land' or 'earth' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the God of truth' or 'by the faithful God.' Hebrew 'Amen' carries the sense of firmness, faithfulness, and truth.
    reason: alternative_reading
