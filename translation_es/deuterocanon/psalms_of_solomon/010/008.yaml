translation:
  language: es
  text: Porque Dios es bondadoso[a] y misericordioso para siempre, y las asambleas[b] de Israel glorificarán el nombre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bueno» para «bondadoso».
    reason: lexical_alternative
  - marker: b
    text: O «congregaciones» para «asambleas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base o explicación de la afirmación anterior; «Porque» comunica bien la relación causal en español y conserva el valor explicativo.
- source_word: χρηστός
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - bueno
  - amable
  lexicon: BDAG
  rationale: El griego puede significar «bueno» o «benigno/kind». «Bondadoso» expresa la benevolencia personal de Dios sin volverlo demasiado genérico ni usar un calco rígido.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  lexicon: BDAG
  rationale: «Misericordioso» es el equivalente más directo y natural en español para la clemencia divina.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para la era
  lexicon: BDAG
  rationale: Expresión idiomática de duración continua; «para siempre» es claro y fiel al sentido temporal duradero.
- source_word: συναγωγαὶ
  english_pob_choice: assemblies
  chosen_spanish: asambleas
  alternatives_spanish:
  - congregaciones
  - reuniones
  lexicon: BDAG
  rationale: «Asambleas» refleja el plural de comunidades reunidas y conserva la transparencia del término griego sin cargarlo con asociaciones institucionales posteriores.
- source_word: δοξάσουσιν
  english_pob_choice: will glorify
  chosen_spanish: glorificarán
  alternatives_spanish:
  - honrarán
  - darán gloria a
  lexicon: BDAG
  rationale: Mantiene el futuro y el sentido doxológico fuerte del verbo.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se sigue la convención del proyecto para κύριος en esta expresión; en español la forma natural y reverente es «el Señor».
theological_decisions:
- issue: Traducción de κύριος en la expresión «el nombre de Κυρίου»
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: En esta fórmula genitiva, «el Señor» comunica la referencia titulativa de κύριος de manera idiomática y coherente con el uso litúrgico y bíblico del español, sin perder la reverencia del título.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando las notas al pie no ancladas en el texto; la traducción ahora no incluye marcadores footnote.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis directa y solemne adecuada para un salmo.
  - No se usó «SEÑOR» en versales; se prefirió «el Señor» como traducción explícita del título.
  - «Asambleas» conserva el plural del griego συναγωγαί y evita una reducción a singular.
