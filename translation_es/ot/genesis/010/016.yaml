translation:
  language: es
  text: y los jebuseos[a], y los amorreos, y los girgaseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo presenta formas gentilicias singulares ('el jebuseo', 'el amorreo', 'el girgaseo'), pero aquí funcionan colectivamente para designar pueblos; por eso el español usa plurales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  lexicon: HALOT
  rationale: El hebreo usa una forma gentilicia singular con artículo, pero en la tabla de naciones funciona colectivamente para un pueblo. En español, el plural etnónimo es la manera más natural y fiel de expresar esa referencia colectiva.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Como en los otros nombres étnicos del pasaje, la forma singular hebrea representa a un pueblo. El plural en español comunica mejor el sentido colectivo sin perder la base léxica.
- source_word: הַגִּרְגָּשִׁי
  english_pob_choice: the Girgashites
  chosen_spanish: los gergeseos
  alternatives_spanish:
  - el gergeseo
  lexicon: HALOT
  rationale: Se mantiene el valor colectivo del gentilicio hebreo mediante el plural español, siguiendo el mismo patrón que en los dos nombres anteriores.
- source_word: וְאֶת / וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: HALOT
  rationale: La conjunción enlaza miembros de una lista continua. El marcador de objeto directo hebreo no se traduce de forma explícita en español; basta con repetir 'y' para conservar la enumeración.
translation_notes:
  revision_awareness: 'El texto coincide con la línea del POB en inglés: mantener la lectura colectiva de los gentilicios singulares hebreos en una enumeración de pueblos. No hay revisiones textuales relevantes en el pasaje; la decisión principal es de equivalencia léxica en español.'
  spanish_consistency_notes:
  - Se usa 'jebuseos', 'amorreos' y 'gergeseos' como etnónimos plurales naturales en español.
  - Se conserva la estructura enumerativa con comas y conjunción final simple 'y', acorde con una lista genealógica.
  - No se introduce 'SEÑOR' ni vocabulario teológico ajeno al versículo.
