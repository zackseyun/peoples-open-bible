translation:
  language: es
  text: 'Ellos habían salido de la ciudad; no se habían alejado mucho, cuando José dijo al encargado[a] de su casa: «Levántate, persigue a los hombres, y cuando los alcances, diles: “¿Por qué han devuelto mal por bien?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su mayordomo» / «al hombre encargado de su casa». El hebreo dice literalmente: «al que estaba sobre su casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצְאוּ אֶת הָעִיר
  english_pob_choice: had gone out of the city
  chosen_spanish: habían salido de la ciudad
  alternatives_spanish:
  - salieron de la ciudad
  - habían dejado la ciudad
  lexicon: HALOT
  rationale: «Salir de la ciudad» expresa con naturalidad el valor de יָצָא con objeto definido; el pluscuamperfecto español conserva la secuencia narrativa previa a la orden de José, como en el inglés auditado.
- source_word: לֹא הִרְחִיקוּ
  english_pob_choice: had not gone far
  chosen_spanish: no se habían alejado mucho
  alternatives_spanish:
  - no estaban lejos
  - no habían ido muy lejos
  lexicon: HALOT
  rationale: El hiphil de רחק comunica distanciarse. «Alejarse mucho» mantiene el sentido espacial y la progresión temporal sin sonar mecánico en español.
- source_word: לַאֲשֶׁר עַל בֵּיתוֹ
  english_pob_choice: to the one over his house
  chosen_spanish: al que estaba sobre su casa
  alternatives_spanish:
  - al mayordomo de su casa
  - al hombre encargado de su casa
  lexicon: HALOT
  rationale: 'La frase hebrea es literalmente relacional: «el que está sobre su casa». Mantenerla evita borrar la forma del original; «mayordomo» queda como alternativa interpretativa, pero el texto principal conserva la cercanía auditada al hebreo.'
- source_word: קוּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - ¡Arriba!
  lexicon: HALOT
  rationale: El imperativo de קום aquí es una orden urgente. «Levántate» es idiomático y reproduce la fuerza de acción inmediata.
- source_word: רְדֹף אַחֲרֵי
  english_pob_choice: pursue
  chosen_spanish: persigue
  alternatives_spanish:
  - ve tras
  - sigue de cerca a
  lexicon: HALOT
  rationale: רדף + אחרי significa perseguir o ir tras alguien. «Persigue» conserva la intensidad del mandato mejor que un verbo más débil.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a esos hombres
  - a los varones
  lexicon: HALOT
  rationale: אַנָשִׁים designa varones adultos; «hombres» preserva la referencia masculina concreta del hebreo y la forma del encargo.
- source_word: וְהִשַּׂגְתָּם
  english_pob_choice: when you overtake them
  chosen_spanish: cuando los alcances
  alternatives_spanish:
  - y los alcances
  - cuando los des alcance
  lexicon: HALOT
  rationale: נשׂג en hiphil es alcanzar/alcanzar a alguien. La subordinada temporal «cuando los alcances» sigue la secuencia del mandato y suena natural en español.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: say to them
  chosen_spanish: diles
  alternatives_spanish:
  - y les dirás
  - díleslo
  lexicon: HALOT
  rationale: El hebreo continúa el encargo en segunda persona. «Diles» economiza sin perder el valor de instrucción directa.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y normal en español; conserva la acusación inmediata del discurso.
- source_word: שִׁלַּמְתֶּם
  english_pob_choice: have you repaid
  chosen_spanish: han pagado
  alternatives_spanish:
  - han devuelto
  - han retribuido
  lexicon: HALOT
  rationale: El piel de שלם puede expresar pagar, retribuir o recompensar. Dado que el objeto es moral («mal por bien»), «han pagado» mantiene la idea de retribución con un español fluido y suficientemente amplio.
- source_word: רָעָה תַּחַת טוֹבָה
  english_pob_choice: evil for good
  chosen_spanish: mal por bien
  alternatives_spanish:
  - mal en lugar de bien
  - daño por bien
  lexicon: HALOT
  rationale: La construcción תַּחַת marca sustitución/represalia. «Mal por bien» preserva el paralelismo breve y la antítesis ética del original; en español es la forma más natural de la recriminación.
theological_decisions:
- issue: El valor de תַּחַת en la reprensión moral
  english_pob_reading: evil for good
  chosen_spanish_reading: mal por bien
  alternative_spanish_readings:
  - mal en lugar de bien
  - mal a cambio de bien
  rationale: 'No se trata solo de contraste moral abstracto, sino de retribución injusta: responder con maldad a un bien recibido. «Por» comunica la relación de sustitución/retaliación sin añadir interpretación extra.'
  doctrine_reference: Ética retributiva / justicia moral en el relato patriarcal
translation_notes:
  revision_awareness: 'La lectura española sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia narrativa, la referencia relacional «sobre su casa» y la recriminación final con paralelismo breve. No se detectaron cambios de revisión relevantes en el registro fuente.'
  spanish_consistency_notes:
  - Se usó «José» en vez de «Cristo» o «SEÑOR», porque el sujeto es יוסף.
  - Se prefirió «mal por bien» para conservar la antítesis compacta y la fuerza proverbial de la acusación.
  - Se mantuvo «el que estaba sobre su casa» como reflejo transparente de la frase hebrea; «mayordomo» queda como alternativa interpretativa, no como sustituto obligatorio.
