translation:
  language: es
  text: Un corazón perverso se apartará de mí; no conoceré el mal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tendré nada que ver con el mal». El hebreo literalmente dice: «No conoceré el mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵבָב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: לֵבָב en hebreo suele abarcar la interioridad personal, incluida la voluntad y el pensamiento. En español, «corazón» es la equivalencia más transparente y natural para conservar ese centro moral e ինտencional sin explicarlo en exceso.
- source_word: עִקֵּשׁ
  english_pob_choice: crooked
  chosen_spanish: perverso
  alternatives_spanish:
  - torcido
  - retorcido
  - desviado
  lexicon: HALOT
  rationale: El adjetivo describe una condición moral torcida o desviada. «Perverso» comunica mejor en español bíblico actual la cualidad ética negativa que «torcido», que puede sonar más físico y menos moral.
- source_word: יָסוּר
  english_pob_choice: will depart
  chosen_spanish: se apartará
  alternatives_spanish:
  - se desviará
  - se retirará
  - se irá
  lexicon: HALOT
  rationale: סור expresa apartarse o retirarse. Con מִמֶּנִּי, el movimiento es separación de la voz del salmista; «se apartará de mí» conserva esa dirección con naturalidad en español.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - alejado de mí
  - desde mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona señala separación respecto del hablante. «De mí» es la forma más directa y fiel en español.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: Aquí רע funciona como sustantivo moral general. «El mal» preserva la amplitud semántica y el registro breve del hebreo.
- source_word: לֹא אֵדָע
  english_pob_choice: I will not know
  chosen_spanish: no conoceré
  alternatives_spanish:
  - no tendré nada que ver con
  - no reconoceré
  - no aceptaré
  lexicon: HALOT
  rationale: ידע literalmente es «conocer», y el texto hebreo mantiene esa forma. «No conoceré» conserva la literalidad auditables, mientras en español puede implicar rechazo de relación o participación, tal como la nota inglesa lo explica.
theological_decisions:
- issue: Sentido de «conocer» en relación con el mal
  english_pob_reading: The psalmist declares refusal of association with evil rather than mere lack of awareness.
  chosen_spanish_reading: El salmista declara que no tendrá trato ni participación con el mal, aunque el texto conserve la formulación literal «no conoceré».
  alternative_spanish_readings:
  - Simplemente no sabré nada del mal
  - No reconoceré el mal
  - No experimentaré el mal
  rationale: En el uso sapiencial y salmódico, «conocer» puede implicar relación, reconocimiento o participación. Mantener la forma literal preserva el giro hebreo y la tensión interpretativa, sin perder el sentido ético de rechazo al mal.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; la redacción española sigue el texto hebreo y el criterio inglés auditado sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵבָב, siguiendo el uso bíblico antropológico habitual.
  - Se usa «el mal» para רע como sustantivo moral general, sin restringirlo a una maldad concreta.
  - Se conserva la literalidad de «no conoceré» para ידע, dejando la implicación relacional en la nota y en la decisión teológica.
  - No se usa «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
