id: 1CO.11.4
reference: 1 Corinthians 11:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πᾶς ἀνὴρ προσευχόμενος ἢ προφητεύων κατὰ κεφαλῆς ἔχων καταισχύνει τὴν κεφαλὴν αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/004.yaml
  text: Every man who prays or prophesies with something on his head dishonors his head[a][b].
  footnotes:
  - marker: a
    text: Or, more traditionally, 'with his head covered.' The Greek literally says 'having something on/down from the head' and does not specify the exact covering.
    reason: lexical_alternative
  - marker: b
    text: '''His head'' may refer to his own head literally, while also echoing the relational use of ''head'' in the surrounding context.'
    reason: alternative_reading
translation:
  language: ko
  text: 머리에 무엇을 쓰고 기도하거나 예언하는 남자는 자기 머리를 욕되게 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문은 「머리에 무엇을 가지고/머리에서부터」(κατὰ κεφαλῆς ἔχων)라는 모호한 표현으로 가리개의 정체(면사/베일/물건 등)를 특정하지 않는다. 전통적으로는 「머리를 덮고」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 「자기 머리」는 문자적 머리이면서 동시에 앞 절(11:3)의 관계적 「머리」(메시아)를 반향한다.
    reason: alternative_reading
