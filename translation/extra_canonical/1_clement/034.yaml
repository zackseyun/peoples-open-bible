translation:
  text: 'The good worker receives the bread of his labor with boldness[a], but the sluggish and negligent man cannot look his employer in the eye.


    Therefore we must be eager for doing good, for from him are all things. For he says beforehand to us, “Behold, the Lord, and his reward is before him, to repay each one according to his work.” Therefore he urges us, who believe in him with our whole heart, not to be idle or negligent in any good work.


    Let our boasting and our boldness be in him. Let us submit ourselves to his will. Let us consider the whole multitude of his angels, how they stand by and minister to his will. For the Scripture says, “Ten thousand times ten thousand stood by him, and thousands of thousands ministered to him,” and they cried out, “Holy, holy, holy is the Lord Sabaoth; all creation is full of his glory.”


    So then, let us also, gathered together in concord with one conscience, cry out to him earnestly as from one mouth, so that we may become sharers in his great and glorious promises. For he says, “Eye has not seen, and ear has not heard, and it has not arisen upon the heart of man[b][c][c][d], the things that he prepared for those who wait for him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “the Lord of hosts.” The Greek text here reads “Sabaoth,” preserving the Hebrew-derived title.
    reason: lexical_alternative
    anchor_ref: '34:6'
  - marker: d
    text: Literally, “with one conscience,” emphasizing shared moral awareness as well as unity.
    reason: lexical_alternative
    anchor_ref: '34:7'
  - marker: c
    text: Or “for those who endure for him.” The wording likely echoes the scriptural theme of waiting expectantly for God, though the Greek verb can also stress perseverance.
    reason: alternative_reading
    anchor_ref: '34:8'
  - marker: c
    text: Compare Isaiah 64:4 and 1 Corinthians 2:9 for closely related wording.
    reason: cross_reference
    anchor_ref: '34:8'
  - marker: b
    text: Or 'gathered together in concord to the same place, cry out to him earnestly with one conscience, as from one mouth'.
    reason: previous_rendering
lexical_decisions:
- source_word: παρρησίας
  chosen: with boldness
  alternatives:
  - with confidence
  - with frankness
  lexicon: BDAG
  rationale: In this paraenetic context the term conveys confident openness rather than mere speech-frankness. 'With boldness' also resonates with the later use of παρρησία in v. 5, preserving rhetorical linkage.
- source_word: ἄρτον τοῦ ἔργου αὐτοῦ
  chosen: the bread of his labor
  alternatives:
  - the bread earned by his work
  - the wages of his work
  lexicon: LSJ
  rationale: The Greek keeps the concrete image of bread rather than abstract 'wages.' Retaining the metaphor preserves the moral texture of the saying while remaining intelligible in English.
- source_word: νωθρός
  chosen: sluggish
  alternatives:
  - lazy
  - idle
  lexicon: BDAG
  rationale: '''Sluggish'' captures moral and practical dullness without over-colloquializing. ''Lazy'' is possible but slightly flatter and more idiomatic than the Greek''s tone.'
- source_word: παρειμένος
  chosen: negligent
  alternatives:
  - slack
  - careless
  - fainthearted
  lexicon: LSJ
  rationale: The term suggests looseness or lack of resolve. Here, paired with νωθρός and later repeated in v. 4, 'negligent' best conveys failure of diligence in good works.
- source_word: ἀντοφθαλμεῖ
  chosen: look his employer in the eye
  alternatives:
  - face
  - meet the gaze of
  lexicon: LSJ
  rationale: The verb is vivid and idiomatic, literally involving facing with the eyes. This rendering preserves the concrete force and moral shame implied in the image.
- source_word: προθύμους
  chosen: eager
  alternatives:
  - ready
  - zealous
  lexicon: BDAG
  rationale: The word denotes willing readiness. 'Eager' fits the exhortational tone and pairs naturally with 'for doing good.'
- source_word: ἀγαθοποιΐαν
  chosen: doing good
  alternatives:
  - good works
  - beneficence
  lexicon: BDAG
  rationale: The abstract noun is rendered verbally for natural English while preserving the ethical emphasis. The chapter itself also uses ἔργον ἀγαθόν, so 'doing good' and 'good work' together preserve the semantic field.
- source_word: ἐξ αὐτοῦ γάρ ἐστιν τὰ πάντα
  chosen: for from him are all things
  alternatives:
  - for everything is from him
  - for all things come from him
  lexicon: BDAG
  rationale: This keeps the elevated cadence and broad theological scope of the Greek, echoing scriptural diction.
- source_word: μισθός
  chosen: reward
  alternatives:
  - wages
  - recompense
  lexicon: BDAG
  rationale: In the scriptural citation the term refers to divine recompense. 'Reward' is the most natural and traditional rendering in this context.
- source_word: πιστεύοντας ἐπ᾽ αὐτῷ
  chosen: who believe on him
  alternatives:
  - who believe in him
  - who trust in him
  lexicon: BDAG
  rationale: The construction is close to biblical idiom. 'Believe on him' preserves that cadence, though 'believe in him' is a viable modern alternative.
- source_word: ἀργούς
  chosen: idle
  alternatives:
  - lazy
  - inactive
  lexicon: BDAG
  rationale: The term emphasizes useless inactivity. 'Idle' is concise and suits the paired warning with παρειμένους.
- source_word: καύχημα
  chosen: boasting
  alternatives:
  - glorying
  - ground of boast
  lexicon: BDAG
  rationale: The noun denotes what one boasts in. 'Boasting' keeps the verbal force and aligns with Pauline and early Christian diction.
- source_word: ὑποτασσώμεθα
  chosen: Let us submit ourselves
  alternatives:
  - Let us be subject
  - Let us submit
  lexicon: BDAG
  rationale: The middle/passive nuance is well reflected by 'submit ourselves,' and the ecclesial exhortation remains clear.
- source_word: λειτουργοῦσιν
  chosen: minister
  alternatives:
  - serve liturgically
  - render service
  lexicon: BDAG
  rationale: The verb can carry cultic overtones, but here of angelic service before God. 'Minister' preserves both service and sacred resonance.
- source_word: κύριος σαβαώθ
  chosen: the Lord Sabaoth
  alternatives:
  - the Lord of hosts
  lexicon: LSJ
  rationale: Because the Greek text itself preserves the Hebrew-derived title σαβαώθ rather than translating it, the draft keeps 'Sabaoth' in the main text to reflect the source form.
- source_word: ὁμονοίᾳ
  chosen: in concord
  alternatives:
  - in harmony
  - with one mind
  lexicon: BDAG
  rationale: The term denotes communal unity. 'In concord' preserves ecclesial solemnity without becoming archaic.
- source_word: τῇ συνειδήσει
  chosen: with one conscience
  alternatives:
  - with a united conscience
  - in conscience
  lexicon: BDAG
  rationale: Although 'one conscience' is somewhat unusual in English, it closely reflects the singular noun and the communal moral unity Clement stresses.
- source_word: ἐκτενῶς
  chosen: earnestly
  alternatives:
  - fervently
  - intently
  lexicon: BDAG
  rationale: The adverb denotes stretched-out intensity, especially in prayer. 'Earnestly' is natural and preserves the force.
- source_word: μετόχους
  chosen: sharers
  alternatives:
  - partakers
  - participants
  lexicon: BDAG
  rationale: '''Sharers'' is clear modern English and retains the sense of real participation in the promises.'
- source_word: ὑπομένουσιν
  chosen: wait for him
  alternatives:
  - endure for him
  - persevere for him
  lexicon: BDAG
  rationale: The wording follows the likely Isaianic background, where expectant waiting is prominent. The Greek verb can also imply endurance; that nuance is noted in a footnote.
theological_decisions:
- issue: Rendering of κύριος σαβαώθ in the angelic acclamation
  chosen_reading: the Lord Sabaoth
  alternative_readings:
  - the Lord of hosts
  rationale: The Greek text retains σαβαώθ as a transliterated title rather than translating it. Keeping 'Sabaoth' respects the source form and preserves the liturgical texture, while the common interpretive equivalent is noted in a footnote.
  doctrine_reference: Translate titles for meaning where context supports, but preserve source-driven form where the Greek itself transliterates a title and liturgical cadence is at stake.
- issue: Rendering of ὑπομένουσιν αὐτόν in the closing citation
  chosen_reading: those who wait for him
  alternative_readings:
  - those who endure for him
  - those who patiently await him
  rationale: Given the scriptural allusion behind the citation, 'wait for him' best reflects the intertextual sense of expectant reliance on God. The endurance nuance remains possible and is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it absolutely; choose the reading best supported by context and note alternatives.
