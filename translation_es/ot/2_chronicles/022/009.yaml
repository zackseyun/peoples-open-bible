base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/009.yaml
  text: And he sought Ahaziah[a], and they captured him while he was hiding in Samaria, and they brought him to Jehu and put him to death. Then they buried him, for they said, “He is the son of Jehoshaphat[b], who sought Yahweh with all his heart.” And the house of Ahaziah had no power to retain the kingdom.
  footnotes:
