    reason: alternative_reading
  revision_rationale: Se corrige la ubicación de la nota para que quede anclada a la frase final que realmente comenta. También se ajusta «eran» a «fueron» por mayor naturalidad en este recuento, sin cambiar el sentido. No se requiere adjudicación adicional porque la decisión principal ya está bien documentada en el expediente inglés y el ajuste es mecánico/editorial.
