translation:
  language: es
  text: Yo soy el que testifica acerca de mí mismo[a], y el Padre que me envió testifica acerca de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da testimonio acerca de mí mismo ... da testimonio acerca de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  - Yo soy
  lexicon: BDAG
  rationale: En español, la construcción copulativa simple se expresa con naturalidad como «Yo soy». Conserva el énfasis del pronombre explícito del griego sin volverla innecesariamente solemne o interpretativa.
- source_word: ὁ μαρτυρῶν
  english_pob_choice: the one who testifies
  chosen_spanish: el que testifica
  alternatives_spanish:
  - el que da testimonio
  - el que atestigua
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva. «El que testifica» mantiene el matiz jurídico/testimonial de μαρτυρέω y suena claro en español contemporáneo; «da testimonio» sería posible pero menos directo para conservar la repetición verbal del versículo.
- source_word: περὶ ἐμαυτοῦ
  english_pob_choice: about myself
  chosen_spanish: acerca de mí mismo
  alternatives_spanish:
  - sobre mí mismo
  - con respecto a mí mismo
  lexicon: BDAG
  rationale: 'περί con genitivo aquí se entiende naturalmente como referencia temática: «acerca de». El reflexivo «mí mismo» preserva el énfasis de ἐμαυτοῦ sin sobrecargarlo con una lectura legal adicional que el griego no exige explícitamente.'
- source_word: μαρτυρεῖ
  english_pob_choice: testifies
  chosen_spanish: testifica
  alternatives_spanish:
  - da testimonio
  - atestigua
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo en español que para μαρτυρῶν, para conservar la cohesión léxica del lenguaje de testimonio en la oración.
- source_word: ὁ πέμψας με πατήρ
  english_pob_choice: the Father who sent me
  chosen_spanish: el Padre que me envió
  alternatives_spanish:
  - el Padre, el que me envió
  - mi Padre que me envió
  lexicon: BDAG
  rationale: 'El participio aoristo articular modifica a πατήρ: «el Padre que me envió». No se añade «mi» porque no está explícito en el griego. El aoristo se vierte naturalmente en pasado simple en español.'
theological_decisions:
- issue: Referencia de ὁ πατήρ en contexto joánico
  english_pob_reading: Render simply as 'the Father' and preserve the relational and theological claim without expansion.
  chosen_spanish_reading: Traducir simplemente «el Padre» y mantener la afirmación relacional sin ampliarla.
  alternative_spanish_readings:
  - mi Padre
  - Dios Padre
  rationale: El texto griego dice ὁ πατήρ, «el Padre». Añadir «mi» o «Dios» introduciría una expansión interpretativa no presente en el versículo. La formulación española conserva el valor relacional y testimonial del enunciado.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Lenguaje de testimonio y fuerza legal
  english_pob_reading: Use 'testifies' consistently for μαρτυρέω language.
  chosen_spanish_reading: Usar «testifica» de manera consistente para μαρτυρέω.
  alternative_spanish_readings:
  - da testimonio
  - atestigua
  rationale: «Testifica» conserva mejor la repetición verbal del versículo y el tono de testimonio formal/judicial que caracteriza el contexto joánico, sin sonar arcaico en español.
  doctrine_reference: Translation philosophy 5 and 6
translation_notes:
  revision_awareness: La versión inglesa más reciente indica que no hubo cambios en la revisión final y que el consenso de revisión fue alto; por eso la redacción española sigue de cerca la solución auditada del POB inglés y no introduce expansiones nuevas.
  spanish_consistency_notes:
  - 'Se mantuvo una única forma verbal para μαρτυρέω: «testifica».'
  - Se evitó sustituir «el Padre» por «mi Padre» para no añadir una relación posesiva no explícita en el texto griego.
  - Se conservó el énfasis del pronombre explícito inicial con «Yo soy».
  - La nota al pie se ancla solo en la primera ocurrencia de la expresión testimonial para reflejar la alternativa léxica sin duplicarla.
