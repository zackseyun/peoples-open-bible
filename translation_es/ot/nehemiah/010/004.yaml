  chosen_spanish: Malkijah
  alternatives_spanish:
  - Malquías
  - Malchijah
  - Malkiah
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). Sigo la transliteración que mejor conserva la forma hebrea y evita castellanizaciones no sustentadas por el texto fuente. 'j' representa de modo más consistente el sonido tradicional asociado al elemento final en transliteración bíblica.
translation_notes:
