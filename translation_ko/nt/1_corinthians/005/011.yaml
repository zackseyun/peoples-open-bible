source:
  edition: SBLGNT
  text: νῦν δὲ ἔγραψα ὑμῖν μὴ συναναμίγνυσθαι ἐάν τις ἀδελφὸς ὀνομαζόμενος ᾖ πόρνος ἢ πλεονέκτης ἢ εἰδωλολάτρης ἢ λοίδορος ἢ μέθυσος ἢ ἅρπαξ, τῷ τοιούτῳ μηδὲ συνεσθίειν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/011.yaml
  text: But now I wrote to you not to associate with anyone who is called a brother if he is sexually immoral or greedy or an idolater or abusive or a drunkard or a swindler—not even to eat with such a person.
translation:
  language: ko
  text: 그러나 지금 내가 여러분에게 쓴 것은 형제라 불리는 자가 음행하는 자나 탐욕스러운 자나 우상숭배자나 비방하는 자나 술 취하는 자나 강탈자이면 그와 사귀지 말고, 그런 자와는 함께 먹지도 말라는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀδελφὸς ὀνομαζόμενος
  english_pob_choice: who is called a brother
  chosen_korean: 형제라 불리는 자
  alternatives_korean:
  - 형제로 일컬어지는 자
  lexicon: BDAG
  rationale: 수동 분사 — 회중에서 형제로 불리지만 행실이 그에 맞지 않는 자.
- source_word: λοίδορος
