review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Dios es el sujeto en segunda persona, ''tu pueblo'' traduce bien עַמֶּךָ, y ''Moisés y Aarón'' preserva la mediación humana. Sin embargo, dos puntos requieren ajuste para mayor fidelidad al expediente POB y al español natural: נָחִיתָ se alinea mejor con ''condujiste'' o ''lideraste'' que con ''guiaste'' dado que el inglés auditado eligió ''led''; y בְּיַד debe conservarse con nota o expresarse de forma más natural en español, porque ''por la mano de'' suena forzado sin explicación.'
  spanish_quality_summary: El texto es claro y comprensible, pero 'como a un rebaño' añade una 'a' personal poco natural con un colectivo inanimado. 'Como un rebaño' fluye mejor. 'Por la mano de' es comprensible por influencia bíblica, pero en español moderno digno conviene anclarlo con nota para evitar opacidad. La línea revisada suena más natural y mantiene el tono litúrgico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión 'rebaño' para צאן concuerda con la preferencia del POB por el colectivo. Conviene además preservar en nota la alternativa 'ovejas' y explicar el modismo 'por la mano de' tal como hizo el inglés.
  issues:
  - severity: medium
    issue: '''guiaste'' debilita ligeramente la decisión auditada ''You led'''
    rationale: Aunque 'guiaste' no es incorrecto, el expediente léxico del POB privilegia la fuerza de conducción de נָחִיתָ. 'Condujiste' en español mantiene mejor esa elección sin perder naturalidad en contexto pastoral.
  - severity: medium
    issue: '''como a un rebaño'' es menos natural que ''como un rebaño'''
    rationale: El hebreo solo marca comparación con כ. La 'a' en español introduce un matiz innecesario y hace la frase más torpe.
  - severity: medium
    issue: Faltan las notas preservadas por el POB sobre צאן y בְּיַד
    rationale: El inglés documentó una alternativa léxica significativa ('like sheep') y explicó el modismo 'by the hand of'. En español estas notas siguen siendo útiles, especialmente porque 'por la mano de' puede resultar opaco para algunos lectores.
  revised_spanish_text: Tú condujiste a tu pueblo como un rebaño[a], por la mano de Moisés y Aarón[b].
  revised_footnotes:
  - marker: a
    text: O 'como ovejas'. El hebreo צאן es un término colectivo para un rebaño, especialmente de ovejas o cabras.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'por la mano de Moisés y Aarón', un modismo que significa por medio de ellos o bajo su liderazgo.
    reason: lexical_alternative
