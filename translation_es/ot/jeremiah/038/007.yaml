base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/007.yaml
  text: Now Ebed-melech the Cushite[a], a court official who was in the king’s house, heard that they had put Jeremiah into the cistern[c][b], while the king was sitting at the Benjamin Gate.
  footnotes:
  - marker: a
    text: Or "a eunuch." The Hebrew term can refer either to a literal eunuch or more broadly to a royal court official.
    reason: lexical_alternative
  - marker: b
    text: Or "the pit." The Hebrew word can denote a pit or cistern; here "cistern" fits the immediate context in Jeremiah 38.
    reason: lexical_alternative
  - marker: c
    text: '"The Cushite" refers to a man from Cush; traditional English versions often have "the Ethiopian."'
    reason: cultural_note
