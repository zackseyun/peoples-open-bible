base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/014/029.yaml
  text: Since wars had often arisen in the land[a], Simon son of Mattathias, one of the sons of Joarib, and his brothers gave themselves to danger and stood against the adversaries of their nation, so that their sanctuary and the law might stand[c][b], and they glorified their nation with great glory.
  footnotes:
  - marker: a
    text: Or 'risked themselves' for 'gave themselves to danger.' The Greek idiom emphasizes voluntary self-exposure to peril.
    reason: lexical_alternative
  - marker: b
    text: Or 'their holy place' / 'their holy things' for 'their sanctuary.' The Greek uses a plural form that can refer collectively to sacred things or the sanctuary precincts.
    reason: lexical_alternative
  - marker: c
    text: Or 'they brought great honor to their nation.' The Greek says literally, 'they glorified their nation with great glory.'
    reason: lexical_alternative
