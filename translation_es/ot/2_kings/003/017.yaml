revisions:
- from: 'Porque así dice Yahvé: No verán viento[a], ni verán lluvia; sin embargo, ese wadi[b] se llenará de agua, y beberán ustedes, sus ganados y sus animales.'
  to: 'Porque así dice Yahvé: No verán viento[a] ni verán lluvia, pero ese wadi[b] se llenará de agua, y beberán ustedes, su ganado y sus animales.'
  rationale: Se ajustó «sin embargo» a «pero» para reflejar con más sobriedad el enlace hebreo y evitar una concesión demasiado marcada. Se cambió «sus ganados» por «su ganado» para lograr un español más natural y eclesialmente legible, manteniendo la distinción con «sus animales». Se conservaron «Yahvé» y «wadi» con nota explicativa por fidelidad al proyecto y al contexto geográfico.
