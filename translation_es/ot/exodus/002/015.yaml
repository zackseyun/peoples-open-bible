  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad funcional: «procuró matar» expresa mejor בקש + infinitivo en español idiomático, y «huyó del faraón» evita un calco rígido de מִפְּנֵי. También se afina la nota [a] para reflejar más de cerca las alternativas del inglés POB («this thing» / «learned of this incident»).'
