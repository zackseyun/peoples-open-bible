revisions:
- from: Sé benigno conmigo[a], Yahvé; mira mi aflicción de parte de los que me odian[b], tú que me levantas desde las puertas de la muerte.
  to: Ten misericordia de mí[a], Yahvé; mira mi aflicción de parte de los que me odian[b], tú que me levantas de las puertas de la muerte.
  rationale: Se revisa חָנְנֵנִי a 'Ten misericordia de mí' por ser la súplica más natural y fiel en español eclesial contemporáneo, evitando el calco poco idiomático 'Sé benigno conmigo'. Se ajusta 'desde las puertas de la muerte' a 'de las puertas de la muerte' para reflejar mejor la separación/rescate implícitos en מִן. Se conserva 'Yahvé', la relación sintáctica de la aflicción con los que odian al salmista, y la nota cultural sobre la metáfora hebrea.
