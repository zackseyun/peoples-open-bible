translation:
  language: es
  text: Y sus sacerdotes[a], tomando de nuevo sus sacrificios, se aprovechan de ellos; asimismo sus mujeres, conservando parte de ellas[b], no dan nada ni al pobre ni al desamparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibiendo de nuevo sus sacrificios». El participio griego puede indicar reclamarlos o volver a recibirlos para su propio uso.
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido «conservando» probablemente se refiere a conservar alimentos por salazón o curado.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποδιδόμενοι
  english_pob_choice: taking back
  chosen_spanish: tomando de nuevo
  alternatives_spanish:
  - recibiendo de nuevo
  - recuperando
  lexicon: LSJ
  rationale: El participio medio comunica que los sacerdotes recuperan o retoman para sí los sacrificios. «Tomando de nuevo» conserva esa idea de reapropriación sin cargar el texto con una paráfrasis más interpretativa.
- source_word: καταχρῶνται
  english_pob_choice: make use of
  chosen_spanish: se aprovechan de ellos
  alternatives_spanish:
  - los usan
  - los consumen
  - los usan para sí
  lexicon: LSJ
  rationale: En este contexto el verbo implica usar para beneficio propio. «Se aprovechan de ellos» mantiene la fuerza negativa de la acción y sigue siendo natural en español, sin traducir demasiado libremente como una condena añadida.
- source_word: ταριχεύουσαι
  english_pob_choice: preserving
  chosen_spanish: preservando
  alternatives_spanish:
  - sazonando
  - curando
  - salando
  lexicon: LSJ
  rationale: El participio se refiere a conservar alimentos, probablemente mediante salazón o curado. «Preservando» es suficientemente amplio en español y evita fijar en el texto principal un método específico que el griego no explicita.
- source_word: πτωχῷ
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - los pobres
  - una persona pobre
  lexicon: BDAG
  rationale: El singular tiene valor representativo. En español, «el pobre» puede funcionar de manera colectiva y conserva la brevedad del original.
- source_word: ἀδυνάτῳ
  english_pob_choice: the helpless
  chosen_spanish: el desamparado
  alternatives_spanish:
  - el indefenso
  - el desvalido
  - el incapaz
  lexicon: BDAG
  rationale: El término apunta a alguien sin fuerza o sin posibilidad de ayudarse. «Desamparado» comunica bien esa vulnerabilidad en español y encaja con el paralelismo con «el pobre».
theological_decisions:
- issue: Fuerza moral del pasaje sobre apropiación sacerdotal y carencia de caridad
  english_pob_reading: Describe the exploitative behavior without adding explicit condemnation beyond the context.
  chosen_spanish_reading: Describir la conducta como aprovechamiento, dejando que el contexto más amplio cargue la censura.
  alternative_spanish_readings:
  - usar «abusan de ellos»
  - usar «los malgastan»
  rationale: El griego presenta la acción de manera descriptiva, aunque claramente crítica. «Se aprovechan de ellos» deja visible la explotación sin intensificarla por encima de lo que el versículo expresa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La versión sigue el último estado revisado del texto inglés: se mantuvo el valor descriptivo de «taking back / make use of» y se adoptó un término español que refleje la falta de auxilio para ἀδυνάτῳ, en línea con la revisión que prefirió «helpless».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el lenguaje de apropiación de sacrificios con un verbo de uso propio («se aprovechan») para respetar la tensión moral sin sobrecargar el texto.
  - «Desamparado» se eligió por claridad y paralelismo con «el pobre», manteniendo el campo semántico de vulnerabilidad.
