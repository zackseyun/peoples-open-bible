base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/017.yaml
  text: Zadok son of Ahitub and Ahimelech son of Abiathar were priests[b][a], and Seraiah was secretary.
  footnotes:
  - marker: a
    text: Or 'chief ministers' or 'royal officials' for 'priests'; some take the term here in a broader court-administrative sense because the verse lists David's officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'scribe.' The Hebrew term refers to an official responsible for writing or administration.
    reason: lexical_alternative
