translation:
  language: es
  text: Y Matatías y sus hijos fueron por todas partes y derribaron sus altares,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκύκλωσεν
  english_pob_choice: went around
  chosen_spanish: anduvieron por allí
  alternatives_spanish:
  - dieron vueltas
  - recorrieron el lugar
  - anduvieron alrededor
  lexicon: LSJ
  rationale: El verbo griego indica moverse alrededor o de un lugar a otro. En español, 'anduvieron por allí' conserva la idea de desplazamiento repetido o itinerante sin sugerir necesariamente un cerco militar, que sería excesivo para este contexto.
- source_word: καθεῖλον
  english_pob_choice: tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - tumbaron
  - demolieron
  - destruyeron
  lexicon: LSJ
  rationale: '''Derribaron'' comunica con naturalidad la acción física de desmontar o echar abajo estructuras cultuales. Mantiene el sentido concreto del aoristo sin cargar el texto con una intensidad no exigida por el griego.'
- source_word: βωμοὺς
  english_pob_choice: altars
  chosen_spanish: altares
  alternatives_spanish:
  - altarillos
  - lugares altos
  - altares de sacrificio
  lexicon: LSJ
  rationale: βωμός designa un altar. 'Altares' es la equivalencia directa y más fiel; 'lugares altos' introduciría un término distinto que el griego no usa.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - de éstos
  - de aquellos
  lexicon: Gramática griega
  rationale: El posesivo español 'sus' preserva la referencia posesiva del pronombre griego sin especificar más de lo que el contexto inmediato permite. El antecedente son los opositores/ídolatras del relato.
- source_word: Ματταθίας
  english_pob_choice: Mattathias
  chosen_spanish: Matatías
  alternatives_spanish:
  - Matatías
  - Matatías
  lexicon: Convención de transliteración
  rationale: En español bíblico es natural la forma 'Matatías', que adapta el nombre al sistema gráfico y fonológico español. Mantiene reconocimiento y fluidez lectora.
theological_decisions:
- issue: Identidad de los altares destruidos
  english_pob_reading: altars associated with the opposing/idolatrous party
  chosen_spanish_reading: sus altares, entendidos en el contexto como altares ilícitos o idólatras
  alternative_spanish_readings:
  - los altares en general
  - los altares del pueblo
  - sus lugares de culto
  rationale: El pronombre posesivo en griego y el contexto narrativo apuntan a altares pertenecientes al bando contrario, no a altares legítimos de Israel en general. La traducción conserva 'sus' para mantener esa tensión contextual sin añadir una glosa interpretativa al texto principal.
  doctrine_reference: Principio de primacía del texto original; mantener el referente cultual tal como lo sugiere el contexto inmediato.
translation_notes:
  revision_awareness: 'El audit trail inglés confirma una lectura estable: ἐκύκλωσεν como movimiento itinerante (''went around'') y καθεῖλον como destrucción física (''tore down''), sin necesidad de revisar el sentido base. La versión española sigue esa misma línea con verbos naturales y fieles.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio en forma española 'Matatías' para consistencia bíblica en español.
  - Se conserva el posesivo 'sus' para no sobreespecificar el referente de αὐτῶν.
  - No se introduce una nota de pie porque el griego y el audit trail no plantean una variante textual ni una ambigüedad que requiera marcador en el texto.
