    rationale: El English POB documenta la alternativa léxica para וַיִּתְנַכְּלוּ, no para מֵרָחֹק. Cambiar el foco de la nota altera el rastro de auditoría y omite el matiz importante de 'tramar/maquinar' del verbo hebreo.
  - severity: low
    issue: La nota actual sobre 'de lejos' introduce una preferencia estilística más que una verdadera alternativa significativa.
    rationale: '''De lejos'' ya es una opción idiomática suficiente en español; una nota sobre ''a distancia'' no es necesaria a menos que preserve una ambigüedad real, lo cual aquí no sucede.'
  revised_spanish_text: Lo vieron de lejos, y antes de que se acercara a ellos, conspiraron[a] contra él para matarlo.
  revised_footnotes:
