base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/009/014.yaml
  text: New wine[a], a new friend; when it grows old[b], you may drink it with pleasure.
  footnotes:
  - marker: a
    text: The Hebrew text of this verse is proverb-like but textually difficult in its final clause. The Greek parallel supplied here reflects a substantially different reading ('Know that you walk in the midst of snares...'), so this translation follows the surviving Hebrew witness rather than the divergent Greek form.
    reason: textual_variant
  - marker: b
    text: Or, more literally, 'New wine, a new friend; and when old, afterward perhaps you will drink it.' The sense is that a friendship, like wine, is best enjoyed once it has matured.
    reason: lexical_alternative
