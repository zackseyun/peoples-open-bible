revisions:
- from: ¿Has conocido esto desde antiguo[a], desde que el hombre fue puesto sobre la tierra?
  to: ¿Has sabido esto desde antiguo, desde que el hombre[a] fue puesto sobre la tierra?
  rationale: Se repara la ubicación del marcador de nota para que corresponda al término אָדָם / 'el hombre', que es el verdadero punto de variación léxica. Además, se ajusta 'has conocido' a 'has sabido' para una lectura más natural en español, manteniendo el sentido de conocimiento reconocido desde antiguo en la pregunta retórica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: pregunta retórica sobre un conocimiento antiguo, con la segunda frase temporal ''desde que ... fue puesto sobre la tierra''. También preserva correctamente el valor genérico singular de אָדָם y la alternativa inclusiva en nota. Sin embargo, el anclaje de la nota no corresponde al contenido de la nota: la nota alternativa se refiere a ''el hombre'', no a ''desde antiguo''.'
  spanish_quality_summary: El español es claro y digno, pero '¿Has conocido esto...?' suena poco natural en este contexto bíblico; '¿Has sabido esto...?' expresa mejor en español la idea de conocimiento reconocido desde antiguo y mantiene el matiz retórico. El resto de la frase lee bien.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión 'el hombre' para אָדָם es defendible y coherente con la rationale documentada, siempre que la nota alternativa se ancle en ese sintagma. 'Sobre la tierra' es aceptable para עֲלֵי אָרֶץ.
  issues:
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota 'O «desde que la humanidad fue puesta sobre la tierra»' ofrece una alternativa para אָדָם, pero el marcador [a] está colocado después de 'desde antiguo', lo que induce a pensar que la variante afecta la frase temporal anterior.
  - severity: low
    issue: '''Has conocido'' suena forzado en español'
    rationale: Aunque calca de cerca el inglés auditado, en español bíblico-natural 'has sabido' comunica mejor el conocimiento reconocido o sabido desde tiempo antiguo sin perder fidelidad al hebreo יָדַעְתָּ.
  revised_spanish_text: ¿Has sabido esto desde antiguo, desde que el hombre[a] fue puesto sobre la tierra?
  revised_footnotes:
  - marker: a
    text: O «desde que la humanidad fue puesta sobre la tierra».
    reason: lexical_alternative
  revision_rationale: Se repara la ubicación del marcador de nota para que corresponda al término אָדָם / 'el hombre', que es el verdadero punto de variación léxica. Además, se ajusta 'has conocido' a 'has sabido' para una lectura más natural en español, manteniendo el sentido de conocimiento reconocido desde antiguo en la pregunta retórica.
