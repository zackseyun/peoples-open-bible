theological_decisions:
- issue: Rendering of עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - slavery
  - bondage
  - servants
  rationale: Following the project's preference to preserve bonded-status language where salient, 'slaves' better reflects the concrete condition from which Israel was redeemed. Traditional 'bondage' is smoother English but less lexically transparent. Because the Hebrew construction is 'house of slaves,' the main text keeps that form, while a footnote preserves the idiomatic alternative 'house of slavery.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος by analogy of bonded-status language
- issue: Translation of פדה
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  - rescued
  rationale: '''Redeemed'' retains the covenantal and theological weight of divine deliverance without importing later doctrinal specifics beyond the text. It is stronger and more precise than ''rescued.'''
  doctrine_reference: DOCTRINE.md Translation philosophy §5
