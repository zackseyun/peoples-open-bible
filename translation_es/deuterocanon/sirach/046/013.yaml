  rationale: Se ajustó «en la profecía» a «en su ministerio profético» para lograr un español más claro y fiel al sentido contextual de בנבואה, apoyado además por el paralelo griego «profeta del Señor». También se armonizó la nota con la política terminológica del proyecto usando «Yahvé» en lugar de «Señor» para la referencia divina.
