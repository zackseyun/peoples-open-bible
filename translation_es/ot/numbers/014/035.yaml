  text: אֲנִ֣י יְהוָה֮ דִּבַּרְתִּי֒ אִם לֹ֣א זֹ֣את אֶֽעֱשֶׂ֗ה לְ/כָל הָ/עֵדָ֤ה הָֽ/רָעָה֙ הַ/זֹּ֔את הַ/נּוֹעָדִ֖ים עָלָ֑/י בַּ/מִּדְבָּ֥ר הַ/זֶּ֛ה יִתַּ֖מּוּ וְ/שָׁ֥ם יָמֻֽתוּ־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/014/035.yaml
  text: 'I[a], Yahweh, have spoken[b]. Surely I will do this to all this evil congregation who have gathered together against me: in this wilderness they will come to an end, and there they will die.'
  footnotes:
  - marker: a
    text: Or 'assembly' or 'community' for 'congregation.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew idiom rendered 'Surely' is literally 'if not,' an oath-like expression of strong certainty.
    reason: lexical_alternative
