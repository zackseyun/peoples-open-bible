revisions:
- from: Un nombre[a] es preferible[b] a grandes riquezas, y el favor[c] es mejor que la plata y el oro.
  to: Un nombre[a] es preferible[b] más que las grandes riquezas, y el favor[c] es mejor que la plata y el oro.
  rationale: Se ajusta la comparación para reflejar mejor la fuerza proverbial de preferencia y se corrige la nota lexical para alinearla con las alternativas auditadas en inglés. Sin embargo, la redacción principal propuesta sigue siendo muy cercana al borrador original y no requiere adjudicación compleja.
