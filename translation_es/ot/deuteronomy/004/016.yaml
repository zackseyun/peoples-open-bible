translation:
  language: es
  text: para que no procedan corruptamente y se hagan una imagen tallada para ustedes[a], en forma de cualquier figura, la semejanza de macho o hembra—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no sea que procedan corruptamente y se hagan una imagen tallada para ustedes, en forma de cualquier figura, la semejanza de macho o hembra".'
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּן / תַּשְׁחִתוּן
  english_pob_choice: so that you do not act corruptly
  chosen_spanish: para que no procedan corruptamente
  alternatives_spanish:
  - para que no se corrompan
  - no sea que procedan corruptamente
  - para que no actúen corruptamente
  lexicon: HALOT
  rationale: El hebreo introduce un aviso de consecuencia no deseada. En español, 'para que no' conserva la relación final/advertencia; 'procedan corruptamente' refleja el valor activo y moral de la forma verbal sin volverla excesivamente reflexiva.
- source_word: וַעֲשִׂיתֶם לָכֶם
  english_pob_choice: and make for yourselves
  chosen_spanish: y se hagan para ustedes
  alternatives_spanish:
  - y hagan para ustedes
  - y se fabriquen
  - y hagan para sí
  lexicon: HALOT
  rationale: La expresión hebrea incluye el sentido benefactivo/reflexivo 'para ustedes'. 'Se hagan para ustedes' mantiene la idea de producir para uso propio, que es relevante en la prohibición.
- source_word: פֶּסֶל
  english_pob_choice: a carved image
  chosen_spanish: una imagen tallada
  alternatives_spanish:
  - un ídolo tallado
  - una imagen esculpida
  - una imagen labrada
  lexicon: HALOT
  rationale: פֶּסֶל designa un objeto tallado o esculpido. 'Imagen tallada' comunica con precisión la manufactura material y evita el tono arcaico de 'imagen de talla' o 'ídolo' como interpretación más amplia.
- source_word: תְּמוּנַת כָּל סָמֶל
  english_pob_choice: in the form of any figure
  chosen_spanish: en forma de cualquier figura
  alternatives_spanish:
  - a la forma de cualquier figura
  - con la forma de cualquier figura
  - en la forma de cualquier imagen
  lexicon: HALOT
  rationale: La serie nominal apila términos de representación. 'En forma de cualquier figura' conserva la función de תְּמוּנָה y de סָמֶל sin estrecharlo indebidamente a 'ídolo'; 'figura' sigue el ajuste del audit trail inglés y preserva la amplitud lexical.
- source_word: תַּבְנִית
  english_pob_choice: the likeness of
  chosen_spanish: la semejanza de
  alternatives_spanish:
  - la imagen de
  - la forma de
  - el modelo de
  lexicon: HALOT
  rationale: תַּבְנִית puede ser patrón, modelo o semejanza. 'Semejanza de' es natural en español y mantiene el paralelismo con la lista acumulativa de términos de representación.
- source_word: זָכָר א֥וֹ נְקֵבָה
  english_pob_choice: male or female
  chosen_spanish: varón o de mujer
  alternatives_spanish:
  - macho o hembra
  - masculino o femenino
  - hombre o mujer
  lexicon: HALOT
  rationale: Aunque los términos hebreos apuntan al sexo biológico, en español bíblico 'varón'/'mujer' es claro y digno. Se evita 'macho/hembra', que suena zoológico, y 'hombre/mujer', que puede sugerir estatus social más que sexo.
theological_decisions:
- issue: Acumulación de términos de imagen y representación
  english_pob_reading: The verse distinguishes carved image, form of any figure, likeness of male or female.
  chosen_spanish_reading: 'La traducción conserva la acumulación: imagen tallada, en forma de cualquier figura, la semejanza de varón o de mujer.'
  alternative_spanish_readings:
  - una imagen, la forma de cualquier figura, la semejanza de varón o de mujer
  - un ídolo, la forma de cualquier figura, la semejanza de varón o de mujer
  rationale: El hebreo intensifica la prohibición mediante una serie de sustantivos relacionados pero no idénticos. Mantenerlos diferenciados en español evita aplanar el texto y respeta la estrategia del POB inglés de no fusionar todos los términos en una sola palabra genérica.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó 'idol' por 'figure' en סָמֶל para evitar un estrechamiento interpretativo. Por eso el español usa 'figura' y no 'ídolo' en ese segmento, conservando el matiz amplio de representación sin introducir una equivalencia más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto en otros contextos del proyecto, aunque este versículo no lo contiene.
  - Se evitó 'ídolo' como traducción principal de סָמֶל para respetar la decisión lexical revisada del audit trail inglés.
  - Se usó un registro bíblico moderno y claro, sin arcaísmos innecesarios, pero conservando la estructura acumulativa del hebreo.
