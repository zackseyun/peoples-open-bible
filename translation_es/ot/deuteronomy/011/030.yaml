review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: pregunta retórica plural, modismo geográfico ‘más allá del Jordán’, localización en la tierra de los cananeos, referencia al Arabá, Gilgal y los árboles de Moré. También preserva las notas alternativas principales. Sin embargo, ‘detrás del camino de la entrada del sol’ suena demasiado literal y poco idiomático en español, y además la nota b no coincide exactamente con el anclaje textual actual. ‘Las encinas de Moré’ es posible, pero para un español bíblico panhispánico ‘los robles de Moré’ resulta más claro y neutral, manteniendo la alternativa ‘terebintos’ en nota.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero hay dos puntos de mejora de legibilidad: 1) el orden ‘¿No están ellos…?’ es comprensible, aunque ‘¿No están…?’ suena más natural en español; 2) ‘la entrada del sol’ es poco natural y puede distraer al lector. ‘La puesta del sol’ conserva la imagen sin dureza calcada. Además, ‘encinas’ es regionalmente más específico y menos transparente que ‘robles’ en un registro bíblico general.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Los topónimos Jordán, Arabá, Gilgal y Moré están bien manejados. La decisión sobre אֵלוֹנֵי puede mejorarse de ‘encinas’ a ‘robles’ para mayor neutralidad panhispánica, conservando ‘terebintos’ en nota como alternativa documentada.
  issues:
  - severity: medium
    issue: ‘detrás del camino de la entrada del sol’ es un calco demasiado rígido
    rationale: Aunque refleja los componentes hebreos, en español moderno suena forzado y poco claro. ‘detrás del camino de la puesta del sol’ conserva mejor la imagen y la legibilidad.
  - severity: low
    issue: La nota b no replica exactamente la frase anclada en el texto
    rationale: El texto dice ‘entrada del sol’, pero la nota cita ‘detrás del camino de la entrada del sol’. Conviene alinear texto y nota tras la mejora estilística.
  - severity: low
    issue: ‘las encinas de Moré’ es menos neutral que ‘los robles de Moré’
    rationale: ‘Encinas’ es una identificación más específica y menos panhispánica. ‘Robles’ es una opción más común en español bíblico, mientras la nota mantiene la posibilidad de ‘terebintos’.
  - severity: low
    issue: El pronombre expreso ‘ellos’ es innecesario en español
    rationale: El hebreo tiene pronombre explícito, pero el español no necesita repetirlo para conservar el plural, ya claro por ‘están’. Omitirlo mejora la naturalidad sin pérdida de sentido.
  revised_spanish_text: ¿No están más allá del Jordán[a], detrás del camino de la puesta del sol[b], en la tierra de los cananeos que habitan en el Arabá, frente a Gilgal, junto a los robles de Moré[c]?
  revised_footnotes:
