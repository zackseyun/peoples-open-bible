translation:
  language: es
  text: ¿Por qué te sentaste entre los apriscos, para oír los silbos de los rebaños? Porque en las divisiones[a] de Rubén hubo grandes reflexiones del corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Junto a los arroyos de Rubén hubo grandes reflexiones del corazón". El término hebreo puede significar "divisiones" o "cauces/arroyos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: La interrogativa directa expresa con naturalidad la reprensión poética del texto sin añadir matices no presentes en el hebreo.
- source_word: יָשַׁבְתָּ
  english_pob_choice: did you sit
  chosen_spanish: te sentaste
  alternatives_spanish:
  - te quedaste
  - permaneciste
  lexicon: HALOT
  rationale: '''Sentarte'' conserva la imagen concreta del verbo y funciona bien en español en una pregunta retórica de reproche.'
- source_word: בֵּין הַמִּשְׁפְּתַיִם
  english_pob_choice: among the sheepfolds
  chosen_spanish: entre los apriscos
  alternatives_spanish:
  - entre los corrales de ovejas
  - entre los rediles
  lexicon: HALOT
  rationale: '''Apriscos'' comunica de forma natural el contexto pastoril de ovejas; mantiene la fuerza visual del hebreo sin una paráfrasis excesiva.'
- source_word: לִשְׁמֹעַ שְׁרִקֹות עֲדָרִים
  english_pob_choice: to hear the whistling for the flocks
  chosen_spanish: para oír los silbos de los rebaños
  alternatives_spanish:
  - para escuchar los silbidos de los rebaños
  - para oír el silbar de los rebaños
  lexicon: HALOT
  rationale: '''Silbos'' reproduce el sonido de señal pastoral con un registro claro y digno; ''de los rebaños'' refleja el objeto de los llamados como en la POB inglesa.'
- source_word: לִפְלַגּוֹת רְאוּבֵן
  english_pob_choice: For the divisions of Reuben
  chosen_spanish: Entre las divisiones de Rubén
  alternatives_spanish:
  - Por las divisiones de Rubén
  - En las divisiones de Rubén
  lexicon: HALOT
  rationale: Aunque la POB inglesa revisó a 'For the divisions of Reuben', en español 'Entre' se ajusta mejor al paralelismo y a la lectura espacial posible del hebreo, sin perder la tensión semántica de פְּלַגּוֹת como 'divisiones' o 'particiones' tribales.
- source_word: גְּדוֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - muchas
  - importantes
  lexicon: HALOT
  rationale: '''Grandes'' es la correspondencia directa y conserva el énfasis intensificador del adjetivo.'
- source_word: חִקְרֵי לֵב
  english_pob_choice: searchings of heart
  chosen_spanish: investigaciones del corazón
  alternatives_spanish:
  - examen del corazón
  - indagaciones del corazón
  - pesquisas del corazón
  lexicon: HALOT
  rationale: La imagen poética apunta a una indagación interior intensa. 'Investigaciones' mantiene el carácter de búsqueda reflexiva y evita domesticar la metáfora a una mera emoción.
theological_decisions:
- issue: 'Sentido de לִפְלַגּוֹת רְאוּבֵן: ''divisiones'' vs. posible ''corrientes/arroyo'''
  english_pob_reading: 'The English POB preserves the lexical tension with a footnote: ''divisions'' or ''watercourses/streams.'''
  chosen_spanish_reading: Entre las divisiones de Rubén
  alternative_spanish_readings:
  - Por los arroyos de Rubén
  - Entre los cursos de agua de Rubén
  rationale: Se mantiene 'divisiones' en el texto principal porque refleja la opción contextual de la POB y encaja con la mención de la vacilación tribal. La alternativa hidrográfica queda disponible en nota como lectura lexical legítima del hebreo.
  doctrine_reference: Lexical ambiguity of Hebrew פְּלַגּוֹת; no doctrinal issue
- issue: Imagen final de חִקְרֵי לֵב
  english_pob_reading: searchings of heart
  chosen_spanish_reading: investigaciones del corazón
  alternative_spanish_readings:
  - searchings of heart
  - examen del corazón
  rationale: Se preserva la metáfora de una búsqueda interior intensa sin reducirla a una mera introspección psicológica moderna. 'Corazón' conserva el centro de la vida interior bíblica.
  doctrine_reference: Biblical anthropology; poetic diction
translation_notes:
  revision_awareness: 'La POB inglesa mantiene una nota de ambigüedad para לִפְלַגּוֹת רְאוּבֵן y revisa la preposición para mejorar el flujo. En español se optó por conservar la lectura contextual ''divisiones'' en el texto principal, pero la nota preserva la alternativa hidrográfica del hebreo. También se ajustó ''searchings of heart'' a una expresión española natural y transparente: ''investigaciones del corazón''.'
  spanish_consistency_notes:
  - Se usa 'Rubén' para el nombre tribal, conforme a la tradición bíblica en español y sin alterar el referente.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - '''Corazón'' se mantiene como centro de la vida interior, coherente con el uso bíblico de לֵב.'
