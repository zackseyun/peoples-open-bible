base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/018.yaml
  text: 'Speak to Aaron and to his sons and to all the sons of Israel[a], and say to them: Any man from the house of Israel, or from the sojourners in Israel, who presents his offering for any of their vows or any of their freewill offerings[c][b], which they present to Yahweh as a burnt offering—'
  footnotes:
  - marker: a
    text: Or 'the resident foreigner in Israel.' The Hebrew גֵּר refers to a non-Israelite living among Israel under its communal order.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the sons of Israel'; many English versions render this idiomatically as 'all the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for all their vow offerings and all their freewill offerings.' The Hebrew may be understood as referring more specifically to offerings associated with vows.
    reason: alternative_reading
