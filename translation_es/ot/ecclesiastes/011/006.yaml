  to: Por la mañana, siembra tu semilla; y por la tarde, no dejes descansar tu mano[a], porque no sabes cuál de las dos tendrá éxito[b], esta o aquella, o si ambas por igual serán buenas.
  rationale: 'Se corrige la ubicación de las notas para que sigan el expediente inglés y el léxico fuente: la nota idiomática se mantiene en «mano», y la alternativa léxica se traslada a «tendrá éxito». Además, se elimina el «si» innecesario antes de «esta o aquella» y se añade «de las dos» para un español más natural sin alterar el sentido.'
