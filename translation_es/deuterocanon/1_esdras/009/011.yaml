translation:
  language: es
  text: Pero el pueblo es numeroso, y es tiempo de lluvia[a], y no podemos permanecer de pie al aire libre[b]; y este no es un asunto de un día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «es una estación invernal». La traducción opta por «tiempo de lluvia» para comunicar la fuerza práctica del contexto.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego transmitido contiene aquí una cláusula difícil, καὶ οὐχ εὕρομεν («y no encontramos/no hallamos»), cuyo sentido es incierto en este contexto. La traducción sigue el sentido principal claro del versículo, confirmado por el paralelo hebreo de Esdras 10:13.
    reason: textual_variant
lexical_decisions:
- source_word: τὸ πλῆθος πολὺ
  english_pob_choice: the people are many
  chosen_spanish: la gente es mucha
  alternatives_spanish:
  - la multitud es grande
  - el pueblo es numeroso
  lexicon: LSJ
  rationale: La frase griega describe un conjunto humano numeroso reunido para el asunto. «La gente es mucha» conserva el sentido colectivo y resulta natural en español sin perder el énfasis en la abundancia de personas.
- source_word: ὥρα χειμερινή
  english_pob_choice: it is the rainy season
  chosen_spanish: es tiempo de lluvia
  alternatives_spanish:
  - es tiempo invernal
  - es la estación de lluvias
  - es tiempo de invierno
  lexicon: LSJ
  rationale: El griego dice literalmente una estación/t iempo invernal o riguroso. En este contexto el punto práctico es que el clima impide quedarse afuera; «tiempo de lluvia» comunica esa fuerza funcionalmente en español, en línea con la decisión inglesa, sin negar la base estacional del griego.
- source_word: οὐκ ἰσχύσομεν στῆναι αἴθριοι
  english_pob_choice: we are not able to stand outside
  chosen_spanish: no podemos permanecer de pie al aire libre
  alternatives_spanish:
  - no podemos quedarnos en campo abierto
  - no somos capaces de permanecer fuera
  - no podemos estar expuestos al cielo
  lexicon: LSJ
  rationale: ἰσχύσομεν expresa capacidad o resistencia; αἴθριοι señala estar expuestos al aire libre. «Permanecer de pie al aire libre» reproduce la idea de mantenerse fuera, expuestos al clima, de forma idiomática y clara.
- source_word: καὶ οὐχ εὕρομεν
  english_pob_choice: omitted from main text as textually/syntactically uncertain
  chosen_spanish: omitido del texto principal por su incertidumbre textual y sintáctica
  alternatives_spanish:
  - y no encontramos
  - y no hallamos
  - y no estamos al aire libre
  lexicon: LSJ
  rationale: La cláusula es oscura en el griego transmitido y parece no encajar bien en el contexto. Siguiendo la cautela del audito inglés, no se fuerza una traducción que pudiera introducir un sentido incierto; el flujo principal de la frase ya queda claro sin ella.
- source_word: τὸ ἔργον ἡμῖν οὐκ ἔστιν ἡμέρας μιᾶς
  english_pob_choice: this is not a task of one day
  chosen_spanish: este no es un trabajo de un día
  alternatives_spanish:
  - este no es un asunto de un día
  - no se trata de una tarea para un solo día
  - esto no puede hacerse en un día
  lexicon: LSJ
  rationale: ἔργον puede ser trabajo, tarea o asunto; aquí se trata de una labor/procedimiento que no puede concluirse rápidamente. «Trabajo de un día» conserva la limitación temporal del genitivo sin sonar artificial en español.
theological_decisions:
- issue: Tratamiento de la cláusula griega difícil καὶ οὐχ εὕρομεν
  english_pob_reading: The translation follows the verse's clear overall meaning, supported by the Hebrew parallel in Ezra 10:13, rather than forcing a wooden rendering of the obscure clause.
  chosen_spanish_reading: Se sigue el sentido global claro del versículo, corroborado por el paralelo hebreo de Esdras 10:13, sin obligar una traducción literal de la cláusula oscura.
  alternative_spanish_readings:
  - Incluir «y no hallamos» en el texto principal
  - Reformular el verso para acomodar la cláusula griega difícil
  - Suprimir la referencia al paralelo hebreo
  rationale: 'La decisión preserva la transparencia textual: se reconoce la dificultad del griego transmitido y se evita adjudicar un sentido incierto como si fuera seguro. El paralelo hebreo funciona como confirmación contextual, no como sustituto de la fuente griega principal.'
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original con documentación transparente de paralelos y variantes'
- issue: Forma de expresar la exposición al clima
  english_pob_reading: we are not able to stand outside
  chosen_spanish_reading: no podemos permanecer de pie al aire libre
  alternative_spanish_readings:
  - no podemos estar afuera
  - no podemos permanecer fuera
  - no podemos quedarnos expuestos
  rationale: La imagen no es meramente espacial sino de resistencia a la intemperie. «Al aire libre» comunica con naturalidad la exposición al clima, manteniendo el contenido práctico del griego y la decisión inglesa.
  doctrine_reference: LSJ s.v. αἴθριος; ἰσχύω
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en la parte temporal: el matiz de «de un día» se conserva en «un trabajo de un día». También respeta la cautela editorial ante la cláusula griega difícil καὶ οὐχ εὕρομεν, sin convertirla en una traducción insegura. Se mantuvo la idea de clima adverso y de imposibilidad práctica de permanecer afuera.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - Se prefirió «gente» para τὸ πλῆθος por naturalidad y porque aquí el referente es una asamblea humana numerosa.
  - «Al aire libre» conserva la noción de exposición exterior sin introducir un tecnicismo innecesario.
  - No se añadió «Mesías», «Cristo» ni vocabulario teológico ajeno al verso.
