id: ECC.1.14
reference: Ecclesiastes 1:14
source:
  edition: WLC
  text: רָאִ֨יתִי֙ אֶת כָּל הַֽ/מַּעֲשִׂ֔ים שֶֽׁ/נַּעֲשׂ֖וּ תַּ֣חַת הַ/שָּׁ֑מֶשׁ וְ/הִנֵּ֥ה הַ/כֹּ֛ל הֶ֖בֶל וּ/רְע֥וּת רֽוּחַ־־׃
translation:
  text: I have seen all the works that are done under the sun[a], and behold[b], all is vanity and a striving after wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vapor,' 'breath,' or 'futility' for 'vanity'; the Hebrew הֶבֶל in Ecclesiastes suggests what is fleeting, insubstantial, and frustrating rather than simply 'meaningless.'
    reason: lexical_alternative
  - marker: b
    text: Or 'striving after wind.' The Hebrew phrase רְעוּת רוּחַ is idiomatic and likely conveys futile pursuit; a more literal possibility is 'shepherding the wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. English present perfect captures the speaker's reflective observation with present relevance in context, while remaining natural.
- source_word: הַמַּעֲשִׂים
  chosen: the works
  alternatives:
  - the deeds
  - the activities
  lexicon: HALOT
  rationale: מַעֲשִׂים broadly denotes deeds/works/actions. 'Works' preserves the concrete breadth of human undertakings without narrowing to moral 'deeds' or modern 'activities'.
- source_word: שֶׁנַּעֲשׂוּ
  chosen: that are done
  alternatives:
  - that have been done
  - that are being done
  lexicon: HALOT
  rationale: Niphal perfect 3cp of עשה in a relative clause. 'That are done' is idiomatic and generalizing, fitting Qoheleth's summary statement about human activity.
- source_word: תַּחַת הַשָּׁמֶשׁ
  chosen: under the sun
  alternatives:
  - beneath the sun
  lexicon: HALOT
  rationale: This is a key Ecclesiastes idiom for life in the earthly human sphere. 'Under the sun' is the standard and most transparent rendering.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: הִנֵּה marks attention and rhetorical emphasis. 'Behold' preserves the discourse force better than flatter alternatives, and remains understandable in modern literary English.
- source_word: הַכֹּל
  chosen: all of it
  alternatives:
  - all
  - the whole
  lexicon: HALOT
  rationale: The phrase refers back to the totality of the observed works. 'All of it' makes the referent explicit in natural English.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - vapor
  - breath
  - meaninglessness
  - futility
  lexicon: HALOT
  rationale: In Ecclesiastes הֶבֶל carries the metaphor of transience, insubstantiality, and frustration. 'Vanity' preserves the traditional Qoheleth register without collapsing the term into a single interpretive gloss like 'meaninglessness.' Alternative nuances are worth preserving in a footnote.
- source_word: רְעוּת רוּחַ
  chosen: a chasing after wind
  alternatives:
  - striving after wind
  - shepherding the wind
  lexicon: HALOT
  rationale: This idiom is difficult. Traditional 'vexation of spirit' likely obscures the Hebrew. Given the probable sense of futile pursuit, 'a chasing after wind' communicates the image clearly in modern English. 'Striving after wind' is a close alternative; 'shepherding the wind' reflects a more literal but less intelligible possibility.
