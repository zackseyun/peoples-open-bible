translation:
  language: es
  text: El hombre iracundo provoca contienda[a], y el hombre de mal genio abunda en transgresión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un hombre de ira ... y un amo o señor de furor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «multiplica la transgresión».' 
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אַף
  english_pob_choice: an angry man
  chosen_spanish: el hombre iracundo
  alternatives_spanish:
  - un hombre enojado
  - un hombre de ira
  - el hombre de ira
  lexicon: HALOT
  rationale: La combinación hebrea expresa a una persona caracterizada por la ira, no solo alguien momentáneamente molesto. «Iracundo» conserva el valor adjetival y la fuerza proverbial con español natural.
- source_word: יְגָרֶה
  english_pob_choice: stirs up
  chosen_spanish: provoca
  alternatives_spanish:
  - incita
  - agita
  - despierta
  lexicon: HALOT
  rationale: El verbo describe la acción de provocar o suscitar algo. «Provoca» comunica bien la idea de desencadenar la contienda sin sonar mecánico en español.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - discordia
  - disputa
  lexicon: HALOT
  rationale: El sustantivo apunta a conflicto, disputa o discordia. «Contienda» mantiene el tono sapiencial y la gravedad del término.
- source_word: בַעַל חֵמָה
  english_pob_choice: a hot-tempered man
  chosen_spanish: el hombre de mal genio
  alternatives_spanish:
  - el hombre de ira
  - el hombre iracundo
  - el dueño de la ira
  lexicon: HALOT
  rationale: Literalmente es un giro idiomático de «poseedor/amo de furor». En español, «de mal genio» comunica con claridad el carácter habitual, sin perder la idea de una disposición fija.
- source_word: רַב
  english_pob_choice: abounds in
  chosen_spanish: abunda en
  alternatives_spanish:
  - se llena de
  - multiplica
  - tiene mucho
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona predicativamente con el sustantivo siguiente. «Abunda en» reproduce con naturalidad la idea de abundancia o profusión.
- source_word: פָּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebeldía
  - ofensa
  - pecado
  lexicon: HALOT
  rationale: «Transgresión» preserva el peso moral del término y evita suavizarlo a un término genérico. En un proverbio sapiencial, esta elección mantiene la seriedad ética del enunciado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo el paralelismo poético y las dos variantes lexicográficas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «transgresión» para פָּשַׁע, coherente con el registro moral del proverbio.
  - Se evitó «SEÑOR» u otra convención no pertinente; el versículo no contiene el nombre divino.
  - «Contienda» y «provoca» conservan el paralelismo breve y proverbial del original.
  - La segunda cola usa una expresión idiomática española para בַעַל חֵמָה, sin borrar la tensión lexical del hebreo.
