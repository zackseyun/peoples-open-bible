translation:
  language: es
  text: Entonces la emboscada se levantó rápidamente de su lugar y corrieron en cuanto él extendió su mano[a]; entraron en la ciudad, la capturaron y rápidamente prendieron fuego a la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando él extendió su mano». La construcción hebrea marca el momento de la señal de Josué y puede verterse con uno u otro matiz temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאוֹרֵב
  english_pob_choice: the ambush
  chosen_spanish: la emboscada
  alternatives_spanish:
  - el grupo en emboscada
  - los emboscados
  - la fuerza de emboscada
  lexicon: HALOT
  rationale: El participio funciona de manera colectiva para el grupo que estaba al acecho; en español, «la emboscada» conserva ese valor colectivo y resulta natural en narrativa militar.
- source_word: קָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  - se irguió
  lexicon: HALOT
  rationale: Aquí la idea es el movimiento repentino desde el ocultamiento hacia la acción. «Se levantó» comunica bien ese inicio abrupto sin sonar arcaico.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - con rapidez
  - presurosamente
  lexicon: HALOT
  rationale: El adverbio señala prontitud; «rápidamente» es claro y mantiene el ritmo narrativo.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su posición
  - desde su sitio
  - de donde estaba
  lexicon: HALOT
  rationale: El sufijo es singular masculino y el referente es colectivo; en español, «de su lugar» refleja de forma natural esa referencia colectiva unitaraia.
- source_word: וַיָּרֻצוּ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - corrieron
  - se lanzaron
  - se apresuraron
  lexicon: HALOT
  rationale: El hebreo pasa al plural para los miembros del grupo; en español, para mantener el antecedente colectivo «la emboscada», puede aparecer un verbo singular colectivo, pero la forma plural sería también posible. Se conserva la idea de acción rápida y coordinada.
- source_word: כִּנְטוֹת יָדוֹ
  english_pob_choice: as soon as he stretched out his hand
  chosen_spanish: en cuanto él extendió su mano
  alternatives_spanish:
  - cuando él extendió su mano
  - al extender él su mano
  - en el momento en que extendió su mano
  lexicon: HALOT
  rationale: La construcción con כ indica inmediatez temporal; «en cuanto» expresa bien la rapidez de la respuesta al gesto de Josué sin perder la referencia al signo dado con la mano.
- source_word: וַיָּבֹאוּ הָעִיר
  english_pob_choice: entered the city
  chosen_spanish: entraron en la ciudad
  alternatives_spanish:
  - entraron a la ciudad
  - vinieron a la ciudad
  - se metieron en la ciudad
  lexicon: HALOT
  rationale: «Entraron en la ciudad» es un equivalente directo y natural del movimiento hacia dentro del lugar objetivo.
- source_word: וַיִּלְכְּדוּהָ
  english_pob_choice: captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la apresaron
  - se apoderaron de ella
  lexicon: HALOT
  rationale: לכד en contexto militar significa capturar una ciudad; «la capturaron» conserva precisión y fluidez.
- source_word: וַיְמַהֲרוּ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - sin demora
  - apresuradamente
  lexicon: HALOT
  rationale: El verbo refuerza la velocidad de la acción siguiente; se vierte adverbialmente para no recargar la frase en español.
- source_word: וַיַּצִּיתוּ אֶת הָעִיר בָּאֵשׁ
  english_pob_choice: set the city on fire
  chosen_spanish: prendieron fuego a la ciudad
  alternatives_spanish:
  - incendiaron la ciudad
  - pusieron fuego a la ciudad
  - quemaron la ciudad
  lexicon: HALOT
  rationale: El causativo de יצת expresa encender o poner en llamas. «Prendieron fuego» es idiomático y conserva la idea de provocar el incendio, sin perder la concreción del objeto «la ciudad».
translation_notes:
  revision_awareness: El texto inglés auditado ya refleja una lectura estable y de alta concordancia; no se detectaron cambios sustantivos en la revisión más reciente. La nota de alternativa temporal se conserva porque el hebreo permite traducir el sintagma con matiz de simultaneidad o inmediatez.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Señor» porque no aparece en el hebreo de este versículo.
  - «Emboscada» se usó como colectivo singular para reflejar el sujeto colectivo del hebreo.
  - La referencia pronominal de «su mano» se entiende según el contexto de Josué 8:18-19.
