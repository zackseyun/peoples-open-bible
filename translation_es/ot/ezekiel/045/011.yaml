base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/011.yaml
  text: The ephah and the bath shall be of one measure[a], so that the bath may hold a tenth of a homer, and the ephah a tenth of a homer[c][b]; their standard shall be according to the homer.
  footnotes:
  - marker: a
    text: Or 'their fixed proportion shall be according to the homer.'
    reason: lexical_alternative
  - marker: b
    text: A homer was a larger standard measure; both the ephah (dry measure) and the bath (liquid measure) were set at one-tenth of it.
    reason: cultural_note
  - marker: c
    text: '''Cor'' is a traditional alternative name for the homer.'
    reason: alternative_reading
