review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del griego: los sacerdotes toman su lugar, están vestidos para el servicio, aparecen músicos/trompetas, y los levitas hijos de Asaf participan con címbalos mientras alaban y bendicen. También preserva adecuadamente la ambigüedad de κατὰ Δαυεὶδ con una nota. Sin embargo, dos puntos requieren ajuste para mayor fidelidad: (1) τῷ κυρίῳ en este proyecto debe verterse como referencia explícita a Yahvé en el texto principal, no ''al Señor''; (2) ἔχοντες τὰ κύμβαλα se refleja mejor con un participio verbal explícito (''teniendo/llevando/sosteniendo los címbalos'') que con el sintagma más libre ''con los címbalos''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''vestidos ceremonialmente'' suena algo explicativo y menos natural que ''ataviados'' o ''vestidos para el servicio''. Además, la secuencia mejora en fluidez si se mantiene el paralelismo participial: ''teniendo los címbalos, alabando a Yahvé y bendiciendo...''. La puntuación y el registro general son aptos para lectura eclesial.'
  glossary_alignment: 'Hay un desajuste importante con la terminología del proyecto: κύριος, cuando refiere al Dios de Israel en contexto cultual, debe explicarse y normalmente renderizarse en el texto español como ''Yahvé'', no ''el Señor'' como convención de enmascaramiento. ''Asaf'', ''címbalos'', ''levitas'' y la ambigüedad de ''conforme a David'' están bien encaminados.'
  issues:
  - severity: high
    issue: Se usa 'al Señor' para τῷ κυρίῳ en lugar de 'a Yahvé'.
    rationale: La guía del proyecto establece 'Yahvé' en el texto principal para el nombre divino/referente del Dios de Israel, evitando la convención de enmascaramiento 'SEÑOR/Señor'. En este contexto cultual el referente es claramente el Dios de Israel.
  - severity: medium
    issue: '''con los címbalos'' debilita ἔχοντες τὰ κύμβαλα.'
    rationale: Aunque comprensible, el griego tiene un participio explícito ('teniendo/sosteniendo'). Conviene conservarlo en español para reflejar mejor la sintaxis y la imagen ceremonial.
  - severity: low
    issue: '''vestidos ceremonialmente'' es menos idiomático y algo explicativo.'
    rationale: '''Ataviados'' o una opción similar suena más natural y conserva mejor el matiz formal de ἐστολισμένοι sin añadir explicación adverbial.'
  revised_spanish_text: Y se pusieron de pie los sacerdotes, ataviados, con músicos y trompetas[a]; y los levitas, hijos de Asaf, teniendo los címbalos, alabando a Yahvé y bendiciendo conforme a David, rey de Israel[b];
  revised_footnotes:
