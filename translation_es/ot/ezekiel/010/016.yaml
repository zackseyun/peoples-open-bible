translation:
  language: es
  text: Cuando los querubines se movían[a], las ruedas se movían junto a ellos; y cuando los querubines levantaban sus alas para elevarse de la tierra, las ruedas tampoco se apartaban de junto a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se volvían de junto a ellos». El hebreo recalca que las ruedas no dejaban el lado de los querubines al elevarse estos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְלֶכֶת
  english_pob_choice: When ... moved
  chosen_spanish: Cuando ... se movían
  alternatives_spanish:
  - Al ir ...
  - Cuando ... iban
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo funciona como cláusula temporal. En español, «cuando» comunica mejor la relación temporal que una calca más rígida, y el imperfecto plural conserva la acción coordinada y continua de la visión.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  - los querubes
  lexicon: HALOT
  rationale: Se conserva el término técnico «querubines», que refleja el plural hebreo y encaja con el contexto visionario. «Querubes» suena menos natural en español bíblico moderno.
- source_word: יֵלְכוּ
  english_pob_choice: moved
  chosen_spanish: se movían
  alternatives_spanish:
  - iban
  - se desplazaban
  lexicon: HALOT
  rationale: En este contexto no se trata de ‘caminar’ sino de movimiento visionario coordinado; «se movían» mantiene la fluidez y evita una literalidad extraña.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - los aros
  - los ofanim
  lexicon: HALOT
  rationale: «Ruedas» es la equivalencia directa y transparente para אופן en esta visión de Ezequiel. Mantiene la repetición del término en español sin transliteración innecesaria.
- source_word: אֶצְלָם
  english_pob_choice: beside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - al lado de ellos
  - cerca de ellos
  lexicon: HALOT
  rationale: אצל expresa proximidad. «Junto a ellos» reproduce bien la relación espacial y resulta natural en español.
- source_word: וּבִשְׂאֵת
  english_pob_choice: when ... lifted up
  chosen_spanish: cuando ... levantaban
  alternatives_spanish:
  - al levantar
  - cuando ... alzaban
  lexicon: HALOT
  rationale: La misma función temporal se expresa con «cuando». «Levantaban» transmite el alzamiento de las alas sin sobrerrepresentar el hebreo.
- source_word: אֶת כַּנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus alas/alas de ellos», en español «alas» es el término natural para las extensiones de los querubines; «sus alas» evita una construcción pesada.
- source_word: לָרוּם
  english_pob_choice: to rise
  chosen_spanish: para elevarse
  alternatives_spanish:
  - para subir
  - para alzarse
  lexicon: HALOT
  rationale: 'El infinitivo expresa propósito: elevarse desde la tierra. «Para elevarse» conserva la intención de ascenso con dignidad y claridad.'
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - de sobre la tierra
  lexicon: HALOT
  rationale: El sentido es separación respecto de la tierra en el acto de ascenso. «De la tierra» es fluido en español y suficiente para transmitir el movimiento ascendente.
- source_word: לֹא יִסַּבּוּ
  english_pob_choice: did not turn away
  chosen_spanish: no se apartaban
  alternatives_spanish:
  - no giraban aparte
  - no se desviaban
  lexicon: HALOT
  rationale: El hebreo subraya que las ruedas no se separaban del costado de los querubines. «No se apartaban» preserva la negación de separación mejor que «no giraban», que sería menos claro en español.
- source_word: גַּם הֵם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - ellos también
  lexicon: HALOT
  rationale: La partícula enfática se expresa naturalmente con «también», manteniendo la coordinación entre querubines y ruedas.
- source_word: מֵאֶצְלָם
  english_pob_choice: from beside them
  chosen_spanish: de junto a ellos
  alternatives_spanish:
  - de su lado
  - de al lado de ellos
  lexicon: HALOT
  rationale: La repetición final de אצלם refuerza que las ruedas no se alejaban del lado de los querubines. «De junto a ellos» conserva esa proximidad espacial en español.
theological_decisions:
- issue: Coordinación visual y simbólica entre querubines y ruedas
  english_pob_reading: the wheels also did not turn away from beside them
  chosen_spanish_reading: las ruedas también no se apartaban de junto a ellos
  alternative_spanish_readings:
  - las ruedas tampoco se apartaban de su lado
  - las ruedas no se apartaban tampoco de junto a ellos
  rationale: El texto enfatiza la perfecta coordinación del carro/visón, no una doctrina abstracta. Mantener la negación de separación en español preserva la imagen de subordinación y sincronía entre ambos elementos.
  doctrine_reference: Ezequiel 10:16; visión del trono-carro
- issue: Lenguaje corporal de los querubines
  english_pob_reading: lifted up their wings to rise from the earth
  chosen_spanish_reading: levantaban sus alas para elevarse de la tierra
  alternative_spanish_readings:
  - alzaban sus alas para subir de la tierra
  - levantaban sus alas para alzarse de la tierra
  rationale: La frase describe un acto de ascenso visionario, no una simple acción física cotidiana. «Elevarse» conserva el carácter elevado de la escena sin introducir interpretaciones adicionales.
  doctrine_reference: Ezequiel 10:16
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el único marcador de nota [a] aparezca explícitamente en el texto español. La nota mantiene la alternativa lexical documentada por el POB inglés sobre la idea de no apartarse del costado de los querubines.
  spanish_consistency_notes:
  - Se mantiene «querubines» para הַכְּרוּבִים y «ruedas» para הָאוֹפַנִּים de forma consistente con la terminología de Ezequiel.
  - Se evitó «SEÑOR» y otras sustituciones teológicas no pertinentes; el versículo no contiene el Nombre divino.
  - 'Se conservó la paralelismo sintáctico de dos cláusulas temporales: «Cuando ...» / «y cuando ...».'
  - La negación «no se apartaban» refleja la tensión semántica del hebreo junto con la nota sobre la proximidad constante.
