    rationale: El inglés preserva una alternativa relevante para מַלְאֲכֵהּ ('messenger') y otras para 'changed the king’s word' / 'bow down to'. La nota española actual solo repite «entregaron sus cuerpos» con una glosa explicativa, sin ofrecer una verdadera alternativa lexical.
  - severity: low
