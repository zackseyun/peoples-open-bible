translation:
  language: es
  text: como un recordatorio para los hijos de Israel[a], para que ningún ajeno[b], que no sea de la descendencia de Aarón, se acerque a quemar incienso delante de Yahvé, y para que no llegue a ser como Coré y como su compañía, tal como Yahvé habló por medio de Moisés[c] a este[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “memorial” o “memoria”.
    reason: lexical_alternative
  - marker: b
    text: Aquí “ajeno” se refiere a una persona no autorizada para el servicio sacerdotal, no necesariamente a un extranjero por etnia.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: “por la mano de Moisés”, un modismo que significa “por medio de Moisés”.'
    reason: lexical_alternative
  - marker: d
    text: El pronombre final probablemente se refiere a Aarón.
    reason: alternative_reading
lexical_decisions:
- source_word: זִכָּר֞וֹן
  english_pob_choice: reminder
  chosen_spanish: recordatorio
  alternatives_spanish:
  - memorial
  - memoria
  - recuerdo
  lexicon: HALOT
  rationale: En este contexto legal y preventivo, el sustantivo designa algo que sirve para recordar/advertir. 'Recordatorio' comunica bien esa función en español moderno sin perder la fuerza conmemorativa.
- source_word: לִ/בְנֵ֣י יִשְׂרָאֵ֗ל
  english_pob_choice: for the children of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Mantiene la expresión de parentesco/covenio. 'Hijos de Israel' es natural en español bíblico y conserva la transparencia del hebreo.
- source_word: לְ֠מַעַן אֲשֶׁ֨ר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa finalidad de forma clara y idiomática en español, sin alargar innecesariamente la frase.
- source_word: יִקְרַ֜ב
  english_pob_choice: may come near
  chosen_spanish: se acerque
  alternatives_spanish:
  - pueda acercarse
  - se aproxime
  lexicon: HALOT
  rationale: En el ámbito cultual, el verbo conserva la idea de acercarse a una función restringida. 'Se acerque' suena natural y suficiente.
- source_word: אִ֣ישׁ זָ֗ר
  english_pob_choice: outsider
  chosen_spanish: forastero
  alternatives_spanish:
  - extraño
  - ajeno
  - persona no autorizada
  lexicon: HALOT
  rationale: El contexto no exige una lectura étnica; el sentido es de alguien ajeno o no autorizado para este servicio sacerdotal. 'Forastero' comunica bien la exclusión, aunque en nota se aclara que no se trata necesariamente de un extranjero por etnia.
- source_word: מִ/זֶּ֤רַע אַהֲרֹן֙
  english_pob_choice: from the offspring of Aaron
  chosen_spanish: de la descendencia de Aarón
  alternatives_spanish:
  - de la simiente de Aarón
  - de los descendientes de Aarón
  lexicon: HALOT
  rationale: '''Descendencia'' preserva el valor genealógico de זֶרַע en un español claro y sobrio.'
- source_word: לְ/הַקְטִ֥יר קְטֹ֖רֶת
  english_pob_choice: to burn incense
  chosen_spanish: a quemar incienso
  alternatives_spanish:
  - a ofrecer incienso
  - a hacer arder incienso
  lexicon: HALOT
  rationale: Es la forma cultual natural en español y refleja el idiomático hebreo de hacer subir/humar el incienso.
- source_word: לִ/פְנֵ֣י יְהוָ֑ה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Sigue el criterio del proyecto para יְהוָה, preservando el nombre divino en vez de una sustitución. 'Delante de' mantiene el matiz espacial/cultual de לִפְנֵי.
- source_word: וְ/לֹֽא יִהְיֶ֤ה כְ/קֹ֨רַח֙ וְ/כַ֣/עֲדָת֔/וֹ
  english_pob_choice: and so that he may not become like Korah and like his company
  chosen_spanish: y para que no llegue a ser como Coré y como su compañía
  alternatives_spanish:
  - y para que no sea como Coré y su compañía
  - y para que no se vuelva como Coré y su grupo
  lexicon: HALOT
  rationale: '''Llegue a ser'' conserva el valor preventivo del hebreo y la advertencia sobre un destino o estado, no solo una comparación superficial. ''Compañía'' sigue el auditable ajuste del inglés POB para עֵדָה.'
- source_word: כַּ/אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה בְּ/יַד מֹשֶׁ֖ה לֽ/וֹ
  english_pob_choice: just as Yahweh spoke by the hand of Moses to him
  chosen_spanish: tal como Yahvé habló por medio de Moisés a él
  alternatives_spanish:
  - tal como Yahvé habló por medio de Moisés
  - tal como Yahvé habló por la mano de Moisés a él
  lexicon: HALOT
  rationale: '''Por medio de'' expresa el idiomático בְּיַד sin sonar arcaico en español. Se mantiene el pronombre final por fidelidad al hebreo, aunque el antecedente exacto es debatible.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama, y el proyecto pide reproducirlo como 'Yahvé' en español, no ocultarlo con una sustitución litúrgica. Se conserva el nombre de pacto de forma consistente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אִישׁ זָר en contexto sacerdotal
  english_pob_reading: outsider
  chosen_spanish_reading: forastero
  alternative_spanish_readings:
  - persona ajena
  - persona no autorizada
  - extranjero
  rationale: La restricción es cultual y de autorización sacerdotal, no necesariamente étnica. 'Forastero' sirve como equivalente amplio; la nota aclara que no implica forzosamente extranjería biológica o nacional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Valor de בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - a través de Moisés
  rationale: La expresión hebrea es un idiomático de mediación. 'Por medio de' comunica el sentido en español con naturalidad sin borrar la metáfora subyacente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'He seguido el audit trail inglés: se conservó la función de advertencia de זִכָּר֞וֹן, la restricción cultual de זָר, el ajuste final de עֵדָה como ''company''/''compañía'', y la mediación idiomática de בְּיַד מֹשֶׁה. También se respetó la preferencia del proyecto por ''Yahvé'' en el texto principal español y se mantuvo la ambigüedad del pronombre final con nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה.
  - Se mantiene 'Coré' como forma española habitual del nombre propio.
  - '''Hijos de Israel'' conserva el registro bíblico sin caer en calco duro.'
  - La nota de 'forastero' aclara la restricción sacerdotal sin introducir una lectura étnica indebida.
  - '''Por medio de Moisés'' traduce el hebreo idiomático sin perder el valor de mediación.'
