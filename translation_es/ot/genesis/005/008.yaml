lexical_decisions:
- source_word: וַיִּֽהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - estuvieron
  - llegaron a ser
  lexicon: HALOT
  rationale: En esta fórmula genealógica, el wayyiqtol de היה funciona como cópula de resumen. «Fueron» transmite con naturalidad el valor de estado totalizado sin añadir una paráfrasis innecesaria.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - la vida entera de
  - toda la vida de
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo fijo en Génesis 5 para la duración total de la vida. «Todos los días de» conserva el giro del hebreo y su tono genealógico.
- source_word: שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Seth
  lexicon: convención onomástica
  rationale: Se adopta la forma española tradicional y reconocible del nombre propio, manteniendo la identificación inmediata en español bíblico.
- source_word: שְׁתֵּים עֶשְׂרֵה ... וּתְשַׁע מֵאֹות שָׁנָה
  english_pob_choice: nine hundred and twelve years
  chosen_spanish: novecientos doce años
  alternatives_spanish:
  - doce años y novecientos años
  lexicon: HALOT
  rationale: El hebreo expresa la suma por componentes numéricos, pero el español bíblico naturaliza el total como una sola cifra. Se preserva el valor semántico completo sin calcar el orden hebreo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - entonces murió
  lexicon: HALOT
  rationale: La clausula final es una fórmula recurrente en la genealogía. «Y murió» conserva la repetición solemne y la fuerza narrativa simple del wayyiqtol.
theological_decisions:
- issue: Fórmula genealógica y mortalidad universal
  english_pob_reading: and he died
  chosen_spanish_reading: y murió
  alternative_spanish_readings:
  - y falleció
  - y expiró
  rationale: La línea final mantiene la fórmula repetida de Génesis 5, que subraya la condición mortal del linaje humano sin agregar interpretación. «Y murió» reproduce esa sobriedad y continuidad textual.
  doctrine_reference: Génesis 5; Romanos 5:12
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones aplicadas; la presente propuesta sigue de cerca la decisión óptima equivalente ya establecida, adaptándola a un español natural y publicable sin introducir glosas innecesarias.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Set de manera uniforme.
  - Se conserva la fórmula genealógica «todos los días de ...» para alineación con Génesis 5.
  - Se evita el calco numérico literal y se expresa el total en español natural.
  - No se introduce «SEÑOR» ni terminología teológica ajena al hebreo del versículo.
