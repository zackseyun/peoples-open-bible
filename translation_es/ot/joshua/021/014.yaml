lexical_decisions:
- source_word: יַתִּר
  english_pob_choice: Jattir
  chosen_spanish: Jattir
  alternatives_spanish:
  - Yattir
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera. Se conserva la forma convencional 'Jattir' en español por inteligibilidad y cercanía a la convención inglesa, sin introducir una traducción.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - su terreno común
  - sus pastizales
  - sus tierras comunes
  lexicon: HALOT
  rationale: מִגְרָשׁ alude al terreno abierto alrededor de la ciudad, usado para pastoreo o como tierra común. 'Tierras de pastoreo' comunica bien ese sentido en español moderno y conserva la referencia al espacio anexo a la ciudad; el posesivo plural 'sus' refleja cada ciudad mencionada.
- source_word: אֶשְׁתְּמֹעַ
  english_pob_choice: Eshtemoa
  chosen_spanish: Eshtemoa
  alternatives_spanish:
  - Eshtemoa
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera sin traducir.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El marcador de objeto con conjunción organiza la lista de ciudades. En español no se representa el marcador; se expresa con la conjunción natural 'y' para mantener una lectura fluida y fiel al listado.
translation_notes:
  revision_awareness: 'El contexto en inglés no muestra revisiones sustantivas ni cambios de criterio: la versión más reciente permanece sin cambios y el acuerdo de revisión fue alto. La traducción española sigue esa misma lectura estable, ajustando únicamente la formulación para que suene natural en español sin perder el matiz léxico de מִגְרָשׁ.'
  spanish_consistency_notes:
  - Se mantiene la transliteración de los nombres propios de lugar sin adaptación explicativa adicional.
  - '''Tierras de pastoreo'' se usa de manera consistente para מִגְרָשׁ en este contexto levítico/local.'
  - La repetición estructural del hebreo se conserva con una coordinación simple en español.
