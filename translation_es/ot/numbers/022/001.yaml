translation:
  language: es
  text: Entonces los hijos[a] de Israel partieron y acamparon en las llanuras de Moab, al otro lado del Jordán[b], a la altura de Jericó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel», una designación nacional estándar.
    reason: lexical_alternative
  - marker: b
    text: O «más allá del Jordán» o «al otro lado del Jordán». La frase es relativa a la perspectiva del narrador.
    reason: lexical_alternative
  - marker: c
    text: Jericó funciona como hito geográfico para indicar la ubicación de las llanuras de Moab en la orilla oriental del Jordán.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - salieron
  lexicon: HALOT
  rationale: נסע en este contexto narra el levantamiento del campamento y la continuación del viaje. «Partieron» conserva ese movimiento narrativo en español natural sin perder el matiz de salida de un lugar de campamento.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión literal «los hijos de Israel» para reflejar con precisión la forma hebrea y el designio nacional del texto, en lugar de nivelarlo de inmediato a «los israelitas».
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - hicieron campamento
  lexicon: HALOT
  rationale: חנה expresa establecer campamento. «Acamparon» es claro y digno en español moderno, y mantiene el sentido de asentarse temporalmente.
- source_word: בְּעַרְבוֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en los llanos de Moab
  - en las estepas de Moab
  lexicon: HALOT
  rationale: עַרְבוֹת designa una región de llanura/estepa. «Llanuras» comunica bien el referente geográfico en español y conserva la fórmula establecida sin sobreinterpretarla.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión marca una localización relativa al Jordán desde la perspectiva del narrador. «Al otro lado del Jordán» mantiene esa relación espacial de forma natural en español.
- source_word: יְרֵחוֹ
  english_pob_choice: at Jericho
  chosen_spanish: frente a Jericó
  alternatives_spanish:
  - en Jericó
  - cerca de Jericó
  lexicon: HALOT
  rationale: Jericó funciona aquí como punto de referencia geográfico para ubicar las llanuras de Moab del lado oriental del Jordán. «Frente a Jericó» expresa bien ese referente sin añadir un matiz excesivo de ubicación urbana que no está explícito en el hebreo.
translation_notes:
  revision_awareness: El texto inglés POB y su aparato auditado muestran acuerdo alto y no registran revisiones aplicadas; por eso la versión española sigue de cerca la sintaxis hebrea/narrativa con equivalencia óptima y sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se conserva la fórmula nacional literal «los hijos de Israel» por coherencia con la política de precisión léxica.
  - «Jordán» se mantiene como topónimo geográfico sin glosa en el cuerpo del texto; la nota aclara la relación direccional.
  - «Frente a Jericó» busca una solución española natural para un marcador geográfico, evitando la ampliación innecesaria de la referencia.
