translation:
  language: es
  text: 'Entonces le llegó una carta de parte de Elías el profeta, diciendo: «Así dice Yahvé, el Dios de David, tu padre: Porque no has andado en los caminos de Josafat, tu padre, ni en los caminos de Asa, rey de Judá[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede coordinar esta última frase como «y en los caminos de Asa»; tras una negación, el español suele expresarlo como «ni en los caminos de Asa» para conservar el sentido acumulativo negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֵלָיו מִכְתָּב
  english_pob_choice: Then a letter came to him
  chosen_spanish: Entonces le llegó una carta
  alternatives_spanish:
  - Entonces vino a él una carta
  - Entonces recibió una carta
  lexicon: HALOT
  rationale: El hebreo presenta el verbo singular con מִכְתָּב como sujeto; en español, «le llegó una carta» conserva ese movimiento narrativo con naturalidad. «Recibió una carta» es posible, pero desplaza el foco sintáctico al destinatario.
- source_word: מֵאֵלִיָּהוּ הַנָּבִיא
  english_pob_choice: from Elijah the prophet
  chosen_spanish: de parte de Elías el profeta
  alternatives_spanish:
  - de Elías el profeta
  - de Elías, el profeta
  lexicon: HALOT
  rationale: «De parte de» expresa bien el origen remitente de la carta. Mantiene el sentido relacional del hebreo sin perder claridad en español. El título «el profeta» se conserva como aposición directa.
- source_word: לֵאמֹר כֹּה אָמַר
  english_pob_choice: saying, “Thus says”
  chosen_spanish: 'diciendo: «Así dice»'
  alternatives_spanish:
  - 'diciendo: «Así ha dicho»'
  - 'diciendo: «Esto dice»'
  lexicon: HALOT
  rationale: La fórmula profética se reproduce con la equivalencia natural española «Así dice», que conserva el valor de cita oracular. «Así ha dicho» sería más literal al tiempo verbal hebreo, pero menos idiomático en este género.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el valor de nombre propio del Tetragrámaton con la forma española ya establecida en el proyecto: «Yahvé». Se evita «el SEÑOR» porque enmascara el nombre divino que el texto hebreo usa explícitamente.'
- source_word: אֱלֹהֵי דָּוִיד אָבִיךָ
  english_pob_choice: the God of David your father
  chosen_spanish: el Dios de David, tu padre
  alternatives_spanish:
  - el Dios de tu padre David
  - el Dios de David, tu antepasado
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma natural en español y se conserva la referencia dinástica. La coma ayuda a leer «tu padre» como aposición al nombre, no como otra persona distinta.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: En este contexto causal, «Porque» comunica de manera directa la base de la reprensión/juicio que se desarrolla en el discurso posterior. «Puesto que» y «ya que» también serían válidos, pero menos sobrios aquí.
- source_word: לֹא הָלַכְתָּ בְּדַרְכֵי
  english_pob_choice: you have not walked in the ways of
  chosen_spanish: no has andado en los caminos de
  alternatives_spanish:
  - no has seguido los caminos de
  - no has vivido conforme a los caminos de
  lexicon: HALOT
  rationale: «Andar en los caminos de» preserva el modismo hebreo de conducta y continuidad moral. Se mantiene el perfecto compuesto para el estado persistente hasta el presente narrativo.
- source_word: יְהוֹשָׁפָט אָבִיךָ
  english_pob_choice: Jehoshaphat your father
  chosen_spanish: Josafat, tu padre
  alternatives_spanish:
  - tu padre Josafat
  - Josafat, tu antepasado
  lexicon: HALOT
  rationale: Se conserva el nombre propio con la forma española habitual «Josafat». La coma reproduce el valor aposicional de «tu padre».
- source_word: וּבְדַרְכֵי אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: or in the ways of Asa king of Judah
  chosen_spanish: ni en los caminos de Asa, rey de Judá
  alternatives_spanish:
  - o en los caminos de Asa, rey de Judá
  - ni en los caminos de Asa, el rey de Judá
  lexicon: HALOT
  rationale: Aunque el hebreo usa una conjunción coordinante, el español con negación previa exige naturalmente «ni» para reflejar la serie negativa sin alterar el sentido. «Rey de Judá» se mantiene literal y claro.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino, como pide la política del proyecto y como permite el texto hebreo. «Yahvé» es la forma estándar en español para este registro; «el SEÑOR» ocultaría el nombre explícito del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Conjunción negativa en la lista de conductas
  english_pob_reading: or in the ways of Asa king of Judah
  chosen_spanish_reading: ni en los caminos de Asa, rey de Judá
  alternative_spanish_readings:
  - o en los caminos de Asa, rey de Judá
  - y en los caminos de Asa, rey de Judá
  rationale: El hebreo coordina dos miembros bajo negación; en español, «ni» expresa mejor la relación negativa acumulativa. Esto no cambia el contenido, sino que adapta la sintaxis a una equivalencia natural.
  doctrine_reference: Spanish syntax / negative coordination
- issue: Fórmula profética de introducción al discurso
  english_pob_reading: Thus says
  chosen_spanish_reading: Así dice
  alternative_spanish_readings:
  - Así ha dicho
  - Esto dice
  rationale: La fórmula mantiene el tono solemne del mensajero profético sin introducir un giro exegético adicional. «Así dice» es la mejor correspondencia natural para este género en español.
  doctrine_reference: Prophetic discourse convention
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo el valor sintáctico del sujeto «carta», la fórmula profética «Así dice», el nombre divino como «Yahvé» y la coordinación negativa adaptada a «ni» por exigencia natural del español. No se detectaron cambios relevantes en las revisiones más recientes del registro fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el modismo hebreo «andar en los caminos de» por su fuerza ética y literalidad controlada.
  - 'Los nombres propios se presentan en formas españolas habituales: Elías, Josafat, Asa, Judá.'
  - La puntuación respeta la apertura de cita directa y la aposición con comas para claridad lectora.
