translation:
  language: es
  text: 'Entonces el rey David entró y se sentó delante de Yahvé, y dijo[a]: «¿Quién soy yo, Señor Yahvé, y cuál es mi casa, que me hayas traído hasta aquí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi familia»; aquí «casa» probablemente incluye el hogar, la familia y el linaje en formación de David, en eco del uso repetido de «casa» en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - fue hacia adentro
  - ingresó
  lexicon: HALOT
  rationale: El hebreo narra un movimiento concreto hacia el lugar de presencia divina. «Entró» comunica ese desplazamiento con naturalidad en español y conserva la concreción del verbo sin añadir información.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David, el rey
  lexicon: HALOT
  rationale: En español, la secuencia más natural y fiel es «el rey David», manteniendo título y nombre unidos como en el original y en la lectura inglesa auditada.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - permaneció sentado
  - se quedó sentado
  lexicon: HALOT
  rationale: El contexto inmediato de entrada y habla favorece el sentido físico de sentarse. «Se sentó» es directo y no fuerza un sentido de permanencia o habitar que aquí no domina.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh / before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'La preposición לִפְנֵי expresa posición relacional frente a alguien. «Delante de» mantiene esa imagen espacial y respeta el nombre divino según el estándar del proyecto: Yahvé.'
- source_word: מִי אָנֹכִי
  english_pob_choice: Who am I
  chosen_spanish: ¿Quién soy yo?
  alternatives_spanish:
  - ¿Qué soy yo?
  lexicon: HALOT
  rationale: La fórmula de humildad en español se expresa de modo natural con «¿Quién soy yo?». «Qué soy yo» sería menos personal y menos exacto al valor retórico del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - mi Señor Yahvé
  - Señor DIOS
  lexicon: HALOT
  rationale: El hebreo combina un título de soberanía con el nombre divino. En español, «Señor Yahvé» transmite esa combinación sin recurrir a la convención inglesa «Lord GOD» ni a una máscara tipográfica que el proyecto evita.
- source_word: וּמִי בֵיתִי
  english_pob_choice: and what is my house
  chosen_spanish: y cuál es mi casa
  alternatives_spanish:
  - y qué es mi casa
  - y cuál es mi familia/hogar
  lexicon: HALOT
  rationale: «Casa» debe conservarse por la carga literaria y teológica de 2 Samuel 7. «Cuál es mi casa» suena idiomático en español y deja abierto el alcance de casa como linaje/linaje doméstico.
- source_word: בֵיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa/mi familia
  - mi casa/mi linaje
  - mi hogar
  lexicon: HALOT
  rationale: «Casa» preserva el juego temático central del capítulo entre la casa que David desea construir para Dios y la casa que Dios promete a David. En español, el término puede abarcar hogar, familia y dinastía sin perder la metáfora.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: 'Aquí la partícula introduce la finalidad o el resultado admirativo de la pregunta: «para que me hayas traído...». Esta elección expresa con mayor claridad la relación lógica implícita en el hebreo y evita una subordinada menos natural.'
- source_word: הֲבִיאֹתַנִי
  english_pob_choice: you have brought me
  chosen_spanish: me hayas traído
  alternatives_spanish:
  - me has traído
  - me condujeras
  lexicon: HALOT
  rationale: El verbo causativo de בוא se expresa bien con «traer». El subjuntivo perfecto en español encaja con la construcción interrogativa admirativa y con la relación de propósito/resultado.
- source_word: עַד הֲלֹם
  english_pob_choice: this far
  chosen_spanish: hasta aquí
  alternatives_spanish:
  - hasta este punto
  - hasta ahora
  lexicon: HALOT
  rationale: La expresión señala la extensión alcanzada hasta el presente. «Hasta aquí» es breve, idiomática y fiel al valor espacial-temporal del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para YHWH: «Yahvé». Esto preserva el nombre covenantal en el texto principal y evita la convención de sustitución por mayúsculas, manteniendo transparencia frente al original hebreo.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Meaning of David's self-reference to 'my house'
  english_pob_reading: Retain 'my house' in the main text with dynastic/household overtones
  chosen_spanish_reading: Conservar «mi casa» en el texto principal con el trasfondo de casa/casa dinástica
  alternative_spanish_readings:
  - mi familia
  - mi hogar
  - mi linaje
  - mi dinastía
  rationale: En 2 Samuel 7, «casa» es un término clave que enlaza el deseo de David de construir una casa para Dios con la promesa divina de hacerle una casa a David. Mantener «casa» conserva el juego literario y la amplitud semántica sin cerrar prematuramente el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura aprobada en inglés y no introduce revisiones textuales nuevas; conserva la tensión léxica de בֵיתִי («casa») con nota explicativa, y adopta el nombre divino Yahvé según la norma del proyecto en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - Se conserva «casa» en lugar de «familia» o «dinastía» para preservar el motivo literario del capítulo.
  - «Señor Yahvé» refleja el hebreo אֲדֹנָי יְהוִה sin recurrir a fórmulas eclesiásticas que oculten la estructura del original.
  - El tono es reverente y contemporáneo, adecuado para lectura bíblica pública en español neutral.
