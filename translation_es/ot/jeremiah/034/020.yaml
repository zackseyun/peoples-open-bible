translation:
  language: es
  text: Los entregaré en manos de sus enemigos y en manos de los que buscan su vida[a], y sus cadáveres[b] llegarán a ser comida para las aves del cielo[c] y para las bestias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que buscan sus vidas', es decir, los que buscan matarlos.
    reason: lexical_alternative
  - marker: b
    text: O 'sus cuerpos sin vida' o 'sus carroñas'.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'aves del cielo'; algunas versiones en español dicen 'aves del aire'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y los entregaré
  alternatives_spanish:
  - Y los daré
  - Y los pondré en manos de
  lexicon: HALOT
  rationale: En español, ‘entregar’ comunica bien el idiomatismo hebreo de poner a alguien bajo el poder de otro. Conserva la idea de transferencia de control que el POB inglés expresa con ‘give into the hand of’.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en las manos de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; ‘en mano de’ preserva la imagen concreta y es una fórmula natural en español bíblico sin ocultar el matiz de dominio o control.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  lexicon: HALOT
  rationale: Equivalencia directa y clara para אויבים; no requiere ajuste contextual.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: those who seek their life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que buscan quitársela
  - los que buscan matarlos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo ‘buscar la vida’, que en español bíblico se entiende como buscar la muerte de alguien. Esta opción mantiene la tensión léxica documentada por el POB inglés y evita volverlo demasiado explicativo.
- source_word: נִבְלָתָם
  english_pob_choice: their dead bodies
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos muertos
  - sus cuerpos sin vida
  lexicon: HALOT
  rationale: Para referir a personas muertas, ‘cadáveres’ es un equivalente natural y preciso. Mantiene el tono de juicio y vergüenza del hebreo sin el matiz algo zoológico de ‘carcasses’.
- source_word: לְמַאֲכָל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  lexicon: HALOT
  rationale: En esta construcción, ‘comida’ funciona de manera natural en español y reproduce la idea de ser presa de consumo para animales.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: for the birds of the sky
  chosen_spanish: para las aves del cielo
  alternatives_spanish:
  - para los pájaros del cielo
  - para las aves del aire
  lexicon: HALOT
  rationale: ‘Aves del cielo’ sigue el hebreo con claridad y mantiene el registro solemne. ‘Aves’ es preferible a ‘pájaros’ en este contexto profético y judicial.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: and for the beasts of the earth
  chosen_spanish: y para las bestias de la tierra
  alternatives_spanish:
  - y para los animales de la tierra
  - y para las bestias del campo
  lexicon: HALOT
  rationale: ‘Bestias de la tierra’ preserva el paralelismo con la frase anterior y el tono de juicio. ‘Animales’ sería más general, pero menos solemne y menos cercano a la formulación hebrea.
theological_decisions:
- issue: Imagen de juicio con cadáveres expuestos a aves y bestias
  english_pob_reading: Retain the concrete covenant-curse imagery without softening
  chosen_spanish_reading: Conservar la imagen concreta de juicio del pacto, sin suavizarla
  alternative_spanish_readings:
  - Parafrasear como una simple derrota y muerte a manos de los enemigos
  - Suavizar la imagen omitendo el destino de los cadáveres
  rationale: El versículo no solo anuncia muerte, sino deshonra postmortem y exposición a animales, imagen de maldición del pacto. La traducción mantiene esa crudeza porque está fuertemente respaldada por el hebreo y por la decisión auditada del POB inglés.
  doctrine_reference: Deuteronomio 28:26; Jeremías 7:33
translation_notes:
  revision_awareness: El registro inglés más reciente no introdujo cambios respecto del texto auditado; la presente versión española sigue esa lectura estable, conservando el idiomatismo ‘buscar su vida’ y la imagen de juicio con cadáveres expuestos a aves y bestias.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ fuera de este versículo porque el hebreo no lo contiene.
  - ‘Bestias’ y ‘aves’ se usan para preservar el paralelismo y el tono profético.
  - ‘Entregar en mano de’ traduce el idiomatismo hebreo sin eliminar su concreción.
