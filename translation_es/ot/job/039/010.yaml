translation:
  language: es
  text: ¿Atarás al uro[a] en el surco con su cuerda, o rastrillará[b] los valles detrás de ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Uro» traduce aquí el hebreo רֵים, un bovino salvaje poderoso. El POB inglés descartó «unicornio» por no corresponder al hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «¿arará los valles detrás de ti?». El verbo hebreo puede referirse más específicamente a labrar el suelo con una labor de rastrillo o allanado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִקְשָׁר
  english_pob_choice: Will you bind
  chosen_spanish: ¿Atarás
  alternatives_spanish:
  - ¿Amarrarás
  - ¿Sujetarás
  lexicon: HALOT
  rationale: El hebreo expresa la idea de atar o sujetar; en español, «atar» es natural y conserva el tono retórico de la pregunta. «Amarrar» y «sujetar» son posibles, pero «atar» es más directo para el cuadro agrícola y de sometimiento.
- source_word: רֵים
  english_pob_choice: the wild ox
  chosen_spanish: el uro
  alternatives_spanish:
  - el buey salvaje
  - el toro salvaje
  - el aurochs
  lexicon: HALOT
  rationale: Rֵים designa un bovino salvaje fuerte, no un «unicornio». «Uro» es una opción precisa y elevada en español para ese animal salvaje; «buey salvaje» es más explicativo pero menos específico, y «toro salvaje» puede sonar demasiado moderno o impreciso.
- source_word: בְּתֶלֶם
  english_pob_choice: in the furrow
  chosen_spanish: en el surco
  alternatives_spanish:
  - en el arado
  - junto al surco
  lexicon: HALOT
  rationale: תלם es el surco abierto para labranza. «Surco» es el equivalente natural en español y mantiene la imagen agrícola de trabajo del suelo.
- source_word: עֲבֹתוֹ
  english_pob_choice: its rope
  chosen_spanish: su cuerda
  alternatives_spanish:
  - su soga
  - su cordón
  - su lazo
  lexicon: HALOT
  rationale: עבות es una cuerda o soga de atadura. «Cuerda» conserva la concreción del objeto y funciona bien en español; «soga» es viable pero más regional, y «cordón» suena demasiado débil.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - si
  lexicon: HALOT
  rationale: En la pregunta retórica, אִם introduce la segunda alternativa; «o» reproduce mejor la estructura paralela que «si».
- source_word: יְשַׂדֵּד
  english_pob_choice: will it harrow
  chosen_spanish: arará
  alternatives_spanish:
  - rastrillará
  - desmenuzará la tierra
  - allanará
  lexicon: HALOT
  rationale: Aunque el inglés POB distingue una labor parecida al harreo, en español «arar» comunica mejor la labor agrícola básica y mantiene la fuerza de la imagen; «rastrillar» o «desmenuzar la tierra» serían más técnicos pero menos naturales en este contexto poético.
- source_word: עֲמָקִים
  english_pob_choice: the valleys
  chosen_spanish: los valles
  alternatives_spanish:
  - las hondonadas
  - las honduras
  lexicon: HALOT
  rationale: עֲמָקִים significa valles o lugares bajos. «Valles» es el equivalente más claro y estándar en español.
- source_word: אַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - tras de ti
  - siguiéndote
  lexicon: HALOT
  rationale: La frase indica seguir al labrador en el trabajo; «detrás de ti» es idiomático y mantiene la imagen concreta.
translation_notes:
  revision_awareness: Se mantuvo el sentido y la estructura del audit trail inglés del POB, ajustando al español natural sin perder la imagen agrícola ni la tensión léxica del hebreo רֵים y del verbo agrícola יְשַׂדֵּד. No se detectaron revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se usó «uro» para רֵים en coherencia con la nota lexical y para evitar la lectura tradicional errónea de «unicornio».
  - Se eligió «surco» para תלם y «cuerda» para עֲבֹתוֹ, conservando el cuadro de labranza.
  - Se tradujo אִם como «o» por tratarse de una alternativa retórica, no de una condicional simple.
  - Se prefirió «arar» frente a una traducción demasiado técnica para dar fluidez en español, sin negar la referencia agrícola del verbo.
