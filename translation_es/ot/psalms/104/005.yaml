review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y conserva la imaginería arquitectónica de יָסַד ... עַל מְכוֹנֶיהָ. «Fundó la tierra sobre sus cimientos» corresponde fielmente al sentido. Sin embargo, la cláusula final no reproduce bien עוֹלָם וָעֶד: «jamás y para siempre» mezcla negación enfática con duración positiva y suena semántica y estilísticamente impropia en español. La idea es duración intensificada, mejor expresada como «por siempre y para siempre» o similar.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «no será sacudida jamás y para siempre» resulta poco idiomático y torpe. Además, «será sacudida» es posible, aunque «será conmovida» o «será movida» serían más tradicionales; aun así, «será sacudida» puede mantenerse por cercanía al inglés POB y claridad. El ajuste principal es hacer natural la expresión de duración.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «la tierra», «fundó» y «cimientos» están bien elegidos. La nota léxica con «bases» preserva adecuadamente la alternativa documentada en inglés.
  issues:
  - severity: medium
    issue: La expresión «jamás y para siempre» no representa bien עוֹלָם וָעֶד.
    rationale: El hebreo intensifica duración ('forever and ever'), no combina una negación adverbial como «jamás» con «para siempre». En español produce una frase extraña y menos fiel al valor de la expresión hebrea.
  revised_spanish_text: Él fundó la tierra sobre sus cimientos[a]; no será sacudida por siempre y para siempre.
  revised_footnotes:
  - marker: a
    text: O «estableció la tierra sobre sus bases»; el hebreo usa una imagen arquitectónica para la estabilidad del mundo.
    reason: lexical_alternative
