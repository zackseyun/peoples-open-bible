translation:
  language: es
  text: y su quebrantamiento es como el quebrantamiento de una vasija de alfarero, hecha pedazos sin piedad, de manera que entre sus fragmentos no se halla ni un tiesto[a] con el cual tomar fuego del hogar[b] o sacar agua de una cisterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pedazo de barro'. 'Tiesto' conserva el sentido de un fragmento de cerámica roto y es un equivalente español natural.
    reason: lexical_alternative
  - marker: b
    text: O 'del lugar de fuego'. El hebreo dice literalmente 'del lugar de fuego' o 'del sitio encendido'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁבָרָהּ
  english_pob_choice: and its breaking
  chosen_spanish: y su quebrantamiento
  alternatives_spanish:
  - y su ruptura
  - y su quebradura
  lexicon: HALOT
  rationale: El hebreo funciona de modo nominal/verbal para expresar el acto o estado de quebrarse, con sufijo de 3ª femenil; 'quebrantamiento' conserva el sustantivo de acción y el enlace con la imagen siguiente.
- source_word: כְּשֵׁבֶר
  english_pob_choice: like the breaking of
  chosen_spanish: como el quebrantamiento de
  alternatives_spanish:
  - como la ruptura de
  - como la fractura de
  lexicon: HALOT
  rationale: Mantiene la comparación explícita y repite el campo léxico del primer miembro para conservar la fuerza retórica del hebreo.
- source_word: נֵבֶל יוֹצְרִים
  english_pob_choice: a potter’s jar
  chosen_spanish: una vasija de alfarero
  alternatives_spanish:
  - un jarro de alfarero
  - un cántaro de alfarero
  lexicon: HALOT
  rationale: נֵבֶל es un recipiente de barro; 'vasija' es amplio y natural en español, y 'de alfarero' comunica que es hecha por el alfarero sin forzar una forma más específica de la que el hebreo exige.
- source_word: כָּתוּת
  english_pob_choice: smashed
  chosen_spanish: hecha pedazos
  alternatives_spanish:
  - aplastada
  - destrozada
  lexicon: HALOT
  rationale: La expresión española comunica la violencia del daño de forma idiomática y clara, sin exagerar con un término más interpretativo que el hebreo.
- source_word: לֹא יַחְמֹל
  english_pob_choice: without pity
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin compasión
  - sin que se la perdone
  lexicon: HALOT
  rationale: '''Sin piedad'' reproduce bien la idea de no perdonar ni tener compasión y sigue la revisión inglesa más directa de לֹא יַחְמֹל.'
- source_word: בִמְכִתָּתוֹ
  english_pob_choice: among its shattered pieces
  chosen_spanish: entre sus fragmentos
  alternatives_spanish:
  - entre sus pedazos
  - en sus fragmentos
  lexicon: HALOT
  rationale: El sustantivo apunta al estado de troceado; 'fragmentos' es un equivalente sobrio que preserva la imagen de restos aprovechables.
- source_word: חֶרֶשׂ
  english_pob_choice: a shard
  chosen_spanish: ni un tiesto
  alternatives_spanish:
  - ni un pedazo de barro
  - ni un fragmento de vasija
  lexicon: HALOT
  rationale: '''Tiesto'' es un equivalente español tradicional y preciso para un pedazo de vasija rota; conserva el concreto material cerámico mejor que un término demasiado general.'
- source_word: לַחְתּוֹת אֵשׁ מִיָּקוּד
  english_pob_choice: to take fire from the hearth
  chosen_spanish: con el cual tomar fuego del brasero
  alternatives_spanish:
  - con el cual sacar fuego del hogar
  - con el cual recoger brasas del brasero
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tomar fuego del lugar de fuego'; 'brasero' comunica bien el sitio de ascuas o fuego doméstico en español contemporáneo, y mantiene la imagen práctica.
- source_word: וְלַחְשֹׂף מַיִם מִגֶּבֶא
  english_pob_choice: or to scoop water from a cistern
  chosen_spanish: o sacar agua de una cisterna
  alternatives_spanish:
  - o sacar agua de un aljibe
  - o extraer agua de una cisterna
  lexicon: HALOT
  rationale: '''Sacar agua'' refleja la acción funcional del verbo en el contexto de usar un tiesto como utensilio; ''cisterna'' es la correspondencia más directa para גֶּבֶא en este escenario.'
translation_notes:
  revision_awareness: 'La redacción sigue el sentido consolidado del audit trail inglés: se mantuvo la comparación con una vasija de alfarero, la destrucción ''sin piedad'' y la clausura utilitaria con dos acciones paralelas: tomar fuego y sacar agua. Se evitó depender mecánicamente del inglés, pero se preservó la misma estructura resultativa y la nota alternativa para la expresión del lugar del fuego y para חֶרֶשׂ.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió 'vasija de alfarero' y 'tiesto' por fidelidad material al hebreo y coherencia con el registro bíblico en español.
  - '''Cisterna'' se mantuvo por consistencia con la opción inglesa auditada y por ser el término más transparente para גֶּבֶא en este contexto.'
