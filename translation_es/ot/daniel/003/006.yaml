review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del arameo: condición general («Y cualquiera que»), doble acción de postrarse/adorar, castigo pasivo y destino al interior del horno. También preserva la nota del modismo temporal. Sin embargo, «ni rinda culto» debilita la coordinación positiva del original («y adore») después de una sola negación inicial, y «en esa hora» suena menos natural y menos preciso en español bíblico que «en aquella misma hora» o «en aquella hora».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad y fidelidad sintáctica. «Y cualquiera que no se postre y adore[a]» suena más directo y más cercano al original que «no se postre ni rinda culto[a]». También conviene reemplazar «en esa hora» por «en aquella misma hora» en el texto principal para mejor legibilidad, manteniendo la nota explicativa del modismo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Horno de fuego ardiente» es aceptable para אַתּוּן נוּרָא יָקִדְתָּא. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión entre «adore» y «rinda culto» es principalmente de fidelidad y fluidez, no de glosario.
  issues:
  - severity: medium
    issue: La coordinación «ni rinda culto» modifica innecesariamente la estructura del original.
    rationale: 'El arameo tiene una sola negación sobre dos verbos coordinados: «no caiga/postre y adore». En español, «no se postre y adore» preserva mejor esa relación que «ni rinda culto», que introduce una reformulación más interpretativa.'
  - severity: low
    issue: «En esa hora» es posible, pero suena menos natural en español que una forma demostrativa más distante.
    rationale: Para בַּהּ שַׁעֲתָא, «en aquella misma hora» conserva el giro temporal y comunica con más naturalidad el valor idiomático que ya explica la nota.
  revised_spanish_text: Y cualquiera que no se postre y adore[a] será arrojado, en aquella misma hora, en medio de un horno de fuego ardiente.
  revised_footnotes:
  - marker: a
    text: 'Arameo: «en aquella hora», un modismo que significa inmediatamente o al instante.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda acción a «adore» para reflejar con más fidelidad el verbo arameo y la coordinación original, evitando una paráfrasis más libre («rinda culto»). Se mejora la naturalidad de בַּהּ שַׁעֲתָא con «en aquella misma hora», mientras la nota conserva la explicación idiomática. Se mantiene «horno de fuego ardiente» por fidelidad y claridad.
