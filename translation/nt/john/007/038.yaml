id: JHN.7.38
reference: John 7:38
source:
  edition: SBLGNT
  text: ὁ πιστεύων εἰς ἐμέ, καθὼς εἶπεν ἡ γραφή, ποταμοὶ ἐκ τῆς κοιλίας αὐτοῦ ῥεύσουσιν ὕδατος ζῶντος.
translation:
  text: The one who believes in me[a], just as the Scripture has said[b], rivers of living water will flow from his belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from within him'; some understand 'his' to refer to the Messiah rather than to the believer.
    reason: alternative_reading
  - marker: b
    text: Greek 'belly' or 'womb'; here likely a figurative expression for the inner self.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιστεύων
  chosen: The one who believes
  alternatives:
  - Whoever believes
  - The one believing
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring to a person characterized by believing. 'The one who believes' preserves the singular form and ongoing/generic force better than the more idiomatic but less formally aligned 'whoever believes'.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: With πιστεύω, εἰς commonly expresses personal trust directed toward someone. English idiom is 'believes in me'; 'into me' would be overly literal and unnatural.
- source_word: καθὼς εἶπεν ἡ γραφή
  chosen: just as the Scripture said
  alternatives:
  - as the Scripture has said
  - just as Scripture said
  lexicon: BDAG
  rationale: This introduces scriptural warrant. Although the Greek aorist εἶπεν is past, English often uses present perfect here; however, 'said' is a clear and natural rendering that stays close to the form. 'The Scripture' preserves the singular ἡ γραφή, a common Johannine way of referring to Scripture authoritatively.
- source_word: ποταμοὶ
  chosen: rivers
  alternatives:
  - streams
  lexicon: BDAG
  rationale: ποταμοί denotes rivers rather than smaller streams. 'Rivers' preserves the abundance imagery.
- source_word: ἐκ τῆς κοιλίας αὐτοῦ
  chosen: from his inner being
  alternatives:
  - from his belly
  - from his womb
  - from within him
  lexicon: BDAG
  rationale: κοιλία literally means 'belly' or 'womb,' but in this context it idiomatically refers to the inward self as the source from which the living water flows. 'Inner being' communicates the metaphor in natural English without the misleading physicality of 'belly.' The masculine pronoun 'his' reflects the singular masculine form while functioning representatively, in line with the gender-accurate policy.
- source_word: ῥεύσουσιν
  chosen: will flow
  alternatives:
  - will gush forth
  lexicon: BDAG
  rationale: Future active indicative; 'will flow' is the straightforward rendering. 'Gush forth' is possible but adds intensity not explicit in the verb itself.
- source_word: ὕδατος ζῶντος
  chosen: living water
  alternatives:
  - water that gives life
  - running water
  lexicon: BDAG
  rationale: This is a well-established Johannine expression with theological resonance from 4:10-14 and 7:39. 'Living water' preserves both the literal metaphor and its theological depth better than explanatory paraphrases.
