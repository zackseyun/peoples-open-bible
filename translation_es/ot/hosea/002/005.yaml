  text: פֶּן אַפְשִׁיטֶ֣/נָּה עֲרֻמָּ֔ה וְ/הִ֨צַּגְתִּ֔י/הָ כְּ/י֖וֹם הִוָּֽלְדָ֑/הּ וְ/שַׂמְתִּ֣י/הָ כַ/מִּדְבָּ֗ר וְ/שַׁתִּ֨/הָ֙ כְּ/אֶ֣רֶץ צִיָּ֔ה וַ/הֲמִתִּ֖י/הָ בַּ/צָּמָֽא־׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/002/005.yaml
  text: or else I will strip her naked and set her forth as on the day she was born[a], and make her like the wilderness, and make her like a parched land[b], and put her to death with thirst.
  footnotes:
  - marker: a
    text: Or 'lest I strip her naked.' The Hebrew particle can be rendered more formally as 'lest,' introducing the threatened consequence.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''kill her with thirst.'' The Hebrew is more literally causative: ''cause her to die by thirst.'''
    reason: lexical_alternative
