  text: וַ/יֻּכּ֗וּ שֹֽׁטְרֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר שָׂ֣מוּ עֲלֵ/הֶ֔ם נֹגְשֵׂ֥י פַרְעֹ֖ה לֵ/אמֹ֑ר מַדּ֡וּעַ לֹא֩ כִלִּיתֶ֨ם חָקְ/כֶ֤ם לִ/לְבֹּן֙ כִּ/תְמ֣וֹל שִׁלְשֹׁ֔ם גַּם תְּמ֖וֹל גַּם הַ/יּֽוֹם־־־׃
