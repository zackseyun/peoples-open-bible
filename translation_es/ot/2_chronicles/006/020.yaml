- from: para que tus ojos estén abiertos hacia esta casa día y noche[a], hacia el lugar del cual dijiste que pondrías tu nombre[b] allí, para escuchar la oración que tu siervo ora hacia este lugar.
  to: para que tus ojos estén abiertos hacia esta casa día y noche[a], hacia el lugar donde dijiste que pondrías tu nombre[b], para oír la oración que tu siervo ora hacia este lugar.
  rationale: Se ajusta la relativa locativa a un español natural y fiel («donde»), se elimina la redundancia dura de «allí» dentro de la cláusula de «poner tu nombre», y se mejora el idiomatismo bíblico con «oír la oración». No se alteran las decisiones teológicas y léxicas centrales del audit trail.
