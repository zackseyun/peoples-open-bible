translation:
  language: es
  text: Porque Mardoqueo el judío era segundo[a] al rey Asuero, grande entre los judíos, y favorecido por la multitud[b] de sus hermanos[c], buscando el bien para su pueblo y hablando paz a toda su descendencia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «segundo solo después del rey Asuero»; el hebreo indica rango de segundo lugar, pero no desarrolla el cargo con precisión administrativa.
    reason: lexical_alternative
  - marker: b
    text: O «la mayoría»; la expresión hebrea puede indicar una multitud o una mayoría de sus hermanos.
    reason: lexical_alternative
  - marker: c
    text: Aquí «sus hermanos» probablemente significa sus compañeros judíos o parientes, no solo hermanos varones literales.
    reason: lexical_alternative
  - marker: d
    text: O «a todos sus descendientes». «Descendencia» traduce un término colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la prominencia de Mardoqueo; «Porque» conserva la fuerza causal/explanatoria del hebreo con español natural.
- source_word: הַיְּהוּדִי
  english_pob_choice: the Jew
  chosen_spanish: el judío
  alternatives_spanish:
  - el judeano
  lexicon: HALOT
  rationale: En Ester, el término señala la identidad étnico-religiosa de Mardoqueo dentro del contexto persa; «el judío» es claro y fiel.
- source_word: מִשְׁנֶה לַמֶּלֶךְ
  english_pob_choice: second to King Ahasuerus
  chosen_spanish: segundo después del rey Asuero
  alternatives_spanish:
  - segundo solo después del rey Asuero
  - el visir del rey Asuero
  lexicon: HALOT
  rationale: La frase expresa rango de segundo lugar frente al rey. «Segundo después de» comunica la relación jerárquica sin introducir un cargo no explicitado en el hebreo.
- source_word: וְגָדוֹל לַיְּהוּדִים
  english_pob_choice: great among the Jews
  chosen_spanish: grande entre los judíos
  alternatives_spanish:
  - prominente entre los judíos
  - importante entre los judíos
  lexicon: HALOT
  rationale: «Grande entre» refleja la dignidad o prominencia social de Mardoqueo en forma cercana al original.
- source_word: וְרָצוּי
  english_pob_choice: favored
  chosen_spanish: favorecido
  alternatives_spanish:
  - aceptado
  - estimado
  lexicon: HALOT
  rationale: El participio comunica ser recibido con aprobación; «favorecido» es natural en español y mantiene el sentido de aceptación general.
- source_word: לְרֹב אֶחָיו
  english_pob_choice: by the multitude of his brothers
  chosen_spanish: por la multitud de sus hermanos
  alternatives_spanish:
  - por la mayoría de sus hermanos
  - por muchos de sus hermanos
  lexicon: HALOT
  rationale: רֹב puede significar multitud o mayoría; «multitud» conserva la amplitud cuantitativa sin forzar un porcentaje exacto. «Hermanos» se mantiene por fidelidad léxica, con sentido colectivo.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: Literalmente «sus hermanos»; en contexto se refiere a sus correligionarios/judíos, pero el texto conserva la imagen de parentesco amplia.
- source_word: דֹּרֵשׁ טוֹב
  english_pob_choice: seeking good
  chosen_spanish: buscando el bien
  alternatives_spanish:
  - procurando el bien
  - buscando el favor
  lexicon: HALOT
  rationale: El participio expresa una acción activa de procurar beneficio; «buscando el bien» es claro y cercano al hebreo.
- source_word: לְעַמּוֹ
  english_pob_choice: for his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - para su pueblo
  - por su pueblo
  lexicon: HALOT
  rationale: La relación benefactora se expresa de manera natural con «de su pueblo» en español, manteniendo la referencia a los judíos.
- source_word: וְדֹבֵר שָׁלוֹם
  english_pob_choice: speaking peace
  chosen_spanish: hablando paz
  alternatives_spanish:
  - hablando de paz
  - proclamando paz
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática; «hablando paz» preserva el paralelismo y la amplitud de שָׁלוֹם sin reducirlo a un solo matiz.
- source_word: לְכָל זַרְעוֹ
  english_pob_choice: to all his offspring
  chosen_spanish: a toda su descendencia
  alternatives_spanish:
  - a toda su simiente
  - a todos sus descendientes
  lexicon: HALOT
  rationale: זֶרַע es colectivo; «descendencia» comunica bien el sentido genealógico en español moderno y evita la opacidad de «simiente».
theological_decisions:
- issue: Sentido de אֶחָיו en contexto
  english_pob_reading: '''His brothers'' here likely means his fellow Jews or kinsmen, not only literal male siblings.'
  chosen_spanish_reading: «sus hermanos» mantiene la literalidad, con sentido colectivo implícito de sus correligionarios/judíos.
  alternative_spanish_readings:
  - sus compatriotas
  - sus parientes
  rationale: El hebreo usa el término de parentesco de manera amplia; conservar «hermanos» respeta la imagen textual y la nota puede aclarar el alcance comunitario sin borrar la tensión semántica.
  doctrine_reference: uso colectivo del lenguaje de parentesco en el AT
- issue: Alcance de זַרְעוֹ
  english_pob_reading: Or 'to all his descendants.' The Hebrew 'offspring/seed' is a collective term.
  chosen_spanish_reading: «toda su descendencia» refleja el valor colectivo de זֶרַע.
  alternative_spanish_readings:
  - toda su simiente
  - todos sus descendientes
  rationale: Se conserva el sentido colectivo-genealógico sin adoptar un arcaísmo innecesario; la formulación sigue siendo suficientemente abierta para incluir la dimensión corporativa del término.
  doctrine_reference: lenguaje colectivo de descendencia en la Escritura
- issue: שָׁלוֹם como paz/ bienestar
  english_pob_reading: speaking peace
  chosen_spanish_reading: «hablando paz» preserva el paralelismo hebreo y el campo semántico amplio de שָׁלוֹם.
  alternative_spanish_readings:
  - hablando de paz
  - hablando bienestar
  rationale: No se reduce שָׁלוֹם a paz política solamente; la traducción conserva su amplitud de paz, bienestar y plenitud.
  doctrine_reference: campo semántico de שָׁלוֹם
translation_notes:
  revision_awareness: La redacción sigue el alto acuerdo del auditorio inglés sin cambios sustanciales; se mantuvo la fuerza relacional de מִשְׁנֶה לַמֶּלֶךְ, la ambigüedad cuantitativa de לְרֹב, y el valor colectivo de אֶחָיו y זַרְעוֹ, añadiendo notas en español donde la equivalencia requiere aclaración.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «Asuero» como forma española convencional del nombre propio persa.
  - «Judío» se usa como identidad del grupo en coherencia con Ester.
  - «Descendencia» se prefirió a «simiente» por claridad moderna sin perder el sentido colectivo.
