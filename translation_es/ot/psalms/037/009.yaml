revisions:
- from: Porque los malhechores serán talados[a], pero los que esperan en Yahvé—ellos heredarán la tierra.
  to: Porque los malhechores serán eliminados, pero los que esperan en Yahvé —ellos heredarán la tierra[a].
  rationale: Se reemplaza «serán talados» por «serán eliminados» para evitar una imagen arbórea impropia y acercarse mejor al sentido de «ser cortados» en contexto judicial. Se conserva «Yahvé», «esperan en», el pronombre enfático y «heredarán». Se mantiene «la tierra» como opción idiomática, pero la nota se corrige para reflejar mejor que el hebreo puede referirse a tierra/país en un marco de herencia pactual, en línea con el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: relación causal con כִּי, contraste entre los malvados y los que esperan en Yahvé, preservación del nombre divino y del énfasis pronominal, y uso de «heredarán». Sin embargo, «serán talados» no corresponde fielmente al valor de יִכָּרֵתוּן en este contexto humano/judicial; suena arbóreo y desvía la imagen de «ser cortados/eliminados». Además, el POB inglés documenta como lectura principal «the land», con «the earth» como alternativa, mientras que el español principal usa «la tierra», lo que desplaza el balance semántico hacia la alternativa.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «serán talados» resulta poco natural para personas y demasiado literal en una dirección equivocada. «Los que esperan en Yahvé» es comprensible y bíblico. Conviene también ajustar la puntuación del inciso enfático con raya española. Para mayor fidelidad al audit trail y mejor legibilidad, «serán eliminados» o «serán cortados» y «la tierra[a]» no son ideales; mejor «la tierra/país» en nota y principal «la tierra» si se prioriza idiomaticidad, pero aquí el registro documentado favorece «la tierra/país» como nota y principal «la tierra» no tanto. La mejor reparación es «la tierra[a]» solo si la nota deja claro que la lectura principal preferida por contexto es «la tierra/país»; aún mejor en el texto principal: «la tierra» no iguala del todo «the land».'
  glossary_alignment: Alineación correcta con «Yahvé» para יְהוָה. No hay conflicto con otras directrices terminológicas. La principal desalineación con el rastro léxico del POB está en יִכָּרֵתוּן («will be cut off») y, en menor grado, en אָרֶץ, donde el inglés privilegia sentido de tierra/país heredado más que «earth».
  issues:
  - severity: high
    issue: «serán talados» para יִכָּרֵתוּן
    rationale: כרת en nifal aquí significa «ser cortados/eliminados» en sentido judicial o de remoción. «Talados» se usa sobre todo para árboles y en español aplicado a personas suena impropio y cambia la imaginería.
  - severity: medium
    issue: La nota y el texto principal sobre אָרֶץ no reflejan bien la preferencia auditada por «the land»
    rationale: El POB inglés hace principal «the land» y deja «the earth» en nota. El español pone principal «la tierra», que tiende a sonar como «earth». Debe orientarse la nota para conservar mejor el matiz de tierra/país heredado sin perder la alternativa más amplia.
  - severity: low
    issue: Uso de raya sin espaciado plenamente hispano
    rationale: 'En español suele escribirse el inciso enfático con raya: «Yahvé —ellos heredarán…» para mayor naturalidad tipográfica.'
