review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo base y conserva correctamente las dos variantes griegas en notas. Sin embargo, los marcadores de notas están invertidos respecto del texto inglés auditado: la nota [a] corresponde a ‘tu lecho’, no a ‘tu honor’; y la nota [b] corresponde a la cláusula final, no a ‘tu lecho’. Además, ‘estrado’ no refleja bien משכבך, que aquí es cama/lecho/couch, no un estrado o plataforma.'
  spanish_quality_summary: El español es generalmente claro y digno. ‘Lecho’ funciona bien para יצועיך. Pero ‘estrado’ suena incorrecto o engañoso en español bíblico general; ‘lecho’ o ‘cama’ serían más fieles. Para evitar repetición excesiva y seguir la lógica del inglés POB, ‘lecho’ y luego ‘cama’ funciona mejor que ‘estrado’.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas centrales (‘honor’, ‘profanaste’, ‘ira’, ‘descendencia’) son adecuadas. La corrección necesaria es semántica y de anclaje de notas, no de glosario doctrinal.
  issues:
  - severity: high
    issue: Marcadores de notas mal anclados
    rationale: La nota [a] explica la variante griega de ‘profanaste tu descendencia’ frente a ‘tu lecho’, así que debe ir anclada en ‘tu lecho’, no en ‘tu honor’. La nota [b] explica la variante de la cláusula final, así que debe anclarse allí.
  - severity: medium
    issue: ‘Estrado’ no traduce bien משכבך
    rationale: משכבך significa lugar de acostarse, cama o lecho. ‘Estrado’ en español suele referirse a una tarima o plataforma, y distorsiona la imagen del hebreo.
  revised_spanish_text: Tú pusiste una mancha en tu honor, y profanaste tu lecho[a], trayendo ira sobre tu descendencia y gemido sobre tu cama[b].
  revised_footnotes:
  - marker: a
    text: 'El griego dice: “y profanaste tu descendencia” en lugar de “y profanaste tu lecho”.'
    reason: textual_variant
  - marker: b
    text: 'El griego termina: “y angustia por tu necedad”, en vez de “y gemido sobre tu cama”.'
    reason: textual_variant
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las variantes textuales documentadas en el inglés POB. También se sustituyó ‘estrado’ por ‘cama’, que refleja con fidelidad משכבך en español natural y mantiene la distinción con ‘lecho’ en la cláusula anterior.
