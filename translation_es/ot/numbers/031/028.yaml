revisions:
- from: 'Y establecerás una contribución para Yahvé[a] de parte de los hombres de guerra que salieron a la batalla: una de cada quinientas, de las personas[b], del ganado, de los asnos y del rebaño.'
  to: 'Y cobrarás un tributo para Yahvé[a] de los hombres de guerra que salieron a la batalla: una de cada quinientas, de las personas[b], del ganado, de los asnos y del rebaño.'
  rationale: Se ajusta el verbo principal para reflejar mejor la idea de extraer una porción tasada del botín, y se corrige la preposición para expresar que el tributo se toma de los hombres de guerra. También se mejora la nota sobre הָאָדָם para aclarar el contraste humano/animal presente en el hebreo. No se requiere cambio en 'Yahvé' ni en 'una de cada quinientas'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: una porción tasada para Yahvé tomada de los hombres de guerra que salieron a campaña, en proporción de uno por cada quinientos, aplicada a humanos y animales del botín. Sin embargo, ''establecerás una contribución'' no expresa bien la acción de extraer o imponer una porción de entre el botín; el hebreo וַהֲרֵמֹתָ + מֶכֶס se acerca más a ''impondrás/cobrarás/apartarás un tributo''. También ''de parte de'' debilita el sentido de extracción ''de entre / de los''.'
  spanish_quality_summary: 'El español es claro y bastante natural, pero dos giros suenan menos idiomáticos o menos precisos que lo deseable: ''establecerás una contribución'' y ''de parte de los hombres de guerra''. Además, conviene simplificar la nota [b], que actualmente repite casi tautológicamente ''de las personas'' sin aportar la alternativa hebrea relevante. El resto —''Yahvé'', ''a la batalla'', ''una de cada quinientas'', ''ganado'', ''asnos'', ''rebaño''— funciona bien en un registro bíblico moderno y digno.'
  glossary_alignment: Alinea bien con la política del proyecto al usar 'Yahvé'. No hay términos doctrinales conflictivos aparte del nombre divino. La decisión de no forzar 'alma/vida' para נֶפֶשׁ en la proporción es coherente con la revisión inglesa. La principal mejora léxica es preferir 'tributo' o una formulación verbal equivalente para מֶכֶס y el hiphil de רום en este contexto.
  issues:
  - severity: medium
    issue: '''establecerás una contribución'' no traduce con suficiente precisión וַהֲרֵמֹתָ מֶכֶס'
    rationale: El hebreo describe levantar/apartar/cobrar una porción tasada del botín, no meramente instituir una contribución en abstracto. 'Impondrás un tributo' o 'apartarás un tributo' comunica mejor la acción concreta.
  - severity: medium
    issue: '''de parte de los hombres de guerra'' atenúa el sentido de extracción de entre ellos'
    rationale: מֵאֵת indica la fuente desde la cual se toma la porción. En español bíblico-natural, 'de los hombres de guerra' o 'de entre los hombres de guerra' es más fiel que 'de parte de'.
  - severity: low
    issue: La nota [b] es débil y poco informativa
    rationale: No aclara que הָאָדָם aquí se refiere a la parte humana del botín en contraste con las categorías animales. Conviene explicarlo de forma más directa.
  revised_spanish_text: 'Y cobrarás un tributo para Yahvé[a] de los hombres de guerra que salieron a la batalla: una de cada quinientas, de las personas[b], del ganado, de los asnos y del rebaño.'
  revised_footnotes:
  - marker: a
    text: El hebreo usa aquí el nombre divino יהוה; se vierte como Yahvé conforme al criterio del proyecto.
    reason: source_note
  - marker: b
    text: 'Hebreo: «del ser humano» o «de la parte humana». Aquí contrasta la porción humana del botín con los animales enumerados después.'
    reason: cultural_note
  revision_rationale: Se ajusta el verbo principal para reflejar mejor la idea de extraer una porción tasada del botín, y se corrige la preposición para expresar que el tributo se toma de los hombres de guerra. También se mejora la nota sobre הָאָדָם para aclarar el contraste humano/animal presente en el hebreo. No se requiere cambio en 'Yahvé' ni en 'una de cada quinientas'.
