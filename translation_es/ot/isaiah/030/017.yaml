- from: Mil huirán ante la reprensión de uno[a]; ante la reprensión de cinco huiréis, hasta que quedéis como un mástil en la cima de un monte[b], y como un estandarte sobre una colina.
  to: Mil huiréis ante la reprensión de uno; ante la reprensión de cinco huiréis, hasta que quedéis como un poste de señal[a] en la cima de un monte, y como un estandarte[b] sobre una colina.
  rationale: La revisión corrige la colocación de las notas para que coincidan con las palabras relevantes del texto, restablece la consistencia de segunda persona plural conforme al hebreo, y alinea la elección principal de כַּתֹּרֶן con la decisión documentada del POB ('signal pole') mediante 'poste de señal', dejando 'mástil' como alternativa léxica válida en nota.
