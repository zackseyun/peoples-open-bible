translation:
  language: es
  text: 'Porque, sí, porque han extraviado a mi pueblo, diciendo: «Paz», cuando no hay paz; y cuando alguien construye un muro, he aquí que ellos lo recubren con cal[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mortero sin mezcla». El hebreo se refiere a un recubrimiento superficial del muro; «con cal» comunica la imagen claramente en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן / וּבְיַעַן
  english_pob_choice: Because, yes, because
  chosen_spanish: Porque[a], sí, porque
  alternatives_spanish:
  - Porque, porque
  - Sí, porque
  - Ya que, sí, ya que
  lexicon: HALOT
  rationale: La duplicación causal intensifica la razón dada; en español conviene conservar la repetición enfática sin volver la frase pesada. «Sí» refleja la fuerza asseverativa de וּבְיַעַן, y el anclaje en la nota explica la opción expresiva.
- source_word: הִטְעוּ
  english_pob_choice: have led ... astray
  chosen_spanish: han extraviado
  alternatives_spanish:
  - han engañado
  - han hecho errar
  - han desviado
  lexicon: HALOT
  rationale: «Extraviar» comunica el sentido de hacer salir del camino con un matiz moral y religioso compatible con el hebreo, y suena natural en español bíblico actual.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: Es la fórmula pactual directa; no requiere ampliación ni paráfrasis.
- source_word: לֵאמֹר שָׁלוֹם וְאֵין שָׁלוֹם
  english_pob_choice: saying, ‘Peace,’ when there is no peace
  chosen_spanish: 'diciendo: «Paz», cuando no hay paz'
  alternatives_spanish:
  - 'diciendo: «Paz», pero no hay paz'
  - 'diciendo: «Bienestar», cuando no hay bienestar'
  lexicon: HALOT
  rationale: «Paz» es la equivalencia estable y adecuada para שָׁלוֹם en este contexto profético de falsa seguridad. La cláusula «cuando no hay paz» conserva la contradicción sin explicitar más de lo que el texto dice.
- source_word: וְהוּא בֹּנֶה
  english_pob_choice: and when someone builds
  chosen_spanish: y cuando alguien levanta
  alternatives_spanish:
  - y cuando uno levanta
  - y cuando él levanta
  - y cuando construye
  lexicon: HALOT
  rationale: El participio singular es genérico; «alguien» comunica bien esa indeterminación. «Levanta» funciona naturalmente con «muro» en español y mantiene la imagen constructiva.
- source_word: חַיִץ
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una pared
  - una tapia
  - un tabique
  lexicon: HALOT
  rationale: «Muro» refleja mejor el elemento construido y la fuerza de la imagen profética que «pared», que en español suele sonar más doméstico.
- source_word: וְהִנָּם
  english_pob_choice: behold, they
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí que
  - mira,
  - y entonces
  lexicon: HALOT
  rationale: La expresión hebrea introduce un giro visual y enfático; «he aquí que» preserva el tono profético sin sonar anticuado dentro de esta cláusula breve.
- source_word: טָחִים אֹתוֹ
  english_pob_choice: plaster it
  chosen_spanish: lo revocan
  alternatives_spanish:
  - lo enlucen
  - lo encalan
  - lo revisten
  lexicon: HALOT
  rationale: El verbo describe aplicar un recubrimiento superficial al muro. «Revocar» es preciso para un revoque o enlucido; aquí se combina con el complemento siguiente para dejar clara la acción de cubrir la superficie.
- source_word: תָּפֵל
  english_pob_choice: with whitewash
  chosen_spanish: con encalado
  alternatives_spanish:
  - con cal
  - con enlucido blanco
  - con una capa de yeso
  lexicon: HALOT
  rationale: El término apunta a una cobertura superficial, no necesariamente a una traducción técnica fija. «Encalado» transmite la imagen de un revestimiento blanqueador y mantiene la concretud del texto sin forzar una equivalencia tradicional opaca.
theological_decisions:
- issue: Conservar la imagen concreta del muro revocado en una denuncia profética
  english_pob_reading: Retain the concrete building image ('builds a wall ... plaster it with whitewash') without making the metaphor explicit in the main text.
  chosen_spanish_reading: Conservar la imagen concreta («levanta un muro ... lo revocan con encalado») sin explicitar en el cuerpo del texto la interpretación metafórica.
  alternative_spanish_readings:
  - «levanta un muro frágil ... lo cubren con mentiras»
  - «levanta una pared ... la blanquean»
  rationale: El hebreo presenta primero la imagen; la traducción debe respetar esa concreción y no convertirla en comentario. La opción elegida mantiene la fuerza visual y deja abierta la lectura profética del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota, [a], aparece exactamente en el texto de traducción. No se incluyen notas sin anclaje en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa «mi pueblo» para עַמִּי como fórmula pactual estable.
  - Se mantiene «Paz» para שָׁלוֹם por su valor profético de bienestar/seguridad, sin diluir la denuncia.
  - «Muro» y «revocar con encalado» conservan la imagen arquitectónica concreta sin explicarla en exceso.
  - No se emplea «SEÑOR»; no hay aquí el Tetragrámaton directo, solo lenguaje profético general.
