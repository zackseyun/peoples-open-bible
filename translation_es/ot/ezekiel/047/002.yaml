translation:
  language: es
  text: Entonces me sacó por la puerta del norte, y me llevó alrededor por el camino exterior hasta la puerta exterior, la que da al oriente; y he aquí, el agua salía[a] desde el lado derecho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el agua borboteaba» o «el agua fluía»; el verbo hebreo sugiere un flujo pequeño que emerge, no una corriente grande.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde el hombro derecho»; aquí «hombro» se refiere al lado o flanco de la estructura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנִי
  english_pob_choice: he brought me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me llevó fuera
  - me hizo salir
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir a alguien. En español, «me sacó» conserva la idea causal de salida y suena natural en el relato visionario.
- source_word: דֶּרֶךְ שַׁעַר צָפוֹנָה
  english_pob_choice: by way of the north gate
  chosen_spanish: por la puerta del norte
  alternatives_spanish:
  - por la puerta septentrional
  - por el camino de la puerta hacia el norte
  lexicon: HALOT
  rationale: דֶּרֶךְ indica ruta o trayecto, y en este contexto el desplazamiento se expresa con naturalidad como «por la puerta del norte». «Puerta del norte» conserva la orientación sin volverlo áspero en español.
- source_word: וַיְסִבֵּנִי
  english_pob_choice: led me around
  chosen_spanish: me hizo dar la vuelta
  alternatives_spanish:
  - me llevó alrededor
  - me hizo rodear
  lexicon: HALOT
  rationale: 'El hifil de סבב tiene fuerza causativa: hacer rodear o girar. «Me hizo dar la vuelta» comunica ese movimiento guiado y sigue siendo claro en español.'
- source_word: דֶּרֶךְ חוּץ
  english_pob_choice: by the outside way
  chosen_spanish: por el camino exterior
  alternatives_spanish:
  - por el camino de afuera
  - por el camino exteriormente
  lexicon: HALOT
  rationale: חוּץ señala exterioridad. «Camino exterior» mantiene la relación espacial entre la ruta y el perímetro del complejo, sin perder fluidez.
- source_word: אֶל שַׁעַר הַחוּץ
  english_pob_choice: to the outer gate
  chosen_spanish: hasta la puerta exterior
  alternatives_spanish:
  - hasta la puerta de afuera
  - hasta la puerta exterior
  lexicon: HALOT
  rationale: הַחוּץ funciona como calificativo de la puerta. «Puerta exterior» reproduce el valor locativo y evita confusión con una puerta específica distinta del recinto interno.
- source_word: דֶּרֶךְ הַפּוֹנֶה קָדִים
  english_pob_choice: the one facing east
  chosen_spanish: la que da al oriente
  alternatives_spanish:
  - la que mira al oriente
  - la que está orientada al oriente
  lexicon: HALOT
  rationale: El participio פּוֹנֶה con קָדִים describe orientación. «Da al oriente» es una manera natural y reverente de expresar esa orientación en español bíblico contemporáneo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miré
  - y resultó que
  lexicon: HALOT
  rationale: La fórmula discursiva introduce una nueva visión con énfasis profético. «Y he aquí» preserva ese giro solemne y visible.
- source_word: מַיִם מְפַכִּים
  english_pob_choice: water was trickling
  chosen_spanish: aguas manaban
  alternatives_spanish:
  - aguas fluían
  - aguas brotaban
  lexicon: HALOT
  rationale: פכה sugiere un flujo pequeño que emerge, no un torrente pleno. En español, el plural «aguas» y el verbo «manaban» conservan la imagen de un fluir visible e incipiente sin exagerarlo.
- source_word: מִן הַכָּתֵף הַיְמָנִית
  english_pob_choice: from the right side
  chosen_spanish: desde el lado derecho
  alternatives_spanish:
  - desde el costado derecho
  - desde el hombro derecho
  lexicon: HALOT
  rationale: כָּתֵף literalmente es «hombro», pero en uso arquitectónico/topográfico designa un costado o flanco. «Lado derecho» mantiene la referencia espacial natural en español y evita una imagen corporal indebida.
theological_decisions:
- issue: Orientación del templo y referencia espacial de la visión
  english_pob_reading: the one facing east; from the right side
  chosen_spanish_reading: la que da al oriente; desde el lado derecho
  alternative_spanish_readings:
  - la que mira al oriente; desde el costado derecho
  - la que está orientada al oriente; desde el flanco derecho
  rationale: No hay una decisión doctrinal controvertida, pero sí una elección de claridad espacial. La visión describe estructuras del templo, así que se mantiene el lenguaje direccional concreto sin convertirlo en metáfora.
  doctrine_reference: No aplica; decisión de topografía sagrada y claridad textual
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable en la revisión más reciente (sin cambios). La traducción española sigue de cerca sus decisiones léxicas principales, pero vuelve al hebreo para matizar dos puntos: la causalidad de יצא/סבב y la fuerza menor de מְפַכִּים, expresada como «aguas manaban» en vez de un flujo pleno.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «oriente» como equivalente bíblico de קָדִים, por su registro reverente y comprensible.
  - Se conserva el tono visionario con «y he aquí», coherente con el valor discursivo de וְהִנֵּה.
