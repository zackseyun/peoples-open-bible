review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido del hebreo: el marco temporal («Después de la muerte de Ahab»), el sujeto («Moab») y el valor político de וַיִּפְשַׁע con ב («se rebeló contra Israel»). La única desviación relevante está en la nota léxica alternativa: el inglés auditado preserva «revolted», pero el español «se revolvió» cambia el sentido hacia agitación o movimiento, no revuelta política.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español. «Después de la muerte de Ahab, Moab se rebeló contra Israel» suena bien y no es un calco torpe. La nota, en cambio, necesita ajuste por idiomaticidad: «se sublevó» o «se rebeló» serían opciones válidas; «se revolvió» no lo es en este contexto.'
  glossary_alignment: No hay términos del glosario mayor implicados aparte de nombres propios. «Moab» está bien. «Ahab» sigue el audit trail inglés; aunque en español tradicional también existe «Acab», aquí conviene mantener la forma documentada en el expediente para consistencia, ya que no hay nota ni revisión auditada que justifique cambiarla.
  issues:
  - severity: medium
    issue: La nota al pie usa «se revolvió» como alternativa para «revolted».
    rationale: En español bíblico actual, «revolverse contra» no es la mejor equivalencia para una rebelión política de un pueblo vasallo; puede sugerir agitación física o reacción emocional. «Se sublevó» preserva mejor la alternativa léxica documentada en inglés sin introducir ambigüedad.
  revised_spanish_text: Después de la muerte de Ahab[a], Moab se rebeló contra Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «Moab se sublevó contra Israel».'
    reason: lexical_alternative
