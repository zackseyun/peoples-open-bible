base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/015.yaml
  text: When Aaron and his sons have finished covering the sanctuary and all the furnishings of the sanctuary[a], when the camp sets out, after that the sons of Kohath shall come to carry them; but they shall not touch the holy things, lest they die[c][b]. These are the burden of the sons of Kohath in the tent of meeting.
  footnotes:
  - marker: a
    text: Or 'they shall not touch the sanctuary.' The Hebrew 'the holy' can be understood either collectively for the sacred objects or more broadly for the sanctuary.
    reason: alternative_reading
  - marker: b
    text: Or 'and they will die.' The Hebrew wording states the consequence directly.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Kohathites.' Literally, 'the sons of Kohath.'
    reason: lexical_alternative
