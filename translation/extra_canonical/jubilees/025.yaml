translation:
  text: '1[a]. And in the second year of the seventh week of this jubilee, Rebekah called Jacob her son,

    2. and spoke to him, saying, “My son, do not take for yourself a wife from the daughters of Canaan, as Esau your brother did, who took for himself two wives from the daughters of Canaan, and they have made my spirit bitter by all their unclean conduct[b].

    3. For all their conduct is fornication and impurity, and there is no righteousness with them, for it is evil.

    4. But I, my son, love you exceedingly, and my heart and my affection will bless you at all times, by day and in the watches of the night.

    5. And now, my son, listen to my voice and do the will of your mother, and do not take for yourself a wife from the daughters of this land, but only from my father’s house and from my father’s kindred shall you take a wife for yourself; from my father’s house. And God Most High will bless you, and your children will be a righteous offspring and a holy seed.”

    6. Then Jacob spoke with Rebekah his mother and said to her, “Look, I am now a son of nine weeks of years, and I do not know a woman, nor have I approached one, nor do I intend to take a wife for myself from the daughters of Canaan.

    7. For I remember, from what Abraham our father told me, that he commanded me not to take a wife from the daughters of Canaan, but that I should take a wife for myself from the seed of my father’s house and from my kin.

    8. And I heard before this that daughters have been born to Laban, your brother, and I have set my heart on them, that I might take a wife from among them.

    9. And for this reason I have guarded my spirit, so that I might not sin and might not be corrupted in all my ways all the days of my life; for because of wantonness and fornication Abraham my father gave me many commands.

    10. And although Esau has pressed me about this for these twenty-two years, and has urged me while speaking to me and saying, ‘My brother, take a wife, one of the sisters of my two wives,’ still I have not been willing to do as he did.

    11. I swear before you all the days of my life that I will not take a wife for myself from the daughters of the seed of Canaan, and that I will not act wickedly as Esau acted.

    12. Do not fear, mother; be assured that I will do your will and walk in uprightness, and I will never corrupt my ways.”

    13[c][d][e][f]. Then she lifted up her face.'
  philosophy: optimal-equivalence
