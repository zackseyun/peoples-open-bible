review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa del hebreo y conserva adecuadamente los elementos clave: זְבַח como mandato cultual, תּוֹדָה en su doble matiz sacrificial/agradecido, וְשַׁלֵּם como cumplimiento de votos, y עֶלְיוֹן como título divino. Sin embargo, la nota al pie introduce una alternativa menos fiel al matiz sacrificial del original al decir «un sacrificio de agradecimiento», mientras que la explicación menciona correctamente «ofrenda de agradecimiento». Conviene armonizar la nota con la evidencia léxica documentada.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial amplio: «Ofrece a Dios un sacrificio de acción de gracias, y cumple tus votos al Altísimo». La sintaxis suena bien y evita calcos torpes. La única reparación necesaria es de precisión y consistencia en la nota al pie.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: אֱלֹהִים -> «Dios»; עֶלְיוֹן -> «Altísimo» como título traducido; no hay conflictos con otros términos por defecto del glosario. «Votos» para נְדָרֶיךָ está bien elegido. No hay uso de «Yahvé» porque no aparece el nombre divino en este versículo.'
  issues:
  - severity: medium
    issue: La nota al pie ofrece «un sacrificio de agradecimiento» como alternativa inmediata.
    rationale: La documentación inglesa preserva la alternativa entre «thanksgiving» y «thank offering». En español, «un sacrificio de agradecimiento» no distingue bien esa alternativa y duplica casi la formulación principal; «acción de gracias» / «ofrenda de agradecimiento» refleja mejor el abanico semántico de תּוֹדָה en contexto sacrificial.
  revised_spanish_text: Ofrece a Dios un sacrificio de acción de gracias[a], y cumple tus votos al Altísimo.
  revised_footnotes:
  - marker: a
    text: 'O: «Ofrece a Dios acción de gracias como sacrificio»; el hebreo תּוֹדָה puede significar tanto «acción de gracias» como una «ofrenda de agradecimiento» en este contexto sacrificial.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, natural y teológicamente sólido. Solo se ajusta la nota para reflejar con mayor precisión la alternativa documentada en el rastro de auditoría inglés y para evitar una opción española redundante que no expresa claramente el posible sentido de «thank offering».
