translation:
  language: es
  text: No seas vencido por el mal[a], sino vence el mal con el bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No dejes que el mal te venza, sino vence el mal con el bien.'' El griego usa adjetivos neutros con artículo, que pueden traducirse de forma abstracta (''el mal'', ''el bien'') o como ''lo que es malo'' y ''lo que es bueno''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νικῶ
  english_pob_choice: Do not be overcome
  chosen_spanish: No seas vencido
  alternatives_spanish:
  - No dejes que el mal te venza
  - No seas derrotado
  lexicon: BDAG
  rationale: El griego usa una prohibición con verbo en pasiva; en español, la pasiva refleja 'ser vencido' comunica bien la idea de no quedar derrotado por el mal sin forzar una construcción poco natural. Se mantiene el valor exhortativo y pasivo del original.
- source_word: ὑπὸ τοῦ κακοῦ
  english_pob_choice: by evil
  chosen_spanish: por el mal
  alternatives_spanish:
  - por lo malo
  - por lo que es malo
  lexicon: BDAG
  rationale: La preposición ὑπό con genitivo expresa agente en la cláusula pasiva. El artículo neutro sustantivado puede entenderse de forma abstracta como 'el mal' o como 'lo que es malo'; 'por el mal' conserva la categoría moral general y suena natural en español.
- source_word: ἀλλὰ νίκα
  english_pob_choice: but overcome
  chosen_spanish: sino vence
  alternatives_spanish:
  - pero vence
  - sino conquista
  lexicon: BDAG
  rationale: ἀλλά introduce un contraste fuerte; en español, después de una negación, 'sino' es más idiomático que 'pero'. 'Vence' reproduce el imperativo activo y conserva la continuidad léxica con 'vencido'.
- source_word: ἐν τῷ ἀγαθῷ
  english_pob_choice: with good
  chosen_spanish: con el bien
  alternatives_spanish:
  - por medio del bien
  - con lo bueno
  lexicon: BDAG
  rationale: El ἐν dativo es instrumental/medio. 'Con el bien' expresa el medio de manera breve y natural en español, manteniendo el paralelismo con 'el mal'.
- source_word: τὸ κακόν
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - lo que es malo
  lexicon: BDAG
  rationale: El artículo neutro sustantivado funciona de modo genérico. 'El mal' preserva la fuerza moral abstracta del contraste con 'el bien' y es una forma clara y bíblica en español.
theological_decisions:
- issue: Si κακός/ἀγαθός debe entenderse como categorías morales abstractas o como una referencia personalizada
  english_pob_reading: 'abstract moral categories: ''evil'' and ''good'''
  chosen_spanish_reading: 'categorías morales abstractas: ''el mal'' y ''el bien'''
  alternative_spanish_readings:
  - '''el maligno'' / ''el malo'''
  - '''lo malo'' y ''lo bueno'''
  rationale: Nada en la sintaxis inmediata exige un referente personal. El contraste en Romanos 12 es ético y exhortativo, por lo que la traducción conserva el sentido moral general sin introducir una identificación doctrinal no explicitada por el texto.
  doctrine_reference: 'Principio POB: no importar afirmaciones doctrinales que el texto no expresa; preservar el sentido llano del pasaje.'
translation_notes:
  revision_awareness: 'Coincide con la revisión de más alta concordancia del POB inglés: el sentido general se mantiene sin cambios, y la decisión principal es conservar el contraste moral abstracto con una sintaxis española natural. No hubo revisiones aplicadas en el auditorial inglés.'
  spanish_consistency_notes:
  - Se mantiene la pareja terminológica 'mal/bien' para conservar el paralelismo retórico del griego.
  - Se usa 'sino' tras la negación inicial porque responde mejor al contraste adversativo del original.
  - La forma pasiva 'ser vencido' respeta la pasividad del primer miembro sin perder claridad en español.
