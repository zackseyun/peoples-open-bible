translation:
  language: es
  text: Cocinaron la Pascua en el fuego, conforme a la ordenanza[a], y hirvieron las ofrendas sagradas en ollas, calderos y tazones, y las llevaron rápidamente a todo el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «asaron la Pascua en el fuego». El verbo hebreo puede significar «cocinar» en sentido amplio, pero la ley pascual requería asarla y no hervirla (cf. Éxodo 12:8–9).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבַשְּׁלוּ
  english_pob_choice: cooked
  chosen_spanish: Cocinaron
  alternatives_spanish:
  - Asaron
  - Hirvieron
  - Prepararon
  lexicon: HALOT
  rationale: El verbo hebreo בָּשַׁל puede abarcar cocinar/ hervir; aquí el contexto del fuego y de la ordenanza ritual evita una traducción mecánica. «Cocinaron» conserva la amplitud del verbo sin forzar «hervir», y el complemento «en el fuego» deja claro el modo ritual.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: el Pésaj
  alternatives_spanish:
  - la Pascua
  - el sacrificio de Pascua
  - el cordero de Pascua
  lexicon: HALOT
  rationale: Aquí el término designa la celebración/sacrificio pascual en contexto ritual. «Pésaj» evita añadir «cordero» donde el hebreo no lo expresa explícitamente, y mantiene la referencia concreta del rito.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - al fuego
  - sobre el fuego
  - con fuego
  lexicon: HALOT
  rationale: La preposición hebrea preserva la idea de cocción por medio del fuego. «En el fuego» es una traducción directa y clara en español.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme a la ordenanza
  alternatives_spanish:
  - según la norma
  - como se prescribe
  - de acuerdo con el estatuto
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene fuerza normativa/legal. «Ordenanza» reproduce bien el carácter prescrito del rito y mantiene el tono formal de la POB inglesa revisada.
- source_word: וְהַקֳּדָשִׁים
  english_pob_choice: the holy offerings
  chosen_spanish: las ofrendas sagradas
  alternatives_spanish:
  - las cosas sagradas
  - las ofrendas santas
  - los sacrificios sagrados
  lexicon: HALOT
  rationale: El plural se refiere a otras porciones consagradas, distintas del Pésaj. «Ofrendas sagradas» comunica mejor el valor cultual que un literal «cosas santas» en español.
- source_word: בִּשְּׁלוּ
  english_pob_choice: boiled
  chosen_spanish: hirvieron
  alternatives_spanish:
  - cocinaron
  - hervían
  - cocieron
  lexicon: HALOT
  rationale: En contraste con el Pésaj preparado en el fuego, este verbo encaja naturalmente con la cocción en recipientes. «Hirvieron» refleja el sentido culinario más específico que la POB distingue aquí.
- source_word: בַּסִּירוֹת
  english_pob_choice: in pots
  chosen_spanish: en ollas
  alternatives_spanish:
  - en potes
  - en recipientes
  - en cazos
  lexicon: HALOT
  rationale: Vasija de cocción común; «ollas» es natural y ampliamente inteligible en español.
- source_word: וּבַדְּוָדִים
  english_pob_choice: in kettles
  chosen_spanish: en calderos
  alternatives_spanish:
  - en cazos grandes
  - en cazuelas grandes
  - en pailas
  lexicon: HALOT
  rationale: El término indica un recipiente mayor para cocción. «Calderos» conserva ese matiz mejor que un simple «olla».
- source_word: וּבַצֵּלָחוֹת
  english_pob_choice: in bowls
  chosen_spanish: en tazones
  alternatives_spanish:
  - en platos
  - en cuencos
  - en vasos
  lexicon: HALOT
  rationale: El recipiente es de tipo más abierto; «tazones» es una equivalencia clara y neutral en español.
- source_word: וַיָּרִיצוּ
  english_pob_choice: quickly brought
  chosen_spanish: las apresuraron
  alternatives_spanish:
  - las llevaron rápidamente
  - las hicieron llegar deprisa
  - las entregaron con prisa
  lexicon: HALOT
  rationale: El verbo expresa prisa e импulso de llevar/transportar. «Las apresuraron» conserva la idea de urgencia y acción rápida sin perder el matiz verbal de hacer llegar con prontitud.
- source_word: לְכָל בְּנֵי הָעָם
  english_pob_choice: to all the people
  chosen_spanish: para todos los hijos del pueblo
  alternatives_spanish:
  - a todo el pueblo
  - para toda la gente
  - a todos los miembros del pueblo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «hijos del pueblo». Se mantiene esa forma para no diluir el matiz representativo, aunque en español también funciona idiomáticamente como referencia a todos los participantes del pueblo.
theological_decisions:
- issue: Tensión entre בָּשַׁל y la ley pascual sobre el modo de preparación
  english_pob_reading: Render the first verb broadly as 'cooked' and let 'in the fire according to the ordinance' specify the lawful method.
  chosen_spanish_reading: Traducir el primer verbo de modo amplio como «cocinaron» y dejar que «en el fuego, conforme a la ordenanza» especifique el método legítimo.
  alternative_spanish_readings:
  - «Asaron» el Pésaj en el fuego
  - «Hirvieron» el Pésaj en el fuego
  rationale: El versículo distingue entre el Pésaj preparado en el fuego según la ordenanza y las ofrendas sagradas cocidas en recipientes. La solución amplia evita una contradicción aparente y respeta la diferencia ritual del hebreo.
  doctrine_reference: Éxodo 12:8–9; Principios de traducción POB §§1, 5
- issue: Distinción entre el Pésaj y las ofrendas sagradas
  english_pob_reading: Treat as sacrificial portions other than the Passover animal.
  chosen_spanish_reading: Entender «las ofrendas sagradas» como porciones sacrificiales distintas del Pésaj.
  alternative_spanish_readings:
  - Tomarlo como una referencia general a toda la comida sagrada
  - Unificarlo con el Pésaj como una sola categoría
  rationale: La sintaxis contrasta el Pésaj con las ofrendas sagradas, y los distintos modos de preparación refuerzan esa diferencia. Mantener la distinción evita borrar la estructura del versículo.
  doctrine_reference: Principios de traducción POB §1
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «Passover» sin añadir «lamb» y «ordinance» para כמשפט. En español, se evitó añadir «cordero» y se eligió «ordenanza» para reflejar el carácter normativo del término. También se mantuvo la distinción entre la preparación del Pésaj en el fuego y el hervido de las ofrendas sagradas en recipientes.
  spanish_consistency_notes:
  - Se conserva «Pésaj» para el término pascual, coherente con una terminología bíblica directa y no eclesiástica.
  - «Ofrendas sagradas» mantiene la distinción cultual del plural hebreo y evita neutralizarla como mera comida.
  - Se usa un registro formal pero claro, apto para publicación y lectura eclesial.
  - La nota al pie preserva la tensión lexical entre «cocinar» y «asarlo», sin resolverla por paraphraseo.
