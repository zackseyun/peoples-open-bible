translation:
  language: es
  text: Incluso Maacá, la madre del rey Asa, la apartó de su cargo de reina madre, porque había hecho una imagen espantosa[a] para Asherah[b]; y Asa cortó su imagen espantosa, la desmenuzó y la quemó en el valle del Cedrón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una imagen abominable» o «una cosa horrenda». El término hebreo denota un objeto cultual repulsivo o aterrador.
    reason: lexical_alternative
  - marker: b
    text: «Asherah» puede referirse a la diosa o al símbolo cultual asociado con ella; versiones más antiguas a veces la traducen como «bosque» o términos similares.
    reason: cultural_note
  - marker: c
    text: O «en el torrente/wadi Cedrón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - Y también
  - También
  lexicon: HALOT
  rationale: El hebreo añade con énfasis. «Incluso» conserva el matiz de extensión sorprendente del reformador a un miembro de su propia familia real.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maacah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación ortográfica y acentuación natural para lectura eclesial en español.
- source_word: אֵם אָסָא הַמֶּלֶךְ
  english_pob_choice: the mother of King Asa
  chosen_spanish: la madre del rey Asa
  alternatives_spanish:
  - la madre de Asa el rey
  lexicon: HALOT
  rationale: Mantiene la relación familiar y el título real sin alterar el sentido del constructo hebreo.
- source_word: הֱסִירָהּ
  english_pob_choice: he removed
  chosen_spanish: la removió
  alternatives_spanish:
  - la quitó
  - la apartó
  - la depuso
  lexicon: HALOT
  rationale: «Remover» reproduce el verbo amplio de quitar o desplazar de una posición. «Depuso» sería más interpretativo; el hebreo permite la idea de remover de un cargo, pero el verbo por sí mismo es más general.
- source_word: מִגְּבִירָה
  english_pob_choice: from being queen mother
  chosen_spanish: de ser reina madre
  alternatives_spanish:
  - del cargo de reina madre
  - de su puesto como reina madre
  lexicon: HALOT
  rationale: En el contexto real de Judá, גְּבִירָה designa la función de reina madre. «De ser reina madre» conserva la noción de estado/función sin añadir solemnidad no expresada por el hebreo.
- source_word: אֲשֶׁר עָשְׂתָה לַאֲשֵׁרָה
  english_pob_choice: because she had made ... for Asherah
  chosen_spanish: porque había hecho para Asherah
  alternatives_spanish:
  - porque había hecho para la Asherah
  - porque había hecho una imagen para Asherah
  lexicon: HALOT
  rationale: Se conserva «Asherah» como término transliterado, siguiendo la decisión auditada de no ocultar el referente cultual con «bosque» o «poste». La frase española refleja la relación de finalidad/preparación del hebreo sin sobreespecificar la forma del objeto.
- source_word: מִפְלָצֶת
  english_pob_choice: a dreadful image
  chosen_spanish: una imagen espantosa
  alternatives_spanish:
  - una imagen abominable
  - una imagen horrible
  - un objeto espantoso
  lexicon: HALOT
  rationale: El sustantivo denota un objeto cultual repulsivo o aterrador. «Imagen espantosa» mantiene el valor de repulsión y funciona bien en español, con «imagen» suplida por el contexto del objeto hecho y luego destruido.
- source_word: וַיִּכְרֹת
  english_pob_choice: cut down
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó de un tajo
  - derribó
  - taló
  lexicon: HALOT
  rationale: El verbo describe cortar o derribar. En español, «cortó» es directo y suficientemente fuerte; «derribó» o «taló» podrían sugerir más de lo que el término exige.
- source_word: מִפְלַצְתָּהּ
  english_pob_choice: her dreadful image
  chosen_spanish: su imagen espantosa
  alternatives_spanish:
  - su imagen abominable
  - su cosa espantosa
  lexicon: HALOT
  rationale: Se mantiene la consistencia con el sustantivo anterior. El posesivo español expresa naturalmente el sufijo pronominal hebreo.
- source_word: וַיָּדֶק
  english_pob_choice: crushed it
  chosen_spanish: la desmenuzó
  alternatives_spanish:
  - la machacó
  - la trituró
  - la pulverizó
  lexicon: HALOT
  rationale: El verbo indica reducir a fragmentos pequeños o polvo. «Desmenuzó» comunica la secuencia física previa a quemarla y es natural en español.
- source_word: וַיִּשְׂרֹף
  english_pob_choice: burned it
  chosen_spanish: la quemó
  alternatives_spanish:
  - la incendió
  - la puso en fuego
  lexicon: HALOT
  rationale: Traducción directa del verbo de quemar, con referencia al objeto femenino en español por concordancia con «imagen».
- source_word: בְּנַחַל קִדְרוֹן
  english_pob_choice: in the Kidron Valley
  chosen_spanish: en el valle del Cedrón
  alternatives_spanish:
  - en el torrente del Cedrón
  - en el wadi Cedrón
  - en el arroyo Cedrón
  lexicon: HALOT
  rationale: «Valle del Cedrón» es claro y natural para lectores en español. Se conserva el topónimo bíblico con forma habitual hispana.
theological_decisions:
- issue: Identidad y referencia de Asherah
  english_pob_reading: Asherah is rendered as the proper name of the cultic deity/object association rather than paraphrased as 'grove.'
  chosen_spanish_reading: Asherah se conserva como nombre cultual propio, no como «bosque» ni como otro equivalente tradicional.
  alternative_spanish_readings:
  - bosque
  - poste sagrado
  - poste de Aserá
  rationale: El contexto habla de un objeto fabricado, cortado, desmenuzado y quemado. Traducirlo como «bosque» oscurecería el referente religioso y material del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Función de גְּבִירָה
  english_pob_reading: Rendered as 'queen mother.'
  chosen_spanish_reading: «reina madre»
  alternative_spanish_readings:
  - gran señora
  - señora principal
  rationale: En el contexto monárquico de Judá, el título apunta a la función institucional de la madre del rey. «Reina madre» comunica mejor ese estatus que una expresión genérica.
  doctrine_reference: Translation philosophy §6
- issue: Naturaleza de מִפְלָצֶת
  english_pob_reading: a dreadful image / dreadful image
  chosen_spanish_reading: «imagen espantosa»
  alternative_spanish_readings:
  - imagen abominable
  - imagen horrenda
  - objeto espantoso
  rationale: El hebreo describe un objeto culto repulsivo o aterrador. «Espantosa» preserva la fuerza afectiva sin convertirla en un juicio moral más técnico de lo que el lexema exige.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió el pasaje fuente hebreo y el registro inglés auditado sin cambios relevantes en la revisión más reciente; la versión española conserva las tensiones documentadas: el título real גְּבִירָה como «reina madre», Asherah como nombre cultual, y מִפְלָצֶת como objeto espantoso sin domesticar su fuerza semántica.'
  spanish_consistency_notes:
  - Se mantiene «Asherah» de forma consistente como término cultual propio.
  - «Reina madre» se usa para גְּבִירָה por coherencia con el contexto de la monarquía de Judá.
  - La serie verbal «cortó / desmenuzó / quemó» conserva la progresión de acción física del hebreo.
  - El topónimo se presenta como «valle del Cedrón», forma clara y reconocible en español.
