translation:
  language: es
  text: 'Y pondrás límites para el pueblo alrededor, diciendo: «Tengan cuidado de no subir al monte ni tocar su borde. Cualquiera que toque el monte ciertamente será ejecutado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ciertamente morirá». La expresión hebrea es una fórmula enfática de muerte; aquí se traduce «ciertamente será ejecutado» para reflejar la forma pasiva y el contexto inmediato de ejecución impuesta en el siguiente versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגְבַּלְתָּ
  english_pob_choice: you shall set bounds
  chosen_spanish: delimitarás
  alternatives_spanish:
  - pondrás límites
  - señalarás un límite
  lexicon: HALOT
  rationale: El hiphil de גבל expresa poner un límite o frontera. “Delimitarás” conserva la acción concreta de marcar un perímetro restringido con español natural y digno.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la nación
  lexicon: HALOT
  rationale: Aquí se refiere al conjunto reunido de Israel; “pueblo” reproduce bien el colectivo y mantiene la sobriedad del mandato.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: en derredor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La idea es un cercado perimetral alrededor de todo el pueblo. “En derredor” conserva la noción envolvente y funciona bien con el mandato de delimitar.
- source_word: הִשָּׁמְרוּ לָכֶם
  english_pob_choice: Be careful
  chosen_spanish: Guardaos
  alternatives_spanish:
  - Tened cuidado
  - Cuidaos
  lexicon: HALOT
  rationale: 'El niphal imperativo con לָכֶם es una advertencia reflexiva: vigilarse a sí mismos. “Guardaos” expresa mejor la autocustodia exigida que una simple recomendación de prudencia.'
- source_word: עֲלוֹת בָּהָר
  english_pob_choice: to go up on the mountain
  chosen_spanish: de subir al monte
  alternatives_spanish:
  - de ascender al monte
  - de subir sobre el monte
  lexicon: HALOT
  rationale: עלה con בהר indica ascender al monte. “Subir al monte” es la forma más natural en español y conserva el sentido espacial.
- source_word: וּנְגֹעַ בְּקָצֵהוּ
  english_pob_choice: or touch its edge
  chosen_spanish: ni de tocar su borde
  alternatives_spanish:
  - ni de tocar su extremo
  - ni de tocar su orilla
  lexicon: HALOT
  rationale: קצהו alude al borde o extremidad. “Su borde” mantiene la imagen de límite físico y encaja con la advertencia de no acercarse al monte.
- source_word: כָּל הַנֹּגֵעַ בָּהָר
  english_pob_choice: Whoever touches the mountain
  chosen_spanish: Cualquiera que toque el monte
  alternatives_spanish:
  - Todo el que toque el monte
  - Quien toque el monte
  lexicon: HALOT
  rationale: La construcción es genérica y distributiva. “Cualquiera que” conserva la universalidad de la advertencia y suena natural en español.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - será muerto sin falta
  - será puesto a muerte
  lexicon: HALOT
  rationale: La fórmula hebrea es intensiva; el inglés POB la ha vertido como pasiva por el contexto inmediato. En español, “ciertamente morirá” mantiene la fuerza solemne y evita una pasiva menos natural, sin perder la severidad del decreto.
theological_decisions:
- issue: La fórmula de muerte enfática מוֹת יוּמָת
  english_pob_reading: shall surely be put to death, with passive force reflecting imposed execution in the next verse
  chosen_spanish_reading: ciertamente morirá, como fórmula enfática de sentencia
  alternative_spanish_readings:
  - será puesto a muerte
  - morirá sin falta
  rationale: El texto hebreo usa infinitivo absoluto + imperfecto para intensificar la certeza de la pena. Dado que el contexto inmediato explicará la ejecución, la sentencia puede expresarse en español como una fórmula enfática sin forzar una pasiva donde el castellano suena menos natural.
  doctrine_reference: Éxodo 19:12-13, lectura contextual de la pena y su ejecución
- issue: La prohibición de acercarse al monte santo
  english_pob_reading: Be careful not to go up on the mountain or touch its edge
  chosen_spanish_reading: Guardaos de subir al monte ni de tocar su borde
  alternative_spanish_readings:
  - Tened cuidado de no subir al monte ni tocar su borde
  - Guardaos de subir al monte o tocar su borde
  rationale: 'La advertencia tiene dos actos prohibidos: ascender y tocar. “Ni de” reproduce la segunda prohibición como parte del mismo cuidado, sin suavizar el carácter ritual y mortal del límite impuesto.'
  doctrine_reference: Santificación del monte Sinaí en Éxodo 19
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español. No se introdujeron notas sin marcador en la línea principal.
  spanish_consistency_notes:
  - Se mantiene “monte” para הר, en coherencia bíblica y con registro natural.
  - Se usa “borde” para קצהו, preservando la imagen de límite físico.
  - La fórmula final conserva la intensidad jurídica del hebreo sin calcar la pasiva inglesa.
  - El tono es formal y apto para lectura eclesial en español neutral.
