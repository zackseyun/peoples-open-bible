    issue: La nota [a] no preserva adecuadamente la alternativa documentada para נִרְאָה.
    rationale: El inglés registra «Or 'he is seen' / 'it appears...'». La nota española dice solo «O ‘se vea’», que repite prácticamente la traducción principal y pierde la opción personal/impersonal que el hebreo permite.
  - severity: medium
    issue: La nota [c] presenta al revés la relación entre la lectura principal y la alternativa.
    rationale: Según la revisión auditada, la traducción principal debe ser la literal «no podrá», mientras que «no prevalecerá» queda como alternativa explicativa. La nota actual afirma que «no podrá» sigue más de cerca el sentido probable de fracaso de la oración, lo cual además atribuye a la forma principal una explicitación contextual que el expediente precisamente evitó.
