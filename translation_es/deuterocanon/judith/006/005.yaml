revisions:
- from: Pero tú, Achior, hireling de Amón, que hablaste estas palabras en el día de tu injusticia[a], ya no verás más mi rostro desde este día hasta que yo me vengue.
  to: Pero tú, Aquior, asalariado[a] de Amón, que hablaste estas palabras en el día de tu injusticia[b], ya no verás mi rostro desde este día hasta que yo me vengue.
  rationale: Se reemplaza el anglicismo 'hireling' por 'asalariado', que comunica con claridad en español la idea de alguien a sueldo sin introducir necesariamente el matiz militar de 'mercenario'. Se añade una nota para preservar alternativas léxicas importantes del inglés auditado. También se simplifica 'ya no verás más' a 'ya no verás' para mejor fluidez española, manteniendo intacto el sentido del griego. Se usa 'Aquior' como forma española más natural del nombre propio Ἀχιώρ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:29:30Z'
