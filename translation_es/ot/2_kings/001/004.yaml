review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: consecuencia profética, nombre divino Yahvé, contraste vertical subir/descender, certeza de la muerte, y cierre narrativo con la salida de Elías. Sin embargo, la frase «en la que has subido allí» es poco natural en español y no reproduce adecuadamente la función de שׁם como elemento resumptivo; además, el pie de nota b cita de forma imprecisa la literalidad hebrea y conviene mantener la alternativa documentada sobre «allí».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «has subido allí» suena forzado y poco idiomático. Una formulación como «a la que has subido» preserva el contraste con «descenderás» y mejora la legibilidad. «Y Elías se fue» es natural; «Por tanto» y «esto dice Yahvé» también funcionan bien.
  glossary_alignment: Alineado con la terminología del proyecto en «Yahvé». No hay conflicto con otros términos clave. Se conserva correctamente «cama» frente a opciones más interpretativas como «lecho de enfermo».
  issues:
  - severity: medium
    issue: 'Construcción española poco natural: «en la que has subido allí»'
    rationale: El hebreo אֲשֶׁר עָלִיתָ שָּׁם incluye un adverbio resumptivo común en hebreo, pero trasladarlo como «allí» dentro de la relativa produce un español torpe. Debe priorizarse la fidelidad semántica y el contraste subir/descender sin calco innecesario.
  - severity: low
    issue: Pie de nota b no refleja con precisión la forma literal ni la alternativa documentada
    rationale: La nota actual dice «la cama que subiste allí», pero el inglés auditado preserva más exactamente «the bed that you went up there onto» y además conserva una alternativa separada para «that you went up there onto». En español conviene explicar la literalidad con «a la que subiste allí» y mantener la nota sobre «allí» como alternativa.
  revised_spanish_text: 'Por tanto[a], esto dice Yahvé: «No descenderás de la cama a la que has subido[b], porque ciertamente morirás». Y Elías se fue.'
