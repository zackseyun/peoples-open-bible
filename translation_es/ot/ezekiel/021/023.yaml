translation:
  language: es
  text: Y la palabra de Yahvé vino a mí, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... llegó
  - Entonces ... vino
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la fórmula profética de modo secuencial. En español, 'vino' conserva bien la llegada de la palabra sin sonar forzado, y mantiene el valor de enlace de 'Y'.
- source_word: דְבַר
  english_pob_choice: the word of
  chosen_spanish: la palabra de
  alternatives_spanish:
  - el mensaje de
  - la palabra proveniente de
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estable 'la palabra de' para reflejar el constructo דְבַר יְהוָה y su peso teológico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el nombre divino como 'Yahvé' en el texto principal, en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La construcción preposicional con sufijo de primera persona se expresa de forma natural en español con 'a mí', preservando la dirección del habla profética.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo que introduce discurso directo se vierte naturalmente como 'diciendo' en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión del POB en inglés es preservar el nombre propio divino; en español, la forma elegida para esa misma decisión es 'Yahvé', que mantiene el nombre revelado sin sustituirlo por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Este versículo coincide plenamente con la lectura hebrea masorética y con el enfoque auditado del POB en inglés; no hay variantes textuales ni tensiones léxicas adicionales que requieran nota.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - No se usa 'SEÑOR' como sustituto del nombre divino, en coherencia con la política del proyecto.
  - La puntuación final con coma reproduce el arranque de discurso directo del versículo, como en el original y en la tradición de traducción auditada.
