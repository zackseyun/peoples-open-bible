translation:
  language: es
  text: durante un período de diez meses[a][b], habiendo sido formado en sangre, de la semilla de un hombre y del placer que acompaña al sueño[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «diez meses», reflejando el cómputo antiguo del embarazo, probablemente por meses lunares.
    reason: cultural_note
  - marker: b
    text: O «habiendo sido coagulado en sangre». El participio griego puede llevar la idea de coagulación o de formación.
    reason: lexical_alternative
  - marker: c
    text: La frase final alude eufemísticamente a la unión sexual; literalmente, «y del placer, habiéndose juntado el sueño».
    reason: lexical_alternative
lexical_decisions:
- source_word: δεκαμηνιαίῳ χρόνῳ
  english_pob_choice: for a period of ten months
  chosen_spanish: durante un período de diez meses
  alternatives_spanish:
  - en un tiempo de diez meses
  - por un período de diez meses
  lexicon: LSJ
  rationale: La frase dativa expresa duración gestacional. «Durante un período de diez meses» comunica con naturalidad el lapso y conserva la reckoning antigua de diez meses, sin añadir explicación en el texto principal.
- source_word: παγεὶς
  english_pob_choice: having been formed
  chosen_spanish: habiendo sido formado
  alternatives_spanish:
  - habiendo sido coagulado
  - habiendo sido fijado
  - habiendo sido compactado
  lexicon: LSJ
  rationale: En este contexto embriológico, «haber sido formado» transmite el sentido de constitución corporal de manera clara en español. «Coagulado» conservaría una posible lectura literal, pero suena demasiado crudo y puede sugerir una imagen médica no buscada por el pasaje.
- source_word: ἐν αἵματι
  english_pob_choice: in blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - en la sangre
  - a partir de sangre
  lexicon: LSJ
  rationale: La preposición ἐν se refleja de forma directa con «en». La imagen concreta del desarrollo corporal se conserva sin convertirla en una paráfrasis causal.
- source_word: ἐκ σπέρματος ἀνδρός
  english_pob_choice: from a man's seed
  chosen_spanish: de la semilla de un hombre
  alternatives_spanish:
  - de la semilla masculina
  - de la semilla del hombre
  - de semen de hombre
  lexicon: LSJ
  rationale: «Semilla» reproduce bien σπέρμα en un registro bíblico y comprensible. Se evita «semen» por ser demasiado técnico y más explícito de lo que requiere el griego.
- source_word: ἡδονῆς
  english_pob_choice: the pleasure
  chosen_spanish: del placer
  alternatives_spanish:
  - del deleite
  - del placer sexual
  - de la delectación
  lexicon: LSJ
  rationale: Aunque el contexto alude a placer sexual, el griego usa ἡδονή de manera eufemística. «Placer» preserva esa reserva y mantiene abierta la lectura sin forzar una explicitación innecesaria en el cuerpo del texto.
- source_word: ὕπνῳ συνελθούσης
  english_pob_choice: the pleasure accompanying sleep
  chosen_spanish: el placer acompañante del sueño
  alternatives_spanish:
  - el placer que acompaña al sueño
  - el placer unido al sueño
  - el placer que viene con el sueño
  lexicon: LSJ
  rationale: La construcción se mantiene con un giro formal que refleja el carácter eufemístico y comprimido del griego. «Acompañante del sueño» sigue de cerca la relación sintáctica, aunque en el español fluido puede entenderse como la referencia velada a la unión sexual.
theological_decisions:
- issue: Referencia al origen humano ordinario y a la concepción corporal
  english_pob_reading: The verse is rendered to stress ordinary human gestation and conception without importing later biological precision.
  chosen_spanish_reading: El verso se vierte para subrayar la gestación humana ordinaria y la concepción corporal, sin imponer precisión biológica moderna.
  alternative_spanish_readings:
  - Una traducción más literal que enfatice la coagulación en sangre
  - Una traducción más explícita que nombre directamente el acto sexual
  rationale: En el contexto de Sabiduría 7, el hablante recalca su humanidad común y su nacimiento normal. La redacción española conserva esa intención y deja la tensión del lenguaje antiguo sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la última frase de 'the pleasure that comes with sleep' a 'the pleasure accompanying sleep' para acercarse más al griego. La versión española refleja esa preferencia con una construcción igualmente cercana y sobria.
  spanish_consistency_notes:
  - Se mantiene «diez meses» y no se expande a «meses lunares» en el texto principal, reservando esa aclaración para la nota.
  - «Sangre» y no «la sangre» preserva la concisión del dativo/preposición griegos.
  - Se usa «semilla» para σπέρμα, consistente con un registro bíblico y con el auditorio amplio de la obra.
  - Se conserva la insinuación eufemística del cierre sin volverlo explícito en el cuerpo del texto.
  - El orden sintáctico sigue de cerca el griego, pero con ajuste suficiente para una lectura natural en español.
