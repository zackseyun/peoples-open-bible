translation:
  language: es
  text: y Matitías[a], Eliphelehu, Mikneiah, Obed-Edom, Jeiel y Azaziah debían dirigir con liras según la Sheminith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con liras en la octava' o 'con liras en el registro grave'. La expresión hebrea 'según la Sheminith' es un término musical cuyo sentido preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתִּתְיָהוּ
  english_pob_choice: Mattithiah
  chosen_spanish: Mattitías
  alternatives_spanish:
  - Matitías
  - Matatías
  lexicon: Nombre propio transliterado
  rationale: Se preserva el nombre propio hebreo con una forma española natural y reconocible. La adaptación con -tías mantiene la tradición transliterada sin perder el valor auditivo del nombre.
- source_word: אֱלִיפְלֵהוּ
  english_pob_choice: Eliphelehu
  chosen_spanish: Eliphelehu
  alternatives_spanish:
  - Elipheleú
  - Elipheleh
  lexicon: Nombre propio transliterado
  rationale: El hebreo conserva el final teofórico -hu; la forma española mantiene esa terminación para reflejar el nombre completo, como en el texto fuente.
- source_word: מִקְנֵיָהוּ
  english_pob_choice: Mikneiah
  chosen_spanish: Micneías
  alternatives_spanish:
  - Mikneías
  - Micneiah
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio en una forma española fluida. La -s final refleja la adaptación usual de nombres bíblicos en español, sin borrar el elemento teofórico implícito en el hebreo.
- source_word: עֹבֵד אֱדֹם
  english_pob_choice: Obed-edom
  chosen_spanish: Obed-edom
  alternatives_spanish:
  - Obed-Edom
  lexicon: Nombre propio compuesto transliterado
  rationale: Se conserva el nombre compuesto con guion para claridad, siguiendo el valor onomástico del original. No se traduce el componente semítico del nombre.
- source_word: יעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Yeiel
  - Jaaiel
  lexicon: Nombre propio transliterado
  rationale: Se mantiene la forma tradicional en español para este nombre propio, cercana a la transliteración inglesa auditada y legible para una audiencia bíblica amplia.
- source_word: עֲזַזְיָהוּ
  english_pob_choice: Azaziah
  chosen_spanish: Azazías
  alternatives_spanish:
  - Azaziah
  - Azaziyahu
  lexicon: Nombre propio transliterado
  rationale: Se adapta el nombre a una forma española natural, conservando la base consonántica y la terminación teofórica en una forma inteligible en español.
- source_word: בְּכִנֹּרוֹת
  english_pob_choice: with lyres
  chosen_spanish: con liras
  alternatives_spanish:
  - con arpas
  - sobre liras
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerda; 'liras' es más preciso que 'arpas' en español moderno. El ב instrumental se expresa naturalmente con 'con'.
- source_word: עַל הַשְּׁמִינִית
  english_pob_choice: according to the Sheminith
  chosen_spanish: según la Sheminit
  alternatives_spanish:
  - sobre la octava
  - en el registro grave
  - según la octava
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado para no perder la ambigüedad musical documentada. 'Según' refleja el valor funcional del עַל en este contexto técnico, sin fijar una interpretación no segura.
- source_word: לְנַצֵּחַ
  english_pob_choice: were to lead
  chosen_spanish: debían dirigir
  alternatives_spanish:
  - debían liderar
  - debían conducir
  - eran para dirigir
  lexicon: HALOT
  rationale: En contexto musical, נצח puede significar dirigir u organizar la ejecución. 'Debían dirigir' comunica la función sin imponer un cargo litúrgico más específico que el que permite el hebreo.
theological_decisions:
- issue: Naturaleza del término musical 'Sheminit' y su traducción
  english_pob_reading: The Hebrew phrase 'according to the Sheminith' is a musical term whose precise meaning is uncertain.
  chosen_spanish_reading: Se conserva 'Sheminit' como término técnico incierto, sin resolverlo en el cuerpo del texto.
  alternative_spanish_readings:
  - la octava
  - el registro grave
  - la tonalidad de ocho
  rationale: No hay base suficiente para fijar una equivalencia doctrinal o litúrgica precisa. Mantener el término transliterado respeta la incertidumbre del original y preserva el valor auditable de la nota.
  doctrine_reference: Principio de transparencia textual y prudencia exegética; no hay implicación doctrinal directa.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete inglés; la versión española sigue la lectura base auditada y mantiene la misma incertidumbre musical documentada.
  spanish_consistency_notes:
  - Se usa 'liras' para כִּנּוֹרוֹת, en coherencia con la decisión léxica inglesa y con terminología musical más precisa en español.
  - Se preserva la transliteración de 'Sheminit' en el texto y se explica la alternativa en nota, para no cerrar indebidamente la ambigüedad del hebreo.
  - Los nombres propios se adaptan a formas españolas publicables, manteniendo su identificabilidad bíblica.
  - Se evita 'SEÑOR' o equivalentes no presentes en el versículo; no hay nombre divino en el texto.
  - '''Debían dirigir'' refleja la función musical de לְנַצֵּחַ sin añadir una estructura eclesiástica ajena al pasaje.'
