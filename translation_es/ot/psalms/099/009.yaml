revisions:
- from: Exalten a Yahvé nuestro Dios[a], y póstrense ante su santo monte, porque santo es Yahvé nuestro Dios.
  to: Exalten a Yahvé nuestro Dios[a], y póstrense en su santo monte, porque santo es Yahvé nuestro Dios.
  rationale: Se ajusta la frase preposicional a 'en su santo monte' para seguir la resolución final del audit trail inglés ('at his holy mountain') y se corrige la nota para evitar el añadido interpretativo 'adórenlo', manteniendo la alternativa léxica del verbo y la ambigüedad espacial de la preposición con mejor fidelidad al expediente.
