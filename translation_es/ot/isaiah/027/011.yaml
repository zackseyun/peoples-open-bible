translation:
  language: es
  text: Cuando sus ramas se secan[a], se quiebran; mujeres vienen y hacen fuego con ellas[b]. Porque no es un pueblo de entendimiento; por tanto, su Hacedor no tendrá compasión de él, y el que lo formó no le mostrará favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus sarmientos' o 'lo cortado de ella'; el término hebreo normalmente significa 'cosecha', pero aquí probablemente se refiere al crecimiento cortado de la vid que se seca y sirve de combustible.
    reason: lexical_alternative
  - marker: b
    text: O 'mujeres vienen y las queman' / 'les prenden fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּיבֹשׁ
  english_pob_choice: when ... dries up
  chosen_spanish: Cuando ... se secan
  alternatives_spanish:
  - Al secarse
  - Cuando se seca
  lexicon: HALOT
  rationale: El valor temporal del prefijo ב con la forma verbal se expresa naturalmente en español con 'cuando'. El plural 'se secan' permite mantener la concordancia con el conjunto vegetal y evita una construcción forzada.
- source_word: קְצִירָהּ
  english_pob_choice: its boughs
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus sarmientos
  - lo cortado de ella
  - sus boughs
  lexicon: HALOT
  rationale: El inglés POB revisó 'harvest' a 'boughs' para reflejar el sentido de lo cortado/seco. En español, 'ramas' comunica con naturalidad la imagen de material leñoso seco destinado al fuego, sin perder la referencia a lo cortado.
- source_word: תִּשָּׁבַרְנָה
  english_pob_choice: they are broken
  chosen_spanish: se quiebran
  alternatives_spanish:
  - son quebradas
  - se rompen
  lexicon: HALOT
  rationale: La forma verbal hebrea es plural femenino; 'se quiebran' conserva el matiz resultativo y la pluralidad del sujeto vegetal, con un español más fluido que un pasivo explícito.
- source_word: נָשִׁים בָּאוֹת
  english_pob_choice: women come
  chosen_spanish: mujeres vienen
  alternatives_spanish:
  - vienen mujeres
  - mujeres llegan
  lexicon: HALOT
  rationale: Se conserva la sencillez descriptiva del hebreo. 'Vienen' refleja bien la acción sucesiva y mantiene el tono sobrio del juicio.
- source_word: מְאִירוֹת אוֹתָהּ
  english_pob_choice: make a fire with it
  chosen_spanish: las encienden con fuego
  alternatives_spanish:
  - la prenden
  - la queman
  - la encienden
  lexicon: HALOT
  rationale: El hiphil de אור aquí implica hacer arder o usar como combustible. 'Las encienden con fuego' transmite el uso concreto del material sin introducir una paráfrasis demasiado libre; el plural concuerda con 'ramas'.
- source_word: לֹא עַם בִּינוֹת הוּא
  english_pob_choice: this is not a people of understanding
  chosen_spanish: no es un pueblo de entendimiento
  alternatives_spanish:
  - no es un pueblo entendido
  - este pueblo no tiene entendimiento
  lexicon: HALOT
  rationale: '''Pueblo de entendimiento'' conserva la construcción hebrea y el juicio corporativo. ''Entendimiento'' mantiene la fuerza de בִּינוֹת sin desplazarla a un ámbito meramente intelectual moderno.'
- source_word: עֹשֵׂהוּ
  english_pob_choice: its Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - el que lo hizo
  - su Creador
  lexicon: HALOT
  rationale: '''Hacedor'' preserva el título participial y la resonancia de acción creadora sin forzar el término más técnico ''Creador'', que podría desdibujar el paralelo con ''Formador''.'
- source_word: וְיֹצְר֖וֹ
  english_pob_choice: the one who formed it
  chosen_spanish: su Formador
  alternatives_spanish:
  - el que lo formó
  - su Formador
  lexicon: HALOT
  rationale: '''Formador'' conserva la distinción entre עשה y יצר que el inglés POB preserva con ''Maker'' y ''the one who formed it''. El posesivo refuerza el vínculo creador con el pueblo.'
- source_word: לֹא יְחֻנֶּנּוּ
  english_pob_choice: will show it no favor
  chosen_spanish: no le mostrará favor
  alternatives_spanish:
  - no tendrá favor para con él
  - no le concederá gracia
  lexicon: HALOT
  rationale: '''Favor'' traduce bien חנן en este contexto judicial y evita imponer un lenguaje teológico más cargado. ''No le mostrará favor'' mantiene la negación del acto benévolo.'
theological_decisions:
- issue: Imagen vegetal colectiva y número gramatical
  english_pob_reading: Render the opening image collectively while preserving the feminine singular entity and the practical sense of dried growth used as fuel.
  chosen_spanish_reading: Usar 'sus ramas se secan, se quiebran' y luego 'las encienden con fuego' para reflejar una imagen colectiva, sin resolver de manera excesiva la oscilación hebrea entre singular y plural.
  alternative_spanish_readings:
  - Cuando sus ramas se secan, se rompen; mujeres vienen y las queman
  - Cuando se secan sus ramas, ellas se quiebran; mujeres vienen y las prenden
  rationale: El hebreo alterna entre formas singulares y plurales, probablemente por la imagen colectiva de vegetación/vid. En español, la frase debe sonar natural pero seguir mostrando que el objeto son restos vegetales secos destinados al fuego. Se evita homogeneizar todo a singular o a un sujeto humano.
  doctrine_reference: Translation philosophy §3, §5
- issue: Doble título creativo aplicado al juicio
  english_pob_reading: Retain both 'Maker' and 'the one who formed it' as parallel divine descriptions and render the result as withheld compassion/favor.
  chosen_spanish_reading: Conservar 'su Hacedor' y 'su Formador' como títulos paralelos, con 'no tendrá compasión' y 'no le mostrará favor'.
  alternative_spanish_readings:
  - Dios no tendrá compasión de él y no le mostrará favor
  - su Creador no le tendrá piedad
  rationale: 'El texto hebreo yuxtapone dos verbos de creación (עשה / יצר) para subrayar la ironía judicial: el mismo Dios que formó al pueblo retira su favor. En español conviene preservar ambos títulos y no fusionarlos en una sola designación más interpretativa.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés POB que cambió 'harvest' por 'boughs' y ajustó los plurales ('they are broken', 'with them') para corresponder mejor al hebreo. En español, eso se refleja con 'ramas', plural verbal y el combustible vegetal en la escena.
  spanish_consistency_notes:
  - He mantenido 'Yahvé' no porque aparezca explícitamente en este versículo, sino porque aquí el texto usa títulos creativos ('su Hacedor', 'su Formador') que preservan la referencia divina sin sustituirla por una convención eclesial.
  - '''Favor'' se usa como equivalente de חנן en un contexto de juicio; no se reemplazó por ''gracia'' para no cargar el enunciado con un matiz doctrinal más amplio que el del hebreo en esta línea.'
  - '''Entendimiento'' conserva la raíz de בִּינוֹת sin volverla una mera capacidad intelectual; en español mantiene la idea de discernimiento moral e intelectual colectiva.'
