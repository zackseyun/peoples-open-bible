translation:
  language: es
  text: Y cuando los sacerdotes de Nanea[a] habían dispuesto estas cosas, y él había llegado con unos pocos hombres al recinto del templo, cerraron el templo en cuanto Antíoco entró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Ναναίου puede representarse en español como «Nanea» o «Nanaia». El texto principal conserva la forma más cercana al testimonio griego de esta edición.
    reason: lexical_alternative
lexical_decisions:
- source_word: προθεμένων
  english_pob_choice: had set ... out
  chosen_spanish: habían puesto ...
  alternatives_spanish:
  - habían dispuesto ...
  - habían presentado ...
  lexicon: LSJ
  rationale: El aoristo participial indica la acción concreta de colocar o disponer los objetos antes del ingreso de Antioquías. «Habían puesto» conserva la sencillez y la materialidad del acto sin añadir contenido no explicitado.
- source_word: αὐτά
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - ellos
  - aquello
  lexicon: LSJ
  rationale: El pronombre carece de sustantivo expreso en el versículo; «estas cosas» mantiene la referencia abierta, como en el audit trail inglés, sin identificar indebidamente qué objetos eran.
- source_word: τῶν ἱερέων τοῦ Ναναίου
  english_pob_choice: the priests of Nanea
  chosen_spanish: los sacerdotes de Nanea
  alternatives_spanish:
  - los sacerdotes de Nanaia
  - los sacerdotes nanéanos
  lexicon: LSJ
  rationale: Se conserva la forma cercana al griego de Swete, siguiendo la decisión inglesa de mantener el nombre divino en una forma próxima al testimonio griego. «Nanea» es clara y coherente con el POB inglés.
- source_word: προσελθόντος
  english_pob_choice: had come
  chosen_spanish: había entrado
  alternatives_spanish:
  - se había acercado
  - había llegado
  lexicon: LSJ
  rationale: En este contexto el participio describe la llegada de Antioquías al espacio sagrado. «Había entrado» encaja con la secuencia narrativa y con el hecho de que luego se cierra el recinto cuando él entra.
- source_word: μετʼ ὀλίγων
  english_pob_choice: with a few men
  chosen_spanish: con unos pocos hombres
  alternatives_spanish:
  - con unos pocos
  - con poca gente
  lexicon: LSJ
  rationale: La adición de «hombres» en inglés responde al contexto; en español también es natural y explícito. «Unos pocos hombres» preserva la modestia del grupo sin exagerar.
- source_word: περίβολον
  english_pob_choice: enclosure
  chosen_spanish: recinto
  alternatives_spanish:
  - enclosure
  - perímetro
  lexicon: LSJ
  rationale: «Recinto» reproduce bien la idea de un espacio cercado o delimitado. Es más natural en español que «enclosure» y mantiene la amplitud espacial del término griego.
- source_word: τέμενος
  english_pob_choice: temple precinct
  chosen_spanish: templo
  alternatives_spanish:
  - precinto sagrado
  - recinto sagrado
  lexicon: LSJ
  rationale: Para evitar una redundancia pesada con «recinto», se traduce aquí por «templo», manteniendo la oposición narrativa con τὸ ἱερόν y la acción de cerrar el lugar de culto. El contexto ya diferencia el espacio interior del acceso exterior.
- source_word: συγκλείσαντες τὸ ἱερόν
  english_pob_choice: they shut the temple
  chosen_spanish: cerraron el santuario
  alternatives_spanish:
  - cerraron el templo
  - cerraron el santuario del templo
  lexicon: LSJ
  rationale: «Ἱερόν» puede ser «templo» o «santuario»; se eligió «santuario» para conservar el matiz de lugar sagrado y para distinguirlo del «templo» del miembro anterior, siguiendo el principio de contraste espacial del audit trail inglés.
- source_word: ὡς εἰσῆλθεν
  english_pob_choice: as soon as ... entered
  chosen_spanish: en cuanto ... entró
  alternatives_spanish:
  - cuando ... entró
  - apenas ... entró
  lexicon: LSJ
  rationale: La partícula temporal expresa inmediatez. «En cuanto» reproduce bien la rapidez de la reacción de los sacerdotes.
- source_word: Ἀντίοχος
  english_pob_choice: Antiochus
  chosen_spanish: Antioquías
  alternatives_spanish:
  - Antíoco
  - Antioquio
  lexicon: LSJ
  rationale: Se opta por la forma tradicional española «Antioquías» para el nombre del rey, común en biblias hispanas y plenamente inteligible, sin alterar la identificación histórica del personaje.
theological_decisions:
- issue: Distinción espacial entre περίβολον y τὸ ἱερόν
  english_pob_reading: The English POB distinguishes 'the enclosure of the temple precinct' from 'the temple' to preserve the layered sacred-space language.
  chosen_spanish_reading: «el recinto del templo» / «el santuario»
  alternative_spanish_readings:
  - «el recinto del santuario» / «el templo»
  - «el atrio del templo» / «el santuario»
  rationale: El griego presenta dos términos distintos para espacio exterior/circundante y para el lugar sagrado. El español mantiene esa tensión con «recinto del templo» y «santuario», evitando fusionarlos en una sola idea.
  doctrine_reference: N/A (cuestión espacial y narrativa, no doctrinal)
- issue: Forma del nombre divino o cultual Ναναίου
  english_pob_reading: Nanea / Nanaia are both possible; the English text keeps 'Nanea' close to Swete.
  chosen_spanish_reading: Nanea
  alternative_spanish_readings:
  - Nanaia
  rationale: Se conserva una forma cercana al testimonio griego usado aquí y coherente con la decisión auditada en inglés. No se introduce una adaptación interpretativa adicional.
  doctrine_reference: N/A (transliteración propia)
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió distinguir τοῦ τεμένους de τὸ ἱερόν, pero en español se resolvió con «recinto del templo» y «santuario» para conservar la diferencia sin repetir «templo» de manera pesada. También se ajustó el nombre propio de Antiochus a la forma española tradicional «Antioquías», manteniendo el referente histórico y la secuencia narrativa inmediata.
  spanish_consistency_notes:
  - Se mantiene «Nanea» para el nombre cultual, coherente con el audit trail inglés.
  - Se usa «santuario» para τὸ ἱερόν y «recinto del templo» para περίβολον τοῦ τεμένους, preservando el contraste espacial.
  - Se conserva el tono narrativo sobrio y el orden de eventos del original.
  - La forma verbal compuesta en español refleja adecuadamente los participios aoristos del griego sin sobrecargar la sintaxis.
