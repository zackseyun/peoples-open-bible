revisions:
- from: 'Entonces midió la longitud del edificio que daba frente al área separada que estaba detrás de él[a], con sus galerías a un lado y al otro: cien codos[b]; y el templo interior y los pórticos del atrio.'
  to: 'Entonces midió la longitud del edificio que daba frente al área separada que estaba detrás de él, con sus galerías[a] a un lado y al otro: cien codos; y la nave interior[b] y los pórticos del atrio.'
  rationale: Se reubicaron los marcadores de notas para que correspondan exactamente a las expresiones explicadas por la auditoría léxica. Se corrigió «colonnadas» a «columnatas». Además, se ajustó «el templo interior» a «la nave interior» para seguir la decisión principal del POB inglés, manteniendo las otras posibilidades en nota. El resto del versículo se conserva por ser fiel y natural.
