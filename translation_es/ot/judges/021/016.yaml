review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: hablan los ancianos de la congregación, plantean una deliberación comunitaria y expresan la razón causal con כִּי. Sin embargo, en el texto principal no reproduce adecuadamente la decisión auditada del POB para לְנָשִׁים (''for wives'') y además conserva de forma demasiado literal ''de Benjamín ha sido destruida una mujer'', aunque el propio rastro inglés trata esa formulación como literal de nota y no como la mejor redacción principal. El sentido fuente es colectivo: no quedan mujeres de Benjamín para servir como esposas a los que quedaron.'
  spanish_quality_summary: El español es mayormente comprensible, pero 'dar mujeres' suena áspero y objetual en un modo que no ayuda a la legibilidad, y 'de Benjamín ha sido destruida una mujer' resulta torpe y potencialmente confuso en español moderno. Una redacción más natural y fiel sería '¿Qué haremos para conseguirles esposas a los que han quedado, puesto que las mujeres de Benjamín han sido destruidas?' manteniendo la literalidad singular colectiva en nota.
  glossary_alignment: No hay términos del glosario mayor afectados salvo la necesidad de reflejar el valor matrimonial de לְנָשִׁים con 'esposas' y no simplemente 'mujeres'. 'Congregación' está alineado con la decisión documentada para הָעֵדָה. La nota debe conservar la observación de que אִשָּׁה singular se usa colectivamente.
  issues:
  - severity: medium
    issue: לְנָשִׁים se vierte en el texto principal como 'dar mujeres' en vez de expresar claramente 'para esposas'.
    rationale: La decisión inglesa auditada eligió 'for wives' precisamente para marcar el sentido matrimonial contextual. En español, 'mujeres' sin más debilita ese matiz y 'dar mujeres' suena innecesariamente tosco.
  - severity: medium
    issue: La cláusula principal conserva literalmente 'de Benjamín ha sido destruida una mujer'.
    rationale: Aunque el hebreo usa singular colectivo, el POB inglés lo relegó a nota léxica y comunicó el sentido principal como colectivo. En español, mantener la literalidad en el texto principal oscurece el sentido y reduce la legibilidad.
  - severity: low
    issue: '''¿Qué haremos para dar mujeres...?'' es menos idiomático que una formulación con ''conseguirles esposas''.'
    rationale: El español bíblico moderno y neutral gana claridad con una formulación que indique propósito matrimonial sin sonar forzada ni paraprástica.
  revised_spanish_text: 'Entonces los ancianos de la congregación dijeron[a]: «¿Qué haremos para conseguirles esposas a los que han quedado, puesto que las mujeres de Benjamín han sido destruidas?»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «puesto que de Benjamín ha sido destruida una mujer», con el singular «mujer» usado de manera colectiva para las mujeres de Benjamín.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal al sentido fuente comunicado en la auditoría inglesa: לְנָשִׁים se expresa como ''esposas'' y el singular colectivo de אִשָּׁה se conserva en nota, no en el cuerpo del versículo, para evitar confusión en español. ''Conseguirles esposas'' transmite con claridad la finalidad matrimonial sin añadir contenido no presente en el hebreo.'
