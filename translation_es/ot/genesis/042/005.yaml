translation:
  language: es
  text: Los hijos de Israel vinieron a comprar grano[a] entre los que venían, porque había hambruna en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «comprar»; el verbo hebreo puede ir sin objeto explícito, pero en este contexto de hambruna se refiere a comprar grano o alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron a
  lexicon: HALOT
  rationale: El wayyiqtol narra el siguiente evento en secuencia. En español, «vinieron» conserva el movimiento de llegada con naturalidad narrativa y evita un calco rígido de «came».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los niños de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos/ hijos varones de Israel». En este contexto designa a los hijos de Jacob, y «hijos de Israel» mantiene el vínculo textual y la precisión contextual sin volverlo una denominación genérica eclesiástica.
- source_word: לִשְׁבֹּר
  english_pob_choice: to buy grain
  chosen_spanish: comprar grano
  alternatives_spanish:
  - comprar
  - comprar alimentos
  lexicon: HALOT
  rationale: El verbo admite el sentido básico de «comprar», pero en este contexto de hambre se refiere a comprar alimento, especialmente grano. «Comprar grano» preserva la explicitación contextual del POB inglés sin exagerar el alcance.
- source_word: בְּתוֹךְ הַבָּאִים
  english_pob_choice: among those who were coming
  chosen_spanish: entre los que venían
  alternatives_spanish:
  - en medio de los que venían
  - entre los que llegaban
  lexicon: HALOT
  rationale: La preposición y el participio indican estar dentro de un grupo en movimiento. «Entre los que venían» mantiene la idea de compañía o inserción dentro del flujo de personas que se acercaban a comprar.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acción. «Porque» es la opción más directa y natural en español moderno.
- source_word: הָיָה הָרָעָב
  english_pob_choice: the famine was
  chosen_spanish: el hambre estaba
  alternatives_spanish:
  - había hambre
  - el hambre era
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula de estado/existencia. «El hambre estaba» conserva esa estructura sin forzar una fórmula impersonal; en español, «hambre» comunica el estado de necesidad generalizado del relato.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en el país de Canaán
  lexicon: HALOT
  rationale: «Tierra de Canaán» reproduce la expresión geográfica e histórica del hebreo y mantiene su peso narrativo. «Tierra» es preferible a «país» aquí por su resonancia bíblica y territorial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el tramo final del texto hebreo y la última revisión inglesa que favorece «among those who were coming» como traducción más cercana de בְּתוֹךְ הַבָּאִים. En español se decidió una estructura natural equivalente («entre los que venían») para conservar la imagen de grupo en movimiento sin repetir innecesariamente la raíz «venir».
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» como equivalente estable de בְּנֵי יִשְׂרָאֵל en un contexto genealógico/narrativo, no como fórmula litúrgica.
  - «Grano» se usa para explicitar el objeto implícito de לִשְׁבֹּר en el contexto de la hambruna, siguiendo la decisión inglesa y sin añadir información ajena al pasaje.
  - «Tierra de Canaán» conserva la expresión geográfica tradicional y transparente para lectores bíblicos en español.
