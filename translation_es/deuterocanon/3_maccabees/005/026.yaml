translation:
  language: es
  text: Pero los rayos del sol aún no se habían esparcido, y mientras el rey recibía a sus amigos[a], Hermón se acercó y los convocó para la salida[b], señalando que la prontitud del rey estaba lista.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cortesanos»; en el lenguaje cortesano helenístico, «amigos» puede funcionar como designación oficial de los compañeros reales.
    reason: lexical_alternative
  - marker: b
    text: O «a la partida». La expresión griega probablemente significa que Hermón convocó a los presentes para ponerse en marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  english_pob_choice: had not yet
  chosen_spanish: aún no se habían
  alternatives_spanish:
  - todavía no se habían
  - aún no habían
  lexicon: LSJ
  rationale: El griego expresa una negación temporal previa a una acción no cumplida. En español, «aún no se habían» conserva el valor aspectual de una acción todavía no realizada en el pasado narrativo.
- source_word: ἡλίου βολαὶ
  english_pob_choice: the sun’s rays
  chosen_spanish: los rayos del sol
  alternatives_spanish:
  - los haces del sol
  - los resplandores del sol
  lexicon: LSJ
  rationale: βολαί con ἡλίου es idiomático para «rayos» o «resplandores». «Rayos del sol» es natural y fiel a la imagen.
- source_word: κατεσπείροντο
  english_pob_choice: had ... spread out
  chosen_spanish: se habían esparcido
  alternatives_spanish:
  - se habían dispersado
  - se estaban extendiendo
  lexicon: LSJ
  rationale: El verbo sugiere una imagen de esparcir/sembrar hacia abajo. «Se habían esparcido» comunica bien la expansión de la luz sin forzar una literalidad extraña.
- source_word: τοῦ βασιλέως τοὺς φίλους ἐκδεχόμενον
  english_pob_choice: while the king was receiving his friends
  chosen_spanish: mientras el rey recibía a sus amigos
  alternatives_spanish:
  - mientras el rey recibía a sus compañeros
  - mientras el rey recibía a sus cortesanos
  lexicon: LSJ
  rationale: ἐκδέχομαι aquí encaja con «recibir» en un contexto de corte. Se mantiene «amigos» porque el griego dice φίλους; las otras opciones explicitan el matiz cortesano documentado en el audit trail.
- source_word: τοὺς φίλους
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - sus cortesanos
  lexicon: LSJ
  rationale: La traducción principal sigue el término literal del griego. En contexto helenístico de corte, φίλοι puede funcionar como designación oficial de los allegados del rey, pero el texto base permite «amigos».
- source_word: ὁ Ἕρμων
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: transliteration
  rationale: Se usa la transliteración al español con acento gráfico para la pronunciación natural en español.
- source_word: παραστὰς
  english_pob_choice: came forward
  chosen_spanish: se acercó
  alternatives_spanish:
  - dio un paso al frente
  - se puso en pie
  lexicon: LSJ
  rationale: El participio aoristo indica que Hermón se aproxima y toma presencia ante el rey. «Se acercó» es claro y sobrio en español.
- source_word: ἐπικαλεῖ πρὸς τὴν ἔξοδον
  english_pob_choice: summoned them to the departure
  chosen_spanish: los convocó para la salida
  alternatives_spanish:
  - los llamó para salir
  - los convocó a partir
  lexicon: LSJ
  rationale: La expresión es compacta y alude a una orden de ponerse en marcha. «Los convocó para la salida» preserva el sentido de convocatoria hacia la partida sin volverlo explicativo en exceso.
- source_word: ὑποδεικνὺς
  english_pob_choice: pointing out
  chosen_spanish: señalando
  alternatives_spanish:
  - indicando
  - mostrando
  lexicon: LSJ
  rationale: El participio introduce la explicación de Hermón. «Señalando» funciona bien en español como gerundio narrativo y conserva la función explicativa.
- source_word: τὸ πρόθυμον τοῦ βασιλέως
  english_pob_choice: the king’s eagerness
  chosen_spanish: el empeño del rey
  alternatives_spanish:
  - la prisa del rey
  - la disposición del rey
  lexicon: LSJ
  rationale: πρόθυμον abarca prontitud, disposición y empeño. «Empeño» recoge bien la fuerza volitiva que Hermón resalta, sin perder la idea de prontitud.
- source_word: ἐν ἑτοίμῳ κεῖσθαι
  english_pob_choice: was in readiness
  chosen_spanish: estaba en disposición
  alternatives_spanish:
  - estaba listo
  - estaba preparado
  lexicon: LSJ
  rationale: La locución expresa estar listo o en estado de preparación. «Estaba en disposición» conserva un tono formal y la idea de estar ya preparado para actuar.
theological_decisions:
- issue: Referencia a la ‘salida’ como partida ordinaria, no como salida litúrgica o liberación soteriológica
  english_pob_reading: Hermon summoned them to the departure, pointing out that the king’s eagerness was in readiness.
  chosen_spanish_reading: Hermón los convocó para la salida, señalando que el empeño del rey estaba en disposición.
  alternative_spanish_readings:
  - Hermón los llamó para salir
  - Hermón los convocó a partir
  rationale: El contexto griego es cortesano y narrativo; ἔξοδος aquí denota partida o salida del lugar. Evito cargar el término con matices teológicos o ceremoniales no presentes en el pasaje.
  doctrine_reference: Lexical/contextual reading; no doctrinal claim
- issue: ‘Friends’ como término cortesano sin borrar su sentido literal
  english_pob_reading: the king was receiving his friends
  chosen_spanish_reading: el rey recibía a sus amigos
  alternative_spanish_readings:
  - el rey recibía a sus compañeros
  - el rey recibía a sus cortesanos
  rationale: El audit trail documenta que φίλοι puede funcionar como título de corte en helenístico. Mantener «amigos» preserva la base léxica del texto, mientras la nota explica el posible matiz oficial sin imponerlo en el cuerpo principal.
  doctrine_reference: Lexical/contextual reading; no doctrinal claim
translation_notes:
  revision_awareness: 'Se siguió la última revisión del audit trail, que prefirió una formulación más natural para ἐπικαλεῖ πρὸς τὴν ἔξοδον y ἐν ἑτοίμῳ κεῖσθαι. En español se mantuvo ese ajuste con un equivalente idiomático: ‘los convocó para la salida’ y ‘estaba en disposición’.'
  spanish_consistency_notes:
  - Se conservó un registro narrativo sobrio y formal, apto para lectura pública.
  - Se evitó ‘SEÑOR’ u otras sustituciones no presentes, ya que no hay término divino en el versículo.
  - Se mantuvo la diferencia entre la imagen de luz ‘esparcida’ y la acción de convocar a una salida, sin fusionarlas.
  - ‘Hermón’ se acentuó para lectura natural en español; el nombre propio no altera el contenido semántico.
