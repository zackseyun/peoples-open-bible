base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/012.yaml
  text: Is this not the word that we spoke to you in Egypt[a], saying, ‘Leave us alone[c][b], and let us serve the Egyptians’? For it is better for us to serve the Egyptians than to die in the wilderness.
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this thing' for 'this ... word' (זֶה הַדָּבָר).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Leave off from us' is an idiom meaning 'Leave us alone' or 'Stop bothering us.'
    reason: lexical_alternative
  - marker: c
    text: Or 'it is better for us to serve the Egyptians than to die in the wilderness.' The Hebrew states the comparison without an explicit auxiliary; English may express it as a present general statement or a retrospective complaint.
    reason: lexical_alternative
