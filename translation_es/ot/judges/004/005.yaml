    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'for justice' or 'for a legal decision.' The Hebrew term can denote judicial decision-making or the administration of justice.
    reason: lexical_alternative
