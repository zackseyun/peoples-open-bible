review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo y mantiene correctamente «el sacerdocio» para כְּהֻנָּה. También conserva la alternativa léxica para «los hijos de Leví / los levitas». Sin embargo, no preserva bien el cambio de número en וּבִקַּשְׁתֶּם: el hebreo pasa de singular («te ha acercado») a plural («ustedes buscan»), y el borrador lo convierte en tercera persona plural («buscan»), lo que desdibuja que Moisés sigue dirigiéndose a Coré y su grupo. Además, «y además» no expresa tan claramente la fuerza adversativa contextual señalada por el POB inglés.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «y además buscan» suena algo torpe tras la dirección en segunda persona singular. Una formulación como «pero ustedes también buscan el sacerdocio» o «y aun así ustedes buscan...» refleja mejor el reproche y la transición singular→plural. También conviene evitar la reordenación «y contigo a todos tus hermanos» en favor de una secuencia más natural y más cercana al hebreo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Leví», «sacerdocio», y la nota alternativa «los levitas» están bien. No hay conflicto con términos teológicos mayores. El ajuste principal es gramatical-discursivo, no de glosario.'
  issues:
  - severity: high
    issue: Cambio incorrecto de persona/número en «buscan»
    rationale: 'וּבִקַּשְׁתֶּם es 2mp, no 3mp. El español debe reflejar que Moisés se dirige a Coré y su compañía: «ustedes buscan» o equivalente.'
  - severity: medium
    issue: La conjunción «y además» debilita la fuerza adversativa contextual
    rationale: Aunque גַּם es aditivo, el contexto de reprensión justifica una formulación como «pero también» o «y aun así ... también», en línea con la decisión auditada del POB inglés («yet ... as well»).
  - severity: low
    issue: Orden algo poco natural en «y contigo a todos tus hermanos»
    rationale: Es comprensible, pero «y a todos tus hermanos, los hijos de Leví, contigo» suena más natural y representa mejor la secuencia hebrea y la nota alternativa.
  revised_spanish_text: Él te ha acercado[a], y a todos tus hermanos, los hijos de Leví, contigo; pero ustedes también buscan el sacerdocio.
  revised_footnotes:
  - marker: a
    text: 'O: «y a todos tus hermanos, los levitas, contigo».'
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia para reflejar el cambio deliberado del hebreo de singular a plural, se mejora la fuerza adversativa del reproche sin perder el valor aditivo de גַּם, y se ajusta el orden de la frase media para mayor naturalidad y transparencia respecto al original.
