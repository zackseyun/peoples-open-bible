revisions:
- from: Y la persona que se vuelva a los médiums y a los espiritistas[a], para prostituirse tras ellos[b], yo pondré mi rostro contra esa persona y la cortaré[c] de entre su pueblo.
  to: Y la persona que se vuelva a los médiums y a los espiritistas[a], para prostituirse tras ellos[b], yo pondré mi rostro contra esa persona y la eliminaré[c] de entre su pueblo.
  rationale: Se revisa únicamente lo necesario para que el español comunique con claridad la sanción jurídica sin sugerir un corte físico literal. «La eliminaré» funciona mejor en español corriente y, mediante la nota, preserva el trasfondo técnico de כרת y su carácter no especificado. También se ajusta la nota b para mantener la metáfora sexual sin una formulación de género marcada.
