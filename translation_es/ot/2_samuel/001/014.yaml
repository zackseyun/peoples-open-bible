base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/001/014.yaml
  text: Then David said to him[b][a], “How were you not afraid to put out your hand to destroy Yahweh’s anointed?”
  footnotes:
  - marker: a
    text: Or, “Why were you not afraid…?” The Hebrew אֵיךְ literally means “How?” and expresses shocked reproach.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the LORD’s anointed.” That is, the king consecrated by the LORD.'
    reason: cultural_note
