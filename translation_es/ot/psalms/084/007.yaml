base_translation:
  language: en
  yaml_path: translation/ot/psalms/084/007.yaml
  text: As they pass through the Valley of Baca[a], they make it a spring[b]; even the early rain covers it with blessings.
  footnotes:
  - marker: a
    text: Baca may echo the Hebrew word for 'weeping'; hence, 'the Valley of Weeping.'
    reason: alternative_reading
  - marker: b
    text: Or 'the autumn rain.' The Hebrew word can also mean 'teacher,' but in this context it is commonly understood as seasonal rain.
    reason: lexical_alternative
