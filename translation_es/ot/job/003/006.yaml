translation:
  language: es
  text: En cuanto a aquella noche, que la oscuridad la tome; que no sea unida[a] a los días del año; que no entre en el número de los meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no sea contada entre los días del año». El verbo hebreo es raro aquí; algunos lo entienden como exclusión del calendario más que como falta de regocijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלַּיְלָה הַהוּא
  english_pob_choice: As for that night
  chosen_spanish: En cuanto a aquella noche
  alternatives_spanish:
  - Aquella noche
  - En cuanto a esa noche
  lexicon: HALOT
  rationale: El hebreo adelanta la expresión para dar énfasis temático; ‘En cuanto a aquella noche’ conserva esa topicalización sin perder naturalidad en español.
- source_word: יִקָּחֵהוּ
  english_pob_choice: let ... seize it
  chosen_spanish: que la oscuridad la tome
  alternatives_spanish:
  - que la oscuridad la arrebate
  - que la oscuridad la capture
  lexicon: HALOT
  rationale: לקח significa literalmente ‘tomar’. En este contexto de una noche sometida por la oscuridad, ‘la tome’ es fiel y más sobrio que una paráfrasis intensiva; mantiene la personificación sin añadir fuerza no requerida por el texto.
- source_word: אֹפֶל
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad profunda
  lexicon: HALOT
  rationale: אֹפֶל denota oscuridad/gloom. ‘Oscuridad’ es la opción más clara y amplia en español, y conserva el sentido del agente que se apodera de la noche.
- source_word: אַל יִחַדְּ
  english_pob_choice: let it not be joined
  chosen_spanish: que no sea contada[b]
  alternatives_spanish:
  - que no sea unida
  - que no se junte
  - que no participe
  lexicon: HALOT
  rationale: La raíz יחד en esta forma rara admite una lectura de inclusión o asociación. Dado el contexto del calendario, ‘ser contada’ transmite la idea de ser incluida entre los días del año; se preserva la alternativa semántica en nota.
- source_word: בִּימֵי שָׁנָה
  english_pob_choice: among the days of the year
  chosen_spanish: entre los días del año
  alternatives_spanish:
  - en los días del año
  - junto con los días del año
  lexicon: HALOT
  rationale: La preposición ב expresa pertenencia dentro de un conjunto; ‘entre’ comunica inclusión en la serie anual de forma natural y precisa.
- source_word: בְּמִסְפַּר יְרָחִים
  english_pob_choice: into the number of the months
  chosen_spanish: en el número de los meses
  alternatives_spanish:
  - en la cuenta de los meses
  - entre los meses
  lexicon: HALOT
  rationale: La frase habla de ser incorporada al conteo de los meses. ‘En el número de los meses’ conserva la imagen de registro/cómputo del original.
- source_word: יָבֹא
  english_pob_choice: let it not enter
  chosen_spanish: que no entre
  alternatives_spanish:
  - que no llegue
  - que no sea incluida
  lexicon: HALOT
  rationale: בוא significa ‘venir/entrar’. Con el lenguaje de número o cómputo, ‘entre’ expresa bien la admisión a un registro o lista.
translation_notes:
  revision_awareness: Se siguió de cerca el último estado revisado del POB en inglés, manteniendo la estructura de maldición y la progresión paralela. Se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una equivalencia más natural en español, especialmente en יִחַדְּ, cuya ambigüedad se preserva con nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiriera; este verso no contiene el nombre divino.
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Entre» y «en el número de los meses» conservan el campo semántico de inclusión/cómputo sin interpretar el texto más allá de lo que permite el hebreo.
