revisions:
- from: 'Entonces Saúl dijo a David: «Aquí está mi hija mayor Merab; te la daré por esposa. Solo sé para mí un hombre valeroso[a], y pelea las batallas de Yahvé». Porque Saúl decía: «No sea mi mano contra él, sino sea contra él la mano de los filisteos».'
  to: 'Entonces Saúl dijo a David: «Aquí está mi hija mayor, Merab; te la daré por esposa. Solo sé para mí un hombre valeroso[a], y pelea las batallas de Yahvé». Porque Saúl dijo: «Que mi mano no esté contra él, sino que la mano de los filisteos esté contra él».'
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad narrativa y naturalidad del español sin cambiar el sentido: se añadió una coma de aposición en «mi hija mayor, Merab»; se cambió «decía» por «dijo» para reflejar mejor la cláusula explicativa del hebreo; y se reformuló el volitivo con «Que mi mano no esté contra él...» para conservar la metáfora de «mano» en un español más idiomático. La terminología clave del proyecto, especialmente «Yahvé», se mantiene intacta.'
