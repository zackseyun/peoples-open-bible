translation:
  language: es
  text: Jefe Dishón, jefe Ézer, jefe Dishán—estos eran los jefes de los horeos según sus jefes[a] en la tierra de Seír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por sus jefes'; el hebreo לְאַלֻּפֵיהֶם puede denotar una clasificación por jefes o por las divisiones encabezadas por ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder
  - jefe de clan
  lexicon: HALOT; BDB
  rationale: En Génesis 36, אַלּוּף designa un dirigente tribal o clánico. 'Jefe' comunica bien esa función en español contemporáneo sin la carga arcaizante de 'duque'. Mantiene además la repetición estructural del hebreo.
- source_word: דִּשֹׁן
  english_pob_choice: Dishon
  chosen_spanish: Dishón
  alternatives_spanish:
  - Dishon
  lexicon: Nombre propio transliterado
  rationale: Nombre propio hebreo; se conserva transliteración estándar al español, ajustando acentuación gráfica para lectura fluida.
- source_word: אֵצֶר
  english_pob_choice: Ezer
  chosen_spanish: Ézer
  alternatives_spanish:
  - Ezer
  lexicon: Nombre propio transliterado
  rationale: Nombre propio hebreo; se translitera y se acentúa para indicar la sílaba tónica en español.
- source_word: דִּישָׁן
  english_pob_choice: Dishan
  chosen_spanish: Dishán
  alternatives_spanish:
  - Dishan
  lexicon: Nombre propio transliterado
  rationale: Nombre propio hebreo; se diferencia claramente de Dishón y se adapta con acento gráfico para la pronunciación española.
- source_word: אֵלֶּה
  english_pob_choice: these were
  chosen_spanish: estos eran
  alternatives_spanish:
  - estos son
  - estos
  lexicon: HALOT
  rationale: 'La cláusula nominal hebrea en un resumen genealógico se expresa naturalmente en español con pasado: ''estos eran''.'
- source_word: אַלּוּפֵי הַחֹרִי
  english_pob_choice: the chiefs of the Horites
  chosen_spanish: los jefes de los horeos
  alternatives_spanish:
  - los jefes de los horitas
  - los caudillos de los horeos
  lexicon: HALOT
  rationale: '''Horeos'' refleja con naturalidad el etnónimo bíblico en español; ''jefes'' conserva el valor de liderazgo de אַלּוּף.'
- source_word: לְאַלֻּפֵיהֶם
  english_pob_choice: according to their chiefs
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus jefes
  - por sus jefes
  - según sus jefaturas
  lexicon: HALOT; revisión POB
  rationale: El contexto de lista clasificatoria sugiere que לְאַלֻּפֵיהֶם puede señalar divisiones o clanes asociados a un jefe. En español, 'según sus clanes' evita la tautología de 'jefes... según sus jefes' y conserva la idea de clasificación tribal; la alternativa 'según sus jefes' se mantiene en nota por la ambigüedad textual.
- source_word: בְּאֶרֶץ שֵׂעִיר
  english_pob_choice: in the land of Seir
  chosen_spanish: en la tierra de Seír
  alternatives_spanish:
  - en el país de Seír
  - en Seír
  lexicon: Uso geográfico bíblico estándar
  rationale: '''Tierra de Seír'' es una equivalencia natural y formal para la expresión geográfica hebrea, manteniendo el paralelismo con el texto fuente.'
translation_notes:
  revision_awareness: 'He tenido en cuenta las revisiones del POB inglés: se descartó ''según sus clanes'' en el inglés final a favor de ''according to their chiefs''. Para el español, sin embargo, la tautología resultante (''jefes... según sus jefes'') sería menos natural; por eso se preserva la tensión semántica con una nota, usando ''según sus clanes'' en el texto principal para comunicar la función clasificatoria posible de לְאַלֻּפֵיהֶם sin perder la lectura alternativa documentada.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene 'jefe' para אַלּוּף de manera consistente con el registro genealógico/tribal.
  - Los nombres propios se adaptan con tilde cuando mejora la pronunciación española y no altera la identificación del nombre.
  - '''Horeos'' se emplea como etnónimo estable en español bíblico.'
  - La puntuación con raya reproduce la pausa enumerativa del hebreo y de la tradición POB.
