translation:
  language: es
  text: ¿No es el día de Yahvé tinieblas, y no luz, y oscuridad[a] sin resplandor en él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y oscuridad, sin resplandor para él’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es...
  alternatives_spanish:
  - ¿Acaso no es...
  - ¿No será...
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica que espera respuesta afirmativa; en español, ‘¿No es...?’ conserva mejor esa fuerza que una afirmación suavizada.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tenebrosidad
  lexicon: HALOT
  rationale: El sustantivo expresa oscuridad real y completa. ‘Tinieblas’ mantiene el contraste bíblico tradicional con ‘luz’ y sigue el valor nominal del hebreo.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahweh
  - el día de YHWH
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética del ‘día de’ con el nombre divino traducido según la convención del proyecto: Yahvé.'
- source_word: א֑וֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: ‘Luz’ es el equivalente más natural y directo del sustantivo, y preserva el paralelismo antitético con ‘tinieblas’.
- source_word: וְאָפֵל
  english_pob_choice: and gloom
  chosen_spanish: y oscuridad
  alternatives_spanish:
  - y tinieblas
  - y sombra espesa
  lexicon: HALOT
  rationale: אָפֵל intensifica la imagen. En español, ‘oscuridad’ comunica bien el segundo término del crescendo sin forzar una equivalencia demasiado literal que sonaría opaca; por eso se deja ‘tinieblas’ para חֹשֶׁךְ y se reserva aquí ‘oscuridad’ como intensificación semántica.
- source_word: נֹגַהּ
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - claridad
  - lumbre
  lexicon: HALOT
  rationale: נֹגַהּ designa brillo o fulgor. ‘Resplandor’ expresa bien la ausencia total de cualquier emisión de luz y suena más natural en la clausula final.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: transliterar el nombre divino como ‘Yahvé’ en el texto principal, evitando la sustitución titular ‘SEÑOR’.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa desplazó ‘even gloom’ a ‘and gloom’ para reflejar de modo más directo la conjunción hebrea. En español se conservó esa coordinación simple (‘y oscuridad’) sin añadir énfasis interpretativo adicional, y se mantuvo la clausula final con un equivalente natural de לוֹ.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme a la terminología base del proyecto para יְהוָה.
  - 'Se diferenciaron los dos términos de oscuridad del hebreo: חֹשֶׁךְ con ‘tinieblas’ y אָפֵל con ‘oscuridad’, para no borrar la intensificación poética.'
  - ‘Resplandor’ se eligió para נֹגַהּ por su valor nominal de brillo/fulgor y por la fluidez de la clausula final en español.
  - La estructura interrogativa negativa se preservó para reflejar la retórica profética del hebreo.
