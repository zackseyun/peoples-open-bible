translation:
  language: es
  text: Quien da al pobre no le faltará nada[a], pero el que oculta sus ojos tendrá muchas maldiciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «cierra sus ojos» o «aparta su mirada», un modismo para ignorar deliberadamente al pobre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹתֵן
  english_pob_choice: Whoever gives
  chosen_spanish: Quien da
  alternatives_spanish:
  - El que da
  - Quien entrega
  lexicon: HALOT
  rationale: El participio qal funciona de modo proverbial y general. «Quien da» conserva el valor gnómico de acción habitual en un español natural y digno.
- source_word: לָרָשׁ
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al pobre e indigente
  lexicon: HALOT
  rationale: רָשׁ designa a una persona pobre o empobrecida. «Al pobre» es idiomático y suficientemente amplio para el singular genérico del proverbio.
- source_word: אֵין מַחְסוֹר
  english_pob_choice: will have no lack
  chosen_spanish: no tendrá falta
  alternatives_spanish:
  - no le faltará nada
  - no estará en necesidad
  lexicon: HALOT
  rationale: La negación existencial con מַחְסוֹר expresa ausencia de carencia. «No tendrá falta» mantiene el paralelismo proverbial y evita especificar el tipo de provisión.
- source_word: וּמַעְלִים עֵינָיו
  english_pob_choice: but he who hides his eyes
  chosen_spanish: pero el que oculta sus ojos
  alternatives_spanish:
  - pero el que cierra los ojos
  - pero el que aparta la mirada
  lexicon: HALOT
  rationale: La forma hifil con «ojos» es un modismo para ignorar deliberadamente al necesitado. «Oculta sus ojos» conserva la imagen verbal y deja claro el sentido ético.
- source_word: רַב מְאֵרֹת
  english_pob_choice: will have many curses
  chosen_spanish: tendrá muchas maldiciones
  alternatives_spanish:
  - tendrá numerosas maldiciones
  - cargará con muchas maldiciones
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma nominal sin verbo explícito; el español requiere una cópula/resultativa. «Tendrá muchas maldiciones» refleja la consecuencia proverbial sin añadir un matiz no presente en el texto.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefirió «will have many curses» sobre una formulación con «receive», por mayor cercanía al hebreo, que solo dice «muchas maldiciones» sin verbo explícito. La versión española igualmente evita añadir un verbo de recepción y usa una construcción resultativa natural.
  spanish_consistency_notes:
  - Se mantuvo «pobre» para רָשׁ, en línea con el valor genérico del término en el contexto sapiencial.
  - Se prefirió «maldiciones» para מְאֵרֹת, conservando el plural y el peso lexical del término.
  - La nota de pie preserva la ambigüedad idiomática de «oculta sus ojos» sin desplazar el sentido principal del texto.
