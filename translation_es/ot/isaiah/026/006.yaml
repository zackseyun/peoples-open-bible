translation:
  language: es
  text: El pie la pisotea[a]— los pies del pobre[b], los pasos de los necesitados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la pisará». El verbo hebreo puede entenderse con fuerza futura en el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Del pobre» también puede traducirse «del necesitado» o «del humilde».
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְמְסֶנָּה
  english_pob_choice: tramples it
  chosen_spanish: la pisará
  alternatives_spanish:
  - la pisotea
  - la aplastará
  - la hollará
  lexicon: HALOT
  rationale: El verbo רמס expresa la acción de pisotear o aplastar con el pie. En español, «la pisará» conserva la imagen poética y la referencia al objeto femenino del contexto inmediato; además, deja abierta la fuerza aspectual del hebreo, que puede leerse con presente poético o con valor futuro.
- source_word: רָגֶל
  english_pob_choice: the foot
  chosen_spanish: la planta del pie
  alternatives_spanish:
  - el pie
  - el pie mismo
  lexicon: HALOT
  rationale: El singular hebreo funciona de manera colectiva o poética. «La planta del pie» evita una repetición demasiado literal de «el pie» y mantiene en español la imagen concreta de la acción de pisar.
- source_word: רַגְלֵי
  english_pob_choice: the feet of
  chosen_spanish: los pies de
  alternatives_spanish:
  - los pies pertenecientes a
  - las pisadas de
  lexicon: HALOT
  rationale: La construcción en estado constructo se vierte naturalmente como «los pies de». Es la forma más clara y fiel para introducir a los sujetos del verbo en español.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el humilde
  - el necesitado
  lexicon: HALOT
  rationale: עָנִי puede designar al pobre, afligido u oprimido. Aquí la elección principal del audit trail es «the poor», y en español «el pobre» conserva esa carga social y de humillación en el contraste del contexto.
- source_word: פַּעֲמֵי
  english_pob_choice: the steps of
  chosen_spanish: las pisadas de
  alternatives_spanish:
  - los pasos de
  - las huellas de
  lexicon: HALOT
  rationale: El sustantivo se refiere a pasos o pisadas. «Las pisadas de» mantiene el paralelismo con «los pies de» y sugiere el ritmo poético del verso.
- source_word: דַלִּים
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - los necesitados
  - los pobres
  - los menesterosos
  lexicon: HALOT
  rationale: El POB inglés revisó esta palabra hacia «the needy» para distinguirla de עָנִי. En español, «el necesitado» conserva esa distinción semántica y evita repetir «pobre» en ambos miembros del paralelismo.
theological_decisions:
- issue: Referente del sufijo femenino en תִּרְמְסֶנָּה
  english_pob_reading: The suffix refers to the humbled lofty city in the immediate context.
  chosen_spanish_reading: El sufijo se refiere a la ciudad encumbrada y abatida del contexto inmediato.
  alternative_spanish_readings:
  - Un objeto femenino no especificado en español
  rationale: Como en el audit trail inglés, la referencia contextual más natural es la ciudad elevada del versículo anterior. El español mantiene esa continuidad sin añadir contenido doctrinal nuevo, solo haciendo explícito el referente implícito.
  doctrine_reference: Contexto literario inmediato de Isaías 26:5–6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del audit trail, que prefirió una distinción léxica entre עָנִי («el pobre») y דַלִּים («el necesitado»), preservando el paralelismo sin colapsar ambos términos en una sola glosa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este verso.
  - Se mantuvo un registro distinto para עָנִי y דַלִּים, conforme al audit trail inglés.
  - Se evitó «SEÑOR» y otras sustituciones no motivadas por el hebreo.
  - La sintaxis española conserva el paralelismo poético del hebreo con dos miembros coordinados.
