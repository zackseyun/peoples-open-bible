lexical_decisions:
- source_word: ἤγαγεν
  english_pob_choice: He brought
  chosen_spanish: Él trajo
  alternatives_spanish:
  - Él llevó
  - Él condujo
  lexicon: BDAG
  rationale: El aoristo de ἄγω aquí presenta a alguien introducido en escena. «Trajo» comunica con naturalidad el movimiento causativo sin añadir dirección o matiz no explicitado por el griego.
- source_word: τὸν ἀπʼ ἐσχάτου τῆς γῆς
  english_pob_choice: the one from the end of the earth
  chosen_spanish: al que viene del extremo de la tierra
  alternatives_spanish:
  - al que viene de la parte más lejana de la tierra
  - al que viene del fin de la tierra
  lexicon: BDAG
  rationale: «Extremo de la tierra» conserva la imagen geográfica extrema de ἐσχάτου. «Que viene» ayuda a expresar el valor referencial de la construcción sin rigidizarla en una forma demasiado nominal en español.
- source_word: παίοντα
  english_pob_choice: who strikes
  chosen_spanish: al que golpea
  alternatives_spanish:
  - al que hiere
  - al que azota
  lexicon: BDAG
  rationale: El participio presente de παίω denota golpear o herir. «Golpea» es claro y actual; evita un arcaísmo innecesario y conserva la fuerza verbal del original.
- source_word: κραταιῶς
  english_pob_choice: mightily
  chosen_spanish: con poder
  alternatives_spanish:
  - con fuerza
  - poderosamente
  - con gran fuerza
  lexicon: LSJ
  rationale: El adverbio expresa acción vigorosa y fuerte. «Con poder» mantiene la intensidad del griego y su tono elevado, sin cargar la frase con un adverbio más interpretativo que el texto base.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran un acuerdo alto y no registran revisiones aplicadas; la versión española sigue de cerca ese estado estable, manteniendo las dos ambigüedades léxicas señaladas por la traducción inglesa.
  spanish_consistency_notes:
  - Se conserva el orden breve y paratáctico del griego, con un solo verbo principal y dos sintagmas acusativos coordinados.
  - Se usa «tierra» sin mayúscula, porque aquí funciona como extensión geográfica y no como nombre propio.
  - Las notas al pie reflejan las alternativas léxicas documentadas por la auditoría inglesa, adaptadas a un español natural.
