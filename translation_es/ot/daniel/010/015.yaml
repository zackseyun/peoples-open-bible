translation:
  language: es
  text: Y cuando él habló[a] conmigo estas palabras, puse mi rostro hacia el suelo y me quedé sin habla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras él hablaba conmigo estas palabras».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y fui silenciado» o «y quedé mudo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַבְּרוֹ
  english_pob_choice: when he spoke
  chosen_spanish: Y cuando él habló
  alternatives_spanish:
  - mientras él hablaba
  - al hablar él
  lexicon: HALOT
  rationale: El hebreo con ב más infinitivo suele tener valor temporal. En español, «cuando él habló» mantiene ese valor de manera natural y evita un giro demasiado literal que sonaría pesado. Se conserva el sujeto explícito para claridad narrativa.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: «Conmigo» reproduce directamente la relación de compañía/comunicación del hebreo עִמִּי y encaja bien con «habló» en español. «A mí» desplaza el matiz hacia destinatario y no es la opción principal aquí.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - tales palabras
  lexicon: HALOT
  rationale: En este contexto de discurso inmediato, דְבָרִים se entiende mejor como «palabras». «Estas palabras» conserva el contenido verbal concreto y evita una generalización innecesaria.
- source_word: נָתַתִּי פָנַי אַרְצָה
  english_pob_choice: I set my face toward the ground
  chosen_spanish: puse mi rostro hacia el suelo
  alternatives_spanish:
  - dirigí mi rostro hacia el suelo
  - incliné mi rostro hacia el suelo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente habla de «dar/poner el rostro» hacia la tierra. «Puse mi rostro hacia el suelo» conserva la imagen corporal y resulta idiomático en español. «Suelo» comunica mejor que «tierra» el sentido físico inmediato.
- source_word: אַרְצָה
  english_pob_choice: toward the ground
  chosen_spanish: hacia el suelo
  alternatives_spanish:
  - hacia la tierra
  - al suelo
  lexicon: HALOT
  rationale: El sufijo direccional aporta movimiento hacia abajo. «Hacia el suelo» expresa bien esa dirección en español contemporáneo y mantiene la referencia corporal de la escena.
- source_word: וְנֶאֱלָמְתִּי
  english_pob_choice: and became speechless
  chosen_spanish: y quedé mudo
  alternatives_spanish:
  - y me quedé sin habla
  - y fui silenciado
  - y me callé
  lexicon: HALOT
  rationale: El nifal de אלם indica quedar sin capacidad de hablar o quedar callado. «Quedé mudo» comunica el efecto resultante de manera breve y natural. Aunque «mudo» puede sonar más fuerte, aquí refleja bien la incapacidad de hablar sin obligar a una lectura de mutismo permanente.
theological_decisions:
- issue: 'El matiz de וְנֶאֱלָמְתִּי: ¿silenciamiento externo o incapacidad para hablar?'
  english_pob_reading: and became speechless; alternatives included 'was silenced' or 'became mute'
  chosen_spanish_reading: y quedé mudo
  alternative_spanish_readings:
  - y fui silenciado
  - y me quedé sin habla
  - y me callé
  rationale: El contexto describe la reacción del hablante ante lo que oye; el hebreo permite tanto una idea de quedar incapaz de hablar como de quedar en silencio. «Quedé mudo» preserva esa tensión sin imponer explícitamente un agente externo ni una mutación física permanente.
  doctrine_reference: Narrative phenomenology; lexeme אלם in Niphal
- issue: Imagen corporal de נָתַתִּי פָנַי אַרְצָה
  english_pob_reading: I set my face toward the ground
  chosen_spanish_reading: puse mi rostro hacia el suelo
  alternative_spanish_readings:
  - incliné mi rostro hacia el suelo
  - dirigí mi rostro hacia el suelo
  rationale: La frase conserva la postura de reverencia/abatimiento sin convertirla en una interpretación devocional más amplia de la que el texto exige. Se evita suavizar la imagen con expresiones menos concretas.
  doctrine_reference: Hebrew idiom and embodied response
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo de Daniel 10:15 y el audit trail inglés POB. No se detectaron revisiones aplicadas en el paso más reciente; la lectura quedó estable. La versión española mantiene la secuencia temporal, la imagen idiomática del rostro hacia el suelo y la ambigüedad controlada de ונאלמתי.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto la requiere; en este versículo no aparece el tetragrámaton.
  - Se eligió «quedé mudo» para conservar la fuerza del nifal sin introducir una interpretación más específica de la causa.
  - Se prefirió «estas palabras»/«estas palabras» en nota alternativa para mantener el alcance verbal inmediato del hebreo.
