translation:
  language: es
  text: 'Entonces Jacob se acercó a Isaac, su padre, y lo tocó, y dijo: «La voz es la voz de Jacob, pero las manos son las manos de Esaú[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La voz es voz de Jacob, pero las manos son manos de Esaú».'
