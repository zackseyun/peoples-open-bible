lexical_decisions:
- source_word: רָאִיתָה
  english_pob_choice: You have seen
  chosen_spanish: Tú has visto
  alternatives_spanish:
  - Tú viste
  - Has visto
  lexicon: HALOT
  rationale: El perfecto qal 2ms expresa una acción ya realizada y dirigida a Dios. En español, el pretérito perfecto compuesto comunica bien que Dios ya ha visto la injusticia y sostiene la súplica actual.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma de uso del proyecto en español, evitando la sustitución por un título. 'Yahvé' es la forma principal del proyecto para יְהוָה.
- source_word: אַל תֶּחֱרַשׁ
  english_pob_choice: do not be silent
  chosen_spanish: no calles
  alternatives_spanish:
  - no te calles
  - no guardes silencio
  lexicon: HALOT
  rationale: חרשׁ aquí significa 'estar en silencio' o 'callar'. 'No calles' es breve, natural y mantiene la urgencia del ruego sin añadir matices ajenos.
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - oh Señor
  lexicon: HALOT
  rationale: אֲדֹנָי funciona como título divino. En español, 'Señor' es la correspondencia natural y distinguible de Yahvé por mayúscula, sin forzar un posesivo que el uso litúrgico del término no exige aquí.
- source_word: אַל תִּרְחַק
  english_pob_choice: do not be far
  chosen_spanish: no te alejes
  alternatives_spanish:
  - no estés lejos
  - no te mantengas lejos
  lexicon: HALOT
  rationale: 'רחק expresa distancia; en esta súplica el sentido es relacional: que Dios no permanezca distante. ''No te alejes'' comunica esa cercanía/ausencia de forma idiomática en español.'
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición מן con sufijo de 1cs se rinde con 'de mí'. Con 'alejarse' en español, la combinación queda clara y fluida.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. La convención del proyecto en español es transcribirlo como 'Yahvé', preservando el nombre propio de Dios en vez de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor imperativo de la negación אַל con verbos de percepción/presencia
  english_pob_reading: do not be silent / do not be far
  chosen_spanish_reading: no calles / no te alejes
  alternative_spanish_readings:
  - no guardes silencio / no estés lejos
  rationale: En el lamento del salmo, la negación expresa un ruego para que Dios no permanezca inactivo ni distante. La formulación española conserva la tensión entre silencio e intervención, y entre distancia espacial y lejanía relacional.
  doctrine_reference: Poética de los Salmos; súplica directa al Dios vivo
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantiene el perfecto para רָאִיתָה, el nombre divino como Yahvé, y la dupla poética de silencio/distancia con una formulación española natural. No se detectaron revisiones textuales pendientes en el expediente fuente.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה, conforme al estándar del proyecto en español.
  - Se evitó 'el SEÑOR' como sustituto del nombre divino para no perder la referencia explícita del hebreo.
  - '''No calles'' conserva la alternativa anotada por el equipo inglés: ''do not keep silent''.'
  - '''No te alejes de mí'' respeta el paralelismo con ''do not be far from me'' y mantiene el tono de súplica.'
  - El texto resultante es breve, poético y apto para lectura pública sin perder precisión.] }
