translation:
  language: es
  text: Y el rey Salomón y toda la asamblea de Israel que se había reunido[a] ante él, delante del arca, sacrificaban ovejas[b] y ganado vacuno, que no se podía contar ni numerar por su gran número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se había reunido con él». El hebreo permite entender que la asamblea estaba reunida en presencia de Salomón o reunida con él.'
    reason: lexical_alternative
  - marker: b
    text: «Ovejas» traduce el hebreo צֹאן, un término más amplio que puede incluir ganado menor como ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדַת יִשְׂרָאֵל
  english_pob_choice: the assembly of Israel
  chosen_spanish: la asamblea de Israel
  alternatives_spanish:
  - la congregación de Israel
  - toda la comunidad de Israel
  lexicon: HALOT
  rationale: ‘Asamblea’ expresa bien el sentido corporativo y reunido de עֵדָה/עֲדָה sin cargar el texto con un tono eclesiástico más fuerte que el hebreo exige.
- source_word: הַנּוֹעָדִים
  english_pob_choice: who had assembled
  chosen_spanish: que se había reunido
  alternatives_spanish:
  - que se habían congregado
  - que estaban reunidos
  lexicon: HALOT
  rationale: El participio niphal comunica gente convocada/reunida; en español, ‘se había reunido’ conserva el estado resultante con un registro natural y formal.
- source_word: עָלָיו
  english_pob_choice: before him
  chosen_spanish: ante él
  alternatives_spanish:
  - delante de él
  - con él
  lexicon: HALOT
  rationale: ‘Ante él’ mantiene la relación espacial/formal del hebreo y funciona bien junto con ‘delante del arca’ sin sonar redundante o ambigua.
- source_word: לִפְנֵי הָאָרוֹן
  english_pob_choice: before the ark
  chosen_spanish: delante del arca
  alternatives_spanish:
  - ante el arca
  lexicon: HALOT
  rationale: ‘Delante del arca’ es idiomático en español bíblico contemporáneo y conserva la localización espacial explícita del texto.
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaban
  alternatives_spanish:
  - estaban sacrificando
  - ofrecían sacrificios
  lexicon: HALOT
  rationale: El participio describe una acción en curso en la escena; el imperfecto español ‘sacrificaban’ conserva esa progresión sin volverse pesado.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: ‘Ovejas’ sigue el valor básico del término en este contexto sacrificial. Aunque צֹאן puede incluir cabras, el español no debe ampliar innecesariamente el referente sin que el texto lo explicite.
- source_word: וּבָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado vacuno
  alternatives_spanish:
  - reses
  - ganado
  lexicon: HALOT
  rationale: ‘Ganado vacuno’ distingue con más precisión בָּקָר y evita la generalidad de ‘ganado’, que podría borrar la diferencia con צֹאן.
- source_word: אֲשֶׁר לֹא יִסָּפְרוּ וְלֹא יִמָּנוּ
  english_pob_choice: that could not be counted or numbered
  chosen_spanish: que no se podía contar ni numerar
  alternatives_spanish:
  - que no podían contarse ni numerarse
  - que era imposible contar o numerar
  lexicon: HALOT
  rationale: La doble negación y los dos verbos preservan la intensificación hebrea. El singular impersonal en español evita forzar un antecedente plural cuando el foco está en la cantidad.
- source_word: מֵרֹב
  english_pob_choice: because of their great number
  chosen_spanish: a causa de su gran cantidad
  alternatives_spanish:
  - por su gran número
  - debido a que eran demasiados
  lexicon: HALOT
  rationale: ‘A causa de’ mantiene la fuerza causal; ‘gran cantidad’ suena natural en español y preserva la idea de abundancia sin repetir ‘número’ de forma excesiva.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió ‘had assembled’ por su mayor cercanía al participio hebreo y su registro formal. En español se reflejó esa misma decisión con ‘se había reunido’/‘asamblea’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma por defecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se evitó ‘congregación’ para no imponer un matiz confesional más estrecho que el hebreo.
  - 'Se preservó la doble idea de imposibilidad: ‘no se podía contar ni numerar’.'
  - ‘Ovejas’ y ‘ganado vacuno’ reflejan la distinción lexical entre צֹאן y בָקָר sin sobretraducir.
