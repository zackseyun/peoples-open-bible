translation:
  language: es
  text: También el rey David los[b] consagró a Yahvé[a], junto con la plata y el oro que había consagrado de todas las naciones que había sometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» corresponde al Tetragrámaton יהוה, conservado como nombre divino explícito en el texto principal.
    reason: source_note
  - marker: b
    text: «Los» remite a los objetos mencionados en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: La partícula añade este dato al relato previo; «También» conserva la fuerza aditiva de manera natural en español.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - estos
  - aquello
  lexicon: HALOT
  rationale: El pronombre remite a los objetos mencionados en el versículo anterior; en español conviene mantenerlo átono y referencial sin sobreespecificar en el cuerpo del texto.
- source_word: הִקְדִּישׁ
  english_pob_choice: dedicated
  chosen_spanish: consagró
  alternatives_spanish:
  - dedicó
  - apartó como santo
  lexicon: HALOT
  rationale: En contexto cultual, «consagró» expresa la idea de poner algo en uso sagrado; «dedicó» es posible, pero en español puede sonar más general.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David, el rey
  - el rey, David
  lexicon: HALOT
  rationale: La secuencia nominal se traduce de forma directa y natural, conservando el título real.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se vierte como «Yahvé» en el texto principal, manteniendo el nombre divino explícito.'
- source_word: עִם
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - además de
  lexicon: HALOT
  rationale: «Junto con» reproduce mejor la coordinación de los objetos ya consagrados sin perder claridad.
- source_word: הַכֶּסֶף וְהַזָּהָב
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - la plata y el oro finos
  - la plata y el oro
  lexicon: HALOT
  rationale: Los sustantivos se traducen de manera literal y estable; en español no es necesario repetir los artículos para conservar naturalidad.
- source_word: אֲשֶׁר הִקְדִּישׁ
  english_pob_choice: that he had dedicated
  chosen_spanish: que había consagrado
  alternatives_spanish:
  - que consagró
  - que había dedicado
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja bien que esa acción de consagrar precede al momento del relato; «consagrado» mantiene el campo cultual.
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de entre todas las naciones
  - de todos los pueblos
  lexicon: HALOT
  rationale: «De todas las naciones» conserva el valor de origen del prefijo מִן y la referencia geopolitica de גּוֹיִם.
- source_word: אֲשֶׁר כִּבֵּשׁ
  english_pob_choice: that he had subdued
  chosen_spanish: que había sometido
  alternatives_spanish:
  - que había subyugado
  - que había conquistado
  lexicon: HALOT
  rationale: «Sometido» expresa el resultado de llevar bajo control por la fuerza sin implicar necesariamente la noción más fuerte de conquista territorial permanente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto según el estándar del proyecto, evitando el reemplazo por un título enmascarado. Esto sigue la decisión doctrinal del POB de hacer auditable la presencia del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de הִקְדִּישׁ
  english_pob_reading: dedicated
  chosen_spanish_reading: consagró
  alternative_spanish_readings:
  - dedicó
  - apartó como sagrado
  rationale: En este contexto, los bienes pasan a una esfera sagrada; «consagró» preserva mejor esa tensión cultual que un simple uso devocional de «dedicó».
  doctrine_reference: Uso léxico/cultual del verbo הקדיש en contexto de ofrendas y bienes dedicados a Yahvé
translation_notes:
  revision_awareness: El registro inglés final no requirió cambios tras la última revisión; se mantuvo la lectura estable de «dedicated / subdued» y la decisión doctrinal de usar Yahweh. La versión española sigue esas mismas decisiones, pero ajusta el verbo cultual a «consagró» por fluidez y precisión semántica en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה en todo el registro.
  - Se conserva la distinción entre consagración cultual y simple dedicación no técnica.
  - «Naciones» se usa para גּוֹיִם conforme al contexto militar-político.
  - «Sometido» mantiene la suavidad relativa de subdued frente a «conquistado».
