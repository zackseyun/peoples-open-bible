  text: 이것은 영원부터 알려진 일이다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνωστὰ ἀπ’ αἰῶνος
  english_pob_choice: known from of old
  chosen_korean: 영원부터 알려진 일
  alternatives_korean:
  - 옛부터 알려진 것
  lexicon: BDAG
  rationale: LXX 본문의 αἰών 어휘를 영원·태고의 시간 깊이로 보존한다. 한국어 「영원부터」가 무게를 살린다. 일부 사본은 「γνωστὸν ἀπ’ αἰῶνός ἐστιν τῷ θεῷ τὸ ἔργον αὐτοῦ」 (「하나님께서 그의 일을 영원부터 아셨다」) 또는 「δίδωσιν δι’ ὅλου τοῦ αἰῶνος」(「영원토록 행하시는」)와 같은 더 긴 형태로 17-18절을 결합한다. SBLGNT 채택 본문은 짧은 형태이므로 그에 따른다.
theological_decisions:
- issue: 15:17-18 LXX 사본 형태 — δίδωσιν δι' ὅλου τοῦ αἰῶνος 확장의 처리
  chosen_reading: SBLGNT 짧은 본문 (γνωστὰ ἀπ’ αἰῶνος)
  alternative_readings:
  - 'Byz/Maj: γνωστὸν ἀπ’ αἰῶνός ἐστιν τῷ θεῷ πάντα τὰ ἔργα αὐτοῦ'
  rationale: 본 번역은 SBLGNT를 따르므로 15:18의 LXX 확장(「δίδωσιν δι' ὅλου τοῦ αἰῶνος」 등)은 본문에 포함하지 않는다. 그러나 야훼의 영원한 작정이라는 LXX의 신학적 음조는 「영원부터 알려진 일」이라는 직역으로 보존된다.
  doctrine_reference: 'Methodology: textual variant policy'
