translation:
  language: es
  text: 'Han negado a Yahvé y han dicho[a]: «Él no es, y no vendrá sobre nosotros ningún desastre; no veremos espada ni hambruna».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es él» o «No hará nada». El hebreo es breve y elíptico.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּחֲשׁוּ
  english_pob_choice: have denied
  chosen_spanish: han negado
  alternatives_spanish:
  - han mentido
  - han obrado falsamente
  - han repudiado
  lexicon: HALOT
  rationale: כחשׁ con ב puede expresar negar o actuar falsamente hacia alguien. En este contexto, la negación se dirige contra Yahvé mismo y contra su intervención, así que «han negado» conserva bien la fuerza relacional y acusatoria sin suavizarla a mera falsedad.
- source_word: בַּיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre divino YHWH. Para el español del POB, el default es «Yahvé», preservando el nombre de pacto en vez de sustituirlo por un título.
- source_word: לֹא הוּא
  english_pob_choice: He is not
  chosen_spanish: Él no es
  alternatives_spanish:
  - Él no está
  - No es él
  - No existe
  lexicon: HALOT
  rationale: La frase es breve y elíptica. «Él no es» sigue de cerca la afirmación negativa del hebreo sin añadir un complemento interpretativo; mantiene la tensión entre negación de existencia, presencia o acción eficaz.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - daño
  lexicon: HALOT
  rationale: En contextos proféticos de juicio, רָעָה suele referirse a calamidad o desastre, no a mal moral. «Desastre» comunica con claridad la idea de juicio inminente.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - guerra
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la espada como instrumento de juicio violento.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  lexicon: HALOT
  rationale: Aunque «hambruna» sería más técnico, «hambre» funciona bien en español bíblico y conserva el paralelo con espada; el contexto de juicio permite entender la magnitud colectiva.
- source_word: לֹא נִרְאֶה
  english_pob_choice: we will not see
  chosen_spanish: no veremos
  alternatives_spanish:
  - no experimentaremos
  - no nos alcanzará
  lexicon: HALOT
  rationale: El verbo ver en primera persona plural se traduce naturalmente como «veremos». En este dicho, la forma idiomática comunica que esperan no experimentar esos males.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: el nombre de pacto se translitera como «Yahvé», evitando el reemplazo por un título y manteniendo la transparencia textual.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de לֹא הוּא
  english_pob_reading: He is not
  chosen_spanish_reading: Él no es
  alternative_spanish_readings:
  - Él no está
  - No es él
  - No hará nada
  rationale: La expresión hebrea es elíptica y admite varias lecturas. Se preserva una traducción sobria y abierta para no resolver la tensión teológica que el texto deja en pie, en línea con la lectura auditada del POB.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión registrada que ajustó la frase inglesa de «He is not there» a «He is not» para acercarse más a לֹא הוּא sin añadir contenido. La versión española refleja esa misma brevedad con «Él no es».
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantuvo el tono profético sobrio y directo, sin ampliar el sentido de la negación elíptica.
  - Se conservaron los paralelismos «espada ni hambre» para reflejar la estructura del hebreo.
