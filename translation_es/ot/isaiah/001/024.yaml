review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: transición inferencial (לכן), fórmula profética (נאם), doble título divino con el nombre Yahvé explícito, interjección enfática, y la distinción entre alivio/descarga frente a los adversarios y venganza contra los enemigos. Sin embargo, hay dos desajustes importantes: la nota b no presenta una alternativa sino repite el texto principal, y la construcción final «me vengaré de mis enemigos» suena menos natural y menos precisa que «tomaré venganza de/contra mis enemigos» o «me vengaré de ellos»; además, conviene mejorar la puntuación y fluidez de la cita.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta cierta rigidez. «La declaración del Señor» es aceptable aunque algo poco idiomática; se puede mantener por cercanía al audit trail. «Me aliviaré de mis adversarios» transmite la decisión inglesa, pero la combinación con «me vengaré de mis enemigos» crea una repetición pesada de reflexivos y una clausura menos natural en español bíblico contemporáneo. También falta una pausa mejor resuelta tras la interjección dentro de la cita.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; צְבָאוֹת → «de los Ejércitos» aceptable; אֲבִיר יִשְׂרָאֵל → «el Poderoso de Israel» bien; no hay conflictos con términos doctrinales mayores. La principal corrección es de estilo y exactitud idiomática, no de glosario.'
  issues:
  - severity: medium
    issue: La nota b no ofrece una alternativa real
    rationale: 'El texto principal ya dice «Yahvé de los Ejércitos»; la nota «Hebreo: “Yahvé de los Ejércitos”; se traduce así...» no corresponde al patrón de nota alternativa del inglés, donde la alternativa es «de las huestes/hosts». Debe preservarse una alternativa significativa, por ejemplo «de las huestes». '
  - severity: medium
    issue: «Me vengaré de mis enemigos» es menos natural y menos exacto como equivalente de וְאִנָּקְמָה מֵאוֹיְבָי
    rationale: En español, «vengarse de alguien» suele implicar represalia personal y puede sonar coloquial; «tomaré venganza de mis enemigos» o «ejecutaré venganza contra mis enemigos» refleja mejor la acción judicial divina y evita una frase pesada con dos reflexivos seguidos.
  - severity: low
    issue: Puntuación interna de la cita mejorable
    rationale: 'Después de «¡Ah!» conviene una pausa clara antes de la proposición principal: «¡Ah!,» o reestructurar la frase. Esto mejora legibilidad sin alterar el sentido.'
  revised_spanish_text: 'Por tanto, la declaración del Señor[a], Yahvé de los Ejércitos[b], el Poderoso de Israel: «¡Ah![c], me aliviaré de mis adversarios y tomaré venganza de mis enemigos».

    '
