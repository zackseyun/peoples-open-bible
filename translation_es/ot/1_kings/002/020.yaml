    text: 'Modismo hebreo: literalmente, ‘no apartes mi rostro’ / ‘no apartaré tu rostro’; es decir, ‘no me rechaces’ / ‘no te rechazaré’.'
    reason: lexical_alternative
  revision_rationale: Se mejoró la naturalidad del español sin perder ningún elemento semántico importante del hebreo ni de la auditoría inglesa. ‘Te hago una pequeña petición’ transmite mejor la modesta súplica; ‘mi madre’ refleja con más precisión אִמִּי; y la nota se aclaró para un lector hispanohablante.
