    rationale: En el POB inglés la nota [a] pertenece a הָרָצִים («guards» / «runners»), no a «Yahweh» ni a «house of Yahweh». En español, anclar [a] a «Yahvé» con «O «la casa de Yahvé, es decir, el templo»» altera la evidencia auditada y crea una alternativa no equivalente.
  - severity: medium
