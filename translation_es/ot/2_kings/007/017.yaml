  text: וְ/הַ/מֶּלֶךְ֩ הִפְקִ֨יד אֶת הַ/שָּׁלִ֜ישׁ אֲשֶׁר נִשְׁעָ֤ן עַל יָד/וֹ֙ עַל הַ/שַּׁ֔עַר וַ/יִּרְמְסֻ֧/הוּ הָ/עָ֛ם בַּ/שַּׁ֖עַר וַ/יָּמֹ֑ת כַּ/אֲשֶׁ֤ר דִּבֶּר֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/רֶ֥דֶת הַ/מֶּ֖לֶךְ אֵלָֽי/ו־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/017.yaml
  text: Now the king had appointed the officer on whose hand he leaned to be in charge of the gate[a], but the people trampled him in the gate, and he died[b], just as the man of God had spoken when the king came down to him.
  footnotes:
  - marker: a
    text: Or 'the captain' or 'the royal adjutant'; the Hebrew שָׁלִישׁ refers to a high-ranking officer close to the king.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on whose hand he leaned,' a Hebrew expression for a close royal attendant.
    reason: cultural_note
