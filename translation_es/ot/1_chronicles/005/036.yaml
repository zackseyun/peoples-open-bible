translation:
  language: es
  text: Y Johanán engendró a Azarías[a]; él fue el que sirvió como sacerdote en la casa que Salomón edificó en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el templo'; el hebreo dice literalmente 'en la casa', una manera común de referirse al templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹחָנָן
  english_pob_choice: And Johanan
  chosen_spanish: Yohanan
  alternatives_spanish:
  - Yohanan, y
  - Yohanan
  lexicon: WLC / nombres propios
  rationale: El hebreo inicia con וְ, pero en español una conjunción inicial en una genealogía puede sonar pesada; se omite aquí para mantener fluidez sin perder el sentido de secuencia, ya marcado por el contexto genealógico. El nombre se translitera como Yohanan, forma cercana al hebreo y consistente con la práctica de nombres propios en este proyecto.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En contexto genealógico, el Hiphil de ילד expresa engendrar/ser padre de. 'Engendró' preserva bien la fuerza genealógica y es idiomático en español bíblico sin sonar arcaico en exceso.
- source_word: אֶת עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: a Azarías
  alternatives_spanish:
  - Azarías
  - a Azarías
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת no se traduce. El nombre se adapta como Azarías, forma española tradicional y reconocible para lectores bíblicos, manteniendo el referente propio.
- source_word: הוּא אֲשֶׁר
  english_pob_choice: he was the one who
  chosen_spanish: él fue el que
  alternatives_spanish:
  - él fue quien
  - fue el que
  lexicon: HALOT
  rationale: La construcción resuntiva enfatiza la identificación de Azarías. 'Él fue el que' conserva el énfasis del hebreo con naturalidad en español, sin volverla rígida.
- source_word: כִּהֵן
  english_pob_choice: served as priest
  chosen_spanish: ofició como sacerdote
  alternatives_spanish:
  - sirvió como sacerdote
  - ejerció de sacerdote
  - fue sacerdote
  lexicon: HALOT
  rationale: כהן es verbal y describe el ejercicio del oficio sacerdotal. 'Ofició como sacerdote' mantiene la idea de servicio/función sin reducirla a una simple identidad nominal. Se evita 'fue sacerdote' por perder el valor verbal del hebreo.
- source_word: בַּ/בַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el templo
  - en la morada
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente 'en la casa'. Se conserva 'casa' en el cuerpo principal para respetar la forma source-grounded, aunque el referente sea el templo por la cláusula explicativa siguiente.
- source_word: אֲשֶׁר בָּנָה שְׁלֹמֹה
  english_pob_choice: that Solomon built
  chosen_spanish: que Salomón edificó
  alternatives_spanish:
  - que Salomón construyó
  - que Salomón levantó
  lexicon: HALOT
  rationale: '''Edificó'' es una opción digna y fiel para בנה en contexto de construcción del templo. ''Que Salomón edificó'' conserva el relativo y el agente sin añadir interpretación.'
- source_word: בִּ/ירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Nombre de lugar estándar, con la preposición preservada. 'En Jerusalén' es claro y natural en español.
theological_decisions:
- issue: Identificación del lugar como 'la casa' y posible alusión al templo
  english_pob_reading: Main text keeps 'the house'; footnote notes that Hebrew 'in the house' is a common way of referring to the temple.
  chosen_spanish_reading: Main text keeps 'la casa'; footnote notes that Hebrew 'en la casa' can refer to the templo.
  alternative_spanish_readings:
  - en el templo
  - en la casa (es decir, el templo)
  rationale: Se preserva la expresión literal del hebreo para no borrar la metáfora/construcción fuente. La nota aclara el valor referencial sin reemplazar el término principal por una glosa interpretativa.
  doctrine_reference: 1 Reyes 6; 2 Crónicas 3
- issue: Oficio sacerdotal de Azarías
  english_pob_reading: served as priest
  chosen_spanish_reading: ofició como sacerdote
  alternative_spanish_readings:
  - sirvió como sacerdote
  - ejerció de sacerdote
  rationale: No se trata solo de identidad nominal, sino de desempeño funcional del sacerdocio. La formulación elegida conserva ese matiz sin añadir carga doctrinal ajena al texto.
  doctrine_reference: Éxodo 28; Números 3
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios, con acuerdo alto entre revisiones. La versión española sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo la expresión literal 'la casa' y el matiz verbal de כִּהֵן, mientras ajusta la sintaxis para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yohanan' como transliteración uniforme del nombre אישי, evitando alternar con 'Johanan' para consistencia interna.
  - Se usa 'Azarías' para el nombre bíblico conocido en español, aunque la nota de fuente conserva el literal 'la casa' sin glosa en el texto principal.
  - La puntuación y capitalización siguen el estándar español; el marcador de nota [a] aparece inmediatamente después de 'Azarías'.
