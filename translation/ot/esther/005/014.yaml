id: EST.5.14
reference: Esther 5:14
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר ל/וֹ֩ זֶ֨רֶשׁ אִשְׁתּ֜/וֹ וְ/כָל אֹֽהֲבָ֗י/ו יַֽעֲשׂוּ עֵץ֮ גָּבֹ֣הַּ חֲמִשִּׁ֣ים אַמָּה֒ וּ/בַ/בֹּ֣קֶר אֱמֹ֣ר לַ/מֶּ֗לֶךְ וְ/יִתְל֤וּ אֶֽת מָרְדֳּכַי֙ עָלָ֔י/ו וּ/בֹֽא עִם הַ/מֶּ֥לֶךְ אֶל הַ/מִּשְׁתֶּ֖ה שָׂמֵ֑חַ וַ/יִּיטַ֧ב הַ/דָּבָ֛ר לִ/פְנֵ֥י הָמָ֖ן וַ/יַּ֥עַשׂ הָ/עֵֽץ־־׀־־־׃פ
translation:
  text: Then Zeresh his wife and all his friends said to him[a], “Let a gallows fifty cubits high be made, and in the morning tell the king to have Mordecai hanged on it. Then go with the king to the banquet rejoicing.” The matter pleased Haman[c][b], and he made the gallows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stake' or 'a pole.' The Hebrew עֵץ can denote wood, tree, or a wooden execution structure; the exact form is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Fifty cubits is roughly 75 feet or 23 meters.
    reason: cultural_note
  - marker: c
    text: Or 'to have Mordecai impaled on it.' The Hebrew wording can refer to suspension on a wooden structure, and the precise execution method is debated.
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֲבָיו
  chosen: his friends
  alternatives:
  - those who loved him
  - his supporters
  lexicon: HALOT
  rationale: Although the participle from אהב is literally 'those loving him,' in this courtly narrative context it refers to Haman's friendly associates or companions rather than emphasizing affection as such. 'His friends' is idiomatic modern English.
- source_word: יַעֲשׂוּ
  chosen: Let them make
  alternatives:
  - They should make
  - Have them make
  lexicon: HALOT
  rationale: The jussive/imperfect here expresses advice or proposal. 'Let them make' preserves the hortatory force without over-specifying the agent.
- source_word: עֵץ
  chosen: gallows
  alternatives:
  - tree
  - wooden stake
  - pole
  lexicon: HALOT
  rationale: In Esther, עֵץ in execution contexts commonly refers not to a living tree but to a wooden structure used for public execution/display. 'Gallows' is the most natural traditional English rendering, though 'stake' is also possible; the alternative is preserved in a footnote because the exact method may have involved impalement or suspension on a pole rather than hanging from a crossbeam.
- source_word: גָּבֹהַּ חֲמִשִּׁים אַמָּה
  chosen: fifty cubits high
  alternatives:
  - seventy-five feet high
  - about twenty-three meters high
  lexicon: HALOT
  rationale: Retaining 'cubits' preserves the source measurement and avoids false precision. A modern approximation is useful in a footnote, but the main text should keep the ancient unit.
- source_word: וּבַבֹּקֶר
  chosen: in the morning
  alternatives:
  - tomorrow morning
  - at morning
  lexicon: HALOT
  rationale: The phrase is temporal and straightforward. 'In the morning' is natural English and does not add the explicit 'tomorrow' not stated in the Hebrew, though the narrative implies the next morning.
- source_word: אֱמֹר לַמֶּלֶךְ
  chosen: tell the king
  alternatives:
  - speak to the king
  - ask the king
  lexicon: HALOT
  rationale: The imperative is simply 'say/tell to the king.' Because the content is a request for royal authorization, 'tell the king' is sufficiently direct without importing the more interpretive 'ask' into the verb itself.
- source_word: וְיִתְלוּ אֶת־מָרְדֳּכַי עָלָיו
  chosen: to have Mordecai hanged on it
  alternatives:
  - and let them hang Mordecai on it
  - to have Mordecai impaled on it
  lexicon: HALOT
  rationale: 'The plural verb with unspecified agents after ''tell the king'' is naturally rendered in English as a causative request: ''to have Mordecai hanged on it.'' ''Impaled'' is a serious lexical possibility given Persian execution practices and the noun עֵץ, so it is preserved in a footnote.'
- source_word: וּבֹא עִם־הַמֶּלֶךְ אֶל־הַמִּשְׁתֶּה
  chosen: Then go with the king to the banquet
  alternatives:
  - and go with the king to the feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה is a banquet/feast, often a drinking feast. 'Banquet' fits the royal setting and reads naturally in modern English.
- source_word: שָׂמֵחַ
  chosen: rejoicing
  alternatives:
  - gladly
  - happy
  lexicon: HALOT
  rationale: The adjective functions adverbially, describing Haman's cheerful state as he goes. 'Rejoicing' preserves the vividness better than the flatter 'happy.'
- source_word: וַיִּיטַב הַדָּבָר לִפְנֵי הָמָן
  chosen: The matter pleased Haman
  alternatives:
  - The proposal seemed good to Haman
  - The suggestion delighted Haman
  lexicon: HALOT
  rationale: This idiom means the proposal was pleasing or acceptable to him. 'The matter pleased Haman' is concise and faithful.
- source_word: וַיַּעַשׂ הָעֵץ
  chosen: he made the gallows
  alternatives:
  - he had the gallows made
  - he made the stake
  lexicon: HALOT
  rationale: The Hebrew says simply 'he made the gallows/wooden structure.' English can leave the agency broad; in context it may mean he arranged for it to be made, but the simpler wording best matches the source.
