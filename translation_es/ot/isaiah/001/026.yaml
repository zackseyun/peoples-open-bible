revisions:
- from: Y haré volver a tus jueces como al principio[a], y a tus consejeros como al comienzo. Después de esto se te llamará ciudad de justicia, ciudad fiel.
  to: Y restauraré tus jueces como al principio, y tus consejeros como al comienzo. Después de esto se te llamará ciudad de rectitud[a], ciudad fiel.
  rationale: 'Se corrige el anclaje de la nota al pie y se alinea la traducción principal de עִיר הַצֶּדֶק con la decisión auditada del POB: priorizar el sentido más amplio de rectitud/righteousness y conservar ''justicia'' como alternativa léxica. También se mejora la naturalidad de וְאָשִׁיבָה con ''restauraré'', que encaja mejor con la reconstitución del liderazgo cívico.'
  reviewer_model: gpt-5.4
