id: MAT.15.32
reference: Matthew 15:32
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς προσκαλεσάμενος τοὺς μαθητὰς αὐτοῦ εἶπεν· Σπλαγχνίζομαι ἐπὶ τὸν ὄχλον, ὅτι ἤδη ἡμέραι τρεῖς προσμένουσίν μοι καὶ οὐκ ἔχουσιν τί φάγωσιν· καὶ ἀπολῦσαι αὐτοὺς νήστεις οὐ θέλω, μήποτε ἐκλυθῶσιν ἐν τῇ ὁδῷ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/032.yaml
  text: 'Then Jesus called his disciples to him and said[a], "I have compassion on the crowd, because they have already remained with me for three days and have nothing to eat. And I do not want to send them away hungry[d][c][b], lest they collapse on the way."'
translation:
  language: ko
  text: '예수께서 자기 제자들을 부르시고 말씀하셨습니다. 「내가 이 무리를 불쌍히 여긴다. 그들이 벌써 사흘이나 나와 함께 있으면서 먹을 것이 없기 때문이다. 그들을 굶긴 채로 보내고 싶지 않다. 길에서 쓰러질까 염려된다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「무리를 가엾이 여겨 감동을 받는다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「벌써 사흘 동안 나와 머물러 있다」.
    reason: lexical_alternative
  - marker: c
    text: νήστεις는 문자적으로 「금식 중·먹지 않은」. 본문에서는 종교적 금식이 아니라 굶주린 상태를 가리킨다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「길에서 기진할까 봐」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σπλαγχνίζομαι
  english_pob_choice: have compassion
  chosen_korean: 불쌍히 여긴다
  alternatives_korean:
  - 측은히 여긴다
  - 마음 깊이 동정한다
  lexicon: BDAG
  rationale: σπλαγχνίζομαι는 「창자가 움직이듯 깊이 동정하다」. 한국어 「불쌍히 여기다」가 정착된 등가어이다.
- source_word: νήστεις
  english_pob_choice: hungry
  chosen_korean: 굶긴 채로
  alternatives_korean:
  - 굶주린 채로
  - 빈 속으로
  lexicon: BDAG
  rationale: 종교적 금식이 아닌 굶주린 상태. 「굶긴 채로」가 자연스럽다.
- source_word: ἐκλυθῶσιν
  english_pob_choice: collapse
  chosen_korean: 쓰러질까
  alternatives_korean:
  - 기진할까
  lexicon: BDAG
  rationale: 「힘이 빠져 쓰러지다」. 「쓰러지다」가 시각적이며 자연스럽다.
