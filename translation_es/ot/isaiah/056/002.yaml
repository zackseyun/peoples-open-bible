translation:
  language: es
  text: Bienaventurado el hombre que hace esto, y el hijo del hombre[a] que se aferra a ello, que guarda el sábado para no profanarlo, y guarda su mano para no hacer ningún mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijo de hombre», un modismo común aquí que significa un ser humano o mortal, en paralelo con «el hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: אַשְׁרֵי introduce una bienaventuranza. En español, «Bienaventurado» conserva mejor el tono elevado y declarativo que «Feliz», y evita el matiz más subjetivo de «Dichoso».
- source_word: אֱנוֹשׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - un hombre
  lexicon: HALOT
  rationale: אֱנוֹשׁ designa a un ser humano con énfasis en su condición mortal. «El hombre» mantiene el singular representativo y el paralelismo poético con «hijo de hombre».
- source_word: וּבֶן אָדָם
  english_pob_choice: the son of man
  chosen_spanish: el hijo de hombre
  alternatives_spanish:
  - el ser humano
  - el hijo del hombre
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática hebrea para no borrar su textura literaria. «Hijo de hombre» es la forma más directa en español, aunque suena menos natural que una paráfrasis; por eso se acompaña de una nota.
- source_word: יַחֲזִיק בָּהּ
  english_pob_choice: holds fast to it
  chosen_spanish: se aferra a ello
  alternatives_spanish:
  - se mantiene firme en ello
  - lo sostiene con firmeza
  lexicon: HALOT
  rationale: El hifil de חזק con ב expresa una adhesión firme. «Se aferra a ello» comunica perseverancia y fidelidad a lo que se ha recibido.
- source_word: שֹׁמֵר
  english_pob_choice: who keeps / keeping
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - custodia
  lexicon: HALOT
  rationale: El participio denota una observancia continua. «Guarda» es natural en español bíblico y conserva la idea de custodiar cuidadosamente.
- source_word: שַׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  - el sabat
  lexicon: HALOT
  rationale: En un texto profético dirigido a lectores en español, «el sábado» comunica de modo claro la observancia del día santo. «Día de reposo» sería más explicativo pero menos directo. Se evita introducir terminología eclesial no exigida por el hebreo.
- source_word: מֵחַלְּלוֹ
  english_pob_choice: from profaning it
  chosen_spanish: para no profanarlo
  alternatives_spanish:
  - de profanarlo
  - para no quebrantarlo
  lexicon: HALOT
  rationale: חלל en piel significa profanar, tratar como común. «Profanarlo» conserva el peso teológico del verbo; la construcción «para no» fluye mejor en español que un literal «de profanarlo».
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su acción
  - sus obras
  lexicon: HALOT
  rationale: La mano funciona como metonimia de acción. Mantener «su mano» preserva la imagen hebrea en lugar de explicitarla prematuramente.
- source_word: מֵעֲשׂוֹת כָּל רָע
  english_pob_choice: from doing any evil
  chosen_spanish: para no hacer ningún mal
  alternatives_spanish:
  - de hacer ningún mal
  - de hacer lo malo
  lexicon: HALOT
  rationale: La construcción preventiva con מִן se vierte naturalmente como finalidad negativa en español. «Ningún mal» refleja el alcance total de כָּל רָע sin sonar artificial.
theological_decisions:
- issue: Uso de lenguaje masculino genérico en un proverbio/beatitud
  english_pob_reading: Retain 'the man' and 'the son of man' in the main text
  chosen_spanish_reading: Mantener «el hombre» y «el hijo de hombre» en el texto principal
  alternative_spanish_readings:
  - la persona ... el ser humano
  - el hombre ... el ser humano
  rationale: El hebreo usa formas masculinas singulares con valor genérico y poético. Se conserva ese paralelismo en español para no neutralizar la forma del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Posible lectura mesiánica de «hijo de hombre»
  english_pob_reading: Keep the idiom 'the son of man' with explanatory footnote
  chosen_spanish_reading: Mantener la expresión idiomática y aclararla en nota
  alternative_spanish_readings:
  - el ser humano
  - el mortal
  rationale: En Isaías 56:2 la frase paralela a «el hombre» funciona como modismo hebreo para un ser humano, no como título mesiánico explícito. La nota evita una lectura cristológica indebida sin borrar la expresión original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: Valor de שַׁבָּת en español
  english_pob_reading: the Sabbath
  chosen_spanish_reading: el sábado
  alternative_spanish_readings:
  - el día de reposo
  - el sabat
  rationale: «El sábado» es la equivalencia más transparente y ampliamente entendible en español. Se evita la sustitución por una terminología más confesional que no añade precisión textual.
  doctrine_reference: DOCTRINE.md §Terminology policy
translation_notes:
  revision_awareness: La edición inglesa más reciente suavizó la sintaxis para unir las dos descripciones con cláusulas relativas y mantener la secuencia ética del hebreo. En español se refleja esa misma progresión con participios y cláusulas finales naturales, sin convertir el verso en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «el hombre» y «el hijo de hombre» para reflejar el hebreo.
  - «Profanarlo» conserva la fuerza cultual de חלל.
  - «Su mano» retiene la metonimia hebrea de acción.
  - La nota [a] aclara el modismo sin borrar la expresión original.
