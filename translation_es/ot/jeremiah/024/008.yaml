translation:
  language: es
  text: 'Pero como los higos malos, que no pueden comerse por ser tan malos[a], así dice Yahvé: así haré con Sedequías, rey de Judá, con sus oficiales, con el remanente de Jerusalén, con los que permanecen en esta tierra, y con los que habitan en la tierra de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «así daré a Sedequías…». El hebreo usa «dar», pero en esta comparación el sentido es que Yahvé tratará a estas personas como a los higos malos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כַ/תְּאֵנִים
  english_pob_choice: But like the ... figs
  chosen_spanish: Pero como las higas[a]
  alternatives_spanish:
  - Y como las higas
  - Pero como los higos
  lexicon: HALOT
  rationale: El hebreo abre la comparación con un enlace que en contexto retoma contraste con las higas buenas del versículo anterior. 'Pero como' conserva ese contraste; 'como' mantiene la comparación sin volverla paráfrasis. 'Higas' preserva el fruto mencionado en el marco inmediato y evita desplazar el término por una forma demasiado genérica.
- source_word: הָרָעוֹת
  english_pob_choice: bad
  chosen_spanish: malas
  alternatives_spanish:
  - malas
  - malvadas
  - de mala calidad
  lexicon: HALOT
  rationale: En el contexto de fruta, 'malas' es la opción natural en español. 'Malvadas' moraliza demasiado la imagen, y 'de mala calidad' suena más explicativo que el hebreo breve. El contexto profético permite que la mala calidad del fruto siga insinuando juicio.
- source_word: לֹא תֵאָכַלְנָה מֵרֹעַ
  english_pob_choice: cannot be eaten because they are so bad
  chosen_spanish: que no pueden comerse por ser tan malas
  alternatives_spanish:
  - que no pueden comerse por su maldad
  - que no se comen por malas
  - que no pueden comerse por su pésima calidad
  lexicon: HALOT
  rationale: La construcción causal con מִן más רֹעַ expresa motivo o causa. En español, 'por ser tan malas' conserva la causa de la inedibilidad sin forzar un calco literal. Se mantiene el tono descriptivo del fruto y la fuerza intensiva de la frase.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre divino propio y evita la sustitución por un título. Se mantiene la mayúscula inicial por convención castellana en nombres divinos.
- source_word: כֵּן אֶתֵּן
  english_pob_choice: so I will make
  chosen_spanish: así entregaré
  alternatives_spanish:
  - así daré
  - así pondré
  - así haré
  lexicon: HALOT
  rationale: El verbo נתן aquí funciona en un giro de entrega/disposición acorde con la comparación de las higas malas. 'Entregaré' expresa bien la idea de poner a alguien en manos de otro o dejarlo en condición correspondiente, y evita una literalidad que en español sonaría incompleta.
- source_word: צִדְקִיָּהוּ מֶלֶךְ יְהוּדָה
  english_pob_choice: Zedekiah king of Judah
  chosen_spanish: Sedequías, rey de Judá
  alternatives_spanish:
  - Sedequías rey de Judá
  - Sedequías, el rey de Judá
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma castellana usual y la aposición con coma para una lectura natural. La estructura mantiene el título regia sin añadir ni quitar contenido.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus líderes
  - sus gobernantes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar oficiales de corte o altos funcionarios. 'Oficiales' es más amplio y claro en español contemporáneo que 'príncipes', que tendría un matiz demasiado aristocrático y menos preciso en este contexto político.
- source_word: שְׁאֵרִית יְרוּשָׁלִַם
  english_pob_choice: the remnant of Jerusalem
  chosen_spanish: el remanente de Jerusalén
  alternatives_spanish:
  - el resto de Jerusalén
  - el residuo de Jerusalén
  - los sobrevivientes de Jerusalén
  lexicon: HALOT
  rationale: '''Remanente'' conserva el término profético técnico שְׁאֵרִית y su carga teológica. ''Resto'' sería más cotidiano, pero perdería parte de ese eco bíblico. El genitivo ''de Jerusalén'' sigue el uso del original, aun cuando se refiere a las personas asociadas con la ciudad.'
- source_word: הַנִּשְׁאָרִים בָּאָרֶץ הַזֹּאת
  english_pob_choice: who remain in this land
  chosen_spanish: que quedó en esta tierra
  alternatives_spanish:
  - que permaneció en esta tierra
  - que quedaron en esta tierra
  - que han quedado en esta tierra
  lexicon: HALOT
  rationale: El participio indica a los que quedaron atrás en la tierra. En español, 'que quedó' funciona de manera fluida con 'remanente' y refleja la idea de permanecer tras la deportación. Aunque el plural esperable sería 'quedaron', la construcción con 'remanente' admite un verbo singular colectivo en una lectura más natural.
- source_word: וְהַיֹּשְׁבִים בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: and those who dwell in the land of Egypt
  chosen_spanish: y a los que habitan en la tierra de Egipto
  alternatives_spanish:
  - y a los que viven en la tierra de Egipto
  - y a los habitantes de la tierra de Egipto
  - y a los que moran en Egipto
  lexicon: HALOT
  rationale: '''Habitan'' conserva el participio con un registro sobrio. ''Tierra de Egipto'' reproduce el sustantivo ''tierra'' del hebreo, no solo el topónimo, y mantiene el paralelismo con ''esta tierra''.'
theological_decisions:
- issue: Valor del verbo נתן en la cláusula de juicio
  english_pob_reading: Rendered idiomatically as 'so I will make' to express that God will treat these people as like the bad figs.
  chosen_spanish_reading: '''así entregaré'' expresa que Yahvé los pone en una condición de juicio análoga a las higas malas, sin ocultar el sentido de disposición divina.'
  alternative_spanish_readings:
  - así daré
  - así pondré
  - así haré
  rationale: 'El hebreo usa ''dar'' de forma que el contexto de la comparación determina la consecuencia. En español, ''entregaré'' conserva la idea de disposición o puesta en manos de otro y deja intacta la tensión interpretativa: no se explica todo con una sola palabra, pero tampoco se traduce de modo rígido.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source sense without erasing lexical tension.'
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para preservar el nombre propio divino. Esto evita la sustitución litúrgica y hace visible la forma del texto fuente.
  doctrine_reference: Project terminology default for the Tetragrammaton.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y no se introdujeron cambios doctrinales respecto de su lectura principal. El único ajuste relevante es que 'give/make' se resolvió en español como 'entregaré' para reflejar con naturalidad la fuerza de נתן en contexto sin suavizar la imagen de juicio.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se conservó 'remanente' para שְׁאֵרִית por su valor técnico-profético.
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - Se eligió 'oficiales' para שָׂרָיו por ser más exacto y menos arcaizante que 'príncipes'.
  - La nota de pie marca la opción de 'higos' frente a 'higas' sin duplicar el sentido principal en el texto.
  - 'La puntuación sigue el uso español: coma tras el vocativo/título y dos puntos antes de la cita divina.'
