translation:
  language: es
  text: Y ayunaba todos los días de su viudez[a], excepto los días previos a los sábados, los sábados, los días previos a las lunas nuevas, las fiestas y celebraciones de la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «aparte de los días previos a los sábados y de los sábados y de los días previos a las lunas nuevas». El griego usa compuestos preposicionales para los días que preceden a esas observancias.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνήστευε
  english_pob_choice: she fasted
  chosen_spanish: ayunaba
  alternatives_spanish:
  - ayunó
  - seguía ayunando
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción habitual o continua en el pasado. En español, el imperfecto "ayunaba" comunica mejor esa práctica sostenida que un pretérito puntual.
- source_word: πάσας τὰς ἡμέρας τῆς χηρεύσεως αὐτῆς
  english_pob_choice: all the days of her widowhood
  chosen_spanish: todos los días de su viudez
  alternatives_spanish:
  - a lo largo de todos los días de su viudez
  - cada día de su viudez
  lexicon: LSJ
  rationale: La frase griega abarca todo el período de viudez. "Todos los días de su viudez" conserva la amplitud temporal y suena natural en español.
- source_word: χωρὶς
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - aparte de
  - salvo
  lexicon: BDAG
  rationale: Aquí χωρὶς marca exclusión del patrón de ayuno. "Excepto" es la forma más clara y natural en español para esa exclusión.
- source_word: προσαββάτων
  english_pob_choice: the days before Sabbaths
  chosen_spanish: los días antes de los sábados
  alternatives_spanish:
  - las vísperas de los sábados
  - los días previos a los sábados
  lexicon: LSJ
  rationale: El compuesto indica lo que precede a los sábados. Se conserva la relación temporal explícita sin introducir una etiqueta técnica posterior que el griego no exige.
- source_word: σαββάτων
  english_pob_choice: Sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los días de sábado
  - los días sabáticos
  lexicon: BDAG
  rationale: El plural griego se refleja mejor en plural español. "Sábados" mantiene la referencia a observancias repetidas sin forzar una terminología litúrgica ajena al pasaje.
- source_word: προνουμηνιῶν
  english_pob_choice: the days before new moons
  chosen_spanish: los días antes de las lunas nuevas
  alternatives_spanish:
  - las vísperas de las lunas nuevas
  - los días previos a la luna nueva
  lexicon: LSJ
  rationale: El paralelismo con προσαββάτων pide expresar la relación temporal. "Lunas nuevas" reproduce el calendario bíblico de manera transparente y bíblicamente reconocible.
- source_word: ἑορτῶν
  english_pob_choice: festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - los festivales
  - las festividades
  lexicon: BDAG
  rationale: Para un contexto bíblico, "fiestas" comunica con naturalidad las solemnidades religiosas sin perder el sentido celebrativo.
- source_word: χαρμοσυνῶν
  english_pob_choice: celebrations
  chosen_spanish: celebraciones
  alternatives_spanish:
  - tiempos de regocijo
  - ocasiones de alegría
  lexicon: LSJ
  rationale: El sustantivo señala ocasiones de gozo o regocijo. "Celebraciones" mantiene el valor festivo y funciona bien junto a "fiestas".
- source_word: οἴκου Ἰσραήλ
  english_pob_choice: of the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  lexicon: BDAG
  rationale: Se conserva el idiomatismo bíblico "casa de Israel", que refleja mejor la formulación griega que una simplificación a "Israel".
theological_decisions:
- issue: Naturaleza de las excepciones al ayuno
  english_pob_reading: Judith fasted habitually during her widowhood but did not fast on specified sacred or festive days.
  chosen_spanish_reading: Judith ayunaba de manera habitual durante su viudez, pero no ayunaba en días concretos de observancia sagrada o festiva.
  alternative_spanish_readings:
  - Judith ayunaba siempre, incluyendo esos días
  - Judith ayunaba especialmente en esos días
  rationale: El χωρὶς griego marca exclusión, no inclusión. La traducción debe preservar que los días enumerados son excepciones al ayuno, no ocasiones en que el ayuno era intensificado.
  doctrine_reference: Translation philosophy §1, §3
- issue: Terminología calendárica y litúrgica
  english_pob_reading: Translate the terms descriptively rather than replacing them with later technical liturgical labels.
  chosen_spanish_reading: Se describen los días anteriores a los sábados y a las lunas nuevas, sin sustituirlos por etiquetas técnicas posteriores.
  alternative_spanish_readings:
  - usar el término técnico 'días de preparación'
  - parafrasear con lenguaje litúrgico más desarrollado
  rationale: El griego usa formaciones compuestas que expresan anterioridad temporal. En español, una descripción transparente conserva mejor el dato textual y evita añadir una precisión interpretativa no explícita en la fuente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y el audit trail inglés, manteniendo la habitualidad del imperfecto, la exclusión marcada por χωρὶς y la descripción temporal explícita de προσαββάτων y προνουμηνιῶν. No se introdujeron etiquetas litúrgicas posteriores ni se diluyó el idiomatismo bíblico de «casa de Israel».
  spanish_consistency_notes:
  - Se mantuvo «ayunaba» en imperfecto para reflejar hábito o continuidad.
  - Se eligió «excepto» para la exclusión marcada por χωρὶς.
  - 'Se conservaron plurales bíblicos: «sábados», «lunas nuevas», «fiestas».'
  - «Casa de Israel» se mantuvo como expresión idiomática bíblica, coherente con la terminología POB.
