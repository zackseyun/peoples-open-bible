review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativos directos a Dios, imagen antropomórfica de la mano extendida, rescate/liberación, y la metáfora de las muchas aguas como peligro abrumador. Sin embargo, ''de manos de hijos extranjeros'' no preserva con precisión מִיַּד en singular ni suena natural en español; además, la nota [b] está anclada en ''muchas aguas'' pero omite la alternativa documentada en el inglés para בְּנֵי נֵכָר.'
  spanish_quality_summary: El español es mayormente claro y digno. 'Extiende tu mano desde lo alto; rescátame y líbrame de muchas aguas' funciona bien. La secuencia final 'de manos de hijos extranjeros' es poco idiomática y rompe el paralelismo poético; 'de la mano de hijos extranjeros' suena más natural y es más fiel al singular hebreo. También conviene reasignar las notas para que correspondan al lugar correcto y reflejen las alternativas relevantes.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones 'rescátame', 'líbrame', 'desde lo alto' y 'muchas aguas' concuerdan con el expediente inglés y con el hebreo. La preservación de 'hijos extranjeros' mantiene la expresión filial masculina de בְּנֵי נֵכָר, con una nota que explique su sentido idiomático más amplio.
  issues:
  - severity: high
    issue: '''de manos de'' para מִיַּד'
    rationale: El hebreo tiene singular 'de la mano de'. El plural español no está motivado por el texto fuente y suena torpe en este contexto. Además, se pierde el paralelismo con 'tu mano' al inicio del versículo.
  - severity: medium
    issue: La nota [b] está asociada a 'muchas aguas' pero no preserva la alternativa documentada para 'hijos extranjeros'
    rationale: El expediente inglés conserva una nota para 'foreign sons' explicando el idiomático 'foreigners'. En español esa aclaración es útil y debería anclarse en 'hijos extranjeros', no en 'muchas aguas'.
  - severity: low
    issue: La nota sobre 'muchas aguas' puede formularse con mejor español editorial
    rationale: 'La redacción actual empieza con comillas y un anglicismo de formato (''Hebreo: ...''). Puede hacerse más natural y precisa, y además incorporar la alternativa ''grandes aguas'' documentada en el expediente inglés.'
  revised_spanish_text: Extiende tu mano desde lo alto[a]; rescátame y líbrame de muchas aguas[b], de la mano de hijos extranjeros[c].
