    text: Or, 'not one thing has failed' / 'not one promise has failed.' The Hebrew says literally, 'not one word has fallen.'
    reason: lexical_alternative
  - marker: b
    text: '''The way of all the earth'' is a Hebrew idiom for the common destiny of all people, especially death.'
    reason: cultural_note
