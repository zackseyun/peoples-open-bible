    changes_summary: Changed 'at the east' to 'to the east' for more natural English and better representation of the location phrase. No other changes needed.
translation:
  language: es
  text: Así expulsó al hombre, y al oriente del jardín de Edén[a] colocó a los querubines y la llama de la espada que gira en todas direcciones[b], para guardar el camino al árbol de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al este del jardín de Edén» o «en el lado oriental del jardín de Edén». La expresión hebrea se refiere al lado/frente oriental del jardín.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «la espada encendida que se revolvía por todos lados». El hebreo es más literalmente «la llama de la espada que se vuelve a sí misma / en todas direcciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - desterró
  lexicon: HALOT
  rationale: גרשׁ expresa sacar con fuerza o expulsar. En español, «expulsó» conserva bien esa fuerza sin añadir la matiz interpretativa más solemne de «desterró».
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la humanidad
  lexicon: HALOT
  rationale: El contexto narrativo apunta al individuo previamente formado y puesto en el huerto. «El hombre» mantiene la referencia personal y el valor preciso del hebreo אָדָם en este pasaje.
- source_word: וַיַּשְׁכֵּן
  english_pob_choice: he stationed
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - estableció
  - hizo habitar
  lexicon: HALOT
  rationale: El hifil de שכן indica hacer que algo quede situado en un lugar. «Colocó» es natural en español y suficientemente fuerte para el contexto de custodia, sin introducir la idea de «habitar» que aquí no es central.
- source_word: מִקֶּדֶם לְגַן עֵדֶן
  english_pob_choice: to the east of the garden of Eden
  chosen_spanish: al oriente del jardín de Edén
  alternatives_spanish:
  - al este del jardín de Edén
  - en el lado oriental del jardín de Edén
  lexicon: HALOT
  rationale: La expresión señala el lado oriental/fronte del huerto. «Al oriente» suena natural y digno en español bíblico, y conserva la referencia espacial sin forzar una paráfrasis.
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines celestiales
  lexicon: HALOT
  rationale: «Querubines» es el transliterado bíblico estándar y conserva el término técnico. «Querubines celestiales» explicaría de más y no es necesario aquí.
- source_word: לַהַט הַחֶרֶב הַמִּתְהַפֶּכֶת
  english_pob_choice: the flame of the sword that turns every way
  chosen_spanish: la llama de la espada que se volvía en todas direcciones
  alternatives_spanish:
  - la llama de la espada que gira por todos lados
  - la espada flamígera que giraba en todas direcciones
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «la llama de la espada, la que se vuelve». «Llama de la espada» preserva la relación nominal, y «se volvía en todas direcciones» refleja el participio con movimiento continuo, evitando reemplazarlo por la tradicional paráfrasis de «espada encendida».
- source_word: לִשְׁמֹר
  english_pob_choice: to guard
  chosen_spanish: para guardar
  alternatives_spanish:
  - para custodiar
  - para vigilar
  lexicon: HALOT
  rationale: שׁמר aquí tiene sentido protector y restrictivo. «Guardar» transmite bien la función de impedir el acceso, con un castellano claro y fiel.
- source_word: דֶּרֶךְ
  english_pob_choice: the way to
  chosen_spanish: el camino al
  alternatives_spanish:
  - el camino de
  - la vía hacia
  lexicon: HALOT
  rationale: Aunque la forma hebrea es «el camino de», el sentido en el contexto es el acceso o ruta hacia el árbol. «El camino al» comunica ese valor relacional de forma natural en español.
- source_word: עֵץ הַחַיִּים
  english_pob_choice: the tree of life
  chosen_spanish: el árbol de la vida
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable de la frase constructa. No requiere variación en español.
theological_decisions:
- issue: Valor de אָדָם en contexto narrativo singular
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: La escena no habla de la humanidad en abstracto, sino del individuo expulsado del jardín. Mantener el singular personal respeta la narración y la precisión doctrinal sobre אָדָם.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, אָדָם; Translation philosophy §4'
- issue: Relación espacial de מִקֶּדֶם לְגַן עֵדֶן
  english_pob_reading: to the east of the garden of Eden
  chosen_spanish_reading: al oriente del jardín de Edén
  alternative_spanish_readings:
  - al este del jardín de Edén
  - en el lado oriental del jardín de Edén
  rationale: El hebreo señala la frontera/lado oriental del jardín. «Al oriente» conserva la ubicación sin convertir la frase en una explicación interpretativa más larga.
  doctrine_reference: Gen 3:24 lexical note on מִקֶּדֶם
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que afinó la locución espacial de «at the east» a «to the east» para representar mejor מִקֶּדֶם. La lectura final española refleja esa ubicación con «al oriente». También se preservó la decisión revisada sobre la expresión verbal continua de la espada/llama, evitando volver a una paráfrasis tradicional más libre.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - «Querubines» se conservó como término técnico bíblico sin domesticación a «ángeles» o «querubes».
  - «Árbol de la vida» se mantuvo estable y no se parafraseó.
  - La formulación de la espada conserva la tensión entre el sustantivo «llama» y el participio de movimiento continuo, sin convertirla en una imagen totalmente distinta.
