translation:
  language: es
  text: 'Y de los hijos de Zérah: Jeuel y sus hermanos[a], seiscientos noventa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jeuel y sus hermanos, seiscientos noventa», si se entiende distributivamente y se toma a Jeuel como cabeza representativa del clan. El hebreo tiene un sufijo plural en «sus hermanos», aunque algunas traducciones lo suavizan al singular por legibilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y de entre
  lexicon: HALOT
  rationale: El prefijo conjuntivo con מִן enlaza esta entrada con la lista anterior; en español, 'Y de' conserva el flujo aditivo sin forzar una repetición pesada.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En un contexto genealógico, la expresión designa pertenencia de linaje o clan. 'Hijos de' es el equivalente más directo y natural en español bíblico, sin perder el sentido colectivo.
- source_word: זֶרַח
  english_pob_choice: Zerah
  chosen_spanish: Zéraj
  alternatives_spanish:
  - Zerah
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado. Se mantiene una forma española estable y legible; la grafía con 'j' representa mejor la consonante final hebrea en español.
- source_word: יְעוּאֵל
  english_pob_choice: Jeuel
  chosen_spanish: Jeuel
  alternatives_spanish:
  - Jéuel
  - Juel
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado siguiendo el uso convencional en español bíblico, sin reinterpretarlo.
- source_word: וַ/אֲחֵי/הֶם
  english_pob_choice: and their brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos
  - y sus hermanos de clan
  - y sus hermanos;
  lexicon: HALOT
  rationale: 'El sufijo plural exige un poseedor plural literal: ''sus hermanos''. Se evita suavizarlo a singular (''sus hermanos'' referido a Jeuel solo) para no borrar la forma hebrea; el contexto genealógico permite entender parentesco/clan sin añadir explicaciones al texto principal.'
- source_word: שֵׁשׁ מֵא֥וֹת וְ/תִשְׁעִים
  english_pob_choice: six hundred and ninety
  chosen_spanish: seiscientos noventa
  alternatives_spanish:
  - '690'
  lexicon: HALOT
  rationale: Se expresa el número en palabras, conforme al estilo bíblico en español y al valor cardinal del hebreo.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el pasaje de referencia; la redacción sigue de cerca el hebreo y mantiene la ambigüedad genealógica del sufijo plural, tal como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Y de' para conservar el enlace con la lista genealógica previa.
  - Se usa 'hijos de' como fórmula genealógica estable, no como referencia biológica estricta.
  - Se preserva la ambigüedad entre un antecedente singular representativo y el sufijo plural mediante nota, sin resolverla en el texto principal.
  - Los nombres propios se transliteran de forma consistente y no se traducen.
