translation:
  language: es
  text: 'Entonces José dijo a Faraón: «Los sueños de Faraón son un solo mensaje[a]; lo que Dios hace, lo ha declarado a Faraón[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «El sueño de Faraón es uno». El hebreo usa el singular «sueño», pero en contexto José habla de los dos sueños de Faraón como una sola revelación; por eso aquí se expresa como «un solo mensaje».
    reason: lexical_alternative
  - marker: b
    text: O «lo que Dios está haciendo» o «lo que Dios hace». El participio hebreo puede reflejar una acción en curso o inmediata; aquí se conserva una formulación amplia que no añade futuridad explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - dijo
  lexicon: WLC/uso narrativo de waw consecutivo
  rationale: La forma narrativa avanza la escena; «Entonces» conserva la secuencia sin sonar arcaico.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - para Faraón
  lexicon: Preposición de dirección
  rationale: «A» introduce de manera natural el destinatario del discurso en español.
- source_word: חֲלוֹם ... אֶחָד הוּא
  english_pob_choice: Pharaoh’s dreams are one
  chosen_spanish: Los sueños de Faraón son uno
  alternatives_spanish:
  - El sueño de Faraón es uno
  - El sueño de Faraón es uno solo
  lexicon: HALOT
  rationale: El hebreo usa singular, pero el contexto inmediato alude a los dos sueños de Faraón como un solo mensaje; por eso se explicita el plural en español, como en la decisión inglesa auditada, sin perder la afirmación de unidad.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: Título propio
  rationale: Se mantiene el título histórico estándar en español.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: La combinación introduce el contenido de la revelación; «lo que» es el equivalente idiomático y fiel en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español bíblico natural la referencia al Dios verdadero se expresa con «Dios», no con «el Dios».
- source_word: עֹשֶׂה
  english_pob_choice: is doing
  chosen_spanish: hace
  alternatives_spanish:
  - está haciendo
  - va a hacer
  lexicon: HALOT
  rationale: Se evita añadir futuridad que el participio no exige; «hace» conserva la referencia a la acción divina en curso o inmediata, siguiendo la revisión inglesa más directa.
- source_word: הִגִּיד
  english_pob_choice: has declared
  chosen_spanish: ha declarado
  alternatives_spanish:
  - ha dicho
  - ha dado a conocer
  lexicon: HALOT
  rationale: «Ha declarado» mantiene el tono formal de revelación y funciona bien en español para una comunicación divina dada a conocer a Faraón.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - para Faraón
  lexicon: Preposición de dativo
  rationale: Preposición natural para el destinatario de la declaración.
theological_decisions:
- issue: Unidad de los dos sueños de Faraón
  english_pob_reading: Pharaoh’s dreams are one
  chosen_spanish_reading: Los sueños de Faraón son uno
  alternative_spanish_readings:
  - El sueño de Faraón es uno
  - Los dos sueños de Faraón forman un solo mensaje
  rationale: El texto hebreo usa singular, pero en el contexto narrativo José interpreta dos sueños como una sola revelación. La redacción española conserva esa tensión y evita borrar el dato contextual.
  doctrine_reference: Génesis 41:1-7, 25; coherencia contextual de la interpretación de José
- issue: Referencia a Dios con artículo hebreo
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: El artículo hebreo no obliga al español a usar «el Dios»; la forma natural y reverente es «Dios», manteniendo la referencia al Dios verdadero sin sobrecargar el estilo.
  doctrine_reference: Uso bíblico estándar del nombre/título divino
translation_notes:
  revision_awareness: La decisión inglesa revisada pasó de «is about to do» a «is doing» para seguir más de cerca el participio hebreo sin introducir futuridad. En español se optó por «hace» para mantener esa misma cercanía y la naturalidad idiomática, evitando una paráfrasis temporal no exigida por el texto.
  spanish_consistency_notes:
  - Se usa «Faraón» de manera uniforme para el título egipcio.
  - Se mantiene «Dios» para הָאֱלֹהִים conforme al patrón POB en español natural.
  - La tensión singular/plural de «sueño(s)» queda preservada en la nota y en la redacción contextual, sin borrar la unidad del mensaje.
