translation:
  language: es
  text: Yo soy el buen pastor[a], y conozco a los míos, y los míos me conocen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis ovejas». El griego dice literalmente «los míos» en ambas cláusulas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιμήν
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor espiritual
  lexicon: BDAG
  rationale: El sentido ordinario de ποιμήν es «pastor» en español. «Pastor espiritual» introduciría una explicación que el griego no expresa aquí. Conserva la imagen pastoral del discurso de Jesús.
- source_word: καλός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - noble
  - excelente
  - hermoso
  lexicon: BDAG
  rationale: En este contexto καλός comunica cualidad moral y excelencia apropiada. «Bueno» es la equivalencia más natural y fiel en español; mantiene la valoración ética sin forzar un matiz más interpretativo.
- source_word: γινώσκω
  english_pob_choice: know
  chosen_spanish: conozco
  alternatives_spanish:
  - reconozco
  - sé
  lexicon: BDAG
  rationale: El verbo expresa conocimiento personal y relacional, no mera información. «Conozco» preserva esa relación mutua entre Jesús y los que le pertenecen.
- source_word: τὰ ἐμὰ / τὰ ἐμά
  english_pob_choice: my own
  chosen_spanish: los míos
  alternatives_spanish:
  - mis ovejas
  - los que son míos
  - lo mío
  lexicon: BDAG
  rationale: El neutro plural griego significa literalmente «mis propios [unos/cosas]». En contexto se refiere a las personas que pertenecen al pastor. «Los míos» preserva la brevedad y el sentido relacional sin sobreespecificar «ovejas», que no aparece en esta cláusula.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: BDAG
  rationale: Es una autoidentificación directa en presente. «Yo soy» mantiene la estructura enfática del griego y su resonancia característica en Juan.
- source_word: καί
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: La coordinación simple del griego se conserva con «y» en ambas uniones, sin añadir énfasis ajeno al texto.
theological_decisions:
- issue: Cómo reflejar τὰ ἐμὰ / τὰ ἐμά sin imponer «mis ovejas» en el texto principal
  english_pob_reading: my own
  chosen_spanish_reading: los míos
  alternative_spanish_readings:
  - mis ovejas
  - los que son míos
  rationale: La lectura inglesa auditada preserva el posesivo neutro del griego y evita expandir el sustantivo. En español, «los míos» comunica pertenencia y relación personal de manera natural, manteniendo la tensión entre la literalidad del griego y el referente contextual a las ovejas del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Conservar el tono cristológico del autoidentificarse de Jesús sin convertirlo en fórmula confesional añadida
  english_pob_reading: I am the good shepherd
  chosen_spanish_reading: Yo soy el buen pastor
  alternative_spanish_readings:
  - Yo soy el pastor bueno
  - Yo soy el pastor excelente
  rationale: La frase funciona como afirmación metafórica dentro del discurso de Jesús. «Yo soy el buen pastor» conserva tanto la metáfora como la valoración ética sin introducir formulaciones doctrinales adicionales.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en inglés: no se introduce «ovejas» en el texto principal, y se mantiene la coordinación simple de las cláusulas. La formulación española sigue la lectura revisada como estable, sin cambios necesarios respecto del sentido original.'
  spanish_consistency_notes:
  - Se usa «Yo soy» para conservar la autoidentificación directa y la cadencia joánica.
  - Se usa «buen pastor» como equivalente natural de καλός sin recurrir a «pastor» como cargo eclesial.
  - «Los míos» se emplea para τὰ ἐμά con una nota que preserva la alternativa literal «mis ovejas».
  - La repetición de «y» reproduce la coordinación del griego sin intensificar el texto.
