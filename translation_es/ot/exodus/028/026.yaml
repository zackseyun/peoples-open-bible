translation:
  language: es
  text: Harás dos anillos de oro y los pondrás en los dos extremos del pectoral[a], en su borde que mira hacia el lado interior del efod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su borde que mira hacia el interior, hacia el efod».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás y
  lexicon: HALOT
  rationale: En una instrucción artesanal dirigida en segunda persona singular, el futuro exhortativo español transmite bien el valor de mandato sin sonar mecánico. Omitir la conjunción inicial evita una rigidez innecesaria en español, aunque el encadenamiento verbal sigue reflejando la secuencia del hebreo.
- source_word: שְׁתֵּי טַבְּעוֹת זָהָב
  english_pob_choice: two gold rings
  chosen_spanish: dos anillos de oro
  alternatives_spanish:
  - dos aros de oro
  - dos sortijas de oro
  lexicon: HALOT
  rationale: טַבַּעַת puede referirse a anillo, aro o argolla según el contexto. Aquí se trata de piezas de metal para fijación, por lo que 'anillos' es una opción natural y suficientemente amplia en español. 'De oro' conserva el material sin alterar la relación nominal del hebreo.
- source_word: וְשַׂמְתָּ אֹתָם
  english_pob_choice: and put them
  chosen_spanish: los pondrás
  alternatives_spanish:
  - los colocarás
  - los colocarás allí
  lexicon: HALOT
  rationale: שִׂים admite 'poner/colocar'. 'Pondrás' mantiene la sencillez del mandato técnico y evita una sobreformalización innecesaria.
- source_word: עַל שְׁנֵי קְצוֹת הַחֹשֶׁן
  english_pob_choice: on the two ends of the breastpiece
  chosen_spanish: sobre los dos extremos del pectoral
  alternatives_spanish:
  - en los dos extremos del pectoral
  - sobre las dos puntas del pectoral
  lexicon: HALOT
  rationale: קָצֶה es 'extremo' o 'punta'; 'extremos' es el equivalente más preciso. 'Pectoral' es el término bíblico-español habitual para חֹשֶׁן y resulta claro en contexto sacerdotal.
- source_word: עַל שְׂפָתוֹ
  english_pob_choice: on its edge
  chosen_spanish: sobre su borde
  alternatives_spanish:
  - sobre su orilla
  - sobre su canto
  lexicon: HALOT
  rationale: שָׂפָה aquí designa el borde de un objeto. 'Borde' es el español más claro y técnico para una pieza textil o adornada.
- source_word: אֲשֶׁר אֶל עֵבֶר הָאֵפֹד בָּיְתָה
  english_pob_choice: that is toward the inner side of the ephod
  chosen_spanish: que mira hacia el lado interior del efod
  alternatives_spanish:
  - que está hacia el lado interior del efod
  - que da al interior del efod
  - que mira hacia dentro, hacia el efod
  lexicon: HALOT
  rationale: עֵבֶר + בָּיְתָה expresa la orientación hacia el lado interior. 'Que mira hacia el lado interior' comunica la relación espacial de manera natural en español y conserva la idea direccional de la frase inglesa sin fijarla a una sola imagen técnica.
translation_notes:
  revision_awareness: El texto coincide con la lectura base inglesa auditada y no requiere revisión sustantiva; se ha ajustado únicamente la formulación española para que suene natural y conserve la precisión espacial del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa 'efod' y 'pectoral' como términos técnicos consistentes con la literatura sacerdotal del Pentateuco.
  - Se conserva una sola nota léxica porque la única ambigüedad significativa en español es la orientación de la frase final.
