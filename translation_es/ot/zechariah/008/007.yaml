base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/007.yaml
  text: 'Thus says Yahweh of hosts: Behold[b][a], I will save my people from the land of the east and from the land of the setting of the sun.'
  footnotes:
  - marker: a
    text: Or 'I will save my people.' The Hebrew participle can express imminent or certain future action in prophetic speech.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the land of the east and from the land of the setting of the sun,' a merism for places far east and far west.
    reason: cultural_note
