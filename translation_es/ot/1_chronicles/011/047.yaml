translation:
  language: es
  text: Eliel, Obed y Jaasiel el mezobaíta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo הַמְּצֹבָיָה es una designación gentilicia; probablemente significa que Jaasiel era de Mezobá o de un lugar o clan de nombre semejante. El topónimo exacto es incierto, por lo que también serían posibles transliteraciones como «mezobaíta» o «mitzobaíta».
