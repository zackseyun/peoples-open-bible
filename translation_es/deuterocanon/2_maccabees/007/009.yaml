translation:
  language: es
  text: 'Y con su último aliento[a], dijo: «Tú, maldito desgraciado[b], nos sueltas de esta vida presente, pero el Rey del mundo nos levantará, a nosotros, que hemos muerto por sus leyes[c], para una renovación eterna de la vida[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su último aliento». La expresión griega se refiere de manera literal al último soplo de vida.
    reason: lexical_alternative
  - marker: b
    text: O «maldito», «maldito infeliz» o «maldito ser» para reflejar ἀλάστωρ, un insulto fuerte de reproche.
    reason: lexical_alternative
  - marker: c
    text: O «por causa de sus leyes» o «por amor de sus leyes». El griego indica el motivo o causa de la muerte martirial.
    reason: lexical_alternative
  - marker: d
    text: O «para una resurrección eterna a la vida». El griego usa el raro sustantivo ἀναβίωσις, con sentido de volver a vivir o renovación de vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐσχάτῃ δὲ πνοῇ
  english_pob_choice: at his last breath
  chosen_spanish: en su último aliento
  alternatives_spanish:
  - con su último aliento
  - cuando estaba a punto de morir
  lexicon: LSJ
  rationale: La frase griega refiere de manera concreta al último soplo de vida. «En su último aliento» conserva la vividez de la escena y el valor temporal inmediato, sin volverla una paráfrasis amplia.
- source_word: γενόμενος
  english_pob_choice: as he was
  chosen_spanish: y cuando estuvo
  alternatives_spanish:
  - siendo
  - cuando llegó a
  lexicon: BDAG
  rationale: Aquí el participio funciona con valor temporal ligado a la expresión anterior. «Y cuando estuvo» expresa bien la transición al habla final en español natural.
- source_word: ἀλάστωρ
  english_pob_choice: accursed wretch
  chosen_spanish: maldito
  alternatives_spanish:
  - desgraciado
  - maldito ser
  - maldito infeliz
  lexicon: LSJ
  rationale: El término es un insulto fuerte. «Maldito» preserva el reproche y la condena sin introducir connotaciones míticas ajenas; en español el tono se completa por el contexto de insulto directo.
- source_word: ἐκ τοῦ παρόντος
  english_pob_choice: from this present life
  chosen_spanish: de esta vida presente
  alternatives_spanish:
  - de este estado presente
  - de este mundo presente
  - de esta vida
  lexicon: LSJ
  rationale: En el contexto de ζῆν, la referencia contrasta la vida mortal actual con la vida futura. «Vida presente» reproduce ese contraste de modo claro y fiel.
- source_word: ζῆν ἀπολύεις
  english_pob_choice: release us from this present life
  chosen_spanish: nos privas de esta vida presente
  alternatives_spanish:
  - nos liberas de esta vida presente
  - nos despides de esta vida presente
  - nos quitas la vida presente
  lexicon: BDAG
  rationale: Literalmente la idea es «nos sueltas/liberas de vivir». «Nos privas de esta vida presente» conserva el sentido de perder la vida terrenal a manos del tirano y evita suavizar la violencia del verbo.
- source_word: ὁ δὲ τοῦ κόσμου βασιλεὺς
  english_pob_choice: the King of the world
  chosen_spanish: el Rey del mundo
  alternatives_spanish:
  - el Rey del universo
  - el Rey del cosmos
  - el Rey de este mundo
  lexicon: LSJ
  rationale: «Mundo» traduce κόσμος en su sentido de orden creado. «Rey del mundo» mantiene el contraste entre el tirano humano y el soberano divino.
- source_word: ἀποθανόντας ἡμᾶς
  english_pob_choice: us, who have died
  chosen_spanish: a nosotros que hemos muerto
  alternatives_spanish:
  - a nosotros después de morir
  - a nosotros que morimos
  - a nosotros ya muertos
  lexicon: BDAG
  rationale: 'El participio aoristo se expresa bien como una cláusula relativa: «a nosotros que hemos muerto». Así se mantiene la relación con «nos resucitará».'
- source_word: ὑπὲρ τῶν αὐτοῦ νόμων
  english_pob_choice: for his laws
  chosen_spanish: por sus leyes
  alternatives_spanish:
  - a favor de sus leyes
  - por causa de sus leyes
  - por amor de sus leyes
  lexicon: BDAG
  rationale: En contexto martirial, ὑπέρ señala causa o motivo. «Por sus leyes» es breve y natural en español, y conserva que la muerte ocurre por fidelidad a la ley divina.
- source_word: εἰς αἰώνιον ἀναβίωσιν ζωῆς
  english_pob_choice: into an everlasting renewal of life
  chosen_spanish: para una renovación eterna de la vida
  alternatives_spanish:
  - para una resurrección eterna a la vida
  - hacia un revivir eterno de la vida
  - para una reanimación eterna de la vida
  lexicon: LSJ
  rationale: ἀναβίωσις es un término raro que comunica volver a vivir, reanudación o renovación vital. «Renovación eterna de la vida» conserva esa rareza sin forzar una fórmula doctrinal más cerrada que el griego.
- source_word: ἀναστήσει
  english_pob_choice: will raise us up
  chosen_spanish: nos resucitará
  alternatives_spanish:
  - nos levantará
  - nos hará levantarnos
  - nos hará resucitar
  lexicon: BDAG
  rationale: En este contexto, el verbo expresa resurrección. «Nos resucitará» es la forma más directa y clara en español, sin perder el matiz de acción divina.
theological_decisions:
- issue: Lenguaje de resurrección y renovación vital
  english_pob_reading: The verse speaks of God raising the martyrs into everlasting life after death for his laws.
  chosen_spanish_reading: El versículo afirma que el Rey del mundo resucitará a los que han muerto por sus leyes, para una renovación eterna de la vida.
  alternative_spanish_readings:
  - resucitará a los mártires para vida eterna
  - los levantará a una resurrección eterna a la vida
  rationale: El griego combina ἀναστήσει con la expresión rara εἰς αἰώνιον ἀναβίωσιν ζωῆς. Conviene conservar tanto el verbo de resucitar como la idea de renovación/vuelta a vivir, sin disolver una en la otra.
  doctrine_reference: Preservar la tensión teológica y el paralelismo léxico; no reducir el texto a una sola fórmula doctrinal
- issue: Insulto dirigido al verdugo
  english_pob_reading: accursed wretch
  chosen_spanish_reading: maldito
  alternative_spanish_readings:
  - maldito infeliz
  - maldito desdichado
  - maldito ser
  rationale: ἀλάστωρ es una injuria fuerte. En español, «maldito» reproduce la carga reprochadora; el contexto narrativo ya hace evidente el tono despectivo.
  doctrine_reference: Mantener el registro de reproche sin domesticar el insulto
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó ἀλάστωρ de 'accursed man' a 'accursed wretch' para reflejar mejor el tono de reproche. La versión española adopta un insulto breve y fuerte («maldito») con nota de alternativas para no perder esa intensidad.
  spanish_consistency_notes:
  - Se mantiene «Rey del mundo» como equivalente estable de ὁ τοῦ κόσμου βασιλεὺς.
  - Se usa «resucitará» para ἀναστήσει, reservando la nota para la rareza de ἀναβίωσις.
  - «Vida presente» conserva el contraste con la vida futura sin introducir vocabulario eclesiástico ajeno al griego.
  - 'El orden de la cláusula principal sigue el flujo narrativo del original: circunstancia de muerte, insulto, contraste entre tirano humano y Rey divino, y promesa de vindicación.'
