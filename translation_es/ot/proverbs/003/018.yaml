translation:
  language: es
  text: Ella es un árbol de vida para los que se aferran a ella[b]; y los que la sostienen firmemente[a] son bienaventurados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo puede significar también 'sostener', 'apoyar' o 'mantener firmemente'.
    reason: lexical_alternative
  - marker: b
    text: Los pronombres femeninos se refieren a la sabiduría personificada en el contexto inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: עֵץ חַיִּים
  english_pob_choice: a tree of life
  chosen_spanish: Árbol de vida
  alternatives_spanish:
  - un árbol de vida
  - el árbol de vida
  - árbol que da vida
  lexicon: HALOT
  rationale: La expresión hebrea es metafórica y no exige el artículo definido; en español, dejarla sin artículo inicial funciona con naturalidad proverbial y conserva la imagen. 'Árbol que da vida' explicaría el sentido, pero debilita la metáfora original.
- source_word: הִיא
  english_pob_choice: She is
  chosen_spanish: es ella
  alternatives_spanish:
  - es eso
  - es
  lexicon: HALOT
  rationale: El pronombre femenino singular debe mantenerse porque personifica a la sabiduría. En español, 'ella' conserva esa personificación mejor que un neutro impersonal.
- source_word: לַמַּחֲזִיקִים
  english_pob_choice: to those who take hold of
  chosen_spanish: para los que se aferran a
  alternatives_spanish:
  - para los que toman posesión de
  - para los que la agarran
  - para los que se sujetan a
  lexicon: HALOT
  rationale: El verbo comunica aferrarse o tomar firmemente; 'se aferran a' suena natural en español y preserva la idea de adherirse con firmeza, sin volverlo demasiado brusco.
- source_word: בָּהּ
  english_pob_choice: her
  chosen_spanish: a ella
  alternatives_spanish:
  - de ella
  - en ella
  lexicon: HALOT
  rationale: El sufijo femenino singular retoma a la sabiduría personificada. 'A ella' es la manera más directa de expresar el objeto del aferrarse en español.
- source_word: וְתֹמְכֶיהָ
  english_pob_choice: and those who hold her fast
  chosen_spanish: y los que la sostienen firmemente
  alternatives_spanish:
  - y los que la apoyan
  - y los que la up tienen
  - y los que la mantienen
  lexicon: HALOT
  rationale: תמך puede significar sostener, apoyar o mantener firmemente. 'La sostienen firmemente' conserva la idea de apoyo perseverante sin perder la intensidad del paralelo con 'se aferran a'.
- source_word: מְאֻשָּׁר
  english_pob_choice: are blessed
  chosen_spanish: son bienaventurados
  alternatives_spanish:
  - son bendecidos
  - son dichosos
  - son felices
  lexicon: HALOT
  rationale: En sabiduría, el término expresa estado de dicha/felicidad favorecida; 'bienaventurados' conserva el tono sapiencial y evita el matiz meramente emocional de 'felices'. Aunque 'bendecidos' es posible, 'bienaventurados' comunica mejor la plenitud resultante.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personal language ('She... her') for wisdom
  chosen_spanish_reading: Mantener lenguaje personal femenino ('ella... a ella') para la sabiduría
  alternative_spanish_readings:
  - Usar lenguaje impersonal ('eso... ello')
  - Traducir la sabiduría como un abstracto sin pronombres
  rationale: El hebreo usa formas femeninas singulares y el contexto literario presenta a la sabiduría como una figura personificada. La traducción española debe preservar esa tensión literaria sin convertirla en una afirmación doctrinal adicional.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de מְאֻשָּׁר en contexto sapiencial
  english_pob_reading: are blessed
  chosen_spanish_reading: son bienaventurados
  alternative_spanish_readings:
  - son felices
  - son afortunados
  - son bendecidos
  rationale: La fórmula no describe simple estado subjetivo de ánimo, sino una condición favorable y aprobada. 'Bienaventurados' mantiene el registro sapiencial y la ambigüedad fructífera del hebreo.
  doctrine_reference: Proverbios 3:18; sabiduría hebrea
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y coincide con el examen auditado en inglés, sin cambios revisionales necesarios según el registro más reciente.
  spanish_consistency_notes:
  - Se conserva la personificación femenina de la sabiduría mediante 'ella' y 'a ella'.
  - '''Bienaventurados'' mantiene el tono sapiencial de מְאֻשָּׁר sin reducirlo a simple emoción.'
  - 'El paralelismo verbal se refleja con dos expresiones cercanas: ''se aferran a'' / ''sostienen firmemente''.'
