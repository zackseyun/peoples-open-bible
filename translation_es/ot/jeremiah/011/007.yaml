translation:
  language: es
  text: 'Porque solemnemente advertí[a] a sus padres el día en que los hice subir de la tierra de Egipto, y hasta este día, madrugando y advirtiendo, diciendo: «Escuchen mi voz»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testifiqué solemnemente». El hebreo intensifica el verbo con una forma enfática; en este contexto el sentido es de advertencia profética y de testimonio de pacto.
    reason: lexical_alternative
  - marker: b
    text: O «Obedezcan mi voz». La expresión hebrea puede incluir la idea de escuchar con obediencia, especialmente en contextos de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o base de la acusación anterior. «Porque» expresa bien la relación explicativa en español sin agregar matices ajenos al hebreo.
- source_word: הָעֵד הַעִדֹתִי
  english_pob_choice: I solemnly warned
  chosen_spanish: solemnemente advertí
  alternatives_spanish:
  - solemnemente testifiqué
  - ciertamente advertí
  lexicon: HALOT
  rationale: La combinación intensiva del verbo עוּד pide fuerza y reiteración. «Advertí» conserva el matiz admonitorio que el contexto exige; «solemnemente» refleja la solemnidad/intensificación sin reducirlo a simple información legal.
- source_word: בַּאֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  lexicon: HALOT
  rationale: Se mantiene el término relacional e histórico del hebreo. En español, «padres» conserva la formulación del pacto; «antepasados» sería más explicativo pero menos fiel al wording.
- source_word: בְּיוֹם הַעֲלוֹתִי אוֹתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: in the day I brought them up from the land of Egypt
  chosen_spanish: el día en que los hice subir de la tierra de Egipto
  alternatives_spanish:
  - cuando los hice subir de la tierra de Egipto
  - el día que los saqué de la tierra de Egipto
  lexicon: HALOT
  rationale: העלה en este contexto es el idiomático «hacer subir» del éxodo. «Hice subir» preserva esa imagen y el agente divino. Se evita «saqué» porque suaviza el verbo específico del hebreo.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: and to this day
  chosen_spanish: y hasta este día
  alternatives_spanish:
  - y hasta hoy
  - e incluso hasta este día
  lexicon: HALOT
  rationale: Equivale al idiomático de continuidad desde el éxodo hasta el presente profético. «Hasta este día» es natural y conserva la referencia temporal plena.
- source_word: הַשְׁכֵּם וְהָעֵד
  english_pob_choice: rising early and warning them
  chosen_spanish: madrugando y advirtiendo
  alternatives_spanish:
  - madrugando y testificando
  - persistiendo en advertir
  lexicon: HALOT
  rationale: La construcción expresa diligencia repetida; «madrugando» preserva la imagen hebrea y es el giro usual en Jeremías. «Advirtiendo» mantiene el valor de עוּד en este contexto profético-amonestador.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  lexicon: HALOT
  rationale: Marcador quotativo estándar; «diciendo» es la forma directa y natural en español.
- source_word: שִׁמְעוּ בְּקוֹלִי
  english_pob_choice: Listen to my voice
  chosen_spanish: Escuchen mi voz
  alternatives_spanish:
  - Oigan mi voz
  - Obedezcan mi voz
  lexicon: HALOT
  rationale: Se preserva el valor auditivo literal de שׁמע, como en el POB inglés. «Escuchen» es natural y mantiene abierta la fuerza de obediencia sin resolverla en la traducción principal.
theological_decisions:
- issue: La fuerza de pacto en שִׁמְעוּ בְּקוֹלִי
  english_pob_reading: Listen to my voice
  chosen_spanish_reading: Escuchen mi voz
  alternative_spanish_readings:
  - Obedezcan mi voz
  - Oigan mi voz
  rationale: El hebreo puede implicar obediencia en contexto de pacto, pero la frase es literalmente auditiva. La redacción principal conserva esa tensión; el sentido de obediencia queda sugerido sin imponerse en el cuerpo del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se reportaron cambios necesarios y el grado de acuerdo general fue alto. Se mantuvo la decisión clave de traducir שׁמע בְּקוֹלִי como una invitación a escuchar, dejando la obediencia como matiz preservado en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «Egipto» sin artículo adicional innecesario para ajustarse al flujo natural del español.
  - «Madrugando» conserva el giro profético habitual de Jeremías y evita una paráfrasis explicativa.
  - Se evitó «obedecer» en el texto principal para no borrar la tensión lexical ya documentada en el audit trail.
