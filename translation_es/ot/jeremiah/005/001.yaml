base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/001.yaml
  text: Roam through the streets of Jerusalem[a], and please look and know, and search in her squares, whether you can find a man, whether there is one who does justice, who seeks faithfulness[b], and I will forgive her.
  footnotes:
  - marker: a
    text: Or 'truth' for 'faithfulness.' The Hebrew אֱמוּנָה can denote faithfulness, reliability, or truthfulness.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' renders the singular masculine Hebrew אִישׁ; the sense is that even one such person could not be found.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
