    rationale: בגד significa prenda/vestido/ropa de manera general. «Vestido» en español moderno suele entenderse como una pieza específica, mientras que el hebreo aquí usa una imagen más amplia de una prenda que se desgasta. «Como una prenda» es más preciso y natural.
