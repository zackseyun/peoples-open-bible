review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Heliodoro queda postrado a causa de la acción/poder divino, sin poder hablar y sin esperanza de salvación. Sin embargo, «sin voz» suena menos natural e idiomático en español para ἄφωνος en este contexto narrativo; el sentido mejor preservado es «sin poder hablar» o «mudo». También conviene simplificar «por efecto del poder divino» a una formulación más directa que refleje mejor διὰ τὴν θείαν ἐνέργειαν.'
  spanish_quality_summary: La frase es generalmente clara y digna, pero «sin voz» resulta algo calcada y poco natural en español bíblico moderno cuando se describe a una persona incapacitada para hablar. «Yacía» funciona bien para ἔρριπτο. La redacción mejora con un ajuste menor para mayor naturalidad y fidelidad idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Salvación» concuerda con la revisión inglesa documentada para σωτηρία, y la nota con «rescate»/«liberación» preserva la alternativa contextual. «Poder divino» es aceptable para θεία ἐνέργεια.
  issues:
  - severity: medium
    issue: «sin voz» para ἄφωνος
    rationale: Aunque literalmente posible, en español suena poco idiomático para una persona golpeada y postrada; puede sugerir afonía más que incapacidad de hablar. «Sin poder hablar» comunica mejor el valor contextual de ἄφωνος y mantiene la legibilidad.
  - severity: low
    issue: «por efecto del poder divino» añade una capa explicativa
    rationale: El griego dice sencillamente «a causa de/por la acción del poder divino». «Por el poder divino» es más directo y más cercano al texto fuente sin pérdida de claridad.
