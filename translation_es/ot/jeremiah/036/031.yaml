translation:
  language: es
  text: Y yo lo castigaré[a], a su descendencia y a sus siervos por su iniquidad, y traeré sobre ellos, sobre los habitantes de Jerusalén y sobre los hombres de Judá toda la calamidad que hablé contra ellos; pero no escucharon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''castigaré'' o ''visitaré con juicio''. פקד en este contexto expresa intervención punitiva, no una visita neutral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré
  - llamaré a cuentas
  lexicon: HALOT
  rationale: En este contexto de juicio con עַל, פקד no significa una visita neutral, sino una acción punitiva. 'Castigaré' transmite bien la fuerza judicial en español moderno sin perder la idea de intervención divina.
- source_word: עָלָיו
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - contra él
  - sobre él
  lexicon: HALOT
  rationale: Con פקד en sentido punitivo, el objeto humano se expresa naturalmente en español como complemento directo introducido por 'a'. 'Contra él' o 'sobre él' conservarían más la preposición, pero sonarían menos naturales.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus descendientes
  lexicon: HALOT
  rationale: זֶרַע aquí tiene sentido colectivo de posteridad. 'Descendencia' preserva ese valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede ser 'esclavo', el contexto cortesano favorece 'siervos' como término idiomático para ayudantes o subordinados. 'Esclavos' sería más fuerte, pero aquí la evidencia contextual no obliga a esa lectura.
- source_word: אֶת עֲוֺנָם
  english_pob_choice: for their iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - por su culpa
  - por su pecado
  lexicon: HALOT
  rationale: עָוֹן denota iniquidad/culpa moral, y aquí es la base del castigo. 'Iniquidad' conserva el peso moral del término y corresponde bien al uso del POB en inglés.
- source_word: וְהֵבֵאתִי עֲלֵיהֶם
  english_pob_choice: and I will bring on them
  chosen_spanish: y traeré sobre ellos
  alternatives_spanish:
  - y traeré contra ellos
  - y haré venir sobre ellos
  lexicon: HALOT
  rationale: La idiomática הביא על expresa traer juicio o desastre sobre alguien. 'Traeré sobre ellos' es cercano al hebreo y claro en español.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio sustantivado designa a los que viven en la ciudad. 'Habitantes' es conciso, preciso y acorde con el registro profético.
- source_word: אֶל אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - cada hombre de Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: La revisión inglesa optó por un colectivo más natural ('the men of Judah') en vez de una traducción distributiva rígida. En español, 'los hombres de Judá' conserva el masculino plural del hebreo y fluye bien en el paralelismo del verso.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: todo el mal
  alternatives_spanish:
  - toda la calamidad
  - toda la desgracia
  lexicon: HALOT
  rationale: En hebreo profético, רָעָה puede referirse a calamidad o desastre, pero aquí el paralelo y el contexto de juicio permiten 'mal' como término amplio y fiel. Se evita forzar 'desastre' si el español puede leerlo como evento únicamente circunstancial; 'mal' mantiene la ambigüedad entre mal moral y calamidad anunciada.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֲלֵיהֶם
  english_pob_choice: that I spoke against them
  chosen_spanish: que hablé contra ellos
  alternatives_spanish:
  - que declaré contra ellos
  - que pronuncié contra ellos
  lexicon: HALOT
  rationale: Aunque אֲלֵיהֶם puede leerse 'a ellos', el contexto es de amenaza judicial; 'hablé contra ellos' hace explícito ese matiz hostil sin añadir más de lo que el hebreo permite.
- source_word: וְלֹא שָׁמֵעוּ
  english_pob_choice: but they did not listen
  chosen_spanish: pero no escucharon
  alternatives_spanish:
  - y no escucharon
  - pero no obedecieron
  lexicon: HALOT
  rationale: שׁמע aquí implica oír con atención/obedecer al aviso profético. 'No escucharon' conserva la idea de no prestar atención, y 'pero' refleja el contraste adversativo del contexto.
theological_decisions:
- issue: Rendering of אֶת עֲוֺנָם in a judgment context
  english_pob_reading: for their iniquity
  chosen_spanish_reading: por su iniquidad
  alternative_spanish_readings:
  - por su culpa
  - por su pecado
  rationale: Se mantiene la idea de responsabilidad moral que justifica el castigo. 'Iniquidad' preserva la carga ética y jurídica del término mejor que una simplificación a 'culpa' o 'pecado'.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Renderings of masculine plural in אֶל אִישׁ יְהוּדָה
  english_pob_reading: the men of Judah
  chosen_spanish_reading: los hombres de Judá
  alternative_spanish_readings:
  - cada hombre de Judá
  - la gente de Judá
  rationale: Se conserva el masculino plural del hebreo sin convertir el texto en una generalización neutra. La forma elegida respeta la revisión inglesa más reciente y el paralelismo del oráculo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El inglés POB pasó de una traducción distributiva ('each man of Judah') a un colectivo más natural ('the men of Judah'). La versión española sigue esa revisión y evita una forma más rígida. También conserva la lectura de juicio para פקד y la idea de calamidad anunciada, sin suavizar el tono del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo lo requiere explícitamente; este verso no contiene el nombre divino.
  - '''Iniquidad'' se mantiene para עָוֹן en línea con el tratamiento léxico del proyecto.'
  - '''Hombres de Judá'' conserva el masculino del hebreo y el carácter colectivo aceptado en la revisión inglesa.'
  - '''Escucharon'' traduce שׁמע en el sentido de prestar oído/obedecer, no de mera percepción auditiva.'
