  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Tienda de reunión», «congregación» y «tabernáculo» están bien alineados. La mejora necesaria se concentra en el campo léxico de שׁמר / מִשְׁמֶרֶת.
