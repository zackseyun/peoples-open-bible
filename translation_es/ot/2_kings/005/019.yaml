    rationale: Aunque calca los elementos del hebreo, en español suena forzado y ambiguo. La frase debe expresar alejamiento desde la presencia de Eliseo y una distancia indefinida con una construcción idiomática.
  - severity: low
    issue: 'Marcador de nota mal colocado: «a [a]cierta distancia»'
    rationale: El formato requerido exige que el marcador aparezca pegado a la palabra o frase pertinente, p. ej. «cierta[a] distancia», sin espacio impropio.
