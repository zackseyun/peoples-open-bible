translation:
  language: es
  text: 'Porque esto es lo que dice Yahvé de los Ejércitos: Una vez más, dentro de poco,[b] sacudiré los cielos y la tierra y el mar y la tierra firme.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el Señor de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es una expresión comprimida: «aún una vez más, poco es». La idea es que, después de un corto tiempo, Yahvé sacudirá toda la creación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton, siguiendo la decisión auditada de no sustituirlo por un título. En español, «Yahvé» es la forma natural y reverente correspondiente a «Yahweh».
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los hostes
  lexicon: HALOT
  rationale: La POB en inglés opta por una traducción transparente del título. En español, «de los Ejércitos» conserva la imaginería concreta del hebreo y funciona como título divino reconocido y claro.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For this is what ... says
  chosen_spanish: Porque esto es lo que dice
  alternatives_spanish:
  - Porque así dice
  - Porque esto dice
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética de anuncio de mensajero con una sintaxis natural en español, sin volverla arcaizante ni perder el carácter introductorio.
- source_word: ע֥וֹד אַחַ֖ת מְעַ֣ט הִ֑יא
  english_pob_choice: Yet once more, in a little while
  chosen_spanish: Aún una vez más, dentro de poco
  alternatives_spanish:
  - Todavía una vez más, dentro de poco
  - Aún una sola vez más, en un poco de tiempo
  lexicon: HALOT
  rationale: 'Se conserva la doble idea del hebreo: repetición/última vez («aún una vez más») e inminencia temporal («dentro de poco»). Se evita explicar o armonizar con textos posteriores; la compresión hebrea queda reflejada de forma legible.'
- source_word: מַרְעִישׁ
  english_pob_choice: I will shake
  chosen_spanish: haré temblar
  alternatives_spanish:
  - sacudiré
  - haré estremecer
  lexicon: HALOT
  rationale: «Haré temblar» transmite bien la acción divina de conmoción cósmica y suena natural en español. Se evita un calco rígido que podría sonar menos idiomático que el valor causativo del verbo hebreo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: En este contexto cósmico, el plural hebreo se expresa mejor con «los cielos», conservando la amplitud del original y la correspondencia con la serie de realidades afectadas.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: Se traduce con el término más directo y amplio en español, coherente con el paralelo de los cielos y con el alcance cósmico del pasaje.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - la mar
  lexicon: HALOT
  rationale: «El mar» es la opción natural y fiel en español. Mantiene la secuencia de ámbitos creados que el texto enumera.
- source_word: הֶחָרָבָה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra seca
  - la tierra firme
  - el terreno seco
  lexicon: HALOT
  rationale: Se conserva la relación con «el mar» y el sentido de suelo seco/no acuático. «Tierra seca» es transparente y evita restringir indebidamente a un contexto de desierto.
theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de los hostes
  rationale: La traducción mantiene el nombre propio divino y traduce el título צְבָאוֹת de manera transparente. «De los Ejércitos» conserva la fuerza del título sin recurrir a la sustitución tradicional por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahweh'
- issue: Temporal phrasing עוֹד אַחַת מְעַט הִיא
  english_pob_reading: Yet once more, in a little while
  chosen_spanish_reading: Aún una vez más, dentro de poco
  alternative_spanish_readings:
  - Aún una vez más, en breve
  - Todavía una vez más, dentro de poco
  rationale: La frase hebrea es comprimida y admite una versión más literal o más idiomática. Se conserva la duplicidad semántica sin introducir una interpretación de Hebreos 12 ni suavizar la tensión temporal del original.
  doctrine_reference: 'DOCTRINE.md: translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El texto inglés auditado muestra alta concordancia y no tuvo cambios en la última pasada. Esta versión española sigue de cerca la decisión final aprobada, manteniendo el nombre divino como Yahvé, el título como «de los Ejércitos» y la frase temporal comprimida reflejada de manera natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «De los Ejércitos» traduce צְבָאוֹת de forma transparente y consistente con el audit trail.
  - «Los cielos / la tierra / el mar / la tierra seca» preserva la serie cósmica del hebreo.
  - No se introducen glosas interpretativas ajenas al versículo; la nota temporal explica la compresión hebrea sin armonización doctrinal.
