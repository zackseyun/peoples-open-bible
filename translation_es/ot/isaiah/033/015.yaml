review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la cadena de participios éticos y el sentido general del hebreo: conducta justa, habla recta, rechazo del lucro opresivo, negativa al soborno, rechazo de la violencia y evasión del mal. Sin embargo, hay dos problemas de fidelidad formal/contextual: (1) las notas b/c están invertidas respecto de sus anclajes en el texto; y (2) en español conviene ajustar ''de derramamiento de sangre'' a ''de oír hablar de derramamiento de sangre'' para representar mejor מִשְּׁמֹעַ דָּמִים / ''hearing of bloodshed'' y evitar una construcción algo abrupta.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta pequeñas asperezas: ''ganancia de extorsiones'' suena algo duro aunque aceptable; ''sacude sus manos para no aceptar un soborno'' es comprensible, pero mejora con ''sacude sus manos para no aceptar soborno'' o similar. Lo principal que requiere reparación es la correspondencia de notas y una leve mejora de naturalidad en la frase sobre oír de derramamiento de sangre.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Justicia' para צְדָקוֹת es defendible aunque 'rectitud' sigue siendo alternativa válida en nota. 'Soborno', 'mal' y el resto del léxico se alinean con la racionalidad documentada. No aparecen términos sensibles del glosario mayor (Yahvé, Mesías, etc.).
  issues:
  - severity: medium
    issue: Notas b y c desalineadas con sus anclajes en el texto
    rationale: En el texto '[c][b]' aparece junto a 'derramamiento de sangre', pero la nota b explica 'sangres' y la c da la alternativa de 'ganancia de opresiones'. Los marcadores deben corresponder al lugar exacto donde se anclan.
  - severity: medium
    issue: '''para no oír de derramamiento de sangre'' es poco natural y no expresa del todo ''hearing of bloodshed'''
    rationale: El hebreo y el inglés auditado apuntan a rehusar oír de violencia/homicidio. En español, 'oír hablar de derramamiento de sangre' o 'oír de derramamiento de sangre' con apoyo verbal más natural representa mejor ese sentido.
  - severity: low
    issue: La nota a está anclada en 'recto' pero ofrece una alternativa para צְדָקוֹת
    rationale: La variante 'obras de justicia' corresponde al primer sintagma ('anda en justicia'), no a 'habla lo recto'. Conviene que la nota a solo recoja alternativas de מֵישָׁרִים, y que la alternativa de צְדָקוֹת no se fuerce aquí.
  revised_spanish_text: El que anda en justicia y habla lo recto[a], el que desprecia la ganancia de extorsiones[b], el que sacude sus manos para no aceptar un soborno, el que tapa sus oídos para no oír hablar de derramamiento de sangre[c], y cierra sus ojos para no mirar el mal—
  revised_footnotes:
