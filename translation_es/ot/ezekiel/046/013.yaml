translation:
  language: es
  text: Y ofrecerás un cordero de un año, sin defecto, como holocausto diario[a] para Yahvé; mañana tras mañana lo ofrecerás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mañana tras mañana», una expresión que indica repetición regular; alternativamente, «cada mañana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - cordero macho
  - borrego
  lexicon: HALOT
  rationale: En contexto sacrificial, כֶבֶשׂ designa un cordero para la ofrenda. En español, ‘cordero’ es natural y suficientemente preciso; el rasgo masculino no queda explícito en el hebreo de forma necesaria para el sentido del verso, y ‘cordero macho’ sonaría recargado.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - de un año de edad
  lexicon: HALOT
  rationale: La expresión idiomática señala que el animal tiene un año. ‘De un año’ es breve, idiomático y conserva el valor temporal sin añadir glosa innecesaria.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - perfecto
  - sin imperfección
  lexicon: HALOT
  rationale: En lenguaje cultual, תָּמִים describe un animal apto para sacrificio por carecer de defecto. ‘Sin defecto’ es claro, formal y evita que ‘perfecto’ suene moralizante.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  lexicon: HALOT
  rationale: Aunque el verbo básico es ‘hacer’, en este contexto ritual la acción es sacrificial. ‘Ofrecerás’ comunica la función cultual con naturalidad en español.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda del todo consumida
  lexicon: HALOT
  rationale: En español bíblico, ‘holocausto’ es el término técnico tradicional para עוֹלָה. Lo conservo porque corresponde al género sacrificial y es comprensible en registro eclesial.
- source_word: לַיּוֹם
  english_pob_choice: daily
  chosen_spanish: diario
  alternatives_spanish:
  - cada día
  - día tras día
  lexicon: HALOT
  rationale: La construcción indica repetición regular. ‘Diario’ reproduce bien ese valor adverbial y encaja con el lenguaje sacrificial.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del proyecto: el nombre divino YHWH se vierte como ‘Yahvé’. ‘Para’ refleja la dedicación del sacrificio en el contexto de la ofrenda.'
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana a mañana
  lexicon: HALOT
  rationale: La repetición hebrea expresa recurrencia distributiva. ‘Mañana tras mañana’ preserva el paralelismo y la insistencia del original mejor que una simple equivalencia adverbial.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - ese
  lexicon: HALOT
  rationale: El pronombre retoma al cordero/ofrenda. En español, ‘lo’ mantiene la referencia directa y evita ambigüedad; con ‘ofrecerás’ y el objeto implícito, el clítico es idiomático.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton en forma directa. Conforme a la política del proyecto, se traduce por ‘Yahvé’ para preservar el nombre propio del pacto, en vez de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El texto inglés de referencia mantiene un solo ajuste de revisión relevante: la nota sobre la repetición distributiva de בַּבֹּקֶר בַּבֹּקֶר. No hay cambios sustanciales adicionales en el pasaje, y la versión española conserva esa misma distinción con ‘mañana tras mañana’.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ de manera consistente con el estándar del proyecto para YHWH.
  - Se usa ‘holocausto’ como término sacrificial técnico, no en su sentido moderno no religioso.
  - La nota [a] se ancla en la expresión repetida ‘mañana tras mañana’ para reflejar la alternativa de lectura distributiva.
  - El sujeto y el objeto implícito se entienden por el contexto; ‘lo’ reproduce el pronombre hebreo de objeto directo.
