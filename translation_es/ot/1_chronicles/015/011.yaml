translation:
  language: es
  text: 'Entonces David llamó a Sadoc y a Abiatar, los sacerdotes, y a los levitas: Uriel, Asaías, Joel, Semaías, Eliel y Aminadab.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó a
  alternatives_spanish:
  - convocó a
  - mandó llamar a
  lexicon: HALOT
  rationale: El verbo קרא en esta forma narrativa introduce una convocatoria de personas ante David. En español, "llamó a" expresa de manera natural y fiel esa acción de hacer venir o comparecer, sin sobrecargar con un matiz más administrativo que el hebreo no exige.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes consagrados
  - los clérigos
  lexicon: HALOT
  rationale: El artículo definido hebreo señala a Zadoc y Abiatar en su función sacerdotal específica. "Los sacerdotes" conserva esa referencia directa y evita el lenguaje eclesiástico posterior que no pertenece al texto.
- source_word: וְלַלְוִיִּם
  english_pob_choice: and for the Levites
  chosen_spanish: y a los levitas
  alternatives_spanish:
  - y para los levitas
  - y a los levitas
  lexicon: HALOT
  rationale: El hebreo repite la preposición ל con valor de destinatario de la convocatoria. En español, "y a los levitas" conserva la idea de llamar a personas concretas, con una naturalidad mayor que una repetición literal de "para".
- source_word: לְאוּרִיאֵל עֲשָׂיָה וְיוֹאֵל שְׁמַעְיָה וֶאֱלִיאֵל וְעַמִּינָדָב
  english_pob_choice: Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab
  chosen_spanish: a Uriel, Asaías, Joel, Semaías, Eliel y Aminadab
  alternatives_spanish:
  - a Uriel, Asaía, Joel, Semaía, Eliel y Aminadab
  lexicon: HALOT
  rationale: Los nombres propios se transliteran al español de forma reconocible y sobria. Se mantiene el conjunto de seis nombres como identificación de los levitas convocados, tal como lo hace el texto fuente y la edición inglesa.
- source_word: דָוִיד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin necesidad de variación.
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia con el texto hebreo y no contiene notas ni revisiones aplicadas; por eso se mantiene una solución directa, con la única adaptación natural del valor convocativo de וַיִּקְרָא en español.
  spanish_consistency_notes:
  - Se usó "llamó a" para conservar el matiz de convocatoria del hebreo y la decisión inglesa "called for".
  - 'Se mantuvo la estructura enumerativa con dos grupos: sacerdotes y levitas nombrados.'
  - Se empleó "levitas" y no una sustitución eclesiástica, para respetar el referente levítico del texto bíblico.
  - Los nombres propios siguen formas españolas ampliamente reconocibles y consistentes con el uso bíblico moderno.
