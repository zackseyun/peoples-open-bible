  to: Si hermanos habitan juntos, y uno de ellos muere y no tiene hijo[a], la esposa del muerto no será dada en matrimonio fuera, a un hombre extraño[b]. Su cuñado[c] se llegará a ella[d] y la tomará para sí como esposa, y cumplirá para con ella el deber de cuñado.
  rationale: Se corrige la cláusula problemática para reflejar el valor de היה + הַחוּצָה sin la torpeza de «saldrá fuera», y se reordenan las notas para que coincidan con los puntos léxicos/culturales del expediente inglés. Se conserva «sin/no tiene hijo» para respetar la especificidad de בֵן, se mantiene el eufemismo bíblico «se llegará a ella», y se deja «cuñado» en el texto principal por legibilidad, con nota que preserva la relación técnica más exacta.
