- from: Amen a Yahvé[a], todos sus fieles. Yahvé preserva a los fieles y[a] paga plenamente al que actúa con orgullo[b].
  to: Amen a Yahvé[a], todos sus fieles. Yahvé preserva a los fieles y paga plenamente[b] al que actúa con soberbia.
  rationale: Se corrige la colocación de notas para que cada marcador tenga un solo anclaje válido en el texto, y se cambia «orgullo» por «soberbia» para reflejar con más precisión el sentido negativo de גַאֲוָה en español contemporáneo. Se conserva el resto porque es fiel al hebreo, legible y coherente con la terminología del proyecto.
