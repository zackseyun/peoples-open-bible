revisions:
- from: Porque la esperanza de la arrogancia es pecado[a], y su fuente derrama maldad.
  to: Porque la esperanza de la arrogancia es pecado[a], y su fuente hace brotar maldad.
  rationale: Se mantiene la estructura y las elecciones léxicas principales del borrador, pero se sustituye «derrama» por «hace brotar» para reflejar mejor la imagen hebrea de una fuente/manantial que produce o hace salir la maldad. La nota alternativa griega se conserva sin cambios sustanciales porque está bien alineada con el expediente inglés.
