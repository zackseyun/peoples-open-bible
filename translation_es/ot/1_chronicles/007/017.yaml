  chosen_spanish: Bedán
  alternatives_spanish:
  - Bedan
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para ajustar la pronunciación natural en español y mantener la identificación del nombre.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: En registro genealógico español, la copulativa explícita es natural y comunica el valor retrospectivo del hebreo sin perder la relación demostrativa.
- source_word: בְּנֵי גִלְעָד
  english_pob_choice: the sons of Gilead
  chosen_spanish: los hijos de Galaad
  alternatives_spanish:
  - los descendientes de Galaad
  lexicon: HALOT
  rationale: Se conserva el parentesco literal 'hijos de' para reflejar el modismo genealógico hebreo; 'Galaad' sigue la forma española habitual del nombre.
- source_word: בֶּן מָכִיר
  english_pob_choice: son of Machir
  chosen_spanish: hijo de Maquir
  alternatives_spanish:
  - descendiente de Maquir
  lexicon: HALOT
  rationale: La relación genealógica inmediata se expresa con 'hijo de'; 'Maquir' adapta el nombre propio al español bíblico.
- source_word: בֶּן מְנַשֶּׁה
  english_pob_choice: son of Manasseh
  chosen_spanish: hijo de Manasés
  alternatives_spanish:
  - descendiente de Manasés
  lexicon: HALOT
  rationale: Se mantiene la cadena genealógica con 'hijo de' y la forma española común 'Manasés'.
theological_decisions:
- issue: Valor demostrativo y resumen genealógico de אֵלֶּה
  english_pob_reading: These were the sons of Gilead son of Machir, son of Manasseh.
  chosen_spanish_reading: Estos eran los hijos de Galaad, hijo de Maquir, hijo de Manasés.
  alternative_spanish_readings:
