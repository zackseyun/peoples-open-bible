translation:
  text: Release yourselves.[a] Or if you release yourselves from him, who will be
    able to seize you? For your inside is your outside,[b] and the one who fashions
    the outside is the one who fashions the inside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: listen; hear. The verb visible in this OCR block is ⲥⲁϩⲟⲩⲛ (“understand,
      be wise”), but some witnesses/readings in context support a hearing/listening
      parallel to “cry out.”'
    reason: lexical_alternative
  - marker: b
    text: Or 'I am the one who cries out, and I understand.[a]'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲕⲁ … ⲉⲃⲟⲗ
  chosen: cry out
  alternatives:
  - call out
  - proclaim
  - shout
  lexicon: Crum Coptic (ⲕⲁ- from Gk. καλέω)
  rationale: The verb root aligns with Greek kalein “to call,” and the adverb ⲉⲃⲟⲗ
    (“out”) indicates outward projection; “cry out” preserves intensity and cadence
    in this poetic context.
- source_word: ⲥⲁϩⲟⲩⲛ
  chosen: understand
  alternatives:
  - be wise
  - comprehend
  - listen
  lexicon: Crum Coptic, sahooun
  rationale: Primary sense is “understand, be wise.” Some English traditions opt for
    “listen” to mirror the call/hear paradox; we retain the lexical core while noting
    the alternative.
- source_word: ⲉⲃⲟⲗ
  chosen: out
  alternatives:
  - forth
  - abroad
  lexicon: Crum Coptic
  rationale: Standard adverb meaning “out, outward”; keeps the concrete force of the
    expression “cry out.”
parallelism_check: 'The line keeps the self-paradoxical pairing: the speaker both
  emits the call and possesses understanding. While less chiastic than a call/hear
  pairing, the call/understand pair maintains antithesis between outward utterance
  and inward cognition. Should a “listen/hear” reading be confirmed, parallelism would
  become even tighter without altering the voice.'
voice_check: First-person, declarative, oracular voice is preserved with the “I am
  the one who …” pattern characteristic of Thunder. Diction remains terse and imperative
  in feel, matching the poem’s authoritative self-revelation.
alignment_risk_note: Alignment confidence is medium. The first clause (“cries out”)
  is strongly supported by ⲕⲁ … ⲉⲃⲟⲗ. The second clause is inferred from the occurrence
  of ⲥⲁϩⲟⲩⲛ (understand) within the same OCR block, though segmentation may mix adjacent
  sayings; the verb ⲥⲱⲧⲙ (“listen/hear”) is not visible in this snippet. We therefore
  render “understand” in the main line and note the listening alternative.
