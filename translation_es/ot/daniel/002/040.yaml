translation:
  language: es
  text: Y el cuarto reino será fuerte como hierro[a], porque el hierro aplasta y destroza todo; y como el hierro que destroza[b] todas estas cosas, aplastará y destrozará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y un cuarto reino». El arameo no lleva artículo definido equivalente al español, aunque el contexto lo identifica claramente como el cuarto en la secuencia.'
    reason: lexical_alternative
  - marker: b
    text: «Todas estas cosas» probablemente alude a los reinos anteriores representados en la visión de la estatua.
    reason: cross_reference
lexical_decisions:
- source_word: וּמַלְכוּ רביעיה
  english_pob_choice: And the fourth kingdom
  chosen_spanish: Y el cuarto reino
  alternatives_spanish:
  - Y un cuarto reino
  - Y el reino cuarto
  lexicon: HALOT
  rationale: מַלְכוּ significa 'reino' y רביעיה señala el orden 'cuarto'. En español, 'el cuarto reino' comunica con naturalidad la secuencia interpretativa. Se evita 'un cuarto reino' porque el contexto ya identifica inequívocamente al cuarto de la serie.
- source_word: תֶּהֱוֵא
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - ha de ser
  lexicon: HALOT
  rationale: El imperfecto arameo expresa estado futuro; 'será' es la equivalencia más directa y natural en español.
- source_word: תַקִּיפָה
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - robusto
  lexicon: HALOT
  rationale: El adjetivo describe fuerza o firmeza. 'Fuerte' es la opción más directa y comprensible en comparación con el hierro, sin perder el valor semántico básico.
- source_word: כְּפַרְזְלָא
  english_pob_choice: like iron
  chosen_spanish: como hierro
  alternatives_spanish:
  - cual hierro
  - igual que hierro
  lexicon: HALOT
  rationale: La partícula comparativa con 'hierro' se expresa naturalmente con 'como hierro'. Mantiene la imagen metálica sin endurecer la sintaxis.
- source_word: מְהַדֵּק
  english_pob_choice: crushes
  chosen_spanish: aplasta
  alternatives_spanish:
  - hace pedazos
  - machaca
  lexicon: HALOT
  rationale: El verbo comunica aplastamiento violento. 'Aplasta' conserva la fuerza física y funciona bien con el objeto directo implícito de la comparación.
- source_word: וְחָשֵׁל כֹּלָּא
  english_pob_choice: and shatters everything
  chosen_spanish: y destroza todo
  alternatives_spanish:
  - y rompe todo
  - y hace añicos todo
  lexicon: HALOT
  rationale: La combinación intensifica la destrucción de 'todo'. 'Destroza' da el matiz de fragmentación violenta y evita redundar demasiado con 'aplasta'. 'Todo' es una forma natural para כֹּלָּא.
- source_word: מְרָעַע
  english_pob_choice: breaks
  chosen_spanish: destroza
  alternatives_spanish:
  - rompe
  - hace pedazos
  lexicon: HALOT
  rationale: El valor del verbo es romper, quebrantar o desmenuzar. En español, 'destroza' permite mantener la fuerza del paralelo sin introducir una distinción artificial entre dos verbos casi sinónimos.
- source_word: כָּל אִלֵּין
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: HALOT
  rationale: El demostrativo apunta a lo ya descrito en la visión de la estatua. 'Todas estas cosas' conserva la referencia amplia y la deja abierta al contexto, como en el inglés POB.
- source_word: תַּדִּק וְתֵרֹעַ
  english_pob_choice: it will crush and shatter
  chosen_spanish: aplastará y destrozará
  alternatives_spanish:
  - aplastará y romperá
  - machacará y hará pedazos
  lexicon: HALOT
  rationale: Se preserva el paralelismo de dos verbos de destrucción intensa. 'Aplastará y destrozará' mantiene el tono violento y evita suavizar la duplicación semántica.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en la cláusula final para igualar más estrechamente el paralelismo destructivo del original; por eso la frase final española mantiene dos verbos fuertes y coordinados («aplastará y destrozará»), sin suavizar la segunda acción.
  spanish_consistency_notes:
  - Se usa «reino» para מַלְכוּ siguiendo el sentido interpretativo del pasaje.
  - Se mantiene «hierro» de forma literal como imagen comparativa, sin sustituirlo por una paráfrasis explicativa.
  - Se evita «SEÑOR» u otra terminología de sustitución, porque el verso no contiene el Tetragrámaton ni una referencia divina directa.
  - Se conserva un registro bíblico claro y moderno, con verbos vigorosos pero no arcaizantes.
