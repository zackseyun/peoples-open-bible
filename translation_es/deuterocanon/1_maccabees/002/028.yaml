translation:
  language: es
  text: Y huyeron él y sus hijos a los montes, y abandonaron todo lo que tenían en la ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se fueron huyendo
  lexicon: LSJ
  rationale: El aoristo de φεύγω expresa huida ante peligro. «Huyeron» comunica con naturalidad la acción urgente y conserva la fuerza del movimiento sin añadir interpretación.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Matatías
  - él mismo
  lexicon: LSJ
  rationale: El pronombre remite a Matatías por el contexto inmediato, pero el griego solo dice «él». Mantener «él» sigue de cerca la forma original sin introducir el nombre en este versículo.
- source_word: οἱ υἱοὶ αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - los hijos de él
  - sus hijos varones
  lexicon: LSJ
  rationale: La expresión es idiomática y directa; «sus hijos» reproduce bien el sentido natural del griego y del inglés auditado.
- source_word: εἰς τὰ ὄρη
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - a la región montañosa
  lexicon: LSJ
  rationale: ὄρη significa literalmente montes/montañas. «A los montes» conserva el sentido concreto y suena más natural en español bíblico que una paráfrasis como «región montañosa».
- source_word: ἐγκατέλιπον
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - dejaron atrás
  lexicon: LSJ
  rationale: El verbo implica dejar abandonando. «Abandonaron» sigue la decisión revisada en el inglés auditado y refleja con mayor claridad la renuncia a los bienes al huir.
- source_word: ὅσα εἶχον
  english_pob_choice: whatever they had
  chosen_spanish: todo lo que tenían
  alternatives_spanish:
  - cuanto tenían
  - todo cuanto poseían
  lexicon: LSJ
  rationale: La relativa neutra abarca de manera amplia sus bienes. «Todo lo que tenían» transmite esa amplitud sin volver el español demasiado rígido o demasiado técnico.
- source_word: ἐν τῇ πόλει
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en la ciudad donde estaban
  - en la urbe
  lexicon: LSJ
  rationale: πόλις aquí es simplemente «ciudad». Mantenerlo literal preserva el lugar donde dejaron sus pertenencias.
translation_notes:
  revision_awareness: 'He seguido la lectura griega directamente, en consonancia con el audit trail inglés: huida urgente, destino topográfico concreto y abandono de los bienes en la ciudad. No se añadió ningún nombre propio porque el griego usa solo el pronombre αὐτός.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno sin recurrir a fórmulas eclesiásticas innecesarias.
  - «Montes» conserva el plural concreto del griego y evita suavizar la imagen topográfica.
  - «Abandonaron» refleja mejor ἐγκατέλιπον que un simple «dejaron» en un contexto de fuga.
