  yaml_path: translation/deuterocanon/wisdom_of_solomon/014/022.yaml
  text: Then it was not enough for them to go astray concerning the knowledge of God[a], but also, living in a great war of ignorance[b], they call such great evils peace.
  footnotes:
  - marker: a
    text: Or 'to be led astray concerning the knowledge of God.' The Greek infinitive can be understood with a more passive nuance.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a great war of ignorance' preserves the Greek metaphor; it describes life dominated by ignorance as though it were a state of warfare or deep conflict.
