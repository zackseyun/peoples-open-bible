translation:
  language: es
  text: y por encima de la Puerta de Efraín, y por encima de la Puerta Vieja, y por encima de la Puerta del Pescado, y la Torre de Hananel, y la Torre de los Cien, y hasta la Puerta de las Ovejas; y estuvieron[a] en la Puerta de la Guardia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se detuvieron». El verbo hebreo puede significar «estuvieron de pie» o, en contexto, «se detuvieron».
    reason: lexical_alternative
  - marker: b
    text: O «la Puerta de la Prisión» o «la Puerta de la Vigilancia» para «la Puerta de la Guardia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעַל
  english_pob_choice: and above
  chosen_spanish: y por encima de
  alternatives_spanish:
  - y sobre
  - y encima de
  lexicon: HALOT
  rationale: En este contexto de recorrido topográfico, 'por encima de' preserva la relación espacial de manera natural en español y mantiene la repetición de וְעַל sin volverla una mera variación estilística.
- source_word: לשׁער אפרים
  english_pob_choice: the Gate of Ephraim
  chosen_spanish: la Puerta de Efraín
  alternatives_spanish:
  - la Puerta de Efraím
  - la puerta de Efraín
  lexicon: HALOT
  rationale: Se conserva la relación constructa 'puerta de' y el nombre propio 'Efraín' como topónimo reconocible en español.
- source_word: שׁער הישׁנה
  english_pob_choice: the Old Gate
  chosen_spanish: la Puerta Vieja
  alternatives_spanish:
  - la Puerta Antigua
  - la puerta vieja
  lexicon: HALOT
  rationale: '''Vieja'' refleja directamente el adjetivo hebreo y reproduce la forma tradicional del topónimo sin añadir interpretación.'
- source_word: שׁער הדגים
  english_pob_choice: the Fish Gate
  chosen_spanish: la Puerta de los Peces
  alternatives_spanish:
  - la Puerta del Pez
  lexicon: HALOT
  rationale: Aunque en español podría sonar más idiomático singularizar, el plural sigue de cerca el constructo hebreo y evita cerrar el sentido de un posible nombre de lugar.
- source_word: ומגדל חננאל
  english_pob_choice: the Tower of Hananel
  chosen_spanish: la Torre de Hananel
  alternatives_spanish:
  - la Torre Hananel
  lexicon: HALOT
  rationale: Se mantiene la estructura nominal 'torre de + nombre propio' para reflejar con claridad la sintaxis hebrea.
- source_word: ומגדל המאה
  english_pob_choice: the Tower of the Hundred
  chosen_spanish: la Torre de los Cien
  alternatives_spanish:
  - la Torre del Cien
  - la Torre de Ciento
  lexicon: HALOT
  rationale: Se conserva la literalidad del número porque el referente exacto es incierto; en español, 'los Cien' mantiene esa ambigüedad sin introducir una explicación ajena al texto.
- source_word: ועד שׁער הצאן
  english_pob_choice: and as far as the Sheep Gate
  chosen_spanish: y hasta la Puerta de las Ovejas
  alternatives_spanish:
  - y hasta la Puerta del Rebaño
  - y hasta la Puerta de las Ovejas
  lexicon: HALOT
  rationale: '''Hasta'' expresa bien el límite del trayecto. ''Ovejas'' conserva el valor literal de צֹּאן en este nombre de puerta, siguiendo la forma del topónimo.'
- source_word: וְעָמְדוּ
  english_pob_choice: they stood
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - estuvieron
  - se pararon
  lexicon: HALOT
  rationale: La POB inglesa revisada optó por 'stood' para reflejar el verbo con mayor directitud, pero en español 'se detuvieron' comunica mejor el resultado de llegar y quedar estacionados en el lugar, sin perder la idea de parada/estancia que el verbo puede implicar en contexto procesional.
- source_word: בְּשַׁעַר הַמַּטָּרָה
  english_pob_choice: at the Gate of the Guard
  chosen_spanish: en la Puerta de la Guardia
  alternatives_spanish:
  - en la Puerta del Guardián
  - en la Puerta del Vigilante
  - en la Puerta de la Prisión
  lexicon: HALOT
  rationale: '''Guardia'' mantiene el sentido de vigilancia/guarda que la POB inglesa preserva con cautela. ''En'' reproduce el valor locativo de בְּ sin sobreprecisar el matiz debatido de מַטָּרָה.'
theological_decisions:
- issue: Valor del verbo וְעָמְדוּ en una lista de recorrido
  english_pob_reading: they stood
  chosen_spanish_reading: se detuvieron
  alternative_spanish_readings:
  - estuvieron
  - tomaron posición
  rationale: El hebreo puede indicar 'estar de pie' o 'quedarse/ detenerse' según el contexto. En una secuencia de hitos y límites del recorrido, 'se detuvieron' conserva el sentido de llegar y quedar en un punto sin convertir la acción en una escena estática innecesaria.
  doctrine_reference: Nehemías 12:39; uso contextual de עמד en narrativa hebrea
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió la preposición inglesa para reflejar la repetición de וְעַל y cambió la acción final a 'stood'. En español se preserva esa consistencia espacial con 'por encima de' y se traduce el cierre verbal con una opción natural que refleja el contexto de parada en el itinerario.
  spanish_consistency_notes:
  - Se mantiene 'Puerta de' y 'Torre de' para reflejar el constructo hebreo.
  - Se conserva el topónimo 'Efraín' en lugar de sustituirlo por una paráfrasis.
  - '''Puerta de la Guardia'' sigue la cautela lexical del POB inglés sin forzar ''prisión'' donde el hebreo permite una gama semántica.'
  - La repetición de 'por encima de' refleja el paralelo reiterado de וְעַל en la lista.
  - No se emplea 'SEÑOR' ni otras sustituciones no presentes en el versículo.
