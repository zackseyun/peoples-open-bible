translation:
  language: es
  text: 'Cuando Aarón lo vio, edificó un altar delante del becerro[a]. Luego Aarón proclamó y dijo: «Mañana habrá una fiesta para Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «delante de él»; el pronombre hebreo podría referirse gramaticalmente a Aarón, aunque el contexto apunta más probablemente al becerro.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When Aaron saw it
  chosen_spanish: Cuando Aarón lo vio
  alternatives_spanish:
  - Y Aarón vio
  - Cuando Aarón vio
  lexicon: HALOT
  rationale: La forma verbal introduce una acción secuencial con fuerza temporal; en español, «Cuando» comunica con naturalidad el valor de sucesión. Se explicita el objeto con «lo» por el contexto inmediato del becerro, siguiendo la misma decisión contextual del POB inglés.
- source_word: וַיִּבֶן מִזְבֵּחַ
  english_pob_choice: he built an altar
  chosen_spanish: edificó un altar
  alternatives_spanish:
  - construyó un altar
  - levantó un altar
  lexicon: HALOT
  rationale: בנה + מזבח se traduce de manera directa y cultual. «Edificó» conserva formalidad y evita una parálisis mecánica; «levantó» es posible, pero menos exacto en el registro litúrgico.
- source_word: לְפָנָיו
  english_pob_choice: before it
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del sufijo, que en el flujo narrativo probablemente remite al becerro. «Delante de él» es la opción más natural en español para una ubicación física, sin forzar personificación ni resolver de más el referente.
- source_word: וַיִּקְרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - anunció
  - llamó
  lexicon: HALOT
  rationale: En este contexto, קרא introduce una declaración pública. «Proclamó» reproduce bien el carácter formal y público de la acción, en línea con la revisión inglesa.
- source_word: חַג
  english_pob_choice: a feast
  chosen_spanish: una fiesta
  alternatives_spanish:
  - un banquete
  - una celebración
  - una festividad
  lexicon: HALOT
  rationale: «Fiesta» es el equivalente más natural en español para חג en un anuncio religioso breve. «Festividad» sería más abstracto; «banquete» estrecha indebidamente el sentido.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - en honor de Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé», conforme al criterio de la POB en español. «Para» refleja bien la relación de dedicación o destinación implícita por ל.
- source_word: מָחָר
  english_pob_choice: Tomorrow will be
  chosen_spanish: Mañana habrá
  alternatives_spanish:
  - Mañana será
  - Mañana hay
  lexicon: HALOT
  rationale: El hebreo nombra el tiempo y el tipo de celebración; en español, «habrá» expresa con naturalidad la proclamación de un evento futuro sin añadir contenido ajeno.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la convención declarada del proyecto: el Tetragrámaton se vierte como «Yahvé» en el texto principal, preservando el nombre del pacto en vez de sustituirlo por un título enmascarado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de לְפָנָיו
  english_pob_reading: the altar was built before the calf/image
  chosen_spanish_reading: el altar fue edificado delante del becerro/imágen implícita
  alternative_spanish_readings:
  - delante de Aarón
  - delante de él (sin precisar referente)
  rationale: La narrativa previa hace del becerro el referente más probable; sin embargo, el hebreo deja una ambigüedad gramatical real. La traducción mantiene la frase abierta con un pronombre que puede entenderse de manera contextual, sin borrar la tensión textual.
  doctrine_reference: Narrative ambiguity; contextual resolution consistent with the English audit trail
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que sustituyó una paráfrasis más pesada por el verbo más directo «proclaimed»; en español se refleja con «proclamó». También se respetó el juicio revisado sobre la fluidez del anuncio futuro, evitando ampliar innecesariamente el contenido del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, coherente con la terminología del proyecto.
  - Se eligió un español formal pero natural, evitando calcos como «hacía una proclamación».
  - «Fiesta» se conserva como equivalente breve de חג, sin cargarlo con sentidos litúrgicos que el contexto inmediato no exige.
  - La ambigüedad de לְפָנָיו se conserva en nota, en lugar de resolverla de modo dogmático.
