  language: en
  yaml_path: translation/ot/isaiah/046/001.yaml
  text: Bel bows down[a]; Nebo stoops. Their idols are for the beasts and the cattle. Your loads are borne[c][b], loaded as a burden for the weary.
  footnotes:
  - marker: a
    text: Or 'their images.' The Hebrew term can denote fashioned images, but in this prophetic context it refers polemically to idols.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'your loads are borne' is difficult; it likely refers to the idol-images being carried as cargo in procession or transport.
    reason: lexical_alternative
  - marker: c
    text: Or 'a burden for the exhausted beast.' The final phrase may point specifically to the weariness of the animal carrying the idols.
    reason: lexical_alternative
