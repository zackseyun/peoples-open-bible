    rationale: El POB inglés conserva «smitten by God» como alternativa tradicional. En español, «herido por Dios» duplica innecesariamente el término del participio previo y no distingue bien los dos elementos hebreos seguidos. «Azotado por Dios» funciona mejor como alternativa tradicional reconocible.
