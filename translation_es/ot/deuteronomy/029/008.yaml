  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría inglés: «guarden» para וּשְׁמַרְתֶּם, «las palabras de este pacto» para דִּבְרֵי הַבְּרִית הַזֹּאת, y «para que actúen con sabiduría en todo lo que hagan» para לְמַעַן תַּשְׂכִּילוּ אֵת כָּל אֲשֶׁר תַּעֲשׂוּן. También preserva correctamente el plural de אֹתָם con «pónganlas». Sin embargo, la nota al pie está mal anclada y resulta redundante/auto-referencial: el texto principal ya dice «actúen con sabiduría», pero la nota marcada en «pónganlas por obra[a]» ofrece como alternativa precisamente «actúen con sabiduría». La alternativa documentada pertenece a תַּשְׂכִּילוּ, no a וַעֲשִׂיתֶם אֹתָם.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico contemporáneo. «Pónganlas por obra» es una buena solución idiomática para evitar una literalidad torpe. La única reparación necesaria es mover la nota al segmento correcto y ajustar su redacción para que corresponda al verbo hebreo relevante.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Pacto» para ברית y «sabiduría» para la lectura principal de תשכילו están alineados con el expediente. No aparecen términos sensibles del glosario general que requieran corrección.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en la frase equivocada.
    rationale: La nota [a] aparece tras «pónganlas por obra», pero su contenido trata de la alternativa léxica de תַּשְׂכִּילוּ («actúen con sabiduría» / «tengan éxito»), no de וַעֲשִׂיתֶם אֹתָם.
  - severity: low
    issue: La nota es internamente redundante con el texto principal.
    rationale: Tal como está, la nota ofrece «actúen con sabiduría» como alternativa, aunque esa ya es la traducción principal en el cuerpo del versículo. Conviene que la nota preserve solo la alternativa real no elegida, o que se formule como alternativa de sentido del verbo correspondiente.
  revised_spanish_text: Así que guarden las palabras de este pacto y pónganlas por obra, para que actúen con sabiduría[a] en todo lo que hagan.
  revised_footnotes:
  - marker: a
    text: O «tengan éxito» en todo lo que hagan.
    reason: lexical_alternative
  revision_rationale: La traducción principal puede mantenerse. Solo hace falta reubicar la nota al pie para que ancle en «actúen con sabiduría», que es donde corresponde la alternativa léxica de תַּשְׂכִּילוּ, y simplificar su contenido para evitar repetir la lectura principal.
