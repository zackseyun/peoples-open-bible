translation:
  language: es
  text: Entonces los hijos de Israel fueron e hicieron así; tal como Yahvé había mandado a Moisés y a Aarón[a], así lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - fueron y
  lexicon: HALOT
  rationale: El verbo הלך en forma narrativa avanza la acción sin precisar destino adicional. En español, «fueron» comunica el desplazamiento de manera natural y sobria, sin añadir matices que el hebreo no expresa.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did so
  chosen_spanish: lo hicieron así
  alternatives_spanish:
  - lo hicieron
  - actuaron así
  lexicon: HALOT
  rationale: La referencia anafórica a lo ordenado se conserva con «lo hicieron así», que mantiene la conexión con las instrucciones previas sin explicitar más de lo que el texto dice.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma filial/masculina del hebreo בנים con «hijos», siguiendo la preferencia por transparencia formal. «Israelitas» es más idiomático, pero neutraliza la imagen literal del original.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justamente como
  lexicon: HALOT
  rationale: La construcción marca correspondencia exacta entre mandamiento y obediencia. «Tal como» transmite bien esa conformidad sin sonar rígido en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: «Mandar» reproduce la fuerza directiva de צוה en un español digno y claro. El pluscuamperfecto expresa correctamente que la orden precede a la ejecución narrada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre divino en este proyecto, «Yahvé», para reflejar directamente el Tetragrámaton sin sustituirlo por un título.
- source_word: אֶת מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - a Moisés y Aarón
  - por medio de Moisés y Aarón
  lexicon: HALOT
  rationale: El hebreo presenta a Moisés y Aarón como los destinatarios directos del mandato. En español, la preposición «a» conserva esa relación sintáctica sin introducir mediación no indicada.
- source_word: כֵּן עָשׂוּ
  english_pob_choice: so they did
  chosen_spanish: así lo hicieron
  alternatives_spanish:
  - de ese modo lo hicieron
  - y así hicieron
  lexicon: HALOT
  rationale: La cláusula resumptiva refuerza la obediencia exacta. «Así lo hicieron» preserva ese cierre enfático con naturalidad en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La lectura de la fuente es el Tetragrámaton, no un título. Se conserva el nombre propio divino en una forma española establecida por el proyecto, manteniendo la transparencia teológica del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preservación de la forma masculina plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: La POB inglesa preserva la forma literal «sons of Israel» por precisión lexical. El español mantiene esa misma transparencia con «hijos», evitando neutralizar el género del hebreo sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el registro inglés; se sigue la lectura final auditada, con alta concordancia y sin cambios pendientes según el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - 'Se conserva la correspondencia formal entre mandamiento y obediencia con dos cláusulas paralelas: «tal como... así...».'
  - No se suaviza «los hijos de Israel» a una forma neutral en el texto principal, pero se ofrece la alternativa idiomática en nota.
  - La puntuación reproduce el cierre enfático del hebreo con punto y coma antes de la cláusula final.
