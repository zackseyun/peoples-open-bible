    issue: «Hicieron servir» es poco natural en español en este contexto.
    rationale: Aunque calca de cerca el causativo, en español suena forzado. En Éxodo 1 el contexto inmediato es de imposición de trabajo duro; «obligaron a los hijos de Israel[a] a trabajar con dureza[b]» comunica mejor el sentido sin subir hasta «esclavizaron».
  - severity: medium
    issue: La nota [a] no está bien formulada respecto al texto principal.
    rationale: La nota dice «O “los israelitas” o, tradicionalmente, “los hijos de Israel”», pero el texto principal ya usa «los hijos de Israel». Así, una de las supuestas alternativas duplica la lectura principal y no funciona como nota alternativa útil. Debe ajustarse a una alternativa real.
  revised_spanish_text: Y los egipcios obligaron a los hijos de Israel[a] a trabajar con dureza[b].
