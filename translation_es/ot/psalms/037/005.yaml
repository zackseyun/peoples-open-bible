translation:
  language: es
  text: Encomienda tu camino a Yahvé[a]; confía en él, y él actuará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «rueda tu camino sobre Yahvé». El giro es idiomático y significa encomendar o poner el propio curso de vida bajo su cuidado.'
    reason: lexical_alternative
  - marker: b
    text: O «él lo hará» o «él lo llevará a cabo». El hebreo simplemente dice «él hará/actuará», sin expresar el objeto de manera explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: גּוֹל
  english_pob_choice: Commit
  chosen_spanish: Encomienda
  alternatives_spanish:
  - Confía
  - Entrega
  - Pon
  lexicon: HALOT
  rationale: El hebreo literal sugiere la imagen de “rodar” algo sobre alguien, pero en este contexto idiomático expresa poner la propia vía o curso bajo el cuidado de Yahvé. “Encomienda” comunica la idea de depositar la responsabilidad en él sin perder el tono exhortativo.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: El valor básico es “sobre/upon”, pero en español la construcción natural con “encomendar” es “encomendar algo a alguien”. La relación de depósito queda suficientemente reflejada por el verbo y el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como “Yahvé”, conforme al criterio del proyecto, en lugar de reemplazarlo por un título. “Yahvé” es la forma de uso bíblico y teológico en español para este registro.
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu curso
  - tu conducta
  lexicon: HALOT
  rationale: “Camino” es el equivalente más directo y natural en español para la metáfora de דרך en literatura sapiencial y salmos. Mantiene la amplitud de sentido entre trayectoria de vida, conducta y situación.
- source_word: וּבְטַח
  english_pob_choice: trust
  chosen_spanish: confía
  alternatives_spanish:
  - ten confianza
  - pon tu confianza
  lexicon: HALOT
  rationale: El imperativo de בטח expresa confianza personal y dependencia. “Confía” es la forma más natural en español y preserva el llamado a la confianza activa en Dios.
- source_word: עָלָיו
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en Yahvé
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente “sobre/en”, con “confiar” el español pide la preposición “en”. Se mantiene la referencia pronominal para evitar repetición innecesaria del nombre divino.
- source_word: יַעֲשֶׂה
  english_pob_choice: will act
  chosen_spanish: actuará
  alternatives_spanish:
  - hará
  - hará algo
  - lo hará
  - lo llevará a cabo
  lexicon: HALOT
  rationale: El verbo עשה es amplio y el hebreo no explicita objeto. “Actuará” conserva la apertura semántica y evita añadir un objeto que el texto no menciona.
theological_decisions:
- issue: Cómo traducir el Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de preservar el nombre propio divino en lugar de sustituirlo por un título. “Yahvé” mantiene la referencia al nombre revelado de Dios en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si conviene explicitar el objeto de יַעֲשֶׂה
  english_pob_reading: leave the verb open-ended as 'he will act'
  chosen_spanish_reading: dejar el verbo abierto como 'actuará'
  alternative_spanish_readings:
  - lo hará
  - lo llevará a cabo
  - hará esto
  rationale: El hebreo no aporta un objeto explícito. Mantener el verbo abierto preserva la tensión interpretativa y evita concretar indebidamente la acción divina.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en mantener el nombre divino, traducir el imperativo idiomático con una equivalencia natural en español y dejar abierto el final del versículo sin precisar el objeto del verbo. No se detectaron revisiones aplicadas en el ciclo más reciente, y el estado de concordancia fue alto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Camino» conserva la metáfora sapiencial sin cargarla de interpretación adicional.
  - «Confía en él» evita repetir el nombre divino y mantiene el paralelismo del verso.
  - «Actuará» respeta la vaguedad del hebreo y no introduce un objeto implícito.
