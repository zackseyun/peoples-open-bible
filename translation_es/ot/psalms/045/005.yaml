translation:
  language: es
  text: En tu majestad cabalga con victoria por causa de la verdad y de la mansedumbre y la justicia[a]; que tu mano derecha te enseñe hechos asombrosos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘por la verdad, y la mansedumbre, y la justicia’. La frase hebrea es compacta y también puede leerse como una serie coordinada.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘y tu mano derecha te enseñará cosas temibles’. El hebreo admite un matiz de temor reverente o sobrecogimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲדָרְךָ
  english_pob_choice: In your majesty
  chosen_spanish: En tu majestad
  alternatives_spanish:
  - Y en tu majestad
  - En tu esplendor
  lexicon: HALOT
  rationale: הָדָר expresa majestad, esplendor u honor. ‘En tu majestad’ reproduce el sentido de modo natural en español y conserva la introducción poética al mandato real.
- source_word: צְלַח
  english_pob_choice: ride on victoriously
  chosen_spanish: cabalga con victoria
  alternatives_spanish:
  - cabalgue victoriosamente
  - avanza con victoria
  lexicon: HALOT
  rationale: En este contexto real y militar, el verbo comunica avance exitoso. ‘Cabalga con victoria’ conserva la imagen ecuestre y la idea de triunfo sin sobrecargar la frase.
- source_word: רְכַב
  english_pob_choice: ride on
  chosen_spanish: cabalga
  alternatives_spanish:
  - monta y cabalga
  - ride on
  lexicon: HALOT
  rationale: Es el imperativo de ‘montar/cabalgar’. En español, ‘cabalga’ es directo y mantiene la imagen del rey guerrero.
- source_word: עַל דְּבַר אֱמֶת
  english_pob_choice: for the cause of truth
  chosen_spanish: por causa de la verdad
  alternatives_spanish:
  - por la verdad
  - en favor de la verdad
  - a causa de la verdad
  lexicon: HALOT
  rationale: דְּבַר puede significar ‘asunto’, ‘causa’ o ‘materia’. ‘Por causa de la verdad’ preserva el sentido de actuar o combatir en favor de la verdad, no solo hablar con verdad.
- source_word: וְעַנְוָה צֶדֶק
  english_pob_choice: and meekness and righteousness
  chosen_spanish: y de la mansedumbre y la justicia
  alternatives_spanish:
  - y humildad y justicia
  - y de la mansedumbre, justicia
  - y humildad, justicia
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y puede leerse como dos sustantivos coordinados. ‘Mansedumbre’ expresa היטב עַנְוָה en español bíblico actual, y ‘justicia’ refleja צֶדֶק. Se mantiene la coordinación explícita que la revisión reciente del POB favoreció.
- source_word: וְתוֹרְךָ
  english_pob_choice: let your right hand teach you
  chosen_spanish: tu mano derecha te enseñará
  alternatives_spanish:
  - y tu mano derecha te enseñará
  - que tu mano derecha te enseñe
  lexicon: HALOT
  rationale: 'La forma verbal de ירה en este contexto se entiende como ‘enseñar/instruir’. En español, la traducción más natural y fiel es colocar el sujeto explícito: ‘tu mano derecha te enseñará’.'
- source_word: נוֹרָאוֹת
  english_pob_choice: awesome deeds
  chosen_spanish: cosas terribles
  alternatives_spanish:
  - cosas temibles
  - cosas imponentes
  - hechos asombrosos
  lexicon: HALOT
  rationale: El término denota cosas que inspiran temor reverente o sobrecogimiento. ‘Cosas terribles’ conserva el peso semántico fuerte de la raíz y evita suavizar el efecto del original.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu mano diestra
  lexicon: HALOT
  rationale: Imagen bíblica estándar de poder y destreza. ‘Tu mano derecha’ es clara, natural y conserva la figura tradicional.
theological_decisions:
- issue: Lectura del rey como destinatario inmediato sin explicitar una identificación mesiánica
  english_pob_reading: Retain the immediate royal address without importing explicit messianic interpretation into the translation.
  chosen_spanish_reading: Mantener la dirección inmediata al rey sin insertar una identificación mesiánica explícita en la redacción.
  alternative_spanish_readings:
  - Traducir de modo que el Mesías quede explicitado
  - Usar una formulación cristológica directa
  rationale: El salmo tiene relevancia canónica y cristológica, pero este versículo, en su sentido inmediato, habla al rey en lenguaje poético real. La traducción conserva ese nivel literario-histórico y deja la aplicación teológica para notas o uso interpretativo.
  doctrine_reference: Principios de traducción del POB; afirmaciones sobre sentido histórico-literario y lectura canónica
- issue: Construcción comprimida de עַנְוָה צֶדֶק
  english_pob_reading: Render as a compressed phrase, 'meekness and righteousness,' while preserving the more traditional coordinate reading in a footnote.
  chosen_spanish_reading: Expresar la coordinación como ‘mansedumbre y justicia’, sin resolver la tensión sintáctica con una paráfrasis expansiva.
  alternative_spanish_readings:
  - mansedumbre y justicia
  - humildad y justicia
  - humilde justicia
  rationale: La hebra es breve y algo ambigua. En español conviene mantener la coordinación explícita para no borrar la tensión interpretativa documentada por el POB.
  doctrine_reference: Principio de preservar tensiones léxicas y sintácticas documentadas
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente del POB que prefirió explicitar la coordinación ‘mansedumbre y justicia’ frente a una solución compuesta como ‘humilde justicia’, y mantuvo el tono real-guerrero del versículo. También refleja el acuerdo alto del control cruzado, conservando la tensión sintáctica sin sobreexplicar.
  spanish_consistency_notes:
  - Se usa ‘tu’ en todo el verso para mantener la segunda persona singular del hebreo.
  - ‘Mano derecha’ se mantiene literal para conservar la imagen bíblica de poder y destreza.
  - ‘Cosas terribles’ conserva el peso semántico de נוֹרָאוֹת; la nota [b] aclara el matiz alternativo sin suavizar el texto principal.
  - La puntuación mantiene la cadencia poética y evita introducir una división sintáctica ajena al hebreo.
