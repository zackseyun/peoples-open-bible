source:
  edition: SBLGNT
  text: ὁ δὲ Μωϋσῆς ἰδὼν ⸀ἐθαύμασεν τὸ ὅραμα. προσερχομένου δὲ αὐτοῦ κατανοῆσαι ἐγένετο φωνὴ ⸀κυρίου·
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/031.yaml
  text: 'When Moses saw it[a], he marveled at the sight. And as he came near to look closely[c][b], a voice of the Lord came:'
  footnotes:
  - marker: a
    text: Or 'the vision.' The Greek term can denote a visible appearance or vision; here 'the sight' was chosen because Moses is reacting to the visible phenomenon of the bush.
    reason: lexical_alternative
  - marker: b
    text: Or 'there came a voice of the Lord.'
    reason: lexical_alternative
  - marker: c
    text: Some readers may expect 'the LORD' because this scene echoes Exodus 3; the Greek text here reads 'Lord' (κύριος).
    reason: alternative_reading
translation:
  language: ko
  text: 모세가 그 광경을 보고 놀랐고, 그가 자세히 보려고 가까이 가자 주의[a] 음성이 들렸습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 κυρίου. 출 3장의 배경상 신명 YHWH의 발화가 분명하지만, 사도행전 본문은 κύριος로 옮겼다. 본 역본은 본문 그대로 「주」로 옮기되, 32-33절의 자기 동일시 발화 안에서 신명 정체가 명백히 드러난다.
    reason: alternative_reading
