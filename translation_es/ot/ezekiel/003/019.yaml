    text: O 'no se aparta de su impiedad ni de su mal camino'.
    reason: lexical_alternative
  - marker: b
    text: O 'te habrás salvado a ti mismo' o 'habrás librado tu alma'.
    reason: lexical_alternative
  revision_rationale: Se ajusta הִזְהַרְתָּ a 'adviertes' para seguir mejor la decisión auditada 'warn'; se cambia 'por su iniquidad' a 'en su iniquidad' para preservar la formulación hebrea documentada y no resolver de más la relación causal; y se corrige la nota [b] para que acompañe la cláusula final sobre נַפְשְׁךָ, conforme al rastro POB inglés.
