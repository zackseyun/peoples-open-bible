translation:
  language: es
  text: Retiraste toda tu ira[a]; te apartaste del ardor de tu enojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Apartaste toda tu ira; te volviste del ardor de tu enojo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָסַ֥פְתָּ
  english_pob_choice: you withdrew
  chosen_spanish: retiraste
  alternatives_spanish:
  - apartaste
  - retiraste hacia ti
  - recogiste
  lexicon: HALOT
  rationale: El verbo puede expresar reunir, quitar o retirar. En este contexto, con "toda tu ira", el sentido es que Yahvé la aparta o la retira. "Retiraste" comunica bien ese movimiento sin perder la imagen de remoción que el hebreo permite.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - todo el
  lexicon: HALOT
  rationale: Quantificador total que intensifica la plenitud de la acción divina. En español concuerda naturalmente con "ira".
- source_word: עֶבְרָתֶךָ
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furia
  - tu indignación
  - tu enojo
  lexicon: HALOT
  rationale: עֶבְרָה denota ira intensa, con matiz de desbordamiento. "Ira" es la equivalencia más estable y digna en español bíblico contemporáneo; "furia" sería más fuerte pero menos neutral, y "enojo" debilita el registro.
- source_word: הֱשִׁיבוֹתָ
  english_pob_choice: you turned back from
  chosen_spanish: te volviste atrás de
  alternatives_spanish:
  - te apartaste de
  - te volviste atrás de en cuanto a
  - te retractaste de
  lexicon: HALOT
  rationale: El causativo de שוב con מִן expresa volverse atrás o apartarse de algo. En español, "te volviste atrás de" conserva la dirección verbal del hebreo y evita introducir la idea de arrepentimiento emocional, que no está explícita en la forma verbal.
- source_word: מֵחֲרוֹן
  english_pob_choice: from the burning
  chosen_spanish: del ardor
  alternatives_spanish:
  - del fuego
  - de la fiebre
  - del calor
  lexicon: HALOT
  rationale: חֲרוֹן evoca ardor o calor abrasador. "Ardor" preserva la imagen térmica del original y su función intensificadora respecto al enojo divino.
- source_word: אַפֶּךָ
  english_pob_choice: your anger
  chosen_spanish: de tu enojo
  alternatives_spanish:
  - de tu ira
  - de tu rostro airado
  - de tu furor
  lexicon: HALOT
  rationale: אַף literalmente es "nariz" y por extensión "enojo/ira". "Enojo" permite una lectura natural en español dentro de la segunda cola poética, mientras que "ira" ya aparece en la primera cola y mantiene el paralelismo sin redundancia excesiva.
theological_decisions:
- issue: Lenguaje antropomórfico sobre la ira divina
  english_pob_reading: Retain the metaphor of burning anger without flattening it into a purely abstract statement.
  chosen_spanish_reading: Conservar el paralelismo y la imagen térmica del enojo divino sin convertirla en una explicación abstracta.
  alternative_spanish_readings:
  - Retiraste toda tu furia; te apartaste de tu ira ardiente.
  - Apartaste toda tu ira; te apartaste del fuego de tu enojo.
  rationale: El hebreo usa lenguaje vívido y antropomórfico para la ira de Dios. El español mantiene esa imagen con "retiraste" y "ardor", evitando tanto una paráfrasis suavizada como una literalidad torpe.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió "withdrew" sobre "gathered up" por naturalidad y adecuación contextual, y se reflejó con "retiraste" en español. También se conservó la estructura paralela del verso y la imagen de calor/ardor para חֲרוֹן.
  spanish_consistency_notes:
  - Se usa "ira" para עֶבְרָה y "enojo" para אַף para distinguir dos matices relacionados sin perder el paralelismo.
  - '"Yahvé" no aparece en el texto porque el verso usa formas pronominales de segunda persona; la referencia divina queda implícita en el discurso dirigido a Dios.'
  - La nota a ofrece una alternativa cercana al sentido hebreo, manteniendo el valor lexical de retirada/apartamiento.
