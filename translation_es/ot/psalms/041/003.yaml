translation:
  language: es
  text: Yahvé lo guardará y preservará su vida[a]; será bendito[b] en la tierra, y no lo entregues[c] a la voluntad[d] de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo mantendrá con vida».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será llamado bendito»; el hebreo puede tener un matiz declarativo: otros lo reconocen como bendito.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y no lo entregues a la voluntad de sus enemigos».'
    reason: previous_rendering
  - marker: d
    text: 'O: «deseo»; el hebreo נֶפֶשׁ aquí puede expresar voluntad, apetito o deseo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la línea POB de no sustituirlo por un título. 'Yahvé' es la forma española transparente y de uso bíblico académico/church-readable más extendido.
- source_word: יִשְׁמְרֵהוּ
  english_pob_choice: will keep him
  chosen_spanish: lo guardará
  alternatives_spanish:
  - lo mantendrá
  - lo preservará
  lexicon: HALOT
  rationale: שׁמר expresa guardar/proteger/vigilar. 'Guardar' es natural en español bíblico sin perder el sentido de protección continuada; además evita duplicar demasiado el matiz de preservación que sigue en el segundo verbo.
- source_word: וִיחַיֵּהוּ
  english_pob_choice: and preserve his life
  chosen_spanish: y preservará su vida
  alternatives_spanish:
  - y lo mantendrá con vida
  - y lo hará vivir
  lexicon: HALOT
  rationale: חיה en este causativo significa mantener con vida/preservar vivo. 'Preservará su vida' refleja ese valor sin sonar repetitivo junto a 'guardará'.
- source_word: יאשר
  english_pob_choice: he will be blessed
  chosen_spanish: será bendecido
  alternatives_spanish:
  - será llamado bendecido
  - será proclamado feliz
  lexicon: HALOT
  rationale: El verbo puede significar 'llamar bienaventurado/bendecido' o 'ser bendecido'. La revisión inglesa favorece una versión más directa; en español, 'será bendecido' conserva esa lectura y suena natural, aunque mantiene abierta la posibilidad declarativa implícita.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: En este contexto poético, 'tierra' conserva la amplitud de אֶרֶץ y funciona bien en español. 'La tierra' también deja abierta la referencia a la esfera de la vida/ubicación del justo, sin especificar más de lo que el hebreo exige.
- source_word: וְאַל
  english_pob_choice: and may you not
  chosen_spanish: y no lo entregues
  alternatives_spanish:
  - y no lo entregues tú
  - y no permitas que lo entreguen
  lexicon: HALOT
  rationale: 'אַל con imperfecto y 2ms expresa una petición dirigida a Yahvé. En español, la forma de ruego se expresa mejor como imperativo negativo deferente: ''y no lo entregues'', preservando la dirección a Dios que el hebreo exige.'
- source_word: תִּתְּנֵהוּ
  english_pob_choice: give him over
  chosen_spanish: lo entregues
  alternatives_spanish:
  - lo pongas en manos de
  - lo abandones a
  lexicon: HALOT
  rationale: נתן en esta construcción idiomática es 'entregar/poner en manos de'. 'Entregar' refleja bien el sentido de ceder a otro poder hostil.
- source_word: בְּנֶפֶשׁ
  english_pob_choice: to the desire
  chosen_spanish: a la voluntad
  alternatives_spanish:
  - al deseo
  - al apetito
  - al anhelo
  lexicon: HALOT
  rationale: נפש en esta expresión idiomática puede significar deseo, voluntad o apetito. 'Voluntad' comunica con claridad la fuerza idiomática en español y mantiene la opción mencionada en el audit trail inglés.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: de sus enemigos
  alternatives_spanish:
  - de sus adversarios
  - de sus enemigos hostiles
  lexicon: HALOT
  rationale: אויב se traduce normalmente por 'enemigos'. La expresión posesiva 'de sus enemigos' encaja con la construcción española de la frase anterior.
theological_decisions:
- issue: El cierre cambia de declaración a petición dirigida a Yahvé
  english_pob_reading: 'The Hebrew shifts from a third-person statement about Yahweh to a second-person petition: ''and may you not give him over...'''
  chosen_spanish_reading: 'Se conserva el cambio: primero una afirmación sobre lo que Yahvé hará, luego una súplica directa a Dios: ''y no lo entregues...''.'
  alternative_spanish_readings:
  - '...y él no lo entregará...'
  - '...y no lo entregará...'
  rationale: El hebreo usa una forma jussiva dirigida a Yahvé. Mantener la segunda persona evita suavizar la gramática y conserva la tensión teológica y retórica del versículo.
  doctrine_reference: Primacía del texto original; preservar el discurso directo a Dios y no nivelar la sintaxis por armonización.
- issue: יאשר y su matiz declarativo
  english_pob_reading: '''he will be blessed'' rather than ''he will be called blessed'''
  chosen_spanish_reading: '''será bendecido'' conserva la lectura directa adoptada en la revisión inglesa, sin cerrar del todo el matiz declarativo de ''ser llamado bienaventurado''.'
  alternative_spanish_readings:
  - será llamado bendecido
  - será proclamado feliz
  rationale: La revisión del inglés optó por una traducción más directa. En español, 'será bendecido' mantiene esa dirección y sigue siendo compatible con el valor declarativo del verbo.
  doctrine_reference: Respeto a la revisión textual y a la ambigüedad semántica controlada.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir una traducción directa de יאשר como 'will be blessed' y se respetó el cambio sintáctico final a petición en segunda persona. También se mantuvo la decisión POB de usar el nombre divino 'Yahvé'.
  spanish_consistency_notes:
  - 'Se preserva la secuencia verbal del hebreo: guardar/preservar/bendecir/rogar.'
  - '''Yahvé'' se usa consistentemente para el Tetragrámaton.'
  - '''lo entregues'' mantiene la dirección a Dios en la súplica final.'
  - '''voluntad'' recoge el valor idiomático de נֶפֶשׁ sin introducir lenguaje más psicológico de lo que exige el texto.'
  - La frase 'será bendecido' sigue la revisión inglesa y evita una paráfrasis excesiva.
