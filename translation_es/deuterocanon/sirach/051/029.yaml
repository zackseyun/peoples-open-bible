translation:
  language: es
  text: Que mi alma se alegre en mi vejez[a], y que ustedes no queden avergonzados por mi canto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Que vuestra alma se alegre en su misericordia, y que ustedes no queden avergonzados en su alabanza». El testimonio hebreo, en cambio, dice «mi alma», «en mi vejez» y «por mi canto».'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשְׂמַח / εὐφρανθείη
  english_pob_choice: May ... rejoice
  chosen_spanish: ¡Que ... se alegre!
  alternatives_spanish:
  - Que ... se regocije
  - Que ... se goce
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego expresan un deseo/juntivo, no un simple indicativo. En español, ‘¡Que ... se alegre!’ comunica con naturalidad esa fuerza volitiva y mantiene el tono de oración/aspiración del original.
- source_word: נַפְשִׁי / ἡ ψυχὴ ὑμῶν
  english_pob_choice: my soul / your soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - yo
  lexicon: HALOT; BDAG
  rationale: La tradición hebrea y el paralelo griego usan ‘alma’/‘psychē’. Se conserva el lenguaje interior y personal sin reducirlo a un mero ‘yo’.
- source_word: בְּשֵׂיבָתִי
  english_pob_choice: in my old age
  chosen_spanish: en mi vejez
  alternatives_spanish:
  - en mis canas
  - en mis años de vejez
  lexicon: HALOT
  rationale: שֵׂיבָה puede referirse a canas o a vejez. ‘En mi vejez’ transmite bien el sentido idiomático en español actual y es más natural que una traducción literal de ‘canas’ en este contexto.
- source_word: וְלֹא תֵבוֹשוּ / καὶ μὴ αἰσχυνθείητε
  english_pob_choice: and may you not be put to shame
  chosen_spanish: y no sean avergonzados
  alternatives_spanish:
  - y no se avergüencen
  - y no queden avergonzados
  lexicon: HALOT; BDAG
  rationale: Se mantiene el matiz pasivo/de resultado del verbo de vergüenza. En español, ‘sean avergonzados’ conserva mejor la fuerza de ‘ser puestos en vergüenza’ que un simple reflexivo.
- source_word: בְּשִׁירָתִי / ἐν αἰνέσει αὐτοῦ
  english_pob_choice: by my song / in his praise
  chosen_spanish: por mi canto
  alternatives_spanish:
  - en mi canto
  - por su alabanza
  - en su alabanza
  lexicon: HALOT; LSJ
  rationale: El hebreo apoyado por la lectura principal apunta a ‘mi canción/canto’; el griego ofrece una lectura alternativa con ‘su alabanza’. ‘Por mi canto’ permite expresar de forma natural el valor causal o instrumental que en español puede tener la preposición en este tipo de construcción, sin ocultar la tensión textual.
theological_decisions:
- issue: Divergencia significativa entre el hebreo y el griego en la segunda mitad del versículo
  english_pob_reading: Follow the Hebrew as the primary witness for Sirach where extant, while preserving the Greek-aligned alternative in a footnote.
  chosen_spanish_reading: 'Seguir el hebreo como texto principal: ‘mi alma ... en mi vejez ... por mi canto’, señalando la variante griega en nota.'
  alternative_spanish_readings:
  - ‘Que vuestra alma se alegre en su misericordia, y no sean avergonzados en su alabanza.’
  rationale: En Sirácides, cuando el hebreo está disponible, debe guiar la redacción principal. Sin embargo, el griego es un testigo real y auditado; la nota conserva la diferencia importante de persona, motivo y objeto de alabanza para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde subsiste; usar el paralelo griego como entrada real y auditable'
translation_notes:
  revision_awareness: La redacción española sigue el testimonio hebreo principal de Sirácides 51:29, pero incorpora en nota la lectura griega paralela, que difiere de manera significativa en persona, contenido y objeto de la acción. Se mantuvo el tono jussivo y se evitó ocultar la tensión entre ‘mi canto’ y ‘su alabanza’.
  spanish_consistency_notes:
  - Se usa ‘alma’ para reflejar נַפְשִׁי / ψυχὴ sin banalizarlo como simple ‘yo’.
  - Se prefirió ‘vejez’ sobre ‘canas’ por naturalidad idiomática, sin perder el valor de שֵׂיבָה.
  - La pasiva ‘sean avergonzados’ conserva el matiz de vergüenza sufrida del hebreo y del griego.
  - La nota mantiene explícita la variante griega para que el lector vea la divergencia textual.
  - Se eligió ‘canto’ como equivalente más natural de שִׁירָה; ‘alabanza’ queda reservada para la lectura griega en la nota.
