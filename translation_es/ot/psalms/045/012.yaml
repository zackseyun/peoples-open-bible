translation:
  language: es
  text: Y el rey deseará tu hermosura[a], porque él es tu señor[b]; inclínate ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu hermosura'; la forma hebrea puede leerse como una afirmación futura o como un deseo/exhortación con fuerza volitiva.
    reason: lexical_alternative
  - marker: b
    text: O 'rinde homenaje a él'; el verbo puede denotar inclinarse en reverencia ante un superior, ya sea en contexto real o religioso. Algunos también traducen 'adóralo'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִתְאָו
  english_pob_choice: and the king will desire
  chosen_spanish: y el rey deseará
  alternatives_spanish:
  - y que el rey desee
  - y el rey querrá
  lexicon: HALOT
  rationale: La forma hebrea admite lectura futura con fuerza volitiva en poesía. En español, el futuro simple comunica bien esa expectativa sin convertirla en mandato. Se evita una paráfrasis excesiva como 'querrá' o una formulación exhortativa que no exige el texto final revisado.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Sustantivo definido y directo; 'rey' es la equivalencia natural y más fiel en español.
- source_word: יָפְיֵךְ
  english_pob_choice: your beauty
  chosen_spanish: tu hermosura
  alternatives_spanish:
  - tu belleza
  - tu belleza y hermosura
  lexicon: HALOT
  rationale: '''Hermosura'' mantiene un registro digno y poético en español. Aunque ''belleza'' es posible, ''hermosura'' preserva mejor el matiz estético-literario del poema sin perder claridad.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior. 'Porque' es natural en español y conserva la relación causal.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para mantener el énfasis del hebreo: ''porque él es tu señor''.'
- source_word: אֲדֹנַיִךְ
  english_pob_choice: your lord
  chosen_spanish: tu señor
  alternatives_spanish:
  - tu dueño
  - tu amo
  lexicon: HALOT
  rationale: En este contexto real y nupcial, 'señor' reproduce el valor relacional y de autoridad sin endurecer el término como 'amo' ni desplazarlo hacia una lectura posesiva como 'dueño'. 'Señor' es el equivalente más idiomático y reverente en español.
- source_word: וְהִשְׁתַּחֲוִי
  english_pob_choice: bow down
  chosen_spanish: inclínate
  alternatives_spanish:
  - postra-te
  - rinde homenaje
  lexicon: HALOT
  rationale: El verbo indica postración/inclinación reverente. 'Inclínate' transmite el gesto físico sin decidir por adelantado entre homenaje cortesano y adoración religiosa, conservando la tensión interpretativa presente en el audit trail.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - delante de él
  lexicon: HALOT
  rationale: Con 'inclínate', la preposición natural en español es 'ante' para expresar la postura de reverencia frente a una persona superior. Aunque literalmente es 'a él', 'ante él' comunica mejor el acto de postración.
theological_decisions:
- issue: Si la reverencia final debe expresarse como homenaje cortesano o como adoración religiosa
  english_pob_reading: bow down to him
  chosen_spanish_reading: inclínate ante él
  alternative_spanish_readings:
  - rinde homenaje a él
  - adóralo
  rationale: El salmo es nupcial y real; el hebreo puede referirse a un gesto de reverencia ante un superior humano o, en otros contextos, a adoración. La traducción principal conserva esa ambigüedad deliberadamente, evitando imponer una conclusión doctrinal que el texto no fuerza por sí solo.
  doctrine_reference: Preservar la tensión teológica sin resolverla indebidamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó la línea inglesa de una lectura exhortativa ('let the king desire') a una futura ('the king will desire'). Por eso el español principal usa futuro simple ('deseará') y no una forma desiderativa o imperativa. También se conservó la ambigüedad de 'bow down' sin forzarla a 'adorar'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se usa 'señor' en sentido relacional/real, no como sustituto del nombre divino.
  - Se prefirió un registro poético natural ('hermosura', 'inclínate') sin calcos duros.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponde.
