translation:
  language: es
  text: Estas son las aguas de Meribá[a], con las cuales los hijos de Israel disputaron con Yahvé[b], y él fue reconocido como santo entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribá significa «disputa» o «contienda».
    reason: lexical_alternative
  - marker: b
    text: 'O: «y fue santificado en ellos» / «y demostró ser santo por medio de ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas eran
  lexicon: HALOT
  rationale: El demostrativo introduce e identifica las aguas nombradas; en español, el presente nominal "Estas son" es natural en una fórmula de identificación, sin perder la función de señalamiento del hebreo.
- source_word: מֵי מְרִיבָה
  english_pob_choice: the waters of Meribah
  chosen_spanish: las aguas de Meribá
  alternatives_spanish:
  - las aguas de contienda
  - las aguas de disputa
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalizado como topónimo en el texto principal, como en la decisión inglesa de mantener "Meribah". La forma española "Meribá" respeta la adaptación gráfica habitual y la función toponímica del hebreo.
- source_word: רָבוּ
  english_pob_choice: quarreled
  chosen_spanish: disputaron
  alternatives_spanish:
  - riñeron
  - contendieron
  lexicon: HALOT
  rationale: El verbo ריב expresa disputa/contienda. "Disputaron" es claro, sobrio y mantiene la fuerza relacional del conflicto sin sonar tan coloquial como "riñeron" ni tan técnico como "contendieron".
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión etnónima masculina plural de modo directo. "Hijos de Israel" es una equivalencia natural en español bíblico y mantiene el valor formal señalado en la auditoría inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino y no sustitución por un título. "Yahvé" es la forma editorial principal establecida para el español.'
- source_word: וַיִּקָּדֵשׁ
  english_pob_choice: he was shown holy
  chosen_spanish: fue mostrado santo
  alternatives_spanish:
  - se mostró santo
  - fue santificado
  lexicon: HALOT
  rationale: El nifal de קדש se traduce de manera pasiva y formal para reflejar directamente el hebreo, tal como la revisión inglesa reciente. "Fue mostrado santo" conserva la idea de manifestación/vindicación de la santidad sin sugerir que humanos lo hicieron santo.
- source_word: בָּם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - por medio de ellos
  lexicon: HALOT
  rationale: La preposición ב con sufijo pronominal admite varios matices; en este contexto, "entre ellos" comunica de manera natural que la santidad de Yahvé quedó manifiesta en relación con el pueblo.
theological_decisions:
- issue: Cómo expresar la cláusula final sobre la santidad de Yahvé
  english_pob_reading: and he was shown holy among them
  chosen_spanish_reading: y fue mostrado santo entre ellos
  alternative_spanish_readings:
  - y se mostró santo entre ellos
  - y fue santificado entre ellos
  - y fue probado santo entre ellos
  rationale: La forma pasiva del hebreo requiere una solución que no implique que el pueblo confirió santidad a Dios. "Fue mostrado santo" preserva la referencia a la manifestación/vindicación de su santidad con un registro suficientemente formal para una edición bíblica.
  doctrine_reference: Translation philosophy §3, §6
- issue: Cómo mantener la lectura étnico-covenantal de בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se mantiene la expresión formal masculina del original en lugar de neutralizarla en la línea principal. Esto conserva la forma del texto fuente y la señalización pactual del grupo nombrado.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se sigue la decisión editorial del proyecto de no ocultar el nombre divino detrás de un título. La transliteración mantiene la audibilidad teológica del Tetragrámaton en español.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación pasiva más directa en la cláusula final ('he was shown holy among them') frente a una paráfrasis reflexiva. La propuesta española refleja esa preferencia formal sin abandonar la claridad natural del español.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" para el Tetragrámaton conforme a los valores por defecto del proyecto.
  - Se conservó el topónimo "Meribá" en el texto principal y se explicó su sentido léxico en nota.
  - '"Hijos de Israel" reproduce la formulación masculina plural del hebreo, alineada con la política de precisión formal.'
  - La cláusula final evita "santificado" en el cuerpo principal para no sugerir incorrectamente que el pueblo causó la santidad divina; se reserva como alternativa en nota.
