    text: Or, more literally, 'for an appointed time, appointed times, and half'; many understand this as 'for a year, two years, and half a year.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the hand of the holy people'; 'hand' here likely means power or strength.
    reason: lexical_alternative
