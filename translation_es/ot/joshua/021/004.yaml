translation:
  language: es
  text: Entonces salió la suerte[a] para las familias de los coatitas, y a los hijos de Aarón el sacerdote, de entre los levitas, les correspondieron por suerte trece ciudades de la tribu de Judá, de la tribu de Simeón y de la tribu de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cayó la suerte». El hebreo puede expresarse en español con «salió» o «cayó»; ambas opciones reproducen el modismo del reparto por suerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא הַגּוֹרָל
  english_pob_choice: the lot came out
  chosen_spanish: salió la suerte
  alternatives_spanish:
  - cayó la suerte
  - fue sacada la suerte
  lexicon: HALOT
  rationale: El hebreo usa un giro concreto de movimiento/salida para la suerte. En español, «salió la suerte» conserva esa imagen sin sonar forzado; «cayó la suerte» también es posible, pero desplaza la imagen hacia un modismo más interpretativo.
- source_word: לְמִשְׁפְּחֹת הַקְּהָתִי
  english_pob_choice: for the families of the Kohathites
  chosen_spanish: para las familias de los coatitas
  alternatives_spanish:
  - para los clanes de los coatitas
  - para las familias de los descendientes de Coat
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede referirse a familias extensas o clanes. «Familias» mantiene la transparencia del término; «coatitas» representa bien el grupo descendiente de Coat sin necesidad de una paráfrasis mayor.
- source_word: לִבְנֵי אַהֲרֹן הַכֹּהֵן
  english_pob_choice: for the sons of Aaron the priest
  chosen_spanish: para los hijos de Aarón el sacerdote
  alternatives_spanish:
  - para los hijos de Aarón, el sacerdote
  - para los descendientes de Aarón el sacerdote
  lexicon: HALOT
  rationale: «Hijos de Aarón» reproduce la expresión de parentesco del hebreo y sigue siendo natural en español bíblico moderno. Se conserva «el sacerdote» como aposición al nombre.
- source_word: מִן הַלְוִיִּם
  english_pob_choice: from among the Levites
  chosen_spanish: de entre los levitas
  alternatives_spanish:
  - de los levitas
  - entre los levitas
  lexicon: HALOT
  rationale: La preposición partitiva expresa que los hijos de Aarón forman un subconjunto dentro de los levitas. «De entre» hace explícita esa relación sin añadir contenido ajeno.
- source_word: מִמַּטֵּה יְהוּדָה וּמִמַּטֵּה הַשִּׁמְעֹנִי וּמִמַּטֵּה בִנְיָמִן
  english_pob_choice: from the tribe of Judah, from the tribe of Simeon, and from the tribe of Benjamin
  chosen_spanish: de la tribu de Judá, de la tribu de Simeón y de la tribu de Benjamín
  alternatives_spanish:
  - de Judá, de Simeón y de Benjamín
  - de la tribu de Judá, de Simeón y de Benjamín
  lexicon: HALOT
  rationale: מַטֶּה se refiere aquí a una tribu, no a un bastón. Se repite «de la tribu de» para conservar la estructura formal del hebreo y evitar ambigüedad.
- source_word: בַּגּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por suerte
  alternatives_spanish:
  - por sorteo
  - por lotes
  lexicon: HALOT
  rationale: «Por suerte» comunica el medio de asignación de manera natural en español bíblico y mantiene la referencia al reparto por sorteo. «Por sorteo» es viable, pero suena más técnico y menos bíblico.
- source_word: עָרִים שְׁלֹשׁ עֶשְׂרֵה
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - trece poblados
  - trece villas
  lexicon: HALOT
  rationale: עָרִים es el término usual para ciudades/poblaciones. «Ciudades» conserva la correspondencia formal y la sobriedad del contexto de repartición territorial.
theological_decisions:
- issue: Asignación por suerte como acto providencial y no mero azar
  english_pob_reading: the lot came out / by lot
  chosen_spanish_reading: salió la suerte / por suerte
  alternative_spanish_readings:
  - cayó la suerte
  - por sorteo
  rationale: El versículo describe el procedimiento de adjudicación de territorios mediante suerte. En español conviene mantener la formulación concreta sin reinterpretarla como simple casualidad; «suerte» conserva la terminología bíblica del reparto.
  doctrine_reference: Providencia divina en la distribución de la herencia; cf. Pr 16:33.
translation_notes:
  revision_awareness: Se tuvo en cuenta la solución inglesa ya auditada («the lot came out» / «by lot») y no se introdujeron revisiones textuales posteriores; la versión española sigue de cerca el hebreo con ajuste idiomático natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - «Levitas», «coatitas», «Aarón» y los nombres tribales se conservan transliterados o adaptados de forma estándar y reconocible.
  - La repetición de «de la tribu de» preserva el paralelismo del hebreo y evita una lista excesivamente condensada.
