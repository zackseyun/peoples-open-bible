    issue: «me uniré a ti por alianza matrimonial» no refleja con precisión óptima ἐπιγαμβρεύσω
    rationale: El griego apunta a establecer parentesco por matrimonio, no simplemente a «unirse» ni a una formulación abstracta de alianza. «Me emparentaré contigo por matrimonio» preserva mejor el sentido afín.
  - severity: low
    issue: «nos veamos unos a otros» suena redundante en español
    rationale: Aunque calca el griego ἀλλήλους, en español natural basta «nos veamos» para expresar reciprocidad sin pérdida de sentido.
  - severity: low
