revisions:
- from: Porque los que son bendecidos por él heredarán la tierra[a], pero los que son malditos por él serán exterminados.
  to: Pues los que son bendecidos por él heredarán la tierra[a], pero los que son malditos por él serán cortados.
  rationale: Se revisa el conector inicial a «Pues» para reflejar mejor el valor discursivo de כִּי en poesía y mantener un español natural. Se corrige «serán exterminados» a «serán cortados» para preservar el modismo hebreo יִכָּרֵתוּ y la decisión léxica/theológica documentada por el POB inglés. También se repara la nota de אָרֶץ para que ofrezca una alternativa real y coherente con el audit trail.
