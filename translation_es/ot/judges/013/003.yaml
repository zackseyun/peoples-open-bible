translation:
  language: es
  text: 'El ángel de Yahvé se le apareció a la mujer y le dijo: «Mira[a], tú eres estéril y no has dado a luz, pero concebirás y darás a luz un hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el mensajero de Yahvé». Hebreo: «Mira, por favor»; la partícula añade énfasis o una leve urgencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - apareció
  - se mostró
  lexicon: HALOT
  rationale: El nifal de ראה expresa una manifestación visible en narrativa. «Se le apareció» conserva el hecho de la aparición y suena natural en español sin añadir explicaciones.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: «Ángel» es la equivalencia natural en este contexto de manifestación divina. Se mantiene «Yahvé» según el estándar del proyecto para יְהוָה.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: Aquí el foco narrativo está en la destinataria de la aparición; por eso «la mujer» es más directo que «la esposa».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: El deíctico llama la atención. «Mira» comunica esa función en español moderno; en el discurso directo puede sonar más natural que un calco solemne.
- source_word: נָא
  english_pob_choice: now / please
  chosen_spanish: ahora
  alternatives_spanish:
  - te ruego
  - por favor
  lexicon: HALOT
  rationale: El matiz de énfasis o apremio se expresa aquí con «ahora», que el contexto de anuncio hace inteligible y concordante con el audit trail inglés que finalmente integró הִנֵּה נָא como «Behold, now».
- source_word: עֲקָרָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barrena
  - infértil
  lexicon: HALOT
  rationale: «Estéril» es el equivalente claro y digno en español para la incapacidad de concebir en este contexto narrativo.
- source_word: וְלֹא יָלַדְתְּ
  english_pob_choice: and have not borne children
  chosen_spanish: y no has dado a luz
  alternatives_spanish:
  - y no has parido
  - y no has tenido hijos
  lexicon: HALOT
  rationale: La idea es el estado presente de no haber alumbrado. «Dar a luz» es idiomático y fiel; en notas se preserva la alternativa semántica de haber tenido hijos si fuera necesario.
- source_word: וְהָרִית
  english_pob_choice: you will conceive
  chosen_spanish: concebirás
  alternatives_spanish:
  - quedarás encinta
  - llegarás a concebir
  lexicon: HALOT
  rationale: En el anuncio profético tiene valor futuro; «concebirás» reproduce con precisión ese futuro y mantiene el paralelismo con el verbo siguiente.
- source_word: וְיָלַדְתְּ
  english_pob_choice: and bear
  chosen_spanish: y darás a luz
  alternatives_spanish:
  - y parirás
  - y tendrás
  lexicon: HALOT
  rationale: El futuro del segundo verbo completa la promesa con lenguaje natural en español. «Darás a luz» conserva el sentido de nacimiento.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: «Ben» especifica un descendiente masculino; «un hijo» es la forma más natural y estable en español para este anuncio de nacimiento.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in מַלְאַךְ יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. Esto preserva el nombre del pacto sin sustituirlo por una convención litúrgica de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identity of מַלְאַךְ יְהוָה
  english_pob_reading: Translated functionally as 'the angel of Yahweh' without specifying whether this is a created angel or a theophanic manifestation
  chosen_spanish_reading: «el ángel de Yahvé» sin resolver si se trata de un mensajero creado o de una manifestación teofánica
  alternative_spanish_readings:
  - «el mensajero de Yahvé»
  - «una aparición preencarnada del Hijo»
  rationale: El texto no explicita la identidad ontológica del mensajero. La traducción conserva esa tensión y evita imponer una conclusión doctrinal no expresada por el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: הִנֵּה נָא se refleja con una apelación formal y natural («Mira, ahora»), en lugar de una glosa más libre. También se conservó el futuro profético de «concebirás» y «darás a luz», y la distinción entre la aparición y la identidad del mensajero.'
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה de forma consistente con el proyecto.
  - «Ángel» se mantiene por la lectura narrativa y teológica documentada; la alternativa «mensajero» queda en nota.
  - No se suavizó עֲקָרָה a «sin hijos», para conservar la fuerza lexical de esterilidad.
  - Los futuros españoles («concebirás», «darás a luz») reflejan el valor profético del hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y están anclados a las palabras correspondientes.
