translation:
  language: es
  text: 'y sus dos hijos, de quienes el nombre de uno era Gersón, porque dijo: «Fui forastero[a] en tierra extranjera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «residente temporal». El hebreo גֵּר puede denotar a un residente temporal, un forastero o un extranjero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y, además
  - y también
  lexicon: HALOT
  rationale: La partícula conjuntiva abre la continuación del relato; el marcador de objeto directo no se traduce por separado en español. 'Y' reproduce la conexión narrativa de forma natural.
- source_word: שְׁנֵי בָנֶיהָ
  english_pob_choice: her two sons
  chosen_spanish: sus dos hijos
  alternatives_spanish:
  - sus dos hijos varones
  - sus dos muchachos
  lexicon: HALOT
  rationale: '''בָנֶיהָ'' son sus hijos varones; en español ''hijos'' comunica bien el masculino genérico específico y evita una sobrecarga literal. ''Sus dos hijos'' preserva la relación posesiva y el número.'
- source_word: אֲשֶׁר
  english_pob_choice: of whom
  chosen_spanish: de los cuales
  alternatives_spanish:
  - cuyo nombre
  - de quienes
  lexicon: HALOT
  rationale: La relativa introduce la identificación de uno de los dos hijos. 'De los cuales' mantiene la relación sin forzar una construcción posesiva poco natural en español.
- source_word: שֵׁם הָאֶחָד
  english_pob_choice: the name of the one
  chosen_spanish: el nombre del uno
  alternatives_spanish:
  - el nombre del primero
  - uno se llamaba
  lexicon: HALOT
  rationale: '''הָאֶחָד'' distingue a uno de los dos, no necesariamente al primero en orden. ''El uno'' conserva esa precisión y evita inferir una secuencia que el hebreo no explicita.'
- source_word: גֵּרְשֹׁם
  english_pob_choice: Gershom
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gershom
  lexicon: HALOT
  rationale: Se opta por la forma hispanizada tradicional 'Gersón', que corresponde al nombre propio y es ampliamente reconocible en español bíblico, sin alterar la identidad del personaje.
- source_word: כִּי אָמַר
  english_pob_choice: for he said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - porque había dicho
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación del nombre. 'Porque dijo' transmite la relación explicativa de forma directa y fiel, sin añadir una anterioridad verbal no requerida por el hebreo.
- source_word: גֵּר
  english_pob_choice: a foreigner
  chosen_spanish: forastero
  alternatives_spanish:
  - extranjero
  - residente forastero
  - sojourner
  lexicon: HALOT
  rationale: גֵּר puede designar a alguien que vive como no perteneciente o residente temporal. 'Forastero' preserva esa tensión de extranjería sin reducirlo simplemente a 'extranjero' nacional.
- source_word: הָיִיתִי
  english_pob_choice: I have been
  chosen_spanish: fui
  alternatives_spanish:
  - he sido
  - había sido
  lexicon: HALOT
  rationale: El qal perfecto puede leerse como estado pasado en la explicación nominal. En español 'fui' suena natural en una cita de habla directa y no fuerza un matiz aspectual innecesario.
- source_word: בְּאֶרֶץ נָכְרִיָּה
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra extranjera
  alternatives_spanish:
  - en una tierra extraña
  - en una tierra ajena
  lexicon: HALOT
  rationale: '''אֶרֶץ'' es ''tierra'' y ''נָכְרִיָּה'' expresa extranjería/ajenidad. ''Tierra extranjera'' conserva la repetición conceptual del hebreo junto con גֵּר y mantiene la fuerza de lugar no propio.'
theological_decisions:
- issue: matiz de גֵּר en la explicación del nombre
  english_pob_reading: I have been a foreigner in a foreign land; footnote notes that גֵּר can denote a temporary resident, outsider, or foreigner.
  chosen_spanish_reading: Fui forastero en tierra extranjera.
  alternative_spanish_readings:
  - Fui un residente temporal en tierra extranjera.
  - Fui un extranjero en tierra extranjera.
  - Fui un forastero, un residente extraño en tierra ajena.
  rationale: 'La expresión hebrea no es meramente nacional sino relacional y social: alguien sin pertenencia estable. ''Forastero'' conserva esa tensión mejor que ''extranjero'' puro, aunque sigue siendo una aproximación; la nota explica el rango semántico sin borrar la ambigüedad documentada.'
  doctrine_reference: Semántica bíblica de גֵּר; uso legal/social en la Torá (cf. Éxodo y Levítico)
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios respecto del último pase en inglés; esta versión española se ajusta al mismo sentido base, manteniendo la ambigüedad léxica documentada para גֵּר y sin añadir inferencias narrativas.
  spanish_consistency_notes:
  - Se conserva el paralelismo semántico entre 'forastero' y 'tierra extranjera' para reflejar la repetición de extranjería del hebreo.
  - Se hispaniza el nombre propio como 'Gersón' por uso bíblico tradicional en español, mientras se mantiene la identidad del hebreo Gershom.
  - Se evita traducir mecánicamente 'he tenido sido' o un perfecto compuesto donde el español directo de cita resulta más natural con el valor explicativo del relato.
