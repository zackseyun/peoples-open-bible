base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/017.yaml
  text: He has withheld his hand from the poor[a], has not taken interest or profit, has carried out my judgments, and has walked in my statutes. He will not die for his father's iniquity[c][b]; he will surely live.
  footnotes:
  - marker: a
    text: Or 'has turned back his hand from the poor.' The Hebrew idiom pictures refraining from harming or exploiting the poor.
    reason: lexical_alternative
  - marker: b
    text: '''Interest or profit'' translates two related Hebrew terms for gain taken on a loan; traditionally, ''usury and increase.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'he will not die in his father's iniquity.' The sense in context is that he will not die because of his father's guilt.
    reason: alternative_reading
