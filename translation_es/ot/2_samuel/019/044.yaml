revisions:
- from: 'Entonces el hombre de Israel respondió al hombre de Judá y dijo[a]: “Yo tengo diez porciones en el rey, y también en David tengo más que tú[b]. ¿Por qué, pues, me trataste con ligereza? ¿No fue mi palabra la primera[c] en hacer volver a mi rey? Pero la palabra del hombre de Judá fue más dura[d] que la palabra del hombre de Israel.”'
  to: 'Entonces el hombre de Israel respondió al hombre de Judá y dijo[a]: «Yo tengo diez porciones en el rey, y también en David tengo más que tú[b]. ¿Por qué, pues, me trataste con desprecio? ¿No fue mi palabra la primera[c] en hacer volver a mi rey? Pero la palabra de los hombres de Judá fue más dura[d] que la palabra de los hombres de Israel».'
  rationale: Se corrige el cierre al plural colectivo para reflejar el valor resumitivo del hebreo y de la auditoría inglesa. También se sustituye 'con ligereza' por 'con desprecio' para un español más natural que sigue comunicando menosprecio. Se mantienen las demás decisiones principales, incluido el singular representativo al inicio, 'diez porciones', la elipsis comparativa sobre David y 'mi rey'.
