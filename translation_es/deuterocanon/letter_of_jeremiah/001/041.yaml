translation:
  language: es
  text: Y ellos mismos no pueden[a], aunque lo perciban, dejarlos atrás, pues no tienen percepción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo percibido, no pueden dejarlos atrás»; el participio griego νοήσαντες puede entenderse más literalmente, aunque en el contexto probablemente tenga fuerza concesiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύνανται
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no tienen poder para
  lexicon: BDAG
  rationale: δύναμαι expresa incapacidad; «no pueden» es natural en español y conserva la negación de capacidad sin añadir matices ajenos.
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  - por sí mismos
  lexicon: BDAG
  rationale: El pronombre es enfático; «ellos mismos» preserva la insistencia retórica de que son los mismos ídolos los que no pueden actuar.
- source_word: νοήσαντες
  english_pob_choice: though they perceive
  chosen_spanish: aunque lo perciban
  alternatives_spanish:
  - habiendo percibido
  - aunque entiendan
  lexicon: BDAG
  rationale: En este contexto el participio aoristo funciona con sentido concesivo; «aunque lo perciban» mantiene esa concesión y, al mismo tiempo, sigue de cerca la revisión inglesa que ajustó the semantic field toward percepción.
- source_word: καταλιπεῖν
  english_pob_choice: leave them behind
  chosen_spanish: dejarlos atrás
  alternatives_spanish:
  - abandonarlos
  - dejarlos
  lexicon: BDAG
  rationale: El infinitivo puede significar dejar o abandonar; «dejarlos atrás» conserva la imagen de apartarse/soltar algo y suena idiomático en español.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - esas cosas
  - aquello
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a los objetos asociados en el contexto; «los» permite una referencia breve y natural sin sobreexplicar el antecedente.
- source_word: αἴσθησιν
  english_pob_choice: perception
  chosen_spanish: percepción
  alternatives_spanish:
  - sentido
  - conciencia
  lexicon: BDAG
  rationale: αἴσθησις denota percepción/sensibilidad; «percepción» es el equivalente más directo y coincide con la consistencia léxica destacada en la revisión inglesa.
- source_word: οὐκ ἔχουσιν
  english_pob_choice: they have no
  chosen_spanish: no tienen
  alternatives_spanish:
  - carecen de
  - no poseen
  lexicon: BDAG
  rationale: La negación de posesión se expresa de forma simple y idiomática con «no tienen»; así se mantiene el paralelismo con la afirmación final del verso.
theological_decisions:
- issue: Fuerza retórica del pasaje contra los ídolos
  english_pob_reading: The verse continues the argument that idols are powerless and senseless; the emphatic pronoun refers to the idols themselves.
  chosen_spanish_reading: El verso continúa el argumento de que los ídolos son impotentes e insensibles; el énfasis recae en que ellos mismos no pueden actuar.
  alternative_spanish_readings:
  - 'Simplemente: «no pueden», sin énfasis explícito en ellos mismos.'
  - 'Tomar el participio de modo más temporal: «habiendo percibido, no pueden...»'
  rationale: La traducción conserva la ironía y la acusación del texto sin suavizarla; el énfasis del pronombre y la mención final de la falta de percepción mantienen la lógica del reproche.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que sustituyó «understand» por «perceive» para ajustar mejor νοήσαντες y αἴσθησιν; por eso el español usa «perciban» y «percepción» de manera coherente. También se corrigió el anclaje de la nota para que el marcador [a] aparezca explícitamente en el texto.
  spanish_consistency_notes:
  - Se mantiene la distinción entre percepción y entendimiento, siguiendo el ajuste de la auditoría inglesa.
  - «Ellos mismos» conserva el énfasis del pronombre αὐτοί sin volver el español forzado.
  - «Percepción» se usa dos veces para reflejar la repetición conceptual del verso y su ironía interna.
