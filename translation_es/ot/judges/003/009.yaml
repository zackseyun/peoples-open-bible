  text: וַ/יִּזְעֲק֤וּ בְנֵֽי יִשְׂרָאֵל֙ אֶל יְהוָ֔ה וַ/יָּ֨קֶם יְהוָ֥ה מוֹשִׁ֛יעַ לִ/בְנֵ֥י יִשְׂרָאֵ֖ל וַ/יּֽוֹשִׁיעֵ֑/ם אֵ֚ת עָתְנִיאֵ֣ל בֶּן קְנַ֔ז אֲחִ֥י כָלֵ֖ב הַ/קָּטֹ֥ן מִמֶּֽ/נּוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/003/009.yaml
  text: 'Then the sons of Israel cried out to Yahweh[a], and Yahweh raised up a deliverer for the sons of Israel, who delivered them: Othniel son of Kenaz[c][b], Caleb’s younger brother.'
  footnotes:
  - marker: a
    text: Or, 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Deliverer'' could also be rendered ''savior'' or ''rescuer''; the Hebrew refers here to a human agent raised up by God to rescue Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the younger brother of Caleb.' The Hebrew phrase identifies Othniel in relation to Caleb and indicates that he was younger than Caleb.
    reason: alternative_reading
