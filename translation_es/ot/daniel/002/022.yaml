translation:
  language: es
  text: Él revela cosas profundas y ocultas[a]; sabe lo que está en la oscuridad[b], y la luz habita con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas secretas» para «cosas ocultas».
    reason: lexical_alternative
  - marker: b
    text: O «la luz está con él». El verbo arameo puede entenderse de manera más estática, pero «habita» preserva mejor la imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלֵא
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - da a conocer
  lexicon: HALOT
  rationale: El participio arameo expresa sacar algo a la luz o hacerlo conocido. «Revela» conserva ese valor y suena natural en español contemporáneo de registro bíblico.
- source_word: עַמִּיקָתָא
  english_pob_choice: deep things
  chosen_spanish: cosas profundas
  alternatives_spanish:
  - cosas hondas
  - cosas profundas y misteriosas
  lexicon: HALOT
  rationale: La imagen de profundidad se conserva con «profundas». «Cosas profundas» es una forma clara y fiel; evita sobreinterpretar el matiz como si el texto dijera explícitamente «misteriosas».
- source_word: וּמְסַתְּרָתָא
  english_pob_choice: hidden things
  chosen_spanish: ocultas
  alternatives_spanish:
  - escondidas
  - secretas
  lexicon: HALOT
  rationale: El término designa cosas cubiertas u ocultas. En español, «ocultas» empareja bien con «profundas» y mantiene la antítesis con la revelación.
- source_word: יָדַע מָה
  english_pob_choice: he knows what
  chosen_spanish: sabe lo que
  alternatives_spanish:
  - conoce lo que
  - sabe aquello que
  lexicon: HALOT
  rationale: La construcción introduce el contenido del conocimiento divino de forma directa. «Sabe lo que» es idiomático y suficientemente literal.
- source_word: בַחֲשׁוֹכָא
  english_pob_choice: is in the darkness
  chosen_spanish: está en la oscuridad
  alternatives_spanish:
  - está en tinieblas
  - está en la oscuridad
  lexicon: HALOT
  rationale: En español, «oscuridad» comunica con claridad la imagen aramea de la tiniebla. Se evita forzar un valor más abstracto que el del sustantivo original.
- source_word: וְנְהִירָא
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - iluminación
  lexicon: HALOT
  rationale: Aunque el inglés de referencia opta por «light», en español el artículo ayuda a sonar natural y a mantener el contraste poético con «la oscuridad». No se pierde el sustantivo original.
- source_word: עִמֵּהּ שְׁרֵא
  english_pob_choice: dwells with him
  chosen_spanish: habita con él
  alternatives_spanish:
  - mora con él
  - permanece con él
  - está con él
  lexicon: HALOT
  rationale: El verbo arameo admite la idea de morar/abitar y el POB inglés preserva la imagen de permanencia. «Habita con él» es fiel y natural; mantiene la personificación sin reducirla a mera ubicación.
theological_decisions:
- issue: Personificación de la luz en relación con Dios
  english_pob_reading: and light dwells with him
  chosen_spanish_reading: y la luz habita con él
  alternative_spanish_readings:
  - y la luz está con él
  - y con él está la luz
  rationale: Se conserva la imagen poética de permanencia cercana sin convertirla en una afirmación más rígida de estado estático. «Habita» sigue el valor del verbo arameo y mantiene la tensión literaria del verso.
  doctrine_reference: Mantener la imaginería bíblica sin resolverla en exceso; lectura poética y teológica compatible con la transparencia del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca la auditoría inglesa POB y no requiere ajustes por revisiones posteriores; se mantiene la equivalencia óptima ya validada en el contexto de referencia.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el contexto del capítulo, sin introducir el nombre divino donde el verso no lo expresa.
  - Se conserva la oposición semántica profundidad/ocultamiento frente a revelación/oscuridad/luz sin suavizarla.
  - «Habita» fue preferido sobre «está» para reflejar la decisión auditada en inglés y evitar una pérdida de imagen poética.
