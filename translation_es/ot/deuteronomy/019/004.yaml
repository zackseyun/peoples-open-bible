translation:
  language: es
  text: 'Ahora bien, esta es la disposición para el homicida[a] que pueda huir allí y vivir: cuando golpee a su prójimo sin intención, y no lo haya odiado en tiempos pasados[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo se refiere aquí, en el marco legal de las ciudades de refugio, a quien ha causado una muerte, sin implicar necesariamente asesinato intencional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de ayer y anteayer». El modismo significa «antes» o «en tiempos pasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: provision
  chosen_spanish: disposición
  alternatives_spanish:
  - regla
  - disposición legal
  - caso
  lexicon: HALOT
  rationale: En contexto jurídico, דְּבָר puede referirse a la estipulación o regulación del caso. «Disposición» comunica bien la norma legal sin caer en un calco rígido ni perder el matiz formal.
- source_word: הָרֹצֵחַ
  english_pob_choice: manslayer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  - quien mata
  lexicon: HALOT
  rationale: El contexto de las ciudades de refugio no exige «asesino» en sentido de culpabilidad penal plena. «Homicida» conserva la referencia a una muerte causada, con menor carga de condena que «asesino».
- source_word: יָנוּס שָׁמָּה
  english_pob_choice: may flee there
  chosen_spanish: huya allá
  alternatives_spanish:
  - pueda huir allí
  - huya allí
  - corra allá
  lexicon: HALOT
  rationale: El imperfecto describe la clase de persona que busca refugio. «Huya allá» mantiene el sentido de desplazamiento hacia el lugar señalado y funciona con naturalidad en español bíblico actual.
- source_word: וָחָי
  english_pob_choice: and live
  chosen_spanish: y viva
  alternatives_spanish:
  - y viva allí
  - y permanezca con vida
  - para que viva
  lexicon: HALOT
  rationale: La forma verbal expresa el resultado de llegar al refugio. «Y viva» conserva la concisión del hebreo y la relación de consecuencia sin añadir una paráfrasis excesiva.
- source_word: יַכֶּה
  english_pob_choice: strikes
  chosen_spanish: golpee
  alternatives_spanish:
  - hiere
  - pegue
  - ataque
  lexicon: HALOT
  rationale: El verbo נכה es «golpear/smitir». «Golpee» refleja el acto verbal más directamente que «mate», que introduciría una explicitación no presente en esta cláusula.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - su compañero
  lexicon: HALOT
  rationale: En contextos relacionales y legales, «prójimo» comunica la relación humana general del término sin restringirlo a vecindad física.
- source_word: בִּבְלִי דַעַת
  english_pob_choice: without intent
  chosen_spanish: sin intención
  alternatives_spanish:
  - sin conocimiento
  - sin darse cuenta
  - sin saber
  lexicon: HALOT
  rationale: Aunque literalmente dice «sin conocimiento», el valor jurídico aquí es la ausencia de intención o de voluntariedad culpable. «Sin intención» expresa con claridad esa fuerza legal.
- source_word: לֹא שֹׂנֵא לוֹ
  english_pob_choice: he did not hate him
  chosen_spanish: no lo haya odiado
  alternatives_spanish:
  - no le haya guardado odio
  - no haya sido su enemigo
  - no lo odiaba
  lexicon: HALOT
  rationale: El participio negado señala una disposición previa continua. En español, la construcción en pretérito perfecto de subjuntivo encaja con la subordinación temporal y mantiene el énfasis en la ausencia de odio anterior.
- source_word: מִתְּמֹל שִׁלְשֹׁם
  english_pob_choice: in times past
  chosen_spanish: en tiempos pasados
  alternatives_spanish:
  - desde ayer y anteayer
  - antes
  - en el pasado reciente
  lexicon: HALOT
  rationale: El modismo alude literalmente a «ayer y anteayer», es decir, a un tiempo anterior reciente. «En tiempos pasados» recoge la referencia temporal sin forzar un giro demasiado idiomático para el lector en español.
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético y se siguió el audit trail inglés para mantener el valor jurídico de דְּבַר, הָרֹצֵחַ, בִּבְלִי דַעַת y מִתְּמֹל שִׁלְשֹׁם. Se evitó traducir mecánicamente desde el inglés cuando el español podía reflejar mejor el hebreo, especialmente en la relación entre la cláusula de fuga y la finalidad de vida.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Prójimo» se mantiene como equivalente relacional general para רֵעַ en este contexto legal.
  - «Sin intención» conserva la fuerza jurídica de bִבְלִי דַעַת sin añadir una interpretación doctrinal.
  - Se prefirió «en tiempos pasados» en el texto principal y se preservó el giro más literal en nota para auditoría.
