translation:
  language: es
  text: ¡Despierta, espada, contra mi pastor, contra el hombre que es mi compañero[a], declara Yahvé de los Ejércitos[b]. Hiere al pastor, y las ovejas serán dispersadas; y volveré mi mano contra los pequeños[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra el hombre que es mi asociado», o posiblemente «contra el hombre que es mi igual». El término hebreo denota a alguien estrechamente asociado con otro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «oráculo de Yahvé de los Ejércitos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «volveré mi mano sobre/hacia los pequeños». El giro puede implicar acción contra ellos, o de modo más general un nuevo trato con ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - arma
  lexicon: HALOT
  rationale: Sustantivo concreto y singular; se conserva la personificación profética dirigida a la espada.
- source_word: עוּרִי
  english_pob_choice: Awake
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Levántate!
  - ¡Sacúdete!
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a la espada. «Despierta» es natural en español y preserva el llamado a entrar en acción sin arcaísmo.
- source_word: רֹעִי
  english_pob_choice: my shepherd
  chosen_spanish: mi pastor
  alternatives_spanish:
  - mi pastor guía
  - mi pastorado
  lexicon: HALOT
  rationale: Participio sustantivado con sufijo de primera persona singular; «mi pastor» reproduce de forma directa la relación posesiva.
- source_word: גֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el guerrero
  lexicon: HALOT
  rationale: En aposición a «mi pastor», el sentido personal simple es el más fiel; «el hombre» evita añadir matices no exigidos por el hebreo.
- source_word: עֲמִיתִי
  english_pob_choice: who is my companion
  chosen_spanish: que es mi compañero
  alternatives_spanish:
  - que es mi asociado
  - que es mi igual
  - que es cercano a mí
  lexicon: HALOT
  rationale: «Compañero» expresa la relación estrecha del término sin imponer una formulación teológica más fuerte de lo que el hebreo garantiza por sí solo.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: declara Yahvé de los Ejércitos
  alternatives_spanish:
  - declara Yahvé de los Ejércitos Celestiales
  - oráculo de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» y se traduce צְבָאוֹת por «de los Ejércitos» para una transparencia semántica acorde con el estándar POB.
- source_word: הַךְ
  english_pob_choice: Strike
  chosen_spanish: Hiere
  alternatives_spanish:
  - Golpea
  - Atinge
  lexicon: HALOT
  rationale: Imperativo de נכה. «Hiere» conserva la fuerza del mandato y encaja bien con el registro bíblico en español.
- source_word: וּתְפוּצֶיןָ
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersadas
  alternatives_spanish:
  - serán esparcidas
  - quedarán dispersadas
  lexicon: HALOT
  rationale: Pasivo futuro que expresa el resultado de la acción contra el pastor; «dispersadas» mantiene el sentido colectivo del rebaño.
- source_word: הַצֹּאן
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las reses
  lexicon: HALOT
  rationale: Aunque literalmente puede denotar rebaño/ovejas, «las ovejas» conserva la imagen animal ya establecida por «pastor» y es la equivalencia más directa.
- source_word: וַהֲשִׁבֹתִי יָדִי עַל
  english_pob_choice: I will turn my hand against
  chosen_spanish: volveré mi mano contra
  alternatives_spanish:
  - volveré mi mano sobre
  - tenderé mi mano contra
  lexicon: HALOT
  rationale: Se preserva el giro idiomático con un valor adverso en este contexto de juicio. «Contra» hace explícita la dirección hostil que el contexto inmediato favorece.
- source_word: הַצֹּעֲרִים
  english_pob_choice: the little ones
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los pequeños de edad
  - los insignificantes
  - los jóvenes
  lexicon: HALOT
  rationale: «Pequeños» conserva la ambigüedad de edad o estatus y funciona de manera natural en español en contexto de rebaño.
theological_decisions:
- issue: Sentido de עֲמִיתִי respecto al pastor
  english_pob_reading: who is my companion
  chosen_spanish_reading: que es mi compañero
  alternative_spanish_readings:
  - mi asociado
  - mi igual
  rationale: La traducción mantiene la cercanía relacional sin convertir el término en una afirmación doctrinal más definida de lo que el hebreo exige. Se deja abierta la tensión interpretativa, tal como hace el POB en inglés.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla prematuramente.
- issue: Sentido de «volveré mi mano contra los pequeños»
  english_pob_reading: I will turn my hand against the little ones
  chosen_spanish_reading: volveré mi mano contra los pequeños
  alternative_spanish_readings:
  - volveré mi mano sobre los pequeños
  - volveré mi mano hacia los pequeños
  rationale: En el contexto de herir al pastor y dispersar al rebaño, el sentido adverso es el más probable. Aun así, el giro idiomático se conserva para no borrar la ambigüedad semántica que existe en el hebreo.
  doctrine_reference: Preservar la tensión interpretativa del idiomático hebreo.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo masorético y del audit trail en inglés; no se introdujeron cambios de sentido respecto a la lectura inglesa base, y se mantuvieron las tensiones léxicas documentadas en el original.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma principal del nombre divino, conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como «de los Ejércitos» por transparencia semántica y coherencia con el POB en inglés.
  - Se conserva la imaginería pastoril con «pastor / ovejas» para mantener la correspondencia interna del versículo.
  - Las notas a pie de texto usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
