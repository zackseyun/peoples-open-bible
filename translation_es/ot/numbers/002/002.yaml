    rationale: Dice «O “acamparán”», que no ofrece una alternativa léxica real ni corresponde al patrón de notas del POB. La fuerza prescriptiva ya puede explicarse en las decisiones léxicas sin nota.
  - severity: low
    issue: «todo alrededor de él» suena algo rígido
    rationale: En español bíblico actual, «alrededor de ella» o «todo alrededor» con antecedente explícito resulta más natural; al cambiar a «tienda», el pronombre debe concordar en femenino.
  revised_spanish_text: Los hijos de Israel acamparán, cada hombre junto a su bandera, conforme a las señales de la casa de sus padres; acamparán[a] frente a la tienda de reunión[b], alrededor de ella.
  revised_footnotes:
