translation:
  language: es
  text: ¡Bienaventurada es la nación cuyo Dios es Yahvé[a], el pueblo que él ha escogido para su herencia[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dichosa es la nación cuyo Dios es Yahvé». El hebreo אַשְׁרֵי también puede traducirse «dichosa» o «feliz», pero «bienaventurada» preserva mejor el tono pactual y litúrgico del salmo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo conserva el giro poético «el pueblo»; probablemente apunta de manera especial a Israel, aunque el texto no lo explicita en esta línea.
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurada
  alternatives_spanish:
  - Feliz
  - Dichosa
  lexicon: HALOT
  rationale: El hebreo אַשְׁרֵי expresa una fórmula de bienaventuranza. En español, «bienaventurada» conserva mejor el tono litúrgico y de declaración de estado que «feliz», sin reducirlo a emoción subjetiva.
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: גּוֹי suele significar «nación» y aquí va en paralelo con הָעָם. «La nación» mantiene el paralelismo y el matiz corporativo.
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - que
  - del cual
  lexicon: HALOT
  rationale: 'Aunque la estructura hebrea es relativa, en español «cuyo» expresa con naturalidad la relación posesiva: «la nación cuyo Dios...».},{'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se vierte como «Yahvé» para preservar el nombre propio del Dios del pacto, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de «la nación» y «el pueblo»
  english_pob_reading: Maintain the poetic parallelism without over-specifying Israel in the main text
  chosen_spanish_reading: Mantener el paralelismo poético sin añadir «Israel» en el texto principal
  alternative_spanish_readings:
  - Identificar explícitamente a Israel
  - Generalizar a cualquier nación
  rationale: El hebreo presenta un paralelismo poético entre «la nación» y «el pueblo». La traducción conserva esa tensión sin resolverla en el texto principal, aunque el contexto probablemente apunta especialmente a Israel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que ajustó «as his inheritance» a «for his inheritance» para reflejar con más precisión לְנַחֲלָה לוֹ. En español, «como su herencia» conserva el valor de posesión asignada y suena natural; el ajuste no exige una traducción más literal como «para su herencia», que resultaría menos idiomática. También se respetó la decisión inglesa de no insertar «Israel» en el texto principal.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en continuidad con el estándar del proyecto para יְהוָה.
  - «Bienaventurada» mantiene el tono de beatitud del salmo y evita una banalización emocional de אַשְׁרֵי.
  - «Herencia» reproduce נַחֲלָה con resonancia de posesión pactal; en español puede abarcar tanto herencia como posesión asignada.
  - Se evitó «siervo» u otra terminología no pertinente; el versículo trata de elección y pertenencia corporativa.
