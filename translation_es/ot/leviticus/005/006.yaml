base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/006.yaml
  text: 'and he shall bring his guilt offering to Yahweh for his sin that he has committed: a female from the flock[a], a lamb or a female goat, for a sin offering[b]; and the priest shall make atonement for him for his sin.'
  footnotes:
  - marker: a
    text: Or 'his offering for guilt' or 'his reparation offering.' The Hebrew uses a term associated with guilt/reparation (אשם), while later in the verse the animal is specified 'for a sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from his sin'; the phrase can emphasize removal from the sin as the result of atonement.
    reason: lexical_alternative
