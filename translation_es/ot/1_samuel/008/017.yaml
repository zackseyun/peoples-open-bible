translation:
  language: es
  text: Tomará una décima parte de sus rebaños, y ustedes se convertirán en sus esclavos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siervos' o 'criados'. El hebreo puede denotar personas en servicio, pero aquí el contexto de exacción real y pérdida de libertad favorece 'esclavos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאנְכֶם
  english_pob_choice: your flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas
  - su ganado menor
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor en conjunto, especialmente ovejas y cabras. 'Rebaños' mantiene el sentido colectivo y resulta natural en español; 'ovejas' sería más estrecho y 'ganado menor' más técnico.
- source_word: יַעְשֹׂר
  english_pob_choice: will take a tenth
  chosen_spanish: tomará una décima parte
  alternatives_spanish:
  - diezmará
  - exigirá una décima parte
  lexicon: HALOT
  rationale: En este contexto de exacción real, 'tomará una décima parte' expresa la acción de forma clara y evita que 'diezmará' suene demasiado cultual o voluntario.
- source_word: וְאַתֶּם תִּהְיוּ לוֹ
  english_pob_choice: and you will become his
  chosen_spanish: y ustedes se convertirán en sus
  alternatives_spanish:
  - y ustedes serán suyos
  - y ustedes quedarán como sus
  lexicon: HALOT
  rationale: La construcción hebrea señala un cambio de condición bajo el rey. 'Se convertirán en sus' conserva ese matiz de resultado; en español necesita completarse con el complemento implícito de pertenencia o sujeción, que aquí queda absorbido por el sustantivo siguiente.
- source_word: לַעֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: En este pasaje la relación es coercitiva y describe pérdida de libertad bajo la monarquía. 'Esclavos' preserva mejor la fuerza lexical que 'siervos', que en español puede suavizar indebidamente la tensión.
theological_decisions:
- issue: Intensidad de עֲבָדִים en el anuncio de las exacciones del rey
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondados
  rationale: La advertencia no describe un servicio honorable sino una subordinación impuesta. 'Esclavos' refleja mejor la gravedad del texto y evita atenuar la denuncia de la opresión real.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; principio lexical de slave/servant aplicado por analogía a עבד'
- issue: Valor de la cantidad en יַעְשֹׂר
  english_pob_reading: will take a tenth
  chosen_spanish_reading: tomará una décima parte
  alternative_spanish_readings:
  - diezmará
  - pedirá la décima parte
  rationale: La formulación española elegida mantiene el sentido cuantitativo sin introducir una connotación litúrgica o administrativa que el contexto no exige.
  doctrine_reference: HALOT; nota de equivalencia óptima sobre exacción real
translation_notes:
  revision_awareness: 'Coincide con el último pase del audit trail: no se documentaron cambios, y la revisión más reciente concluyó que no había ajustes necesarios.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' en la tradición POB cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Sus rebaños'' conserva el plural colectivo de צֹאן y evita reducir el referente a ovejas solamente.'
  - Se mantiene el tono de advertencia y subordinación del contexto monárquico sin añadir interpretación.
