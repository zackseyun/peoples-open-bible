translation:
  language: es
  text: Porque la sabiduría es un espíritu que ama a la humanidad, y no absolverá a un blasfemo por las palabras de sus labios[a]; porque Dios es testigo de su ser interior[b], y un verdadero observador de su corazón y oyente de su lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no tendrá por inocente a un blasfemo por lo que sale de sus labios'. La frase griega después de 'blasfemo' es condensada y puede entenderse con fuerza causal.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'sus riñones', un modismo antropológico para el interior oculto de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλάνθρωπον
  english_pob_choice: that loves humanity
  chosen_spanish: que ama a la humanidad
  alternatives_spanish:
  - benigno con la humanidad
  - amigo de la humanidad
  - que ama a los seres humanos
  lexicon: LSJ
  rationale: La palabra griega expresa benevolencia activa hacia los seres humanos. 'Que ama a la humanidad' conserva ese valor relacional sin caer en un calco duro ni en un masculino genérico tradicional como 'mankind'.
- source_word: πνεῦμα
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - espíritu
  - Espíritu
  lexicon: LSJ
  rationale: El griego es anartro y funciona de modo predicativo/apposicional con σοφία. 'Un espíritu' refleja mejor la forma del original y evita identificar aquí, sin base suficiente, la referencia con el Espíritu Santo.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  lexicon: LSJ
  rationale: Es el equivalente directo y estándar. Mantiene además la personificación del contexto sin añadir paráfrasis.
- source_word: οὐκ ἀθῳώσει
  english_pob_choice: will not acquit
  chosen_spanish: no absolverá
  alternatives_spanish:
  - no declarará inocente
  - no tendrá por inocente
  - no dejará sin culpa
  lexicon: LSJ
  rationale: '''Absolver'' conserva el matiz forense de declarar libre de culpa y funciona con naturalidad en español bíblico actual.'
- source_word: βλάσφημον
  english_pob_choice: a blasphemer
  chosen_spanish: un blasfemo
  alternatives_spanish:
  - una persona blasfema
  - el que blasfema
  lexicon: LSJ
  rationale: '''Blasfemo'' conserva el peso religioso y moral del término con la concisión del original sustantivado.'
- source_word: ἀπὸ χειλέων αὐτοῦ
  english_pob_choice: for the words of his lips
  chosen_spanish: por las palabras de sus labios
  alternatives_spanish:
  - a causa de sus labios
  - por lo que sale de sus labios
  - por las palabras que salen de sus labios
  lexicon: LSJ
  rationale: La frase griega es comprimida; 'por las palabras de sus labios' reproduce bien el valor causal y mantiene el paralelismo corporal con 'labios'.
- source_word: τῶν νεφρῶν αὐτοῦ
  english_pob_choice: his inner being
  chosen_spanish: su ser interior
  alternatives_spanish:
  - sus entrañas
  - sus riñones
  - su interior
  lexicon: LSJ
  rationale: El griego usa un modismo antropológico ('riñones') para el centro oculto de la persona. 'Ser interior' comunica el sentido sin perder del todo la dimensión interna y reservada del hebraísmo/idioma semítico subyacente.
- source_word: ἐπίσκοπος ἀληθής
  english_pob_choice: a true observer
  chosen_spanish: un verdadero observador
  alternatives_spanish:
  - un verdadero vigilante
  - un verdadero inspector
  - un observador fiel
  lexicon: LSJ
  rationale: '''Observador'' expresa la vigilancia examinadora divina mejor que ''obispo'', que sería eclesiástico y anacrónico. ''Verdadero'' conserva ἀληθής como fiable y auténtico.'
- source_word: γλώσσης
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua hablada
  - habla
  - lengua de hablar
  lexicon: LSJ
  rationale: '''Lengua'' es el equivalente natural y mantiene el paralelismo corporal con ''labios'' en español bíblico.'
- source_word: μάρτυς
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo judicial
  - testigo
  lexicon: LSJ
  rationale: Término forense directo y transparente en español.
theological_decisions:
- issue: Si πνεῦμα σοφία debe leerse como identificación con el Espíritu Santo o como descripción personificada de la sabiduría
  english_pob_reading: Rendered as 'wisdom is a spirit that loves humanity' without capitalizing 'Spirit'.
  chosen_spanish_reading: '''la sabiduría es un espíritu'' sin mayúscula teológica'
  alternative_spanish_readings:
  - '''la sabiduría es el Espíritu Santo'''
  - '''la sabiduría es un espíritu bondadoso'''
  rationale: El griego personifica la sabiduría, pero no obliga a identificarla explícitamente con el Espíritu Santo. La minúscula preserva la tensión teológica y evita imponer una precisión doctrinal posterior que el texto no formula.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo reflejar τῶν νεφρῶν αὐτοῦ sin estrechar indebidamente su sentido antropológico
  english_pob_reading: Rendered idiomatically as 'his inner being'.
  chosen_spanish_reading: '''su ser interior'''
  alternative_spanish_readings:
  - '''sus riñones'''
  - '''sus entrañas'''
  - '''su interior'''
  rationale: El modismo apunta al centro oculto de la persona, especialmente sus impulsos y pensamientos ocultos. 'Ser interior' es comprensible y no reduce el alcance del idiomático griego a una sola subcategoría interpretativa.
  doctrine_reference: Lectura clara y moderna sin ocultar el valor antropológico del texto.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés, especialmente la preferencia por 'for the words of his lips' para ἀπὸ χειλέων αὐτοῦ y por una formulación no estrechada de νεφρῶν. Se mantuvo la personificación de σοφία sin capitalizar 'Espíritu', y se evitó traducir ἐπίσκοπος con un término eclesiástico anacrónico.
  spanish_consistency_notes:
  - Se usa 'sabiduría' de manera uniforme para σοφία.
  - '''Testigo'', ''observador'' y ''oyente'' conservan el paralelismo forense del versículo.'
  - '''Labios'' y ''lengua'' mantienen la imaginería corporal del original.'
  - Se evita 'SEÑOR' porque no hay aquí el nombre divino explícito en el texto griego; se traduce θεός como 'Dios'.
