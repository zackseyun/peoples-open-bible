translation:
  language: es
  text: 'Y Jesús le respondió: «Está dicho[a]: No pongas a prueba a Yahvé tu Dios[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «está dicho». La fórmula tradicional «está escrito» es una lectura de cita bíblica muy extendida, pero no es la forma verbal aquí.
    reason: alternative_reading
  - marker: b
    text: La cita remite a Deuteronomio 6:16, donde el hebreo tiene el nombre divino Yahvé. El griego de Lucas usa κύριον, «Señor».
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: BDAG
  rationale: La combinación participial + verbo finito funciona como un giro idiomático semítico; en español, «le respondió» expresa de forma natural que Jesús contestó al interlocutor sin añadir un calco pesado de «dijo».
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo pronominal se traduce con el complemento indirecto natural en español, manteniendo la referencia al tentador en el contexto.
- source_word: Εἴρηται
  english_pob_choice: It is said
  chosen_spanish: Está dicho
  alternatives_spanish:
  - Se ha dicho
  - Está escrito
  lexicon: BDAG
  rationale: Se conserva la fuerza del perfecto pasivo de λέγω sin reemplazarlo por una fórmula distinta. «Está dicho» refleja que la cita se presenta como una palabra ya establecida; «Está escrito» queda como alternativa tradicional, pero no es la forma literal del griego.
- source_word: Οὐκ ἐκπειράσεις
  english_pob_choice: You shall not put ... to the test
  chosen_spanish: No pongas a prueba
  alternatives_spanish:
  - No pruebes
  - No tientes
  lexicon: BDAG
  rationale: ἐκπειράζω expresa probar o poner a prueba, no seducir al pecado; por eso se usa «poner a prueba», que comunica bien el valor verbal en español bíblico moderno.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor
  - al Señor Yahvé
  lexicon: BDAG
  rationale: Se mantiene el valor de κύριος como título divino en español con «Señor». En esta cita de Deuteronomio, el trasfondo hebreo remite a Yahvé; sin embargo, el texto griego dice κύριον, y el cuerpo principal preserva esa forma mediante el título «Señor».
- source_word: τὸν θεόν σου
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: BDAG
  rationale: La frase appositiva se vierte de manera directa y natural, conservando la relación de pacto implícita en la cita de Deuteronomio.
theological_decisions:
- issue: 'Fórmula de cita: Εἴρηται'
  english_pob_reading: It is said
  chosen_spanish_reading: Está dicho
  alternative_spanish_readings:
  - Está escrito
  - Se ha dicho
  rationale: El griego usa el perfecto pasivo de λέγω, no de γράφω. Por fidelidad al texto fuente, la traducción principal evita imponer la fórmula tradicional «está escrito», aunque esta se conserva como alternativa comprensible para lectores acostumbrados a la cita bíblica.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Rendering of κύριος in a quotation from Deuteronomy 6:16
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el SEÑOR
  rationale: Como el texto griego presenta κύριον, se traduce con el término español «Señor» según el valor normal de κύριος. El trasfondo hebreo de la cita apunta a Yahvé; esa relación se mantiene por contexto sin sustituir el griego por una convención tipográfica de ocultamiento.
  doctrine_reference: 'Contested terms table: κύριος → Señor; יהוה → Yahvé'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: se conservó la fórmula literal de λέγω en la cita, se mantuvo κύριος como «Señor», y se evitó traducir ἐκπειράζω con «tentar» para no perder el sentido de poner a prueba.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, «Señor» para κύριος y «Dios» para θεός, conforme a los defaults del proyecto.
  - La puntuación y las comillas siguen el uso editorial español; el tono busca ser digno y publicable sin sonar arcaizante.
  - No se añadió una nota de «Yahvé» en el texto principal porque el griego de este versículo presenta κύριος; la conexión con Deuteronomio queda explicada en la nota y en la decisión teológica.
