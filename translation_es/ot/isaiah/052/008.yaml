translation:
  language: es
  text: Tus atalayas alzan la voz; juntas gritan de alegría, porque verán ojo a ojo[a] cuando Yahvé vuelva a Sion[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con sus propios ojos'; el hebreo literalmente dice 'ojo a ojo'.
    reason: lexical_alternative
  - marker: b
    text: O 'cuando Yahvé restaure a Sion'.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: The voice of
  chosen_spanish: La voz de
  alternatives_spanish:
  - Una voz de
  - Escuchen la voz de
  lexicon: HALOT
  rationale: קול designa literalmente “voz” o “sonido”. En español, “La voz de” conserva el arranque nominal del hebreo sin introducir un imperativo que no está explícito en el texto.
- source_word: צֹפַיִךְ
  english_pob_choice: your watchmen
  chosen_spanish: tus atalayas
  alternatives_spanish:
  - tus centinelas
  - tus vigilantes
  lexicon: HALOT
  rationale: El término procede de צפ״ה, “vigilar”. “Atalaya” comunica bien la idea de quienes están en guardia y funciona de modo natural en español bíblico. El sufijo de segunda persona femenina se conserva con “tus”, dirigido a Sion/Jerusalén.
- source_word: נָשְׂאוּ קוֹל
  english_pob_choice: they lift up their voice
  chosen_spanish: levantan su voz
  alternatives_spanish:
  - alzan su voz
  - levantan la voz
  lexicon: HALOT
  rationale: 'La expresión es idiomática: “levantar/alzar la voz”. “Su voz” mantiene el singular colectivo idiomático y evita una traducción demasiado literal que sonaría forzada en español.'
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntas
  alternatives_spanish:
  - juntos
  - a una
  lexicon: HALOT
  rationale: יַחְדָּו señala acción unida. “Juntas” concuerda con “atalayas” y transmite bien la unidad del clamor.
- source_word: יְרַנֵּנוּ
  english_pob_choice: they shout for joy
  chosen_spanish: se regocijan
  alternatives_spanish:
  - gritan de alegría
  - cantan de alegría
  lexicon: HALOT
  rationale: El pi‘el de רנן expresa júbilo audible, como gritar o cantar de alegría. “Se regocijan” es una opción natural y digna en español; se preserva la idea de gozo público sin sobrecargar el verso con repeticiones de “voz”.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del júbilo. “Porque” es la solución más clara y natural en español.
- source_word: עַיִן בְּעַיִן
  english_pob_choice: eye to eye
  chosen_spanish: ojo a ojo
  alternatives_spanish:
  - con sus propios ojos
  - cara a cara
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. “Ojo a ojo” conserva la imagen y la fuerza del original; en español sugiere percepción directa e inmediata, como en el auditable inglés “eye to eye”.
- source_word: יִרְא֔וּ
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán con claridad
  - verán por sí mismos
  lexicon: HALOT
  rationale: El imperfecto expresa aquí futuro en contexto. “Verán” mantiene sencillez y exactitud.
- source_word: בְּשׁוּב
  english_pob_choice: when ... returns
  chosen_spanish: cuando ... vuelva
  alternatives_spanish:
  - cuando ... restaure
  - al volver
  lexicon: HALOT
  rationale: El infinitivo constructo con ב puede expresar el momento de la acción. “Cuando vuelva” conserva la lectura principal de retorno sin imponer la alternativa interpretativa de “restaurar”.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: transliteración directa de יהוה como “Yahvé”, en lugar de sustituirlo por un título.'
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Nombre propio mantenido por transliteración. En español bíblico “Sion” es la forma tradicional y plenamente inteligible.
theological_decisions:
- issue: Sentido de עַיִן בְּעַיִן
  english_pob_reading: eye to eye
  chosen_spanish_reading: ojo a ojo
  alternative_spanish_readings:
  - con sus propios ojos
  - de manera directa
  rationale: La decisión principal preserva la imagen hebrea y deja abierta la interpretación de visión directa, sin resolverla en el texto principal. Esto mantiene la tensión documental del original y del audit trail inglés.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Sujeto y fuerza de בְּשׁוּב יְהוָה צִיּוֹן
  english_pob_reading: when Yahweh returns to Zion
  chosen_spanish_reading: cuando Yahvé vuelva a Sion
  alternative_spanish_readings:
  - cuando Yahvé restaure a Sion
  - cuando Yahvé haga volver a Sion
  rationale: La lectura principal toma a Yahvé como sujeto del regreso, siguiendo la sintaxis más directa. Se evita incorporar en el texto principal la interpretación “restaure”, que queda implícita como alternativa reconocida por el POB inglés.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
