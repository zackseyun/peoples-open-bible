    issue: «sobre los dos» no refleja con la mayor naturalidad ni precisión el valor de שְׁנֵינוּ
    rationale: El hebreo significa «sobre ambos de nosotros / sobre nosotros dos». «Sobre los dos» es comprensible, pero en español suena algo menos idiomático y un poco más distante del referente personal. «Sobre ambos» conserva mejor la relación bilateral del contexto forense.
  revised_spanish_text: No hay[a] entre nosotros un árbitro, que pueda poner su mano sobre ambos.
