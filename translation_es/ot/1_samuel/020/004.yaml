review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: secuencia narrativa («Entonces ... dijo»), destinatario («a David»), la pregunta con sujeto explícito «tu alma», y la promesa de acción en beneficio del interlocutor. Sin embargo, «Yo haré eso por ti» no es la opción más natural ni la más alineada con el matiz del inglés auditado «I will do it for you»; en español suena más idiomático «yo lo haré por ti».'
  spanish_quality_summary: El texto es claro y digno, pero puede pulirse para mayor naturalidad y fluidez en español eclesial amplio. «¿Qué dice tu alma?» preserva fielmente el hebreo, aunque es inusual; por eso conviene mantener la nota idiomática. El pronombre demostrativo «eso» resulta algo rígido en diálogo; «lo» suena más natural sin perder referencia.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios. «Jonatán» y «David» están bien. La conservación de «alma» concuerda con la decisión léxica documentada para נַפְשְׁךָ, y la nota alternativa idiomática es apropiada.
  issues:
  - severity: medium
    issue: «Yo haré eso por ti» suena menos natural que «yo lo haré por ti».
    rationale: El hebreo solo implica un objeto; el inglés auditado añadió «it» para naturalidad. En español, el clítico «lo» cumple esa función de manera más idiomática que el demostrativo «eso», que puede sonar enfático o señalar algo más específico de lo que el original expresa.
  - severity: low
    issue: La nota al pie comienza con «Lit.» aunque el texto principal ya dice exactamente «¿Qué dice tu alma?».
    rationale: Tal como está, la nota repite innecesariamente la redacción principal. Conviene centrarla en la alternativa idiomática documentada para aclarar sentido sin redundancia.
  revised_spanish_text: 'Entonces Jonatán dijo a David[a]: «¿Qué dice tu alma? Yo lo haré por ti».

