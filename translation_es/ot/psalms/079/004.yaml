lexical_decisions:
- source_word: הָיִינוּ
  english_pob_choice: We have become
  chosen_spanish: Nos hemos vuelto
  alternatives_spanish:
  - Hemos llegado a ser
  - Nos hemos convertido
  lexicon: HALOT
  rationale: El perfecto qal de היה expresa un estado resultante; en español, «nos hemos vuelto» comunica bien el cambio de estado y la condición presente derivada de hechos previos.
- source_word: חֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: un oprobio
  alternatives_spanish:
  - una afrenta
  - un reproche
  - una vergüenza
  lexicon: HALOT
  rationale: «Oprobio» conserva el valor de deshonra pública y objeto de desprecio que tiene el término en el lamento, sin reducirlo a un simple comentario verbal como «reproche».
- source_word: לִשְׁכֵנֵינוּ
  english_pob_choice: to our neighbors
  chosen_spanish: para nuestros vecinos
  alternatives_spanish:
  - a nuestros vecinos
  - en relación con nuestros vecinos
  - ante nuestros vecinos
  lexicon: HALOT
  rationale: La ל de relación tras el predicado nominal se puede naturalizar en español con «para» o «a»; aquí «para nuestros vecinos» mantiene la idea de referencia o respecto, con estilo fluido.
- source_word: לַעַג
  english_pob_choice: a mockery
  chosen_spanish: una burla
  alternatives_spanish:
  - un escarnio
  - un objeto de ridículo
  - una mofa
  lexicon: HALOT
  rationale: «Burla» refleja el matiz de mofa despectiva y funciona bien en paralelo con el segundo sustantivo.
- source_word: קֶלֶס
  english_pob_choice: derision
  chosen_spanish: una irrisión
  alternatives_spanish:
  - un escarnio
  - una mofa
  - una burla
  lexicon: HALOT
  rationale: Se conserva la acumulación poética diferenciando dos términos de burla. «Irrisión» es menos común, pero refleja la intensidad y evita borrar la distinción que el hebreo mantiene entre לַעַג y קֶלֶס.
- source_word: לִסְבִיבוֹתֵינוּ
  english_pob_choice: to those around us
  chosen_spanish: para los que están alrededor de nosotros
  alternatives_spanish:
  - a los que nos rodean
  - para los de alrededor
  - a los pueblos que nos rodean
  lexicon: HALOT
  rationale: La expresión hebrea apunta a un círculo más amplio que «vecinos»; «los que están alrededor de nosotros» preserva esa amplitud sin especificar indebidamente a «pueblos».
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto mantiene el acuerdo alto del auditor. La versión española sigue de cerca el hebreo y conserva la paralelismo de dos cola con dos términos distintos de ridículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton ni una cita directa del nombre divino.
  - «Oprobio» se eligió para reflejar deshonra pública, mientras que «burla» e «irrisión» mantienen el doblete de menosprecio del hebreo.
  - La nota [a] marca una alternativa de lectura para no perder la posibilidad de traducir קֶלֶס con un matiz cercano a «taunt» o «escarnio».
