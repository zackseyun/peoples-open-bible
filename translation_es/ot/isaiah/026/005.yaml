    rationale: Aunque literalmente נגע en hiphil puede sugerir ‘hacer llegar’, aquí el contexto poético de derribar una ciudad ‘hasta la tierra… hasta el polvo’ pide una formulación española más idiomática y descendente. «La hace bajar hasta el polvo» preserva el resultado y la imaginería mejor que «la hace llegar».
