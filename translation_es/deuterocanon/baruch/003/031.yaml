translation:
  language: es
  text: No hay nadie que conozca su camino, ni quien considere su senda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἔστιν
  english_pob_choice: There is no one
  chosen_spanish: No hay nadie
  alternatives_spanish:
  - Nadie hay
  - No existe nadie
  lexicon: BDAG
  rationale: La construcción existencial negativa se vierte de manera natural en español con «No hay nadie», conservando la ausencia enfática de cualquier persona capaz de cumplir la acción.
- source_word: ὁ γινώσκων
  english_pob_choice: who knows
  chosen_spanish: que conozca
  alternatives_spanish:
  - que sabe
  - que entienda
  lexicon: BDAG
  rationale: 'El participio articular funciona como sustantivo relativo: «el que conoce». En español, «que conozca» preserva bien el valor de persona indeterminada dentro de una negación general y mantiene el tono sapiencial.'
- source_word: τὴν ὁδὸν αὐτῆς
  english_pob_choice: her way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  lexicon: BDAG
  rationale: La POB inglesa conserva el referente femenino de Sabiduría; en español, el posesivo «su» evita una traducción forzada y mantiene la referencia personal implícita sin repetir el pronombre. «Camino» es el equivalente más natural de ὁδός.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - ni siquiera
  lexicon: BDAG
  rationale: «Ni» reproduce mejor la coordinación negativa en español y conserva el paralelismo del segundo miembro sin añadir énfasis que el griego no exige.
- source_word: ὁ ἐνθυμούμενος
  english_pob_choice: one who considers
  chosen_spanish: quien considere
  alternatives_spanish:
  - quien reflexione sobre
  - quien piense en
  lexicon: BDAG
  rationale: ἐνθυμέομαι puede implicar considerar interiormente o ponderar. «Considere» comunica ese acto de reflexión y mantiene el paralelismo con «conozca» mejor que una mera memoria o recuerdo.
- source_word: τὴν τρίβον αὐτῆς
  english_pob_choice: her path
  chosen_spanish: su senda
  alternatives_spanish:
  - su camino
  - su huella
  lexicon: BDAG
  rationale: τρίβος sugiere un sendero transitado o huella de paso. «Senda» conserva la variación poética respecto de ὁδός y evita repetir «camino» dos veces en español.
theological_decisions:
- issue: Referencia femenina de la Sabiduría personificada
  english_pob_reading: Render as 'her,' referring to Wisdom personified in the immediate context.
  chosen_spanish_reading: Mantener el referente femenino implícito en los posesivos «su… su…», entendiendo que alude a la Sabiduría personificada.
  alternative_spanish_readings:
  - usar «su… su…» de modo impersonal
  - explicitar «de ella»
  rationale: El contexto inmediato personifica a la Sabiduría; el español puede conservar esa referencia sin sobredeterminarla. El posesivo neutro en español no borra la personificación y resulta más fluido que repetir pronombres explícitos.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se respetó el contenido de la POB inglesa y se ajustó la sintaxis al español sin añadir notas innecesarias.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo negativo con dos miembros breves.
  - «Camino» y «senda» se diferenciaron para reflejar la variación léxica entre ὁδός y τρίβος.
  - No se usó «Señor» ni terminología ajena al texto; el verso no contiene el nombre divino.
  - La referencia a Sabiduría queda implícita, coherente con el contexto literario y con la lectura auditada.
