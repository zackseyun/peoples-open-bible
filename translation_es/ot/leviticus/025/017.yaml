revisions:
- from: Y no oprimirán[a] uno a su prójimo, sino que temerás a tu Dios; porque yo soy Yahvé, vuestro Dios.
  to: Y nadie oprimirá[a] a su prójimo, sino que temerás a tu Dios; porque yo soy Yahvé, su Dios.
  rationale: Se corrige la primera cláusula para que el español sea gramatical y claro, preservando el sentido distributivo de la prohibición. Se mantiene 'oprimirá' por su fuerza ética y legal, 'prójimo' por su adecuación bíblica, 'temerás a tu Dios' por la apelación directa singular del hebreo, y 'Yahvé' conforme a la política del proyecto. Se reemplaza 'vuestro Dios' por 'su Dios' para un español neutral latinoamericano sin perder el referente plural comunitario.
