translation:
  language: es
  text: Y si algo de sus cadáveres[a] cae sobre cualquier semilla para sembrar que haya de sembrarse, está limpia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «algo de su cadáver» o «algo de sus cadáveres». El hebreo מִנִּבְלָתָם es algo difícil de reproducir en español y puede entenderse de manera partitiva («algo de su cadáver») o colectiva/plural («algo de sus cadáveres»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Si
  lexicon: HALOT
  rationale: La construcción legal introduce un caso hipotético continuo; «Y si» conserva el enlace del hebreo y la fuerza condicional sin sonar forzado en español.
- source_word: יִפֹּל
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - cayera
  - caiga
  lexicon: HALOT
  rationale: En una cláusula casuística, el imperfecto hebreo expresa condición; en español, el presente simple «cae» comunica de forma natural esa generalidad legal.
- source_word: מִ/נִּבְלָתָם
  english_pob_choice: any of their carcass
  chosen_spanish: de sus cadáveres
  alternatives_spanish:
  - de su cadáver
  - de cualquier cadáver de ellos
  - de sus carroñas
  lexicon: HALOT
  rationale: נְבֵלָה en este contexto legal se refiere al cadáver animal impuro; el plural español resuelve la tensión gramatical del singular hebreo con sufijo plural y su sentido colectivo, sin perder la referencia al contacto con cadáveres.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: «Sobre» reproduce la relación espacial directa del hebreo y es natural en español bíblico contemporáneo.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - toda
  - cada
  lexicon: HALOT
  rationale: 'Aquí el valor distributivo es importante: «cualquier» comunica bien que la norma vale para cada semilla considerada individualmente.'
- source_word: זֶרַע זֵרוּעַ
  english_pob_choice: seed for sowing
  chosen_spanish: semilla para sembrar
  alternatives_spanish:
  - semilla de siembra
  - semilla sembrable
  - semilla para la siembra
  lexicon: HALOT
  rationale: El binomio hebreo subraya la semilla destinada a la siembra; «semilla para sembrar» mantiene esa finalidad sin introducir una formulación más técnica que el texto no exige.
- source_word: אֲשֶׁר יִזָּרֵעַ
  english_pob_choice: that is to be sown
  chosen_spanish: que ha de ser sembrada
  alternatives_spanish:
  - que será sembrada
  - que debe ser sembrada
  - que se ha de sembrar
  lexicon: HALOT
  rationale: La cláusula relativa expresa destino/proyección futura; «ha de ser sembrada» conserva esa orientación mejor que un simple presente, y evita confundirla con una acción ya realizada.
- source_word: טָהוֹר הוּא
  english_pob_choice: it is clean
  chosen_spanish: es limpia
  alternatives_spanish:
  - es limpia ritualmente
  - permanece limpia
  - está limpia
  lexicon: HALOT
  rationale: En ley ritual, טָהוֹר se traduce mejor como «limpia» en español bíblico. Se mantiene el lenguaje de pureza ritual sin reemplazarlo por «pura», que en español puede sonar más moral o metafísico.
theological_decisions:
- issue: Pureza ritual vs. pureza moral
  english_pob_reading: it is clean
  chosen_spanish_reading: es limpia
  alternative_spanish_readings:
  - es pura
  - queda limpia
  rationale: El contexto de Levítico 11 trata de estado ritual, no de pureza ética. «Limpia» preserva la categoría levítica sin diluirla en un sentido moralizante.
  doctrine_reference: Pureza ritual en la ley de santidad y de alimentos; cf. Levítico 11
- issue: Singular hebreo con sufijo plural en מִנִּבְלָתָם
  english_pob_reading: any of their carcass / any of their carcasses
  chosen_spanish_reading: de sus cadáveres
  alternative_spanish_readings:
  - de su cadáver
  - de cualquier cadáver de ellos
  rationale: El hebreo es gramaticalmente singular pero semánticamente colectivo/partitivo. El plural español evita una construcción extraña y conserva la idea de contacto con cadáveres animales múltiples o colectivos.
  doctrine_reference: Lectura gramatical y semántica del sustantivo colectivo/partitivo en hebreo bíblico
