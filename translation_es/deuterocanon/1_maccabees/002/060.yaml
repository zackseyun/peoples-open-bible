translation:
  language: es
  text: Daniel[a], en su sencillez, fue rescatado de la boca de los leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en su simplicidad’ o ‘en su sinceridad’. El término griego puede denotar sinceridad o una disposición no dividida, además de integridad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniel
  lexicon: transliteración estándar
  rationale: Nombre propio bíblico estándar en español, sin necesidad de adaptación.
- source_word: ἁπλότης
  english_pob_choice: simplicity
  chosen_spanish: sencillez
  alternatives_spanish:
  - simplicidad
  - integridad
  - pureza de intención
  - entereza
  lexicon: BDAG
  rationale: En este contexto laudatorio, ἁπλότης puede expresar sencillez, sinceridad o unidad interior. 'Sencillez' conserva la gama semántica de una disposición no dividida sin imponer 'integridad' como única lectura, y suena natural en español bíblico contemporáneo.
- source_word: ἐρύσθη
  english_pob_choice: was rescued
  chosen_spanish: fue rescatado
  alternatives_spanish:
  - fue librado
  - fue salvado
  - fue sacado
  lexicon: BDAG
  rationale: El aoristo pasivo comunica liberación de un peligro concreto. 'Fue rescatado' transmite bien esa acción puntual y evita cargar el verbo con un matiz más teológico de 'salvado'.
- source_word: ἐκ στόματος λεόντων
  english_pob_choice: from the mouth of lions
  chosen_spanish: de la boca de los leones
  alternatives_spanish:
  - de la boca de unos leones
  - de las fauces de los leones
  - de la boca de leones
  lexicon: BDAG
  rationale: La imagen singular 'στόματος' con plural 'λεόντων' se refleja de forma natural en español con 'la boca de los leones', manteniendo el idiomatismo y la vividez del griego.
theological_decisions:
- issue: Sentido de ἁπλότης en la alusión a Daniel
  english_pob_reading: simplicity
  chosen_spanish_reading: sencillez
  alternative_spanish_readings:
  - integridad
  - sinceridad
  - entereza
  rationale: La frase funciona como una referencia ejemplar al carácter de Daniel. 'Sencillez' deja abierta la idea de sinceridad o de una disposición no dividida, sin fijar prematuramente un matiz ético más estrecho que el texto griego no obliga a adoptar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El testimonio de revisión en inglés osciló entre 'integrity' y 'simplicity'; la forma final inglesa volvió a 'simplicity'. La versión española sigue ese cierre, pero elige 'sencillez' para mantener la amplitud semántica señalada en la nota auditada.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando una redacción demasiado explicativa.
  - '''Rescatado'' preserva el carácter concreto de la liberación sin añadir interpretaciones doctrinales ajenas al verso.'
  - La nota al pie se ancla en 'sencillez' para reflejar la alternativa semántica documentada en el audit trail.
