base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/003/018.yaml
  text: When I say to the wicked man[a], ‘You shall surely die,’ and you do not warn him, and you do not speak to warn the wicked man from his wicked way so that he may live, that wicked man shall die in his iniquity[b], but I will require his blood from your hand.
  footnotes:
