translation:
  language: es
  text: Él mismo dirigirá su consejo y su conocimiento[a], y reflexionará sobre sus cosas escondidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cosas secretas» o «sus asuntos ocultos». La frase griega es breve y puede referirse tanto a enseñanzas ocultas como a asuntos escondidos dentro de su propia reflexión.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - él
  - mismo
  lexicon: LSJ
  rationale: El pronombre es enfático en griego; «Él mismo» conserva ese énfasis mejor que un simple «él».
- source_word: κατευθυνεῖ
  english_pob_choice: will direct
  chosen_spanish: dirigirá
  alternatives_spanish:
  - hará recto
  - guiará
  - pondrá en orden
  lexicon: LSJ
  rationale: El verbo puede implicar hacer recto o dirigir un curso; «dirigirá» mantiene la acción directa y suena natural en español.
- source_word: βουλήν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - deliberación
  lexicon: LSJ
  rationale: En contexto sapiencial, βουλή puede ser consejo, plan o propósito. «Consejo» preserva la idea de deliberación sabia y armoniza con ἐπιστήμην.
- source_word: ἐπιστήμην
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría práctica
  - aprendizaje
  lexicon: LSJ
  rationale: En literatura sapiencial, ἐπιστήμη denota conocimiento o entendimiento. «Conocimiento» es la opción más directa y amplia.
- source_word: ἀποκρύφοις
  english_pob_choice: hidden things
  chosen_spanish: cosas ocultas
  alternatives_spanish:
  - cosas secretas
  - asuntos ocultos
  lexicon: LSJ
  rationale: El término se refiere a lo escondido o oculto. «Cosas ocultas» es claro y literal sin cargar un matiz esotérico mayor al del griego.
- source_word: διανοηθήσεται
  english_pob_choice: will reflect on
  chosen_spanish: reflexionará sobre
  alternatives_spanish:
  - pensará en
  - considerará
  - meditará sobre
  lexicon: LSJ
  rationale: El futuro medio sugiere deliberación interior. «Reflexionará sobre» expresa bien esa actividad contemplativa en español idiomático.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su / sus
  alternatives_spanish:
  - de él
  - del mismo
  lexicon: LSJ
  rationale: El genitivo repetido mantiene la referencia masculina singular del griego transmitido. «Su/sus» preserva la cohesión gramatical sin especificar más allá del texto.
theological_decisions:
- issue: Referente del sujeto y de los posesivos repetidos
  english_pob_reading: The verse is rendered with a masculine singular subject throughout, preserving the Greek's grammatical cohesion without specifying beyond the text who the referent is.
  chosen_spanish_reading: La versión mantiene un sujeto singular masculino («Él mismo...») y posesivos coherentes («su... sus...»), sin identificar al referente más allá del texto.
  alternative_spanish_readings:
  - Una redacción más impersonal o genérica.
  - Resolver el referente a partir del contexto amplio.
  rationale: El griego presenta un sujeto masculino singular con αὐτοῦ repetido. La traducción conserva la sintaxis y deja abierta la identificación del referente, respetando la tensión documental del pasaje.
  doctrine_reference: Preservar la tensión teológica/textual en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y hay alto acuerdo entre revisores. Se mantiene la solución de traducir el énfasis de αὐτὸς y la ambigüedad compacta de ἀποκρύφοις / διανοηθήσεται sin resolver el referente fuera del versículo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni κύριος.
  - Se conserva una dicción sapiencial sobria y moderna; «consejo» y «conocimiento» siguen el valor semántico documentado del griego.
  - «Cosas ocultas» mantiene la ambigüedad entre contenidos ocultos y materias internas de reflexión, como en el audit trail inglés.
