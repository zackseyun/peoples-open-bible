translation:
  language: es
  text: Él arroja contra él[a] y no lo perdona; de su mano ciertamente huye[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'arroja sobre él'. El hebreo puede traducirse más literalmente como 'arroja/echa', y la construcción puede describir un ataque violento dirigido contra el hombre.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''huyendo huye'', un infinitivo absoluto con verbo finito que expresa énfasis: ''ciertamente huye'' o ''huye apresuradamente''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַשְׁלֵךְ
  english_pob_choice: He hurls at him
  chosen_spanish: Él lo arroja sobre él
  alternatives_spanish:
  - Él lo lanza sobre él
  - Él lo echa contra él
  - Él lo arroja contra él
  lexicon: HALOT
  rationale: El hifil de שלך expresa 'tirar/arrojar/castar'. En este contexto de violencia y juicio, el castellano necesita mantener la acción agresiva dirigida al objeto; 'arroja sobre él' conserva la fuerza y refleja bien el movimiento hostil sin introducir un matiz reflexivo que el hebreo no tiene.
- source_word: עָלָיו
  english_pob_choice: at him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  - a él
  lexicon: HALOT
  rationale: עַל con movimiento hostil puede significar 'sobre' o 'contra'. 'Sobre él' preserva la imagen concreta del ataque y resulta natural en español; 'contra él' es una alternativa interpretativa válida, pero menos pegada a la imagen de arrojar.
- source_word: וְלֹא יַחְמֹל
  english_pob_choice: and does not spare
  chosen_spanish: y no lo perdona
  alternatives_spanish:
  - y no tiene piedad
  - y no muestra compasión
  - y no lo escatima
  lexicon: HALOT
  rationale: חמל significa 'perdonar/ahorrar, tener compasión'. En un contexto de castigo, 'no lo perdona' comunica bien la falta de clemencia y es idiomático en español; 'no tiene piedad' y 'no muestra compasión' preservan el sentido, pero suenan un poco más explicativos.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su control
  - de su agarre
  lexicon: HALOT
  rationale: 'יַד literalmente es ''mano'' y también puede extenderse a ''poder'' o ''control''. Aquí conviene mantener la imagen corporal: ''de su mano'' preserva el hebraísm​o y deja que el lector perciba la relación de dominio sin sobreinterpretarla.'
- source_word: בָּרוֹחַ יִבְרָח
  english_pob_choice: he surely flees
  chosen_spanish: ciertamente huye
  alternatives_spanish:
  - huye sin duda
  - huye con toda certeza
  - huye presuroso
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito de ברח intensifica la acción. 'Ciertamente huye' transmite la certeza/intensidad de forma natural en español; alternativas como 'huye presuroso' añaden un matiz de rapidez que el hebreo no exige de manera primaria.
theological_decisions:
- issue: Intensificación verbal del infinitivo absoluto
  english_pob_reading: he surely flees
  chosen_spanish_reading: ciertamente huye
  alternative_spanish_readings:
  - huye sin duda
  - huye con toda certeza
  rationale: No hay una cuestión doctrinal aquí, sino una decisión de énfasis. El hebreo usa el infinitivo absoluto con el verbo finito para intensificar la certeza de la huida; 'ciertamente' conserva ese valor enfático sin forzar el español.
  doctrine_reference: No aplica; decisión de aspecto/énfasis verbal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que eliminó el matiz reflexivo ('himself') y dejó la acción como un verbo de arrojar/castar dirigido al objeto. La traducción española evita cualquier forma reflexiva y conserva el énfasis del infinitivo absoluto en la segunda cola.
  spanish_consistency_notes:
  - Se mantuvo 'mano' en sentido literal para conservar la imagen hebrea de dominio/poder.
  - Se evitó 'Cristo', 'SEÑOR' o terminología litúrgica ajena al verso; no hay nombres divinos ni títulos mesiánicos en este pasaje.
  - La puntuación reproduce una cesura natural en español con punto y coma entre los dos miembros del versículo.
