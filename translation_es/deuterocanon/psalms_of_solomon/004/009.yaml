review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva en general la estructura y el sentido judicial del griego: optativo exhortativo («Y que...»), «vindiquen el juicio», temporal «cuando...», y la descripción final del pecador caracterizado por habla engañosa orientada a agradar a otros. Sin embargo, hay dos desajustes importantes con el rastro auditado: (1) la nota [c] no refleja la alternativa inglesa preservada («from the presence of the righteous one»), sino una formulación española torpe y redundante («delante de la presencia»); y (2) «solo para agradar a los hombres» desplaza el valor documentado de μόνον, que según la revisión/adjudicación debe quedar asociado a «con engaño» más que al infinitivo de finalidad.'
  spanish_quality_summary: El español es mayormente legible y digno, pero «retirados» suena algo mecánico; «quitados» o «apartados» sería más bíblico-natural. La frase final necesita una leve reordenación para expresar mejor «solo con engaño» en vez de «solo para agradar». También conviene pulir la nota [c] para que sea español natural y útil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «juicio», «pecadores» y «justo» están bien. «Devotos» es defendible, con nota alternativa «piadosos». No hay términos teológicos especiales que exijan cambio.
  issues:
  - severity: medium
    issue: La ubicación semántica de «solo» en la cláusula final no sigue la decisión auditada más reciente.
    rationale: El expediente indica que μόνον modifica mejor la expresión de engaño («only with deceit»), no el propósito «to please men». «habla solo para agradar a los hombres, con engaño» sugiere exclusividad del propósito, no del modo engañoso.
  - severity: low
    issue: La nota [c] ofrece una alternativa española poco natural y no corresponde bien a la nota inglesa.
    rationale: «delante de la presencia del justo» es redundante en español. La alternativa relevante sería «de la presencia del justo» o similar.
  - severity: low
    issue: «sean retirados» es comprensible pero algo rígido.
    rationale: En registro bíblico español, «sean quitados» o «sean apartados» suena más natural para ἐξαίρεσθαι sin perder el sentido.
  revised_spanish_text: Y que los devotos[a] vindiquen el juicio de su Dios, cuando los pecadores[b] sean quitados de delante del justo[c], uno que habla para agradar a los hombres, solo con engaño.
  revised_footnotes:
  - marker: a
    text: O «piadosos».
    reason: lexical_alternative
  - marker: b
    text: O «impíos».
    reason: lexical_alternative
  - marker: c
    text: O «de la presencia del justo».
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero necesaria: reubica «solo» para alinearlo con la decisión auditada sobre μόνον («solo con engaño»), mejora la naturalidad de ἐξαίρεσθαι con «sean quitados», y corrige la nota alternativa de ἀπὸ προσώπου δικαίου a un español fiel y no redundante.'
