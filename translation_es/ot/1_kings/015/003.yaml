translation:
  language: es
  text: Anduvo en todos los pecados de su padre, cometidos delante de él[a], y su corazón no estuvo enteramente dedicado[b] a Yahvé[c] su Dios, como el corazón de David su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «delante de él» puede significar tanto «en su presencia» como «antes de su tiempo»; la expresión también puede sugerir que los pecados del padre quedaron ante el hijo como ejemplo que siguió.
    reason: lexical_alternative
  - marker: b
    text: 'O: «plenamente leal».'
    reason: alternative_reading
  - marker: c
    text: Hebreo יהוה, tradicionalmente «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Caminó
  - Se condujo
  - Vivió
  lexicon: HALOT
  rationale: הלך con complemento moral expresa conducta. «Anduvo» conserva la imagen hebrea de manera natural en español y comunica el sentido ético mejor que «fue» o «vivió».
- source_word: בְּכָל חַטֹּאות
  english_pob_choice: in all the sins
  chosen_spanish: en todos los pecados
  alternatives_spanish:
  - según todos los pecados
  - en todos los caminos pecaminosos
  lexicon: HALOT
  rationale: La construcción idiomática se mantiene de forma bastante literal. «Pecados» refleja היטב חַטֹּאות sin añadir una paráfrasis interpretativa como «caminos pecaminosos».
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  - su progenitor
  lexicon: HALOT
  rationale: Referencia directa y normal al antecesor inmediato; «su padre» es la forma natural y fiel en español.
- source_word: אֲשֶׁר עָשָׂה לְפָנָיו
  english_pob_choice: that he had committed before him
  chosen_spanish: que había cometido delante de él
  alternatives_spanish:
  - que había cometido en su presencia
  - que había cometido antes de él
  lexicon: HALOT
  rationale: Se conserva la ambigüedad de לְפָנָיו entre presencia espacial y anterioridad temporal. «Delante de él» mantiene esa apertura y sugiere también el valor de ejemplo visible que el hijo siguió.
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לבב denota la sede interior de voluntad y lealtad. «Corazón» es el equivalente español estándar y suficientemente amplio.
- source_word: שָׁלֵם
  english_pob_choice: wholly devoted
  chosen_spanish: enteramente dedicado
  alternatives_spanish:
  - completo
  - íntegro
  - plenamente leal
  - perfecto
  lexicon: HALOT
  rationale: En contexto de pacto, con «corazón», שָׁלֵם expresa lealtad indivisa más que perfección sin pecado. «Enteramente dedicado» transmite esa fidelidad total sin resolver la tensión teológica hacia impecabilidad.
- source_word: עִם יְהוָה אֱלֹהָיו
  english_pob_choice: to the LORD his God
  chosen_spanish: a Yahvé su Dios
  alternatives_spanish:
  - con Yahvé su Dios
  - para Yahvé su Dios
  lexicon: HALOT
  rationale: Aunque עִם literalmente es «con», en español «dedicado a» pide la preposición «a». Se mantiene el nombre divino «Yahvé» según la convención del proyecto, y «su Dios» reproduce la referencia relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'El Tetragrámaton se vierte por el nombre divino en español del proyecto: «Yahvé», no por una sustitución como «el SEÑOR».'
- source_word: כִּלְבַב דָּוִד אָבִיו
  english_pob_choice: like the heart of David his father
  chosen_spanish: como el corazón de David su padre
  alternatives_spanish:
  - como era el corazón de David su padre
  - igual que el corazón de David, su padre
  lexicon: HALOT
  rationale: La comparación es del corazón con el corazón, no solo de la persona. «Corazón» conserva el foco hebreo en la lealtad interior.
theological_decisions:
- issue: Sentido de שָׁלֵם con el corazón del rey
  english_pob_reading: His inner loyalty was not undivided/wholehearted toward the LORD, not a claim of absolute sinlessness.
  chosen_spanish_reading: Su lealtad interior no fue indivisa ni plenamente entregada a Yahvé, sin convertir la frase en una afirmación de perfección moral absoluta.
  alternative_spanish_readings:
  - su corazón no fue perfecto con Yahvé
  - no fue íntegro delante de Yahvé
  rationale: La valoración del texto es covenantal y compara fidelidad de corazón con la de David. «Enteramente dedicado» preserva esa evaluación relacional sin borrar la tensión entre fidelidad parcial y perfección sin pecado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic.'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la política del proyecto para el Tetragrámaton en español. «Yahvé» preserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el audit trail; la versión inglesa más reciente indica que no hubo cambios necesarios y el consenso de revisión fue alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino principal, en línea con la política del proyecto.
  - «Corazón» se mantiene para לבב, conservando el sentido de voluntad/lealtad interior.
  - «Enteramente dedicado» evita resolver שָׁלֵם hacia «perfecto», preservando la tensión teológica documentada.
  - La nota sobre לְפָנָיו se ancla en la palabra «cometido» para no sobrecargar el texto principal con una glosa intrusiva.
