translation:
  language: es
  text: Ningún hombre entre ustedes se acercará a ningún pariente cercano de su carne para descubrir la desnudez[a]; yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En este capítulo, «descubrir la desnudez» es un modismo legal hebreo que se refiere a la exposición sexual prohibida o a relaciones sexuales con un pariente cercano.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  english_pob_choice: No man among you
  chosen_spanish: Ningún hombre entre ustedes
  alternatives_spanish:
  - Cada hombre
  - Todo hombre
  - Ningún varón entre ustedes
  lexicon: HALOT
  rationale: La duplicación del sustantivo singular funciona como un distributivo legal. En español, «ningún hombre entre ustedes» comunica bien la prohibición para cada individuo del grupo sin volverla artificial. «Entre ustedes» refleja el marco comunitario implícito en la forma distributiva.
- source_word: אֶל
  english_pob_choice: approach
  chosen_spanish: se acercará a
  alternatives_spanish:
  - se acercará
  - irá hacia
  - vendrá a
  lexicon: HALOT
  rationale: Con קָרַב, la preposición forma el giro idiomático «acercarse a». «Se acercará a» conserva el tono legal y evita una traducción mecánica de la preposición aislada.
- source_word: שְׁאֵר בְּשָׂרוֹ
  english_pob_choice: close relative of his flesh
  chosen_spanish: parientes cercanos de su carne
  alternatives_spanish:
  - pariente cercano de su carne
  - sus parientes de sangre
  - su parentela cercana
  lexicon: HALOT
  rationale: La expresión señala parentesco corporal/familiar. En español, «parientes cercanos de su carne» mantiene la imagen semítica de la carne y el vínculo de cercanía. Se pluraliza «parientes» para naturalidad sintáctica en una cláusula general distributiva, sin perder el sentido de parentesco próximo.
- source_word: תִקְרְבוּ
  english_pob_choice: shall approach
  chosen_spanish: se acercará
  alternatives_spanish:
  - se acercarán
  - deben acercarse
  - no deberán acercarse
  lexicon: HALOT
  rationale: El hebreo usa 2mp bajo negación en contexto legal. En español, la forma negativa ya queda marcada por «ningún hombre», por lo que el verbo en singular concuerda con el distributivo inicial. «Se acercará» conserva el valor prohibitivo en registro legal.
- source_word: לְגַלּוֹת עֶרְוָה
  english_pob_choice: to uncover nakedness
  chosen_spanish: para descubrir desnudez[a]
  alternatives_spanish:
  - para desnudar
  - para descubrir la desnudez
  - para tener relaciones sexuales con
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático «descubrir desnudez» para no borrar la fórmula técnica de Levítico. «Descubrir» es un equivalente natural de גלה, y «desnudez» conserva עֶרְוָה sin sustituirlo por una paráfrasis explicativa en el texto principal. La nota aclara su sentido sexual legal.
- source_word: עֶרְוָה
  english_pob_choice: nakedness
  chosen_spanish: desnudez
  alternatives_spanish:
  - nakedness
  - vergüenza
  - genitalidad
  lexicon: HALOT
  rationale: En este contexto jurídico, עֶרְוָה se refiere a desnudez con implicación sexual/prohibida. «Desnudez» es el término más directo y transparente en español. Se evita «genitalidad» por ser más interpretativo y menos fiel a la fórmula bíblica.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: yo soy Yahvé
  alternatives_spanish:
  - yo soy el Yahvé
  - yo soy el SEÑOR
  - yo soy Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal. La autoidentificación divina se conserva en primera persona con la misma fuerza enfática del hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  - Yahweh
  rationale: El versículo cierra con la fórmula de autoridad del nombre pactal. Conforme a la norma del proyecto en español, se usa «Yahvé» en lugar de una máscara litúrgica como «SEÑOR», preservando el nombre divino revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Mantener el idioma legal de «descubrir desnudez»
  english_pob_reading: retain the idiom 'to uncover nakedness' in the main text
  chosen_spanish_reading: mantener «descubrir desnudez» en el texto principal
  alternative_spanish_readings:
  - tener relaciones sexuales con
  - exponer la desnudez sexual de
  - desnudar
  rationale: En Levítico 18 la fórmula reaparece como tecnicismo legal. Traducirla por una paráfrasis más explícita borraría la repetición y la tensión idiomática del capítulo. La nota permite al lector captar el sentido sin sustituir la expresión bíblica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source text''s plain sense without unnecessary paraphrase'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión marcada como sin cambios; no se aplicaron revisiones adicionales. Se mantuvo la equivalencia óptima del audit trail inglés: conservar la fórmula legal idiomática y el nombre divino según la política española del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con los lineamientos del proyecto.
  - Se conserva la imagen semítica de «desnudez» y se explica su valor idiomático en nota, sin reemplazarla por una paráfrasis en el cuerpo del texto.
  - El registro es legal y solemne, apto para lectura pública, con sintaxis natural en español.
