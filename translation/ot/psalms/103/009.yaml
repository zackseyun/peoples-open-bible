id: PSA.103.9
reference: Psalms 103:9
source:
  edition: WLC
  text: לֹֽא לָ/נֶ֥צַח יָרִ֑יב וְ/לֹ֖א לְ/עוֹלָ֣ם יִטּֽוֹר־׃
translation:
  text: He will not contend forever[b][a], nor will he keep his anger for all time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not always accuse/strive.' The verb can carry the sense of contending or bringing a case.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor will he keep [his anger],' that is, 'bear a grudge' or 'retain wrath.' The Hebrew verb literally means 'keep/guard/watch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָנֶצַח
  chosen: forever
  alternatives:
  - continually
  - perpetually
  lexicon: HALOT
  rationale: נֶצַח with לְ commonly denotes enduring duration. 'Forever' is natural modern English and fits the poetic parallel with לְעוֹלָם.
- source_word: יָרִיב
  chosen: contend
  alternatives:
  - strive
  - accuse
  - bring a case
  lexicon: HALOT
  rationale: From ריב, often used for contending, disputing, or bringing a case. 'Contend' preserves the judicial-relational nuance without over-specifying a courtroom setting.
- source_word: לְעוֹלָם
  chosen: for all time
  alternatives:
  - forever
  - for ever
  lexicon: HALOT
  rationale: עוֹלָם denotes indefinite or perpetual duration. Rendered 'for all time' here to avoid awkward repetition of 'forever' in both cola while preserving the parallel sense.
- source_word: יִטּוֹר
  chosen: keep watch
  alternatives:
  - keep anger
  - bear a grudge
  - retain
  - guard
  lexicon: HALOT
  rationale: From נטר, literally 'keep/guard/watch,' but in contexts of divine anger often idiomatically 'keep' wrath or 'bear a grudge.' 'Keep watch' preserves the lexical core more transparently, while the idiomatic alternative is preserved in a footnote.
