revisions:
- from: 'Entonces dijo[a]: «Por tanto, oye la palabra de Yahvé: Vi a Yahvé sentado en su trono, y todo el ejército de los cielos estaba de pie junto a él[b], a su derecha y a su izquierda».'
  to: 'Entonces dijo: «Por tanto, oye la palabra de Yahvé: Vi a Yahvé sentado en su trono, y toda la hueste del cielo estaba de pie junto a él[a], a su derecha y a su izquierda».'
