    rationale: El término hebreo denota viudez/bereavement con imagen conyugal. «Huérfanos» introduce una metáfora distinta y no preserva el razonamiento lexical documentado por el POB.
  - severity: medium
    issue: La nota [b] es inadecuada
    rationale: Dice «Literalmente, “Yahvé de los Ejércitos”» cuando eso mismo ya está en el texto. La nota debe ofrecer la alternativa tradicional, no repetir el texto principal ni explicar el inglés.
