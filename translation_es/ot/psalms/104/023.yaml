translation:
  language: es
  text: El hombre sale[a] a su trabajo y a su labor hasta el atardecer[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad sale a su trabajo». El hebreo אָדָם es un singular genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «hasta la tarde».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵצֵ֣א
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale hacia
  - se va
  - sale fuera
  lexicon: HALOT
  rationale: El verbo יצא expresa salida/movimiento hacia afuera. «Sale» es natural en español y conserva la idea de movimiento cotidiano sin añadir matices no presentes en el hebreo.
- source_word: אָדָם
  english_pob_choice: Man
  chosen_spanish: El hombre
  alternatives_spanish:
  - La humanidad
  - La gente
  - Un hombre
  lexicon: HALOT
  rationale: אָדָם funciona aquí como singular genérico representativo de la humanidad. En español, «El hombre» conserva ese valor genérico y mantiene la forma masculina singular del original, sin despersonalizarlo a «la humanidad».
- source_word: לְפָעֳלוֹ
  english_pob_choice: to his work
  chosen_spanish: a su trabajo
  alternatives_spanish:
  - para su trabajo
  - a su obra
  - a su quehacer
  lexicon: HALOT
  rationale: 'פֹּעַל refiere a trabajo/de hecho/actividad. Con לְ después de יצא, el sentido es destino o propósito: salir a trabajar. «A su trabajo» es claro, idiomático y suficientemente amplio.'
- source_word: וְלַעֲבֹדָתוֹ
  english_pob_choice: and to his labor
  chosen_spanish: y a su labor
  alternatives_spanish:
  - y a su servicio
  - y a su trabajo
  - y a su tarea
  lexicon: HALOT
  rationale: עֲבֹדָה puede significar trabajo, servicio o labor. Aquí conviene distinguirlo de פֹּעַל sin borrar su solapamiento semántico; «labor» mantiene el tono de esfuerzo cotidiano y evita una repetición exacta innecesaria.
- source_word: עֲדֵי עָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta el anochecer
  alternatives_spanish:
  - hasta la tarde
  - hasta la noche
  - hasta el atardecer
  lexicon: HALOT
  rationale: עֲדֵי marca límite temporal y עָרֶב significa tarde/evening. «Hasta el anochecer» comunica bien el cierre del día laboral en español contemporáneo y conserva el valor temporal del hebreo.
theological_decisions:
- issue: אָדָם como singular genérico en contraste con los animales previos
  english_pob_reading: Man
  chosen_spanish_reading: El hombre
  alternative_spanish_readings:
  - La humanidad
  - La gente
  rationale: El verso describe el patrón ordinario humano dentro del orden creado. Mantener «El hombre» preserva la forma masculina singular representativa del hebreo y su fuerza genérica, sin sustituirla por un abstracto más interpretativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: La versión inglesa más reciente reintroduce el segundo «to his» para reflejar ambos sintagmas preposicionales; en español se conserva la duplicación estructural con «a su trabajo y a su labor», manteniendo paralelismo y fluidez. La revisión anterior que compactaba «work and labor» se consideró menos fiel al doble movimiento del hebreo.
  spanish_consistency_notes:
  - Se usó «El hombre» para conservar el genérico representativo de אָדָם, en línea con el criterio POB de no borrar la forma masculina cuando funciona genéricamente.
  - Se eligió «labor» para עֲבֹדָה para diferenciarlo de פֹּעַל sin perder el campo semántico de trabajo/esfuerzo.
  - «Hasta el anochecer» traduce el cierre temporal sin forzar un equivalente litúrgico o arcaizante.
