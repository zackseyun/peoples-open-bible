revisions:
- from: 'Maldito el que se acueste con su suegra[a]. Y todo el pueblo dirá: «Amén».'
  to: 'Maldito sea el hombre que se acueste con su suegra[a]. Y todo el pueblo dirá: «Amén».'
  rationale: Se ajusta la fórmula para reflejar más claramente el masculino singular del hebreo y de la decisión auditada en inglés, y para dar a la maldición un tono legal-litúrgico más natural en español. Se conserva el eufemismo sexual transparente y la nota léxica correspondiente.
