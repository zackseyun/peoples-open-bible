translation:
  language: es
  text: Entonces se puso de pie delante del altar de Yahvé, frente a toda la asamblea de Israel, y extendió sus manos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la asamblea de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «extendió sus palmas»; esta expresión alude al gesto de extender las manos en oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: Then he stood
  chosen_spanish: Entonces él se puso de pie
  alternatives_spanish:
  - Entonces estuvo de pie
  - Y él se puso de pie
  - Entonces se puso de pie
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Entonces él se puso de pie» comunica el movimiento narrativo con naturalidad y conserva el sentido básico de estar de pie.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: La relación espacial con el altar se expresa bien con «delante de», que es claro en español y mantiene la referencia frontal del hebreo.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahweh
  - el altar de Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para יְהוָה como «Yahvé». La construcción en español refleja de modo directo el genitivo: «el altar de Yahvé».'
- source_word: נֶגֶד
  english_pob_choice: in front of
  chosen_spanish: frente a
  alternatives_spanish:
  - delante de
  - en frente de
  - ante
  lexicon: HALOT
  rationale: Se conserva la matización espacial distinta de לִפְנֵי. «Frente a» suena natural en español y transmite la posición visible ante la asamblea.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el pueblo de Israel
  - toda la comunidad de Israel
  lexicon: HALOT
  rationale: קהל designa al cuerpo reunido; «asamblea» preserva mejor el sentido corporativo que «congregación» en este contexto narrativo.
- source_word: וַיִּפְרֹשׂ
  english_pob_choice: and spread out
  chosen_spanish: y extendió
  alternatives_spanish:
  - y alargó
  - y desplegó
  - y abrió
  lexicon: HALOT
  rationale: El gesto de פרש con las manos se expresa naturalmente como «extendió». En español, esta forma comunica el acto de oración sin sonar forzada.
- source_word: כַּפָּיו
  english_pob_choice: his hands
  chosen_spanish: las manos
  alternatives_spanish:
  - las palmas
  - sus palmas
  - sus manos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus palmas», el giro idiomático en español queda más natural como «las manos». Se mantiene el sentido del gesto sin literalidad innecesaria.
theological_decisions:
- issue: Renderización de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no ocultarlo con un sustituto titular. Esto preserva el nombre propio del pacto y mantiene la transparencia del texto fuente.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y el rastro auditado en inglés. No se detectan revisiones posteriores que cambien el sentido: se mantiene la distinción espacial entre לִפְנֵי y נֶגֶד, y el gesto idiomático de las «palmas/manos» se conserva con una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Asamblea» se emplea para קהל por coherencia con el valor corporativo del sustantivo.
  - «Extendió las manos» se entiende como gesto de oración, no como descripción física aislada.
