translation:
  language: es
  text: Así que David habitó en la fortaleza y la llamó Ciudad de David[a]. Y David edificó alrededor, desde el Milo hacia el interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «desde el Milo y hacia adentro», o «desde el Milo hacia la parte interior». «El Milo» probablemente se refiere a una estructura conocida o a un terraplén escalonado en Jerusalén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - residió
  lexicon: HALOT
  rationale: יׁשב puede significar habitar, vivir o asentarse. En español, 'habitó' comunica residencia estable en un registro digno y bíblico sin sonar tan moderno como 'vivió' ni tan técnico como 'residió'.
- source_word: בַּמְּצֻדָה
  english_pob_choice: in the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en la ciudadela
  - en el baluarte
  lexicon: HALOT
  rationale: מְצֻדָה designa un lugar fortificado. 'Fortaleza' conserva la idea defensiva con una palabra natural en español. 'Ciudadela' sería posible, pero puede sugerir una parte interna de una ciudad más que el sentido general de lugar fortificado.
- source_word: וַיִּקְרָא לָהּ
  english_pob_choice: called it
  chosen_spanish: la llamó
  alternatives_spanish:
  - la nombró
  - le dio por nombre
  lexicon: HALOT
  rationale: קרא + ל expresa nombrar o designar. 'La llamó' es directo y fiel al uso narrativo; evita sobreformalizar con 'nombró'.
- source_word: עִיר דָּוִד
  english_pob_choice: the City of David
  chosen_spanish: Ciudad de David
  alternatives_spanish:
  - la ciudad de David
  - la ciudad llamada de David
  lexicon: HALOT
  rationale: Es una designación estable de lugar. Se conserva como nombre propio en español bíblico claro, con mayúsculas según uso editorial.
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó alrededor
  lexicon: HALOT
  rationale: בנה significa construir/edificar. 'Edificó' mantiene un registro bíblico sobrio y adecuado para una acción de expansión urbana.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: סביב indica circundación. 'Alrededor' es la forma más natural en español y preserva la idea distributiva.
- source_word: מִן הַמִּלּוֹא
  english_pob_choice: from the Millo
  chosen_spanish: desde el Milo
  alternatives_spanish:
  - desde el Millo
  - desde la explanación
  - desde el terraplén
  lexicon: HALOT
  rationale: Millo/Millo es un término topográfico o técnico de Jerusalén cuyo referent exacto es debatido. Se conserva como transliteración tradicional 'Milo' para no resolver indebidamente la incertidumbre del término.
- source_word: וָבָיְתָה
  english_pob_choice: inward
  chosen_spanish: hacia el interior
  alternatives_spanish:
  - hacia adentro
  - al interior
  - y hacia la casa
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia el interior. 'Hacia el interior' es claro en español y evita la ambigüedad de traducir literalmente 'hacia la casa'.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden en alto grado; no se registran revisiones aplicadas y no fue necesario alterar la lectura base. La versión española conserva la misma ambigüedad topográfica de מִלּוֹא y la misma relación espacial de la cláusula final.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Ciudad de David' como designación fija del lugar.
  - Se evita una traducción mecánica de 'dwelt' por una forma arcaica, optando por un verbo natural en español con registro bíblico.
