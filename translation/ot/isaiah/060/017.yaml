id: ISA.60.17
reference: Isaiah 60:17
source:
  edition: WLC
  text: תַּ֣חַת הַ/נְּחֹ֜שֶׁת אָבִ֣יא זָהָ֗ב וְ/תַ֤חַת הַ/בַּרְזֶל֙ אָ֣בִיא כֶ֔סֶף וְ/תַ֤חַת הָֽ/עֵצִים֙ נְחֹ֔שֶׁת וְ/תַ֥חַת הָ/אֲבָנִ֖ים בַּרְזֶ֑ל וְ/שַׂמְתִּ֤י פְקֻדָּתֵ/ךְ֙ שָׁל֔וֹם וְ/נֹגְשַׂ֖יִ/ךְ צְדָקָֽה׃
translation:
  text: Instead of bronze I will bring gold[a], and instead of iron I will bring silver; instead of wood, bronze, and instead of stones, iron. And I will make peace your overseers[c][b], and righteousness your taskmasters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your administration' / 'your officers' for 'your overseers.' The Hebrew term can refer to oversight, office, or officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.' The Hebrew צְדָקָה can denote either moral righteousness or justice in public order.
    reason: lexical_alternative
  - marker: c
    text: Or 'your rulers' / 'your oppressors' for 'your taskmasters.' The Hebrew term often refers to those who exact labor or tribute.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: instead of
  alternatives:
  - in place of
  - under
  lexicon: HALOT
  rationale: In this context of exchange/replacement of building materials, the preposition clearly signals substitution rather than spatial position ('under'). 'Instead of' is the most natural English equivalent.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: The Hebrew term can denote copper/bronze broadly. 'Bronze' is the standard contextual rendering in lists of construction materials and avoids the anachronistic specificity of 'brass'.
- source_word: אָבִיא
  chosen: I will bring
  alternatives:
  - I will bring in
  - I will cause to come
  lexicon: HALOT
  rationale: Hiphil of בוא here expresses Yahweh's action of supplying superior materials. 'I will bring' is both accurate and idiomatic.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Straightforward material term in the sequence of upgraded materials.
- source_word: כֶסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: In a materials list parallel to gold/bronze/iron, the metallic sense 'silver' is required, not 'money'.
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - timber
  lexicon: HALOT
  rationale: Plural noun referring generically to wooden building material. 'Wood' is natural collective English.
- source_word: אֲבָנִים
  chosen: stones
  alternatives:
  - rocks
  lexicon: HALOT
  rationale: In construction context, 'stones' is the appropriate rendering.
- source_word: שַׂמְתִּי
  chosen: I will make
  alternatives:
  - I will appoint
  - I will set
  lexicon: HALOT
  rationale: The verb can mean set/appoint/make. Here it introduces a transformation in civic administration. 'I will make' is idiomatic and preserves the predicative force with the following nouns.
- source_word: פְקֻדָּתֵךְ
  chosen: your overseers
  alternatives:
  - your administration
  - your officers
  - your governance
  lexicon: HALOT
  rationale: The noun from פקד can denote oversight, office, or those exercising supervision. Because it is paired with a plural participial noun in the next clause ('your taskmasters'), rendering it as a personal plural role term keeps the parallelism vivid in English. 'Overseers' captures supervisory authority without importing later ecclesiastical office language into the text itself.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: The term includes wholeness and welfare, but 'peace' is the central and most recognizable rendering here, especially in a vision of restored civic order.
- source_word: נֹגְשַׂיִךְ
  chosen: your taskmasters
  alternatives:
  - your rulers
  - your oppressors
  - those who exact from you
  lexicon: HALOT
  rationale: From נגשׂ, the term often denotes one who drives, exacts, or imposes labor/tribute. In this restoration oracle, the point is that even formerly harsh or coercive authority structures are transformed. 'Taskmasters' preserves the concrete force and the parallel with 'overseers,' while allowing the irony of righteousness replacing oppression to remain visible.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun can denote righteousness or justice. Here it describes the character of those exercising authority. 'Righteousness' fits the moral quality in parallel with 'peace,' while 'justice' remains a strong contextual alternative worth preserving in a footnote.
