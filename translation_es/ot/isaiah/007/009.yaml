review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: preserva el paralelismo con «cabeza», mantiene «Efraín», «Samaria» y «el hijo de Remalías», y entiende correctamente אִם לֹא como condición. También intenta conservar el juego de palabras de אמן entre «creer» y «ser establecido». Sin embargo, el anclaje de la nota [a] está mal ubicado: la nota sobre el juego verbal corresponde a los verbos finales, no a «Samaria».'
  spanish_quality_summary: El texto es generalmente claro y fiel, pero «de cierto no serán establecidos» suena demasiado calcado y poco natural en español actual. Una formulación como «ciertamente no quedarán firmes» comunica mejor la fuerza apodótica de כִּי y el sentido de estabilidad del niphal. Además, conviene evitar que la nota léxica quede unida a un topónimo irrelevante.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Efraín», «Samaria» y «el hijo de Remalías» están bien. Para אמן, «creen» + «quedarán firmes» preserva mejor en español la distinción semántica y la relación conceptual que «serán establecidos», a la vez que mejora la naturalidad. La alternativa con «confían / se mantendrán firmes» sigue siendo útil en nota.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Samaria» pero explica el juego de palabras de los verbos finales.
    rationale: Según el rastro inglés, la nota sobre אמן debe señalar la relación entre «creen» y «quedarán firmes/serán establecidos», no el nombre propio «Samaria».
  - severity: medium
    issue: «De cierto no serán establecidos» suena rígido y poco idiomático.
    rationale: Aunque es semánticamente cercano, en español bíblico moderno resulta mejor «ciertamente no quedarán firmes», que refleja mejor la fuerza de la advertencia y la idea de estabilidad/firmeza del hebreo.
  - severity: low
    issue: La nota b puede armonizarse mejor con el texto principal revisado.
    rationale: Si el texto principal usa una formulación más natural con «quedarán firmes», la nota alternativa puede mantener «confían / se mantendrán firmes» como contraste léxico claro.
  revised_spanish_text: Y la cabeza de Efraín es Samaria, y la cabeza de Samaria es el hijo de Remalías. Si ustedes no creen[a], ciertamente no quedarán firmes[b].
