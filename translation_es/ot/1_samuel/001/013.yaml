translation:
  language: es
  text: Ana, por su parte, estaba hablando en su corazón; sólo sus labios se movían[a], pero su voz no se oía. Entonces Elí pensó que estaba ebria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablando consigo misma» / «orando en silencio en su interior». El hebreo dice literalmente «hablando en su corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַנָּה הִיא
  english_pob_choice: Now Hannah
  chosen_spanish: Y Ana
  alternatives_spanish:
  - Ahora Ana
  - Entonces Ana
  - Ana
  lexicon: HALOT
  rationale: El hebreo usa la partícula de enlace con el pronombre enfático para marcar el cambio de escena o foco. En español, un simple «Y Ana» conserva la conexión narrativa sin forzar una adición interpretativa; «Ahora Ana» sería más explícito pero menos natural en este contexto.
- source_word: מְדַבֶּרֶת עַל לִבָּהּ
  english_pob_choice: was speaking in her heart
  chosen_spanish: estaba hablando en su corazón
  alternatives_spanish:
  - estaba hablando consigo misma
  - estaba orando en silencio dentro de sí
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice que hablaba «sobre/en su corazón». Mantengo «en su corazón» para conservar la imagen idiomática y el valor interno/no audible del habla, como en el análisis inglés de la POB.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: sólo
  alternatives_spanish:
  - solamente
  - meramente
  lexicon: HALOT
  rationale: Aquí רַק limita la observación visible a un solo indicio exterior. «Sólo» comunica esa restricción con naturalidad en español.
- source_word: שְׂפָתֶיהָ נָּעוֹת
  english_pob_choice: her lips were moving
  chosen_spanish: sus labios se movían
  alternatives_spanish:
  - sus labios temblaban
  - sus labios se movían ligeramente
  lexicon: HALOT
  rationale: נָּעוֹת indica movimiento visible. «Se movían» reproduce bien el contraste con la voz inaudible sin introducir una connotación de temblor que el hebreo no exige.
- source_word: וְקוֹלָהּ לֹא יִשָּׁמֵעַ
  english_pob_choice: but her voice was not heard
  chosen_spanish: pero su voz no se oía
  alternatives_spanish:
  - y su voz no era oída
  - y no se escuchaba su voz
  lexicon: HALOT
  rationale: El imperfecto pasivo de שׁמע indica inaudibilidad. «No se oía» es natural y conserva el contraste con los labios que se movían; uso «pero» para expresar la oposición implícita en el inglés de la POB, aunque el hebreo coordina con «y».
- source_word: וַיַּחְשְׁבֶהָ
  english_pob_choice: thought she was
  chosen_spanish: pensó que estaba
  alternatives_spanish:
  - la consideró
  - la juzgó
  lexicon: HALOT
  rationale: חשב con complemento predicativo expresa considerar/reputar a alguien como algo. «Pensó que estaba» es claro y mantiene la referencia a su estado aparente.
- source_word: לְשִׁכֹּרָה
  english_pob_choice: drunk
  chosen_spanish: ebria
  alternatives_spanish:
  - borracha
  - intoxicada
  lexicon: HALOT
  rationale: El adjetivo describe estado de embriaguez. «Ebria» es formal, sobrio y apto para registro bíblico en español; evita la coloquialidad de «borracha».
theological_decisions:
- issue: Oración interior sin audibilidad externa
  english_pob_reading: The Hebrew literally says 'was speaking in her heart.'
  chosen_spanish_reading: «estaba hablando en su corazón» mantiene la literalidad idiomática y la idea de habla interior no audible.
  alternative_spanish_readings:
  - estaba hablando consigo misma
  - estaba orando en silencio dentro de sí
  rationale: No suavizo el hebraísmo hacia una explicación devocional. La frase conserva la tensión entre habla real e interioridad, tal como la POB en inglés deja abierta la posibilidad de auto-habla o oración silenciosa.
  doctrine_reference: 1 Samuel 1:13; nota lexical sobre el hebreo idiomático
- issue: Contraste entre labios moviéndose y voz no oída
  english_pob_reading: only her lips were moving, but her voice was not heard
  chosen_spanish_reading: «sólo sus labios se movían, pero su voz no se oía» preserva el contraste observacional entre señal externa y falta de sonido.
  alternative_spanish_readings:
  - sólo movía los labios y no se oía su voz
  - sus labios se movían y su voz no se oía
  rationale: 'La escena subraya la percepción de Eli: pudo ver movimiento pero no oír voz. Mantener ese contraste ayuda a explicar por qué concluyó erróneamente que estaba ebria.'
  doctrine_reference: Narrativa de 1 Samuel 1:13; observación contextual sin implicación doctrinal específica
translation_notes:
  revision_awareness: El texto inglés final está marcado como unchanged con alta concordancia y revisión sin cambios; por eso la redacción española sigue de cerca la solución auditada, especialmente en el hebraísmo de «hablar en el corazón» y en la oposición entre labios visibles y voz no audible.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta muestra no aplica porque el versículo no contiene el nombre divino.
  - «Ana» se mantiene como forma española estándar del nombre hebreo Hannah.
  - Se evita «señor» o formulaciones eclesiásticas no presentes en el original.
  - El tono es bíblico-formal, pero con sintaxis española natural.
