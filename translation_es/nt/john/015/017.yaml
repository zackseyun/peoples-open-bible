translation:
  language: es
  text: Estas cosas les mando[a], para que se amen unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Les mando estas cosas: ámense unos a otros». La cláusula con ἵνα puede entenderse como propósito o como contenido cercano.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Esto
  - Estas cosas
  lexicon: BDAG
  rationale: El neutro plural apunta a varios mandatos o a lo dicho antes; en español, "estas cosas" conserva mejor el plural que un simple "esto".
- source_word: ἐντέλλομαι
  english_pob_choice: I command
  chosen_spanish: les mando
  alternatives_spanish:
  - les ordeno
  - les doy mandamiento
  lexicon: BDAG
  rationale: El verbo expresa mandato directo. "Mando" comunica con naturalidad la fuerza imperativa en español y evita una formulación más rígida o técnica.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con objeto indirecto en español. "Les" mantiene la relación verbal sin recargar la frase.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa propósito o resultado intencional. "Para que" es la equivalencia española más natural y fiel al valor final.
- source_word: ἀγαπᾶτε
  english_pob_choice: may love
  chosen_spanish: se amen
  alternatives_spanish:
  - amen
  - sigan amándose
  lexicon: BDAG
  rationale: El subjuntivo presente en cláusula final comunica la acción deseada. "Se amen" preserva el sentido recíproco y el registro bíblico sin añadir aspecto iterativo no explícito.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: El pronombre recíproco se traduce de forma transparente con "unos a otros", forma clara y ampliamente entendible en español.
theological_decisions:
- issue: Relación entre el mandato y la cláusula final con ἵνα
  english_pob_reading: The verse is rendered to show that Jesus gives these commands with the purpose that the disciples love one another.
  chosen_spanish_reading: El versículo se lee como un mandato dado con el propósito de que los discípulos se amen unos a otros.
  alternative_spanish_readings:
  - '"Estas cosas les mando: ámense unos a otros"'
  - '"Les mando estas cosas, de modo que se amen unos a otros"'
  rationale: La sintaxis admite tanto finalidad como contenido cercano. La traducción principal conserva el valor final con "para que" sin cerrar la tensión interpretativa que el griego permite.
  doctrine_reference: Preservar la tensión sintáctica de ἵνα sin resolverla de manera reductiva.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del inglés POB, que volvió a "These things I command you" para reflejar con más precisión el demostrativo plural y el verbo singular. En español se optó por una formulación natural que conserva ese mismo balance entre literalidad y fluidez.
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de segunda persona con "les" y el recíproco "unos a otros".
  - '"Mando" se usa aquí para reflejar el mandato directo sin introducir "ordeno" o "instruyo".'
  - '"Para que" conserva el valor final de ἵνα y deja abierta la posible lectura epexegética indicada en la nota.'
