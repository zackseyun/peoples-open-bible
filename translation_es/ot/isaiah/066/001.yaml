review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: fórmula profética, nombre divino como «Yahvé», contraste cósmico cielo/tierra, y la pregunta retórica sobre la inadecuación de una casa humana para Dios. También conserva correctamente «casa» en vez de sobreinterpretar «templo». Sin embargo, no preserva del todo la estructura y las alternativas documentadas en el POB inglés: la nota [a] fue cambiada para hablar del plural «cielos», cuando en el inglés [a] corresponde a una alternativa sobre la segunda pregunta («What house could you build for me?»), y el texto principal introduce una repetición poco natural («qué lugar sería mi lugar de descanso») que no corresponde bien a la economía del hebreo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos problemas de calidad: «el estrado de mis pies» suena menos idiomático y más forzado que «el estrado para mis pies» o «mi escabel»; y «qué lugar sería mi lugar de descanso» resulta redundante y torpe. Conviene ajustar la segunda pregunta a una forma más natural sin perder el valor locativo de מְנוּחָתִי. También debe alinearse mejor el anclaje y contenido de las notas con el expediente inglés.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יהוה, «casa» para בַיִת, y mantenimiento del matiz retórico. No hay conflictos doctrinales mayores. La principal desalineación está en las notas: se perdió la alternativa léxica documentada sobre la pregunta retórica y se desplazó a una nota nueva sobre «cielo/cielos» que no era la preservada por el POB inglés.'
  issues:
  - severity: high
    issue: La nota [a] no corresponde al contenido ni al anclaje del POB inglés.
    rationale: En el POB inglés, [a] da la alternativa «What house could you build for me?» y explica la fuerza retórica. En el borrador español, [a] se ancla a «trono» y comenta «Los cielos son mi trono», sustituyendo una nota distinta y perdiendo una decisión auditada importante.
  - severity: medium
    issue: La frase «y qué lugar sería mi lugar de descanso» es redundante y poco natural.
    rationale: El hebreo dice «¿y cuál lugar [es/sería] mi lugar de descanso?». En español conviene evitar la duplicación de «lugar» dentro de la predicación; «y qué lugar sería mi descanso» tampoco sirve por perder el matiz locativo. Una formulación como «y cuál sería el lugar de mi descanso» preserva mejor sentido y fluidez.
  - severity: medium
    issue: El anclaje y orden de notas deben reflejar el texto revisado y las decisiones del POB.
    rationale: El proyecto exige notas con marcadores únicos y presentes en el texto. Aquí hace falta reubicar [a] en la primera pregunta, mantener [b] para «casa», y [c] para la alternativa «mi lugar de reposo».
  - severity: low
    issue: «El estrado de mis pies» es comprensible, pero algo rígido.
    rationale: No es una infidelidad grave, pero en español eclesial más natural suele funcionar «el estrado para mis pies» o «mi escabel». Dado que el borrador ya busca claridad moderna, una leve mejora estilística es recomendable.
  revised_spanish_text: 'Así dice Yahvé: El cielo es mi trono, y la tierra es el estrado para mis pies. ¿Qué clase de casa[a][b] construirían para mí, y cuál sería el lugar de mi descanso[c]?'
  revised_footnotes:
