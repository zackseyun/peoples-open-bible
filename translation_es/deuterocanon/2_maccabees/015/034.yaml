translation:
  language: es
  text: 'Y todos bendijeron al Señor manifiesto hacia el cielo[a], diciendo: «Bendito el que ha conservado su propio lugar sin contaminación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su propio santuario» o «su propio templo»; el griego dice «lugar», pero el contexto probablemente se refiere al lugar santo preservado de la profanación.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - en dirección al cielo
  - cielo arriba
  lexicon: LSJ
  rationale: La construcción con εἰς y acusativo expresa dirección. «Hacia el cielo» conserva el movimiento orientado hacia arriba sin convertir la frase en una fórmula de mera ubicación o de simple dirección física.
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - bendijeron
  lexicon: LSJ
  rationale: En contexto litúrgico, εὐλογέω suele ser «bendecir». «Bendijeron» mantiene la relación léxica con «Bendito» al inicio de la cita directa y evita perder ese eco verbal.
- source_word: τὸν ἐπιφανῆ κύριον
  english_pob_choice: the manifest Lord
  chosen_spanish: al Señor manifiesto
  alternatives_spanish:
  - al Señor glorioso
  - al Señor que se manifestó
  - al Señor ilustre
  lexicon: LSJ
  rationale: ἐπιφανής denota algo manifiesto, visible o prominente. «Manifiesto» preserva esa fuerza sin reemplazarla por una interpretación más teológica de «glorioso». «Señor» corresponde al valor de κύριος.
- source_word: διατηρήσας
  english_pob_choice: has kept
  chosen_spanish: ha conservado
  alternatives_spanish:
  - ha guardado
  - ha preservado
  - ha mantenido
  lexicon: LSJ
  rationale: El participio expresa la acción de preservar algo en su estado debido. «Ha conservado» es natural en español y mantiene el sentido de custodia activa.
- source_word: τὸν ἑαυτοῦ τόπον
  english_pob_choice: his own place
  chosen_spanish: su propio lugar
  alternatives_spanish:
  - su propio santuario
  - su propio templo
  - su propio sitio
  lexicon: LSJ
  rationale: τόπος significa básicamente «lugar». Dado que el griego no usa un término más específico para templo o santuario, el texto principal conserva la generalidad con «lugar»; así se evita fijar de más la interpretación antes de tiempo.
- source_word: ἀμίαντον
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin contaminar
  - sin defilecimiento
  - puro
  lexicon: LSJ
  rationale: ἀμίαντος tiene una carga cultual y moral de pureza. «Sin mancha» es una equivalencia natural y reverente en español, y comunica bien la idea de no haber sido profanado.
theological_decisions:
- issue: Si ἑαυτοῦ τόπον debe explicitarse como santuario o templo en el texto principal
  english_pob_reading: Retain the broader 'his own place' in the main text
  chosen_spanish_reading: Conservar «su propio lugar» en el texto principal
  alternative_spanish_readings:
  - su propio santuario
  - su propio templo
  rationale: El contexto sugiere el templo, pero el griego dice τόπος, no ναός ni ἱερόν. Mantener la generalidad respeta la primacía del texto fuente y deja la precisión contextual para una nota.
  doctrine_reference: Principio de fidelidad al idioma fuente; preservar la tensión interpretativa sin resolverla indebidamente
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del análisis auditado; se mantiene la decisión de conservar τόπος como «lugar» y la orientación εἰς τὸν οὐρανόν como dirección hacia el cielo.'
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος según el uso doctrinal proyectado por el texto auditado.
  - «Sin mancha» reproduce el valor cultual de ἀμίαντον sin introducir una paráfrasis explicativa.
  - La nota al pie preserva la alternativa contextual de santuario/templo sin desplazar el término general del texto principal.
