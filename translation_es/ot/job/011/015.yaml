translation:
  language: es
  text: Porque entonces alzarás tu rostro sin mancha[a]; estarás firme[b] y no temerás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alzarás la cabeza sin vergüenza». El hebreo dice literalmente «alzarás tu rostro sin mancha», preservando la imagen de confianza restaurada y libertad de deshonra.
    reason: lexical_alternative
  - marker: b
    text: O «estarás seguro» o «firmemente establecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce el resultado o explicación del estado prometido; «porque» conserva bien esa relación causal/resultativa en español bíblico moderno.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - después
  lexicon: HALOT
  rationale: Marca la consecuencia temporal del escenario descrito; «entonces» es natural y conciso.
- source_word: תִּשָּׂא פָנֶיךָ
  english_pob_choice: you will lift up your face
  chosen_spanish: alzarás tu rostro
  alternatives_spanish:
  - levantarás tu rostro
  - alzarás la cabeza
  lexicon: HALOT
  rationale: Mantiene la imagen idiomática de «levantar/alzar el rostro» y evita una paráfrasis excesiva; en español suena natural y conserva la metáfora de confianza restaurada.
- source_word: מִמּוּם
  english_pob_choice: without blemish
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - sin tacha
  - sin vergüenza
  lexicon: HALOT
  rationale: «מוּם» alude a defecto o mancha; «sin mancha» preserva el valor imagético y puede abarcar la connotación moral sin perder el matiz léxico.
- source_word: וְהָיִיתָ
  english_pob_choice: you will
  chosen_spanish: estarás
  alternatives_spanish:
  - serás
  - y estarás
  lexicon: HALOT
  rationale: El hebreo introduce un estado resultante; en español, «estarás» comunica con claridad esa condición estable sin forzar un «llegarás a ser».
- source_word: מֻצָק
  english_pob_choice: stand firm
  chosen_spanish: firme
  alternatives_spanish:
  - seguro
  - establecido
  - bien asentado
  lexicon: HALOT
  rationale: El participio pasivo comunica solidez/estabilidad. En español, «estarás firme» reproduce la idea de firmeza sin añadir un verbo imagen que no está explícito en el hebreo.
- source_word: וְלֹא תִירָא
  english_pob_choice: and will not fear
  chosen_spanish: y no temerás
  alternatives_spanish:
  - y no tendrás miedo
  - y no estarás atemorizado
  lexicon: HALOT
  rationale: Equivale de forma directa al verbo ירא en futuro negativo; «temerás» mantiene el tono poético y sobrio.
translation_notes:
  revision_awareness: 'El texto base inglés presenta dos notas léxicas: una sobre el modismo «lift up your face» con la alternativa interpretativa de «hold your head high without shame», y otra sobre מֻצָק con opciones como «secure» o «firmly established». La versión española conserva la imagen principal, pero adapta la expresión para sonar natural en español sin perder el paralelismo poético.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando aparece el Tetragrámaton; en este versículo no aparece.
  - Se prefirió «sin mancha» para reflejar el término hebreo מוּם con un matiz más concreto que «sin vergüenza», dejando esta última como alternativa en nota.
  - «Estarás firme» busca equilibrar la solidez del hebreo con una formulación fluida en español bíblico contemporáneo.
