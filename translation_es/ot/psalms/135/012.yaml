translation:
  language: es
  text: Y él dio la tierra de ellos como herencia[a], una herencia a Israel, su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como heredad»; el hebreo repite «herencia» para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: And he gave
  chosen_spanish: Y él dio
  alternatives_spanish:
  - Y dio
  - Entonces dio
  lexicon: HALOT
  rationale: El wayyiqtol de נתן avanza la acción en pasado; en español suena natural explicitar el sujeto por el contexto y conservar la coordinación inicial con «Y».
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: אַרֶץ aquí se refiere a la tierra poseída por ellos; «tierra» mantiene el sentido amplio y poético mejor que opciones más técnicas o modernas.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como patrimonio
  lexicon: HALOT
  rationale: El primer נַחֲלָה funciona predicativamente con נתן. «Herencia» conserva el matiz de asignación/covenantal sin sonar forzado en español.
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una heredad
  - una posesión
  lexicon: HALOT
  rationale: La repetición se conserva en español para reflejar el énfasis poético del hebreo. «Herencia» es la opción más transparente y cercana al campo semántico del original.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en favor de Israel
  lexicon: HALOT
  rationale: El ל aquí marca beneficiario/destinatario. En español, «para Israel» expresa con claridad el beneficio de la concesión.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: עַם señala al pueblo en sentido de pueblo del pacto; «su pueblo» es la formulación más natural y fiel en español.
theological_decisions:
- issue: Repetición enfática de נַחֲלָה
  english_pob_reading: 'Preserve the repetition in the main text: ''as an inheritance, an inheritance'''
  chosen_spanish_reading: 'Preservar la repetición: «como herencia, una herencia»'
  alternative_spanish_readings:
  - Suprimir la segunda repetición por fluidez
  - Reformular como «como heredad, una herencia»
  rationale: La duplicación es intencional y carga el verso con énfasis poético y de asignación pactal. Mantenerla evita suavizar el texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y sin cambios necesarios; no se introdujeron ajustes doctrinales ni textuales adicionales, solo una solución española natural que conserva la repetición del hebreo.
  spanish_consistency_notes:
  - Se mantiene «herencia» para נַחֲלָה de forma consistente con el valor covenantal señalado por la auditoría inglesa.
  - Se usa «su pueblo» para עַמּוֹ, evitando términos más eclesiales que el hebreo no exige.
  - La repetición «herencia, una herencia» preserva el paralelismo enfático sin crear una paráfrasis.
  - Se evitó «SEÑOR» o sustitutos reverenciales porque el verso no contiene el Tetragrámaton.
