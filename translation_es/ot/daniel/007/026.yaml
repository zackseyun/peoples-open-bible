translation:
  language: es
  text: Pero[a] el tribunal se sentará, y su dominio[b] será quitado, para ser destruido y aniquilado hasta el fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio se sentará»; el arameo puede subrayar tanto la convocatoria del tribunal como la sesión judicial misma.
    reason: lexical_alternative
  - marker: b
    text: O «su autoridad» o «su gobierno».
    reason: lexical_alternative
  - marker: c
    text: O «hasta el fin»; la frase subraya la finalidad y la plenitud del juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִינָא
  english_pob_choice: the court
  chosen_spanish: el tribunal
  alternatives_spanish:
  - el juicio
  - la corte
  lexicon: HALOT
  rationale: En arameo bíblico, el sustantivo puede referirse al proceso judicial o al cuerpo/session judicial. Dado el verbo siguiente "se sentará", en español "el tribunal" conserva la imagen de una instancia judicial que se reúne, sin perder la posible referencia al juicio mismo.
- source_word: יִתִּב
  english_pob_choice: will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - tomará asiento
  - se sentará en sesión
  lexicon: HALOT
  rationale: El verbo significa literalmente "sentarse". En este contexto jurídico-apocalíptico, el reflexivo español comunica la idea de que el tribunal se reúne o entra en sesión, manteniendo la metáfora original.
- source_word: שָׁלְטָנֵהּ
  english_pob_choice: his dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su autoridad
  - su gobierno
  - su poder
  lexicon: HALOT
  rationale: El término designa poder de gobierno o soberanía. "Dominio" preserva bien el marco real/apocalíptico de Daniel 7 y la fuerza del sustantivo sin volverlo demasiado abstracto.
- source_word: יְהַעְדּוֹן
  english_pob_choice: will be taken away
  chosen_spanish: le será quitado
  alternatives_spanish:
  - será quitado
  - serán quitados
  - le quitarán
  lexicon: HALOT
  rationale: El verbo tiene fuerza impersonal y el contexto sugiere el resultado de la acción judicial sobre el gobernante. La pasiva refleja española evita introducir un sujeto no expresado y conserva el efecto de desposesión.
- source_word: לְהַשְׁמָדָה
  english_pob_choice: to be destroyed
  chosen_spanish: para ser destruido
  alternatives_spanish:
  - para destrucción
  - para ser arruinado
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad o resultado. "Para ser destruido" mantiene el valor pasivo y el sentido de ruina judicial sin añadir explicación interpretativa.
- source_word: וּלְהוֹבָדָה
  english_pob_choice: and to be annihilated
  chosen_spanish: y aniquilado
  alternatives_spanish:
  - y para ser aniquilado
  - y para perecer
  - y para ser arrasado
  lexicon: HALOT
  rationale: El par de infinitivos intensifica la destrucción total. En español, "aniquilado" transmite con fuerza la idea de eliminación completa; se omite "ser" en coordinación con la frase anterior para lograr una construcción más natural y fluida, sin perder el valor pasivo.
- source_word: עַד סוֹפָא
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: HALOT
  rationale: La frase significa literalmente "hasta el fin". "Hasta el fin" es natural en español y conserva la nota de finalidad absoluta y consumación definitiva.
theological_decisions:
- issue: Referente de "su dominio"
  english_pob_reading: The pronoun refers to the arrogant end-time ruler/little horn represented in the preceding context, without expanding the text to identify him beyond Daniel's vision.
  chosen_spanish_reading: El pronombre se entiende como referido al gobernante final arrogante representado en el contexto previo, sin identificarlo más allá de lo que la visión de Daniel afirma.
  alternative_spanish_readings:
  - Puede referirse también al dominio de la cuarta bestia en su conjunto.
  rationale: El texto inmediato apunta al cuerno soberbio, aunque sin separarlo de la bestia/imperio. La traducción mantiene el pronombre singular y evita resolver la referencia con mayor precisión doctrinal de la que ofrece el pasaje.
  doctrine_reference: Preservar la tensión interpretativa sin sobreespecificar el referente.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la lectura final revisada del POB en inglés, especialmente en la eliminación de una repetición innecesaria de "to be" antes de "annihilated". Se preservó la ambigüedad judicial de דִינָא y la fuerza intensiva del par verbal de destrucción.
  spanish_consistency_notes:
  - Se usa "tribunal" para el ámbito judicial, en armonía con el valor posible de דִינָא y con el contexto de sesión/corte.
  - Se mantiene "dominio" para שָׁלְטָנֵהּ, coherente con el registro apocalíptico-político de Daniel 7.
  - La coordinación "destruido y aniquilado" preserva la intensificación del hebreo/arameo sin alargar artificialmente la frase.
  - '"Hasta el fin" conserva la clausura escatológica sin introducir explicaciones interpretativas.'
