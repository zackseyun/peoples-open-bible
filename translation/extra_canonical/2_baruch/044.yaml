theological_decisions:
- issue: Remnant theology in Baruch’s charge
  chosen_reading: the people who remain
  alternative_readings:
  - the remnant
  - those left
  rationale: The Syriac naturally describes those left after judgment. I kept the phrase transparent rather than turning it into a more technical label, while still preserving the remnant theme.
- issue: Norm for communal fidelity
  chosen_reading: the commandments of God
  alternative_readings:
  - the law
  - God’s ordinances
  rationale: The present line speaks of divine commandments specifically, so I did not broaden it to a generalized moral order or replace it with Torah-language not explicit in this clause.
