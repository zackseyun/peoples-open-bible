base_translation:
  language: en
  yaml_path: translation/ot/exodus/019/006.yaml
  text: And you shall be to me a kingdom of priests and a holy nation[b][a]. These are the words that you shall speak to the sons of Israel.
  footnotes:
  - marker: a
    text: Or "a priestly kingdom"; the Hebrew phrase may be understood as a kingdom composed of priests or a kingdom marked by priestly character. Compare 1 Peter 2:9, which uses the related expression "a royal priesthood."
    reason: lexical_alternative
  - marker: b
    text: '"The sons of Israel" is the Hebrew expression for the people of Israel as a whole, not only male Israelites.'
    reason: cultural_note
