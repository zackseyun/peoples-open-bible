    issue: Falta la nota sobre el pronombre femenino en la última cláusula.
    rationale: 'El inglés POB preserva explícitamente la alternativa ''she will speak with you''. Dado que el hebreo tiene הִיא, el español debería conservar esa alternativa en nota: ''O: «ella hablará contigo»''.'
  - severity: medium
