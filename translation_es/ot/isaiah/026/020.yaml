    text: Or 'your chambers.' The Hebrew term can refer to inner rooms or private chambers.
    reason: lexical_alternative
  - marker: b
    text: Or 'hide yourself.' The Hebrew addresses 'my people' as a collective, so the English plural 'yourselves' brings out the collective sense.
    reason: lexical_alternative
  - marker: c
