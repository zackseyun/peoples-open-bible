translation:
  language: es
  text: 'Entonces Jonatán dijo: «Mi padre ha trastornado la tierra. Vean, por favor, cómo se me han aclarado los ojos[a], porque probé un poco de esta miel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «se me han aclarado los ojos» expresa renovada fuerza o alerta después de comer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָכַר
  english_pob_choice: has troubled
  chosen_spanish: ha trastornado
  alternatives_spanish:
  - ha perturbado
  - ha causado trastorno en
  lexicon: HALOT
  rationale: El verbo hebreo expresa causar turbación, desorden o calamidad. «Ha trastornado» conserva el sentido causativo directo y suena natural en español formal sin suavizar demasiado la fuerza del original.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: HALOT
  rationale: En este contexto narrativo, «la tierra» reproduce bien el alcance territorial y colectivo del hebreo. «El país» sería posible, pero desplaza un poco el campo semántico bíblico.
- source_word: רְאוּ נָא
  english_pob_choice: See, please
  chosen_spanish: Vean, por favor
  alternatives_spanish:
  - Miren, por favor
  - Vean ahora
  lexicon: HALOT
  rationale: El imperativo plural con la partícula de súplica נָא pide atención de manera cortés. «Vean, por favor» mantiene ambos valores sin caer en arcaísmo.
- source_word: אֹרוּ עֵינַי
  english_pob_choice: my eyes have brightened
  chosen_spanish: se me han aclarado los ojos
  alternatives_spanish:
  - mis ojos han brillado
  - mis ojos se han iluminado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a renovada vitalidad o alerta después de comer. «Se me han aclarado los ojos» conserva la imagen ocular y comunica con claridad el efecto revitalizante en español.
- source_word: טָעַמְתִּי
  english_pob_choice: I tasted
  chosen_spanish: probé
  alternatives_spanish:
  - gusté
  - tasté
  lexicon: HALOT
  rationale: Aunque el verbo significa «gustar/probar», en español «probé» suena más natural en este contexto y refleja que solo consumió una pequeña cantidad, sin perder la idea básica de degustar.
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - un poquito
  - una pequeña cantidad de
  lexicon: HALOT
  rationale: «Un poco» es la equivalencia idiomática más clara y fiel para una cantidad pequeña, manteniendo el contraste con la reacción de alivio de Jonatán.
- source_word: דְּבַשׁ הַזֶּה
  english_pob_choice: this honey
  chosen_spanish: esta miel
  alternatives_spanish:
  - este panal de miel
  - esta miel de este panal
  lexicon: HALOT
  rationale: El sustantivo hebreo aquí significa «miel»; no exige «panal». «Esta miel» es la opción más directa y textual.
theological_decisions:
- issue: Valor del dicho de Jonatán sobre el efecto de la miel
  english_pob_reading: How my eyes have brightened because I tasted a little of this honey.
  chosen_spanish_reading: Cómo se me han aclarado los ojos, porque probé un poco de esta miel.
  alternative_spanish_readings:
  - cómo mis ojos han brillado
  - cómo mis ojos se han iluminado
  rationale: La frase mantiene el hebraímo sin convertirlo en una paráfrasis explicativa dentro del texto principal. La nota permite al lector entender que se trata de un idiomatismo de vitalidad recuperada, no de una afirmación mística.
  doctrine_reference: No doctrinal issue; lexical/idiomatic explanation only.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió una traducción más directa de עָכַר (“has troubled the land”) sobre “has brought trouble on the land”. Esta versión española sigue esa línea con «ha trastornado la tierra». También conserva el giro idiomático de los ojos que se aclaran, con nota explicativa anclada en el texto.
  spanish_consistency_notes:
  - Se usa «Yonatán» en la forma hispanizada habitual de Jonatán/Jonatán, manteniendo identificación clara del personaje.
  - Se prefirió «la tierra» frente a «el país» para respetar el anclaje bíblico del original.
  - «Vean, por favor» reproduce el tono de súplica cortés de נָא sin arcaizar.
  - No se emplea «SEÑOR» ni terminología de sustitución, porque este versículo no contiene el tetragrámaton.
