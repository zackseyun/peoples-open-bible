translation:
  language: es
  text: 'Entonces Abner llamó a Joab y le dijo: «¿Acaso la espada devorará[a] para siempre? ¿No sabes que al final será amarga? ¿Hasta cuándo tardarás en decirle al pueblo que se vuelva[b] de seguir a sus hermanos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de la espada que «devora» reproduce el hebreo personificado; no se suaviza a una mera referencia abstracta a la guerra.
    reason: lexical_alternative
  - marker: b
    text: O «que se vuelva de seguir tras sus hermanos». El hebreo permite un matiz más literal de ‘ir detrás de’, pero aquí «de seguir» suena más natural en español.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - sin fin
  - para siempre jamás
  lexicon: HALOT
  rationale: La expresión formula una pregunta retórica sobre continuidad sin término. «Para siempre» conserva la fuerza idiomática de duración indefinida con naturalidad en español.
- source_word: תֹּאכַל חֶרֶב
  english_pob_choice: the sword devour
  chosen_spanish: la espada devorará
  alternatives_spanish:
  - la espada consumirá
  - habrá una matanza sin fin
  lexicon: HALOT
  rationale: Se conserva la personificación de «espada» como sujeto que «devora», porque el hebreo mantiene esa imagen vívida. «Devorará» reproduce mejor la metáfora que una paráfrasis abstracta.
- source_word: מָרָה
  english_pob_choice: bitter
  chosen_spanish: amarga
  alternatives_spanish:
  - dolorosa
  - severa
  lexicon: HALOT
  rationale: El adjetivo apunta al desenlace desagradable y metafórico de la violencia continuada. «Amarga» conserva la imagen gustativa y la carga afectiva del hebreo.
- source_word: בָּאַחֲרוֹנָה
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - al cabo
  - por último
  lexicon: HALOT
  rationale: La frase señala el resultado final de la acción prolongada. «Al final» expresa con claridad el sentido temporal y conclusivo del hebreo.
- source_word: וְעַד מָתַי
  english_pob_choice: How long will it be before
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Por cuánto más tiempo?
  - ¿Hasta cuándo será
  lexicon: HALOT
  rationale: En español, la pregunta queda más natural y fiel con «¿Hasta cuándo?», que preserva la idea de demora y urgencia sin alargar innecesariamente la sintaxis.
- source_word: לֹא תֹאמַר לָעָם
  english_pob_choice: you tell the people
  chosen_spanish: no dirás al pueblo
  alternatives_spanish:
  - no le dirás al pueblo
  - no ordenarás al pueblo
  lexicon: HALOT
  rationale: אָמַר puede funcionar como «decir/tell» en un mandato indirecto. Se evita «ordenar» porque el hebreo no exige un verbo de mando explícito.
- source_word: לָשׁוּב
  english_pob_choice: to turn back
  chosen_spanish: que vuelva
  alternatives_spanish:
  - que se retire
  - que regrese
  lexicon: HALOT
  rationale: El verbo שׁוּב expresa volver/retroceder. «Que vuelva» mantiene la sencillez y el movimiento de retorno implícito en el contexto bélico.
- source_word: מֵאַחֲרֵי
  english_pob_choice: from following
  chosen_spanish: de seguir
  alternatives_spanish:
  - de ir tras
  - de ir siguiendo
  lexicon: HALOT
  rationale: La expresión literal «de detrás de» se entiende aquí como persecución o seguimiento. «De seguir» conserva la cercanía al hebreo y se ajusta al ajuste revisionado del POB inglés hacia «following».
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: Se mantiene «hermanos» por su fuerza literal y covenantal, y porque la situación describe a israelitas combatiendo contra israelitas. Otras opciones debilitan ese vínculo emocional.
theological_decisions:
- issue: Hermanos como referencia a un conflicto entre israelitas
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus compatriotas
  rationale: 'Se conserva la literalidad de «hermanos» para no perder la dimensión fraterna y pactal del texto: el combate es entre miembros del mismo pueblo. Cambiarlo por términos más genéricos atenuaría esa tensión.'
  doctrine_reference: Unidad del pueblo del pacto; ética de la fraternidad dentro de Israel
translation_notes:
  revision_awareness: El inglés POB fue revisado de «pursuing their brothers» a «following their brothers» para acercarse más al hebreo מֵאַחֲרֵי אֲחֵיהֶם. La versión española toma esa revisión en cuenta con «de seguir a sus hermanos», evitando una intensificación interpretativa innecesaria como «perseguir» y manteniendo la relación literal de seguimiento/ir detrás de.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva la metáfora de la espada como agente activo, siguiendo la elección del POB inglés de no despojarla de su personificación.
  - «Hermanos» se mantiene de forma consistente con la lectura covenantal del texto y con la revisión inglesa más literal.
