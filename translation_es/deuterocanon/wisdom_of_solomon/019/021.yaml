translation:
  language: es
  text: Llamas[a], al contrario, no marchitaron la carne de los seres vivos perecederos que caminaban entre ellas, ni derritieron lo derretible[b], la clase como de cristal de alimento ambrosial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «por el contrario» o «en sentido inverso». El adverbio griego señala que el fuego actuó de manera opuesta a lo esperado.
    reason: lexical_alternative
  - marker: b
    text: «Lo derretible» refleja la idea de algo susceptible de fundirse o derretirse; también puede entenderse como «fácilmente fundible» o «fácil de derretir».
    reason: lexical_alternative
lexical_decisions:
- source_word: φλόγες
  english_pob_choice: Flames
  chosen_spanish: Llamas
  alternatives_spanish:
  - fuegos
  lexicon: LSJ
  rationale: φλόγες nombra llamas o lenguas de fuego; «llamas» es natural en español y mantiene la concreción del fenómeno ígneo narrado.
- source_word: ἀνάπαλιν
  english_pob_choice: on the contrary
  chosen_spanish: al contrario
  alternatives_spanish:
  - por el contrario
  - en sentido inverso
  lexicon: LSJ
  rationale: El adverbio marca inversión respecto de la expectativa normal; «al contrario» comunica bien el contraste retórico sin forzar el orden español.
- source_word: εὐφθάρτων ζῴων
  english_pob_choice: the perishable living creatures
  chosen_spanish: los seres vivos perecederos
  alternatives_spanish:
  - los animales perecederos
  - las criaturas mortales
  lexicon: LSJ
  rationale: ζῴων es literalmente «seres vivos» o «criaturas vivas»; se evita «animales» para no restringir innecesariamente. εὐφθάρτων expresa la facilidad para corromperse o perecer, de ahí «perecederos».
- source_word: οὐκ ἐμάραναν
  english_pob_choice: did not wither
  chosen_spanish: no marchitaron
  alternatives_spanish:
  - no ajaron
  - no consumieron
  lexicon: LSJ
  rationale: μαραίνω sugiere marchitar, secar o hacer desfallecer. «Marchitaron» conserva la imagen extraña del texto, en vez de normalizarla a «quemaron».
- source_word: σάρκας
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne de ellos
  - sus carnes
  lexicon: LSJ
  rationale: σάρκας es el sustantivo concreto para la carne corporal; «carne» mantiene la fuerza corporal del original.
- source_word: ἐμπεριπατούντων
  english_pob_choice: that walked among them
  chosen_spanish: que caminaban entre ellas
  alternatives_spanish:
  - que se movían en medio de ellas
  - que andaban dentro de ellas
  lexicon: LSJ
  rationale: El participio describe a los seres vivos moviéndose en medio del ámbito ígneo. «Caminaban entre ellas» preserva la imagen sin sobreexplicar la localización.
- source_word: οὐδὲ
  english_pob_choice: nor did
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - y no
  lexicon: LSJ
  rationale: Conecta la segunda cláusula negativa con paralelismo natural en español; aquí basta «ni» por el contexto.
- source_word: τηκτὸν εὔτηκτον
  english_pob_choice: the meltable
  chosen_spanish: derretible
  alternatives_spanish:
  - fácil de derretir
  - fácilmente fundible
  lexicon: LSJ
  rationale: El griego intensifica la idea de algo susceptible de fundirse o derretirse. «Derretible» refleja esa cualidad con menos ambigüedad que un simple «fundible» en español corriente.
- source_word: κρυσταλλοειδὲς
  english_pob_choice: crystal-like
  chosen_spanish: cristalino
  alternatives_spanish:
  - cristaliforme
  - como de cristal
  lexicon: LSJ
  rationale: Literalmente «parecido al cristal». «Cristalino» es una forma natural en español que conserva la imagen de transparencia/consistencia sin recargar la frase.
- source_word: γένος
  english_pob_choice: kind
  chosen_spanish: género
  alternatives_spanish:
  - clase
  - especie
  lexicon: LSJ
  rationale: γένος designa un tipo o clase. «Género» reproduce el sustantivo de manera directa y mantiene el tono elevado del pasaje.
- source_word: ἀμβροσίας τροφῆς
  english_pob_choice: ambrosial food
  chosen_spanish: de alimento ambrosial
  alternatives_spanish:
  - de alimento inmortal
  - de alimento celestial
  lexicon: LSJ
  rationale: ἀμβροσία evoca alimento de los dioses, inmortal o ambrosial. Se conserva el adjetivo «ambrosial» porque el español lo entiende en registro literario y retiene la coloración helenística del texto.
theological_decisions:
- issue: Cómo presentar el contraste marcado por ἀνάπαλιν sin suavizar la tensión retórica
  english_pob_reading: on the contrary
  chosen_spanish_reading: al contrario
  alternative_spanish_readings:
  - por el contrario
  - en sentido inverso
  rationale: La frase subraya que el fuego actuó de manera opuesta a lo esperable. «Al contrario» mantiene esa inversión sin introducir una interpretación doctrinal ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo expresar el alimento milagroso sin domesticar su color literario
  english_pob_reading: ambrosial food
  chosen_spanish_reading: alimento ambrosial
  alternative_spanish_readings:
  - alimento celestial
  - alimento inmortal
  rationale: El texto describe poéticamente la provisión maravillosa. «Ambrosial» conserva el matiz clásico del griego y evita reducir la imagen a una explicación teológica posterior.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo entender la relación espacial del participio ἐμπεριπατούντων
  english_pob_reading: that walked among them
  chosen_spanish_reading: que caminaban entre ellas
  alternative_spanish_readings:
  - que caminaban en medio de ellas
  - que se movían entre ellas
  rationale: La construcción apunta a seres vivos moviéndose dentro del ámbito de las llamas. «Entre ellas» conserva esa escena sin añadir elementos que el griego no exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego procede de la capa de override normalizada y ya depurada del desbordamiento textual; el inglés auditado introdujo una solución literal-contenida («crystal-like», «meltable») y una leve revisión estilística al eliminar un demostrativo innecesario. La versión española sigue ese mismo ajuste, conservando el paralelismo negativo y la imaginería del fuego y del alimento milagroso sin añadir explicaciones externas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «alimento ambrosial» para conservar el registro poético del griego y la decisión auditada del inglés.
  - «Seres vivos» traduce ζῴων sin restringir innecesariamente a «animales», aunque el contexto narrativo alude a criaturas vivientes en el fuego.
  - «Marchitaron» preserva la rareza semántica de μαραίνω frente a una simplificación como «quemaron».
