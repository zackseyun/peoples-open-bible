base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/006/020.yaml
  text: Then David returned to bless his household[a]. But Michal daughter of Saul came out to meet David and said, “How honored the king of Israel was today, uncovering himself today in the sight of the slave girls of his slaves[c][b], as one of the vulgar fellows shamelessly uncovers himself!”
  footnotes:
