translation:
  language: es
  text: Y en aquellos días el día se alarga de día en día[a], y la noche se acorta de noche en noche[c][b], hasta treinta mañanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez repite «día» y «noche» en una construcción comparativa («día de día», «noche de noche»). La idea es que cada día sucesivo se hace más largo y cada noche sucesiva más corta.
    reason: lexical_alternative
  - marker: b
    text: O «hasta treinta amaneceres». El término es literalmente «mañana» y probablemente marca una etapa contada en el esquema de las luminarias.
    reason: lexical_alternative
  - marker: c
    text: O «el día se alarga más que el día, y la noche se acorta más que la noche».
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  - en esos días
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La fórmula temporal es una expresión apocalíptica fija y solemne. «En aquellos días» conserva el registro elevado y la referencia temporal narrativa sin volverla demasiado coloquial.
- source_word: ትነኍኅ
  english_pob_choice: grows longer
  chosen_spanish: se alarga
  alternatives_spanish:
  - se prolonga
  - se extiende
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo expresa aumento de duración. «Se alarga» es natural en español y mantiene la idea de extensión temporal observacional.
- source_word: ዕለት እምዕለት
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - de un día a otro
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez repite «día» en una estructura comparativa. «De día en día» conserva la repetición y el movimiento gradual sin perder la fuerza comparativa del original.
- source_word: ተኃጽር ሌሊት እምሌሊት
  english_pob_choice: grows shorter from night to night
  chosen_spanish: se acorta de noche en noche
  alternatives_spanish:
  - se va acortando noche tras noche
  - se hace más corta de noche en noche
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase paralela debe quedar simétrica con la anterior. «Se acorta de noche en noche» reproduce la disminución gradual y mantiene el paralelismo estructural.
- source_word: እስከ ሠላሳ ጽባሕ
  english_pob_choice: until thirty mornings
  chosen_spanish: hasta treinta mañanas
  alternatives_spanish:
  - hasta treinta amaneceres
  - hasta treinta auroras
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽባሕ significa literalmente «mañana» o «amanecer». «Mañanas» es la opción más directa y transparente en español, aunque se conserva la posible ambigüedad astronómica/calendárica del término.
theological_decisions:
- issue: Si suavizar o conservar la comparación repetida «día de día / noche de noche»
  english_pob_reading: Retain the comparative structure while rendering it naturally in English.
  chosen_spanish_reading: 'Conservar la estructura gradual y comparativa: «de día en día» / «de noche en noche».'
  alternative_spanish_readings:
  - día tras día
  - cada día más largo y cada noche más corta
  rationale: El pasaje pertenece al Libro Astronómico y describe un esquema medido de variación de la duración del día y de la noche. Mantener la estructura repetitiva respeta mejor la forma del texto fuente que una paráfrasis más libre.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Cómo reflejar el término final ጽባሕ
  english_pob_reading: Or 'until thirty dawns.'
  chosen_spanish_reading: «hasta treinta mañanas» con posibilidad implícita de ‘amaneceres’
  alternative_spanish_readings:
  - hasta treinta amaneceres
  - hasta treinta auroras
  rationale: El término puede referir tanto a mañanas como a amaneceres. «Mañanas» es más literal y suficientemente transparente; al mismo tiempo, no elimina la posibilidad de un conteo lumínico o astronómico.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa más reciente volvió a una formulación más natural («from day to day» / «from night to night») y las revisiones previas aclararon que la comparación se hace entre días y noches concretos, no como sustantivos abstractos. La redacción española conserva esa comparación gradual con una fórmula idiomática equivalente y mantiene la ambigüedad controlada de «mañanas» para ጽባሕ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - No se introduce «Cristo» ni terminología doctrinal ajena al pasaje.
  - «Mañanas» se deja en plural para reflejar el conteo del original y no normalizarlo a un simple marcador temporal.
