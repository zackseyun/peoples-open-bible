id: 2CH.2.9
reference: 2 Chronicles 2:9
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה לַֽ/חֹטְבִ֣ים לְֽ/כֹרְתֵ֣י הָ/עֵצִ֡ים נָתַתִּי֩ חִטִּ֨ים מַכּ֜וֹת לַ/עֲבָדֶ֗י/ךָ כֹּרִים֙ עֶשְׂרִ֣ים אֶ֔לֶף וּ/שְׂעֹרִ֕ים כֹּרִ֖ים עֶשְׂרִ֣ים אָ֑לֶף וְ/יַ֗יִן בַּתִּים֙ עֶשְׂרִ֣ים אֶ֔לֶף וְ/שֶׁ֕מֶן בַּתִּ֖ים עֶשְׂרִ֥ים אָֽלֶף׀׀׀׃פ
translation:
  text: And behold[a], for the woodcutters, the cutters of the trees, I have given to your servants twenty thousand kors of crushed wheat, and twenty thousand kors of barley, and twenty thousand baths of wine[c][b], and twenty thousand baths of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'wheat as food' or 'crushed/beaten wheat'; the Hebrew expression is unusual.
    reason: lexical_alternative
  - marker: b
    text: A kor is an ancient dry measure.
    reason: cultural_note
  - marker: c
    text: A bath is an ancient liquid measure.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Now behold
  - Look
  lexicon: HALOT
  rationale: Retains the discourse-marking and attention-directing force of הִנֵּה rather than omitting it. 'And behold' is slightly formal but still readable and reflects the Hebrew connective plus deictic particle.
- source_word: לַחֹטְבִים לְכֹרְתֵי הָעֵצִים
  chosen: for the woodcutters, the cutters of the trees
  alternatives:
  - for the woodcutters who cut the timber
  - for the hewers, the cutters of wood
  lexicon: HALOT
  rationale: The Hebrew uses two near-synonymous participial expressions in apposition for emphasis/specification. The translation preserves both rather than collapsing them into a single phrase. 'Trees' is the literal object of הָעֵצִים, though in context it refers to timber.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have provided
  lexicon: HALOT
  rationale: The perfect verb naturally conveys a completed commitment in the letter context. English present perfect fits the epistolary/reporting sense better than a simple present.
- source_word: חִטִּים מַכּוֹת
  chosen: beaten wheat
  alternatives:
  - wheat as food
  - crushed wheat
  - wheat, a beating
  lexicon: HALOT
  rationale: מַכּוֹת is difficult but commonly understood as processed/beaten wheat, likely wheat prepared for consumption rather than seed grain. This follows the plain contextual sense in a provisions list. Because the expression is unusual, an alternative is preserved in a footnote.
- source_word: לַעֲבָדֶיךָ
  chosen: to your servants
  alternatives:
  - for your servants
  - to your workers
  lexicon: HALOT
  rationale: The preposition can be rendered 'for' or 'to'; 'to your servants' fits the giving language directly. 'Servants' is preferred over 'workers' because עֲבָדִים is the lexical term used, though these servants are functioning as laborers.
- source_word: כֹּרִים
  chosen: kors
  alternatives:
  - cors
  lexicon: HALOT
  rationale: A dry measure is best transliterated rather than converted into speculative modern units in the main text. Standard English transliteration 'kor' with plural 'kors' preserves the ancient measure.
- source_word: בַּתִּים
  chosen: baths
  alternatives:
  - bats
  lexicon: HALOT
  rationale: A liquid measure is transliterated to preserve the source-culture unit. 'Baths' is the standard English form for בַּת.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: In this provisioning context the referent is likely olive oil, but the Hebrew says simply 'oil.' The more general rendering avoids adding specificity not explicit in the text.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יַיִן; no contextual reason to vary.
- source_word: עֶשְׂרִים אֶלֶף
  chosen: twenty thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number preserved literally for each commodity.
