theological_decisions:
- issue: Whether to render πορνεία/πορνεύω literally or as a more interpretive metaphor such as 'adultery' or 'idolatry'
  chosen_reading: Retain the sexual-immorality language in the main text
  alternative_readings:
  - idolatry
  - spiritual adultery
  rationale: Revelation intentionally uses sexual immorality imagery to depict corrupt political, economic, and religious alliance. Rendering it literally preserves the metaphorical tension rather than resolving it into a single interpretive category.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
