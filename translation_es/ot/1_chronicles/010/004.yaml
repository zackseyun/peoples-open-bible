translation:
  language: es
  text: 'Entonces Saúl dijo a su escudero[a]: «Saca tu espada y traspásame con ella, para que no vengan estos incircuncisos[b] y me maltraten[c]». Pero su escudero no quiso, porque tenía mucho miedo. Entonces Saúl tomó la espada y cayó sobre ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «portador de sus armas»; literalmente, «el que llevaba sus armas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «estos incircuncisos».
    reason: lexical_alternative
  - marker: c
    text: O «se burlen de mí», «me hagan burla» o «me traten vergonzosamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - el que llevaba sus armas
  - su portaarmas
  lexicon: HALOT
  rationale: En contexto militar, el idiomа designa al servidor que porta el equipo/armas del jefe. «Escudero» es natural en español y comunica bien la función, aunque no reproduce de forma literal la composición hebrea.
- source_word: שְׁלֹף
  english_pob_choice: Draw
  chosen_spanish: Saca
  alternatives_spanish:
  - Desenvaina
  - Extrae
  lexicon: HALOT
  rationale: El verbo pide una acción concreta sobre la espada. «Saca» es idiomático y claro en español; «desenvaina» sería igualmente posible, pero algo más específico de la funda.
- source_word: וְדָקְרֵנִי בָהּ
  english_pob_choice: and thrust me through with it
  chosen_spanish: y traspásame con ella
  alternatives_spanish:
  - y traspásame con la espada
  - y piérdeme con ella
  lexicon: HALOT
  rationale: דקר expresa atravesar o herir de un modo penetrante y mortal. «Traspásame» preserva esa fuerza mejor que «hiéreme», y evita suavizar el acto.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español, «para que no» expresa con naturalidad la prevención de un resultado temido. Conserva el sentido final/precautorio del hebreo.
- source_word: הָעֲרֵלִים הָאֵלֶּה
  english_pob_choice: these uncircumcised men
  chosen_spanish: estos incircuncisos
  alternatives_spanish:
  - estos incircuncisos hombres
  - estos incircuncisos de aquí
  - estos filisteos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «estos incircuncisos», una designación polemizante. Se conserva sin añadir «hombres» para no atenuar ni expandir el insulto; el contexto ya identifica al grupo.
- source_word: וְהִתְעַלְּלוּ בִי
  english_pob_choice: and mistreat me
  chosen_spanish: y me maltraten
  alternatives_spanish:
  - y se burlen de mí
  - y me hagan burla
  - y me traten vergonzosamente
  lexicon: HALOT
  rationale: El hitpael comunica trato abusivo y humillante; «maltraten» recoge bien esa amplitud sin forzar una especificación no presente en el texto.
- source_word: וְלֹא אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  lexicon: HALOT
  rationale: אָבָה expresa voluntad/consentimiento. «No quiso» es breve, natural y fiel al sentido de no dar su consentimiento.
- source_word: כִּי יָרֵא מְאֹד
  english_pob_choice: because he was very afraid
  chosen_spanish: porque tenía mucho miedo
  alternatives_spanish:
  - porque estaba muy asustado
  - porque temía mucho
  lexicon: HALOT
  rationale: La frase explica la razón de su negativa. «Tenía mucho miedo» mantiene la intensificación de מְאֹד en español corriente y digno.
- source_word: וַיִּפֹּל עָלֶיהָ
  english_pob_choice: fell on it
  chosen_spanish: se arrojó sobre ella
  alternatives_spanish:
  - cayó sobre ella
  - se dejó caer sobre ella
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «cayó sobre ella», en español la acción de Saúl al suicidarse se expresa con más naturalidad y claridad como «se arrojó sobre ella», sin alterar el hecho narrado.
theological_decisions:
- issue: La designación despectiva «estos incircuncisos»
  english_pob_reading: these uncircumcised men
  chosen_spanish_reading: estos incircuncisos
  alternative_spanish_readings:
  - estos incircuncisos hombres
  - estos filisteos
  - estos no circuncidados
  rationale: Se conserva el lenguaje polemizante del hebreo sin sustituirlo por el etnónimo, porque el texto enfatiza la identidad religiosa/covenantal percibida por Saúl. Añadir «hombres» o «filisteos» sería explicativo; «no circuncidados» suaviza la carga idiomática.
  doctrine_reference: Translation philosophy §1, §3
- issue: El verbo de daño en la cláusula final
  english_pob_reading: fell on it
  chosen_spanish_reading: se arrojó sobre ella
  alternative_spanish_readings:
  - cayó sobre ella
  - se lanzó sobre ella
  rationale: El hebreo narra el acto final de Saúl de forma breve. En español, «se arrojó sobre ella» comunica la intención fatal de manera directa, aunque reconoce implícitamente una acción más deliberada que el simple desplazamiento físico.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el último estado del POB inglés, que cambió «abuse me» por «mistreat me» para una formulación más formal y menos específica. En español se refleja con «maltraten», manteniendo la amplitud semántica y el tono sobrio. También se preserva la fuerza del insulto ritual «incircuncisos» y se adapta el final narrativo con una equivalencia natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Escudero» se emplea como equivalente funcional de armor-bearer en contexto militar.
  - Se mantiene el registro sobrio y narrativo, sin añadir explicaciones históricas que no estén en el texto.
  - La puntuación reproduce comillas españolas y el discurso directo de forma clara.
