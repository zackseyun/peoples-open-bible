translation:
  language: es
  text: El tirano seguía luchando[a], pero el mundo y la vida de la humanidad observaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «El tirano estaba contendiendo; pero el mundo y la vida de la humanidad observaban». El verbo griego expresa una lucha o contienda continuada, sin complemento explícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el déspota
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος en griego helenístico tiene carga negativa de gobernante opresor. «Tirano» conserva esa fuerza moral y retórica en español sin atenuarla.
- source_word: ἀντηγωνίζετο
  english_pob_choice: kept struggling
  chosen_spanish: seguía combatiendo
  alternatives_spanish:
  - seguía contendiendo
  - seguía luchando
  - se oponía
  lexicon: LSJ
  rationale: El imperfecto marca acción continua. «Seguía combatiendo» transmite bien la duración y la oposición activa en español natural, sin añadir un objeto explícito que el griego no expresa.
- source_word: ὁ δὲ κόσμος
  english_pob_choice: but the world
  chosen_spanish: pero el mundo
  alternatives_spanish:
  - y el mundo
  - ahora el mundo
  lexicon: LSJ
  rationale: δέ introduce contraste o transición. «Pero el mundo» conserva el cambio de escena y la oposición discursiva del griego.
- source_word: ὁ τῶν ἀνθρώπων βίος
  english_pob_choice: the life of mankind
  chosen_spanish: la vida de la humanidad
  alternatives_spanish:
  - la vida humana
  - la vida de los hombres
  - el modo de vida humano
  lexicon: LSJ
  rationale: La expresión es colectiva y algo elevada. «La vida de la humanidad» mantiene el alcance general de ἀνθρώπων y el tono amplio/personificado de βίος.
- source_word: ἐθεώρει
  english_pob_choice: were watching
  chosen_spanish: observaban
  alternatives_spanish:
  - miraban
  - contemplaban
  - presenciaban
  lexicon: LSJ
  rationale: El imperfecto indica observación continua. En español, un verbo plural en imperfecto comunica de forma natural la vigilancia o contemplación sostenida del sujeto compuesto.
theological_decisions:
- issue: Personificación de «el mundo» y «la vida de la humanidad» como observadores
  english_pob_reading: Retain the personified imagery in the main text.
  chosen_spanish_reading: Mantener la imagen personificada en el texto principal.
  alternative_spanish_readings:
  - 'Expresarlo de forma más abstracta: «el mundo de la vida humana observaba»'
  rationale: El griego presenta la escena como un espectáculo visible para el orden creado y la existencia humana. Conservar la personificación reproduce la fuerza retórica sin añadir doctrina ajena.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Objeto implícito de ἀντηγωνίζετο
  english_pob_reading: 'Leave the verb absolute: ''The tyrant kept struggling''.'
  chosen_spanish_reading: Dejar el verbo sin complemento explícito.
  alternative_spanish_readings:
  - Añadir un complemento contextual como «contra ellos»
  rationale: El griego no expresa el objeto; el contexto lo sugiere, pero no debe imponerse en la traducción. El español puede conservar esa apertura con un verbo intransitivo en imperfecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente, que retiró cualquier objeto implícito añadido al verbo ἀντηγωνίζετο porque no está expresado en el griego. Por eso el español mantiene el verbo sin complemento explícito y conserva el imperfecto aspectual con una formulación natural.
  spanish_consistency_notes:
  - Se mantuvo «tirano» para τύραννος por su carga negativa documentada.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no pertinente; no hay vocabulario cristológico o divino en este versículo.
  - «Mundo» y «vida de la humanidad» se dejaron en paralelo para conservar la personificación y la simetría del griego.
  - La nota al pie marca la única alternativa lexical relevante y no introduce un objeto no expresado en el texto griego.
