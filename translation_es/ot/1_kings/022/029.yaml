translation:
  language: es
  text: Así que el rey de Israel y Josafat, rey de Judá, subieron a Ramot de Galaad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  - marcharon hacia arriba
  lexicon: HALOT
  rationale: עלה conserva el idiomático de movimiento ascendente hacia un lugar elevado. En español, «subieron» transmite ese valor direccional de manera natural y fiel, sin añadir explícitamente la idea militar que el contexto puede sugerir pero que el verbo no obliga por sí mismo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - rey de Israel
  - el monarca de Israel
  lexicon: HALOT
  rationale: Se mantiene el título genérico del hebreo sin sustituirlo por el nombre propio, conservando el estilo narrativo y la referencia titulada del original.
- source_word: וִיהוֹשָׁפָט
  english_pob_choice: and Jehoshaphat
  chosen_spanish: y Josafat
  alternatives_spanish:
  - y Jehosafat
  - y Yehosafat
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma usual en español bíblico, «Josafat», para máxima inteligibilidad sin perder la identidad del personaje.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  - monarca de Judá
  lexicon: HALOT
  rationale: El hebreo coloca el título en aposición al nombre propio; en español, la forma apposicional sin artículo repetido resulta más fluida y conserva la relación sintáctica del original.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot Galaad
  lexicon: topónimo bíblico tradicional en español
  rationale: Se conserva el nombre del lugar con forma española transparente. «De Galaad» expresa el compuesto toponímico de manera natural en español, equivalente funcional del guion inglés.
translation_notes:
  revision_awareness: El texto fuente, la traducción inglesa auditada y la revisión más reciente muestran total acuerdo; no se detectan variantes textuales ni decisiones revisionales pendientes para este versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usó «rey de Judá» en aposición para seguir la sintaxis breve del hebreo, sin alterar el sentido.
  - Se eligió «subieron» para preservar el valor direccional de עלה y evitar una lectura demasiado interpretativa.
