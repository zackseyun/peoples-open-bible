    rationale: El marcador [a] está sobre «casa del rey», pero en la auditoría el equivalente de la nota a pertenece a שָׁמְעוֹ («su fama» como alternativa). El marcador [b] está sobre «provincias», aunque la nota necesaria allí en realidad corresponde al modismo final «iba creciendo cada vez más».
  - severity: medium
    issue: Falta una nota para el modismo final הוֹלֵךְ וְגָדוֹל
    rationale: La POB inglesa preserva explícitamente la explicación de este hebraísmo. Dado que el español lo vierte idiomáticamente, conviene mantener la nota explicativa para transparencia lexical.
