translation:
  language: es
  text: En verdad[a], la luz de los impíos se apaga, y la llama de su fuego no resplandece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la chispa de su fuego no resplandece». El hebreo שְׁבִיב puede significar «chispa» además de «llama».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Indeed
  chosen_spanish: En verdad
  alternatives_spanish:
  - También
  - Ciertamente
  - Aun
  lexicon: HALOT
  rationale: La partícula introduce la afirmación con énfasis, no como simple adición. «En verdad» comunica ese valor enfático de manera natural en español y conserva el tono poético.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  lexicon: HALOT
  rationale: Se mantiene la imagen básica de «luz», usada aquí de modo metafórico para la condición o prosperidad del impío, sin interpretarla más allá del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malos
  lexicon: HALOT
  rationale: «Impíos» conserva el valor moral y religioso del término hebreo y es un equivalente natural en español bíblico, sin suavizar la fuerza del plural sustantivado.
- source_word: יִדְעָךְ
  english_pob_choice: is put out
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - se apaga y desaparece
  - se consume
  lexicon: HALOT
  rationale: El verbo expresa la extinción de una luz; «se apaga» es idiomático en español y preserva la pasividad del hebreo sin introducir un agente explícito.
- source_word: יִגַּהּ
  english_pob_choice: shine
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - da luz
  - fulge
  lexicon: HALOT
  rationale: El verbo se refiere a emitir luz. «Resplandece» mantiene el registro poético y encaja bien con la paralelismo de la línea.
- source_word: שְׁבִיב
  english_pob_choice: flame
  chosen_spanish: la llama
  alternatives_spanish:
  - la chispa
  - el resplandor
  - la centella
  lexicon: HALOT
  rationale: El hebreo puede significar «chispa» o «llama». Aquí se eligió «llama» por su fluidez en español y por ajustarse al paralelismo con «su fuego», sin perder la imagen ígnea.
- source_word: אִשּׁוֹ
  english_pob_choice: his fire
  chosen_spanish: su fuego
  alternatives_spanish:
  - el fuego de él
  - su hoguera
  - su lumbre
  lexicon: HALOT
  rationale: Se conserva la imagen de «fuego» con sufijo posesivo, como en el hebreo. «Su fuego» es directo y no introduce un objeto distinto como «lámpara».
theological_decisions:
- issue: Si el término hebreo debe intensificarse como juicio moral o mantenerse como imagen poética de extinción de luz
  english_pob_reading: the light of the wicked is put out, and the flame of his fire does not shine
  chosen_spanish_reading: la luz de los impíos se apaga, y la llama de su fuego no resplandece
  alternative_spanish_readings:
  - la vida de los impíos se acaba, y la chispa de su fuego no brilla
  - la prosperidad de los impíos se extingue
  rationale: El hebreo conserva la metáfora de luz/fuego; la traducción española debe mantener esa imagen sin convertirla en una interpretación explícita de «vida» o «prosperidad», aunque esa sea una implicación posible del contexto.
  doctrine_reference: Poética bíblica y metáfora de luz como estado de vida/prosperidad; cf. uso figurado de luz en Sabiduría/Salmos
translation_notes:
  revision_awareness: Se siguió la lectura aprobada del POB en inglés y su nota léxica sobre שְׁבִיב. No hay revisiones aplicadas ni divergencias textuales en el pasaje base; la versión española conserva la misma estructura y la misma imagen poética del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo»/«Mesías» por no ser pertinente.
  - Se mantuvo el paralelismo luz/fuego del hebreo y no se sustituyó por una interpretación abstracta.
  - «Los impíos» preserva el plural sustantivado con registro bíblico natural en español.
