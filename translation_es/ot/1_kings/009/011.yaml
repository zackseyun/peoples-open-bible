    issue: La nota dice que berosh es incierto, mientras el anclaje [a] aparece en 'cedro' y no en 'ciprés'.
    rationale: Esto replica el anclaje del POB inglés, pero en español la nota describe la segunda madera ('ciprés'), no la primera ('cedro'). No impide la comprensión y no exige corrección si se está siguiendo el anclaje heredado del expediente inglés.
