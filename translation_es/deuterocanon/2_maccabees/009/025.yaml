translation:
  language: es
  text: Además[a], considerando a los gobernantes vecinos y a los que lindan con el reino, que están atentos a las oportunidades y esperan lo que sucederá, he nombrado a mi hijo Antíoco como rey, a quien, cuando subía repetidas veces a las satrapías superiores, muchas veces encomendé y recomendé a la mayoría de ustedes[b]. Y le he escrito lo que está escrito abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los gobernantes vecinos y los que están contiguos al reino». El griego acumula descripciones geopolíticas que se solapan para enfatizar las potencias circundantes.'
    reason: lexical_alternative
  - marker: b
    text: «Satrapías superiores» conserva el término administrativo persa del griego; puede referirse de manera amplia a las provincias del interior o del oriente, no solo a «provincias» en sentido general.
    reason: cultural_note
lexical_decisions:
- source_word: κατανοῶν
  english_pob_choice: considering
  chosen_spanish: considerando
  alternatives_spanish:
  - observando
  - tomando nota de
  lexicon: LSJ
  rationale: El participio introduce la justificación de la acción real; «considerando» expresa mejor el examen reflexivo que una simple percepción visual.
- source_word: τοὺς παρακειμένους δυνάστας
  english_pob_choice: the rulers nearby
  chosen_spanish: los gobernantes vecinos
  alternatives_spanish:
  - los gobernantes cercanos
  - los poderes vecinos
  lexicon: LSJ
  rationale: δυνάστας alude a gobernantes o potentados políticos; «vecinos» conserva la proximidad espacial de παρακειμένους sin perder el tono geopolítico.
- source_word: γειτνιῶντας τῆς βασιλείας
  english_pob_choice: those bordering the kingdom
  chosen_spanish: a los que lindan con el reino
  alternatives_spanish:
  - a los que limitan con el reino
  - a los vecinos del reino
  lexicon: LSJ
  rationale: El participio funciona casi como sustantivo y describe a quienes colindan con el reino; «lindan con» es natural en español y mantiene la idea de contigüidad.
- source_word: τοῖς καιροῖς ἐπέχοντας
  english_pob_choice: who are watching for opportunities
  chosen_spanish: que están atentos a las ocasiones
  alternatives_spanish:
  - que esperan el momento oportuno
  - que acechan las coyunturas
  lexicon: LSJ
  rationale: La expresión sugiere vigilancia estratégica ante oportunidades; «ocasiones» preserva el valor de καιρός como momento oportuno, sin reducirlo a cronología.
- source_word: προσδοκῶντας τὸ ἀποβησόμενον
  english_pob_choice: awaiting what will happen
  chosen_spanish: y esperan lo que sucederá
  alternatives_spanish:
  - y aguardan el desenlace
  - y esperan el resultado
  lexicon: LSJ
  rationale: El giro apunta a la expectativa del desenlace; «lo que sucederá» mantiene la apertura del futuro sin añadir más contenido del que ofrece el griego.
- source_word: ἀναδέδειχα
  english_pob_choice: I have appointed
  chosen_spanish: he nombrado
  alternatives_spanish:
  - he designado
  - he proclamado
  lexicon: LSJ
  rationale: En contexto de sucesión real, el verbo señala una designación formal para el cargo; «nombrado» es claro y fiel en español.
- source_word: τὸν υἱὸν Ἀντίοχον βασιλέα
  english_pob_choice: my son Antiochus as king
  chosen_spanish: rey a mi hijo Antíoco
  alternatives_spanish:
  - a mi hijo Antíoco como rey
  - a mi hijo Antíoco rey
  lexicon: LSJ
  rationale: La construcción acusativa con predicado acusa la investidura en la realeza; en español, «rey a mi hijo Antíoco» conserva la función del complemento sin sonar rígido.
- source_word: ἀνατρέχων εἰς τὰς ἄνω σατραπίας
  english_pob_choice: when I repeatedly went up to the upper satrapies
  chosen_spanish: cuando subía repetidas veces a las satrapías superiores
  alternatives_spanish:
  - cuando iba repetidas veces a las satrapías superiores
  - cuando ascendía repetidas veces a las satrapías superiores
  lexicon: LSJ
  rationale: Se conserva el término técnico «satrapías» y el valor de ἄνω como «superiores»; «subía repetidas veces» refleja la iteración del participio.
- source_word: παρεκατετίθεμην
  english_pob_choice: I often entrusted
  chosen_spanish: encomendé
  alternatives_spanish:
  - confié
  - puse al cuidado de
  lexicon: LSJ
  rationale: El medio indica poner a alguien bajo cuidado o tutela; aquí «encomendé» resume bien la idea de confiar a la protección de otros, en coordinación con «recomendé» en la cláusula siguiente.
- source_word: συνίστων
  english_pob_choice: commended
  chosen_spanish: recomendé
  alternatives_spanish:
  - presenté
  - elogí
  lexicon: LSJ
  rationale: El verbo expresa presentar favorablemente o recomendar a alguien; «recomendé» evita una repetición extraña y distingue la acción de encomendar de la cláusula anterior.
- source_word: τὰ ὑπογεγραμμένα
  english_pob_choice: the things written below
  chosen_spanish: lo que se incluye abajo
  alternatives_spanish:
  - lo que está escrito abajo
  - las cosas escritas abajo
  lexicon: LSJ
  rationale: La frase remite al contenido que sigue inmediatamente; «se incluye abajo» conserva el tono documental y suena natural en español actual.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete y el audit trail en inglés. No se detectaron revisiones sustanciales aplicadas en el historial reciente; la solución mantiene la tensión semántica entre los dos descriptores geopolíticos (vecinos/lindan) y conserva el tecnicismo «satrapías» con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - «Mesías/Cristo» no aplica aquí.
  - Se preserva el matiz político de δυνάστας como «gobernantes» y no como fuerza abstracta.
  - «Encomendé» y «recomendé» se distinguen para reflejar los dos verbos griegos relacionados pero no idénticos.
  - El cierre documental «lo que se incluye abajo» busca ser claro para lectura pública sin perder el valor de referencia al texto siguiente.
