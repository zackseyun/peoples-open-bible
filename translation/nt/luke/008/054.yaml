theological_decisions:
- issue: Rendering Jesus' address to the girl
  chosen_reading: Child
  alternative_readings:
  - Girl
  - Little girl
  rationale: The verse itself uses παῖς, which can denote a child generally or specifically a girl in context. 'Child' preserves the lexical breadth and tenderness without importing wording from parallel accounts. No doctrinal issue is at stake, but the choice avoids harmonization.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the resurrection command
  chosen_reading: get up
  alternative_readings:
  - arise
  - rise
  rationale: The command should remain a straightforward imperative without archaic elevation. This preserves the miracle's force while following the project's readable modern English aim.
  doctrine_reference: Translation philosophy §6
