translation:
  language: es
  text: Daniel[a], y no hay otro aparte de ti. Y lo sacó. Pero a los responsables de su destrucción los arrojó al pozo[b], y fueron devorados al instante delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego comienza de forma abrupta con «Daniel, y no hay otro aparte de ti», probablemente como continuación del discurso previo; algunas traducciones suavizan esto añadiendo palabras como «dijo el rey».
    reason: textual_variant
  - marker: b
    text: O «al foso». La palabra griega significa literalmente «pozo», aunque el contexto es el pozo de los leones.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν πλὴν σοῦ ἄλλος
  english_pob_choice: there is no other besides you
  chosen_spanish: no hay otro fuera de ti
  alternatives_spanish:
  - no hay nadie más excepto tú
  - no existe otro sino tú
  lexicon: LSJ
  rationale: La construcción griega expresa exclusividad; en español, «no hay otro fuera de ti» conserva el énfasis sin sonar artificial. Mantiene la fuerza de alabanza dirigida a Daniel.
- source_word: ἀνέσπασεν
  english_pob_choice: pulled ... up
  chosen_spanish: lo sacó
  alternatives_spanish:
  - lo levantó
  - lo arrastró hacia arriba
  lexicon: LSJ
  rationale: El verbo implica sacar o tirar hacia arriba desde abajo. En este contexto del pozo, «lo sacó» comunica bien el resultado vertical sin sobrecargar la frase.
- source_word: τοὺς ... αἰτίους
  english_pob_choice: those responsible for
  chosen_spanish: los responsables de
  alternatives_spanish:
  - los culpables de
  - los causantes de
  lexicon: LSJ
  rationale: αἴτιος puede significar responsable, culpable o causante. «Los responsables de» conserva agencia y culpabilidad de manera natural en español.
- source_word: τῆς ἀπωλείας αὐτοῦ
  english_pob_choice: his destruction
  chosen_spanish: su destrucción
  alternatives_spanish:
  - su ruina
  - su muerte
  lexicon: LSJ
  rationale: ἀπώλεια designa destrucción o ruina. «Su destrucción» sigue de cerca el valor amplio del griego sin precisar más de lo que el texto dice.
- source_word: ἐνέβαλεν εἰς τὸν λάκκον
  english_pob_choice: threw ... into the pit
  chosen_spanish: los arrojó al pozo
  alternatives_spanish:
  - los echó al pozo
  - los arrojó a la fosa
  lexicon: LSJ
  rationale: λάκκος es literalmente «pozo» o «fosa». Se prefiere «pozo» para conservar el valor léxico básico del griego y evitar importar «foso/fosa» como traducción tradicional no obligada aquí.
- source_word: κατεβρώθησαν
  english_pob_choice: were devoured
  chosen_spanish: fueron devorados
  alternatives_spanish:
  - fueron comidos
  - fueron consumidos
  lexicon: LSJ
  rationale: El pasivo expresa que fueron comidos/devorados. «Fueron devorados» es idiomático, fuerte y fiel al efecto narrativo.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: al instante
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: LSJ
  rationale: El adverbio marca inmediatez. «Al instante» es natural en español y conserva la urgencia del griego.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: La frase significa literalmente «delante de él / en su presencia». «Delante de él» resulta claro y directo en español, manteniendo el marco narrativo.
theological_decisions:
- issue: Apertura abrupta del testimonio griego en Swete
  english_pob_reading: Translate the surviving clause as direct praise to Daniel followed by the rescue and punishment sequence, without supplying missing introductory words in the main text.
  chosen_spanish_reading: Traducir la cláusula conservada como alabanza directa a Daniel, seguida de la liberación y del castigo, sin añadir en el texto principal palabras introductorias que el testimonio no conserva.
  alternative_spanish_readings:
  - '«Y el rey dijo: Daniel...»'
  - «Daniel, dijo él, y no hay otro...»
  rationale: El griego conservado comienza de forma abrupta, probablemente como continuación del habla anterior. Para respetar la fuente, la traducción no inventa un verbo de habla ni identifica explícitamente al hablante en el texto principal; esa incertidumbre queda sugerida por la nota.
  doctrine_reference: Primacía de la fuente original y honestidad ante la incertidumbre textual.
translation_notes:
  revision_awareness: 'Se revisó el estilo para mantener una equivalencia óptima con el griego de Swete: se preservó la apertura abrupta, la secuencia narrativa y el valor literal de λάκκος como «pozo», sin depender de la tradición castellana de «fosa/foso» salvo como alternativa anotada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este pasaje no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en este versículo.
  - «pozo» se mantiene por fidelidad léxica a λάκκος; «fosa» queda solo como alternativa de nota.
  - «devorados» conserva el matiz fuerte del pasivo griego y es coherente con el contexto leonino.
  - La puntuación reproduce la parataxis abrupta del testimonio griego sin forzar una reestructuración sintáctica.
