translation:
  language: es
  text: 'Declaren esto en la casa de Jacob[a], y háganlo oír en Judá, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclámenlo en Judá». El verbo hebreo significa literalmente «háganlo oír».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare
  chosen_spanish: Declaren
  alternatives_spanish:
  - Digan
  - Anuncien
  lexicon: HALOT
  rationale: El imperativo plural de נגד pide una proclamación pública y formal. «Declaren» conserva mejor ese tono de anuncio solemne que «digan», sin perder naturalidad en español.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - ello
  lexicon: HALOT
  rationale: El demostrativo neutro se expresa naturalmente como «esto», que mantiene la referencia anticipada al mensaje que sigue.
- source_word: בְּבֵית יַעֲקֹב
  english_pob_choice: in the house of Jacob
  chosen_spanish: en la casa de Jacob
  alternatives_spanish:
  - entre la casa de Jacob
  - a la casa de Jacob
  lexicon: HALOT
  rationale: La preposición ב se rinde de forma directa con «en». «La casa de Jacob» conserva el sentido colectivo y pactal de la expresión hebrea.
- source_word: וְהַשְׁמִיעוּהָ
  english_pob_choice: and proclaim it
  chosen_spanish: y háganlo oír
  alternatives_spanish:
  - y proclámenlo
  - y anúncienlo
  lexicon: HALOT
  rationale: El verbo hiphil de שמע significa literalmente «causar que sea oído». «Háganlo oír» preserva esa fuerza causal que el inglés POB anotó, sin borrar la posibilidad de un sentido proclamativo.
- source_word: בִיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - por Judá
  - en todo Judá
  lexicon: HALOT
  rationale: La preposición ב se traduce con «en»; «Judá» mantiene el nombre propio geográfico y político del texto.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: La fórmula quotativa se vierte de manera transparente con «diciendo:», que introduce con claridad el contenido del anuncio.
translation_notes:
  revision_awareness: El texto base en inglés y el cotejo de revisión muestran alta concordancia y no requieren cambios sustantivos; la versión española sigue el mismo juicio léxico central, especialmente en el valor causativo de וְהַשְׁמִיעוּהָ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Casa de Jacob» conserva el valor corporativo del hebreo, sin convertirlo en una paráfrasis sociológica.
  - Se evita «SEÑOR» por la política terminológica del proyecto, aunque no sea pertinente en este versículo.
  - «Háganlo oír» preserva la tensión entre proclamación y causatividad que el audit trail inglés documenta.
