translation:
  language: es
  text: ¿Quién me pondrá una guardia en mi boca[a], y un sello prudente sobre mis labios, para que no caiga a causa de ella, y mi lengua no me destruya?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un sello astuto sobre mis labios’. El adjetivo griego puede tener un matiz negativo (‘astuto, taimado’) o positivo/neutral (‘prudente, sagaz’); aquí se entiende como una restricción eficaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς δώσει μοι
  english_pob_choice: Who will set for me / Who will set
  chosen_spanish: ¿Quién me pondrá...
  alternatives_spanish:
  - ¿Quién me dará...
  - ¿Quién me colocará...
  lexicon: LSJ
  rationale: El griego dice literalmente ‘¿quién me dará?’, pero con el objeto metafórico (‘guardia’, ‘sello’) el español natural pide ‘poner’ o ‘colocar’. ‘Pondrá’ conserva la fuerza petitionaria sin sonar forzado.
- source_word: φυλακήν
  english_pob_choice: a guard
  chosen_spanish: una guardia
  alternatives_spanish:
  - una vigilancia
  - una custodia
  - un guardia
  lexicon: LSJ
  rationale: φυλακή puede referirse a una guardia, vigilancia o custodia. ‘Guardia’ mantiene la imagen concreta de una protección puesta sobre la boca.
- source_word: σφραγῖδα
  english_pob_choice: a seal
  chosen_spanish: un sello
  alternatives_spanish:
  - un sello de cierre
  - una marca
  - un anillo-sello
  lexicon: LSJ
  rationale: ‘Sello’ conserva la metáfora corporal de algo que cierra o asegura los labios, sin sustituirla por una explicación interpretativa.
- source_word: πανοῦργον
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - astuto
  - cauto
  - sabio
  lexicon: LSJ
  rationale: πανοῦργος puede tener matiz negativo (‘astuto, taimado’) o positivo/neutral (‘diestro, sagaz, prudente’). Aquí modifica un sello pedido para contener el habla; en español ‘prudente’ expresa mejor una restricción sabia y eficaz sin importar malicia.
- source_word: ἵνα μὴ πέσω ἀπʼ αὐτῆς
  english_pob_choice: so that I may not fall because of it
  chosen_spanish: para que no caiga por causa de ella
  alternatives_spanish:
  - para no caer por ella
  - para que no tropiece por ella
  - para que no caiga a causa de ella
  lexicon: LSJ
  rationale: El griego usa un pronombre femenino que retoma la imagen inmediata del sello/guardia. ‘Por causa de ella’ mantiene la relación causal sin forzar la referencia en español.
- source_word: ἡ γλῶσσά μου ἀπολέσῃ με
  english_pob_choice: my tongue destroy me
  chosen_spanish: mi lengua no me destruya
  alternatives_spanish:
  - mi lengua no me arruine
  - mi lengua no me haga perecer
  - mi lengua no me pierda
  lexicon: LSJ
  rationale: ἀπόλλυμι admite ‘destruir, arruinar, hacer perecer’. ‘Destruya’ conserva la fuerza del verbo y el paralelismo con la advertencia sobre el habla destructiva.
theological_decisions:
- issue: Valor de πανοῦργον aplicado al sello
  english_pob_reading: Rendered positively/neutral as 'prudent seal'
  chosen_spanish_reading: ‘sello prudente’
  alternative_spanish_readings:
  - sello astuto
  - sello hábil
  - sello sagaz
  rationale: La petición es por autocontrol del habla, no por engaño moral. Traducir πανοῦργον con un término positivo/neutral evita importar una carga ética negativa que el contexto no exige, a la vez que preserva la tensión del adjetivo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source sense without importing doctrinal or moral claims not made by the text.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que sustituyó ‘shrewd’ por ‘prudent’ para πανοῦργον. Se mantuvo esa decisión en español con ‘prudente’, y se conservó el sentido causal de ἀπʼ αὐτῆς con ‘por causa de ella’.
  spanish_consistency_notes:
  - Se prefirió ‘guardia’ para φυλακή y ‘sello’ para σφραγῖδα por su transparencia metafórica.
  - Se evitó ‘SEÑOR’ u otras convenciones no pertinentes, pues este versículo no contiene el nombre divino.
  - ‘Lengua’ se mantuvo literal para ἡ γλῶσσά μου, preservando la imagen del poder destructivo del habla.
  - La nota al pie conserva la ambigüedad de πανοῦργον, como exige el audit trail, pero la línea principal opta por la lectura positiva/neutral más reciente.
