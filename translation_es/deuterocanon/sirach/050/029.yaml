review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: condición general, referencia anafórica a «estas cosas», fortaleza/capacidad ante todo, y la metáfora final de la luz divina con nota para el sentido más concreto de ἴχνος. Sin embargo, hay una pequeña tensión discursiva: abrir con «Porque, si...» y luego usar «pues» en la segunda cláusula recarga innecesariamente los conectores causales. Además, πρὸς πάντα ἰσχύσει queda algo más natural en español como «ante todo» que «frente a todo» en un registro sapiencial.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. «Yahvé» sigue la política del proyecto. «Su senda» funciona bien para el cuerpo del texto, y la nota preserva adecuadamente «huella/rastro/pisada». La mejora necesaria es de estilo y fluidez: simplificar la doble causalidad y afinar la preposición para que el verso suene más natural sin perder precisión.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Κυρίου -> «Yahvé» según la convención principal, φῶς -> «luz», ἴχνος -> «senda» con nota lexical alternativa. No hay conflictos teológicos mayores ni desviaciones de glosario.'
  issues:
  - severity: medium
    issue: Doble conector explicativo en «Porque, si...; pues...»
    rationale: El griego tiene γὰρ al inicio y ὅτι introduciendo la explicación final. En español, reproducir ambos como conectores fuertes («Porque» ... «pues») suena pesado. Es preferible «Porque ... porque ...» o bien omitir la coma tras «Porque» y usar una secuencia más fluida.
  - severity: low
    issue: «frente a todo» es aceptable pero menos idiomático que «ante todo» en este contexto
    rationale: πρὸς πάντα ἰσχύσει expresa fortaleza/eficacia respecto de cualquier cosa. «Ante todo» conserva bien esa relación y suena más natural en español bíblico moderno que «frente a todo», que puede sentirse más espacial o confrontacional.
  revised_spanish_text: Porque si uno hace estas cosas, será fuerte ante todo[a], porque la luz de Yahvé es su senda.
  revised_footnotes:
  - marker: a
    text: 'Griego más literalmente: «su huella», «su rastro» o «su pisada».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y la cohesión del español sin alterar el sentido: «ante todo» expresa mejor πρὸς πάντα en este registro, y la secuencia «Porque ... porque ...» evita la combinación algo pesada de «Porque, si...» con «pues». La nota se conserva intacta porque documenta adecuadamente la literalidad de ἴχνος.'
