    text: 'O «En otro tiempo en Israel, cuando un hombre iba a buscar a Dios, decía: “Vengan, vayamos al vidente”».'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de estilo en el discurso directo: «Vengan y vayamos» suena más natural en español que «Vengan, y vayamos», mientras preserva la doble exhortación del hebreo. Se mantuvo el resto de la redacción porque es fiel al sentido fuente y a las decisiones léxicas documentadas.'
