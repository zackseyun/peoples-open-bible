    reason: cultural_note
  revision_rationale: Se conserva la redacción general del borrador, pero se fortalece la cláusula final para reflejar mejor la viveza corporal de ῥήξει y alinearla con el audit trail inglés («it will not burst you open»). No se requieren cambios doctrinales ni estructurales.
