    issue: La expresión 'Jonatán iba con él en custodia' es poco idiomática en español.
    rationale: Aunque refleja literalmente 'in custody', en español normalmente se dice que una persona va 'bajo custodia', 'bajo guardia' o 'presa'. 'En custodia' suele usarse más para objetos o para construcciones jurídicas menos naturales en narrativa.
