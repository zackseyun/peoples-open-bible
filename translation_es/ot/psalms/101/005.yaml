translation:
  language: es
  text: Quien calumnia en secreto a su prójimo[a], a ese destruiré; al de ojos altivos y corazón orgulloso[b], no lo podré soportar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que calumnia a su prójimo en secreto, a ese cortaré».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de ojos altos y de corazón amplio», un modismo hebreo para una mirada arrogante y una disposición interior orgullosa.'
    reason: cultural_note
lexical_decisions:
- source_word: מלושני
  english_pob_choice: Whoever secretly slanders
  chosen_spanish: Quien calumnia en secreto
  alternatives_spanish:
  - El que calumnia en secreto
  - Quien habla mal en secreto
  lexicon: HALOT
  rationale: El sustantivo participial hebreo nombra al que practica calumnia/maledicencia. En español, «calumnia» transmite con más fuerza la idea de maledicencia dañina que un simple «hablar mal», y conserva el peso ético del término.
- source_word: בַסֵּתֶר
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: HALOT
  rationale: La expresión indica acción oculta. «En secreto» es natural en español y mantiene la idea de ocultamiento sin añadir matices innecesarios.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  lexicon: HALOT
  rationale: «Prójimo» es una equivalencia amplia y bíblicamente reconocible para el miembro cercano de la comunidad, y en este contexto evita limitar el sentido a la proximidad física de «vecino».
- source_word: אַצְמִית
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - cortaré de raíz
  - exterminaré
  lexicon: HALOT
  rationale: El verbo intensivo expresa causar destrucción o hacer perecer. «Destruiré» comunica la severidad del hebreo con claridad y sin forzar una concreción penal no explicitada.
- source_word: גְּבַהּ עֵינַיִם
  english_pob_choice: with haughty eyes
  chosen_spanish: de ojos altivos
  alternatives_spanish:
  - de ojos soberbios
  - de mirada altiva
  lexicon: HALOT
  rationale: El hebreo conserva la imagen concreta de la postura/rostro orgulloso. «De ojos altivos» preserva esa metáfora y su sentido moral de arrogancia.
- source_word: וּרְחַב לֵבָב
  english_pob_choice: and a proud heart
  chosen_spanish: y corazón orgulloso
  alternatives_spanish:
  - y corazón soberbio
  - y de corazón amplio
  lexicon: HALOT
  rationale: La expresión idiomática hebrea no sugiere generosidad aquí, sino autosuficiencia y arrogancia. «Corazón orgulloso» mantiene el valor idiomático sin oscurecerlo para el lector moderno.
- source_word: לֹא אוּכָל
  english_pob_choice: I cannot endure
  chosen_spanish: no lo soportaré
  alternatives_spanish:
  - no lo podré tolerar
  - no lo aguantaré
  lexicon: HALOT
  rationale: La construcción expresa incapacidad o rechazo de tolerar a esa persona. «No lo soportaré» conserva la fuerza personal y el tono de resolución del original.
theological_decisions:
- issue: Alcance del juicio contra el malhechor
  english_pob_reading: The speaker declares personal resolve to remove and refuse arrogant and slanderous persons from his presence or realm, without specifying the exact mechanism beyond strong judgment language.
  chosen_spanish_reading: El hablante declara su resolución personal de apartar y no tolerar a los calumniadores y soberbios, sin precisar el medio exacto del castigo más allá del lenguaje fuerte del versículo.
  alternative_spanish_readings:
  - Declaración de ejecución literal de tales personas
  - Rechazo meramente social o relacional sin juicio real
  rationale: El hebreo presenta un lenguaje de juicio severo, pero no define el procedimiento. La traducción conserva esa fuerza sin restringir indebidamente el alcance a una sanción específica ni rebajarlo a mera distancia social.
  doctrine_reference: Salmos 101:5; cf. el tono real-ético del salmo
- issue: Idiomas hebreos de orgullo
  english_pob_reading: Literally 'high of eyes and broad of heart,' a Hebrew idiom for an arrogant look and a proud inner disposition.
  chosen_spanish_reading: Se mantiene el valor idiomático de la imagen corporal y interior como señal de soberbia.
  alternative_spanish_readings:
  - ojos elevados y corazón ancho
  - mirada orgullosa y disposición soberbia
  rationale: La imagen hebrea une postura externa e ինտención interna. «Ojos altivos» y «corazón orgulloso» preservan ambas dimensiones sin borrar la tensión entre literalidad e idiomatismo.
  doctrine_reference: Proverbios 6:17; 21:4; Salmos 101:5
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el paquete; la coincidencia de revisión más reciente indica que el texto fuente y la línea auditada inglesa permanecen estables, por lo que la propuesta española sigue de cerca el sentido ya validado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícitamente no requerido aquí, pues el versículo no contiene el tetragrámaton.
  - Se prefirió «prójimo» para רֵעֵהוּ por amplitud comunitaria y por coherencia bíblica en español.
  - Se conservó el paralelismo sintáctico del hebreo con dos miembros y objeto pronominal reforzado («a ese...»).
  - La solución evita «siervo»/«sirviente» porque no corresponde al léxico del versículo.
  - Se preservó la tensión entre la imagen literal y el sentido idiomático en «ojos altivos» y «corazón orgulloso».
