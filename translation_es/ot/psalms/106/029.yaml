  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal no es glosarial sino sintáctica y exegética: el objeto implícito de וַיַּכְעִיסוּ debe expresarse en español como «lo» o dejarse sin clítico; «los» es inadecuado. La nota léxica alternativa para בְּמַעַלְלֵיהֶם puede mantenerse.'
