translation:
  language: es
  text: Observa el mes de Abib[a], y guarda la Pascua a Yahvé tu Dios, porque en el mes de Abib Yahvé tu Dios te sacó de Egipto de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abib es el nombre del mes asociado con el grano que madura temprano; alternativamente, «el mes de la primavera».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמוֹר
  english_pob_choice: Observe
  chosen_spanish: Observa
  alternatives_spanish:
  - Guarda
  - Vigila
  lexicon: HALOT
  rationale: El imperativo pide atención cuidadosa a una obligación calendárico-cultual. 'Observa' comunica bien la idea de acatar y prestar atención sin perder la fuerza normativa del hebreo.
- source_word: חֹדֶשׁ הָאָבִיב
  english_pob_choice: the month of Abib
  chosen_spanish: el mes de Abib
  alternatives_spanish:
  - el mes de Aviv
  - la primavera
  lexicon: HALOT
  rationale: En este contexto legal y festivo, el hebreo funciona como designación calendárica. Mantener 'Abib' preserva la referencia específica al mes; 'primavera' sería más interpretativo y perdería la precisión del calendario.
- source_word: וְעָשִׂיתָ פֶּסַח
  english_pob_choice: and keep the Passover
  chosen_spanish: y guarda la Pascua
  alternatives_spanish:
  - y celebra la Pascua
  - y haz la Pascua
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'hacer la Pascua', en español 'guardar la Pascua' transmite mejor la observancia ritual sin sonar artificial. 'Celebrar' es posible, pero suaviza el tono mandatorio del texto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Yahvé
  lexicon: HALOT
  rationale: La preposición ל aquí expresa orientación/dedicación de la acción al Señor del pacto. 'Para Yahvé' es natural en español y conserva esa orientación cultual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: הוֹצִיאֲךָ
  english_pob_choice: brought you out
  chosen_spanish: te sacó
  alternatives_spanish:
  - te hizo salir
  - te llevó fuera
  lexicon: HALOT
  rationale: El causativo del éxodo se expresa de forma natural en español con 'sacar'. 'Te sacó' mantiene claridad y el sentido redentor del evento.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: Con el verbo 'sacó', la expresión 'de Egipto' resulta idiomática y fiel. El sentido de separación y salida ya queda incluido en el verbo.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: La circunstancia temporal del éxodo se expresa de manera natural con 'de noche', sin introducir matices ajenos al hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio divino en transliteración española estándar del Tetragrámaton, evitando la sustitución por un título y manteniendo la transparencia textual del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de חֹדֶשׁ הָאָבִיב como designación calendárica
  english_pob_reading: the month of Abib
  chosen_spanish_reading: el mes de Abib
  alternative_spanish_readings:
  - la primavera
  - el mes de la primavera
  rationale: El contexto de mandato festivo y memoria del éxodo favorece tratar la expresión como nombre/etiqueta del mes, no como simple estación. Así se preserva la precisión histórica y litúrgica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes: la revisión más reciente indica que no hubo modificaciones y el control cruzado reporta alta concordancia. La versión española conserva la decisión de mantener Abib como designación calendárica y Yahvé como nombre divino.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera uniforme para יהוה.
  - '''Pascua'' se usa como nombre ritual establecido, mientras que ''guardar'' refleja la observancia cultual exigida por el imperativo hebreo.'
  - '''Abib'' permanece sin traducir en el cuerpo principal para conservar la especificidad del calendario israelita.'
  - La frase final 'de noche' reproduce de forma natural el valor temporal del hebreo לָיְלָה.
