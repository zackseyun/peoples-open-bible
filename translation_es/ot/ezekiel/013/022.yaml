  text: יַ֣עַן הַכְא֤וֹת לֵב צַדִּיק֙ שֶׁ֔קֶר וַ/אֲנִ֖י לֹ֣א הִכְאַבְתִּ֑י/ו וּ/לְ/חַזֵּק֙ יְדֵ֣י רָשָׁ֔ע לְ/בִלְתִּי שׁ֛וּב מִ/דַּרְכּ֥/וֹ הָ/רָ֖ע לְ/הַחֲיֹתֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/013/022.yaml
  text: Because you have grieved the heart of the righteous with falsehood[a], though I had not grieved him, and have strengthened the hands of the wicked so that he does not turn from his evil way to preserve his life[b],
  footnotes:
