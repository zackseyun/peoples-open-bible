translation:
  language: es
  text: Hay quien compra mucho por poco[a], y lo[b] paga siete veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es muy conciso y admite dos matices: alguien compra muchas cosas por poco, y luego paga siete veces más; o bien un aparente buen negocio resulta finalmente muy costoso.'
    reason: alternative_reading
  - marker: b
    text: 'El griego dice literalmente «ellas/ellas cosas» o «esas cosas» en plural. En español, «lo» puede expresar colectivamente lo comprado o su costo, pero también podría traducirse más literalmente: «y las paga siete veces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Existe quien
  lexicon: LSJ
  rationale: La fórmula existencial introduce un tipo de persona o caso proverbial. «Hay quien» suena natural en español y conserva el valor impersonal sin volverlo más explícito de lo que permite el griego.
- source_word: ἀγοράζων
  english_pob_choice: buys
  chosen_spanish: compra
  alternatives_spanish:
  - adquiere
  - compra en el mercado
  lexicon: LSJ
  rationale: El participio indica comprar/adquirir. «Compra» mantiene la imagen comercial de forma directa y idiomática.
- source_word: πολλὰ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - muchas cosas
  - una gran cantidad
  lexicon: LSJ
  rationale: El plural neutro funciona aquí con sentido adverbial o cuantitativo. «Mucho» reproduce la concisión proverbial sin añadir objeto explícito innecesario.
- source_word: ὀλίγου
  english_pob_choice: for little
  chosen_spanish: por poco
  alternatives_spanish:
  - a bajo precio
  - por una cantidad pequeña
  lexicon: LSJ
  rationale: El genitivo con valor de precio se expresa naturalmente en español con «por poco». Conserva el contraste entre mucho y poco y el tono sentencioso.
- source_word: ἀποτιννύων
  english_pob_choice: repays
  chosen_spanish: lo paga
  alternatives_spanish:
  - lo repaga
  - paga de vuelta
  lexicon: LSJ
  rationale: El verbo puede significar pagar lo debido o retribuir. En este contexto proverbial, «lo paga» expresa con claridad la idea de compensar o sufrir el costo posterior.
- source_word: αὐτὰ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - las
  lexicon: LSJ
  rationale: Aunque el pronombre es plural en forma, el referente se entiende colectivamente como la operación/compra o su costo. En español, el singular neutro «lo» comunica mejor esa referencia colectiva sin forzar el plural.
- source_word: ἑπταπλάσιον
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces más
  - siete pliegues
  lexicon: LSJ
  rationale: La idea es una retribución multiplicada por siete. «Siete veces» conserva la densidad proverbial y es más natural en español que «sietefold» o fórmulas arcaizantes.
translation_notes:
  revision_awareness: El texto griego es breve y proverbial, y el audit trail inglés ya señala la compresión semántica del segundo hemistiquio. Mantengo esa concisión en español, evitando explicitar más de lo que el griego y la traducción inglesa documentan. También conservo el juego de contraste económico sin convertirlo en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se eligió «Yahvé» solo cuando el texto base lo requiera; aquí no aplica.
  - Se preserva el tono proverbial y comercial con vocabulario simple y directo.
  - No se introduce una equivalencia doctrinal adicional; el versículo funciona como sentencia sapiencial sobre costo oculto.
