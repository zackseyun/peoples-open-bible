translation:
  language: es
  text: También el altar que estaba en Betel —el alto lugar que había hecho Jeroboam hijo de Nabat, el que hizo pecar a Israel—, hasta ese altar y el lugar alto los derribó. Quemó el lugar alto, lo hizo polvo y quemó la Asherá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el poste de Asherá»; el término hebreo puede referirse al objeto de culto asociado con la adoración de Asherá.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: מִזְבֵּחַ designa de forma directa un altar; en español 'altar' es el equivalente transparente y suficiente. 'Altar sacrificial' explicita de más una idea que no exige el hebreo.
- source_word: בְּבֵית אֵל
  english_pob_choice: at Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Betel
  - a Betel
  lexicon: HALOT
  rationale: La preposición hebrea con nombre de lugar funciona naturalmente como ubicación. En español, 'en Betel' conserva la localización sin forzar una expresión idiomática artificial.
- source_word: הַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: el alto lugar
  alternatives_spanish:
  - el lugar alto
  - el santuario
  lexicon: HALOT
  rationale: Bָמָה es un término cultual técnico. Se mantiene la correspondencia literal 'alto lugar' para no borrar la terminología histórica y religiosa; 'santuario' sería más interpretativo.
- source_word: עָשָׂה
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había construido
  lexicon: HALOT
  rationale: El verbo hebreo es genérico ('hacer'); 'había hecho' sigue de cerca la relación temporal del texto. 'Construido' introduciría una especificación no garantizada por el verbo.
- source_word: הֶחֱטִיא אֶת־יִשְׂרָאֵל
  english_pob_choice: who caused Israel to sin
  chosen_spanish: el que hizo pecar a Israel
  alternatives_spanish:
  - el que causó que Israel pecara
  - el que llevó a Israel al pecado
  lexicon: HALOT
  rationale: El causativo de חטא requiere fuerza causal. 'Hizo pecar' es una formulación natural en español y conserva la responsabilidad activa de Jeroboam sin suavizarla.
- source_word: הַמִּזְבֵּחַ הַהוּא
  english_pob_choice: even that altar
  chosen_spanish: aquel altar
  alternatives_spanish:
  - ese mismo altar
  - ese altar
  lexicon: HALOT
  rationale: La repetición enfática de גַּם en el hebreo ya había presentado el objeto; 'aquel altar' conserva la referencia demostrativa y la distancia enfática, mientras que la duplicación en español puede sonar pesada.
- source_word: נָתָץ
  english_pob_choice: he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - lo derribó
  - lo demolió
  lexicon: HALOT
  rationale: El verbo expresa demolición o derribo de una estructura. 'Derribó' es breve, natural y suficientemente fuerte para la acción descrita.
- source_word: וַיִּשְׂרֹף אֶת־הַבָּמָה
  english_pob_choice: He burned the high place
  chosen_spanish: Quemó el alto lugar
  alternatives_spanish:
  - Incendió el alto lugar
  - Quemó aquel lugar alto
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el hebreo y con la terminología cultual previa. El sujeto implícito en la secuencia narrativa se entiende sin necesidad de repetirlo en español.
- source_word: הֵדַק לְעָפָר
  english_pob_choice: crushed it to dust
  chosen_spanish: lo deshizo hasta hacerlo polvo
  alternatives_spanish:
  - lo pulverizó hasta polvo
  - lo molió hasta hacerlo polvo
  lexicon: HALOT
  rationale: El verbo expresa pulverización; en español, 'deshizo hasta hacerlo polvo' comunica el resultado sin forzar un giro demasiado técnico. 'Polvo' corresponde al לְעָפָר del hebreo.
- source_word: אֲשֵׁרָה
  english_pob_choice: the Asherah
  chosen_spanish: la Asherá
  alternatives_spanish:
  - la Asherah
  - el poste de Asherá
  lexicon: HALOT
  rationale: Se conserva el término transliterado para mantener la ambigüedad documentada entre deidad y objeto cultual, y para evitar resolverla en la línea principal. La forma acentuada ayuda a la lectura en español.
theological_decisions:
- issue: Sentido de אֲשֵׁרָה
  english_pob_reading: the Asherah (likely the cult object; footnote notes possible pole/object sense)
  chosen_spanish_reading: la Asherá[a]
  alternative_spanish_readings:
  - el poste de Asherá
  - la imagen de Asherá
  rationale: El contexto de destrucción favorece un objeto de culto, pero el hebreo conserva una ambigüedad relevante. Mantener la transliteración evita cerrar indebidamente el sentido y preserva la tensión léxica documentada por el POB inglés.
  doctrine_reference: Preservar ambigüedad léxica documentada; no resolver una tensión textual sin necesidad.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente movió la relativa ''who caused Israel to sin'' para que modifique más naturalmente a Jeroboam; en español se refleja ya con ''el que hizo pecar a Israel'', manteniendo la misma relación sintáctica y el orden enfático del versículo. Se conservó la secuencia de acciones: derribó, quemó, deshizo hasta polvo y quemó la Asherá.'
  spanish_consistency_notes:
  - Se mantiene 'Betel' como topónimo bíblico estándar.
  - Se usa 'alto lugar' para בָּמָה de manera consistente con el valor cultual técnico.
  - No se sustituye 'Asherá' por 'poste sagrado' en el texto principal para no resolver la ambigüedad del hebreo.
  - '''Hizo pecar'' preserva la fuerza causativa del hebreo sin sobreinterpretar.'
  - La puntuación con guiones largos reproduce el énfasis acumulativo del original y del inglés auditado.
