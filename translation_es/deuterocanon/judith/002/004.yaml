translation:
  language: es
  text: 'Y sucedió que, cuando hubo terminado su plan[a], Nabucodonosor, rey de los asirios, llamó a Holofernes, el comandante en jefe[b] de sus fuerzas, que era segundo después de él[c], y le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su consejo» o «su propósito» para τὴν βουλὴν αὐτοῦ.
    reason: lexical_alternative
  - marker: b
    text: O «el general» para ἀρχιστράτηγον, aunque el griego sugiere el cargo militar más alto.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «siendo segundo después de él», lo que indica que Holofernes estaba inmediatamente debajo del rey en rango.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: La fórmula narrativa griega se reproduce de manera natural en español con «Y sucedió», que conserva el valor de transición sin caer en un calco demasiado rígido ni en un arcaísmo innecesario.
- source_word: ὡς συνετέλεσεν
  english_pob_choice: when he had finished
  chosen_spanish: cuando hubo terminado
  alternatives_spanish:
  - después de haber terminado
  - cuando terminó
  lexicon: BDAG
  rationale: El aoristo con ὡς marca el momento en que ocurre la acción siguiente; «cuando hubo terminado» preserva bien la secuencia y el matiz de completitud.
- source_word: τὴν βουλὴν αὐτοῦ
  english_pob_choice: his plan
  chosen_spanish: su plan
  alternatives_spanish:
  - su consejo
  - su propósito
  - su decisión
  lexicon: BDAG
  rationale: En este contexto militar-político, «plan» comunica de forma clara la intención previa. Otras opciones como «consejo» o «propósito» son posibles, pero menos naturales aquí.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar a
  lexicon: BDAG
  rationale: «Llamó» sigue de cerca el verbo base y mantiene la sencillez de la fórmula. «Mandó llamar a» sería más explicativo, pero no necesario por el contexto.
- source_word: βασιλεὺς Ἀσσυρίων
  english_pob_choice: king of the Assyrians
  chosen_spanish: rey de los asirios
  alternatives_spanish:
  - rey asirio
  lexicon: BDAG
  rationale: Se conserva la estructura appositiva y la designación étnica explícita, como en el inglés auditado.
- source_word: ἀρχιστράτηγον
  english_pob_choice: the commander-in-chief
  chosen_spanish: el comandante en jefe
  alternatives_spanish:
  - el general
  - el supremo comandante
  lexicon: BDAG
  rationale: «Comandante en jefe» expresa mejor el rango militar supremo que «general», y evita perder la fuerza jerárquica del término griego.
- source_word: τῆς δυνάμεως αὐτοῦ
  english_pob_choice: of his forces
  chosen_spanish: de sus fuerzas
  alternatives_spanish:
  - de su ejército
  - de su poder
  lexicon: BDAG
  rationale: Aquí δύναμις tiene sentido militar; «fuerzas» mantiene esa amplitud y resulta natural en español.
- source_word: δεύτερον ὄντα μετʼ αὐτόν
  english_pob_choice: who was second after him
  chosen_spanish: que era segundo después de él
  alternatives_spanish:
  - que ocupaba el segundo lugar después de él
  - siendo el segundo después de él
  lexicon: BDAG
  rationale: La frase subraya la jerarquía inmediata debajo del rey. «Segundo después de él» es una traducción cercana y clara en español contemporáneo.
- source_word: καὶ εἶπεν πρὸς αὐτόν
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y habló con él
  lexicon: BDAG
  rationale: La fórmula de introducción del discurso se expresa de manera directa y idiomática con «le dijo».
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios textuales relevantes; la versión española conserva la secuencia narrativa, el valor jerárquico de los cargos militares y la ambigüedad léxica de βουλή y ἀρχιστράτηγος con notas alternativas.
  spanish_consistency_notes:
  - Se mantuvo «rey de los asirios» para conservar la apposición del griego.
  - Se prefirió «Y sucedió» por fluidez y fidelidad narrativa en español.
  - Se evitó traducir δύναμις por «poder» porque el contexto exige sentido militar.
  - La nota c conserva la información de rango sin alterar el texto principal.
