translation:
  language: es
  text: En un momento puedo hablar acerca de una nación y acerca de un reino[a], para arrancar, derribar y destruir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra una nación y contra un reino'. La preposición puede entenderse de modo más adversativo a la luz de los verbos de juicio que siguen.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶגַע
  english_pob_choice: At one moment
  chosen_spanish: En un momento
  alternatives_spanish:
  - De inmediato
  - En un instante
  - Repentinamente
  lexicon: HALOT
  rationale: רֶגַע señala un instante o momento breve. 'En un momento' conserva la referencia temporal sin volverla demasiado literaria ni añadir una sensación de súbita adición que el hebreo no exige.
- source_word: אֲדַבֵּר
  english_pob_choice: I may speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - puedo hablar
  - yo hablaré
  - diré
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí expresa una acción enunciativa general o situacional. En español, el futuro simple transmite bien la formulación general y suena natural en un oráculo; se evita un 'puede que hable' que añadiría una duda modal no obligada por el hebreo.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Con דבר, עַל introduce el tema del anuncio. 'Acerca de' mantiene esa relación temática, mientras que la carga adversativa queda disponible por los verbos de juicio que siguen; por eso no se fija de entrada como 'contra' en el texto principal.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación pagana
  - gentil
  lexicon: HALOT
  rationale: '''Nación'' es el equivalente contextual más natural para una entidad política bajo juicio divino.'
- source_word: מַמְלָכָה
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reino soberano
  - dominio real
  - monarquía
  lexicon: HALOT
  rationale: '''Reino'' conserva el paralelismo político con ''nación'' y refleja el valor básico del término hebreo.'
- source_word: לִנְתוֹשׁ
  english_pob_choice: to uproot
  chosen_spanish: arrancar
  alternatives_spanish:
  - desarraigar
  - arrancar de raíz
  - arrancar y sacar
  lexicon: HALOT
  rationale: El verbo describe quitar como se saca una planta. 'Arrancar' comunica la imagen con naturalidad en español; 'desarraigar' sería posible, pero puede sonar más interpretativo.
- source_word: לִנְתוֹץ
  english_pob_choice: to tear down
  chosen_spanish: derribar
  alternatives_spanish:
  - demoler
  - desmantelar
  - tumbar
  lexicon: HALOT
  rationale: El verbo se usa para demoler o tumbar estructuras. 'Derribar' es idiomático y conserva el sentido de destrucción material.
- source_word: וּלְהַאֲבִיד
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - hacer perecer
  - aniquilar
  - deshacer
  lexicon: HALOT
  rationale: El Hifil de אבד significa causar perecer. 'Destruir' es el verbo más claro y directo en esta secuencia de juicio.
theological_decisions:
- issue: Fuerza de la preposición עַל en un contexto de juicio
  english_pob_reading: concerning rather than against, with the adversative force left to the judgment verbs
  chosen_spanish_reading: acerca de, dejando la carga adversativa a los verbos siguientes
  alternative_spanish_readings:
  - contra
  - sobre
  - en cuanto a
  rationale: El hebreo permite leer עַל como introducción temática del oráculo. Dado que la secuencia verbal ya expresa claramente juicio, el texto principal evita adelantar una adversidad que no es necesaria para la sintaxis, aunque se conserva la alternativa en nota.
  doctrine_reference: Jer. 18:7–10; principio de lectura contextual de la preposición
- issue: Valor aspectual/modal de אֲדַבֵּר
  english_pob_reading: I may speak as a general or contingent action
  chosen_spanish_reading: hablaré como formulación general de un acto oracular
  alternative_spanish_readings:
  - puede que hable
  - hablo
  - diré
  rationale: El hebreo del pasaje presenta una proposición general sobre la actuación divina con las naciones. En español, el futuro simple mantiene la generalidad y la solemnidad profética sin añadir una duda que el original no impone.
  doctrine_reference: Jer. 18:7–10; filosofía de equivalencia óptima
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo consonante/vocalizado de WLC y el audit trail en inglés. Se mantuvo la estructura paralela 'nación / reino' y la tríada verbal de juicio; se evitó traducir mecánicamente la preposición עַל como 'contra' en el cuerpo principal porque el expediente inglés documenta una lectura temática con alternativa adversativa. No se reportan revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el nombre divino aparece; este versículo no lo contiene.
  - '''Nación'' y ''reino'' se conservaron como pares políticos paralelos, sin suavizar la dureza del juicio.'
  - Se eligieron verbos breves y concretos ('arrancar', 'derribar', 'destruir') para respetar la imaginería de despojo y demolición del hebreo.
