translation:
  language: es
  text: Así Moisés, Aarón y toda la congregación de los hijos de Israel hicieron con los levitas, conforme a todo lo que Yahvé había mandado a Moisés acerca de los levitas; así hicieron con ellos los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ / עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - efectuaron
  lexicon: HALOT
  rationale: עשה es un verbo amplio de ‘hacer’. Aquí resume la obediencia concreta de Israel a una instrucción previa; ‘hicieron’ conserva esa amplitud sin introducir una especificación ritual ajena al hebreo.
- source_word: עֲדַת
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: En el Pentateuco, עֵדָה designa al pueblo reunido como cuerpo del pacto. ‘Congregación’ mantiene ese sentido formal y comunitario mejor que ‘comunidad’.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión familiar masculina del hebreo. ‘Los hijos de Israel’ es natural en español bíblico y conserva mejor la forma del original que ‘israelitas’.
- source_word: לַ/לְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: para con los levitas
  alternatives_spanish:
  - a los levitas
  - para los levitas
  lexicon: HALOT
  rationale: La ל marca aquí a los levitas como destinatarios/afectados por la acción. ‘Para con’ comunica bien la relación de trato u operación dirigida hacia ellos, sin reducirla solo a beneficio.
- source_word: כְּ֠/כֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La frase expresa conformidad exacta con el mandamiento divino. ‘Conforme a todo lo que’ es fluido en español y conserva la fuerza de totalidad de כֹל.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: El mandato antecede a la acción narrada, por lo que el pluscuamperfecto ayuda a aclarar la secuencia. ‘Mandado’ mantiene el matiz de autoridad normativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton en la forma española estándar del proyecto, ‘Yahvé’, en vez de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה לַלְוִיִּם
  english_pob_choice: Moses concerning the Levites
  chosen_spanish: a Moisés acerca de los levitas
  alternatives_spanish:
  - a Moisés respecto de los levitas
  - a Moisés sobre los levitas
  lexicon: HALOT
  rationale: La construcción indica que el mandamiento de Yahvé dirigido a Moisés tenía como asunto a los levitas. ‘Acerca de’ conserva esa relación temática sin sobreinterpretarla.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de esa manera
  lexicon: HALOT
  rationale: כֵּן retoma la correspondencia exacta entre mandato y ejecución. ‘Así’ es natural y reproduce bien el enlace resumitivo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto español mantiene el nombre divino transliterado como ‘Yahvé’, preservando la identidad pactual del Dios de Israel en lugar de sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma masculina-familiar del hebreo por fidelidad léxica y por la política de precisión de género del proyecto, sin forzar neutralizaciones que borren la imagen del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota sin anclaje en el texto. Esta versión no incluye marcadores de nota al pie, de modo que no hay riesgo de desajuste entre texto y aparato.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de acuerdo con la terminología base del proyecto en español.
  - ‘Hijos de Israel’ conserva la correspondencia con el hebreo y es consistente con el tratamiento gender-accurate.
  - ‘Conforme a todo lo que’ y ‘así’ reproducen la reiteración de exactitud del hebreo sin añadir contenido interpretativo.
