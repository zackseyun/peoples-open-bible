  text: ὅταν δὲ ὑποταγῇ αὐτῷ τὰ πάντα, ⸀τότε αὐτὸς ὁ υἱὸς ὑποταγήσεται τῷ ὑποτάξαντι αὐτῷ τὰ πάντα, ἵνα ᾖ ὁ θεὸς ⸀πάντα ἐν πᾶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/028.yaml
  text: But when all things are subjected to him[a], then the Son himself will also be subjected to the one who subjected all things to him[b], so that God may be all in all.
  footnotes:
  - marker: a
    text: Or 'everything'; Greek repeatedly uses 'all things' (τὰ πάντα), preserving the cosmic scope of Paul's argument.
    reason: lexical_alternative
  - marker: b
    text: Or 'God may be everything in everyone.' The Greek expression is compact and can be rendered more literally as 'all things in all,' but 'all in all' best preserves its rhetorical force in English.
    reason: alternative_reading
translation:
  language: ko
  text: 모든 것이 그분께 복종되면, 그때에는 아들 자신도 모든 것을 자기에게 복종시키신 분께 복종하실 것이니, 이는 하나님께서 만유 안에 만유가 되시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「만유 안에 만유」는 헬라어 πάντα ἐν πᾶσιν의 직역에 가까운 표현으로, 「모든 것 안에 모든 것이 되심」을 가리키는 우주적 함의의 정형구다.
    reason: alternative_reading
