translation:
  language: es
  text: Además[a], yo también les alcé mi mano en el desierto, para dispersarlos entre las naciones y esparcirlos por las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les juré en el desierto». El hebreo dice literalmente: «les alcé mi mano», un modismo para hacer un juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Encima
  lexicon: HALOT
  rationale: En español, 'Además' transmite bien el valor aditivo y discursivo de apertura solemne que el inglés POB expresó con 'Moreover'. 'También' sería posible, pero suena más plano al inicio de una declaración profética.
- source_word: נָשָׂאתִי אֶת יָדִי
  english_pob_choice: I also raised my hand
  chosen_spanish: yo también alcé mi mano
  alternatives_spanish:
  - levanté mi mano
  - juré
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea concreta de alzar la mano, siguiendo la decisión del POB de mantener el modismo visible. 'Juré' explicita el sentido del juramento, pero borra la metáfora original.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: Con el modismo de juramento, el destinatario del gesto se entiende naturalmente en español con 'hacia ellos'. 'A ellos' también es posible, pero 'hacia' conserva mejor la dirección física del gesto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto seco
  - en la estepa
  lexicon: HALOT
  rationale: '''Desierto'' es el equivalente bíblico más natural y comprensible en español. ''Wilderness'' puede traducirse como ''desierto'' sin perder el trasfondo narrativo de la historia de Israel.'
- source_word: לְהָפִיץ
  english_pob_choice: to scatter
  chosen_spanish: para dispersarlos
  alternatives_spanish:
  - para esparcirlos
  - para esparcir
  lexicon: HALOT
  rationale: '''Dispersar'' conserva el sentido de juicio y distribución forzada que el verbo lleva en este contexto. Además evita una repetición mecánica con el verbo siguiente.'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones paganas
  lexicon: HALOT
  rationale: '''Naciones'' reproduce el uso bíblico estándar y evita introducir una carga confesional ajena. ''Entre'' expresa bien la distribución geográfica y social.'
- source_word: וּלְזָרוֹת
  english_pob_choice: and disperse
  chosen_spanish: y esparcirlos
  alternatives_spanish:
  - y dispersarlos
  - y aventarlos
  lexicon: HALOT
  rationale: Se eligió 'esparcirlos' para mantener el paralelismo con 'dispersarlos' sin repetir exactamente el mismo verbo. Así se conserva la relación semántica sin empobrecer el estilo español.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  lexicon: HALOT
  rationale: '''Tierras'' refleja el plural hebreo y su amplitud geográfica. ''Por'' comunica mejor la idea de extensión y esparcimiento a través de múltiples territorios.'
theological_decisions:
- issue: Cómo expresar el modismo de juramento 'I raised my hand' sin perder la imagen hebrea
  english_pob_reading: Preserve the idiom in the main text as 'I raised my hand'
  chosen_spanish_reading: Preservar el modismo en el texto principal como 'alcé mi mano'
  alternative_spanish_readings:
  - juré
  - levanté mi mano
  rationale: En español, 'alcé mi mano' mantiene la figura corporal y es natural. La alternativa interpretativa 'juré' se conserva implícitamente como sentido del modismo, pero no reemplaza la imagen original. Esto preserva la tensión léxica y el valor solemne del juramento.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y confirmó la lectura previa; por eso el español sigue la misma estrategia de preservar la imagen del juramento en el texto principal y explicar su sentido en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque el hebreo aquí no contiene el nombre divino explícito.
  - Se usa 'naciones' y 'tierras' para conservar el registro bíblico y el plural hebreo.
  - Se evita 'Señor' como sustituto del nombre divino, en coherencia con la política española del proyecto.
  - Se conserva la repetición paralela de dos verbos cercanos ('dispersarlos' / 'esparcirlos') para reflejar la intensificación poética del hebreo.
