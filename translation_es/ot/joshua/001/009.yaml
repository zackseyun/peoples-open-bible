translation:
  language: es
  text: ¿No te lo he mandado yo? Sé fuerte y valiente. No te aterres, ni desmayes, porque Yahvé[a] tu Dios está contigo por dondequiera que vayas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR»; alternativamente «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Have I not
  chosen_spanish: ¿No te lo he mandado yo?
  alternatives_spanish:
  - ¿Acaso no te he mandado yo?
  - ¿No te he ordenado?
  lexicon: HALOT
  rationale: La interrogativa retórica con negación exige en español una forma natural que conserve el tono enfático de recuerdo y comisión. «¿No te lo he mandado yo?» reproduce bien la fuerza exhortativa y el sujeto enfático implícito.
- source_word: צִוִּיתִיךָ
  english_pob_choice: commanded you
  chosen_spanish: te he mandado
  alternatives_spanish:
  - te he ordenado
  - te he encargado
  lexicon: HALOT
  rationale: צוה se expresa de manera directa como «mandar» en español bíblico contemporáneo. «Mandado» mantiene el tono de mandato sin volverse excesivamente formal o administrativo.
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Esfuérzate
  alternatives_spanish:
  - Sé fuerte
  - Fortalécete
  lexicon: HALOT
  rationale: Aunque el hebreo apunta a fortaleza/firmeza, en español la exhortación enlazada con «y valiente» fluye mejor como un llamado a esforzarse. «Esfuérzate» conserva la idea de resolverse con energía sin perder naturalidad.
- source_word: וֶאֱמָץ
  english_pob_choice: and courageous
  chosen_spanish: y sé valiente
  alternatives_spanish:
  - y sé animoso
  - y sé resuelto
  lexicon: HALOT
  rationale: אמץ en esta fórmula exhortativa funciona junto con חזק para expresar fortaleza con ánimo. «Sé valiente» es la correspondencia más clara y digna en español para el matiz de coraje.
- source_word: אַֽל תַּעֲרֹץ
  english_pob_choice: Do not be terrified
  chosen_spanish: No temas[a]
  alternatives_spanish:
  - No te aterres
  - No te espantes
  lexicon: HALOT
  rationale: El hebreo tiene un término más fuerte que el simple miedo, pero en español la repetición «No temas» encaja con el paralelismo bíblico y comunica la prohibición de ceder al terror; la nota preserva que el inglés POB entendió un matiz de terror.
- source_word: וְאַל תֵּחָת
  english_pob_choice: and do not be dismayed
  chosen_spanish: ni desmayes
  alternatives_spanish:
  - ni te desalientes
  - ni te derrumbes
  lexicon: HALOT
  rationale: חתת puede significar quedar abatido, quebrantado o desalentado. «Desmayes» es una equivalencia clásica y comprensible que mantiene la idea de flaquear interiormente sin introducir un matiz psicológico ajeno.
- source_word: עִמְּךָ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - va contigo
  - permanece contigo
  lexicon: HALOT
  rationale: La presencia divina se expresa de forma natural en español como «está contigo». Mantiene la sencillez y la cercanía del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al estándar del proyecto en español y para no ocultar el Tetragrámaton bajo un título. La forma es plenamente reconocible y publicable en español.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, tu Dios
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de manera directa y solemne como «tu Dios», preservando la relación de pacto y cercanía.
- source_word: בְּכֹל אֲשֶׁר תֵּלֵךְ
  english_pob_choice: wherever you go
  chosen_spanish: en todo lo que vayas
  alternatives_spanish:
  - dondequiera que vayas
  - por dondequiera que vayas
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva e idiomática. «En todo lo que vayas» sigue de cerca la estructura y mantiene el alcance total; es algo más literal que «dondequiera que vayas», pero sigue siendo natural en español bíblico.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el proyecto usa «Yahvé» para preservar el nombre personal del Dios de Israel y evitar la sustitución por un título. La forma respeta la decisión doctrinal y la inteligibilidad eclesial en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y no se detectaron revisiones aplicadas en la versión base. La redacción española conserva el paralelismo exhortativo, el nombre divino explícito y el matiz de presencia continua sin añadir material interpretativo no respaldado por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, conforme al estándar español del proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino para no ocultar el Tetragrámaton.
  - La pareja exhortativa se resolvió con verbos naturales en español («Esfuérzate y sé valiente») para preservar el tono imperativo sin calco rígido.
  - «No temas» refleja el campo semántico de terror/temor fuerte con una nota que preserva el matiz señalado por el POB inglés.
