base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/013.yaml
  text: He was with David at Pas-dammim[a], where the Philistines had gathered for battle. Now the plot of the field was full of barley[b], and the people fled from before the Philistines.
  footnotes:
  - marker: a
    text: Pas-dammim is a place name; compare the parallel account in 1 Samuel 17:1, which names the site Ephes-dammim.
    reason: cross_reference
  - marker: b
    text: Or 'fled before the Philistines.' The Hebrew idiom is literally 'fled from before the Philistines.'
    reason: lexical_alternative
