translation:
  language: es
  text: 'Entonces Joiadá, el sacerdote, sacó a los comandantes de cien, puestos al mando del ejército[a], y les dijo: «Sáquenla entre las filas, y a cualquiera que la siga, que sea muerto a espada». Porque el sacerdote había dicho: «No la maten en la casa de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el exterior de las filas»; la frase hebrea es difícil. Probablemente se refiere a sacar a Atalía por entre o a través de formaciones ordenadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - trajo fuera
  lexicon: HALOT
  rationale: El hilo causativo de יצא pide un verbo que exprese hacer salir. En español, «sacó» es natural y conserva la acción del sacerdote al convocarlos y hacerlos presentarse.
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: commanders of hundreds
  chosen_spanish: comandantes de cien
  alternatives_spanish:
  - capitanes de cien
  - comandantes de centena
  lexicon: HALOT
  rationale: La estructura hebrea es militar y numérica. «Comandantes de cien» mantiene la transparencia semántica sin introducir un término más histórico pero menos directo como «centuriones».
- source_word: פְּקוּדֵי הַחַיִל
  english_pob_choice: who were appointed over the army
  chosen_spanish: designados sobre el ejército
  alternatives_spanish:
  - nombrados sobre la tropa
  - encargados del ejército
  lexicon: HALOT
  rationale: פְּקוּדֵי expresa personas asignadas o puestas en un cargo. «Designados sobre el ejército» conserva esa idea oficial y evita suavizarla a un mero papel informal.
- source_word: הוֹצִיאוּהָ
  english_pob_choice: Bring her out
  chosen_spanish: Sáquenla
  alternatives_spanish:
  - Tráiganla fuera
  - Háganla salir
  lexicon: HALOT
  rationale: El imperativo plural con sufijo femenino singular refiere a Atalía. «Sáquenla» reproduce la orden directa en español natural.
- source_word: אֶל מִבֵּית הַשְּׂדֵרוֹת
  english_pob_choice: between the ranks
  chosen_spanish: entre las filas
  alternatives_spanish:
  - entre los rangos
  - hacia el exterior de las filas
  lexicon: HALOT
  rationale: La frase es difícil, pero el contexto militar favorece la idea de filas o formaciones. «Entre las filas» refleja la lectura principal adoptada por la POB en inglés.
- source_word: וְהַבָּא אַחֲרֶיהָ
  english_pob_choice: whoever follows after her
  chosen_spanish: al que venga después de ella
  alternatives_spanish:
  - quien la siga
  - cualquiera que venga tras ella
  lexicon: HALOT
  rationale: El participio הבא con אחריה apunta a alguien que viene detrás de ella. «Al que venga después de ella» mantiene el valor abierto e indefinido de la amenaza.
- source_word: יוּמַת בֶּחָרֶב
  english_pob_choice: let him be put to death with the sword
  chosen_spanish: mátenlo a espada
  alternatives_spanish:
  - sea puesto a muerte con espada
  - muera a espada
  lexicon: HALOT
  rationale: El hebreo expresa una orden ejecutiva formal. En español, «mátenlo a espada» conserva la fuerza imperativa y la imagen bélica, aunque con un registro algo más directo y natural.
- source_word: כִּי אָמַר הַכֹּהֵן
  english_pob_choice: For the priest had said
  chosen_spanish: Porque el sacerdote había dicho
  alternatives_spanish:
  - pues el sacerdote había dicho
  - porque había dicho el sacerdote
  lexicon: HALOT
  rationale: La cláusula explica la orden precedente. El pluscuamperfecto español refleja bien que la instrucción de fondo ya había sido dada.
- source_word: לֹא תְמִיתוּהָ
  english_pob_choice: Do not put her to death
  chosen_spanish: No la maten
  alternatives_spanish:
  - No la pongan a muerte
  - No la ejecuten
  lexicon: HALOT
  rationale: El hiphil de מות conserva la idea de hacer morir. «No la maten» es más idiomático en español, y el contexto de ejecución hace innecesaria una fórmula más técnica.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte por defecto como «Yahvé» según la terminología del proyecto. «Casa» mantiene el hebraísmo bíblico que el texto usa en lugar de una paráfrasis institucional como «templo».
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente יהוה. En coherencia con la norma del proyecto, se conserva el nombre divino en español como «Yahvé», en vez de enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tono de la orden de muerte
  english_pob_reading: let him be put to death with the sword
  chosen_spanish_reading: mátenlo a espada
  alternative_spanish_readings:
  - sea puesto a muerte con espada
  - que sea muerto a espada
  rationale: La fuente presenta una orden con valor ejecutivo, no una mera descripción. La forma española elegida conserva la severidad y el carácter inmediato del mandato.
  doctrine_reference: Contexto narrativo de ejecución en 2 Crónicas 23:14; sin disputa doctrinal específica
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo de 2 Crónicas 23:14 y se alineó con la auditoría inglesa de POB, manteniendo la decisión léxica principal sobre השְּׂדֵרוֹת como una referencia militar difícil que se puede entender como «filas». La traducción española conserva el nombre divino como Yahvé y mantiene el mandato de muerte con un registro directo y formal acorde al contexto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יהוה.
  - «Casa» se conservó en «casa de Yahvé» para reflejar בית יְהוָה sin sustituirlo por una paráfrasis eclesiástica.
  - «Comandantes de cien» y «filas» sostienen la imaginería militar del versículo.
  - La voz imperativa plural en español («Sáquenla») corresponde al plural hebreo.
