translation:
  language: es
  text: Porque sus propios ojos han visto toda la gran obra que Yahvé ha hecho.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus ojos, los que ven»; una manera enfática de decir que fueron testigos oculares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de lo dicho antes. En español, 'Porque' mantiene con naturalidad el valor causal/explanatorio del hebreo כִּי sin forzar una construcción más discursiva que el contexto no exige.
- source_word: עֵינֵיכֶם
  english_pob_choice: your own eyes
  chosen_spanish: tus propios ojos
  alternatives_spanish:
  - vuestros propios ojos
  - tus ojos
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente los 'ojos' como sujetos con énfasis. 'Tus propios ojos' reproduce ese énfasis testimonial de forma natural en español.
- source_word: הָרֹאֹת
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - son los que ven
  - ven
  lexicon: HALOT
  rationale: Aunque el hebreo usa un participio con fuerza atributiva/predicativa, la revisión inglesa ya reconoció que 'have seen' comunica mejor el sentido en una versión fluida. En español, 'han visto' conserva la idea de testigos oculares sin una construcción extraña.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: Con 'obra' en singular y sentido colectivo, 'toda' expresa la totalidad del acto divino de modo idiomático en español.
- source_word: מַעֲשֵׂה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - obra realizada
  - trabajo
  - hecho
  lexicon: HALOT
  rationale: '''Obra'' es el equivalente más natural para un acto total y significativo de Yahvé. Conserva el valor colectivo de lo realizado sin reducirlo a un simple ''hecho'' puntual.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la norma del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es el equivalente español auditable de יְהוָה.
- source_word: הַגָּדֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mighty
  lexicon: HALOT
  rationale: '''Gran'' funciona naturalmente antes de un sustantivo en español y conserva el matiz de magnitud del adjetivo hebreo.'
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he did
  chosen_spanish: que ha hecho
  alternatives_spanish:
  - que hizo
  - que realizó
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresarse en español con presente perfecto para resaltar el resultado aún vigente o relevante. 'Ha hecho' suena natural y mantiene el valor del acto ya cumplido.
theological_decisions:
- issue: Uso del nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo la decisión doctrinal del proyecto, se preserva el nombre divino en transliteración y no se lo oculta tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del participio hebreo הָרֹאֹת como testimonio ocular
  english_pob_reading: have seen
  chosen_spanish_reading: han visto
  alternative_spanish_readings:
  - son los que ven
  - han contemplado
  rationale: 'La fuerza del hebreo no es meramente visual sino testimonial: enfatiza que ellos fueron testigos oculares. ''Han visto'' comunica ese valor sin perder naturalidad en español.'
  doctrine_reference: Deuteronomy 11:7 lexical note on eyewitness emphasis
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente, que sustituyó una construcción más literal pero pesada por una formulación natural con perfecto (''have seen''). En español se adoptó el mismo principio: mantener el énfasis de testimonio ocular con una frase fluida y publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - '''Obra'' conserva el sentido colectivo de מַעֲשֵׂה sin introducir una connotación técnica ajena.'
  - No se añadió puntuación explicativa extra fuera de lo requerido por el énfasis textual.
  - La nota al pie marca la tensión estilística entre la literalidad del hebreo y la naturalidad del español.
