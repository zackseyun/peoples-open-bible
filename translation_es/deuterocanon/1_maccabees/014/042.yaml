- from: y que él fuera su comandante[a], y que tuviera cuidado del santuario, y que estableciera hombres sobre sus trabajos y sobre la tierra y sobre las armas y sobre las fortalezas.
  to: y que él fuera su comandante, y que tuviera cuidado del santuario[a], y que nombrara hombres a cargo de sus obras y del territorio y de las armas y de las fortalezas.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el término textualmente difícil («santuario»). Se reemplaza «estableciera hombres sobre» por «nombrara hombres a cargo de» para reflejar mejor el sentido administrativo de καθιστάναι ... ἐπὶ en español natural. Se cambia «sus trabajos» por «sus obras» para conservar mejor el valor de ἔργα en este contexto. «Territorio» mejora la fluidez administrativa respecto de «tierra» sin apartarse del sentido de χώρα.
