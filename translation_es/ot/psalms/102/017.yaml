revisions:
- from: Porque Yahvé ha construido Sion[a]; se ha aparecido en su gloria.
  to: Porque Yahvé ha construido Sion[a]; ha aparecido en su gloria.
  rationale: 'Se corrige únicamente el verbo principal de la segunda cláusula para lograr fidelidad semántica y español natural: «ha aparecido» expresa bien la auto-manifestación divina posible en נִרְאָה y evita la construcción impropia «se ha aparecido». Se mantiene la nota para preservar la ambigüedad documentada por la POB inglesa, con leve pulido estilístico.'
