translation:
  language: es
  text: Y Ahíaácaro intercedió por mí, y llegué a Nínive. Ahíaácaro era el copero, el encargado del anillo de sello, el administrador y el contable, y Saserdonos lo nombró segundo en rango[a]. Era mi primo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «lo hizo hijo de la segunda»; es una expresión idiomática y textualmente áspera, comúnmente entendida como que Ahíaácaro ocupaba el puesto inmediatamente después del rey, o que era segundo en rango.'
    reason: textual_variant
lexical_decisions:
- source_word: ἠξίωσεν ... περὶ ἐμοῦ
  english_pob_choice: interceded for me
  chosen_spanish: intercedió por mí
  alternatives_spanish:
  - abogó por mí
  - pidió por mí
  - habló a mi favor
  lexicon: BDAG
  rationale: El contexto narrativo sugiere mediación o defensa ante una autoridad. «Intercedió por mí» conserva esa idea sin introducir un matiz jurídico más fuerte que el griego no exige de manera explícita.
- source_word: ἦλθον εἰς Νινευήν
  english_pob_choice: I came to Nineveh
  chosen_spanish: llegué a Nínive
  alternatives_spanish:
  - fui a Nínive
  - vine a Nínive
  lexicon: BDAG
  rationale: «Llegué» comunica de forma natural el movimiento narrativo hacia Nínive y mantiene el valor de movimiento del verbo griego sin forzar una distinción entre «ir» y «venir» que en español depende de la perspectiva.
- source_word: οἰνοχόος
  english_pob_choice: cupbearer
  chosen_spanish: copero
  alternatives_spanish:
  - copero real
  - encargado del vino
  lexicon: LSJ
  rationale: «Copero» es el equivalente español tradicional y preciso del oficio cortesano. Es más breve y natural que una paráfrasis, y conserva la dignidad del título.
- source_word: ἐπὶ τοῦ δακτυλίου
  english_pob_choice: keeper of the signet ring
  chosen_spanish: el encargado del anillo de sello
  alternatives_spanish:
  - guardián del sello
  - custodio del anillo de sello
  lexicon: LSJ
  rationale: La expresión griega alude al anillo-sello real y a la autoridad asociada con él. «Encargado del anillo de sello» preserva esa relación sin ocultarla tras un término más interpretativo.
- source_word: διοικητής
  english_pob_choice: administrator
  chosen_spanish: administrador
  alternatives_spanish:
  - gobernador
  - mayordomo
  - gestor
  lexicon: LSJ
  rationale: «Administrador» es amplio y adecuado para una función de gobierno o gestión cortesana. Evita restringir indebidamente el cargo con un término más específico.
- source_word: ἐκλογιστής
  english_pob_choice: accountant
  chosen_spanish: contador
  alternatives_spanish:
  - contable
  - auditor
  - llevador de cuentas
  lexicon: LSJ
  rationale: El término se relaciona con el cómputo y la contabilidad. «Contador» transmite bien esa función en español actual sin perder el componente administrativo del original.
- source_word: κατέστησεν αὐτὸν
  english_pob_choice: appointed him
  chosen_spanish: lo nombró
  alternatives_spanish:
  - lo designó
  - lo puso
  - lo estableció
  lexicon: BDAG
  rationale: En contextos de oficio, καθίστημι significa designar o nombrar para un cargo. «Lo nombró» es la formulación más natural en español para este acto de investidura.
- source_word: υἱὸς ἐκ δευτέρας
  english_pob_choice: second in rank
  chosen_spanish: segundo en rango
  alternatives_spanish:
  - después del rey
  - en segundo puesto
  - segundo después de él
  lexicon: LSJ
  rationale: La frase griega es idiomática y algo áspera en el texto de Swete. «Segundo en rango» conserva el sentido probable de jerarquía sin fingir una literalidad que en español resultaría oscura.
- source_word: ἐξάδελφός μου
  english_pob_choice: my cousin
  chosen_spanish: mi primo
  alternatives_spanish:
  - mi primo hermano
  - mi pariente
  - mi familiar
  lexicon: BDAG
  rationale: «Primo» es el equivalente más directo y natural de ἐξάδελφος. En español, «primo» puede abarcar la relación familiar sin necesidad de precisar más allá de lo que el griego afirma.
translation_notes:
  revision_awareness: La redacción sigue el testimonio griego de Swete y toma en cuenta el expediente inglés POB, especialmente la revisión que prefirió «interceded for me» frente a una formulación más amplia. También conserva la decisión contextual de «second in rank» para υἱὸς ἐκ δευτέρας, explicándolo en nota por su aspereza idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «copero» para el cargo cortesano, en línea con el valor tradicional y preciso del término.
  - Se prefirió «primo» para ἐξάδελφος, por ser más exacto y natural que «pariente» en español.
  - 'Los nombres propios se adaptaron a formas españolas usuales: Ahíaácaro, Nínive, Saserdonos.'
