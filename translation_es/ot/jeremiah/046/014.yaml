translation:
  language: es
  text: 'Declaren esto en Egipto y den a conocer en Migdol; den a conocer en Nof[a] y en Tahpanhés. Digan: «Ponte en pie y prepárate, porque la espada ha devorado a los que te rodean».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nof es el nombre hebreo de Menfis.
    reason: alternative_reading
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare it
  chosen_spanish: Declaren
  alternatives_spanish:
  - Anuncien
  - Digan
  lexicon: HALOT
  rationale: El imperativo hifil plural de נגד pide una proclamación pública. En español, «declaren» conserva mejor ese tono formal y público que «digan», y evita un matiz demasiado conversacional.
- source_word: וְהַשְׁמִיעוּ
  english_pob_choice: proclaim
  chosen_spanish: den a conocer
  alternatives_spanish:
  - proclamen
  - anuncien
  lexicon: HALOT
  rationale: El hifil de שמע aquí expresa hacer que un mensaje sea oído públicamente. «Den a conocer» comunica bien la difusión pública en español natural; se mantiene la repetición sin forzar dos veces la misma fórmula.
- source_word: בְמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - por todo Egipto
  - dentro de Egipto
  lexicon: HALOT
  rationale: La preposición locativa ב pide «en». Se conserva el nombre geográfico sin ampliar innecesariamente el alcance.
- source_word: בְמִגְדּוֹל
  english_pob_choice: in Migdol
  chosen_spanish: en Migdol
  alternatives_spanish:
  - en Migdal
  lexicon: HALOT
  rationale: Nombre propio transliterado, como en el texto base inglés y según la práctica del proyecto.
- source_word: בְנֹף
  english_pob_choice: in Noph
  chosen_spanish: en Nof
  alternatives_spanish:
  - en Noph
  - en Menfis
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo, pero en forma hispanizada breve («Nof») para una lectura más fluida. La equivalencia histórica «Menfis» se reserva para nota, no para el texto principal.
- source_word: וּבְתַחְפַּנְחֵס
  english_pob_choice: and in Tahpanhes
  chosen_spanish: y en Tahpanhés
  alternatives_spanish:
  - y en Tahpanhes
  - y en Dafne
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación ortográfica española mínima para facilitar la pronunciación, manteniendo la referencia al lugar hebreo.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Digan esto
  - Digan además
  lexicon: HALOT
  rationale: Imperativo simple que introduce la cita directa. «Digan» funciona naturalmente en español y conserva el plural del hebreo.
- source_word: הִתְיַצֵּב
  english_pob_choice: Take your stand
  chosen_spanish: Ponte en pie
  alternatives_spanish:
  - Ponte firme
  - Toma tu puesto
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse en posición, quedar listo/plantado. En español, «ponte en pie» reproduce la imagen corporal y la llamada a adoptar postura de alerta sin añadir interpretación excesiva.
- source_word: וְהָכֵן לָךְ
  english_pob_choice: prepare yourself
  chosen_spanish: prepárate
  alternatives_spanish:
  - hazte listo
  - dispónte
  lexicon: HALOT
  rationale: El verbo כון con לָךְ tiene sentido reflexivo de alistarse. «Prepárate» es la forma más natural y fiel en español contemporáneo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato; «porque» expresa de modo claro la causalidad.
- source_word: אָכְלָה חֶרֶב
  english_pob_choice: the sword has devoured
  chosen_spanish: la espada ha devorado
  alternatives_spanish:
  - la espada devoró
  - la espada devorará
  lexicon: HALOT
  rationale: Se mantiene la metáfora personificada de la espada como agente de destrucción. El perfecto en discurso profético se vierte con valor resultativo para no diluir la inmediatez del desastre.
- source_word: סְבִיבֶיךָ
  english_pob_choice: those around you
  chosen_spanish: a los que te rodean
  alternatives_spanish:
  - los de alrededor de ti
  - los que están a tu alrededor
  lexicon: HALOT
  rationale: El sustantivo/preposición expresa el entorno humano afectado por la violencia; «a los que te rodean» refleja mejor el objeto implícito que una simple ubicación espacial. En la cláusula se preserva la segunda persona singular del hebreo.
theological_decisions:
- issue: 'Destino del discurso: singular personificado al final del versículo'
  english_pob_reading: 'Render the singular imperatives and pronouns as addressing Egypt personified in the singular: ''Take your stand and prepare yourself ... around you.'''
  chosen_spanish_reading: 'Conservar el giro a segunda persona singular en la cita: «Ponte en pie y prepárate... te rodean».'
  alternative_spanish_readings:
  - Ajustar todo a plural para armonizar con los mandatos iniciales
  - Explicitar una ciudad o colectivo dentro de Egipto como destinatario
  rationale: El hebreo pasa de mandatos plurales a una orden singular en la cita. Mantener esa oscilación preserva la personificación retórica y evita suavizar la sintaxis del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 3 y 4
- issue: Valor aspectual de אָכְלָה
  english_pob_reading: 'Translate as present-result perfect: ''has devoured'''
  chosen_spanish_reading: 'Usar perfecto español con valor resultativo: «ha devorado».'
  alternative_spanish_readings:
  - devoró
  - devorará
  rationale: El perfecto profético puede expresar una acción ya consumada en el horizonte retórico o inminente con certeza. El presente perfecto español conserva mejor esa fuerza que un futuro meramente predictivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 3
- issue: Tratamiento del nombre Noph
  english_pob_reading: Noph is the Hebrew name for Memphis.
  chosen_spanish_reading: Mantener Nof en el texto principal y anotar su equivalencia histórica con Menfis.
  alternative_spanish_readings:
  - usar Menfis en el texto principal
  - conservar Noph sin adaptación
  rationale: Se preserva el nombre hebreo sin perder inteligibilidad en español. La equivalencia histórica queda documentada en nota para no borrar la decisión lexical del texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'all around you' por 'those around you' para reflejar con más precisión el objeto implícito del hebreo. La versión española sigue esa revisión mediante «a los que te rodean», manteniendo además la personificación singular del cierre.
  spanish_consistency_notes:
  - Se mantiene Yahvé en todo el proyecto como norma, aunque este versículo no lo contiene.
  - Se conserva una distinción funcional entre «declaren / den a conocer» para reflejar los dos imperativos hebreos sin forzar sinonimia absoluta.
  - Los topónimos se transliteran y se adaptan solo en la medida necesaria para la lectura en español.
  - La segunda persona singular del cierre se preserva para respetar la personificación retórica del hebreo.
