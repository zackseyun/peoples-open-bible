review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: πῶς = «¿Cómo…?», κατελογίσθη = «fue contado», ἐν υἱοῖς θεοῦ = «entre los hijos de Dios», y ἐν ἁγίοις…ἐστιν = «está entre…». Sin embargo, el aparato de notas está defectuoso: la nota [a] en español repite exactamente el texto principal en vez de preservar la alternativa inglesa «children of God» de manera útil para español. Además, conviene ajustar «los santos» a «los santos[a]» o mejor «los santos» sin nota extra si no hay ambigüedad nueva; la nota alternativa relevante es para κλῆρος, donde «porción» sí preserva la alternativa documentada.'
  spanish_quality_summary: El español es claro y digno, pero la nota [a] es inválida y debe repararse. En el texto principal, «su suerte está» es comprensible, aunque algo menos idiomático y más ambiguo en español contemporáneo que «su porción está» o «su suerte le ha tocado». Dado que el inglés POB mantiene «lot» en el texto, «suerte» puede conservarse, pero con una nota útil que ofrezca «porción».
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Hijos de Dios» respeta la decisión teológica sobre υἱοῖς θεοῦ. «Los santos» es aceptable para ἅγιοις en español bíblico, aunque el inglés prefirió «holy ones» para evitar sobretonos eclesiásticos; aquí no requiere cambio forzoso. La principal desalineación está en la nota léxica de [a], que no refleja la alternativa auditada.
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de ofrecer una alternativa léxica real.
    rationale: 'El inglés POB documenta como alternativa «children of God», no una repetición de «sons of God». En español debe ofrecerse una alternativa útil, p. ej. «entre los hijos de Dios»/«entre los hijos de Dios» no aporta nada; mejor «entre los hijos de Dios» no sirve como nota. Una opción natural es «entre los hijos de Dios» en el texto y «O «entre los hijos de Dios»» no corrige nada. La alternativa española adecuada es «entre los hijos de Dios» solo si el texto principal fuera distinto; como no lo es, la nota debe ser «O «entre los hijos de Dios»» no tiene valor y debe reemplazarse por «O «entre los hijos de Dios»»? Mejor: «O «entre los hijos de Dios»» sigue siendo idéntico. Por tanto, la nota debe reflejar la alternativa semántica «entre los hijos de Dios»/«entre los hijos de Dios» no aplicable; la mejor solución es «entre los hijos de Dios» en texto y nota «O «entre los hijos de Dios»» no procede. En español, la alternativa correspondiente a «children of God» es «entre los hijos
      de Dios» o «entre los hijos de Dios» no distinguible; por eso conviene usar «hijos de Dios» en texto y en nota «O «entre los hijos de Dios»» no funciona. Se debe reformular la nota como explicación: «O «entre los hijos de Dios». El griego puede entenderse también como «hijos» en sentido filial general, aunque literalmente dice «hijos»». Esto preserva la racionalidad auditada sin nota vacía.'
  - severity: low
    issue: La puntuación de notas no coincide con la estructura de alternativas del inglés.
    rationale: En el inglés, la nota [b] acompaña la segunda mitad («his lot is…») y [a] la primera; en español se puede conservar el orden, pero debe anclarse correctamente y con contenido útil.
  revised_spanish_text: ¿Cómo fue contado[a] entre los hijos de Dios, y su suerte[b] está entre los santos?
  revised_footnotes:
  - marker: a
    text: O «entre los hijos de Dios» en sentido filial general; el griego dice literalmente «hijos de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «su porción está entre los santos».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y legible, pero se corrige la nota [a] para que no repita inútilmente el texto principal y sí preserve la alternativa léxica documentada por el POB de manera inteligible en español. Se mantiene [b] porque «porción» es una alternativa válida para κλῆρος.
