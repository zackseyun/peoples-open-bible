translation:
  language: es
  text: En aquel tiempo[a], al ver David que Yahvé le había respondido en la era de Ornán el jebuseo, sacrificó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando David vio que Yahvé le había respondido». El hebreo usa un infinitivo temporal («al ver»), pero también admite una traducción circunstancial más explícita.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal es fórmula narrativa estándar. «En aquel tiempo» conserva el valor de enlace cronológico sin añadir precisión que el hebreo no exige.
- source_word: בִּרְאוֹת
  english_pob_choice: when ... saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - viendo
  lexicon: HALOT
  rationale: El infinitivo constructo con בּ indica circunstancia temporal; en español «al ver» mantiene la relación temporal y la naturalidad sintáctica.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo que David percibió: vio «que» Yahvé le había respondido. No conviene convertirlo en causal explícita.'
- source_word: עָנָהוּ
  english_pob_choice: had answered him
  chosen_spanish: le había respondido
  alternatives_spanish:
  - le respondió
  - le había contestado
  lexicon: HALOT
  rationale: ענה en este contexto significa responder en contestación a oración o sacrificio. «Responder» preserva mejor el paralelismo semántico y evita restringirlo a un mero «contestar».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton conforme al criterio del proyecto. «Yahvé» mantiene el nombre personal sin sustituirlo por un título.
- source_word: בְּגֹרֶן
  english_pob_choice: at the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - en la era de trillar
  - en el lugar de la era
  lexicon: HALOT
  rationale: גֹּרֶן designa la era donde se trilla el grano. En español bíblico actual, «era» comunica el lugar con precisión y de forma natural.
- source_word: אָרְנָן הַיְבוּסִי
  english_pob_choice: Ornan the Jebusite
  chosen_spanish: de Ornán el jebuseo
  alternatives_spanish:
  - Ornán el jebuseo
  - de Ornán, el jebuseo
  lexicon: HALOT
  rationale: El nombre propio se translitera y el gentilicio se vierte como adjetivo étnico. El complemento con «de» fluye con la locución locativa española «la era de...».
- source_word: וַיִּזְבַּח
  english_pob_choice: he sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció un sacrificio
  - ofreció sacrificios
  lexicon: HALOT
  rationale: זבח expresa ofrecer sacrificio; el verbo simple «sacrificó» es fiel, conciso y corresponde al singular hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio locativo se mantiene con «allí» para conservar la referencia espacial directa del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio «Yahvé» para preservar la referencia al Dios del pacto, conforme al criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés sin traducir mecánicamente; no hubo revisiones textuales aplicadas en el expediente fuente, y la versión española mantiene la misma lectura óptima con el nombre divino en forma propia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una sustitución por título.
  - «Era» se usa para גֹּרֶן por su sentido agrícola tradicional y claro en español.
  - «Sacrificó» conserva el valor verbal simple de זבח sin añadir objeto inexistente en el hebreo.
  - La sintaxis española conserva la secuencia temporal y causal del original sin sobrerreformularla.
