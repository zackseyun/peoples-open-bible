translation:
  language: es
  text: Porque los montes podrán apartarse y las colinas ser removidas, pero mi amor leal[a] no se apartará de ti, y mi pacto de paz[b] no será removido, dice Yahvé, el que tiene compasión de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amor constante» o «amor fiel»; חֶסֶד puede expresar amor leal de pacto, benevolencia y misericordia.
    reason: lexical_alternative
  - marker: b
    text: O «mi pacto de bienestar»; שָׁלוֹם incluye paz, integridad y bienestar, no solo ausencia de conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o garantía de la promesa anterior; «Porque» preserva el valor causal/explanatorio del hebreo sin sonar forzado en español.
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: El paralelo con «collados» funciona de modo natural en español con «montes»; conserva la imagen cósmica de estabilidad.
- source_word: יָמוּשׁוּ
  english_pob_choice: may depart
  chosen_spanish: se muevan
  alternatives_spanish:
  - se aparten
  - se retiren
  - se quiten
  lexicon: HALOT
  rationale: מוּשׁ expresa retiro o desplazamiento; aquí se da en paralelo con «ser removidos». «Se muevan» comunica la inestabilidad sin perder la idea de desaparición del lugar fijo.
- source_word: וְהַגְּבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: los collados
  alternatives_spanish:
  - las colinas
  - los montes bajos
  lexicon: HALOT
  rationale: «Collados» es un equivalente bíblico claro para גְּבָעוֹת y mantiene el paralelismo poético con «montes».
- source_word: תְּמוּטֶנָה
  english_pob_choice: may be removed
  chosen_spanish: sean removidos
  alternatives_spanish:
  - sean sacudidos
  - se tambaleen
  - se desplacen
  lexicon: HALOT
  rationale: Aunque el verbo tiene la idea de inestabilidad/movimiento, la revisión inglesa favoreció «be removed» para ambas formas verbales. «Sean removidos» conserva esa correspondencia y la fuerza del contraste.
- source_word: וְחַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor leal
  alternatives_spanish:
  - mi amor constante
  - mi amor fiel
  - mi misericordia
  lexicon: HALOT
  rationale: חֶסֶד incluye lealtad pactal, amor persistente y misericordia. «Amor leal» comunica ese peso relacional y evita reducir el término a una sola faceta; se conserva el contraste con la fragilidad de la creación.
- source_word: מֵאִתֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - apartado de ti
  - lejos de ti
  lexicon: HALOT
  rationale: La forma femenina singular apunta a Sion/Jerusalén personificada; «de ti» es directo y natural en español para expresar separación.
- source_word: וּבְרִית שְׁלוֹמִי
  english_pob_choice: and my covenant of peace
  chosen_spanish: mi pacto de paz
  alternatives_spanish:
  - mi pacto de bienestar
  - mi pacto de bienestar pleno
  - mi pacto de paz y bienestar
  lexicon: HALOT
  rationale: בְּרִית se traduce mejor por «pacto» en español bíblico contemporáneo cuando se quiere evitar carga eclesial automática; שָׁלוֹם incluye paz, integridad y bienestar, pero «pacto de paz» preserva la fórmula estable y el enlace intertextual.
- source_word: לֹא תָמוּט
  english_pob_choice: will not be shaken
  chosen_spanish: no será removido
  alternatives_spanish:
  - no vacilará
  - no se tambaleará
  - no será sacudido
  lexicon: HALOT
  rationale: Repite el verbo de inestabilidad en la línea anterior; «no será removido» refleja la revisión inglesa y mantiene la correspondencia verbal dentro del verso.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - ha dicho
  - dijo
  lexicon: HALOT
  rationale: La fórmula profética funciona como presente en español; «dice» suena natural y conserva la vivacidad del discurso divino.
- source_word: מְרַחֲמֵךְ
  english_pob_choice: who has compassion on you
  chosen_spanish: el que tiene compasión de ti
  alternatives_spanish:
  - el que te compadece
  - el compasivo contigo
  - quien tiene misericordia de ti
  lexicon: HALOT
  rationale: El participio de רחם describe a Yahvé como el que ejerce compasión de manera continua. La relativa «el que tiene compasión de ti» preserva el valor durativo y evita una abstracción excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» como forma española estable, transparente y reconocible, en lugar de la sustitución por un título.'
theological_decisions:
- issue: חֶסֶד como amor leal/covenantal
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - amor fiel
  - misericordia
  rationale: El término hebreo combina lealtad pactal, fidelidad y benevolencia. «Amor leal» conserva la relación de pacto y la permanencia frente a la imagen de montes y collados que pueden moverse.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: שָׁלוֹם en «mi pacto de paz»
  english_pob_reading: peace includes wholeness and welfare, not only the absence of conflict
  chosen_spanish_reading: paz
  alternative_spanish_readings:
  - bienestar
  - bienestar pleno
  - paz y bienestar
  rationale: En español, «pacto de paz» mantiene la fórmula bíblica estable y deja implícita la amplitud de שָׁלוֹם; la amplitud semántica puede documentarse sin recargar el texto principal.
  doctrine_reference: 'DOCTRINE.md: Términos de pacto y שָׁלוֹם'
- issue: יְהוָה como nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio del Dios de Israel según la política del proyecto, sin sustituirlo por un título y sin ocultar el texto hebreo subyacente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente unificó las dos formas verbales con la idea de «be removed» para mayor correspondencia con el hebreo y consistencia interna del verso. La redacción española refleja esa decisión con «se muevan / sean removidos / no será removido», manteniendo también el paralelismo de estabilidad e inestabilidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Pacto» se usa para בְּרִית, evitando sustituirlo por términos eclesiales menos precisos en este contexto.
  - El paralelismo verbal del verso se conserva con dos miembros de movimiento/remoción antes y después de la cláusula central.
  - Las notas a pie de página marcan alternativas léxicas importantes sin sobrecargar el texto principal.
