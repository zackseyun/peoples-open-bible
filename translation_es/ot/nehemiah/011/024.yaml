base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/011/024.yaml
  text: And Pethahiah son of Meshezabel[a], from the sons of Zerah son of Judah[b], was at the king’s side for every matter concerning the people.
  footnotes:
  - marker: a
    text: Or 'was the king’s agent' or 'was at the king’s side'; the Hebrew literally reads 'was at the hand of the king.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the people.' The Hebrew may mean matters concerning the people or matters handled on the people’s behalf.
    reason: lexical_alternative
