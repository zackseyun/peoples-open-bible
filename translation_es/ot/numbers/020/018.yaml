base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/018.yaml
  text: But Edom said to him[a], “You shall not pass through me[b], lest I come out against you with the sword.”
  footnotes:
  - marker: a
    text: Literally, “through me.” Since Edom speaks as a nation/territory, the phrase means passage through Edom’s land.
    reason: lexical_alternative
  - marker: b
    text: 'Or “to meet you.” In this context the phrase carries a hostile sense: to come out in armed opposition.'
    reason: lexical_alternative
