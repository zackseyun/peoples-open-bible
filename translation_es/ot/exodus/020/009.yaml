lexical_decisions:
- source_word: שֵׁשֶׁת יָמִים
  english_pob_choice: Six days
  chosen_spanish: Seis días
  alternatives_spanish:
  - Por seis días
  - Durante seis días
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente en español con «Seis días»; agrega la duración sin introducir una preposición que no está en el hebreo.
- source_word: תַּעֲבֹד
  english_pob_choice: you shall labor
  chosen_spanish: trabajarás
  alternatives_spanish:
  - laborarás
  - deberás trabajar
  lexicon: HALOT
  rationale: El verbo עבד puede significar trabajar o servir; aquí el mandato sabático pide la actividad laboral ordinaria. «Trabajarás» es claro y natural en español, y conserva la fuerza directiva del imperfecto sin sonar excesivamente rígido.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and do
  chosen_spanish: y harás
  alternatives_spanish:
  - y hacerás
  - y realizarás
  lexicon: HALOT
  rationale: 'עָשָׂה es amplio: hacer, realizar, llevar a cabo. En combinación con «toda tu obra», «harás» reproduce bien el paralelismo hebreo y evita una paráfrasis más libre.'
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: En español, «toda tu obra» suena más natural que «todo tu obra»; el femenino concuerda con «obra» y mantiene el sentido totalizador de כָּל.
- source_word: מְלַאכְתֶּךָ
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - tu labor
  - tu ocupación
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse a trabajo, tarea u ocupación. Aquí, «obra» conserva una amplitud semántica útil en el contexto del mandamiento del sábado y evita reducirlo solo a empleo asalariado. Se mantiene el vínculo conceptual con la actividad humana ordinaria que debe cesar el día de reposo.
theological_decisions:
- issue: Fuerza obligatoria del imperfecto en legislación del pacto
  english_pob_reading: 'Render the imperfect as directive: ''you shall labor'''
  chosen_spanish_reading: 'Traducir el imperfecto como mandato: «trabajarás»'
  alternative_spanish_readings:
  - «puedes trabajar»
  - «has de trabajar»
  rationale: En el Decálogo, la forma verbal funciona como instrucción pactal, no como simple futuro descriptivo. «Trabajarás» conserva el tono normativo sin suavizarlo a permiso ni cargarlo con una perífrasis demasiado explicativa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo recibido y con la decisión inglesa revisada: no hubo cambios en la última pasada y el cotejo reporta acuerdo alto. La presente versión conserva ese mismo balance entre literalidad y español natural.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita de κύριος.
  - Se elige «trabajarás» en vez de «laborarás» por naturalidad, aunque ambos preservan el campo semántico de עבד.
  - «Obra» mantiene amplitud semántica para מְלָאכָה y funciona bien en registro bíblico moderno.
  - El pie de nota ofrece la alternativa léxica principal preservada por la POB en inglés, adaptada al español.
