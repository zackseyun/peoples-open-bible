base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/006/002.yaml
  text: There is a man to whom God gives riches[a], possessions, and honor, so that he lacks nothing for himself of all that he desires, yet God does not enable him to eat from them, because a foreigner eats them[c][b]. This is vanity and a grievous evil.
  footnotes:
  - marker: a
    text: Or 'a foreigner' / 'a stranger.' The Hebrew says literally 'a foreign man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to eat from them,' a concrete expression for enjoying or benefiting from one's possessions.
    reason: lexical_alternative
  - marker: c
    text: Or 'vapor' or 'futility' for 'vanity' (Hebrew hebel), a key term in Ecclesiastes.
    reason: lexical_alternative
