revisions:
- from: Cuando todo Jabes-galaad oyó todo lo que los filisteos habían hecho a Saúl[a][b],
  to: Cuando todo Jabes de Galaad oyó todo lo que los filisteos habían hecho a Saúl[a][b],
  rationale: La traducción es sustancialmente fiel al hebreo y al rastro de auditoría de la POB inglesa. Solo se corrige la forma española del topónimo para mejorar legibilidad y convencionalidad sin perder la decisión de mantener la construcción literal «todo Jabes de Galaad».
  reviewer_model: gpt-5.4
