- from: Además de lo que traían[a] los comerciantes y mercaderes, todos los reyes de Arabia y los gobernadores de la tierra traían oro y plata para Salomón.
  to: Además de lo que traían[a] los comerciantes y mercaderes, todos los reyes de Arabia y los gobernadores de la tierra traían oro y plata a Salomón.
  rationale: Se ajusta «para Salomón» a «a Salomón» para reflejar con mayor precisión el destinatario marcado en hebreo. También se mejora la nota alternativa para que suene natural en español y conserve la distinción documentada entre un grupo comercial itinerante y comerciantes más generales.
