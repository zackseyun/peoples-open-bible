translation:
  language: es
  text: Cántico de las subidas. Bienaventurado es todo el que[a] teme a Yahvé, el que anda en sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dichoso es todo el que teme a Yahvé». El hebreo אַשְׁרֵי puede denotar un estado de florecimiento o de bienaventuranza.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת
  english_pob_choice: A Song of Ascents.
  chosen_spanish: Cántico de ascenso.
  alternatives_spanish:
  - Canción de ascenso.
  - Cántico de las subidas.
  lexicon: שִׁיר / מַעֲלוֹת
  rationale: «Cántico» mantiene el registro litúrgico y poético de שִׁיר. «Ascenso» refleja directamente מַעֲלוֹת en una forma natural en español, sin añadir una preposición o plural que no esté exigida por el hebreo.
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is everyone
  chosen_spanish: Bienaventurado[a] todo el que
  alternatives_spanish:
  - Dichoso todo el que
  - Feliz todo el que
  lexicon: אַשְׁרֵי
  rationale: La forma española «bienaventurado» preserva el valor de estado de dicha/florecimiento indicado en la nota inglesa, sin reducirlo a emoción subjetiva. Se añade la nota para conservar la alternativa semántica entre bendición y felicidad/florecimiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: יהוה
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. Esto mantiene la transparencia del nombre divino frente a la sustitución por un título.'
- source_word: יְרֵא יְהוָה
  english_pob_choice: who fears Yahweh
  chosen_spanish: el que teme a Yahvé
  alternatives_spanish:
  - el que reverencia a Yahvé
  - el que tiene temor de Yahvé
  lexicon: ירא
  rationale: «Teme a» conserva la fuerza reverencial y de lealtad del hebreo, que no es solo miedo psicológico. «Reverencia» sería posible, pero atenúa la amplitud del término.
- source_word: הֹלֵךְ בִּדְרָכָיו
  english_pob_choice: who walks in his ways
  chosen_spanish: el que anda en sus caminos
  alternatives_spanish:
  - el que camina en sus caminos
  - el que sigue sus caminos
  lexicon: הלך / דרך
  rationale: «Anda en sus caminos» es idiomático en español bíblico y mantiene la imagen conductual del hebreo. «Camina» también sería fiel, pero «anda» suena más natural en esta formulación proverbial.
theological_decisions:
- issue: 'Sentido de אַשְׁרֵי: bendición, felicidad o florecimiento'
  english_pob_reading: Blessed is everyone who fears Yahweh. The Hebrew אַשְׁרֵי can denote a state of flourishing or blessedness.
  chosen_spanish_reading: Bienaventurado todo el que teme a Yahvé.
  alternative_spanish_readings:
  - Dichoso todo el que teme a Yahvé.
  - Feliz todo el que teme a Yahvé.
  rationale: Se conserva una expresión que permita leer tanto bendición objetiva como estado de dicha/florecimiento. La nota evita cerrar el sentido solo en «feliz», que en español puede sonar demasiado emocional o circunstancial.
  doctrine_reference: Sabiduría bíblica / teología de la bienaventuranza
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: La edición española debe mantener la transparencia del nombre divino según la política del proyecto. No se sustituye por un título en mayúsculas, porque el texto fuente y la auditoría inglesa preservan el nombre propio.
  doctrine_reference: Tetragrámaton / nombres divinos
- issue: Temor de Yahvé como disposición pactual
  english_pob_reading: who fears Yahweh
  chosen_spanish_reading: el que teme a Yahvé
  alternative_spanish_readings:
  - el que reverencia a Yahvé
  rationale: «Teme» conserva la tensión bíblica entre reverencia, obediencia y conciencia de la santidad divina. Evita reducir el concepto a mera cortesía religiosa.
  doctrine_reference: Sabiduría y piedad reverente
translation_notes:
  revision_awareness: 'La revisión inglesa completó el encabezado para incluir el texto de la sección y fijó la traducción de יהוה como «Yahweh». La versión española refleja ambas decisiones: conserva el encabezado y usa «Yahvé» como forma española transparente del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene el patrón de superscripción más texto del verso en una sola línea, como en la auditoría inglesa revisada.
  - Se usa «Yahvé» de manera consistente para יהוה, en consonancia con la política terminológica del proyecto.
  - 'El paralelismo hebreo se conserva con dos miembros coordinados: estado de bendición y conducta caminante.'
