revisions:
- from: Escuchen la palabra de Yahvé[a], hijos de Israel, porque Yahvé tiene un pleito[b] con los habitantes de la tierra[c], porque no hay verdad, ni fidelidad, ni conocimiento de Dios en la tierra[c].
  to: Escuchen la palabra de Yahvé, hijos de Israel[a], porque Yahvé tiene un pleito[b] contra los habitantes del país[c], porque no hay verdad, ni fidelidad, ni conocimiento de Dios en el país[c].
  rationale: Se corrigió el referente territorial a «país» para reflejar mejor הָאָרֶץ como la tierra de Israel en contexto de pacto, evitando la ambigüedad cósmica de «tierra». Se ajustó la construcción jurídica a «pleito contra» por naturalidad e idiomaticidad en español. Se eliminó una nota incorrecta sobre Yahvé y se reutilizaron las notas para alternativas realmente pertinentes y fieles al hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: llamado profético, nombre divino Yahvé, acusación jurídica, tríada ética y cierre con «conocimiento de Dios». Sin embargo, no preserva del todo la decisión auditada de הָאָרֶץ como «land» en sentido local/covenantal; «tierra» en español tiende a sonar más global o cósmico. Además, la nota [a] introduce una alternativa impropia («del Yahvé») que no corresponde al hebreo ni a un español aceptable.'
  spanish_quality_summary: La redacción es clara y eclesialmente legible. «Escuchen», «hijos de Israel» y «conocimiento de Dios» funcionan bien. «Pleito» es comprensible, pero con «contra» suena más natural en contexto forense que «con». «Tierra» debería ajustarse a «país» o una formulación que marque mejor el ámbito local; «país» aquí da mejor legibilidad y evita la lectura planetaria.
  glossary_alignment: Alinea bien con Yahvé, Dios y fidelidad. La principal desalineación con el rastro POB está en הָאָרֶץ / בָּאָרֶץ, donde el inglés documentó «land» con foco en la tierra de Israel; en español «país» o una nota que preserve «tierra/país» sirve mejor que repetir «tierra». También conviene mantener la fuerza jurídica de רִיב con una construcción idiomática española («pleito contra»).
  issues:
  - severity: high
    issue: «la tierra» no preserva bien el valor contextual de הָאָרֶץ / בָּאָרֶץ
    rationale: El expediente inglés y las decisiones léxicas insisten en «land» por el contexto de pacto e Israel. En español, «la tierra» suele activar lectura universal/cósmica; «el país» comunica mejor el referente territorial local sin sobreinterpretar.
  - severity: medium
    issue: 'La nota [a] contiene una alternativa errónea: «del Yahvé»'
    rationale: No es una alternativa válida ni fiel al hebreo; además, es español antinatural. La nota debe explicar la alternativa pertinente para «hijos de Israel» o eliminarse del nombre divino.
  - severity: medium
    issue: «un pleito con» es menos idiomático aquí que «un pleito contra»
    rationale: Aunque עִם es literalmente «con», la decisión POB auditada reconoce el sentido jurídico direccional. En español forense y natural, «tener un pleito contra» comunica mejor la acusación.
  - severity: low
    issue: Faltan alternativas útiles del inglés en notas
    rationale: El inglés preserva la alternativa «children of Israel» y la amplitud semántica de חֶסֶד. No todo debe ir a nota, pero al menos la nota [a] puede aprovecharse para «hijos/descendientes de Israel», y la nota del territorio puede reflejar «tierra» como alternativa.
  revised_spanish_text: Escuchen la palabra de Yahvé, hijos de Israel[a], porque Yahvé tiene un pleito[b] contra los habitantes del país[c], porque no hay verdad, ni fidelidad, ni conocimiento de Dios en el país[c].
  revised_footnotes:
  - marker: a
    text: O «descendientes de Israel». El hebreo dice literalmente «hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé tiene una causa contra», «Yahvé tiene una controversia con» o «Yahvé tiene un litigio contra». El hebreo רִיב tiene fuerza jurídica.
    reason: lexical_alternative
  - marker: c
    text: O «la tierra». El hebreo puede referirse específicamente a la tierra de Israel, más que a toda la tierra en sentido universal.
    reason: lexical_alternative
  revision_rationale: Se corrigió el referente territorial a «país» para reflejar mejor הָאָרֶץ como la tierra de Israel en contexto de pacto, evitando la ambigüedad cósmica de «tierra». Se ajustó la construcción jurídica a «pleito contra» por naturalidad e idiomaticidad en español. Se eliminó una nota incorrecta sobre Yahvé y se reutilizaron las notas para alternativas realmente pertinentes y fieles al hebreo.
