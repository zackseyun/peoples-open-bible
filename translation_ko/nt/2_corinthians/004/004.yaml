id: 2CO.4.4
reference: 2 Corinthians 4:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν οἷς ὁ θεὸς τοῦ αἰῶνος τούτου ἐτύφλωσεν τὰ νοήματα τῶν ἀπίστων εἰς τὸ μὴ ⸀αὐγάσαι τὸν φωτισμὸν τοῦ εὐαγγελίου τῆς δόξης τοῦ Χριστοῦ, ὅς ἐστιν εἰκὼν τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/004.yaml
  text: In their case, the god of this age has blinded the minds of the unbelieving, so that the light of the gospel of the glory of Messiah, who is the image of God, might not shine on them.
  footnotes:
  - marker: a
    text: Or, 'so that they might not see the light of the gospel of the glory of the Messiah.' The rare verb here may emphasize either the light's shining or their perceiving it.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the god of this world.' Greek aiōn normally means 'age,' emphasizing the present fallen era.
    reason: lexical_alternative
  - marker: c
    text: Greek Christos; rendered 'Messiah' here because it functions as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들의 경우, 이 세대의 신이 믿지 않는 자들의 생각을 어둡게 하여, 메시아 — 하나님의 형상 — 의 영광의 복음의 빛이 그들에게 비치지 못하게 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ θεὸς τοῦ αἰῶνος τούτου
  english_pob_choice: the god of this age
  chosen_korean: 이 세대의 신
  alternatives_korean:
  - 이 시대의 신
  - 이 세상 신
  lexicon: BDAG
  rationale: 본 절의 「신」(θεός)은 사탄을 가리키는 풍자적 표현. 한국어로도 「신」(소문자)으로 옮긴다.
- source_word: ἐτύφλωσεν
  english_pob_choice: has blinded
  chosen_korean: 어둡게 하다
  alternatives_korean:
  - 눈멀게 하다
  lexicon: BDAG
  rationale: τυφλόω는 「눈을 멀게 하다」. 본 문맥에서는 마음·생각의 차원이므로 「어둡게 하다」가 자연스럽다.
- source_word: εἰκὼν τοῦ θεοῦ
  english_pob_choice: image of God
  chosen_korean: 하나님의 형상
  alternatives_korean: []
  lexicon: BDAG
  rationale: 창세기 1장 인유. 그리스도론적 핵심 어휘.
