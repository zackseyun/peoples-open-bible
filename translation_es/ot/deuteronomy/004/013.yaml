revisions:
- from: Y anunció[a] su pacto, el cual les mandó cumplir, las Diez Palabras; y las escribió sobre dos tablas de piedra.
  to: Y él les declaró su pacto, el cual les mandó hacer, las Diez Palabras[a]; y las escribió sobre dos tablas de piedra.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «las Diez Palabras», que es la expresión explicada. Se cambia «anunció» por «declaró» para reflejar mejor el tono formal de וַיַּגֵּד y alinearse con la auditoría inglesa. Se cambia «cumplir» por «hacer» para conservar la fuerza literal de לַעֲשׂוֹת, conforme a la decisión documentada del POB. Se conserva «pacto» y «dos tablas de piedra» por ser fieles y naturales en español bíblico.
