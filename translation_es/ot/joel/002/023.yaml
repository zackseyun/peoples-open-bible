base_translation:
  language: en
  yaml_path: translation/ot/joel/002/023.yaml
  text: And you[a], children of Zion, rejoice and be glad in Yahweh your God, for he has given you the early rain for vindication[c][b]; and he causes the rain to come down for you—the early rain and the latter rain as before.
  footnotes:
  - marker: a
    text: Or, 'the teacher for righteousness' or 'the teacher of righteousness.' The Hebrew word moreh can mean either 'teacher' or 'early rain'; the surrounding mention of rain favors 'early rain' here.
    reason: alternative_reading
  - marker: b
    text: Or, 'in just measure' or 'for your vindication.' The Hebrew phrase literally reads 'for righteousness.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'in the first month.' The Hebrew can also be read as a calendrical reference, though 'as before' fits the restoration context well.
    reason: alternative_reading
