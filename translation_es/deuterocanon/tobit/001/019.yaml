translation:
  language: es
  text: Pero uno de los de Nínive[a] fue y avisó al rey acerca de mí, que yo los enterraba; y yo me oculté. Entonces, al darme cuenta de que me buscaban para darme muerte[b], me retiré con temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno de los habitantes de Nínive». La expresión griega es literalmente «uno de los de Nínive».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me buscaban para matarme». El griego más literalmente dice: «yo era buscado para ser muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθεὶς
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - fue y
  lexicon: LSJ
  rationale: El participio aoristo funciona de modo narrativo antes del verbo principal. En español, «fue y avisó» conserva la secuencia natural sin forzar una construcción más pesada como «habiendo ido».
- source_word: εἷς τῶν ἐν Νινευὴ
  english_pob_choice: one of the men in Nineveh
  chosen_spanish: uno de los de Nínive
  alternatives_spanish:
  - uno de los hombres de Nínive
  - uno de los habitantes de Nínive
  lexicon: LSJ
  rationale: 'El griego es elíptico: literalmente, «uno de los de Nínive». En español, esa forma mantiene la misma elipsis y evita añadir «hombres» sin necesidad, aunque sigue siendo una opción interpretativa posible.'
- source_word: ὑπέδειξε
  english_pob_choice: informed
  chosen_spanish: avisó
  alternatives_spanish:
  - informó
  - denunció
  - dio aviso
  lexicon: LSJ
  rationale: En contexto judicial/real, el verbo expresa dar noticia a la autoridad sobre alguien. «Avisó» es claro y natural en español; «informó» también sirve, pero puede sonar algo más neutro que el acto acusatorio implícito.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - de mí
  lexicon: LSJ
  rationale: «Acerca de mí» reproduce bien la relación preposicional y suena formal sin alejarse del sentido básico.
- source_word: ὅτι θάπτω αὐτούς
  english_pob_choice: that I was burying them
  chosen_spanish: que yo enterraba a ellos
  alternatives_spanish:
  - que los enterraba
  - que yo los enterraba
  - que estaba enterrándolos
  lexicon: LSJ
  rationale: Se conserva la referencia directa a «ellos» como en el griego, sin resolverla completamente a «los», porque el antecedente ya es claro en el contexto y la frase mantiene así la proximidad al original. «Enterraba» refleja la acción continua o habitual en el relato.
- source_word: ἐκρύβην
  english_pob_choice: I hid myself
  chosen_spanish: yo me oculté
  alternatives_spanish:
  - me escondí
  - me oculté
  lexicon: LSJ
  rationale: El aoristo medio/pasivo funciona aquí con sentido reflexivo e intransitivo. «Me oculté» mantiene la idea de esconderse sin introducir un matiz demasiado coloquial.
- source_word: ἐπιγνοὺς
  english_pob_choice: realizing
  chosen_spanish: al darse cuenta
  alternatives_spanish:
  - al saber
  - al conocer
  - cuando comprendí
  lexicon: LSJ
  rationale: El participio indica reconocimiento de una situación ya en curso. «Al darse cuenta» expresa bien esa toma de conciencia en español narrativo.
- source_word: ζητοῦμαι ἀποθανεῖν
  english_pob_choice: I was being sought to be put to death
  chosen_spanish: me buscaban para darme muerte
  alternatives_spanish:
  - me buscaban para matarme
  - me buscaban para ejecutarme
  - me buscaban para que muriera
  lexicon: LSJ
  rationale: La construcción griega es compacta y pasiva en la primera parte. En español, «me buscaban para darme muerte» conserva el sentido de persecución con finalidad letal sin sonar artificial. Evita además convertir el pasivo en una paráfrasis demasiado libre.
- source_word: φοβηθεὶς
  english_pob_choice: in fear
  chosen_spanish: con temor
  alternatives_spanish:
  - por miedo
  - temeroso
  - teniendo miedo
  lexicon: LSJ
  rationale: El participio expresa la circunstancia emocional del retiro. «Con temor» es sobrio y fiel, y mantiene un registro digno.
- source_word: ἀνεχώρησα
  english_pob_choice: I withdrew
  chosen_spanish: me retiré
  alternatives_spanish:
  - me aparté
  - me retiré de allí
  - huí
  lexicon: LSJ
  rationale: «Me retiré» refleja bien ἀναχωρέω como apartarse o alejarse por seguridad. Se evita «huí», que sería más fuerte de lo que el verbo exige, aunque el contexto de peligro lo sugiera.
theological_decisions:
- issue: Cómo expresar la persecución sin intensificarla más allá del griego
  english_pob_reading: The translation kept ἀνεχώρησα as 'I withdrew' rather than 'I fled.'
  chosen_spanish_reading: «Me retiré con temor»
  alternative_spanish_readings:
  - «huí con temor»
  - «me aparté con temor»
  - «me fui con temor»
  rationale: El texto narra una retirada motivada por el peligro, pero el verbo griego no exige una traducción tan cargada como «huí». «Me retiré» conserva la prudencia y el movimiento de salida sin añadir dramatización indebida.
  doctrine_reference: 'Principio de equivalencia óptima: mantener el valor narrativo y léxico del original sin sobrerrepresentar la emoción.'
translation_notes:
  revision_awareness: 'El contexto inglés muestra un pasaje con acuerdo alto y solo observaciones menores de equivalencia lexical. Mantengo la línea de esa traducción: secuencia narrativa natural, sin suavizar la referencia a la persecución ni convertirla en una paráfrasis más libre. No se requiere una revisión sustantiva respecto del criterio ya auditado.'
  spanish_consistency_notes:
  - He mantenido «Nínive» con tilde según uso español.
  - Conservo el pasivo/reflexivo donde el español lo permite («me oculté», «me retiré») para respetar el matiz del griego.
  - No he sustituido el sentido de acusación/informe por un verbo demasiado neutral.
  - La mención final de la amenaza se expresa sin añadir más violencia de la que exige el original.
