translation:
  language: es
  text: 'Pero uno de los jóvenes informó a Abigail, mujer de Nabal, diciendo: «Mira, David envió mensajeros desde el desierto para saludar[a] a nuestro amo, y él les gritó[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para bendecir a nuestro amo». El verbo hebreo suele significar «bendecir», pero aquí probablemente se refiere a ofrecer un saludo o bendición cortés.
    reason: lexical_alternative
  - marker: b
    text: O «arremetió contra ellos» / «se abalanzó sobre ellos». El verbo hebreo es enérgico y puede sugerir una reacción agresiva más vívida que un simple «gritar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲבִיגַיִל
  english_pob_choice: But ... Abigail
  chosen_spanish: Pero ... a Abigail
  alternatives_spanish:
  - Y ... a Abigail
  - Ahora ... a Abigail
  lexicon: HALOT
  rationale: La conjunción inicial mantiene la continuidad narrativa, pero en español «pero» refleja bien el giro adversativo respecto de la negativa de Nabal en el versículo anterior. El complemento indirecto con «a Abigail» preserva el destinatario del informe.
- source_word: אֵשֶׁת נָבָל
  english_pob_choice: Nabal’s wife
  chosen_spanish: mujer de Nabal
  alternatives_spanish:
  - esposa de Nabal
  - la mujer de Nabal
  lexicon: HALOT
  rationale: La construcción hebrea identifica a Abigail por su relación matrimonial con Nabal. «Mujer de Nabal» es natural en español bíblico moderno y evita introducir un matiz más técnico que el texto no exige.
- source_word: הִגִּיד
  english_pob_choice: told
  chosen_spanish: avisó
  alternatives_spanish:
  - dijo
  - informó
  lexicon: HALOT
  rationale: El verbo puede significar decir, contar o informar. Aquí se trata de comunicar una noticia a Abigail; «avisó» conserva esa función informativa con fluidez narrativa.
- source_word: נַעַר אֶחָד מֵהַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: uno de los jóvenes
  alternatives_spanish:
  - uno de los servidores
  - un joven, uno de los jóvenes
  lexicon: HALOT
  rationale: El hebreo distingue a un miembro del grupo de los נערים. «Jóvenes» conserva el sentido léxico básico sin forzar aún el matiz de siervos, que el contexto sugiere pero no formula directamente en esta expresión.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso directo; «diciendo» preserva el enlace formal con las palabras citadas.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la noticia. «Mira» comunica el mismo efecto en español contemporáneo sin arcaísmo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - mensajeros/embajadores
  lexicon: HALOT
  rationale: En este contexto humano y diplomático, «mensajeros» es la equivalencia directa y clara; «ángeles» sería incorrecto aquí.
- source_word: מֵהַמִּדְבָּר
  english_pob_choice: from the wilderness
  chosen_spanish: desde el desierto
  alternatives_spanish:
  - desde el desierto/sitio desértico
  - desde la estepa
  lexicon: HALOT
  rationale: El término señala el lugar de estancia de David y sus hombres. «Desierto» es natural en español bíblico y mantiene el espacio árido del relato.
- source_word: לְבָרֵךְ
  english_pob_choice: to greet
  chosen_spanish: para saludar
  alternatives_spanish:
  - para bendecir
  - para dar la bendición
  lexicon: HALOT
  rationale: Aunque ברך suele significar «bendecir», el contexto social de los vv. 6–8 apunta a una salutación respetuosa. «Saludar» conserva la intención pragmática; la alternativa más literal se deja reconocible en la nota.
- source_word: אֶת אֲדֹנֵינוּ
  english_pob_choice: our master
  chosen_spanish: a nuestro amo
  alternatives_spanish:
  - a nuestro señor
  - a nuestro dueño
  lexicon: HALOT
  rationale: En el entorno doméstico/servil, אֲדוֹן se refiere al superior humano del grupo. «Amo» refleja la relación jerárquica con la fuerza social del término, sin convertirlo en un título divino.
- source_word: וַיָּעַט בָּהֶם
  english_pob_choice: and he shouted at them
  chosen_spanish: y él les gritó
  alternatives_spanish:
  - y él les arremetió
  - y él les insultó
  - y él les vociferó
  lexicon: HALOT
  rationale: El verbo hebreo es vívido y puede sugerir una irrupción agresiva; en este contexto de respuesta hostil, «les gritó» expresa bien el estallido verbal con un registro formal y natural en español. La variante más gráfica se preserva en nota.
theological_decisions:
- issue: Sentido de אֲדֹן en contexto humano
  english_pob_reading: our master
  chosen_spanish_reading: nuestro amo
  alternative_spanish_readings:
  - nuestro señor
  - nuestro dueño
  rationale: El contexto es el de siervos/reforzadores hablando del jefe humano de la casa, no de una referencia divina. Por eso se evita «Señor» con mayúscula y se elige un término de relación social clara.
  doctrine_reference: No aplica doctrina específica; decisión contextual sobre referencia humana frente a divina.
- issue: Sentido pragmático de לְבָרֵךְ
  english_pob_reading: to greet
  chosen_spanish_reading: para saludar
  alternative_spanish_readings:
  - para bendecir
  - para bendecir respetuosamente
  rationale: Aunque el verbo puede significar «bendecir», el episodio narrativo muestra una visita cortés y diplomática. La traducción comunica el acto social sin borrar la tensión semántica del verbo.
  doctrine_reference: N/A; decisión lexicográfica y pragmática.
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión inglesa más reciente, que sustituyó «screamed at them» por «shouted at them» para un registro más natural y formal. Por eso se eligió «les gritó», manteniendo la fuerza hostil sin exageración. También se conserva la alternativa más literal de לְבָרֵךְ en nota, conforme al expediente inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se evita «Señor» para אֲדֹן porque el referente es humano y el texto habla de una relación de autoridad doméstica.
  - 'Se conserva un orden natural en español: sujeto explícito, complemento de destinatario con «a», y cita directa con dos puntos y comillas.'
  - No se introduce terminología eclesiástica ajena al contexto del relato.
