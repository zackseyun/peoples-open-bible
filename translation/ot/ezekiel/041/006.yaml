id: EZK.41.6
reference: Ezekiel 41:6
source:
  edition: WLC
  text: וְ/הַ/צְּלָעוֹת֩ צֵלָ֨ע אֶל צֵלָ֜ע שָׁל֧וֹשׁ וּ/שְׁלֹשִׁ֣ים פְּעָמִ֗ים וּ֠/בָאוֹת בַּ/קִּ֨יר אֲשֶׁר לַ/בַּ֧יִת לַ/צְּלָע֛וֹת סָבִ֥יב סָבִ֖יב לִ/הְי֣וֹת אֲחוּזִ֑ים וְ/לֹֽא יִהְי֥וּ אֲחוּזִ֖ים בְּ/קִ֥יר הַ/בָּֽיִת־־׀־׃
translation:
  text: And the side chambers were side chamber upon side chamber[a], three and thirty times; and they entered into the wall that belonged to the house for the side chambers all around, so that they might be supported[b], but they were not supported by the wall of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three and thirty times'; this likely refers to thirty-three side chambers or placements rather than repeated actions over time.
    reason: lexical_alternative
  - marker: b
    text: Or 'fastened' / 'held' instead of 'supported' in both occurrences; the Hebrew emphasizes being secured in place.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּלָעוֹת / צֵלָע
  chosen: side chambers / side chamber
  alternatives:
  - side rooms
  - ribs
  - stories
  lexicon: HALOT
  rationale: In this temple-architecture context, צלע refers to lateral side structures or chambers attached around the main building, not a literal 'rib.' The singular repeated distributively ('side chamber upon side chamber') reflects the Hebrew construction.
- source_word: אֶל
  chosen: upon
  alternatives:
  - to
  - next to
  lexicon: HALOT
  rationale: Here אֶל in the repeated architectural phrase is best rendered idiomatically as 'upon' to convey successive placement/stacking of chambers.
- source_word: שָׁלוֹשׁ וּשְׁלֹשִׁים פְּעָמִים
  chosen: three and thirty times
  alternatives:
  - thirty-three times
  - in thirty-three instances
  - thirty-three
  lexicon: HALOT
  rationale: The Hebrew literally reads 'three and thirty times.' In context this denotes the repeated arrangement/count of the chambers. I preserved the formal flavor while keeping intelligibility. The phrase likely means thirty-three chambers or placements rather than temporal repetition, but 'times' reflects פְּעָמִים directly.
- source_word: וּבָאוֹת
  chosen: they entered into
  alternatives:
  - they went in
  - they were inserted into
  - there were insets in
  lexicon: HALOT
  rationale: The feminine plural participle agrees with the side chambers and describes their joining into or entering the wall structure. 'Entered into' preserves the concrete spatial sense without over-paraphrasing.
- source_word: בַּקִּיר אֲשֶׁר לַבַּיִת
  chosen: the wall that belonged to the house
  alternatives:
  - the wall of the house
  - the wall which was for the house
  lexicon: HALOT
  rationale: The relative clause distinguishes the main house wall from the side chambers. 'That belonged to the house' makes the relation explicit and prepares for the contrast in the final clause.
- source_word: לַצְּלָעוֹת סָבִיב סָבִיב
  chosen: for the side chambers all around
  alternatives:
  - for the side chambers round about
  - around the side chambers
  lexicon: HALOT
  rationale: The double סָבִיב intensifies the encircling arrangement. 'All around' is natural English and preserves the repetitive emphasis.
- source_word: לִהְיוֹת אֲחוּזִים
  chosen: so that they might be supported
  alternatives:
  - to be held fast
  - to be fastened
  - to be attached
  lexicon: HALOT
  rationale: אחז in the passive participial form here refers to being held/secured by supports in the wall structure. 'Supported' fits the architectural context better than the more general 'held fast.'
- source_word: וְלֹא יִהְיוּ אֲחוּזִים בְּקִיר הַבָּיִת
  chosen: but they were not supported by the wall of the house
  alternatives:
  - but they were not fastened into the wall of the house
  - but they did not hold in the wall of the house
  lexicon: HALOT
  rationale: The contrast indicates that although the chambers connected to offset structures in the surrounding wall system, they did not derive support directly from the main house wall itself. 'Supported by' communicates the architectural distinction clearly.
