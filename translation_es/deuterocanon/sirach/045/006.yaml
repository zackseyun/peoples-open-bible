translation:
  language: es
  text: Él exaltó a Aarón[a], un consagrado semejante a él, de la tribu de Leví[b], y lo constituyó en estatuto perpetuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego añade explícitamente «semejante a él»; el hebreo citado es más breve. Se conserva la comparación en el texto principal porque está atestiguada por la fuente griega usada como entrada de traducción y armoniza con la elevación honorífica de Aarón.
    reason: alternative_reading
  - marker: b
    text: También puede entenderse como «una ordenanza perpetua» o «un estatuto permanente». El hebreo emplea un modismo jurídico que puede referirse a la designación duradera de Aarón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וירם / ὕψωσεν
  english_pob_choice: He exalted
  chosen_spanish: Él exaltó
  alternatives_spanish:
  - lo levantó
  - lo enalteció
  lexicon: HALOT; BDAG
  rationale: El verbo en hifil comunica elevar con honor; en español, «exaltó» conserva el tono de elevación honorífica y funciona bien en un contexto sacerdotal.
- source_word: קדוש / ἅγιον
  english_pob_choice: a holy one
  chosen_spanish: un santo
  alternatives_spanish:
  - uno santo
  - un consagrado
  lexicon: HALOT; BDAG
  rationale: La frase funciona en aposición a Aarón y no lleva artículo definido en el testimonio citado. «Un santo» mantiene la cualidad de consagrado/santo sin convertirla en título formalizado más allá del texto.
- source_word: ὅμοιον αὐτῷ
  english_pob_choice: like himself
  chosen_spanish: semejante a él
  alternatives_spanish:
  - como él
  - parecido a él
  lexicon: BDAG
  rationale: La lectura griega añade la comparación explícita. «Semejante a él» suena natural en español y preserva la relación comparativa sin exagerarla.
- source_word: למטה לוי / ἐκ φυλῆς Λευεί
  english_pob_choice: from the tribe of Levi
  chosen_spanish: de la tribu de Leví
  alternatives_spanish:
  - de la tribu de Levi
  - procedente de la tribu de Leví
  lexicon: HALOT
  rationale: «Tribu de Leví» refleja el hebreo genealogíco y el paralelo griego. Se prefiere la forma usual «Leví» en español bíblico.
- source_word: וישימהו
  english_pob_choice: and made him
  chosen_spanish: y lo estableció
  alternatives_spanish:
  - y lo hizo
  - y lo nombró
  lexicon: HALOT
  rationale: El verbo שים puede significar poner/establecer/nombrar. Aquí, unido a «estatuto perpetuo», «lo estableció» expresa mejor la idea de constituirlo en una función o condición duradera sin añadir una especificación no explícita.
- source_word: לחק עולם
  english_pob_choice: an everlasting statute
  chosen_spanish: como un estatuto perpetuo
  alternatives_spanish:
  - como una ordenanza perpetua
  - como un decreto eterno
  lexicon: HALOT
  rationale: «חק» tiene fuerza jurídico-normativa; «estatuto perpetuo» preserva el registro legal y la duración continua expresada por עולם.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: An implicit third-person subject ('He') is retained without explicit identification.
  chosen_spanish_reading: Se conserva el sujeto implícito con «Él», sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - Dios exaltó a Aarón
  - Yahvé exaltó a Aarón
  rationale: El hebreo no nombra al sujeto en esta línea. Aunque el contexto apunta a Dios, nombrarlo añadiría una interpretación no presente en la cláusula. «Él» mantiene la sintaxis abierta del original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de לחק עולם
  english_pob_reading: Rendered as 'made him an everlasting statute' with legal-covenantal force preserved, though the idiom is somewhat compressed in English.
  chosen_spanish_reading: «Lo estableció como un estatuto perpetuo» conserva la fuerza legal y la idea de institución duradera, sin expandir innecesariamente a «oficio sacerdotal».
  alternative_spanish_readings:
  - lo constituyó en un estatuto perpetuo
  - lo estableció para un estatuto perpetuo
  rationale: El hebreo es conciso y no explicita «oficio». La formulación elegida deja el peso normativo de חק עולם y evita sobreinterpretar el alcance institucional.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios sustantivos; esta versión sigue el mismo sentido base, integrando la comparación explícita del griego y manteniendo el registro legal de la cláusula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; aquí no aparece el nombre divino.
  - «Aarón» y «Leví» siguen la transliteración bíblica estándar en español.
  - Se evita «Señor» o «Cristo» porque no corresponden al léxico de este versículo.
  - «Un santo» conserva la ambigüedad entre santo/consagrado sin imponer una glosa teológica adicional.
