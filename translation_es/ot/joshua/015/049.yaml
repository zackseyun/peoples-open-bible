  spanish_consistency_notes:
  - Se conserva el paralelo de lista con dos coordenadas unidas por 'y'.
  - Se usa 'es decir' para la identificación nominal, manteniendo la equivalencia señalada en el inglés auditado.
  - El topónimo se adapta a una grafía española legible ('Kiriat-sana') sin borrar la forma semítica subyacente.
