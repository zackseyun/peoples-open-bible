translation:
  language: es
  text: Y si escuchan[a] estos juicios, y los guardan y los cumplen, Yahvé tu Dios guardará para ti el pacto y el amor leal[b] que juró a tus padres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estos decretos» o «estas ordenanzas» para «estos juicios»; también, «escuchan» puede implicar obediencia atenta, por lo que alternativamente podría traducirse «obedecen».
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce hebreo hesed, un término de lealtad y amor de pacto; alternativamente, «fidelidad de pacto», «amor constante» o «misericordia».
    reason: lexical_alternative
  - marker: c
    text: O «a tus antepasados»; el hebreo dice específicamente «a tus padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה עֵקֶב
  english_pob_choice: And because
  chosen_spanish: Y porque
  alternatives_spanish:
  - Y sucederá que, porque
  - Y como consecuencia de
  lexicon: HALOT
  rationale: La expresión introduce una relación de consecuencia o condición. «Y porque» conserva ese enlace causal en un español natural sin añadir más contenido del que permite el hebreo.
- source_word: תִּשְׁמְעוּן
  english_pob_choice: you listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - obedezcan
  lexicon: HALOT
  rationale: שׁמע combina oír y responder. «Escuchen» mantiene la idea auditiva y, en este contexto de obediencia pactal, deja que «guarden y cumplan» complete la fuerza obediencial sin redundancia excesiva.
- source_word: הַמִּשְׁפָּטִים הָאֵלֶּה
  english_pob_choice: these judgments
  chosen_spanish: estos juicios
  alternatives_spanish:
  - estas ordenanzas
  - estas reglas
  - estos decretos
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones o normas jurídicas. «Juicios» mantiene la raíz semántica de decisión legal y sigue de cerca la opción inglesa, aunque «ordenanzas» o «reglas» serían posibles en español.
- source_word: וּשְׁמַרְתֶּם וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and keep and do them
  chosen_spanish: los guarden y los cumplan
  alternatives_spanish:
  - los observen y los hagan
  - los conserven y los hagan
  lexicon: HALOT
  rationale: 'Se conservan los dos verbos del hebreo: שׁמר y עשה. «Guardar» y «cumplir» preservan la distinción entre custodiar fielmente y poner en práctica.'
- source_word: וְשָׁמַר
  english_pob_choice: will keep
  chosen_spanish: guardará
  alternatives_spanish:
  - mantendrá
  - cumplirá
  lexicon: HALOT
  rationale: El paralelismo verbal con el mandato humano de «guardar» se mantiene mejor con «guardará». Así se conserva la correspondencia léxica central del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como forma transliterada del nombre divino, no una sustitución titulativa.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva directa reproduce la relación de pacto entre Dios y el destinatario.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: En español bíblico «pacto» es claro y fiel al sentido relacional-jurídico de בְּרִית. Aunque «covenant» suele traducirse «pacto», aquí se preserva la equivalencia más natural para lectura pública.
- source_word: הַחֶסֶד
  english_pob_choice: the steadfast love
  chosen_spanish: el amor leal
  alternatives_spanish:
  - la fidelidad de pacto
  - la bondad constante
  - la misericordia
  lexicon: HALOT
  rationale: חֶסֶד incluye lealtad pactal y amor duradero. «Amor leal» comunica esa combinación sin reducirlo a sentimiento ni a mera fidelidad jurídica.
- source_word: אֲשֶׁר נִשְׁבַּע
  english_pob_choice: that he swore
  chosen_spanish: que juró
  alternatives_spanish:
  - que prometió con juramento
  - que había jurado
  lexicon: HALOT
  rationale: El verbo jurar expresa bien el acto solemne del juramento divino. «Juró» es natural en español y conserva la fuerza de la promesa vinculante.
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural. «Padres» mantiene la referencia patriarcal explícita y conserva la precisión de género del texto.
theological_decisions:
- issue: Valor pactal de חֶסֶד
  english_pob_reading: the steadfast love
  chosen_spanish_reading: el amor leal
  alternative_spanish_readings:
  - la fidelidad de pacto
  - la misericordia
  - la bondad constante
  rationale: La expresión reúne afecto, lealtad y constancia dentro del marco del pacto. «Amor leal» mantiene esa tensión entre relación personal y compromiso vinculante, sin convertirlo en un mero atributo abstracto.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referencia masculina en לַאֲבֹתֶיךָ
  english_pob_reading: to your fathers
  chosen_spanish_reading: a tus padres
  alternative_spanish_readings:
  - a tus antepasados
  rationale: El hebreo especifica el plural masculino. Se conserva esa precisión, evitando neutralizar el referente donde el texto mismo lo concreta.
  doctrine_reference: Translation philosophy §4
- issue: Relación entre escuchar y obedecer
  english_pob_reading: you listen
  chosen_spanish_reading: escuchen
  alternative_spanish_readings:
  - oigan
  - obedezcan
  rationale: En este pasaje, escuchar implica responder fielmente, pero el verso añade explícitamente guardar y cumplir. Por eso «escuchen» conserva la base auditiva sin borrar la obediencia que ya desarrolla el contexto inmediato.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail en inglés: mantiene el paralelismo de escuchar/guardar/cumplir y preserva el léxico pactal clave (Yahvé, pacto, hesed). No se registran revisiones posteriores que cambien la lectura, y el estado de revisión indica alta conformidad sin cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se mantiene el paralelismo verbal con «guardar/guardar» en ambas mitades del verso.
  - «Pacto» y «amor leal» se eligieron para reflejar el campo semántico pactal sin calco rígido.
  - Los corchetes de notas aparecen solo en palabras o frases donde existe una alternativa relevante en el audit trail.
