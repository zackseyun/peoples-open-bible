  - severity: medium
    issue: La pareja «sea puesto en libertad / lo pondremos en libertad» es algo pesada
    rationale: Es fiel en sentido, pero «liberado / liberaremos» expresa el mismo vínculo verbal con mejor fluidez en español formal contemporáneo.
