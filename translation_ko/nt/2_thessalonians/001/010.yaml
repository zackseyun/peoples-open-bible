id: 2TH.1.10
reference: 2 Thessalonians 1:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅταν ἔλθῃ ἐνδοξασθῆναι ἐν τοῖς ἁγίοις αὐτοῦ καὶ θαυμασθῆναι ἐν πᾶσιν τοῖς πιστεύσασιν, ὅτι ἐπιστεύθη τὸ μαρτύριον ἡμῶν ἐφ’ ὑμᾶς, ἐν τῇ ἡμέρᾳ ἐκείνῃ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/010.yaml
  text: on that day when he comes to be glorified among his saints and to be marveled at among all who have believed[b][a], because our testimony to you was believed.
translation:
  language: ko
  text: 그날에 그분이 오셔서 자신의 성도들 가운데서 영광 받으시고 믿은 모든 자들 가운데서 놀라움의 대상이 되실 것입니다. 우리의 증언이 여러분에게 믿어졌기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자신의 성도들 안에서」. 헬라어 전치사 ἐν은 영광이 성도들 안에서 나타나는 의미일 수도, 그들 가운데서 인정받는 의미일 수도 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν ἔλθῃ
  english_pob_choice: when he comes
  chosen_korean: 그분이 오셔서
  alternatives_korean:
  - 그분이 오실 때
  lexicon: BDAG
  rationale: 가정법 부정과거의 확정적 미래 사건을 「오셔서」로 자연스럽게 옮기며, 문두 「그날에」와 연결한다.
- source_word: ἐνδοξασθῆναι
  english_pob_choice: to be glorified
  chosen_korean: 영광 받으시고
  alternatives_korean:
  - 영광을 받으시고
  - 영화롭게 되시고
  lexicon: BDAG
  rationale: 수동 부정사의 신적 영광 수용을 「영광 받으시고」로 옮긴다.
- source_word: ἐν τοῖς ἁγίοις αὐτοῦ
  english_pob_choice: among his saints
  chosen_korean: 자신의 성도들 가운데서
  alternatives_korean:
  - 자신의 성도들 안에서
  lexicon: BDAG
  rationale: ἐν의 공동체적·처소격적 의미를 「가운데서」로 자연스럽게 옮긴다. 「안에서」 해석은 각주로 보존.
- source_word: θαυμασθῆναι
  english_pob_choice: to be marveled at
  chosen_korean: 놀라움의 대상이 되실
  alternatives_korean:
  - 경탄을 받으실
  - 경이의 대상이 되실
  lexicon: BDAG
  rationale: 단순한 「찬탄」이 아니라 경외적 놀라움을 표현한다. 「놀라움의 대상이 되다」가 그 정도를 보존한다.
- source_word: ἐν πᾶσιν τοῖς πιστεύσασιν
  english_pob_choice: among all who have believed
  chosen_korean: 믿은 모든 자들 가운데서
  alternatives_korean:
  - 믿었던 모든 자들 가운데서
  lexicon: BDAG
  rationale: 분사의 동사적 행위를 보존하여 「믿은 자들」로 옮긴다.
- source_word: ὅτι ἐπιστεύθη τὸ μαρτύριον ἡμῶν ἐφ’ ὑμᾶς
  english_pob_choice: because our testimony to you was believed
  chosen_korean: 우리의 증언이 여러분에게 믿어졌기 때문입니다
  alternatives_korean:
  - 우리가 여러분에게 한 증언이 믿어졌기 때문입니다
  lexicon: BDAG
  rationale: 수동태 「믿어지다」가 데살로니가 신자들의 응답을 자연스럽게 표현한다.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_korean: 그날에
  alternatives_korean:
  - 그 날에
  lexicon: BDAG
  rationale: 종말론적 「그날」을 자연스럽게 옮긴다. 영어 POB가 문두로 이동시킨 자연스러운 어순을 따른다.
theological_decisions:
- issue: ἐν τοῖς ἁγίοις의 의미 — 「가운데서」 또는 「안에서」
  chosen_reading: 가운데서 (공동체적 정황)
  alternative_readings:
  - 안에서 (내주적·도구적 의미)
  rationale: 「믿은 모든 자들」과 평행되는 정황은 신자들이 영광이 드러나는 공동체임을 가리킨다. 본문에서는 공동체적 「가운데서」를, 각주에서 내주적 「안에서」를 보존한다.
  doctrine_reference: 'Preserve theological tension'
