revisions:
- from: Tres veces al año celebrarás una fiesta para mí[a].
  to: Tres veces al año me celebrarás una fiesta[a].
  rationale: Se revisa 'para mí' a 'me' para reflejar mejor לִי como dativo personal en un mandato cultual, manteniendo un español natural y digno. También se aligera la redacción de la nota para expresar con mayor claridad el referente del modismo hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:25:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del hebreo: la frecuencia anual (''tres veces''), la acción festiva de חגג y el matiz idiomático de רגלים con nota. Sin embargo, ''para mí'' no preserva tan de cerca como ''a mí'' el valor de לִי en esta formulación legal y cultual, donde el destinatario personal del festejo queda mejor expresado con ''a mí''.'
  spanish_quality_summary: 'El español es claro y natural. No obstante, ''celebrarás una fiesta para mí'' suena algo más coloquial e indirecto que ''me celebrarás fiesta'' o, mejor, ''celebrarás fiesta a mí''. La opción más natural y fiel en español bíblico moderno es ''Tres veces al año me celebrarás una fiesta'', pero esa construcción puede sonar menos fluida; una solución equilibrada es ''Tres veces al año celebrarás una fiesta[a] para mí'' o, más fiel al dativo, ''Tres veces al año celebrarás una fiesta[a] a mí'', aunque esta última resulta poco idiomática. La mejor reparación es ajustar la frase para mantener tanto naturalidad como dirección personal: ''Tres veces al año me celebrarás una fiesta[a]''.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías, etc. La nota léxica sobre 'tres pies' está bien conservada. La principal corrección es sintáctico-semántica en la representación de לִי.
  issues:
  - severity: medium
    issue: La traducción de לִי como 'para mí' es menos precisa que la del dativo personal en este contexto.
    rationale: El hebreo marca la fiesta como dirigida personalmente a Dios. 'Para mí' es posible, pero en esta cláusula legal 'me celebrarás una fiesta' preserva mejor la relación personal sin sonar forzado.
  - severity: low
    issue: La nota dice 'ocasiones festivas de peregrinación', formulación comprensible pero algo pesada.
    rationale: Puede suavizarse a 'las tres fiestas de peregrinación del año' o 'las tres ocasiones de peregrinación festiva del año'. Sin embargo, la nota actual sigue siendo fiel y clara.
  revised_spanish_text: Tres veces al año me celebrarás una fiesta[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «tres pies». Este modismo hebreo se refiere a las tres fiestas de peregrinación del año.
    reason: lexical_alternative
  revision_rationale: Se revisa 'para mí' a 'me' para reflejar mejor לִי como dativo personal en un mandato cultual, manteniendo un español natural y digno. También se aligera la redacción de la nota para expresar con mayor claridad el referente del modismo hebreo.
