translation:
  language: es
  text: 'Entonces Harbona, uno de los eunucos delante del rey, dijo: «También, he aquí, la horca[a] que Amán hizo para Mardoqueo, que habló en favor del rey[b], está en la casa de Amán, de cincuenta codos de alto». Y el rey dijo[c]: «Cuélguenlo en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el árbol/la madera'' (הָעֵץ); aquí se refiere a una estructura de ejecución, tradicionalmente ''horca''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''que habló bien del rey'' o ''que habló bien por el rey''.'
    reason: lexical_alternative
  - marker: c
    text: 'O posiblemente: ''Impálenlo en ella''; el hebreo puede referirse de manera más amplia a la suspensión en una estructura de madera, no solo a una horca en sentido moderno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַרְבוֹנָה
  english_pob_choice: Harbonah
  chosen_spanish: Harbona
  alternatives_spanish:
  - Harbona
  - Jarbona
  lexicon: Transliteración del nombre propio
  rationale: Se translitera el nombre propio de manera cercana al hebreo y al uso común en español bíblico; 'Harbona' conserva la forma audible con buena fluidez en español.
- source_word: הַסָּרִיסִים
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales
  - funcionarios de corte
  lexicon: HALOT
  rationale: En el contexto persa de Ester, 'סריסים' designa de forma directa eunucos de la corte; la POB inglesa eligió 'eunuchs', y 'eunucos' preserva esa fuerza léxica.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  lexicon: HALOT
  rationale: '''Delante del rey'' mantiene el valor idiomático de comparecencia ante la autoridad real y suena natural en español bíblico contemporáneo.'
- source_word: גַּם הִנֵּה
  english_pob_choice: Also, behold
  chosen_spanish: También, he aquí
  alternatives_spanish:
  - Y he aquí
  - Además, mirad
  lexicon: HALOT
  rationale: La combinación añade énfasis y deíxis; 'también, he aquí' conserva el añadido y el gesto de señalar sin volverlo demasiado coloquial.
- source_word: הָעֵץ
  english_pob_choice: gallows
  chosen_spanish: el madero
  alternatives_spanish:
  - el patíbulo
  - la horca
  - el árbol
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'el árbol/madera'; en Ester se refiere a un instrumento de ejecución. En español, 'madero' mantiene la literalidad del término base y evita imponer de entrada una forma moderna o técnica más específica que el hebreo no exige.
- source_word: עָשָׂה ... לְמָרְדֳּכַי
  english_pob_choice: made for Mordecai
  chosen_spanish: hizo para Mardoqueo
  alternatives_spanish:
  - preparó para Mardoqueo
  lexicon: HALOT
  rationale: '''Hizo para'' reproduce la sencillez del verbo עשה y el dativo hostil con לְ, sin añadir matices no explícitos.'
- source_word: דִּבֶּר טוֹב עַל הַמֶּלֶךְ
  english_pob_choice: spoke good for the king
  chosen_spanish: habló bien por el rey
  alternatives_spanish:
  - habló en favor del rey
  - habló favorablemente del rey
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'habló bien por el rey' mantiene la forma y la ambigüedad de si fue 'en favor de' o 'acerca de' el rey, como lo hace la POB inglesa.
- source_word: עֹמֵד
  english_pob_choice: is standing
  chosen_spanish: está
  alternatives_spanish:
  - está en pie
  - permanece
  lexicon: HALOT
  rationale: El participio expresa estado presente; en español, 'está' comunica de forma natural que el objeto se encuentra ya erigido, sin forzar una perífrasis menos idiomática.
- source_word: בְּבֵית הָמָן
  english_pob_choice: at Haman’s house
  chosen_spanish: en la casa de Amán
  alternatives_spanish:
  - en la propiedad de Amán
  - junto a la casa de Amán
  lexicon: HALOT
  rationale: '''En la casa de Amán'' es la forma más directa y natural para el lugar donde se alza el madero; preserva la localización sin añadir especificaciones no presentes en el hebreo.'
- source_word: גָּבֹהַּ חֲמִשִּׁים אַמָּה
  english_pob_choice: fifty cubits high
  chosen_spanish: alto de cincuenta codos
  alternatives_spanish:
  - de cincuenta codos de alto
  - cincuenta codos de altura
  lexicon: HALOT
  rationale: Se conserva la unidad antigua en el cuerpo del texto por fidelidad formal y auditabilidad; 'alto de' reproduce bien el adjetivo hebreo y la medida.
- source_word: תְּלֻהוּ עָלָיו
  english_pob_choice: Hang him on it
  chosen_spanish: Cuélguenlo en él
  alternatives_spanish:
  - Péguenlo allí
  - Impálenlo en él
  lexicon: HALOT
  rationale: '''Cuélguenlo en él'' refleja la forma imperativa y el pronombre sufijado. Aunque el término puede abarcar suspensión en un madero y, por extensión histórica, impalación, la POB inglesa mantuvo ''hang'' en el texto principal; en español se conserva igualmente esa lectura básica.'
theological_decisions:
- issue: Modo de ejecución implícito en הָעֵץ / תְּלֻהוּ עָלָיו
  english_pob_reading: The main text says 'gallows' and 'Hang him on it,' while the notes preserve the broader possibility of impaling on a wooden structure.
  chosen_spanish_reading: En el texto principal se dice 'madero' y 'Cuélguenlo en él', dejando abierta la amplitud del hebreo sobre la forma exacta de la ejecución.
  alternative_spanish_readings:
  - '''horca'' y ''Cuélguenlo en ella'''
  - '''patíbulo'' y ''Impálenlo en él'''
  rationale: El hebreo usa un término amplio para madera/árbol y una orden de suspensión que puede abarcar más de un procedimiento histórico. Traducir con 'madero' evita cerrar indebidamente la tensión lexical; la orden 'Cuélguenlo en él' sigue la lectura principal sin negar la nota de posibilidad más amplia.
  doctrine_reference: Criterio de fidelidad lexical y no-estrechamiento semántico en textos narrativos.
- issue: Sentido de דִּבֶּר טוֹב עַל הַמֶּלֶךְ
  english_pob_reading: '''who spoke good for the king'' with a footnote allowing ''spoke well for the king'' / ''in the king’s favor''.'
  chosen_spanish_reading: '''que habló bien por el rey'', con la posibilidad de entender ''en favor del rey''.'
  alternative_spanish_readings:
  - '''que habló bien del rey'''
  - '''que habló a favor del rey'''
  rationale: La frase hebrea es idiomática y puede referirse a una palabra beneficiosa para el rey. 'Habló bien por el rey' conserva el giro y la ambigüedad productiva, sin decidir prematuramente entre 'acerca de' y 'en favor de'.
  doctrine_reference: Principio de transparencia textual y preservación de ambigüedad semántica cuando el original la permite.
translation_notes:
  revision_awareness: La POB inglesa revisó 'look' a 'behold' para un registro más formal. La redacción española conserva esa solemnidad con 'he aquí'. También se respetó la decisión de mantener el idioma principal sin resolver de forma excesiva la amplitud del hebreo en הָעֵץ y תְּלֻהוּ עָלָיו.
  spanish_consistency_notes:
  - Se usa 'Amán' y 'Mardoqueo' conforme a la tradición española bíblica, manteniendo transliteración estable de nombres propios.
  - '''Yahvé'' no aparece en este versículo; no se aplica la convención del nombre divino.'
  - Se eligió 'eunucos' por la fuerza léxica del contexto cortesano persa.
  - Se evitó 'SEÑOR' u otras sustituciones interpretativas, siguiendo el texto hebreo y el auditable inglés de la POB.
