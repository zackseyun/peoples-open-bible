  revision_rationale: Se ajusta la primera frase a una forma más natural e inequívocamente colectiva en español («en medio de su angustia») sin apartarse del singular colectivo del hebreo. Se mueve la nota al lugar correcto, porque sus alternativas explican el plural de «sus aflicciones», no «angustia». También se limpia la redacción de la nota.
