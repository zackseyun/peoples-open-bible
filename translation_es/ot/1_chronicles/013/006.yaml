base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/013/006.yaml
  text: So David and all Israel went up to Baalah[a], that is, to Kiriath-jearim, which belongs to Judah, to bring up from there the ark of God, Yahweh who is enthroned above the cherubim, whose name is called upon it.
  footnotes:
