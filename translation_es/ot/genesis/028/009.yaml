translation:
  language: es
  text: Así que Esaú fue a Ismael y tomó a Mahalat[a], hija de Ismael hijo de Abraham, hermana de Nebaiot, por esposa, además de sus esposas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de sus esposas». La frase hebrea indica que Mahalat fue tomada como una esposa adicional, no como sustituta de las esposas que Esaú ya tenía.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se dirigió
  lexicon: HALOT
  rationale: El wayyiqtol de הלך narra una acción siguiente en la secuencia. «Fue» mantiene el movimiento narrativo sin añadir énfasis que el hebreo no expresa.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca movimiento hacia una persona. En español, «a» es la opción más natural y fiel aquí.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - recibió
  lexicon: HALOT
  rationale: «Tomó» conserva el verbo literal del hebreo y deja que el sentido matrimonial quede explícito por la frase siguiente, como en la auditoría inglesa.
- source_word: מָחֲלַת
  english_pob_choice: Mahalath
  chosen_spanish: Mahalat
  alternatives_spanish:
  - Mahalath
  lexicon: transliteración propia del proyecto
  rationale: Se translitera el nombre propio al español. «Mahalat» sigue la adaptación ortográfica habitual en español y conserva la identidad del nombre sin traducirlo.
- source_word: בַּת יִשְׁמָעֵאל בֶּן אַבְרָהָם
  english_pob_choice: the daughter of Ishmael son of Abraham
  chosen_spanish: la hija de Ismael, hijo de Abraham
  alternatives_spanish:
  - hija de Ismael, hijo de Abraham
  - la hija de Ismael, el hijo de Abraham
  lexicon: HALOT
  rationale: La cadena constructa identifica a Mahalat por linaje. «La hija de Ismael, hijo de Abraham» sigue de cerca el hebreo y suena natural en español.
- source_word: אֲחוֹת נְבָיֹות
  english_pob_choice: the sister of Nebaioth
  chosen_spanish: hermana de Nebaiot
  alternatives_spanish:
  - hermana de Nebaiot
  - hermana de Nebaiot[a]
  lexicon: HALOT
  rationale: Se mantiene la identificación appositiva. «Nebaiot» es la forma española del nombre propio, más clara y consistente en lectura pública.
- source_word: עַל נָשָׁיו
  english_pob_choice: in addition to his wives
  chosen_spanish: además de sus esposas
  alternatives_spanish:
  - aparte de sus esposas
  - además de las esposas que ya tenía
  lexicon: HALOT
  rationale: El עַל aquí expresa adición, no relación espacial. «Además de sus esposas» comunica que Mahalat se añadió a las esposas que Esaú ya tenía.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife for himself
  chosen_spanish: como esposa para sí
  alternatives_spanish:
  - como mujer para sí
  - para ser su esposa
  lexicon: HALOT
  rationale: La construcción final indica propósito/resultadо matrimonial y el matiz reflexivo de לוֹ. «Como esposa para sí» lo preserva con naturalidad en español.
theological_decisions:
- issue: El valor de עַל נָשָׁיו en relación con las esposas previas de Esaú
  english_pob_reading: The Hebrew phrase indicates that Mahalath was taken as an additional wife, not as a replacement for the wives Esau already had.
  chosen_spanish_reading: El hebreo indica que Mahalat fue tomada como una esposa adicional, no como sustituta de las esposas que Esaú ya tenía.
  alternative_spanish_readings:
  - «además de sus esposas»
  - «aparte de sus esposas»
  rationale: 'Se conserva la tensión textual: el versículo no dice que reemplazó a sus esposas, sino que se añadió a ellas. La redacción española mantiene esa implicación sin sobreexplicarla en el texto principal.'
  doctrine_reference: Génesis 28:9; nota textual/lexical sobre עַל נָשָׁיו
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin cambios de sentido: mantener el verbo de movimiento simple, conservar el sentido literal de «tomó», explicitar el linaje de Mahalat y preservar el valor aditivo de עַל נָשָׁיו. La frase final se ajustó a español natural con el matiz reflexivo de לוֹ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino.
  - 'Se mantuvo la transliteración de nombres propios en forma española consistente: Esaú, Ismael, Abraham, Nebaiot, Mahalat.'
  - «Esposas» traduce נָשָׁיו en plural con el sentido relacional esperado por el contexto; no se atenúa a «mujeres» porque el texto concluye con לְאִשָּׁה, que especifica relación matrimonial.
