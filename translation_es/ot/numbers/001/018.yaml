base_translation:
  language: en
  yaml_path: translation/ot/numbers/001/018.yaml
  text: And they assembled all the congregation on the first day of the second month[a], and they registered themselves by clans, by their fathers’ houses, according to the number of names, from twenty years old and upward[b], head by head.
  footnotes:
  - marker: a
    text: Or 'declared their ancestry' / 'enrolled themselves by genealogy'; the Hebrew verb is a rare genealogical expression indicating registration on the basis of descent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by their heads' or 'by their skulls,' an idiom meaning each individual was counted one by one.
    reason: lexical_alternative
