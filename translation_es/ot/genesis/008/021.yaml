translation:
  language: es
  text: 'Y Yahvé olió el aroma agradable[a], y Yahvé dijo en su corazón[b]: «No volveré a maldecir la tierra por causa del hombre[c], porque la inclinación del corazón del hombre es mala desde su juventud[d]. Y no volveré a destruir a todo ser viviente, como he hecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aroma apaciguador». La expresión sacrificial hebrea puede destacar que el olor es agradable o calmante.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «a su corazón».'
    reason: lexical_alternative
  - marker: c
    text: O «por causa de la humanidad». El hebreo «hombre» aquí es genérico y se refiere a la humanidad.
    reason: lexical_alternative
  - marker: d
    text: O «la inclinación del corazón del hombre es mala desde su juventud».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Transliteración del nombre divino
  rationale: Se conserva el nombre propio del pacto en forma transliterada, siguiendo la pauta del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: וַיָּרַח ... רֵיחַ הַנִּיחֹחַ
  english_pob_choice: smelled the pleasing aroma
  chosen_spanish: percibió el aroma agradable
  alternatives_spanish:
  - olió el aroma agradable
  - percibió el aroma soothing / apaciguador
  lexicon: HALOT
  rationale: El hebreo es antropomórfico y sensorial. En español, «percibió» evita una literalidad extraña para Dios y conserva la imagen del aroma sacrificial; «agradable» reproduce el valor de נִיחֹחַ como olor aceptable/placentero.
- source_word: אֶל לִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - a su corazón
  lexicon: HALOT
  rationale: La correspondencia más cercana y natural al hebreo es la locución «en su corazón», que preserva la interioridad del discurso divino. La nota explica el hebraísmo sin desdibujarlo.
- source_word: לֹא אֹסִף ... עוֹד
  english_pob_choice: I will never again
  chosen_spanish: No volveré
  alternatives_spanish:
  - Nunca más volveré
  - No añadiré otra vez
  lexicon: HALOT
  rationale: La combinación verbal expresa no repetir la acción. «No volveré» es idiomático en español y mantiene la fuerza repetitiva de la negación con עוֹד.
- source_word: לְקַלֵּל
  english_pob_choice: curse
  chosen_spanish: maldecir
  alternatives_spanish:
  - proferir maldición sobre
  - dar una maldición a
  lexicon: HALOT
  rationale: En español bíblico «maldecir» comunica directamente el sentido de קלל en este contexto de juicio sobre la tierra.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: «Tierra» funciona bien en español como equivalente amplio de אֲדָמָה y mantiene el eco del juicio cósmico posterior al diluvio.
- source_word: בַּעֲבוּר הָאָדָם
  english_pob_choice: because of man
  chosen_spanish: por causa del hombre
  alternatives_spanish:
  - a causa del hombre
  - por causa de la humanidad
  lexicon: HALOT
  rationale: Se conserva el singular genérico de אָדָם con «el hombre», tal como la lectura POB documenta, mientras que «por causa de» expresa adecuadamente la relación causal.
- source_word: יֵצֶר לֵב הָאָדָם
  english_pob_choice: the inclination of man’s heart
  chosen_spanish: la inclinación del corazón del hombre
  alternatives_spanish:
  - la intención del corazón del hombre
  - la tendencia del corazón del hombre
  lexicon: HALOT
  rationale: יֵצֶר se entiende mejor aquí como inclinación/tendencia moral del interior humano; «inclinación» mantiene la tensión moral y sigue la revisión más reciente del POB en inglés.
- source_word: רַע
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  lexicon: HALOT
  rationale: En español, «mala» funciona de forma natural con «inclinación» y preserva la valoración moral sin sobrecargar el verso con una formulación demasiado abstracta.
- source_word: מִנְּעֻרָיו
  english_pob_choice: from his youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde su niñez
  - desde sus primeros años
  lexicon: HALOT
  rationale: Es la equivalencia más directa y sobria para el período vital indicado por el hebreo.
- source_word: לְהַכּוֹת
  english_pob_choice: strike down
  chosen_spanish: golpear
  alternatives_spanish:
  - derribar
  - herir
  - aniquilar
  lexicon: HALOT
  rationale: En esta cláusula el verbo expresa el acto de juzgar con violencia. «Golpear» mantiene la literalidad básica del hebreo; la nota permite ver que el sentido es el de una acción devastadora de juicio, no un simple golpe físico.
- source_word: כָּל חַי
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo lo vivo
  lexicon: HALOT
  rationale: «Todo ser viviente» preserva la amplitud colectiva de la expresión hebrea y suena natural en español bíblico contemporáneo.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  english_pob_choice: as I have done
  chosen_spanish: como he hecho
  alternatives_spanish:
  - como hice
  - tal como he hecho
  lexicon: HALOT
  rationale: El perfecto hebreo queda bien reflejado con el pretérito perfecto compuesto en español, que conserva la referencia a una acción pasada con vigencia en el presente narrativo.
theological_decisions:
- issue: Antropomorfismo divino en el lenguaje sacrificial
  english_pob_reading: 'Retain the anthropomorphism: ''Yahweh smelled the pleasing aroma'' and ''said in his heart.'''
  chosen_spanish_reading: 'Conservar el antropomorfismo: «Yahvé percibió el aroma agradable» y «dijo en su corazón».'
  alternative_spanish_readings:
  - Yahvé aceptó la ofrenda
  - Yahvé resolvió interiormente
  rationale: El hebreo presenta expresiones concretas y corporales. La versión española conserva esa forma de hablar, sin sustituirla por una abstracción teológica que atenúe la fuerza del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of אָדָם in generic singular statements
  english_pob_reading: Use 'man' in the main text.
  chosen_spanish_reading: Usar «el hombre» en el texto principal.
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: El singular genérico de אָדָם se mantiene con «el hombre», conservando la fuerza representativa y la correspondencia con el hebreo.
  doctrine_reference: Translation philosophy §4; tabla de términos controvertidos para אָדָם
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que prefirió «in his heart» sobre «to himself» y «inclination» sobre «intention» para יֵצֶר, manteniendo el enfoque en la interioridad y el matiz moral del texto.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar para יְהוָה.
  - Se conserva el singular genérico «el hombre» para אָדָם, con nota explicativa.
  - Se preserva la tensión antropomórfica del hebreo sin convertirla en paráfrasis teológica.
  - Se usa terminología sobria y bíblica, evitando calcos innecesarios.
  - Las notas a–d corresponden exactamente a los anclajes del texto y no se reutilizan.
