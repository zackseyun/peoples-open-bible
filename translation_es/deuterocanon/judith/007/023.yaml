translation:
  language: es
  text: Y se reunió todo el pueblo contra Ozías y los gobernantes de la ciudad—los jóvenes varones[a], las mujeres y los niños—y clamaron a gran voz y hablaron contra los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ante Ozías y los gobernantes de la ciudad' si ἐπὶ / ἐναντίον se toman en sentido menos adversativo; el contexto inmediato de protesta pública favorece 'contra'.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπισυνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - se congregó
  lexicon: LSJ
  rationale: El aoristo pasivo con valor intransitivo se expresa naturalmente en español como una reunión del pueblo. 'Se reunió' conserva la acción colectiva sin forzar un calco.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - la totalidad del pueblo
  lexicon: LSJ
  rationale: '''Pueblo'' comunica la comunidad entera con tono bíblico y público; ''todo'' preserva el alcance distributivo de πᾶς.'
- source_word: ἐπὶ Ὀζείαν
  english_pob_choice: against Oziah
  chosen_spanish: contra Ozías
  alternatives_spanish:
  - ante Ozías
  - hacia Ozías
  lexicon: LSJ
  rationale: Siguiendo la lectura adversativa defendida en el audit trail inglés, 'contra' expresa la oposición pública del grupo a Ozías.
- source_word: τοὺς ἄρχοντας τῆς πόλεως
  english_pob_choice: the rulers of the city
  chosen_spanish: los gobernantes de la ciudad
  alternatives_spanish:
  - los líderes de la ciudad
  - los magistrados de la ciudad
  lexicon: LSJ
  rationale: '''ἄρχοντες'' nombra autoridades civiles; ''gobernantes'' mantiene la idea de autoridad oficial sin especificar una magistratura concreta.'
- source_word: οἱ νεανίσκοι
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los varones jóvenes
  lexicon: LSJ
  rationale: Aunque el griego es masculino plural, en español 'los jóvenes' comunica de forma natural el grupo masculino joven sin sonar forzado.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - las criaturas
  lexicon: LSJ
  rationale: '''Niños'' es la equivalencia más clara y directa para el grupo de menores.'
- source_word: ἀνεβόησαν φωνῇ μεγάλῃ
  english_pob_choice: cried out with a loud voice
  chosen_spanish: clamaron con voz fuerte
  alternatives_spanish:
  - gritaron con gran voz
  - alzaron un gran clamor
  lexicon: LSJ
  rationale: '''Clamaron'' mantiene la intensidad pública del verbo; ''con voz fuerte'' reproduce la fuerza de φωνῇ μεγάλῃ sin sonar demasiado arcaico.'
- source_word: εἶπαν ἐναντίον τῶν πρεσβυτέρων
  english_pob_choice: spoke against the elders
  chosen_spanish: hablaron contra los ancianos
  alternatives_spanish:
  - dijeron contra los ancianos
  - hablaron delante de los ancianos
  lexicon: LSJ
  rationale: Se conserva la lectura adversativa 'contra'. 'Ancianos' refleja πρεσβύτεροι en un marco comunitario; aquí el contexto favorece la referencia a los mayores/dirigentes del pueblo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español junto al segmento correspondiente.
  spanish_consistency_notes:
  - Se mantuvo 'Ozías' como forma española del nombre propio.
  - Se evitó 'SEÑOR' o terminología no pertinente; el versículo no contiene vocabulario divino.
  - '''Ancianos'' se usa para πρεσβύτεροι siguiendo el sentido de autoridad comunitaria, no como adjetivo de edad בלבד.'
