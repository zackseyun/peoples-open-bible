  from: of men, those who are
  to: of every man who exists
  rationale: The OCR string ⲉⲛⲓⲙⲉⲧ ϣⲟⲟⲡ is a slight corruption or variant of ⲛⲓⲙ ⲉⲧ-ϣⲟⲟⲡ.
