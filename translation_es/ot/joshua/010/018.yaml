translation:
  language: es
  text: 'Y Josué dijo: «Hagan rodar piedras grandes hasta la boca de la cueva[a], y asignen hombres sobre ella para custodiarla[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la entrada de la cueva». El hebreo dice literalmente «a la boca de la cueva».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «para guardarlos», con un objeto plural, probablemente refiriéndose a los reyes encerrados en la cueva más que a la cueva misma. Aquí se sigue la revisión que toma el referente en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol avanza la acción; «Y ... dijo» conserva el flujo narrativo sin sobrecargar la secuencia temporal.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Convención bíblica española
  rationale: En español bíblico, el nombre se translitera como «Josué», forma estable y clara para la lectura eclesial.
- source_word: גֹּלּוּ
  english_pob_choice: Roll
  chosen_spanish: Rueden
  alternatives_spanish:
  - Movan
  - Hagan rodar
  lexicon: HALOT
  rationale: El imperativo plural de גלל se expresa naturalmente en español con el verbo «rodar»; «rueden» mantiene la imagen física de las piedras.
- source_word: אֲבָנִים גְּדֹלוֹת
  english_pob_choice: large stones
  chosen_spanish: piedras grandes
  alternatives_spanish:
  - piedras enormes
  - grandes piedras
  lexicon: HALOT
  rationale: «Grandes» reproduce el valor de tamaño del adjetivo y la combinación «piedras grandes» suena natural en español moderno.
- source_word: אֶל פִּי הַמְּעָרָה
  english_pob_choice: to the mouth of the cave
  chosen_spanish: hasta la boca de la cueva[a]
  alternatives_spanish:
  - a la entrada de la cueva
  - contra la boca de la cueva
  lexicon: HALOT
  rationale: «Boca» conserva la metáfora hebrea de פִּי; se usa «hasta» para el movimiento hacia el punto de cierre. La nota ofrece la alternativa interpretativa «entrada».
- source_word: וְהַפְקִידוּ
  english_pob_choice: and appoint
  chosen_spanish: y pongan ... sobre ella
  alternatives_spanish:
  - y nombren
  - y asignen
  lexicon: HALOT
  rationale: En este contexto, el sentido es colocar hombres con responsabilidad sobre la cueva; «pongan» comunica la acción de destinar o situar, sin forzar un tecnicismo ajeno al español bíblico.
- source_word: עָלֶיהָ
  english_pob_choice: over it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - a cargo de ella
  lexicon: HALOT
  rationale: El hebreo על expresa ubicación y supervisión; «sobre ella» conserva la relación espacial y de custodia.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hombres»; se mantiene la referencia masculina sin convertirla en un término genérico más amplio.
- source_word: לְשָׁמְרָם
  english_pob_choice: to guard them
  chosen_spanish: para guardarla[b]
  alternatives_spanish:
  - para guardarlos
  - para vigilarla
  lexicon: HALOT
  rationale: El contexto inmediato favorece que el pronombre singular se refiera a la cueva, aunque el hebreo presenta una tensión con el sufijo plural. La traducción sigue la revisión inglesa y el referente singular más cercano, mientras la nota puede señalar la posible tensión textual.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en el último paso de «guard them» a «guard it» para ajustar el referente singular de la cueva. La propuesta española sigue esa decisión revisada y conserva la alternativa de lectura en nota, dado que el hebreo presenta una tensión entre la forma gramatical plural del sufijo y el referente singular inmediato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «Josué» por convención bíblica española y no «Joshua».
  - Se conserva la metáfora hebrea «boca de la cueva» con nota alternativa «entrada de la cueva».
  - Se mantiene la concordancia singular en «guardarla» siguiendo el referente inmediato de la cueva, pero se documenta la tensión del sufijo plural en la nota.
  - El registro es bíblico moderno y sobrio, evitando calcos innecesarios como «estacionen» o «designen» para מִפְקִידוּ.
