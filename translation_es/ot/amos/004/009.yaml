- from: Os herí con tizón y con añublo; vuestros muchos jardines y vuestros viñedos[a], vuestros higuerales y vuestros olivares los devoró la langosta[b]; pero no os volvisteis a mí, declara Yahvé.
  to: Los herí con tizón y con añublo; sus muchos jardines y sus viñedos, sus higueras y sus olivos, los devoró la langosta[a]; pero no regresaron a mí, declara Yahvé.
  rationale: Se ajustó el texto al español neutro latinoamericano ('los/sus/regresaron') sin alterar el sentido. Se reemplazaron 'higuerales' y 'olivares' por 'higueras' y 'olivos' para seguir más de cerca la decisión léxica auditada y evitar un matiz de plantación no exigido por el hebreo. Se eliminó la nota sobre 'viñedos' por innecesaria y se conservó únicamente la nota válida sobre הַגָּזָם.
