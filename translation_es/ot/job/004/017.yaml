translation:
  language: es
  text: ¿Puede el mortal ser justo delante de Dios? ¿Puede el hombre ser puro delante de su Hacedor?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «¿Puede el mortal ser más justo que Dios? ¿Puede el hombre ser más puro que su Hacedor?»'
    reason: alternative_reading
lexical_decisions:
- source_word: הַאֱנוֹשׁ
  english_pob_choice: mortal man
  chosen_spanish: el mortal
  alternatives_spanish:
  - el hombre
  - un ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ resalta la fragilidad y mortalidad humanas; en español, “el mortal” conserva ese matiz y mantiene la fuerza poética de contraste con Dios.
- source_word: מֵאֱלוֹהַ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - frente a Dios
  - más que Dios
  lexicon: HALOT
  rationale: La construcción con מן en este contexto es relacional/comparativa. “Delante de Dios” comunica de forma natural la relación de juicio/comparecencia sin forzar el comparativo más literal.
- source_word: יִצְדָּק
  english_pob_choice: be in the right
  chosen_spanish: ser justo
  alternatives_spanish:
  - estar en lo justo
  - ser recto
  - justificarse
  lexicon: HALOT
  rationale: צדק aquí expresa la condición de estar en lo correcto o justo en relación con Dios. “Ser justo” es una formulación española clara que mantiene el sentido forense-relacional.
- source_word: אִם
  english_pob_choice: Can
  chosen_spanish: ¿Puede
  alternatives_spanish:
  - ¿Acaso puede?
  - ¿Es posible que?
  - si
  lexicon: HALOT
  rationale: En paralelismo poético, אִם introduce una segunda pregunta retórica. “¿Puede” reproduce el valor interrogativo de manera fluida en español.
- source_word: מֵעֹשֵׂהוּ
  english_pob_choice: before his Maker
  chosen_spanish: delante de su Hacedor
  alternatives_spanish:
  - ante su Hacedor
  - delante del que lo hizo
  - más que su Hacedor
  lexicon: HALOT
  rationale: El participio con sufijo significa “su Hacedor”. “Delante de su Hacedor” conserva el contraste criatura-Creador y la relación implícita de comparecencia.
- source_word: יִטְהַר
  english_pob_choice: be pure
  chosen_spanish: ser puro
  alternatives_spanish:
  - estar limpio
  - purificarse
  - ser limpio
  lexicon: HALOT
  rationale: טהר denota pureza/limpieza. “Ser puro” mantiene el paralelismo con “ser justo” y funciona bien en español bíblico contemporáneo.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - el varón
  - el valiente
  lexicon: HALOT
  rationale: גָּבֶר es un sustantivo masculino singular usado aquí en paralelo con אֱנוֹשׁ. “El hombre” preserva el paralelismo sin añadir una connotación de fuerza que no domina el contexto.
theological_decisions:
- issue: Relación humana con Dios en una pregunta retórica
  english_pob_reading: The verse asks whether any mortal can be right or pure before God, while preserving the comparative tension in Hebrew.
  chosen_spanish_reading: El versículo pregunta si algún mortal puede ser justo o puro delante de Dios, manteniendo la tensión entre la criatura y su Creador.
  alternative_spanish_readings:
  - ¿Puede el hombre ser más justo que Dios?
  - ¿Puede el hombre ser más puro que su Hacedor?
  rationale: La construcción hebrea permite un matiz comparativo o relacional. En español, “delante de Dios / delante de su Hacedor” expresa con naturalidad la relación de juicio sin eliminar la posible lectura comparativa que el hebreo admite.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: La versión corrige el problema de validación anterior al anclar la nota [a] directamente en el texto español. También sigue de cerca el hebreo de Job 4:17, conservando el paralelismo poético y la tensión relacional/comparativa documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene “Dios” para אֱלוהַ, sin sustituirlo por una forma velada.
  - “Hacedor” preserva el vínculo creador-criatura de עֹשֵׂהוּ.
  - Se evita importar una formulación doctrinal posterior; la pregunta sigue siendo retórica y abierta al matiz del hebreo.
  - El marcado [a] aparece exactamente una vez en el texto y coincide con la nota correspondiente.
