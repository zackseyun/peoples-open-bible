revisions:
- from: Porque desde lejos[a] verás la tierra, pero no irás allí[b], a la tierra que yo doy a los hijos de Israel.
  to: Porque desde lejos[a] verás la tierra, pero no entrarás en ella, en la tierra que yo doy a los hijos de Israel[b].
  rationale: Se corrige la ubicación y el contenido de la nota [b] para que preserve la decisión auditada sobre בְנֵי יִשְׂרָאֵל. Además, se ajusta la cláusula central a «no entrarás en ella» para reflejar con mayor precisión el sentido de acceso negado de לֹא תָבֹא אֶל הָאָרֶץ en español natural y digno. La nota [a] se pule para una alternativa más idiomática.
