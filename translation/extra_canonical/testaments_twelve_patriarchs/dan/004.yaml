translation:
  text: '1[a]. For anger is blindness. It does not allow one to see the face of any man with truth.


    2. For first it is stirred up by a word; then by deeds it strengthens the one who is becoming angry; and by bitter losses it provokes him. It throws his purpose into confusion, and so it rouses his soul in great fury.


    3[b]. Therefore, when anyone speaks against you, do not be moved to anger; and if anyone praises you as holy, do not be exalted. Be changed neither to delight nor to disgust.


    4. For first it pleases the hearing, and so it sharpens the mind to perceive the provocation; and when he has become wrathful, he thinks that he is justly angry.


    5. But if you fall into any loss or ruin, children, do not be distressed. For this very spirit makes one desire to be angry over what is perishing, so that he may fall into anger through affliction.


    6. And if you suffer loss willingly or unwillingly, do not be grieved; for from grief anger also arises with falsehood.


    7. And anger with falsehood is a two-faced evil, and they join with one another in order to trouble the heart; and when the soul is continually troubled, the Lord departs from it[c][d], and Beliar rules over it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening sentence is partially truncated in the supplied Greek excerpt; the translation reflects the sense implied by the surviving clause 'For anger is blindness.'
    reason: textual_variant
    anchor_ref: '4:1'
  - marker: b
    text: The Greek around 'to perceive the provocation' is textually difficult; possible alternatives include 'to perceive what has been stirred up' or 'to perceive the irritation.'
    reason: alternative_reading
    anchor_ref: '4:4'
  - marker: d
    text: '''With falsehood'' may mean that anger arises accompanied by deceit, or that grief gives rise to anger that is then reinforced by lies.'
    reason: alternative_reading
    anchor_ref: '4:6'
  - marker: c
    text: Beliar is a traditional name for the evil power/adversary in Jewish literature; some English traditions normalize the name as 'Belial.'
    reason: cultural_note
    anchor_ref: '4:7'
lexical_decisions:
- source_word: παροξύνεται
  chosen: is stirred up
  alternatives:
  - is provoked
  - is irritated
  lexicon: LSJ
  rationale: Keeps the passive/inchoative sense in context of anger being set in motion by speech, while sounding natural in English.
- source_word: δυναμοῖ
  chosen: strengthens
  alternatives:
  - empowers
  - makes strong
  lexicon: LSJ
  rationale: Preserves the image that deeds reinforce or intensify the angry person rather than merely causing anger.
- source_word: ζημίαις πικραῖς
  chosen: by bitter losses
  alternatives:
  - by grievous damages
  - by painful injuries
  lexicon: LSJ
  rationale: ζημία here is material or experiential loss; 'bitter losses' preserves the moral-psychological sting without over-specifying.
- source_word: διαβούλιον
  chosen: purpose
  alternatives:
  - plan
  - deliberation
  - counsel
  lexicon: LSJ
  rationale: Conveys the faculty of considered intention that anger throws into confusion.
- source_word: κινεῖσθε εἰς ὀργήν
  chosen: be moved to anger
  alternatives:
  - be stirred to anger
  - be provoked to anger
  lexicon: LSJ
  rationale: Retains the motion metaphor of the Greek and fits the paraenetic tone.
- source_word: ἐπαίρεσθε
  chosen: be exalted
  alternatives:
  - be puffed up
  - be lifted up
  lexicon: LSJ
  rationale: Preserves the warning against self-elevation in response to praise; more elevated than 'get proud.'
- source_word: μεταβάλλεσθε
  chosen: be changed
  alternatives:
  - be altered
  - turn
  lexicon: LSJ
  rationale: Keeps the broad verbal force and allows the paired contrasts 'neither...nor...' to stand clearly.
- source_word: τέρψιν
  chosen: delight
  alternatives:
  - pleasure
  - enjoyment
  lexicon: LSJ
  rationale: A concise elevated term matching the rhetorical pair with disgust.
- source_word: ἀηδίαν
  chosen: disgust
  alternatives:
  - aversion
  - distaste
  lexicon: LSJ
  rationale: Best captures the negative emotional swing opposed to delight.
- source_word: ὀξύνει τὸν νοῦν
  chosen: sharpens the mind
  alternatives:
  - stimulates the mind
  - whets the mind
  lexicon: LSJ
  rationale: Preserves the metaphor of mental sharpening that prepares one to receive provocation.
- source_word: ἐρεθισθέν
  chosen: the provocation
  alternatives:
  - the irritation
  - what has been stirred up
  lexicon: LSJ
  rationale: 'The text is difficult, but this rendering fits the flow: praise first pleases, then the mind becomes sensitized to perceived offense.'
- source_word: ἐκθροεῖσθε
  chosen: be distressed
  alternatives:
  - be dismayed
  - be thrown into agitation
  lexicon: LSJ
  rationale: Captures emotional disturbance without narrowing it to fear alone.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - disposition
  - impulse
  lexicon: LSJ
  rationale: In this testamentary-ethical context, 'spirit' preserves the quasi-personified moral force at work in anger.
- source_word: τοῦ ἀπολλυμένου
  chosen: what is perishing
  alternatives:
  - the thing being lost
  - what is being destroyed
  lexicon: LSJ
  rationale: Keeps the participial abstraction and avoids over-concretizing the object of loss.
- source_word: πάθους
  chosen: affliction
  alternatives:
  - passion
  - suffering
  lexicon: LSJ
  rationale: Given the context of loss and emotional disturbance, 'affliction' best fits the causal sense without confusing it with erotic passion.
- source_word: λύπης
  chosen: grief
  alternatives:
  - sorrow
  - distress
  lexicon: LSJ
  rationale: 'A stable ethical term in this context: grief becomes the seedbed of anger.'
- source_word: διπρόσωπον κακὸν
  chosen: a two-faced evil
  alternatives:
  - a double-faced evil
  - a duplicitous evil
  lexicon: LSJ
  rationale: Preserves the vivid metaphor of duplicity rather than flattening it into an abstract moral label.
- source_word: ταράξωσι τὴν καρδίαν
  chosen: trouble the heart
  alternatives:
  - disturb the heart
  - throw the heart into turmoil
  lexicon: LSJ
  rationale: Simple, direct, and faithful to the repeated disturbance imagery in the chapter.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: The Greek form here is Βελίαρ; transliteration follows the witness rather than normalizing to the more familiar 'Belial'.
