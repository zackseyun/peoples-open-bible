revisions:
- from: Y mira, Simeón tu hermano; sé que es un hombre de consejo. Escúchalo todos tus días; él será para ti un padre.
  to: Y he aquí, Simeón su hermano; sé que es un hombre de consejo. Escúchenlo todos los días; él será para ustedes un padre.
  rationale: Se ajusta el tratamiento al plural para reflejar el griego, se mejora la naturalidad de «πάσας τὰς ἡμέρας» con «todos los días», y se eleva ligeramente el registro de καὶ ἰδοὺ con «Y he aquí». No hacen falta notas.
