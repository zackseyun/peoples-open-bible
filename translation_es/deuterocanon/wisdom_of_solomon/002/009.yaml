translation:
  language: es
  text: Que ninguno de nosotros quede sin parte en nuestro desenfreno; por todas partes dejemos señales de nuestro regocijo[a], porque esta es nuestra porción y esta nuestra suerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «nuestra arrogancia» o «nuestra jactancia». El término griego puede tener un sentido negativo de altivez, aunque aquí el contexto favorece el matiz de celebración desenfrenada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμοιρος
  english_pob_choice: without a share
  chosen_spanish: carezca de su parte
  alternatives_spanish:
  - sin parte
  - sin participación
  - sin su porción
  lexicon: LSJ
  rationale: ἄμοιρος expresa estar sin una porción o parte asignada. «Carezca de su parte» conserva la imagen distributiva del griego y se enlaza bien con «porción» y «suerte» al final del verso.
- source_word: ἀγερωχίας
  english_pob_choice: revelry
  chosen_spanish: disolución
  alternatives_spanish:
  - jactancia
  - arrogancia
  - altivez
  - regocijo desordenado
  lexicon: LSJ
  rationale: El contexto de Sabiduría 2 presenta un discurso de placer y abandono moral; en español, «disolución» comunica mejor esa idea de goce desordenado que «arrogancia» sola, aunque se preserva la tensión semántica moral del término griego.
- source_word: πανταχῇ
  english_pob_choice: everywhere
  chosen_spanish: por todas partes
  alternatives_spanish:
  - en todas partes
  - en todo lugar
  lexicon: LSJ
  rationale: Adverbio de lugar directo; «por todas partes» es natural en español y mantiene la amplitud espacial de la acción.
- source_word: καταλίπωμεν
  english_pob_choice: let us leave
  chosen_spanish: dejemos
  alternatives_spanish:
  - dejemos atrás
  - abandonemos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide un imperativo inclusivo en español. «Dejemos» es breve y fiel, sin añadir matices innecesarios.
- source_word: σύμβολα
  english_pob_choice: tokens
  chosen_spanish: señales
  alternatives_spanish:
  - marcas
  - indicios
  - símbolos
  lexicon: LSJ
  rationale: «Señales» transmite algo visible y reconocible dejado a modo de rastro. En español funciona con naturalidad para los vestigios de una conducta festiva.
- source_word: εὐφροσύνης
  english_pob_choice: merriment
  chosen_spanish: regocijo
  alternatives_spanish:
  - alegría
  - júbilo
  - gozo
  lexicon: LSJ
  rationale: Aquí el campo semántico es el de placer festivo y autosatisfacción. «Regocijo» comunica alegría celebrativa con un tono algo más público y concreto que «gozo».
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - heredad
  lexicon: LSJ
  rationale: «Porción» preserva el lenguaje de reparto y asignación, en paralelo con κλῆρος.
- source_word: κλῆρος
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - herencia
  - asignación
  lexicon: LSJ
  rationale: «Suerte» conserva el paralelismo con «porción» y expresa la idea de una parte asignada o destino determinado, sin cargar el término con una interpretación legal más fuerte de lo que exige el griego.
theological_decisions:
- issue: Sentido de ἀγερωχίας en el discurso de los impíos
  english_pob_reading: our revelry
  chosen_spanish_reading: nuestra disolución
  alternative_spanish_readings:
  - nuestra jactancia
  - nuestra arrogancia
  - nuestro regocijo
  rationale: La escena literaria está dominada por invitaciones a disfrutar placeres antes de morir; por eso el español debe reflejar un goce desordenado. «Disolución» mantiene la ambigüedad moral que el griego puede cargar, sin ocultar la veta hedonista que el contexto exige.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve significant ambiguity in documentation'
- issue: Relación entre μερὶς y κλῆρος
  english_pob_reading: this is our portion, and this our lot
  chosen_spanish_reading: esta es nuestra porción y esta nuestra suerte
  alternative_spanish_readings:
  - esta es nuestra parte y esta nuestra herencia
  - esta es nuestra porción y este nuestro lote
  rationale: El pareado griego apunta a reparto asignado o destino. «Porción» y «suerte» reproducen el paralelismo sin introducir una lectura doctrinal de herencia que el contexto inmediato no desarrolla.
  doctrine_reference: Lexical-theological parallelism preservation
translation_notes:
  revision_awareness: La redacción sigue la lectura corregida del audit trail inglés, que ajustó ἄμοιρος ἔστω a una formulación directa de «carezca de su parte / sin una parte». También se preservó la decisión del POB inglés de priorizar el contexto festivo para ἀγερωχίας, manteniendo en español la tensión entre celebración y desorden moral.
  spanish_consistency_notes:
  - Se usó un registro digno y publicable, sin calcos innecesarios.
  - «Porción / suerte» conserva el paralelismo semántico de μερὶς / κλῆρος.
  - La nota al pie recoge la alternativa léxica importante para ἀγερωχίας, tal como el POB inglés preserva la tensión entre orgullo y festín.
