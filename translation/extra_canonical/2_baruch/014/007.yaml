  from: Or who is there, O Lord, who knows your judgment? Or who can search out the
    depth of your way?
  to: Or who, O Lord, knows your judgment? Or who can search out the depth of your
    way?
  rationale: Streamlined the opening clause from “who is there, O Lord, who knows”
    to “who, O Lord, knows” for more natural English while preserving the Syriac sense;
    retained “judgment” and “the depth of your way” for lexical accuracy.
