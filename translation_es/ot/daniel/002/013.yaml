translation:
  language: es
  text: Así salió el decreto[a], y los sabios[b] estaban siendo ejecutados; y buscaron a Daniel y a sus compañeros para matarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue promulgado». El arameo dice literalmente «salió», refiriéndose a la difusión pública del decreto real.
    reason: lexical_alternative
  - marker: b
    text: O «estaban siendo muertos» o «estaban siendo asesinados». La forma verbal sugiere que las ejecuciones ya estaban en curso.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָתָא
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - orden
  lexicon: HALOT
  rationale: En arameo imperial, el término designa una decisión legal u orden real. En español, "decreto" comunica bien el carácter oficial y jurídico del texto, y conserva la naturalidad narrativa del pasaje.
- source_word: נֶפְקַת
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue emitido
  - fue promulgado
  - salió adelante
  lexicon: HALOT
  rationale: La imagen literal es "salió"; en este contexto alude a la promulgación del decreto. "Salió" preserva la metáfora del original sin forzar una construcción pasiva que el arameo no expresa de manera explícita.
- source_word: חַכִּימַיָּא
  english_pob_choice: the wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios de la corte
  lexicon: HALOT
  rationale: El término arameo funciona como designación técnica de los consejeros eruditos de la corte. "Sabios" es fiel y breve; evita sustituir el término por una expresión más explicativa que suavice el matiz técnico.
- source_word: מִתְקַטְּלִין
  english_pob_choice: were being killed
  chosen_spanish: estaban siendo muertos
  alternatives_spanish:
  - estaban siendo asesinados
  - eran muertos
  - estaban siendo ejecutados
  lexicon: HALOT
  rationale: La forma participial indica acción en curso. "Estaban siendo muertos" conserva la pasividad y el proceso continuo del hebreo/arameo, aunque suene menos elegante que una reinterpretación como "ejecutados"; por fidelidad, se mantiene la tensión lexical.
- source_word: וּבְעוֹ
  english_pob_choice: they sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - buscaron a
  - anduvieron buscando
  - indagaron por
  lexicon: HALOT
  rationale: El verbo significa buscar o procurar. En este contexto judicial, "buscaron" es la forma más directa y natural en español; deja implícito el propósito coercitivo que el verso aclara con el infinitivo final.
- source_word: חַבְרוֹהִי
  english_pob_choice: his companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus amigos
  - sus asociados
  lexicon: HALOT
  rationale: El sustantivo refiere a quienes están asociados con Daniel en el relato. "Compañeros" es amplio, sobrio y coherente con el uso narrativo; "amigos" introduciría un matiz más afectivo de lo que el texto exige.
- source_word: לְהִתְקְטָלָה
  english_pob_choice: to kill them
  chosen_spanish: para matarlos
  alternatives_spanish:
  - para darles muerte
  - para ejecutarlos
  - con el fin de matarlos
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. "Para matarlos" reproduce la intención de manera clara y directa, sin desplazar el foco hacia un lenguaje legal que el arameo aquí no impone.
translation_notes:
  revision_awareness: El texto sigue el pasaje arameo con alta correspondencia al audit trail inglés. Se preserva la imagen literal de «salió» para נֶפְקַת y el valor progresivo de מִתְקַטְּלִין. No se han aplicado revisiones posteriores al pasaje según el expediente suministrado.
  spanish_consistency_notes:
  - Se mantiene «decreto» para דָתָא conforme al uso jurídico-cortesano del libro de Daniel.
  - Se evita "SEÑOR" o terminología eclesial no presente en el verso.
  - 'La secuencia verbal conserva la progresividad narrativa: decreto, acción de matar en curso, y búsqueda con propósito de matar.'
