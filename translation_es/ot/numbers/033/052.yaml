  text: וְ/ה֨וֹרַשְׁתֶּ֜ם אֶת כָּל יֹשְׁבֵ֤י הָ/אָ֨רֶץ֙ מִ/פְּנֵי/כֶ֔ם וְ/אִ֨בַּדְתֶּ֔ם אֵ֖ת כָּל מַשְׂכִּיֹּתָ֑/ם וְ/אֵ֨ת כָּל צַלְמֵ֤י מַסֵּֽכֹתָ/ם֙ תְּאַבֵּ֔דוּ וְ/אֵ֥ת כָּל בָּמֹתָ֖/ם תַּשְׁמִֽידוּ־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/033/052.yaml
  text: and you shall drive out all the inhabitants of the land from before you[a], and you shall destroy all their figured stones, and all their cast-metal images you shall destroy[b], and all their high places you shall demolish.
  footnotes:
