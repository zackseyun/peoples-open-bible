  glossary_alignment: 'No hay conflicto con los términos globales principales. ''espíritu'' está bien en minúscula y referido a Moisés, no al Espíritu Santo. La principal desalineación es local y léxica: הִמְרוּ debe reflejar ''amargaron/provocaron'', coherente con la decisión inglesa ''embittered'' y su alternativa documentada.'
