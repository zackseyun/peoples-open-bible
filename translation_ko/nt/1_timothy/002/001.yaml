id: 1TI.2.1
reference: 1 Timothy 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παρακαλῶ οὖν πρῶτον πάντων ποιεῖσθαι δεήσεις, προσευχάς, ἐντεύξεις, εὐχαριστίας, ὑπὲρ πάντων ἀνθρώπων,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/001.yaml
  text: Therefore[a], first of all, I urge that petitions, prayers, intercessions, and thanksgivings be made for all people[c][b],
  footnotes:
  - marker: a
    text: Or 'on behalf of all people.'
    reason: lexical_alternative
  - marker: b
    text: '''All people'' translates a generic Greek expression for human beings, not males only.'
    reason: lexical_alternative
  - marker: c
    text: Some understand 'all people' here as 'all kinds of people'; the Greek itself simply says 'all people.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러므로 나는 무엇보다 먼저 모든 사람을 위해[a] 간구와 기도와 중보와 감사를 드리라고 권합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 사람을 대신하여」. 「모든 사람」은 헬라어 ἄνθρωποι의 일반적 의미로, 남성만을 가리키지 않는다. 일부는 「모든 종류의 사람」으로 해석하나, 헬라어 본문은 단순히 「모든 사람」으로 되어 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ οὖν
  english_pob_choice: Therefore I urge
  chosen_korean: 그러므로 ~ 권합니다
  alternatives_korean:
  - 그러므로 권면합니다
  - 그러므로 부탁드립니다
  lexicon: BDAG
  rationale: παρακαλέω는 권면·간청의 폭. 「권합니다」가 합쇼체 문맥에서 자연스럽다.
- source_word: πρῶτον πάντων
  english_pob_choice: first of all
  chosen_korean: 무엇보다 먼저
  alternatives_korean:
  - 가장 먼저
  - 무엇보다 우선
  lexicon: BDAG
  rationale: 우선순위의 강조를 「무엇보다 먼저」로 자연스럽게 표현한다.
- source_word: δεήσεις
  english_pob_choice: petitions
  chosen_korean: 간구
  alternatives_korean:
  - 청원
  - 탄원
  lexicon: BDAG
  rationale: δέησις의 「청원적 기도」 어감을 「간구」로 일관되게 옮긴다.
- source_word: προσευχάς
  english_pob_choice: prayers
  chosen_korean: 기도
  alternatives_korean: []
  lexicon: BDAG
  rationale: 일반적 기도를 가리키는 표준 어휘.
- source_word: ἐντεύξεις
  english_pob_choice: intercessions
  chosen_korean: 중보
  alternatives_korean:
  - 중재 기도
  - 대도(代禱)
  lexicon: BDAG
  rationale: ἔντευξις는 다른 사람을 위한 알현·접근의 어감. 「중보」가 한국 신학 어휘에서 정립.
- source_word: εὐχαριστίας
  english_pob_choice: thanksgivings
  chosen_korean: 감사
  alternatives_korean:
  - 감사 기도
  lexicon: BDAG
  rationale: 네 어휘 병렬 구조 흐름상 「감사」.
- source_word: ὑπὲρ πάντων ἀνθρώπων
  english_pob_choice: for all people
  chosen_korean: 모든 사람을 위해
  alternatives_korean:
  - 모든 사람을 대신하여
  - 모든 사람을 위하여
  lexicon: BDAG
  rationale: ἄνθρωποι의 일반성(남성에 한정되지 않음)을 보존하기 위해 「사람」 사용.
