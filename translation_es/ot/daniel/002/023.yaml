  text: לָ֣/ךְ אֱלָ֣הּ אֲבָהָתִ֗/י מְהוֹדֵ֤א וּ/מְשַׁבַּח֙ אֲנָ֔ה דִּ֧י חָכְמְתָ֛/א וּ/גְבוּרְתָ֖/א יְהַ֣בְתְּ לִ֑/י וּ/כְעַ֤ן הֽוֹדַעְתַּ֨/נִי֙ דִּֽי בְעֵ֣ינָא מִנָּ֔/ךְ דִּֽי מִלַּ֥ת מַלְכָּ֖/א הוֹדַעְתֶּֽ/נָא׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/023.yaml
  text: To you[a], O God of my fathers, I give thanks and praise, because you have given me wisdom and might, and now you have made known to me what we requested from you[c][b], for you have made known to us the king’s matter.
  footnotes:
  - marker: a
    text: Or 'God of my ancestors.' The Aramaic is literally 'God of my fathers,' a covenantal expression linking Daniel to those before him.
    reason: lexical_alternative
  - marker: b
    text: Or 'what we sought from you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the king’s word' or 'the king’s affair.' The Aramaic term is broad and refers to the matter the king had set forth.
    reason: lexical_alternative
