translation:
  language: es
  text: Al director del coro; con instrumentos de cuerda[a]. De David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Por David' o 'Para David'; la construcción hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de canto
  - Para el líder musical
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término señala a la persona encargada de la ejecución musical. 'Director del coro' comunica de forma natural y clara esa función litúrgico-musical en español, sin volverla más específica de lo que permite el hebreo.
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - sobre
  - según
  - para
  lexicon: HALOT
  rationale: En esta clase de superscripción, עַל introduce con frecuencia la indicación de acompañamiento o de designación musical. 'Con' expresa de manera idiomática el acompañamiento instrumental sin perder la relación funcional del término.
- source_word: נְגִינַת
  english_pob_choice: stringed instruments
  chosen_spanish: instrumentos de cuerda
  alternatives_spanish:
  - música de cuerda
  - acompañamiento de cuerda
  - instrumental de cuerda
  lexicon: HALOT
  rationale: El sustantivo se refiere a música de cuerdas o a un acompañamiento con cuerdas. 'Instrumentos de cuerda' conserva el sentido musical concreto que eligió la POB en inglés y resulta natural en español contemporáneo.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La lamed en los encabezamientos de salmos puede señalar autoría, asociación o dedicación. 'De David' preserva esa ambigüedad mejor que una traducción más cerrada como 'Por David'.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezamiento
  english_pob_reading: Of David
  chosen_spanish_reading: De David
  alternative_spanish_readings:
  - Por David
  - Para David
  rationale: El hebreo no obliga a una afirmación única de autoría directa. Mantener 'De David' deja intacta la tensión histórica/literaria documentada por la POB y evita imponer una interpretación más fuerte que el texto.
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y no registra revisiones sustantivas; por eso la redacción española sigue de cerca las decisiones léxicas ya validadas en la POB inglesa, conservando la ambigüedad de לְדָוִד y el sentido musical de la superscripción.
  spanish_consistency_notes:
  - Se usa 'coro' para hacer explícita la función musical implícita en לַמְנַצֵּחַ, en línea con la equivalencia óptima del inglés.
  - '''Instrumentos de cuerda'' mantiene el registro bíblico sin caer en un calco áspero.'
  - '''De David'' respeta la amplitud semántica del hebreo y evita sobredeterminar la relación de David con el salmo.'
