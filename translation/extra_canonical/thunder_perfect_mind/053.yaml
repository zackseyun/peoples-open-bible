    reason: alternative_reading
  - marker: d
    text: Or 'As for you, I am she whom you have despised,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛ̄ⲧⲟⲟⲧ
  chosen: As for you
  alternatives:
  - before you
  - with you
  lexicon: Crum, s.v. ⲛⲧⲟⲟⲧ
  rationale: Topic-marking preposition used to address the second person plural; rendering
    as 'As for you' captures the discourse function.
- source_word: ⲧⲉ (predicative article in ⲁⲛⲟⲕ ⲧⲉ…)
  chosen: she (in 'I am she …')
  alternatives:
  - the one (in 'I am the one …')
  lexicon: Layton, Coptic Grammar §13; Crum (predicative articles)
  rationale: The feminine predicative article signals the speaker’s feminine voice
    in Thunder; we preserve this as 'I am she' rather than flattening to 'I am the
    one.'
- source_word: ⲕⲁⲧⲁⲫⲣⲟⲛⲓ
  chosen: despise
  alternatives:
  - scorn
  - treat with contempt
  lexicon: Crum, s.v. ⲕⲁⲧⲁⲫⲣⲟⲛⲉⲓ (loanword from Gk καταφρονέω)
  rationale: Base sense is 'to look down on, despise'; stronger than 'disregard' and
    distinct from 'persecute.'
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  chosen: deliberate upon me
  alternatives:
  - think about me
  - plot against me
  lexicon: Crum, s.v. ⲙⲉⲉⲩⲉ
  rationale: ⲙⲉⲉⲩⲉ with ⲉⲣⲟⲓ marks the object of thought; 'deliberate' keeps the active,
    purposive nuance without importing 'plot' unless context demands it.
- source_word: ϩⲱⲡ
  chosen: seize
  alternatives:
  - lay hold of
  - arrest
  lexicon: Crum, s.v. ϩⲱⲡ
  rationale: Common verb for grasping or arresting; 'seize' maintains the force and
    pairs well with the following antithesis.
- source_word: ⲟⲩⲟⲛϩ (with object ⲙⲙⲟⲓ)
  chosen: make alive
  alternatives:
  - give life
  - keep alive
  lexicon: Crum, s.v. ⲟⲩⲱⲛϩ
  rationale: Transitive use with object pronoun means 'to make (someone) alive'/'give
    life to'; 'make alive' preserves the verbal parallelism with 'seize.'
parallelism_check: The translation preserves four parallel clauses with repeated 'I
  am she whom you…' maintaining the poem’s cadence. The key paradox is explicit in
  the last pair ('seized' // 'made alive'). The first pair ('despised' // 'deliberated
  upon') forms an intentional rhetorical accumulation rather than a strict antonym;
  given the source verbs, we retain both without smoothing. Lineation with commas
  and line breaks reflects the balanced bicola.
voice_check: The speaker’s feminine voice is preserved via 'I am she…' (from the feminine
  predicative article ⲧⲉ). Second-person plural addressees are direct ('you'), preserving
  the confrontational, declarative tone characteristic of Thunder.
alignment_risk_note: Alignment confidence for this slice is only medium. The OCR clearly
  shows the loanword ⲕⲁⲧⲁⲫⲣⲟⲛⲓ ('despise'), ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ ('deliberate/think upon me'),
  ϩⲱⲡ ('seize'), and ⲟⲩⲟⲛϩ ⲙⲙⲟⲓ ('make me alive'). The initial ⲛ̄ⲧⲟⲟⲧ is taken as
  a topic marker ('As for you'). The tail fragment 'ⲟⲩⲁⲛ ⲇⲉ ⲉⲧⲉⲧⲛϣⲁⲛϩⲱⲡ ⲙⲙⲱⲧⲛ' appears
  to begin a new clause that likely spills into the next block; it is not rendered
  here to avoid over-committing. Note that consult editions sometimes have 'persecuted'
  for this couplet; that would require a different verb (e.g., ⲇⲓⲱⲕⲉ), which is not
  what the OCR shows.
