lexical_decisions:
- source_word: וַיָּשַׂר
  english_pob_choice: ruled
  chosen_spanish: gobernó
  alternatives_spanish:
  - reinó
  - rindió gobierno
  lexicon: HALOT
  rationale: El verbo expresa ejercicio de autoridad política. «Gobernó» comunica bien el acto de mandar sobre un pueblo en español moderno, sin introducir connotaciones monárquicas que el contexto no exige.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  lexicon: convención onomástica bíblica
  rationale: Se mantiene el nombre propio en forma española usual. La acentuación ayuda a la lectura en español y no altera la identificación del personaje.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre, con matiz de autoridad
  lexicon: HALOT
  rationale: Con verbos de dominio, עַל marca la relación de autoridad. «Sobre» conserva esa fuerza relacional en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: transliteración estándar
  rationale: Nombre nacional propio, sin necesidad de adaptación adicional.
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: three years
  chosen_spanish: durante tres años
  alternatives_spanish:
  - por tres años
  - tres años
  lexicon: HALOT
  rationale: La duración absoluta en hebreo se expresa naturalmente en español con «durante» para indicar el lapso de gobierno.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto al nombre propio. No se añadieron otras notas porque el versículo no presenta variantes textuales ni tensiones teológicas relevantes.
  spanish_consistency_notes:
  - Se prefirió «gobernó» frente a «reinó» porque el hebreo describe dominio efectivo, no necesariamente realeza legítima.
  - «Sobre Israel» preserva la relación de autoridad del original sin suavizarla.
  - La duración se hizo idiomática con «durante tres años», manteniendo el sentido temporal exacto.
