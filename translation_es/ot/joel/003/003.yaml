translation:
  language: es
  text: 'Y daré prodigios en los cielos y en la tierra: sangre, fuego y columnas[a] de humo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pilares de humo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y daré
  alternatives_spanish:
  - Y pondré
  - Y mostraré
  lexicon: HALOT
  rationale: נתן puede significar 'dar', 'poner' o 'establecer'. En este contexto profético, 'daré' conserva de forma directa el verbo hebreo y suena natural en español. 'Mostraré' interpreta más libremente la función de la señal y no sigue tan de cerca el verbo original.
- source_word: מוֹפְתִים
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - señales
  - maravillas
  - portentos
  lexicon: HALOT
  rationale: מוֹפְתִים designa fenómenos extraordinarios, señales portentosas o prodigios. 'Prodigios' comunica bien la idea de hechos asombrosos y de carácter portentoso en un registro digno. 'Señales' es posible, pero puede sonar más genérico; 'maravillas' también es viable, aunque 'prodigios' destaca mejor el carácter ominoso del pasaje.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el firmamento
  lexicon: HALOT
  rationale: El hebreo está en plural, 'los cielos'. 'En los cielos' conserva esa forma plural y refleja mejor la expresión bíblica. 'En el cielo' suaviza el plural; 'firmamento' restringe el sentido.
- source_word: וּבָאָרֶץ
  english_pob_choice: and on the earth
  chosen_spanish: y en la tierra
  alternatives_spanish:
  - y sobre la tierra
  - y en el mundo
  lexicon: HALOT
  rationale: אָרֶץ aquí corresponde naturalmente a 'la tierra' frente a 'los cielos'. 'En la tierra' mantiene el paralelismo cósmico del hebreo. 'Sobre la tierra' es posible, pero menos directo; 'mundo' es demasiado interpretativo.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - matanza
  lexicon: HALOT
  rationale: El sustantivo significa simplemente 'sangre'. 'Sangre' conserva la imagen cruda y directa sin añadir explicación interpretativa.
- source_word: וָאֵשׁ
  english_pob_choice: and fire
  chosen_spanish: fuego
  alternatives_spanish:
  - y fuego
  lexicon: HALOT
  rationale: El hebreo incluye la conjunción en la serie enumerativa. En español, la lista fluye naturalmente con comas y 'fuego' sin repetir innecesariamente 'y' antes de cada elemento. El sentido se mantiene íntegro.
- source_word: וְתִימֲרוֹת עָשָׁן
  english_pob_choice: and columns of smoke
  chosen_spanish: columnas de humo
  alternatives_spanish:
  - columnas de humo
  - pilares de humo
  - trombas de humo
  lexicon: HALOT
  rationale: תימרות describe formas elevadas que ascienden como columnas. 'Columnas de humo' es claro, fiel a la imagen y natural en español. 'Pilares de humo' es una alternativa válida y más tradicional; 'trombas de humo' resulta menos precisa para el hebreo.
theological_decisions:
- issue: Naturaleza de los prodigios anunciados
  english_pob_reading: cosmic signs of divine judgment/intervention without specifying a narrower eschatological scheme
  chosen_spanish_reading: prodigios cósmicos de juicio/intervención divina, sin precisar un esquema escatológico más estrecho
  alternative_spanish_readings:
  - fenómenos meteorológicos/cósmicos literalmente físicos
  - imágenes simbólicas de conmoción histórica
  rationale: El versículo presenta señales portentosas en los cielos y en la tierra. La traducción conserva la imagen y la gravedad sin decidir si cada elemento debe leerse solo como literal, solo como simbólico o de ambas maneras. Así se preserva la tensión teológica del texto fuente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio y el cotejo intermedio mostró alta coincidencia con observaciones menores בלבד. La redacción española sigue el hebreo con paralelismo claro y mantiene la alternativa léxica documentada para תימרות.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió 'prodigios' para מוֹפְתִים por su fuerza portentosa, coherente con el audit trail en inglés.
  - Se preservó el plural bíblico 'los cielos' para בַּשָּׁמַיִם.
  - La serie nominal se puntuó para fluidez natural en español sin perder la enumeración hebrea.
  - La nota al pie marca una alternativa léxica real y documentada, sin añadir interpretaciones ajenas al texto.
