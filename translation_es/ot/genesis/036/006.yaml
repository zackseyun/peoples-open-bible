review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y la revisión final de la POB inglesa: preserva la enumeración de esposas/hijos/hijas/personas de la casa/ganado/animales/posesiones y evita imponer una lectura causal fuerte en מִפְּנֵי. También mantiene bien «en la tierra de Canaán» y la nota textual sobre «a una tierra». Sin embargo, hay un desajuste importante entre la nota [a] y su anclaje: la nota textual corresponde a «a una tierra», no a «tomó». Además, «sus mujeres» es menos preciso y menos natural que «sus esposas» en este contexto, y la puntuación puede mejorarse para mayor fluidez en español.'
  spanish_quality_summary: El texto es claro y legible, pero suena algo calcado por la repetición de comas con «y» y por «sus mujeres». «Sus esposas» es más exacto para נָשָׁיו. También conviene mover la nota al sintagma relevante y evitar el punto y coma innecesario. «Lejos de su hermano Jacob» es comprensible, pero «apartado de» suena algo más natural con «a una tierra»; aun así, «lejos de» no es infiel. La revisión propuesta mejora precisión, naturalidad y disciplina de notas.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales están bien alineadas con el expediente inglés: «personas» para נַפְשׁוֹת, «ganado» para מִקְנֵהוּ, «animales» para בְּהֶמְתּוֹ, y «posesiones» para קִנְיָנוֹ. La excepción recomendada es usar «esposas» en vez de «mujeres» por fidelidad contextual.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «tomó» en lugar de en «a una tierra».
    rationale: La nota textual explica la variante relacionada con אֶל אֶרֶץ, no con וַיִּקַּח. Esto incumple la disciplina requerida de anclar cada nota en la palabra o frase pertinente del texto español.
  - severity: medium
    issue: «Sus mujeres» es menos preciso que «sus esposas».
    rationale: El hebreo נָשָׁיו aquí se refiere específicamente a las esposas de Esaú. En español bíblico moderno, «sus esposas» comunica mejor ese valor contextual y evita ambigüedad.
  - severity: low
    issue: La puntuación suena algo rígida y calcada.
    rationale: La secuencia con múltiples comas antes de «y» y el punto y coma antes de la cláusula final pueden aligerarse sin perder estructura ni fidelidad.
  revised_spanish_text: Y Esaú tomó a sus esposas, a sus hijos, a sus hijas, y a todas las personas de su casa, junto con su ganado, todos sus animales y todas sus posesiones que había adquirido en la tierra de Canaán, y se fue a una tierra[a] lejos de su hermano Jacob.
  revised_footnotes:
