translation:
  language: es
  text: Un sendero que ninguna ave rapaz conoce[a], ni lo ha visto el ojo del halcón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «milano». El hebreo nombra un ave de presa, pero la especie exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתִיב
  english_pob_choice: path
  chosen_spanish: sendero
  alternatives_spanish:
  - camino
  - ruta
  lexicon: HALOT
  rationale: נָתִיב designa un camino o sendero. En español, «sendero» conserva la imagen poética de una vía estrecha o poco transitada y comunica bien la idea de un trayecto oculto en la tierra.
- source_word: לֹא יְדָעוֹ
  english_pob_choice: no bird of prey knows
  chosen_spanish: que no conoce ave rapaz
  alternatives_spanish:
  - que ninguna ave rapaz conoce
  - que no sabe ave rapaz
  lexicon: HALOT
  rationale: El hebreo expresa literalmente que el ave de presa no lo conoce. En español, la negación con «que no conoce ave rapaz» mantiene la relación verbal sin sobrecargar el verso y conserva el sujeto genérico sin especificarlo innecesariamente.
- source_word: עָיִט
  english_pob_choice: bird of prey
  chosen_spanish: ave rapaz
  alternatives_spanish:
  - ave de presa
  - rapaz
  lexicon: HALOT
  rationale: עָיִט es un término genérico para un ave de presa, no una especie precisa. «Ave rapaz» preserva ese valor genérico en un registro natural y digno en español.
- source_word: וְלֹא שְׁזָפַתּוּ
  english_pob_choice: has not seen it
  chosen_spanish: ni lo ha visto
  alternatives_spanish:
  - ni lo ha divisado
  - ni ha posado en él la vista
  lexicon: HALOT
  rationale: שׁזף se refiere a ver, mirar o divisar. «Ni lo ha visto» reproduce con claridad el paralelismo con «conoce» y evita introducir matices no asegurados por el hebreo.
- source_word: עֵין
  english_pob_choice: the eye of
  chosen_spanish: el ojo de
  alternatives_spanish:
  - la mirada de
  - la vista de
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «ojo de». Mantener «el ojo de» conserva la imagen poética y la estructura del original.
- source_word: אַיָּה
  english_pob_choice: falcon
  chosen_spanish: halcón
  alternatives_spanish:
  - milano
  - kite
  lexicon: HALOT
  rationale: אַיָּה designa un ave de presa, a menudo identificada como milano o halcón. «Halcón» comunica bien la imagen predatoria en español; la incertidumbre específica se conserva en la nota.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo poético y coincide con la revisión inglesa vigente: mantiene el carácter genérico de עָיִט y la incertidumbre taxonómica de אַיָּה, sin añadir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se preservó el paralelismo entre conocimiento y visión con una estructura natural en español.
  - Se evitó la fórmula eclesiástica «camino» como única opción porque «sendero» refleja mejor el tono poético del verso.
  - La nota sobre el ave mantiene la misma cautela lexical que el aparato inglés, adaptada al español.
