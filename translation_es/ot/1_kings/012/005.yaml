    rationale: Si el texto principal se corrige a «Váyanse por tres días más», la nota debe alinearse con una alternativa natural, por ejemplo «Váyanse por otros tres días y vuelvan a mí».
  revised_spanish_text: 'Él les dijo[a]: «Váyanse por tres días más, y luego vuelvan a mí». Y el pueblo se fue.'
