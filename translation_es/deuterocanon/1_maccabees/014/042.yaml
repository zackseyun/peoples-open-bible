translation:
  language: es
  text: y que él fuera su comandante, y que tuviera cuidado del santuario[a], y que nombrara hombres a cargo de sus obras y del territorio y de las armas y de las fortalezas.
  philosophy: optimal-equivalence
  footnotes:
