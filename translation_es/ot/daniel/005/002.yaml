base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/002.yaml
  text: Belshazzar gave the order[a], as he tasted the wine, to bring the vessels of gold and silver that Nebuchadnezzar his father had taken out of the temple that was in Jerusalem, so that the king and his nobles, his wives and his concubines[b], might drink from them.
  footnotes:
  - marker: a
    text: Aramaic 'his father'; in royal usage this can also mean 'his ancestor' or 'predecessor.'
    reason: alternative_reading
  - marker: b
    text: Or 'while under the influence of the wine'; the Aramaic idiom is literally 'in the taste of the wine.'
    reason: lexical_alternative
