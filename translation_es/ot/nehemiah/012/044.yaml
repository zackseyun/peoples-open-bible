translation:
  language: es
  text: En aquel día fueron nombrados hombres a cargo de los depósitos[a] para las contribuciones, para las primicias y para los diezmos, para recoger en ellos, de los campos de las ciudades, las porciones prescritas por la ley para los sacerdotes y para los levitas[b], porque Judá se alegró por los sacerdotes y por los levitas que estaban sirviendo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cámaras», para הַנְּשָׁכוֹת. El término puede denotar habitaciones o cámaras; aquí destaca su función de almacenamiento.
    reason: lexical_alternative
  - marker: b
    text: Lit. «las porciones de la ley», es decir, las partes prescritas por la Torá para los sacerdotes y los levitas.
    reason: lexical_alternative
  - marker: c
    text: Lit. «los que estaban de pie». En este contexto del templo, la expresión se entiende como «los que estaban sirviendo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפָּקְדוּ
  english_pob_choice: were appointed
  chosen_spanish: se asignaron
  alternatives_spanish:
  - fueron nombrados
  - fueron asignados
  - se nombraron
  lexicon: HALOT
  rationale: El verbo pasivo expresa que ciertos hombres fueron designados para una función administrativa. «Se asignaron» conserva la idea de designación oficial sin forzar una formulación demasiado técnica.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - algunos hombres
  lexicon: HALOT
  rationale: El hebreo usa explícitamente el masculino plural. «Hombres» preserva esa referencia de manera directa y acorde con el registro del texto.
- source_word: הַנְּשָׁכוֹת
  english_pob_choice: the storerooms
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los almacenes
  - los aposentos
  - las habitaciones
  lexicon: HALOT
  rationale: Aquí el término puede denotar habitaciones o cámaras usadas para almacenamiento. La POB inglesa puso el énfasis funcional en «storerooms», pero en español «cámaras» conserva mejor la ambigüedad del término y sigue siendo comprensible en contexto de templo.
- source_word: לָאֹצָרוֹת
  english_pob_choice: for the treasuries
  chosen_spanish: para las contribuciones
  alternatives_spanish:
  - para los depósitos
  - para los tesoros
  - para los almacenes
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa, no se separa este término como un segundo conjunto de «tesoros»; el contexto muestra que las cámaras estaban destinadas a guardar las ofrendas apartadas. Por eso se integra la función de depósito dentro de la lista de bienes guardados.
- source_word: לַתְּרוּמוֹת
  english_pob_choice: for the contributions
  chosen_spanish: para las contribuciones
  alternatives_spanish:
  - para las ofrendas elevadas
  - para las ofrendas
  - para las porciones apartadas
  lexicon: HALOT
  rationale: תרומות son aportes apartados para uso sagrado. «Contribuciones» mantiene la idea administrativa y cultual sin recurrir a un tecnicismo poco transparente.
- source_word: לָרֵאשִׁית
  english_pob_choice: for the firstfruits
  chosen_spanish: para las primicias
  alternatives_spanish:
  - para los primeros frutos
  - para la primera cosecha
  lexicon: HALOT
  rationale: «Primicias» es el equivalente tradicional y fiel para la ofrenda de los primeros productos agrícolas.
- source_word: וְלַמַּעַשְׂרוֹת
  english_pob_choice: and for the tithes
  chosen_spanish: y para los diezmos
  alternatives_spanish:
  - y para las décimas partes
  lexicon: HALOT
  rationale: «Diezmos» es la equivalencia natural y precisa para מעשרות en este contexto legal-cultual.
- source_word: לִכְנוֹס בָּהֶם
  english_pob_choice: to gather into them
  chosen_spanish: para recoger en ellas
  alternatives_spanish:
  - para reunir en ellas
  - para almacenar en ellas
  - para traer a ellas
  lexicon: HALOT
  rationale: La frase indica reunir o depositar dentro de las cámaras. «Recoger en ellas» comunica la acción de reunir y guardar sin sobreespecificar el transporte.
- source_word: לִשְׂדֵי הֶעָרִים
  english_pob_choice: from the fields of the cities
  chosen_spanish: desde los campos de las ciudades
  alternatives_spanish:
  - de los campos de las ciudades
  - desde las tierras de las ciudades
  - de las tierras de las poblaciones
  lexicon: HALOT
  rationale: La expresión apunta a los campos vinculados con las ciudades o poblados. «Desde los campos de las ciudades» sigue de cerca la estructura del hebreo y mantiene la referencia territorial.
- source_word: מְנָאוֹת הַתּוֹרָה
  english_pob_choice: the portions required by the law
  chosen_spanish: las porciones de la ley
  alternatives_spanish:
  - las porciones prescritas por la ley
  - las porciones establecidas por la ley
  - las porciones de la Torá
  lexicon: HALOT
  rationale: La POB inglesa explicita que se trata de porciones prescritas por la Ley/Torá. En español, «las porciones de la ley» conserva la construcción compacta del hebreo y el vínculo normativo, y el contexto ya aclara que se trata de lo debido a sacerdotes y levitas.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: for the priests and for the Levites
  chosen_spanish: para los sacerdotes y para los levitas
  alternatives_spanish:
  - para los sacerdotes y los levitas
  - para los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Se mantiene la duplicación de la preposición para reflejar la distribución explícita entre ambos grupos, como en el inglés auditado.
- source_word: כִּי שִׂמְחַת יְהוּדָה
  english_pob_choice: for Judah rejoiced
  chosen_spanish: porque se alegró Judá
  alternatives_spanish:
  - porque la alegría de Judá fue grande
  - pues Judá se regocijó
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo de alegría con fuerza causal. «Se alegró Judá» naturaliza la construcción en español sin perder la causa introducida por כִּי.
- source_word: עַל הַכֹּהֲנִים וְעַל הַלְוִיִּם
  english_pob_choice: over the priests and over the Levites
  chosen_spanish: por los sacerdotes y por los levitas
  alternatives_spanish:
  - acerca de los sacerdotes y de los levitas
  - sobre los sacerdotes y sobre los levitas
  lexicon: HALOT
  rationale: Después de un sustantivo de gozo, עַל puede indicar motivo u objeto de la alegría. En español, «por» expresa mejor la causa o el motivo de la alegría que «sobre».
- source_word: הָעֹמְדִים
  english_pob_choice: who were serving
  chosen_spanish: que estaban sirviendo
  alternatives_spanish:
  - que estaban de pie
  - que servían
  - que estaban en servicio
  lexicon: HALOT
  rationale: Aunque literalmente significa «estar de pie», en contexto sacerdotal/levítico denota estar en funciones, ministrando. «Que estaban sirviendo» preserva el sentido funcional reconocido por la POB inglesa.
theological_decisions:
- issue: La relación entre las cámaras, los depósitos sagrados y las porciones prescritas
  english_pob_reading: The storerooms are administrative spaces for receiving the contributions, firstfruits, and tithes; 'the portions required by the law' are the shares designated for priests and Levites.
  chosen_spanish_reading: Las cámaras son espacios de custodia administrativa para recibir las contribuciones, primicias y diezmos; «las porciones de la ley» son las partes destinadas a sacerdotes y levitas.
  alternative_spanish_readings:
  - las cámaras y los tesoros como categorías separadas
  - las porciones de la ley como una referencia genérica a toda la ofrenda
  rationale: 'La revisión inglesa eliminó «for the treasuries» como entidad separada. En español se refleja esa decisión: no se duplica una categoría de tesoros aparte de las cámaras, sino que se entiende que las cámaras sirven para guardar las ofrendas y porciones prescritas.'
  doctrine_reference: Nehemías 12:44; compárese con la organización cultual en la Torá respecto de primicias y diezmos.
- issue: El valor de עַל en la frase final
  english_pob_reading: '''over'' the priests and Levites, with rejoicing as the governing idea.'
  chosen_spanish_reading: «por» los sacerdotes y «por» los levitas, con la alegría como sentido rector.
  alternative_spanish_readings:
  - sobre los sacerdotes y sobre los levitas
  - a causa de los sacerdotes y de los levitas
  rationale: El hebreo permite relación de objeto o causa de la alegría. En español, «por» conserva esa causalidad y suena más natural que «sobre» en este contexto.
  doctrine_reference: Nehemías 12:44; uso preposicional de עַל con sustantivos de emoción en hebreo bíblico.
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que suprimió 'for the treasuries' como categoría separada y mantuvo el resto de la cláusula intacta. La redacción española refleja esa misma decisión y procura conservar la estructura del hebreo sin introducir una división semántica no respaldada por el texto revisado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma cuando el texto la requiera; en este versículo no aparece.
  - Se usa 'levitas' y 'sacerdotes' en forma constante para כהנים y לוים, sin alternar con sinónimos.
  - Se prefiere 'primicias' para לָרֵאשִׁית y 'diezmos' para מַעַשְׂרוֹת, siguiendo el registro cultual estándar.
  - No se introduce 'Cristo/Mesías' ni otras terminologías ajenas al versículo.
  - La frase final evita 'sobre' para no calcar una preposición poco natural en español cuando el hebreo expresa el motivo de la alegría.
