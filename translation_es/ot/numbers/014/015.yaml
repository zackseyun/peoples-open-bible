translation:
  language: es
  text: 'Y si matas a este pueblo[a] como un solo hombre, las naciones que han oído tu noticia dirán[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como un solo hombre», un modismo que expresa que todo el pueblo sería destruido junto o de una sola vez.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que han oído tu reporte» o «que han oído el reporte acerca de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמַתָּה
  english_pob_choice: And if you kill
  chosen_spanish: Y si matas
  alternatives_spanish:
  - Y matas
  - Y si das muerte a
  lexicon: HALOT
  rationale: El verbo hiphil de מות expresa ‘causar la muerte’ o ‘matar’. En español, «matas» comunica de forma natural la acción con el valor condicional que el contexto exige, ya que la súplica de Moisés continúa desde el versículo anterior.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo de Israel
  - esta gente
  lexicon: HALOT
  rationale: עָם designa aquí al colectivo de Israel. «Pueblo» conserva el referente corporativo y el demostrativo cercano mejor que una paráfrasis más amplia.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como a un solo hombre
  alternatives_spanish:
  - como un solo hombre
  - todos a la vez
  lexicon: HALOT
  rationale: Se preserva el giro idiomático con una forma natural en español. La adición de «a» ayuda a reflejar el valor comparativo de כְּ sin forzar una literalidad extraña.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם suele referirse a las naciones no israelitas. «Las naciones» es la equivalencia más transparente y evita connotaciones posteriores de «gentiles».
- source_word: אֲשֶׁר שָׁמְעוּ אֶת שִׁמְעֲךָ
  english_pob_choice: that have heard your report
  chosen_spanish: que han oído tu informe
  alternatives_spanish:
  - que han oído tu noticia
  - que han oído hablar de ti
  lexicon: HALOT
  rationale: שֵׁמַע significa aquí ‘informe’, ‘noticia’ o ‘reporte’. «Tu informe» sigue de cerca la revisión inglesa final y conserva el sentido informativo sin expandir a «fama», que sería más interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: will say,
  chosen_spanish: 'dirán:'
  alternatives_spanish:
  - dirán,
  - 'y dirán:'
  lexicon: HALOT
  rationale: El infinitivo introduce el contenido directo de la cita siguiente. En español, «dirán:» marca con claridad la transición a la declaración que continúa en el versículo posterior.
theological_decisions:
- issue: Idioma antropológico con אִישׁ singular
  english_pob_reading: as one man
  chosen_spanish_reading: como a un solo hombre
  alternative_spanish_readings:
  - como un solo hombre
  - todos juntos
  rationale: El hebreo usa el singular masculino אִישׁ en un modismo de totalidad/unidad. Se conserva el color idiomático sin sugerir que el texto hable de un varón individual; el sentido es que todo el pueblo caería junto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de שִׁמְעֲךָ
  english_pob_reading: your report
  chosen_spanish_reading: tu informe
  alternative_spanish_readings:
  - tu fama
  - tu noticia
  rationale: La revisión inglesa corrigió una expansión interpretativa hacia ‘fama’ y volvió al valor básico de ‘reporte/noticia’. «Tu informe» preserva esa precisión semántica y mantiene abierta la referencia al testimonio oído por las naciones.
  doctrine_reference: 'POB lexical policy: preserve documented lexical tensions'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma en cuenta la revisión inglesa más reciente, que prefirió «your report» frente a «your fame» para reflejar שִׁמְעֲךָ con mayor exactitud. También conserva el modismo de כְּאִישׁ אֶחָד sin diluirlo en una paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Pueblo» mantiene el referente corporativo de Israel mejor que «nación» en este contexto.
  - «Las naciones» sigue el valor usual de גּוֹיִם y evita el tecnicismo posterior de «gentiles».
  - Se evita «Cristo», «SEÑOR» y otras formas no implicadas por el hebreo de este versículo.
  - La puntuación con dos puntos prepara correctamente la cita que continúa en el versículo siguiente.
