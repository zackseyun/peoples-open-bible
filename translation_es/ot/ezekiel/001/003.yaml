translation:
  language: es
  text: La palabra de Yahvé ciertamente vino[a] a Ezequiel hijo de Buzi, el sacerdote, en la tierra de los caldeos[b], junto al río Quebar, y allí la mano de Yahvé estaba sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la palabra de Yahvé vino a Ezequiel»; el hebreo repite el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la tierra de los babilonios»; «caldeos» es la traducción más literal del término hebreo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y allí estuvo sobre él la mano de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָיֹה הָיָה
  english_pob_choice: indeed came
  chosen_spanish: vino
  alternatives_spanish:
  - vino de veras
  - vino ciertamente
  - vino efectivamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. En español, el efecto natural se puede conservar con una construcción fluida y breve; aquí, el énfasis se deja en la colocación del sintagma y se puede explicitar en nota sin forzar un calco como 'vino vino'.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' preserva el peso formal y profético del hebreo. Se mantiene ''Yahvé'' según la terminología proyectual para el Tetragrámaton.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se transcribe como 'Yahvé' conforme al estándar del proyecto, en lugar de sustituirse por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En la fórmula profética, la preposición marca al destinatario del mensaje; 'a' es la equivalencia natural en español.
- source_word: יְחֶזְקֵאל בֶּן בּוּזִי
  english_pob_choice: Ezekiel son of Buzi
  chosen_spanish: Ezequiel hijo de Buzi
  alternatives_spanish:
  - Yehezkel hijo de Buzi
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio y la relación patronímica 'hijo de' para conservar claridad y fidelidad.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-levita
  lexicon: HALOT
  rationale: El sustantivo identifica directamente a Ezequiel. 'Sacerdote' es la traducción natural y precisa en español.
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  english_pob_choice: in the land of the Chaldeans
  chosen_spanish: en la tierra de los caldeos
  alternatives_spanish:
  - en la tierra de los babilonios
  - en Caldea
  lexicon: HALOT
  rationale: '''Caldeos'' es el equivalente más literal del hebreo. ''Tierra'' reproduce bien el valor locativo y territorial del original.'
- source_word: עַל נְהַר כְּבָר
  english_pob_choice: by the Kebar River
  chosen_spanish: junto al río Quebar
  alternatives_spanish:
  - a orillas del río Quebar
  - junto al Quebar
  lexicon: HALOT
  rationale: '''Junto a'' transmite el valor locativo de עַל en este contexto. Se mantiene el nombre tradicional ''Quebar'' para el curso de agua.'
- source_word: וַתְּהִי עָלָיו שָׁם יַד יְהוָה
  english_pob_choice: and there the hand of Yahweh was upon him
  chosen_spanish: y allí estuvo sobre él la mano de Yahvé
  alternatives_spanish:
  - y allí estaba sobre él la mano de Yahvé
  - y allí vino sobre él la mano de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo 'la mano de Yahvé' sin explicitarlo como 'poder'. 'Estuvo sobre él' refleja la permanencia o vigencia de la acción divina con naturalidad en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino como transliteración reverente y consistente con el criterio del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Modismo profético 'la mano de Yahvé'
  english_pob_reading: retain the idiom as 'the hand of Yahweh was upon him'
  chosen_spanish_reading: la mano de Yahvé estuvo sobre él
  alternative_spanish_readings:
  - la mano de Yahvé fue sobre él
  - el poder de Yahvé estuvo sobre él
  rationale: 'Se retiene el modismo sin resolverlo en una paráfrasis interpretativa. Esto conserva la tensión teológica del original: acción, impulso y presencia divina sobre el profeta.'
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que movió el énfasis de הָיֹה הָיָה hacia una lectura más natural en la cláusula principal, y adopta la corrección final de la última proposición como estado durativo/locativo ('estuvo sobre él') en vez de un movimiento verbal más fuerte. También conserva la opción literal 'caldeos' frente a la alternativa interpretativa 'babilonios'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera uniforme para יְהוָה.
  - '''Ezequiel'' y ''Quebar'' siguen la forma española habitual y legible.'
  - Se conserva 'la mano de Yahvé' como modismo bíblico, sin sustituirlo por 'poder' o 'fuerza'.
  - La puntuación sigue el orden natural del español, con una sola oración larga que refleja la estructura del hebreo.
