id: COL.2.11
reference: Colossians 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ περιετμήθητε περιτομῇ ἀχειροποιήτῳ ἐν τῇ ἀπεκδύσει τοῦ ⸀σώματος τῆς σαρκός, ἐν τῇ περιτομῇ τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/011.yaml
  text: In him you also were circumcised with a circumcision not made by hands, in the removal of the body of flesh, in the circumcision of Messiah,
translation:
  language: ko
  text: 그분 안에서 여러분도 손으로 하지 않은 할례, 곧 육체의 몸을 벗어 버림 안에서 받은 메시아의 할례[a]로 할례를 받았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아께서 행하신 할례」, 「메시아께 속한 할례」. 헬라어 속격은 메시아께서 행하시는, 메시아께 속한, 혹은 메시아와 연관된 할례로 해석될 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In him
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 누구 안에서
  lexicon: BDAG
  rationale: 관계대명사가 앞 절의 메시아를 받는다. 인격적 「그분 안에서」로 옮긴다.
- source_word: περιετμήθητε
  english_pob_choice: you were circumcised
  chosen_korean: 할례를 받았습니다
  alternatives_korean:
  - 베어 내심을 받았습니다
  lexicon: BDAG
  rationale: 부정과거 수동. 「할례」의 표준 한국어 표현 보존.
- source_word: περιτομῇ ἀχειροποιήτῳ
  english_pob_choice: a circumcision not made by hands
  chosen_korean: 손으로 하지 않은 할례
  alternatives_korean:
  - 사람의 손으로 행하지 않은 할례
  - 손으로 짓지 아니한 할례
  lexicon: BDAG
  rationale: ἀχειροποίητος의 「사람의 손이 아닌」 어감을 「손으로 하지 않은」으로 옮긴다.
- source_word: ἐν τῇ ἀπεκδύσει τοῦ σώματος τῆς σαρκός
  english_pob_choice: in the removal of the body of flesh
  chosen_korean: 육체의 몸을 벗어 버림 안에서
  alternatives_korean:
  - 육체의 몸을 벗는 것 안에서
  - 육체의 몸을 벗어 내는 것으로
  lexicon: BDAG
  rationale: ἀπέκδυσις의 「벗어 버림」을 살린다. σάρξ는 글로사리 「육체」.
- source_word: ἐν τῇ περιτομῇ τοῦ Χριστοῦ
  english_pob_choice: in the circumcision of Messiah
  chosen_korean: 메시아의 할례로
  alternatives_korean:
  - 메시아께서 행하신 할례로
  - 메시아의 할례 안에서
  lexicon: BDAG
  rationale: 속격의 의도적 모호성을 「메시아의 할례」로 보존한다. 주체·소유·연관 가능성 모두를 함께 담는다.
theological_decisions:
- issue: 「메시아의 할례」의 속격 해석
  chosen_reading: 「메시아의 할례」(모호성 보존)
  alternative_readings:
  - 메시아께서 행하신 할례
  - 메시아 자신의 할례
  - 메시아께 속한 할례(새 언약의 할례)
  rationale: 헬라어 속격은 본질적으로 모호하다. 본 번역은 본문에서 해소하지 않고 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; Χριστός default Messiah'
- issue: 「육체의 몸」의 의미
  chosen_reading: 「육체의 몸」(원어 그대로 보존)
  alternative_readings:
  - 「죄성의 몸」
  - 「육신적 몸」
  rationale: SBLGNT 본문은 짧은 어구를 두며, 후대 사본의 확장(「죄의 몸」 등)을 따르지 않는다. σάρξ를 「죄성」으로 옮기면 본문에 없는 신학적 결정을 들여오게 된다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
