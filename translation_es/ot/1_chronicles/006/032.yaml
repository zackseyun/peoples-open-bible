  rationale: Nombre propio transliterado sin traducción, siguiendo el mismo criterio del POB en inglés.
- source_word: מוּשִׁי
  english_pob_choice: Mushi
  chosen_spanish: Mushi
  lexicon: transliteración de nombre propio
  rationale: Nombre propio transliterado de manera estándar en español, sin añadir adaptación interpretativa.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: transliteración de nombre propio
  rationale: Nombre propio transliterado de forma estable y reconocible en español bíblico.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: transliteración de nombre propio
  rationale: Se preserva el nombre propio del patriarca con la forma española habitual ‘Leví’. En este linaje se refiere a la persona, no al colectivo tribal abstracto.
theological_decisions:
- issue: Valor genealógico directo de la cadena de filiación
  english_pob_reading: son of Mahli, son of Mushi, son of Merari, son of Levi.
  chosen_spanish_reading: hijo de Mahli, hijo de Mushi, hijo de Merari, hijo de Leví.
  alternative_spanish_readings:
  - descendiente de Mahli, descendiente de Mushi, descendiente de Merari, descendiente de Leví
  rationale: La secuencia presenta una genealogía lineal breve sin indicios inmediatos de telescopaje. Mantener ‘hijo de’ conserva la fuerza genealógica más directa del hebreo y del audit trail inglés, sin introducir una lectura más débil que el texto no requiere.
  doctrine_reference: Números 3:17-20; 1 Crónicas 6:16-19
