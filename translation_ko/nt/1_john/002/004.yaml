  text: The one who says[a], “I have come to know him,” and does not keep his commandments is a liar[b], and the truth is not in him.
  footnotes:
  - marker: a
    text: 'Or: “I know him.” The Greek perfect can be rendered more simply, but “I have come to know him” better reflects the aspect of a present relationship resulting from prior coming-to-know.'
