translation:
  language: es
  text: 'David envió a las tropas: un tercio bajo[a] Joab, un tercio bajo Abisai hijo de Sarvia, hermano de Joab, y un tercio bajo Itai el gétita. Y el rey dijo a las tropas: «Yo mismo ciertamente saldré con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en la mano de», un modismo que indica autoridad o mando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: HALOT
  rationale: En este contexto militar, el verbo indica poner fuerzas en movimiento para una misión. «Envió» es natural en español y conserva la acción directiva sin volverla más explicativa de lo que permite el hebreo.
- source_word: הָעָם
  english_pob_choice: the troops
  chosen_spanish: las tropas
  alternatives_spanish:
  - el pueblo
  - el ejército
  - los hombres
  lexicon: HALOT
  rationale: Aunque literalmente es «el pueblo», aquí se refiere al contingente de combate de David. «Las tropas» mantiene el referente militar contextual sin perder la base semántica de colectivo humano.
- source_word: הַשְּׁלִשִׁית / הַשְּׁלִשִׁת
  english_pob_choice: one third
  chosen_spanish: un tercio
  alternatives_spanish:
  - la tercera parte
  - un tercio de
  lexicon: HALOT
  rationale: La forma femenina repetida señala una división en tres partes. «Un tercio» es la expresión más clara y fiel en español, y evita la rigidez de «la tercera parte» en una enumeración militar.
- source_word: בְּיַד
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - en mano de
  - bajo el mando de
  - bajo la autoridad de
  lexicon: HALOT
  rationale: La expresión literal «en la mano de» funciona como idiomático de autoridad/comando. «Bajo» transmite de manera breve y natural la idea de subordinación militar, como en la traducción inglesa auditada.
- source_word: אֲבִישַׁי בֶּן צְרוּיָה אֲחִי יוֹאָב
  english_pob_choice: Abishai son of Zeruiah, Joab’s brother
  chosen_spanish: Abisai hijo de Sarvia, hermano de Joab
  alternatives_spanish:
  - Abisai, el hijo de Sarvia, hermano de Joab
  - Abisai, hijo de Sarvia y hermano de Joab
  lexicon: HALOT
  rationale: Se conserva la identificación familiar en una estructura española natural. «Hijo de Sarvia» reproduce el patronímico, y «hermano de Joab» refleja la aposición explicativa del hebreo sin sobrecargar el orden sintáctico.
- source_word: אִתַּי הַגִּתִּי
  english_pob_choice: Ittai the Gittite
  chosen_spanish: Itai el gétita
  alternatives_spanish:
  - Itai el geteo
  - Itai de Gat
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y el gentilicio tradicionalmente reconocible. «Gétita» preserva el valor étnico/toponímico de הַגִּתִּי y es comprensible en español bíblico sin modernizarlo excesivamente.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: And the king said
  chosen_spanish: Y el rey dijo
  alternatives_spanish:
  - Entonces el rey dijo
  - Y dijo el rey
  lexicon: HALOT
  rationale: La coordinación narrativa simple reproduce bien el waw consecutivo. «El rey» mantiene el título real sin introducir interpretación adicional.
- source_word: יָצֹא אֵצֵא
  english_pob_choice: I myself will surely go out
  chosen_spanish: saldré sin falta
  alternatives_spanish:
  - yo mismo saldré
  - ciertamente saldré
  - saldré, saldré
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la certeza/énfasis. «Sin falta» comunica bien esa fuerza en español sin volver la frase artificiosa. El matiz de «yo mismo» queda implícito y puede explicitarse por contexto, aunque el hebreo lo refuerza con גַּם אֲנִי.
- source_word: גַּם אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - también yo
  - incluso yo
  lexicon: HALOT
  rationale: La expresión añade énfasis personal y no mera adición. «Yo mismo» reproduce esa implicación enfática con claridad en español y armoniza con la intensificación del verbo.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto a ustedes
  lexicon: HALOT
  rationale: Se usa el plural de trato neutral latinoamericano. «Con ustedes» expresa compañía y participación junto al grupo en un español de registro natural y amplio.
theological_decisions:
- issue: Intensificación del compromiso personal del rey
  english_pob_reading: I myself will surely go out with you
  chosen_spanish_reading: Yo mismo saldré sin falta con ustedes
  alternative_spanish_readings:
  - Yo mismo saldré ciertamente con ustedes
  - Yo también saldré con ustedes
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de énfasis: el hebreo duplica la idea de salida y añade גַּם אֲנִי. La redacción española intenta conservar tanto la determinación como el énfasis personal del rey sin suavizarlo a una simple promesa.'
  doctrine_reference: Narrative emphasis; no doctrinal locus
- issue: Valor militar de הָעָם en este contexto
  english_pob_reading: the troops
  chosen_spanish_reading: las tropas
  alternative_spanish_readings:
  - el pueblo
  - el ejército
  - la gente
  rationale: Se evita traducir de forma literal «el pueblo» porque en esta escena bélica el referente es el contingente armado. La elección mantiene el sentido contextual sin negar que el hebreo use un colectivo más general.
  doctrine_reference: Lexical/contextual sense; no doctrinal locus
translation_notes:
  revision_awareness: Se revisó la pauta inglesa auditada y no se detectaron cambios sustantivos en la lectura base. La única tensión relevante es el idioma de comando en בְּיַד, resuelta en español con una preposición militar natural y una nota de pie que conserva el modismo literal del hebreo. También se atendió la intensificación de יָצֹא אֵצֵא y גַּם אֲנִי para no perder el énfasis del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece aquí; no aplica.
  - Se usa «las tropas» por el valor contextual militar de הָעָם.
  - Se conserva el gentilicio «gétita» para הַגִּתִּי por claridad bíblica y continuidad terminológica.
  - El trato plural «ustedes» sigue el español latinoamericano neutral y evita un registro peninsular no deseado.
