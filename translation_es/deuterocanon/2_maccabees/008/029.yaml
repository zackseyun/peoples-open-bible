  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: las acciones previas resumidas por διαπραξάμενοι, la petición corporativa, el ruego al κύριος misericordioso, la reconciliación intensificada por εἰς τέλος, y la fuerza de δούλοις como «esclavos». Sin embargo, «de hacer una súplica común» debilita y vuelve menos natural ἱκετίαν ποιησάμενοι en contexto cultual; el expediente inglés auditado justificó «prayer of supplication», y en español conviene explicitar «oración» para preservar mejor el matiz religioso.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «hacer una súplica común» suena algo mecánico en español bíblico-natural. «Hacer una oración de súplica en común» o «elevar una oración de súplica en común» lee mejor y refleja mejor el acto corporativo de plegaria. El resto del verso es legible y adecuado.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto en «Señor», «misericordioso» y especialmente «esclavos» para δοῦλοις. No hay conflicto con Yahvé porque el griego tiene κύριον, no el tetragrámaton. La principal mejora es léxica/estilística en ἱκετίαν: conviene mantener la dimensión de oración, no solo «súplica».'
  issues:
  - severity: medium
    issue: «hacer una súplica común» suena poco idiomático y reduce el matiz cultual de ἱκετίαν ποιησάμενοι
    rationale: Aunque «súplica» es semánticamente cercana, la combinación con ποιεῖσθαι aquí y el contexto de dirigirse al Señor favorecen una formulación explícitamente oracional. El inglés auditado también preserva «prayer of supplication».
  - severity: low
    issue: La nota [b] se centra solo en κοινήν y no ayuda con la posible ambigüedad de εἰς τέλος
    rationale: El English POB tenía nota para εἰς τέλος. No es estrictamente obligatorio replicarla si no hay nueva ambigüedad en español, pero si se conserva una sola nota, conviene que la traducción principal no pierda el matiz religioso del sintagma anterior.
  revised_spanish_text: Después de hacer estas cosas[a], y de hacer una oración de súplica en común, rogaban al Señor misericordioso que se reconciliara plenamente con sus esclavos.
  revised_footnotes:
  - marker: a
    text: O «después de haber llevado a cabo estas cosas». El participio griego resume acciones concluidas; la traducción principal lo vuelve un español fluido sin precisar más de lo que el texto dice.
    reason: lexical_alternative
