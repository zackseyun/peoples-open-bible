lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo introduce una nueva intervención divina. En español, "habló" mantiene el tono formal y la fórmula habitual de revelación mejor que una simple repetición de "dijo".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma de referencia del proyecto en español. Esto evita sustituirlo por un título y mantiene la equivalencia con el Tetragrámaton.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; en español natural, "a" expresa con claridad ese complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La construcción infinitiva funciona como fórmula introductoria del discurso siguiente. "Diciendo" preserva esa función encadenadora sin forzar una paráfrasis.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Nombre divino, no un sustituto. En la tradición del proyecto en español, "Yahvé" conserva esa distinción y evita ocultar el nombre personal de Dios detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB no introdujo cambios textuales en la última pasada y mantiene alta concordancia con el hebreo. La presente versión sigue esa lectura estable, trasladando al español la misma fórmula narrativa y la misma decisión para el Nombre divino.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», coherente con el estándar del proyecto en español.
  - «Habló... diciendo» reproduce la fórmula narrativa sin añadir contenido que no esté en el hebreo.
  - La puntuación mantiene la apertura de una cita directa en el versículo siguiente, como en el patrón bíblico habitual.
