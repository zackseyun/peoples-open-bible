translation:
  language: es
  text: Porque no poseyeron la tierra por su espada, ni su brazo los salvó; sino que tu mano derecha, tu brazo y la luz de tu rostro[a] lo hicieron[b], porque te deleitaste en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la luz de tu presencia»; el hebreo dice literalmente «la luz de tu rostro», imagen de favor divino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sino que fue tu mano derecha, tu brazo y la luz de tu rostro»; el hebreo deja el verbo implícito en la cláusula positiva.'
    reason: previous_rendering
lexical_decisions:
- source_word: יָרְשׁוּ
  english_pob_choice: possess
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - poseyeron
  - heredaron
  - tomaron la tierra
  lexicon: HALOT
  rationale: El verbo puede significar heredar, desposeer o tomar posesión. En este contexto de conquista, «tomaron posesión de» transmite la idea de adquirir y retener la tierra sin reducirla a una herencia pasiva.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En un contexto de conquista, «la tierra» es natural en español y conserva la referencia territorial sin introducir una especificación que el texto no expresa.
- source_word: בְחַרְבָּם
  english_pob_choice: their sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su espada
  - sus espadas
  - la espada de ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal y militar del singular colectivo en español, que suena natural y preserva el paralelismo con «su brazo».
- source_word: זְרוֹעָם
  english_pob_choice: their arm
  chosen_spanish: su brazo
  alternatives_spanish:
  - su brazo
  - su fuerza
  - su poder
  lexicon: HALOT
  rationale: Se conserva la metáfora literal de «brazo» para mantener el contraste poético con el brazo de Dios y no aplanar la imagen en fuerza o poder.
- source_word: הוֹשִׁיעָה לָּמוֹ
  english_pob_choice: did not save them
  chosen_spanish: los salvó
  alternatives_spanish:
  - los libró
  - les dio victoria
  - los rescató
  lexicon: HALOT
  rationale: 'Aunque el hebreo afirma negativamente que su brazo no los salvó, en español la cláusula positiva debe explicitar el verbo en la antítesis: «su brazo los salvó» / «no los salvó». Aquí se conserva el sentido de salvar/liberar propio de ישׁע.'
- source_word: יְמִינְךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu mano derecha
  lexicon: HALOT
  rationale: «Tu mano derecha» conserva la imagen hebrea y resulta plenamente inteligible en español moderno; «diestra» sería más tradicional, pero menos transparente para este proyecto.
- source_word: זְרוֹעֲךָ
  english_pob_choice: your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu brazo
  - tu fuerza
  - tu poder
  lexicon: HALOT
  rationale: Se mantiene la misma metáfora corporal que en la primera mitad del versículo, respetando el paralelismo entre el brazo humano y el brazo de Yahvé.
- source_word: אוֹר פָּנֶיךָ
  english_pob_choice: the light of your face
  chosen_spanish: la luz de tu rostro
  alternatives_spanish:
  - la luz de tu rostro
  - la luz de tu presencia
  - el favor de tu rostro
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «rostro» para no resolver prematuramente la metáfora; en español «rostro» comunica mejor la imagen poética que «cara» y mantiene la resonancia de favor divino.
- source_word: רְצִיתָם
  english_pob_choice: you delighted in them
  chosen_spanish: te complaciste en ellos
  alternatives_spanish:
  - te complaciste en ellos
  - los favoreciste
  - te agradaron
  lexicon: HALOT
  rationale: El verbo expresa agrado/favor divino. «Te complaciste en ellos» preserva el matiz de beneplácito y la relación personal de la acción divina sin convertirlo en una explicación doctrinal más amplia.
theological_decisions:
- issue: Contraste entre poder humano y acción divina
  english_pob_reading: The verse attributes Israel's possession of the land and deliverance to God's action rather than their own weapons or strength.
  chosen_spanish_reading: El versículo atribuye la posesión de la tierra y la salvación no a la espada ni al brazo humanos, sino a la acción de Yahvé.
  alternative_spanish_readings:
  - Una afirmación general de dependencia de Dios
  - Una lectura menos específica sobre ayuda divina
  rationale: El hebreo contrapone explícitamente «su espada/su brazo» con «tu mano derecha/tu brazo/la luz de tu rostro». La traducción mantiene esa tensión teológica sin expandirla más allá de lo que el verso dice.
  doctrine_reference: 'Translation philosophy #3'
- issue: אוֹר פָּנֶיךָ como imagen de favor divino
  english_pob_reading: Rendered literally as 'the light of your face' in the main text.
  chosen_spanish_reading: Se conserva literalmente como «la luz de tu rostro» en el texto principal.
  alternative_spanish_readings:
  - la luz de tu presencia
  - tu favor
  rationale: La imagen es teológicamente rica y el hebreo la expresa con claridad; por eso se preserva en el cuerpo del texto y se permite una nota alternativa para su sentido de favor o presencia.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta el último repaso inglés, que resolvió la elipsis positiva con un «did» explícito. En español, la cláusula se reestructura de manera natural con «sino...» y un verbo finito claro en la oposición, evitando un calco torpe de la elipsis inglesa y conservando la antítesis hebrea.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con la convención del proyecto cuando el texto habla de la acción divina directa.
  - Se conserva la metáfora corporal («mano derecha», «brazo», «rostro») por su valor poético y teológico.
  - Se prefiere «tomar posesión de» frente a «heredar» para reflejar el contexto de conquista.
  - «Te complaciste en ellos» mantiene el matiz de beneplácito divino sin forzar una glosa interpretativa.
