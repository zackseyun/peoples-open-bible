translation:
  language: es
  text: Él se sentará como refinador y purificador de plata, y purificará a los hijos de Leví y los refinará como oro y como plata; y serán para Yahvé, los que presentan una ofrenda[a] en justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trayendo una ofrenda vegetal». El término hebreo minḥah suele referirse específicamente a una ofrenda vegetal, aunque también puede usarse de manera más amplia para una ofrenda o regalo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשַׁב
  english_pob_choice: He will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - tomará asiento
  - se sentará de nuevo
  lexicon: HALOT
  rationale: יַשַׁב describe sentarse o permanecer. En español, «se sentará» conserva la imagen de un refinador instalado en su tarea sin añadir interpretación innecesaria.
- source_word: מְצָרֵף
  english_pob_choice: as a refiner
  chosen_spanish: como refinador
  alternatives_spanish:
  - como el que refina
  - como fundidor
  lexicon: HALOT
  rationale: El participio nombra a quien refina metales. «Como refinador» mantiene el oficio metafórico y la construcción predicativa del hebreo.
- source_word: וּמְטַהֵר כֶּסֶף
  english_pob_choice: and purifier of silver
  chosen_spanish: y purificador de plata
  alternatives_spanish:
  - y el que purifica la plata
  - y limpiador de plata
  lexicon: HALOT
  rationale: טהר expresa limpiar o purificar. «Purificador de plata» es natural en español y conserva el paralelismo con «refinador».
- source_word: בְּנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «hijos de Leví» para reflejar la fórmula genealógica del hebreo y su foco en la línea sacerdotal.
- source_word: וְזִקַּק
  english_pob_choice: and refine
  chosen_spanish: los refinará
  alternatives_spanish:
  - los purgará
  - los depurará
  lexicon: HALOT
  rationale: זקק se usa para refinar metales. «Refinará» conserva la imagen metalúrgica y evita un verbo más técnico o arcaico.
- source_word: כַּזָּהָב וְכַכָּסֶף
  english_pob_choice: like gold and like silver
  chosen_spanish: como oro y como plata
  alternatives_spanish:
  - igual que oro e igual que plata
  - cual oro y cual plata
  lexicon: HALOT
  rationale: Se preserva la doble comparación hebrea con dos miembros paralelos, manteniendo el énfasis retórico de la repetición de כ.
- source_word: וְהָיוּ לַיהוָה
  english_pob_choice: and they will be for Yahweh
  chosen_spanish: y serán para Yahvé
  alternatives_spanish:
  - y pertenecerán a Yahvé
  - y serán de Yahvé
  lexicon: HALOT
  rationale: La frase indica pertenencia y relación consagrada. «Serán para Yahvé» conserva la estructura hebrea y el sentido de dedicación.
- source_word: מַגִּישֵׁי מִנְחָה
  english_pob_choice: presenting an offering
  chosen_spanish: presentando una ofrenda
  alternatives_spanish:
  - trayendo una ofrenda
  - ofreciendo una ofrenda
  lexicon: HALOT
  rationale: מַגִּישֵׁי es participio de presentar/traer. «Presentando una ofrenda» respeta el movimiento del acto cultual sin forzar una terminología más específica en el texto principal.
- source_word: מִנְחָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda vegetal
  - oblación
  lexicon: HALOT
  rationale: Aunque מִנְחָה puede referirse específicamente a una ofrenda vegetal, aquí el contexto inmediato permite el sentido general de «ofrenda». «Ofrenda» es claro y suficientemente amplio en español.
- source_word: בִּצְדָקָה
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en rectitud
  lexicon: HALOT
  rationale: צְדָקָה puede abarcar justicia y rectitud. Se eligió «en justicia» por su naturalidad litúrgica y por conservar el valor ético-covenantal del término sin reducirlo a una mera adverbialidad.
theological_decisions:
- issue: Alcance del refinamiento
  english_pob_reading: The LORD purifies the priestly line, the sons of Levi, so that their worship becomes acceptable.
  chosen_spanish_reading: Yahvé purifica a los hijos de Leví para que sean aptos para presentar ofrendas en justicia.
  alternative_spanish_readings:
  - Yahvé purifica a todo Israel
  - Lectura mesiánica implícita en la profecía
  rationale: El hebreo nombra explícitamente a «los hijos de Leví», así que la traducción conserva ese foco sacerdotal y no amplía el alcance en el texto principal.
  doctrine_reference: Primacía del texto מקור; mantener la tensión interpretativa sin resolverla en traducción.
- issue: Sentido de מִנְחָה
  english_pob_reading: Rendered broadly as 'offering' in the main text, with a footnote noting 'grain offering.'
  chosen_spanish_reading: «Ofrenda» en el cuerpo principal, con nota sobre la posibilidad de «ofrenda vegetal/ofrenda de cereal».
  alternative_spanish_readings:
  - ofrenda vegetal
  - oblación
  rationale: En este contexto se enfatiza la purificación del culto más que la categoría técnica exacta del sacrificio. Por eso el texto principal usa el término más amplio y la nota preserva la opción más específica.
  doctrine_reference: Equivalencia óptima; no especificar más allá de lo que exige el verso.
translation_notes:
  revision_awareness: 'Se siguió el auditorio inglés: se mantuvo el enfoque en la línea de Leví, la imaginería metalúrgica y la ambigüedad controlada de minḥah. No se requirieron revisiones adicionales respecto del último pase, y la versión española conserva esa misma decisión interpretativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva la simetría «como oro y como plata» para reflejar la repetición hebrea.
  - «Ofrenda» se mantiene como término amplio; la especificación cultual queda en nota.
  - La sintaxis sigue de cerca el orden semántico del hebreo sin sonar forzada en español.
