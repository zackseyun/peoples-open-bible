    text: Or 'courses' instead of 'divisions' for the organized priestly and Levitical groupings.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the camps of the LORD'; some understand this more interpretively as 'the courts of the LORD.'
    reason: alternative_reading
