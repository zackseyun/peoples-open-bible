  revision_rationale: 'Se revisa para alinear el español con las decisiones léxicas auditadas del POB: 1) «derríbenlos» preserva mejor la fuerza verbal de הַכּוּם que «mátenlos»; 2) «los arrojaron fuera» refleja el matiz de expulsión de וַיַּשְׁלִכוּ; 3) «santuario interior» traslada al texto principal la lectura contextual adoptada por el POB para עִיר, dejando «ciudad/ciudadela» como alternativa en nota. Se elimina la nota sobre «holocausto» por no ser necesaria para una ambigüedad real del español en este versículo.'
