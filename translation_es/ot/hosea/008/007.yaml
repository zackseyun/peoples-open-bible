translation:
  language: es
  text: Porque siembran viento[a], y cosecharán torbellino. El grano en pie[b] no tiene espiga; no producirá harina. Y aun si la produce[c], extraños la devorarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tormenta’ o ‘tempestad’ para ‘torbellino’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘El grano en pie no tiene צמח’; el sustantivo puede significar ‘brote’ o ‘crecimiento’, pero aquí probablemente se refiere a la espiga o cabeza necesaria para producir harina.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ‘Quizá la produzca, pero extraños la devorarán’.'
    reason: alternative_reading
lexical_decisions:
- source_word: ר֥וּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: En este proverbio agrícola de juicio, el sentido concreto de רוּחַ como fenómeno natural encaja con la imagen de sembrar y cosechar. ‘Viento’ conserva la correspondencia con el inglés POB y evita introducir ‘espíritu’, que aquí no está sugerido por el contexto.
- source_word: וְסוּפָתָה
  english_pob_choice: and the whirlwind
  chosen_spanish: torbellino
  alternatives_spanish:
  - tormenta
  - tempestad
  - vendaval
  lexicon: HALOT
  rationale: סוּפָה designa una tormenta violenta o remolino destructivo. ‘Torbellino’ mantiene la intensificación retórica de sembrar viento y cosechar un desastre más severo, y resulta natural en español bíblico contemporáneo.
- source_word: קָמָה
  english_pob_choice: standing grain
  chosen_spanish: la espiga
  alternatives_spanish:
  - el grano en pie
  - el cereal en pie
  - la mies
  lexicon: HALOT
  rationale: El hebreo se refiere al grano en el campo, y el verso siguiente exige una parte apta para producir harina. ‘La espiga’ resume en español la parte del cereal que debería desarrollar grano utilizable, sin perder el marco agrícola.
- source_word: צֶמַח
  english_pob_choice: head
  chosen_spanish: grano
  alternatives_spanish:
  - espiga
  - brote
  - crecimiento
  lexicon: HALOT
  rationale: El contexto indica que la planta no llega a producir algo aprovechable para moler. En español, ‘no tendrá grano’ expresa con claridad la falta del resultado esperado y preserva la idea de incapacidad productiva señalada por el texto.
- source_word: בְּלִי יַעֲשֶׂה קֶּמַח
  english_pob_choice: it will yield no flour
  chosen_spanish: no dará harina
  alternatives_spanish:
  - no producirá harina
  - no hará harina
  - no rendirá harina
  lexicon: HALOT
  rationale: La frase explica el fracaso del cultivo en términos de resultado útil. ‘Dar harina’ es idiomático en español y conserva el sentido de producción para el molino, sin sobreexplicar el proceso.
- source_word: אוּלַי
  english_pob_choice: Even if
  chosen_spanish: Y aun si
  alternatives_spanish:
  - Tal vez
  - Quizá
  - Aunque
  lexicon: HALOT
  rationale: 'Aquí אוּלַי introduce una posibilidad concesiva: incluso suponiendo que hubiera algo aprovechable, el resultado seguiría siendo el mismo. ‘Y aun si’ comunica esa fuerza mejor que un simple ‘quizá’.'
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - extranjeros
  - ajenos
  lexicon: HALOT
  rationale: El término apunta a quienes están fuera del pueblo y se apoderan del fruto. ‘Extraños’ es breve y natural en español, y conserva la idea de personas no pertenecientes a Israel.
- source_word: יִבְלָעֻהוּ
  english_pob_choice: will swallow it up
  chosen_spanish: la devorarán
  alternatives_spanish:
  - la tragaran
  - la engullirán
  - se la comerán
  lexicon: HALOT
  rationale: בלע literalmente significa ‘tragar / devorar’. En español, ‘devorar’ transmite la imagen de consumo total con fuerza profética y evita una expresión demasiado literal que sonaría menos natural.
theological_decisions:
- issue: Metáfora agrícola de juicio
  english_pob_reading: Render the imagery directly as a proverb of judgment without allegorical expansion.
  chosen_spanish_reading: Mantener la imagen agrícola como proverbio de juicio, sin convertirla en paráfrasis espiritualizada.
  alternative_spanish_readings:
  - Interpretar ‘viento’ y ‘torbellino’ como vanidad y desastre en forma explicativa
  - Añadir una explicación moralizante del símbolo
  rationale: El texto presenta una metáfora concreta de siembra y cosecha para describir las consecuencias del pecado de Israel. La traducción española conserva la imagen y deja que la carga teológica emerja del propio verso, como hace el POB inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó sin modificaciones, y el control cruzado reportó alto acuerdo con la traducción auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de רוּחַ y סוּפָה con léxico meteorológico concreto, coherente con la decisión inglesa.
  - ‘Extraños’ preserva el contraste pueblo/extranjeros sin cargar el verso con un matiz jurídico que el hebreo no explicita.
  - La cláusula final conserva la posibilidad concesiva de אוּלַי mediante ‘Y aun si’, alineada con la lectura inglesa 'Even if'.
  - El orden y la puntuación siguen el paralelismo del hebreo y la segmentación del POB inglés, para facilitar la lectura pública y el análisis auditable.
