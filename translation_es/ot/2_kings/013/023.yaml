translation:
  language: es
  text: Pero Yahvé les mostró favor[a] y tuvo compasión de ellos, y se volvió hacia ellos por causa de su pacto con Abraham, Isaac y Jacob[b]. No quiso destruirlos, y no los arrojó de su presencia hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue bondadoso con ellos»; también, «fue favorable con ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por el bien de su pacto con Abraham, Isaac y Jacob».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחָן / חנן
  english_pob_choice: was gracious
  chosen_spanish: fue bondadoso
  alternatives_spanish:
  - fue gracioso
  - les mostró favor
  lexicon: HALOT
  rationale: En este contexto, חנן expresa una disposición benevolente e inmerecida de Dios. «Bondadoso» comunica esa gracia de modo natural en español, sin sonar tan técnico como «les mostró favor» ni tan ambiguo como «fue gracioso».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La fuente hebrea usa el Tetragrámaton directamente. En la línea terminológica del POB español, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por un título, manteniendo visible el nombre de pacto.
- source_word: וַיְרַחֲמֵם / רחם
  english_pob_choice: had compassion on them
  chosen_spanish: tuvo compasión de ellos
  alternatives_spanish:
  - tuvo misericordia de ellos
  - se apiadó de ellos
  lexicon: HALOT
  rationale: רחם señala una compasión profunda y afectiva. «Tuvo compasión de ellos» refleja bien esa fuerza en español moderno y mantiene el paralelo con la frase anterior sin endurecer el matiz.
- source_word: וַיִּפֶן אֲלֵיהֶם
  english_pob_choice: he turned toward them
  chosen_spanish: se volvió hacia ellos
  alternatives_spanish:
  - volvió su rostro hacia ellos
  - se inclinó hacia ellos
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de volver el rostro o la atención. «Se volvió hacia ellos» es una equivalencia natural que preserva la dirección relacional del gesto sin sobreinterpretarlo.
- source_word: לְמַעַן בְּרִיתוֹ
  english_pob_choice: because of his covenant
  chosen_spanish: por causa de su pacto
  alternatives_spanish:
  - por el bien de su pacto
  - a causa de su pacto
  lexicon: HALOT
  rationale: למען aquí introduce la base o motivo de la acción divina. «Por causa de su pacto» mantiene la causalidad y conserva «pacto» como término bíblico directo, en paralelo con el audit trail inglés.
- source_word: אֶת אַבְרָהָם יִצְחָק וְיַעֲקֹב
  english_pob_choice: with Abraham, Isaac, and Jacob
  chosen_spanish: con Abraham, Isaac y Jacob
  alternatives_spanish:
  - a Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Aunque la construcción hebrea es compacta, la relación es la del pacto hecho con los patriarcas. «Con» es la preposición natural y precisa en español para esta formulación.
- source_word: וְלֹא אָבָה הַשְׁחִיתָם
  english_pob_choice: He was not willing to destroy them
  chosen_spanish: No quiso destruirlos
  alternatives_spanish:
  - No estuvo dispuesto a destruirlos
  - No consintió en destruirlos
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición. «No quiso destruirlos» conserva esa voluntad negativa con economía y claridad en español, sin perder la carga volitiva.
- source_word: וְלֹא הִשְׁלִיכָם מֵעַל פָּנָיו
  english_pob_choice: he did not cast them from his presence
  chosen_spanish: no los arrojó de delante de su presencia
  alternatives_spanish:
  - no los echó de su presencia
  - no los desterró de delante de su rostro
  lexicon: HALOT
  rationale: 'La imagen hebrea es literal: expulsar de delante del rostro/presencia. «Arrojó» conserva la fuerza del verbo, y «de delante de su presencia» mantiene el lenguaje relacional y formal del texto.'
- source_word: עַד עָתָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - todavía ahora
  - hasta hoy
  lexicon: HALOT
  rationale: La frase marca continuidad hasta el punto narrativo presente. «Hasta ahora» es la manera más directa y natural de expresar ese alcance temporal en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en español. Esto evita ocultar el Tetragrámaton detrás de un título y coincide con la decisión auditada del POB de no sustituir el nombre divino por una mayúscula funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Motivación del trato misericordioso de Dios
  english_pob_reading: because of his covenant with Abraham, Isaac, and Jacob
  chosen_spanish_reading: por causa de su pacto con Abraham, Isaac y Jacob
  alternative_spanish_readings:
  - por el bien de su pacto con Abraham, Isaac y Jacob
  - a causa de su pacto con Abraham, Isaac y Jacob
  rationale: El versículo fundamenta la compasión y la reserva divina en la fidelidad pactal hacia los patriarcas. «Por causa de su pacto» preserva la relación causal sin añadir explicaciones doctrinales ajenas al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés revisado: mantiene Yahvé como nombre divino, conserva la base pactal de la acción divina y refleja sin atenuación la secuencia de compasión, giro hacia ellos, negativa a destruir y negativa a expulsar. No se detectaron cambios relevantes respecto de la última revisión aprobada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - «Pacto» se usa para בְּרִית en coherencia con el POB inglés.
  - «Tuvo compasión» y «se volvió hacia ellos» conservan el paralelismo de misericordia y atención divina.
  - «Hasta ahora» reproduce el cierre temporal narrativo sin añadir matices interpretativos.
