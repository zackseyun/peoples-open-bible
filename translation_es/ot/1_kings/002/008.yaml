translation:
  language: es
  text: 'Y he aquí, contigo está Simeí hijo de Gera, el benjaminita de Bahurim; y me maldijo con una maldición terrible el día que fui a Mahanaim. Él descendió a mi encuentro junto al Jordán, y yo le juré por Yahvé, diciendo: «No te haré morir a espada[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si te hago morir a espada», una fórmula de juramento elíptica que significa: «No te haré morir a espada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ahora
  - Mira
  lexicon: HALOT
  rationale: La forma deíctica introduce una atención solemne. «He aquí» conserva el tono formal de הִנֵּה mejor que un coloquial «mira», sin volver el español arcaico en exceso.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - a tu lado
  lexicon: HALOT
  rationale: El sufijo de 2ms se expresa naturalmente en español con «contigo». Mantiene la cercanía/presencia de Simeí en el ámbito de Salomón.
- source_word: שִׁמְעִי בֶן־גֵּרָא בֶן־הַיְמִינִי
  english_pob_choice: Shimei son of Gera, the Benjaminite
  chosen_spanish: Simeí hijo de Gera, el benjaminita
  alternatives_spanish:
  - Simeí hijo de Gera, hijo del benjaminita
  - Simeí hijo de Gera, de la tribu de Benjamín
  lexicon: HALOT
  rationale: Se transliteró el nombre propio como «Simeí» y se vertió el gentilicio como «benjaminita», que es claro y fiel al valor étnico/geográfico del hebreo.
- source_word: מִבַּחֻרִים
  english_pob_choice: from Bahurim
  chosen_spanish: de Bahurim
  alternatives_spanish:
  - procedente de Bahurim
  - originario de Bahurim
  lexicon: HALOT
  rationale: El hebreo marca procedencia; «de Bahurim» es la forma más natural y suficientemente literal en español.
- source_word: קִלְלַנִי קְלָלָה
  english_pob_choice: cursed me with a grievous curse
  chosen_spanish: me maldijo con una maldición terrible
  alternatives_spanish:
  - me maldijo con una maldición grave
  - me lanzó una maldición terrible
  lexicon: HALOT
  rationale: Se conserva la construcción cognada para reflejar el énfasis hebreo. «Maldijo» y «maldición» reproducen la fuerza verbal sin perder naturalidad.
- source_word: נִמְרֶצֶת
  english_pob_choice: grievous
  chosen_spanish: terrible
  alternatives_spanish:
  - grave
  - severa
  - violenta
  lexicon: HALOT
  rationale: El adjetivo expresa severidad/intensidad. «Terrible» comunica bien la carga negativa en español actual sin exagerar más allá del hebreo.
- source_word: בְּיוֹם לֶכְתִּי מַחֲנָיִם
  english_pob_choice: on the day I went to Mahanaim
  chosen_spanish: el día que yo iba a Mahanaim
  alternatives_spanish:
  - el día que fui a Mahanaim
  - cuando yo iba a Mahanaim
  lexicon: HALOT
  rationale: La construcción temporal se vierte de manera fluida. «Iba» mantiene el valor de movimiento/en curso presente en el contexto, sin hacerla demasiado rígida.
- source_word: יָרַד לִקְרָאתִי הַיַּרְדֵּן
  english_pob_choice: came down to meet me at the Jordan
  chosen_spanish: descendió a mi encuentro junto al Jordán
  alternatives_spanish:
  - bajó a mi encuentro junto al Jordán
  - descendió para encontrarme junto al Jordán
  lexicon: HALOT
  rationale: «Descendió» preserva ירד. «A mi encuentro» reproduce לִקְרָאתִי con naturalidad. «Junto al Jordán» evita añadir «río» y conserva la referencia geográfica.
- source_word: וָאֶשָּׁבַע ל֤וֹ בַיהוָה
  english_pob_choice: I swore to him by Yahweh
  chosen_spanish: yo le juré por Yahvé
  alternatives_spanish:
  - yo le juré por el nombre de Yahvé
  - yo hice juramento por Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé». «Le juré» comunica el acto de juramento de forma directa y digna; no se sustituye por «se lo prometí» para no debilitar la fórmula de juramento.'
- source_word: אִם אֲמִיתְךָ בֶּחָרֶב
  english_pob_choice: I will not put you to death with the sword
  chosen_spanish: No te haré morir a espada
  alternatives_spanish:
  - No te mataré a espada
  - Si te hago morir a espada
  lexicon: HALOT
  rationale: Se explicita la negación implícita del hebreo jurídico-juramentario. «Hacer morir» conserva el registro formal del original y «a espada» reproduce el instrumento sin añadir elementos.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre propio del pacto según la convención del proyecto en español, evitando la sustitución por un título enmascarador. La forma «Yahvé» conserva la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Omisión elíptica de la condición negativa en el juramento
  english_pob_reading: 'explicit negative oath: ''I will not put you to death with the sword'''
  chosen_spanish_reading: 'lectura negativa explícita: «No te haré morir a espada»'
  alternative_spanish_readings:
  - 'lectura literal: «Si te hago morir a espada»'
  - 'lectura semiliteral con nota: «Si te hago morir a espada»'
  rationale: El hebreo usa una fórmula de juramento elíptica que en español moderno se entendería mal si se deja como simple «si». La redacción explícita preserva la fuerza pragmática del juramento tal como lo entendió la POB inglesa.
  doctrine_reference: Uso pragmático del juramento en el texto hebreo; ver nota textual/lexical de la POB inglesa
translation_notes:
  revision_awareness: El audit trail inglés revisó הִנֵּה de «And look» a «And behold» por un registro más formal. La presente versión española refleja ese ajuste con «Y he aquí», manteniendo la solemnidad sin recurrir a una perífrasis más moderna. También integra la decisión ya establecida de explicitar la negación implícita en la fórmula de juramento.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto en español.
  - Se conserva la transliteración de nombres propios y el gentilicio «benjaminita» para el valor étnico de בֶּן הַיְמִינִי.
  - La nota [a] queda anclada en la cláusula del juramento, donde el hebreo presenta la elipsis.
  - El registro general busca ser digno y publicable, evitando tanto arcaísmos excesivos como paráfrasis libres.
