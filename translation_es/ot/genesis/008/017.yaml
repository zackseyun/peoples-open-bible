translation:
  language: es
  text: 'Saca contigo todo ser viviente que está contigo, de toda carne: aves, ganado y todo ser que se arrastra sobre la tierra; para que pululen[a] en la tierra, y sean fecundos y se multipliquen sobre la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abunden en la tierra»; el verbo hebreo expresa la idea de pulular o abundar profusamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַחַיָּה
  english_pob_choice: every living thing
  chosen_spanish: toda criatura viviente
  alternatives_spanish:
  - todo ser viviente
  - todo animal
  lexicon: HALOT
  rationale: חַיָּה puede referirse a una criatura viviente en general. ‘Criatura viviente’ conserva la amplitud de ‘every living thing’ sin restringirlo a animales salvajes ni hacer sonar el español demasiado técnico.
- source_word: אֲשֶׁר אִתְּךָ
  english_pob_choice: that is with you
  chosen_spanish: que está contigo
  alternatives_spanish:
  - que está con vosotros
  - que va contigo
  lexicon: HALOT
  rationale: La cláusula relativa es simple y modificadora. ‘Que está contigo’ reproduce de manera natural la relación de compañía indicada por el hebreo.
- source_word: מִכָּל בָּשָׂר
  english_pob_choice: from all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - de todo ser viviente
  - de toda criatura
  lexicon: HALOT
  rationale: בָּשָׂר conserva aquí el valor colectivo de seres vivos/animales. ‘De toda carne’ mantiene el idiomatismo bíblico y la amplitud del hebreo, tal como la POB inglesa preserva ‘from all flesh’.
- source_word: בָּעוֹף
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves voladoras
  lexicon: HALOT
  rationale: En este trinomio con ganado y reptiles, ‘aves’ es la opción española más natural y suficientemente precisa para עוֹף.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - bestias
  - animales domésticos
  lexicon: HALOT
  rationale: בְּהֵמָה aquí apunta a animales terrestres, especialmente los domésticos o de crianza. ‘Ganado’ es claro en español y evita el tono arcaico de ‘bestias’.
- source_word: וּבְכָל הָרֶמֶשׂ הָרֹמֵשׂ עַל הָאָרֶץ
  english_pob_choice: and every creeping thing that creeps on the earth
  chosen_spanish: y todo reptil que se arrastra sobre la tierra
  alternatives_spanish:
  - y todo ser que se arrastra sobre la tierra
  - y toda criatura que se arrastra sobre la tierra
  lexicon: HALOT
  rationale: רֶמֶשׂ y el participio רֹמֵשׂ forman un juego semántico de criaturas que se mueven pegadas al suelo. ‘Reptil que se arrastra’ comunica la imagen con claridad; aunque ‘reptil’ no cubre todo el campo zoológico moderno, en español bíblico resulta un equivalente útil para este conjunto de criaturas pequeñas y rastreras.
- source_word: הוֹצֵא אִתָּךְ
  english_pob_choice: Bring out with you
  chosen_spanish: Saca contigo
  alternatives_spanish:
  - Haz salir contigo
  - Lleva afuera contigo
  lexicon: HALOT
  rationale: 'El imperativo hifil es causativo: no solo ‘salir’, sino ‘hacer salir / sacar’. ‘Saca contigo’ es idiomático en español y conserva la fuerza imperativa.'
- source_word: וְשָׁרְצוּ
  english_pob_choice: so that they may swarm
  chosen_spanish: y que pululen
  alternatives_spanish:
  - y que se multipliquen en abundancia
  - y que se agiten
  lexicon: HALOT
  rationale: שׁרץ expresa abundancia de movimiento y proliferación; ‘pululen’ mantiene la imagen de abundancia viva. La POB inglesa señala esta tensión entre ‘swarm’ y ‘teem’; en español ‘pululen’ la conserva mejor que un verbo neutro.
- source_word: בָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - por la tierra
  lexicon: HALOT
  rationale: ‘En la tierra’ refleja el hebreo y su sentido global postdiluviano; es una formulación natural en español.
- source_word: וּפָרוּ
  english_pob_choice: be fruitful
  chosen_spanish: sean fecundos
  alternatives_spanish:
  - fructifiquen
  - den fruto
  lexicon: HALOT
  rationale: La fórmula de bendición creadora de Génesis se conserva con un equivalente natural en español. ‘Sean fecundos’ comunica el valor de פָרוּ sin perder el eco de Génesis 1.
- source_word: וְרָבוּ
  english_pob_choice: and multiply
  chosen_spanish: y se multipliquen
  alternatives_spanish:
  - y aumenten
  - y crezcan en número
  lexicon: HALOT
  rationale: רבה en esta construcción corresponde a aumento numérico. ‘Se multipliquen’ preserva el paralelismo con la fórmula bíblica tradicional y con la intención creadora del texto.
theological_decisions:
- issue: Eco de la bendición de la creación después del diluvio
  english_pob_reading: Retain the traditional phrasing 'be fruitful and multiply' and the proliferation verb 'swarm' to preserve the literary-theological connection to Genesis 1.
  chosen_spanish_reading: Conservar ‘sean fecundos y se multipliquen’ junto con ‘pululen’ para mantener el eco literario-teológico de Génesis 1.
  alternative_spanish_readings:
  - ‘aumenten mucho’
  - ‘crezcan’
  rationale: El texto no solo manda repoblar; reusa lenguaje de bendición creadora. La redacción española debe dejar audible ese vínculo sin suavizarlo en una paráfrasis general.
  doctrine_reference: Génesis 1:22, 1:28; principio de intertextualidad bíblica
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se preservó la amplitud de חַיָּה / בָּשָׂר, el juego רֶמֶשׂ / רֹמֵשׂ, y el eco de la bendición creadora con una formulación española natural y reverente. No se registran revisiones aplicadas en el paquete fuente; la propuesta mantiene esa línea.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca explícito en este versículo, sino por la convención del proyecto cuando corresponda el nombre divino; aquí no hace falta introducirlo.
  - ‘Carne’ se mantuvo por fidelidad idiomática al hebreo colectivo y por coherencia con la POB inglesa ‘from all flesh’.
  - Se prefirió ‘pululen’ frente a ‘teem’/‘swarm’ para conservar la vivacidad del hebreo, sin desdoblar innecesariamente el ritmo del versículo.
  - Se evitó ‘Cristo/Mesías’ porque no corresponde a este pasaje.
