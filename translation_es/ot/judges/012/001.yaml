base_translation:
  language: en
  yaml_path: translation/ot/judges/012/001.yaml
  text: Then the men of Ephraim were called together[a], and they crossed over to Zaphon and said to Jephthah[c][b], “Why did you cross over to fight against the Ammonites and not call us to go with you? We will burn your house down over you with fire.”
  footnotes:
  - marker: a
    text: Or 'northward' if צָפוֹנָה is taken as a directional adverb rather than the place name Zaphon.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew literally has ''man of Ephraim,'' but the surrounding verbs indicate a collective sense: the Ephraimites as a group.'
    reason: lexical_alternative
  - marker: c
    text: The threat likely means, 'We will burn your house with you in it.'
    reason: lexical_alternative
