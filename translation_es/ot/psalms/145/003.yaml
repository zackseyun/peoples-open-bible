translation:
  language: es
  text: Grande es Yahvé[a], y muy alabado, y su grandeza es inescrutable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y para su grandeza no hay búsqueda posible».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - muy grande
  - exaltado
  - mighty
  lexicon: HALOT
  rationale: El adjetivo predicativo inicial se expresa de manera directa y natural en español como «Grande», conservando la afirmación de magnitud y majestad sin añadir matices no explícitos en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto divino con la forma de uso editorial del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto sigue la decisión fuente del POB inglés de transliterar el Tetragrámaton.
- source_word: מְהֻלָּל מְאֹד
  english_pob_choice: greatly to be praised
  chosen_spanish: digno de ser grandemente alabado
  alternatives_spanish:
  - muy alabado
  - digno de alabanza
  - grandemente alabado
  lexicon: HALOT
  rationale: El participio pasivo de הלל mantiene la idea de que Yahvé merece alabanza. En español, «digno de ser grandemente alabado» reproduce el valor predicativo del hebreo y la intensidad de מְאֹד sin sonar mecánico.
- source_word: לִגְדֻלָּתוֹ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su grandeza misma
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo se traduce de forma natural como «su grandeza». «Majestad» sería posible, pero desplaza el campo léxico hacia un tono más interpretativo y menos directo.
- source_word: אֵין חֵקֶר
  english_pob_choice: is unsearchable
  chosen_spanish: es inescrutable
  alternatives_spanish:
  - no tiene sondeo
  - no se puede investigar
  - es imposible de sondear
  lexicon: HALOT
  rationale: La expresión hebrea afirma que no hay indagación posible sobre esa grandeza. «Inescrutable» comunica bien la idea de algo que no puede agotarse ni ser plenamente comprendido, sin perder el sentido de imposibilidad de búsqueda.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y el POB inglés lo translitera como Yahweh. En español se adopta «Yahvé», la forma correspondiente y ya establecida en el proyecto, para preservar el nombre personal de Dios y no reemplazarlo por una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: 'No se requieren cambios respecto del testimonio fuente: el hebreo presenta una afirmación en tres miembros con predicado inicial, participio pasivo intensificado y cláusula final de imposibilidad de búsqueda. La revisión inglesa más reciente no introdujo modificaciones, y el acuerdo de revisión fue alto, por lo que la versión española mantiene la misma lectura semántica básica con equivalente idiomático en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma editorial consistente para el Tetragrámaton.
  - «Grande» y «su grandeza» preservan la repetición léxica del hebreo sin forzar sinonimias innecesarias.
  - La cláusula final evita suavizar la negación absoluta de אֵין חֵקֶר; por eso se eligió «inescrutable» y se añadió una nota literal alternativa.
