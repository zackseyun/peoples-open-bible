revisions:
- from: Y yo también les di limpieza de dientes en todas sus ciudades[a], y falta de pan en todos sus lugares; pero no se volvieron a mí, declara Yahvé.
  to: Y yo también les di limpieza de dientes[a] en todas sus ciudades, y falta de pan en todos sus lugares; pero no volvieron a mí, declara Yahvé.
  rationale: Se conserva toda la sustancia del borrador, pero se corrige la incoherencia pronominal eliminando ‘se volvieron’, que forzaba una lectura en tercera persona reflexiva dentro de un discurso dirigido al pueblo. ‘No volvieron a mí’ mantiene mejor el valor de שׁוּב y fluye con más naturalidad. También se recoloca la nota al pie junto al modismo mismo, su anclaje más preciso.
