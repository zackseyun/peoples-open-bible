base_translation:
  language: en
  yaml_path: translation/ot/judges/005/026.yaml
  text: She reached out her hand for the tent peg[a], her right hand for the workmen’s hammer; then she struck Sisera, she shattered his head[c][b], she smashed and pierced his temple.
  footnotes:
  - marker: a
    text: Or 'for the hammer of laborers' / 'for a workmen’s mallet.' The Hebrew expression לְהַלְמוּת עֲמֵלִים is somewhat uncommon, and the exact nuance of the striking tool may be rendered in more than one way.
    reason: lexical_alternative
  - marker: b
    text: Or 'she crushed his head' instead of 'she shattered his head.' The Hebrew uses a sequence of forceful verbs to heighten the violence poetically.
    reason: lexical_alternative
  - marker: c
    text: Or 'she transfixed his temple' / 'she passed through his temple.' The final verb likely conveys piercing through.
    reason: lexical_alternative
