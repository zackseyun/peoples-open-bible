  to: Desde el día en que saqué a mi pueblo de la tierra de Egipto[a], no he escogido una ciudad de entre cualquiera de las tribus de Israel para edificar una casa[b] para que mi nombre estuviera allí, ni he escogido un hombre para que fuera gobernante[c] sobre mi pueblo Israel.
