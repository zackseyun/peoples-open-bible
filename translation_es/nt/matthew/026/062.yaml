translation:
  language: es
  text: 'Y el sumo sacerdote se puso de pie y le dijo: «¿No respondes nada? ¿Qué es lo que estos testifican contra ti?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: levantándose
  alternatives_spanish:
  - poniéndose de pie
  - se levantó
  lexicon: BDAG
  rationale: El participio aoristo describe la acción física previa a la intervención del sumo sacerdote. En español, el gerundio pronominal expresa con naturalidad la acción concomitante sin perder el valor narrativo.
- source_word: ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: BDAG
  rationale: Es el equivalente habitual y preciso del oficio judío singular ἀρχιερεύς en este contexto.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo a él
  lexicon: BDAG
  rationale: El pronombre dativo se expresa de forma natural en español con el clítico indirecto «le», conservando el destinatario explícito sin redundancia.
- source_word: Οὐδὲν ἀποκρίνῃ;
  english_pob_choice: Do you give no answer?
  chosen_spanish: ¿No respondes nada?
  alternatives_spanish:
  - ¿No das respuesta?
  - ¿No contestas nada?
  lexicon: BDAG
  rationale: La fuerza interrogativa negativa se mantiene de manera idiomática. «Respondes» preserva el sentido de ἀποκρίνομαι sin sonar forzado, y «nada» refleja la negación absoluta.
- source_word: τί
  english_pob_choice: What is it that
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué es lo que
  - ¿Cuál es
  lexicon: BDAG
  rationale: Aquí τί introduce directamente la pregunta sobre el contenido del testimonio. En español, «¿Qué testifican...?» es más natural y no añade una estructura explicativa innecesaria.
- source_word: οὗτοί
  english_pob_choice: these men
  chosen_spanish: estos
  alternatives_spanish:
  - estos hombres
  - éstos
  lexicon: BDAG
  rationale: El demostrativo masculino plural basta en español para referirse a los acusadores presentes; añadir «hombres» es posible, pero no necesario para la claridad.
- source_word: καταμαρτυροῦσιν
  english_pob_choice: are testifying against
  chosen_spanish: testifican contra
  alternatives_spanish:
  - dan testimonio contra
  - acusan
  lexicon: BDAG
  rationale: Se conserva el matiz forense de καταμαρτυρέω con la preposición «contra», evitando el término más interpretativo «acusan».
- source_word: σου
  english_pob_choice: against you
  chosen_spanish: ti
  alternatives_spanish:
  - contra ti
  - de ti
  lexicon: BDAG
  rationale: El genitivo con καταμαρτυροῦσιν se entiende en español como el objeto de testimonio adverso; «contra ti» puede sonar redundante junto con «testifican contra», por eso se integra en la sintaxis.
theological_decisions:
- issue: Naturaleza del interrogativo final
  english_pob_reading: What is it that these men are testifying against you?
  chosen_spanish_reading: ¿Qué testifican estos contra ti?
  alternative_spanish_readings:
  - ¿Qué es lo que testifican estos contra ti?
  - ¿Qué testimonio presentan estos contra ti?
  rationale: 'No hay carga doctrinal especial, pero sí una decisión retórica: el griego formula una pregunta directa y breve. La versión española evita un calco de estilo que volvería la frase menos natural, sin perder el sentido acusatorio forense.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El contexto auditado muestra oscilación en inglés entre una paráfrasis más explicativa y una forma más directa para la segunda pregunta. En español se adoptó la forma directa y breve, fiel al interrogativo τί y al matiz legal de καταμαρτυροῦσιν, sin necesidad de duplicar esa alternativa en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «sumo sacerdote» como término técnico estable.
  - Se prefirió «testifican contra» para conservar el valor forense de καταμαρτυρέω.
  - El demostrativo plural masculino se dejó en «estos» para evitar una adición no exigida por el griego.
  - La nota [a] se ancla en «levantándose» y no introduce una segunda nota sin marca en el texto.
