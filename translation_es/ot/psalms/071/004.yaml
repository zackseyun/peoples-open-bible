translation:
  language: es
  text: Dios mío, rescátame[a] de la mano del impío[b], del poder[c] del injusto y del violento[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «líbrame». El verbo hebreo puede expresar rescate o liberación.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la mano de»; la expresión señala poder, control o dominio.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «de la palma de»; aquí la imagen se refiere al agarre o dominio de alguien.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «opresor». El término hebreo también puede comunicar la idea de alguien violento u opresivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Oh Dios mío
  lexicon: HALOT
  rationale: Es un vocativo con sufijo de 1.ª persona; en español, «Dios mío» es la forma natural y reverente de dirección directa. Se evita añadir «oh» porque no es necesario para la lectura actual y no aporta precisión semántica.
- source_word: פַּלְּטֵנִי
  english_pob_choice: rescue me
  chosen_spanish: rescátame
  alternatives_spanish:
  - líbrame
  - sálvame
  lexicon: HALOT
  rationale: El verbo expresa petición de libramiento de peligro. «Rescátame» conserva la fuerza de intervención urgente y encaja con el contexto inmediato mejor que una solución más genérica.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de entre la mano de
  - del poder de
  lexicon: HALOT
  rationale: La imagen hebrea de יד como poder/control se conserva con «mano», que es transparente en español. «De la mano de» mantiene el paralelismo con la segunda línea y no borra la metáfora.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo adjetival denota a una persona impía o malvada. «Impío» es breve, bíblico y natural en español; además evita forzar «hombre» donde el hebreo puede funcionar genéricamente.
- source_word: מִכַּף
  english_pob_choice: from the grasp of
  chosen_spanish: de la garra de
  alternatives_spanish:
  - de la palma de
  - del agarre de
  lexicon: HALOT
  rationale: Aunque כף literalmente es «palma», aquí el paralelismo de liberación sugiere una sujeción opresiva. «Garra» comunica con fuerza el sentido de control y captura, como el inglés POB «grasp of», sin volver mecánica la imagen.
- source_word: מְעַוֵּל
  english_pob_choice: the unjust
  chosen_spanish: el injusto
  alternatives_spanish:
  - el que hace injusticia
  - el perverso
  lexicon: HALOT
  rationale: El participio describe a quien obra injustamente. «El injusto» mantiene la fuerza adjetival y el matiz moral-jurídico, con una concordancia natural en español.
- source_word: וְחוֹמֵץ
  english_pob_choice: violent man
  chosen_spanish: violento
  alternatives_spanish:
  - opresor
  - hombre violento
  - cruel
  lexicon: HALOT
  rationale: La revisión inglesa afinó la correspondencia hacia «violent». En español, «violento» comunica bien la idea de agresión/opresión. Se omite «hombre» porque el hebreo puede funcionar como participio sustantivado sin exigirlo, y el español mantiene la referencia personal con el contexto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «ruthless» por «violent» para acercarse mejor a חוֹמֵץ. En español se refleja esa corrección con «violento», manteniendo el contraste con «el injusto» y preservando la imagen paralela de sujeción en «mano/garra».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהַי por vocativo directo y coherencia con el estándar POB en español.
  - Se conserva la metáfora corporal «mano» y se intensifica la segunda con «garra» para hacer visible el matiz de captura sin perder la base hebrea.
  - «Impío» y «el injusto» distinguen dos calificativos emparentados pero no idénticos, respetando el paralelismo del hebreo.
  - No se añadió «hombre» en la segunda cola porque el español puede sostener la sustantivación adjetival con naturalidad y sin sobreespecificar el género.
