revisions:
- from: Entonces los jefes de las casas paternas[a], los jefes de las tribus de Israel, los jefes de los millares y de los cientos[b], y los encargados del trabajo del rey[c], se ofrecieron voluntariamente.
  to: Entonces los jefes de las casas paternas[a], los jefes de las tribus de Israel, los jefes de los millares y de los cientos[b], y los encargados de la obra del rey, dieron voluntariamente[c].
  rationale: Se corrigió el verbo principal para reflejar el sentido contextual de contribución voluntaria, en línea con la evidencia hebrea y la decisión léxica del POB. También se ajustó «trabajo del rey» a «obra del rey» por mejor naturalidad en español bíblico moderno, y se reubicó la nota léxica al verbo, donde realmente existe la alternativa significativa.
