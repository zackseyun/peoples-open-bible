    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sobre el altar» en singular; el sentido distributivo («sobre cada altar») se entiende por el contexto de los siete altares.
    reason: source_note
  revision_rationale: Se revisa la expresión del encuentro divino para evitar un español demasiado coloquial o casual y reflejar mejor la iniciativa de Dios en וַיִּקָּר. Se mantiene «el altar» con nota porque el hebreo está en singular y la expansión distributiva pertenece mejor a la nota que al texto principal. Se añade «él» para dejar claro que quien habla es Balaam, conforme al discurso en primera persona.
