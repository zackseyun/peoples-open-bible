review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mantiene el marco judicial de רִיב/שפט, conserva la repetición de «juzgar», distingue «juicios / leyes / estatutos», y refleja la observancia de los tiempos señalados y de los sábados. Sin embargo, hay dos ajustes importantes de fidelidad estilística y naturalidad: «se pondrán de pie» suena algo dinámico donde el hebreo enfatiza más bien la postura/posición judicial de «estar de pie», y «en todos mis tiempos señalados» es menos natural y menos preciso que «en/para todas mis fiestas señaladas» o mejor «en todos mis tiempos señalados»; pero en español bíblico la construcción más natural aquí con guardar leyes y estatutos es «en todas mis fiestas señaladas» solo si se estrecha el sentido, cosa que no conviene. Además, «mis sábados» resulta comprensible pero menos idiomático y puede sonar a días de la semana más que al concepto cultual; «mis días de descanso» aclararía demasiado. La mejor reparación mínima
    es mantener «mis sábados» pero mejorar la frase temporal y la imagen judicial.'
  spanish_quality_summary: El español es mayormente claro y digno, pero tiene cierta rigidez calca en «se pondrán de pie» y una frase temporal poco idiomática en «en todos mis tiempos señalados». También la nota b usa «tiempos designados», que es aceptable, pero «tiempos establecidos» o «fiestas señaladas» suena más natural. En conjunto, el texto requiere una reparación menor para sonar más natural sin perder transparencia.
  glossary_alignment: No hay conflicto con las pautas terminológicas principales del proyecto. No aparece Yahvé ni Mesías. La distinción legal documentada en inglés se preserva correctamente con «juicios», «leyes» y «estatutos». «Santificarán mis sábados» es terminológicamente defendible, aunque algo menos idiomático que «mantendrán santos mis sábados»; aun así, «santificarán» conserva bien יקדשו.
  issues:
  - severity: medium
    issue: «se pondrán de pie» suena menos natural y algo demasiado procesual para יַעַמְדוּ
    rationale: El hebreo preserva la imagen judicial de estar/de pie en función de juzgar. En español, «estarán de pie para juzgar» o «comparecerán para juzgar» refleja mejor la postura formal sin sugerir solo el acto de levantarse.
  - severity: medium
    issue: «en todos mis tiempos señalados» es poco idiomático en este contexto
    rationale: Aunque semánticamente posible para בְּכָל מוֹעֲדַי, la frase suena forzada en español. «En todos mis tiempos señalados» puede mantenerse, pero conviene una formulación más fluida; si se conserva, la nota debe sostener la amplitud semántica. La revisión mínima opta por un ajuste global de fluidez en la cláusula.
  revised_spanish_text: En un pleito[a], ellos estarán de pie para juzgar; lo juzgarán conforme a mis juicios. Guardarán mis leyes y mis estatutos en todos mis tiempos señalados[b], y santificarán mis sábados.
  revised_footnotes:
