translation:
  language: es
  text: En la asamblea del Altísimo abrirá su boca[a], y delante de su poder[b] se jactará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la Sabiduría personificada, según el contexto circundante.
    reason: cross_reference
  - marker: b
    text: O «ante su fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - iglesia
  lexicon: LSJ
  rationale: ἐκκλησία en Sirácida designa la comunidad reunida; «asamblea» es el equivalente neutral y natural en español. «Iglesia» introduciría una carga eclesial posterior que no está en el griego del pasaje.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: LSJ
  rationale: Es la forma reverente y establecida para el título divino Ὕψιστος en contexto judío-griego, y funciona con naturalidad en español.
- source_word: στόμα αὐτῆς ἀνοίξει
  english_pob_choice: she will open her mouth
  chosen_spanish: abrirá su boca
  alternatives_spanish:
  - abrirá su boca para hablar
  - desencajará su boca
  lexicon: LSJ
  rationale: La expresión griega es idiomática para hablar. En español, «abrirá su boca» conserva la imagen y la personificación sin sonar forzado.
- source_word: ἔναντι
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: LSJ
  rationale: «Delante de» expresa con claridad la relación de presencia/comparecencia que tiene ἔναντι, con un registro natural en español bíblico contemporáneo.
- source_word: δυνάμεως αὐτοῦ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su potestad
  lexicon: LSJ
  rationale: Aquí δύναμις puede significar «poder» de manera directa y sin añadir una imagen colectiva que no aparece explícitamente en el griego. «Su poder» respeta la revisión final del inglés POB y la literalidad básica del término.
- source_word: καυχήσεται
  english_pob_choice: will boast
  chosen_spanish: se jactará
  alternatives_spanish:
  - se gloriará
  - alardeará
  lexicon: LSJ
  rationale: El verbo expresa jactancia/boast. «Se jactará» es preciso y contemporáneo; «se gloriará» es posible pero más tradicional y menos transparente para el lector moderno.
theological_decisions:
- issue: Referente femenino de la frase y personificación de Sabiduría
  english_pob_reading: Render the subject as 'she' without supplying 'Wisdom' in the main text.
  chosen_spanish_reading: Conservar el femenino implícito en el verbo y no añadir «Sabiduría» al texto principal.
  alternative_spanish_readings:
  - Abrirá su boca la Sabiduría...
  - La Sabiduría abrirá su boca...
  rationale: El contexto literario identifica a la Sabiduría personificada, pero el versículo no repite el sustantivo. El español puede conservar esa tensión con el verbo femenino implícito sin resolverla artificialmente en el cuerpo del texto.
  doctrine_reference: Preservar la personificación y la referencia contextual sin sobreespecificar el sujeto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparezcan exactamente en el texto español. La redacción final evita notas sin anclaje y mantiene la correspondencia con el griego y con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se usa «asamblea» para ἐκκλησίᾳ, no «iglesia», por fidelidad al contexto judío-griego.
  - Se mantiene «Altísimo» como título divino reverente y natural.
  - «Su poder» refleja la decisión inglesa final para δύναμις y evita introducir una lectura colectiva no explícita.
  - «Se jactará» conserva el matiz de καυχήσεται sin arcaísmo excesivo.
  - No se explicita «Sabiduría» en el texto principal para preservar la personificación implícita.
