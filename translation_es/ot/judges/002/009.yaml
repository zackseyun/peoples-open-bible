review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro del POB inglés: sepultura de Josué, ubicación dentro de su heredad, topónimo Timnat-jéres, región montañosa de Efraín y referencia relativa al monte Gaas. También preserva correctamente la variante toponímica en nota. La única desviación relevante es de estilo/legibilidad en la nota, donde ''avisos paralelos de sepultura'' suena poco natural en español; conviene expresarlo como ''relatos paralelos de sepultura''.'
  spanish_quality_summary: El texto principal es claro, fiel y de registro digno. 'Y lo sepultaron', 'región montañosa de Efraín' y 'al norte del monte Gaas' son lecturas naturales y exactas. 'Dentro del territorio de su heredad' es aceptable, aunque algo pesado; no requiere cambio forzoso. La mejora necesaria está en la nota al pie para lograr español idiomático y eclesialmente legible.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La transliteración 'Timnat-jéres' y 'Gaas' es coherente con la decisión documentada de preservar el topónimo y su variante. 'Heredad' refleja bien נַחֲלָה.
  issues:
  - severity: low
    issue: La nota usa 'avisos paralelos de sepultura', expresión poco natural en español.
    rationale: El inglés 'parallel burial notices' no se traslada idiomáticamente como 'avisos'. En español bíblico y académico, 'relatos paralelos' o 'noticias paralelas' funciona mejor; 'relatos paralelos de sepultura' conserva el sentido sin calco extraño.
  revised_spanish_text: Y lo sepultaron dentro del territorio de su heredad[a], en Timnat-jéres, en la región montañosa de Efraín, al norte del monte Gaas.
  revised_footnotes:
  - marker: a
    text: Josué 24:30 tiene «Timnat-sera» en lugar de «Timnat-jéres». Se conserva aquí como una variante del nombre de lugar en los relatos paralelos de sepultura.
    reason: textual_variant
  revision_rationale: Se mantiene intacto el texto principal por su fidelidad al hebreo y buena legibilidad. Solo se corrige la redacción de la nota para evitar un calco poco natural del inglés y expresar con mejor español la relación entre Jueces 2:9 y Josué 24:30.
