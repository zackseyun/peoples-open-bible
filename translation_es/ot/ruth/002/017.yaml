translation:
  language: es
  text: Así espigó en el campo hasta la tarde, y desgranó lo que había espigado, y resultó ser como un efa[a] de cebada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un efa era una medida seca antigua, de aproximadamente 20–22 litros.
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּלַקֵּט
  english_pob_choice: So she gleaned
  chosen_spanish: Así espigó
  alternatives_spanish:
  - Y espigó
  - Recogió espigas
  lexicon: HALOT
  rationale: El verbo לקט, en Rut, designa recoger espigas o grano sobrante después de la siega. «Espigó» conserva ese sentido agrícola y legal mejor que un genérico «recogió». «Así» reproduce de manera natural el waw narrativo del hebreo.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo cultivado
  - en el sembrado
  lexicon: HALOT
  rationale: שָׂדֶה es el término ordinario para un campo. «Campo» es la forma más natural en español y mantiene el referente agrícola del pasaje.
- source_word: עַד הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: La expresión señala la duración de su trabajo. «Hasta la tarde» es idiomático en español y refleja bien el límite temporal del hebreo.
- source_word: וַתַּחְבֹּט
  english_pob_choice: beat out
  chosen_spanish: desgranó
  alternatives_spanish:
  - golpeó
  - trilló
  lexicon: HALOT
  rationale: חבט aquí se refiere a golpear las espigas para separar el grano. «Desgranó» comunica el resultado del acto de manera clara y natural en español, sin importar un tecnicismo agrícola menos transparente.
- source_word: אֵת אֲשֶׁר לִקֵּטָה
  english_pob_choice: what she had gleaned
  chosen_spanish: lo que había espigado
  alternatives_spanish:
  - lo que había recogido
  - aquello que había juntado
  lexicon: HALOT
  rationale: La construcción relativa apunta a lo reunido por Rut. Repetir «espigado» preserva la correspondencia léxica con לקט y mantiene la coherencia interna del verso.
- source_word: וַיְהִי
  english_pob_choice: and it was
  chosen_spanish: y fue
  alternatives_spanish:
  - y resultó
  - y llegó a ser
  lexicon: HALOT
  rationale: La cláusula introduce el total obtenido. «Y fue» conserva la sencillez resultativa del hebreo sin añadir interpretación.
- source_word: כְּאֵיפָה
  english_pob_choice: about an ephah
  chosen_spanish: como un efa
  alternatives_spanish:
  - más o menos un efa
  - cerca de un efa
  lexicon: HALOT
  rationale: אֵיפָה es una antigua medida seca; el prefijo כ expresa aproximación. Se conserva «efa» como transliteración histórica, y la aproximación se refleja con «como».
- source_word: שְׂעֹרִים
  english_pob_choice: of barley
  chosen_spanish: de cebada
  alternatives_spanish:
  - de grano de cebada
  - de cebada en grano
  lexicon: HALOT
  rationale: שְׂעֹרִים identifica el grano de cebada. «De cebada» es conciso y natural en español, y mantiene el sentido del producto recolectado.
translation_notes:
  revision_awareness: La revisión más reciente del texto de partida no introdujo cambios; el presente borrador sigue el consenso de alta concordancia con el hebreo y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene la correspondencia léxica de לקט con «espigar/espigado» en todo el versículo.
  - Se conserva el nombre histórico de la medida como «efa» y se explica en nota, evitando sustituirlo por una equivalencia moderna en el cuerpo del texto.
  - La frase temporal «hasta la tarde» preserva el valor de duración sin sobreinterpretar el matiz exacto de anochecer/dusk.
