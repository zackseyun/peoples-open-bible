review_pass:
  verdict: revise
  source_alignment_summary: El borrador preserva bien el contraste inicial, el destinatario del clamor y el uso de «Yahvé» para יְהוָה. Sin embargo, «te sale al encuentro» para תְקַדְּמֶךָּ desplaza el sentido hacia un encuentro activo con matiz interpersonal que en español suena más fuerte y menos natural que la imagen básica de la oración que llega o se presenta ante Dios. Además, la nota al pie quedó anclada en «yo» cuando en realidad corresponde al verbo final.
  spanish_quality_summary: 'El texto es legible y digno, pero «te sale al encuentro» suena algo forzado en registro bíblico y puede sugerir una confrontación o encuentro mutuo no exigido por el hebreo. También conviene reflejar mejor el vocativo «O Yahweh» con puntuación española natural: «Pero yo, Yahvé, ...».'
  glossary_alignment: Se alinea con la terminología del proyecto en «Yahvé». No hay conflictos con otros términos doctrinales. La principal corrección es léxica y de anclaje de nota, no de glosario.
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada en «yo» en vez de en la expresión derivada de תְקַדְּמֶךָּ.
    rationale: La nota explica una alternativa léxica para el verbo final («comes/goes before you»), no para וַאֲנִי. Debe colocarse junto a la frase correspondiente en español.
  - severity: medium
    issue: «te sale al encuentro» no es la mejor equivalencia de תְקַדְּמֶךָּ en este contexto.
    rationale: Aunque קדם puede incluir la idea de encuentro, en esta construcción con «mi oración» como sujeto la formulación más fiel y natural en español es «viene delante de ti» o «llega ante ti». «Te sale al encuentro» introduce un giro demasiado dinámico y algo extraño para una oración.
  - severity: low
    issue: Falta una coma vocativa alrededor de «Yahvé».
    rationale: En español, «Pero yo, Yahvé, a ti...» marca mejor el vocativo y mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: Pero yo, Yahvé, a ti clamo; por la mañana mi oración viene delante de ti[a].
  revised_footnotes:
  - marker: a
    text: O «mi oración va delante de ti». El verbo hebreo puede llevar el sentido de venir delante, encontrarse con alguien o preceder.
    reason: lexical_alternative
