    text: Or 'its course' for 'its circuit.' The Hebrew emphasizes the sun's traversing round across the heavens.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his heat'; English uses 'its' because the referent is the sun.
    reason: lexical_alternative
