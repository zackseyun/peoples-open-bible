  text: וְ/קִדַּשְׁתִּ֥י עָלֶ֛י/ךָ מַשְׁחִתִ֖ים אִ֣ישׁ וְ/כֵלָ֑י/ו וְ/כָֽרְתוּ֙ מִבְחַ֣ר אֲרָזֶ֔י/ךָ וְ/הִפִּ֖ילוּ עַל הָ/אֵֽשׁ־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/007.yaml
  text: And I will set apart destroyers against you[a], each with his weapons[c][b]; they will cut down the choicest of your cedars and cast them into the fire.
  footnotes:
  - marker: a
    text: Or 'I will consecrate destroyers against you.' The Hebrew uses the verb often translated 'consecrate' or 'make holy,' here in the sense of setting agents apart for judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'each man with his tools/implements.' The Hebrew word can refer broadly to articles or equipment; in this context it likely means weapons or instruments of destruction.
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the fire.' English 'into the fire' expresses the intended sense more naturally.
    reason: lexical_alternative
