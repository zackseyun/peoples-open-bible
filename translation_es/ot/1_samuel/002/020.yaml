translation:
  language: es
  text: 'Y Elí bendecía a Elcaná y a su esposa, y decía: “Que Yahvé te conceda descendencia de esta mujer, en lugar de la petición[a] que se pidió a Yahvé[b]”. Entonces ellos se iban a su lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en lugar de la petición/préstamo que pidió de Yahvé''. La redacción evoca repetidamente la raíz שאל (''pedir'') en la narración del nacimiento de Samuel y puede aludir específicamente a Samuel como el hijo obtenido por petición y luego entregado a Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo en 'pidió' está en masculino singular, pero el contexto apunta a Ana como quien pidió el hijo (cf. 1 Samuel 1:20, 27–28).
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֵרַךְ
  english_pob_choice: would bless
  chosen_spanish: bendeciría
  alternatives_spanish:
  - bendijo
  lexicon: HALOT
  rationale: El hebreo narrativo expresa una acción repetida o habitual en contexto. En español, el condicional perifrástico 'bendeciría' comunica mejor ese valor iterativo que un simple pretérito, que podría sonar a hecho único.
- source_word: אֶת אֶלְקָנָה וְאֶת אִשְׁתּוֹ
  english_pob_choice: Elkanah and his wife
  chosen_spanish: Elcaná y a su esposa
  alternatives_spanish:
  - Elcaná y a su mujer
  - Elcaná y a Ana
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su esposa' y no nombra a Ana. 'Su esposa' conserva la forma del texto y mantiene clara la referencia por el contexto narrativo.
- source_word: יָשֵׂם יְהוָה לְךָ
  english_pob_choice: May Yahweh give you
  chosen_spanish: Que Yahvé te conceda
  alternatives_spanish:
  - Que Yahvé te dé
  - Que Yahvé te ponga
  lexicon: HALOT
  rationale: שׂים tiene el sentido básico de 'poner/establecer/appoint', pero en una bendición por descendencia el español natural es 'conceder' o 'dar'. 'Conceda' conserva el tono optativo de la bendición sin perder la fuerza de provisión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'', en vez de sustituirlo por un título.'
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  - simiente
  lexicon: HALOT
  rationale: En este contexto de bendición familiar, זֶרַע funciona como colectivo para descendientes. 'Descendencia' es natural en español y preserva el valor colectivo mejor que un singular concreto.
- source_word: מִן הָאִשָּׁה הַזֹּאת
  english_pob_choice: by this woman
  chosen_spanish: por esta mujer
  alternatives_spanish:
  - de esta mujer
  - mediante esta mujer
  lexicon: HALOT
  rationale: El valor de מִן aquí apunta al medio o procedencia del don de descendencia. 'Por esta mujer' es idiomático en español y mantiene la idea de que el hijo vendrá por medio de ella.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - a cambio de
  lexicon: HALOT
  rationale: La preposición expresa sustitución o intercambio. 'En lugar de' reproduce ese valor de manera clara y sobria en español.
- source_word: הַשְּׁאֵלָה
  english_pob_choice: the petition
  chosen_spanish: la petición
  alternatives_spanish:
  - la solicitud
  - el pedido
  - la cosa pedida
  lexicon: HALOT
  rationale: El sustantivo deriva del verbo 'pedir/solicitar' y conserva el juego de palabras de la narración de Samuel. 'Petición' refleja el sustantivo abstracto sin forzar una concreción que el hebreo no nombra aquí.
- source_word: אֲשֶׁר שָׁאַל לַיהוָה
  english_pob_choice: that was asked for Yahweh / she asked from the LORD (contextually)
  chosen_spanish: que fue pedida a Yahvé
  alternatives_spanish:
  - que ella pidió a Yahvé
  - que se pidió a Yahvé
  - que él pidió a Yahvé
  lexicon: HALOT
  rationale: El verbo tiene forma masculina singular, pero el contexto narrativo apunta a Ana como la que pidió el hijo. 'Fue pedida' evita introducir un sujeto no explícito en el español principal y conserva la tensión textual documentada por la POB inglesa.
- source_word: וְהָלְכוּ לִמְקֹמוֹ
  english_pob_choice: Then they would go to his place
  chosen_spanish: Entonces se irían a su lugar
  alternatives_spanish:
  - Entonces fueron a su lugar
  - Y se iban a su lugar
  - Entonces regresarían a su lugar
  lexicon: HALOT
  rationale: El plural indica que ambos se marchaban, y el sufijo singular de 'su lugar' se mantiene como en el hebreo. El condicional 'se irían' preserva el matiz habitual/iterativo del pasaje.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino según la norma del proyecto, sin sustituirlo por un título eclesiástico. No se introduce una afirmación doctrinal adicional; solo se traslada el mismo criterio al español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor del relativo con verbo masculino singular en אֲשֶׁר שָׁאַל לַיהוָה
  english_pob_reading: understood as Hannah ('she asked from the LORD')
  chosen_spanish_reading: que fue pedida a Yahvé
  alternative_spanish_readings:
  - que ella pidió a Yahvé
  - que él pidió a Yahvé
  - que fue pedida del/la Yahvé
  rationale: La versión española mantiene la ambigüedad textual sin resolverla explícitamente en la línea principal, porque el sustantivo 'petición' ya conserva el juego verbal y evita cerrar el referente más allá de lo que exige el hebreo. La nota puede documentar que el contexto apunta a Ana.
  doctrine_reference: 'DOCTRINE.md: Contextual-grammatical decisions in narrative clauses'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que desplazó el foco desde un objeto personal ('the one she asked') hacia el sustantivo abstracto 'petition'. En español se preservó ese ajuste con 'la petición' y se evitó convertirlo en 'el niño', manteniendo la tensión léxica entre petición, solicitud y el hijo nacido por esa petición.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה.
  - Se conserva 'Elcaná' con acentuación española habitual.
  - '''descendencia'' se usa como colectivo natural para זֶרַע en contexto de bendición familiar.'
  - La cláusula final conserva el sufijo posesivo singular de 'su lugar' como en el hebreo.
  - La principal línea española evita resolver en exceso la referencia de 'la petición' para respetar el juego de palabras del texto.
