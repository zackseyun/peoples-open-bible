base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/024.yaml
  text: But when a righteous man turns away from his righteousness and does injustice[a], doing all the abominations that the wicked man does, shall he live? None of the righteous deeds that he has done will be remembered. In the treachery by which he has acted treacherously[c][b], and in the sin that he has committed—in them he shall die.
  footnotes:
  - marker: a
    text: Or 'all the detestable things.'
    reason: lexical_alternative
  - marker: b
    text: '''Acted treacherously'' may also be rendered ''been unfaithful'' or ''committed trespass''; the Hebrew emphasizes breach of faith through a cognate noun-verb pair.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in them he shall die,' referring to the treachery and sin just mentioned.
    reason: lexical_alternative
