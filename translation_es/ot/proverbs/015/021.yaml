translation:
  language: es
  text: La necedad es gozo para el que carece de entendimiento[a], pero el hombre entendido endereza su andar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «falto de corazón», un modismo que significa falta de juicio o entendimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  english_pob_choice: Folly
  chosen_spanish: necedad
  alternatives_spanish:
  - foolishness
  - insensatez
  lexicon: HALOT
  rationale: El sustantivo abstracto hebreo designa la cualidad de ser necio; en español, «necedad» comunica con naturalidad esa cualidad y conserva el contraste sapiencial del proverbio.
- source_word: שִׂמְחָה
  english_pob_choice: is joy
  chosen_spanish: es gozo
  alternatives_spanish:
  - es alegría
  - produce gozo
  lexicon: HALOT
  rationale: Se mantiene la estructura nominal breve del hebreo. «Gozo» es un equivalente digno y bíblicamente reconocible, sin ampliar la frase a una paráfrasis verbal.
- source_word: לַחֲסַר לֵב
  english_pob_choice: to one lacking sense
  chosen_spanish: para el que carece de entendimiento
  alternatives_spanish:
  - para el que carece de corazón
  - para el falto de entendimiento
  - para el insensato
  lexicon: HALOT
  rationale: El hebreo dice literalmente «falto de corazón», pero en este contexto sapiencial la expresión idiomática apunta a falta de juicio o entendimiento. En español, «carece de entendimiento» expresa ese sentido sin oscurecer el proverbio con un calco duro.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - la persona
  lexicon: HALOT
  rationale: Se conserva el singular representativo masculino del hebreo. «El hombre» funciona en español proverbial como forma genérica y mantiene la correspondencia con el texto fuente.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - perspicacia
  lexicon: HALOT
  rationale: «Entendimiento» es el término sapiencial más natural en español para este campo semántico y corresponde bien al contraste con la necedad.
- source_word: יְיַשֶׁר לָכֶת
  english_pob_choice: makes his path straight
  chosen_spanish: endereza su camino
  alternatives_spanish:
  - hace recto su camino
  - dirige rectamente su andar
  - endereza su senda
  lexicon: HALOT
  rationale: El piel causativo de ישר expresa hacer recto/enderezar. «Endereza su camino» preserva la metáfora del andar y su fuerza causativa sin recurrir a una expresión menos natural.
theological_decisions:
- issue: Lenguaje representativo masculino en el proverbio
  english_pob_reading: a man lacking sense ... a man of understanding
  chosen_spanish_reading: el hombre que carece de entendimiento ... el hombre de entendimiento
  alternative_spanish_readings:
  - quien carece de entendimiento ... quien tiene entendimiento
  - la persona que carece de entendimiento ... la persona de entendimiento
  rationale: El hebreo usa singular masculino como tipo representativo en literatura sapiencial. En español, «el hombre» conserva esa forma proverbial sin desfigurar el paralelismo ni borrar la huella gramatical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomático «lacking heart»
  english_pob_reading: lacking sense
  chosen_spanish_reading: carece de entendimiento
  alternative_spanish_readings:
  - carece de corazón
  - no tiene juicio
  - carece de sensatez
  rationale: La frase hebrea literalmente dice «falto de corazón», pero el sentido documentado por el POB inglés es carencia de juicio. «Entendimiento» es una opción bíblica y clara en español, y evita una posible lectura emocional de «corazón».
  doctrine_reference: HALOT; sabiduría proverbial hebrea
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del POB inglés, que pasó de una formulación más literal («a man lacking sense») a una más natural («one lacking sense») y de «his way» a «his path». En español se conservó la tersura proverbial con un equivalente idiomático: «el que carece de entendimiento» / «endereza su camino».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo «entendimiento» como término sapiencial consistente con el contraste del proverbio.
  - Se evitó «siervo» o vocabulario eclesiástico no pertinente al hebreo del proverbio.
  - La nota al pie marca la tensión entre el modismo literal «corazón» y su sentido idiomático documentado.
