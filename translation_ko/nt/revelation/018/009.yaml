source:
  edition: SBLGNT
  text: Καὶ κλαύσουσιν καὶ κόψονται ἐπ’ αὐτὴν οἱ βασιλεῖς τῆς γῆς οἱ μετ’ αὐτῆς πορνεύσαντες καὶ στρηνιάσαντες, ὅταν βλέπωσιν τὸν καπνὸν τῆς πυρώσεως αὐτῆς,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/009.yaml
  text: And the kings of the earth who committed sexual immorality and lived in luxury with her will weep and mourn over her when they see the smoke of her burning[b][a],
  footnotes:
  - marker: a
    text: Or 'will beat themselves' / 'will lament'; the Greek verb evokes demonstrative mourning.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'committed sexual immorality with her' likely participates in Revelation's recurring metaphor for corrupt, idolatrous alliance, while retaining the sexualized imagery of the Greek.
    reason: lexical_alternative
