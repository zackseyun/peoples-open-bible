  text: וַ/יַּֽעֲשֶׂ֥ה הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֗ר מִ/כָּל חַטֹּ֞אות יָרָבְעָ֧ם בֶּן נְבָ֛ט אֲשֶׁר הֶחֱטִ֥יא אֶת יִשְׂרָאֵ֖ל בָּ֥/הּ הָלָֽךְ־־־־׃
