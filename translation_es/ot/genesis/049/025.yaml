translation:
  language: es
  text: por el Dios de tu padre[a], que te ayudará, y por el Todopoderoso, que te bendecirá con bendiciones de los cielos arriba, bendiciones del abismo que yace debajo[b], bendiciones de pechos y de matriz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de parte del Dios de tu padre ... y con el Todopoderoso». Las preposiciones hebreas y la partícula antes de «el Todopoderoso» están comprimidas; el pasaje puede entenderse como fuente, agencia o aposición cercana.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el abismo que se agazapa debajo». El verbo hebreo puede significar «yacer» o «agazaparse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵל אָבִיךָ
  english_pob_choice: by the God of your father
  chosen_spanish: por el Dios de tu padre
  alternatives_spanish:
  - de parte del Dios de tu padre
  - desde el Dios de tu padre
  lexicon: HALOT
  rationale: La secuencia hebrea está sintácticamente comprimida y puede expresar fuente, agencia o aposición cercana. En español, «por el Dios de tu padre» conserva mejor el matiz de mediación/instrumentalidad que el contexto de bendición sugiere, sin perder la referencia al Dios del padre.
- source_word: יַעְזְרֶךָ
  english_pob_choice: who will help you
  chosen_spanish: que te ayudará
  alternatives_spanish:
  - y te ayudará
  - el cual te ayudará
  lexicon: HALOT
  rationale: El verbo es 3ª masculina singular con sufijo de 2ª masculina singular. En español, una relativa con futuro mantiene el valor promisor y la referencia clara a Dios como sujeto.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Siguiendo la preferencia del proyecto por traducir títulos divinos, «el Todopoderoso» comunica el sentido tradicional de שַׁדַּי sin transliteración. En este contexto patriarcal de bendición, es la forma más clara y reverente en español.
- source_word: וִיבָרְכֶךָ
  english_pob_choice: who will bless you
  chosen_spanish: que te bendecirá
  alternatives_spanish:
  - y te bendecirá
  - el cual te bendecirá
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito y el valor de futuro/promesa del imperfecto hebreo. La relativa encaja naturalmente con la coordinación previa y evita repetir innecesariamente el nombre divino.
- source_word: בִּרְכֹת שָׁמַיִם מֵעָל
  english_pob_choice: with blessings of heaven above
  chosen_spanish: con bendiciones de los cielos de arriba
  alternatives_spanish:
  - con bendiciones del cielo de arriba
  - con bendiciones celestiales de arriba
  lexicon: HALOT
  rationale: «Cielos» mantiene el plural hebreo שָׁמַיִם y el paralelismo poético con el verso. «De arriba» reproduce מֵעָל y la imagen vertical, sin forzar una paráfrasis teológica.
- source_word: תְּהוֹם רֹבֶצֶת תָּחַת
  english_pob_choice: the deep lying beneath
  chosen_spanish: el abismo que yace debajo
  alternatives_spanish:
  - el abismo tendido debajo
  - el profundo que yace debajo
  lexicon: HALOT
  rationale: תְּהוֹם refiere al abismo o las profundidades primordiales. «Abismo» es el equivalente español más transparente; «que yace debajo» preserva el valor verbal de רֹבֶצֶת. Se evita suavizar el contraste arriba/abajo.
- source_word: שָׁדַיִם
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - mamas
  - senos
  lexicon: HALOT
  rationale: El plural hebreo designa los pechos como fuente de nutrición y fertilidad. «Pechos» es natural en español bíblico contemporáneo y conserva el plural y la concreción corporal del texto.
- source_word: וָרָחַם
  english_pob_choice: womb
  chosen_spanish: matriz
  alternatives_spanish:
  - vientre
  - útero
  lexicon: HALOT
  rationale: En el paralelismo con «pechos», רָחַם apunta al órgano de gestación/fertilidad. «Matriz» es una opción bíblica y comprensible en español; mantiene el registro digno sin perder el sentido corporal.
theological_decisions:
- issue: Ajuste sintáctico de מֵאֵל / וְאֵת שַׁדַּי
  english_pob_reading: The Hebrew prepositions and the particle before 'the Almighty' are syntactically compressed, and the line may be understood as source, agency, or close apposition.
  chosen_spanish_reading: por el Dios de tu padre ... y por el Todopoderoso
  alternative_spanish_readings:
  - de parte del Dios de tu padre ... y con el Todopoderoso
  - desde el Dios de tu padre ... y con el Todopoderoso
  rationale: La estructura española elegida conserva la compresión del hebreo y permite leer ambos miembros como fuentes/instrumentos de bendición sin resolver en exceso la ambigüedad. Se evita imponer una sola lectura donde el texto hebreo admite varias.
  doctrine_reference: Genesis 49:25 audit trail; syntactic compression note in English POB footnote a.
- issue: Traducción del título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Se sigue la norma del proyecto de traducir títulos divinos en lugar de transliterarlos, para preservar el contenido semántico y la inteligibilidad litúrgica. No se introduce una glosa doctrinal adicional.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sentido de תְּהוֹם רֹבֶצֶת תָּחַת
  english_pob_reading: the deep lying beneath
  chosen_spanish_reading: el abismo que yace debajo
  alternative_spanish_readings:
  - el abismo que se agazapa debajo
  - el abismo que reposa debajo
  rationale: Se mantiene la imagen de las profundidades abajo, sin domesticarla. «Yace» preserva la quietud/posición del participio hebreo y evita convertirlo en una mera abstracción cosmológica.
  doctrine_reference: Genesis 49:25 lexical note on תְּהוֹם and רֹבֶצֶת.
translation_notes:
  revision_awareness: El borrador sigue de cerca el alto acuerdo del audit trail inglés y no introduce cambios respecto de la línea revisada más reciente; conserva la ambigüedad sintáctica de מֵאֵל / וְאֵת שַׁדַּי y la alternativa léxica de תְּהוֹם רֹבֶצֶת.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «el Todopoderoso» para שַׁדַּי, conforme al criterio del proyecto.
  - Se usa «cielos» para שָׁמַיִם para conservar el plural hebreo y el paralelismo poético.
  - Se emplea «abismo» para תְּהוֹם, evitando «profundo» por ser menos transparente en español.
  - «Pechos» y «matriz» conservan el paralelismo corporal/fecundidad del hebreo sin eufemizarlo.
