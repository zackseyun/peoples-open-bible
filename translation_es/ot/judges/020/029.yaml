translation:
  language: es
  text: Así que Israel puso hombres en emboscada[a] alrededor de Guibeá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «puso emboscadores hacia/alrededor de Guibeá». La expresión se refiere a colocar una fuerza de emboscada alrededor de la ciudad; «hombres en emboscada» conserva el matiz personal del participio hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  lexicon: HALOT
  rationale: El verbo שׂוּם expresa la acción concreta de poner/colocar. En español, «puso» comunica bien la acción sin forzar una construcción poco natural; además conserva la relación directa con el objeto militar del versículo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: nombre propio / referente colectivo
  rationale: El hebreo nombra al colectivo como Israel. Mantener el nombre propio sigue el texto fuente y deja intacto el sujeto colectivo militar.
- source_word: אֹרְבִים
  english_pob_choice: men in ambush
  chosen_spanish: emboscadores
  alternatives_spanish:
  - hombres en emboscada
  - los que estaban en emboscada
  - una emboscada
  lexicon: HALOT
  rationale: El participio alude a personas que están tendiendo una emboscada. «Emboscadores» conserva el valor personal y evita diluirlo en una abstracción como «una emboscada».
- source_word: אֶל ... סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - contra
  - hacia
  - en torno a
  lexicon: HALOT
  rationale: La combinación preposicional, en contexto militar y con סָבִיב, indica posición circundante. «Alrededor de» refleja la ubicación del cerco de manera natural en español.
- source_word: הַגִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gabaa
  alternatives_spanish:
  - Gabá
  - Gibeá
  lexicon: nombre de lugar
  rationale: Se opta por «Gabaa» como transliteración española sencilla del topónimo, manteniendo el nombre del lugar sin añadir artículo ni traducirlo.
translation_notes:
  revision_awareness: El texto inglés auditado usa «men in ambush around Gibeah» y una nota que explica literalmente «set ambushers toward/around Gibeah». La versión española conserva esa relación concreta de posicionamiento militar y el valor personal del participio, sin ampliar el contenido narrativo más allá del hebreo.
  spanish_consistency_notes:
  - Se mantiene el nombre propio del colectivo como «Israel».
  - Se evita «SEÑOR» u այլ sustitución teológica porque no aparece el Tetragrámaton ni un título divino en este versículo.
  - «Gabaa» se usa como transliteración breve y legible en español para el topónimo hebreo.
  - El sentido locativo de אֶל + סָבִיב se expresa con «alrededor de», siguiendo la lectura auditada del inglés POB.
