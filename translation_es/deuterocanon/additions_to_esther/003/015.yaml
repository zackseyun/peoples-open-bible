    issue: 'Cierre verbal poco idiomático: ''lo que hablaste'''
    rationale: Aunque busca calcar ἐποίησας αὐτοῖς ὅσα ἐλάλησας, en español 'hacer lo que hablaste' resulta extraño. 'Lo que dijiste' sigue siendo cercano al griego, mantiene el contraste entre decir y hacer, y mejora la inteligibilidad.
