translation:
  language: es
  text: 'De los hijos de Zatóes[a]: Eieconías, hijo de Jetel, y con él doscientos hombres; de los hijos de Adín: Obet[b], hijo de Jonatán, y con él doscientos cincuenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega del nombre de familia se translitera desde el testimonio principal de 1 Esdras; el paralelo masorético aproximado tiene otra forma nominal.
    reason: alternative_reading
  - marker: b
    text: El nombre personal refleja una forma griega incierta (Οὐβὴν); también sería posible una transliteración más literal como Uben u Oben.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: Desde los hijos de
  alternatives_spanish:
  - De entre los hijos de
  - De los hijos de
  lexicon: LSJ
  rationale: La fórmula introduce miembros tomados de un grupo familiar o clan. «Desde los hijos de» conserva la secuencia genealógica y la idea de procedencia sin volverla más interpretativa de lo que exige el griego.
- source_word: Ζαθόης
  english_pob_choice: Zathoes
  chosen_spanish: Zatóes
  alternatives_spanish:
  - Zatoés
  - Zatói
  lexicon: LSJ
  rationale: Se translitera el nombre de la tradición griega primaria de 1 Esdras. La forma española sigue de cerca el valor del griego y evita sustituirla por la paralela aproximada del hebreo masorético.
- source_word: Εἰεχονίας
  english_pob_choice: Eiechonias
  chosen_spanish: Eieconías
  alternatives_spanish:
  - Eiechonías
  - Jeconías
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el testimonio griego. Se ajusta a la ortografía española con acentuación natural, manteniendo la cercanía fonética al griego transmitido.
- source_word: Ἰεθήλου
  english_pob_choice: son of Jethel
  chosen_spanish: hijo de Jetel
  alternatives_spanish:
  - de Jetel
  - hijo de Jethel
  lexicon: LSJ
  rationale: Aquí el segundo nombre funciona patronímicamente. En español, «hijo de» expresa con claridad esa relación y evita una construcción demasiado literal que oscurezca la genealogía.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - acompañándolo
  - y con él
  lexicon: LSJ
  rationale: La fórmula de acompañamiento se vierte de modo directo y natural en español, preservando el registro de lista/censo.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: LSJ
  rationale: El griego dice específicamente «hombres», no un término genérico para personas. «Hombres» mantiene el sentido censal y la referencia masculina del pasaje.
- source_word: διακόσιοι
  english_pob_choice: two hundred
  chosen_spanish: doscientos
  alternatives_spanish:
  - '200'
  lexicon: LSJ
  rationale: Correspondencia directa del numeral griego.
- source_word: Ἀδείν
  english_pob_choice: Adin
  chosen_spanish: Adín
  alternatives_spanish:
  - Adin
  lexicon: LSJ
  rationale: Nombre familiar transliterado de la forma griega, con acentuación española para facilitar lectura sin alterar la identidad del nombre.
- source_word: Οὐβὴν
  english_pob_choice: Obeth
  chosen_spanish: Obet
  alternatives_spanish:
  - Uben
  - Obén
  lexicon: LSJ
  rationale: La forma griega es incierta. «Obet» conserva una transliteración breve y legible en español, sin decidir indebidamente una vocalización más allá de lo atestiguado.
- source_word: Ἰωνάθου
  english_pob_choice: son of Jonathan
  chosen_spanish: hijo de Jonatán
  alternatives_spanish:
  - de Jonatán
  - hijo de Jonatan
  lexicon: LSJ
  rationale: Se explicita la relación patronímica en español con la fórmula usual «hijo de», manteniendo el nombre propio en una forma reconocible y bien asentada.
- source_word: διακόσιοι πεντήκοντα
  english_pob_choice: two hundred fifty
  chosen_spanish: doscientos cincuenta
  alternatives_spanish:
  - '250'
  - doscientos y cincuenta
  lexicon: LSJ
  rationale: Renderización directa y natural de la cifra griega, adecuada para una lista administrativa.
translation_notes:
  revision_awareness: 'Se corrigió la anotación previa para que cada nota tenga su anclaje exacto en el texto español: [a] en el nombre de familia y [b] en el nombre personal incierto. También se mantuvo la dependencia primaria del griego, con el paralelo hebreo solo como control de nombres.'
  spanish_consistency_notes:
  - Se conservaron nombres propios transliterados desde el griego, en vez de armonizarlos con el paralelo hebreo masorético.
  - Se usó «hijo de» para hacer explícitas las relaciones patronímicas implícitas en el griego.
  - Se mantuvo el registro de lista/censo con sintaxis breve y numérica directa.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto para cumplir la trazabilidad editorial.
