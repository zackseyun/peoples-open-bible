base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/004.yaml
  text: You have not strengthened the weak[a], and you have not healed the sick, and you have not bound up the broken, and you have not brought back the strayed, and you have not sought the lost[c][b]; but with force and with harshness you have ruled them.
  footnotes:
  - marker: a
    text: Or 'the sick' for 'the weak'; the Hebrew term can denote sickness or weakness, but 'weak' is used here to distinguish it from the next phrase, 'the sick.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the driven away' for 'the strayed.' The Hebrew can emphasize being driven off as well as wandering away.
    reason: lexical_alternative
  - marker: c
    text: Or 'with ruthlessness.' The Hebrew term denotes harsh, crushing severity.
    reason: lexical_alternative
