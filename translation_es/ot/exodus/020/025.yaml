translation:
  language: es
  text: Y si haces para mí un altar de piedras[a], no lo construirás de piedras labradas; porque si blandes tu espada sobre él[b], lo profanarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «altar de piedra».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu espada»; en contexto probablemente se refiere a un instrumento metálico usado sobre las piedras.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La partícula condicional con valor conectivo se expresa naturalmente en español con «Y si», conservando la relación con la instrucción precedente sin sonar forzada.
- source_word: מִזְבַּח אֲבָנִים
  english_pob_choice: an altar of stones
  chosen_spanish: un altar de piedras
  alternatives_spanish:
  - un altar de piedra
  - un altar de piedras labradas
  lexicon: HALOT
  rationale: «Altar de piedras» sigue de cerca la construcción hebrea en genitivo y mantiene la transparencia del plural del sustantivo. «De piedra» sería más idiomático, pero menos explícito respecto del hebreo.
- source_word: תַּעֲשֶׂה לִּי
  english_pob_choice: you make for me
  chosen_spanish: haces para mí
  alternatives_spanish:
  - haces para mi uso
  - me haces
  lexicon: HALOT
  rationale: El dativo con ל־ se vierte con «para mí», conservando la relación de destinatario o finalidad sin añadir matiz extra.
- source_word: לֹא תִבְנֶה אֶתְהֶן
  english_pob_choice: you shall not build it
  chosen_spanish: no lo construirás
  alternatives_spanish:
  - no lo edificarás
  - no lo levantarás
  lexicon: HALOT
  rationale: «Construirás» es claro y moderno para el mandato legal. El objeto se mantiene en singular («lo») conforme al altar singular al que remite la referencia hebrea.
- source_word: גָּזִית
  english_pob_choice: of cut stones
  chosen_spanish: de piedras cortadas
  alternatives_spanish:
  - de piedras labradas
  - de piedras talladas
  lexicon: HALOT
  rationale: «Piedras cortadas» reproduce de manera transparente el sentido de material trabajado/hecho a herramienta. Se evita «hechas» por ser demasiado general y «labradas» por ser más técnico y menos directo.
- source_word: חַרְבְּךָ
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - tu herramienta
  - tu instrumento
  lexicon: HALOT
  rationale: Se conserva «espada» porque el hebreo la nombra explícitamente. Aunque el contexto sugiere una herramienta metálica, no se reemplaza el término sin base textual directa.
- source_word: הֵנַפְתָּ עָלֶיהָ
  english_pob_choice: you wield ... on it
  chosen_spanish: blandes ... sobre él
  alternatives_spanish:
  - levantas ... sobre él
  - manejas ... sobre él
  lexicon: HALOT
  rationale: «Blandir» recoge el gesto de alzar o mover con fuerza un arma o herramienta y encaja bien con una espada; además preserva la acción concreta del hebreo sin interpretarla como mera posesión.
- source_word: וַתְּחַלְלֶהָ
  english_pob_choice: you will profane it
  chosen_spanish: lo profanarás
  alternatives_spanish:
  - lo contaminarás
  - lo deshonrarás
  lexicon: HALOT
  rationale: «Profanar» preserva el campo cultual de חלל y la relación con la santidad del altar. Se evita reducir el verbo a un efecto meramente físico o estético.
theological_decisions:
- issue: Sentido cultual de la profanación del altar
  english_pob_reading: Human working of the stones with a metal blade renders the altar profaned in cultic terms.
  chosen_spanish_reading: El trabajo humano del altar con un metal/espada lo vuelve profanado en sentido cultual.
  alternative_spanish_readings:
  - La prohibición se centra solo en evitar armas o violencia simbólica.
  - La idea principal es la sencillez, no la profanación ritual.
  rationale: El verbo חלל exige mantener la categoría de profanación sagrada. La traducción conserva ese valor cultual en lugar de rebajarlo a mera estética o simbolismo, pero sin añadir explicaciones que el versículo no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: He incorporado la revisión auditada que corrige la concordancia del objeto singular («lo») con el altar singular y que prefiere una formulación transparente para «cut stones». En español, además, mantengo el paralelismo directo entre «piedras» y «piedras cortadas» sin introducir un sujeto plural implícito.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable en este versículo porque no aparece el nombre divino.
  - Se conserva «profanar» para חלל como término cultual consistente con la terminología POB.
  - Se evita sustituir «espada» por «herramienta» en el texto principal para no diluir el dato léxico del hebreo.
  - El objeto del verbo final se refleja con pronombre singular («lo») para concordar con «altar».
