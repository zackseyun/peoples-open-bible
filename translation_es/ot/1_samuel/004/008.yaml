translation:
  language: es
  text: ¡Ay de nosotros! ¿Quién podrá librarnos de la mano de estos dioses poderosos? Estos son los dioses que golpearon a Egipto con cada plaga en el desierto[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estos poderosos Dios(es)». Los filisteos hablan en términos plurales, reflejando su propia comprensión del Dios de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el desierto». La frase es difícil en su contexto, porque las plagas cayeron sobre Egipto antes del viaje de Israel por el desierto; la traducción sigue el Texto Masorético tal como está.'
    reason: textual_variant
lexical_decisions:
- source_word: א֣וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de nosotros!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de nosotros mismos!
  lexicon: HALOT
  rationale: La interjección expresa angustia y calamidad. En español, '¡Ay de nosotros!' comunica ese lamento con naturalidad y gravedad, sin perder el matiz de desastre del hebreo.
- source_word: לָ֔נוּ
  english_pob_choice: to us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: HALOT
  rationale: Con '¡Ay', el español idiomático suele formar '¡Ay de nosotros!'; así se conserva el valor exclamativo y la referencia al grupo afectado.
- source_word: מִ֣י יַצִּילֵ֔נוּ
  english_pob_choice: Who can deliver us
  chosen_spanish: ¿Quién podrá librarnos?
  alternatives_spanish:
  - ¿Quién nos salvará?
  - ¿Quién nos rescatará?
  lexicon: HALOT
  rationale: נצל en causativo expresa librar/rescatar. 'Podrá' refleja el sentido retórico de incapacidad implícita en la pregunta, y 'librarnos' mantiene un registro bíblico sin ser arcaico.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la mano/poder de
  lexicon: HALOT
  rationale: La metáfora hebrea de la mano como control o dominio se puede conservar literalmente en español con 'de la mano de', que es claro y fiel.
- source_word: הָאֱלֹהִים הָאַדִּירִים הָאֵלֶּה
  english_pob_choice: these mighty gods
  chosen_spanish: estos dioses poderosos
  alternatives_spanish:
  - estos dioses majestuosos
  - este Dios poderoso
  lexicon: HALOT
  rationale: El plural en la forma verbal y nominal del contexto refleja la perspectiva filistea; por eso se mantiene el plural 'dioses'. אַדִּירִים se vierte como 'poderosos', que preserva la fuerza sin sobrecargar el estilo.
- source_word: אֵלֶּה הֵם
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos mismos son
  - Éstos son
  lexicon: HALOT
  rationale: Es una cláusula identificativa directa; 'Estos son' conserva la estructura y la claridad del hebreo.
- source_word: הָאֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - Dios
  - los seres divinos
  lexicon: HALOT
  rationale: Se conserva el plural, coherente con la comprensión filistea del pasaje y con las formas plurales cercanas del hebreo.
- source_word: הַמַּכִּים
  english_pob_choice: who struck
  chosen_spanish: que golpearon
  alternatives_spanish:
  - que hirieron
  - que asolaron
  lexicon: HALOT
  rationale: El participio funciona como relativa. 'Golpearon' reproduce bien מַכִּים/מכה en un registro directo; 'hirieron' podría sonar más interpretativo.
- source_word: אֶת מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a los egipcios
  - contra Egipto
  lexicon: HALOT
  rationale: El objeto se refiere al país/territorio colectivo; 'a Egipto' es breve y corresponde al uso bíblico en el relato de las plagas.
- source_word: בְּכָל מַכָּה
  english_pob_choice: with every plague
  chosen_spanish: con cada plaga
  alternatives_spanish:
  - con toda plaga
  - con toda clase de plaga
  lexicon: HALOT
  rationale: '''Con cada plaga'' sigue de cerca el valor distributivo de בְּכָל y evita añadir matices no explicitados por el hebreo.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/estepa
  - en el yermo
  lexicon: HALOT
  rationale: Aunque 'wilderness' suele corresponder a 'desierto' en español, se deja abierta la tensión histórica del texto sin armonizarla. 'Desierto' es el equivalente más natural para lectura pública.
theological_decisions:
- issue: Cómo reflejar la perspectiva filistea sobre YHWH/אֱלֹהִים
  english_pob_reading: these mighty gods
  chosen_spanish_reading: estos dioses poderosos
  alternative_spanish_readings:
  - este Dios poderoso
  - estos seres divinos
  rationale: El hebreo presenta a los filisteos hablando en plural; mantener 'dioses' preserva su comprensión pagana del acontecimiento y no borra la tensión teológica del pasaje.
  doctrine_reference: Preservar la perspectiva del hablante sin corregirla a una confesión monoteísta.
- issue: La frase históricamente difícil בַּמִּדְבָּר
  english_pob_reading: in the wilderness
  chosen_spanish_reading: en el desierto
  alternative_spanish_readings:
  - en el desierto
  - en la estepa
  rationale: La traducción sigue el texto masorético tal como está, aun cuando la mención del desierto plantea una dificultad histórica con las plagas en Egipto. No se armoniza ni se omite la expresión.
  doctrine_reference: Primacía del texto fuente; conservar la tensión textual en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que ajustó 'with every kind of plague' a 'with every plague' para mayor precisión léxica. También conserva la decisión de mantener 'in the wilderness' sin armonización, y la lectura plural de 'gods' por la perspectiva filistea.
  spanish_consistency_notes:
  - Se mantiene 'dioses' para reflejar la comprensión filistea y no neutralizar el plural del hebreo.
  - '''Librarnos'' conserva un registro bíblico claro en español sin caer en un calco rígido.'
  - '''Desierto'' se usa para representar ''wilderness'' en un español público natural, con nota para la dificultad histórica.'
  - La puntuación exclamativa e interrogativa sigue el tono urgente del hebreo.
