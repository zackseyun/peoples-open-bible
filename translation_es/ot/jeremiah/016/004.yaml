base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/016/004.yaml
  text: They will die of deadly diseases[a]. They will not be mourned or buried. They will become dung on the surface of the ground. They will be consumed by the sword and by famine[c][b], and their carcasses will become food for the birds of the heavens and for the beasts of the earth.
  footnotes:
  - marker: a
    text: Hebrew literally, 'deaths of diseases'; the phrase means death caused by severe disease.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon the face of the ground.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their corpses' instead of 'their carcasses.'
    reason: lexical_alternative
