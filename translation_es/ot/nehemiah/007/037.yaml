lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hombres de
  lexicon: HALOT
  rationale: En listas genealógicas o de repatriados, בְּנֵי puede designar un clan o comunidad asociada con un lugar. «Los hijos de» conserva la forma breve y el registro genealógico del hebreo, y funciona de modo natural en español bíblico.
- source_word: לֹד
  english_pob_choice: Lod
  chosen_spanish: Lod
  alternatives_spanish:
  - Lida
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y se translitera directamente desde el hebreo. «Lod» sigue la forma hebrea y evita depender de una forma griega o posterior.
- source_word: חָדִיד
  english_pob_choice: Hadid
  chosen_spanish: Hadid
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva por transliteración directa.
- source_word: וְאוֹנוֹ
  english_pob_choice: and Ono
  chosen_spanish: y Ono
  lexicon: HALOT
  rationale: La conjunción וְ se rinde con «y», y el topónimo se mantiene como «Ono» para conservar la identificación geográfica.
- source_word: שְׁבַע מֵאוֹת וְעֶשְׂרִים וְאֶחָד
  english_pob_choice: seven hundred twenty-one
  chosen_spanish: setecientos veintiuno
  alternatives_spanish:
  - '721'
  lexicon: HALOT
  rationale: El número cardinal se expresa con palabras, como en el estilo enumerativo de la lista, manteniendo la lectura natural y digna del español moderno.
