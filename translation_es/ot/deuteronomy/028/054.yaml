  rationale: Se reemplazó el calco poco natural 'tendrá el ojo hostil' por 'mirará con hostilidad', preservando el modismo mediante nota. Se cambió 'la mujer de su seno' por 'la esposa de su regazo' para mantener la imagen íntima en un español más natural. Se eliminó la nota [a] original por ser metatraductológica y se consolidaron las notas útiles en dos aclaraciones directamente relevantes al hebreo.
