  rationale: Se mantiene 'Al que hizo' y 'las grandes luminarias' por buena fidelidad al hebreo y buena legibilidad en español. Se revisa el refrán para expresar de manera natural el sentido durativo implícito de לְעוֹלָם y para representar mejor חֶסֶד conforme al audit trail del POB. También se corrige la lógica de la nota léxica sobre 'luminarias/luces'.
