revisions:
- from: 'Su corazón clamó a Yahvé[a], oh muro de la hija de Sion: haz correr las lágrimas como un arroyo[b], de día y de noche; no te concedas alivio, no cesen tus ojos[c].'
  to: 'Su corazón clamó al Señor[a], Oh, muro de la hija de Sion: haz correr lágrimas como un arroyo[b], de día y de noche; no te concedas alivio; no repose la niña de tus ojos[c].'
  rationale: Se corrigió «Yahvé» a «el Señor» porque el hebreo tiene אֲדֹנָי, no יהוה. Se restauró la imagen idiomática final con «la niña de tus ojos» en vez de «tus ojos», apoyada por nota, para preservar mejor el original. También se corrigió la nota de alternativa del singular/plural y se suavizó la puntuación para una lectura española más natural.
