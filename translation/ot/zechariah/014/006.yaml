id: ZEC.14.6
reference: Zechariah 14:6
source:
  edition: WLC
  text: וְ/הָיָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא לֹֽא יִהְיֶ֣ה א֔וֹר יְקָר֖וֹת יקפאו/ן־׃
translation:
  text: 'And it will happen on that day: there will be no light[a]; the glorious ones will congeal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another traditional construal: “there will be no light, cold, or frost.” The Hebrew of the final clause is difficult and has been understood in several ways.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future event formula common in prophetic discourse. 'It will happen' is natural modern English while preserving the predictive force.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal expression. 'On that day' is idiomatic and preserves the eschatological marker.
- source_word: לֹא יִהְיֶה אוֹר
  chosen: there will be no light
  alternatives:
  - light will not be
  - there will not be light
  lexicon: HALOT
  rationale: Straightforward negated existential clause. 'There will be no light' is the clearest English rendering.
- source_word: יְקָרוֹת
  chosen: the splendid ones
  alternatives:
  - the precious things
  - the bright ones
  - the luminaries
  lexicon: HALOT
  rationale: The adjective/noun from יקר ordinarily denotes what is precious, splendid, or rare. In this difficult context, it likely refers to splendid/bright heavenly lights. 'The splendid ones' keeps the lexical sense without over-interpreting, while allowing the following verb to describe their condition.
- source_word: יקפאון
  chosen: will congeal
  alternatives:
  - will freeze
  - will be frozen
  - will shrink
  - will be darkened
  lexicon: HALOT
  rationale: From a verb associated with congealing/freezing. The form and syntax are difficult, but 'will congeal' preserves the concrete lexical image better than interpretive renderings like 'be darkened.'
