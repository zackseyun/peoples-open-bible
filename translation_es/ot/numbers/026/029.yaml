translation:
  language: es
  text: 'Los hijos de Manasés: de Maquir, el clan de los maquiritas; y Maquir engendró a Galaad; de Galaad, el clan de los galaaditas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי מְנַשֶּׁה
  english_pob_choice: The sons of Manasseh
  chosen_spanish: Los hijos de Manasés
  alternatives_spanish:
  - Los descendientes de Manasés
  - Los hijos de Manasés fueron
  lexicon: HALOT
  rationale: En este contexto censal y genealógico, בְּנֵי conserva la fórmula de filiación. 'Hijos' mantiene la estructura formal del hebreo y funciona de manera natural en español bíblico sin perder el valor de linaje.
- source_word: לְ/מָכִיר
  english_pob_choice: of Machir
  chosen_spanish: de Maquir
  alternatives_spanish:
  - para Maquir
  - a Maquir
  - Maquir
  lexicon: HALOT
  rationale: El ל prefijado en esta fórmula marca la rama o línea genealógica asociada al clan; en español, 'de' reproduce mejor esa relación de pertenencia o procedencia que 'a' o 'para'.
- source_word: מִשְׁפַּחַת הַ/מָּכִירִי
  english_pob_choice: the clan of the Machirites
  chosen_spanish: la familia de los maquiritas
  alternatives_spanish:
  - el clan de los maquiritas
  - la familia de los machiritas
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en este pasaje designa una subdivisión tribal; aunque 'clan' sería más técnico, 'familia' mantiene la traducción fuente-cercana y sigue siendo comprensible en español. El gentilicio se vierte como 'maquiritas' para preservar la relación con Maquir.
- source_word: וּ/מָכִיר הוֹלִ֣יד אֶת גִּלְעָד
  english_pob_choice: and Machir fathered Gilead
  chosen_spanish: y Maquir engendró a Galaad
  alternatives_spanish:
  - y Maquir fue padre de Galaad
  - y Maquir engendró Galaad
  lexicon: HALOT
  rationale: הוֹלִיד es el verbo genealógico estándar. 'Engendró' conserva la fuerza formal y genealógica del hebreo; 'fue padre de' es posible, pero menos directo. Se mantiene el nombre 'Galaad' como forma bíblica habitual en español.
- source_word: לְ/גִלְעָד
  english_pob_choice: of Gilead
  chosen_spanish: de Galaad
  alternatives_spanish:
  - para Galaad
  - a Galaad
  - Galaad
  lexicon: HALOT
  rationale: Como con לְמָכִיר, el ל introduce la rama descendiente asociada al siguiente grupo; 'de Galaad' preserva el paralelismo genealógico del verso.
- source_word: מִשְׁפַּחַת הַ/גִּלְעָדִי
  english_pob_choice: the clan of the Gileadites
  chosen_spanish: la familia de los galaaditas
  alternatives_spanish:
  - el clan de los galaaditas
  - la familia de los gileaditas
  lexicon: HALOT
  rationale: Se mantiene 'familia' por coherencia con la primera ocurrencia de מִשְׁפַּחַת en el versículo; 'galaaditas' conserva el gentilicio y el paralelismo con 'maquiritas'.
translation_notes:
  revision_awareness: 'El pasaje coincide de manera alta con la revisión inglesa auditada: se conserva la fórmula genealógica, el paralelismo de לְ + nombre propio y la distinción tribal de מִשְׁפָּחָה sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - 'Se ha mantenido la misma solución para מִשְׁפַּחַת en ambas apariciones: ''familia'' para sostener la cohesión interna del versículo.'
  - Se usa 'Maquir' y 'Galaad' como formas españolas bíblicas estables, coherentes con el uso tradicional y la auditabilidad del linaje.
  - No se añaden notas al pie porque no hay variante textual ni alternativa lexical que requiera anclaje en el texto principal.
