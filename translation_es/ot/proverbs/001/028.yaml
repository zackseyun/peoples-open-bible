translation:
  language: es
  text: Entonces me llamarán, pero no responderé; me buscarán con diligencia[a], pero no me hallarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me buscarán temprano» o «me buscarán con fervor». El verbo hebreo puede expresar búsqueda temprana, ansiosa o diligente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marca consecuencia temporal en la secuencia del pasaje. «Entonces» es natural en español y conserva el valor consecutivo sin añadir matices no presentes.
- source_word: יִקְרָאֻנְנִי
  english_pob_choice: they will call on me
  chosen_spanish: me llamarán
  alternatives_spanish:
  - clamarán a mí
  - me invocarán
  lexicon: HALOT
  rationale: El verbo קרא aquí expresa una llamada dirigida a alguien para obtener respuesta o auxilio. En español, «me llamarán» conserva la acción de dirigirse a la voz/persona hablante; se evita «invocarán» por carga religiosa no necesaria y «clamarán a mí» por mayor dureza estilística.
- source_word: וְלֹא אֶעֱנֶה
  english_pob_choice: but I will not answer
  chosen_spanish: pero no responderé
  alternatives_spanish:
  - y no responderé
  - pero no contestaré
  lexicon: HALOT
  rationale: Aunque el hebreo usa una conjunción simple, el contraste adversativo es claro en contexto. «Responderé» transmite la negativa a atender su llamado con un registro sobrio y natural en español.
- source_word: יְשַׁחֲרֻנְנִי
  english_pob_choice: they will seek me diligently
  chosen_spanish: me buscarán con diligencia
  alternatives_spanish:
  - me buscarán temprano
  - me buscarán con empeño
  lexicon: HALOT
  rationale: שׁחר en piel puede implicar buscar temprano o con fervor. El audit trail inglés optó por la intensidad de la búsqueda; «con diligencia» conserva ese matiz de esfuerzo/insistencia sin restringirlo solo al horario.
- source_word: וְלֹא יִמְצָאֻנְנִי
  english_pob_choice: but they will not find me
  chosen_spanish: pero no me hallarán
  alternatives_spanish:
  - y no me encontrarán
  lexicon: HALOT
  rationale: מצא significa hallar/encontrar. «Hallar» funciona bien en español bíblico contemporáneo y mantiene la imagen de búsqueda frustrada; se conserva el contraste adversativo del contexto.
theological_decisions:
- issue: Voz sapiencial personal sin identificación cristológica explícita
  english_pob_reading: Retain first-person speech as Wisdom speaking metaphorically/personally within Proverbs, without importing later christological identification into the translation.
  chosen_spanish_reading: Mantener la voz en primera persona como Sabiduría que habla dentro de Proverbios, sin introducir en el texto una identificación cristológica posterior.
  alternative_spanish_readings:
  - Leer la voz tipológicamente como una referencia a Cristo
  - Resolver la figura sapiencial como una persona divina distinta
  rationale: El verso pertenece al discurso de Sabiduría en el marco literario de Proverbios 1. La traducción debe preservar esa voz textual y no resolver en el cuerpo principal una interpretación teológica más amplia que el hebreo del pasaje no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: El auditor inglés reporta alta concordancia y ninguna revisión pendiente. La versión española sigue el sentido confirmado del original hebreo y del POB inglés, preservando el contraste adversativo y la ambigüedad útil de שׁחר con una opción principal idiomática.
  spanish_consistency_notes:
  - Se usa «me» para mantener la dirección del objeto en primera persona como en el hebreo.
  - «Entonces» reproduce el valor consecutivo de אָז sin sobretraducción.
  - La nota[a] conserva la alternativa lexical que en inglés se expresó como early/earnestly, adaptada a opciones naturales en español.
  - Se evita «SEÑOR» o lecturas teológicas ajenas; el versículo no contiene el Tetragrámaton ni un título divino explícito.
