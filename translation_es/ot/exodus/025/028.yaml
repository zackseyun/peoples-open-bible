translation:
  language: es
  text: Harás las varas de madera de acacia y las cubrirás de oro[a], y por medio de ellas se llevará la mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con ellas se llevará la mesa». El hebreo puede expresar instrumentación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás tú
  lexicon: HALOT
  rationale: En este contexto de instrucciones para el tabernáculo, el perfecto con waw funciona como mandato. En español, el futuro de mandato 'harás' comunica la fuerza directiva sin volver el texto pesado.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: las varas
  alternatives_spanish:
  - los polos
  - las barras de transporte
  lexicon: HALOT
  rationale: En muebles sagrados del tabernáculo, הַבַּדִּים son piezas para transportar. 'Varas' es un equivalente bíblico natural en español y mantiene la función sin sonar técnico de más; 'barras de transporte' explicita más de lo que el hebreo dice.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: 'La construcción hebrea expresa material: ''madera de acacia''. En español, ''de madera de acacia'' es claro y fiel; evita el hebraísmo ''shittim'' que no transparenta el referente para el lector.'
- source_word: וְצִפִּיתָ אֹתָם זָהָב
  english_pob_choice: and overlay them with gold
  chosen_spanish: y las cubrirás de oro
  alternatives_spanish:
  - y las recubrirás de oro
  - y las platearás con oro
  lexicon: HALOT
  rationale: צפה en este contexto artesanal denota revestir/recubrir con metal. 'Cubrirás de oro' reproduce bien la imagen y es idiomático en español; 'recubrirás' o 'platearás' son posibles, pero 'cubrir' conserva la sencillez del mandato.
- source_word: וְנִשָּׂא בָם
  english_pob_choice: and by them ... shall be carried
  chosen_spanish: y por medio de ellas se cargará
  alternatives_spanish:
  - y con ellas se llevará
  - y por ellas se transportará
  lexicon: HALOT
  rationale: El בָם hebreo es instrumental. 'Por medio de ellas' deja claro que las varas son el instrumento de transporte; 'se cargará' mantiene la pasiva/impersonal del hebreo y evita atribuir un sujeto no explícito.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa
  - el tablero
  lexicon: HALOT
  rationale: Aunque 'mesa' es el sentido común y tradicional en español, 'tablero' podría sugerir solo la superficie. 'La mesa' comunica el objeto completo y coincide con la referencia inmediata al mueble del santuario.
theological_decisions:
- issue: Instrumentalidad de בָם en la última cláusula
  english_pob_reading: '''and by them the table shall be carried.'' The Hebrew preposition can express instrumentality.'
  chosen_spanish_reading: '''y por medio de ellas se cargará la mesa.'''
  alternative_spanish_readings:
  - '''y con ellas se llevará la mesa.'''
  - '''y por ellas se transportará la mesa.'''
  rationale: No hay motivo para convertir la frase en una simple coordinación. La preposición hebrea indica el medio por el que se realiza la acción, y la formulación española mantiene esa relación instrumental sin perder naturalidad.
  doctrine_reference: Éxodo 25:28; sentido instrumental de ב con valor de medio
- issue: Designación del objeto transportado
  english_pob_reading: '''the table'''
  chosen_spanish_reading: '''la mesa'''
  alternative_spanish_readings:
  - '''la mesa'''
  - '''la mesa del pan de la Presencia'''
  rationale: El hebreo dice simplemente 'la mesa'. Aunque el contexto más amplio identifica su función, el texto base no añade esa aclaración; por eso la principal conserva la sobriedad del original.
  doctrine_reference: Éxodo 25:23-30; contexto inmediato del mobiliario del santuario
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y no registra revisiones aplicadas; por eso la redacción sigue de cerca el sentido del hebreo y el juicio léxico ya auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'SEÑOR' y también el hebraísmo 'shittim' para no oscurecer el material.
  - '''Varas'' conserva la función de transporte del objeto sagrado sin cargar el texto con explicación innecesaria.'
  - La nota al pie preserva la alternativa instrumental documentada en el POB inglés.
