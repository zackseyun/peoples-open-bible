revisions:
- from: 'Porque habrá un día en que los centinelas[a] clamarán sobre la región montañosa de Efraín: “¡Levántense, y subamos a Sion, a Yahvé nuestro Dios!”'
  to: 'Porque habrá un día en que los centinelas[a] llamarán en la región montañosa de Efraín: «¡Levántense, y subamos a Sion, a Yahvé nuestro Dios!»'
  rationale: Se ajusta «clamarán» a «llamarán» para reflejar mejor la convocatoria pública de קָרְאוּ, y «sobre la región montañosa» a «en la región montañosa» para un español más natural y fiel al sentido geográfico. Se armoniza la nota léxica con las alternativas auditadas.
