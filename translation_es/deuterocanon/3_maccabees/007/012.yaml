  to: Y cuando aceptó que ellos decían la verdad y los animó, les dio plena autorización, para que destruyeran a los que habían transgredido la ley de Dios en todo lugar bajo su reino, con audacia[a], sin ninguna autorización real ni inspección[b].
  rationale: Se ajusta la frase final para reflejar mejor el sentido contextual de βασιλικῆς ἐξουσίας como autorización oficial del rey, no mera 'autoridad' abstracta. También se mejora 'por todos los lugares' a 'en todo lugar' para un español más natural y más cercano al alcance distributivo del griego. Se conservan el resto de las decisiones léxicas, que son fieles y bien formuladas.
