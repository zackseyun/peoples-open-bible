translation:
  language: es
  text: Entonces Barac convocó a Zabulón y a Neftalí a Quedes, y diez mil hombres subieron tras él[a], y Débora subió con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a sus pies»; es un modismo hebreo que aquí significa que iban siguiéndolo o bajo su mando.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  english_pob_choice: summoned
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - reunió
  - mando a llamar
  lexicon: HALOT
  rationale: El hebreo en piel/hiphil aquí expresa llamar para reunir. "Convocó" comunica bien la acción de reunir a las tribus para la campaña sin hacerla demasiado administrativa como "reclutó" ni demasiado genérica como "llamó".
- source_word: זְבוּלֻן וְאֶת נַפְתָּלִי
  english_pob_choice: Zebulun and Naphtali
  chosen_spanish: Zabulón y a Neftalí
  alternatives_spanish:
  - Zebulón y Neftalí
  - Zabulón y Neftalí
  lexicon: HALOT
  rationale: Se mantienen los nombres tribales en forma reconocible para lectores bíblicos en español. "Zabulón" sigue la forma tradicional más extendida en español, mientras que el objeto directo se expresa con la repetición de "a" para claridad natural.
- source_word: קֶדְשָׁה
  english_pob_choice: to Kedesh
  chosen_spanish: a Quedes
  alternatives_spanish:
  - a Kedesh
  - hacia Quedes
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el lugar. "Quedes" es una adaptación española aceptable del topónimo; se evita sobretraducir el valor direccional con una paráfrasis mayor.
- source_word: וַיַּעַל בְּרַגְלָיו
  english_pob_choice: went up following him / at his feet
  chosen_spanish: subieron siguiendo sus pasos
  alternatives_spanish:
  - subieron tras él
  - subieron bajo su mando
  - subieron a sus pies
  lexicon: HALOT
  rationale: La expresión hebrea literal "en/por sus pies" es idiomática y, según el audit trail inglés, significa que fueron tras él o bajo su dirección. En español, "siguiendo sus pasos" conserva la imagen del seguimiento sin sonar artificial. Se evita "a sus pies" porque en español podría sugerir postración y perder el sentido militar.
- source_word: עֲשֶׂרֶת אַלְפֵי אִישׁ
  english_pob_choice: ten thousand men
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil soldados
  - diez mil guerreros
  lexicon: HALOT
  rationale: La expresión numérica se vierte de forma directa. "Hombres" preserva la referencia a tropas masculinas adultas y coincide con el registro narrativo bíblico sin añadir una terminología militar más específica que el hebreo no exige.
- source_word: וַתַּעַל עִמּוֹ דְּבוֹרָה
  english_pob_choice: and Deborah went up with him
  chosen_spanish: Débora subió con él
  alternatives_spanish:
  - y Débora fue con él
  - y Débora ascendió con él
  lexicon: HALOT
  rationale: Se mantiene el verbo ascensional "subió" para conservar la repetición de עלה en el verso. "Con él" reproduce el acompañamiento de Débora sin insertar una explicación que el hebreo no explicita.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: ''summoned'' para וַיַּזְעֵק, el valor direccional de קֶדְשָׁה, y la revisión de la expresión idiomática de בְּרַגְלָיו desde una literalidad más dura hacia un sentido más natural de seguimiento. La versión española mantiene el movimiento ascensional de עלה y conserva la relación de acompañamiento de Débora sin añadir contenido interpretativo.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo el estilo narrativo sobrio y bíblico, evitando un castellano arcaizante innecesario.
  - Se preservó la repetición de "subió" para reflejar el paralelismo verbal del hebreo.
  - Los nombres propios tribales se adaptan a formas españolas reconocibles y consistentes.
