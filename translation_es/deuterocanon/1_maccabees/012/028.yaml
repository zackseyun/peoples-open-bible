translation:
  language: es
  text: Y cuando los adversarios oyeron que Jonatán y los que estaban con él estaban preparados para la guerra, tuvieron miedo y perdieron el ánimo[a], y encendieron fuegos en su campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «fijaron/congelaron su corazón»; es un modismo que expresa desaliento o pérdida de valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ὑπεναντίοι
  english_pob_choice: the adversaries
  chosen_spanish: los adversarios
  alternatives_spanish:
  - los enemigos
  - los opositores
  lexicon: LSJ
  rationale: «Adversarios» conserva el valor de oposición del término griego sin añadir más hostilidad de la que el contexto ya establece.
- source_word: ἡτοίμασται
  english_pob_choice: were prepared
  chosen_spanish: estaban preparados
  alternatives_spanish:
  - habían sido preparados
  - estaban listos
  lexicon: LSJ
  rationale: El perfecto expresa un estado resultante de preparación; «estaban preparados» comunica esa condición de manera natural en español.
- source_word: οἱ παρʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - los de su lado
  - sus acompañantes
  lexicon: LSJ
  rationale: La frase griega dice literalmente los que estaban junto a él; «los que estaban con él» mantiene la relación sin añadir «hombres» u otro matiz no explícito.
- source_word: εἰς πόλεμον
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - para pelear
  lexicon: LSJ
  rationale: «Para la guerra» refleja de forma directa la orientación del texto hacia una situación bélica general, sin reducirla a un solo combate.
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - se asustaron
  lexicon: LSJ
  rationale: Es una equivalencia natural y fiel para el aoristo de φοβέομαι en este contexto narrativo.
- source_word: ἔπηξαν τὴν καρδίαν αὐτῶν
  english_pob_choice: lost heart
  chosen_spanish: se les heló el corazón
  alternatives_spanish:
  - perdieron el ánimo
  - se les endureció el corazón
  lexicon: LSJ
  rationale: El griego usa una imagen idiomática de endurecimiento/congelación del corazón. «Se les heló el corazón» conserva mejor la fuerza imagética que una paráfrasis meramente psicológica.
- source_word: ἀνέκαυσαν πυρὰς
  english_pob_choice: they lit fires
  chosen_spanish: encendieron fuegos
  alternatives_spanish:
  - prendieron fuegos
  - encendieron hogueras
  lexicon: LSJ
  rationale: «Encendieron fuegos» sigue de cerca el verbo de encender/kindling y evita especificar «hogueras», que sería más interpretativo.
- source_word: ἐν τῇ παρεμβολῇ αὐτῶν
  english_pob_choice: in their camp
  chosen_spanish: en su campamento
  alternatives_spanish:
  - en su campamento militar
  - en su encampamento
  lexicon: LSJ
  rationale: «Campamento» es el equivalente natural de παρεμβολή en contexto militar y conserva el registro narrativo.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y coincide con la línea de sentido del audit trail inglés. La única adaptación principal es la imagen idiomática de ἔπηξαν τὴν καρδίαν αὐτῶν, que en español se vuelve más transparente como «se les heló el corazón» sin perder su fuerza figurada.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» como forma habitual en español.
  - Se usa «adversarios» para conservar el matiz oposicional del griego.
  - «Campamento» se emplea para παρεμβολή en sentido militar.
  - No se introduce terminología eclesiástica ni interpretaciones ajenas al relato.
