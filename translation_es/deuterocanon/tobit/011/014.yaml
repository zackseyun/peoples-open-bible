translation:
  language: es
  text: 'Y lloró y dijo: «Bendito eres, oh Dios, y bendito tu nombre por los siglos[a], y benditos todos tus santos ángeles»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para los siglos»; el giro expresa duración indefinida y se traduce de forma idiomática como «por los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκλαυσεν
  english_pob_choice: she wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se echó a llorar
  - lloraba
  lexicon: LSJ
  rationale: El verbo expresa llanto real; en español, «lloró» comunica con naturalidad el hecho sin añadir duración o inicio que el griego no especifica. El contexto narrativo identifica a la persona en escena, por lo que no hace falta marcar género en el verbo.
- source_word: Εὐλογητὸς εἶ
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Alabado eres tú
  lexicon: LSJ
  rationale: La fórmula doxológica se conserva mejor con «Bendito eres tú», que mantiene el valor declarativo y la estructura directa de segunda persona. «Alabado» introduciría un matiz distinto al del adjetivo εὐλογητός.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: LSJ
  rationale: El artículo identifica al destinatario como vocativo en la fórmula de bendición. «Oh Dios» reproduce el tono de invocación solemne sin forzar una equivalencia demasiado arcaica.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu Nombre
  - el nombre tuyo
  lexicon: LSJ
  rationale: Es la expresión bíblica estándar para la identidad y honra divinas. No se requiere expansión interpretativa; en español «tu nombre» conserva la referencia directa.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: LSJ
  rationale: El griego literalmente dice «hasta/para los siglos». «Por los siglos» mantiene el plural idiomático y la reverberación bíblica sin suavizar el sentido de duración indefinida. Se evita resolverlo únicamente como «para siempre» para no perder la imagen original.
- source_word: εὐλογημένοι
  english_pob_choice: blessed are
  chosen_spanish: benditos
  alternatives_spanish:
  - bendecidos
  - bienaventurados
  lexicon: LSJ
  rationale: La forma pasiva adjetival conserva el tono de bendición declarativa. «Benditos» es el equivalente más directo y solemne en español; «bienaventurados» suena más interpretativo y menos literal en esta construcción.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos y cada uno de
  - cada uno de
  lexicon: LSJ
  rationale: «Todos» expresa la totalidad sin sobrecargar la frase. Mantiene el paralelismo con el original y la amplitud universal de la bendición.
- source_word: οἱ ἅγιοι ἄγγελοί σου
  english_pob_choice: your holy angels
  chosen_spanish: tus santos ángeles
  alternatives_spanish:
  - tus ángeles santos
  - tus ángeles consagrados
  lexicon: LSJ
  rationale: El adjetivo ἅγιοι modifica directamente a ἄγγελοι. En español, «santos ángeles» suena más natural y preserva la relación sintáctica; «santos» aquí no significa «saints» sino seres celestiales consagrados a Dios.
theological_decisions:
- issue: Fórmula de bendición dirigida a Dios
  english_pob_reading: Retain 'Blessed are you, O God' rather than recasting as praise language.
  chosen_spanish_reading: Conservar «Bendito eres tú, oh Dios» como fórmula de bendición, no como simple elogio.
  alternative_spanish_readings:
  - Eres alabado, oh Dios
  - Alabado sea Dios
  rationale: El griego repite lenguaje de bendición (εὐλογητ-), no de alabanza genérica. Mantener «bendito» preserva la forma litúrgica y la tensión teológica del texto, evitando cambiar el registro del original.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y el tono litúrgico sin normalizarlo en una paráfrasis devocional.'
translation_notes:
  revision_awareness: El texto griego está en acuerdo alto con la edición Swete 1909 y el audit trail inglés no muestra revisiones sustantivas; se mantiene la estructura tripartita de bendición y la equivalencia óptima del verso sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por «SEÑOR», porque aquí el destinatario está explícitamente nombrado.
  - Se conserva el lenguaje de bendición con «bendito/benditos», en línea con el inglés POB y con la repetición de εὐλογητ- en el griego.
  - «Santos ángeles» traduce directamente ἅγιοι ἄγγελοι sin reinterpretar ἅγιοι como «santos» en el sentido de personas canonizadas.
