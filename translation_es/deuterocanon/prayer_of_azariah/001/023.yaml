revisions:
- from: Y no cesaban los servidores del rey que los echaban dentro, alimentando el horno con nafta[a], pez, estopa y ramas[b], manteniéndolo encendido.
  to: Y los servidores del rey que los habían echado dentro no cesaban de avivar el horno con nafta[a], pez, estopa y leña menuda[b], manteniéndolo encendido.
