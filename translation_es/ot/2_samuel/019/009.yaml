translation:
  language: es
  text: 'Entonces el rey se levantó y se sentó en la puerta. Y le dijeron a todo el pueblo, diciendo: «Mira, el rey está sentado en la puerta». Entonces todo el pueblo vino ante el rey. Pero Israel había huido[b], cada hombre a sus tiendas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre a sus tiendas», un modismo para dispersarse a la propia vivienda o al lugar tribal de residencia.'
    reason: cultural_note
  - marker: b
    text: O «Y Israel huyó, cada hombre a sus tiendas». La conjunción hebrea también puede leerse más simplemente como «y»; «pero» se usa en el texto principal para aclarar el contraste en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then the king arose
  chosen_spanish: Entonces el rey se levantó
  alternatives_spanish:
  - Entonces el rey arose
  - Luego el rey se puso de pie
  lexicon: HALOT
  rationale: El wayyiqtol narra la acción siguiente en secuencia. «Se levantó» conserva el movimiento narrativo natural en español y evita un calco rígido.
- source_word: וַיֵּשֶׁב בַּשָּׁעַר
  english_pob_choice: sat in the gate
  chosen_spanish: se sentó en la puerta
  alternatives_spanish:
  - tomó asiento en la puerta
  - se sentó a la puerta
  lexicon: HALOT
  rationale: ישב comunica aquí tomar un lugar público de autoridad. «Puerta» preserva el lugar cívico sin reemplazarlo por una explicación interpretativa.
- source_word: הִגִּידוּ לֵאמֹר
  english_pob_choice: they told ... saying
  chosen_spanish: se lo dijeron ... diciendo
  alternatives_spanish:
  - lo informaron ... diciendo
  - le comunicaron ... diciendo
  lexicon: HALOT
  rationale: El hifil de נגד significa decir o anunciar. El impersonal/plural se expresa de manera natural en español con «se lo dijeron», manteniendo la fórmula quotativa «diciendo».
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Miren
  lexicon: HALOT
  rationale: Es una partícula deíctica de atención. «Mira» reproduce la llamada directa con naturalidad en español contemporáneo.
- source_word: יוֹשֵׁב
  english_pob_choice: is sitting
  chosen_spanish: está sentado
  alternatives_spanish:
  - está sentado allí
  - se sienta
  lexicon: HALOT
  rationale: El participio describe un estado visible y continuo. «Está sentado» comunica bien el aspecto progresivo sin sonar forzado.
- source_word: וַיָּבֹא כָל הָעָם לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: Then all the people came before the king
  chosen_spanish: Entonces todo el pueblo vino ante el rey
  alternatives_spanish:
  - Entonces todo el pueblo se presentó ante el rey
  - Entonces todo el pueblo llegó ante el rey
  lexicon: HALOT
  rationale: בוא + לפני se traduce con «venir ante» para conservar la escena pública de audiencia. «Todo el pueblo» refleja כָל הָעָם sin diluir el colectivo.
- source_word: וְיִשְׂרָאֵל נָס
  english_pob_choice: But Israel had fled
  chosen_spanish: Pero Israel había huido
  alternatives_spanish:
  - Y Israel había huido
  - Pero Israel huyó
  lexicon: HALOT
  rationale: El qatal aquí funciona como trasfondo respecto de la reunión del pueblo; el pluscuamperfecto español «había huido» refleja mejor ese valor anterior. «Pero» preserva la tensión contextual que la versión inglesa marcó con una nota.
- source_word: אִישׁ לְאֹהָלָיו
  english_pob_choice: each man to his tent
  chosen_spanish: cada hombre a sus tiendas
  alternatives_spanish:
  - cada hombre a su tienda
  - cada uno a sus tiendas
  lexicon: HALOT
  rationale: Se conserva el distributivo masculino de אִישׁ con «cada hombre», como en la decisión inglesa. «Tiendas» mantiene el plural idiomático hebreo y sugiere dispersión a los lugares de residencia.
theological_decisions:
- issue: Marcador de contraste en וְיִשְׂרָאֵל נָס
  english_pob_reading: But Israel had fled
  chosen_spanish_reading: Pero Israel había huido
  alternative_spanish_readings:
  - Y Israel había huido
  - Israel había huido
  rationale: El hebreo permite simplemente «y», pero el contexto contrasta el retorno del pueblo a la presencia del rey con la dispersión de Israel. «Pero» sigue la lectura auditada de la POB sin negar la posibilidad lexical de la conjunción simple.
  doctrine_reference: POB audit trail; contrast marked in English footnote b
- issue: Distributivo masculino אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - todos
  rationale: Se conserva el valor masculino singular explícito del hebreo, coherente con la política del proyecto y con la decisión inglesa de no neutralizar el distributivo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, punto 4
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en la pasada más reciente; el cotejo indicó alta coincidencia con observaciones menores. Esta propuesta sigue esa lectura estable, conservando la distinción entre el movimiento público hacia el rey y la dispersión de Israel.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - «Puerta» traduce literalmente בַּשַּׁעַר y no se expandió a «portón» o «entrada» para no perder el valor cívico del lugar.
  - Se mantuvo el idiomatismo «cada hombre a sus tiendas» con nota explicativa, porque el hebreo lo usa como fórmula de dispersión.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes no presentes en el texto fuente.
