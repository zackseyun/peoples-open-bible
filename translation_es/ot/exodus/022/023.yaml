    reason: lexical_alternative
  - marker: b
    text: O 'huérfanos'; el hebreo denota más específicamente a quienes quedan sin padre.
    reason: lexical_alternative
  revision_rationale: Se corrigieron las notas para que coincidan con las alternativas léxicas documentadas en el rastro POB inglés y con los anclajes correctos en el texto. También se reforzó la precisión de género de וּבְנֵיכֶם con 'sus hijos varones', en línea con la decisión auditada de conservar 'sons'. Se mantuvo 'quedarán sin padre' como la mejor representación principal de יְתֹמִים en este contexto, y se añadió la alternativa 'huérfanos' en nota.
