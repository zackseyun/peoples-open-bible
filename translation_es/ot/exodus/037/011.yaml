translation:
  language: es
  text: Y lo recubrió de oro puro[a], y le hizo una moldura de oro alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una orla de oro» o, tradicionalmente, «una corona de oro» alrededor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַף
  english_pob_choice: overlaid
  chosen_spanish: lo recubrió
  alternatives_spanish:
  - lo cubrió
  - lo revistió
  lexicon: HALOT
  rationale: El verbo en este contexto de artesanía del tabernáculo describe aplicar una capa de metal sobre un objeto. En español, «recubrió» comunica bien esa idea técnica sin sonar forzado.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: pronombre directo de tercera persona
  rationale: 'El pronombre retoma el objeto mencionado antes y funciona como complemento directo en español: «lo recubrió».'
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro fino
  lexicon: HALOT
  rationale: La expresión señala oro de gran pureza. «Oro puro» es natural en español y conserva la claridad del material precioso.
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: made for it
  chosen_spanish: le hizo
  alternatives_spanish:
  - hizo para él
  - le confeccionó
  lexicon: HALOT
  rationale: El dativo con ל indica que la pieza fue hecha para ese objeto; en español, «le hizo» conserva esa relación de finalidad sin añadir más de lo que el hebreo dice.
- source_word: זֵר
  english_pob_choice: molding
  chosen_spanish: moldura
  alternatives_spanish:
  - borde
  - anillo ornamental
  - corona
  lexicon: HALOT
  rationale: Aquí זֵר designa un adorno perimetral. «Moldura» expresa en español una franja ornamental trabajada. Se evita «corona» por su posible carga tradicional más que descriptiva.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en torno
  lexicon: HALOT
  rationale: El adverbio indica una vuelta completa alrededor del objeto. «Alrededor» es breve, idiomático y fiel al sentido.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y el audit trail inglés de la POB. No hay revisiones aplicadas en el registro fuente; se mantiene la misma decisión semántica principal para וַיְצַף, זֵר y סָבִיב, con una nota española para las alternativas léxicas donde el español abre varias opciones legítimas.
  spanish_consistency_notes:
  - Se mantiene «oro puro» para זָהָב טָהוֹר, coherente con la terminología POB habitual.
  - «Moldura» traduce funcionalmente זֵר sin imponer una lectura litúrgica; la nota preserva las alternativas «orla» y «corona».
  - Se usa «le hizo» para reflejar el valor de finalidad del dativo hebreo en una construcción natural de español.
