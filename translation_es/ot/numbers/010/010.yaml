translation:
  language: es
  text: Y en el día de su alegría, y en sus tiempos señalados, y en los comienzos[a] de sus meses, tocarán las trompetas sobre sus holocaustos y sobre los sacrificios de sus ofrendas de paz, y serán para ustedes como memorial delante de su Dios[b]. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus lunas nuevas». El hebreo dice literalmente «los comienzos de sus meses».
    reason: lexical_alternative
  - marker: b
    text: O «los sacrificios de sus ofrendas de comunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחַתְכֶם
  english_pob_choice: your gladness
  chosen_spanish: su alegría
  alternatives_spanish:
  - su gozo
  - su regocijo
  lexicon: HALOT
  rationale: El sustantivo expresa alegría/regocijo. En español, «alegría» es natural y fiel en una lista cultual; evita una construcción demasiado pesada sin perder el matiz de celebración.
- source_word: מוֹעֲדֵיכֶם
  english_pob_choice: your appointed times
  chosen_spanish: sus tiempos señalados
  alternatives_spanish:
  - sus tiempos appointed
  - sus festividades
  lexicon: HALOT
  rationale: מוֹעֵד cubre la idea de tiempo señalado o cita fijada. «Tiempos señalados» conserva la amplitud del término sin reducirlo solo a fiestas.
- source_word: רָאשֵׁי חָדְשֵׁיכֶם
  english_pob_choice: the beginnings of your months
  chosen_spanish: los comienzos de sus meses
  alternatives_spanish:
  - las cabezas de sus meses
  - sus lunas nuevas
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente idiomática: «cabezas/comienzos de meses». En español, «comienzos de sus meses» mantiene la transparencia del hebreo; «lunas nuevas» sería una equivalencia contextual posible, pero no literal.'
- source_word: וּתְקַעְתֶּם
  english_pob_choice: you shall blow
  chosen_spanish: tocarán
  alternatives_spanish:
  - soplarán
  - harán sonar
  lexicon: HALOT
  rationale: Con trompetas, el verbo se expresa naturalmente en español como «tocar» o «hacer sonar». «Tocarán» es idiomático y comunica la acción cultual sin sonar mecánico.
- source_word: חֲצֹצְרֹת
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - las trompetas de plata
  - las trompetas rituales
  lexicon: HALOT
  rationale: El sustantivo designa las trompetas cultuales del capítulo. «Trompetas» es suficiente aquí; no se importa «de plata» porque no está explícito en este versículo.
- source_word: עַל עֹלֹתֵיכֶם
  english_pob_choice: over your burnt offerings
  chosen_spanish: sobre sus holocaustos
  alternatives_spanish:
  - sobre sus ofrendas quemadas
  - junto a sus holocaustos
  lexicon: HALOT
  rationale: «Holocaustos» preserva la terminología sacrificial tradicional para עֹלָה y mantiene el valor técnico del tipo de ofrenda. La preposición «sobre» conserva la relación espacial/ritual del hebreo.
- source_word: זִבְחֵי שַׁלְמֵיכֶם
  english_pob_choice: the sacrifices of your peace offerings
  chosen_spanish: sobre los sacrificios de sus ofrendas de paz
  alternatives_spanish:
  - sobre los sacrificios de sus ofrendas de comunión
  - sobre los sacrificios de sus ofrendas de bienestar
  lexicon: HALOT
  rationale: El sintagma combina זֶבַח con שְׁלָמִים. «Ofrendas de paz» sigue la terminología estable en español bíblico y conserva la categoría sacrificial, sin forzar una explicación interpretativa única.
- source_word: וְהָיוּ לָכֶם לְזִכָּרוֹן
  english_pob_choice: and they shall be for you as a memorial
  chosen_spanish: y les serán como memorial
  alternatives_spanish:
  - y les servirán como recordatorio
  - y serán para ustedes un recuerdo
  lexicon: HALOT
  rationale: «Memorial» conserva el sentido cultual de algo que trae a la memoria ante Dios. El plural verbal puede referirse a los sonidos de trompeta en conexión con las ofrendas.
- source_word: לִפְנֵי אֱלֹהֵיכֶם
  english_pob_choice: before your God
  chosen_spanish: delante de su Dios
  alternatives_spanish:
  - en presencia de su Dios
  - ante su Dios
  lexicon: HALOT
  rationale: «Delante de» es una equivalencia natural para לִפְנֵי y funciona bien en contexto ritual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre divino personal sin sustituirlo por un título.'
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto concluye con el nombre pactual de Dios. La forma española del proyecto es «Yahvé», coherente con la decisión doctrinal de no enmascarar el Tetragrámaton con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: שְׁלָמִים como tipo de sacrificio
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: «Ofrendas de paz» conserva la terminología sacrificial recibida y evita reducir el sentido a una sola dimensión relacional. La alternativa «de comunión» es plausible, pero más interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador coincide con la lectura inglesa auditada en sentido y alcance lexical, y conserva la alternancia cultual del texto hebreo sin introducir ampliaciones. No se detectaron revisiones posteriores que exigieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «holocaustos» y «ofrendas de paz» para reflejar dos clases sacrificiales distintas.
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Tiempos señalados» y «comienzos de sus meses» conservan la estructura enumerativa del hebreo.
  - El marcador de nota a se coloca en «alegría» para reflejar la alternativa calendárica del hebreo.
  - El marcador de nota b se coloca en «ofrendas de paz» porque el hebreo permite una equivalencia sacrificial alternativa.
