  to: Lo traerá a los hijos de Aarón, los sacerdotes, y de allí tomará un puñado de su flor de harina y algo de su aceite, con todo su incienso. Luego el sacerdote quemará su porción memorial sobre el altar, ofrenda de alimento[a], aroma agradable para Yahvé.
