    issue: Puntuación final con dos puntos después de «diciendo»
    rationale: El hebreo לֵאמֹר introduce el contenido del habla, y en esta edición conviene mantener la fórmula abierta con coma, como en el inglés POB («saying,»), especialmente porque el contenido continúa en el siguiente versículo.
  - severity: medium
    issue: Redacción inexacta de la nota al pie
    rationale: La nota dice «también puede transliterarse como “Yahvé” o “Jehová”», pero «Yahvé» no es una alternativa a la forma ya usada en el texto; debe indicarse que el hebreo es YHWH y que una alternativa de transliteración es «Jehová».
  revised_spanish_text: Yahvé[a] habló a Moisés, diciendo,
