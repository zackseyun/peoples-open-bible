  to: 'Y mientras el sumo sacerdote hacía expiación[a], esos mismos jóvenes aparecieron de nuevo a Heliodoro, vestidos con las mismas vestiduras, y, estando de pie, dijeron: «Da muchas gracias a Onías el sumo sacerdote, porque a causa de él el Señor te ha concedido graciosamente la vida».'
