    issue: «Endecha» es comprensible pero menos natural y ampliamente legible que «lamento» en español eclesial general.
    rationale: Aunque es léxicamente defendible para קִינָה, el propio expediente inglés prioriza una formulación formal pero clara. «Lamento» conserva el género fúnebre y mejora la lectura neutral latinoamericana.
  - severity: medium
