translation:
  language: es
  text: Destruí a algunos de ustedes[a] como Dios destruyó a Sodoma y a Gomorra[b], y quedaron como un tizón arrancado del incendio[c]; pero no volvieron a mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre ustedes»; el hebreo puede leerse sin hacer explícito el sentido partitivo de la preposición.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «como la destrucción de Dios de Sodoma y Gomorra», es decir, como la destrucción que Dios trajo sobre Sodoma y Gomorra.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un tizón rescatado de la llama».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָפַ֣כְתִּי
  english_pob_choice: I overthrew
  chosen_spanish: trastorné
  alternatives_spanish:
  - derribé
  - destruí
  - volteé
  lexicon: HALOT
  rationale: El verbo hebreo en contexto de juicio expresa trastorno o derribo catastrófico. "Trastorné" conserva la idea de ruina violenta sin sonar demasiado técnico o literalista en español.
- source_word: בָ/כֶ֗ם
  english_pob_choice: some among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - algunos de ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: El hebreo puede leerse de modo partitivo o locativo. El español "entre ustedes" deja abierta esa tensión sin imponer explícitamente "algunos" ni diluir el golpe colectivo del juicio.
- source_word: כְ/מַהְפֵּכַ֤ת אֱלֹהִים֙
  english_pob_choice: as God overthrew
  chosen_spanish: como Dios trastornó
  alternatives_spanish:
  - como el trastorno de Dios
  - como el trastorno que Dios hizo
  - como Dios derribó
  lexicon: HALOT
  rationale: La construcción nominal hebrea se vuelve en español una cláusula verbal más natural. Se mantiene la referencia a una acción divina de destrucción, sin borrar el vínculo con Génesis 19.
- source_word: סְדֹ֣ם וְ/אֶת עֲמֹרָ֔ה
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  alternatives_spanish:
  - Sodoma y Gomorra
  lexicon: HALOT
  rationale: Los topónimos tienen forma estable en español bíblico y requieren transliteración tradicional inteligible.
- source_word: וַ/תִּהְי֕וּ
  english_pob_choice: you became
  chosen_spanish: quedaron
  alternatives_spanish:
  - se convirtieron
  - llegaron a ser
  - ustedes fueron
  lexicon: HALOT
  rationale: El hebreo marca un estado resultante después del juicio. "Quedaron" comunica el resultado sin forzar una conversión ontológica más fuerte que la imagen requiere.
- source_word: כְ/א֖וּד
  english_pob_choice: like a brand
  chosen_spanish: como un tizón
  alternatives_spanish:
  - como un tizón encendido
  - como una brasa
  - como un leño
  lexicon: HALOT
  rationale: אוּד alude a un trozo de madera o carbón ardiendo. "Tizón" es claro en español y conserva la fuerza imagética del rescate in extremis.
- source_word: מֻצָּ֣ל
  english_pob_choice: snatched
  chosen_spanish: arrancado
  alternatives_spanish:
  - rescatado
  - salvado
  - arrebatado
  lexicon: HALOT
  rationale: El participio pasivo expresa ser sacado de peligro. "Arrancado" reproduce la rapidez y violencia de la imagen del tizón sacado del fuego.
- source_word: מִ/שְׂרֵפָ֑ה
  english_pob_choice: from the burning
  chosen_spanish: del incendio
  alternatives_spanish:
  - del fuego
  - de la hoguera
  - de la llama
  lexicon: HALOT
  rationale: El sustantivo indica combustión o conflagración. "Incendio" transmite mejor la magnitud del peligro que un simple "fuego".
- source_word: וְ/לֹֽא שַׁבְתֶּ֥ם עָדַ֖/י
  english_pob_choice: yet you did not return to me
  chosen_spanish: pero no volvieron a mí
  alternatives_spanish:
  - pero no regresaron a mí
  - pero no se volvieron a mí
  - pero no se arrepintieron ante mí
  lexicon: HALOT
  rationale: שׁוב en el profetismo denota volver relacionalmente a Yahvé. "Volvieron a mí" conserva el idioma bíblico y la carga de restauración del pacto mejor que "arrepentirse".
- source_word: נְאֻם יְהוָֽה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino según el criterio del proyecto. "Declara" mantiene la fórmula profética solemne y publicada, sin reemplazar el Tetragrámaton por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvéh
  rationale: El texto hebreo usa directamente el Nombre divino. En español se adopta la forma del proyecto "Yahvé", evitando el sustituto litúrgico y preservando la identidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of שׁוב in prophetic covenant context
  english_pob_reading: return to me
  chosen_spanish_reading: no volvieron a mí
  alternative_spanish_readings:
  - no regresaron a mí
  - no se arrepintieron
  - no volvieron en arrepentimiento a mí
  rationale: La respuesta requerida no es solo emoción interna sino retorno de alianza. "Volvieron a mí" mantiene la amplitud profética de retorno/restauración y evita estrechar el sentido a mera contrición psicológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios textuales respecto del pasaje fuente; se conservó la lectura de alto acuerdo y la solución óptima para la imagen de juicio y rescate.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה conforme al criterio del proyecto.
  - Se conservó la fórmula profética «declara Yahvé» por su solemnidad y transparencia.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - Se preservó la tensión entre lectura partitiva y locativa de בָכֶם mediante «entre ustedes» con nota.
  - Se eligió «volvieron a mí» para שׁוב, respetando el sentido profético de retorno relacional.
