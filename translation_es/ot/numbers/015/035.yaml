  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Yahvé habla a Moisés, se ordena la pena capital para el hombre, la ejecuta toda la congregación, y ocurre fuera del campamento. Sin embargo, la expresión «Sin falta debe ser muerto» suena poco natural en español y debilita el tono judicial claro de מוֹת יוּמַת. Además, el anclaje de notas está invertido respecto al inglés auditado: la alternativa formal corresponde a la cláusula de pena de muerte, y la nota sobre «apedrearlo con piedras» debe anclarse en la cláusula de lapidación.'
  spanish_quality_summary: El texto es comprensible, pero «Sin falta debe ser muerto» resulta rígido y algo ajeno al español bíblico natural. «El hombre ciertamente debe morir» o «el hombre sin duda debe ser ejecutado» serían opciones, pero para conservar el pasivo/judicial del hebreo y mantener buena legibilidad, «El hombre debe morir sin falta» funciona mejor. También conviene reubicar los marcadores de nota para que correspondan exactamente a las expresiones comentadas.
  glossary_alignment: «Yahvé» concuerda con la política del proyecto para יהוה. «Congregación» es aceptable para עֵדָה en este contexto. «Fuera del campamento» es preciso para מִחוּץ לַמַּחֲנֶה. «Apedreará con piedras» mantiene bien la fuerza de רָגוֹם ... בָאֲבָנִים, con nota explicativa útil. No hay conflictos teológicos importantes.
  issues:
  - severity: medium
    issue: «Sin falta debe ser muerto» es poco idiomático en español.
    rationale: Aunque intenta reflejar la intensificación de מוֹת יוּמַת, la frase suena forzada. Un orden más natural como «debe morir sin falta» preserva mejor la fuerza enfática sin perder claridad.
  - severity: medium
    issue: Los marcadores de notas no están anclados a las expresiones correctas.
    rationale: 'La nota a dice «O, más formalmente: “debe ser muerto sin falta”», por lo que debe anclarse en la cláusula de condena, no en «Moisés». La nota b explica «apedrearlo con piedras», así que debe anclarse en la frase de lapidación.'
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés: «El hombre debe morir sin falta[a]; toda la congregación lo apedreará con piedras[b] fuera del campamento»'
  revised_footnotes:
