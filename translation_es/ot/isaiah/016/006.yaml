translation:
  language: es
  text: Hemos oído del orgullo de Moab—cuán orgulloso es, cuán en extremo—de su arrogancia[a], su orgullo y su furor; sus jactancias no son verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su palabrería vacía no es verdad», o «sus mentiras no son verdad». El término hebreo puede referirse a afirmaciones fanfarronas, habla vacía o falsedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  english_pob_choice: We have heard
  chosen_spanish: Hemos oído
  alternatives_spanish:
  - Oímos
  lexicon: HALOT
  rationale: El perfecto hebreo en 1cp expresa un testimonio recibido y vigente; el pretérito compuesto español conserva bien ese valor de reporte actual y suena natural en este contexto profético.
- source_word: גְאוֹן
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - soberbia
  - altivez
  lexicon: HALOT
  rationale: Aquí el sustantivo tiene fuerza de orgullo insolente, no de ‘majestad’. ‘Orgullo’ comunica el sentido contextual sin elevarlo a un matiz positivo.
- source_word: גֵּא מְאֹד
  english_pob_choice: how very proud he is
  chosen_spanish: cuán muy orgulloso es
  alternatives_spanish:
  - sumamente orgulloso
  - muy arrogante
  lexicon: HALOT
  rationale: La secuencia intensiva se conserva como exclamación/cláusula enfatizada. ‘Orgulloso’ mantiene el campo semántico de גאה y permite reflejar la repetición retórica del pasaje.
- source_word: גַּאֲוָתוֹ
  english_pob_choice: his arrogance
  chosen_spanish: su arrogancia
  alternatives_spanish:
  - su altivez
  - su soberbia
  lexicon: HALOT
  rationale: El término designa la autoexaltación de Moab; ‘arrogancia’ diferencia este miembro del siguiente ‘orgullo’ y conserva la acumulación de términos afines.
- source_word: וּגְאוֹנוֹ
  english_pob_choice: his pride
  chosen_spanish: su orgullo
  alternatives_spanish:
  - su majestad
  - su altivez
  lexicon: HALOT
  rationale: Se mantiene el segundo término del encadenamiento con una palabra cognada y transparente en español, sin suavizar la denuncia.
- source_word: וְעֶבְרָתוֹ
  english_pob_choice: his fury
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su enojo
  lexicon: HALOT
  rationale: ‘Furor’ reproduce el tono enérgico del hebreo para la ira desbordada; es más fuerte que ‘ira’ y encaja con la acumulación de rasgos hostiles.
- source_word: לֹא כֵן
  english_pob_choice: are not so
  chosen_spanish: no son así
  alternatives_spanish:
  - no es así
  - no son de ese modo
  lexicon: HALOT
  rationale: Con el plural implícito de ‘sus jactancias’, el plural español resulta idiomático y mantiene la negación abrupta del hebreo.
- source_word: בַּדָּיו
  english_pob_choice: his boasts
  chosen_spanish: sus jactancias
  alternatives_spanish:
  - su palabrería vacía
  - sus mentiras
  - sus vanaglorias
  lexicon: HALOT
  rationale: El término puede abarcar alarde, habla vana o falsedad. ‘Jactancias’ preserva el valor de fanfarroneo y deja abierta la nota sobre la posible lectura de ‘palabrería vacía’ o ‘mentiras’.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la elección óptima-equivalente del POB inglés, preservando la cadena de sustantivos de orgullo y la ambigüedad lexical de בַּדָּיו mediante nota.
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y claro, sin sustituir innecesariamente el lenguaje de denuncia del original.
  - Se conserva la repetición de términos de orgullo con diferenciación léxica para no aplanar la retórica hebrea.
  - La nota reproduce la alternativa lexical documentada por el POB inglés y la adapta al español sin perder la ambigüedad semántica.
