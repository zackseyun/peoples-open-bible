review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la secuencia principal: no dejar remanente a Joacaz, salvo un número reducido de tropas, porque el rey de Aram las destruyó. Sin embargo, la frase final «como polvo para trillarlo» no refleja bien לָדוּשׁ ni la revisión inglesa «like dust at threshing»; el pronombre singular «trillarlo» introduce un objeto inexistente en el hebreo y distorsiona la imagen.'
  spanish_quality_summary: 'El español es generalmente claro y natural. «Jinetes», «soldados de a pie» y la estructura «no... sino» funcionan bien. Pero «carros» en contexto bíblico puede entenderse como vehículos comunes; «carros de guerra» es más claro. La imagen final requiere reparación para sonar idiomática y fiel: «como polvo al trillar» o «como polvo en la trilla» funciona mejor que «para trillarlo».'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales están bien encaminadas: עָם puede mantenerse con sentido amplio en español, aunque aquí el listado militar exige que se entienda como fuerza humana restante; «gente» es aceptable. פָּרָשִׁים > «jinetes» es adecuado. רֶכֶב conviene explicitarse como «carros de guerra» por claridad contextual. לָדוּשׁ debe reflejar la imagen de trilla/trampeo sin añadir objeto directo.'
  issues:
  - severity: high
    issue: La expresión «como polvo para trillarlo» es infiel a לָדוּשׁ.
    rationale: El hebreo no tiene un pronombre objeto singular equivalente a «lo». La frase expresa una imagen de polvo en contexto de trilla/trampeo, no la acción de trillar un objeto específico.
  - severity: medium
    issue: «carros» puede resultar demasiado ambiguo en español moderno.
    rationale: Aunque léxicamente posible, en un listado militar «carros de guerra» comunica mejor רֶכֶב y evita que se piense en carros comunes.
  - severity: low
    issue: La nota sobre «jinetes» está bien, pero no preserva la alternativa relevante del inglés para la imagen de trilla.
    rationale: Dado que el inglés POB conservó una alternativa léxica en la cláusula final, conviene trasladar esa alternativa al español, especialmente porque ahí surge la principal ambigüedad.
  revised_spanish_text: Porque no dejó a Joacaz gente alguna, sino cincuenta jinetes, diez carros de guerra y diez mil soldados de a pie, pues el rey de Aram los había destruido y los había dejado como polvo al trillar[a].
  revised_footnotes:
  - marker: a
    text: O «como polvo para ser trillado». El hebreo puede evocar la imagen de polvo bajo el proceso de trilla o pisoteo.
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula final para reflejar fielmente לָדוּשׁ sin añadir un objeto inexistente, y se explicita «carros de guerra» para mayor claridad militar en español. También se traslada a nota la alternativa léxica relevante de la imagen de trilla, en línea con el rastro POB.
