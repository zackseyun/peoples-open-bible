theological_decisions:
- issue: Relationship of repentance, turning to God, and works
  chosen_reading: The verse presents works as the fitting evidence of repentance, not as a replacement for repentance itself.
  alternative_readings:
  - The works could be read as the content of repentance
  - The works could be read as a meritorious basis for acceptance
  rationale: The syntax places μετανοεῖν and ἐπιστρέφειν as the proclaimed response, with πράσσοντας ἄξια τῆς μετανοίας ἔργα describing conduct that accords with that repentance. Rendering 'doing works worthy of repentance' preserves this sequence without importing a doctrine of merit.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
