    rationale: El posesivo puede referirse a Israel o a los griegos. El contexto lo aclara, pero es preferible evitar la ambigüedad en el texto principal con una formulación como «quitarles de encima el yugo».
  - severity: medium
    issue: «estaba esclavizando a Israel en esclavitud» es una construcción poco natural.
    rationale: Aunque intenta preservar el acusativo cognado griego, el resultado en español suena forzado. «Reduciendo a Israel a esclavitud» conserva el énfasis y es idiomático.
