translation:
  language: es
  text: Y salió el nombre de David por todas las tierras[a], y Yahvé puso el temor a él sobre todas las naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fama de David se extendió por todas las tierras».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Yahvé hizo que todas las naciones temieran a David.
    reason: clarification_of_pronoun_referent
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se difundió
  - salió a
  lexicon: HALOT
  rationale: El verbo יצא conserva la imagen de salida/movimiento. En español, «salió» mantiene esa metáfora de manera natural; «se difundió» expresa el sentido de reputación, pero es más interpretativo.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la fama
  - la reputación
  lexicon: HALOT
  rationale: «Nombre» preserva el metonímico hebreo y permite que el contexto comunique la idea de fama o renombre sin perder el vínculo con el texto fuente.
- source_word: בְּכָל הָאֲרָצוֹת
  english_pob_choice: into all the lands
  chosen_spanish: por todas las tierras
  alternatives_spanish:
  - en todas las tierras
  - a través de todas las tierras
  lexicon: HALOT
  rationale: אֲרָצוֹת refiere a tierras/territorios. En español, «por todas las tierras» comunica la extensión geográfica y acompaña bien la imagen de que el nombre se extendió ampliamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: נָתַן
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - dio
  - colocó
  lexicon: HALOT
  rationale: En la construcción idiomática con פחד, el verbo expresa poner/colocar el temor sobre alguien. «Puso» es la opción española más natural y cercana al giro hebreo.
- source_word: פַּחְדּוֹ
  english_pob_choice: the fear of him
  chosen_spanish: el temor de él
  alternatives_spanish:
  - su temor
  - el miedo de él
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a David; en contexto, las naciones temieron a David. «El temor de él» conserva la referencia pronominal sin forzar una paráfrasis explicativa dentro del texto.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: on all the nations
  chosen_spanish: sobre todas las naciones
  alternatives_spanish:
  - contra todas las naciones
  - en todas las naciones
  lexicon: HALOT
  rationale: La preposición עַל en este modismo se rinde naturalmente como «sobre», manteniendo la idea de temor impuesto/puesto encima de ellas.
theological_decisions:
- issue: Referente del sufijo en פַּחְדּוֹ
  english_pob_reading: 'The suffix refers to David: ''the fear of him.'''
  chosen_spanish_reading: 'El sufijo se entiende como referencia a David: «el temor de él».'
  alternative_spanish_readings:
  - «su temor» con referencia a Yahvé
  - «el temor de Yahvé»
  rationale: El contexto inmediato habla de la fama de David entre las naciones tras sus victorias, y el paralelismo con el testimonio inglés/audit trail indica que Dios hizo que las naciones temieran a David. Por eso el referente pronominal se conserva como David, no como Yahvé.
  doctrine_reference: Contexto narrativo de 1 Crónicas 14 y lectura coherente del pronombre posesivo en פַּחְדּוֹ
translation_notes:
  revision_awareness: 'Se siguió el testimonio hebreo WLC y el expediente auditado en inglés. No hubo revisiones aplicadas en el último pase; la redacción española refleja la misma decisión textual y teológica: mantener el metonímico «nombre» y resolver el sufijo de פַּחְדּוֹ como referencia a David.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva «nombre» en lugar de «fama» en el texto principal para respetar la metáfora hebrea; la alternativa va en nota.
  - «tierras» se usa como equivalente amplio y bíblico de אֲרָצוֹת, sin modernizar a «países».
  - «temor de él» evita añadir un sujeto interpretativo en el cuerpo del texto, dejando la aclaración en nota.
