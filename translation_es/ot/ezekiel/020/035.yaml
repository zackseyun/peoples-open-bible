base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/020/035.yaml
  text: I will bring you into the wilderness of the peoples[b][a], and there I will enter into judgment with you face to face.
  footnotes:
  - marker: a
    text: Or, 'I will judge you there face to face.' The Hebrew verb can be rendered more simply as 'judge,' but the phrasing also carries the sense of entering into judicial proceedings with someone.
    reason: lexical_alternative
  - marker: b
    text: '''The wilderness of the peoples'' may refer to a wilderness-like place among the nations where Israel had been scattered.'
    reason: cultural_note
