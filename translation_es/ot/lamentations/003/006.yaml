lexical_decisions:
- source_word: בְּמַחֲשַׁכִּים
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en la oscuridad
  - en lugares oscuros
  lexicon: HALOT
  rationale: 'El plural con ב expresa localización: no solo ausencia de luz, sino una esfera de tinieblas. «En tinieblas» conserva bien la imagen poética y suena natural en español bíblico-literario.'
- source_word: הוֹשִׁיבַנִי
  english_pob_choice: He has made me dwell
  chosen_spanish: Me hizo habitar
  alternatives_spanish:
  - me hizo sentar
  - me ha hecho habitar
  - me asentó
  lexicon: HALOT
  rationale: 'El hifil de ישׁב es causativo: ''hacer habitar/sentar''. En este lamento, la idea de ser colocado forzosamente en una condición domina, y «me hizo habitar» comunica esa imposición con naturalidad y sin perder el sentido de permanencia.'
- source_word: כְּמֵתֵי
  english_pob_choice: like those long dead
  chosen_spanish: como los muertos de antiguo
  alternatives_spanish:
  - como los muertos de hace mucho
  - como los de antiguo muertos
  - como los muertos de tiempos remotos
  lexicon: HALOT
  rationale: La comparación con el plural constructo de «muertos» pide una imagen nominal en español. «Muertos de antiguo» conserva el valor de antigüedad sin convertirlo en una explicación demasiado interpretativa.
- source_word: עוֹלָם
  english_pob_choice: long
  chosen_spanish: de antiguo
  alternatives_spanish:
  - antiguos
  - de tiempos remotos
  - de larga data
  lexicon: HALOT
  rationale: Aquí עוֹלָם no apunta a eternidad metafísica, sino a antigüedad remota. «De antiguo» refleja bien ese matiz y mantiene la conexión con la lectura alternativa inglesa «of old».
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en alto grado: la diferencia principal está en la elección española de un verbo más natural («me hizo habitar») frente a la alternativa más literal «me hizo sentar». Se preserva la imagen de confinamiento en tinieblas y la antigüedad de los muertos sin añadir interpretación doctrinal.'
  spanish_consistency_notes:
  - Se usa «tinieblas» para conservar el plural intensivo del hebreo y el tono poético del lamento.
  - Se evita «SEÑOR» o cualquier sustitución reverencial porque el versículo no contiene el nombre divino.
  - «Muertos de antiguo» mantiene la ambigüedad temporal de עוֹלָם sin sugerir eternidad.
