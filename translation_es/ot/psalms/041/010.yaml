    issue: La línea principal usa 'el hombre de mi paz' para אִישׁ שְׁלוֹמִי.
    rationale: Aunque literalmente defendible, resulta un calco poco natural en español y no sigue la decisión documentada del POB de poner el equivalente idiomático en el texto principal y la literalidad en nota.
  - severity: medium
    issue: Falta la nota de referencia cruzada a Juan 13:18.
    rationale: El audit trail inglés preserva explícitamente la resonancia canónica sin cargarla en el texto principal; debe mantenerse también en español.
  - severity: low
    issue: La nota b está redactada con comillas y formato torpes, y la línea principal dice 'comía de mi pan'.
    rationale: La formulación puede limpiarse para mayor naturalidad editorial; además, 'comía mi pan' se ajusta mejor a la literalidad destacada por la nota.
