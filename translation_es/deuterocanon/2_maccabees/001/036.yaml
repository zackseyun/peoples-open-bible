translation:
  language: es
  text: Y los hombres que estaban con Nehemías llamaron a esto Neftar, que se traduce «Purificación»; pero la mayoría lo llama Neftí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
