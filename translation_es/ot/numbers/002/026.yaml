translation:
  language: es
  text: 'y su división[a], los contados de entre ellos[b]: sesenta y dos mil setecientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y su ejército’ o ‘y su hueste’. El hebreo צָבָא puede denotar una fuerza militar o una compañía organizada; en este contexto censal, ‘división’ refleja mejor el contingente tribal ordenado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘y los contados de ellos’. La expresión se refiere al total censado de entre ese grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: and his division
  chosen_spanish: y su división
  alternatives_spanish:
  - y su ejército
  - y su hueste
  - y su compañía
  lexicon: HALOT
  rationale: צָבָא puede significar ‘ejército’ o ‘hueste’, pero en Números 1–2 el contexto es el del ordenamiento censal y del campamento tribal. ‘División’ comunica mejor en español la idea de un contingente organizado sin introducir la imagen de un ejército permanente ajena al pasaje.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los registrados de ellos
  alternatives_spanish:
  - los contados de ellos
  - los censados de ellos
  - los enlistados de ellos
  lexicon: HALOT
  rationale: El sustantivo derivado de פקד en este contexto apunta a los que fueron contados en el censo. ‘Los registrados de ellos’ conserva el sentido de personas inscritas o contadas y mantiene la relación con el grupo anterior, sin volver demasiado pesada la frase en español.
- source_word: שְׁנַיִם וְשִׁשִּׁים אֶלֶף וּשְׁבַע מֵאוֹת
  english_pob_choice: sixty-two thousand seven hundred
  chosen_spanish: sesenta y dos mil setecientos
  alternatives_spanish:
  - dos y sesenta mil y setecientos
  lexicon: HALOT
  rationale: Los numerales hebreos se expresan en el orden natural del español contemporáneo para preservar con claridad la cantidad exacta sin una construcción artificial.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantiene el texto sin cambios y confirma alta concordancia; la versión española sigue esa lectura estable, con adaptación idiomática mínima para naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene ‘división’ para צָבָא, coherente con el contexto de campamento y censo en Números 1–2.
  - Se conserva la referencia censal de פקד con ‘registrados’, evitando una paráfrasis teológica o eclesiástica.
  - La cifra se presenta con el orden numérico normal del español y sin añadir elementos interpretativos.
