  to: Y Aarón pondrá ambas manos sobre la cabeza del macho cabrío vivo, y confesará sobre él todas las iniquidades de los hijos[a] de Israel, y todas sus transgresiones, todos sus pecados; y los pondrá sobre la cabeza del macho cabrío, y lo enviará al desierto por mano de un hombre designado para esta tarea[b].
  rationale: Se corrigió 'las pondrá' a 'los pondrá' para una referencia más natural al conjunto de culpas/pecados en español. También se reemplazó la nota [a] para alinearla con la alternativa léxica documentada en el POB inglés para 'hijos de Israel', eliminando una nota innecesaria sobre 'macho cabrío vivo'. Se mantuvo 'por mano de' por fidelidad al idiomatismo hebreo, con la nota explicativa correspondiente.
