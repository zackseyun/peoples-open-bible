- from: Pero ellos no sabían que José estaba escuchando[a], porque el intérprete estaba entre ellos.
  to: Pero ellos no sabían que José los entendía[a], porque el intérprete estaba entre ellos.
  rationale: Se ajusta שֹׁמֵעַ a «los entendía» para expresar en español el sentido contextual de comprensión que la escena exige, sin perder la alternativa más literal en nota. También se normaliza la redacción de la nota al pie.
