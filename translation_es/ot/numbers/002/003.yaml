revisions:
- from: Los que acampen al lado oriental[a], hacia el nacimiento del sol, serán el estandarte[b] del campamento de Judá, según sus divisiones[c]; y el jefe de los hijos de Judá será Nahsón hijo de Amminadab.
  to: Los que acampan en el lado oriental[a], hacia la salida del sol, serán el estandarte[b] del campamento de Judá, según sus divisiones[c]; y el jefe de los hijos de Judá será Nahsón hijo de Amminadab.
  rationale: Se ajusta el participio sustantivado hebreo con «Los que acampan», que es más fiel y natural que «Los que acampen»; se mejora levemente la fluidez de la expresión direccional con «hacia la salida del sol»; y se corrige la nota [b] para que sea coherente con el texto principal y con la decisión auditada sobre דֶּגֶל.
