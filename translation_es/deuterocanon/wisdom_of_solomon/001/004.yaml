review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: conserva el contraste ‘alma/cuerpo’, la entrada de la sabiduría y su residencia duradera, y reproduce adecuadamente la fuerza moral de κακότεχνον con ‘que trama el mal’ y de κατάχρεῳ ἁμαρτίας con ‘esclavizado al pecado’. Sin embargo, una nota léxica contiene un anglicismo claro (‘liable’) y conviene pulirla para fidelidad y naturalidad en español.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial moderno. ‘Porque’ funciona, aunque el versículo aislado también admitiría ‘pues’; no es necesario cambiarlo. La frase ‘alma que trama el mal’ suena idiomática y fiel. El único problema relevante es de calidad en las notas: ‘liable al pecado’ no es español natural; además, una alternativa más idiomática es ‘propenso al pecado’ o mantener ‘sujeto al pecado’.'
  glossary_alignment: No hay términos del glosario mayor en conflicto. ‘Sabiduría’, ‘alma’, ‘cuerpo’ y ‘pecado’ están bien. La decisión ‘esclavizado al pecado’ está alineada con el audit trail inglés que intensifica κατάχρεῳ como sujeción al dominio del pecado. No se detectan conflictos con Yahvé/Mesías/Cristo u otros defaults del proyecto.
  issues:
  - severity: medium
    issue: 'Anglicismo en la nota [b]: ‘liable al pecado’'
    rationale: ‘Liable’ no es español y rompe la legibilidad. Debe sustituirse por una alternativa española natural que preserve la gama semántica documentada, p. ej. ‘propenso al pecado’ o ‘expuesto al pecado’, aunque ‘sujeto al pecado’ y ‘endeudado con el pecado’ ya cubren mejor el campo.
  - severity: low
    issue: 'Error tipográfico en metadatos léxicos: ‘que maquin a el mal’'
    rationale: No afecta el texto bíblico ni las notas publicables, pero muestra descuido en el registro de alternativas. No requiere adjudicación compleja.
  revised_spanish_text: Porque la sabiduría no entrará en un alma que trama el mal[a], ni habitará en un cuerpo esclavizado al pecado[b].
  revised_footnotes:
  - marker: a
    text: O ‘que maquina el mal’, ‘astuta para el mal’ o, más literalmente, ‘experta en el mal’.
    reason: lexical_alternative
  - marker: b
    text: O ‘sujeto al pecado’, ‘propenso al pecado’ o ‘endeudado con el pecado’. El griego describe un cuerpo bajo la reclamación o el dominio del pecado.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y al audit trail inglés. Solo se corrige la nota [b] para eliminar el anglicismo ‘liable’ y reemplazarlo por una alternativa española natural. También se normaliza la ortografía de ‘que maquina el mal’ en la nota [a].
