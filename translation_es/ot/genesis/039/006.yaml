    text: 'Hebreo: «en la mano de José»; la imagen de «mano» expresa encargo o control.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sabía nada con él»; el hebreo usa una expresión idiomática que puede implicar que no se ocupaba de nada de lo suyo bajo la gestión de José.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el pan que comía»; aquí «pan» probablemente significa comida en general.'
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula idiomática central para que el español comunique el sentido contextual sin borrar por completo la forma hebrea; por eso se mantiene «con él» y se traslada la literalidad más estricta a nota. También se cambia «pan» por «comida» en el texto principal, con nota que preserva el hebreo literal y su valor metonímico. Finalmente, se mejora levemente la naturalidad de la descripción final de José sin perder el paralelismo entre figura y apariencia.
