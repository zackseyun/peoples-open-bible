translation:
  language: es
  text: 'Habla a Aarón y a sus hijos y a todos los hijos de Israel[a], y les dirás: «Este es el asunto que Yahvé ha mandado[b], diciendo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los israelitas»; tradicionalmente, «todos los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: «Este es el asunto» también puede rendirse «Esta es la palabra» o «Esta es la cosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo piel de דבר introduce una orden directa. En español, «Habla» conserva la fuerza formal y natural del mandato sin volverlo explicativo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La preposición direccional estándar en español es «a», que reproduce con naturalidad el valor de יעד/dirigido a.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos
  - sus varones
  lexicon: HALOT
  rationale: El hebreo tiene un sustantivo masculino plural con sufijo de tercera persona, referido aquí a los descendientes sacerdotales de Aarón. «Sus hijos» mantiene el vínculo familiar y es idiomático en español; «sus varones» sería demasiado interpretativo.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  - todos los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma heredada בני ישראל como designación colectiva. «Hijos de Israel» refleja la estructura del hebreo sin neutralizarla; «israelitas» sería más fluido pero menos cercano al texto.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles
  - y dirás a ellos
  lexicon: HALOT
  rationale: La secuencia coordina otro mandato. En español, «y diles» conserva la directividad y evita una construcción menos natural como «y dirás a ellos».
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esta es la cosa
  alternatives_spanish:
  - Esta es la cosa
  - Este es el asunto
  - Este es el dicho
  lexicon: HALOT
  rationale: El auditorio inglés revisó la opción desde «word» a «thing» para reflejar mejor דבר en esta fórmula. En español, «cosa» transmite el valor general de «thing/matter» de forma fiel, aunque algo más sobria que «asunto».
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha mandado
  - ha ordenado
  lexicon: HALOT
  rationale: צוה expresa una orden dada por autoridad. «Ha mandado» reproduce bien la fuerza imperativa y es natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» según la terminología base del proyecto en español, preservando el Tetragrámaton como nombre propio y no como título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo introduce la cita siguiente. «Diciendo» mantiene la fórmula hebrea de manera clara y formal en español.
theological_decisions:
- issue: Representación del nombre del pacto YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El texto hebreo usa יְהוָה. Conforme a la norma del proyecto en español, se conserva el nombre personal del pacto como «Yahvé», en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preservación de la expresión בני ישראל
  english_pob_reading: all the sons of Israel
  chosen_spanish_reading: todos los hijos de Israel
  alternative_spanish_readings:
  - todos los israelitas
  - todos los hijos de Israel
  rationale: La frase funciona como etnónimo convencional y mantiene una forma masculina plural en el hebreo. Se preserva la referencia familiar con «hijos» en vez de neutralizarla a «israelitas».
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que cambió «word» por «thing» para reflejar mejor זֶה הַדָּבָר en esta fórmula. Por eso la redacción española evita «palabra» y usa «cosa», con nota alternativa para «asunto» como equivalente contextual más natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en el texto principal.
  - Se conserva la estructura imperativa directa del hebreo con verbos breves en español.
  - No se diluye בני ישראל a una forma genérica sin marcar; la nota permite la alternativa idiomática «israelitas».
  - La cita se cierra con «diciendo» para reflejar לֵאמֹר como fórmula introductoria.
