  text: ⸀διότι καὶ ἐν ἑτέρῳ λέγει· Οὐ δώσεις τὸν ὅσιόν σου ἰδεῖν διαφθοράν·
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/035.yaml
  text: Therefore he also says in another psalm[c][b][a], ‘You will not let your Holy One see decay.’
  footnotes:
  - marker: a
    text: Or 'in another place' or 'in another passage'; Greek simply says 'in another.'
