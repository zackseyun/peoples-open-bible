translation:
  language: es
  text: Y ustedes mismas saben que he servido a su padre con todas mis fuerzas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''he trabajado para su padre''. El verbo hebreo puede significar ''servir'' o ''trabajar'', y ambos sentidos encajan con los años de labor de Jacob bajo Labán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֵּנָה
  english_pob_choice: And you yourselves
  chosen_spanish: Y ustedes mismas
  alternatives_spanish:
  - Y ustedes
  - Pero ustedes
  lexicon: HALOT
  rationale: El pronombre independiente femenino plural añade énfasis. En español, 'ustedes mismas' conserva esa marca enfática y mantiene la referencia a Raquel y Lea; 'y' refleja el enlace simple del hebreo.
- source_word: יְדַעְתֶּן
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - conocen
  lexicon: HALOT
  rationale: El perfecto qal puede expresar un estado presente. En español, el presente 'saben' suena natural y conserva la fuerza de conocimiento actual compartido.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que ellas saben; 'que' reproduce mejor la estructura subordinante del hebreo.
- source_word: בְּ/כָל כֹּחִי
  english_pob_choice: with all my strength
  chosen_spanish: con todas mis fuerzas
  alternatives_spanish:
  - con todo mi poder
  - con todas mis capacidades
  lexicon: HALOT
  rationale: כֹּחַ puede ser fuerza, poder o capacidad. En este contexto de trabajo, 'fuerzas' expresa bien el esfuerzo total y es idiomático en español.
- source_word: עָבַדְתִּי
  english_pob_choice: have served
  chosen_spanish: he servido
  alternatives_spanish:
  - he trabajado para
  - he laborado para
  lexicon: HALOT
  rationale: עבד puede significar 'servir' o 'trabajar'. 'He servido' conserva el vínculo relacional con el padre de ellas y el matiz de servicio/labor, sin perder naturalidad en español.
- source_word: אֶת אֲבִי/כֶן
  english_pob_choice: your father
  chosen_spanish: a su padre
  alternatives_spanish:
  - para su padre
  - a vuestro padre
  lexicon: HALOT
  rationale: El marcador de objeto directo con 'su padre' se vierte naturalmente en español con 'a'. Se prefiere 'su' por el uso de ustedes en español latinoamericano, manteniendo la referencia a la segunda persona plural femenina.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones sustantivas; se mantiene la equivalencia óptima con el matiz verbal preservado mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el matiz de עבד con 'he servido' y se documenta la alternativa 'he trabajado para' en nota.
  - Se usa 'ustedes' por el español latinoamericano neutral; 'mismas' conserva el énfasis del pronombre hebreo independiente femenino plural.
