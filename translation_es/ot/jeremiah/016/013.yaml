revisions:
- from: Así que los expulsaré[a] de esta tierra hacia una tierra que ni ustedes ni sus padres[b] han conocido, y allí servirán[c] a otros dioses día y noche, porque no les mostraré favor[d].
  to: Y los expulsaré[a] de esta tierra a una tierra que ni ustedes ni sus padres[b] han conocido, y allí servirán[c] a otros dioses día y noche, porque no les mostraré favor[d].
  rationale: Se reemplaza «Así que» por «Y» para evitar un matiz inferencial añadido y ajustarse mejor al enlace hebreo. Se cambia «hacia una tierra» por «a una tierra» para un español más natural y para expresar mejor el destino del exilio. Se conservan las demás decisiones, que son fieles al hebreo y al rastro de auditoría inglés.
  reviewer_model: gpt-5.4
