translation:
  language: es
  text: Los trató conforme a sus pecados, porque los abandonó en manos de quienes prevalecían sobre ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los que los vencían» / «de los que se imponían sobre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - de acuerdo con
  lexicon: BDAG
  rationale: κατὰ marca correspondencia o medida. «Según» conserva de modo natural en español la idea de que el trato recibido correspondió a sus pecados, sin perder el matiz judicial.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - transgresiones
  - faltas
  lexicon: BDAG
  rationale: El sentido moral ordinario es el más transparente aquí. «Pecados» corresponde directamente al valor común de ἁμαρτίας y suena natural en español bíblico actual.
- source_word: ἐποίησεν αὐτοῖς
  english_pob_choice: he dealt with them
  chosen_spanish: Él les hizo
  alternatives_spanish:
  - Él actuó con ellos
  - Él los trató
  lexicon: BDAG
  rationale: El griego es literalmente «hizo a ellos». En español, «les hizo» conserva la crudeza de la construcción breve y deja visible el juicio ejecutado; «los trató» sería más idiomático pero suaviza el golpe del original.
- source_word: ἐγκατέλειπεν
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - los dejó
  - los desamparó
  lexicon: BDAG
  rationale: El verbo expresa dejar a alguien expuesto o desamparado. «Abandonó» comunica esa fuerza en español moderno sin caer en arcaísmo.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - entregado a
  lexicon: BDAG
  rationale: La imagen bíblica de entregar a alguien al poder de otro se conserva bien con «en manos de». Es la forma más directa y reconocible en español.
- source_word: κατισχυόντων
  english_pob_choice: those who prevailed over them
  chosen_spanish: los que prevalecían sobre ellos
  alternatives_spanish:
  - los que los vencían
  - los que los dominaban
  lexicon: BDAG
  rationale: El participio indica quienes están prevaleciendo o imponiéndose sobre ellos. «Prevalecían sobre ellos» mantiene el valor verbal y evita reducir el término a una simple descripción estática de fuerza.
theological_decisions:
- issue: Relación lógica entre el juicio y el abandono
  english_pob_reading: He dealt with them according to their sins, because he abandoned them into the hands of those who prevailed over them.
  chosen_spanish_reading: Él les hizo según sus pecados, porque los abandonó en manos de los que prevalecían sobre ellos.
  alternative_spanish_readings:
  - Él les hizo según sus pecados, pues los abandonó en manos de los que prevalecían sobre ellos.
  - Él les hizo según sus pecados; al abandonarlos en manos de los que prevalecían sobre ellos.
  rationale: 'Se mantiene la conexión causal/epexegética tal como quedó en la revisión inglesa más reciente: el abandono en manos enemigas expresa la ejecución del juicio, no una causa previa separada. «Porque» reproduce la lectura final del audit trail sin forzar una causalidad doctrinalmente incorrecta.'
  doctrine_reference: Gobierno judicial de Dios; retribución conforme a los pecados.
translation_notes:
  revision_awareness: El español sigue la última revisión inglesa en la conexión causal con «porque» y en la dinámica de κατισχυόντων, pero conserva la imaginería bíblica de «en manos de». Se evita traducir ἐποίησεν αὐτοῖς con una paráfrasis demasiado suave para no perder la dureza del juicio implícito en el griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Pecados» se mantuvo por transparencia y porque no hay indicio contextual de un matiz técnico distinto.
  - La expresión «en manos de» conserva la metáfora bíblica estándar sin convertirla en abstracción.
  - Se prefirió el imperfecto «prevalecían» para reflejar la idea de acción/enfrentamiento en curso que el participio puede sugerir en español.
