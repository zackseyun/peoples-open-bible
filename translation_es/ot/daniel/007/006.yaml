translation:
  language: es
  text: Después de esto seguí mirando[a], y he aquí, otro, semejante a un leopardo; tenía cuatro alas de ave sobre su lomo, y la bestia tenía cuatro cabezas, y se le dio dominio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre sus lados'; la expresión aramea puede referirse al lomo o a la parte superior del cuerpo de la criatura en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאתַר דְּנָה
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de aquello
  - Luego de esto
  lexicon: HALOT
  rationale: La expresión aramea introduce la siguiente escena de la visión; 'Después de esto' conserva la secuencia narrativa de manera natural en español.
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept looking
  chosen_spanish: seguí mirando
  alternatives_spanish:
  - estaba mirando
  - seguí observando
  lexicon: HALOT
  rationale: La forma durativa pide una acción continua en pasado. 'Seguí mirando' comunica mejor la prolongación de la observación que un simple 'vi'.
- source_word: וַאֲרוּ
  english_pob_choice: and behold
  chosen_spanish: y vi, he aquí
  alternatives_spanish:
  - y he aquí
  - y miré, y he aquí
  lexicon: HALOT
  rationale: En español, 'he aquí' conserva la función deíctica y visionaria, mientras que 'y vi' evita un calco demasiado duro y enlaza bien con el flujo narrativo.
- source_word: אָחֳרִי
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - uno diferente
  lexicon: HALOT
  rationale: Se refiere a otra bestia dentro de la secuencia; 'otro' es la opción más natural y breve en español.
- source_word: כִּנְמַר
  english_pob_choice: like a leopard
  chosen_spanish: semejante a un leopardo
  alternatives_spanish:
  - como un leopardo
  - parecido a un leopardo
  lexicon: HALOT
  rationale: El כ comparativo pide una comparación directa. 'Semejante a un leopardo' mantiene el carácter de símil sin sonar forzado.
- source_word: גַּפִּין אַרְבַּע
  english_pob_choice: four wings
  chosen_spanish: cuatro alas
  alternatives_spanish:
  - cuatro alas
  lexicon: HALOT
  rationale: '''Alas'' es el equivalente normal de גַּפִּין en este contexto simbólico.'
- source_word: דִּי עוֹף
  english_pob_choice: of a bird
  chosen_spanish: de ave
  alternatives_spanish:
  - de un ave
  - de pájaro
  lexicon: HALOT
  rationale: La relación genitiva especifica el tipo de alas. 'De ave' es breve, idiomático y preserva el registro elevado.
- source_word: עַל גביּה
  english_pob_choice: on its back
  chosen_spanish: sobre su lomo
  alternatives_spanish:
  - sobre su espalda
  - en su dorso
  lexicon: HALOT
  rationale: El término arameo puede referirse a la espalda o superficie superior. 'Sobre su lomo' comunica bien esa ubicación en español y mantiene la imagen corporal del animal.
- source_word: וְאַרְבְּעָה רֵאשִׁין
  english_pob_choice: and ... had four heads
  chosen_spanish: y la bestia tenía cuatro cabezas
  alternatives_spanish:
  - y cuatro cabezas tenía la bestia
  - y con cuatro cabezas
  lexicon: HALOT
  rationale: La cláusula sin verbo se vuelve natural en español con un verbo implícito. Repetir 'tenía' preserva la descripción clara sin alterar el sentido.
- source_word: לְחֵיוְתָא
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - este animal
  - la criatura
  lexicon: HALOT
  rationale: Daniel 7 usa consistentemente 'bestia' para estas figuras simbólicas; mantenerlo conserva la coherencia terminológica del capítulo.
- source_word: שָׁלְטָן
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - poder
  - autoridad
  - soberanía
  lexicon: HALOT
  rationale: '''Dominio'' reproduce bien el campo semántico de gobierno/poder de mando en el marco apocalíptico y se alinea con la opción inglesa auditada.'
- source_word: יְהִיב לַהּ
  english_pob_choice: was given to it
  chosen_spanish: se le dio
  alternatives_spanish:
  - le fue dado
  - se le concedió
  lexicon: HALOT
  rationale: El pasivo conserva la indeterminación del agente en el texto. En español, 'se le dio' es natural y no explicita más de lo que el verso dice.
theological_decisions:
- issue: Agente implícito al dar el dominio
  english_pob_reading: was given to it
  chosen_spanish_reading: se le dio
  alternative_spanish_readings:
  - le fue dado por Dios
  - Dios le dio dominio
  rationale: El verso afirma que el dominio fue otorgado, pero no nombra al dador. La traducción española mantiene esa reserva teológica en vez de resolverla en el texto principal.
  doctrine_reference: Preservar la reserva del texto sobre el agente del otorgamiento
translation_notes:
  revision_awareness: El draft sigue de cerca el estado auditado más reciente, que no introdujo cambios respecto de la versión inglesa base. Se mantuvo la equivalencia óptima y la reserva teológica sobre el otorgante del dominio, con una nota para la posible amplitud de עַל גביּה.
  spanish_consistency_notes:
  - Se conserva 'bestia' para mantener la terminología uniforme de Daniel 7.
  - '''Dominio'' se usa de forma consistente con el registro apocalíptico del capítulo.'
  - Se evita introducir 'Cristo', 'SEÑOR' o formulaciones interpretativas ajenas al verso.
  - La nota[a] marca la única ambigüedad lexical documentada en el texto de origen.
