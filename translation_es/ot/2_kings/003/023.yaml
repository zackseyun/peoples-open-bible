  to: 'Y dijeron[a]: «¡Esto es sangre! Los reyes sin duda han peleado entre sí y se han abatido unos a otros. Ahora, Moab[b], ¡al botín!»'
  rationale: 'Se ajusta la cláusula central para que el español suene natural y conserve mejor el sentido contextual documentado por la POB inglesa: combate mutuo con resultado letal o devastador aparente, no mera herida. «Sin duda» refleja el énfasis con mejor idiomaticidad que «ciertamente» en esa posición, y «se han abatido unos a otros» comunica mejor la fuerza militar de וַיַּכּוּ en contexto. Se conservan la exclamación inicial, la arenga final y las notas alternativas relevantes.'
