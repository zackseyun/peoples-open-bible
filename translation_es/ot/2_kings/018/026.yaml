translation:
  language: es
  text: 'Entonces Eliacim hijo de Hilquías, y Sebna, y Joaj dijeron al Rabsaqué: «Por favor, habla a tus siervos en arameo, porque lo entendemos. Y no nos hables en judaíta[a], a oídos del pueblo que está sobre el muro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en hebreo». El término hebreo es יְהוּדִית, literalmente «judaíta», y se refiere a la lengua de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said to
  chosen_spanish: Entonces ... dijeron a
  alternatives_spanish:
  - Y ... dijeron a
  lexicon: WLC / HALOT
  rationale: La forma narrativa con waw-consecutiva avanza la acción; «Entonces» mantiene la secuencia con naturalidad en español.
- source_word: אֶלְיָקִים בֶּן חִלְקִיָּהוּ
  english_pob_choice: Eliakim son of Hilkiah
  chosen_spanish: Eliacim hijo de Hilquías
  alternatives_spanish:
  - Eliakim hijo de Hilquías
  lexicon: WLC / HALOT
  rationale: Se mantiene el nombre propio en forma española usual y el parentesco con «hijo de», fiel al hebreo בֶּן.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el Rabshakeh
  - el copero mayor
  - el jefe de campo
  lexicon: HALOT
  rationale: Se conserva el título como designación tradicional transliterada, evitando una reconstrucción demasiado segura del cargo exacto.
- source_word: דַּבֶּר נָא
  english_pob_choice: Please speak
  chosen_spanish: Por favor, habla
  alternatives_spanish:
  - Habla, por favor
  lexicon: HALOT
  rationale: La combinación del imperativo con נָא expresa una petición cortés; «Por favor» reproduce bien ese matiz en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: En este contexto diplomático y deferente, עבד funciona como fórmula de humillación cortés; «siervos» conserva el registro sin cargar la dureza de «esclavos».
- source_word: אֲרָמִית
  english_pob_choice: in Aramaic
  chosen_spanish: en arameo
  alternatives_spanish:
  - en la lengua aramea
  - en idioma arameo
  lexicon: HALOT
  rationale: La forma adverbial indica idioma; «en arameo» es la equivalencia natural y precisa.
- source_word: כִּי שֹׁמְעִים אֲנָחְנוּ
  english_pob_choice: for we understand it
  chosen_spanish: porque lo entendemos
  alternatives_spanish:
  - porque oímos
  - porque estamos oyendo
  lexicon: HALOT
  rationale: שׁמע puede significar oír o entender; aquí la petición por idioma exige el sentido de comprensión, y el pronombre «lo» retoma el arameo implícito.
- source_word: וְאַל תְּדַבֵּר עִמָּנוּ
  english_pob_choice: And do not speak with us
  chosen_spanish: Y no nos hables
  alternatives_spanish:
  - Y no hables con nosotros
  lexicon: WLC / HALOT
  rationale: Se conserva la negación fuerte y la relación directa del verbo de habla con el interlocutor, de manera natural en español.
- source_word: יְהוּדִית
  english_pob_choice: Judean
  chosen_spanish: judeo
  alternatives_spanish:
  - en judeo
  - en hebreo
  - en la lengua de Judá
  lexicon: HALOT
  rationale: El término hebreo denomina la lengua de Judá; se prefiere una forma breve que refleje la referencia lingüística sin decidir de forma cerrada si se trata de «hebreo» en sentido técnico.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en oídos de
  alternatives_spanish:
  - a oídos de
  - ante el oído de
  lexicon: HALOT
  rationale: La construcción idiomática hebrea literalmente dice «en los oídos de»; «en oídos de» conserva la imagen auditiva de forma comprensible en español.
- source_word: הָעָם אֲשֶׁר עַל הַחֹמָה
  english_pob_choice: the people who are on the wall
  chosen_spanish: el pueblo que está sobre el muro
  alternatives_spanish:
  - la gente que está sobre el muro
  - el pueblo que está en la muralla
  lexicon: HALOT
  rationale: Se conserva «el pueblo» porque el hebreo no especifica soldados; «sobre el muro» mantiene la imagen espacial del texto.
theological_decisions:
- issue: יְהוּדִית como designación lingüística
  english_pob_reading: '''Judean'' refers to the language of Judah, not necessarily classical Hebrew as a technical linguistic label.'
  chosen_spanish_reading: judeo/judeo- como referencia a la lengua de Judá, sin identificarla automáticamente con el hebreo técnico.
  alternative_spanish_readings:
  - hebreo
  - la lengua de Judá
  - judean
  rationale: El contexto muestra una petición sobre idioma, no sobre etnicidad. Se evita fijar una equivalencia técnica más fuerte de la que el texto sustenta, manteniendo la tensión entre «Judean» y «Hebrew» en la tradición de traducción.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la decisión auditada del POB en inglés. Se adoptó «en el hearing of» como «en oídos de» / «en oídos del pueblo» en sentido idiomático, pero se mantuvo la imagen auditiva del hebreo. También se preserva la cautela lexical respecto de יְהוּדִית, en línea con la nota inglesa que deja abierta la alternativa «hebreo».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - «Rabsaqué» se usa como transliteración estable del título.
  - Se evitó «esclavos» para עֲבָדֶיךָ porque el contexto es diplomático y de deferencia.
  - Se preservó «judeo» con nota para reflejar la tensión lexical documentada por el POB en inglés.
