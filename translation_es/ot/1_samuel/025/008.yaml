translation:
  language: es
  text: Pregunta a tus jóvenes, y ellos te lo dirán. Que los jóvenes hallen favor[a] ante tus ojos, porque hemos venido en un día bueno[b]. Te ruego que des lo que tu mano encuentre para tus siervos y para tu hijo David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «gracia». Heb. חֵן: la expresión conserva la imagen de hallar favor o gracia ante los ojos de alguien.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «un día bueno». El contexto es el del esquileo, una ocasión socialmente alegre, pero el hebreo no lo explicita aquí.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁאַל
  english_pob_choice: Ask
  chosen_spanish: Pregunta
  alternatives_spanish:
  - Pregunta a
  - Consulta a
  lexicon: HALOT
  rationale: El imperativo pide consultar a los propios jóvenes de Nabal. En español, «Pregunta» conserva la fuerza directa y suena natural sin añadir matices no presentes en el hebreo.
- source_word: נְעָרֶיךָ
  english_pob_choice: your young men
  chosen_spanish: tus jóvenes
  alternatives_spanish:
  - tus siervos
  - tus muchachos
  - tus atendientes
  lexicon: HALOT
  rationale: נַעַר puede abarcar joven, servidor o atendiente. «Tus jóvenes» mantiene el vínculo léxico con הַנְּעָרִים más adelante y evita especificar un estatus que el contexto no obliga a fijar.
- source_word: וְיַגִּידוּ לָךְ
  english_pob_choice: and they will tell you
  chosen_spanish: y ellos te lo dirán
  alternatives_spanish:
  - y te informarán
  - y te reportarán
  lexicon: HALOT
  rationale: La forma causativa de נגד significa decir/declarar. «Te lo dirán» es idiomático en español y preserva la sencillez del enunciado.
- source_word: וְיִמְצְאוּ הַנְּעָרִים חֵן בְּעֵינֶיךָ
  english_pob_choice: Let the young men find favor in your eyes
  chosen_spanish: Que los jóvenes hallen gracia a tus ojos
  alternatives_spanish:
  - Que los jóvenes hallen favor ante tus ojos
  - Que los jóvenes encuentren gracia en tu mirada
  lexicon: HALOT
  rationale: La expresión hebrea מצא חן בעיני se rinde de modo más natural como «hallar gracia/favor». Se conserva la imagen de «a tus ojos» porque está bien atestiguada en el hebreo y el POB inglés la retuvo.
- source_word: כִּי עַל יוֹם טוֹב בָּנוּ
  english_pob_choice: for we have come on a good day
  chosen_spanish: porque hemos venido en un día bueno
  alternatives_spanish:
  - porque hemos venido en un día favorable
  - porque hemos venido en un día festivo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «un día bueno». Aunque el contexto es festivo por el esquileo, la redacción principal conserva la formulación directa sin expandirla interpretativamente.
- source_word: תְּנָה נָּא
  english_pob_choice: Please give
  chosen_spanish: Te ruego que des
  alternatives_spanish:
  - Por favor, da
  - Te suplico que des
  lexicon: HALOT
  rationale: La partícula נָא expresa súplica cortés. «Te ruego que des» comunica bien la petición respetuosa y suena más natural en español que un imperativo desnudo.
- source_word: אֵת אֲשֶׁר תִּמְצָא יָדְךָ
  english_pob_choice: whatever your hand finds
  chosen_spanish: lo que tu mano encuentre
  alternatives_spanish:
  - lo que puedas dar
  - lo que tu mano halle
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la mano como agente de provisión o disponibilidad. En español, la imagen sigue siendo transparente y evita borrar la tensión entre literalidad e idiomatismo.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: to your servants
  chosen_spanish: para tus siervos
  alternatives_spanish:
  - para tus servidores
  - para tus esclavos
  lexicon: HALOT
  rationale: עֶבֶד puede ser esclavo o siervo. Aquí el discurso deferente de David ante Nabal favorece «siervos» como término leído en español bíblico sin forzar la dureza social que el contexto no enfatiza.
- source_word: וּלְבִנְךָ לְדָוִד
  english_pob_choice: and to your son David
  chosen_spanish: y para tu hijo David
  alternatives_spanish:
  - y para David, tu hijo
  - y para tu hijo, David
  lexicon: HALOT
  rationale: David se designa humildemente como «tu hijo», una forma retórica de deferencia. En español, «tu hijo David» preserva esa relación retórica y la fluidez de la frase.
theological_decisions:
- issue: Tratamiento de יוֹם טוֹב en un contexto de esquileo con tono de celebración.
  english_pob_reading: for we have come on a good day
  chosen_spanish_reading: porque hemos venido en un día bueno
  alternative_spanish_readings:
  - porque hemos venido en un día festivo
  - porque hemos venido en un día favorable
  rationale: El POB inglés revisó la ampliación explicativa «festive day» y volvió a una forma más cercana al hebreo. En español conviene seguir esa decisión y dejar que el contexto narrativo del esquileo sugiera el matiz celebrativo sin sobretraducirlo.
  doctrine_reference: Ninguna; decisión de matiz contextual y no doctrinal.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del POB inglés: se retiró cualquier expansión interpretativa tipo «festive day» y se mantuvo «good day»/«día bueno» como reflejo más cercano del hebreo. También preservé la metáfora de «la mano» y la deferencia retórica de «tu hijo David».'
  spanish_consistency_notes:
  - He usado «gracia» para חֵן con nota alternativa «favor», manteniendo la tensión léxica que el hebreo permite.
  - He evitado «SEÑOR» o equivalentes, ya que no aparece el nombre divino en este versículo.
  - «Siervos» refleja el registro deferente del diálogo y mantiene coherencia con la terminología POB cuando δοῦλος/עֶבֶד no exige «esclavo».
  - La estructura general sigue de cerca el hebreo para conservar el paralelismo entre «tus jóvenes» y «los jóvenes», y entre «tu mano» y lo que puede ofrecer.
