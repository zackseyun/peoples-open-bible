base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/031/005.yaml
  text: One who eagerly pursues gain will not go unpunished[c][b][a], and one who loves profit will go astray by it.
  footnotes:
  - marker: a
    text: 'The surviving Hebrew reads a saying about pursuing gain and loving profit. The Greek parallel at this verse instead reads: ''Divinations and omens and dreams are vain, and the heart imagines like that of a woman in labor.'' This appears to reflect a substantially different textual tradition.'
    reason: textual_variant
  - marker: b
    text: Or 'gold/wealth' for 'gain' in the first line; the Hebrew term may denote material wealth more specifically.
    reason: lexical_alternative
  - marker: c
    text: Or 'price/payment' for 'profit' in the second line.
    reason: lexical_alternative
