id: LUK.6.21
reference: Luke 6:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μακάριοι οἱ πεινῶντες νῦν, ὅτι χορτασθήσεσθε. μακάριοι οἱ κλαίοντες νῦν, ὅτι γελάσετε.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/021.yaml
  text: Blessed are you who are hungry now[a], because you will be filled. Blessed are you who weep now[b], because you will laugh.
  footnotes:
  - marker: a
    text: Or 'Blessed are the hungry now ... Blessed are those who weep now.' The Greek uses articular participles, but the immediate context supports direct address.
    reason: alternative_reading
  - marker: b
    text: Or 'you will be satisfied.' The verb can denote being filled with food and, by extension, being fully satisfied.
    reason: lexical_alternative
translation:
  language: ko
  text: 지금 굶주린 자들이여, 복이 있다. 너희가 배부르게 될 것이기 때문이다. 지금 우는 자들이여, 복이 있다. 너희가 웃게 될 것이기 때문이다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 누가의 평지 설교 복과 화(6:20-26) — 마태와 다른 누가 고유의 사회·경제적 평행
  chosen_reading: 「가난한 자들」/「굶주린 자들」/「우는 자들」을 그대로 직역하고, 마태식 영적 보완(「심령이」)을 더하지 않는다. 24-26절 화도 동일 구조로 옮긴다
  alternative_readings:
  - 「심령이 가난한」으로 영성화
  - 「슬퍼하는 자」로 부드럽게
  rationale: 누가는 의도적으로 마태의 영적 보완을 제거하고 사회·경제적 역전을 직접 선포한다. 4중 복과 4중 화의 평행은 본문 구조 자체이며, 마리아의 송가(1:51-53)의 종말론적 역전과 직접 호응한다. 「가난한 자」 — 「부유한 자」, 「굶주린 자」 — 「배부른 자」, 「우는 자」 — 「웃는 자」, 「미움받는 자」 — 「칭찬받는 자」 대구를 한국어에서도 보존한다.
  doctrine_reference: 'DOCTRINE.md: Lukan socioeconomic reversal'
