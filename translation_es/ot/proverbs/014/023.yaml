- from: En todo trabajo hay ganancia[a], pero la charla de los labios solo lleva a la carencia.
  to: En todo trabajo hay ganancia[a], pero las palabras solo llevan a la carencia.
  rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se sustituye «la charla de los labios» por «las palabras» para reflejar de manera idiomática el modismo hebreo ‘palabra(s) de labios’, preservar el contraste con el trabajo real y mejorar la legibilidad en español sin paraprasear de más. La nota sobre «pobreza» se conserva porque representa una alternativa léxica documentada en el POB inglés.
