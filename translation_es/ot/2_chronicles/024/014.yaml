revisions:
- from: Cuando terminaron[a], trajeron delante del rey y de Joiada el resto de la plata, y con ella hizo utensilios para la casa de Yahvé, utensilios para el servicio[b] y para ofrecer[c], y tazones, y utensilios de oro y de plata. Y ofrecieron holocaustos en la casa de Yahvé continuamente, todos los días de Joiada.
  to: Cuando terminaron, llevaron ante el rey y Joiada el resto de la plata, y con ella hizo utensilios para la casa de Yahvé, utensilios para el servicio[b] y para ofrecer[c], y cuencos, y utensilios de oro y de plata[a]. Y ofrecían holocaustos en la casa de Yahvé continuamente, todos los días de Joiada.
  rationale: Se reubicó la nota [a] para reflejar la alternativa documentada del hebreo וַיַּעֲשֵׂהוּ. Se mejoró la naturalidad de «trajeron delante de» a «llevaron ante». Se cambió «tazones» por «cuencos» por mejor registro cultual en español general. Se usó «ofrecían» para expresar mejor el valor habitual/durativo de la cláusula final reforzada por תָּמִיד, sin introducir una paráfrasis extensa. Las notas [b] y [c] se conservaron por utilidad y fidelidad a las alternativas léxicas.
