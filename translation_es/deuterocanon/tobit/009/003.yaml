review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: διότι = «Porque», ὠμόμοκεν = «ha jurado», y μὴ ἐξελθεῖν με se transmite adecuadamente como prohibición/control sobre la salida de Tobías. Sin embargo, la nota alternativa española introduce una formulación poco fiel e infeliz («no hacer que salga»), que no corresponde bien al sentido documentado en el POB inglés («that I should not go out» / «not to let me leave»).'
  spanish_quality_summary: El texto principal es natural, claro y digno en español eclesial moderno. «Porque Ragüel ha jurado no dejarme salir» suena idiomático y conserva el matiz narrativo. La única reparación necesaria está en la nota, para ofrecer una alternativa formal comprensible y bien redactada.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. El nombre «Ragüel» es aceptable en español. La decisión «salir» preserva la base léxica de ἐξελθεῖν y coincide con la justificación del POB.
  issues:
  - severity: medium
    issue: La nota al pie usa «no hacer que salga» como alternativa.
    rationale: Esa frase no representa bien la construcción griega ni la alternativa inglesa auditada. Suena antinatural en español y cambia el matiz de impedir/prohibir por uno de causación.
  revised_spanish_text: Porque Ragüel ha jurado no dejarme salir[a].
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «que yo no salga». El griego usa «salir», pero en contexto se refiere a partir de la casa de Ragüel.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y natural en español. Solo se corrige la nota al pie para alinearla con la alternativa formal documentada en el POB inglés y evitar una formulación española poco idiomática y semánticamente desviada.
