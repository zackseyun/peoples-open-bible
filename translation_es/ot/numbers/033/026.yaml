  lexicon: HALOT
  rationale: En el contexto de la lista de jornadas del desierto, נסע expresa salir de un campamento y pasar al siguiente punto del recorrido. «Partieron» comunica ese desplazamiento de manera natural en español sin perder el valor itinerante del verbo.
- source_word: מִמַּקְהֵלֹת
  english_pob_choice: from Makheloth
  chosen_spanish: de Makelot
  alternatives_spanish:
  - de Makhelot
  - desde Makelot
  - desde Makhelot
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera en español. Se usa «de» para reflejar la preposición hebrea מִן en una fórmula de itinerario. La grafía «Makelot» mantiene una transliteración legible y breve en español.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y se acamparon
  - y establecieron campamento
  lexicon: HALOT
  rationale: חנה en este tipo de enumeración de etapas significa tomar campamento. «Acamparon» es idiomático y conserva el sentido de asentarse en el nuevo sitio.
- source_word: בְּתָחַת
  english_pob_choice: at Tahath
  chosen_spanish: en Tahat
  alternatives_spanish:
  - en Tahath
  - a Tahat
  - en el lugar llamado Tahat
  lexicon: HALOT
  rationale: También es un nombre de lugar; se translitera al español. La preposición hebrea בְּ se vierte aquí con «en», natural para indicar el sitio del campamento.
