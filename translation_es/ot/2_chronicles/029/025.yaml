translation:
  language: es
  text: Y colocó a los levitas en la casa de Yahvé con címbalos, arpas y liras, conforme al mandamiento de David, de Gad, el vidente[a] del rey, y de Natán el profeta[b]; porque el mandamiento era de Yahvé por medio de sus profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gad, el vidente del rey» usa «vidente» para reflejar el título hebreo חֹזֶה, distinto de «profeta», aunque estrechamente relacionado en función.
    reason: lexical_alternative
  - marker: b
    text: 'O más literalmente: «porque por la mano de Yahvé era el mandamiento, por la mano de sus profetas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: He stationed
  chosen_spanish: puso
  alternatives_spanish:
  - estacionó
  - estableció
  - colocó
  - designó
  lexicon: HALOT
  rationale: El hifil de עמד expresa causar que alguien ocupe su lugar para un servicio ordenado. En español, «puso» comunica de manera natural la acción de asignar/ubicar a los levitas para su función litúrgica sin introducir un tecnicismo innecesario.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el equivalente estándar del grupo tribal y cultual. «Levitas» es claro y fiel al referente bíblico.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: «Casa de Yahvé» sigue de cerca la expresión hebrea בֵּית יְהוָה y conserva la transparencia formal del original. «Templo» sería válido, pero menos pegado a la forma fuente.
- source_word: בִּמְצִלְתַּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con platillos
  - con címbalos metálicos
  lexicon: HALOT
  rationale: El instrumental בְּ indica medio o acompañamiento. «Címbalos» es la equivalencia estándar y mantiene el carácter musical del listado.
- source_word: בִּנְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - liras
  - salterios
  lexicon: HALOT
  rationale: El hebreo נבל designa un instrumento de cuerda; la equivalencia tradicional y más comprensible en español es «arpa». Se mantiene la distinción con כִנֹּרוֹת mediante «liras» para no colapsar dos instrumentos distintos.
- source_word: וּבְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: y liras
  alternatives_spanish:
  - y arpas
  lexicon: HALOT
  rationale: כִּנּוֹר suele identificarse como «lira». Traducirlo así evita fusionarlo con נבל y respeta la diferenciación instrumental del texto.
- source_word: בְּמִצְוַת
  english_pob_choice: according to the command of
  chosen_spanish: conforme al mandamiento de
  alternatives_spanish:
  - según el mandato de
  - de acuerdo con el mandamiento de
  lexicon: HALOT
  rationale: La frase preposicional expresa conformidad con una orden autorizada. «Conforme al mandamiento de» suena natural en español bíblico moderno y preserva la idea de ajuste a una instrucción previa.
- source_word: גָד חֹזֵה הַמֶּלֶךְ
  english_pob_choice: Gad the king’s seer
  chosen_spanish: Gad, vidente del rey
  alternatives_spanish:
  - Gad, el vidente del rey
  - Gad, el adivino del rey
  lexicon: HALOT
  rationale: חֹזֶה se distingue de נָבִיא y la POB inglesa eligió «seer» para reflejar esa diferencia. «Vidente» conserva esa tensión léxica en español sin confundirlo con el término más general «profeta».
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  lexicon: HALOT
  rationale: Título apposicional directo; «el profeta» es la equivalencia natural y fiel.
- source_word: בְיַד יְהוָה ... בְיַד נְבִיאָיו
  english_pob_choice: was from Yahweh through his prophets
  chosen_spanish: era de Yahvé por medio de sus profetas
  alternatives_spanish:
  - era de Yahvé mediante sus profetas
  - venía de Yahvé por medio de sus profetas
  - era por la mano de Yahvé por la mano de sus profetas
  lexicon: HALOT
  rationale: El idiomático hebreo «por la mano de» expresa agencia/mediación. En español, «por medio de» comunica con claridad tanto el origen último en Yahvé como la mediación profética, evitando una calca pesada pero sin borrar la relación de agencia.
- source_word: הַמִּצְוָה
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - la orden
  - el mandato
  lexicon: HALOT
  rationale: En este contexto narrativo cultual, «mandamiento» conserva el tono formal de una disposición autorizada. «Orden» o «mandato» también serían posibles, pero «mandamiento» mantiene mejor la resonancia bíblica del pasaje.
theological_decisions:
- issue: Autoridad divina detrás del orden litúrgico davídico
  english_pob_reading: The command concerning the musical arrangement is presented as ultimately from the LORD, mediated through his prophets.
  chosen_spanish_reading: El mandamiento para este arreglo musical se presenta como procedente de Yahvé y mediado por sus profetas.
  alternative_spanish_readings:
  - El arreglo musical fue solo una decisión davídica posterior atribuida a Dios
  - El mandamiento vino simplemente de David, Gad y Natán
  rationale: 'El hebreo final grounds the arrangement in Yahvé: el mandato no es solo preferencia humana ni mero arreglo real. La traducción conserva a David, Gad y Natán como agentes históricos, pero deja claro que la fuente última es Yahvé, con mediación profética.'
  doctrine_reference: Autoridad revelada y mediación profética; cf. el patrón bíblico de mandato divino comunicado por profetas.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios (pass mantenido sin modificaciones), y el consenso de revisión fue de alta concordancia. Esta versión española sigue ese estado estable, conservando la misma estructura semántica y las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se distingue «vidente» de «profeta» para reflejar חֹזֶה frente a נָבִיא.
  - «Casa de Yahvé» conserva la transparencia del hebreo frente a una posible expansión interpretativa como «templo».
  - La frase «por medio de» transmite la mediación de בְיַד sin perder el origen divino del mandamiento.
  - 'Los nombres propios y títulos se mantienen con ortografía española habitual: David, Gad, Natán.'
