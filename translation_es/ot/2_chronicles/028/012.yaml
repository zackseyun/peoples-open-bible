revisions:
- from: 'Entonces se levantaron unos hombres de los jefes de los hijos de Efraín: Azarías hijo de Jehohanán, Berequías hijo de Mesillemot, Ezequías hijo de Salum y Amasá hijo de Hadlai, contra los que venían del ejército.'
