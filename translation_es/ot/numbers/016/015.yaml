    reason: theological_note
  - marker: b
    text: 'O: «No consideres su ofrenda» o «No aceptes su ofrenda». El hebreo literalmente dice: «No te vuelvas hacia su ofrenda».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «No mires» por «No tomes en cuenta» para reflejar mejor el valor idiomático de פנה אל en una súplica cultual, manteniendo la nota con el literal hebreo y alternativas contextuales. También se corrige la redacción de la nota para evitar el menos natural «considérala».
