id: HOS.3.5
reference: Hosea 3:5
source:
  edition: WLC
  text: אַחַ֗ר יָשֻׁ֨בוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וּ/בִקְשׁוּ֙ אֶת יְהוָ֣ה אֱלֹהֵי/הֶ֔ם וְ/אֵ֖ת דָּוִ֣ד מַלְכָּ֑/ם וּ/פָחֲד֧וּ אֶל יְהוָ֛ה וְ/אֶל טוּב֖/וֹ בְּ/אַחֲרִ֥ית הַ/יָּמִֽים־־־׃פ
translation:
  text: Afterward the children of Israel will return and seek Yahweh their God and David their king[c][b][a], and they will come in fear to Yahweh and to his goodness in the latter days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they will fear the LORD and his goodness.' The Hebrew verb can be rendered 'fear' or, in this construction, 'come trembling toward.'
    reason: lexical_alternative
  - marker: b
    text: '''David their king'' may refer either to David as the representative royal figure or to a future Davidic ruler; the Hebrew leaves the expression unexpanded.'
    reason: alternative_reading
  - marker: c
    text: '''In the latter days'' is a prophetic expression that can also be rendered ''in the last days'' or ''in days to come.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר
  chosen: Afterward
  alternatives:
  - After this
  - Afterward
  lexicon: HALOT
  rationale: Temporal adverb marking what follows the preceding period of deprivation in vv. 3–4. 'Afterward' is idiomatic and preserves the forward-looking sequence.
- source_word: יָשֻׁבוּ
  chosen: will return
  alternatives:
  - will turn back
  - will repent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' Here the context includes covenant restoration, but 'return' preserves both spatial/covenantal nuance without over-interpreting as explicit repentance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the people of Israel
  - the sons of Israel
  lexicon: HALOT
  rationale: A standard Hebrew ethnonym. 'Children of Israel' preserves the familial/covenantal idiom better than the flatter 'people of Israel,' while avoiding the overly literal and potentially misleading 'sons of Israel.'
- source_word: וּבִקְשׁוּ
  chosen: and seek
  alternatives:
  - and will seek
  - and inquire after
  lexicon: HALOT
  rationale: בקשׁ denotes seeking, often earnestly. English future force is already carried by the clause, so 'and seek' reads naturally while preserving the verbal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: 'Construct with pronominal suffix expressing covenant relationship: ''their God.'''
- source_word: וְאֵת דָּוִד מַלְכָּם
  chosen: and David their king
  alternatives:
  - and David, their king
  - and their king David
  lexicon: HALOT
  rationale: The direct-object marker governs a second object of seeking. The phrase is rendered straightforwardly, preserving the prophetic wording and its royal-restoration resonance without specifying in the main text whether 'David' is the historical David or a Davidic ruler.
- source_word: וּפָחֲדוּ
  chosen: and they will come trembling
  alternatives:
  - and they will fear
  - and they will come in fear
  - and they will tremble
  lexicon: HALOT
  rationale: The verb פחד can denote fear/trembling, and with אֶל often carries the sense of moving toward someone in trembling awe. 'Come trembling' best fits the preposition 'to/toward' and avoids the misleading sense that they are afraid of God's goodness in a merely negative way.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - toward the LORD
  lexicon: HALOT
  rationale: אֶל marks direction toward; 'to the LORD' is natural English and fits the movement implied by פחד here.
- source_word: וְאֶל טוּבוֹ
  chosen: and to his goodness
  alternatives:
  - and to his bounty
  - and to his good things
  lexicon: HALOT
  rationale: טוּב can denote goodness, bounty, or beneficence. 'His goodness' preserves the abstract noun and allows both God's character and his beneficent provision to remain in view.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the last days
  - in days to come
  lexicon: HALOT
  rationale: A recognized eschatological expression. 'In the latter days' is a transparent, established rendering that preserves the phrase's prophetic weight without forcing a narrower end-times scheme.
