    changes_summary: Changed 'lovers of a rich man' to 'friends of a rich man' for more natural English and a better contextual rendering of the Hebrew term, while preserving the contrast and meaning.
translation:
  language: es
  text: Incluso su vecino aborrece al pobre[a], pero los amigos del rico[b] son muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amigo». El hebreo רֵעַ puede significar «amigo», «compañero» o «vecino».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y los que aman al rico son muchos», es decir, muchos se adhieren al rico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - También
  - Aun
  lexicon: HALOT
  rationale: Aquí גַּם intensifica la afirmación; «Incluso» conserva el matiz de sorpresa/énfasis mejor que una adición simple como «también».
- source_word: לְרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su vecino
  alternatives_spanish:
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o vecino/vecino social. En este proverbio la relación es de proximidad social, no necesariamente de amistad formal; «vecino» comunica bien a alguien cercano que podría esperarse que no lo rechace.
- source_word: יִשָּׂנֵא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - es odiado por
  lexicon: HALOT
  rationale: La forma niphal admite un matiz pasivo/reflexivo, pero en español una construcción activa con sujeto relacional explícito reproduce mejor la fuerza proverbial. «Aborrece» conserva la intensidad del rechazo sin sonar demasiado coloquial.
- source_word: רָשׁ
  english_pob_choice: a poor man
  chosen_spanish: al pobre
  alternatives_spanish:
  - a un pobre
  - al necesitado
  lexicon: HALOT
  rationale: El sustantivo adjetival singular hebreo se vierte aquí de modo natural con «al pobre». Mantiene el valor proverbial y evita una expansión innecesaria.
- source_word: וְאֹהֲבֵי
  english_pob_choice: the friends of
  chosen_spanish: los amigos de
  alternatives_spanish:
  - los amantes de
  - los que aman a
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «los que aman de», el contexto social del proverbio favorece «amigos de» como equivalente natural en español, siguiendo la decisión auditada del POB inglés de evitar una literalidad extraña.
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: el rico
  alternatives_spanish:
  - un hombre rico
  - un rico
  lexicon: HALOT
  rationale: El sustantivo singular puede expresarse de forma idiomática en español con «el rico», que conserva la generalidad proverbial y la contraposición con «el pobre».
- source_word: רַבִּים
  english_pob_choice: are many
  chosen_spanish: son muchos
  alternatives_spanish:
  - son numerosos
  - hay muchos
  lexicon: HALOT
  rationale: La predicación de abundancia queda bien con «son muchos», una fórmula natural y directa en español proverbial.
theological_decisions:
- issue: Matiz social y moral del rechazo al pobre frente a la adhesión al rico
  english_pob_reading: The proverb contrasts the poor man's social rejection with the rich man's many attachers; it describes social reality rather than endorsing it.
  chosen_spanish_reading: El proverbio contrapone el rechazo social al pobre con la adhesión de muchos al rico; describe una realidad social, no la aprueba.
  alternative_spanish_readings:
  - El proverbio condena de modo implícito la parcialidad hacia los ricos.
  - El proverbio enseña que el valor de una persona depende de su riqueza.
  rationale: La formulación española debe preservar el carácter sapiencial descriptivo del proverbio. No conviene moralizar más allá del texto ni sugerir que la riqueza determina el valor humano.
  doctrine_reference: Sabiduría bíblica; imparcialidad y dignidad humana (cf. Santiago 2:1-7 como paralelo temático).
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura final auditada en inglés: el sujeto relacional de יִשָּׂנֵא se expresa activamente para un español natural; se conserva la intensificación de גַּם con «Incluso»; y se mantiene la equivalencia contextual de וְאֹהֲבֵי como «los amigos de», en vez de una calca de «los amantes de».'
  spanish_consistency_notes:
  - Se mantiene «rico/pobre» como pareja antitética consistente con la sabiduría proverbial.
  - Se evita «SEÑOR» u otro ajuste teológico no pertinente; no hay términos divinos en este versículo.
  - «Vecino» se usa en sentido social amplio, no estrictamente residencial.
