  text: וַ֠/יְהִי כְּֽ/הוֹצִיאָ֞/ם אֶת הַ/מְּלָכִ֣ים הָ/אֵלֶּה֮ אֶל יְהוֹשֻׁעַ֒ וַ/יִּקְרָ֨א יְהוֹשֻׁ֜עַ אֶל כָּל אִ֣ישׁ יִשְׂרָאֵ֗ל וַ֠/יֹּאמֶר אֶל קְצִינֵ֞י אַנְשֵׁ֤י הַ/מִּלְחָמָה֙ הֶ/הָלְכ֣וּא אִתּ֔/וֹ קִרְב֗וּ שִׂ֚ימוּ אֶת רַגְלֵי/כֶ֔ם עַֽל צַוְּארֵ֖י הַ/מְּלָכִ֣ים הָ/אֵ֑לֶּה וַֽ/יִּקְרְב֔וּ וַ/יָּשִׂ֥ימוּ אֶת רַגְלֵי/הֶ֖ם עַל צַוְּארֵי/הֶֽם־־־־־־־־־׃
