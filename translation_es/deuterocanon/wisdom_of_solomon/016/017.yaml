translation:
  language: es
  text: 'Porque lo más asombroso fue esto: en el agua que extingue todo[a], el fuego actuó con aún mayor eficacia, pues el mundo es aliado de los justos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el universo es campeón de los justos» o «la creación es defensora de los justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοξότατον
  english_pob_choice: most astonishing
  chosen_spanish: lo más asombroso
  alternatives_spanish:
  - lo más extraordinario
  - lo más sorprendente
  - lo más paradójico
  lexicon: LSJ
  rationale: El superlativo expresa lo que resulta inesperado o digno de maravilla. «Lo más asombroso» comunica bien el énfasis admirativo sin introducir un matiz filosófico de «paradójico» que el contexto no exige.
- source_word: σβεννύντι
  english_pob_choice: extinguishes
  chosen_spanish: extingue
  alternatives_spanish:
  - apaga
  - quema
  lexicon: LSJ
  rationale: El participio describe al agua en su función respecto del fuego. «Extingue» mantiene el sentido directo y formal, y encaja con el complemento «todo».
- source_word: πλεῖον ἐνήργει
  english_pob_choice: was even more effective
  chosen_spanish: actuó con aún mayor eficacia
  alternatives_spanish:
  - obró con aún mayor poder
  - fue aún más eficaz
  - actuó todavía con más fuerza
  lexicon: LSJ
  rationale: ἐνήργει expresa una operación eficaz o activa; con πλεῖον indica intensidad mayor. «Actuó con aún mayor eficacia» preserva la idea de eficacia aumentada y suena natural en español.
- source_word: ὑπέρμαχος
  english_pob_choice: is an ally of
  chosen_spanish: aliado de
  alternatives_spanish:
  - defensor de
  - campeón de
  - que pelea por
  lexicon: LSJ
  rationale: ὑπέρμαχος puede funcionar como sustantivo o adjetivo para quien apoya o combate por otro. «Aliado de» sigue la revisión inglesa más precisa y evita una paráfrasis demasiado militar en español.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el universo
  - la creación
  - el orden creado
  lexicon: LSJ
  rationale: Aquí κόσμος designa el mundo ordenado/creado. «El mundo» es la traducción más directa y mantiene la personificación del verso sin forzar una explicación interpretativa.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos de Dios
  lexicon: LSJ
  rationale: El genitivo plural se refiere a personas justas en sentido moral y religioso. «De los justos» conserva la categoría bíblica tradicional y la concisión del original.
theological_decisions:
- issue: Personificación de la creación como apoyo a los justos
  english_pob_reading: the created order actively supports and defends the righteous
  chosen_spanish_reading: el mundo es aliado de los justos
  alternative_spanish_readings:
  - la creación es defensora de los justos
  - el universo es aliado de los justos
  - el mundo combate por los justos
  rationale: El griego personifica al κόσμος como ὑπέρμαχος de los δικαίων. «Aliado» conserva la idea de apoyo activo sin resolver la figura retórica en una tesis doctrinal sobre la naturaleza.
  doctrine_reference: Preservar la tensión teológica y la personificación del texto.
translation_notes:
  revision_awareness: 'Esta versión sigue la última revisión del audit trail inglés: ''was even more effective'' para ἐνήργει y ''is an ally of'' para ὑπέρμαχος. El español refleja esas decisiones con ''actuó con aún mayor eficacia'' y ''es aliado de'', manteniendo la personificación y la intensidad del contraste con el agua que extingue todo.'
  spanish_consistency_notes:
  - Se emplea «Dios»/«Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene «los justos» para δικαίων, evitando una expansión explicativa.
  - «Aliado de» conserva la lectura revisada del POB inglés y evita una solución más militarizada que podría sobretraducir ὑπέρμαχος.
  - La nota al pie se ancla en «todo[a]» para preservar la alternativa lexical de κόσμος sin interrumpir la fluidez del verso.
