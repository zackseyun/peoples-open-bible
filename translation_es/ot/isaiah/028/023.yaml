translation:
  language: es
  text: Presten oído y oigan mi voz[a]; atiendan y oigan mi palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escuchen y oigan mi voz; atiendan y oigan mi palabra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינוּ
  english_pob_choice: Give ear
  chosen_spanish: Presten oído
  alternatives_spanish:
  - Escuchen
  - Oigan
  lexicon: HALOT
  rationale: El hebreo es un imperativo enfático que llama a inclinar el oído con atención. «Presten oído» conserva mejor esa fuerza idiomática que un simple «escuchen», y suena natural en español bíblico contemporáneo.
- source_word: וְשִׁמְעוּ
  english_pob_choice: and hear
  chosen_spanish: y oigan
  alternatives_spanish:
  - y escuchen
  - y oigan atentamente
  lexicon: HALOT
  rationale: שׁמע en este contexto pide oír con obediencia y percepción. «Oigan» mantiene el paralelismo verbal con el primer mandato y evita suavizar la repetición deliberada del hebreo.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - el sonido de mi voz
  - mi voz
  lexicon: HALOT
  rationale: קוֹל aquí significa «voz» en habla directa. «Mi voz» es la equivalencia más natural y conserva el alcance concreto del original.
- source_word: הַקְשִׁיבוּ
  english_pob_choice: pay attention
  chosen_spanish: atiendan
  alternatives_spanish:
  - presten atención
  - escuchen con atención
  lexicon: HALOT
  rationale: קשב expresa atención enfocada. «Atiendan» comunica bien la llamada a fijarse en lo que sigue, diferenciándola del primer par imperativo.
- source_word: אִמְרָתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi խոս?
  - mi dicho
  - mi declaración
  lexicon: HALOT
  rationale: אִמְרָה denota palabra, dicho o enunciado. «Mi palabra» es conciso, poético y mantiene el singular paralelo con «mi voz».
translation_notes:
  revision_awareness: 'El texto hebreo presenta dos pares de mandatos paralelos: uno con הַאֲזִינוּ / וְשִׁמְעוּ y otro con הַקְשִׁיבוּ / וְשִׁמְעוּ. La versión española conserva ambos pares y la repetición de oír/escuchar, sin fusionarlos ni nivelarlos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «presten oído» y «atiendan» para reflejar dos imperativos hebreos distintos.
  - Se usa «oigan» en ambos casos para preservar la repetición de שׁמע.
  - «Palabra» se prefiere a «dicho» por el paralelismo poético y la concisión.
  - La nota al pie ofrece una alternativa más literal («escuchen») sin sustituir el texto principal.
