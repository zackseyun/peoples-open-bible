translation:
  language: es
  text: Pero el rey Tolomeo se apoderó de las ciudades de la costa, hasta Seleucia junto al mar, y maquinaba malos planes contra Alejandro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consideraba malos designios acerca de Alejandro». El griego περὶ Ἀλεξάνδρου significa literalmente «acerca de Alejandro», pero en este contexto el sentido es hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκυρίευσεν
  english_pob_choice: gained control of
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - ganó control de
  - tomó posesión de
  - dominó
  lexicon: LSJ
  rationale: El verbo griego expresa ejercer dominio o quedar con control efectivo. En este contexto militar-político, «se apoderó de» comunica apropiación y control sin exigir la permanencia absoluta que podría sugerir «gobernó» o «dominó».
- source_word: πόλεων τῆς παραλίας
  english_pob_choice: the cities of the coast
  chosen_spanish: las ciudades de la costa
  alternatives_spanish:
  - las ciudades costeras
  - las ciudades de la ribera
  lexicon: LSJ
  rationale: La expresión griega designa las ciudades pertenecientes a la franja costera. «Las ciudades de la costa» conserva la estructura y el sentido geográfico con naturalidad en español.
- source_word: ἕως Σελευκίας τῆς παραθαλασσίας
  english_pob_choice: as far as Seleucia-by-the-Sea
  chosen_spanish: hasta Seleucia, la de la costa marítima
  alternatives_spanish:
  - hasta Seleucia, la marítima
  - hasta Seleucia del mar
  lexicon: LSJ
  rationale: El texto distingue cuál Seleucia se quiere decir mediante el epíteto descriptivo. En español, una glosa como «la de la costa marítima» preserva esa identificación sin introducir una forma toponímica no asentada en el uso bíblico español.
- source_word: διελογίζετο
  english_pob_choice: was devising
  chosen_spanish: maquinaba
  alternatives_spanish:
  - pensaba
  - consideraba
  - planeaba
  lexicon: LSJ
  rationale: El imperfecto indica una acción continua de deliberación; el contexto hostil exige una carga intencional negativa. «Maquinaba» transmite bien ese proceso continuo con matiz de intriga, acorde con los «malos planes» que siguen.
- source_word: λογισμοὺς πονηρούς
  english_pob_choice: evil plans
  chosen_spanish: malos planes
  alternatives_spanish:
  - planes perversos
  - designios malos
  - malvados planes
  lexicon: LSJ
  rationale: El sustantivo puede referirse a cálculos, designios o planes; con πονηρούς queda claramente marcado como hostil. «Malos planes» reproduce ese juicio moral de forma clara y sobria en español.
- source_word: περὶ Ἀλεξάνδρου
  english_pob_choice: against Alexander
  chosen_spanish: contra Alejandro
  alternatives_spanish:
  - acerca de Alejandro
  - sobre Alejandro
  lexicon: LSJ
  rationale: Aunque περὶ puede significar «acerca de», el contexto de planes maliciosos vuelve adversativo el sentido práctico. «Contra Alejandro» expresa mejor la dirección hostil que ya está implícita en el griego y confirmada por el audit trail inglés.
translation_notes:
  revision_awareness: La fuente griega coincide plenamente con el audit trail inglés; se mantuvo el sentido hostil de περὶ Ἀλεξάνδρου como en la versión inglesa, y no se introdujeron cambios textuales ni de enfoque respecto del pase de revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Alejandro» para Ἀλέξανδρος y «Tolomeo» para Πτολεμαῖος, conforme al uso bíblico español común y al contexto histórico.
  - Se evita «SEÑOR» o fórmulas eclesiásticas ajenas al texto, ya que no aparecen nombres divinos ni terminología teológica especializada en este versículo.
  - La nota al pie conserva la alternativa semántica relevante de περὶ Ἀλεξάνδρου, igual que en el audit trail inglés, para no borrar la tensión entre «acerca de» y el sentido hostil contextual.
