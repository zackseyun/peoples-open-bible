translation:
  language: es
  text: Pero el resto, los que habitaban en Betulia, cayeron sobre el campamento de Asiria[a], y los persiguieron[b] y lo saquearon mucho[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el campamento asirio». El griego dice literalmente «el campamento de Asiria».'
    reason: lexical_alternative
  - marker: b
    text: La expresión griega dice literalmente «iban tras ellos»; en este contexto militar significa «los persiguieron».
    reason: lexical_alternative
  - marker: c
    text: La última cláusula también puede traducirse «y lo saquearon mucho» o «y tomaron de él gran botín».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  english_pob_choice: But the rest
  chosen_spanish: Pero el resto
  alternatives_spanish:
  - Y el resto
  - Ahora bien, el resto
  lexicon: BDAG
  rationale: λοιποί expresa el resto o los que quedaban; δέ añade un giro leve de contraste o continuación. «Pero» conserva ese matiz de transición sin cargar demasiado el enlace.
- source_word: οἱ κατοικοῦντες Βαιτυλουὰ
  english_pob_choice: those living in Bethulia
  chosen_spanish: los que habitaban en Betulia
  alternatives_spanish:
  - los que vivían en Betulia
  - los habitantes de Betulia
  lexicon: BDAG
  rationale: El participio κατοικοῦντες señala a quienes residen en el lugar. «Habitaban» mantiene el valor participial y suena natural en español bíblico contemporáneo.
- source_word: ἐπέπεσαν
  english_pob_choice: fell upon
  chosen_spanish: cayeron sobre
  alternatives_spanish:
  - atacaron
  - se lanzaron contra
  lexicon: BDAG
  rationale: La imagen de un golpe súbito y hostil se conserva mejor con «cayeron sobre» que con un verbo más neutro como «atacaron».
- source_word: τῇ παρεμβολῇ Ἀσσούρ
  english_pob_choice: the camp of Assyria
  chosen_spanish: el campamento de Asiria
  alternatives_spanish:
  - el campamento asirio
  - el campamento de los asirios
  lexicon: BDAG
  rationale: παρεμβολή es aquí un campamento militar. «De Asiria» refleja con más transparencia el genitivo del griego; «campamento» evita una traducción demasiado técnica o arcaica.
- source_word: ἐπορεύοντο αὐτούς
  english_pob_choice: they pursued them
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - iban tras ellos
  - los fueron siguiendo
  lexicon: BDAG
  rationale: Aunque el verbo puede significar simplemente «ir», en este contexto de combate y derrota enemiga la fuerza idiomática es de persecución. El español «los persiguieron» comunica esa función sin perder el sentido contextual.
- source_word: ἐλούτησαν σφόδρα
  english_pob_choice: plundered it greatly
  chosen_spanish: lo saquearon grandemente
  alternatives_spanish:
  - lo despojaron mucho
  - tomaron de él gran botín
  lexicon: BDAG
  rationale: El verbo significa saquear o despojar. «Grandemente» reproduce el intensificador σφόδρα con un tono bíblico sobrio; el pronombre «lo» sigue el antecedente singular de «campamento».
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete con el mismo sentido auditado en el POB inglés. No hubo revisiones textuales en el pass más reciente; la adaptación española conserva la estructura narrativa, el objeto singular implícito de «campamento» en la última cláusula y la fuerza militar de los verbos.
  spanish_consistency_notes:
  - Se mantuvo «Asiria» para Ἀσσούρ, siguiendo el criterio auditado del POB inglés.
  - Se prefirió «campamento» por claridad natural en español, sin perder el matiz militar de παρεμβολή.
  - «Los persiguieron» recoge el valor contextual de ἐπορεύοντο αὐτούς en combate, en paralelo con la nota auditada en inglés.
  - Se conservó la referencia singular implícita en «lo saquearon», ya que el antecedente inmediato es «el campamento».
