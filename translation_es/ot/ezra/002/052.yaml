  rationale: En esta lista de retorno, בְּנֵי funciona como fórmula genealógica/corporativa. "Los hijos de" conserva la estructura formal del hebreo y es natural en español bíblico, sin obligar a leerlo como hijos inmediatos solamente.
- source_word: בַצְל֥וּת
  english_pob_choice: Bazluth
  chosen_spanish: Bazlut
  alternatives_spanish:
  - Bazluth
  lexicon: transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio. En español, "Bazlut" refleja de modo natural la forma hebrea y evita introducir una vocal final no exigida por el original.
- source_word: מְחִידָ֖א
  english_pob_choice: Mehida
  chosen_spanish: Mehida
  alternatives_spanish:
