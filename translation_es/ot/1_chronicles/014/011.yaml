    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar mejor el valor de פרץ y preservar el juego de palabras con Perazim sin usar expresiones españolas ambiguas. «Irrumpió contra mis enemigos» mantiene la fuerza bélica y divina del hebreo; «como el irrumpir de muchas aguas» comunica la imagen hidráulica con naturalidad; y «llamaron a aquel lugar» evita un calco poco idiomático mientras conserva el plural del original.
