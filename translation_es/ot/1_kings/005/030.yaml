revisions:
- from: Además de los jefes de los supervisores de Salomón, que estaban sobre la obra[a], tres mil trescientos[c][b], los cuales gobernaban sobre el pueblo que hacía la obra.
  to: Además de los principales delegados[a] de Salomón que estaban a cargo de la obra, tres mil trescientos[c][b], que tenían autoridad sobre el pueblo que hacía la obra.
  rationale: 'La revisión corrige tres puntos principales: reemplaza una expresión española poco natural («los jefes de los supervisores») por «los principales delegados», que refleja mejor el inglés auditado ''chief deputies'' y el sentido administrativo hebreo; sustituye el calco «estaban sobre la obra» por «estaban a cargo de la obra»; y cambia «gobernaban sobre» por «tenían autoridad sobre», que preserva la fuerza de רדה sin sonar indebidamente político. Se mantienen las notas léxicas necesarias y el orden de marcadores presente en el texto inglés auditado.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura y sentido del hebreo: una cantidad adicional de oficiales de Salomón, relacionados con la obra, y su autoridad sobre el pueblo que realizaba el trabajo. Sin embargo, varias elecciones españolas no reproducen bien la intención del POB auditado: «los jefes de los supervisores» suena jerárquicamente más complejo que el hebreo/inglés y resulta torpe; «estaban sobre la obra» es calco poco natural; y «gobernaban sobre» es posible pero en español suena más político de lo que pide el contexto administrativo-laboral. Conviene conservar la fuerza léxica de רדה sin perder naturalidad.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero algo rígida y calcada del inglés/hebreo. «Además de» funciona, pero la frase central necesita mejor español bíblico moderno. «los cuales» también añade pesadez innecesaria. Una revisión menor puede mantener la literalidad y mejorar la fluidez: «los principales delegados de Salomón que estaban a cargo de la obra ... que tenían autoridad sobre el pueblo que hacía la obra».'
  glossary_alignment: No hay términos del glosario mayor en conflicto. Las decisiones clave aquí son administrativas/lexicales. Se debe respetar la nota alternativa de שׂרי הַנִּצָּבִים y la de רדה. En español, «delegados» o «encargados principales» encaja mejor que «jefes de los supervisores» para reproducir chief deputies sin crear una cadena jerárquica artificiosa.
  issues:
  - severity: medium
    issue: «los jefes de los supervisores» es torpe y sobredetermina la jerarquía
    rationale: שׂרי הַנִּצָּבִים / 'chief deputies' apunta a altos encargados subordinados de Salomón; «jefes de los supervisores» sugiere 'jefes de jefes' y suena antinatural en español.
  - severity: medium
    issue: «que estaban sobre la obra» es un calco poco idiomático
    rationale: Aunque sigue de cerca עַל, en español natural y digno conviene «que estaban a cargo de la obra» o «que estaban al frente de la obra».
  - severity: medium
    issue: «gobernaban sobre» suena demasiado político en este contexto
    rationale: רדה conserva fuerza de autoridad, pero en español administrativo-laboral queda mejor «tenían autoridad sobre»; mantiene la nota explicativa sin sonar a gobierno civil.
  - severity: low
    issue: «los cuales» añade pesadez innecesaria
    rationale: Una relativa simple mejora la lectura sin pérdida de precisión.
  revised_spanish_text: Además de los principales delegados[a] de Salomón que estaban a cargo de la obra, tres mil trescientos[c][b], que tenían autoridad sobre el pueblo que hacía la obra.
