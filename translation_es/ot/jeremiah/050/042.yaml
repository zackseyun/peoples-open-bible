review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: armas en mano, crueldad sin misericordia, estruendo como el mar, caballería, formación para combate y vocativo final a Babilonia. También preserva correctamente la nota alternativa para כְּאִישׁ. Sin embargo, dos elecciones debilitan la alineación precisa con la evidencia fuente y con la auditoría inglesa: «Su voz» estrecha קוֹלָם, que aquí es mejor «su estruendo/sonido», y la nota [a] está anclada al lugar equivocado; debe anclarse en «como un hombre», no en «voz».'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor naturalidad y precisión poética. «Su estruendo ruge como el mar» refleja mejor la imagen de una multitud/ejército que «Su voz ruge como el mar». «Montan sobre caballos» es aceptable, aunque algo menos idiomático que «cabalgan sobre caballos» o «montan a caballo»; no exige corrección. El resto del verso fluye bien y conserva un registro bíblico legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hija de Babilonia» preserva bien בַּת בָּבֶל. «Como un hombre» concuerda con la decisión POB para כְּאִישׁ, con la alternativa «como uno solo» correctamente retenida en nota. La principal corrección terminológica es evitar «voz» para קוֹלָם en este contexto militar-sonoro.
  issues:
  - severity: medium
    issue: «Su voz» para קוֹלָם
    rationale: El hebreo permite «voz/sonido/ruido», pero en este contexto de ejército comparado con el mar la auditoría inglesa eligió el sentido amplio «their sound». En español, «su voz» personifica demasiado y sugiere habla más que estruendo colectivo; «su estruendo» o «su sonido» preserva mejor la imagen.
  - severity: high
    issue: La nota [a] está colocada sobre «voz» en vez de sobre «como un hombre»
    rationale: La nota documenta la alternativa de כְּאִישׁ («como uno solo»), no de קוֹלָם. Debe anclarse exactamente en la frase relevante según las reglas del proyecto.
  revised_spanish_text: Empuñan arco y jabalina; son crueles y no tendrán compasión. Su estruendo ruge como el mar, y montan sobre caballos, dispuestos como un hombre[a] para la batalla contra ti, hija de Babilonia.
  revised_footnotes:
  - marker: a
    text: O «como uno solo», enfatizando la formación unida del ejército.
    reason: lexical_alternative
  revision_rationale: Se corrige «voz» a «estruendo» para reflejar mejor קוֹלָם en contexto de tumulto militar, y se mueve la nota [a] a «como un hombre» porque la alternativa explicada corresponde a כְּאִישׁ. No se requieren cambios doctrinales ni estructurales mayores.
