translation:
  language: es
  text: 'Así que él se acercó cerca de donde yo estaba[a], y cuando llegó, me aterroricé y caí rostro en tierra. Entonces me dijo: «Entiende, hijo de hombre[a], porque la visión es para el tiempo del fin[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «junto a donde yo estaba» o «cerca de donde yo estaba». Hebreo: «cerca de mi lugar de estar».'
    reason: lexical_alternative
  - marker: b
    text: O «la visión concierne al fin señalado».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵצֶל עָמְדִי
  english_pob_choice: near where I was standing
  chosen_spanish: a donde yo estaba
  alternatives_spanish:
  - cerca de donde yo estaba
  - junto a mi lugar de estar
  lexicon: HALOT
  rationale: אֵצֶל expresa proximidad, y עָמְדִי señala el lugar de Daniel mientras estaba de pie. «A donde yo estaba» mantiene el movimiento hacia su ubicación sin sonar forzado en español; el matiz de cercanía queda explícito por el contexto inmediato y la nota textual.
- source_word: נִבְעַתִּי
  english_pob_choice: I was terrified
  chosen_spanish: me aterroricé
  alternatives_spanish:
  - me asusté
  - me estremecí de miedo
  lexicon: HALOT
  rationale: El nifal de בעת comunica quedar sobrecogido por miedo o terror. «Me aterroricé» conserva la intensidad que el contexto exige y corresponde al valor fuerte elegido en la POB inglesa.
- source_word: וָאֶפְּלָה עַל־פָּנַי
  english_pob_choice: and fell on my face
  chosen_spanish: y caí sobre mi rostro
  alternatives_spanish:
  - y caí de bruces
  - y caí postrado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para caer postrado. «Caí sobre mi rostro» sigue de cerca la imagen original; «de bruces» o «postrado» serían opciones interpretativas más naturales, pero menos transparentes al hebreo.
- source_word: הָבֵן
  english_pob_choice: Understand
  chosen_spanish: Entiende
  alternatives_spanish:
  - Comprende
  - Reflexiona
  lexicon: HALOT
  rationale: El imperativo hifil de בין pide discernimiento o comprensión. «Entiende» es directo, natural y suficientemente imperativo en español.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva la forma literal, como en la POB inglesa, para mantener el vínculo intertextual y no disolver el giro hebreo en una paráfrasis. Aunque en español «hijo de hombre» suena menos idiomático, preserva mejor la tensión lexical y literaria del texto.
- source_word: לְעֵת קֵץ
  english_pob_choice: for the time of the end
  chosen_spanish: para el tiempo del fin
  alternatives_spanish:
  - para el tiempo del final
  - para el tiempo del fin señalado
  lexicon: HALOT
  rationale: La frase apunta al tiempo caracterizado por el fin/cierre. «Tiempo del fin» es una solución natural en español y suficientemente cercana al hebreo sin añadir una cronología doctrinal específica.
- source_word: הֶחָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - esta visión
  lexicon: HALOT
  rationale: El sustantivo definido remite a la revelación ya recibida. «La visión» reproduce el referente sin énfasis adicional no presente en el hebreo.
theological_decisions:
- issue: Tratamiento de בֶּן אָדָם en contexto apocalíptico
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: Se preserva la expresión literal para mantener la formulación del hebreo y su posible resonancia literaria dentro de Daniel. Así no se resuelve de antemano si el énfasis es solo antropológico o también estilístico/teológico.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión teológica y la forma del original cuando la expresión puede sostener más de una lectura legítima.'
- issue: Alcance de לְעֵת קֵץ
  english_pob_reading: the vision is for the time of the end
  chosen_spanish_reading: la visión es para el tiempo del fin
  alternative_spanish_readings:
  - la visión concierne al final señalado
  - la visión es para el tiempo final
  rationale: La redacción mantiene el sentido temporal sin introducir un esquema escatológico más detallado del que el texto explícitamente da. Se conserva la apertura semántica de la frase.
  doctrine_reference: 'DOCTRINE.md: no importar especificaciones doctrinales que el texto no afirma; conservar la tensión del pasaje.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el resultado auditado de la POB inglesa, sin cambios sustantivos respecto del sentido lexical o teológico confirmado en la revisión más reciente. Se han adaptado las decisiones al español para conservar transparencia frente al hebreo y mantener una lectura publicable y reverente.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según el texto, pero este versículo no contiene ninguno de esos términos.
  - 'Se conserva el paralelismo narrativo: acercamiento, terror, caída postrada y mandato interpretativo.'
  - Se usa «hijo de hombre» de forma consistente con el valor literal preservado por la POB inglesa.
