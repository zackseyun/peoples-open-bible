  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Dios' corresponde bien a אֱלֹהִים. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. 'Temieron al rey' sigue la decisión auditada del inglés POB. 'Hacer justicia' es aceptable para לַעֲשׂוֹת מִשְׁפָּט, aunque la nota ya preserva 'administrar justicia' como alternativa.
