review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: la tierra a la que Israel entra para poseer no es como Egipto, de donde salieron, donde sembraban y regaban con el pie como un huerto intensivamente irrigado. Sin embargo, hay dos desajustes importantes: el marcador [a] está mal anclado en el texto principal, pues la nota a corresponde a la cláusula sobre sembrar y regar en Egipto, no a «Egipto»; y la concordancia pronominal/numeral mezcla «entras / saliste / tu» con el hebreo plural «salisteis / salieron ustedes» en יְצָאתֶם. Además, «de donde saliste» es menos preciso que una formulación plural neutral.'
  spanish_quality_summary: 'El español es legible y digno, pero conviene pulirlo para coherencia y naturalidad formal. «Porque» funciona, aunque «Pues» también sería posible; no requiere cambio. «Sembrabas tu semilla» es fiel pero algo pesado; puede mantenerse por literalidad. El mayor problema de calidad es la inconsistencia entre texto y notas: la nota [a] en el texto apunta a «Egipto», pero su contenido explica la cláusula verbal «donde sembrabas... y la regabas». También hay incoherencia interna porque en decisiones léxicas «con tu pie[a]» no coincide con el texto real, donde ese marcador es [b].'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o Espíritu. «Poseerla» refleja bien לְרִשְׁתָּהּ. «Con tu pie» preserva correctamente בְרַגְלְךָ, y «huerto de hortalizas» comunica bien כְּגַן הַיָּרָק. La principal corrección necesaria es de anclaje de notas y de persona/número para alinear mejor con el hebreo y el rastro POB.
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en «Egipto» en vez de en la cláusula «donde sembrabas... y la regabas»
    rationale: La nota a explica una lectura alternativa de la acción habitual de sembrar y regar en Egipto; anclarla a «Egipto» induce al lector a pensar que la variante afecta el topónimo, no la cláusula verbal.
  - severity: medium
    issue: 'Incoherencia de persona y número: «entras ... saliste ... tu» frente a hebreo plural en «salisteis/salieron»'
    rationale: Aunque Deuteronomio a veces alterna singular y plural en el discurso, aquí יְצָאתֶם es explícitamente plural. Conviene reflejarlo en español con una forma neutral plural como «de donde ustedes salieron» o una forma litúrgica «de donde salisteis».
  - severity: low
    issue: Desajuste interno entre texto y decisiones léxicas/footnotes
    rationale: Las decisiones léxicas mencionan «con tu pie[a]», pero en el texto la nota sobre «con tu pie» es [b]. Esto debe armonizarse para una auditoría limpia.
  revised_spanish_text: Porque la tierra a la que entras para poseerla no es como la tierra de Egipto, de donde ustedes salieron, donde sembrabas tu semilla y la regabas con tu pie[a], como un huerto de hortalizas.
  revised_footnotes:
  - marker: a
    text: 'O: «donde solías sembrar tu semilla y regarla con tu pie», reflejando la práctica habitual de irrigación en Egipto.'
    reason: lexical_alternative
  - marker: b
    text: «Con tu pie» alude probablemente a una técnica de riego accionada con el pie o a dirigir el agua por canales mediante el pie.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota alternativa para que recaiga sobre la cláusula de sembrar/regar y no sobre «Egipto». También se ajusta «de donde saliste» a «de donde ustedes salieron» para reflejar mejor el plural hebreo sin recurrir a «vosotros». Además, se deja lista una nota cultural separada para «con tu pie», aunque debe anclarse en el texto final si se decide conservarla; tal como está el borrador original, había inconsistencia de marcadores. Dado que el versículo admite mantener el singular exhortativo en otras partes, la revisión mínima conserva «entras» y «sembrabas» pero corrige el plural explícito del éxodo.
