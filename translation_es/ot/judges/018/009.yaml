  yaml_path: translation/ot/judges/018/009.yaml
  text: And they said[a], “Arise, and let us go up against them, for we have seen the land, and behold, it is very good. But you are keeping silent. Do not be sluggish to go, to enter[b], to possess the land.”
  footnotes:
  - marker: a
    text: Or 'you are silent.' The Hebrew participle can be rendered either as an ongoing action ('keeping silent') or a present state ('silent').
    reason: lexical_alternative
  - marker: b
    text: Or 'do not be lazy' or 'do not delay.' The Hebrew emphasizes slackness or reluctance in acting.
    reason: lexical_alternative
