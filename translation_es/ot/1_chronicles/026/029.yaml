translation:
  language: es
  text: Para los izharitas[a], Quenanías y sus hijos fueron asignados a la labor exterior en Israel, como oficiales y jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la labor de afuera»; es decir, tareas fuera del servicio central del santuario, probablemente responsabilidades administrativas y judiciales entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִּצְהָרִי
  english_pob_choice: For the Izharites
  chosen_spanish: Para los izharitas
  alternatives_spanish:
  - De los izharitas
  - A los izharitas
  lexicon: HALOT
  rationale: El prefijo ל aquí introduce la categoría o asignación dentro de la lista, no una localización física. En español, «Para los» comunica bien esa función distributiva/relacional sin forzar una paráfrasis excesiva. «Izharitas» conserva el nombre de clan de forma reconocible y auditable.
- source_word: כְּנַנְיָהוּ
  english_pob_choice: Chenaniah
  chosen_spanish: Quenanías
  alternatives_spanish:
  - Chenanías
  - Kenanías
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español; «Quenanías» refleja de modo natural la consonante inicial hebrea y sigue una forma castellana legible. No se traduce el nombre.
- source_word: וּבָנָיו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus descendientes
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino. En español, «hijos» mantiene el valor genealógico del pasaje y resulta más natural que repetir una forma más técnica. Se evita «descendientes» porque diluye el matiz específico del texto.
- source_word: לַמְּלָאכָה
  english_pob_choice: were assigned to the work
  chosen_spanish: fueron asignados a la labor
  alternatives_spanish:
  - fueron asignados al trabajo
  - quedaron encargados de la labor
  - fueron puestos para la tarea
  lexicon: HALOT
  rationale: מְלָאכָה puede significar trabajo, tarea o labor asignada. Dado el contexto de distribución de responsabilidades levíticas, «labor» expresa bien la idea de encargo sin añadir interpretación innecesaria. Se evita un verbo explícito adicional que no está en el hebreo.
- source_word: הַחִיצוֹנָה
  english_pob_choice: outside work
  chosen_spanish: exterior
  alternatives_spanish:
  - de afuera
  - externa
  - fuera del servicio central
  lexicon: HALOT
  rationale: El adjetivo significa «externa» o «de afuera». Como modifica a «labor», se opta por «labor exterior», que suena natural en español y conserva la distinción con el servicio central del santuario. No se expande el sentido en el texto principal más allá de lo que permite el hebreo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - con autoridad sobre Israel
  lexicon: HALOT
  rationale: La preposición עַל en contextos administrativos puede indicar supervisión o autoridad. «Sobre Israel» preserva esa relación de supervisión sin explicitar más de lo necesario; la alternativa explicativa queda implícita en el contexto.
- source_word: לְשֹׁטְרִים
  english_pob_choice: as officers
  chosen_spanish: como oficiales
  alternatives_spanish:
  - como administradores
  - como funcionarios
  lexicon: HALOT
  rationale: שֹׁטְרִים se refiere a oficiales administrativos. «Oficiales» es un equivalente breve y transparente en español, adecuado para una lista de funciones.
- source_word: וּלְשֹׁפְטִים
  english_pob_choice: and judges
  chosen_spanish: y jueces
  alternatives_spanish:
  - y magistrados
  - y árbitros
  lexicon: HALOT
  rationale: El participio sustantivado de שׁפט designa a quienes ejercen función judicial. «Jueces» es la traducción más directa y comprensible en español, manteniendo la fuerza legal del término.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el último estado revisado del POB en inglés, que ajustó «external work» a «outside work» para una correspondencia más natural con el hebreo. En español se reflejó ese ajuste con «labor exterior», manteniendo la distinción entre servicio interno y funciones fuera del santuario central.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se usa «oficiales» para שֹׁטְרִים, coherente con el valor administrativo del término en listas organizativas.
  - «Jueces» conserva el matiz judicial sin recurrir a tecnicismos que oscurezcan el verso.
  - La construcción «fueron asignados a» refleja la idea de comisión/apuntamiento presente en לַמְּלָאכָה sin añadir sujeto implícito distinto del texto.
