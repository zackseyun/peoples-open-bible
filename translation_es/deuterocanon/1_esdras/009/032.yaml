  spanish_quality_summary: El español es claro y natural para una lista genealógica. La sintaxis y puntuación son buenas. Los acentos en «Annán», «Asaías», «Melquías» y «Simón» ayudan a la lectura en español. El único ajuste necesario es de fidelidad onomástica, no de fluidez.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. La política de seguir la forma griega principal en nombres propios sí aplica, y el borrador la sigue en general, salvo por una adaptación excesiva en «Sabaías» y «Chosamao».
