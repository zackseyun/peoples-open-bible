  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en casi todos los puntos: recuerda a ambos padres, conserva el término social masculino para μεγιστάνων, mantiene la advertencia consecutiva con «no sea que», y refleja correctamente la corrección inglesa sobre «maldigas». También preserva la ambigüedad de ἐπιλαθῇ con nota al pie. Sin embargo, «estás en medio de grandes hombres» debilita innecesariamente el valor de συνεδρεύει («te sientas / estás sentado en compañía o consejo»), y «seas olvidado delante de ellos» suena menos natural en español que una formulación más clara como «quedes en vergüenza ante ellos» no sería fiel al inglés auditado. La mejor reparación mínima es reforzar el matiz de sentarse sin apartarse del sentido documentado.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «estás en medio de grandes hombres» resulta algo plano frente al contexto de συνεδρεύει, y «grandes hombres» puede sonar ligeramente calcado aunque sigue siendo defendible por la política de género del proyecto. «Recuerda a tu padre y a tu madre» y el resto de la cadena exhortativa leen bien. La nota al pie está bien formulada y útil.
  glossary_alignment: No hay términos de glosario mayor problemáticos en este versículo. La decisión de mantener el masculino en «grandes hombres» concuerda con la política documentada para μεγιστάνων. No hay conflicto con los términos teológicos por defecto del proyecto.
