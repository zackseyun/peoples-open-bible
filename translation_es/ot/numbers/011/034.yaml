translation:
  language: es
  text: Así, aquel lugar fue llamado Kibrot-hataavá[a], porque allí sepultaron al pueblo que había codiciado con avidez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibrot-hataavá probablemente significa «Sepulcros de avidez» o «Sepulcros de deseo codicioso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - lo llamó
  - se llamó
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa de nombramiento; en español, la pasiva perifrástica conserva bien el valor impersonal sin atribuir un sujeto específico, en línea con la revisión inglesa.
- source_word: אֶת שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: the name of that place
  chosen_spanish: el nombre de aquel lugar
  alternatives_spanish:
  - aquel lugar
  - el nombre de ese lugar
  lexicon: HALOT
  rationale: Mantiene explícita la fórmula hebrea del nombre del lugar y el demostrativo remite al sitio ya mencionado.
- source_word: קִבְרוֹת הַתַּאֲוָה
  english_pob_choice: Kibroth-hattaavah
  chosen_spanish: Kibrot-hataavá
  alternatives_spanish:
  - Kibrot-Hataavá
  - Kibrot-hattaavá
  lexicon: HALOT
  rationale: Se conserva la transliteración del topónimo en el texto principal, conforme a la política del proyecto; la vocalización española se adapta para lectura natural sin alterar el nombre.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del nombre del lugar con la conjunción causal más directa y natural en español.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Conserva el adverbio locativo para enlazar la explicación con el lugar mencionado.
- source_word: קָבְרוּ
  english_pob_choice: they buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - dieron sepultura
  lexicon: HALOT
  rationale: Se eligió un verbo digno y claro para el acto funerario; 'sepultar' evita una repetición demasiado coloquial de 'enterrar' y sigue siendo fiel al sentido.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: En este contexto refiere al grupo juzgado, no a 'la gente' en general; el acusativo con preposición se naturaliza como objeto directo con 'al pueblo'.
- source_word: הַמִּתְאַוִּים
  english_pob_choice: who had craved
  chosen_spanish: que había codiciado
  alternatives_spanish:
  - que había tenido antojo
  - que había deseado con avidez
  - los codiciosos
  lexicon: HALOT
  rationale: El participio reflexivo señala a quienes se dejaron llevar por el deseo intenso. 'Codiciado' recoge el matiz de deseo desordenado o ansia, sin reducirlo indebidamente a un sentido sexual ni hacerlo demasiado débil.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que pasó de una construcción activa a una pasiva impersonal para reflejar mejor el hebreo וַיִּקְרָא sin introducir un sujeto explícito. También se mantuvo la explicación del nombre del lugar mediante una nota, en lugar de reemplazar el topónimo en el texto principal.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo 'pueblo' para הָעָם por su referencia al grupo castigado.
  - Se eligió un registro bíblico claro pero natural, evitando calcos como 'el nombre de aquel lugar fue llamado'.
