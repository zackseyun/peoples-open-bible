base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/005/013.yaml
  text: And it came to pass[a], as the trumpeters and the singers were as one, to make one sound in praising and giving thanks to Yahweh, and as they lifted up the voice with trumpets and cymbals and instruments of song, and in praising Yahweh, “For he is good, for his steadfast love endures forever,” the house, the house of Yahweh[c][b], was filled with a cloud.
  footnotes:
  - marker: a
    text: Or 'in unison' for 'were as one.'
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often denoting loyal, covenantal love; traditionally also rendered ''mercy'' or ''lovingkindness.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'and with praise to the LORD, saying,'.
    reason: previous_rendering
