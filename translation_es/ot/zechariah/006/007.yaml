revisions:
- from: 'Y los fuertes[a] salieron y buscaron ir, para recorrer la tierra. Y él dijo: «Vayan[b], recorran la tierra», y recorrieron la tierra.'
  to: 'Y los fuertes[a] salieron y buscaron ir, para recorrer toda la tierra[b]. Y él dijo: «Vayan, recorran toda la tierra[b]», y recorrieron toda la tierra[b].'
  rationale: La revisión mantiene el buen español del borrador, pero alinea mejor el texto principal con la decisión documentada del POB para אֶרֶץ como alcance global (“throughout the earth”) mediante “toda la tierra”. También recoloca la nota léxica en la frase correcta y mejora la formulación de la alternativa de color.
