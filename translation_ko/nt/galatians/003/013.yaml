id: GAL.3.13
reference: Galatians 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Χριστὸς ἡμᾶς ἐξηγόρασεν ἐκ τῆς κατάρας τοῦ νόμου γενόμενος ὑπὲρ ἡμῶν κατάρα, ⸂ὅτι γέγραπται⸃· Ἐπικατάρατος πᾶς ὁ κρεμάμενος ἐπὶ ξύλου,
base_translation:
  language: en
  yaml_path: translation/nt/galatians/003/013.yaml
  text: 'The Messiah redeemed us from the curse of the law by becoming a curse for us[d][c][b][a], because it is written: “Cursed is everyone who hangs on a tree.”'
  footnotes:
  - marker: a
    text: Or “Christ redeemed us.”
    reason: lexical_alternative
  - marker: b
    text: Or “on our behalf”; possibly “in our place.”
    reason: lexical_alternative
  - marker: c
    text: Or “for it is written.”
    reason: alternative_reading
  - marker: d
    text: ξύλον literally means “wood” or “tree”; “tree” preserves the wording of the Scripture citation.
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아께서는 우리를 위하여 저주가 되심으로 우리를 율법의 저주에서 속량하셨습니다. 「나무에 달린 자마다 저주를 받았다」[a]고 기록되었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 신명기 21:23의 인용. 헬라어 ξύλον은 「나무」 또는 「나무로 된 기둥」을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξηγόρασεν
  english_pob_choice: redeemed
  chosen_korean: 속량하시다
  alternatives_korean:
  - 대속하시다
  - 값을 치르고 사다
  lexicon: BDAG
  rationale: ἐκ + ἀγοράζω의 「값을 치르고 풀어내다」 의미를 한국 성경의 「속량」으로 옮긴다.
- source_word: γενόμενος ὑπὲρ ἡμῶν κατάρα
  english_pob_choice: by becoming a curse for us
  chosen_korean: 우리를 위하여 저주가 되시다
  alternatives_korean:
  - 우리를 대신해 저주가 되시다
  lexicon: BDAG
  rationale: 대속의 ὑπέρ를 「위하여」로 옮기되, 본문이 함축하는 대신적 의미는 신학적으로 자명하다.
- source_word: ξύλου
  english_pob_choice: tree
  chosen_korean: 나무
  alternatives_korean:
  - 나무 기둥
  lexicon: BDAG
  rationale: 신 21:23 인용의 어휘 보존.
theological_decisions:
- issue: 메시아가 「저주가 되심」의 대속적 의미
  chosen_reading: 우리를 위하여 저주가 되시다 (직역 보존)
  alternative_readings:
  - 우리를 대신해 저주가 되시다 (대속 명시)
  rationale: ὑπέρ는 「위하여」가 일차적 의미이며 대속의 함의는 본문 구조 전체로 분명히 전달된다. 한국 성경 전통의 「우리를 위하여」를 유지해 셈어적 어조를 보존한다.
  doctrine_reference: 'DOCTRINE.md: atonement language'
