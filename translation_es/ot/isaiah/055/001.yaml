translation:
  language: es
  text: ¡Vengan[a], todos los que tienen sed, vengan a las aguas! Y el que no tiene dinero[b], venga, compre y coma. Sí, vengan, compren vino y leche sin dinero y sin precio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¡Ho! Todos los que tienen sed, vengan a las aguas» o «¡Ho! Todos los sedientos, vengan a las aguas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quien no tiene dinero»; el hebreo usa singular masculino con fuerza genérica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Come
  chosen_spanish: ¡Vengan!
  alternatives_spanish:
  - ¡Venga!
  - ¡Oigan!
  - ¡Ea!
  lexicon: HALOT
  rationale: En este contexto, הוֹי no expresa lamento sino una convocatoria urgente. El español natural para esa fuerza exhortativa es el imperativo plural «Vengan», que conserva el ímpetu del llamado. La alternativa más formal «¡Ea!» puede sugerir interjección, pero es menos clara para lectura eclesial contemporánea.
- source_word: כָּל צָמֵא
  english_pob_choice: everyone who is thirsty
  chosen_spanish: todos los sedientos
  alternatives_spanish:
  - todos los que tienen sed
  - todo el que tiene sed
  lexicon: HALOT
  rationale: כָּל + adjetivo singular funciona de manera colectiva. «Todos los sedientos» mantiene el alcance universal y suena natural en español. «Todos los que tienen sed» explicita la relación, pero es más largo; «todo el que tiene sed» singulariza más la frase de lo que sugiere el plural hebreo colectivo.
- source_word: לְכוּ
  english_pob_choice: come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vayan
  - acérquense
  lexicon: HALOT
  rationale: El hebreo usa el imperativo de ir, pero en una invitación directa el español idiomático prefiere «vengan». Mantiene el tono de llamado y evita la impresión de desplazamiento literal sin contexto.
- source_word: לַמַּיִם
  english_pob_choice: to the waters
  chosen_spanish: a las aguas
  alternatives_spanish:
  - a el agua
  - a las aguas abundantes
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «aguas», no con singular «agua», para preservar la imagen de abundancia y la forma concreta del texto.
- source_word: וַאֲשֶׁר אֵין לוֹ כָּסֶף
  english_pob_choice: and he who has no money
  chosen_spanish: y el que no tiene dinero
  alternatives_spanish:
  - y quien no tiene dinero
  - y el que no tiene plata
  lexicon: HALOT
  rationale: El hebreo está en singular masculino con fuerza genérica. «El que» refleja la forma del original y funciona de manera inclusiva en español. «Dinero» reproduce el valor general de כֶּסֶף mejor que «plata» en español moderno, aunque esta última es una alternativa posible en registros más tradicionales.
- source_word: שִׁבְרוּ
  english_pob_choice: buy
  chosen_spanish: compren
  alternatives_spanish:
  - compren provisiones
  - adquieran
  lexicon: HALOT
  rationale: En un contexto de compra de alimentos, שִׁבְרוּ se entiende naturalmente como «compren». Aunque a veces puede connotar compra de grano, aquí el verbo se deja general para no introducir un objeto que el hebreo no explicita en esa primera instancia.
- source_word: וֶאֱכֹלוּ
  english_pob_choice: and eat
  chosen_spanish: y coman
  alternatives_spanish:
  - y coman de ello
  - y comed
  lexicon: HALOT
  rationale: Se conserva la secuencia imperativa simple del hebreo. «Coman» es la forma moderna y digna; añadir «de ello» sería interpretativo y no está requerido por el texto.
- source_word: בְּלוֹא כֶסֶף
  english_pob_choice: without money
  chosen_spanish: sin dinero
  alternatives_spanish:
  - sin pagar
  - por nada
  lexicon: HALOT
  rationale: «Sin dinero» es la equivalencia más directa y clara. Conserva el contraste paradójico del mercado sin introducir una explicación ajena al hebreo.
- source_word: וּבְלוֹא מְחִיר
  english_pob_choice: and without price
  chosen_spanish: y sin precio
  alternatives_spanish:
  - y sin costo
  - y sin pago
  lexicon: HALOT
  rationale: «Precio» preserva el paralelismo con «dinero» y el registro poético del verso. «Costo» o «pago» son posibles, pero desplazan ligeramente el matiz retórico del original.
- source_word: יַיִן וְחָלָב
  english_pob_choice: wine and milk
  chosen_spanish: vino y leche
  alternatives_spanish:
  - vino y leche fresca
  - vino y leche
  lexicon: HALOT
  rationale: Se mantiene el lenguaje concreto de provisión abundante sin espiritualizarlo. «Vino y leche» conserva la imaginería material del hebreo y la amplitud de la oferta.
theological_decisions:
- issue: Forma genérica masculina en la invitación
  english_pob_reading: Rendered the singular masculine generically as 'he who has no money' in the main text.
  chosen_spanish_reading: Se traduce con «el que no tiene dinero» como masculino singular genérico.
  alternative_spanish_readings:
  - quien no tiene dinero
  - todo el que no tiene dinero
  rationale: El hebreo usa singular masculino con valor representativo. En español, «el que» conserva esa forma y sigue siendo naturalmente inclusivo en el contexto de la invitación universal. No se forza una reformulación inclusiva que borre la huella gramatical del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Imaginería económica y alimentaria literal
  english_pob_reading: Retained literal market and nourishment language ('buy,' 'wine,' 'milk') without importing explicit theological interpretation into the verse text.
  chosen_spanish_reading: Se conservan «compren», «vino» y «leche» sin paráfrasis teológica.
  alternative_spanish_readings:
  - vengan a recibir gratuitamente salvación
  - compren alimento espiritual
  rationale: El hebreo presenta una invitación concreta en imágenes de compra y sustento. La traducción debe dejar que la carga teológica emerja del texto y no sustituirla por una explicación devocional.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se mantuvo la repetición exhortativa y la imaginería literal; no se introdujeron interpretaciones adicionales. La revisión más reciente del inglés no requirió cambios, y esta versión española refleja ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se mantiene el plural «aguas» y los sustantivos concretos «vino» y «leche» para respetar la imaginería del pasaje.
  - Se conserva el singular genérico «el que» como reflejo del hebreo, sin convertirlo en una paráfrasis inclusiva extensa.
  - La puntuación reproduce la cadencia imperativa del verso con pausas medias y exclamación inicial.
