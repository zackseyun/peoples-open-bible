translation:
  language: es
  text: 'Semaías hijo de Natanel[a], el escriba de entre los levitas, los registró en presencia del rey, de los oficiales, de Sadoc el sacerdote, de Ahimelec hijo de Abiatar y de los jefes de las casas paternas de los sacerdotes y de los levitas: una casa paterna tomada para Eleazar, y una tomada para Itamar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es muy condensado: literalmente, «una casa paterna tomada para Eleazar, y tomada, tomada para Itamar». La idea es que las casas familiares fueron seleccionadas por turnos de las líneas de Eleazar e Itamar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתְּבֵם
  english_pob_choice: recorded them
  chosen_spanish: los registró
  alternatives_spanish:
  - los escribió
  - los anotó
  lexicon: HALOT
  rationale: כתב en este contexto administrativo no se limita a 'escribir' físicamente, sino a dejar constancia oficial de la asignación. 'Registró' conserva la función documental con español natural y digno.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el registrador
  lexicon: HALOT
  rationale: סֹפֵר designa un oficial de escritura o registro. 'Escriba' mantiene la correspondencia histórica y la transparencia lexical.
- source_word: מִן הַלֵּוִי
  english_pob_choice: from among the Levites
  chosen_spanish: de entre los levitas
  alternatives_spanish:
  - de los levitas
  - un levita
  lexicon: HALOT
  rationale: La partícula מן expresa pertenencia dentro de un grupo. 'De entre los levitas' conserva ese matiz partitivo mejor que una simple identificación étnica.
- source_word: לִפְנֵי
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: Aquí la frase marca un acto público y testimonial. 'En presencia de' reproduce el sentido procedimental del original sin sonar arcaico.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  lexicon: HALOT
  rationale: שָׂרִים en contexto administrativo/cortesano se refiere a funcionarios o autoridades. 'Oficiales' evita una lectura monárquica o nobiliaria que no es necesaria en español.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de las casas paternas
  - los jefes de las casas ancestrales
  lexicon: HALOT
  rationale: La expresión técnica de Crónicas se conserva como unidad administrativa-genealógica. 'Casas paternas' traduce בית אב de forma reconocible y fiel, y 'jefes' refleja רָאשֵׁי.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: of the priests and of the Levites
  chosen_spanish: de los sacerdotes y de los levitas
  alternatives_spanish:
  - para los sacerdotes y los levitas
  - de los sacerdotes y de los levitas
  lexicon: HALOT
  rationale: En apposición, la frase especifica a qué grupos pertenecen esas casas paternas. 'De los sacerdotes y de los levitas' preserva la relación genitiva de manera directa en español.
- source_word: בֵּית אָב אֶחָד
  english_pob_choice: one father’s house
  chosen_spanish: una casa paterna
  alternatives_spanish:
  - una casa ancestral
  - una familia paterna
  lexicon: HALOT
  rationale: בית אב es un término técnico para una unidad familiar/clánica. 'Casa paterna' mantiene la transparencia hacia el hebreo y es más natural que una glosa expansiva.
- source_word: אָחֻז
  english_pob_choice: being taken
  chosen_spanish: para
  alternatives_spanish:
  - tomada
  - escogida
  - asignada
  lexicon: HALOT
  rationale: El participio pasivo comprimido en hebreo expresa selección por turno dentro de una asignación. En español, la construcción 'una casa paterna para Eleazar' y 'otra para Itamar' transmite esa distribución sin sobrecargar la frase con una pasiva artificial.
- source_word: לְאֶלְעָזָר ... לְאִיתָמָר
  english_pob_choice: for Eleazar ... for Ithamar
  chosen_spanish: para Eleazar ... para Itamar
  alternatives_spanish:
  - de Eleazar ... de Itamar
  - correspondiente a Eleazar ... correspondiente a Itamar
  lexicon: HALOT
  rationale: La ל de asignación señala la distribución entre las dos líneas sacerdotales. 'Para' comunica con claridad la asignación correspondiente a cada linaje.
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el marcador [a] aparezca explícitamente en el texto español donde corresponde.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en todo el proyecto, pero este versículo no lo contiene.
  - Se conserva la terminología técnica 'casa paterna' para בית אב, coherente con Crónicas y con la auditoría inglesa.
  - Se evita 'sacerdotes'/'levitas' con artículos fluctuantes para no oscurecer la relación genitiva del hebreo.
