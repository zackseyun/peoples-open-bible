lexical_decisions:
- source_word: φωνὴν
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  - un clamor
  lexicon: BDAG
  rationale: φωνήν denota una emisión audible o una voz. Aunque el contexto previo explota la repetición de φωνή con valor de ‘sonido’, aquí el texto recibido sigue presentando una percepción auditiva; ‘una voz’ es el equivalente más directo y natural en español, sin forzar una paráfrasis.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: Oí
  alternatives_spanish:
  - Escuché
  lexicon: BDAG
  rationale: El aoristo expresa la simple percepción auditiva. En español, ‘Oí’ conserva la inmediatez y la brevedad del griego mejor que una formulación más explicativa.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele ser direccional, aquí el contexto y la pauta auditiva favorecen un sentido locativo idiomático. ‘En Jerusalén’ reproduce con naturalidad el valor contextual en español.
- source_word: πόλιν ἁγιάσματος
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad de santidad
  - la ciudad del santuario
  lexicon: BDAG
  rationale: La expresión es literalmente ‘ciudad de santidad/santificación’. ‘La ciudad santa’ comunica el mismo valor semántico en español con naturalidad. Se preserva la relación formal con el griego en la nota de pie.
theological_decisions:
- issue: Cómo verter la designación de Jerusalén
  english_pob_reading: the holy city
  chosen_spanish_reading: la ciudad santa
  alternative_spanish_readings:
  - la ciudad de santidad
  - la ciudad del santuario
  rationale: 'No hay una decisión doctrinal compleja, pero sí una preferencia terminológica: ‘la ciudad santa’ mantiene el sentido honorífico y consagrado del sintagma sin sustituirlo por una fórmula eclesiástica ajena al griego.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La auditoría inglesa muestra una oscilación entre ‘voice’ y ‘sound’ para φωνήν. Dado que la revisión más reciente fijó ‘voice’, el español sigue esa última decisión con ‘voz’, sin borrar la tensión de fondo entre una lectura más literal (‘sonido’) y la más precisa (‘voz’).
  spanish_consistency_notes:
  - Se conserva ‘Jerusalén’ como nombre propio sin artículo.
  - Se usa ‘la ciudad santa’ para mantener el tono bíblico y la equivalencia semántica.
  - La nota a muestra la alternativa literal de φωνὴν; la nota b preserva la forma más cercana de πόλιν ἁγιάσματος.
