translation:
  language: es
  text: Y todo ser que pulula sobre la tierra es detestable[b][a]; no se comerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser rastrero». El término hebreo se refiere ampliamente a criaturas pequeñas que pululan o se mueven cerca del suelo.
    reason: lexical_alternative
  - marker: b
    text: O «abominación». Aquí el término indica algo ritualmente detestable como alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And every
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y cada
  - Todo
  lexicon: HALOT
  rationale: כָּל da un valor distributivo-comprehensivo; en español, «Y todo» conserva la coordinación con el contexto previo y el alcance total sin sonar forzado.
- source_word: הַ/שֶּׁרֶץ
  english_pob_choice: swarming thing
  chosen_spanish: ser que se arrastra
  alternatives_spanish:
  - cosa que se arrastra
  - animal pequeño que se arrastra
  - ser que pulula
  lexicon: HALOT
  rationale: El término hebreo designa una clase amplia de criaturas pequeñas asociadas con movimiento rastrero o de bajo nivel. En español, «ser que se arrastra» evita un calco poco natural y comunica la categoría general con suficiente amplitud semántica.
- source_word: הַ/שֹּׁרֵץ
  english_pob_choice: that swarms
  chosen_spanish: que se multiplica
  alternatives_spanish:
  - que se arrastra
  - que pulula
  - que hormiguea
  lexicon: HALOT
  rationale: El participio de שׁרץ refuerza la idea de movimiento prolífico/abundante. «Se multiplica» preserva la intensificación y permite mantener el juego de repetición sin sonar extrañamente literal en español.
- source_word: עַל הָ/אָ֑רֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  - sobre el suelo de la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» reproduce bien el ámbito terrestre contrastado con otras secciones de Levítico 11 y mantiene una formulación natural en español.
- source_word: שֶׁ֥קֶץ
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - impuro y detestable
  - repugnante
  lexicon: HALOT
  rationale: Se conserva «detestable» para reflejar el valor ritual de la prohibición sin desplazarlo hacia una moralización ajena al contexto. Es la equivalencia más directa y transparente en español.
- source_word: לֹ֥א יֵאָכֵֽל
  english_pob_choice: it shall not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no deberá comerse
  - no ha de comerse
  - no será comido
  lexicon: HALOT
  rationale: La pasiva prohibitiva hebrea se expresa de forma idiomática en español con «no se comerá», que conserva el tono legal y la fuerza normativa del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo, manteniendo la coordinación inicial, la duplicación semántica de שׁרץ mediante un verbo cognado en español, la valoración ritual de שֶׁקֶץ y la prohibición pasiva final. Se ha evitado depender mecánicamente del inglés, aunque se conserva su audit trail en la justificación.
  spanish_consistency_notes:
  - Se usa «tierra» para אָרֶץ en sentido terrestre general, consistente con el capítulo.
  - Se conserva «detestable» como término técnico-ritual, no como juicio moral general.
  - La formulación «no se comerá» mantiene el registro legal de la prohibición bíblica.
  - Las notas a pie de página marcan alternativas léxicas reales, sin duplicar marcadores.
