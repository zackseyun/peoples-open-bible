  glossary_alignment: Sin conflictos con la terminología de proyecto. No aparecen Yahvé, Mesías, etc. Las decisiones principales («borró», «ganado», «aves del cielo», «arca») son compatibles con el expediente inglés. La excepción necesaria es ajustar רֶמֶשׂ a «animales que se arrastran» para preservar mejor el campo semántico documentado.
