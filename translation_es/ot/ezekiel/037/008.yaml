revisions:
- from: Y miré[a], y he aquí había tendones sobre ellos, y la carne había subido, y la piel los cubría desde arriba; pero no había espíritu[b] en ellos.
  to: Y miré[a], y he aquí había tendones sobre ellos, y la carne había subido, y la piel los cubría desde arriba; pero no había aliento[b] en ellos.
  rationale: Se corrige únicamente la elección principal para רוּחַ y su nota asociada, para alinearlas con el sentido inmediato del hebreo, el audit trail inglés y la política del proyecto de preservar la tensión semántica mediante nota, no mediante una lectura principal menos contextual. El resto del versículo puede mantenerse tal como está.
