id: ROM.10.9
reference: Romans 10:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐὰν ⸀ὁμολογήσῃς ἐν τῷ στόματί ⸀σου κύριον Ἰησοῦν, καὶ πιστεύσῃς ἐν τῇ καρδίᾳ σου ὅτι ὁ θεὸς αὐτὸν ἤγειρεν ἐκ νεκρῶν, σωθήσῃ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/009.yaml
  text: because if you confess with your mouth that Jesus is Lord[a], and believe in your heart that God raised him from the dead, you will be saved.
  footnotes:
  - marker: a
    text: Or 'confess Jesus as Lord.' The Greek phrase κύριον Ἰησοῦν can be rendered more compactly, but the main text makes the confessional content explicit.
    reason: lexical_alternative
translation:
  language: ko
  text: 곧 네가 네 입으로 예수를 주로 시인하고, 네 마음으로 하나님께서 그분을 죽은 자들 가운데서 일으키셨음을 믿으면, 너는 구원받을 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμολογήσῃς ... κύριον Ἰησοῦν
  english_pob_choice: confess ... that Jesus is Lord
  chosen_korean: 예수를 주로 시인하고
  alternatives_korean:
  - 「예수는 주」라고 고백하고
  lexicon: BDAG
  rationale: 고대 교회의 핵심 신앙고백 정형구를 정책 지시대로 깔끔하게 옮긴다.
- source_word: ἤγειρεν ἐκ νεκρῶν
  english_pob_choice: raised from the dead
  chosen_korean: 죽은 자들 가운데서 일으키셨음을
  alternatives_korean:
  - 죽음에서 다시 살리셨음을
  lexicon: BDAG
  rationale: ἐκ νεκρῶν 복수 표현(죽은 자들 가운데서)을 보존한다.
theological_decisions:
- issue: κύριον Ἰησοῦν 신앙고백을 어떻게 옮길 것인가
  chosen_reading: 예수를 주로 시인하고
  alternative_readings:
  - 「예수는 주」라고 고백하고
  - 예수를 주라고 시인하고
  rationale: 「예수를 주로 시인하고」는 헬라어의 이중 목적어 구조(예수를 주로)를 자연스럽게 한국어로 옮기며, 초기 교회 신앙고백 정형구의 무게를 보존한다. 정책 지시에 부합한다.
  doctrine_reference: 'DOCTRINE.md: 신앙고백 정형구 보존'
