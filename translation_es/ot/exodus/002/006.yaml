revisions:
- from: 'La abrió y lo vio[a], al niño, y he aquí, un muchacho[b] estaba llorando. Tuvo compasión[c] de él y dijo: «Este es uno de los niños de los hebreos».'
  to: 'La abrió y lo vio[a], al niño, y he aquí[b], un niño estaba llorando. Tuvo compasión[c] de él y dijo: «Este es uno de los hijos de los hebreos».'
  rationale: Se ajusta «muchacho» a «niño» para reflejar mejor el contexto inmediato del bebé Moisés y evitar una edad demasiado avanzada en español. Se añade la nota de «he aquí» para conservar la alternativa/vividez que el POB inglés documenta para וְהִנֵּה. Se mejora la frase final a «uno de los hijos de los hebreos», que representa bien el partitivo hebreo y suena más natural en español.
  reviewer_model: gpt-5.4
