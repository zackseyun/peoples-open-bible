base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/029.yaml
  text: Now the acts of David the king[a], the former and the latter, are written in the records of Samuel the seer, and in the records of Nathan the prophet[c][b], and in the records of Gad the seer.
  footnotes:
  - marker: a
    text: Or 'the words/matters of David the king, the first and the last.' The Hebrew idiom refers to the events or acts of his reign.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'written on/upon the words of Samuel ... Nathan ... Gad'; here 'records' conveys that these are written source documents.
    reason: lexical_alternative
  - marker: c
    text: Both Hebrew titles רֹאֶה and חֹזֶה are rendered 'seer' here; alternatively, חֹזֶה could be rendered 'visionary' to preserve the lexical distinction.
    reason: lexical_alternative
