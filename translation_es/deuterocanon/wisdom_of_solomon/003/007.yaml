translation:
  language: es
  text: y en el tiempo de su visitación[a] resplandecerán, y correrán como chispas por el rastrojo[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando sean visitados», es decir, cuando Dios intervenga para inspeccionar, juzgar o vindicar.
    reason: lexical_alternative
  - marker: b
    text: O «como chispas por la paja seca» o «entre las cañas»; la imagen griega es la de fuego que avanza con rapidez por materia combustible.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιρῷ
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento
  - tiempo señalado
  - ocasión
  lexicon: LSJ
  rationale: καιρός señala un tiempo oportuno o señalado. «Tiempo» es natural en español y conserva la apertura del contexto sin forzar una precisión adicional.
- source_word: ἐπισκοπῆς
  english_pob_choice: visitation
  chosen_spanish: visitación
  alternatives_spanish:
  - visita
  - inspección
  - supervisión
  lexicon: LSJ
  rationale: «Visitación» mantiene el campo semántico de intervención divina y reproduce mejor la carga teológica del término que «visita» o «inspección», sin cerrarlo solo a juicio o solo a favor.
- source_word: ἀναλάμψουσιν
  english_pob_choice: will shine forth
  chosen_spanish: resplandecerán
  alternatives_spanish:
  - brillarán
  - fulgurarán
  - resplandecerán de repente
  lexicon: LSJ
  rationale: El verbo expresa un brillo que irrumpe o se alza. «Resplandecerán» comunica ese brillo vívido con dignidad literaria en español.
- source_word: σπινθῆρες
  english_pob_choice: sparks
  chosen_spanish: chispas
  alternatives_spanish:
  - chispas de fuego
  - centellas
  - brasas
  lexicon: LSJ
  rationale: «Chispas» es el equivalente moderno más claro para el diminutivo de fuego del griego y conserva la imagen visual inmediata.
- source_word: καλάμῃ
  english_pob_choice: stubble
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - paja seca
  - cañas
  lexicon: LSJ
  rationale: Aunque el inglés POB opta por «stubble», en español «paja» comunica bien el material combustible de la imagen. Se evita «cañas» porque podría sugerir un campo no combustible o un sentido demasiado literal de junco.
- source_word: διαδραμοῦνται
  english_pob_choice: will run about
  chosen_spanish: correrán
  alternatives_spanish:
  - se lanzarán
  - danzarán
  - irán corriendo
  lexicon: LSJ
  rationale: El verbo denota movimiento rápido y continuo a través de un espacio. «Correrán» mantiene la energía del símil sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Sentido de «ἐπισκοπή» en el contexto del justo sufriente
  english_pob_reading: A time of divine intervention concerning the righteous, left broad in the main text
  chosen_spanish_reading: Un tiempo de visitación divina, mantenido amplio en el texto principal
  alternative_spanish_readings:
  - tiempo de juicio
  - tiempo de inspección
  - tiempo en que Dios los vindica
  rationale: El contexto inmediato habla de vindicación tras el sufrimiento, pero el término griego permite una gama más amplia que juicio estricto o vindicación explícita. «Visitación» preserva esa tensión y deja abierta la intervención divina, como hace el POB inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el testimonio de revisión indica «unchanged: true» y el control cruzado reporta alto acuerdo, por lo que esta propuesta sigue de cerca la lectura final adjudicada sin ajustes de contenido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el pasaje.
  - 'Se conserva el paralelismo verbal del griego con dos miembros coordinados: visitación/resplandecerán y correrán como chispas.'
  - Se usa un español neutral y eclesial, evitando calcos innecesarios y sin borrar la ambigüedad teológica documentada.
