    reason: cross_reference
  revision_rationale: Se corrige la inconsistencia pronominal y de registro usando una formulación natural para español latinoamericano amplio («mientras ustedes vivían en ella»). Se conservan «reposará» y «reposo» para reflejar la repetición hebrea. También se reubican y simplifican las notas para que sus marcadores coincidan con el contenido auditado en inglés y se elimina la nota estilística innecesaria sobre el plural, ya que la aclaración contextual sobre «sábados» basta.
