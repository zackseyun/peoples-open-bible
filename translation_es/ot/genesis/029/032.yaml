translation:
  language: es
  text: 'Lea concibió y dio a luz un hijo[a], y le puso por nombre Rubén, porque dijo: «Porque Yahvé ha visto mi aflicción, ahora mi esposo me amará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Rubén suena como el hebreo relacionado con «ver, un hijo» y aquí lo explica la frase de Lea: «Yahvé ha visto mi aflicción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: HALOT
  rationale: הרה expresa quedar embarazada / concebir. «Concibió» es natural en español bíblico moderno y conserva la concisión narrativa.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - engendró un hijo
  lexicon: HALOT
  rationale: ילד con בן es la fórmula normal de nacimiento. «Dio a luz un hijo» es claro, dignificado y mantiene el sentido narrativo sin perder naturalidad en español.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: she called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: La fórmula hebrea conserva un matiz más ceremonial que simplemente «nombró». «Llamó su nombre» refleja de cerca esa estructura y deja visible la transición al juego de palabras.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: uso onomástico español estándar
  rationale: Los nombres propios se adaptan a la forma usual en español. «Rubén» es la forma más reconocible y establecida.
- source_word: כִּי אָמְרָה
  english_pob_choice: for she said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - ya que dijo
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación del nombre. «Porque dijo» conserva la relación causal y el flujo directo del discurso.
- source_word: כִּי רָאָה יְהוָה
  english_pob_choice: Because the LORD has seen
  chosen_spanish: Porque Yahvé ha visto
  alternatives_spanish:
  - Pues Yahvé ha visto
  - Ya que Yahvé ha visto
  lexicon: HALOT
  rationale: El hebreo atribuye la acción directamente a Yahvé. Se mantiene el nombre divino por la pauta del proyecto y «ha visto» reproduce bien el perfecto con efecto presente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La decisión doctrinal del proyecto para el Tetragrámaton es «Yahweh»; en español se adopta la forma asentada «Yahvé», que conserva la identidad del nombre divino sin la sustitución por «Señor».
- source_word: בְּעָנְיִי
  english_pob_choice: my affliction
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi sufrimiento
  - mi miseria
  lexicon: HALOT
  rationale: עֳנִי puede abarcar aflicción, sufrimiento o miseria. «Aflicción» preserva el peso semántico y es una equivalencia bíblica natural en español.
- source_word: כִּי עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: HALOT
  rationale: El adverbio marca la expectativa de Lea tras el nacimiento. «Ahora» es el equivalente directo y suficientemente natural en español.
- source_word: יֶאֱהָבַנִי אִישִׁי
  english_pob_choice: my husband will love me
  chosen_spanish: mi esposo me amará
  alternatives_spanish:
  - mi marido me amará
  - mi hombre me amará
  lexicon: HALOT
  rationale: En este contexto marital, אִישִׁי significa «mi esposo». «Amará» conserva el valor relacional y afectivo de אהב sin suavizarlo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se evita la sustitución litúrgica por «SEÑOR» para preservar el nombre personal de Dios conforme a la política del proyecto; la forma española «Yahvé» es la adaptación natural en castellano.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of Leah’s naming explanation
  english_pob_reading: Because Yahweh has seen my affliction, now my husband will love me.
  chosen_spanish_reading: Porque Yahvé ha visto mi aflicción, ahora mi esposo me amará.
  alternative_spanish_readings:
  - Porque Yahvé vio mi aflicción, ahora mi esposo me amará.
  - Pues Yahvé ha visto mi aflicción, ahora mi esposo me amará.
  rationale: Se conserva la lógica explicativa del nombre con el perfecto hebreo entendido como acción con relevancia presente. No se intensifica la afirmación más allá del texto; la esperanza de Lea permanece esperanzada, no asegurada.
  doctrine_reference: Narrativa de Génesis 29:32; sin referencia doctrinal específica adicional
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés, sin cambios de sentido relevantes respecto a la versión inglesa aprobada. Se mantuvo la estructura narrativa, el juego de palabras en el nombre propio mediante nota, y el nombre divino según la política del proyecto en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, en línea con la decisión doctrinal del proyecto.
  - Se eligió «mi esposo» para אִישִׁי por el contexto marital inmediato; «mi hombre» sonaría forzado en español.
  - Se preservó la explicación causal con «Porque» para reflejar el valor del כִּי explicativo en el discurso de Lea.
  - «Rubén» se adapta a la forma española usual del nombre propio, mientras la nota conserva el juego etimológico.
