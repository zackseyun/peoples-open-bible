translation:
  language: es
  text: Y mientras se le iba la vida[a] —porque estaba muriendo— le puso por nombre Ben-oni[b]; pero su padre lo llamó Benjamín[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «mientras se le iba el alma».'
    reason: lexical_alternative
  - marker: b
    text: Ben-oni probablemente significa «hijo de mi dolor» o «hijo de mi aflicción».
    reason: lexical_alternative
  - marker: c
    text: Benjamín puede significar «hijo de la mano derecha»; algunos lo entienden como «hijo del sur».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵאת נַפְשָׁהּ
  english_pob_choice: as her life was departing
  chosen_spanish: mientras se le iba la vida
  alternatives_spanish:
  - mientras su alma salía
  - mientras se le iba el alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la vida animada o el aliento vital, no necesariamente una afirmación técnica sobre el alma separándose del cuerpo. En español, «mientras se le iba la vida» expresa con naturalidad la acción temporal del hebreo y evita cargar el texto con una antropología más específica de lo que exige el contexto.
- source_word: כִּי מֵתָה
  english_pob_choice: for she was dying
  chosen_spanish: porque estaba muriendo
  alternatives_spanish:
  - pues murió
  - porque moría
  lexicon: HALOT
  rationale: La cláusula explica el estado previo y sugiere simultaneidad narrativa con el acto de nombrar. «Porque estaba muriendo» conserva ese flujo y reproduce la relación explicativa del hebreo sin convertirla en una simple fórmula de pasado cerrado.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: she called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: El español bíblico y digno suele expresar el idiomático hebreo con «llamar el nombre de alguien». «Llamó su nombre» mantiene la forma del relato y la paralela relación con la segunda cláusula.
- source_word: בֶּן אוֹנִי
  english_pob_choice: Ben-oni
  chosen_spanish: Ben-oni
  alternatives_spanish:
  - Benoni
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse en el texto principal. Se conserva con guion para reflejar su forma compuesta y su identidad narrativa.
- source_word: וְאָבִיו קָרָא לוֹ
  english_pob_choice: but his father called him
  chosen_spanish: pero su padre lo llamó
  alternatives_spanish:
  - y su padre lo llamó
  - su padre le puso por nombre
  lexicon: HALOT
  rationale: «Pero» comunica la contraposición narrativa entre el nombre dado por la madre y el que da el padre. «Lo llamó» mantiene el paralelismo con la primera mitad del versículo y resulta natural en español.
- source_word: בִנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio, que es idiomática y plenamente reconocible para lectores de la Biblia en español.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en contexto de muerte
  english_pob_reading: Rendered as 'life' rather than 'soul' in the main text
  chosen_spanish_reading: «vida» en vez de «alma» en el texto principal
  alternative_spanish_readings:
  - alma
  rationale: El hebreo נֶפֶשׁ puede referirse a la vida, la persona viviente o la garganta/aliento vital. En este contexto de agonía, «vida» conserva la tensión sin imponer una doctrina precisa sobre la constitución del ser humano.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente anclado en el texto español. No se añadieron notas sin anclaje y se mantuvo la correspondencia auditada con el inglés POB y el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Ben-oni» transliterado en el texto principal, como nombre propio hebreo.
  - Se usó «Benjamín» en forma española asentada para el nombre dado por el padre.
  - Se prefirió «vida» para נֶפֶשׁ en la línea principal, preservando la tensión antropológica documentada.
  - La contraposición narrativa quedó marcada con «pero», siguiendo la lectura inglesa auditada.
