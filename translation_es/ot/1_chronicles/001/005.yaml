translation:
  language: es
  text: 'Los hijos de Jafet: Gomer[a], Magog, Madai, Javán, Tubal, Mesec y Tiras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En esta fórmula genealógica, «hijos de» puede referirse a hijos inmediatos o a descendientes en sentido más amplio; aquí introduce la línea de Jafet en forma de lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי puede introducir una línea familiar inmediata o una descendencia más amplia. En español, «hijos de» conserva la forma genealógica natural y reproduce la relación de pertenencia sin sobrecargarla con una interpretación más amplia que el hebreo aquí no exige.
- source_word: יֶפֶת
  english_pob_choice: Japheth
  chosen_spanish: Jafet
  alternatives_spanish:
  - Jafeth
  lexicon: HALOT
  rationale: Nombre propio; se translitera con la forma bíblica usual en español, más reconocible y estable en contexto genealógico.
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  lexicon: HALOT
  rationale: Nombre propio en lista genealógica; se mantiene como transliteración.
- source_word: מָגוֹג
  english_pob_choice: Magog
  chosen_spanish: Magog
  lexicon: HALOT
  rationale: Nombre propio; transliteración directa.
- source_word: מָדַי
  english_pob_choice: Madai
  chosen_spanish: Madai
  alternatives_spanish:
  - los medos
  lexicon: HALOT
  rationale: Aquí funciona como nombre genealógico propio, no como etnónimo interpretado. Por eso se conserva la transliteración, evitando convertirlo en una identificación histórica que el texto no explicita.
- source_word: יָוָן
  english_pob_choice: Javan
  chosen_spanish: Javán
  alternatives_spanish:
  - Javán
  - Iaván
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración bíblica habitual. Se prefiere Javán con acento gráfico para ajustarlo a la prosodia española.
- source_word: תֻבָל
  english_pob_choice: Tubal
  chosen_spanish: Tubal
  lexicon: HALOT
  rationale: Nombre propio; transliterado sin reinterpretación.
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Meshec
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico la forma estable es «Mesec», que conserva la identificación tradicional y suena natural en la lectura pública.
- source_word: תִירָס
  english_pob_choice: Tiras
  chosen_spanish: Tiras
  lexicon: HALOT
  rationale: Nombre propio final de la lista; transliteración directa.
- source_word: וְ
  english_pob_choice: comma-separated list with final 'and'
  chosen_spanish: lista separada por comas con «y» final
  alternatives_spanish:
  - repetir «y» antes de cada elemento
  lexicon: gramática española
  rationale: El hebreo presenta una lista genealógica; en español, las comas y la conjunción final mantienen la enumeración con fluidez natural sin perder el carácter de lista.
theological_decisions:
- issue: Alcance genealógico de «hijos de»
  english_pob_reading: Hebrew 'sons of' can function genealogically for immediate sons or broader descendants; here it introduces Japheth's line in list form.
  chosen_spanish_reading: «hijos de» mantiene la fórmula genealógica abierta, sin forzar si se trata solo de hijos inmediatos o de una línea más amplia.
  alternative_spanish_readings:
  - «descendientes de»
  - «hijos de» como descendencia en sentido amplio
  rationale: El texto no añade precisión adicional; en español conviene conservar la ambigüedad genealógica inherente, porque el encabezado solo introduce una lista de linaje.
  doctrine_reference: Genealogías bíblicas; precisión histórica y literaria del texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso este borrador sigue de cerca el texto hebreo y el audit trail inglés, sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene la transliteración uniforme de los nombres propios.
  - Se usa «Jafet» como forma española estable para יֶפֶת.
  - Se conserva la lista con puntuación de catálogo genealógico, adecuada para lectura pública.
  - No se introduce interpretación etnológica en nombres como Madai, para respetar el valor genealógico del versículo.
