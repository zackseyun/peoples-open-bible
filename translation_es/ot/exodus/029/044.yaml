revisions:
- from: Y yo consagraré[a] la tienda de reunión y el altar[b]; y consagraré a Aarón y a sus hijos para servir como sacerdotes para mí.
  to: Y consagraré[a] la tienda de reunión y el altar; y consagraré a Aarón y a sus hijos para servirme como sacerdotes[b].
  rationale: 'Se corrigió el aparato de notas para que coincida con la evidencia fuente y el expediente inglés: la nota sobre la expresión literal pertenece a לְכַהֵן לִי, no a «tienda de reunión». Además, se suavizó la sintaxis a un español más natural («para servirme como sacerdotes») y se eliminó el «yo» explícito innecesario, sin cambiar el sentido ni la terminología principal.'
