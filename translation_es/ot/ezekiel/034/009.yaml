  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: לָכֵן = ''Por tanto'', imperativo plural שִׁמְעוּ = ''oigan'', fórmula דְּבַר יְהוָה = ''la palabra de Yahvé''. Sin embargo, הָרֹעִים se tradujo como ''pastores'', que en español eclesial se carga fácilmente hacia un oficio cristiano contemporáneo y no preserva tan claramente la imaginería literal de ''shepherds'' en Ezequiel 34.'
