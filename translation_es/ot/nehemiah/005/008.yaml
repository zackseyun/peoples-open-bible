base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/005/008.yaml
  text: And I said to them[a], “We have bought back our Jewish brothers who were sold to the nations, as much as we were able. But you are even selling your brothers[b], and should they be sold to us?” Then they were silent and found nothing to say.
  footnotes:
  - marker: a
    text: Or “our fellow Jews.” The Hebrew says “our brothers, the Jews,” using a masculine kinship term for fellow members of the community.
    reason: lexical_alternative
  - marker: b
    text: 'Or “and should they be sold to us?” The Hebrew clause is terse and may be understood as a rhetorical consequence: their brothers end up being sold back to their own people.'
    reason: alternative_reading
  ai_draft:
