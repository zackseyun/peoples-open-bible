review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja en general el griego fragmentario y conserva la nota textual apropiada. Sin embargo, omite en el texto principal la fuerza explícita de ἄνδρας ('hombres'), aunque sí la documenta en las decisiones léxicas. También 'se retiró' es aceptable, pero 'partió' se alinea mejor con ἀπῆρεν y con el inglés auditado 'he departed'.
  spanish_quality_summary: El español es legible, pero 'los quemados' suena algo brusco y menos natural en registro bíblico que 'los que fueron quemados', mientras sigue siendo fiel al participio pasivo. 'En número de ocho mil' funciona, pero conviene incorporar 'hombres' para no perder información léxica presente en el griego.
  glossary_alignment: No hay términos del glosario teológico principal implicados aquí. La principal cuestión léxica es preservar ἄνδρας como 'hombres' y no neutralizarlo. La nota textual se mantiene correctamente como variante/testimonio fragmentario.
  issues:
