    issue: La nota [a] está aplicada al término equivocado.
    rationale: En la auditoría inglesa, la alternativa documentada con nota corresponde a ויתנה («y él dará/que lo dé»), no a עֹשֵׂי הַמְּלָאכָה. Anclarla a «obreros» altera la trazabilidad de la decisión lexical.
  - severity: low
