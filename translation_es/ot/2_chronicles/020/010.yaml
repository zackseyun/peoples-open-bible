revisions:
- from: Y ahora[a], mira, los hijos de Amón, Moab y el monte Seír[b], a quienes no permitiste que Israel entrara contra ellos[c] cuando salieron de la tierra de Egipto, porque se apartaron de ellos y no los destruyeron.
  to: Y ahora[a], mira, los hijos de Amón, Moab y el monte Seír[b], contra quienes no permitiste que Israel entrara[c] cuando salieron de la tierra de Egipto, porque se apartaron de ellos y no los destruyeron—
  rationale: Se ajusta la sintaxis para que el español sea natural sin perder la cercanía al hebreo ('contra quienes no permitiste que Israel entrara'), se corrige la nota [b] para que refleje con precisión la alternativa/literalidad documentada por la POB inglesa, y se deja la oración abierta con raya final para respetar la continuidad del original.
