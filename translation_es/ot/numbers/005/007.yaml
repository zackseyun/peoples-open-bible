review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: confesión del pecado cometido, restitución del principal, adición de un quinto y entrega al agraviado. Sin embargo, dos giros españoles no preservan con suficiente naturalidad y precisión el sentido fuente: «restituirá íntegramente su culpa» suena semánticamente impropio en español, porque no se restituye la culpa sino lo adeudado por ella; y «al que fue objeto de su culpa» resulta poco idiomático y menos claro que una formulación que exprese la persona agraviada sin perder el matiz de responsabilidad.'
  spanish_quality_summary: La redacción es generalmente digna y clara, pero necesita ajuste para sonar natural en español eclesial moderno. «Añadiendo un quinto sobre ello» es comprensible, aunque «a ello» o «además un quinto» fluye mejor. La principal dificultad es combinar fidelidad al hebreo con español natural en las expresiones de restitución y del destinatario.
  glossary_alignment: No hay conflicto con los términos teológicos por defecto del proyecto. La decisión de no usar «ofrenda por la culpa» está bien fundamentada. «Pecado» para חַטָּאתָם y «culpa» para אָשָׁם son defendibles, pero en español conviene explicitar en la línea principal que se restituye el monto adeudado, no la culpa misma.
  issues:
  - severity: high
    issue: «restituirá íntegramente su culpa» es español semánticamente defectuoso
    rationale: El hebreo habla de restituir el principal correspondiente a su culpa/deuda, no de restituir la culpa misma. La formulación actual puede confundir al lector y no comunica bien el sentido jurídico-económico documentado por el POB.
  - severity: medium
    issue: «al que fue objeto de su culpa» es poco idiomático
    rationale: Aunque intenta conservar la relación de culpabilidad del hebreo, en español suena forzado y opaco. Una formulación como «a aquel con quien tenía esa deuda» o «a la persona ante la cual era culpable» preserva mejor la idea con mayor legibilidad.
  - severity: low
    issue: La nota [a] no sigue de cerca la nota inglesa auditada
    rationale: La nota inglesa destaca como alternativa principal el destinatario final («to the one he wronged»), mientras que la nota española [a] introduce alternativas para «pecado». No es incorrecto, pero conviene alinear las notas con los puntos de ambigüedad realmente preservados por el expediente inglés.
  revised_spanish_text: Entonces confesarán el pecado que han cometido, y él hará restitución íntegra por su culpa[a], añadiendo un quinto a ello, y lo dará a aquel con quien tenía esa deuda[b].
  revised_footnotes:
