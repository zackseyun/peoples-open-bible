revisions:
- from: Comerá cuajada y miel[a][b] hasta que sepa rechazar el mal y escoger el bien.
  to: Comerá cuajada y miel[a][b] para cuando ya sepa rechazar el mal y escoger el bien.
  rationale: 'Se ajusta únicamente la expresión temporal para alinear el español con la decisión auditada del POB inglés: no un simple «cuando», ni un «hasta que» con matiz terminal, sino un sentido de «para cuando ya sepa». Esto preserva mejor la temporalidad de לְדַעְתּוֹ sin convertirla en propósito ni insinuar que la dieta cesa en ese momento.'
