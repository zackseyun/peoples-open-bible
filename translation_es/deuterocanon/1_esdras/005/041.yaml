    text: Or 'apart from male and female slaves.' The Greek terms can denote household servants in dependent status; the context here is a census total rather than a focus on legal condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'male and female singers.' The Greek distinguishes ψάλται and ψαλτῳδοί rather than using a single undifferentiated term.
    reason: lexical_alternative
