review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro de auditoría POB: כִּי como explicación («Porque»), la metáfora literal de «fuego», עַד אֲבַדּוֹן como «hasta la destrucción» con la alternativa «Abadón» preservada en nota, y תְשָׁרֵשׁ como destrucción total con imagen agrícola («arrancaría de raíz»). También conserva bien el matiz condicional/heredado del contexto mediante «arrancaría».'
  spanish_quality_summary: El español es natural, claro y digno. «Porque es un fuego que consume hasta la destrucción» suena bien y mantiene la fuerza del original. «Arrancaría de raíz toda mi cosecha» expresa idiomáticamente el verbo intensivo sin calco torpe. La puntuación, el registro y la nota están bien logrados.
  glossary_alignment: No hay términos del glosario de proyecto en disputa en este versículo. La elección «Abadón» en nota es coherente con la política de preservar alternativas significativas cuando el hebreo lo permite. «Cosecha» para תְּבוּאָתִי es una adaptación contextual legítima y legible del campo semántico de produce/yield.
  issues:
