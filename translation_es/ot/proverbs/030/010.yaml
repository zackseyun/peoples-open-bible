revisions:
- from: No calumnies a un esclavo ante su señor,[a] para que no te maldiga y quedes culpable.
  to: No calumnies a un esclavo[a] ante su amo, no sea que te maldiga y quedes culpable.
  rationale: Se revisa «ante su señor» a «ante su amo» para reflejar con más precisión la relación social de אֶל אדניו en un contexto de esclavitud. Se cambia «para que no» por «no sea que» para representar mejor el valor de advertencia de פֶּן. Se conserva «calumnies», «esclavo», «te maldiga» y «quedes culpable» porque transmiten adecuadamente las decisiones léxicas documentadas.
