revisions:
- from: 'Entonces el rey de Israel dijo[a]: «Tomen a Micaías y tráiganlo de vuelta a Amon, el gobernador de la ciudad[b], y a Joás, el hijo del rey».'
  to: 'Entonces el rey de Israel dijo: «Tomen a Micaías y devuélvanlo a Amón, el gobernador[a] de la ciudad, y a Joás, hijo[b] del rey».'
  rationale: La revisión corrige los anclajes de las notas, ajusta el verbo principal a una opción más fiel al causativo hebreo («devuélvanlo»), normaliza «Amón» para el español, y hace que la nota sobre «hijo del rey» sea una variante real en lugar de repetir el texto principal. El resultado preserva mejor tanto el sentido fuente como la claridad del español.
