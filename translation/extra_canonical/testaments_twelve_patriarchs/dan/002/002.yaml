  from: 'Anger is an evil thing, my children[b], because it troubles even the soul
    itself. And the body of the angry man it makes its own, and over his soul it gains
    mastery, and it bestows power on the body, so that it works every lawless deed.
    And when the body does all these things, the soul justifies what is done, because
    it does not see rightly. Therefore he who is wrathful, if he is a mighty man,
    has a threefold power in his anger: one from the help of his servants, and a second
    from his wealth, by which he persuades and overcomes unjustly, and a third, because
    he has his own natural power, and by it he works evil. And if the wrathful man
    is also poor, he has a twofold power of anger; for it always helps him toward
    wrongdoing.'
