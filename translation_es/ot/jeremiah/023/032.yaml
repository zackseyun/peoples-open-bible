  text: הִ֠נְ/נִי עַֽל נִבְּאֵ֞י חֲלֹמ֥וֹת שֶׁ֨קֶר֙ נְאֻם יְהוָ֔ה וַֽ/יְסַפְּרוּ/ם֙ וַ/יַּתְע֣וּ אֶת עַמִּ֔/י בְּ/שִׁקְרֵי/הֶ֖ם וּ/בְ/פַחֲזוּתָ֑/ם וְ/אָנֹכִ֨י לֹֽא שְׁלַחְתִּ֜י/ם וְ/לֹ֣א צִוִּיתִ֗י/ם וְ/הוֹעֵ֛יל לֹֽא יוֹעִ֥ילוּ לָֽ/עָם הַ/זֶּ֖ה נְאֻם יְהוָֽה־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/032.yaml
  text: Behold[a], I am against those who prophesy lying dreams, declares Yahweh, and who tell them and lead my people astray by their lies and by their recklessness, though I did not send them or command them. They do not profit this people at all[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'those who prophesy false dreams.' The Hebrew literally has 'lying dreams,' using the noun 'lie/falsehood' attributively.
    reason: lexical_alternative
  - marker: b
    text: Or 'their boastfulness,' 'their rashness,' or 'their frivolity' for 'their recklessness.' The Hebrew term is difficult and conveys irresponsible, presumptuous conduct.
    reason: lexical_alternative
