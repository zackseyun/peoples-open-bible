translation:
  language: es
  text: Y los peces del Nilo murieron[a], y el Nilo hedió, de modo que los egipcios no pudieron beber agua del Nilo. Y hubo sangre por toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יְאֹר significa literalmente «río», pero en Éxodo se refiere de manera específica al Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּגָה
  english_pob_choice: the fish
  chosen_spanish: los peces
  alternatives_spanish:
  - el pescado
  - la fauna acuática
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo para los peces del río. En español, el plural «los peces» comunica de forma natural ese colectivo en el flujo narrativo, sin sobrecargarlo con una abstracción como «fauna acuática» ni restringirlo a «pescado».
- source_word: יְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  - el gran río
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo. «El Nilo» es la forma más clara y fiel en español, y evita la ambigüedad del genérico «el río».
- source_word: מֵתָה
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murió
  - estaban muertos
  lexicon: HALOT
  rationale: El verbo expresa muerte en una secuencia narrativa. El plural español concuerda con «los peces» y conserva la simpleza del perfecto narrativo.
- source_word: וַיִּבְאַשׁ
  english_pob_choice: stank
  chosen_spanish: hedió
  alternatives_spanish:
  - apestó
  - se pudrió
  lexicon: HALOT
  rationale: El verbo comunica un hedor fuerte o volverse fétido. «Hedió» mantiene el tono vívido y fuerte del pasaje, cercano a la fuerza del inglés «stank» sin suavizarlo.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: could not
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no podían
  - no fueron capaces de
  lexicon: HALOT
  rationale: La negación de capacidad se expresa de manera idiomática con «no pudieron», preservando la fuerza narrativa de la imposibilidad.
- source_word: לִשְׁתּוֹת מַיִם מִן הַיְאֹר
  english_pob_choice: drink water from the Nile
  chosen_spanish: beber agua del Nilo
  alternatives_spanish:
  - beber del Nilo
  - beber el agua del Nilo
  lexicon: HALOT
  rationale: Se conserva explícitamente «agua» para reflejar el objeto directo del hebreo y se usa «del Nilo» para la relación de origen, con una construcción natural en español.
- source_word: וַיְהִי הַדָּם
  english_pob_choice: there was blood
  chosen_spanish: hubo sangre
  alternatives_spanish:
  - había sangre
  - se convirtió en sangre
  lexicon: HALOT
  rationale: El valor existencial de ויהי aquí se expresa mejor con «hubo». Mantiene la sobriedad narrativa y evita sugerir por sí solo un proceso adicional no explicitado en la cláusula.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: por toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra egipcia
  lexicon: HALOT
  rationale: «Por toda» comunica bien el alcance distributivo de בכל, y «tierra de Egipto» refleja la fórmula bíblica tradicional sin depender de un calco rígido.
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo masorético y con la auditoría inglesa existente. No se introdujeron cambios textuales ni lecturas alternativas; la principal decisión fue resolver en español la referencia específica de יְאֹר como «el Nilo» y conservar el tono fuerte de וַיִּבְאַשׁ con «hedió».
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo del hebreo y de la POB inglesa: muerte de los peces, hedor del río, imposibilidad de beber, y sangre extendida por Egipto.'
  - Se preservó la referencia específica al Nilo tanto en el texto principal como en la nota, coherente con la auditoría inglesa.
  - No se usó «SEÑOR» ni terminología teológica que no corresponda a este versículo.
  - La sintaxis busca ser publicable y natural en español, sin perder la concatenación de acciones del original.
