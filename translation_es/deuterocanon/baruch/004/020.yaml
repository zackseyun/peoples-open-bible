translation:
  language: es
  text: He quitado la vestidura de paz, pero me he puesto el cilicio[a] de mi súplica; clamaré al Eterno[b] en mis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cilicio» es una prenda áspera asociada en la Biblia con duelo, humillación y súplica intensa.
    reason: cultural_note
  - marker: b
    text: O «el Siemprevivo». El griego usa un adjetivo sustantivado que literalmente significa «el eterno» y funciona aquí como designación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδυσάμην
  english_pob_choice: I have taken off
  chosen_spanish: He quitado
  alternatives_spanish:
  - Me he despojado de
  - He sacado
  lexicon: BDAG
  rationale: El aoristo medio expresa quitarse uno mismo una prenda. En español, «he quitado» mantiene la acción de remover la vestidura con naturalidad y sin cargar el verbo con un matiz más brusco de lo necesario.
- source_word: στολὴν
  english_pob_choice: robe
  chosen_spanish: vestidura
  alternatives_spanish:
  - ropa
  - manto
  - vestido
  lexicon: BDAG
  rationale: «Vestidura» conserva el registro digno y bíblico de στολή. «Ropa» sería demasiado general; «manto» y «vestido» restringen más de lo que el griego exige.
- source_word: τῆς εἰρήνης
  english_pob_choice: peace
  chosen_spanish: de paz
  alternatives_spanish:
  - de bienestar
  - de tranquilidad
  lexicon: BDAG
  rationale: El genitivo cualifica la vestidura de manera metafórica. «De paz» es la forma más directa y transparente en español, sin reducir el alcance a mera serenidad psicológica.
- source_word: ἐνεδυσάμην
  english_pob_choice: I have put on
  chosen_spanish: me he puesto
  alternatives_spanish:
  - me he vestido con
  - he tomado
  lexicon: BDAG
  rationale: El paralelo con «he quitado» se conserva mejor con «me he puesto». Esta opción suena natural en español y mantiene la imaginería de vestirse.
- source_word: σάκκον
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de penitencia
  - vestidura áspera de duelo
  lexicon: BDAG
  rationale: El término bíblico tradicional «cilicio» comunica en español una prenda áspera asociada al duelo, la penitencia y la aflicción. Aunque «sackcloth» literalmente es «tela de saco», en español «cilicio» es el equivalente bíblico más reconocible sin perder la referencia cultural.
- source_word: δεήσεώς μου
  english_pob_choice: my supplication
  chosen_spanish: de mi súplica
  alternatives_spanish:
  - de mi ruego
  - de mi plegaria
  lexicon: BDAG
  rationale: «Súplica» reproduce bien la intensidad de δέησις como petición urgente y humilde. Se mantiene el posesivo para reflejar el griego.
- source_word: κεκράξομαι
  english_pob_choice: I will cry out
  chosen_spanish: clamaré
  alternatives_spanish:
  - gritaré
  - exclamaré
  lexicon: BDAG
  rationale: «Clamaré» transmite el grito insistente y urgente de κράζω en un registro bíblico natural para el español. «Gritaré» sería más físico y menos devocional; «exclamaré» debilita la urgencia.
- source_word: τὸν αἰώνιον
  english_pob_choice: the Eternal One
  chosen_spanish: el Eterno
  alternatives_spanish:
  - el Eterno Uno
  - el Siemprevivo
  lexicon: BDAG
  rationale: El adjetivo sustantivado se expresa de forma compacta y reverente como «el Eterno». Esta solución preserva el título divino sin sustituirlo por «Dios» o «Señor», siguiendo la decisión del POB de visibilizar el griego.
- source_word: ἐν ταῖς ἡμέραις μου
  english_pob_choice: in my days
  chosen_spanish: en mis días
  alternatives_spanish:
  - durante mis días
  - todos mis días
  lexicon: BDAG
  rationale: «En mis días» es la traducción más directa. No se añade «todos», porque el griego no lo expresa explícitamente.
theological_decisions:
- issue: Título divino τὸν αἰώνιον
  english_pob_reading: the Eternal One
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el Eterno Uno
  - el Siemprevivo
  rationale: Se conserva la designación sustantivada del griego como título divino distintivo. No se normaliza a «Dios» ni a «Señor», porque el texto presenta una formulación intencionalmente particular que conviene dejar visible al lector español.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca la pauta del inglés POB y del griego subyacente. Se mantuvo la metáfora de vestirse/desvestirse, se conservó el contraste entre paz y súplica, y se reflejó el título divino τὸν αἰώνιον sin reemplazarlo por una normalización interpretativa.
  spanish_consistency_notes:
  - Se prefirió «vestidura» para mantener el registro bíblico y la correspondencia con στολή.
  - «Cilicio» se eligió como equivalente español establecido para σάκκος en contexto de duelo/súplica.
  - «El Eterno» preserva la decisión del POB de no traducir el título divino por «Señor» o «Dios».
  - La puntuación reproduce el paralelismo del original con coma y punto y coma para separar las tres cláusulas.
