base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/013.yaml
  text: Woe to him who builds his house without righteousness[a], and his upper rooms without justice[c][b], who makes his neighbor work for nothing and does not give him his wages.
  footnotes:
  - marker: a
    text: Or 'without justice' for 'without righteousness'; the Hebrew pair צֶדֶק and מִשְׁפָּט are closely related and can overlap in meaning.
    reason: lexical_alternative
  - marker: b
    text: '''Upper rooms'' may also be rendered ''upper chambers'' or ''upper stories,'' referring to the upper part of a substantial house.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'his work'; in context this means the laborer's due pay or wages.
    reason: lexical_alternative
