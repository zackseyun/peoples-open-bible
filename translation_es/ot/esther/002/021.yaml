translation:
  language: es
  text: En aquellos días, mientras Mardoqueo estaba sentado en la puerta del rey, Bigtán y Teres, dos de los eunucos[a] del rey, de entre los que guardaban el umbral, se enojaron y buscaron alzar la mano contra[b] el rey Asuero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los oficiales de la corte del rey'; el término hebreo puede referirse más ampliamente a funcionarios reales, aunque 'eunucos' es probable en este contexto cortesano.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'extender/enviar una mano contra'; es decir, atacar o intentar asesinar al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En ese tiempo
  lexicon: HALOT
  rationale: La fórmula temporal narrativa se conserva de modo idiomático en español. 'En aquellos días' suena natural y mantiene el valor de marco temporal amplio sin precisar más de lo que dice el hebreo.
- source_word: יֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se hallaba
  - residía
  lexicon: HALOT
  rationale: El participio describe una circunstancia continua. 'Estaba sentado' reproduce bien la escena concreta en la puerta del rey y evita diluirla con un verbo más general como 'residía'.
- source_word: בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: at the king’s gate
  chosen_spanish: a la puerta del rey
  alternatives_spanish:
  - en la puerta del rey
  - a la puerta real
  lexicon: HALOT
  rationale: '''Puerta'' comunica el lugar institucional y narrativo en un español más natural que ''portón'' o una forma más literal. Se conserva la relación con la administración real.'
- source_word: קָצַף
  english_pob_choice: became angry
  chosen_spanish: se enojaron
  alternatives_spanish:
  - se irritaron
  - se enfurecieron
  lexicon: HALOT
  rationale: El verbo expresa enojo; en español 'se enojaron' es claro y suficientemente directo. No se intensifica artificialmente a 'enfurecieron' porque el hebreo no obliga a ese grado.
- source_word: סָרִיסֵי הַמֶּלֶךְ
  english_pob_choice: the king’s eunuchs
  chosen_spanish: los eunucos del rey
  alternatives_spanish:
  - los oficiales del rey
  - los cortesanos del rey
  lexicon: HALOT
  rationale: En este contexto persa, 'eunucos' es la opción más concreta y probable. Se mantiene la posibilidad más amplia documentada por la nota inglesa, pero sin borrarla en el texto principal.
- source_word: מִשֹּׁמְרֵי הַסַּף
  english_pob_choice: from those who guarded the threshold
  chosen_spanish: de entre los que guardaban el umbral
  alternatives_spanish:
  - de entre los guardianes de la puerta
  - de entre los que vigilaban la entrada
  lexicon: HALOT
  rationale: '''Umbral'' conserva la imagen literal de הַסַּף y su referencia al área de acceso. La construcción ''de entre los que guardaban'' refleja bien la pertenencia al grupo sin sobretraducir.'
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - intentaron
  - tramaron
  lexicon: HALOT
  rationale: El verbo 'buscar' conserva el valor básico de וַיְבַקְשׁוּ; en este contexto hostil, el complemento completa la intención. 'Tramaron' ya interpreta demasiado el verbo por sí solo.
- source_word: לִשְׁלֹחַ יָד
  english_pob_choice: to lay hands on
  chosen_spanish: poner la mano sobre
  alternatives_spanish:
  - alzar la mano contra
  - atentar contra
  lexicon: HALOT
  rationale: La expresión española sigue de cerca la imagen idiomática de 'extender/enviar una mano'. 'Poner la mano sobre' preserva la fuerza figurada sin especificar prematuramente el medio exacto del ataque.
- source_word: אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Asuero
  alternatives_spanish:
  - Ahasuero
  - Jerjes
  lexicon: HALOT
  rationale: Se usa la forma tradicional establecida en español bíblico para el nombre hebreo, coherente con la transliteración heredada en la recepción castellana y legible para la audiencia eclesial.
theological_decisions:
- issue: Alcance de סָרִיסֵי הַמֶּלֶךְ en contexto cortesano persa
  english_pob_reading: the king’s eunuchs
  chosen_spanish_reading: los eunucos del rey
  alternative_spanish_readings:
  - los oficiales del rey
  - los funcionarios del rey
  rationale: No hay una tensión doctrinal directa, pero sí una decisión histórica-lexical relevante. Dado el contexto de Esther y el audit trail inglés, se mantiene 'eunucos' en el texto principal para no neutralizar el referente concreto.
  doctrine_reference: No aplica; decisión léxica e histórica
translation_notes:
  revision_awareness: El contexto inglés indica acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca las decisiones ya auditadas, sin introducir nuevas interpretaciones ni cambios textuales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva 'Asuero' como forma tradicional española coherente con el nombre hebreo del rey en Ester.
  - Se prefirió 'umbral' para reflejar la imagen concreta del hebreo הַסַּף sin volverla innecesariamente abstracta.
