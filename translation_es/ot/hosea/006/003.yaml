base_translation:
  language: en
  yaml_path: translation/ot/hosea/006/003.yaml
  text: So let us know[a]; let us press on to know Yahweh. His going forth is as sure as the dawn, and he will come to us like the rain[d][c][b], like the spring rain that waters the earth.
  footnotes:
  - marker: a
    text: Or 'let us pursue' or 'let us strive after' to know the LORD.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'His going forth'; possibly 'his appearing.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''may he come to us like the rain.'' The Hebrew verb can be taken as a wish, though the context also supports a confident future: ''he will come.'''
    reason: alternative_reading
  - marker: d
    text: '''Spring rain'' translates Hebrew ''latter rain,'' the late seasonal rain important for crops.'
    reason: cultural_note
