id: MAT.23.14
reference: Matthew 23:14
source:
  edition: robinson-pierpont-2005-byzantine
  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι κατεσθίετε τὰς οἰκίας τῶν
    χηρῶν, καὶ προφάσει μακρὰ προσευχόμενοι· διὰ τοῦτο λήψεσθε περισσότερον κρίμα.
  language: Greek
translation:
  text: Woe[a] to you, scribes and Pharisees, hypocrites! For you devour widows' houses,
    and as a pretext make long prayers; therefore you will receive greater condemnation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 4th-century
      Sinaiticus and Vaticanus) and early Coptic translations, but is preserved in
      the Byzantine majority tradition, the Old Latin, the Vulgate, and the Syriac.
      It was likely added by later scribes to harmonize with similar statements in
      Mark 12:40 and Luke 20:47. Manuscripts that include it vary on whether it appears
      before or after verse 13.
    reason: textual_critical
lexical_decisions:
- source_word: κατεσθίω
  chosen: devour
  alternatives:
  - consume
  - eat up
  - destroy
  lexicon: BDAG
  rationale: Metaphorically describes the ruthless exploitation and financial ruin
    of vulnerable widows' estates.
- source_word: πρόφασις
  chosen: as a pretext
  alternatives:
  - for a show
  - for a pretense
  - as an excuse
  lexicon: BDAG
  rationale: Denotes a false motive or outward show designed to conceal true, malicious
    intentions.
- source_word: περισσότερος
  chosen: greater
  alternatives:
  - more severe
  - stricter
  - more abundant
  lexicon: BDAG
  rationale: In the context of a punitive sentence (krima), it indicates a heavier
    or more severe penalty due to their hypocrisy.
- source_word: κρίμα
  chosen: condemnation
  alternatives:
  - judgment
  - sentence
  - verdict
  lexicon: BDAG
  rationale: While 'judgment' is the literal rendering, 'condemnation' fits the context
    of a negative punitive sentence resulting from their exploitative actions.
theological_decisions: []
