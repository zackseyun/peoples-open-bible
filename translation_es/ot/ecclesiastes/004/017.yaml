    reason: lexical_alternative
  - marker: b
    text: O «para oír» en lugar de «para escuchar».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «pues no saben hacer el mal»; probablemente significa que no se dan cuenta de que su acción es mala.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del contraste en español: «en vez de ofrecer» expresa mejor la relación entre escuchar y el sacrificio de los necios. También se ajustó la nota b para que refleje de forma más natural el infinitivo anotado.'
