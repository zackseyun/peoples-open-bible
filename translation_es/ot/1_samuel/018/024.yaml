translation:
  language: es
  text: 'Los servidores de Saúl le dijeron[a], diciendo: «David habló palabras como estas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «según/como estas palabras habló David».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: told
  chosen_spanish: le informaron
  alternatives_spanish:
  - le dijeron
  - le comunicaron
  lexicon: HALOT
  rationale: El hifil de נגד expresa dar noticia o informar. «Le informaron» conserva el valor de reporte y suena natural en español sin perder el matiz formal del anuncio.
- source_word: עַבְדֵי שָׁאוּל
  english_pob_choice: Saul’s servants
  chosen_spanish: los siervos de Saúl
  alternatives_spanish:
  - los servidores de Saúl
  - los servidores del rey Saúl
  lexicon: HALOT
  rationale: עבד puede significar siervo/servidor/funcionario según el contexto. En la corte de Saúl, «siervos» mantiene la correspondencia léxica con la raíz hebrea y no sobreinterpreta su rango.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre retoma a Saúl. En español, con «informaron» la forma natural es el complemento indirecto «le».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - 'así:'
  lexicon: HALOT
  rationale: La partícula introduce el contenido del reporte. «Diciendo» preserva el marcador discursivo hebreo de manera directa y transparente.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: words like these
  chosen_spanish: palabras como estas
  alternatives_spanish:
  - estas palabras
  - palabras de este tipo
  - palabras semejantes
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «según/como estas palabras». «Palabras como estas» refleja mejor el matiz comparativo que un simple «estas palabras».
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: דבר se traduce con frecuencia como «hablar»; aquí mantiene la distinción frente a אמר y encaja bien con la repetición de «palabras».
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
translation_notes:
  revision_awareness: La versión española sigue el ajuste del audit trail inglés que privilegia el matiz de כַּדְּבָרִים הָאֵלֶּה como comparación («words like these») y lo vuelve explícito con «palabras como estas».
  spanish_consistency_notes:
  - Se mantuvo la estructura narrativa breve del hebreo con un verbo de reporte seguido de la cita directa.
  - Se prefirió «siervos» para עַבְדֵי, en línea con el valor léxico amplio de עבד en contexto cortesano.
  - La nota[a] queda anclada en el texto para reflejar la alternativa literal sin recargar la lectura principal.
