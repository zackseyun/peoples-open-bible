    reason: previous_rendering
  revision_rationale: Se corrigieron los anclajes y el contenido de las notas para que reflejen el audit trail inglés y el lugar exacto del texto al que se refieren. También se hizo una reparación menor de estilo en la cláusula final para mejorar la naturalidad del español sin perder el sentido del hebreo ni la repetición del motivo 'en tu corazón'.
