lexical_decisions:
- source_word: לִיהוּדָה
  english_pob_choice: for Judah
  chosen_spanish: para Judá
  alternatives_spanish:
  - de Judá
  - en representación de Judá
  lexicon: HALOT
  rationale: La ל prefijada aquí expresa asignación o representación dentro de la lista tribal. En español, «para Judá» comunica con naturalidad esa relación funcional sin convertirla en posesión ni en una calco rígido.
- source_word: נַחְשׁוֹן
  english_pob_choice: Nahshon
  chosen_spanish: Nahsón
  alternatives_spanish:
  - Nahshon
  lexicon: convención onomástica bíblica en español
  rationale: Se translitera el nombre propio a una forma legible en español. Se prefiere «Nahsón» para aproximar la pronunciación y mantener fluidez en español, sin alterar la identidad del personaje.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  - el hijo de
  lexicon: HALOT
  rationale: La cadena constructa con nombre propio indica filiación inmediata de manera natural en este contexto. «Hijo de» preserva el sentido directo y es idiomático en español bíblico contemporáneo.
- source_word: עַמִּינָדָב
  english_pob_choice: Amminadab
  chosen_spanish: Aminadab
  alternatives_spanish:
  - Amminadab
  lexicon: convención onomástica bíblica en español
  rationale: Se adopta la forma castellana breve y reconocible del nombre propio, manteniendo la transliteración funcional del original y evitando una grafía excesivamente anglicada.
