revisions:
- from: Reúnan al pueblo[a]; consagren la asamblea; reúnan a los ancianos; reúnan a los niños, incluso a los lactantes[b]. Que salga el novio de su aposento, y la novia de su habitación[c].
  to: Reúnan al pueblo; consagren la asamblea; reúnan a los ancianos[a]; reúnan a los niños, incluso a los lactantes[b]. Que salga el novio de su aposento, y la novia de su cámara[c].
  rationale: Se corrige la nota [a] para que preserve la alternativa real documentada para זְקֵנִים, se mejora la naturalidad de la nota [b], y se ajusta «habitación» a «cámara» para un registro más apropiado y una mejor correspondencia estilística con «aposento». No se requieren cambios de fondo en el sentido del versículo.
