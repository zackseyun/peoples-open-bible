reference: 1 Timothy 5:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ δὲ ὄντως χήρα καὶ μεμονωμένη ἤλπικεν ἐπὶ ⸀θεὸν καὶ προσμένει ταῖς δεήσεσιν καὶ ταῖς προσευχαῖς νυκτὸς καὶ ἡμέρας·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/005.yaml
  text: Now she who is truly a widow[a], and is left all alone[c][b], has set her hope on God and continues in petitions and prayers night and day.
  footnotes:
  - marker: a
    text: Or 'is alone' or 'is left alone'; the Greek participle emphasizes her state of being without supporting family.
    reason: lexical_alternative
  - marker: b
    text: Or 'has hoped in God.' The Greek perfect may emphasize a settled hope with continuing effect.
    reason: lexical_alternative
  - marker: c
    text: The two terms 'petitions' and 'prayers' are both retained to reflect the Greek distinction between specific requests and prayer more generally.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 참으로 과부인, 홀로 남겨진 자[a]는 하나님께 소망을 두고[b] 밤낮으로 간구와 기도에 머무릅니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「홀로 있는」 「혼자 남겨진」. 헬라어 분사는 의지할 가족 없는 상태를 강조한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님께 소망을 두어 왔다」. 헬라어 완료형은 자리잡힌 소망의 지속적 효과를 강조할 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 「간구」와 「기도」 두 어휘 모두 보존했으며, 이는 구체적 청원과 보다 일반적인 기도 사이의 헬라어 구분을 반영한다.
    reason: lexical_alternative
