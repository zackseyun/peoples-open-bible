    issue: La nota al pie no preserva la alternativa léxica correcta del POB inglés.
    rationale: El inglés documenta como alternativa formal «and he surely blessed you», mientras que la nota española ofrece «y ciertamente los bendijo», que es sustancialmente igual al texto principal y no constituye una alternativa real. Debe reflejar una opción más formal como «y de veras los bendijo» o similar, además de mantener la explicación sobre la construcción enfática hebrea.
  revised_spanish_text: Pero yo no quise escuchar a Balaam[a], y él ciertamente los bendijo; así los libré de su mano.
  revised_footnotes:
