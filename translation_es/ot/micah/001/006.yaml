  to: Así convertiré a Samaria en un montón de ruinas en el campo abierto[a], en lugar para plantar viñas; derramaré sus piedras en el valle[b] y dejaré al descubierto sus cimientos.
  rationale: 'Se añadió «en el campo abierto» para reflejar explícitamente הַשָּׂדֶה y alinearse con el POB inglés. Se corrigieron las notas para que correspondan a las alternativas realmente auditadas: [a] sobre «montón de ruinas en el campo» y [b] sobre el verbo de las piedras derramadas/ arrojadas al valle o barranco. También se mejoró levemente la naturalidad de «descubriré» a «dejaré al descubierto» sin cambiar el sentido.'
