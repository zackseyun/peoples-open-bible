translation:
  language: es
  text: Y no yacen con los valientes caídos de entre los incircuncisos[a], que descendieron al Seol con sus armas de guerra, y pusieron sus espadas debajo de sus cabezas, y sus iniquidades estaban sobre sus huesos[e][d][c][b]; porque fueron el terror de los valientes en la tierra de los vivientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y no yacerán». El verbo hebreo puede entenderse con matiz futuro en este lamento.'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posibilidad: «con los valientes, caídos de entre los incircuncisos». La construcción hebrea es difícil, y algunos relacionan más estrechamente «valientes» y «caídos».'
    reason: alternative_reading
  - marker: c
    text: Seol es el ámbito de los muertos; alternativamente, «la tumba» o «el inframundo».
    reason: lexical_alternative
  - marker: d
    text: «Iniquidades» también puede entenderse como «culpa» o «castigo por su iniquidad».
    reason: lexical_alternative
  - marker: e
    text: El hebreo de la cláusula final es difícil; alternativamente, «porque sembraron terror como valientes en la tierra de los vivientes».
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא יִשְׁכְּבוּ
  english_pob_choice: And they do not lie
  chosen_spanish: Y no yacerán
  alternatives_spanish:
  - Y no yacen
  - Y no reposarán
  lexicon: HALOT
  rationale: יִשְׁכְּבוּ en este contexto funerario se refiere a yacer en sepultura o descanso de muerte. En español, «yacerán» conserva la imagen sepulcral mejor que «reposarán». El futuro mantiene la posible lectura futura advertida en el POB inglés.
- source_word: אֶת גִּבּוֹרִים
  english_pob_choice: with the mighty
  chosen_spanish: con los valientes
  alternatives_spanish:
  - junto a los valientes
  - entre los valientes guerreros
  lexicon: HALOT
  rationale: En esta construcción קשה, el hebreo no funciona de manera directa como objeto normal. «Con los valientes» refleja la relación de asociación en la tumba y conserva la amplitud de גִּבּוֹרִים sin restringirlo a «guerreros».
- source_word: נֹפְלִים מֵעֲרֵלִים
  english_pob_choice: the fallen from among the uncircumcised
  chosen_spanish: caídos de entre los incircuncisos
  alternatives_spanish:
  - los caídos entre los incircuncisos
  - los incircuncisos caídos
  lexicon: HALOT
  rationale: נֹפְלִים es un sustantivo participial, por eso «caídos». מֵעֲרֵלִים se entiende de forma partitiva, «de entre». Se conserva «incircuncisos» literalmente por ser una categoría reiterada y teológicamente cargada en el capítulo.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el Seol
  - la tumba
  lexicon: HALOT
  rationale: Se conserva la transliteración «Seol» para no reducir el concepto hebreo a «tumba» ni cargarlo con sentidos posteriores de «infierno». Esto mantiene la transparencia lexical del término.
- source_word: בִּכְלֵי מִלְחַמְתָּם
  english_pob_choice: with their weapons of war
  chosen_spanish: con sus armas de guerra
  alternatives_spanish:
  - con su equipo de guerra
  - con las armas de su guerra
  lexicon: HALOT
  rationale: כְּלֵי מִלְחָמָה designa equipo o utensilios bélicos. «Armas de guerra» es natural en español y conserva la imaginería militar del entierro.
- source_word: וַיִּתְּנוּ אֶת חַרְבוֹתָם תַּחַת רָאשֵׁיהֶם
  english_pob_choice: and they placed their swords under their heads
  chosen_spanish: y pusieron sus espadas debajo de sus cabezas
  alternatives_spanish:
  - y colocaron sus espadas debajo de sus cabezas
  - y sus espadas fueron puestas debajo de sus cabezas
  lexicon: HALOT
  rationale: Se mantiene la acción narrativa del wayyiqtol con un verbo simple y directo. «Pusieron» reproduce el gesto funerario sin introducir una pasiva innecesaria.
- source_word: וַתְּהִי עֲוֺנֹתָם עַל עַצְמוֹתָם
  english_pob_choice: and their iniquities were upon their bones
  chosen_spanish: y sus iniquidades estuvieron sobre sus huesos
  alternatives_spanish:
  - y su culpa estuvo sobre sus huesos
  - y el castigo por su iniquidad estuvo sobre sus huesos
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o castigo. Se mantiene «iniquidades» para preservar la ambigüedad y la fuerza sombría del hebreo, sin resolver la tensión en favor de una sola acepción.
- source_word: כִּי חִתִּית גִּבּוֹרִים
  english_pob_choice: for the terror of the mighty
  chosen_spanish: porque fueron el terror de los valientes
  alternatives_spanish:
  - porque inspiraron terror entre los valientes
  - porque el terror de los valientes
  lexicon: HALOT
  rationale: חִתִּית expresa terror o pavor. Dado el carácter elíptico del cierre, «fueron el terror de los valientes» refleja la lectura que estos guerreros causaban terror, sin expandir demasiado el hebreo.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - en la tierra de los que viven
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera natural como «la tierra de los vivientes», preservando el contraste con Seol y el paralelismo del hebreo.
theological_decisions:
- issue: Sentido de עָוֹן en contexto de juicio
  english_pob_reading: Retain 'iniquities' in the main text without resolving whether the emphasis is on sin, guilt, or punishment.
  chosen_spanish_reading: Mantener «iniquidades» en el texto principal sin decidir si el énfasis es el pecado, la culpa o el castigo.
  alternative_spanish_readings:
  - culpa
  - castigo por su iniquidad
  rationale: El término hebreo admite varias cargas semánticas y el verso parece condensar ofensa moral y consecuencia. Conservar «iniquidades» preserva la tensión teológica en vez de resolverla prematuramente.
  doctrine_reference: 'Principio POB: preservar la tensión teológica cuando el original es genuinamente ambiguo.'
- issue: Construcción difícil de אֶת גִּבּוֹרִים / נֹפְלִים
  english_pob_reading: with the mighty fallen from among the uncircumcised
  chosen_spanish_reading: con los valientes caídos de entre los incircuncisos
  alternative_spanish_readings:
  - con los valientes, caídos de entre los incircuncisos
  - con los valientes caídos entre los incircuncisos
  rationale: La sintaxis hebrea es compacta y discutida. Se adopta una solución que une «valientes» y «caídos» sin separar indebidamente el sintagma, a la vez que mantiene la marca partitiva «de entre».
  doctrine_reference: 'Principio POB: reflejar la construcción difícil sin forzarla con una paráfrasis explicativa.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje revisado más reciente del audit trail inglés: se mantuvo la unión entre «mighty» y «fallen», se conservaron las cláusulas narrativas finitas para las espadas y las iniquidades, y se reflejó la lectura más literal del cierre como una afirmación sobre su identidad como terror en la tierra de los vivientes. La traducción española preserva la misma ambigüedad lexical y el mismo orden retórico del original, ajustando solo la sintaxis necesaria para el español.'
  spanish_consistency_notes:
  - Se usa «Seol» como transliteración consistente para שְׁאוֹל.
  - Se usa «valientes» para גִּבּוֹרִים, coherente con un registro amplio y digno.
  - Se usa «iniquidades» para עֲוֹנֹתָם para mantener la ambigüedad preservada por el POB inglés.
  - Los marcadores de nota aparecen exactamente donde corresponden en el texto principal.
  - El estilo es formal y publicable, sin arcaísmos innecesarios ni glosas interpretativas incorporadas al cuerpo del versículo.
