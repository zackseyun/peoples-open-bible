translation:
  language: es
  text: No me arruinó ningún destructor del desierto en campo abierto; ni la serpiente[a], destructora por el engaño, violó la pureza de mi virginidad; pero permanecí con mi esposo durante el tiempo de mi plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serpiente, destructora por el engaño». El griego acumula varios términos de ruina alrededor de «serpiente», produciendo una imagen comprimida de la serpiente engañadora como devastadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέφθειρέν
  english_pob_choice: ruined
  chosen_spanish: arruinó
  alternatives_spanish:
  - destruyó
  - corrompió
  lexicon: LSJ
  rationale: En este contexto de violencia sexual y daño moral, «arruinó» conserva el valor de destrucción/daño profundo sin volver la frase demasiado técnica ni reducirla a una sola dimensión.
- source_word: λυμεὼν
  english_pob_choice: destroyer
  chosen_spanish: destruidor
  alternatives_spanish:
  - destructor
  - devastador
  - ruin
  lexicon: LSJ
  rationale: Se mantiene el agente hostil con un sustantivo claro y fuerte. «Destruidor» reproduce bien el paralelo repetido con el vocabulario de ruina y daño.
- source_word: τῆς ἐρημίας
  english_pob_choice: in the desolate wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la desolada soledad
  - en el desierto desolado
  lexicon: LSJ
  rationale: El genitivo describe el ámbito de la imagen. En español, «desierto» comunica el entorno de desolación con naturalidad; el matiz de desolación queda reforzado por el contexto sin sobrecargar la frase.
- source_word: φθορεὺς ἐν πεδίῳ
  english_pob_choice: ruined me in the open field
  chosen_spanish: me arruinó en el campo abierto
  alternatives_spanish:
  - me destruyó en la llanura
  - me corrompió en el campo
  lexicon: LSJ
  rationale: «Campo abierto» preserva el sentido de ἐν πεδίῳ y el escenario expuesto. El español permite integrar el sujeto implícito con la frase anterior sin perder la imagen de agresión exterior.
- source_word: ἐλυμήνατό
  english_pob_choice: violate
  chosen_spanish: violó
  alternatives_spanish:
  - dañó
  - ultrajó
  - devastó
  lexicon: LSJ
  rationale: En el contexto de «las cosas puras de mi virginidad», el verbo apunta a una profanación o agresión sexual; «violó» comunica esa fuerza de manera directa en español.
- source_word: τὰ ἁγνὰ τῆς παρθενίας
  english_pob_choice: the purity of my virginity
  chosen_spanish: la pureza de mi virginidad
  alternatives_spanish:
  - lo puro de mi virginidad
  - mis cosas puras de virginidad
  - la castidad de mi virginidad
  lexicon: LSJ
  rationale: Se conserva la construcción nominal y la repetición enfática de pureza/virginidad. «Pureza de mi virginidad» refleja fielmente el giro del griego sin convertirlo en paráfrasis.
- source_word: ἀπάτης
  english_pob_choice: through deceit
  chosen_spanish: por el engaño
  alternatives_spanish:
  - mediante el engaño
  - con engaño
  - por medio del engaño
  lexicon: LSJ
  rationale: El genitivo califica el modo de acción del agresor. «Por el engaño» mantiene el valor instrumental o modal y suena natural en español.
- source_word: ὄφις
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - el serpiente
  lexicon: LSJ
  rationale: «Serpiente» conserva el registro elevado y la resonancia literaria del texto, mejor que una denominación más coloquial.
- source_word: ἔμεινα
  english_pob_choice: I remained
  chosen_spanish: permanecí
  alternatives_spanish:
  - me quedé
  - continué
  - perseveré
  lexicon: LSJ
  rationale: El verbo expresa continuidad y permanencia. «Permanecí» mantiene la afirmación de estabilidad a lo largo del tiempo señalado.
- source_word: χρόνον ἀκμῆς
  english_pob_choice: through the time of my prime
  chosen_spanish: durante el tiempo de mi plenitud
  alternatives_spanish:
  - durante el tiempo de mi mejor edad
  - en el tiempo de mi flor
  - durante el auge de mi juventud
  lexicon: LSJ
  rationale: «Plenitud» comunica el punto culminante o flor de la vida con dignidad y amplitud semántica, sin reducir ἀκμή solo a juventud cronológica.
- source_word: σὺν ἀνδρί
  english_pob_choice: with my husband
  chosen_spanish: con mi marido
  alternatives_spanish:
  - con mi esposo
  - con un hombre
  lexicon: LSJ
  rationale: En este contexto autobiográfico, ἀνήρ se entiende como esposo. «Marido» es un equivalente claro y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Imagen del serpiente engañador y posible eco de Edén
  english_pob_reading: Retain 'the serpent' and 'through deceit' in the main text without expanding the allusion.
  chosen_spanish_reading: Conservar «la serpiente» y «por el engaño» sin explicitar más el eco edénico.
  alternative_spanish_readings:
  - usar «culebra» para bajar el registro
  - añadir una explicación del Edén en el texto
  - suavizar la imagen a un simple agresor
  rationale: El griego apila términos de destrucción alrededor de ὄφις y ἀπάτης; la traducción debe mantener esa densidad y la posible alusión al engañador primordial sin resolverla artificialmente ni doctrinalizarla.
  doctrine_reference: Preservar la tensión literaria y teológica del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura final inglesa (sin cambios en la última revisión) y conserva su decisión principal sobre ὄφις/ἀπάτης, así como la intensificación destructiva de los dos primeros miembros, trasladándola a un español natural pero auditably cercano al griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; aquí no hay instancia correspondiente.
  - Se conserva un registro bíblico sobrio y contemporáneo, evitando tanto arcaísmos de traducción tradicional como paráfrasis libres.
  - «Marido» se usa por coherencia con el contexto matrimonial del verso y con la lectura inglesa auditada.
  - La nota al pie marca la alternativa lexicográfica relevante sin duplicar el marcador en el cuerpo del texto.
