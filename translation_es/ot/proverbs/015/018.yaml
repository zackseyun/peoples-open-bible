translation:
  language: es
  text: El hombre iracundo[a] provoca contienda, pero el que tarda en airarse[b] aquieta una disputa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iracundo» recoge el valor de חֵמָה como ira ardiente; otras posibilidades son «de mal genio» o «furioso».
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea dice literalmente «largo de narices», un modismo para ser lento para la ira.
    reason: cultural_note
  - marker: c
    text: También puede entenderse «aplaca una riña» o «calma una querella».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino singular como tipo proverbial. En español, «el hombre» conserva esa forma representativa y mantiene la concisión sapiencial sin volverlo genérico de manera opaca.
- source_word: חֵמָה
  english_pob_choice: hot-tempered
  chosen_spanish: iracundo
  alternatives_spanish:
  - de genio fuerte
  - furioso
  - de mal genio
  lexicon: HALOT
  rationale: El término expresa calor/ira; en este proverbio describe un rasgo de carácter. «Iracundo» preserva la fuerza lexical y evita una paráfrasis demasiado suave.
- source_word: יְגָרֶה
  english_pob_choice: stirs up
  chosen_spanish: provoca
  alternatives_spanish:
  - incita
  - desata
  - levanta
  lexicon: HALOT
  rationale: El piel de גרה tiene sentido de provocar o agitar. «Provoca» comunica bien la acción causativa en español y encaja con la forma proverbial.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - discordia
  - pleito
  - querella
  lexicon: HALOT
  rationale: El sustantivo alude a disputa o contención. «Contienda» conserva el registro bíblico y puede abarcar la idea de conflicto interpersonal sin restringirla demasiado a lo legal.
- source_word: אֶרֶך אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: tarda en airarse
  alternatives_spanish:
  - lento para la ira
  - paciente
  - de larga paciencia
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude a «narices largas». El español «tarda en airarse» mantiene el sentido de demora frente a la ira sin perder naturalidad ni ocultar el matiz emocional.
- source_word: יַשְׁקִיט
  english_pob_choice: quiets
  chosen_spanish: aquieta
  alternatives_spanish:
  - calma
  - aplaca
  - serena
  lexicon: HALOT
  rationale: 'El hifil de שקט tiene valor causativo: hacer quieto o calmar. «Aquieta» refleja bien ese causativo y suena sobrio en un proverbio.'
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - pleito
  - riña
  - contienda
  lexicon: HALOT
  rationale: En este paralelo sapiencial, רִיב puede ser contención o disputa. «Disputa» mantiene amplitud semántica y evita forzar un contexto jurídico.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Proverbios 15:18 y coincide en sustancia con el audit trail inglés: tipo proverbial singular, contraste entre persona iracunda y persona lenta para la ira, y dos verbos causativos/contrativos. Se conserva la tensión idiomática de אֶרֶך אַפַּיִם mediante una nota explicativa.'
  spanish_consistency_notes:
  - Se mantuvo un estilo proverbial breve y paralelo, adecuado para un verso sapiencial.
  - Se evitó «SEÑOR» u այլ reemplazos porque no aparece el nombre divino en este versículo.
  - Se eligieron sustantivos y verbos de registro bíblico natural en español sin depender de calcos rígidos.
  - Las notas cubren la idiomaticidad de «largo de narices» y una alternativa semántica para los términos de conflicto.
