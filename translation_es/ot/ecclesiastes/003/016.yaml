translation:
  language: es
  text: Y también vi bajo el sol que en el lugar de la justicia[a] había perversidad, y en el lugar de la rectitud había perversidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el lugar de la justicia» para «en el lugar de la rectitud»; el hebreo usa aquí una palabra distinta (צֶדֶק) de la de la frase anterior (מִשְׁפָּט), aunque sus sentidos se traslapan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְע֥וֹד
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y además
  - Y asimismo
  lexicon: HALOT
  rationale: La partícula añade una observación más en la secuencia de Qohelet. «Y yo también» conserva el valor aditivo y el sujeto explícito natural del español, sin sugerir repetición innecesaria.
- source_word: רָאִ֖יתִי
  english_pob_choice: saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - observé
  lexicon: HALOT
  rationale: El verbo expresa una percepción/observación directa. «Vi» mantiene la concreción y el tono testimonial del hebreo.
- source_word: תַּ֣חַת הַשָּׁ֑מֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  lexicon: HALOT
  rationale: Es la expresión característica de Eclesiastés para la esfera de la vida terrenal. «Debajo del sol» es claro y conserva el matiz idiomático sin volverlo abstracto.
- source_word: מְק֤וֹם הַ/מִּשְׁפָּט
  english_pob_choice: the place of justice
  chosen_spanish: el lugar de la justicia
  alternatives_spanish:
  - el lugar del juicio
  - la sede de la justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser «juicio» o «justicia». Aquí se refiere al ámbito donde debería administrarse la justicia; «lugar de la justicia» preserva el sentido institucional y moral, y evita restringirlo a un acto judicial puntual.
- source_word: הָ/רֶ֔שַׁע
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - impiedad
  lexicon: HALOT
  rationale: El término denota maldad/iniquidad activa. «Perversidad» funciona en español bíblico sin perder la fuerza moral del abstracto y se ajusta al contraste con justicia/rectitud.
- source_word: וּ/מְק֥וֹם הַ/צֶּ֖דֶק
  english_pob_choice: and in the place of righteousness
  chosen_spanish: y en el lugar de la rectitud
  alternatives_spanish:
  - y en el lugar de la justicia
  - y en el lugar de lo recto
  lexicon: HALOT
  rationale: צֶדֶק puede ser «justicia» o «rectitud». Se eligió «rectitud» para preservar la distinción léxica con מִשְׁפָּט, tal como hace la POB inglesa con «righteousness».
- source_word: הָ/רָֽשַׁע
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - iniquidad
  lexicon: HALOT
  rationale: 'Se mantiene el mismo valor abstracto que en la primera cláusula para reflejar el paralelismo hebreo y la ironía del pasaje: en ambos lugares debía hallarse lo justo/recto, pero se halló perversidad.'
theological_decisions:
- issue: Diferencia entre מִשְׁפָּט y צֶדֶק
  english_pob_reading: justice / righteousness, with a note preserving the overlap
  chosen_spanish_reading: justicia / rectitud, con nota sobre la alternativa de traducir ambos como «justicia»
  alternative_spanish_readings:
  - juicio / justicia
  - justicia / justicia
  rationale: 'No hay diferencia doctrinal, pero sí una tensión lexical real: los dos sustantivos se solapan parcialmente, aunque no son idénticos. En español, «rectitud» ayuda a no borrar la variación del hebreo, mientras la nota conserva «justicia» como alternativa válida en el segundo miembro.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios adicionales; se preservó la distinción hebrea entre מִשְׁפָּט y צֶדֶק y el paralelismo de הָרֶשַׁע/הָרָשַׁע.'
  spanish_consistency_notes:
  - Se mantiene «Y yo también» para reflejar la adición de la observación sin sonar forzado.
  - «Debajo del sol» conserva la fórmula estable de Eclesiastés.
  - «Perversidad» se usa de manera consistente para ambos términos abstractos de maldad, evitando cambiar de registro entre cláusulas paralelas.
  - «Rectitud» se reserva para צֶדֶק en contraste con «justicia» para מִשְׁפָּט, siguiendo la decisión lexical auditada.
