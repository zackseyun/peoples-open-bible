translation:
  language: es
  text: 'Entonces Hageo dijo[a]: «Si alguien impuro por contacto con un cuerpo muerto toca cualquiera de estas cosas, ¿quedará impura?». Los sacerdotes respondieron y dijeron: «Quedará impura».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «impuro de una persona/alma», un modismo que aquí significa impuro por contacto con un cuerpo muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva la secuencia de manera natural en español sin perder el valor progresivo.
- source_word: חַגַּי
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Haggai
  lexicon: Uso bíblico tradicional del nombre propio
  rationale: En español bíblico, el profeta se conoce normalmente como «Hageo», forma ya establecida y fácilmente reconocible para lectores de la Biblia.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supongamos que
  lexicon: HALOT
  rationale: Presenta una hipótesis directa dirigida a los sacerdotes; «Si» es la forma más natural y fiel.
- source_word: יִגַּע
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - entra en contacto con
  - hiere
  lexicon: HALOT
  rationale: El verbo denota contacto físico; «toca» es conciso y adecuado al contexto ritual.
- source_word: טְמֵא נֶפֶשׁ
  english_pob_choice: one who is unclean by contact with a dead body
  chosen_spanish: alguien inmundo por contacto con un cuerpo muerto
  alternatives_spanish:
  - una persona inmunda por un cadáver
  - alguien inmundo por contacto con un muerto
  lexicon: HALOT
  rationale: Se refleja el sentido idiomático de impureza por cadáver, evitando una traducción literal de «alma/persona» que podría oscurecer el uso levítico.
- source_word: בְּכָל אֵלֶּה
  english_pob_choice: any of these
  chosen_spanish: cualquiera de estas cosas
  alternatives_spanish:
  - cualquiera de estos
  - alguna de estas
  lexicon: HALOT
  rationale: El referente son los elementos mencionados antes; en español conviene explicitar el sustantivo elíptico con «cosas» para que la frase sea clara y fluida.
- source_word: הֲיִטְמָא
  english_pob_choice: does it become unclean?
  chosen_spanish: ¿se contaminará?
  alternatives_spanish:
  - ¿quedará impuro?
  - ¿será inmundo?
  lexicon: HALOT
  rationale: «Contaminarse» comunica bien el cambio de estado ritual y permite mantener la pregunta con la misma economía del hebreo.
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dieron respuesta
  lexicon: HALOT
  rationale: «Respondieron» mantiene la función narrativa de contestación formal sin sonar repetitivo en español.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: Es la traducción directa y natural del sustantivo definido; en este contexto son los especialistas en la ley de pureza.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y respondieron diciendo
  lexicon: HALOT
  rationale: Se conserva la segunda fórmula verbal del hebreo, que en español puede aparecer sin forzar la sintaxis.
- source_word: יִטְמָא
  english_pob_choice: It becomes unclean
  chosen_spanish: Se contaminará
  alternatives_spanish:
  - Quedará impuro
  - Será inmundo
  lexicon: HALOT
  rationale: La respuesta retoma el verbo de la pregunta y expresa la transmisión de impureza ritual en un español idiomático.
theological_decisions:
- issue: Naturaleza de la impureza ritual
  english_pob_reading: Render as ceremonial/ritual uncleanness tied to corpse contact, not moral defilement in itself.
  chosen_spanish_reading: Renderizar la impureza como contaminación ritual vinculada al contacto con un cuerpo muerto, no como culpa moral.
  alternative_spanish_readings:
  - impureza moral
  - mancha espiritual
  rationale: El contexto sacerdotal y la respuesta sobre transmisión de impureza indican una categoría de pureza ceremonial de la Torá. «Contaminarse» ayuda a evitar una lectura moralizante.
  doctrine_reference: Levítico 11–15; Números 19
- issue: Sentido de טְמֵא נֶפֶשׁ
  english_pob_reading: Hebrew 'unclean of a person/soul,' an idiom meaning unclean through contact with a dead body.
  chosen_spanish_reading: Idioma hebreo que significa inmundo por contacto con un cadáver o cuerpo muerto.
  alternative_spanish_readings:
  - inmundo de una persona/alma
  - impuro de alma
  rationale: Se preserva el trasfondo idiomático y se evita introducir «alma» en un sentido que no corresponde al uso técnico del pasaje.
  doctrine_reference: Números 19:11–13; Hageo 2:13
- issue: Autoridad sacerdotal en la respuesta
  english_pob_reading: The priests answered and said, 'It becomes unclean.'
  chosen_spanish_reading: 'Los sacerdotes emiten un juicio ritual conciso: «Se contaminará».'
  alternative_spanish_readings:
  - 'Los sacerdotes dijeron simplemente: «Sí, es impuro»'
  - 'Los sacerdotes contestaron: «Queda inmundo»'
  rationale: La duplicación verbal hebrea se conserva en español, pero la traducción evita sonar pesada y mantiene el carácter legal de la respuesta.
  doctrine_reference: Deuteronomio 17:8–11
translation_notes:
  revision_awareness: Se siguió el expediente inglés sin cambios necesarios adicionales; la versión española mantiene la secuencia narrativa, el valor técnico de la impureza ritual y la forma idiomática del hebreo sin introducir paráfrasis innecesarias.
  spanish_consistency_notes:
  - Se usa «Hageo» como forma española estable del nombre del profeta.
  - Se mantiene «contaminarse» / «contaminación ritual» para el lenguaje de pureza, evitando moralizar el pasaje.
  - Se emplea «cuerpo muerto» en la nota para aclarar el idiomatismo de טְמֵא נֶפֶשׁ, mientras el texto principal usa una formulación natural y precisa.
