  glossary_alignment: 'No hay términos de glosario mayor involucrados. Las decisiones léxicas principales son adecuadas: דל > ''hombre pobre'', גאה > ''orgulloso'', מְכַחֵשׁ > ''que miente'', זקן > ''anciano'', מְנָאֵף > ''que comete adulterio'', וַחֲסַר דַּעַת > ''carece de entendimiento''. La revisión preserva estas elecciones, pero corrige la correspondencia de notas con el expediente inglés y con el original.'
