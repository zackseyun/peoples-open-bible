translation:
  language: es
  text: Todas las bestias del campo beben de ellos; los asnos monteses apagan su sed.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: יַשְׁקוּ
  english_pob_choice: drink from them / are watered
  chosen_spanish: hacen beber
  alternatives_spanish:
  - son abrevados
  - son regados
  - beben de ellas
  lexicon: HALOT
  rationale: 'El hiphil de שקה tiene sentido causativo: ‘dar de beber, abrevadero’. En español, ‘hacen beber’ conserva la causalidad del hebreo sin sonar forzado. ‘Beben de ellas’ sería más idiomático, pero desplaza el énfasis desde las aguas que proveen bebida hacia los animales.'
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: toda la
  alternatives_spanish:
  - todos los
  - cada
  lexicon: HALOT
  rationale: El valor distributivo/colectivo se expresa naturalmente con ‘toda la’ antes de un sustantivo colectivo en español bíblico contemporáneo.
- source_word: חַיְת֣וֹ שָׂדָי
  english_pob_choice: the beasts of the field
  chosen_spanish: bestia del campo
  alternatives_spanish:
  - bestias del campo
  - animales del campo
  - fauna del campo
  lexicon: HALOT
  rationale: La construcción hebrea puede referirse a animales salvajes del campo abierto. ‘Bestia’ mantiene el registro bíblico y la fuerza lexical; se usa en singular colectivo en español para reflejar el ‘all’ del hebreo sin sonar redundante.
- source_word: יִשְׁבְּרוּ
  english_pob_choice: quench
  chosen_spanish: apagan
  alternatives_spanish:
  - satisfacen
  - quiebran
  - calman
  lexicon: HALOT
  rationale: Con ‘sed’ como objeto, el verbo hebreo expresa saciar o apagar la sed. ‘Apagan su sed’ conserva la imagen concreta y es natural en español.
- source_word: פְרָאִים
  english_pob_choice: wild donkeys / onagers
  chosen_spanish: asnos monteses
  alternatives_spanish:
  - asnos salvajes
  - onagros
  - asnos del desierto
  lexicon: HALOT
  rationale: ‘Asnos monteses’ comunica bien la referencia a animales silvestres del asno sin recurrir a un tecnicismo. Se preserva la referencia zoológica del hebreo y la opción reconocida por la tradición léxica.
- source_word: צְמָאָם
  english_pob_choice: their thirst
  chosen_spanish: su sed
  alternatives_spanish:
  - su thirst?
  - su parchedness
  - su sed
  lexicon: HALOT
  rationale: El sustantivo abstracto con sufijo posesivo se vierte de manera directa como ‘su sed’, que es la forma idiomática y fiel en español.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la línea inglesa auditada: ‘All the beasts of the field drink from them; the wild donkeys quench their thirst.’ No se registran revisiones aplicadas; se mantuvo la equivalencia óptima con ajustes para un español natural y reverente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió ‘asnos monteses’ para conservar una referencia transparente y no tecnicista; ‘onagros’ queda como alternativa lexical.
  - La nota de pie se ancla en ‘bestia’ para indicar el valor colectivo del hebreo y justificar el singular español.
