translation:
  language: es
  text: Escucha[a], oh, Dios, mi voz en mi queja; preserva mi vida del temor al enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en mi meditación» o «en mi reflexión». El término hebreo puede referirse tanto a una reflexión interior como a una queja o lamento expresado.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  - Haz caso
  lexicon: HALOT
  rationale: El imperativo directo conserva el tono de oración. «Escucha» es el equivalente natural y digno en español para el mandato a Dios, sin introducir matices más fuertes que el hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Oh Dios!
  lexicon: HALOT
  rationale: Es vocativo en dirección directa. «Oh Dios» reproduce la apelación orante sin convertirla en mera mención nominal.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi sonido
  - mi clamor
  lexicon: HALOT
  rationale: קוֹל significa literalmente «voz/sonido». «Mi voz» mantiene la concreción del hebreo y evita sustituirlo por un concepto más interpretativo.
- source_word: בְשִׂיחִי
  english_pob_choice: in my complaint
  chosen_spanish: en mi queja
  alternatives_spanish:
  - en mi meditación
  - en mi reflexión
  - en mi lamento
  lexicon: HALOT
  rationale: El hebreo puede referirse a meditación interior o a queja/lamento expresado. Dado el contexto de súplica por protección frente a enemigos, «queja» conserva el matiz lamentario sin cerrar por completo la ambigüedad.
- source_word: מִפַּחַד
  english_pob_choice: from the fear of
  chosen_spanish: del temor de
  alternatives_spanish:
  - del miedo de
  - de la angustia ante
  - del terror de
  lexicon: HALOT
  rationale: פַּחַד abarca miedo, temor y terror. «Temor» es suficientemente directo y sobrio en español, y permite reflejar la relación genitiva con el enemigo.
- source_word: א֝וֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  - el foe
  lexicon: HALOT
  rationale: Aunque el sustantivo es singular, puede funcionar genéricamente. «El enemigo» conserva la forma singular y la fuerza poética del original.
- source_word: תִּצֹּר
  english_pob_choice: preserve
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - protege
  - vela por
  lexicon: HALOT
  rationale: El verbo נצר expresa guardar, custodiar y preservar. «Preserva» se ajusta bien a «mi vida» y refleja la petición de protección continua.
- source_word: חַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser
  - mi alma
  - mi existencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi vida». «Mi vida» es la equivalencia más directa y evita importar una lectura más interpretativa como «alma».
theological_decisions:
- issue: Ambigüedad de בְשִׂיחִי entre reflexión interior y lamento/queja
  english_pob_reading: complaint, with footnoted alternative of meditation/musing
  chosen_spanish_reading: queja, con nota de alternativa meditativa
  alternative_spanish_readings:
  - meditación
  - reflexión
  - lamento
  - murmullo interior
  rationale: La frase puede designar reflexión interna o queja expresada. En este versículo, la súplica por protección ante el enemigo inclina el sentido hacia el lamento; sin embargo, la nota preserva la alternativa meditativa para no borrar la tensión lexical documentada.
  doctrine_reference: 'Translation philosophy §3: preservar ambigüedad interpretativa genuina y no cerrar indebidamente el campo semántico.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del texto hebreo y la revisión inglesa más reciente, que prefirió una traducción más directa de פַּחַד como «fear». En español se refleja con «temor», manteniendo la misma cercanía semántica sin perder naturalidad. También se conserva la ambigüedad de בְשִׂיחִי mediante nota, tal como el POB inglés documenta la alternativa meditativa.
  spanish_consistency_notes:
  - Se usa «Dios» en vocativo directo, no «Señor», conforme al hebreo אֱלֹהִים.
  - Se evita «Cristo» o cualquier sustitución litúrgica no presente en el texto.
  - «Mi vida» conserva el valor concreto de חַיָּי y no introduce «alma».
  - La nota de pie se ancla en «Escucha[a]» porque la alternativa léxica afecta a toda la cláusula «en mi queja».
