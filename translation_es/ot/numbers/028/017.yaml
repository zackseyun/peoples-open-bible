translation:
  language: es
  text: Y el día quince de este mes es una fiesta[a]; durante siete días se comerán panes sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es un festival». El hebreo חָג puede denotar tanto una festividad sagrada como una fiesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: And on the fifteenth day
  chosen_spanish: Y en el día quince
  alternatives_spanish:
  - Y el día quince
  - Y para el día quince
  lexicon: HALOT
  rationale: El hebreo introduce una expresión temporal con preposición y conjunción; en español suena natural con «en el día quince». Mantiene el valor calendárico sin sobretraducir la forma hebrea.
- source_word: לַ/חֹדֶשׁ הַ/זֶּה
  english_pob_choice: of this month
  chosen_spanish: de este mes
  alternatives_spanish:
  - de esta luna
  - de este mes lunar
  lexicon: HALOT
  rationale: En contexto calendárico, חֹדֶשׁ designa «mes». «De este mes» es claro y fiel; «mes lunar» explicita una posibilidad léxica pero no es necesaria aquí.
- source_word: חָג
  english_pob_choice: is a feast
  chosen_spanish: hay una fiesta
  alternatives_spanish:
  - hay un festival
  - es una fiesta
  lexicon: HALOT
  rationale: El término hebreo puede referirse a una celebración sagrada o festividad. En español, «fiesta» comunica bien el carácter festivo y ritual, y evita una traducción más eclesiástica que el hebreo no exige. Se conserva la ambigüedad lexical documentada con nota.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: La construcción indica duración de la observancia. «Durante siete días» expresa con naturalidad el lapso en español y conserva el valor aspectual de la frase.
- source_word: מַצּ֖וֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - pan ázimo
  - matzot
  lexicon: HALOT
  rationale: El referente es el alimento sin levadura prescrito en la fiesta. «Panes sin levadura» es transparente y evita tecnicismos innecesarios; «pan ázimo» es válido, pero menos natural para lectura amplia.
- source_word: יֵאָכֵל
  english_pob_choice: shall be eaten
  chosen_spanish: se comerán
  alternatives_spanish:
  - serán comidas
  - deberán comerse
  lexicon: HALOT
  rationale: El pasivo impersonal en español naturaliza la instrucción sin perder el sentido obligatorio del texto. Como el sujeto implícito es plural («panes»), «se comerán» funciona mejor que un pasivo más rígido.
theological_decisions:
- issue: חָג como fiesta o festival sacro
  english_pob_reading: 'is a feast; footnote: Or ''is a festival.'' The Hebrew חָג can denote a sacred festival observance as well as a feast.'
  chosen_spanish_reading: hay una fiesta[a]
  alternative_spanish_readings:
  - hay un festival
  - es una festividad
  rationale: Se conserva la tensión léxica entre comida festiva y observancia sagrada. «Fiesta» es suficientemente amplia en español para abarcar ambas posibilidades; la nota explicita la alternativa «festival» sin cerrar el alcance del hebreo.
  doctrine_reference: Lexical/theological note on festival terminology; no doctrinal issue.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que la lectura revisada sigue siendo de alta concordancia. Este borrador mantiene esa línea, con ajuste de estilo al español natural y preservación de la ambigüedad léxica de חָג.
  spanish_consistency_notes:
  - Se mantiene «mes» para חֹדֶשׁ en contexto calendárico.
  - Se evita «SEÑOR» u otras sustituciones no presentes; el versículo no contiene el nombre divino.
  - 'Se usa lenguaje bíblico claro y moderno: «panes sin levadura» en lugar de calco técnico innecesario.'
  - La nota de pie de página conserva la alternativa lexical documentada en el POB inglés.
