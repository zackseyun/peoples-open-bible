translation:
  language: es
  text: 'Y Judit se puso junto a su cama y dijo en su corazón[a]: «Señor, Dios de todo poder, mira en esta hora las obras de mis manos, para la exaltación de Jerusalén».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se dijo a sí misma». El griego dice literalmente «dijo en su corazón», un modismo bíblico para el habla interior o la oración.
    reason: lexical_alternative
  - marker: b
    text: O «para la elevación de Jerusalén» o «para el levantamiento de Jerusalén». La expresión griega habla de elevar o exaltar a Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: στᾶσα
  english_pob_choice: stood
  chosen_spanish: habiéndose puesto
  alternatives_spanish:
  - se puso
  - estando
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción previa de Judit antes de hablar. En español, «habiéndose puesto» conserva la secuencia verbal sin sonar tan pesado como una simple copia del orden griego.
- source_word: παρὰ τὴν κλίνην αὐτοῦ
  english_pob_choice: beside his bed
  chosen_spanish: junto a la cama de él
  alternatives_spanish:
  - junto a su cama
  - al lado de su cama
  lexicon: LSJ
  rationale: παρά con acusativo indica posición al lado; κλίνη puede ser «cama» o «lecho». «Junto a la cama de él» conserva la referencia poseída por el contexto y evita ambigüedad sobre el referente de «su».
- source_word: εἶπεν ἐν τῇ καρδίᾳ ἑαυτῆς
  english_pob_choice: said in her heart
  chosen_spanish: dijo en su corazón
  alternatives_spanish:
  - se dijo a sí misma
  - dijo para sí
  lexicon: LSJ
  rationale: La expresión reproduce un modismo bíblico de habla interior o oración. «En su corazón» mantiene la imaginería del griego y el registro bíblico sin sustituirla por una paráfrasis psicológica.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Es una dirección directa a Dios. En español, «Señor» es el equivalente natural y reverente para κύριε en este contexto.
- source_word: ὁ θεὸς πάσης δυνάμεως
  english_pob_choice: God of all power
  chosen_spanish: Dios de todo poder
  alternatives_spanish:
  - Dios de toda fuerza
  - Dios de todo poderío
  lexicon: LSJ
  rationale: La frase genitiva expresa plenitud de poder/might. «De todo poder» sigue de cerca el valor del griego y suena natural en español culto.
- source_word: ἐπίβλεψον
  english_pob_choice: look upon
  chosen_spanish: mira
  alternatives_spanish:
  - mira sobre
  - atiende
  - mira con favor
  lexicon: LSJ
  rationale: El imperativo pide atención divina. «Mira» es breve y idiomático en una oración, y el complemento «sobre» ya aparece en la construcción con ἐπὶ.
- source_word: ἐν τῇ ὥρᾳ ταύτῃ
  english_pob_choice: at this hour
  chosen_spanish: en esta hora
  alternatives_spanish:
  - a esta hora
  - en este momento
  lexicon: LSJ
  rationale: La expresión temporal es solemne y concreta. «En esta hora» reproduce directamente la temporalidad del griego.
- source_word: ἐπὶ τὰ ἔργα τῶν χειρῶν μου
  english_pob_choice: the works of my hands
  chosen_spanish: sobre las obras de mis manos
  alternatives_spanish:
  - sobre lo que hacen mis manos
  - sobre la obra de mis manos
  lexicon: LSJ
  rationale: El griego conserva un modismo bíblico literal. «Obras de mis manos» preserva tanto el plural ἔργα como la imagen de la acción humana como obra realizada.
- source_word: εἰς ὕψωμα Ἰερουσαλήμ
  english_pob_choice: for the exaltation of Jerusalem
  chosen_spanish: para la exaltación de Jerusalén
  alternatives_spanish:
  - para la elevación de Jerusalén
  - para el levantamiento de Jerusalén
  lexicon: LSJ
  rationale: ὕψωμα expresa elevación/exaltación. «Exaltación» conserva el sentido metafórico sin convertirlo en una interpretación más específica como «liberación».
theological_decisions:
- issue: Fórmula de oración interior
  english_pob_reading: said in her heart
  chosen_spanish_reading: dijo en su corazón
  alternative_spanish_readings:
  - se dijo a sí misma
  - dijo para sí
  rationale: La frase no describe mera introspección, sino una oración interior dirigida a Dios. Mantener «corazón» preserva la antropología bíblica y la forma idiomática del texto.
  doctrine_reference: DOCTRINE.md §§1, 6
- issue: Sentido de εἰς ὕψωμα Ἰερουσαλήμ
  english_pob_reading: for the exaltation of Jerusalem
  chosen_spanish_reading: para la exaltación de Jerusalén
  alternative_spanish_readings:
  - para la elevación de Jerusalén
  - para el levantamiento de Jerusalén
  - para la liberación de Jerusalén
  rationale: El griego habla de elevación/exaltación, no nombra de forma explícita la liberación. La redacción española conserva ese valor metafórico y deja intacta la tensión entre exaltación y posible resultado salvífico.
  doctrine_reference: DOCTRINE.md §§1, 3, 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el alto acuerdo del control cruzado y la pasividad de la última revisión: no se requirieron cambios sustanciales respecto del sentido auditado en inglés y griego.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριε por tratarse de una invocación directa a Dios.
  - Se conservó «Dios» para ὁ θεός y «exaltación» para ὕψωμα, evitando introducir «liberación» como si fuera explícita en el griego.
  - La sintaxis española busca ser publicable y reverente, sin perder el orden lógico de acción previa + oración interior + petición.
