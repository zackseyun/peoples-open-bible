    rationale: El hebreo dice simplemente וּפָנָה לְמָעְלָה, 'y se volverá/volverá hacia arriba'. El audit trail inglés documenta la eliminación de 'his face' por no estar explícito; 'la mirada' reintroduce una expansión similar.
  - severity: low
    issue: '''Afligido'' puede sonar algo más débil o general que נִקְשֶׁה'
    rationale: El participio/adjetivo apunta a estar en aprieto severo, apremiado, bajo presión. 'Afligido' es posible, pero 'angustiado' o 'apremiado' preserva mejor la fuerza contextual junto con 'hambriento'.
  - severity: low
    issue: La nota al pie empieza con una comilla sobrante
    rationale: 'La puntuación de la nota actual (''O: «mirará hacia arriba»...'') tiene una comilla simple inicial innecesaria.'
  revised_spanish_text: Y pasará por ella[a], angustiado y hambriento; y cuando tenga hambre, se enfurecerá y maldecirá a su rey y a su Dios, y se volverá hacia arriba.
  revised_footnotes:
