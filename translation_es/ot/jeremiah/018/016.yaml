translation:
  language: es
  text: haciendo de su tierra una desolación, un objeto de silbidos perpetuos[a]; todo el que pase por ella quedará consternado y sacudirá la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un silbido perpetuo», «un objeto de silbidos para siempre» o «un objeto de silbidos burlones». La imagen hebrea probablemente se refiere al silbido despectivo de los que contemplan una tierra arruinada.'
    reason: lexical_alternative
  - marker: b
    text: El gesto de «sacudir la cabeza» traduce un hebreo que expresa escarnio, asombro o consternación ante la devastación.
    reason: cultural_note
lexical_decisions:
- source_word: לָשׂוּם
  english_pob_choice: making
  chosen_spanish: haciendo
  alternatives_spanish:
  - para hacer
  - al hacer
  - haciendo que
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa resultado o propósito en continuidad con el contexto anterior. En español, el gerundio 'haciendo' reproduce bien ese valor de acción resultante sin volver la frase rígida.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su tierra natal
  - su país/territorio
  lexicon: HALOT
  rationale: אֶרֶץ puede ser 'tierra' o 'país', pero en lenguaje profético de juicio el referente es la tierra sometida a devastación. 'Su tierra' mantiene la referencia concreta y el tono bíblico sin forzar una equivalencia moderna de 'país'.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una ruina
  - un yermo
  lexicon: HALOT
  rationale: שַׁמָּה denota devastación o desolación en contextos de juicio. 'Desolación' conserva el sustantivo y el registro profético mejor que una paráfrasis más libre.
- source_word: שרוקת
  english_pob_choice: an object of ... hissing
  chosen_spanish: un objeto de silbidos
  alternatives_spanish:
  - un objeto de silbidos burlones
  - algo silbado con desprecio
  - un blanco de silbidos
  lexicon: HALOT
  rationale: La imagen hebrea alude al sonido despectivo de los transeúntes ante una tierra arruinada. 'Silbidos' comunica el gesto auditivo de burla/escarnio en español y permite conservar la metáfora sin introducir una interpretación excesiva.
- source_word: עוֹלָם
  english_pob_choice: perpetual
  chosen_spanish: perpetuos
  alternatives_spanish:
  - eternos
  - para siempre
  - continuos
  lexicon: HALOT
  rationale: Aquí עוֹלָם califica la duración del silbido/escarnio, no una eternidad metafísica. 'Perpetuos' mantiene la idea de duración continua y el matiz idiomático del POB en inglés.
- source_word: כֹּל עוֹבֵר עָלֶיהָ
  english_pob_choice: everyone who passes by it
  chosen_spanish: todo el que pase por ella
  alternatives_spanish:
  - todos los que pasen por ella
  - cada uno que pase por ella
  - todo transeúnte
  lexicon: HALOT
  rationale: La construcción describe a los transeúntes que observan la tierra juzgada. 'Todo el que pase por ella' es natural en español y conserva la referencia a la tierra, no a una entidad personificada.
- source_word: יִשֹּׁם
  english_pob_choice: will be appalled
  chosen_spanish: quedará asombrado
  alternatives_spanish:
  - quedará horrorizado
  - se pasmará
  - quedará consternado
  lexicon: HALOT
  rationale: שמם en este contexto expresa la reacción de estupor ante la devastación. 'Quedará asombrado' es un equivalente español claro, aunque algo menos fuerte que 'appalled'; se preserva la reacción del observador sin introducir una emoción distinta.
- source_word: וְיָנִיד בְּרֹאשׁוֹ
  english_pob_choice: and shake his head
  chosen_spanish: y moverá la cabeza
  alternatives_spanish:
  - y sacudirá la cabeza
  - y meneará la cabeza
  - y hará un gesto con la cabeza
  lexicon: HALOT
  rationale: El hebreo describe un gesto corporal de desprecio, asombro o consternación. 'Moverá la cabeza' es una forma general y natural en español; en este contexto puede entenderse como ese gesto de reacción, aunque 'sacudirá la cabeza' lo explicita más.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el control de revisión más reciente: no se requieren cambios respecto del sentido auditado en inglés. Se mantiene el paralelismo entre desolación, silbidos y la reacción gestual de los transeúntes.'
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ según el contexto de juicio profético.
  - Se conserva el valor de escarnio de שרוקת mediante «silbidos», sin sustituirlo por un término interpretativo como 'burla'.
  - «Moverá la cabeza» mantiene el gesto idiomático sin sobreespecificar la forma exacta del movimiento.
  - El orden del segmento sigue de cerca la sintaxis fuente para conservar el paralelismo poético.
