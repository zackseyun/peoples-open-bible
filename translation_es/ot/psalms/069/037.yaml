  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: זֶרַע como colectivo (''descendencia''), עֲבָדָיו como ''sus siervos'', y la referencia femenina a Sion/la ciudad en ambos sufijos. También preserva correctamente ''los que aman su nombre'' y ''habitarán en ella''. Sin embargo, hay un desajuste gramatical importante: el sujeto colectivo singular ''La descendencia'' no concuerda con el verbo plural hebreo en la forma española propuesta ''la heredará'', que además suena singular en español. Conviene reformular para expresar que la descendencia/la posteridad de los siervos es un grupo que heredará la ciudad.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico moderno. La frase principal necesita ajuste de concordancia para sonar natural y fiel al referente colectivo plural. Las notas son útiles, pero la nota sobre זֶרַע puede alinearse mejor con el audit trail inglés priorizando 'descendientes' como alternativa antes que 'hijos'.
  glossary_alignment: Alineación general buena con la terminología del proyecto. 'Siervos' está justificado contextualmente frente a 'esclavos'. No hay conflicto con Yahvé/Mesías. Se mantiene correctamente el idiomatismo 'aman su nombre'.
  issues:
  - severity: high
    issue: Discordancia entre sujeto singular colectivo y predicado en 'La descendencia de sus siervos la heredará'
    rationale: El hebreo tiene verbo plural (יִנְחָלוּהָ, 'heredarán'), y aunque 'descendencia' es singular colectivo, la forma española con objeto clítico 'la heredará' hace pensar en un sujeto singular individual. 'La descendencia de sus siervos heredará[a][b]' o mejor 'Los descendientes de sus siervos heredarán[b][a]' evita ambigüedad y refleja mejor la pluralidad del verbo.
  - severity: medium
    issue: La nota léxica de זֶרַע se aparta innecesariamente del audit trail al destacar 'hijos'
    rationale: El inglés documenta como alternativa principal 'descendants'. En español, 'descendientes' es la alternativa más cercana y menos restrictiva; 'hijos' estrecha demasiado el campo semántico.
  revised_spanish_text: Los descendientes[a] de sus siervos la heredarán[b], y los que aman su nombre habitarán en ella.
