    issue: וַתִּגְנֹב אֹתוֹ se tradujo como 'lo escondió'
    rationale: El hebreo usa גנב, 'robar/sustraer furtivamente'. 'Esconder' cambia la acción y además hace redundante la siguiente cláusula 'ellos lo ocultaron'.
  - severity: medium
    issue: '''en el cuarto de las camas'' en el texto principal suena poco natural'
    rationale: Aunque es cercano a la literalidad, en español corriente eclesial resulta tosco. El audit trail inglés opta por una formulación natural en el texto principal y conserva la literalidad en nota.
  - severity: medium
    issue: '''para que no fuera muerto'' es español poco idiomático'
    rationale: 'Mantiene un pasivo formal, pero suena forzado. Puede expresarse el resultado con mejor español: ''de modo que no lo mataron'' o ''así no fue ejecutado''.'
  - severity: low
    issue: La nota [b] explica correctamente el matiz de גנב, pero corrige un problema creado por el propio texto principal
    rationale: La nota no debe compensar una traducción principal insuficiente cuando el español puede preservar el sentido principal en el cuerpo del texto.
