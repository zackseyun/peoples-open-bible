translation:
  language: es
  text: Porque tú eres la gloria de la fuerza de ellos[a], y por tu favor exaltas nuestro cuerno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la belleza» o «el esplendor de la fuerza de ellos».
    reason: lexical_alternative
  - marker: b
    text: «Cuerno» es una metáfora hebrea de fuerza, poder o dignidad exaltada.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa del versículo con el anterior. En español, «Porque» comunica con naturalidad la causa o fundamento, manteniendo el valor conectivo del hebreo sin sonar forzado.
- source_word: תִפְאֶרֶת
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - la belleza
  - el esplendor
  - el adorno
  lexicon: HALOT
  rationale: El sustantivo puede expresar belleza, esplendor o gloria. Dado el paralelo con «fuerza» y el tono doxológico del verso, «gloria» transmite bien la idea de honor y excelencia que pertenece a Yahvé.
- source_word: עֻזָּמוֹ
  english_pob_choice: their strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su fortaleza
  - su poder
  lexicon: HALOT
  rationale: El hebreo lleva sufijo de tercera persona plural, pero en español un posesivo explícito puede sonar menos natural. «Su fuerza» conserva el referente plural en el contexto del grupo del salmo y evita endurecer la sintaxis; la ambigüedad pronominal queda controlada por el contexto del verso y se documenta en la nota.
- source_word: וּבִרְצֹנְךָ
  english_pob_choice: and by your favor
  chosen_spanish: y con tu favor
  alternatives_spanish:
  - y por tu favor
  - y en tu favor
  - y por tu buena voluntad
  lexicon: HALOT
  rationale: רָצוֹן denota favor, benevolencia o buena voluntad. «Con tu favor» refleja bien el sentido instrumental del prefijo y mantiene un registro sobrio y claro en español.
- source_word: תרים
  english_pob_choice: you exalt
  chosen_spanish: exaltas
  alternatives_spanish:
  - levantas
  - elevas
  lexicon: HALOT
  rationale: El hifil de רוּם expresa elevar o enaltecer. «Exaltas» conserva el valor formal adoptado en la revisión inglesa y funciona de manera natural en español bíblico sin perder la acción de elevación.
- source_word: קַרְנֵנוּ
  english_pob_choice: our horn
  chosen_spanish: nuestro cuerno
  alternatives_spanish:
  - nuestra fuerza
  - nuestro poder
  - nuestro poderío
  lexicon: HALOT
  rationale: Literalmente es «cuerno». Se preserva la imagen metafórica porque el hebreo usa un símbolo convencional de fuerza, dignidad y exaltación. En español, «cuerno» puede requerir apoyo interpretativo, por eso se documenta la metáfora en la nota en vez de sustituirla en el texto principal.
theological_decisions:
- issue: Metáfora de «cuerno»
  english_pob_reading: Retain the metaphor as 'our horn' in the main text.
  chosen_spanish_reading: Mantener «nuestro cuerno» en el texto principal.
  alternative_spanish_readings:
  - nuestra fuerza
  - nuestro poder
  - nuestra honra
  rationale: La equivalencia óptima favorece conservar la imagen hebrea cuando es identificable y auditable. El símbolo del cuerno comunica fuerza y exaltación; explicarlo en nota preserva la metáfora sin oscurecer el sentido.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cambio de persona entre «su» y «nuestro»
  english_pob_reading: 'Preserve the Hebrew pronouns exactly: ''their strength'' ... ''our horn.'''
  chosen_spanish_reading: Preservar la tensión pronominal del hebreo en el flujo del verso.
  alternative_spanish_readings:
  - Armonizar ambos a «nuestro» para suavizar el español
  - Cambiar ambos a tercera persona para uniformidad
  rationale: El hebreo presenta un desplazamiento real de tercera persona plural a primera persona plural. En español se mantiene la diferencia de sentido sin nivelarla artificialmente; eso respeta la evidencia textual y la lógica del poema.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió «exalt» frente a «lift up» por registro más formal. Por eso se eligió «exaltas» en español. También se respetó la decisión auditada de mantener la metáfora de «horn» en el texto principal y de conservar la tensión pronominal del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto, aunque este verso no contiene el Tetragrámaton explícitamente.
  - «Gloria» se escogió como equivalente principal de תִפְאֶרֶת por su adecuación al paralelismo poético con «fuerza».
  - Se mantuvo un registro bíblico contemporáneo, evitando arcaísmos innecesarios y sin diluir la imagen hebrea.
