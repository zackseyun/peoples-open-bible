  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: conserva la negación, el sentido causativo de תְחַיֶּה como ''dejar vivir'', y el femenino singular de מְכַשֵּׁפָה. También preserva la alternativa léxica documentada en la nota.'
  spanish_quality_summary: 'La redacción es clara y natural, pero el artículo indefinido con nota insertada (''una[a] hechicera'') suena innecesariamente trabado. En español, ''No dejarás vivir a la hechicera[a]'' sería demasiado específico, así que conviene simplemente eliminar el artículo y anclar la nota en el sustantivo: ''No dejarás vivir a hechicera[a].'' Sin embargo, eso suena antinatural. La mejor solución idiomática y fiel es ''No dejarás vivir a ninguna hechicera[a].'', pero ''ninguna'' añade énfasis distributivo no explícito. Por eso la reparación mínima más natural es mover la nota al sustantivo manteniendo el artículo: ''No dejarás vivir a una hechicera[a].'''
  glossary_alignment: No hay términos del glosario de proyecto especialmente implicados. 'Hechicera' corresponde bien a 'sorceress' y mantiene el femenino singular, en línea con la decisión lexical y teológica documentada.
