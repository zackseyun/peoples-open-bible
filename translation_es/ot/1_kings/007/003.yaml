translation:
  language: es
  text: Estaba revestido de cedro por encima[a], sobre las cámaras laterales que estaban sobre las columnas, cuarenta y cinco en total, quince por hilera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estaba cubierto de cedro por encima, sobre las estructuras laterales que estaban sobre las columnas». Los términos arquitectónicos hebreos son difíciles, especialmente צלעות, que puede significar «costados», «costillas» o «cámaras laterales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָפֻן
  english_pob_choice: It was paneled
  chosen_spanish: Lo recubrió
  alternatives_spanish:
  - Lo paneló
  - Lo cubrió
  lexicon: HALOT
  rationale: El participio pasivo de ספן expresa cubrir u ઓ overlay con un material de acabado. En español, «lo recubrió» conserva el sentido de revestimiento arquitectónico sin forzar un tecnicismo poco natural. Se evita «paneló», que suena menos idiomático, y «cubrió» por ser más general.
- source_word: בָּאֶרֶז
  english_pob_choice: with cedar
  chosen_spanish: de cedro
  alternatives_spanish:
  - con cedro
  - en cedro
  lexicon: HALOT
  rationale: La preposición hebrea marca material. En español, «de cedro» es la forma más natural para un revestimiento hecho de ese material y preserva el valor instrumental/material.
- source_word: מִמַּעַל
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - arriba
  - sobre
  lexicon: HALOT
  rationale: El adverbio locativo señala la parte superior de la estructura. «Por encima» expresa con claridad la ubicación superior sin añadir interpretación extra.
- source_word: עַל הַצְּלָעוֹת
  english_pob_choice: over the side chambers
  chosen_spanish: sobre las cámaras laterales
  alternatives_spanish:
  - sobre los costados
  - sobre las estructuras laterales
  lexicon: HALOT
  rationale: צלעות puede significar literalmente «costados/costillas», pero en contexto arquitectónico probablemente designa estancias o estructuras laterales. «Cámaras laterales» sigue la lectura contextual del POB en inglés y mantiene la ambigüedad arquitectónica razonable.
- source_word: אֲשֶׁר עַל הָעַמּוּדִים
  english_pob_choice: that were on the pillars
  chosen_spanish: que estaban sobre las columnas
  alternatives_spanish:
  - que estaban sobre los pilares
  - que descansaban sobre las columnas
  lexicon: HALOT
  rationale: Se conserva la relación locativa del relativo con una formulación natural en español. «Columnas» es claro y estándar en un contexto arquitectónico; «pilares» sería posible, pero «columnas» suena más preciso aquí.
- source_word: אַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: forty-five in all
  chosen_spanish: cuarenta y cinco en total
  alternatives_spanish:
  - cuarenta y cinco
  - en total, cuarenta y cinco
  lexicon: HALOT
  rationale: La cifra funciona como resumen totalizador. «En total» reproduce explícitamente la fuerza sumaria que el inglés POB añadió para claridad.
- source_word: חֲמִשָּׁה עָשָׂר הַטּוּר
  english_pob_choice: fifteen to a row
  chosen_spanish: quince por hilera
  alternatives_spanish:
  - quince en una hilera
  - quince por fila
  lexicon: HALOT
  rationale: הַטּוּר significa «hilera/fila/carrera». «Por hilera» comunica la distribución de la cantidad total de manera breve y natural; «fila» es posible, pero «hilera» preserva mejor el matiz constructivo.
theological_decisions:
- issue: Términos arquitectónicos difíciles y la posibilidad de lectura alternativa de צלעות
  english_pob_reading: The Hebrew architectural terms are difficult, especially צלעות ('sides/ribs/side chambers').
  chosen_spanish_reading: Las cámaras laterales
  alternative_spanish_readings:
  - los costados
  - las estructuras laterales
  rationale: No hay una decisión doctrinal, sino una decisión léxica sobre un término arquitectónico oscuro. Se mantiene la lectura contextual preferida por el POB en inglés, pero sin ocultar que el hebreo permite alternativas.
  doctrine_reference: No aplica; decisión de lexicografía y arquitectura del templo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el análisis auditado del POB en inglés y conserva la misma tensión léxica principal en torno a צלעות, sin suavizarla ni resolverla de forma artificial. No hay revisiones aplicadas en el texto fuente de auditoría, y la redacción española se alinea con el pasaje tal como quedó en el último pase revisado.
  spanish_consistency_notes:
  - Se usa «cedro» como material de revestimiento, no como simple decoración verbal.
  - Se mantiene «cámaras laterales» para reflejar la opción contextual del POB y no sustituirla por un equivalente demasiado libre.
  - Se emplea «columnas» para un registro arquitectónico claro y natural en español.
  - La puntuación y el orden siguen una cadencia publicable en español bíblico moderno, sin imitar servilmente el inglés.
