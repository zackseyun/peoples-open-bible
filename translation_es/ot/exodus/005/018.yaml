review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia imperativa del hebreo y la mayor parte de las decisiones léxicas auditadas: וְעַתָּה como transición enfática, לְכוּ / עִבְדוּ como mandato de trabajo, la negación de suministro de paja, y תֹכֶן לְבֵנִים como cantidad fija de ladrillos. Sin embargo, la conjunción antes de la última cláusula no debe sonar meramente copulativa en español; el hebreo y el inglés auditado marcan contraste concesivo: no se dará paja, sin embargo deberán entregar la cuota requerida.'
  spanish_quality_summary: El español es claro y natural, pero 'Así que ahora' suena algo calcado y menos idiomático que 'Ahora bien' o 'Y ahora'. Además, 'y ustedes deben entregar' debilita el contraste adversativo que el contexto exige. También puede aligerarse 'la cantidad requerida' con 'la cantidad exigida', que conserva mejor el matiz de demanda impuesta en contexto de opresión laboral.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. 'Paja', 'ladrillos' y 'trabajen' son adecuados. La nota sobre תֹכֶן se preserva correctamente; en español 'cuota' sigue siendo una alternativa útil en nota.
  issues:
  - severity: medium
    issue: '''Así que ahora'' suena poco idiomático en español bíblico natural.'
    rationale: Aunque reproduce el inglés auditado, en español la combinación resulta algo forzada. וְעַתָּה introduce una transición enfática; 'Ahora bien' conserva mejor ese valor sin calco innecesario.
  - severity: medium
    issue: La conjunción 'y' antes de 'ustedes deben entregar' no refleja bien el contraste contextual.
    rationale: 'Tras ''pero no se les dará paja'', la cláusula final expresa concesión/adversidad: aun así deben cumplir la cuota. ''Sin embargo'' o ''pero aun así'' comunica mejor la fuerza del hebreo y del inglés auditado (''yet'').'
  - severity: low
    issue: '''Cantidad requerida'' es correcta, pero ''cantidad exigida'' encaja mejor en el contexto de imposición por parte de Faraón.'
    rationale: תֹכֶן denota una medida fija o cuota. 'Requerida' es fiel; 'exigida' añade en español el matiz de demanda autoritaria sin apartarse del sentido base.
  revised_spanish_text: Ahora bien[a], vayan, trabajen; pero no se les dará paja; sin embargo, ustedes deben entregar la cantidad exigida de ladrillos.
  revised_footnotes:
  - marker: a
    text: O 'la cuota de ladrillos'. El hebreo תֹכֶן se refiere a una cantidad fija o medida exigida a los trabajadores.
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura a un español más natural y digno ('Ahora bien'), se refuerza el contraste concesivo de la cláusula final con 'sin embargo', y se afina 'cantidad exigida' para reflejar mejor la cuota impuesta, manteniendo la nota léxica existente.
