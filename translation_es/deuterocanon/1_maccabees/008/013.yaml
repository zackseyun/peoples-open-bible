translation:
  language: es
  text: A quienes quieran ayudar y hacer reyes[a], los hacen reyes; y a quienes quieran, los deponen[b], y han llegado a ser muy grandes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «establecer como reyes»; el griego admite aquí una lectura causativa de βασιλεύειν en este contexto político.
    reason: lexical_alternative
  - marker: b
    text: O «los quitan»; el verbo griego puede significar quitar del cargo en un contexto político.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «fueron exaltados grandemente»; la frase resume su ascenso a gran poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς δʼ ἂν βούλωνται
  english_pob_choice: Whomever they wish
  chosen_spanish: A quienes quieran
  alternatives_spanish:
  - A quienquiera que quieran
  - A aquellos a quienes quieran
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν y subjuntivo pide una formulación abierta e indefinida. «A quienes quieran» conserva esa amplitud con español natural y sin sobrecargar el texto.
- source_word: βοηθεῖν
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - socorrer
  - prestar ayuda
  lexicon: BDAG
  rationale: El verbo significa ayudar o asistir. «Ayudar» es la equivalencia más clara y directa en español moderno y encaja bien en el contexto político.
- source_word: καὶ βασιλεύειν
  english_pob_choice: and make king
  chosen_spanish: y hacer rey
  alternatives_spanish:
  - y establecer como rey
  - y poner como rey
  lexicon: LSJ
  rationale: 'Aquí el infinitivo tiene fuerza causativa: apoyar a alguien para que sea rey. «Hacer rey» reproduce esa causalidad de forma breve y fiel.'
- source_word: βασιλεύουσιν
  english_pob_choice: they make king
  chosen_spanish: los hacen rey
  alternatives_spanish:
  - los establecen como rey
  - los ponen como rey
  lexicon: LSJ
  rationale: En este contexto el verbo no significa simplemente «reinan», sino que colocan a alguien en el trono. «Los hacen rey» conserva el valor transitivo que el contexto exige.
- source_word: μεθιστῶσιν
  english_pob_choice: they remove
  chosen_spanish: los remueven
  alternatives_spanish:
  - los dependen
  - los depone[n]
  - los quitan
  lexicon: LSJ
  rationale: El verbo puede implicar quitar de un cargo en contexto político. «Remueven» es amplio y sobrio; evita una precisión excesiva, pero mantiene la idea de sacar de la posición.
- source_word: ὑψώθησαν σφόδρα
  english_pob_choice: they have become very great
  chosen_spanish: han llegado a ser muy grandes
  alternatives_spanish:
  - fueron muy exaltados
  - se volvieron sumamente poderosos
  lexicon: LSJ
  rationale: El griego puede leerse como exaltación o elevación en estatus/poder. «Han llegado a ser muy grandes» conserva el resultado de su ascenso sin forzar una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el rastro auditado en inglés. La decisión principal fue conservar el valor político-causativo de βασιλεύειν/βασιλεύουσιν con «hacer rey / los hacen rey», y traducir μεθιστῶσιν con un verbo amplio («remueven») para no imponer más de lo que el griego exige. También se mantuvo el matiz resultativo de ὑψώθησαν σφόδρα sin convertirlo en una glosa interpretativa de poder imperial.
  spanish_consistency_notes:
  - Se usa «rey» en singular como equivalente natural de βασιλεύειν en este contexto de entronización.
  - Se eligió el presente histórico en español («hacen», «remueven») para reproducir la fuerza gnómica del griego.
  - Se evitó «Cristo/Mesías» o terminología teológica ajena al pasaje.
  - «Han llegado a ser muy grandes» preserva el sentido de elevación/exaltación sin añadir un juicio moral que no está explícito en el verso.
