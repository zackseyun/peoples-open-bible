id: HEB.5.12
reference: Hebrews 5:12
source:
  edition: SBLGNT
  text: καὶ γὰρ ὀφείλοντες εἶναι διδάσκαλοι διὰ τὸν χρόνον, πάλιν χρείαν ἔχετε τοῦ διδάσκειν ὑμᾶς ⸀τινὰ τὰ στοιχεῖα τῆς ἀρχῆς τῶν λογίων τοῦ θεοῦ, καὶ γεγόνατε χρείαν ἔχοντες γάλακτος, ⸀οὐ στερεᾶς τροφῆς.
translation:
  text: For although by this time you ought to be teachers[a], you again need someone to teach you the basic elements of the beginning of the oracles of God, and you have come to need milk[b], not solid food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elementary principles of the beginning of God's utterances.'
    reason: lexical_alternative
  - marker: b
    text: '''Oracles of God'' refers to divine utterances or revelations, not pagan oracular speech.'
    reason: cultural_note
lexical_decisions:
- source_word: ὀφείλοντες εἶναι
  chosen: ought to be
  alternatives:
  - should be
  - are obligated to be
  lexicon: BDAG
  rationale: Conveys moral/expected obligation without sounding overly legal. The participle with infinitive expresses what they should by now have become.
- source_word: διδάσκαλοι
  chosen: teachers
  alternatives:
  - instructors
  lexicon: BDAG
  rationale: Standard and natural rendering for those qualified to teach others.
- source_word: διὰ τὸν χρόνον
  chosen: by this time
  alternatives:
  - because of the time
  - in view of the time elapsed
  lexicon: BDAG
  rationale: Idiomatic English that captures the sense of elapsed time leading to expected maturity, rather than a causal 'because of time' phrasing.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: 'Marks regression or repetition: they need elementary instruction anew.'
- source_word: χρείαν ἔχετε
  chosen: you need
  alternatives:
  - you have need
  - you are in need
  lexicon: BDAG
  rationale: Natural modern English preserving the sense of necessity.
- source_word: τοῦ διδάσκειν ὑμᾶς
  chosen: someone to teach you
  alternatives:
  - to be taught
  - for someone to teach you
  lexicon: BDAG
  rationale: The genitive articular infinitive after χρείαν ἔχετε is idiomatically expressed in English with an implied subject, made explicit as 'someone' for clarity.
- source_word: τινὰ
  chosen: the basic elements
  alternatives:
  - certain things
  - some things
  lexicon: BDAG
  rationale: Taken with τὰ στοιχεῖα as an indefinite qualifier pointing to rudimentary matters. English expresses the sense more smoothly by folding it into 'the basic elements' rather than woodenly retaining 'certain'.
- source_word: τὰ στοιχεῖα
  chosen: the basic elements
  alternatives:
  - the elementary principles
  - the rudiments
  lexicon: BDAG
  rationale: Conveys foundational, introductory components in accessible modern English.
- source_word: τῆς ἀρχῆς
  chosen: of the beginning
  alternatives:
  - of the first principles
  - of the beginning stage
  lexicon: BDAG
  rationale: Retains the genitival structure of the Greek and the emphasis on what belongs to the very beginning, rather than paraphrasing too far.
- source_word: τῶν λογίων τοῦ θεοῦ
  chosen: of the oracles of God
  alternatives:
  - of the words of God
  - of God's utterances
  lexicon: BDAG
  rationale: λόγια often denotes divine utterances/oracles rather than ordinary 'words.' 'Oracles of God' preserves the elevated sense and intertextual resonance, while remaining understandable.
- source_word: γεγόνατε
  chosen: you have come to
  alternatives:
  - you have become
  - you are now
  lexicon: BDAG
  rationale: The perfect indicates a resulting state reached over time; 'have come to' captures development into the present condition.
- source_word: χρείαν ἔχοντες
  chosen: need
  alternatives:
  - being in need of
  - having need of
  lexicon: BDAG
  rationale: Combined idiomatically with γεγόνατε in English as 'you have come to need' for clarity and flow.
- source_word: γάλακτος
  chosen: milk
  alternatives: []
  lexicon: BDAG
  rationale: Maintains the metaphor for immature instruction.
- source_word: οὐ στερεᾶς τροφῆς
  chosen: not solid food
  alternatives:
  - not solid nourishment
  - not firm food
  lexicon: BDAG
  rationale: Standard, clear rendering of the maturity metaphor; 'solid food' is idiomatic and faithful.
