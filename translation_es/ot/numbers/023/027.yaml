    reason: lexical_alternative
  revision_rationale: Se ajustó «te llevaré» a «déjame llevarte» para reflejar mejor el matiz volitivo de אֶקָּחֲךָ en contexto. Se reemplazó «será recto a los ojos de Dios» por «le parezca bien a Dios», que comunica de forma idiomática y fiel el sentido de יִישַׁר בְּעֵינֵי הָאֱלֹהִים en español. También se mejoró el orden de «desde allí» para mayor naturalidad.
