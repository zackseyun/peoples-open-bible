translation:
  language: es
  text: Y el sacerdote lo examinará; y si ve que la erupción escamosa se ha extendido en la piel, el sacerdote lo declarará impuro; es lepra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרַעַת (tsaraʿat), tradicionalmente traducido «lepra»; en Levítico probablemente abarca un grupo más amplio de afecciones cutáneas graves que la lepra moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En contexto diagnóstico sacerdotal, ראה implica una revisión oficial y no solo una percepción visual. ‘Examinará’ comunica mejor la acción evaluativa del sacerdote.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-levita
  - el ministro
  lexicon: HALOT
  rationale: כהן en material levítico se refiere al funcionario cultual autorizado para inspeccionar y declarar el estado ritual. ‘Sacerdote’ es la equivalencia natural y fiel en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La fórmula introduce el hallazgo observado en la inspección. ‘Y he aquí’ conserva el valor enfático y auditivo de la expresión hebrea sin volverla demasiado arcaica.
- source_word: פָּשְׂתָה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha crecido
  - se ha propagado
  lexicon: HALOT
  rationale: El verbo expresa expansión o propagación del mal. ‘Se ha extendido’ es natural en español y mantiene el criterio diagnóstico del texto.
- source_word: הַמִּסְפַּחַת
  english_pob_choice: the scaly eruption
  chosen_spanish: la erupción escamosa
  alternatives_spanish:
  - la afección escamosa
  - la lesión escamosa
  - el sarpullido escamoso
  lexicon: HALOT
  rationale: El sustantivo nombra una afección cutánea superficial. ‘Erupción escamosa’ preserva el rasgo visible sin imponer una identificación médica moderna demasiado específica.
- source_word: בָּעוֹר
  english_pob_choice: on the skin
  chosen_spanish: sobre la piel
  alternatives_spanish:
  - en la piel
  - en la carne
  lexicon: HALOT
  rationale: עור es ‘piel/cuero’. ‘Sobre la piel’ refleja la localización del proceso con español claro y adecuado al registro legal.
- source_word: וְטִמְּאוֹ
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo hará impuro
  lexicon: HALOT
  rationale: En la ley de pureza, el sacerdote no causa la impureza; la declara oficialmente. ‘Declarará impuro’ conserva la función jurídica y evita una lectura causal.
- source_word: צָרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - tzaraat
  - mal cutáneo
  lexicon: HALOT
  rationale: El inglés POB revisado volvió a ‘leprosy’ para reflejar directamente el término; en español, ‘lepra’ es la equivalencia tradicional más inmediata. Aunque el término hebreo abarca un conjunto más amplio de afecciones que la lepra moderna, aquí se conserva la forma tradicional por fidelidad textual y porque el contexto litúrgico legal mantiene esa designación en español bíblico.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - se trata de
  - esto es
  lexicon: HALOT
  rationale: La frase nominal final funciona como identificación simple de la condición. ‘Es lepra’ reproduce de manera directa la cópula hebrea implícita en español.
theological_decisions:
- issue: Cómo traducir צָרַעַת en la legislación de pureza levítica
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - mal cutáneo
  - tzaraat
  rationale: El hebreo no coincide de manera exacta con la lepra moderna, y el propio aparato inglés reconoce esa tensión. Sin embargo, dado que el inglés final eligió ‘leprosy’ y que en español bíblico ‘lepra’ es la forma establecida y reconocible, se mantiene la designación tradicional. La nota preserva la cautela semántica para no confundir el término bíblico con la enfermedad moderna.
  doctrine_reference: Principio de primacía del original con equivalencia óptima; sensibilidad a la precisión léxica en textos legales de pureza.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que añadió la fórmula enfática equivalente a וְהִנֵּה y optó por ‘leprosy’ para צָרַעַת. En español se conserva esa decisión tradicional, pero la nota aclara la amplitud semántica del término hebreo para evitar anacronismo médico.
  spanish_consistency_notes:
  - Se mantiene ‘sacerdote’ para כהן en el marco levítico.
  - Se usa ‘declarará impuro’ para expresar la función jurídica, no causal, del sacerdote.
  - La fórmula ‘y he aquí’ conserva el valor enfático/observacional de וְהִנֵּה sin perder legibilidad.
  - ‘Piel’ se emplea para עור en un registro natural y bíblicamente adecuado.
  - La nota de ‘lepra’ resuelve la tensión entre tradición española y amplitud semántica hebrea sin borrar ninguna de las dos.
