translation:
  language: es
  text: Te di un rey en mi ira[a], y lo quité en mi furor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La forma hebrea corresponde a un imperfecto; también podría leerse, de manera más formal: «te doy un rey en mi ira, y lo quito en mi furor». Sin embargo, el contexto favorece la traducción retrospectiva.'
    reason: alternative_reading
  - marker: b
    text: El hebreo dice simplemente «y tomé»; el objeto «lo» se sobreentiende a partir de «un rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתֶּן
  english_pob_choice: I gave
  chosen_spanish: te di
  alternatives_spanish:
  - te doy
  - te daré
  lexicon: HALOT
  rationale: La forma hebrea es imperfecta, pero el contexto profético funciona con valor retrospectivo. En español, el pasado simple comunica con naturalidad la lectura retrospectiva que la POB inglesa adoptó como principal.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El ל con sufijo de 2ms expresa destinatario. En español, el clítico dativo «te» es la forma más natural y conserva la referencia singular a Israel como entidad corporativa.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo sin artículo se rinde naturalmente como indefinido en español. «Un rey» preserva la idea de concesión de monarquía sin identificar a una persona concreta por nombre.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - con mi ira
  lexicon: HALOT
  rationale: אַף en este contexto denota ira/enojo. «Ira» conserva el tono profético elevado y la fuerza causal-circunstancial del hebreo con una expresión idiomática clara en español.
- source_word: וְאֶקַּח
  english_pob_choice: and I took him away
  chosen_spanish: y ... lo quité
  alternatives_spanish:
  - y lo tomé
  - y lo retiré
  lexicon: HALOT
  rationale: לקח puede significar «tomar», pero aquí, en el contexto de realeza, implica remover. «Lo quité» expresa la remoción del rey sin forzar un giro demasiado interpretativo, y el pronombre retoma el objeto implícito provisto por «un rey».
- source_word: בְּעֶבְרָתִי
  english_pob_choice: in my wrath
  chosen_spanish: en mi indignación
  alternatives_spanish:
  - en mi furor
  - en mi ira
  lexicon: HALOT
  rationale: עֶבְרָה suele ser más fuerte que la ira general. «Indignación» permite distinguirlo de «ira» en el primer hemistiquio y mantiene la elevación del registro profético; también evita repetir el mismo término si se busca reflejar la diferencia léxica del hebreo.
theological_decisions:
- issue: Tensión aspectual de los imperfectos hebreos
  english_pob_reading: 'Lectura retrospectiva: ''I gave ... and I took him away'''
  chosen_spanish_reading: 'Lectura retrospectiva: ''Te di ... y ... lo quité'''
  alternative_spanish_readings:
  - 'Lectura presente/futura: ''te doy ... y ... lo quito'''
  - 'Lectura futura: ''te daré ... y ... lo quitaré'''
  rationale: Aunque el hebreo tiene imperfectos, el contexto de juicio y memoria histórica favorece entender la acción como ya realizada. El pasado simple en español reproduce mejor esa lectura discursiva que una traducción mecánica de tiempo verbal.
  doctrine_reference: Lectura profética retrospectiva del juicio divino sobre la monarquía de Israel.
- issue: Objeto implícito de וְאֶקַּח
  english_pob_reading: 'Object understood as the king: ''I took him away'''
  chosen_spanish_reading: 'Objeto recuperado: ''lo quité'''
  alternative_spanish_readings:
  - '''y quité'' (sin objeto explícito)'
  - '''y lo tomé'''
  rationale: El hebreo omite el objeto, pero «rey» lo aporta de manera inmediata en el contexto. En español, el pronombre «lo» hace explícita esa referencia sin añadir contenido nuevo.
  doctrine_reference: Coherencia referencial del objeto implícito en el discurso profético.
translation_notes:
  revision_awareness: 'Se siguió la lectura de la POB inglesa con acuerdo alto: pasado retrospectivo en ambos verbos, e incorporación del objeto implícito en el segundo hemistiquio para claridad en español. Se conservó la distinción léxica entre ''ira'' y ''indignación'' para reflejar אַף / עֶבְרָה sin diluir la tensión del texto.'
  spanish_consistency_notes:
  - Se usó 'ira' para בְּאַפִּי y 'indignación' para בְּעֶבְרָתִי para mantener una distinción léxica visible.
  - Se eligió 'te' como destinatario singular corporativo, coherente con el hebreo dirigido a Israel.
  - La puntuación respeta el paralelismo hebreo con dos colonos unidos por coordinación simple.
