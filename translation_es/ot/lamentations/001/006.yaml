review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca el rastro auditado en inglés: la salida del esplendor de Sion, la comparación de los príncipes con ciervos sin pasto, y el avance exhausto ante el perseguidor. Sin embargo, hay dos puntos mejorables: (1) la nota [a] introduce alternativas que no corresponden bien al campo semántico auditado (''se ha salido'', ''ha desaparecido''); y (2) ''delante del perseguidor'' suena menos natural y puede sugerir mera posición espacial; ''ante el perseguidor'' preserva mejor la presión del perseguidor sin sobreinterpretar.'
  spanish_quality_summary: El español es mayormente claro y digno. 'De la hija de Sion' y 'todo su esplendor' funcionan bien. 'Han llegado a ser' es entendible pero algo más pesado que el inglés y el hebreo requieren; 'han sido/hecho como' sería posible, pero no indispensable. 'Que no hallan pasto' es correcto y legible. La mayor mejora estilística es cambiar 'delante del perseguidor' por 'ante el perseguidor'. También conviene corregir la nota [a] para que ofrezca alternativas fieles y naturales.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías, etc. 'Sion' está bien. 'Príncipes' coincide con la decisión auditada para שָׂרֶיהָ. 'Esplendor' coincide con הֲדָרָהּ. La personificación de hija de Sion se conserva adecuadamente.
  issues:
  - severity: medium
    issue: La nota [a] ofrece alternativas inadecuadas para וַיֵּצֵא
    rationale: El inglés auditado documenta 'has gone out' / 'has departed', no 'se ha salido' ni 'ha desaparecido'. 'Se ha salido' es poco natural aquí y 'ha desaparecido' cambia el matiz de salida/partida por uno de desvanecimiento.
  - severity: low
    issue: '''Delante del perseguidor'' suena menos idiomático en este contexto'
    rationale: לִפְנֵי רוֹדֵף expresa ir empujados por la persecución; 'ante el perseguidor' o 'delante de quien los perseguía' suena más natural. 'Delante del perseguidor' no es falso, pero es más tosco.
  revised_spanish_text: De la hija de Sion se ha ido[a] todo su esplendor; sus príncipes[b] han llegado a ser como ciervos que no hallan pasto; fueron sin fuerza ante el perseguidor.
  revised_footnotes:
  - marker: a
    text: O "todo su esplendor ha salido de la hija de Sion" o "todo su esplendor se ha apartado de la hija de Sion".
    reason: lexical_alternative
  - marker: b
    text: O "sus oficiales" o "sus gobernantes".
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base casi por completo, pero se corrige la nota [a] para alinearla con el hebreo y con las alternativas auditadas en inglés, evitando opciones semánticamente desviadas. También se mejora la naturalidad de לִפְנֵי רוֹדֵף con 'ante el perseguidor'.
