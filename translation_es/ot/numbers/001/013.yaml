lexical_decisions:
- source_word: לְ/אָשֵׁר
  english_pob_choice: From Asher
  chosen_spanish: De Aser
  alternatives_spanish:
  - Para Aser
  lexicon: HALOT
  rationale: El לְ prefijado marca aquí pertenencia o procedencia tribal dentro de una lista censal. En español, «De Aser» conserva esa relación de afiliación de manera natural y breve; «Para Aser» es posible, pero suena menos idiomático en este contexto enumerativo.
- source_word: פַּגְעִיאֵל
  english_pob_choice: Pagiel
  chosen_spanish: Pagiel
  alternatives_spanish:
  - Pagaiel
  lexicon: transliteración estándar de nombre propio
  rationale: Se mantiene el nombre propio en transliteración, siguiendo el uso bíblico en español y la práctica auditada del POB de no traducir nombres personales.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La construcción genealógica básica se expresa de modo directo como «hijo de». «Descendiente de» ampliaría el sentido, pero aquí el hebreo presenta una filiación inmediata.
- source_word: עָכְרָן
  english_pob_choice: Ocran
  chosen_spanish: Ocrán
  alternatives_spanish:
  - Acrán
  - Akrán
  lexicon: transliteración estándar de nombre propio
  rationale: Se conserva el nombre propio con acento gráfico español para favorecer la lectura. La vocal inicial y el grupo consonántico permiten varias soluciones; «Ocrán» es una forma natural y cercana a la convención bíblica en español.
