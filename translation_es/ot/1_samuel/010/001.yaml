translation:
  language: es
  text: 'Entonces Samuel tomó el frasco de aceite, lo derramó sobre su cabeza, lo besó y dijo: «¿Acaso no te ha ungido Yahvé como gobernante[a] sobre su herencia?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder» o «príncipe» por «gobernante». El término hebreo se refiere a alguien designado para gobernar y no es idéntico en matiz al título posterior «rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּךְ הַשֶּׁמֶן
  english_pob_choice: the flask of oil
  chosen_spanish: el frasco de aceite
  alternatives_spanish:
  - la vasija de aceite
  - el recipiente de aceite
  lexicon: HALOT
  rationale: פַּךְ designa un recipiente pequeño y concreto; «frasco» conserva esa imagen con naturalidad en español actual y sigue de cerca la opción auditada «flask».
- source_word: וַיִּצֹק עַל רֹאשׁוֹ
  english_pob_choice: poured it on his head
  chosen_spanish: lo derramó sobre su cabeza
  alternatives_spanish:
  - lo vertió sobre su cabeza
  - lo echó sobre su cabeza
  lexicon: HALOT
  rationale: יצק significa derramar o verter; «derramó» reproduce bien la acción ritual sin volverla mecánica. «Sobre su cabeza» mantiene el valor de עַל רֹאשׁוֹ.
- source_word: וַיִּשָּׁקֵהוּ
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó en señal de respeto
  - lo saludó con un beso
  lexicon: HALOT
  rationale: El verbo נשׁק aquí es un beso literal; «lo besó» conserva la escena sin añadir interpretación. En español, el pronombre clítico resulta más natural que repetir el objeto.
- source_word: מְשָׁחֲךָ
  english_pob_choice: anointed you
  chosen_spanish: te ha ungido
  alternatives_spanish:
  - te ha consagrado
  - te ha apartado por unción
  lexicon: HALOT
  rationale: משׁח en contexto de comisión real se traduce con el verbo técnico «ungir/ungido». «Te ha ungido» conserva el valor ritual y de investidura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto pide «Yahvé» para el Tetragrámaton. Mantiene el nombre divino propio sin sustituirlo por un título.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión
  - su patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה puede ser heredad/inheritance. «Su herencia» comunica la idea de posesión asignada y conserva el matiz de pertenencia del pueblo a Yahvé.
- source_word: לְנָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - ruler
  lexicon: HALOT
  rationale: נָגִיד es alguien puesto al frente para gobernar; «gobernante» expresa la función sin convertirlo en «rey». En español, evita la ambigüedad de «príncipe».
theological_decisions:
- issue: Render the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la política del proyecto para el Nombre divino: transliterar el Tetragrámaton como «Yahvé», preservando el nombre pactal de Dios y no una sustitución reverencial.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Render נָגִיד in a royal commissioning context
  english_pob_reading: ruler
  chosen_spanish_reading: gobernante
  alternative_spanish_readings:
  - líder
  - príncipe
  rationale: El contexto es de designación para una función de mando antes de la consolidación de la monarquía. «Gobernante» mantiene la fuerza de oficio sin equipararlo explícitamente a «rey».
  doctrine_reference: HALOT
- issue: Preserve the rhetorical force of הֲלוֹא כִּי
  english_pob_reading: Has not
  chosen_spanish_reading: ¿No es que...?
  alternative_spanish_readings:
  - ¿Acaso no...?
  - ¿No ha sido que...?
  rationale: La secuencia hebrea introduce una afirmación retórica. En español, «¿No es que...?» comunica la fuerza interrogativa-afirmativa sin sonar artificial.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail inglés, que añadió «as» antes de «ruler» para hacer más natural la frase. En español se reflejó ese ajuste con «como gobernante», manteniendo la lectura de investidura y la tensión entre función y título.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la norma del proyecto para יְהוָה.
  - Se evitó «rey» para נָגִיד, conservando la distinción del texto entre nombramiento a función de gobierno y la realeza plenamente desarrollada.
  - «Ungir» se mantuvo como término técnico y litúrgico, coherente con el acto de consagración narrado.
  - 'El orden verbal sigue de cerca el hebreo y el inglés auditado: tomó, derramó, besó y dijo.'
