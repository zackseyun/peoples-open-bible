  text: los hijos de Senaah, tres mil seiscientos treinta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hombres de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, el hebreo constructo בְּנֵי suele designar un grupo de pertenencia o descendencia. En español, «hijos de» conserva la fórmula formal y transparente sin forzar una lectura biológica estricta; además, evita un calco demasiado rígido como «los hijos de» en singular colectivo donde el contexto numérico ya señala un clan.
- source_word: סְנָאָה
  english_pob_choice: Senaah
  chosen_spanish: Senaa
  alternatives_spanish:
  - Senaah
  lexicon: HALOT
  rationale: Es un nombre propio; la forma española «Senaa» sigue de cerca la vocalización del hebreo y evita añadir una h aspirada no audible ni necesaria en español. Se preserva la identidad del topónimo/clan sin traducirlo.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres mil personas
  - tres millares
  lexicon: HALOT
  rationale: La secuencia numeral hebrea expresa un total cardinal simple. «Tres mil» es la equivalencia idiomática natural en español y conserva la precisión censal del texto.
- source_word: וְשֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred
  chosen_spanish: seiscientos
  alternatives_spanish:
  - seiscientas
  lexicon: HALOT
  rationale: El hebreo coordina «seis» + «cientos»; en español, el cardinal compuesto se rinde de manera normal como «seiscientos», manteniendo la suma exacta del total.
- source_word: וּשְׁלֹשִׁים
  english_pob_choice: and thirty
  chosen_spanish: treinta
  alternatives_spanish:
  - y treinta
  lexicon: HALOT
  rationale: En español, al expresar el total final de una cifra compuesta ya sumada, la coordinación puede absorberse en la forma numérica estándar. «Treinta» conserva el valor semántico completo del hebreo sin añadir una conjunción redundante en lectura corrido-lista.
translation_notes:
  revision_awareness: El texto fuente y el expediente inglés muestran acuerdo alto y no presentan variantes textuales ni notas lexicográficas o teológicas adicionales; por eso la redacción española sigue de cerca la lista censal sin expandirla.
  spanish_consistency_notes:
  - Se mantiene el estilo de registro genealógico/censal breve y directo.
  - Se translitera el nombre propio como forma española estable y no se introduce artículo definido ante el nombre.
  - La cifra se expresa con sintaxis natural del español, preservando el total exacto del hebreo.
