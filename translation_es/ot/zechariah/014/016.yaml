  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé», צְבָאוֹת -> «de los Ejércitos», y mantenimiento del título regio «Rey». Se debe conservar una nota léxica para «Fiesta de los Tabernáculos» y, si se deja nota para el título divino, debe corresponder a la unidad completa «Yahvé de los Ejércitos», no solo a «Yahvé».'
