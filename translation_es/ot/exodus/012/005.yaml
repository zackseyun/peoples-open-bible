translation:
  language: es
  text: El cordero será para ustedes sin defecto[a], macho de un año; lo tomarán de entre las ovejas o de entre las cabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שֶׂה puede referirse más ampliamente a un animal joven del rebaño, incluido un cordero o un cabrito; la cláusula siguiente hace explícito que puede tomarse de entre ovejas o cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂה
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - animal joven del rebaño
  - cría del rebaño
  lexicon: HALOT
  rationale: שֶׂה puede designar de manera más amplia un animal joven del rebaño, incluidas ovejas o cabras. En español, «cordero» es la opción natural y reverente en este contexto pascual, y permite mantener el singular sacrificial que el verso presenta. La cláusula siguiente conserva la amplitud al especificar ovejas o cabras.
- source_word: תָמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - perfecto
  lexicon: HALOT
  rationale: En contexto sacrificial, תָמִים expresa un animal libre de defecto. «Sin defecto» comunica bien la exigencia cultual en español moderno y evita la ambigüedad de «perfecto», que podría sonar moral en vez de ritual.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: macho
  alternatives_spanish:
  - varón
  - de sexo masculino
  lexicon: HALOT
  rationale: Para animales, «macho» es la designación biológica más natural en español y conserva el sentido preciso del hebreo.
- source_word: בֶּן שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - un año de edad
  lexicon: HALOT
  rationale: El hebreo significa literalmente «hijo de un año» e indica un animal en su primer año. «De un año» es idiomático en español y mantiene la misma referencia temporal.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - ha de ser
  - deberá ser
  lexicon: HALOT
  rationale: El imperfecto hebreo con לָכֶם expresa la condición normativa del animal para el pueblo. «Será» reproduce de modo natural el valor prescriptivo sin añadir matices no presentes en el texto.
- source_word: מִן הַכְּבָשִׂים וּמִן הָעִזִּים
  english_pob_choice: from the sheep or from the goats
  chosen_spanish: de las ovejas o de las cabras
  alternatives_spanish:
  - de los corderos o de los cabritos
  - de las ovejas y de las cabras
  lexicon: HALOT
  rationale: El hebreo nombra dos categorías permitidas y la relación es disyuntiva. «Ovejas» y «cabras» son los términos naturales en español para las especies indicadas. Se mantiene «o» para reflejar la alternativa permitida.
- source_word: תִּקָּחוּ
  english_pob_choice: you shall take
  chosen_spanish: tomaréis
  alternatives_spanish:
  - recibiréis
  - escogeréis
  lexicon: HALOT
  rationale: El verbo es segunda persona plural con fuerza imperativa/instructiva. «Tomaréis» conserva esa forma y corresponde bien al mandato colectivo dirigido a Israel. Se evita suavizarlo con un valor meramente optativo.
translation_notes:
  revision_awareness: La base inglesa revisó «you may take» por «you shall take» para reflejar con mayor precisión el valor imperativo/futuro del hebreo. La versión española sigue esa revisión con un futuro exhortativo («tomaréis») y conserva la amplitud lexical de שֶׂה mediante una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de una máscara como «SEÑOR» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Cordero» se emplea aquí como equivalencia idiomática de שֶׂה en contexto pascual, sin negar la amplitud semántica señalada en la nota.
  - Se mantiene el singular («tu cordero») porque el hebreo trata un animal individual, aunque la instrucción sea dirigida al plural de la comunidad.
