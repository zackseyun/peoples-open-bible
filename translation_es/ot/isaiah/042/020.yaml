translation:
  language: es
  text: Has visto muchas cosas[a], pero no prestas atención; sus oídos están abiertos, pero no oye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de segunda persona en la primera mitad del versículo a tercera persona en la segunda. Algunas traducciones suavizan esto a «tus oídos están abiertos, pero no oyes».
    reason: alternative_reading
lexical_decisions:
- source_word: ראית
  english_pob_choice: You have seen
  chosen_spanish: Has visto
  alternatives_spanish:
  - Ves
  - Viste
  lexicon: HALOT
  rationale: El perfecto qal de segunda persona masculina singular de ראה expresa una acción ya realizada; en español, «has visto» conserva bien ese aspecto y mantiene el tono de reproche profético sin sonar forzado.
- source_word: רַבּוֹת
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - muchas
  - grandes cosas
  lexicon: HALOT
  rationale: El plural femenino sustantivado después de «ver» se vierte naturalmente como «muchas cosas». «Muchas» sin sustantivo quedaría algo elíptico; «grandes cosas» añade un matiz que el hebreo no exige aquí.
- source_word: וְלֹא תִשְׁמֹר
  english_pob_choice: but you do not observe
  chosen_spanish: pero no observas
  alternatives_spanish:
  - pero no guardas
  - pero no prestas atención
  - pero no vigilas
  lexicon: HALOT
  rationale: שׁמר puede significar «guardar», «observar» o «vigilar». Dado el contraste con «has visto», «no observas» comunica la falta de respuesta práctica sin repetir demasiado la idea de ver ni desplazar el sentido hacia un objeto implícito.
- source_word: פָּקוֹחַ
  english_pob_choice: are open
  chosen_spanish: están abiertos
  alternatives_spanish:
  - abiertos
  - permanecen abiertos
  lexicon: HALOT
  rationale: El participio resultativo describe el estado de los oídos; en español se requiere una forma verbal finita. «Están abiertos» es la equivalencia más natural y directa.
- source_word: אָזְנַיִם
  english_pob_choice: his ears
  chosen_spanish: sus oídos
  alternatives_spanish:
  - los oídos
  - sus orejas
  lexicon: HALOT
  rationale: Aunque el hebreo no marca explícitamente posesivo, el contexto de la segunda mitad del versículo pasa a tercera persona. En español, «sus oídos» reproduce esa referencia sin decidir innecesariamente si es singular o plural colectivo.
- source_word: וְלֹא יִשְׁמָע
  english_pob_choice: but he does not hear
  chosen_spanish: pero no oye
  alternatives_spanish:
  - pero no escucha
  - pero no oirá
  lexicon: HALOT
  rationale: שמע aquí conserva el sentido sensorial de oír en paralelo con «oídos abiertos». «No oye» es más breve y directo que «no escucha», y preserva bien la ironía del contraste.
theological_decisions:
- issue: Cambio de persona gramatical dentro del versículo
  english_pob_reading: Retain the Hebrew's move from second person ('you have seen ... you do not keep watch') to third person ('his ears ... he does not hear')
  chosen_spanish_reading: Mantener el paso de segunda persona («has visto ... no observas») a tercera persona («sus oídos ... no oye»).
  alternative_spanish_readings:
  - 'Regularizar todo a segunda persona: «tus oídos están abiertos, pero no oyes»'
  - Regularizar todo a tercera persona
  rationale: El hebreo masorético presenta un cambio real de persona, probablemente retórico, y suavizarlo perdería una tensión textual significativa. En español conviene conservarlo para que el lector perciba el quiebre del reproche, en línea con la filosofía de no resolver ambigüedades sin base textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el último estado de revisión del contexto inglés, que prefirió una formulación más natural para el contraste con «ver» y mantuvo el cambio de persona. También respeta la tensión del texto masorético sin armonizarla.
  spanish_consistency_notes:
  - Se mantiene «oídos» en vez de «orejas» por registro bíblico-natural en español y por la imagen de apertura/escucha.
  - Se usa «no oye» y no «no escucha» para conservar el paralelismo sensorial de ver/oír.
  - No se introduce «SEÑOR» ni otras sustituciones teológicas porque el versículo no contiene el tetragrámaton ni un equivalente directo.
