translation:
  language: es
  text: Temo todos mis dolores[a]; sé que no me absolverás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis penas» o «mis aflicciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no me declararás inocente» o «no me dejarás sin castigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָגֹרְתִּי
  english_pob_choice: I am afraid
  chosen_spanish: estoy aterrado
  alternatives_spanish:
  - estoy atemorizado
  - tengo miedo
  - temo
  lexicon: HALOT
  rationale: El verbo expresa temor/dread en un estado resultante; en español, una forma estativa como «estoy aterrado» comunica mejor esa fuerza que un presente meramente verbal. «Temo» o «tengo miedo» también son posibles, pero suenan menos intensos en este contexto de sufrimiento acumulado.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todas
  lexicon: HALOT
  rationale: Quantificador directo; se conserva sin intensificar ni reducir el alcance.
- source_word: עַצְּבֹתַי
  english_pob_choice: my pains
  chosen_spanish: mis dolores
  alternatives_spanish:
  - mis penas
  - mis tristezas
  - mis sufrimientos
  lexicon: HALOT
  rationale: El campo semántico incluye dolores, tristezas o aflicciones. «Dolores» mantiene la experiencia física y existencial del contexto de Job sin limitarlo solo a emoción o dolor corporal.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - lo sé
  - yo sé
  lexicon: HALOT
  rationale: 'El perfecto hebreo funciona como estado presente: «sé» suena natural y fiel al valor actual de la certeza de Job.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Job sabe; «que» es la equivalencia más natural y precisa en español.
- source_word: תְנַקֵּנִי
  english_pob_choice: you will not acquit me
  chosen_spanish: no me absolverás
  alternatives_spanish:
  - no me declararás inocente
  - no me dejarás sin castigo
  - no me vindicarás
  lexicon: HALOT
  rationale: 'La raíz נקה tiene un matiz forense: declarar limpio, inocente o dejar sin culpa/castigo. «Absolver» preserva la idea judicial y es fluido en español, sin resolver la tensión teológica del texto.'
theological_decisions:
- issue: Matiz forense de נקה en la protesta de Job a Dios
  english_pob_reading: you will not acquit me
  chosen_spanish_reading: no me absolverás
  alternative_spanish_readings:
  - no me declararás inocente
  - no me dejarás sin castigo
  - no me vindicarás
  rationale: 'Se mantiene la tensión judicial del pasaje: Job no está simplemente describiendo emoción, sino su convicción de que Dios no lo declarará libre de culpa en juicio. «Absolver» conserva ese marco sin suavizarlo ni convertirlo en una afirmación doctrinal cerrada.'
  doctrine_reference: Preservar la tensión teológica y jurídica del texto; evitar resolver el conflicto narrativo de Job.
translation_notes:
  revision_awareness: El borrador sigue la última pasada revisada, que no registró cambios y fue marcada como de alta concordancia. Se conservó el sentido forense de נקה y la ambigüedad semántica de עַצְּבֹתַי dentro del contexto de aflicción de Job.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino explícito; el pronombre de segunda persona se mantiene sin aclaración añadida.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios como «justificarás» o «limpiarás» para נקה, que podrían desviar el matiz judicial.
