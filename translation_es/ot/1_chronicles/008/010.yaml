  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: enumera tres nombres propios y luego la cláusula nominal ''Estos fueron sus hijos, cabezas de casas paternas''. Sin embargo, los nombres Jeús y Mirmá se alejan innecesariamente de la forma consonántica del hebreo y de la pista auditada en inglés (''Jeuz'', ''Mirmah''). Además, בָנָיו en contexto genealógico se expresa mejor como ''sus hijos'' o, más exactamente, ''sus hijos varones''; ''sus hijos'' es aceptable, pero los nombres requieren ajuste.'
  spanish_quality_summary: El español es claro y legible, pero las formas onomásticas con acentos agudos finales ('Jeús', 'Mirmá') suenan poco naturales y parecen adaptar de más la transliteración. 'Cabezas de casas paternas' es comprensible, aunque algo rígido; aun así, es fiel y digno. Conviene quitar notas innecesarias sobre nombres cuando no preservan una alternativa significativa del original o del rastro auditado.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El manejo de רָאשֵׁי אָבוֹת como ''cabezas de casas paternas'' está alineado con la rationale del POB y puede mantenerse con una nota léxica alternativa sobre ''jefes de clanes''. La principal desalineación está en la transliteración de los nombres propios: mejor ''Jeuz'', ''Sachía'' y ''Mirmah'' para conservar el valor onomástico sin sobrehispanización.'
