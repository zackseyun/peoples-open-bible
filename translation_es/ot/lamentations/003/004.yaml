translation:
  language: es
  text: Él ha desgastado[a] mi carne y mi piel; ha quebrado mis huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha consumido mi carne y mi piel».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלָּה
  english_pob_choice: has worn away
  chosen_spanish: ha consumido
  alternatives_spanish:
  - ha desgastado
  - ha consumido hasta acabar
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de gastar, desgastar o hacer que algo se vaya consumiendo. «Ha consumido» comunica bien esa acción sobre el cuerpo sin sonar forzado en español, y mantiene el tono concreto y corporal del lamento. «Ha desgastado» es posible, pero en español puede sonar menos intenso en este contexto poético.
- source_word: בְשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: «Carne» es el equivalente más directo de בשר y conserva la imaginería corporal y la crudeza del verso. «Cuerpo» suavizaría el hebreo y perdería precisión léxica.
- source_word: וְעוֹרִי
  english_pob_choice: and my skin
  chosen_spanish: y mi piel
  alternatives_spanish:
  - y mi epidermis
  lexicon: HALOT
  rationale: עוֹר significa «piel» de manera directa. «Piel» preserva el paralelismo con «mi carne» y mantiene el registro natural en español.
- source_word: שִׁבַּר
  english_pob_choice: has broken
  chosen_spanish: ha quebrado
  alternatives_spanish:
  - ha roto
  - ha hecho pedazos
  lexicon: HALOT
  rationale: El hebreo indica «romper/quebrar». «Ha quebrado» refleja bien la violencia del verbo y suena literario sin exagerar más allá del texto. «Ha roto» sería más común, pero menos afín al tono poético.
- source_word: עַצְמוֹתַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis osamentas
  lexicon: HALOT
  rationale: «Huesos» es la traducción natural y exacta de עצמות, y conserva la imagen de debilitamiento físico extremo.
translation_notes:
  revision_awareness: El inglés POB traduce בִּלָּה con la imagen de desgaste («has worn away») y anota como alternativa «has wasted away». En español se eligió «ha consumido» por su fuerza idiomática y su capacidad de expresar el deterioro corporal continuo; la nota conserva la alternativa de desgaste explícito para reflejar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el orden poético breve del hebreo con dos miembros paralelos separados por punto y coma.
  - Se tradujo בשר y עור de forma literal como «carne» y «piel», sin suavizar la imaginería física.
  - No se introdujo vocabulario eclesiástico tradicional que atenúe la crudeza del lamento.
