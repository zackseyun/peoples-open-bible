translation:
  language: es
  text: Entonces los sacerdotes trajeron el arca del pacto de Yahvé a su lugar, al santuario interior de la casa[b], al Lugar Santísimo[a], debajo de las alas de los querubines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Santo de los santos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa»; aquí se refiere al templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  english_pob_choice: Then ... brought
  chosen_spanish: Entonces ... trajeron
  alternatives_spanish:
  - Y ... trajeron
  - Luego ... trajeron
  lexicon: HALOT
  rationale: El wayyiqtol narra avance secuencial. «Entonces» reproduce bien la progresión narrativa en español y evita una repetición poco natural de «y».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: Es el equivalente directo y transparente del plural definido. No se necesita expansión porque el contexto del templo ya está claro.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena de constructo con una forma natural en español. «Pacto» refleja בְּרִית, y «Yahvé» sigue el criterio POB para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio y no se sustituye por un título. «Yahvé» es la forma establecida en español para la transliteración del Tetragrámaton en este proyecto.
- source_word: מְקוֹמוֹ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su lugar apropiado
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al arca. «Su lugar» es la traducción más directa y no añade la inferencia de «apropiado» que el hebreo no expresa explícitamente.
- source_word: דְּבִיר הַבַּיִת
  english_pob_choice: the inner sanctuary of the house
  chosen_spanish: al santuario interior de la casa
  alternatives_spanish:
  - al santuario interior del templo
  - al recinto interior de la casa
  lexicon: HALOT
  rationale: דְּבִיר designa el espacio más interno del santuario. «Santuario interior» comunica bien el sentido sin depender de «oráculo», que en español sería menos claro. «La casa» se conserva por fidelidad al hebreo, con el referente templario ya implícito.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: al Lugar Santísimo
  alternatives_spanish:
  - al Santo de los santos
  - al Lugar Sagrado por excelencia
  lexicon: HALOT
  rationale: La expresión superlativa se vierte con la fórmula tradicional y clara «Lugar Santísimo», que es idiomática en español y conserva el valor absoluto de santidad. No se usa «Santo de los santos» porque suena más literal pero menos natural.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo las
  lexicon: HALOT
  rationale: Indica ubicación espacial concreta. «Debajo de» es natural y precisa en español para el posicionamiento bajo las alas.
- source_word: כַּנְפֵי הַכְּרוּבִים
  english_pob_choice: the wings of the cherubim
  chosen_spanish: las alas de los querubines
  alternatives_spanish:
  - las alas de los querubines
  - las alas de los querubines
  lexicon: HALOT
  rationale: Se preserva la imagen literal de las alas y el término técnico «querubines», ya asentado en español bíblico. No se sustituye por «querubes» ni por «ángeles» para no perder la figura templaria específica.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, así que se conserva el nombre propio en vez de ocultarlo tras un título. La forma española del proyecto es «Yahvé», manteniendo la coherencia con la política editorial de POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Uso de «Lugar Santísimo» para קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: Lugar Santísimo
  alternative_spanish_readings:
  - Santo de los santos
  - el lugar santísimo
  rationale: La expresión hebrea es un superlativo espacial sagrado. «Lugar Santísimo» transmite el valor funcional y cultual del término con buena inteligibilidad en español, sin perder la referencia al recinto más interno del templo.
  doctrine_reference: DOCTRINE.md Temple terminology / sacred-space rendering
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la decisión inglesa auditada: YHWH se conserva como nombre divino, דְּבִיר se expresa como «santuario interior», y קֹדֶשׁ הַקֳּדָשִׁים se vierte con la fórmula española tradicional «Lugar Santísimo». No se detectaron cambios pendientes respecto del último pase de revisión, que quedó marcado como sin cambios.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología POB para el nombre divino: Yahvé.'
  - Se evita el calco «la casa» en el cuerpo principal, pero se documenta en nota porque el hebreo lo dice literalmente.
  - «Querubines» conserva el tecnicismo bíblico estándar en español.
  - La puntuación y el orden de los sintagmas están ajustados a la sintaxis natural del español sin añadir contenido interpretativo.
