review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: «las obras de sus manos» para מַעֲשֵׂי יָדָיו, «verdad y justicia» para אֱמֶת וּמִשְׁפָּט, y «sus preceptos» para פִּקּוּדָיו. Sin embargo, «son fieles» para נֶאֱמָנִים no preserva con suficiente precisión el sentido documentado de confiabilidad/dependabilidad que el audit trail inglés fijó como principal («are trustworthy»). En español, aplicado a preceptos, «fieles» suena menos natural y puede sugerir lealtad más que fiabilidad.'
  spanish_quality_summary: La redacción es clara y digna, pero «todos sus preceptos son fieles» resulta poco idiomática en español bíblico contemporáneo. «Dignos de confianza» o «confiables» comunica mejor el predicado y mejora la legibilidad sin perder solemnidad. También conviene alinear la nota b con una alternativa real distinta de la lectura principal.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto en «preceptos», «verdad» y «justicia». La principal desviación es léxico-semántica: נֶאֱמָנִים debe ir con una expresión de fiabilidad, no con «fieles» como texto principal. Las notas deben conservar la alternativa inglesa sobre «instructions» además de la alternativa de «trustworthy/reliable» si se desea preservar el rastro auditado.'
  issues:
  - severity: medium
    issue: «son fieles» no es la mejor equivalencia principal para נֶאֱמָנִים
    rationale: El hebreo describe los preceptos como firmes, fiables, dignos de confianza. En español, «preceptos fieles» es poco natural y semánticamente menos exacto que «dignos de confianza» o «confiables».
  - severity: low
    issue: La nota b no conserva bien la alternativa auditada inglesa
    rationale: El audit trail inglés da como alternativa «all his instructions are reliable». La nota española actual solo ofrece una reformulación del predicado principal, pero no preserva la alternativa léxica sobre פִּקּוּדָיו como «instrucciones».
  revised_spanish_text: Las obras de sus manos son verdad y justicia[a]; todos sus preceptos son dignos de confianza[b].
  revised_footnotes:
  - marker: a
    text: O «fidelidad y justicia» para «verdad y justicia».
    reason: lexical_alternative
  - marker: b
    text: O «todas sus instrucciones son confiables».
    reason: lexical_alternative
