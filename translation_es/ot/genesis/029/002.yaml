  to: Él miró[a], y he aquí[b], había un pozo en el campo, y he aquí[b], allí había tres rebaños de ovejas recostados junto a él[c], porque de ese pozo abrevaban[d] los rebaños. Y la piedra sobre la boca del pozo[e] era grande.
  rationale: La revisión mantiene la fidelidad global del borrador pero corrige un matiz verbal importante y reordena las notas para cumplir con el formato exigido y con la lógica del hebreo. «Abrevaban» expresa mejor el sentido explicativo/habitual de יַשְׁקוּ que «abrevarían», y las notas ahora quedan ancladas exactamente en las palabras o frases pertinentes.
