translation:
  language: es
  text: 'Entonces él tocó mi boca y dijo[a]: «He aquí, esto ha tocado tus labios; tu culpa es quitada, y tu pecado es expiado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu pecado es purgado». El verbo hebreo lleva fuerza de limpieza sacrificial y expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגַּע
  english_pob_choice: he touched
  chosen_spanish: me tocó
  alternatives_spanish:
  - me hizo tocar
  - tocó
  lexicon: HALOT
  rationale: נגע en este contexto describe el contacto directo del carbón encendido con la boca del profeta. En español, «tocó» comunica con naturalidad ese acto concreto sin añadir causalidad innecesaria.
- source_word: עַל פִּי
  english_pob_choice: my mouth
  chosen_spanish: la boca
  alternatives_spanish:
  - mi boca
  - sobre mi boca
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre mi boca», pero en español la construcción con objeto directo es la más natural después de «tocó». Se mantiene el sentido corporal preciso de פִּי.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: Como marcador discursivo de atención, הִנֵּה requiere una forma solemne pero clara. «He aquí» conserva la fuerza deíctica con tono bíblico sin ser arcaizante en exceso.
- source_word: נָגַע זֶה
  english_pob_choice: this has touched
  chosen_spanish: esto ha tocado
  alternatives_spanish:
  - esto tocó
  - esto ha llegado a tocar
  lexicon: HALOT
  rationale: Se preserva el demostrativo «esto» y el valor de acción recién completada con el pretérito perfecto compuesto, como en la lectura inglesa auditada.
- source_word: עַל שְׂפָתֶיךָ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tus labios
  lexicon: HALOT
  rationale: שְׂפָתַיִם es plural en hebreo y se refiere naturalmente a «labios». En español, «labios» mantiene mejor la forma plural y evita perder el matiz corporal del original.
- source_word: וְסָר
  english_pob_choice: is removed
  chosen_spanish: es quitada
  alternatives_spanish:
  - ha sido quitada
  - se aparta
  - es removida
  lexicon: HALOT
  rationale: סור expresa alejamiento o retirada. «Es quitada» reproduce la idea de eliminación/resultante sin forzar una teoría específica; además conserva el paralelismo con la cláusula final.
- source_word: עֲוֺנֶךָ
  english_pob_choice: your guilt
  chosen_spanish: tu culpa
  alternatives_spanish:
  - tu iniquidad
  - tu pecado
  lexicon: HALOT
  rationale: עָוֹן puede referirse a culpa, culpa penal o iniquidad. Aquí, en una escena de purificación, «culpa» comunica bien la carga moral y la responsabilidad removida, distinguiéndola de «tu pecado» en la línea siguiente.
- source_word: וְחַטָּאתְךָ
  english_pob_choice: your sin
  chosen_spanish: tu pecado
  alternatives_spanish:
  - tu falta
  - tu pecado
  lexicon: HALOT
  rationale: חַטָּאת en este contexto moral describe el pecado mismo, no una ofrenda por el pecado. «Pecado» es la equivalencia más directa y clara en español.
- source_word: תְּכֻפָּר
  english_pob_choice: is atoned for
  chosen_spanish: es expiado
  alternatives_spanish:
  - es purgado
  - es expiado
  - es perdonado
  lexicon: HALOT
  rationale: כפר en forma pasiva conlleva limpieza sacrificial/expiatoria. «Expiado» preserva mejor ese campo semántico culto-teológico que «perdonado», y evita reducir el verbo a una simple absolución.
theological_decisions:
- issue: Force sacrificial-purification of כפר in the final clause
  english_pob_reading: your sin is atoned for
  chosen_spanish_reading: tu pecado es expiado
  alternative_spanish_readings:
  - tu pecado es purgado
  - tu pecado es perdonado
  rationale: La escena no describe solo perdón judicial, sino purificación ritual en el marco del templo. «Expiado» mantiene la tensión cultual y la relación con el acto simbólico del carbón, sin convertirlo en una formulación doctrinal más estrecha.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de WLC y refleja el cierre revisado del audit trail inglés, pero en español se integró la clausula final sin nota porque se prefirió una formulación compacta y publicable que preserve el valor sacrificial de כפר mediante «expiado».
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo.
  - Se conserva la distinción entre «culpa» y «pecado» para reflejar עָוֹן y חַטָּאת.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - No se usa «Cristo/Mesías» porque no aplica al versículo.
