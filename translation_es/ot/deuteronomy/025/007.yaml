base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/025/007.yaml
  text: But if the man does not want to take his brother’s widow[a], then his brother’s widow shall go up to the gate, to the elders, and say, ‘My brother-in-law refuses to raise up a name for his brother in Israel[b]; he is not willing to perform the duty of a brother-in-law to me.’
  footnotes:
  - marker: a
    text: Or, more literally, 'to establish a name for his brother in Israel.' The idiom refers to preserving the deceased brother’s family line and standing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to brother-in-law me,' a technical expression for fulfilling the levirate duty by marrying a deceased brother’s widow.
    reason: cultural_note
