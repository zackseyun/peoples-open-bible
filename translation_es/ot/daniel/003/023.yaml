translation:
  language: es
  text: Y estos tres hombres—Sadrac, Mesac y Abed-nego—cayeron[a] atados en medio del horno ardiente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «fueron arrojados en medio del horno ardiente». El verbo arameo es simplemente «cayeron»; el contexto circundante explica que habían sido echados allí.'
    reason: lexical_alternative
  - marker: b
    text: La expresión aramea se refiere a un horno caracterizado por fuego abrasador o llameante. Otras versiones tradicionales suelen decir «el horno de fuego ardiente» o «el horno de fuego abrasador».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֻבְרַיָּא
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: HALOT
  rationale: El arameo designa aquí a individuos masculinos concretos; «hombres» es natural en español y conserva la referencia personal sin sobrecargar el texto.
- source_word: אִלֵּךְ
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - esos
  - aquellos
  lexicon: HALOT
  rationale: El demostrativo apunta a los tres ya identificados en el relato inmediato; «estos» reproduce mejor esa proximidad deíctica.
- source_word: תְּלָתֵּהוֹן
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - los tres
  - tres de ellos
  lexicon: HALOT
  rationale: Es el cardinal con sufijo de tercera persona plural; en español, «estos tres hombres» expresa de modo idiomático el sentido completo.
- source_word: שַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Sadrac, Mesac y Abednego
  lexicon: Transliteración tradicional española
  rationale: Se conservan los nombres propios en forma reconocible para lectores hispanohablantes, con adaptación gráfica habitual a Sadrac y Mesac.
- source_word: נְפַלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron arrojados
  - fueron lanzados
  lexicon: HALOT
  rationale: El verbo arameo es simplemente «caer»; aunque el contexto más amplio implica que fueron echados al horno, el texto de este versículo conserva el resultado como tal. «Cayeron» mantiene esa tensión sin explicitar en la línea principal lo que el verso no dice de forma directa.
- source_word: לְגוֹא
  english_pob_choice: into the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el interior de
  - dentro de
  lexicon: HALOT
  rationale: El sustantivo expresa el centro o interior. En español, «en medio de» conserva bien la imagen espacial que el inglés POB quiso resguardar.
- source_word: אַתּוּן
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - furnace
  - hornillo
  lexicon: HALOT
  rationale: En castellano bíblico y moderno, «horno» es la equivalencia natural para este gran recinto de fuego; «furnace» no es español y «hornillo» rebaja indebidamente la escena.
- source_word: נוּרָא יָקִדְתָּא
  english_pob_choice: the blazing furnace
  chosen_spanish: el horno de fuego ardiente
  alternatives_spanish:
  - el horno ardiente
  - el horno de fuego encendido
  lexicon: HALOT
  rationale: La expresión combina «fuego» con un adjetivo/participio de ardor o llama viva. «Horno de fuego ardiente» preserva la intensidad del original sin perder inteligibilidad; mantiene también la redundancia enfática propia del arameo, similar al audit trail inglés.
- source_word: מְכַפְּתִין
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - ligados
  - amarrados
  lexicon: HALOT
  rationale: El participio pasivo indica que estaban sujetos. «Atados» es claro, idiomático y suficientemente fiel; evita añadir detalles como «de pies y manos» que el término por sí solo no exige.
theological_decisions:
- issue: Relación entre «cayeron» y la acción previa de ser arrojados al horno
  english_pob_reading: The Aramaic verb itself is simply 'fell,' though the surrounding context explains that they had been cast in.
  chosen_spanish_reading: Se mantiene «cayeron» en el texto principal, con la acción de haber sido arrojados solo como implicación contextual.
  alternative_spanish_readings:
  - fueron arrojados
  - fueron echados
  rationale: La forma aramea no verbaliza aquí la acción del verdugo; introducirla en la línea principal debilitaría la precisión lexical. La traducción conserva la tensión narrativa y deja que el contexto inmediato explique lo ocurrido.
  doctrine_reference: Fidelidad textual y distinción entre contenido explícito e inferencia contextual
translation_notes:
  revision_awareness: Se revisó el equilibrio entre precisión lexical y fluidez en español. Se mantuvo la tensión del verbo principal («cayeron») según el audit trail inglés, y se evitó la fórmula arcaizante «horno de fuego ardiente» solo como repetición mecánica; aquí se conserva porque refleja bien la intensidad del arameo. No se detectaron revisiones posteriores que obligaran a cambiar el sentido base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - 'Los nombres propios babilónicos se adaptan a la ortografía española habitual: Sadrac, Mesac, Abed-nego.'
  - «Atados» corresponde al participio pasivo sin añadir especificaciones no presentes en el arameo.
  - Se preserva la imagen espacial de «en medio de» para לְגוֹא, en consonancia con el audit trail inglés.
