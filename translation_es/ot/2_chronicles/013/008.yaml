translation:
  language: es
  text: Y ahora ustedes dicen que son lo bastante fuertes para hacer frente al reino de Yahvé en manos de los hijos de David[a][b], porque son una gran multitud y tienen con ustedes los becerros de oro[c] que Jeroboam hizo para ustedes como dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes dicen que se mostrarán fuertes ante el reino de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en manos de los hijos de David», un modismo que indica administración o ejercicio de gobierno por la línea de David.'
    reason: source_note
  - marker: c
    text: 'O: «para dioses». El hebreo usa un plural, refiriéndose polémicamente a los ídolos de becerro de Jeroboam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים
  english_pob_choice: you are saying
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - ustedes dicen
  lexicon: HALOT
  rationale: El participio expresa una afirmación presente y retórica. «Dicen» comunica la fuerza discursiva sin convertirlo en intención interna ni en un futuro demasiado interpretativo.
- source_word: לְהִתְחַזֵּק
  english_pob_choice: that you are strong enough to stand against
  chosen_spanish: son lo bastante fuertes para hacer frente a
  alternatives_spanish:
  - se fortalecen para
  - se muestran fuertes ante
  - son capaces de resistir a
  lexicon: HALOT
  rationale: El hitpael aquí implica procurar o mostrarse fuerte en confrontación. «Hacer frente a» conserva el matiz adversativo y suena natural en español, sin diluir la idea de resistencia.
- source_word: לִפְנֵי
  english_pob_choice: to stand against
  chosen_spanish: hacer frente a
  alternatives_spanish:
  - delante de
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Aunque literalmente es «delante de / ante», en este contexto militar y polémico el sentido es confrontar. «Hacer frente a» expresa esa oposición sin perder el marco relacional del hebreo.
- source_word: מַמְלֶכֶת יְהוָה
  english_pob_choice: the kingdom of Yahweh
  chosen_spanish: el reino de Yahvé
  alternatives_spanish:
  - el reino de Yahvé
  - el reino de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la terminología del proyecto, y «reino» traduce con claridad מַמְלֶכֶת. La frase conserva la afirmación teológica de que el reino pertenece a Yahvé.
- source_word: בְּיַד בְּנֵי דָוִיד
  english_pob_choice: in the hand of the sons of David
  chosen_spanish: en manos de los hijos de David
  alternatives_spanish:
  - en la mano de los hijos de David
  - bajo el mando de los hijos de David
  - administrado por los hijos de David
  lexicon: HALOT
  rationale: 'Se conserva la imagen idiomática de «mano» como agencia o administración, pero se adapta a un plural natural en español: «en manos de». Así se preserva tanto el tropo como la legibilidad.'
- source_word: הָמוֹן רָב
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - muchísima gente
  - una gran muchedumbre
  - un gran número
  lexicon: HALOT
  rationale: La expresión subraya superioridad numérica. «Gran multitud» es la equivalencia más directa y elevada para el registro de este discurso.
- source_word: עֶגְלֵי זָהָב
  english_pob_choice: the golden calves
  chosen_spanish: los becerros de oro
  alternatives_spanish:
  - los terneros de oro
  - los becerros dorados
  - los toros de oro
  lexicon: HALOT
  rationale: «Becerros de oro» es la forma idiomática clara en español y reproduce el objeto cultual conocido. No se suaviza la carga polémica del hebreo.
- source_word: לֵאלֹהִים
  english_pob_choice: as gods
  chosen_spanish: como dioses
  alternatives_spanish:
  - para dioses
  - por dioses
  - como divinidades
  lexicon: HALOT
  rationale: El plural hebreo conserva la ironía/polemismo contra los ídolos de Jeroboam. «Como dioses» mantiene esa tensión mejor que una formulación más explicativa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto pide «Yahvé» en español. Se evita la sustitución por un título en mayúsculas para preservar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión teológica entre el reino de Yahvé y la mediación davídica
  english_pob_reading: the kingdom of Yahweh in the hand of the sons of David
  chosen_spanish_reading: el reino de Yahvé en manos de los hijos de David
  alternative_spanish_readings:
  - el reino de Yahvé bajo los hijos de David
  - el reino de Yahvé gobernado por los hijos de David
  rationale: 'La traducción conserva ambas afirmaciones del hebreo: el reino pertenece a Yahvé y, a la vez, está mediado por la casa de David. No se resuelve la tensión al reinterpretarla como simple gobierno humano.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Pluralidad de לֵאלֹהִים
  english_pob_reading: as gods
  chosen_spanish_reading: como dioses
  alternative_spanish_readings:
  - para dioses
  - como un dios
  rationale: Se mantiene el plural del hebreo, que en el contexto es irónico y polémico respecto de los becerros de Jeroboam. No se singulariza para no perder la crítica del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension in polemical idol texts'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al último pase, que quedó sin cambios. La redacción española mantiene el nombre divino como Yahvé, conserva la imagen idiomática de «en manos de» con adaptación fluida al español, y retiene la ambigüedad polémica de «como dioses» sin suavizarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el proyecto para יהוה.
  - Se prefirió «hijos de David» sobre una paráfrasis dinástica más explícita para conservar la imagen hebrea.
  - Se evitó «siervos» o «fieles» porque el verso no trata de servidumbre sino de dominio y confrontación.
  - Se mantuvo el plural «dioses» en la nota para no borrar la ironía del hebreo.
