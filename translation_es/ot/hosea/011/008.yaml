translation:
  language: es
  text: ¿Cómo podría dejarte, Efraín? ¿Cómo podría entregarte, Israel? ¿Cómo podría hacerte como Admá[a]? ¿Cómo podría hacerte como Zeboim[a]? Mi corazón se revuelve[b] dentro de mí; todas mis compasiones se conmueven[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Admá y Zeboim eran ciudades asociadas con la misma destrucción que Sodoma y Gomorra; la comparación evoca destrucción total (véase Deuteronomio 29:23).
    reason: cross_reference
  - marker: b
    text: 'O: "Mi corazón cambia dentro de mí". La imagen hebrea es más literalmente que el corazón de Dios se "revuelve" o se "voltea", expresando una fuerte agitación interior.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "toda mi piedad se enciende" / "mi compasión se calienta".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo podría
  alternatives_spanish:
  - ¿Cómo puedo
  - ¿Cómo podría yo
  lexicon: HALOT
  rationale: La pregunta expresa asombro y resistencia emotiva, no mera información sobre modo. '¿Cómo podría' conserva esa imposibilidad afectiva en un español natural y digno.
- source_word: אֶתֶּנְךָ
  english_pob_choice: give you up
  chosen_spanish: dejarte
  alternatives_spanish:
  - entregarte
  - darte por perdido
  lexicon: HALOT
  rationale: En este contexto judicial de juicio, 'dejarte' transmite la renuncia dolorosa a Israel sin sonar demasiado técnico ni endurecer la frase. Mantiene el pathos del verbo 'dar' como abandono/sujeción al juicio.
- source_word: אֲמַגֶּנְךָ
  english_pob_choice: hand you over
  chosen_spanish: entregarte
  alternatives_spanish:
  - ponerte en manos de
  - someterte
  lexicon: HALOT
  rationale: El paralelismo admite otro verbo de entrega. 'Entregarte' comunica de forma clara la acción de poner al pueblo bajo juicio, manteniendo la cercanía semántica con 'dejarte' sin repetir exactamente la misma construcción inglesa.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: Transliteración tradicional adaptada al español
  rationale: Se conserva el nombre propio como designación directa del reino del norte. 'Efraín' es la forma más reconocible y readable en español bíblico moderno.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Transliteración tradicional
  rationale: Nombre propio conservado, en paralelo con Efraín, como designación del pueblo/reino.
- source_word: כְאַדְמָה
  english_pob_choice: like Admah
  chosen_spanish: como Admá
  alternatives_spanish:
  - como Admah
  lexicon: HALOT
  rationale: Se mantiene el topónimo para conservar la alusión a destrucción total. 'Admá' respeta mejor la adaptación al español y sigue siendo reconocible.
- source_word: אֲשִׂימְךָ
  english_pob_choice: make you
  chosen_spanish: hacerte
  alternatives_spanish:
  - ponerte
  - convertirte en
  lexicon: HALOT
  rationale: El hebreo expresa causar que Israel sea como esas ciudades; 'hacerte' permite una construcción natural en español con el complemento comparativo siguiente.
- source_word: כִּצְבֹאיִם
  english_pob_choice: like Zeboiim
  chosen_spanish: como Zeboim
  alternatives_spanish:
  - como Seboim
  - como Zeboiim
  lexicon: HALOT
  rationale: Se preserva el topónimo para mantener la referencia a las ciudades destruidas junto con Admá. La forma 'Zeboim' es la transliteración española más transparente y cercana al texto fuente.
- source_word: נֶהְפַּךְ עָלַי לִבִּי
  english_pob_choice: My heart is turned over within me
  chosen_spanish: Mi corazón se revuelve dentro de mí
  alternatives_spanish:
  - Mi corazón se vuelve en mí
  - Mi corazón se trastorna dentro de mí
  lexicon: HALOT
  rationale: El hebreo usa una imagen fuerte de voltearse/volverse. 'Se revuelve' conserva el movimiento interno y la conmoción visceral sin aplanarlo a una mera 'cambio de opinión'.
- source_word: יַחַד
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas juntas
  - entera
  lexicon: HALOT
  rationale: En español, el adverbio 'juntas' resultaría menos natural con el sustantivo abstracto. 'Todas' comunica la totalidad de las compasiones en plural y mantiene la fuerza colectiva del hebreo.
- source_word: נִכְמְרוּ
  english_pob_choice: are stirred
  chosen_spanish: se encienden
  alternatives_spanish:
  - se conmueven
  - se agitan
  - se calientan
  lexicon: HALOT
  rationale: El verbo puede sugerir calor emocional o estar avivado. 'Se encienden' preserva la metáfora afectiva y expresa bien la intensidad de la compasión en español contemporáneo.
- source_word: נִחוּמָי
  english_pob_choice: my compassions
  chosen_spanish: mis compasiones
  alternatives_spanish:
  - mi compasión
  - mi misericordia
  - mis misericordias
  lexicon: HALOT
  rationale: El plural hebreo con sufijo sugiere plenitud afectiva. 'Compasiones' mantiene ese plural y la carga de misericordia entrañable que el contexto requiere.
theological_decisions:
- issue: Lenguaje antropopático aplicado a Dios
  english_pob_reading: Retain the vivid language of God's heart being turned and his compassions being stirred
  chosen_spanish_reading: Retener el corazón que se revuelve y las compasiones que se encienden
  alternative_spanish_readings:
  - Mi opinión cambia
  - He decidido perdonarlos
  rationale: El hebreo presenta a Dios con lenguaje visceral para expresar la tensión entre juicio y misericordia. La traducción conserva esa tensión en lugar de abstraerla o explicarla demasiado.
  doctrine_reference: Translation philosophy §3
- issue: Alusión a Admá y Zeboim como ciudades destruidas
  english_pob_reading: Preserve the place names in the main text
  chosen_spanish_reading: Preservar los topónimos en el texto principal
  alternative_spanish_readings:
  - Hacerte como las ciudades destruidas
  - Hacerte como Sodoma y Gomorra
  rationale: El texto nombra esas ciudades específicas para evocar juicio devastador. Mantener los nombres respeta la intertextualidad y evita sustituir la alusión por una explicación interpretativa en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se corrigió la validación asegurando que cada marcador de nota al pie aparezca exactamente en el texto español. Se mantuvo la decisión de preservar los topónimos y el lenguaje antropopático con una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se usó 'Efraín' e 'Israel' como nombres propios directos, en paralelo al hebreo.
  - Se preservó la tensión entre juicio y compasión sin suavizarla doctrinalmente.
  - Se eligió 'compasiones' en plural para reflejar el plural hebreo נִחוּמָי y su plenitud afectiva.
  - Los marcadores [a], [b] y [c] aparecen exactamente junto a las palabras o frases a las que remiten.
