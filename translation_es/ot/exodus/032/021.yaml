review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: la pregunta de Moisés, el tono de reproche, «este pueblo», y la imputación directa a Aarón por haber traído «un gran pecado». Sin embargo, la decisión de mantener «sobre él» en el texto principal, aunque defendible morfológicamente, suena menos natural en español y oscurece el sentido colectivo que el propio expediente inglés considera el sentido normal. En español, «sobre ellos» preserva mejor el referente semántico de «el pueblo» sin perder fidelidad, y la alternativa singular puede quedar en nota.'
  spanish_quality_summary: El español es claro y digno, pero la nota [a] sobre «Aarón» no añade valor traductológico para este versículo y distrae. Además, «sobre él» resulta algo rígido y potencialmente confuso para lectores comunes. Cambiar a «sobre ellos» mejora la legibilidad y la naturalidad eclesial sin paráfrasis indebida.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Moisés», «Aarón», «pecado» y la sintaxis general son adecuadas. La principal cuestión es pronominal: en español conviene priorizar el sentido colectivo con «ellos», dejando «él» como alternativa literal en nota.'
  issues:
  - severity: medium
    issue: Pronombre principal «sobre él» suena poco natural y puede confundir el referente.
    rationale: Aunque עָלָיו es singular formal y puede referirse colectivamente a «el pueblo», el expediente inglés ya documenta que el sentido normal es plural. En español bíblico corriente, «sobre ellos» comunica mejor el referente sin traicionar el hebreo.
  - severity: low
    issue: La nota [a] sobre «Aarón» es innecesaria.
    rationale: No responde a una ambigüedad del texto fuente ni preserva una alternativa significativa. El nombre propio ya es normal y transparente en español.
  revised_spanish_text: 'Moisés dijo a Aarón: «¿Qué te hizo este pueblo, que has traído sobre ellos[a] un gran pecado?»'
  revised_footnotes:
  - marker: a
    text: 'El hebreo usa un pronombre singular («sobre él» o «sobre ello») referido colectivamente a «el pueblo». En español se expresa más naturalmente con el sentido plural: «sobre ellos».'
    reason: lexical_alternative
