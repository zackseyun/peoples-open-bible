revisions:
- from: Todos los que te conocen entre los pueblos se horrorizan de ti[a]; te has vuelto un espanto[b], y ya no existes para siempre.
  to: Todos los que te conocen entre los pueblos quedan horrorizados ante ti[a]; te has vuelto un espanto[b], y no existirás más jamás.
  rationale: Se ajusta «se horrorizan de ti» a «quedan horrorizados ante ti» para un español más natural que preserve el valor de reacción atónita ante el juicio. Se reemplaza «ya no existes para siempre» por «no existirás más jamás» para reflejar mejor la fuerza de desaparición irreversible auditada en el POB, con mejor idiomaticidad en español moderno y sin sobreinterpretar doctrinalmente el texto.
