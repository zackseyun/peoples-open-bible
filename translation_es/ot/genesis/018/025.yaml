revisions:
- from: 'Lejos de ti hacer tal cosa: matar al justo con el impío, de modo que el justo sea como el impío. ¡Lejos de ti![a] ¿No hará justicia el Juez de toda la tierra?'
  to: 'Lejos de ti hacer tal cosa: dar muerte al justo junto con el impío, de modo que el justo sea como el impío. ¡Lejos de ti! ¿No hará justicia[a] el Juez de toda la tierra?'
  rationale: Se ajusta «matar» a «dar muerte» para reflejar mejor לְהָמִית y la decisión léxica documentada en inglés; se cambia «con» por «junto con» para mayor claridad semántica; y se reubica la nota en la cláusula final, que es donde corresponde la alternativa de מִשְׁפָּט.
