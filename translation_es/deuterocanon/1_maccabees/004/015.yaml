translation:
  language: es
  text: Pero todos los de la retaguardia cayeron a espada, y los persiguieron hasta Gazara[a] y hasta las llanuras de Judea, Azoto[b] y Jamnia[b], y de ellos cayeron unos tres mil[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gazara es la forma griega del topónimo, comúnmente identificada con Gezer.
    reason: cross_reference
  - marker: b
    text: Azoto corresponde a la forma griega de Asdod; Jamnia suele identificarse con Jabné/Yavne.
    reason: cross_reference
  - marker: c
    text: 'O: «cayeron de ellos unos tres mil hombres». El griego expresa mediante un giro idiomático el número de los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἔσχατοι πάντες
  english_pob_choice: all the rear guard
  chosen_spanish: todos los de la retaguardia
  alternatives_spanish:
  - todos los últimos
  - todos los de atrás
  - toda la retaguardia
  lexicon: LSJ
  rationale: ἔσχατοι aquí designa a los que iban al final de la formación militar. En español, «retaguardia» comunica con claridad el sentido táctico sin perder la referencia al grupo que iba al último.
- source_word: ἔπεσαν ἐν ῥομφαίᾳ
  english_pob_choice: fell by the sword
  chosen_spanish: cayeron a espada
  alternatives_spanish:
  - cayeron por la espada
  - fueron derribados a espada
  - cayeron con la espada
  lexicon: LSJ
  rationale: La frase es un modismo bélico para muerte en combate. «A espada» conserva la imagen sin sonar forzado en español bíblico contemporáneo.
- source_word: ἐδίωξαν
  english_pob_choice: they pursued
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los siguieron persiguiendo
  - los acosaron
  - los fueron persiguiendo
  lexicon: LSJ
  rationale: El verbo expresa persecución militar en un contexto de batalla. «Persiguieron» es directo y suficientemente preciso.
- source_word: ἕως Γαζήρων
  english_pob_choice: as far as Gazara
  chosen_spanish: hasta Gazara
  alternatives_spanish:
  - hasta Gezer
  - hasta Gaza
  lexicon: LSJ
  rationale: Se conserva la forma griega transliterada «Gazara», conforme al criterio del proyecto para topónimos antiguos. La identificación con Gezer queda implícita y puede anotarse aparte.
- source_word: τῶν πεδίων τῆς Ἰουδαίας
  english_pob_choice: the plains of Judea
  chosen_spanish: las llanuras de Judea
  alternatives_spanish:
  - las llanuras de la Judea
  - los llanos de Judea
  - las planicies de Judea
  lexicon: LSJ
  rationale: πεδίον denota una llanura o zona llana. «Llanuras» es natural en español y conserva el sentido geográfico.
- source_word: Ἀζώτου
  english_pob_choice: Azotus
  chosen_spanish: Azoto
  alternatives_spanish:
  - Azotus
  lexicon: LSJ
  rationale: El griego presenta la forma Ἄζωτος, que en español bíblico puede rendirse como «Azoto». Mantiene el valor transliterado y resulta más natural que la forma grecolatina para lectores hispanos.
- source_word: Ἰαννείας
  english_pob_choice: Jamnia
  chosen_spanish: Jamnia
  alternatives_spanish:
  - Jabne
  - Jabnia
  - Janneia
  lexicon: LSJ
  rationale: Se sigue la transliteración tradicional de la forma griega, «Jamnia», ampliamente reconocible en español. Evita retrovertir innecesariamente al hebreo.
- source_word: ἔπεσαν ἐξ αὐτῶν εἰς ἄνδρας τρισχιλίους
  english_pob_choice: about three thousand of them fell
  chosen_spanish: cayeron de ellos unos tres mil
  alternatives_spanish:
  - cayeron de ellos aproximadamente tres mil hombres
  - unos tres mil de ellos cayeron
  - cayeron de entre ellos unos tres mil hombres
  lexicon: LSJ
  rationale: El giro griego expresa el número de los caídos, con valor aproximado o conteo de hombres. «Unos tres mil» refleja bien esa cuantificación sin introducir precisión no requerida.
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al texto griego de Swete y al audit trail inglés. No se detectaron cambios sustanciales respecto del sentido: se preservó la secuencia militar, la transliteración de topónimos y el valor idiomático de la cifra final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo no contiene el nombre divino.
  - Se prefirió «Gazara», «Azoto» y «Jamnia» por coherencia con la transliteración de topónimos del proyecto.
  - Se evitó «SEÑOR» o equivalentes no presentes en el original.
  - Se conservó el tono narrativo militar breve y directo del griego.
