translation:
  language: es
  text: Y cruzó el Éufrates y atravesó Mesopotamia, y derribó[a] todas las ciudades altas junto al torrente Abrona[b], hasta llegar al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'abrió brecha en todas las ciudades altas'; el verbo griego literalmente significa 'cavar a través de' y puede describir abrir brecha o destruir ciudades en una campaña militar.
    reason: lexical_alternative
  - marker: b
    text: El nombre 'Abrona' aparece transliterado en griego; su identificación geográfica exacta es incierta.
    reason: cultural_note
lexical_decisions:
- source_word: παρῆλθεν
  english_pob_choice: crossed
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - atravesó
  lexicon: LSJ
  rationale: En español, con el objeto directo 'el Éufrates', 'pasó' comunica el tránsito por el río sin forzar una imagen más específica que el griego no exige. 'Cruzó' y 'atravesó' también son posibles; se eligió una forma sobria y natural en contexto narrativo.
- source_word: διῆλθεν
  english_pob_choice: passed through
  chosen_spanish: atravesó
  alternatives_spanish:
  - pasó por
  - recorrió
  lexicon: LSJ
  rationale: El verbo indica movimiento a través de una región. 'Atravesó Mesopotamia' conserva la dirección del recorrido con naturalidad en español y evita un calco pesado.
- source_word: διέσκαψε
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - derrumbó
  - derribó y arrasó
  lexicon: LSJ
  rationale: El griego literalmente sugiere 'excavar' o 'abrir paso por medio de destrucción', pero el contexto militar favorece la idea de demoler ciudades. 'Derribó' preserva el valor de demolición adoptado por la revisión inglesa sin exagerar más allá del texto.
- source_word: πόλεις τὰς ὑψηλάς
  english_pob_choice: the high cities
  chosen_spanish: las ciudades altas
  alternatives_spanish:
  - las ciudades elevadas
  - las ciudades de altura
  - las ciudades fortificadas
  lexicon: LSJ
  rationale: Se mantiene el adjetivo literal 'altas' para no introducir 'fortificadas' sin base explícita. En español, 'ciudades altas' suena algo marcado, pero reproduce la forma del griego y deja abierta la posible referencia topográfica.
- source_word: χειμάρρου
  english_pob_choice: torrent
  chosen_spanish: torrente
  alternatives_spanish:
  - arroyo estacional
  - wadi
  - torrente de invierno
  lexicon: LSJ
  rationale: '''Torrente'' comunica bien en español la idea de un cauce impetuoso o estacional y funciona como equivalente compacto para el término griego en este contexto geográfico-militar.'
- source_word: Ἀβρωνᾶ
  english_pob_choice: Abrona
  chosen_spanish: Abrona
  alternatives_spanish:
  - Abronas
  - el torrente Abrona
  lexicon: transliteración
  rationale: Se conserva el nombre transliterado sin adaptar, como en el texto inglés, porque la identificación geográfica es incierta y el griego lo presenta como topónimo propio.
- source_word: ἕως τοῦ ἐλθεῖν ἐπὶ θάλασσαν
  english_pob_choice: until he came to the sea
  chosen_spanish: hasta llegar al mar
  alternatives_spanish:
  - hasta que llegó al mar
  - hasta venir al mar
  lexicon: LSJ
  rationale: La construcción final expresa límite de recorrido. 'Hasta llegar al mar' es idiomática en español y preserva la meta espacial sin añadir matices no presentes.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'tore down' frente a 'dug through' para διέσκαψε. Por eso el español adopta 'derribó', evitando una imagen de excavación literal que no encaja bien con ciudades en contexto militar.
  spanish_consistency_notes:
  - Se mantuvo 'Mesopotamia' sin artículo, como nombre propio regional.
  - '''Y'' al inicio conserva la coordinación narrativa del original.'
  - No se introdujo vocabulario eclesiástico no presente en el griego; se mantuvo un registro bíblico sobrio y transparente.
