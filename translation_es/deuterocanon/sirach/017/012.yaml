translation:
  language: es
  text: Sus ojos vieron una gloria majestuosa[a], y sus oídos oyeron la gloria de su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «sus oídos oyeron la gloria de su voz», literalmente «la gloria de la voz de ellos». El texto transmitido es difícil; aquí se adopta en contexto el sentido de la voz de Dios.'
    reason: textual_variant
lexical_decisions:
- source_word: μεγαλεῖον
  english_pob_choice: majestic
  chosen_spanish: majestuosa
  alternatives_spanish:
  - grande
  - magnífica
  - majestad
  lexicon: LSJ
  rationale: El griego usa un adjetivo que intensifica δόξα y expresa grandeza o esplendor imponente. «Majestuosa» conserva esa elevación en español sin volver la frase demasiado abstracta.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: LSJ
  rationale: Aquí δόξα indica resplandor o magnificencia manifiesta. «Gloria» es el equivalente bíblico más natural y mantiene el paralelismo del versículo.
- source_word: εἶδον
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - divisaron
  lexicon: LSJ
  rationale: Es un pasado simple de percepción visual. «Vieron» es directo, claro y fiel al valor básico del verbo.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - ellos
  - sus miradas
  lexicon: LSJ
  rationale: El griego nombra explícitamente los ojos, y conviene conservar el paralelismo corporal con «sus oídos».
- source_word: δόξαν φωνῆς αὐτῶν
  english_pob_choice: the glory of his voice
  chosen_spanish: la gloria de su voz
  alternatives_spanish:
  - el glorioso sonido de su voz
  - la gloria de su voz
  lexicon: LSJ
  rationale: El texto griego transmitido es difícil y tiene una tensión posesiva. En español se mantiene «la gloria de su voz» para reflejar la decisión contextual del POB inglés, donde el referente coherente es Dios, sin ocultar en notas la dificultad textual.
- source_word: ἤκουσεν τὸ οὖς αὐτῶν
  english_pob_choice: their ears heard
  chosen_spanish: sus oídos escucharon
  alternatives_spanish:
  - sus oídos oyeron
  - su oído escuchó
  lexicon: LSJ
  rationale: Aunque el griego tiene singular «oído», el español idiomático prefiere plural en el paralelismo con «sus ojos». «Escucharon» conserva el acto auditivo con un matiz un poco más elevado que «oyeron».
theological_decisions:
- issue: Posesivo en la cláusula de la voz
  english_pob_reading: their ears heard the glory of his voice
  chosen_spanish_reading: sus oídos escucharon la gloria de su voz
  alternative_spanish_readings:
  - sus oídos escucharon la gloria de su voz
  - sus oídos escucharon la gloria de su voz
  rationale: 'El griego de transmisión presenta una lectura difícil y probablemente problemática en el posesivo de la segunda mitad del versículo. Siguiendo la audacia auditada del POB inglés, la traducción española adopta el sentido contextual más coherente: la voz es la de Dios. No se elimina la tensión del texto; se preserva en nota.'
  doctrine_reference: Mantener honestidad textual ante una lectura difícil; no suavizar la variante transmitida.
translation_notes:
  revision_awareness: Se siguió el contexto auditado del POB inglés, que señala una dificultad textual real en la cláusula final y opta por el sentido de la voz divina en el contexto. No hubo revisiones posteriores que alteraran esa decisión.
  spanish_consistency_notes:
  - Se mantuvo «gloria» de manera consistente para δόξα.
  - Se preservó el paralelismo corporal ojos/oídos, sin reducirlo a un sujeto general.
  - Se evitó introducir «Cristo» o terminología ajena al versículo.
  - El posesivo de la cláusula final se dejó en una forma española natural, pero la nota aclara la dificultad del griego transmitido.
