review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: contrasta a la esposa ideal como honor para su marido con la esposa que causa vergüenza como corrupción interior profunda. Conserva correctamente la metáfora de la corona y la imagen de podredumbre en los huesos. Sin embargo, hay dos desajustes menores con la evidencia y el rastro POB: (1) אֵשֶׁת está mejor como ''esposa'' aquí, no ''mujer'', porque el propio verso explicita la relación marital; (2) la nota [a] no corresponde a una alternativa preservada por el inglés y más bien explica una metáfora ya clara en español, mientras que falta la nota léxica sobre חַיִל que sí está documentada en el POB inglés.'
  spanish_quality_summary: El español es claro, digno y legible. 'La que avergüenza' suena natural y conserva bien el participio causativo. 'Podredumbre en sus huesos' es idiomático y vívido. La mejora principal es usar 'esposa' para hacer explícito el valor marital de אֵשֶׁת y ajustar las notas para reflejar mejor la justificación léxica documentada.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. La decisión clave es léxica: חַיִל debe seguir reflejando amplitud semántica; ''noble carácter'' funciona bien en español si se conserva una nota con alternativas como ''capaz'', ''valiente'' o ''excelente''.'
  issues:
  - severity: medium
    issue: '''La mujer de noble carácter'' debilita el sentido marital explícito de אֵשֶׁת en este contexto.'
    rationale: Aunque 'mujer' puede ser posible en abstracto, el verso mismo añade 'su marido', por lo que 'esposa' preserva mejor la especificidad contextual señalada también en la auditoría inglesa.
  - severity: medium
    issue: La nota [a] actual no refleja la nota léxica principal preservada por el POB inglés sobre חַיִל.
    rationale: El inglés documenta alternativas para חַיִל ('capable', 'valiant', 'excellent'). En español conviene trasladar esa amplitud semántica en nota; en cambio, explicar 'corona de su marido' como metáfora es menos necesario y no corresponde al pie léxico principal.
  - severity: low
    issue: El anclaje y contenido de notas puede simplificarse para evitar sobreanotar lo evidente.
    rationale: La imagen de 'corona de su marido' ya es clara en español. La nota útil es la alternativa léxica de 'noble carácter'; la nota sobre 'podredumbre en sus huesos' sí añade valor como explicación figurada.
