theological_decisions:
- issue: Sense of 'return' in the verse
  chosen_reading: Maintain 'return' in both clauses, allowing both geographic and covenantal resonance.
  alternative_readings:
  - Use 'go back' in the first clause and 'repent' in the last clause
  rationale: Hosea often exploits שוב for both literal return and spiritual turning. Preserving the same English term keeps the rhetorical and theological tension rather than resolving it into two different ideas.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Referent of the plural verb 'they have refused'
  chosen_reading: Translate with plural 'they' while leaving the antecedent implicit as Israel/the people.
  alternative_readings:
  - Paraphrase as 'for my people have refused'
  rationale: The Hebrew verb is 3cp without an explicit subject in this clause. Supplying 'my people' would import nearby context into the verse rather than translate the wording directly.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants.'
