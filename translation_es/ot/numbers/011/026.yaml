translation:
  language: es
  text: Pero dos hombres se quedaron en el campamento. El nombre del uno era Eldad, y el nombre del segundo era Medad. Y el Espíritu reposó sobre ellos; ellos estaban entre los registrados[a], pero no habían salido a la tienda[b], y profetizaron en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "entre los inscritos". El hebreo dice literalmente que estaban "entre los escritos/registrados".'
    reason: lexical_alternative
  - marker: b
    text: Es decir, probablemente la tienda de reunión en el contexto de este episodio.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּשָּׁאֲרוּ
  english_pob_choice: remained
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se quedaron atrás
  lexicon: HALOT
  rationale: שׁאר expresa quedar o permanecer. En español, 'se quedaron' suena natural y conserva la idea narrativa de que no avanzaron con el grupo, sin añadir causa.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento de Israel
  - en el campamento
  lexicon: HALOT
  rationale: מַחֲנֶה designa el campamento del pueblo. 'Campamento' es claro y natural en español; la referencia a Israel se sobreentiende por el contexto inmediato.
- source_word: שְׁנֵי אֲנָשִׁים
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  - dos personas
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural. 'Hombres' preserva la concordancia de género y el sentido normal del hebreo.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הַשֵּׁנִי
  english_pob_choice: The name of the one ... and the name of the second
  chosen_spanish: El nombre del uno ... y el nombre del segundo
  alternatives_spanish:
  - Uno se llamaba ... y el otro ...
  - El nombre de uno ... y el del segundo
  lexicon: HALOT
  rationale: La fórmula hebrea se mantiene de cerca. 'El segundo' reproduce הַשֵּׁנִי sin convertirlo en una paráfrasis más libre.
- source_word: אֶלְדָּד / מֵידָד
  english_pob_choice: Eldad / Medad
  chosen_spanish: Eldad / Medad
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estándar.
- source_word: וַתָּנַח עֲלֵיהֶם הָרוּחַ
  english_pob_choice: the Spirit rested on them
  chosen_spanish: el Espíritu reposó sobre ellos
  alternatives_spanish:
  - el espíritu reposó sobre ellos
  - el Espíritu se posó sobre ellos
  lexicon: HALOT
  rationale: רוּחַ aquí es el Espíritu divino que capacita para profetizar; por eso se capitaliza. נוח en esta forma comunica reposo o asentarse, y 'reposó sobre' es fiel y natural.
- source_word: וְהֵמָּה בַּכְּתֻבִים
  english_pob_choice: they were among those recorded
  chosen_spanish: ellos estaban entre los registrados
  alternatives_spanish:
  - ellos estaban entre los inscritos
  - ellos estaban entre los anotados
  lexicon: HALOT
  rationale: כְּתֻבִים literalmente apunta a los escritos/registrados. 'Registrados' conserva la idea de pertenencia a una lista sin volverlo demasiado literal ni interpretarlo como 'escritos'.
- source_word: וְלֹא יָצְאוּ הָאֹהֱלָה
  english_pob_choice: they had not gone out to the tent
  chosen_spanish: pero no habían salido a la tienda
  alternatives_spanish:
  - pero no habían salido al tabernáculo
  - pero no habían ido a la tienda
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'la tienda' con dirección hacia ella. 'Tienda' mantiene el sustantivo del texto; no se explicita 'de reunión' en el cuerpo principal para no añadir palabras no presentes.
- source_word: וַיִּתְנַבְּאוּ
  english_pob_choice: they prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - comenzaron a profetizar
  - pronunciaron profecía
  lexicon: HALOT
  rationale: נבא aquí indica actividad profética. 'Profetizaron' es directo y suficientemente amplio para el acto descrito.
theological_decisions:
- issue: Cómo traducir הָרוּחַ
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: El contexto inmediato habla del empoderamiento profético concedido por Dios; por eso se entiende como el Espíritu divino y no como un viento o un espíritu indefinido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si hacer explícito 'la tienda' como 'tienda de reunión'
  english_pob_reading: the tent
  chosen_spanish_reading: la tienda
  alternative_spanish_readings:
  - la tienda de reunión
  - el tabernáculo
  rationale: El hebreo de este versículo dice solamente 'la tienda'. La identificación con la tienda de reunión pertenece al contexto, pero no debe reemplazar el término presente en el texto principal sin necesidad.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente indicado como sin cambios, con alta concordancia general (0.95) y solo observaciones menores. Se conservan las tensiones léxicas relevantes: ''רוּחַ'' como Espíritu, ''כְּתֻבִים'' como registrados, y ''הָאֹהֱלָה'' como tienda sin expandir el término principal.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se usó 'Espíritu' con mayúscula por el contexto de empoderamiento profético.
  - '''Tienda'' se mantuvo sin añadir ''de reunión'' en el texto principal; esa aclaración quedó en nota.'
  - '''Registrados'' conserva la imagen de pertenencia a una lista y evita una paráfrasis más fuerte como ''inscritos'' o ''anotados''.'
