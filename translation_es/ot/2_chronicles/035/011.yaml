translation:
  language: es
  text: Y sacrificaron el sacrificio de la Pascua[a], y los sacerdotes rociaron la sangre, recibiéndola de sus manos[b], mientras los levitas los desollaban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cordero de la Pascua». El hebreo se refiere a la víctima pascual que era inmolada.
    reason: lexical_alternative
  - marker: b
    text: El verbo puede traducirse también «asperjaron». Es el término sacrificial habitual para la aplicación ritual de la sangre en el altar; «de sus manos» indica que la recibían de quienes habían sacrificado.
    reason: lexical_alternative
  - marker: c
    text: Es decir, los levitas les quitaban el cuero a los animales sacrificados.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: degollaron
  alternatives_spanish:
  - sacrificaron
  - inmolaron
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico para matar animales sacrificiales. En español, «degollar» comunica con precisión la acción de sacrificar una víctima ritual y conserva el valor sacrificial mejor que un «matar» genérico. «Inmolar» es posible, pero menos transparente para lectura pública.
- source_word: הַפָּסַח
  english_pob_choice: the Passover lamb
  chosen_spanish: el sacrificio de la Pascua
  alternatives_spanish:
  - el cordero de la Pascua
  - la ofrenda de la Pascua
  lexicon: HALOT
  rationale: Aquí פֶּסַח no señala meramente la fiesta, sino la víctima pascual. En español, «sacrificio de la Pascua» conserva esa referencia cultual sin obligar a decidir por «cordero» cuando el hebreo no lo explicita en este versículo. Se mantiene la tensión documentada entre víctima pascual y ofrenda.
- source_word: וַיִּזְרְקוּ
  english_pob_choice: splashed
  chosen_spanish: rociaban
  alternatives_spanish:
  - asperjaban
  - salpicaban
  lexicon: HALOT
  rationale: זרק en contexto sacrificial describe la aplicación ritual de la sangre. «Rociaban» es un término español natural y suficientemente técnico para el acto sacerdotal; «asperjaban» es más literal pero menos común; «salpicaban» suena demasiado coloquial.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los cohanes
  lexicon: HALOT
  rationale: כהנים corresponde al oficio cultual estándar. «Sacerdotes» es la equivalencia normal y clara en español bíblico.
- source_word: מִיָּדָם
  english_pob_choice: from their hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - desde sus manos
  - de mano de ellos
  lexicon: HALOT
  rationale: La construcción preserva el valor locativo/instrumental del hebreo. En español, «de sus manos» mantiene la imagen de la acción transmitida por la mano sin forzar una explicación interpretativa en el texto principal.
- source_word: וְהַלְוִיִּם
  english_pob_choice: while the Levites
  chosen_spanish: mientras los levitas
  alternatives_spanish:
  - y los levitas
  lexicon: HALOT
  rationale: La conjunción narrativa marca simultaneidad. «Mientras» expresa mejor que «y» que la acción de los levitas ocurría al mismo tiempo.
- source_word: מַפְשִׁיטִים
  english_pob_choice: were skinning them
  chosen_spanish: les quitaban las pieles
  alternatives_spanish:
  - los desollaban
  - les arrancaban la piel
  lexicon: HALOT
  rationale: El participio de פשט, en contexto sacrificial, alude a retirar el cuero de la víctima. «Les quitaban las pieles» es claro en español y evita un calco rígido. «Desollaban» es más técnico, pero puede sonar más áspero o ambiguo fuera de contexto.
theological_decisions:
- issue: Naturaleza de la víctima pascual
  english_pob_reading: Passover lamb refers to the Passover sacrificial victim, not merely the festival.
  chosen_spanish_reading: «el sacrificio de la Pascua» preserva que se trata de la víctima/acto sacrificial pascual, no solo de la festividad.
  alternative_spanish_readings:
  - «el cordero de la Pascua»
  - «la Pascua»
  rationale: El hebreo permite ver la referencia cultual concreta. Traducirlo como «la Pascua» o solo como «cordero» puede oscurecer el matiz ritual; «sacrificio de la Pascua» sostiene la ambigüedad responsable entre víctima y acto sacrificial.
  doctrine_reference: Éxodo 12; 2 Crónicas 35
- issue: Aplicación ritual de la sangre
  english_pob_reading: '''splashed'' renders the standard sacrificial term for applying blood at the altar; ''sprinkled'' is also possible in tradition.'
  chosen_spanish_reading: «rociaban la sangre» comunica la aplicación ritual de la sangre en lenguaje español comprensible sin perder el sentido cultual.
  alternative_spanish_readings:
  - «asperjaban la sangre»
  - «esparcían la sangre»
  rationale: No se trata de un gesto casual, sino de un acto litúrgico. «Rociar» conserva la idea de dispersión/aplicación ritual y evita una imagen demasiado doméstica.
  doctrine_reference: Levítico 1–7; Hebreos 9
- issue: Función concurrente de los levitas
  english_pob_reading: while the Levites were skinning them.
  chosen_spanish_reading: «mientras los levitas les quitaban las pieles» expresa simultaneidad y la acción de desollar sin introducir un objeto explícito que el hebreo deja implícito.
  alternative_spanish_readings:
  - «y los levitas los desollaban»
  - «mientras los levitas los despojaban de la piel»
  rationale: El hebreo omite el objeto explícito; la solución española conserva la elipsis de manera natural. «Les quitaban las pieles» evita reificar innecesariamente el sustantivo y sigue de cerca el sentido funcional del participio.
  doctrine_reference: 2 Crónicas 35:11
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo WLC y se comprobó el audit trail inglés: la víctima pascual se entiende como sacrificio/víctima, זרק como aplicación ritual de la sangre y מַפְשִׁיטִים como desollar/retirar las pieles. También se preservó la simultaneidad marcada por וְ con «mientras», sin depender mecánicamente de la redacción inglesa.'
  spanish_consistency_notes:
  - Se usó «Pascua» con mayúscula al tratarse del nombre festivo/cultual.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se mantuvo un registro culto pero natural para lectura eclesial.
  - Se respetó la elipsis del objeto en el último hemistiquio, como en el hebreo.
