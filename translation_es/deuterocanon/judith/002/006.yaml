- from: Y saldrás a enfrentarte a toda la tierra hacia el oeste[a], porque desobedecieron la palabra de mi boca[b].
  to: Y saldrás al encuentro de toda la tierra hacia el oeste[a], porque desobedecieron la palabra de mi boca[b].
  rationale: Se reemplazó «a enfrentarte» por «al encuentro de» para reflejar con mayor fidelidad el modismo griego εἰς συνάντησιν y la decisión auditada en inglés de no explicitar el matiz hostil más allá de lo que el contexto ya aporta. Se mantuvieron las notas y el resto de la redacción por ser fieles y naturales.
