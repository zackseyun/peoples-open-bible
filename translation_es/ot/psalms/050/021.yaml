  glossary_alignment: No hay conflictos con la terminología base del proyecto. «reprenderé» para אוֹכִיחֲךָ y «el caso» para la fuerza forense implícita de וְאֶעֶרְכָה están bien alineados con el rastro auditado. La excepción principal es estilística y contextual en la cláusula sobre «como tú», no terminológica.
