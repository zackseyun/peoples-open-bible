review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: los filisteos oyen de la unción de David, suben todos para buscarlo, David se entera y baja a la מצודה. Sin embargo, la nota al pie no preserva bien la lógica de alternativa del inglés: en el texto principal ya se usa «fortaleza», pero la nota dice «O “la fortaleza”», lo cual resulta redundante y no comunica la alternativa léxica «stronghold/fortress».'
  spanish_quality_summary: El español es claro y digno. «Como rey sobre Israel» suena natural, y «subieron todos los filisteos» mantiene bien el énfasis. La puntuación con punto y coma es aceptable. El principal problema es la nota; además, «fortaleza» en el texto principal es defendible, pero «baluarte» o «fortín» serían menos estándar bíblico. Conviene mantener «fortaleza» y reparar la nota para ofrecer una alternativa real y más explicativa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Filisteos», «ungido», «rey», «Israel» y «David» están bien. No hay términos teológicos sensibles adicionales. La elección de «fortaleza» para הַמְּצוּדָה es aceptable si la nota conserva la alternativa «bastión/fortín/lugar fortificado» o explica el campo semántico; así se alinea mejor con la justificación auditada de ‘fortified stronghold’.
  issues:
  - severity: medium
    issue: Nota al pie redundante e infiel a la alternativa inglesa
    rationale: El texto principal ya dice «la fortaleza[a]», pero la nota dice «O “la fortaleza”». Eso no aporta una alternativa real ni preserva la función de la nota inglesa, que documenta otra posible traducción y explica que el hebreo denota un lugar fortificado.
  - severity: low
    issue: La explicación de la nota puede afinarse para reflejar mejor «fortified stronghold»
    rationale: '«Plaza fuerte o lugar fortificado» es comprensible, pero puede formularse de manera más directa y natural en español bíblico legible: «bastión» o «lugar fortificado». Esto preserva mejor la amplitud semántica sin sonar técnica en exceso.'
  revised_spanish_text: Cuando los filisteos oyeron que habían ungido a David como rey sobre Israel, subieron todos los filisteos para buscar a David; y David, al oírlo, descendió a la fortaleza[a].
  revised_footnotes:
  - marker: a
    text: O «al bastión». El hebreo denota un lugar fortificado o una fortaleza.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel y natural. Solo se corrige la nota para que ofrezca una alternativa léxica real y refleje con precisión el valor de הַמְּצוּדָה según la auditoría inglesa.
