  yaml_path: translation/ot/daniel/005/001.yaml
  text: King Belshazzar made a great feast for a thousand of his nobles[a], and in the presence of the thousand he was drinking wine.
  footnotes:
  - marker: a
    text: Or 'and before the thousand he drank wine.' The Aramaic expression can be rendered more literally with 'before,' but here likely means that he was drinking publicly in the presence of the thousand guests.
    reason: lexical_alternative
