translation:
  language: es
  text: y por la sabiduría fueron salvados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron librados» o «fueron preservados». El verbo griego puede denotar rescate, preservación o salvación según el contexto.
