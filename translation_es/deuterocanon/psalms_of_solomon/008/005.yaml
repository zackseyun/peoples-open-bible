  to: Mis lomos fueron aplastados por la noticia[a]; mis rodillas cedieron[b].
  rationale: Se sustituye 'por el informe' por 'por la noticia' para representar mejor ἀπὸ ἀκοῆς en español natural y poético, manteniendo la causalidad de algo oído. Se conservan 'lomos' y 'cedieron' porque transmiten bien la intensidad corporal del original y la fuerza idiomática del aoristo narrativo.
