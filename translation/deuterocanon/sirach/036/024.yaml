translation:
  text: A woman's beauty brightens the face[b][a], and surpasses every desire of a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gladdens the face' or 'cheers the countenance.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'surpasses every desire of a man'; ἀνθρώπου could in some contexts be more generic ('of a person'), but the gendered wording is retained here to match the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: κάλλος
  chosen: beauty
  alternatives:
  - comeliness
  - beauty/beauty of appearance
  lexicon: LSJ
  rationale: The noun denotes physical beauty or attractiveness. 'Beauty' is the most natural modern English equivalent and fits the proverb-like statement.
- source_word: γυναικός
  chosen: a woman's
  alternatives:
  - of a woman
  - wife's
  lexicon: LSJ
  rationale: The genitive can be rendered straightforwardly as 'of a woman.' 'A woman's' is idiomatic English. Although γυνή can mean 'wife,' nothing in this clause requires the narrower marital sense, so the broader 'woman' is preferred.
- source_word: ἱλαρύνει
  chosen: brightens
  alternatives:
  - gladdens
  - cheers
  lexicon: LSJ
  rationale: The verb means to make cheerful or brighten. With πρόσωπον ('face'), 'brightens the face' preserves the imagery better than the more interpretive 'gladdens a person.'
- source_word: πρόσωπον
  chosen: the face
  alternatives:
  - the countenance
  - a face
  lexicon: LSJ
  rationale: The singular noun is best kept concrete. 'The face' is natural English and preserves the visible-expression imagery of the Greek.
- source_word: ὑπὲρ πᾶσαν ἐπιθυμίαν
  chosen: surpasses every desire
  alternatives:
  - is beyond every desire
  - excels every delight
  lexicon: LSJ
  rationale: ὑπέρ with the accusative expresses exceeding or surpassing. ἐπιθυμία can mean desire, longing, or craving. 'Surpasses every desire' is a clear, idiomatic rendering that preserves the comparative force.
- source_word: ἀνθρώπου
  chosen: of a man
  alternatives:
  - of a human being
  - of a person
  lexicon: LSJ
  rationale: The Greek singular ἀνθρώπου can be generic, but in this wisdom context the saying is gendered in relation to 'woman.' Per project philosophy, gender-accurate rendering is preferred where the source intent is gendered, so 'of a man' is retained rather than neutralized.
- source_word: ὑπεράγει
  chosen: surpasses
  alternatives:
  - excels
  - goes beyond
  lexicon: LSJ
  rationale: The verb conveys surpassing or excelling. 'Surpasses' is concise and idiomatic, and it pairs well with the preceding comparative phrase.
