translation:
  language: es
  text: Y aconteció que, en una ocasión así[a], él entró en la casa para hacer su trabajo, y no había allí ninguno de los hombres de la casa, en la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en tal día» o «en este día». La expresión hebrea es idiomática y probablemente significa «en una ocasión así» o «un día como este».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente episodio. «Aconteció» conserva el giro narrativo sin sonar tan arcaico como «sucedió que» o «y fue».},{
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: on such a day
  chosen_spanish: en tal día
  alternatives_spanish:
  - en este día
  - en tal ocasión
  lexicon: HALOT
  rationale: El hebreo es idiomático y apunta a una ocasión concreta más que a la fecha del calendario. «En tal día» mantiene esa vaguedad contextual con naturalidad en español.
- source_word: וַיָּבֹא הַבַּיְתָה
  english_pob_choice: he went into the house
  chosen_spanish: entró en la casa
  alternatives_spanish:
  - fue a la casa
  - se metió en la casa
  lexicon: HALOT
  rationale: El verbo de movimiento con ה direccional expresa entrada al interior. «Entró en la casa» es natural y preciso en español.
- source_word: לַעֲשׂוֹת מְלַאכְתּוֹ
  english_pob_choice: to do his work
  chosen_spanish: para hacer su trabajo
  alternatives_spanish:
  - para realizar su labor
  - para hacer su tarea
  lexicon: HALOT
  rationale: מְלָאכָה designa trabajo/ocupación. «Trabajo» comunica bien el sentido ordinario y evita una paráfrasis excesiva.
- source_word: וְאֵין אִישׁ
  english_pob_choice: and none ... was there
  chosen_spanish: y no había allí ningún hombre
  alternatives_spanish:
  - y no había nadie
  - y no estaba allí ningún hombre
  lexicon: HALOT
  rationale: La construcción negativa expresa ausencia. En español, «no había allí ningún hombre» conserva el énfasis de inexistencia/presencia ausente sin forzar una estructura poco natural.
- source_word: מֵאַנְשֵׁי הַבַּיִת
  english_pob_choice: of the men of the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - de los hombres de la casa
  - de la servidumbre de la casa
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «de los hombres de la casa», en español la referencia ya queda clara por el contexto. Se aligera a «de la casa» para evitar una redundancia dura, pero el matiz masculino se mantiene en la nota de decisión léxica por si se quisiera explicitar.
- source_word: שָׁם בַּבָּיִת
  english_pob_choice: there in the house
  chosen_spanish: allí, en la casa
  alternatives_spanish:
  - allí en la casa
  - allí dentro de la casa
  lexicon: HALOT
  rationale: Se conserva el locativo redundante del hebreo con «allí, en la casa». La repetición es estilística y enfatiza la ausencia dentro del espacio doméstico.
translation_notes:
  revision_awareness: El texto base inglés fue revisado para hacer más natural la locución locativa final («there in the house»), manteniendo el énfasis del hebreo. La versión española conserva ese locativo con una repetición leve («allí, en la casa»), y evita una traducción demasiado literal de «men of the house» que sonaría rígida en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la pauta del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo el tono narrativo bíblico con una sintaxis fluida y moderna, sin caer en arcaísmos.
  - Se preserva el matiz idiomático de כְּהַיּוֹם הַזֶּה con una nota.
  - La redundancia locativa final se conserva parcialmente para reflejar שָׁם בַּבָּיִת.
