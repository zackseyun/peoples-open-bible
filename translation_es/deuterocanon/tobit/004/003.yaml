review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura básica: participio introductorio, vocativo afectuoso, condicional «si muero», imperativo «sepúltame», prohibición respecto de la madre y mandato de honrarla durante toda la vida. También conserva adecuadamente la nota léxica sobre μὴ ὑπερίδῃς sin importar expansiones de la tradición semítica paralela.'
  spanish_quality_summary: La redacción es mayormente clara, pero «honrarla has de» suena forzada y arcaizante en español actual, y además no refleja de la forma más natural el imperativo griego τίμα. Conviene reemplazarlo por «hónrala». El resto del verso es legible y digno; «Hijo» es aceptable por el contexto filial, aunque el griego sea más amplio.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «Hijo» por Παιδίον, «sepúltame» por θάψον με, «no descuides» por μὴ ὑπερίδῃς y «hónrala» por τίμα son coherentes con el expediente inglés y con un español bíblico natural. La nota [a] preserva correctamente las alternativas y la fuerza confirmatoria de la tradición semítica.
  issues:
  - severity: medium
    issue: Construcción poco natural «honrarla has de»
    rationale: Aunque inteligible, suena artificial y arcaizante en español general y no es la mejor representación del imperativo τίμα. «Hónrala» es más fiel, directo y idiomático.
  - severity: low
    issue: Puntuación final
    rationale: El original griego continúa la instrucción y el inglés cierra con coma; en español puede mantenerse una coma final si el formato editorial lo permite, pero no es obligatorio. Se deja sin coma para un verso autónomo limpio.
  revised_spanish_text: 'Y llamándolo[a], le dijo: «Hijo, si yo muero, sepúltame, y no descuides a tu madre; hónrala todos los días de tu vida»'
  revised_footnotes:
