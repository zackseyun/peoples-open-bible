translation:
  language: es
  text: Y ahora[a], mira, Yahvé ha puesto un espíritu de mentira en la boca de todos estos profetas tuyos, y Yahvé ha hablado calamidad contra ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de falsedad».
    reason: lexical_alternative
  - marker: b
    text: O «ha hablado desastre contra ti». En este contexto, el término hebreo puede denotar desastre o calamidad en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora mismo
  lexicon: HALOT
  rationale: Mantiene la transición discursiva y la fuerza temporal/deíctica del hebreo, sin volverlo excesivamente coloquial.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira, pues
  lexicon: HALOT
  rationale: En español, «mira» comunica la llamada enfática a la atención de modo natural; «he aquí» sería más solemne pero menos fluido en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigue el término propio del proyecto para el nombre divino, conservando transparencia frente al texto hebreo.
- source_word: רוּחַ שֶׁקֶר
  english_pob_choice: a lying spirit
  chosen_spanish: un espíritu de mentira
  alternatives_spanish:
  - un espíritu mentiroso
  - un espíritu de falsedad
  lexicon: HALOT
  rationale: El hebreo describe un espíritu caracterizado por la falsedad; «espíritu de mentira» conserva el genitivo y evita forzar una lectura más interpretativa que la del original.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en la boca
  - en los labios de
  lexicon: HALOT
  rationale: La imagen hebrea de la palabra puesta en la boca se conserva de forma directa y natural en español con «en la boca de».
- source_word: כָּל נְבִיאֶיךָ אֵלֶּה
  english_pob_choice: all these prophets of yours
  chosen_spanish: todos estos profetas tuyos
  alternatives_spanish:
  - todos estos profetas de ti
  - todos tus profetas aquí
  lexicon: HALOT
  rationale: Reproduce el demostrativo y la posesión de segunda persona de manera idiomática en español, manteniendo el señalamiento enfático.
- source_word: דִּבֶּר עָלֶיךָ רָעָה
  english_pob_choice: has spoken disaster against you
  chosen_spanish: ha hablado contra ti maldad
  alternatives_spanish:
  - ha hablado contra ti desastre
  - ha pronunciado calamidad contra ti
  lexicon: HALOT
  rationale: Se conserva la tensión léxica de רָעָה. «Maldad» refleja con mayor literalidad la forma básica del término, aunque en este contexto no se afirma que Yahvé haga mal moral; el texto presenta una palabra de juicio contra Acab.
theological_decisions:
- issue: Cómo renderizar רָעָה sin borrar la tensión entre mal moral y calamidad judicial
  english_pob_reading: disaster
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - desastre
  - calamidad
  rationale: El hebreo usa רָעָה, término amplio que puede abarcar daño, calamidad o mal. A diferencia de la versión inglesa auditada, aquí se preserva la ambigüedad fuerte con «maldad», porque el mandato del proyecto es no ocultar la tensión del original. En el marco inmediato, la frase expresa juicio pronunciado contra el rey; por eso el lector debe percibir la carga de amenaza sin que la traducción resuelva de antemano el problema teológico.
  doctrine_reference: Principio de preservación de tensión teológica; el texto atribuye a Yahvé una palabra de juicio, no una explicación sistemática del problema del mal.
- issue: Agencia divina respecto del espíritu de mentira
  english_pob_reading: the LORD has put a lying spirit
  chosen_spanish_reading: Yahvé ha puesto un espíritu de mentira
  alternative_spanish_readings:
  - Yahvé ha permitido un espíritu de mentira
  - Yahvé ha dejado entrar un espíritu de mentira
  rationale: El verbo נָתַן se traduce de manera directa como «ha puesto», sin suavizarlo a mera permisión. Así se mantiene la fuerza del hebreo y la tensión teológica del pasaje tal como la conserva el POB en inglés.
  doctrine_reference: Lectura guiada por el original; preservar la agencia verbal del texto sin resolverla interpretativamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el control auditado del POB inglés. La única divergencia deliberada frente al inglés es la elección de «maldad» para רָעָה, con el fin de no aplanar la amplitud semántica del término hebreo; se mantiene la nota alternativa para explicitar la posibilidad de «calamidad/desastre». No se registraron revisiones previas en el pasaje fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino.
  - Se conserva «espíritu» en sentido personal/agéntico, no como mera disposición interior.
  - Se mantiene el paralelismo sintáctico de la cláusula final para reflejar la estructura hebrea.
  - No se emplea «Mesías», «Cristo» ni terminología no presente en el versículo.
