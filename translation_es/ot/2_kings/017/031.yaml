    text: O, «los avvim».
    reason: lexical_alternative
  - marker: b
    text: Es decir, ofrecían a sus hijos varones como sacrificios al quemarlos para estos dioses.
    reason: cultural_note
  revision_rationale: Se ajusta 'quemaban' a 'quemaron' para seguir la revisión auditada del POB y mejorar la correspondencia con la secuencia narrativa. Se cambia 'sus hijos' por 'sus hijos varones' para preservar la especificidad masculina de בְּנֵיהֶם conforme a la política de precisión de género del proyecto. Se afina la nota cultural para reflejar más de cerca la explicación inglesa sin ampliar el sentido principal. No se requiere adjudicación adicional.
