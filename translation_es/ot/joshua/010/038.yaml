translation:
  language: es
  text: Entonces Josué[a] y todo Israel con él volvió a Debir y peleó contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «contra ella», refiriéndose a la ciudad de Debir, que lleva forma gramatical femenina en hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: El hebreo שוב en esta secuencia narrativa expresa movimiento de regreso. «Volvió» es natural en español y conserva el valor direccional sin añadir matices innecesarios.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: convención bíblica española
  rationale: En español bíblico el nombre se establece como «Josué», transliteración tradicional y plenamente inteligible para el lector en español.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y todo Israel con él
  alternatives_spanish:
  - y todo el Israel con él
  - y todo Israel que iba con él
  lexicon: HALOT
  rationale: «Todo Israel» conserva el valor colectivo del hebreo. «Con él» explicita עִמּוֹ de manera directa y idiomática en español.
- source_word: דְּבִרָה
  english_pob_choice: to Debir
  chosen_spanish: a Debir
  alternatives_spanish:
  - hacia Debir
  - a la ciudad de Debir
  lexicon: HALOT
  rationale: El sufijo direccional del nombre indica movimiento hacia la ciudad. En español, después de «volvió», «a Debir» comunica el destino de forma natural.
- source_word: וַיִּלָּחֶם
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - luchó
  - combatió
  lexicon: HALOT
  rationale: La raíz לחם aquí describe entablar batalla. «Peleó» es claro, directo y suficientemente fuerte para el contexto militar.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra ella misma
  - contra la ciudad
  lexicon: HALOT
  rationale: El pronombre femenino singular remite a Debir, ciudad gramaticalmente femenina en hebreo. En español se puede conservar esa concordancia con «ella», sin perder la referencia a la ciudad.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran acuerdo alto y no registran revisiones aplicadas; la redacción española sigue esa lectura estable sin introducir cambios textuales.
  spanish_consistency_notes:
  - Se mantuvo el nombre bíblico español «Josué» de forma consistente con el uso eclesial en español.
  - Se preservó la concordancia femenina de Debir mediante el pronombre «ella», siguiendo el género gramatical hebreo y la nota del POB en inglés.
  - El estilo busca ser formal y publicable, con sintaxis natural en español sin suavizar el sentido militar del verbo hebreo.
