review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal y el sentido general: Dios conoce la realidad humana y recuerda que somos polvo. Sin embargo, «nuestra condición» debilita el valor concreto de יִצְרֵנוּ, que en el POB inglés se documentó como «our frame», con alternativas ligadas a lo formado o modelado. El hebreo apunta más a nuestra hechura/forma creada que a una condición abstracta.'
  spanish_quality_summary: El español es claro y natural. «Porque él conoce…; se acuerda de que…» fluye bien y es plenamente legible. No obstante, «nuestra condición» suena más interpretativo y abstracto de lo que pide el texto; «nuestra hechura» preserva mejor la imaginería de algo formado, mientras sigue siendo comprensible en español bíblico moderno. «Se acuerda de que somos polvo» es idiomático y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La revisión propuesta se enfoca en alinear mejor יִצְרֵנוּ con la decisión léxica auditada en inglés y con la nota existente sobre «formación / cómo somos formados».
  issues:
  - severity: medium
    issue: «nuestra condición» para יִצְרֵנוּ
    rationale: Aunque comunica fragilidad humana, desplaza el sentido desde la hechura o constitución formada hacia un estado abstracto. El POB inglés y la nota léxica subrayan «frame / formation», por lo que conviene una opción española más concreta y más cercana a la imagen de lo modelado.
  - severity: low
    issue: Leve tensión entre texto principal y nota al pie
    rationale: La nota explica lo «formado o modelado», pero «condición» no refleja bien ese campo semántico. Ajustar el texto principal mejora la coherencia entre traducción y nota.
  revised_spanish_text: Porque él conoce nuestra hechura[a]; se acuerda de que somos polvo.
  revised_footnotes:
