review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés: conserva la secuencia narrativa, identifica a Miriam como hermana de Aarón, mantiene el instrumento de percusión en singular y plural, y refleja correctamente que todas las mujeres salieron tras ella. La única desalineación significativa está en la nota al pie: el texto principal ya traduce וּבִמְחֹלֹת como «danzas», pero la nota dice «O «con danzas»», que no corresponde a una alternativa real frente al texto dado ni reproduce bien la alternativa documentada en inglés entre actividad («danzando»/«bailando») y forma nominal plural («danzas»).'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Entonces», «la profetisa», «hermana de Aarón», «tomó el pandero en su mano» y «tras ella» son lecturas dignas y comprensibles. «Pandero» funciona bien en español eclesial. La frase fluye adecuadamente; el único problema de calidad está en la formulación de la nota, que resulta confusa y redundante con el propio texto principal.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc. «La profetisa» preserva correctamente el femenino marcado de הַנְּבִיאָה, y «pandero»/«panderos» mantiene consistencia léxica para תֹף/תֻפִּים.
  issues:
  - severity: medium
    issue: La nota al pie no refleja correctamente la alternativa léxica preservada por el POB inglés.
    rationale: El texto principal dice «y danzas», pero la nota dice «O «con danzas»», lo cual solo añade la preposición y no ofrece la alternativa real entre un sustantivo plural y una expresión de actividad. Debe señalar una opción como «danzando» o «con baile», idealmente la primera por claridad.
  - severity: low
    issue: La ancla de nota en «profetisa[a]» no corresponde al lugar de la variación léxica.
    rationale: La nota trata sobre וּבִמְחֹלֹת («danzas/danzando»), no sobre הַנְּבִיאָה. Aunque el contenido de la nota es el principal problema, también conviene mover el marcador al término pertinente para cumplir mejor la disciplina de anclaje.
  revised_spanish_text: Entonces Miriam, la profetisa, hermana de Aarón, tomó el pandero en su mano, y todas las mujeres salieron tras ella con panderos y danzas[a].
  revised_footnotes:
  - marker: a
    text: O «danzando». El sustantivo hebreo puede entenderse como la actividad de danzar o como la forma plural «danzas».
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente el sentido del borrador, pero se corrige la nota para que refleje fielmente la alternativa léxica documentada por el POB inglés y se mueve el marcador al término pertinente en el texto.
