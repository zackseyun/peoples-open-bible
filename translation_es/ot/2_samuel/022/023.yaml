translation:
  language: es
  text: Porque todos sus juicios estaban delante de mí[a], y no me aparté de sus estatutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque todos sus juicios estaban delante de mí, y no me aparté de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la base causal o explicativa de la afirmación anterior. «Porque» conserva esa relación en español de forma natural y clara.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: Mantiene el alcance total del cuantificador sin forzar una redacción demasiado técnica.
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decretos
  - sus sentencias
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Juicios» preserva el valor jurídico-forense de מִשְׁפָּט y mantiene la distinción frente a «estatutos» en el paralelismo poético.
- source_word: לְנֶגְדִּי
  english_pob_choice: were before me
  chosen_spanish: estaban delante de mí
  alternatives_spanish:
  - estaban ante mí
  - estaban siempre ante mis ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «delante de mí» conserva la imagen espacial sin añadir énfasis no explicitado, y «estaban» corresponde al estado continuo del original.
- source_word: וְחֻקֹּתָיו
  english_pob_choice: and his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus preceptos
  - sus leyes fijadas
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente más adecuado para חֻקּוֹת y preserva el paralelismo legal-poético con «juicios».
- source_word: לֹא אָסוּר
  english_pob_choice: I did not turn away
  chosen_spanish: no me aparté
  alternatives_spanish:
  - no me desvié
  - no me alejé
  - no me desvié de su camino
  lexicon: HALOT
  rationale: De סוּר, «apartarse» expresa bien la idea de desviarse o retirarse de algo; en español resulta natural y no pierde la fuerza moral del verbo.
- source_word: מִמֶּנָּה
  english_pob_choice: from his statutes
  chosen_spanish: de sus estatutos
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: Aunque el morfema es femenino singular en hebreo, en contexto remite colectivamente al conjunto de «estatutos». En español, la repetición explícita evita ambigüedad y reproduce el sentido colectivo del referente.
theological_decisions:
- issue: Mantener la distinción entre términos legales hebreos
  english_pob_reading: Different Hebrew legal terms are preserved distinctly as 'judgments' and 'statutes.'
  chosen_spanish_reading: Se preserva la distinción entre «juicios» y «estatutos».
  alternative_spanish_readings:
  - Reducir ambos a «leyes»
  - Usar «mandamientos» para ambos
  rationale: El hebreo emplea dos términos distintos en paralelo. Conservar esa diferencia evita nivelar el vocabulario jurídico y respeta la textura teológica y poética del versículo.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se siguió el estado más reciente del auditor inglés, que no registró cambios adicionales y mantuvo alta concordancia. La versión española refleja esa lectura estable sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el proyecto, pero en este versículo no aparece el Tetragrámaton de forma explícita; por eso no se añade aquí.
  - «Juicios» y «estatutos» se mantienen diferenciados para seguir la distinción léxica del hebreo.
  - La nota alternativa conserva la posibilidad de entender el pronombre final como «de ellos», tal como admite la observación inglesa.
