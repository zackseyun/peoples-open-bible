translation:
  language: es
  text: de modo que su vida aborrece el pan, y su alma[b] la comida apetecible[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'de elección' o 'deseable'; el hebreo indica comida que es deseada o atractiva.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''su alma''; según el contexto también puede significar ''su vida'', ''su apetito'' o ''él mismo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזִהֲמַתּוּ
  english_pob_choice: loathes
  chosen_spanish: aborrece
  alternatives_spanish:
  - detesta
  - le repugna
  - siente aversión por
  lexicon: HALOT
  rationale: El verbo expresa repulsión o asco; en español, 'aborrece' comunica con naturalidad ese rechazo fuerte sin sobretraducir. Con el antecedente del contexto, se introduce con 'de modo que' para reflejar la relación resultativa sin repetir mecánicamente la conjunción.
- source_word: חַיָּתוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su vitalidad
  - su ser viviente
  - su apetito
  lexicon: HALOT
  rationale: La palabra puede referirse a 'vida' o 'ser viviente', pero en el paralelismo con 'su alma' funciona bien como vida/vitalidad. 'Su vida' preserva el paralelismo hebreo y es idiomático en español.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - la comida
  lexicon: HALOT
  rationale: El sentido básico es 'pan'. Mantener 'pan' conserva la imagen concreta del texto y el paralelismo poético con 'la comida deseable'.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - él mismo
  - su apetito
  lexicon: HALOT
  rationale: נפשׁ puede significar alma, vida, ser interior o apetito; aquí la lectura 'su alma' conserva el lenguaje antropológico poético y la correspondencia con 'su vida'.
- source_word: מַאֲכַל
  english_pob_choice: food
  chosen_spanish: la comida
  alternatives_spanish:
  - el alimento
  - lo que come
  lexicon: HALOT
  rationale: Es un término general para comida/alimento. 'La comida' es natural en español y mantiene la amplitud del término.
- source_word: תַּאֲוָה
  english_pob_choice: desirable
  chosen_spanish: deseable
  alternatives_spanish:
  - apetecible
  - de elección
  - apreciada
  lexicon: HALOT
  rationale: El sustantivo designa deseo o lo deseado; en aposición con 'comida', 'deseable' expresa bien comida que resulta atractiva o apetecible. 'Apetecible' es posible, pero 'deseable' sigue de cerca la idea léxica.
translation_notes:
  revision_awareness: Se mantiene el paralelismo hebreo con 'su vida' / 'su alma' y la imagen concreta de 'pan' y 'comida deseable'. La elección española evita suavizar el verbo de repulsión y conserva la tensión léxica entre vida/alma del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando corresponda; este versículo no lo contiene.
  - Se mantiene 'alma' para נפשׁ y 'vida' para חַיָּה en paralelo, sin colapsar ambas en un solo término.
  - '''Pan'' conserva la imagen concreta de לָחֶם frente a una generalización como ''alimento''.'
