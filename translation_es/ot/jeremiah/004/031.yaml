  text: כִּי֩ ק֨וֹל כְּ/חוֹלָ֜ה שָׁמַ֗עְתִּי צָרָה֙ כְּ/מַבְכִּירָ֔ה ק֧וֹל בַּת צִיּ֛וֹן תִּתְיַפֵּ֖חַ תְּפָרֵ֣שׂ כַּפֶּ֑י/הָ אֽוֹי נָ֣א לִ֔/י כִּֽי עָיְפָ֥ה נַפְשִׁ֖/י לְ/הֹרְגִֽים־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/031.yaml
  text: 'For I have heard a sound like a woman in labor[a], distress like one giving birth to her first child— the sound of Daughter Zion gasping for breath, spreading out her hands: “Woe is me[c][b], for my soul faints before murderers.”'
  footnotes:
  - marker: a
    text: Or “voice” or “cry” for the repeated Hebrew קול (“sound/voice”).
    reason: lexical_alternative
  - marker: b
    text: Hebrew “like one giving birth for the first time,” an image of especially intense labor pain.
    reason: cultural_note
  - marker: c
    text: Or “my soul is weary before murderers.” Hebrew nephesh can mean “soul,” “self,” or “life.”
    reason: lexical_alternative
