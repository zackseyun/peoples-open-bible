base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/032.yaml
  text: So they tied sackcloth around their waists and ropes on their heads[a], and they came to the king of Israel and said, “Your servant Ben-hadad says, ‘Please let me live.’” And he said[b], “Is he still alive? He is my brother.”
  footnotes:
  - marker: a
    text: Or, 'Spare my life, please.' Literally, 'May my life live, please.'
    reason: lexical_alternative
  - marker: b
    text: '''He is my brother'' likely expresses political or covenantal fraternity, not literal family relation.'
    reason: cultural_note
