translation:
  language: es
  text: Y Moisés habló a Aarón, a sus hijos y a todos los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o tradicionalmente «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel», una designación pactal estándar para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: So Moses spoke
  chosen_spanish: Así habló Moisés
  alternatives_spanish:
  - Y habló Moisés
  - Entonces habló Moisés
  lexicon: HALOT
  rationale: El waw consecutivo aquí avanza y cierra la sección; en español, «Así habló» comunica bien ese cierre narrativo sin sonar mecánico. «Habló» mantiene el sentido directo de דבר.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - con
  lexicon: HALOT
  rationale: La preposición marca destinatarios del habla; en español, «a» es la correspondencia más natural y precisa en este contexto.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural con sufijo de tercera persona, en español «hijos» expresa de manera natural la referencia a los hijos varones de Aarón. «Hijos varones» sería más explícito pero más pesado; «descendientes» perdería la referencia filial concreta.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - todo
  lexicon: HALOT
  rationale: «Todos» reproduce de forma natural el valor distributivo y totalizante de כָּל antes del grupo final.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma covenantal literal del hebreo, con el plural masculino «hijos». En español bíblico, «hijos de Israel» es inteligible y mantiene la forma del original; «israelitas» suaviza la forma, pero pierde el paralelismo léxico.
theological_decisions:
- issue: Valor corporativo y covenantal de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel (como designación del pueblo del pacto)
  rationale: 'No hay disputa doctrinal, pero sí una decisión de forma: el hebreo usa una designación pactal fija y masculinidad gramatical explícita. La traducción conserva esa forma sin negar que funcione corporativamente para todo el pueblo.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Coincide con la revisión final sin cambios reportados en el expediente inglés; el pasaje se mantiene estable en el control cruzado, con acuerdo alto y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Aarón» y «Moisés» con grafía estándar.
  - Se conserva «hijos de Israel» por fidelidad formal al hebreo y por su valor pactal recurrente.
  - No se introduce vocabulario eclesiástico ajeno al texto fuente.
  - La puntuación en español separa claramente los destinatarios de la խոսa sin alterar la estructura hebrea.
