revisions:
- from: He aquí[a], yo estoy contra ti, oh monte destructor, dice Yahvé, destructor de toda la tierra[b]. Extenderé mi mano contra ti, te haré rodar desde las peñas, y te convertiré en monte de incendio.
  to: He aquí[a], yo estoy contra ti, oh monte destructor, dice Yahvé, destructor de toda la tierra[b]. Extenderé mi mano contra ti, te haré rodar desde las peñas, y te convertiré en monte quemado.
  rationale: Se corrige la nota [b] para reflejar la alternativa léxica real de אָרֶץ y se reemplaza «monte de incendio» por «monte quemado», que transmite mejor el sentido resultativo de שְׂרֵפָה en español natural y fiel al expediente del POB.
