translation:
  language: es
  text: O si se sabía que el buey acostumbraba cornear, de ayer y de anteayer[a], y su dueño no lo mantuvo encerrado, deberá pagar sin falta[b] buey por buey, y el animal muerto será suyo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de ayer y de anteayer», un modismo que indica que el buey ya había mostrado antes este comportamiento.'
    reason: cultural_note
  - marker: b
    text: 'O: «ciertamente pagará».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y el cadáver será suyo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - Or si
  - O si acaso
  lexicon: HALOT
  rationale: La partícula abre una alternativa legal respecto del caso anterior; en español, «O» preserva la fuerza disyuntiva con naturalidad.
- source_word: נוֹדַ֗ע
  english_pob_choice: it was known
  chosen_spanish: se sabía
  alternatives_spanish:
  - se dio a conocer
  - fue sabido
  lexicon: HALOT
  rationale: El nifal expresa un hecho conocido en contexto jurídico. «Se sabía» conserva el valor impersonal/pasivo y suena natural en español.
- source_word: כִּ֠י
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - si
  - pues
  lexicon: HALOT
  rationale: Después de נוֹדַע, introduce el contenido de lo conocido; «que» es la correspondencia más directa y precisa.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  lexicon: HALOT
  rationale: En español bíblico y legal, «buey» comunica bien el animal de labor del caso, sin perder claridad. «Ox» sería más técnico en castellano moderno pero menos idiomático.
- source_word: נַגָּח
  english_pob_choice: in the habit of goring
  chosen_spanish: acostumbrado a cornear
  alternatives_spanish:
  - que corneaba
  - de costumbre corneador
  lexicon: HALOT
  rationale: La idea es una tendencia habitual y peligrosa del animal. «Acostumbrado a cornear» conserva el rasgo iterativo/propenso del hebreo sin exagerar el término.
- source_word: מִתְּמוֹל שִׁלְשֹׁם
  english_pob_choice: from yesterday and the day before
  chosen_spanish: desde anteayer
  alternatives_spanish:
  - desde ayer y anteayer
  - desde hace tiempo
  lexicon: HALOT
  rationale: Es un giro idiomático hebreo que indica tiempo previo comprobado. «Desde anteayer» transmite esa antigüedad relativa de forma breve y natural; se preserva el sentido idiomático sin mecanizar el hebreo.
- source_word: וְלֹא יִשְׁמְרֶנּוּ
  english_pob_choice: did not keep it in
  chosen_spanish: y el dueño no lo guardó
  alternatives_spanish:
  - y su dueño no lo vigiló
  - y no lo contuvo
  lexicon: HALOT
  rationale: En este contexto legal, שׁמר implica custodiar/restringir al animal para evitar daño. «No lo guardó» mantiene la responsabilidad del dueño con un verbo breve y comprensible.
- source_word: בְּעָלָיו
  english_pob_choice: its owner
  chosen_spanish: el dueño
  alternatives_spanish:
  - su propietario
  - su amo
  lexicon: HALOT
  rationale: Designa al responsable legal del animal. «Dueño» es claro y natural en español; «propietario» es viable pero más jurídico.
- source_word: שַׁלֵּם יְשַׁלֵּם
  english_pob_choice: he must surely pay
  chosen_spanish: pagará
  alternatives_spanish:
  - deberá pagar ciertamente
  - pagará sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto + imperfecto intensifica la obligación. «Pagará» mantiene la fuerza legal en español, y el contexto ya aporta la obligatoriedad; no se añade una perífrasis innecesaria.
- source_word: שׁוֹר תַּחַת הַשּׁוֹר
  english_pob_choice: ox for ox
  chosen_spanish: buey por buey
  alternatives_spanish:
  - un buey en lugar del buey
  - buey a cambio de buey
  lexicon: HALOT
  rationale: תַּחַת expresa sustitución o compensación. «Buey por buey» conserva la fórmula legal con concisión y paralelismo.
- source_word: וְהַמֵּת יִהְיֶה לּוֹ
  english_pob_choice: and the dead animal will be his
  chosen_spanish: y el animal muerto será suyo
  alternatives_spanish:
  - y el cadáver será suyo
  - y el muerto le pertenecerá
  lexicon: HALOT
  rationale: La referencia es al animal muerto del incidente, que pasa a pertenecerle al responsable. «Animal muerto» evita ambigüedad y comunica bien la situación jurídica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «accustomed to gore» por encima de una formulación más idiomática pero menos precisa. En español se reflejó esa decisión con «acostumbrado a cornear», manteniendo el sentido habitual/iterativo del hebreo y el tono legal del pasaje.
  spanish_consistency_notes:
  - Se mantiene «buey» para שׁוֹר en este caso legal, en coherencia con un registro bíblico claro y no eclesiástico.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el tetragrámaton.
  - Se conserva la estructura condicional-disyuntiva del hebreo con «O si se sabía...».
  - «Suyo» se usa para expresar pertenencia legal del animal muerto al responsable, sin introducir ideas ajenas.
