translation:
  language: es
  text: He aquí, yo estoy poniendo en él un espíritu[a], para que oiga un informe[b] y vuelva a su propia tierra, y yo haré que caiga por la espada en su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo le estoy dando un espíritu». El hebreo רוּחַ puede referirse a un impulso interior, una disposición o un espíritu.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «una noticia» o «un rumor». El hebreo שְׁמוּעָה puede designar información recibida sin precisar si está confirmada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira bien
  lexicon: HALOT
  rationale: La partícula deíctica hebrea llama la atención del oyente con fuerza profética. «He aquí» conserva ese valor de señalamiento solemne en español, de modo natural y fiel al tono del texto.
- source_word: נוֹתֵן
  english_pob_choice: I am putting
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - estoy dando
  - pondré
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente o en curso. «Estoy poniendo» mantiene ese matiz aspectual sin reducirlo a un futuro simple, y refleja mejor la formulación auditada del inglés.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  lexicon: HALOT
  rationale: La preposición ב señala influencia interior o implantación interna. «En él» preserva esa posibilidad sin convertirla en una acción meramente externa.
- source_word: רוּחַ
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un soplo
  - un impulso interior
  - un viento
  lexicon: HALOT
  rationale: Se conserva el término «espíritu» porque el contexto admite una influencia interna dada por Dios y el trail inglés deliberadamente mantiene la amplitud semántica de רוּחַ. «Espíritu» deja abierta la tensión entre disposición interior y entidad espiritual sin resolverla en exceso.
- source_word: וְשָׁמַע
  english_pob_choice: so that he will hear
  chosen_spanish: para que oiga
  alternatives_spanish:
  - y oirá
  - y escuche
  lexicon: HALOT
  rationale: El encadenamiento narrativo expresa resultado. En español, «para que oiga» comunica con claridad la consecuencia querida por el hebreo sin romper el flujo de la frase.
- source_word: שְׁמוּעָה
  english_pob_choice: a report
  chosen_spanish: un informe
  alternatives_spanish:
  - una noticia
  - un rumor
  - un reporte
  lexicon: HALOT
  rationale: «Informe» es suficientemente amplio para abarcar noticia, reporte o rumor, y evita especificar más de lo que el sustantivo hebreo garantiza. En español también suena natural en un contexto cortesano/político.
- source_word: וְשָׁב
  english_pob_choice: and return
  chosen_spanish: vuelva
  alternatives_spanish:
  - regrese
  - y vuelva
  lexicon: HALOT
  rationale: El verbo שׁוּב indica retorno. «Vuelva» conserva el movimiento de regreso y funciona bien con la construcción final de propósito en español.
- source_word: אֶל אַרְצוֹ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su país
  lexicon: HALOT
  rationale: «Tierra» reproduce mejor el alcance territorial de אַרְץ en este contexto que «país», y el posesivo «propia» hace explícito el énfasis del hebreo y del trail inglés.
- source_word: וְהִפַּלְתִּיו
  english_pob_choice: I will cause him to fall
  chosen_spanish: yo haré que caiga
  alternatives_spanish:
  - lo haré caer
  - lo derribaré
  lexicon: HALOT
  rationale: El hiphil de נפל es causativo. «Haré que caiga» mantiene la causalidad de forma transparente en español, sin perder el valor semántico de caída violenta o derrota.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: En español, la fórmula idiomática más natural para muerte violenta es «a espada». Conserva el sentido de ejecución o muerte por arma, equivalente al hebreo idiomático.
- source_word: בְּאַרְצוֹ
  english_pob_choice: in his own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - en su tierra
  - en su país
  lexicon: HALOT
  rationale: 'La repetición del lugar final refuerza la ironía del juicio: regresará a su tierra y allí caerá. «Su propia tierra» reproduce el énfasis posesivo del hebreo.'
theological_decisions:
- issue: Naturaleza de רוּחַ como acción divina sobre el rey asirio
  english_pob_reading: a spirit/inward impulse placed in him by God
  chosen_spanish_reading: un espíritu puesto en él por Dios
  alternative_spanish_readings:
  - un impulso interior
  - un viento
  - una disposición interior
  rationale: 'La traducción española conserva la amplitud del hebreo y del audit trail inglés: no define si se trata de una entidad espiritual, una disposición interior o un impulso dado por Dios. La frase mantiene la agencia divina sin resolver el mecanismo.'
  doctrine_reference: Preservar la tensión semántica y la soberanía divina del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el registro y las decisiones auditadas del inglés POB, conservando la ambigüedad de רוּחַ y de שְׁמוּעָה. No se registran revisiones previas aplicadas en esta pasaje; el draft se ajusta al último pass sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa «He aquí» para el marcador profético, en coherencia con un tono bíblico moderno y claro.
  - «Espíritu» se mantiene sin mayúscula porque el contexto no exige una referencia explícita al Espíritu Santo.
  - «A espada» reproduce una locución española natural y fiel al hebreo idiomático.
  - La duplicación de «su propia tierra» mantiene el énfasis territorial del original.
