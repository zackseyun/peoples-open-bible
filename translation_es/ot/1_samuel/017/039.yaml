translation:
  language: es
  text: 'Y David se ciñó su espada sobre su armadura y trató de avanzar[a], porque no las había probado. Pero David dijo a Saúl: «No puedo ir con estas, porque no las he probado». Entonces David se las quitó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quiso ir»; el hebreo puede expresar disposición, emprendimiento o intento de realizar la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְגֹּר
  english_pob_choice: strapped
  chosen_spanish: se ciñó
  alternatives_spanish:
  - se ajustó
  - se sujetó
  lexicon: HALOT
  rationale: חגר expresa ceñir o ajustar un arma/equipo al cuerpo. En español, «ceñirse» conserva la acción concreta y la imagen militar sin sonar mecánico.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su arma blanca
  lexicon: HALOT
  rationale: חֶרֶב designa aquí una espada literal; «espada» es la equivalencia natural y precisa en español.
- source_word: מֵעַל לְמַדָּיו
  english_pob_choice: over his armor
  chosen_spanish: sobre su armadura
  alternatives_spanish:
  - sobre sus vestiduras
  - sobre su ropa
  lexicon: HALOT
  rationale: El contexto inmediato es militar; לְמַדִּים aquí se entiende mejor como armadura o atuendo militar. «Armadura» preserva ese sentido contextual mejor que un término general de ropa.
- source_word: וַיֹּאֶל לָלֶכֶת
  english_pob_choice: tried to go
  chosen_spanish: quiso ir
  alternatives_spanish:
  - intentó ir
  - se dispuso a ir
  - trató de ir
  lexicon: HALOT
  rationale: El valor de יאל puede abarcar consentir, intentar u ofrecérselo a una acción. En la secuencia narrativa, «quiso ir» comunica la disposición inicial de David sin sobreinterpretar el matiz.
- source_word: כִּי לֹא נִסָּה
  english_pob_choice: for he had not tested them
  chosen_spanish: porque no la había probado
  alternatives_spanish:
  - porque no las había probado
  - porque no las había ensayado
  lexicon: HALOT
  rationale: נסה puede implicar probar por uso o experiencia. En español, «probar» reproduce ese campo semántico de forma natural. El singular «la» retoma de manera compacta la armadura/equipo mencionado en conjunto.
- source_word: לֹא אוּכַל לָלֶכֶת בָּאֵלֶּה
  english_pob_choice: I cannot go with these
  chosen_spanish: No puedo ir con éstas
  alternatives_spanish:
  - No puedo ir con estos
  - No puedo caminar con esto
  lexicon: HALOT
  rationale: El demostrativo plural «éstas» remite al conjunto de piezas/implementos visibles. «Ir con éstas» mantiene la brevedad del hebreo y la fluidez del español.
- source_word: לֹא נִסִּיתִי
  english_pob_choice: I have not tested them
  chosen_spanish: no las he probado
  alternatives_spanish:
  - no las he ensayado
  - no estoy acostumbrado a ellas
  lexicon: HALOT
  rationale: Se conserva el mismo verbo clave que antes, ahora en primera persona. «Probar» mantiene la coherencia léxica con la primera cláusula y evita introducir una interpretación psicológica ajena al texto.
- source_word: וַיְסִרֵם ... מֵעָלָיו
  english_pob_choice: removed them from himself
  chosen_spanish: se las quitó de encima
  alternatives_spanish:
  - se las quitó
  - las apartó de sí
  lexicon: HALOT
  rationale: סור en hifil es retirar o apartar. «Se las quitó de encima» es idiomático en español y conserva la idea de retirar el equipo del cuerpo de David.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal, anclado en la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo la imagen militar del pasaje con «armadura» en lugar de una generalización como «ropa».
  - Se preservó la repetición del verbo central נסה con «probar» para mantener coherencia léxica.
  - 'Se usó una solución española natural para el cierre: «se las quitó de encima», sin perder la referencia al retiro del equipo.'
