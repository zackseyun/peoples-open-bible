translation:
  language: es
  text: Que Dios Todopoderoso les conceda misericordia[a] delante del hombre, para que les devuelva a su otro hermano[b] y a Benjamín. Y en cuanto a mí, si quedo sin hijos[c], sin hijos quedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «compasión». El hebreo רַחֲמִים puede denotar misericordia, compasión o tierna piedad.
    reason: lexical_alternative
  - marker: b
    text: «Su otro hermano» se refiere a Simeón, que había quedado retenido en Egipto.
    reason: cross_reference
  - marker: c
    text: 'O: «si quedo privado de mis hijos, privado quedo». El hebreo repite el mismo verbo para dar énfasis y expresar la resignación de Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - El Shaddai
  - Dios Shaddai
  lexicon: HALOT
  rationale: En hebreo es un título divino; en español conviene traducirlo, no transliterarlo. «Todopoderoso» comunica el valor tradicional de שַׁדַּי como atributo de poder divino y mantiene el tono oracional del contexto.
- source_word: יִתֵּן לָכֶם רַחֲמִים
  english_pob_choice: grant you mercy
  chosen_spanish: les conceda misericordia
  alternatives_spanish:
  - les conceda compasión
  - les dé misericordia
  lexicon: HALOT
  rationale: רַחֲמִים puede significar misericordia, compasión o tierno piedad. «Conceda misericordia» es natural en una petición y conserva la idea de favor inmerecido sin volverlo demasiado técnico.
- source_word: לִפְנֵי הָאִישׁ
  english_pob_choice: before the man
  chosen_spanish: delante del hombre
  alternatives_spanish:
  - en presencia del hombre
  - ante el hombre
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente espacial/relacional: «antes de» o «delante de». «Delante del hombre» conserva el giro sin sonar forzado en español, y mantiene la referencia al funcionario egipcio ya conocido por el contexto.'
- source_word: וְשִׁלַּח לָכֶם
  english_pob_choice: so that he may send back
  chosen_spanish: para que les envíe
  alternatives_spanish:
  - y les devuelva
  - para que los mande de vuelta
  lexicon: HALOT
  rationale: El valor del verbo aquí es hacer volver/mandar de regreso; en español, «envíe» funciona como continuación de la súplica y el complemento posterior («a su otro hermano y a Benjamín») hace explícita la idea de retorno sin añadir más de lo que el hebreo exige.
- source_word: אֶת אֲחִיכֶם אַחֵר
  english_pob_choice: your other brother
  chosen_spanish: a su otro hermano
  alternatives_spanish:
  - a su hermano, el otro
  - a su hermano restante
  lexicon: HALOT
  rationale: אַחֵר califica a «hermano» como «otro». El contexto identifica al hermano retenido en Egipto (Simeón), pero el texto hebreo no lo nombra aquí; por eso se preserva la referencia implícita sin añadir una identificación explícita en el cuerpo del versículo.
- source_word: וְאֶת בִּנְיָמִין
  english_pob_choice: and Benjamin
  chosen_spanish: y a Benjamín
  alternatives_spanish:
  - y Benjamín
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como complemento del verbo, en paralelo con «a su otro hermano», para conservar la estructura del hebreo.
- source_word: וַאֲנִי
  english_pob_choice: And as for me
  chosen_spanish: Y en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Por mi parte
  lexicon: HALOT
  rationale: La forma hebrea coloca el pronombre para contraste. «Y en cuanto a mí» refleja bien el cambio de foco hacia la resignación personal de Jacob.
- source_word: כַּאֲשֶׁר שָׁכֹלְתִּי שָׁכָלְתִּי
  english_pob_choice: if I am bereaved, I am bereaved
  chosen_spanish: si he de quedar privado de hijos, privado quedo
  alternatives_spanish:
  - si quedo privado de hijos, privado quedo
  - si me he de ver privado, me veo privado
  lexicon: HALOT
  rationale: El hebreo repite el verbo para expresar resignación enfática. En español, «privado de hijos» recoge específicamente el sentido familiar del verbo en este contexto y reproduce la repetición con un paralelismo breve y solemne. Se evita una formulación demasiado genérica que perdería la referencia a la pérdida de hijos.
theological_decisions:
- issue: Título divino אֵל שַׁדַּי
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - El Shaddai
  - Dios Shaddai
  rationale: La línea editorial del POB prioriza traducir títulos divinos. En español, «Dios Todopoderoso» comunica la función invocatoria y la fuerza teológica del título sin transliterarlo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate names)'
- issue: Sentido de רַחֲמִים en una petición
  english_pob_reading: mercy / compassion
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - compasión
  - tierno favor
  rationale: En este contexto, la petición busca una disposición favorable del funcionario. «Misericordia» conserva el campo semántico de רַחֲמִים y su tono de favor compasivo, sin desplazar el énfasis hacia mera simpatía emocional.
  doctrine_reference: HALOT; uso contextual del sustantivo en súplica
- issue: Repetición enfática de שָׁכֹלְתִּי / שָׁכָלְתִּי
  english_pob_reading: if I am bereaved, I am bereaved
  chosen_spanish_reading: si he de quedar privado de hijos, privado quedo
  alternative_spanish_readings:
  - si quedo privado de hijos, privado quedo
  - si me he de ver privado, me veo privado
  rationale: La repetición expresa aceptación resignada. En español, la duplicación del adjetivo/verbo mantiene esa fuerza enfática. La mención de «hijos» hace explícita la pérdida implícita en el contexto familiar de Jacob.
  doctrine_reference: HALOT; narrativa de Génesis 42–43
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la auditoría inglesa y no muestra revisiones aplicadas. La redacción española conserva ese estado, siguiendo de cerca el hebreo y las decisiones léxicas ya auditadas, con ajuste natural de la sintaxis para el español.
  spanish_consistency_notes:
  - Se mantiene «Dios Todopoderoso» como traducción del título divino, coherente con la política de traducir títulos y no transliterarlos.
  - Se usa «misericordia» como término principal, con nota alternativa para «compasión», preservando la tensión semántica de רַחֲמִים.
  - Se evita nombrar a Simeón en el texto principal porque el hebreo no lo hace; la identificación queda en nota.
  - La repetición final se conserva mediante paralelismo breve («privado quedo»), evitando una paráfrasis que diluya la resignación enfática del hebreo.
