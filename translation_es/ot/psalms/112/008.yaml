translation:
  language: es
  text: Su corazón está firme[a]; no temerá hasta que vea[b] a sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Firme» traduce el sentido de algo sostenido o establecido; también podría decirse «estable».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hasta que vea». En este contexto, la expresión puede implicar contemplar el desenlace respecto de sus adversarios, sin explicitar «en triunfo».'
    reason: contextual_note
lexical_decisions:
- source_word: סָמוּךְ
  english_pob_choice: steadfast
  chosen_spanish: Firme
  alternatives_spanish:
  - estable
  - afirmado
  - seguro
  - sostenido
  lexicon: HALOT
  rationale: El participio pasivo de סמך comunica algo sostenido, fijado con firmeza o establecido. En español, «firme» transmite bien esa estabilidad interior de manera natural y digna para el paralelismo poético.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - su ser interior
  lexicon: HALOT
  rationale: לֵב / לֵבָב suele abarcar el centro interior de la persona, incluidas intención y pensamiento. «Corazón» es la equivalencia más amplia y natural en contexto sapiencial y poético.
- source_word: לֹא יִירָא
  english_pob_choice: he will not fear
  chosen_spanish: no temerá
  alternatives_spanish:
  - no tendrá miedo
  - no temerá jamás
  - no se asustará
  lexicon: HALOT
  rationale: El imperfecto de ירא puede expresar valor duradero o futuro. «No temerá» conserva el sentido de confianza estable sin cargar el texto con una perífrasis explicativa.
- source_word: עַד אֲשֶׁר
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  - mientras
  lexicon: HALOT
  rationale: La combinación introduce un límite temporal. «Hasta que» es la forma española más directa e idiomática y mantiene la relación temporal del hebreo.
- source_word: יִרְאֶה
  english_pob_choice: he looks on
  chosen_spanish: vea
  alternatives_spanish:
  - contemple
  - mire
  - observe
  lexicon: HALOT
  rationale: ראה significa «ver». En este verso, la construcción con בְצָרָיו sugiere ver a los adversarios como objeto de la vindicación final; en español, «vea» conserva la literalidad básica sin añadir una interpretación de triunfo no explícita en el hebreo.
- source_word: בְצָרָיו
  english_pob_choice: his adversaries
  chosen_spanish: a sus adversarios
  alternatives_spanish:
  - a sus enemigos
  - a quienes le son hostiles
  - a sus contrarios
  lexicon: HALOT
  rationale: צַר puede referirse a un adversario o enemigo hostil. «Adversarios» mantiene el registro poético y el campo semántico amplio, sin intensificar innecesariamente la carga emocional de «enemigos».
theological_decisions:
- issue: Temporalidad de la cláusula final y posible matiz de vindicación
  english_pob_reading: until he looks on his adversaries
  chosen_spanish_reading: hasta que vea a sus adversarios
  alternative_spanish_readings:
  - hasta que los vea con satisfacción
  - hasta que los contemple en su derrota
  - hasta que vea el fin de sus adversarios
  rationale: El hebreo no explicita «en triunfo»; por eso la traducción española evita añadir una interpretación que no está verbalizada. La relación temporal se conserva, dejando que el lector perciba el posible matiz de vindicación desde el contexto del salmo.
  doctrine_reference: Salmo sapiencial / justicia de Dios en la vida del justo
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que cada nota al pie tenga un marcador exacto en el texto español. También se evitó introducir «en triunfo», porque el hebreo y el registro auditado no lo expresan de manera explícita.
  spanish_consistency_notes:
  - Se mantiene «adversarios» para conservar el rango semántico de צָרִים sin estrecharlo a «enemigos».
  - Se usa «corazón» para לֵב por consistencia con el uso bíblico amplio del centro interior de la persona.
  - Se conserva un estilo poético claro y sobrio, acorde con un salmo sapiencial.
