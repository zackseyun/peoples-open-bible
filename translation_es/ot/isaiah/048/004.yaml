translation:
  language: es
  text: Porque supe que eres terco[a], y tu cuello es un tendón de hierro[b], y tu frente es de bronce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «duro» u «obstinado» para «terco».
    reason: lexical_alternative
  - marker: b
    text: Lit. «tu cuello es un tendón de hierro». La imagen comunica resistencia obstinada.
    reason: cultural_note
  - marker: c
    text: O «tu frente es de bronce». La metáfora sugiere dureza sin vergüenza.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּעְתִּי
  english_pob_choice: Because I knew
  chosen_spanish: Porque supe
  alternatives_spanish:
  - Porque conocí
  - Puesto que sabía
  lexicon: HALOT
  rationale: El prefijo מִ con ידע en esta construcción expresa base o motivo; en español, «porque» comunica con naturalidad esa relación causal. «Supe» mantiene el valor de conocimiento en tiempo pasado sin volver la frase artificial.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - puesto que
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido o fundamento del saber divino; en español, «porque» preserva mejor el matiz causal que una mera subordinación con «que».
- source_word: קָשֶׁה
  english_pob_choice: stubborn
  chosen_spanish: terco
  alternatives_spanish:
  - duro
  - obstinado
  - tieso
  lexicon: HALOT
  rationale: Aunque el sentido básico es «duro», en la reprensión profética aplicado a una persona el valor es de resistencia voluntaria. «Terco» expresa bien esa dureza moral en español moderno y sigue cerca del juicio del texto.
- source_word: וְגִיד בַּרְזֶל
  english_pob_choice: an iron sinew
  chosen_spanish: un tendón de hierro
  alternatives_spanish:
  - un nervio de hierro
  - una fibra de hierro
  lexicon: HALOT
  rationale: גִיד nombra un tendón o sinew. «Tendón de hierro» conserva la imagen concreta y es comprensible en español; «nervio» sería más interpretativo en este contexto.
- source_word: עָרְפֶּךָ
  english_pob_choice: your neck
  chosen_spanish: tu cuello
  alternatives_spanish:
  - tu nuca
  - tu cerviz
  lexicon: HALOT
  rationale: En español, «cuello» es el equivalente natural y transparente para este modismo. «Nuca» o «cerviz» son posibles, pero menos directos o más marcados.
- source_word: וּמִצְחֲךָ
  english_pob_choice: and your forehead
  chosen_spanish: tu frente
  alternatives_spanish:
  - tu entrecejo
  - tu frente y tu ceño
  lexicon: HALOT
  rationale: מֵצַח se refiere a la frente/brow. «Frente» comunica la imagen corporal con claridad y mantiene el paralelismo con el hebreo.
- source_word: נְחוּשָׁה
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - bronce
  - cobre
  - latón
  lexicon: HALOT
  rationale: «De bronce» reproduce la metáfora material de dureza con naturalidad en español y evita arcaísmos o imprecisiones de «latón».
theological_decisions:
- issue: Conservación de las metáforas corporales y metálicas
  english_pob_reading: Retain the bodily-metal metaphors ('iron sinew,' 'forehead bronze') rather than flattening them into abstract interpretation.
  chosen_spanish_reading: Conservar «tendón de hierro» y «frente de bronce» en lugar de volverlas una explicación abstracta.
  alternative_spanish_readings:
  - eres indomable y sin vergüenza
  - eres duro e insensible
  rationale: El hebreo usa imágenes proféticas concretas para denunciar terquedad y descaro. Mantenerlas evita perder fuerza retórica y respeta el nivel imagístico del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El auditorio inglés corrigió mínimamente la sintaxis para dejar explícito «is» antes de «bronze». En español no hace falta un ajuste equivalente porque la cópula queda naturalmente implícita/expresa en «es de bronce». Mantengo el paralelismo metafórico y el valor causal de la primera cláusula.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se conserva el tono profético directo en segunda persona singular.
  - «Terco» se escogió por claridad moderna, pero se documenta la alternativa más literal «duro» para no borrar la tensión semántica.
  - «De bronce» preserva el sustantivo material sin forzar una paráfrasis interpretativa.
