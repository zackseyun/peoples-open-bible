translation:
  language: es
  text: Salieron de Obot y acamparon en Iyé-abarim, en el desierto que está frente a Moab[a], hacia donde sale el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Iyé-abarim también puede entenderse por sentido como «las ruinas de Abarim» o «los montones de Abarim», aunque aquí funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en la fórmula de itinerario describe salir de un campamento y proseguir el viaje. «Salieron» comunica con naturalidad ese avance, sin perder el valor concreto del movimiento.
- source_word: מֵאֹבֹת
  english_pob_choice: from Oboth
  chosen_spanish: de Obot
  alternatives_spanish:
  - de Obot
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera. Se omite la h muda final adaptando la forma al uso hispano para nombres bíblicos.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - y acamparon
  lexicon: HALOT
  rationale: חנה significa acampar o establecer campamento. «Acamparon» es claro y conserva la concreción del verbo.
- source_word: בְּעִיֵּי הָעֲבָרִים
  english_pob_choice: at Iye-abarim
  chosen_spanish: en Iyé-abarim
  alternatives_spanish:
  - en las ruinas de Abarim
  - en los montones de Abarim
  lexicon: HALOT
  rationale: En el contexto itinerario funciona como topónimo, por eso se mantiene transliterado en el texto principal. La acentuación «Iyé» ayuda a la pronunciación en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto-estepa
  - en la región desértica
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar desierto o zona árida de pastoreo. «Desierto» es la equivalencia más natural en español, aunque «desierto» aquí conserva el matiz geográfico amplio del relato.
- source_word: אֲשֶׁר עַל פְּנֵי מוֹאָב
  english_pob_choice: that is opposite Moab
  chosen_spanish: que está frente a Moab
  alternatives_spanish:
  - que está opuesto a Moab
  - que mira hacia Moab
  lexicon: HALOT
  rationale: עַל־פְּנֵי en descripción geográfica suele significar «frente a» u «opuesto a». «Frente a» es idiomático en español y mantiene la relación espacial.
- source_word: מִמִּזְרַח הַשָּׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia el nacimiento del sol
  alternatives_spanish:
  - hacia el amanecer
  - hacia el oriente
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «desde/al oriente del sol» y en contexto marca el lado oriental. «Hacia el nacimiento del sol» conserva la imagen original mejor que una simple «al este».
translation_notes:
  revision_awareness: El pasaje en inglés POB se mantiene sin cambios sustanciales respecto del último control de revisión; la presente redacción sigue la misma solución de transliterar el topónimo y de conservar la imagen direccional de la expresión hebrea para el oriente.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, aunque este versículo no lo contiene.
  - Se prefiere una sintaxis narrativa breve y bíblica, pero con español contemporáneo natural.
  - Se translitera «Obot» e «Iyé-abarim» para conservar los nombres de lugar; la nota preserva la alternativa léxica del topónimo.
  - «Desierto» se usa como equivalente amplio de מִדְבָּר, sin forzar un término técnico distinto.
  - «Frente a» refleja la relación espacial de עַל פְּנֵי de manera idiomática en español.
