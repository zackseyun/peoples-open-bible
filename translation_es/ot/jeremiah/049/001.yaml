revisions:
- from: '[a] En cuanto a los hijos de Amón, así dice Yahvé: ¿Acaso Israel no tiene hijos? ¿Acaso no tiene heredero? ¿Por qué entonces se ha apoderado Milcom de Gad, y su pueblo ha habitado en sus ciudades?'
