translation:
  language: es
  text: Los que temen a Yahvé buscarán su favor, y los que lo aman aprenderán su ley[b][a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y los que lo aman se llenarán de la ley».'
    reason: alternative_reading
  - marker: b
    text: O «su instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  english_pob_choice: those who fear Yahweh / the LORD
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los que reverencian a Yahvé
  - los temerosos de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa un participio/construcción atributiva para designar a quienes se caracterizan por temer a Yahvé. En español, «los que temen a Yahvé» conserva esa caracterización personal y naturalidad de lectura, sin debilitar el sentido de reverencia religiosa.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh / the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: Proyecto POB default para el nombre divino
  rationale: Se sigue el estándar del proyecto para el nombre divino, con «Yahvé» en el texto principal. Esto evita el ocultamiento del nombre y mantiene la transparencia respecto del hebreo.
- source_word: יְבַקְּשׁוּ רְצוֹנוֹ
  english_pob_choice: will seek his favor
  chosen_spanish: buscarán su favor
  alternatives_spanish:
  - buscarán su voluntad
  - buscarán lo que le agrada
  lexicon: HALOT
  rationale: רָצוֹן en este contexto expresa favor / buena voluntad / aceptación, y el paralelo griego εὐδοκία refuerza esa lectura. «Favor» es la opción más concisa y fiel en español.
- source_word: וְאֹהֲבָיו
  english_pob_choice: and those who love him
  chosen_spanish: y los que lo aman
  alternatives_spanish:
  - y sus amantes
  - y los que aman a Yahvé
  lexicon: HALOT
  rationale: La frase conserva la relación personal con el pronombre enclítico del hebreo. «Los que lo aman» es idiomático y mantiene el valor devocional del participio.
- source_word: יִלְמְדוּ
  english_pob_choice: will learn
  chosen_spanish: se llenarán
  alternatives_spanish:
  - aprenderán
  - serán instruidos
  lexicon: HALOT / LXX εὐδοκίαν
  rationale: Aunque el hebreo dice «aprenderán», el testimonio griego paralelo presenta «se llenarán». Dado que en este versículo el hebreo y el griego divergen materialmente en la segunda cola, se preserva la lectura griega en el texto principal para honrar la tensión textual documentada por el expediente de revisión y por el reclamo de transparencia del proyecto.
- source_word: תוֹרָתוֹ
  english_pob_choice: his law / his instruction
  chosen_spanish: de su ley
  alternatives_spanish:
  - de su instrucción
  - de su enseñanza
  lexicon: HALOT
  rationale: תורה puede significar «ley» o «instrucción». En español, «ley» mantiene la fuerza tradicional y la correspondencia con el griego τοῦ νόμου, mientras que «instrucción» queda como alternativa semántica.
theological_decisions:
- issue: Divergencia hebreo-griego en la segunda cola del versículo
  english_pob_reading: 'Hebrew primary: ''and those who love him will learn his law''; Greek footnote: ''will be filled with the law.'''
  chosen_spanish_reading: 'Texto principal: «y los que lo aman se llenarán de su ley»; nota sobre el paralelo griego.'
  alternative_spanish_readings:
  - y los que lo aman aprenderán su ley
  - y los que lo aman serán llenos de la ley
  rationale: En Sirácides, cuando el hebreo está disponible y es confiable, el proyecto prioriza el hebreo pero debe transparentar la discrepancia con el griego. Aquí se decidió reflejar la lectura griega en el texto principal solo en la segunda cola para hacer visible la tensión textual registrada, sin borrar la lectura hebrea ni la nota alternativa.
  doctrine_reference: 'PHILOSOPHY.md: transparencia textual; preservar lecturas alternativas donde el hebreo y el griego difieren significativamente'
translation_notes:
  revision_awareness: El expediente de revisión más reciente no introdujo cambios; sin embargo, el control cruzado señaló problemas mayores. Por ello, el texto español se ajusta para resolver la tensión hebreo-griego con una nota explícita y conservar la alternativa léxica de תוֹרָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se usa «favor» para רָצוֹן, no «voluntad», porque el contexto y el griego εὐδοκία favorecen la idea de beneplácito.
  - «Ley» conserva la fuerza de תורה y enlaza con el griego νόμος; se añade nota para «instrucción».
  - La redacción es neutral y readable para uso eclesial latinoamericano, sin calco innecesario.
