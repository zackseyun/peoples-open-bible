translation:
  language: es
  text: Pero toda criatura alada[a] que pulula y tiene cuatro patas[b] es detestable para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criatura voladora que pulula». El hebreo se refiere ampliamente a criaturas voladoras que se agrupan o pululan, especialmente insectos.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cuatro pies»; en español también puede decirse «cuatro patas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: But every
  chosen_spanish: Pero todo
  alternatives_spanish:
  - Y todo
  - Ahora bien, todo
  lexicon: HALOT
  rationale: El וְ inicial expresa aquí contraste con la concesión previa; en español, «Pero» comunica mejor ese giro adversativo. כֹל se rinde con «todo» para mantener el valor distributivo.
- source_word: שֶׁרֶץ
  english_pob_choice: swarming thing
  chosen_spanish: insecto
  alternatives_spanish:
  - bicho que se arrastra
  - criatura que se mueve en enjambre
  lexicon: HALOT
  rationale: En este contexto de criaturas aladas prohibidas, el referente español más claro y natural es «insecto», sin perder el valor de pequeña criatura proliferante implícito en el campo semántico de שֶׁרֶץ.
- source_word: הָעֹוף
  english_pob_choice: winged
  chosen_spanish: alado
  alternatives_spanish:
  - volador
  - de alas
  lexicon: HALOT
  rationale: El hebreo describe una categoría de criaturas voladoras/aladas. «Alado» conserva la idea de alas de forma breve y digna en español.
- source_word: אֲשֶׁר ל֖וֹ
  english_pob_choice: that has
  chosen_spanish: que tiene
  alternatives_spanish:
  - que posee
  - con
  lexicon: HALOT
  rationale: La construcción relativa señala la característica definitoria; «que tiene» es la equivalencia española más directa y natural.
- source_word: אַרְבַּע רַגְלָיִם
  english_pob_choice: four feet
  chosen_spanish: cuatro patas
  alternatives_spanish:
  - cuatro pies
  - cuatro piernas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «cuatro pies/patas», en español «patas» comunica mejor la referencia zoológica de criaturas pequeñas sin forzar un calco extraño. Se preserva el número exacto del original.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: repugnante
  alternatives_spanish:
  - detestable
  - abominable
  lexicon: HALOT
  rationale: En registro español, «repugnante» transmite con claridad la fuerza de rechazo ritual/alimentario del término sin introducir necesariamente el peso técnico-teológico de «abominable».
- source_word: הוּא לָכֶם
  english_pob_choice: is detestable to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - les es repugnante
  - es repugnante para ustedes
  lexicon: HALOT
  rationale: El hebreo cierra con una valoración dirigida al destinatario; en español, la idea completa queda en el predicado «es repugnante para ustedes». El complemento «para ustedes» conserva el destinatario plural del mandato.
theological_decisions:
- issue: Valor ritual de שֶׁקֶץ en una ley alimentaria
  english_pob_reading: detestable
  chosen_spanish_reading: repugnante
  alternative_spanish_readings:
  - detestable
  - abominable
  - impuro
  rationale: La línea habla de prohibición ritual/dietaria, no de una evaluación moral general. «Repugnante» evita cargar el texto con usos más técnicos o posteriores de «abominable», y mantiene la fuerza del rechazo legal.
  doctrine_reference: Levítico 11; distinción entre pureza ritual y culpa moral general en la Torá
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marcador correspondiente dentro del texto español. La redacción sigue de cerca el hebreo y la solución inglesa auditada, pero adapta el léxico a un español natural.
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de ustedes para לָכֶם.
  - Se conserva la distinción entre el adjetivo descriptivo («alado») y la valoración ritual («repugnante»).
  - Se evita «SEÑOR» u otros equivalentes no pertinentes, ya que este versículo no contiene el nombre divino.
