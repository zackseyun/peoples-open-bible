translation:
  language: es
  text: Y su límite estaba desde Helef, desde el roble[a] en Zaannannim, y Adami-neceb y Jabneel, hasta Lakkum; y su extremo estaba en el Jordán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desde Elon-bezaanannim”; el hebreo puede entenderse tanto como un nombre de lugar compuesto como “el roble en/de Zaannannim”.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo literalmente: “sus salidas eran el Jordán”, un giro idiomático para indicar que los extremos del límite llegaban al Jordán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבוּלָם
  english_pob_choice: their border
  chosen_spanish: su límite
  alternatives_spanish:
  - su frontera
  - su borde territorial
  lexicon: HALOT
  rationale: גְבול designa el límite o frontera territorial. En español, ‘límite’ conserva bien la idea espacial de una delimitación en una lista de fronteras, sin sonar tan administrativo como ‘frontera’ ni tan poco natural como un calco.
- source_word: מֵחֵלֶף
  english_pob_choice: from Heleph
  chosen_spanish: desde Helef
  alternatives_spanish:
  - desde Helef
  - de Helef
  lexicon: HALOT
  rationale: Es un topónimo propio; se translitera. ‘Desde’ refleja mejor el valor de procedencia del hebreo en esta lista de linderos.
- source_word: מֵאֵלוֹן בְּצַעֲנַנִּים
  english_pob_choice: from the oak in Zaannannim
  chosen_spanish: desde el encinar de Zaanaim
  alternatives_spanish:
  - desde el roble de Zaanaim
  - desde el encino de Zaanaim
  - desde Elon-bezaanaim
  lexicon: HALOT
  rationale: El hebreo permite leer אֵלוֹן como un árbol grande, aquí mejor representado por ‘encinar’ en español para expresar el conjunto o la presencia de un árbol destacado de modo idiomático. Se mantiene la alternativa toponímica en nota porque la tradición textual admite también entenderlo como nombre propio compuesto.
- source_word: וַאֲדָמִי הַנֶּקֶב
  english_pob_choice: and Adami-nekeb
  chosen_spanish: y Adami-neceb
  alternatives_spanish:
  - y Adami, el paso
  - y Adami-ha-neceb
  lexicon: HALOT
  rationale: En esta secuencia de lindes, la forma más prudente es tratarlo como nombre propio compuesto. ‘Nebec’ conserva la consonancia del topónimo y evita imponer una glosa (‘el paso’) que el contexto no obliga a adoptar.
- source_word: וְיַבְנְאֵל
  english_pob_choice: and Jabneel
  chosen_spanish: y Jabneel
  alternatives_spanish:
  - y Yabneel
  lexicon: HALOT
  rationale: Topónimo propio; se conserva la transliteración tradicional ya consolidada en español bíblico.
- source_word: עַד לַקּוּם
  english_pob_choice: as far as Lakkum
  chosen_spanish: hasta Lakkum
  alternatives_spanish:
  - hasta Lakkum
  - así como Lakkum
  lexicon: HALOT
  rationale: עַד expresa alcance o extensión hasta un punto. ‘Hasta’ es la correspondencia natural en español y mantiene el carácter itinerario de la descripción.
- source_word: תֹצְאֹתָיו
  english_pob_choice: its end
  chosen_spanish: su extremo
  alternatives_spanish:
  - sus salidas
  - sus extremos
  - sus confines
  lexicon: HALOT
  rationale: La forma literal alude a ‘salidas’ o ‘extremidades’, pero en lenguaje de fronteras significa el punto terminal del límite. ‘Extremo’ conserva la imagen concreta y evita una expresión arcaica o ambigua.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Designación geográfica estándar; en español bíblico ‘el Jordán’ es clara y suficiente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente en cuanto a la estructura sobria (‘was from…; and its end was at the Jordan’) y conserva la lista de topónimos sin expandirla innecesariamente. También atiende la observación del auditor de que el final del versículo expresa un modismo de límite territorial, no una descripción narrativa de movimiento.
  spanish_consistency_notes:
  - Se prefirió ‘límite’ y ‘extremo’ para mantener coherencia con un campo semántico territorial uniforme.
  - Los topónimos se transliteran de forma consistente y sin añadir artículos innecesarios.
  - Se evitó ‘SEÑOR’ por no haber aquí sustitución del nombre divino, y no hay términos cristológicos o teológicos que requieran decisión doctrinal adicional.
