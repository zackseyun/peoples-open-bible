translation:
  text: Jesus said, “Blessed is the man who knows in which part the robbers are coming
    in, so that he will arise, gather his kingdom, and gird his loins beforehand,
    before they come in.”
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:58:14Z'
  footnotes:
  - marker: part
    text: Coptic ϩⲛ ⲁϣ ⲙ-ⲙⲉⲣⲟⲥ (lit. 'in which part'). This likely refers to the part
      or 'watch' of the night.
    reason: cultural_note
  - marker: gather his kingdom
    text: Unlike the Synoptic parallels (Matthew 24:43; Luke 12:39) where the householder
      simply stays awake to prevent a break-in, Thomas introduces the striking, active
      imagery of gathering one's 'kingdom' (ⲙⲛⲧⲉⲣⲟ) and girding one's loins.
    reason: textual_variant
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: Blessed
  rationale: Standard translation for the Greek loanword μακάριος, fitting the beatitude
    form.
  lexicon: BDAG
  alternatives:
  - Fortunate
  - Happy
- source_word: ⲙⲉⲣⲟⲥ
  chosen: part
  rationale: Greek loanword μέρος. In this context, it likely refers to a part or
    watch of the night, but translating it literally as 'part' preserves the exact
    phrasing of the Coptic.
  lexicon: Crum 197a
  alternatives:
  - watch
  - quarter
- source_word: ⲥⲱϩⲟⲩϩ
  chosen: gather
  rationale: Sahidic ⲥⲱⲟⲩϩ. Means to gather, collect, or assemble.
  lexicon: Crum 369a
  alternatives:
  - muster
  - collect
- source_word: ⲙⲛⲧⲉⲣⲟ
  chosen: kingdom
  rationale: A central theological term in Thomas. While some translators render it
    'domain' or 'estate' here to fit the parable's literal narrative, doing so obscures
    Thomas's deliberate use of 'kingdom' imagery.
  lexicon: Crum 299a
  alternatives:
  - domain
  - estate
  - forces
- source_word: ⲙⲟⲩⲣ
  chosen: gird
  rationale: Used with ⲉϫⲛ ⲧⲉϥϯⲡⲉ ('upon his loins'), this forms the standard idiom
    'to gird one's loins'.
  lexicon: Crum 181b
  alternatives:
  - bind
- source_word: ϩⲁⲧⲉϩⲏ
  chosen: beforehand
  rationale: Means 'at the beginning' or 'beforehand', emphasizing the preparation.
  lexicon: Crum 645b
  alternatives:
  - in advance
theological_decisions:
- issue: Translation of ⲙⲛⲧⲉⲣⲟ in a parable context
  chosen_reading: kingdom
  rationale: Although 'domain' or 'estate' might make more conventional sense for
    a householder preparing for robbers, Thomas consistently uses ⲙⲛⲧⲉⲣⲟ with theological
    weight. Translating it as 'kingdom' preserves the author's deliberate blending
    of the parable's narrative with his core theological motif.
  alternatives_noted:
  - domain
  - estate
drafter_notes: The translation preserves the distinct Thomasine vocabulary ('kingdom')
  rather than flattening it to fit the mundane setting of the parable ('estate' or
  'domain'). The Coptic text features several restorations in lacunae (e.g., ϩ[ⲛ ⲁϣ],
  [ⲉϥ]ⲛⲁⲧⲱⲟⲩⲛ, ⲙⲛⲧⲉ[ⲣⲟ]), but the context makes these restorations highly secure.
