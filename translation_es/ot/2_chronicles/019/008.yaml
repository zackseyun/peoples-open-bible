    text: Or 'for the LORD’s judgment,' that is, for cases governed by the LORD’s law.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''and they returned to Jerusalem.'' Some understand the text differently, such as ''and they sat/dwelt in Jerusalem,'' because the received wording is somewhat abrupt in context.'
    reason: alternative_reading
