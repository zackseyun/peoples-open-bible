revisions:
- from: Y no permitirá que la injusticia[a] permanezca entre ellos por más tiempo, y no habitará con ellos nadie que conozca la maldad.
  to: Y ya no permitirá que la injusticia[a] permanezca entre ellos, y nadie que conozca la maldad habitará con ellos.
  rationale: 'Se hace una reparación menor de estilo y coherencia: «ya no permitirá» refleja mejor ἔτι con negación en español natural, y se mejora el orden de la segunda cláusula. Se conserva la nota textual y la sustancia léxica del borrador.'
