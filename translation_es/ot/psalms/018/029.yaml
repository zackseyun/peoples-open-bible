revisions:
- from: Porque tú encenderás mi lámpara[a][b]; Yahvé, mi Dios, alumbrará mis tinieblas.
  to: Porque tú harás brillar mi lámpara[a]; Yahvé, mi Dios, alumbrará mi oscuridad[b].
  rationale: Se ajusta תָּאִיר a «harás brillar» para reflejar mejor el causativo de אור sin estrecharlo al acto de encender, y se restaura el singular «mi oscuridad» para corresponder directamente a חָשְׁכִּי y al expediente POB. Se conserva «Yahvé» según la política del proyecto y se reubica la nota b al lugar semánticamente correcto.
