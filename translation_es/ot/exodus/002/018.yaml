translation:
  language: es
  text: 'Cuando vinieron a Reuel, su padre, les dijo: «¿Por qué han vuelto tan pronto hoy?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con un giro más formal: «¿Por qué se apresuraron a venir hoy?». El hebreo usa el verbo «apresurarse» con «venir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹאנָה
  english_pob_choice: When they came
  chosen_spanish: Cuando vinieron
  alternatives_spanish:
  - Y vinieron
  - Entonces vinieron
  lexicon: HALOT
  rationale: El wayyiqtol femenino plural marca avance narrativo; «cuando vinieron» conserva la secuencia temporal natural en español sin perder la relación con el episodio anterior.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma natural en español con «a».
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Ragüel
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma hebrea directa «Reuel», como en la pauta del POB en inglés.
- source_word: אֲבִיהֶן
  english_pob_choice: their father
  chosen_spanish: su padre[a]
  alternatives_spanish:
  - su progenitor
  - su padre, es decir, el de ellas
  lexicon: HALOT
  rationale: El constructo con sufijo 3fp designa aquí al padre inmediato de las hijas. En español, «su padre» comunica el sentido normal; el anclaje de nota preserva la posible necesidad de aclaración relacional sin convertirlo en una paráfrasis.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: él les dijo
  alternatives_spanish:
  - dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El verbo introductorio de habla se vierte de modo idiomático. Se explicita el destinatario con «les» por claridad narrativa en español.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Para qué razón
  lexicon: HALOT
  rationale: Interrogativo causal directo y natural en español.
- source_word: מִהַרְתֶּן
  english_pob_choice: have you come back so quickly
  chosen_spanish: han llegado tan pronto
  alternatives_spanish:
  - han venido tan rápido
  - se apresuraron a venir
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa/rapidez. En español, «tan pronto» reproduce bien la sorpresa por la rapidez del retorno sin forzar una construcción poco natural.
- source_word: בֹּא
  english_pob_choice: come back
  chosen_spanish: llegado
  alternatives_spanish:
  - venir
  - volver
  lexicon: HALOT
  rationale: El infinitivo de בוא acompaña a מהר y, en contexto, apunta al movimiento de retorno. «Llegado» integra de forma natural la idea de haber regresado sin sobreexplicar.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: La forma definida se traduce con el adverbio temporal habitual en español.
translation_notes:
  revision_awareness: 'El texto original hebreo y el audit trail inglés coinciden en la lectura narrativa y en la dificultad léxica principal: מהר + בוא. La versión española conserva el sentido de sorpresa por la rapidez, sin adoptar una paráfrasis excesiva; también mantiene el nombre propio hebreo Reuel y la relación familiar explícita de אֲבִיהֶן.'
  spanish_consistency_notes:
  - Se usa «hoy» para הַיּוֹם, no «este día», por naturalidad y consistencia con el español bíblico contemporáneo.
  - Se conserva «Reuel» como transliteración directa del hebreo.
  - «Tan pronto» comunica la rapidez del movimiento sin perder la tensión léxica de מהר + בוא.
  - Se evita «SEÑOR» u otra adaptación teológica porque no hay aquí un término divino.
