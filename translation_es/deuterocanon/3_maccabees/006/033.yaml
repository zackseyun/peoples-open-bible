    rationale: Aunque intenta reflejar γενηθείσῃ, en español resulta más idiomático expresar que la liberación «había tenido lugar» o «habían experimentado».
  - severity: low
    issue: Redundancia de «Asimismo, también»
    rationale: El griego tiene ὡσαύτως δὲ καὶ, pero en español basta normalmente con «Igualmente, el rey también» o «Asimismo, el rey también» para conservar el valor acumulativo sin pesadez.
  - severity: low
