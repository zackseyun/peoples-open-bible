theological_decisions:
- issue: Interpretation of the curse's bodily effects
  chosen_reading: Render the effects in relatively literal but readable terms ('belly swell' / 'thigh waste away') without specifying miscarriage, infertility, or uterine prolapse in the main text.
  alternative_readings:
  - to make your womb miscarry and your abdomen swell
  - to make your womb swell and your thigh fall away
  - to make your belly swell and your genitals waste away
  rationale: The Hebrew phrase is notoriously difficult and likely euphemistic. The text clearly describes a divinely imposed bodily curse related to reproductive shame, but it does not unambiguously specify the exact medical outcome in this verse alone. Preserving the ambiguity aligns with the translation philosophy of not resolving tensions the source leaves open.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
