  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales están alineadas con el POB en cuanto a «por plata» y la preservación de la duplicación «no está vivo ... está muerto».
