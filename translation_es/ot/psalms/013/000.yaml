translation:
  language: es
  text: Al director del coro. Salmo de David[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el hebreo puede indicar autoría o asociación en los encabezados de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  - Al music director
  lexicon: HALOT
  rationale: En una superscripción de salmo, el hebreo funciona como destinatario o indicación para la dirección musical. «Al director del coro» conserva esa función y suena natural en español moderno sin perder el marco litúrgico-musical.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: El término es el rótulo genérico del género y en español bíblico «Salmo» es claro, reconocido y fiel al valor convencional del término en encabezados.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: '«De David» preserva en español la misma ambigüedad del hebreo: puede sugerir autoría, pertenencia o asociación, sin resolverla en exceso como lo haría «por David».'
theological_decisions:
- issue: Relación expresada por לְדָוִד en el encabezado
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El POB inglés decidió mantener la amplitud semántica del hebreo en vez de cerrar la lectura a una sola relación. En español, «de David» conserva esa tensión documental y evita afirmar autoría estricta donde el encabezado permite una gama más amplia de relaciones.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió la revisión que movió el marcador de nota para que acompañe a «David» y no a «director del coro», porque la nota trata de לְדָוִד y no de לַמְנַצֵּחַ.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre encabezado musical y atribución davídica.
  - Se evitó «SEÑOR» o equivalentes porque el texto no contiene el Tetragrámaton ni una cita de κύριος.
  - Se conservó la puntuación breve y el tono de superscripción poética propio del hebreo.
