translation:
  language: es
  text: ¿Quién ha rodeado tan sin ley con crueldades a los que desde el principio han sobresalido sobre todas las naciones en benevolencia para con nosotros en todo[a], y que repetidas veces se han mostrado en los peligros más graves entre los hombres[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Han sobresalido» sigue la lectura contextual de διαφέροντας como “superar/sobresalir”; la alternativa “difieren de” es posible léxicamente. También puede traducirse «han sobresalido sobre todas las naciones en todo» o «han superado a todas las naciones en todo».
    reason: lexical_alternative
  - marker: b
    text: «En los peligros más graves entre los hombres» intenta reflejar la expresión difícil del griego; el sentido exacto es idiomático y puede entenderse como peligros extremos en asuntos humanos o peligros sufridos por los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who has
  chosen_spanish: ¿Quién ha
  alternatives_spanish:
  - ¿Qué persona ha
  - ¿Quién es el que ha
  lexicon: LSJ
  rationale: La pregunta retórica en griego pide una interrogación directa; «¿Quién ha…?» conserva la fuerza y fluidez natural en español.
- source_word: τοὺς ἐξ ἀρχῆς
  english_pob_choice: those who from the beginning
  chosen_spanish: a los que desde el principio
  alternatives_spanish:
  - a los que desde el comienzo
  - a los que desde el inicio
  lexicon: LSJ
  rationale: La frase funciona sustantivamente para un grupo definido por una conducta prolongada; «desde el principio» preserva el valor temporal sin añadir matiz innecesario.
- source_word: εὐνοίᾳ πρὸς ἡμᾶς
  english_pob_choice: in goodwill toward us
  chosen_spanish: en benevolencia para con nosotros
  alternatives_spanish:
  - con benevolencia para con nosotros
  - en buena voluntad hacia nosotros
  lexicon: LSJ
  rationale: εὔνοια puede ser benevolencia, favor o buena voluntad. «Benevolencia» mantiene el tono elevado y el sentido relacional de la expresión.
- source_word: κατὰ πάντα διαφέροντας πάντων ἐθνῶν
  english_pob_choice: have surpassed all nations in every respect
  chosen_spanish: han sobresalido entre todas las naciones en todo aspecto
  alternatives_spanish:
  - han superado a todas las naciones en todo
  - difieren de todas las naciones en todo aspecto
  lexicon: LSJ
  rationale: διαφέρω aquí puede significar diferir o sobresalir; el contexto favorece la idea de superioridad. «Han sobresalido» deja abierta esa tensión y evita reducirla a una simple diferencia.
- source_word: τοὺς ... ἐπιδειγμένους
  english_pob_choice: who have repeatedly shown themselves
  chosen_spanish: que repetidas veces se han mostrado
  alternatives_spanish:
  - que repetidas veces se han demostrado
  - que muchas veces se han dado a conocer
  lexicon: LSJ
  rationale: El participio medio destaca la auto-manifestación o auto-demostración. «Se han mostrado» es natural en español y conserva el matiz reflexivo.
- source_word: χειρίστους ... κινδύνους
  english_pob_choice: the gravest dangers
  chosen_spanish: los peligros más graves
  alternatives_spanish:
  - los peores peligros
  - los peligros más terribles
  lexicon: LSJ
  rationale: χειρίστους es superlativo de malo; con κινδύνους expresa peligros extremos. «Más graves» conserva el peso sin sonar forzado.
- source_word: πλεονάκις
  english_pob_choice: repeatedly
  chosen_spanish: repetidas veces
  alternatives_spanish:
  - frecuentemente
  - muchas veces
  lexicon: LSJ
  rationale: El adverbio indica reiteración; «repetidas veces» reproduce con claridad la frecuencia insistente.
- source_word: ἀνθρώπων
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre las personas
  - de los hombres
  lexicon: LSJ
  rationale: La construcción es difícil; «entre los hombres» mantiene la referencia genérica y evita neutralizar el género donde el griego lo conserva.
- source_word: οὕτως ἀθέσμως
  english_pob_choice: so lawlessly
  chosen_spanish: tan ilegalmente
  alternatives_spanish:
  - tan sin ley
  - tan injustamente
  lexicon: LSJ
  rationale: ἀθέσμως denota actuar contra ley o norma. «Ilegalmente» expresa bien el valor jurídico; el adverbio «tan» refleja οὕτως.
- source_word: περιέβαλεν αἰκίαις
  english_pob_choice: has surrounded with cruelties
  chosen_spanish: ha rodeado con crueldades
  alternatives_spanish:
  - ha cercado con brutalidades
  - ha envuelto con abusos
  lexicon: LSJ
  rationale: περιβάλλω literalmente significa rodear; con αἰκίαις, el sentido es figurado y violento. «Crueldades» conserva la pluralidad y la intensidad del sustantivo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «in the gravest dangers» en lugar de «to face the worst dangers», evitando añadir la idea de enfrentar activamente. En español, por eso se eligió «en los peligros más graves» sin verbo adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» por no aparecer en el texto.
  - Se preservó la tensión de διαφέρω entre ‘diferir’ y ‘sobresalir’, optando por la lectura contextual sin borrar la alternativa.
  - Se usó lenguaje elevado pero moderno, apto para lectura eclesial amplia.
