revisions:
- from: A la orden de Yahvé acampaban[a], y a la orden de Yahvé partían. Guardaban la ordenanza de Yahvé a la orden de Yahvé por mano de Moisés.
  to: Por mandato de Yahvé acamparon, y por mandato de Yahvé partieron. Guardaron el encargo de Yahvé por mandato de Yahvé, por mano de Moisés[a].
  rationale: Se ajusta el tiempo verbal al pretérito narrativo español para reflejar mejor la recapitulación del hebreo; se reemplaza «ordenanza» por «encargo» para preservar el sentido de מִשְׁמֶרֶת como algo confiado para guardar; y se mejora la naturalidad de עַל־פִּי con «por mandato de». Se conserva «Yahvé» y el modismo «por mano de Moisés» con nota, conforme al rastro de auditoría inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura repetitiva del hebreo, el nombre divino Yahvé, y el modismo final «por mano de Moisés». Sin embargo, «acampaban/partían/guardaban» introduce un matiz imperfectivo-habitual no exigido por los yiqtol/qatal hebreos en esta recapitulación narrativa; en español aquí conviene el pretérito para reflejar mejor la secuencia resumida: «acamparon / partieron / guardaron». Además, מִשְׁמֶרֶת se acerca más a «encargo» o «custodia» que a «ordenanza», que en español suele sonar a estatuto/decreto y desplaza el sentido de algo confiado para guardar.'
  spanish_quality_summary: El texto es legible y digno, pero «a la orden de» suena menos bíblico-natural que «por mandato de» en esta triple repetición, y «la ordenanza de Yahvé» no comunica con claridad el valor custodial de מִשְׁמֶרֶת. La versión revisada mejora naturalidad, precisión semántica y paralelismo sin perder concisión.
  glossary_alignment: Alineado con la pauta del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales principales. La corrección propuesta ajusta la decisión léxica de מִשְׁמֶרֶת a «encargo», más acorde con el rastro inglés («charge») y con la semántica hebrea. Se mantiene «por mano de Moisés» con nota explicativa, conforme al audit trail.
  issues:
  - severity: medium
    issue: Uso de imperfectos españoles «acampaban / partían / guardaban»
    rationale: 'En esta recapitulación narrativa, el español suena más fiel y natural con pretérito simple: «acamparon / partieron / guardaron». El imperfecto añade habitualidad/progresividad que no es la mejor equivalencia aquí.'
  - severity: medium
    issue: «La ordenanza de Yahvé» para מִשְׁמֶרֶת
    rationale: «Ordenanza» en español suele referirse a una norma o decreto, mientras que el hebreo y el inglés auditado («the charge») apuntan a un encargo, responsabilidad o custodia que ellos guardaron.
  - severity: low
    issue: «A la orden de» repetido tres veces
    rationale: Es comprensible, pero «por mandato de» suena más idiomático y solemne en español bíblico contemporáneo para עַל־פִּי en este contexto de autoridad divina.
  revised_spanish_text: Por mandato de Yahvé acamparon, y por mandato de Yahvé partieron. Guardaron el encargo de Yahvé por mandato de Yahvé, por mano de Moisés[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «por mano de Moisés», un modismo que puede significar «por medio de Moisés» o «por Moisés como mediador».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el tiempo verbal al pretérito narrativo español para reflejar mejor la recapitulación del hebreo; se reemplaza «ordenanza» por «encargo» para preservar el sentido de מִשְׁמֶרֶת como algo confiado para guardar; y se mejora la naturalidad de עַל־פִּי con «por mandato de». Se conserva «Yahvé» y el modismo «por mano de Moisés» con nota, conforme al rastro de auditoría inglés.
