    issue: La nota [a] está anclada en la frase equivocada y describe erróneamente el verbo hebreo.
    rationale: En el POB inglés, [a] comenta el segundo verbo/miembro ('who bring field near to field') y da alternativas 'add/join field to field'. La nota española actual aparece tras 'casa con casa' y dice que el verbo es literalmente 'acercar', lo cual no corresponde a מַגִּיעֵי sino a יַקְרִיבוּ.
  - severity: medium
    issue: Uso de 'vosotros/quedáis' en un proyecto de español neutro latinoamericano.
    rationale: Aunque comprensible, el registro peninsular choca con el estilo objetivo del proyecto. Debe preferirse una forma ampliamente legible en América Latina.
  - severity: medium
    issue: '''quedáis habitando'' no expresa bien la pasividad causativa de וְהוּשַׁבְתֶּם.'
    rationale: El hebreo indica 'son hechos habitar / se les hace habitar', no simplemente 'quedan habitando'. La redacción actual atenúa la fuerza gramatical destacada por la auditoría inglesa.
