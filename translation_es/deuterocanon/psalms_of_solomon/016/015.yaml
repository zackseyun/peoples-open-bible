translation:
  language: es
  text: Cuando el justo[a] persevera en estas cosas[b], se le mostrará misericordia por Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hombre justo»; el griego usa una forma singular masculina que puede funcionar de modo representativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Al perseverar en estas cosas, el justo será mostrado misericordia por Yahvé»; el infinitivo articular con ἐν también puede expresarse de manera más instrumental o circunstancial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ὑπομεῖναι
  english_pob_choice: When ... endures
  chosen_spanish: Cuando ... persevera
  alternatives_spanish:
  - Al perseverar
  - En perseverar
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν puede expresar tiempo o medio. En español, «cuando» reproduce bien el valor temporal que el audit trail inglés privilegia, y «persevera» comunica con naturalidad la idea de mantenerse firme en la prueba.
- source_word: δίκαιον
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el justo/a
  lexicon: BDAG
  rationale: El griego usa una forma singular masculina con fuerza sustantiva. «El justo» conserva esa función nominal sin cargar innecesariamente el texto; además, en español es una forma estable y comprensible para un uso representativo.
- source_word: ἐν τούτοις
  english_pob_choice: in these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - por estas cosas
  - en tales circunstancias
  lexicon: BDAG
  rationale: La frase remite de manera directa a las aflicciones mencionadas antes. «En estas cosas» mantiene la referencia retrospectiva explícita sin especificar más de lo que dice el griego.
- source_word: ἐλεηθήσεται
  english_pob_choice: will be shown mercy
  chosen_spanish: será mostrado misericordia
  alternatives_spanish:
  - recibirá misericordia
  - alcanzará misericordia
  lexicon: BDAG
  rationale: Se preserva el pasivo y el campo semántico de misericordia. Aunque «será mostrado misericordia» es menos idiomático que otras opciones, sigue de cerca la construcción pasiva y la decisión inglesa de mantener la pasiva visible.
- source_word: ὑπὸ Κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - por Yahvé
  - del Señor
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agente del pasivo. «Por el Señor» conserva esa relación agentiva. Aquí no se usa «Yahvé» porque el texto griego presenta κύριος como designación directa; el audit trail inglés también opta por «Lord» sin señalar una cita explícita del nombre divino.
theological_decisions:
- issue: Tratamiento de κύριος en la clausula final
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  rationale: La lectura devocional del verso y la función de κύριος como agente del pasivo favorecen «Señor». Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el griego ofrece κύριος sin indicación explícita de sustitución del nombre divino, por lo que «Señor» es la opción más prudente y concordante con el audit trail.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el control inglés y no requiere revisión textual adicional; la redacción española busca mantener visible la estructura pasiva y la referencia retrospectiva de ἐν τούτοις, con ajuste de naturalidad mínima.
  spanish_consistency_notes:
  - Se conserva «el justo» como sustantivo representativo, en línea con la decisión inglesa sobre δίκαιον.
  - Se mantiene «Señor» para κύριος en la cláusula final, coherente con el audit trail y sin introducir una cita explícita del nombre divino.
  - La construcción «será mostrado misericordia» sigue de cerca la pasiva griega y la elección inglesa, aunque suena marcada en español; se deja así por fidelidad formal al patrón auditado.
