translation:
  language: es
  text: 'Entonces vi toda la obra de Dios: que el hombre no puede hallar la obra que se hace debajo del sol[a]. Por mucho que el hombre trabaje para buscarla, no la hallará; e incluso si el sabio dice que sabe[b], no la podrá hallar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad no puede hallar». El hebreo usa el singular genérico «el hombre» para referirse a la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «el sabio afirma saber» o «pretende saber».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: Then I saw
  chosen_spanish: Entonces vi
  alternatives_spanish:
  - Y vi
  - Así vi
  lexicon: HALOT
  rationale: La partícula וְ con perfecto continúa el discurso con sentido consecutivo/narrativo. «Entonces vi» conserva el avance de la observación de Qohelet y suena natural en español.
- source_word: מַעֲשֵׂה הָאֱלֹהִים
  english_pob_choice: the work of God
  chosen_spanish: la obra de Dios
  alternatives_spanish:
  - el trabajo de Dios
  - la actividad de Dios
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede abarcar obra, trabajo o actividad. «Obra de Dios» es la forma más clara y digna en español, y mantiene la repetición conceptual con la expresión posterior «la obra».
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa el singular genérico con valor representativo. «El hombre» conserva esa fuerza genérica en español y sigue la decisión documental de no neutralizarla sin necesidad textual.
- source_word: לִמְצוֹא
  english_pob_choice: find out
  chosen_spanish: hallar
  alternatives_spanish:
  - descubrir
  - encontrar
  lexicon: HALOT
  rationale: Aquí el verbo expresa alcanzar comprensión o descubrimiento de lo que Dios hace. «Hallar» funciona bien en español y puede repetirse en la frase final para conservar la correspondencia léxica.
- source_word: הַמַּעֲשֶׂה אֲשֶׁר נַעֲשָׂה תַחַת הַשֶּׁמֶשׁ
  english_pob_choice: the work that is done under the sun
  chosen_spanish: la obra que se hace debajo del sol
  alternatives_spanish:
  - la obra que se hace bajo el sol
  - lo que se hace debajo del sol
  lexicon: HALOT
  rationale: Se mantiene la repetición de «obra» y el pasivo/reflexivo «se hace». «Debajo del sol» conserva literalmente el refrán de Eclesiastés; «bajo» sería igualmente posible, pero «debajo» sigue más de cerca la imagen espacial.
- source_word: בְּשֶׁל אֲשֶׁר
  english_pob_choice: However much
  chosen_spanish: Por mucho que
  alternatives_spanish:
  - Aun cuando
  - Porque
  lexicon: HALOT
  rationale: La expresión introduce el esfuerzo humano que, pese a todo, no logra el resultado. «Por mucho que» capta bien la concesión idiomática sin forzar una causalidad que el contexto no pide.
- source_word: יַעֲמֹל
  english_pob_choice: labors
  chosen_spanish: trabaje
  alternatives_spanish:
  - se fatigue
  - se esfuerce
  lexicon: HALOT
  rationale: עָמַל en Eclesiastés tiene la idea de trabajo fatigoso o penoso. «Trabaje» es natural y suficientemente fuerte en español; la fuerza de esfuerzo se refuerza con el contexto de la búsqueda infructuosa.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek it out
  chosen_spanish: para buscarla
  alternatives_spanish:
  - para buscarlo
  - para investigarla
  lexicon: HALOT
  rationale: El infinitivo expresa la finalidad del esfuerzo. «Buscarla» conserva la referencia femenina a «la obra» y mantiene la relación con el hecho de intentar comprenderla.
- source_word: וְלֹא יִמְצָא
  english_pob_choice: he will not find it
  chosen_spanish: no la hallará
  alternatives_spanish:
  - no la encontrará
  - no podrá hallarla
  lexicon: HALOT
  rationale: El imperfecto expresa resultado/falla futura en sentido general. «No la hallará» es idiomático y corresponde bien con el verbo anterior «hallar».
- source_word: וְגַם אִם יֹאמַר הֶחָכָם לָדַעַת
  english_pob_choice: and even if the wise man says he knows
  chosen_spanish: y aun si el sabio dice que sabe
  alternatives_spanish:
  - y aun si el sabio afirma saber
  - y aun si el sabio dice que conoce
  lexicon: HALOT
  rationale: La construcción es elíptica; el sentido es una pretensión o declaración de conocimiento. «Dice que sabe» es natural en español y conserva la ambigüedad entre saber real y afirmación de saber.
- source_word: לֹא יוּכַל לִמְצֹא
  english_pob_choice: he cannot find it out
  chosen_spanish: no la podrá hallar
  alternatives_spanish:
  - no podrá descubrirla
  - no podrá encontrarla
  lexicon: HALOT
  rationale: Se repite la imposibilidad con el mismo verbo base para sostener la cohesión del versículo. «No la podrá hallar» mantiene la negación enfática y la referencia a la obra ya mencionada.
theological_decisions:
- issue: Valor genérico de הָאָדָם en una afirmación sobre la incapacidad humana
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - una persona
  rationale: El hebreo presenta un singular genérico, no un individuo masculino específico. «El hombre» preserva esa forma representativa y evita una paráfrasis abstracta que debilite la concreción del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'El texto coincide con el patrón de la POB inglesa revisada: mantiene el paralelismo de «hallar / no hallar», conserva el singular genérico de אָדָם y refleja la incertidumbre final con una formulación natural en español. No se detectaron revisiones textuales que obligaran a cambios adicionales respecto del audit trail provisto.'
  spanish_consistency_notes:
  - Se conservó «obra» de manera consistente para מַעֲשֶׂה en ambas ocurrencias, evitando alternar con «trabajo» para no diluir el paralelismo.
  - Se mantuvo «debajo del sol» por ser un refrán clave de Eclesiastés y por seguir de cerca la imagen hebrea.
  - Se usó «hallar» en todo el versículo para reproducir la repetición léxica de לִמְצוֹא / יִמְצָא y la clausura enfática del verso.
  - La referencia femenina en «buscarla» y «hallarla» sigue a «la obra», sin cambiar el antecedente semántico del hebreo.
