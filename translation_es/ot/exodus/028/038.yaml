  to: Estará sobre la frente de Aarón, y Aarón llevará la iniquidad[a] de las cosas santas que los hijos de Israel[c] consagren, por todas las ofrendas de sus cosas santas. Estará siempre sobre su frente, para aceptación para ellos[b] delante de Yahvé.
  rationale: Se corrige el anclaje de las notas para que coincidan con las expresiones pertinentes del texto y se restituye 'iniquidad' en el cuerpo principal para reflejar mejor la decisión léxica auditada sobre נָשָׂא עָוֺן, dejando 'cargar con la culpa' como alternativa explicativa en nota. El resto del versículo puede mantenerse por su fidelidad al hebreo, aunque conserve cierta aspereza intencional.
