base_translation:
  language: en
  yaml_path: translation/ot/ezra/009/013.yaml
  text: And after all that has come upon us because of our evil deeds and our great guilt—though you[a], our God[b], have withheld from us less than our iniquities deserved and have given us such a remnant as this—
  footnotes:
  - marker: a
    text: Or, 'have spared us more than our iniquities warranted.' The Hebrew idiom literally speaks of God withholding judgment below the measure of their guilt.
    reason: lexical_alternative
  - marker: b
    text: Or, 'an escape' or 'survivors.' The term refers to those preserved through judgment; 'remnant' brings out the post-exilic covenant context.
    reason: lexical_alternative
