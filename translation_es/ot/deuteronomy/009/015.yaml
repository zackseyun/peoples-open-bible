translation:
  language: es
  text: Así que me volví y descendí del monte, y el monte ardía con fuego[a], y las dos tablas del pacto estaban en mis dos manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «y el monte ardía con fuego». La conjunción hebrea puede leerse como mera coordinación; el contexto también admite un sentido circunstancial, pero aquí se mantiene la coordinación simple.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «sobre mis dos manos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵפֶן
  english_pob_choice: So I turned
  chosen_spanish: Así que me volví
  alternatives_spanish:
  - Entonces me volví
  - Me volví
  lexicon: HALOT
  rationale: פנה en este contexto narra una acción secuencial de giro o cambio de dirección. «Me volví» es natural y fiel; «Así que» conserva el enlace narrativo que en inglés POB se expresó con «So» sin volverlo pesado.
- source_word: וָאֵרֵד
  english_pob_choice: came down
  chosen_spanish: descendí
  alternatives_spanish:
  - bajé
  - bajé del monte
  lexicon: HALOT
  rationale: ירד significa «bajar/descender». Aquí, «descendí» mantiene el valor verbal directo del hebreo y encaja bien con el registro bíblico; el complemento «del monte» ya aclara el movimiento.
- source_word: מִן הָהָר
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - desde el monte
  lexicon: HALOT
  rationale: El hebreo se refiere al monte específico de la escena. «Monte» es idiomático y solemne en español bíblico; «del» expresa correctamente מִן.
- source_word: וְהָהָר בֹּעֵר בָּאֵשׁ
  english_pob_choice: and the mountain was burning with fire
  chosen_spanish: y el monte ardía en fuego
  alternatives_spanish:
  - y el monte estaba ardiendo con fuego
  - y el monte estaba ardiendo en fuego
  lexicon: HALOT
  rationale: בֹּעֵר denota ardor o estar ardiendo; בָּאֵשׁ intensifica la imagen de fuego. «Ardía en fuego» preserva la fuerza imagética sin sonar artificial en español y evita introducir una lectura temporal específica más allá de la simple coordinación hebrea.
- source_word: וּשְׁנֵי לֻחֹת הַבְּרִית
  english_pob_choice: and the two tablets of the covenant
  chosen_spanish: y las dos tablas del pacto
  alternatives_spanish:
  - y las dos tablas de la alianza
  - y las dos tablas del convenio
  lexicon: HALOT
  rationale: לֻחֹת son «tablas» o «tablas de piedra» en este contexto. POB usa «tables/tablets» en inglés; en español «tablas» es la forma más natural y transparente. הַבְּרִית se traduce como «pacto», una opción bíblica clara y precisa para covenant.
- source_word: עַל שְׁתֵּי יָדָי
  english_pob_choice: were in my two hands
  chosen_spanish: estaban en mis dos manos
  alternatives_spanish:
  - estaban sobre mis dos manos
  - estaban en ambas manos
  lexicon: HALOT
  rationale: עַל es literalmente «sobre/upon», pero el sentido idiomático es que Moisés las llevaba consigo. «Estaban en mis dos manos» comunica el estado físico con claridad y conserva el numeral explícito del hebreo.
theological_decisions:
- issue: Representación del nombre divino en este versículo sin sustituirlo por un título genérico
  english_pob_reading: This verse does not contain the divine name, but the context belongs to the direct Sinai narrative where POB preserves source-driven divine naming elsewhere.
  chosen_spanish_reading: No se introduce ningún sustituto devocional; se mantiene el lenguaje concreto de la escena.
  alternative_spanish_readings:
  - usar «SEÑOR» por convención litúrgica
  - insertar un título teológico en el texto
  rationale: El versículo no contiene יהוה ni un equivalente directo. Por tanto, no hay motivo para imponer una convención de máscara nominal. Mantener la escena concreta respeta la fuente y evita una expansión teológica no solicitada por el hebreo.
  doctrine_reference: Éxodo/Sinai narrative; divine-name policy
- issue: Relación entre la coordinación hebrea y una lectura temporal de simultaneidad
  english_pob_reading: 'The latest English revision removed ''while'' and retained simple coordination: ''and the mountain was burning with fire.'''
  chosen_spanish_reading: 'Se traduce con coordinación simple: «y el monte ardía en fuego».'
  alternative_spanish_readings:
  - «mientras el monte ardía en fuego»
  - «cuando el monte ardía en fuego»
  rationale: La revisión inglesa explícitamente evitó imponer una relación temporal fuerte que el hebreo no marca de forma inequívoca. El español conserva esa cautela con una simple coordinación, sin añadir «mientras» ni «cuando».
  doctrine_reference: Hebrew syntax / discourse coordination
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB en inglés, que sustituyó una lectura temporal explícita por coordinación simple. Por eso el español evita «mientras» y mantiene una secuencia narrativa directa sin sobreinterpretar la sintaxis hebrea.
  spanish_consistency_notes:
  - Se conserva «monte» para הָהָר por coherencia bíblica y porque es más natural que «montaña» en este registro.
  - Se usa «tablas» para לֻחֹת, siguiendo el valor material del contexto sin introducir «tablas de piedra» al no ser necesario aquí.
  - Se traduce הַבְּרִית como «pacto», un término bíblico estable y amplio en español.
  - Se mantiene «mis dos manos» para preservar el numeral explícito y la imaginería corporal del hebreo.
  - No se usa «SEÑOR» ni «Cristo», porque el versículo no contiene esos términos ni una referencia que lo exija.
