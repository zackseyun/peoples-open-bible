translation:
  language: es
  text: Cuando entres en la mies en pie de tu prójimo, podrás arrancar espigas[a] con tu mano[b], pero no le pondrás la hoz a la mies en pie de tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cabezas de grano» o «espigas de grano»; la expresión hebrea se refiere a la parte del cereal que puede arrancarse a mano.
    reason: lexical_alternative
  - marker: b
    text: O «a mano»; el hebreo subraya que la acción permitida es manual, no con herramienta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto legal, כִּי introduce una situación regulada; «Cuando» conserva el valor casuístico de la cláusula mejor que un condicional más hipotético.
- source_word: תָבֹא
  english_pob_choice: you come
  chosen_spanish: entres
  alternatives_spanish:
  - vengas
  - entres en
  lexicon: HALOT
  rationale: «Entrar» expresa bien el movimiento hacia el campo ajeno. En español, la forma subjuntiva con «cuando» suena natural y mantiene el sentido directivo del hebreo.
- source_word: בְּקָמַת
  english_pob_choice: into ... standing grain
  chosen_spanish: en la mies en pie
  alternatives_spanish:
  - en el grano en pie
  - en la cosecha en pie
  lexicon: HALOT
  rationale: קָמָה se refiere al grano aún en pie, no a la cosecha ya recogida. «Mies en pie» preserva esa especificidad con un término bíblico claro en español.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor’s
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - de tu vecino
  - de tu compañero
  lexicon: HALOT
  rationale: En este marco legal, רֵעַ designa al otro miembro de la comunidad. «Prójimo» comunica bien esa relación sin reducirla a simple vecindad geográfica.
- source_word: וְקָטַפְתָּ
  english_pob_choice: you may pluck
  chosen_spanish: podrás arrancar
  alternatives_spanish:
  - podrás desgranar
  - podrás recoger
  lexicon: HALOT
  rationale: El gesto permitido es arrancar las espigas manualmente. «Arrancar» conserva la acción concreta y la fuerza permisiva del contexto; «podrás» expresa autorización.
- source_word: מְלִילֹת
  english_pob_choice: heads
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - mieses
  lexicon: HALOT
  rationale: La palabra hebrea designa las cabezas/espigas de grano que pueden tomarse a mano. «Espigas» es el equivalente más natural y claro en español; la nota mantiene la alternativa «mies en pie» para el cultivo completo.
- source_word: בְּיָדֶךָ
  english_pob_choice: with your hand
  chosen_spanish: con tu mano
  alternatives_spanish:
  - de mano
  - a mano
  lexicon: HALOT
  rationale: 'La preposición marca el modo permitido: solo manualmente. «Con tu mano» es la forma más transparente en español.'
- source_word: וְחֶרְמֵשׁ
  english_pob_choice: but ... a sickle
  chosen_spanish: pero no pondrás la hoz
  alternatives_spanish:
  - pero no tomarás la hoz
  - sino que no usarás la hoz
  lexicon: HALOT
  rationale: Se conserva el contraste entre el arranque a mano y el uso prohibido de una herramienta. «Hoz» es el equivalente natural de חֶרְמֵשׁ.
- source_word: לֹא תָנִיף
  english_pob_choice: you shall not put a sickle to
  chosen_spanish: no pondrás
  alternatives_spanish:
  - no alzarás
  - no blandirás
  - no usarás
  lexicon: HALOT
  rationale: El hebreo sugiere aplicar o mover la hoz sobre la mies; la revisión inglesa favorece «put a sickle to». En español, «poner la hoz sobre» comunica ese uso instrumental sin endurecerlo con un giro demasiado técnico.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: En español, con la idea de aplicar la hoz a la mies, «sobre» refleja mejor la relación espacial del hebreo que una traducción más interpretativa como «contra».
- source_word: קָמַת רֵעֶךָ
  english_pob_choice: your neighbor’s standing grain
  chosen_spanish: la mies en pie de tu prójimo
  alternatives_spanish:
  - el grano en pie de tu prójimo
  - la cosecha en pie de tu prójimo
  lexicon: HALOT
  rationale: 'La repetición del sintagma conserva el objeto exacto de la prohibición: no la tierra en general, sino el grano aún no cosechado de otro.'
theological_decisions:
- issue: Permiso limitado de espigar frente a prohibición de cosechar con herramienta
  english_pob_reading: You may pluck heads with your hand, but you shall not put a sickle to your neighbor’s standing grain.
  chosen_spanish_reading: Podrás arrancar espigas con tu mano, pero no pondrás la hoz sobre la mies en pie de tu prójimo.
  alternative_spanish_readings:
  - Podrás recoger espigas con tu mano, pero no usarás la hoz sobre la mies en pie de tu prójimo.
  - Podrás arrancar espigas con tu mano, pero no blandirás la hoz sobre la mies en pie de tu prójimo.
  rationale: 'La traducción mantiene la distinción ética y legal del texto: se permite tomar manualmente lo necesario, pero se prohíbe un acto de cosecha que invada el derecho del vecino. No se suaviza la restricción, porque el hebreo distingue claramente entre tomar con la mano y aplicar la hoz.'
  doctrine_reference: Éxodo 23:10-11; Levítico 19:9-10
- issue: Elección de «prójimo» para רֵעַ
  english_pob_reading: your neighbor’s
  chosen_spanish_reading: de tu prójimo
  alternative_spanish_readings:
  - de tu vecino
  - de tu hermano
  rationale: «Prójimo» preserva el alcance comunitario y ético del término sin reducirlo solo a proximidad residencial. En un mandato de justicia social, esta palabra mantiene el tono relacional de la legislación.
  doctrine_reference: Levítico 19:18
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió «put a sickle to» frente a una formulación más interpretativa. La versión española refleja esa literalidad moderada con «poner la hoz sobre», manteniendo el contraste entre la recolección manual permitida y el uso de la hoz prohibido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando el hebreo lo exige explícitamente; este verso no contiene el nombre divino.
  - Se evitó «SEÑOR» porque no corresponde aquí a la textura lexical del texto.
  - Se prefirió un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Mies en pie» y «espigas» se distribuyen para distinguir el cultivo en su estado y la parte concreta que puede tomarse.
