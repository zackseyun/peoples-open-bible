review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa básica del hebreo: Elías se acostó, durmió bajo la retama, un ángel lo tocó y le habló. También conserva correctamente la nota léxica sobre מַלְאָךְ como «ángel / mensajero». Sin embargo, introduce un matiz no sustentado por el hebreo ni por la auditoría inglesa al traducir רֹתֶם אֶחָד como «un retama solitaria». אֶחָד aquí funciona como indefinido («una/un»), no como «solitaria».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero contiene un problema gramatical: «un retama» choca con el uso más natural de «la/una retama». Además, la nota [a] está anclada en «he aquí» cuando en realidad explica «ángel»; el marcador debe moverse al término pertinente. «Y he aquí» es aceptable, aunque algo tradicional; puede mantenerse por fidelidad estilística.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Ángel» con nota alternativa «mensajero» está bien. La elección «retama» es adecuada; lo que debe corregirse es el añadido interpretativo «solitaria» y el artículo asociado.
  issues:
  - severity: high
    issue: «retama solitaria» añade un matiz no presente en רֹתֶם אֶחָד
    rationale: La auditoría inglesa documenta que אֶחָד funciona idiomáticamente como indefinido «a», no como descriptor de soledad. «Solitaria» sobretraduce y altera el sentido fuente.
  - severity: medium
    issue: «un retama» suena antinatural/gráficamente incorrecto en español estándar
    rationale: 'En uso bíblico general y español común, «retama» se maneja naturalmente como femenino: «una retama». La forma actual perjudica la legibilidad.'
  - severity: medium
    issue: El marcador [a] está colocado sobre «he aquí» pero la nota trata de «ángel»
    rationale: Los marcadores deben anclarse exactamente en la palabra o frase explicada. La nota léxica sobre מַלְאָךְ debe ir en «ángel», no en el marcador discursivo וְהִנֵּה.
  - severity: low
    issue: La nota [b] sobre «retama» no es necesaria para resolver una ambigüedad real en español
    rationale: Puede conservarse si se desea auditabilidad botánica, pero no es indispensable. Aun así, no daña si queda bien anclada.
  revised_spanish_text: 'Entonces él se acostó y durmió bajo una retama[b]. Y he aquí, un ángel[a] lo tocó y le dijo: «Levántate, come»'
  revised_footnotes:
