    rationale: La evidencia auditada conserva la posibilidad de entender אֶל de forma más contextual como palabras «sobre» o «acerca de» Israel y Judá. Si se mantiene una nota, debe expresar esa alternativa de manera comprensible en español.
  revised_spanish_text: Y estas son las palabras que Yahvé habló a Israel y a Judá[a].
