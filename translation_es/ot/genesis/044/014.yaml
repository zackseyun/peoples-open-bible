translation:
  language: es
  text: Entonces Judá y sus hermanos entraron en la casa de José. Él todavía estaba allí[a], y cayeron ante él a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entraron en la casa de José, y él todavía estaba allí, y cayeron»; el hebreo también puede puntuarse como una sola secuencia narrativa.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron
  - llegaron
  lexicon: HALOT
  rationale: El verbo בוא en este contexto narra el avance de la acción. En español, «entraron» expresa con naturalidad el movimiento hacia el interior de la casa, que es el sentido que el contexto exige.
- source_word: יְהוּדָה וְאֶחָיו
  english_pob_choice: Judah and his brothers
  chosen_spanish: Judá y sus hermanos
  alternatives_spanish:
  - Judá con sus hermanos
  - Judá y los hermanos de él
  lexicon: HALOT
  rationale: Se conserva la identificación explícita de Judá como figura principal y la referencia relacional de אֶחָיו como «sus hermanos», sin añadir ni omitir participantes.
- source_word: בֵּיתָה יוֹסֵף
  english_pob_choice: into Joseph’s house
  chosen_spanish: en la casa de José
  alternatives_spanish:
  - a la casa de José
  - dentro de la casa de José
  lexicon: HALOT
  rationale: El sufijo direccional de בֵּיתָה señala movimiento hacia el interior. En español, «entraron en la casa de José» comunica ese ingreso de manera natural y fiel.
- source_word: וְהוּא עוֹדֶנּוּ שָׁם
  english_pob_choice: and he was still there
  chosen_spanish: Él todavía estaba allí
  alternatives_spanish:
  - y él todavía estaba allí
  - aún estaba allí
  lexicon: HALOT
  rationale: 'עוֹדֶנּוּ expresa continuidad: «todavía». «Él todavía estaba allí» mantiene la escena sin volverla artificial en español. Se conserva el pronombre explícito para sostener la referencia a José.'
- source_word: וַיִּפְּלוּ
  english_pob_choice: they fell
  chosen_spanish: se postraron
  alternatives_spanish:
  - cayeron
  - se inclinaron
  lexicon: HALOT
  rationale: Aunque el verbo básico es «caer», el contexto de reverencia ante José hace que el gesto sea mejor explicado en español como «se postraron». Esto preserva el valor pragmático del acto sin perder su carácter físico.
- source_word: לְפָנָיו אָרְצָה
  english_pob_choice: before him ... to the ground
  chosen_spanish: ante él hasta el suelo
  alternatives_spanish:
  - delante de él hasta la tierra
  - en su presencia hasta el suelo
  lexicon: HALOT
  rationale: La combinación de לְפָנָיו y אָרְצָה intensifica la idea de postración completa. «Ante él hasta el suelo» conserva la dirección («ante él») y la intensidad del gesto («hasta el suelo») en un español claro.
theological_decisions:
- issue: El gesto de los hermanos ante José puede describirse como caída simple o postración reverente.
  english_pob_reading: they fell to the ground before him
  chosen_spanish_reading: se postraron ante él hasta el suelo
  alternative_spanish_readings:
  - cayeron ante él al suelo
  - se inclinaron ante él
  rationale: El hebreo combina el verbo caer con un complemento direccional que refuerza la reverencia corporal. En español, «se postraron» evita rebajar el gesto a una mera caída accidental y preserva la tensión narrativa de sumisión ante José.
  doctrine_reference: Uso narrativo y gestual del AT; no implica adoración divina, sino reverencia/prostración cortesana.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que separa la cláusula circunstancial sobre la permanencia de José de la acción siguiente. En español, esa relación se refleja con dos oraciones coordinadas, manteniendo claridad narrativa sin perder el encadenamiento del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «José» y no se sustituyó por un equivalente más tradicional, para conservar la referencia narrativa concreta.
  - Se eligió «postraron» por la fuerza gestual del contexto, con nota para no confundirlo con adoración divina.
  - Se evitó el calco rígido de la secuencia hebrea para lograr un español natural y publicable sin perder los matices de dirección y reverencia.
