translation:
  language: es
  text: Los hijos de Ulam eran hombres valientes, los que tensan el arco[a], y tenían muchos hijos y nietos, ciento cincuenta[c]. Todos estos eran de los hijos de Benjamín[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los que doblan» o «tensan el arco».
    reason: lexical_alternative
  - marker: b
    text: 'O: «estaban entre los hijos de Benjamín», es decir, eran descendientes de la tribu de Benjamín.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ciento cincuenta en total».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - llegaron a ser
  lexicon: HALOT
  rationale: En este contexto genealógico, el wayyiqtol introduce una descripción estable de los descendientes de Ulam; 'eran' comunica mejor el estado descriptivo que una lectura de cambio como 'llegaron a ser'.
- source_word: בְנֵי א֠וּלָם
  english_pob_choice: The sons of Ulam
  chosen_spanish: Los hijos de Ulam
  alternatives_spanish:
  - Los hijos de Ulam
  - Los descendientes de Ulam
  lexicon: HALOT
  rationale: '''Hijos'' conserva la fórmula genealógica hebrea de manera natural en español y refleja la cadena constructa sin sobreinterpretarla.'
- source_word: אֲנָשִׁים גִּבֹּרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - hombres de valor
  - guerreros valerosos
  lexicon: HALOT
  rationale: La expresión es una fórmula de prestigio y capacidad; en español, 'hombres valientes' conserva el énfasis en valor y fortaleza sin introducir un matiz épico innecesario.
- source_word: דֹּרְכֵי קֶשֶׁת
  english_pob_choice: drawers of the bow
  chosen_spanish: tiradores del arco
  alternatives_spanish:
  - tensores del arco
  - arqueros
  - los que tensan el arco
  lexicon: HALOT
  rationale: La elección sigue de cerca la imagen verbal del hebreo ('los que doblan/tensan el arco') y evita sustituirla por el término más general 'arqueros', que perdería parte de la forma lexical documentada por la POB inglesa.
- source_word: וּמַרְבִּים בָּנִים וּבְנֵי בָנִים
  english_pob_choice: and had many sons and grandsons
  chosen_spanish: y tuvieron muchos hijos y nietos
  alternatives_spanish:
  - y multiplicaban hijos e hijos de hijos
  - y tenían muchos hijos y nietos
  - y engendraban muchos hijos y nietos
  lexicon: HALOT
  rationale: El participio indica abundancia de descendencia; en español, 'tuvieron muchos hijos y nietos' expresa de forma clara y genealógica el resultado, sin forzar una traducción demasiado literal de la forma verbal.
- source_word: מֵאָה וַחֲמִשִּׁים
  english_pob_choice: one hundred and fifty
  chosen_spanish: ciento cincuenta
  alternatives_spanish:
  - cien y cincuenta
  - ciento cincuenta en total
  lexicon: HALOT
  rationale: El número cardinal expresa el total de hijos y nietos; 'ciento cincuenta' es la forma normal y transparente en español.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Todos estos juntos
  lexicon: HALOT
  rationale: Formula conclusiva resumidora; 'Todos estos' mantiene cercanía al hebreo y funciona bien en el cierre genealógico.
- source_word: מִבְּנֵי בִנְיָמִן
  english_pob_choice: were from the sons of Benjamin
  chosen_spanish: eran de los hijos de Benjamín
  alternatives_spanish:
  - eran descendientes de Benjamín
  - pertenecían a los hijos de Benjamín
  - eran benjaminitas
  lexicon: HALOT
  rationale: La construcción con מן + בני señala pertenencia u origen tribal. 'De los hijos de Benjamín' preserva la fórmula genealógica y la relación tribal sin imponer una etiqueta más interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió 'drawers of the bow' y mantuvo el número sin el participio 'totaling'; en español se conserva esa literalidad controlada con una formulación natural ('tiradores del arco', 'ciento cincuenta') y se explican en notas las alternativas lexicales y genealógicas.
  spanish_consistency_notes:
  - Se mantiene 'hijos' como fórmula genealógica para בני, en coherencia con el registro de Crónicas.
  - Se traduce la imagen del arco de forma semiformal ('tiradores del arco') para conservar la fuerza lexical sin caer en un calco demasiado duro.
  - No se introduce 'Cristo', 'Señor' ni otras terminologías no presentes en el pasaje.
  - El número se deja en forma cardinal simple, acorde con la lectura sumaria del verso.
