translation:
  language: es
  text: Porque la sabiduría de Yahvé es abundante[a]; él es poderoso en poder y ve todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo סָפְקָה puede sugerir «es suficiente» o «ha provisto», pero el paralelo griego lee «grande/abundante», lo que aquí apoya el sentido de abundancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָפְקָה
  english_pob_choice: is abundant
  chosen_spanish: es abundante
  alternatives_spanish:
  - es suficiente
  - ha provisto
  - es grande
  lexicon: HALOT
  rationale: El hebreo puede sugerir suficiencia o provisión, pero el paralelo griego πολλὴ apoya el sentido de abundancia. En español, «es abundante» conserva esa fuerza predicativa sin volverla mecánica.
- source_word: חָכְמַת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - conocimiento
  - prudencia
  lexicon: HALOT
  rationale: Es el equivalente estándar y natural para חכמה; no hay razón contextual para variar el término.
- source_word: יְהֹוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: El texto hebreo lleva el nombre divino directamente. Conforme a la política del proyecto en español, se conserva «Yahvé» para no enmascarar el Tetragrámaton.
- source_word: אַמִּיץ
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - valiente
  lexicon: HALOT
  rationale: El adjetivo expresa fuerza o poder. En español «poderoso» suena natural en registro bíblico y encaja con el complemento siguiente.
- source_word: גְּבוּרוֹת
  english_pob_choice: in power
  chosen_spanish: en fuerza
  alternatives_spanish:
  - en poder
  - en actos de poder
  - en hazañas
  lexicon: HALOT
  rationale: El hebreo plural puede referirse a fuerza/poder o a actos poderosos. El griego ἐν δυναστείᾳ favorece una idea abstracta de poder; «en fuerza» conserva esa amplitud en español.
- source_word: וְחוֹזֶה כֹל
  english_pob_choice: and sees all things
  chosen_spanish: y ve todas las cosas
  alternatives_spanish:
  - y contempla todo
  - y ve todo
  lexicon: HALOT
  rationale: חזה significa ver o contemplar. La frase expresa visión total; «ve todas las cosas» refleja bien el paralelo griego βλέπων τὰ πάντα y es idiomático en español.
theological_decisions:
- issue: Cómo traducir el nombre divino יהוה en un libro sapiencial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El versículo usa el nombre divino directamente. La línea editorial del proyecto en español pide «Yahvé» como forma principal, manteniendo visible el nombre del pacto y evitando la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa reciente no modificó el texto y que el control cruzado reportó alta concordancia entre hebreo y griego. La decisión principal de estilo en español fue conservar la fuerza del nombre divino «Yahvé» y optar por una formulación natural que siga de cerca el paralelismo del verso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para el Tetragrámaton.
  - Se evitó «SEÑOR» para no ocultar el nombre divino presente en el hebreo.
  - «Sabiduría» y «ve todas las cosas» conservan el paralelismo con el hebreo y el griego sin añadir matices no atestiguados.
