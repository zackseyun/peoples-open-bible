id: ECC.7.19
reference: Ecclesiastes 7:19
source:
  edition: WLC
  text: הַֽ/חָכְמָ֖ה תָּעֹ֣ז לֶ/חָכָ֑ם מֵֽ/עֲשָׂרָה֙ שַׁלִּיטִ֔ים אֲשֶׁ֥ר הָי֖וּ בָּ/עִֽיר׃
translation:
  text: Wisdom gives strength to a wise man more than ten rulers who were in a city[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the city." The Hebrew form can be read definitely, but the saying appears to be general rather than tied to a specific city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחָכְמָה
  chosen: Wisdom
  alternatives:
  - the wisdom
  lexicon: HALOT
  rationale: Definite article is present, but English proverbial style commonly omits the article for an abstract noun. Capitalization is not theological personification, only sentence-initial.
- source_word: תָּעֹז
  chosen: gives strength
  alternatives:
  - strengthens
  - makes strong
  - prevails for
  lexicon: HALOT
  rationale: From עזז/עוז in the Hifil/Qal-related usage conveying giving strength or making strong. 'Gives strength' preserves the causative sense clearly in natural English.
- source_word: לֶחָכָם
  chosen: to a wise man
  alternatives:
  - for a wise man
  - the wise man
  lexicon: HALOT
  rationale: The prefixed ל marks advantage/dative. 'To a wise man' is straightforward; 'wise man' preserves the singular masculine form in keeping with the gender-accurate policy and the proverb-like individual reference.
- source_word: מֵעֲשָׂרָה
  chosen: more than ten
  alternatives:
  - beyond ten
  - than ten
  lexicon: HALOT
  rationale: 'The preposition מ here marks comparison: wisdom gives greater strength than that represented by ten rulers.'
- source_word: שַׁלִּיטִים
  chosen: rulers
  alternatives:
  - powerful men
  - governors
  - authorities
  lexicon: HALOT
  rationale: שַׁלִּיט denotes one exercising authority or dominion. 'Rulers' is broad, natural English and fits the civic setting of the verse.
- source_word: אֲשֶׁר הָיוּ בָּעִיר
  chosen: who were in a city
  alternatives:
  - who were in the city
  - in the city
  lexicon: HALOT
  rationale: The clause modifies 'ten rulers.' Because בָּעִיר has the article by contraction, 'in the city' is formally possible; however, in English proverbial discourse 'in a city' better conveys a general case rather than a specific previously identified city. This reflects Qoheleth's gnomic style.
