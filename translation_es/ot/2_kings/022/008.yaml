translation:
  language: es
  text: 'Entonces Hilquías, el sumo sacerdote, dijo a Safán, el escriba[a]: «He encontrado el Libro de la Ley en la casa de Yahvé[b]». Y Hilquías entregó el libro a Safán, y él lo leyó[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el rollo de la ley». El hebreo סֵפֶר puede referirse a un rollo o a un libro/documento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la casa de Yahvé», es decir, en el templo.'
    reason: cultural_note
  - marker: c
    text: O, menos probable, «y leyó de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la acción; en español, «Entonces» conserva la secuencia con fluidez natural sin añadir interpretación.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: «Sumo sacerdote» es el equivalente español establecido para el cargo supremo sacerdotal y comunica con precisión el título contextual.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: Con verbos de habla, la preposición funciona idiomáticamente como destinatario del discurso; «a Safán» es natural y fiel.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el registrador
  lexicon: HALOT
  rationale: «Escriba» preserva el valor histórico y lexical del término hebreo para una función administrativa y letrada.
- source_word: סֵפֶר הַתּוֹרָה
  english_pob_choice: the Book of the Law
  chosen_spanish: el Libro de la Ley
  alternatives_spanish:
  - el rollo de la ley
  - el libro de instrucción
  lexicon: HALOT
  rationale: «Libro de la Ley» refleja la decisión inglesa de un documento normativo descubierto, y «Ley» comunica bien el sentido de תּוֹרָה en este contexto legal-covenantal.
- source_word: מָצָאתִי
  english_pob_choice: I have found
  chosen_spanish: He encontrado
  alternatives_spanish:
  - He hallado
  - Encontré
  lexicon: HALOT
  rationale: El perfecto hebreo se rinde naturalmente en español con pretérito perfecto para una noticia con relevancia presente.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea literal «casa» y se preserva el nombre divino como «Yahvé», conforme al estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» para conservar el nombre propio divino, no un título sustitutivo.
- source_word: וַיִּתֵּן ... אֶת־הַסֵּפֶר
  english_pob_choice: gave the book
  chosen_spanish: entregó el libro
  alternatives_spanish:
  - dio el libro
  - pasó el libro
  lexicon: HALOT
  rationale: «Entregó» expresa con naturalidad el traspaso físico del documento a otro funcionario, sin perder la sencillez del verbo hebreo.
- source_word: וַיִּקְרָאֵהוּ
  english_pob_choice: and he read it
  chosen_spanish: y él lo leyó
  alternatives_spanish:
  - y lo leyó
  - y leyó de él
  lexicon: HALOT
  rationale: La lectura más probable es que Safán sea el sujeto cercano; «él lo leyó» conserva esa lectura narrativa y la referencia pronominal directa. La alternativa «leyó de él» quedaría como interpretación menos probable.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; el proyecto pide preservar el nombre divino como «Yahvé» en el texto principal, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambiguity in the final verb וַיִּקְרָאֵהוּ
  english_pob_reading: and he read it / or, less likely, and he read from it
  chosen_spanish_reading: y él lo leyó
  alternative_spanish_readings:
  - y leyó de él
  rationale: La sintaxis favorece que el referente inmediato sea Safán; en español conviene mantener la lectura principal sin sobreexplicarla, pero documentar la posibilidad menos probable.
  doctrine_reference: Narrative syntax and antecedent resolution in context
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de 2 Reyes 22:8 y el audit trail inglés. La revisión más reciente indicó que no eran necesarios cambios sustanciales; se conservó la lectura narrativa principal y la decisión doctrinal sobre el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Libro de la Ley» sigue la convención del proyecto para סֵפֶר הַתּוֹרָה en este contexto.
  - Se mantiene «escriba» y «sumo sacerdote» como equivalentes estándar y transparentes.
  - La ambigüedad final del verbo de lectura se documenta en nota sin romper la fluidez del texto principal.
