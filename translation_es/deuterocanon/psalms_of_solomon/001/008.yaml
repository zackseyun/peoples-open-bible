translation:
  language: es
  text: Sus actos de maldad superaron[a] a los de las naciones anteriores a ellos; profanaron[b] lo santo de Yahvé[c] con profanación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «excedieron» / «sobrepasaron». El griego expresa comparación de exceso.'
    reason: alternative_reading
  - marker: b
    text: 'O: «desecraron». El verbo griego significa tratar lo sagrado como profano.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «las cosas santas de Yahvé» / «el santuario de Yahvé» / «los lugares santos de Yahvé». El griego está en plural («τὰ ἅγια») y puede referirse ampliamente a lo sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ ἀνομίαι
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos sin ley
  - hechos impíos
  - transgresiones
  lexicon: LSJ
  rationale: El plural griego nombra actos de violación de la ley; en español, "iniquidades" conserva el peso moral y judicial sin sonar artificial, y permite el plural colectivo del original.
- source_word: ὑπὲρ
  english_pob_choice: surpassed
  chosen_spanish: superaron
  alternatives_spanish:
  - excedieron
  - fueron mayores que
  - sobrepasaron
  lexicon: LSJ
  rationale: Aquí ὑπέρ marca comparación de exceso. "Superaron" reproduce la fuerza comparativa con español natural y mantiene el contraste con las naciones anteriores.
- source_word: τὰ πρὸ αὐτῶν ἔθνη
  english_pob_choice: the nations before them
  chosen_spanish: las naciones que hubo antes de ellos
  alternatives_spanish:
  - las naciones anteriores a ellos
  - las naciones que estaban antes de ellos
  - las naciones de antes
  lexicon: LSJ
  rationale: La expresión temporal pide una formulación clara en español. "Que hubo antes de ellos" conserva el valor de anterioridad sin volverlo ambiguo o demasiado idiomático para un registro bíblico.
- source_word: ἐβεβήλωσαν
  english_pob_choice: they profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - deshonraron
  - desecraron
  lexicon: LSJ
  rationale: βηλόω/βεβηλόω indica tratar lo santo como común. "Profanaron" es el equivalente más directo y mantiene el contraste sagrado/profano del griego.
- source_word: τὰ ἅγια Κυρίου
  english_pob_choice: the holy things of the Lord
  chosen_spanish: las cosas santas de Yahvé
  alternatives_spanish:
  - el santuario de Yahvé
  - los lugares santos de Yahvé
  - lo santo de Yahvé
  lexicon: LSJ
  rationale: El neutro plural τὰ ἅγια puede abarcar cosas sagradas o ámbitos sagrados; en español, "las cosas santas de Yahvé" conserva el plural y evita fijar sin necesidad una lectura más estrecha que el texto por sí solo no impone.
- source_word: ἐν βεβηλώσει
  english_pob_choice: with profanation
  chosen_spanish: con profanación
  alternatives_spanish:
  - en profanación
  - mediante profanación
  - con deshonra
  lexicon: LSJ
  rationale: La frase intensifica el verbo con un sustantivo cognado. "Con profanación" conserva el paralelismo y el énfasis léxico del original.
theological_decisions:
- issue: Cómo traducir Κυρίου en una obra que prefiere Yahvé para el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - del Señor
  rationale: En el griego subyacente, Κυρίου funciona como referencia al nombre divino en un contexto de santidad cultual. La política del proyecto favorece "Yahvé" para evitar el encubrimiento litúrgico de SEÑOR y mantener transparencia con el nombre divino.
  doctrine_reference: Nombre divino / Tetragrámaton en traducción bíblica
- issue: Si τὰ ἅγια Κυρίου debe entenderse como 'santuario' o de modo más amplio como 'cosas santas'
  english_pob_reading: the holy things of the Lord
  chosen_spanish_reading: las cosas santas de Yahvé
  alternative_spanish_readings:
  - el santuario de Yahvé
  - los lugares santos de Yahvé
  rationale: El plural neutro es más amplio que un singular cultual. Para no cerrar el alcance del sustantivo, se mantiene la formulación amplia, aunque el contexto pueda incluir el templo o su recinto sagrado.
  doctrine_reference: Culto del templo / lenguaje sagrado en el judaísmo del Segundo Templo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: el texto pasó de una lectura más estrecha (''sanctuary'') a una más amplia (''holy things''), mientras se mantuvo la idea de profanación con un cognado sustantivo. La versión española sigue esa decisión reciente, pero conserva la posibilidad interpretativa amplia del plural griego y evita fijar innecesariamente un equivalente más estrecho.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para Κυρίου en contexto divino.
  - Se mantuvo el paralelismo léxico «profanaron... con profanación» para reflejar ἐβεβήλωσαν ἐν βεβηλώσει.
  - «Las cosas santas» preserva el plural de τὰ ἅγια y evita especificar más allá del griego.
  - Se evitó «SEÑOR» como máscara tipográfica, de acuerdo con la política del proyecto.
