  text: וְ/הַ/חֹנִ֣ים לִ/פְנֵ֣י הַ/מִּשְׁכָּ֡ן קֵ֣דְמָ/ה לִ/פְנֵי֩ אֹֽהֶל מוֹעֵ֨ד מִזְרָ֜חָ/ה מֹשֶׁ֣ה וְ/אַהֲרֹ֣ן וּ/בָנָ֗י/ו שֹֽׁמְרִים֙ מִשְׁמֶ֣רֶת הַ/מִּקְדָּ֔שׁ לְ/מִשְׁמֶ֖רֶת בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת־׀׀׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/003/038.yaml
  text: Those who camped in front of the tabernacle on the east[a], in front of the tent of meeting toward the sunrise, were Moses and Aaron and his sons, keeping charge of the sanctuary on behalf of the sons of Israel[b]. But the outsider who comes near shall be put to death.
  footnotes:
  - marker: a
    text: Or 'eastward ... on the east'; the Hebrew uses two related directional expressions for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The outsider'' means an unauthorized person who is not permitted to approach the sanctuary service, not specifically a foreigner by ethnicity.'
    reason: cultural_note
