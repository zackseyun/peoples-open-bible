translation:
  language: es
  text: Como un aro[a] de oro en el hocico de un cerdo, una mujer hermosa que carece de discreción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como un aro nasal de oro en el hocico de un cerdo, una mujer hermosa sin buen sentido»'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶזֶם
  english_pob_choice: ring
  chosen_spanish: aro
  alternatives_spanish:
  - anillo
  - aro nasal
  - joya
  lexicon: HALOT
  rationale: נֶזֶם puede referirse a un aro o joya, a menudo de uso nasal. En español, «aro» comunica bien la idea de adorno circular sin forzar desde el inicio la especificidad nasal, que ya queda clara por «hocico».
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - oro
  - dorada
  lexicon: HALOT
  rationale: El hebreo nombra el material precioso. «De oro» preserva el valor del adorno y el contraste con el animal impuro.
- source_word: בְּאַף
  english_pob_choice: in a pig’s snout
  chosen_spanish: en el hocico
  alternatives_spanish:
  - en la nariz
  - en el morro
  lexicon: HALOT
  rationale: Aquí אַף es anatómico, no «ira». «Hocico» es natural en español para un cerdo y conserva la fuerza visual de la imagen.
- source_word: חֲזִיר
  english_pob_choice: pig
  chosen_spanish: cerdo
  alternatives_spanish:
  - puerco
  - cochino
  - marrano
  lexicon: HALOT
  rationale: «Cerdo» es el equivalente neutral y claro en español moderno; mantiene la referencia al animal impuro sin añadir matiz coloquial extra.
- source_word: אִשָּׁה
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - una mujer
  lexicon: HALOT
  rationale: No hay contexto marital; por eso se conserva el valor genérico de «mujer».
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  - atractiva
  lexicon: HALOT
  rationale: «Hermosa» mantiene la valoración positiva y suena natural y digna en español bíblico contemporáneo.
- source_word: וְסָרַת טָעַם
  english_pob_choice: who lacks discretion
  chosen_spanish: que carece de discreción
  alternatives_spanish:
  - que se aparta del buen juicio
  - sin buen juicio
  - que carece de buen sentido
  lexicon: HALOT
  rationale: La expresión participial describe a quien se ha apartado de טָעַם, que en la sabiduría puede significar discernimiento, juicio o buen sentido. «Carece de discreción» transmite esa pérdida de juicio de forma idiomática sin borrar la tensión semántica.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con el control cruzado fue alto y no se señalaron problemas. Se mantuvo la imagen proverbial directa, con solo ajustes de naturalidad en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras fórmulas no pertinentes porque el verso no contiene el nombre divino.
  - Se tradujo el término de sabiduría טָעַם con una expresión que preserve discernimiento/juicio, no solo gusto estético.
  - La metáfora animal se mantuvo concreta para conservar el tono proverbial y la aspereza del contraste.
