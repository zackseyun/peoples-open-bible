- from: Estará sobre Aarón cuando ministre[a], y se oirá su sonido cuando entre en el Lugar Santo delante de Yahvé y cuando salga[c][b], para que no muera.
  to: Estará sobre Aarón cuando ministre[a], y se oirá su sonido cuando entre al Lugar Santo delante de Yahvé y cuando salga[c][b], para que no muera.
