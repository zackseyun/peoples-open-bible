    reason: lexical_alternative
  revision_rationale: Se reubica la nota lexical sobre יְשָׁרִים al término correcto («rectos»), se mueve la nota sobre פֹשְׁעִים al término «transgresores», se ajusta «prudente» a «entendido» para reflejar mejor נָבוֹן en paralelo con «sabio», y se ponen los verbos finales en presente gnómico para un español más natural y sapiencial. Todo ello preserva fielmente el sentido fuente y el razonamiento lexical documentado.
