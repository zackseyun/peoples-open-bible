translation:
  language: es
  text: Extiende tu mano hacia el lugar que él mira[a], y no metas la mano con él en la fuente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega lee: «Dichosa es el alma del que teme al Señor». El testimonio hebreo conservado en la Guenizá de El Cairo ofrece una línea distinta sobre modales en la mesa, y en este punto la tradición textual es incierta.'
    reason: alternative_reading
lexical_decisions:
- source_word: מקום
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el puesto
  lexicon: HALOT
  rationale: En este contexto de mesa, מקום conserva su sentido concreto de ubicación o espacio señalado. «El lugar» mantiene la referencia directa y suena natural en español sin añadir una interpretación más específica que el hebreo no exige.
- source_word: יביט
  english_pob_choice: he looks at
  chosen_spanish: él mira
  alternatives_spanish:
  - él observa
  - él contempla
  lexicon: HALOT
  rationale: El verbo apunta simplemente a mirar o fijar la vista. «Él mira» conserva la escena de etiqueta en la mesa y evita intensificar el matiz con verbos más literarios o reflexivos.
- source_word: תושיט יד
  english_pob_choice: stretch out your hand
  chosen_spanish: extiende tu mano
  alternatives_spanish:
  - estira tu mano
  - alarga tu mano
  lexicon: HALOT
  rationale: La imagen es literal y gestual. En español, «extiende tu mano» reproduce bien el movimiento pedido y es más natural que un calco demasiado rígido.
- source_word: אל תחד
  english_pob_choice: do not reach
  chosen_spanish: no metas la mano
  alternatives_spanish:
  - no alcances
  - no extiendas la mano
  lexicon: HALOT
  rationale: El hebreo es difícil en este testimonio compuesto, pero el contexto de comida compartida prohíbe tomar o meter la mano simultáneamente. «No metas la mano» comunica esa fuerza práctica con claridad, sin precisar más de lo que permite el texto.
- source_word: עמו
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - a la vez que él
  lexicon: HALOT
  rationale: La preposición indica acción simultánea o acompañada. «Con él» conserva la sencillez del original y el referente masculino singular.
- source_word: בטנא
  english_pob_choice: into the dish
  chosen_spanish: en el plato
  alternatives_spanish:
  - en la fuente
  - en el tazón
  lexicon: HALOT
  rationale: Aunque el sustantivo puede abarcar recipiente o canasta, aquí el contexto es de comida servida en mesa. «En el plato» es la opción más natural en español para una escena de comedor y respeta el sentido compartido del recipiente.
- source_word: φοβουμένου τὸν Κύριον μακαρία ἡ ψυχή
  english_pob_choice: not adopted in main text
  chosen_spanish: Dichoso el alma del que teme al Señor
  alternatives_spanish:
  - Bienaventurada es el alma del que teme al Señor
  - Feliz el alma del que teme al Señor
  lexicon: BDAG
  rationale: La tradición griega preserva una sentencia de bendición completamente distinta del hebreo transmitido. En una nota se mantiene esta lectura alternativa; en español, «Dichoso» recoge bien μακαρία y evita imponer un registro excesivamente litúrgico.
theological_decisions:
- issue: Desfase mayor entre el hebreo conservado y la tradición griega
  english_pob_reading: Main text follows the extant Hebrew dining-etiquette line; Greek blessing preserved in a footnote as a significant alternative tradition.
  chosen_spanish_reading: El texto principal sigue la línea hebrea sobre modales en la mesa, y la tradición griega se conserva en nota como alternativa importante.
  alternative_spanish_readings:
  - Seguir la bendición griega en el cuerpo del texto
  - Fusionar ambas tradiciones en una sola redacción
  rationale: La política del proyecto para Sirácides da prioridad al hebreo cuando está conservado, pero la divergencia aquí es sustancial y no debe ocultarse. Mantener el texto hebreo en el cuerpo y documentar la griega en nota conserva la transparencia textual y evita borrar una tradición bíblica relevante.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives in Sirach; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios: la evidencia indica una discrepancia mayor entre hebreo y griego, así que el cuerpo del texto conserva la escena de mesa hebrea y la lectura griega queda en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el hebreo conservado no lo usa, y el griego dice Κύριος en la tradición alternativa, por lo que la nota conserva «Señor» como reflejo de esa lectura griega.
  - Se prefirió «el plato» para el recipiente compartido por naturalidad en español; no se añadió especificación doctrinal o interpretativa.
  - 'No se tradujo mecánicamente desde el inglés: la forma española «no metas la mano» expresa la misma prohibición práctica que el audit trail inglés, pero con sintaxis natural en español.'
