translation:
  language: es
  text: El Altísimo[a] concedió abundante honor[b], y su grandeza es desde la eternidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de Kahana lee חלק עליון, mientras que el testigo más antiguo de Masada lee חולק עליון, lo que apoya la idea de que el Altísimo reparte o concede. El paralelo griego dice: «creó mucha gloria».'
    reason: textual_variant
  - marker: b
    text: O «abundante gloria». Tanto el hebreo כבוד como el griego δόξα pueden significar «honor» o «gloria» según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «desde antiguo» o «desde la eternidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: רב / πολλὴν
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - mucho
  - grande
  lexicon: HALOT; LXX δόξαν
  rationale: En la expresión con כבוד/δόξα, el modificador intensifica la magnitud del honor/gloria. «Abundante» suena natural en español y conserva la idea de plenitud sin forzar un calco.
- source_word: כבוד / δόξαν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT; LSJ
  rationale: El campo semántico permite «honor» o «gloria». Aquí «honor» sigue la lectura distributiva del contexto y la decisión auditada en inglés, aunque «gloria» sigue siendo una alternativa válida.
- source_word: חלק / חולק / ἔκτισεν
  english_pob_choice: apportioned
  chosen_spanish: concedió
  alternatives_spanish:
  - aportó
  - distribuyó
  - asignó
  lexicon: HALOT; contextual comparison with Greek
  rationale: El hebreo apunta a una acción distributiva del Altísimo; el griego ofrece ἔκτισεν («creó»), pero la línea hebrea sugiere mejor una concesión o reparto. «Concedió» comunica la acción divina de otorgar sin perder la idea de distribución.
- source_word: עליון / ὁ κύριος
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Señor
  - el Supremo
  lexicon: HALOT
  rationale: Título divino tradicional y fiel al hebreo. «El Altísimo» mantiene el carácter reverente sin ocultar el nombre/título original con una convención eclesiástica diferente.
- source_word: וגדלו / τὴν μεγαλωσύνην αὐτοῦ
  english_pob_choice: and his greatness
  chosen_spanish: y su grandeza
  alternatives_spanish:
  - y su majestad
  - y su magnificencia
  lexicon: HALOT; LSJ
  rationale: «Grandeza» reproduce bien μεγαλωσύνην y el hebreo גדלו. «Majestad» o «magnificencia» son posibles, pero «grandeza» es más directa y transparente.
- source_word: מימות עולם / ἀπʼ αἰῶνος
  english_pob_choice: is from everlasting
  chosen_spanish: es desde la eternidad
  alternatives_spanish:
  - es desde antiguo
  - es desde tiempos antiguos
  - es de eternidad
  lexicon: HALOT; LSJ
  rationale: La frase expresa una antigüedad extrema o eternidad. «Desde la eternidad» mantiene la fuerza teológica del texto y es idiomático en español.
theological_decisions:
- issue: 'Base textual para el primer colon: hebreo distributivo frente al griego «creó»'
  english_pob_reading: The Most High apportioned abundant honor.
  chosen_spanish_reading: El Altísimo concedió abundante honor.
  alternative_spanish_readings:
  - El Señor creó mucha gloria
  - El Altísimo distribuyó abundante honor
  rationale: Se sigue el testimonio hebreo conservado en Sirácida, reforzado por la lectura verbal distributiva del otro testigo hebreo, mientras el griego se usa como control comparativo. «Concedió» preserva el sentido de otorgamiento sin introducir una formulación demasiado interpretativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando está preservado; el griego sirve como paralelo de control'
- issue: Rango semántico de כבוד/δόξα
  english_pob_reading: abundant honor
  chosen_spanish_reading: abundante honor
  alternative_spanish_readings:
  - abundante gloria
  rationale: «Honor» encaja mejor con la idea de reparto/otorgamiento entre seres humanos famosos, aunque «gloria» sigue siendo legítimo por el valor semántico del término. Se conserva la tensión lexical sin borrarla.
  doctrine_reference: HALOT; LSJ; auditoría léxica del POB en inglés
- issue: Origen temporal de la grandeza divina
  english_pob_reading: is from everlasting
  chosen_spanish_reading: es desde la eternidad
  alternative_spanish_readings:
  - es desde antiguo
  - es desde of old
  rationale: El hebreo y el griego admiten una lectura de eternidad o antigüedad remota. En un contexto de la grandeza divina, «desde la eternidad» transmite mejor el peso teológico sin apartarse del rango de sentido.
  doctrine_reference: HALOT; LSJ
translation_notes:
  revision_awareness: La redacción sigue la última pasada revisada sin cambios sustantivos; se mantiene la prioridad del hebreo en Sirácida, con el griego como paralelo de contraste y control, y se conserva la tensión léxica honor/gloria en nota.
  spanish_consistency_notes:
  - Se usa «Altísimo» como título divino coherente con la convención proyectual para עליון.
  - Se evita «SEÑOR» en el texto principal porque el audit trail privilegia «el Altísimo» y el hebreo no exige la convención de máscara.
  - «Honor» se mantiene en el texto principal; «gloria» queda documentado como alternativa legítima.
  - 'La expresión temporal se vierte de forma elevada pero natural: «desde la eternidad».'
