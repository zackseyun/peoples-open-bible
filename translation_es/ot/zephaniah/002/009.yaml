    text: Or, more formally, 'a possession of nettles.' The Hebrew phrase is difficult; the translation conveys the image of abandoned land overtaken by thorny weeds.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Ammonites'; literally, 'the sons of Ammon.'
    reason: lexical_alternative
