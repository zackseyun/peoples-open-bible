base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/016.yaml
  text: And to the Reubenites and to the Gadites I gave from Gilead as far as the Arnon Valley[a], the middle of the valley as a border, and as far as the Jabbok Valley[b], the border of the sons of Ammon.
  footnotes:
  - marker: a
    text: Or “the border of the Ammonites.” The Hebrew reads “the sons of Ammon,” a kinship expression for the people of Ammon.
    reason: lexical_alternative
  - marker: b
    text: Hebrew נחל can refer to a stream, wadi, or the valley associated with it; here “Valley” is used because the next phrase speaks of “the middle of the valley” as the boundary.
    reason: lexical_alternative
