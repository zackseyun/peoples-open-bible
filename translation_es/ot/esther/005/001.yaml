translation:
  language: es
  text: Y al tercer día[a], Ester se vistió con vestiduras reales y se puso de pie en el patio interior de la casa del rey, frente a la casa del rey, mientras el rey estaba sentado en su trono real, en la casa real[b], frente a la entrada de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se vistió de realeza», es decir, de atuendo o insignias reales.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «casa» puede entenderse también como «palacio» en este contexto de corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora ...
  - Entonces ...
  lexicon: HALOT
  rationale: La partícula narrativa introduce el avance de la escena. En español, «Y» mantiene la continuidad narrativa sin forzar un giro demasiado interpretativo; «Ahora» o «Entonces» serían posibles, pero aquí «Y» preserva mejor la simple progresión del relato.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: HALOT
  rationale: «Al tercer día» es la forma natural en español para este valor temporal y conserva la referencia directa al tercer día del contexto narrativo.
- source_word: וַתִּלְבַּשׁ ... מַלְכוּת
  english_pob_choice: put on her royal robes
  chosen_spanish: se vistió de regia majestad
  alternatives_spanish:
  - se puso sus ropas reales
  - se vistió de real vestidura
  - se puso sus vestiduras reales
  lexicon: HALOT
  rationale: מַלְכוּת puede referirse aquí a la dignidad/atavio regio, no solo a una prenda concreta. «Regia majestad» conserva la fuerza de realeza/majestad que el inglés POB señaló como posible alternativa ('put on royalty') sin reducirla demasiado pronto a una sola clase de ropa.
- source_word: וַתַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó de pie
  alternatives_spanish:
  - estuvo de pie
  - se puso de pie
  - se plantó
  lexicon: HALOT
  rationale: El verbo פשוט indica la acción de ponerse en posición de pie; «se quedó de pie» expresa bien el estado resultante y la escena ceremonial sin añadir énfasis no requerido.
- source_word: בַּחֲצַר בֵּית הַמֶּלֶךְ הַפְּנִימִית
  english_pob_choice: in the inner court of the king’s palace
  chosen_spanish: en el patio interior de la casa del rey
  alternatives_spanish:
  - en el atrio interior del palacio del rey
  - en el patio interior del palacio del rey
  lexicon: HALOT
  rationale: «Patio interior» comunica el valor espacial de חָצֵר en un contexto palaciego sin recurrir a una terminología eclesiástica. «Casa del rey» conserva el hebreo בֵּית הַמֶּלֶךְ con el sentido de complejo real o palacio.
- source_word: נֹכַח בֵּית הַמֶּלֶךְ
  english_pob_choice: opposite the king’s house
  chosen_spanish: frente a la casa del rey
  alternatives_spanish:
  - opuesta a la casa del rey
  - mirando hacia la casa del rey
  lexicon: HALOT
  rationale: נֹכַח indica una posición enfrente o de cara a. «Frente a» es claro y natural en español y mantiene la relación espacial sin añadir más precisión de la que ofrece el hebreo.
- source_word: וְהַמֶּלֶךְ יוֹשֵׁב
  english_pob_choice: while the king was sitting
  chosen_spanish: y el rey estaba sentado
  alternatives_spanish:
  - mientras el rey estaba sentado
  - y el rey se hallaba sentado
  lexicon: HALOT
  rationale: El participio describe una situación simultánea de fondo. En español, «estaba sentado» reproduce bien ese trasfondo narrativo; la simultaneidad ya queda sugerida por la estructura de la frase.
- source_word: עַל כִּסֵּא מַלְכוּתוֹ
  english_pob_choice: on his royal throne
  chosen_spanish: en su trono real
  alternatives_spanish:
  - sobre su trono real
  - en el trono de su reino
  lexicon: HALOT
  rationale: «Trono real» expresa naturalmente la frase nominal hebrea y evita una traducción demasiado literal que sonaría pesada. «En» funciona idiomáticamente con personas sentadas sobre un trono en español.
- source_word: בְּבֵית הַמַּלְכוּת
  english_pob_choice: in the royal house
  chosen_spanish: en la casa del reino
  alternatives_spanish:
  - en la casa real
  - en el palacio real
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo relacionado con מַלְכוּת, y el inglés POB dejó la tensión entre «house» y «palace» visible en nota. «Casa del reino» conserva esa conexión léxica con מַלְכוּת; aunque menos idiomática que «palacio real», mantiene mejor la huella del original.
- source_word: נֹכַח פֶּתַח הַבָּיִת
  english_pob_choice: opposite the entrance of the house
  chosen_spanish: frente a la entrada de la casa
  alternatives_spanish:
  - enfrente de la entrada de la casa
  - frente al umbral de la casa
  lexicon: HALOT
  rationale: «Entrada» es una equivalencia natural de פֶּתַח y conserva la orientación espacial marcada por נֹכַח. «Casa» reproduce el hebreo sin necesidad de pasar de nuevo a «palacio».
translation_notes:
  revision_awareness: Esta versión sigue de cerca el texto hebreo masorético y toma como guía la solución inglesa del POB, pero reexpresa el verso en español natural. Se preserva la ambigüedad de מַלְכוּת en la nota a, y la oscilación entre «casa» y «palacio» en la nota b, como en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el Nombre divino, aunque este verso no lo contiene.
  - Se usa «casa» para בֵּית cuando el contexto de corte permite la equivalencia con «palacio», dejando la alternativa en nota cuando la fuente inglesa la documenta.
  - Se evita introducir terminología litúrgica cristiana; el registro es cortesano y narrativo.
  - «Trono real» se conserva para כִּסֵּא מַלְכוּתוֹ, siguiendo la fuerza regia del hebreo sin recargar la sintaxis.
