translation:
  language: es
  text: No llevarás a la casa de Yahvé tu Dios la paga de una prostituta ni el precio de un perro[a], por cualquier voto, porque ambos son una abominación para Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «el precio de un prostituto de culto», si «perro» se entiende aquí como un término despectivo para un prostituto de culto masculino.
    reason: alternative_reading
lexical_decisions:
- source_word: תָבִיא
  english_pob_choice: bring
  chosen_spanish: llevarás
  alternatives_spanish:
  - traerás
  - introducirás
  lexicon: HALOT
  rationale: El verbo hiphil expresa llevar algo a un lugar. En español, «llevarás» comunica con naturalidad el movimiento hacia la casa de Yahvé sin perder la fuerza concreta de la prohibición.
- source_word: אֶתְנַן זוֹנָה
  english_pob_choice: the wages of a prostitute
  chosen_spanish: la paga de una prostituta
  alternatives_spanish:
  - el salario de una prostituta
  - la ganancia de una prostituta
  lexicon: HALOT
  rationale: אֶתְנַן denota pago o remuneración, y זוֹנָה es una prostituta. «Paga» conserva el valor de pago recibido, con un español claro y reverente.
- source_word: מְחִיר כֶּלֶב
  english_pob_choice: the price of a dog
  chosen_spanish: el precio de un perro
  alternatives_spanish:
  - el pago por un perro
  - la paga de un perro
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «precio de perro». Se conserva el sentido léxico principal en el texto español, sin resolver aquí la discusión interpretativa.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the house of Yahweh your God
  chosen_spanish: la casa de Yahvé tu Dios
  alternatives_spanish:
  - la casa de Yahvé, tu Dios
  - la casa del SEÑOR tu Dios
  lexicon: HALOT
  rationale: «Casa» reproduce בית de modo directo. Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה, y «tu Dios» conserva la relación de pacto.
- source_word: לְכָל נֶדֶר
  english_pob_choice: for any vow
  chosen_spanish: para ningún voto
  alternatives_spanish:
  - para cualquier voto
  - para un voto cualquiera
  lexicon: HALOT
  rationale: La construcción expresa finalidad o relación con un voto. «Para ningún voto» mantiene el valor prohibitivo en español y evita sugerir una autorización parcial.
- source_word: תוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo abominable
  - una cosa detestable
  lexicon: HALOT
  rationale: «Abominación» preserva la fuerza legal y cultual del término en contextos de santidad y pureza, sin suavizar su peso.
- source_word: גַּם שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: HALOT
  rationale: El hebreo enfatiza que los dos elementos anteriores quedan incluidos. «Ambos» es la forma más natural y directa en español.
theological_decisions:
- issue: Interpretación de כֶּלֶב en מְחִיר כֶּלֶב
  english_pob_reading: Translate literally as 'dog' in the main text, with a footnote for the possible idiomatic sense of 'male prostitute'.
  chosen_spanish_reading: Traducir literalmente «perro» en el texto principal, con nota para la posible lectura idiomática de «prostituto varón» o de un término despectivo afín.
  alternative_spanish_readings:
  - «el precio de un prostituto varón»
  - «la paga de un prostituto varón»
  - «el precio de un cultor prostituto»
  rationale: El hebreo dice literalmente כֶּלֶב, y la discusión interpretativa no es segura. Mantener «perro» en el cuerpo del texto evita imponer una solución debatida; la nota conserva la alternativa documentada por el audit trail.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto español usa «Yahvé» como forma principal del nombre divino para mantener visible el Tetragrámaton y una equivalencia consistente con el texto fuente.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) y el audit trail inglés más reciente, que mantiene la lectura literal de כֶּלֶב en el texto principal y reserva la interpretación alternativa para nota. No hubo revisiones aplicadas en el historial más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conservó la distinción léxica entre «paga» y «precio» para reflejar אֶתְנַן / מְחִיר.
  - La estructura negativa y la clausula causal final se formularon en español natural sin perder el paralelismo hebreo.
