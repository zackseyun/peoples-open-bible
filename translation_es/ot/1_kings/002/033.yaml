- from: Así la sangre de ellos recaerá sobre la cabeza de Joab y sobre la cabeza de su descendencia para siempre[a]; pero para David, para su descendencia, para su casa y para su trono, habrá paz para siempre de parte de Yahvé.
  to: Así su sangre[a] recaerá sobre la cabeza de Joab y sobre la cabeza de su descendencia para siempre; pero para David, para su descendencia, para su casa y para su trono, habrá paz para siempre proveniente de Yahvé.
  rationale: 'La revisión hace un ajuste menor para mejorar la naturalidad del español y la coherencia con la nota léxica: «su sangre» mantiene mejor el literal hebreo y evita la pesadez de «la sangre de ellos». También se cambia «de parte de Yahvé» por «proveniente de Yahvé» para reflejar con mayor precisión el sentido de fuente/origen de מֵעִם en un registro solemne y claro. No se alteran las decisiones clave del borrador.'
