id: JER.51.13
reference: Jeremiah 51:13
source:
  edition: WLC
  text: שכנתי עַל מַ֣יִם רַבִּ֔ים רַבַּ֖ת אֽוֹצָרֹ֑ת בָּ֥א קִצֵּ֖/ךְ אַמַּ֥ת בִּצְעֵֽ/ךְ־׃
translation:
  text: You who dwell by many waters[a], rich in treasures, your end has come[b], the measure of your greed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon many waters.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the cubit of your unjust gain,' likely meaning 'the measure/limit of your unjust gain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שכנתי
  chosen: You who dwell
  alternatives:
  - O inhabitant
  - you who sit/dwell
  lexicon: HALOT
  rationale: Feminine singular participle used vocatively of Babylon/Zion-like city personification. English supplies 'you who dwell' to preserve the direct address and ongoing state better than a bare noun like 'inhabitant.'
- source_word: עַל מַיִם רַבִּים
  chosen: by many waters
  alternatives:
  - upon many waters
  - on many waters
  lexicon: HALOT
  rationale: עַל can mean 'on/upon/over/by.' In idiomatic English for a city situated amid waterways, 'by many waters' is natural while preserving the geographic image. 'Upon many waters' is more literal and is preserved as an alternative nuance.
- source_word: רַבַּת אֹצָרוֹת
  lemma: רַבַּת
  chosen: rich in treasures
  alternatives:
  - abundant in treasures
  - great in treasures
  lexicon: HALOT
  rationale: The adjective רַבַּת with a plural noun conveys abundance. 'Rich in treasures' communicates both quantity and wealth in clear modern English.
- source_word: בָּא קִצֵּךְ
  chosen: your end has come
  alternatives:
  - your end is coming
  - your end has arrived
  lexicon: HALOT
  rationale: Perfect verb with noun 'end' expresses the certainty and arrival of judgment. 'Has come' is the most direct English equivalent.
- source_word: אַמַּת
  chosen: the measure of
  alternatives:
  - the cubit of
  - the extent of
  lexicon: HALOT
  rationale: Though literally 'cubit,' the term can denote a measure or fixed extent. In this context with 'your gain/greed,' an idiomatic sense 'the measure of' best fits the announcement that Babylon's allotted limit has been reached. The more literal 'cubit' is preserved in a footnote because it is a notable lexical possibility.
- source_word: בִּצְעֵךְ
  chosen: your greed
  alternatives:
  - your unjust gain
  - your covetousness
  - your plunder
  lexicon: HALOT
  rationale: בצע often denotes gain acquired by violence, greed, or unjust profit. 'Greed' captures the moral force succinctly in context, while 'unjust gain' is a strong alternative preserved in a footnote.
