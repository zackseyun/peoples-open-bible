translation:
  language: es
  text: No conocen[a], ni entienden, porque les ha cerrado[c] los ojos para que no vean[b], y sus corazones para que no entiendan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saben». El hebreo usa un perfecto negado que en este contexto expresa una afirmación general.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «sus corazones», usando «corazón» como sede del pensamiento y del entendimiento, no solo de la emoción.
    reason: cultural_note
  - marker: c
    text: O «les ha recubierto/embadurnado los ojos». El verbo hebreo usa una imagen concreta de cubrir o untar, a menudo traducida de forma más interpretativa como «cegar». El sujeto de «ha cerrado/recubierto» está implícito en hebreo; el texto no nombra explícitamente al agente aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדְעוּ
  english_pob_choice: do not know
  chosen_spanish: No conocen
  alternatives_spanish:
  - No saben
  - No han conocido
  lexicon: HALOT
  rationale: El perfecto negado funciona aquí como afirmación general/presente. En español, «conocen» comunica de modo natural la falta de conocimiento sin forzar un pretérito.
- source_word: יָבִינוּ
  english_pob_choice: do they understand
  chosen_spanish: entienden
  alternatives_spanish:
  - disciernen
  - comprenden
  lexicon: HALOT
  rationale: בין expresa entender/discernir. «Entienden» empareja bien con «conocen» y mantiene un paralelismo claro y natural.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de su ignorancia; «porque» es la opción más directa y transparente en español moderno.
- source_word: טַח
  english_pob_choice: has shut
  chosen_spanish: ha cegado
  alternatives_spanish:
  - ha tapado
  - ha recubierto
  - ha cerrado
  lexicon: HALOT
  rationale: El hebreo describe una imagen concreta de recubrir/embadurnar. En español, «ha cegado» comunica el efecto resultante con claridad, sin perder la idea de impedimento de la visión. La alternativa más literal «ha recubierto/embadurnado» suena menos natural en este contexto.
- source_word: מֵרְאוֹת עֵינֵיהֶם
  english_pob_choice: their eyes from seeing
  chosen_spanish: sus ojos para no ver
  alternatives_spanish:
  - sus ojos de ver
  - sus ojos para que no vean
  lexicon: HALOT
  rationale: La construcción con מִן + infinitivo expresa impedimento. «Para no ver» mantiene esa función preventiva en español y conserva la relación entre ojos y visión.
- source_word: מֵהַשְׂכִּיל לִבֹּתָם
  english_pob_choice: their hearts from understanding
  chosen_spanish: sus corazones para no comprender
  alternatives_spanish:
  - sus corazones de comprender
  - sus corazones para no entender
  - sus mentes para no comprender
  lexicon: HALOT
  rationale: Se conserva «corazones» para reflejar לִבּוֹתָם como sede del pensamiento y la percepción, no solo de la emoción. «Comprender» da el sentido cognitivo de הַשְׂכִּיל en español natural.
- source_word: לִבֹּתָם
  english_pob_choice: their hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus mentes
  - su interior
  lexicon: HALOT
  rationale: La antropología hebrea usa «corazón» para pensamiento, voluntad y discernimiento. Mantener «corazones» evita reducir el sentido a «mente».
theological_decisions:
- issue: Sujeto implícito de טַח
  english_pob_reading: he has shut their eyes from seeing
  chosen_spanish_reading: ha cegado sus ojos para no ver
  alternative_spanish_readings:
  - se han cegado sus ojos
  - están cegados sus ojos
  - ha recubierto sus ojos
  rationale: El hebreo presenta un verbo en 3ms sin sujeto explícito. En español, era necesario elegir una formulación gramatical. «Ha cegado» conserva el valor verbal activo sin resolver de manera innecesaria si el agente es Dios, el ídolo, o una acción impersonal. Se preserva así la tensión del original.
  doctrine_reference: Preservar tensión teológica/documental en lugar de especificar un agente no expreso.
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste editorial más reciente del inglés, que pasó de una imagen más literal de 'smeared' a una formulación más natural ('shut'). En español se eligió una solución equivalente en efecto, «ha cegado», que preserva la fuerza de la imagen y la claridad de lectura.
  spanish_consistency_notes:
  - Se conservó «corazones» para reflejar el hebreo לֵב como centro de pensamiento y discernimiento.
  - Se evitó «SEÑOR» u otra sustitución teológica no pertinente, ya que el versículo no contiene el nombre divino.
  - Se prefirió un presente gnómico («conocen», «entienden») para reflejar el valor general del hebreo negado.
  - La puntuación mantiene el paralelismo y el encadenamiento causal del texto hebreo.
