revisions:
- from: Así Jefté huyó de sus hermanos y habitó en la tierra de Tob, y hombres inútiles se reunieron alrededor de Jefté[a] y salían con él.
  to: Entonces Jefté huyó de sus hermanos y habitó en la tierra de Tob, y hombres despreciables[a] se reunieron alrededor de Jefté y salieron con él.
  rationale: Se corrige el tiempo verbal final para reflejar el hebreo narrativo («salieron»), y se reemplaza «hombres inútiles» por «hombres despreciables» para representar mejor el modismo אֲנָשִׁים רֵיקִים en español natural y fiel. También se ajusta «Así» a «Entonces» por fluidez narrativa. Se conserva «habitó» y la nota léxica existente, que sigue siendo útil.
