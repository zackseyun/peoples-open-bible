base_translation:
  language: en
  yaml_path: translation/ot/micah/002/013.yaml
  text: The one who breaks through has gone up before them[a]; they have broken through and passed through the gate, and gone out by it. Their king passes on before them[c][b], and Yahweh is at their head.
  footnotes:
  - marker: a
    text: Or 'the breaker.' The Hebrew participle can function as a title-like designation for one who breaches an obstacle or opens the way.
    reason: lexical_alternative
  - marker: b
    text: 'The identity of ''the one who breaks through'' is debated: some understand a military leader, some the king, and some the LORD himself. The Hebrew leaves the relationship implicit.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'YHWH'; rendered 'the LORD' in keeping with the translation's standard practice.
    reason: lexical_alternative
