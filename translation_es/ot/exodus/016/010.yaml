translation:
  language: es
  text: Mientras Aarón hablaba a toda la congregación de los hijos de Israel[a], ellos se volvieron hacia el desierto, y he aquí, la gloria de Yahvé apareció en la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; alternativamente, «los israelitas»; tradicionalmente, «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el siguiente evento. «Y sucedió» conserva el valor discursivo de apertura narrativa sin sonar arcaico en español.
- source_word: כְּדַבֵּר
  english_pob_choice: as Aaron spoke
  chosen_spanish: mientras Aarón hablaba
  alternatives_spanish:
  - cuando Aarón habló
  - así que Aarón habló
  lexicon: HALOT
  rationale: El כ con infinitivo señala simultaneidad temporal. «Mientras Aarón hablaba» expresa bien el solapamiento de acciones en español natural.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the whole congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la congregación de los israelitas
  - toda la asamblea de los hijos de Israel
  lexicon: HALOT
  rationale: «Congregación» preserva עֵדָה con su sentido comunitario reunido. «Hijos de Israel» mantiene la forma filial explícita del hebreo, conforme a la transparencia de fuente.
- source_word: וַיִּפְנוּ אֶל הַמִּדְבָּר
  english_pob_choice: they turned toward the wilderness
  chosen_spanish: se volvieron hacia el desierto
  alternatives_spanish:
  - se dirigieron hacia el desierto
  - volvieron el rostro hacia el desierto
  lexicon: HALOT
  rationale: פנה con אֶל indica girarse o volverse en dirección a algo. «Se volvieron hacia» conserva la dirección sin sobreespecificar una postura fija.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y entonces
  lexicon: HALOT
  rationale: «Y he aquí» reproduce el valor deíctico y de sobresalto del hebreo con una fórmula natural y reverente en español bíblico actual.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  - la gloria de Yahweh
  lexicon: HALOT
  rationale: כָּבוֹד refiere aquí a la manifestación visible del esplendor divino. Se mantiene «Yahvé» según el criterio editorial para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se translitera como «Yahvé» en el texto principal, conforme al estándar del proyecto y para no sustituir el nombre por un título.
- source_word: נִרְאָה
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  - se hizo visible
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa una aparición visible. «Apareció» es la opción más idiomática y fiel en español.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - dentro de la nube
  - en una nube
  lexicon: HALOT
  rationale: El artículo señala una nube determinada, probablemente la nube de la presencia divina en el relato del desierto. «En la nube» conserva esa referencia específica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. En continuidad con la política del POB, se preserva el nombre propio de Dios en lugar de reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma de בני ישראל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: El hebreo conserva la imagen filial y plural masculina. Se prefiere mantenerla en español por fidelidad fuente, en vez de neutralizarla con un etnónimo más general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto base en inglés no muestra revisiones aplicadas; el pasaje mantiene alta concordancia con el análisis léxico y la decisión doctrinal sobre el nombre divino. La draft española sigue la misma lectura sin introducir cambios textuales innecesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se preservó «hijos de Israel» para reflejar la explicitud del hebreo.
  - «Congregación» se usó para עֲדַת, manteniendo el matiz comunitario reunido.
  - La cláusula temporal con «mientras» conserva la simultaneidad de כְּדַבֵּר.
  - «He aquí» reproduce la partícula de atención וְהִנֵּה sin estilizarla en exceso.
