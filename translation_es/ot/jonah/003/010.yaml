base_translation:
  language: en
  yaml_path: translation/ot/jonah/003/010.yaml
  text: When God saw their deeds[a], that they had turned from their evil way, God relented concerning the disaster that he had spoken to bring on them[b], and he did not do it.
  footnotes:
  - marker: a
    text: Or 'changed his mind'; Hebrew 'relented.' The wording describes God's response to Nineveh's repentance without implying moral fault in God.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same word for 'evil' in 'their evil way' and for the threatened 'disaster.' In context the first is moral evil; the second is calamity or judgment.
    reason: lexical_alternative
