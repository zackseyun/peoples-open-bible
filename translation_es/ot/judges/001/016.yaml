    rationale: מִדְבָּר en este contexto geográfico se corresponde mejor con «desierto» o «región desértica / estepa», no con «tierra despoblada». La opción actual introduce una interpretación de falta de población que no es el punto principal del hebreo ni de la POB inglesa.
  - severity: low
