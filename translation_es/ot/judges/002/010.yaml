    reason: cultural_note
  - marker: b
    text: 'O: «no reconocía a Yahvé»; el hebreo puede indicar conocimiento relacional o de pacto, no solo información factual.'
    reason: lexical_alternative
  revision_rationale: Se corrige la primera cláusula para reflejar el verbo plural hebreo y evitar una concordancia singular poco natural en español. El resto del versículo se mantiene porque transmite fielmente el sentido fuente, la terminología del proyecto y la nota teológica sobre «conocer a Yahvé».
