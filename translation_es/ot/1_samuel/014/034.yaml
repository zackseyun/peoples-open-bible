  to: 'Y Saúl dijo: «Dispérsense entre el pueblo y díganles: “Que cada hombre me traiga su buey y cada hombre su oveja; mátenlos aquí y coman, para que no pequen contra Yahvé al comer con la sangre[a]”». Así que todo el pueblo trajo, cada hombre su buey en su mano esa noche[b], y los mataron allí.'
  rationale: Se hicieron reparaciones menores para ajustar el registro al español neutral latinoamericano, preservar en nota la alternativa léxica documentada por el POB inglés para «con/sobre la sangre», y mejorar la naturalidad general. Se mantuvo «Yahvé», el distributivo «cada hombre», y la imagen literal «en su mano» con nota alternativa.
