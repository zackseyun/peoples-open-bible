review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: súplica a Yahvé, petición de ver la aflicción causada por los que odian al salmista, y apelativo participial dirigido a Dios como quien lo levanta de las puertas de la muerte. Sin embargo, dos elecciones españolas debilitan la fidelidad idiomática y semántica: ''Sé benigno conmigo'' suena poco natural para חָנְנֵנִי, y ''desde las puertas de la muerte'' es menos preciso que ''de las puertas de la muerte'' para el rescate desde el umbral/poder de la muerte.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero 'Sé benigno conmigo' resulta algo forzada en español eclesial moderno y puede sonar más descriptiva del carácter divino que como súplica establecida. 'Ten misericordia de mí' es más natural y fiel como alternativa principal en español. 'De parte de los que me odian' es aceptable, aunque algo más largo; se puede mantener. La puntuación y el flujo son buenos.
  glossary_alignment: Se alinea bien con la política del proyecto al usar 'Yahvé' para יְהוָה. No hay conflictos con otros términos doctrinales. La nota cultural sobre 'las puertas de la muerte' está bien preservada. El cambio principal recomendado es lexical/idiomático para חָנְנֵנִי y una leve mejora preposicional para מִשַּׁעֲרֵי מָוֶת.
  issues:
  - severity: medium
    issue: '''Sé benigno conmigo'' para חָנְנֵנִי suena poco natural en español bíblico actual'
    rationale: Aunque intenta reflejar 'be gracious', en español la súplica natural y ampliamente inteligible es 'Ten misericordia de mí' o 'Sé propicio conmigo'. 'Sé benigno conmigo' no suena idiomático y puede sentirse calcado del inglés.
  - severity: low
    issue: '''desde las puertas de la muerte'' es menos exacto que ''de las puertas de la muerte'''
    rationale: El hebreo מִשַּׁעֲרֵי expresa origen/separación. En español, 'levantar de las puertas de la muerte' comunica mejor rescate desde el borde o dominio de la muerte que 'desde', que puede sonar más espacial que metafórico.
  - severity: low
    issue: La nota a) no refleja la forma revisada como alternativa significativa
    rationale: 'Si el texto principal adopta ''Ten misericordia de mí'', la nota debe ofrecer una alternativa real y útil, por ejemplo ''O: «Sé propicio conmigo, Yahvé»''.'
  revised_spanish_text: Ten misericordia de mí[a], Yahvé; mira mi aflicción de parte de los que me odian[b], tú que me levantas de las puertas de la muerte.
  revised_footnotes:
