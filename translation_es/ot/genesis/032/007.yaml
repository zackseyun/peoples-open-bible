translation:
  language: es
  text: 'Los mensajeros[a] regresaron a Jacob, diciendo: «Llegamos hasta tu hermano, hasta Esaú, y él también viene a encontrarte, y cuatrocientos hombres están con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probable en este contexto, «los ángeles». El hebreo מַלְאָכִים puede significar tanto «mensajeros» como «ángeles», pero aquí se refiere a los enviados humanos que Jacob mandó a Esaú.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: El verbo שוב en wayyiqtol narra una acción pasada concluida. «Regresaron» comunica naturalmente el movimiento de vuelta al punto de partida y suena idiomático en español.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los ángeles
  lexicon: HALOT
  rationale: מלאך puede significar «mensajero» o «ángel», pero el contexto inmediato muestra que se trata de los enviados humanos que Jacob mandó a Esaú. Por eso se mantiene «mensajeros».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo. «Diciendo» conserva esa estructura con naturalidad en español.
- source_word: בָּאנוּ
  english_pob_choice: We came
  chosen_spanish: Fuimos
  alternatives_spanish:
  - Vinimos
  - Llegamos
  lexicon: HALOT
  rationale: Aquí la perspectiva del hablante hace natural un verbo de movimiento en español. «Fuimos a tu hermano» preserva el valor direccional del hebreo sin sonar forzado; «llegamos» sería posible, pero no reproduce tan bien el movimiento hacia Esaú expresado en la frase siguiente.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - el hermano de Jacob
  - tu hermano Esaú
  lexicon: HALOT
  rationale: Se conserva el parentesco retóricamente importante. En español, el posesivo directo mantiene la fuerza relacional del hebreo.
- source_word: אֶל עֵשָׂו
  english_pob_choice: to Esau
  chosen_spanish: a Esaú
  alternatives_spanish:
  - hacia Esaú
  - a tu hermano Esaú
  lexicon: HALOT
  rationale: 'La segunda partícula אֶל funciona aquí como aclaración apposicional; en español se traduce con una repetición explicativa natural: «a Esaú».'
- source_word: וְגַם
  english_pob_choice: and he is also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - y además
  lexicon: HALOT
  rationale: 'גם añade un dato notable: Esaú mismo viene. «Y también» conserva la adición sin sobreinterpretarla.'
- source_word: הֹלֵךְ לִקְרָאתְךָ
  english_pob_choice: is coming to meet you
  chosen_spanish: viene a encontrarte
  alternatives_spanish:
  - va a encontrarte
  - se acerca para encontrarte
  lexicon: HALOT
  rationale: El participio הלך con לקראת expresa un movimiento continuo hacia un encuentro. «Viene a encontrarte» es idiomático en español y mantiene tanto la direccionalidad como el aspecto progresivo.
- source_word: וְאַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: and four hundred men
  chosen_spanish: y con él hay cuatrocientos hombres
  alternatives_spanish:
  - y cuatrocientos hombres con él
  - y lo acompañan cuatrocientos hombres
  lexicon: HALOT
  rationale: El hebreo presenta de forma simple la cifra y el sustantivo. En español, una cláusula existencial con «hay» expresa con claridad que forman parte de su compañía; «hombres» conserva el sentido de una escolta o grupo masculino sin neutralizar el término.
- source_word: עִמּוֹ
  english_pob_choice: are with him
  chosen_spanish: con él
  alternatives_spanish:
  - están con él
  lexicon: HALOT
  rationale: La preposición עִם se vierte de manera natural con «con». La expansión verbal «hay» integra la idea de acompañamiento en una frase fluida.
theological_decisions:
- issue: 'Sentido de מַלְאָכִים: mensajeros o ángeles'
  english_pob_reading: the messengers returned to Jacob
  chosen_spanish_reading: los mensajeros regresaron a Jacob
  alternative_spanish_readings:
  - los ángeles regresaron a Jacob
  rationale: La narración inmediata requiere los enviados humanos de Jacob, no seres celestiales. Mantener «mensajeros» evita borrar la referencia contextual y sigue la decisión auditada del texto inglés.
  doctrine_reference: Contexto narrativo inmediato; uso léxico de מלאך
- issue: 'Movimiento de Esaú: «viene a encontrarte»'
  english_pob_reading: he is also coming to meet you
  chosen_spanish_reading: también viene a encontrarte
  alternative_spanish_readings:
  - también va a encontrarte
  - también se acerca a encontrarte
  rationale: El hebreo describe un desplazamiento activo hacia un encuentro. La formulación española conserva la inminencia sin convertirla en una paráfrasis interpretativa más fuerte que el original.
  doctrine_reference: Narrativa de encuentro en Génesis 32
translation_notes:
  revision_awareness: El texto sigue de cerca la solución auditada en inglés y no requiere revisiones adicionales según el registro más reciente. Se mantuvo la preferencia contextual por «mensajeros» frente a «ángeles» y se conservó la progresión narrativa con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Esaú» con tilde según la ortografía española habitual.
  - Se preserva la relación retórica «tu hermano» sin expandirla innecesariamente.
  - La cláusula final usa «con él hay» para mantener el dato cuantitativo y la compañía sin introducir connotaciones no presentes en el hebreo.
