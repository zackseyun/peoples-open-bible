translation:
  language: es
  text: Pero a Ana le daba una porción doble[a], porque amaba a Ana, y Yahvé había cerrado su vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «una porción de dos rostros/narices»; la frase es difícil y puede significar «una porción doble» o «una porción especial».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/חַנָּה
  english_pob_choice: But to Hannah
  chosen_spanish: Pero a Ana
  alternatives_spanish:
  - Y a Ana
  - Mas a Ana
  lexicon: HALOT
  rationale: La conjunción con la preposición introduce contraste con la porción dada a los demás; en español, «Pero» comunica mejor ese contraste que un simple «Y». Mantengo el dativo con «a Ana» para reflejar la construcción hebrea.
- source_word: יִתֵּן
  english_pob_choice: he would give
  chosen_spanish: le daba
  alternatives_spanish:
  - le daba habitualmente
  - le daba
  - le daría
  lexicon: HALOT
  rationale: El imperfecto en narración expresa acción habitual o repetida en el pasado. «Le daba» suena natural en español y conserva ese valor iterativo mejor que un futuro o un pretérito puntual.
- source_word: מָנָה
  english_pob_choice: portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una parte
  - una ración
  lexicon: HALOT
  rationale: «Porción» es el equivalente más directo y digno para la medida asignada en el banquete sacrificial.
- source_word: אַחַת אַפָּיִם
  english_pob_choice: a double portion
  chosen_spanish: una porción doble
  alternatives_spanish:
  - una porción especial
  - una porción de dos rostros/narices
  - una doble porción
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y probablemente idiomática. «Una porción doble» comunica la lectura tradicional y deja claro que se trata de una porción aumentada o especial, sin ocultar la ambigüedad del original. La alternativa literal queda reflejada en nota.
- source_word: אֶת חַנָּה אָהֵב
  english_pob_choice: he loved Hannah
  chosen_spanish: amaba a Ana
  alternatives_spanish:
  - quería a Ana
  - amaba a Hannah
  lexicon: HALOT
  rationale: El hebreo expresa amor afectivo y marcado; «amaba» conserva esa fuerza. Se usa «Ana» por la forma española de uso bíblico y eclesial ampliamente reconocible.
- source_word: וַֽ/יהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: La guía del proyecto pide traducir el Tetragrama por «Yahvé» en el texto principal, manteniendo el nombre propio divino y evitando la sustitución por un título genérico.
- source_word: סָגַר רַחְמָהּ
  english_pob_choice: had closed her womb
  chosen_spanish: había cerrado su matriz
  alternatives_spanish:
  - había cerrado su vientre
  - había cerrado su seno
  lexicon: HALOT
  rationale: «Matriz» conserva el campo semántico corporal y reproductivo del hebreo רַחַם con un registro bíblico pero comprensible. «Había cerrado» expresa bien el pluscuamperfecto contextual del relato.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo contiene el Tetragrama directamente. La norma del proyecto para español establece «Yahvé» como forma principal, preservando el nombre del pacto en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre el amor de Elcaná y la esterilidad de Ana
  english_pob_reading: though the LORD had closed her womb
  chosen_spanish_reading: aunque Yahvé había cerrado su matriz
  alternative_spanish_readings:
  - y Yahvé había cerrado su matriz
  - mientras Yahvé había cerrado su matriz
  rationale: '«Aunque» hace explícita la concesión implícita en la yuxtaposición: Elcaná amaba a Ana a pesar de su esterilidad. Esto no suaviza la afirmación de soberanía divina; simplemente aclara la relación lógica entre las cláusulas para una lectura natural en español.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source meaning without importing doctrine'
translation_notes:
  revision_awareness: 'Concordancia alta con el repaso más reciente del texto base: no se reportaron cambios necesarios. La redacción española sigue la lectura del audit trail inglés, pero adapta el Nombre divino y el registro léxico al marco terminológico del proyecto en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología española del proyecto.
  - Se conserva el matiz imperfectivo con «le daba» para el verbo hebreo en contexto narrativo habitual.
  - «Matriz» mantiene un registro bíblico claro para רַחַם sin perder inteligibilidad.
  - La nota de pie de página preserva la ambigüedad léxica del idiomático אַחַת אַפָּיִם.
