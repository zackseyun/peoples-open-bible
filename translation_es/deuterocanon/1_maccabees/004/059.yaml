translation:
  language: es
  text: Y Judas, sus hermanos y toda la asamblea de Israel decretaron que los días de la dedicación del altar se observaran en sus tiempos señalados, año tras año, durante ocho días, desde el vigésimo quinto día del mes de Quisleu[a], con alegría y gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Χασελεύ refleja el nombre judío del mes, frecuentemente escrito «Quisleu» o «Kislev» en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησεν
  english_pob_choice: decreed
  chosen_spanish: decretaron
  alternatives_spanish:
  - establecieron
  - ordenaron
  - determinaron
  lexicon: LSJ
  rationale: En este contexto, el verbo introduce una decisión comunitaria seguida por una cláusula de contenido; «decretaron» comunica bien la fuerza formal de una determinación pública sin sonar demasiado literal en español.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - comunidad
  lexicon: LSJ
  rationale: Para el Israel precristiano de 1 Macabeos, «asamblea» conserva la idea de pueblo reunido y evita cargar el término con sentidos eclesiásticos posteriores.
- source_word: ἵνα ἄγωνται
  english_pob_choice: should be observed
  chosen_spanish: se celebraran
  alternatives_spanish:
  - se observaran
  - se guardaran
  - se festejaran
  lexicon: LSJ
  rationale: El griego apunta a la conmemoración anual de días festivos. En español, «se celebraran» expresa naturalmente el acto de conmemorar la dedicación; no se pierde la idea de observancia ritual, que queda sostenida por el contexto.
- source_word: ἐγκαινισμοῦ
  english_pob_choice: dedication
  chosen_spanish: dedicación
  alternatives_spanish:
  - consagración
  - inauguración
  - renovación
  lexicon: LSJ
  rationale: «Dedicación» es el equivalente más claro para el acto cultual de poner algo aparte para Dios, y coincide con el contexto histórico de la dedicación del altar.
- source_word: τοῦ θυσιαστηρίου
  english_pob_choice: of the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del altar sacrificial
  lexicon: LSJ
  rationale: «Altar» basta para reflejar el término griego sin añadir especificaciones que el texto no exige.
- source_word: ἐν τοῖς καιροῖς αὐτῶν
  english_pob_choice: at their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus estaciones
  - a su debido tiempo
  lexicon: LSJ
  rationale: La frase expresa recurrencia calendárica fija. «En sus tiempos señalados» mantiene el valor temporal formal y la idea de cita anual establecida.
- source_word: ἐνιαυτὸν κατʼ ἐνιαυτὸν
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - de año en año
  lexicon: LSJ
  rationale: El modismo griego indica repetición anual. «Año tras año» es idiomático y conserva el énfasis repetitivo.
- source_word: ἡμέρας ὀκτώ
  english_pob_choice: for eight days
  chosen_spanish: durante ocho días
  alternatives_spanish:
  - por ocho días
  - ocho días
  lexicon: LSJ
  rationale: En español, «durante ocho días» transmite con naturalidad la duración de la celebración.
- source_word: ἀπὸ τῆς πέμπτης καὶ εἰκάδος
  english_pob_choice: from the twenty-fifth day
  chosen_spanish: desde el vigésimo quinto día
  alternatives_spanish:
  - a partir del vigésimo quinto día
  - del vigésimo quinto día
  lexicon: LSJ
  rationale: «Desde» reproduce bien el valor de ἀπό como punto de inicio del período de ocho días.
- source_word: τοῦ μηνὸς Χασελεὺ
  english_pob_choice: of the month Chislev
  chosen_spanish: del mes de Quisleu
  alternatives_spanish:
  - del mes de Kislev
  - del mes de Casleu
  lexicon: LSJ
  rationale: «Quisleu» sigue de cerca la forma griega Χασελεύ y es una transliteración tradicional en español bíblico. Se preserva así la referencia calendárica con fidelidad histórica.
- source_word: μετʼ εὐφροσύνης καὶ χαρᾶς
  english_pob_choice: with gladness and joy
  chosen_spanish: con alegría y gozo
  alternatives_spanish:
  - con regocijo y alegría
  - con júbilo y gozo
  lexicon: LSJ
  rationale: La pareja de sustantivos refuerza la nota festiva. «Alegría y gozo» es natural en español y conserva la doble expresión de celebración.
theological_decisions:
- issue: Sentido de ἐκκλησία en un contexto judío precristiano
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - comunidad
  rationale: Se evita cualquier lectura anacrónica de «iglesia». «Asamblea» mantiene el sentido de reunión del pueblo de Israel y respeta el marco histórico del libro.
  doctrine_reference: Principio de primacía del idioma original y de no introducir terminología eclesial posterior sin justificación textual.
translation_notes:
  revision_awareness: El inglés revisado ajustó la preposición temporal de una formulación más explícita («beginning on») a «from» para alinearse mejor con ἀπό. En español, se siguió directamente ese valor con «desde», manteniendo también el orden y la estructura temporal de la oración griega.
  spanish_consistency_notes:
  - Se usa «Y» al inicio porque el griego comienza con καὶ y la coordinación narrativa fluye naturalmente en español.
  - «Dedicación del altar» preserva la relación genitiva sin añadir explicaciones no presentes en el texto.
  - Se prefirió «gozo» además de «alegría» para reflejar la duplicación enfática del original.
  - El mes se translitera como «Quisleu» en el texto principal, con nota para la variante «Kislev».
