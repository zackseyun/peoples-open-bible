translation:
  language: es
  text: Él cercó el horizonte[a] en su gloria[c], y la mano de Dios[b] se extendió en su majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Él cercó el cielo con un círculo de gloria». El hebreo lee חוק, normalmente «estatuto», lo que puede reflejar un texto subyacente distinto o una expresión poética difícil.'
    reason: alternative_reading
  - marker: b
    text: El hebreo tiene el singular «la mano de Dios»; el paralelo griego usa el plural «las manos del Altísimo».
    reason: textual_variant
  - marker: c
    text: La tradición de Masada conserva solo un fragmento aquí («… en su gloria»), mientras que el texto de la Geniza de El Cairo aporta la redacción más completa usada en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: חוק
  english_pob_choice: the horizon
  chosen_spanish: el horizonte
  alternatives_spanish:
  - el límite
  - el círculo
  - la circunferencia
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse de forma difícil, el contexto poético y la revisión inglesa más reciente lo entienden como la línea o límite circular del cielo. En español, 'horizonte' comunica mejor esa idea de borde visible/cósmico que un término jurídico como 'estatuto'.
- source_word: הקיפה
  english_pob_choice: encircled
  chosen_spanish: cercó
  alternatives_spanish:
  - encircó
  - rodeó
  - circundó
  lexicon: HALOT
  rationale: El verbo expresa rodear o hacer un círculo. 'Cercó' es natural en español y conserva la imagen de delimitación espacial sin endurecer el estilo poético.
- source_word: בכבודה
  english_pob_choice: in his glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - con su gloria
  - en gloria
  lexicon: HALOT
  rationale: La forma posesiva se conserva con 'su'. 'En su gloria' mantiene la referencia al esplendor divino y suena idiomático en español bíblico moderno.
- source_word: ויד אל
  english_pob_choice: and the hand of God
  chosen_spanish: y la mano de Dios
  alternatives_spanish:
  - y la mano del Dios Altísimo
  - y la mano del Poderoso
  lexicon: HALOT
  rationale: Se sigue el hebreo singular 'mano' y el sentido divino de אל en este contexto. 'De Dios' es la opción más clara y natural para el lector español.
- source_word: נטתה
  english_pob_choice: stretched out
  chosen_spanish: se extendió
  alternatives_spanish:
  - se alargó
  - fue extendida
  - se tendió
  lexicon: HALOT
  rationale: El verbo denota extender o tender. 'Se extendió' preserva la imagen sin introducir una reflexividad extraña en español, y corresponde al movimiento de la mano en el verso.
- source_word: בגבה
  english_pob_choice: in his majesty
  chosen_spanish: en su majestad
  alternatives_spanish:
  - en su altura
  - en su exaltación
  - en su grandeza
  lexicon: HALOT
  rationale: En este contexto de alabanza, 'majestad' comunica bien la noción de altura gloriosa o exaltación. Es más natural que un literal 'altura' y mantiene el tono doxológico.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The English audit trail preserves the Hebrew-based line 'He encircled the horizon in his glory' while noting the Greek parallel 'He encircled heaven with a circle of glory' and 'hands of the Most High.'
  chosen_spanish_reading: 'Se mantiene la línea basada en el hebreo: ''Él cercó el horizonte en su gloria, y la mano de Dios se extendió en su majestad.'''
  alternative_spanish_readings:
  - Él cercó el cielo con un círculo de gloria, y las manos del Altísimo lo extendieron.
  - Él cercó el cielo en su gloria, y la mano del Dios Altísimo lo extendió.
  rationale: 'Para Sirácida, cuando el hebreo está disponible y se considera de alta confianza, se da primacía al testimonio hebreo en el texto principal. El griego se conserva como evidencia real y se refleja en las notas, porque introduce una diferencia interpretativa importante: cielo/horizonte y mano singular/manos plurales.'
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy over translation tradition; Sirach source policy'
- issue: Singular 'mano' frente al plural griego 'manos'
  english_pob_reading: The English footnote explicitly notes Hebrew singular 'the hand of God' versus Greek plural 'hands of the Most High.'
  chosen_spanish_reading: '''la mano de Dios'''
  alternative_spanish_readings:
  - '''las manos del Altísimo'''
  - '''la mano del Dios Altísimo'''
  rationale: La forma singular sigue el hebreo base y evita nivelar la tensión textual. La pluralidad griega se preserva en nota para no borrar la variante documental.
  doctrine_reference: Textual variant policy for Sirach
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una lectura previa basada en una interpretación jurídica de חוק y la reemplazó por 'horizon' para reflejar mejor el valor espacial/cósmico del pasaje. La versión española sigue esa revisión, evita introducir un sentido legal ajeno al contexto y mantiene la tensión textual con el paralelo griego en las notas.
  spanish_consistency_notes:
  - Se usa 'Dios' para אל en sentido divino, no 'Altísimo', porque el hebreo base singulariza 'mano de Dios' y el contexto ya es doxológico.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque aquí no aparece YHWH en el texto base.
  - '''Majestad'' se prefiere a ''altura'' por claridad y solemnidad, aunque ambas permanecen semánticamente cercanas.'
  - La puntuación separa el hemistiquio principal con coma para reflejar el paralelismo poético sin sobrecargar el español.
