translation:
  language: es
  text: 'Y los hijos de Merari[a], sus hermanos, estaban a la izquierda: Etán, hijo de Kishi, hijo de Abdi, hijo de Maluc.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes»; el hebreo «hermanos» puede referirse de manera más amplia a miembros del mismo clan en contextos genealógicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  lexicon: HALOT
  rationale: בני introduce una línea genealógica/clánica. «Hijos de» conserva la forma del hebreo y resulta natural en español bíblico; «descendientes de» sería posible, pero suaviza la fórmula genealógica.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus miembros de clan
  lexicon: HALOT
  rationale: «Hermanos» conserva el lenguaje del hebreo. En contexto genealógico puede abarcar miembros del mismo clan; por eso no se restringe a la relación fraterna literal.
- source_word: עַל הַשְּׂמֹאול
  english_pob_choice: were on the left
  chosen_spanish: estaban a la izquierda
  alternatives_spanish:
  - estaban del lado izquierdo
  - estaban al lado izquierdo
  lexicon: HALOT
  rationale: La expresión hebrea indica posición espacial. En español, «a la izquierda» es la forma más natural y fiel; el verbo «estaban» suplía la elipsis del hebreo, como en la solución inglesa.
- source_word: אֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Ethan
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una cadena genealógica, «hijo de» reproduce la fórmula del hebreo con claridad y sin debilitar su valor directo.
- source_word: קִישִׁי
  english_pob_choice: Kishi
  chosen_spanish: Kishi
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: עַבְדִּי
  english_pob_choice: Abdi
  chosen_spanish: Abdi
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: מַלּוּךְ
  english_pob_choice: Malluch
  chosen_spanish: Malluc
  alternatives_spanish:
  - Malluc
  - Malluc(h)
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con la terminación adaptada para lectura natural. Se conserva la misma entidad onomástica del hebreo y de la versión inglesa.
theological_decisions:
- issue: Sentido de אֲחֵיהֶם en contexto genealógico/clánico
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus miembros de clan
  rationale: No se atenúa el término principal, porque el hebreo mantiene el parentesco léxico. A la vez, en contexto de listas genealógicas levíticas, el alcance puede ser clánico; esa tensión se preserva en la nota, sin reemplazar el término por una paráfrasis más general.
  doctrine_reference: Uso bíblico de אָח / ἀδελφοί en contextos tribales y genealógicos; lectura contextual de parentesco ampliado.
translation_notes:
  revision_awareness: Coincide con el texto fuente hebreo y con el audit trail inglés de alta concordancia; no se detectan cambios revisados ni tensiones textuales adicionales que requieran nota de variante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se conserva la fórmula genealógica repetida «hijo de» para reflejar la estructura del hebreo.
  - Se evita «siervo» o «pariente» como sustitutos principales de אֲחֵיהֶם para no borrar la posibilidad de parentesco ampliado.
  - «Malluc» se adapta ortográficamente al español, pero sin alterar el nombre propio.
