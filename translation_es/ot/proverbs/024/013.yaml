base_translation:
  language: en
  yaml_path: translation/ot/proverbs/024/013.yaml
  text: Eat honey[a], my son, for it is good[b], and the drippings of the honeycomb are sweet to your taste.
  footnotes:
  - marker: a
    text: Or 'and honeycomb is sweet to your palate.' The Hebrew נֹפֶת can denote comb honey or honey drippings; 'honey from the comb' makes the sense clearer in contemporary English.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon your palate.'
    reason: lexical_alternative
