translation:
  language: es
  text: He aquí, Dios no rechaza al íntegro, ni sostiene[a] la mano de los malhechores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni apoya a los malhechores»; más literalmente, «ni agarra la mano de los malhechores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: La partícula introduce una exhortación atencional y enfática. «Mira» conserva el golpe retórico en español sin sonar excesivamente arcaico, y funciona bien en poesía sapiencial.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל es el sustantivo poético común para Dios. «Dios» reproduce el valor directo del término sin añadir un matiz no explicitado por el hebreo.
- source_word: יִמְאַס
  english_pob_choice: reject
  chosen_spanish: rechaza
  alternatives_spanish:
  - desprecia
  - repudia
  - rechaza de sí
  lexicon: HALOT
  rationale: El verbo expresa rechazo o desestimación. «Rechaza» mantiene la fuerza relacional y judicial del hebreo sin intensificarlo innecesariamente hacia el desprecio emocional.
- source_word: תָּם
  english_pob_choice: the blameless
  chosen_spanish: el íntegro
  alternatives_spanish:
  - el inocente
  - el de integridad
  - el irreprochable
  lexicon: HALOT
  rationale: תָּם describe a alguien entero, íntegro o sin culpa. «El íntegro» conserva la idea de integridad moral y funciona naturalmente en español como sustantivo; se evita «blameless» calcado por la menor naturalidad del equivalente directo.
- source_word: יַחֲזִיק
  english_pob_choice: uphold / take / grasp
  chosen_spanish: toma de la mano
  alternatives_spanish:
  - sostiene la mano de
  - agarra la mano de
  - apoya la mano de
  lexicon: HALOT
  rationale: El hiphil de חזק con בְּיַד forma una imagen idiomática de tomar o aferrar la mano, con posible implicación de apoyo. «Toma de la mano» preserva la imagen concreta y deja abierta la lectura contextual de apoyo sin sobreparafrasear.
- source_word: בְּיַד
  english_pob_choice: the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - por la mano de
  - en la mano de
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «en/by la mano de». En español, «de la mano de» expresa de manera natural la relación idiomática con חזק y mantiene la imagen corporal.
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los malvados
  - los que hacen el mal
  - los impíos
  lexicon: HALOT
  rationale: El participio de רעע señala a quienes hacen el mal. «Malhechores» conserva el carácter activo y verbal mejor que «malvados», y evita suavizar el término hacia una categoría meramente moral abstracta.
theological_decisions:
- issue: Sentido del modismo וְלֹא יַחֲזִיק בְּיַד מְרֵעִים
  english_pob_reading: God does not uphold the hand of evildoers, with the image of taking/grasping the hand retained as a possible literal sense.
  chosen_spanish_reading: Dios no toma de la mano a los malhechores, es decir, no los sostiene ni los favorece.
  alternative_spanish_readings:
  - Dios no sostiene la mano de los malhechores
  - Dios no afianza la mano de los malhechores
  - Dios no los toma de la mano
  rationale: 'El hebreo admite una lectura concreta («tomar/aferrar la mano») y una lectura inferida («sostener/apoyar»). La redacción principal conserva la imagen física y, a la vez, permite entender el juicio teológico: Dios no respalda a los impíos. Así se preserva la tensión idiomática sin resolverla de forma excesivamente interpretativa.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the idiom and the theological point without flattening either.'
translation_notes:
  revision_awareness: El texto inglés de POB pasó de «a blameless man» a «the blameless» y de «take the hand of evildoers» a «uphold the hand of evildoers» para reflejar mejor el hebreo. La versión española sigue esa revisión al usar un sustantivo colectivo («al íntegro») y al preservar el modismo de la mano sin convertirlo en una paráfrasis plana.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל según el valor poético común del término en este contexto.
  - «Integro» se eligió como equivalente funcional de תָּם; no se usa «justo» porque ese matiz corresponde más directamente a otros vocablos hebreos.
  - «Malhechores» mantiene el carácter activo del participio hebreo y evita una neutralización excesiva.
  - La nota al pie se ancla en «íntegro» para preservar una alternativa legítima dentro del campo semántico de תָּם.
