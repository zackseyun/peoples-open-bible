revisions:
- from: Y aconteció en el séptimo día que se levantaron temprano, al subir la aurora, y rodearon la ciudad de esta manera siete veces. Solo en aquel día rodearon la ciudad siete veces.
  to: Y aconteció el séptimo día que se levantaron temprano, al subir la aurora[a], y rodearon la ciudad de esta manera siete veces. Solo ese día rodearon la ciudad siete veces.
  rationale: Se corrigen dos expresiones temporales para un español más natural y fiel («el séptimo día», «ese día») y se preserva en nota la alternativa más simple para la imagen literal de כַּעֲלוֹת הַשַּׁחַר, siguiendo el rastro de auditoría inglés sin perder la metáfora del original.
