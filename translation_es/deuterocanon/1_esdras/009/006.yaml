base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/009/006.yaml
  text: And the whole assembly sat together in the open court of the temple[b][a], trembling because of the present storm.
  footnotes:
  - marker: a
    text: Or 'in the broad place of the temple' or 'in the spacious area of the sanctuary.' The Greek εὐρυχώρῳ is somewhat unusual and may denote an open area within the temple precincts.
    reason: lexical_alternative
  - marker: b
    text: Or 'trembling at the winter storm' or 'because of the weather then upon them.' Greek χειμών can mean 'winter' or 'storm/rough weather'; the context favors stormy weather.
    reason: lexical_alternative
