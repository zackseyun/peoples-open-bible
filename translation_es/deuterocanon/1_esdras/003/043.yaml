review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un hombre deja a su propio padre, que lo crió, y su propia χώρα para unirse a su esposa. Conserva correctamente el masculino representativo, el énfasis reflexivo en ‘su propio padre’, y el valor marital de γυναῖκα como ‘esposa’. Sin embargo, ‘su propia tierra’ debilita la decisión auditada en inglés de ‘his own country’ y puede sonar demasiado físico/territorial en español, mientras que la nota al pie ya usa ‘patria’.'
  spanish_quality_summary: El español es claro y natural, pero la secuencia mejora con ‘su propio país’ o ‘su patria’ en vez de ‘su propia tierra’. Además, ‘se aferra’ es comprensible, pero en contexto matrimonial ‘se une a’ o ‘se apega a’ suena más idiomático que una expresión que puede sugerir dependencia ansiosa. Aun así, no es un error grave; el ajuste principal necesario es χώρα.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. Las decisiones ‘Un hombre’, ‘esposa’ y ‘deja’ concuerdan con el expediente inglés. La principal divergencia es lexical: χώρα fue auditado como ‘country’, y en español ‘tierra’ introduce una amplitud no reflejada en la elección base; ‘país’ preserva mejor la decisión documentada, con ‘patria’ reservado como alternativa en la nota.'
  issues:
  - severity: medium
    issue: ‘su propia tierra’ para τὴν ἰδίαν χώραν
    rationale: Aunque χώρα puede significar tierra/región/país, el expediente inglés eligió específicamente ‘his own country’. En español, ‘tierra’ puede sonar más poético o territorial y menos claramente nacional/geográfico. ‘Su propio país’ preserva mejor la racionalidad auditada.
  - severity: low
    issue: ‘se aferra’ para κολλᾶται en contexto conyugal
    rationale: Es una traducción posible del valor de adhesión fuerte, pero en español matrimonial puede sonar algo rígida o psicológica. ‘Se une a’ o ‘se apega a’ sería más idiomático. No obstante, dado que el inglés aprobó ‘clings’, no es necesario forzar un cambio aquí.
  revised_spanish_text: Un hombre deja a su propio padre[a], que lo crió, y su propio país, y se aferra a su propia esposa.
  revised_footnotes:
  - marker: a
    text: O ‘abandona’ o ‘desampara’ para ἐγκαταλείπει; el verbo griego puede ser más fuerte, pero aquí probablemente describe el dejar padre y patria para unirse a su esposa.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta μόνο χώρα: ‘su propio país’ sigue más de cerca la decisión documentada ‘his own country’ y evita la amplitud de ‘tierra’. Se conserva ‘deja’ con su nota, ‘Un hombre’, ‘su propio padre’ y ‘se aferra a su propia esposa’ por ser fieles, claros y suficientemente idiomáticos.'
