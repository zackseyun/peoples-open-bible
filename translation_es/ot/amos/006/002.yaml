  to: Crucen a Calné[b] y vean; y de allí vayan a Hamat la grande; luego bajen a Gat de los filisteos. ¿Son mejores[a] que estos reinos? ¿O es su territorio mayor que el de ustedes?
  rationale: 'Se corrigieron las notas para que coincidan con la evidencia y el audit trail inglés: la ambigüedad de «mejores» pasó a una nota de lectura alternativa, y la incertidumbre geográfica de Calné quedó como nota cultural separada. En el texto principal, «Crucen» refleja mejor עִבְרוּ, y «¿Son mejores...?» preserva la falta de sujeto explícito del hebreo sin perder naturalidad en español.'
