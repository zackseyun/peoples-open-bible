  to: y las ollas, las palas, las vasijas[a][c], y todos estos utensilios que Hiram hizo para el rey Salomón para la casa de Yahvé eran de bronce bruñido[b].
  rationale: Se cambia 'tazones' por 'vasijas' para reflejar mejor el valor cultual amplio de הַמִּזְרָקוֹת y la decisión inglesa principal 'basins', dejando 'cuencos' como alternativa española natural. Se corrige la nota para eliminar la referencia impropia al inglés y se conserva la nota heredada sobre la redacción previa del cierre. También se mueve la nota sobre 'bronce pulido' al sintagma correspondiente para anclarla con precisión.
