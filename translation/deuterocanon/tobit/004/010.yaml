translation:
  text: For almsgiving rescues from death and will not allow one to enter into the darkness[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charity' or 'acts of mercy'; the Greek specifically refers to giving alms to the needy.
    reason: lexical_alternative
  - marker: b
    text: '''The darkness'' likely evokes the realm of death or deep gloom; the Greek leaves the image concise and somewhat open.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλεημοσύνη
  chosen: almsgiving
  alternatives:
  - charity
  - acts of mercy
  lexicon: BDAG
  rationale: In Hellenistic Jewish usage the noun commonly denotes charitable giving to the needy, not merely an abstract disposition of mercy. 'Almsgiving' preserves the concrete sense present in the context of Tobit.
- source_word: ἐκ θανάτου
  chosen: from death
  alternatives:
  - out of death
  lexicon: BDAG
  rationale: The preposition ἐκ marks deliverance away from death. 'From death' is idiomatic English and preserves the sense of rescue.
- source_word: ῥύεται
  chosen: rescues
  alternatives:
  - delivers
  - saves
  lexicon: BDAG
  rationale: The verb means to rescue or deliver from danger. 'Rescues' is vivid, natural English and avoids importing broader soteriological overtones that 'saves' might suggest.
- source_word: οὐκ ἐάσει
  chosen: will not allow
  alternatives:
  - will not permit
  - will not let
  lexicon: BDAG
  rationale: Future of ἐάω expresses prevention or refusal to permit. 'Will not allow' is clear modern English.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go into
  lexicon: BDAG
  rationale: Standard rendering of the infinitive of εἰσέρχομαι; 'enter' is concise and idiomatic.
- source_word: εἰς τὸ σκότος
  chosen: into the darkness
  alternatives:
  - into darkness
  lexicon: BDAG
  rationale: The article supports a definite expression. 'The darkness' preserves the Greek form and leaves the image slightly open, whether understood as death, Sheol, or eschatological gloom.
