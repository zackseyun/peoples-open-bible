translation:
  language: es
  text: y sobre el altar, para ofrecer holocaustos cada día[a], como se les ha mandado, ofrecer diecisiete[b], y diez talentos más por año[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego aquí es inusual y, de manera más literal, puede sugerir «suministrar» o «proveer» los holocaustos.
    reason: lexical_alternative
  - marker: b
    text: El objeto de «diecisiete» no se repite explícitamente en griego; probablemente alude a elementos sacrificiales que debían presentarse como parte del requisito diario.
    reason: alternative_reading
  - marker: c
    text: «Talento» era una gran unidad de peso, a menudo de metal precioso; el texto no especifica aquí cuál metal.
    reason: cultural_note
lexical_decisions:
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: LSJ
  rationale: El término cultual estándar en español es «altar»; el contexto sacrificial ya queda claro por «holocaustos», sin necesidad de sobreespecificar.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: LSJ
  rationale: «Holocaustos» refleja el sentido sacrificial de ofrendas completamente consumidas por el fuego y es un término tradicional y preciso en registro bíblico en español.
- source_word: καρποῦσθαι
  english_pob_choice: to offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - suministrar
  - proveer
  lexicon: LSJ
  rationale: La forma griega es inusual y puede sugerir ‘suministrar/proveer’, pero en este contexto cultual funciona como verbo de presentación sacrificial. «Ofrecer» conserva la fuerza ritual sin sonar forzado.
- source_word: καθ’ ἡμέραν
  english_pob_choice: daily
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: LSJ
  rationale: «Cada día» es una equivalencia natural y clara en español, manteniendo la regularidad exigida por el texto.
- source_word: καθὰ ἔχουσιν ἐντολήν
  english_pob_choice: as they have been commanded
  chosen_spanish: como han sido mandados
  alternatives_spanish:
  - según han recibido mandato
  - como se les ha mandado
  lexicon: LSJ
  rationale: La construcción expresa una obligación establecida; «han sido mandados» preserva el carácter imperativo sin añadir interpretación doctrinal.
- source_word: ἑπτὰ καὶ δέκα
  english_pob_choice: seventeen
  chosen_spanish: diecisiete
  alternatives_spanish:
  - diez y siete
  lexicon: LSJ
  rationale: Se usa la forma idiomática en español, sin necesidad de calcar el orden griego.
- source_word: προσφέρειν
  english_pob_choice: to offer
  chosen_spanish: ofrecer
  alternatives_spanish:
  - presentar
  - llevar
  lexicon: LSJ
  rationale: El pasaje ya usa verbo sacrificial; repetir «ofrecer» mantiene la coherencia cultual y la consistencia con la revisión inglesa.
- source_word: ἄλλα τάλαντα δέκα
  english_pob_choice: another ten talents
  chosen_spanish: otros diez talentos
  alternatives_spanish:
  - diez talentos más
  - diez talentos adicionales
  lexicon: LSJ
  rationale: «Otros» conserva el sentido aditivo de ἄλλα; «diez talentos» mantiene la unidad de peso/valor sin especificar metal, como en el texto fuente.
- source_word: κατ’ ἐνιαυτόν
  english_pob_choice: yearly
  chosen_spanish: por año
  alternatives_spanish:
  - anualmente
  - cada año
  lexicon: LSJ
  rationale: «Por año» es claro y conciso; mantiene el carácter periódico del estipendio sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Valor sacrificial de ὁλοκαυτώματα y su registro en español
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente consumidas
  rationale: No se atenúa el sentido sacrificial del término. «Holocaustos» es la equivalencia bíblica más estable para ofrendas totalmente consumidas por fuego, y conserva la dimensión cultual del pasaje.
  doctrine_reference: Culto del templo / ofrenda sacrificial
- issue: Ambigüedad de καρποῦσθαι entre ‘proveer’ y ‘ofrecer’
  english_pob_reading: to offer
  chosen_spanish_reading: ofrecer
  alternative_spanish_readings:
  - suministrar
  - proveer
  rationale: La nota inglesa reconoce una posible tensión léxica. En español se mantiene «ofrecer» para no romper el paralelismo cultual del versículo, pero la alternativa semántica queda reflejada en la decisión léxica, preservando la ambigüedad documentada.
  doctrine_reference: Lenguaje cultual y descripción de la obligación ritual
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que unificó el verbo sacrificial en ‘to offer’ para προσφέρειν. También conserva la observación de que el número ‘diecisiete’ no repite su objeto explícito en griego, y mantiene la nota cultural sobre ‘talentos’ sin añadir especificación de metal.
  spanish_consistency_notes:
  - Se conservó el registro cultual con «holocaustos» y «ofrecer», evitando sustituciones más generales que debilitarían el lenguaje sacrificial.
  - Se evitó traducir mecánicamente la estructura inglesa; el orden español se ajustó para sonar natural manteniendo los datos del original.
  - No se introdujo terminología eclesiástica posterior ni se reemplazó el sentido del texto por paráfrasis interpretativas.
