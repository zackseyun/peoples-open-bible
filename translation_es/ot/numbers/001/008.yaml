translation:
  language: es
  text: 'Para Isacar: Natanel, hijo de Zuar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְיִשָּׂשכָר
  english_pob_choice: For Issachar
  chosen_spanish: Para Isacar
  alternatives_spanish:
  - De Isacar
  - Para la tribu de Isacar
  lexicon: HALOT
  rationale: El prefijo לְ aquí marca relación/asignación dentro de la lista censal, no dirección literal. En español, "Para Isacar" conserva la función distributiva y la asociación tribal con naturalidad. Se translitera el nombre propio según uso bíblico español estándar, como en el inglés POB.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Natanel
  alternatives_spanish:
  - Netanel
  lexicon: HALOT
  rationale: Nombre propio hebreo. Se translitera al uso bíblico español habitual "Natanel", conservando el referente personal sin intentar traducir el significado del nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  - el hijo de
  lexicon: HALOT
  rationale: En una identificación genealógica breve, "hijo de" reproduce de forma idiomática y precisa la relación filial indicada por בֶּן, sin ampliar innecesariamente a "descendiente de".
- source_word: צוּעָר
  english_pob_choice: Zuar
  chosen_spanish: Zuar
  alternatives_spanish:
  - Tsuar
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la transliteración convencional española "Zuar", acorde con el valor auditado del texto fuente.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni revisiones sustantivas; el hebreo y el control cruzado muestran alto acuerdo, por lo que no se introducen variantes textuales ni notas críticas.
  spanish_consistency_notes:
  - Se mantiene la estructura breve de lista censal.
  - Los nombres propios se transliteran de forma consistente y no se traducen.
  - No se añade artículo delante de los nombres tribales para conservar la concisión del hebreo.
