- from: 'Y murió toda carne que se movía sobre la tierra: aves[a], ganado, animales salvajes, todo ser que se arrastra y se multiplica sobre la tierra, y todo ser humano.'
  to: 'Y murió toda carne que se movía sobre la tierra: aves[a], ganado, animales salvajes, todo ser que pulula sobre la tierra, y toda la humanidad.'
