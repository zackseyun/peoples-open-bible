    text: O «nuestros burladores»; el término hebreo es poco común y puede destacar tanto la opresión ofensiva como la burla despectiva.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos reparaciones menores de estilo y precisión idiomática: «palabras de una canción» conserva mejor la idea hebrea de «palabras de canto» sin sonar tan calcada, y «nuestros opresores[a]» expresa con mayor naturalidad en español la amplitud semántica hostil de וְתוֹלָלֵינוּ, mientras la nota mantiene la alternativa «burladores» documentada en la auditoría inglesa.'
