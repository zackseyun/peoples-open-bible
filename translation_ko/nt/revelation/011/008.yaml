  language: ko
  text: '그들의 시체는 큰 성의 거리에 놓여 있게 될 것입니다. 그 성은 영적으로 소돔과 이집트라 불리며, 거기에서 그들의 주께서도 십자가에 못 박히셨습니다[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「그들의 주께서도 십자가에 못 박히신 곳」은 예루살렘을 가리키나, 본문은 상징적 호칭인 「큰 성」을 유지한다.'
    reason: cross_reference
