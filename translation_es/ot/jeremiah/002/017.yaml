translation:
  language: es
  text: ¿No ha traído esto sobre ti[a], porque has abandonado a Yahvé, tu Dios, cuando él te estaba guiando en el camino[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No te ha hecho esto esto?». El hebreo es más literalmente «¿No ha hecho esto para/a ti…?».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras él te estaba guiando por el camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Has not
  chosen_spanish: ¿No ha hecho esto…?
  alternatives_spanish:
  - ¿Acaso no ha hecho esto…?
  - ¿No es esto…?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera respuesta afirmativa y lleva tono de reprensión. En español, «¿No ha hecho esto…?» conserva la fuerza interrogativa sin volverla demasiado interpretativa.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esto mismo
  lexicon: HALOT
  rationale: El demostrativo singular remite a la calamidad o consecuencia ya aludida en el contexto. «Esto» es natural en español y mantiene la referencia sin añadir contenido.
- source_word: תַּעֲשֶׂה לָּךְ
  english_pob_choice: brought it upon you
  chosen_spanish: ha hecho venir sobre ti
  alternatives_spanish:
  - te lo ha hecho venir
  - te ha hecho venir esto
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente más cercana a «hacer para/contra ti», pero en contexto comunica una desgracia sobrevenida. «Ha hecho venir sobre ti» conserva el matiz causal sin forzar un giro idiomático ajeno al español bíblico.
- source_word: עָזְבֵךְ
  english_pob_choice: because you have forsaken
  chosen_spanish: porque has abandonado
  alternatives_spanish:
  - porque dejaste
  - a causa de que has abandonado
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo expresa la causa: tu abandono. «Porque has abandonado» reproduce claramente la relación causal que la revisión inglesa también aclaró.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, según la convención del proyecto, en lugar de una sustitución titulativa. «Yahvé» es la forma española base establecida.
- source_word: אֱלֹהַיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: La expresión de pacto se vierte de manera directa y sobria. «Tu Dios» comunica la relación posesiva y covenantal sin añadir matices no presentes.
- source_word: בְּעֵת
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - mientras
  lexicon: HALOT
  rationale: El valor temporal encaja naturalmente con «cuando» en español, manteniendo la relación con la acción del participio siguiente.
- source_word: מוֹלִיכֵךְ
  english_pob_choice: he was leading you
  chosen_spanish: él te estaba guiando
  alternatives_spanish:
  - él te conducía
  - él te llevaba
  lexicon: HALOT
  rationale: El participio hifil sugiere acción en curso. «Te estaba guiando» reproduce esa continuidad y mantiene el sentido causativo de «conducir/guiar».
- source_word: בַּדָּרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - en la senda
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora hebrea y resulta más natural en español que una traducción demasiado literal de la preposición. El posible sentido moral/covenantal permanece abierto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre personal de Dios en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal del proyecto y evita ocultar el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del audit trail inglés, que aclaró el valor causal con «because». También conserva la lectura temporal del participio («te estaba guiando») y el nombre divino Yahvé, en consonancia con la política del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se mantuvo «camino» como equivalente de בַּדָּרֶךְ por su valor metafórico y su naturalidad en español.
  - Se evitó «SEÑOR» para no sustituir el nombre divino revelado.
  - La puntuación y el orden respetan el tono de reproche retórico del hebreo.
