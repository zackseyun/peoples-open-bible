translation:
  language: es
  text: Porque, si el justo es hijo de Dios[a], Dios lo ayudará y lo librará de la mano de los que se le oponen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el justo es un hijo de Dios» o «el justo es el Hijo de Dios». La frase griega admite más de una manera de verterse; el texto principal conserva la afirmación filial sin forzar un título cristológico posterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el justo varón
  lexicon: LSJ
  rationale: El artículo con el adjetivo funciona sustantivamente; en español, «el justo» conserva esa función sin añadir más contenido del que da el griego. Se evita «hombre justo» porque el texto no exige un sustantivo añadido y el masculino genérico ya queda claro en el contexto.
- source_word: υἱὸς θεοῦ
  english_pob_choice: God's son
  chosen_spanish: hijo de Dios
  alternatives_spanish:
  - hijo de Dios
  - un hijo de Dios
  lexicon: LSJ
  rationale: La construcción posesiva inglesa se refleja naturalmente en español como «hijo de Dios». Se evita capitalizar «Hijo» porque el griego de este versículo, como en el audit trail inglés, permite una lectura filial sin imponer de entrada un título cristológico posterior.
- source_word: ἀντιλήμψεται
  english_pob_choice: he will help him
  chosen_spanish: lo ayudará
  alternatives_spanish:
  - lo socorrerá
  - vendrá en su ayuda
  - lo sostendrá
  lexicon: BDAG
  rationale: El verbo expresa tomar a favor de alguien, prestarle apoyo o ayuda. «Lo ayudará» es la forma más natural y concisa en español, y mantiene la relación con el siguiente verbo de rescate.
- source_word: ῥύσεται
  english_pob_choice: rescue him
  chosen_spanish: lo librará
  alternatives_spanish:
  - lo rescatará
  - lo salvará
  - lo liberará
  lexicon: BDAG
  rationale: «Librar» expresa bien la idea de sacar de un peligro o de una situación hostil. Se prefirió frente a «salvar» para evitar cargar el verbo con un matiz más amplio o más doctrinal del que exige aquí el griego.
- source_word: ἐκ χειρὸς
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de entre las manos de
  lexicon: LSJ
  rationale: La locución idiomática se mantiene en español para conservar la imagen bíblica de control o dominio. «De la mano de» refleja de modo transparente el idiomatismo del original.
- source_word: ἀνθεστηκότων
  english_pob_choice: those who oppose him
  chosen_spanish: los que se le oponen
  alternatives_spanish:
  - sus adversarios
  - los que resisten contra él
  - los que se le enfrentan
  lexicon: LSJ
  rationale: El participio describe a quienes están colocados contra él. «Los que se le oponen» transmite esa oposición activa sin añadir un matiz jurídico o militar que el griego no obliga a leer aquí.
theological_decisions:
- issue: Posible lectura cristológica de «hijo de Dios»
  english_pob_reading: Rendered as 'God's son' without capitalization; the main text avoids importing a later christological title while preserving the filial claim.
  chosen_spanish_reading: «hijo de Dios» sin capitalización
  alternative_spanish_readings:
  - «Hijo de Dios»
  - «un hijo de Dios»
  rationale: El griego permite una afirmación filial del justo sin exigir que el traductor cristalice aquí el título cristológico posterior. La traducción conserva la ambigüedad productiva del original y deja abierta la lectura teológica sin imponerla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente «God» como sujeto de «will help» para reflejar el sujeto implícito del griego y evitar ambigüedad. En español se refleja de forma natural con «Dios lo ayudará», manteniendo el mismo ajuste de claridad sin alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Dios» como sujeto explícito de la ayuda, en paralelo con la revisión auditada del inglés.
  - Se evita «Señor» o un equivalente de máscara; el tetragrámaton no aparece en este versículo, y la referencia explícita es a Dios.
  - «el justo» conserva la sustantivación del adjetivo griego con estilo natural en español.
  - «hijo de Dios» conserva la apertura interpretativa documentada por el audit trail inglés, sin capitalización doctrinal añadida.
