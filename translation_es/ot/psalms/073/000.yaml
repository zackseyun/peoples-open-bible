lexical_decisions:
- source_word: מִזְמ֗וֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Salmo poético
  lexicon: מִזְמֹור
  rationale: «Salmo» es el equivalente establecido y más natural en español bíblico para el encabezado del género.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - de Asaf el músico
  lexicon: אָסָף
  rationale: Se conserva el nombre propio bíblico en la forma común en español, sin añadir glosa no presente en el hebreo.
- source_word: אַךְ
  english_pob_choice: Surely / Truly
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - Solo
  lexicon: אַךְ
  rationale: La partícula introduce énfasis afirmativo; «Ciertamente» conserva ese valor sin forzar una restricción exclusiva que el contexto aquí no exige como traducción principal.
- source_word: טוֹב
  english_pob_choice: is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es bondadoso
  - es favorable
  lexicon: טוֹב
  rationale: «Bueno» reproduce el valor básico y amplio del adjetivo en este contexto, dejando abierta la dimensión de bondad y benevolencia implícita.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - con Israel
  lexicon: יִשְׂרָאֵל
  rationale: El hebreo con לְ puede expresar beneficio o referencia; «para Israel» transmite bien el sentido de disposición favorable de Dios hacia Israel en español.
- source_word: לְבָרֵי לֵבָב
  english_pob_choice: to the pure of heart
  chosen_spanish: para los de corazón puro
  alternatives_spanish:
  - a los de corazón puro
  - para los puros de corazón
  lexicon: בָּרֵי לֵבָב
  rationale: Se conserva la imagen hebrea «corazón puro» con un giro natural en español. «Los de» evita una nominalización menos fluida y mantiene el referente humano plural.
theological_decisions:
- issue: 'Alcance de אַךְ: afirmación o exclusión'
  english_pob_reading: Surely / Truly God is good to Israel
  chosen_spanish_reading: Ciertamente Dios es bueno para Israel
  alternative_spanish_readings:
  - Solo Dios es bueno para Israel
  - Verdaderamente Dios es bueno para Israel
  rationale: El hebreo אַךְ puede tener matiz restrictivo o enfático. Aquí, siguiendo el sentido auditado del POB inglés, se privilegia el énfasis afirmativo sin convertirlo en una exclusión doctrinal que el verso no demanda con claridad.
  doctrine_reference: Sal 73:1 en contexto literario; valor de la partícula אַךְ
- issue: Relación entre Israel y los puros de corazón
  english_pob_reading: God is good to Israel, to the pure of heart
  chosen_spanish_reading: Dios es bueno para Israel, para los de corazón puro
  alternative_spanish_readings:
  - Dios es bueno para Israel y para los de corazón puro
  - Dios es bueno a Israel, a los de corazón puro
  rationale: La segunda frase puede leerse como apposición explicativa o como segundo dativo dependiente de la misma afirmación. Se mantiene la coordinación semántica con «para» para no perder la inclusión de los fieles de corazón puro dentro del ámbito de la bondad divina.
  doctrine_reference: Psalmos 73:1; relación entre el pueblo del pacto y los rectos de corazón
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que añadió al encabezamiento la cláusula principal omitida en una versión previa. Por eso el español no se limita al superscrito, sino que incluye tanto el título como la afirmación completa del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Salmo» para el encabezamiento y «Asaf» para el nombre propio, en continuidad con el uso bíblico usual en español.
  - Se preservó la distinción entre el nombre divino «Dios» y el pueblo «Israel», sin sustituir por fórmulas litúrgicas de enmascaramiento.
  - La cláusula final se tradujo de forma que conserve la posible ambigüedad entre destinatarios y caracterización, reflejando el hebreo y el audit trail inglés.
