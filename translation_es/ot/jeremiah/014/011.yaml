translation:
  language: es
  text: 'Entonces Yahvé me dijo: «No ores[a] por el bien de este pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No intercedas por este pueblo para su bienestar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» expresa secuencia de manera natural en español sin perder el valor narrativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en español como «Yahvé», conforme al criterio del proyecto de no sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El dativo pronominal se vierte de forma natural con el clítico verbal en español; el sentido sigue siendo «me dijo».
- source_word: תִּתְפַּלֵּל
  english_pob_choice: pray
  chosen_spanish: ores
  alternatives_spanish:
  - intercedas
  - hagas oración
  lexicon: HALOT
  rationale: El hitpael de פלל aquí expresa oración; «ores» es una solución directa y natural. «Intercedas» sería más interpretativo, aunque el contexto lo presupone.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  lexicon: HALOT
  rationale: La preposición marca intercesión a favor de alguien; «por» reproduce bien esa relación en español.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo
  lexicon: HALOT
  rationale: 'Se mantiene el colectivo singular con demostrativo: «este pueblo». «Gente» suaviza demasiado y pierde el tono colectivo del hebreo.'
- source_word: לְטוֹבָה
  english_pob_choice: for the welfare
  chosen_spanish: por el bienestar
  alternatives_spanish:
  - para el bien
  - para su bienestar
  lexicon: HALOT
  rationale: La frase apunta al beneficio o bien-estar del pueblo; «por el bienestar» comunica de forma clara y natural la finalidad de la oración. Mantiene la tensión semántica entre bien/bienestar sin sobreexplicarla.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo emplea explícitamente el Tetragrama. En coherencia con el proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Valor de בְּעַד en contexto de oración
  english_pob_reading: for / on behalf of
  chosen_spanish_reading: por
  alternative_spanish_readings:
  - en favor de
  - a favor de
  rationale: La construcción no es mera oración general, sino intercesión en favor del pueblo. «Por» permite conservar la ambigüedad útil entre destinatario y beneficio, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Intercession language in prayer contexts'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «for the good» a «for the welfare» para sonar más idiomático. La versión española refleja ese mismo desplazamiento semántico con «bienestar», manteniendo la fuerza intercesora del hebreo בְּעַד y el sustantivo colectivo «este pueblo».
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar español del proyecto.
  - Se conserva el colectivo singular «este pueblo» para הָעָם הַזֶּה.
  - «Por el bienestar» sigue la revisión inglesa hacia una formulación más natural sin diluir el sentido de intercesión.
  - La nota al pie está anclada explícitamente en «ores[a]» para evitar marcas huérfanas.
