translation:
  language: es
  text: y contra todos los montes altos[a], y contra todas las colinas elevadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «montes elevados» y «colinas exaltadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - y en contra de
  lexicon: HALOT
  rationale: En este catálogo profético, עַל con objetos repetidos expresa dirección hostil o de juicio; en español, "y contra" comunica mejor ese valor que un simple sentido espacial de "sobre".
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos / todas
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: El hebreo repite la construcción distributiva con כָּל; en español conviene mantener el paralelismo con "todos los" / "todas las".
- source_word: הֶהָרִים
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - cerros
  lexicon: HALOT
  rationale: Para la oposición con גְּבָעוֹת, "montes" es natural en español bíblico y conserva la distinción entre elevaciones mayores y menores sin sonar forzado.
- source_word: הָרָמִים
  english_pob_choice: high
  chosen_spanish: altos
  alternatives_spanish:
  - elevados
  - altos y elevados
  - lofty
  lexicon: HALOT
  rationale: El adjetivo de רום expresa altura. "Altos" es la forma más idiomática y clara en español, manteniendo el rasgo físico sin introducir una metáfora moral no explícita en el versículo.
- source_word: הַגְּבָעוֹת
  english_pob_choice: hills
  chosen_spanish: colinas
  alternatives_spanish:
  - lomas
  - montículos
  lexicon: HALOT
  rationale: '"Colinas" reproduce bien el contraste con "montes" y resulta claro en español moderno; evita una equivalencia demasiado rural o demasiado técnica.'
- source_word: הַנִּשָּׂאוֹת
  english_pob_choice: lifted-up / lofty
  chosen_spanish: elevadas
  alternatives_spanish:
  - levantadas
  - exaltadas
  - lofty
  lexicon: HALOT
  rationale: El participio pasivo de נשׂא denota algo "levantado" o "elevado". "Elevadas" preserva la imagen de altura y el paralelismo con "altos" en la primera cola, sin cargar el texto con una connotación de orgullo que el versículo no exige.
theological_decisions:
- issue: Si el lenguaje de altura debe leerse literalmente o como símbolo de orgullo humano
  english_pob_reading: Retain literal landscape language ('high mountains' / 'lofty hills') while allowing the broader context to supply any symbolic resonance.
  chosen_spanish_reading: Mantener lenguaje literal de paisaje ('montes altos' / 'colinas elevadas') dejando que el contexto mayor sugiera la resonancia simbólica.
  alternative_spanish_readings:
  - '''montes altivos'' y ''colinas exaltadas'' para subrayar la soberbia'
  - '''montañas encumbradas'' y ''colinas enaltecidas'''
  rationale: Isaías 2 emplea imágenes de elevación dentro de un oráculo de abatimiento, pero este versículo enumera rasgos topográficos concretos. Una traducción literal preserva la imagen y permite que el contexto desarrolle el sentido simbólico sin imponerlo aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La auditoría inglesa revisó "lifted-up hills" a "lofty hills" para mayor naturalidad; en español se optó por "colinas elevadas", que conserva la elevación semántica con un registro natural y evita una calca como "levantadas" en el texto principal.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos hemistiquios con repetición de "y contra" para reflejar וְעַל.
  - '"Montes" y "colinas" preservan la distinción léxica de הָרִים / גְּבָעוֹת.'
  - Se evita "SEÑOR" u otras terminologías no presentes; el versículo no contiene el nombre divino.
  - La nota al pie refleja la alternativa léxica documentada en la auditoría inglesa, sin introducir una interpretación moral no exigida por el hebreo.
