revisions:
- from: O que se aferre a mi fortaleza[a]; que haga paz conmigo; sí, que haga paz conmigo.
  to: O que se aferre a mi fuerza[a]; que haga paz conmigo; que haga paz conmigo.
  rationale: Se cambia 'mi fortaleza' por 'mi fuerza' para ajustarse a la decisión léxica auditada más reciente sobre מָעוּזִּי. Se elimina 'sí' para dejar que la repetición hebrea produzca por sí sola el énfasis. Se conserva 'que haga paz conmigo' por cercanía formal al hebreo y al POB auditado, aunque sea una expresión algo tensa en español. La nota se simplifica para reflejar las alternativas legítimas sin definir la lectura principal en términos ya descartados.
