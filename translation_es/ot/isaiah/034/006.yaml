  rationale: Se corrigieron los anclajes de las notas para que coincidan con las palabras/frases relevantes en el texto, y se mejoró «está engordada» a «ha sido cebada» por mayor naturalidad y fuerza idiomática en español sin perder la metáfora sacrificial del hebreo.
