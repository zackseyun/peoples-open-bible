translation:
  language: es
  text: Y de la ciudad tomó a un funcionario de la corte[a] que había sido puesto al frente de los hombres de guerra, y a siete hombres de entre los que veían el rostro del rey[b], que se hallaron en la ciudad, y al escriba del jefe del ejército, que alistaba al pueblo de la tierra, y a sesenta hombres del pueblo de la tierra que se hallaban dentro de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “eunuco”, ya que סָרִיס puede referirse tanto a un eunuco como a un funcionario de la corte; aquí el contexto administrativo favorece “funcionario de la corte”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “de los asistentes personales del rey”, ya que “los que veían el rostro del rey” es un modismo cortesano para quienes tenían acceso directo a él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סָרִיס
  english_pob_choice: court official
  chosen_spanish: oficial
  alternatives_spanish:
  - eunuco
  - oficial de la corte
  - funcionario de la corte
  lexicon: HALOT
  rationale: En este contexto administrativo-militar, el término puede referirse a un eunuco o a un funcionario cortesano. 'Oficial' conserva la amplitud semántica sin afirmar un rasgo físico que el texto no exige. Se evita 'eunuco' porque el contexto no lo requiere de manera explícita.
- source_word: פָקִיד
  english_pob_choice: had been appointed over
  chosen_spanish: estaba puesto sobre
  alternatives_spanish:
  - había sido nombrado sobre
  - estaba encargado de
  - había sido puesto al frente de
  lexicon: HALOT
  rationale: La idea central es autoridad delegada o supervisión. 'Estaba puesto sobre' mantiene esa noción de cargo/encargo con naturalidad en español y conserva el matiz de designación administrativa.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los soldados
  - los hombres de combate
  - la tropa de guerra
  lexicon: HALOT
  rationale: Se conserva el giro hebreo de forma bastante literal, como en el inglés POB, porque el sintagma tiene valor idiomático y militar. 'Soldados' es posible, pero suaviza la forma original.
- source_word: מֵרֹאֵי פְנֵי הַמֶּלֶךְ
  english_pob_choice: from those who saw the king’s face
  chosen_spanish: de entre los que veían el rostro del rey
  alternatives_spanish:
  - de entre los que tenían acceso al rey
  - de los que servían ante el rey
  - de entre los que veían la cara del rey
  lexicon: HALOT
  rationale: Se preserva la metáfora/idioma de acceso cortesano en una forma transparente para el lector. 'Rostro' mantiene la dignidad del hebreo y evita una paráfrasis excesiva; la expresión puede entenderse idiomáticamente como presencia o acceso ante el rey.
- source_word: סֹפֵר שַׂר הַצָּבָא
  english_pob_choice: the scribe of the commander of the army
  chosen_spanish: el escriba del jefe del ejército
  alternatives_spanish:
  - el secretario del jefe del ejército
  - el escriba del comandante del ejército
  - el adjunto del jefe del ejército
  lexicon: HALOT
  rationale: '''Escriba'' refleja fielmente סֹפֵר y conserva el oficio administrativo. ''Jefe del ejército'' traduce naturalmente שַׂר הַצָּבָא y evita una terminología eclesiástica o más moderna que borraría el cargo.'
- source_word: הַמַּצְבִּא
  english_pob_choice: who mustered
  chosen_spanish: que alistaba
  alternatives_spanish:
  - que reclutaba
  - que convocaba
  - que pasaba revista a
  lexicon: HALOT
  rationale: El participio hifil expresa organizar o incorporar gente para servicio militar. 'Alistaba' comunica bien la acción administrativa-militar en español actual, sin perder el vínculo con el acto de reclutar o inscribir.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - el común del país
  - la población de la tierra
  lexicon: HALOT
  rationale: Se conserva la expresión casi literal porque tiene un valor social y político propio en hebreo. 'Pueblo de la tierra' mantiene esa carga sin resolverla prematuramente como mera 'gente común'.
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: within the city
  chosen_spanish: dentro de la ciudad
  alternatives_spanish:
  - en medio de la ciudad
  - en el interior de la ciudad
  lexicon: HALOT
  rationale: '''Dentro de la ciudad'' es natural en español y preserva el alcance locativo del hebreo sin perder claridad.'
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios sustanciales en la revisión más reciente; no se registraron correcciones textuales ni ajustes de sentido. La presente propuesta sigue de cerca esa lectura y conserva sus decisiones léxicas principales en español.
  spanish_consistency_notes:
  - Se mantiene la traducción de יהוה como “Yahvé” como norma del proyecto, aunque este versículo no la contiene.
  - Se conserva “pueblo de la tierra” de manera consistente con el calco controlado del inglés POB para עַם הָאָרֶץ.
  - Se evita “SEÑOR” u otras sustituciones reverenciales no presentes en el texto fuente.
  - El sintagma cortesano “los que veían el rostro del rey” se mantiene transparente para no borrar el modismo hebreo.
