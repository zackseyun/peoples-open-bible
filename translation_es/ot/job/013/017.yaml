    issue: La nota al pie está aplicada al término equivocado.
    rationale: El expediente inglés pone la alternativa léxica en «my declaration» (וַאֲחֲוָתִי), con opciones como «utterance» / «explanation». El borrador español coloca la nota en «mi palabra», y además ofrece alternativas que no corresponden al foco documentado.
  - severity: low
    issue: Las alternativas de la nota actual no siguen de cerca las alternativas auditadas.
    rationale: Para «mi palabra», el inglés no preservó nota; para וַאֲחֲוָתִי sí. En español conviene ofrecer alternativas como «mi expresión» o «mi explicación» para reflejar la base auditada sin introducir «dicho» de manera menos precisa.
