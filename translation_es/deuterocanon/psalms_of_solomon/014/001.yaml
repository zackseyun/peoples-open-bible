  yaml_path: translation/deuterocanon/psalms_of_solomon/014/001.yaml
  text: The Lord is faithful to those who love him in truth[a], to those who endure his discipline, to those who walk in the righteousness of his commandments[b], in the law that he commanded us for our life.
  footnotes:
  - marker: a
    text: Or 'instruction' for 'discipline.' The Greek παιδεία can include training, correction, and teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: lexical_alternative
