translation:
  language: es
  text: ¡Adelante[a], tirano, con tus torturas; para que aun por medio de estas aprendas que soy hermano de los que fueron torturados antes!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los que fueron torturados antes». El participio griego incluye la idea de que la tortura ocurrió antes que la del hablante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπιθι
  english_pob_choice: Go on
  chosen_spanish: ¡Adelante!
  alternatives_spanish:
  - ¡Prosigue!
  - ¡Vamos!
  - ¡Sigue!
  lexicon: LSJ
  rationale: El griego funciona como un reto imperativo y desafiante. «¡Adelante!» comunica la provocación y el tono de desafío sin sonar excesivamente literal o mecánico en español.
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - despota
  - tirano rey
  lexicon: LSJ
  rationale: El vocativo nombra al gobernante opresor con carga moral negativa. «Tirano» es el equivalente natural en español y preserva el juicio implícito del término.
- source_word: βασάνοις
  english_pob_choice: with your tortures
  chosen_spanish: con tus torturas
  alternatives_spanish:
  - con tus tormentos
  - con tus instrumentos de tortura
  - con tus suplicios
  lexicon: LSJ
  rationale: El dativo plural expresa el medio o instrumento del padecimiento. «Tus torturas» mantiene la concreción brutal del griego y el posesivo refleja el carácter personal del abuso.
- source_word: ἵνα καὶ διὰ τούτων μάθῃς
  english_pob_choice: so that even through these you may learn
  chosen_spanish: para que aun por medio de estas aprendas
  alternatives_spanish:
  - para que también por medio de estas llegues a saber
  - a fin de que también por estas aprendas
  lexicon: BDAG
  rationale: «ἵνα» expresa propósito; «καί» añade énfasis, y «διὰ τούτων» se refiere a los mismos tormentos como medio. «Para que aun por medio de estas aprendas» conserva la finalidad y el matiz intensivo.
- source_word: ἀδελφός
  english_pob_choice: a brother
  chosen_spanish: hermano
  alternatives_spanish:
  - un hermano
  - uno de los hermanos
  lexicon: BDAG
  rationale: El predicado nominal anartro en español se expresa con naturalidad sin artículo. Se conserva el vínculo fraternal explícito del griego y la identificación solidaria con los ya torturados.
- source_word: τῶν προβασανισθέντων
  english_pob_choice: of those who have been tortured before
  chosen_spanish: de los que fueron torturados antes
  alternatives_spanish:
  - de los previamente torturados
  - de los que han sido torturados antes
  lexicon: LSJ
  rationale: El participio con προ- indica anterioridad temporal respecto del hablante. «Fueron torturados antes» mantiene esa prioridad temporal y suena más natural en español que una construcción excesivamente pesada.
theological_decisions:
- issue: Identificación fraternal en contexto de martirio
  english_pob_reading: a brother of those who have been tortured before
  chosen_spanish_reading: hermano de los que fueron torturados antes
  alternative_spanish_readings:
  - uno de los hermanos previamente torturados
  - hermano de los previamente torturados
  rationale: El griego usa ἀδελφός en singular masculino para que el hablante se identifique con los hermanos ya sometidos a tortura. Se conserva esa precisión sin neutralizar el género ni diluir la solidaridad martirial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto entre el fuente griego y la auditoría inglesa, sin cambios respecto del sentido comprobado en la revisión más reciente.
  spanish_consistency_notes:
  - Se conserva «tirano» para τύραννε, conforme al valor político-moral del vocativo.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente; el pasaje no contiene el tetragrámaton.
  - «Torturas» traduce el plural instrumental del griego con un registro claro y directo.
  - La nota a aclara la alternativa temporal ya documentada en la auditoría inglesa, sin ampliar indebidamente el alcance del verso.
