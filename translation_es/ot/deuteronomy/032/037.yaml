translation:
  language: es
  text: 'Y dirá[a]: «¿Dónde están sus dioses, la roca en la que se refugiaron?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la roca en la que se refugiaron», con la «roca» en aposición a «sus dioses».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And he will say
  chosen_spanish: Y dirá
  alternatives_spanish:
  - Entonces dirá
  - Y dirá
  lexicon: HALOT
  rationale: El qatal con waw en discurso poético continua con sentido prospectivo; en español, el futuro simple comunica bien la continuidad profética. Se conserva la conjunción con «Y» para reflejar el hebreo.
- source_word: אֵי
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están?
  alternatives_spanish:
  - ¿Dónde está?
  - ¿Dónde están?
  lexicon: HALOT
  rationale: El interrogativo pide una forma natural en español. Como el referente es plural («sus dioses»), «¿Dónde están?» expresa mejor la concordancia plural que «¿Dónde está?».
- source_word: אֱלֹהֵימוֹ
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses
  - su dios
  lexicon: HALOT
  rationale: El sufijo de 3mp y el sentido polémico requieren el plural. «Sus dioses» mantiene la fuerza del hebreo y evita diluir la morfología.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - la roca
  - la peña
  lexicon: HALOT
  rationale: Aquí צוּר describe figuradamente a los falsos dioses como protección. «Roca» es la equivalencia más directa y conserva la metáfora; se prefiere minúscula por el referente inmediato, no como título divino.
- source_word: חָסָיוּ
  english_pob_choice: they took refuge
  chosen_spanish: se refugiaron
  alternatives_spanish:
  - se refugiaron
  - buscaron refugio
  lexicon: HALOT
  rationale: La raíz חסה expresa buscar amparo/refugio. «Se refugiaron» es natural y conserva la imagen concreta mejor que «confiaron».
- source_word: בּוֹ
  english_pob_choice: in which
  chosen_spanish: en la que
  alternatives_spanish:
  - en él
  - en ella
  - en la que
  lexicon: HALOT
  rationale: El sufijo masculino singular retoma «la roca» en una construcción relativa. En español, «en la que» suena natural con un antecedente femenino («roca») y mantiene la referencia relacional sin forzar un «él» personal.
theological_decisions:
- issue: Temporal force of the speaking verb
  english_pob_reading: 'The line is rendered as the LORD''s future taunt within the larger speech: ''And he will say'''
  chosen_spanish_reading: 'Se traduce con futuro profético: «Y dirá»'
  alternative_spanish_readings:
  - Y dijo
  - Entonces dirá
  rationale: El contexto del Cántico de Moisés permite un valor prospectivo del perfecto hebreo. El futuro simple en español comunica la escena anunciada sin perder el hilo discursivo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of the rock metaphor
  english_pob_reading: lowercase 'rock' avoids confusing this referent with the frequent title 'the Rock' for the LORD elsewhere in the song
  chosen_spanish_reading: «la roca» en minúscula
  alternative_spanish_readings:
  - «la Roca»
  - «la peña»
  rationale: Aquí la metáfora recae sobre los ídolos/falsos dioses en quienes buscaron refugio. Minúscula evita atribuir automáticamente el título divino a este referente y conserva el contraste irónico del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios tras el control de alta concordancia. Se mantiene la lectura prospectiva y la minúscula de «roca» conforme al registro auditado en inglés.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo con el inglés POB: interrogativo + plural + metáfora de refugio.'
  - El tratamiento de «sus dioses» respeta la pluralidad morfológica del hebreo.
  - La nota a] se ancla en «la roca» para preservar la alternativa literal documentada sin alterar el flujo del texto principal.
