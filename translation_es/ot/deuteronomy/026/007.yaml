translation:
  language: es
  text: Entonces clamamos a Yahvé[a], el Dios de nuestros padres, y Yahvé oyó nuestra voz[b] y vio nuestra aflicción, nuestra labor y nuestra opresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Dios de nuestros padres». La frase recuerda al Dios del pacto de los antepasados de Israel; «el Dios de nuestros antepasados» sería una alternativa inclusiva posible.'
    reason: lexical_alternative
  - marker: b
    text: O «oyó nuestro clamor»; literalmente, «oyó nuestra voz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּצְעַק
  english_pob_choice: we cried out
  chosen_spanish: clamamos
  alternatives_spanish:
  - gritamos
  - clamamos con angustia
  - exclamamos
  lexicon: HALOT
  rationale: El hebreo צעק expresa un clamor desesperado de auxilio. En español, «clamar» conserva el sentido de súplica intensa y encaja bien con el registro bíblico sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton. La forma «Yahvé» es la norma del proyecto en español y evita la sustitución por un título.
- source_word: אֱלֹהֵי אֲבֹתֵינוּ
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de nuestros padres
  alternatives_spanish:
  - el Dios de nuestros antepasados
  - nuestro Dios ancestral
  lexicon: HALOT
  rationale: La construcción hebrea identifica a Yahvé como el Dios pactal de los antepasados de Israel. «Padres» preserva la fórmula tradicional y la referencia de pacto; «antepasados» sería una alternativa inclusiva, pero menos literal respecto a la fórmula recibida.
- source_word: וַיִּשְׁמַע ... אֶת קֹלֵנוּ
  english_pob_choice: heard our voice
  chosen_spanish: oyó nuestra voz
  alternatives_spanish:
  - oyó nuestro clamor
  - nos oyó
  lexicon: HALOT
  rationale: El hebreo dice literalmente que oyó «nuestra voz». Se mantiene «voz» para conservar la imagen idiomática; en contexto equivale a atender nuestro clamor.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - tomó en cuenta
  lexicon: HALOT
  rationale: El verbo simple «ver» es el equivalente directo y deja intacta la fuerza teológica de la atención divina.
- source_word: עָנְיֵנוּ
  english_pob_choice: our affliction
  chosen_spanish: nuestra aflicción
  alternatives_spanish:
  - nuestra miseria
  - nuestro sufrimiento
  lexicon: HALOT
  rationale: עֹנִי puede denotar aflicción, miseria o condición humillada. «Aflicción» es claro, solemne y mantiene la correspondencia semántica con el contexto de liberación.
- source_word: עֲמָלֵנוּ
  english_pob_choice: our labor
  chosen_spanish: nuestro trabajo
  alternatives_spanish:
  - nuestra fatiga
  - nuestro afán
  - nuestro laborar
  lexicon: HALOT
  rationale: Se sigue la revisión del POB en inglés que precisa el matiz de עָמָל como toil/labor. En español, «trabajo» comunica el esfuerzo penoso de forma natural; aunque «fatiga» o «afán» son posibles, «trabajo» mantiene mejor el paralelismo y la distinción con «aflicción» y «opresión».
- source_word: לַחֲצֵנוּ
  english_pob_choice: our oppression
  chosen_spanish: nuestra opresión
  alternatives_spanish:
  - nuestra presión
  - nuestro agobio
  lexicon: HALOT
  rationale: לַחַץ denota opresión o presión aplastante. «Opresión» es la equivalencia más directa y fuerte para el contexto del éxodo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En el proyecto español se conserva el nombre propio «Yahvé», siguiendo el principio de no enmascararlo con un título y manteniendo la correspondencia con el auditable POB en inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que precisó עֲמָלֵנוּ como «labor» para distinguirlo de «aflicción» y «opresión». En español se optó por «trabajo», porque comunica mejor el matiz de esfuerzo penoso sin perder naturalidad ni la triple distinción semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para יְהוָה.
  - 'Se conserva la serie de tres sustantivos distintos: «aflicción», «trabajo», «opresión».'
  - «Clamamos» se usa como equivalente natural de un grito de auxilio pactal, sin suavizar la intensidad del verbo hebreo.
