translation:
  language: es
  text: Pero juntos[a] son estúpidos y necios; la instrucción de los ídolos[b] es madera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como uno solo'; la frase inicial es idiomática y puede significar 'juntos', 'todos por igual' o 'en una sola cosa'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'vanidades'; en este contexto, un término profético común para ídolos o cosas sin valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאַחַת
  english_pob_choice: But together
  chosen_spanish: Pero juntos
  alternatives_spanish:
  - Y en una sola cosa
  - Pero al mismo tiempo
  - Todos por igual
  lexicon: HALOT
  rationale: La expresión es idiomática y sugiere acción o estado colectivo. 'Juntos' comunica de forma natural la idea de simultaneidad o unanimidad, y 'Pero' conserva el contraste discursivo que la POB inglesa marcó con el verso anterior.
- source_word: יִבְעֲרוּ
  english_pob_choice: they are stupid
  chosen_spanish: son estúpidos
  alternatives_spanish:
  - son brutales
  - se vuelven insensatos
  - arden
  lexicon: HALOT
  rationale: Aquí el verbo no debe leerse como 'arder', sino en el sentido de ser necio o brutal. 'Estúpidos' es la opción española más clara y directa, aunque 'brutales' también sería posible en un registro más literal.
- source_word: וְיִכְסָלוּ
  english_pob_choice: and foolish
  chosen_spanish: y necios
  alternatives_spanish:
  - y son necios
  - y actúan neciamente
  - y torpes
  lexicon: HALOT
  rationale: Mantiene el paralelismo semántico con el miembro anterior. 'Necios' conserva el valor de insensatez moral e intelectual sin repetir exactamente el mismo matiz de 'estúpidos'.
- source_word: מוּסַר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  - enseñanza
  lexicon: HALOT
  rationale: Aunque también puede significar 'disciplina' o 'corrección', en esta frase funciona como lo que los ídolos 'enseñan' o implican. 'Instrucción' es la forma más amplia y natural en español para este contexto.
- source_word: הֲבָלִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - vanidades
  - cosas sin valor
  - vapores
  lexicon: HALOT
  rationale: El término hebreo literalmente puede relacionarse con 'vanidades' o 'cosas vacías', pero en la polémica profética apunta a ídolos como realidades sin valor. 'Ídolos' hace explícito el referente contextual sin perder la carga polémica.
- source_word: עֵץ הוּא
  english_pob_choice: is wood
  chosen_spanish: es madera
  alternatives_spanish:
  - es un trozo de madera
  - es pura madera
  - es leño
  lexicon: HALOT
  rationale: '''Es madera'' conserva la dureza y brevedad del hebreo. En español suena algo más natural que ''es madera'' con artículo indefinido, y sigue subrayando la materialidad del objeto idolátrico.'
theological_decisions:
- issue: Referente final del versículo en la polémica anti-idolátrica
  english_pob_reading: The supposed instruction associated with idols amounts to nothing more than wood.
  chosen_spanish_reading: La 'instrucción' atribuida a los ídolos termina reducida a mera madera.
  alternative_spanish_readings:
  - El ídolo mismo, siendo madera, es la instrucción
  - La enseñanza de los ídolos es una enseñanza muerta
  rationale: 'El hebreo es comprimido y la línea final funciona como burla profética. Traducir ''ídolos'' para הבלים y ''es madera'' para עץ הוּא conserva el golpe retórico: lo que parece dar instrucción no pasa de ser un objeto material.'
  doctrine_reference: Jeremías 10:1–9; especialmente el contexto anti-idolátrico de 10:3–5 y 10:8.
translation_notes:
  revision_awareness: El texto inglés más reciente no introdujo cambios respecto de la versión auditada; se mantuvo el mismo entendimiento lexical y teológico, con adaptación al español y preservación de la tensión del hebreo abreviado.
  spanish_consistency_notes:
  - Se mantuvo 'ídolos' para הבלים, siguiendo la decisión contextual del POB inglés, en vez de un calco literal como 'vanidades' en el cuerpo principal.
  - Se evitó 'SEÑOR' y no aparece el Tetragrámaton en este versículo.
  - '''Estúpidos'' y ''necios'' se separan para reproducir el paralelismo de dos miembros adyacentes sin borrar la repetición semántica.'
  - Se prefirió 'madera' a 'leño' o 'trozo de madera' por brevedad y fuerza retórica, con 'madera' como equivalente más directo del hebreo.
