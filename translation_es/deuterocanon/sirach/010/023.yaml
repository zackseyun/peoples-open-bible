translation:
  language: es
  text: No se debe despreciar[a] a un pobre inteligente, ni honrar a un injusto que ha sido exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega dice algo muy diferente: «Un gran hombre, un juez y un gobernante será honrado, y ninguno de ellos es mayor que el que teme al Señor». El testimonio hebreo detrás del texto principal, en cambio, presenta una máxima ética sobre no despreciar a un pobre inteligente ni honrar a un injusto exaltado.'
    reason: textual_variant
lexical_decisions:
- source_word: אֵין לִבְזוֹת
  english_pob_choice: One should not despise
  chosen_spanish: No se debe despreciar
  alternatives_spanish:
  - No hay que despreciar
  - No debe despreciarse
  lexicon: HALOT
  rationale: La construcción hebrea con אֵין + infinitivo funciona como prohibición gnómica. En español, «No se debe despreciar» conserva bien el tono proverbial y normativo sin sonar demasiado mecánico.
- source_word: דַּל
  english_pob_choice: poor man
  chosen_spanish: pobre
  alternatives_spanish:
  - pobre hombre
  - persona pobre
  - el pobre
  lexicon: HALOT
  rationale: El hebreo es singular masculino, pero en español «un pobre» comunica la categoría social con naturalidad y permite lectura proverbial/genericidad. Se evita «hombre» para no forzar un masculino específico donde el dicho es generalizable.
- source_word: מַשְׁכִּיל
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - sabio
  - prudente
  - entendido
  lexicon: HALOT
  rationale: «Inteligente» sigue de cerca la idea de alguien con entendimiento o discernimiento y mantiene el contraste social del versículo. «Sabio» sería posible, pero en español puede cargar un matiz más proverbial o moral que el participio hebreo.
- source_word: לְכַבֵּד
  english_pob_choice: honor
  chosen_spanish: honrar
  alternatives_spanish:
  - dar honor a
  - mostrar respeto a
  - glorificar
  lexicon: HALOT
  rationale: En piel, כבד significa dar honor o peso. «Honrar» es el equivalente natural en español bíblico contemporáneo y reproduce bien la valoración social del texto.
- source_word: עַוָּל
  english_pob_choice: wrongdoer
  chosen_spanish: malhechor
  alternatives_spanish:
  - injusto
  - malvado
  - hombre perverso
  lexicon: HALOT
  rationale: «Malhechor» expresa con claridad a la persona caracterizada por la injusticia o el daño. Evita sobredeterminar el sentido con un término demasiado abstracto como «injusto».
- source_word: אֲשֶׁר הוּרָם
  english_pob_choice: who has been exalted
  chosen_spanish: que ha sido exaltado
  alternatives_spanish:
  - que ha sido elevado
  - aunque haya sido levantado
  - que ha sido encumbrado
  lexicon: HALOT
  rationale: El perfecto pasivo conserva la idea de elevación de estatus. «Ha sido exaltado» mantiene la pasiva y el matiz de ascenso social, en línea con la lectura inglesa.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y la tradición griega
  english_pob_reading: The main text follows the Hebrew ethical maxim; the Greek tradition is preserved as a significant alternative textual witness.
  chosen_spanish_reading: El texto principal sigue el dicho ético hebreo; la tradición griega se conserva como testimonio textual alternativo importante.
  alternative_spanish_readings:
  - Un gran hombre, un juez y un gobernante serán honrados, y ninguno de ellos es mayor que el que teme al Señor.
  - Un juez y un gobernante serán glorificados, pero nadie es mayor que el que teme al Señor.
  rationale: El testimonio hebreo disponible es de alta confianza y tiene primacía para Sirácida cuando existe. Sin embargo, la tradición griega difiere de manera sustancial, así que se preserva como nota de variante significativa en lugar de ser absorbida en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el paralelo griego como evidencia real sin desplazar la primacía hebrea.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene el texto preparado con acuerdo alto y solo diferencias menores señaladas en la evaluación, por lo que no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero aquí el hebreo conservado y el paralelo griego no contienen el nombre divino en el texto principal, por lo que no aparece en la línea principal.
  - Se optó por un español neutral y bíblico contemporáneo, evitando calcos innecesarios.
  - Se preservó la tensión textual entre hebreo y griego en una nota, sin armonizarla artificialmente.
