review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente: «Llamé/invoqué tu nombre, Yahvé, desde un pozo de profundidades/partes más bajas». La draft acierta con «Invocé tu nombre» y «Yahvé», pero se desvía al traducir בּוֹר como «sepulcro». El campo semántico de בּוֹר aquí es pozo/foso/pit, no tumba en sentido primario; además, la nota inglesa preserva explícitamente la imagen del pozo. Conviene mantener esa imagen literal y dejar la intensidad en «profundidades».'
  spanish_quality_summary: 'El español es claro y digno. «Invocé tu nombre, Yahvé» suena natural y fiel. El problema principal es léxico: «sepulcro» introduce una imagen distinta y más interpretativa. «Desde las profundidades del pozo» o «del foso» suena natural en español bíblico moderno y conserva mejor la metáfora.'
  glossary_alignment: Se alinea bien con la política del proyecto en «Yahvé» para יְהוָה. No hay otros términos de glosario conflictivos. La decisión de «invocé» para קָרָאתִי es adecuada en contexto. La excepción problemática es «sepulcro» para בּוֹר, que no sigue la justificación auditada del POB («pit») ni la alternativa preservada en la nota.
  issues:
  - severity: high
    issue: «sepulcro» para מִבּוֹר
    rationale: בּוֹר en este contexto se refiere a un pozo/foso/pit, con resonancia de encierro y muerte, pero no exige «sepulcro». «Sepulcro» cambia la imagen fuente y va más allá de la evidencia lexical y de la auditoría inglesa.
  - severity: medium
    issue: La nota al pie y el texto principal no están bien coordinados
    rationale: La nota habla de «pozo», mientras el texto principal dice «sepulcro». Esto crea tensión interna y sugiere que el texto principal interpretó más de lo que la nota permite.
  revised_spanish_text: Invocé tu nombre[a], Yahvé, desde las profundidades del pozo.
