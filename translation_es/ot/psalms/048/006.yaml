review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del hebreo: ver → asombro → terror → huida apresurada. Sin embargo, una formulación clave no es fiel al valor del verbo ni al español natural: «fueron aterrados» suena no idiomático y además introduce una pasividad/agencia implícita que el nifal hebreo no exige aquí. Conviene una forma estativa o media como «quedaron aterrados» o «se llenaron de terror».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «fueron aterrados» resulta torpe en español bíblico contemporáneo. También la nota al pie contiene «פשוט», palabra hebrea incrustada por error, lo que afecta la legibilidad y la calidad editorial. «Ellos vieron» es aceptable por el énfasis del pronombre independiente, aunque en español podría omitirse; no requiere cambio obligatorio.
  glossary_alignment: 'No hay términos del glosario principal en juego. Las decisiones léxicas en general siguen bien el rastro POB: «vieron», «asombrados», y «huyeron apresuradamente» respetan la evidencia fuente y la revisión inglesa hacia la prisa más que el pánico explícito. La principal excepción es «fueron aterrados», que no refleja bien la decisión documentada para נִבְהֲלוּ en español natural.'
  issues:
  - severity: high
    issue: «fueron aterrados» es español poco natural y semánticamente desviado
    rationale: Aunque נִבְהֲלוּ expresa terror/dismayo, «fueron aterrados» sugiere con fuerza que alguien los aterró, mientras que el hebreo describe su estado/reacción. «Quedaron aterrados» conserva mejor el carácter resultativo sin añadir agente.
  - severity: medium
    issue: La nota al pie contiene el intruso «פשוט»
    rationale: Es un error editorial ajeno al español y no debe aparecer en una nota final publicada. Debe sustituirse por una formulación española natural.
  revised_spanish_text: Ellos vieron[a], y así quedaron asombrados; quedaron aterrados; huyeron apresuradamente.
  revised_footnotes:
  - marker: a
    text: 'O: «miraron». El hebreo expresa simplemente el hecho de ver; el contexto inmediato explica la reacción que sigue.'
    reason: lexical_alternative
  revision_rationale: Se corrige «fueron aterrados» a «quedaron aterrados» para reflejar con fidelidad y naturalidad el estado resultante expresado en hebreo sin insinuar un agente externo. También se limpia la nota al pie eliminando el error editorial en hebreo y manteniendo la alternativa léxica documentada.
