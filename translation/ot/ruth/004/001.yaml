id: RUT.4.1
reference: Ruth 4:1
source:
  edition: WLC
  text: וּ/בֹ֨עַז עָלָ֣ה הַ/שַּׁעַר֮ וַ/יֵּ֣שֶׁב שָׁם֒ וְ/הִנֵּ֨ה הַ/גֹּאֵ֤ל עֹבֵר֙ אֲשֶׁ֣ר דִּבֶּר בֹּ֔עַז וַ/יֹּ֛אמֶר ס֥וּרָ/ה שְׁבָ/ה פֹּ֖ה פְּלֹנִ֣י אַלְמֹנִ֑י וַ/יָּ֖סַר וַ/יֵּשֵֽׁב־־׃
translation:
  text: Now Boaz had gone up to the gate and sat down there[a], and behold, the kinsman-redeemer of whom Boaz had spoken was passing by. So he said, "Turn aside, sit down here[b], so-and-so." And he turned aside and sat down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Peloni Almoni,'' an idiom meaning something like ''so-and-so'' or ''such-and-such one,'' deliberately leaving the man''s name unstated.'
    reason: lexical_alternative
  - marker: b
    text: The town gate functioned as a public place for legal and civic proceedings.
    reason: cultural_note
lexical_decisions:
- source_word: עָלָה הַשַּׁעַר
  lemma: עָלָה
  chosen: had gone up to the gate
  alternatives:
  - went up to the gate
  - came up to the gate
  lexicon: HALOT
  rationale: The verb עָלָה literally means 'go up/ascend.' With the town gate as destination, 'gone up to the gate' preserves the idiom while remaining natural English. The pluperfect 'had gone up' fits the Hebrew narrative sequencing as English style before the next event unfolds.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the town gate
  lexicon: HALOT
  rationale: The city/town gate was the public legal venue in ancient Israel. 'The gate' is the direct rendering; the cultural function can be left implicit in the text and noted separately if needed.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - just then
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a significant development. 'Behold' preserves the narrative vividness and surprise better than a flatter modern equivalent.
- source_word: הַגֹּאֵל
  chosen: the kinsman-redeemer
  alternatives:
  - the redeemer
  - the family redeemer
  - the next of kin
  lexicon: HALOT
  rationale: גֹּאֵל in Ruth refers to the male relative with legal responsibility to redeem. 'Kinsman-redeemer' is somewhat traditional but still precise and communicates both kinship and legal-redemptive function better than simply 'redeemer' or 'next of kin.'
- source_word: עֹבֵר
  chosen: was passing by
  alternatives:
  - passed by
  - was coming along
  lexicon: HALOT
  rationale: The participle gives an ongoing/imperfective sense. 'Was passing by' captures the action in progress as Boaz notices him.
- source_word: אֲשֶׁר דִּבֶּר בֹּעַז
  chosen: of whom Boaz had spoken
  alternatives:
  - whom Boaz had mentioned
  - about whom Boaz had spoken
  lexicon: HALOT
  rationale: The clause identifies this man as the one previously mentioned by Boaz. 'Of whom Boaz had spoken' is idiomatic and sufficiently formal without sounding wooden.
- source_word: סוּרָה
  lemma: סור
  chosen: Turn aside
  alternatives:
  - Come over
  - Step aside
  lexicon: HALOT
  rationale: The imperative from סור means to turn aside/deviate from one's path. 'Turn aside' preserves the directional nuance and fits the legal-public setting.
- source_word: שְׁבָה
  chosen: sit down
  alternatives:
  - stay seated
  - sit here
  lexicon: HALOT
  rationale: The imperative from ישב here invites the man to take a seat for legal proceedings. 'Sit down' is the natural English equivalent.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: A straightforward locative adverb; 'here' is the natural rendering.
- source_word: פְּלֹנִי אַלְמֹנִי
  chosen: Mr. So-and-so
  alternatives:
  - such-and-such one
  - so-and-so
  - Mr. Anonymous
  lexicon: HALOT
  rationale: This expression intentionally withholds the man's name, functioning like an indefinite placeholder. 'Mr. So-and-so' preserves the anonymity and the fact that Boaz is addressing a man directly. Because the Hebrew phrase is unusual and culturally marked, an alternative is worth preserving in a footnote.
- source_word: וַיָּסַר
  chosen: he turned aside
  alternatives:
  - he came over
  - he stepped aside
  lexicon: HALOT
  rationale: This verb echoes Boaz's imperative סוּרָה, showing the man complied. 'Turned aside' preserves the verbal correspondence.
- source_word: וַיֵּשֶׁב / וַיֵּשֵׁב
  chosen: sat down
  alternatives:
  - sat
  lexicon: HALOT
  rationale: 'The repeated verb ישב frames the legal scene: Boaz sat, then the redeemer sat. ''Sat down'' is slightly more natural in English for taking one''s place.'
