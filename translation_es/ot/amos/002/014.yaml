translation:
  language: es
  text: La huida[a] perecerá para el veloz, y el fuerte[b] no fortalecerá su poder[c], y el guerrero no salvará su vida[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escape»; el sustantivo hebreo puede referirse al medio o a la posibilidad de escapar.
    reason: lexical_alternative
  - marker: b
    text: O «el hombre fuerte».
    reason: lexical_alternative
  - marker: c
    text: O «no reunirá sus fuerzas»; literalmente, «no fortalecerá su poder».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «no salvará su נֶפֶשׁ»; aquí significa «vida» o «persona misma», no específicamente «alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: מָנוֹס
  english_pob_choice: flight
  chosen_spanish: huida
  alternatives_spanish:
  - escape
  - fuga
  lexicon: HALOT
  rationale: El sustantivo designa la posibilidad o medio de escapar. «Huida» conserva el sentido abstracto y encaja con la construcción «perecerá de/para el veloz». En español, «escape» sería posible pero algo más técnico; «fuga» puede sonar menos natural en este contexto profético.
- source_word: אָבַד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - desaparecerá
  - se perderá
  lexicon: HALOT
  rationale: El verbo expresa pérdida total bajo juicio, con valor futuro profético. «Perecerá» transmite esa fuerza mejor que un simple «desaparecerá»; «se perderá» resulta más débil o ambiguo.
- source_word: חָזָק
  english_pob_choice: the strong
  chosen_spanish: el fuerte
  alternatives_spanish:
  - el poderoso
  - el hombre fuerte
  lexicon: HALOT
  rationale: El adjetivo está usado sustantivamente para una persona fuerte. «El fuerte» es natural y breve en español. «El poderoso» podría solaparse demasiado con el siguiente término de fuerza militar.
- source_word: יְאַמֵּץ כֹּחוֹ
  english_pob_choice: will strengthen his power
  chosen_spanish: fortalecerá su poder
  alternatives_spanish:
  - maltendrá su fuerza
  - hará firme su fuerza
  lexicon: HALOT
  rationale: La expresión hebrea vincula el acto de hacer fuerte con כֹּחַ, que puede significar fuerza o poder/capacidad. «Fortalecerá su poder» mantiene la relación lexical y suena más natural que un calco como «fortalecerá su fuerza» repetido junto a «el fuerte». Se conserva la tensión entre la literalidad del verbo y la idea idiomática de reunir fuerzas.
- source_word: גִּבּוֹר
  english_pob_choice: the warrior
  chosen_spanish: el valiente
  alternatives_spanish:
  - el guerrero
  - el héroe
  lexicon: HALOT
  rationale: En un contexto de juicio y capacidad militar, el término denota al combatiente poderoso. «El valiente» funciona como equivalente idiomático amplio y evita una repetición demasiado militarizada; «el guerrero» sería una opción más literal, pero menos fluida en español general.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida o la persona misma en peligro, no de manera específica al «alma» inmortal. «Su vida» es la opción más clara y fiel al contexto.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de peligro
  english_pob_reading: here the Hebrew means 'life' or 'self,' not specifically 'soul.'
  chosen_spanish_reading: aquí el hebreo significa «vida» o «persona misma», no específicamente «alma».
  alternative_spanish_readings:
  - «su alma»
  - «a sí mismo»
  rationale: 'Se evita «alma» porque en este pasaje la noción es concreta y forense: el guerrero no logrará rescatar su propia vida. La traducción conserva la tensión semántica abierta entre vida y persona misma sin espiritualizar el término.'
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ en el AT.
translation_notes:
  revision_awareness: La revisión inglesa reciente osciló entre «muster his strength» y «strengthen his power»; la forma final volvió a una lectura más literal de יְאַמֵּץ כֹּחוֹ. La propuesta española mantiene esa literalidad de base con una expresión natural («fortalecerá su poder») y conserva el paralelismo poético del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en el libro, pero en este versículo no aparece el nombre divino.
  - Se mantiene «vida» para נֶפֶשׁ en sentido de preservación física, conforme al uso POB documentado.
  - La equivalencia de «el fuerte» para חָזָק y «el valiente» para גִּבּוֹר evita sobrecargar el verso con repeticiones de «poderoso».
