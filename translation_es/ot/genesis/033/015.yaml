  text: וַ/יֹּ֣אמֶר עֵשָׂ֔ו אַצִּֽיגָה נָּ֣א עִמְּ/ךָ֔ מִן הָ/עָ֖ם אֲשֶׁ֣ר אִתִּ֑/י וַ/יֹּ֨אמֶר֙ לָ֣/מָּה זֶּ֔ה אֶמְצָא חֵ֖ן בְּ/עֵינֵ֥י אֲדֹנִֽ/י־־־׃
