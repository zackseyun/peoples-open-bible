- from: Mi alma aborrece mi vida[a]; dejaré correr libremente mi queja[b]; hablaré en la amargura de mi alma.
  to: Mi alma aborrece mi vida[a]; daré rienda suelta a mi queja[b]; hablaré en la amargura de mi alma.
  rationale: Se conserva la fuerza de «aborrece» y la repetición de «mi alma», pero se reemplaza la expresión menos natural «dejaré correr libremente» por «daré rienda suelta a», que comunica mejor el modismo hebreo y suena idiomática en español. También se pulen las notas para eliminar el anglicismo y mantener un español editorialmente consistente.
