translation:
  language: es
  text: Una caña cascada[a] no la quebrará, y una mecha[b] que apenas arde no la apagará; con fidelidad[c] hará prevalecer la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junco cascado». El hebreo se refiere a una planta de caña o junco, aquí como imagen de algo frágil y dañado.
    reason: lexical_alternative
  - marker: b
    text: O «lino que apenas arde»; literalmente, «flax». En este contexto, la palabra hebrea apunta a una mecha de lámpara hecha de lino.
    reason: lexical_alternative
  - marker: c
    text: O «en verdad». El hebreo puede entenderse como una expresión de verdad o de fidelidad; aquí se ha optado por la idea de confiabilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: קָנֶה
  english_pob_choice: reed
  chosen_spanish: caña
  alternatives_spanish:
  - junco
  - caña de carrizo
  lexicon: HALOT
  rationale: El hebreo designa una planta acuática flexible, y en español "caña" comunica bien la imagen de fragilidad vegetal sin sonar forzado. "Junco" también es posible, pero "caña" mantiene una cercanía natural con el campo metafórico.
- source_word: רָצוּץ
  english_pob_choice: bruised
  chosen_spanish: cascada
  alternatives_spanish:
  - magullada
  - rota
  - aplastada
  lexicon: HALOT
  rationale: La forma pasiva expresa algo dañado o quebrantado. "Cascada" conserva la idea de fragilidad y de haber sufrido daño, sin sobrecargar el texto con una imagen más fuerte que la del hebreo.
- source_word: יִשְׁבּוֹר
  english_pob_choice: he will not break
  chosen_spanish: no la quebrará
  alternatives_spanish:
  - no la romperá
  - no la partirá
  lexicon: HALOT
  rationale: '"Quebrar" reproduce con naturalidad el verbo de ruptura física y suena bien en español bíblico contemporáneo. En este contexto mantiene el paralelo con la caña sin volverlo mecánico.'
- source_word: פִשְׁתָּה
  english_pob_choice: wick
  chosen_spanish: mecha
  alternatives_spanish:
  - lino
  - flax
  lexicon: HALOT
  rationale: Aunque el término hebreo dice literalmente "lino", el contexto de lámpara exige en español el objeto funcional, "mecha". Así se preserva el sentido del símil sin perder transparencia lexical.
- source_word: כֵהָה
  english_pob_choice: dimly burning
  chosen_spanish: que apenas arde
  alternatives_spanish:
  - tenue
  - que se apaga
  - humeante
  lexicon: HALOT
  rationale: El adjetivo describe algo débil o apagado; en español, con "mecha", la expresión más clara y fiel es "que apenas arde". Mantiene la imagen de una llama al límite de extinguirse.
- source_word: יְכַבֶּנָּה
  english_pob_choice: he will not extinguish
  chosen_spanish: no la apagará
  alternatives_spanish:
  - no la extinguirá
  - no la sofocará
  lexicon: HALOT
  rationale: '"Apagar" es el equivalente más natural para una mecha o llama, y conserva la fuerza directa del verbo hebreo sin sonar técnico.'
- source_word: לֶאֱמֶת
  english_pob_choice: faithfully
  chosen_spanish: con fidelidad
  alternatives_spanish:
  - en verdad
  - verdaderamente
  lexicon: HALOT
  rationale: El hebreo puede expresar verdad, fidelidad o confiabilidad. En este contexto, "con fidelidad" recoge la idea adverbial de actuación confiable al establecer el derecho, y respeta la lectura teológica de la POB.
- source_word: יוֹצִיא
  english_pob_choice: he will bring forth
  chosen_spanish: hará salir
  alternatives_spanish:
  - traerá
  - producirá
  lexicon: HALOT
  rationale: El causativo de יצא puede expresarse como "hacer salir" o "sacar". "Hará salir" conserva con precisión la fuerza causativa y encaja con el paralelismo profético.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio
  - la rectitud
  lexicon: HALOT
  rationale: Aunque "justicia" es posible, en Isaías este sustantivo puede referirse al orden justo, al derecho establecido. "El derecho" evita reducirlo solo a una cualidad moral abstracta y preserva la amplitud legal/covenantal del término.
theological_decisions:
- issue: Imágenes metafóricas de fragilidad y vulnerabilidad
  english_pob_reading: Retain the concrete metaphors 'bruised reed' and 'dimly burning wick' rather than interpret them explicitly as weak people.
  chosen_spanish_reading: Mantener las metáforas concretas de la caña dañada y la mecha casi apagada, sin explicarlas en el texto principal.
  alternative_spanish_readings:
  - Una persona débil no la quebrará, y a una persona que se apaga no la apagará.
  - No destruirá a los débiles ni apagará a los que están por extinguirse.
  rationale: El hebreo presenta imágenes poéticas sin desenrollarlas. La versión española debe conservar esa tensión metafórica para no interpretar más de lo que el texto dice y para dejar intacta la fuerza literaria.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de לֶאֱמֶת
  english_pob_reading: faithfully
  chosen_spanish_reading: con fidelidad
  alternative_spanish_readings:
  - en verdad
  - verdaderamente
  - con verdad
  rationale: La raíz אֱמֶת admite un campo semántico de verdad, confiabilidad y fidelidad. "Con fidelidad" comunica bien la manera constante y fiable con que el siervo establecerá el derecho; las alternativas más literales quedan implícitas en la nota.
  doctrine_reference: Translation philosophy §3, §5
- issue: Elección de מִשְׁפָּט
  english_pob_reading: justice
  chosen_spanish_reading: el derecho
  alternative_spanish_readings:
  - la justicia
  - el juicio
  - el orden justo
  rationale: 'En Isaías, מִשְׁפָּט suele abarcar más que un veredicto: implica el orden justo que Dios hace prevalecer. "El derecho" en español conserva el matiz institucional y normativo sin estrechar el término a una sola acepción.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión española sigue el consenso alto del repaso más reciente y no introduce cambios sustanciales respecto del trazado auditado en inglés; solo adapta el léxico a un español natural y transparente, manteniendo las tres imágenes y la ambigüedad significativa de לֶאֱמֶת en nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de metáforas concretas sin explicarlas en el cuerpo del texto.
  - '"Derecho" se usa para מִשְׁפָּט siguiendo una decisión contextual y no como sustituto automático de "justicia" en todo lugar.'
  - Los marcadores de nota a, b y c aparecen anclados exactamente en el texto principal.
  - El tono es bíblico contemporáneo, digno y publicable, sin depender de giros tradicionales que oculten el sentido del hebreo.
