theological_decisions:
- issue: Anthropomorphic/locative description of God's departure
  chosen_reading: Retain the spatial language 'went up from him' without reducing it to a non-spatial paraphrase.
  alternative_readings:
  - Then God departed from him
  - Then God withdrew from him
  rationale: The Hebrew uses ordinary ascent language. Preserving it maintains the narrative's theophanic imagery and does not force a philosophical explanation of divine presence beyond what the text states.
  doctrine_reference: Translation philosophy §1, §3
