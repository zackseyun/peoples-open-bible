    issue: הַכְרִיתֶךָ se traduce como «exterminarte» en el texto principal.
    rationale: La auditoría inglesa eligió «cut you off» precisamente para conservar el matiz covenantal/judicial de כרת. «Exterminarte» comunica un resultado posible, pero sobretraduce y pierde la imagen léxica central.
  - severity: medium
    issue: La nota c está construida desde «exterminarte» en vez de apoyar una traducción principal más literal.
    rationale: Si el texto principal se corrige a «cortarte de en medio», la nota puede ofrecer «destruirte» o «exterminarte» como alternativas, en línea con el rastro de auditoría inglés.
  - severity: low
    issue: «Por amor de mi nombre» es inteligible pero menos natural que «Por amor a mi nombre».
    rationale: La diferencia es estilística, no de sentido. «Por amor a» suena más natural en español contemporáneo neutral manteniendo dignidad bíblica.
  - severity: low
    issue: La nota a usa «demoro mi ira» mientras el texto usa «retraso mi ira».
    rationale: Conviene uniformar la formulación para evitar variación innecesaria.
