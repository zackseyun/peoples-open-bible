theological_decisions:
- issue: Sense of ψυχάς in Paul's self-description
  chosen_reading: Rendered as 'lives' rather than 'souls'
  alternative_readings:
  - souls
  - selves
  rationale: The context is apostolic self-giving and sacrificial care, not an anthropological statement distinguishing body and soul. 'Lives' best communicates the concrete sense of giving themselves for the Thessalonians while avoiding misleading dualistic implications.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ἀγαπητοὶ
  chosen_reading: Rendered relationally as 'dear to us'
  alternative_readings:
  - beloved by us
  rationale: The adjective can be translated more literally as 'beloved,' but in English that can sound either overly formal or carry covenantal/theological resonance not foregrounded here. 'Dear to us' preserves the affection in readable modern English.
  doctrine_reference: Translation philosophy §6
