- from: Él ha construido contra mí y me ha rodeado de amargura y penuria[a][b].
  to: Ha edificado contra mí y me ha rodeado de amargura y aflicción[a][b].
  rationale: 'Se ajusta el español para mayor naturalidad y precisión semántica sin apartarse del hebreo ni del audit trail inglés: ‘edificado’ preserva mejor la metáfora de בָּנָה en registro bíblico; se elimina ‘Él’ por fluidez; y ‘aflicción’ representa mejor תְלָאָה que ‘penuria’ en un contexto de lamento y sufrimiento. Se mantienen las dos notas existentes, actualizadas para reflejar el texto revisado.'
