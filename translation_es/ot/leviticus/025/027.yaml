translation:
  language: es
  text: entonces él calculará los años de su venta y devolverá el excedente al hombre a quien se lo vendió[a], y volverá a su propiedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el remanente» o «lo sobrante». El hebreo se refiere a la cantidad que queda después de calcular el valor de los años no utilizados.'
    reason: lexical_alternative
  - marker: b
    text: «Su propiedad» se refiere aquí a su propiedad de tierra, probablemente su heredad dentro de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְחִשַּׁב
  english_pob_choice: then he shall calculate
  chosen_spanish: entonces él calculará
  alternatives_spanish:
  - y él calculará
  - entonces él hará el cómputo
  lexicon: HALOT
  rationale: חִשַּׁב aquí expresa hacer un cálculo legal o financiero. «Calculará» conserva el valor procedimental y es claro en español; «entonces» refleja la secuencia del mandato.
- source_word: שְׁנֵי מִמְכָּרוֹ
  english_pob_choice: the years of its sale
  chosen_spanish: los años de su venta
  alternatives_spanish:
  - los años de la venta
  - los años desde su venta
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «los años de su venta». En contexto de redención de tierras, se trata del período asociado a la venta para calcular el reembolso, por lo que «de su venta» sigue de cerca el hebreo sin añadir «desde».
- source_word: וְהֵשִׁיב
  english_pob_choice: return
  chosen_spanish: devolverá
  alternatives_spanish:
  - restituirá
  - volverá
  lexicon: HALOT
  rationale: El hifil de שוב puede significar hacer volver, restituir o devolver. «Devolverá» funciona bien en el marco monetario del excedente y mantiene la idea de restitución.
- source_word: הָעֹדֵף
  english_pob_choice: the surplus
  chosen_spanish: el excedente
  alternatives_spanish:
  - el remanente
  - lo sobrante
  lexicon: HALOT
  rationale: עודף designa lo que queda de más después del cálculo. «Excedente» preserva el matiz económico y evita reducirlo a una mera cantidad abstracta sin relación con la cuenta.
- source_word: לָאִישׁ אֲשֶׁר מָכַר לוֹ
  english_pob_choice: to the man to whom he sold it
  chosen_spanish: al hombre a quien se lo vendió
  alternatives_spanish:
  - al hombre a quien lo vendió
  - al comprador
  lexicon: HALOT
  rationale: El hebreo dice «al hombre que le vendió a él», es decir, el comprador. «Al hombre» conserva el referente personal; «se lo vendió» mantiene el objeto implícito y el flujo natural del español.
- source_word: וְשָׁב לַאֲחֻזָּתוֹ
  english_pob_choice: and he shall return to his property
  chosen_spanish: y volverá a su posesión
  alternatives_spanish:
  - y regresará a su propiedad
  - y volverá a su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה en Levítico suele referirse a una tenencia hereditaria de tierra. «Posesión» conserva la amplitud del término y, en contexto, puede entenderse como la porción hereditaria sin forzar un tecnicismo.
theological_decisions:
- issue: Sentido de אֲחֻזָּה en la legislación jubilar
  english_pob_reading: property
  chosen_spanish_reading: posesión
  alternative_spanish_readings:
  - propiedad
  - heredad
  rationale: El término no es solo bien mueble o propiedad genérica, sino una tenencia dentro del orden de la tierra de Israel. «Posesión» deja visible ese trasfondo sin introducir una glosa demasiado pesada en el texto principal.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: La revisión del inglés POB ajustó «the years since its sale» a «the years of its sale» para apegarse más al hebreo. La versión española sigue esa decisión con «los años de su venta», sin introducir explícitamente «desde».
  spanish_consistency_notes:
  - Se mantiene el paralelismo léxico entre «devolverá» y «volverá» para reflejar el doble uso de שוב en el versículo.
  - «Posesión» se usa como término funcional para אֲחֻזָּה; en este contexto debe leerse como posesión hereditaria de tierra.
  - Se evita «SEÑOR» o vocabulario eclesiástico ajeno, porque el versículo no contiene el Nombre divino ni un título cristológico.
