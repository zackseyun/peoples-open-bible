review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro auditado en los puntos principales: «me hacen volver» refleja el causativo de מְשִׁיבִים, «contra los amonitas» expresa bien el sentido bélico, «Yahvé» respeta la política del proyecto, y la cláusula final se mantiene correctamente como afirmación, no pregunta. La principal mejora necesaria es léxica y estilística en «los pone delante de mí», que suena poco natural en español bíblico actual para נתן + לפני; «los entrega ante mí» preserva el sentido de poner al enemigo delante de alguien para su derrota sin introducir «mano».'
  spanish_quality_summary: El español es claro y digno, pero «yo seré para ustedes jefe» suena algo rígido, y «jefe» puede sonar más administrativo que político-tribal. «Yo seré su cabeza[a]» mantiene mejor la metáfora fuente y suena suficientemente inteligible en registro bíblico, especialmente si se conserva una nota con «líder» o «jefe». Además, «ante mí» fluye mejor que «delante de mí» en esta construcción.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יְהוָה; no hay conflictos con otros términos doctrinales. La revisión propuesta también se alinea mejor con la decisión inglesa de preservar «head» en la traducción principal mediante «cabeza», dejando la alternativa explicativa en nota.'
  issues:
  - severity: medium
    issue: «los pone delante de mí» es demasiado calco
    rationale: Aunque formalmente cercano a נתן + לפני, en español suena torpe y menos idiomático. «Los entrega ante mí» o «los pone ante mí» comunica mejor el sentido contextual de derrota sin sobreinterpretar con «en mi mano».
  - severity: medium
    issue: «jefe» debilita la metáfora de לְרֹאשׁ
    rationale: El POB inglés decidió conservar «head» en texto principal y relegar «leader/chief» a nota. En español, «cabeza» es viable en registro bíblico y preserva mejor la imagen fuente y la lógica del audit trail.
  - severity: low
    issue: «seré para ustedes jefe» suena menos natural que una formulación posesiva directa
    rationale: La estructura con «para ustedes» es posible, pero en español resulta más fluida una forma como «seré su cabeza» sin pérdida de sentido.
  revised_spanish_text: 'Jefté dijo a los ancianos de Galaad: «Si ustedes me hacen volver para combatir contra los amonitas, y Yahvé los entrega ante mí, yo seré su cabeza[a]»'
  revised_footnotes:
