  text: Ἰησοῦς δὲ ἐπορεύθη εἰς τὸ ὄρος τῶν Ἐλαιῶν.
  language: Greek
translation:
  text: But Jesus[a] went to the Mount of Olives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is a continuation of the story of the woman caught in adultery
      (John 7:53–8:11). See note on John 7:53 for textual evidence.
    reason: textual_critical
lexical_decisions:
- source_word: πορεύομαι
  chosen: went
  alternatives:
  - proceeded
  - traveled
  - departed
  lexicon: BDAG
  rationale: The aorist passive indicative of poreuomai is used here in an active
    sense to indicate simple movement or travel to a destination.
- source_word: ὄρος
  chosen: Mount
  alternatives:
  - mountain
  - hill
  lexicon: BDAG
  rationale: When paired with 'of Olives', the traditional English rendering 'Mount'
    is universally recognized as a proper geographic designation.
- source_word: ἐλαία
  chosen: Olives
  alternatives:
  - olive trees
  lexicon: BDAG
  rationale: The genitive plural refers to the olive trees that covered the mountain,
    traditionally rendered 'Mount of Olives'.
