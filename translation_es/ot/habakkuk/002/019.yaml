translation:
  language: es
  text: '¡Ay del que dice al madero: «¡Despierta!» y a la piedra silenciosa: «¡Levántate!» ¿Podrá enseñar? Mira: está recubierto de oro y plata, y no hay aliento[a] alguno dentro de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu»; el término hebreo puede significar también «aliento» o «viento». Aquí resalta que el ídolo no tiene vida dentro de sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de...!
  - ¡Ay del que...!
  lexicon: HALOT
  rationale: El interjección profética expresa denuncia y juicio. «¡Ay!» conserva el tono oracular en español; se completa con «del que...» para naturalidad sintáctica sin perder la invectiva.
- source_word: אֹמֵר
  english_pob_choice: to the one who says
  chosen_spanish: del que dice
  alternatives_spanish:
  - del que habla
  - de quien dice
  lexicon: HALOT
  rationale: El participio hebreo es sustantivado y señala al idólatra caracterizado por esa խոս. «Del que dice» mantiene la referencia singular y el sentido activo del habla.
- source_word: לָעֵץ
  english_pob_choice: to wood
  chosen_spanish: al madero
  alternatives_spanish:
  - a la madera
  - al pedazo de madera
  lexicon: HALOT
  rationale: «Madero» comunica en español el material idolátrico de forma natural y concreta, sin confundirlo con un árbol vivo. Es una solución más idiomática que «madera» en este reproche profético.
- source_word: הָקִיצָה
  english_pob_choice: Wake up!
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Despiértate!
  - ¡Despierta ya!
  lexicon: HALOT
  rationale: La orden es burlesca, dirigida a un ídolo inerte. «¡Despierta!» conserva la ironía y la brevedad del imperativo.
- source_word: עוּרִי
  english_pob_choice: Arise!
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Despierta!
  - ¡Ponte de pie!
  lexicon: HALOT
  rationale: Se mantiene la variación paralela del hebreo con un segundo imperativo distinto. «Levántate» expresa bien el contraste con «despierta» y preserva el efecto poético.
- source_word: לְאֶבֶן דּוּמָם
  english_pob_choice: to silent stone
  chosen_spanish: a la piedra silenciosa
  alternatives_spanish:
  - a la piedra muda
  - a la piedra callada
  lexicon: HALOT
  rationale: דּוּמָם indica silencio o mutismo. «Silenciosa» es claro y natural en español, y mantiene la ironía de hablarle a una piedra que no responde.
- source_word: הוּא יוֹרֶה
  english_pob_choice: Can it teach?
  chosen_spanish: ¿Podrá enseñar?
  alternatives_spanish:
  - ¿Puede enseñar?
  - ¿Va a enseñar?
  lexicon: HALOT
  rationale: La forma hebrea funciona retóricamente como pregunta que ridiculiza la expectativa de instrucción por parte del ídolo. «Podrá enseñar» transmite esa posibilidad absurda con buen ritmo en español.
- source_word: הִנֵּה
  english_pob_choice: Look—
  chosen_spanish: 'Mira:'
  alternatives_spanish:
  - Mira—
  - ¡Mira!
  lexicon: HALOT
  rationale: El deíctico llama la atención sobre la evidencia visible. «Mira:» funciona de modo natural en español y mantiene el gesto enfático.
- source_word: תָּפוּשׂ זָהָב וָכֶסֶף
  english_pob_choice: it is overlaid with gold and silver
  chosen_spanish: está recubierta de oro y plata
  alternatives_spanish:
  - está revestida de oro y plata
  - está sobrepuesta de oro y plata
  lexicon: HALOT
  rationale: El participio pasivo indica que el ídolo está cubierto o revestido con metales preciosos. «Recubierta» expresa bien la idea técnica sin sonar arcaica.
- source_word: וְכָל רוּחַ אֵין בְּקִרְבּוֹ
  english_pob_choice: yet there is no breath at all within it
  chosen_spanish: y no hay ningún aliento dentro de ella
  alternatives_spanish:
  - y no hay espíritu alguno dentro de ella
  - y no tiene aliento dentro de sí
  lexicon: HALOT
  rationale: Aquí רוּחַ se entiende principalmente como fuerza de vida/aliento, no como espíritu personal. «Aliento» conserva el contraste entre un ídolo muerto y un ser viviente, sin borrar la ambigüedad semántica del hebreo.
theological_decisions:
- issue: Sentido de רוּחַ en la clausula final
  english_pob_reading: breath
  chosen_spanish_reading: aliento
  alternative_spanish_readings:
  - espíritu
  - viento
  rationale: La denuncia contra los ídolos subraya su carencia de vida. «Aliento» refleja bien el hebreo como signo de vida animada, y evita resolver la tensión semántica hacia una lectura metafísica que el contexto no exige.
  doctrine_reference: Mantener la tensión léxica del texto; no convertir automáticamente רוּחַ en «Espíritu» en un contexto antiidolátrico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente y la auditoría inglesa: conserva el paralelismo de los imperativos, la ironía profética y la ambigüedad de רוּחַ, sin introducir interpretaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiere; aquí no aparece el Tetragrámaton.
  - Se prefirió «aliento» para רוּחַ por el contexto de vida/inanimación, manteniendo nota alternativa para «espíritu».
  - «Madero» se eligió para לָעֵץ porque en español suena más natural que «madera» en una reprensión idolátrica concreta.
  - Los dos imperativos se distinguen con «despierta» / «levántate» para reflejar la variación hebrea.
