translation:
  language: es
  text: Pelee nuestra batalla, y haremos todo lo que nos digas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολέμησον
  english_pob_choice: Fight
  chosen_spanish: ¡Pelead!
  alternatives_spanish:
  - ¡Luchad!
  - ¡Haced la guerra!
  - ¡Combatid!
  lexicon: LSJ
  rationale: El imperativo aoristo de πολεμέω pide una acción militar inmediata. «Pelead» conserva la fuerza exhortativa, suena natural en español bíblico y mantiene el tono directo del ruego.
- source_word: τὸν πόλεμον ἡμῶν
  english_pob_choice: our battle
  chosen_spanish: nuestra batalla
  alternatives_spanish:
  - nuestra guerra
  - la guerra por nosotros
  lexicon: LSJ
  rationale: El acusativo cognado intensifica el imperativo y expresa participación e interés personal. «Nuestra batalla» conserva esa cercanía y evita ampliar indebidamente el alcance a una guerra más abstracta.
- source_word: πάντα ὅσα ἐὰν εἴπῃς
  english_pob_choice: all that you tell us
  chosen_spanish: todo lo que nos digas
  alternatives_spanish:
  - todo cuanto nos digas
  - todo lo que nos hables
  - cuanto nos digas
  lexicon: LSJ
  rationale: La construcción expresa disposición total a obedecer las instrucciones futuras. «Todo lo que nos digas» refleja bien la amplitud de πάντα ὅσα y la relación directa de εἴπῃς con hablar/mandar.
- source_word: ποιήσομεν
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - lo haremos
  - cumpliremos
  - ejecutaremos
  lexicon: LSJ
  rationale: El futuro de ποιέω aquí implica obediencia práctica. «Haremos» es la forma más directa y natural en español, sin añadir matices interpretativos que el griego no exige.
translation_notes:
  revision_awareness: El texto inglés auditado revisó 'everything' a 'all' para acercarse un poco más al valor literal de πάντα; en español se optó por «todo lo que» porque mantiene esa totalidad de manera natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantuvo un registro imperativo y breve, acorde con la súplica militar del contexto.
  - No se introdujo léxico eclesiástico posterior; se conservó el sentido bélico directo del original.
  - La cláusula final se tradujo en futuro simple para reflejar la promesa de obediencia inmediata expresada por ποιήσομεν.
