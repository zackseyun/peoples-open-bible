translation:
  language: es
  text: 'Y se alegrarán ustedes delante de Yahvé, su Dios: ustedes, sus hijos y sus hijas, sus siervos y sus siervas, y el levita que está dentro de sus puertas[a], porque no tiene parte ni herencia con ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está en sus ciudades»; literalmente: «que está dentro de sus puertas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂמַחְתֶּם
  english_pob_choice: you shall rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se gozarán
  - se regocijarán
  lexicon: HALOT
  rationale: El hebreo expresa gozo cultual en un marco de instrucción; en español, 'se alegrarán' comunica el sentido con naturalidad y dignidad, sin exagerar el matiz ceremonial de 'celebrarán'.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé, su Dios
  alternatives_spanish:
  - en presencia de Yahvé, su Dios
  lexicon: HALOT
  rationale: '''Delante de'' reproduce bien la locución espacial-relacional del hebreo y funciona de manera natural en contexto de adoración. Se conserva ''Yahvé'' según el criterio doctrinal del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en lugar de sustituirlo por ''SEÑOR''.'
- source_word: וּבְנֵיכֶם וּבְנֹתֵיכֶם
  english_pob_choice: your sons and your daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus niños y sus niñas
  - sus descendientes varones y mujeres
  lexicon: HALOT
  rationale: Se conserva la pareja explícita masculino/femenino del hebreo. En español, 'hijos e hijas' es claro y fiel; el posesivo se adapta al tratamiento de 'ustedes' en la frase completa.
- source_word: וְעַבְדֵיכֶם וְאַמְהֹתֵיכֶם
  english_pob_choice: your male servants and your female servants
  chosen_spanish: sus siervos y sus siervas
  alternatives_spanish:
  - sus servidores y sus servidoras
  - sus esclavos y sus esclavas
  lexicon: HALOT
  rationale: En español, 'siervos/siervas' mantiene la distinción de género y evita una dureza innecesaria en este contexto litúrgico, a la vez que sigue reflejando la dependencia servil del hebreo. Se preserva la tensión léxica documentada entre un sentido fuerte de subordinación y un registro más natural en español.
- source_word: וְהַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita
  lexicon: HALOT
  rationale: Se traduce el sustantivo gentilicio/tribal de modo estándar y natural en español; 'el levita' comunica adecuadamente la referencia a la persona de la tribu de Leví.
- source_word: אֲשֶׁר בְּשַׁעֲרֵיכֶם
  english_pob_choice: who is within your gates
  chosen_spanish: que está dentro de sus puertas
  alternatives_spanish:
  - que está en sus ciudades
  - que está dentro de sus portones
  lexicon: HALOT
  rationale: '''Dentro de sus puertas'' conserva la imagen hebrea y la resonancia legal de ''שערים''. En el flujo del versículo puede entenderse como la localidad/comunidad, sin borrar la metáfora original.'
- source_word: כִּי אֵין לוֹ חֵלֶק וְנַחֲלָה אִתְּכֶם
  english_pob_choice: because he has no portion or inheritance with you
  chosen_spanish: porque no tiene parte ni herencia con ustedes
  alternatives_spanish:
  - porque no tiene porción ni heredad con ustedes
  - pues no tiene parte ni herencia entre ustedes
  lexicon: HALOT
  rationale: '''Parte ni herencia'' reproduce la pareja léxica del hebreo de forma transparente y natural; ''parte'' mantiene el contraste con una asignación territorial, mientras ''herencia'' conserva el valor técnico-covenantal de נחלה.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Siguiendo la política del proyecto y la lectura inglesa auditada, se conserva el nombre propio divino en español como 'Yahvé' para no ocultar la forma original ni sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Inclusión del levita sin herencia territorial
  english_pob_reading: because he has no portion or inheritance with you
  chosen_spanish_reading: porque no tiene parte ni herencia con ustedes
  alternative_spanish_readings:
  - porque no tiene porción ni heredad con ustedes
  - porque no posee parte ni herencia con ustedes
  rationale: La formulación española conserva la idea jurídica de falta de asignación territorial/patrimonial. 'Parte' y 'herencia' mantienen el paralelismo del hebreo sin suavizar la exclusión real que el texto presupone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'male slaves/female slaves' por 'male servants/female servants' para un registro más natural; en español, 'siervos/siervas' sigue esa revisión y conserva la tensión entre dependencia social y naturalidad de registro. También se mantiene el nombre divino como 'Yahvé', coherente con la política doctrinal del proyecto y con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural formal como 'ustedes' en toda la cláusula.
  - Se conserva la pareja explícita hijo/hija y siervo/sierva para no generalizar a términos neutros.
  - '''Dentro de sus puertas'' preserva la imagen hebrea y se apoya en la nota textual.'
  - '''Parte ni herencia'' reproduce la doble expresión semítica sin reformularla como ''porción'' o ''heredad'' salvo en alternativa nota.'
