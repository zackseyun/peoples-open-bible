base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/018/013.yaml
  text: A man's mercy is for his neighbor[a], but the Lord's mercy is for all flesh[b]; he rebukes and disciplines and teaches and turns back his flock like a shepherd.
  footnotes:
  - marker: a
    text: Or 'all humanity' or 'every living being'; Greek 'all flesh' is a broad biblical expression for creaturely life.
    reason: lexical_alternative
  - marker: b
    text: Or 'brings back' or 'restores'; the Greek literally means 'turning back,' fitting the image of a shepherd recovering strays.
    reason: lexical_alternative
