translation:
  language: es
  text: Extendí mis manos hacia ti; mi alma es para ti como una tierra fatigada.[a] Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alma es para ti como una tierra sedienta». El adjetivo hebreo significa literalmente «fatigada» o «débil»; «sedienta» explicita el probable sentido de sequedad desesperada en la imagen poética.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּרַשְׂתִּי
  english_pob_choice: I spread out
  chosen_spanish: Extendí
  alternatives_spanish:
  - Alargué
  - Extendí hacia afuera
  - Desplegué
  lexicon: HALOT
  rationale: El verbo expresa el gesto concreto de abrir o extender las manos en oración. En español, «extendí» comunica con naturalidad ese movimiento sin perder la imagen corporal del hebreo.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos alzadas
  - mis manos
  lexicon: HALOT
  rationale: El hebreo dual/plural con sufijo de primera persona se refiere claramente a ambas manos. «Mis manos» es la forma natural en español para el gesto orante.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - a ti
  - hacia ti, Dios
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario. «Hacia ti» conserva esa orientación espacial y encaja bien con la imagen de manos extendidas en súplica.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi interior
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ mantiene su fuerza afectiva y espiritual en paralelo con el gesto corporal. «Mi alma» preserva mejor ese valor poético que una paráfrasis más abstracta.
- source_word: כְּאֶרֶץ עֲיֵפָה
  english_pob_choice: like a weary land
  chosen_spanish: como una tierra fatigada
  alternatives_spanish:
  - como una tierra cansada
  - como una tierra reseca
  - como una tierra sedienta
  lexicon: HALOT
  rationale: El adjetivo hebreo significa literalmente «fatigada» o «débil», no el término usual para «seca». «Tierra fatigada» conserva la tensión textual entre el valor literal y la posible implicación de desolación o sed, sin borrar la imagen hebrea.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti solo
  - hacia ti
  - en busca de ti
  lexicon: HALOT
  rationale: En la poesía hebrea, la partícula ל puede expresar orientación, destino o relación de pertenencia. «Para ti» reproduce la formulación breve y deja abierta la fuerza relacional del sintagma.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: El término es oscuro y se translitera por respeto al texto. Mantener «Selah» preserva su función litúrgico-poética sin imponer una traducción especulativa.
translation_notes:
  revision_awareness: 'El draft sigue la lectura de la POB inglesa con un ajuste de estilo al español: se prefirió una formulación natural y transparente («extendí», «hacia ti», «tierra fatigada») sin borrar la ambigüedad léxica señalada por el audit trail entre «weary/faint» y la posible idea de «parched». No se introdujeron cambios textuales mayores respecto del pasaje fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Selah» sin acento para conservar la transliteración usual del término.
  - Se evitó «Señor» u այլ máscara devocional, conforme al principio de transparencia textual del proyecto.
  - «Mi alma» y «mis manos» conservan el paralelismo corporal/espiritual del hebreo.
  - La nota al pie preserva la alternativa semántica documentada por la POB inglesa y la formula en español sin neutralizar la tensión del término עֲיֵפָה.
