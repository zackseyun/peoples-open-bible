  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El justo», «alma», «fidelidad» y «vivirá» se alinean bien con las decisiones documentadas. La excepción recomendada es sustituir «está henchida» por «está inflada», que conserva mejor la imagen de hinchazón en español actual.
