translation:
  language: es
  text: Manténganse despiertos y oren[a], para que no entren en tentación. El espíritu, en verdad, está dispuesto, pero la carne es débil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» para «tentación» (πειρασμόν). El término griego puede referirse tanto a una incitación al pecado como a una prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  english_pob_choice: Stay awake
  chosen_spanish: Manténganse despiertos
  alternatives_spanish:
  - Permanezcan despiertos
  - Estén despiertos
  - Velen
  lexicon: BDAG
  rationale: El imperativo plural de γρηγορέω expresa estar despierto / velar. En español, «manténganse despiertos» comunica de forma natural tanto la idea física inmediata en Getsemaní como la vigilancia espiritual implícita, sin endurecer el registro con una forma demasiado arcaica.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - estén orando
  - recen
  lexicon: BDAG
  rationale: El imperativo presente plural se expresa bien con «oren», que es claro, idiomático y digno. Mantiene el mandato sin forzar una perífrasis progresiva innecesaria en español.
- source_word: ἵνα μὴ εἰσέλθητε
  english_pob_choice: so that you may not enter
  chosen_spanish: para que no entren
  alternatives_spanish:
  - a fin de que no entren
  - para no entrar
  lexicon: BDAG
  rationale: ἵνα con μή y subjuntivo aoristo expresa finalidad o prevención. «Para que no entren» reproduce la relación de propósito/previsión de manera natural en español, conservando la imagen de entrar en una situación.
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - ensayo
  - trial
  lexicon: BDAG
  rationale: «Tentación» es la traducción más directa y tradicional para este contexto inmediato de advertencia frente a la falla moral. La amplitud semántica del término griego se conserva en la nota, sin sustituir el sentido principal del pasaje.
- source_word: τὸ μὲν πνεῦμα
  english_pob_choice: The spirit indeed
  chosen_spanish: El espíritu, en verdad
  alternatives_spanish:
  - El espíritu, ciertamente
  - El espíritu, por un lado
  lexicon: BDAG
  rationale: El marcador μέν introduce contraste. «En verdad» transmite la fuerza concesiva/contrastiva de manera natural en español. Se mantiene «espíritu» en minúscula porque el contraste es con la carne humana, no una referencia explícita al Espíritu Santo.
- source_word: πρόθυμον
  english_pob_choice: is willing
  chosen_spanish: está dispuesto
  alternatives_spanish:
  - es dispuesto
  - está listo
  - está dispuesto con prontitud
  lexicon: BDAG
  rationale: πρόθυμος denota disposición, prontitud o buena voluntad. «Está dispuesto» es una equivalencia clara y sobria que conserva la idea de voluntad/ disponibilidad sin exagerar el matiz de entusiasmo.
- source_word: ἡ δὲ σὰρξ
  english_pob_choice: but the flesh
  chosen_spanish: pero la carne
  alternatives_spanish:
  - pero el cuerpo
  - pero la naturaleza humana
  lexicon: BDAG
  rationale: Se mantiene «carne» para conservar el término bíblico y la tensión teológica del griego σάρξ. «Naturaleza humana» sería más interpretativo; «carne» respeta mejor el idioma del texto y el criterio del proyecto.
- source_word: ἀσθενής
  english_pob_choice: is weak
  chosen_spanish: es débil
  alternatives_spanish:
  - es frágil
  - está débil
  - es impotente
  lexicon: BDAG
  rationale: ἀσθενής significa débil, enfermo o sin fuerza según el contexto. «Es débil» encaja con el contraste inmediato y es la formulación más natural en español.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: human spirit/inner disposition, rendered 'spirit' with lowercase
  chosen_spanish_reading: espíritu humano / disposición interior, en minúscula
  alternative_spanish_readings:
  - Espíritu Santo
  - alma
  rationale: El contraste con «carne» y la situación de los discípulos favorecen una referencia al impulso interior humano, no al Espíritu Santo. Mantener la minúscula evita introducir una identificación pneumatológica que el pasaje no exige.
  doctrine_reference: Preservar la tensión textual sin resolverla mediante una lectura doctrinal ajena al contexto.
- issue: Rendering of σάρξ
  english_pob_reading: ' ''flesh'' rather than ''sinful nature'''
  chosen_spanish_reading: «carne» y no «naturaleza pecaminosa»
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - cuerpo
  - naturaleza humana
  rationale: Aquí σάρξ funciona como la debilidad humana encarnada frente a la disposición del espíritu. Traducirlo por «carne» conserva el giro bíblico y evita trasladar al verso una categoría paulina más desarrollada que el texto no explicita.
  doctrine_reference: La traducción debe preservar el léxico bíblico y no sustituirlo por una interpretación sistemática no requerida por el contexto.
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje griego de forma directa y respeta el audit trail inglés: se conservan la vigilancia, la oración, la finalidad preventiva de ἵνα μὴ, el rango semántico de πειρασμόν y la tensión entre πνεῦμα y σάρξ. No se introdujeron cambios respecto al último pase revisado; la formulación se mantuvo estable por acuerdo alto entre revisores.'
  spanish_consistency_notes:
  - Se usó «tentación» en el texto principal y se preservó el rango semántico en nota, como en la POB inglesa.
  - «espíritu» aparece en minúscula para indicar que no se trata explícitamente del Espíritu Santo.
  - Se mantuvo «carne» como término técnico-bíblico, en vez de sustituirlo por una explicación interpretativa.
  - El tono es moderno y reverente, evitando calcos rígidos como «velad» o «carne es débil» si sonaran demasiado arcaicos en la meta variedad.
