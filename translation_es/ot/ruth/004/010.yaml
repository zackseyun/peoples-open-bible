translation:
  language: es
  text: Y además, a Rut la moabita, la esposa de Mahlón, la he adquirido[a] para mí como esposa, para levantar el nombre del muerto sobre su heredad, para que el nombre del muerto no sea cortado[b] de entre sus hermanos y de la puerta de su lugar[c]. Ustedes son testigos hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la he comprado para mí". El verbo hebreo puede implicar adquisición mediante compra en una transacción legal.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, para preservar la línea familiar y el estatus legal del fallecido en relación con su propiedad heredada.
    reason: cultural_note
  - marker: c
    text: La "puerta" era el lugar público donde se daba testimonio y se resolvían asuntos legales.
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y además
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: Conserva el valor aditivo y la conexión formal con lo dicho antes, con un español natural y solemne.
- source_word: ר֣וּת הַמֹּאֲבִיָּה
  english_pob_choice: Ruth the Moabite
  chosen_spanish: Rut la moabita
  alternatives_spanish:
  - Rut la moabita mujer
  - Rut la moabita
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y el gentilicio en forma natural en español. Se evita la forma arcaica 'moabitessa' por no ser la más clara ni la más digna en español actual.
- source_word: אֵשֶׁת מַחְלוֹן
  english_pob_choice: the wife of Mahlon
  chosen_spanish: la esposa de Mahlón
  alternatives_spanish:
  - la mujer de Mahlón
  - la esposa de Mahlón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'esposa de Mahlón'; en español 'esposa' comunica bien la relación matrimonial sin añadir la idea específica de viudez que el hebreo no expresa aquí.
- source_word: קָנִיתִי לִי
  english_pob_choice: I have acquired for myself
  chosen_spanish: la he adquirido para mí
  alternatives_spanish:
  - la he comprado para mí
  - la he tomado para mí
  lexicon: HALOT
  rationale: '''Adquirir'' preserva el matiz jurídico-transaccional que el POB inglés decidió conservar con ''acquired'', sin reducirlo a una compra comercial aislada ni suavizar la fuerza legal del verbo.'
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - para esposa
  - para que sea mi esposa
  lexicon: HALOT
  rationale: En español, 'como esposa' expresa con naturalidad la finalidad/resultado marital de la acción en el marco legal del versículo.
- source_word: לְהָקִים שֵׁם הַמֵּת
  english_pob_choice: to raise up the name of the dead
  chosen_spanish: para levantar el nombre del muerto
  alternatives_spanish:
  - para restablecer el nombre del muerto
  - para levantar el nombre del difunto
  lexicon: HALOT
  rationale: Se conserva la metáfora de 'levantar' y la referencia al muerto, como en el texto fuente. 'Muerto' sigue de cerca el hebreo y evita suavizar la expresión; 'difunto' sería más eufemístico.
- source_word: עַל נַחֲלָתוֹ
  english_pob_choice: over his inheritance
  chosen_spanish: sobre su heredad
  alternatives_spanish:
  - sobre su herencia
  - para su heredad
  lexicon: HALOT
  rationale: '''Heredad'' comunica el trasfondo jurídico-territorial bíblico con precisión reverente; ''sobre'' mantiene la relación literal del hebreo y la unión del nombre con la propiedad heredada.'
- source_word: וְלֹא יִכָּרֵת
  english_pob_choice: so that ... may not be cut off
  chosen_spanish: para que ... no sea eliminado
  alternatives_spanish:
  - para que ... no sea cortado
  - para que ... no perezca
  lexicon: HALOT
  rationale: Se opta por 'eliminado' para una españolidad más fluida, aunque se reconoce que el hebreo conserva la metáfora de 'cortar'. La frase mantiene la idea de desaparición legal/linajística que el POB inglés también preserva.
- source_word: מֵעִם אֶחָיו
  english_pob_choice: from among his brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre sus parientes
  - de entre sus familiares
  lexicon: HALOT
  rationale: Se mantiene la forma literal 'hermanos', siguiendo el singular/plural masculino del hebreo y la decisión inglesa de no diluirlo en un término más amplio sin necesidad textual.
- source_word: וּמִשַּׁעַר מְקוֹמוֹ
  english_pob_choice: and from the gate of his place
  chosen_spanish: y de la puerta de su lugar
  alternatives_spanish:
  - y de la puerta de su ciudad
  - y de la puerta de su pueblo
  lexicon: HALOT
  rationale: '''Puerta'' conserva el valor legal del lugar público de testimonio y juicio; ''de su lugar'' sigue de cerca la construcción hebrea y evita imponer una localización más específica que el texto no da.'
- source_word: עֵדִים אַתֶּם הַיּוֹם
  english_pob_choice: You are witnesses today
  chosen_spanish: Ustedes son testigos hoy
  alternatives_spanish:
  - Son testigos hoy
  - Ustedes son hoy testigos
  lexicon: HALOT
  rationale: Se traduce de forma clara y solemne la declaración jurídica dirigida al auditorio presente.
theological_decisions:
- issue: La transacción legal en relación con Rut
  english_pob_reading: Use 'I have acquired for myself as a wife' with explicit marital purpose and inheritance-restoration language
  chosen_spanish_reading: '''la he adquirido para mí como esposa'' con lenguaje de heredad y restitución del nombre'
  alternative_spanish_readings:
  - '''la he comprado para mí como esposa'''
  - '''he tomado a Rut como esposa'''
  rationale: El versículo combina lenguaje de adquisición con finalidad familiar y legal. 'Adquirir' conserva la fuerza transaccional sin cargar innecesariamente el texto con una idea de cosificación, pero tampoco borra el matiz jurídico.
  doctrine_reference: Translation philosophy §§1, 5
- issue: El alcance de אֶחָיו
  english_pob_reading: his brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  rationale: Se preserva el dato textual masculino plural. Aunque el contexto puede abarcar el clan, no hay razón para neutralizar el término en la traducción principal.
  doctrine_reference: Translation philosophy §4
- issue: La metáfora de 'cortar' en וְלֹא יִכָּרֵת
  english_pob_reading: so that ... may not be cut off
  chosen_spanish_reading: para que ... no sea eliminado
  alternative_spanish_readings:
  - para que ... no sea cortado
  - para que ... no perezca
  rationale: La metáfora hebrea es fuerte y legal, pero en español 'ser eliminado' comunica bien la desaparición del nombre y mantiene la naturalidad pública del texto. La tensión con la imagen de 'cortar' queda reconocida en la decisión léxica.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que sustituyó 'the dead man' por 'the dead'. Por eso se conserva 'el muerto' de manera consistente en ambas apariciones, manteniendo la correspondencia cercana al hebreo y la fluidez en español.
  spanish_consistency_notes:
  - Se usa 'Rut' y no 'Ruth' para la forma española habitual del nombre, mientras se conserva la identificación con el nombre propio del original.
  - Se usa 'Yahvé' por norma del proyecto sólo cuando corresponde; en este versículo no aparece el tetragrámaton.
  - '''Heredad'' se mantiene para reflejar el trasfondo bíblico-jurídico de נַחֲלָה.'
  - '''Puerta'' se mantiene en sentido técnico-legal, no como simple entrada arquitectónica.'
