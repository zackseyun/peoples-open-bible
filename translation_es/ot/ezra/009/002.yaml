- from: Porque han tomado algunas de sus hijas para sí y para sus hijos, y la semilla santa[a] se ha mezclado con los pueblos de las tierras[b]. Y la mano de los oficiales y de los jefes ha sido la primera[c] en esta infidelidad.
  to: Porque han tomado algunas de sus hijas para sí y para sus hijos,[a] y la descendencia santa[b] se ha mezclado con los pueblos de las tierras.[c] Y la mano de los oficiales y de los diputados fue la principal en esta infidelidad.[d]
  rationale: 'Se ajusta el texto para mejorar fidelidad léxica y naturalidad en español: ‘descendencia santa’ comunica mejor זרע הקדש que ‘semilla santa’; ‘diputados’ refleja mejor סגנים que ‘jefes’; y ‘fue la principal’ expresa la primacía culpable de רִאשׁוֹנָה sin perder el modismo de ‘mano’. Se conservan y afinan las alternativas en notas conforme al rastro de auditoría inglés.'
