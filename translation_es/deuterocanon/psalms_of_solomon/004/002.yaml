- from: Excesivo en palabras[a], excesivo en exhibición[c][b] sobre todos, el que es duro en palabras para condenar a los pecadores en el juicio.
  to: Excesivo en palabras, excesivo en ostentación[a] por encima de todos[b], el que es duro en palabras[c] para condenar a los pecadores en el juicio.
  rationale: Se reubicó la nota léxica de σημειώσει al término correspondiente y se sustituyó «exhibición» por «ostentación» en el texto principal para lograr un español más natural y mantener el matiz denunciatorio del griego. También se ajustó ὑπὲρ πάντας a «por encima de todos» para una comparación más idiomática, y se ordenaron las notas para que reflejen alternativas reales sin redundancia.
