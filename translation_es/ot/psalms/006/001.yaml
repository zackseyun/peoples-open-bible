translation:
  language: es
  text: 'Al director del coro: con instrumentos de cuerda, según la Sheminit[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Sheminit; o «el octavo» o «la octava»; posiblemente una indicación musical, una afinación de octava o un instrumento de ocho cuerdas.
    reason: lexical_alternative
  - marker: b
    text: O «por David» o «para David»; el hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Al maestro del coro
  - Al director
  - Al jefe de músicos
  lexicon: HALOT
  rationale: En los encabezamientos de los salmos, este participio designa al responsable de la ejecución musical. 'Director del coro' comunica bien esa función en español actual y conserva el marco litúrgico/musical sin volverlo demasiado técnico o arcaico.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con música de cuerdas
  - con instrumentos de cuerdas
  - con música instrumental
  lexicon: HALOT
  rationale: El término remite a instrumentos o música de cuerda en este tipo de encabezamientos. 'Con instrumentos de cuerda' mantiene el sentido instrumental de manera natural en español y evita reducirlo indebidamente a una mera indicación abstracta de estilo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - sobre
  - al son de
  lexicon: HALOT
  rationale: En superscripciones, עַל puede introducir una melodía, modo o disposición musical. 'Según' preserva esa relación de ajuste o correspondencia sin decidir demasiado pronto si se trata de un instrumento físico, una melodía o una modalidad musical.
- source_word: הַשְּׁמִינִית
  english_pob_choice: the Sheminith
  chosen_spanish: la Sheminit
  alternatives_spanish:
  - el octavo
  - la octava
  lexicon: HALOT
  rationale: 'El referente exacto es incierto: puede aludir a ''lo octavo'', a una octava musical o a una denominación técnica hoy oscura. La transliteración ''Sheminit'' conserva transparentemente el hebreo y evita una precisión falsa en el texto principal.'
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Salmodia
  lexicon: HALOT
  rationale: '''Mizmor'' es el término estándar para un salmo/canto de alabanza asociado con la ejecución musical. ''Salmo'' es el equivalente español establecido y fiel.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos puede señalar autoría, pertenencia, dedicación o asociación. 'De David' conserva mejor esa ambigüedad que 'por David', que afirmaría con más fuerza la autoría directa.
theological_decisions:
- issue: Ambigüedad de לְדָוִד en el encabezamiento
  english_pob_reading: Rendered 'of David' to preserve the Hebrew's ambiguity.
  chosen_spanish_reading: '''de David'' para preservar la ambigüedad del hebreo.'
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El encabezamiento no obliga a precisar más de lo que el hebreo permite. Mantener 'de David' evita introducir una conclusión histórica o literaria más específica que la que ofrece el texto fuente.
  doctrine_reference: 'Principio de traducción: preservar tensiones o ambigüedades relevantes cuando el original no las resuelve.'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión más reciente del contexto inglés: no se requieren cambios respecto del sentido auditado, y se preserva la ambigüedad de לְדָוִד y la incertidumbre técnica de הַשְּׁמִינִית.'
  spanish_consistency_notes:
  - Se usa 'Salmo' con mayúscula inicial solo por inicio de frase y como título breve del encabezamiento.
  - '''Sheminit'' se translitera de forma consistente para no fingir certeza sobre su referente.'
  - '''de David'' conserva la misma ambigüedad funcional que el inglés auditado ''of David''.'
