revisions:
- from: Porque Yahvé tu Dios es fuego consumidor[a], Dios celoso.
  to: Porque Yahvé tu Dios es fuego consumidor, un Dios celoso[a].
  rationale: Se conserva el texto base del borrador por su fidelidad al hebreo y buena legibilidad, pero se corrige la nota para alinearla con el audit trail inglés y con la decisión teológica documentada sobre קַנָּא. También se añade 'un' antes de 'Dios celoso' para mejorar la naturalidad española sin cambiar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el hebreo: mantiene la relación causal de כִּי, el nombre divino Yahvé, el posesivo ''tu Dios'', la imagen ''fuego consumidor'' para אֵשׁ אֹכְלָה y la fuerza teológica de קַנָּא como ''celoso''. Sin embargo, la nota al pie se desvía del rastro auditado en inglés: el POB inglés preserva como alternativa principal ''a zealous God'' para קַנָּא, no una alternativa para ''consuming fire''.'
  spanish_quality_summary: 'El español es claro, digno y natural. ''Porque Yahvé tu Dios es fuego consumidor, Dios celoso'' suena bien en registro bíblico moderno. La principal mejora necesaria es alinear la nota con la decisión léxica y teológica documentada; además, en español conviene introducir el artículo en la segunda aposición: ''un Dios celoso''.'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה -> ''Yahvé'', אֱלֹהֶיךָ -> ''tu Dios'', אֵשׁ אֹכְלָה -> ''fuego consumidor'', אֵל -> ''Dios'', קַנָּא -> ''celoso''. La excepción problemática es la nota, que debería documentar la alternativa ''celoso''/''celante'' o mejor ''celoso''/''ze­loso'' según el inglés, pero sin cambiar el texto principal. En español, la alternativa más natural al pie es ''O “un Dios celante”'' o ''O “un Dios celoso por su honor”'', pero para mantener cercanía al audit trail basta explicar ''O “un Dios celante”'' con la nota sobre exclusividad de pacto.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a 'fuego consumidor' y documenta 'fuego devorador', pero el audit trail inglés pone la nota en 'jealous God' como alternativa léxica para קַנָּא.
    rationale: Esto altera la documentación de la decisión léxica principal y omite la explicación teológica que el POB inglés quiso preservar sobre la exclusividad de pacto en contexto de idolatría.
  - severity: low
    issue: 'Falta el artículo indefinido en la segunda aposición: ''Dios celoso'' podría mejorarse a ''un Dios celoso''.'
    rationale: El hebreo permite la aposición nominal sin artículo, pero en español 'fuego consumidor, un Dios celoso' fluye con mayor naturalidad y refleja mejor el paralelismo predicativo.
  - severity: low
    issue: La explicación teológica en la nota actual se concentra en 'poder santificador y judicativo', matiz no presente en la nota inglesa.
    rationale: Aunque compatible con la teología bíblica, introduce énfasis interpretativo adicional en lugar de conservar la rationale documentada sobre el reclamo exclusivo del pacto y la idolatría.
  revised_spanish_text: Porque Yahvé tu Dios es fuego consumidor, un Dios celoso[a].
  revised_footnotes:
  - marker: a
    text: O “un Dios celante”. El hebreo enfatiza el reclamo exclusivo de Yahvé sobre su pueblo dentro del pacto, especialmente en el contexto de la idolatría.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base del borrador por su fidelidad al hebreo y buena legibilidad, pero se corrige la nota para alinearla con el audit trail inglés y con la decisión teológica documentada sobre קַנָּא. También se añade 'un' antes de 'Dios celoso' para mejorar la naturalidad española sin cambiar el sentido.
