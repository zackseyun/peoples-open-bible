translation:
  language: es
  text: Pues él estableció con gusto un gimnasio bajo la misma acrópolis, y a los más distinguidos de nuestros jóvenes los iba poniendo bajo el petaso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el petaso», un sombrero griego de ala ancha que aquí funcionaba como señal visible de identidad helenística.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - gustosamente
  - con alegría
  lexicon: LSJ
  rationale: ἡδέως expresa una acción hecha de buena voluntad y con agrado. «Con gusto» conserva esa disposición favorable sin exagerar la carga emocional.
- source_word: ὑπʼ αὐτὴν ἀκρόπολιν
  english_pob_choice: under the very citadel
  chosen_spanish: bajo la misma acrópolis
  alternatives_spanish:
  - bajo la citadela misma
  - debajo de la misma acrópolis
  lexicon: LSJ
  rationale: 'Ἀκρόπολις designa la parte alta fortificada; «acrópolis» mantiene el referente histórico concreto. «La misma» intenta reproducir el énfasis de αὐτήν, aunque en español suena más natural que «la muy acrópolis». '
- source_word: γυμνάσιον
  english_pob_choice: gymnasium
  chosen_spanish: gimnasio
  alternatives_spanish:
  - gimnasio griego
  - institución gimnástica
  lexicon: LSJ
  rationale: Aquí no se trata de un simple lugar para hacer ejercicio, sino de la institución helenística. En español, «gimnasio» sigue siendo el término más reconocido y fiel, especialmente con el contexto inmediato.
- source_word: καθίδρυσεν
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - fundó
  - instaló
  lexicon: LSJ
  rationale: El verbo tiene fuerza fundacional/institucional. «Estableció» comunica bien la instalación de una institución.
- source_word: τοὺς κρατίστους τῶν ἐφʼ ἡμῶν
  english_pob_choice: the noblest of our young men
  chosen_spanish: a los más distinguidos de nuestros jóvenes
  alternatives_spanish:
  - a los mejores de nuestros jóvenes
  - a los más nobles entre nosotros
  lexicon: LSJ
  rationale: κρατίστους significa «los mejores», «los más fuertes» o «los más distinguidos». El contexto del gimnasio apunta a jóvenes de élite; «más distinguidos» conserva el matiz social sin forzar una edad explícita no marcada en el griego.
- source_word: ὑποτάσσων
  english_pob_choice: by bringing ... under
  chosen_spanish: sometiendo
  alternatives_spanish:
  - poniendo bajo
  - subyugando
  lexicon: LSJ
  rationale: El participio expresa acción de poner bajo control o subordinación. «Sometiendo» conserva la relación de dominio sin perder la continuidad verbal del participio.
- source_word: ὑπὸ πέτασον
  english_pob_choice: under the Greek cap
  chosen_spanish: bajo el petaso
  alternatives_spanish:
  - bajo el sombrero griego
  - bajo el petaso griego
  lexicon: LSJ
  rationale: πέτασος es el sombrero de ala ancha asociado con el estilo griego. «Petaso» conserva el término histórico y evita una explicación demasiado interpretativa en el texto principal.
- source_word: ἦγεν
  english_pob_choice: he was leading them on
  chosen_spanish: los iba conduciendo
  alternatives_spanish:
  - los llevaba
  - los guiaba
  lexicon: LSJ
  rationale: El imperfecto sugiere una acción continuada. «Los iba conduciendo» comunica mejor ese proceso progresivo que un simple pretérito puntual.
theological_decisions:
- issue: Retención del marcador cultural helenístico en ὑπὸ πέτασον
  english_pob_reading: Render the phrase concretely as 'under the Greek cap' rather than abstractly as 'into Greek customs.'
  chosen_spanish_reading: 'Conservar el objeto cultural concreto en el texto principal: «bajo el petaso», con nota para explicar su función identitaria griega.'
  alternative_spanish_readings:
  - bajo el gorro griego
  - dentro de las costumbres griegas
  rationale: El griego presenta un marcador visible de helenización, no una explicación abstracta. Mantener «petaso» preserva la imagen y permite al lector percibir el signo externo de asimilación cultural.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete y conserva el contraste entre la instalación del gimnasio y la conducción de los jóvenes bajo un signo helenístico. Se ha evitado suavizar el matiz de imposición cultural.
  spanish_consistency_notes:
  - Se ha mantenido «acrópolis» y «gimnasio» como términos históricos reconocibles.
  - «Petaso» se conserva en el texto con nota explicativa para respetar el marcador cultural del original.
  - 'El imperfecto griego se refleja con una perífrasis progresiva: «los iba conduciendo».'
