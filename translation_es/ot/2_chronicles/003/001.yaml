translation:
  language: es
  text: Entonces Salomón comenzó a edificar la casa de Yahvé en Jerusalén, en el monte Moriah, donde Yahvé había aparecido[a] a David su padre, en el lugar que David había preparado, en la era de Ornán el jebuseo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «donde Yahvé se había aparecido a David su padre».'
    reason: alternative_reading
  - marker: b
    text: Ornán es la forma del nombre usada en Crónicas; compárese Arauná en 2 Samuel 24:16, 18.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; en español, «comenzó» reproduce con naturalidad el inicio de la acción sin añadir matiz interpretativo indebido.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: a edificar
  alternatives_spanish:
  - a construir
  - a levantar
  lexicon: HALOT
  rationale: Después de «comenzó», el infinitivo español es lo más directo. «Edificar» conserva el registro elevado y sirve bien para una obra sagrada.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la metáfora de «casa» y el nombre divino explícito «Yahvé», siguiendo el criterio del proyecto y evitando el reemplazo por una forma de máscara.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa y estándar.
- source_word: בְּהַר הַמּוֹרִיָּה
  english_pob_choice: on Mount Moriah
  chosen_spanish: en el monte Moriah
  alternatives_spanish:
  - sobre el monte Moriah
  - en el monte de Moriah
  lexicon: HALOT
  rationale: «En el monte Moriah» es idiomático en español y conserva el referente geográfico específico.
- source_word: אֲשֶׁר נִרְאָה לְדָוִיד אָבִיהוּ
  english_pob_choice: where Yahweh had appeared to David his father
  chosen_spanish: donde Yahvé se había aparecido a David su padre
  alternatives_spanish:
  - donde Yahvé había aparecido a David su padre
  - donde el Señor se había aparecido a David su padre
  lexicon: HALOT
  rationale: El nifal de ראה en contexto teofánico se expresa naturalmente como «se había aparecido». Se mantiene el sujeto explícito «Yahvé» para evitar ambigüedad y respetar el dato del hebreo y del audit trail.
- source_word: אָבִיהוּ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  lexicon: HALOT
  rationale: En esta referencia directa, «su padre» es la relación más natural y fiel.
- source_word: אֲשֶׁר הֵכִין
  english_pob_choice: that David had prepared
  chosen_spanish: que David había preparado
  alternatives_spanish:
  - que David había dispuesto
  - que David había establecido
  lexicon: HALOT
  rationale: הֵכִין comunica preparar, disponer, dejar listo. «Había preparado» preserva la idea de un lugar previamente designado o dispuesto.
- source_word: בִּמְקוֹם דָּוִיד
  english_pob_choice: at the place that David had prepared
  chosen_spanish: en el lugar que David había preparado
  alternatives_spanish:
  - en el lugar de David
  - en el sitio que David había preparado
  lexicon: HALOT
  rationale: La construcción hebrea es compacta; el español fluye mejor con «en el lugar que...». Se conserva la relación preparatoria sin sobreinterpretar.
- source_word: בְּגֹרֶן
  english_pob_choice: on the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - sobre la era
  - en la era de trillar
  lexicon: HALOT
  rationale: «Era» es la forma natural y bíblicamente reconocible en español para גֹּרֶן; aquí expresa el espacio físico de trilla sin calco pesado.
- source_word: אָרְנָן הַיְבוּסִי
  english_pob_choice: Ornan the Jebusite
  chosen_spanish: de Ornán el jebuseo
  alternatives_spanish:
  - de Ornan el jebuseo
  - de Arauná el jebuseo
  lexicon: HALOT
  rationale: Se sigue la forma de Crónicas, Ornán/Ornan, y se conserva el gentilicio. La preposición «de» corresponde a la ubicación en la era perteneciente a Ornan.
theological_decisions:
- issue: Traducción del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se adopta el nombre divino explícito según el estándar español del proyecto, manteniendo la transparencia frente al texto hebreo y sin la convención de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sujeto implícito de נִרְאָה
  english_pob_reading: where Yahweh had appeared to David his father
  chosen_spanish_reading: donde Yahvé se había aparecido a David su padre
  alternative_spanish_readings:
  - donde Yahvé había aparecido a David su padre
  - donde fue mostrado a David su padre
  rationale: El contexto de teofanía exige que el aparecido sea Yahvé. El español puede expresarlo de modo activo y reflexivo con claridad, preservando la lectura teológica del pasaje.
  doctrine_reference: Narrativa teofánica en contexto cronístico; cf. 2 Samuel 24:16-18 y 1 Crónicas 21:15-30
- issue: Nombre del lugar y variante textual/onomástica de Ornan
  english_pob_reading: Ornan the Jebusite
  chosen_spanish_reading: Ornán el jebuseo
  alternative_spanish_readings:
  - Ornan el jebuseo
  - Arauná el jebuseo
  rationale: Crónicas usa la forma Ornán/Ornan; se respeta la tradición onomástica del libro y se preserva la variante con Samuel mediante nota.
  doctrine_reference: 1 Crónicas 21:18; 2 Samuel 24:16, 18
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para aclarar que el sujeto implícito de «had appeared» es Yahvé; la redacción española sigue esa decisión, pero la expresa de manera natural y explícita con «Yahvé se había aparecido». Se conservó también la variante onomástica de Crónicas (Ornán/Ornan) con nota de cruce a Samuel.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el verso, conforme al estándar del proyecto.
  - Se preserva la metáfora de «casa» en lugar de sustituirla por «templo», para respetar el paralelismo con el hebreo.
  - Se usa «era» para גֹּרֶן por ser el equivalente bíblico natural en español.
  - Se conserva el orden del versículo sin expandir el contenido más allá de lo que exige la claridad del español.
