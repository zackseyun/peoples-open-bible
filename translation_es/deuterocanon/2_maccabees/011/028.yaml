lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Adiós!
  alternatives_spanish:
  - ¡Queden bien!
  - ¡Estén bien!
  - ¡Despedida!
  lexicon: LSJ
  rationale: En este cierre epistolar, el griego funciona como fórmula de despedida. «Adiós» transmite de manera natural y digna la despedida convencional en español, sin forzar una referencia física a «fortaleza» o «salud» que no es el valor idiomático principal aquí.
- source_word: εἰη ἂν
  english_pob_choice: May it be
  chosen_spanish: Que sea
  alternatives_spanish:
  - Ojalá sea
  - Que así sea
  - Sea
  lexicon: LSJ
  rationale: El optativo con ἄν expresa deseo o volición. «Que sea» conserva ese matiz desiderativo de forma natural en español, con registro adecuado para una carta formal.
- source_word: ὡς βούλομεθα
  english_pob_choice: as we desire
  chosen_spanish: como deseamos
  alternatives_spanish:
  - como queremos
  - según deseamos
  - como quisiéramos
  lexicon: LSJ
  rationale: βούλομαι expresa querer/desear. «Deseamos» mantiene el tono formal del contexto y refleja bien la relación entre la voluntad expresada y la petición.
- source_word: καὶ αὐτοὶ δὲ
  english_pob_choice: and we ourselves also
  chosen_spanish: y nosotros mismos también
  alternatives_spanish:
  - y nosotros también
  - y nosotros mismos además
  - y también nosotros mismos
  lexicon: LSJ
  rationale: 'La combinación añade énfasis: «nosotros mismos» conserva αὐτοί, y «también» refleja δέ en su valor conexivo/enfático leve. El orden español busca naturalidad sin perder el énfasis.'
- source_word: ὑγιαίνομεν
  english_pob_choice: are in good health
  chosen_spanish: estamos bien de salud
  alternatives_spanish:
  - estamos bien
  - gozamos de buena salud
  - estamos sanos
  lexicon: LSJ
  rationale: El verbo significa estar sano/estar bien. En un cierre de carta, «estamos bien de salud» mantiene el registro epistolar y comunica de manera clara el estado de bienestar, sin sonar demasiado clínica ni demasiado literal.
translation_notes:
  revision_awareness: El texto griego es una fórmula breve de despedida epistolar. La traducción española sigue el sentido idiomático reconocido en el audit trail inglés («Farewell»), pero ajusta la valencia de ἔρρωσθε a una despedida natural en español. Se conserva el deseo optativo y el cierre de bienestar sin ampliar el contenido.
  spanish_consistency_notes:
  - Se evitó «Cristo/Mesías» y términos teológicos no presentes en este versículo.
  - «Adiós» se usa aquí como fórmula de despedida, no como afirmación doctrinal.
  - Se mantuvo el énfasis de αὐτοὶ δὲ con «nosotros mismos también» para no perder la ligera marcación del griego.
