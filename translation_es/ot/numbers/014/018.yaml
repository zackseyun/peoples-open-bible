translation:
  language: es
  text: Yahvé es tardo para la ira y abundante en amor constante[a], perdonando la iniquidad y la transgresión, pero de ningún modo dejará sin castigo[d][c][b], visitando la iniquidad de los padres sobre los hijos hasta la tercera y la cuarta generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «grande en fidelidad de pacto», «rico en misericordia» o «abundante en amor leal» para «abundante en amor constante».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo «perdonando» literalmente es «llevando» o «cargando» iniquidad y transgresión.
    reason: lexical_alternative
  - marker: c
    text: 'O: «no dejará ciertamente sin castigo» o «no absolverá».'
    reason: lexical_alternative
  - marker: d
    text: La expresión hebrea «hasta la tercera y la cuarta» se refiere a generaciones.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton, siguiendo la decisión del POB de no sustituirlo por un título. En español, "Yahvé" es la forma transparente y eclesialmente legible más difundida para este nombre.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo para la ira
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe demora en enojarse. "Lento para la ira" comunica el sentido natural del modismo sin perder su color bíblico.
- source_word: וְרַב חֶסֶד
  english_pob_choice: abundant in steadfast love
  chosen_spanish: abundante en amor constante
  alternatives_spanish:
  - abundante en misericordia
  - grande en fidelidad de pacto
  - abundante en amor leal
  lexicon: HALOT
  rationale: חֶסֶד concentra lealtad de pacto, misericordia y amor perseverante. "Amor constante" busca mantener esa fuerza relacional y duradera en un español claro; se evita reducirlo solo a "misericordia".
- source_word: נֹשֵׂא עָוֺן וָפָשַׁע
  english_pob_choice: forgiving iniquity and transgression
  chosen_spanish: perdonando la iniquidad y la transgresión
  alternatives_spanish:
  - llevando la iniquidad y la transgresión
  - cargando la culpa y la rebelión
  lexicon: HALOT
  rationale: El verbo נשא con términos de pecado puede significar cargar o perdonar. Aquí se sigue la decisión del POB de expresarlo como perdón, pero en español se conserva la doble distinción entre עָוֺן y פָשַׁע.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  lexicon: HALOT
  rationale: '"Iniquidad" conserva el peso moral y la distinción léxica tradicional frente a otros términos de pecado.'
- source_word: פָשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebeldía
  - ofensa
  lexicon: HALOT
  rationale: '"Transgresión" es el equivalente más directo y mantiene la relación con el término anterior sin fusionarlos.'
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  english_pob_choice: he will by no means leave unpunished
  chosen_spanish: de ningún modo dejará sin castigo
  alternatives_spanish:
  - de ningún modo absolverá
  - ciertamente no quedará impune
  lexicon: HALOT
  rationale: Se preserva la negación enfática del hebreo con una formulación natural en español. "Dejar sin castigo" comunica la idea judicial de no eximir de consecuencias, sin añadir un objeto explícito no presente en el texto.
- source_word: פֹּקֵד עֲוֺן אָבוֹת עַל בָּנִים
  english_pob_choice: visiting the iniquity of fathers on children
  chosen_spanish: visita la iniquidad de los padres sobre los hijos
  alternatives_spanish:
  - castiga la iniquidad de los padres en los hijos
  - hace recaer la iniquidad de los padres sobre los hijos
  lexicon: HALOT
  rationale: '"Visita" mantiene el idioma judicial tradicional del hebreo פקד, y "sobre" reproduce la relación de carga o recaída sin resolverla demasiado. Se conserva "iniquidad de los padres" para mantener el vínculo con el término anterior.'
- source_word: עַל שִׁלֵּשִׁים וְעַל רִבֵּעִים
  english_pob_choice: to the third and the fourth generation
  chosen_spanish: hasta la tercera y la cuarta generación
  alternatives_spanish:
  - a la tercera y a la cuarta generación
  - sobre la tercera y la cuarta
  lexicon: HALOT
  rationale: El hebreo elíptico alude a generaciones sucesivas; en español se explicita "generación" para claridad, siguiendo el sentido reconocido en el POB.
theological_decisions:
- issue: Tensión entre misericordia y juicio divino
  english_pob_reading: God forgives, yet will by no means leave unpunished; he visits the iniquity of fathers on children to the third and the fourth generation.
  chosen_spanish_reading: Dios perdona, pero de ningún modo deja sin castigo; visita la iniquidad de los padres sobre los hijos hasta la tercera y la cuarta generación.
  alternative_spanish_readings:
  - Dios perdona, pero no absuelve al culpable
  - Dios perdona, pero castiga solo las consecuencias naturales
  rationale: Se mantiene la tensión teológica del hebreo y del POB sin suavizarla. No se interpreta como mero efecto natural ni se armoniza artificialmente con otros pasajes sobre responsabilidad individual, porque el texto presenta ambas afirmaciones juntas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó una formulación más interpretativa por una más directa respecto del hebreo: en particular, prefirió "leave unpunished" frente a "clear the guilty" para no añadir un objeto explícito. La presente versión española sigue ese ajuste, optando por "dejar sin castigo" y manteniendo el paralelismo entre perdón y juicio.'
  spanish_consistency_notes:
  - Se conserva "Yahvé" como nombre divino, de acuerdo con la terminología POB.
  - Se prefirió "amor constante" para חֶסֶד, evitando reemplazarlo por el más estrecho "misericordia" en el texto principal.
  - '"Iniquidad" y "transgresión" se mantienen distintos para reflejar el paralelismo hebreo.'
  - La nota b preserva la alternativa semántica de "llevar/cargar" sin imponerla en el cuerpo del texto.
  - La referencia generacional se explicita con "generación" para claridad en español.
