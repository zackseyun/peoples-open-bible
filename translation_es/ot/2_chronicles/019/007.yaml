translation:
  language: es
  text: Ahora bien, que el temor de Yahvé esté sobre ustedes. Tengan cuidado y actúen, porque con Yahvé nuestro Dios no hay injusticia, ni parcialidad[a], ni aceptar soborno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «alzamiento de rostros», un idiomatismo que significa mostrar favoritismo o parcialidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora pues
  - Y ahora
  lexicon: HALOT
  rationale: En español, «Ahora» comunica bien la transición exhortativa e inferencial del hebreo sin sonar afectado. «Pues» podría reforzar el valor conclusivo, pero no es necesario para la naturalidad del verso.
- source_word: יְהִי פַחַד יְהוָה עֲלֵיכֶם
  english_pob_choice: let the fear of Yahweh be upon you
  chosen_spanish: que el temor de Yahvé esté sobre ustedes
  alternatives_spanish:
  - que el temor de Yahvé repose sobre ustedes
  - que el temor de Yahvé venga sobre ustedes
  lexicon: HALOT
  rationale: «Temor» conserva la carga reverencial y de respeto solemne del sustantivo hebreo, no solo miedo físico. «Esté sobre ustedes» sigue de cerca la construcción exhortativa y mantiene la imagen relacional del hebreo.
- source_word: שִׁמְרוּ
  english_pob_choice: Be careful
  chosen_spanish: Sean cuidadosos
  alternatives_spanish:
  - Estén atentos
  - Presten atención
  lexicon: HALOT
  rationale: En este contexto judicial, el imperativo pide vigilancia y atención en la conducta. «Sean cuidadosos» es natural en español y preserva la fuerza práctica de la exhortación.
- source_word: וַעֲשׂוּ
  english_pob_choice: and act
  chosen_spanish: y actúen
  alternatives_spanish:
  - y hagan
  - y obren
  lexicon: HALOT
  rationale: El hebreo pide ejecución concreta de la tarea; «actúen» expresa bien la respuesta práctica y continúa el paralelismo con el mandato anterior.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - injusticia alguna
  - iniquidad
  lexicon: HALOT
  rationale: En un contexto de jueces, «injusticia» transmite con precisión el sentido moral y judicial del término, y corresponde al valor auditado en inglés.
- source_word: מַשֹּׂא פָנִים
  english_pob_choice: partiality
  chosen_spanish: parcialidad
  alternatives_spanish:
  - acepción de personas
  - favoritismo
  lexicon: HALOT
  rationale: El hebreo es un idiomatismo sobre inclinar el juicio por la persona o estatus. «Parcialidad» es la opción española breve y fiel; se conserva la alternativa idiomática en nota.
- source_word: מִקַּח שֹׁחַד
  english_pob_choice: taking of a bribe
  chosen_spanish: aceptación de soborno
  alternatives_spanish:
  - recepción de soborno
  - tomar soborno
  lexicon: HALOT
  rationale: La construcción nominal refiere al acto de recibir soborno. «Aceptación de soborno» es comprensible en español jurídico y preserva el valor sustantivo del hebreo sin forzar un calco.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvéh
  lexicon: HALOT
  rationale: Se sigue el término proyectado para el Tetragrámaton en español. «Yahvé» es la forma establecida en el estilo del proyecto y evita la sustitución por un título genérico.
theological_decisions:
- issue: Nombre divino יְהוָה en una exhortación judicial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto, no un título genérico. Mantener «Yahvé» conserva la referencia al nombre divino y la fuerza exhortativa del juramento implícito en el contexto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión en inglés indica alta concordancia y no requirió cambios sustantivos. El español mantiene el mismo contenido semántico auditado, con adaptación natural de la sintaxis para lectura pública.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - 'Se conserva la triple negación ética/judicial: injusticia, parcialidad y aceptación de soborno.'
  - «Temor» se usa en sentido reverencial, no como miedo meramente psicológico.
  - La nota de parcialidad cubre el idiomatismo hebreo sin interrumpir la fluidez del texto principal.
