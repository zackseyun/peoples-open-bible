translation:
  language: es
  text: Entonces los hijos de Israel clamaron a Yahvé, y Yahvé les levantó un libertador, Ehud hijo de Gera, un benjaminita, un hombre impedido en su mano derecha[a]. Y los hijos de Israel enviaron por medio de él un tributo a Eglón, rey de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'un hombre zurdo'. El hebreo literalmente describe a Ehud como limitado o restringido en su mano derecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - clamaron pidiendo ayuda
  lexicon: HALOT
  rationale: זעק expresa un clamor de angustia o súplica. En español, 'clamaron' mantiene el valor de apelación intensa sin añadir explícitamente 'por ayuda', que está implícito pero no dicho.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La forma hebrea es idiomática y conviene preservarla con fidelidad. 'Los hijos de Israel' refleja el paralelismo del original y conserva la formulación fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio 'Yahvé', conforme al estándar del proyecto y para no ocultar el nombre divino tras un título.
- source_word: וַיָּקֶם ... מוֹשִׁיעַ
  english_pob_choice: raised up for them a deliverer
  chosen_spanish: les levantó un libertador
  alternatives_spanish:
  - les levantó un salvador
  - les suscitó un libertador
  - les hizo surgir un rescatador
  lexicon: HALOT
  rationale: '''Levantar'' reproduce bien la acción divina de suscitar a un juez/libertador. ''Libertador'' expresa la función histórica de מוֹשִׁיעַ sin cargar innecesariamente el término con matices posteriores de ''salvador''.'
- source_word: אֵהוּד בֶּן גֵּרָא
  english_pob_choice: Ehud son of Gera
  chosen_spanish: Ehud hijo de Gera
  alternatives_spanish:
  - Ehud, hijo de Gera
  lexicon: HALOT
  rationale: Los nombres propios se transliteran y la relación patronímica se vierte de forma natural en español con 'hijo de'.
- source_word: בֶּן הַיְמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: benjaminita
  alternatives_spanish:
  - de la tribu de Benjamín
  - un hijo de Benjamín
  lexicon: HALOT
  rationale: '''Benjaminita'' es el equivalente natural del gentilicio hebreo y evita una paráfrasis más larga. Conserva la identificación tribal del personaje.'
- source_word: אִישׁ אִטֵּר יַד יְמִינוֹ
  english_pob_choice: a man hindered in his right hand
  chosen_spanish: un hombre impedido en su mano derecha
  alternatives_spanish:
  - un hombre zurdo
  - un hombre con la mano derecha impedida
  - un hombre con limitación en su mano derecha
  lexicon: HALOT
  rationale: La expresión hebrea es ambigua y literalmente apunta a una limitación de la mano derecha. 'Impedido' conserva esa restricción sin decidir de forma cerrada por 'zurdo' en el cuerpo principal.
- source_word: וַיִּשְׁלְחוּ ... בְּיָדוֹ
  english_pob_choice: sent ... by his hand
  chosen_spanish: enviaron, por mano de él
  alternatives_spanish:
  - enviaron por medio de él
  - enviaron con él
  - lo enviaron por su mano
  lexicon: HALOT
  rationale: La construcción hebrea con בְּיָד expresa agencia o medio. 'Por mano de él' conserva la imagen idiomática y sugiere que Ehud fue el portador del tributo.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: un tributo
  alternatives_spanish:
  - un regalo
  - una ofrenda
  lexicon: HALOT
  rationale: En este contexto político, 'tributo' es más preciso que 'regalo' u 'ofrenda', que podrían desviar el sentido hacia lo cultual o lo meramente voluntario.
- source_word: לְעֶגְלוֹן מֶלֶךְ מוֹאָב
  english_pob_choice: to Eglon king of Moab
  chosen_spanish: a Eglón, rey de Moab
  alternatives_spanish:
  - para Eglón, rey de Moab
  lexicon: HALOT
  rationale: Se mantiene la estructura appositiva natural del hebreo con el nombre propio y el título real, en español fluido y sobrio.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre propio divino. 'Yahvé' lo preserva en español y evita la sustitución por un título, manteniendo la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Sentido de מוֹשִׁיעַ en contexto de Jueces
  english_pob_reading: a deliverer
  chosen_spanish_reading: un libertador
  alternative_spanish_readings:
  - un salvador
  - un rescatador
  rationale: En Jueces, מוֹשִׁיעַ describe una liberación histórica concreta. 'Libertador' comunica mejor esa función en español sin introducir de antemano un peso doctrinal más amplio que el del pasaje.
  doctrine_reference: Uso contextual de מוֹשִׁיעַ en narración histórica
- issue: Descripción de Ehud como hombre 'hindered in his right hand'
  english_pob_reading: a man hindered in his right hand
  chosen_spanish_reading: un hombre impedido en su mano derecha
  alternative_spanish_readings:
  - un hombre zurdo
  - un hombre con la mano derecha limitada
  rationale: La frase hebrea es deliberadamente inusual. 'Impedido' conserva la ambigüedad entre limitación, restricción o impedimento, sin borrar la tensión lexical que el proyecto inglés también preservó.
  doctrine_reference: Decisión lexical sobre אִטֵּר יַד יְמִינוֹ
translation_notes:
  revision_awareness: La versión inglesa más reciente afinó la descripción de Ehud de 'restricted in his right hand' a 'hindered in his right hand' para conservar la ambigüedad del hebreo con un inglés más natural. La presente redacción española sigue esa misma línea, evitando resolver el rasgo de Ehud como 'zurdo' en el texto principal y reservando esa lectura en nota. También mantiene 'Yahvé' para יְהוָה y 'libertador' para מוֹשִׁיעַ conforme al contexto de Jueces.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma principal del nombre divino en todo el versículo.
  - '''Los hijos de Israel'' sigue de cerca el hebreo y mantiene consistencia con la política de transparencia del proyecto.'
  - '''Libertador'' se usa para מוֹשִׁיעַ en contexto histórico-narrativo, no ''salvador'', para evitar sobrecarga teológica.'
  - La nota sobre Ehud preserva la tensión entre la literalidad del hebreo y la interpretación usual 'zurdo'.
  - '''Por mano de él'' reproduce el idiomatismo hebreo de agencia sin perder inteligibilidad en español.'
