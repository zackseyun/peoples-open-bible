translation:
  language: es
  text: Él abre una galería[a] lejos de donde habita la gente; olvidados por el pie[b], cuelgan lejos de los hombres[c], se balancean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abre un cauce de torrente/canal»; el hebreo es difícil, especialmente נחל y גר. Muchos entienden la línea a la luz de la imaginería minera del capítulo y por eso traducen נחל como «galería» o «pozo».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «olvidados por el pie». La idea es que este lugar o estos trabajadores quedan fuera del alcance o del recuerdo de quienes caminan arriba.
    reason: lexical_alternative
  - marker: c
    text: O «son bajados» o «quedan colgados». El verbo hebreo puede sugerir ser suspendidos o descendidos, probablemente mediante cuerdas en una mina.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַץ
  english_pob_choice: breaks open
  chosen_spanish: abre
  alternatives_spanish:
  - abre violentamente
  - rompe
  - abre de golpe
  lexicon: HALOT
  rationale: El verbo hebreo expresa irrupción o apertura forzada. En español, «abre» comunica la acción con naturalidad; el matiz de fuerza queda reforzado por el contexto minero y por la frase siguiente. Evito «rompe» porque puede sonar menos locativo y menos apto para una galería o excavación.
- source_word: נַחַל
  english_pob_choice: shaft
  chosen_spanish: galería
  alternatives_spanish:
  - pozo
  - túnel
  - conducto
  - corte
  lexicon: HALOT
  rationale: En Job 28 el contexto es de minería subterránea. «Galería» transmite una excavación minera horizontal o inclinada y resulta más natural en español que «sháft» o un calco. Mantiene la tensión del hebreo sin decidir demasiado estrechamente un tipo técnico único.
- source_word: מֵעִם
  english_pob_choice: away from
  chosen_spanish: lejos de
  alternatives_spanish:
  - apartada de
  - alejada de
  - desde junto a
  lexicon: HALOT
  rationale: La preposición indica separación de proximidad. «Lejos de» es idiomático y conserva el valor espacial.
- source_word: גָּר
  english_pob_choice: where people dwell
  chosen_spanish: donde habita la gente
  alternatives_spanish:
  - donde vive el forastero
  - donde mora el habitante
  - del lugar habitado
  lexicon: HALOT
  rationale: El término puede aludir al sojourner o al que habita temporalmente, pero en esta línea el sentido es locativo y humano. «Donde habita la gente» mantiene el foco en el lugar habitado sin forzar una referencia específica al forastero.
- source_word: הַנִּשְׁכָּחִים
  english_pob_choice: forgotten
  chosen_spanish: olvidada
  alternatives_spanish:
  - olvidados
  - olvidadas
  - olvidado
  lexicon: HALOT
  rationale: El hebreo pasivo de «olvidar» puede referirse al lugar o a los trabajadores. Como «galería» es femenina, uso «olvidada» para concordar con el sustantivo y conservar la imagen de algo fuera del recuerdo humano.
- source_word: מִנִּי רָגֶל
  english_pob_choice: forgotten by the foot
  chosen_spanish: por el pie
  alternatives_spanish:
  - de la vista del pie
  - por los pies
  - bajo el paso
  lexicon: HALOT
  rationale: La frase es compacta y literal. «Por el pie» conserva la extrañeza del hebreo y sugiere el alcance o el paso de quienes caminan arriba. La lectura de POB «forgotten by the foot» se mantiene sin sobreexplicar.
- source_word: דַּלּוּ
  english_pob_choice: they hang
  chosen_spanish: cuelga
  alternatives_spanish:
  - cuelgan
  - está suspendida
  - quedan colgados
  lexicon: HALOT
  rationale: El verbo puede sugerir colgar, ser suspendido o ser bajado. Dado que «galería» está en singular, uso un singular concordante para la construcción principal. La imagen de suspensión queda intacta.
- source_word: מֵאֱנוֹשׁ
  english_pob_choice: far from men
  chosen_spanish: lejos de los hombres
  alternatives_spanish:
  - lejos de la humanidad
  - apartada de la gente
  - de los mortales
  lexicon: HALOT
  rationale: אֱנוֹשׁ designa al ser humano mortal. «Hombres» es el equivalente más directo y mantiene el contraste con el mundo humano de arriba.
- source_word: נָעוּ
  english_pob_choice: they sway
  chosen_spanish: se balancea
  alternatives_spanish:
  - se mece
  - vacila
  - oscila
  lexicon: HALOT
  rationale: El verbo describe movimiento de vaivén. «Se balancea» es natural en español y encaja con una excavación o pasaje suspendido; también puede sugerir el movimiento de lo colgado.
theological_decisions:
- issue: La traducción de נחל en un contexto minero, con posible tensión entre «corriente/caudal» y «excavación»
  english_pob_reading: shaft, with a note that channel/torrent-bed is also possible
  chosen_spanish_reading: galería, con nota de alternativa por ‘canal/cauce torrencial’
  alternative_spanish_readings:
  - cauce
  - cauce de torrente
  - pozo
  - conducto
  rationale: 'El texto de Job 28 describe minería subterránea. La POB inglesa opta por «shaft» y anota la posibilidad de un cauce/canal. En español, «galería» funciona de manera similar: es comprensible en un contexto minero, pero no borra la dificultad lexical. La nota conserva la alternativa de lectura más literal (''canal/cauce torrencial'').'
  doctrine_reference: No aplica; decisión lexical-contextual sobre el léxico poético.
- issue: 'El alcance de הַנִּשְׁכָּחִים מִנִּי רָגֶל: si describe un lugar o a los mineros, y cómo entender ‘forgotten by the foot’'
  english_pob_reading: forgotten by the foot; beyond the notice or reach of those walking above
  chosen_spanish_reading: olvidada por el pie; fuera del alcance de quienes caminan arriba
  alternative_spanish_readings:
  - olvidados por el pie
  - olvidada del paso
  - olvidados del paso
  rationale: La frase hebrea es muy condensada y mantiene una ambigüedad entre lugar y personas. En español, «olvidada por el pie» conserva la extrañeza y deja abierta la imagen de lo que queda fuera del alcance de los caminantes. No se resuelve la tensión interpretativa; se preserva en una nota.
  doctrine_reference: No aplica; decisión poética/lexical sin contenido doctrinal.
- issue: 'La imagen final דַּלּוּ ... נָעוּ: suspensión y vaivén de los trabajadores o del acceso'
  english_pob_reading: they hang ... they sway
  chosen_spanish_reading: cuelga ... se balancea
  alternative_spanish_readings:
  - cuelgan ... se balancean
  - están suspendidos ... oscilan
  - quedan colgados ... se mecen
  rationale: La POB entiende aquí una escena minera con personas suspendidas o bajadas mediante cuerdas. En español, el singular concordante con «galería» permite traducir la escena como una línea descriptiva del pasaje. La alternativa plural también sería posible si se tomara el sujeto como los trabajadores; la nota ayuda a preservar esa ambigüedad.
  doctrine_reference: No aplica; decisión de imagen poética y sintaxis.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios adicionales necesarios y que el acuerdo con el original es alto. Por eso la redacción española conserva la ambigüedad poética del hebreo y de la POB inglesa, sin sobreinterpretar el detalle técnico de la escena.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto no aplicable en este versículo.
  - Se traduce מִנִּי רָגֶל de forma casi literal para preservar la dureza y compactación del hebreo.
  - Se evita introducir terminología eclesiástica ajena al pasaje; el léxico es descriptivo y poético.
  - Se ha procurado que los marcadores de nota correspondan exactamente a las expresiones dudosas del texto español.
