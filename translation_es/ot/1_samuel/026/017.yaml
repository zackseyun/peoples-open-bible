translation:
  language: es
  text: 'Entonces Saúl reconoció la voz de David y dijo: «¿Es esta tu voz, hijo mío David?» Y David dijo: «Es mi voz, mi señor el rey».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּכֵּר
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - identificó
  - conoció
  lexicon: HALOT
  rationale: El verbo expresa aquí reconocer por percepción auditiva. «Reconoció» comunica bien la identificación de la voz sin perder el matiz de discernimiento contextual.
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: En este contexto Saúl distingue a quien habla; por eso «voz» es más preciso que «sonido» y mantiene la repetición del término en el diálogo.
- source_word: הֲקוֹלְךָ זֶה
  english_pob_choice: Is this your voice
  chosen_spanish: ¿Es esta tu voz?
  alternatives_spanish:
  - ¿Es tu voz esta?
  - ¿Es ese tu sonido?
  lexicon: HALOT
  rationale: La pregunta hebrea con demostrativo se expresa de forma natural en español como una identificación directa de la voz. «Esta» conserva el deíctico del hebreo.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - muchacho mío
  lexicon: HALOT
  rationale: «Hijo mío» preserva el orden natural y reverente del vocativo en español. Mantiene el parentesco masculino y el peso relacional del discurso de Saúl.
- source_word: קוֹלִי
  english_pob_choice: It is my voice
  chosen_spanish: Es mi voz
  alternatives_spanish:
  - Es la voz mía
  - Soy yo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi voz»; en español conviene suplir la cópula implícita. Se mantiene el foco léxico en «voz», como en el original y en la decisión inglesa.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: «Adoní» es un tratamiento respetuoso hacia un superior humano; «mi señor» preserva esa cortesía sin confundirlo con el título divino. «El rey» mantiene la apposición real del hebreo.
- source_word: דָּוִד / שָׁאוּל
  english_pob_choice: David / Saul
  chosen_spanish: David / Saúl
  alternatives_spanish:
  - —
  lexicon: Transliteración estándar
  rationale: Se usan las formas españolas habituales de los nombres propios bíblicos.
theological_decisions:
- issue: Tratamiento reverente de Saúl hacia David en el vocativo y la respuesta
  english_pob_reading: Render literally as 'my son' and 'my lord the king'
  chosen_spanish_reading: «hijo mío» y «mi señor el rey»
  alternative_spanish_readings:
  - «mi hijo» / «mi señor, el rey»
  - «muchacho mío» / «mi rey»
  rationale: 'No hay una cuestión doctrinal central, pero sí una tensión narrativa importante: Saúl llama «hijo» al hombre al que persigue. El español mantiene esa tensión sin suavizarla; además, «mi señor» refleja un trato de respeto humano, no un título divino.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la solución auditada en inglés: reconocer la voz, conservar el vocativo filial y mantener el foco léxico en «voz». No se detectaron revisiones posteriores ni cuestiones textuales alternativas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «voz» en ambos miembros del versículo para preservar la repetición del hebreo.
  - «Hijo mío» conserva el tono afectivo y jerárquico del vocativo sin neutralizar el masculino.
  - «Mi señor el rey» evita el uso litúrgico de «Señor» para YHWH, ya que aquí se trata de un tratamiento humano cortesano.
