id: ISA.9.4
reference: Isaiah 9:4
source:
  edition: WLC
  text: כִּ֤י כָל סְאוֹן֙ סֹאֵ֣ן בְּ/רַ֔עַשׁ וְ/שִׂמְלָ֖ה מְגוֹלָלָ֣ה בְ/דָמִ֑ים וְ/הָיְתָ֥ה לִ/שְׂרֵפָ֖ה מַאֲכֹ֥לֶת אֵֽשׁ־׃
translation:
  text: For every boot of the tramping warrior in the battle's tumult[a], and every garment rolled in blood, will be for burning, fuel for the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every boot that tramps in tumult'; the Hebrew expression is rare and difficult, and some render the first phrase more abstractly in terms of battle noise rather than footwear.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For' fits the causal/explanatory sense in context.
- source_word: כָל
  chosen: every
  alternatives:
  - all
  - each
  lexicon: HALOT
  rationale: Distributive sense works well with the paired singular nouns that follow, yielding idiomatic English.
- source_word: סְאוֹן
  chosen: boot
  alternatives:
  - booted tread
  - armor
  - battle boot
  lexicon: HALOT
  rationale: The noun is rare and difficult, but in context with the participle סֹאֵן and the phrase 'in tumult' it most plausibly refers to the warrior's boot or military footwear rather than abstract noise alone. This yields a coherent image parallel to the bloodied garment.
- source_word: סֹאֵן
  chosen: of the tramping warrior
  alternatives:
  - that tramps
  - tramping
  - stamping
  lexicon: HALOT
  rationale: The participial form modifies the preceding rare noun and evokes the marching/stamping action of battle. Rendering it with an explicit agent in English clarifies the military image without over-paraphrasing.
- source_word: בְּרַעַשׁ
  chosen: in the battle’s tumult
  alternatives:
  - in tumult
  - with noise
  - in shaking
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, commotion, or tumult. Given the martial imagery, 'battle’s tumult' makes the sense explicit and natural in English.
- source_word: וְשִׂמְלָה
  chosen: and every garment
  alternatives:
  - and clothing
  - and cloak
  lexicon: HALOT
  rationale: Generic term for clothing; 'garment' preserves the formal tone and pairs well with the previous military item. 'Every' is carried over distributively from כָל for smooth English.
- source_word: מְגוֹלָלָה
  chosen: rolled
  alternatives:
  - rolled up
  - wrapped
  lexicon: HALOT
  rationale: Passive/participle sense is straightforward; 'rolled' is concise and idiomatic with 'in blood.'
- source_word: בְדָמִים
  chosen: in blood
  alternatives:
  - with blood
  - in bloodshed
  lexicon: HALOT
  rationale: Plural 'bloods' is commonly rendered idiomatically as 'blood.' The phrase likely describes garments soaked or smeared with blood from battle.
- source_word: וְהָיְתָה
  chosen: will be
  alternatives:
  - shall become
  - and it will be
  lexicon: HALOT
  rationale: Simple future/resultative sense in context; English plural agreement is supplied from the collective items described.
- source_word: לִשְׂרֵפָה
  chosen: burned
  alternatives:
  - for burning
  - for the burning
  lexicon: HALOT
  rationale: The Hebrew literally indicates destination 'for burning'; English verbal rendering 'will be burned' expresses the result naturally.
- source_word: מַאֲכֹלֶת אֵשׁ
  chosen: as fuel for the fire
  alternatives:
  - food for fire
  - consumed by fire
  lexicon: HALOT
  rationale: The construct literally means 'food of fire.' 'Fuel for the fire' is the most natural modern English equivalent while preserving the metaphor.
