translation:
  language: es
  text: Y cuando Yahvé haya hecho a mi señor conforme a todo el bien que habló acerca de ti[a], y te haya constituido gobernante sobre Israel[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el bien que te prometió». El hebreo dice literalmente «el bien» que Yahvé habló acerca de David.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y te haya mandado» o «te haya comisionado para ser líder sobre Israel». El verbo puede significar «mandar», pero aquí probablemente expresa la designación para gobernar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que, cuando
  - Y será que, cuando
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia futura; «Y cuando» conserva el sentido condicional/temporal sin sonar forzado en español moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según el criterio del proyecto. «Yahvé» mantiene la distinción entre el nombre del pacto y un título genérico.
- source_word: לַאדֹנִי
  english_pob_choice: for my lord
  chosen_spanish: para mi señor
  alternatives_spanish:
  - para mi amo
  - para mi dueño
  lexicon: HALOT
  rationale: Abigail usa un tratamiento deferente hacia David; «mi señor» refleja mejor ese registro que «amo», que en español puede sonar más servil o duro.
- source_word: כְכֹל אֲשֶׁר דִּבֶּר אֶת הַטּוֹבָה
  english_pob_choice: according to all the good that he spoke concerning you
  chosen_spanish: conforme a todo el bien que habló acerca de ti
  alternatives_spanish:
  - según todo el bien que habló sobre ti
  - conforme a todo el bien que prometió acerca de ti
  lexicon: HALOT
  rationale: 'Se mantiene la cercanía al hebreo: el sustantivo es «el bien» y el verbo es «habló», no un término explícito de promesa. «Acerca de ti» reproduce bien עָלֶיךָ.'
- source_word: וְצִוְּךָ לְנָגִיד
  english_pob_choice: and has appointed you ruler
  chosen_spanish: y te haya constituido gobernante
  alternatives_spanish:
  - y te haya mandado como gobernante
  - y te haya comisionado como líder
  lexicon: HALOT
  rationale: Aunque צוה puede significar «mandar», en esta construcción con לְנָגִיד el sentido es el de constituir/nombrar para un cargo. «Gobernante» da una equivalencia clara y digna para נָגִיד.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - encima de Israel
  lexicon: HALOT
  rationale: El valor de עַל aquí es de autoridad; «sobre Israel» conserva la relación de mando sin introducir un matiz ajeno.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La traducción del proyecto evita la sustitución por un título. «Yahvé» es la forma establecida para reflejar el Tetragrámaton en español con transparencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el paquete fuente y con la auditoría inglesa: no se requieren revisiones adicionales; se conserva la tensión léxica entre «habló» y «prometió», y entre «mandó» y «constituyó/nombró» en la decisión final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto.
  - «Mi señor» conserva el tratamiento respetuoso del hebreo en un registro natural de español.
  - «Gobernante» evita la sobretraducción litúrgica y comunica la función política de נָגִיד.
  - La nota a pie marca la alternativa léxica importante de הַטּוֹבָה sin borrar la literalidad del hebreo.
  - La nota b preserva la ambigüedad entre mandato y nombramiento en וְצִוְּךָ.
