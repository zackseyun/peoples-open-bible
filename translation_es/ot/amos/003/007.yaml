translation:
  language: es
  text: Porque el Señor Yahvé no hace nada sin antes revelar su secreto[a] a sus siervos los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su consejo secreto' o 'su plan confidencial'. El hebreo סוֹד puede referirse a confidencia, deliberación íntima o asunto secreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor YHWH
  lexicon: HALOT
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor' representa bien אֲדֹנָי, y 'Yahvé' conserva el nombre propio del pacto según el criterio del proyecto; 'Dios' sería posible, pero diluiría la distinción entre título y nombre.
- source_word: לֹא ... כִּי אִם
  english_pob_choice: does nothing unless
  chosen_spanish: nada hace, sino que
  alternatives_spanish:
  - no hace nada, excepto que
  - no hace nada, salvo que
  lexicon: HALOT
  rationale: 'La combinación negativa con כִּי אִם expresa excepción: Yahvé no actúa sin antes revelar. ''Nada hace, sino que'' mantiene la fuerza exceptiva con una sintaxis natural en español y evita una paráfrasis excesiva.'
- source_word: יַעֲשֶׂה
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - actúa
  - realiza
  lexicon: HALOT
  rationale: עשה es amplio ('hacer, actuar'). En esta construcción, 'hace' reproduce de manera sobria el valor general del verbo sin cargarlo con un matiz más específico de lo que el hebreo exige.
- source_word: דָּבָר
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - ningún asunto
  lexicon: HALOT
  rationale: Literalmente significa 'cosa' o 'asunto', pero en la negación la construcción española idiomática pide 'nada'. Eso conserva el alcance del hebreo sin sonar forzado.
- source_word: גָּלָה
  english_pob_choice: reveals
  chosen_spanish: revela
  alternatives_spanish:
  - descubre
  - da a conocer
  lexicon: HALOT
  rationale: El verbo significa 'desnudar, descubrir, revelar'. 'Revela' es la equivalencia más directa y digna en español para la divulgación de lo oculto.
- source_word: סוֹדוֹ
  english_pob_choice: his secret
  chosen_spanish: su secreto
  alternatives_spanish:
  - su consejo secreto
  - su secreto confidencial
  lexicon: HALOT
  rationale: סוֹד puede abarcar confidencia, consejo íntimo o asunto secreto. El inglés revisado volvió a 'his secret' para acercarse más al término hebreo; en español, 'su secreto' conserva esa amplitud sin añadir una especificación que el texto no obliga.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque עבד puede significar 'esclavo', en este contexto profético la relación de servicio comisionado a Dios domina. 'Siervos' es el equivalente tradicional y contextualmente adecuado en español, manteniendo la función sin introducir una dureza que el versículo no enfatiza.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Sustantivo definido plural; 'los profetas' es la correspondencia natural y precisa en español.
theological_decisions:
- issue: Nombre divino יְהוִה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se conserva tanto el título soberano como el nombre propio del pacto, siguiendo la norma del proyecto de no ocultar YHWH tras una convención de máscara. En español, 'el Señor Yahvé' evita la repetición poco natural 'Señor Señor' y mantiene la distinción reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
- issue: Alcance de סוֹד en la revelación profética
  english_pob_reading: his secret
  chosen_spanish_reading: su secreto
  alternative_spanish_readings:
  - su consejo secreto
  - su plan confidencial
  rationale: 'El versículo afirma revelación de lo oculto, pero no obliga a especificar una categoría sistemática como decreto o consejo formal. ''Su secreto'' preserva la tensión lexical y teológica: algo íntimo y no público que Yahvé decide revelar a sus profetas.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La base inglesa fue revisada de 'his secret counsel' a 'his secret' para ajustarse más al hebreo סוֹד sin perder naturalidad. La versión española sigue esa revisión y evita sobreespecificar el término; además, adapta el título compuesto אֲדֹנָי יְהוִה con 'el Señor Yahvé' para reflejar la política del proyecto sobre el nombre divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוִה, conforme al estándar del proyecto.
  - Se elige 'siervos' para עֲבָדָיו por el contexto profético, no 'esclavos'.
  - '''Secreto'' se mantiene en sentido amplio, sin convertirlo en una referencia técnica a decreto o consejo formal.'
