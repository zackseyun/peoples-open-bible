translation:
  language: es
  text: Comerán lo viejo, largo tiempo guardado[a], y sacarán lo viejo a causa de lo nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Comerán provisiones viejas, bien añejadas, y sacarán lo viejo por causa de lo nuevo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: You will eat
  chosen_spanish: Comerán
  alternatives_spanish:
  - Y comerán
  - Entonces comerán
  lexicon: HALOT
  rationale: El perfecto con waw funciona aquí con valor futuro en una promesa de bendición del pacto. En español, el futuro simple mantiene ese sentido promisor sin añadir un conector innecesario.
- source_word: יָשָׁן
  english_pob_choice: old stores
  chosen_spanish: lo viejo
  alternatives_spanish:
  - las provisiones viejas
  - el grano viejo
  - lo almacenado viejo
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivamente para productos almacenados de cosecha anterior. 'Lo viejo' preserva la concisión hebrea y evita precisar 'grano' sin apoyo explícito del texto.
- source_word: נוֹשָׁן
  english_pob_choice: long kept
  chosen_spanish: largo tiempo guardado
  alternatives_spanish:
  - muy viejo
  - guardado por mucho tiempo
  - de larga conservación
  lexicon: HALOT
  rationale: La forma intensifica la antigüedad del alimento almacenado. 'Largo tiempo guardado' reproduce esa intensificación de modo natural en español sin la connotación negativa de 'viejo' en sentido de deterioro.
- source_word: וְיָשָׁן
  english_pob_choice: the old
  chosen_spanish: lo viejo
  alternatives_spanish:
  - las provisiones viejas
  - lo almacenado viejo
  lexicon: HALOT
  rationale: La segunda ocurrencia también es sustantiva y refiere a lo ya guardado que será retirado. Mantener la misma expresión ayuda a conservar el paralelismo del hebreo.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: delante de
  alternatives_spanish:
  - a causa de
  - por causa de
  - ante
  lexicon: HALOT
  rationale: 'En este contexto la expresión comunica desplazamiento: lo viejo sale en presencia de lo nuevo. ''Delante de'' conserva mejor la imagen espacial del hebreo, que el inglés POB explicó funcionalmente como ''because of''.'
- source_word: חָדָשׁ
  english_pob_choice: the new
  chosen_spanish: lo nuevo
  alternatives_spanish:
  - la nueva cosecha
  - lo recién cosechado
  lexicon: HALOT
  rationale: El adjetivo está sustantivado y se refiere a la cosecha nueva. 'Lo nuevo' conserva la forma breve del original y el paralelismo con 'lo viejo'.
- source_word: תּוֹצִיאוּ
  english_pob_choice: you will clear out
  chosen_spanish: sacarán
  alternatives_spanish:
  - sacarán fuera
  - retirarán
  - desalojarán
  lexicon: HALOT
  rationale: El hifil de יצא significa 'hacer salir, sacar'. 'Sacar' expresa bien la acción concreta de retirar lo viejo para dar lugar a lo nuevo, sin sobrecargarla con un giro idiomático más interpretativo.
translation_notes:
  revision_awareness: Se mantuvo el contenido esencial del borrador inglés de la POB y su decisión de leer los sustantivos hebreos de modo compacto; se prefirió una formulación española más natural que conserva el paralelismo entre lo viejo y lo nuevo y mantiene la imagen espacial de מִפְּנֵי.
  spanish_consistency_notes:
  - Se conservó 'lo viejo' / 'lo nuevo' para reflejar el uso sustantivado de los adjetivos hebreos.
  - '''Largo tiempo guardado'' traduce la intensificación de נוֹשָׁן sin introducir un juicio de calidad.'
  - '''Delante de'' preserva la imagen del hebreo y queda compatible con la explicación funcional de la nota inglesa.'
  - No se usó 'SEÑOR' ni terminología teológica especial porque el versículo no contiene el nombre divino ni títulos cristológicos.
