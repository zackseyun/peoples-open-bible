translation:
  language: es
  text: Escucha ahora[a], Josué, el sumo sacerdote, tú y tus compañeros que están sentados ante ti, porque son hombres de una señal; porque he aquí, traigo a mi siervo, el Renuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «hombres que son una señal» o «hombres de un portento».'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע נָא
  english_pob_choice: Hear now
  chosen_spanish: ¡Escucha ahora!
  alternatives_spanish:
  - Oye ahora
  - Escucha, te ruego
  lexicon: HALOT
  rationale: El imperativo con נָא pide una apelación urgente. «Escucha ahora» conserva la inmediatez y el tono exhortativo sin volverse artificial en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo eclesial, el nombre propio se adapta como «Josué», equivalente normal de la forma hebrea.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: HALOT
  rationale: «Sumo sacerdote» es el equivalente idiomático y exacto del título del cargo. «Gran sacerdote» sería más literal, pero menos natural y menos claro en español.
- source_word: וְרֵעֶיךָ
  english_pob_choice: your companions
  chosen_spanish: tus compañeros
  alternatives_spanish:
  - tus asociados
  - tus amigos
  lexicon: HALOT
  rationale: רֵעַ aquí alude a quienes acompañan o están vinculados con Josué en este contexto visionario. «Compañeros» mantiene la relación sin forzar intimidad afectiva.
- source_word: הַיֹּשְׁבִים לְפָנֶיךָ
  english_pob_choice: who sit before you
  chosen_spanish: que se sientan delante de ti
  alternatives_spanish:
  - que están sentados delante de ti
  - que están en tu presencia
  lexicon: HALOT
  rationale: El participio con la preposición expresa una postura o permanencia delante de Josué. «Se sientan delante de ti» conserva el valor espacial/ceremonial y suena natural en español.
- source_word: אַנְשֵׁי מוֹפֵת
  english_pob_choice: men of a sign
  chosen_spanish: hombres de una señal
  alternatives_spanish:
  - hombres de un prodigio
  - hombres de un portento
  - hombres que son una señal
  lexicon: HALOT
  rationale: Se mantiene la estructura compacta del hebreo. «Señal» es la forma más neutral en español para מוֹפֵת aquí, dejando abierta la carga simbólica que el contexto desarrolla.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí que
  lexicon: HALOT
  rationale: La partícula deíctica introduce un anuncio solemne. «He aquí» preserva bien el tono profético y solemne del original.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa una acción presentada como segura e inminente. «Traigo» comunica esa certeza con más naturalidad que una perífrasis más pesada.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  lexicon: HALOT
  rationale: En este contexto profético-mesiánico, «siervo» conserva el sentido de servidor comisionado y evita un efecto semántico demasiado social/jurídico que «esclavo» tendría en español.
- source_word: צֶמַח
  english_pob_choice: the Branch
  chosen_spanish: el Renuevo
  alternatives_spanish:
  - el Vástago
  - el Retoño
  - la Rama
  lexicon: HALOT
  rationale: En la tradición profética de Zacarías, צמח funciona como designación titular del figura davídica venidera. «Renuevo» es una traducción reverente y comprensible en español; se evita «Rama» por ser menos natural como título.
theological_decisions:
- issue: Cómo traducir צֶמַח como título mesiánico sin sobreinterpretar
  english_pob_reading: Rendered as the title 'the Branch'
  chosen_spanish_reading: Traducido como el título «el Renuevo»
  alternative_spanish_readings:
  - el renuevo
  - la rama
  - el vástago
  rationale: El contexto profético y la redacción con «mi siervo» favorecen entender צֶמַח como designación titular del agente futuro. «Renuevo» preserva la referencia sin añadir una explicación doctrinal explícita que no está en el versículo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 2, 3
- issue: Cómo expresar אַנְשֵׁי מוֹפֵת sin resolver del todo su ambigüedad simbólica
  english_pob_reading: Kept relatively literal as 'men of sign' with explanatory footnote
  chosen_spanish_reading: Mantenido relativamente literal como «hombres de una señal» con nota alternativa
  alternative_spanish_readings:
  - hombres que son una señal
  - hombres de un portento
  - hombres de un prodigio
  rationale: La frase hebrea es compacta y con carga simbólica. La traducción principal conserva esa densidad; la nota permite la alternativa interpretativa sin imponer una sola glosa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto inglés revisado añadió «a» antes de «sign» para reflejar mejor el singular hebreo; por eso el español usa «una señal» y conserva la ambigüedad simbólica con nota. También se tuvo en cuenta que el inglés fijó «Branch» como título, mientras que en español se optó por el equivalente natural «Renuevo» para mantener la misma función titular con claridad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Josué» se usa como forma española estándar del nombre אישי יְהוֹשֻׁעַ.
  - «Mi siervo» preserva el paralelismo profético habitual y evita la carga social excesiva de «esclavo» aquí.
  - «El Renuevo» se capitaliza para reflejar su función titular en el contexto profético.
