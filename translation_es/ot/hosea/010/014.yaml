translation:
  language: es
  text: El tumulto se levantará en medio de tu pueblo[a], y todas tus fortalezas serán devastadas, como Shalman devastó a Bet-arbel el día de la batalla; madres fueron hechas pedazos con sus hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shalman puede referirse a Salmanasar, pero la identificación histórica exacta es incierta.
    reason: alternative_reading
  - marker: b
    text: 'O, más literalmente: «una madre fue despedazada sobre hijos». La expresión hebrea es breve y muy gráfica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָאם
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - se alzará
  lexicon: HALOT
  rationale: El perfecto con waw en discurso profético anuncia un evento futuro. «Se levantará» conserva la imagen de algo que se alza o irrumpe y suena natural en español.
- source_word: שָׁאוֹן
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - estruendo
  - ruido
  lexicon: HALOT
  rationale: El sustantivo designa una conmoción ruidosa, a menudo ligada a guerra o destrucción. «Tumulto» comunica bien esa idea en español actual sin perder la carga de violencia.
- source_word: בְּעַמֶּךָ
  english_pob_choice: among your people
  chosen_spanish: en medio de tu pueblo
  alternatives_spanish:
  - entre tu pueblo
  - en tu pueblo
  lexicon: HALOT
  rationale: La preposición ב funciona aquí de manera espacial o de ámbito; «en medio de» expresa con claridad el lugar donde estalla el tumulto y evita una literalidad dura en español.
- source_word: מִבְצָרֶיךָ
  english_pob_choice: your fortresses
  chosen_spanish: tus fortalezas
  alternatives_spanish:
  - tus fortificaciones
  - tus plazas fuertes
  lexicon: HALOT
  rationale: El término alude a sitios defensivos fortificados. «Fortalezas» es breve, natural y mantiene el sentido militar.
- source_word: יוּשַּׁד
  english_pob_choice: will be devastated
  chosen_spanish: serán devastadas
  alternatives_spanish:
  - serán arrasadas
  - serán destruidas
  - serán saqueadas
  lexicon: HALOT
  rationale: La pasiva de שׁדד incluye despojo violento y ruina. «Devastadas» conserva esa amplitud; el plural concuerda con «fortalezas».
- source_word: כְּשֹׁד
  english_pob_choice: as ... devastated
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: La comparación introduce un ejemplo histórico de devastación. En español, «como» permite enlazar sin sobreexplicar.
- source_word: שַׁלְמַן
  english_pob_choice: Shalman
  chosen_spanish: Shalman
  alternatives_spanish:
  - Salmán
  - Salman
  lexicon: HALOT
  rationale: Se translitera el nombre propio para respetar la forma hebrea y no resolver en el texto principal su posible identificación histórica.
- source_word: בֵּית אַרְבֵאל
  english_pob_choice: Beth-arbel
  chosen_spanish: Bet-arbel
  alternatives_spanish:
  - Bet Arbél
  - Beth-arbel
  lexicon: HALOT
  rationale: Se conserva el topónimo semítico con transliteración directa. «Bet-arbel» es legible para el lector hispano y mantiene la forma del hebreo.
- source_word: בְּיוֹם מִלְחָמָה
  english_pob_choice: on the day of battle
  chosen_spanish: en el día de la batalla
  alternatives_spanish:
  - el día de la guerra
  - el día del combate
  lexicon: HALOT
  rationale: La frase temporal es directa; «batalla» es más natural que «guerra» para un episodio concreto y preserva el paralelismo del texto.
- source_word: אֵם
  english_pob_choice: mothers
  chosen_spanish: madres
  alternatives_spanish:
  - una madre
  - la madre
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto describe una escena de atrocidad con fuerza representativa o colectiva. El plural español comunica mejor esa fuerza natural que un singular literal.
- source_word: עַל בָּנִים
  english_pob_choice: with their children
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - sobre sus hijos
  - encima de sus hijos
  lexicon: HALOT
  rationale: La preposición עַל es literalmente «sobre/encima de», pero el giro violento apunta a una acción conjunta o simultánea. «Con sus hijos» sigue la lectura de la POB inglesa y evita una ambigüedad innecesariamente cruda en español.
- source_word: רֻטָּשָׁה
  english_pob_choice: were dashed to pieces
  chosen_spanish: fueron despedazadas
  alternatives_spanish:
  - fueron hechas pedazos
  - fueron destrozadas
  lexicon: HALOT
  rationale: La pasiva expresa violencia extrema de golpe o despedazamiento. «Despedazadas» reproduce con fuerza el carácter brutal del verbo sin añadir detalles ajenos al texto.
theological_decisions:
- issue: Identificación de שַׁלְמַן
  english_pob_reading: Render as the personal name 'Shalman' without specifying identity.
  chosen_spanish_reading: Renderizar como el nombre propio «Shalman» sin precisar su identificación histórica.
  alternative_spanish_readings:
  - Identificarlo como Salmanasar III
  - Identificarlo como Salmanasar V
  - Tratarlo como un gobernante no identificado
  rationale: El hebreo presenta el nombre שַׁלְמַן, pero la identificación histórica es incierta. La traducción debe preservar la forma fuente sin cerrar la cuestión en el texto principal.
  doctrine_reference: Primacía del idioma original; los nombres propios se transliteran y la identificación histórica incierta se deja abierta.
- issue: Fuerza de la cláusula final de atrocidad
  english_pob_reading: Translate the clause as describing mothers dashed to pieces with their children.
  chosen_spanish_reading: Traducir la cláusula como una descripción de madres despedazadas con sus hijos.
  alternative_spanish_readings:
  - 'Traducir más literalmente: «una madre fue despedazada sobre hijos»'
  - Interpretar que las madres fueron despedazadas mientras abrazaban a sus hijos
  rationale: El hebreo es breve y gráfico. La redacción elegida preserva la violencia y la posible fuerza colectiva/genérica sin especificar mecánicamente lo que el texto no detalla.
  doctrine_reference: Principio de mantener la tensión textual y teológica sin resolverla más allá de lo que permite la fuente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se evita añadir un conector temporal no explícito antes de la cláusula final y se mantiene una puntuación directa con punto y coma, preservando la dureza del cierre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece el Tetragrámaton.
  - «Mesías/Cristo» no aplica aquí.
  - Se mantuvo la transliteración de nombres propios (Shalman, Bet-arbel) en lugar de reinterpretarlos.
  - «Fortalezas», «tumulto» y «despedazadas» reflejan el campo semántico militar y violento del hebreo sin suavizarlo.
