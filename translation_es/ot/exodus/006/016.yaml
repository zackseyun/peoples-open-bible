translation:
  language: es
  text: 'Estos son los nombres de los hijos de Leví según sus linajes: Gersón, Cohat y Merari. Los años de la vida de Leví fueron ciento treinta y siete años.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora estos son
  lexicon: HALOT
  rationale: La fórmula hebrea introduce de modo deíctico la lista. En español, «Estos son» conserva la fuerza demostrativa y suena natural en un registro formal.
- source_word: שְׁמֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - los nombres de
  - sus nombres
  lexicon: HALOT
  rationale: Mantiene el sustantivo plural explícito del hebreo en un contexto genealógico/listado.
- source_word: בְּנֵי לֵוִי
  english_pob_choice: of Levi’s sons
  chosen_spanish: de los hijos de Leví
  alternatives_spanish:
  - de los hijos varones de Leví
  - de la descendencia de Leví
  lexicon: HALOT
  rationale: La cadena constructa indica filiación. «Hijos» preserva el matiz genealógico masculino mejor que «hijos e hijas» o «descendencia».
- source_word: לְתֹלְדֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - según sus linajes
  lexicon: HALOT
  rationale: «תולדות» aquí señala agrupación por línea de origen/descendencia. «Según sus generaciones» sigue de cerca el hebreo sin forzar una paráfrasis.
- source_word: גֵּרְשׁוֹן
  english_pob_choice: Gershon
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gersón
  - Gershón
  lexicon: Nombre propio hebreo
  rationale: Se adopta la forma castellana habitual con acento prosódico en la última sílaba para reflejar la pronunciación española bíblica estándar.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Cohat
  alternatives_spanish:
  - Quehat
  - Cohath
  lexicon: Nombre propio hebreo
  rationale: Se prefiere una transliteración española más transparente y pronunciable. «Cohat» conserva la raíz consonántica y evita una forma excesivamente anglicada.
- source_word: וּמְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Merarí
  lexicon: Nombre propio hebreo
  rationale: La forma «Merari» ya es inteligible y estable en español bíblico; se mantiene sin forzar adaptación fonética adicional.
- source_word: וּשְׁנֵי חַיֵּי לֵוִי
  english_pob_choice: the years of Levi’s life
  chosen_spanish: los años de la vida de Leví
  alternatives_spanish:
  - la duración de la vida de Leví
  - la vida de Leví en años
  lexicon: HALOT
  rationale: El hebreo expresa una fórmula idiomática literal («los años de la vida de Leví»). Se conserva la estructura semítica en un español comprensible y fiel.
- source_word: שֶׁבַע וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  english_pob_choice: one hundred and thirty-seven years
  chosen_spanish: ciento treinta y siete años
  alternatives_spanish:
  - ciento treinta y siete años
  - 137 años
  lexicon: HALOT
  rationale: La secuencia numérica hebrea se reproduce con el numeral compuesto normal en español; es fiel y natural en registro bíblico formal.
translation_notes:
  revision_awareness: El texto inglés auditado conserva una lectura genealógica directa y una numeración completamente literal; la versión española sigue esa misma línea sin añadir glosas interpretativas ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Leví» con tilde y los nombres propios en formas castellanas habituales o transparentes.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo.
  - Se conserva la estructura de enumeración y el dato cronológico final sin paraphrase.
