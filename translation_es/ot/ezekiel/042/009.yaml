translation:
  language: es
  text: Y debajo de estas cámaras estaba la entrada desde el oriente[a], al entrar en ellas desde el atrio exterior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «desde el oriente»; la frase puede indicar tanto la ubicación oriental de la entrada como el acceso desde el oriente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתַּחְתֶּה
  english_pob_choice: And below
  chosen_spanish: Y debajo
  alternatives_spanish:
  - Y debajo de
  - Y por debajo
  lexicon: HALOT
  rationale: La frase marca relación espacial inmediata con lo descrito antes. «Debajo» comunica con naturalidad el sentido locativo sin añadir detalle arquitectónico que el hebreo no exige.
- source_word: לְשָׁכוֹת הָאֵלֶּה
  english_pob_choice: these chambers
  chosen_spanish: estas cámaras
  alternatives_spanish:
  - estas habitaciones
  - estas salas
  lexicon: HALOT
  rationale: En contexto de templo, לשכות designa espacios arquitectónicos definidos. «Cámaras» conserva mejor el matiz cultual y técnico que «habitaciones» o «salas».
- source_word: הַמָּבוֹא
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - el ingreso
  lexicon: HALOT
  rationale: El sustantivo nombra el punto o lugar de entrada. «Entrada» es la equivalencia directa y más transparente en español.
- source_word: מֵהַקָּדִים
  english_pob_choice: from the east
  chosen_spanish: desde el oriente
  alternatives_spanish:
  - desde el este
  - del oriente
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desde el oriente/este». He mantenido la relación preposicional «desde» porque el texto puede indicar procedencia o aproximación desde esa dirección, no solo ubicación estática.
- source_word: בְּבֹאוֹ לָהֵנָּה
  english_pob_choice: as one enters them
  chosen_spanish: cuando se entraba en ellas
  alternatives_spanish:
  - al entrar en ellas
  - mientras uno entra en ellas
  lexicon: HALOT
  rationale: La construcción infinitiva con sufijo funciona de modo impersonal. «Cuando se entraba» conserva esa generalidad y evita introducir un sujeto masculino no presente en el hebreo.
- source_word: מֵהֶחָצֵר הַחִיצֹנָה
  english_pob_choice: from the outer court
  chosen_spanish: desde el atrio exterior
  alternatives_spanish:
  - desde el patio exterior
  - desde la corte exterior
  lexicon: HALOT
  rationale: «Atrio» es la voz tradicional y clara para el complejo del templo, y «exterior» reproduce la distinción del hebreo frente al espacio interior. «Patio» es posible, pero menos preciso en este contexto técnico.
theological_decisions:
- issue: 'Dirección de la entrada: ubicación vs. procedencia'
  english_pob_reading: from the east
  chosen_spanish_reading: desde el oriente
  alternative_spanish_readings:
  - por el lado oriental
  - en el lado oriental
  rationale: El hebreo admite una lectura espacial de ubicación o de procedencia/approach. La redacción española conserva la ambigüedad con «desde», igual que el POB inglés revisado, sin cerrarla prematuramente a una simple localización lateral.
  doctrine_reference: Ninguna doctrina específica; decisión de exégesis espacial y arquitectónica.
translation_notes:
  revision_awareness: La revisión inglesa cambió «on the east side» por «from the east» para acercarse más al hebreo. La versión española sigue esa revisión y evita una solución estática como «al lado oriental», prefiriendo «desde el oriente», que conserva la ambigüedad del מקור hebreo y el movimiento implícito en בְּבֹאוֹ.
  spanish_consistency_notes:
  - Se mantuvo «cámaras» para לשכות por consistencia con el registro arquitectónico-templario.
  - Se prefirió «oriente» sobre «este» para armonizar con el lenguaje bíblico tradicional sin perder claridad.
  - Se usó «atrio exterior» para reflejar la terminología del complejo del templo y conservar la oposición interior/exterior.
