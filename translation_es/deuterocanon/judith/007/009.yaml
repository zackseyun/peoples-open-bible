translation:
  language: es
  text: Que nuestro señor[a] escuche una palabra[b], para que no haya una brecha en tus fuerzas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» traduce δεσπότης aquí como título de respeto para una autoridad superior; «amo» también sería posible, pero en español suena más posesivo.
    reason: lexical_alternative
  - marker: b
    text: «Palabra» conserva el valor breve de λόγον; también podría entenderse como «asunto» o «mensaje», pero esas opciones amplían el sentido.
    reason: lexical_alternative
  - marker: c
    text: «Tus fuerzas» mantiene el sentido militar de δύναμις; en este contexto también podría traducirse «ejército» o «tropas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκουσάτω
  english_pob_choice: Let ... hear
  chosen_spanish: escuche
  alternatives_spanish:
  - oiga
  - atienda
  lexicon: BDAG
  rationale: 'El imperativo jussivo de tercera persona se vierte de forma natural en español con subjuntivo exhortativo: «que ... escuche». Conserva el tono respetuoso dirigido a una autoridad.'
- source_word: δὴ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - ahora
  - pues
  - ciertamente
  lexicon: BDAG
  rationale: La partícula añade matiz de urgencia o cortesía, pero en español puede quedar absorbida por la construcción exhortativa sin perder el sentido global.
- source_word: λόγον
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - un mensaje
  - una declaración
  lexicon: BDAG
  rationale: «Una palabra» reproduce bien el valor singular y breve de λόγον, como una intervención o petición puntual, sin expandir el contenido más de lo que el griego permite.
- source_word: ὁ δεσπότης ἡμῶν
  english_pob_choice: our lord
  chosen_spanish: nuestro señor
  alternatives_spanish:
  - nuestro amo
  - nuestro maestro
  lexicon: BDAG
  rationale: δεσπότης puede ser «señor» o «amo». En este contexto de deferencia cortesana y militar, «señor» mantiene el registro respetuoso y evita la dureza de «amo», que suena demasiado posesiva en español.
- source_word: ἵνα μὴ γένηται
  english_pob_choice: so that there may not be
  chosen_spanish: para que no haya
  alternatives_spanish:
  - a fin de que no exista
  - para que no suceda
  lexicon: BDAG
  rationale: La cláusula de propósito se traduce con una construcción natural y directa en español. «No haya» refleja bien el matiz prospectivo de γένηται sin añadir interpretación.
- source_word: θραῦσμα
  english_pob_choice: breach
  chosen_spanish: una brecha
  alternatives_spanish:
  - una rotura
  - un quiebre
  - un desastre
  lexicon: LSJ
  rationale: En contexto militar, θραῦσμα expresa una ruptura o fractura dañina. «Brecha» comunica el daño estructural y permite mantener el valor figurado sin exagerarlo con «desastre».
- source_word: ἐν τῇ δυνάμει σου
  english_pob_choice: in your force
  chosen_spanish: en tu fuerza
  alternatives_spanish:
  - en tu ejército
  - en tu poder
  - entre tus fuerzas
  lexicon: BDAG
  rationale: δύναμις puede significar poder o fuerza, y aquí el contexto militar favorece el sentido de tropa/contingente. «Fuerza» conserva la amplitud del término griego y, a la vez, sugiere el cuerpo bajo mando.
translation_notes:
  revision_awareness: La versión inglesa revisó «so that no breach may come about» a «so that there may not be a breach» para acercarse más al griego. La traducción española sigue ese ajuste con «para que no haya», preservando la relación de finalidad y la negación directa, y mantiene «brecha» y «fuerza» como equivalentes principales del griego.
  spanish_consistency_notes:
  - Se mantiene el registro reverente y no litúrgico, coherente con δεσπότης en una petición formal.
  - No se introduce «Cristo», «SEÑOR» mayúsculo ni un sustituto devocional, porque el texto no contiene el Tetragrámaton ni un título cristológico.
  - «Brecha» y «fuerza» conservan la imaginería militar sin añadir especificación de «ejército» en el texto principal.
  - 'Se usa «nuestro» y «tu» como en el griego: el hablante incluye a su grupo en la petición y se dirige a la autoridad en segunda persona singular.'
