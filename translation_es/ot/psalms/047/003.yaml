translation:
  language: es
  text: Porque Yahvé, el Altísimo, es de temer[a], gran Rey sobre toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es impresionante» o «es temible». El hebreo describe a Yahvé como quien inspira reverente temor y sobrecogimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la base o razón del enunciado anterior. En español, 'Porque' conserva bien el sentido causal/explicativo del hebreo sin añadir énfasis excesivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto divino, según la directriz del proyecto. 'Yahvé' refleja el Tetragrámaton sin sustituirlo por un título.
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - el Altísimo
  - Sumo
  - Excelsísimo
  lexicon: HALOT
  rationale: Es un título divino fijo en sentido superlativo. 'Altísimo' funciona naturalmente en español y conserva la idea de suprema elevación.
- source_word: נוֹרָא
  english_pob_choice: is to be feared
  chosen_spanish: es de temer
  alternatives_spanish:
  - es temible
  - es impresionante
  - inspira reverente temor
  lexicon: HALOT
  rationale: La forma española 'es de temer' conserva el valor reverencial y la posible tensión entre temor, sobrecogimiento y adoración. Evita suavizarlo con 'impresionante' o restringirlo solo a terror.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: Traduce directamente el título real y mantiene la imaginería monárquica del salmo.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mighty
  lexicon: HALOT
  rationale: En español, 'gran' antepuesto a 'Rey' suena natural y solemne, conservando la magnitud y majestad del adjetivo hebreo.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - sobre toda la tierra habitada
  - sobre todo el mundo
  lexicon: HALOT
  rationale: '''Tierra'' conserva el alcance universal del contexto de entronización. ''Sobre toda la tierra'' expresa con naturalidad la soberanía global del rey divino.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre personal de Dios en vez de una sustitución por título, de acuerdo con la política del proyecto y la función del Tetragrámaton en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of נוֹרָא in relation to God
  english_pob_reading: is to be feared
  chosen_spanish_reading: es de temer
  alternative_spanish_readings:
  - es temible
  - es impresionante
  - inspira reverente temor
  rationale: La expresión conserva el peso teológico de reverencia y sobrecogimiento ante Dios, sin diluir la fuerza del término ni reducirlo a una mera emoción subjetiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 6'
translation_notes:
  revision_awareness: Coincide con la última revisión del texto fuente en inglés, que no aplicó cambios y recibió verificación de alto acuerdo. La redacción española sigue esa lectura estable, manteniendo el valor reverencial de נוֹרָא y el nombre divino Yahvé sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto para el Tetragrámaton.
  - '''Altísimo'' funciona como título divino y no como adjetivo ordinario.'
  - '''es de temer'' preserva la tensión entre temor reverente y asombro, por lo que se anota una alternativa en nota al pie.'
  - '''toda la tierra'' conserva el alcance universal del hebreo en este contexto de realeza divina.'
