translation:
  language: es
  text: En un arrebato de ira oculté mi rostro de ti por un momento[a], pero con misericordia eterna[b] he tenido compasión de ti, dice Yahvé, tu Redentor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En una ráfaga de ira» o «En un estallido de ira». La expresión hebrea es rara y refuerza la intensidad de la ira.
    reason: lexical_alternative
  - marker: b
    text: O «con amor leal eterno» o «con amor constante». חֶסֶד incluye lealtad de pacto, misericordia y amor firme.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשֶׁצֶף קֶצֶף
  english_pob_choice: in a surge of wrath
  chosen_spanish: en un arrebato de ira
  alternatives_spanish:
  - en una ráfaga de ira
  - en un estallido de ira
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de ira repentina y vehemente. «Arrebato de ira» conserva el matiz de irrupción intensa sin sonar mecánico, y refleja bien la fuerza poética del binomio.
- source_word: הִסְתַּרְתִּי פָנַי
  english_pob_choice: I hid my face
  chosen_spanish: oculté mi rostro
  alternatives_spanish:
  - escondí mi rostro
  - aparté mi rostro
  lexicon: HALOT
  rationale: El modismo hebreo expresa retirar presencia o favor. «Oculté mi rostro» mantiene la imagen directa y es natural en español bíblico contemporáneo.
- source_word: רֶגַע
  english_pob_choice: for a moment
  chosen_spanish: por un momento
  alternatives_spanish:
  - por un instante
  - brevemente
  lexicon: HALOT
  rationale: El sustantivo designa un lapso breve. «Por un momento» comunica con claridad la breve duración y conserva el contraste con lo eterno del segundo hemistiquio.
- source_word: וּבְחֶסֶד עוֹלָם
  english_pob_choice: with everlasting lovingkindness
  chosen_spanish: con amor leal eterno
  alternatives_spanish:
  - con misericordia eterna
  - con amor constante para siempre
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad pactal, misericordia y amor firme. «Amor leal» intenta preservar esa densidad sin reducirlo a una sola noción sentimental; «eterno» rinde עוֹלָם y mantiene el contraste con el momento anterior.
- source_word: רִחַמְתִּיךְ
  english_pob_choice: I have had compassion on you
  chosen_spanish: he tenido compasión de ti
  alternatives_spanish:
  - te he mostrado misericordia
  - te he compadecido
  lexicon: HALOT
  rationale: רִחַם expresa compasión profunda y misericordia. «He tenido compasión de ti» es fiel, transparente y plenamente idiomático en español.
- source_word: גֹּאֲלֵךְ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - el que te redime
  - tu rescatador
  lexicon: HALOT
  rationale: El sustantivo denota al que rescata o reivindica como pariente-redentor, con resonancias de pacto. «Tu Redentor» es el equivalente bíblico más natural en español y preserva la función titular del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», como transliteración del nombre divino, evitando la sustitución por un título.'
theological_decisions:
- issue: Cómo verter חֶסֶד en contraste con la ira momentánea
  english_pob_reading: everlasting lovingkindness
  chosen_spanish_reading: amor leal eterno
  alternative_spanish_readings:
  - misericordia eterna
  - amor constante
  rationale: El verso contrapone una ira breve con una favor duradero. «Amor leal» intenta mantener el peso relacional y de pacto de חֶסֶד sin imponer una formulación teológica ajena al texto; «eterno» preserva el paralelo con el «momento» de la primera línea.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo presenta directamente el nombre propio de Dios. «Yahvé» conserva esa referencia personal y evita la sustitución por una fórmula reverencial que borre el nombre.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del contexto inglés, que ajustó la primera cláusula para conservar la idea de wrath/ira y revirtió una expansión interpretativa excesiva en חֶסֶד. Por eso el español evita paraphrasear más allá del hebreo, pero mantiene la densidad pactal de חֶסֶד con una solución breve y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Redentor» se conserva como término titular y no se sustituye por una perífrasis más larga.
  - El paralelismo breve/largo se mantiene entre «por un momento» y «amor leal eterno».
  - El registro es bíblico contemporáneo y evita arcaísmos innecesarios sin perder solemnidad.
