  source_alignment_summary: El borrador capta bien la duplicación exhortativa de הִתְקוֹשְׁשׁוּ וָקֹשּׁוּ como llamado a reunirse, y mantiene «nación» para הַגּוֹי. Sin embargo, no sigue la decisión principal auditada del POB inglés para לֹא נִכְסָף, que en el texto base se vierte interpretativamente como «shameless», con la opción más literal reservada a nota.
  spanish_quality_summary: «¡Congregaos y reuníos!» suena algo arcaico/peninsular para el objetivo neutral latinoamericano. Una formulación como «Reúnanse, sí, reúnanse» o similar es más natural y conserva mejor la intensificación. Además, si el texto principal adopta la lectura interpretativa, la nota debe preservar las alternativas literales; no debe repetir exactamente la redacción principal.
  glossary_alignment: 'No hay términos de glosario mayor en juego. La principal desalineación es con la decisión léxica auditada del POB: el texto español principal debería reflejar «shameless» de forma natural en español, dejando «no deseada / sin anhelo» en nota. También conviene evitar el voseo plural peninsular («congregaos», «reuníos») para la meta de español neutral latinoamericano.'
  issues:
  - severity: high
    issue: La traducción principal de לֹא נִכְסָף como «no deseada» no sigue la elección textual auditada del POB inglés («shameless»).
    rationale: El encargo pide preservar la racionalidad léxica/documental del audit trail. Dado que el inglés principal tomó una interpretación contextual y relegó la literalidad a nota, el español no debería invertir esa relación sin necesidad fuerte ni adjudicación adicional.
  - severity: medium
    issue: La nota al pie no funciona como alternativa porque repite la misma frase ya puesta en el texto principal.
    rationale: La nota debería conservar las alternativas literales o explicar la dificultad hebrea; repetir «nación no deseada» cuando eso ya está en el cuerpo no añade información útil.
  - severity: medium
    issue: El uso de «congregaos / reuníos» es menos adecuado para español neutral latinoamericano.
    rationale: La guía pide español neutral LATAM y ampliamente legible en iglesia. El imperativo de ustedes («reúnanse») o una construcción equivalente es más natural y menos marcado regionalmente.
