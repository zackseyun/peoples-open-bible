lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Al director musical
  - Para el maestro de canto
  - Para el choirmaster
  lexicon: HALOT
  rationale: En los encabezados de los salmos, la frase funciona como indicación musical/litúrgica. «Director musical» comunica la función sin forzar una interpretación de autoría o dedicación. «Para» conserva el valor direccional de לַ, y evita resolver la ambigüedad mejor que «al» en un encabezado breve.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Un canto contemplativo
  - Una pieza didáctica
  lexicon: HALOT
  rationale: La POB en inglés retiene el hebraísmo «Maskil» por ser un término técnico incierto. En español, conservarlo también preserva la transparencia y evita sobreinterpretar un posible género, instrucción o función contemplativa.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: 'La preposición ל en los títulos de los salmos admite varias relaciones: autoría, asociación o dedicación. «De David» mantiene la ambigüedad con naturalidad en español y no impone una lectura más fuerte que la evidencia.'
theological_decisions:
- issue: Ambigüedad de la superscripción sobre la relación con David
  english_pob_reading: Rendered neutrally as 'of David'
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  - perteneciente a David
  rationale: El hebreo no obliga a entender autoría directa. La traducción española conserva la tensión documental y evita convertir una relación abierta en una afirmación histórica cerrada.
  doctrine_reference: Preservar la tensión textual en vez de resolverla sin base suficiente.
translation_notes:
  revision_awareness: El texto sigue de cerca el encabezado hebreo WLC y el audit trail inglés. No hay cambios aplicados en la revisión más reciente; la redacción española conserva la misma ambigüedad controlada del original y del POB inglés.
  spanish_consistency_notes:
  - Se usa «Maskil» como término técnico transliterado para mantener transparencia con el hebreo.
  - Se prefiere «director musical» como equivalente idiomático de לַמְנַצֵּחַ, sin recurrir a «SEÑOR» ni a una paráfrasis litúrgica más amplia.
  - «de David» conserva la ambigüedad de לְדָוִד sin resolverla a autoría exclusiva.
