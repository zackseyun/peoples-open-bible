translation:
  language: es
  text: Y lo cortará en pedazos, con su cabeza y su grasa[a]; y el sacerdote los dispondrá sobre la leña que está sobre el fuego, que está sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su sebo» o «la grasa alrededor de sus entrañas» para «su grasa». El término hebreo se refiere al tejido graso asociado con el animal sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִתַּח
  english_pob_choice: he shall cut ... into
  chosen_spanish: lo cortará en sus piezas
  alternatives_spanish:
  - lo dividirá
  - lo cortará en trozos
  lexicon: HALOT
  rationale: En contexto sacrificial, נתח describe cortar la víctima en partes. «Cortará en sus piezas» preserva la acción ritual y sigue de cerca la estructura del hebreo sin sonar forzado en español.
- source_word: לִנְתָחָיו
  english_pob_choice: its pieces
  chosen_spanish: en sus piezas
  alternatives_spanish:
  - por sus partes
  - en sus secciones
  lexicon: HALOT
  rationale: El sustantivo derivado indica las porciones resultantes del corte. «Piezas» es natural en español y mantiene el sentido de partes separadas del animal sacrificial.
- source_word: רֹאשׁוֹ
  english_pob_choice: its head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - la cabeza de él
  lexicon: HALOT
  rationale: Término anatómico directo; el posesivo concuerda con el animal ofrecido.
- source_word: פִּדְרוֹ
  english_pob_choice: its fat
  chosen_spanish: su grasa
  alternatives_spanish:
  - su sebo
  - la grasa que rodea sus entrañas
  lexicon: HALOT
  rationale: פִּדְרוֹ designa el tejido graso asociado al animal en la preparación sacrificial. «Grasa» comunica el sentido de forma clara; «sebo» sería más técnico/arcaizante, y la explicación ampliada iría más allá de la evidencia inmediata del verso.
- source_word: וְעָרַךְ
  english_pob_choice: shall arrange
  chosen_spanish: acomodará
  alternatives_spanish:
  - ordenará
  - dispondrá
  lexicon: HALOT
  rationale: En lenguaje cultual, ערך puede significar poner en orden o disponer ritualmente. «Acomodará» mantiene la idea de colocar ordenadamente las partes sobre el altar en un español fluido.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: La forma estándar en español para כהן en la legislación levítica es «sacerdote».
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El pronombre retoma las piezas, la cabeza y la grasa. En español, «las» concuerda naturalmente con la referencia implícita a las partes (femeninas por concordancia con piezas/partes), sin perder el sentido colectivo.
- source_word: עַל הָעֵצִים
  english_pob_choice: on the wood
  chosen_spanish: sobre la leña
  alternatives_spanish:
  - sobre la madera
  - encima de la leña
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, en español «leña» funciona de manera natural como colectivo en este contexto de fuego sacrificial. Preserva la imagen de combustible ya dispuesto para la ofrenda.
- source_word: אֲשֶׁר עַל הָאֵשׁ
  english_pob_choice: that is on the fire
  chosen_spanish: que está sobre el fuego
  alternatives_spanish:
  - que arde sobre el fuego
  - que está en el fuego
  lexicon: HALOT
  rationale: La cláusula relativa describe la leña como situada sobre el fuego. «Que está sobre el fuego» conserva la secuencia espacial del hebreo.
- source_word: אֲשֶׁר עַל הַמִּזְבֵּחַ
  english_pob_choice: which is on the altar
  chosen_spanish: que está sobre el altar
  alternatives_spanish:
  - que está en el altar
  - que arde sobre el altar
  lexicon: HALOT
  rationale: 'La segunda relativa mantiene la superposición espacial: el fuego está sobre el altar. «Sobre el altar» reproduce mejor la imagen hebrea que una formulación más interpretativa.'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el testimonio hebreo y con la auditoría inglesa; no se requieren revisiones textuales. Se preserva la secuencia ritual y la doble cláusula relativa que describe la leña, el fuego y el altar.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כהן en coherencia con el marco levítico.
  - Se usa «Y» inicial para reflejar la continuidad narrativa-legal del hebreo.
  - Se conserva la metáfora espacial «sobre» para עַל en toda la frase.
  - «Leña» se eligió como colectivo natural en español para הָעֵצִים, sin borrar que el hebreo está en plural.
