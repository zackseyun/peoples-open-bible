translation:
  language: es
  text: Entonces harás sonar un cuerno[a] con toque resonante[b] en el mes séptimo, el día diez del mes. En el Día de la Expiación[c] harán sonar el cuerno por toda la tierra de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «shofar»; es decir, un cuerno-trompeta, tradicionalmente entendido a menudo como cuerno de carnero.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo combina «shofar» con «teruá», refiriéndose al sonido fuerte o señal sonora producida por el instrumento.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «Día de la Expiación» es literalmente «día de expiaciones» (plural).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲבַרְתָּ / תַּעֲבִ֥ירוּ
  english_pob_choice: Then you shall sound / you shall sound
  chosen_spanish: harán sonar
  alternatives_spanish:
  - harás sonar
  - deberán hacer resonar
  - harán resonar
  lexicon: HALOT
  rationale: El verbo hiphil de עבר literalmente puede ser ‘hacer pasar’, pero con שׁוֹפָר funciona idiomáticamente como ‘hacer sonar’ o ‘hacer resonar’. En español, ‘harán sonar’ comunica con naturalidad la acción instrumental sin perder el valor causativo.
- source_word: שׁוֹפַר
  english_pob_choice: trumpet
  chosen_spanish: cuerno
  alternatives_spanish:
  - trompeta
  - shofar
  - cuerno de carnero
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento de cuerno, tradicionalmente asociado al carnero. ‘Cuerno’ mantiene la referencia material del instrumento con mayor fidelidad que ‘trompeta’; el matiz tradicional se conserva en la nota.
- source_word: תְּרוּעָה
  english_pob_choice: blast
  chosen_spanish: de toque
  alternatives_spanish:
  - de alarma
  - de clamor
  - de señal sonora
  lexicon: HALOT
  rationale: En esta construcción, תְּרוּעָה califica al instrumento y su función sonora. ‘De toque’ expresa en español el carácter de señal/proclamación sin forzar una paráfrasis más larga.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el mes séptimo
  alternatives_spanish:
  - en el séptimo mes
  lexicon: HALOT
  rationale: La construcción temporal es directa; ‘en el mes séptimo’ suena natural en español bíblico contemporáneo y preserva el orden de referencia del hebreo.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: el día diez del mes
  alternatives_spanish:
  - el décimo día del mes
  - el diez del mes
  lexicon: HALOT
  rationale: El hebreo expresa una fecha del mes de modo idiomático. ‘El día diez del mes’ comunica claramente el valor temporal sin añadir explicación innecesaria.
- source_word: בְּיוֹם הַכִּפֻּרִים
  english_pob_choice: On the Day of Atonement
  chosen_spanish: en el Día de la Expiación
  alternatives_spanish:
  - en el día de las expiaciones
  - en el Día de la Expiación
  lexicon: HALOT
  rationale: ‘כִּפֻּרִים’ es morfológicamente plural, pero el referente cultual establecido en español bíblico es ‘Expiación’. Se evita ‘Atonamiento’ por ser poco natural; la pluralidad hebrea se conserva en la nota como alternativa literal.
- source_word: שׁוֹפָר בְּכָל אַרְצְכֶם
  english_pob_choice: the trumpet throughout all your land
  chosen_spanish: el cuerno por toda su tierra
  alternatives_spanish:
  - el cuerno por toda la tierra de ustedes
  - el cuerno en toda su tierra
  lexicon: HALOT
  rationale: ‘Por toda su tierra’ reproduce el alcance distributivo de בְּכָל אַרְצְכֶם con un español fluido. El pronombre posesivo de tercera persona en el texto se usa de manera impersonal/general equivalente al inglés POB.
theological_decisions:
- issue: Nombre cultual de יוֹם הַכִּפֻּרִים
  english_pob_reading: On the Day of Atonement
  chosen_spanish_reading: En el Día de la Expiación
  alternative_spanish_readings:
  - en el día de las expiaciones
  - en el Día de Atonamiento
  rationale: La opción española debe comunicar el referente litúrgico establecido sin oscurecer la forma plural hebrea. ‘Expiación’ es el término más natural y doctrinalmente neutral en español; la alternativa literal plural queda preservada en nota.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente sin cambios sustanciales: mantiene el paralelismo del hebreo, conserva el carácter instrumental de שׁוֹפָר ותְּרוּעָה, y resuelve la expresión cultual de יוֹם הַכִּפֻּרִים con un equivalente español claro y auditables.'
  spanish_consistency_notes:
  - Se mantiene el término ‘Expiación’ para יוֹם הַכִּפֻּרִים, en coherencia con el uso bíblico y evitando una paráfrasis doctrinalmente cargada.
  - Se evita ‘SEÑOR’ u otros reemplazos convencionales porque el versículo no contiene el tetragrámaton ni una cita de κύριος.
  - ‘Cuerno’ se usa para שׁוֹפָר en lugar de ‘trompeta’ por fidelidad léxica al instrumento hebreo; la nota preserva la posibilidad tradicional de ‘cuerno de carnero’.
