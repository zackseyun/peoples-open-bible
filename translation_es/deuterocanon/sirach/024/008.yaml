translation:
  language: es
  text: 'Entonces el Creador de todo me mandó, y el que me creó fijó mi tienda[a] y dijo: «Habita en Jacob, y recibe tu herencia en Israel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estableció mi morada» / «levantó mi tabernáculo». El griego habla literalmente de fijar o clavar una tienda.
    reason: lexical_alternative
  - marker: b
    text: O «hereda en Israel» o «sé asignada en Israel». El verbo griego lleva la imagen de herencia/lotificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατό
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato a
  lexicon: BDAG
  rationale: ἐντέλλομαι expresa mandato u orden. «Mandó» conserva la fuerza directiva de Dios sin sonar forzado en español; «ordenó» sería posible, pero aquí «mandó» fluye mejor con el tono bíblico y el paralelismo.
- source_word: ὁ κτίστης ἁπάντων
  english_pob_choice: the Creator of all
  chosen_spanish: el Creador de todo
  alternatives_spanish:
  - el Creador de todas las cosas
  - el hacedor de todo
  lexicon: LSJ
  rationale: κτίστης denota creador/hacedor, y ἁπάντων amplía el alcance a todo. «El Creador de todo» mantiene la amplitud universal de manera natural en español.
- source_word: ὁ κτίσας με
  english_pob_choice: the one who created me
  chosen_spanish: el que me creó
  alternatives_spanish:
  - el que me hizo
  - mi Creador
  lexicon: LSJ
  rationale: La forma participial conserva la relación personal con su creador. «El que me creó» reproduce esa relación sin convertirla en un título más abstracto.
- source_word: κατέπηξεν τὴν σκηνήν μου
  english_pob_choice: pitched my tent
  chosen_spanish: plantó mi tienda
  alternatives_spanish:
  - levantó mi tienda
  - puso mi tienda
  - estableció mi tabernáculo
  lexicon: LSJ
  rationale: καταπήγνυμι literalmente es fijar o clavar, especialmente una tienda. «Plantó mi tienda» conserva la imagen concreta del asentamiento y evita una terminología demasiado eclesiástica como «tabernáculo».
- source_word: Ἐν Ἰακὼβ κατασκήνωσον
  english_pob_choice: Dwell in Jacob
  chosen_spanish: Habita en Jacob
  alternatives_spanish:
  - Reside en Jacob
  - Acampa en Jacob
  - Haz tu morada en Jacob
  lexicon: LSJ
  rationale: κατασκηνόω puede significar habitar, morar o acampar. «Habita» es directo y natural en español, y mantiene el imperativo sin desplazar el sentido hacia una formulación más explicativa.
- source_word: κατακληρονομήθητι
  english_pob_choice: receive your inheritance
  chosen_spanish: recibe tu herencia
  alternatives_spanish:
  - recibe tu heredad
  - sé asignada como herencia
  - hereda
  lexicon: LSJ
  rationale: El verbo lleva el campo semántico de herencia/asignación. «Recibe tu herencia» preserva la pasividad de la asignación mejor que un simple «hereda», y suena claro y bíblico en español.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: LSJ
  rationale: La preposición ἐν se vierte de forma directa. Mantener «en Israel» conserva el paralelismo con Jacob e Israel y la estructura poética del versículo.
theological_decisions:
- issue: Sabiduría personificada como hablante en primera persona y relación creador-criatura
  english_pob_reading: 'Retain the personal feminine first-person voice without softening the creator-creature distinction: Wisdom is created by God and commanded to dwell in Israel.'
  chosen_spanish_reading: 'Mantener la voz personal en primera persona sin suavizar la distinción Creador-criatura: la Sabiduría es creada por Dios y recibe la orden de habitar en Israel.'
  alternative_spanish_readings:
  - Volverlo más abstracto para que la Sabiduría suene menos personal
  - Usar lenguaje más cultual como «tabernáculo» para reforzar la resonancia teológica
  rationale: El griego presenta a la Sabiduría como hablante personal, pero creada por el Creador de todo. El español conserva esa tensión sin resolverla con categorías posteriores ni sustituir la imagen concreta de la tienda por una más litúrgica.
  doctrine_reference: Preservar la tensión teológica; registro bíblico claro y moderno.
translation_notes:
  revision_awareness: El texto sigue la última revisión del audit trail que prefirió «Dwell in Jacob»; en español se optó por «Habita en Jacob» como equivalente directo y natural del imperativo κατασκήνωσον, manteniendo la conexión con la imagen de la tienda ya establecida por «plantó mi tienda». También se preservó el sentido de asignación hereditaria de κατακληρονομήθητι con «recibe tu herencia».
  spanish_consistency_notes:
  - Se usa «Creador» para κτίστης y «el que me creó» para el participio, manteniendo el paralelismo.
  - «Tienda» se conserva para σκηνή para no borrar la imagen concreta del texto.
  - «Herencia» se usa de forma consistente para el campo de κληρονομέω/κληρονομία.
  - Se mantiene «Jacob» e «Israel» sin explicar el metónimo dentro del texto, respetando el paralelismo poético.
