translation:
  language: es
  text: Entonces el rey Ezequías y los oficiales dijeron a los levitas que alabaran a Yahvé con las palabras de David y de Asaf el vidente[a]. Y alabaron con júbilo[b], se inclinaron y adoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según las palabras de David y de Asaf el vidente».
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente, «hasta júbilo» o «hasta gozo»; el sentido es que su alabanza estuvo marcada por el regocijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחִזְקִיָּהוּ הַמֶּלֶךְ
  english_pob_choice: Hezekiah the king
  chosen_spanish: el rey Ezequías
  alternatives_spanish:
  - el rey Hizoquías
  - Ezequías el rey
  lexicon: HALOT
  rationale: Se conserva el nombre histórico y el cargo real en un orden natural para el español. 'Rey Ezequías' es posible, pero 'el rey Ezequías' suena más fluido y claro.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los dirigentes
  - los jefes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar líderes o funcionarios. 'Oficiales' refleja bien el contexto administrativo y evita la posible arcaización o ambigüedad de 'príncipes'.
- source_word: לַלוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  lexicon: HALOT
  rationale: Se mantiene el nombre del grupo cultual de forma estándar y comprensible en español.
- source_word: לְהַלֵּל
  english_pob_choice: to praise
  chosen_spanish: que alabaran
  alternatives_spanish:
  - que glorificaran
  - que entonaran alabanzas
  lexicon: HALOT
  rationale: En este contexto litúrgico, הִלֵּל expresa alabar. 'Que alabaran' conserva la fuerza directiva del hebreo y encaja con la construcción española.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, preservando el nombre divino sin ocultarlo.'
- source_word: בְּדִבְרֵי דָוִיד וְאָסָף הַחֹזֶה
  english_pob_choice: with the words of David and of Asaph the seer
  chosen_spanish: con las palabras de David y de Asaf el vidente
  alternatives_spanish:
  - según las palabras de David y de Asaf el vidente
  - con los cantos de David y de Asaf el vidente
  lexicon: HALOT
  rationale: '''Con las palabras de'' sigue de cerca el hebreo דִּבְרֵי sin restringirlo a ''cantos''. ''Vidente'' traduce חֹזֶה con el valor profético tradicional.'
- source_word: וַיְהַלְלוּ
  english_pob_choice: they praised
  chosen_spanish: alabaron
  alternatives_spanish:
  - dieron alabanza
  - cantaron alabanzas
  lexicon: HALOT
  rationale: Se mantiene la repetición verbal con el primer לְהַלֵּל y se evita añadir 'cantaron', que no está exigido por el verbo mismo.
- source_word: עַד לְשִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con júbilo
  alternatives_spanish:
  - con alegría
  - con regocijo
  - hasta el júbilo
  lexicon: HALOT
  rationale: El hebreo es idiomático y difícil de volver literalmente en español. 'Con júbilo' expresa adecuadamente el estado de gozo y mantiene un tono elevado. La nota conserva la alternativa literal.
- source_word: וַיִּקְּדוּ
  english_pob_choice: they bowed down
  chosen_spanish: inclinaron la rodilla
  alternatives_spanish:
  - se inclinaron
  - se postraron
  - se doblaron
  lexicon: HALOT
  rationale: El verbo indica una inclinación reverente del cuerpo. 'Inclinaron la rodilla' comunica esa postura en español sin borrar el matiz físico previo a 'adoraron'.
- source_word: וַיִּשְׁתַּחֲוּוּ
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron en adoración
  - rindieron culto
  lexicon: HALOT
  rationale: El verbo expresa postración/adoración. 'Adoraron' distingue la acción devocional del gesto corporal anterior y sigue bien el paralelismo del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo emplea directamente el Tetragrámaton. En el español del proyecto se prefiere 'Yahvé' como forma principal, manteniendo visible el nombre pactal de Dios en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Distinción entre inclinación física y adoración
  english_pob_reading: they bowed down and worshiped
  chosen_spanish_reading: inclinaron la rodilla y adoraron
  alternative_spanish_readings:
  - se inclinaron y adoraron
  - se postraron y adoraron
  - se postraron en adoración
  rationale: El hebreo usa dos verbos coordinados; la traducción conserva ambos para no fusionar la postura corporal con el acto de adoración. Así se preserva la textura litúrgica del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión del POB inglés, especialmente la decisión de reflejar más de cerca la expresión hebrea en la cláusula final mientras se mantiene naturalidad. También se respetó la decisión auditada de preservar dos verbos coordinados para 'bowed down and worshiped'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se prefirió 'alabar/alabaron' para הלל para mantener consistencia verbal.
  - '''Asaf'' sigue la forma española habitual del nombre propio.'
  - 'La cláusula final conserva dos acciones distintas: postura reverente y adoración.'
  - La nota de pie sobre 'con júbilo' preserva la alternativa literal del hebreo idiomático.
