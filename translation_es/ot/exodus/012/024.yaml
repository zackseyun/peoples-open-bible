review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: mandato de guardar/observar, referencia a «esto», fuerza jurídica de חֹק, continuidad generacional y duración permanente. Sin embargo, «esta cosa» suena poco natural en español bíblico y en este contexto no comunica tan bien הַדָּבָר como una opción más idiomática. Además, la nota b introduce «vuestros niños», que no corresponde bien al hebreo «vuestros hijos/sons».'
  spanish_quality_summary: La frase es mayormente clara, pero «esta cosa» resulta torpe y calcada; «este asunto» conserva la amplitud semántica de דָּבָר con mejor legibilidad. El resto del versículo es natural y digno. También conviene ajustar la nota alternativa para evitar «niños», que estrecha indebidamente el sentido.
  glossary_alignment: No hay términos del glosario mayor que entren en juego aquí. «Guardaréis», «estatuto», «vuestros hijos» y «para siempre» están alineados con la filosofía POB. La preservación de «hijos» en vez de neutralizar a «descendencia» en el texto principal coincide con la decisión teológica documentada.
  issues:
  - severity: medium
    issue: «esta cosa» es una opción demasiado calcada y poco idiomática en español
    rationale: Aunque formalmente posible, en español actual y eclesial suena torpe. הַדָּבָר aquí se refiere a la observancia/instrucción pascual; «este asunto» preserva la amplitud sin estrecharla a mera palabra ni sonar antinatural.
  - severity: medium
    issue: La nota b usa «vuestros niños» como alternativa
    rationale: «Niños» introduce una restricción de edad que el hebreo בָּנֶיךָ no exige. Las alternativas fieles serían «vuestros hijos», «vuestros descendientes» o «vuestra descendencia», según el nivel de explicitación deseado.
  revised_spanish_text: Y guardaréis este asunto como estatuto para vosotros y para vuestros hijos para siempre[a][b].
  revised_footnotes:
  - marker: a
    text: O «esta cosa» o «esta palabra». El término hebreo puede referirse ampliamente a un asunto, cosa o palabra hablada.
    reason: lexical_alternative
  - marker: b
    text: O «para vosotros y para vuestros descendientes» o «para vosotros y para vuestra descendencia». El hebreo dice «vuestros hijos».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «esta cosa» por «este asunto» para un español más natural sin perder la amplitud semántica de הַדָּבָר. Se corrige la nota b eliminando «vuestros niños», que no refleja adecuadamente el hebreo.
