review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: pregunta por el paradero/dirección del amado, mantiene el vocativo superlativo y la finalidad de buscarlo con la mujer. Sin embargo, la nota al pie está anclada en «amado», cuando la alternativa léxica documentada corresponde al segundo verbo פנה («se ha vuelto / se ha apartado»), no a הָלַךְ ni a דּוֹדֵךְ. También conviene suavizar «oh», que suena menos natural en español moderno.'
  spanish_quality_summary: El español es claro y poético, pero «oh la más hermosa...» resulta algo acartonado; un vocativo directo con comas funciona mejor en español eclesial moderno. El resto es natural y fiel. «Se ha vuelto» es aceptable aquí para פנה.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Tu amado» corresponde bien a דּוֹדֵךְ en Cantares; no hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en el lugar equivocado.
    rationale: La nota explica una alternativa semántica de פנה ('se ha apartado' / 'ha cambiado de rumbo'), pero el ancla aparece tras «amado», lo cual induce a pensar que comenta דּוֹדֵךְ o incluso הָלַךְ. Debe anclarse en «se ha vuelto».
  - severity: low
    issue: El uso de «oh» suena poco natural en español moderno neutral.
    rationale: Aunque no es incorrecto, «oh» aquí introduce un tono más forzado que el requerido. «La más hermosa entre las mujeres» en aposición vocativa con comas preserva mejor el sentido y mejora la fluidez.
  revised_spanish_text: ¿Adónde ha ido tu amado, la más hermosa entre las mujeres? ¿Adónde se ha vuelto[a] tu amado, para que lo busquemos contigo?
  revised_footnotes:
  - marker: a
    text: O «se ha apartado». El verbo hebreo también puede sugerir un cambio de dirección, no solo movimiento en general.
    reason: lexical_alternative
