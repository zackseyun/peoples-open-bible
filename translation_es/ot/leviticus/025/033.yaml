translation:
  language: es
  text: Y si uno de los levitas lo redime[a], entonces la venta de la casa en la ciudad de su posesión quedará liberada en el Jubileo; porque las casas de las ciudades de los levitas son su posesión entre los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «saldrá» o «volverá» en el Jubileo; el hebreo dice literalmente «saldrá», refiriéndose a que lo vendido sale de la posesión del comprador y regresa.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel», expresión pactual estándar para el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: And if one of the Levites
  chosen_spanish: Y si uno de los levitas
  alternatives_spanish:
  - Y cualquiera de los levitas
  - Y quienquiera de los levitas
  lexicon: HALOT
  rationale: La construcción introduce un caso legal-condicional. En español, 'Y si uno de los levitas' conserva la fuerza casuística sin volverla torpe.
- source_word: יִגְאַל
  english_pob_choice: redeems
  chosen_spanish: lo redime
  alternatives_spanish:
  - lo rescata
  - lo compra de nuevo
  lexicon: HALOT
  rationale: גאל en este contexto es un acto técnico de rescate/redención de propiedad; 'redime' preserva mejor el valor jurídico-covenantal que 'compra de nuevo'.
- source_word: מִן הַלְוִיִּם
  english_pob_choice: from the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - de entre los levitas
  lexicon: HALOT
  rationale: 'Aquí el hebreo no pide separación de un grupo ajeno sino pertenencia: uno de los levitas. Por eso ''de los levitas'' es natural y fiel.'
- source_word: וְיָצָא
  english_pob_choice: shall be released
  chosen_spanish: será liberada
  alternatives_spanish:
  - saldrá
  - volverá
  lexicon: HALOT
  rationale: Aunque literalmente es 'saldrá', en la ley del jubileo el sentido es que la venta queda sin efecto y la propiedad queda libre; 'será liberada' comunica ese efecto legal sin perder la imagen jurídica.
- source_word: מִמְכַּר
  english_pob_choice: the sale
  chosen_spanish: la venta
  alternatives_spanish:
  - lo vendido
  - la cosa vendida
  lexicon: HALOT
  rationale: El sustantivo puede referirse al acto o al objeto vendido. Aquí 'la venta' mantiene la formulación económica-legal del pasaje, como en el POB inglés.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: la casa
  alternatives_spanish:
  - una casa
  lexicon: HALOT
  rationale: Por contexto inmediato, se trata de una casa específica sometida a la norma; 'la casa' fluye mejor en español que la indefinición repetida.
- source_word: וְעִיר אֲחֻזָּתוֹ
  english_pob_choice: in the city of his possession
  chosen_spanish: en la ciudad de su posesión
  alternatives_spanish:
  - y en la ciudad de su posesión
  - en su ciudad patrimonial
  lexicon: HALOT
  rationale: La sintaxis hebrea es compacta y relaciona la casa con la ciudad de pertenencia. 'En la ciudad de su posesión' refleja ese vínculo sin añadir 'hereditario' que el hebreo aquí no explicita por sí mismo.
- source_word: בַּיֹּבֵל
  english_pob_choice: in the Jubilee
  chosen_spanish: en el Jubileo
  alternatives_spanish:
  - en el año del Jubileo
  - al Jubileo
  lexicon: HALOT
  rationale: '''Jubileo'' funciona como nombre técnico de la institución. Se mantiene la mayúscula por tratarse de un término legal-cultual.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la norma. 'Porque' es natural en español y conserva la relación explicativa.
- source_word: בָתֵּי עָרֵי הַלְוִיִּם
  english_pob_choice: the houses of the cities of the Levites
  chosen_spanish: las casas de las ciudades de los levitas
  alternatives_spanish:
  - las casas en las ciudades de los levitas
  - las casas de las ciudades levíticas
  lexicon: HALOT
  rationale: La cadena constructa se conserva de manera transparente. 'Ciudades de los levitas' mantiene la relación posesiva sin convertirla prematuramente en un adjetivo interpretativo.
- source_word: הִוא אֲחֻזָּתָם
  english_pob_choice: are their possession
  chosen_spanish: son su posesión
  alternatives_spanish:
  - son su propiedad
  - les pertenecen como posesión
  lexicon: HALOT
  rationale: אֲחֻזָּה es un término jurídico de tenencia/posesión territorial. 'Su posesión' preserva ese matiz mejor que 'propiedad'.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel[a]
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión covenantal formal del hebreo. 'Hijos de Israel' sigue la política del proyecto de no neutralizar una fórmula masculina marcada cuando funciona como designación tradicional.
theological_decisions:
- issue: Expresión covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - pueblo de Israel
  - israelitas
  rationale: La forma hebrea es un plural masculino establecido en el lenguaje pactual. Se preserva la fórmula tradicional y formal, evitando una neutralización que borre la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido legal de וְיָצָא en el Jubileo
  english_pob_reading: shall be released
  chosen_spanish_reading: será liberada
  alternative_spanish_readings:
  - saldrá
  - volverá
  rationale: En el contexto del jubileo, el verbo describe el retorno efectivo de la propiedad al estado de libertad/cesación de la venta. 'Será liberada' comunica el efecto legal sin suprimir la imagen de salida del comprador.
  doctrine_reference: Leviticus 25 legal context; Jubilee property release
- issue: Naturaleza de אֲחֻזָּה
  english_pob_reading: possession
  chosen_spanish_reading: posesión
  alternative_spanish_readings:
  - heredad
  - propiedad
  rationale: El término apunta a una tenencia territorial o patrimonial vinculada a la asignación del pueblo. 'Posesión' preserva la amplitud legal sin forzar todavía 'heredad', que podría ser más restrictivo.
  doctrine_reference: Leviticus 25 inheritance/land tenure context
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del POB inglés que corrigió la apertura para reflejar el sentido hebreo: no es ''redime de los levitas'', sino ''si uno de los levitas redime lo vendido''. También se mantuvo la lectura jurídica de ''shall be released'' para וְיָצָא y la nota sobre ''sons of Israel'' como fórmula pactual.'
  spanish_consistency_notes:
  - Se mantuvo 'levitas' y no 'levítico' para conservar la correspondencia nominal con el hebreo.
  - Se usó 'Jubileo' como término técnico con mayúscula, acorde con el uso del proyecto.
  - Se prefirió 'posesión' sobre 'heredad' para no restringir innecesariamente אֲחֻזָּה.
  - La nota de pie a explica la alternativa literal 'saldrá' sin perder la formulación principal más legible.
