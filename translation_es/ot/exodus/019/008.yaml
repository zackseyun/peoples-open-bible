  revision_rationale: Se reemplaza «unido» por «a una» para reflejar con más precisión el adverbio יַחְדָּו y sonar natural en español. Se cambia «llevó de regreso» por «devolvió» para conservar la idea de retorno de וַיָּשֶׁב con mejor fluidez. Se añade la nota léxica alternativa porque el inglés auditado preservó «reported» como opción significativa. También se ajusta la puntuación de la cita a un español más natural.
