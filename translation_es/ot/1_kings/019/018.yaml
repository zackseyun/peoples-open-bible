  to: 'Sin embargo, he dejado para mí en Israel siete mil[a]: todas las rodillas que no se han arrodillado ante Baal[b], y toda boca que no lo ha besado.'
  rationale: Se revisa para restaurar la imagen corporal explícita del hebreo y del POB auditado (‘todas las rodillas’), mejorar la precisión cultual de כָּרְעוּ con ‘se han arrodillado’, y hacer más natural la estructura en español mediante dos puntos. Se conserva la nota léxica sobre ‘he dejado/he reservado’ y la nota cultural sobre besar al ídolo.
