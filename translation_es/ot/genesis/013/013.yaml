    issue: Nota [a] innecesaria en «pecadores»
    rationale: La nota «O “malvados y pecadores”» no preserva una alternativa significativa del original ni del POB inglés; más bien comenta el paralelismo de forma redundante. Las notas deben usarse para alternativas textualmente relevantes, no para explicar una elección ya hecha sin nueva ambigüedad.
  - severity: medium
    issue: Desalineación de marcadores de nota respecto de la única alternativa importante
    rationale: La única nota verdaderamente necesaria aquí es la alternativa de לַיהוָה como «ante/delante de Yahvé». En la versión actual, esa nota aparece como [b], mientras [a] ocupa espacio con una observación prescindible. Conviene dejar una sola nota anclada en «Yahvé» o «contra Yahvé».
