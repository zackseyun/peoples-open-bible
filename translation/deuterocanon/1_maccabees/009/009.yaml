theological_decisions:
- issue: Rendering ψυχὰς in a battle context
  chosen_reading: lives
  alternative_readings:
  - souls
  rationale: The immediate context is tactical survival in battle, not a statement about the immaterial soul. Rendering ψυχή as 'lives' avoids importing theological meaning the text does not require.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and companions
  - kinsmen
  rationale: The Greek is explicitly masculine plural and likely refers to fellow Jews/comrades. Per doctrine, gender-accurate rendering is preferred over neutralization unless context demands otherwise.
  doctrine_reference: Translation philosophy §4
