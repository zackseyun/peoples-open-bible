review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: כָּל + עוֹף טָהוֹר = permiso general para comer aves ritualmente limpias, y תֹּאכֵלוּ se entiende correctamente como permisivo en contexto legal. Sin embargo, la forma verbal española en tercera persona plural («Pueden») no corresponde al destinatario directo de segunda persona plural del hebreo.'
  spanish_quality_summary: 'La frase es natural y clara, pero para español bíblico legible y fiel conviene usar segunda persona plural explícita: «Ustedes pueden comer...» o una formulación más directa. Además, el matiz de nota alternativa del inglés puede preservarse útilmente en español.'
  glossary_alignment: No hay términos del glosario mayor en juego. «Ave limpia» alinea bien con עוֹף טָהוֹר en contexto dietético; «limpia» preserva la categoría ritual. La corrección principal es gramatical, no terminológica.
  issues:
  - severity: medium
    issue: Cambio de persona gramatical en el verbo
    rationale: El hebreo תֹּאכֵלוּ es 2mp ('ustedes/vosotros comerán/pueden comer'), pero «Pueden comer» sin sujeto expreso en español normalmente se interpreta como 3pl ('ellos pueden comer'). Esto debilita la correspondencia con la dirección legal al pueblo.
  - severity: low
    issue: Falta la nota de alternativa formal presente en el audit trail inglés
    rationale: No es obligatoria, pero puede conservarse como nota lexical útil porque «Toda ave limpia ustedes pueden comer» refleja más de cerca el orden/forma del hebreo.
