translation:
  language: es
  text: Porque hasta consideraron a todos los ídolos de las naciones como dioses—cosas que no tienen ni el uso de los ojos para ver, ni narices para inhalar aire[a], ni oídos para oír, ni dedos de manos para palpar, y cuyos pies son inútiles para caminar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aspirar aire»; el griego habla literalmente de narices «para inhalar aire».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογίσαντο
  english_pob_choice: considered
  chosen_spanish: consideraron
  alternatives_spanish:
  - estimaron
  - tuvieron por
  - juzgaron
  lexicon: LSJ
  rationale: El verbo expresa una valoración o consideración mental; «consideraron» conserva ese sentido cognitivo de manera natural en español sin convertirlo en una declaración formal.
- source_word: εἴδωλα
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - imágenes talladas
  - figuras
  lexicon: LSJ
  rationale: En este contexto polémico, «ídolos» recoge tanto el objeto cultual como la crítica religiosa implícita, igual que en la opción inglesa.
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: LSJ
  rationale: «Naciones» sigue de cerca el griego y evita importar el uso técnico neotestamentario de «gentiles».
- source_word: θεούς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: LSJ
  rationale: El texto afirma que fueron tenidos por dioses; «dioses» es directo e idiomático en español.
- source_word: ὀμμάτων χρῆσις εἰς ὅρασιν
  english_pob_choice: the use of eyes for seeing
  chosen_spanish: el uso de los ojos para ver
  alternatives_spanish:
  - la función de los ojos para ver
  - la vista
  lexicon: LSJ
  rationale: La estructura griega es concreta y analítica; «el uso de los ojos para ver» la reproduce de modo claro sin perder la forma del argumento.
- source_word: συνολκὴν ἀέρος
  english_pob_choice: drawing in air
  chosen_spanish: para inhalar aire
  alternatives_spanish:
  - para aspirar aire
  - para respirar
  lexicon: LSJ
  rationale: «Inhalar aire» expresa el movimiento físico de tomar aire y mantiene la imagen del griego; en español suena más natural que una calca literal. Se evita «respirar» por ser más general.
- source_word: δάκτυλοι χειρῶν εἰς ψηλάφησιν
  english_pob_choice: fingers of hands for feeling
  chosen_spanish: dedos de manos para palpar
  alternatives_spanish:
  - dedos de las manos para tocar
  - dedos para sentir
  lexicon: LSJ
  rationale: «Palpar» comunica el valor táctil de ψηλάφησις mejor que un simple «tocar», y «dedos de manos» refleja la relación genitiva del griego sin añadir posesión innecesaria.
- source_word: ἀργοὶ πρὸς ἐπίβασιν
  english_pob_choice: useless for walking
  chosen_spanish: inútiles para caminar
  alternatives_spanish:
  - inactivos para andar
  - incapaces de caminar
  lexicon: LSJ
  rationale: «Inútiles para caminar» transmite la inutilidad funcional y el matiz despectivo del texto; «caminar» es una equivalencia natural de ἐπίβασιν en este contexto.
theological_decisions:
- issue: Mantener la fuerza de la diatriba contra la idolatría sin suavizarla
  english_pob_reading: The verse is translated as a direct denunciation of idols as lifeless objects wrongly regarded as gods.
  chosen_spanish_reading: El versículo denuncia directamente a los ídolos como objetos sin vida a los que erróneamente se tuvo por dioses.
  alternative_spanish_readings:
  - Una formulación más neutra que solo describa la carencia física de los ídolos
  - Una versión más literal que conserve cada miembro corporal con menor fluidez
  rationale: El griego no solo enumera ausencias físicas, sino que sostiene la acusación polémica contra los ídolos. El español mantiene ese golpe retórico sin añadir interpretación doctrinal ajena al texto.
  doctrine_reference: Sabiduría 15:15; criterio POB de preservar la denuncia antiidolátrica
- issue: Tratamiento de la metáfora sensorial y locomotora
  english_pob_reading: The translation keeps the sensory and locomotor contrast explicit without over-paraphrasing.
  chosen_spanish_reading: 'Se conserva la serie de incapacidades: ver, oír, palpar y caminar.'
  alternative_spanish_readings:
  - Reducir la enumeración a una frase general sobre inutilidad
  - Expandir la imagen con explicaciones sobre la falsedad de los ídolos
  rationale: La lista corporal es parte esencial del argumento. Traducirla con claridad preserva tanto la ironía como la precisión del original.
  doctrine_reference: Sabiduría 15:15; poética sapiencial y polémica antiidolátrica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que ajustó la expresión de los dedos para reflejar más de cerca el genitivo griego. Por eso el español usa «dedos de manos» y no una frase posesiva más interpretativa. También se preservó la decisión de mantener «nations» como «naciones» y la alternativa léxica para la imagen de «drawing in air», trasladándola a una nota española sobre inhalar/aspirar aire.
  spanish_consistency_notes:
  - Se mantuvo «ídolos» y no «imágenes» para conservar la crítica cultual.
  - «Naciones» evita introducir un tecnicismo eclesial ajeno al contexto sapiencial judío.
  - «Palpar» y «caminar» conservan la serie sensorial y funcional del griego con español natural.
  - La nota a[b]? no se usa; solo se ancla una nota lexical sobre el aire inhalado.
