review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura acumulativa del hebreo y conserva la acusación corporativa y familiar: «nación pecadora / pueblo / descendencia / hijos». También mantiene correctamente «Yahvé» para יְהוָה y «el Santo de Israel» para el título isaiano fijo. Sin embargo, la cláusula final «se han vuelto hacia atrás» es menos idiomática que el español bíblico-natural y no representa mejor el hebreo que «se han vuelto atrás». Además, falta trasladar al español las alternativas léxicas significativas que el rastro inglés preserva para «pueblo cargado de iniquidad», «hijos que actúan corruptamente», el nombre divino detrás de ‘SEÑOR’, y la cláusula final.'
  spanish_quality_summary: El texto es generalmente claro, digno y legible. «¡Ah!» funciona bien con nota. «Pueblo cargado de iniquidad» y «descendencia de malhechores» son naturales y fieles. El principal ajuste estilístico es reemplazar «se han vuelto hacia atrás» por «se han vuelto atrás», que suena más natural en español sin perder el sentido de retroceso/apostasía. También conviene completar las notas para reflejar el expediente auditado y evitar pérdida de matices preservados por la POB inglesa.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; קְדֹושׁ יִשְׂרָאֵל → «el Santo de Israel» correctamente; עָוֺן → «iniquidad» preservado con peso teológico. No hay conflictos con el glosario central. La única mejora es documentar en nota la equivalencia tradicional «el SEÑOR» como representación del nombre divino, ya que el expediente inglés la preserva.'
  issues:
  - severity: medium
    issue: La cláusula final «se han vuelto hacia atrás» suena poco idiomática.
    rationale: Aunque es comprensible, en español natural y bíblico resulta mejor «se han vuelto atrás», que conserva el retroceso/apostasia del hebreo נָזֹרוּ אָחוֹר sin rigidez innecesaria.
  - severity: medium
    issue: Faltan notas léxicas significativas presentes en el expediente inglés.
    rationale: El inglés conserva alternativas para «cargado de iniquidad», «hijos que actúan corruptamente», la representación tradicional del Tetragrámaton como «el SEÑOR», y la cláusula final. Omitirlas pierde parte del rastro auditado que debe preservarse cuando sigue siendo relevante en español.
