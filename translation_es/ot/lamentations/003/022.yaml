translation:
  language: es
  text: El amor fiel[a] de Yahvé nunca cesa; sus misericordias nunca se agotan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más directamente la vocalización: «Por el amor fiel de Yahvé no somos consumidos», o «El amor fiel de Yahvé —que no somos consumidos—».'
    reason: alternative_reading
lexical_decisions:
- source_word: חַסְדֵי
  english_pob_choice: steadfast love
  chosen_spanish: misericordias
  alternatives_spanish:
  - amor constante
  - amor leal
  - amor firme
  lexicon: HALOT
  rationale: El hebreo חֶסֶד/חַסְדֵי puede abarcar amor leal de pacto, bondad constante y actos de misericordia. En español, 'misericordias' conserva el plural del constructo y permite un paralelismo natural con 'compasiones'. Aunque 'amor constante' o 'amor leal' reflejan bien el matiz de fidelidad, aquí la forma plural favorece una lectura de actos compasivos reiterados.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del tetragrama en forma transliterada, conforme al criterio del proyecto. 'Yahvé' es la forma española establecida para preservar el nombre personal de Dios sin sustituirlo por un título.
- source_word: לֹא תָמְנוּ
  english_pob_choice: never ceases
  chosen_spanish: nunca cesan
  alternatives_spanish:
  - no somos consumidos
  - no llegan a su fin
  - no se agotan
  lexicon: HALOT
  rationale: La POB inglesa privilegia la lectura poética en la que el sujeto implícito son las misericordias/amor leal de Yahvé, no un sujeto explícito de primera persona. En español, 'nunca cesan' comunica de forma natural esa continuidad y mantiene la tensión textual con la alternativa tradicional de 'no somos consumidos', que se preserva en la nota.
- source_word: כִּי
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: El valor causal/explanatorio de כִּי queda integrado en la estructura poética de la línea. En español, repetir 'nunca' en ambos miembros reproduce el paralelismo y la fuerza negativa sin forzar un 'porque' artificial.
- source_word: לֹא כָלוּ
  english_pob_choice: never come to an end
  chosen_spanish: nunca se agotan
  alternatives_spanish:
  - no se terminan
  - no llegan a su fin
  - nunca se acaban
  lexicon: HALOT
  rationale: כָלָה expresa terminarse, agotarse o llegar a su fin. 'Nunca se agotan' es idiomático en español y conserva la imagen de recursos inagotables, además de corresponder bien al paralelismo con 'nunca cesan'.
- source_word: רַחֲמָיו
  english_pob_choice: his mercies
  chosen_spanish: sus compasiones
  alternatives_spanish:
  - sus misericordias
  - su compasión
  - sus entrañas de misericordia
  lexicon: HALOT
  rationale: El plural hebreo sugiere compasiones o actos de misericordia abundantes. 'Compasiones' preserva el plural y evita reducir el término a una abstracción única. 'Misericordias' también es posible, pero se reservó para la primera cola para mantener variedad poética en español.
theological_decisions:
- issue: 'Lectura del primer hemistiquio: sujeto implícito de תָמְנוּ'
  english_pob_reading: The steadfast love of Yahweh never ceases.
  chosen_spanish_reading: Las misericordias de Yahvé nunca cesan.
  alternative_spanish_readings:
  - Porque de las misericordias de Yahvé no somos consumidos.
  - Las misericordias de Yahvé —no somos consumidos—.
  - Las misericordias de Yahvé no se acaban.
  rationale: El hebreo permite la lectura tradicional de primera persona plural ('no somos consumidos'), pero el paralelismo inmediato con el segundo miembro favorece leer las misericordias/compasiones de Yahvé como aquello que no cesa ni se agota. Se conserva la alternativa tradicional en nota porque es textualmente significativa y está bien atestiguada en la tradición de traducción.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y textual; documentar alternativas sin resolverlas artificialmente.'
- issue: Equilibrio poético entre חַסְדֵי y רַחֲמָיו
  english_pob_reading: The steadfast love ...; his mercies ...
  chosen_spanish_reading: Las misericordias ...; sus compasiones ...
  alternative_spanish_readings:
  - El amor leal ...; su compasión ...
  - Las misericordias ...; sus misericordias ...
  rationale: El paralelo hebreo combina dos términos semánticamente próximos pero no idénticos. En español, mantener 'misericordias' y 'compasiones' evita aplastar la distinción y conserva una cadencia poética clara, sin perder el vínculo temático entre חֶסֶד y רַחֲמִים.
  doctrine_reference: 'Translation philosophy §2–§3: preservar distinciones léxicas relevantes y la forma poética del texto fuente.'
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios en la última pasada y que el acuerdo con la revisión previa fue alto (0.95). Se adopta una solución española coherente con la decisión auditada de la POB inglesa y se mantiene la nota alternativa para la lectura tradicional/textualmente sensible del primer miembro.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para el tetragrama.
  - 'Se preserva el paralelismo hebreo con dos miembros negativos y verbos distintos: ''cesan'' / ''se agotan''.'
  - Se evita 'SEÑOR' como sustituto del nombre divino conforme al criterio del proyecto.
  - 'Se mantiene el plural semántico en ambos sustantivos: ''misericordias'' / ''compasiones''.'
