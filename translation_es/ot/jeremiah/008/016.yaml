translation:
  language: es
  text: Desde Dan se oye el resoplar de sus caballos; al sonido del relincho de sus corceles[a], toda la tierra[b] tiembla. Vienen y devoran la tierra y su plenitud[c], la ciudad y los que habitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus caballos fuertes». El hebreo אַבִּירָיו puede destacar la fuerza o nobleza de los animales; en este contexto se refiere a caballos de guerra poderosos.
    reason: lexical_alternative
  - marker: b
    text: O «todo el mundo». El hebreo אֶרֶץ puede significar «tierra» o «mundo»; aquí «tierra» encaja mejor con el contexto inmediato de invasión y devastación.
    reason: lexical_alternative
  - marker: c
    text: O «la tierra y todo lo que hay en ella». El hebreo «su plenitud» se refiere a todo lo que llena la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּן
  english_pob_choice: From Dan
  chosen_spanish: Desde Dan
  alternatives_spanish:
  - De Dan
  - Desde la región de Dan
  lexicon: HALOT
  rationale: El hebreo marca origen con מִן; «Desde Dan» conserva el punto de procedencia y suena natural en español. Mantiene el nombre propio como toponímico sin explicitar más de lo que el texto exige.
- source_word: נִשְׁמַע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es oído
  - se escucha
  lexicon: HALOT
  rationale: La pasiva nifal presenta un reporte sensorial; en español «se oye» comunica esa percepción viva sin sonar forzado. Preserva la inmediatez profética del enunciado.
- source_word: נַחְרַת
  english_pob_choice: the snorting
  chosen_spanish: el resoplar
  alternatives_spanish:
  - el resoplido
  - el bufido
  lexicon: HALOT
  rationale: El término describe el ruido áspero de los caballos. «Resoplar» conserva la imagen sonora y evita una formulación demasiado técnica o demasiado coloquial.
- source_word: סוּסָיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  - sus yeguas y caballos
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se refleja naturalmente con «sus». En español no es necesario explicitar «de él»; «caballos» mantiene el referente equino sin sobreinterpretar el colectivo enemigo.
- source_word: מִקּוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - por el sonido de
  - ante el sonido de
  lexicon: HALOT
  rationale: La construcción introduce la ocasión del temblor. «Al sonido de» es la equivalencia española más natural y conserva el valor causal/ocasionador.
- source_word: מִצְהֲלוֹת
  english_pob_choice: the neighing
  chosen_spanish: el relincho
  alternatives_spanish:
  - el relinchar
  - el relincho de
  lexicon: HALOT
  rationale: El vocablo denota el sonido fuerte de los caballos. «Relincho» es la equivalencia idiomática estándar en español para el sonido equino, preservando la vividez poética.
- source_word: אַבִּירָיו
  english_pob_choice: his stallions
  chosen_spanish: sus corceles
  alternatives_spanish:
  - sus caballos fuertes
  - sus poderosos corceles
  lexicon: HALOT
  rationale: El término puede aludir a fuerza/nobleza en contexto de caballos de guerra. «Corceles» transmite una idea de caballos fuertes y nobles sin imponer una lectura excesivamente literal o meramente zoológica.
- source_word: רָעֲשָׁה כָּל הָאָרֶץ
  english_pob_choice: the whole land quakes
  chosen_spanish: toda la tierra tiembla
  alternatives_spanish:
  - toda la tierra se estremece
  - todo el país tiembla
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el inglés auditable, pero en español «tierra» es plenamente natural para la extensión territorial afectada. «Tiembla» conserva el sacudimiento del hebreo.
- source_word: וַיָּבֹאוּ
  english_pob_choice: They come
  chosen_spanish: Vienen
  alternatives_spanish:
  - Y vienen
  - Entonces vienen
  lexicon: HALOT
  rationale: El waw consecutivo avanza la escena con vividez. En español, el presente histórico «Vienen» reproduce mejor esa inmediatez que un pasado simple.
- source_word: וַיֹּאכְלוּ
  english_pob_choice: and devour
  chosen_spanish: y devoran
  alternatives_spanish:
  - y consumen
  - y se comen
  lexicon: HALOT
  rationale: En contexto de invasión, el verbo es metafórico para arrasar/destruir. «Devoran» conserva la violencia figurada mejor que un simple «comen».
- source_word: אֶרֶץ וּמְלוֹאָהּ
  english_pob_choice: the land and its fullness
  chosen_spanish: la tierra y todo lo que la llena
  alternatives_spanish:
  - la tierra y su plenitud
  - la tierra y todo cuanto hay en ella
  lexicon: HALOT
  rationale: מְלוֹא alude a lo que llena la tierra. «Todo lo que la llena» expone el sentido sin perder la relación posesiva. Se evita un calco opaco como «su plenitud» en el texto principal, aunque la noción queda implícita.
- source_word: עִיר וְיֹשְׁבֵי בָהּ
  english_pob_choice: the city and those who dwell in it
  chosen_spanish: la ciudad y los que habitan en ella
  alternatives_spanish:
  - la ciudad y sus habitantes
  - la ciudad y los moradores en ella
  lexicon: HALOT
  rationale: La construcción participial se expresa de manera natural con «los que habitan en ella», manteniendo la fuerza descriptiva y el registro profético. «Habitantes» sería más compacto, pero menos cercano al movimiento del hebreo.
translation_notes:
  revision_awareness: El texto inglés revisado permanece sin cambios y se tomó como referencia auditada; la versión española sigue la misma lectura global, pero ajusta las equivalencias idiomáticas al español y mantiene las alternativas relevantes donde el hebreo permite más de una opción legítima.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene un registro profético sobrio y directo, sin añadir explicaciones interpretativas al cuerpo del texto.
  - Las alternativas en nota preservan tensiones léxicas reales del hebreo (sonido equino, fuerza/nobleza de los caballos, y alcance de מְלוֹאָהּ).
