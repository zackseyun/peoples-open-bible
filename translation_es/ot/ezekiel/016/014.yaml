translation:
  language: es
  text: Y tu fama se difundió entre las naciones[a] por tu belleza, porque era perfecta por medio de mi esplendor que yo había puesto sobre ti, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu nombre salió entre las naciones»; es decir, se difundió tu reputación o fama.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se difundió
  - se extendió
  - salió a la luz
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de algo que «sale»; en español, «salió» mantiene esa metáfora de difusión de la fama sin volverla demasiado interpretativa.
- source_word: שֵׁם
  english_pob_choice: fame
  chosen_spanish: nombre
  alternatives_spanish:
  - fama
  - reputación
  - renombre
  lexicon: HALOT
  rationale: La traducción literal «nombre» preserva la tensión del hebreo, donde el sentido idiomático es reputación o fama. Se mantiene la imagen original, y la nota explica el valor idiomático.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» reproduce היטב el alcance de גּוֹיִם sin cargarlo con un sentido técnico eclesiástico. «Entre» corresponde naturalmente al valor locativo-relacional del hebreo.
- source_word: בְּיָפְיֵךְ
  english_pob_choice: because of your beauty
  chosen_spanish: por tu belleza
  alternatives_spanish:
  - a causa de tu belleza
  - debido a tu belleza
  - por causa de tu belleza
  lexicon: HALOT
  rationale: El ב causal/instrumental queda bien en español con «por». Conserva la relación causal sin sobrecargar la frase.
- source_word: כָּלִיל
  english_pob_choice: perfect
  chosen_spanish: perfecta
  alternatives_spanish:
  - completa
  - acabada
  - sin defecto
  lexicon: HALOT
  rationale: En este contexto de belleza y adorno, «perfecta» es el equivalente más natural y fiel para la idea de totalidad/perfección.
- source_word: בַּהֲדָרִי
  english_pob_choice: through my splendor
  chosen_spanish: debido a mi esplendor
  alternatives_spanish:
  - por mi esplendor
  - mediante mi esplendor
  - con mi esplendor
  lexicon: HALOT
  rationale: הָדָר puede significar esplendor o majestad. «Debido a mi esplendor» conserva la relación causal/subyacente entre la belleza de Jerusalén y la gloria que Dios le otorgó.
- source_word: שַׂמְתִּי עָלַיִךְ
  english_pob_choice: that I had set upon you
  chosen_spanish: que yo había puesto sobre ti
  alternatives_spanish:
  - que yo había colocado sobre ti
  - que había puesto sobre ti
  - que había depositado sobre ti
  lexicon: HALOT
  rationale: «Puesto sobre ti» reproduce la imagen concreta de algo que se coloca encima; en contexto alude a la belleza/adorno otorgados por Dios.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  - dice el Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con «declara» y se traduce יְהוִה como «Yahvé» conforme al criterio del proyecto. «Señor Yahvé» evita la sustitución por «SEÑOR» y mantiene el valor del nombre divino.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en la fórmula profética final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  - Yahvé
  rationale: La pauta del proyecto exige «Yahvé» para יהוה. En la clausura profética, «Señor Yahvé» preserva la combinación de título y nombre sin enmascarar el Tetragrámaton. Se evitó «SEÑOR» como sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa del POB leyó el hebreo idiomático de שֵׁם como «fame» y explicó la imagen de «your name went out among the nations» con una nota. En español se decidió mantener la literalidad de «nombre» en el texto principal para conservar la metáfora hebrea, añadiendo una nota que explicita el sentido idiomático de reputación/fama. También se ajustó la cláusula final para reflejar el nombre divino como «Yahvé», conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y no arcaizante.
  - «Entre las naciones» se conservó para גּוֹיִם, sin introducir «gentiles».
  - «Perfecta» refleja la idea de כָּלִיל en un contexto de belleza, sin explicitar más de lo que el hebreo dice.
  - La fórmula final conserva el tono oracular con «declara».
