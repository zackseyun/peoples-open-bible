translation:
  language: es
  text: ¿Acaso la lluvia tiene padre[a], o quién ha engendrado las gotas de rocío?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién ha engendrado las gotas de rocío?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֵשׁ
  english_pob_choice: Does ... have
  chosen_spanish: ¿Acaso ... tiene
  alternatives_spanish:
  - ¿Hay ... para
  - ¿Existe ...
  lexicon: HALOT
  rationale: La construcción interrogativa con יֵשׁ expresa una pregunta de existencia/posesión. En español, '¿Acaso ... tiene' conserva el matiz idiomático y la fuerza retórica mejor que un calco como '¿Hay ... para?'.
- source_word: לַמָּטָר
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la lluvia
  - el aguacero
  lexicon: HALOT
  rationale: מָטָר significa 'rain'. 'La lluvia' es la equivalencia natural y clara en español, manteniendo el sustantivo concreto del poema sin sobreinterpretar.
- source_word: אָב
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - progenitor
  - origen
  lexicon: HALOT
  rationale: אָב es 'father'. Se conserva el término de parentesco para mantener la metáfora de engendramiento y el paralelismo poético.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo. 'Quién' es la forma natural y concisa en español.
- source_word: הוֹלִיד
  english_pob_choice: has begotten
  chosen_spanish: ha engendrado
  alternatives_spanish:
  - ha generado
  - ha dado a luz a
  - ha procreado
  lexicon: HALOT
  rationale: El hiphil de ילד tiene fuerza de 'engendrar/ser padre de'. 'Ha engendrado' preserva el sentido formal y la resonancia genealógica mejor que opciones más generales o menos precisas.
- source_word: אֶגְלֵי
  english_pob_choice: the drops
  chosen_spanish: las gotas
  alternatives_spanish:
  - las gotitas
  - las pequeñas gotas
  lexicon: HALOT
  rationale: El sustantivo denota 'drops' y aparece en constructo con 'rocío'. 'Las gotas' es claro, fiel y no sobretraduce el diminutivo.
- source_word: טָל
  english_pob_choice: dew
  chosen_spanish: rocío
  alternatives_spanish:
  - rocío matinal
  - rocío de la mañana
  lexicon: HALOT
  rationale: טָל puede traducirse como 'dew'. 'Rocío' es la equivalencia estándar y natural en español, preservando la imagen poética.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'has fathered' a 'has begotten' para reflejar con más formalidad הוֹלִיד. En español, 'ha engendrado' recoge ese mismo registro y conserva la metáfora de filiación. También se mantuvo la sintaxis interrogativa retórica del hebreo mediante '¿Acaso ...?'.
  spanish_consistency_notes:
  - Se emplea 'lluvia' para מָטָר y 'rocío' para טָל, siguiendo equivalencias léxicas estándar.
  - Se preserva el paralelismo de dos preguntas con tono poético y retórico.
  - La nota alternativa se ancla en la frase final para reflejar la ambigüedad léxica preservada por el audit trail inglés.
