translation:
  language: es
  text: Porque su roca no es como nuestra Roca[a], y nuestros enemigos son jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su roca no es como nuestra roca, y aun nuestros enemigos son jueces». El hebreo פְּלִילִים significa literalmente «jueces/arbitros», lo que da al verso un matiz forense.'
