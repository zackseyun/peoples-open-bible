base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/013.yaml
  text: Just as it is written in the Law of Moses[a], all this calamity has come upon us[c][b], yet we have not sought the favor of Yahweh our God by turning from our iniquities and by gaining insight into your truth.
  footnotes:
  - marker: a
    text: Or 'all this disaster' or 'all this evil.' The Hebrew term can denote calamity or disaster in contexts of judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'we have not entreated the face of the LORD our God.' The expression means to seek his favor or mercy.
    reason: lexical_alternative
  - marker: c
    text: Or 'in your truth' or 'by your truth.' The Hebrew can also carry the sense of 'your faithfulness.'
    reason: lexical_alternative
