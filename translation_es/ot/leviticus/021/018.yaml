base_translation:
  language: en
  yaml_path: translation/ot/leviticus/021/018.yaml
  text: 'For no man who has a defect shall come near: a blind man[a], or a lame man, or one with a disfigured face[d][c][b], or one with a limb too long.'
  footnotes:
  - marker: a
    text: 'Or ''blemish'': the Hebrew term refers to a physical defect that disqualifies from priestly approach in this context.'
    reason: lexical_alternative
  - marker: b
    text: '''Come near'' here refers to approaching for priestly service.'
    reason: cultural_note
  - marker: c
    text: The Hebrew term rendered 'one with a disfigured face' is rare and may refer more specifically to a damaged or malformed nose.
    reason: lexical_alternative
  - marker: d
    text: Or 'one with an extended/deformed limb'; the Hebrew term likely denotes a disproportionate body part.
    reason: lexical_alternative
