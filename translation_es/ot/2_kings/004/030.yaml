  glossary_alignment: 'Alinea correctamente YHWH como «Yahvé». No hay conflicto con terminología principal. El punto sensible es נֶפֶשׁ en fórmula de juramento: aunque el inglés auditado prefirió «your soul lives», en español «vive tu alma» resulta poco idiomático; conviene explicitar en nota la literalidad hebrea y usar «vives tú» en el texto principal para legibilidad y fuerza juramentaria.'
