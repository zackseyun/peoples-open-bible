translation:
  language: es
  text: Los animales salvajes son mejores que ellos[a], porque pueden escapar, ponerse a cubierto y ayudarse a sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las fieras son superiores a ellos, porque pueden huir hacia un refugio y beneficiarse a sí mismas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ θηρία
  english_pob_choice: Wild animals
  chosen_spanish: Los animales salvajes
  alternatives_spanish:
  - Las fieras
  - Los animales
  lexicon: LSJ
  rationale: θῆρια puede significar 'bestias' o 'animales salvajes'. En español, 'animales salvajes' comunica con claridad el contraste irónico del pasaje sin introducir un tono más áspero que el griego no exige necesariamente.
- source_word: κρείττω
  english_pob_choice: are better than
  chosen_spanish: son mejores que
  alternatives_spanish:
  - son superiores a
  - son más fuertes que
  lexicon: LSJ
  rationale: El comparativo expresa superioridad. 'Mejores que' conserva la amplitud pragmática del texto, que no habla de bondad moral sino de una superioridad práctica frente a los ídolos.
- source_word: αὐτῶν
  english_pob_choice: they are
  chosen_spanish: ellos
  alternatives_spanish:
  - de ellos
  - las imágenes
  lexicon: Gramática griega
  rationale: El pronombre remite a los ídolos del contexto inmediato. En español, 'que ellos' reproduce la referencia sin añadir un sustantivo no presente en el versículo, aunque el contexto lo suministra.
- source_word: ἃ δύνανται
  english_pob_choice: because they can
  chosen_spanish: porque pueden
  alternatives_spanish:
  - puesto que pueden
  - ya que pueden
  lexicon: LSJ
  rationale: La cláusula relativa explica la comparación. 'Porque pueden' expresa con naturalidad en español la fuerza causal del griego.
- source_word: ἐκφυγόντα
  english_pob_choice: escape
  chosen_spanish: escapar
  alternatives_spanish:
  - huir
  - salir huyendo
  lexicon: LSJ
  rationale: El participio de ἐκφεύγω comunica la capacidad de salir de peligro. 'Escapar' es el equivalente más natural y fiel en este contexto.
- source_word: εἰς σκέπην
  english_pob_choice: into shelter
  chosen_spanish: a un refugio
  alternatives_spanish:
  - hacia un refugio
  - bajo un refugio
  lexicon: LSJ
  rationale: σκέπη es 'cobertura' o 'refugio'. 'A un refugio' conserva el movimiento implícito en εἰς y suena idiomático en español.
- source_word: αὐτὰ ὠφελῆσαι
  english_pob_choice: help themselves
  chosen_spanish: valerse por sí mismos
  alternatives_spanish:
  - ayudarse a sí mismos
  - beneficiarse a sí mismos
  lexicon: LSJ
  rationale: El valor reflexivo indica autopreservación o provecho propio. 'Valerse por sí mismos' mantiene esa idea con naturalidad, sin reducirla a mero 'ayudarse', que en español suena más estrecho.
theological_decisions:
- issue: Referencia implícita de la comparación
  english_pob_reading: The comparison is with the idols discussed in context, rendered as 'they are' rather than a bare 'them.'
  chosen_spanish_reading: La comparación es con los ídolos del contexto, expresada como 'ellos' en vez de un 'a ellos' más abrupto.
  alternative_spanish_readings:
  - son mejores que ellos
  - son mejores que las imágenes
  rationale: El versículo continúa la sátira contra los ídolos. El español puede mantener la referencia implícita sin sobreexplicarla, aunque el contexto deja claro de quién se habla.
  doctrine_reference: Contexto satírico anti-idolátrico del Libro de Jeremías
- issue: Sentido práctico de la superioridad
  english_pob_reading: The comparative indicates practical superiority, not moral excellence; 'better than' is natural and sufficiently broad.
  chosen_spanish_reading: '''Mejores que'' se entiende como superioridad práctica, no moral.'
  alternative_spanish_readings:
  - más fuertes que
  - más útiles que
  rationale: El griego κρείττω no obliga a una noción moral. En este contexto, la superioridad se entiende por la capacidad de escapar y procurarse refugio.
  doctrine_reference: Valor contextual del comparativo griego
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alto acuerdo; no hubo revisiones aplicadas en la pasada más reciente. La redacción española sigue la misma decisión interpretativa principal: priorizar una equivalencia óptima, clara y auditable, con el referente implícito resuelto por el contexto.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otros términos de convención que no pertenecen al versículo.
  - '''Animales salvajes'' mantiene el valor de θηρία sin endurecerlo innecesariamente a ''bestias'' en el texto principal.'
  - '''Valerse por sí mismos'' conserva el matiz reflexivo de beneficio propio sin sonar demasiado coloquial.'
