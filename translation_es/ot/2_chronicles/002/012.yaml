translation:
  language: es
  text: Y ahora he enviado un hombre sabio y entendido, Huram-abi[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Huram-abi. El término final literalmente significa «mi padre», pero aquí probablemente funciona como honorífico o como parte de la designación del artesano; compárese también «Huram su padre» en 2 Crónicas 4:16.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción y el adverbio temporal introducen la siguiente acción; «Y ahora» conserva mejor el flujo discursivo que un simple «Ahora».
- source_word: שָׁלַחְתִּי
  english_pob_choice: I have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envío
  - envié
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia inmediata en el contexto; en español, el pretérito perfecto compuesto transmite bien ese valor.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y se refiere a un individuo concreto; «hombre» preserva esa precisión.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - hábil
  - diestro
  lexicon: HALOT
  rationale: El adjetivo básico corresponde a «sabio», y el contexto artesanal queda aclarado por el participio siguiente.
- source_word: יוֹדֵעַ בִּינָה
  english_pob_choice: skilled in understanding
  chosen_spanish: experto en entendimiento
  alternatives_spanish:
  - con entendimiento
  - versado en discernimiento
  - hábil en entendimiento
  lexicon: HALOT
  rationale: La secuencia participio + sustantivo literalmente expresa la capacidad de conocer/poseer entendimiento. «Experto en entendimiento» mantiene la dimensión cognitiva y la competencia práctica sin sonar demasiado literal en español.
- source_word: לְחוּרָם אָבִי
  english_pob_choice: Huram-abi
  chosen_spanish: Huram-abi
  alternatives_spanish:
  - Huram mi padre
  - Huram, mi maestro artesano
  - Huram, mi padre
  lexicon: HALOT
  rationale: La expresión es ambigua y probablemente funciona como designación/título del artesano, no como referencia familiar literal. La transliteración conserva la tensión y evita resolverla indebidamente en el texto principal.
theological_decisions:
- issue: Sentido de אָבִי en לְחוּרָם אָבִי
  english_pob_reading: Treat as part of the artisan's designation/name, rendered 'Huram-abi'
  chosen_spanish_reading: Tratarlo como parte de la designación o nombre del artesano, «Huram-abi»
  alternative_spanish_readings:
  - «Huram mi padre»
  - «Huram, mi maestro artesano»
  rationale: «Padre» puede usarse honoríficamente para un maestro o consejero, no solo en sentido biológico. En este pasaje, la transliteración preserva mejor la ambigüedad que imponer una relación concreta en el texto principal.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue el mismo juicio de la versión inglesa POB: el pasaje no requiere cambios respecto al último control, y la decisión sobre Huram-abi permanece estable. Se mantiene la ambigüedad del término final mediante transliteración y nota explicativa.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, aunque en este versículo no aparece el Tetragrámaton.
  - «Sabio» y «experto en entendimiento» reflejan la distinción entre cualidad general y competencia aplicada.
  - La transliteración «Huram-abi» evita una resolución interpretativa prematura y mantiene coherencia con el tratamiento inglés de la designación.
