translation:
  language: es
  text: La longitud de cada marco[a] será de diez codos, y el ancho de cada marco será de codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «tabla» en lugar de «marco» para el hebreo קֶרֶשׁ.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶשֶׂר אַמּוֹת
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez cubitos
  lexicon: HALOT
  rationale: Conservo la unidad antigua de medida con el equivalente español habitual «codos», manteniendo la precisión numérica sin modernizar la medida.
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  lexicon: HALOT
  rationale: «Longitud» reproduce con claridad el sustantivo dimensional en un contexto de instrucciones de construcción.
- source_word: הַקָּרֶשׁ
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - tabla
  - tablón
  - panel
  lexicon: HALOT
  rationale: En español, «marco» comunica mejor que «tabla» la función estructural del elemento en el tabernáculo, siguiendo la decisión inglesa de evitar una equivalencia demasiado tradicional o demasiado materialista.
- source_word: וְאַמָּה וַחֲצִי הָאַמָּה
  english_pob_choice: one and a half cubits
  chosen_spanish: codo y medio
  alternatives_spanish:
  - un codo y medio
  - uno y medio codos
  lexicon: HALOT
  rationale: La forma «codo y medio» es natural en español y preserva exactamente el valor de la medida; el singular concuerda con el hebreo distributivo en este tipo de especificación.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  lexicon: HALOT
  rationale: «Ancho» es la expresión más clara y natural en español contemporáneo para la dimensión horizontal del objeto.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  english_pob_choice: each frame
  chosen_spanish: cada marco
  alternatives_spanish:
  - el marco individual
  - el único marco
  lexicon: HALOT
  rationale: La construcción distributiva «cada marco» expresa con naturalidad el singular hebreo con valor colectivo/distributivo, sin añadir información.
translation_notes:
  revision_awareness: El texto inglés auditado opta por «frame» para קֶרֶשׁ y mantiene la medida antigua sin convertirla; la versión española sigue esa línea, pero usa «marco» como solución idiomática equivalente. No hay revisiones posteriores que alteren el sentido del versículo.
  spanish_consistency_notes:
  - Se mantiene «codos» como unidad de medida en vez de convertir a unidades modernas, en continuidad con el enfoque de precisión del POB.
  - Se evita «SEÑOR» y no hay términos divinos o cristológicos en este versículo.
  - La nota al pie conserva la alternativa tradicional documentada para קֶרֶשׁ, ahora en español.
  - La estructura de medida se ha formulado con orden natural en español, sin perder correspondencia con el hebreo.
