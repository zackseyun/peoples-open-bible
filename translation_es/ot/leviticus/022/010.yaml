revisions:
- from: Ningún extranjero[a] puede comer la cosa santa[b]; un residente de un sacerdote[c] o un jornalero no puede comer la cosa santa.
  to: Ningún ajeno[a] puede comer lo santo[b]; un residente junto a un sacerdote[c] o un jornalero no puede comer lo santo.
  rationale: Se reemplazó «extranjero» por «ajeno» para reflejar mejor la exclusión cultual de זָר; «la cosa santa» por «lo santo» para un español natural y fiel al singular hebreo con nota explicativa sobre el alimento sagrado; y «residente de un sacerdote» por «residente junto a un sacerdote» para conservar el sentido de adscripción doméstica con mejor fluidez. También se limpió la nota c para que quede enteramente en español.
