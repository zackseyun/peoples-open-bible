translation:
  language: es
  text: El que, de entre los hijos de Aarón, presenta la sangre de los sacrificios de paz[a] y la grasa, a él le corresponderá el muslo derecho como su porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sacrificios de comunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּקְרִיב
  english_pob_choice: the one ... who presents
  chosen_spanish: El que presenta
  alternatives_spanish:
  - El que ofrece
  - El que trae
  lexicon: HALOT
  rationale: El participio hebreo expresa al que realiza la acción ritual de acercar/presentar la ofrenda. En español, 'presenta' conserva el sentido cultual con buena naturalidad y mantiene el valor participial con 'El que'.
- source_word: דַּם
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  lexicon: HALOT
  rationale: Traducción literal y adecuada al contexto sacrificial. No se añade 'derramada' porque el hebreo solo menciona la sangre como objeto de la presentación.
- source_word: הַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de paz
  - los sacrificios de comunión
  lexicon: HALOT
  rationale: Se conserva el término sacrificial tradicional en español bíblico, pero con una formulación transparente. 'Sacrificios de paz' refleja el valor lexical de שְׁלָמִים sin reemplazarlo por una paráfrasis más interpretativa.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la porción grasa
  lexicon: HALOT
  rationale: En el contexto de distribución sacrificial, 'grasa' es el equivalente más claro y natural en español moderno. 'Sebo' puede sonar más técnico o menos transparente para lectores generales.
- source_word: מִבְּנֵי אַהֲרֹן
  english_pob_choice: from among the sons of Aaron
  chosen_spanish: de entre los hijos de Aarón
  alternatives_spanish:
  - entre los hijos de Aarón
  - de los hijos de Aarón
  lexicon: HALOT
  rationale: '''De entre'' expresa la selección dentro del grupo sacerdotal y conserva el matiz distributivo del hebreo. ''Hijos de Aarón'' mantiene la expresión concreta del texto original.'
- source_word: ל֧וֹ תִהְיֶ֛ה
  english_pob_choice: to him ... shall belong
  chosen_spanish: a él le corresponderá
  alternatives_spanish:
  - será suyo
  - le pertenecerá
  lexicon: HALOT
  rationale: La construcción comunica asignación legal de una porción. 'Le corresponderá' es natural en español y expresa mejor el reparto ritual que una posesión meramente estática.
- source_word: שׁ֥וֹק הַיָּמִ֖ין
  english_pob_choice: the right thigh
  chosen_spanish: la pierna derecha
  alternatives_spanish:
  - el muslo derecho
  - la pata derecha
  lexicon: HALOT
  rationale: Aunque שׁוֹק puede referir al miembro posterior/parte inferior de la pierna, en la distribución sacrificial el equivalente más accesible y digno en español es 'pierna derecha'. Se evita 'muslo' por posible estrechez semántica y 'pata' por registro menos elevado.
- source_word: לְמָנָה
  english_pob_choice: as his portion
  chosen_spanish: como su porción
  alternatives_spanish:
  - como su parte
  - como su asignación
  lexicon: HALOT
  rationale: '''Porción'' reproduce bien la idea de un reparto asignado y suena natural en contexto legal-cultual. Conserva además la relación con el lenguaje de herencia/distribución.'
theological_decisions:
- issue: Identificación de los destinatarios sacerdotales con lenguaje masculino concreto
  english_pob_reading: sons of Aaron
  chosen_spanish_reading: hijos de Aarón
  alternative_spanish_readings:
  - descendientes de Aarón
  - familia de Aarón
  rationale: El hebreo usa plural masculino concreto para el grupo sacerdotal. Se mantiene la referencia masculina explícita en lugar de neutralizarla, conforme al valor gramatical del texto y al uso auditado en la POB inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nombre del sacrificio שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de comunión
  rationale: La elección preserva la categoría sacrificial reconocible sin forzar una equivalencia doctrinal adicional. 'Paz' mantiene el vínculo con la tradición léxica, mientras que 'comunión' sería más interpretativo.
  doctrine_reference: 'Lexical policy: sacrificial terminology'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el audit trail inglés, incluyendo la revisión reciente que consolida la construcción 'among the sons of Aaron' como una selección interna al grupo sacerdotal. Se mantuvo esa selección en español con 'de entre los hijos de Aarón'.
  spanish_consistency_notes:
  - Se usa 'Aarón' con acento conforme al español.
  - Se evita 'SEÑOR' porque aquí no aparece el tetragrámaton ni una sustitución de κύριος.
  - Se conserva el registro sacrificial con vocabulario claro y formal, sin arcaísmos innecesarios.
  - La nota al pie marca solo la alternativa léxica preservada por la POB inglesa.
