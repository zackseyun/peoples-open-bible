  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión «entronizado» sigue correctamente el razonamiento auditado de הַיֹּשְׁבִי. «En los cielos» preserva bien el plural hebreo. La revisión recomendada se limita al título de colección y a la ubicación/precisión de notas.
