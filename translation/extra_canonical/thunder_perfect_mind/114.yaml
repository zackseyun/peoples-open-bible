translation:
  text: '… with those who were sent[a];

    I am the one cast out;

    among the dead — but I am the one who exists alone[g][f][e][d][c][b], and the
    everlasting.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening “… with those who have not known [—]” is provisional. The OCR
      may conflate the verb “to know” (ⲥⲟⲟⲩⲛ) with the noun “mind” (Greek nous), and
      the object pronoun is unreadable; it could be “me,” “you (pl.),” or “us.”
    reason: alignment_note
  - marker: b
    text: '“Cast out” renders ⲧⲱⲱⲛ ⲉⲃⲟⲗ; alternatives: “driven out,” “expelled.”'
    reason: lexical_alternative
  - marker: c
    text: '“Alone” translates ⲟⲩⲁⲁⲧ; alternatives: “solitary,” “unique.”'
    reason: lexical_alternative
  - marker: d
    text: ⲙⲛⲧⲁⲓ likely continues to ⲙⲛⲧⲁⲓⲱⲛ (“eternal, age(-long)”). I rendered “the
      everlasting”; “the eternal” is also possible.
    reason: textual_variant
  - marker: e
    text: 'Paradox is intentional: presence “in those who die” contrasted with self-existence
      “alone” and “everlasting.” This tension is a hallmark of Thunder’s voice and
      is retained rather than harmonized.'
    reason: parallelism_note
  - marker: f
    text: Or '… with those who have not known [—];'.
    reason: previous_rendering
  - marker: g
    text: Or 'in those who die'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϩⲛ
  chosen: in
  alternatives:
  - among
  - within
  lexicon: Crum; Layton, Coptic Grammar
  rationale: Basic locative/comitative preposition; here marks presence “in/among”
    the class that follows.
- source_word: ⲛⲉⲧⲙⲟⲟⲩⲧ
  chosen: those who die
  alternatives:
  - the dying
  - the dead
  lexicon: Crum s.v. ⲙⲟⲟⲩⲧ
  rationale: Relative plural ⲛⲉⲧ- + verb ‘die’; “those who die/the dying.” I chose
    “those who die” to keep the verbal feel.
- source_word: ⲧⲱⲱⲛ ⲉⲃⲟⲗ (as read in ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ)
  chosen: cast out
  alternatives:
  - driven out
  - expelled
  lexicon: Crum s.v. ⲧⲱⲱⲛ; Horner, Coptic NT usage for ⲧⲱⲱⲛ ⲉⲃⲟⲗ
  rationale: The idiom ⲧⲱⲱⲛ ⲉⲃⲟⲗ commonly means “drive/cast out.” “Cast out” preserves
    the terse, oracular cadence.
- source_word: ⲡⲉⲧ ϣⲟⲟⲡ
  chosen: the one who exists
  alternatives:
  - the one who is present
  - the one who is
  lexicon: Crum s.v. ϣⲟⲟⲡ
  rationale: ϣⲟⲟⲡ is ‘to be (present), exist.’ In Thunder, the formula “I am the one
    who …” is standard; “exists” keeps the ontic nuance.
- source_word: ⲟⲩⲁⲁⲧ
  chosen: alone
  alternatives:
  - solitary
  - unique
  lexicon: Crum s.v. ⲟⲩⲁⲁⲧ
  rationale: Denotes singleness/uniqueness. “Alone” pairs well with the existential
    verb and preserves starkness.
- source_word: ⲙⲛⲧⲁⲓ(ⲱⲛ)
  chosen: the everlasting
  alternatives:
  - the eternal
  - everlasting one
  lexicon: Crum s.v. ⲙⲛⲧ- + Greek ⲁⲓⲱⲛ (aiōn)
  rationale: Form likely continues to ⲙⲛⲧⲁⲓⲱⲛ ‘eternity/aeon.’ Rendering as “the everlasting”
    keeps nominal force and cadence.
- source_word: ⲙⲛ̄
  chosen: with
  alternatives:
  - together with
  lexicon: Crum s.v. ⲙⲛ̄
  rationale: Comitative sense fits the phrase introducing the group referenced in
    the first hemistich.
parallelism_check: 'The block preserves balanced antithesis: presence “in those who
  die” set against the self-declaration “I am the one who exists alone, and the everlasting.”
  The repeated “I am the one …” formula is maintained to echo the poem’s cadence.
  The middle colon “I am the one cast out” continues the pattern of self-identifications
  that juxtapose abasement and exaltation.'
voice_check: Maintains the first-person revelatory voice with emphatic “I am the one
  …” formulas. The tone remains oracular and paradox-embracing, not explanatory or
  smoothed.
alignment_risk_note: 'Overall alignment confidence is low for this page. The initial
  clause “ⲗⲟⲥ ⲙⲛ̄ ⲛⲉⲛⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ” is especially uncertain: ⲗⲟⲥ may be garbled, and
  ⲛⲧⲁⲩⲧⲛ̄ⲛⲟⲟⲩ could be a damaged negative-perfect construction for “(those) who have
  not known …” or could involve the noun “mind” (Greek nous). Second line likely contains
  ⲧⲱⲱⲛ ⲉⲃⲟⲗ (“cast out”), but the preceding ⲡⲓⲛⲁ may be a misread of ⲡⲉⲧⲛⲁ- (“the
  one who will …”) or similar. The last line appears truncated; ⲙⲛⲧⲁⲓ is probably
  the start of ⲙⲛⲧⲁⲓⲱⲛ (“eternal/aeon”). I have rendered what can be reasonably read
  and marked the unknown referent with [—].'
