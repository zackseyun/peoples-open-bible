translation:
  language: es
  text: Entonces Moisés contó a cada primogénito entre los hijos de Israel[a], tal como Yahvé le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; alternativamente, «los israelitas» o «los descendientes de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  english_pob_choice: counted
  chosen_spanish: contó
  alternatives_spanish:
  - hizo un censo de
  - registró
  - numeró
  lexicon: HALOT
  rationale: En este contexto de enumeración censal, el verbo expresa el acto de contar o registrar personas. «Contó» es natural en español y conserva la idea de una contabilización ordenada sin cargar el texto con perífrasis innecesarias.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  - según
  lexicon: HALOT
  rationale: La expresión introduce conformidad exacta con el mandato divino. «Tal como» comunica bien esa correspondencia en español actual y mantiene la relación de ajuste entre acción y mandato.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  - mandó
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto refleja que la orden antecede a la acción de Moisés. «Mandado» conserva el tono bíblico directo y corresponde con el campo semántico de צוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto. Se evita sustituirlo por un título y se mantiene la referencia personal al nombre revelado.
- source_word: אֶת כָּל בְּכֹר
  english_pob_choice: every firstborn
  chosen_spanish: a todo primogénito
  alternatives_spanish:
  - a cada primogénito
  - a todo el primogénito
  - a todos los primogénitos
  lexicon: HALOT
  rationale: La construcción hebrea expresa el conjunto de los primogénitos de manera distributiva. «A todo primogénito» conserva ese valor colectivo-distributivo en un español natural, sin añadir «varón» porque no aparece explícitamente en este versículo.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión del hebreo con un valor locativo/distributivo introducido por ב. «Hijos de Israel» respeta la forma del original y mantiene la decisión de precisión de género del texto fuente.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente יְהוָה. La traducción española conserva el nombre propio divino en lugar de reemplazarlo por un título, siguiendo la doctrina del proyecto sobre la representación de YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión genealógica masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel
  - descendientes de Israel
  rationale: Se mantiene la forma masculina del hebreo en vez de neutralizarla. Aunque «israelitas» sería más idiomático en algunos contextos, aquí el paralelismo con el hebreo y la precisión formal favorecen «hijos de Israel».
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El contexto inglés no presenta cambios revisionales en esta línea; la versión española sigue de cerca la lectura auditada y conserva las mismas decisiones clave sobre el nombre divino, el valor distributivo de «every firstborn» y la expresión masculina «sons of Israel».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה.
  - Se conserva la estructura narrativa simple con pretérito e imperfecto compuesto natural en español.
  - No se suaviza «hijos de Israel» a una forma neutral, en coherencia con el hebreo y la política de precisión de género del proyecto.
  - La nota al pie se ancla en «hijos de Israel» para reflejar la alternativa lexical documentada en el aparato inglés.
