translation:
  language: es
  text: 'Si un hombre consagra a Yahvé parte del campo de su posesión[a], entonces tu tasación será según la semilla que requiera: cincuenta siclos de plata por la semilla de un homer de cebada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «parte del campo de su herencia». La expresión hebrea se refiere a tierra poseída como heredad, y el prefijo hebreo con sentido de «de/desde» sugiere que solo una parte del campo es consagrada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְּׂדֵה אֲחֻזָּתוֹ
  english_pob_choice: part of the field of his possession
  chosen_spanish: parte del campo de su posesión
  alternatives_spanish:
  - parte del campo de su herencia
  - algo del campo de su propiedad
  lexicon: HALOT
  rationale: 'El prefijo מִן en מִשְּׂדֵה indica procedencia parcial: no todo el campo, sino una parte. אֲחֻזָּה refiere a una posesión territorial estable, a menudo hereditaria. «Posesión» conserva el matiz jurídico de tenencia de tierra sin forzar una paráfrasis más larga.'
- source_word: יַקְדִּישׁ
  english_pob_choice: consecrates
  chosen_spanish: consagra
  alternatives_spanish:
  - santifica
  - dedica
  lexicon: HALOT
  rationale: En Levítico 27 el verbo se usa para apartar algo para Yahvé dentro de un contexto de valoración cultual. «Consagra» mantiene ese sentido religioso y evita la ambigüedad de «dedica».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino con valor representativo en una ley. «Un hombre» refleja con precisión la forma del original y su uso genérico legal.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el estándar del proyecto. En español, la preposición natural aquí es «a» con verbos de consagración/apartar para Dios.
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valuación
  alternatives_spanish:
  - tu evaluación
  - tu tasación
  lexicon: HALOT
  rationale: El término en Levítico 27 designa la valoración sacerdotal o tasación ritual. «Valuación» reproduce el valor técnico del pasaje y evita términos demasiado generales como «evaluación».
- source_word: לְפִי זַרְע֑וֹ
  english_pob_choice: according to its seed requirement
  chosen_spanish: conforme a su cantidad de semilla
  alternatives_spanish:
  - según la semilla necesaria
  - de acuerdo con la siembra que requiere
  lexicon: HALOT
  rationale: La frase no alude a descendencia sino a la cantidad de semilla necesaria para sembrar el campo. «Cantidad de semilla» hace explícita la medida agraria sin añadir interpretación innecesaria.
- source_word: זֶרַע חֹמֶר שְׂעֹרִים
  english_pob_choice: the seed of a homer of barley
  chosen_spanish: la semilla de un homer de cebada
  alternatives_spanish:
  - la siembra de un homer de cebada
  - semilla para un homer de cebada
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea y la unidad de medida. «Homer» se deja transliterado porque es una medida antigua específica; «cebada» aclara el cultivo de referencia.
- source_word: בַּחֲמִשִּׁים שֶׁקֶל כָּסֶף
  english_pob_choice: fifty shekels of silver
  chosen_spanish: cincuenta siclos de plata
  alternatives_spanish:
  - a cincuenta siclos de plata
  lexicon: HALOT
  rationale: «Siclos» es la forma española usual para la moneda/peso antiguo. «De plata» refleja כָּסֶף como metal monetario y mantiene la equivalencia funcional del precio tasado.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrama. El español del proyecto adopta «Yahvé» como forma principal, preservando el nombre pactal sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valoración sacerdotal en Levítico 27
  english_pob_reading: your valuation shall be according to its seed requirement
  chosen_spanish_reading: tu valuación será conforme a su cantidad de semilla
  alternative_spanish_readings:
  - tu tasación será según la semilla que requiere
  - tu valoración será conforme a su requerimiento de semilla
  rationale: La frase hebrea establece una valoración técnica basada en la semilla necesaria para sembrar el terreno. «Valuación» mantiene el registro legal-cultual del capítulo y «cantidad de semilla» evita que el español pierda el sentido agrario concreto.
  doctrine_reference: Levítico 27:16; legal valuation context
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última revisión y el control cruzado: no se requieren cambios de fondo. Se mantiene la tensión lexical de מִן en מִשְּׂדֵה como parte de un campo heredado, y la valoración por cantidad de semilla como medida agraria técnica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en todo el texto.
  - «Valuación» se usa con sentido técnico de Levítico 27 y no como evaluación general.
  - «Homer» se conserva como transliteración de la medida hebrea para no perder precisión.
  - La nota al pie marca la alternativa hereditaria/posesoria sin anular el sentido parcial de מִן.
