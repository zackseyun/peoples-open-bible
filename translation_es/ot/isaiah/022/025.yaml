  yaml_path: translation/ot/isaiah/022/025.yaml
  text: On that day[a], declares Yahweh of hosts, the peg fastened in a secure place will give way, and it will be cut down and fall, and the load that was on it will be cut off[b], for Yahweh has spoken.
  footnotes:
