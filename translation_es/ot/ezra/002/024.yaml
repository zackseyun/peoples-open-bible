  - '''La casa de Azmaveth'''
  rationale: La expresión hebrea admite una referencia colectiva. Se conserva la forma tradicional y transparente en el texto principal, y se deja constancia de su alcance genealógico para no estrechar indebidamente el sentido.
  doctrine_reference: Uso bíblico de בְּנֵי en listas genealógicas y censales; cf. principio de equivalencia formal con nota lexical.
