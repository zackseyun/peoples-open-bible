translation:
  language: es
  text: Te conduciría y te llevaría a la casa de mi madre[a], donde ella me enseñó; te daría a beber vino especiado[b], del jugo de mi granada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tú me enseñarías». El verbo hebreo «me enseñarías / me enseñó» es tercera persona femenina singular, lo que más naturalmente se refiere a «mi madre», pero la sintaxis poética concisa ha llevado a algunos a conectarlo de otra manera.'
    reason: alternative_reading
  - marker: b
    text: 'O: «del mosto de mi granada» o «del jugo dulce de mi granada». El término hebreo puede referirse a jugo fresco o a mosto / vino dulce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶנְהָגֲךָ
  english_pob_choice: I would lead you
  chosen_spanish: Te conduciría
  alternatives_spanish:
  - Te guiaría
  - Te llevaría
  lexicon: HALOT
  rationale: El imperfecto 1cs con sufijo 2ms en este contexto poético expresa intención o deseo, por lo que en español resulta más natural el condicional 'conduciría' que un futuro simple. 'Conducir' mantiene la idea concreta de guiar en movimiento sin volverla abstracta.
- source_word: אֲבִיאֲךָ
  english_pob_choice: and bring you
  chosen_spanish: y te llevaría
  alternatives_spanish:
  - y te introduciría
  - y te llevaría adentro
  lexicon: HALOT
  rationale: El hiphil de בוא conserva el movimiento causativo; en español, 'llevaría' funciona bien en paralelo con 'conduciría' y evita una redundancia demasiado mecánica. La coordinación conserva el doble matiz de movimiento e ingreso.
- source_word: בֵּית אִמִּי
  english_pob_choice: into my mother’s house
  chosen_spanish: a casa de mi madre
  alternatives_spanish:
  - a la casa de mi madre
  - dentro de la casa de mi madre
  lexicon: HALOT
  rationale: Con la preposición direccional אֶל, español pide un destino natural. 'A casa de mi madre' es idiomático y fiel al sentido direccional, sin forzar 'dentro de' en una construcción que ya implica entrada.
- source_word: תְּלַמְּדֵנִי
  english_pob_choice: where she taught me
  chosen_spanish: donde ella me enseñó
  alternatives_spanish:
  - donde me enseñó
  - ella me enseñaba
  lexicon: HALOT
  rationale: La forma verbal es 3fs con sufijo 1cs y, según el audit trail, lo más natural es referirla a 'mi madre'. En español, 'donde ella me enseñó' sigue la revisión inglesa y conserva la referencia materna sin introducir una paráfrasis excesiva.
- source_word: מִיַּיִן הָרֶקַח
  english_pob_choice: spiced wine
  chosen_spanish: vino especiado
  alternatives_spanish:
  - vino con especias
  - vino aromatizado
  lexicon: HALOT
  rationale: יַיִן con הָרֶקַח alude a vino preparado con especias/aromas. 'Vino especiado' es natural, breve y preserva el valor sensorial del texto mejor que una glosa más larga.
- source_word: מֵעֲסִיס רִמֹּנִי
  english_pob_choice: from the juice of my pomegranate
  chosen_spanish: del jugo de mi granada
  alternatives_spanish:
  - de la savia de mi granada
  - del mosto de mi granada
  lexicon: HALOT
  rationale: עֲסִיס refiere jugo fresco o mosto. 'Jugo' es la opción más clara para español contemporáneo y conserva el paralelismo con el vino anterior, sin forzar una referencia necesariamente fermentada.
translation_notes:
  revision_awareness: 'Se siguió el trasfondo revisado del audit trail inglés: la cláusula final se entendió como una referencia a la enseñanza de la madre, no como un nuevo pedido dirigido al amado. También se mantuvo el paralelismo poético de movimiento + bebida sin expandir el hebreo más allá de lo warranted.'
  spanish_consistency_notes:
  - Se prefirió 'te conduciría' y 'te llevaría' en condicional para reflejar el valor desiderativo del imperfecto hebreo.
  - '''Casa de mi madre'' evita un calco rígido y conserva la dirección implícita en אֶל.'
  - '''Vino especiado'' mantiene la imaginería sensorial y es coherente con el registro poético.'
  - '''Jugo de mi granada'' conserva el singular posesivo del hebreo y el paralelismo con la bebida anterior.'
