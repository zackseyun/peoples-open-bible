revisions:
- from: Cuando Dios creó sus obras desde el principio[a], les asignó su dominio sobre sus seres vivientes.
  to: Cuando Dios creó sus obras desde el principio[a], asignó a cada una dominio sobre sus seres vivientes.
  rationale: Se eliminó el pronombre dativo ambiguo «les» y se explicitó «a cada una» para que el lector entienda mejor la idea de asignación dentro del orden creado, manteniendo el sentido del audit trail. También se suavizó la nota para alinearla mejor con el griego «porciones» y con la incertidumbre textual, sin abandonar la noción de ordenamiento.
