revisions:
- from: Entonces Dios abrió el hundimiento que estaba en Lehi[a], y de él salió agua. Cuando bebió, le volvió el espíritu y recobró la vida. Por eso llamó su nombre En-hacore[b], el cual está en Lehi hasta el día de hoy.
  to: Entonces Dios abrió la cavidad que está en Lehi[b], y de ella salió agua. Cuando él bebió, su espíritu volvió y revivió. Por eso la llamó En-hacore[a], que está en Lehi hasta el día de hoy.
  rationale: La revisión corrige el anclaje de las notas para que coincidan con su contenido, sustituye 'hundimiento' por 'cavidad' para una mejor correspondencia con הַמַּכְתֵּשׁ, y reemplaza el calco 'llamó su nombre' por una formulación española natural. También se ajusta la sintaxis final para mayor claridad, preservando la lectura principal documentada por el POB.
