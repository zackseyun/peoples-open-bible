translation:
  language: es
  text: 'Y Ezequías dijo[a]: «¿Qué señal hay de que he de subir a la casa de Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuál será la señal de que subiré a la casa de Yahvé?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración de manera simple. En español, «Y ... dijo» conserva la secuencia sin añadir una relación discursiva más fuerte que la del hebreo.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Convención bíblica hispana
  rationale: Se usa la forma castellana estándar del nombre propio, que es plenamente reconocible y fiel a la convención bíblica en español.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Cuál es
  alternatives_spanish:
  - ¿Qué es
  - ¿Qué
  lexicon: HALOT
  rationale: Aquí la pregunta introduce una identificación específica de la señal esperada; «¿Cuál es» suena natural en español y conserva el valor interrogativo directo.
- source_word: אוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - una señal
  - la prueba
  - el signo
  lexicon: HALOT
  rationale: «Señal» es el equivalente natural y bíblico en español para אוֹת en este contexto profético-narrativo. Mantiene el sentido de confirmación esperada sin cargar la frase con una interpretación extra.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En español, la construcción con «de que» marca con claridad el complemento que introduce el contenido de la señal. Evita la ambigüedad de un simple «que» y respeta la función completiva del hebreo.
- source_word: אֶעֱלֶה
  english_pob_choice: I shall go up
  chosen_spanish: yo subiré
  alternatives_spanish:
  - yo iré subiendo
  - yo iré a subir
  - subiré
  lexicon: HALOT
  rationale: El imperfecto qal de עלה expresa aquí futuro; «subiré» es directo y conserva la imagen de ascenso asociada con ir al templo en Jerusalén. Se añade «yo» para reforzar la persona verbal implícita y la solemnidad de la frase.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el paralelismo hebreo con «casa de Yahvé», siguiendo el criterio del proyecto para el nombre divino. «Casa» reproduce con fidelidad בית, y no se sustituye por «templo» para no borrar la imagen original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el valor del Tetragrámaton según la norma del proyecto: «Yahvé», no la máscara litúrgica «SEÑOR». Esto mantiene visible el nombre de pacto presente en el hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa directamente el nombre propio divino. La política del proyecto pide hacerlo visible en español como «Yahvé», conservando la referencia al nombre de pacto y evitando ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de א֑וֹת en contexto profético
  english_pob_reading: the sign
  chosen_spanish_reading: la señal
  alternative_spanish_readings:
  - el signo
  - la prueba
  rationale: En este pasaje la palabra funciona como confirmación dada por Dios y solicitada por Ezequías. «Señal» comunica bien esa función sin convertirla en un término técnico distinto ni diluir su fuerza narrativa.
  doctrine_reference: HALOT; uso profético-narrativo de אוֹת
- issue: Relación entre la pregunta y la cláusula con כִּי
  english_pob_reading: that I shall go up
  chosen_spanish_reading: de que yo subiré
  alternative_spanish_readings:
  - que yo subiré
  - porque yo subiré
  rationale: La cláusula subordinada expresa el contenido confirmado por la señal. En español, «de que» ayuda a mantener explícita esa subordinación sin añadir causalidad indebida.
  doctrine_reference: Sintaxis del completivo en español frente a כִּי
translation_notes:
  revision_awareness: El inglés POB pasó de «will go up» a «shall go up» por un ajuste de registro; en español se refleja con «subiré», que ya tiene valor futurizante natural y suficientemente formal en este contexto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - «Casa de Yahvé» conserva la imagen hebrea de בֵּית יְהוָה sin sustituirla por una interpretación más explicativa.
  - El registro es bíblico pero moderno; se evita arcaizar con fórmulas como «subiré a la casa del Señor» o «¿Qué señal hay?» salvo en la nota alternativa.
