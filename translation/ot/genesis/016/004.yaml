id: GEN.16.4
reference: Genesis 16:4
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אֶל הָגָ֖ר וַ/תַּ֑הַר וַ/תֵּ֨רֶא֙ כִּ֣י הָרָ֔תָה וַ/תֵּקַ֥ל גְּבִרְתָּ֖/הּ בְּ/עֵינֶֽי/הָ־׃
translation:
  text: He went in to Hagar[a], and she conceived. When she saw that she had conceived, her mistress was despised in her eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'her mistress was despised in her sight.' The Hebrew verb can be rendered either as Sarai becoming contemptible in Hagar's estimation or as being despised by Hagar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֶל
  chosen: went in to
  alternatives:
  - went to
  - had relations with
  lexicon: HALOT
  rationale: The idiom בוא אל in this context is a standard euphemism for sexual union. 'Went in to' preserves the Hebrew idiom and narrative decorum more closely than the more explicit 'had relations with,' while making the sense clear in English.
- source_word: הָגָר
  chosen: Hagar
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: וַתַּהַר / הָרָתָה
  chosen: conceived / had conceived
  alternatives:
  - became pregnant / was pregnant
  lexicon: HALOT
  rationale: The verb הרה can denote becoming pregnant or being pregnant. Using 'conceived' for both the wayyiqtol and the following clause preserves the close lexical repetition in Hebrew and fits the immediate narrative sequence.
- source_word: וַתֵּרֶא כִּי
  chosen: When she saw that
  alternatives:
  - and she saw that
  - she realized that
  lexicon: HALOT
  rationale: ראה with כי here introduces Hagar's perception of her condition. 'When she saw that' is a natural English rendering that preserves the temporal flow implied by the narrative sequence.
- source_word: וַתֵּקַל
  chosen: became contemptible
  alternatives:
  - was despised
  - was lightly esteemed
  - became insignificant
  lexicon: HALOT
  rationale: From קלל in the sense of being treated lightly or with contempt. The subject is 'her mistress,' so the clause describes Sarai's lowered status in Hagar's estimation. 'Became contemptible' captures the resultative nuance without overstating it as active abuse.
- source_word: גְּבִרְתָּהּ
  chosen: her mistress
  alternatives:
  - her lady
  - her master’s wife
  lexicon: HALOT
  rationale: גברת denotes a female superior or mistress. 'Mistress' is the most direct and contextually appropriate social term here.
- source_word: בְּעֵינֶיהָ
  chosen: in her eyes
  alternatives:
  - in her sight
  - in her estimation
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or estimation. 'In her eyes' preserves the idiom in readable English.
