- issue: Kinship term for Lot
  chosen_reading: Retain 'his brother' in the main text
  alternative_readings:
  - his kinsman
  rationale: The Hebrew uses אָחִיו, which can denote a close relative beyond a literal sibling. To preserve the source wording and avoid interpretive smoothing, the main text keeps 'his brother,' while the broader kinship sense is preserved in a footnote.
