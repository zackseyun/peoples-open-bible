base_translation:
  language: en
  yaml_path: translation/ot/exodus/015/025.yaml
  text: So he cried out to Yahweh[a], and Yahweh showed him a piece of wood. He threw it into the water, and the water became sweet. There he made for them a statute and a judgment[b], and there he tested them.
