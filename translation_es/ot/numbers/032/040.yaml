translation:
  language: es
  text: Así, Moisés dio Galaad a Makir, hijo de Manasés[a], y él se estableció en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitó en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: HALOT
  rationale: נתן en este contexto narrativo expresa una acción simple de dar. «Dio» conserva la fuerza directa del verbo sin añadir matiz administrativo que el hebreo no exige aquí.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  - la región de Galaad
  lexicon: HALOT
  rationale: Como topónimo bíblico, «Galaad» es la forma española natural y reconocible. Aunque el hebreo lleva artículo, en español no se reproduce normalmente con nombres establecidos de lugar.
- source_word: לְמָכִיר
  english_pob_choice: to Machir
  chosen_spanish: a Makir
  alternatives_spanish:
  - para Makir
  lexicon: HALOT
  rationale: La preposición ל señala aquí destinatario/beneficiario; en español la correspondencia más directa es «a». Se usa «Makir» como forma adaptada del nombre propio para lectura en español.
- source_word: בֶּן מְנַשֶּׁה
  english_pob_choice: son of Manasseh
  chosen_spanish: hijo de Manasés
  alternatives_spanish:
  - descendiente de Manasés
  lexicon: HALOT
  rationale: בֶּן en esta fórmula genealógica se traduce de manera natural como «hijo». No hay necesidad de ampliar a «descendiente» porque el vínculo inmediato del texto basta.
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - vivió
  lexicon: HALOT
  rationale: En un contexto de asignación territorial, ישב no solo indica residir sino asentarse. «Se estableció» comunica esa instalación en la tierra mejor que un simple «habitó».
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - allí
  - en eso
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la tierra/región antecedente. «En ella» mantiene la referencia pronominal en español y conserva la concordancia de género del antecedente implícito.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo masorético y con la solución inglesa auditada: una donación territorial seguida del asentamiento de Makir en la región. No se registran revisiones sustantivas en el pasaje comparado.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - Se conserva la relación de lugar con pronombre femenino («en ella») para reflejar el hebreo בָּהּ.
  - El nombre propio se adapta a la ortografía española usual para topónimos y antropónimos bíblicos, sin alterar la identificación.
