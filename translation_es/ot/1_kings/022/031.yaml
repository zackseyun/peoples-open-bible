base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/031.yaml
  text: Now the king of Aram had commanded the thirty-two chariot commanders who belonged to him[a], saying, “Do not fight with either small or great[c][b], but only with the king of Israel alone.”
  footnotes:
  - marker: a
    text: Or “Do not fight with anyone, small or great, except only the king of Israel.” The Hebrew idiom “small or great” means people of any rank or status.
    reason: lexical_alternative
  - marker: b
    text: “Aram” is the Hebrew place-name; traditionally rendered “Syria.”
    reason: alternative_reading
  - marker: c
    text: Or 'with small or great, but only with'.
    reason: previous_rendering
