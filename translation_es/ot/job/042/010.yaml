translation:
  language: es
  text: Yahvé restauró[a] la suerte de Job cuando[b] oró por sus amigos, y Yahvé le dio a Job el doble[c] de todo lo que había tenido antes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''le devolvió la suerte'' / ''le restauró la condición''. El hebreo es un modismo que describe el reverso de la situación de Job, no necesariamente una cautividad literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''mientras''. La construcción hebrea admite una lectura circunstancial o temporal cercana.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''cantidad doble'' / ''dos veces tanto como antes''. El sentido es de duplicación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Nombre divino / tetragrámaton
  rationale: Se sigue el default del proyecto para יהוה, preservando el nombre propio divino en español en lugar de una sustitución litúrgica.
- source_word: שָׁב אֶת שבית
  english_pob_choice: restored ... fortunes
  chosen_spanish: restauró la suerte
  alternatives_spanish:
  - restauró la cautividad
  - volvió la fortuna de
  - restauró la condición de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y en este contexto no exige cautiverio literal; en español, 'restauró la suerte' transmite bien la idea de revertir la condición de Job sin volverla mecánica.
- source_word: בְּהִתְפַּלְלוֹ
  english_pob_choice: when he prayed
  chosen_spanish: cuando oró
  alternatives_spanish:
  - mientras oraba
  - al orar
  - en su orar
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo expresa circunstancia temporal; 'cuando oró' reproduce esa relación de manera natural en español.
- source_word: בְּעַד רֵעֵהוּ
  english_pob_choice: for his friends
  chosen_spanish: por sus amigos
  alternatives_spanish:
  - en favor de sus amigos
  - a favor de sus amigos
  - por causa de sus amigos
  lexicon: HALOT
  rationale: בְּעַד tiene valor intercesor, y 'por sus amigos' mantiene la naturalidad española y la idea de intercesión.
- source_word: וַיֹּסֶף
  english_pob_choice: added
  chosen_spanish: le dio
  alternatives_spanish:
  - añadió
  - incrementó
  - sumó
  lexicon: HALOT
  rationale: Aunque el verbo base es 'añadir/incrementar', el sentido del miembro final es que Yahvé otorgó a Job una porción duplicada; 'le dio' evita una estructura forzada en español y comunica el resultado del aumento.
- source_word: אֶת כָּל אֲשֶׁר לְאִיּוֹב
  english_pob_choice: to Job all that had been his
  chosen_spanish: de todo lo que había tenido antes
  alternatives_spanish:
  - de todo lo que era suyo
  - de todo lo que le pertenecía
  - de todo lo que había sido de él
  lexicon: HALOT
  rationale: La frase apunta al conjunto de bienes/posesiones anteriores de Job; 'había tenido antes' capta retrospectivamente ese total en español natural.
- source_word: לְמִשְׁנֶה
  english_pob_choice: double / twice as much
  chosen_spanish: el doble
  alternatives_spanish:
  - dos veces más
  - el doble de
  - duplicado
  lexicon: HALOT
  rationale: לְמִשְׁנֶה indica duplicación; 'el doble' es la forma más clara y fiel en español contemporáneo.
theological_decisions:
- issue: Relación entre la oración de Job y la restauración de Yahvé
  english_pob_reading: Temporal linkage expressed as 'when he prayed' without making a stronger causal claim than the Hebrew requires.
  chosen_spanish_reading: Relación temporal expresada con 'cuando oró', sin convertirla en una causalidad más fuerte que la del hebreo.
  alternative_spanish_readings:
  - porque oró
  - mientras oraba
  - al orar
  rationale: La construcción hebrea puede leerse como circunstancia temporal; la traducción mantiene la conexión entre la intercesión de Job y la restauración, sin resolverla en una teología mecánica de mérito.
  doctrine_reference: Preservar la tensión teológica del texto sin sobre-interpretarla.
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para hacer más natural el final ('gave Job twice as much as he had before'); la versión española refleja esa claridad sin perder el valor léxico de לְמִשְׁנֶה como duplicación. También se mantuvo la lectura temporal de בְּהִתְפַּלְלוֹ y la idiomaticidad de שָׁב אֶת שבית.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara del nombre divino.
  - '''Amigos'' reproduce el contexto relacional de רֵעֵהוּ; no se fuerza ''compañeros''.'
  - La cláusula final usa 'el doble' para una duplicación explícita y legible en español.
  - La nota sobre 'suerte' aclara la metáfora hebrea sin introducir una idea de cautiverio literal.
