translation:
  language: es
  text: Tus manos no estaban atadas, y tus pies no fueron puestos en grilletes de bronce; como cae uno delante de los hijos de la injusticia[a], así has caído. Y todo el pueblo lloró por él todavía más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «delante de hombres perversos» o «delante de malhechores». El hebreo dice literalmente «delante de hijos de la injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדֶךָ לֹא אֲסֻרוֹת
  english_pob_choice: Your hands were not bound
  chosen_spanish: Tus manos no estaban atadas
  alternatives_spanish:
  - Tus manos no estaban ligadas
  - Tus manos no estaban sujetas
  lexicon: HALOT
  rationale: אֲסֻרוֹת expresa la idea de estar sujeto o atado. En español, «atadas» suena natural y conserva la imagen de cautiverio sin añadir más de lo que el hebreo dice.
- source_word: וְרַגְלֶיךָ לֹא לִנְחֻשְׁתַּיִם הֻגָּשׁוּ
  english_pob_choice: and your feet were not put into bronze fetters
  chosen_spanish: y tus pies no fueron puestos en grilletes de bronce
  alternatives_spanish:
  - y tus pies no fueron puestos en cadenas de bronce
  - y tus pies no fueron llevados a grilletes de bronce
  lexicon: HALOT
  rationale: לִנְחֻשְׁתַּיִם alude a hierros/grilletes de metal, y הֻגָּשׁוּ describe idiomáticamente el ser colocados en ellos. «Grilletes de bronce» preserva el material y el valor concreto de la restricción.
- source_word: כִּנְפֹל
  english_pob_choice: as one falls
  chosen_spanish: como cae uno
  alternatives_spanish:
  - como cuando uno cae
  - igual que cae uno
  lexicon: HALOT
  rationale: El infinitivo comparativo pide una construcción natural en español. «Como cae uno» mantiene el sentido general sin perder la comparación.
- source_word: לִפְנֵי בְנֵי עַוְלָה
  english_pob_choice: before sons of injustice
  chosen_spanish: delante de los hijos de la injusticia
  alternatives_spanish:
  - delante de los hijos del mal
  - delante de hombres perversos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de injusticia» y conviene conservar esa fuerza semítica en el texto principal. Se evita sustituirla de entrada por un equivalente más interpretativo.
- source_word: נָפָלְתָּ
  english_pob_choice: so you have fallen
  chosen_spanish: así has caído
  alternatives_spanish:
  - así caíste
  - así has sucumbido
  lexicon: HALOT
  rationale: El perfecto expresa el desenlace consumado del lamento. «Has caído» mantiene esa cualidad resultativa mejor que un simple pasado narrativo.
- source_word: וַיֹּסִפוּ כָל הָעָם לִבְכּוֹת עָלָיו
  english_pob_choice: And all the people wept over him even more
  chosen_spanish: Y todo el pueblo siguió llorando por él aún más
  alternatives_spanish:
  - Y todo el pueblo lloró por él todavía más
  - Y todo el pueblo continuó llorando por él
  lexicon: HALOT
  rationale: וַיֹּסִפוּ + infinitivo implica continuar o intensificar la acción. «Siguió llorando... aún más» comunica bien el aumento del duelo y suena natural en español.
translation_notes:
  revision_awareness: 'Revisé el texto inglés POB y la nota auditada: se mantuvo la imagen hebrea de «hijos de la injusticia» en el cuerpo principal y se conservó el sentido intensivo de וַיֹּסִפוּ. No hubo revisiones aplicadas en la última pasada, y el acuerdo del control cruzado fue alto.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo «hijos de la injusticia» en el texto principal para respetar la tensión lexical documentada, con una nota para la alternativa idiomática.
  - «Grilletes de bronce» conserva la concreción material de לִנְחֻשְׁתַּיִם sin suavizarla en «cadenas».
