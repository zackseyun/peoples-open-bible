translation:
  language: es
  text: Y sucedió[a] que, mientras ellos vigilaban un día oportuno, ella entró un día, como en los días anteriores, con solo dos jóvenes criadas, y deseó bañarse en el jardín, porque hacía calor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más literal, «como ayer y el tercer día antes». La frase griega compara esta visita con las anteriores y probablemente significa «como en los días anteriores».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: BDAG
  rationale: Fórmula narrativa idiomática. «Y sucedió» conserva el giro introductorio sin sonar arcaico, y corresponde bien a la función de transición del aoristo.
- source_word: παρατηρεῖν
  english_pob_choice: were watching
  chosen_spanish: vigilaban
  alternatives_spanish:
  - observaban
  - estaban vigilando
  - estaban al acecho
  lexicon: BDAG
  rationale: El verbo admite vigilancia atenta e incluso intención hostil. Aquí el contexto es de acecho sobre el momento oportuno, por lo que «vigilaban» mantiene la vigilancia sin explicitar más de lo que el griego requiere.
- source_word: ἡμέραν εὔθετον
  english_pob_choice: a suitable day
  chosen_spanish: un día oportuno
  alternatives_spanish:
  - un día adecuado
  - un día favorable
  - el momento oportuno
  lexicon: LSJ
  rationale: La expresión indica un día apto para su propósito. «Oportuno» conserva la idea de conveniencia calculada y el matiz intencional del contexto.
- source_word: εἰσῆλθέν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró
  - ingresó
  - pasó dentro
  lexicon: BDAG
  rationale: Verbo simple de entrada; «entró» es natural y fiel.
- source_word: ποτε
  english_pob_choice: one day
  chosen_spanish: una vez
  alternatives_spanish:
  - un día
  - en cierta ocasión
  lexicon: BDAG
  rationale: Marca una ocasión concreta dentro del relato. «Una vez» mantiene la brevedad y el valor episódico, aunque en español también puede leerse temporalmente.
- source_word: καθὼς ἐχθὲς καὶ τρίτης ἡμέρας
  english_pob_choice: as on the previous days
  chosen_spanish: como el día anterior y el tercer día antes
  alternatives_spanish:
  - como los días anteriores
  - como ayer y anteayer
  - como en los días previos
  lexicon: LSJ
  rationale: Se conserva el relieve del giro griego, que compara esta visita con otras anteriores. La redacción principal mantiene la literalidad auditable; la alternativa idiomática queda reflejada en la lectura inglesa auditada.
- source_word: μετὰ δύο μόνων κορασίων
  english_pob_choice: with only two young maids
  chosen_spanish: con solo dos jóvenes criadas
  alternatives_spanish:
  - con solo dos muchachas
  - con solo dos doncellas jóvenes
  - con solo dos criadas
  lexicon: BDAG
  rationale: κοράσιον puede ser «muchacha» o, según el contexto doméstico, una joven criada. «Jóvenes criadas» preserva tanto la edad como la función de servicio sin imponer una etiqueta demasiado moderna.
- source_word: ἐπεθύμησε
  english_pob_choice: desired
  chosen_spanish: deseó
  alternatives_spanish:
  - quiso
  - anheló
  - deseaba
  lexicon: BDAG
  rationale: Expresa intención o deseo; aquí no requiere intensificación. «Deseó» es sobrio y directo.
- source_word: λούσασθαι
  english_pob_choice: to bathe
  chosen_spanish: bañarse
  alternatives_spanish:
  - lavarse
  - tomar un baño
  lexicon: BDAG
  rationale: El infinitivo medio indica bañarse a sí misma. «Bañarse» es la solución natural en español y preserva el sentido corporal.
- source_word: ἐν τῷ παραδείσῳ
  english_pob_choice: in the garden
  chosen_spanish: en el jardín
  alternatives_spanish:
  - en el huerto
  - en el parque
  lexicon: LSJ
  rationale: Aquí παραδείσος designa el jardín/espacio ajardinado de la casa, no el «Paraíso» teológico. «Jardín» evita un malentendido doctrinal y sigue el contexto narrativo.
- source_word: καῦμα
  english_pob_choice: it was hot
  chosen_spanish: hacía calor
  alternatives_spanish:
  - había calor
  - el calor era intenso
  lexicon: LSJ
  rationale: El sustantivo significa calor. «Hacía calor» vuelve la causa de modo idiomático en español sin añadir información.
translation_notes:
  revision_awareness: 'La redacción sigue la capa de revisión auditada del inglés: se evita una literalidad torpe como «un día propicio» o «entró una vez» entendida como falta de naturalidad, pero se conserva el contenido completo del griego. En particular, el giro comparativo de καθὼς ἐχθὲς καὶ τρίτης ἡμέρας se mantiene con suficiente cercanía para ser auditable, mientras la nota explica la alternativa idiomática reconocida en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Y sucedió» como fórmula narrativa estándar, coherente con el estilo bíblico moderno del POB en español.
  - Se mantiene «jardín» para παραδείσος por el contexto doméstico inmediato, evitando una lectura espiritualizada.
  - «Jóvenes criadas» conserva el doble matiz de edad y servicio presente en κοράσια.
  - La nota al pie marca la tensión entre la literalidad del giro griego y la equivalencia idiomática en español.
