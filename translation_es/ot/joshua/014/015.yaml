translation:
  language: es
  text: Ahora bien, el nombre anterior de Hebrón era Quiriat-arbá[a]; Arba fue el hombre más importante entre los anaquitas[b]. Y la tierra tuvo descanso de la guerra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quiriat-arbá probablemente significa «ciudad de Arba».
    reason: lexical_alternative
  - marker: b
    text: O «el gran hombre entre los anaquitas»; el hebreo puede señalar a Arba como la figura más destacada asociada con los anaquitas.
    reason: alternative_reading
  - marker: c
    text: O «la tierra estuvo en paz, sin guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: Now the ... name
  chosen_spanish: Ahora bien, el nombre
  alternatives_spanish:
  - Y el nombre
  - Ahora el nombre
  lexicon: HALOT
  rationale: El hebreo introduce la nota con una conjunción simple; en español, «Ahora bien» mantiene el enlace narrativo con un giro natural y solemne, equivalente al «Now» del audit trail inglés.
- source_word: לְפָנִים
  english_pob_choice: former
  chosen_spanish: anterior
  alternatives_spanish:
  - antiguo
  - antes
  - anteriormente
  lexicon: HALOT
  rationale: El adverbio hebreo indica ‘antes / en otro tiempo’. «Anterior» funciona naturalmente con «nombre» y conserva la referencia temporal sin forzar una paráfrasis.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arbá
  alternatives_spanish:
  - Quiriat-arba
  - Kirjat-arbá
  lexicon: HALOT
  rationale: Se translitera el topónimo como nombre propio. Se usa guion para reflejar el compuesto y una forma española reconocible y estable en lectura bíblica.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: HALOT
  rationale: Aquí אָדָם se refiere a un individuo varón concreto, Arba; «el hombre» preserva la referencia personal y la fuerza léxica sin diluirla en «persona».
- source_word: הַגָּדוֹל
  english_pob_choice: greatest
  chosen_spanish: el más grande
  alternatives_spanish:
  - el grande
  - el más prominente
  lexicon: HALOT
  rationale: El superlativo comparativo contextual en español se expresa mejor con «el más grande». Conserva la preeminencia atribuida a Arba entre los anaceos.
- source_word: בָּעֲנָקִים
  english_pob_choice: among the Anakim
  chosen_spanish: entre los anaceos
  alternatives_spanish:
  - entre los anaquitas
  lexicon: HALOT
  rationale: Se prefiere el etnónimo hebreo adaptado al español («anaceos») para mantener la huella del original, en lugar de una forma más interpretativa. «Entre» reproduce la relación de pertenencia/ámbito del hebreo.
- source_word: הוּא
  english_pob_choice: Arba was
  chosen_spanish: Arba fue
  alternatives_spanish:
  - él fue
  - Arba era
  lexicon: HALOT
  rationale: Como en el audit trail inglés, se explicita Arba para evitar ambigüedad. El hebreo retoma al referente ya mencionado, y el español queda más claro si se nombra de nuevo.
- source_word: וְהָאָרֶץ
  english_pob_choice: And the land
  chosen_spanish: Y la tierra
  alternatives_spanish:
  - Entonces la tierra
  lexicon: HALOT
  rationale: «Tierra» es la traducción natural del hebreo en contexto territorial/covenantal. Se conserva la conjunción simple para mantener el flujo narrativo.
- source_word: שָׁקְטָה
  english_pob_choice: had rest
  chosen_spanish: tuvo descanso
  alternatives_spanish:
  - estuvo quieta
  - estuvo en reposo
  lexicon: HALOT
  rationale: El verbo puede significar estar quieto, en reposo o sin perturbación. En español, «tuvo descanso» comunica bien la idea de cese de hostilidades sin perder el matiz de reposo narrativo.
- source_word: מִמִּלְחָמָה
  english_pob_choice: from war
  chosen_spanish: de la guerra
  alternatives_spanish:
  - de la guerra
  - de la guerra y de los combates
  lexicon: HALOT
  rationale: La preposición expresa separación del estado de guerra; «de la guerra» es la forma breve y natural en español, paralela al inglés POB.
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones: el sentido se mantuvo estable y la traducción española sigue de cerca las decisiones ya validadas, trasladando los mismos puntos de tensión léxica (topónimo compuesto, etnónimo, superlativo y clausura de guerra) a un español publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el topónimo hebreo transliterado con guion en «Quiriat-arbá», coherente con el tratamiento del nombre propio en el original.
  - Se mantiene la nota alternativa sobre el posible valor semántico del topónimo, como en el texto inglés auditado.
  - Se preserva la ambigüedad interpretativa de la cláusula sobre Arba mediante una nota alternativa, sin eliminarla en el texto principal.
  - Se traduce la clausura como «tuvo descanso de la guerra», una formulación natural en español que mantiene el valor de reposo/quietud del hebreo.
