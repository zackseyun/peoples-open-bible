translation:
  language: es
  text: Los necios[a], por el camino de sus transgresiones[b] y por sus iniquidades[c], fueron afligidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Necios» traduce una categoría moral sapiencial; también podría verterse «insensatos», pero «necios» mantiene mejor el tono bíblico y la fuerza ética del hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'O «por la senda de su rebelión». Más formalmente, las preposiciones hebreas podrían traducirse «de/des­de», pero aquí probablemente expresan causa: «por» o «a causa de».'
    reason: lexical_alternative
  - marker: c
    text: «Iniquidades» también podría traducirse «pecados» o «culpas», preservando matices algo distintos del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִלִים
  english_pob_choice: Fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los necios moralmente
  lexicon: HALOT
  rationale: El término hebreo describe a personas moralmente torpes o perversas, no solo intelectualmente poco hábiles. «Necios» comunica bien esa categoría sapiencial en español y es natural en un registro bíblico digno.
- source_word: מִדֶּרֶךְ
  english_pob_choice: because of the way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - a causa del camino de
  - por la senda de
  lexicon: HALOT
  rationale: El מִן inicial puede expresar causa, como refleja la POB inglesa. En español, «por» comunica esa relación causal de forma natural. Se conserva «camino» para retener la idea de conducta o curso de vida.
- source_word: פִּשְׁעָם
  english_pob_choice: their transgression
  chosen_spanish: su transgresión
  alternatives_spanish:
  - su rebelión
  - su falta
  lexicon: HALOT
  rationale: פֶּשַׁע puede implicar transgresión o rebelión contra autoridad legítima. «Transgresión» mantiene el peso jurídico-moral del término y distingue este primer sustantivo de los siguientes.
- source_word: וּמֵעֲוֺנֹתֵיהֶם
  english_pob_choice: and because of their iniquities
  chosen_spanish: y por sus iniquidades
  alternatives_spanish:
  - y por sus pecados
  - y por su culpa
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o el mal cometido. «Iniquidades» preserva el paralelismo y la diferenciación con פֶּשַׁע, además de seguir la elección léxica de la POB inglesa.
- source_word: יִתְעַנּוּ
  english_pob_choice: were afflicted
  chosen_spanish: fueron afligidos
  alternatives_spanish:
  - fueron humillados
  - sufrieron aflicción
  lexicon: HALOT
  rationale: En hitpael, el verbo puede significar ser afligido o humillado. Aquí el contexto poético narrativo favorece «fueron afligidos», que es claro y fiel al resultado descrito.
theological_decisions:
- issue: Relación causal entre pecado y sufrimiento
  english_pob_reading: Their affliction came because of their sinful way and iniquities.
  chosen_spanish_reading: Su aflicción vino por su conducta transgresora e iniquidades.
  alternative_spanish_readings:
  - El verso solo describe una asociación entre conducta y aflicción.
  - La frase podría entenderse de modo más general, sin causalidad directa.
  rationale: Los dos usos de מִן se entienden mejor como causales en este contexto poético. La traducción conserva esa lógica moral sin convertir el versículo en una doctrina universal de que todo sufrimiento procede del pecado personal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: La revisión inglesa más reciente aclaró la doble relación causal con «because of» en ambos miembros. En español, se reflejó esa duplicación con «por ... y por ...» para no perder la correspondencia con las dos frases preposicionales del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - 'Se conservan los términos morales diferenciados: «transgresión» para פֶּשַׁע e «iniquidades» para עָוֹן.'
  - Se evita suavizar el juicio moral con expresiones demasiado genéricas, en línea con la POB inglesa.
