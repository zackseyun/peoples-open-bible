translation:
  language: es
  text: ¿Arará el arador todo el día para sembrar? ¿Seguirá abriendo y rastrillando su tierra?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Seguirá rompiendo y nivelando su tierra?» Los verbos agrícolas hebreos pueden traducirse de manera más general, pero el texto principal preserva la secuencia probable de la preparación del campo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲכֹל הַיּוֹם
  english_pob_choice: Does ... all day
  chosen_spanish: ¿... todo el día?
  alternatives_spanish:
  - ¿... continuamente todo el día?
  - ¿... todo el tiempo?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea conserva en español su fuerza temporal con «todo el día», una fórmula natural y fiel al énfasis del original sin volverla pesada.
- source_word: יַחֲרֹשׁ / הַחֹרֵשׁ
  english_pob_choice: the plowman plow
  chosen_spanish: el arador arará
  alternatives_spanish:
  - el que ara arará
  - el labrador labrará
  lexicon: HALOT
  rationale: Se mantiene el juego verbal entre el agente y la acción con un cognado español cercano. «Arador» conserva el valor del participio nominal y «arará» refleja el verbo de labranza del hebreo.
- source_word: לִזְרֹעַ
  english_pob_choice: to sow
  chosen_spanish: para sembrar
  alternatives_spanish:
  - para la siembra
  - a fin de sembrar
  lexicon: HALOT
  rationale: El infinitivo de finalidad se expresa con una construcción natural en español. «Sembrar» es el equivalente agrícola preciso y directo.
- source_word: יְפַתַּח
  english_pob_choice: keep opening
  chosen_spanish: seguir abriendo
  alternatives_spanish:
  - continuar abriendo
  - ir abriendo
  lexicon: HALOT
  rationale: «Abrir» conserva el sentido básico del verbo, y «seguir» comunica bien el valor iterativo o continuado de la pregunta retórica, sin exagerar la especificidad técnica.
- source_word: וִישַׂדֵּד
  english_pob_choice: harrowing
  chosen_spanish: rastrillando
  alternatives_spanish:
  - hirviendo la tierra
  - nivelando
  - rompiendo los terrones
  lexicon: HALOT
  rationale: El verbo agrícola hebreo puede abarcar la idea de romper y nivelar la tierra tras ararla. «Rastrillar» es una equivalencia comprensible en español que conserva la labor de preparación del suelo. Se prefiere una forma participial para reflejar la acción continuada.
- source_word: אַדְמָתוֹ
  english_pob_choice: his ground
  chosen_spanish: su tierra
  alternatives_spanish:
  - su suelo
  - su terreno
  lexicon: HALOT
  rationale: «Adamah» aquí se refiere a la tierra cultivada. «Su tierra» es idiomático en español y preserva el referente agrícola sin introducir tecnicismos.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; se conserva la equivalencia óptima del audit trail, atendiendo al paralelismo agrícola y a la secuencia de preparación del campo indicada por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo el tono retórico de pregunta doble del hebreo.
  - Se evitó «SEÑOR» u այլ terminología no presente en este verso.
  - La imagen agrícola se preserva con vocabulario natural para lectura pública en español.
