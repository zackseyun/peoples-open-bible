translation:
  text: '1[a]. But when she came, she would listen in on me, how I gave thanks to the Lord and sang hymns in the house of darkness, and with a cheerful voice, rejoicing, I glorified my God because by a pretext I had been delivered from the Egyptian woman. Many times she sent to me, saying, “Consent to fulfill my desire, and I will release you from your chains, and I will free you from the darkness.”


    2[b]. But I did not turn even in thought toward her; for God loves more the one who is faithful in self-control in a pit of darkness than the one who, as a king in storerooms, lives in luxury with lawlessness.


    3. But if one lives in self-control, and the Most High knows that glory also is fitting for him, he grants that too to him, as also to me.


    4. How often, though she was sick, she came down to me at an untimely hour, and heard my voice as I prayed; and I, understanding her groanings, kept silent.


    5. For when I was in her house, she would uncover her arms and her legs, so that I might fall into her. For she was very beautiful, especially adorned for my deception[c]. But the Lord guarded me from her schemes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'house of darkness' likely refers to Joseph's place of confinement; the Greek preserves the imagery of darkness rather than naming a prison directly.
    reason: cultural_note
    anchor_ref: '9:1'
  - marker: b
    text: 'The Greek contrast is difficult: literally something like ''the faithful one in a pit of darkness in self-control'' versus ''the king in storerooms living luxuriously with lawlessness.'''
    reason: textual_variant
    anchor_ref: '9:2'
  - marker: c
    text: '''Legs'' translates a term more specifically meaning the lower legs or shins.'
    reason: lexical_alternative
    anchor_ref: '9:5'
lexical_decisions:
- source_word: ἐπηκροᾶτό
  chosen: would listen in on
  alternatives:
  - listened
  - eavesdropped on
  lexicon: LSJ
  rationale: The verb suggests attentive listening from the side or secretly. 'Would listen in on' preserves the repeated/imperfect sense without over-colloquializing as 'spy on'.
- source_word: ἐν οἴκῳ τοῦ σκότους / ἐκ τοῦ σκότους
  chosen: in the house of darkness / from the darkness
  alternatives:
  - in prison / from prison
  - in the dark house
  lexicon: LSJ
  rationale: The Greek uses 'darkness' rather than an explicit prison term. Retaining the metaphorical-literal phrase preserves Joseph's rhetoric while still implying confinement.
- source_word: ἐν ἱλαρᾷ φωνῇ
  chosen: with a cheerful voice
  alternatives:
  - in a glad voice
  - with a joyful voice
  lexicon: LSJ
  rationale: ἱλαρός conveys cheerfulness or gladness. 'Cheerful' fits the contrast with imprisonment and keeps the elevated but readable tone.
- source_word: διὰ προφάσεως ἀπηλλάγην
  chosen: by a pretext I had been delivered
  alternatives:
  - under a pretext I escaped
  - by an excuse I was freed
  lexicon: LSJ
  rationale: πρόφασις is a pretext or plausible excuse. The phrase likely refers to Joseph's providential escape from her advances; 'delivered' keeps the theological coloring.
- source_word: Εὐδόκησον πληρῶσαι τὴν ἐπιθυμίαν μου
  chosen: Consent to fulfill my desire
  alternatives:
  - Be willing to satisfy my desire
  - Agree to complete my longing
  lexicon: LSJ
  rationale: The imperative εὐδόκησον is stronger than mere permission but softer than a command; 'consent' suits seduction language.
- source_word: οὐδὲ ἕως ἐννοίας ἐξέκλινα
  chosen: I did not turn even in thought
  alternatives:
  - I did not incline even in my mind
  - I did not deviate even to a thought
  lexicon: LSJ
  rationale: This idiom stresses inward purity, not merely outward refusal. 'Even in thought' is concise and faithful.
- source_word: πιστὸν ἐν σωφροσύνῃ
  chosen: faithful in self-control
  alternatives:
  - steadfast in chastity
  - faithful in temperance
  lexicon: LSJ
  rationale: σωφροσύνη in this context centers on sexual restraint and disciplined purity, but 'self-control' is broad enough to preserve the virtue term's range.
- source_word: ἐν λάκκῳ σκότους
  chosen: in a pit of darkness
  alternatives:
  - in a dark pit
  - in a dungeon
  lexicon: LSJ
  rationale: λάκκος is literally a pit. Keeping the image rather than flattening to 'dungeon' preserves the vivid contrastive rhetoric.
- source_word: ἐν ταμείοις βασιλέα τρυφῶντα μετ’ ἀκολασίας
  chosen: the one who, as a king in storerooms, lives in luxury with lawlessness
  alternatives:
  - a king in chambers indulging in debauchery
  - one reigning in treasuries while reveling in licentiousness
  lexicon: LSJ
  rationale: The text is difficult, but the contrast is between dark confinement with chastity and privileged abundance with moral excess. 'Lives in luxury with lawlessness' communicates τρυφῶντα μετ’ ἀκολασίας clearly.
- source_word: διάγων ἐν σωφροσύνῃ
  chosen: lives in self-control
  alternatives:
  - conducts himself in chastity
  - passes his life in temperance
  lexicon: LSJ
  rationale: A stable rendering of σωφροσύνη within the chapter supports thematic coherence.
- source_word: συμφέρει
  chosen: is fitting
  alternatives:
  - is beneficial
  - is advantageous
  lexicon: LSJ
  rationale: In context, the Most High knows whether honor is appropriate for a person. 'Is fitting' better suits the moral-providential sense than merely pragmatic 'beneficial'.
- source_word: ἐν ἀωρίᾳ
  chosen: at an untimely hour
  alternatives:
  - at an unseasonable time
  - late
  lexicon: LSJ
  rationale: The phrase suggests an improper or inconvenient time, heightening the clandestine pressure.
- source_word: συνίων τοὺς στεναγμούς
  chosen: understanding her groanings
  alternatives:
  - perceiving her sighs
  - knowing her lamentings
  lexicon: LSJ
  rationale: στεναγμοί can be groans or sighs. Here it likely refers to desire-laden sighing rather than grief; 'groanings' keeps the ambiguity.
- source_word: ἐσιώπων
  chosen: kept silent
  alternatives:
  - was silent
  - said nothing
  lexicon: LSJ
  rationale: The imperfect suggests repeated restraint; 'kept silent' captures deliberate ongoing refusal.
- source_word: ἐγύμνου τοὺς βραχίονας ... καὶ τὰς κνήμας
  chosen: would uncover her arms and her legs
  alternatives:
  - bared her arms and calves
  - stripped her arms and lower legs
  lexicon: LSJ
  rationale: The seduction scene should remain concrete. 'Legs' is natural English, though κνῆμαι more specifically means lower legs.
- source_word: ἵνα συμπέσω εἰς αὐτήν
  chosen: so that I might fall in with her
  alternatives:
  - so that I might fall upon her
  - so that I might have intercourse with her
  lexicon: LSJ
  rationale: The Greek is euphemistic. 'Fall in with her' preserves the indirectness without obscuring the sexual intent.
- source_word: κοσμουμένη πρὸς ἀπάτην μου
  chosen: adorned for my deception
  alternatives:
  - decked out to deceive me
  - ornamented to seduce me
  lexicon: LSJ
  rationale: ἀπάτη is deception. Since the chapter emphasizes moral testing and entrapment, 'deception' is preferable to the more interpretive 'seduce'.
- source_word: ἐγχειρημάτων
  chosen: schemes
  alternatives:
  - attempts
  - assaults
  - devices
  lexicon: LSJ
  rationale: The term can denote undertakings or attempts. 'Schemes' fits the cumulative, manipulative character of her actions in this chapter.
