revisions:
- from: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado, y degollará la ofrenda por el pecado en el lugar del holocausto[a].
  to: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado, y degollará la víctima de la ofrenda por el pecado en el lugar del holocausto[a].
  rationale: Se hace una reparación mínima para que el español suene natural y siga reflejando el valor técnico de שחט. «Degollará la víctima de la ofrenda por el pecado» mantiene la precisión sacrificial sin convertir el verbo en una paráfrasis más libre. La nota léxica se conserva porque corresponde al expediente inglés y al campo semántico de חטאת.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:47:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea de la POB inglesa: conserva el singular «su mano», el futuro prescriptivo, la referencia doble a חטאת, y el lugar sacrificial. Sin embargo, «degollará» es más estrecho que שחט y suena menos natural al combinarse con «la ofrenda por el pecado», donde el referente es el animal/sacrificio, no solo el acto de cortar la garganta. «Sacrificará» sería demasiado interpretativo y menos literal; «matará» demasiado genérico. La mejor reparación mínima es «degollará la víctima de la ofrenda por el pecado» o, más sencillamente y con mejor fluidez, mantener «ofrenda por el pecado» pero usar un verbo más natural. Aun así, para no expandir el texto innecesariamente, el ajuste más claro es cambiar a «sacrificará» solo si se aceptara una ligera pérdida técnica. Mejor opción: «degollará la víctima de la ofrenda por el pecado».'
  spanish_quality_summary: El español es claro y digno, pero la combinación «degollará la ofrenda por el pecado» resulta algo áspera porque en español se degüella un animal, no una ofrenda en abstracto. Además, la justificación léxica contiene una contradicción interna al decir «Se evita “ofrenda por el pecado”» cuando esa es precisamente la opción elegida. El texto requiere un pequeño retoque de naturalidad cultual.
  glossary_alignment: Buena alineación general con la terminología del proyecto. «Holocausto» para עֹלָה es aceptable en español eclesial. «Ofrenda por el pecado» refleja la decisión inglesa «sin offering» y la nota conserva la alternativa «ofrenda de purificación». No hay conflicto con términos teológicos mayores del glosario.
  issues:
  - severity: medium
    issue: Colocación poco natural de «degollar» con «ofrenda por el pecado»
    rationale: El hebreo שחט se refiere al sacrificio ritual del animal. En español, «degollar la ofrenda» suena menos idiomático que «degollar la víctima de la ofrenda» o una formulación equivalente.
  - severity: low
    issue: Rationale léxica contradictoria sobre «ofrenda por el pecado»
    rationale: La nota dice «Se evita “ofrenda por el pecado”» aunque esa es la forma escogida; esto no cambia el texto bíblico, pero muestra inconsistencia documental.
  revised_spanish_text: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado, y degollará la víctima de la ofrenda por el pecado en el lugar del holocausto[a].
  revised_footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חטאת puede referirse a la ofrenda asociada con el pecado y con la purificación.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación mínima para que el español suene natural y siga reflejando el valor técnico de שחט. «Degollará la víctima de la ofrenda por el pecado» mantiene la precisión sacrificial sin convertir el verbo en una paráfrasis más libre. La nota léxica se conserva porque corresponde al expediente inglés y al campo semántico de חטאת.
