  to: 'Entonces un dirigente le preguntó[a], diciendo: «Maestro bueno, ¿qué debo hacer para heredar la vida eterna?»'
  rationale: Se corrige el marcador no publicable «un[a]» y se sustituye «gobernante» por «dirigente» para reflejar mejor ἄρχων en español amplio y natural. También se cambia la conjunción inicial a «Entonces» para evitar un calco rígido de καί, sin alterar el sentido. Se conserva la nota literal sobre τί ποιήσας y el lenguaje de herencia.
