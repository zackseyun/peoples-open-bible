revisions:
- from: 'y el diseño de todo lo que estaba en el Espíritu con él: para los atrios de la casa de Yahvé[a], para todas las cámaras alrededor, para los tesoros de la casa de Dios y para los tesoros de las cosas santas.'
  to: 'y el plano de todo lo que estaba en el Espíritu con él: para los atrios de la casa de Yahvé[a], para todas las cámaras circundantes, para las tesorerías de la casa de Dios y para las tesorerías de las cosas santas.'
  rationale: Se ajusta אֹצְרוֹת a 'tesorerías' para reflejar correctamente lugares de almacenamiento, se mejora la naturalidad de לְּשָׁכוֹת סָבִיב con 'cámaras circundantes', y se afina תַבְנִית a 'plano' por el contexto arquitectónico. Se conserva sin cambio la nota sobre la ambigüedad de 'en el Espíritu con él'.
