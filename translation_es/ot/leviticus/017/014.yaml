review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en los elementos centrales: נֶפֶשׁ como «vida», בָּשָׂר como «carne», דָּם como «sangre», y יִכָּרֵת como «será cortado». También conserva la repetición enfática del argumento sobre vida y sangre. Sin embargo, en la primera cláusula cambia el predicado de equivalencia del inglés auditado («is its blood; in its life it is») a una formulación más interpretativa («está en su sangre»), que coincide con una alternativa documentada en nota pero no con la elección principal del POB. Además, el anclaje de notas a/b/c no corresponde bien a los lugares semánticos: la nota sobre la alternativa de «su sangre está en su vida / es su vida» debe anclarse a «su sangre», y la nota sobre «carne» debe ir en una ocurrencia de «carne», no en «sangre».'
  spanish_quality_summary: El español es legible y digno, con registro bíblico claro. «Cualquiera que la coma será cortado» funciona. No obstante, «Porque la vida de toda carne está en su sangre; en su vida está» introduce una asimetría innecesaria entre «está» y «está» donde el POB auditado preserva mejor la formulación copulativa «es… está». Además, «Y dije» es aceptable, pero «Por eso dije» refleja mejor la fuerza inferencial de וָאֹמַר en este contexto legal-argumentativo sin sonar forzado.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «vida», «carne», «sangre», «hijos de Israel», y «será cortado». No hay términos del glosario mayor en conflicto. La principal corrección es mantener la decisión auditada para בְנַפְשׁוֹ הוּא sin desplazar la línea principal a una alternativa ya reservada para nota.'
  issues:
  - severity: medium
    issue: La primera cláusula principal traduce «la vida de toda carne está en su sangre» en vez de la elección auditada «la vida de toda carne es su sangre».
    rationale: El hebreo y el POB inglés decidieron preservar la formulación de equivalencia en la línea principal, dejando «su sangre está en su vida» como alternativa en nota. El español actual invierte esa prioridad y altera la presentación del razonamiento.
  - severity: medium
    issue: Las notas a y b están ancladas en lugares inadecuados respecto de su contenido.
    rationale: La nota a habla de alternativas para la relación entre sangre y vida, por lo que debe anclarse donde aparece «su sangre» o la cláusula correspondiente; la nota b explica «carne» pero actualmente está anclada a «sangre».
  - severity: low
    issue: «Y dije» es fiel, pero pierde parte de la fuerza inferencial de וָאֹמַר en este contexto.
    rationale: La decisión inglesa «So I said» busca conectar principio y mandato. En español, «Por eso dije» o «Así dije» lo refleja mejor que una mera conjunción narrativa.
  revised_spanish_text: 'Porque la vida de toda carne es su sangre[a]; en su vida está. Por eso dije a los hijos de Israel[b]: «No comerán la sangre de ninguna carne[c], porque la vida de toda carne es su sangre». Cualquiera que la coma será cortado.'
  revised_footnotes:
