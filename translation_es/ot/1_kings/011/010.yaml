revisions:
- from: y le había mandado respecto de este asunto[a], para que no fuera tras dioses ajenos, pero no guardó lo que Yahvé había mandado.
  to: y le había mandado respecto de este asunto[a], para no ir tras otros dioses, pero no guardó lo que Yahvé había mandado.
  rationale: Se ajusta 'para que no fuera tras' a 'para no ir tras' para reflejar de manera más natural y directa el infinitivo hebreo לְבִלְתִּי לֶכֶת. También se cambia 'dioses ajenos' a 'otros dioses' para alinear el texto con la nota al pie, el modismo hebreo señalado y la auditoría inglesa, sin alterar el sentido.
