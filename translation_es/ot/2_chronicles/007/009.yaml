base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/009.yaml
  text: On the eighth day they held a solemn assembly[b][a], for they observed the dedication of the altar for seven days and the feast for seven days.
  footnotes:
  - marker: a
    text: Or 'assembly' or 'closing assembly' for 'solemn assembly.' The Hebrew עֲצָרֶת refers to a special concluding gathering in a sacred festival context.
    reason: lexical_alternative
  - marker: b
    text: Or 'celebrated' or more literally 'did' the dedication of the altar for seven days.
    reason: lexical_alternative
