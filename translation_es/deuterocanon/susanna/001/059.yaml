    issue: «con justicia» para Ὀρθῶς
    rationale: 'Aunque intenta preservar la ironía judicial, en español puede sugerir que la mentira fue moralmente justa. «Bien» o «correctamente» capta mejor la ironía: ha mentido de manera que su mentira se vuelve contra él.'
  - severity: medium
    issue: Uso de «os» en texto meta neutral latinoamericano
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Os» introduce voseo peninsular y desentona con el resto del registro. El plural puede mantenerse con «los destruya» y explicarse en nota.
  - severity: low
    issue: Ubicación de la nota al final de toda la cita
    rationale: La nota explica específicamente el pronombre plural final; conviene anclarla en ese segmento para mayor claridad editorial.
