translation:
  language: es
  text: Decláralos culpables[a], oh, Dios; que caigan por sus propios consejos. Expúlsalos[b] por la multitud de sus transgresiones, porque se han rebelado contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tenlos por culpables».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «échalos fuera» o «destiérralos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲשִׁימֵם
  english_pob_choice: Declare them guilty
  chosen_spanish: Decláralos culpables
  alternatives_spanish:
  - Condénalos
  - Tenlos por culpables
  lexicon: HALOT
  rationale: El hifil imperativo con sufijo pide que Dios los trate o los pronuncie como culpables. «Declararlos culpables» en español preserva el sentido judicial sin adelantar un matiz punitivo que el hebreo no explicita.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Es vocativo en una oración. «Oh Dios» suena natural y conserva el tono de súplica directa.
- source_word: יִפְּלוּ
  english_pob_choice: let them fall
  chosen_spanish: que caigan
  alternatives_spanish:
  - que se derrumben
  - déjalos caer
  lexicon: HALOT
  rationale: El imperfecto en este contexto funciona como petición imprecatoria. «Que caigan» mantiene el valor de ruego y el registro poético.
- source_word: מִמֹּעֲצוֹתֵיהֶם
  english_pob_choice: by their own counsels
  chosen_spanish: por sus propios consejos
  alternatives_spanish:
  - a causa de sus propios planes
  - por sus planes
  lexicon: HALOT
  rationale: El sustantivo refiere a planes o consejos; el preverbio מִן puede marcar origen o medio. «Por sus propios consejos» conserva la ironía reflexiva del texto y permite leer que su ruina procede de sus propias decisiones.
- source_word: בְּרֹב פִּשְׁעֵיהֶם
  english_pob_choice: because of their many transgressions
  chosen_spanish: por la multitud de sus transgresiones
  alternatives_spanish:
  - por sus numerosas rebeliones
  - a causa de la abundancia de sus transgresiones
  lexicon: HALOT
  rationale: ב con רֹב expresa aquí causalidad. «Multitud» refleja bien la abundancia y deja intacto el peso moral de פֶּשַׁע como «transgresión/rebelión».
- source_word: הַדִּיחֵמוֹ
  english_pob_choice: Drive them away
  chosen_spanish: Ahuyéntalos
  alternatives_spanish:
  - Échalos fuera
  - Banéalos
  lexicon: HALOT
  rationale: El hifil de נדח comunica ser echados o expulsados. «Ahuyéntalos» conserva la fuerza del mandato y la imagen de ser expulsados de un lugar o presencia.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduzce la razón de la petición. «Porque» es claro y natural en español contemporáneo.
- source_word: מָרוּ בָךְ
  english_pob_choice: they have rebelled against you
  chosen_spanish: se han rebelado contra ti
  alternatives_spanish:
  - han sido rebeldes contra ti
  - se han mostrado rebeldes ante ti
  lexicon: HALOT
  rationale: מרה con ב expresa rebelión contra Dios. «Rebelarse contra» es la forma más directa e idiomática en español y conserva la tensión teológica del texto.
theological_decisions:
- issue: Lenguaje imprecatorio y juicio divino
  english_pob_reading: Retain the psalm's direct petitions for judgment without softening them into mere prediction.
  chosen_spanish_reading: Conservar las peticiones directas de juicio sin convertirlas en mera descripción de lo que ocurrirá.
  alternative_spanish_readings:
  - Convertir el verso en una afirmación predictiva
  - Suavizar las imperativas para hacerlas menos contundentes
  rationale: El hebreo usa imperativos y un imperfecto volitivo dirigidos a Dios. Mantener el tono de súplica judicial preserva la tensión teológica del pasaje en vez de resolverla o atenuarla.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene el sentido auditado de la versión inglesa y la lectura moral/judicial del hebreo sin ajustes textuales.
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo directo, no «SEÑOR», porque el hebreo dice אֱלֹהִים.
  - Se mantiene «transgresiones» para פִּשְׁעֵיהֶם, preservando el matiz de rebelión moral/legal.
  - «Ahuyéntalos» busca reflejar la fuerza de הַדִּיחֵמוֹ sin diluirlo en una paráfrasis más débil.
  - La cadencia del versículo conserva el paralelismo poético y la secuencia causal del hebreo.
