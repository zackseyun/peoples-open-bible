translation:
  language: es
  text: Cuando Noé despertó de su vino[a], supo lo que le había hecho su hijo menor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hijo más joven». El adjetivo hebreo puede significar «pequeño», «joven» o «el más joven», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּיקֶץ
  english_pob_choice: awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - volvió en sí
  lexicon: HALOT
  rationale: El hebreo indica que Noé salió del estado de sueño; en español, «despertó» expresa con naturalidad ese cambio sin añadir la idea de sobriedad que el texto no dice de forma explícita.
- source_word: מִיֵּינוֹ
  english_pob_choice: from his wine
  chosen_spanish: de su vino
  alternatives_spanish:
  - por el vino
  - de la embriaguez causada por su vino
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea «de su vino» en vez de explicarla como «embriaguez», siguiendo la decisión auditada de mantener el giro idiomático y no resolverlo interpretativamente.
- source_word: וַיֵּדַע
  english_pob_choice: he knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - se enteró
  lexicon: HALOT
  rationale: En narrativa española, «supo» comunica bien el momento en que Noé llegó a saber lo ocurrido, con una fluidez cercana al hebreo sin perder el valor de conocimiento adquirido.
- source_word: אֵת אֲשֶׁר עָשָׂה ל֖וֹ
  english_pob_choice: what ... had done to him
  chosen_spanish: lo que le había hecho
  alternatives_spanish:
  - lo que le hizo
  - lo que habían hecho con él
  lexicon: HALOT
  rationale: La cláusula se traduce de forma genérica, preservando la ambigüedad del hebreo respecto del acto concreto; el pretérito pluscuamperfecto en español mantiene la anterioridad del hecho respecto al despertar.
- source_word: בְּנ֥וֹ הַקָּטָן
  english_pob_choice: his youngest son
  chosen_spanish: su hijo menor
  alternatives_spanish:
  - su hijo más joven
  - su hijo pequeño
  - su hijo menor de edad
  lexicon: HALOT
  rationale: «Menor» transmite en español la idea relacional de comparación de edad y deja abierta la posibilidad léxica de «más joven»/«más pequeño» sin imponer una precisión que el contexto inmediato no exige en la traducción.
theological_decisions:
- issue: Naturaleza del acto hecho a Noé
  english_pob_reading: Render the clause generically as 'what his youngest son had done to him' without specifying the act.
  chosen_spanish_reading: 'Traducir genéricamente: «lo que le había hecho», sin especificar el acto.'
  alternative_spanish_readings:
  - lo que le habían hecho
  - lo que su hijo menor había hecho contra él
  rationale: El hebreo solo afirma que Noé supo qué se le había hecho; no define el acto. La traducción española conserva esa tensión y evita introducir una interpretación sexual, legal o narrativa no explicitada por el verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Identidad de 'su hijo menor'
  english_pob_reading: Translate בְּנוֹ הַקָּטָן as 'his youngest son' in the main text.
  chosen_spanish_reading: Usar «su hijo menor» como referente principal de edad/orden familiar.
  alternative_spanish_readings:
  - su hijo más joven
  - su hijo pequeño
  rationale: La forma española «menor» es natural y suficientemente abierta para reflejar el valor contextual de קָטָן. No añade una precisión interpretativa ajena al verso ni fuerza una lectura distinta sobre el hijo en cuestión.
  doctrine_reference: Translation philosophy §1 and §3.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente; la redacción española sigue el estado más reciente del texto inglés auditado, que permaneció sin cambios tras la última revisión.
  spanish_consistency_notes:
  - Se mantiene «Noé» con la ortografía habitual en español.
  - Se conserva la metáfora/expresión hebrea «de su vino» en lugar de normalizarla como «de su embriaguez».
  - Se evita especificar el acto del v. 24, preservando la ambigüedad presente en el hebreo y en la auditoría inglesa.
  - «Su hijo menor» refleja el rango de edad sin decidir entre «más joven» y «pequeño».
