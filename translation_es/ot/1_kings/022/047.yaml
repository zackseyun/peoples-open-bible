translation:
  language: es
  text: Y expulsó del país al resto de los prostitutos del culto[a] que habían quedado en los días de Asa su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los prostitutos cúlticos». El hebreo קָדֵשׁ es un término masculino usado para personas involucradas en práctica sexual cultual ilícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo que quedaba de
  - el remanente de
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o permanece. En español, «el resto de» comunica naturalmente el conjunto remanente sin añadir matices no presentes en el hebreo.
- source_word: הַקָּדֵשׁ
  english_pob_choice: the cult prostitutes
  chosen_spanish: los qedeshim
  alternatives_spanish:
  - los prostitutos del culto
  - los hombres dedicados al culto sexual ilícito
  lexicon: HALOT
  rationale: El término hebreo es un masculino singular colectivo con carga cultual y sexual ilícita. Se conserva transliterado en el texto principal para no borrar esa tensión léxica ni imponer una paráfrasis más interpretativa; la nota explica la alternativa léxica documentada por la POB inglesa.
- source_word: אֲשֶׁר נִשְׁאַר
  english_pob_choice: who remained
  chosen_spanish: que habían quedado
  alternatives_spanish:
  - que permanecieron
  - que quedaron
  lexicon: HALOT
  rationale: El relativo identifica a los que seguían presentes desde antes. «Habían quedado» reproduce bien el valor resultativo/pasado del hebreo y suena natural en español.
- source_word: בִּימֵי אָסָא אָבִיו
  english_pob_choice: in the days of Asa his father
  chosen_spanish: en los días de Asa su padre
  alternatives_spanish:
  - durante los días de Asa su padre
  - desde los días de Asa su padre
  lexicon: HALOT
  rationale: La expresión marca el período temporal al que remite lo que quedaba. «En los días de» es una correspondencia directa y transparente.
- source_word: בִּעֵר
  english_pob_choice: he removed
  chosen_spanish: expulsó
  alternatives_spanish:
  - eliminó
  - quitó
  lexicon: HALOT
  rationale: בער puede abarcar la idea de remover, purgar o consumir según el contexto. Aquí, con el complemento «de la tierra», «expulsó» comunica con precisión la expulsión de personas del territorio sin sugerir indebidamente incendio o ejecución.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  lexicon: HALOT
  rationale: En este contexto geopolítico, הָאָרֶץ se refiere al territorio de Judá. «De la tierra» mantiene la referencia literal y coincide con el uso bíblico tradicional de la tierra como espacio nacional.
theological_decisions:
- issue: Conservación de la tensión moral y cultural de קָדֵשׁ
  english_pob_reading: 'the cult prostitutes; footnote: Or ''the male cult prostitutes.'' The Hebrew קָדֵשׁ is a masculine term used for persons involved in illicit cultic sexual practice.'
  chosen_spanish_reading: los qedeshim
  alternative_spanish_readings:
  - los prostitutos del culto
  - los hombres dedicados al culto sexual ilícito
  rationale: La POB inglesa documenta que el término es masculino y se refiere a práctica sexual cultual ilícita. Mantener la transliteración en el cuerpo evita suavizar o normalizar el referente y preserva la tensión léxica, mientras la nota recoge la opción alternativa explícitamente masculina.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el pasaje se mantiene en alta concordancia con la auditoría. La propuesta española sigue esa lectura sin ampliar ni suavizar el referente léxico de קָדֵשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparece en el original; aquí no aparece.
  - Se mantiene un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - La transliteración «qedeshim» se reserva para preservar la ambigüedad/precisión del hebreo en el texto principal, con explicación en nota.
