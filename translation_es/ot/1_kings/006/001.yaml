translation:
  language: es
  text: Y aconteció en el año cuatrocientos ochenta desde que los hijos[a] de Israel salieron de la tierra de Egipto, en el cuarto año, en el mes de Ziv[b], que es el segundo mes, del reinado de Salomón sobre Israel, fue cuando él edificó la casa para Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; muchas versiones traducen «los israelitas» o «el pueblo de Israel». Aquí se conserva el modo filial y corporativo del original.'
    reason: lexical_alternative
  - marker: b
    text: Ziv era el nombre antiguo del segundo mes en el calendario hebreo.
    reason: cultural_note
  - marker: c
    text: O «edificó la casa para el SEÑOR». El hebreo dice simplemente «edificó»; algunas traducciones ponen «comenzó a edificar» para hacer explícito el sentido contextual de inicio, pero eso no aparece en el verbo mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it came about
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una notificación cronológica. «Aconteció» conserva el tono formal y el giro de transición sin volverlo arcaico en exceso.
- source_word: בִּשְׁמוֹנִים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: in the four hundred eightieth year
  chosen_spanish: en el año cuatrocientos ochenta
  alternatives_spanish:
  - en el año 480
  - después de cuatrocientos ochenta años
  lexicon: HALOT
  rationale: El hebreo expresa un marcador cronológico exacto, no una duración vaga. En español, «en el año cuatrocientos ochenta» conserva la precisión y fluye mejor que una construcción más literal.
- source_word: לְצֵאת בְּנֵי יִשְׂרָאֵל מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: after the sons of Israel came out from the land of Egypt
  chosen_spanish: desde que los hijos de Israel salieron de la tierra de Egipto
  alternatives_spanish:
  - después de que los hijos de Israel salieron de la tierra de Egipto
  - desde la salida de los hijos de Israel de la tierra de Egipto
  lexicon: HALOT
  rationale: La construcción temporal con לְצֵאת se vierte naturalmente con «desde que... salieron», manteniendo el punto de referencia histórico. Se conserva «hijos de Israel» para reflejar el idioma filial del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» preserva el paralelismo y la textura genealógica/covenantal del hebreo, más cercana que una neutralización como «israelitas».
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra»; se mantiene en español por fidelidad histórica y porque el lugar, no solo el país, funciona como marco de origen.
- source_word: בַּשָּׁנָה הָרְבִיעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - durante el cuarto año
  lexicon: HALOT
  rationale: Es una datación regnal directa. «En el cuarto año» comunica el valor temporal sin añadir matices no explícitos.
- source_word: בְּחֹדֶשׁ זִו
  english_pob_choice: in the month of Ziv
  chosen_spanish: en el mes de Ziv
  alternatives_spanish:
  - en Ziv
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo del mes como dato histórico-cultural. «Mes de Ziv» es la forma más clara en español.
- source_word: הוּא הַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: that is, the second month
  chosen_spanish: que es el segundo mes
  alternatives_spanish:
  - es decir, el segundo mes
  - o sea, el segundo mes
  lexicon: HALOT
  rationale: La apposición explicativa se traduce de manera natural con «que es», manteniendo el carácter aclaratorio del hebreo.
- source_word: לִמְלֹךְ שְׁלֹמֹה עַל יִשְׂרָאֵל
  english_pob_choice: of Solomon’s reign over Israel
  chosen_spanish: del reinado de Salomón sobre Israel
  alternatives_spanish:
  - cuando Salomón reinaba sobre Israel
  - en el reinado de Salomón sobre Israel
  lexicon: HALOT
  rationale: La frase hebrea funciona como marco de datación. «Del reinado de Salomón sobre Israel» reproduce ese valor genitivo con claridad.
- source_word: וַיִּבֶן
  english_pob_choice: he built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente «edificó/construyó». «Edificó» mantiene la sobriedad formal y se ajusta al registro bíblico para el templo.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa». Se mantiene esa expresión, que en este contexto designa el templo, sin imponer de entrada una glosa interpretativa.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el SEÑOR
  - para Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de renderizar el nombre divino con «Yahvé», preservando el nombre de pacto en lugar de sustituirlo por una máscara tradicional.
theological_decisions:
- issue: Renderización del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino. Se evita la sustitución por «SEÑOR» porque el proyecto busca transparencia y auditabilidad; «Yahvé» comunica el nombre de pacto con dignidad y consistencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor del giro de datación con לְצֵאת בְּנֵי יִשְׂרָאֵל
  english_pob_reading: after the sons of Israel came out from the land of Egypt
  chosen_spanish_reading: desde que los hijos de Israel salieron de la tierra de Egipto
  alternative_spanish_readings:
  - después de que los hijos de Israel salieron de la tierra de Egipto
  - desde la salida de los hijos de Israel de la tierra de Egipto
  rationale: La referencia histórica se mantiene como punto de partida cronológico, sin convertirla en una paráfrasis teológica como «x años después del éxodo»; así se conserva la forma concreta del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evita introducir «comenzó a edificar» y se refleja el verbo hebreo de forma directa con «edificó». También se conserva el nombre mesiánico-divino según la política española del proyecto, sin ocultarlo tras una máscara litúrgica.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» de manera consistente para reflejar בְּנֵי יִשְׂרָאֵל.
  - «Yahvé» se usa para יהוה conforme al criterio del proyecto.
  - «Casa» se conserva donde el hebreo dice הַבַּיִת; el contexto permite entender que se trata del templo.
  - El orden sintáctico español se ajusta para fluidez, pero sin añadir contenido no explicitado por el hebreo.
