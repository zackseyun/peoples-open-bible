translation:
  language: es
  text: Hizo la cortina[a] de azul, púrpura, carmesí[b] y lino fino, y trabajó en ella querubines[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el velo».
    reason: lexical_alternative
  - marker: b
    text: O «escarlata» para «carmesí».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «e hizo subir sobre ella querubines», es decir, la decoró con figuras de querubines.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּרֹכֶת
  english_pob_choice: the curtain
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el cortinaje
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la cortina o separación interior del santuario. En español, «velo» mantiene la referencia cultual tradicional y conserva la alternativa documentada por el inglés POB; «cortina» sería más transparente, pero menos cargada litúrgicamente.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violeta
  - azul teñido
  lexicon: HALOT
  rationale: El término apunta a un material teñido de azul; «azul» comunica de forma natural la lista de materiales/colores, sin sobreespecificar el tinte.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - violeta
  lexicon: HALOT
  rationale: «Púrpura» preserva el matiz regio del término y funciona bien en la enumeración de textiles sagrados.
- source_word: כַרְמִיל
  english_pob_choice: crimson
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - rojo carmesí
  lexicon: HALOT
  rationale: El hebreo denota un material teñido de rojo; «carmesí» refleja bien el color y mantiene la distinción frente a otros rojos. Se conserva la alternativa tradicional «escarlata» en nota.
- source_word: בּוּץ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino fino tejido
  lexicon: HALOT
  rationale: בּוּץ alude a lino de calidad fina; «lino fino» preserva esa cualidad cultual de manera natural en español.
- source_word: וַיַּעַל עָלָיו כְּרוּבִים
  english_pob_choice: worked cherubim on it
  chosen_spanish: bordó sobre él querubines
  alternatives_spanish:
  - puso querubines sobre él
  - hizo subir querubines sobre él
  - trabajó querubines sobre él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hizo subir sobre él querubines», un idiomático de artesanía/decoración. «Bordó sobre él querubines» expresa el resultado artístico en español, sin perder la idea de que fueron aplicados sobre la tela; la alternativa más literal queda preservada en nota.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubes
  - cherubines
  lexicon: HALOT
  rationale: «Querubines» es el término bíblico natural en español y conserva la referencia técnica del mobiliario sagrado mejor que una forma coloquial.
theological_decisions:
- issue: 'Naturaleza del פָּרֹכֶת: velo o cortina'
  english_pob_reading: Or 'the veil.'
  chosen_spanish_reading: «el velo» con nota alternativa de «la cortina»
  alternative_spanish_readings:
  - la cortina
  - el cortinaje
  rationale: El POB inglés dejó explícita la tensión léxica entre un objeto de separación cultual y la denominación tradicional «veil». En español, «velo» conserva esa tradición y el registro litúrgico, mientras la nota permite la lectura más descriptiva.
  doctrine_reference: Éxodo 26:31-33; Levítico 16:2
- issue: Imagen artesanal de los querubines
  english_pob_reading: Literally, 'and he caused cherubim to go up on it,' that is, he decorated it with cherubim figures.
  chosen_spanish_reading: «bordó sobre él querubines» con nota de literalidad
  alternative_spanish_readings:
  - lo decoró con figuras de querubines
  - puso querubines sobre él
  rationale: La frase hebrea no describe movimiento literal de los querubines sino una acción de confección/ornamento. La traducción principal comunica el resultado artesanal sin borrar la literalidad; la nota conserva la imagen verbal del original y la explicación del POB.
  doctrine_reference: 1 Reyes 6:29-35; Éxodo 26:1
- issue: Terminología de los querubines
  english_pob_reading: cherubim
  chosen_spanish_reading: «querubines»
  alternative_spanish_readings:
  - querubes
  - cherubines
  rationale: Se mantiene el término bíblico técnico y se evita una forma más coloquial que podría debilitar la imaginería del templo.
  doctrine_reference: Génesis 3:24; Ezequiel 10:1-22
translation_notes:
  revision_awareness: El expediente inglés más reciente indica que no se requirieron cambios y que hubo alto acuerdo entre revisiones. La redacción española sigue esa línea estable, conservando las alternativas léxicas relevantes sin introducir nuevas interpretaciones.
  spanish_consistency_notes:
  - 'Se mantiene el orden de materiales del hebreo: azul, púrpura, carmesí y lino fino.'
  - Se conserva la imagen artesanal del verbo final sin convertirla en una paráfrasis libre.
  - Se usó «velo» por continuidad cultual, pero la nota preserva «cortina» como alternativa válida.
  - La puntuación y el ordenamiento de notas siguen el estilo de una edición bíblica de lectura pública.
