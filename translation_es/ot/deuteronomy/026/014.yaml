translation:
  language: es
  text: No he comido nada de ello mientras estaba de luto[a], y no he quitado[b] nada de ello estando impuro, y no he dado nada de ello para los muertos[c]. He obedecido la voz de Yahvé mi Dios; he hecho conforme a todo lo que me has mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en mi luto», «en tristeza» o «en aflicción».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he quemado nada de ello» o «he retirado nada de ello». El verbo hebreo puede referirse a quemar o a quitar.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para un muerto» o «en relación con los muertos»; el uso prohibido exacto no se especifica.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאֹנִי
  english_pob_choice: while in mourning
  chosen_spanish: mientras estaba de luto
  alternatives_spanish:
  - en mi luto
  - en mi tristeza
  - en aflicción
  lexicon: HALOT
  rationale: El sustantivo puede expresar duelo, tristeza o aflicción, pero en este contexto ritual la referencia más natural es el estado de luto. «Mientras estaba de luto» conserva el matiz temporal y evita volver demasiado abstracto el término.
- source_word: בִעַרְתִּי מִמֶּנּוּ
  english_pob_choice: removed any of it
  chosen_spanish: he apartado nada de ello
  alternatives_spanish:
  - he quemado nada de ello
  - he consumido nada de ello
  - he limpiado nada de ello
  lexicon: HALOT
  rationale: El verbo puede abarcar quemar, remover, consumir o limpiar/retirar. Como el contexto menciona impureza ritual, «he apartado» mantiene el sentido amplio de retirar o disponer de ello sin fijar indebidamente el modo exacto.
- source_word: בְּטָמֵא
  english_pob_choice: while unclean
  chosen_spanish: estando impuro
  alternatives_spanish:
  - en impureza
  - cuando estaba impuro
  - mientras estaba inmundo
  lexicon: HALOT
  rationale: La frase señala un estado de impureza ritual. «Estando impuro» suena natural en español y conserva la idea de estado, no solo de momento cronológico.
- source_word: לְמֵת
  english_pob_choice: for the dead
  chosen_spanish: para los muertos
  alternatives_spanish:
  - para un muerto
  - en conexión con los muertos
  - para un cadáver
  lexicon: HALOT
  rationale: El hebreo es breve y no precisa la práctica exacta prohibida. «Para los muertos» preserva esa amplitud y la ambigüedad sin especificar más de lo que permite el texto.
- source_word: שָׁמַעְתִּי בְּקוֹל
  english_pob_choice: I have obeyed the voice
  chosen_spanish: He obedecido la voz
  alternatives_spanish:
  - He escuchado la voz
  - He oído la voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a obediencia, no a mera audición. «He obedecido la voz» comunica bien el sentido pactal y conserva el objeto directo tal como lo presenta el original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» para no sustituirlo por un título.'
- source_word: כְּכֹל אֲשֶׁר צִוִּיתָנִי
  english_pob_choice: according to all that you commanded me
  chosen_spanish: conforme a todo lo que me has mandado
  alternatives_spanish:
  - según todo lo que me has mandado
  - de acuerdo con todo lo que me has mandado
  - tal como me has mandado
  lexicon: HALOT
  rationale: La fórmula expresa conformidad completa con el mandato. «Conforme a todo lo que me has mandado» es formal, claro y fiel al alcance total del hebreo.
theological_decisions:
- issue: Alcance de la expresión 'para los muertos'
  english_pob_reading: Retain the broader wording 'for the dead' without specifying funerary offering or corpse impurity.
  chosen_spanish_reading: Mantener «para los muertos» sin precisar rito funerario, ofrenda o contaminación por cadáver.
  alternative_spanish_readings:
  - para un muerto
  - para ritos funerarios
  - en relación con los muertos
  rationale: El hebreo no define con exactitud la práctica prohibida. Conservar la expresión amplia evita resolver una tensión textual que el original deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se mantiene la decisión de traducir el Tetragrámaton como «Yahvé» y de conservar la amplitud de «para los muertos».
  spanish_consistency_notes:
  - Se conserva la primera persona singular y el paralelismo de las tres prohibiciones con una cadencia natural en español.
  - «Yahvé mi Dios» mantiene el nombre divino del texto fuente y su relación posesiva.
  - La elección de «obedecido» refleja el hebreo idiomático שמע בקול y evita una traducción meramente auditiva.
  - Se evita la sustitución por vocabulario eclesiástico tradicional cuando el hebreo requiere un término más preciso o más amplio.
