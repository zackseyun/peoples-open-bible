translation:
  language: es
  text: Muchos hombres proclaman su propia lealtad[a], pero ¿quién puede hallar a un hombre fiel?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Muchas personas proclaman, cada una, su propia lealtad». El hebreo חַסְדּוֹ también puede significar «fidelidad», «bondad» o «amor constante».
    reason: lexical_alternative
  - marker: b
    text: O «un hombre confiable». El hebreo אֱמוּנִים denota fidelidad o confiabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָב אָדָם
  english_pob_choice: Many a man
  chosen_spanish: Muchos hombres
  alternatives_spanish:
  - Muchas personas
  - Muchos seres humanos
  - Muchos hombres, cada uno
  lexicon: HALOT
  rationale: 'La expresión hebrea es distributiva y proverbial: no habla de una multitud específica, sino de una generalización. En español, ''Muchos hombres'' comunica de forma natural ese valor genérico sin perder el tono sapiencial. Se conserva ''hombres'' como representante humano masculino genérico en la forma proverbial, coherente con la fuerza idiomática del original.'
- source_word: יִקְרָא
  english_pob_choice: proclaims
  chosen_spanish: proclaman
  alternatives_spanish:
  - llaman
  - declaran
  - afirman
  lexicon: HALOT
  rationale: Aquí קרא no es solo 'llamar', sino anunciar públicamente o presentar algo de sí mismo. 'Proclaman' reproduce mejor la nota de autoafirmación pública que el contexto sugiere.
- source_word: אִישׁ חַסְדּוֹ
  english_pob_choice: his own loyalty
  chosen_spanish: su lealtad
  alternatives_spanish:
  - su fidelidad
  - su bondad
  - su amor constante
  lexicon: HALOT
  rationale: En este proverbio חֶסֶד se refiere mejor a la lealtad o fidelidad que una persona se atribuye a sí misma. 'Lealtad' evita una lectura excesivamente cultual o abstracta de 'amor constante' y sigue de cerca la revisión inglesa más reciente.
- source_word: וְאִישׁ אֱמוּנִים
  english_pob_choice: a faithful man
  chosen_spanish: un hombre fiel
  alternatives_spanish:
  - un hombre de fidelidad
  - un hombre confiable
  - un hombre digno de confianza
  lexicon: HALOT
  rationale: אֱמוּנִים denota fidelidad, confiabilidad y firmeza. 'Hombre fiel' es la equivalencia más directa y natural en español, y mantiene el contraste moral con la autoalabanza del primer hemistiquio.
- source_word: מִי יִמְצָא
  english_pob_choice: who can find
  chosen_spanish: ¿quién puede hallar?
  alternatives_spanish:
  - ¿quién hallará?
  - ¿quién encuentra?
  - ¿quién puede encontrar?
  lexicon: HALOT
  rationale: La pregunta retórica expresa dificultad o rareza. '¿Quién puede hallar?' conserva esa fuerza sin convertirla en un simple futuro.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto proverbial de autoevaluación
  english_pob_reading: '''loyalty'' rather than covenantal ''steadfast love'' in this verse'
  chosen_spanish_reading: '''lealtad'''
  alternative_spanish_readings:
  - '''amor constante'''
  - '''bondad'''
  - '''fidelidad'''
  rationale: El contexto no describe el amor pactual de Yahvé, sino la virtud que los hombres se atribuyen a sí mismos. Por eso 'lealtad' expresa mejor la auto-presentación moral del proverbio y evita sobrecargar el término con un sentido teológico más estrecho que aquí no se exige.
  doctrine_reference: Proverbs 20:6; lexical context of חֶסֶד in wisdom literature
- issue: Valor de אֱמוּנִים como rasgo ético raramente hallado
  english_pob_reading: '''faithful man'' / ''trustworthy man'''
  chosen_spanish_reading: '''hombre fiel'''
  alternative_spanish_readings:
  - '''hombre confiable'''
  - '''hombre digno de confianza'''
  - '''hombre de fidelidad'''
  rationale: La construcción presenta una cualidad rara y valiosa, no solo una capacidad social. 'Fiel' mantiene el equilibrio entre fidelidad moral y confiabilidad práctica, y funciona bien en un proverbio de contraste.
  doctrine_reference: Proverbs 20:6; wisdom anthropology
- issue: Registro proverbial y generalizante de אָדָם
  english_pob_reading: generic 'man' in proverb
  chosen_spanish_reading: '''hombres'''
  alternative_spanish_readings:
  - '''personas'''
  - '''gente'''
  rationale: Aunque 'personas' sería más inclusivo, el hebreo usa אָדָם dentro de una forma proverbial de alcance general. 'Hombres' mantiene la huella idiomática del original y sigue siendo claro en español bíblico contemporáneo.
  doctrine_reference: Proverbs 20:6; generic human reference in Hebrew wisdom sayings
translation_notes:
  revision_awareness: La versión inglesa revisó 'steadfast love' a 'loyalty' para reflejar mejor חַסְדּוֹ en este proverbio. La redacción española sigue esa revisión con 'lealtad' y mantiene el contraste con 'hombre fiel', sin convertir el segundo miembro en una simple repetición del primero.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general, pero este versículo no lo menciona.
  - Se usó 'hombre'/'hombres' para preservar el paralelismo proverbial y la referencia genérica del hebreo.
  - No se empleó 'Cristo' ni terminología eclesiástica ajena al texto sapiencial.
  - 'El nivel de equivalencia es óptimo: bastante literal en la estructura, pero con español natural en la pregunta retórica y el verbo de proclamación.'
