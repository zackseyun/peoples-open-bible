review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: una prohibición cultual de acercarse para el servicio sacerdotal a cualquier varón con defecto físico. Sin embargo, hay dos problemas importantes: (1) el texto principal omite la negación explícita de לֹא יִקְרָב, ya que «ningún hombre… se acercará» suena aceptable en español pero pierde fuerza y además la decisión léxica interna contradice el texto; y (2) las notas no preservan adecuadamente las alternativas documentadas para חָרֻם y מוּם, y la nota anclada al rostro desfigurado no corresponde exactamente a la evidencia inglesa, que distingue la rareza del término y su posible referencia específica a la nariz/rostro.'
  spanish_quality_summary: 'El español es legible y digno, pero conviene pulirlo para mayor precisión y naturalidad: «que tenga un defecto» suena mejor que «que tenga defecto», y «uno con una extremidad demasiado larga» resulta más natural y anatómicamente claro que «miembro demasiado largo», que en español puede sonar ambiguo. La colocación de notas también debe ajustarse para que cada nota ancle al término pertinente.'
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. Las decisiones sobre «hombre», «defecto», «se acercará», «ciego» y «cojo» son básicamente adecuadas al contexto sacerdotal masculino. La principal necesidad es alinear mejor las notas léxicas con la auditoría inglesa y preservar la distinción entre la nota sobre מוּם/«defecto», la nota cultual sobre «acercarse», la rareza y posible especificidad de חָרֻם, y la desproporción física de שָׂרוּעַ.
  issues:
  - severity: high
    issue: Falta la negación explícita en la decisión léxica y el texto puede mejorarse para reflejar לֹא יִקְרָב con total claridad.
    rationale: El hebreo dice literalmente que no se acercará. Aunque «ningún hombre… se acercará» puede comunicarlo, la propia ficha léxica ofrece «se acercará» como elección, lo cual es inconsistente. Añadir «ningún hombre… se acercará» con redacción más precisa mantiene el sentido; la inconsistencia exige revisión editorial.
  - severity: medium
    issue: La nota [a] está mal formulada como alternativa de «defecto».
    rationale: Decir «O «defecto»» no aporta alternativa real; el inglés dice «Or 'blemish'». En español debe ofrecer una alternativa como «imperfección» o «tara/blemish» según registro. «Imperfección» es más natural y no trivializa el sentido físico.
  - severity: medium
    issue: Falta una nota específica para חָרֻם sobre la posible referencia a la nariz o al rostro.
    rationale: La auditoría inglesa conserva una nota separada indicando que el término es raro y puede referirse más específicamente a una nariz dañada o malformada. Esa matización debe preservarse en español.
  - severity: low
    issue: «Miembro demasiado largo» puede sonar ambiguo en español.
    rationale: «Miembro» en español contemporáneo puede entenderse de formas no deseadas. «Extremidad demasiado larga» o «una extremidad desproporcionada» es más clara y digna.
