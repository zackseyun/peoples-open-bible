translation:
  language: es
  text: y serán vida para tu alma[a] y gracia[b] para tu cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Alma» puede también entenderse como «vida», «ser» o «interior»; se conserva «alma» por su amplitud antropológica y por el paralelismo con el hebreo נֶפֶשׁ.
    reason: lexical_alternative
  - marker: b
    text: O «favor» para «gracia» (hebreo חֵן), enfatizando el atractivo o la estima más que solo la gracia en sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִֽהְי֣וּ
  english_pob_choice: and they will be
  chosen_spanish: y serán
  alternatives_spanish:
  - y estarán
  - entonces serán
  lexicon: HALOT
  rationale: El imperfecto qal con prefijo conjuntivo expresa aquí un resultado futuro; en español, «serán» comunica de manera natural la relación consecutiva con el contexto anterior.
- source_word: חַיִּ֣ים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque la forma es plural, funciona como sustantivo abstracto. «Vida» conserva el valor idiomático y evita una pluralización extraña en español.
- source_word: לְ/נַפְשֶׁ֑/ךָ
  english_pob_choice: to your soul
  chosen_spanish: para tu alma[a]
  alternatives_spanish:
  - para tu vida
  - para ti
  - para tu ser
  lexicon: HALOT
  rationale: «Alma» mantiene la amplitud antropológica de נֶפֶשׁ y la fuerza tradicional del paralelismo, sin reducirlo solo a vida física. Se usa «para» porque el hebreo ל aquí marca beneficio o destino más que dirección espacial.
- source_word: וְ֝/חֵ֗ן
  english_pob_choice: and grace
  chosen_spanish: y gracia
  alternatives_spanish:
  - y favor
  - y encanto
  - y belleza
  lexicon: HALOT
  rationale: «Gracia» reproduce bien חֵן en un contexto sapiencial donde la cualidad resulta atractiva y valiosa. «Favor» sería posible, pero en español desdibuja la imagen de ornamento implícita en el paralelo.
- source_word: לְ/גַרְגְּרֹתֶֽי/ךָ
  english_pob_choice: to your neck
  chosen_spanish: para tu cuello
  alternatives_spanish:
  - para tu garganta
  - para tu cuello y garganta
  lexicon: HALOT
  rationale: El término puede referirse literalmente a la garganta/cuello, pero en este paralelismo sapiencial alude al adorno del cuello. «Cuello» es la opción más natural en español para preservar la imagen.
translation_notes:
  revision_awareness: 'El texto coincide con el estado auditado más reciente (sin cambios requeridos) y sigue la lectura inglesa de alta concordancia: vida para נֶפֶשׁ, gracia para חֵן, y una metáfora corporal conservada para גַרְגְּרֹת.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - Se mantiene un tono sobrio y bíblico, pero con sintaxis española natural.
  - «Cuello» se usa como equivalente idiomático del campo semántico de garganta/cuello en el paralelismo de Proverbios.
