  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: un macho cabrío/cabra para ofrenda por el pecado, adicional al holocausto continuo/regular, con su ofrenda de grano y sus libaciones. Sin embargo, hay un desajuste importante en las notas: la nota [a] en español está anclada a שְׂעִיר, pero en el rastro inglés la nota [a] pertenece a una alternativa de עֹלַת הַתָּמִיד (''the continual burnt offering''), mientras que la alternativa sobre ''libations'' no fue preservada en español. Conviene realinear las notas con las decisiones auditadas.'
