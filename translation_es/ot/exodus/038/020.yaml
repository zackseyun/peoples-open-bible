translation:
  language: es
  text: Y todas las estacas para el tabernáculo y para el atrio de alrededor eran de bronce[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobre». El hebreo נְחֹשֶׁת puede designar cobre o bronce según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: And all
  chosen_spanish: Y todas
  alternatives_spanish:
  - Y todos
  lexicon: HALOT
  rationale: El hebreo introduce una totalidad colectiva; con el sustantivo femenino plural "las estacas", en español concuerda naturalmente "todas". Se conserva el valor conjuntivo de וְ con "Y".
- source_word: הַיְתֵדֹת
  english_pob_choice: the pegs
  chosen_spanish: las estacas
  alternatives_spanish:
  - las clavijas
  - los postes
  lexicon: HALOT
  rationale: יָתֵד puede abarcar piezas clavadas para sujetar una estructura. En español, "estacas" comunica bien la función de sujeción y encaja con el contexto del tabernáculo sin perder la idea de pieza hincada en tierra.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: for the tabernacle
  chosen_spanish: para el tabernáculo
  alternatives_spanish:
  - para la Morada
  - para la tienda del tabernáculo
  lexicon: HALOT
  rationale: '"Tabernáculo" es el término tradicional y claro para מִשְׁכָּן en Éxodo. Mantiene la identificación referencial sin añadir paráfrasis.'
- source_word: וְלֶחָצֵר
  english_pob_choice: and for the courtyard
  chosen_spanish: y para el atrio
  alternatives_spanish:
  - y para el patio
  - y para la corte
  lexicon: HALOT
  rationale: חָצֵר en el contexto del santuario se refiere al recinto exterior; "atrio" es el término bíblico y eclesiástico más reconocido en español, y resulta más preciso que "patio" o "corte".
- source_word: סָבִיב
  english_pob_choice: surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - circundante
  lexicon: HALOT
  rationale: El adverbio indica la disposición envolvente del atrio. En español, "alrededor" conserva esa relación espacial de manera natural sin forzar la sintaxis.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: En el contexto de los materiales del tabernáculo, la POB inglesa eligió "bronze". En español, "bronce" es la correspondencia natural y establecida; "cobre" sigue siendo una alternativa léxica posible, pero menos adecuada para este contexto.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente en la estructura y el sentido general; no se registran revisiones sustantivas. Se mantuvo la totalidad colectiva, la localización del santuario y del atrio, y la alternativa metalúrgica documentada.
  spanish_consistency_notes:
  - Se conservó "tabernáculo" como término técnico estable, en vez de sustituirlo por una paráfrasis.
  - '"Atrio" se eligió por su valor bíblico tradicional y su claridad en español.'
  - La nota de bronce/cobre se incluyó porque el hebreo admite ambas posibilidades léxicas en contextos materiales.
