base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/017.yaml
  text: Then Naaman said[a], “If not, please let there be given to your servant a load of earth, as much as a pair of mules can carry; for your servant will no longer offer burnt offering or sacrifice to other gods[c][b], but only to Yahweh.”
  footnotes:
  - marker: a
    text: Or “the load of a pair of mules” or “two mules’ load.” The Hebrew phrase refers to as much soil as a pair of mules could carry.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the LORD” represents the divine name YHWH; alternatively transliterated “Yahweh.”
    reason: alternative_reading
  - marker: c
    text: Naaman’s request for Israelite soil may reflect the ancient association of a deity with a land, or a desire to worship the LORD on Israelite earth; the text does not state the reason explicitly.
    reason: cultural_note
  ai_draft:
    model_id: gpt-5.4
