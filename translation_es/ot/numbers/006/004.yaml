translation:
  language: es
  text: Todos los días de su voto de nazireo, no comerá nada que provenga de la vid, desde las semillas hasta la piel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde las semillas hasta la piel», una manera de decir todas las partes de la uva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Durante todos los días de
  - A lo largo de todos los días de
  lexicon: HALOT
  rationale: La expresión marca toda la duración del voto. «Todos los días de» conserva la estructura formal del hebreo y su sentido temporal completo en español natural.
- source_word: נִזְרוֹ
  english_pob_choice: his Nazirite vow
  chosen_spanish: su voto de nazareo
  alternatives_spanish:
  - su separación nazarea
  - su consagración nazarea
  lexicon: HALOT
  rationale: En este contexto legal de Números 6, el sustantivo designa la institución concreta del nazareato, no solo una idea general de consagración. «Voto de nazareo» es claro y técnico en español, y mantiene el referente institucional.
- source_word: מִכֹּל אֲשֶׁר יֵעָשֶׂה
  english_pob_choice: anything that is made
  chosen_spanish: nada que provenga de
  alternatives_spanish:
  - nada que se haga de
  - nada hecho de
  lexicon: HALOT
  rationale: El hebreo introduce una clase de prohibidos mediante una construcción amplia; en español, «nada que provenga de» comunica de forma natural la idea de cualquier producto derivado, sin reducir indebidamente el alcance.
- source_word: מִגֶּפֶן הַיַּיִן
  english_pob_choice: from the grapevine
  chosen_spanish: de la vid
  alternatives_spanish:
  - de la vid de la uva
  - de la vid del vino
  lexicon: HALOT
  rationale: La frase hebrea es idiomática. «Vid» comunica la planta en español bíblico y moderno sin el calco torpe «vid del vino». En este contexto, la vid es la de la uva, ya implícita en el pasaje.
- source_word: מֵחַרְצַנִּים וְעַד זָג
  english_pob_choice: from the seeds to the skin
  chosen_spanish: desde las semillas hasta la piel
  alternatives_spanish:
  - desde las pepas hasta la piel
  - desde las semillas hasta la cáscara
  lexicon: HALOT
  rationale: El hebreo usa una merismo para abarcar todas las partes de la uva. «Semillas» es la opción más transparente y ampliamente entendible; «piel» traduce de manera natural זָג en español, aunque «cáscara» también sería posible en otro registro.
- source_word: לֹא יֹאכֵל
  english_pob_choice: he shall not eat
  chosen_spanish: no comerá
  alternatives_spanish:
  - no debe comer
  - no podrá comer
  lexicon: HALOT
  rationale: La prohibición legal del imperfecto hebreo se expresa bien con futuro de mandato en español. «No comerá» preserva el tono jurídico y el carácter absoluto del mandato.
theological_decisions:
- issue: Alcance del voto nazareo como institución específica
  english_pob_reading: Nazirite vow
  chosen_spanish_reading: voto de nazareo
  alternative_spanish_readings:
  - separación nazarea
  - consagración nazarea
  rationale: La decisión evita diluir el término en una idea general de santidad. En Números 6 el pasaje habla de una condición ritual definida; por eso se conserva el nombre técnico de la institución.
  doctrine_reference: Números 6:1-21; Nm 6:4
- issue: Alcance total de la prohibición sobre la vid
  english_pob_reading: from the seeds to the skin
  chosen_spanish_reading: desde las semillas hasta la piel
  alternative_spanish_readings:
  - desde las pepas hasta la piel
  - desde las semillas hasta la cáscara
  rationale: El hebreo expresa una cobertura total mediante merismo. La traducción conserva esa amplitud sin introducir una explicación interpretativa que atenúe la prohibición.
  doctrine_reference: Números 6:3-4
translation_notes:
  revision_awareness: El inglés POB fue revisado para eliminar el innecesario 'even' y dejar simplemente 'from the seeds to the skin'. La redacción española sigue esa revisión con «desde las semillas hasta la piel», sin añadir intensificadores ajenos al hebreo.
  spanish_consistency_notes:
  - Se mantiene «nazareo» como término técnico para el nazareato, en coherencia con el contexto legal de Números 6.
  - Se evita reemplazar la vid por una paráfrasis más explicativa que borre la forma idiomática del original.
  - La negación legal se expresa con futuro simple («no comerá») para conservar el tono normativo del pasaje.
  - La nota conserva el valor merístico de la expresión hebrea sin convertirla en comentario interpretativo amplio.
