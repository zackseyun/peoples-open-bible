revisions:
- from: Y Judas y su campamento se volvió de repente por el camino hacia el desierto, hacia Bosor; y capturó la ciudad, y mató a todo varón[a] con la boca de la espada, y tomó todos sus despojos, y la incendió con fuego.
  to: Y Judas y su campamento se volvieron de repente por el camino hacia el desierto, en dirección a Bosor; y capturó la ciudad, y mató a todo varón a filo de espada[a], y tomó todos sus despojos, y la incendió con fuego.
  rationale: Se corrige la concordancia verbal con el sujeto compuesto y se reemplaza el calco «con la boca de la espada» por el idiomático español «a filo de espada», manteniendo la literalidad griega en nota, en línea con la decisión auditada del POB. También se aligera levemente la frase direccional sin perder los componentes del original.
