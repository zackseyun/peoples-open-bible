  source_alignment_summary: 'El borrador acierta en la estructura interrogativa, en «encontró su lugar» y en la personificación implícita de la Sabiduría. Sin embargo, no preserva bien la decisión léxica principal sobre τοὺς θησαυροὺς: con εἰσῆλθεν εἰς, el sentido locativo «tesorerías/depósitos/tesoros guardados» es preferible al de «tesoros» como objetos. La nota al pie además invierte la preferencia documentada en el rastro inglés.'
  spanish_quality_summary: El español es claro y natural, pero «entró en sus tesoros» suena semánticamente extraño en español, porque normalmente se entra en un lugar, no en objetos valiosos. Una formulación como «sus depósitos» o «sus tesorerías» mejora la inteligibilidad y refleja mejor la sintaxis griega.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La personificación femenina de la Sabiduría se conserva adecuadamente con «su/sus». El ajuste necesario es léxico-sintáctico en θησαυρούς, no terminológico-teológico.
  issues:
  - severity: high
    issue: «sus tesoros» no refleja bien el sentido locativo de τοὺς θησαυροὺς con εἰσῆλθεν εἰς
    rationale: El griego habla de entrar «en» los θησαυροί; por eso el POB inglés eligió «treasuries» y no «treasures». En español, «entró en sus tesoros» resulta poco natural y debilita la imagen de lugar/depósito presente en la fuente.
  - severity: high
    issue: La nota al pie contradice la racionalidad documentada del POB inglés
    rationale: 'La nota española dice que se prefiere «sus tesoros» por ser más natural en español, pero el expediente inglés documenta la preferencia contraria: «treasuries» porque el verbo exige entrada a un lugar.'
  - severity: medium
    issue: La alternativa de nota al pie no aporta una distinción útil si el texto principal ya usa la lectura menos fiel
    rationale: Conviene poner en el texto principal una opción locativa natural en español y dejar «tesoros» como alternativa, tal como exige el rango semántico del griego.
  revised_spanish_text: ¿Quién encontró su lugar[a], y quién entró en sus depósitos?
