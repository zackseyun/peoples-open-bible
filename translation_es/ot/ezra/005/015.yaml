    issue: «le dijo a él» es un calco poco natural
    rationale: El arameo expresa el complemento indirecto, pero en español «le dijo» ya lo incorpora normalmente. Añadir «a él» introduce énfasis no exigido por el contexto y reduce la fluidez.
  - severity: medium
    issue: Falta la nota de alternativa para «en su sitio»
    rationale: El English POB conserva una alternativa léxica importante para עַל אַתְרֵהּ («be built on its place») y explica que la expresión enfatiza la reconstrucción en su ubicación propia. Esa información debe preservarse en español con nota anclada.
