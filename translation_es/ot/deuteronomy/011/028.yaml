revisions:
- from: y la maldición[a], si no escuchan los mandamientos de Yahvé su Dios, y se apartan del camino que yo les mando hoy, para ir tras otros dioses que no han conocido.
  to: y la maldición[a], si no escuchan los mandamientos de Yahvé su Dios, y se apartan del camino que yo les ordeno hoy, para ir tras otros dioses que no han conocido.
  rationale: Se conserva la decisión principal «escuchan» con su nota léxica, pero se ajusta «les mando hoy» a «les ordeno hoy» para representar mejor el participio hebreo y evitar ambigüedad en español. El resto del verso está bien alineado con el hebreo y la terminología del proyecto.
