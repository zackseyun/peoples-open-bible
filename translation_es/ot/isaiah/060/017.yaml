base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/017.yaml
  text: Instead of bronze I will bring gold[a], and instead of iron I will bring silver; instead of wood, bronze, and instead of stones, iron. And I will make peace your overseer[c][b], and righteousness your ruler.
  footnotes:
  - marker: a
    text: Or 'your administration' / 'your officers' for 'your overseers.' The Hebrew term can refer to oversight, office, or officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.' The Hebrew צְדָקָה can denote either moral righteousness or justice in public order.
    reason: lexical_alternative
  - marker: c
    text: Or 'your rulers' / 'your oppressors' for 'your taskmasters.' The Hebrew term often refers to those who exact labor or tribute.
    reason: lexical_alternative
