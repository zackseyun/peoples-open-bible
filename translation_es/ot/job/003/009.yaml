translation:
  language: es
  text: Que se oscurezcan las estrellas de su crepúsculo[a]; que espere la luz, pero no haya ninguna; y que no vea los párpados[b] del alba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las estrellas de su ocaso’. El hebreo puede referirse al crepúsculo, especialmente al crepúsculo vespertino.
    reason: lexical_alternative
  - marker: b
    text: Literalmente ‘los párpados del alba’, una imagen poética hebrea para la primera aparición de la luz de la mañana.
    reason: cultural_note
lexical_decisions:
- source_word: יֶחְשְׁכוּ
  english_pob_choice: be dark
  chosen_spanish: Sean oscuras
  alternatives_spanish:
  - se oscurezcan
  - sean tenebrosas
  lexicon: HALOT
  rationale: 'En este contexto de maldición optativa, el imperfecto/jusivo expresa deseo: una forma exhortativa con ''sean oscuras'' reproduce bien la fuerza volitiva sin sonar mecánica.'
- source_word: כּוֹכְבֵי
  english_pob_choice: the stars of
  chosen_spanish: las estrellas de
  alternatives_spanish:
  - las estrellas
  lexicon: HALOT
  rationale: El constructo hebreo exige una relación posesiva/de complemento; en español 'las estrellas de' conserva esa dependencia y la imagen poética.
- source_word: נִשְׁפּוֹ
  english_pob_choice: its twilight
  chosen_spanish: su crepúsculo
  alternatives_spanish:
  - su ocaso
  - su penumbra
  lexicon: HALOT
  rationale: El término apunta a la luz de transición, sobre todo vespertina. 'Crepúsculo' transmite mejor el registro poético que 'dusk' traducido de modo más literal, y mantiene la referencia al tiempo liminar.
- source_word: יְקַו
  english_pob_choice: may it wait
  chosen_spanish: espere
  alternatives_spanish:
  - aguarde
  - espere con ansias
  lexicon: HALOT
  rationale: קוה puede expresar esperar o aguardar. En español, el subjuntivo exhortativo 'espere' reproduce la expectativa frustrada sin sobrecargarlo de matiz psicológico.
- source_word: לְאוֹר
  english_pob_choice: for light
  chosen_spanish: la luz
  alternatives_spanish:
  - para la luz
  - por la luz
  lexicon: HALOT
  rationale: Aunque el hebreo lleva preposición, en español el régimen natural tras 'esperar' permite 'espere la luz' sin perder el sentido. La imagen básica de 'luz' debe mantenerse.
- source_word: וָאַיִן
  english_pob_choice: but there be none
  chosen_spanish: pero no haya ninguna
  alternatives_spanish:
  - pero no exista ninguna
  - y no haya nada
  lexicon: HALOT
  rationale: La fórmula expresa la frustración de la espera. 'No haya ninguna' conserva el giro optativo negativo del hebreo y encaja con el tono elevado del verso.
- source_word: וְאַל יִרְאֶה
  english_pob_choice: and may it not see
  chosen_spanish: y no vea
  alternatives_spanish:
  - y no contemple
  - y no llegue a ver
  lexicon: HALOT
  rationale: אַל + imperfecto funciona como prohibición/deseo negativo. 'No vea' mantiene la fuerza jussiva y el paralelismo poético.
- source_word: בְּעַפְעַפֵּי
  english_pob_choice: the eyelids of
  chosen_spanish: las pestañas de
  alternatives_spanish:
  - los párpados de
  - las pestañas del
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'párpados/eyelids de'. En español, 'pestañas' o 'párpados' serían ambos posibles; 'pestañas' se acerca más al recurso figurado de la POB inglesa, aunque la imagen sigue siendo metafórica y no anatómica en sentido estricto.
- source_word: שָׁחַר
  english_pob_choice: dawn
  chosen_spanish: el alba
  alternatives_spanish:
  - la aurora
  - la mañana
  lexicon: HALOT
  rationale: '''שחר'' designa el amanecer. ''Alba'' es una equivalencia natural, solemne y poética en español, adecuada para conservar la imagen de la primera luz.'
theological_decisions:
- issue: Imprecatory/jussive force of the verse
  english_pob_reading: May ... may ... and may it not ...
  chosen_spanish_reading: Sean ... espere ... y no vea ...
  alternative_spanish_readings:
  - Que sean ... que espere ... y que no vea ...
  - Deseo que sean ...
  rationale: El hebreo usa formas volitivas sucesivas en contexto de maldición. El español necesita mantener ese tono desiderativo; el subjuntivo exhortativo logra mejor la cadencia que una simple descripción.
  doctrine_reference: Poética imprecatoria; gramática verbal hebrea (jussive/negative jussive)
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y la auditoría inglesa, conservando la imagen poética y el paralelismo volitivo. Se ajustó la sintaxis para un español bíblico natural, manteniendo la tensión lexical entre la lectura temporal de נִשְׁפּוֹ y la metáfora de ‘las pestañas del alba’.
  spanish_consistency_notes:
  - Se mantuvo 'alba' como equivalente poético de שָׁחַר, coherente con un registro bíblico digno.
  - Se evitó 'SEÑOR' o fórmulas de sustitución porque el verso no contiene el Tetragrámaton ni un referente divino explícito.
  - Se conservó la imagen corporal 'pestañas' como calco controlado de la metáfora hebrea, con nota explicativa para lectores hispanos.
