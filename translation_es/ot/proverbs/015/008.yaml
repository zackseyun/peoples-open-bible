translation:
  language: es
  text: El sacrificio de los impíos es una abominación para Yahvé[a], pero la oración de los rectos es su deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su favor' o 'aceptable para él'. El sustantivo hebreo puede denotar placer, favor o aceptación.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: HALOT
  rationale: En este proverbio, זֶבַח designa una ofrenda sacrificial; 'sacrificio' conserva la categoría cultual y el contraste formal con 'oración'. 'Ofrenda' sería posible, pero es más general y debilita el paralelismo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural refiere a personas moralmente culpables. 'Impíos' es natural en español bíblico y mantiene la fuerza moral y religiosa del término.
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo abominable
  lexicon: HALOT
  rationale: El término expresa fuerte rechazo moral y de pacto. 'Una abominación' preserva mejor esa intensidad que un adjetivo más suave.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según la política POB. En español, 'Yahvé' comunica el Tetragrámaton sin sustituirlo por un título.
- source_word: תְפִלַּת
  english_pob_choice: the prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  lexicon: HALOT
  rationale: La forma constructa pide 'la oración de'. 'Oración' es el equivalente directo y claro en español moderno, manteniendo el tono proverbial.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: יְשָׁרִים describe a los que son rectos/íntegros moralmente. 'Los rectos' refleja bien la imagen de rectitud sin desplazarla a un matiz forense más específico.
- source_word: רְצוֹנוֹ
  english_pob_choice: his delight
  chosen_spanish: su deleite
  alternatives_spanish:
  - su favor
  - lo que le agrada
  - es aceptable para él
  lexicon: HALOT
  rationale: El sustantivo puede significar placer, favor o aceptación. En este paralelismo antitético con 'abominación', 'su deleite' reproduce con claridad el contraste sin añadir contenido ajeno al hebreo.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española conserva el nombre propio para evitar la sustitución por un título y mantener la transparencia auditiva y textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Fuerza del segundo hemistiquio: רְצוֹנוֹ'
  english_pob_reading: is his delight
  chosen_spanish_reading: es su deleite
  alternative_spanish_readings:
  - es aceptable para él
  - goza de su favor
  rationale: El hebreo deja la cópula implícita. 'Es su deleite' preserva el contraste nítido con 'abominación' y refleja el rango semántico de רָצוֹן sin debilitarlo a una mera idea de aprobación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text plain sense'
translation_notes:
  revision_awareness: Alineado con el paquete fuente y el audit trail inglés; no se registran revisiones aplicadas y el último repaso indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar POB.
  - Se usa 'los impíos' y 'los rectos' para conservar el paralelismo proverbial y evitar diluir los contrastes ético-religiosos.
  - '''Su deleite'' responde al valor semántico amplio de רָצוֹן y al paralelismo antitético con ''abominación''.'
