translation:
  language: es
  text: pero tú has andado en el camino de los reyes de Israel, y has hecho que Judá y los habitantes de Jerusalén se prostituyeran,[a] como la casa de Acab[b] hizo que se prostituyeran; y también has matado a tus hermanos de la casa de tu padre, que eran mejores que tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''hiciste que Judá y los habitantes de Jerusalén se prostituyeran''; el hebreo usa aquí el verbo זנה, una metáfora profética de infidelidad al pacto, frecuentemente expresada en idolatría.'
    reason: lexical_alternative
  - marker: b
    text: '''La casa de Acab'' se refiere a la dinastía gobernante de Acab.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶךְ בְּדֶרֶךְ
  english_pob_choice: have walked in the way of
  chosen_spanish: has andado en el camino de
  alternatives_spanish:
  - has caminado en el camino de
  - has seguido los caminos de
  lexicon: HALOT
  rationale: La imagen hebrea de 'andar en el camino de' expresa conducta y patrón de vida. 'Has andado' conserva el giro idiomático sin sonar forzado en español.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the kings of Israel
  chosen_spanish: los reyes de Israel
  alternatives_spanish:
  - los monarcas de Israel
  lexicon: HALOT
  rationale: Se mantiene la referencia histórica directa y el contraste entre Israel y Judá.
- source_word: וַתַּזְנֶה אֶת יְהוּדָה וְאֶת יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: have caused Judah and the inhabitants of Jerusalem to prostitute themselves
  chosen_spanish: has hecho que Judá y los habitantes de Jerusalén se prostituyeran
  alternatives_spanish:
  - has causado que Judá y los habitantes de Jerusalén se prostituyeran
  - has llevado a Judá y a los habitantes de Jerusalén a la prostitución
  lexicon: HALOT
  rationale: זנה conserva el campo semántico de prostitución/infidelidad. En español, 'hacer que ... se prostituyeran' refleja la causación del verbo sin reducirlo a una glosa interpretativa como 'idolatría'.
- source_word: כְּהַזְנוֹת בֵּית אַחְאָב
  english_pob_choice: as the house of Ahab caused them to prostitute themselves
  chosen_spanish: como la casa de Acab hizo que se prostituyeran
  alternatives_spanish:
  - como la casa de Acab los hizo prostituirse
  - como la casa de Acab los llevó a la prostitución
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la cláusula anterior y la repetición del verbo asociado a זנה. 'Casa de Acab' es el equivalente natural y bíblico para la dinastía de Acab.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Acab
  alternatives_spanish:
  - la dinastía de Acab
  - la casa de Ahab
  lexicon: HALOT
  rationale: '''Casa'' mantiene el uso bíblico estándar para linaje gobernante y es plenamente inteligible en español.'
- source_word: וְגַם
  english_pob_choice: and have also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - y asimismo
  lexicon: HALOT
  rationale: La adición intensifica la acusación al sumar homicidio a la apostasía.
- source_word: אַחֶיךָ בֵית אָבִיךָ
  english_pob_choice: your brothers of your father’s house
  chosen_spanish: a tus hermanos, de la casa de tu padre
  alternatives_spanish:
  - a tus hermanos de la casa de tu padre
  - a tus hermanos, los de la casa de tu padre
  lexicon: HALOT
  rationale: La apposición hebrea destaca que estos hermanos pertenecen al linaje paterno real. La coma ayuda a preservar la estructura sin volverla pesada en español.
- source_word: הַטּוֹבִים מִמְּךָ
  english_pob_choice: who were better than you
  chosen_spanish: que eran mejores que tú
  alternatives_spanish:
  - que eran más dignos que tú
  - que eran mejores hombres que tú
  lexicon: HALOT
  rationale: טובים expresa superioridad de calidad o valor moral. 'Mejores que tú' reproduce la reprensión de forma directa y natural.
- source_word: הָרָגְתָּ
  english_pob_choice: you have killed
  chosen_spanish: has matado
  alternatives_spanish:
  - has matado a
  - has asesinado
  lexicon: HALOT
  rationale: El verbo significa matar/derribar. 'Has matado' es la equivalencia directa; 'asesinado' sería más interpretativo.
theological_decisions:
- issue: Sentido metafórico de זנה en un contexto de apostasía real
  english_pob_reading: Render with sexual-immorality language while allowing the covenant-unfaithfulness/idolatry metaphor to remain implicit in context.
  chosen_spanish_reading: Mantener el lenguaje de prostitución/impureza sexual, sin sustituirlo por una explicación explícita de idolatría.
  alternative_spanish_readings:
  - hacer que Judá se apartara de Dios
  - llevar a Judá a la infidelidad
  rationale: El hebreo repite זנה, y la acusación profética conserva la metáfora sexual. En español conviene mantener esa fuerza retórica; interpretar directamente como 'idolatría' o 'infidelidad' estrecharía el alcance del original.
  doctrine_reference: POB translation philosophy §§1, 3, 6
- issue: Referencia colectiva 'casa de Acab'
  english_pob_reading: '''The house of Ahab'' refers to Ahab’s ruling dynasty.'
  chosen_spanish_reading: '''La casa de Acab'' se entiende como la dinastía gobernante de Acab.'
  alternative_spanish_readings:
  - la familia de Acab
  - el linaje de Acab
  rationale: '''Casa'' es el modo bíblico más fiel y reconocido para una dinastía. En nota se puede aclarar el sentido dinástico sin reemplazar el término en el texto.'
  doctrine_reference: POB cultural note practice
- issue: Comparativo moral 'mejores que tú'
  english_pob_reading: who were better than you
  chosen_spanish_reading: que eran mejores que tú
  alternative_spanish_readings:
  - que eran más dignos que tú
  - que eran más buenos que tú
  rationale: El comparativo hebreo puede ser moral y personal. 'Mejores' conserva la reprensión sin añadir una especificación que el texto no exige.
  doctrine_reference: HALOT comparative טוב
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió una formulación más literal de זנה ('caused ... to prostitute themselves') frente a una paráfrasis interpretativa. En español, se ha retenido esa repetición verbal en una forma natural ('has hecho que ... se prostituyeran') y se ha afinado la apposición de 'your brothers of your father’s house' como 'tus hermanos, de la casa de tu padre'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada para el nombre divino solo cuando aparezca en el texto; aquí no aparece.
  - Se mantiene 'casa' para dinastía, en línea con el uso bíblico y la auditoría inglesa.
  - Se evita 'siervo' o 'idolatría' porque el hebreo y el audit trail preservan el lenguaje sexual-metafórico de זנה.
  - Se conserva el tono de acusación profética con perfectos compuestos que funcionan naturalmente en español bíblico actual.
