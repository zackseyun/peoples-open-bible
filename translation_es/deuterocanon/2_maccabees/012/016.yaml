translation:
  language: es
  text: Y cuando tomaron la ciudad por voluntad de Dios, hicieron una matanza inmensurable, de modo que el lago cercano, de dos estadios[a] de ancho, parecía desbordarse[b], lleno de sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un estadio era una antigua unidad de longitud; dos estadios equivalen aproximadamente a 370 metros o unas 400 yardas.
    reason: cultural_note
  - marker: b
    text: 'O: «parecía estar lleno de sangre». La imagen griega es muy vívida y puede sugerir que la sangre corría dentro o a través del lago hasta hacerlo parecer lleno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλαβόμενοι
  english_pob_choice: had taken
  chosen_spanish: tomaron
  alternatives_spanish:
  - habían tomado
  - se apoderaron de
  lexicon: LSJ
  rationale: En contexto militar, el participio aoristo medio expresa la toma de una ciudad. «Tomaron» mantiene la secuencia narrativa en español sin añadir un matiz más fuerte que el del griego.
- source_word: τῇ τοῦ θεοῦ θελήσει
  english_pob_choice: by the will of God
  chosen_spanish: por voluntad de Dios
  alternatives_spanish:
  - según la voluntad de Dios
  - por el querer de Dios
  lexicon: LSJ
  rationale: La frase dativa expresa conformidad o medio. «Por voluntad de Dios» conserva la afirmación teológica de que la captura ocurrió bajo la voluntad divina y suena natural en español.
- source_word: ἀμυθήτους
  english_pob_choice: immeasurable
  chosen_spanish: inmensurable
  alternatives_spanish:
  - innumerables
  - sin medida
  - indecibles
  lexicon: LSJ
  rationale: El adjetivo enfatiza algo que no se puede medir ni contar. «Inmensurable» preserva esa hipérbole mejor que una simple cuantificación.
- source_word: σφαγάς
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - matanza masiva
  - degüello
  - masacre
  lexicon: LSJ
  rationale: El plural griego nombra actos de matanza en guerra. «Matanza» conserva la fuerza semántica y funciona bien como sustantivo de masa en español; «masacre» sería más interpretativo.
- source_word: παρακειμένην
  english_pob_choice: nearby
  chosen_spanish: cercano
  alternatives_spanish:
  - adyacente
  - situado junto a
  lexicon: LSJ
  rationale: El participio describe la ubicación del lago junto al lugar del combate. «Cercano» es claro y natural en español moderno.
- source_word: λίμνην
  english_pob_choice: lake
  chosen_spanish: lago
  alternatives_spanish:
  - laguna
  - estanque
  lexicon: LSJ
  rationale: El término ordinario designa un cuerpo de agua relativamente amplio. «Lago» es la correspondencia más directa y transparente.
- source_word: τὸ πλάτος ἔχουσαν σταδίους δύο
  english_pob_choice: having a width of two stadia
  chosen_spanish: de dos estadios de ancho
  alternatives_spanish:
  - que tenía una anchura de dos estadios
  - de ancho, dos estadios
  lexicon: LSJ
  rationale: La medida antigua se conserva como «estadios» para mantener la transparencia textual. La construcción española expresa el ancho sin calco excesivo.
- source_word: καταρρεῖν
  english_pob_choice: overflowing
  chosen_spanish: desbordarse
  alternatives_spanish:
  - derramarse
  - correr
  - fluir hacia abajo
  lexicon: LSJ
  rationale: El verbo sugiere un fluir hacia abajo o un rebosar. «Desbordarse» comunica bien el efecto visual que el inglés POB también quiso preservar.
- source_word: τὸ αἷμα πεπληρωμένην φαίνεσθαι
  english_pob_choice: appeared to be overflowing, filled with blood
  chosen_spanish: parecía desbordarse, lleno de sangre
  alternatives_spanish:
  - parecía lleno de sangre
  - parecía estar rebosando de sangre
  lexicon: LSJ
  rationale: 'El griego combina la apariencia con la imagen de plenitud de sangre. Se conserva el doble efecto: lo que parecía y el estado de llenura sanguinolenta.'
theological_decisions:
- issue: Atribución de la caída de la ciudad a la voluntad de Dios
  english_pob_reading: by the will of God
  chosen_spanish_reading: por voluntad de Dios
  alternative_spanish_readings:
  - según la voluntad de Dios
  - por el querer de Dios
  rationale: La versión española mantiene explícita la agencia divina tal como está en el griego y en el POB inglés, sin suavizarla ni ampliarla doctrinalmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Se siguió de cerca la revisión final del POB inglés, que prefirió «made an immeasurable slaughter» y simplificó la cláusula del lago; en español se conservó esa estructura breve, evitando añadir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ conforme al contexto teísta explícito.
  - Se conservó «estadios» como medida antigua transparente, con nota cultural.
  - Se mantuvo el efecto visual doble de «parecía» + «lleno/desbordarse», sin resolver la imagen en una sola lectura.
  - El tono es formal y bíblico, pero con sintaxis moderna y legible.
