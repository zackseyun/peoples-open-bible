theological_decisions:
- issue: Providential interpretation of the dry pit
  chosen_reading: The Lord actively prevented water from springing up so that Joseph might be preserved.
  alternative_readings:
  - The statement is merely retrospective moralizing about the pit's dryness.
  - The clause could be rendered more weakly as impersonal providence.
  rationale: The Greek explicitly names the Lord as subject and gives a purpose clause tied to Joseph's preservation. The translation keeps this theological claim rather than softening it.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve source-text plain sense over tradition inertia
- issue: Use of the levirate-law citation as moral analogy
  chosen_reading: Translate the legal citation and Zebulun's application straightforwardly, without harmonizing away the unusual phrase 'raise up the life of their brother.'
  alternative_readings:
  - Normalize the application to 'raise up seed for their brother' throughout.
  - Paraphrase the analogy into generic guilt language.
  rationale: The chapter intentionally links Joseph's sale with Deuteronomic shame imagery. The Greek application is rhetorically irregular, and transparency requires preserving that tension rather than smoothing it.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
