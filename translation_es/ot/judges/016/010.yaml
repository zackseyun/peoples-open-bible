revisions:
- from: 'Entonces Dalila dijo a Sansón[a]: «Mira, te has burlado de mí y me has hablado mentiras. Ahora, por favor, dime con qué podrías ser atado».'
  to: 'Entonces Dalila dijo a Sansón[a]: «Mira, te has burlado de mí y me has dicho mentiras. Ahora, por favor, dime con qué podrías ser atado».'
  rationale: Se reemplaza «me has hablado mentiras» por «me has dicho mentiras» para lograr un español más natural sin perder el sentido de כזבים en plural. También se corrige la nota léxica para que la alternativa española exprese correctamente que Dalila fue hecha objeto de burla o engaño, en línea con la justificación del POB en inglés.
