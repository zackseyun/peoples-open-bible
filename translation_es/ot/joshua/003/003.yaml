translation:
  language: es
  text: 'Y ordenaron al pueblo, diciendo: «Cuando vean el arca del pacto de Yahvé, su Dios, y a los sacerdotes levitas[a] llevándola, entonces partirán de su lugar e irán tras ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sacerdotes, los levitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוּוּ
  english_pob_choice: they commanded
  chosen_spanish: les ordenaron
  alternatives_spanish:
  - mandaron
  - dieron orden
  lexicon: HALOT
  rationale: El piel de צוה expresa dar una orden o mandato. En español, «les ordenaron» conserva la fuerza directiva y admite bien el complemento indirecto implícito del verbo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo reunido
  lexicon: HALOT
  rationale: Aquí designa al colectivo israelita; «el pueblo» es natural y mantiene el referente comunitario sin añadir matices no presentes en el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - 'así:'
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se traduce de manera directa con «diciendo», que preserva la estructura del hebreo sin recargarla.
- source_word: כִּרְאֹתְכֶם
  english_pob_choice: When you see
  chosen_spanish: Cuando vean
  alternatives_spanish:
  - Tan pronto como vean
  - Al ver
  lexicon: HALOT
  rationale: El valor temporal de כִּ + infinitivo constructo con sufijo queda bien expresado con «cuando». Se evita especificar una inmediatez no explicitada por el hebreo.
- source_word: אֲרוֹן בְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca del pacto
  - el arca de la alianza
  lexicon: HALOT
  rationale: «Arca del pacto» reproduce el sustantivo técnico אֲרוֹן בְּרִית de forma clara y tradicionalmente reconocible en español, sin perder el sentido de alianza/covenio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el estándar del proyecto en español, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa con «su» en registro de tratamiento plural formal o neutro latinoamericano. «Dios» conserva el sentido de relación de pacto.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los sacerdotes levíticos
  lexicon: HALOT
  rationale: La apposición hebrea identifica a los sacerdotes como levitas. «Sacerdotes levitas» mantiene esa relación sin convertirla en dos grupos distintos. Se conserva el valor descriptivo tribal, no una categoría eclesiástica posterior.
- source_word: נֹשְׂאִים אֹתוֹ
  english_pob_choice: carrying it
  chosen_spanish: llevándola
  alternatives_spanish:
  - cargándola
  - portándola
  lexicon: HALOT
  rationale: נשא en este contexto es «llevar/cargar». En español, «llevándola» resulta natural y respeta la imagen de transportar el arca.
- source_word: תִּסְעוּ
  english_pob_choice: you shall set out
  chosen_spanish: partirán
  alternatives_spanish:
  - se pondrán en marcha
  - saldrán
  lexicon: HALOT
  rationale: נסע describe emprender la marcha o partir desde un campamento o lugar. «Partirán» comunica bien el movimiento ordenado sin introducir la especificidad de «romper campamento».
- source_word: מִמְּקוֹמְכֶם
  english_pob_choice: from your place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de donde están
  - de su posición
  lexicon: HALOT
  rationale: מקום es un término amplio para lugar o sitio. «De su lugar» es literal, idiomático y suficiente para el contexto del desplazamiento.
- source_word: וַהֲלַכְתֶּם אַחֲרָיו
  english_pob_choice: and go after it
  chosen_spanish: seguirán detrás de ella
  alternatives_spanish:
  - irán tras ella
  - la seguirán
  lexicon: HALOT
  rationale: הלך + אחרי expresa ir detrás o seguir. «Seguirán detrás de ella» conserva la dirección espacial de la imagen y hace explícito el antecedente femenino «el arca».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La decisión del POB en inglés es transliterarlo como Yahweh; en español, el equivalente asentado del proyecto es «Yahvé», que conserva el nombre propio del Dios del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of הַכֹּהֲנִים הַלְוִיִּם
  english_pob_reading: the Levitical priests
  chosen_spanish_reading: los sacerdotes levitas
  alternative_spanish_readings:
  - los sacerdotes, los levitas
  - el sacerdocio levítico
  rationale: La frase hebrea identifica a los sacerdotes como levitas mediante aposición. «Sacerdotes levitas» conserva esa identificación y evita una lectura que los separe en dos grupos. La alternativa literal se reserva como posibilidad de estilo, pero la forma elegida es más clara para el lector español.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of following the ark
  english_pob_reading: you shall set out from your place and go after it
  chosen_spanish_reading: partirán de su lugar y seguirán detrás de ella
  alternative_spanish_readings:
  - partirán de su lugar y la seguirán
  - saldrán de su lugar y irán tras ella
  rationale: 'El hebreo presenta una secuencia de movimiento: dejar el lugar propio y luego ir detrás del arca. La traducción conserva ambas acciones y no agrega una explicación interpretativa más allá de la imagen espacial del texto.'
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el último pase sin cambios necesarios y se mantuvo la alta concordancia del audit trail. La versión española conserva las decisiones del inglés sobre el nombre divino, la referencia cultual del arca y la identificación de los sacerdotes levitas, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma constante para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «Señor» como sustituto del nombre divino para no borrar la distinción textual del Tetragrámaton.
  - «Arca del pacto» mantiene el término técnico y es coherente con el registro bíblico español.
  - «Sacerdotes levitas» refleja la aposición hebrea sin convertirla en dos grupos separados.
  - Se mantuvo un tratamiento plural neutro con «su Dios» para el sufijo de segunda persona plural.
  - 'La secuencia verbal preserva el orden del hebreo: ver el arca, partir, seguir detrás de ella.'
