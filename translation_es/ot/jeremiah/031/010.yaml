translation:
  language: es
  text: 'Oigan la palabra de Yahvé, oh naciones, y declárenla en las costas lejanas[a]; digan: «El que dispersó a Israel lo reunirá[b] y lo guardará[b] como un pastor guarda su rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las islas lejanas»; el término hebreo puede abarcar de manera amplia tierras marítimas distantes o costas.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «lo reunirá ... lo guardará», con «lo» refiriéndose a Israel como singular colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural pide una apelación profética pública. «Oigan» es natural en español y conserva la fuerza directa del llamado.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» reproduce el sustantivo básico con la fórmula profética. Se mantiene «Yahvé» por la política terminológica del proyecto y por la presencia explícita del nombre divino en el hebreo.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto de exhortación profética a los no israelitas, «naciones» es la equivalencia más natural y precisa; «gentiles» introduciría un contraste no presente en el hebreo.
- source_word: וְהַגִּידוּ
  english_pob_choice: declare it
  chosen_spanish: declárenla
  alternatives_spanish:
  - proclámenla
  - anúncienla
  lexicon: HALOT
  rationale: El hifil de נגד implica dar a conocer públicamente. En español, el objeto implícito «la» puede remitir naturalmente a «la palabra de Yahvé» del miembro anterior.
- source_word: בָאִיִּים מִמֶּרְחָק
  english_pob_choice: in the distant coastlands
  chosen_spanish: en las costas lejanas
  alternatives_spanish:
  - en las lejanas islas
  - en los confines marítimos lejanos
  lexicon: HALOT
  rationale: איים puede abarcar tierras costeras o marítimas distantes, no solo islas literales. «Costas lejanas» comunica la amplitud geográfica con buena naturalidad en español.
- source_word: וְאִמְרוּ
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - y digan
  - afirmen
  lexicon: HALOT
  rationale: Es el imperativo que introduce la cita. «Digan» conserva el encadenamiento exhortativo sin forzar la coordinación en español.
- source_word: מְזָרֵה
  english_pob_choice: He who scattered
  chosen_spanish: El que dispersó
  alternatives_spanish:
  - El que esparció
  - El dispersador de
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo. «El que dispersó» expresa de forma idiomática la acción histórica del sujeto sin perder la referencia al agente.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo del pacto, mantenido sin cambio.
- source_word: יְקַבְּצֶנּוּ
  english_pob_choice: will gather him
  chosen_spanish: lo reunirá
  alternatives_spanish:
  - lo volverá a reunir
  - lo regatherá
  lexicon: HALOT
  rationale: El sufijo singular retoma a Israel como colectivo singular. «Lo reunirá» conserva el valor verbal sin añadir explícitamente un prefijo de re- que el hebreo no exige.
- source_word: וּשְׁמָרוֹ
  english_pob_choice: and will keep him
  chosen_spanish: lo guardará
  alternatives_spanish:
  - lo cuidará
  - lo vigilará
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, cuidar o vigilar. Aquí «guardar» encaja bien con el cuidado protector del símil pastoral y mantiene la concisión.
- source_word: כְּרֹעֶה עֶדְרוֹ
  english_pob_choice: as a shepherd keeps his flock
  chosen_spanish: como un pastor guarda su rebaño
  alternatives_spanish:
  - como un pastor cuida su rebaño
  - como pastor su rebaño
  lexicon: HALOT
  rationale: El hebreo compara con un pastor y su rebaño. «Rebaño» es el equivalente natural de עדר en este contexto, y «guarda» retoma el verbo anterior para preservar la imagen de protección.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo tiene el Tetragrámaton explícito. Se preserva la forma del nombre divino en español como «Yahvé», conforme al estándar del proyecto y sin enmascararlo como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Collective singular pronoun for Israel
  english_pob_reading: will gather him / will keep him
  chosen_spanish_reading: lo reunirá / lo guardará
  alternative_spanish_readings:
  - los reunirá / los guardará
  - lo reunirá / lo cuidará
  rationale: El hebreo usa sufijos singulares para Israel como colectivo singular. En español se conserva «lo» para respetar esa fuerza gramatical y evitar pluralizar indebidamente el referente.
  doctrine_reference: Hebrew collective singular syntax in prophetic discourse
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y el audit trail inglés: mantiene el imperativo profético en cadena, conserva el nombre divino explícito como Yahvé, refleja el valor amplio de איים con «costas lejanas» y respeta el singular colectivo de Israel mediante los pronombres «lo».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y publicable, evitando calcos rígidos donde el español exige mayor naturalidad.
  - La decisión de usar «Yahvé» es consistente con la política terminológica del proyecto y con el Tetragrámaton presente en el hebreo.
  - «Guardar» se usó en sentido protector-pastoral, coherente con «pastor» y «rebaño».
