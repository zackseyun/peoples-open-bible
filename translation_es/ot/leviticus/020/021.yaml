revisions:
- from: Si un hombre toma[a] la mujer de su hermano, es impureza[b]; ha descubierto la desnudez de su hermano. Serán sin hijos[c].
  to: Si un hombre toma la mujer de su hermano, es impureza[a]; ha descubierto la desnudez de su hermano. Quedarán sin hijos[b].
  rationale: Se mejora la naturalidad del español al cambiar «Serán sin hijos» por «Quedarán sin hijos», preservando la misma decisión exegética del POB inglés. Se eliminó la nota innecesaria sobre «tomar en matrimonio» y se ajustaron las notas restantes para reflejar mejor las alternativas léxicas y la ambigüedad preservada en el original sin sobreexplicar.
