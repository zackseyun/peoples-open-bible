translation:
  language: es
  text: Él envía su mandato[a] a la tierra; su palabra corre con rapidez[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su dicho’ o ‘su palabra’ para אִמְרָתוֹ.
    reason: lexical_alternative
  - marker: b
    text: O ‘rápidamente’ o ‘con velocidad’; la expresión hebrea intensifica el movimiento rápido.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁלֵחַ
  english_pob_choice: He sends
  chosen_spanish: Él envía
  alternatives_spanish:
  - el que envía
  - enviando
  lexicon: HALOT
  rationale: El participio hebreo funciona verbalmente en el contexto; en español, un verbo finito resulta más natural y preserva la acción continua de Dios.
- source_word: אִמְרָתוֹ
  english_pob_choice: his command
  chosen_spanish: su mandato
  alternatives_spanish:
  - su dicho
  - su palabra
  - su utterancia
  lexicon: HALOT
  rationale: ‘Mandato’ conserva la fuerza performativa de la expresión divina y en español comunica mejor la idea de una orden eficaz que simplemente ‘dicho’. Mantiene además la diferencia de matiz con דְּבָרוֹ más adelante.
- source_word: אָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - a la tierra habitable
  - a la tierra
  lexicon: HALOT
  rationale: ‘Tierra’ reproduce bien el alcance cósmico del hebreo en un español natural, sin reducirlo a ‘país’ o ‘territorio’.
- source_word: עַד מְהֵרָה
  english_pob_choice: swiftly
  chosen_spanish: con rapidez
  alternatives_spanish:
  - rápidamente
  - con velocidad
  - con prisa
  lexicon: HALOT
  rationale: La expresión intensifica la velocidad; ‘con rapidez’ transmite esa fuerza adverbial de manera clara y sobria, sin añadir un intensificador no presente en el hebreo.
- source_word: יָרוּץ
  english_pob_choice: runs
  chosen_spanish: corre
  alternatives_spanish:
  - se apresura
  - vuela
  - se precipita
  lexicon: HALOT
  rationale: ‘Corre’ conserva la imagen corporal y poética del verbo, manteniendo la personificación de la palabra de Dios en movimiento.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su palabra
  - su decir
  - su mensaje
  lexicon: HALOT
  rationale: ‘Palabra’ es el equivalente natural y fiel en español; permite mantener el paralelismo con ‘mandato’ sin borrar la variación poética del hebreo.
theological_decisions:
- issue: Naturaleza de la palabra divina en el paralelismo poético
  english_pob_reading: Render God's speech as effective command/word without importing later doctrinal categories such as the personal Logos.
  chosen_spanish_reading: Presentar el habla de Dios como mandato y palabra eficaces, sin introducir categorías cristológicas implícitas que el hebreo no formula.
  alternative_spanish_readings:
  - Traducir ambos sustantivos simplemente como ‘palabra’
  - Leer el verso como una afirmación cristológica explícita en el texto principal
  rationale: El salmo describe la eficacia soberana de la palabra divina en la creación y la providencia. La traducción debe conservar ese peso teológico sin añadir desarrollos doctrinales posteriores que no están en el texto.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada: se evitó un intensificador adicional equivalente a ‘muy’, porque el hebreo expresa rapidez sin exigir ese añadido. Se mantuvo la distinción poética entre אִמְרָתוֹ y דְּבָרוֹ con dos términos españoles relacionados pero no idénticos.'
  spanish_consistency_notes:
  - Se usó ‘tierra’ para אָרֶץ, en armonía con el alcance cósmico del salmo.
  - Se evitó ‘SEÑOR’ porque aquí el texto habla de la acción de Dios sin necesidad de un sustituto por el nombre divino.
  - Se prefirió ‘mandato’ para אִמְרָתוֹ y ‘palabra’ para דְּבָרוֹ para preservar la variación semántica del hebreo.
  - Se mantuvo un español formal, claro y publicable, sin calcos innecesarios.
