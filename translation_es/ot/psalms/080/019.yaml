    text: 'O: «presérvanos con vida» o «haznos vivir». El hebreo también puede significar «revívenos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la última cláusula al modismo hebreo קרא בשם con «invocaremos tu nombre», se corrige la ubicación del marcador de nota, y se sustituye «avívanos» por «revívenos» para mayor naturalidad y mejor alineación con el audit trail inglés final, manteniendo la amplitud semántica de תְּחַיֵּנוּ en la nota.
