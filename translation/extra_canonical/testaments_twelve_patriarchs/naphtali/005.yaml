theological_decisions:
- issue: Symbolic status of Levi and Judah in the vision
  chosen_reading: Translate the imagery straightforwardly without explaining its symbolism in the main text.
  alternative_readings:
  - Interpret Levi as priestly supremacy and Judah as royal supremacy within the translation
  - Harmonize the imagery with later messianic readings
  rationale: The Greek presents symbolic action, not an explicit interpretation at this point. Transparency requires preserving the image and leaving fuller interpretation to notes or later context.
- issue: γραφὴ ἁγία
  chosen_reading: Render as 'a holy writing' rather than 'Scripture.'
  alternative_readings:
  - Scripture
  - a sacred book
  rationale: The transmitted Greek is indefinite and visionary. 'Scripture' could imply a later fixed canonical concept more strongly than the wording itself warrants.
