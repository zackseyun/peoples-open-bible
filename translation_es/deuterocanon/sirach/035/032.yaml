translation:
  language: es
  text: El día en que se cumplan los días de tu vida[a], y en el momento de tu muerte, reparte tu herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al final de tu vida»; el griego habla literalmente de la consumación o conclusión de los días de tu vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - El día
  - Cuando
  lexicon: BDAG
  rationale: La preposición temporal con dativo se expresa de manera natural en español como una localización temporal. «En el día» conserva la referencia concreta al momento señalado sin volverlo demasiado abstracto.
- source_word: συντελείας
  english_pob_choice: are completed
  chosen_spanish: se cumplan
  alternatives_spanish:
  - se completen
  - lleguen a su fin
  - se consumen
  lexicon: BDAG
  rationale: El sustantivo indica consumación o conclusión. En español, «se cumplan» comunica bien la idea de que los días han llegado a su término y mantiene la fuerza de finalización sin sonar forzado.
- source_word: ἡμερῶν ζωῆς σου
  english_pob_choice: the days of your life
  chosen_spanish: los días de tu vida
  alternatives_spanish:
  - los días de tu vida terrenal
  - los días de tu existencia
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma bastante literal y natural en español. «Los días de tu vida» conserva la repetición del original y la relación entre «días» y «vida».
- source_word: καιρῷ τελευτῆς
  english_pob_choice: the time of your death
  chosen_spanish: al tiempo de tu muerte
  alternatives_spanish:
  - al momento de tu muerte
  - al tiempo de tu fin
  lexicon: BDAG
  rationale: «καιρός» aquí es un momento señalado o apropiado, y «τελευτή» apunta a la muerte o el final. «Al tiempo de tu muerte» conserva el sentido práctico y directo del griego.
- source_word: διάδος
  english_pob_choice: distribute
  chosen_spanish: reparte
  alternatives_spanish:
  - da
  - asigna
  - distribuye
  lexicon: BDAG
  rationale: El imperativo pide una acción deliberada de repartir o asignar una herencia. «Reparte» es natural en español y refleja mejor la administración de bienes que un simple «da».
- source_word: κληρονομίαν
  english_pob_choice: the inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - la herencia
  - el patrimonio
  lexicon: BDAG
  rationale: El término designa la herencia hereditaria o patrimonial. Añadir «tu» es coherente con el destinatario implícito del mandato y hace la frase más completa en español, como en la revisión inglesa reciente.
theological_decisions:
- issue: Cómo expresar τελευτή sin suavizar la referencia a la muerte
  english_pob_reading: death
  chosen_spanish_reading: muerte
  alternative_spanish_readings:
  - fin
  - término
  - partida
  rationale: El contexto trata de la disposición final de la herencia, por lo que conviene mantener una referencia directa a la muerte. «Muerte» preserva la fuerza práctica del mandato sin introducir una lectura más tenue.
  doctrine_reference: Sirach 35:32; mantener el sentido llano y moral del texto sapiencial sin eufemizarlo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente hizo explícitos los repetidos «días» y añadió «your» antes de «inheritance» para mayor alineación formal. La versión española refleja esa misma precisión con «los días de tu vida» y «tu herencia».
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra sustitución porque el versículo no contiene el nombre divino.
  - Se mantiene un tono sapiencial claro y directo, adecuado para una instrucción práctica sobre herencia.
  - «Herencia» se prefiere sobre «patrimonio» por ser el equivalente más natural y menos interpretativo en este contexto.
