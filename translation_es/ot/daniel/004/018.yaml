translation:
  language: es
  text: Su follaje era hermoso y su fruto abundante, y en él había alimento para todos. Debajo de él vivían las bestias del campo, y en sus ramas habitaban las aves de los cielos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves del cielo». El arameo literalmente dice «las aves de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָפְיֵהּ
  english_pob_choice: its foliage
  chosen_spanish: su follaje
  alternatives_spanish:
  - sus hojas
  - su fronda
  - su copa
  lexicon: HALOT
  rationale: El arameo designa el conjunto frondoso del árbol, no solo hojas individuales. «Follaje» conserva el valor colectivo y natural del término, en paralelo con la decisión inglesa.
- source_word: שַׁפִּיר
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - lindo
  - atractivo
  lexicon: HALOT
  rationale: El adjetivo expresa belleza o atractivo. «Hermoso» es claro, digno y mantiene la valoración estética del original.
- source_word: אִנְבֵּהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - su cosecha
  lexicon: HALOT
  rationale: El término se refiere al fruto del árbol. «Fruto» es la equivalencia directa y más fiel al contexto.
- source_word: שַׂגִּיא
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - grande
  - copioso
  - numeroso
  lexicon: HALOT
  rationale: Aquí califica al fruto en sentido de abundancia. «Abundante» reproduce bien esa fuerza cuantitativa sin forzar un giro idiomático.
- source_word: מָזוֹן
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - sustento
  - provisión
  lexicon: HALOT
  rationale: El sustantivo denota comida o sustento. «Alimento» es sobrio, natural en español bíblico moderno y conserva el sentido general sin estrecharlo demasiado.
- source_word: לְכֹלָּא בֵהּ
  english_pob_choice: in it was food for all
  chosen_spanish: en él había alimento para todos
  alternatives_spanish:
  - en él estaba el alimento para todos
  - había alimento para todos en él
  lexicon: HALOT
  rationale: La frase aramea sitúa el alimento dentro del árbol. La versión española conserva esa localización con una sintaxis fluida y transparente.
- source_word: תְּחֹתוֹהִי
  english_pob_choice: under it
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - debajo suyo
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior respecto del árbol. «Debajo de él» es la forma más natural y precisa en español.
- source_word: תְּדוּר
  english_pob_choice: lived
  chosen_spanish: vivían
  alternatives_spanish:
  - moraban
  - habitaban
  - residían
  lexicon: HALOT
  rationale: El verbo expresa residir o habitar. «Vivían» resulta idiomático con animales y evita un arcaísmo innecesario, manteniendo la imagen de permanencia.
- source_word: חֵיוַת בָּרָא
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  - los animales del campo abierto
  lexicon: HALOT
  rationale: La expresión aramea es un giro tradicional para los animales silvestres de tierra firme. «Bestias del campo» conserva el registro bíblico y la correspondencia con la decisión inglesa.
- source_word: וּבְעַנְפוֹהִי
  english_pob_choice: in its branches
  chosen_spanish: en sus ramas
  alternatives_spanish:
  - entre sus ramas
  - en sus boughs
  lexicon: HALOT
  rationale: El término se refiere a las ramas del árbol. «En sus ramas» es claro y fiel; «entre» sugeriría más densidad de lo que exige el texto.
- source_word: יִשְׁכְּנָן
  english_pob_choice: dwelled
  chosen_spanish: habitaban
  alternatives_spanish:
  - moraban
  - se establecían
  - vivían
  lexicon: HALOT
  rationale: El verbo tiene el sentido de morar o habitar. «Habitaban» preserva la idea de residencia de las aves sin perder la sonoridad bíblica.
- source_word: צִפֲּרֵי שְׁמַיָּא
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  lexicon: HALOT
  rationale: El arameo dice literalmente «las aves de los cielos». Se mantiene el plural para reflejar la forma del original y su textura semítica; «aves» es un español más amplio y natural que «pájaros».
translation_notes:
  revision_awareness: Se revisó el contexto inmediato del versículo y el audit trail inglés. No se detectaron revisiones aplicadas en el pasaje; la redacción española sigue de cerca la decisión óptima-equivalente ya validada, manteniendo el paralelismo del original y la nota sobre el plural «los cielos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - «Bestias del campo» y «aves de los cielos» conservan el registro bíblico y la imaginería del texto arameo.
  - Se prefirió «alimento» frente a «comida» para un tono más digno y amplio, sin cambiar el sentido.
