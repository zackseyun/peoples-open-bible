translation:
  language: es
  text: Los jactanciosos[a] no estarán de pie delante de tus ojos; odias a todos los que hacen maldad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrogantes», «los necios» o «los insolentes» para «los jactanciosos».
    reason: lexical_alternative
  - marker: b
    text: O «todos los que obran iniquidad» o «todos los hacedores de maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצְּבוּ
  english_pob_choice: will not stand
  chosen_spanish: no se mantendrán
  alternatives_spanish:
  - no se pondrán en pie
  - no resistirán
  - no permanecerán
  lexicon: HALOT
  rationale: El hitpael de יצב expresa ponerse de pie, presentarse o mantenerse firme. En español, «no se mantendrán» comunica bien la imposibilidad de permanecer ante Dios, sin perder el matiz relacional/judicial del hebreo.
- source_word: הוֹלְלִים
  english_pob_choice: the boastful
  chosen_spanish: los jactanciosos
  alternatives_spanish:
  - los soberbios
  - los arrogantes
  - los insolentes
  - los necios
  lexicon: HALOT
  rationale: La forma apunta a quienes se jactan o se envanececen, no simplemente a los intelectualmente torpes. «Jactanciosos» conserva mejor el tono moral y la relación con el paralelismo del versículo.
- source_word: לְנֶגֶד עֵינֶיךָ
  english_pob_choice: before your eyes
  chosen_spanish: delante de tus ojos
  alternatives_spanish:
  - en tu presencia
  - ante tus ojos
  - a tu vista
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para estar ante Dios o en su vista. «Delante de tus ojos» mantiene la imaginería concreta y sigue siendo natural en español bíblico contemporáneo.
- source_word: שָׂנֵאתָ
  english_pob_choice: you hate
  chosen_spanish: odias
  alternatives_spanish:
  - aborreces
  - detestas
  - rechazas
  lexicon: HALOT
  rationale: El verbo expresa con franqueza la actitud divina de odio hacia los hacedores de maldad. «Odias» es la correspondencia más directa y no atenúa la afirmación del texto.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: los que hacen maldad
  alternatives_spanish:
  - los que obran iniquidad
  - los hacedores de maldad
  - los que practican el mal
  lexicon: HALOT
  rationale: La construcción participial literalmente designa a quienes hacen/trabajan אָוֶן. En español, «los que hacen maldad» conserva el sentido activo y el peso moral de אָוֶן sin sonar demasiado técnico.
theological_decisions:
- issue: Lenguaje de odio divino
  english_pob_reading: Retain the direct statement 'you hate all workers of wickedness' in the main text.
  chosen_spanish_reading: Mantener la declaración directa «odias a todos los que hacen maldad».
  alternative_spanish_readings:
  - «rechazas a todos los que hacen maldad»
  - «te opones a todos los que hacen maldad»
  rationale: El hebreo שָׂנֵאתָ significa literalmente «odias». En fidelidad al primado del texto fuente y sin suavizar la afirmación, la versión española conserva la fuerza explícita del verbo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés auditado mostró acuerdo alto y no requirió revisiones; la versión española sigue sus decisiones léxicas principales y conserva las alternativas relevantes donde el hebreo permite más de una matización.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona singular («tus», «odias») por corresponder al hebreo.
  - Se evitó «SEÑOR» en favor de la referencia directa al poseedor implícito de «tus ojos», conforme al marco terminológico del proyecto.
  - «Maldad» se eligió como equivalente natural de אָוֶן en este contexto, con nota de alternativa para «iniquidad».
