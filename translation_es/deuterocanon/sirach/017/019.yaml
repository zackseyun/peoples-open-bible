translation:
  language: es
  text: Después de esto, se levantará y les retribuirá, y hará recaer sobre su cabeza[a] su retribución.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sobre su cabeza'' es un modismo que significa que las consecuencias de sus actos recaen sobre ellos mismos.'
    reason: cultural_note
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Después
  lexicon: LSJ
  rationale: Expresa la secuencia temporal explícita del griego con una fórmula natural en español, sin añadir matices interpretativos.
- source_word: ἐξαναστήσεται
  english_pob_choice: he will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - se alzará
  - se pondrá en pie
  lexicon: LSJ
  rationale: Conserva la imagen verbal de levantarse o alzarse en acción decisiva, de modo natural en español, sin volverlo una simple perífrasis futura.
- source_word: ἀνταποδώσει
  english_pob_choice: repay
  chosen_spanish: les pagará
  alternatives_spanish:
  - les retribuirá
  - les reembolsará
  - les dará paga
  lexicon: LSJ
  rationale: En este contexto de retribución, 'pagar' comunica bien la idea de devolver en correspondencia. Mantiene el campo semántico de retribución sin sonar forzado.
- source_word: τὸ ἀνταπόδομα
  english_pob_choice: their repayment
  chosen_spanish: su paga
  alternatives_spanish:
  - su retribución
  - su recompensa
  - su paga de vuelta
  lexicon: LSJ
  rationale: '''Paga'' evita una construcción pesada y conserva la idea de la retribución debida. Aunque no reproduce el cognado con tanta transparencia como en inglés, sí comunica el valor retributivo del sustantivo griego en español bíblico legible.'
- source_word: εἰς κεφαλὴν αὐτῶν
  english_pob_choice: upon their head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - encima de su cabeza
  - sobre sus cabezas
  lexicon: LSJ
  rationale: Mantiene el modismo bíblico de consecuencia que recae sobre la persona misma. En español, el singular 'cabeza' reproduce bien el giro idiomático del griego y la tradición semítica detrás de la expresión.
- source_word: ἀποδώσει
  english_pob_choice: he will bring
  chosen_spanish: hará recaer
  alternatives_spanish:
  - traerá
  - devolverá
  - pondrá
  lexicon: LSJ
  rationale: '''Hará recaer'' expresa con claridad la acción de hacer que la retribución caiga sobre ellos, preservando el valor dinámico del verbo sin repetir mecánicamente ''pagará'' y sin perder el paralelismo con la primera cláusula.'
theological_decisions:
- issue: Lenguaje de retribución divina personal y recíproca
  english_pob_reading: Retain the anthropomorphic and retributive wording ('he will rise up and repay them') without softening it into abstract providence.
  chosen_spanish_reading: 'Conservar la acción personal de juicio y la reciprocidad retributiva: ''se levantará y les pagará, y hará recaer sobre su cabeza su paga''.'
  alternative_spanish_readings:
  - actuará contra ellos y les dará lo que merecen
  - hará volver sus actos sobre ellos
  rationale: El griego presenta una intervención personal y retributiva, no sólo una consecuencia impersonal. La redacción española mantiene esa tensión teológica sin suavizarla ni resolverla en términos abstractos.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del inglés auditado: se mantuvo la secuencia temporal, el valor retributivo de la primera cláusula y el cierre idiomático sobre la cabeza; también se respetó la preferencia por un segundo verbo distinto para reflejar ἀποδώσει sin sonar mecánico. En español, se optó por ''hará recaer'' para reflejar ese cierre dinámico de modo natural.'
  spanish_consistency_notes:
  - Se conserva el registro bíblico sobrio y digno, con español moderno pero no coloquial.
  - Se mantiene 'cabeza' en singular para reproducir el modismo semítico del original.
  - La elección de 'paga' busca coherencia con el campo retributivo del verso, aun cuando el inglés haya preservado más transparencia léxica con 'repayment'.
