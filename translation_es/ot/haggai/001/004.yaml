translation:
  language: es
  text: ¿Es tiempo para ustedes mismos de vivir en sus casas forradas con paneles[a], mientras esta casa está en ruinas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «casas artesonadas»; es decir, casas terminadas o forradas con madera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֵת
  english_pob_choice: Is it a time
  chosen_spanish: ¿Es tiempo... ?
  alternatives_spanish:
  - ¿Es un tiempo... ?
  - ¿Es la hora... ?
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica con עֵת ('tiempo/ocasión'). En español, «¿Es tiempo...?» conserva bien el valor interrogativo y la referencia al momento oportuno sin sonar forzado.
- source_word: לָכֶם אַתֶּם
  english_pob_choice: for you yourselves
  chosen_spanish: para ustedes mismos
  alternatives_spanish:
  - para ustedes
  - para ustedes mismos
  lexicon: HALOT
  rationale: La forma con pronombre independiente añade énfasis. «Ustedes mismos» reproduce esa fuerza enfática en español y evita perder la oposición retórica del hebreo.
- source_word: לָשֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: de vivir
  alternatives_spanish:
  - de habitar
  - de morar
  lexicon: HALOT
  rationale: Con casas, ישׁב expresa la idea de habitar. «Vivir» es natural en español moderno y comunica la permanencia doméstica sin introducir un matiz excesivamente técnico.
- source_word: בְּבָתֵּיכֶם
  english_pob_choice: in your houses
  chosen_spanish: en sus casas
  alternatives_spanish:
  - en sus hogares
  - en sus viviendas
  lexicon: HALOT
  rationale: «Casas» conserva la imagen concreta y mantiene el contraste con «esta casa» del final del versículo.
- source_word: סְפוּנִים
  english_pob_choice: paneled
  chosen_spanish: revestidas
  alternatives_spanish:
  - forradas con paneles
  - entabladas
  lexicon: HALOT
  rationale: El participio alude a algo cubierto o revestido, especialmente con madera. «Revestidas» es comprensible y suficientemente amplio; la nota conserva la alternativa lexical más específica («ceiled/paneled»).
- source_word: וְהַבַּיִת הַזֶּה
  english_pob_choice: while this house
  chosen_spanish: mientras esta casa
  alternatives_spanish:
  - y esta casa
  - pero esta casa
  lexicon: HALOT
  rationale: El hebreo contrapone dos situaciones simultáneas. «Mientras» transmite mejor la yuxtaposición que una simple conjunción aditiva.
- source_word: חָרֵב
  english_pob_choice: lies in ruins
  chosen_spanish: está en ruinas
  alternatives_spanish:
  - está desolada
  - permanece en ruinas
  lexicon: HALOT
  rationale: El adjetivo describe un estado de devastación. «Está en ruinas» es claro, natural y fiel al sentido de deterioro continuo.
theological_decisions:
- issue: Referente de «esta casa»
  english_pob_reading: the temple of the LORD
  chosen_spanish_reading: el templo de Yahvé
  alternative_spanish_readings:
  - esta casa, sin explicitar el referente
  - la casa de Dios
  rationale: La traducción principal mantiene «esta casa» porque sigue el hebreo, pero el contexto inmediato identifica inequívocamente el templo. En la explicación de trasfondo, el referente es el templo de Yahvé; se evita sustituir el texto base por una paráfrasis interpretativa en el cuerpo del versículo.
  doctrine_reference: Hageo 1:2, 8-9
- issue: Valor de contraste en וְ
  english_pob_reading: while this house
  chosen_spanish_reading: mientras esta casa
  alternative_spanish_readings:
  - y esta casa
  - pero esta casa
  rationale: 'Aquí la conjunción no es meramente copulativa. El sentido discursivo es contrastivo/simultáneo: ellos habitan en casas revestidas mientras la casa de Yahvé permanece en ruinas. «Mientras» preserva ese contraste sin añadir una interpretación ajena.'
  doctrine_reference: Hageo 1:4
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en el valor retórico de la pregunta, el énfasis de אַתֶּם, el sentido doméstico de לָשֶׁבֶת, la imagen concreta de בְּבָתֵּיכֶם, el matiz de סְפוּנִים como revestido/entablado, el contraste de וְהַבַּיִת הַזֶּה y el estado durativo de חָרֵב. No se detectan revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «esta casa» en el cuerpo para respetar el hebreo, sin insertar «templo» en la línea principal.
  - «Casas» y «casa» conservan la repetición intencional del contraste textual.
  - La nota a explica la alternativa lexical de סְפוּנִים sin sobrecargar el texto principal.
