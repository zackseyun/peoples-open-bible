translation:
  language: es
  text: Y he descendido para librarlo[a] de la mano de Egipto y para hacerlo subir[a] de aquella tierra a una tierra buena y espaciosa[b], a una tierra que mana leche y miel, al lugar del cananeo, del heteo, del amorreo, del ferezeo, del heveo y del jebuseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa singular en 'librarlo' y 'hacerlo subir', refiriéndose colectivamente a Israel como pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'una tierra buena y amplia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֵד
  english_pob_choice: I have come down
  chosen_spanish: he descendido
  alternatives_spanish:
  - he bajado
  - he venido abajo
  lexicon: HALOT
  rationale: Se conserva el movimiento espacial antropomórfico del hebreo con un perfecto compuesto natural en español. 'Descender' refleja mejor la imagen original que una paráfrasis como 'intervenir'.
- source_word: לְהַצִּילוֹ
  english_pob_choice: to deliver him
  chosen_spanish: para librarlo
  alternatives_spanish:
  - para rescatarlo
  - para salvarlo
  lexicon: HALOT
  rationale: נצל en hifil expresa sacar/liberar de peligro. 'Librar' mantiene el sentido concreto de liberación sin cargar el verbo con matices teológicos posteriores que 'salvar' podría sugerir.
- source_word: מִיַּד מִצְרַיִם
  english_pob_choice: from the hand of Egypt
  chosen_spanish: de la mano de Egipto
  alternatives_spanish:
  - del poder de Egipto
  - de la mano de los egipcios
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo 'mano de' para preservar la imagen de dominio opresivo. 'Egipto' se mantiene como entidad nacional, como en el audit trail inglés.
- source_word: וּלְהַעֲלֹתוֹ
  english_pob_choice: to bring him up
  chosen_spanish: para subirlo
  alternatives_spanish:
  - para hacerlo subir
  - para hacerlo salir
  lexicon: HALOT
  rationale: עלה en hifil conserva el motivo de ascenso/geografía del éxodo. 'Subirlo' respeta el verbo original y el sufijo singular colectivo referido a Israel.
- source_word: מִן הָאָרֶץ הַהִוא
  english_pob_choice: from that land
  chosen_spanish: de aquella tierra
  alternatives_spanish:
  - de esa tierra
  - fuera de aquella tierra
  lexicon: HALOT
  rationale: La deixis se expresa de modo natural en español con 'aquella tierra', manteniendo la referencia retrospectiva a Egipto sin explicitarlo de más.
- source_word: אֶל אֶרֶץ טוֹבָה וּרְחָבָה
  english_pob_choice: to a good and broad land
  chosen_spanish: a una tierra buena y espaciosa
  alternatives_spanish:
  - a una tierra buena y ancha
  - a una tierra buena y amplia
  lexicon: HALOT
  rationale: טובה se traduce por 'buena' y רחבה por 'espaciosa', opción más natural que 'ancha' en español y cercana al contraste con la estrechez de Egipto. Se conserva la posible alternativa 'broad/spacious' del audit trail.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra de leche y miel
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de abundancia. 'Fluye' sigue de cerca el participio hebreo y evita reemplazarlo por una formulación más tradicional que suavice la metáfora.
- source_word: אֶל מְקוֹם
  english_pob_choice: to the place of
  chosen_spanish: al lugar de
  alternatives_spanish:
  - al sitio de
  - al territorio de
  lexicon: HALOT
  rationale: מקום significa 'lugar'. 'Al lugar de' preserva la estructura del hebreo antes de la lista de pueblos, sin convertirla en una paráfrasis geográfica.
- source_word: הַכְּנַעֲנִי ... הַיְבוּסִי
  english_pob_choice: the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite
  chosen_spanish: del cananeo, del heteo, del amorreo, del ferezeo, del heveo y del jebuseo
  alternatives_spanish:
  - del cananeo, del hitita, del amorreo, del perizeo, del hivita y del jebuseo
  - de los cananeos, heteos, amorreos, ferezeos, heveos y jebuseos
  lexicon: HALOT
  rationale: Los etnónimos se conservan en singular con artículo/contracción, como en el hebreo singular colectivo. 'Heteo' y 'heveo' siguen formas castellanas comprensibles; 'hitita/hivita' serían alternativas aceptables, pero menos alineadas con la forma breve tradicional de varios vocablos bíblicos en español.
theological_decisions:
- issue: Movimiento divino antropomórfico ('descendí')
  english_pob_reading: Retain the spatial language literally
  chosen_spanish_reading: 'Conservar literalmente la imagen espacial: ''he descendido'''
  alternative_spanish_readings:
  - he intervenido
  - he venido a actuar
  rationale: El hebreo presenta la acción divina en términos espaciales antropomórficos. No hay necesidad doctrinal de desdibujarla; mantenerla preserva la viveza narrativa y el patrón exódico.
  doctrine_reference: Principios de traducción POB sobre fidelidad al lenguaje figurado del original
- issue: Singular colectivo en los sufijos de objeto ('librarlo', 'subirlo')
  english_pob_reading: Use singular 'him' twice
  chosen_spanish_reading: Mantener el singular colectivo 'lo'
  alternative_spanish_readings:
  - librarlos / subirlos
  - librar a Israel / subir a Israel
  rationale: El hebreo usa sufijos singulares referidos a Israel como pueblo. El español puede conservar ese rasgo sin perder inteligibilidad, evitando suavizar la forma del texto.
  doctrine_reference: Principios de traducción POB sobre cohesión del sujeto colectivo en el texto fuente
translation_notes:
  revision_awareness: 'Se sigue el audit trail inglés sin cambios sustantivos: se preservan el modismo ''mano de'', el singular colectivo para Israel, la imagen espacial de ''descender/subir'' y la enumeración de pueblos en forma singular. La principal adaptación al español es lexical-estilística (''espaciosa'', ''librarlo'', ''de la mano de'') para lograr naturalidad sin perder trazabilidad al hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo en la edición general cuando el contexto lo requiera; este verso no contiene el nombre divino explícito.
  - '''Cananeo, heteo, amorreo, ferezeo, heveo y jebuseo'' sigue la convención del proyecto de etnónimos singulares.'
  - '''Librarlo'' y ''subirlo'' preservan el referente colectivo singular de Israel, coherente con el texto fuente y con el audit trail inglés.'
