  glossary_alignment: 'No hay términos del glosario doctrinal principal en juego. El manejo léxico general concuerda con las decisiones auditadas: «tirano», «amenazas», «tormentos». La revisión propuesta solo afina la expresión de τρικυμίαις y la nota léxica para reflejar mejor la distinción metafórica documentada en el inglés POB.'
