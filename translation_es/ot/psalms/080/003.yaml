translation:
  language: es
  text: Ante Efraín, Benjamín y Manasés, despierta tu poder[a] y ven[b] a salvarnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu fuerza».
    reason: lexical_alternative
  - marker: b
    text: O «y ve para nuestra salvación»; el verbo hebreo es literalmente «ir/andar», pero en este contexto funciona como una súplica para que Dios intervenga a favor de su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: Before
  chosen_spanish: Ante
  alternatives_spanish:
  - Delante de
  - En la presencia de
  lexicon: HALOT
  rationale: En este contexto poético de súplica, «ante» conserva la idea espacial/relacional de estar frente a algo, con un tono natural en español y sin añadir explicaciones que el hebreo no exige.
- source_word: אֶפְרַיִם וּבִנְיָמִן וּמְנַשֶּׁה
  english_pob_choice: Ephraim and Benjamin and Manasseh
  chosen_spanish: Efraín, Benjamín y Manasés
  alternatives_spanish:
  - Efraím, Benjamín y Manasés
  lexicon: Nombres propios tribales; transliteración estándar
  rationale: Se conservan como nombres propios tribales, siguiendo la forma usual en español bíblico y manteniendo la referencia histórica sin traducirlos.
- source_word: עוֹרְרָה
  english_pob_choice: stir up
  chosen_spanish: despierta
  alternatives_spanish:
  - aviva
  - suscita
  - reaviva
  lexicon: HALOT
  rationale: El hebreo pide que se active o ponga en acción el poder de Dios. «Despierta» comunica bien la imagen de energía latente que pasa a obrar, con naturalidad en español de oración.
- source_word: גְּבוּרָתֶךָ
  english_pob_choice: your might
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu might
  lexicon: HALOT
  rationale: «גְּבוּרָה» abarca fuerza, poder y hazaña poderosa. «Tu poder» es claro y solemne en español; mantiene la amplitud semántica sin sonar forzado.
- source_word: וּלְכָה
  english_pob_choice: and come
  chosen_spanish: y ven
  alternatives_spanish:
  - y ve
  - y anda
  lexicon: HALOT
  rationale: Siguiendo la lectura contextual del POB inglés, el verbo de «ir/andar» funciona como súplica para que Dios se acerque e intervenga. En español, «ven» expresa esa idea con mayor naturalidad que «ve».
- source_word: לִישֻׁעָתָה לָּנוּ
  english_pob_choice: to save us
  chosen_spanish: a salvarnos
  alternatives_spanish:
  - para salvarnos
  - para nuestra salvación
  lexicon: HALOT
  rationale: 'La construcción expresa finalidad: la venida de Dios orientada a la liberación del pueblo. «A salvarnos» conserva la fuerza verbal y la dirección del ruego.'
theological_decisions:
- issue: Plea for divine intervention rather than doctrinal statement
  english_pob_reading: 'A direct plea for God to manifest power and intervene: ''stir up your might and come to save us.'''
  chosen_spanish_reading: 'Una súplica directa para que Dios manifieste su poder y actúe a favor de su pueblo: «despierta tu poder y ven a salvarnos».'
  alternative_spanish_readings:
  - «despierta tu fuerza y ve por nuestra salvación»
  - «aviva tu poder y ven para librarnos»
  rationale: El versículo es una oración urgente. La traducción debe conservar el carácter petitorio sin convertirlo en una formulación abstracta o demasiado explicativa. Se mantiene la intervención divina concreta, coherente con la lectura del POB inglés.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto auditado del POB inglés no introduce cambios revisados ni variantes textuales adicionales; la lectura fue considerada de alta concordancia y se conserva la misma orientación interpretativa.
  spanish_consistency_notes:
  - Se usa «poder» para גְּבוּרָה, en línea con la amplitud semántica indicada por el audit trail inglés.
  - Se prefiere «ven» en lugar de «ve» para naturalizar en español la súplica de intervención divina.
  - Los nombres tribales se mantienen transliterados y con acentuación habitual en español bíblico.
  - No se añadió nota de pie porque el texto español no introduce una ambigüedad nueva distinta de la ya resuelta por el audit trail inglés.
