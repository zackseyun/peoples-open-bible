translation:
  language: es
  text: —Oh rey[a], ¿hasta cuándo nos seguirás poniendo a prueba, mandando ya por tercera vez que sean destruidos, y luego otra vez, en este asunto, revocando por un cambio de parecer las decisiones que has tomado[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Rey». El vocativo griego permite ambas formas; se mantiene «Oh rey» para conservar el tono implorativo y directo.
    reason: lexical_alternative
  - marker: b
    text: O «tus decretos». El griego τὰ σοὶ δεδογμένα puede referirse específicamente a lo que el rey ha decretado oficialmente, no solo a decisiones en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: Oh rey
  alternatives_spanish:
  - Rey
  - Oh, rey
  lexicon: LSJ
  rationale: La vocativa griega pide un tratamiento directo y solemne. «Oh rey» conserva el tono apelativo sin sonar arcaizante; se evita «señor» porque el texto se dirige al rey como tal.
- source_word: διαπειράζεις
  english_pob_choice: keep testing
  chosen_spanish: seguirás poniendo a prueba
  alternatives_spanish:
  - seguirás probándonos
  - continuarás probándonos
  - seguirás testándonos
  lexicon: LSJ
  rationale: El verbo expresa prueba reiterada o insistente; el presente con μέχρι τίνος sugiere continuidad. «Poniendo a prueba» transmite el matiz de examen continuo con un español natural.
- source_word: προστάσσων
  english_pob_choice: commanding
  chosen_spanish: mandando
  alternatives_spanish:
  - ordenando
  - disponiendo
  - dando órdenes
  lexicon: LSJ
  rationale: Es un participio que explica cómo se ejerce esa prueba. «Mandando» conserva el carácter oficial y directo sin volver la frase demasiado técnica.
- source_word: ἤδη τρίτον
  english_pob_choice: now ... for the third time
  chosen_spanish: ya por tercera vez
  alternatives_spanish:
  - ya tercera vez
  - ahora por tercera vez
  - ya por tercera ocasión
  lexicon: LSJ
  rationale: La combinación marca repetición alcanzada hasta el presente. «Ya por tercera vez» integra ambos valores de manera natural en español.
- source_word: αὐτοὺς ἀφανίσαι
  english_pob_choice: that they be destroyed
  chosen_spanish: que sean destruidos
  alternatives_spanish:
  - que los destruyan
  - que sean aniquilados
  - que perezcan
  lexicon: LSJ
  rationale: El infinitivo con acusativo se vierte bien con una pasiva en español. «Destruidos» mantiene el sentido de borrarlos o hacerlos desaparecer, sin intensificar más allá de lo requerido.
- source_word: ἐπὶ τῶν πραγμάτων
  english_pob_choice: in the matter at hand
  chosen_spanish: en el asunto de ahora
  alternatives_spanish:
  - en el asunto presente
  - en esta cuestión
  - en el caso de ahora
  lexicon: LSJ
  rationale: La frase se refiere al caso concreto en discusión. «En el asunto de ahora» es claro y conserva la referencia inmediata sin sobreinterpretar.
- source_word: ἐκ μεταβολῆς
  english_pob_choice: by a change of mind
  chosen_spanish: por un cambio de ánimo
  alternatives_spanish:
  - por un cambio de parecer
  - por una mudanza de decisión
  - tras cambiar de parecer
  lexicon: LSJ
  rationale: El griego apunta a una alteración/reversión de intención. «Cambio de ánimo» mantiene la idea de variación interior sin fijarla exclusivamente como una reflexión intelectual; por eso se conserva la tensión entre ánimo, intención y decisión.
- source_word: ἀναλύων
  english_pob_choice: reversing
  chosen_spanish: revocando
  alternatives_spanish:
  - anulando
  - deshaciendo
  - dejando sin efecto
  lexicon: LSJ
  rationale: En contexto el participio describe el acto de deshacer lo previamente decidido. «Revocando» comunica bien la reversión de una resolución oficial o real.
- source_word: τὰ σοὶ δεδογμένα
  english_pob_choice: the decisions you have made
  chosen_spanish: las decisiones que has tomado
  alternatives_spanish:
  - tus decretos
  - lo que has decretado
  - las resoluciones que has tomado
  lexicon: LSJ
  rationale: δεδογμένα puede referirse a lo resuelto o decretado. «Las decisiones que has tomado» preserva la amplitud del término; se evita cerrar el sentido solo a un lenguaje jurídico de «decretos».
translation_notes:
  revision_awareness: El griego presenta una sola unidad retórica con interrogación vocativa, acusación de prueba continua, repetición «ya por tercera vez», y una clausula final sobre reversión de decisiones. La redacción española busca reproducir esa progresión sin suavizar la tensión de la queja ni convertir ἐκ μεταβολῆς en una simple variación estilística. El audit trail inglés también oscila entre «change of mind» y el posible valor de «decrees»; la versión española conserva esa ambigüedad con «cambio de ánimo» y «decisiones» en el texto principal, mientras la nota explica la alternativa jurídica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - «Mandando» y «revocando» sostienen un registro sobrio y administrativo acorde al contexto real.
  - La pasiva «que sean destruidos» preserva la focalización sobre las víctimas, como en el inglés auditado.
