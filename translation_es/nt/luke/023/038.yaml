translation:
  language: es
  text: Y había también una inscripción[a] sobre él:[b] «Este es el Rey de los judíos».[c][d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «letrero», «aviso» o «cargo escrito».
    reason: lexical_alternative
  - marker: b
    text: O «encima de él».
    reason: lexical_alternative
  - marker: c
    text: 'El griego dice literalmente: «El Rey de los judíos, este».'
    reason: lexical_alternative
  - marker: d
    text: «Judíos» puede en algunos contextos verterse «judeanos», pero en este título fijo de la crucifixión el sentido tradicional y contextualmente adecuado es «judíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ καὶ
  english_pob_choice: And there was also
  chosen_spanish: Y había también
  alternatives_spanish:
  - Y también había
  - Y existía además
  lexicon: BDAG
  rationale: La construcción presenta un dato añadido en el relato. «Había también» conserva el valor narrativo y la adición de καὶ sin forzar una formulación más pesada en español.
- source_word: ἐπιγραφή
  english_pob_choice: inscription
  chosen_spanish: letrero
  alternatives_spanish:
  - inscripción
  - rótulo
  - aviso
  - cargo escrito
  lexicon: BDAG
  rationale: En español, «letrero» comunica de forma natural un texto colocado de manera visible sobre la cruz. «Inscripción» es posible, pero suena más técnico; aquí se busca claridad narrativa sin perder la idea de escrito expuesto.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre él mismo
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo marca ubicación relativa; «sobre él» refleja esa relación de posición de manera idiomática en español.
- source_word: Ὁ βασιλεὺς τῶν Ἰουδαίων οὗτος
  english_pob_choice: This is the King of the Jews
  chosen_spanish: Este es el Rey de los judíos
  alternatives_spanish:
  - El Rey de los judíos, este
  - Este hombre es el Rey de los judíos
  lexicon: BDAG
  rationale: El griego es nominal y demostrativo, con οὗτος dando énfasis deíctico. En español se vierte naturalmente con «Este es…», preservando el valor del demostrativo y el título fijo.
- source_word: Ἰουδαίων
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En este título fijado sobre la cruz, el sentido tradicional y contextualmente apropiado en español es «judíos». «Judeanos» es posible en otros contextos, pero aquí no comunica tan bien el título establecido.
theological_decisions:
- issue: Naturaleza del letrero de crucifixión
  english_pob_reading: Render the posted text straightforwardly as an inscription identifying Jesus as 'the King of the Jews' without adding interpretive commentary about irony, accusation, or messianic confession.
  chosen_spanish_reading: Presentar el texto como el rótulo colocado sobre Jesús, sin añadir explicación sobre ironía, acusación o confesión mesiánica.
  alternative_spanish_readings:
  - Presentarlo como cargo legal formal
  - Explicitar la ironía política del letrero
  rationale: La oración reporta el contenido del texto exhibido; la traducción debe conservar esa sobriedad y no resolver interpretativamente la tensión narrativa que el versículo deja abierta.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una lectura simple y estable del versículo, sin revisiones sustanciales. El español sigue esa misma línea, ajustando solo la naturalidad idiomática y evitando resolver la ambigüedad del letrero.
  spanish_consistency_notes:
  - Se mantuvo «judíos» en el título fijo, en coherencia con el cierre auditado en inglés.
  - Se evitó «Cristo» porque el versículo no usa Χριστός; el texto solo transmite el título político-identitario «Rey».
  - «Sobre él» conserva la localización del rótulo sin añadir detalles no presentes en el griego.
