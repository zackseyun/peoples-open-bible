translation:
  language: es
  text: Dios[a], escucha mi oración; presta oído a las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oye».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: Es un vocativo en oración directa. En español, «Dios» basta para el llamado y evita añadir un «oh» que no está exigido por el hebreo.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: El imperativo pide atención receptiva en contexto de súplica. «Escucha» comunica bien la idea en español moderno sin perder el tono de petición.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: תְּפִלָּה significa normalmente «oración». «Mi oración» mantiene la forma más natural y fiel en español.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear
  chosen_spanish: presta oído
  alternatives_spanish:
  - atiende
  - escucha
  lexicon: HALOT
  rationale: El hebreo expresa la imagen concreta de inclinar el oído con atención. «Presta oído» conserva esa metáfora mejor que un simple «escucha».
- source_word: לְאִמְרֵי
  english_pob_choice: to the words
  chosen_spanish: a las palabras
  alternatives_spanish:
  - a los dichos
  - a las expresiones
  lexicon: HALOT
  rationale: אִמְרֵי es plural constructo de un término para «palabras» o «dichos». «Las palabras» es claro y corresponde al paralelismo poético.
- source_word: פִי
  english_pob_choice: of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - que salen de mi boca
  - de mis labios
  lexicon: HALOT
  rationale: La expresión hebrea es literal y concreta. «De mi boca» conserva el idiomatismo y el paralelismo con «mi oración».
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el hebreo y con la auditoría inglesa; no se detectaron revisiones sustantivas que requieran nota de variante textual.
  spanish_consistency_notes:
  - Se mantiene «Dios» como vocativo directo, sin añadir puntuación o formulación arcaizante innecesaria.
  - Se conserva el paralelismo entre «mi oración» y «las palabras de mi boca» con un registro bíblico natural en español.
  - «Presta oído» refleja la metáfora auditiva del hebreo sin sobreexplicar.
