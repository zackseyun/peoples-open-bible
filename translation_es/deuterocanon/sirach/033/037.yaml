translation:
  language: es
  text: Cuando adquieras un amigo[a], adquiérelo poniéndolo a prueba, y no confíes en él demasiado pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adquiérelo por medio de pruebas» o «adquiérelo en tiempo de prueba». El griego ἐν πειρασμῷ admite varias formulaciones muy cercanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτήσῃ
  english_pob_choice: acquire
  chosen_spanish: adquieras / adquiérelo
  alternatives_spanish:
  - ganes / gánalo
  - hagas tuyo / hazlo tuyo
  lexicon: LSJ
  rationale: κτάομαι expresa adquirir o obtener posesión. En español, «adquirir» conserva mejor el tono deliberado y sapiencial que «hacer amigo», y permite mantener la repetición del verbo en la línea siguiente.
- source_word: φίλον
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amigo cercano
  - compañero
  lexicon: LSJ
  rationale: El sustantivo griego es singular y directo. «Amigo» es la equivalencia natural y fiel en español para esta instrucción sapiencial.
- source_word: ἐν πειρασμῷ
  english_pob_choice: through testing
  chosen_spanish: mediante prueba
  alternatives_spanish:
  - en prueba
  - por prueba
  - en tiempo de prueba
  lexicon: BDAG
  rationale: πειρασμός puede significar prueba, ensayo o tentación según el contexto. Aquí el sentido es comprobar la confiabilidad de la persona; «mediante prueba» conserva la idea instrumental sin cargar el término hacia «tentación».
- source_word: κτῆσαι
  english_pob_choice: acquire
  chosen_spanish: adquiérelo
  alternatives_spanish:
  - gánalo
  - hazte de él
  lexicon: LSJ
  rationale: La repetición verbal del griego se preserva con otro imperativo de «adquirir». En español, el imperativo encaja bien en la cadencia proverbial y mantiene el paralelismo.
- source_word: μὴ ταχὺ
  english_pob_choice: do not quickly
  chosen_spanish: no ... con rapidez
  alternatives_spanish:
  - no ... pronto
  - no ... apresuradamente
  lexicon: LSJ
  rationale: La combinación expresa prisa o premura en el confiar. «Con rapidez» suena natural en español y conserva la advertencia contra confiar demasiado pronto.
- source_word: ἐμπιστεύσῃς
  english_pob_choice: trust
  chosen_spanish: confíes
  alternatives_spanish:
  - creas en
  - te fíes de
  lexicon: BDAG
  rationale: ἐμπιστεύω aquí significa depositar confianza. «Confiar» es el verbo español más directo y digno para este contexto; evita una expansión innecesaria y mantiene la fuerza del mandato negativo.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: en él
  alternatives_spanish:
  - en esa persona
  - de él
  lexicon: Greek grammar
  rationale: El dativo masculino singular exige un referente masculino singular. En español, la preposición se expresa naturalmente con «en él» con el verbo confiar.
theological_decisions:
- issue: Referencia masculina singular en instrucción sapiencial
  english_pob_reading: Retain masculine singular pronouns ('him')
  chosen_spanish_reading: Conservar el singular masculino («él»).
  alternative_spanish_readings:
  - neutro plural («ellos» / «personas» )
  - neutralización («esa persona»)
  rationale: El griego usa formas masculinas singulares representativas. Mantener «él» respeta el texto base y la política de precisión gramatical, sin neutralizar indebidamente la instrucción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Matiz de πειρασμός entre prueba y tentación
  english_pob_reading: through testing
  chosen_spanish_reading: mediante prueba
  alternative_spanish_readings:
  - en tentación
  - por ensayo
  - en tiempo de prueba
  rationale: En este contexto sapiencial la finalidad es probar la fidelidad de un amigo; «prueba» comunica mejor ese valor que «tentación», que en español suele sugerir inducir al mal.
  doctrine_reference: BDAG; uso contextual de πειρασμός en literatura sapiencial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que simplificó «put your trust in him» a «trust him». La redacción española sigue esa concisión con «confíes en él» y evita expansiones innecesarias, manteniendo la repetición verbal del original griego.
  spanish_consistency_notes:
  - Se conservó el singular masculino para el amigo, en línea con el griego y con la política de precisión gramatical.
  - Se eligió «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «prueba» para πειρασμός por el contexto sapiencial, evitando «tentación» porque cambiaría el matiz.
  - La repetición de «adquirir» / «adquirirlo» refleja la repetición del verbo griego κτάομαι.
