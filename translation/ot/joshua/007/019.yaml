id: JOS.7.19
reference: Joshua 7:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוֹשֻׁ֜עַ אֶל עָכָ֗ן בְּנִ/י֙ שִֽׂים נָ֣א כָב֗וֹד לַֽ/יהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל וְ/תֶן ל֣/וֹ תוֹדָ֑ה וְ/הַגֶּד נָ֥א לִ/י֙ מֶ֣ה עָשִׂ֔יתָ אַל תְּכַחֵ֖ד מִמֶּֽ/נִּי־־־־־׃
translation:
  text: Then Joshua said to Achan[a], “My son, please give glory to Yahweh, the God of Israel, and give thanks to him. Please tell me what you have done; do not hide it from me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and give him thanks,' or in this context possibly 'make confession to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Literal filial address with an idiomatic compassionate or paternal tone. 'My son' preserves the masculine singular form and the solemn, personal appeal better than the more generic 'my child.'
- source_word: שִׂים נָא כָבוֹד
  chosen: please give glory
  alternatives:
  - ascribe glory
  - give honor
  lexicon: HALOT
  rationale: The idiom literally uses 'set/place glory,' but in English 'give glory' best conveys the established Hebrew sense of acknowledging God's honor, especially in a confession context. 'Please' reflects נָא as a polite entreaty.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ל is naturally rendered 'to' here with the idiom 'give glory to.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying the covenant God in relation to Israel.
- source_word: וְתֶן לוֹ תוֹדָה
  chosen: and give him praise
  alternatives:
  - and give him thanks
  - and make confession to him
  lexicon: HALOT
  rationale: תוֹדָה can denote thanksgiving, praise, or confession depending on context. In this judicial-confessional setting, the phrase likely means acknowledging God truthfully, but 'give him praise' is natural English and keeps the God-directed sense without over-interpreting. The confessional nuance is preserved by the following command to tell what he has done.
- source_word: וְהַגֶּד נָא לִי
  chosen: Please tell me
  alternatives:
  - Please declare to me
  - Please report to me
  lexicon: HALOT
  rationale: Hiphil imperative of נגד means to tell or declare. 'Please tell me' is clear, direct, and fits modern readable English while preserving the polite force of נָא.
- source_word: מֶה עָשִׂיתָ
  chosen: what you have done
  alternatives:
  - what you did
  lexicon: HALOT
  rationale: English present perfect fits the immediate relevance of the completed action in the inquiry. Either is possible; this choice sounds natural in solemn speech.
- source_word: אַל תְּכַחֵד מִמֶּנִּי
  chosen: do not hide it from me
  alternatives:
  - do not conceal it from me
  - do not deny it to me
  lexicon: HALOT
  rationale: כחד commonly means to hide, conceal, or withhold. Because Joshua is urging confession of a deed, 'do not hide it from me' best captures the sense in idiomatic English. The object 'it' is implicit in Hebrew and required in English.
