translation:
  language: es
  text: Y pondré mi Espíritu dentro de ustedes, y haré que anden en mis estatutos[a]; y guardarán mis juicios[b] y los cumplirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mis decretos’ o ‘mis ordenanzas’ para ‘mis estatutos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘mis ordenanzas’ o ‘mis reglas’ para ‘mis juicios’.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi aliento
  - mi viento
  lexicon: HALOT
  rationale: En este contexto de restauración, רוּחַ con sufijo de primera persona se refiere al Espíritu de Dios, no a “aliento” ni “viento”. Mantener “Espíritu” con mayúscula comunica correctamente el referente divino personal sin añadir contenido ajeno al hebreo.
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: within you
  chosen_spanish: dentro de ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su interior
  lexicon: HALOT
  rationale: La expresión apunta al interior o al centro de la persona/comunidad. “Dentro de ustedes” conserva esa fuerza interna y suena natural en español, sin forzar una formulación más interpretativa que el hebreo.
- source_word: וְעָשִׂיתִי
  english_pob_choice: I will cause
  chosen_spanish: haré que
  alternatives_spanish:
  - haré
  - causaré que
  lexicon: HALOT
  rationale: El verbo עשה aquí funciona con valor causativo ante la construcción siguiente. “Haré que” expresa bien la acción efectiva de Dios sobre la conducta de su pueblo, preservando la agencia divina fuerte del original.
- source_word: בְּחֻקַּי תֵּלֵכוּ
  english_pob_choice: to walk in my statutes
  chosen_spanish: anden en mis estatutos
  alternatives_spanish:
  - caminen en mis estatutos
  - sigan mis estatutos
  - vivan conforme a mis estatutos
  lexicon: HALOT
  rationale: “Andar” conserva la metáfora bíblica de conducta. “En mis estatutos” respeta la preposición y el lenguaje legal-covenantal; “estatutos” mantiene la distinción frente a los “juicios” de la segunda cola.
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: “Estatutos” es una equivalencia formal y estable para חֻקִּים, suficientemente precisa y distinguible de מִשְׁפָּטִים en la cola siguiente.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  - mis decisiones judiciales
  lexicon: HALOT
  rationale: En español, “juicios” conserva el enlace con el campo legal de מִשְׁפָּט y evita que se confunda con חֻקִּים. Aunque “ordenanzas” podría funcionar, “juicios” mantiene mejor la tensión entre decisión judicial y norma legal en esta pareja de términos.
- source_word: תִּשְׁמְרוּ
  english_pob_choice: you will keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o cuidar. “Guardarán” preserva el valor de custodia/observancia normativa y enlaza bien con el siguiente “cumplirán” sin duplicar exactamente el mismo matiz.
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: and do them
  chosen_spanish: los cumplirán
  alternatives_spanish:
  - los harán
  - los practicarán
  - los ejecutarán
  lexicon: HALOT
  rationale: El verbo final intensifica la obediencia no solo como vigilancia sino como realización efectiva. “Cumplirán” comunica esa ejecución práctica en un español natural y solemnemente bíblico.
theological_decisions:
- issue: Agencia divina y obediencia humana
  english_pob_reading: and I will cause you to walk in my statutes
  chosen_spanish_reading: y haré que anden en mis estatutos
  alternative_spanish_readings:
  - y haré que caminen en mis estatutos
  - y haré posible que anden en mis estatutos
  - y los moveré a andar en mis estatutos
  rationale: El hebreo presenta una acción eficaz de Dios que resulta en la obediencia del pueblo. “Haré que” preserva esa causalidad divina sin diluirla ni resolverla en un esquema teológico posterior.
  doctrine_reference: Mantener la tensión entre iniciativa divina y respuesta humana; equivalencia óptima
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la distinción entre חֻקִּים y מִשְׁפָּטִים y la fuerza causativa de וְעָשִׂיתִי. No se detectaron revisiones previas que exigirían incorporar una lectura alternativa adicional.
  spanish_consistency_notes:
  - Se usa “Espíritu” con mayúscula para el referente divino, conforme al valor del sufijo posesivo en רוּחִי.
  - “Estatutos” y “juicios” se mantienen distintos para preservar la pareja legal del hebreo.
  - Se evitó “SEÑOR” y se empleó el posesivo de primera persona con el nombre implícito de Dios, coherente con el estándar del proyecto para יהוה cuando no aparece explícito en el versículo.
