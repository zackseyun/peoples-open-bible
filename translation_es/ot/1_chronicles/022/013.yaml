base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/022/013.yaml
  text: Then you will prosper[a], if you are careful to do the statutes and the judgments that Yahweh commanded Moses for Israel. Be strong and courageous. Do not fear[b], and do not be dismayed.
  footnotes:
