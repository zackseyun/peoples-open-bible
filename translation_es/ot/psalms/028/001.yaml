translation:
  language: es
  text: De David[a]. A ti, Yahvé, clamo; mi roca, no seas sordo a mí[c], no sea que te calles ante mí y yo llegue a ser como los que descienden a la fosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para David» o «por David». La preposición hebrea puede señalar autoría, dedicación o pertenencia.'
    reason: lexical_alternative
  - marker: b
    text: «La fosa» puede referirse a la tumba o al ámbito de los muertos.
    reason: lexical_alternative
  - marker: c
    text: 'O: «no guardes silencio ante mí». El primer verbo puede solaparse con la idea de silencio de la cláusula siguiente, pero el texto principal conserva la distinción entre no oír y no responder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: La preposición לְ con un nombre propio en los salmos admite varias relaciones (autoría, dedicación o pertenencia). 'De David' mantiene esa ambigüedad mejor que fijarla como 'por' o 'para', y es una fórmula natural en español bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo el criterio del proyecto de no sustituirlo por un título. 'Yahvé' es la forma establecida en el estilo objetivo del texto español y corresponde al auditable principio de transparencia.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - grito
  lexicon: HALOT
  rationale: '''קרא'' en este contexto es una invocación orante. ''Clamo'' comunica mejor la fuerza devocional del verso en español que el más neutral ''llamo'', sin volverlo excesivamente interpretativo como ''grito''.'
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peñasco
  - mi refugio
  lexicon: HALOT
  rationale: La metáfora concreta de Dios como roca debe mantenerse. 'Mi roca' es la equivalencia más directa y transparente; 'refugio' suavizaría la imagen original.
- source_word: אַֽל תֶּחֱרַשׁ מִמֶּנִּי
  english_pob_choice: do not be deaf to me
  chosen_spanish: no guardes silencio ante mí
  alternatives_spanish:
  - no seas sordo a mí
  - no te calles ante mí
  lexicon: HALOT
  rationale: El verbo חרשׁ puede aludir a ser sordo o guardar silencio. En español, 'no guardes silencio ante mí' preserva la fuerza relacional y evita una expresión corporal menos natural. La fórmula también deja visible la tensión con la cláusula siguiente, donde aparece la idea explícita de silencio.
- source_word: פֶּן תֶּחֱשֶׁה מִמֶּנִּי
  english_pob_choice: lest you be silent to me
  chosen_spanish: para que no te calles ante mí
  alternatives_spanish:
  - no sea que te calles ante mí
  - no sea que guardes silencio ante mí
  lexicon: HALOT
  rationale: La partícula פֶּן introduce una consecuencia temida. 'Para que no' permite una sintaxis fluida en español y conserva el valor prospectivo del hebreo. 'Te calles ante mí' mantiene la relación personal y la repetición semántica del silencio sin diluirla.
- source_word: וְנִמְשַׁלְתִּי עִם יֹרְדֵי בוֹר
  english_pob_choice: and I become like those who go down to the pit
  chosen_spanish: y yo llegue a ser como los que descienden al sepulcro
  alternatives_spanish:
  - y yo sea contado con los que descienden al sepulcro
  - y yo me vuelva como los que bajan al pozo
  lexicon: HALOT
  rationale: El nifal de משל expresa comparación o equiparación. 'Llegue a ser como' comunica bien el resultado temido. 'Sepulcro' es una opción interpretativa para בּוֹר cuando el contexto apunta a la muerte; conserva el peso funerario y evita restringirlo solo a un 'pozo' físico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios en lugar de ocultarlo tras una sustitución devocional. Esto sigue la política del POB para el Tetragrámaton y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בּוֹר en el cierre del verso
  english_pob_reading: The pit can refer to the grave or the realm of the dead.
  chosen_spanish_reading: el sepulcro puede evocar la tumba o el ámbito de los muertos
  alternative_spanish_readings:
  - el pozo
  - la fosa
  rationale: En español, 'sepulcro' comunica con claridad la referencia funeraria que el contexto sugiere, sin negar la amplitud semántica del término hebreo. La elección mantiene la tensión entre imagen concreta y referencia a la muerte, análoga a la nota inglesa.
  doctrine_reference: 'DOCTRINE.md: Lexical ambiguity — poetic death imagery'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que suavizó la puntuación y mantuvo la aposición ''my rock'' como vocativo. En español se reprodujo esa relación con coma vocativa: ''mi roca, no guardes silencio...''. También se respetó la distinción auditiva/silencio del par verbal hebreo mediante una primera cláusula de no guardar silencio y una segunda de no callarse.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'mi roca' como vocativo poético, sin convertirlo en paráfrasis explicativa.
  - Se conserva el contraste semántico entre la falta de respuesta divina y el silencio posterior, en línea con la anotación inglesa.
  - Se traduce בּוֹר con 'sepulcro' por el contexto de muerte, pero se anota la posibilidad de 'pozo/fosa' para no borrar la amplitud del hebreo.
  - La puntuación con punto y coma reproduce la progresión del hebreo y la revisión inglesa sin sobrecargar el verso.
