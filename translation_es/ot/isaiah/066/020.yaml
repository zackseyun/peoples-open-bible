base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/020.yaml
  text: And they will bring all your brothers from all the nations as an offering to Yahweh[a], on horses and in chariots and in litters and on mules and on camels, to my holy mountain Jerusalem, says Yahweh[c][b], just as the sons of Israel bring the offering in a clean vessel to the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'covered wagons' for the rare term translated 'litters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'swift camels' for the rare term translated 'dromedaries.'
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' may carry a broader kinship sense here, not only male siblings.'
    reason: cultural_note
