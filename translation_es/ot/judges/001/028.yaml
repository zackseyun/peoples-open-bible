translation:
  language: es
  text: Y cuando Israel se fortaleció, sometió a los cananeos[a] a trabajos forzados[b], pero no los expulsó por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo singular colectivo; en español se traduce en plural para referirse al pueblo cananeo en conjunto.
    reason: lexical_alternative
  - marker: b
    text: 'También: «labor forzada», «tributo de trabajo» o «corvea». El hebreo denota labor compulsiva impuesta por un poder dominante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una cláusula temporal. «Y cuando» conserva la secuencia y el valor temporal sin volver rígida la expresión.
- source_word: חָזַק
  english_pob_choice: became strong
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - creció en fuerza
  - llegó a ser fuerte
  lexicon: HALOT
  rationale: El verbo expresa un volverse fuerte o dominante; «se fortaleció» transmite bien el sentido ingresivo en español natural.
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - sometió
  - impuso
  lexicon: HALOT
  rationale: Con לָמַס, el verbo comunica la acción de colocar a alguien bajo una condición de servidumbre laboral. «Puso» mantiene la construcción verbal y permite expresar luego el régimen de trabajo forzado.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular colectivo, el español idiomático exige plural para el pueblo en conjunto. Se conserva el valor colectivo del referente.
- source_word: לָמַס
  english_pob_choice: to forced labor
  chosen_spanish: a trabajo forzado
  alternatives_spanish:
  - a labor forzada
  - a trabajo tributario
  - a corvea laboral
  lexicon: HALOT
  rationale: מַס designa labor compulsiva impuesta por un poder dominante. «Trabajo forzado» comunica esa coerción con claridad en español contemporáneo, sin suavizar la carga semántica.
- source_word: וְהוֹרֵישׁ לֹא הוֹרִישׁוֹ
  english_pob_choice: but they did not drive them out completely
  chosen_spanish: pero no los expulsó por completo
  alternatives_spanish:
  - pero no los desposeyó por completo
  - pero no los echó completamente
  lexicon: HALOT
  rationale: La construcción enfática con infinitivo absoluto y verbo finito refuerza la negación. «No los expulsó por completo» preserva ese énfasis de manera clara y natural; «expulsar» es preferible a «desposeer» para el contexto de conquista.
theological_decisions:
- issue: Tratamiento de los cananeos por Israel
  english_pob_reading: Israel someted the Canaanites to forced labor instead of fully expelling them.
  chosen_spanish_reading: Israel los sometió a trabajo forzado en vez de expulsarlos por completo.
  alternative_spanish_readings:
  - Israel les impuso tributo
  - Israel los hizo pagar tributo
  rationale: El hebreo לָמַס indica imposición de labor obligatoria, no simplemente un pago fiscal neutral. La traducción conserva la fuerza coercitiva del texto y no atenúa la tensión histórica ni moral del pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura revisada del inglés auditado: «pero no los expulsó por completo», manteniendo el énfasis hebreo en la negación y una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto; este versículo no lo contiene.
  - Se usa «cananeos» en plural por idiomaticidad española, aunque el hebreo es singular colectivo.
  - «Trabajo forzado» preserva el matiz coercitivo de מַס y evita suavizarlo como mero tributo.
