review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y las decisiones del POB inglés: «alcanzó» para וַיַּשֵּׂג, valor regional para בָּהָר / בְּהַר הַגִּלְעָד, y «parientes» para אֶחָיו en sentido de grupo de clan. Sin embargo, «plantó su tienda» no es una expresión natural ni fiel al modismo hebreo en español bíblico actual; sugiere literalmente clavar o sembrar una tienda más que instalar un campamento. También el pie de nota c está mal anclado: la alternativa «en el monte de Galaad» corresponde mejor a la última frase, no a la primera aparición de «región montañosa».'
  spanish_quality_summary: El texto es claro y legible, pero necesita un ajuste idiomático importante para sonar natural en español neutro y digno. «Había levantado su tienda» / «levantó campamento» funciona mucho mejor que «había plantado su tienda» / «había plantado la suya». También conviene mantener el contraste temporal del hebreo narrativo con «ya había levantado» para Jacob y perfecto simple para Laban.
  glossary_alignment: No hay términos teológicos sensibles aquí. Las decisiones léxicas principales están alineadas en general con el proyecto, salvo que el modismo de תָּקַע ... אָהֳלוֹ debe expresarse con un equivalente idiomático español natural. «Parientes» es aceptable para אֶחָיו, aunque una nota debe preservar el literal «sus hermanos» como hace el rastro inglés.
  issues:
  - severity: high
    issue: «plantó su tienda» / «había plantado la suya» es una mala representación idiomática de תָּקַע ... אָהֳלוֹ
    rationale: Aunque el hebreo usa un modismo concreto de tienda, en español «plantar una tienda» suena poco natural y puede distraer o confundir. El sentido es instalar la tienda o acampar, no 'plantarla' literalmente.
  - severity: medium
    issue: La nota [c] está anclada en la primera «región montañosa», pero sus alternativas incluyen «en el monte de Galaad»
    rationale: Esa alternativa corresponde a בְּהַר הַגִּלְעָד, es decir, a la ubicación final con «de Galaad», no a la primera mención general de בָּהָר.
  - severity: medium
    issue: Falta una nota que preserve el literal «sus hermanos» para אֶחָיו
    rationale: El POB inglés documenta esta alternativa, y en español conviene conservarla porque «parientes» es interpretativa aunque correcta en contexto.
  - severity: low
    issue: El pluscuamperfecto en la cláusula de Laban no es necesario
    rationale: El inglés revisado evita pluperfect en la segunda cláusula. En español, «Laban levantó campamento» fluye mejor y sigue el avance narrativo.
  revised_spanish_text: Y Labán alcanzó[a] a Jacob. Jacob ya había levantado su tienda en la región montañosa[b], y Labán levantó campamento con sus parientes[c] en la región montañosa de Galaad[d].
  revised_footnotes:
