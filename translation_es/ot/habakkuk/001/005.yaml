revisions:
- from: Miren entre las naciones y vean; asómbrense, asómbrense[a]. Porque en sus días estoy haciendo una obra que no creerían si se les contara[b].
  to: Miren[a] a las naciones y vean; asómbrense, asómbrense[b]. Porque en sus días estoy haciendo una obra que no creerían si se les contara[c].
  rationale: Se ajusta la preposición con «naciones» para lograr un español más natural sin perder el sentido admitido por el hebreo; se rehacen las notas para reflejar mejor las alternativas del expediente inglés y evitar una alternativa concesiva («aunque») que se aparta del matiz condicional principal.
