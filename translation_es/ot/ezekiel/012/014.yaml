    text: O 'su ayuda'; el hebreo usa una expresión colectiva que puede referirse a quienes lo asisten.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'a todo viento'; es decir, en todas direcciones.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] para que corresponda al término que realmente comenta ('ayudantes'). Se ajusta la cláusula final a 'sacaré una espada tras ellos' para reflejar mejor el modismo hebreo, conservar el matiz de persecución de אַחֲרֵיהֶם y evitar el giro poco natural 'detrás de ellos'.
