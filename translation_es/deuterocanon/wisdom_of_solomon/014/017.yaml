translation:
  language: es
  text: Como no podían honrarlos en persona porque vivían lejos, reprodujeron la apariencia de lejos[a] e hicieron una imagen visible del rey honrado, para que, con su celo, halagaran[b] al ausente como si estuviera presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la apariencia desde lejos».
    reason: lexical_alternative
  - marker: b
    text: O «cortejaran el favor del ausente como si estuviera presente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὄψει
  english_pob_choice: in person
  chosen_spanish: en persona
  alternatives_spanish:
  - de vista
  - frente a ellos
  - ante sus ojos
  lexicon: LSJ
  rationale: La frase contrasta presencia y distancia; «en persona» comunica de forma natural la imposibilidad de honrarlo directamente, conservando el matiz de presencia real del original.
- source_word: τιμᾶν
  english_pob_choice: honor
  chosen_spanish: honrarlos
  alternatives_spanish:
  - reverenciarlos
  - rendirles honor
  - adorarlos
  lexicon: LSJ
  rationale: El contexto inmediato es social y político, no todavía cultual. «Honrar» conserva ese sentido sin intensificarlo indebidamente a «adorar».
- source_word: διὰ τὸ μακρὰν οἰκεῖν
  english_pob_choice: because they lived far away
  chosen_spanish: porque vivían lejos
  alternatives_spanish:
  - porque habitaban a distancia
  - porque residían lejos
  lexicon: LSJ
  rationale: Expresa con claridad la causa de la imposibilidad de honrar en persona, manteniendo el sentido espacial sencillo del griego.
- source_word: τὴν πόρρωθεν ὄψιν
  english_pob_choice: the distant appearance
  chosen_spanish: la apariencia distante
  alternatives_spanish:
  - la apariencia desde lejos
  - la visión lejana
  - la apariencia de lejos
  lexicon: LSJ
  rationale: ὄψις puede ser «apariencia» o «visión». «Apariencia distante» conserva el vínculo visual y la distancia sin forzar una lectura más técnica.
- source_word: ἀνατυπωσάμενοι
  english_pob_choice: reproduced
  chosen_spanish: reprodujeron
  alternatives_spanish:
  - copiaron
  - modelaron
  - representaron
  lexicon: LSJ
  rationale: El verbo describe la elaboración de una representación a partir de un modelo percibido. «Reproducir» mantiene la idea de volver a plasmar esa imagen sin exagerar el proceso.
- source_word: ἐμφανῆ εἰκόνα
  english_pob_choice: a visible image
  chosen_spanish: una imagen visible
  alternatives_spanish:
  - una imagen manifiesta
  - una semejanza patente
  - una imagen clara
  lexicon: LSJ
  rationale: «Visible» preserva la idea de algo manifiesto y perceptible para todos, en contraste con la lejanía y ausencia del rey.
- source_word: τοῦ τιμωμένου βασιλέως
  english_pob_choice: of the honored king
  chosen_spanish: del rey honrado
  alternatives_spanish:
  - del rey que era honrado
  - del rey reverenciado
  lexicon: LSJ
  rationale: La construcción participial se entiende naturalmente en español como un adjetivo. «Rey honrado» conserva el carácter del rey como objeto de honor.
- source_word: τὸν ἀπόντα ὡς παρόντα
  english_pob_choice: the absent one as though present
  chosen_spanish: al ausente como si estuviera presente
  alternatives_spanish:
  - al ausente como presente
  - al que está ausente como si estuviera allí
  lexicon: LSJ
  rationale: La antítesis ausente/presente es central. «Como si estuviera presente» preserva con claridad la comparación de ὡς.
- source_word: κολακεύωσιν
  english_pob_choice: might flatter
  chosen_spanish: halagaran
  alternatives_spanish:
  - adulaban
  - cortejaran su favor
  - lisonjearan
  lexicon: LSJ
  rationale: El verbo implica adulación interesada, no solo cortesía. «Halagar» mantiene el tono crítico en español sin sonar excesivamente áspero.
- source_word: διὰ τῆς σπουδῆς
  english_pob_choice: by their zeal
  chosen_spanish: con su celo
  alternatives_spanish:
  - por su diligencia
  - mediante su empeño
  - con su empeño
  lexicon: LSJ
  rationale: σπουδή expresa esfuerzo ardoroso, diligencia y celo. «Con su celo» transmite la energía con que buscaban agradar al ausente.
theological_decisions:
- issue: Si τιμᾶν debe sonar a honor civil/político o a veneración religiosa
  english_pob_reading: honor
  chosen_spanish_reading: honrar
  alternative_spanish_readings:
  - venerar
  - adorar
  rationale: El pasaje describe el origen de imágenes en un marco de honra a reyes y el paso posterior hacia la idolatría. Mantener «honrar» evita adelantar una lectura cultual que el verso aún no explicita por sí mismo.
  doctrine_reference: Principio de primacía del texto fuente y conservación del desarrollo argumental del pasaje.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y coincide con la decisión auditada en inglés de mantener el sentido social de «honrar» y el matiz crítico de «halagar». No se introdujeron cambios textuales frente al último pase revisado; se conservaron la antítesis ausente/presente y la causalidad de la distancia. '
  spanish_consistency_notes:
  - Se mantuvo «honrar» y no «adorar» para respetar el alcance inmediato de τιμᾶν.
  - «Celo» traduce σπουδή con una connotación de esfuerzo ardiente coherente con el contexto.
  - «Ausente/presente» conserva la oposición retórica central del verso.
  - Se prefirió un español natural y digno, sin calcar la sintaxis griega de manera rígida.
