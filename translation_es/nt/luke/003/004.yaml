review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: fórmula de cita («como está escrito»), referencia al libro de Isaías, voz que clama, mandato de preparar el camino y enderezar las sendas. También conserva correctamente la ambigüedad sintáctica de «en el desierto» mediante nota. Sin embargo, no sigue la preferencia terminológica del proyecto en la nota sobre κύριος/Isaías 40:3: donde el trasfondo hebreo es YHWH, el español del proyecto debe usar «Yahvé», no «Señor» ni una forma equivalente enmascarada.'
  spanish_quality_summary: El español es claro, natural y digno. «Voz del que clama en el desierto» y «hagan rectas sus sendas» son lecturas fluidas y bíblicamente inteligibles. La puntuación y el registro son adecuados. El único ajuste necesario es en la nota al pie a, para alinear el término divino con la política del proyecto.
  glossary_alignment: 'Alineación mayormente buena: γέγραπται → «está escrito», βίβλῳ λόγων → «libro de las palabras», ἔρημος → «desierto», τρίβους → «sendas». La decisión principal κύριος → «Señor» en el texto es defendible aquí porque el griego cita κύριος y la nota preserva el trasfondo de YHWH. Pero la nota debe decir «O: “Yahvé”», no «O: “Señor”», conforme al glosario del proyecto para el nombre divino.'
  issues:
  - severity: medium
    issue: La nota al pie a usa «Señor» como alternativa donde el trasfondo hebreo es YHWH.
    rationale: La política del proyecto exige «Yahvé» para YHWH en español. Dado que la nota existe precisamente para señalar el trasfondo hebreo de Isaías 40:3, debe nombrar explícitamente «Yahvé». El texto principal puede conservar «Señor» por seguir el griego κύριος, pero la nota no debe perder el nombre divino.
  revised_spanish_text: 'como está escrito en el libro de las palabras de Isaías el profeta[a]: «Voz del que clama en el desierto[b]: “Preparen el camino del Señor; hagan rectas sus sendas”»'
  revised_footnotes:
  - marker: a
    text: 'O: «Yahvé». La cita alude a Isaías 40:3, donde el hebreo tiene el nombre divino YHWH.'
    reason: alternative_reading
  - marker: b
    text: 'La frase «en el desierto» puede entenderse con «clama», como aquí, o con el mandato que sigue: «Voz del que clama: “En el desierto preparen el camino del Señor”».'
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal porque es fiel, claro y natural. Solo se corrige la nota a para ajustarla al estándar terminológico del proyecto: YHWH debe representarse como «Yahvé» en español cuando se explicita el trasfondo hebreo.'
