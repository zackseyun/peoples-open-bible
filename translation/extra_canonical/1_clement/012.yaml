translation:
  text: Because of faith and hospitality[a], Rahab the prostitute was saved. 2 For when spies had been sent out by Joshua son of Nun to Jericho, the king of the land learned that they had come to spy out their country, and he sent men to seize them, so that, once captured, they might be put to death. 3 So Rahab, being hospitable, welcomed them and hid them in the upper room under the stalks of flax. 4 But when the men from the king came and said, “The spies of our land came in to you; bring them out, for the king so orders,” she answered, “The men whom you seek did indeed come in to me, but they immediately departed,” while she pointed them toward another road. 5 And she said to the men, “I know for certain that the Lord God is giving this land to you, for the fear and dread of you has fallen upon those who dwell in it. Therefore, when it comes about that you take it, preserve me and my father’s house.” 6 And they said to her, “It shall be so, as you have spoken to us. But when you know that we are arriving, you shall gather all your people under your roof, and they will be preserved; for as many as are found outside the house will perish.” 7 And they added that they would give her a sign, that she should hang a scarlet cord from her house, making it clear that through the blood of the Lord there will be redemption for all who believe and hope in God. 8 You see, beloved, that in the woman not only faith[b][c][d], but also prophecy was present.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Clement interprets Rahab''s scarlet sign typologically: the visible scarlet marker points beyond the Joshua narrative to redemption through the Lord''s blood.'
    reason: cross_reference
    anchor_ref: '12:7'
  - marker: d
    text: The Greek at the end of the verse is textually awkward in this OCR witness; the sense is that Rahab misdirected the king's men by indicating another way.
    reason: textual_variant
    anchor_ref: '12:4'
  - marker: c
    text: That 'prophecy' was present in Rahab means Clement sees more than faithful action in her; he sees a prophetic sign in her words and in the scarlet token.
    reason: lexical_alternative
    anchor_ref: '12:8'
  - marker: b
    text: Or 'there came to be not only faith, but also prophecy'.
    reason: previous_rendering
lexical_decisions:
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Rendered 'faith' in keeping with project defaults and the chapter's paraenetic emphasis on believing response to God. 'Trust' is possible but narrower; 'faithfulness' is less likely in this construction.
- source_word: φιλοξενία / φιλόξενος
  chosen: hospitality / being hospitable
  alternatives:
  - love of strangers
  - welcoming strangers
  lexicon: BDAG
  rationale: Preserves the ethical virtue highlighted by Clement and keeps the lexical connection between the noun in v.1 and adjective in v.3.
- source_word: πόρνη
  chosen: prostitute
  alternatives:
  - harlot
  lexicon: BDAG
  rationale: '''Prostitute'' is the clear modern equivalent; ''harlot'' is archaic and less accessible.'
- source_word: ἐσώθη
  chosen: was saved
  alternatives:
  - was delivered
  - was preserved
  lexicon: BDAG
  rationale: Retains the theological resonance of salvation language while still fitting the narrative of rescue.
- source_word: κατάσκοποι / κατασκοπεῦσαι
  chosen: spies / to spy out
  alternatives:
  - scouts
  - to reconnoiter
  lexicon: BDAG
  rationale: Standard and natural rendering that preserves the military-surveillance sense.
- source_word: συλλημψομένους
  chosen: to seize
  alternatives:
  - to arrest
  - to capture
  lexicon: BDAG
  rationale: '''Seize'' fits the hostile royal action without importing overly modern legal nuance.'
- source_word: ὑπερῷον
  chosen: upper room
  alternatives:
  - upper chamber
  - roof room
  lexicon: BDAG
  rationale: Traditional but still intelligible rendering for an upper part of the house.
- source_word: λινοκαλάμη
  chosen: stalks of flax
  alternatives:
  - flax straw
  - bundles of flax
  lexicon: LSJ
  rationale: Conveys the agricultural material under which the spies were hidden; 'stalks of flax' is concrete and readable.
- source_word: ἐνλλάξις
  chosen: in another direction
  alternatives:
  - by a different route
  - elsewhere
  lexicon: LSJ
  rationale: The OCR form is difficult, but the sense is that Rahab misdirected the pursuers. The translation expresses the narrative force without overcommitting to a dubious form.
- source_word: Γινώσκουσα γινώσκω
  chosen: I know for certain
  alternatives:
  - I surely know
  - knowing, I know
  lexicon: BDAG
  rationale: Represents the emphatic duplicated cognition idiom in idiomatic English.
- source_word: κύριος ὁ θεός
  chosen: the Lord God
  alternatives:
  - the Lord, God
  lexicon: BDAG
  rationale: Follows project policy of translating κύριος as 'Lord' and preserves the biblical cadence of the title.
- source_word: διασώσατέ / διασωθήσονται
  chosen: preserve me / they will be preserved
  alternatives:
  - save me / they will be saved
  - deliver me / they will be delivered
  lexicon: BDAG
  rationale: Differentiates the intensified rescue verb from ἐσώθη while keeping the life-preserving sense in context.
- source_word: κόκκινον
  chosen: scarlet cord
  alternatives:
  - crimson sign
  - red cord
  lexicon: LSJ
  rationale: The context implies the scarlet marker associated with Rahab's house; 'scarlet cord' is the most natural concise rendering in English.
- source_word: λύτρωσις
  chosen: redemption
  alternatives:
  - deliverance
  - release
  lexicon: BDAG
  rationale: Preserves the theological weight of the term, especially in Clement's typological interpretation of the scarlet sign.
- source_word: προφητεία
  chosen: prophecy
  alternatives:
  - prophetic witness
  - foretelling
  lexicon: BDAG
  rationale: Keeps Clement's explicit theological claim that Rahab's action/significance was prophetic, not merely faithful.
theological_decisions:
- issue: Typological interpretation of Rahab's scarlet sign
  chosen_reading: Retained the explicit wording 'through the blood of the Lord there will be redemption' as Clement's christological/typological comment, not merely as part of the Joshua narrative.
  alternative_readings:
  - Treat the clause as only a narrative explanation of the scarlet sign
  - Soften 'blood of the Lord' into a generic symbol of deliverance
  rationale: The Greek plainly moves from the sign to a theological interpretation. Clement is reading Rahab typologically, and the translation should preserve that ecclesial and christological force.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Salvation language in Rahab narrative
  chosen_reading: Used 'was saved' in v.1 and 'redemption' in v.7, preserving soteriological diction alongside the historical rescue context.
  alternative_readings:
  - Use only 'rescued'/'delivered' throughout to avoid theological overtones
  rationale: Clement's paraenetic use of the story intentionally carries theological resonance; flattening it to bare survival language would undersell the text.
