revisions:
- from: Os haré pasar bajo la vara[a][b], y os traeré al vínculo del pacto.
  to: Os haré pasar bajo la vara[b], y os haré entrar en el vínculo del pacto[a].
  rationale: Se ajusta el segundo verbo para que el español exprese de manera natural la entrada en una relación vinculante, manteniendo el paralelismo con el hebreo y el sentido del POB inglés («into the bond of the covenant»). También se reordena el anclaje de notas para que [a] acompañe la frase que traduce מָסֹרֶת y [b] la imaginería de «bajo la vara».
  reviewer_model: gpt-5.4
