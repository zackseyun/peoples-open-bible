    text: Hebreo literalmente, «si robando es robado de con él»; construcción enfática que puede expresarse como «si de veras le es robado» o «si realmente es robado mientras está bajo su custodia».
    reason: lexical_alternative
  revision_rationale: Se ajustó «de él» a «le es robado» para lograr un español natural que aún preserve la idea de pérdida desde su posesión. Se cambió «restituirlo» por «hacer restitución» para reflejar con mayor precisión el sentido legal de יְשַׁלֵּם, en concordancia con el audit trail inglés. La nota se mantuvo, pero con redacción española más idiomática.
