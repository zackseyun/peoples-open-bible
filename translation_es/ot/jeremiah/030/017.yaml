translation:
  language: es
  text: 'Porque yo restauraré la salud[a] para ti, y te sanaré de tus heridas, declara Yahvé, porque te han llamado desterrada[b]: «Sión[c]; nadie se preocupa por ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haré subir sanidad para ti». El hebreo es literalmente un giro causativo: «haré subir curación para ti».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «rechazada» o «expulsada». El participio hebreo puede expresar a alguien arrojado fuera o apartado.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «Sión; no hay quien la busque» o «Sión—no hay quien la busque»; es decir, nadie se interesa por ella ni acude en su ayuda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַעֲלֶה אֲרֻכָה
  english_pob_choice: I will restore health
  chosen_spanish: haré subir sanidad
  alternatives_spanish:
  - restauraré la salud
  - traeré sanidad
  - pondré sanidad
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente dice algo como 'haré subir curación'. En español, 'haré subir sanidad' conserva la imagen causativa de העלה y mantiene la tensión entre el giro literal y el sentido natural de recuperación/restauración.
- source_word: וּמִמַּכּוֹתַיִךְ אֶרְפָּאֵךְ
  english_pob_choice: and I will heal you from your wounds
  chosen_spanish: te sanaré de tus heridas
  alternatives_spanish:
  - te curaré de tus heridas
  - te sanaré de tus golpes
  - y sanaré tus heridas
  lexicon: HALOT
  rationale: מַכּוֹת puede significar golpes, heridas o lesiones. 'Heridas' es la opción más natural en este contexto de sanidad, y 'de tus heridas' refleja bien el מן y el objeto femenino singular de segunda persona.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino según la convención del proyecto. 'Declara' comunica con dignidad la fórmula profética נְאֻם sin volverla mecánica.
- source_word: נִדָּחָה
  english_pob_choice: an outcast
  chosen_spanish: desterrada
  alternatives_spanish:
  - rechazada
  - expulsada
  - echada fuera
  lexicon: HALOT
  rationale: '''Desterrada'' recoge la idea de alguien arrojado fuera o apartado socialmente. En español suena menos duro que ''expulsada'' y encaja con el reproche hacia Sión, aunque deja abierta la resonancia de exclusión/castigo.'
- source_word: קָרְאוּ לָךְ
  english_pob_choice: they have called you
  chosen_spanish: te han llamado
  alternatives_spanish:
  - te llaman
  - te nombraron
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte naturalmente en pretérito perfecto compuesto para expresar una acusación ya asentada con relevancia presente.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se usa la forma castellana asentada 'Sión', ampliamente reconocible y más natural que la transliteración inglesa.
- source_word: הִיא דֹּרֵשׁ אֵין לָהּ
  english_pob_choice: no one cares for her
  chosen_spanish: no hay quien la busque
  alternatives_spanish:
  - nadie se interesa por ella
  - no hay quien cuide de ella
  - no hay nadie que la atienda
  lexicon: HALOT
  rationale: El campo semántico de דָּרַשׁ incluye buscar, inquirir, preocuparse por, atender. 'No hay quien la busque' conserva la imagen bíblica y admite el trasfondo de cuidado/atención sin convertirlo por completo en explicación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama. Según la convención del proyecto, se mantiene el nombre divino en forma explícita para no enmascararlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB en inglés: preferencia por una expresión más cercana a la idiomática hebrea de אעלה ארכה (''restore health'' en inglés) y por un equivalente contextual de דורש אין לה (''cares for her'' en inglés). En español se mantuvo la imagen verbal de ''hacer subir sanidad'' y se evitó una paráfrasis demasiado explicativa, conservando además la estructura de acusación hacia Sión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en coherencia con la política del proyecto para יְהוָה.
  - '''Sión'' se prefiere por uso castellano establecido.'
  - '''desterrada'' y ''no hay quien la busque'' retienen la tensión entre exclusión social y abandono/cuidado ausente.'
  - La construcción 'haré subir sanidad' preserva la metáfora hebrea sin perder inteligibilidad.
  - Se mantiene el paralelismo verbal entre sanar/sanar y el contraste entre acción divina y desamparo humano.
