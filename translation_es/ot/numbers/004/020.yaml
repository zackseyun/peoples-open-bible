translation:
  language: es
  text: Pero no deben entrar para mirar las cosas sagradas ni siquiera por un instante[a], o morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por un instante». La expresión hebrea es idiomática y puede referirse a ver las cosas sagradas solo brevemente, o mientras están siendo cubiertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Ni ...
  lexicon: HALOT
  rationale: La conjunción con negación continúa la advertencia con matiz contrastivo. «Pero» comunica mejor el giro exhortativo en español que un simple «y», sin perder la fuerza prohibitiva.
- source_word: יָבֹאוּ
  english_pob_choice: they must not go in
  chosen_spanish: no deben entrar
  alternatives_spanish:
  - no han de entrar
  - no pueden entrar
  lexicon: HALOT
  rationale: El verbo significa entrar. En una prohibición dirigida a ellos, «no deben entrar» expresa con naturalidad la fuerza normativa del hebreo.
- source_word: לִרְאוֹת
  english_pob_choice: to look at
  chosen_spanish: para mirar
  alternatives_spanish:
  - para ver
  - para contemplar
  lexicon: HALOT
  rationale: Aquí el énfasis está en la exposición visual intencional a los objetos sagrados; «mirar» conserva mejor ese sentido activo que el más general «ver».
- source_word: כְבַלַּע
  english_pob_choice: for even a moment
  chosen_spanish: ni por un instante
  alternatives_spanish:
  - por un momento
  - ni siquiera por un momento
  - mientras se cubren
  lexicon: HALOT
  rationale: La expresión es idiomática y difícil. El sentido aceptado en el contexto es de brevísima duración; «ni por un instante» preserva esa idea y su tono de advertencia.
- source_word: אֶת הַקֹּדֶשׁ
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - los objetos santos
  - lo santo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto de Números 4 es colectivo y concreto, refiriéndose a los objetos del tabernáculo. «Las cosas santas» comunica ese referente sin volverlo abstracto o locativo.
- source_word: וָמֵתוּ
  english_pob_choice: or they will die
  chosen_spanish: o morirán
  alternatives_spanish:
  - y morirán
  - o bien morirán
  lexicon: HALOT
  rationale: La cláusula expresa la consecuencia de la violación. «O morirán» mantiene la advertencia inmediata y clara en español.
theological_decisions:
- issue: Referente de הַקֹּדֶשׁ
  english_pob_reading: collective reference to the sacred objects
  chosen_spanish_reading: referencia colectiva a los objetos sagrados
  alternative_spanish_readings:
  - el santuario
  - lo santo en sentido abstracto
  rationale: El contexto inmediato trata del cubrimiento y traslado de los utensilios del tabernáculo. Traducir colectivamente evita desplazar el sentido hacia un lugar o una abstracción no exigidos por el verso.
  doctrine_reference: Números 4; santidad del tabernáculo y sus utensilios
- issue: Sentido de כְבַלַּע
  english_pob_reading: idiomatic brief exposure / while being covered
  chosen_spanish_reading: duración brevísima de la exposición visual
  alternative_spanish_readings:
  - mientras se cubren
  - por un instante
  rationale: La expresión hebrea es idiomática; el español debe reflejar la brevedad extrema sin imponer una imagen literal de «tragar». «Ni por un instante» conserva la tensión del mandato y la posibilidad de una cobertura simultánea.
  doctrine_reference: Números 4:15, 19-20; reverencia ante lo santo
translation_notes:
  revision_awareness: 'La formulación española sigue el ajuste revisado del audit trail inglés: la idea de כְבַלַּע se expresa de manera temporal («ni por un instante») sin introducir una lectura literal de «tragar». Se priorizó una redacción natural en español que conserve la fuerza de la prohibición y la consecuencia final.'
  spanish_consistency_notes:
  - Se mantiene «Dios» y la terminología general del POB para este pasaje sin necesidad de adaptar nombres divinos o cristológicos.
  - «Cosas santas» se usa de forma colectiva para reflejar el objeto del mandamiento; no se optó por «santuario» porque el contexto inmediato trata de utensilios y objetos cubiertos.
  - La advertencia final se conserva breve y directa para reflejar el paralelismo hebreo y el tono legal del texto.
