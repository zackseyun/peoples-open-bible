translation:
  language: es
  text: ¿Y por qué nos han sacado de Egipto para traernos a este lugar malo[b]? No es lugar de grano[a], ni de higos, ni de vides[c], ni de granadas, y no hay agua para beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “un lugar de semilla”; puede significar un lugar apto para sembrar o un lugar que produce grano o cosechas.'
    reason: lexical_alternative
  - marker: b
    text: O “este lugar malo” o “este lugar miserable”; aquí “malo” describe el lugar como dañino o indeseable, no necesariamente como moralmente malo.
    reason: lexical_alternative
  - marker: c
    text: O “higueras” y “viñas” o “parras”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  english_pob_choice: And why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - ¿Por qué
  lexicon: HALOT
  rationale: La conjunción inicial mantiene el flujo discursivo de la queja en marcha; en español, “¿Y por qué” conserva mejor esa continuidad que un simple “¿Por qué”.
- source_word: הֶעֱלִיתֻנוּ
  english_pob_choice: have you brought us up
  chosen_spanish: nos han sacado
  alternatives_spanish:
  - nos han traído arriba
  - nos han hecho subir
  lexicon: HALOT
  rationale: El hebreo usa el idiomatismo de “hacer subir” desde Egipto. En español, “sacar de Egipto” comunica con naturalidad el mismo movimiento exodal sin perder la dirección de salida.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con “sacar”, el español natural es “de Egipto”. El sentido de salida queda implícito por el verbo.
- source_word: לְהָבִיא אֹתָנוּ
  english_pob_choice: to bring us
  chosen_spanish: para traernos
  alternatives_spanish:
  - para llevarnos
  - para introducirnos
  lexicon: HALOT
  rationale: La finalidad del infinitivo se expresa con “para”. “Traernos” conserva el movimiento hacia el lugar mencionado y evita sobreespecificar “entrar” antes de que aparezca la frase siguiente.
- source_word: אֶל הַמָּקוֹם הָרָע הַזֶּה
  english_pob_choice: into this evil place
  chosen_spanish: a este lugar malo
  alternatives_spanish:
  - a este lugar malo y peligroso
  - a este lugar malvado
  lexicon: HALOT
  rationale: En este contexto, רַע describe un lugar dañino o desagradable más que moralmente perverso. “Malo” refleja esa fuerza sin cargar innecesariamente una connotación ética.
- source_word: לֹא מְקוֹם זֶרַע
  english_pob_choice: It is not a place of grain
  chosen_spanish: No es lugar de grano[a]
  alternatives_spanish:
  - No es un lugar de siembra
  - No es lugar para grano
  lexicon: HALOT
  rationale: El hebreo dice literalmente “no lugar de semilla”. La revisión inglesa optó por “grain” por adecuación contextual agrícola; en español “grano” mantiene esa decisión y suena más natural que “semilla” en esta lista de productos.
- source_word: וּתְאֵנָה וְגֶפֶן וְרִמּוֹן
  english_pob_choice: or figs, or vines, or pomegranates
  chosen_spanish: ni de higos, ni de vides[c], ni de granadas
  alternatives_spanish:
  - ni de higos, ni de viñas[c], ni de granadas
  - ni de higueras, ni de vides[c], ni de granadas
  lexicon: HALOT
  rationale: La lista enumera productos ausentes del lugar. “Higos” y “granadas” son directos; para גפן, “vides” sigue el valor botánico general del sustantivo sin forzar un término litúrgico posterior.
- source_word: וּמַיִם אַיִן לִשְׁתּוֹת
  english_pob_choice: and there is no water to drink
  chosen_spanish: y no hay agua para beber
  alternatives_spanish:
  - y no hay agua para beberse
  - y no hay agua que beber
  lexicon: HALOT
  rationale: La construcción existencial expresa carencia absoluta. “No hay agua para beber” es idiomático en español y conserva la idea de agua potable inexistente.
theological_decisions:
- issue: Valor de הָרָע aplicado al lugar
  english_pob_reading: evil place
  chosen_spanish_reading: lugar malo
  alternative_spanish_readings:
  - lugar evil
  - lugar perverso
  - lugar miserable
  rationale: No se traduce como mal moral absoluto; el reproche de los israelitas apunta a una experiencia hostil, dañina y desagradable. “Malo” preserva esa ambigüedad sin suavizarla demasiado.
  doctrine_reference: No aplica una decisión doctrinal; se trata de semántica contextual.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió ‘seed’ por ‘grain’ para reflejar mejor el contexto agrícola. La versión española sigue esa revisión al usar ‘grano’, mientras conserva el valor literal de fondo en la nota a.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se evita ‘SEÑOR’ y también ‘Cristo’, ya que no corresponden al texto.
  - ‘Lugar malo’ conserva la evaluación negativa sin convertirla en juicio moral técnico.
  - La lista de productos se ajusta al español natural, manteniendo el paralelismo del hebreo.
