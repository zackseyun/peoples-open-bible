translation:
  language: es
  text: Y cuando Sedequías, rey de Judá, y todos los hombres de guerra los vieron, huyeron y salieron de noche de la ciudad por el camino del jardín del rey, por la puerta entre las dos murallas; y él[a] salió por el camino de la Arabá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene «él salió» en la cláusula final, aunque algunas traducciones lo armonizan como «salieron» para concordar con los verbos plurales anteriores.
    reason: textual_variant
  - marker: b
    text: O «la llanura» o «el valle del Jordán» para «la Arabá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרְחוּ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se dieron a la fuga
  lexicon: HALOT
  rationale: En español, 'huir' comunica con naturalidad la idea narrativa de 'fled' sin añadir matices ajenos. Mantiene el tono histórico y la urgencia del verbo hebreo ברח.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los combatientes
  - los hombres de combate
  - los soldados
  lexicon: HALOT
  rationale: '''Hombres de guerra'' conserva la construcción hebrea y el registro formal de la POB en inglés. ''Soldados'' sería más interpretativo y moderno; ''combatientes'' suaviza la fuerza del sustantivo constructo.'
- source_word: וַיֵּצְאוּ לַיְלָה
  english_pob_choice: went out by night
  chosen_spanish: salieron de noche
  alternatives_spanish:
  - salieron durante la noche
  - salieron por la noche
  lexicon: HALOT
  rationale: '''De noche'' reproduce bien la expresión temporal compacta del hebreo y suena natural en español. Evita una paráfrasis más larga que debilitaría el ritmo narrativo.'
- source_word: דֶּרֶךְ גַּן הַמֶּלֶךְ
  english_pob_choice: by way of the king’s garden
  chosen_spanish: por el camino del jardín del rey
  alternatives_spanish:
  - por el camino que pasa junto al jardín del rey
  - por la ruta del jardín del rey
  lexicon: HALOT
  rationale: '''Derekh'' aquí es ''camino'' o ''ruta''; ''por el camino del jardín del rey'' conserva la relación direccional sin forzar ''a través de'' donde el hebreo sólo indica la vía de escape.'
- source_word: בְּשַׁעַר בֵּין הַחֹמֹתָיִם
  english_pob_choice: through the gate between the two walls
  chosen_spanish: por la puerta entre los dos muros
  alternatives_spanish:
  - por la puerta entre los muros
  - por la puerta que está entre las dos murallas
  lexicon: HALOT
  rationale: '''Bǝsha‘ar'' puede expresarse naturalmente como ''por la puerta''; ''dos muros'' refleja la forma dual חֹמֹתָיִם que la POB inglesa explicó como ''the two walls''. ''Puerta'' resulta idiomática y precisa en español.'
- source_word: וַיֵּצֵא
  english_pob_choice: he went out
  chosen_spanish: y él salió
  alternatives_spanish:
  - y salió
  - y él se fue
  lexicon: HALOT
  rationale: Se preserva el singular hebreo, tal como hace la POB en inglés, evitando armonizarlo con el plural anterior. El sujeto implícito se hace explícito en español por claridad, pero el verbo singular mantiene la tensión textual.
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: la Arabá
  alternatives_spanish:
  - la Arabá
  - el Arabá
  - la llanura
  lexicon: HALOT
  rationale: Como término geográfico, conviene transliterar el nombre tradicional 'Arabá' para no diluirlo en 'llanura'. 'La Arabá' mantiene la referencia regional y la distinción toponímica.
theological_decisions:
- issue: Mantenimiento del singular final 'וַיֵּצֵא' frente al plural anterior
  english_pob_reading: Hebrew has 'he went out' in the final clause, though some translations smooth this to 'they went out' to match the earlier plural verbs.
  chosen_spanish_reading: y él salió
  alternative_spanish_readings:
  - y salieron
  - y ellos salieron
  rationale: 'Se conserva la tensión del texto hebreo y la decisión auditada por la POB: el final cambia deliberadamente al singular. En español, la explicitación de ''él'' evita ambigüedad sin borrar el dato textual.'
  doctrine_reference: Texto masorético / crítica textual narrativa
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje mantiene alta concordancia entre el hebreo base y la solución auditada en inglés. La versión española sigue esa misma decisión, incluyendo el singular final de וַיֵּצֵא y la transliteración de הָעֲרָבָה como término geográfico.
  spanish_consistency_notes:
  - Se mantiene 'Y sucedió que' como fórmula narrativa sobria para וַיְהִי.
  - '''Yahvé'' no aparece en este versículo.'
  - '''Arabá'' se translitera de manera consistente como topónimo, no como descripción genérica.'
  - Se preserva el cambio a singular en la cláusula final, con sujeto explícito por claridad del español.
