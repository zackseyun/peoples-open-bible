translation:
  language: es
  text: Clemente[a] es Yahvé, y justo; nuestro Dios es compasivo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «benigno» / «misericordioso» para «clemente».
    reason: lexical_alternative
  - marker: b
