translation:
  language: es
  text: Hilcías y su esposa alabaron por su hija[a], junto con Joaquín su esposo y todos sus parientes, porque no se halló en ella ningún acto vergonzoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabaron acerca de su hija». El griego dice simplemente «alabaron» y usa una expresión que puede significar «acerca de» o «por» su hija; el objeto de la alabanza no se expresa explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χελκίας
  english_pob_choice: Hilkiah
  chosen_spanish: Hilcías
  alternatives_spanish:
  - Chelcías
  lexicon: transliteración bíblica estándar del nombre hebreo vía la forma griega
  rationale: En español es natural usar la forma bíblica asentada con acento adaptado, conservando la identidad del nombre propio sin depender del inglés.
- source_word: ᾔνεσαν
  english_pob_choice: praised
  chosen_spanish: alabaron
  alternatives_spanish:
  - dieron alabanza
  - bendijeron
  lexicon: BDAG
  rationale: El verbo griego significa alabar/elogiar. En español, «alabaron» comunica bien la acción de elogio sin introducir explícitamente un objeto no presente en el texto griego.
- source_word: περὶ τῆς θυγατρὸς αὐτῶν
  english_pob_choice: their daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - por su hija
  - acerca de su hija
  lexicon: BDAG
  rationale: La construcción con περί + genitivo permite la idea de «respecto de» o «por». En esta oración española, «alabaron a su hija» expresa de manera natural el referente del elogio sin forzar una explicación añadida.
- source_word: μετὰ Ἰωακεὶμ τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: along with Joakim her husband
  chosen_spanish: junto con Joaquín, su esposo
  alternatives_spanish:
  - con Joaquín, su esposo
  - al lado de Joaquín, su esposo
  lexicon: BDAG
  rationale: μετά con genitivo indica compañía. «Junto con» reproduce bien la coordinación de quienes participan en la alabanza.
- source_word: τῶν συγγενῶν πάντων
  english_pob_choice: all their relatives
  chosen_spanish: con todos sus parientes
  alternatives_spanish:
  - con todos sus familiares
  - con todos sus deudos
  lexicon: BDAG
  rationale: συγγενεῖς refiere a parientes o familiares. «Parientes» es claro y bíblicamente sobrio en español contemporáneo.
- source_word: οὐχ εὑρέθη
  english_pob_choice: was found
  chosen_spanish: no se halló
  alternatives_spanish:
  - no fue hallada
  - no se encontró
  lexicon: BDAG
  rationale: La pasiva de εὑρίσκω se rinde naturalmente con «se halló / se encontró». «No se halló» mantiene el matiz judicial de constatación.
- source_word: ἐν αὐτῇ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en su caso
  - en su persona
  lexicon: BDAG
  rationale: La preposición griega literalmente es «en». «En ella» conserva la relación directa sin sobreparafrasear.
- source_word: αἰσχρὸν πρᾶγμα
  english_pob_choice: shameful deed
  chosen_spanish: ninguna cosa vergonzosa
  alternatives_spanish:
  - ningún acto vergonzoso
  - nada vergonzoso
  lexicon: BDAG
  rationale: αἰσχρός expresa vergonzoso/infame y πρᾶγμα puede ser cosa, asunto o hecho. «Cosa vergonzosa» preserva la amplitud del griego; «ninguna» hace explícita la negación resultante del texto.
theological_decisions:
- issue: Objeto implícito de la alabanza en ᾔνεσαν
  english_pob_reading: English draft originally supplied 'God' but the revision removed it because it is not explicit in Greek; final English kept the daughter as the object of the praise phrase.
  chosen_spanish_reading: No se introduce un objeto explícito como «Dios»; se mantiene «alabaron a su hija».
  alternative_spanish_readings:
  - alabaron a Dios por su hija
  - dieron gracias a Dios por su hija
  - alabaron
  rationale: El griego no nombra a Dios aquí. La revisión inglesa también eliminó la inserción de «God». En español conviene respetar esa cautela y no añadir un objeto teológico que el texto no expresa, aunque el contexto sea de vindicación y alegría.
  doctrine_reference: Principio de primacía del texto original; evitar añadidos no atestiguados.
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del contexto inglés, que retiró «God» por no estar explícito en el griego, y conserva el valor relacional de περὶ τῆς θυγατρὸς αὐτῶν sin volverlo una paráfrasis más larga.
  spanish_consistency_notes:
  - Se mantiene «Hilcías» como forma bíblica usual en español.
  - Se usa «Joaquín» para Ἰωακεὶμ por adaptación hispana estable del nombre.
  - Se evita «SEÑOR» o añadidos litúrgicos, porque el texto griego de este versículo no nombra a Dios.
  - La negación se formula de manera natural en español con «no se halló en ella ninguna cosa vergonzosa».
