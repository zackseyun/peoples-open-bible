  to: 'Y cuando se había vuelto inútil para los demás, ordenó que lo llevaran al fuego, mientras todavía respiraba[a], y que lo frieran en la sartén. Y cuando la sartén despedía abundante vapor[b], se animaban unos a otros, junto con su madre, a morir noblemente, diciendo esto:'
