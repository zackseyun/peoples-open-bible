translation:
  language: es
  text: 'Los líderes les dijeron: «Que vivan». Así se convirtieron en cortadores de leña y en los que sacan agua para toda la congregación, tal como los líderes les habían dicho.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַנְּשִׂיאִים
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los príncipes
  - los gobernantes
  lexicon: HALOT
  rationale: נָשִׂיא designa aquí a los cabezas reconocidos de la comunidad de Israel. «Líderes» comunica bien el papel directivo sin introducir un matiz monárquico o excesivamente arcaico como «príncipes».
- source_word: יִחְיוּ
  english_pob_choice: Let them live
  chosen_spanish: Vivan
  alternatives_spanish:
  - Que vivan
  - Déjenlos vivir
  - Que permanezcan con vida
  lexicon: HALOT
  rationale: En el discurso directo, el imperfecto funciona como una orden o decisión permisiva. «Vivan» reproduce la fuerza exhortativa/decretiva con una forma breve y natural en español.
- source_word: וַיִּהְיוּ
  english_pob_choice: they became
  chosen_spanish: se convirtieron en
  alternatives_spanish:
  - fueron
  - llegaron a ser
  lexicon: HALOT
  rationale: El hebreo marca el nuevo estado impuesto a los gabaonitas. «Se convirtieron en» expresa mejor ese cambio de estatus que un simple «fueron».
- source_word: חֹטְבֵי עֵצִים
  english_pob_choice: cutters of wood
  chosen_spanish: cortadores de leña
  alternatives_spanish:
  - cortadores de madera
  - leñadores
  - hacheros
  lexicon: HALOT
  rationale: La expresión es participial y laboral. «Cortadores de leña» conserva la literalidad relativa del POB inglés revisado y su registro formal, sin caer en un término demasiado libre como «leñadores».
- source_word: שֹׁאֲבֵי מַיִם
  english_pob_choice: drawers of water
  chosen_spanish: sacadores de agua
  alternatives_spanish:
  - sacadores de agua del pozo
  - acarreadadores de agua
  - sacadores de agua
  lexicon: HALOT
  rationale: «Sacar agua» refleja el gesto concreto de extraerla; «sacadores de agua» preserva la imagen verbal del original y el paralelismo con «cortadores de leña».
- source_word: לְכָל הָעֵדָה
  english_pob_choice: for all the congregation
  chosen_spanish: para toda la congregación
  alternatives_spanish:
  - para toda la asamblea
  - para toda la comunidad
  - para todo el pueblo reunido
  lexicon: HALOT
  rationale: עֵדָה suele referirse a la comunidad pactal reunida. «Congregación» mantiene ese valor bíblico-comunitario, y «toda» expresa el alcance total del servicio.
- source_word: כַּאֲשֶׁר דִּבְּרוּ לָהֶם
  english_pob_choice: just as the leaders had spoken to them
  chosen_spanish: tal como los líderes les habían dicho
  alternatives_spanish:
  - tal como los líderes les habían hablado
  - según lo que los líderes les habían dicho
  - como los líderes les habían hablado
  lexicon: HALOT
  rationale: El cierre remite a la decisión anterior y requiere un plus de anterioridad en español. «Les habían dicho» suena natural y conserva la relación de dependencia con la declaración previa.
translation_notes:
  revision_awareness: 'Se siguió el giro revisado del POB inglés, que pasó de una formulación más idiomática a una más literal en la parte ocupacional. Por eso se evitó para el texto principal una equivalencia demasiado interpretativa y se mantuvo la concreción de los oficios: no se expandió a explicaciones como «hombres encargados de...» ni se suavizó el matiz de subordinación del rol asignado.'
  spanish_consistency_notes:
  - Se mantiene «líderes» para הַנְּשִׂיאִים, en continuidad con el auditable English POB choice.
  - Se usó «congregación» para עֵדָה, término bíblico y comunitario consistente con el registro del POB.
  - No se añadió nota textual porque el hebreo y el inglés auditado convergen sin variantes relevantes en este versículo.
  - La traducción evita «siervos» para no desdibujar el oficio impuesto; el texto habla de funciones concretas de trabajo.
  - La brevedad de «Vivan» conserva el valor jussivo sin forzar una perífrasis más larga.
