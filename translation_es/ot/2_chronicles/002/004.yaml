review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene ‘la casa’, el aspecto progresivo de בוֹנֶה, y la comparación explícita ‘más grande que todos los dioses’. También preserva la alternativa contextual ‘templo’. Sin embargo, la nota b en español explica de forma algo inexacta la construcción hebrea al decir ‘con que todos los dioses’; conviene alinearla mejor con la evidencia fuente y con la auditoría inglesa, indicando que el hebreo usa ‘grande’ con ‘sobre todos los dioses’/‘más que todos los dioses’ para expresar comparación.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La redacción principal suena natural. El único ajuste necesario es de precisión en la nota b; además, puede aligerarse ‘yo estoy edificando’ a ‘estoy edificando’ sin pérdida, aunque no es obligatorio. El texto principal puede aprobarse con una reparación menor en las notas.
  glossary_alignment: 'Está alineado con las decisiones del proyecto: ‘casa’ para בַּיִת con nota alternativa ‘templo’; ‘Dios’/‘dioses’ mantiene la tensión teológica; no hay conflicto con terminología de Yahvé, Mesías, espíritu, etc. ‘Edificando’ y ‘grande’ son opciones válidas y fieles.'
  issues:
  - severity: medium
    issue: La nota b describe de manera imprecisa la construcción comparativa hebrea.
    rationale: El inglés auditado explica que el hebreo usa ‘great’ con ‘than all gods’ para expresar comparación. En español, ‘con “que todos los dioses”’ no representa bien la forma subyacente y puede sonar gramaticalmente confuso; es mejor explicarla como ‘con “sobre todos los dioses”’ o ‘con una expresión equivalente a comparación’.
  - severity: low
    issue: La colocación de las notas [a][b] tras ‘grande’ funciona, pero la nota b corresponde semánticamente a toda la cláusula comparativa.
    rationale: No es un error grave, porque la auditoría inglesa también ancla ambas notas en ‘great’. Se puede conservar así para mantener paralelismo editorial.
  revised_spanish_text: Y la casa que yo estoy edificando será grande[a][b], porque nuestro Dios es más grande que todos los dioses.
  revised_footnotes:
  - marker: a
    text: O ‘el templo que yo estoy edificando será grande’. El hebreo dice literalmente ‘la casa que yo estoy edificando’.
    reason: lexical_alternative
  - marker: b
    text: O ‘nuestro Dios es grande sobre todos los dioses’. El hebreo usa ‘grande’ con una expresión equivalente a ‘sobre todos los dioses’ para expresar comparación.
    reason: alternative_reading
  revision_rationale: El texto principal ya es fiel y natural. Solo se corrige la nota b para que describa con más precisión la construcción hebrea comparativa y quede mejor alineada con la auditoría inglesa.
