translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé, cuando convierta la tierra en desolación y ruina[a], por todas las abominaciones que han cometido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desolación y espanto/horror». El segundo sustantivo hebreo puede subrayar no solo la ruina del país, sino también el efecto espantoso que esa ruina produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y entonces sabrán
  lexicon: HALOT
  rationale: El waw consecutivo expresa resultado o secuencia consecuente; «Entonces» conserva ese valor en español sin forzar una coordinación simple que debilite el efecto. «Sabrán» mantiene el sentido cognitivo/recognitivo de ידע.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que sabrán, no una causa. «Que» es la correspondencia natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton en español: «Yahvé», preservando el nombre propio divino y evitando la sustitución por un título.'
- source_word: בְּתִתִּי
  english_pob_choice: when I make
  chosen_spanish: cuando haga
  alternatives_spanish:
  - al hacer
  - cuando dé
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo marca circunstancia temporal; «cuando haga» comunica con naturalidad el valor de acción resultante sobre la tierra. «Haga» conserva el matiz de causar/poner en ese estado.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra del país
  - de la tierra
  lexicon: HALOT
  rationale: En este contexto profético puede referirse al territorio. «De la tierra» sigue de cerca la imagen de devastación del hebreo y es idiomático en español.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un desierto
  - una devastación
  lexicon: HALOT
  rationale: El sustantivo denota un estado de ruina/desolación; «desolación» conserva la forma nominal y la fuerza profética del término.
- source_word: וּמְשַׁמָּה
  english_pob_choice: and a waste
  chosen_spanish: y una ruina
  alternatives_spanish:
  - y un desierto
  - y una devastación
  lexicon: HALOT
  rationale: El segundo sustantivo intensifica la idea de devastación. «Ruina» evita repetición mecánica de «desolación» y transmite bien el deterioro total del lugar.
- source_word: עַל כָּל תּוֹעֲבֹתָם
  english_pob_choice: because of all their abominations
  chosen_spanish: por todas las abominaciones
  alternatives_spanish:
  - a causa de todas sus abominaciones
  - por todas sus abominaciones
  lexicon: HALOT
  rationale: עַל expresa aquí base o causa del juicio. Se mantiene «abominaciones» por su valor profético establecido. Se omite «sus» en la frase principal porque el sustantivo sin posesivo en español resulta más natural y el referente ya queda claro por el contexto; la nota textual del inglés indicó además «the abominations» como ajuste de precisión.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they have committed
  chosen_spanish: que han cometido
  alternatives_spanish:
  - que hicieron
  - que hicieron cometer
  lexicon: HALOT
  rationale: Con «abominaciones» en español, «cometer» es la equivalencia idiomática más precisa y solemne para עשה en este contexto de culpa moral.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre divino como transliteración en español, conforme al estándar del proyecto y a la decisión documentada en el contexto inglés. No se usa una sustitución titulada porque el texto hebreo contiene el Tetragrámaton explícito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió el artículo definido implícito en la frase de juicio («the abominations»), pero el hebreo sigue permitiendo la traducción natural sin posesivo explícito en español. Se mantuvo la fuerza causal de עַל y la estructura resultativa de וְיָדְעוּ como consecuencia del juicio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «abominaciones» para תּוֹעֵבֹתָם por continuidad léxica con el registro profético.
  - La frase «una desolación y una ruina» conserva la duplicación enfática del hebreo sin calco extraño.
  - «Entonces sabrán» refleja el valor consecutivo del waw sin traducirlo mecánicamente como una simple coordinación.
