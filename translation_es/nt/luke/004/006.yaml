translation:
  language: es
  text: 'Y el diablo le dijo: «Te daré toda esta autoridad y la gloria de esos reinos[a], porque me ha sido entregada, y yo la doy a quien quiero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esplendor». El término griego puede denotar gloria, esplendor o magnificencia en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: En este pasaje funciona como designación personal de Satanás en la tentación; «el diablo» es el equivalente establecido y más natural en español, mientras que las alternativas etimológicas sonarían impropias en este contexto narrativo.
- source_word: Σοὶ δώσω
  english_pob_choice: I will give you
  chosen_spanish: Te daré
  alternatives_spanish:
  - A ti te daré
  - Te voy a dar
  lexicon: BDAG
  rationale: El dativo enfático griego queda suficientemente expresado en español con el pronombre átono «te»; «te daré» mantiene naturalidad y el valor directo del discurso sin sobrerrepresentar el orden griego.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: BDAG
  rationale: «Autoridad» conserva el sentido de derecho o potestad delegada sobre reinos, que es el valor más preciso aquí; «poder» podría sugerir fuerza bruta y «dominio» desplaza el matiz semántico.
- source_word: ταύτην ἅπασαν
  english_pob_choice: all this
  chosen_spanish: toda esta
  alternatives_spanish:
  - todo esto
  - esta entera
  lexicon: BDAG
  rationale: La combinación de demostrativo e intensificador se expresa de manera idiomática como «toda esta», preservando la idea de totalidad sin forzar una calca.
- source_word: δόξαν αὐτῶν
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su magnificencia
  lexicon: BDAG
  rationale: Se conserva «gloria» por la resonancia bíblica del término y su conexión con la escena de los reinos mostrados; «su» en singular concuerda con la referencia a las realidades visualizadas como conjunto, aunque el griego se refiere a los reinos/realidades vistas.
- source_word: παραδέδοται
  english_pob_choice: it has been handed over to me
  chosen_spanish: me ha sido entregada
  alternatives_spanish:
  - me ha sido entregado
  - me ha sido confiada
  lexicon: BDAG
  rationale: El perfecto pasivo se vierte como una pasiva compuesta que mantiene el resultado presente de una acción anterior. «Entregada» conserva la idea de transferencia sin añadir una legitimación que el texto no afirma.
- source_word: ᾧ ἂν θέλω δίδωμι αὐτήν
  english_pob_choice: to whomever I want / I give it
  chosen_spanish: y yo la doy a quien quiero
  alternatives_spanish:
  - y se la doy a quien yo quiera
  - y la doy a quien deseo
  lexicon: BDAG
  rationale: La construcción de relativo indefinido con ἄν + θέλω se expresa naturalmente como «a quien quiero». «Yo la doy» mantiene el presente gnómico o general de δίδωμι y la afirmación de control discrecional del hablante.
theological_decisions:
- issue: Si el texto debe suavizar o distanciar la pretensión del diablo sobre la autoridad de los reinos
  english_pob_reading: Render the statement straightforwardly as the devil's own claim without adding qualifiers in the main text
  chosen_spanish_reading: Presentar la afirmación directamente, como palabra del diablo, sin insertar verbos de distancia como «pretende» o glosas explicativas en el cuerpo del texto
  alternative_spanish_readings:
  - El diablo afirma que me ha sido entregada
  - El diablo dice que se le ha entregado
  rationale: El griego presenta discurso directo y el contexto ya identifica al hablante; por eso el texto español debe dejar intacta la tensión teológica sin resolverla ni reforzarla. La literalidad discursiva permite que el lector perciba la afirmación tal como aparece en la fuente.
  doctrine_reference: Preservar la tensión teológica sin editorializar; no introducir una resolución doctrinal ajena al enunciado.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y coincide con la lectura base, por lo que no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «diablo» de forma consistente con el uso narrativo de Lucas.
  - Se conserva «autoridad» para ἐξουσία, en lugar de «poder», para no perder el matiz de potestad o derecho de gobierno.
  - «Gloria» se mantiene por continuidad bíblica y por la alternativa léxica documentada en la auditoría inglesa.
  - La pasiva «me ha sido entregada» respeta el perfecto pasivo sin añadir legitimidad a la afirmación.
  - La expresión «a quien quiero» reproduce el carácter indefinido de la cláusula griega sin volverla más abstracta de lo necesario.
