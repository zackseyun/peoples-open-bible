  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» y עֶבֶד → «esclavo». «Te redimió» también preserva la decisión teológica/lexical documentada para פדה. No hay conflicto doctrinal significativo.'
