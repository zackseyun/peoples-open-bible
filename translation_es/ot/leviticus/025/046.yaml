    text: 'O: «podrán legarlos a sus hijos después de ustedes como propiedad hereditaria».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» y «hijos de Israel» reproducen directamente los términos de parentesco masculinos del hebreo; el mandato se dirige a los israelitas como parientes del pacto.
    reason: cultural_note
  revision_rationale: La revisión corrige un error grave en la nota, mejora la naturalidad del español jurídico y alinea más estrechamente la frase de herencia/posesión con el hebreo y con la justificación léxica del POB inglés, sin alterar el sentido general del borrador.
