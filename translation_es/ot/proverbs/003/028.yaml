translation:
  language: es
  text: 'No digas a tu prójimo: «Ve, y vuelve[a], y mañana daré», cuando lo tienes contigo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «regresa» o «vuelve de nuevo»; se eligió «vuelve» por ser más natural en español en discurso directo.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final significa que la persona ya tiene los medios para dar y no debe retrasarlo.
    reason: cultural_note
lexical_decisions:
- source_word: רֵעַ
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - amigo
  - compañero
  lexicon: HALOT
  rationale: En Proverbios, רֵעַ designa a la persona cercana en la convivencia social. «Prójimo» conserva el alcance ético-relacional que exige el mandato, sin reducirlo a una amistad íntima ni limitarlo a cercanía espacial.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Vete
  alternatives_spanish:
  - Ve
  - Anda
  - Váyase
  lexicon: HALOT
  rationale: El imperativo directo pide una orden breve y natural en español. «Vete» comunica mejor el movimiento mandado en diálogo que un simple «ve», y mantiene la dureza del reclamo.
- source_word: שׁוּב
  english_pob_choice: come back
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  - vuelve aquí
  lexicon: HALOT
  rationale: «Vuelve» reproduce la segunda orden de manera idiomática y breve. La alternativa «regresa» sería posible, pero suena más formal y menos dialogal.
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - al día siguiente
  lexicon: HALOT
  rationale: «Mañana» es el equivalente temporal directo y más natural en español, sin añadir matices no presentes en el hebreo.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - te daré
  - entregaré
  lexicon: HALOT
  rationale: El hebreo omite el objeto; por eso se conserva la misma economía con «daré», sin suplirlo. Mantener el verbo sin objeto visible respeta la forma del dicho y evita sobreespecificar.
- source_word: יֵשׁ אִתָּךְ
  english_pob_choice: when you have it with you
  chosen_spanish: cuando lo tienes contigo
  alternatives_spanish:
  - cuando lo tienes a mano
  - cuando ya lo tienes
  - mientras lo tienes contigo
  lexicon: HALOT
  rationale: La expresión hebrea indica disponibilidad presente del recurso. «Lo tienes contigo» transmite esa idea de posesión inmediata sin convertirla en una imagen más concreta de lo que permite el original.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No digas nunca
  - Jamás digas
  lexicon: HALOT
  rationale: La partícula prohibitiva se expresa de modo simple con «No». No se intensifica a «nunca» porque el hebreo no añade ese énfasis.
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios sustanciales; esta propuesta sigue la misma lectura y conserva la tensión moral del proverbio: no diferir la ayuda cuando ya se dispone de lo necesario.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita introducir «siervo» o vocabulario teológico ajeno al texto; el proverbio trata una obligación práctica hacia el prójimo.
  - La cláusula final se traduce de forma idiomática sin añadir explicitaciones como «a mano» para no ampliar indebidamente la imagen hebrea.
