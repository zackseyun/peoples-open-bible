translation:
  language: ko
  text: 그러나 인자가 자기 영광 가운데 모든 천사들과 함께 올 때에, 그때에 그가 자기 영광의 보좌에 앉을 것입니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 25:31-46 양과 염소 심판 본문의 무게 보존
  chosen_reading: 심판 이미지 — 보좌, 분리, 영원한 형벌·영원한 생명 — 약화시키지 않음
  alternative_readings:
  - 보편구원론적 부드러움
  - 은유적 환원
  rationale: '본 단락(25:31-46)은 인자의 종말 심판을 가장 분명한 이미지로 그리는 본문이다. 보좌에 앉은 왕, 양과 염소의 분리, ʻδεῦτεʼ vs ʻπορεύεσθεʼ의 대조, 마지막의 κόλασιν αἰώνιον/ζωὴν αἰώνιον 대조는 모두 그 무게 그대로 한국어에 옮겨야 한다. 「영원한 형벌」을 「오랜 형벌」로 약화시키거나, 「저주를 받은 자」를 「복 받지 못한 자」로 부드럽게 옮기지 않는다. 다만 본 단락이 어느 한 신학적 심판 체계(예: 영원한 의식 있는 형벌 vs 멸절)를 단정하지 않도록 본문이 말하는 것만 옮긴다.'
  doctrine_reference: 'DOCTRINE.md §5: render true and powerful meaning'
