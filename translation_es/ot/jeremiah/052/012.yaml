revisions:
- from: En el mes quinto[a], a los diez días del mes —esto era el año diecinueve[b] del rey Nabucodonosor, rey de Babilonia— vino Nebuzaradán, el jefe de la guardia[c], que estaba delante del rey de Babilonia, a Jerusalén[d].
  to: En el quinto mes, a los diez días del mes —que era el año diecinueve del rey Nabucodonosor, rey de Babilonia— vino Nebuzaradán, el jefe de la guardia[a], que estaba delante del rey de Babilonia[b], a Jerusalén[c].
  rationale: La revisión conserva el sentido del hebreo y del audit trail inglés, pero corrige la distribución de notas para reflejar los puntos léxicos y culturales realmente significativos. También mejora la naturalidad del español con «En el quinto mes» y «que era el año diecinueve», sin añadir ni quitar contenido.
