base_translation:
  language: en
  yaml_path: translation/ot/judges/001/011.yaml
  text: From there he went against the inhabitants of Debir[b][a]. (The former name of Debir was Kiriath-sepher.)
  footnotes:
  - marker: a
    text: Or 'to the inhabitants of Debir.' The Hebrew preposition can be rendered more literally as 'to/toward,' but here it introduces a hostile movement in a conquest narrative, hence 'against.'
    reason: lexical_alternative
  - marker: b
    text: Kiriath-sepher is the earlier name of Debir; the name may mean 'City of the Book' or 'City of Scribe(s),' but the place name is transliterated in the main text.
    reason: lexical_alternative
