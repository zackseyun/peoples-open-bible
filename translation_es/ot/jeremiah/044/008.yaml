translation:
  language: es
  text: provocándome a ira por las obras de sus manos, quemando incienso a otros dioses en la tierra de Egipto, donde ustedes van a vivir como forasteros[a], para que se destruyan a sí mismos[b] y para que lleguen a ser maldición[c] y oprobio entre todas las naciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «donde ustedes van a sojornar» o «donde ustedes van a residir como extranjeros»; el hebreo puede destacar el residir como forasteros.
    reason: lexical_alternative
  - marker: b
    text: O «para que sean cortados» o, por implicación en el contexto, «para que sean destruidos».
    reason: alternative_reading
  - marker: c
    text: «Maldición» también puede significar «objeto de maldición», es decir, un pueblo invocado en fórmulas de maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַכְעִסֵנִי
  english_pob_choice: provoking me to anger
  chosen_spanish: provocándome a ira
  alternatives_spanish:
  - provocándome
  - enojándome
  lexicon: HALOT
  rationale: El infinitivo causativo de כעס expresa hacer que Dios se enoje; en español, «provocándome a ira» conserva la fuerza causal y el registro bíblico sin suavizar el efecto.
- source_word: בְּמַעֲשֵׂי יְדֵיכֶם
  english_pob_choice: by the works of your hands
  chosen_spanish: con las obras de sus manos
  alternatives_spanish:
  - con la obra de sus manos
  - mediante lo que sus manos hicieron
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo que puede aludir a actos idolátricos y a lo fabricado por las manos. «Las obras de sus manos» preserva el idiomatismo y su posible trasfondo idolátrico sin sobreexplicar.
- source_word: לְקַטֵּר
  english_pob_choice: by burning incense
  chosen_spanish: quemando incienso
  alternatives_spanish:
  - ofreciendo incienso
  - haciendo humear ofrendas
  lexicon: HALOT
  rationale: En contexto cultual, קטר se refiere al humo/ofrecimiento de incienso. «Quemando incienso» es natural en español y mantiene el valor ritual del verbo.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses extraños
  - a dioses ajenos
  lexicon: HALOT
  rationale: אחרים significa «otros». «Otros dioses» sigue de cerca el hebreo y evita introducir el matiz de «extraños» o «ajenos», que sería interpretativo.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce explícitamente אֶרֶץ y conserva el énfasis locativo del texto.
- source_word: אֲשֶׁר אַתֶּם בָּאִים לָגוּר שָׁם
  english_pob_choice: where you are going to sojourn
  chosen_spanish: adonde ustedes van a morar
  alternatives_spanish:
  - adonde ustedes van a sojornar
  - adonde ustedes van a residir como extranjeros
  lexicon: HALOT
  rationale: לגור implica vivir como residente temporal o forastero. «Morar» es un equivalente español digno y comprensible; en esta cláusula el matiz de residencia no permanente queda sugerido por el contexto, y la formulación evita una construcción demasiado técnica.
- source_word: לְמַעַן הַכְרִית לָכֶם
  english_pob_choice: so that you may cut yourselves off
  chosen_spanish: para que se destruyan a sí mismos
  alternatives_spanish:
  - para que ustedes se corten de raíz
  - para que sean cortados
  lexicon: HALOT
  rationale: El hebreo admite una lectura reflexiva/resultativa sin sujeto explícito en la cláusula. En español, «se destruyan a sí mismos» expresa con claridad la autoinclusión del juicio y deja visible la responsabilidad humana; «se corten de raíz» sería más idiomático pero menos cercano al valor literal de כרת.
- source_word: וּלְמַעַן הֱיוֹתְכֶם
  english_pob_choice: and so that you may become
  chosen_spanish: y para que lleguen a ser
  alternatives_spanish:
  - y para que sean
  - y para que se conviertan en
  lexicon: HALOT
  rationale: היה en esta construcción señala ingreso en un estado. «Lleguen a ser» conserva la transición resultativa y suena natural en español.
- source_word: לִקְלָלָה
  english_pob_choice: a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - una maldición
  - un objeto de maldición
  lexicon: HALOT
  rationale: «Maldición» funciona como sustantivo abstracto directo y bíblicamente inteligible. El inglés POB preserva la posibilidad de «object of cursing»; en español esa alternativa queda mejor para nota que en el cuerpo del texto.
- source_word: וּלְחֶרְפָּה
  english_pob_choice: a reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  lexicon: HALOT
  rationale: חרפה expresa reproche, deshonra o vergüenza pública. «Oprobio» conserva el registro de deshonra/censura colectiva más cercano al campo semántico bíblico.
- source_word: בְּכֹל גּוֹיֵי הָאָרֶץ
  english_pob_choice: among all the nations of the earth
  chosen_spanish: entre todas las naciones de la tierra
  alternatives_spanish:
  - entre todas las naciones del mundo
  lexicon: HALOT
  rationale: «Entre» reproduce la esfera social del testimonio vergonzoso; «naciones de la tierra» sigue el hebreo y mantiene la fórmula bíblica general.
theological_decisions:
- issue: Agency in לְמַעַן הַכְרִית לָכֶם
  english_pob_reading: 'reflexive/resultative: ''so that you may cut yourselves off'''
  chosen_spanish_reading: «para que se destruyan a sí mismos»
  alternative_spanish_readings:
  - «para que yo los corte»
  - «para que sean cortados»
  - «para que se corten de raíz»
  rationale: La cláusula no introduce un sujeto nuevo de manera explícita. La traducción reflexiva/resultativa mantiene la sintaxis abierta del hebreo y la responsabilidad del pueblo por su propia ruina, sin negar el trasfondo del juicio divino en el contexto más amplio.
  doctrine_reference: Jeremiah 44; causalidad humana bajo juicio divino
- issue: Sentido de לִקְלָלָה
  english_pob_reading: '''A curse'' may also mean ''an object of cursing,'' that is, a people invoked in curse formulas.'
  chosen_spanish_reading: «maldición»
  alternative_spanish_readings:
  - «objeto de maldición»
  - «objeto de maldecir»
  rationale: En el cuerpo del texto, «maldición» es más idiomático y comprensible. La ambigüedad semántica del hebreo se conserva en nota para no borrar la posibilidad de que el pueblo sea proverbialmente citado en fórmulas de maldición.
  doctrine_reference: Uso semántico de קללה en contexto profético
- issue: Traducción de לָגוּר
  english_pob_reading: where you are going to sojourn
  chosen_spanish_reading: «adonde ustedes van a morar»
  alternative_spanish_readings:
  - «adonde ustedes van a sojornar»
  - «adonde ustedes van a habitar como extranjeros»
  rationale: Aunque el inglés POB optó por «sojourn» para reflejar la residencia como extranjero, en español «morar» comunica con dignidad la estancia prevista. El matiz de extranjería queda disponible en nota para no sobrecargar el texto principal con una expresión poco natural.
  doctrine_reference: Peregrinación/exilio y residencia temporal
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «reside» por «sojourn» para precisar לָגוּר como residencia de extranjero. En español, se evaluó ese matiz, pero se optó por «morar» en el texto principal por naturalidad y dignidad estilística, dejando el matiz de forastería explícito en nota. También se mantuvo la lectura reflexiva/resultativa de לְמַעַן הַכְרִית לָכֶם, y se preservó la ambigüedad semántica de קללה en notas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evitó «SEÑOR» para no ocultar el valor del hebreo cuando se trate del nombre divino.
  - «Otros dioses» se mantuvo literal y consistente con la decisión POB.
  - «Maldición» y «oprobio» conservan el tono profético y público del pasaje.
  - La puntuación sigue el orden y la lógica sintáctica del hebreo sin forzar una paráfrasis extensa.
