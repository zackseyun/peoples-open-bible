translation:
  text: |-
    1. And after this there came to us a greater war toward the south than the one at Shechem; and when I had drawn up in battle with my brothers, we pursued a thousand men and killed two hundred of them, and four kings.
    2. And I went up upon the wall and killed their king.
    3. And so we set Hebron free and took all the captives.
    4. But the rest fled.
    5. Then my father Jacob killed Belisath, king of all the kings, a man giant in strength, twelve cubits high.
    6. And terror fell upon them, and they stopped making war against us.
    7. Therefore my father was without anxiety in the wars while I was with my brothers.
    8. For he saw in a vision concerning me that an angel of power went along with me in all things, so that no one might touch me.
