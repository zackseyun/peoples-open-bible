translation:
  language: es
  text: Si un hombre se acuesta con un varón[a] como se hace con una mujer, ambos han cometido una abominación; ciertamente se les dará muerte[b]; su sangre será sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los lechos de una mujer», un modismo para la relación sexual con una mujer.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su culpabilidad de sangre recaerá sobre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y un hombre
  - Un hombre
  lexicon: HALOT
  rationale: En esta formulación legal casuística, la partícula inicial introduce una condición. «Si un hombre» comunica naturalmente ese valor condicional en español, sin perder el singular masculino de אִישׁ.
- source_word: יִּשְׁכַּב אֶת
  english_pob_choice: lies with
  chosen_spanish: se acuesta con
  alternatives_spanish:
  - tiene relaciones sexuales con
  - duerme con
  lexicon: HALOT
  rationale: El verbo שׁכב funciona aquí como un eufemismo idiomático de relación sexual. «Se acuesta con» conserva el giro bíblico y su fuerza referencial sin volverse excesivamente técnico.
- source_word: זָכָר
  english_pob_choice: a male
  chosen_spanish: un varón
  alternatives_spanish:
  - un hombre
  - un macho
  lexicon: HALOT
  rationale: זָכָר designa al varón en cuanto sexo masculino. «Varón» preserva esa distinción mejor que «hombre», que podría solaparse con אִישׁ, y evita el registro zoológico de «macho».
- source_word: מִשְׁכְּבֵי אִשָּׁה
  english_pob_choice: as one lies with a woman
  chosen_spanish: como quien se acuesta con una mujer
  alternatives_spanish:
  - como los ayeres de una mujer
  - como se acuesta con una mujer
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y alude al acto sexual con una mujer. «Como quien se acuesta con una mujer» reproduce el sentido idiomático en español natural, evitando una literalidad opaca como «las acostadas de una mujer».
- source_word: תּוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - una cosa detestable
  - una repulsión
  lexicon: HALOT
  rationale: «Abominación» conserva el peso moral y cultual del término hebreo en la tradición bíblica, y mantiene la consistencia terminológica con el contexto legal.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos juntos
  lexicon: HALOT
  rationale: El hebreo subraya la participación de las dos personas. «Ambos» es la forma más concisa y natural para mantener ese énfasis dual.
- source_word: מוֹת יוּמָתוּ
  english_pob_choice: they shall surely be put to death
  chosen_spanish: ciertamente serán muertos
  alternatives_spanish:
  - serán seguramente ejecutados
  - deben ser muertos
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto expresa intensidad o certeza de la pena. «Ciertamente serán muertos» refleja bien esa fuerza; «serán muertos» mantiene la pasiva legal, aunque en español moderno suene marcada, y aquí se preserva por fidelidad al registro jurídico del texto.
- source_word: דְּמֵיהֶם בָּם
  english_pob_choice: their blood is on them
  chosen_spanish: su sangre cae sobre ellos
  alternatives_spanish:
  - su sangre está sobre ellos
  - su sangre está sobre sí
  lexicon: HALOT
  rationale: El hebreo es un modismo de culpa y responsabilidad por la propia pena. «Su sangre cae sobre ellos» comunica en español la imputación de culpa de modo idiomático y sin suavizar el alcance legal del hebreo.
theological_decisions:
- issue: Preservar el carácter actoral/legal del pasaje sin introducir categorías modernas ajenas al texto
  english_pob_reading: The verse is translated directly according to its Hebrew legal wording, preserving both the prohibition and the stated penalty without paraphrase or doctrinal commentary.
  chosen_spanish_reading: El versículo se vierte según su formulación legal hebrea, preservando la prohibición y la pena declarada sin paráfrasis doctrinal ni categorías modernas ajenas al texto.
  alternative_spanish_readings:
  - Uso de lenguaje identitario moderno
  - Paráfrasis moralizante más amplia
  rationale: El hebreo describe un acto en un marco legal, no una identidad contemporánea. La traducción mantiene el foco del texto en la acción y la sanción, sin expandir el alcance semántico más allá de la evidencia fuente.
  doctrine_reference: Principios de traducción §1, §3, §6
- issue: Distinción entre אִישׁ y זָכָר
  english_pob_reading: Retained 'man' and 'male' to reflect the distinct Hebrew terms אִישׁ and זָכָר.
  chosen_spanish_reading: Se conservan «hombre» y «varón» para reflejar los términos hebreos distintos אִישׁ y זָכָר.
  alternative_spanish_readings:
  - hombre/hombre
  - persona/varón
  rationale: Aunque ambos pueden referirse a un sujeto masculino, en español «hombre» y «varón» permiten mantener la distinción léxica del hebreo sin neutralizarla.
  doctrine_reference: Principios de traducción §4
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje fuente; el cotejo más reciente indica alto acuerdo y sin cambios necesarios. La redacción española sigue de cerca la lectura inglesa auditada, pero vuelve al hebreo para decidir entre «varón» y «mujer» frente a la distinción אִישׁ / זָכָר y para conservar el modismo de culpa en דְּמֵיהֶם בָּם.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton cuando aparezca en el corpus POB; este versículo no contiene el nombre divino.
  - Se mantiene «abominación» para תּוֹעֵבָה por consistencia léxica bíblica.
  - Se conserva el registro jurídico con «ciertamente serán muertos» en lugar de una paráfrasis explicativa.
  - La nota a explica el modismo sexual hebreo sin ampliar el contenido del texto.
