revisions:
- from: Sabe, pues, hoy que Yahvé tu Dios es el que pasa delante de ti[a], fuego consumidor. Él los destruirá y él los someterá delante de ti; y tú los desposeerás y los harás perecer rápidamente[d][c][b], tal como Yahvé te ha dicho.
  to: Reconoce, pues, hoy que Yahvé tu Dios es el que cruza delante de ti[a], un fuego consumidor. Él los destruirá y él los someterá delante de ti; y tú los desposeerás y los harás perecer rápidamente[d][c][b], tal como Yahvé te ha dicho.
  rationale: Se ajusta הָעֹבֵר a «cruza delante de ti» para reflejar mejor la decisión lexical documentada de preservar la imaginería concreta de עבר. Se mejora la naturalidad española con «Reconoce, pues, hoy» y con «un fuego consumidor». Se corrige la nota d para eliminar el calco no idiomático «habló a ti», manteniendo intacto el sentido de palabra previa de Yahvé.
