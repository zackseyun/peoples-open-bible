revisions:
- from: No dejarán nada de él hasta la mañana[a], y no quebrarán hueso suyo[b]; conforme a toda la estatuta de la Pascua, la cumplirán.
  to: No dejarán nada de él hasta la mañana, y no le quebrarán ningún hueso[a]; según todo el estatuto de la Pascua, la celebrarán[b].
  rationale: Se corrige el anclaje de la nota léxica para que corresponda a la cláusula del hueso; se reemplaza «estatuta» por «estatuto» como español correcto; se mejora «hueso suyo» a una formulación natural y fiel; y se ajusta el verbo final a «la celebrarán», que expresa mejor la observancia ritual de la Pascua en español claro. La nota de referencia cruzada se conserva, pero anclada al lugar pertinente.
