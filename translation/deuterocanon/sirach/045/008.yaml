translation:
  text: He clothed him with perfect splendor[a], and adorned him with glory and strength, with trousers, tunics, and a robe[b]; and he encircled him with bells.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surviving Hebrew and Greek differ in the details of the priestly garments here. The Hebrew reads 'trousers, tunics, and a robe ... bells,' while the Greek witness has a different sequence and includes the ephod.
    reason: textual_variant
  - marker: b
    text: Or 'full ornament of beauty' for 'perfect splendor'; the Hebrew phrase is compact and exalted, and the Greek points in a similarly heightened direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וילבישהו
  chosen: He clothed him
  alternatives:
  - He dressed him
  - He vested him
  lexicon: HALOT
  rationale: The Hifil of לבש means to clothe or dress someone. 'Clothed' is natural English and preserves the ceremonial sense without importing later ecclesiastical terminology like 'vested.'
- source_word: כליל תפארת
  chosen: perfect splendor
  alternatives:
  - complete glory
  - full ornament of beauty
  - consummation of boasting
  lexicon: HALOT
  rationale: Hebrew כליל conveys completeness or entirety, and תפארת denotes splendor/beauty/glory. The Greek συντέλειαν καυχήματος points to a superlative, honorific sense. 'Perfect splendor' captures the Hebrew idiom compactly and fits the context of priestly adornment.
- source_word: ויפארהו
  chosen: adorned him
  alternatives:
  - glorified him
  - beautified him
  - honored him
  lexicon: HALOT
  rationale: From פאר, the verb here concerns making Aaron splendid through vestments. 'Adorned' best fits the concrete clothing context while still carrying honorific force.
- source_word: בכבוד ועוז
  chosen: with glory and strength
  alternatives:
  - with honor and might
  - with splendor and power
  lexicon: HALOT
  rationale: כבוד commonly means glory/honor and עוז strength/might. The pair expresses dignity and power associated with the high-priestly attire. 'Glory and strength' stays close to the Hebrew while remaining idiomatic.
- source_word: מכנסים
  chosen: trousers
  alternatives:
  - linen undergarments
  - breeches
  lexicon: HALOT
  rationale: The term denotes the lower-body priestly garment. 'Trousers' is clear modern English; 'breeches' is archaic, while 'undergarments' adds specificity not explicit in this line itself, though priestly parallels inform the sense.
- source_word: כתנות
  chosen: tunics
  alternatives:
  - coats
  - garments
  lexicon: HALOT
  rationale: כתנת is commonly rendered 'tunic' in biblical clothing contexts. The plural is preserved. 'Coats' is less precise for ancient dress.
- source_word: ומעיל
  chosen: and a robe
  alternatives:
  - and an outer garment
  - and a mantle
  lexicon: HALOT
  rationale: מעיל is the robe-like outer garment, especially in priestly contexts. 'Robe' is the most standard and understandable rendering.
- source_word: ויקיפהו
  chosen: he encircled him
  alternatives:
  - he surrounded him
  - he girded him
  lexicon: HALOT
  rationale: The verb from נקף/קיף conveys surrounding or encircling. In context, the bells are arranged around the hem of the robe, so 'encircled him' reflects the image better than 'girded him.'
- source_word: פעמונים
  chosen: bells
  alternatives:
  - golden bells
  lexicon: HALOT
  rationale: The Hebrew simply says 'bells.' Although priestly parallels specify gold, this verse does not, and the Greek likewise has no explicit adjective here in the cited line.
