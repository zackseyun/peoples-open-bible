review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva el contraste jurídico entre salir fuera de la casa y permanecer dentro. Sin embargo, en dos puntos importantes no preserva con suficiente fidelidad la forma/imagen fuente: (1) דָּמוֹ בְרֹאשׁוֹ / בְרֹאשֵׁנוּ se ha vertido como ''caerá sobre'', mientras que el hebreo dice literalmente ''estará/será sobre'', y el rastro POB inglés decidió preservar explícitamente ese modismo; (2) בְרֹאשֵׁנוּ es plural ''sobre nuestras cabezas'', pero el español draft lo singulariza como ''sobre nuestra cabeza''. Además, la nota [b] está anclada en ''inocentes'' cuando en realidad explica el modismo final ''si una mano está sobre él''.'
  spanish_quality_summary: 'El español es legible y de registro digno, pero hay formulaciones mejorables para exactitud y naturalidad bíblica: ''por las puertas de tu casa hacia afuera'' suena algo torpe; ''desde las puertas de tu casa hacia afuera'' o ''salga de las puertas...'' refleja mejor el hebreo. ''Su sangre estará sobre su propia cabeza'' y ''sobre nuestras cabezas'' preservan mejor el modismo solemne. La colocación de la nota [b] debe moverse al modismo final correspondiente.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. El punto clave de alineación lexical es mantener el idiomático jurídico de 'su sangre... sobre su cabeza / nuestras cabezas' en vez de sustituirlo por 'caerá sobre'. También conviene respetar el plural de 'nuestras cabezas' y conservar la indefinición del agente en 'si se le pone la mano encima' o equivalente.
  issues:
  - severity: high
    issue: El modismo de culpa de sangre se cambió de 'estar/ser sobre' a 'caer sobre'.
    rationale: El hebreo dice literalmente 'su sangre [está/será] sobre su cabeza'. El POB inglés documentó la preservación del modismo jurídico. 'Caerá sobre' introduce una imagen diferente y menos fiel.
  - severity: high
    issue: Se perdió el plural en בְרֹאשֵׁנוּ.
    rationale: El texto fuente dice 'sobre nuestras cabezas' (plural), y el inglés POB también lo refleja. El borrador dice 'sobre nuestra cabeza', alterando el paralelismo y la forma.
  - severity: medium
    issue: La nota [b] está colocada en el lugar equivocado.
    rationale: La nota explica 'si una mano está sobre él', pero en el borrador el marcador [b] aparece tras 'inocentes', creando una referencia errónea.
  - severity: low
    issue: '''por las puertas de tu casa hacia afuera'' suena poco natural.'
    rationale: Aunque entendible, 'desde las puertas de tu casa hacia afuera' o similar fluye mejor en español y sigue representando la imagen espacial del hebreo.
  revised_spanish_text: Y sucederá que cualquiera que salga desde las puertas de tu casa hacia afuera, su sangre estará sobre su propia cabeza[a], y nosotros quedaremos inocentes. Pero todo el que esté contigo en la casa, su sangre estará sobre nuestras cabezas, si se le pone la mano encima[b].
  revised_footnotes:
