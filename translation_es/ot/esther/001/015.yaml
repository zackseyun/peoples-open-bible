translation:
  language: es
  text: Según la ley[a][b], ¿qué se hará a la reina Vasti[c] porque no obedeció[d] el mandato del rey Asuero, entregado por medio de los eunucos[e]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «de acuerdo con la costumbre»; en Ester, דָּת puede abarcar ley o decreto de corte, pero aquí el marco jurídico es el más probable.
    reason: lexical_alternative
  - marker: b
    text: O «conforme a la ley».
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa una formulación que puede expresarse como acción tomada «con» o «a» la reina Vasti; en español jurídico y natural aquí fluye mejor «a la reina Vasti».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «no hizo»; el contexto del mandato hace natural expresar «no obedeció».
    reason: lexical_alternative
  - marker: e
    text: Literalmente, «por la mano de los eunucos»; también puede entenderse «por medio de los eunucos». El hebreo permite una referencia más amplia a funcionarios de corte, aunque «eunucos» es la traducción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדָת
  english_pob_choice: According to the law
  chosen_spanish: Según la ley
  alternatives_spanish:
  - De acuerdo con la ley
  - Conforme a la ley
  lexicon: HALOT
  rationale: דָּת en Ester suele referirse a la ley o decreto en el marco cortesano persa. «Según la ley» mantiene el tono jurídico y suena natural en español.
- source_word: מַה לַּעֲשׂוֹת
  english_pob_choice: what is to be done
  chosen_spanish: ¿qué se hará?
  alternatives_spanish:
  - ¿qué debe hacerse?
  - ¿qué ha de hacerse?
  lexicon: HALOT
  rationale: La construcción pide una decisión o disposición legal. En español, la pasiva refleja «se hará» conserva el tono impersonal y deliberativo del original.
- source_word: בַּמַּלְכָּה וַשְׁתִּי
  english_pob_choice: Queen Vashti
  chosen_spanish: la reina Vasti
  alternatives_spanish:
  - a la reina Vasti
  - contra la reina Vasti
  lexicon: HALOT
  rationale: El hebreo presenta a Vasti como objeto de la acción. «A la reina Vasti» habría sido posible, pero «se hará a» es menos natural; por eso se usa la pasiva impersonal con el objeto directo preservado en español.
- source_word: לֹא עָשְׂתָה
  english_pob_choice: she did not obey
  chosen_spanish: no obedeció
  alternatives_spanish:
  - no hizo
  - no cumplió
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «no hizo», el contexto del «mandato» vuelve legítimo expresar la desobediencia. «Obedeció» refleja mejor el valor relacional del acto sin alejarse del sentido jurídico del pasaje.
- source_word: מַאֲמַר
  english_pob_choice: the command
  chosen_spanish: el mandato
  alternatives_spanish:
  - la orden
  - la palabra
  lexicon: HALOT
  rationale: En contexto real, מַאֲמַר lleva fuerza de declaración con autoridad. «Mandato» comunica bien esa autoridad sin sonar demasiado técnico.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Ahasuero
  - el rey Jerjes
  lexicon: HALOT
  rationale: Se conserva el título y la transliteración tradicional adaptada al español bíblico. «Asuero» es la forma más estable y reconocible en español.
- source_word: בְּיַד הַסָּרִיסִים
  english_pob_choice: delivered by the eunuchs
  chosen_spanish: entregado por medio de los eunucos
  alternatives_spanish:
  - por los eunucos
  - a través de los eunucos
  lexicon: HALOT
  rationale: La expresión idiomática «por la mano de» indica mediación. «Por medio de» evita una literalidad áspera y mantiene la idea de agencia intermediaria. «Eunucos» es la opción más directa; no se sustituye por «oficiales» en el texto principal porque el hebreo usa un término más específico.
translation_notes:
  revision_awareness: 'El inglés auditado revisó la formulación desde una versión más literal (''with Queen Vashti'', ''carry out'') hacia una más natural (''to Queen Vashti'', ''obey''). La versión española sigue esa misma dirección: conserva el marco jurídico, pero expresa la pasiva y la desobediencia con español idiomático.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Asuero» como forma española estable del nombre propio, en coherencia con el uso bíblico tradicional en español.
  - «Eunucos» se conserva por fidelidad léxica al hebreo; no se reemplazó por «oficiales» en el texto principal porque el contexto persa permite el sentido específico.
