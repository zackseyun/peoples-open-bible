base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/021.yaml
  text: The sons of Israel who had returned from the exile ate[a], together with everyone who had separated himself from the uncleanness of the peoples of the land to seek Yahweh[c][b], the God of Israel.
  footnotes:
