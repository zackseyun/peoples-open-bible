id: 2MA.3.39
reference: 2 Maccabees 3:39
source:
  edition: lxx-swete-1909
  text: αὐτὸς γὰρ ὁ τὴν κατοικίαν ἐπουράνιον ἔχων ἐπόπτης ἐστὶν καὶ βοηθὸς ἐκείνου τοῦ τόπου, καὶ τοὺς παραγινομένους ἐπὶ κακώσει τύπτων ἀπόλλυσι.
  language: Greek
  pages:
  - 693
  confidence: high
  validation: agree
translation:
  text: For he himself[a], who has his dwelling in heaven, is the overseer and helper of that place[b], and he strikes and destroys those who come to do harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who dwells in heaven.' The Greek literally says 'who has the heavenly dwelling.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; the Greek reads more literally 'that place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικίαν ἐπουράνιον ἔχων
  chosen: who has his heavenly dwelling
  alternatives:
  - who dwells in heaven
  - whose dwelling is in heaven
  - who has a heavenly habitation
  lexicon: LSJ
  rationale: A participial phrase modifying the subject. 'Has his heavenly dwelling' stays close to the Greek wording while remaining natural English. It preserves the emphasis on God's heavenly abode without over-paraphrasing to a finite clause.
- source_word: ἐπόπτης
  chosen: overseer
  alternatives:
  - guardian
  - watcher
  - protector
  lexicon: LSJ
  rationale: '''Overseer'' best reflects the sense of one who watches over or supervises. ''Guardian'' would tilt more interpretive and overlap too much with βοηθός; keeping ''overseer'' preserves the paired distinction.'
- source_word: βοηθός
  chosen: helper
  alternatives:
  - defender
  - protector
  - ally
  lexicon: LSJ
  rationale: The basic sense is one who comes to aid. 'Helper' is straightforward and avoids importing a more militarized nuance than the word itself requires, especially since the following clause already supplies forceful action.
- source_word: ἐκείνου τοῦ τόπου
  chosen: that place
  alternatives:
  - that temple
  - that sanctuary
  - that location
  lexicon: LSJ
  rationale: The Greek says 'that place.' In context it refers to the temple, but the source uses the broader term τόπος, so the translation preserves the wording rather than specifying beyond the text.
- source_word: τοὺς παραγινομένους ἐπὶ κακώσει
  chosen: those who come to do harm
  alternatives:
  - those who come for injury
  - those who arrive with evil intent
  - those who come to mistreat
  lexicon: LSJ
  rationale: The phrase denotes people presenting themselves for the purpose of harming or injuring. 'Come to do harm' is idiomatic English that captures the purposive force of ἐπὶ + dative verbal noun.
- source_word: τύπτων ἀπόλλυσι
  chosen: he strikes down and destroys
  alternatives:
  - he beats and destroys
  - he smites and destroys
  - he strikes and ruins
  lexicon: LSJ
  rationale: The present participle plus main verb conveys forceful punitive action. 'Strikes down and destroys' is vivid but readable modern English, preserving the severity without archaic diction.
