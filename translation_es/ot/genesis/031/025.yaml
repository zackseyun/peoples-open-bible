translation:
  language: es
  text: Y Labán alcanzó[a] a Jacob. Jacob ya había levantado su tienda en la región montañosa[b], y Labán levantó campamento con sus parientes[c] en la región montañosa de Galaad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio alcance a Jacob».
    reason: lexical_alternative
  - marker: b
    text: O «en la montaña».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sus hermanos»; aquí probablemente significa sus parientes o miembros de su clan.
    reason: lexical_alternative
  - marker: d
    text: O «en el monte de Galaad» o «en las montañas de Galaad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשֵּׂג
  english_pob_choice: caught up with
  chosen_spanish: alcanzó
  alternatives_spanish:
  - dio alcance a
  - lo alcanzó
  lexicon: HALOT
  rationale: El verbo expresa que Laban dio alcance a Jacob en contexto de persecución o seguimiento. «Alcanzó» mantiene esa idea de llegar hasta alguien de manera natural en español, sin implicar necesariamente captura.
- source_word: תָּקַע ... אָהֳלוֹ
  english_pob_choice: had pitched his tent
  chosen_spanish: había plantado su tienda
  alternatives_spanish:
  - había levantado su tienda
  - había acampado
  lexicon: HALOT
  rationale: Con אהל, תָּקַע es un modismo de acampar o plantar una tienda. «Había plantado su tienda» conserva la imagen concreta de la tienda y refleja bien el valor idiomático del hebreo.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en las montañas
  lexicon: HALOT
  rationale: Aquí הָר funciona como referencia regional más que como un monte único. «Región montañosa» comunica el sentido geográfico con claridad y evita una lectura demasiado literal que en español sonaría rígida.
- source_word: אֶחָיו
  english_pob_choice: his kinsmen
  chosen_spanish: sus parientes
  alternatives_spanish:
  - sus hermanos
  - sus familiares
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hermanos», el contexto narrativo sugiere un grupo de acompañantes de su clan. «Parientes» preserva ese alcance amplio y evita reducirlo a hermanos biológicos.
- source_word: בְּהַר הַגִּלְעָד
  english_pob_choice: in the hill country of Gilead
  chosen_spanish: en la región montañosa de Galaad
  alternatives_spanish:
  - en el monte de Galaad
  - en las montañas de Galaad
  lexicon: HALOT
  rationale: La construcción denota el área elevada de Galaad. «Región montañosa de Galaad» refleja el valor topográfico de la frase y es más natural para el lector español que una traducción estrictamente singular de «monte».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: se mantiene el valor de persecución/alcance de וַיַּשֵּׂג, el modismo de acampar en תָּקַע con אָהֳל, la lectura regional de בָּהָר y el sentido de clan para אֶחָיו. Se adopta una forma española fluida, sin añadir elementos ausentes en el hebreo, y se evita inventar plurales o intensificar el contraste más allá de lo documentado en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el Tetragrámaton; aquí no aparece.
  - Se mantiene «Laban» y «Galaad» como formas consistentes de nombres propios en español bíblico.
  - «Región montañosa» se usa para בָּהָר en coherencia con la lectura regional del POB inglés.
  - No se traduce אֶחָיו como «hermanos» en el texto principal para evitar una restricción innecesaria del grupo.
  - Las notas al pie conservan las alternativas documentadas por el POB inglés y no añaden lecturas no atestiguadas.
