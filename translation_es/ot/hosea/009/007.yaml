translation:
  language: es
  text: Han llegado los días del castigo[a]; han llegado los días de la retribución; Israel lo sabrá. El profeta es un necio; el hombre del espíritu está loco[b], por la grandeza de tu iniquidad y tu gran hostilidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Han llegado los días de la visitación» o «los días del ajuste de cuentas». El hebreo puede referirse a una visitación punitiva o a un tiempo de rendición de cuentas judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse esta línea como la descripción despectiva que el pueblo hace del verdadero profeta: «El profeta es un necio; el hombre del espíritu está loco». El hebreo no la marca explícitamente como cita.'
    reason: alternative_reading
  - marker: c
    text: 'O: «la abundancia de tu culpa y tu gran enemistad/odio». El sustantivo final puede referirse a hostilidad, enemistad o animosidad, y no se especifica con precisión su objeto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדָּה
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - visitación
  - retribución
  - reckoning
  lexicon: HALOT
  rationale: En un contexto profético de juicio, פְּקֻדָּה apunta a una visita judicial o punitiva de Dios. «Castigo» comunica bien la fuerza punitiva en español actual sin perder el sentido de intervención judicial.
- source_word: שִׁלֻּם
  english_pob_choice: repayment
  chosen_spanish: retribución
  alternatives_spanish:
  - pago
  - recompensa
  - repago
  lexicon: HALOT
  rationale: El paralelo exige la idea de retribución o pago correspondiente. «Retribución» conserva el valor de requital y suena natural en español bíblico contemporáneo.
- source_word: יֵדְעוּ יִשְׂרָאֵל
  english_pob_choice: Israel will know it
  chosen_spanish: Israel lo sabrá
  alternatives_spanish:
  - Israel sabrá
  - Israel llegará a saberlo
  lexicon: HALOT
  rationale: El imperfecto tiene valor predictivo. «Lo» recoge de manera natural el objeto implícito del anuncio de juicio, como en el inglés auditado.
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  lexicon: HALOT
  rationale: Como predicado nominal después de «el profeta», «necio» transmite el insulto profético con la gravedad adecuada; «insensato» es posible, pero algo más débil.
- source_word: מְשֻׁגָּע
  english_pob_choice: mad
  chosen_spanish: está loco
  alternatives_spanish:
  - está desquiciado
  - está fuera de sí
  lexicon: HALOT
  rationale: «Loco» expresa la fuerza despectiva y la idea de desvarío. Añadir «está» hace natural la construcción española sin alterar el juicio del hebreo.
- source_word: אִישׁ הָרוּחַ
  english_pob_choice: the man of the spirit
  chosen_spanish: el hombre del espíritu
  alternatives_spanish:
  - el hombre inspirado
  - el hombre espiritual
  - el inspirado
  lexicon: HALOT
  rationale: Se conserva la literalidad de la frase hebrea sin decidir de antemano si se trata del Espíritu Santo o de una inspiración reclamada. La minúscula en «espíritu» mantiene la ambigüedad del original.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: Aquí introduce causa. «Por» es conciso y natural en español, y permite conservar el encadenamiento del juicio con la razón dada.
- source_word: רֹב עֲוֺנְךָ
  english_pob_choice: the greatness of your iniquity
  chosen_spanish: la grandeza de tu iniquidad
  alternatives_spanish:
  - la abundancia de tu culpa
  - tu gran iniquidad
  lexicon: HALOT
  rationale: «Grandeza» reproduce רֹב como abundancia/intensidad. «Iniquidad» mantiene el peso moral-religioso de עָוֹן mejor que un término más general como «pecado».
- source_word: מַשְׂטֵמָה
  english_pob_choice: your great hostility
  chosen_spanish: tu gran hostilidad
  alternatives_spanish:
  - tu gran enemistad
  - tu odio
  lexicon: HALOT
  rationale: El sustantivo puede expresar enemistad, hostilidad o animosidad. «Hostilidad» conserva esa amplitud y evita restringir prematuramente el referente.
theological_decisions:
- issue: Referente de «el profeta es un necio; el hombre del espíritu está loco»
  english_pob_reading: A denunciation of Israel's prophetic figures or claimed inspired spokesmen in the context of judgment
  chosen_spanish_reading: Una denuncia de figuras proféticas de Israel o de quienes se presentan como inspirados, dentro del contexto de juicio
  alternative_spanish_readings:
  - Una cita de lo que la gente dice del verdadero profeta
  - Una caracterización sarcástica solo de los falsos profetas
  rationale: La secuencia «Israel lo sabrá» favorece leer la frase como parte de la advertencia profética. Como el hebreo no marca explícitamente una cita, la traducción evita comillas y conserva la tensión interpretativa.
  doctrine_reference: Preservar la tensión hermenéutica sin resolverla artificialmente
- issue: Sentido de «espíritu» en «hombre del espíritu»
  english_pob_reading: Human spiritual inspiration/claim to inspiration, not explicitly the Holy Spirit
  chosen_spanish_reading: Inspiración espiritual humana o reclamada, no explícitamente el Espíritu Santo
  alternative_spanish_readings:
  - Un hombre inspirado por el Espíritu de Dios
  - Un hombre espiritual
  rationale: La minúscula evita importar una precisión doctrinal que el hebreo no exige. Así se conserva la ambigüedad del texto y la posible referencia a una supuesta inspiración.
  doctrine_reference: No atribuir al texto una especificación doctrinal no explícita
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético y el audit trail inglés, manteniendo las decisiones revisadas en el contexto final: ‘your great hostility’ se reflejó como ‘tu gran hostilidad’. La traducción española conserva el paralelismo de los dos miembros de juicio y la ambigüedad interpretativa de la segunda mitad del versículo.'
  spanish_consistency_notes:
  - Se usó Yahvé en lugar de SEÑOR como convención general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se mantuvo ‘espíritu’ en minúscula para no forzar una lectura pneumatológica específica.
  - Se prefirió ‘iniquidad’ para preservar el peso jurídico-moral de עָוֹן.
  - ‘Retribución’ y ‘castigo’ se eligieron para reflejar el paralelismo semántico de los dos primeros hemistiquios.
