translation:
  text: |-
    1 And he answered me and said, “The Most High made this present age for many, but the age to come for few.
    2 But I will tell you a comparison, Ezra. Just as, if you ask the earth, it will tell you that it gives much clay, from which earthen vessels are made, but little dust from which gold comes,
    3 so also are the deeds of the present age: many indeed have been created, but few will be saved.”
    4 And I answered and said, “Then let my soul swallow understanding, and let it devour wisdom.
    5 For you have agreed to listen, and you have advanced unwillingly, since no span has been given to you except only a little while to live.
    6 O Lord over us, if you permit your servant to pray before you, and give us seed for the heart and cultivation for the understanding, from which fruit may come, by which every corrupted one may live,
    7 who bears the place of a man. For you alone are one, and we are one thing formed by the work of your hands, as you have spoken.
    8 And because, giving life, you now give life in the womb to the body that has been formed, and you provide its members, your creation is preserved in your fire and water, and for nine months your formation endures your creature that has been created in it.
    9 But both what preserves and what is preserved will be preserved by your preservation. And when the womb again gives back
    10 the things that have been created in it, you commanded that from those members, that is,
    11 from the breasts, milk should be supplied, the fruit of the breasts, so that what has been formed may be nourished for a certain time, and afterward you will commit him to your mercy.
    12 You nourished him in your righteousness, and instructed him in your law, and corrected him with your understanding.
    13 And you will put him to death as your creature, and you will give him life as your work.
    14 If therefore you destroy the one who was formed with such labors by your command, by an easy decree, why then was he made?
    15 And now I will speak: concerning every man you know better, but concerning your people my pain is greater,
    16 and concerning your inheritance, for which I mourn, and concerning Israel, for whom I am grieved, and concerning the seed of Jacob, for which I am troubled.
    17 Therefore I will begin to pray before you for myself and for them, because I see the failings of us who inhabit the earth.
    18 But I have heard of the swiftness of the judgment that is to come.
    19 Therefore hear my voice and understand my words, and I will speak before you.” This is the beginning of the words of Ezra’s prayer before he was taken up.
    20 And he said, “Lord, you who inhabit eternity, whose eyes are exalted and look upon the heights in the air,
    21 whose throne is beyond measure and whose glory is incomprehensible, before whom the host of angels stands with trembling,
    22 whose service is in wind and fire, whose word is sure and whose sayings endure, whose ordering is strong and whose command is fearful,
    23 whose look dries up the depths, and whose indignation makes the mountains melt, and whose truth bears witness:
    24 hear, Lord, the prayer of your servant, and receive with your ears the petition of your thing formed; pay attention to my words.
    25 For while I live I will speak, and while I have understanding I will answer. Do not look upon the offenses of your people,
    26 but upon those who have served you in truth. Do not attend to the pursuits of those who act impiously,
    27 but to those who have kept your covenants through sorrows. Do not think on those who have conducted themselves falsely before you,
    28 but remember those who have known your fear by their own will.
    29 Do not be willing to destroy those who have had the manners of cattle, but look upon those who have taught your law splendidly.
    30 Do not be angry with those who have been judged worse than beasts, but love those who have always trusted in your glory.
    31 For we and our fathers have lived in mortal ways, but you, because of us sinners, are called merciful.
    32 For if you desire to have mercy on us, then you will be called merciful, since we do not have works of righteousness.
    33 But the righteous, who have many works laid up with you, will receive their reward from their own works.
    34 For what is man, that you should be angry with him, or a corruptible race, that you should be so bitter against it?
    35 For in truth there is no one among those born who has not acted impiously, and among those who confess you, no one who has not sinned.
    36 For in this your righteousness and your goodness will be declared, Lord, when you have mercy on those who have no store of good works.”
    37 And he answered me and said, “You have spoken rightly in some things, and according to your words so it will be.
    38 For truly I will not think upon the formation of those who have sinned, nor upon death, nor judgment, nor destruction;
    39 but I will rejoice over the formation of the righteous, and over pilgrimage also, and salvation, and the receiving of reward.
    40 Therefore, as I have spoken, so it is.
    41 For just as a farmer sows many seeds upon the earth and plants a multitude of plantings, but not everything that has been sown will be preserved in its season, nor will everything that has been planted take root, so also those who have been sown in the age—not all will be saved.” And I answered and said, “If I have found favor before you, I will speak.
    42 If the farmer’s seed does not come up because it did not receive your rain in its season, or if it is ruined by too much rain,
    43 it perishes. But man, who has been formed by your hands and is called your image
    44 because he has been made like you, through whom you formed all things—and you have likened him to the farmer’s seed. No, Lord over us;
    45 but spare your people and have mercy on your inheritance, for you have mercy on your own creation.”
    46 And he answered me and said, “What belongs to the present is for the present, and what belongs to the future is for the future.
    47 For you still fall far short of being able to love my creation more than I do; but you have often compared yourself with the unrighteous—never do so.
    48 But in this also you will be admirable before the Most High,
    49 because you have humbled yourself, as is fitting for you,
    50 and have not judged yourself among the righteous, so that you should be greatly glorified.
    51 Therefore many miserable miseries will befall those who inhabit the world in the last times, because they have walked in great pride.
    52 But understand for yourself, and seek out glory for those like yourself.
    53 For to you paradise has been opened, the tree of life has been planted, the age to come has been prepared, abundance has been made ready, the city has been built, rest has been appointed, goodness has been perfected,
    54 and wisdom made complete beforehand.
    55 The root of evil has been sealed up from you, weakness has been extinguished from you, and death has been hidden; Hades has fled, and corruption has been forgotten.
    56 Sorrows have passed away, and in the end the treasure of immortality has been shown.
    57 Therefore do not continue any longer by inquiring about the multitude of those who perish.
    58 For they too, though they received freedom, despised the Most High and scorned his law and abandoned his ways.
    59 Still more, they trampled his righteous ones
    60 and said in their hearts that there is no God—even though, knowing, they know that they will die. For just as the things foretold will receive you, so thirst and torment are prepared for them. For the Most High did not will that man should be destroyed,
    61 but they who were created defiled the name of him who made them and were ungrateful to him who prepared life for them. Therefore my judgment now draws near—which I have not shown to all, but only to you and a few like you.”
    62 And I answered and said, “See now, Lord,
    63 you have shown me the multitude of the signs that you will begin to do in the last times, but you have not shown me at what time.”
