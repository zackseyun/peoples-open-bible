  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: llegada cercana, reacción de terror, caída postrada, exhortación a entender y referencia temporal de la visión. Sin embargo, dos puntos requieren ajuste: el anclaje de las notas no corresponde al contenido de las notas, y «a donde yo estaba» debilita el matiz explícito de proximidad de אֵצֶל.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «caí sobre mi rostro» suena demasiado calcado; «caí rostro en tierra» o «caí de bruces» sería más natural. También conviene explicitar la cercanía en «se acercó cerca de donde yo estaba» o reformular para evitar perder el valor de proximidad. Las notas deben alinearse con los lugares correctos del texto.
  glossary_alignment: No hay términos del glosario principal en juego salvo la preservación de «hijo de hombre», que está bien documentada y debe mantenerse en el texto principal. La decisión sobre «tiempo del fin» también está alineada con la auditoría inglesa. El problema principal es de fidelidad fina y de manejo de notas, no de terminología doctrinal.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «estaba», pero su contenido trata la expresión de proximidad completa.
    rationale: La nota inglesa para אֵצֶל עָמְדִי documenta alternativas para toda la frase «near where I was standing», no para «estaba» aislado. En español el anclaje debe ir en la frase relevante.
  - severity: medium
    issue: La nota [b] está anclada en «hombre», pero el contenido correcto corresponde a «hijo de hombre».
    rationale: La nota explica alternativas de בֶּן אָדָם como unidad léxica. El marcador debe ir en la expresión completa o en un punto que claramente la represente.
  - severity: medium
    issue: «A donde yo estaba» no preserva suficientemente el matiz de cercanía de אֵצֶל.
    rationale: El hebreo expresa aproximación a un lugar cercano/beside where Daniel was standing. «A donde yo estaba» comunica solo destino, no proximidad.
  - severity: low
    issue: «Caí sobre mi rostro» suena poco idiomático en español contemporáneo.
    rationale: Aunque transparente al hebreo, resulta forzado. «Caí rostro en tierra» mantiene la imagen original con mejor legibilidad eclesial general.
