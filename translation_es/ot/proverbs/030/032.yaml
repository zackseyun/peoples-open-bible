translation:
  language: es
  text: Si has obrado neciamente al exaltarte, o si has tramado[a], pon la mano sobre tu boca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has ideado» o «has maquinado». El verbo hebreo puede significar tramar o planear, a menudo con matiz negativo en contextos sapienciales.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mano a la boca», un modismo que significa dejar de hablar o refrenarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבַלְתָּ
  english_pob_choice: have acted foolishly
  chosen_spanish: has obrado neciamente
  alternatives_spanish:
  - has actuado neciamente
  - has sido necio
  - has obrado como necio
  lexicon: HALOT
  rationale: נבל puede expresar conducta necia o vergonzosa; en Proverbios, 'obrado neciamente' conserva el sentido moral de conducta insensata sin reducirlo a mera falta de inteligencia.
- source_word: בְהִתְנַשֵּׂא
  english_pob_choice: by exalting yourself
  chosen_spanish: al ensalzarte
  alternatives_spanish:
  - al exaltarte
  - cuando te ensalzas
  - en ensalzarte
  lexicon: HALOT
  rationale: El hitpael de נשׂא aquí es reflexivo y apunta a elevarse a sí mismo. 'Al ensalzarte' comunica la acción de autoexaltación con naturalidad en español.
- source_word: זַמּוֹתָ
  english_pob_choice: have plotted
  chosen_spanish: has tramado
  alternatives_spanish:
  - has maquinado
  - has ideado
  - has planeado
  lexicon: HALOT
  rationale: זמם puede significar idear, tramar o maquinar. Dado que el texto hebreo no explicita un objeto, se evita añadir 'mal' o 'maldad' y se conserva el valor de planear/tramar con posible carga negativa implícita.
- source_word: יָד לְפֶה
  english_pob_choice: put your hand over your mouth
  chosen_spanish: pon la mano sobre tu boca
  alternatives_spanish:
  - pon la mano sobre la boca
  - pon tu mano sobre tu boca
  - pon la mano en tu boca
  lexicon: HALOT
  rationale: El hebreo es un modismo de silencio o contención. 'Pon la mano sobre tu boca' preserva la imagen concreta y su sentido idiomático de callar o refrenarse.
- source_word: אִם ... וְאִם
  english_pob_choice: If ... or if
  chosen_spanish: Si ... o si
  alternatives_spanish:
  - Si ... y si
  - Si ... o bien si
  lexicon: HALOT
  rationale: La construcción condicional doble presenta dos casos alternativos. 'Si ... o si' reproduce el contraste natural del hebreo sin forzar una coordinación literal.
translation_notes:
  revision_awareness: El auditorio inglés retiró 'evil' porque no está explícito en el hebreo; la versión española sigue esa revisión y conserva solo 'has tramado', sin añadir objeto negativo. También se mantuvo el valor idiomático de 'hand to mouth' como un gesto de silencio, reflejado en 'pon la mano sobre tu boca'.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se emplea 'neciamente' para נבל, manteniendo el tono sapiencial sin imponer 'vergonzosamente' como lectura principal.
  - '''Tramado'' evita introducir un objeto que el hebreo no expresa.'
  - La forma con 'pon' conserva el imperativo directo y proverbial.
  - La puntuación separa bien las dos cláusulas condicionales y la exhortación final.
