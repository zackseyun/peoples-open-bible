translation:
  language: es
  text: Y Nabucodonosor se llenó de gran ira contra toda esta tierra, y juró por su trono y por su reino que ciertamente tomaría venganza de todos los territorios de Cilicia, de Damasco y de Siria[a], pasándolos a espada, y también de todos los que habitaban en Moab, de los hijos de Amón, de toda Idumea y de todos los que estaban en Egipto[b], hasta llegar a los confines de los dos mares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'si no se venga de' o 'a menos que se vengue de'; en esta fórmula de juramento, el griego expresa una resolución jurada enfática más que una simple condición negativa.
    reason: lexical_alternative
  - marker: b
    text: '''Los dos mares'' probablemente se refiere a la extensión completa de la región en vista, señalada por sus mares limítrofes.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐθυμώθη
  english_pob_choice: became very angry
  chosen_spanish: se llenó de gran ira
  alternatives_spanish:
  - se irritó muchísimo
  - se enfureció mucho
  lexicon: LSJ
  rationale: El griego expresa que Nabucodonosor fue movido a ira; en español, 'se llenó de gran ira' conserva la intensidad sin sonar mecánico.
- source_word: σφόδρα
  english_pob_choice: very
  chosen_spanish: gran
  alternatives_spanish:
  - muy
  - extrema
  lexicon: LSJ
  rationale: La intensificación ya queda incorporada en 'gran ira'; así se evita una repetición pesada y se mantiene la fuerza del adverbio.
- source_word: κατὰ τοῦ θρόνου καὶ τῆς βασιλείας αὐτοῦ
  english_pob_choice: by his throne and his kingdom
  chosen_spanish: por su trono y por su reino
  alternatives_spanish:
  - contra su trono y su reino
  - ante su trono y su reino
  lexicon: LSJ
  rationale: Con jurar, κατά introduce el objeto por el cual se jura; 'por' refleja mejor el valor juramentario que 'contra' en español.
- source_word: εἰ μὴ ἐκδικήσει
  english_pob_choice: that he would surely take vengeance on
  chosen_spanish: que ciertamente tomaría venganza de
  alternatives_spanish:
  - que sin duda vengaría
  - que vengaría seguramente de
  lexicon: LSJ
  rationale: La fórmula de juramento no debe leerse como condicional simple. 'Ciertamente tomaría venganza de' conserva el tono solemne y la resolución jurada.
- source_word: ἐκδικήσει
  english_pob_choice: take vengeance on
  chosen_spanish: tomaría venganza de
  alternatives_spanish:
  - se vengaría de
  - ejecutaría venganza sobre
  lexicon: LSJ
  rationale: Aquí el sentido es retaliatorio y hostil; 'tomar venganza de' es una fórmula natural en español que preserva la violencia del verbo.
- source_word: τὰ ὅρια
  english_pob_choice: the territories
  chosen_spanish: los territorios
  alternatives_spanish:
  - los confines
  - las regiones
  lexicon: LSJ
  rationale: Aunque literalmente son 'límites/bordes', el contexto geopolítico pide 'territorios' para comunicar bien el alcance de la amenaza.
- source_word: Κιλικίας καὶ Δαμασκηνῆς καὶ Συρίας
  english_pob_choice: Cilicia and Damascus and Syria
  chosen_spanish: Cilicia y de Damasco y de Siria
  alternatives_spanish:
  - Cilicia, Damasco y Siria
  - Cilicia y la región de Damasco y Siria
  lexicon: LSJ
  rationale: Se conserva la secuencia de nombres propios del griego. 'Damasco' se mantiene como nombre geográfico representado en el texto.
- source_word: ἀνελεῖν τῇ ῥομφαίᾳ
  english_pob_choice: put them to the sword
  chosen_spanish: pasándolos a espada
  alternatives_spanish:
  - matándolos a espada
  - destruyéndolos a espada
  lexicon: LSJ
  rationale: La expresión idiomática española 'pasar a espada' comunica con claridad la brutalidad militar del giro griego.
- source_word: τοὺς υἱοὺς Ἀμμών
  english_pob_choice: the Ammonites
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Ammón
  lexicon: LSJ
  rationale: Se conserva la forma semítica del griego 'los hijos de Amón', que puede ser más transparente para una traducción fuente-cercana que el etnónimo usual.
- source_word: Ἰδουμαίαν
  english_pob_choice: Idumea
  chosen_spanish: Idumea
  alternatives_spanish:
  - Edom
  lexicon: LSJ
  rationale: La forma griega es Ἰδουμαία; 'Idumea' respeta más directamente el testimonio helenizado que sustituirlo por 'Edom'.
- source_word: ἕως τοῦ ἐλθεῖν ἐπὶ τὰ ὅρια τῶν δύο θαλασσῶν
  english_pob_choice: until he came to the borders of the two seas
  chosen_spanish: hasta llegar a los confines de los dos mares
  alternatives_spanish:
  - hasta que llegara a los bordes de los dos mares
  - hasta los confines de los dos mares
  lexicon: LSJ
  rationale: La construcción expresa extensión territorial; 'hasta llegar a' mantiene el valor de límite y evita forzar un sujeto explícito donde el griego no lo marca de forma directa.
theological_decisions:
- issue: Fórmula de juramento con εἰ μὴ después de ὤμοσεν
  english_pob_reading: Rendered as emphatic oath content, not as a literal negative conditional.
  chosen_spanish_reading: Se traduce como contenido jurado enfático ('que ciertamente tomaría venganza de'), no como condicional negativo.
  alternative_spanish_readings:
  - a menos que tomara venganza de
  - si no tomara venganza de
  rationale: La frase griega funciona como fórmula de juramento; traducirla como condicional simple alteraría el sentido. La versión española conserva la fuerza retórica del juramento.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés: conserva el sentido juramentario de εἰ μὴ, refleja el infinitivo ἀνελεῖν con una construcción verbal en español, y expresa el movimiento territorial hasta el límite marcado por los dos mares.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no hay ocurrencia.
  - Se evitó 'Cristo/Mesías' porque no pertenece al pasaje.
  - Se prefirió 'Idumea' para concordar con la forma griega helenizada.
  - Se usó 'a espada' como equivalente idiomático de la violencia militar del original.
  - Se conservaron nombres propios y etnónimos sin modernizarlos más allá de lo que exige el español lector público.
