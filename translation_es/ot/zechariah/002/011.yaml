review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro inglés en lo esencial: הוֹי como llamado urgente, הִמָּלְטִי como mandato de escapar, y el participio vocativo ''tú que habitas''. Sin embargo, ''con la Hija Babilonia'' no refleja bien בַּת בָּבֶל ni la nota alternativa inglesa, que contrasta ''with Daughter Babylon'' y ''in the daughter of Babylon''. En español, ''con'' sugiere compañía más que localización/asociación y debilita la personificación profética.'
  spanish_quality_summary: 'El español es legible, pero ''¡Arriba, Sion!'' suena algo mecánico; aun así puede tolerarse por cercanía al audit trail. El problema principal es ''la Hija Babilonia'', que resulta poco idiomático en español bíblico actual. ''Hija de Babilonia'' preserva la personificación y suena natural y digno. También conviene limpiar la nota: no debe llevar el ancla [a] dentro del contenido de la nota, y debe reflejar una alternativa española clara.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Sion' es aceptable en español bíblico. No aparecen términos sensibles como Yahvé/Mesías. La decisión clave es mantener la personificación de בַּת בָּבֶל de forma natural en español, mejor como 'Hija de Babilonia' que como 'Hija Babilonia'.
  issues:
  - severity: high
    issue: La frase 'con la Hija Babilonia' no representa bien בַּת בָּבֶל en este contexto.
    rationale: El hebreo expresa la personificación 'Hija de Babilonia' y la POB inglesa deja una tensión entre asociación ('with') y localización ('in the daughter of Babylon'). En español, 'con' no comunica bien esa relación y puede sonar a mera compañía.
  - severity: medium
    issue: '''la Hija Babilonia'' es poco natural en español.'
    rationale: Aunque intenta calcar 'Daughter Babylon', en español eclesial y literario la forma idiomática y fiel es 'Hija de Babilonia', que preserva la personificación sin rigidez extraña.
  - severity: low
    issue: La nota al pie incluye '[a]' dentro del texto citado.
    rationale: Los marcadores deben anclarse en el texto principal, no repetirse dentro del contenido de la nota.
  revised_spanish_text: ¡Arriba, Sion[a]! Escapa, tú que habitas en la Hija de Babilonia.
  revised_footnotes:
