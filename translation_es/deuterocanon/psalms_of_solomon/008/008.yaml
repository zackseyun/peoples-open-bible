review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: «Dios expuso sus pecados» corresponde adecuadamente a ἀνεκάλυψεν ... τὰς ἁμαρτίας αὐτῶν; «ante el sol» preserva la imagen literal y pública de ἐναντίον τοῦ ἡλίου; y «toda la tierra llegó a conocer» transmite bien el valor resultativo de ἔγνω πᾶσα ἡ γῆ. «Los juicios justos de Dios» es una buena representación de τὰ κρίματα τοῦ θεοῦ τὰ δίκαια.'
  spanish_quality_summary: 'El texto es claro, natural y digno en español. La única reparación necesaria es la nota al pie: el inglés documenta como alternativa «just judgments», por lo que en español la alternativa correspondiente a «justos» no es «rectos» como única opción preferente, sino mejor «justos»/«rectos» según la elección principal. Si el texto principal conserva «juicios justos», la nota debe ofrecer una alternativa más exacta al matiz inglés, aquí «O «juicios rectos»».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «pecados», «juicios» y «justos» están bien alineados. La decisión sobre δίκαια está correctamente dentro del campo «justicia/rectitud»; solo conviene afinar la formulación de la nota para que corresponda al sintagma completo y no solo a un adjetivo aislado.
  issues:
  - severity: medium
    issue: La nota al pie «O «rectos»» está incompleta y poco precisa.
    rationale: La nota inglesa ofrece una alternativa para la frase «righteous judgments» / «just judgments», no meramente para el adjetivo suelto. En español, anclarla al sintagma completo evita ambigüedad y refleja mejor la decisión léxica documentada.
  revised_spanish_text: Dios expuso sus pecados ante el sol[a]; toda la tierra llegó a conocer los juicios justos de Dios.
  revised_footnotes:
  - marker: a
    text: O «juicios rectos».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse tal como está porque es fiel al griego y suena natural en español. Se revisa únicamente la nota al pie para que represente con precisión la alternativa léxica documentada para τὰ δίκαια aplicado a κρίματα, expresándola como sintagma completo en español.
