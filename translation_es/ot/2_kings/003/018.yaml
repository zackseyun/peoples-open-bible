  rationale: Se corrige el singular «tu mano» al plural «sus manos» para reflejar fielmente בְּיֶדְכֶם. Se mejora la naturalidad del modismo con «a los ojos de Yahvé» y se sustituye «algo pequeño» por «poca cosa», que transmite mejor el valor evaluativo de נקל en español bíblico natural. La nota alternativa se conserva y se armoniza con la nueva redacción.
