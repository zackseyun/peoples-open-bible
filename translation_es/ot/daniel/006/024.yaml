  text: בֵּ/אדַ֣יִן מַלְכָּ֗/א שַׂגִּיא֙ טְאֵ֣ב עֲל֔וֹ/הִי וּ/לְ/דָ֣נִיֵּ֔אל אֲמַ֖ר לְ/הַנְסָקָ֣ה מִן גֻּבָּ֑/א וְ/הֻסַּ֨ק דָּנִיֵּ֜אל מִן גֻּבָּ֗/א וְ/כָל חֲבָל֙ לָא הִשְׁתְּכַ֣ח בֵּ֔/הּ דִּ֖י הֵימִ֥ן בֵּ/אלָהֵֽ/הּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/024.yaml
  text: Then the king was very glad because of him[a], and he ordered that Daniel be brought up from the pit. So Daniel was brought up from the pit, and no kind of harm was found on him[b], because he had trusted in his God.
  footnotes:
  - marker: a
    text: Or 'from the den.' The Aramaic noun denotes a pit-like enclosure; in this context it is the lions' den.
    reason: lexical_alternative
  - marker: b
    text: Or 'because he had believed his God.' The verb can mean 'trust' or 'believe'; 'trusted' was chosen here to emphasize personal reliance in context.
    reason: lexical_alternative
