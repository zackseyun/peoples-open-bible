translation:
  language: es
  text: Mil huiréis ante la reprensión de uno; ante la reprensión de cinco huiréis, hasta que quedéis como un poste de señal[a] en la cima de un monte, y como un estandarte[b] sobre una colina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “como un mástil en la cima de un monte”. El hebreo תֹּרֶן puede referirse a un mástil o a un poste alto.
    reason: lexical_alternative
  - marker: b
    text: O “como un estandarte de señal sobre una colina”. El hebreo נֵס designa una bandera o estandarte elevado usado como señal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף אֶחָד
  english_pob_choice: A thousand
  chosen_spanish: Mil
  alternatives_spanish:
  - Un millar
  - Mil uno
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y corresponde naturalmente a la cifra redonda “mil”. En español, “mil” conserva la fuerza del contraste retórico sin sonar artificial.
- source_word: מִפְּנֵי
  english_pob_choice: at
  chosen_spanish: ante
  alternatives_spanish:
  - por causa de
  - delante de
  lexicon: HALOT
  rationale: La preposición expresa la idea de reacción o huida provocada por la reprensión. “Ante” comunica bien la relación de temor/cobardía en español bíblico moderno.
- source_word: גַּעֲרַת
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - regaño
  - reprendido
  lexicon: HALOT
  rationale: “Reprensión” preserva el valor semántico de גערה como reproche amenazante o censura severa. “Rebuke” en inglés puede sonar más jurídico; en español “reprensión” es natural y digno.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un solo hombre
  - uno solo
  lexicon: HALOT
  rationale: La contraposición retórica entre “uno” y “cinco” se mantiene con el numeral simple, sin añadir explicaciones interpretativas.
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco hombres
  lexicon: HALOT
  rationale: Numeral directo; conserva el escalamiento de la amenaza sin glosa innecesaria.
- source_word: תָּנֻסוּ
  english_pob_choice: you will flee
  chosen_spanish: huiréis
  alternatives_spanish:
  - huirán
  - saldréis huyendo
  lexicon: HALOT
  rationale: El verbo plural de segunda persona transmite la acción de huir. “Huiréis” suena más sobrio y bíblico, manteniendo claridad en español.
- source_word: עַד אִם
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el punto de que
  lexicon: HALOT
  rationale: La combinación introduce un límite de resultado. “Hasta que” refleja bien el valor de terminación del hebreo y enlaza con la cláusula siguiente.
- source_word: נוֹתַרְתֶּם
  english_pob_choice: you are left
  chosen_spanish: quedéis
  alternatives_spanish:
  - quedéis restantes
  - quedéis como los que quedan
  lexicon: HALOT
  rationale: El niphal de יתר/נותר indica quedar como remanente. En español, “quedéis” comunica la idea de ser dejados atrás; el contexto y la similitud siguiente completan el sentido de remanente.
- source_word: כַּתֹּרֶן
  english_pob_choice: like a signal pole
  chosen_spanish: como un mástil
  alternatives_spanish:
  - como un poste
  - como un asta
  lexicon: HALOT
  rationale: El hebreo puede referirse a mástil o poste alto. Dado el paralelismo con נֵס y el uso habitual de “mástil” para una pieza alta y aislada, esta opción conserva el posible sentido náutico/vertical sin forzar demasiado.
- source_word: עַל רֹאשׁ הָהָר
  english_pob_choice: on the top of a mountain
  chosen_spanish: en la cima de un monte
  alternatives_spanish:
  - sobre la cumbre del monte
  - en la cima del monte
  lexicon: HALOT
  rationale: “Cima de un monte” es claro y fluido en español. Mantiene la imagen de elevación visible y aislada.
- source_word: וְכַנֵּס
  english_pob_choice: and like a banner
  chosen_spanish: y como un estandarte
  alternatives_spanish:
  - y como una bandera
  - y como una señal
  lexicon: HALOT
  rationale: נֵס es un estandarte o señal elevada. “Estandarte” preserva la dignidad del término y su función de señal visible.
- source_word: עַל הַגִּבְעָה
  english_pob_choice: on a hill
  chosen_spanish: sobre una colina
  alternatives_spanish:
  - en una colina
  - sobre el collado
  lexicon: HALOT
  rationale: “Colina” es el equivalente natural de גבעה y conserva el contraste con “monte” en la primera imagen.
theological_decisions:
- issue: Sentido de la imagen final de aislamiento y señal
  english_pob_reading: The image depicts extreme isolation and exposed remnant-status after defeat.
  chosen_spanish_reading: La imagen sugiere quedar reducido a un remanente visible, solo y expuesto tras la derrota.
  alternative_spanish_readings:
  - La imagen solo indica visibilidad como señal de advertencia.
  - La imagen solo expresa pequeñez o fragilidad.
  rationale: El paralelismo entre mástil/estandarte en lugares altos comunica tanto visibilidad como soledad y vulnerabilidad. La traducción preserva esa tensión sin resolverla en una sola idea.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador se mantiene en alta concordancia con el texto fuente y con el audit trail inglés; no se identificaron revisiones sustantivas pendientes. Se conservó el paralelismo poético y la ambigüedad léxica de תֹּרֶן y נֵס mediante notas alternativas.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - 'Se eligieron términos sobrios y bíblicos en español moderno: “reprensión”, “mástil”, “estandarte”, “colina”.'
  - Se mantuvo el paralelismo de dos miembros con repetición de “como”, reflejando la estructura hebrea.
  - El tratamiento verbal en segunda persona plural (“huiréis”, “quedéis”) conserva la interpelación directa al pueblo.
