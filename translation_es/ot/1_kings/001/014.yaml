translation:
  language: es
  text: Mira[a], mientras todavía estás hablando allí con el rey, entraré después de ti y confirmaré tus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «completaré tus palabras»; más literalmente, «llenaré tus palabras». El modismo hebreo puede significar añadir detalles que confirman lo que otra persona ha dicho.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - Atención
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre el momento oportuno de la acción. «Mira» comunica la inmediatez en un español natural y sobrio, sin el tono arcaizante de «He aquí».
- source_word: עוֹדָךְ
  english_pob_choice: while you are still
  chosen_spanish: mientras todavía estás
  alternatives_spanish:
  - aún estás
  - todavía estás
  lexicon: HALOT
  rationale: El sufijo de 2ª femenino singular con el adverbio expresa continuidad simultánea. «Mientras todavía estás» preserva el valor progresivo de la escena y evita una construcción extraña en español.
- source_word: מְדַבֶּרֶת
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - diciendo
  - conversando
  lexicon: HALOT
  rationale: El participio indica acción en curso. En este contexto cortesano, «hablando» es natural y no añade matices ajenos al hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: El adverbio locativo se mantiene para reflejar la escena concreta ante el rey. «Allí» suena más formal y estable en registro bíblico.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - ante el rey
  - delante del rey
  lexicon: HALOT
  rationale: עִם significa básicamente «con». Aunque el contexto implica hablar en presencia del rey, «con el rey» conserva la relación expresada por el hebreo sin forzar una paráfrasis interpretativa.
- source_word: וַאֲנִי אָבוֹא אַחֲרַיִךְ
  english_pob_choice: I will come in after you
  chosen_spanish: yo entraré después de ti
  alternatives_spanish:
  - iré después de ti
  - entraré tras de ti
  lexicon: HALOT
  rationale: בוא en este marco palaciego puede implicar entrar en la presencia del rey. «Entraré después de ti» mantiene ese movimiento sin sobreexplicar «en»; el orden natural del español hace innecesario añadir «yo» salvo por énfasis de contraste.
- source_word: וּמִלֵּאתִי אֶת דְּבָרָיִךְ
  english_pob_choice: confirm your words
  chosen_spanish: confirmaré tus palabras
  alternatives_spanish:
  - completaré tus palabras
  - llenaré tus palabras
  - respaldaré tus palabras
  lexicon: HALOT
  rationale: El hebreo tiene la idea idiomática de «llenar/completar» las palabras de otro, es decir, añadir corroboración. «Confirmaré» expresa bien esa función pragmática en español y conserva la tensión lexical entre completar y ratificar.
theological_decisions:
- issue: El valor idiomático de «llenar/completar» frente a «confirmar» en la intervención de Natán
  english_pob_reading: confirm your words
  chosen_spanish_reading: confirmaré tus palabras
  alternative_spanish_readings:
  - completaré tus palabras
  - respaldaré tus palabras
  rationale: 'No hay una doctrina en juego, pero sí una decisión hermenéutica: el hebreo no describe mera repetición, sino la adición de un testimonio que valida lo dicho por Betsabé. «Confirmaré» comunica esa corroboración sin borrar el trasfondo idiomático documentado por la POB.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su alta concordancia: no se introdujeron cambios de sentido respecto del original hebreo, solo se trasladó al español la misma decisión lexical principal («confirmar») con una nota que preserva la alternativa idiomática de «completar/llenar».'
  spanish_consistency_notes:
  - Se mantiene el trato en segunda persona singular femenino («estás», «ti», «tus») conforme al sufijo hebreo.
  - Se conservó el adverbio locativo «allí» para no perder la escena cortesana concreta.
  - No se usó «SEÑOR» ni terminología eclesiástica añadida, porque el versículo no contiene el nombre divino ni vocabulario doctrinal específico.
