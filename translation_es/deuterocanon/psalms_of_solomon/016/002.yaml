translation:
  language: es
  text: Cuando estaba lejos de Dios, mi alma[a] estuvo a punto de ser derramada hasta la muerte, cerca de las puertas del Hades[b], con un pecador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi vida estuvo a punto de ser derramada hasta la muerte».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cerca de las puertas del sepulcro» o «cerca de las puertas del reino de los muertos». El griego dice «Hades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ μακρὰν ἀπὸ θεοῦ
  english_pob_choice: When I was far from God
  chosen_spanish: Cuando estaba lejos de Dios
  alternatives_spanish:
  - Mientras estaba lejos de Dios
  - Estando lejos de Dios
  lexicon: LSJ
  rationale: El griego abre con una construcción condensada que funciona de modo circunstancial/temporal. En español, «Cuando estaba lejos de Dios» reproduce ese valor con naturalidad sin añadir información ajena al texto.
- source_word: παρʼ ὀλίγον
  english_pob_choice: almost
  chosen_spanish: a punto de
  alternatives_spanish:
  - casi
  - por poco
  lexicon: LSJ
  rationale: La locución expresa proximidad al resultado sin alcanzarlo. «A punto de» conserva esa idea en español con buen ritmo y tono digno; «casi» también sería posible, pero aquí la formulación elegida armoniza mejor con la imagen pasiva siguiente.
- source_word: ἐξεχύθη ἡ ψυχή μου εἰς θάνατον
  english_pob_choice: my soul was almost poured out to death
  chosen_spanish: mi alma estuvo a punto de ser derramada hasta la muerte
  alternatives_spanish:
  - mi alma casi fue derramada hasta la muerte
  - mi vida estuvo a punto de ser derramada hasta la muerte
  lexicon: LSJ
  rationale: Se conserva la metáfora de «derramar» para ἐκχέω y el sustantivo «alma» para ψυχή, ya que el contexto devocional favorece la interioridad del hablante. «Hasta la muerte» traduce εἰς θάνατον de manera fiel y natural.
- source_word: σύνεγγυς πυλῶν ᾅδου
  english_pob_choice: near the gates of Hades
  chosen_spanish: cerca de las puertas del Hades
  alternatives_spanish:
  - cerca de las puertas del Seol
  - cerca de las puertas del sepulcro
  - cerca de las puertas del reino de los muertos
  lexicon: LSJ
  rationale: Se mantiene «Hades» para preservar el término griego explícito y la imagen espacial de las puertas. «Cerca de» expresa σύνεγγυς sin sobrecargar el verso.
- source_word: μετὰ ἁμαρτωλοῦ
  english_pob_choice: with a sinner
  chosen_spanish: con un pecador
  alternatives_spanish:
  - con el pecador
  - junto a un pecador
  - con el impío
  lexicon: LSJ
  rationale: El singular anartro de ἁμαρτωλοῦ puede funcionar genéricamente como clase. En español, «con un pecador» mantiene la singularidad gramatical sin forzar una definitud que el griego no exige.
theological_decisions:
- issue: Renderización de ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - la muerte
  rationale: Se conserva el término técnico del griego para no diluir la imaginería ni resolverla interpretativamente. Esto mantiene la tensión semántica entre lugar, estado y destino de los muertos.
  doctrine_reference: Principio POB de primacía de la fuente y preservación de tensiones teológicas/lexicales.
- issue: Valor de ψυχή
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: «Alma» refleja el yo interior del orante, coherente con el contexto de súplica y peligro vital. La alternativa «vida» sigue siendo posible, por lo que se preserva la ambigüedad en la nota.
  doctrine_reference: Principio POB de no resolver innecesariamente una ambigüedad léxica cuando la fuente permite más de una lectura.
- issue: Valor genérico de ἁμαρτωλοῦ
  english_pob_reading: with a sinner
  chosen_spanish_reading: con un pecador
  alternative_spanish_readings:
  - con el pecador
  - con un impío
  rationale: El singular del griego puede señalar una categoría representativa, no un individuo específico. «Con un pecador» respeta la forma gramatical y deja abierta la lectura genérica sin imponer una determinación que el texto no da.
  doctrine_reference: Principio POB de conservar el alcance semántico del original y su posible trasfondo semítico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y el expediente inglés POB. Se preservan la metáfora de «derramar» para ἐκχέω, el término «Hades» para ᾅδης y la singularidad genérica de ἁμαρτωλοῦ, incorporando además la preferencia revisada por evitar una definitud excesiva en la frase final. La reordenación española busca fluidez sin perder la secuencia semántica del original.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se conserva «Hades» como término técnico, sin sustituirlo por un equivalente interpretativo en el cuerpo del texto.
  - «Alma» se mantiene para ψυχή en consonancia con la elección inglesa y con el tono orante del pasaje.
  - La expresión «a punto de» traduce el valor aspectual de παρʼ ὀλίγον sin intensificar indebidamente el sentido.
  - «Con un pecador» refleja la singularidad del griego y evita una definitud que el texto no exige.
