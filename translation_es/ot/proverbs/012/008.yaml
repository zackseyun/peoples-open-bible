translation:
  language: es
  text: Según su discernimiento,[a] el hombre es alabado, pero el de corazón torcido[b] será objeto de desprecio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en proporción a su prudencia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «torcido de corazón», un modismo para una disposición interior moralmente desviada.'
    reason: cultural_note
lexical_decisions:
- source_word: לְפִי
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - en proporción a
  lexicon: HALOT
  rationale: La expresión marca medida o norma de evaluación. «Según» conserva ese valor comparativo de manera natural en español y evita una paráfrasis más pesada.
- source_word: שִׂכְלוֹ
  english_pob_choice: his insight
  chosen_spanish: su discernimiento
  alternatives_spanish:
  - su prudencia
  - su entendimiento
  - su sabiduría práctica
  lexicon: HALOT
  rationale: El hebreo puede referir a perspicacia, buen juicio o prudencia. «Discernimiento» preserva el componente intelectual y práctico sin estrechar el sentido a una sola faceta.
- source_word: יְהֻלַּל
  english_pob_choice: is praised
  chosen_spanish: es alabado
  alternatives_spanish:
  - será alabado
  - es elogiado
  lexicon: HALOT
  rationale: El pasivo expresa una afirmación proverbial general. «Es alabado» funciona en español como presente gnómico y mantiene el carácter de verdad general.
- source_word: אִישׁ
  english_pob_choice: A man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular pero con valor genérico. «El hombre» reproduce esa forma representativa sin forzar una paráfrasis neutralizante.
- source_word: נַעֲוֵה
  english_pob_choice: twisted
  chosen_spanish: torcido
  alternatives_spanish:
  - perverso
  - desviado
  - corrupto
  lexicon: HALOT
  rationale: El adjetivo describe una desviación moral del interior. «Torcido» conserva la imagen espacial/metafórica de lo que no está recto.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: En la antropología hebrea, לֵב incluye pensamiento, voluntad y disposición interna. «Corazón» mantiene el idiomático bíblico en español sin reducirlo a emoción.
- source_word: יִהְיֶה לָבוּז
  english_pob_choice: will be despised
  chosen_spanish: será objeto de desprecio
  alternatives_spanish:
  - será despreciado
  - quedará en desprecio
  - será tenido en menos
  lexicon: HALOT
  rationale: La construcción expresa convertirse en objeto de escarnio o desprecio. «Será objeto de desprecio» refleja bien el resultado sin perder la fuerza relacional del hebreo.
theological_decisions:
- issue: Valor proverbial del verbo pasivo
  english_pob_reading: The present passive in English expresses a general truth rather than a strictly future event.
  chosen_spanish_reading: El presente gnómico («es alabado») comunica una verdad general, no un momento puntual del futuro.
  alternative_spanish_readings:
  - será alabado
  - suele ser alabado
  rationale: En proverbios, el hebreo imperfecto puede presentar una generalidad sapiencial. El presente español es más natural y conserva ese valor gnómico.
  doctrine_reference: Sabiduría bíblica / aspecto verbal en literatura proverbial
- issue: Corazón torcido como disposición moral
  english_pob_reading: Hebrew 'twisted of heart,' an idiom for a morally crooked inner disposition.
  chosen_spanish_reading: «Corazón torcido» se entiende como una disposición interior moralmente torcida, no solo como un estado emocional.
  alternative_spanish_readings:
  - mente torcida
  - interior torcido
  - corazón perverso
  rationale: «Corazón torcido» respeta el hebraísmo y permite que la nota explique su alcance moral. «Perverso» intensificaría el juicio, pero perdería la imagen de torsión.
  doctrine_reference: Antropología bíblica / idiomatismo hebreo
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB y el hebreo masorético, sin cambios relevantes respecto de la decisión de traducción ya revisada; la versión inglesa vigente expresa bien el paralelismo sapiencial y se mantiene la misma lectura general en español.
  spanish_consistency_notes:
  - Se conservó el paralelismo antitético con dos cláusulas breves, adecuado al estilo proverbial.
  - Se prefirió «discernimiento» por su amplitud semántica y por sonar natural en español bíblico contemporáneo.
  - «Corazón» se mantiene como centro antropológico bíblico, en continuidad con el uso estable de POB para לֵב.
  - No se usó «SEÑOR» ni terminología eclesiástica añadida, pues el versículo no contiene el Tetragrámaton ni títulos cristológicos.
