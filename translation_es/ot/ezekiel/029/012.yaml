translation:
  language: es
  text: Y haré la tierra de Egipto una desolación en medio de tierras desoladas[a], y sus ciudades serán una desolación en medio de ciudades arruinadas durante cuarenta años[b]; y esparciré a los egipcios entre las naciones y los dispersaré por las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre tierras devastadas»; el hebreo usa términos estrechamente relacionados para desolación y ruina en cláusulas paralelas.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, los habitantes de Egipto; el hebreo dice primero «Egipto» y luego pasa a un plural referido a ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - pondré
  - haré de
  lexicon: HALOT
  rationale: נתן en esta construcción con un complemento de estado expresa hacer que algo llegue a ser una condición; en español, "haré" transmite con naturalidad la fuerza causativa sin perder el valor de 'poner/establecer' implícito en el hebreo.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tierra de Egipto', no solo el nombre propio. Mantener 'la tierra' conserva el énfasis territorial del oráculo de juicio.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  - una ruina
  lexicon: HALOT
  rationale: El sustantivo comunica un estado de devastación. "Una desolación" conserva la forma nominal y la intensidad del término hebreo.
- source_word: בְּתוֹךְ אֲרָצוֹת נְשַׁמּוֹת
  english_pob_choice: in the midst of desolated lands
  chosen_spanish: en medio de tierras desoladas
  alternatives_spanish:
  - entre tierras desoladas
  - en medio de tierras devastadas
  lexicon: HALOT
  rationale: בְּתוֹךְ indica ubicación comparativa o relacional; "en medio de" reproduce bien esa relación. "Tierras desoladas" mantiene el matiz del participio hebreo נְשַׁמּוֹת.
- source_word: וְעָרֶיהָ
  english_pob_choice: and her cities
  chosen_spanish: y sus ciudades
  alternatives_spanish:
  - y sus urbes
  - y las ciudades de ella
  lexicon: HALOT
  rationale: En español, "sus ciudades" resulta natural y conserva el referente femenino implícito de la tierra/nación sin forzar una personificación extraña.
- source_word: בְּתוֹךְ עָרִים מָחֳרָבוֹת
  english_pob_choice: in the midst of ruined cities
  chosen_spanish: en medio de ciudades arruinadas
  alternatives_spanish:
  - entre ciudades arruinadas
  - en medio de ciudades devastadas
  lexicon: HALOT
  rationale: מָחֳרָבוֹת describe ciudades arrasadas o arruinadas. "Arruinadas" es claro y mantiene el paralelismo con "desoladas" sin repetir exactamente el mismo término.
- source_word: תִּהְיֶיןָ שְׁמָמָה
  english_pob_choice: will be a desolation
  chosen_spanish: estarán una desolación
  alternatives_spanish:
  - serán una desolación
  - quedarán desoladas
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante; "estarán una desolación" conserva la estructura nominal y comunica el estado duradero del juicio.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  - cuarenta años
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma directa y formal en español con "por cuarenta años".
- source_word: וַהֲפִצֹתִי
  english_pob_choice: and I will scatter
  chosen_spanish: esparciré
  alternatives_spanish:
  - dispersaré
  - scatteré
  lexicon: HALOT
  rationale: El verbo causativo de פוץ comunica dispersión forzada. "Esparciré" es natural en español bíblico actual y conserva el sentido de dispersar ampliamente.
- source_word: אֶת מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: a los egipcios
  alternatives_spanish:
  - a Egipto
  - a los habitantes de Egipto
  lexicon: HALOT
  rationale: Aunque el hebreo usa el nombre territorial, el contexto y la forma pronominal siguiente indican a la gente de Egipto. Traducir "a los egipcios" evita una metonimia opaca en español y hace explícito el referente humano.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: '"Naciones" es la equivalencia habitual para גּוֹיִם en contextos proféticos de juicio. "Entre" comunica la dispersión en medio de otros pueblos.'
- source_word: וְזֵרִיתִים
  english_pob_choice: and disperse them
  chosen_spanish: y los dispersaré
  alternatives_spanish:
  - y los esparciré
  - y los aventaré
  lexicon: HALOT
  rationale: זרה puede sugerir dispersar o aventar. "Los dispersaré" mantiene la paralela con "esparciré" y refleja claramente la distribución forzada por distintos territorios.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - entre las tierras
  - por los países
  lexicon: HALOT
  rationale: El plural con preposición expresa distribución amplia en diversos territorios. "Por las tierras" preserva esa amplitud sin introducir una precisión geopolítica ajena al hebreo.
theological_decisions:
- issue: Referencia de 'Egipto' en la cláusula de dispersión
  english_pob_reading: Retain 'Egypt' in the main text while allowing the following plural pronoun 'them' to indicate the people of Egypt are being scattered.
  chosen_spanish_reading: Traducir explícitamente 'a los egipcios' y luego 'los dispersaré' para hacer visible el cambio del territorio a sus habitantes.
  alternative_spanish_readings:
  - esparciré a Egipto
  - esparciré la tierra de Egipto
  rationale: El hebreo pasa del nombre territorial al objeto plural. En español, la referencia humana es más clara si se explicita; así se evita que la lectura suene como si se dispersara una tierra física.
  doctrine_reference: Metonimia territorial por sus habitantes; coherencia pronominal del texto profético.
translation_notes:
  revision_awareness: He seguido el ajuste del audit trail que refuerza בְּתוֹךְ como 'en medio de' y hace explícita la referencia humana en la cláusula de dispersión. También he conservado el paralelismo semántico entre 'desolación' y 'arruinadas' sin borrar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca aquí, sino conforme al estándar del proyecto cuando corresponda; en este versículo no hay tetragrámaton.
  - Mantuve el tono profético formal y la estructura paralela del hebreo.
  - Evité 'SEÑOR' y otras máscaras tradicionales porque el texto fuente no las requiere aquí.
  - '''Egipto'' queda como tierra en la primera cláusula y como personas en la segunda, pero el español resuelve la metonimia de manera explícita para mejor claridad.'
