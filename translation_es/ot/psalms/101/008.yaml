revisions:
- from: Mañana tras mañana destruiré[a] a todos los impíos de la tierra[b], para eliminar de la ciudad de Yahvé a todos los que hacen iniquidad.
  to: Mañana tras mañana destruiré[a] a todos los impíos del país[b], para eliminar de la ciudad de Yahvé a todos los que practican la iniquidad.
  rationale: Se ajusta אָרֶץ a «país» para seguir la decisión contextual auditada de «land», se corrige la nota de אַצְמִית para evitar una alternativa inexacta, y se mejora levemente la naturalidad/precisión moral de la última frase con «practican la iniquidad».
