translation:
  language: es
  text: Nombrarás jueces y funcionarios para ti en todas tus puertas[a] que Yahvé tu Dios te da, según tus tribus; y ellos juzgarán al pueblo con juicio justo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘dentro de todas tus ciudades’; literalmente, ‘en todas tus puertas’, refiriéndose a las áreas de la puerta que funcionaban como centros cívicos y judiciales.
    reason: cultural_note
  - marker: b
    text: O ‘con un juicio de justicia’ o ‘con juicio recto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  lexicon: HALOT
  rationale: El término designa a quienes emiten decisiones judiciales. 'Jueces' es el equivalente español más claro y directo en este contexto legal-administrativo.
- source_word: וְשֹׁטְרִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - funcionarios
  - alguaciles
  lexicon: HALOT
  rationale: La palabra apunta a agentes administrativos vinculados al gobierno judicial. 'Oficiales' conserva el sentido institucional sin precisar indebidamente su función exacta.
- source_word: תִּתֶּן
  english_pob_choice: you shall appoint
  chosen_spanish: establecerás
  alternatives_spanish:
  - nombrarás
  - pondrás
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'dar/poner', en este contexto se refiere a instituir personas en un cargo. 'Establecerás' transmite bien la acción de ponerlos en funciones con naturalidad en español.
- source_word: בְּכָל שְׁעָרֶיךָ
  english_pob_choice: in all your gates
  chosen_spanish: en todas tus puertas
  alternatives_spanish:
  - en todas tus ciudades
  - dentro de todas tus puertas
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'puertas'. El inglés POB retuvo 'gates' por el valor cívico-judicial de las puertas de la ciudad; en español, 'puertas' comunica esa imagen sin necesidad de sustituirla por 'ciudades' en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de transliterar el Nombre divino como 'Yahvé', preservando el tetragrámaton en vez de sustituirlo por un título.
- source_word: לִשְׁבָטֶיךָ
  english_pob_choice: according to your tribes
  chosen_spanish: según tus tribus
  alternatives_spanish:
  - para tus tribus
  - por tus tribus
  lexicon: HALOT
  rationale: La frase indica la distribución u organización tribal de estos nombramientos. 'Según tus tribus' expresa de modo natural esa estructuración.
- source_word: וְשָׁפְטוּ אֶת־הָעָם
  english_pob_choice: and they shall judge the people
  chosen_spanish: y ellos juzgarán al pueblo
  alternatives_spanish:
  - y gobernarán al pueblo
  lexicon: HALOT
  rationale: Se mantiene el sentido judicial del verbo en coherencia con 'jueces' y con el contexto legal.
- source_word: מִשְׁפַּט צֶדֶק
  english_pob_choice: with righteous judgment
  chosen_spanish: con juicio de justicia
  alternatives_spanish:
  - con juicio justo
  - con justa sentencia
  lexicon: HALOT
  rationale: La construcción combina decisión judicial y rectitud moral. 'Juicio de justicia' preserva ambas dimensiones y refleja la tensión léxica entre lo legal y lo ético; 'con' hace natural la relación con el verbo 'juzgar'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La lectura española elegida conserva el nombre propio del pacto, en lugar de sustituirlo por un título, conforme a la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Alineado con la última revisión sin cambios: el texto español conserva la imagen de ''puertas'', mantiene el nombre divino como Yahvé y refleja la equivalencia óptima ya aprobada en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene la terminología judicial ('jueces', 'juzgarán', 'juicio') para conservar la coherencia contextual.
  - '''Puertas'' se conserva por la carga cívica del hebreo, con nota explicativa para evitar una lectura meramente arquitectónica.'
  - '''Yahvé'' sigue el estándar del proyecto para יְהוָה y evita la sustitución por ''SEÑOR''.'
