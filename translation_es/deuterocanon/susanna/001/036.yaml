translation:
  language: es
  text: 'Pero los dos ancianos dijeron[a]: «Estábamos caminando en el jardín de su marido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego παράδεισος también puede denotar un huerto o un parque cerrado; aquí se refiere al jardín privado adjunto a la casa de su marido.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ δύο πρεσβύτεροι
  english_pob_choice: But the two elders
  chosen_spanish: Pero los dos ancianos
  alternatives_spanish:
  - Y los dos ancianos
  - Ahora bien, los dos ancianos
  lexicon: BDAG
  rationale: πρεσβύτεροι designa aquí a dos hombres de edad avanzada con peso social y judicial en el relato; en español, «ancianos» conserva esa referencia de edad y función mejor que una traducción más eclesiástica. δέ se marca con «Pero» para mantener el giro narrativo de la respuesta.
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - declararon
  lexicon: BDAG
  rationale: Verbo simple de introducción del discurso. «Dijeron» es natural y fiel en español, sin añadir matiz interpretativo.
- source_word: Ἡμεῖς
  english_pob_choice: We
  chosen_spanish: Estábamos
  alternatives_spanish:
  - Nosotros estábamos
  - Íbamos
  lexicon: BDAG
  rationale: El pronombre explícito griego es enfático, pero en español el énfasis queda bien preservado mediante la forma verbal en primera persona plural y el contexto del discurso directo. Se evita sobrecargar la frase con un «Nosotros» innecesario.
- source_word: περιεπατοῦμεν
  english_pob_choice: were walking
  chosen_spanish: estábamos paseando
  alternatives_spanish:
  - estábamos caminando
  - andábamos
  lexicon: BDAG
  rationale: El imperfecto pide una acción continua en el pasado. «Estábamos paseando» comunica bien la acción en desarrollo y encaja con el contexto narrativo del jardín; «caminando» sería más literal, pero menos idiomático en español aquí.
- source_word: ἐν τῷ παραδείσῳ
  english_pob_choice: in the garden
  chosen_spanish: en el jardín
  alternatives_spanish:
  - en el huerto
  - en el parque
  lexicon: BDAG
  rationale: παράδεισος aquí no significa «paraíso» en sentido celestial, sino un jardín privado cercado o cultivado. «Jardín» es la equivalencia más clara y natural para el lector español.
- source_word: τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: of her husband
  chosen_spanish: de ella, el de su marido
  alternatives_spanish:
  - de su marido
  - perteneciente a su marido
  lexicon: BDAG
  rationale: ἀνήρ en este contexto significa «marido». Se conservó la referencia posesiva con una repetición explicativa en español para evitar ambigüedad y reflejar el genitivo del texto griego sin convertirlo en una paráfrasis libre.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador de nota [a] aparece exactamente en el texto español, y la nota explica la alternativa léxica de παράδεισος de forma audit-able.'
  spanish_consistency_notes:
  - Se mantuvo «ancianos» para πρεσβύτεροι, evitando el término eclesiástico «presbíteros» porque en este relato designa a dos hombres con autoridad judicial más que a un oficio cristiano.
  - Se evitó «paraíso» para παράδεισος, porque en este pasaje su sentido es el de un jardín/cercado privado.
  - La estructura «de ella, el de su marido» busca preservar la relación posesiva sin oscurecer el referente en español.
