translation:
  language: es
  text: Sus hijos lo llevaron a la tierra de Canaán y lo sepultaron en la cueva del campo de Macpela, el campo que Abraham había comprado como propiedad de sepultura[a] de Efrón el hitita, frente a Mamré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como posesión de sepultura». El hebreo destaca que Abraham adquirió el campo como una posesión permanente destinada al entierro.
    reason: lexical_alternative
  - marker: b
    text: O «enfrente de Mamré». La frase hebrea señala la ubicación en relación con Mamré.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo cargaron
  - lo transportaron
  lexicon: HALOT
  rationale: En este contexto narrativo el verbo expresa traslado físico del cuerpo de Jacob. «Lo llevaron» conserva la acción concreta y resulta natural en español; «lo cargaron» es posible pero puede sonar más pesado, y «lo transportaron» es más técnico.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos, los varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos». En español, «sus hijos» comunica el grupo filial sin sobrecargar el verso; el contexto inmediato identifica que se trata de los hijos de Jacob.
- source_word: אַרְצָה כְּנַעַן
  english_pob_choice: to the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - a Canaán
  - hacia la tierra de Canaán
  lexicon: HALOT
  rationale: La forma direccional con אֶרֶץ pide conservar «tierra». «A la tierra de Canaán» refleja mejor el hebreo que simplemente «a Canaán».
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - inhumaron
  lexicon: HALOT
  rationale: «Sepultaron» mantiene un registro digno y formal sin apartarse del sentido de קבר. «Enterraron» sería más común, pero menos solemne.
- source_word: בִּמְעָרַת שְׂדֵה הַמַּכְפֵּלָה
  english_pob_choice: in the cave of the field of Machpelah
  chosen_spanish: en la cueva del campo de Macpela
  alternatives_spanish:
  - en la cueva del campo de la doblez
  - en la cueva del campo de Macpela
  lexicon: HALOT
  rationale: 'Se conserva la cadena nominal del hebreo: cueva + campo + Macpela. «Macpela» se deja como nombre propio tradicional; aunque el término puede aludir a «doble/doblado», aquí funciona como topónimo.'
- source_word: אֲשֶׁר קָנָה אַבְרָהָם אֶת הַשָּׂדֶה
  english_pob_choice: which Abraham had bought with the field
  chosen_spanish: que Abraham había comprado con el campo
  alternatives_spanish:
  - que Abraham había comprado
  - que Abraham había adquirido con el campo
  lexicon: HALOT
  rationale: Se conserva la construcción resumptiva sin traducirla de forma mecánica. «Con el campo» refleja el objeto explícito אֶת־הַשָּׂדֶה en la tradición auditada; evita entender erróneamente que el campo fue moneda de compra.
- source_word: לַאֲחֻזַּת קֶבֶר
  english_pob_choice: as a burial property
  chosen_spanish: como propiedad de sepultura
  alternatives_spanish:
  - como posesión de sepultura
  - como heredad sepulcral
  lexicon: HALOT
  rationale: אֲחֻזָּה indica una posesión o propiedad permanente; קֶבֶר especifica su finalidad funeraria. «Propiedad de sepultura» conserva esa fuerza de posesión destinada al entierro.
- source_word: מֵאֵת עֶפְרֹן הַחִתִּי
  english_pob_choice: from Ephron the Hittite
  chosen_spanish: de manos de Efrón el hitita
  alternatives_spanish:
  - de Efrón el hitita
  - de parte de Efrón el hitita
  lexicon: HALOT
  rationale: El hebreo מֵאֵת marca procedencia/origen de la transacción. «De manos de» explicita el matiz de adquisición y conserva la idea de transferencia; «de Efrón el hitita» también sería posible, pero menos explícita sobre la compra.
- source_word: עַל פְּנֵי מַמְרֵא
  english_pob_choice: opposite Mamre
  chosen_spanish: frente a Mamré
  alternatives_spanish:
  - enfrente de Mamré
  - ante Mamré
  lexicon: HALOT
  rationale: La expresión espacial indica ubicación en relación con Mamré. «Frente a Mamré» preserva el sentido relacional sin reducirlo a mera cercanía.
theological_decisions:
- issue: La expresión de posesión funeraria en la tumba de los patriarcas
  english_pob_reading: as a burial property
  chosen_spanish_reading: como propiedad de sepultura
  alternative_spanish_readings:
  - como posesión de sepultura
  - como heredad sepulcral
  rationale: El versículo subraya que Abraham adquirió el terreno como posesión permanente para sepultura, no solo como un lugar de entierro ocasional. La redacción elegida mantiene esa tensión legal y patrimonial.
  doctrine_reference: Génesis 23; continuidad de la promesa patrimonial de la tierra
- issue: Ubicación relativa respecto de Mamré
  english_pob_reading: opposite Mamre
  chosen_spanish_reading: frente a Mamré
  alternative_spanish_readings:
  - enfrente de Mamré
  - ante Mamré
  rationale: La frase hebrea comunica una localización orientada hacia un punto de referencia. «Frente a» preserva el valor espacial sin imponer más precisión geográfica de la que ofrece el texto.
  doctrine_reference: Uso espacial de עַל־פְּנֵי en descripciones geográficas
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una corrección importante en la cláusula relativa: se aclaró que el relativo modifica la cueva/campo de Macpela y no crea ambigüedad sobre el objeto comprado. La traducción española sigue esa decisión y conserva la relación del campo con la compra de Abraham sin reproducir la formulación inglesa más ambigua. También se respetó la lectura final que mantiene el matiz de la adquisición «con el campo» y la ubicación «opposite/ frente a Mamré».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se mantiene «Macpela» como topónimo, no como traducción interpretativa de su posible sentido léxico.
  - «Sepultaron» y «propiedad de sepultura» mantienen un registro formal coherente con un relato genealógico-funerario.
  - «Hitita» sigue la convención moderna transparente para הַחִתִּי.
