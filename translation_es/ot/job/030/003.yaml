translation:
  language: es
  text: Por falta y hambre están consumidos[a], royendo la tierra seca de noche[b], en desolación y yermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En falta y hambre, están consumidos; raspan la tierra seca de noche, en desolación y yermo». Varias palabras de este versículo son raras y difíciles, especialmente «consumidos» y «royendo».'
    reason: lexical_alternative
  - marker: b
    text: «אֶמֶשׁ» a menudo significa «ayer» o «anoche»; aquí se entiende más ampliamente como «de noche» para ajustarse al contexto poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחֶסֶר
  english_pob_choice: Through want
  chosen_spanish: Por falta
  alternatives_spanish:
  - En falta
  - A causa de la carencia
  lexicon: HALOT
  rationale: חֶסֶר expresa carencia o falta; con בְּ indica la condición en que se hallan. "Por falta" conserva la idea circunstancial y suena natural en español.
- source_word: וּבְכָפָן
  english_pob_choice: and hunger
  chosen_spanish: y hambre
  alternatives_spanish:
  - y hambre aguda
  - y famélico estado
  lexicon: HALOT
  rationale: כָּפָן denota hambre o hambre extrema. "Hambre" mantiene el valor básico y el paralelismo con "falta".
- source_word: גַּלְמוּד
  english_pob_choice: gaunt
  chosen_spanish: están consumidos
  alternatives_spanish:
  - están enjutos
  - están macilentos
  - están emaciados
  lexicon: HALOT
  rationale: El adjetivo es raro y describe el aspecto físico producido por la privación. "Consumidos" comunica el deterioro corporal sin forzar un calco poco natural.
- source_word: הָעֹרְקִים
  english_pob_choice: gnawing
  chosen_spanish: royendo
  alternatives_spanish:
  - raspando
  - hurgando
  - mordiendo
  lexicon: HALOT
  rationale: El participio de ערק es difícil; la POB inglesa opta por una imagen de esfuerzo desesperado sobre la tierra seca. "Royendo" conserva esa aspereza y el matiz casi animal de la acción.
- source_word: צִיָּה
  english_pob_choice: the dry ground
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - el suelo seco
  - la tierra árida
  - la tierra reseca
  lexicon: HALOT
  rationale: צִיָּה refiere a tierra árida o reseca. "La tierra seca" mantiene la concreción del cuadro poético.
- source_word: אֶמֶשׁ
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - anoche
  - de noche
  - en la oscuridad
  lexicon: HALOT
  rationale: Aunque el término suele significar "ayer" o "anoche", en este contexto poético la POB lo entiende de manera amplia como referencia a la noche. "En la noche" conserva esa decisión interpretativa.
- source_word: שׁוֹאָה
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - ruina
  - devastación
  lexicon: HALOT
  rationale: שׁוֹאָה denota desolación o devastación. "Desolación" reproduce bien el tono sombrío del pasaje.
- source_word: וּמְשֹׁאָה
  english_pob_choice: and waste
  chosen_spanish: y ruina
  alternatives_spanish:
  - y devastación
  - y desolación
  lexicon: HALOT
  rationale: El segundo sustantivo intensifica la idea de aridez y destrucción. "Ruina" da un equivalente breve y paralelo a "desolación".
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. Se mantuvo la decisión de la POB sobre אֶמֶשׁ como referencia amplia a la noche, y se conservó la tensión léxica de los términos raros mediante una nota de alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «desolación y ruina» para reflejar el paralelismo poético de שׁוֹאָה / מְשֹׁאָה.
  - «Consumidos» evita una equivalencia demasiado técnica y conserva el efecto corporal del hebreo.
  - La puntuación española y el orden sintáctico buscan fluidez sin borrar el paralelismo del original.
