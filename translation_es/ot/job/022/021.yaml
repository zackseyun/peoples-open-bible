translation:
  language: es
  text: Llega a estar en buenos términos con él[a], por favor, y vive en paz; así[b], el bien[c] vendrá a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Familiarízate con él”. El verbo hebreo puede sugerir familiarizarse con alguien, llegar a estar en buenos términos con él o entrar en una relación correcta.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “en/con ellos”. El plural es difícil; aquí probablemente significa “así”, “por ello” o “mediante estas cosas”, refiriéndose al llamado anterior.'
    reason: lexical_alternative
  - marker: c
    text: 'O: “prosperidad” o “bienestar”. El hebreo dice simplemente “bien”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְכֶּן
  english_pob_choice: Come to terms with
  chosen_spanish: Llega a un acuerdo con
  alternatives_spanish:
  - Acostúmbrate a
  - Acógete a
  - Ponte en paz con
  lexicon: HALOT
  rationale: El verbo hebreo aquí sugiere entrar en una relación adecuada o reconciliada, no solo “familiarizarse”. “Llega a un acuerdo con” conserva el impulso relacional y exhortativo sin forzar una idea doctrinal más explícita que el hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  - yo te suplico
  lexicon: HALOT
  rationale: La partícula suaviza el imperativo y lo vuelve una súplica. “Por favor” es el equivalente natural en español contemporáneo y mantiene el tono apelativo.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Dios
  - junto a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente “con él”. En español se conserva el pronombre, dejando que el contexto identifique a Dios sin introducir el nombre divino donde el verso no lo expresa.
- source_word: וּשְׁלָם
  english_pob_choice: and be at peace
  chosen_spanish: y vive en paz
  alternatives_spanish:
  - y estad en paz
  - y reconcíliate
  - y sé pacificado
  lexicon: HALOT
  rationale: De שלם, el sentido aquí es entrar en paz/entereza. “Vive en paz” es idiomático en español y preserva el llamado relacional. “Reconcíliate” sería más interpretativo; “prospera” estrecharía indebidamente el sentido.
- source_word: בָּהֶם
  english_pob_choice: thereby
  chosen_spanish: así
  alternatives_spanish:
  - por ello
  - mediante ello
  - por estas cosas
  lexicon: HALOT
  rationale: El plural hebreo es difícil; en contexto funciona de modo instrumental o resultativo, refiriéndose a las acciones anteriores. “Así” comunica bien la relación causal/resultativa en español sin cargar el verso con una literalidad extraña.
- source_word: תְּבוֹאַתְךָ
  english_pob_choice: will come to you
  chosen_spanish: vendrá a ti
  alternatives_spanish:
  - llegará a ti
  - te sobrevendrá
  lexicon: HALOT
  rationale: Del verbo בוא, con טובה como sujeto. La forma verbal conserva que “el bien” es lo que viene hacia el destinatario, evitando convertir la frase en una referencia nominal al fruto o al ingreso.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - prosperidad
  - bienestar
  - bondad
  lexicon: HALOT
  rationale: 'טובה es semánticamente amplia: bien, beneficio, bienestar. “El bien” preserva esa amplitud y evita reducir la promesa a prosperidad material בלבד; también suena natural en español con el verbo “vendrá”.'
theological_decisions:
- issue: Referente del pronombre implícito en el exhorto
  english_pob_reading: The pronoun refers to God, as in Eliphaz's exhortation to Job to be reconciled to God.
  chosen_spanish_reading: El pronombre se deja como “él”, permitiendo que el contexto lo identifique con Dios.
  alternative_spanish_readings:
  - Llega a un acuerdo con Dios
  - Llega a un acuerdo con Yahvé
  rationale: La línea sigue el hebreo y evita sustituir el pronombre por un nombre explícito. En el contexto de Job 22, el destinatario es Dios, pero la POB en español mantiene la referencia pronominal para respetar la forma del texto.
  doctrine_reference: Mantener la referencia contextual sin sobreexplicarla
- issue: Alcance de la promesa del ‘bien’
  english_pob_reading: A broad promise of good/well-being rather than an explicitly material prosperity formula.
  chosen_spanish_reading: ‘el bien’ se entiende en sentido amplio, no solo material.
  alternative_spanish_readings:
  - prosperidad
  - bienestar material
  - bendición
  rationale: טובה es amplia y no obliga a una lectura de prosperidad material. “El bien” conserva esa tensión semántica y evita cerrar el pasaje en una promesa economicista que el hebreo no exige.
  doctrine_reference: Preservar la amplitud semántica del término
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió un adverbio causal/resultativo más natural (“thereby”). En español, “así” cumple esa función con naturalidad y concisión, manteniendo el carácter formal del verso.
  spanish_consistency_notes:
  - Se conservó el pronombre de tercera persona en lugar de nombrar explícitamente a Dios, siguiendo la forma del hebreo.
  - Se evitó usar “Cristo” o terminología eclesiástica no presente en el texto.
  - Se eligió “el bien” para טובה por su amplitud semántica y por coherencia con el registro de POB.
  - El enlace causal/resultativo de בָּהֶם se expresó con “así”, sin añadir contenido ajeno al verso.
