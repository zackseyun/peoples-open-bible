translation:
  text: And against his angels whom he had sent to the earth he was exceedingly angry[a], so as to strip them of all their dominion; and he told us to bind them in the depths of the earth, and behold, they are bound within them and separated.
  philosophy: optimal-equivalence
  footnotes:
