translation:
  language: es
  text: entonces el sacerdote calculará para él la proporción de tu valuación hasta el año del jubileo, y ese día dará tu valuación como algo santo para Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «santo para Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִשַּׁב
  english_pob_choice: then ... shall calculate
  chosen_spanish: entonces ... calculará
  alternatives_spanish:
  - y ... calculará
  - y ... evaluará
  lexicon: HALOT
  rationale: El piel de חשׁב aquí expresa el acto de calcular o hacer el cómputo de una cantidad. «Entonces» conserva la secuencia narrativa-jurídica del waw consecutivo sin sonar forzado en español.
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo indica que el sacerdote hace el cálculo en beneficio del hombre en cuestión; «para él» comunica bien esa función.
- source_word: מִכְסַת
  english_pob_choice: the proportion
  chosen_spanish: la porción
  alternatives_spanish:
  - la cantidad
  - la proporción correspondiente
  lexicon: HALOT
  rationale: מִכְסָה puede designar una cantidad fija o una parte calculada. En este contexto de prorrateo hasta el jubileo, «porción» transmite una parte computada de la valuación total sin sonar demasiado técnico en español.
- source_word: הָעֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valuación
  alternatives_spanish:
  - tu valor tasado
  - tu estimación
  lexicon: HALOT
  rationale: עֵרֶךְ es un término técnico en Levítico 27 para la valuación votiva fijada por tasación sacerdotal. «Valuación» preserva ese sentido técnico y el sufijo de segunda persona singular.
- source_word: עַד שְׁנַת הַיֹּבֵל
  english_pob_choice: up to the Year of Jubilee
  chosen_spanish: hasta el año del jubileo
  alternatives_spanish:
  - hasta el Año del Jubileo
  - hasta que llegue el jubileo
  lexicon: HALOT
  rationale: La frase marca el límite temporal del cálculo prorrateado. Se conserva el referente institucional con una formulación natural en español bíblico.
- source_word: וְנָתַן
  english_pob_choice: he shall give
  chosen_spanish: dará
  alternatives_spanish:
  - pagará
  - presentará
  lexicon: HALOT
  rationale: נתן es amplio, «dar». Aquí el sujeto implícito, por el contexto inmediato, es el dedicante; «dará» permite abarcar la entrega del importe sin sobreespecificar «pagar», que sería más interpretativo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese mismo día
  - en ese día
  lexicon: HALOT
  rationale: Expresión temporal estándar. «Aquel día» mantiene la deixis bíblica y funciona bien en español de registro bíblico contemporáneo.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: as a holy offering to Yahweh
  chosen_spanish: como cosa santa para Yahvé
  alternatives_spanish:
  - como algo santo para Yahvé
  - como ofrenda santa para Yahvé
  lexicon: HALOT
  rationale: Literalmente, «santo para Yahvé». Se evita imponer «ofrenda» porque el hebreo no la añade explícitamente; «cosa santa» comunica la consagración cultual del valor entregado, conservando la tensión entre lo estrictamente literal y la función ritual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Sujeto implícito de וְנָתַן
  english_pob_reading: 'the dedicator/man is the understood subject: ''he shall give'''
  chosen_spanish_reading: 'el dedicante es el sujeto implícito: «dará»'
  alternative_spanish_readings:
  - el sacerdote dará
  - él pagará
  rationale: El contexto inmediato de Levítico 27:19 y 27:23 trata del hombre que consagra o redime el campo, mientras el sacerdote hace el cálculo. Por eso se entiende que el que entrega la valuación es el dedicante, no el sacerdote.
  doctrine_reference: Contexto inmediato de Levítico 27; coherencia discursiva del pasaje
- issue: Valor de קֹדֶשׁ לַיהוָה
  english_pob_reading: cultic consecration expressed as 'a holy offering to the LORD'
  chosen_spanish_reading: consagración cultual expresada como «cosa santa para Yahvé»
  alternative_spanish_readings:
  - «santo para Yahvé» de forma más literal
  - «ofrenda santa para Yahvé»
  rationale: La frase hebrea indica que lo entregado queda apartado para Yahvé. En español, «cosa santa» mantiene la literalidad sin añadir la noción de ofrenda, que no está explícita en el hebreo; así se preserva la tensión léxica documentada por el texto fuente.
  doctrine_reference: Levítico 27:23; distinción entre santidad/cosa consagrada y ofrenda explícita
translation_notes:
  revision_awareness: 'He consultado el hebreo consonántico/vocalizado de Levítico 27:23 y la nota de auditoría inglesa. El punto principal de decisión fue קֹדֶשׁ לַיהוָה: el inglés opta por explicitar «holy offering», pero el hebreo solo dice «santo para Yahvé». La redacción española mantiene esa literalidad y deja la alternativa más formal en nota. No se requiere una nota textual adicional porque no hay variante manuscrita señalada en el paquete.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para el Tetragrámaton.
  - «Valuación» se usa como término técnico para עֵרֶךְ en Levítico 27, coherente con el contexto jurídico-cultual.
  - Se conserva «jubileo» en minúscula en la expresión institucional para naturalidad editorial en español, sin perder el referente técnico.
  - No se añadió «ofrenda» al texto principal para no ir más allá de la formulación hebrea; la aclaración queda en la nota.
