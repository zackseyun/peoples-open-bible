revisions:
- from: Y yo embriagaré a sus oficiales[a], sus sabios, sus gobernadores, sus delegados y sus guerreros; y dormirán un sueño eterno y no despertarán, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  to: Y yo embriagaré a sus oficiales, sus sabios, sus gobernadores[a], sus subgobernantes y sus guerreros; dormirán un sueño eterno y no despertarán, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  rationale: Se reubicó la nota [a] en «gobernadores», que es el término hebreo para el cual «sátrapas» es una alternativa documentada. Se cambió «delegados» por «subgobernantes» para reflejar mejor el sentido de oficiales subordinados de סְגָנֶיהָ. También se mejoró levemente la fluidez española eliminando la repetición menos natural de «; y».
  reviewer_model: gpt-5.4
