translation:
  language: es
  text: No aparta de los justos sus ojos, sino que, con reyes en el trono[a], los sienta para siempre, y son ensalzados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y reyes en el trono: los sienta para siempre». El hebreo es compacto, y algunos entienden la cláusula como una referencia directa a los reyes más que a los justos sentados con reyes.'
    reason: alternative_reading
  - marker: b
    text: 'O: «y los exalta». El verbo final puede entenderse activamente, con Dios como sujeto implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְרַע
  english_pob_choice: withdraw
  chosen_spanish: aparta
  alternatives_spanish:
  - retira
  - aleja
  - quita
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar disminuir, quitar o retirar. Con «sus ojos» como objeto, el sentido idiomático es dejar de mirar o de atender. «Aparta» comunica esa idea de manera natural en español sin perder la imagen corporal del texto.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su mirada
  - su ojo
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica concreta del hebreo. «Sus ojos» es la forma más transparente y fiel al original, sin abstractizar indebidamente a «su atención».
- source_word: מִצַּדִּיק
  english_pob_choice: from the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - del justo
  - de los rectos
  lexicon: HALOT
  rationale: El singular hebreo funciona con valor genérico/colectivo. En español, el plural sustantivado «los justos» expresa mejor esa clase de personas que un singular aislado.
- source_word: וְאֶת מְלָכִים לַכִּסֵּא
  english_pob_choice: but with kings on the throne
  chosen_spanish: sino que, con reyes en el trono
  alternatives_spanish:
  - y reyes en el trono
  - incluso reyes en el trono
  - y pone a reyes en el trono
  lexicon: HALOT
  rationale: La cláusula es elíptica en hebreo. «Sino que, con reyes en el trono» mantiene la compactación y el contraste implícito sin añadir un verbo que el texto no formula explícitamente.
- source_word: וַיֹּשִׁיבֵם
  english_pob_choice: he seats them
  chosen_spanish: los asienta
  alternatives_spanish:
  - los hace sentar
  - los sienta
  - los entroniza
  lexicon: HALOT
  rationale: El hifil de ישׁב significa hacer sentar, colocar en asiento. «Los asienta» es formal, claro y evita intensificar a «entroniza», que sería más interpretativo.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  - por toda la eternidad
  lexicon: HALOT
  rationale: La expresión indica duración continua. «Para siempre» es la equivalencia española más natural y conserva bien el valor durativo.
- source_word: וַיִּגְבָּהוּ
  english_pob_choice: and they are exalted
  chosen_spanish: y son ensalzados
  alternatives_spanish:
  - y son exaltados
  - y él los exalta
  - y quedan en alto
  lexicon: HALOT
  rationale: La forma es ambigua en contexto. «Son ensalzados» preserva el resultado de elevación de estado sin forzar de manera innecesaria la voz o el sujeto explícito.
theological_decisions:
- issue: Imagen antropomórfica de la vigilancia divina
  english_pob_reading: Retain the concrete expression 'his eyes' rather than abstracting to 'his care' or 'his attention.'
  chosen_spanish_reading: Conservar «sus ojos» como imagen concreta de la vigilancia de Dios.
  alternative_spanish_readings:
  - su mirada
  - su cuidado
  - su atención
  rationale: La poesía hebrea presenta a Dios como quien mira continuamente al justo. Mantener la imagen corporal respeta el texto y evita aplanar la metáfora en una abstracción.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referente del pronombre plural en la cláusula real
  english_pob_reading: The pronoun refers to the righteous, who are seated with kings/on the throne and exalted.
  chosen_spanish_reading: El pronombre «los» se entiende referido a los justos.
  alternative_spanish_readings:
  - se refiere a reyes
  - Dios asienta a los justos como reyes
  rationale: El contexto inmediato contrapone el trato de Dios con los justos y con los impíos. En español se conserva la ambigüedad relativa del hebreo, pero el plural natural se lee mejor como referencia a los justos.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés, que sustituyó el punto y coma por una coma para dar fluidez, sin alterar el contenido léxico ni la ambigüedad del miembro final.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito conforme al contexto, sin introducir «Yahvé» porque el versículo no contiene el nombre divino en el texto hebreo citado ni una cita directa del tetragrámaton.
  - 'Se preserva la tensión del final: el hebreo puede leerse como elevación de los justos o como una afirmación activa de Dios que los exalta.'
  - «Justos» se usa como sustantivo colectivo para reflejar el uso genérico del singular hebreo.
