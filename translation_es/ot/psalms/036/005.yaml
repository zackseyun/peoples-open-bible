translation:
  language: es
  text: Maquina maldad en su lecho[a]; se afirma en un camino que no es bueno; no rechaza el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Maquina iniquidad en su lecho ... no aborrece el mal".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - maldad
  - perversidad
  lexicon: HALOT
  rationale: En este contexto de deliberación moral y rechazo final del mal, ‘maldad’ comunica con claridad el contenido ético del término. Evita un término demasiado técnico como ‘iniquidad’ y mantiene la progresión con ‘el mal’ al final del verso.
- source_word: יַחְשֹׁב
  english_pob_choice: devises
  chosen_spanish: maquina
  alternatives_spanish:
  - piensa
  - planea
  - maquina
  - traza
  lexicon: HALOT
  rationale: El verbo expresa actividad mental intencional, no simple pensamiento. ‘Maquina’ transmite elaboración deliberada y, en español, conserva el matiz de una contrivancia moralmente cargada sin sobreexplicar.
- source_word: עַל מִשְׁכָּב/וֹ
  english_pob_choice: on his bed
  chosen_spanish: en su lecho
  alternatives_spanish:
  - sobre su cama
  - en su cama
  - en su lecho
  lexicon: HALOT
  rationale: ‘Lecho’ conserva dignidad estilística y mantiene la imagen del lugar de meditación nocturna. Aunque ‘cama’ sería más cotidiano, ‘lecho’ es igualmente natural en registro bíblico y evita una sonoridad demasiado coloquial.
- source_word: יִתְיַצֵּב
  english_pob_choice: sets himself
  chosen_spanish: se pone
  alternatives_spanish:
  - se coloca
  - se afirma
  - toma postura
  - se pone
  lexicon: HALOT
  rationale: El hitpael es reflexivo y sugiere asumir deliberadamente una postura o posición. ‘Se pone’ conserva esa reflexividad y la idea de colocarse en una dirección moral concreta, sin forzar una imagen militar que el español podría exagerar.
- source_word: עַל דֶּרֶךְ לֹא טוֹב
  english_pob_choice: on a way that is not good
  chosen_spanish: en un camino que no es bueno
  alternatives_spanish:
  - en una senda que no es buena
  - en una vía que no es buena
  - en un camino que no es bueno
  lexicon: HALOT
  rationale: ‘Camino’ reproduce la metáfora hebrea de conducta o proceder. ‘Que no es bueno’ sigue de cerca la negación hebrea y conserva la valoración moral sin convertirla en una paráfrasis más abstracta.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - mal
  - maldad
  - lo malo
  lexicon: HALOT
  rationale: Aquí el término funciona como objeto del verbo ‘rechazar’. ‘El mal’ es una opción natural y clara en español, y mantiene el contraste con la conducta desviada del primer hemistiquio.
- source_word: לֹא יִמְאָס
  english_pob_choice: he does not reject
  chosen_spanish: no rechaza
  alternatives_spanish:
  - no desprecia
  - no aborrece
  - no rechaza
  lexicon: HALOT
  rationale: '‘Rechazar’ expresa bien la idea de no repudiar ni apartarse del mal. Es más directo que ‘aborrecer’ y conserva la progresión moral: primero lo concibe, luego se afirma en ello, y finalmente no lo rechaza.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el trazado auditado del texto hebreo y del POB inglés. Se preserva la secuencia de tres miembros, la imaginería del lecho y del camino, y la tensión lexical entre אָוֶן / רָע sin fusionarlos indebidamente. La única nota recoge una alternativa léxica ya documentada por el POB inglés.
  spanish_consistency_notes:
  - Se usó el registro bíblico sobrio pero moderno, evitando giros arcaizantes innecesarios.
  - Se mantuvo la metáfora de camino/proceder sin convertirla en explicación interpretativa.
  - Se distinguió ‘maldad’ de ‘el mal’ para reflejar la diferencia entre אָוֶן y רָע.
  - No se introdujo ‘SEÑOR’, ‘Cristo’ ni otros equivalentes no presentes en este verso.
