    issue: מִפְּנֵי fue traducido como 'delante de'
    rationale: En Levítico 26:10 el modismo indica que lo viejo se retira por la llegada de lo nuevo. 'Delante de' introduce una relación espacial que no preserva el sentido contextual documentado por el POB inglés y por el hebreo en este uso.
  - severity: medium
    issue: La nota al pie repite la misma traducción defectuosa como alternativa formal
    rationale: La nota debería reflejar una alternativa formal fiel, no reproducir el mismo problema semántico del texto principal.
