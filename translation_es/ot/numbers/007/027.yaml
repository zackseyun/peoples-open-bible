translation:
  language: es
  text: un toro de la manada[a], un carnero, un cordero macho de un año[b], para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un toro, hijo del ganado». El hebreo usa un giro idiomático para referirse a un bovino del hato o manada; por eso se traduce de forma natural como «toro de la manada».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un cordero macho, hijo de su año», es decir, un cordero macho de un año o en su primer año.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: becerro
  alternatives_spanish:
  - toro
  - buey joven
  - novillo
  lexicon: HALOT
  rationale: El hebreo פַּר designa un bovino para sacrificio; en español, «becerro» comunica bien un animal joven de la manada sin sonar tan técnico o pesado como «toro». Dado que el POB en inglés dejó abierto el matiz de edad con «from the herd», «becerro» preserva razonablemente la clase animal y la posible juventud.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la manada
  alternatives_spanish:
  - del ganado
  - de la res
  - hijo del ganado
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático genitivo de pertenencia u origen. «De la manada» refleja el sentido clasificatorio natural en español y evita la literalidad opaca de «hijo del ganado».
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - borrego
  lexicon: HALOT
  rationale: אַיִל es el macho adulto de la oveja. «Carnero» es el equivalente bíblico y sacrificial más claro y estable en español.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El hebreo especifica un cordero macho; «cordero macho» conserva la precisión lexical del inglés POB. «Cordero» solo perdería la marca de sexo.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  - son de su año
  lexicon: HALOT
  rationale: La locución hebrea indica una edad de un año. «De un año» es natural en español y reproduce el requisito de edad sin sobrecargar la frase.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  - para sacrificio total
  lexicon: HALOT
  rationale: En la tradición bíblica en español, «holocausto» es el término más directo para עֹלָה. Se mantiene el valor cultual de ofrenda totalmente quemada que el POB preserva con «burnt offering».
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral repetido se integra naturalmente como artículo numeral en español ante sustantivos contables. En esta lista sacrificial, «un» mantiene el ritmo enumerativo sin alterar el contenido.
theological_decisions:
- issue: Terminología cultual para עֹלָה
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - como holocausto
  - para ofrenda quemada
  rationale: No se atenúa la referencia sacrificial. «Holocausto» es el equivalente litúrgico clásico y ampliamente inteligible; además, comunica el carácter de ofrenda completamente consumida por el fuego, que es el trasfondo del término hebreo.
  doctrine_reference: Levítico 1; Números 28–29
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo consonante y la revisión auditada en inglés del POB, sin introducir cambios textuales. Se conserva la enumeración sacrificial y las dos notas léxicas principales sobre el bovino y el animal de un año, adaptadas al español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio, con terminología sacrificial estable.
  - «Holocausto» se usa aquí en sentido cultual bíblico, no en el sentido moderno histórico de tragedia humana.
  - La secuencia nominal breve respeta el estilo enumerativo del hebreo.
  - No se emplea «Señor» ni terminología de nombres divinos porque el versículo no contiene el Tetragrámaton.
