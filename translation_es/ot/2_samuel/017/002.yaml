    issue: «entraré contra él» para וְאָבֹוא עָלָיו
    rationale: Aunque intenta conservar la imagen verbal, en español bíblico natural «entrar contra» no es la mejor equivalencia aquí. «Iré contra él» o «caeré sobre él» representan mejor el movimiento hostil de בוא + על sin sonar forzado.
  - severity: medium
    issue: «golpearé al rey solo» es ambiguo
    rationale: Puede interpretarse adverbialmente como ‘solo golpearé al rey’. El hebreo לְבַדּוֹ enfatiza que el rey quedará aislado como único objetivo; «al rey, a él solo» o «solo al rey» lo expresa con más claridad.
  - severity: low
    issue: Redundancia de «Yo» inicial
    rationale: No es incorrecto, pero el futuro verbal ya expresa la persona; omitir «Yo» mejora la fluidez en español salvo que se busque énfasis contrastivo, que aquí no es necesario.
