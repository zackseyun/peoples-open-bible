  - severity: medium
    issue: «Gedeoní» es una adaptación onomástica innecesaria y menos fiel a גִּדְעֹנִי / Gideoni.
    rationale: El audit trail inglés documenta «Gideoni». En español, «Gideoní» preserva mejor la forma fuente que «Gedeoní», que introduce un cambio vocálico no exigido por claridad.
  revised_spanish_text: El noveno día[a], el líder de los hijos de Benjamín fue Abidán, hijo de Gideoní.
