translation:
  language: es
  text: Y después de todo lo que ha venido sobre nosotros por nuestras malas obras y por nuestra gran culpa—aunque tú, Dios nuestro, has refrenado tu castigo[a] por debajo de nuestras iniquidades y nos has dado un remanente[b] como este—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «nos has perdonado más de lo que merecían nuestras iniquidades». El hebreo literalmente habla de que Dios refrenó o retuvo el juicio por debajo de la medida de su culpa.
    reason: lexical_alternative
  - marker: b
    text: O, «un escape» o «sobrevivientes». El término se refiere a los preservados a través del juicio; «remanente» destaca el contexto postexílico del pueblo restaurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי
  english_pob_choice: And after
  chosen_spanish: Y después de
  alternatives_spanish:
  - Después de
  lexicon: HALOT
  rationale: Conserva la conjunción inicial y el valor de continuidad del hebreo, mientras que «después de» suena natural en español.
- source_word: כָּל הַבָּא עָלֵינוּ
  english_pob_choice: all that has come upon us
  chosen_spanish: todo lo que ha venido sobre nosotros
  alternatives_spanish:
  - todo lo que ha pasado sobre nosotros
  - todo lo que ha venido a nosotros
  lexicon: HALOT
  rationale: «Ha venido sobre nosotros» mantiene la imagen idiomática de algo que cae sobre el pueblo; «todo lo que» expresa la totalidad del juicio y la calamidad.
- source_word: בְּמַעֲשֵׂינוּ הָרָעִים
  english_pob_choice: because of our evil deeds
  chosen_spanish: por nuestras malas obras
  alternatives_spanish:
  - a causa de nuestras malas obras
  - por nuestras malas acciones
  lexicon: HALOT
  rationale: El ב causal se vierte naturalmente con «por». «Obras» respeta el sustantivo hebreo y evita suavizarlo a una mera serie de actos sin carga moral.
- source_word: וּבְאַשְׁמָתֵנוּ הַגְּדֹלָה
  english_pob_choice: and our great guilt
  chosen_spanish: y por nuestra gran culpa
  alternatives_spanish:
  - y por nuestra gran culpabilidad
  - y por nuestra gran falta
  lexicon: HALOT
  rationale: «אַשְׁמָה» señala culpa objetiva, no solo sentimiento de culpa; «culpa» comunica bien ese peso moral en español.
- source_word: כִּי
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: HALOT
  rationale: 'Aquí el hebreo introduce un giro concesivo: pese a la culpa, Dios ha mostrado misericordia. «Aunque» reproduce mejor esa función discursiva que una causal simple.'
- source_word: חָשַׂכְתָּ לְמַטָּה מֵעֲוֺנֵנוּ
  english_pob_choice: have withheld from us less than our iniquities deserved
  chosen_spanish: nos has retenido menos de lo que merecían nuestras iniquidades
  alternatives_spanish:
  - nos has contenido por debajo de lo que merecían nuestras iniquidades
  - nos has perdonado más de lo que merecían nuestras iniquidades
  lexicon: HALOT
  rationale: «חָשַׂךְ» significa retener, contener, abstenerse de imponer plenamente. «Nos has retenido menos de lo que merecían» preserva la idiomaticidad sin introducir explícitamente «castigo»; «merecían nuestras iniquidades» refleja la medida del juicio.
- source_word: עֲוֺן
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - pecados
  - culpas
  lexicon: HALOT
  rationale: «Iniquidades» mantiene la gravedad de עָוֺן y su peso de culpabilidad moral, acorde con la elección auditada en inglés.
- source_word: פְּלֵיטָה
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - unos sobrevivientes
  - una escapatoria
  - unos escapados
  lexicon: HALOT
  rationale: En el contexto postexílico, el término no es solo escape físico sino la comunidad preservada; «remanente» conserva ese valor histórico-teológico.
- source_word: כָּזֹאת
  english_pob_choice: such a remnant as this
  chosen_spanish: como este
  alternatives_spanish:
  - así
  - tal como este
  lexicon: HALOT
  rationale: El demostrativo intensifica la sorprendente misericordia. «Como este» se adhiere al cierre del hebreo y funciona bien con «remanente» implícito en el contexto.
theological_decisions:
- issue: Relación entre justicia divina y misericordia en la cláusula concesiva
  english_pob_reading: have withheld from us less than our iniquities deserved
  chosen_spanish_reading: nos has retenido menos de lo que merecían nuestras iniquidades
  alternative_spanish_readings:
  - nos has perdonado más de lo que merecían nuestras iniquidades
  - nos has contenido por debajo de lo que merecían nuestras iniquidades
  rationale: La frase conserva la tensión entre culpa merecida y trato misericordioso. Se evita resolverla con lenguaje más explícito de perdón o castigo, porque el hebreo habla de retener/contener el juicio por debajo de la medida debida.
  doctrine_reference: Éxodo 34:6-7; Salmo 103:10
- issue: Sentido de פְּלֵיטָה en contexto posexílico
  english_pob_reading: a remnant
  chosen_spanish_reading: un remanente
  alternative_spanish_readings:
  - unos sobrevivientes
  - una escapatoria
  rationale: En Esdras, la comunidad preservada tras el juicio tiene peso de continuidad del pacto. «Remanente» comunica esa realidad histórico-teológica mejor que un mero «escape».
  doctrine_reference: Isaías 10:20-22; Esdras 9:8-15
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que afinó la segunda mitad para reflejar con más precisión el verbo hebreo חָשַׂךְ como «retener/contener» en vez de explicitar «castigar». Por eso el español evita introducir «castigo» y conserva la idea de haber sido tratados por debajo de lo merecido. También se respetó el cierre demostrativo con un giro breve y natural, sin añadir contenido ajeno al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como valor por defecto del proyecto solo donde el texto no contiene el Tetragrámaton; aquí corresponde «Dios nuestro» por el hebreo אֱלֹהֵינוּ.
  - Se usó «iniquidades» para עָוֺן, coherente con el registro bíblico y con la elección auditada en inglés.
  - «Remanente» se eligió como término técnico-teológico por su adecuación al contexto posexílico.
