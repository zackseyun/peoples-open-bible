translation:
  language: es
  text: Bajo la aflicción vi las tiendas de Cusan[a][b]; las cortinas de las tiendas de la tierra de Madián temblaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo la calamidad» o «bajo la desgracia»; אָוֶן puede denotar aflicción, calamidad o, en algunos contextos, maldad/iniquidad.
    reason: lexical_alternative
  - marker: b
    text: Cusan puede referirse a Cus o relacionarse con Cusan-Risataim (Jue. 3:8), pero el hebreo aquí dice simplemente «Cusan».
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: Bajo
  alternatives_spanish:
  - bajo
  - debajo de
  - en medio de
  lexicon: HALOT
  rationale: En este contexto poético, la preposición no solo indica ubicación física sino una condición o carga. «Bajo» conserva esa relación de dependencia/situación sin sonar forzado en español.
- source_word: אָוֶן
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - problema
  - calamidad
  - maldad
  - iniquidad
  lexicon: HALOT
  rationale: El término puede significar también maldad/iniquidad, pero aquí el contexto describe reacción de temor y desastre. «Aflicción» comunica bien el sentido de angustia o calamidad sin borrar la amplitud semántica.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - había visto
  lexicon: HALOT
  rationale: El perfecto hebreo funciona naturalmente como pasado simple en español. «Vi» mantiene la vividez visionaria del poema.
- source_word: אָהֳלֵי
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - tiendas de campaña
  - campamentos
  - tabernáculos
  lexicon: HALOT
  rationale: «Tiendas» es el equivalente más natural y concreto en español moderno. «Tabernáculos» introduciría un registro tradicional no requerido por el hebreo.
- source_word: כוּשָׁן
  english_pob_choice: Cushan
  chosen_spanish: Cusan
  alternatives_spanish:
  - Cushán
  - Cushan
  - Cusán
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, sin resolver su identificación. «Cusan» es una forma española fluida y transparente para el lector.
- source_word: יִרְגְּזוּן
  english_pob_choice: were trembling
  chosen_spanish: temblaban
  alternatives_spanish:
  - estaban temblando
  - se estremecían
  - se agitaban
  lexicon: HALOT
  rationale: El verbo expresa sacudida/tremor. El imperfecto español «temblaban» reproduce el cuadro continuo y paralelo con la escena visionaria.
- source_word: יְרִיעוֹת
  english_pob_choice: tent curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - lonas
  - lienzos
  - cortinajes de tienda
  lexicon: HALOT
  rationale: El sustantivo designa las cubiertas o cortinas de la tienda. «Cortinas» funciona bien en español, y el contexto de «tiendas» ya aclara el referente.
- source_word: אֶרֶץ מִדְיָן
  english_pob_choice: the land of Midian
  chosen_spanish: la tierra de Madián
  alternatives_spanish:
  - el país de Madián
  - Madián
  lexicon: HALOT
  rationale: La construcción hebrea se preserva de forma natural con «la tierra de Madián». «Madián» mantiene el nombre propio bíblico estándar en español.
theological_decisions:
- issue: Identificación de כוּשָׁן
  english_pob_reading: Treat as the proper name 'Cushan' without harmonizing it to another figure or region in the main text.
  chosen_spanish_reading: Conservar «Cusan» como nombre propio sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - Entenderlo como «Cus»
  - Identificarlo con «Cusan-Risataim»
  rationale: El hebreo nombra a כוּשָׁן de manera directa y la identificación histórica es incierta. La traducción debe preservar esa incertidumbre en vez de resolverla artificialmente.
  doctrine_reference: 'Principio POB: primacía del texto fuente y preservación de tensiones históricas/lexicales cuando el original no las resuelve.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al colocar la frase inicial de modo que refleje mejor el orden hebreo, conservando el paralelismo con la segunda mitad del versículo. Se mantuvo la identificación abierta de כוּשָׁן y el valor de peligro/aflicción de אָוֶן sin resolverlo en exceso.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece.
  - Se mantuvo la transliteración española de nombres propios bíblicos sin forzar equivalencias tradicionales no atestiguadas por el hebreo.
  - «Tiendas» y «cortinas» conservan la imagen concreta del campamento/tienda, evitando términos más litúrgicos o interpretativos.
