- from: Y la herencia de los pecadores es destrucción y oscuridad[a], y su iniquidad los perseguirá hasta Hades abajo.
  to: Y la herencia de los pecadores es destrucción y oscuridad[a], y su rebeldía contra la ley los perseguirá hasta el Hades de abajo.
  rationale: Se revisa ἀνομία para reflejar mejor la decisión auditada «lawlessness» sin caer en una expresión antinatural; «rebeldía contra la ley» preserva el vínculo semántico con la ley y sigue siendo legible en español. También se ajusta la cláusula final a «hasta el Hades de abajo» para conservar ἕως + κάτω de forma más idiomática que «hasta Hades abajo».
