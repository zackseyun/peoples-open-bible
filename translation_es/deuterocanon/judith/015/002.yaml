translation:
  language: es
  text: Y cayó sobre ellos el terror y el miedo, y ya no quedó hombre que permaneciera frente a su prójimo; sino que, dispersándose[a] todos a una[b], huían por todos los caminos de la llanura y de la región montañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El participio ἐκχυθέντες puede sugerir literalmente «derramados» o «vertidos»; en contexto militar, describe una desbandada o dispersión repentina.
    reason: lexical_alternative
  - marker: b
    text: El adverbio ὁμοθυμαδόν puede traducirse «con un solo ánimo» o «de común acuerdo», pero aquí probablemente indica que huyeron todos juntos o todos a la vez, no en unidad armoniosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέπεσεν
  english_pob_choice: fell upon
  chosen_spanish: cayeron sobre
  alternatives_spanish:
  - vinieron sobre
  - se abatieron sobre
  lexicon: LSJ
  rationale: El verbo expresa un acometimiento repentino y violento. En español, «cayeron sobre» conserva la imagen dinámica y el carácter súbito del sujeto doble «el terror y el miedo».
- source_word: τρόμος
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - temblor
  - espanto
  lexicon: LSJ
  rationale: En este contexto militar, el sentido dominante es el de pánico y sobresalto intenso, no solo el temblor físico. «Terror» reproduce bien la fuerza del término.
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - pánico
  lexicon: LSJ
  rationale: Se mantiene el segundo sustantivo como un término distinto para no colapsar la dupla griega. «Miedo» es claro y natural en español, aunque «temor» también sería posible.
- source_word: οὐκ ἦν ἄνθρωπος μένων
  english_pob_choice: no man remained standing
  chosen_spanish: no quedó hombre que permaneciera
  alternatives_spanish:
  - no quedó hombre en pie
  - no permaneció hombre
  lexicon: LSJ
  rationale: La construcción griega subraya que nadie siguió firme o en su puesto. «No quedó hombre que permaneciera» preserva la generalidad del singular ἄνθρωπος y evita añadir explícitamente «en pie» donde el griego no lo dice.
- source_word: κατὰ πρόσωπον τοῦ πλησίον
  english_pob_choice: before his neighbor
  chosen_spanish: delante de su prójimo
  alternatives_spanish:
  - frente a su prójimo
  - en presencia de su prójimo
  lexicon: LSJ
  rationale: El giro idiomático apunta a permanecer frente a otro, en su presencia. «Delante de su prójimo» es breve, idiomático y mantiene el sentido relacional sin volverlo demasiado literal.
- source_word: ἔτι
  english_pob_choice: any longer
  chosen_spanish: ya
  alternatives_spanish:
  - todavía
  - aún
  lexicon: LSJ
  rationale: 'El adverbio marca el cese de una situación previa. En español, «ya» comunica bien esa idea en esta cláusula negativa: nadie permanecía allí ya.'
- source_word: ἐκχυθέντες
  english_pob_choice: scattering in all directions
  chosen_spanish: dispersándose
  alternatives_spanish:
  - derramándose
  - esparciéndose
  - rompiendo filas
  lexicon: LSJ
  rationale: La forma participial literal sugiere algo «derramado» o «vertido». En un contexto de derrota militar, «dispersándose» conserva el efecto de desbandada sin sonar forzado; la nota explica la imagen de fondo.
- source_word: ὁμοθυμαδόν
  english_pob_choice: together
  chosen_spanish: en todas direcciones
  alternatives_spanish:
  - todos a una
  - con un solo ánimo
  - al mismo tiempo
  lexicon: LSJ
  rationale: Aunque el adverbio puede significar «unánimemente» o «todos juntos», aquí el contexto de pánico requiere evitar la idea de armonía. La combinación con el participio permite traducir el resultado visible de la huida como dispersión general, más que la unidad interior del grupo.
- source_word: ἔφευγον
  english_pob_choice: they fled
  chosen_spanish: huían
  alternatives_spanish:
  - fueron huyendo
  - salían huyendo
  lexicon: LSJ
  rationale: El imperfecto sugiere una acción en curso. «Huían» conserva ese aspecto progresivo mejor que un simple pretérito puntual.
- source_word: ἐπὶ πᾶσαν ὁδὸν
  english_pob_choice: along every road
  chosen_spanish: por todos los caminos
  alternatives_spanish:
  - por cada camino
  - a lo largo de todos los caminos
  lexicon: LSJ
  rationale: La frase indica rutas de escape en todas direcciones disponibles. «Por todos los caminos» es natural en español y comunica la dispersión sin perder el sentido direccional.
- source_word: τοῦ πεδίου καὶ τῆς ὀρεινῆς
  english_pob_choice: of the plain and of the hill country
  chosen_spanish: de la llanura y de la región montañosa
  alternatives_spanish:
  - del llano y de la montaña
  - de la llanura y de la zona montañosa
  lexicon: LSJ
  rationale: πεδίον remite a llanura o terreno abierto; ὀρεινή designa una zona montañosa o de colinas. «Región montañosa» es claro y fiel, y evita la reducción a «montañas» como si se tratara solo de picos.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió una traducción más débil de ἐκχυθέντες hacia una imagen de dispersión más natural y exacta en contexto. También se preservó la distinción entre τρόμος y φόβος, y se evitó leer ὁμοθυμαδόν como unanimidad positiva.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece el nombre divino.
  - Se mantuvo «prójimo» para κατὰ πρόσωπον τοῦ πλησίον, siguiendo un registro bíblico claro y fiel.
  - Se distinguió entre la dupla «terror y miedo» sin fusionarla en un solo término.
  - Se prefirió «huían» para reflejar el imperfecto narrativo griego.
  - Se evitó un calco de «con un solo ánimo» porque el contexto de pánico lo desautoriza.
