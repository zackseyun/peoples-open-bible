translation:
  language: es
  text: 'Pero ellos nos respondieron, diciendo: «Somos siervos[a] del Señor, que creó el cielo y la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos del Señor». El griego παῖδες puede significar «hijos» o «siervos»; aquí el contexto favorece la idea de servicio y pertenencia más que la filiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron a nosotros
  lexicon: BDAG
  rationale: En español, «respondieron» es natural y fiel al verbo narrativo de réplica. «Contestaron» sería posible, pero «respondieron» conserva mejor el tono formal del relato.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo se refleja de modo idiomático en español con el pronombre átono «nos» en «nos respondieron», sin perder el destinatario de la respuesta.
- source_word: Ἐσμὲν
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: BDAG
  rationale: Es el verbo copulativo simple de identidad. «Somos» reproduce directamente el valor del griego sin añadir matices de estado o localización.
- source_word: παῖδες
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - hijos
  - esclavos
  lexicon: BDAG
  rationale: El audit trail inglés eligió «servants» por el contexto de servicio y pertenencia, no de filiación biológica. En español, «siervos» preserva ese sentido reverente y de dependencia ante Dios. «Esclavos» sería demasiado fuerte en este pasaje; «hijos» desplazaría el énfasis hacia filiación.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  lexicon: BDAG
  rationale: Se sigue el valor de κύριος aplicado a Dios en contexto bíblico. «Señor» es la forma española estable y respetuosa que mantiene la gravedad teológica del título.
- source_word: τοῦ κτίσαντος
  english_pob_choice: who created
  chosen_spanish: que creó
  alternatives_spanish:
  - que hizo
  - el que creó
  lexicon: BDAG
  rationale: El participio aoristo se expresa con una relativa simple en español. «Que creó» conserva la acción creadora sin sobrecargar la frase.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra
  lexicon: BDAG
  rationale: La fórmula bíblica merística se vuelve naturalmente «el cielo y la tierra» en español, manteniendo el alcance de la creación total.
theological_decisions:
- issue: παῖδες aplicado a Dios
  english_pob_reading: servants rather than children
  chosen_spanish_reading: siervos en lugar de hijos
  alternative_spanish_readings:
  - hijos
  - esclavos
  rationale: El contexto es una respuesta defensiva ante autoridades, donde la autodefinición subraya lealtad y servicio a Dios. «Siervos» reproduce ese valor sin convertir el término en filiación adoptiva ni intensificarlo innecesariamente como «esclavos».
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; contested terms table for broad semantic terms'
- issue: κύριος como título divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En este contexto judío-escritural, el término designa a Dios como soberano creador. «Señor» es la equivalencia estándar y preserva el peso reverencial del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord)'
translation_notes:
  revision_awareness: 'La versión inglesa revisada añadió una coma antes de la cláusula relativa para aclarar la estructura; la traducción española refleja esa misma relación con una cláusula explicativa bien delimitada: «del Señor, que creó el cielo y la tierra». Se mantuvo el valor de παῖδες como «siervos» por la decisión auditada del POB inglés.'
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος conforme al uso doctrinal del proyecto y a la cita bíblica sobre Dios creador.
  - «Siervos» mantiene la coherencia con el contexto de servicio a Dios y evita la ambigüedad de «hijos» en una declaración pública ante autoridades.
  - La fórmula «el cielo y la tierra» conserva el merismo bíblico estándar y su alcance total.
  - La puntuación española sigue la estructura de habla directa del original, con comillas de apertura y cierre y dos puntos tras «diciendo» para mayor claridad editorial.
