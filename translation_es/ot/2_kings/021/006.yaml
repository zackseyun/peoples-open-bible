translation:
  language: es
  text: Hizo pasar a su hijo por el fuego[a], practicó agüeros y adivinación[b], y consultó a médiums y espiritistas[c]. Hizo mucho mal ante los ojos de Yahvé, provocando su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «sacrificó a su hijo en el fuego». El hebreo dice literalmente «hizo pasar a su hijo por el fuego».'
    reason: alternative_reading
  - marker: b
    text: 'O, más literalmente: «interpretó presagios».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se relacionó con médiums y espiritistas». El hebreo es difícil y puede aludir más ampliamente a la relación con tales practicantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱבִיר אֶת־בְּנוֹ בָּאֵשׁ
  english_pob_choice: He made his son pass through the fire
  chosen_spanish: Hizo pasar a su hijo por el fuego
  alternatives_spanish:
  - Sacrificó a su hijo en el fuego
  - Hizo pasar a su hijo a través del fuego
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y el POB inglés conserva esa forma en el texto principal. En español, "hizo pasar... por el fuego" mantiene el mismo valor textual sin resolver de más el sentido ritual; "sacrificó" quedará como posibilidad interpretativa en nota.
- source_word: וְעוֹנֵן
  english_pob_choice: practiced soothsaying
  chosen_spanish: practicó adivinación
  alternatives_spanish:
  - practicó sortilegios
  - practicó agüeros
  lexicon: HALOT
  rationale: El verbo designa prácticas de pronóstico prohibidas. "Adivinación" es una opción clara y amplia en español, fiel al campo semántico sin cargarlo innecesariamente hacia magia general.
- source_word: וְנִחֵשׁ
  english_pob_choice: divination
  chosen_spanish: sortilegios
  alternatives_spanish:
  - adivinación
  - interpretación de presagios
  lexicon: HALOT
  rationale: Para distinguirlo del término anterior, se eligió "sortilegios" como una forma española natural que conserva el matiz de práctica oculta. La alternativa más literal "adivinación" queda registrada, pero puede sonar redundante junto a la cláusula previa.
- source_word: וְעָשָׂה אוֹב וְיִדְּעֹנִים
  english_pob_choice: consulted mediums and spiritists
  chosen_spanish: consultó a médiums y espiritistas
  alternatives_spanish:
  - consultó a los médiums y a los espiritistas
  - se valió de médiums y espiritistas
  lexicon: HALOT
  rationale: El hebreo es difícil y puede implicar relación con practicantes de ocultismo de manera más amplia. "Consultó a" reproduce bien la idea relacional que el POB inglés adoptó y suena natural en español; "médiums y espiritistas" conserva la distinción léxica para los dos términos hebreos.
- source_word: הִרְבָּה לַעֲשׂוֹת הָרַע
  english_pob_choice: He did much evil
  chosen_spanish: Hizo mucho mal
  alternatives_spanish:
  - Hizo abundantemente el mal
  - Hizo mucho lo malo
  lexicon: HALOT
  rationale: La construcción intensiva de רבה con infinitivo se expresa de forma idiomática en español como "hizo mucho mal". Se preserva la evaluación moral del hebreo sin forzar una literalidad poco natural.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo evaluativo hebreo. "Ante los ojos de Yahvé" mantiene la metáfora de valoración y sigue el criterio del proyecto para el nombre divino.
- source_word: לְהַכְעִיס
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - irritándolo
  - provocando su enojo
  lexicon: HALOT
  rationale: El infinitivo causal expresa el efecto de suscitar la ira divina. "Provocándolo a ira" mantiene la fuerza causativa y una cadencia bíblica sobria en español.
theological_decisions:
- issue: Acción sobre el hijo en el fuego y su posible implicación sacrificial
  english_pob_reading: Retain the Hebrew idiom 'made his son pass through the fire' in the main text
  chosen_spanish_reading: Conservar en el texto principal la forma idiomática 'hizo pasar a su hijo por el fuego'
  alternative_spanish_readings:
  - Sacrificó a su hijo en el fuego
  - Quemó a su hijo en el fuego
  rationale: El hebreo sugiere fuertemente sacrificio infantil, pero la fraseación original es idiomática. La traducción principal conserva esa tensión y evita fijar una reconstrucción más específica de la que el texto hebreo dice explícitamente; la nota recoge la alternativa interpretativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preservar tensión teológica y lexical.'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se aplica el término estándar del proyecto para el Tetragrámaton en español. Se mantiene la transparencia textual y la consistencia terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה/YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que prefirió 'consulted' para וְעָשָׂה אוֹב וְיִדְּעֹנִים y 'did much evil' para הִרְבָּה לַעֲשׂוֹת הָרַע. En español se reflejan esas decisiones con un verbo relacional natural ('consultó a') y una intensificación idiomática ('hizo mucho mal').
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el paralelismo evaluativo 'ante los ojos de Yahvé' para בְּעֵינֵי יְהוָה.
  - Se evita 'SEÑOR' para no ocultar el nombre divino.
  - Se mantiene la tensión entre el idiomatismo hebreo y la implicación de sacrificio infantil sin resolverla en el texto principal.
  - Los términos ocultistas se distinguen en español para reflejar las dos raíces hebreas שונות sin uniformarlas en una sola palabra.
