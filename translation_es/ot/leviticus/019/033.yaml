    issue: Falta una nota léxica correspondiente a לֹא תוֹנוּ.
    rationale: 'El POB inglés incluye una nota con alternativas significativas: «you shall not oppress him» / «you shall not wrong him». La instrucción pide preservar alternativas significativas en notas cuando el inglés las preservó. El borrador español solo conserva la nota cultural de «extranjero». No es un error de traducción principal, pero sí una omisión del rastro auditado.'
  - severity: low
    issue: El marcador de nota está colocado solo en «extranjero», mientras la cláusula verbal también requiere anclaje si se añade la nota léxica.
    rationale: Si se incorpora la nota faltante, debe aparecer un marcador distinto en el lugar relevante del texto, por ejemplo en «maltraten[b]», siguiendo la convención de marcadores únicos en orden.
