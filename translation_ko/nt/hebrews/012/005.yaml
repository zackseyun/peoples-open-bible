source:
  edition: SBLGNT
  text: καὶ ἐκλέλησθε τῆς παρακλήσεως, ἥτις ὑμῖν ὡς υἱοῖς διαλέγεται, Υἱέ μου, μὴ ὀλιγώρει παιδείας κυρίου, μηδὲ ἐκλύου ὑπ’ αὐτοῦ ἐλεγχόμενος·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/012/005.yaml
  text: 'And you have forgotten the exhortation that addresses you as sons: “My son[a], do not regard lightly the Lord’s discipline[c][b], nor lose heart when you are reproved by him.”'
  footnotes:
  - marker: a
    text: Or “as children.” The Greek says “as sons,” echoing the wording of Proverbs and the representative sonship language of the passage.
    reason: lexical_alternative
  - marker: b
    text: “Discipline” can also be understood as “training” or “instruction,” not only punishment.
    reason: lexical_alternative
  - marker: c
    text: Quotation/allusion to Proverbs 3:11.
    reason: cross_reference
translation:
  language: ko
  text: '그리고 여러분은 아들들에게 하시는 권면을 잊었습니다: 「내 아들아, 야훼의 훈련을 가볍게 여기지 말고, 그분에게 책망을 받을 때 낙심하지도 말라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 잠언 3:11-12의 인용. 본 절의 κύριος는 칠십인역에서 히브리어 יהוה를 가린 것이므로 「야훼」로 옮긴다.
    reason: ot_citation
