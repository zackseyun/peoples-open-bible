translation:
  language: es
  text: Despierta la ira y derrama el furor[a]; humilla al enemigo y haz retroceder al adversario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego de Swete difiere marcadamente aquí y presenta una línea sobre «un sello de esmeralda en obra de oro» y «música con vino agradable». El testimonio hebreo está bien atestiguado en la tradición de la Geniza de El Cairo, y aquí se sigue como fuente primaria para este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: העיר
  english_pob_choice: Stir up
  chosen_spanish: Excita
  alternatives_spanish:
  - Despierta
  - Aviva
  - Provoca
  lexicon: HALOT
  rationale: El verbo causativo expresa el acto de despertar o poner en movimiento una emoción intensa. «Excita» conserva la fuerza imperativa y el tono urgente sin sonar demasiado mecánico en español.
- source_word: אף
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - la cólera
  - la nariz
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «nariz», en este paralelo poético el sentido idiomático es «ira». «Ira» mantiene el registro bíblico y deja espacio para el segundo término, חמה, sin neutralizar la repetición.
- source_word: ושפוך
  english_pob_choice: and pour out
  chosen_spanish: y derrama
  alternatives_spanish:
  - y vierte
  - y vacía
  - y derrama por completo
  lexicon: HALOT
  rationale: «Derramar» reproduce la imagen concreta de verter algo líquido o contenido, muy adecuada para expresiones de juicio o cólera en el lenguaje bíblico.
- source_word: חמה
  english_pob_choice: wrath
  chosen_spanish: la furia
  alternatives_spanish:
  - la ira
  - el furor
  - la cólera
  lexicon: HALOT
  rationale: Para distinguirlo de אף sin borrar el paralelismo, «furia» comunica intensidad ardiente y sostiene la duplicación poética de términos de غض? no, de ira sin volverlos idénticos en español.
- source_word: והכניע
  english_pob_choice: humble
  chosen_spanish: humilla
  alternatives_spanish:
  - somete
  - abate
  - rebaja
  lexicon: HALOT
  rationale: El verbo כנע puede significar humillar o subyugar. «Humilla» conserva el movimiento de abatir al adversario y funciona bien en la cadencia paralela del verso.
- source_word: צר
  english_pob_choice: the foe
  chosen_spanish: al enemigo
  alternatives_spanish:
  - al adversario
  - al opresor
  - al rival
  lexicon: HALOT
  rationale: En este contexto de hostilidad, «enemigo» es el equivalente natural y claro en español; mantiene la singularidad del objeto sin introducir matices no apoyados por el texto.
- source_word: והדוף
  english_pob_choice: and drive back
  chosen_spanish: y rechaza
  alternatives_spanish:
  - y ahuyenta
  - y aparta
  - y empuja
  lexicon: HALOT
  rationale: דוף/הדף expresa empujar o hacer retroceder. «Rechaza» transmite la acción de repeler al hostil con una forma breve y solemne, adecuada al paralelismo poético.
- source_word: אויב
  english_pob_choice: the enemy
  chosen_spanish: al adversario
  alternatives_spanish:
  - al enemigo
  - al hostil
  - al que odia
  lexicon: HALOT
  rationale: Para evitar una repetición demasiado plana de «enemigo» y reflejar el segundo término de oposición, «adversario» es una alternativa legítima y elevada en español.
theological_decisions:
- issue: Addressee and implied subject of the imperatives
  english_pob_reading: The verse is rendered as a direct petition to God with second-person imperatives left implicit in English.
  chosen_spanish_reading: Se mantiene el tono de súplica directa sin explicitar el destinatario, porque el hebreo presenta imperativos sin sujeto expreso.
  alternative_spanish_readings:
  - «Oh Yahvé, excita la ira…»
  - Una exhortación impersonal dirigida a un agente humano
  rationale: En español, como en el inglés auditado, añadir el destinatario resolvería una ambigüedad que el texto no resuelve. La oración deja la apelación implícita para respetar el contexto litúrgico y la tensión del original.
  doctrine_reference: Preservar la tensión teológica sin importar un sujeto explícito que el texto no da.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se conserva el seguimiento de la línea hebrea de Kahana como texto principal, con el contraste griego documentado en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no se añade un vocativo inexistente.
  - Se mantiene la distinción entre «ira» y «furia» para reflejar los dos términos hebreos distintos.
  - La frase final evita una duplicación excesiva de «enemigo» mediante «adversario», sin perder el sentido hostil del paralelo.
  - El estilo busca ser publicable y sobrio, sin eco mecánico del inglés auditado.
