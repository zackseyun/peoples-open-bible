translation:
  language: es
  text: Guarda[a], hijo mío, el mandamiento de tu padre, y no abandones la instrucción de tu madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guarda, hijo mío, el mandamiento de tu padre, y no abandones la enseñanza de tu madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְצֹר
  english_pob_choice: Keep
  chosen_spanish: Guarda
  alternatives_spanish:
  - Guarda cuidadosamente
  - Conserva
  lexicon: HALOT
  rationale: נצר expresa la idea de vigilar o guardar con cuidado. «Guarda» comunica bien en español tanto la custodia atenta como la obediencia implícita, y conserva la fuerza proverbial mejor que un simple «sigue».
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: La forma hebrea es masculina singular con sufijo de primera persona. «Hijo mío» preserva la relación vocativa y suena natural en español bíblico y sapiencial.
- source_word: מִצְוַת
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - comando
  lexicon: HALOT
  rationale: מִצְוָה designa un mandato con peso normativo. «Mandamiento» mantiene ese carácter formal y la fuerza de la exhortación parental.
- source_word: אָבִיךָ
  english_pob_choice: your father's
  chosen_spanish: de tu padre
  alternatives_spanish:
  - de tu papá
  - de tu progenitor
  lexicon: HALOT
  rationale: El constructo hebreo se expresa de manera natural en español con «de tu padre». Conserva la relación posesiva sin forzar una calca.
- source_word: תִּטֹּשׁ
  english_pob_choice: do not forsake
  chosen_spanish: no abandones
  alternatives_spanish:
  - no dejes
  - no desprecies
  lexicon: HALOT
  rationale: נטש puede significar dejar, abandonar o forsake. «No abandones» transmite bien la seriedad moral del paralelo y es idiomático en español.
- source_word: תּוֹרַת
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la enseñanza
  - la ley
  lexicon: HALOT
  rationale: En este contexto sapiencial, תּוֹרָה apunta a formación y enseñanza, no primariamente a ley codificada. «Instrucción» refleja mejor ese sentido que «ley».
- source_word: אִמֶּךָ
  english_pob_choice: your mother's
  chosen_spanish: de tu madre
  alternatives_spanish:
  - de tu mamá
  - de tu madre tuya
  lexicon: HALOT
  rationale: El paralelismo con «de tu padre» se conserva naturalmente con «de tu madre». Mantiene la simetría del hebreo y la claridad en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] dentro del texto principal, anclado en la primera palabra para que la nota alternativa quede auditable y bien asociada al verso.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo padre/madre con posesivos naturales en español.
  - Se evitó «ley» para תּוֹרַת porque el contexto es sapiencial y formativo.
  - Se eligió una formulación idiomática y reverente sin mecanizar la sintaxis hebrea.
