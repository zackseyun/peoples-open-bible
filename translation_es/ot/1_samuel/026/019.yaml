review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo y mantiene «Yahvé», la súplica cortesana y la línea argumental principal. Sin embargo, falla en dos puntos exegéticos importantes: 1) אֲרוּרִים הֵם לִפְנֵי יְהוָה es mejor una declaración («están/son malditos») y no un desiderativo («malditos sean»); 2) מֵהִסְתַּפֵּחַ בְּנַחֲלַת יְהוָה no significa «apartarme» sino quedar excluido de tener parte/adherirme en la heredad de Yahvé. También «los hijos de los hombres» suena calcado e innecesario frente al sentido contextual «hombres/seres humanos».'
  spanish_quality_summary: El español es mayormente claro, pero presenta un calco poco natural («los hijos de los hombres») y una formulación que altera el sentido («para que no me aparte»). «Su esclavo» es defendible por la política del proyecto sobre עבד, aunque en registro cortesano puede sonar duro; aun así no es el problema principal. La revisión propuesta mejora fidelidad y legibilidad sin perder dignidad.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé», «dioses», «sirve». No hay conflicto doctrinal mayor. Se corrige la decisión sobre la maldición para reflejar la lectura predicativa documentada en la auditoría inglesa, y se alinea מֵהִסְתַּפֵּחַ con «tener parte»/«adherirme» en vez de «apartarme».'
  issues:
  - severity: high
    issue: «malditos sean ellos delante de Yahvé» convierte una declaración en deseo o imprecación
    rationale: 'El hebreo אֲרוּרִים הֵם funciona mejor como predicación declarativa: «ellos son/están malditos delante de Yahvé». La auditoría inglesa también lo documenta así. El subjuntivo español cambia la fuerza semántica.'
  - severity: high
    issue: «para que no me aparte de la heredad de Yahvé» invierte el sentido de מֵהִסְתַּפֵּחַ
    rationale: El verbo apunta a adherirse, estar agregado o tener parte en la heredad de Yahvé; aquí David lamenta haber sido expulsado de participar en ella. «Apartarme» sugiere que David se aleja voluntariamente o que el foco es separarse, no ser excluido de pertenecer/participar.
  - severity: medium
    issue: «los hijos de los hombres» es un calco poco natural en español actual
    rationale: Aunque formalmente cercano, en este contexto la frase contrasta agentes humanos con Yahvé. «hombres» o «seres humanos» comunica mejor el sentido y la dignidad del registro sin rigidez innecesaria.
  - severity: low
    issue: La nota [b] no corresponde bien al texto principal actual
    rationale: La nota ofrece «de tener parte en la heredad de Yahvé», pero el texto anclado dice «no me aparte», creando desajuste entre nota y redacción principal.
