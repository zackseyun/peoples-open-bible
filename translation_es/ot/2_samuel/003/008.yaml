translation:
  language: es
  text: 'Entonces Abner se enfureció mucho por las palabras de Is-boset, y dijo: «¿Acaso soy yo cabeza de perro[a] que pertenece a Judá? Hoy muestro lealtad de pacto[b] a la casa de Saúl, tu padre, a sus hermanos y a sus amigos, y no te he entregado en la mano de David; y hoy me imputas culpa por esta mujer»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil e insultante: «cabeza de perro» o «cabeza de un perro». La frase probablemente denota desprecio y posible alineamiento con Judá; se mantiene la metáfora sin explicarla del todo en el texto principal.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «hago חֶסֶד». Aquí se refiere a lealtad fiel en un contexto político-relacional; en español se expresa de forma natural como «muestro lealtad de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְאַבְנֵר מְאֹד
  english_pob_choice: Then Abner became very angry
  chosen_spanish: Entonces Abner se enfureció mucho
  alternatives_spanish:
  - Entonces Abner se enojó mucho
  - Entonces Abner ardió de ira
  lexicon: HALOT
  rationale: El hebreo expresa el encenderse de la ira; en español, «se enfureció» comunica con naturalidad la intensidad marcada por מְאֹד sin perder el sentido idiomático.
- source_word: עַל דִּבְרֵי אִישׁ בֹּשֶׁת
  english_pob_choice: because of Ish-bosheth’s words
  chosen_spanish: por las palabras de Is-boset
  alternatives_spanish:
  - a causa de las palabras de Is-boset
  - por lo que dijo Is-boset
  lexicon: HALOT
  rationale: Se mantiene la relación causal de עַל y el sustantivo «palabras» de דִּבְרֵי. «Por» es natural en español y conserva la fuerza del motivo de la ira.
- source_word: הֲרֹאשׁ כֶּלֶב אָנֹכִי אֲשֶׁר לִיהוּדָה
  english_pob_choice: Am I a dog’s head that belongs to Judah?
  chosen_spanish: ¿Acaso soy yo cabeza de perro que pertenece a Judá?
  alternatives_spanish:
  - ¿Soy yo cabeza de perro de Judá?
  - ¿Acaso soy yo la cabeza de un perro, al servicio de Judá?
  lexicon: HALOT
  rationale: Se preserva el insulto figurado «cabeza de perro» porque el POB inglés conserva el tropo. «Que pertenece a Judá» refleja la relación de pertenencia/alineamiento sin cerrar la ambigüedad interpretativa.
- source_word: הַיּוֹם אֶעֱשֶׂה חֶסֶד
  english_pob_choice: Today I show covenant loyalty
  chosen_spanish: Hoy hago lealtad de pacto
  alternatives_spanish:
  - Hoy muestro lealtad de pacto
  - Hoy practico bondad de pacto
  - Hoy hago misericordia
  lexicon: HALOT
  rationale: חֶסֶד en este contexto político-relacional va más allá de «bondad»; «lealtad de pacto» preserva el peso de alianza y fidelidad que el POB inglés explicita como covenant loyalty. «Hago» sigue el valor verbal del hebreo con una fórmula breve y auditable.
- source_word: עִם בֵּית שָׁאוּל אָבִיךָ
  english_pob_choice: to the house of Saul your father
  chosen_spanish: con la casa de Saúl, tu padre
  alternatives_spanish:
  - a la casa de Saúl, tu padre
  - para la casa de Saúl, tu padre
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «to», el hebreo עִם es literalmente «con». En español, «con la casa de Saúl» mantiene mejor el valor relacional de la fidelidad mostrada.
- source_word: אֶל אֶחָיו וְאֶל מֵרֵעֵהוּ
  english_pob_choice: to his brothers, and to his friends
  chosen_spanish: con sus hermanos y con sus amigos
  alternatives_spanish:
  - a sus hermanos y a sus amigos
  - para sus hermanos y para sus amigos
  lexicon: HALOT
  rationale: Se conserva la coordinación relacional de עִם/אֶל en un español fluido. «Hermanos» mantiene la forma concreta del hebreo; «amigos» es suficiente para מֵרֵעֵהוּ.
- source_word: וְלֹא הִמְצִיתִךָ בְּיַד דָּוִד
  english_pob_choice: and have not delivered you into David’s hand
  chosen_spanish: y no te he entregado en la mano de David
  alternatives_spanish:
  - y no te he puesto en la mano de David
  - y no te he entregado al poder de David
  lexicon: HALOT
  rationale: La imagen idiomática de «en la mano de» se conserva para mantener la fuerza política y militar del hebreo; «entregado» reproduce el valor de poner a alguien bajo poder ajeno.
- source_word: וַתִּפְקֹד עָלַי עֲוֺן הָאִשָּׁה
  english_pob_choice: yet today you charge me with guilt concerning this woman
  chosen_spanish: y hoy me imputas culpa por esta mujer
  alternatives_spanish:
  - y hoy me haces responsable de la culpa de esta mujer
  - y hoy me reclamas por la culpa de esta mujer
  lexicon: HALOT
  rationale: פקד עַל con עָוֺן tiene matiz forense/de acusación; «imputas culpa» conserva bien esa carga legal y moral. Se deja «esta mujer» sin nombre, como en el inglés POB, porque el contexto ya la identifica.
theological_decisions:
- issue: Conservar el insulto idiomático sin neutralizarlo
  english_pob_reading: Am I a dog’s head that belongs to Judah?
  chosen_spanish_reading: ¿Acaso soy yo cabeza de perro que pertenece a Judá?
  alternative_spanish_readings:
  - ¿Soy yo cabeza de perro de Judá?
  - ¿Acaso soy yo la cabeza de un perro, al servicio de Judá?
  rationale: El texto presenta una metáfora insultante difícil. Mantenerla evita borrar la tensión lexical y permite al lector percibir el desprecio implícito sin una paráfrasis interpretativa excesiva.
  doctrine_reference: Principio de fidelidad textual; no hay afirmación doctrinal directa, pero sí una decisión hermenéutica sobre lenguaje figurado.
- issue: Hesed como lealtad de pacto en un contexto de alianza política
  english_pob_reading: I show covenant loyalty
  chosen_spanish_reading: Hoy hago lealtad de pacto
  alternative_spanish_readings:
  - Hoy muestro lealtad de pacto
  - Hoy practico bondad de pacto
  - Hoy hago misericordia
  rationale: חֶסֶד aquí no es solo amabilidad; el contexto de casa, lealtad y entrega a la mano de David apunta a fidelidad de alianza. «Lealtad de pacto» preserva esa dimensión sin diluirla en afecto genérico.
  doctrine_reference: Lexicografía bíblica de חֶסֶד; teología del pacto en narrativa de Samuel.
- issue: Imputación de culpa y responsabilidad moral
  english_pob_reading: yet today you charge me with guilt concerning this woman
  chosen_spanish_reading: y hoy me imputas culpa por esta mujer
  alternative_spanish_readings:
  - y hoy me haces responsable de la culpa de esta mujer
  - y hoy me reclamas por la culpa de esta mujer
  rationale: El verbo hebreo puede expresar poner en cuenta o atribuir responsabilidad. «Imputas culpa» conserva el tono legal/moral del reproche y evita suavizarlo.
  doctrine_reference: Responsabilidad moral y lenguaje forense en el AT; cf. uso amplio de פקד en contextos de cuenta/visita/encargo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que cambió «To this day I have shown» por «Today I show» para reflejar con mayor precisión הַיּוֹם. Por eso el español usa una formulación presente («Hoy hago»), no un perfecto retrospectivo. También se preservó la resolución auditada de חֶסֶד como «covenant loyalty» y la metáfora insultante de כֶּלֶב sin convertirla en paráfrasis.
  spanish_consistency_notes:
  - Se mantuvo «casa de Saúl» para conservar el valor dinástico del hebreo.
  - Se usó «Judá» como nombre propio sin artículo, conforme al uso bíblico en español.
  - Se prefirió «mano de David» para reproducir la idiomática de poder/poderío del hebreo.
  - No se añadió nombre propio para «esta mujer», siguiendo el texto fuente y el POB inglés.
