translation:
  language: es
  text: Te daré gracias[b] entre los pueblos[a], Yahvé, y te cantaré alabanzas entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre los pueblos ... entre las naciones», con términos paralelos que expresan la amplitud internacional de la alabanza.'
    reason: lexical_alternative
  - marker: b
    text: O «te alabaré» para «te daré gracias».
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Te confesaré
  lexicon: HALOT
  rationale: El verbo hebreo en contexto salmódico de agradecimiento expresa dar gracias con reconocimiento público; en español, «te daré gracias» comunica mejor ese valor que una simple «alabanza», y conserva el objeto directo de segunda persona.
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las gentes
  - entre las naciones
  lexicon: HALOT
  rationale: «Pueblos» preserva el plural hebreo עַמִּים y el alcance internacional del paralelismo. «Entre» funciona naturalmente en español para el valor locativo/distributivo de la preposición hebrea.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del Tetragrámaton como «Yahvé», siguiendo la política del POB y evitando la sustitución por un título como «SEÑOR». La forma vocativa se integra naturalmente con comas en español.
- source_word: וַאֲזַמֶּרְךָ
  english_pob_choice: and I will sing praise to you
  chosen_spanish: y te cantaré alabanzas
  alternatives_spanish:
  - y te cantaré
  - y haré música para ti
  lexicon: HALOT
  rationale: La raíz זמר en piel suele implicar cantar con intención de alabanza; en español, «cantaré alabanzas» conserva el contenido doxológico y la dimensión musical sin volverse demasiado libre.
- source_word: בַּל
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en
  - por
  lexicon: HALOT
  rationale: Aunque בַּל normalmente es una partícula negativa, aquí el audit trail inglés la trata como lectura poética paralela a ב; en español se refleja esa función con el mismo valor relacional «entre», manteniendo el paralelismo sintáctico sin forzar una traducción literal de la forma aislada.
- source_word: אֻמִּים
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: Se diferencia de עַמִּים mediante «naciones», que en español mantiene el contraste poético e internacional del hebreo y evita repetir «pueblos» en ambos hemistiquios.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia con el POB, se conserva el nombre propio de Dios en vez de una sustitución reverencial. «Yahvé» es la forma estándar adoptada en el proyecto y mantiene la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios sustantivos y fue marcada como sin cambios; el presente borrador sigue esa lectura estable, manteniendo el paralelismo entre los dos miembros y la decisión explícita de traducir el Tetragrámaton como Yahvé.
  spanish_consistency_notes:
  - Se conserva el paralelismo hebreo mediante dos miembros coordinados con «entre».
  - «Pueblos» / «naciones» diferencia los dos términos hebreos sin neutralizarlos.
  - La nota sobre «te daré gracias» preserva la alternativa de lectura donde «alabar» puede captar el valor contextual de la raíz.
