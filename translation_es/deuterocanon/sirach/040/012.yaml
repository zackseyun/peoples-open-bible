translation:
  language: es
  text: Toda dádiva[a] y toda injusticia serán borradas[b], pero la fidelidad[c] permanecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regalo» o «don». El griego δῶρον significa literalmente un obsequio o dádiva. Un testimonio hebreo más antiguo parece reflejar una lectura relacionada con «préstamo», pero el texto griego base aquí dice δῶρον.
    reason: textual_variant
  - marker: b
    text: El verbo griego expresa ser borrado, eliminado o quitado de en medio; la traducción conserva esa imagen de desaparición.
    reason: lexical_alternative
  - marker: c
    text: O «la fe». El griego πίστις puede significar «fe» o «fidelidad»; aquí el texto principal prefiere «fidelidad» por el contexto sapiencial y el contraste con «injusticia».
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶν
  english_pob_choice: every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada
  lexicon: LSJ
  rationale: El griego distributivo abarca la totalidad de los casos en vista. En español, «todo» transmite esa amplitud de manera natural y breve con los sustantivos singulares abstractos que siguen.
- source_word: δῶρον
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - don
  - ofrenda
  - presente
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «gift», en español «regalo» comunica con claridad el sentido básico de δῶρον como obsequio. No se adopta «ofrenda» porque el contexto griego no lo marca cultualmente, ni «don» por sonar más abstracto o eclesiástico de lo necesario.
- source_word: ἀδικία
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - mal
  - iniquidad
  lexicon: LSJ
  rationale: «Injusticia» conserva la fuerza ética y social de ἀδικία sin desplazar el término hacia matices más morales o teológicos que el contexto inmediato no exige.
- source_word: ἐξαλειφθήσεται
  english_pob_choice: will be wiped away
  chosen_spanish: será borrado
  alternatives_spanish:
  - será borrada
  - será borrado por completo
  - será borrado/aniquilado
  lexicon: LSJ
  rationale: El verbo expresa eliminación o borrado. En español, «será borrado» mantiene la imagen de desaparición/borramiento y funciona bien con los dos objetos coordinados del versículo.
- source_word: πίστις
  english_pob_choice: faithfulness
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la fidelidad perseverante
  - la confianza
  lexicon: LSJ
  rationale: Aunque el expediente inglés señala la posibilidad de «faithfulness», el lema πίστις admite también «fe». En español, «la fe» es la opción más natural y mantiene abierta la tensión semántica entre fe, fidelidad y confianza, que el texto griego no resuelve de forma exclusiva.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  - para la eternidad
  lexicon: LSJ
  rationale: La locución idiomática expresa permanencia continua. «Para siempre» es la equivalencia española más clara y directa.
- source_word: στήσεται
  english_pob_choice: will stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá en pie
  - estará firme
  - permanecerá en pie
  lexicon: LSJ
  rationale: El griego conserva la imagen de estar en pie o permanecer firme. En español, «permanecerá» comunica la idea de estabilidad duradera con fluidez natural; la imagen concreta se preserva en las alternativas.
theological_decisions:
- issue: Valor de πίστις en el cierre del versículo
  english_pob_reading: faithfulness
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: El contexto sapiencial puede apoyar una virtud estable como «fidelidad», y el audit trail inglés incluso revisó la línea hacia «faithfulness». Sin embargo, el griego πίστις es semánticamente amplio y en español «la fe» sigue siendo una traducción legítima y reconocible; se evita cerrar el sentido de forma más específica de lo que el original exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives faithfulness, trust'
- issue: Posible trasfondo textual del término δῶρον
  english_pob_reading: gift
  chosen_spanish_reading: regalo
  alternative_spanish_readings:
  - préstamo
  - don
  rationale: La nota inglesa observa que el testimonio hebreo antiguo sugiere una lectura relacionada con «loan», pero el testimonio griego base aquí lee δῶρον. En el texto principal se mantiene la lectura griega y se evita introducir una solución interpretativa no marcada por el griego.
  doctrine_reference: Texto base griego Swete LXX 1909; la variante hebrea se conserva como nota de referencia textual
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente que cambió «faith» por «faithfulness» para reflejar mejor πίστις en contraste con ἀδικία. En español se evaluó esa decisión, pero se optó por «la fe» en el texto principal porque πίστις sigue siendo semánticamente amplia y la versión española debe conservar la tensión interpretativa sin cerrarla indebidamente. También se atendió la variante textual sugerida por el testimonio hebreo respecto de δῶρον, manteniéndose la lectura griega base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - Se mantiene un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - No se sustituye «fe» por «fidelidad» en el cuerpo porque el expediente muestra esa ambivalencia como alternativa, no como resolución obligatoria.
  - «Regalo» se eligió por claridad natural en español; las notas conservan la posibilidad de «don».
