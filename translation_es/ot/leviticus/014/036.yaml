translation:
  language: es
  text: Entonces el sacerdote mandará que vacíen la casa antes de que el sacerdote entre a inspeccionar[a] la zona afectada[b], para que no quede impuro[c] todo lo que hay en la casa; y después el sacerdote entrará a inspeccionar la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a ver» o «a examinar». Aquí לִרְאוֹת tiene el sentido de inspección oficial sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «la marca», «la infección» o tradicionalmente «la plaga». Hebreo נֶגַע se refiere al punto o condición afectada bajo inspección sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo טָמֵא: impureza ritual, no necesariamente culpa moral.'
    reason: theological_note
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: Then ... shall command
  chosen_spanish: Entonces ... mandará
  alternatives_spanish:
  - Y ... mandará
  - Entonces ... ordenará
  lexicon: HALOT
  rationale: En el hebreo legal, el waw consecutivo marca secuencia procedimental; «entonces» expresa bien el paso siguiente. «Mandará» conserva el carácter oficial de la instrucción sin sonar forzado en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: En Levítico, כֹּהֵן designa al sacerdote levítico. «Sacerdote» es el equivalente natural y transparente en español bíblico moderno.
- source_word: וּפִנּוּ
  english_pob_choice: that they empty
  chosen_spanish: que vacíen
  alternatives_spanish:
  - que desalojen
  - que saquen todo de
  lexicon: HALOT
  rationale: El verbo implica retirar el contenido de la casa. «Vacíen» reproduce con claridad la acción requerida por el mandato y evita una paráfrasis más larga.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la vivienda
  - el edificio
  lexicon: HALOT
  rationale: Aquí se trata del inmueble bajo inspección ritual; «casa» es la forma natural en español y mantiene el sentido concreto del hebreo.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes que
  - previo a que
  lexicon: HALOT
  rationale: Marca prioridad temporal; «antes de que» es idiomático y preciso en español.
- source_word: לִרְאוֹת
  english_pob_choice: to inspect
  chosen_spanish: inspeccionar
  alternatives_spanish:
  - examinar
  - ver
  lexicon: HALOT
  rationale: En este contexto sacerdotal de diagnóstico ritual, «inspeccionar» comunica la función oficial mejor que un simple «ver».
- source_word: הַנֶּגַע
  english_pob_choice: the diseased area
  chosen_spanish: la afección
  alternatives_spanish:
  - el mal
  - la marca
  - la plaga
  lexicon: HALOT
  rationale: נֶגַע puede referir al punto o condición afectada. «Afección» conserva la idea de un estado/lesión visible sin cargar el texto con una opción técnica o tradicional más interpretativa.
- source_word: וְלֹא יִטְמָא
  english_pob_choice: so that ... may not become unclean
  chosen_spanish: para que no se vuelva impuro
  alternatives_spanish:
  - para que no quede impuro
  - para que no se contamine ritualmente
  - y no se vuelva impuro
  lexicon: HALOT
  rationale: טמא en Levítico es impureza ritual, no necesariamente moral. «Se vuelva impuro» reproduce el proceso verbal y mantiene el valor ceremonial.
- source_word: כָּל אֲשֶׁר בַּבָּיִת
  english_pob_choice: everything in the house
  chosen_spanish: nada de lo que hay en la casa
  alternatives_spanish:
  - todo lo que hay en la casa
  - todo cuanto está en la casa
  lexicon: HALOT
  rationale: 'La construcción apunta al contenido de la casa. En español, «nada de lo que hay en la casa» refleja el efecto preventivo: que ningún objeto resulte impuro.'
- source_word: וְאַחַר כֵּן
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - después de eso
  lexicon: HALOT
  rationale: Expresa la siguiente etapa del procedimiento ritual con naturalidad y sin añadir matices ajenos.
- source_word: לִרְאוֹת אֶת הַבַּיִת
  english_pob_choice: to inspect the house
  chosen_spanish: a inspeccionar la casa
  alternatives_spanish:
  - a examinar la casa
  - a ver la casa
  lexicon: HALOT
  rationale: La repetición de לִרְאוֹת se conserva con el mismo verbo funcional. «Inspeccionar» mantiene la coherencia de un examen sacerdotal formal.
theological_decisions:
- issue: Impureza ritual en טמא
  english_pob_reading: render טמא as 'become unclean'
  chosen_spanish_reading: «se vuelva impuro»
  alternative_spanish_readings:
  - «quede impuro»
  - «se contamine ritualmente»
  - «se vuelva inmundo»
  rationale: Se preserva la distinción levítica entre impureza ritual y culpa moral. «Impuro» es claro en español moderno; «ritualmente» no es necesario porque el contexto ya es cultual.
  doctrine_reference: Levítico 11–15; pureza ritual sacerdotal
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el hilo auditado en inglés. La principal decisión fue mantener el lenguaje de inspección sacerdotal con «inspeccionar» y preservar la impureza ritual con «impuro», evitando una moralización del término טמא. También se ajustó la sintaxis española para expresar con naturalidad la secuencia procedimental del mandato.
  spanish_consistency_notes:
  - Se mantuvo «sacerdote» para כֹּהֵן en todo el versículo.
  - Se usó «inspeccionar» de forma consistente para לִרְאוֹת en ambos casos.
  - Se evitó «SEÑOR» u otra convención de reemplazo, pues no aparece el nombre divino en este versículo.
  - «Casa» se conservó para בַּיִת como término concreto del objeto ritual inspeccionado.
