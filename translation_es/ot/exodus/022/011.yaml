translation:
  language: es
  text: Pero si le es robado[a], deberá hacer restitución a su dueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «si robando es robado de con él»; construcción enfática que puede expresarse como «si de veras le es robado» o «si realmente es robado mientras está bajo su custodia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En español, "pero si" conserva el valor adversativo-condicional del hebreo dentro de la serie legal, sin sonar forzado.
- source_word: גָּנֹב יִגָּנֵב
  english_pob_choice: it is stolen
  chosen_spanish: es robado
  alternatives_spanish:
  - es sustraído
  - es hurtado
  lexicon: HALOT
  rationale: El infinitivo absoluto + verbo finito intensifica la acción; en español, "es robado" comunica bien el hecho pasivo de pérdida sin sobretraducir la intensidad con una glosa en el texto principal.
- source_word: מֵעִמּוֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su custodia
  - de su poder
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice "de con él"; en español, "de él" es natural y permite que el contexto legal exprese la idea de tenencia o custodia.
- source_word: יְשַׁלֵּם
  english_pob_choice: he shall make restitution
  chosen_spanish: deberá restituirlo
  alternatives_spanish:
  - deberá pagar compensación
  - deberá resarcirlo
  lexicon: HALOT
  rationale: En contexto legal, el verbo piʿel de שלם expresa compensación/restitución. "Restituirlo" mantiene la fuerza jurídica mejor que un simple "pagar".
- source_word: לִבְעָלָיו
  english_pob_choice: to its owner
  chosen_spanish: a su dueño
  alternatives_spanish:
  - a su propietario
  - al dueño de ello
  lexicon: HALOT
  rationale: בעל aquí designa al poseedor legítimo; "dueño" es el equivalente natural en español y conserva la relación de pertenencia del objeto perdido o robado.
translation_notes:
  revision_awareness: 'La redacción sigue el mismo sentido confirmado por la revisión inglesa más reciente: se evita añadir énfasis no presente en el hebreo, pero se conserva la idea legal de robo real durante la custodia.'
  spanish_consistency_notes:
  - Se usa "dueño" para בעל en este contexto legal, no "señor" ni "amo", porque el referente es la persona con derecho de propiedad sobre el objeto.
  - Se evita "SEÑOR" para el nombre divino porque no aparece en este versículo.
  - '"Restituir" conserva el matiz jurídico de compensación exigido por el verbo hebreo en ley casuística.'
