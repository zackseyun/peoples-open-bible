  text: עַל חַטֹּ֤אות יָרָבְעָם֙ אֲשֶׁ֣ר חָטָ֔א וַ/אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵ֑ל בְּ/כַעְס֕/וֹ אֲשֶׁ֣ר הִכְעִ֔יס אֶת יְהוָ֖ה אֱלֹהֵ֥י יִשְׂרָאֵֽל־־־׃
