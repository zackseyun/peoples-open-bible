translation:
  language: es
  text: Y los hijos del extranjero[a] que se unen a Yahvé, para ministrarle, y para amar el nombre de Yahvé, para ser sus siervos[b]—todos los que guardan el sábado sin profanarlo y se aferran a mi pacto[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los extranjeros'. El hebreo dice literalmente 'los hijos del extranjero'.
    reason: lexical_alternative
  - marker: b
    text: O 'para ser sus esclavos'.
    reason: lexical_alternative
  - marker: c
    text: O 'y se mantienen firmes en mi pacto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי הַנֵּכָר
  english_pob_choice: the sons of the foreigner
  chosen_spanish: los hijos del extranjero
  alternatives_spanish:
  - los extranjeros
  - los hijos de extranjeros
  - los hijos de la tierra extranjera
  lexicon: HALOT
  rationale: Conservo la imagen nominal hebrea con un equivalente natural en español. 'Hijos' refleja el giro idiomático y mantiene la concreción del original, mientras que 'extranjero' comunica el valor de הַנֵּכָר sin generalizarlo de más.
- source_word: הַנִּלְוִים עַל יְהוָה
  english_pob_choice: who join themselves to Yahweh
  chosen_spanish: que se unen a Yahvé
  alternatives_spanish:
  - que se adhieren a Yahvé
  - que se allegan a Yahvé
  - que se vinculan a Yahvé
  lexicon: HALOT
  rationale: El participio nifal expresa adhesión/alianza voluntaria. 'Se unen a' es idiomático en español y conserva la idea de incorporación leal al Señor.
- source_word: לְשָׁרְתוֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  - para ejercer su ministerio ante él
  lexicon: HALOT
  rationale: '''Ministrar'' preserva el matiz cultual y reverente que el audit trail inglés quiso distinguir de un mero ''servir''. En español eclesial es comprensible y mantiene el registro elevado.'
- source_word: וּלְאַהֲבָה אֶת שֵׁם יְהוָה
  english_pob_choice: and to love the name of Yahweh
  chosen_spanish: y para amar el nombre de Yahvé
  alternatives_spanish:
  - y para amar el nombre de Yahvé
  - y para amar el nombre de Yahvéh
  - y para amar el nombre del Señor
  lexicon: HALOT
  rationale: Sigo la decisión del proyecto de mantener el nombre divino como 'Yahvé'. 'El nombre de Yahvé' conserva la expresión concreta del hebreo, sin reducirla a una perífrasis devocional.
- source_word: לִהְיוֹת לוֹ לַעֲבָדִים
  english_pob_choice: to be his servants
  chosen_spanish: para ser sus siervos
  alternatives_spanish:
  - para ser sus esclavos
  - para ser sus servidores
  lexicon: HALOT
  rationale: Aquí el contexto es de servicio culto-covenantal, no de esclavitud legal. 'Siervos' comunica adecuadamente esa relación en español bíblico actual sin perder el vínculo de pertenencia.
- source_word: כָּל שֹׁמֵר שַׁבָּת מֵחַלְּלֹו
  english_pob_choice: all who keep the Sabbath from profaning it
  chosen_spanish: todos los que guardan el sábado sin profanarlo
  alternatives_spanish:
  - todos los que guardan el sábado sin quebrantarlo
  - todos los que guardan el sábado sin desecrarlo
  lexicon: HALOT
  rationale: '''Guardar el sábado'' es una equivalencia clara y natural. ''Sin profanarlo'' mantiene el registro de קדושה/חלל del texto; ''profanar'' reproduce mejor la oposición entre santidad y profanación que opciones más explicativas.'
- source_word: וּמַחֲזִיקִים בִּבְרִיתִי
  english_pob_choice: and hold fast my covenant
  chosen_spanish: y se mantienen firmes en mi pacto
  alternatives_spanish:
  - y se aferran a mi pacto
  - y sostienen mi pacto
  - y se mantienen firmes en mi pacto
  lexicon: HALOT
  rationale: El verbo denota aferrar/retener con firmeza. En español, 'mantenerse firmes en mi pacto' expresa la perseverancia y lealtad pactal con buena fluidez. 'Pacto' es la forma más natural y bíblica para בְּרִית.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el Señor
  lexicon: HALOT
  rationale: 'Sigo el default del proyecto para el Tetragrámaton: ''Yahvé''. Esta forma preserva el nombre propio divino sin sustituirlo por un título.'
theological_decisions:
- issue: Inclusión de extranjeros en la comunidad del pacto
  english_pob_reading: Retain the concrete phrase 'sons of the foreigner' while presenting their full inclusion through covenantal verbs ('join themselves,' 'minister,' 'love,' 'be his servants').
  chosen_spanish_reading: Mantener la imagen concreta de 'los hijos del extranjero' y expresar su plena adhesión mediante los verbos de unión, ministerio, amor y servicio.
  alternative_spanish_readings:
  - simplificar a 'los extranjeros'
  - interpretar el pasaje como una integración ya plenamente institucionalizada
  rationale: 'El verso no borra la alteridad de origen, pero sí afirma una incorporación real y activa al culto y al pacto de Yahvé. La traducción conserva ambas cosas: la procedencia extranjera y la alianza voluntaria.'
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Matiz de עֲבָדִים
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - servidores
  rationale: '''Siervos'' funciona mejor en español para una relación de pertenencia y servicio religioso. ''Esclavos'' sería demasiado fuerte para este contexto, aunque el campo semántico de dependencia está presente.'
  doctrine_reference: Translation philosophy §1; Contested terms table by analogy
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una construcción distributiva plural ('todos los que...') y mantener el paralelismo verbal con el cierre pactal. También conserva la decisión revisada de no convertir el cierre en singular y de sostener la secuencia de verbos de adhesión, culto y fidelidad. No se introdujeron ampliaciones doctrinales ajenas al hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, en coherencia con el estándar del proyecto.
  - Se conserva 'pacto' para בְּרִית y 'sábado' para שַׁבָּת, evitando sustituciones tradicionales no auditadas.
  - '''Ministrar'' y ''siervos'' sostienen un registro culto sin borrar el matiz de servicio devocional.'
  - La puntuación con raya introduce correctamente el tramo final distributivo y pactal, en paralelo al texto fuente y al inglés auditado.
