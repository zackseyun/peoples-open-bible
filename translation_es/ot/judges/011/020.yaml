translation:
  language: es
  text: Pero Sijón no confió en Israel[a] para pasar por su territorio. Entonces Sijón reunió a todo su pueblo[b], y ellos acamparon en Jahaz, y peleó contra Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no creyó a Israel» o, por implicación, «no confió en Israel lo suficiente como para dejarlo pasar».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo su pueblo»; el texto no dice explícitamente «ejército», aunque el contexto es militar.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «peleó con Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמִין
  english_pob_choice: did not trust
  chosen_spanish: no confió en
  alternatives_spanish:
  - no creyó en
  - no tuvo confianza en
  lexicon: HALOT
  rationale: El verbo hiphil de אמן aquí expresa poner confianza en alguien. En español, «no confió en» conserva bien esa fuerza relacional y evita la ambigüedad de «no creyó», que puede sonar demasiado intelectual o doctrinal en este contexto.
- source_word: עֲבֹר
  english_pob_choice: to pass through
  chosen_spanish: dejarlo pasar
  alternatives_spanish:
  - pasar
  - atravesar
  lexicon: HALOT
  rationale: El infinitivo con בְּגְבוּלוֹ pide la idea de tránsito por un territorio. «Dejarlo pasar» comunica el resultado práctico de permitir el paso y suena natural en español sin perder el sentido de tránsito.
- source_word: בִּגְבֻלוֹ
  english_pob_choice: through his territory
  chosen_spanish: por su territorio
  alternatives_spanish:
  - por su frontera
  - dentro de sus límites
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio. Aquí el contexto es el paso de un pueblo por una zona controlada por Sehón, así que «por su territorio» preserva la referencia geográfica amplia y la situación política.
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: HALOT
  rationale: Aunque «gathered» se puede traducir literalmente por «reunió» o «juntó», «reunió» expresa bien la acción de concentrar a la gente para una respuesta militar sin introducir explícitamente «ejército», que no aparece en el hebreo.
- source_word: כָּל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - a toda su gente
  - a todo su pueblo y sus hombres
  lexicon: HALOT
  rationale: El texto dice literalmente «todo su pueblo», no «su ejército». Se conserva esa formulación para respetar el hebreo y la nota auditada de que el contexto es militar aunque el término no lo explicite.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - se acamparon
  - hicieron campamento
  lexicon: HALOT
  rationale: El verbo plural concuerda con «todo su pueblo». «Acamparon» es claro y natural en español bíblico moderno, y mantiene la idea de establecimiento militar o de campaña sin sobreespecificar.
- source_word: בְּיָהְצָה
  english_pob_choice: at Jahaz
  chosen_spanish: en Jahaz
  alternatives_spanish:
  - junto a Jahaz
  - en Yáhaza
  lexicon: HALOT
  rationale: El topónimo se conserva como «Jahaz», de uso habitual en transliteración bíblica. «En» corresponde al lugar de acampada sin forzar una ubicación más precisa que la del hebreo.
- source_word: וַיִּלָּחֶם עִם
  english_pob_choice: he fought against Israel
  chosen_spanish: peleó contra Israel
  alternatives_spanish:
  - luchó contra Israel
  - hizo guerra contra Israel
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «peleó con», el inglés POB ya reconoció la lectura natural «against» por el sentido adversarial. En español, «contra Israel» expresa con claridad esa oposición sin perder la tensión literal del preposición עִם.
theological_decisions:
- issue: Preposición adversarial en וַיִּלָּחֶם עִם
  english_pob_reading: he fought against Israel
  chosen_spanish_reading: peleó contra Israel
  alternative_spanish_readings:
  - peleó con Israel
  - hizo guerra contra Israel
  rationale: La preposición hebrea עִם puede traducirse literalmente «con», pero el contexto narrativo es de hostilidad. «Contra» preserva el sentido adversarial reconocido en la revisión inglesa, sin borrar la huella formal del hebreo en la nota lexical.
  doctrine_reference: No aplica; decisión de sentido contextual y retórico.
translation_notes:
  revision_awareness: La revisión inglesa cambió la traducción de the literal 'fought with Israel' a 'fought against Israel' por naturalidad y precisión contextual. La presente versión española sigue esa decisión contextual, pero deja constancia de la literalidad hebrea en la nota final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Sijón»/«Sijón» conforme a la transliteración española estándar del nombre Sihon; aquí se ha optado por «Sijón».
  - Se conserva «Jahaz» como topónimo tradicional, sin adaptar a una forma explicativa.
  - No se introduce «ejército» en el texto principal porque el hebreo dice «todo su pueblo».
