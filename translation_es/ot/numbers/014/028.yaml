translation:
  language: es
  text: 'Diles[a]: «Vivo yo, declara Yahvé, que tal como hablaron a mis oídos, así haré con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «Vivo yo … si no»; es una fórmula de juramento que aquí expresa una afirmación solemne, algo como «ciertamente» o «sin falta».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Diles
  - Habla
  lexicon: HALOT
  rationale: Imperativo masculino singular de אמר dirigido a Moisés; «Di» conserva la orden directa y natural en español sin añadir contenido.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a ellos mismos
  - para ellos
  lexicon: HALOT
  rationale: La preposición indica el destinatario del mandato; «a ellos» es la equivalencia directa y clara.
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Vivo estoy
  - Por mi vida
  lexicon: HALOT
  rationale: Se trata de la fórmula de juramento divino. En español, «Vivo yo» preserva la solemnidad y la autoafirmación del hebreo sin introducir una perífrasis menos natural.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: 'El hebreo introduce una fórmula oracular. En español, dentro de esta línea se integra con una aposición breve: «Vivo yo, Yahvé», preservando el nombre divino del texto fuente y evitando la sustitución por «SEÑOR».'
- source_word: אִם לֹא
  english_pob_choice: (omitted in latest English revision)
  chosen_spanish: —
  alternatives_spanish:
  - ciertamente
  - sin duda
  lexicon: HALOT
  rationale: En este contexto el hebreo funciona como parte de la fórmula de juramento y no exige un equivalente léxico adicional en español si la solemnidad ya queda expresada por «Vivo yo».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la correspondencia exacta entre lo dicho por ellos y la acción divina; «como» es la opción más natural y suficiente en español.
- source_word: דִּבַּרְתֶּם
  english_pob_choice: you have spoken
  chosen_spanish: habéis hablado
  alternatives_spanish:
  - hablasteis
  - habéis dicho
  lexicon: HALOT
  rationale: El perfecto hebreo enlaza el discurso pasado con la respuesta venidera; el pretérito perfecto compuesto conserva bien esa relación en español.
- source_word: בְּאָזְנָי
  english_pob_choice: in my hearing
  chosen_spanish: en mis oídos
  alternatives_spanish:
  - ante mí
  - a mis oídos
  lexicon: HALOT
  rationale: La imagen hebrea es literal; «en mis oídos» mantiene la fuerza idiomática original sin perder inteligibilidad en español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de igual manera
  lexicon: HALOT
  rationale: Marca la correspondencia de resultado entre lo que dijeron y lo que Yahvé hará; «así» es breve y fiel.
- source_word: אֶעֱשֶׂה לָכֶם
  english_pob_choice: I will do to you
  chosen_spanish: haré con vosotros
  alternatives_spanish:
  - haré a vosotros
  - actuaré contra vosotros
  lexicon: HALOT
  rationale: En este contexto de juicio, la acción divina se dirige contra el pueblo. «Haré con vosotros» reproduce la construcción relacional sin volverla torpemente literal; se evita «para vosotros» por su sentido benéfico inapropiado.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto tal como exige la norma del proyecto en español, en lugar de enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Force of the oath formula חַי אָנִי ... אִם לֹא
  english_pob_reading: As I live ... just as ... so I will do to you
  chosen_spanish_reading: Vivo yo ... como ... así haré con vosotros
  alternative_spanish_readings:
  - Por mi vida ... como ... así haré con vosotros
  - Vivo yo ... ciertamente ...
  rationale: El juramento divino queda comunicado por la autoafirmación «Vivo yo»; no hace falta añadir un adverbio equivalente a «surely» porque el carácter solemne ya se expresa en la fórmula completa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish, preserving source force without unnecessary additions'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó el añadido explícito de «surely» porque la fórmula de juramento ya bastaba. En español se siguió ese mismo criterio: no se añadió un equivalente adverbial independiente, y se optó por una formulación breve que conserve el peso del juramento y la correspondencia retórica del hebreo.'
  spanish_consistency_notes:
  - Se conservó Yahvé, conforme al término técnico del proyecto para el Tetragrámaton.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - Se mantuvo un registro bíblico sobrio y moderno, sin arcaísmos innecesarios.
  - La relación verbal final se expresó con una construcción natural en español que conserva el sentido de juicio dirigido hacia el pueblo.
