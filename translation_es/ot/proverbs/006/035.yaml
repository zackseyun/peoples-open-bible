translation:
  language: es
  text: No aceptará ningún rescate[a], ni se dará por satisfecho[b] aunque multipliques los sobornos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'no levantará el rostro de ningún rescate', un modismo que expresa que no mostrará favor aceptando el pago.
    reason: lexical_alternative
  - marker: b
    text: O 'no consentirá'; es decir, no se dejará apaciguar aunque se ofrezcan muchos sobornos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא פְּנֵי
  english_pob_choice: will accept
  chosen_spanish: aceptará
  alternatives_spanish:
  - levantará el rostro de
  - mostrará favor a
  - tomará en cuenta
  lexicon: HALOT
  rationale: El hebreo es un modismo literal de 'levantar el rostro de', pero en este contexto, con כֹּפֶר como objeto, expresa la idea de aceptar una compensación para mostrar favor. 'Aceptará' comunica de forma natural y fiel que no recibirá ni admitirá ese pago.
- source_word: כָל כֹּפֶר
  english_pob_choice: no ransom
  chosen_spanish: ningún rescate
  alternatives_spanish:
  - ninguna compensación
  - ningún pago de apaciguamiento
  - ningún rescate compensatorio
  lexicon: HALOT
  rationale: כֹּפֶר puede referir a rescate, compensación o pago para apaciguar. 'Rescate' conserva bien la fuerza compensatoria del término y suena natural en español; 'ningún' refleja el alcance total de 'all'.
- source_word: יֹאבֶה
  english_pob_choice: will be satisfied
  chosen_spanish: se dará por satisfecho
  alternatives_spanish:
  - consentirá
  - querrá aceptar
  - se dejará apaciguar
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar 'querer/consentir', el contexto de los sobornos múltiples exige la idea de no quedar apaciguado. 'Se dará por satisfecho' reproduce esa fuerza contextual en español sin perder la negativa del hebreo.
- source_word: כִּי תַרְבֶּה
  english_pob_choice: though you multiply
  chosen_spanish: aunque multipliques
  alternatives_spanish:
  - aunque aumentes
  - aunque hagas muchos
  - aunque los incrementes
  lexicon: HALOT
  rationale: La partícula כִּי es concesiva aquí. 'Aunque multipliques' conserva el valor concesivo y la segunda persona singular implícita, como en el inglés auditado.
- source_word: שֹׁחַד
  english_pob_choice: bribes
  chosen_spanish: sobornos
  alternatives_spanish:
  - coimas
  - dádivas
  - pagos
  lexicon: HALOT
  rationale: שֹׁחַד denota soborno. 'Sobornos' es el equivalente claro y directo en español, y mantiene la carga ética negativa presente en el contexto.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en esta revisión; el español sigue de cerca el hebreo y conserva el modismo subyacente mediante una nota lexical.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Rescate'' se eligió para כֹּפֶר por su capacidad de reflejar tanto compensación como precio para apaciguar, sin introducir un matiz jurídico ajeno.'
  - '''Sobornos'' traduce שֹׁחַד con su connotación negativa y evita suavizar el término como ''regalos''.'
