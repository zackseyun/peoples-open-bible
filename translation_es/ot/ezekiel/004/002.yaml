translation:
  language: es
  text: Y pondrás un asedio contra ella, y construirás una muralla de asedio[a] contra ella, y levantarás un terraplén[b] contra ella, y pondrás campamentos contra ella, y colocarás arietes contra ella por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'torre de asedio' para דָּיֵק; el término hebreo denota una estructura de asalto y puede referirse a una fortificación elevada levantada contra la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O 'rampa de asedio' para סֹלְלָה, es decir, un terraplén de tierra acumulada contra una muralla.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצוֹר
  english_pob_choice: a siege
  chosen_spanish: un sitio de asedio
  alternatives_spanish:
  - un asedio
  - sitio
  - bloqueo
  lexicon: HALOT
  rationale: El hebreo designa la acción/estado de asediar una ciudad. 'Sitio de asedio' conserva el valor militar y la dirección hostil del contexto, sin reducirlo a una mera abstracción.
- source_word: דָּיֵק
  english_pob_choice: a siege wall
  chosen_spanish: una muralla de asedio
  alternatives_spanish:
  - una torre de asedio
  - un muro de asedio
  - una fortificación de asedio
  lexicon: HALOT
  rationale: El término hebreo apunta a una estructura levantada para el ataque en un sitio militar. 'Muralla de asedio' mantiene la idea de una obra construida contra la ciudad, sin decidir de forma demasiado estrecha entre muro, torre o fortificación.
- source_word: סֹלְלָה
  english_pob_choice: a ramp
  chosen_spanish: un terraplén
  alternatives_spanish:
  - una rampa de asedio
  - un montículo
  - un talud
  lexicon: HALOT
  rationale: La imagen es la de un terraplén o alzamiento de tierra para el asalto. 'Terraplén' es natural en español y conserva el componente de obra elevada hecha para atacar una muralla.
- source_word: מַחֲנוֹת
  english_pob_choice: camps
  chosen_spanish: campamentos
  alternatives_spanish:
  - campamentos militares
  - cuarteles
  - cuerpos de tropa
  lexicon: HALOT
  rationale: En este contexto militar plural, 'campamentos' comunica bien la disposición de fuerzas alrededor de la ciudad. Se evita 'ejércitos', porque el hebreo no usa aquí el término habitual para ejército.
- source_word: כָּרִים
  english_pob_choice: battering rams
  chosen_spanish: arietes
  alternatives_spanish:
  - arietes de asedio
  - rams
  - carneros
  lexicon: HALOT
  rationale: El sentido militar es claro por el contexto de asedio. 'Arietes' es el equivalente técnico y más natural en español; 'carneros' sería engañoso y se descarta.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - encima de ella
  - contra ello
  lexicon: HALOT
  rationale: En español, 'contra ella' expresa mejor la acción hostil dirigida al objeto sitiado. 'Ella' concuerda con la ciudad representada en el acto profético.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - en derredor de ella
  - todo alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La palabra marca cerco completo. 'Alrededor de ella' reproduce de forma clara y natural la idea de circunvalación total.
- source_word: וְנָתַתָּה / וּבָנִיתָ / וְשָׁפַכְתָּ / וְשִׂים
  english_pob_choice: set / build / heap up / set / place
  chosen_spanish: pondrás / construirás / levantarás / pondrás / colocarás
  alternatives_spanish:
  - pondrás / edificarás / amontonarás / pondrás / pondrás
  - establecerás / levantarás / echarás / pondrás / pondrás
  lexicon: HALOT
  rationale: La secuencia hebrea encadena instrucciones concretas. En español, la alternancia de verbos mantiene la fuerza imperativa y evita una repetición demasiado mecánica, sin perder el carácter literal de las acciones.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de Ezequiel 4:2 y el audit trail en inglés. Se conservó la cadena de mandatos militares y se mantuvieron abiertas las alternativas léxicas donde el hebreo admite más de una concreción (especialmente דָּיֵק y סֹלְלָה). No se aplicaron revisiones posteriores, y el consenso de control cruzado indica alta concordancia.
  spanish_consistency_notes:
  - Se usó 'ella' para el objeto sitiado, siguiendo el referente femenino implícito de la ciudad representada.
  - Se evitó 'SEÑOR' o 'Cristo' porque el versículo no contiene esos términos.
  - '''Arietes'' se emplea en sentido técnico militar, no zoológico.'
  - La puntuación coordina la cadena de acciones sin introducir interpretaciones adicionales.
