translation:
  language: es
  text: Los hombres de Hai abatieron a unos treinta y seis hombres de entre ellos, y los persiguieron desde delante de la puerta hasta Sebarim[a], y los abatieron en la bajada. Así el corazón del pueblo se derritió y fue como agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta las canteras» o «hasta los lugares quebrados»; el hebreo שברים puede entenderse como un nombre de lugar (Sebarim) o como un término descriptivo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - mataron
  lexicon: HALOT
  rationale: נכה puede significar herir, golpear o abatir. En español, «hirieron» comunica el golpe decisivo de combate sin afirmar más explícitamente de lo que el contexto inmediato exige.
- source_word: מֵהֶם
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: La preposición מן con sufijo señala que las bajas salieron del propio grupo. «De entre ellos» conserva esa idea distributiva con naturalidad en español.
- source_word: אַנְשֵׁי הָעַי
  english_pob_choice: the men of Ai
  chosen_spanish: los hombres de Hai
  alternatives_spanish:
  - los hombres de la ciudad de Hai
  lexicon: HALOT
  rationale: El constructo identifica a los varones pertenecientes a Hai. Se usa «Hai» como nombre de lugar y «hombres de Hai» como equivalente directo y claro.
- source_word: כִּשְׁלֹשִׁים וְשִׁשָּׁה אִישׁ
  english_pob_choice: about thirty-six men
  chosen_spanish: unos treinta y seis hombres
  alternatives_spanish:
  - aproximadamente treinta y seis hombres
  - como treinta y seis hombres
  lexicon: HALOT
  rationale: El prefijo כ aporta aproximación; «unos» expresa bien ese matiz. Se conserva «hombres» por el sustantivo explícito איש y el marco militar.
- source_word: וַיִּרְדְּפוּם
  english_pob_choice: pursued them
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los siguieron
  - los corrieron tras
  lexicon: HALOT
  rationale: רדף en narrativa bélica se traduce mejor por «perseguir». Es más preciso y digno que «correr tras» o «seguir».
- source_word: לִפְנֵי הַשַּׁעַר
  english_pob_choice: from before the gate
  chosen_spanish: desde frente a la puerta
  alternatives_spanish:
  - desde delante de la puerta
  - desde la parte delantera de la puerta
  lexicon: HALOT
  rationale: לפני mantiene la idea espacial de estar delante/de frente a. En español, «desde frente a la puerta» conserva la relación direccional del texto sin perder legibilidad.
- source_word: עַד הַשְּׁבָרִים
  english_pob_choice: as far as Shebarim
  chosen_spanish: hasta Sebarim
  alternatives_spanish:
  - hasta Shebarim
  - hasta las quebraduras
  - hasta las canteras
  lexicon: HALOT
  rationale: Se mantiene la opción del POB inglés de tratar שברים como posible topónimo. En español se adapta la transliteración a «Sebarim», sin resolver el término como descripción en el texto principal.
- source_word: וַיַּכּוּם
  english_pob_choice: struck them down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los abatieron
  - los mataron
  lexicon: HALOT
  rationale: Se conserva la misma raíz verbal con una solución coherente en español. «Los hirieron» deja el matiz de daño contundente sin forzar una afirmación explícita de muerte.
- source_word: בַּמּוֹרָד
  english_pob_choice: on the descent
  chosen_spanish: en la bajada
  alternatives_spanish:
  - en el descenso
  - en la pendiente
  lexicon: HALOT
  rationale: מורד es un descenso o pendiente. «En la bajada» es natural en español y mantiene la imagen topográfica.
- source_word: וַיִּמַּס לְבַב הָעָם
  english_pob_choice: the heart of the people melted
  chosen_spanish: el corazón del pueblo se derritió
  alternatives_spanish:
  - el corazón del pueblo se deshizo
  - el ánimo del pueblo se debilitó
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea del derretirse, que expresa desánimo y colapso interior. «Corazón» reproduce el centro afectivo y volitivo del pueblo.
- source_word: וַיְהִי לְמָיִם
  english_pob_choice: became like water
  chosen_spanish: y fue como agua
  alternatives_spanish:
  - y se volvió como agua
  - y quedó como agua
  lexicon: HALOT
  rationale: El hebreo presenta una metáfora de disolución o pérdida total de firmeza. «Fue como agua» preserva la imagen con una formulación breve y idiomática en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca en el texto español exactamente donde corresponde al término ambiguo, manteniendo la lectura alternativa de שברים sin resolverla en exceso.
  spanish_consistency_notes:
  - Se mantiene «Hai» como transliteración estándar del nombre propio.
  - Se preserva la metáfora de «el corazón del pueblo se derritió» para reflejar el idioma hebreo.
  - Se evita convertir el participio de combate en una afirmación más fuerte que el contexto inmediato permita.
  - La nota [a] está anclada explícitamente en «Sebarim» para satisfacer la trazabilidad textual.
