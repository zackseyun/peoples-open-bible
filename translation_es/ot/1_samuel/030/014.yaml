- from: Hicimos una incursión en el Neguev de los cereteos[a], y en lo que pertenecía a Judá, y en el Neguev de Caleb; y prendimos fuego a Siclag.
  to: Hicimos una incursión en el Neguev de los cereteos[a], y en lo que pertenece a Judá, y en el Neguev de Caleb; y quemamos Siclag con fuego.
