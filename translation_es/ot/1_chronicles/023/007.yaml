lexical_decisions:
- source_word: לַגֵּרְשֻׁנִּי
  english_pob_choice: For the Gershonites
  chosen_spanish: Para los gersonitas
  alternatives_spanish:
  - De los gersonitas
  - Para la casa de Gersón
  lexicon: HALOT
  rationale: El ל prefijado funciona aquí como marcador de subdivisión/lista dentro de los levitas; en español, «Para los gersonitas» conserva bien ese valor de encabezado o asignación. Se usa el plural gentilicio «gersonitas» para reflejar el grupo, no un individuo.
- source_word: לַעְדָּן
  english_pob_choice: Ladan
  chosen_spanish: Ladán
  alternatives_spanish:
  - Ladan
  - Laadán
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera en español. Se añade tilde por ajuste ortográfico del español en la pronunciación final aguda/llana según la forma adoptada en la tradición de transliteración editorial.
- source_word: וְשִׁמְעִי
  english_pob_choice: and Shimei
  chosen_spanish: y Simei
  alternatives_spanish:
  - y Shimei
  - y Simí
  lexicon: HALOT
  rationale: La conjunción ו se traduce naturalmente como «y». El nombre אישי שִׁמְעִי se vierte como «Simei», una transliteración habitual y legible en español, evitando una calca fonética inglesa.
translation_notes:
  revision_awareness: El texto base y el control de revisión muestran alto acuerdo y no requieren cambios sustantivos; solo se adapta la transliteración al español manteniendo el sentido de lista genealógica del hebreo.
  spanish_consistency_notes:
  - Se mantiene el formato breve de listado, acorde con el hebreo nominal sin verbo explícito.
  - Se conserva el valor de encabezado/lista del prefijo ל sin sobreinterpretarlo como destinatario.
  - Los nombres propios se transliteran de modo coherente y publicable en español.
