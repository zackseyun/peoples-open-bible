translation:
  language: es
  text: Hay quien se enriquece por la aflicción[a], y esta es la recompensa que le corresponde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por la abnegación», «por el sufrimiento» o «por el trabajo». El hebreo מֵהִתְעַנּוֹת es lo bastante amplio como para abarcar aflicción o privación voluntaria; el paralelo griego también apunta hacia trabajo y pobreza.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es difícil aquí; literalmente, «y esto hará responsable su recompensa» o algo parecido. La traducción española expresa el sentido probable de retribución debida en un español idiomático.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is one
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Existe quien
  lexicon: HALOT
  rationale: La forma existencial introduce un caso típico en estilo sapiencial. «Hay quien» mantiene la generalidad del hebreo sin sonar pesado en español.
- source_word: מִתְעַשּׁר
  english_pob_choice: grows rich
  chosen_spanish: se enriquece
  alternatives_spanish:
  - llega a ser rico
  - prospera
  lexicon: HALOT
  rationale: El participio hitpael expresa un proceso de volverse rico; «se enriquece» conserva ese matiz mejor que un estado fijo.
- source_word: מֵהִתְעַנּוֹת
  english_pob_choice: through affliction
  chosen_spanish: por la aflicción
  alternatives_spanish:
  - por la autosufrimiento
  - por el sufrimiento
  - por el trabajo
  lexicon: HALOT
  rationale: El hebreo admite tanto aflicción como autohumillación/abstinencia; la frase española mantiene esa amplitud sin especificar más de lo que el texto garantiza.
- source_word: שְׂכָרוֹ
  english_pob_choice: the reward due to him
  chosen_spanish: la recompensa que le corresponde
  alternatives_spanish:
  - su recompensa
  - su salario
  - la paga que merece
  lexicon: HALOT
  rationale: «שכר» puede ser recompensa, salario o paga. «Que le corresponde» preserva la idea de retribución debida sin imponer una lectura más fuerte de mérito.
theological_decisions:
- issue: Relación entre riqueza, aflicción y retribución
  english_pob_reading: A person may become rich through affliction, and that outcome is his due recompense.
  chosen_spanish_reading: Una persona puede enriquecerse en medio de la aflicción, y ese resultado puede describirse como la recompensa que le corresponde.
  alternative_spanish_readings:
  - Hay quien se enriquece por la autosufrimiento, y esta es la paga que merece.
  - Hay quien se enriquece por el trabajo, y esta es su recompensa.
  rationale: El hebreo es breve y difícil, y la versión griega relacionada también apunta a la tensión entre trabajo, pobreza y enriquecimiento inesperado. La redacción española conserva la observación sapiencial sin resolver la dificultad ni convertirla en una doctrina más precisa de mérito.
  doctrine_reference: Preservar la tensión textual; primacía de la evidencia original sobre armonizaciones devocionales.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que afinó el final de «the reward he deserves» a «the reward due to him». La versión española refleja esa preferencia por una formulación de correspondencia/retribución debida, manteniendo el valor sapiencial y la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara; en este versículo no aparece el Tetragrámaton en el hebreo base, aunque el paralelo griego usa Κύριος.
  - Se prefirió «aflicción» por su amplitud semántica y por su ajuste al contexto de Sirácida.
  - «Recompensa que le corresponde» conserva la fuerza de שכר sin introducir una terminología eclesiástica ajena al texto.
