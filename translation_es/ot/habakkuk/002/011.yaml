translation:
  language: es
  text: Porque una piedra clamará desde el muro, y un cabrio[a] del maderamen le responderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una viga del maderamen responderá a ella». El hebreo כָפִיס es raro y puede designar una viga, un cabrio u otro elemento estructural de madera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o motivo del anuncio precedente; en español, 'Porque' conserva la relación discursiva causal/explicativa que el inglés POB resolvió con 'For'.
- source_word: אֶבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una piedra
  - una roca
  lexicon: HALOT
  rationale: El sustantivo es singular e indefinido; 'piedra' comunica bien la pieza de construcción y evita un tecnicismo innecesario.
- source_word: מִקִּיר
  english_pob_choice: from the wall
  chosen_spanish: desde el muro
  alternatives_spanish:
  - desde la pared
  - del muro
  - de la pared
  lexicon: HALOT
  rationale: La preposición marca procedencia. 'Muro' es natural en español bíblico y mantiene la imagen arquitectónica de un edificio que testifica contra la injusticia.
- source_word: תִּזְעָק
  english_pob_choice: will cry out
  chosen_spanish: clamará
  alternatives_spanish:
  - gritará
  - clamará
  - dará voz
  lexicon: HALOT
  rationale: El imperfecto profético expresa futuro; 'clamará' conserva el tono personificado y solemne del testimonio de la piedra.
- source_word: כָפִיס
  english_pob_choice: a rafter
  chosen_spanish: un rafter
  alternatives_spanish:
  - una viga
  - un cabrio
  - una cumbrera
  lexicon: HALOT
  rationale: El término hebreo es raro y denota un elemento estructural de madera. Mantengo 'rafter' en el texto principal para reflejar el ajuste del POB inglés hacia una pieza más precisa, aunque en español suena poco natural; se justifica aquí por fidelidad al perfil arquitectónico señalado en el audit trail.
- source_word: מֵעֵץ
  english_pob_choice: from the woodwork
  chosen_spanish: del maderamen
  alternatives_spanish:
  - de la madera
  - del maderamen
  - de la carpintería
  lexicon: HALOT
  rationale: Literalmente 'de/desde la madera'; 'maderamen' da un equivalente arquitectónico colectivo y mantiene la relación con la estructura del edificio sin sobredeterminar la pieza exacta.
- source_word: יַעֲנֶנָּה
  english_pob_choice: will answer it
  chosen_spanish: le responderá
  alternatives_spanish:
  - la responderá
  - le responderá
  - responderá a ella
  lexicon: HALOT
  rationale: ענה en qal significa responder/contestar. 'Le responderá' preserva la reciprocidad personificada; el dativo en español evita una construcción rígida.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión reciente afinó כָפִיס hacia ''rafter'', pero el inglés también conserva una nota de incertidumbre léxica. En español se reflejó esa tensión con un término principal que preserva el rasgo estructural y una nota que explicita la posibilidad alternativa sin borrar la rareza del hebreo.'
  spanish_consistency_notes:
  - Se siguió la convención POB de traducir el nombre divino como 'Yahvé' cuando aparece; aquí no aplica.
  - Se mantuvo un registro formal y bíblico, evitando paráfrasis expansivas.
  - No se introdujo terminología eclesiástica tradicional no sustentada por el hebreo.
  - La nota al pie conserva la ambigüedad del término raro כָפִיס en vez de resolverla de manera excesiva.
