id: HERM.S.5.vii
reference: Shepherd of Hermas — Similitude 5, section vii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Ηὐφράνθην, φημί, κύριε, ταύτην τὴν ἐπίλυσιν ἀκούσας. Ἄκουε νῦν, φησί· τὴν σάρκα σου ταύτην φύλασσε καθαρὰν καὶ ἀμίαντον, ἵνα τὸ πνεῦμα τὸ κατοικοῦν ἐν αὐτῇ μαρτυρήσῃ αὐτῇ, καὶ δικαιωθῇ σου ἡ σάρξ. 2. βλέπε μήποτε ἀναβῇ ἐπὶ τὴν καρδίαν σου τὴν σάρκα σου ταύτην φθαρτὴν εἶναι, καὶ παραχρήσῃ αὐτῇ ἐν μιασμῷ τινί. ἐὰν [γὰρ] μιάνῃς τὴν σάρκα σου, μιανεῖς καὶ τὸ πνεῦμα τὸ ἅγιον· ἐὰν δὲ μιάνῃς †τὴν σάρκα†, οὐ ζήσῃ. 3. Εἰ δέ τις, φημί, κύριε, γέγονεν ἄγνοια προτέρα πρὶν ἀκουσθῶσι τὰ ῥήματα ταῦτα, πῶς σωθῇ ὁ ἄνθρωπος ὁ μιάνας τὴν σάρκα αὐτοῦ; Περὶ τῶν προτέρων, φησίν, ἀγνοημάτων τῷ Θεῷ μόνῳ δυνατὸν ἴασιν δοῦναι· αὐτοῦ γάρ ἐστι πᾶσα ἐξουσία. 4. [ἀλλὰ νῦν φύλασσε σεαυτόν, καὶ ὁ Κύριος ὁ παντοκράτωρ, πολύσπλαγχνος ὤν, περὶ τῶν προτέρων ἀγνοημάτων ἴασιν δώσει,] ἐὰν τὸ λοιπὸν μὴ μιάνῃς σου τὴν σάρκα μηδὲ τὸ πνεῦμα· ἀμφότερα γὰρ κοινά ἐστι καὶ ἄτερ ἀλλήλων μιανθῆναι οὐ δύναται. ἀμφότερα οὖν καθαρὰ φύλασσε, καὶ ζήσῃ τῷ Θεῷ.
  language: Greek
  pages:
  - 368
  - 369
  unit_id: S.5.vii
  label: Similitude 5, section vii
  sequence: 53
translation:
  text: '“I rejoiced[i], Sir[a],” I say, “when I heard this explanation.”


    “Listen now,” he says: “Keep this flesh of yours clean and undefiled, so that the spirit that dwells in it[c] may bear witness to it, and your flesh may be justified. Watch lest it ever rise up in your heart[b] that this flesh of yours is perishable, and you misuse it in some defilement. For if you defile your flesh, you will also defile the Holy Spirit; and if you defile the flesh,[d] you will not live.”


    “But if, Sir,” I say, “there has been some former ignorance before these words were heard, how will the man who has defiled his flesh be saved?”


    “As to former ignorances[f],” he says, “God alone is able to give healing concerning them; for all authority is his. But now guard yourself, and the Lord, the Almighty—being full of compassion—will give healing for former ignorances,[e] if from now on you do not defile your flesh or the spirit; for both are shared[g] and cannot be defiled apart from one another. Therefore keep both clean, and you will live to God[h].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek κύριε here is a polite address to the shepherd/angelic guide, hence “Sir,” not the divine title “Lord.”
    reason: cultural_note
  - marker: b
    text: “Rise up in your heart” is a Semitic-Greek idiom for “come into your mind” or “occur to you.”
    reason: cultural_note
  - marker: c
    text: “The spirit that dwells in it” may be understood as the human spirit or as the (Holy) Spirit; the Greek does not specify ἅγιον here. The explicit “Holy Spirit” follows in v.2.
    reason: alternative_reading
  - marker: d
    text: 'The words “the flesh” in the second clause are textually uncertain (daggered in some editions). The sense is maintained either way: defilement leads to death.'
    reason: textual_variant
  - marker: e
    text: Many editions bracket “But now guard yourself … will give healing for former ignorances,” as some witnesses omit it. It fits Hermas’ exhortational style; we include it here.
    reason: textual_variant
  - marker: f
    text: “Former ignorances” renders ἀγνοήματα, idiomatically “offenses committed in ignorance.”
    reason: lexical_alternative
  - marker: g
    text: “Both are shared” renders κοινά ἐστι as “held in common/partnered,” not “common” in the sense of “profane/unclean.”
    reason: lexical_alternative
  - marker: h
    text: “Live to God” mirrors the Greek dative (orientation). “Live for God” is an acceptable paraphrase.
    reason: lexical_alternative
  - marker: i
    text: Or 'Therefore keep both pure, and you will live to God[h].'.
    reason: previous_rendering
lexical_decisions:
- source_word: κύριε (voc.)
  chosen: Sir
  alternatives:
  - Lord
  lexicon: BDAG
  entry: κύριος
  rationale: Here it is a polite form of address to the shepherd/angelic figure, not the divine title. Rendering as “Sir” avoids confusion with “the Lord, the Almighty” later in the section.
- source_word: ἐπίλυσιν
  chosen: explanation
  alternatives:
  - interpretation
  - solution
  lexicon: BDAG
  entry: ἐπίλυσις
  rationale: In Hermas’ Similitudes the figure gives interpretations of symbols; “explanation” fits the context and preserves the technical sense without importing later theological jargon.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  entry: σάρξ
  rationale: Hermas uses moral–ascetic language where ‘flesh’ carries ethical and purity connotations; “flesh” preserves that texture better than the neutral “body.”
- source_word: καθαρὰν
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  entry: καθαρός
  rationale: “Clean” pairs naturally with cultic/purity imagery and with “undefiled,” echoing ritual purity language.
- source_word: ἀμίαντον
  chosen: undefiled
  alternatives:
  - unstained
  - unblemished
  lexicon: BDAG
  entry: ἀμίαντος
  rationale: “Undefiled” is the standard purity term and keeps the moral-purity register.
- source_word: τὸ πνεῦμα (v.1)
  chosen: spirit
  alternatives:
  - Spirit (i.e., Holy Spirit)
  lexicon: BDAG
  entry: πνεῦμα
  rationale: The Greek lacks ἅγιον here; the identification is clarified in v.2. We retain lowercase “spirit” to preserve the textual ambiguity in v.1.
- source_word: κατοικοῦν
  chosen: dwells
  alternatives:
  - resides
  - abides
  lexicon: BDAG
  entry: κατοικέω
  rationale: “Dwells” is idiomatic and keeps the indwelling nuance without sounding archaic.
- source_word: μαρτυρήσῃ
  chosen: bear witness
  alternatives:
  - testify
  lexicon: BDAG
  entry: μαρτυρέω
  rationale: “Bear witness” preserves the forensic/attestational nuance central to the clause.
- source_word: δικαιωθῇ
  chosen: be justified
  alternatives:
  - be declared righteous
  - be vindicated
  lexicon: BDAG
  entry: δικαιόω
  rationale: Hermas frequently uses judicial language; “be justified” maintains that register and links with the witness motif.
- source_word: ἀναβῇ ἐπὶ τὴν καρδίαν σου
  chosen: rise up in your heart
  alternatives:
  - come into your mind
  - occur to you
  lexicon: BDAG
  entry: καρδία; ἀναβαίνω
  rationale: A literal rendering keeps the idiom’s ancient texture; footnote clarifies the sense.
- source_word: φθαρτὴν
  chosen: perishable
  alternatives:
  - corruptible
  - mortal
  lexicon: BDAG
  entry: φθαρτός
  rationale: “Perishable” captures the susceptibility-to-decay nuance and matches the ethical warning that follows.
- source_word: παραχρήσῃ
  chosen: misuse
  alternatives:
  - abuse
  - use improperly
  lexicon: LSJ
  entry: παραχράομαι
  rationale: The verb denotes using wrongly; “misuse” is concise and clear in modern English.
- source_word: μιασμῷ
  chosen: defilement
  alternatives:
  - pollution
  - stain
  lexicon: BDAG
  entry: μιασμός
  rationale: “Defilement” preserves cultic-moral coloration consistent with Hermas’ purity concerns.
- source_word: μιάνῃς
  chosen: defile
  alternatives:
  - pollute
  - stain
  lexicon: BDAG
  entry: μιαίνω
  rationale: Standard moral-purity verb; “defile” keeps the traditional register.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the holy spirit
  lexicon: BDAG
  entry: ἅγιος; πνεῦμα
  rationale: Here the text explicitly names the Holy Spirit; capitalization reflects the title.
- source_word: ἄγνοια / ἀγνοημάτων (pl.)
  chosen: ignorances
  alternatives:
  - errors done in ignorance
  - sins of ignorance
  lexicon: LSJ
  entry: ἄγνοια; ἀγνόημα
  rationale: Retains the literal plural. A footnote clarifies the idiom as offenses committed in ignorance.
- source_word: ἴασιν
  chosen: healing
  alternatives:
  - remedy
  - cure
  - forgiveness
  lexicon: BDAG
  entry: ἴασις
  rationale: Hermas frequently frames repentance in medical terms; “healing” preserves the metaphor rather than flattening to ‘forgiveness.’
- source_word: ὁ Κύριος ὁ παντοκράτωρ
  chosen: the Lord, the Almighty
  alternatives:
  - the Lord Almighty
  lexicon: BDAG
  entry: παντοκράτωρ
  rationale: Title for God; comma retains appositional force; matches apocalyptic diction.
- source_word: πολύσπλαγχνος
  chosen: full of compassion
  alternatives:
  - very compassionate
  - very merciful
  lexicon: BDAG
  entry: πολύσπλαγχνος
  rationale: Idiomatic English equivalent of ‘much-compassioned’; aligns with James 5:11 usage.
- source_word: τὸ λοιπὸν
  chosen: from now on
  alternatives:
  - henceforth
  - for the future
  lexicon: BDAG
  entry: λοιπός
  rationale: Natural English expressing the temporal shift demanded by the exhortation.
- source_word: κοινά ἐστι
  chosen: are shared
  alternatives:
  - are in common
  - are partners
  lexicon: BDAG
  entry: κοινός
  rationale: Here ‘koinos’ means ‘shared/held in common,’ not ‘common’ in the sense ‘profane.’ “Are shared” communicates mutual participation of flesh and spirit.
- source_word: ἄτερ ἀλλήλων
  chosen: apart from one another
  alternatives:
  - without each other
  lexicon: LSJ
  entry: ἄτερ
  rationale: Clear idiomatic rendering of separative sense.
- source_word: ζήσῃ τῷ Θεῷ
  chosen: live to God
  alternatives:
  - live for God
  lexicon: BDAG
  entry: ζάω
  rationale: Keeps the dative’s orientation (‘to God’) and the elevated tone; alternative noted in footnote.
