translation:
  language: es
  text: Así pues[a], baste esto acerca de los afectos entrañables y de las torturas extraordinarias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Así pues, que se declare hasta aquí lo relativo a los afectos entrañables y a las torturas extraordinarias».'
