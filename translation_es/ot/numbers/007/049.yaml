translation:
  language: es
  text: Su ofrenda fue un plato de plata[a], de ciento treinta siclos de peso; un cuenco de plata[b] de setenta siclos, según el siclo del santuario; ambos llenos de flor de harina mezclada con aceite para una ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «fuente» para קַעֲרָה.
    reason: lexical_alternative
  - marker: b
    text: O «vasija» para מִזְרָק.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda
  alternatives_spanish:
  - Su presente
  - Su regalo
  - Su ofrenda
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. «Ofrenda» mantiene la fuerza ritual y la naturalidad en español.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un plato de plata
  - un plato de plata
  - una bandeja de plata
  lexicon: HALOT
  rationale: קַעֲרָה es un recipiente; en este inventario tabernacular, «plato» comunica bien un recipiente ancho y poco profundo. «De plata» sigue al sustantivo y conserva el orden natural del español.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de ciento treinta siclos de peso
  alternatives_spanish:
  - su peso fue de ciento treinta siclos
  - de ciento treinta siclos de peso
  lexicon: HALOT
  rationale: El hebreo presenta el objeto seguido de su peso. «De ciento treinta siclos de peso» conserva el estilo de inventario y resulta idiomático en español.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: un tazón de plata
  alternatives_spanish:
  - un tazón de plata
  - un cuenco de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: מִזְרָק puede referirse a un cuenco/recipiente para servicio ritual. «Tazón» es claro y natural; se mantiene la posibilidad de un recipiente litúrgico sin sobrecargar el texto.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - de setenta siclos
  - pesaba setenta siclos
  lexicon: HALOT
  rationale: Continúa la descripción del segundo vaso. «De setenta siclos» reproduce la estructura breve del hebreo y de la traducción inglesa auditada.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - según el siclo del santuario
  - conforme al siclo del santuario
  - según el siclo santo
  lexicon: HALOT
  rationale: La frase especifica el patrón de peso. «Siclo del santuario» preserva el referente cultual y evita el borrado del término técnico.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - ambos
  - los dos
  lexicon: HALOT
  rationale: El referente son los dos recipientes mencionados. «Ambos» es conciso y claro en español.
- source_word: מְלֵאִים
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - llenos de
  - colmados de
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe el contenido de los recipientes. «Llenos de» es la opción más directa y natural.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - flor de harina
  - harina fina
  lexicon: HALOT
  rationale: La expresión tradicional y precisa para la harina refinada de las ofrendas es «flor de harina»; conserva la especificidad cultual del término.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - amalgamada con aceite
  lexicon: HALOT
  rationale: «Mezclada con aceite» expresa de forma natural el participio pasivo hebreo sin perder el sentido culinario-ritual.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda vegetal
  - para ofrenda de cereal
  - para una ofrenda de grano
  lexicon: HALOT
  rationale: Se preserva la distinción cultual de מִנְחָה con «ofrenda vegetal», siguiendo el uso de POB para evitar reducirla a una categoría general. Aunque «ofrenda de cereal» también es posible, «vegetal» mantiene la amplitud del término ritual.
theological_decisions:
- issue: Renderización de מִנְחָה en contexto sacerdotal
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para ofrenda vegetal
  alternative_spanish_readings:
  - para ofrenda de cereal
  - para una ofrenda de grano
  - para ofrenda
  rationale: En español, «ofrenda vegetal» conserva la función técnica del término sin limitarlo demasiado a un solo cereal. Evita además la pérdida de la especificidad cultual que tendría solo «ofrenda».
  doctrine_reference: Levítico 2; Números 7:13-17 (ofrenda/מִנְחָה en contexto litúrgico)
- issue: Estándar ponderal del santuario
  english_pob_reading: according to the sanctuary shekel
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según el siclo santo
  rationale: La frase se mantiene como norma de medida, no como cualidad moral. «Del santuario» conserva el marco sagrado y la función metrológica.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y la decisión inglesa auditada, sin cambios de revisión necesarios frente al pasaje fuente. Se conservó la estructura inventarial y la distinción entre los dos recipientes, sus pesos y su contenido ritual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «ofrenda vegetal» para preservar la distinción técnica de מִנְחָה en un contexto sacerdotal.
  - Se evitó «SEÑOR» como sustituto de nombres divinos porque aquí no aparece un nombre divino explícito.
  - «Siclo del santuario» conserva el estándar de peso sin traducirlo de manera eufemística.
