translation:
  language: es
  text: Ciertamente[a], en el camino de tus juicios, Yahvé, te hemos esperado[b]; porque tu nombre y tu recuerdo son el deseo del alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tu justicia» o «tus ordenanzas» para «tus juicios».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «tu recuerdo» o «la memoria de ti» para «tu recuerdo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De hecho
  - En verdad
  - Sí, ciertamente
  lexicon: HALOT
  rationale: La partícula אַף funciona aquí de manera aseverativa/enfática. «Ciertamente» conserva ese énfasis inicial en un español natural y solemne.
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - ruta
  - senda
  lexicon: HALOT
  rationale: אֹרַח designa una vía o trayecto. «Camino» comunica bien la imagen metafórica en español bíblico contemporáneo, sin sonar forzado.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tu justicia
  - tus ordenanzas
  - tus decisiones judiciales
  lexicon: HALOT
  rationale: Conservar «juicios» mantiene la fuerza judicial del término y evita reducirlo solo a «justicia» o solo a «ordenanzas». En Isaías 26 el contexto favorece el sentido de actos/juzgamientos de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto pide traducir el Tetragrámaton como «Yahvé». En español bíblico, esa forma es la transliteración estable y legible del nombre divino, evitando la sustitución por un título.
- source_word: קִוִּינוּךָ
  english_pob_choice: we have waited for you
  chosen_spanish: te hemos esperado
  alternatives_spanish:
  - hemos esperado en ti
  - te hemos aguardado
  - hemos puesto nuestra esperanza en ti
  lexicon: HALOT
  rationale: קוה combina espera con expectativa confiada. «Te hemos esperado» mantiene la relación directa con el objeto personal y suena natural en español; el matiz de esperanza queda implícito en el contexto poético.
- source_word: לְשִׁמְךָ
  english_pob_choice: for your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre
  - para tu nombre
  lexicon: HALOT
  rationale: El hebreo expresa propósito/orientación con לְ. En español, la segunda mitad de la línea funciona mejor como complemento explicativo con «porque»; «tu nombre» conserva la referencia al nombre revelado y al renombre de Dios.
- source_word: וּלְזִכְרְךָ
  english_pob_choice: your remembrance
  chosen_spanish: tu recuerdo
  alternatives_spanish:
  - tu memoria
  - tu memoria viva
  - tu remembranza
  lexicon: HALOT
  rationale: זֵכֶר puede significar recuerdo, memorial o memoria. «Tu recuerdo» es claro y mantiene el paralelo con «tu nombre»; además evita la posible rareza de «remembranza».
- source_word: תַּאֲוַת נָפֶשׁ
  english_pob_choice: the desire of the soul
  chosen_spanish: el deseo del alma
  alternatives_spanish:
  - el anhelo del alma
  - el deseo de la vida interior
  - el anhelo de la persona
  lexicon: HALOT
  rationale: La construcción nominal se conserva de forma casi literal pero fluida. «El deseo del alma» respeta el hebreo y la poesía, sin introducir una especificación interpretativa excesiva.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión doctrinal del proyecto de no ocultar el nombre divino bajo una sustitución como «SEÑOR». «Yahvé» es la forma española estándar para el Tetragrámaton y preserva la identidad pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de מִשְׁפָּטֶיךָ en el contexto poético
  english_pob_reading: your judgments
  chosen_spanish_reading: tus juicios
  alternative_spanish_readings:
  - tu justicia
  - tus ordenanzas
  rationale: «Juicios» conserva la tensión entre justicia, veredicto y actos históricos de Dios. En español, esta opción reproduce mejor la amplitud semántica que reducirlo a una sola abstracción.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Relación entre la espera y la cláusula causal final
  english_pob_reading: for your name and your remembrance are the desire of the soul
  chosen_spanish_reading: porque tu nombre y tu recuerdo son el deseo del alma
  alternative_spanish_readings:
  - pues tu nombre y tu recuerdo son el deseo del alma
  - ya que tu nombre y tu recuerdo son el deseo del alma
  rationale: El hebreo introduce una relación explicativa con לְ y el flujo poético exige una conexión causal/narrativa clara en español. «Porque» reproduce de manera natural esa dependencia sin agregar contenido ajeno.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail, que añadió la preposición explicativa «for» antes de «your name and your remembrance». En español, esa relación se expresó de manera natural con «porque», manteniendo la conexión causal/explicativa del hebreo sin rigidizar la sintaxis.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «Cristo» o lenguaje cristológico porque el versículo no lo requiere.
  - «Juicios» mantiene la amplitud semántica de מִשְׁפָּט sin colapsarlo en una sola noción.
  - «Recuerdo» se usa de forma consistente para זֵכֶר, con nota alternativa para la posible lectura de «memoria».
  - La cláusula final se traduce con estructura natural en español, preservando el paralelismo poético del hebreo.
