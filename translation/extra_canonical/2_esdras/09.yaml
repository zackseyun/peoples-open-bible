translation:
  text: '1 He answered me and said[a], “Measure within yourself, and when you see that some part of the signs foretold has passed by,

    2 then you will understand that this is the time when the Most High will begin to visit the world that was made by him.

    3 And when there appears in the world a shaking of places, confusion among peoples, thoughts among nations, instability among leaders, turmoil among rulers,

    4 then you will understand that it was of these things that the Most High spoke from the days that were before, from the beginning.

    5 For just as everything that has come to be in the world has a beginning and an end, and the end is manifest,

    6 so also are the times of the Most High: beginnings made manifest in wonders and mighty works, and endings in deeds and signs.

    7 And everyone who is saved, and who is able to escape by his works or by the faith in which he believed,

    8 will be left from the dangers foretold and will see my salvation in my land and within my borders, which I sanctified for myself from of old.

    9 Then those who now have abused my ways will be astonished, and those who cast them aside in contempt will remain in torments.

    10 For all who did not know me while they were alive, though they had received benefits,

    11 and all who despised my law while they still had freedom,

    12 and while a place of repentance was still open to them did not understand but scorned it—for these it is necessary to know after death in torment.

    13 Therefore do not be curious any longer about how the ungodly will be tormented, but inquire how the righteous will be saved, and whose the age is, and for whose sake the age is, and when.”

    14 I answered and said,

    15 “I have spoken before, and now I speak, and I will speak afterward: many more perish than will be saved,

    16 just as waves are greater in number than a drop.”

    17 He answered me and said, “As the field is, so also are the seeds; and as the flowers are, so also are the colors; and as the work is, so also is the creation; and as the farmer is, so also is the threshing floor. For such was the time of the age:

    18 when I was preparing for those who now are, before the age was made for them in which they would dwell, no one contradicted me then, for there was no one.

    19 But now, those created in this prepared world, with an unfailing table and an unsearchable law, have been corrupted in their ways.

    20 And I considered my world, and behold, it was ruined; and my inhabited world, and behold, it was in peril because of the thoughts that had come into it.

    21 And I saw, and I spared them with very great difficulty, and I saved for myself one grape out of the cluster, and one planting out of a great tribe.

    22 Let the multitude perish, then, that was born for nothing; but let my grape be preserved, and my planting, because with much labor I perfected these.

    23 “But you, if you will again withdraw for seven more days—though you shall not fast during them—

    24 go into a field of flowers where no house has been built, and eat only the flowers of the field. You shall not taste meat, and you shall not drink wine, but only flowers.

    25 And pray to the Most High without ceasing, and I will come and speak with you.”

    26 So I went, as he told me[b], into the field that is called Ardat, and I sat there among the flowers. I ate the herbs of the field, and their food became enough to satisfy me.

    27 And it happened after seven days that I was lying on the grass, and my heart was troubled again as before.

    28 And my mouth was opened, and I began to speak before the Most High, and I said,

    29 “O Lord, you showed yourself among us to our fathers in the wilderness, when they were coming out of Egypt and were entering the untrodden and fruitless desert,

    30 and you said, ‘Hear me, O Israel, and give ear to my words, seed of Jacob.

    31 For behold, I sow my law in you, and it will bear fruit in you, and by it you will be glorified forever.’

    32 Yet our fathers, after receiving the law, did not keep it, and did not observe my statutes; and the fruit of the law did not perish, for it could not, because it was yours.

    33 But those who received it perished, because they did not keep what had been sown in them.

    34 And behold, it is the custom that when the earth receives seed, or the sea a ship, or any vessel food or drink,

    35 then, if what was sown or sent or received is destroyed, these are destroyed, but the things that received them remain. Yet with us it has not happened so.

    36 For we who received the law will perish in sin, and also the heart that received it;

    37 but the law does not perish, and remains in its honor.”

    38 While I was speaking these things in my heart, I looked up with my eyes, and I saw a woman on the right side. And behold, she was mourning and weeping with a loud voice, and was deeply grieved in spirit. Her garments were torn, and ashes were on her head.

    39 Then I let go of the thoughts with which I had been occupied, and I turned to her and said,

    40 “Why are you weeping, and why are you grieved in spirit?”

    41 She said to me, “Leave me alone, my lord, so that I may mourn for myself and add to my sorrow, for I am very bitter in spirit and greatly brought low.”

    42 I said to her, “What has happened to you? Tell me.”

    43 She said to me, “I, your servant, was barren and did not bear a child, though I had a husband for thirty years.

    44 For every hour and every day throughout those thirty years I kept praying to the Most High night and day.

    45 And it happened after thirty years that the God of your servant heard me, and saw my humiliation, and paid attention to my distress, and gave me a son. And I rejoiced over him greatly, I and my husband and all my fellow citizens, and we greatly honored the Mighty One.

    46 And I brought him up with much labor.

    47 And it happened, when he had grown up and I had come to take a wife for him, that I made a day of feasting.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'an unfailing table and an unsearchable law' is difficult in Latin. The sense appears to be that full provision and divine instruction had already been set before humanity, yet they were corrupted in their ways.
    reason: textual_variant
    anchor_ref: '9:19'
  - marker: b
    text: The Latin around this verse is textually rough. The main sense is that those who received the law perish, even though the law itself does not perish but remains honored.
    reason: textual_variant
    anchor_ref: '9:36'
lexical_decisions:
- source_word: metiens metire in temetipso
  chosen: Measure within yourself
  alternatives:
  - Measure carefully within yourself
  - Take the measure in yourself
  lexicon: Lewis & Short
  rationale: Keeps the emphatic repetition of metior while rendering intelligible English. 'Within yourself' preserves the reflexive inward discernment rather than external calculation.
- source_word: Altissimus
  chosen: the Most High
  alternatives:
  - God
  lexicon: Lewis & Short
  rationale: Project policy requires preserving the divine title rather than flattening it to a generic term.
- source_word: visitare saeculum
  chosen: visit the world
  alternatives:
  - inspect the age
  - attend to the world
  lexicon: Lewis & Short
  rationale: '''Visit'' preserves biblical/judicial resonance of divine intervention. ''Saeculum'' here is rendered ''world'' in context because the clause specifies the created order made by him.'
- source_word: motio locorum
  chosen: a shaking of places
  alternatives:
  - upheaval of regions
  - movement of places
  lexicon: Lewis & Short
  rationale: Formal apocalyptic diction is retained. The phrase is unusual; 'shaking of places' preserves the strangeness and possible allusion to earthquakes or geopolitical upheaval.
- source_word: gentium cogitationes
  chosen: scheming among nations
  alternatives:
  - thoughts of nations
  - designs of nations
  lexicon: Lewis & Short
  rationale: Cogitationes in this context likely carries deliberative, political plotting rather than neutral thought. 'Scheming' gives the ominous apocalyptic force.
- source_word: uirtutibus
  chosen: mighty works
  alternatives:
  - powers
  - miracles
  lexicon: Lewis & Short
  rationale: Balances formal sense with readability; pairs naturally with 'wonders' without importing later technical miracle language too strongly.
- source_word: per opera sua uel per fidem in qua credidit
  chosen: by his works or by the faith in which he believed
  alternatives:
  - through his deeds or through the faith he had
  - by works or by faith
  lexicon: Lewis & Short
  rationale: Preserves both terms explicitly and avoids collapsing the phrase into later doctrinal shorthand. The wording keeps the text's tension between deeds and faith.
- source_word: relinquetur
  chosen: will be left
  alternatives:
  - will be preserved
  - will remain
  lexicon: Lewis & Short
  rationale: 'Retains remnant language: survivors are ''left'' from the foretold dangers.'
- source_word: in cruciamentis commorabuntur
  chosen: will remain in torments
  alternatives:
  - will dwell in torments
  - will linger in tortures
  lexicon: Lewis & Short
  rationale: Commorabuntur suggests abiding or remaining; 'remain in torments' is direct and grave without over-embellishment.
- source_word: paenitentiae locus
  chosen: a place of repentance
  alternatives:
  - room for repentance
  - opportunity for repentance
  lexicon: Lewis & Short
  rationale: A literal rendering preserves the spatial metaphor and the solemnity of the warning.
- source_word: noli curiosus esse
  chosen: do not be curious
  alternatives:
  - do not be inquisitive
  - do not concern yourself
  lexicon: Lewis & Short
  rationale: Keeps Uriel's rebuke sharp. Ezra is being checked for overreaching inquiry.
- source_word: quorum saeculum et propter quos saeculum
  chosen: whose the age is, and for whose sake the age is
  alternatives:
  - to whom the age belongs and for whom it exists
  lexicon: Lewis & Short
  rationale: Preserves the compact, weighty formulation and keeps 'age' language visible in this apocalypse.
- source_word: sicut multiplicat fluctus super guttam
  chosen: waves are greater in number than a drop
  alternatives:
  - the waves outnumber a drop
  - waves abound beyond a drop
  lexicon: Lewis & Short
  rationale: The Latin is compressed and somewhat awkward; this rendering preserves the comparison of overwhelming multitude to tiny remnant.
- source_word: quales flores, tales et tincturae
  chosen: as the flowers are, so also are the colors
  alternatives:
  - so are the dyes
  - so are the tints
  lexicon: Lewis & Short
  rationale: Tincturae likely refers to coloring/tint. 'Colors' is readable while preserving the analogy from source to outcome.
- source_word: mensa indeficienti et lege inuestigabili
  chosen: an unfailing table and an unsearchable law
  alternatives:
  - an inexhaustible table and an inscrutable law
  lexicon: Lewis & Short
  rationale: The phrase is difficult; 'table' likely evokes provision. 'Unsearchable law' preserves the sense of a law beyond exhaustive probing without smoothing the crux away.
- source_word: acinum de botru
  chosen: one grape out of the cluster
  alternatives:
  - a berry from the bunch
  lexicon: Lewis & Short
  rationale: Keeps the remnant metaphor vivid and concrete.
- source_word: quae sine causa nata est
  chosen: that was born for nothing
  alternatives:
  - born in vain
  - born without purpose
  lexicon: Lewis & Short
  rationale: Directly preserves the harsh judgment of the text without softening it.
- source_word: campum florum
  chosen: a field of flowers
  alternatives:
  - a meadow of blossoms
  lexicon: Lewis & Short
  rationale: Simple, literal, and fitting the visionary setting.
- source_word: de herbis agri manducaui
  chosen: I ate the herbs of the field
  alternatives:
  - I ate the plants of the field
  - I ate the grasses of the field
  lexicon: Lewis & Short
  rationale: Herbs/plants is the most natural English for edible field growth in this ascetic setting.
- source_word: cor meum iterum turbabatur
  chosen: my heart was troubled again
  alternatives:
  - my heart was disturbed again
  lexicon: Lewis & Short
  rationale: Preserves Ezra's emotional agitation and lamenting register.
- source_word: semino in uobis legem meam
  chosen: I sow my law in you
  alternatives:
  - I plant my law among you
  lexicon: Lewis & Short
  rationale: Maintains the agricultural metaphor that governs Ezra's complaint.
- source_word: legitima
  chosen: the statutes
  alternatives:
  - ordinances
  - requirements
  lexicon: Lewis & Short
  rationale: A standard rendering for legal prescriptions that distinguishes it from lex/law.
- source_word: fructus legis
  chosen: the fruit of the law
  alternatives:
  - the law's fruit
  lexicon: Lewis & Short
  rationale: Preserves the seed/fruit metaphor central to Ezra's argument.
- source_word: consuetudo est
  chosen: it is the custom
  alternatives:
  - it is the usual way
  - this is what normally happens
  lexicon: Lewis & Short
  rationale: Retains Ezra's appeal to ordinary pattern or rule.
- source_word: susceptoria
  chosen: the things that received them
  alternatives:
  - the containers
  - the receptacles
  lexicon: Lewis & Short
  rationale: The Latin is broad across earth, sea, and vessel; this rendering preserves the receiving medium without forcing one image.
- source_word: peribimus et cor nostrum quod suscepit eam
  chosen: we will perish in sin, and also the heart that received it
  alternatives:
  - we will perish, and our heart that received it
  - we will perish as sinners, along with the heart that received it
  lexicon: Lewis & Short
  rationale: The Latin is textually rough, but the sense is that the recipients perish though the law remains. 'In sin' makes explicit the participial peccantes from the fuller reading.
- source_word: permanet in suo honore
  chosen: remains in its honor
  alternatives:
  - abides in its glory
  - remains in its dignity
  lexicon: Lewis & Short
  rationale: Keeps the law's enduring dignity without overinterpreting.
- source_word: animo dolebat ualde
  chosen: was deeply grieved in spirit
  alternatives:
  - was in great anguish of soul
  lexicon: Lewis & Short
  rationale: Conveys intense inward distress in contemporary but weighty English.
- source_word: humiliata sum ualde
  chosen: greatly brought low
  alternatives:
  - greatly humbled
  - deeply humiliated
  lexicon: Lewis & Short
  rationale: Avoids modern psychological overtones of 'humiliated' while preserving abasement.
- source_word: honorificabamus ualde fortem
  chosen: we greatly honored the Mighty One
  alternatives:
  - we highly glorified the Mighty
  - we honored the Strong One greatly
  lexicon: Lewis & Short
  rationale: Fortem functions as a divine epithet here; 'the Mighty One' preserves title-like force.
theological_decisions:
- issue: Works and faith in 9:7
  chosen_reading: Retained both 'by his works or by the faith in which he believed' without harmonizing to later Christian formulas.
  alternative_readings:
  - by works and by faith
  - by deeds or by faithfulness
  rationale: The Latin presents both categories starkly. The translation preserves the text's own soteriological tension rather than resolving it through later doctrinal systems.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Judgment after death in 9:10-12
  chosen_reading: Rendered the line plainly as postmortem recognition 'in torment.'
  alternative_readings:
  - after death they will know punishment
  - they will learn by torment after death
  rationale: The chapter's hard edge must remain. The Latin states that those who scorned repentance must know after death in torment; this is not softened into vague consequence.
  doctrine_reference: User guardrails on preserving theological hard edges
- issue: Saeculum in 9:13, 18
  chosen_reading: Rendered as 'age' in the programmatic sayings about whose the age is, but as 'world' where the created order is in view.
  alternative_readings:
  - world throughout
  - age throughout
  rationale: The apocalypse uses saeculum flexibly. A context-sensitive rendering best preserves meaning while keeping eschatological 'age' language visible where it matters.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Harsh remnant theology in 9:21-22
  chosen_reading: 'Kept the severe contrast: the multitude perishes, the single grape/planting is preserved.'
  alternative_readings:
  - softened corporate judgment language
  rationale: Ezra's exchange here insists on a narrow remnant. The translation must not blunt that severity.
  doctrine_reference: User guardrails on narrow-way passages and hard edges
- issue: Divine names/titles in 9:45
  chosen_reading: Kept 'God' where the Latin has Deus and 'the Mighty One' where it has Fortem, while preserving 'the Most High' elsewhere for Altissimus.
  alternative_readings:
  - flatten all to God
  rationale: The chapter itself varies divine designations. The translation reflects those distinctions rather than normalizing them away.
  doctrine_reference: DOCTRINE.md §Consistency of key terms, documented exception
