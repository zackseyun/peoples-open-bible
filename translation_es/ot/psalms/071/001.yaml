translation:
  language: es
  text: En ti, Yahvé[a], he buscado refugio; que jamás sea avergonzado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue la norma del proyecto de traducir el nombre divino como «Yahvé».'
    reason: translation_policy
lexical_decisions:
- source_word: בְּ/ךָ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - En ti solo
  - En ti yo
  lexicon: HALOT
  rationale: La preposición ב con sufijo de 2.ª masc. sing. introduce aquí el ámbito u objeto del refugio. «En ti» conserva el giro poético y la relación de confianza sin añadir énfasis que no está en el hebreo.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: usar el nombre divino «Yahvé» en el texto principal, no una sustitución titulada como «SEÑOR». Mantiene la referencia al nombre personal del pacto.'
- source_word: חָסִיתִי
  english_pob_choice: I have taken refuge
  chosen_spanish: me he refugiado
  alternatives_spanish:
  - he buscado refugio
  - me refugié
  lexicon: HALOT
  rationale: חסה expresa buscar o tomar refugio; el perfecto 1cs puede tener valor presente-resultativo. «Me he refugiado» reproduce la imagen de protección de forma natural en español y conserva el aspecto mejor que un presente simple.
- source_word: אַל
  english_pob_choice: let me not
  chosen_spanish: no me pongas
  alternatives_spanish:
  - no me dejes
  - no permitas que yo
  lexicon: HALOT
  rationale: En esta construcción con forma primera persona, אַל introduce un ruego prohibitivo/jussivo. En español, «no me pongas» transmite bien la súplica dirigida a Dios y suena idiomático en lenguaje de oración.
- source_word: אֵבֹשָׁה
  english_pob_choice: be put to shame
  chosen_spanish: en vergüenza
  alternatives_spanish:
  - avergonzado
  - confundido
  lexicon: HALOT
  rationale: בושׁ puede denotar vergüenza, deshonra o quedar confundido. La expresión española «poner en vergüenza» preserva el matiz relacional y vindicativo del texto, mejor que una mera referencia a emoción interna.
- source_word: לְ/עוֹלָם
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - para siempre
  lexicon: HALOT
  rationale: Con negación, לְעוֹלָם se vuelve idiomáticamente «nunca/jamás». «Jamás» funciona bien al final de la súplica y mantiene la fuerza absoluta del hebreo sin sonar pesado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto, coherente con la política del proyecto para יְהוָה. «Yahvé» evita la sustitución por un título y mantiene la trazabilidad al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el inglés auditado no requirió cambios y la formulación española conserva el mismo valor semántico y teológico del hebreo, con adaptación idiomática mínima.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Me he refugiado» conserva el aspecto perfectivo/resultativo del verbo hebreo sin perder naturalidad.
  - La negativa final se expresa con un ruego directo y breve, equivalente funcional de la construcción hebrea con אַל.
  - No se introduce «Cristo», «SEÑOR» ni otro equivalente tradicional que oscurezca el nombre divino del texto base.
