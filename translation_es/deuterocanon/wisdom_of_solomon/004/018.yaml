translation:
  language: es
  text: Ellos verán y despreciarán[a], pero el Señor se reirá de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «considerarán como nada» para ἐξουδενήσουσιν.
    reason: lexical_alternative
  - marker: b
