  text: עֲטֶ֣רֶת תִּפְאֶ֣רֶת שֵׂיבָ֑ה בְּ/דֶ֥רֶךְ צְ֝דָקָ֗ה תִּמָּצֵֽא׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/031.yaml
  text: Gray hair is a crown of glory[b][a]; it is found in the way of righteousness.
  footnotes:
  - marker: a
    text: Or 'on the path of righteousness.' The Hebrew idiom speaks of a course of life marked by righteousness.
    reason: lexical_alternative
  - marker: b
    text: That is, gray hair is honorable when it accompanies a righteous life; the proverb expresses a general wisdom principle, not an absolute promise of long life to every righteous person.
    reason: cultural_note
