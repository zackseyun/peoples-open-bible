translation:
  language: es
  text: 'Entonces mi Dios me lo puso en el corazón para reunir a los nobles, a los oficiales y al pueblo, para ser registrados por genealogía[a]. Y hallé el libro de la genealogía de los que subieron primero[b], y hallé escrito en él:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para registrar por genealogía'. El hebreo se refiere a un registro oficial según la línea familiar.
    reason: lexical_alternative
  - marker: b
    text: O 'el registro genealógico de los que subieron al principio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן אֱלֹהַי אֶל לִבִּי
  english_pob_choice: Then my God put it into my heart
  chosen_spanish: Entonces mi Dios lo puso en mi corazón
  alternatives_spanish:
  - Entonces mi Dios me lo puso en el corazón
  - Entonces mi Dios me lo puso en mi corazón
  lexicon: HALOT
  rationale: El hebreo expresa una iniciativa divina interior, literalmente ‘dio a mi corazón’. En español, ‘lo puso en mi corazón’ conserva esa impresión de impulso interno sin volverla más explícita de lo que dice el texto.
- source_word: וָאֶקְבְּצָה
  english_pob_choice: to assemble
  chosen_spanish: para reunir
  alternatives_spanish:
  - para congregar
  - para convocar
  lexicon: HALOT
  rationale: 'La forma cohortativa se entiende como el propósito del impulso divino: reunir a las personas mencionadas. ‘Reunir’ es natural en español y suficientemente cercano al valor del verbo.'
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los hombres libres
  - los aristócratas
  lexicon: HALOT
  rationale: En este contexto de administración y lista cívica, el término designa a los principales o notables; ‘nobles’ refleja bien ese uso contextual.
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los funcionarios
  - los gobernantes subordinados
  lexicon: HALOT
  rationale: El término alude a autoridades subordinadas en el marco administrativo. ‘Oficiales’ mantiene la referencia funcional y evita un tecnicismo innecesario.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: ‘El pueblo’ es la forma estándar y conserva el contraste con ‘los nobles’ y ‘los oficiales’.
- source_word: לְהִתְיַחֵשׂ
  english_pob_choice: to be enrolled by genealogy
  chosen_spanish: para ser registrados por genealogía
  alternatives_spanish:
  - para inscribirse por genealogía
  - para ser empadronados según su linaje
  lexicon: HALOT
  rationale: El hitpael señala una inscripción o registro vinculado con la ascendencia familiar. ‘Registrados por genealogía’ conserva el matiz oficial y el vínculo con el linaje, sin forzar una expresión demasiado técnica.
- source_word: סֵפֶר הַיַּחַשׂ
  english_pob_choice: the book of the genealogy
  chosen_spanish: el libro de la genealogía
  alternatives_spanish:
  - el registro genealógico
  - el libro del registro genealógico
  lexicon: HALOT
  rationale: La frase nombra un documento escrito real; ‘libro de la genealogía’ sigue de cerca el hebreo y resulta comprensible en español.
- source_word: הָעוֹלִים
  english_pob_choice: those who came up
  chosen_spanish: de los que subieron
  alternatives_spanish:
  - de los que vinieron
  - de los retornados
  lexicon: HALOT
  rationale: ‘Subieron’ preserva el idioma bíblico de subir a Jerusalén o a la tierra, sin sustituirlo por una paráfrasis más explicativa.
- source_word: בָּרִאשׁוֹנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - al principio
  - en la primera ocasión
  lexicon: HALOT
  rationale: Se refiere a la primera oleada de los que subieron; ‘primero’ expresa bien esa prioridad temporal.
- source_word: וָאֶמְצָא כָּתוּב בּוֹ
  english_pob_choice: 'and I found written in it:'
  chosen_spanish: 'y hallé escrito en él:'
  alternatives_spanish:
  - 'y encontré escrito en él:'
  - 'y hallé en él escrito:'
  lexicon: HALOT
  rationale: La construcción introduce el contenido del registro que sigue. ‘Hallé escrito en él’ mantiene el orden y la sobriedad del hebreo, con naturalidad en español.
theological_decisions:
- issue: Impulso divino interior sin especificar mecanismo de revelación
  english_pob_reading: Then my God put it into my heart
  chosen_spanish_reading: Entonces mi Dios lo puso en mi corazón
  alternative_spanish_readings:
  - Entonces Dios me inspiró
  - Entonces mi Dios me lo puso en el corazón
  rationale: 'El hebreo presenta una acción divina interior, pero no define el modo. La traducción conserva esa tensión: es iniciativa de Dios y a la vez un impulso interior, sin convertirlo en ‘inspiración’ técnica ni en mera ocurrencia personal.'
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica sin resolverla excesivamente.'
translation_notes:
  revision_awareness: La redacción sigue el consenso alto del audit trail inglés y conserva la revisión que prefirió ‘assemble/assemble’ por un registro más formal; en español se optó por ‘reunir’, que mantiene esa formalidad sin sonar rígido. También se preservó la ambigüedad controlada de la acción divina interior, tal como reflejan las decisiones teológicas en el inglés POB.
  spanish_consistency_notes:
  - Se usa ‘mi Dios’ para reflejar el posesivo hebreo y mantener la cercanía relacional del texto.
  - Se mantuvo ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino explícito; aquí el texto dice ‘mi Dios’, por lo que no aplica.
  - ‘Nobles’ y ‘oficiales’ siguen la terminología administrativa ya establecida en el audit trail inglés.
  - ‘Registrados por genealogía’ evita reducir el proceso a un simple censo, preservando el vínculo con el linaje familiar.
