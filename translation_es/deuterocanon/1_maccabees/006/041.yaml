translation:
  language: es
  text: Y todos los que oían el sonido[a] de su multitud, y la marcha[b] de la multitud, y el choque[c] de las armas, se estremecían; porque el campamento era sumamente grande y fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sonido'' traduce aquí el ruido o estruendo percibido, no una ''voz'' literal.'
    reason: lexical_alternative
  - marker: b
    text: '''La marcha'' expresa el movimiento de tropas en un contexto de batalla; también podría entenderse como su avance o desplazamiento.'
    reason: lexical_alternative
  - marker: c
    text: '''Choque'' expresa el entrechocar de las armas y el ruido resultante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσαλεύοντο
  english_pob_choice: were shaken
  chosen_spanish: temblaban
  alternatives_spanish:
  - eran sacudidos
  - se estremecían
  - quedaban conmovidos
  lexicon: LSJ
  rationale: El imperfecto pasivo comunica un efecto continuo de conmoción. En español, 'temblaban' transmite con naturalidad la reacción física y emocional sin exagerar hacia terror explícito, manteniendo la fuerza del griego y del audit trail inglés.
- source_word: φωνῆς
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: LSJ
  rationale: En este contexto militar, φωνῆς no apunta a 'voz' literal sino al sonido perceptible de la multitud. 'Sonido' conserva amplitud semántica y suena natural en español bíblico moderno.
- source_word: πλήθους
  english_pob_choice: multitude
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - masa
  - gente
  lexicon: LSJ
  rationale: '''Multitud'' reproduce bien la idea de gran número sin añadir matiz técnico. Además permite mantener la repetición del griego en español, como en el inglés auditado.'
- source_word: ὁδοιπορίας
  english_pob_choice: marching
  chosen_spanish: marchar
  alternatives_spanish:
  - marcha
  - avance
  - caminar
  lexicon: LSJ
  rationale: Aunque el sustantivo puede referirse a viaje o marcha, el contexto bélico exige un sentido militar. 'El marchar' conserva la referencia al movimiento de tropas y el paralelo con el sonido y el choque de armas.
- source_word: συγκρουσμοὺς
  english_pob_choice: clashing
  chosen_spanish: choque
  alternatives_spanish:
  - golpe
  - choque de
  - estrépito
  lexicon: LSJ
  rationale: El término expresa golpeamiento o colisión. 'Choque' mantiene la imagen auditiva sin introducir un verbo interpretativo adicional; unido a 'de las armas' refleja bien el ruido de armas al entrechocarse.
- source_word: ὅπλων
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - las armas bélicas
  - los pertrechos
  lexicon: LSJ
  rationale: '''Armas'' es el equivalente más directo y natural en español. Evita estrechar el sentido a solo armas ofensivas o solo armaduras, manteniendo la generalidad del griego.'
- source_word: παρεμβολὴ
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de guerra
  - real
  lexicon: LSJ
  rationale: '''Campamento'' es claro en español y puede abarcar el campamento militar del contexto. Es ligeramente más explícito que ''camp'' en inglés, ayudando a la inteligibilidad sin salir del sentido básico.'
- source_word: μεγάλη σφόδρα καὶ ἰσχυρά
  english_pob_choice: exceedingly great and strong
  chosen_spanish: sumamente grande y fuerte
  alternatives_spanish:
  - excesivamente grande y fuerte
  - muy grande y fuerte
  - enormemente grande y fuerte
  lexicon: LSJ
  rationale: La acumulación intensificadora se conserva con 'sumamente'. 'Grande y fuerte' refleja tanto tamaño como capacidad/poder; 'fuerte' mantiene la fuerza física o militar del campamento sin forzar 'poderoso'.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada y el griego de Swete; no se introdujeron revisiones posteriores ni variantes textuales relevantes en el paquete fuente. La repetición de 'multitud' y la secuencia auditiva se preservan para mantener la sintaxis paralela.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος.
  - 'Se conserva el paralelismo auditivo del griego: sonido / marchar / choque / temblaban.'
  - Se eligió vocabulario militar transparente y no eclesiástico para evitar suavizar el contexto bélico.
