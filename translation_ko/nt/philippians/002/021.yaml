id: PHP.2.21
reference: Philippians 2:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ πάντες γὰρ τὰ ἑαυτῶν ζητοῦσιν, οὐ τὰ ⸂Ἰησοῦ Χριστοῦ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/021.yaml
  text: 'For they all seek their own interests, not those of Jesus Messiah.'
translation:
  language: ko
  text: 그들 모두가 자기 자신의 일을 구하고, 예수 메시아[a]의 일은 구하지 않기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πάντες
  english_pob_choice: they all
  chosen_korean: 그들 모두
  alternatives_korean:
  - 모두가
  - 모든 사람
  lexicon: BDAG
  rationale: 관사 + 복수가 명사화. 「그들 모두」가 집합적 강조를 자연스럽게 표현한다.
- source_word: γὰρ
  english_pob_choice: for
  chosen_korean: ~ 때문입니다
  alternatives_korean:
  - 왜냐하면
  lexicon: BDAG
  rationale: 앞 절의 이유를 표시. 한국어 「~때문입니다」가 합쇼체에 자연스럽다.
- source_word: τὰ ἑαυτῶν
  english_pob_choice: their own interests
  chosen_korean: 자기 자신의 일
  alternatives_korean:
  - 자기 자신의 것
  - 자기 자신의 이익
  lexicon: BDAG
  rationale: 자신에게 속한 것을 폭넓게 가리키는 관용 표현. 4절과 어휘적 일관성을 위해 「자기 자신의 일」로 옮긴다.
- source_word: ζητοῦσιν
  english_pob_choice: seek
  chosen_korean: 구하다
  alternatives_korean:
  - 추구하다
  - 찾다
  lexicon: BDAG
  rationale: 표준 어휘 「구하다」가 자연스럽고 두 대조절 모두에 잘 맞는다.
- source_word: τὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: those of Jesus Messiah
  chosen_korean: 예수 메시아의 일
  alternatives_korean:
  - 예수 메시아의 것
  - 예수 그리스도의 일
  lexicon: BDAG
  rationale: 신택스 흐름 유지 위해 「예수 메시아의 일」로 옮긴다. Χριστός는 본 번역의 원칙에 따라 「메시아」.
theological_decisions:
- issue: Ἰησοῦ Χριστοῦ 구절에서 Χριστοῦ를 옮기는 법
  chosen_reading: 예수 메시아
  alternative_readings:
  - 예수 그리스도
  rationale: 본 번역의 원칙에 따라 칭호로 기능하는 Χριστός는 「메시아」로 옮긴다. 한국어 독자에게 익숙한 「예수 그리스도」는 각주로 보존한다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
