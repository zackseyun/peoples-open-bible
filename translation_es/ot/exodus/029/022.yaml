review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la lista de porciones sacrificiales del hebreo: grasa/grosura, cola adiposa, grasa que cubre las entrañas, lóbulo del hígado, dos riñones, grasa sobre ellos y el muslo/muslo superior derecho. También conserva correctamente la cláusula final que identifica al animal como el carnero usado en el rito de instalación sacerdotal. No hay omisiones sustanciales.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos reparos. Primero, la nota al pie está mal anclada: el marcador [a] aparece en «grosura», mientras la nota explica «carnero de investidura». Segundo, «cola gorda» suena algo coloquial e imprecisa para אַלְיָה; «cola grasa» o «cola adiposa» preserva mejor la especificidad anatómica sin perder claridad. Además, conviene ajustar la nota al pie para español más natural y coherente con el término principal.'
  glossary_alignment: No hay términos de glosario mayores en juego como Yahvé o Mesías. La elección «carnero» para אַיִל y «riñones» para כְּלָיֹת es adecuada. «Grosura» para חֵלֶב es defendible en registro sacrificial. «Investidura» para אֵיל מִלֻּאִים es posible en español, aunque más marcado; la documentación inglesa privilegia «ordinación», con alternativas preservadas en nota. Aquí puede mantenerse «investidura» si la nota se ancla correctamente y explica las alternativas.
  issues:
  - severity: high
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: El marcador [a] aparece en «grosura[a]», pero el contenido de la nota trata de «carnero de investidura/consagración/instalación». Esto rompe la correspondencia obligatoria entre ancla y nota.
  - severity: medium
    issue: «Cola gorda» es menos precisa para אַלְיָה que una formulación como «cola grasa».
    rationale: El hebreo se refiere específicamente a la cola grasa/fat tail del carnero. «Gorda» puede entenderse solo como tamaño o aspecto general, mientras que «grasa» preserva el rasgo anatómico sacrificial relevante.
  - severity: low
    issue: La redacción de la nota puede mejorarse en naturalidad y puntuación española.
    rationale: La forma actual comienza con comilla innecesaria y un «O:» poco elegante. Una formulación más limpia mejora legibilidad sin cambiar el contenido.
  revised_spanish_text: Tomarás del carnero la grosura, la cola grasa, la grosura que cubre las entrañas, el lóbulo del hígado, los dos riñones, la grosura que está sobre ellos, y el muslo derecho; porque es un carnero de investidura[a].
  revised_footnotes:
