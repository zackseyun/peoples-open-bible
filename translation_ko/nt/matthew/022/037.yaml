id: MAT.22.37
reference: Matthew 22:37
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἔφη αὐτῷ· Ἀγαπήσεις κύριον τὸν θεόν σου ἐν ὅλῃ ⸀τῇ καρδίᾳ σου καὶ ἐν ὅλῃ ⸁τῇ ψυχῇ σου καὶ ἐν ὅλῃ τῇ διανοίᾳ σου·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/037.yaml
  text: And he said to him[c][b][a], “You shall love the Lord your God with all your heart and with all your soul and with all your mind.”
  footnotes:
  - marker: a
    text: Or 'in all your heart ... in all your soul ... in all your mind.' The Greek preposition is ἐν ('in'), but English idiom commonly renders this construction as 'with.'
    reason: lexical_alternative
  - marker: b
    text: ψυχή can also mean 'life' or 'self' in some contexts; here 'soul' preserves the wording and sense of the command as a comprehensive call to love God.
    reason: lexical_alternative
  - marker: c
    text: διάνοια may also be rendered 'understanding.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그분이 그에게 말씀하셨습니다, 「ʻ네 마음을 다하고, 네 목숨을 다하고, 네 뜻을 다하여 주 너의 하나님을 사랑하라.ʼ
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 신 6:5 인용. LXX의 κύριον τὸν θεόν σου는 히브리 본문의 יהוה אלהיך를 번역한 것이며, 본 신명기 본문에서 κύριος는 야훼(YHWH)를 가리킨다. 본 번역에서는 예수께서 LXX 형식 그대로 인용하시는 상황을 반영하여 「주 너의 하나님」으로 옮기되, 그 「주」가 곧 야훼임을 본 각주로 명시한다.
    reason: alternative_reading
theological_decisions:
- issue: 신 6:5 인용에서 κύριος = יהוה (YHWH)
  chosen_reading: 「주 너의 하나님」 (각주로 야훼 표기 명시)
  alternative_readings:
  - 야훼 너의 하나님을 사랑하라
  rationale: 예수께서 셰마(Shema) 본문을 인용하시며 사용하신 κύριος는 LXX 관례를 따라 히브리어 יהוה를 가리킨다. 본 프로젝트의 glossary 원칙은 NT에서 κύριος가 분명히 YHWH를 인용/지시할 때 「야훼」로 옮기고 신학적 결정에 기록하는 것이다. 그러나 본 절은 예수께서 LXX 형식 그대로 인용하시는 직접 화법이므로 본문에는 「주」를 유지하고 각주를 통해 그 「주」가 곧 야훼임을 분명히 밝히는 절충안을 택한다. 부활/안식일/메시아 논쟁 본문에서 일관된 처리를 위해 신학적 결정을 명시한다.
  doctrine_reference: 'DOCTRINE.md §1, §5: original-language primacy; render the source''s strongest plain meaning'
