  - marker: b
    text: O 'se refugia'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'en su muerte'; también puede entenderse 'al morir' o 'cuando muere'. Algunas traducciones interpretan más explícitamente 'tiene esperanza en su muerte', pero el hebreo no dice 'esperanza' de manera directa.
    reason: alternative_reading
  revision_rationale: 'Se corrigen las notas para que correspondan a los segmentos correctos del texto hebreo y del expediente inglés: la alternativa de ''halla refugio'' se preserva en [b], y la nota sobre ''en su muerte'' se mueve al lugar correcto en [c]. Se elimina la nota innecesaria sobre ''impío'' para evitar ruido y se mantiene intacto el texto principal, que ya era fiel y natural.'
