    rationale: Esto rompe la trazabilidad del expediente POB. La nota debería acompañar a «al que estaba a cargo de todo lo suyo» y explicar la alternativa «el que estaba encargado de todo lo que era suyo», es decir, el mayordomo o asistente principal de Holofernes.
