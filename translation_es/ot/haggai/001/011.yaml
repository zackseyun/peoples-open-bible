translation:
  language: es
  text: Y llamé sequía sobre la tierra y sobre los montes, sobre el grano, sobre el mosto, sobre el aceite fresco[a], sobre lo que produce la tierra, sobre el hombre[b] y sobre la bestia, y sobre todo el trabajo de las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aceite de oliva»; el hebreo probablemente se refiere específicamente al aceite de oliva como producto agrícola.
    reason: lexical_alternative
  - marker: b
    text: O «humanidad». El hebreo אָדָם aquí es un singular genérico para los seres humanos.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶקְרָא
  english_pob_choice: I called for
  chosen_spanish: llamé
  alternatives_spanish:
  - clamé
  - llamé para
  lexicon: HALOT
  rationale: En este contexto profético, קרא expresa convocar o hacer venir una condición de juicio. «Llamé» conserva la agencia divina y suena natural en español sin añadir una paráfrasis innecesaria.
- source_word: חֹרֶב
  english_pob_choice: drought
  chosen_spanish: sequía
  alternatives_spanish:
  - aridez
  - desolación
  lexicon: HALOT
  rationale: El contexto agrícola exige un término de juicio sobre la producción de la tierra. «Sequía» comunica con claridad la idea de falta de lluvia y parálisis agrícola.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: HALOT
  rationale: Aquí אֶרֶץ alude al ámbito agrícola local, no al globo terráqueo. «La tierra» mantiene la amplitud concreta del hebreo y funciona bien junto a «montes».
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - las colinas
  lexicon: HALOT
  rationale: «Montes» es natural en español bíblico y conserva el tono profético. También evita una rigidez innecesaria frente a un inventario poético de ámbitos afectados.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - los granos
  lexicon: HALOT
  rationale: דָּגָן es un término general para el producto cereal. «Grano» preserva la referencia amplia sin imponer una especie agrícola específica.
- source_word: הַתִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: el mosto
  alternatives_spanish:
  - el vino nuevo
  - el vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ nombra el producto recién obtenido de la uva. «Mosto» es una opción precisa en español para ese vino recién exprimido, y mantiene mejor la distinción agrícola que «vino» a secas.
- source_word: הַיִּצְהָר
  english_pob_choice: the fresh oil
  chosen_spanish: el aceite fresco
  alternatives_spanish:
  - el aceite de oliva
  - el aceite
  lexicon: HALOT
  rationale: יִצְהָר suele referirse al aceite agrícola, normalmente de oliva, como producto nuevo. «Aceite fresco» preserva la cualidad de producto reciente y evita convertir la explicación en una glosa interpretativa excesiva.
- source_word: אֲשֶׁר תּוֹצִיא הָאֲדָמָה
  english_pob_choice: what the ground produces
  chosen_spanish: lo que produce la tierra
  alternatives_spanish:
  - lo que la tierra da
  - todo lo que la tierra hace brotar
  lexicon: HALOT
  rationale: La cláusula resume la producción general del suelo. «Lo que produce la tierra» es claro, natural y conserva la imagen concreta sin ampliar el sentido.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - las personas
  lexicon: HALOT
  rationale: אָדָם funciona aquí como singular genérico en paralelo con «ganado»/animales. «El hombre» preserva la forma representativa del hebreo y la simetría retórica, con la posibilidad contextual de un sentido inclusivo.
- source_word: הַבְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: el ganado
  alternatives_spanish:
  - la bestia
  - los animales
  lexicon: HALOT
  rationale: En un marco agrario, בְּהֵמָה puede referirse al ganado o a los animales domésticos. «Ganado» comunica bien el contexto productivo, aunque «bestia» conserva más literalmente el registro formal.
- source_word: כָּל יְגִיעַ כַּפָּיִם
  english_pob_choice: all the labor of the hands
  chosen_spanish: todo el trabajo de las manos
  alternatives_spanish:
  - todo el laborar de las manos
  - todo el esfuerzo de las manos
  lexicon: HALOT
  rationale: El hebreo es un modismo para el esfuerzo humano y sus productos. «Trabajo de las manos» sigue de cerca la imagen original y resulta inteligible en español.
theological_decisions:
- issue: אָדָם como genérico humano en paralelo con animales
  english_pob_reading: The Hebrew אָדָם here is a generic singular for human beings.
  chosen_spanish_reading: 'אָדָם aquí se entiende como singular genérico: «el hombre».'
  alternative_spanish_readings:
  - «la humanidad»
  - «las personas»
  rationale: La estructura del verso enumera ámbitos afectados por el juicio y coloca a אָדָם junto a בְּהֵמָה. Mantener el singular genérico preserva el paralelismo y la tensión estilística del hebreo, sin excluir el sentido colectivo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4; Contested terms table for אָדָם'
- issue: בְּהֵמָה en contexto agrario
  english_pob_reading: Or 'fresh oil'; the Hebrew likely refers specifically to olive oil as an agricultural product.
  chosen_spanish_reading: «Ganado» se usa como término contextual para los animales domésticos afectados por la sequía.
  alternative_spanish_readings:
  - «bestia»
  - «animales»
  rationale: El pasaje enumera productos y seres dependientes de la tierra; por eso un término agrario como «ganado» comunica bien la referencia funcional. Se conserva, sin embargo, la posibilidad de una lectura más formal en el registro profético.
  doctrine_reference: 'DOCTRINE.md: lexical context sensitivity for בְּהֵמָה'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se adopta una equivalencia óptima con ajustes idiomáticos en español: «sequía» para חֹרֶב, «mosto» para תִּירוֹשׁ, y «ganado» para בְּהֵמָה en contexto agrario. Se preserva la tensión de אָדָם como genérico singular con nota alternativa inclusiva. No se requieren revisiones mayores según el pass final de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; este versículo no lo contiene.
  - Se mantiene «mosto» para תִּירוֹשׁ a fin de distinguirlo de «aceite fresco».
  - Se evita «SEÑOR» y otras sustituciones no presentes en el hebreo.
  - 'El orden de los miembros sigue el hebreo: tierra, montes, grano, mosto, aceite, producción de la tierra, hombre, ganado y trabajo manual.'
