id: 2TI.1.1
reference: 2 Timothy 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ κατ’ ἐπαγγελίαν ζωῆς τῆς ἐν Χριστῷ Ἰησοῦ
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/001.yaml
  text: 'Paul[a], an apostle of Messiah Jesus by the will of God, according to the promise of the life that is in Messiah Jesus,'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus' in both occurrences of 'Messiah Jesus.'
    reason: alternative_reading
translation:
  language: ko
  text: 하나님의 뜻에 따라 메시아 예수의 사도로 부름 받은 바울이, 메시아 예수 안에 있는 생명의 약속을 따라,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 보냄받은 자
  - 사신
  lexicon: BDAG
  rationale: 바울의 자기 소개 정식에서 「사도」는 신약 헬라어의 전문 용어를 가장 분명히 살리는 한국어 등가어이며, 한국 교회 전통에서도 확립되어 있다.
- source_word: Χριστοῦ Ἰησοῦ / Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호로 기능하는 Χριστός를 「메시아」로 옮긴다. 인사 정식과 「생명의 약속」 문맥 모두에서 칭호성이 그대로 살아 있다.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_korean: 하나님의 뜻에 따라
  alternatives_korean:
  - 하나님의 뜻으로
  - 하나님의 뜻을 통하여
  lexicon: BDAG
  rationale: 사도직 위임 정식에서 διά + 속격은 신적 권위의 통로를 가리킨다. 한국어 「뜻에 따라」는 그 위임의 무게와 자연스러운 문장 흐름을 함께 살린다.
- source_word: κατ’ ἐπαγγελίαν ζωῆς
  english_pob_choice: according to the promise of the life
  chosen_korean: 생명의 약속을 따라
  alternatives_korean:
  - 생명의 약속에 따라
  - 생명을 약속하신 대로
  lexicon: BDAG
  rationale: κατά + 대격은 사도직과 하나님의 약속 사이의 일치·부합을 나타낸다. 「생명의 약속」은 헬라어 구조를 그대로 옮긴다.
- source_word: τῆς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: that is in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는
  alternatives_korean:
  - 메시아 예수 안에서 누리는
  lexicon: BDAG
  rationale: 관사+전치사구의 관형적 기능을 한국어 관형절로 옮겨, 「~안에」(ἐν)의 연합·소재 의미를 그대로 살린다.
theological_decisions:
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 「메시아」로 옮기도록 지시한다. 한국 전통의 「그리스도」는 음역으로 굳어져 칭호성이 가려지므로, 본 번역에서는 일관되게 「메시아」를 사용한다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
