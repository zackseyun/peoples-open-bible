    issue: «bastón» para מַטֵּה
    rationale: Aunque no es incorrecto en sentido amplio, «bastón» en español moderno suele evocar un palo de apoyo para caminar. En Números 17, el objeto de Aarón funciona como vara tribal/sacerdotal y señal milagrosa; «vara» es más natural y más fiel al registro bíblico y al contexto narrativo.
