  text: ἐμοὶ δὲ εἰς ἐλάχιστόν ἐστιν, ἵνα ὑφ’ ὑμῶν ἀνακριθῶ ἢ ὑπὸ ἀνθρωπίνης ἡμέρας· ἀλλ’ οὐδὲ ἐμαυτὸν ἀνακρίνω·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/003.yaml
  text: But to me it is a very small thing that I should be examined by you or by any human court; in fact[a], I do not even examine myself.
  footnotes:
  - marker: a
    text: 'Greek literally, ''by a human day,'' an idiom for human judgment or evaluation.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 나에게는 여러분이나 어떤 인간 법정에 의해 심판받는 것이 지극히 사소한 일입니다. 사실 나 자신도 나를 심판하지 않습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰς ἐλάχιστόν
  english_pob_choice: a very small thing
  chosen_korean: 지극히 사소한 일
  alternatives_korean:
  - 하찮은 일
  lexicon: BDAG
  rationale: 최상급 ἐλάχιστος의 무게.
- source_word: ἀνθρωπίνης ἡμέρας
  english_pob_choice: any human court
  chosen_korean: 인간 법정
  alternatives_korean:
  - 사람의 심판 날
  - 인간적 법정의 날
  lexicon: BDAG
  rationale: ἀνθρωπίνη ἡμέρα는 5절의 「주의 날」과 대조되는 인간의 심판 날(=법정). 의미를 살려 「인간 법정」으로 옮긴다.
- source_word: ἀνακρίνω
  english_pob_choice: examine
  chosen_korean: 심판하지
  alternatives_korean:
  - 판단하지
  - 조사하지
  lexicon: BDAG
  rationale: 사법적 「예심·조사」. 본 문맥은 종말적 심판과 평행되므로 「심판」이 자연스럽다.
