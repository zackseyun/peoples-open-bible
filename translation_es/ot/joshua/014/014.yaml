translation:
  language: es
  text: Por tanto, Hebrón llegó a ser como herencia para Caleb, hijo de Jefone, el cenezita, hasta este día, porque siguió plenamente[a] a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguió de todo corazón a Yahvé». El hebreo dice literalmente que «llenó después de» Yahvé, un modismo que expresa lealtad completa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La secuencia causal-consecutiva pide una transición natural en español; «por tanto» conserva el valor inferencial sin volverlo demasiado coloquial.
- source_word: הָיְתָה
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - fue
  - se convirtió en
  lexicon: HALOT
  rationale: 'En el contexto de posesión hereditaria, el verbo expresa un cambio de estado: Hebrón pasó a pertenecer a Caleb como herencia. «Llegó a ser» mantiene ese matiz mejor que un simple «fue».'
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  lexicon: transliteration
  rationale: Se conserva el topónimo bíblico en transliteración estándar al español.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה הַקְּנִזִּי
  english_pob_choice: of Caleb son of Jephunneh the Kenizzite
  chosen_spanish: de Caleb, hijo de Jefone, el cenezita
  alternatives_spanish:
  - para Caleb, hijo de Jefone, el cenezita
  - perteneciente a Caleb, hijo de Jefone, el cenezita
  lexicon: HALOT
  rationale: El vínculo sintáctico se expresa naturalmente con «de» en español, manteniendo la relación posesiva/beneficiaria. «Cenezita» conserva el etnónimo sin desplazarlo por una explicación no atestiguada.
- source_word: לְנַחֲלָה
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - como herencia
  - la posesión heredada
  lexicon: HALOT
  rationale: En el contexto de reparto territorial, נַחֲלָה refiere a la posesión heredada o asignada. «Herencia» es el equivalente más natural y fiel en español.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Se conserva el modismo temporal estándar que señala continuidad hasta el momento del narrador.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La conjunción compuesta introduce la causa de la concesión; «porque» es claro y directo en español.
- source_word: מִלֵּא אַחֲרֵי
  english_pob_choice: fully followed
  chosen_spanish: siguió plenamente
  alternatives_spanish:
  - siguió de todo corazón
  - fue totalmente fiel tras
  lexicon: HALOT
  rationale: El hebraísmo literal «llenó después de» no suena natural en español. «Siguió plenamente» conserva la idea de lealtad total y la fuerza del seguimiento completo, sin borrar la tensión idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa el nombre divino en la forma española establecida por el proyecto, en lugar de sustituirlo por «SEÑOR».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula de identificación pactual de forma directa y transparente en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: El texto hebreo nombra explícitamente a יְהוָה. La convención del proyecto pide conservar el nombre divino en traducción, no ocultarlo tras un título. «Yahvé» preserva esa decisión y su valor teológico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido idiomático de מִלֵּא אַחֲרֵי יְהוָה
  english_pob_reading: fully followed Yahweh
  chosen_spanish_reading: siguió plenamente a Yahvé
  alternative_spanish_readings:
  - siguió de todo corazón a Yahvé
  - fue plenamente leal a Yahvé
  rationale: La frase hebrea es un modismo de lealtad completa. La traducción conserva el seguimiento personal y la totalidad de la devoción sin resolverla en una paráfrasis doctrinalmente más interpretativa.
  doctrine_reference: 'DOCTRINE.md: Idioms and loyalty language — preserve full-following language where possible'
translation_notes:
  revision_awareness: 'El paquete inglés permanece sin revisiones recientes (latest_revision_pass: unchanged). La versión española sigue la misma lectura óptima: conserva el cambio de estado de הָיְתָה, el valor posesivo de לְכָלֵב/לְנַחֲלָה, el modismo de seguimiento completo en מִלֵּא אַחֲרֵי y la decisión doctrinal de traducir יְהוָה como nombre divino explícito.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Herencia» traduce נַחֲלָה en sentido territorial/jurídico, no una herencia meramente afectiva.
  - El etnónimo «cenezita» conserva el valor identificador sin ampliar el texto.
  - La nota al pie marca la alternativa idiomática sin deshacer la traducción principal.
