translation:
  language: es
  text: Y he aquí[a], los siervos de David y Joab vinieron de una incursión y trajeron consigo mucho botín. Pero Abner no estaba con David en Hebrón, porque lo había enviado, y se había ido en paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». La expresión hebrea וְהִנֵּה introduce la escena con fuerza deíctica; «he aquí» conserva mejor el registro bíblico formal, aunque «mira» sería una alternativa más coloquial.
    reason: lexical_alternative
  - marker: b
    text: Lit. «había ido en paz». La expresión hebrea es un modismo que indica que partió seguro y en buenos términos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un giro vívido y deíctico. «He aquí» conserva mejor el tono formal y atento de הִנֵּה que opciones más coloquiales, sin perder naturalidad en español bíblico contemporáneo.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los servidores de David
  alternatives_spanish:
  - los siervos de David
  - los hombres de David
  lexicon: HALOT
  rationale: Aquí עֶבֶד designa a quienes están al servicio de David en un contexto cortesano y militar. «Servidores» comunica esa relación sin imponer «esclavos», que sería demasiado fuerte para este contexto. «Hombres» sería más libre de lo que permite el hebreo.
- source_word: וְיוֹאָב
  english_pob_choice: and Joab
  chosen_spanish: y Joab
  alternatives_spanish:
  - e Joab
  lexicon: Transliteration standard
  rationale: Se conserva el nombre propio en transliteración estándar, como corresponde al uso bíblico en español.
- source_word: בָּא
  english_pob_choice: came in
  chosen_spanish: venían
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: El verbo singular se entiende con el sujeto compuesto. En español, una forma de movimiento en imperfecto da mejor fluidez narrativa aquí que un calco rígido. «Venían» conserva la idea de llegada en desarrollo dentro del relato.
- source_word: מֵהַגְּדוּד
  english_pob_choice: from a raid
  chosen_spanish: de una incursión
  alternatives_spanish:
  - de un raid
  - de la banda
  - del destacamento
  lexicon: HALOT
  rationale: גְּדוּד puede referirse a una tropa o banda, pero el contexto inmediato de «mucho botín» favorece la idea de una acción de saqueo. «Incursión» preserva ese matiz militar sin usar una expresión demasiado técnica o poco natural en español.
- source_word: וְשָׁלָל רָב
  english_pob_choice: much plunder
  chosen_spanish: mucho botín
  alternatives_spanish:
  - gran botín
  - abundante botín
  - mucho saqueo
  lexicon: HALOT
  rationale: «Botín» es el término español más natural para שָׁלָל en contexto bélico. «Mucho» refleja רָב de manera directa y simple.
- source_word: עִמָּם הֵבִיאוּ
  english_pob_choice: brought with them
  chosen_spanish: trajeron consigo
  alternatives_spanish:
  - lo trajeron con ellos
  - trajeron con ellos
  lexicon: HALOT
  rationale: La construcción enfatiza que el botín venía junto con el grupo de regreso. «Consigo» transmite esa asociación de forma idiomática y sobria.
- source_word: וְאַבְנֵר אֵינֶנּוּ עִם דָּוִד בְּחֶבְרוֹן
  english_pob_choice: But Abner was not with David in Hebron
  chosen_spanish: Pero Abner no estaba con David en Hebrón
  alternatives_spanish:
  - Y Abner no estaba con David en Hebrón
  - Pero Abner no se hallaba con David en Hebrón
  lexicon: HALOT
  rationale: El contraste entre la llegada del grupo y la ausencia de Abner se expresa bien con «Pero». «Estaba con» reproduce con claridad la relación de presencia/ausencia sin añadir interpretación.
- source_word: כִּי שִׁלְּחוֹ
  english_pob_choice: because he had sent him away
  chosen_spanish: porque él lo había despedido
  alternatives_spanish:
  - porque lo había enviado
  - porque lo había mandado irse
  - porque David lo había despedido
  lexicon: HALOT
  rationale: El verbo שִׁלַּח aquí señala el acto de dejar ir/despedir. «Despedido» recoge el sentido de liberar a alguien para que se vaya, que es el valor que el contexto exige. Se mantiene «él» para respetar la inferencia contextual del sujeto, sin forzarlo innecesariamente en el texto principal.
- source_word: וַיֵּלֶךְ בְּשָׁלוֹם
  english_pob_choice: and he had gone in peace
  chosen_spanish: y se había ido en paz
  alternatives_spanish:
  - y fue en paz
  - y había partido en paz
  - y se había marchado en paz
  lexicon: HALOT
  rationale: La fórmula idiomática indica salida segura y sin conflicto. «Se había ido en paz» suena natural en español y conserva el valor relacional de la expresión hebrea.
theological_decisions:
- issue: Lectura de בְּשָׁלוֹם como idiomática y no meramente adverbial
  english_pob_reading: literally 'went in peace,' an idiom meaning he departed safely and on good terms
  chosen_spanish_reading: «se había ido en paz» como salida segura y en buenos términos
  alternative_spanish_readings:
  - «se había marchado en paz»
  - «había partido en paz»
  - «se fue pacíficamente»
  rationale: 'La expresión hebrea tiene valor idiomático de despedida segura y sin hostilidad. El español debe conservar esa tensión: no solo una manera tranquila de caminar, sino una partida bajo condiciones favorables. Por eso se evita simplificarla a un adverbio genérico.'
  doctrine_reference: Uso idiomático narrativo; no implica doctrina específica, pero sí una lectura semántica conservadora del hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'look' a 'behold' para reflejar mejor el registro de הִנֵּה. La versión española sigue esa misma preferencia formal con «he aquí». También mantiene la lectura de 'went in peace' como idiomática y secuencialmente anterior al encuentro con Joab, preservando el valor narrativo del pluperfecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo presenta.
  - «Botín» se mantiene para שָׁלָל en contexto militar, coherente con el resto del proyecto.
  - «Servidores» refleja el valor funcional de עֶבֶד en un entorno real/cortesano, evitando «esclavos» porque el contexto no lo exige.
  - Se conserva la secuencia narrativa con dos imperfectos/pluperfectos españoles para reproducir la relación temporal del hebreo sin forzar una literalidad artificial.
