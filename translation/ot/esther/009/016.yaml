theological_decisions:
- issue: Moral framing of the Jews' action
  chosen_reading: Retained the text's self-defense framing with 'stood for their lives' rather than a more neutral or aggressive rendering.
  alternative_readings:
  - stood for themselves
  - defended themselves
  - took their stand
  rationale: The Hebrew idiom explicitly links their action to preservation of life. The translation should neither soften the violence beyond the text nor remove the self-defensive frame supplied by the narrative.
  doctrine_reference: 'Translation philosophy #1 and #3'
