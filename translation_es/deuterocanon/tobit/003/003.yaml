translation:
  language: es
  text: Acuérdate de mí y mírame; no me castigues[a] por mis pecados y por mis errores cometidos por ignorancia, ni por los de mis padres[c][b], que ellos cometieron delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tomes venganza por mis pecados». El verbo griego puede llevar la idea de vengar o de exigir justicia retributiva; aquí se vierte como «castigar» porque la oración pide que Dios no retribuya los pecados.'
    reason: lexical_alternative
  - marker: b
    text: «Mis errores cometidos por ignorancia» traduce un término para faltas cometidas sin saberlo o sin plena conciencia.
    reason: lexical_alternative
  - marker: c
    text: Es decir, «mis antepasados» o «mis mayores».
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητί
  english_pob_choice: Remember
  chosen_spanish: Acuérdate de mí
  alternatives_spanish:
  - Recuerda me
  - Ten presente de mí
  lexicon: BDAG
  rationale: En lenguaje de oración, μνήσθητί pide que Dios atienda favorablemente al suplicante. «Acuérdate de mí» conserva ese tono bíblico y es natural en español, sin sonar arcaico de manera innecesaria.
- source_word: ἐπίβλεψον ἐπʼ ἐμέ
  english_pob_choice: look upon me
  chosen_spanish: mírame
  alternatives_spanish:
  - mira sobre mí
  - vuélvete a mirarme
  - pon tus ojos en mí
  lexicon: BDAG
  rationale: La expresión intensifica la petición de atención divina. «Mírame» comunica con claridad y dignidad la idea de dirigir la mirada hacia el orante; el matiz de favor queda implícito en el paralelismo con el imperativo anterior.
- source_word: μὴ ἐκδίκῃς
  english_pob_choice: do not punish
  chosen_spanish: no me castigues
  alternatives_spanish:
  - no me vengues
  - no tomes venganza de mí
  - no me hagas justicia retributiva
  lexicon: BDAG
  rationale: En este contexto penitencial, el verbo expresa requital punitiva más que venganza interpersonal. «Castigar» transmite bien la fuerza en español actual sin estrechar el sentido únicamente a «vengarse».
- source_word: τὰς ἁμαρτίας μου
  english_pob_choice: my sins
  chosen_spanish: mis pecados
  alternatives_spanish:
  - mis culpas
  - mis transgresiones
  lexicon: BDAG
  rationale: «Pecados» preserva el peso moral y teológico de ἁμαρτία y resulta la equivalencia más estable y comprensible en español bíblico.
- source_word: τοῖς ἀγνοήμασίν μου
  english_pob_choice: my errors done in ignorance
  chosen_spanish: mis errores cometidos por ignorancia
  alternatives_spanish:
  - mis faltas cometidas sin saberlo
  - mis pecados involuntarios
  - mis yerros por desconocimiento
  lexicon: BDAG
  rationale: ἀγνόημα se refiere a una falta cometida sin plena conciencia. «Errores cometidos por ignorancia» conserva esa idea de culpa no deliberada sin rebajarla a simple equivocación.
- source_word: τῶν πατέρων μου
  english_pob_choice: my fathers
  chosen_spanish: los de mis padres
  alternatives_spanish:
  - los de mis antepasados
  - los de mis padres y mayores
  lexicon: BDAG
  rationale: La expresión griega es literalmente «de mis padres», pero en español «los de mis padres» suena más fluido en coordinación con «mis pecados y mis errores». Mantiene la resonancia familiar-covenantal y deja visible la referencia ancestral.
- source_word: ἃ ἥμαρτον ἐνώπιόν σου
  english_pob_choice: which they committed before you
  chosen_spanish: que ellos cometieron delante de ti
  alternatives_spanish:
  - que ellos pecaron delante de ti
  - que hicieron en tu presencia
  lexicon: BDAG
  rationale: El verbo plural ἥμαρτον apunta más naturalmente a los padres. «Cometieron» evita repetir «pecaron» y mantiene la referencia a actos realizados en presencia/juzgado por Dios, reflejado por «delante de ti».
theological_decisions:
- issue: Alcance de «mis pecados y mis errores cometidos por ignorancia»
  english_pob_reading: The Greek distinguishes sins from wrongs committed unwittingly, and the English keeps both items separate.
  chosen_spanish_reading: La traducción conserva la distinción entre pecados deliberados y faltas cometidas sin plena conciencia.
  alternative_spanish_readings:
  - unificar ambos como «mis pecados»
  - convertir ambos en «mis faltas»
  rationale: El griego distingue entre ἁμαρτίας y ἀγνοήματα; conviene mantener esa tensión en español en vez de fusionar los términos, porque el texto presenta una confesión más matizada.
  doctrine_reference: Conservar distinciones léxicas del texto base sin suavizar la confesión.
- issue: Referencia de «los de mis padres» y la cláusula relativa
  english_pob_reading: The relative clause refers specifically to 'my fathers' and their sins before God.
  chosen_spanish_reading: La cláusula final se entiende como referida específicamente a los padres y a sus pecados delante de Dios.
  alternative_spanish_readings:
  - tomar la cláusula como un resumen de todos los pecados anteriores
  - leerla como referida también a los pecados de Tobit
  rationale: El verbo plural ἥμαρτον se ajusta más naturalmente al antecedente plural cercano. La redacción española mantiene esa referencia ancestral sin diluirla ni trasladarla al hablante.
  doctrine_reference: Preservar la tensión exegética documentada en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió el patrón revisado del audit trail inglés: se evitó una repetición innecesaria de la preposición equivalente a «for», se mantuvo la coordinación entre «pecados» y «errores cometidos por ignorancia», y se preservó la referencia de la cláusula relativa a los padres. También se ajustó el español para que suene natural sin perder la distinción léxica del griego.'
  spanish_consistency_notes:
  - Se usa «Acuérdate» para la petición memorial y «mírame» para el llamado a la atención divina, manteniendo paralelismo y dignidad.
  - «Pecados» se reserva para ἁμαρτίας y «errores cometidos por ignorancia» para ἀγνοήμασίν, sin fusionarlos.
  - «Los de mis padres» mantiene la referencia ancestral en forma idiomática; la nota aclara la equivalencia con «antepasados».
  - La cláusula relativa se conserva en singular lógico respecto de los padres, sin oscurecer el plural del verbo griego.
  - «Delante de ti» refleja ἐνώπιόν σου con valor de presencia/judicio divino.
