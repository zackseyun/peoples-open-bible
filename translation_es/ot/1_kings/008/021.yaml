translation:
  language: es
  text: Y allí puse un lugar para el arca, donde[a] está el pacto de Yahvé, que él hizo con nuestros padres[b] cuando los sacó de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en la cual está el pacto de Yahvé, que él cortó con nuestros padres».'
    reason: lexical_alternative
  - marker: b
    text: 'O «con nuestros antepasados». Hebreo: «con nuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשִׂם
  english_pob_choice: I have set
  chosen_spanish: puse
  alternatives_spanish:
  - he puesto
  - he colocado
  - he dispuesto
  lexicon: HALOT
  rationale: El verbo שׂוּם significa poner/colocar/poner en su lugar. Aquí el hebreo usa perfecto narrativo en labios de Salomón; en español, el pretérito simple “puse” reproduce bien la acción completada sin sonar forzado. “He puesto” era posible, pero el contexto oratorio favorece una formulación más directa.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: Se conserva el adverbio de lugar con una opción natural en español. “Allí” mantiene la referencia deíctica al lugar del templo.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - espacio
  lexicon: HALOT
  rationale: מָקוֹם es un sustantivo general para “lugar”. “Un lugar” es la equivalencia más directa y clara en este contexto.
- source_word: לָאָרוֹן
  english_pob_choice: for the ark
  chosen_spanish: para el arca
  alternatives_spanish:
  - para el arca del pacto
  - para el cofre
  lexicon: HALOT
  rationale: אָרוֹן aquí designa el arca sagrada. En español, “arca” es el término transparente y bíblico; el contexto inmediato ya identifica el referente sin necesidad de ampliar a “del pacto” dentro del texto principal.
- source_word: בְּרִית יְהוָה
  english_pob_choice: the covenant of Yahweh
  chosen_spanish: el pacto de Yahvé
  alternatives_spanish:
  - el pacto de Yahweh
  - el pacto de Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva el término “pacto” para ברית, que en español bíblico comunica bien la alianza formal. YHWH se vierte como “Yahvé” conforme al estándar del proyecto, manteniendo el nombre divino personal.
- source_word: כָּרַת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - selló
  - estableció
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice “cortó” un pacto, en español “hizo” un pacto es la forma idiomática y fiel. No se incorpora “cortó” en el texto principal para evitar extrañeza, pero la tensión idiomática se conserva en la nota.
- source_word: עִם אֲבֹתֵינוּ
  english_pob_choice: with our fathers
  chosen_spanish: con nuestros padres
  alternatives_spanish:
  - con nuestros antepasados
  - con nuestros mayores
  lexicon: HALOT
  rationale: El hebreo usa masculino plural literal. “Padres” conserva esa forma de manera reconocible en español bíblico; “antepasados” sería una neutralización posible, pero aquí se mantiene el paralelismo tradicional y gramatical del original.
- source_word: בְּהוֹצִיאוֹ אֹתָם
  english_pob_choice: when he brought them out
  chosen_spanish: cuando los sacó
  alternatives_spanish:
  - al sacarlos
  - cuando los hizo salir
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con ב se vierte naturalmente como “cuando”. El verbo הוֹצִיא en Hiphil expresa sacar/traer fuera; “los sacó” es idiomático y preciso para el éxodo.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto, sacándolos
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: “Tierra de Egipto” sigue la fórmula bíblica estándar. Se prefiere “de la tierra de Egipto” por fluidez en español y por preservar el movimiento implícito sin sobrecargar el sintagma.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre personal del Dios del pacto como “Yahvé”, conforme al criterio del proyecto, en vez de ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Construcción idiomática de ברית / כָּרַת
  english_pob_reading: the covenant of Yahweh that he made
  chosen_spanish_reading: el pacto de Yahvé, que él hizo
  alternative_spanish_readings:
  - el pacto de Yahvé, que él cortó
  - la alianza de Yahvé, que él hizo
  rationale: Se mantiene la equivalencia idiomática “hizo un pacto”, pero se documenta que el hebreo literalmente dice “cortó”. Así se preserva la tensión entre la expresión semítica original y la naturalidad del español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Preserve source tensions where documented'
- issue: Referencia a אֲבֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El hebreo es masculino plural y la tradición bíblica conserva esa referencia. “Nuestros padres” mantiene la forma del original y la continuidad bíblica sin neutralización innecesaria.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que favoreció “set/place” frente a una formulación más interpretativa. En español se reflejó ese ajuste con “puse un lugar”, manteniendo correspondencia más cercana con שׂוּם y sin introducir una paráfrasis excesiva. También se conservó la tensión idiomática de כָּרַת mediante la nota, como en el registro inglés.
  spanish_consistency_notes:
  - Se usa “Yahvé” para יְהוָה de manera consistente con el proyecto.
  - Se usa “pacto” para ברית y “hizo” para כָּרַת en el texto principal, con nota para la literalidad “cortó”.
  - Se mantiene “padres” para אֲבֹתֵינוּ, siguiendo la preferencia de exactitud de género del proyecto.
  - El estilo busca ser bíblico y claro, sin depender de la sustitución “SEÑOR”.
