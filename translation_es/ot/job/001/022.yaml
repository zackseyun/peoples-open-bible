translation:
  language: es
  text: En todo esto, Job no pecó, ni atribuyó a Dios nada indebido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni atribuyó a Dios impropiedad», o «ni atribuyó a Dios necedad» en el sentido de algo impío o moralmente ofensivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכָל זֹאת
  english_pob_choice: In all this
  chosen_spanish: En todo esto
  alternatives_spanish:
  - En todo ello
  - En todo este asunto
  - A pesar de todo esto
  lexicon: HALOT
  rationale: La expresión hebrea recoge la totalidad de las circunstancias previas; en español, «En todo esto» conserva el alcance global y suena natural y sobrio.
- source_word: לֹא חָטָא
  english_pob_choice: did not sin
  chosen_spanish: no pecó
  alternatives_spanish:
  - no cometió pecado
  - no hizo mal
  - no faltó
  lexicon: HALOT
  rationale: חטא es el verbo usual «pecar»; «no pecó» mantiene la fuerza moral y la formulación directa del hebreo sin debilitarla.
- source_word: נָתַן ... לֵאלֹהִים
  english_pob_choice: did not charge God
  chosen_spanish: no atribuyó a Dios
  alternatives_spanish:
  - no cargó a Dios con
  - no imputó a Dios
  - no adjudicó a Dios
  lexicon: HALOT
  rationale: Aunque literalmente נָתַן es «dar», el giro idiomático aquí expresa asignar o adjudicar algo a Dios. «Atribuyó a Dios» conserva ese valor relacional en español.
- source_word: תִּפְלָה
  english_pob_choice: wrongdoing
  chosen_spanish: ninguna impropiedad
  alternatives_spanish:
  - ninguna necedad
  - ningún acto indigno
  - ninguna culpa
  lexicon: HALOT
  rationale: תִּפְלָה puede abarcar necedad, impropiedad o algo moralmente fuera de lugar. «Impropriedad» preserva la amplitud semántica y evita reducirla a mera torpeza intelectual.
- source_word: לֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  - de parte de Dios
  lexicon: HALOT
  rationale: 'El ל marca el complemento indirecto del dicho: Job no le adjudicó a Dios tal impropiedad. «A Dios» refleja con claridad la dirección de la atribución.'
theological_decisions:
- issue: Cómo traducir תִּפְלָה sin sugerir que Job acusó a Dios de necedad intelectual únicamente
  english_pob_reading: Job did not charge God with wrongdoing; alternatives include folly or impropriety
  chosen_spanish_reading: Job no atribuyó a Dios ninguna impropiedad
  alternative_spanish_readings:
  - Job no atribuyó a Dios ninguna necedad
  - Job no cargó a Dios con ninguna culpa
  - Job no le imputó a Dios nada indebido
  rationale: El contexto subraya que Job no vio a Dios como moralmente defectuoso por lo ocurrido. «Impropriedad» comunica una falta moral o religiosa sin limitar el término a una simple falta de inteligencia.
  doctrine_reference: Job 1:22; traducción filosófica §3, §6
- issue: Si mantener un verbo de acusación/atribución o uno más general
  english_pob_reading: nor did he charge God with wrongdoing
  chosen_spanish_reading: ni atribuyó a Dios ninguna impropiedad
  alternative_spanish_readings:
  - ni acusó a Dios de ninguna impropiedad
  - ni imputó a Dios ninguna impropiedad
  rationale: El hebreo usa un verbo de asignación/adjudicación, y el contexto legal-moral hace apropiado «atribuyó». «Acusó» sería posible, pero puede sonar más explícito de lo que el hebreo exige; «atribuyó» conserva mejor la estructura idiomática.
  doctrine_reference: HALOT; Job 1:22
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo de Job 1:22 y el audit trail inglés, manteniendo la negación doble y la relación indirecta con Dios. Se optó por una solución española natural pero semánticamente conservadora, sin borrar la alternativa léxica de תִּפְלָה entre necedad, impropiedad y wrongdoing.
  spanish_consistency_notes:
  - Se preserva el nombre «Job» como forma estándar en español bíblico.
  - «Dios» se usa sin mayúscula reverencial adicional en notas, según estilo español normal; el texto principal mantiene la capitalización propia del nombre divino.
  - Se evita «SEÑOR» porque el versículo contiene אֱלֹהִים, no el Tetragrámaton.
