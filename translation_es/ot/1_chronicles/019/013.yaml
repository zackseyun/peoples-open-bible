translation:
  language: es
  text: Sé fuerte[a], y seamos fuertes por nuestro pueblo y por las ciudades de nuestro Dios, y que Yahvé haga[b] lo que sea bueno a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y seamos fuertes» o «y fortalecémonos». El verbo hebreo tiene matiz reflexivo/intensivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y Yahvé hará lo que sea bueno a sus ojos». La forma hebrea puede leerse en sentido volitivo o predictivo según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Sé valiente
  - Sé firme
  lexicon: HALOT
  rationale: Es un imperativo directo de חזק; en español, 'Sé fuerte' conserva el sentido exhortativo de fortaleza/coraje sin añadir matices no presentes en el hebreo.
- source_word: וְנִתְחַזְּקָה
  english_pob_choice: and let us be strong
  chosen_spanish: y seamos fuertes
  alternatives_spanish:
  - y fortalecámonos
  - y mostrémonos fuertes
  lexicon: HALOT
  rationale: El hitpael cohortativo tiene fuerza reflexiva o intensiva; 'seamos fuertes' mantiene la exhortación colectiva de modo natural en español y evita una expansión innecesaria.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en defensa de
  - por causa de
  lexicon: HALOT
  rationale: En este contexto militar-comunitario, 'por' comunica bien la idea de obrar en beneficio y defensa de alguien, con concisión y naturalidad.
- source_word: עַמֵּנוּ
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra gente
  - nuestro pueblo y nación
  lexicon: HALOT
  rationale: עַם normalmente significa 'pueblo'; 'nuestro pueblo' conserva la referencia amplia al conjunto del pueblo del pacto, no solo a las tropas.
- source_word: עָרֵי אֱלֹהֵינוּ
  english_pob_choice: the cities of our God
  chosen_spanish: las ciudades de nuestro Dios
  alternatives_spanish:
  - las ciudades de nuestro Dios
  - las ciudades que pertenecen a nuestro Dios
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma transparente. 'Nuestro Dios' mantiene el reclamo teológico de pertenencia a Dios sin suavizarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se usa la forma española establecida en el proyecto para el Nombre divino, preservando el Tetragrámaton en vez de sustituirlo por un título.
- source_word: הַטּוֹב בְּעֵינָיו
  english_pob_choice: what is good in his eyes
  chosen_spanish: lo que le parezca bueno
  alternatives_spanish:
  - lo que es bueno a sus ojos
  - lo que sea bueno a sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y refiere a lo que resulta bueno o aceptable desde la perspectiva de Dios. 'Le parezca bueno' mantiene la imagen y su naturalidad en español.
- source_word: יַעֲשֶׂה
  english_pob_choice: may ... do
  chosen_spanish: haga
  alternatives_spanish:
  - hará
  - que haga
  lexicon: HALOT
  rationale: En contexto tiene fuerza volitiva/deferente. 'Que haga' transmite mejor la entrega reverente al actuar de Dios que una simple lectura predictiva.
theological_decisions:
- issue: Nombre divino en la cláusula final
  english_pob_reading: and may Yahweh do what is good in his eyes
  chosen_spanish_reading: y que Yahvé haga lo que le parezca bueno
  alternative_spanish_readings:
  - y Yahvé hará lo que le parezca bueno
  - y que el SEÑOR haga lo que le parezca bueno
  rationale: El hebreo usa explícitamente el Tetragrámaton. Se conserva 'Yahvé' para mantener el nombre del pacto y la transparencia textual, no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión volitiva/predictiva del verbo final
  english_pob_reading: may ... do / will do
  chosen_spanish_reading: que ... haga
  alternative_spanish_readings:
  - hará
  - quiera hacer
  rationale: El contexto admite tanto un deseo confiado como una afirmación de lo que Dios hará. 'Que haga' preserva esa tensión sin resolverla unilateralmente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó la segunda cola de 'let us show ourselves strong' a 'let us be strong', acercándola más al hebreo. La versión española sigue esa línea con 'seamos fuertes', evitando un calco reflexivo más pesado y manteniendo el contraste entre la exhortación humana y la entrega final a la voluntad de Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma española del Nombre divino, coherente con el criterio del proyecto.
  - '''Dios'' se usa para אֱלֹהִים dentro de la expresión posesiva ''nuestro Dios''.'
  - La cláusula final conserva la ambigüedad reverente del hebreo entre mandato/deferencia y declaración futura.
  - El paralelismo de los dos primeros cola se refleja con imperativo singular seguido de cohortativo plural inclusivo.
