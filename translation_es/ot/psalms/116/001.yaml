translation:
  language: es
  text: Amo a Yahvé[a][b], porque escucha mi voz y mis súplicas pidiendo misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque Yahvé escucha mi voz y mis súplicas pidiendo misericordia». El hebreo permite leer כִּי con valor causal.
    reason: alternative_reading
  - marker: b
    text: O «oirá», ya que la forma verbal hebrea también puede entenderse con sentido futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתִּי
  english_pob_choice: I love
  chosen_spanish: Amo
  alternatives_spanish:
  - He amado
  - Amé
  lexicon: HALOT
  rationale: El perfecto qal 1cs expresa aquí un estado/afecto vigente en un salmo de gratitud; en español, el presente «amo» comunica mejor la afección actual que los perfectos, sin perder la fuerza del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: יִשְׁמַע
  english_pob_choice: hears
  chosen_spanish: escucha
  alternatives_spanish:
  - oirá
  - ha escuchado
  lexicon: HALOT
  rationale: El imperfecto puede ser futuro o presente habitual; en este contexto de confianza, «escucha» en presente expresa bien la certeza del salmista y el valor gnómico del verbo.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - el sonido de mi voz
  lexicon: HALOT
  rationale: «Voz» es el sentido directo y natural de קוֹל en este contexto, y en español suena claro y fiel.
- source_word: תַּחֲנוּנַי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis súplicas por misericordia
  alternatives_spanish:
  - mis ruegos
  - mis peticiones
  lexicon: HALOT
  rationale: תַּחֲנוּנִים designa súplicas intensas orientadas a favor o misericordia. «Súplicas por misericordia» conserva esa carga semántica con un registro bíblico claro en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre personal de Dios revelado en el texto hebreo, evitando la sustitución por un título. Esto sigue la decisión doctrinal del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB revisó la línea para hacer explícito el objeto de «love» y para reflejar con claridad tanto «my voice» como «my pleas for mercy». En español, la estructura natural «Amo a Yahvé, porque escucha mi voz y mis súplicas por misericordia» conserva esa claridad sin añadir material no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la distinción entre «voz» y «súplicas», reflejando los dos complementos hebreos.
  - «Súplicas por misericordia» mantiene el matiz de petición intensa sin rebajarla a una mera petición genérica.
