base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/026/031.yaml
  text: For the Hebronites[a], Jeriah was the chief of the Hebronites according to his generations by fathers’ houses. In the fortieth year of David’s reign they were sought out[c][b], and among them mighty men of valor were found at Jazer of Gilead.
  footnotes:
  - marker: a
    text: Or 'As for the Hebronites, Jeriah was the head.'
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' is a clan term referring to ancestral household groupings, not merely nuclear families.'
    reason: cultural_note
  - marker: c
    text: Or 'mighty warriors' or 'capable men'; the Hebrew phrase can denote men distinguished by strength, valor, or proven ability.
    reason: lexical_alternative
