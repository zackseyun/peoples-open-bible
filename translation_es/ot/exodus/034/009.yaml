- from: 'Y dijo[a]: «Si ahora he hallado favor en tus ojos, Señor, que el Señor vaya en medio de nosotros, aunque es un pueblo de dura cerviz; y perdona nuestra iniquidad y nuestro pecado[b], y tómamos como tu heredad».'
  to: 'Y dijo[a]: «Si ahora he hallado favor en tus ojos, Señor, que el Señor vaya en medio de nosotros, aunque es un pueblo de dura cerviz; y perdona nuestra iniquidad y nuestro pecado, y tómanos como tu heredad[b]».'
  rationale: 'Se corrige el error gramatical grave «tómamos» a «tómanos». También se restauran las notas para que sigan la auditoría inglesa: [a] ahora conserva las alternativas de «en medio / entre / con nosotros», y [b] vuelve a la cláusula final sobre pertenencia pactual, en vez de introducir una nota no auditada sobre «pecado».'
