translation:
  language: es
  text: ¡Oh Yahvé, tú eres mi Dios; te exaltaré; alabaré tu nombre, porque has hecho cosas maravillosas, planes concebidos desde hace mucho, fieles y firmes.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: Tetragrámaton / uso confesional del nombre divino
  rationale: Se conserva el nombre propio divino en la línea del proyecto y se adapta a la forma española establecida, 'Yahvé', en lugar de ocultarlo con un título genérico.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se expresa de modo directo y natural en español con posesivo.
- source_word: אֲרוֹמִמְךָ
  english_pob_choice: I will exalt you
  chosen_spanish: te exaltaré
  alternatives_spanish:
  - te levantaré en alto
  - te ensalzaré
  lexicon: HALOT
  rationale: El verbo en español conserva la idea de elevar en alabanza sin perder el tono litúrgico y reverente.
- source_word: אוֹדֶה שִׁמְךָ
  english_pob_choice: I will praise your name
  chosen_spanish: alabaré tu nombre
  alternatives_spanish:
  - te daré gracias y alabaré tu nombre
  - confesaré tu nombre
  lexicon: HALOT
  rationale: En este contexto de adoración, 'alabaré' comunica mejor el valor de yadah que una traducción meramente de gratitud; se mantiene 'tu nombre' porque el hebreo lo menciona explícitamente.
- source_word: כִּ֥י עָשִׂ֖יתָ פֶּ֑לֶא
  english_pob_choice: for you have done wonderful things
  chosen_spanish: porque has hecho cosas maravillosas
  alternatives_spanish:
  - porque has hecho una maravilla
  - porque has hecho maravillas
  lexicon: HALOT
  rationale: El singular poético פֶּלֶא puede expresarse naturalmente en español con un plural de sentido cualitativo; 'cosas maravillosas' conserva la amplitud del acto divino sin forzar el singular.
- source_word: עֵצ֥וֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - consejos
  - propósitos
  lexicon: HALOT
  rationale: En el marco de la acción divina, 'planes' es la equivalencia más clara y natural para el lector español.
- source_word: מֵֽ/רָח֖וֹק
  english_pob_choice: formed long ago
  chosen_spanish: concebidos desde hace mucho
  alternatives_spanish:
  - de antiguo
  - desde lejos
  - desde hace mucho tiempo
  lexicon: HALOT
  rationale: Aunque literalmente puede ser espacial ('desde lejos'), el contexto temporal del versículo favorece la remoción en el tiempo; 'concebidos desde hace mucho' conserva esa antigüedad sin introducir un participio que el hebreo no exige explícitamente.
- source_word: אֱמ֥וּנָה
  english_pob_choice: faithfulness
  chosen_spanish: fieles
  alternatives_spanish:
  - fidelidad
  - leales
  lexicon: HALOT
  rationale: Se traslada la cualidad a un adjetivo que puede modificar naturalmente a 'planes' en español, manteniendo la idea de confiabilidad y constancia.
- source_word: אֹֽמֶן
  english_pob_choice: sure
  chosen_spanish: firmes
  alternatives_spanish:
  - seguros
  - estables
  - ciertos
  lexicon: HALOT
  rationale: El término raro comunica firmeza, solidez y fiabilidad; 'firmes' preserva la fuerza semántica y evita reducir el cierre a una mera precisión intelectual.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se mantiene el nombre del pacto en la traducción española, acorde con la política del proyecto y con la auditable referencia al Tetragrámaton en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de מֵרָחוֹק con עֵצוֹת
  english_pob_reading: plans formed long ago
  chosen_spanish_reading: planes concebidos desde hace mucho
  alternative_spanish_readings:
  - planes de antiguo
  - planes desde lejos
  rationale: El contexto celebra acciones maravillosas como realización de un designio previo; por eso se privilegia el sentido temporal, no el espacial.
  doctrine_reference: Translation philosophy §1, §6
- issue: Pareja final אֱמוּנָה אֹמֶן
  english_pob_reading: faithful and sure
  chosen_spanish_reading: fieles y firmes
  alternative_spanish_readings:
  - fidelidad y firmeza
  - confiables y seguros
  rationale: La hebra final reúne dos cualidades coordinadas; en español conviene conservar ambas como atributos de los 'planes' para no diluir la plenitud poética ni convertir el cierre en una sola idea abstracta.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que ajustó la clausula final hacia 'faithful and sure' para que las dos cualidades recaigan sobre los planes antiguos. En español se refleja ese ajuste con 'fieles y firmes', manteniendo la coordinación y la relación sintáctica con 'planes'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma española del nombre divino, en coherencia con el estándar del proyecto.
  - Se prefirió 'alabaré' sobre una traducción más estricta de 'daré gracias' porque el paralelismo con 'te exaltaré' pide un verbo de adoración.
  - La clausula final se formuló como adjetivos que califican a 'planes', para evitar una lectura adverbial que altere la sintaxis del verso.
  - El tono es solemne y poético, pero con español moderno y claro para lectura eclesial.
