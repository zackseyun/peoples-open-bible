    text: Literalmente, 'después de esta cosa/hecho'; דָּבָר puede significar 'cosa', 'asunto' o 'hecho'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'le llenaba la mano', un modismo hebreo para instalar o consagrar a alguien para servicio sacerdotal.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la redacción para un español más natural sin perder las decisiones auditadas del POB: ''se apartó de su mal camino'' preserva la metáfora de שׁוּב mejor que el giro menos idiomático ''se volvió de''; ''A cualquiera que lo deseara'' expresa con claridad el participio genérico; y ''lo investía'' comunica mejor la idea de conferir oficio sacerdotal, manteniendo en nota el modismo literal ''llenar la mano''.'
