translation:
  language: es
  text: Después de él[a], Binuí, hijo de Hénadad, reparó otra sección[b], desde la casa de Azarías hasta el ángulo[c] y hasta la esquina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una segunda sección». La frase hebrea puede indicar otro tramo reparado por Binuí o simplemente una segunda porción medida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una segunda porción». El hebreo puede referirse a otro tramo adicional o a una porción medida distinta.'
    reason: alternative_reading
  - marker: c
    text: Los dos términos traducidos «ángulo» y «esquina» están relacionados, pero no son idénticos en hebreo; la redacción probablemente distingue dos rasgos arquitectónicos cercanos.
    reason: cultural_note
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Luego de él
  - Tras él
  lexicon: HALOT
  rationale: La frase marca sucesión en la lista de obras de Nehemías 3. «Después de él» mantiene el orden secuencial sin sugerir más de lo que el hebreo exige.
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - restauró
  - hizo reparaciones
  lexicon: HALOT
  rationale: En este contexto el verbo describe trabajo de arreglo en la muralla. «Reparó» es natural en español y conserva el sentido contextual de intervención constructiva.
- source_word: בִּנּוּי בֶּן־חֵנָדָד
  english_pob_choice: Binnui son of Henadad
  chosen_spanish: Binuí, hijo de Hénadad
  alternatives_spanish:
  - Binuy, hijo de Henadad
  - Binuí, hijo de Henadad
  lexicon: Transliteración propia del proyecto
  rationale: Se mantiene el nombre propio con transliteración coherente al español y la construcción genealógica directa «hijo de» para reflejar el patronímico hebreo.
- source_word: מִדָּה שֵׁנִית
  english_pob_choice: another section
  chosen_spanish: otra sección
  alternatives_spanish:
  - una segunda sección
  - otro tramo
  lexicon: HALOT
  rationale: El hebreo puede señalar un tramo adicional o una segunda porción medida. «Otra sección» conserva esa ambigüedad sin decidir indebidamente entre las dos posibilidades.
- source_word: מִבֵּית עֲזַרְיָה
  english_pob_choice: from the house of Azariah
  chosen_spanish: desde la casa de Azarías
  alternatives_spanish:
  - de la casa de Azarías
  - desde la casa de Azarías
  lexicon: HALOT
  rationale: Se conserva la estructura del hebreo con «desde», que encaja con la delimitación espacial del pasaje. «Casa de Azarías» reproduce de modo transparente el sintagma nominal.
- source_word: עַד הַמִּקְצוֹעַ
  english_pob_choice: as far as the angle
  chosen_spanish: hasta el ángulo
  alternatives_spanish:
  - hasta la esquina interior
  - hasta el quiebre
  lexicon: HALOT
  rationale: «Ángulo» mantiene la distinción del primer término arquitectónico sin colapsarlo con el siguiente, tal como hace la POB en inglés.
- source_word: וְעַד הַפִּנָּה
  english_pob_choice: and as far as the corner
  chosen_spanish: y hasta la esquina
  alternatives_spanish:
  - y hasta la esquina exterior
  - y hasta el rincón
  lexicon: HALOT
  rationale: «Esquina» distingue este segundo término del anterior y conserva la progresión topográfica. En español, «esquina» comunica mejor la relación arquitectónica que un calco rígido.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el criterio del POB en inglés. Se preserva la ambigüedad de מִדָּה שֵׁנִית con una alternativa en nota, y se mantiene la distinción arquitectónica entre הַמִּקְצֹעַ y הַפִּנָּה sin fusionarlas. No hay revisiones aplicadas en el paquete inglés reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; este versículo no contiene el Nombre divino.
  - Se mantiene «reparó» por la fuerza contextual de הֶחֱזִיק en Nehemías 3.
  - Se usa «Binuí» y «Azarías» con acentuación española natural y consistente con transliteración bíblica.
  - La sintaxis conserva el orden narrativo-secuencial del hebreo y del POB inglés.
  - Se evita convertir ambos términos arquitectónicos en un solo «esquina», preservando la distinción semántica del original.
