lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: El imperfecto consecutivo de דבר introduce un paso narrativo en una fórmula de revelación. En español, «habló» conserva el carácter solemne y directo del habla divina, mientras que «dijo» sería posible pero menos marcado para esta fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre personal del pacto en vez de ocultarlo tras un título.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - para
  lexicon: HALOT
  rationale: La preposición introduce el complemento indirecto del verbo de habla. En español, «a» es la equivalencia natural y fiel.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español, sin necesidad de alternativa.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como introducción convencional del discurso directo. «Diciendo» preserva la estructura hebrea de modo natural en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La base hebrea usa el nombre divino directamente. Siguiendo la política del proyecto y el audit trail inglés, se translitera el nombre en español como «Yahvé» para mantener visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El hebreo y el audit trail inglés coinciden plenamente en una fórmula de discurso divino sin variantes textuales. No se requieren revisiones textuales ni decisiones de crítica textual adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de forma consistente con el estándar del proyecto.
  - «Habló ... diciendo» conserva la fórmula narrativa hebrea sin añadir contenido interpretativo.
  - El nombre propio «Moisés» sigue la forma española estándar y no introduce matices ajenos al texto.
