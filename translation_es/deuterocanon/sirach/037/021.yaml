translation:
  language: es
  text: Y con todas estas cosas[a], ruega fervientemente a Dios, que verdaderamente dirigirá tus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testigo griego: «Porque no le fue dada gracia de parte del Señor, porque fue privado de toda sabiduría». El hebreo y el griego difieren sustancialmente aquí; el texto principal sigue el testigo hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: ועם כל אלה
  english_pob_choice: And with all these things
  chosen_spanish: Y con todas estas cosas
  alternatives_spanish:
  - Y además de todas estas cosas
  - Y junto con todas estas cosas
  lexicon: HALOT
  rationale: La frase hebrea enlaza esta exhortación con el consejo anterior. «Con todas estas cosas» conserva el valor aditivo de ועם y suena natural en español.
- source_word: עתר
  english_pob_choice: pray earnestly
  chosen_spanish: ruega fervientemente
  alternatives_spanish:
  - suplica fervientemente
  - ora con insistencia
  - ruega
  lexicon: HALOT
  rationale: El verbo expresa súplica insistente, no una oración genérica. «Ruega fervientemente» reproduce la intensidad de forma clara y digna en español.
- source_word: אל אל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a Dios, Dios
  lexicon: HALOT
  rationale: En español, la doble mención del título divino no se reproduce de manera literal porque resultaría torpe. «A Dios» conserva el sentido normal del hebreo sin falsear el referente.
- source_word: אשר
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: El relativo personal encaja mejor con el referente divino y mantiene un registro natural.
- source_word: יכין
  english_pob_choice: will direct
  chosen_spanish: dirigirá
  alternatives_spanish:
  - establecerá
  - afirmará
  - preparará
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «establecer» o «hacer firme», aquí, con «tus pasos», el sentido es orientar el camino de la persona. «Dirigirá» expresa bien esa función contextual.
- source_word: באמת
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - fielmente
  - seguramente
  lexicon: HALOT
  rationale: El adverbio puede apuntar a verdad, fidelidad o fiabilidad. «Verdaderamente» mantiene la idea de una guía real y confiable sin cargar el texto.
- source_word: צעדיך
  english_pob_choice: your steps
  chosen_spanish: tus pasos
  alternatives_spanish:
  - tu camino
  - tu andar
  lexicon: HALOT
  rationale: «Tus pasos» conserva la metáfora hebrea y es plenamente idiomático en español.
theological_decisions:
- issue: Relación entre testigos hebreo y griego
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek differs substantially and is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el testigo hebreo conservado; la lectura griega sustancialmente distinta se preserva en nota.
  alternative_spanish_readings:
  - Sustituir el texto principal por la lectura griega
  - Omitir la divergencia textual
  rationale: La política del proyecto da primacía al hebreo donde se conserva en Sirácida. Aquí el griego no es una mera variación léxica, sino una línea significativamente distinta; por eso se mantiene como variante textual en nota y no reemplaza el texto base.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo cuando se conserva; usar el paralelo griego como testimonio real sin desplazar el hebreo primario.'
translation_notes:
  revision_awareness: El pasaje presenta una divergencia material entre el hebreo conservado y el griego de Swete. La redacción española sigue el hebreo como texto principal, pero registra la variante griega para mantener la trazabilidad auditada del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no «SEÑOR», porque el hebreo aquí tiene אל y no el Nombre divino.
  - Se conserva la metáfora de «pasos» para respetar el paralelismo hebreo.
  - El adverbio «verdaderamente» refleja el matiz de אמת sin forzar una reinterpretación doctrinal.
