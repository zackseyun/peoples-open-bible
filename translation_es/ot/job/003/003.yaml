translation:
  language: es
  text: '¡Perezca el día en que nací, y la noche que dijo: «Se ha concebido un varón»[a]!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se ha concebido un hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאבַד
  english_pob_choice: May ... perish
  chosen_spanish: ¡Perezca...!
  alternatives_spanish:
  - ¡Que perezca...!
  - ¡Perecerá...!
  lexicon: HALOT
  rationale: El hebreo expresa un deseo imprecatorio en forma jussiva; en español, el subjuntivo exhortativo con valor de maldición conserva mejor esa fuerza que un futuro o un indicativo.
- source_word: י֭וֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - día
  lexicon: HALOT
  rationale: El contexto señala un día específico, el de mi nacimiento; el artículo definido mantiene esa referencia concreta.
- source_word: אִוָּ֣לֶד בּ֑וֹ
  english_pob_choice: on which I was born
  chosen_spanish: en que nací
  alternatives_spanish:
  - en que fui nacido
  - cuando nací
  lexicon: HALOT
  rationale: El Niphal de ילד implica el evento de nacer en voz pasiva/reflexiva; en español resulta más natural y fiel decir «en que nací» que una pasiva forzada.
- source_word: וְהַלַּיְלָה
  english_pob_choice: and the night
  chosen_spanish: y la noche
  alternatives_spanish:
  - y la noche,
  - y aun la noche
  lexicon: HALOT
  rationale: 'La coordinación con el día debe mantenerse simple y paralela: «el día... y la noche...».'
- source_word: אָמַר
  english_pob_choice: that said
  chosen_spanish: que dijo
  alternatives_spanish:
  - que decía
  - diciendo
  lexicon: HALOT
  rationale: Se conserva la personificación de la noche como hablante; «que dijo» es la forma más directa y natural en español.
- source_word: הֹרָה
  english_pob_choice: is conceived
  chosen_spanish: ha sido concebido
  alternatives_spanish:
  - es concebido
  - fue concebido
  lexicon: HALOT
  rationale: El perfecto hebreo en este anuncio de nacimiento puede reflejar un hecho ya ocurrido; en español, «ha sido concebido» comunica con claridad el resultado sin añadir un sujeto activo indebido a la noche.
- source_word: גָֽבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un niño varón
  lexicon: HALOT
  rationale: גבר designa a un varón/hombre; «un hombre» conserva el término hebreo de modo idiomático y suficientemente preciso en el contexto del anuncio de nacimiento.
theological_decisions:
- issue: Fuerza imprecatoria del verbo inicial
  english_pob_reading: May the day perish
  chosen_spanish_reading: ¡Perezca el día!
  alternative_spanish_readings:
  - Que el día perezca
  - El día perezca
  rationale: No se suaviza la maldición de Job ni se convierte en simple predicción; el español debe conservar el carácter de deseo vehemente del original.
  doctrine_reference: Job 3:3; poética imprecatoria
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «has been conceived» por «is conceived» para reflejar con más concisión el perfecto hebreo; la versión española sigue esa misma decisión semántica con «ha sido concebido», que preserva el estado/resultante del anuncio sin convertirlo en una pasiva dura o arcaizante.
  spanish_consistency_notes:
  - Se mantiene «hombre»/«varón» en nota para respetar la alternativa lexical del hebreo גבר sin desplazar el texto principal.
  - Se usa un registro bíblico sobrio pero natural, evitando calcos como «en el cual» o «en la cual» que sonarían menos idiomáticos.
  - La puntuación conserva la paralela maldición del día y de la noche, con la cita interna marcada de forma limpia para lectura pública.
