translation:
  language: es
  text: Empapa sus surcos[a]; allana sus terrones. Con lluvias la ablandas[b]; bendices su crecimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus hendiduras de arado'. El hebreo se refiere a los surcos hechos por el arado.
    reason: lexical_alternative
  - marker: b
    text: O 'la disuelves' / 'la haces derretirse'. En el contexto, la imagen es la de la lluvia que vuelve blanda la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּלָמֶיהָ
  english_pob_choice: its furrows
  chosen_spanish: sus surcos
  alternatives_spanish:
  - sus canales de arado
  - sus hileras de arado
  lexicon: HALOT
  rationale: תֶּלֶם designa un surco hecho por el arado. En español, 'surcos' reproduce con naturalidad la imagen agrícola sin perder precisión.
- source_word: רַוֵּה
  english_pob_choice: Saturate
  chosen_spanish: Empapa
  alternatives_spanish:
  - Satura
  - Riega abundantemente
  - Húmedeces
  lexicon: HALOT
  rationale: El imperativo piel expresa acción intensa de mojar o empapar. 'Empapa' conserva la fuerza verbal y suena más natural en español bíblico que un calco como 'satura'.
- source_word: נַחֵת
  english_pob_choice: level
  chosen_spanish: allana
  alternatives_spanish:
  - aplana
  - hace bajar
  - asienta
  lexicon: HALOT
  rationale: En contexto agrícola, el verbo apunta a hacer que lo elevado se baje o se iguale. 'Allana' recoge bien la idea de nivelar los terrones o bordes de los surcos.
- source_word: גְּדוּדֶיהָ
  english_pob_choice: its ridges
  chosen_spanish: sus terrones
  alternatives_spanish:
  - sus bordes
  - sus caballones
  - sus lomas
  lexicon: HALOT
  rationale: Aunque el término puede referir a bandas o agrupaciones en otros contextos, aquí el paralelismo con los surcos sugiere los terrones o relieves de tierra entre ellos. 'Terrones' refleja el efecto del agua sobre la tierra labrada y mantiene la imagen concreta.
- source_word: בִּרְבִיבִים
  english_pob_choice: With showers
  chosen_spanish: Con lluvias
  alternatives_spanish:
  - Con aguaceros
  - Con chaparrones
  - Con lluvias abundantes
  lexicon: HALOT
  rationale: רְבִיבִים son lluvias copiosas o chaparrones. 'Con lluvias' es una equivalencia sobria y clara; el matiz de abundancia queda reforzado por el contexto poético.
- source_word: תְּמֹגְגֶנָּה
  english_pob_choice: you soften it
  chosen_spanish: la humedeces
  alternatives_spanish:
  - la ablandas
  - la disuelves
  - la haces derretirse
  lexicon: HALOT
  rationale: El verbo puede significar derretir, disolver o ablandar. En este contexto, aplicado a la tierra, la idea es volverla blanda y receptiva; 'humedeces' comunica ese efecto agrícola de forma natural en español, sin exigir una imagen literal de derretimiento.
- source_word: צִמְחָהּ
  english_pob_choice: its growth
  chosen_spanish: su crecimiento
  alternatives_spanish:
  - su brote
  - lo que brota de ella
  - su vegetación
  lexicon: HALOT
  rationale: צֶמַח / צִמְחָהּ apunta al crecimiento, brote o vegetación naciente. 'Su crecimiento' preserva amplitud semántica y evita restringirlo solo a una etapa botánica específica.
- source_word: תְּבָרֵךְ
  english_pob_choice: you bless
  chosen_spanish: bendices
  alternatives_spanish:
  - la bendices
  - la favoreces
  - la haces fructificar
  lexicon: HALOT
  rationale: El piel de ברך normalmente significa bendecir. 'Bendices' conserva la atribución directa a Dios; no se sustituye por una paráfrasis de fruto porque la bendición debe permanecer explícita.
theological_decisions:
- issue: Sufijos femeninos referidos a la tierra/terreno
  english_pob_reading: Render the suffixes with English 'its' rather than 'her'
  chosen_spanish_reading: se expresan con 'sus' y 'la/su' según la sintaxis española
  alternative_spanish_readings:
  - su furrows / su terrones con personificación explícita
  - sus furrows/her
  rationale: El hebreo usa sufijos femeninos por la personificación poética de la tierra. En español, 'sus' permite conservar la referencia a la tierra sin introducir una personificación demasiado marcada o poco natural; además, 'la' en 'la humedeces' mantiene la referencia al terreno.
  doctrine_reference: Poética bíblica y equivalencia funcional sin perder la personificación implícita del texto hebreo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'settle its ridges' por 'level its ridges' por ser una lectura más natural y exacta del verbo en contexto. La versión española adopta 'allana' para reflejar esa decisión revisada, y mantiene 'empapa' / 'humedeces' para conservar la intensidad de la lluvia sobre la tierra.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - 'Se conserva la imagen agrícola concreta: surcos, terrones, lluvias, crecimiento.'
  - No se suaviza la bendición final en un mero efecto de fertilidad; se deja explícita como acción divina.
  - La personificación de la tierra queda implícita en el posesivo y pronombres, sin forzar 'ella' donde el español suena menos natural.
