translation:
  language: es
  text: y abrir la boca de las naciones hacia las alabanzas de cosas sin valor[a], y para ser admirado para siempre un rey de carne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse “hacia las excelencias de cosas sin valor” o “hacia las alabanzas de vanidades”. El griego es más literalmente “hacia/para las excelencias de cosas sin valor”.
    reason: lexical_alternative
  - marker: b
    text: O “un rey mortal” o “un rey meramente humano”. El griego dice literalmente “un rey de carne”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι στόμα
  english_pob_choice: to open the mouth
  chosen_spanish: abrir la boca
  alternatives_spanish:
  - abrir los labios
  - dar voz
  lexicon: LSJ
  rationale: Conserva la imagen idiomática griega de habilitar la palabra y encaja con la serie de infinitivos del contexto. En español, “abrir la boca” es natural y mantiene la fuerza figurada sin explicarla de más.
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: LSJ
  rationale: “Naciones” refleja el alcance amplio del griego y evita restringir innecesariamente el sentido a una categoría teológica más específica.
- source_word: ἀρετὰς
  english_pob_choice: praises
  chosen_spanish: alabanzas
  alternatives_spanish:
  - excelencias
  - virtudes
  lexicon: LSJ
  rationale: En este contexto la palabra apunta a la atribución de honor o elogio. “Alabanzas” comunica el impulso retórico con naturalidad en español.
- source_word: ματαίων
  english_pob_choice: worthless things
  chosen_spanish: cosas sin valor
  alternatives_spanish:
  - vanidades
  - cosas vacías
  - ídolos sin valor
  lexicon: LSJ
  rationale: El término griego expresa vaciedad e inutilidad. “Cosas sin valor” conserva esa fuerza sin añadir explícitamente “ídolos”, ya que el griego no lo dice de forma directa.
- source_word: θαυμασθῆναι
  english_pob_choice: to be marveled at
  chosen_spanish: sea admirado
  alternatives_spanish:
  - sea maravillado
  - sea venerado
  - sea objeto de admiración
  lexicon: LSJ
  rationale: El pasivo infinitivo indica ser objeto de admiración o asombro. “Admirado” es la forma más natural en español y no intensifica el verbo hasta “venerado”.
- source_word: βασιλέα σάρκινον
  english_pob_choice: a fleshly king
  chosen_spanish: un rey de carne
  alternatives_spanish:
  - un rey carnal
  - un rey mortal
  - un rey meramente humano
  lexicon: LSJ
  rationale: La expresión griega es concreta y contrastiva. “Rey de carne” preserva la imagen corporal de σάρκινον y evita suavizarla con una paráfrasis más interpretativa.
- source_word: εἰς αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: LSJ
  rationale: La locución idiomática expresa duración indefinida; “para siempre” es la equivalencia más clara y bíblicamente reconocible en español.
theological_decisions:
- issue: Si ματαίων debe explicitar fuerza antiidólatra en español
  english_pob_reading: worthless things
  chosen_spanish_reading: cosas sin valor
  alternative_spanish_readings:
  - vanidades
  - cosas vacías
  - ídolos sin valor
  rationale: El audit trail inglés dejó atrás la explicitación “idols” para volver a una forma más literal. En español se sigue esa decisión y se mantiene la ambigüedad controlada del griego, sin borrar la posibilidad de un trasfondo idólatra.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar σάρκινον sin borrar el contraste entre Dios y un gobernante humano
  english_pob_reading: a fleshly king
  chosen_spanish_reading: un rey de carne
  alternative_spanish_readings:
  - un rey carnal
  - un rey mortal
  - un rey meramente humano
  rationale: La expresión preserva el componente material del griego y el contraste teológico implícito. “De carne” mantiene la imagen sin sustituirla por una abstracción doctrinal más explicativa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del audit trail inglés: se evita añadir “ídolos” donde el texto griego solo dice ματαίων, pero se conserva su tono peyorativo; asimismo, σάρκινον se mantiene con una forma concreta (“de carne”) que refleja la imagen corporal del original.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma general del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usó “naciones” en lugar de “gentiles” para no estrechar el alcance del griego.
  - Se evitó “Cristo” porque no aparece ninguna forma de Χριστός en el texto.
  - Se conservó la secuencia de infinitivos con una sintaxis española fluida y pública.
  - Las notas a y b están ancladas en las expresiones correspondientes del texto y no se reutilizan.
