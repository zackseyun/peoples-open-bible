  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: caída de Gog en los montes de Israel, inclusión de sus fuerzas y de los pueblos con él, y entrega como comida a aves carroñeras y animales salvajes. Conserva acertadamente el perfecto profético en «Te he dado». Sin embargo, «animales del campo» no preserva suficientemente el matiz de חַיַּת הַשָּׂדֶה como animales salvajes/fieras, y la nota a dice «todos tus alas», que es español incorrecto; debe ser «todas tus alas».'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un ajuste menor para mayor fidelidad y naturalidad bíblica: «animales silvestres del campo» o «fieras del campo» comunica mejor el referente. Además, la nota a necesita corrección gramatical. El resto del texto es fluido y comprensible.'
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías/esclavo. Las decisiones léxicas principales concuerdan con la auditoría inglesa: «caerás», «escuadrones», «los pueblos que están contigo», «ave de rapiña», y el perfecto «Te he dado». Se recomienda afinar חַיַּת הַשָּׂדֶה a «animales silvestres del campo» para mantener el valor léxico documentado.'
  issues:
  - severity: medium
    issue: «los animales del campo» atenúa el sentido de חַיַּת הַשָּׂדֶה
    rationale: La expresión hebrea se refiere típicamente a animales salvajes, no simplemente a animales del campo en sentido general. El inglés auditado lo refleja con «wild animals of the field». En español conviene explicitar «silvestres» o usar «fieras».
  - severity: low
    issue: 'La nota a contiene un error gramatical: «todos tus alas»'
    rationale: El literal hebreo debe expresarse en español como «todas tus alas». La forma actual es incorrecta y puede distraer al lector.
  revised_spanish_text: 'Sobre los montes de Israel caerás: tú y todos tus escuadrones, y los pueblos que están contigo[b][a]. Te he dado como alimento para toda clase de ave de rapiña y para los animales silvestres del campo.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todas tus alas»; probablemente una metáfora de las divisiones, flancos o destacamentos militares de Gog.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para aves de rapiña de todo ala»; el hebreo enfatiza la totalidad de las aves carroñeras o rapaces.'
    reason: lexical_alternative
  revision_rationale: Se corrige «animales del campo» a «animales silvestres del campo» para preservar el matiz léxico de חַיַּת הַשָּׂדֶה, y se corrige la nota literal «todos tus alas» a «todas tus alas». No se requieren cambios adicionales.
