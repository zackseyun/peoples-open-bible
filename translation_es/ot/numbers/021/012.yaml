  text: De allí partieron y acamparon junto al barranco de Zered[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto al wadi de Zered», «junto al valle/ravina de Zered» o «junto al arroyo de Zered»; el hebreo naḥal puede referirse a un wadi, barranco, ravina o cauce estacional.
