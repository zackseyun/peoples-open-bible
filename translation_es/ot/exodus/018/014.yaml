translation:
  language: es
  text: 'Cuando Jetró, suegro de Moisés, vio todo lo que él hacía por el pueblo, dijo: «¿Qué es este asunto[a] que haces por el pueblo? ¿Por qué te sientas solo, mientras todo el pueblo está de pie delante de ti[b] desde la mañana hasta la tarde?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosa». «Asunto» expresa de manera más natural en español el valor amplio de דָּבָר.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «está de pie sobre ti». Aquí la frase significa que el pueblo está ante Moisés en espera y comparecencia, probablemente para juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses's father-in-law
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - el suegro de Moisés
  lexicon: HALOT
  rationale: חֹתֵן denota una relación por matrimonio. En español, «suegro de Moisés» es natural, preciso y mantiene la referencia a Jetró sin añadir más de lo que el hebreo dice aquí.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  lexicon: HALOT
  rationale: ראה es el verbo común «ver». «Vio» conserva el sentido narrativo directo sin introducir una matización interpretativa.
- source_word: אֵת כָּל אֲשֶׁר הוּא עֹשֶׂה
  english_pob_choice: all that he was doing
  chosen_spanish: todo lo que él hacía
  alternatives_spanish:
  - todo lo que estaba haciendo
  - todo cuanto hacía
  lexicon: HALOT
  rationale: El participio expresa acción continua o en curso; en español, el imperfecto «hacía» comunica bien esa continuidad sin forzar una perífrasis menos natural.
- source_word: לָעָם
  english_pob_choice: for the people
  chosen_spanish: por el pueblo
  alternatives_spanish:
  - para el pueblo
  - al pueblo
  lexicon: HALOT
  rationale: Aquí el ל indica actividad en beneficio del pueblo. «Por el pueblo» mantiene esa idea de representación o servicio; «para el pueblo» también sería posible, pero «por» suena más ajustado al contexto judicial.
- source_word: מָה הַדָּבָר הַזֶּה
  english_pob_choice: What is this thing
  chosen_spanish: ¿Qué es esta cosa[a]
  alternatives_spanish:
  - ¿Qué es este asunto?
  - ¿Qué es esto?
  lexicon: HALOT
  rationale: דָּבָר puede significar «cosa», «asunto» o «palabra». «Cosa» conserva el giro hebreo con bastante literalidad; la nota permite la alternativa «asunto», que en español puede sonar más idiomática en este contexto.
- source_word: אֲשֶׁר אַתָּה עֹשֶׂה לָעָם
  english_pob_choice: that you are doing for the people
  chosen_spanish: que haces por el pueblo
  alternatives_spanish:
  - que estás haciendo por el pueblo
  - que haces al pueblo
  lexicon: HALOT
  rationale: Se conserva la repetición del hebreo y el mismo valor de לָעָם como servicio en beneficio del pueblo.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Es la interrogativa directa y natural en español.
- source_word: אַתָּה יוֹשֵׁב לְבַדֶּךָ
  english_pob_choice: do you sit alone
  chosen_spanish: te sientas solo
  alternatives_spanish:
  - estás sentado solo
  - te sientas por tu cuenta
  lexicon: HALOT
  rationale: ישב puede implicar estar sentado en sesión o desempeñando una función. «Te sientas solo» mantiene el rasgo físico y deja abierta la carga funcional/judicial que el contexto desarrolla.
- source_word: וְכָל הָעָם נִצָּב עָלֶיךָ
  english_pob_choice: while all the people stand before you
  chosen_spanish: y todo el pueblo está de pie delante de ti
  alternatives_spanish:
  - mientras todo el pueblo se mantiene ante ti
  - y todo el pueblo permanece en pie delante de ti
  lexicon: HALOT
  rationale: נצב significa «estar de pie» o «presentarse en postura firme». «Está de pie delante de ti» comunica la escena con claridad; «delante de ti» refleja la función de comparecencia ante autoridad, en línea con el sentido idiomático de עַל en este contexto.
- source_word: מִן בֹּקֶר עַד עָרֶב
  english_pob_choice: from morning until evening
  chosen_spanish: desde la mañana hasta la tarde
  alternatives_spanish:
  - de la mañana hasta la tarde
  - desde la mañana hasta el anochecer
  lexicon: HALOT
  rationale: Es un merismo temporal que cubre todo el día. «Desde la mañana hasta la tarde» es idiomático en español y conserva el alcance temporal completo.
theological_decisions:
- issue: La relación de servicio/jurídica implícita en לָעָם y עָלֶיךָ
  english_pob_reading: for the people ... stand before you
  chosen_spanish_reading: por el pueblo ... delante de ti
  alternative_spanish_readings:
  - para el pueblo ... ante ti
  - al pueblo ... ante ti
  rationale: 'La escena no es meramente espacial: Moisés actúa en favor del pueblo, y el pueblo comparece ante él en actitud de espera/atención. «Por» y «delante de ti» preservan esa combinación sin explicitar más de lo que el hebreo da.'
  doctrine_reference: Exodo 18:14; cf. contexto judicial de Exodo 18:15-16
- issue: El valor funcional de יוֹשֵׁב לְבַדֶּךָ
  english_pob_reading: do you sit alone
  chosen_spanish_reading: te sientas solo
  alternative_spanish_readings:
  - te sientas por tu cuenta
  - estás sentado solo
  rationale: El hebreo puede aludir a estar sentado en audiencia o juicio, no solo a aislamiento físico. La formulación española mantiene la ambigüedad funcional y permite que el contexto inmediato la complete.
  doctrine_reference: Exodo 18:13-26
translation_notes:
  revision_awareness: El inglés POB mantiene una equivalencia óptima con notas para las ambigüedades de דָּבָר y de la expresión de estar sentado solo. La presente versión sigue esas mismas decisiones base, ajustándolas al español con un registro natural y manteniendo la tensión semántica donde el hebreo la tiene.
  spanish_consistency_notes:
  - Se usa «Moisés» y «Jetró» de manera coherente con el contexto narrativo.
  - Se conserva «pueblo» para לָעָם, no «gente», por la carga colectiva y jurídica del pasaje.
  - No se introduce «SEÑOR» ni equivalentes porque este versículo no contiene el nombre divino.
  - Se mantiene el verbo en imperfecto «hacía» para reflejar la acción continua del participio hebreo.
  - Se evita una traducción excesivamente explicativa de la comparecencia ante autoridad; la nota cubre la posible lectura judicial.
