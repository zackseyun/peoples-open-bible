revisions:
- from: Y pasó hasta los confines de la tierra, y tomó botín de una multitud de naciones; y la tierra quedó en silencio delante de él, y fue engrandecido, y se le enalteció el corazón[a].
  to: Y pasó hasta los confines de la tierra, y tomó botín de una multitud de naciones; y la tierra quedó en calma delante de él, y fue exaltado, y su corazón fue enaltecido[a].
  rationale: 'La revisión conserva toda la estructura y el sentido del griego y de la POB inglesa, pero mejora tres puntos: (1) «quedó en calma» expresa mejor ἡσύχασεν que «quedó en silencio»; (2) «fue exaltado» refleja con mayor precisión ὑψώθη; y (3) «su corazón fue enaltecido» mantiene el idiomatismo de ἐπήρθη ἡ καρδία αὐτοῦ en un español más natural. La nota se normaliza para claridad y buena puntuación.'
