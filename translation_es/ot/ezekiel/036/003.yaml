review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo y conserva la mayoría de las decisiones léxicas clave: la duplicación causal, la hostilidad circundante, el resultado de llegar a ser posesión y la imagen idiomática de convertirse en tema de habla. Sin embargo, hay dos desajustes importantes: (1) en אֲדֹנָי יְהוִה, el proyecto pide preservar Yahvé sin introducir una combinación poco natural; «el Señor Yahvé» es comprensible pero torpe, y «el Señor» además no representa bien אֲדֹנָי cuando ya se conserva el nombre divino; (2) la nota [a] contiene formulaciones españolas defectuosas y una alternativa demasiado literal/extraña. También conviene mejorar la naturalidad de «subieron a los labios de la lengua» sin perder la nota literal.'
  spanish_quality_summary: La redacción es generalmente clara, pero tiene cierta rigidez. «Porque, sí, porque» suena algo forzado; puede mantenerse por fidelidad enfática, aunque «porque sí» puede malinterpretarse coloquialmente. «Han arremetido contra ustedes» funciona bien. «Subieron a los labios de la lengua» es comprensible pero poco natural; «llegaron a los labios de la gente» comunica mejor el sentido en español, mientras la nota preserva la literalidad hebrea. La nota [a] necesita reparación idiomática seria.
  glossary_alignment: 'Se alinea en general con la terminología del proyecto: יְהוָה como «Yahvé», no enmascarado; מורשה como «posesión»; שְׁאֵרִית como «remanente»; דִבָּה como «difamación». La principal excepción es la formulación compuesta «el Señor Yahvé», que no es la mejor solución española para אֲדֹנָי יְהוִה dentro de este proyecto. «Señor Dios Yahvé» preserva los dos componentes y suena más íntegro y legible.'
  issues:
  - severity: medium
    issue: «el Señor Yahvé» para אֲדֹנָי יְהוִה
    rationale: Aunque preserva «Yahvé», la combinación suena truncada y no representa tan claramente el título compuesto como «Señor Dios Yahvé», que evita tanto la máscara tradicional como la torpeza estilística.
  - severity: medium
    issue: La nota [a] está mal formulada en español
    rationale: «los han jadeado persiguiendo» no es español natural, y «han querido engullirlos» añade matiz volitivo no presente. La nota debe ofrecer alternativas idiomáticas fieles al rango léxico documentado.
  - severity: low
    issue: «subieron a los labios de la lengua» es demasiado rígido
    rationale: La imagen literal puede mantenerse en nota; en el texto principal conviene una formulación española más natural que siga reflejando que llegaron a ser asunto del habla pública.
