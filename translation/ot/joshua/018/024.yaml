id: JOS.18.24
reference: Joshua 18:24
source:
  edition: WLC
  text: וּ/כְפַ֧ר העמני וְ/הָֽ/עָפְנִ֖י וָ/גָ֑בַע עָרִ֥ים שְׁתֵּים עֶשְׂרֵ֖ה וְ/חַצְרֵי/הֶֽן־׃
translation:
  text: 'And Chephar-ammoni[a], Ophni, and Geba: twelve cities with their villages.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kephar-haammoni may also be transliterated 'Chephar-haammonai' or similarly in English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְפַר העמני
  chosen: Kephar-haammoni
  alternatives:
  - Chephar-haammonai
  - Kefar-haammoni
  lexicon: HALOT
  rationale: A place name; per translation philosophy, personal and place names are transliterated rather than translated. The prefixed conjunction is rendered as 'and.' The form is preserved with a standard English transliteration rather than attempting a meaning-based rendering such as 'village of the Ammonite(s),' since in this context it functions as a fixed toponym.
- source_word: הָעָפְנִי
  chosen: Ophni
  alternatives:
  - Ha-ophni
  lexicon: HALOT
  rationale: A place name in the town list. Transliterated in standard English form. The prefixed article is not separately translated because it is incorporated into the conventional toponymic form in context.
- source_word: גָבַע
  chosen: Geba
  alternatives:
  - Gaba
  lexicon: HALOT
  rationale: A place name. Rendered as 'Geba,' the conventional English transliteration for this Benjaminite town, rather than the more generic-looking 'hill,' because the word here is clearly a proper noun in a settlement list.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: The common term for urban settlements. 'Cities' is the standard rendering in territorial allotment lists, though 'towns' is possible in modern English. 'Cities' better preserves the formal register and conventional land-allotment terminology.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'cities.'
- source_word: חַצְרֵיהֶן
  chosen: their villages
  alternatives:
  - their settlements
  - their hamlets
  lexicon: HALOT
  rationale: Refers to dependent rural settlements or unwalled daughter-settlements associated with the listed cities. 'Villages' is the most natural and conventional English rendering in these allotment formulas.
