base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/021/017.yaml
  text: Cry out and wail[a], son of man, for it has come upon my people; it is upon all the princes of Israel. They are given over to the sword along with my people[b]; therefore strike your thigh.
  footnotes:
  - marker: a
    text: Or, 'Terrors because of the sword have come upon my people.' The Hebrew of this clause is difficult, and the exact force of מְגוּרֵי is debated.
    reason: alternative_reading
  - marker: b
    text: Striking the thigh is a gesture of grief, shock, or lament in prophetic literature.
    reason: cultural_note
