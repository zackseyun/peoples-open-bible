translation:
  language: es
  text: Por tanto, mi corazón se alegra[a] y mi gloria se regocija; aun mi carne habitará segura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «mi honor», «mi ser entero»; algunos entienden «mi gloria» como un idiomatismo para la persona misma, y algunos intérpretes antiguos lo relacionaron con la lengua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «descansará en seguridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la relación inferencial del hebreo; conserva el sentido conclusivo sin volverlo explicativo de más.
- source_word: שָׂמַח
  english_pob_choice: is glad
  chosen_spanish: se alegra
  alternatives_spanish:
  - está alegre
  - se goza
  lexicon: HALOT
  rationale: El verbo comunica un estado de alegría; en español, 'se alegra' mantiene la vivacidad poética y la relación con el paralelismo siguiente.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: Traducción directa del asiento de emoción y pensamiento, sin forzar una paráfrasis.
- source_word: וַיָּגֶל
  english_pob_choice: rejoices
  chosen_spanish: se regocija
  alternatives_spanish:
  - exulta
  - salta de gozo
  lexicon: HALOT
  rationale: גיל tiene un matiz de gozo exuberante; 'se regocija' conserva esa intensidad en un registro bíblico claro.
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  - mi ser entero
  - mi lengua
  lexicon: HALOT
  rationale: Se mantiene el término literal para transparencia al hebreo. En poesía hebrea puede ser un idiomatismo para la persona misma o su parte expresiva; no se resuelve la ambigüedad en el texto principal.
- source_word: אַף
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: Introduce una ampliación enfática desde el gozo interior hacia la seguridad corporal.
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: '''Carne'' es el equivalente más directo de בשר y conserva la imaginería hebrea; evita importar un sentido doctrinal ajeno de ''naturaleza pecaminosa''.'
- source_word: יִשְׁכֹּן
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - permanecerá
  lexicon: HALOT
  rationale: El verbo expresa residencia/estancia estable. 'Habitará' comunica bien el futuro y la idea de permanencia en español.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: segura
  alternatives_spanish:
  - en seguridad
  - con seguridad
  lexicon: HALOT
  rationale: Se adapta el adverbio hebreo a una construcción natural con el sujeto 'mi carne'; la seguridad queda explícita sin perder concisión poética.
theological_decisions:
- issue: כְּבוֹדִי como idiomatismo potencialmente ambiguo en un salmo citado después en el Nuevo Testamento
  english_pob_reading: my glory
  chosen_spanish_reading: mi gloria
  alternative_spanish_readings:
  - mi honor
  - mi ser entero
  - mi lengua
  rationale: Se preserva la literalidad y la tensión interpretativa documentada por el POB en inglés. En el texto principal no se colapsa el término a una sola interpretación, para mantener la transparencia y la posible conexión canónica posterior.
  doctrine_reference: Translation philosophy §§1, 3, 5; pasaje citado en Hechos 2
- issue: בְּשָׂרִי como referencia al yo físico sin carga de 'carne' pecaminosa
  english_pob_reading: my flesh
  chosen_spanish_reading: mi carne
  alternative_spanish_readings:
  - mi cuerpo
  rationale: '''Carne'' conserva el paralelo hebreo y la resonancia bíblica, pero aquí se entiende como el aspecto corporal del hablante. No se introduce el sentido paulino de σάρξ como naturaleza pecaminosa, que no corresponde al contexto.'
  doctrine_reference: Translation philosophy §§1, 5; lectura contextual de σάρξ/בשר
- issue: lָבֶטַח como seguridad estable más que simple tranquilidad subjetiva
  english_pob_reading: securely
  chosen_spanish_reading: segura
  alternative_spanish_readings:
  - en seguridad
  - con seguridad
  rationale: La frase apunta a un estado objetivo de seguridad/estabilidad. En español, ajustar el adverbio a 'segura' con 'habitará' produce una expresión natural y fiel.
  doctrine_reference: Lexical semantics of בטח; poetic usage in Psalms
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene ''my glory'' de forma literal y conserva alternativas interpretativas en nota; también deja ''my flesh'' como traducción literal y ofrece ''will rest in safety'' como alternativa. La versión española sigue ese patrón: conserva ''mi gloria'' y ''mi carne'', y adapta la última cola a una formulación natural (''habitará segura'') sin perder la nota alternativa sobre ''en seguridad''. No se registraron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque no hay término mesiánico en el hebreo de este versículo.
  - Se mantiene un registro poético claro y sobrio, con vocabulario bíblico transparente pero comprensible para lectores actuales.
  - La nota de 'mi gloria' preserva la ambigüedad lexical documentada por el audit trail en inglés.
