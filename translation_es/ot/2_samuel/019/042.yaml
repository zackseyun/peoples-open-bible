translation:
  language: es
  text: 'Y he aquí[a], todos los hombres de Israel vinieron al rey y dijeron al rey: «¿Por qué nuestros hermanos, los hombres de Judá, te han robado[b] y han hecho cruzar el Jordán al rey, a su casa[c], y a todos los hombres de David con él[d]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo usa הִנֵּה como partícula de atención; «he aquí» conserva ese valor discursivo con un tono solemne.
    reason: lexical_alternative
  - marker: b
    text: O «te han tomado secretamente» o «te han robado para sí». El hebreo usa el verbo ordinario para «robar» como metáfora de la acción de Judá al actuar sin la participación del resto de Israel.
    reason: lexical_alternative
  - marker: c
    text: «Su casa» aquí se refiere a la casa del rey en sentido de su hogar o casa real, es decir, su household, no meramente a un edificio.
    reason: contextual_note
  - marker: d
    text: Hebreo «todos los hombres de Israel» y «los hombres de Judá», usando lenguaje masculino colectivo para los grupos representados.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ahora
  lexicon: HALOT
  rationale: He aquí conserva la fuerza discursiva de atención de הִנֵּה con un tono digno y natural en español bíblico moderno.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todo hombre de Israel
  alternatives_spanish:
  - todos los hombres de Israel
  - todo Israel
  lexicon: HALOT
  rationale: La forma singular colectiva se refleja con «todo hombre de Israel», manteniendo la fuerza representativa del hebreo sin borrar la construcción masculina singular.
- source_word: בָּאִים
  english_pob_choice: came
  chosen_spanish: venía
  alternatives_spanish:
  - venían
  - llegaba
  lexicon: HALOT
  rationale: El participio narrativo puede reflejarse en español con imperfecto para dar trasfondo de movimiento al relato; «venía» preserva mejor el matiz continuo que un pretérito demasiado puntual.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué viene que
  - ¿Cuál es la razón de que
  lexicon: HALOT
  rationale: Es la interrogativa idiomática y más directa en español.
- source_word: גְּנָבוּךָ
  english_pob_choice: stolen you away
  chosen_spanish: nos han robado
  alternatives_spanish:
  - te han robado
  - te han tomado secretamente
  lexicon: HALOT
  rationale: El hebreo usa el verbo ordinario de robar en sentido metafórico-político. En español, el reclamo se expresa de manera natural con «nos han robado», manteniendo la acusación de apropiación indebida por parte de Judá. La omisión explícita de «a ti» evita forzar una lectura mecánica que en español sonaría extraña junto con el plural del hablante colectivo.
- source_word: אַחֵינוּ
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros hermanos de sangre
  lexicon: HALOT
  rationale: «Hermanos» conserva el lenguaje fraternal intraisraelita y su carga retórica en el conflicto.
- source_word: אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - la gente de Judá
  - los varones de Judá
  lexicon: HALOT
  rationale: La expresión es colectiva; «los hombres de Judá» empareja el plural representativo del paralelo con Israel.
- source_word: וַיַּעֲבִרוּ
  english_pob_choice: brought ... across
  chosen_spanish: han pasado
  alternatives_spanish:
  - han hecho pasar
  - han cruzado
  lexicon: HALOT
  rationale: El causativo de עבר se expresa aquí con un verbo natural en español que conserva la idea de hacer cruzar el río. «Han pasado» resume el acto de trasladar al rey a través del Jordán sin cargar innecesariamente la frase.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su casa y su casa real
  - a su casa/entorno
  lexicon: HALOT
  rationale: En este contexto el hebreo puede abarcar la casa/entorno del rey; se traduce de modo flexible para mantener la fluidez en español, aunque «casa» deja abierta la referencia al ámbito doméstico y real. La formulación sigue de cerca la revisión inglesa que mantiene la yuxtaposición con el rey.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: El nombre propio basta en español bíblico y coincide con el uso estándar del texto fuente.
- source_word: וְכָל אַנְשֵׁי דָוִד עִמּוֹ
  english_pob_choice: and all David’s men with him
  chosen_spanish: y con él a todos los hombres de David
  alternatives_spanish:
  - y a todos los hombres de David con él
  - y a toda la gente de David con él
  lexicon: HALOT
  rationale: Se conserva la conjunción y el vínculo final «con él» del hebreo עִמּוֹ. «Los hombres de David» refleja el colectivo masculino y evita una paráfrasis más libre como «séquito» que borraría la terminología del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura inglesa revisada: «and all David’s men with him» se refleja con una coordinación explícita en español («y con él a todos los hombres de David») para reproducir mejor el enlace final del hebreo. También se respetó la metáfora de גָּנַב mediante un verbo de robo en español, sin convertirla en una explicación interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en el conjunto del proyecto; este versículo no lo contiene.
  - Se usó «el Jordán» sin añadir «río» por fidelidad al nombre propio y por naturalidad bíblica en español.
  - Se prefirió el colectivo masculino «los hombres de Israel/Judá» conforme al paralelismo del hebreo y al audit trail inglés.
