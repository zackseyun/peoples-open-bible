    rationale: El expediente inglés y las decisiones teológicas dicen explícitamente que debe mantenerse la amplitud de «seed», capaz de aludir tanto a fertilidad como a descendientes. «Descendencia» privilegia solo la lectura genealógica en el texto principal.
  - severity: medium
