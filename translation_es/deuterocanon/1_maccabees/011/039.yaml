translation:
  language: es
  text: Entonces Trifón había estado antes entre los de Alejandro, y al ver que todas las fuerzas murmuraban contra Demetrio, fue a Símacues el Árabe, que criaba a Antíoco, el niño pequeño de Alejandro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el niño pequeño de Alejandro»; es decir, el hijo de Alejandro.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τρύφων
  english_pob_choice: Tryphon
  chosen_spanish: Trifón
  alternatives_spanish:
  - Tryfón
  lexicon: uso propio/transliteración convencional
  rationale: Nombre propio transliterado al español con la forma más natural y reconocible; se adapta la grafía al sistema castellano sin alterar el referente.
- source_word: τῶν παρὰ Ἀλεξάνδρου
  english_pob_choice: among those with Alexander
  chosen_spanish: entre los de Alejandro
  alternatives_spanish:
  - entre los partidarios de Alejandro
  - entre los que estaban con Alejandro
  lexicon: LSJ
  rationale: La construcción expresa asociación o pertenencia al grupo de Alejandro; 'entre los de Alejandro' conserva esa relación sin añadir una lectura más militante de la necesaria.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: había estado antes
  alternatives_spanish:
  - anteriormente había estado
  - antes había estado
  lexicon: LSJ
  rationale: Se vierte con valor temporal pasado de forma natural en español, manteniendo el sentido adverbial de anterioridad.
- source_word: πᾶσαι αἱ δυνάμεις
  english_pob_choice: all the forces
  chosen_spanish: todas las fuerzas
  alternatives_spanish:
  - todos los ejércitos
  - todas las tropas
  lexicon: LSJ
  rationale: En contexto militar δυνάμεις puede referirse a fuerzas armadas; 'fuerzas' preserva amplitud semántica sin forzar una precisión militar mayor que la del griego.
- source_word: καταγογγύζουσιν
  english_pob_choice: were grumbling
  chosen_spanish: murmuraban
  alternatives_spanish:
  - se quejaban
  - murmuraban con descontento
  lexicon: LSJ
  rationale: El verbo expresa queja murmurada o descontento hostil; 'murmuraban' es natural en español y mantiene el matiz de protesta soterrada.
- source_word: κατὰ τοῦ Δημητρίου
  english_pob_choice: against Demetrius
  chosen_spanish: contra Demetrio
  alternatives_spanish:
  - en contra de Demetrio
  lexicon: LSJ
  rationale: κατά con genitivo marca oposición dirigida; 'contra' reproduce de manera directa y idiomática esa fuerza relacional.
- source_word: ἐπορεύθη πρὸς
  english_pob_choice: he went to
  chosen_spanish: fue a
  alternatives_spanish:
  - se dirigió a
  - viajó a
  lexicon: LSJ
  rationale: Verbo de movimiento simple; 'fue a' es claro y fiel, evitando sobreespecificar el tipo de desplazamiento.
- source_word: Σιμμάκουην τὸν Ἄραβα
  english_pob_choice: Simmakoues the Arab
  chosen_spanish: Símacues el árabe
  alternatives_spanish:
  - Simmacues el árabe
  - Símaco el árabe
  lexicon: transliteración del griego
  rationale: Se translitera el nombre propio desde la forma griega del pasaje; se conserva el epíteto étnico 'el árabe' como aposición descriptiva.
- source_word: ἔτρεφεν
  english_pob_choice: was rearing
  chosen_spanish: criaba
  alternatives_spanish:
  - estaba criando
  - criaba y cuidaba
  lexicon: LSJ
  rationale: τρέφω puede significar nutrir, criar o educar; 'criaba' comunica bien la idea de crianza/formación continua en un contexto de tutela.
- source_word: τὸν Ἀντίοχον
  english_pob_choice: Antiochus
  chosen_spanish: Antioquio
  alternatives_spanish:
  - Antíoco
  lexicon: uso propio/transliteración convencional
  rationale: Se adopta una transliteración española fluida del nombre personal, manteniendo el referente histórico sin depender de la forma latina tradicional.
- source_word: τὸ παιδάριον
  english_pob_choice: the little child
  chosen_spanish: el niño pequeño
  alternatives_spanish:
  - el pequeño niño
  - el muchachito
  lexicon: LSJ
  rationale: El diminutivo παιδάριον pide una traducción que marque juventud y pequeñez; 'niño pequeño' conserva ese valor afectivo y de edad.
- source_word: τὸ τοῦ Ἀλεξάνδρου
  english_pob_choice: of Alexander
  chosen_spanish: de Alejandro
  alternatives_spanish:
  - hijo de Alejandro
  lexicon: LSJ
  rationale: La construcción griega es elíptica; en el cuerpo del texto se mantiene la relación breve 'de Alejandro', dejando la filiación explícita para nota, como hizo el POB inglés.
theological_decisions:
- issue: Relación de Antioquio con Alejandro
  english_pob_reading: Literally, 'the child of Alexander,' that is, Alexander's son.
  chosen_spanish_reading: En el texto principal, 'el niño pequeño de Alejandro'; en nota, se aclara que literalmente es 'el hijo de Alejandro'.
  alternative_spanish_readings:
  - '''el hijo de Alejandro'' en el texto principal'
  - '''el muchachito de Alejandro'' sin aclaración'
  rationale: 'No hay una decisión doctrinal, pero sí una tensión lexical: el griego dice literalmente ''el de Alejandro'', mientras el contexto apunta a filiación. Se conserva la concisión del griego y se explicita la filiación en nota para no perder la observación auditada.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión española sigue la revisión final del POB inglés, que prefirió un equivalente más natural para παιδάριον ('little child') en lugar de 'young boy'. Aquí se refleja esa misma decisión con 'niño pequeño', y se mantiene la nota explicativa sobre la expresión elíptica 'de Alejandro'.
  spanish_consistency_notes:
  - Se conserva Trifón como transliteración estable del nombre griego.
  - Se evita 'Mesías/Cristo' u otro vocabulario no pertinente; no hay términos doctrinales sensibles en este versículo.
  - '''Fuerzas'' reproduce el alcance militar amplio de δυνάμεις sin forzar ''ejércitos''.'
  - '''Murmuraban'' mantiene el matiz de queja hostil de καταγογγύζουσιν.'
  - La nota a aclara la filiación implícita sin sustituir el texto principal, en línea con la auditoría inglesa.
