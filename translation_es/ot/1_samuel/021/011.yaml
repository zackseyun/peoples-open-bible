translation:
  language: es
  text: Entonces David se levantó y huyó aquel día de Saúl, y llegó a Aquis, rey de Gat.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: קום expresa levantarse o ponerse en pie. En español, 'se levantó' conserva el movimiento narrativo sin sonar forzado; 'arose' en inglés queda bien reflejado por una forma verbal natural y sobria.
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: ברח tiene el sentido directo de huir. 'Huyó' mantiene la urgencia del verbo hebreo y evita suavizarlo con una paráfrasis.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal fija el momento del evento. 'Aquel día' es natural en español y preserva la distancia referencial de la fórmula hebrea.
- source_word: מִפְּנֵי שָׁאוּל
  english_pob_choice: from Saul
  chosen_spanish: de delante de Saúl
  alternatives_spanish:
  - de Saúl
  - de la presencia de Saúl
  - ante Saúl
  lexicon: HALOT
  rationale: La frase hebrea literalmente es 'de delante/de la presencia de Saúl'. Aquí conviene conservar esa relación espacial-relacional en español, porque David no solo se aleja de Saúl, sino de su presencia inmediata.
- source_word: וַיָּבֹא אֶל
  english_pob_choice: he came to
  chosen_spanish: llegó a
  alternatives_spanish:
  - vino a
  - se presentó ante
  lexicon: HALOT
  rationale: בוא con אֶל puede expresarse naturalmente como 'llegó a'. En español suena más fluido que 'vino a' y no altera el sentido narrativo.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Aquís
  - Achís
  lexicon: transliteración tradicional española
  rationale: El nombre propio puede adaptarse al uso español bíblico como 'Aquis', forma clara y reconocible para lectores de Biblia en español.
- source_word: מֶלֶךְ גַּת
  english_pob_choice: king of Gath
  chosen_spanish: rey de Gat
  alternatives_spanish:
  - el rey de Gat
  - monarca de Gat
  lexicon: HALOT
  rationale: '''Rey de Gat'' conserva el constructo sin añadir artículos innecesarios. ''Gat'' sigue la transliteración española habitual para la ciudad filistea.'
translation_notes:
  revision_awareness: 'El inglés POB sigue de cerca el hebreo con equivalencia óptima: ''arose'', ''fled'', ''that day'', ''from Saul'', ''he came to''. El español mantiene esa misma secuencia narrativa, pero ajusta ''he came to'' a ''llegó a'' y conserva explícitamente ''de delante de Saúl'' para reflejar el matiz locativo del hebreo, sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se mantiene 'Saúl' y no se usa ninguna convención de sustitución por título divino, porque no aplica al versículo.
  - Se usa 'Aquis' y 'Gat' como formas españolas de nombres propios bíblicos.
  - La frase verbal conserva un registro sobrio y narrativo, adecuado para una traducción bíblica pública.
