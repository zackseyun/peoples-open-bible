translation:
  language: es
  text: Tu reino[a] es un reino de todas las edades[b], y tu dominio es de generación en generación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu soberanía es una soberanía» o «Tu reinado es un reinado». El hebreo repite el sustantivo para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «eterno» o «por todos los siglos». El hebreo dice literalmente: «de todas las edades».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por toda generación» o «a través de toda generación». El hebreo literalmente dice: «en toda generación y generación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַֽלְכוּתְךָ / מַלְכ֥וּת
  english_pob_choice: Your kingdom is a kingdom
  chosen_spanish: Tu reino es un reino
  alternatives_spanish:
  - Tu soberanía es una soberanía
  - Tu reinado es un reinado
  lexicon: HALOT
  rationale: מַלְכוּת puede expresar reino, reinado o soberanía. En español, «reino» conserva el paralelismo repetido del hebreo y resulta natural y solemne. Mantener la repetición evita suavizar la fuerza poética del original.
- source_word: כָּל עֹֽלָמִ֑ים
  english_pob_choice: of all ages
  chosen_spanish: de todas las edades
  alternatives_spanish:
  - eterno
  - por todos los siglos
  - de eternidad en eternidad
  lexicon: HALOT
  rationale: עֹלָמִים expresa duración ilimitada a través de las edades. «De todas las edades» refleja mejor la construcción hebrea y conserva el matiz acumulativo que el inglés POB también preserva.
- source_word: וּ֝/מֶֽמְשֶׁלְתְּ/ךָ֗
  english_pob_choice: and your dominion
  chosen_spanish: y tu dominio
  alternatives_spanish:
  - y tu señorío
  - y tu gobierno
  - y tu autoridad
  lexicon: HALOT
  rationale: מֶמְשָׁלָה designa autoridad gobernante o dominio. «Dominio» corresponde al registro elevado del poema y mantiene la relación con «reino» sin introducir un matiz administrativo moderno.
- source_word: בְּ/כָל דּ֥וֹר וָ/דֽוֹר
  english_pob_choice: through every generation
  chosen_spanish: por cada generación
  alternatives_spanish:
  - en cada generación
  - de generación en generación
  lexicon: HALOT
  rationale: La frase hebrea expresa continuidad a través de las generaciones. «Por cada generación» es una forma española clara que conserva la idea de sucesión continua sin añadir explícitamente un verbo que el hebreo aquí no desarrolla.
theological_decisions:
- issue: Duración del reinado divino
  english_pob_reading: The verse emphasizes God's universal and enduring kingship without importing later doctrinal formulations beyond the Hebrew poetry.
  chosen_spanish_reading: El versículo enfatiza el reinado universal y duradero de Dios sin imponer fórmulas doctrinales ajenas a la poesía hebrea.
  alternative_spanish_readings:
  - Tu reino es eterno, y tu dominio permanece por todas las generaciones.
  - Tu reino es un reino perpetuo, y tu dominio se extiende de generación en generación.
  rationale: La opción española mantiene la repetición y el lenguaje de edades/generaciones en vez de reducirlo a una sola paráfrasis como «eterno». Así se conserva la tensión poética del hebreo y el alcance temporal total afirmado por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El contexto auditado del POB inglés fue revisado para reflejar el último ajuste: se evitó introducir una idea verbal como «permanece» o «dura» donde el hebreo presenta paralelismo nominal más directo. La versión española conserva esa economía y el paralelismo repetido.'
  spanish_consistency_notes:
  - Se mantuvo «reino» y «dominio» para conservar el paralelismo conceptual y el registro poético.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος; el texto habla de Dios en segunda persona.
  - «De todas las edades» sigue la pauta del POB inglés «of all ages» y evita forzar una equivalencia interpretativa única como «eterno».
  - «Por cada generación» conserva la continuidad sucesiva sin añadir una perífrasis más interpretativa.
