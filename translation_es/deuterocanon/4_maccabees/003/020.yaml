translation:
  language: es
  text: Pues nuestros padres tenían una paz profunda debido a su vida ordenada bajo la ley[a], y les iba bien, hasta el punto de que incluso Seleuco Nicanor, rey de Asia, les destinó fondos para el servicio sagrado y aprobó su orden cívico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debido a su observancia de la ley» o «debido a su buen orden». El término griego puede denotar una vida ordenada bajo la ley e incluso implicar fidelidad a la ley judía.
    reason: lexical_alternative
  - marker: b
    text: O «su constitución» o «su comunidad política».
    reason: lexical_alternative
lexical_decisions:
- source_word: βαθεῖαν εἰρήνην
  english_pob_choice: deep peace
  chosen_spanish: una paz profunda
  alternatives_spanish:
  - una paz grande
  - una paz duradera
  lexicon: LSJ
  rationale: Conservo la metáfora de βάθος con «profunda», que reproduce la fuerza retórica de «deep» sin aplanarla en un adjetivo menos imagístico.
- source_word: διὰ τὴν εὐνομίαν
  english_pob_choice: because of their law-abidingness
  chosen_spanish: debido a su buen orden bajo la ley
  alternatives_spanish:
  - debido a su observancia de la ley
  - debido a su buen gobierno
  - debido a su vida ordenada bajo la ley
  lexicon: LSJ
  rationale: εὐνομία abarca orden conforme a la ley; «buen orden bajo la ley» conserva esa amplitud sin reducirla de manera exclusiva a la Torá, pero mantiene la conexión legal que el contexto sugiere.
- source_word: ἔπραττον καλῶς
  english_pob_choice: prospered
  chosen_spanish: les iba bien
  alternatives_spanish:
  - prosperaban
  - les fue bien
  lexicon: LSJ
  rationale: La expresión griega es idiomática y describe buen resultado o bienestar. En español, «les iba bien» transmite el matiz de estado favorable con naturalidad; «prosperaban» sería posible, pero algo más interpretativo.
- source_word: ἀφορίσαι
  english_pob_choice: set apart
  chosen_spanish: apartó
  alternatives_spanish:
  - destinó
  - asignó
  - reservó
  lexicon: LSJ
  rationale: Aquí el verbo expresa reservar o destinar fondos para un fin concreto. «Apartó» conserva la idea de separar para un propósito específico.
- source_word: χρήματα εἰς τὴν ἱερουργίαν
  english_pob_choice: money for the sacred service
  chosen_spanish: dinero para el servicio sagrado
  alternatives_spanish:
  - fondos para el servicio del templo
  - dinero para el servicio sagrado del templo
  - recursos para el servicio sagrado
  lexicon: LSJ
  rationale: «Servicio sagrado» reproduce bien ἱερουργία sin añadir una precisión institucional que el griego no explicita por sí solo.
- source_word: τὴν πολιτίαν αὐτῶν
  english_pob_choice: their polity
  chosen_spanish: su constitución
  alternatives_spanish:
  - su orden cívico
  - su régimen político
  - su comunidad política
  lexicon: LSJ
  rationale: πολιτεία puede significar constitución, orden cívico o forma de organización política. «Constitución» es una equivalencia precisa y sobria en español; mantengo «polity» en la memoria auditada como trasfondo del valor cívico del término.
- source_word: ἀποδέχεσθαι
  english_pob_choice: approved
  chosen_spanish: aprobó
  alternatives_spanish:
  - aceptó
  - reconoció
  - dio por buena
  lexicon: LSJ
  rationale: El verbo expresa una aceptación favorable. «Aprobó» comunica ese reconocimiento real sin forzar una noción más fuerte que el griego.
- source_word: βασιλέα Σέλευκον τὸν Νικάνορα
  english_pob_choice: Seleucus Nicanor, the king of Asia
  chosen_spanish: Seleuco Nicanor, rey de Asia
  alternatives_spanish:
  - el rey de Asia, Seleuco Nicanor
  - Seleuco, llamado Nicanor, rey de Asia
  lexicon: LSJ
  rationale: Sigo la estructura appositiva griega con transliteración del nombre y título en español natural.
theological_decisions:
- issue: Alcance de εὐνομία en relación con la identidad judía
  english_pob_reading: Rendered broadly as 'law-abidingness' rather than explicitly 'keeping the Mosaic law.'
  chosen_spanish_reading: «buen orden bajo la ley» en lugar de una referencia explícita a la observancia de la Ley mosaica
  alternative_spanish_readings:
  - observancia de la ley
  - vivir conforme a la ley
  - buen gobierno
  rationale: El contexto favorece una vida ordenada conforme a la ley, probablemente con la ley judía en vista, pero el sustantivo griego es más amplio que una mención directa a la Ley mosaica. La formulación española conserva esa amplitud y evita estrechar indebidamente el alcance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
- issue: Valor político de πολιτεία
  english_pob_reading: polity / constitution / civic order
  chosen_spanish_reading: «constitución» con valor de organización política/cívica
  alternative_spanish_readings:
  - orden cívico
  - régimen político
  - comunidad política
  rationale: El término puede referirse al orden político o a la forma de organización pública. «Constitución» es idiomático y mantiene el peso cívico del original sin convertirlo en un término eclesiástico o meramente abstracto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 4
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó εὐνομία de ''lawfulness'' a ''law-abidingness'' y πολιτεία de ''commonwealth'' a ''polity'' para mayor precisión. En español mantuve esa mayor exactitud semántica: «buen orden bajo la ley» y «constitución», preservando tanto la dimensión jurídica como la cívico-política del pasaje.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Conservé un registro formal pero legible en español latinoamericano, evitando arcaísmos innecesarios.
  - Mantuve «servicio sagrado» para ἱερουργία sin introducir explícitamente 'templo' en el texto principal, aunque lo dejo como alternativa en nota.
  - No traduje πολιτεία con un término eclesiástico; la decisión se mantiene en el campo político-cívico del original.
