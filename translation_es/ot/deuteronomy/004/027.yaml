review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: Yahvé como nombre divino, dispersión entre los pueblos, reducción numérica, y presencia entre las naciones. Sin embargo, en אֲשֶׁר יְנַהֵג el borrador suaviza indebidamente la decisión auditada del POB inglés. Dado el contexto de juicio y exilio, el inglés documentó ''drive'' y no simplemente ''lead''; ''los llevará'' pierde ese matiz coercitivo. Además, ''quedarán en pequeño número'' es comprensible, pero no refleja tan claramente el modismo מתי מספר como una formulación más idiomática como ''serán pocos en número''.'
  spanish_quality_summary: El español es claro y digno, pero 'adonde Yahvé los llevará' suena demasiado neutral para un contexto punitivo. 'Quedarán en pequeño número' es aceptable, aunque menos natural y menos preciso que 'serán pocos en número'. El resto del texto fluye bien y mantiene la distinción entre 'pueblos' y 'naciones'.
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en 'Yahvé', 'pueblos' para עמים y 'naciones' para גוים. La principal desalineación con la auditoría léxica es נהג, donde el borrador opta por 'llevará' pese a que la racionalidad documentada favorece un verbo con fuerza de expulsión/arrastre en contexto de juicio. Conviene conservar la alternativa 'llevar' en nota, no en el texto principal.
  issues:
  - severity: medium
    issue: El verbo יְנַהֵג se traduce como 'los llevará' en vez de un equivalente que preserve el matiz coercitivo del exilio.
    rationale: La auditoría inglesa eligió 'drive' explícitamente por el contexto de juicio y destierro. En español, 'los expulsará' o 'los hará ir' preserva mejor esa fuerza que 'los llevará', que suena neutral o incluso benévolo.
  - severity: low
    issue: '''Quedarán en pequeño número'' es menos idiomático que otras opciones.'
    rationale: מתי מספר significa 'pocos en número'. 'Serán pocos en número' es más natural y transmite con más claridad la extrema reducción del pueblo.
  - severity: low
    issue: La nota al pie actual presenta como alternativa 'entre las naciones', pero la auditoría inglesa preserva la alternativa semántica de נהג ('lead'/'drive'), no una alternativa de עמים.
    rationale: La distinción 'pueblos' / 'naciones' ya se conserva en el texto principal y no requiere nota para el lector, mientras que la ambigüedad léxica real documentada por el POB sí debería reflejarse en una nota española.
  revised_spanish_text: Y Yahvé los dispersará entre los pueblos, y serán pocos en número entre las naciones adonde Yahvé los expulsará[a].
  revised_footnotes:
  - marker: a
    text: O 'los llevará allí'. El verbo hebreo puede significar 'llevar' o 'expulsar'; aquí se eligió 'expulsar' porque el contexto es de juicio y exilio.
    reason: lexical_alternative
  revision_rationale: Se ajusta נהג al matiz coercitivo documentado por la auditoría inglesa, manteniendo la alternativa en nota. También se mejora la naturalidad y precisión de מתי מספר con 'serán pocos en número'. La distinción entre 'pueblos' y 'naciones' ya queda adecuadamente preservada en el texto sin necesidad de nota específica.
