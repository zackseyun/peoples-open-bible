translation:
  language: es
  text: Pero Absalón huyó y fue a Talmai, hijo de Ammihur[a], rey de Guesur. Y él estuvo de duelo por su hijo todos los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «estuvo de duelo» es implícito en hebreo y se entiende por el contexto como David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַבְשָׁלוֹם
  english_pob_choice: But Absalom
  chosen_spanish: Pero Absalón
  alternatives_spanish:
  - Y Absalón
  - Ahora bien, Absalón
  lexicon: HALOT
  rationale: El וְ inicial puede funcionar como enlace simple, pero aquí el contraste narrativo después de la muerte de Amnón y la huida de Absalón se expresa mejor en español con «Pero»; conserva la relación adversativa observada en la POB inglesa.
- source_word: בָּרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: El verbo hebreo indica huida; «huyó» es natural, conciso y fiel al valor narrativo sin suavizarlo.
- source_word: וַיֵּלֶךְ אֶל
  english_pob_choice: and went to
  chosen_spanish: y fue a
  alternatives_spanish:
  - y fue hacia
  - y se dirigió a
  lexicon: HALOT
  rationale: La secuencia wayyiqtol más אֶל se vierte de manera directa con «y fue a», que mantiene el movimiento narrativo sin añadir matices no necesarios.
- source_word: תַּלְמַי
  english_pob_choice: Talmai
  chosen_spanish: Talmai
  alternatives_spanish:
  - Talmai
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: בֶּן עַמִּיחוּר
  english_pob_choice: son of Ammihur
  chosen_spanish: hijo de Ammihur
  alternatives_spanish:
  - el hijo de Ammihur
  lexicon: HALOT
  rationale: La construcción patronímica se expresa de forma directa en español con «hijo de».
- source_word: מֶלֶךְ גְּשׁוּר
  english_pob_choice: king of Geshur
  chosen_spanish: rey de Guesur
  alternatives_spanish:
  - el rey de Guesur
  lexicon: HALOT
  rationale: Se conserva el título real con «rey de» y el topónimo en transliteración española normalizada como «Guesur».
- source_word: וַיִּתְאַבֵּל
  english_pob_choice: And he mourned
  chosen_spanish: Y David estuvo de duelo
  alternatives_spanish:
  - Y él estuvo de duelo
  - Y lamentó
  lexicon: HALOT
  rationale: El verbo hitpael de אבל expresa duelo por muerte; «estar de duelo» comunica mejor el estado prolongado que un verbo momentáneo. Se explicita el sujeto implícito siguiendo el contexto, como en la nota inglesa.
- source_word: עַל בְּנוֹ
  english_pob_choice: for his son
  chosen_spanish: por su hijo
  alternatives_spanish:
  - por el hijo de él
  - sobre su hijo
  lexicon: HALOT
  rationale: Con verbos de duelo, עַל se vierte naturalmente en español con «por». «Su hijo» mantiene la referencia contextual al hijo por el que David guarda duelo.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todo el tiempo
  - todos sus días
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo de duración continua con una expresión transparente y idiomática en español.
theological_decisions:
- issue: Sujeto implícito de «y él/David estuvo de duelo»
  english_pob_reading: The subject of 'he mourned' is implicit in Hebrew and is understood from context to be David.
  chosen_spanish_reading: Se explicita «David» en el texto principal, manteniendo la referencia contextual.
  alternative_spanish_readings:
  - Y él estuvo de duelo
  - Y se puso de duelo
  rationale: El hebreo omite el sujeto, pero el contexto narrativo identifica a David. En español, explicitarlo evita ambigüedad sin alterar el sentido textual.
  doctrine_reference: Contexto narrativo y referencia pronominal implícita
- issue: Relación del duelo con el objeto marcado por עַל
  english_pob_reading: And he mourned for his son all the days.
  chosen_spanish_reading: «estuvo de duelo por su hijo»
  alternative_spanish_readings:
  - «mourned over his son» / «estuvo de duelo sobre su hijo»
  rationale: En español, «por» expresa de manera natural la causa/objeto del duelo y preserva la función de עַל en este contexto elegíaco.
  doctrine_reference: Uso semántico de preposiciones en contexto de duelo
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, que indica que no hubo cambios necesarios en la revisión más reciente. Se mantuvo la lectura inglesa auditada, pero se adaptó al español con sujeto explícito para evitar ambigüedad y con una formulación idiomática de duelo.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de nombres propios y topónimos de forma uniforme.
  - Se conservó el contraste narrativo inicial con «Pero».
  - Se evitó «SEÑOR» o equivalentes de sustitución porque este verso no contiene el tetragrámaton.
  - Se prefirió «estar de duelo» para reflejar un estado prolongado compatible con כָּל הַיָּמִים.
