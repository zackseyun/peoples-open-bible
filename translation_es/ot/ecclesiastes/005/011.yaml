translation:
  language: es
  text: Dulce es el sueño del trabajador[a], ya coma poco o mucho; pero la abundancia del rico no le deja dormir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plenitud» o «la saciedad» del rico no le deja dormir. El hebreo puede expresar plenitud o satisfacción, pero aquí probablemente se refiere a la abundancia o estado de exceso del rico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתוּקָה
  english_pob_choice: Sweet
  chosen_spanish: Dulce
  alternatives_spanish:
  - agradable
  - sabroso
  lexicon: HALOT
  rationale: El hebreo expresa literalmente dulzura, aplicada metafóricamente al sueño. «Dulce» conserva mejor la imagen concreta que una paráfrasis como «agradable», y es natural en español bíblico actual.
- source_word: שְׁנַת הָעֹבֵד
  english_pob_choice: the sleep of the worker
  chosen_spanish: el sueño del trabajador
  alternatives_spanish:
  - el sueño del obrero
  - el sueño del laborioso
  lexicon: HALOT
  rationale: 'La construcción en estado constructo pide una relación posesiva: el sueño pertenece al trabajador. «Trabajador» es el equivalente más natural y amplio en español, sin reducir innecesariamente el campo semántico a una clase laboral específica.'
- source_word: הָעֹבֵד
  english_pob_choice: the worker
  chosen_spanish: el trabajador
  alternatives_spanish:
  - el obrero
  - el que trabaja
  lexicon: HALOT
  rationale: El participio de עבד aquí nombra a quien trabaja. «Trabajador» mantiene el paralelismo con «rico» y suena más fluido que «obrero», que puede sonar más restringido socialmente.
- source_word: אִם מְעַט וְאִם הַרְבֵּה יֹאכֵל
  english_pob_choice: whether he eats little or much
  chosen_spanish: ya coma poco o mucho
  alternatives_spanish:
  - si coma poco y si mucho coma
  - aunque coma poco o mucho
  lexicon: HALOT
  rationale: La construcción correlativa expresa alternativa indiferente respecto a la cantidad comida. «Ya... o...» reproduce bien ese valor distributivo en español y evita una traducción mecánica.
- source_word: הַרְבֵּה
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en abundancia
  - bastante
  lexicon: HALOT
  rationale: En este contexto cuantifica lo comido. «Mucho» es la opción española más directa y mantiene la simetría con «poco».
- source_word: וְהַשָּׂבָע
  english_pob_choice: the abundance
  chosen_spanish: la abundancia
  alternatives_spanish:
  - la plenitud
  - la saciedad
  - lo colmado
  lexicon: HALOT
  rationale: El término puede denotar plenitud, saciedad o estado de abundancia. Dado el paralelismo con el rico y el efecto de impedir el sueño, «abundancia» refleja bien el sentido probable sin borrar la posible tensión semántica.
- source_word: לֶעָשִׁיר
  english_pob_choice: of the rich man
  chosen_spanish: del rico
  alternatives_spanish:
  - del hombre rico
  - del rico hombre
  lexicon: HALOT
  rationale: El lamed marca relación posesiva. «Del rico» conserva la referencia individual y breve del hebreo, y funciona bien con el contraste entre el trabajador y el rico.
- source_word: אֵינֶנּוּ מַנִּיחַ לוֹ לִישׁוֹן
  english_pob_choice: does not let him sleep
  chosen_spanish: no le deja dormir
  alternatives_spanish:
  - no le permite dormir
  - no lo deja dormir
  lexicon: HALOT
  rationale: El causativo expresa impedir el sueño. «No le deja dormir» es idiomático, claro y fiel al matiz de impedimento.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de alta concordancia se mantiene. No se requieren ajustes adicionales respecto del texto inglés auditado.
  spanish_consistency_notes:
  - Se conserva «rico» como sustantivo adjetival, en paralelo con «trabajador».
  - Se mantiene una formulación natural para el valor correlativo de אִם... וְאִם, sin forzar una calca.
  - El pie de nota marca explícitamente la alternativa semántica principal de וְהַשָּׂבָע, siguiendo el audit trail inglés.
  - No se introduce «SEÑOR» ni terminología eclesiástica ajena al hebreo de este versículo.
