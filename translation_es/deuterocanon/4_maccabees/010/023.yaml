translation:
  language: es
  text: Pero yo mismo me adelanté por mi propia voluntad, para que, al matarme también a mí, incurras en castigo de la justicia celestial[a] por aún más actos de injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la justicia del cielo» o «el juicio celestial». El griego no nombra a Dios explícitamente aquí, sino que se refiere a una justicia trascendente asociada con el cielo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρῆλθον
  english_pob_choice: came forward
  chosen_spanish: me adelanté
  alternatives_spanish:
  - me presenté
  - avancé
  - salí al frente
  - me acerqué
  lexicon: BDAG
  rationale: '''Me adelanté'' captura el movimiento voluntario y decidido hacia adelante propio de quien se presenta por iniciativa propia ante sus ejecutores. ''Me presenté'' es más neutro y administrativo; ''avancé'' resulta más mecánico y pierde el matiz de autopresentación deliberada que el contexto exige.'
- source_word: ἀπʼ ἐμαυτοῦ
  english_pob_choice: of my own accord
  chosen_spanish: por mi propia voluntad
  alternatives_spanish:
  - de mí mismo
  - por mi propia iniciativa
  - voluntariamente
  - espontáneamente
  - por propia determinación
  lexicon: BDAG
  rationale: '''Por mi propia voluntad'' es la equivalencia idiomática natural en español para el griego ἀπʼ ἐμαυτοῦ, que señala una acción iniciada por el hablante sin compulsión externa. La traducción más literal ''de mí mismo'' resultaría calco torpe en español moderno. ''Voluntariamente'' es válida pero pierde el énfasis del pronombre reflexivo ἐμαυτοῦ.'
- source_word: κατακτείνας
  english_pob_choice: by killing
  chosen_spanish: al matarme
  alternatives_spanish:
  - matándome
  - al darme muerte
  - cuando me mates
  - habiendo me matado
  lexicon: BDAG
  rationale: El participio aoristo κατακτείνας se rinde como 'al matarme' (construcción al + infinitivo), que en español expresa la circunstancia o el medio respecto al verbo principal de la cláusula de propósito, tal como el inglés POB optó por 'by killing'. 'Matándome' (gerundio) sería también correcto; 'al darme muerte' es más formal pero introduce un giro perifrástico innecesario.
- source_word: ὀφλήσῃς
  english_pob_choice: you may incur
  chosen_spanish: incurras en
  alternatives_spanish:
  - quedes obligado a
  - seas deudor de
  - contraigas
  - te hagas responsable de
  lexicon: BDAG
  rationale: '''Incurras en'' traslada bien el sentido judicial de contraer responsabilidad o pena; el español ''incurrir en castigo'' tiene uso establecido en registros morales y legales. El inglés POB rechazó ''owe'' por su cotidianeidad excesiva; igualmente se descarta ''seas deudor de'' por el mismo motivo en español.'
- source_word: τῇ οὐρανίᾳ δίκῃ
  english_pob_choice: from heavenly justice
  chosen_spanish: ante la justicia celestial
  alternatives_spanish:
  - de la justicia celestial
  - por la justicia celestial
  - ante el juicio celestial
  - de la justicia del cielo
  lexicon: LSJ
  rationale: El dativo τῇ οὐρανίᾳ δίκῃ con ὀφλήσῃς indica la instancia ante la cual se contrae la responsabilidad. 'Ante la justicia celestial' captura el sentido del tribunal o árbitro moral, y es preferible a 'de la justicia celestial' (calco de la preposición inglesa 'from'), que en español podría sonar como si la justicia fuera simplemente fuente de suministro. La preposición 'ante' refleja mejor el dativo de referencia judicial. δίκη se vierte como 'justicia' y no como 'juicio' para preservar la tensión teológica del original.
- source_word: τιμωρίαν
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - condena
  - retribución
  - venganza
  lexicon: BDAG
  rationale: '''Castigo'' es la equivalencia directa y natural de τιμωρία en español moderno. ''Pena'' tiene color más técnico-jurídico penal; ''retribución'' añade un matiz de proporcionalidad que el griego no especifica; ''venganza'', como señaló el inglés POB, personalizaría en exceso la acción respecto de la agencia impersonal de la ''justicia celestial''.'
- source_word: περὶ πλειόνων ἀδικημάτων
  english_pob_choice: for still more acts of wrongdoing
  chosen_spanish: por aún más actos de injusticia
  alternatives_spanish:
  - por más injusticias
  - por mayores crímenes
  - respecto de más delitos
  - por aún más agravios
  - por aún más ofensas
  lexicon: BDAG
  rationale: ἀδίκημα denota el acto injusto o lesivo concreto, no solo la injusticia como abstracción; 'actos de injusticia' preserva tanto la dimensión de acción como el contenido moral-legal. πλειόνων tiene fuerza comparativa-acumulativa, por lo que 'aún más' refleja el carácter de incremento sobre los crímenes ya perpetrados contra los hermanos anteriores.
theological_decisions:
- issue: Renderización de τῇ οὐρανίᾳ δίκῃ sin nombrar a Dios explícitamente
  english_pob_reading: heavenly justice
  chosen_spanish_reading: la justicia celestial
  alternative_spanish_readings:
  - la justicia del cielo
  - el juicio celestial
  - la justicia divina
  - el tribunal del cielo
  rationale: 'El texto griego no nombra a Dios sino que apela a una justicia trascendente «celestial». ''La justicia celestial'' preserva esta indirección teológica del original: el mártir invoca una instancia moral suprema sin resolverla explícitamente en un agente personal divino. ''La justicia divina'' sería más interpretativa y cerraría la tensión que el texto mantiene abierta. ''El juicio celestial'' desplazaría δίκη (principio/agencia de justicia) hacia un acto específico de juzgar, lo cual excede el griego. Se mantiene la tensión conforme al principio del POB de preservar la ambigüedad del original.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'El texto inglés del POB fue revisado el 23 de abril de 2026 (revisor: gpt-5.4) para desplazar «punishment» antes de «from heavenly justice», mejorando el orden natural en inglés. El español adoptó su propio orden idiomático: «incurras ante la justicia celestial en castigo», colocando «ante la justicia celestial» en posición intermedia que es natural en español sin calcar la sintaxis inglesa revisada. La revisión inglesa no afecta el contenido semántico del español.'
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה/YHWH en este versículo; no se aplica la convención terminológica Yahvé.
  - δίκη se traduce «justicia» (no «juicio»), preservando la distinción entre δίκη como principio/agencia y κρίσις/κρίμα como acto de juzgar, y manteniendo la tensión teológica documentada en el POB.
  - No hay terminología de Mesías (Χριστός), Espíritu (πνεῦμα), esclavo (δοῦλος) ni arrepentimiento (μετάνοια) en este versículo; no se aplican las correspondencias terminológicas por defecto del proyecto.
  - El participio aoristo κατακτείνας se resuelve mediante la construcción española «al + infinitivo», preferida a la de gerundio para expresar la circunstancia medial en estilo moderno y literario.
