translation:
  language: es
  text: 'El que hizo las Pléyades y Orión[a], el que convierte las tinieblas profundas en mañana y convierte el día en noche[b], el que llama a las aguas del mar y las derrama sobre la faz de la tierra: Yahvé es su nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Kesil». Aunque la palabra puede significar «insensato» en otros contextos, aquí, junto con «Pléyades», se entiende mejor como la constelación Orión.
    reason: lexical_alternative
  - marker: b
    text: O «la sombra de muerte» para «las tinieblas profundas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  english_pob_choice: He who made
  chosen_spanish: el que hizo
  alternatives_spanish:
  - el que hace
  - hacedor de
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva como cláusula descriptiva de Dios. En español, «el que hizo» conserva bien el valor participial y suena natural en un enunciado poético.
- source_word: כִימָה
  english_pob_choice: the Pleiades
  chosen_spanish: las Pléyades
  alternatives_spanish:
  - Kimá
  - las Pléyades
  lexicon: HALOT
  rationale: El referente astronómico es el cúmulo conocido como Pléyades; la traducción comunica el sentido al lector español mejor que la transliteración.
- source_word: וּכְסִיל
  english_pob_choice: Orion
  chosen_spanish: Orión
  alternatives_spanish:
  - Kesil
  - el Fuerte
  - el insensato
  lexicon: HALOT
  rationale: En esta pareja astronómica, el contexto exige una constelación. «Orión» conserva el referente celeste señalado por la POB inglesa.
- source_word: וְהֹפֵךְ
  english_pob_choice: and turns
  chosen_spanish: y convierte
  alternatives_spanish:
  - y cambia
  - y transforma
  lexicon: HALOT
  rationale: El verbo expresa inversión o transformación. «Convierte» reproduce con claridad el cambio de un estado a otro en el paralelo poético.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: la profunda oscuridad
  alternatives_spanish:
  - la sombra de muerte
  - tinieblas densas
  lexicon: HALOT
  rationale: Aquí el contexto cósmico habla de oscuridad intensa, no de una fórmula funeraria. «La profunda oscuridad» mantiene el valor semántico sin imponer «sombra de muerte» donde podría sonar equívoco.
- source_word: לַבֹּקֶר
  english_pob_choice: into morning
  chosen_spanish: en mañana
  alternatives_spanish:
  - para mañana
  - al amanecer
  lexicon: HALOT
  rationale: Con «convierte», la preposición natural en español es «en». «Mañana» refleja el término del original y su oposición a la oscuridad.
- source_word: וְיוֹם לַיְלָה הֶחְשִׁיךְ
  english_pob_choice: and darkens day into night
  chosen_spanish: y oscurece el día en noche
  alternatives_spanish:
  - y vuelve el día en noche
  - y hace del día noche
  lexicon: HALOT
  rationale: 'El hifil de חשך tiene fuerza causativa: produce oscuridad. «Oscurece el día en noche» conserva esa causación y el paralelismo con la línea anterior.'
- source_word: הַקּוֹרֵא
  english_pob_choice: who calls for
  chosen_spanish: el que llama a
  alternatives_spanish:
  - el que convoca
  - el que llama por
  lexicon: HALOT
  rationale: El participio sigue la serie de acciones divinas. «Llama a» refleja la idea de convocar o pedir que vengan las aguas, sin añadir matices extraños.
- source_word: לְמֵי הַיָּם
  english_pob_choice: the waters of the sea
  chosen_spanish: las aguas del mar
  alternatives_spanish:
  - las aguas del océano
  - las aguas del mar
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo directo y bíblicamente natural en español. «Mar» conserva el registro del hebreo.
- source_word: וַיִּשְׁפְּכֵם
  english_pob_choice: and pours them out
  chosen_spanish: y las derrama
  alternatives_spanish:
  - y las vierte
  - y las vacía
  lexicon: HALOT
  rationale: El verbo significa derramar o verter. «Las derrama» mantiene el movimiento líquido y la referencia del pronombre a las aguas.
- source_word: עַל פְּנֵי הָאָרֶץ
  english_pob_choice: over the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se conserva en una forma ya comprensible en español. «Faz de la tierra» preserva el paralelismo bíblico sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto establece «Yahvé» como forma española principal para el Tetragrámaton. Se mantiene el nombre propio divino en lugar de sustituirlo por un título.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - éste es su nombre
  lexicon: HALOT
  rationale: La frase nominal final en español fluye de forma directa con «es su nombre», conservando el cierre enfático del verso.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide «Yahvé» como forma principal española para el Tetragrámaton. Esto conserva el nombre personal del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de צַלְמָוֶת
  english_pob_reading: deep darkness
  chosen_spanish_reading: la profunda oscuridad
  alternative_spanish_readings:
  - la sombra de muerte
  - tinieblas
  rationale: En este contexto de contrastes cósmicos, el sentido inmediato es oscuridad intensa. La traducción evita fijar una lectura funeraria que no domina aquí.
  doctrine_reference: HALOT, צַלְמָוֶת; POB English footnote b
- issue: Referencia astronómica de כִימָה y כְסִיל
  english_pob_reading: the Pleiades and Orion
  chosen_spanish_reading: las Pléyades y Orión
  alternative_spanish_readings:
  - Kimá y Kesil
  rationale: La identificación astronómica es la lectura contextual seguida por la POB inglesa. Traducir los nombres permite una comprensión inmediata sin perder la referencia original.
  doctrine_reference: HALOT; POB English lexical decisions
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en la fuente inglesa; el pasaje está marcado como unchanged en el último pase de revisión, con acuerdo alto entre revisores. La versión española sigue esa lectura estable sin introducir cambios no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Nombre divino, conforme al estándar del proyecto.
  - Se traducen los nombres astronómicos para mayor claridad, siguiendo la decisión inglesa de evitar transliteración innecesaria.
  - «La profunda oscuridad» conserva la ambigüedad léxica de צַלְמָוֶת sin imponer una lectura más estrecha.
  - La sintaxis reproduce la cadena de participios con cláusulas relativas naturales en español, manteniendo el tono poético del hebreo.
