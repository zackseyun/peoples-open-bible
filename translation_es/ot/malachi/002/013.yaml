translation:
  language: es
  text: 'Y esto segundo hacen: cubren el altar de Yahvé[a] con lágrimas, con llanto y gemido, porque ya no presta atención a la ofrenda[b] ni la acepta con agrado de sus manos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre divino traducido aquí como transliteración de יְהוָה, siguiendo el criterio del proyecto para conservar el nombre personal de Dios.
    reason: theological_note
  - marker: b
    text: O «la ofrenda vegetal». El hebreo מִנְחָה puede designar una ofrenda de cereal o, más ampliamente, una ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת שֵׁנִית
  english_pob_choice: And this second thing
  chosen_spanish: Y esta segunda cosa
  alternatives_spanish:
  - Y esto segundo
  - Y esta segunda acción
  lexicon: HALOT
  rationale: La expresión introduce una segunda acusación o cargo; en español, "esta segunda cosa" conserva el valor ordinal de שֵׁנִית y suena natural en un discurso profético de reproche.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you do
  chosen_spanish: hacen
  alternatives_spanish:
  - hacen ustedes
  - están haciendo
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como acusación presente/general. El presente indicativo plural mantiene el tono directo y acusatorio.
- source_word: כַּסּוֹת דִּמְעָה אֶת מִזְבַּח יְהוָה
  english_pob_choice: you cover the altar of Yahweh with tears
  chosen_spanish: cubren el altar de Yahvé con lágrimas
  alternatives_spanish:
  - inundan el altar de Yahvé con lágrimas
  - cubren con lágrimas el altar de Yahvé
  lexicon: HALOT
  rationale: כסה significa literalmente "cubrir"; se conserva la imagen verbal sin ampliarla a una paráfrasis. El objeto directo + complemento de medio se refleja de forma clara y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. "Yahvé" es la forma preferida en el texto español principal.'
- source_word: בְּכִי וַאֲנָקָה
  english_pob_choice: with weeping and groaning
  chosen_spanish: con lágrimas, con llanto y gemido
  alternatives_spanish:
  - con llanto y gemido
  - con llanto y gemir
  lexicon: HALOT
  rationale: בְּכִי expresa llanto/llorar y אֲנָקָה denota gemido o quejido. "Llanto y gemido" reproduce bien la pareja semántica; "lágrimas" se conserva por la imagen ya presente en el verso y por continuidad con la cobertura del altar.
- source_word: מֵאֵין עוֹד פְּנוֹת אֶל
  english_pob_choice: because he no longer regards
  chosen_spanish: porque ya no mira
  alternatives_spanish:
  - porque ya no considera
  - porque no vuelve su atención a
  lexicon: HALOT
  rationale: La construcción transmite cese de atención/regard. "Ya no mira" es idiomático en español y puede expresar la idea de no prestar atención, sin perder la fuerza del rechazo implícito.
- source_word: הַמִּנְחָה
  english_pob_choice: the offering
  chosen_spanish: la ofrenda[b]
  alternatives_spanish:
  - la ofrenda vegetal[b]
  - la oblación[b]
  lexicon: HALOT
  rationale: מִנְחָה puede ser una ofrenda específica de cereal o, más ampliamente, una ofrenda. En el texto principal se opta por "ofrenda" como término amplio y claro; la nota preserva la alternativa específica.
- source_word: וְלָקַחַת רָצוֹן מִיֶּדְכֶם
  english_pob_choice: or accepts it with favor from your hand
  chosen_spanish: ni la acepta con favor de su mano
  alternatives_spanish:
  - ni la recibe con favor de su mano
  - ni la acepta favorablemente de su mano
  lexicon: HALOT
  rationale: לקח con רצון expresa recepción/aceptación favorable. En español, "acepta con favor" conserva la idea cultual de aceptación benevolente y el vínculo con la mano del oferente.
theological_decisions:
- issue: Sujeto implícito de las acciones de 'mirar' y 'aceptar'
  english_pob_reading: The implied subject is the LORD
  chosen_spanish_reading: El sujeto implícito se mantiene y se sobreentiende como Yahvé en el contexto.
  alternative_spanish_readings:
  - porque él ya no mira la ofrenda
  - porque Yahvé ya no mira la ofrenda
  rationale: El contexto cultual y el paralelismo con el altar de Yahvé identifican al sujeto sin necesidad de explicitarlo de modo excesivo. En español, la formulación impersonal con "ya no mira" mantiene la tensión del hebreo y evita sobrecargar la sintaxis.
  doctrine_reference: Preservar la referencia contextual sin resolver artificialmente la elipsis.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del texto inglés, que prefirió "regards the offering" frente a una formulación más literal de "turns toward," y conserva la decisión auditada de mantener la imagen de cubrir el altar con lágrimas. La versión española adopta esa misma dirección semántica con un giro natural: "ya no mira la ofrenda".'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma uniforme del nombre divino.
  - Se usa "ofrenda" para מִנְחָה, con nota para la alternativa específica.
  - Se conserva el paralelismo poético con "llanto y gemido" sin introducir una interpretación doctrinal adicional.
  - La negación con "ya no" refleja bien el valor de cese del hebreo y suena natural en español bíblico contemporáneo.
