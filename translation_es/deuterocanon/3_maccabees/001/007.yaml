translation:
  language: es
  text: Y después de hacer esto y de repartir dones a los santuarios, hizo que los sometidos a su autoridad cobraran ánimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ποιήσας
  english_pob_choice: after doing
  chosen_spanish: después de hacer
  alternatives_spanish:
  - habiendo hecho
  - cuando hubo hecho
  lexicon: LSJ
  rationale: El participio aoristo marca una acción previa a la principal; «después de hacer» conserva esa secuencia de manera natural en español sin volverla pesada.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - aquello
  - tal cosa
  lexicon: LSJ
  rationale: El demostrativo remite a la acción precedente; «esto» es la forma más directa y fiel en español.
- source_word: τεμένεσι
  english_pob_choice: sanctuaries
  chosen_spanish: los santuarios
  alternatives_spanish:
  - los templos
  - los recintos sagrados
  - los sagrarios
  lexicon: LSJ
  rationale: τέμενος designa un lugar consagrado o recinto sagrado. «Santuarios» mantiene amplitud semántica y evita restringir indebidamente a una arquitectura específica.
- source_word: δωρεὰς
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - ofrendas
  - donativos
  lexicon: LSJ
  rationale: En contexto real y benefactor, «dones» conserva la idea de dádivas sin forzar un sentido cultual más fuerte que el griego exige; además encaja bien con el registro bíblico en español.
- source_word: ἀπονείμας
  english_pob_choice: distributing
  chosen_spanish: repartir
  alternatives_spanish:
  - distribuir
  - asignar
  - conceder
  lexicon: LSJ
  rationale: El participio expresa la acción de dar o asignar en plural; «repartir» comunica con claridad la acción de distribuir dones en español actual.
- source_word: εὐθαρσεῖς
  english_pob_choice: confident
  chosen_spanish: confiados
  alternatives_spanish:
  - animados
  - de buen ánimo
  - valientes
  lexicon: LSJ
  rationale: El adjetivo alude a un estado de ánimo fortalecido o alentado. «Confiados» transmite ese resultado de ánimo sereno y firme sin añadir una tonalidad de audacia no explicitada.
- source_word: τοὺς ὑποτεταγμένους
  english_pob_choice: those under his rule
  chosen_spanish: los sometidos a su autoridad
  alternatives_spanish:
  - sus súbditos
  - los subordinados a él
  - los que estaban bajo su dominio
  lexicon: LSJ
  rationale: La forma participial pasiva indica personas colocadas bajo sujeción/autoridad. «Sometidos a su autoridad» conserva el matiz de subordinación sin convertirlo automáticamente en un término político fijo como «súbditos».
- source_word: κατέστησεν
  english_pob_choice: he made
  chosen_spanish: hizo que quedaran
  alternatives_spanish:
  - los hizo
  - los dejó
  - los estableció
  lexicon: LSJ
  rationale: En esta construcción causativa, el verbo expresa que él produjo ese estado en ellos. «Hizo que quedaran» preserva la causación y permite unirla naturalmente con «confiados» en español.
theological_decisions:
- issue: Relación entre los dones y los santuarios
  english_pob_reading: distributing gifts to the sanctuaries
  chosen_spanish_reading: de repartir dones a los santuarios
  alternative_spanish_readings:
  - de repartir ofrendas a los santuarios
  - de dar dones a los santuarios
  rationale: El griego habla de dádivas destinadas a los τέμενεσι, sin precisar más el tipo de entrega. «Dones» evita introducir la lectura específicamente sacrificial de «ofrendas» y conserva la amplitud del texto.
  doctrine_reference: Lexical/theological caution on cultic language in deuterocanonical narrative
- issue: Estado final de los sometidos
  english_pob_reading: he made those under his rule confident
  chosen_spanish_reading: hizo que los sometidos a su autoridad quedaran confiados
  alternative_spanish_readings:
  - hizo a los sometidos a su autoridad confidentes
  - los animó
  - los puso de buen ánimo
  rationale: εὐθαρσεῖς describe un estado interior de ánimo fortalecido, no una doctrina específica. «Confiados» mantiene esa tonalidad sin exagerar hacia una afirmación moral o espiritual más amplia.
  doctrine_reference: Lexical/theological distinction between political reassurance and spiritual encouragement
translation_notes:
  revision_awareness: La versión española sigue el texto griego de Swete 1909 y está alineada con el tramo auditado en inglés. No hay revisiones aplicadas en el expediente; por eso no se introducen notas de variante textual ni cambios de alcance.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» y también «Cristo/Mesías» porque no aparecen en el verso.
  - «Santuarios» conserva el valor amplio de τέμενεσι sin especificar templo o altar.
  - «Confiados» se usa como adjetivo de estado resultante, no como traducción devocional de fe.
