    issue: Marcador de nota al pie anclado en la frase equivocada
    rationale: La nota [a] explica el hebreo «la mano de Absalón», que corresponde a יַד אַבְשָׁלוֹם al final del versículo, no a «Valle del Rey». Esto rompe la trazabilidad entre texto y nota y puede confundir al lector.
  - severity: medium
    issue: Apertura «Ahora bien» añade un matiz discursivo no requerido
    rationale: El hebreo comienza simplemente con waw + nombre propio. «Ahora bien» introduce un giro explicativo o contrastivo más marcado que el necesario. «Absalón había tomado...» o «Y Absalón había tomado...» refleja mejor el tono narrativo.
  - severity: low
    issue: «por su nombre» puede sonar levemente ambiguo en español
    rationale: Aunque es comprensible, «por su propio nombre» expresa con más claridad que Absalón puso al monumento su mismo nombre, en línea con el inglés auditado.
