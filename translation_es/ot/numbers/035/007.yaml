lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  lexicon: HALOT
  rationale: El cuantificador abarca el conjunto total de ciudades; en español, «Todas» es la forma natural y fiel para introducir la suma completa.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las urbes
  lexicon: HALOT
  rationale: עִיר puede ser «ciudad» o «pueblo», pero en el marco legal y territorial de Números, «ciudades» mantiene la coherencia con el contexto y con la precisión del reparto levítico.
- source_word: אֲשֶׁר תִּתְּנוּ
  english_pob_choice: that you give
  chosen_spanish: que den
  alternatives_spanish:
  - que ustedes den
  - que han de dar
  lexicon: HALOT
  rationale: 'El verbo hebreo está en 2mp: la instrucción se dirige al pueblo/líderes en plural. «Que den» conserva la función normativa sin forzar un futuro perifrástico; el sujeto implícito en español se entiende por el contexto.'
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: La preposición hebrea marca destinatario. «A los levitas» es la correspondencia directa y natural en español.
- source_word: אַרְבָּעִים וּשְׁמֹנֶה עִיר
  english_pob_choice: forty-eight cities
  chosen_spanish: cuarenta y ocho ciudades
  alternatives_spanish:
  - cuarenta y ocho pueblos
  lexicon: HALOT
  rationale: Se preserva el valor cardinal literal de la expresión hebrea. Aunque עִיר aparece en singular tras el numeral, en español el sustantivo va naturalmente en plural.
- source_word: אֶתְהֶן
  english_pob_choice: shall be / them
  chosen_spanish: ellas
  alternatives_spanish:
  - las mismas
  - éstas
  lexicon: HALOT
  rationale: El POB inglés hace explícito «them» para reflejar el resumptivo hebreo. En español, «ellas» conserva esa referencia retórica y evita añadir una cópula que no está en el hebreo.
- source_word: וְאֶת מִגְרְשֵׁיהֶן
  english_pob_choice: and their pasturelands
  chosen_spanish: y sus ejidos
  alternatives_spanish:
  - y sus terrenos abiertos
  - y sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto que rodea la ciudad, a veces funcionalmente de pasto o uso común. «Ejidos» comunica bien esa franja de tierra comunal/periférica en español bíblico y eclesial, aunque se anotan alternativas para la ambigüedad del término.
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió la referencia explícita a «them» para representar אֶתְהֶן. La redacción española la conserva con «ellas» para mantener la fuerza resumptiva del hebreo sin introducir una cópula ajena al texto.
  spanish_consistency_notes:
  - Se mantiene «levitas» como designación tribal estándar, coherente con el audit trail inglés.
  - «Ejidos» se usa como solución española funcional para מִגְרְשֵׁיהֶן; la nota conserva las alternativas léxicas relevantes.
  - El orden y la cadencia buscan ser publicables en español sin perder la estructura enumerativa del hebreo.
