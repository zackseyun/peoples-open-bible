  language: en
  yaml_path: translation/ot/ecclesiastes/011/009.yaml
  text: Rejoice[a], young man, in your youth, and let your heart cheer you in the days of your young manhood. Walk in the ways of your heart and in the sight of your eyes[d][c][b], but know that for all these things God will bring you into judgment.
  footnotes:
