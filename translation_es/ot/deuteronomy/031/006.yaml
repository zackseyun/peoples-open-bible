review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: exhortación a fortaleza y valor, doble prohibición de temor, uso correcto de Yahvé, énfasis en la presencia divina y doble promesa de apoyo/no abandono. Sin embargo, hay un problema importante de número/persona: los imperativos y prohibiciones hebreos son 2ª persona plural, mientras que el español draft los vuelve singular (''Sé'', ''No temas'', ''te aterrorices''). Además, la nota [a] no corresponde al lugar anclado ni refleja la alternativa inglesa; y la nota [b] comenta la frase equivocada, porque la alternativa inglesa documentada corresponde a ''no te soltará/no te dejará caer'', no a ''va contigo''.'
  spanish_quality_summary: El español es claro y digno, pero la mezcla de tratamiento singular para un mandato plural debilita la fidelidad y suena inconsistente con el contexto colectivo. También 'no te faltará' es comprensible, pero en español puede sugerir 'no estará ausente' o 'no escaseará' más que la idea de sostener/no soltar; conviene una formulación más precisa. Con ajustes menores, el texto queda natural y más exacto.
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'Dios' y el tono general. No hay conflicto con términos doctrinales mayores. La principal corrección es gramatical y de notas, no de glosario.
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular en los mandatos y prohibiciones
    rationale: 'El hebreo usa formas 2mp: חִזְקוּ, אִמְצוּ, תִּירְאוּ, תַּעַרְצוּ. El español debe reflejarlo con ''Sean fuertes y valientes. No teman ni se aterroricen...'' o equivalente. El singular altera el destinatario.'
  - severity: high
    issue: La nota [a] está mal anclada y mal enfocada
    rationale: La nota inglesa [a] comenta la alternativa de los verbos de temor ('Do not fear or dread them'), no 'Be strong and courageous'. En español, si se conserva, debe anclarse en la prohibición correspondiente, no en 'Sean fuertes'.
  - severity: medium
    issue: La nota [b] explica la frase equivocada
    rationale: La auditoría inglesa coloca la nota [b] sobre 'he will not fail you', con base en el hebreo literal 'no te soltará/no te dejará caer'. El draft la ancla en 'va contigo', lo cual no preserva la decisión léxica documentada.
  - severity: medium
    issue: '''No te faltará'' es menos preciso para לֹא יַרְפְּךָ'
    rationale: Aunque intenta expresar apoyo constante, en español no transmite con suficiente claridad la imagen de no soltar/no dejar caer ni la decisión inglesa 'he will not fail you'. 'No los soltará' o 'no les fallará' refleja mejor el hebreo y la auditoría.
  revised_spanish_text: Sean fuertes y valientes. No teman ni se aterroricen[a] por causa de ellos, porque Yahvé su Dios es el que va con ustedes; no les fallará[b] ni los abandonará.
  revised_footnotes:
  - marker: a
    text: 'O: «No teman ni les tengan pavor». El segundo verbo es más fuerte que el primero y puede llevar la idea de terror o de quedar quebrantados por el miedo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no los soltará» o «no los dejará caer»; la idea es que Yahvé no dejará de sostenerlos.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la 2ª persona plural para ajustarse al hebreo y al contexto colectivo. Se reubican y reescriben las notas para que correspondan a las decisiones léxicas auditadas: [a] sobre la intensificación del temor y [b] sobre יַרְפְּךָ. Se mantiene ''Yahvé'' según la norma del proyecto y se mejora la precisión de la promesa con ''no les fallará'', respaldada por nota literal.'
