  yaml_path: translation/ot/daniel/009/024.yaml
  text: 'Seventy weeks are decreed concerning your people and your holy city: to finish the transgression[a], to seal up sins, to make atonement for iniquity, to bring in everlasting righteousness, to seal up vision and prophet[d][c][b], and to anoint the most holy place.'
  footnotes:
