translation:
  language: es
  text: Y en el undécimo año[a], en el mes de Bul (es decir, el octavo mes), la casa fue terminada en todos sus detalles y conforme a todas sus especificaciones[b]. Así la edificó en siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bul era el nombre antiguo del octavo mes en el calendario de Israel.
    reason: cultural_note
  - marker: b
    text: O «según todos sus detalles y todo su plan prescrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה הָאַחַת עֶשְׂרֵה
  english_pob_choice: in the eleventh year
  chosen_spanish: en el año once
  alternatives_spanish:
  - en el undécimo año
  - en el año undécimo
  lexicon: HALOT
  rationale: La expresión hebrea marca un año ordinal; en español, «en el año once» conserva la referencia cronológica con naturalidad y sin forzar un calco demasiado rígido.
- source_word: בְּיֶרַח בּוּל
  english_pob_choice: in the month of Bul
  chosen_spanish: en el mes de Bul
  alternatives_spanish:
  - en la luna/mes de Bul
  - en el mes llamado Bul
  lexicon: HALOT
  rationale: יֶׂרַח tiene aquí sentido de «mes»; se translitera «Bul» como nombre propio del calendario, manteniendo el valor histórico del término.
- source_word: הוּא הַחֹדֶשׁ הַשְּׁמִינִי
  english_pob_choice: that is, the eighth month
  chosen_spanish: es decir, el mes octavo
  alternatives_spanish:
  - esto es, el octavo mes
  - que es el mes octavo
  lexicon: HALOT
  rationale: La apposición explica el nombre antiguo del mes; «es decir» comunica bien la función explicativa en español moderno y bíblico.
- source_word: כָּלָה הַבַּיִת
  english_pob_choice: the house was finished
  chosen_spanish: la casa fue terminada
  alternatives_spanish:
  - la casa fue acabada
  - la casa quedó terminada
  lexicon: HALOT
  rationale: «Casa» conserva el hebreo, con referencia contextual al templo; «fue terminada» expresa con claridad la culminación de la obra sin sobreinterpretar.
- source_word: לְכָל דְּבָרָיו
  english_pob_choice: in all its parts
  chosen_spanish: en todos sus detalles
  alternatives_spanish:
  - en todos sus elementos
  - en cada una de sus partes
  lexicon: HALOT
  rationale: דְּבָרָיו aquí no significa «palabras», sino los componentes de la construcción; «detalles» transmite bien el alcance de la expresión en español.
- source_word: וּלְכָל מִשְׁפָּטוֹ
  english_pob_choice: according to all its specifications
  chosen_spanish: conforme a todas sus especificaciones
  alternatives_spanish:
  - según todas sus prescripciones
  - conforme a todo lo prescrito
  lexicon: HALOT
  rationale: En contexto arquitectónico, מִשְׁפָּטוֹ apunta a normas o medidas prescritas; «especificaciones» preserva ese sentido técnico sin convertirlo en lenguaje jurídico innecesario.
- source_word: וַיִּבְנֵהוּ
  english_pob_choice: So he built it
  chosen_spanish: Así la edificó
  alternatives_spanish:
  - y la edificó
  - de modo que la edificó
  lexicon: HALOT
  rationale: El verbo retoma y cierra el dato cronológico; «Así» da el valor consecutivo/sumativo. Se elige «edificó» por el contexto del templo, manteniendo registro digno.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: in seven years
  chosen_spanish: en siete años
  alternatives_spanish:
  - durante siete años
  - por siete años
  lexicon: HALOT
  rationale: La duración total se expresa de manera natural en español como «en siete años», siguiendo la lectura resultativa del texto base.
theological_decisions:
- issue: Designación de la construcción del templo como «la casa»
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa del Señor
  rationale: El hebreo dice literalmente «la casa»; aunque el referente es el templo, conservar esa denominación evita sustituir el texto por una formulación interpretativa más explícita.
  doctrine_reference: 1 Reyes 6:38; uso contextual de בַּיִת en la narrativa del templo
translation_notes:
  revision_awareness: 'Se siguió la coincidencia alta del control de calidad previo: el texto base inglés no requirió revisión sustantiva, y la versión española preserva los mismos marcadores de contenido y las mismas dos notas léxicas/culturales del original auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - Se conservó «casa» para בַּיִת por fidelidad al hebreo, con el referente templario entendido por contexto.
  - «Especificaciones» reproduce la decisión técnica del inglés POB para מִשְׁפָּטוֹ sin cargar el verso con un giro jurídico ajeno al contexto de construcción.
  - Se usó «edificó» para evitar una repetición excesiva de «casa» y para adecuar el registro de obra constructiva en español.
