translation:
  language: es
  text: 'Y levantándose el sumo sacerdote en medio, le preguntó a Jesús: «¿No respondes nada? ¿Qué testifican estos hombres contra ti?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: levantándose
  alternatives_spanish:
  - se puso de pie
  - se levantó
  lexicon: BDAG
  rationale: El participio aoristo indica la acción corporal de incorporarse; en español, el participio/pronombre reflexivo «levantándose» fluye de manera natural y conserva el movimiento narrativo.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: BDAG
  rationale: En este contexto judicial y narrativo, ἀρχιερεύς se refiere al sumo sacerdote presidiendo la escena; «sumo sacerdote» es la forma clara y establecida en español.
- source_word: εἰς μέσον
  english_pob_choice: in the midst
  chosen_spanish: en medio
  alternatives_spanish:
  - al centro
  - en el centro
  lexicon: BDAG
  rationale: La frase señala una posición central frente a la asamblea. «En medio» conserva el sentido espacial con naturalidad en español sin forzar una expresión arcaica.
- source_word: ἐπηρώτησεν
  english_pob_choice: questioned
  chosen_spanish: interrogó
  alternatives_spanish:
  - preguntó
  - cuestionó
  lexicon: BDAG
  rationale: El verbo en el marco del juicio tiene fuerza forense; «interrogó» comunica mejor esa presión judicial que un simple «preguntó», sin llegar a exagerar como «acusó».
- source_word: ἀποκρίνῃ οὐδέν
  english_pob_choice: Do you answer nothing?
  chosen_spanish: ¿No respondes nada?
  alternatives_spanish:
  - ¿No das ninguna respuesta?
  - ¿No contestas nada?
  lexicon: BDAG
  rationale: La pregunta retórica es breve y desafiante. «Responder» reproduce bien el verbo de contestación y mantiene el tono directo del griego.
- source_word: τί
  english_pob_choice: What are
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué es lo que
  - ¿Cuál
  lexicon: BDAG
  rationale: En esta construcción, τί introduce el contenido de la acusación. En español, basta «¿Qué» para reflejar la pregunta sin añadir perífrasis innecesarias.
- source_word: οὗτοί
  english_pob_choice: these men
  chosen_spanish: estos
  alternatives_spanish:
  - estos hombres
  - éstos
  lexicon: BDAG
  rationale: El demostrativo masculino plural alude a los testigos presentes. En español, «estos» puede sostener el referente del contexto inmediato; el pie de nota aclara el matiz masculino explícito.
- source_word: καταμαρτυροῦσιν
  english_pob_choice: are testifying against you
  chosen_spanish: testifican contra ti
  alternatives_spanish:
  - dan testimonio contra ti
  - atestiguan contra ti
  lexicon: BDAG
  rationale: καταμαρτυρέω tiene el sentido jurídico de dar testimonio contra alguien. «Testifican contra ti» conserva esa fuerza legal de forma clara y directa en español.
theological_decisions:
- issue: Referencia masculina del demostrativo οὗτοί en el contexto del juicio
  english_pob_reading: these men
  chosen_spanish_reading: estos
  alternative_spanish_readings:
  - estos hombres
  - estos testigos
  rationale: Se preserva el referente masculino plural sin recargar el texto principal. La nota explica que el griego usa un demostrativo masculino plural para los testigos presentes, manteniendo la precisión del contexto judicial.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que prefirió una formulación más directa para la pregunta final y una expresión más formal para la posición del sumo sacerdote. También toma en cuenta la equivalencia alta del control cruzado, sin introducir paráfrasis que suavicen el tono forense del versículo.
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» para ὁ ἀρχιερεύς, coherente con el uso bíblico estándar y con el contexto del juicio.
  - «Testifican contra ti» conserva el valor legal de καταμαρτυροῦσιν y evita reducirlo a una acusación genérica.
  - La nota [a] preserva la tensión gramatical del masculino plural griego sin sobrecargar el texto principal.
