translation:
  language: es
  text: Por causa de la ganancia[a] muchos han pecado, y quien busca aumentarla apartará la vista[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provecho» o «lucro». El término griego puede referirse a ventaja material o ganancia.
    reason: lexical_alternative
  - marker: b
    text: Es decir, apartará la vista deliberadamente; un modismo que sugiere compromiso moral o hacer caso omiso de lo que debería verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  english_pob_choice: for the sake of
  chosen_spanish: por causa de
  alternatives_spanish:
  - por
  - a causa de
  lexicon: LSJ
  rationale: La preposición con genitivo expresa motivo o finalidad; en español, «por causa de» conserva el valor causal/motivacional del dicho sin sonar mecánico.
- source_word: ἀδιαφόρου
  english_pob_choice: gain
  chosen_spanish: ganancia
  alternatives_spanish:
  - provecho
  - lucro
  - beneficio
  lexicon: LSJ
  rationale: En este proverbio la palabra apunta a ventaja material o provecho económico; «ganancia» mantiene esa referencia concreta y es natural en español actual.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - gran número
  lexicon: LSJ
  rationale: Es un cuantificador genérico; «muchos» conserva el carácter proverbial y no añade un sujeto más específico que el griego.
- source_word: ἥμαρτον
  english_pob_choice: have sinned
  chosen_spanish: han pecado
  alternatives_spanish:
  - pecaron
  lexicon: LSJ
  rationale: El perfecto inglés refleja una observación proverbial; en español, el perfecto compuesto («han pecado») comunica bien esa experiencia humana repetida sin perder naturalidad.
- source_word: ζητῶν
  english_pob_choice: whoever seeks
  chosen_spanish: quien busca
  alternatives_spanish:
  - el que busca
  - quien procura
  lexicon: LSJ
  rationale: El participio articular tiene valor genérico. «Quien busca» preserva la generalidad proverbial en un español fluido.
- source_word: πληθῦναι
  english_pob_choice: to increase it
  chosen_spanish: aumentarla
  alternatives_spanish:
  - multiplicarla
  - incrementarla
  - hacerla crecer
  lexicon: LSJ
  rationale: El infinitivo se refiere a la ganancia implícita; el pronombre enclítico femenino recupera ese referente en español. «Aumentarla» es claro y no sobreinterpreta el objeto.
- source_word: ἀποστρέψει ὀφθαλμόν
  english_pob_choice: will turn away his eye
  chosen_spanish: apartará la vista
  alternatives_spanish:
  - desviará los ojos
  - apartará su ojo
  - mirará hacia otro lado
  lexicon: LSJ
  rationale: La imagen idiomática se conserva en un español idiomático. «Apartará la vista» mantiene el sentido de mirar deliberadamente a otra parte sin forzar el singular «ojo» en español.
theological_decisions:
- issue: Alcance moral de la última cláusula
  english_pob_reading: The line is rendered idiomatically but still literally enough to preserve the image of deliberately averting one's eye for profit.
  chosen_spanish_reading: La línea conserva la imagen de apartar la vista por ganancia, sin especificar más de lo que dice el griego.
  alternative_spanish_readings:
  - mirará hacia otro lado ante el mal
  - cerrará los ojos ante la injusticia
  - pasará por alto lo que debe ver
  rationale: El griego no nombra el objeto exacto de la mirada apartada. Mantener la imagen evita introducir una acusación más precisa que el texto fuente, pero sigue comunicando compromiso moral deliberado.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor proverbial del enunciado
  english_pob_reading: Proverbial observation about repeated human behavior.
  chosen_spanish_reading: Se entiende como una observación proverbial sobre un comportamiento humano repetido.
  alternative_spanish_readings:
  - una afirmación directa sobre casos concretos
  - una advertencia ética específica
  rationale: El contexto sapiencial exige una formulación general. Esta lectura preserva el tono gnómico sin convertir el verso en una acusación histórica puntual.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el expediente inglés; el texto español sigue la lectura de alto acuerdo y conserva las dos tensiones léxicas principales: ἀδιαφόρου como ganancia/provecho y la imagen idiomática de ἀποστρέψει ὀφθαλμόν.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene «ganancia»/«provecho» como campo semántico principal para ἀδιαφόρου, evitando «indiferencia» por no ajustarse al contexto.
  - Se conserva el valor proverbial con sujeto genérico en singular/plural natural del español.
  - La última cláusula se vierte con una locución española idiomática, sin perder la imagen de apartar la mirada.
