revisions:
- from: 'Entonces Eliacim hijo de Hilquías[a], y Sebna, y Joaj dijeron al Rabsaqué: «Por favor, habla a tus siervos en arameo, porque lo entendemos. Y no nos hables en judeo[b], en oídos del pueblo que está sobre el muro».'
  to: 'Entonces Eliacim hijo de Hilquías, y Sebna, y Joaj dijeron al Rabsaqué: «Por favor, habla a tus siervos en arameo, porque lo entendemos. Y no nos hables en judaíta[a], a oídos del pueblo que está sobre el muro».'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el término relevante del idioma; se reemplaza «judeo» por «judaíta» para reflejar mejor «Judean» en español; y se mejora «en oídos del pueblo» a «a oídos del pueblo», que conserva el énfasis auditivo del hebreo con mejor naturalidad.
