translation:
  language: es
  text: Cántenle[a]; cántenle alabanzas; hablen de todas sus obras maravillosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuenten todas sus maravillas» o «mediten en todas sus obras maravillosas». El verbo hebreo puede referirse tanto a una reflexión meditativa como a un recuento verbal; en este contexto de alabanza pública, se prefiere el sentido de hablar de ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten una canción
  - Entonen
  lexicon: HALOT
  rationale: El imperativo plural de שיר pide un verbo simple de canto. En español, «Canten» conserva la naturalidad y el tono exhortativo del hebreo sin añadir contenido.
- source_word: ל֭וֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: El ל con sufijo pronominal marca el destinatario del canto. «A él» es la correspondencia más directa y natural en español en este paralelismo.
- source_word: זַמְּרוּ
  english_pob_choice: sing praises
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - entonen salmos
  - hagan música en alabanza
  lexicon: HALOT
  rationale: זמר en contexto de adoración expresa cantar en alabanza. «Canten alabanzas» conserva el valor de alabanza y evita sobreespecificar la forma musical.
- source_word: שִׂיחוּ
  english_pob_choice: speak of
  chosen_spanish: hablen de
  alternatives_spanish:
  - cuenten
  - mediten en
  lexicon: HALOT
  rationale: Aquí el verbo funciona de modo comunicativo en una secuencia de imperativos públicos de alabanza. «Hablen de» preserva mejor el sentido de relatar o mencionar que «mediten en».
- source_word: בְּכָל
  english_pob_choice: of all
  chosen_spanish: de todas
  alternatives_spanish:
  - sobre todas
  - acerca de todas
  lexicon: HALOT
  rationale: La preposición hebrea, con un verbo de hablar, se vuelve naturalmente «de». El plural femenino concuerda con «obras» y mantiene la idea de totalidad.
- source_word: נִפְלְאוֹתָיו
  english_pob_choice: his wondrous works
  chosen_spanish: sus obras maravillosas
  alternatives_spanish:
  - sus maravillas
  - sus obras portentosas
  lexicon: HALOT
  rationale: El término deriva de פלא y alude a hechos que inspiran asombro, normalmente actos divinos concretos. «Obras maravillosas» conserva el matiz de maravilla y la referencia a acciones realizadas.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «sing praise» a «sing praises» para naturalidad idiomática, y conservó «speak of» frente a «meditate on» por el contexto de alabanza pública. La redacción española refleja esa decisión con un imperativo plural idiomático («canten alabanzas») y con «hablen de», sin ocultar la ambigüedad lexical del verbo שִׂיחוּ.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres imperativos coordinados.
  - «A él» se usa de forma consistente para ל con sufijo pronominal en este versículo.
  - «Obras maravillosas» evita tanto la abstracción excesiva como una traducción demasiado interpretativa.
  - La nota a pie de página preserva la tensión entre «hablar de» y «meditar en» sin privilegiar una paráfrasis amplia.
