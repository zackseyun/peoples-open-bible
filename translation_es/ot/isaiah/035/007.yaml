base_translation:
  language: en
  yaml_path: translation/ot/isaiah/035/007.yaml
  text: The burning sand will become a pool[a], and the thirsty ground springs of water; in the haunt of jackals, where they lie down, there will be grass, reeds[c][b], and rushes.
  footnotes:
  - marker: a
    text: Or 'the mirage will become a pool.' The Hebrew שָׁרָב can denote parching heat or the shimmering, heat-struck desert appearance.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the pasture/dwelling place of jackals, its resting place.' The Hebrew syntax in the final clause is compressed and allows slightly different ways of relating 'jackals,' 'resting place,' and the new vegetation.
    reason: lexical_alternative
  - marker: c
    text: '''Rushes'' may also be rendered ''papyrus'' for the Hebrew גֹמֶא.'
    reason: lexical_alternative
