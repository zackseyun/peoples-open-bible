review_pass:
  verdict: revise
  source_alignment_summary: La base del sentido está cerca, pero el borrador no preserva con precisión varios rasgos del hebreo ni del rastro POB en inglés. אוֹתָם es plural y retoma varios panes/elementos, por lo que «lo» distorsiona el número y la referencia; debe ser «los». Asimismo, וְהִקְרַבְתָּ no se refleja bien con «llevarás», que suena demasiado genérico y pierde el matiz cultual de «acercar/presentar». La coordinación final está bien entendida como acompañamiento de objetos adicionales, pero הַפָּר se alinea mejor con «el toro» o «el novillo» que con «el becerro», dado que el inglés auditado eligió deliberadamente «the bull».
  spanish_quality_summary: 'El español es legible, pero «Lo pondrás… y lo llevarás…» suena poco natural y además ambiguo por el singular neutro. «Acercarás» o «presentarás» mejora la claridad ritual. «Canasta» es aceptable en registro general; «cesta» también serviría, pero no es necesario cambiarla. La frase resultante puede fluir bien como: «Los pondrás en una sola canasta, y los acercarás en la canasta, junto con el toro y los dos carneros».'
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos aquí, pero sí hay desalineación con la decisión léxica auditada: plural «them» debe conservarse en español, y הקריב debe mantener lenguaje de acercamiento ritual. Además, el inglés POB prefirió «bull», por lo que «becerro» se aparta innecesariamente de la evidencia documentada.'
  issues:
  - severity: high
    issue: Pronombre singular «lo» en lugar de plural
    rationale: El hebreo אוֹתָם es claramente plural masculino y retoma varios elementos del versículo anterior. «Lo» cambia número y vuelve imprecisa la referencia; «los» es lo fiel y natural.
  - severity: medium
    issue: «Llevarás» debilita el verbo cultual הקריב
    rationale: Aunque intenta evitar sobreinterpretar «ofrecer», «llevarás» pierde el matiz técnico de acercar/presentar ante Yahvé. «Acercarás» conserva mejor el lenguaje sacrificial de la fuente y del POB inglés.
  - severity: medium
    issue: «Becerro» no refleja bien la decisión auditada para פַּר
    rationale: El expediente inglés escogió «the bull» y descartó un término juvenil. «Becerro» sugiere animal más joven; «toro» o «novillo» se ajustan mejor. En este contexto, «toro» es más directo y cercano al audit trail.
  - severity: low
    issue: Nota al pie [a] mezcla español e inglés con «upon»
    rationale: La nota debe mantenerse enteramente en español y con formulación más natural, por ejemplo «sobre/encima de» o simplemente explicar que la preposición literal es «sobre».
  revised_spanish_text: Los pondrás en una sola canasta[a], y los acercarás en la canasta[b], junto con el toro y los dos carneros.
  revised_footnotes:
  - marker: a
    text: O «en una canasta». La preposición hebrea es literalmente «sobre», pero en este contexto de recipiente el sentido es que los elementos se ponen dentro de una sola canasta.
    reason: lexical_alternative
  - marker: b
    text: O «los presentarás» o «los ofrecerás». El verbo hebreo es el término sacrificial estándar de «acercar».
    reason: lexical_alternative
  revision_rationale: Se corrige el pronombre al plural para reflejar אוֹתָם, se reemplaza «llevarás» por «acercarás» para conservar el matiz cultual de הקריב, se ajusta פַּר a «toro» conforme a la decisión auditada «bull», y se limpian las notas para que su español sea natural y preciso.
