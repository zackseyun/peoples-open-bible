  yaml_path: translation/ot/daniel/004/009.yaml
  text: Its foliage was beautiful and its fruit abundant[a], and in it was food for all. Under it the beasts of the field found shade, and in its branches the birds of the heavens dwelt, and from it all flesh was fed.
