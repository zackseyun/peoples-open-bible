  text: וְ/עַתָּ֡ה קְחֽוּ לָ/כֶ֣ם שִׁבְעָֽה פָרִים֩ וְ/שִׁבְעָ֨ה אֵילִ֜ים וּ/לְכ֣וּ אֶל עַבְדִּ֣/י אִיּ֗וֹב וְ/הַעֲלִיתֶ֤ם עוֹלָה֙ בַּֽעַדְ/כֶ֔ם וְ/אִיּ֣וֹב עַבְדִּ֔/י יִתְפַּלֵּ֖ל עֲלֵי/כֶ֑ם כִּ֧י אִם פָּנָ֣י/ו אֶשָּׂ֗א לְ/בִלְתִּ֞י עֲשׂ֤וֹת עִמָּ/כֶם֙ נְבָלָ֔ה כִּ֠י לֹ֣א דִבַּרְתֶּ֥ם אֵלַ֛/י נְכוֹנָ֖ה כְּ/עַבְדִּ֥/י אִיּֽוֹב־־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/042/008.yaml
  text: Now take for yourselves seven bulls and seven rams[a], and go to my servant Job, and offer up a burnt offering for yourselves. And my servant Job will pray for you, for I will accept him, so that I may not deal with you disgracefully. For you have not spoken rightly about me[c][b], as my servant Job has.
  footnotes:
  - marker: a
    text: Literally, 'for only his face I will lift up,' a Hebrew idiom meaning 'I will accept him' or 'show favor to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may not do with you a disgraceful thing.' The Hebrew noun can denote folly or outrageous disgrace.
    reason: lexical_alternative
  - marker: c
    text: Or 'you have not spoken rightly to me.' The Hebrew may be understood as 'to me' or, by sense in context, 'about me.'
    reason: alternative_reading
