translation:
  language: es
  text: Después de todo esto, después que Josías había preparado la casa[a], Neco, rey de Egipto, subió para luchar en Carquemis, junto al Éufrates; y Josías salió a su encuentro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa», refiriéndose al templo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «salió contra él»; el contexto militar permite un matiz de confrontación.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵכִין
  english_pob_choice: had prepared
  chosen_spanish: había preparado
  alternatives_spanish:
  - había dispuesto
  - había dejado en orden
  - había reparado
  lexicon: HALOT
  rationale: La forma causativa de כון aquí apunta a preparar, disponer o dejar listo. En español, «había preparado» conserva la correspondencia léxica y funciona de manera natural sin forzar un matiz constructivo que el texto no exige.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene «la casa» para respetar la expresión hebrea literal, como hace la POB en inglés. Aunque el referente es el templo, la traducción conserva esa formulación y deja al contexto la identificación.
- source_word: עָלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - marchó
  - ascendió
  lexicon: HALOT
  rationale: עלה suele expresar simplemente «subir / ir arriba». «Subió» preserva el giro idiomático hebreo y es idiomático en español, sin añadir especificidad militar que el verbo no lleva por sí mismo.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para luchar
  alternatives_spanish:
  - para pelear
  - para hacer guerra
  - para combatir
  lexicon: HALOT
  rationale: El infinitivo expresa entrar en combate. «Para luchar» es claro y directo en español moderno, y mantiene la fuerza bélica sin volver la frase más técnica de lo necesario.
- source_word: בְּכַרְכְּמִישׁ
  english_pob_choice: at Carchemish
  chosen_spanish: en Carquemis
  alternatives_spanish:
  - contra Carquemis
  - a Carquemis
  lexicon: HALOT
  rationale: La preposición puede ser locativa; el contexto de campaña militar favorece «en Carquemis». Se usa la grafía española «Carquemis» para el topónimo.
- source_word: עַל פְּרָת
  english_pob_choice: on the Euphrates
  chosen_spanish: junto al Éufrates
  alternatives_spanish:
  - sobre el Éufrates
  - en el Éufrates
  lexicon: HALOT
  rationale: La expresión señala la localización respecto del río. En español, «junto al Éufrates» comunica con naturalidad el valor locativo sin sugerir que el combate ocurrió literalmente sobre el agua.
- source_word: וַיֵּצֵא לִקְרָאתוֹ
  english_pob_choice: went out to meet him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - salió contra él
  - salió para encontrarlo
  - fue a su encuentro
  lexicon: HALOT
  rationale: לקראת puede significar encontrarse o salir al encuentro; en un contexto militar también puede insinuar confrontación. «Salió a su encuentro» conserva la ambigüedad observable y evita intensificarla más de lo que el verso dice.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que prefirió «had prepared the house» sobre «had set the house in order» para acercarse más a הֵכִין sin perder naturalidad. La versión española sigue esa línea con «había preparado la casa».
  spanish_consistency_notes:
  - Se conserva «la casa» para mantener la correspondencia con la decisión auditada del inglés POB, aunque el referente contextual sea el templo.
  - Se evita sustituir «Yahvé» porque este versículo no contiene el nombre divino.
  - 'Los topónimos se adaptan a formas españolas comunes: «Carquemis» y «Éufrates».'
  - Se mantiene una sintaxis sobria y pública, apta para lectura litúrgica o de estudio.
