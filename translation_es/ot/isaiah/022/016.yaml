translation:
  language: es
  text: ¿Qué tienes aquí[a], y a quién tienes aquí, que te has labrado aquí una tumba, labrando su tumba en la altura, tallando para sí una morada en la roca?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con mayor fluidez: «labrando tu tumba en la altura, tallando para ti una morada en la roca». El hebreo cambia de segunda a tercera persona en estas cláusulas.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לְּךָ פֹה
  english_pob_choice: What do you have here
  chosen_spanish: ¿Qué tienes aquí?
  alternatives_spanish:
  - ¿Qué tienes tú aquí?
  - ¿Qué derecho tienes aquí?
  lexicon: HALOT
  rationale: La expresión hebrea plantea una pregunta de desafío sobre la presencia o la pretensión de alguien en un lugar. «¿Qué tienes aquí?» conserva la tersura y el tono confrontativo sin añadir una interpretación más fuerte que el texto.
- source_word: וּמִי לְךָ פֹה
  english_pob_choice: and whom do you have here
  chosen_spanish: y a quién tienes aquí
  alternatives_spanish:
  - y quién tienes aquí
  - y quién pertenece a ti aquí
  lexicon: HALOT
  rationale: La segunda pregunta mantiene el paralelismo con la primera y el sentido personal/relacional del hebreo. «A quién» evita una lectura demasiado abstracta y suena natural en español.
- source_word: חָצַבְתָּ לְּךָ פֹּה קָבֶר
  english_pob_choice: you have cut out a tomb for yourself here
  chosen_spanish: te has tallado aquí una tumba
  alternatives_spanish:
  - te has excavado aquí una tumba
  - te has labrado aquí una tumba
  lexicon: HALOT
  rationale: חצב evoca cortar o tallar piedra. «Tallado» reproduce bien la imagen de una tumba excavada en roca y es idiomático en español, más directo que «hewn» o «cortar out».
- source_word: חֹצְבִי מָרוֹם קִבְרוֹ
  english_pob_choice: cutting out his tomb on the height
  chosen_spanish: tallando su tumba en la altura
  alternatives_spanish:
  - tallando la tumba de él en lo alto
  - tallando su tumba en un lugar alto
  lexicon: HALOT
  rationale: 'Se conserva el cambio de persona del hebreo: pasa de «te has...» a «su tumba». «En la altura» mantiene el sustantivo concreto מָרוֹם y no lo suaviza a una mera idea de altura general.'
- source_word: חֹקְקִי בַסֶּלַע מִשְׁכָּן לוֹ
  english_pob_choice: carving a dwelling for himself in the rock
  chosen_spanish: excavando para sí un morada en la roca
  alternatives_spanish:
  - tallando para sí una morada en la roca
  - grabando para sí una morada en la roca
  lexicon: HALOT
  rationale: חֹקְקִי se rinde con «excavando»/«tallando» porque el contexto es una tumba labrada en piedra. «Morada» preserva el valor de מִשְׁכָּן como «lugar de habitación» y el tono irónico de un “hogar” funerario. Se omite el artículo para reflejar mejor el uso nominal indefinido.
theological_decisions:
- issue: Cambio de segunda a tercera persona en los participios
  english_pob_reading: Retain the Hebrew shift to third person ('his tomb ... for himself') rather than harmonizing all pronouns to second person.
  chosen_spanish_reading: 'Mantener el cambio hebreo: «te has tallado...», pero luego «su tumba... para sí» en la cláusula participial.'
  alternative_spanish_readings:
  - «te has tallado... tallando tu tumba... para ti»
  - armonizar todo a tercera persona
  rationale: El texto masorético alterna entre segunda y tercera persona, y el español debe permitir percibir esa oscilación en vez de nivelarla por claridad. Aunque la primera cláusula usa segunda persona, la continuación conserva el giro a tercera persona en la descripción, siguiendo la evidencia textual.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión del POB inglés: se conserva la serie de preguntas retóricas, la imagen de la tumba tallada en piedra y el cambio pronominal observado en el hebreo. Se prefirió un español más natural que «cortar fuera»/«hewing out» sin perder la fuerza de חצב/חקק. También se reflejó la solución revisada del POB de mantener la repetición verbal en la cláusula participial.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «tumba» y «morada» para distinguir קָבֶר de מִשְׁכָּן, preservando la ironía del pasaje.
  - Se evitó «Señor» o un lenguaje eclesiástico que no corresponde al hebreo de este verso.
  - La puntuación con comas permite oír el ritmo de reproche y el paralelismo del hebreo.
