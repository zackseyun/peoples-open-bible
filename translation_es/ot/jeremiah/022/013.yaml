translation:
  language: es
  text: ¡Ay del que edifica su casa[a] sin rectitud, y sus aposentos altos[b] sin justicia; hace trabajar a su prójimo de balde, y no le da su salario[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin justicia». El hebreo צֶדֶק y מִשְׁפָּט son términos cercanos y pueden superponerse en sentido.
    reason: lexical_alternative
  - marker: b
    text: «Aposentos altos» también puede entenderse como «cuartos altos» o «cámaras altas», es decir, la parte superior de una casa grande.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «su trabajo»; en contexto, se refiere al pago debido al trabajador, es decir, su salario.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay
  alternatives_spanish:
  - ¡Ay de
  - ¡Ay del
  lexicon: HALOT
  rationale: En contexto profético de denuncia, «¡Ay!» reproduce bien el clamor de juicio y mantiene brevedad e impacto. Se usa con artículo en la frase completa para sonar natural en español, sin suavizar la advertencia.
- source_word: בֹּנֶה
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - levanta
  lexicon: HALOT
  rationale: El participio describe una acción característica. «Edifica» es natural en español bíblico y preserva la idea de obra intencional y continua, con un tono algo más digno que «construye».
- source_word: בֵיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su palacio
  - su hogar
  lexicon: HALOT
  rationale: «Casa» mantiene la correspondencia básica con בית. Aunque el contexto sugiere una gran residencia real, no se explicita «palacio» para no sobretraducir; la implicación puede quedar al lector.
- source_word: בְּלֹא צֶדֶק
  english_pob_choice: without righteousness
  chosen_spanish: sin justicia
  alternatives_spanish:
  - sin rectitud
  - injustamente
  lexicon: HALOT
  rationale: Para esta cláusula, «sin justicia» conserva bien el sentido ético/jurídico de צֶדֶק y permite mantener el paralelismo con מִשְׁפָּט en la segunda cola. Se evita fusionar ambos términos en una sola idea.
- source_word: וַעֲלִיּוֹתָיו
  english_pob_choice: and his upper rooms
  chosen_spanish: y sus aposentos altos
  alternatives_spanish:
  - y sus cuartos altos
  - y sus cámaras altas
  - y sus pisos altos
  lexicon: HALOT
  rationale: «Aposentos altos» transmite el sentido arquitectónico de habitaciones superiores de una casa grande, sin el calco pesado de «cuartos altos». Mantiene el matiz de estructura elevada y distinguida.
- source_word: בְּלֹא מִשְׁפָּט
  english_pob_choice: without justice
  chosen_spanish: sin derecho
  alternatives_spanish:
  - sin justicia
  - sin juicio
  - injustamente
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט puede expresar derecho debido o justicia legal. «Sin derecho» preserva el matiz de lo que corresponde legítimamente y distingue esta cola de צֶדֶק sin repetir el mismo término.
- source_word: בְּרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su semejante
  lexicon: HALOT
  rationale: El hebreo apunta a una relación social cercana. «Prójimo» comunica bien la relación humana y encaja en español bíblico sin quedar demasiado coloquial.
- source_word: יַעֲבֹד
  english_pob_choice: makes ... work
  chosen_spanish: hace trabajar
  alternatives_spanish:
  - obliga a trabajar
  - pone a trabajar
  - hace laborar
  lexicon: HALOT
  rationale: 'Aunque el verbo base es «servir/trabajar», la construcción exige un valor causativo: él hace que su prójimo trabaje. «Hace trabajar» es claro y evita ambigüedad.'
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: gratis
  alternatives_spanish:
  - sin paga
  - de balde
  - por nada
  lexicon: HALOT
  rationale: «Gratis» comunica de manera breve y natural la idea de sin compensación. En español actual puede sonar coloquial, pero aquí funciona como equivalente directo y claro de gratuidad económica.
- source_word: וּפֹעֲלוֹ
  english_pob_choice: his wages
  chosen_spanish: su salario
  alternatives_spanish:
  - su paga
  - su remuneración
  - su trabajo
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «trabajo», el contexto exige el pago debido al trabajador. «Salario» expresa bien esa obligación de compensación y conserva la fuerza social del reproche.
- source_word: לֹא יִתֶּן לוֹ
  english_pob_choice: does not give him
  chosen_spanish: no le da
  alternatives_spanish:
  - no se lo da
  - no le entrega
  - no le paga
  lexicon: HALOT
  rationale: Se mantiene la simple negación verbal del hebreo. Como el objeto ya está definido como «su salario», «no le da» comunica naturalmente la falta de pago sin añadir más que el texto requiere.
theological_decisions:
- issue: Cómo distinguir צֶדֶק y מִשְׁפָּט en una denuncia social
  english_pob_reading: without righteousness ... without justice
  chosen_spanish_reading: sin justicia ... sin derecho
  alternative_spanish_readings:
  - sin rectitud ... sin justicia
  - sin justicia ... sin justicia
  - injustamente ... injustamente
  rationale: La decisión en español busca reflejar dos términos emparentados pero no idénticos. «Sin justicia» y «sin derecho» preservan la pareja semántica y la textura profética del reproche, evitando a la vez una repetición plana que borre la distinción del hebreo.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y preservación de tensiones léxicas)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, conservando la denuncia profética, la pareja léxica צֶדֶק/מִשְׁפָּט y el sentido económico de חִנָּם / פֹעֲלוֹ sin introducir explicaciones no sustentadas. No se aplicaron revisiones previas en el paquete fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «prójimo» para בְּרֵעֵהוּ por su tono bíblico y social.
  - «Salario» explicita el valor contextual de פֹעֲלוֹ como paga debida, en línea con el audit trail inglés.
  - La puntuación conserva el paralelismo y la cadencia del oráculo profético en una sola oración española.
