translation:
  language: es
  text: 'Él hizo el pectoral[a], obra de un hábil diseñador, como la obra del efod: de oro, azul, púrpura, hilo escarlata y lino fino torcido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «pectoral». Se usa aquí para el objeto sacerdotal y para evitar la impresión de una pieza de armadura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y él hizo
  - Luego hizo
  lexicon: HALOT
  rationale: La forma verbal narra una acción sucesiva en pasado simple. En español, «hizo» transmite bien la secuencia sin añadir una conjunción innecesaria.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - la pieza del pecho
  - la placa del pecho
  lexicon: HALOT
  rationale: El término designa una pieza sacerdotal colocada sobre el pecho. «Pectoral» es la forma tradicional y comprensible en español para este objeto cultual, sin sugerir armadura metálica como podría ocurrir con «coraza» o «placa».
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de hábil artífice
  alternatives_spanish:
  - obra de diseñador experto
  - obra de un tejedor artístico
  - obra de artesano experto
  lexicon: HALOT
  rationale: La frase enfatiza trabajo hábil y patrón artístico, no solo fabricación genérica. «Hábil artífice» conserva la idea de pericia artesanal y de diseño, con un registro natural en español bíblico.
- source_word: כְּמַעֲשֵׂה אֵפֹד
  english_pob_choice: like the work of the ephod
  chosen_spanish: como la obra del efod
  alternatives_spanish:
  - como el trabajo del efod
  - según la hechura del efod
  lexicon: HALOT
  rationale: La comparación enlaza el pectoral con el mismo tipo de factura del efod. Se conserva el término técnico «efod» y se mantiene la relación formal con «obra» para reflejar el paralelismo del hebreo.
- source_word: אֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el efod sacerdotal
  lexicon: HALOT
  rationale: Es un término técnico cultual sin equivalente exacto en español. Se translitera para preservar la especificidad del objeto ritual.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: Material directo de la lista. En español, «oro» funciona naturalmente dentro de una enumeración de materiales textiles y ornamentales.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul púrpura
  lexicon: HALOT
  rationale: El término designa el material teñido de azul usado en el tabernáculo. «Azul» preserva el valor cromático principal en un español claro y sobrio.
- source_word: וְאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - violeta
  lexicon: HALOT
  rationale: Se trata del material teñido de púrpura. «Púrpura» es el equivalente más estable en registros bíblicos y cultuales.
- source_word: וְתוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - lana carmesí
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a material teñido de rojo intenso, no a un color abstracto aislado. En esta línea se opta por «carmesí» para conservar la serie de materiales sin añadir «hilo» donde el español puede sonar forzado; el matiz textil queda implícito por el contexto de la lista.
- source_word: וְשֵׁשׁ מָשְׁזָר
  english_pob_choice: and finely twisted linen
  chosen_spanish: y lino torcido fino
  alternatives_spanish:
  - y lino finamente torcido
  - y lino torcido y fino
  - y lino de hilo torcido
  lexicon: HALOT
  rationale: «שֵׁשׁ» es lino fino y «מָשְׁזָר» indica hilo torcido o retorcido. La forma elegida mantiene ambos elementos de modo natural en español, sin perder el detalle textil.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético y coincide sustancialmente con la decisión inglesa auditada de distinguir el objeto sacerdotal del «breastplate» militar; además, conserva la secuencia de materiales y el paralelismo con el efod sin introducir términos no sustentados por la fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el hebreo lo exige; este versículo no contiene el Tetragrámaton.
  - Se conserva «efod» como transliteración técnica para consistencia con otros pasajes cultuales.
  - Se evita «lino fino» sin «torcido» para no perder el matiz de fabricación del hebreo.
