translation:
  language: es
  text: Los cielos declaran la gloria de Dios, y la bóveda celeste[a] proclama la obra de sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el firmamento». El hebreo רָקִיעַ se refiere al cielo extendido o bóveda celeste.
    reason: lexical_alternative
  - marker: b
    text: O «su hechura». El hebreo dice literalmente «la obra de sus manos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos arriba
  lexicon: HALOT
  rationale: שָׁמַיִם puede referirse al cielo visible o a los cielos en sentido cósmico. 'Los cielos' conserva el registro poético y la amplitud del plural hebreo mejor que 'el cielo'.
- source_word: מְסַפְּרִים
  english_pob_choice: declare
  chosen_spanish: declaran
  alternatives_spanish:
  - cuentan
  - proclaman
  - relatan
  lexicon: HALOT
  rationale: El participio comunica la acción de hacer saber o anunciar. 'Declaran' mantiene la personificación poética y corresponde bien a 'declare' en inglés.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: '''Gloria'' es el equivalente normal y más fiel para כָּבוֹד en este contexto, preservando el peso y resplandor asociados a Dios.'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino general, no como nombre propio a transliterar. 'Dios' comunica naturalmente el sentido en español.
- source_word: וּמַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - su obra
  - su hechura
  lexicon: HALOT
  rationale: La expresión hebrea es concreta y antropomórfica. 'La obra de sus manos' conserva esa imagen de manera directa y transparente.
- source_word: מַגִּיד
  english_pob_choice: proclaims
  chosen_spanish: proclama
  alternatives_spanish:
  - declara
  - anuncia
  - da a conocer
  lexicon: HALOT
  rationale: El verbo hifil de נגד significa hacer saber, anunciar o proclamar. 'Proclama' mantiene el paralelismo poético con 'declaran' sin perder fuerza.
- source_word: הָרָקִיעַ
  english_pob_choice: the expanse
  chosen_spanish: la expansión
  alternatives_spanish:
  - el firmamento
  - la bóveda
  - el cielo
  lexicon: HALOT
  rationale: רָקִיעַ se refiere a la extensión desplegada del cielo. 'La expansión' preserva el valor espacial y evita depender de 'firmamento', más tradicional pero menos transparente.
theological_decisions:
- issue: Traducción de אֵל como título divino
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - El
  rationale: La lectura del POB en inglés trata אֵל como título, no como nombre propio. 'Dios' mantiene esa decisión y evita introducir una transliteración innecesaria.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
- issue: Sentido de הָרָקִיעַ
  english_pob_reading: the expanse
  chosen_spanish_reading: la expansión
  alternative_spanish_readings:
  - el firmamento
  - la bóveda celeste
  rationale: La elección busca conservar la imagen del espacio extendido del cielo sin cargar el texto con un término arcaico. No introduce una interpretación doctrinal distinta.
  doctrine_reference: Lexical transparency in poetic cosmological language
translation_notes:
  revision_awareness: Se revisó la correspondencia de las notas para que cada marcador aparezca exactamente en el texto principal. La redacción sigue de cerca el hebreo y la solución inglesa del POB, manteniendo el paralelismo poético y la transparencia léxica.
  spanish_consistency_notes:
  - Se usó «Dios» para אֵל conforme al audit trail inglés.
  - Se tradujo רָקִיעַ como «la expansión» para conservar la imagen de un cielo extendido.
  - Se mantuvo el paralelismo verbal con «declaran / proclama» para reflejar el hebreo poético.
  - Se evitó «SEÑOR» porque aquí el término es אֵל, no el tetragrámaton.
