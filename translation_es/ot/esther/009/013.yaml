revisions:
- from: 'Ester dijo[a]: «Si agrada al rey, que también mañana se conceda a los judíos que están en Susa hacer según el decreto de hoy, y que sean colgados en el madero los diez hijos de Amán».'
  to: 'Ester dijo[a]: «Si agrada al rey, que se conceda también mañana a los judíos que están en Susa actuar conforme al decreto de hoy, y que los diez hijos de Amán sean colgados en el madero».'
  rationale: Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni del rastro de auditoría inglés. «Actuar conforme al decreto de hoy» comunica mejor לַעֲשׂוֹת כְּדָת הַיּוֹם que «hacer según...», y «que se conceda también mañana» conserva con más claridad la extensión temporal de la autorización. Se mantuvo «madero» con la misma nota léxica, ya que preserva la tensión entre el literal hebreo y el contexto de ejecución.
