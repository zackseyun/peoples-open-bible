revisions:
- from: 'Entonces les conté que la mano de mi Dios había sido buena sobre mí[a], y también las palabras del rey que me había dicho. Y ellos dijeron[b][c]: «Levantémonos y edifiquemos». Así fortalecieron sus manos para la buena obra.'
  to: 'Entonces les conté que la mano de mi Dios había sido buena sobre mí[a], y también las palabras que el rey me había dicho. Y ellos dijeron[c][b]: «Levantémonos y edifiquemos». Así fortalecieron sus manos para la buena obra.'
  rationale: Se corrige una construcción española defectuosa para reflejar fielmente «las palabras del rey que me había dicho». También se repara la nota alternativa de la exhortación para que sea realmente alternativa y no repetición del texto principal. Se mantiene el hebraísmo «buena sobre mí» y el modismo «fortalecieron sus manos» por fidelidad al original y a la filosofía POB.
