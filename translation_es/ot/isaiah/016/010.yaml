base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/010.yaml
  text: Joy and gladness are taken away from the fruitful field[a], and in the vineyards no one sings for joy, no one shouts; no treader treads out wine in the presses[b]; I have put an end to the vintage shout.
  footnotes:
