    text: Or 'I place my daughter in your trust'; the Greek says literally, 'I entrust my daughter to you as a deposit.'
    reason: lexical_alternative
  - marker: b
    text: '''Restore you'' may also carry the sense ''bring you back safely'' in this travel context.'
    reason: lexical_alternative
