lexical_decisions:
- source_word: וְ/אַחְיוֹ
  english_pob_choice: And Ahio
  chosen_spanish: Y Ahío
  alternatives_spanish:
  - Ahío
  lexicon: HALOT
  rationale: El prefijo וְ se conserva con la conjunción española 'Y' para mantener la lista genealógica. אַחְיוֹ es un nombre propio y se translitera; 'Ahío' conserva la forma breve y natural en español.
- source_word: שָׁשָׁ֖ק
  english_pob_choice: Shashak
  chosen_spanish: Sasac
  alternatives_spanish:
  - Shashak
  lexicon: HALOT
  rationale: Es un nombre propio en una serie genealógica. En español, 'Sasac' sigue una transliteración más natural para la ortografía y pronunciación hispana, sin añadir significado no presente en el hebreo.
- source_word: וִ/ירֵמֽוֹת
  english_pob_choice: and Jeremoth
  chosen_spanish: y Yaremot
  alternatives_spanish:
  - y Jeremot
  - y Jerimot
  lexicon: HALOT
  rationale: El nombre יְרֵמוֹת se translitera con mayor cercanía fonética como 'Yaremot' en español. Se evita 'Cristianizar' o traducir el nombre; solo se adapta la grafía a la fonética hispana de manera auditable.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto sigue estable y el criterio español mantiene el mismo contenido genealógico, con adaptación ortográfica hispana para los nombres propios sin alterar el alcance del original.
  spanish_consistency_notes:
  - Se usó 'Y' inicial para reflejar la conjunción hebrea וְ en una lista genealógica.
  - Los nombres propios se transliteran de forma coherente al español, procurando legibilidad sin perder la referencia al hebreo.
  - Se preservó la alternativa textual del nombre final mediante nota, siguiendo el audit trail inglés.
