revisions:
- from: Sol y luna se detuvieron en su alto lugar[a]; a la luz de tus flechas, iban[b], al brillo del resplandor de tu lanza.
  to: Sol y luna se detuvieron en su alto lugar[a]; a la luz de tus flechas, iban[b], al brillo del destello[c] de tu lanza.
  rationale: Se conserva la estructura y la ambigüedad del borrador, pero se corrige la frase final para evitar redundancia y para representar mejor בְּרַק como 'destello', además de restaurar en nota la alternativa léxica 'relámpago' documentada en el expediente inglés.
