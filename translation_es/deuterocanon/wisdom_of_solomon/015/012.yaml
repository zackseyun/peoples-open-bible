revisions:
- from: Pero consideró que nuestra vida era un juego[a], y nuestro sustento una feria lucrativa; pues, dice, es necesario obtener ganancia de donde uno pueda[b], aun del mal.
  to: Pero consideró que nuestra vida era un juego[a], y nuestro sustento una feria lucrativa; pues, dice, es necesario ganar de donde uno pueda[b], incluso del mal.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido: «ganar» expresa mejor πορίζειν en esta construcción que «obtener ganancia». También se suavizó «aun» a «incluso» por fluidez contemporánea. En la nota [a], «celebración lucrativa» refleja mejor la alternativa inglesa documentada que repetir «feria lucrativa», ya que la nota busca preservar la variante léxica del sustantivo festivo.'
