revisions:
- from: 'Así que les advertí y les dije[a]: “¿Por qué pasan la noche opuestos al muro? Si hacen eso otra vez, echaré mano sobre ustedes.” Desde entonces no vinieron en sábado.'
  to: 'Así que les advertí y les dije[a]: «¿Por qué pasan la noche frente al muro? Si vuelven a hacerlo, les echaré mano». Desde entonces no volvieron a venir en sábado.'
  rationale: Se ajustó «opuestos al muro» a «frente al muro» para reflejar mejor נֶגֶד en español natural. Se cambió «echaré mano sobre ustedes» por «les echaré mano», que preserva la amenaza idiomática del hebreo con mejor legibilidad. También se refinó la cláusula final a «no volvieron a venir en sábado» para expresar con claridad el efecto continuado desde ese momento. Se mantuvo la nota léxica sobre el modismo de la mano, con redacción española más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:11:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: advertencia, pregunta, amenaza y resultado posterior. Sin embargo, dos giros principales no representan bien el sentido ni el español natural. נֶגֶד הַחוֹמָה se expresa mejor como «frente al muro» o «junto al muro, frente a él» que «opuestos al muro», que suena antinatural para personas. Y יָד אֶשְׁלַח בָּכֶם no queda bien en español con «echaré mano sobre ustedes»; la amenaza idiomática y natural es «les echaré mano» o, si se explicita más, «usaré la fuerza contra ustedes».'
  spanish_quality_summary: El texto es mayormente claro y de registro adecuado, pero «opuestos al muro» y «echaré mano sobre ustedes» suenan forzados y poco idiomáticos en español bíblico moderno. «No vinieron en sábado» también es menos natural que «no volvieron a venir en sábado» o «no vinieron en sábado» con artículo; dado el contexto de cese repetido, conviene explicitar la no repetición para una lectura más fluida.
  glossary_alignment: No hay conflicto con la terminología teológica del proyecto. «Sábado» es adecuado para שַׁבָּת. No aparecen términos del glosario mayor como Yahvé, Mesías o esclavo. La mejora requerida es idiomática y de precisión léxica, no doctrinal.
  issues:
  - severity: medium
    issue: «opuestos al muro» es una traducción poco natural de נֶגֶד הַחוֹמָה
    rationale: El hebreo indica posición espacial «frente a / delante de / opuesto a» la muralla. En español, aplicado a personas, «opuestos al muro» suena extraño y puede sugerir oposición ideológica más que ubicación física. «Frente al muro» preserva mejor el sentido y la legibilidad.
  - severity: high
    issue: «echaré mano sobre ustedes» no transmite bien el modismo יָד אֶשְׁלַח בָּכֶם
    rationale: La frase española propuesta es poco idiomática. El hebreo amenaza con acción directa o fuerza. «Les echaré mano» mantiene una amenaza física comprensible y natural en español; la nota puede conservar la alternativa más explícita «usaré la fuerza contra ustedes» y el literal hebreo.
  - severity: low
    issue: «no vinieron en sábado» puede sonar puntual más que habitual/resultativo
    rationale: El contexto expresa que desde entonces dejaron de presentarse en sábado. «No volvieron a venir en sábado» comunica mejor el resultado continuado sin alejarse del hebreo narrativo.
  revised_spanish_text: 'Así que les advertí y les dije[a]: «¿Por qué pasan la noche frente al muro? Si vuelven a hacerlo, les echaré mano». Desde entonces no volvieron a venir en sábado.'
  revised_footnotes:
