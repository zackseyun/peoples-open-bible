  text: יָדָי/ו֙ גְּלִילֵ֣י זָהָ֔ב מְמֻלָּאִ֖ים בַּ/תַּרְשִׁ֑ישׁ מֵעָי/ו֙ עֶ֣שֶׁת שֵׁ֔ן מְעֻלֶּ֖פֶת סַפִּירִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/005/014.yaml
  text: His hands are rods of gold[a], set with beryl; his body is polished ivory[c][b], covered with sapphires.
  footnotes:
  - marker: a
    text: Or 'set with topaz' or 'set with chrysolite'; the precise identification of the stone named by Hebrew תַּרְשִׁישׁ is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'rings of gold.' The Hebrew term refers to rounded golden forms and may evoke jewelry-like craftsmanship.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his inward parts' or 'his belly'; here the context favors a literal bodily description.
    reason: lexical_alternative
