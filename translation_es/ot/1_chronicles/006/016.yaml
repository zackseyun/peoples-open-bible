translation:
  language: es
  text: Estos son los hombres que David nombró sobre el servicio del canto en la casa de Yahvé[a][b], después de que el arca llegó a descansar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el canto» o «encargados del canto». La expresión hebrea probablemente indica responsabilidad sobre el canto litúrgico en el santuario.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «desde el reposo del arca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La expresión introduce una lista y en español natural conserva la fuerza demostrativa con «Estos son» sin forzar un calco del enlace conjuntivo.
- source_word: הֶעֱמִיד
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - nombró
  - puso
  - designó
  lexicon: HALOT
  rationale: El hiphil de עמד en este contexto administrativo implica colocar a alguien en una función u oficio. «Estableció» comunica esa designación formal con buena naturalidad; «nombró» también sería posible, pero puede sonar menos conectado con la idea de poner en un cargo.
- source_word: עַל יְדֵי שִׁיר
  english_pob_choice: over the service of song
  chosen_spanish: sobre el servicio del canto
  alternatives_spanish:
  - para el canto
  - encargados del canto
  - sobre la música del culto
  lexicon: HALOT
  rationale: La preposición y la construcción transmiten supervisión o responsabilidad respecto del canto. «Servicio del canto» conserva la combinación de función cultual y actividad musical sin añadir más de lo que el hebreo dice.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene la terminología base del proyecto para יְהוָה como «Yahvé», y se traduce בַּיִת literalmente como «casa», evitando «templo» por ser más interpretativo.
- source_word: מִמְּנוֹחַ
  english_pob_choice: after ... came to rest
  chosen_spanish: desde que ... descansó
  alternatives_spanish:
  - después de que ... descansó
  - a partir de que ... descansó
  - desde el reposo de
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa el punto temporal a partir del descanso del arca. «Desde que el arca descansó» traduce bien esa relación temporal en español.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el arca». Se mantiene esa sobriedad, sin expandirla a «del pacto», que sería explicativo aunque contextual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En el POB en español se adopta «Yahvé» como forma estándar del nombre divino, coherente con el principio de no enmascararlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Naturaleza de la frase cultual עַל יְדֵי שִׁיר
  english_pob_reading: over the service of song
  chosen_spanish_reading: sobre el servicio del canto
  alternative_spanish_readings:
  - para el canto
  - encargados del canto
  - en la música del culto
  rationale: La frase puede entenderse como una función de supervisión del canto ritual. Se conserva esa posible tensión semántica en una expresión española suficientemente literal y cultualmente clara, sin reducirla a una simple actividad musical.
  doctrine_reference: HALOT; lectura contextual del oficio levítico
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés ya había fijado una lectura de función administrativa para הֶעֱמִיד y una ambigüedad reconocida en עַל יְדֵי שִׁיר; el español mantiene ambas decisiones sin ampliar indebidamente el sentido. También se siguió la política del proyecto para el nombre divino como Yahvé, en contraste con el inglés auditado, que reflejaba una convención distinta.
  spanish_consistency_notes:
  - «Yahvé» se usa de forma consistente para יְהוָה.
  - Se prefirió «casa» sobre «templo» para בֵּית יְהוָה, por fidelidad al hebreo.
  - «Servicio del canto» conserva la ambigüedad funcional del hebreo y permite la nota alternativa.
  - «El arca» mantiene el referente sobrio del texto sin expandirlo innecesariamente.
