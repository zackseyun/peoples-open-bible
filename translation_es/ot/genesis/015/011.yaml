translation:
  language: es
  text: Y descendieron las aves de rapiña[a] sobre las carcasas, y Abram las ahuyentó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el ave de rapiña descendió sobre las carcasas». El sustantivo hebreo puede leerse como un singular colectivo; aquí, sin embargo, el sentido probable es colectivo: aves carroñeras o rapaces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - vinieron abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa movimiento hacia abajo; en español, «descendieron» mantiene la dirección del movimiento y conserva un tono digno, mientras «bajaron» sería más natural pero algo más coloquial.
- source_word: הָעַיִט
  english_pob_choice: the birds of prey
  chosen_spanish: las aves de rapiña
  alternatives_spanish:
  - el ave de rapiña
  - las aves carroñeras
  - los rapaces
  lexicon: HALOT
  rationale: עַיִט puede funcionar como colectivo. La POB inglesa opta por plural colectivo; en español «aves de rapiña» comunica bien el grupo de aves depredadoras/carroñeras sin restringirlo innecesariamente a «buitres».
- source_word: הַפְּגָרִים
  english_pob_choice: the carcasses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - las carroñas
  - los cuerpos
  - los restos
  lexicon: HALOT
  rationale: פֶּגֶר designa un cadáver o cuerpo muerto. En este contexto sacrificial, «cadáveres» es preciso y natural; «carroñas» sonaría demasiado zoológico y «restos» sería más vago.
- source_word: וַיַּשֵּׁב אֹתָם
  english_pob_choice: drove them away
  chosen_spanish: las ahuyentó
  alternatives_spanish:
  - las echó
  - las espantó
  - las hizo volver
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver o retirar. «Ahuyentó» preserva la fuerza de repeler activamente a las aves y funciona con un objeto femenino plural acorde con «aves».
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio según la convención habitual y porque en este punto del relato el patriarca aún es Abram, no Abraham.
theological_decisions:
- issue: Conjunción narrativa sin adversativa
  english_pob_reading: and ... and ... (revised from but)
  chosen_spanish_reading: y ... y ...
  alternative_spanish_readings:
  - pero ...
  - y ... pero ...
  rationale: El hebreo coordina las acciones con וַ; por eso se evita introducir una oposición que el texto no marca. La secuencia narrativa queda simplemente encadenada.
  doctrine_reference: Ninguna; decisión sintáctica basada en el hebreo narrativo.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que sustituyó «but» por «and» para reflejar mejor la conjunción hebrea. La redacción española mantiene esa coordinación simple y evita agregar contraste. También se preservó la lectura colectiva de הָעַיִט en una forma natural para el español.
  spanish_consistency_notes:
  - Se usa «Y» inicial para reproducir la apertura narrativa consecutiva del hebreo.
  - «Aves de rapiña» conserva la amplitud semántica del término hebreo sin precisar indebidamente la especie.
  - «Cadáveres» corresponde al campo semántico de פֶּגֶר en contexto sacrificial.
  - El objeto femenino plural en «las ahuyentó» concuerda con «aves».
