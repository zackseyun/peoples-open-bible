translation:
  language: es
  text: Quien corrige a un burlador recibe deshonra para sí[a], y quien reprende a un hombre malvado recibe oprobio para sí[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se lleva deshonra para sí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «su mancha»; la expresión puede implicar el reproche o abuso que el malvado devuelve al que lo reprende.
    reason: lexical_alternative
  - marker: c
    text: «Hombre malvado» refleja la forma masculina singular hebrea usada de manera genérica.
    reason: cultural_note
lexical_decisions:
- source_word: יֹסֵר
  english_pob_choice: Whoever corrects
  chosen_spanish: Quien corrige
  alternatives_spanish:
  - Quien disciplina
  - Quien instruye
  lexicon: HALOT
  rationale: En este proverbio de sabiduría, el participio expresa una acción general; en español, «Quien corrige» comunica bien la corrección verbal sin cargar innecesariamente el verbo con el matiz punitivo de «disciplinar».
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: un burlador
  alternatives_spanish:
  - un escarnecedor
  - un mofador
  lexicon: HALOT
  rationale: «לֵץ» designa a quien desprecia y ridiculiza la instrucción. «Burlador» conserva el tono de desprecio y es natural en español contemporáneo; «escarnecedor» es más tradicional pero menos inmediato.
- source_word: לֹקֵחַ לוֹ קָלוֹן
  english_pob_choice: gets dishonor for himself
  chosen_spanish: recibe deshonra para sí
  alternatives_spanish:
  - se lleva deshonra para sí
  - toma deshonra para sí
  lexicon: HALOT
  rationale: El hebreo expresa una adquisición/incurrencia sobre uno mismo. «Recibe deshonra para sí» comunica bien la idea de cargar con la deshonra sin perder el matiz reflexivo.
- source_word: קָלוֹן
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - desgracia
  lexicon: HALOT
  rationale: «קָלוֹן» alude a deshonra pública o social. «Deshonra» preserva mejor el valor objetivo que «vergüenza», que puede sonar más interior o emocional.
- source_word: וּמוֹכִיחַ
  english_pob_choice: and whoever rebukes
  chosen_spanish: y quien reprende
  alternatives_spanish:
  - y quien corrige
  - y quien reprocha
  lexicon: HALOT
  rationale: El hifil de יכח suele significar reprender o amonestar con firmeza. «Reprende» mantiene el paralelismo con «corrige» y la diferencia de tono entre ambos miembros.
- source_word: לְרָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: a un hombre malvado
  alternatives_spanish:
  - al malvado
  - a un impío
  lexicon: HALOT
  rationale: El singular masculino hebreo funciona de modo genérico. «Hombre malvado» refleja esa forma gramatical sin borrar el valor representativo del hebreo; se evita un sustantivo demasiado técnico como «impío».
- source_word: מוּמוֹ
  english_pob_choice: his blemish
  chosen_spanish: una mancha para sí
  alternatives_spanish:
  - su mancha
  - un defecto para sí
  - reproche para sí
  lexicon: HALOT
  rationale: '«מוּם» significa normalmente «defecto/defecto físico, mancha». En este proverbio la frase es breve y admite una lectura proverbial: la reprensión puede devolver reproche o una marca de oprobio al que reprende. «Una mancha para sí» conserva la ambigüedad sin afirmar de manera cerrada una sola paráfrasis.'
theological_decisions:
- issue: Alcance del sujeto masculino singular en לְרָשָׁע
  english_pob_reading: '''Wicked man'' renders a masculine singular Hebrew form used generically.'
  chosen_spanish_reading: «un hombre malvado» conserva la forma masculina singular usada genéricamente.
  alternative_spanish_readings:
  - «el malvado»
  - «la persona malvada»
  rationale: La forma hebrea es masculina singular y aquí funciona de modo representativo. En español, mantener «hombre» preserva esa señal gramatical sin pretender excluir el valor genérico del proverbio.
  doctrine_reference: Gramática hebrea; política de género representativo del proyecto
- issue: Interpretación de מוּמוֹ en el segundo hemistiquio
  english_pob_reading: '''his blemish'' may mean that the rebuker receives abuse or reproach from the wicked person.'
  chosen_spanish_reading: «una mancha para sí» deja abierta la posibilidad de oprobio o reproche recibido al reprender al malvado.
  alternative_spanish_readings:
  - «su mancha»
  - «reproche para sí»
  - «una marca de oprobio para sí»
  rationale: El hebreo es compacto y algo ambiguo; el audit trail inglés conserva esa tensión. «Una mancha para sí» evita cerrar el sentido a una sola explicación, pero sigue siendo idiomática en español y compatible con el valor de deshonra/reproche.
  doctrine_reference: Sabiduría proverbial; ambigüedad lexical de מוּם
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que añadió «for himself» en el segundo hemistiquio y corrigió la lectura de «his blemish». Por eso el español evita «su mancha» como si perteneciera al malvado y expresa la relación reflexiva con «para sí», manteniendo la ambigüedad proverbial del hebreo.
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal entre «corrige» y «reprende».
  - «Deshonra» se usa de forma consistente para קָלוֹן.
  - La solución «una mancha para sí» evita atribuir la mancha al malvado como posesión, en línea con la revisión inglesa.
  - No se introduce terminología eclesiástica ajena al proverbio.
