translation:
  language: es
  text: Ya sea rico o pobre[a], un buen corazón tiene un rostro alegre en todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''el corazón del rico y del pobre es bueno; el rostro es alegre en todo tiempo''. El griego es comprimido y no expresa explícitamente un verbo; el español lo añade para aclarar la relación entre la disposición interior y la expresión exterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλουσίου δὲ καὶ πτωχοῦ
  english_pob_choice: Whether rich or poor
  chosen_spanish: Tanto el rico como el pobre
  alternatives_spanish:
  - Sea rico o pobre
  - Ya sea rico o pobre
  lexicon: LSJ
  rationale: La construcción griega presenta un contraste compacto entre rico y pobre; en español, 'Tanto... como...' conserva bien la antítesis sin añadir una adversativa fuerte que el texto revisado de POB evitó para δέ.
- source_word: καρδία ἀγαθή
  english_pob_choice: a good heart
  chosen_spanish: un corazón bueno
  alternatives_spanish:
  - un buen corazón
  - un corazón recto
  lexicon: LSJ
  rationale: '''Corazón bueno'' mantiene la imagen concreta del griego y la evaluación moral del adjetivo ἀγαθή. ''Un buen corazón'' sería más natural, pero puede sonar menos transparente respecto al orden original.'
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - a toda hora
  - en todo momento
  lexicon: LSJ
  rationale: La expresión temporal general se vierte de manera idiomática en español con 'en todo tiempo', que conserva el sentido continuo y no restringido de la frase griega.
- source_word: πρόσωπον ἱλαρόν
  english_pob_choice: a cheerful face
  chosen_spanish: un rostro alegre
  alternatives_spanish:
  - un semblante alegre
  - un rostro jovial
  lexicon: LSJ
  rationale: '''Rostro'' reproduce πρόσωπον de forma directa, y ''alegre'' comunica ἱλαρόν de manera natural en español. Se evita ''semblante'' por ser más literario sin aportar mayor claridad aquí.'
- source_word: δὲ
  english_pob_choice: But / omitted in revision
  chosen_spanish: Tanto... como...
  alternatives_spanish:
  - pero
  - y
  lexicon: LSJ
  rationale: La revisión inglesa omitió 'But' porque δέ no exige adversativa; en español se integra la relación contrastiva con la correlación 'Tanto... como...' sin forzar una conjunción adversativa independiente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB: se retiró la adversativa explícita para δέ y se prefirió una estructura más cercana a la construcción nominal del griego. La traducción española evita sobreexplicar, pero añade un verbo copulativo implícito en español para lograr legibilidad pública.'
  spanish_consistency_notes:
  - Se mantiene 'rico/pobre' por la antítesis socioeconómica directa del griego.
  - '''Corazón'' y ''rostro'' preservan la imaginería corporal del original.'
  - La colocación 'en todo tiempo' refleja la generalidad temporal sin introducir matices estacionales no requeridos.
  - No se usa 'SEÑOR', 'Cristo' ni terminología doctrinal ajena al versículo.
