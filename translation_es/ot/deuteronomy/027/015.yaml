    text: 'Hebreo: «el hombre»; la forma masculina singular funciona aquí como fórmula legal representativa.'
    reason: lexical_alternative
  - marker: b
    text: O «una imagen de fundición». El término hebreo se refiere a una imagen hecha por fundición, a menudo en metal.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el borrador para ajustarlo más estrechamente al hebreo y al rastro léxico del POB: se reemplaza «ídolo» por «imagen» en ambos sustantivos para preservar la distinción concreta entre פֶסֶל y מַסֵּכָה sin añadir una interpretación más amplia; se añade «es» para un español natural; se mejora la frase posesiva a «obra de las manos de un artesano»; y se incorpora una nota léxica para «imagen fundida», paralela a la alternativa preservada en inglés.'
