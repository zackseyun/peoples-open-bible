    text: 'O: ''no toma advertencia''. El hebreo puede entenderse como que el pueblo no es advertido o como que no atiende la advertencia; el texto principal sigue el énfasis causal creado por la falla del atalaya al no tocar la trompeta.'
    reason: lexical_alternative
  - marker: b
    text: '''Su sangre ... de la mano del atalaya'' es un modismo jurídico de responsabilidad por una muerte.'
    reason: cultural_note
  revision_rationale: 'La revisión alinea mejor el español con las decisiones auditadas del POB: usa ''atalaya'' para la metáfora profética de Ezekiel 33, restituye ''en su iniquidad'' para conservar la formulación hebrea compacta y la tensión teológica, y reubica las notas para reflejar exactamente la alternativa léxica de נִזְהָר y el modismo jurídico sobre ''su sangre''.'
