id: 1CLEM.08
reference: 1 Clement 8
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Οἱ λειτουργοὶ τῆς χάριτος τοῦ θεοῦ διὰ πνεύματος ἁγίου περὶ μετανοίας ἐλάλησαν, 2. καὶ αὐτὸς δὲ ὁ δεσπότης τῶν ἁπάντων περὶ μετανοίας ἐλάλησεν μετὰ ὅρκου· Ζῶ γὰρ ἐγώ, λέγει κύριος, οὐ βούλομαι τὸν θάνατον τοῦ ἁμαρτωλοῦ ὡς τὴν μετάνοιαν, προστιθεὶς καὶ γνώμην ἀγαθήν. 3. Μετανοήσατε, οἶκος Ἰσραήλ, ἀπὸ τῆς ἀνομίας ὑμῶν· εἶπον τοῖς υἱοῖς τοῦ λαοῦ μου· Ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ἀπὸ τῆς γῆς ἕως τοῦ οὐρανοῦ καὶ ἐὰν ὦσιν πυρρότεραι κόκκου καὶ μελανώτεραι σάκκου, καὶ ἐπιστραφῆτε πρὸς με ἐξ ὅλης τῆς καρδίας καὶ εἴπητε· Πάτερ, ἐπακούσομαι ὑμῶν ὡς λαοῦ ἁγίου. 4. καὶ ἐν ἑτέρῳ τόπῳ λέγει οὕτως· Λούσασθε καὶ καθαροὶ γένεσθε, ἀφέλεσθε τὰς πονηρίας ἀπὸ τῶν ψυχῶν ὑμῶν ἀπέναντι τῶν ὀφθαλμῶν μου· παύσασθε ἀπὸ τῶν πονηριῶν ὑμῶν, μάθετε καλὸν ποιεῖν, ἐκζητήσατε κρίσιν, ῥύσασθε ἀδικούμενον, κρίνατε ὀρφανῷ καὶ δικαιώσατε χήραν· καὶ δεῦτε καὶ διελεγχθῶμεν, λέγει κύριος· καὶ ἐὰν ὦσιν αἱ ἁμαρτίαι ὑμῶν ὡς φοινικοῦν, ὡς χιόνα λευκανῶ· ἐὰν δὲ ὦσιν ὡς κόκκινον, ὡς ἔριον λευκανῶ· καὶ ἐὰν θέλητε καὶ εἰσακούσητέ μου, τὰ ἀγαθὰ τῆς γῆς φάγεσθε· ἐὰν δὲ μὴ θέλητε μηδὲ εἰσακούσητέ μου, μάχαιρα ὑμᾶς κατέδεται· τὸ γὰρ στόμα κυρίου ἐλάλησεν ταῦτα. 5. πάντας οὖν τοὺς ἀγαπητοὺς αὐτοῦ βουλόμενος μετανοίας μετασχεῖν ἐστήριξεν τῷ παντοκρατορικῷ βουλήματι αὐτοῦ.
  language: Greek
  pages:
  - 271
  - 273
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'The ministers of the grace of God spoke through the Holy Spirit concerning repentance[a], and the Master of all things himself also spoke concerning repentance with an oath: “For as I live,” says the Lord, “I do not desire the death of the sinner so much as his repentance,” adding also a good declaration: “Repent, O house of Israel, of your lawlessness. Say to the sons of my people, ‘Even if your sins should reach from the earth to heaven, and even if they are redder than scarlet and blacker than sackcloth, yet if you turn to me with your whole heart and say, “Father,” I will listen to you as to a holy people.’” And in another place he says thus: “Wash and become clean; remove your wicked deeds from your souls before my eyes, cease from your wickednesses, learn to do good, seek justice, rescue the one being wronged, judge for the orphan, and give justice to the widow. And come, and let us reason together,” says the Lord. “Even if your sins are like crimson, I will whiten them like snow; and if they are like scarlet, I will whiten them like wool. But if you are willing and listen to me, you shall eat the good things of the land; but if you are not willing and do not listen to me, a sword will devour you; for the mouth of the Lord has spoken these things.” Therefore, because he desired all his beloved ones to share in repentance[b][c][d][e][f][g], he confirmed it by his almighty will.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording echoes Ezekiel 33:11, but Clement's form includes an added benevolent clause not identical to standard Septuagint wording.
    reason: cross_reference
    anchor_ref: '8:2'
  - marker: g
    text: The citation is a composite paraenetic use of prophetic language rather than a verbatim quotation from a single extant Old Testament verse.
    reason: cross_reference
    anchor_ref: '8:3'
  - marker: f
    text: This section draws chiefly on Isaiah 1:16–20 in Septuagintal form.
    reason: cross_reference
    anchor_ref: '8:4'
  - marker: e
    text: Or 'he confirmed it by his almighty counsel.' The Greek can emphasize either God's sovereign purpose or the firmness with which he established this call to repentance.
    reason: lexical_alternative
    anchor_ref: '8:5'
  - marker: d
    text: Or 'the Master himself of all things'.
    reason: previous_rendering
  - marker: c
    text: Or 'a good intention'.
    reason: previous_rendering
  - marker: b
    text: Or 'remove your wicked deeds from before my eyes'.
    reason: previous_rendering
lexical_decisions:
- source_word: λειτουργοί
  chosen: ministers
  alternatives:
  - servants
  - liturgical ministers
  lexicon: LSJ
  rationale: Retains the dignified, commissioned sense of those who serve in God's work without over-specifying a cultic office in this context.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: LSJ
  rationale: '''Grace'' preserves the theological weight of divine beneficence and matches established Christian usage.'
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: Distinguished from κύριος later in the quotations; 'Master' preserves the stronger sense of absolute ownership or rule.
- source_word: μετάνοια / μετανοέω
  chosen: repentance / repent
  alternatives:
  - turning back
  lexicon: LSJ
  rationale: Standard rendering that preserves the moral and spiritual force of the term in paraenetic context.
- source_word: γνώμην ἀγαθήν
  chosen: a good intention
  alternatives:
  - good counsel
  - gracious resolve
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic here; 'good intention' reflects the sense that God adds a benevolent declaration or disposition alongside the oath.
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - iniquity
  - wrongdoing
  lexicon: LSJ
  rationale: Keeps the stronger sense of violation of God's order rather than a generic moral failure.
- source_word: ἐπιστραφῆτε
  chosen: turn
  alternatives:
  - turn back
  - be converted
  lexicon: LSJ
  rationale: '''Turn'' is concise and preserves the covenantal call to return to God.'
- source_word: ἐπακούσομαι
  chosen: I will listen to you
  alternatives:
  - I will hear you
  - I will heed you
  lexicon: LSJ
  rationale: Expresses responsive hearing in clear modern English while preserving relational force.
- source_word: διελεγχθῶμεν
  chosen: let us reason together
  alternatives:
  - let us settle the matter
  - let us argue it out
  lexicon: LSJ
  rationale: Traditional phrasing fits the judicial-dialogical tone and remains intelligible in modern English.
- source_word: ἐκζητήσατε κρίσιν
  chosen: seek justice
  alternatives:
  - seek judgment
  - seek what is right
  lexicon: LSJ
  rationale: In this ethical context κρίσις is best rendered as justice rather than mere legal decision.
- source_word: ῥύσασθε ἀδικούμενον
  chosen: rescue the one being wronged
  alternatives:
  - deliver the oppressed
  - help the injured party
  lexicon: LSJ
  rationale: 'Anchored in the participle''s passive sense: the person suffering injustice is to be delivered.'
- source_word: κρίνατε ὀρφανῷ
  chosen: judge for the orphan
  alternatives:
  - defend the orphan
  - grant justice to the orphan
  lexicon: LSJ
  rationale: Rendered somewhat formally to preserve the judicial texture of the Greek; the sense is acting on behalf of the fatherless in judgment.
- source_word: δικαιώσατε χήραν
  chosen: give justice to the widow
  alternatives:
  - vindicate the widow
  - justify the widow
  lexicon: LSJ
  rationale: Avoids misleading Pauline overtones of 'justify' while preserving the legal-vindicatory sense.
- source_word: φοινικοῦν / κόκκινον
  chosen: crimson / scarlet
  alternatives:
  - deep red
  - red-dyed
  lexicon: LSJ
  rationale: Maintains the vivid color imagery of the scriptural citation.
- source_word: λευκανῶ
  chosen: I will whiten
  alternatives:
  - I will make white
  lexicon: LSJ
  rationale: Preserves the verbal imagery and divine action more directly than a flattened paraphrase.
- source_word: παντοκρατορικῷ βουλήματι
  chosen: his all-sovereign purpose
  alternatives:
  - his almighty will
  - his all-powerful counsel
  lexicon: LSJ
  rationale: Conveys both the comprehensive power of παντοκρατορικός and the deliberative sense of βούλημα.
- source_word: μετασχεῖν
  chosen: to share in repentance
  alternatives:
  - to partake of repentance
  - to have a share in repentance
  lexicon: LSJ
  rationale: Keeps the participatory nuance rather than reducing it to a simple infinitive like 'to repent'.
theological_decisions:
- issue: Use of 'Master' for δεσπότης and 'Lord' for κύριος in close proximity
  chosen_reading: Different English titles are maintained
  alternative_readings:
  - Render both as 'Lord'
  - Render δεσπότης as 'Sovereign'
  rationale: The Greek uses distinct titles. Preserving the distinction improves transparency and avoids collapsing the rhetoric of Clement's phrasing and the scriptural citation.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-text plain sense.'
- issue: Final clause on repentance as divine gift or opportunity
  chosen_reading: '''he desires all his beloved ones to share in repentance'''
  alternative_readings:
  - '''to repent'''
  - '''to have room for repentance'''
  rationale: μετασχεῖν naturally carries a participatory sense. This wording preserves the theological nuance that repentance is something into which people are brought or granted a share, not merely a bare command.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
