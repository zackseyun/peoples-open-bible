translation:
  language: es
  text: ¿Y quién ha conocido tu consejo[a], a menos que tú hayas dado sabiduría y hayas enviado tu espíritu santo desde lo alto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu Espíritu Santo». El griego dice literalmente «tu espíritu santo»; la mayúscula refleja una interpretación, no una diferencia en el texto fuente.
    reason: alternative_reading
lexical_decisions:
- source_word: βουλὴν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - voluntad
  lexicon: LSJ
  rationale: βουλή puede expresar consejo, propósito o plan. «Consejo» conserva mejor la idea de la deliberación divina sin volverlo demasiado técnico ni sustituirlo por una formulación más interpretativa como «voluntad».
- source_word: ἔγνω
  english_pob_choice: has known
  chosen_spanish: ha conocido
  alternatives_spanish:
  - conoció
  - ha entendido
  lexicon: LSJ
  rationale: 'El perfecto compuesto en español transmite bien la pregunta retórica con valor duradero: nadie ha llegado a conocer el consejo de Dios aparte de su don.'
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: LSJ
  rationale: «Sabiduría» es el equivalente normal y más fiel en este libro sapiencial; mantiene tanto el peso intelectual como el teológico del término.
- source_word: τὸ ἅγιόν σου πνεῦμα
  english_pob_choice: your holy Spirit
  chosen_spanish: tu Espíritu santo
  alternatives_spanish:
  - tu santo Espíritu
  - tu aliento santo
  lexicon: LSJ
  rationale: La construcción griega es literalmente «tu espíritu santo». En español, capitalizar «Espíritu» preserva con naturalidad la posible referencia personal/divina sin imponer una explicación doctrinal que el griego por sí solo no exige; el orden «Espíritu santo» evita la forma litúrgica fija cuando no es necesaria.
- source_word: ἀπὸ ὑψίστων
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde las alturas
  - desde los lugares más altos
  lexicon: LSJ
  rationale: «Desde lo alto» es una solución idiomática que conserva la procedencia celestial elevada sin sonar forzada en español moderno.
theological_decisions:
- issue: Capitalización de «Espíritu» en una frase de contenido potencialmente pneumatológico
  english_pob_reading: your holy Spirit
  chosen_spanish_reading: tu Espíritu santo
  alternative_spanish_readings:
  - tu espíritu santo
  - tu Santo Espíritu
  rationale: El texto griego no obliga a una mayúscula, pero el español requiere decidir entre una lectura genérica y una personal. Se mantiene la tensión con «Espíritu» capitalizado, sin añadir un comentario doctrinal en el cuerpo del versículo; así se preserva la posible lectura pneumatológica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que actualizó los verbos a perfecto compuesto («has/have given», «has/have sent») para reflejar mejor el aoristo griego en un español natural y formal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino YHWH.
  - Se mantiene «sabiduría» como término sapiencial estándar, coherente con el libro de Sabiduría.
  - Se conserva una formulación reverente pero transparente, sin calco excesivo de la sintaxis inglesa.
