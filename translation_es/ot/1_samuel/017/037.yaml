translation:
  language: es
  text: 'David dijo: «Yahvé, que me libró de la garra del león y de la garra del oso, él me librará de la mano de este filisteo». Entonces Saúl dijo a David: «Ve, y que Yahvé esté contigo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y Yahvé estará contigo». El hebreo puede leerse como una bendición o deseo, o como una simple afirmación futura.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, en línea con la política del POB en inglés. En español, 'Yahvé' es la forma transparente y reverente más adecuada para mantener el nombre propio de Dios sin sustituirlo por un título.
- source_word: הִצִּלַנִי / יַצִּילֵנִי
  english_pob_choice: delivered me / will deliver me
  chosen_spanish: me libró / me librará
  alternatives_spanish:
  - me rescató / me rescatará
  - me salvó / me salvará
  lexicon: HALOT
  rationale: '''Librar'' comunica bien la idea concreta de ser sacado de peligro y mantiene la relación verbal entre la acción pasada y la futura. ''Salvar'' sería posible, pero puede sonar más general y menos conectado con el peligro inmediato del contexto.'
- source_word: מִיַּד
  english_pob_choice: from the paw / from the hand
  chosen_spanish: de la garra / de la mano
  alternatives_spanish:
  - del poder de
  - del agarre de
  lexicon: HALOT
  rationale: Para los animales, 'garra' expresa de forma natural la imagen corporal que en español no queda bien con 'mano'. Para el filisteo, se conserva 'mano' porque el hebreo usa el mismo modismo y el español lo entiende con claridad.
- source_word: הָאֲרִי
  english_pob_choice: the lion
  chosen_spanish: el león
  lexicon: HALOT
  rationale: Correspondencia léxica directa, manteniendo el artículo definido.
- source_word: הַדֹּב
  english_pob_choice: the bear
  chosen_spanish: el oso
  lexicon: HALOT
  rationale: Correspondencia léxica directa, manteniendo el artículo definido.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: 'Se conserva el pronombre enfático independiente del hebreo: ''él me librará''. En español también aporta énfasis y continuidad con la afirmación previa.'
- source_word: הַפְּלִשְׁתִּי הַזֶּה
  english_pob_choice: this Philistine
  chosen_spanish: este filisteo
  alternatives_spanish:
  - el filisteo, este
  - este filisteo enemigo
  lexicon: HALOT
  rationale: El demostrativo precede al sustantivo de manera natural en español. 'Filisteo' conserva el etnónimo y el deíctico subraya la referencia puntual de David.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Imperativo breve y directo. 'Ve' es la forma más natural y fiel al tono conciso de Saúl.
- source_word: יִהְיֶה עִמָּךְ
  english_pob_choice: may the LORD be with you
  chosen_spanish: que Yahvé esté contigo
  alternatives_spanish:
  - Yahvé estará contigo
  - Yahvé sea contigo
  lexicon: HALOT
  rationale: La forma hebrea puede entenderse como bendición/deseo o como futuro simple. Se prefiere una redacción benedictiva en español ('que Yahvé esté contigo') para preservar esa tensión sin resolverla en una profecía categórica.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el nombre propio de Dios, no un título. Se mantiene su forma transliterada en español para preservar la identidad del nombre revelado a Israel y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la frase final de Saúl
  english_pob_reading: may the LORD be with you
  chosen_spanish_reading: que Yahvé esté contigo
  alternative_spanish_readings:
  - Yahvé estará contigo
  - Yahvé será contigo
  rationale: El imperfecto hebreo admite lectura de bendición o de futuro. La versión española conserva la ambigüedad funcional con una forma optativa/benedictiva, evitando convertirla en una garantía profética más fuerte de la que exige el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registran cambios aplicados y el acuerdo cruzado fue alto. Se adoptó ''Yahvé'' para el nombre divino, se mantuvo la imagen concreta de ''garra'' para los animales y se preservó la tensión del final de Saúl con una lectura benedictiva.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conservó el pronombre enfático 'él' para reflejar el hebreo הוּא.
  - '''Filisteo'' se mantuvo como etnónimo sin expansión explicativa, siguiendo el texto fuente.'
  - La puntuación y las comillas se ajustan a la norma editorial española con lenguaje bíblico contemporáneo.
