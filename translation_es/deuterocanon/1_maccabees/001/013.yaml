translation:
  language: es
  text: Y algunos del pueblo buscaron con empeño esto, y fueron al rey; y él les dio autoridad para practicar las costumbres de las naciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las prácticas de las naciones». El griego dice «las naciones», una forma judía común de referirse a los pueblos no israelitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: προεθυμήθησάν
  english_pob_choice: eagerly sought this
  chosen_spanish: buscaron con empeño
  alternatives_spanish:
  - desearon con vehemencia
  - se mostraron muy dispuestos
  - buscaron con ardor
  lexicon: LSJ
  rationale: El verbo expresa una inclinación fuerte y decidida; en español, 'buscaron con empeño' conserva el impulso voluntario y la idea de activamente procurar algo, sin añadir un objeto explícito que no está en el griego.
- source_word: τινες ἀπὸ τοῦ λαοῦ
  english_pob_choice: some from the people
  chosen_spanish: algunos del pueblo
  alternatives_spanish:
  - algunos de entre el pueblo
  - ciertos del pueblo
  - algunos del pueblo judío
  lexicon: LSJ
  rationale: La construcción indica un subconjunto dentro del pueblo. 'Algunos del pueblo' sigue de cerca la estructura griega y es natural en español.
- source_word: ἐπορεύθησαν πρὸς τὸν Βασιλέα
  english_pob_choice: they went to the king
  chosen_spanish: fueron al rey
  alternatives_spanish:
  - se dirigieron al rey
  - se presentaron ante el rey
  - fueron donde el rey
  lexicon: LSJ
  rationale: El verbo es un movimiento simple. 'Fueron al rey' es breve, fiel y suficientemente solemne para el contexto narrativo.
- source_word: ἔδωκαν αὐτοῖς ἐξουσίαν
  english_pob_choice: he gave them authority
  chosen_spanish: él les dio autoridad
  alternatives_spanish:
  - les concedió autoridad
  - les dio permiso
  - les otorgó autoridad
  lexicon: LSJ
  rationale: Aunque la forma griega es plural, el referente inmediato es el rey; el español puede explicitar 'él' para evitar ambigüedad. 'Autoridad' reproduce bien ἐξουσία y es más fuerte que 'permiso'.
- source_word: ποιῆσαι
  english_pob_choice: to practice
  chosen_spanish: practicar
  alternatives_spanish:
  - hacer
  - observar
  - cumplir
  lexicon: LSJ
  rationale: Con τὰ δικαιώματα, el infinitivo no significa simplemente 'hacer', sino adoptar o ejecutar prácticas establecidas. 'Practicar' comunica ese valor de conducta habitual o observancia.
- source_word: τὰ δικαιώματα τῶν ἐθνῶν
  english_pob_choice: the customs of the nations
  chosen_spanish: las costumbres de las naciones
  alternatives_spanish:
  - los estatutos de las naciones
  - las prácticas de las naciones
  - las costumbres de los gentiles
  lexicon: LSJ
  rationale: δικαιώματα puede referirse a estatutos, ordenanzas o prácticas establecidas. Aquí, por el contexto de adoptar modos no israelitas, 'costumbres' transmite adecuadamente el sentido sin forzar un tecnicismo jurídico. 'Naciones' mantiene la cercanía con ἐθνῶν y evita sustituirlo por 'gentiles' como término interpretativo.
theological_decisions:
- issue: Rendering of ἐθνῶν in a Jewish-context polemical setting
  english_pob_reading: nations
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  rationale: Se mantiene 'naciones' para seguir más de cerca el griego y dejar visible el matiz étnico-político. El contexto ya indica que se trata de prácticas no israelitas, por lo que no es necesario cargar el texto con el término técnico 'gentiles'.
  doctrine_reference: Contested-terms handling in POB favors source-proximate rendering with contextual note when a term may be read more technically.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó el inglés de 'eagerly desired this' a 'eagerly sought this' para reflejar mejor προεθυμήθησάν. La versión española adopta un equivalente dinámico equivalente ('buscaron con empeño') sin perder la fuerza volitiva. También se preservó la decisión auditada de traducir ἐθνῶν por 'naciones' y de entender ἐξουσίαν como 'autoridad'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí un caso de sustitución del nombre divino.
  - '''Naciones'' se mantiene como traducción base de ἐθνῶν, con nota para la posible lectura interpretativa ''gentiles''.'
  - '''Autoridad'' se conserva para ἐξουσίαν, evitando ''permiso'' por ser demasiado débil.'
  - El texto español explicita 'él' para resolver la referencia singular implícita en la forma griega plural del verbo de dar.
