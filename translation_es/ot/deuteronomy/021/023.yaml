review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y la línea del POB inglés en casi todos los elementos clave: ''su cadáver'', la prohibición de dejarlo expuesto durante la noche, el entierro ese mismo día, la contaminación de la tierra, ''Yahvé'', y ''como herencia''. También preserva la ambigüedad de קִלְלַת אֱלֹהִים con nota. Sin embargo, la cláusula principal ''el colgado es maldito de Dios'' suena poco natural en español contemporáneo y no refleja de la mejor manera la opción principal auditada en inglés (''he who is hanged is accursed of God'').'
  spanish_quality_summary: El texto es generalmente claro y digno, pero requiere un ajuste menor de naturalidad y precisión estilística. 'Sobre el árbol' puede mantenerse, aunque 'en el árbol' sería más idiomático; no es error. El punto que sí conviene reparar es 'maldito de Dios', que en español eclesial moderno resulta tosco y ambiguo. 'Está bajo maldición de Dios' preserva la fuerza teológica y suena más natural, sin cerrar indebidamente la ambigüedad porque la nota ya documenta las alternativas.
  glossary_alignment: 'Cumple con la terminología del proyecto en los puntos principales: יהוה -> ''Yahvé''; אֱלֹהִים -> ''Dios''; אַדְמָה -> ''tierra''; נַחֲלָה -> ''herencia''. No hay conflicto con las políticas mesiánicas o cristológicas. La elección de ''contaminarás'' para תטמא es aceptable en contexto de pureza de la tierra.'
  issues:
  - severity: medium
    issue: '''el colgado es maldito de Dios'' es poco idiomático en español'
    rationale: Aunque intenta seguir de cerca 'accursed of God', en español actual suena forzado. 'Está bajo maldición de Dios' comunica mejor la idea principal documentada por el POB inglés y la decisión teológica sin perder sobriedad.
  - severity: low
    issue: La nota usa 'maldecido por Dios' como alternativa
    rationale: Es comprensible, pero 'maldito por Dios' o 'cursed by God' sería más idiomático. Aun así, al revisar la cláusula principal conviene armonizar la nota con formulaciones naturales.
  revised_spanish_text: Su cadáver no permanecerá toda la noche sobre el árbol[a], sino que ciertamente lo enterrarás ese mismo día, porque el colgado está bajo maldición de Dios; y no contaminarás tu tierra, que Yahvé tu Dios te da como herencia.
  revised_footnotes:
  - marker: a
    text: 'O: «porque el colgado es maldito por Dios»; alternativamente, «porque colgarlo es un ultraje contra Dios». La frase hebrea es breve y puede entenderse de más de una manera.'
    reason: alternative_reading
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad y fidelidad funcional del español en la cláusula teológicamente densa קִלְלַת אֱלֹהִים תָּלוּי. 'Está bajo maldición de Dios' preserva la lectura principal auditada —que el colgado lleva la señal de la maldición divina— sin introducir una paráfrasis amplia. La nota mantiene las alternativas interpretativas documentadas por el POB inglés.
