translation:
  language: es
  text: Y al oír, se alarmó mucho, y capturó a los hombres que habían venido para destruirlo, y los mató, porque sabía que buscaban destruirlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyó
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción temporal previa. En español, «al oírlo» conserva la relación inmediata de tiempo de manera natural y breve.
- source_word: ἐξέστη σφόδρα
  english_pob_choice: he was greatly alarmed
  chosen_spanish: se alarmó mucho
  alternatives_spanish:
  - quedó sumamente asombrado
  - quedó fuera de sí
  lexicon: BDAG
  rationale: En este contexto de intento de asesinato, el sentido es de fuerte sobresalto o alarma, no solo admiración. «Se alarmó mucho» refleja bien la intensidad de σφόδρα sin exagerar ni introducir una fórmula demasiado literal.
- source_word: συνέλαβεν
  english_pob_choice: he seized
  chosen_spanish: prendió a
  alternatives_spanish:
  - apresó a
  - tomó preso a
  lexicon: BDAG
  rationale: El verbo expresa aprehender o sujetar con fuerza. «Prendió a» funciona en español narrativo y conserva el matiz de captura sin forzar una terminología jurídica más específica que el griego no exige.
- source_word: τοὺς ἄνδρας
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - aquellos hombres
  - esos hombres
  lexicon: BDAG
  rationale: ἄνδρας es literalmente masculino plural. «Los hombres» mantiene la referencia directa y no añade matices interpretativos.
- source_word: τοὺς ἐλθόντας ἀπολέσαι αὐτόν
  english_pob_choice: who had come to destroy him
  chosen_spanish: que habían venido para destruirlo
  alternatives_spanish:
  - que habían venido para matarlo
  - que habían venido a acabar con él
  lexicon: BDAG
  rationale: Se conserva ἀπολέσαι con «destruirlo», como hace la POB en inglés, para mantener la repetición léxica con la segunda mitad del versículo. En español, «venir para destruirlo» suena natural y mantiene el propósito hostil.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: los mató
  alternatives_spanish:
  - los dio muerte
  - los ejecutó
  lexicon: BDAG
  rationale: ἀποκτείνω significa matar. «Los mató» es claro, directo y fiel al evento narrado.
- source_word: ἔγνω
  english_pob_choice: he knew
  chosen_spanish: sabía
  alternatives_spanish:
  - comprendió
  - llegó a saber
  lexicon: BDAG
  rationale: El aoristo expresa reconocimiento cierto de la intención enemiga. «Sabía» comunica ese conocimiento de forma simple y natural en español narrativo.
- source_word: ἐζήτουν αὐτὸν ἀπολέσαι
  english_pob_choice: they were seeking to destroy him
  chosen_spanish: buscaban destruirlo
  alternatives_spanish:
  - intentaban matarlo
  - andaban buscando destruirlo
  lexicon: BDAG
  rationale: El imperfecto presenta una acción en curso o un propósito sostenido. «Buscaban destruirlo» conserva la idea de intención persistente y repite el mismo verbo de la primera mitad para mantener la coherencia léxica.
translation_notes:
  revision_awareness: El texto inglés auditado usa una equivalencia óptima sin notas; el griego confirma la secuencia temporal, la intensidad de σφόδρα, la captura violenta de συνέλαβεν y la repetición deliberada de ἀπολέσαι. La versión española mantiene esa estructura y la repetición de «destruirlo» para no suavizar el paralelismo del versículo.
  spanish_consistency_notes:
  - Se mantiene «destruirlo» en ambas apariciones de ἀπολέσαι para conservar la repetición léxica del griego y del inglés POB.
  - «Se alarmó mucho» busca expresar el sobresalto intenso de ἐξέστη σφόδρα sin convertirlo en mera sorpresa intelectual.
  - No se introduce una nota porque no hay variante textual ni ambigüedad teológica relevante que el inglés POB haya preservado en este versículo.
