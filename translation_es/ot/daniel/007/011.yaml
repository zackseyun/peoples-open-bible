translation:
  language: es
  text: Seguía mirando entonces por causa del sonido de las grandes palabras[a] que el cuerno estaba hablando. Seguía mirando hasta que la bestia fue matada, y su cuerpo fue destruido y entregado al fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las palabras jactanciosas» o «las palabras arrogantes»; literalmente, «las grandes palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept watching
  chosen_spanish: Seguía mirando
  alternatives_spanish:
  - Yo estaba mirando
  - Miraba
  lexicon: HALOT
  rationale: El participio con el auxiliar expresa acción prolongada en pasado. En español, 'Seguía mirando' conserva ese matiz durativo de manera natural y reverente.
- source_word: בֵּאדַיִן
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  - luego
  lexicon: HALOT
  rationale: '''Entonces'' reproduce bien la secuencia narrativa de la visión sin cargar el texto con una expresión más explicativa.'
- source_word: מִן
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por
  - debido a
  lexicon: HALOT
  rationale: Aquí la preposición introduce la ocasión o motivo de seguir mirando. 'Por causa de' conserva esa relación causal de modo claro en español.
- source_word: קָל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: '''Sonido'' refleja el valor auditivo básico del sustantivo sin personalizarlo como ''voz'' ni rebajarlo a ''ruido''.'
- source_word: מִלַּיָּא רַבְרְבָתָא
  english_pob_choice: the great words
  chosen_spanish: las grandes palabras
  alternatives_spanish:
  - las palabras jactanciosas
  - las palabras arrogantes
  lexicon: HALOT
  rationale: La forma literal es 'grandes palabras'. Se conserva en el texto principal para respetar la tensión léxica; el contexto sugiere jactancia o arrogancia, pero eso se deja como alternativa interpretativa.
- source_word: קַרְנָא
  english_pob_choice: the horn
  chosen_spanish: el cuerno
  alternatives_spanish:
  - el asta
  lexicon: HALOT
  rationale: En Daniel, la imagen simbólica se conserva como 'cuerno'. 'Asta' es posible, pero menos estable en el registro bíblico español.
- source_word: מְמַלֱּלָה
  english_pob_choice: was speaking
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - estaba hablando
  - decía
  lexicon: HALOT
  rationale: El participio indica acción en desarrollo. 'Estaba diciendo' sigue de cerca el aspecto progresivo; 'estaba hablando' sería también válido, pero menos verbalmente exacto respecto de las 'palabras'.
- source_word: עַד דִּי
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: HALOT
  rationale: Construcción temporal estándar para marcar el límite de la observación de Daniel.
- source_word: קְטִילַת חֵיוְתָא
  english_pob_choice: the beast was killed
  chosen_spanish: la bestia fue matada
  alternatives_spanish:
  - la bestia fue asesinada
  - la bestia fue muerta
  lexicon: HALOT
  rationale: El pasivo señala que la bestia recibe la acción. 'Fue matada' es directo y ajustado al relato visionario; 'asesinada' añadiría una connotación innecesaria.
- source_word: וְהוּבַד
  english_pob_choice: was destroyed
  chosen_spanish: fue destruido
  alternatives_spanish:
  - pereció
  - fue aniquilado
  lexicon: HALOT
  rationale: El verbo expresa destrucción o aniquilación. 'Fue destruido' es la equivalencia más transparente y mantiene el paralelismo con la imagen.
- source_word: גִּשְׁמַהּ
  english_pob_choice: its body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su cadáver
  - su cuerpo físico
  lexicon: HALOT
  rationale: '''Cuerpo'' traduce el sustantivo de manera clara y sin añadir una lectura interpretativa como ''cadáver''.'
- source_word: וִיהִיבַת
  english_pob_choice: was given over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue dado
  - fue puesto en manos de
  lexicon: HALOT
  rationale: El pasivo comunica transferencia a otro poder o destino. 'Fue entregado' funciona bien en español y conserva la idea de quedar bajo una sentencia.
- source_word: לִיקֵדַת אֶשָּׁא
  english_pob_choice: to the burning fire
  chosen_spanish: al ardor del fuego
  alternatives_spanish:
  - a la llama del fuego
  - al fuego ardiente
  lexicon: HALOT
  rationale: La construcción nominal aramea es literalmente 'a la quema/ardor de fuego'. 'Al ardor del fuego' preserva el sentido imagético sin forzar una perífrasis demasiado interpretativa.
theological_decisions:
- issue: Cómo traducir מִלַּיָּא רַבְרְבָתָא sin borrar su posible tono de arrogancia
  english_pob_reading: Retain the more literal 'great words' in the main text
  chosen_spanish_reading: Conservar 'grandes palabras' en el texto principal
  alternative_spanish_readings:
  - palabras jactanciosas
  - palabras arrogantes
  - palabras blasfemas
  rationale: El hebreo/aramaico dice literalmente 'grandes palabras'. El contexto permite un matiz de jactancia o arrogancia, pero el texto mismo no obliga a explicitarlo en la línea principal. Se preserva así la tensión léxica y se deja al lector ver el peso contextual.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cómo preservar la imaginería del juicio de la bestia sin convertirla en paráfrasis interpretativa
  english_pob_reading: Keep 'the beast,' 'its body,' and 'given over to the burning fire' as vision imagery
  chosen_spanish_reading: Mantener 'la bestia', 'su cuerpo' y 'fue entregado al ardor del fuego' como imaginería visionaria
  alternative_spanish_readings:
  - el reino fue destruido
  - fue juzgada completamente
  rationale: La escena describe una visión simbólica. Traducirla de forma directa evita introducir una identificación interpretativa que el versículo no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés conservó 'the great words' en el texto principal y mantuvo una nota para el matiz posible de jactancia o arrogancia. La última revisión afinó 'burning of fire' a 'burning fire'; en español se optó por una solución equivalente y natural ('ardor del fuego') que mantiene la imagen sin sobreexplicar.
  spanish_consistency_notes:
  - Se usa 'cuerno' para קַרְנָא, conforme al simbolismo de Daniel.
  - Se mantiene el pasivo para 'fue matada / fue destruido / fue entregado' para reflejar la secuencia de acciones del texto.
  - La nota [a] ancla la alternativa léxica correspondiente a 'grandes palabras', como en el audit trail inglés.
