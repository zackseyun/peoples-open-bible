id: GEN.31.31
reference: Genesis 31:31
source:
  edition: WLC
  text: וַ/יַּ֥עַן יַעֲקֹ֖ב וַ/יֹּ֣אמֶר לְ/לָבָ֑ן כִּ֣י יָרֵ֔אתִי כִּ֣י אָמַ֔רְתִּי פֶּן תִּגְזֹ֥ל אֶת בְּנוֹתֶ֖י/ךָ מֵ/עִמִּֽ/י־־׃
translation:
  text: Then Jacob answered and said to Laban[a], “Because I was afraid, for I said[b], ‘Lest you take your daughters from me by force.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “lest you rob/snatch your daughters from me.” The Hebrew verb carries a stronger sense of wrongful seizure than the smoother English 'take away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for I said'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative verb from ענה in dialog contexts; 'answered' preserves the formal exchange and pairs naturally with the following speech verb.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common rendering of אמר in direct speech introduction; retaining both 'answered and said' reflects the Hebrew narrative style without excessive paraphrase.
- source_word: כִּי
  chosen: Because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here the first כִּי introduces Jacob's reason for leaving secretly, so 'Because' best signals causal force in English.
- source_word: יָרֵאתִי
  chosen: I was afraid
  alternatives:
  - I feared
  lexicon: HALOT
  rationale: From ירא, expressing Jacob's fear. 'I was afraid' is natural modern English and preserves the emotional sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: The second כִּי introduces the content/rationale of Jacob's fear. 'For I said' is idiomatic and distinguishes it from the first causal כִּי without overcomplicating the sentence.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I thought
  lexicon: HALOT
  rationale: Literal rendering of אמר. Although it can imply inward speech, 'I said' keeps closer to the Hebrew; the implied internal reasoning is clear from context.
- source_word: פֶּן
  chosen: Lest
  alternatives:
  - otherwise
  - in case
  lexicon: HALOT
  rationale: פֶּן marks apprehension about a possible outcome. 'Lest' is concise and accurately conveys feared possibility, though slightly elevated; it remains readable here.
- source_word: תִּגְזֹל
  chosen: take away
  alternatives:
  - rob
  - snatch away
  - steal
  lexicon: HALOT
  rationale: From גזל, literally 'rob/tear away by force.' In this family context, 'take away' communicates wrongful removal without suggesting theft of property alone. The stronger lexical force is preserved in a footnote.
- source_word: בְּנוֹתֶיךָ
  chosen: your daughters
  lexicon: HALOT
  rationale: Direct, literal rendering; the possessive reflects Laban's relation to Leah and Rachel in Jacob's explanation.
- source_word: מֵעִמִּי
  chosen: away from me
  alternatives:
  - from with me
  - from my side
  lexicon: HALOT
  rationale: The prepositional phrase indicates separation from Jacob's company/presence. 'Away from me' is idiomatic English that preserves the sense of removal.
