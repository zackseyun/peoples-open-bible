base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/012/038.yaml
  text: And you shall teach them to the wise among your people, whose hearts you know are able to comprehend and keep them secret.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T19:50:52Z'
    unchanged: false
    changes_summary: 'Revised the ending to reflect the Latin more closely: removed the interpretive expansion ''these secrets'' and rendered the final phrase with ''keep them secret,'' which better accounts for the implied object and sense of the source.'
translation:
  language: es
  text: Y les enseñarás estas cosas a los sabios de tu pueblo, cuyos corazones sabes que son capaces de comprender y de guardarlas en secreto.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Et docebis ea
  english_pob_choice: And you shall teach them
  chosen_spanish: Y enseñarás[a]
  alternatives_spanish:
  - Y les enseñarás
  - Y instruirás
  lexicon: docebis -> enseñar
  rationale: 'El latín expresa una acción de instrucción/enseñanza. ''Enseñarás'' conserva el valor directo y natural en español. El pronombre enclítico ''las'' se usa para retomar el objeto neutro/plural implícito del contexto anterior: lo que acaba de verse y ponerse a resguardo.'
- source_word: sapientes de populo tuo
  english_pob_choice: the wise among your people
  chosen_spanish: a los sabios de tu pueblo
  alternatives_spanish:
  - a los prudentes de tu pueblo
  - a los entendidos de tu pueblo
  lexicon: sapientes -> sabios
  rationale: '''Sapientes'' corresponde con claridad a ''sabios''. ''Prudentes'' o ''entendidos'' suavizan el matiz, pero ''sabios'' mantiene mejor la fuerza del término latino y la lectura del POB inglés.'
- source_word: quorum scis corda posse capere
  english_pob_choice: whose hearts you know are able to comprehend
  chosen_spanish: cuyos corazones sabes que son capaces de comprender
  alternatives_spanish:
  - cuyos corazones sabes que pueden captar
  - cuyos corazones conoces que pueden entender
  lexicon: cor corda -> corazones; capere -> comprender
  rationale: Se conserva la imagen de 'corazones' y el valor cognitivo de 'capere' como 'comprender/captar'. 'Comprender' es claro y digno en español, y preserva el sentido de capacidad interior, no solo intelectual.
- source_word: et pones ea in loco abscondito
  english_pob_choice: and keep them secret
  chosen_spanish: y de guardarlas en secreto
  alternatives_spanish:
  - y de ocultarlas
  - y de mantenerlas ocultas
  lexicon: locus absconditus -> en secreto/oculto; ea -> las
  rationale: El POB inglés revisado dejó de expandir a 'these secrets' y optó por 'keep them secret'. En español, 'guardarlas en secreto' reproduce ese sentido con naturalidad y sin introducir una paráfrasis mayor que la del latín. Se evita 'ocultarlas' porque puede sugerir simple esconderlas, mientras el contexto pide custodia reservada.
theological_decisions:
- issue: El objeto implícito de 'ea' y su custodia reservada
  english_pob_reading: keep them secret
  chosen_spanish_reading: guardarlas en secreto
  alternative_spanish_readings:
  - ocultarlas
  - mantenerlas ocultas
  rationale: El texto latino enlaza el mandato de poner 'ea' en un lugar escondido con la instrucción a los sabios de poder comprender y guardar ese contenido. La traducción española conserva la referencia implícita sin convertirla en una interpretación más explícita de 'secretos' como sustantivo independiente.
  doctrine_reference: Transparencia textual / fidelidad semántica
- issue: Capacidad interior para comprender
  english_pob_reading: whose hearts you know are able to comprehend
  chosen_spanish_reading: cuyos corazones sabes que son capaces de comprender
  alternative_spanish_readings:
  - cuyos corazones conoces que pueden comprender
  - cuyos corazones sabes que pueden captar
  rationale: Se mantiene 'corazones' como sede de la capacidad receptiva, una forma semítica/latina de hablar de la interioridad. No se reemplaza por 'mente' para no perder el matiz antropológico del texto.
  doctrine_reference: Antropología bíblica / interioridad del corazón
translation_notes:
  revision_awareness: La versión inglesa del POB fue revisada para reflejar más de cerca el latín, sustituyendo una expansión interpretativa ('these secrets') por 'keep them secret'. La versión española sigue esa revisión y evita expandir el referente más allá de lo que el latín y el texto inglés auditado sostienen.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, pero con sintaxis española natural.
  - Se conserva 'corazones' para respetar el lenguaje antropológico del original.
  - No se introduce 'Cristo', 'Señor' ni otras fórmulas no presentes en el pasaje.
  - El pronombre objeto implícito se integra de forma fluida en 'guardarlas' para evitar ambigüedad.
