translation:
  language: es
  text: Además, toda enfermedad y toda aflicción[a] que no estén escritas en el libro de esta ley, Yahvé las traerá sobre ti hasta que seas destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda plaga» por «toda aflicción»; el término hebreo puede denotar un golpe, una plaga o una calamidad que hiere.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Incluso
  - Asimismo
  lexicon: HALOT
  rationale: El hebreo añade otro elemento al catálogo de maldiciones; «Además» conserva el valor aditivo de manera natural en español sin sobrecargar el énfasis.
- source_word: כָּל חֳלִי
  english_pob_choice: every sickness
  chosen_spanish: toda enfermedad
  alternatives_spanish:
  - toda dolencia
  - toda enfermedad
  - toda mal
  lexicon: HALOT
  rationale: חֳלִי expresa enfermedad o dolencia. «Enfermedad» es claro, amplio y compatible con el paralelismo con el término siguiente.
- source_word: וְכָל מַכָּה
  english_pob_choice: and every affliction
  chosen_spanish: y toda aflicción
  alternatives_spanish:
  - y toda plaga
  - y todo golpe
  - y toda calamidad
  lexicon: HALOT
  rationale: מַכָּה puede significar golpe, herida, plaga o calamidad castigadora. «Aflicción» mantiene amplitud semántica sin restringirlo indebidamente a una epidemia.
- source_word: אֲשֶׁר לֹא כָתוּב
  english_pob_choice: that is not written
  chosen_spanish: que no está escrita
  alternatives_spanish:
  - que no está escrito
  - que no fue escrito
  - que no se halla escrito
  lexicon: HALOT
  rationale: La construcción pasiva del hebreo se puede trasladar de forma directa. Como el antecedente inmediato es implícitamente la lista de maldiciones, el femenino en español concuerda con «aflicción» y «enfermedad» en el sintagma más cercano, sin alterar el sentido.
- source_word: בְּסֵפֶר הַתּוֹרָה הַזֹּאת
  english_pob_choice: in the book of this law
  chosen_spanish: en el libro de esta ley
  alternatives_spanish:
  - en el libro de esta Torá
  - en el rollo de esta ley
  - en el libro de esta instrucción
  lexicon: HALOT
  rationale: סֵפֶר puede ser libro o rollo; «libro» es natural y fiel. «Ley» traduce תּוֹרָה en el uso de este pasaje como documento del pacto, manteniendo la inteligibilidad pública en español.
- source_word: יַעְלֵם
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - hará venir
  - pondrá
  - hará venir sobre ti
  lexicon: HALOT
  rationale: El hifil de עלה con este complemento expresa traer/poner sobre alguien. «Traerá sobre ti» conserva el valor idiomático de juicio impuesto, igual que el inglés auditado «will bring upon you».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la terminología del proyecto, el Tetragrámaton se vierte «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: עָלֶיךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: Con יַעְלֵם, el complemento expresa carga o imposición de juicio. «Sobre ti» reproduce bien la imagen idiomática en español.
- source_word: עַד הִשָּׁמְדָךְ
  english_pob_choice: until you are destroyed
  chosen_spanish: hasta que seas destruido
  alternatives_spanish:
  - hasta tu destrucción
  - hasta que seas aniquilado
  lexicon: HALOT
  rationale: La expresión final marca el término de la sentencia. «Hasta que seas destruido» es fiel, natural y no intensifica más allá del hebreo.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. En español de este proyecto, se mantiene como «Yahvé» para conservar el nombre propio revelado y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail en inglés: se conservaron el valor aditivo de גַּם, el binomio enfermedad/aflicción para חֳלִי/מַכָּה, el sintagma legal «libro de esta ley» y el nombre divino Yahvé. No se aplicaron revisiones pendientes en el contexto inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con la terminología del proyecto para el Tetragrámaton.
  - «Ley» traduce תּוֹרָה en sentido de documento del pacto, conforme al contexto de Deuteronomio 28.
  - Se mantuvo la distinción semántica entre «enfermedad» y «aflicción» para reflejar los dos sustantivos hebreos.
  - El orden sintáctico es fluido en español pero sigue de cerca la estructura del hebreo y del texto inglés auditado.
