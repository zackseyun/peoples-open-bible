  text: וְ/אִם לֹ֨א תוֹרִ֜ישׁוּ אֶת יֹשְׁבֵ֣י הָ/אָרֶץ֮ מִ/פְּנֵי/כֶם֒ וְ/הָיָה֙ אֲשֶׁ֣ר תּוֹתִ֣ירוּ מֵ/הֶ֔ם לְ/שִׂכִּים֙ בְּ/עֵ֣ינֵי/כֶ֔ם וְ/לִ/צְנִינִ֖ם בְּ/צִדֵּי/כֶ֑ם וְ/צָרֲר֣וּ אֶתְ/כֶ֔ם עַל הָ/אָ֕רֶץ אֲשֶׁ֥ר אַתֶּ֖ם יֹשְׁבִ֥ים בָּֽ/הּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/033/055.yaml
  text: But if you do not drive out the inhabitants of the land from before you[a], then those whom you let remain from among them will become barbs in your eyes and thorns in your sides[c][b], and they will harass you on the land where you are living.
  footnotes:
  - marker: a
    text: Or 'pricks in your eyes' for 'barbs in your eyes.' The Hebrew noun is rare and denotes something sharp that pierces.
    reason: lexical_alternative
  - marker: b
    text: Or 'thorns in your sides' / 'hooks in your sides.' The paired images both describe persistent, painful affliction from the remaining inhabitants.
    reason: lexical_alternative
  - marker: c
    text: Or 'they will trouble you' or 'they will oppress you.' The Hebrew verb can cover a range of hostile affliction.
    reason: lexical_alternative
