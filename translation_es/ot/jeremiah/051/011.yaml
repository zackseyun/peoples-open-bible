revisions:
- from: ¡Afilen las flechas[a]; llenen los escudos. Yahvé ha despertado el espíritu de los reyes de Media, porque su propósito es contra Babilonia, para destruirla; porque es la venganza de Yahvé[b], venganza por su templo.
  to: ¡Afilen las flechas; llenen los escudos[a]! Yahvé ha incitado el espíritu de los reyes de Media, porque su propósito es contra Babilonia, para destruirla[b]; porque es la venganza de Yahvé, venganza por su templo.
  rationale: 'Se corrigen las notas para que reflejen fielmente el expediente auditado y el anclaje correcto en el texto: [a] ahora preserva la alternativa léxica de הַשְּׁלָטִים, y [b] explica el sufijo femenino de ''destruirla'' referido a Babilonia. También se ajusta ''ha despertado'' a ''ha incitado'' para representar mejor el sentido de הֵעִיר en contexto militar, sin cambiar el significado central.'
