    reason: lexical_alternative
  - marker: b
    text: O «y se alojará» o «y pasará la noche». El verbo hebreo sugiere permanecer en la casa, no solo entrar en ella.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la traducción base porque es mayormente fiel y legible, pero se corrige la cola final para reflejar mejor la sintaxis del hebreo y la decisión auditada del POB inglés: la casa es consumida en todos sus elementos estructurales, «tanto su madera como sus piedras». No se requiere nota nueva. La posible concordancia femenina de «Lo/La» se deja sin cambiar por ser una cuestión menor y no afectar sustancialmente el sentido.'
