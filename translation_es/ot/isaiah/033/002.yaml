    rationale: La forma hebrea lleva sufijo 3mp («su brazo/de ellos»). La decisión auditada del POB indica que esa tensión debe preservarse en el texto principal y que «our arm/nuestro brazo» solo se mantenga como alternativa en nota.
  - severity: medium
    issue: La nota al pie está invertida respecto de la lectura principal requerida.
    rationale: Si el texto principal debe decir «su brazo», la nota debe ofrecer «nuestro brazo» como alternativa suavizada, no al revés.
  - severity: low
    issue: «Sé bondadoso con nosotros» es algo menos preciso que la noción de gracia/favor de חָנֵּנוּ.
    rationale: No es incorrecto, pero «sé clemente con nosotros» o «muéstrate propicio con nosotros» representarían mejor la petición de favor divino. Aun así, no es un error grave de fidelidad.
  revised_spanish_text: ¡Oh Yahvé, sé bondadoso con nosotros; te esperamos. Sé su brazo[a] cada mañana, también nuestra salvación en tiempo de angustia.
