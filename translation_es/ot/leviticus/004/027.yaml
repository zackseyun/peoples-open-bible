review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sujeto singular jurídico, pecado no intencional, categoría social/legal, acción prohibida y resultado de culpa. Sin embargo, hay dos problemas de fidelidad formal y de audit trail: (1) la nota [a] repite exactamente la misma frase que ya está en el texto (''del pueblo de la tierra''), cuando la nota debería ofrecer la alternativa interpretativa de miembro ordinario de la comunidad; y (2) la nota [b] no preserva la alternativa significativa del inglés para וְאָשֵׁם, sino que comenta בַּעֲשֹׂתָהּ, aunque ''al hacer'' en el texto ya es una buena solución y no requiere nota. Además, ''queda culpable'' es comprensible, pero ''se hace culpable'' o ''incurre en culpa'' conserva mejor el movimiento resultativo de וְאָשֵׁם.'
  spanish_quality_summary: El español es claro y digno. 'Y si una persona... peca inadvertidamente' suena natural. 'Del pueblo de la tierra' es algo rígido, pero es defendible aquí por cercanía léxica al hebreo y al rastro de auditoría inglés. 'Al hacer' y 'que no deben hacerse' funcionan bien. El cierre con punto final queda algo abrupto porque el versículo continúa en el contexto legal; una coma final reproduce mejor la sintaxis fuente y la traducción inglesa.
  glossary_alignment: 'Se mantiene correctamente ''Yahvé'' para יהוה. ''Mandamientos'' para מִצְוֺת y ''persona'' para נֶפֶשׁ אַחַת están bien. No hay conflictos con la terminología doctrinal principal. La principal desalineación está en las notas: falta la alternativa sobre וְאָשֵׁם y la nota existente sobre מֵעַם הָאָרֶץ está mal formulada como si fuera alternativa cuando no lo es.'
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real ni aclara bien el matiz de מֵעַם הָאָרֶץ.
    rationale: 'El texto ya dice ''del pueblo de la tierra'', por lo que una nota ''O “del pueblo de la tierra”'' es redundante e incorrecta. Debe conservar la aclaración interpretativa: miembro ordinario de la comunidad, en contraste con sacerdote o líder.'
  - severity: medium
    issue: La nota [b] está anclada a 'uno' y comenta 'al hacer', pero el inglés auditado preserva la alternativa significativa en וְאָשֵׁם.
    rationale: La nota inglesa documenta la ambigüedad legal de 'becomes guilty / incurs guilt / is guilty'. Esa es la nota que debería preservarse en español, no una nota menor sobre el infinitivo con ב.
  - severity: low
    issue: El versículo termina con punto en vez de coma.
    rationale: Tanto el hebreo como el inglés dejan la oración abierta hacia el versículo siguiente. La coma final refleja mejor la continuidad sintáctica.
  - severity: low
    issue: '''Queda culpable'' es aceptable pero no es la mejor opción para el valor resultativo de וְאָשֵׁם.'
    rationale: '''Se hace culpable'' o ''incurre en culpa'' expresa más naturalmente en español el paso a un estado de culpabilidad. ''Queda culpable'' suena algo menos idiomático.'
  revised_spanish_text: Y si una persona del pueblo de la tierra[a] peca inadvertidamente al hacer uno de los mandamientos de Yahvé que no deben hacerse, y se hace culpable[b],
  revised_footnotes:
