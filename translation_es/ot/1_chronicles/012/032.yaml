review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: procedencia desde la media tribu de Manasés, número de hombres, identificación nominal, y propósito de venir para hacer rey a David. Sin embargo, «por nombre» suena poco idiomático en español bíblico actual; el sentido de בְּשֵׁמוֹת se preserva mejor con «por sus nombres» o una formulación equivalente que mantenga la idea de designación individual.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero «que fueron designados por nombre» resulta forzado. «La media tribu» es aceptable, aunque «la media tribu de Manasés» funciona bien en contexto. La frase final «vinieron para hacer rey a David» es fiel, pero en español suena más natural «vinieron para hacer a David rey».
  glossary_alignment: No hay conflicto con la terminología proyectual principal. Los nombres propios están bien en español. La decisión sobre «hacer rey» concuerda con el rastro léxico inglés. La única mejora necesaria es idiomática en la expresión de designación nominal.
  issues:
  - severity: medium
    issue: «por nombre» es poco idiomático en español
    rationale: Aunque calca de cerca «by name», en español natural y eclesial actual suena extraño. El hebreo בְּשֵׁמוֹת expresa identificación individual o nominativa; «por sus nombres» comunica mejor ese valor sin perder fidelidad.
  - severity: low
    issue: Orden menos natural en «hacer rey a David»
    rationale: La construcción es comprensible, pero «hacer a David rey» suena más fluida y estándar en español, manteniendo exactamente el mismo sentido del hifil de מלך.
  revised_spanish_text: Y de la media tribu de Manasés, dieciocho mil, que fueron designados por sus nombres[a], vinieron para hacer a David rey.
