revisions:
- from: Pero los hombres de la tropa[a], a quienes Amasías había hecho volver de ir con él a la guerra, irrumpieron en las ciudades de Judá, desde Samaria[b] hasta Bet-horón, y mataron a tres mil de ellos y recogieron mucho botín.
  to: Pero los hombres de la tropa[a], a quienes Amasías había hecho volver de ir con él a la guerra, hicieron incursiones contra las ciudades de Judá, desde Samaria hasta Bet-horón[b], y mataron a tres mil de ellos[c] y tomaron mucho botín.
  rationale: Se ajusta el verbo principal de la acción militar a 'hicieron incursiones contra' para reflejar mejor פשט como raid. Se cambia 'recogieron mucho botín' por 'tomaron mucho botín' para un español más natural y fiel al lenguaje de guerra. Se mejora la nota geográfica y se añade una nota para la alternativa de נכה conforme al rastro inglés.
