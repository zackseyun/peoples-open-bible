translation:
  language: es
  text: Así Yahvé estableció el reino en su mano, y todo Judá dio tributo[a] a Josafat; y tenía riquezas y honor en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'regalo', 'presente' u 'ofrenda' para 'tributo' (hebreo minjá); aquí el contexto real favorece 'tributo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּכֶן
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - afirmó
  - hizo firme
  - asentó
  lexicon: HALOT
  rationale: כּוּן en causativo expresa dar estabilidad o establecer firmemente. 'Estableció' comunica de manera natural la consolidación del reino sin perder la fuerza de fijación política del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como 'Yahvé', siguiendo la terminología base del proyecto y evitando la sustitución por un título.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el poder real
  - el reinado
  lexicon: HALOT
  rationale: מַמְלָכָה designa aquí el reino como entidad política. 'El reino' es la opción más clara y natural en español, sin reducirlo solo a la persona del rey.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - bajo su control
  - en su poder
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática hebrea 'en su mano', que en español sigue siendo comprensible y conserva la textura del original.
- source_word: וַיִּתְּנוּ כָל יְהוּדָה
  english_pob_choice: all Judah gave
  chosen_spanish: todo Judá trajo
  alternatives_spanish:
  - todo Judá dio
  - todo Judá presentó
  lexicon: HALOT
  rationale: El verbo נתן puede expresarse en español como 'traer' cuando el contexto es llevar una ofrenda o pago a un soberano. 'Trajo tributo' refleja mejor la escena tributaria y la dirección implícita del gesto.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - ofrenda
  - presente
  - regalo
  lexicon: HALOT
  rationale: En contexto real y político, מִנְחָה funciona como tributo, no como ofrenda cultual. 'Tributo' preserva ese valor socio-político que la lectura inglesa también privilegió.
- source_word: לִיהוֹשָׁפָט
  english_pob_choice: to Jehoshaphat
  chosen_spanish: a Josafat
  alternatives_spanish:
  - para Josafat
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional 'Josafat' para el nombre propio, manteniendo la identificación estándar del personaje bíblico.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he had
  chosen_spanish: tuvo
  alternatives_spanish:
  - le llegó a haber
  - hubo para él
  lexicon: HALOT
  rationale: El giro hebreo indica posesión o estado resultante. 'Tuvo' es una solución idiomática breve y fiel en español.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  - caudal
  lexicon: HALOT
  rationale: עֹשֶׁר denota riqueza material. 'Riquezas' preserva el plural colectivo usual en español bíblico sin perder claridad.
- source_word: וְכָבוֹד
  english_pob_choice: and honor
  chosen_spanish: y honor
  alternatives_spanish:
  - y gloria
  - y prestigio
  lexicon: HALOT
  rationale: En contexto cortesano, כָבוֹד expresa honor o prestigio público más que gloria divina. 'Honor' evita una connotación teológica no exigida por el pasaje.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran medida
  - abundantemente
  lexicon: HALOT
  rationale: La expresión señala exceso o gran cantidad. 'En abundancia' es una equivalencia natural y transparente en español.
theological_decisions:
- issue: El nombre divino יהוה en una afirmación de soberanía real
  english_pob_reading: Yahweh established the kingdom in his hand
  chosen_spanish_reading: Yahvé estableció el reino en su mano
  alternative_spanish_readings:
  - Yahvé afirmó el reino en su mano
  - Yahvé puso el reino en su mano
  rationale: Se conserva el nombre propio divino y se entiende que la estabilidad del reino es atribuida directamente a la acción de Yahvé. 'Estableció' mantiene la iniciativa soberana sin desplazar el sentido político del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el juicio auditado del texto inglés: se conserva el valor político de מִנְחָה como ''tributo'', la acción de constitución/estabilización para וַיָּכֶן, y el nombre divino como Yahvé. No se detectaron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton de manera consistente con el estándar del proyecto.
  - '''Josafat'' sigue la grafía castellana tradicional para el nombre propio, mientras que ''Judá'' permanece sin transliteración.'
  - La construcción 'en su mano' preserva la imagen hebrea y es comprensible en español bíblico moderno.
  - '''Riquezas y honor'' conserva la pareja semántica del hebreo sin introducir ''gloria'' en un contexto no teológico.'
