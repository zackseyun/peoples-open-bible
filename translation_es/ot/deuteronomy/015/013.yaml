translation:
  language: es
  text: Y cuando lo despidas libre de tu lado[a], no lo despidas con las manos vacías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y si lo despides libre de tu lado». La conjunción hebrea puede leerse como temporal («cuando») o condicional («si»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כִֽי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Cuando
  lexicon: HALOT
  rationale: La combinación hebrea puede introducir una cláusula temporal o condicional. En este contexto legal, la posibilidad se presenta como esperada y regulada, por lo que «Y cuando» conserva bien la relación con la ley precedente y suena natural en español.
- source_word: תְשַׁלְּחֶ֥/נּוּ
  english_pob_choice: you send him away
  chosen_spanish: lo despidas
  alternatives_spanish:
  - lo envíes lejos
  - lo dejes ir
  - lo liberes
  lexicon: HALOT
  rationale: El piel de שלח significa despedir o enviar fuera. «Despedir» mantiene la repetición del verbo en ambos miembros del versículo y evita suavizar la idea jurídica de manumisión.
- source_word: חָפְשִׁ֖י
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - como hombre libre
  - en libertad
  lexicon: HALOT
  rationale: El adjetivo expresa estar libre de servidumbre. «Libre» es la correspondencia más directa y natural en español, sin añadir una ampliación interpretativa innecesaria.
- source_word: מֵֽ/עִמָּ֑/ךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - de tu casa
  - de tu servicio
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «de contigo». «De ti» es la forma más directa y breve en español; otras opciones introducen matices no explícitos en el texto.
- source_word: לֹ֥א תְשַׁלְּחֶ֖/נּוּ
  english_pob_choice: you shall not send him away
  chosen_spanish: no lo despidas
  alternatives_spanish:
  - no lo envíes
  - no lo despidas así
  lexicon: HALOT
  rationale: La negación con imperfecto tiene fuerza prohibitiva. En español, el imperativo negativo comunica de manera clara esa prohibición legal sin perder el carácter normativo.
- source_word: רֵיקָֽם
  english_pob_choice: empty-handed
  chosen_spanish: con las manos vacías
  alternatives_spanish:
  - vacío
  - sin nada
  lexicon: HALOT
  rationale: El adverbio hebreo puede significar «vacío» o «vacío de manos». «Con las manos vacías» reproduce la fuerza idiomática en español y expresa la idea de no despedirlo sin provisión.
translation_notes:
  revision_awareness: 'Coincidencia alta con el audit trail inglés: se mantiene la estructura legal prospectiva, la repetición de שלח y la prohibición de despedir sin provisión; no hubo revisiones aplicadas en la versión inglesa más reciente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no presente en el versículo.
  - «Libre» se reserva para חָפְשִׁי; «despedir» para שלח, siguiendo la repetición del hebreo.
  - La nota textual refleja la ambigüedad legítima de וְ/כִי sin forzar una sola lectura.
