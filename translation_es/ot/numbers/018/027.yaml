translation:
  language: es
  text: Y vuestra contribución[a] os será contada[b] como el grano de la era y como la plenitud[c] del lagar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuestra ofrenda»; tradicionalmente «vuestra ofrenda alzada».
    reason: lexical_alternative
  - marker: b
    text: O «os será considerada» o «os será tenida por».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «la plenitud del lagar», es decir, el producto o rendimiento completo del lagar.'
    reason: source_note
lexical_decisions:
- source_word: וְנֶחְשַׁב
  english_pob_choice: will be reckoned
  chosen_spanish: os será contada
  alternatives_spanish:
  - os será considerada
  - os será acreditada
  - os será tenida por
  lexicon: HALOT / חשב
  rationale: El niphal de חשב expresa aquí que algo se considera o cuenta como equivalente en un contexto legal-cultual. "Será contada" conserva esa idea de contabilidad/atribución sin perder naturalidad en español.
- source_word: תְּרוּמַתְכֶם
  english_pob_choice: your contribution
  chosen_spanish: vuestra contribución
  alternatives_spanish:
  - vuestra ofrenda
  - vuestra ofrenda alzada
  - vuestro aporte
  lexicon: HALOT / תרומה
  rationale: תרומה designa una porción apartada para uso sagrado. "Contribución" refleja ese valor de algo entregado/apartado con claridad moderna. "Ofrenda" es posible, pero puede ser más general; "ofrenda alzada" es más técnico y menos natural.
- source_word: כַּדָּגָן
  english_pob_choice: like grain
  chosen_spanish: como el grano
  alternatives_spanish:
  - como grano
  - como el cereal
  lexicon: HALOT / דגן
  rationale: דגן refiere al grano o cereal producido. "Como el grano" mantiene la imagen agrícola de modo claro y fluido en español.
- source_word: מִן הַגֹּרֶן
  english_pob_choice: from the threshing floor
  chosen_spanish: de la era
  alternatives_spanish:
  - de la era de trillar
  - del lugar de trilla
  lexicon: HALOT / גרן
  rationale: גרן es la era o lugar de trilla. En español bíblico contemporáneo, "era" es la forma natural y fiel; conserva la metonimia del grano ya cosechado.
- source_word: וְכַמְלֵאָה
  english_pob_choice: and like the fullness
  chosen_spanish: como la plenitud
  alternatives_spanish:
  - como el lleno
  - como la cosecha plena
  - como el producto pleno
  lexicon: HALOT / מלאה
  rationale: מְלֵאָה alude al lleno, al producto completo. "Plenitud" preserva la imagen de totalidad y la conexión con el fruto completo del lagar, sin reducirlo a una paráfrasis demasiado explicativa.
- source_word: מִן הַיָּקֶב
  english_pob_choice: from the winepress
  chosen_spanish: del lagar
  alternatives_spanish:
  - de la prensa
  - de la prensa de vino
  lexicon: HALOT / יקב
  rationale: יֶקֶב designa el lagar o prensa de vino. "Lagar" es preciso, breve y corresponde al paralelismo agrícola con la era.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo WLC y toma como guía el audit trail inglés: נֶחְשַׁב como "reckoned", תְּרוּמָה como una porción/contribución sagrada, y מְלֵאָה como "fullness". Se conserva el paralelismo agrícola con "grano de la era" y "plenitud del lagar" sin añadir elementos ausentes del original.'
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque este versículo no contiene el tetragrámaton ni un sustituto directo.
  - Se usa "contribución" para תרומה de manera consistente con el valor de porción apartada; "ofrenda" queda como alternativa en nota.
  - '"Era" y "lagar" mantienen el paralelismo agrícola tradicional en un registro bíblico claro.'
  - La forma "os será contada" conserva el matiz de ser considerada/contada, siguiendo la tensión lexical del hebreo y del inglés auditado.
