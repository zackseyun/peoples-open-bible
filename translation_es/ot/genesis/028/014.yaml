    reason: alternative_reading
  revision_rationale: Se conserva la traducción base porque es fiel y natural, pero se corrige el anclaje de la nota para alinearlo con la ambigüedad real del verbo hebreo נִבְרֲכוּ. También se suaviza la serie direccional con «hacia» repetido, que refleja bien el valor direccional del hebreo y mejora la fluidez en español.
