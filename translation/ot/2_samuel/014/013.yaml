id: 2SA.14.13
reference: 2 Samuel 14:13
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ הָֽ/אִשָּׁ֔ה וְ/לָ֧/מָּה חָשַׁ֛בְתָּה כָּ/זֹ֖את עַל עַ֣ם אֱלֹהִ֑ים וּ/מִ/דַּבֵּ֨ר הַ/מֶּ֜לֶךְ הַ/דָּבָ֤ר הַ/זֶּה֙ כְּ/אָשֵׁ֔ם לְ/בִלְתִּ֛י הָשִׁ֥יב הַ/מֶּ֖לֶךְ אֶֽת נִדְּחֽ/וֹ־־׃
translation:
  text: Then the woman said[a], “Why then have you planned such a thing against the people of God? For in speaking this word, the king is like one who is guilty[b], because the king has not brought back his banished one.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have you thought/devised such a thing against the people of God?'
    reason: lexical_alternative
  - marker: b
    text: Or 'the king is as one guilty,' that is, his own judgment implies his guilt for not bringing back the one banished from him.
    reason: alternative_reading
lexical_decisions:
- source_word: חָשַׁבְתָּה
  chosen: have you planned
  alternatives:
  - have you thought
  - have you devised
  lexicon: HALOT
  rationale: חשב can denote thinking, planning, or devising. In this confrontational context, where the woman applies her parable to David's treatment of Absalom, 'planned' best captures intentional policy rather than mere internal thought.
- source_word: כָּזֹאת
  chosen: such a thing
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: The demonstrative points to the kind of action just implied by the parable's logic. 'Such a thing' is idiomatic English and preserves the accusatory force.
- source_word: עַל עַם אֱלֹהִים
  chosen: against the people of God
  alternatives:
  - concerning the people of God
  - toward the people of God
  lexicon: HALOT
  rationale: With חשב and על, the sense is hostile or adverse in context. Since the king's failure affects the covenant community through the royal house, 'against' best reflects the woman's rebuke.
- source_word: וּמִדַּבֵּר הַמֶּלֶךְ הַדָּבָר הַזֶּה
  chosen: For in speaking this word, the king
  alternatives:
  - and by speaking this thing, the king
  - when the king speaks this word
  lexicon: HALOT
  rationale: 'The prefixed מ with infinitive construct is best taken as causal or circumstantial: the king, by uttering this judgment, condemns himself by implication. ''This word'' keeps the concrete Hebrew noun while remaining natural.'
- source_word: כְּאָשֵׁם
  chosen: is like one who is guilty
  alternatives:
  - is as one guilty
  - stands guilty
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison, not a direct declaration alone. ''Like one who is guilty'' preserves the simile and the rhetorical strategy: his own ruling places him in the position of the guilty.'
- source_word: לְבִלְתִּי
  chosen: because ... not
  alternatives:
  - in that ... not
  - for not
  lexicon: HALOT
  rationale: This construction introduces the ground of the accusation. Rendering it causally in English makes the syntax clear without over-paraphrasing.
- source_word: הָשִׁיב
  chosen: has not brought back
  alternatives:
  - has not restored
  - has not returned
  lexicon: HALOT
  rationale: שוב in the Hiphil commonly means 'bring back' or 'restore.' Here the object is a person in exile from the royal presence, so 'brought back' is the most concrete fit.
- source_word: נִדְּחוֹ
  chosen: his banished one
  alternatives:
  - his outcast
  - the one driven away by him
  lexicon: HALOT
  rationale: The passive participial form from נדח denotes one driven away or banished. 'His banished one' is concise, preserves the singular, and fits the immediate reference to Absalom while allowing the rhetorical generality of the woman's wording.
