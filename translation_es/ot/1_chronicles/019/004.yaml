  to: Así que Hanún tomó a los servidores de David[a], los rasuró, cortó sus vestidos en dos hasta las caderas[b], y los envió de vuelta.
  rationale: Se ajustó 'siervos' a 'servidores' por naturalidad contextual en una misión diplomática; se reemplazó 'los despidió' por 'los envió de vuelta' para reflejar mejor וַיְשַׁלְּחֵם; y se precisó la nota [b] para conservar la especificidad léxica del hebreo sin perder el registro formal del texto principal.
