translation:
  language: es
  text: Y después de calentar afilados espetones[a], los aplicaban a su espalda; y, tras atravesarle los costados, le quemaban las entrañas a partir de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Espetones» traduce ὀβελίσκους con un instrumento de punta o asador pequeño; otras posibilidades serían «varillas afiladas» o «asadores».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega ἀπʼ αὐτοῦ es literalmente «de él». «A partir de él» conserva en español la referencia pronominal de forma más natural que una construcción como «de él», sin expandirla a una paráfrasis interpretativa como «desde dentro de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀβελίσκους
  english_pob_choice: spits
  chosen_spanish: espetones
  alternatives_spanish:
  - asadores
  - ensartes
  - varillas afiladas
  lexicon: LSJ
  rationale: ὀβελίσκος designa un pequeño asador o instrumento punzante semejante a un espetón. «Espetones» conserva la imagen del instrumento y su función de perforar, sin volverlo demasiado técnico o moderno.
- source_word: ὀξεῖς
  english_pob_choice: sharp
  chosen_spanish: afilados
  alternatives_spanish:
  - agudos
  - puntiagudos
  lexicon: LSJ
  rationale: El adjetivo subraya el carácter punzante del instrumento. «Afilados» es natural en español y comunica bien la cualidad cortante/punzante del objeto.
- source_word: πυρώσαντες
  english_pob_choice: after heating
  chosen_spanish: después de calentar
  alternatives_spanish:
  - habiendo calentado
  - tras poner al fuego
  lexicon: LSJ
  rationale: El participio antecede a la acción principal y expresa una acción previa. «Después de calentar» conserva la secuencia sin forzar un giro más arcaico.
- source_word: τοῖς νώτοις προσέφερον
  english_pob_choice: they applied them to his back
  chosen_spanish: los aplicaban a su espalda
  alternatives_spanish:
  - los ponían sobre su espalda
  - los acercaban a su espalda
  - los presionaban contra su espalda
  lexicon: LSJ
  rationale: προσφέρω aquí indica llevar/aplicar algo al cuerpo de la víctima. «Los aplicaban a su espalda» mantiene la idea de contacto torturador con un español claro; el imperfecto reproduce la acción continuada.
- source_word: τὰ πλευρά
  english_pob_choice: his sides
  chosen_spanish: los costados
  alternatives_spanish:
  - las costillas
  - los flancos
  lexicon: LSJ
  rationale: πλευρά puede ser «costados», «lados» o «flancos». «Costados» conserva la amplitud anatómica y resulta más natural que «costillas», que sería demasiado específico.
- source_word: διαπείραντες
  english_pob_choice: after piercing
  chosen_spanish: tras atravesarle
  alternatives_spanish:
  - después de perforarle
  - después de traspasarle
  lexicon: LSJ
  rationale: El participio expresa penetración a través de algo. «Atravesarle» recoge la idea de perforar de lado a lado con la concisión que pide el pasaje.
- source_word: τὰ σπλάγχνα
  english_pob_choice: his entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - los intestinos
  - las vísceras
  lexicon: LSJ
  rationale: En este contexto físico, σπλάγχνα nombra las entrañas o vísceras, no un uso afectivo. «Entrañas» preserva el tono visceral y es idiomático en español bíblico sin sonar eufemístico.
- source_word: διέκαιον
  english_pob_choice: they burned
  chosen_spanish: le quemaban
  alternatives_spanish:
  - lo abrasaban
  - lo consumían con fuego
  lexicon: LSJ
  rationale: El imperfecto describe acción en curso dentro de la escena de tortura. «Le quemaban» es directo, continuo e idiomático.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - desde dentro de él
  - a partir de él
  lexicon: LSJ
  rationale: La frase es literalmente «de él». En español, «le quemaban las entrañas de él» sería extraño; «de él» mantiene la referencia pronominal y evita expandir el sentido más allá del griego, aunque la coordinación con el contexto deja claro que el daño alcanza su interior.
theological_decisions:
- issue: Valor del lenguaje corporal y visceral en una escena de martirio
  english_pob_reading: 'The English keeps the torture imagery concrete: back, sides, entrails, and the difficult phrase ἀπʼ αὐτοῦ is rendered literally as ''from it'' in the revision.'
  chosen_spanish_reading: 'Se conserva la concreción corporal: espalda, costados y entrañas, y se mantiene una referencia literal en «de él» para ἀπʼ αὐτοῦ sin convertirla en una paráfrasis interpretativa.'
  alternative_spanish_readings:
  - «desde dentro de él»
  - «desde su interior»
  rationale: El pasaje no ofrece una reflexión moral, sino una descripción brutal. En español conviene sostener esa crudeza sin suavizarla ni añadir explicación devocional.
  doctrine_reference: Martirio y sufrimiento corporal en 4 Macabeos; fidelidad descriptiva del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que prefirió «from it» para ἀπʼ αὐτοῦ en vez de «from within». La propuesta española mantiene esa literalidad mediante «de él», evitando una expansión interpretativa y conservando el nexo con la descripción precedente del tormento. También se siguió la decisión inglesa de tratar ὀβελίσκους como instrumento tipo spit/skewer y no como «spikes» genérico.
  spanish_consistency_notes:
  - Se usó «entrañas» para τὰ σπλάγχνα, en coherencia con el valor corporal del pasaje y con el registro bíblico español.
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente; el verso es narrativo y no contiene vocabulario divino.
  - El imperfecto plural («aplicaban», «quemaban») reproduce el desarrollo continuo de la escena.
  - Se prefirió «costados» a «costillas» para no restringir excesivamente πλευρά.
