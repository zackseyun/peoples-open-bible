  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales están bien: edad idiomática, fórmula de acceso al trono, reinó un año, Jerusalén, y ''hija de Omrí'' en el texto principal. La desalineación está en la gestión de la alternativa léxica documentada para בַּת עָמְרִי, que debe preservarse con nota en español.'
