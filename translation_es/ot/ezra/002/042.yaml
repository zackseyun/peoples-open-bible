translation:
  language: es
  text: 'Los hijos de los porteros[a]: los hijos de Salum, los hijos de Ater, los hijos de Talmón, los hijos de Acub, los hijos de Hatitá, los hijos de Sobai, en total ciento treinta y nueve.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Porteros» traduce el oficio del templo que el inglés POB rinde como «gatekeepers»; en un registro más literal también podría decirse «guardianes de la puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En una lista genealógica o de afiliación por clan, בְּנֵי presenta pertenencia por linaje. «Los hijos de» conserva la estructura repetitiva del hebreo y el registro de lista, y en español bíblico resulta natural y transparente.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardas de la puerta
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: Aquí el término designa a quienes servían en las puertas del templo. En español, «porteros» comunica la función histórica de manera concisa; «gatekeepers» en inglés se traduce mejor por esta forma tradicional pero aún inteligible. Se evita «guardianes» porque puede sugerir una función más amplia que el oficio concreto del pasaje.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Sallum
  lexicon: convención onomástica bíblica
  rationale: Nombre propio hebreo transliterado al uso bíblico español. «Salum» mantiene cercanía fonética y es una forma publicable y reconocible en español.
- source_word: אָטֵר
  english_pob_choice: Ater
  chosen_spanish: Ater
  alternatives_spanish:
  - Atér
  lexicon: convención onomástica bíblica
  rationale: Se conserva el nombre propio sin traducción. La forma llana «Ater» es transparente en español bíblico y respeta la transliteración.
- source_word: טַלְמוֹן
  english_pob_choice: Talmon
  chosen_spanish: Talmón
  alternatives_spanish:
  - Talmon
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado; se añade tilde para adaptar la acentuación al español y facilitar la lectura pública.
- source_word: עַקּוּב
  english_pob_choice: Akkub
  chosen_spanish: Acub
  alternatives_spanish:
  - Akkub
  lexicon: convención onomástica bíblica
  rationale: Se translitera el nombre propio a una forma natural en español. «Acub» evita una grafía excesivamente técnica y sigue la práctica habitual de adaptar nombres bíblicos al sistema ortográfico español.
- source_word: חֲטִיטָא
  english_pob_choice: Hatita
  chosen_spanish: Hatitá
  alternatives_spanish:
  - Hatita
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado con acento gráfico para indicar la sílaba tónica final en español. Esto mejora la pronunciación pública sin alterar la base consonántica.
- source_word: שֹׁבָי
  english_pob_choice: Shobai
  chosen_spanish: Sobai
  alternatives_spanish:
  - Shobai
  lexicon: convención onomástica bíblica
  rationale: Se adapta el nombre propio al español usando «S» para la consonante inicial sibilante, manteniendo una transliteración clara y legible.
- source_word: הַכֹּל
  english_pob_choice: all together
  chosen_spanish: en total
  alternatives_spanish:
  - todos juntos
  - el total
  lexicon: HALOT
  rationale: En una cifra censal, הַכֹּל introduce el total resultante. «En total» es idiomático en español y conserva el valor resumidor sin añadir interpretación.
- source_word: מֵאָה שְׁלֹשִׁים וְתִשְׁעָה
  english_pob_choice: one hundred thirty-nine
  chosen_spanish: ciento treinta y nueve
  alternatives_spanish:
  - ciento treinta y nueve personas
  lexicon: gramática numérica del español
  rationale: El número cardinal se vierte con la forma estándar española. No se añade «personas» porque el hebreo sólo da el total, no repite el sustantivo.
translation_notes:
  revision_awareness: La traducción inglesa auditada no presenta notas ni revisiones sustantivas; la cruzada coincide en alto grado y no exige cambios textuales. La única decisión sensible en español es la elección de una denominación natural para הַשֹּׁעֲרִים y la adaptación gráfica de los nombres propios.
  spanish_consistency_notes:
  - Se mantiene la fórmula genealógica repetida «los hijos de» para reflejar la estructura del hebreo.
  - Los nombres propios se transliteran de forma consistente y con acentuación sólo cuando mejora la lectura en español.
  - «En total» preserva el valor sumario del hebreo sin convertirlo en una paráfrasis libre.
