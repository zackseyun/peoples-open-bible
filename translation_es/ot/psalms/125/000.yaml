revisions:
- from: 'Cántico de ascenso[a]. Los que confían en Yahvé son como el monte Sion: no será sacudido; permanece para siempre.'
  to: 'Cántico de las subidas. Los que confían en Yahvé son como el monte Sion: no será movido[a]; permanece para siempre.'
  rationale: Se corrige el superscrito para reflejar el plural hebreo de forma natural en español («Cántico de las subidas»). Se ajusta לֹא יִמּוֹט a «no será movido», que corresponde mejor al matiz formal documentado en la auditoría inglesa, dejando «no será sacudido» como alternativa idiomática en nota. El resto del versículo se mantiene por ser fiel, claro y consistente con la terminología del proyecto.
