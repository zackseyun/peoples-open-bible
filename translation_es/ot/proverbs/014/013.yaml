translation:
  language: es
  text: Aún en la risa el corazón puede doler[a], y el fin de la alegría[b] es tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aún en la risa, el corazón duele»; el imperfecto hebreo puede leerse como una afirmación proverbial general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el desenlace de la alegría es tristeza» o «después de la alegría viene tristeza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - Incluso
  - También
  lexicon: HALOT
  rationale: גַּם aquí intensifica la afirmación con sentido concesivo; «Aun» comunica bien que, pese a la risa, la realidad dolorosa puede estar presente.
- source_word: בִּשְׂחוֹק
  english_pob_choice: in laughter
  chosen_spanish: en la risa
  alternatives_spanish:
  - mientras se ríe
  - en la alegría ruidosa
  lexicon: HALOT
  rationale: El sustantivo concreto «risa» conserva la imagen del hebreo y suena natural en español; la preposición «en» reproduce de forma idiomática el valor de בְּ.
- source_word: יִכְאַב
  english_pob_choice: may ache
  chosen_spanish: puede doler
  alternatives_spanish:
  - duele
  - puede sufrir dolor
  - puede estar adolorido
  lexicon: HALOT
  rationale: El imperfecto hebreo en proverbio expresa una verdad general o posible; «puede doler» refleja esa apertura sin fijarlo como presente absoluto.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el corazón interior
  - la mente
  lexicon: HALOT
  rationale: En sabiduría bíblica, לֵב designa la sede interior de la persona; «corazón» es la equivalencia española más transparente y estable.
- source_word: וְאַחֲרִיתָהּ
  english_pob_choice: and the end of
  chosen_spanish: y el fin de
  alternatives_spanish:
  - y el resultado de
  - y el desenlace de
  - y su final
  lexicon: HALOT
  rationale: אַחֲרִית puede ser fin, resultado o desenlace; «el fin de» es conciso y mantiene la relación con «alegría» como su término u outcome.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: la alegría
  alternatives_spanish:
  - el gozo
  - la dicha
  - la felicidad
  lexicon: HALOT
  rationale: «Alegría» es el equivalente más natural y claro en español para שִׂמְחָה en este proverbio, además de contrastar bien con «tristeza».
- source_word: תוּגָה
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - pesar
  - aflicción
  lexicon: HALOT
  rationale: תוּגָה abarca tristeza, pesar y aflicción; «tristeza» ofrece un contraste claro con «alegría» sin sobreactuar el matiz.
translation_notes:
  revision_awareness: Coincide con el control más reciente y no requiere revisión adicional; se conserva la oscilación proverbial del imperfecto hebreo mediante «puede doler».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y proverbial, sin añadir interpretaciones ajenas al paralelismo hebreo.
  - Se prefirió «alegría»/«tristeza» por claridad y naturalidad, aunque «gozo»/«pesar» siguen siendo alternativas válidas en el mismo campo semántico.
  - Los marcadores de nota [a][b] se colocan en el texto para reflejar las dos alternativas léxicas preservadas por el audit trail inglés.
