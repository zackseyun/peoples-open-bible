translation:
  language: es
  text: Pues así como los que fueron esclavizados por sus pasiones comieron manjares refinados—porque decíamos que habían sido vencidos por estas cosas—[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Manjares refinados'' traduce el verbo raro ἡμεροφάγησαν; también puede entenderse como ''comieron alimentos lujosos'' o ''vivieron con refinamiento''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Pues así como
  alternatives_spanish:
  - Porque así como
  - Así como
  lexicon: LSJ
  rationale: Mantiene el valor explicativo de γάρ y el comparativo de ὥσπερ en un español natural. 'Pues así como' conserva la transición argumentativa sin sonar rígido.
- source_word: τοῖς πάθεσιν δουλωθέντες
  english_pob_choice: enslaved to their passions
  chosen_spanish: los que fueron esclavizados por sus pasiones
  alternatives_spanish:
  - los esclavizados por sus pasiones
  - los que fueron hechos esclavos de sus pasiones
  - los sometidos a sus pasiones
  lexicon: BDAG/LSJ
  rationale: '''Esclavizados'' preserva la metáfora fuerte de δουλωθέντες y evita suavizarla a ''sometidos'' o ''serviles''. ''Pasiones'' conserva el marco moral-filosófico de πάθη que documenta la audit trail inglesa.'
- source_word: ἡμεροφάγησαν
  english_pob_choice: ate delicacies
  chosen_spanish: comieron manjares delicados
  alternatives_spanish:
  - comieron manjares refinados
  - comieron alimentos delicados
  - vivieron con refinamiento
  lexicon: LSJ
  rationale: El verbo raro apunta a consumo lujoso/refinado. 'Manjares delicados' comunica indulgencia alimentaria con dignidad literaria en español, sin ampliar indebidamente a un modo de vida general.
- source_word: ἐλέγομεν γὰρ
  english_pob_choice: for we said
  chosen_spanish: porque decíamos
  alternatives_spanish:
  - pues decíamos
  - porque dijimos
  - pues dijimos
  lexicon: BDAG/LSJ
  rationale: El imperfecto puede expresar una observación repetida o de fondo. 'Decíamos' refleja mejor el valor imperfectivo que un simple pasado puntual, y encaja con el paréntesis explicativo.
- source_word: τούτοις νενικῆσθαι
  english_pob_choice: had been conquered by these things
  chosen_spanish: habían sido vencidos por estas cosas
  alternatives_spanish:
  - habían sido conquistados por estas cosas
  - habían sido derrotados por estas cosas
  - eran dominados por estas cosas
  lexicon: BDAG/LSJ
  rationale: '''Vencidos'' mantiene la imagen de derrota del perfecto infinitivo de νικάω. ''Estas cosas'' remite con claridad a las pasiones/los manjares, como en la lectura inglesa, sin introducir una interpretación más concreta que el texto.'
theological_decisions:
- issue: Sentido de πάθη en un contexto ético-filosófico
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - sufrimientos
  - emociones
  - deseos
  rationale: En 4 Macabeos el término pertenece al contraste entre razón y pasiones; 'pasiones' preserva ese registro sin confundirlo con padecimientos físicos ni reducirlo a emociones modernas.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source meaning over tradition.'
- issue: Metáfora de esclavitud en δουλωθέντες
  english_pob_reading: enslaved
  chosen_spanish_reading: fueron esclavizados
  alternative_spanish_readings:
  - fueron sometidos
  - fueron hechos siervos
  - fueron dominados
  rationale: La metáfora de esclavitud es central y no debe atenuarse. 'Esclavizados' conserva la fuerza del vínculo y la imagen de falta de libertad que subraya la victoria de las pasiones sobre ellos.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave (context-dependent); use ''slave'' where bonded nature is salient.'
translation_notes:
  revision_awareness: La redacción sigue la puntuación revisada del inglés, colocando la cláusula parentética entre rayas para reflejar con naturalidad el comentario explicativo. Se conservó la estructura comparativa del griego y la fuerza metafórica de la esclavitud y la derrota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo 'pasiones' para πάθη conforme al marco ético-filosófico de 4 Macabeos.
  - Se preservó la metáfora de esclavitud con 'esclavizados' para no suavizar δουλωθέντες.
  - Se evitó 'Cristo'/'Mesías' por no ser pertinente en este versículo.
  - La nota al pie se ancló en 'manjares delicados' porque allí está la principal ambigüedad léxica del verbo raro.
