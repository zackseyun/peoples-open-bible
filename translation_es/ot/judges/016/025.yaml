revisions:
- from: 'Y cuando el corazón de ellos estaba alegre[a], dijeron: «Llamen a Sansón, para que nos entretenga». Y llamaron a Sansón desde la casa de los presos[b], y él los entretuvo. Entonces lo pusieron entre las columnas.'
  to: 'Y cuando sus corazones estaban alegres[a], dijeron: «Llamen a Sansón, para que nos entretenga». Entonces llamaron a Sansón de la casa de la prisión[b], y él los entretuvo delante de ellos. Y lo hicieron ponerse de pie entre las columnas.'
  rationale: 'Se revisa para mejorar la naturalidad y fidelidad al hebreo y al audit trail inglés: ''sus corazones'' evita un calco torpe; ''de la casa de la prisión'' conserva mejor la concreción de ''prison house'' con apoyo de nota; ''delante de ellos'' hace visible el aspecto público de la acción; y ''lo hicieron ponerse de pie'' preserva la fuerza causativa de וַיַּעֲמִידוּ. También se corrige la nota a para no alterar el sentido de la alternativa inglesa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y en general preserva el sentido: alegría festiva, llamado a Sansón, entretenimiento/espectáculo, salida del lugar de encierro y colocación entre los soportes. Sin embargo, hay ajustes necesarios para reflejar mejor el plural de לִבָּם (''sus corazones'' o una reformulación idiomática plural), el matiz de מִבֵּית הָאֲסִירִים (''casa de la prisión'' / ''prisión'') sin la torpeza de ''casa de los presos'', y especialmente la fuerza causativa de וַיַּעֲמִידוּ (''lo hicieron ponerse/de pie'' o ''lo hicieron estar de pie''), que ''lo pusieron'' atenúa.'
  spanish_quality_summary: 'El español es comprensible, pero tiene varios giros poco naturales o mejorables: ''el corazón de ellos'' suena calcado; ''casa de los presos'' y la nota asociada resultan extrañas en español; y la nota a usa ''haga burla de nosotros'', cuando el inglés auditado dice ''make sport for us'', no ''of us''. También conviene mantener la simetría con ''delante de ellos'' en la cláusula de desempeño público.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales concuerdan en buena medida con el rastro inglés: ''Sansón'', ''entretenga'', y ''columnas/pilares'' son aceptables. Aun así, para alinearse mejor con la auditoría POB, se prefiere ''de la casa de la prisión'' o una nota que explique el hebreo literal, y una formulación más explícita del causativo final.'
  issues:
  - severity: medium
    issue: '''el corazón de ellos estaba alegre'' no refleja bien el plural ni suena natural'
    rationale: לִבָּם es 'su corazón' colectivo o idiomáticamente 'sus corazones'; en español 'el corazón de ellos' es calcado. 'cuando sus corazones estaban alegres' o 'cuando estaban alegres' comunica mejor el modismo.
  - severity: medium
    issue: '''desde la casa de los presos'' es poco natural y la nota b no ayuda suficiente'
    rationale: מִבֵּית הָאֲסִירִים se entiende mejor como 'de la casa de la prisión' / 'de la prisión'. El inglés POB usa 'prison house' y su nota explica el hebreo literal. En español, el texto principal puede decir 'de la prisión' o 'de la casa de la prisión' con nota aclaratoria.
  - severity: high
    issue: '''Entonces lo pusieron entre las columnas'' debilita el causativo de וַיַּעֲמִידוּ'
    rationale: El hebreo dice que lo hicieron estar de pie / lo hicieron ponerse entre las columnas. 'Lo pusieron' comunica colocación, pero pierde parte de la fuerza de control físico destacada en la auditoría inglesa.
  - severity: low
    issue: La nota a dice 'haga burla de nosotros' en vez de algo como 'haga espectáculo para nosotros' o 'haga diversión para nosotros'
    rationale: El audit trail inglés dice 'make sport for us', no 'mock us'. 'Burla de nosotros' cambia el blanco de la burla y puede confundir el sentido.
  - severity: low
    issue: La cláusula 'y él los entretuvo' podría expresar más claramente el desempeño público
    rationale: Aunque es aceptable, el hebreo incluye 'delante de ellos'. Conviene preservarlo en la nota o en el texto con 'los entretuvo delante de ellos' / 'actuó delante de ellos', pero sin volverlo pesado.
  revised_spanish_text: 'Y cuando sus corazones estaban alegres[a], dijeron: «Llamen a Sansón, para que nos entretenga». Entonces llamaron a Sansón de la casa de la prisión[b], y él los entretuvo delante de ellos. Y lo hicieron ponerse de pie entre las columnas.'
  revised_footnotes:
  - marker: a
    text: O «para que actúe para nosotros» o «para que haga espectáculo para nosotros». El verbo hebreo puede denotar diversión, burla o una presentación pública.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la casa de los prisioneros», es decir, de la casa de la prisión.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad y fidelidad al hebreo y al audit trail inglés: ''sus corazones'' evita un calco torpe; ''de la casa de la prisión'' conserva mejor la concreción de ''prison house'' con apoyo de nota; ''delante de ellos'' hace visible el aspecto público de la acción; y ''lo hicieron ponerse de pie'' preserva la fuerza causativa de וַיַּעֲמִידוּ. También se corrige la nota a para no alterar el sentido de la alternativa inglesa.'
