translation:
  language: es
  text: Estuvieron en su lugar, conforme a su costumbre[a], conforme a la ley de Moisés, el hombre de Dios. Los sacerdotes estaban rociando la sangre[b] de la mano de los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según su ordenanza». El hebreo puede referirse a la práctica establecida para este rito.'
    reason: alternative_reading
  - marker: b
    text: 'O: «arrojando»; el verbo hebreo describe la aplicación ritual de la sangre. «Rociando» comunica mejor ese sentido en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: They stood
  chosen_spanish: Se mantuvieron
  alternatives_spanish:
  - Se pusieron de pie
  - Permanecieron
  lexicon: HALOT
  rationale: En este contexto ritual, עמד expresa la acción de ocupar o conservar la posición asignada. «Se mantuvieron» comunica bien la permanencia en el puesto sin perder el matiz posicional.
- source_word: עַל עָמְדָם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en su estación
  lexicon: HALOT
  rationale: La expresión hebrea se refiere al lugar o estación asignados. «En su lugar» es natural en español y conserva la idea de posición cultual.
- source_word: כְּמִשְׁפָּטָם
  english_pob_choice: according to their custom
  chosen_spanish: conforme a su costumbre
  alternatives_spanish:
  - según su ordenanza
  - según lo prescrito para ellos
  - conforme a su regla
  lexicon: HALOT
  rationale: En contexto sacerdotal, מִשְׁפָּט puede apuntar al procedimiento establecido. El audit trail inglés optó por «custom» para mayor naturalidad; en español, «costumbre» mantiene esa fluidez, aunque deja visible la idea de práctica regulada.
- source_word: כְּתוֹרַת מֹשֶׁה
  english_pob_choice: according to the law of Moses
  chosen_spanish: conforme a la ley de Moisés
  alternatives_spanish:
  - según la ley de Moisés
  - de acuerdo con la instrucción de Moisés
  lexicon: HALOT
  rationale: תּוֹרָה aquí remite a la instrucción legal mosaica sobre el rito pascual. «Ley de Moisés» es la equivalencia más clara y asentada en español.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el hombre que pertenece a Dios
  lexicon: HALOT
  rationale: Es un título bíblico fijo para Moisés. «El hombre de Dios» preserva la fórmula solemne y reconocible sin suavizarla.
- source_word: הַכֹּהֲנִים
  english_pob_choice: The priests
  chosen_spanish: Los sacerdotes
  alternatives_spanish:
  - Los sacerdotes levitas
  lexicon: HALOT
  rationale: En el marco del templo y la Pascua, כֹּהֲנִים se traduce de forma estándar como «sacerdotes».
- source_word: זֹרְקִים
  english_pob_choice: were sprinkling
  chosen_spanish: estaban salpicando
  alternatives_spanish:
  - estaban rociando
  - estaban esparciendo
  lexicon: HALOT
  rationale: El verbo זרק con sangre tiene sentido ritual de aplicación de la sangre. En español, «salpicar» comunica el movimiento de proyectar la sangre, aunque también puede sugerir el gesto ritual; se mantiene sin forzar una terminología más interpretativa que el hebreo.
- source_word: אֶת הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre sacrificial
  lexicon: HALOT
  rationale: Objeto directo del acto sacerdotal; la referencia sacrificial queda implícita en el contexto.
- source_word: מִיַּד הַלְוִיִּם
  english_pob_choice: from the hand of the Levites
  chosen_spanish: de la mano de los levitas
  alternatives_spanish:
  - desde la mano de los levitas
  - de parte de los levitas
  lexicon: HALOT
  rationale: La expresión es literalmente «de la mano de». Se conserva la formulación para no perder la imagen de transferencia ritual; el español admite esta construcción.
theological_decisions:
- issue: Aplicación ritual de la sangre
  english_pob_reading: were sprinkling the blood
  chosen_spanish_reading: estaban salpicando la sangre
  alternative_spanish_readings:
  - estaban rociando la sangre
  - estaban arrojando la sangre
  rationale: El contexto es la Pascua conforme a la ley mosaica. Se evita «arrojar», que suena más brusco y menos técnico; «salpicar» mantiene la acción física sin añadir una terminología litúrgica posterior no explicitada por el hebreo.
  doctrine_reference: Éxodo 12; Levítico 17:11
translation_notes:
  revision_awareness: 'El español sigue de cerca el audit trail inglés, pero ajusta dos decisiones para naturalidad y transparencia: מִשְׁפָּטָם se vierte como «costumbre», en línea con la revisión inglesa, y מִיַּד הַלְוִיִּם se conserva literalmente como «de la mano de los levitas» sin añadir «recibida». También se evita «ordenanza» en el texto principal porque el propio expediente revisado lo descartó por menos natural en este contexto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Ley de Moisés» se conserva como fórmula estable para תוֹרָה en contexto legal/cultual.
  - «El hombre de Dios» reproduce el título fijo sin expansión interpretativa.
  - La preposición «de la mano de» se preserva para reflejar la imagen semítica de transferencia ritual.
