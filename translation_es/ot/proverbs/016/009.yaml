translation:
  language: es
  text: El corazón del hombre planea su camino[a], pero Yahvé establece sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dirige sus pasos». El verbo hebreo puede significar «hacer firme», «establecer» o, por el contexto, «dirigir».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: לֵב en antropología hebrea designa el centro interior de pensamiento e intención, no solo emoción. «Corazón» conserva la imagen hebrea y suena natural en español bíblico contemporáneo.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la persona
  - de la humanidad
  lexicon: HALOT
  rationale: El singular genérico hebreo se refiere a un ser humano individual en sentido representativo. «Del hombre» mantiene ese valor genérico y la forma proverbial breve del original.
- source_word: יְחַשֵּׁב
  english_pob_choice: plans
  chosen_spanish: planea
  alternatives_spanish:
  - piensa su camino
  - traza su camino
  - diseña
  lexicon: HALOT
  rationale: El piel de חשׁב aquí expresa planificación intencional. «Planea» comunica esa intención con naturalidad en español y evita tanto la literalidad mecánica como una connotación técnica excesiva.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su curso
  - su manera de vivir
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino literal o curso de vida. «Camino» conserva la metáfora hebrea y encaja bien con «pasos» en el segundo hemistiquio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la norma del proyecto, preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: יָכִין
  english_pob_choice: establishes
  chosen_spanish: establece
  alternatives_spanish:
  - dirige
  - afirma
  - hace firme
  lexicon: HALOT
  rationale: El hiphil de כון significa hacer firme, establecer o poner en orden. «Establece» refleja bien esa fuerza causal sin reducirla solo a guía providencial.
- source_word: צַעֲדוֹ
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus pisadas
  - su andar
  lexicon: HALOT
  rationale: Aunque el sustantivo está en singular con sufijo, suele funcionar colectivamente. «Sus pasos» es idiomático en español y conserva la imagen concreta del avance vital.
theological_decisions:
- issue: Tensión entre planificación humana y soberanía divina
  english_pob_reading: The verse preserves both genuine human planning and Yahweh's decisive establishing of the person's steps without collapsing the proverb into determinism or mere permission.
  chosen_spanish_reading: El versículo conserva tanto la planificación real del ser humano como el obrar decisivo de Yahvé al establecer sus pasos, sin resolver la tensión proverbial.
  alternative_spanish_readings:
  - Yahvé dirige sus pasos
  - Yahvé determina sus pasos
  rationale: «Establece» conserva mejor la tensión del hebreo que «dirige» o «determina». «Dirige» puede inclinar la lectura hacia mera orientación; «determina» puede sonar demasiado fuerte para el matiz proverbial.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador mantiene la concordancia alta con el audit trail inglés y conserva la tensión entre la planificación humana y la soberanía de Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Corazón» conserva el valor antropológico hebreo de לֵב como sede de intención y pensamiento.
  - «Establece» mantiene la amplitud semántica de יָכִין sin estrecharla solo a «dirige».
  - La nota al pie se ancla en «camino» porque allí aparece la alternativa verbal documentada en el audit trail inglés.
