revisions:
- from: 'Y sucederá en aquel día: no habrá luz[a]; los gloriosos se congelarán.'
  to: 'Y sucederá en aquel día: no habrá luz[a]; los resplandores se congelarán.'
  rationale: Se reemplaza «los gloriosos» por «los resplandores» para preservar mejor el posible sentido de entidades brillantes o luminosas en יְקָרוֹת, evitando una lectura de personas gloriosas que el español sugiere con demasiada fuerza. Se conserva «se congelarán» y la nota alternativa para mantener la dificultad y ambigüedad del texto masorético.
