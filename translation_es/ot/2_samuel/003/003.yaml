    issue: ‘el ceneo’ traduce incorrectamente הַכַּרְמְלִי
    rationale: El hebreo identifica a Nabal como ‘el carmelita’/‘de Carmel’. ‘Ceneo’ corresponde a otro gentilicio y altera el referente histórico-geográfico del texto.
  - severity: medium
