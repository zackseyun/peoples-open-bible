translation:
  language: es
  text: Y los entregaré en manos de los que buscan la vida de ellos[a], y en manos de Nabucodonosor, rey de Babilonia, y en manos de sus siervos. Pero después habitará como en los días de antaño, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que buscan matarlos'; hebreo literalmente, 'los que buscan la vida de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  english_pob_choice: And I will give them
  chosen_spanish: Y los entregaré
  alternatives_spanish:
  - Y los daré
  - Y los pondré
  lexicon: HALOT
  rationale: En este contexto hostil, en español 'entregar' comunica mejor la idea de ser puesto en poder de otros que un simple 'dar', sin perder la transparencia del verbo נתן con sufijo objeto.
- source_word: בְיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión hebrea se conserva con el modismo español natural 'en manos de', que mantiene la imagen de dominio y entrega sin volverla explicativa de más.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: those who seek their life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que buscan matarlos
  - sus perseguidores
  lexicon: HALOT
  rationale: Se mantiene el giro literal 'buscar la vida' para no borrar la tensión idiomática del hebreo. 'Buscar matarlos' sería una explicitación válida, pero menos cercana al original.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezzar
  lexicon: HALOT
  rationale: Se usa la forma hispana tradicional y ampliamente reconocible 'Nabucodonosor' en el texto principal por legibilidad. La forma hebrea más próxima se preserva implícitamente en la documentación como alternativa.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus esclavos
  lexicon: HALOT
  rationale: En español bíblico, 'siervos' conserva adecuadamente la relación de subordinación política/cortesana. 'Esclavos' sería demasiado fuerte y no está exigido por el contexto; 'servidores' es posible, pero menos idiomático aquí.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: But afterward
  chosen_spanish: Pero después
  alternatives_spanish:
  - Y después
  - Después
  lexicon: HALOT
  rationale: '''Pero'' refleja bien el giro contrastivo de juicio a restauración que el contexto da a la secuencia temporal, sin añadir contenido ajeno al hebreo.'
- source_word: תִּשְׁכֹּן
  english_pob_choice: she will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - vivirá
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es femenino singular, en español el sujeto 'ella' puede omitirse de manera natural porque el referente implícito es el país (Egipto). 'Habitará' conserva el sentido de residencia/restablecimiento.
- source_word: כִּימֵי קֶדֶם
  english_pob_choice: as in days of old
  chosen_spanish: como en los días de antaño
  alternatives_spanish:
  - como en días de antiguo
  - como en los días de antes
  lexicon: HALOT
  rationale: '''Días de antaño'' es una equivalencia digna y natural en español para ''days of old'', manteniendo el tono tradicional sin sonar arcaizante en exceso.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según la terminología del proyecto, y 'declara' reproduce con solemnidad la fórmula profética נְאֻם.
theological_decisions:
- issue: Renderizado del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide traducir יְהוָה como 'Yahvé' en el texto principal. Esto preserva el nombre del pacto sin enmascararlo con una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personificación implícita en תִּשְׁכֹּן
  english_pob_reading: she will dwell
  chosen_spanish_reading: habitará
  alternative_spanish_readings:
  - ella habitará
  - será habitada
  rationale: El hebreo usa verbo femenino singular, pero en español la personificación de Egipto se entiende naturalmente sin necesidad de explicitar 'ella'. 'Habitará' conserva el valor de restauración residencial sin forzar el género gramatical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Tensión semántica de נַפְשָׁם
  english_pob_reading: their life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - su vida misma
  rationale: '''Vida'' conserva el idiomático hebreo ''buscar la vida de alguien'' sin espiritualizar ni suavizar el sentido. En español, ''alma'' desplazaría indebidamente el campo semántico.'
  doctrine_reference: HALOT, נֶפֶשׁ / נַפְשׁוֹ
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que añadió una coma tras “Babylon” para mayor claridad, sin alterar el contenido. El español refleja esa misma segmentación natural con una pausa equivalente entre “Babilonia” y “y en manos de sus siervos”.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'Nabucodonosor' en el texto principal por uso hispano corriente, sin perder la base hebrea del nombre.
  - Se conservó el modismo 'en manos de' por su valor idiomático y su transparencia formal.
  - '''Siervos'' se eligió por ajuste contextual cortesano/político; no se usó ''esclavos'' porque el hebreo no exige esa precisión aquí.'
  - La frase final conserva una restauración territorial o social con 'habitará' + 'como en los días de antaño' sin explicitar más de lo que el hebreo indica.
