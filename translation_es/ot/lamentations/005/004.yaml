translation:
  language: es
  text: Bebemos nuestra agua por plata[a]; nuestra madera nos llega por un precio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «con plata» o «con dinero». El hebreo dice literalmente «con/por plata», usando «plata» como medio de pago.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestra madera es traída por un precio». El verbo hebreo está en plural («vienen/llegan»), pero en español se expresa naturalmente con singular por tratarse de un sustantivo de masa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵימֵינוּ
  english_pob_choice: our water
  chosen_spanish: nuestra agua
  alternatives_spanish:
  - el agua que es nuestra
  - nuestra propia agua
  lexicon: HALOT
  rationale: El hebreo expresa posesión con un sustantivo de masa en plural de forma literal ('nuestras aguas'); en español, el singular de masa 'agua' es el equivalente natural. Mantengo el posesivo para conservar la idea de que incluso el agua que les pertenece debe pagarse.
- source_word: בְּכֶסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata
  alternatives_spanish:
  - con dinero
  - a cambio de plata
  - por dinero
  lexicon: HALOT
  rationale: בְּכֶסֶף significa literalmente 'con/por plata'. 'Por plata' conserva el valor concreto del medio de pago y sigue de cerca la relación económica del hebreo sin convertirla en una referencia genérica a 'dinero'.
- source_word: שָׁתִינוּ
  english_pob_choice: we drink
  chosen_spanish: Bebemos
  alternatives_spanish:
  - bebemos continuamente
  - hemos bebido
  - bebíamos
  lexicon: HALOT
  rationale: El qatal en este lamento comunica una realidad dolorosa y vigente; en español, el presente es una forma natural para expresar una condición presente y repetida. 'Bebemos' conserva la vividez del reclamo.
- source_word: עֵצֵינוּ
  english_pob_choice: our wood
  chosen_spanish: nuestra leña
  alternatives_spanish:
  - nuestro madera
  - nuestro leño
  - nuestra madera
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'nuestro(s) árbol(es)/madera', pero en contexto el referente práctico es la madera para uso doméstico. 'Leña' es una especificación contextual prudente en español y mantiene la carga de necesidad básica; la alternativa más literal 'madera' es posible, pero menos inmediata en el contexto de abastecimiento doméstico.
- source_word: בִּמְחִיר
  english_pob_choice: at a price
  chosen_spanish: a precio
  alternatives_spanish:
  - por un precio
  - a un costo
  - mediante pago
  lexicon: HALOT
  rationale: La expresión hebrea señala que se obtiene solo pagando. 'A precio' es una construcción española compacta y fiel al tono de escasez y explotación; reproduce la idea de compra obligada sin añadir matices no explicitados por el texto.
- source_word: יָבֹאוּ
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - es traída
  - debe llegar
  lexicon: HALOT
  rationale: El verbo hebreo está en plural ('ellos vienen/llegan'), pero el referente en sentido es la leña/madera. En español, 'llega' fluye de manera natural con un sustantivo colectivo o de masa y conserva la idea de que el suministro solo accede a ellos por medio de pago.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail, que indica alta concordancia y ningún cambio necesario; por eso se conserva el sentido básico de la línea hebrea y se reflejan en español las dos decisiones lexicals principales ya estabilizadas en la POB inglesa: el pago por agua y la obtención de la madera/leña a precio. No se introducen lecturas doctrinales ni variantes textuales adicionales.'
  spanish_consistency_notes:
  - Se prefirió el presente ('Bebemos', 'llega') para reproducir la vividez del lamento, en paralelo con la solución inglesa.
  - '''Plata'' mantiene la concreción del hebreo mejor que una generalización a ''dinero''.'
  - Se evitó 'SEÑOR' u otras terminologías no pertinentes; el versículo no contiene un nombre divino.
  - La puntuación con dos miembros separados por punto y coma refleja la simetría poética del hebreo.
