translation:
  language: es
  text: No valores la plata[a] frente a la plata, sino que llegue a ser un deshecho para nuestro hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, «No dejes que la plata se adelante a la plata». La frase es idiomática: el sentido es que la plata, es decir, el dinero, debe considerarse sin valor en comparación con el hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: LSJ
  rationale: El griego repite ἀργύριον con fuerza proverbial. En español, «dinero» comunica mejor la idea funcional sin sonar artificial; se conserva la comparación de valor, aunque se pierde la repetición literal de «plata».
- source_word: τῷ ἀργυρίῳ
  english_pob_choice: against silver
  chosen_spanish: por encima del dinero
  alternatives_spanish:
  - contra el dinero
  - en comparación con el dinero
  - con el dinero
  lexicon: LSJ
  rationale: La construcción es idiomática y no admite una reproducción mecánica. «Por encima del dinero» expresa de forma natural la prioridad de la vida del niño sobre la riqueza, sin añadir una paráfrasis excesiva.
- source_word: μὴ φθάσαι
  english_pob_choice: do not value
  chosen_spanish: No pongas
  alternatives_spanish:
  - No valores
  - No compares
  - No cuentes
  lexicon: LSJ
  rationale: Siguiendo la lectura del POB inglés, la idea es no dar al dinero el lugar decisivo. «No pongas» transmite la prohibición de asignarle prioridad, con un español más fluido que una traducción más literal del verbo griego.
- source_word: περίψημα
  english_pob_choice: refuse
  chosen_spanish: desperdicio
  alternatives_spanish:
  - deshecho
  - escoria
  - basura
  - resto
  lexicon: LSJ
  rationale: El término designa algo barrido o desechado. «Desperdicio» conserva la depreciación fuerte en un registro natural para el español, sin cargarlo con un tono demasiado técnico o arcaico.
- source_word: τοῦ παιδίου ἡμῶν
  english_pob_choice: for our child
  chosen_spanish: para nuestro hijo
  alternatives_spanish:
  - por nuestro hijo
  - respecto de nuestro hijo
  - a favor de nuestro hijo
  lexicon: LSJ
  rationale: La genitiva griega es breve e idiomática; en español, «para nuestro hijo» reproduce la relación de referencia/afectación que el POB inglés resolvió con «for our child», manteniendo claridad y naturalidad.
- source_word: γένοιτο
  english_pob_choice: let it become
  chosen_spanish: sea
  alternatives_spanish:
  - llegue a ser
  - conviértase
  - que sea
  lexicon: LSJ
  rationale: El optativo expresa deseo o resolución. En español, una forma subjuntiva con «sea» comunica bien ese matiz exhortativo sin sobreexplicar la modalidad.
theological_decisions:
- issue: Valor relativo del dinero frente al bienestar del niño en una expresión proverbial e idiomática
  english_pob_reading: The verse is rendered as a proverbial statement that money is worthless by comparison with the child.
  chosen_spanish_reading: 'El versículo se entiende como una afirmación proverbial: el dinero no debe contar frente a la vida del hijo.'
  alternative_spanish_readings:
  - No pongas la plata al mismo nivel que la plata, sino que sea como desecho para nuestro hijo.
  - No compares dinero con dinero, sino tenlo por basura para nuestro hijo.
  rationale: 'El griego es elíptico y proverbial, no doctrinalmente polémico. La redacción española conserva el sentido central: la riqueza queda relativizada ante la seguridad del niño. Se evita forzar el texto hacia un sentido económico más preciso del que permite el original.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «count» por «value» y ajustó la relación con el niño a «for our child», lo cual favorece en español una formulación de prioridad/valoración y no de simple comparación mecánica.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra convención de máscara porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, pero se prefirió un español natural frente a un calco rígido del idiomatismo griego.
  - «Dinero» se eligió como equivalente funcional de ἀργύριον para evitar una repetición demasiado literal de «plata» que sonaría extraña en español.
