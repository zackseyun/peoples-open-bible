    issue: «densa oscuridad» es menos idiomático que «densas tinieblas» en este contexto
    rationale: Aunque semánticamente cercano, «oscuridad» aquí suena más abstracto y menos arraigado en el registro bíblico-teofánico de עֲרָפֶל. «Tinieblas» comunica mejor densidad, ocultamiento y resonancia escritural.
  - severity: medium
    issue: Falta una nota léxica para la alternativa de עֲרָפֶל
    rationale: 'El POB inglés conserva una alternativa significativa («dark cloud»). En español, una nota como «O: en la nube oscura» ayuda a preservar la amplitud semántica del hebreo sin recargar el texto principal.'
