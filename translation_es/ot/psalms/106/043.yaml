revisions:
- from: Muchas veces los libró[a], pero se rebelaron en su consejo y fueron humillados por su iniquidad[b].
  to: Muchas veces los libró, pero se rebelaron en sus planes[a] y fueron abatidos[b] por su iniquidad.
  rationale: 'Se revisa «fueron humillados» a «fueron abatidos» para seguir mejor el valor de מוך y la decisión léxica inglesa documentada. También se rehacen las notas para que preserven las alternativas significativas del expediente POB en los lugares correctos: «en sus planes»/«consejo»/«propósito» para בַעֲצָתָם y «abatidos»/«se hundieron»/«se consumieron» para וַיָּמֹכּוּ. Se elimina la nota sobre «los libró» porque no está respaldada por las notas auditadas de este verso y no añade una ambigüedad nueva necesaria en español.'
