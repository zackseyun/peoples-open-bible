translation:
  language: es
  text: 'Y Jacob, su padre, les dijo: «Me han dejado sin hijos[a]: José ya no está, Simeón ya no está, y se llevarían a Benjamín. Todo esto ha caído sobre mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me han hecho quedar sin hijos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Todo esto está contra mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם יַעֲקֹב אֲבִיהֶם
  english_pob_choice: And Jacob their father said to them
  chosen_spanish: Entonces Jacob, su padre, les dijo
  alternatives_spanish:
  - Y Jacob, su padre, les dijo
  - Jacob, su padre, les dijo
  lexicon: N/A
  rationale: Conservo el orden natural del hebreo sin volverlo rígido. «Su padre» refleja אֲבִיהֶם y mantiene la relación familiar destacada en el texto.
- source_word: שִׁכַּלְתֶּם
  english_pob_choice: You have bereaved me
  chosen_spanish: Me han dejado sin hijos
  alternatives_spanish:
  - Me han bereavedo
  - Me han dejado huérfano
  - Me han hecho quedar sin hijos
  lexicon: HALOT
  rationale: El verbo piel transmite causar desconsuelo por pérdida de hijos, o dejar sin hijos. En español, «me han dejado sin hijos» conserva la fuerza de la pérdida sin añadir «de mis hijos», que no aparece explícitamente en el hebreo revisado.
- source_word: אֵינֶנּוּ
  english_pob_choice: is no more
  chosen_spanish: ya no está
  alternatives_spanish:
  - no está
  - ha desaparecido
  - ya no existe
  lexicon: HALOT
  rationale: «Ya no está» expresa ausencia o pérdida, no mera negación de existencia. Es natural en español y corresponde al valor idiomático del hebreo.
- source_word: תִּקָּחוּ
  english_pob_choice: you would take
  chosen_spanish: se llevarían a
  alternatives_spanish:
  - tomarán
  - van a llevarse
  - se llevarían
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en contexto suena a acción proyectada o intentada desde la perspectiva de Jacob. La construcción impersonal refleja mejor el matiz de protesta que un futuro simple.
- source_word: עָלַי הָיוּ כֻלָּנָה
  english_pob_choice: All these things have come against me
  chosen_spanish: Todo esto ha caído sobre mí
  alternatives_spanish:
  - Todo esto ha venido contra mí
  - Todo esto me ha sobrevenido
  - Todas estas cosas están contra mí
  lexicon: HALOT
  rationale: La frase hebrea comunica que varias desgracias recaen adversamente sobre Jacob. «Ha caído sobre mí» preserva el peso acumulativo; en nota se conserva la alternativa de lectura adversativa.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: Me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Se mantiene el énfasis pronominal del hebreo al iniciar la queja con «Me».
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacob
  lexicon: N/A
  rationale: Nombre propio estándar en español bíblico.
theological_decisions:
- issue: Intensidad del lamento de Jacob y sentido de la pérdida filial
  english_pob_reading: You have bereaved me
  chosen_spanish_reading: Me han dejado sin hijos
  alternative_spanish_readings:
  - Me han hecho quedar sin hijos
  - Me han dejado huérfano
  rationale: El hebreo no solo expresa tristeza, sino privación por pérdida de descendencia. Evito suavizarlo a una simple decepción emocional.
  doctrine_reference: Éxodo 21:22; Job 1:21 (lenguaje de pérdida y despojo)
- issue: Lectura de la cláusula final como adversidad acumulada
  english_pob_reading: All these things have come against me
  chosen_spanish_reading: Todo esto ha caído sobre mí
  alternative_spanish_readings:
  - Todo esto ha venido contra mí
  - Todas estas cosas están contra mí
  rationale: La construcción hebrea puede entenderse como acontecimientos que recaen sobre Jacob de manera hostil. El español elegido conserva esa carga sin convertirla en una formulación demasiado explicativa.
  doctrine_reference: Salmo 42:7; Lamentaciones 3:1-20
translation_notes:
  revision_awareness: La revisión inglesa eliminó la expansión «of my children» porque no estaba explícita en el hebreo; por eso el español evita añadirla y opta por una fórmula breve que conserve la ambigüedad entre quedar sin hijos y ser privado de los hijos. También se respeta el matiz de «would take» como acción propuesta o inminente desde la perspectiva de Jacob.
  spanish_consistency_notes:
  - Se usa «Jacob» y «José/Simeón/Benjamín» en formas españolas estándar.
  - Se prefirió «ya no está» para el idiomatismo hebreo אֵינֶנּוּ.
  - No se introdujo «Cristo», «SEÑOR» ni terminología eclesial no presente en el versículo.
  - El texto mantiene un registro bíblico claro y moderno sin depender de calcos excesivos.
