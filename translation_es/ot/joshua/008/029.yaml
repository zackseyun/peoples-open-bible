  yaml_path: translation/ot/joshua/008/029.yaml
  text: And he hanged the king of Ai on a tree until evening[a]. And at sunset Joshua commanded, and they took his corpse down from the tree and threw it at the entrance of the city gate[b], and they raised over him a large heap of stones that remains to this day.
  footnotes:
