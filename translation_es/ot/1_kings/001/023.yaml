translation:
  language: es
  text: 'Y se lo dijeron al rey, diciendo: «He aquí[a] Natán el profeta». Y él se presentó ante el rey y se postró ante el rey con el rostro en tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «He aquí Natán el profeta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּידוּ
  english_pob_choice: And they told
  chosen_spanish: Y se lo dijeron
  alternatives_spanish:
  - Y le informaron
  - Y se lo comunicaron
  lexicon: HALOT
  rationale: El verbo hifil de נגד comunica el acto de decir, anunciar o reportar. En español, «se lo dijeron» conserva la escena de anuncio cortesano con naturalidad y sin cargarla de formalidad innecesaria.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al monarca
  lexicon: HALOT
  rationale: El sustantivo con artículo y preposición se traduce de forma directa como complemento indirecto. «Rey» es la forma natural y precisa en este contexto narrativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: El infinitivo de cita introduce el discurso directo. «Diciendo» preserva la estructura hebrea y funciona bien en español bíblico moderno.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: El deíctico exige una forma que llame la atención sin añadir interpretación. «He aquí» reproduce con fidelidad la fuerza formal de הִנֵּה y evita agregar «está aquí».
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  lexicon: HALOT
  rationale: El nombre propio se mantiene transliterado y el título se traduce. La aposición queda natural en español sin perder la identificación del personaje.
- source_word: וַיָּבֹא לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: And he came before the king
  chosen_spanish: Y él vino delante del rey
  alternatives_spanish:
  - Y entró en presencia del rey
  - Y se presentó ante el rey
  lexicon: HALOT
  rationale: בוא con לִפְנֵי expresa llegar a la presencia de alguien. «Vino delante del rey» conserva el orden y la imagen de acercamiento ceremonial; «se presentó ante el rey» sería más idiomático, pero menos cercano a la forma del texto.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: and bowed down
  chosen_spanish: y se postró
  alternatives_spanish:
  - y se inclinó profundamente
  - y rindió homenaje
  lexicon: HALOT
  rationale: El verbo indica una inclinación muy baja, a menudo hasta el suelo. «Se postró» refleja mejor esa intensidad que «se inclinó» y mantiene la fuerza corporal del gesto.
- source_word: עַל אַפָּיו אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en el suelo
  - con el rostro hacia el suelo
  lexicon: HALOT
  rationale: La expresión describe la postura completa de postración. «Con el rostro en tierra» preserva la imagen hebrea de manera natural y solemne en español.
translation_notes:
  revision_awareness: El texto hebreo y el POB en inglés coinciden sustancialmente; la única revisión auditada en inglés movió la lectura desde una paráfrasis interpretativa a la forma más literal «Behold, Nathan the prophet». En español se siguió esa decisión, evitando añadir «está aquí» y manteniendo la deíxis breve del original.
  spanish_consistency_notes:
  - Se conserva «Natán» como forma española del nombre propio y «profeta» para el título.
  - Se mantiene «se postró» para el gesto físico fuerte de וַיִּשְׁתַּחוּ, coherente con la imagen final «con el rostro en tierra».
  - «He aquí» se usa aquí como equivalente formal de הִנֵּה, no como arcaísmo devocional gratuito, sino para preservar la concisión del hebreo.
  - No se introduce mayúscula reverencial ni sustitución por «SEÑOR», ya que el versículo no contiene el nombre divino.
