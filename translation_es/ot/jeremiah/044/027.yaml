translation:
  language: es
  text: He aquí[a], yo estoy velando sobre ellos para mal y no para bien; y todo hombre de Judá que está en la tierra de Egipto[b] perecerá por la espada y por el hambre, hasta que sean consumidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» reproduce la fórmula profética de atención; también podría traducirse «Mira» o «Miren», pero el registro solemne del hebreo favorece esta opción.
    reason: lexical_alternative
  - marker: b
    text: 'La frase hebrea usa singular masculino distributivo: «todo hombre de Judá»; el sentido abarca al conjunto representado por esa forma.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo puede expresarse como «hasta que sean consumidos»; la idea es de consumación total bajo juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - Aquí estoy
  lexicon: HALOT
  rationale: La fórmula introduce una declaración divina solemne y de alto relieve profético. «He aquí» conserva ese registro mejor que opciones más coloquiales.
- source_word: שֹׁקֵד
  english_pob_choice: watching over
  chosen_spanish: velando sobre
  alternatives_spanish:
  - vigilando sobre
  - observando sobre
  - manteniéndome alerta sobre
  lexicon: HALOT
  rationale: El participio comunica atención activa y continua. «Velando sobre» preserva el sentido de vigilancia intencional y suena natural en español bíblico moderno.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - acerca de ellos
  - contra ellos
  lexicon: HALOT
  rationale: Con שׁקד, la preposición expresa el objeto de la vigilancia. «Sobre ellos» sigue de cerca el hebreo; la hostilidad queda expresada por «para mal».
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para mal
  alternatives_spanish:
  - para desastre
  - para calamidad
  - para daño
  lexicon: HALOT
  rationale: Aquí רָעָה denota un resultado de juicio dañino, no maldad moral. «Para mal» es breve y fiel, y conserva el contraste con «para bien».
- source_word: וְלֹא לְטוֹבָה
  english_pob_choice: and not for good
  chosen_spanish: y no para bien
  alternatives_spanish:
  - y no para bienestar
  - y no para provecho
  lexicon: HALOT
  rationale: La antítesis directa con «para mal» se mantiene con una expresión natural en español. «Bien» reproduce de forma simple y fiel el contraste del hebreo.
- source_word: וְתַמּוּ
  english_pob_choice: will come to an end
  chosen_spanish: perecerá
  alternatives_spanish:
  - llegará a su fin
  - será consumido
  - acabará
  lexicon: HALOT
  rationale: El verbo expresa terminarse o ser llevado al final, en contexto de destrucción. «Perecerá» transmite bien el resultado fatal sin suavizarlo excesivamente.
- source_word: כָל אִישׁ יְהוּדָה
  english_pob_choice: every man of Judah
  chosen_spanish: todo hombre de Judá
  alternatives_spanish:
  - cada hombre de Judá
  - todo judío varón
  - todo varón de Judá
  lexicon: HALOT
  rationale: Se conserva la forma masculina singular distributiva del hebreo, con valor representativo del grupo. «Todo hombre de Judá» sigue de cerca la construcción original.
- source_word: אֲשֶׁר בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: who is in the land of Egypt
  chosen_spanish: que está en la tierra de Egipto
  alternatives_spanish:
  - que está en Egipto
  - que se halla en la tierra de Egipto
  lexicon: HALOT
  rationale: La frase mantiene la sintaxis distributiva y la expresión geográfica completa. «Tierra de Egipto» conserva el matiz territorial del hebreo.
- source_word: בַּחֶרֶב וּבָרָעָב
  english_pob_choice: by the sword and by famine
  chosen_spanish: por la espada y por el hambre
  alternatives_spanish:
  - a espada y de hambre
  - por espada y por hambre
  lexicon: HALOT
  rationale: Es una fórmula de juicio muy estable en Jeremías. «Por la espada y por el hambre» reproduce el sentido instrumental de modo claro y natural.
- source_word: עַד כְּלוֹתָם
  english_pob_choice: until they are consumed
  chosen_spanish: hasta que sean consumidos
  alternatives_spanish:
  - hasta que se acaben
  - hasta que sean exterminados
  - hasta su consumación
  lexicon: HALOT
  rationale: La idea final es de consumación total del grupo. «Sean consumidos» refleja bien la finalización por destrucción, y coincide con la revisión más reciente del audit trail.
theological_decisions:
- issue: Lenguaje de juicio divino en לְרָעָה / לְטוֹבָה
  english_pob_reading: for harm and not for good
  chosen_spanish_reading: para mal y no para bien
  alternative_spanish_readings:
  - para desastre y no para bien
  - para calamidad y no para bien
  rationale: El hebreo habla de resultado dañoso/judicial, no de mal moral en Dios. «Para mal» conserva la fuerza del juicio sin introducir una carga doctrinal indebida.
  doctrine_reference: Principio de primacía del idioma original; evitar inferencias doctrinales no requeridas por el texto.
- issue: Sintaxis masculina distributiva en כָל אִישׁ יְהוּדָה
  english_pob_reading: every man of Judah
  chosen_spanish_reading: todo hombre de Judá
  alternative_spanish_readings:
  - cada hombre de Judá
  - todos los hombres de Judá
  rationale: El hebreo usa singular masculino con valor distributivo. Se mantiene esa forma para no neutralizar indebidamente el dato gramatical del fuente.
  doctrine_reference: Política de fidelidad gramatical y de género cuando el original es representativo/distributivo.
- issue: Finalidad destructiva de עַד כְּלוֹתָם
  english_pob_reading: until they are consumed
  chosen_spanish_reading: hasta que sean consumidos
  alternative_spanish_readings:
  - hasta que se acaben
  - hasta que sean exterminados
  rationale: La consumación final no es meramente cese, sino terminación por destrucción bajo juicio. «Consumidos» preserva esa severidad sin ampliar el texto hacia una interpretación más fuerte que la necesaria.
  doctrine_reference: Lectura de juicio profético en Jeremías; mantener la intensidad sin exceder la evidencia lexical.
translation_notes:
  revision_awareness: Seguí el audit trail inglés y su revisión más reciente, que prefirió «until they are consumed» sobre «until they are finished». Por eso la cláusula final en español usa «hasta que sean consumidos», manteniendo la culminación destructiva del hebreo. También conservé la antítesis «para mal / para bien» y la construcción distributiva masculina «todo hombre de Judá».
  spanish_consistency_notes:
  - Usé «Yahvé» por defecto cuando no aparece el nombre divino en este versículo; aquí el texto habla en primera persona divina sin el tetragrámaton explícito.
  - Mantuve «tierra de Egipto» para conservar la expresión territorial completa, no solo «Egipto».
  - Elegí una publicación-readable de registro profético, evitando arcaísmos innecesarios pero sin rebajar la solemnidad.
  - No neutralicé el masculino singular distributivo del hebreo, conforme al criterio de fidelidad gramatical.
