id: REV.1.1
reference: 'Revelation 1:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀποκάλυψις Ἰησοῦ Χριστοῦ, ἣν ἔδωκεν αὐτῷ ὁ θεὸς δεῖξαι τοῖς δούλοις αὐτοῦ, ἃ δεῖ γενέσθαι ἐν τάχει, καὶ ἐσήμανεν ἀποστείλας διὰ τοῦ ἀγγέλου αὐτοῦ τῷ δούλῳ αὐτοῦ Ἰωάννῃ,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/001.yaml
  text: 'The revelation of Jesus Messiah[a], which God gave him to show his slaves what must happen soon, and he made it known by sending it through his angel to his slave John[d][c][b],'
  footnotes:
  - marker: a
    text: Or 'The revelation from Jesus Messiah' or 'The revelation about Jesus Messiah.' The Greek genitive can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Or 'quickly.' The phrase may mean either that these things will happen soon or that they will happen swiftly once they begin.
    reason: lexical_alternative
  - marker: c
    text: The verb can also be rendered 'made it known'; 'signified' preserves the nuance of communication by signs, fitting the symbolic character of the book.
    reason: lexical_alternative
  - marker: d
    text: Or 'The revelation of Jesus Messiah, which God gave him to show his slaves what must happen soon, and he signified it'.
    reason: previous_rendering
translation:
  language: ko
  text: '예수 메시아의 계시[a]입니다. 하나님께서 이 계시를 그분에게 주시어, 곧 일어날 일들을 자기 노예들[b]에게 보이게 하셨으며, 자신의 천사를 보내어 자기 노예 요한에게 표징으로 알리셨습니다[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「예수 메시아로부터 온 계시」 혹은 「예수 메시아에 관한 계시」. 헬라어 속격은 여러 방식으로 이해될 수 있다.'
    reason: alternative_reading
  - marker: b
    text: '또는 「종」. 헬라어 δοῦλος는 본질적으로 「매인 자」를 가리키며, 요한계시록 전반에서 신자들이 하나님/메시아에게 속한 자로 반복해 지칭되므로, 매임의 무게를 살려 「노예」로 옮긴다.'
    reason: lexical_alternative
  - marker: c
    text: '헬라어 ἐσήμανεν은 「표징으로 알리다」의 뉘앙스를 지니며, 요한계시록의 상징적 성격에 잘 맞는다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκάλυψις
  english_pob_choice: revelation
  chosen_korean: 계시
  alternatives_korean:
  - 드러냄
  lexicon: BDAG
  rationale: '「계시」는 ἀποκάλυψις의 「가려진 것이 드러남」 의미를 담는 표준 한국어 신학 어휘이며, 책의 표제를 그대로 보존한다.'
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: 'Χριστός가 칭호로 기능하는 곳에서는 「메시아」로 옮긴다. 「그리스도」 음역은 칭호성을 가린다.'
- source_word: δούλοις / δούλῳ
  english_pob_choice: slaves / slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  lexicon: BDAG
  rationale: '요한이 자신을 그리고 신자들을 하나님/메시아의 δοῦλος로 호명하는 본문이며, 매임의 무게를 살려 「노예」로 옮긴다. 빌립보서 1:1과 동일한 원칙.'
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_korean: 곧
  alternatives_korean:
  - 속히
  lexicon: BDAG
  rationale: '시간적 임박을 가리키는 「곧」을 채택. 또 다른 해석(「신속히」)은 보존하지 않는다.'
- source_word: ἐσήμανεν
  english_pob_choice: made it known
  chosen_korean: 표징으로 알리셨습니다
  alternatives_korean:
  - 알리셨습니다
  lexicon: BDAG
  rationale: 'σημαίνω는 「표징으로 알리다」의 뉘앙스를 지니며, 계시록의 상징적 성격을 살리기 위해 평이한 「알리다」 대신 「표징으로 알리다」로 옮긴다.'
theological_decisions:
- issue: '요한계시록 1:1의 δοῦλος를 매임을 드러내는 강한 어휘로 번역'
  chosen_reading: 노예
  alternative_readings:
  - 종
  rationale: 'DOCTRINE.md는 δοῦλος가 매임의 신학적 무게로 읽혀야 할 곳에서 「slave」로 옮기도록 한다. 요한의 자기 호명은 바울의 빌립보서 1:1과 같은 정형이며, 「노예」로 그 매임을 살린다.'
  doctrine_reference: DOCTRINE.md §1; Contested terms table for δοῦλος
- issue: Ἰησοῦ Χριστοῦ의 속격 해석을 한쪽으로 못 박지 않음
  chosen_reading: 예수 메시아의 계시 (속격 보존)
  alternative_readings:
  - 예수 메시아로부터 온 계시
  - 예수 메시아에 관한 계시
  rationale: '헬라어 속격은 여러 의미를 허용하며 본문은 이를 해소하지 않는다. 한국어 「~의 계시」 역시 그 모호함을 그대로 담을 수 있으므로 보존한다.'
  doctrine_reference: 'PHILOSOPHY.md §3: 신학적 긴장을 해소하지 않고 보존한다'
