translation:
  text: Jesus said, "The kingdom of the Father is like a man who has good seed. His
    enemy came by night and sowed a weed on the good seed. The man did not allow them
    to pull up the weed. He said to them, 'Lest you say, "We will pull up the weed,"
    and pull up the wheat along with it. For on the day of the harvest, the weeds
    will appear; they will be pulled up and burned.'"
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:21:37Z'
  footnotes:
  - marker: a weed
    text: The Coptic uses the singular indefinite 'a weed' (ⲟⲩⲍⲓⲍⲁⲛⲓⲟⲛ) here and the
      singular definite 'the weed' (ⲡⲍⲓⲍⲁⲛⲓⲟⲛ) in the following clauses, before switching
      to the plural 'the weeds' (ⲛⲍⲓⲍⲁⲛⲓⲟⲛ) at the end. The Greek loanword ζιζάνιον
      (darnel) is typically plural in the Synoptic parallels.
    reason: textual_variant
  - marker: We will pull up
    text: The Coptic prefix ⲉⲛⲁ- (we will) is a Lycopolitan dialectal variant of the
      standard Sahidic ⲧⲛⲛⲁ-.
    reason: dialect_note
  - marker: they will be pulled up and burned
    text: Lit. 'they pull them up and they burn them' (active verbs with an indefinite
      subject, functioning as a passive).
    reason: register_note
lexical_decisions:
- source_word: ⲍⲓⲍⲁⲛⲓⲟⲛ
  chosen: weed
  rationale: The Greek loanword ζιζάνιον (darnel/weed) is used here first as a singular
    indefinite (ⲟⲩⲍⲓⲍⲁⲛⲓⲟⲛ, 'a weed'), then singular definite (ⲡⲍⲓⲍⲁⲛⲓⲟⲛ, 'the weed'),
    and finally plural (ⲛⲍⲓⲍⲁⲛⲓⲟⲛ, 'the weeds'). The translation preserves this singular-to-plural
    shift.
  lexicon: BDAG
  alternatives:
  - darnel
  entry: ζιζάνιον
- source_word: ⲕⲟⲟⲩ
  chosen: allow them
  rationale: Form of ⲕⲱ ⲙⲙⲟⲟⲩ (to put/leave/allow). With the infinitive ⲉϩⲱⲗⲉ, it
    means 'allow them to pull up'.
  lexicon: Crum
  alternatives:
  - let them
  entry: ⲕⲱ
- source_word: ⲉⲛⲁϩⲱⲗⲉ
  chosen: We will pull up
  rationale: The prefix ⲉⲛⲁ- is the Lycopolitan form of the Sahidic 1st person plural
    future ⲧⲛⲛⲁ-.
  lexicon: Crum
  alternatives:
  - we are going to pull up
  entry: ϩⲱⲗⲉ
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: appear
  rationale: Means 'to become manifest' or 'appear'.
  lexicon: Crum
  alternatives:
  - become manifest
  entry: ⲟⲩⲱⲛϩ
theological_decisions:
- issue: Translation of ⲍⲓⲍⲁⲛⲓⲟⲛ
  chosen_reading: weed / weeds
  rationale: While 'darnel' is botanically accurate for ζιζάνιον, 'weed' is standard
    in English translations of this parable and fits the singular/plural grammatical
    shifts in the Coptic text more naturally than the mass noun 'darnel'.
  alternatives_noted:
  - darnel
drafter_notes: This saying parallels the Parable of the Weeds in Matthew 13:24-30.
  Thomas's version is more concise and features a notable grammatical shift from singular
  'a weed' to plural 'weeds', which is preserved in the English. The dialectal Lycopolitan
  future prefix ⲉⲛⲁ- is also noted.
