review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue la lectura principal actualmente auditada en el expediente inglés. La evidencia fuente inmediata incluye un hebreo divergente y un paralelo griego; el rastro de auditoría inglés vigente fue revisado para adoptar el hebreo como texto principal de este versículo: «For in disguise I will walk with him, and at first I will test him with trials.» El español, en cambio, traduce la antigua lectura griega («si confías… la heredarás»), por lo que no preserva la selección textual ni el sentido de la revisión aplicada.'
  spanish_quality_summary: 'El español del borrador es natural si se tradujera la lectura griega, pero queda desalineado con la base textual decidida. Además, «sus descendientes» es incorrecto para αἱ γενεαὶ αὐτοῦ, que sería «sus descendientes» solo si el sujeto previo fuera tercera persona; con «confías… heredarás» correspondería «tus descendientes». Al cambiar al texto hebreo principal, conviene una redacción española digna y clara: «Porque iré con él disfrazada, y al principio lo probaré con pruebas.»'
  glossary_alignment: No hay conflictos mayores con la glosa de proyecto aparte de la selección textual. La personificación femenina de la Sabiduría debe mantenerse en español; por eso «disfrazada» concuerda bien con la voz femenina implícita. La nota debe explicar que el griego conserva una tradición distinta y citarla con claridad.
  issues:
  - severity: high
    issue: El texto principal español traduce la lectura griega antigua, no la lectura principal auditada vigente.
    rationale: La revisión aplicada en el expediente inglés sustituyó explícitamente «If he trusts her…» por «For in disguise I will walk with him…». El español debe seguir esa decisión textual documentada.
  - severity: medium
    issue: La nota textual va en dirección inversa a la auditoría vigente.
    rationale: Actualmente la variante que debe ir en nota es la griega («Si confía…»), no el hebreo, porque el texto principal adoptado en el expediente es el hebreo divergente.
  - severity: medium
    issue: 'Discordancia pronominal interna en el borrador griego-español: «si confías… sus descendientes».'
    rationale: Si se mantuviera la lectura griega en segunda persona, debería decir «tus descendientes», no «sus descendientes».
  - severity: low
    issue: «en extrañamiento» en la nota existente suena poco natural en español e impreciso para בהתנכר.
    rationale: Para el hebreo elegido en el texto principal, «disfrazada» o «como extraña» comunica mejor la idea de presentarse de modo no reconocido/ajeno.
  revised_spanish_text: Porque iré con él disfrazada[a], y al principio lo probaré con pruebas.
