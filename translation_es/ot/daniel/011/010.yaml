review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: plural inicial (''sus hijos''), cambio a singular explícito (''uno... vendrá''), y la secuencia militar de venir, desbordar, pasar y volver. Sin embargo, falla de manera importante en la cláusula final: ''se alzará contra la fortaleza hasta de ella'' no representa fielmente עַד מָעֻזֹּה y resulta gramaticalmente defectuoso en español. Además, la nota [a] está anclada al lugar equivocado: la alternativa documentada corresponde a la cláusula singular וּבָא בּוֹא, no a ''grandes fuerzas''.'
  spanish_quality_summary: El texto es mayormente legible hasta la última frase, pero 'hasta de ella' es antinatural e ininteligible en español. 'Se alzarán' es aceptable para יִתְגָּרוּ, aunque en la repetición final conviene una formulación más militar y natural ('provocará guerra' / 'hará guerra') para reflejar el valor contextual que el POB inglés ya explicitó. También hace falta recolocar las notas para que coincidan con las palabras relevantes.
  glossary_alignment: 'No hay conflictos con la terminología teológica mayor del proyecto. Las decisiones léxicas principales son generalmente adecuadas: ''Sus hijos'', ''uno ciertamente vendrá'', ''desbordará'', ''pasará'', ''volverá''. La principal excepción es עַד מָעֻזֹּה, que debe expresarse como ''hasta su fortaleza'' en el texto principal, dejando la ambigüedad del poseedor en nota, tal como documenta el POB inglés.'
