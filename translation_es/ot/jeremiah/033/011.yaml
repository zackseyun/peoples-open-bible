    rationale: Aunque intenta mantener la amplitud idiomática, en español contemporáneo «suerte» puede leerse como azar o destino. «La prosperidad de la tierra» o «la fortuna de la tierra» comunica mejor una restauración integral sin reducirla a cautiverio.
