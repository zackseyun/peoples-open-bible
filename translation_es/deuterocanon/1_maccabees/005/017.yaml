  spanish_quality_summary: La redacción es en general clara y fiel, pero hay pequeños ajustes de naturalidad y convención geográfica en español. «Yo y Jonatán» suena menos idiomático que «Jonatán, mi hermano, y yo» o «yo y mi hermano Jonatán»; además, para topónimos de destino es más natural «a Gileaditis» que «a la Gileaditis» cuando se conserva el nombre transliterado como región. También conviene anclar la nota al topónimo mismo, no al cierre de toda la oración.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Las decisiones léxicas principales están alineadas con el proyecto: «hombres», «rescata», «hermanos», «Galilea». La conservación de «Gileaditis» concuerda con el POB inglés y la nota explica bien la alternativa «Galaad».'
