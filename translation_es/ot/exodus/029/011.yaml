translation:
  language: es
  text: Degollarás el toro delante de Yahvé[a], a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR». Aquí se conserva el nombre divino como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁחַטְתָּ
  english_pob_choice: You shall slaughter
  chosen_spanish: Degollarás
  alternatives_spanish:
  - sacrificarás
  - matarás
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט se refiere al acto ritual de degollar el animal; en español, «degollar» conserva con más precisión ese matiz técnico que «matar». «Sacrificarás» es más general y puede ocultar la acción concreta.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el buey
  lexicon: HALOT
  rationale: פַּר designa un bovino macho usado en sacrificio. «Toro» es la opción natural y clara en español para este contexto; «novillo» podría sugerir inmadurez no explícita aquí, y «buey» puede sonar menos directo como animal sacrificial.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי significa literalmente «delante de» / «ante». «Delante de Yahvé» preserva bien la relación espacial-ritual y mantiene el nombre divino conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton como «Yahvé», la forma normativa del proyecto en español. «Jehová» es una tradición posterior y no refleja la transliteración preferida aquí.
- source_word: פֶּתַח
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la entrada
  lexicon: HALOT
  rationale: פֶּתַח es «entrada» u «abertura». «A la entrada» es idiomático en español y mantiene la localización ritual sin añadir sentido.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La expresión consagrada אֹהֶל מוֹעֵד se traduce de manera directa y transparente como «tienda de reunión». «Tabernáculo de reunión» es tradicional, pero aquí se prefiere la forma más literal y claramente auditable.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera explícita. Siguiendo el criterio del proyecto, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por un título devocional como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: verbo sacrificial preciso, bovino sacrificial como ''bull'', nombre divino explícito y localización ritual en la entrada de la tienda de reunión. No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» conforme al estándar del proyecto.
  - «Tienda de reunión» conserva la designación cultual técnica y es coherente con el uso en Éxodo.
  - «Degollarás» refleja mejor el acto sacrificial que «matarás» en español.
