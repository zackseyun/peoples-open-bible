base_translation:
  language: en
  yaml_path: translation/ot/2_kings/010/009.yaml
  text: And it happened in the morning that he went out and stood and said to all the people[a], “You are righteous. Look, I conspired against my master and killed him, but who struck down all these?”
  footnotes:
  - marker: a
    text: Or “You are righteous” / “You are in the right.” The Hebrew can denote being just or being free from blame; here the public-judicial sense favors “innocent.”
