- from: Estos[a], los que fueron mencionados por nombre, eran líderes en sus clanes[b], y la casa de sus padres se extendió en gran manera.
  to: Estos[a], los que fueron mencionados por sus nombres, eran líderes en sus clanes[b], y sus casas paternas crecieron en gran manera.
  rationale: Se ajusta la segunda mitad para reflejar mejor el sujeto colectivo/plural de וּבֵית אֲבוֹתֵיהֶם y el sentido de crecimiento abundante de פָּרְצוּ לָרֹב. También se suaviza 'por nombre' a la forma más idiomática 'por sus nombres' sin perder la precisión del registro genealógico.
