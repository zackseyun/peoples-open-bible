review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo y conserva la metáfora espacial de ''en ti'' para Tiro. Sin embargo, falla en dos elecciones léxicas importantes frente a la evidencia fuente y al rastro auditado del POB: חֲכָמֶיהָ en este contexto técnico-marítimo debe expresar destreza práctica, no mera sabiduría abstracta; y לַעֲרֹב מַעֲרָבֵךְ se refiere a comerciar/trocar con las mercancías, no simplemente ''cambiar por'' de manera poco idiomática. También conviene alinear mejor la nota de alternativa comercial y pulir la naturalidad del español.'
  spanish_quality_summary: El español es en general legible, pero 'sus hombres sabios' suena semánticamente desviado en contexto náutico, y 'para cambiar por tus mercaderías' resulta poco natural y ambiguo. 'Mercaderías' es comprensible, pero 'mercancías' o 'mercaderías' con un verbo comercial más claro funciona mejor. Las notas requieren ajuste menor de estilo y correspondencia con el texto revisado.
  glossary_alignment: No hay términos teológicos sensibles aquí. El topónimo 'Gebal' está bien conservado con nota sobre 'Biblos'. Se respeta el registro bíblico con 'naves' y la imagen personificada con 'en ti'. La revisión propuesta alinea mejor las decisiones léxicas documentadas del POB para 'skilled men' y 'to barter / wares'.
  issues:
  - severity: high
    issue: '''sus hombres sabios'' para חֲכָמֶיהָ'
    rationale: En Ezequiel 27:9 el contexto es técnico y marítimo; el hebreo apunta a hombres expertos/hábiles, no a sabios en sentido abstracto. La elección actual debilita el sentido funcional documentado en el POB audit trail.
  - severity: high
    issue: '''para cambiar por tus mercaderías'' para לַעֲרֹב מַעֲרָבֵךְ'
    rationale: La construcción española es poco idiomática y no comunica claramente la idea comercial de baratar/trocar/comerciar con mercancías. El hebreo y la revisión inglesa apuntan a intercambio comercial de bienes.
  - severity: low
    issue: Nota [c] desalineada con la mejor redacción comercial
    rationale: Si el texto principal usa 'trocar', la nota alternativa debe ofrecer otra posibilidad real; si el texto principal usa 'comerciar' o 'baratar', la nota debe reflejar la otra opción sin redundancia innecesaria.
