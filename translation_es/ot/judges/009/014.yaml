lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; «Entonces» transmite bien la secuencia sin sonar mecánico en español.
- source_word: כָל הָעֵצִים
  english_pob_choice: all the trees
  chosen_spanish: todos los árboles
  alternatives_spanish:
  - todos los árboles del campo
  - todos los árboles
  lexicon: HALOT
  rationale: Se conserva el sujeto colectivo de forma directa y natural. El artículo definido queda implícito en español con el plural determinado por el contexto.
- source_word: הָאָטָד
  english_pob_choice: the bramble
  chosen_spanish: el espino
  alternatives_spanish:
  - la zarza
  - el arbusto espinoso
  - el espino blanco
  lexicon: HALOT
  rationale: אָטָד designa un arbusto espinoso; «espino» comunica el carácter áspero y bajo de la planta sin imponer una identificación botánica más precisa de la que exige el hebreo.
- source_word: לֵךְ אַתָּה
  english_pob_choice: You come
  chosen_spanish: Tú, ven
  alternatives_spanish:
  - Ven tú
  - Tú ven
  lexicon: HALOT
  rationale: La secuencia imperativa hebrea funciona como un llamado enfático. En español, «Tú, ven» mantiene la fuerza del pronombre explícito y el tono urgente.
- source_word: מְלָךְ
  english_pob_choice: reign
  chosen_spanish: reina
  alternatives_spanish:
  - sé rey
  - gobierna como rey
  - reina como rey
  lexicon: HALOT
  rationale: El verbo expresa reinar/ser rey. «Reina» conserva la realeza verbal del hebreo mejor que una paráfrasis como «sé rey».
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - sobre nosotros mismos
  - sobre nuestra nación
  lexicon: HALOT
  rationale: Se mantiene la relación de dominio o supremacía indicada por על en este contexto de realeza.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el texto base; por eso se conserva la estructura breve y proverbial del versículo sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «espino» como equivalente funcional de אָטָד, manteniendo el matiz de planta espinosa sin sobreespecificar.
  - Se preserva el imperativo enfático con vocativo implícito explícito en español («Tú, ven»).
  - «Reina» conserva la dimensión monárquica del verbo מְלָךְ sin sustituirla por un término más genérico.
