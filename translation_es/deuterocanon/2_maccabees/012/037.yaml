- from: Iniciando el grito de batalla en la lengua de sus padres[a], con himnos[b], los sacudió inesperadamente a los del entorno de Gorgias y los puso en fuga.
  to: Iniciando el grito de batalla en la lengua de sus padres[a], con himnos, sacudió por sorpresa a los que estaban con Gorgias y los puso en fuga[b].
