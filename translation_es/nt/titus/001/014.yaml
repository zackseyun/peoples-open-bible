    issue: 'La nota al pie alternativa está formulada de manera confusa: «mandamientos humanos de personas».'
    rationale: 'El inglés auditado ofrece dos alternativas coordinadas: «Jewish myths» / «human commands» y luego especifica «from people who turn away from the truth». En español, «mandamientos humanos de personas» duplica innecesariamente la idea de humanidad/personas y suena poco natural. Debe simplificarse a «mandamientos humanos de quienes se apartan de la verdad» o estructura equivalente.'
