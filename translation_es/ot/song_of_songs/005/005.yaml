revisions:
- from: Me levanté para abrir a mi amado[a], y mis manos destilaron mirra, mis dedos mirra fluida[b], sobre las aldabas del cerrojo.
  to: Me levanté para abrir a mi amado, y mis manos destilaron mirra; mis dedos, mirra fluida[a], sobre las manijas del cerrojo[b].
  rationale: Se corrigieron los anclajes de las notas, se reemplazó 'aldabas' por 'manijas' para alinearse con כַּפּוֹת como asideros/herrajes del mecanismo de cierre, y se mejoró levemente la puntuación para que la elipsis poética de la segunda línea resulte natural en español sin apartarse del hebreo.
