review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia narrativa del hebreo: Efraín se une a su esposa, ella concibe, da a luz un hijo, y él le pone nombre por causa de la calamidad en su casa. Sin embargo, hay dos desajustes relevantes con el rastro auditado: (1) la nota [a] está anclada en «su esposa», pero el marcador inglés corresponde a la fórmula de nombrar («he named him Beriah»), no al eufemismo sexual; y (2) la nota [c] en español ofrece una alternativa para la cláusula causal, cuando en el inglés [c] está anclada al nombre Beriah y [b] explica «disaster». Además, «había habido desgracia» es aceptable, pero «había estado la desgracia» refleja mejor la revisión inglesa hacia la literalidad estática de הָיְתָה בְּבֵיתוֹ.'
  spanish_quality_summary: El español es legible y digno. «Se llegó a su esposa» suena bíblico pero puede resultar algo marcado en español contemporáneo; aun así es defendible. «Le puso por nombre» es natural y formal. La principal necesidad es corregir el sistema de notas para que los marcadores y contenidos correspondan al audit trail y al lugar correcto del texto. También conviene ajustar levemente la cláusula final a una formulación más cercana al hebreo y más clara que «había habido desgracia».
  glossary_alignment: No hay conflicto con la terminología teológica global del proyecto. «Desgracia» funciona bien para בְרָעָה como calamidad, no mal moral. «Su casa» preserva adecuadamente ביתו. El nombre puede mantenerse como «Bería» según la decisión española documentada, aunque difiere de la transliteración inglesa «Beriah».
  issues:
  - severity: high
    issue: Los marcadores de notas no corresponden al contenido ni al audit trail inglés.
    rationale: La nota [a] en el inglés pertenece a la fórmula de nombrar («he named him Beriah»), no a «went in to his wife». La [c] inglesa se ancla a «Beriah» y la [b] explica «disaster». En el borrador español, [a] está en «su esposa» y [c] comenta la cláusula causal, lo cual desordena la evidencia auditada.
  - severity: medium
    issue: La cláusula final «había habido desgracia en su casa» es menos fiel que una formulación estática.
    rationale: La revisión inglesa cambió deliberadamente a «had been in his house» para reflejar mejor הָיְתָה בְּבֵיתוֹ. En español, «había estado la desgracia en su casa» o similar conserva mejor ese matiz estático que «había habido».
  - severity: low
    issue: La razón de la nota [b] usa «sobre su casa», que introduce una imagen no presente en el hebreo.
    rationale: El hebreo dice literalmente «en su casa». La explicación puede mantenerse con «en su casa» o «en su hogar/casa» para no desplazar la imagen espacial.
  revised_spanish_text: Entonces se llegó a su esposa, y ella concibió y dio a luz un hijo, y le puso por nombre Bería[a][c], porque la desgracia[b] había estado en su casa.
  revised_footnotes:
