revisions:
- from: No descubrirás la desnudez de la hermana de tu madre ni de la hermana de tu padre[a], porque ha descubierto su propia carne[b]; ellos llevarán su iniquidad.
  to: No descubrirás la desnudez de la hermana de tu madre ni de la hermana de tu padre, porque ha dejado al descubierto su propia carne[a]; llevarán su iniquidad[b].
  rationale: La revisión corrige el anclaje de la nota léxica principal para que corresponda a שְׁאֵרוֹ («su propia carne»), añade la nota penal que el inglés POB conserva para עֲוֺנָם יִשָּׂאוּ, y mejora la naturalidad española con «ha dejado al descubierto» para reflejar mejor הֶעֱרָה frente a «descubrir» en la primera cláusula. También elimina el pronombre explícito «ellos» por estilo español, sin borrar el cambio de singular a plural del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo y preserva el modismo legal «descubrir la desnudez de». También mantiene correctamente el cambio deliberado de singular a plural en la cláusula explicativa y penal. Sin embargo, la nota [a] está mal anclada: en el inglés POB la nota correspondiente pertenece a «his own flesh», no al sintagma de parentesco anterior. Además, el texto principal repite «descubrir» en dos cláusulas donde el hebreo usa dos verbos distintos; una leve mejora de estilo puede reflejar mejor la decisión auditada («has laid bare») sin perder fidelidad.'
  spanish_quality_summary: El español es claro y legible, pero «ha descubierto su propia carne» suena algo tieso y repetitivo tras «No descubrirás la desnudez». «Ha dejado al descubierto su propia carne» o «ha puesto al descubierto su propia carne» suena más natural y refleja mejor el contraste verbal. También conviene evitar el pronombre explícito «ellos» en «ellos llevarán», ya que el español legal fluye mejor sin él.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Desnudez», «carne» e «iniquidad» están bien elegidos para este contexto. La preservación de «carne» para שְׁאֵר es especialmente importante y debe retenerse con su nota léxica correspondiente en el lugar correcto.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al parentesco equivocado.
    rationale: En el rastro inglés POB, la nota a explica «his own flesh» como lenguaje literal de parentesco, no «your father's sister». En español, esa nota debe ir junto a «su propia carne», no junto a «la hermana de tu padre».
  - severity: low
    issue: Repetición poco natural de «descubrir» en ambas cláusulas.
    rationale: El hebreo usa גלה en la prohibición y ערה en la explicación. Aunque ambos comparten campo semántico, repetir «descubrir» debilita la distinción y suena pesado en español.
  - severity: low
    issue: «ellos llevarán» suena innecesariamente marcado.
    rationale: El plural ya está claro en la flexión verbal «llevarán». Omitir el pronombre mejora la naturalidad sin perder el cambio de número que sí debe conservarse.
  revised_spanish_text: No descubrirás la desnudez de la hermana de tu madre ni de la hermana de tu padre, porque ha dejado al descubierto su propia carne[a]; llevarán su iniquidad[b].
  revised_footnotes:
  - marker: a
    text: 'O: «su propio pariente» / «su propia parentela». La expresión hebrea dice literalmente «su propia carne» y conserva el lenguaje de parentesco.'
    reason: lexical_alternative
  - marker: b
    text: «Llevarán su iniquidad» también puede significar «llevarán su culpa» o «cargarán con el castigo por su iniquidad».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota léxica principal para que corresponda a שְׁאֵרוֹ («su propia carne»), añade la nota penal que el inglés POB conserva para עֲוֺנָם יִשָּׂאוּ, y mejora la naturalidad española con «ha dejado al descubierto» para reflejar mejor הֶעֱרָה frente a «descubrir» en la primera cláusula. También elimina el pronombre explícito «ellos» por estilo español, sin borrar el cambio de singular a plural del hebreo.
