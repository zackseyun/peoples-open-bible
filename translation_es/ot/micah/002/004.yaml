base_translation:
  language: en
  yaml_path: translation/ot/micah/002/004.yaml
  text: On that day one will take up a taunt against you and lament a lament[a], saying, “We are utterly ruined! He changes the portion of my people[b]. How he removes it from me! To the one who turns away he divides our fields.”
  footnotes:
  - marker: a
    text: Or 'and wail a wailing,' or 'and chant a dirge.' The Hebrew repeats cognate mourning terms for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the apostate'; the phrase may also be understood as 'to a rebel' or, less likely, 'to the captor/one who turns back.'
    reason: alternative_reading
