translation:
  language: es
  text: Así que aborrecí la vida, porque me fue gravosa la obra que se hace bajo el sol; porque todo es vapor[a] y una persecución del viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vanidad' o 'aliento'; el hebreo hebel evoca algo fugaz, insustancial o escurridizo.
    reason: lexical_alternative
  - marker: b
    text: O 'un afán tras el viento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂנֵאתִי
  english_pob_choice: So I hated
  chosen_spanish: Y aborrecí
  alternatives_spanish:
  - Entonces aborrecí
  - Así que aborrecí
  lexicon: HALOT
  rationale: El verbo expresa una reacción estable y profunda del hablante. En español, 'aborrecer' comunica con más fuerza afectiva que 'odiar' en este contexto literario, y la conjunción inicial 'Y' conserva la progresión discursiva del hebreo sin añadir una inferencia demasiado interpretativa.
- source_word: הַחַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - la existencia
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural idiomático, aquí funciona como 'life' en inglés. 'La vida' es la equivalencia natural y clara en español.
- source_word: רַע עָלַי
  english_pob_choice: was grievous to me
  chosen_spanish: me fue gravosa
  alternatives_spanish:
  - me resultó dolorosa
  - me fue mala
  - me fue penosa
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'mala sobre mí', con sentido de carga opresiva o experiencia penosa. 'Me fue gravosa' mantiene la idea de peso/aflicción sin caer en un calco torpe ni en una moralización indebida.
- source_word: הַמַּעֲשֶׂה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  - la actividad
  lexicon: HALOT
  rationale: En Eclesiastés, el sustantivo puede abarcar la actividad humana en conjunto. 'La obra' conserva amplitud semántica y suena más literaria que 'el trabajo' en este pasaje reflexivo.
- source_word: שֶׁנַּעֲשָׂה
  english_pob_choice: that is done
  chosen_spanish: que se hace
  alternatives_spanish:
  - que es hecha
  - que fue hecha
  lexicon: HALOT
  rationale: El pasivo hebreo general se expresa de manera natural en español con 'se hace', manteniendo el carácter habitual o general de la acción bajo el sol.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: bajo el sol
  alternatives_spanish:
  - debajo del sol
  lexicon: HALOT
  rationale: Es un modismo clave de Eclesiastés para la esfera terrenal de la experiencia humana. 'Bajo el sol' reproduce el idioma establecido y es plenamente inteligible en español.
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - el conjunto
  - todo esto
  lexicon: HALOT
  rationale: '''Todo'' corresponde bien al alcance totalizador del hebreo y preserva la conclusión general del versículo.'
- source_word: הֶבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  - fugacidad
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de algo que se desvanece. 'Vapor' evita que 'vanidad' se entienda sólo como orgullo moral y mantiene la fuerza metafórica del hebreo.
- source_word: וּרְעוּת רוּחַ
  english_pob_choice: a striving after wind
  chosen_spanish: una persecución del viento
  alternatives_spanish:
  - un afán tras el viento
  - una búsqueda del viento
  - una carrera tras el viento
  lexicon: HALOT
  rationale: La frase expresa afán inútil o persecución de lo inasibles. 'Persecución del viento' conserva la imagen y la tensión semántica sin depender de un giro menos transparente en español.
theological_decisions:
- issue: Valor interpretativo de הֶבֶל
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - fugacidad
  - aliento
  rationale: No se trata de una disputa doctrinal, pero sí de una decisión teológica y literaria relevante. 'Vapor' preserva la metáfora hebrea de lo efímero, insustancial y difícil de aprehender, evitando cargar el término con un matiz moral ajeno.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de רְעוּת רוּחַ
  english_pob_reading: a striving after wind
  chosen_spanish_reading: una persecución del viento
  alternative_spanish_readings:
  - un afán tras el viento
  - una búsqueda del viento
  rationale: La expresión subraya la futilidad de la actividad humana. En español, 'persecución del viento' comunica el absurdo de intentar asir lo inasible y mantiene la imagen poética del original.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado del texto inglés, pero vuelve al valor hebreo directo allí donde el español exige una solución idiomática distinta. En particular, se preserva la fuerza metafórica de hebel con 'vapor' y la idea de futility/ pursuit con 'una persecución del viento', sin depender mecánicamente del calco inglés.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Bajo el sol'' se mantiene como modismo técnico de Eclesiastés.'
  - '''La vida'' y ''la obra'' son naturales en español y respetan la amplitud semántica del hebreo.'
  - Se evita 'SEÑOR' porque no aparece aquí ningún sustituto del nombre divino.
