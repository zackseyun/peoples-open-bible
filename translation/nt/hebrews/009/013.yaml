  to: the ashes of a heifer that sprinkle those who have been defiled
  rationale: The current rendering literally translates the Greek participle (ῥαντίζουσα) modifying 'ashes' (σποδὸς). However, the English syntax 'the ashes of a heifer sprinkling...' can be momentarily ambiguous, as if the heifer were the agent of sprinkling. While context clarifies this, using a relative clause ('that sprinkle') removes the ambiguity and improves readability without sacrificing the core meaning or the active voice of the original.
