translation:
  language: es
  text: Por la fidelidad de su boca fue buscado como vidente[a][b], y también por su palabra fue hallado fiel como pastor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la fe de su boca»; el hebreo favorece más naturalmente la idea de la fidelidad o confiabilidad de su habla.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «profeta», donde el hebreo lee «vidente».'
    reason: alternative_reading
  - marker: c
    text: El hebreo de la segunda línea es algo comprimido; el sentido puede ser que, por su palabra, fue reconocido como un pastor fiel.
    reason: textual_variant
lexical_decisions:
- source_word: באמונת
  english_pob_choice: by the faithfulness of
  chosen_spanish: Por la fidelidad de
  alternatives_spanish:
  - por la fe de
  - en la fidelidad de
  - por la confiabilidad de
  lexicon: HALOT
  rationale: אָמ֫וּנָה expresa aquí fidelidad, firmeza o confiabilidad, no fe subjetiva. El español natural y fiel es «fidelidad de», conservando el valor relacional con la boca.
- source_word: פיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su habla
  - su palabra
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal e idiomática del hebreo. «Boca» preserva el vínculo entre la fidelidad y la palabra pronunciada.
- source_word: דרוש
  english_pob_choice: was sought out
  chosen_spanish: fue buscado
  alternatives_spanish:
  - fue consultado
  - fue inquirido
  lexicon: HALOT
  rationale: El pasivo comunica que la gente lo buscó o lo consultó. «Fue buscado» es claro en español y no añade más de lo que el hebreo exige.
- source_word: חזה
  english_pob_choice: as a seer
  chosen_spanish: como profeta
  alternatives_spanish:
  - como vidente
  - como visionario
  lexicon: HALOT; Greek προφήτης
  rationale: El hebreo sugiere «vidente» o «seer», pero el paralelo griego interpreta con προφήτης. En español, «profeta» comunica bien ambas tradiciones y el matiz resulta más natural; la alternativa literal queda preservada en nota.
- source_word: וגם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y además
  lexicon: HALOT
  rationale: Reproduce la adición enfática del hebreo sin exceso de solemnidad.
- source_word: בדברו
  english_pob_choice: by his word
  chosen_spanish: por su palabra
  alternatives_spanish:
  - en su palabra
  - con su palabra
  lexicon: HALOT
  rationale: «Por su palabra» conserva la relación causal/instrumental del hebreo y coincide con la revisión auditada del inglés.
- source_word: נאמן
  english_pob_choice: was found faithful
  chosen_spanish: fue hallado fiel
  alternatives_spanish:
  - fue encontrado fiel
  - resultó fiel
  - se reconoció fiel
  lexicon: HALOT
  rationale: La forma pasiva/estativa se refleja bien con «fue hallado fiel», que preserva el eco de la valoración externa y mantiene el paralelismo con la primera línea.
- source_word: רועה
  english_pob_choice: a shepherd
  chosen_spanish: como pastor
  alternatives_spanish:
  - como un pastor
  - como pastor de ovejas
  - como guía
  lexicon: HALOT
  rationale: En español, «pastor» comunica la imagen hebrea y funciona de manera natural junto a «fue hallado fiel». La noción metafórica de liderazgo queda implícita en la imagen pastoral.
theological_decisions:
- issue: 'אמונה / πίστις: fe versus fidelidad'
  english_pob_reading: faithfulness of his mouth
  chosen_spanish_reading: fidelidad de su boca
  alternative_spanish_readings:
  - fe de su boca
  - confiabilidad de su boca
  rationale: Siguiendo el testimonio hebreo primario y la lectura auditada del inglés, el énfasis cae en la confiabilidad de su habla, no en una fe interior subjetiva. «Fidelidad» preserva esa tensión y evita borrar el matiz objetivo.
  doctrine_reference: 'DOCTRINE.md: contested terms for πίστις / אֱמוּנָה; prefer the source-driven sense where speech reliability is in view.'
- issue: חזה frente al griego προφήτης
  english_pob_reading: seer
  chosen_spanish_reading: profeta
  alternative_spanish_readings:
  - vidente
  - seer
  rationale: El hebreo es la forma primaria y sugiere «vidente»; sin embargo, el paralelo griego usa «profeta». Dado que el español bíblico entiende mejor «profeta» que «vidente» en un registro publicable, se adopta «profeta» en el texto principal y se deja constancia de la alternativa en nota.
  doctrine_reference: 'DOCTRINE.md: original-language primacy with documented secondary alignment to Greek parallels.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés que corrigió la segunda cláusula para reflejar al sujeto implícito («fue hallado fiel») y para rendir בדברו de manera más natural como relación causal/instrumental («por su palabra»). También se respetó la preferencia del corpus por la primacía hebrea en חזה, mientras se documenta la lectura griega alternativa.
  spanish_consistency_notes:
  - Se mantuvo «fidelidad» para אֱמוּנָה/πίστις en contexto de habla, evitando traducirlo como fe subjetiva.
  - Se preservó la imagen de «boca» y «palabra» para sostener el paralelismo hebreo.
  - «Pastor» se usó como equivalente bíblico natural de רועה, sin sustituirlo por términos explicativos.
  - Las notas marcan las alternativas relevantes sin sobrecargar el texto principal.
