translation:
  language: es
  text: Y harás sobre el pectoral cadenas de oro puro[a], de labor trenzada, como cordones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cadenas torcidas' o 'cadenas en forma de cordón'; el hebreo describe cadenas hechas con un patrón trenzado o semejante a una cuerda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Haz
  lexicon: HALOT
  rationale: La forma verbal hebrea en instrucción prescribe una acción futura/mandatada; en español, "harás" conserva ese valor normativo sin sonar forzado.
- source_word: עַל הַחֹשֶׁן
  english_pob_choice: on the breastpiece
  chosen_spanish: sobre el pectoral
  alternatives_spanish:
  - sobre el pectoral del sacerdote
  - en el pectoral
  lexicon: HALOT
  rationale: '"Pectoral" comunica el objeto cultual con claridad en español; "sobre" conserva la relación de colocación/adhesión indicada por עַל.'
- source_word: שַׁרְשֹׁת
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - cadenillas
  - cadenas enlazadas
  lexicon: HALOT
  rationale: El sustantivo denota cadenas; "cadenas" es la equivalencia directa y natural en español.
- source_word: גַּבְלֻת
  english_pob_choice: braided
  chosen_spanish: trenzada
  alternatives_spanish:
  - trenzadas
  - entrelazada
  - torcida
  lexicon: HALOT
  rationale: El término describe el modo de fabricación de las cadenas. "Trenzada" conserva la idea de una elaboración entrelazada sin imponer un tecnicismo excesivo.
- source_word: מַעֲשֵׂה עֲבֹת
  english_pob_choice: work like cords
  chosen_spanish: obra trenzada como cuerdas
  alternatives_spanish:
  - trabajo de cuerdas
  - obra de cordón
  - obra torcida como cuerdas
  lexicon: HALOT
  rationale: La construcción expresa un trabajo hecho con forma de cuerda/cordón. "Obra trenzada como cuerdas" mantiene el paralelismo material y artesanal del hebreo.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La expresión material estándar se traduce de manera directa y natural; "oro puro" es clara y fiel al valor descriptivo.
