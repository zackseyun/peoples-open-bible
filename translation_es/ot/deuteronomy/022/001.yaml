translation:
  language: es
  text: Si ves el buey de tu hermano o su oveja[a] extraviados, no te desentenderás[b] de ellos; debes devolverlos sin falta a tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «su oveja» puede designar de manera más amplia el ganado menor, incluso una cabra; se mantiene «oveja» en el texto principal por naturalidad en la pareja legal con «buey».
    reason: lexical_alternative
  - marker: b
    text: Lit. «ocultarte de ellos»; es decir, evitar deliberadamente intervenir.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - buey de labor
  - toro
  lexicon: HALOT
  rationale: En español bíblico actual, «buey» comunica con naturalidad el animal de trabajo doméstico al que se refiere el hebreo, sin la aspereza técnica de «ox». Mantiene el sentido legal y cotidiano del texto.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu prójimo
  - tu pariente
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco del hebreo. Aunque el marco sea comunitario e israelita, el texto dice literalmente «hermano», y esa forma preserva la fuerza social/covenantal sin generalizar indebidamente.
- source_word: שֵׂיוֹ
  english_pob_choice: his sheep
  chosen_spanish: su oveja
  alternatives_spanish:
  - su ganado menor
  - su oveja o cabra
  - su animal de rebaño
  lexicon: HALOT
  rationale: El hebreo puede abarcar de manera más amplia el ganado menor, pero en la lista legal junto al buey, «oveja» es una equivalencia natural y transparente en español. La posible amplitud semántica se conserva en nota.
- source_word: נִדָּחִים
  english_pob_choice: straying
  chosen_spanish: extraviados
  alternatives_spanish:
  - descarriados
  - dispersados
  - apartados
  lexicon: HALOT
  rationale: El participio expresa animales que han quedado fuera de su lugar, con matiz de pérdida o desvío. «Extraviados» reproduce bien esa situación en español y evita una paráfrasis demasiado interpretativa.
- source_word: וְהִתְעַלַּמְתָּ מֵהֶם
  english_pob_choice: and ignore them
  chosen_spanish: ni te harás el desentendido respecto de ellos
  alternatives_spanish:
  - y los ignorarás
  - ni los ocultarás de tu vista
  - y no les prestarás atención
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «ocultarte de ellos», con la fuerza ética de evadir deliberadamente la obligación. «Te harás el desentendido» conserva esa intención sin sonar tan literal que resulte poco natural en español.
- source_word: הָשֵׁב תְּשִׁיבֵם
  english_pob_choice: you must surely return them
  chosen_spanish: seguramente los devolverás
  alternatives_spanish:
  - los devolverás sin falta
  - ciertamente los restituirás
  - los has de devolver
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica el mandato. «Seguramente» reproduce la fuerza enfática de manera formal y fluida en español; «devolverás» mantiene el verbo de restitución sin exceder el alcance del hebreo.
theological_decisions:
- issue: 'Ámbito relacional del mandamiento: «hermano» frente a una generalización social'
  english_pob_reading: Literal 'your brother' best matches the Hebrew and preserves the covenantal/social force of kinship language.
  chosen_spanish_reading: «tu hermano» en el texto principal, sin sustituirlo por «prójimo» o «compatriota».
  alternative_spanish_readings:
  - tu prójimo
  - tu compatriota
  - tu pariente
  rationale: El hebreo usa parentesco, no un término genérico. Mantenerlo evita borrar la textura del mandato y deja abierta la aplicación comunitaria sin imponerla en la traducción principal.
  doctrine_reference: Éxodo 23:4; Levítico 19:18
- issue: Fuerza obligativa del infinitivo absoluto hebreo
  english_pob_reading: '''you must surely return them'' captures both obligation and emphatic force.'
  chosen_spanish_reading: «seguramente los devolverás» como mandato enfático.
  alternative_spanish_readings:
  - los devolverás sin falta
  - ciertamente los restituirás
  - has de devolverlos
  rationale: La construcción hebrea no es simple futuro; intensifica la obligación. En español, una forma enfática pero natural preserva esa fuerza sin inflar el registro.
  doctrine_reference: Deuteronomio 22:1; cf. forma intensiva del infinitivo absoluto en hebreo bíblico
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que ajustó נִדָּחִים de una idea de «arrastrados»/«expulsados» a «straying» («extraviados») y reforzó el matiz enfático del infinitivo absoluto con un inglés más natural. En español se reflejan ambos ajustes con «extraviados» y una restitución enfática («seguramente los devolverás»), sin perder la obligación legal del texto.
  spanish_consistency_notes:
  - Se mantiene «tu hermano» para אָחִיךָ, en línea con la política POB de conservar la kinship language cuando el hebreo la usa explícitamente.
  - Se evita «SEÑOR» u otra terminología no presente, pues el versículo no contiene el Tetragrámaton ni un referente divino directo.
  - «Buey» y «oveja» siguen un registro bíblico claro y ampliamente inteligible en español; la posible amplitud de שֵׂי/וֹ queda documentada en nota.
  - La puntuación coordina los dos miembros del mandato con una sola oración fluida, adecuada para publicación.
