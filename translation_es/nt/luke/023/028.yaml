translation:
  language: es
  text: 'Pero, volviéndose hacia ellas[a], Jesús dijo: «Hijas de Jerusalén, no lloren por mí; más bien, lloren por ustedes mismas y por sus hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mujeres de Jerusalén». El griego dice literalmente «Hijas de Jerusalén», y se conserva en el texto principal por su tono profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turning
  chosen_spanish: volviéndose
  alternatives_spanish:
  - girándose
  - volviéndose hacia
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción física de reorientarse antes del verbo principal. «Volviéndose» expresa bien ese movimiento en español natural y conserva la relación participial.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca una transición narrativa con leve contraste; «Pero» comunica ese giro con claridad en español.
- source_word: πρὸς αὐτὰς
  english_pob_choice: toward them
  chosen_spanish: hacia ellas
  alternatives_spanish:
  - a ellas
  - para ellas
  lexicon: BDAG
  rationale: La preposición con acusativo señala dirección. «Hacia ellas» preserva el sentido espacial junto con el participio anterior.
- source_word: Θυγατέρες Ἰερουσαλήμ
  english_pob_choice: Daughters of Jerusalem
  chosen_spanish: Hijas de Jerusalén
  alternatives_spanish:
  - Mujeres de Jerusalén
  - Hijas, Jerusalén
  lexicon: BDAG
  rationale: Se conserva el vocativo literal y su resonancia profética/corporativa. «Hijas» mantiene la imagen de parentesco y el eco bíblico mejor que una paráfrasis demográfica.
- source_word: μὴ κλαίετε
  english_pob_choice: do not weep
  chosen_spanish: no lloren
  alternatives_spanish:
  - no lloréis
  - dejen de llorar
  lexicon: BDAG
  rationale: El imperativo con μή prohíbe la acción; «no lloren» es natural, claro y fiel sin forzar una matización aspectual que el español no necesita aquí.
- source_word: ἐπ’ ἐμέ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - a causa de mí
  - sobre mí
  lexicon: BDAG
  rationale: Con κλαίω, ἐπί con acusativo expresa el motivo/objeto del llanto. «Por mí» comunica con naturalidad ese sentido causal u objetual en español.
- source_word: πλὴν
  english_pob_choice: instead
  chosen_spanish: más bien
  alternatives_spanish:
  - sin embargo
  - no obstante
  - en cambio
  lexicon: BDAG
  rationale: 'Aquí introduce una corrección contrastiva: no llorar por Jesús, sino por sí mismas. «Más bien» reproduce bien esa rectificación en español.'
- source_word: ἐφ’ ἑαυτὰς
  english_pob_choice: for yourselves
  chosen_spanish: por ustedes mismas
  alternatives_spanish:
  - sobre ustedes mismas
  - para ustedes mismas
  lexicon: BDAG
  rationale: El reflexivo con ἐπί mantiene el paralelismo con ἐπ’ ἐμέ. «Por ustedes mismas» conserva la relación semántica con el llanto y su objeto/carga causal.
- source_word: τὰ τέκνα ὑμῶν
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: BDAG
  rationale: τέκνα denota hijos/niños en sentido familiar. En español, «sus hijos» es la equivalencia más directa y sobria.
theological_decisions:
- issue: Conservación del vocativo profético «Daughters/Hijas of Jerusalem»
  english_pob_reading: The phrase is not merely demographic but carries prophetic and covenantal resonance from Israel's scriptural idiom. Retaining 'Daughters' preserves that intertextual weight without importing extra doctrine.
  chosen_spanish_reading: Hijas de Jerusalén
  alternative_spanish_readings:
  - Mujeres de Jerusalén
  - Jerusalén, mujeres
  rationale: La forma literal mantiene el eco profético y la carga literaria del llamado. Cambiarlo por «Mujeres de Jerusalén» debilita esa resonancia y vuelve más plano el texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente muestran alta convergencia y no indican cambios pendientes; la presente propuesta sigue esa línea sin introducir ajustes no respaldados por el griego o por el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς como nombre propio estándar.
  - Se conserva el vocativo literal «Hijas de Jerusalén» por su valor intertextual.
  - «Por mí / por ustedes mismas / por sus hijos» refleja el paralelismo de ἐπί con κλαίω y evita una traducción demasiado interpretativa.
  - La puntuación y las comillas se ajustan al uso español, manteniendo el discurso directo claro y publicable.
