base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/003.yaml
  text: O Yahweh[a], are not your eyes on faithfulness? You struck them, but they did not feel pain; you consumed them, but they refused to accept discipline. They made their faces harder than rock[b]; they refused to return.
  footnotes:
  - marker: a
    text: Or 'they did not weaken,' 'they did not become sick,' or 'they did not feel pain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they refused to repent.' The Hebrew literally says 'to return,' a common prophetic expression for turning back to God.
    reason: lexical_alternative
