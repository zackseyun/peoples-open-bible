source:
  edition: WLC
  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד הָב֣וּ לַֽ֭/יהוָה בְּנֵ֣י אֵלִ֑ים הָב֥וּ לַ֝/יהוָ֗ה כָּב֥וֹד וָ/עֹֽז׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/029/000.yaml
  text: A psalm of David. Ascribe to Yahweh[a], sons of the mighty, ascribe to Yahweh glory and strength.
  footnotes:
  - marker: a
    text: Or 'O sons of God' or 'O heavenly beings.' The Hebrew phrase likely refers to members of the heavenly court.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:50Z'
    unchanged: false
    changes_summary: Completed the verse by adding the omitted main clause after the superscription; rendered לַיהוָה as 'to Yahweh' and preserved the repeated imperative 'ascribe'; translated בְּנֵי אֵלִים as 'sons of the mighty' in a formal, non-paraphrastic way.
translation:
  language: es
  text: Salmo de David. Atribuyan a Yahvé, hijos de Dios[a], atribuyan a Yahvé gloria y fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hijos de los poderosos' o 'seres celestiales'. La expresión hebrea probablemente se refiere a miembros de la corte celestial.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזְמ֗וֹר לְדָוִ֥ד
  english_pob_choice: A psalm of David.
  chosen_spanish: Salmo de David.
  alternatives_spanish:
  - Un salmo de David.
  - Salmo perteneciente a David.
  lexicon: מִזְמֹור
  rationale: Conserva la fórmula breve y convencional del encabezado hebreo sin sobreexplicarla; en español, 'Salmo de David' es natural y fiel al valor titular.
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuyan
  alternatives_spanish:
  - Den
  - Reconozcan
  - Tributen
  lexicon: הבו
  rationale: '''Atribuyan'' conserva el valor imperativo de rendir o reconocer públicamente lo debido, más cercano al mandato del contexto que ''den''.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: יהוה
  rationale: Se mantiene 'Yahvé' según el estándar del proyecto para יהוה, evitando la sustitución por una máscara litúrgica.
- source_word: בְּנֵי אֵלִים
  english_pob_choice: sons of the mighty
  chosen_spanish: hijos de los poderosos
  alternatives_spanish:
  - hijos de Dios
  - seres celestiales
  - hijos de los dioses
  lexicon: אֵלִים
  rationale: '''Hijos de los poderosos'' preserva la ambigüedad lexical del hebreo y evita cerrar prematuramente la referencia. En español resulta más transparente que ''sons of the mighty'' y mantiene la posibilidad de una asamblea celestial.'
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: כבוד
  rationale: '''Gloria'' es el equivalente más directo y estable en el registro bíblico español.'
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y fuerza
  alternatives_spanish:
  - y poder
  - y vigor
  lexicon: עֹז
  rationale: '''Fuerza'' reproduce bien la cualidad de vigor/potencia sin añadir matices innecesarios.'
theological_decisions:
- issue: Destino de la invocación dirigida a בְּנֵי אֵלִים
  english_pob_reading: sons of the mighty, with a footnote noting the heavenly-court alternative
  chosen_spanish_reading: hijos de los poderosos, con nota que preserva la alternativa celestial
  alternative_spanish_readings:
  - hijos de Dios
  - seres celestiales
  - hijos de los poderosos
  rationale: La lectura principal mantiene la forma más cercana al hebreo masorético y no decide el debate interpretativo; la nota permite la alternativa 'hijos de Dios' / 'seres celestiales' como en el audit trail inglés.
  doctrine_reference: Sal 29:1; Job 1:6; 2:1; 38:7
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El proyecto exige 'Yahvé' como forma principal para יהוה; se aplica de manera consistente en el encabezado y en la invocación repetida.
  doctrine_reference: Éx 3:15; Sal 29:1-2
translation_notes:
  revision_awareness: Se corrigió la omisión previa del verbo principal del segundo hemistiquio y se alineó el nombre divino con la terminología del proyecto. La nota de variante se ancla ahora correctamente al sintagma 'hijos de los poderosos' para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - 'Mantengo la estructura paralela del hebreo: encabezado + dos imperativos idénticos + dos objetos paralelos.'
  - '''Atribuyan'' funciona como imperativo plural formal y conserva la repetición enfática del original.'
  - La nota [a] está anclada al grupo nominal ambivalente para reflejar la alternativa interpretativa sin alterar el cuerpo principal.
