source:
  edition: SBLGNT
  text: ᾧ ἀντίστητε στερεοὶ τῇ πίστει, εἰδότες τὰ αὐτὰ τῶν παθημάτων τῇ ἐν τῷ κόσμῳ ὑμῶν ἀδελφότητι ἐπιτελεῖσθαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/009.yaml
  text: 'Resist him, firm in the faith, knowing that the same sufferings are being experienced by your brotherhood in the world.'
translation:
  language: ko
  text: '믿음에 굳게 서서 그를 대적하십시오. 세상에 있는 여러분의 형제자매들도 동일한 고난들을 겪고 있음을 알기 때문입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίστητε
  english_pob_choice: Resist him
  chosen_korean: 그를 대적하십시오
  alternatives_korean:
  - 그에게 맞서십시오
  - 그를 막아 서십시오
  lexicon: BDAG
  rationale: ἀνθίστημι의 「맞서 견디다」를 「대적하다」로 옮긴다 (약 4:7과 동일 어휘).
- source_word: στερεοὶ τῇ πίστει
  english_pob_choice: firm in the faith
  chosen_korean: 믿음에 굳게 서서
  alternatives_korean:
  - 믿음으로 견고하게
  - 믿음 안에 굳건하게
  lexicon: BDAG
  rationale: στερεός의 「단단함·견고함」을 「굳게」로 옮긴다.
- source_word: τῇ ... ἀδελφότητι
  english_pob_choice: your brotherhood
  chosen_korean: 여러분의 형제자매들
  alternatives_korean:
  - 너희 형제 공동체
  - 너희의 형제단
  lexicon: BDAG
  rationale: 2:17과 통일하여 「형제자매들」 사용.
- source_word: ἐπιτελεῖσθαι
  english_pob_choice: are being experienced
  chosen_korean: 겪고 있음
  alternatives_korean:
  - 이루어지고 있음
  - 완수되고 있음
  lexicon: BDAG
  rationale: 수동/중간형 둘 다 가능. 여기서는 「당하고 있음」으로 자연스럽다. 「겪다」로 옮긴다.
