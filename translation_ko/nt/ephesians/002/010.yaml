id: EPH.2.10
reference: Ephesians 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: αὐτοῦ γάρ ἐσμεν ποίημα, κτισθέντες ἐν Χριστῷ Ἰησοῦ ἐπὶ ἔργοις ἀγαθοῖς οἷς προητοίμασεν ὁ θεὸς ἵνα ἐν αὐτοῖς περιπατήσωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/010.yaml
  text: For we are his workmanship, created in Messiah Jesus for good works, which God prepared beforehand so that we might walk in them.
translation:
  language: ko
  text: 우리는 그분의 만드신 작품이니[a], 메시아 예수 안에서 선한 일을 위하여 지음받았습니다. 그 선한 일은 하나님께서 미리 예비하사 우리로 그 가운데서 행하게 하신 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ποίημα는 「만들어진 것·작품」을 가리킨다. 「작품」은 손길로 빚으신 결과물의 무게를 살린다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποίημα
  english_pob_choice: workmanship
  chosen_korean: 만드신 작품
  alternatives_korean:
  - 만드신 것
  - 지으신 바
  lexicon: BDAG
  rationale: 「작품」으로 옮겨 빚으신 결과물의 무게를 보존한다.
- source_word: ἐπὶ ἔργοις ἀγαθοῖς
  english_pob_choice: for good works
  chosen_korean: 선한 일을 위하여
  alternatives_korean:
  - 선한 행위를 향하여
  lexicon: BDAG
  rationale: ἐπί + 여격의 목적성을 「위하여」로 옮긴다.
theological_decisions:
- issue: 2:8–10의 은혜/행위 균형
  chosen_reading: 행위에서 난 구원이 아니되, 구원받은 자가 선한 일을 위하여 지음받았음을 똑같이 명료히 한다.
  alternative_readings:
  - 행위의 비중을 흐려 「선한 결과」 정도로 풀기
  rationale: 본 단락은 8–9절의 「행위에서 난 것이 아니」와 10절의 「선한 일을 위하여 지음받았다」를 한 호흡에 둔다. 한국어에서도 이 균형을 무너뜨리지 않고, 「선한 일」을 구원의 원인이 아니라 결과·목적으로 분명히 위치시킨다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; do not soften.'
