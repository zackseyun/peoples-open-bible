translation:
  language: es
  text: Y cuando prepares un toro como holocausto o como sacrificio[a], para cumplir un voto o como ofrendas de paz[b] para Yahvé,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para realizar un voto» o «para hacer efectivo un voto». El hebreo emplea una expresión idiomática para indicar el cumplimiento de lo prometido.
    reason: lexical_alternative
  - marker: b
    text: O «ofrendas de comunión» o «ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y si
  - Y cuando suceda que
  lexicon: HALOT
  rationale: En este contexto legal y procedimental, la partícula introduce una situación hipotética o temporal. «Y cuando» conserva el avance de la instrucción y suena natural en español sin volverla más general que el hebreo.
- source_word: תַעֲשֶׂה
  english_pob_choice: you prepare
  chosen_spanish: ofrezcas
  alternatives_spanish:
  - prepares
  - hagas
  - presentes
  lexicon: HALOT
  rationale: El hebreo usa un verbo amplio («hacer») dentro de un marco sacrificial. En español, «ofrezcas» comunica de forma natural la acción cultual de presentar el animal, sin perder el carácter práctico del mandato.
- source_word: בֶן בָּקָר
  english_pob_choice: a bull
  chosen_spanish: un becerro
  alternatives_spanish:
  - un toro
  - un novillo
  - un becerro del ganado
  lexicon: HALOT
  rationale: La expresión hebrea designa un animal del ganado vacuno. «Becerro» mantiene la referencia al bovino sacrificial y evita añadir una edad o tamaño más específico de lo que el hebreo exige.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente tradicional y preciso en español para la ofrenda totalmente consumida por el fuego. En contexto bíblico sigue siendo claro y conserva la categoría cultual establecida.
- source_word: אוֹ זָבַח
  english_pob_choice: or a sacrifice
  chosen_spanish: o como sacrificio
  alternatives_spanish:
  - o como ofrenda
  - o como sacrificio de matanza
  lexicon: HALOT
  rationale: זבח es un término sacrificial amplio. En español, «sacrificio» expresa bien esa amplitud y mantiene la oposición con el holocausto sin imponer una especificación innecesaria.
- source_word: לְ/פַלֵּא נֶדֶר
  english_pob_choice: to fulfill a vow
  chosen_spanish: para cumplir un voto
  alternatives_spanish:
  - para realizar un voto
  - para hacer efectivo un voto
  - para llevar a cabo un voto
  lexicon: HALOT
  rationale: La frase idiomática comunica la ejecución de lo prometido. «Cumplir un voto» es la manera más clara y fiel de expresar esa idea en español, preservando el sentido de llevar a cabo lo que fue prometido.
- source_word: אוֹ שְׁלָמִים
  english_pob_choice: or peace offerings
  chosen_spanish: o como ofrenda de paz
  alternatives_spanish:
  - o como ofrendas de comunión
  - o como ofrendas de bienestar
  lexicon: HALOT
  rationale: «Ofrenda de paz» mantiene la categoría sacrificial tradicional en español y refleja la decisión inglesa de conservar un término reconocido. Se evita ampliar demasiado el matiz relacional que pueden sugerir otras opciones.
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para renderizar el nombre divino como «Yahvé» en el texto principal. La preposición final se expresa de modo natural con «para» en el marco de una ofrenda destinada a Dios.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El criterio del proyecto exige conservar el nombre del pacto en forma transparente. «Yahvé» evita el ocultamiento del Tetragrámaton y sigue la convención establecida para el español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Naturaleza de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrenda de paz
  alternative_spanish_readings:
  - ofrenda de comunión
  - ofrenda de bienestar
  rationale: La expresión tiene un campo semántico amplio. «Ofrenda de paz» conserva una forma reconocible y sobria en español, sin perder la categoría ritual ni imponer una sola interpretación teológica del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue la lectura estable del audit trail inglés y no requiere cambios respecto del estado revisado más reciente. Se mantiene la misma segmentación conceptual: holocausto / sacrificio / voto / ofrenda de paz / Yahvé.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma principal del nombre divino, conforme al criterio del proyecto.
  - «Holocausto» se usa como término cultual técnico y coherente con la tradición bíblica en español.
  - «Ofrenda de paz» mantiene la terminología sacrificial sin sustituirla por una paráfrasis explicativa en el texto principal.
  - «Cumplir un voto» expresa de modo natural el idiomático לְפַלֵּא נֶדֶר, con la alternativa explicada en nota.
  - Se evita usar «Cristo» o vocabulario cristológico, ya que no aparece en el versículo ni en el audit trail.
