base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/014/021.yaml
  text: You shall not eat any carcass[a]. You may give it to the sojourner who is within your gates, and he may eat it; or you may sell it to a foreigner. For you are a holy people to Yahweh your God[e][d][c][b]. You shall not boil a young goat in its mother's milk.
  footnotes:
  - marker: a
    text: Or, 'anything that dies naturally' or 'dead animal.' The Hebrew נְבֵלָה refers to an animal carcass not slaughtered in a permitted way.
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' translates גֵּר, a resident foreigner living among Israel; this differs from ''foreigner'' (נָכְרִי) in the next clause.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'within your gates,' a Hebrew idiom for those living within your community or towns.
    reason: cultural_note
  - marker: d
    text: Or, more formally, 'You shall give it ... and he shall eat it; or sell it to a foreigner.' The Hebrew legal style can be rendered either as permission or instruction.
    reason: alternative_reading
  - marker: e
    text: Or, traditionally, 'You shall not boil a kid in its mother's milk.'
    reason: lexical_alternative
