translation:
  language: es
  text: Y ahora, Señor Dios, Rey, Dios de Abraham, preserva a tu pueblo, porque nos vigilan[a] para destruirnos y han deseado destruir tu herencia[b] desde el principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos vigilan para ruina» o «han puesto los ojos en nosotros para destrucción». La expresión griega es condensada y comunica intención hostil dirigida a nuestra caída.
    reason: lexical_alternative
  - marker: b
    text: O «tu herencia de antiguo» / «tu antigua herencia».
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Como vocativo divino, en español bíblico la forma natural y reverente es "Señor"; preserva el título sin volverlo excesivamente explicativo.
- source_word: ὁ θεὸς ὁ βασιλεὺς
  english_pob_choice: God, King
  chosen_spanish: Dios, Rey
  alternatives_spanish:
  - el Dios, el Rey
  - Dios el Rey
  lexicon: LSJ
  rationale: La secuencia de títulos se conserva compacta en español con una coma, manteniendo la acumulación invocativa del griego.
- source_word: φεῖσαι
  english_pob_choice: spare
  chosen_spanish: perdona
  alternatives_spanish:
  - ten misericordia de
  - preserva
  lexicon: LSJ
  rationale: En una súplica de rescate, "perdona" funciona en español bíblico como ruego de clemencia y encaja mejor que una forma más literal pero menos idiomática; no se usa "ten misericordia" porque el verbo griego aquí apunta a no abandonar al pueblo a su suerte.
- source_word: τοῦ λαοῦ σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  lexicon: LSJ
  rationale: '"Pueblo" conserva el sentido de comunidad pactal y evita estrechar indebidamente la referencia.'
- source_word: ἐπιβλέπουσιν ἡμῖν εἰς καταφθοράν
  english_pob_choice: they are watching us for destruction
  chosen_spanish: nos miran para destrucción
  alternatives_spanish:
  - nos vigilan para destrucción
  - están mirando hacia nosotros para destrucción
  - nos miran para ruina
  lexicon: LSJ
  rationale: La construcción griega es comprimida y hostil. "Nos miran para destrucción" mantiene la dirección del daño sin añadir más explicación que el texto no exige; "ruina" queda como alternativa semántica posible para καταφθοράν.
- source_word: καταφθοράν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - desastre
  lexicon: LSJ
  rationale: '"Destrucción" reproduce la fuerza del sustantivo con un registro natural y solemne.'
- source_word: ἐπεθύμησαν
  english_pob_choice: have desired
  chosen_spanish: han deseado
  alternatives_spanish:
  - han planeado
  - han anhelado
  lexicon: BDAG
  rationale: Se conserva el valor básico de deseo/intención hostil sin forzar un sentido técnico de planificación que el verbo por sí solo no exige.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - hacer perecer
  lexicon: LSJ
  rationale: Infinitivo directo y transparente en español, adecuado para el objeto corporativo de la acción.
- source_word: τὴν ἐξ ἀρχῆς κληρονομίαν σου
  english_pob_choice: your inheritance from the beginning
  chosen_spanish: tu herencia desde el principio
  alternatives_spanish:
  - tu herencia de antiguo
  - tu herencia desde antiguo
  - la herencia que es tuya desde el principio
  lexicon: LSJ
  rationale: '"Herencia" comunica bien κληρονομία en español; "desde el principio" sigue de cerca ἐξ ἀρχῆς, mientras que "de antiguo" se preserva como alternativa idiomática.'
theological_decisions:
- issue: Título divino κύριος en la invocación
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En una oración dirigida a Dios, "Señor" es el equivalente reverente y comprensible en español. No se sustituye por "Maestro", porque eso debilitaría el uso litúrgico y bíblico del vocativo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de κληρονομία como posesión pactal
  english_pob_reading: your inheritance
  chosen_spanish_reading: tu herencia
  alternative_spanish_readings:
  - tu heredad
  - tu posesión ancestral
  rationale: El paralelo con "tu pueblo" sugiere una designación pactal de Israel como posesión de Dios. "Herencia"/"heredad" son posibles; "herencia" mantiene claridad contemporánea sin perder el matiz teológico.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido de ἐξ ἀρχῆς
  english_pob_reading: from the beginning
  chosen_spanish_reading: desde el principio
  alternative_spanish_readings:
  - de antiguo
  - desde antiguo
  rationale: La forma principal conserva la transparencia del griego. En español puede entenderse como inicio absoluto o como antigüedad de la posesión; por eso se mantiene una alternativa idiomática en nota.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Fuerza hostil de ἐπιβλέπουσιν ἡμῖν εἰς καταφθοράν
  english_pob_reading: they are watching us for destruction
  chosen_spanish_reading: nos miran para destrucción
  alternative_spanish_readings:
  - nos vigilan para destrucción
  - nos miran para ruina
  rationale: El griego es condensado y expresa intención hostil orientada al daño. La redacción principal deja esa hostilidad visible sin sobreinterpretar el verbo; las alternativas preservan la ambigüedad útil entre destrucción y ruina.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió «watching us for destruction» por mayor naturalidad. En español se reflejó esa naturalidad con una forma breve y directa («nos miran para destrucción») sin perder la dureza hostil del griego. También se preservó la alternativa temporal de ἐξ ἀρχῆς en nota, siguiendo el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para Κύριε y «Dios» para ὁ θεός, conforme a los equivalentes devocionales estándar del proyecto.
  - Se evitó traducir δοῦλος u otros términos no presentes en este versículo; no se introdujo terminología eclesiástica ajena al texto.
  - «Herencia» se usó como equivalente de κληρονομία para conservar el matiz de posesión pactal, con nota sobre la alternativa temporal.
  - La puntuación sigue el español moderno y conserva la acumulación de títulos sin sobrerelaborarla.
