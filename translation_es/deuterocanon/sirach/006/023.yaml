lexical_decisions:
- source_word: ἄκουσον
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: BDAG
  rationale: En español, «escucha» transmite de manera natural el imperativo exhortativo y conserva la fuerza pastoral del original sin sonar rígido.
- source_word: τέκνον
  english_pob_choice: my son
  chosen_spanish: hijo
  alternatives_spanish:
  - mi hijo
  - muchacho
  - hijo mío
  lexicon: BDAG
  rationale: El griego puede funcionar como apelación afectuosa o instructiva; en español, «hijo» suena natural en este tipo de amonestación sapiencial y evita forzar un possessivo no explícito en la frase breve.
- source_word: δέξαι
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - acoge
  lexicon: BDAG
  rationale: «Acepta» conserva el sentido de recepción voluntaria de una instrucción o consejo, y encaja bien con el paralelo imperativo.
- source_word: γνώμην
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - opinión
  - entendimiento
  - criterio
  lexicon: BDAG
  rationale: «Juicio» reproduce el carácter deliberado y evaluativo de γνώμη y mantiene el matiz de decisión reflexiva que el inglés POB documentó con «judgment».
- source_word: ἀπαναίνου
  english_pob_choice: reject
  chosen_spanish: rechaces
  alternatives_spanish:
  - rechaces
  - repudies
  - desprecies
  lexicon: BDAG
  rationale: El verbo negativo pide una forma clara de negativa imperativa; «rechaces» comunica bien la negación de la counsel sin añadir intensidad no atestiguada.
- source_word: συμβουλίαν
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo
  - orientación
  - asesoramiento
  lexicon: BDAG
  rationale: «Consejo» es la equivalencia española más natural y fiel al registro sapiencial; conserva la idea de guía prudente mejor que alternativas más técnicas.
theological_decisions:
- issue: Elección de la base textual para esta perícopa con expediente mixto (hebreo desajustado y griego coherente)
  english_pob_reading: 'The English POB footnote states that the extant Hebrew witness appears mismatched/corrupt for this verse and therefore follows the Greek parallel: “Listen, my son, and accept my judgment, and do not reject my counsel.”'
  chosen_spanish_reading: 'Se sigue el griego paralelo como texto operativo para la traducción: «Escucha, hijo, y acepta mi juicio, y no rechaces mi consejo.»'
  alternative_spanish_readings:
  - Intentar traducir el hebreo recibido aunque no corresponda a este versículo
  - Tratar el hebreo como glosa independiente sin incorporarlo al versículo
  rationale: La evidencia auditada indica que el hebreo suministrado no corresponde a Sirácides 6:23, mientras que el griego es internamente coherente y coincide con la función exhortativa del pasaje. Por eso la traducción española debe descansar en el paralelo griego, preservando honestamente la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: usar el testimonio más fiable disponible para el pasaje y transparentar la incertidumbre textual sin ocultarla.'
translation_notes:
  revision_awareness: La versión anterior fue corregida porque contenía una traducción basada en una imagen hebrea no correspondiente al versículo. Esta redacción sigue el griego de Swete, en línea con el propio rastro auditado del POB en inglés, y evita introducir notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial e instructivo del original.
  - Se usa una formulación natural en español moderno sin desplazar el sentido de los imperativos.
  - No se añaden marcas de nota al pie porque esta versión no requiere variantes visibles en el texto base.
