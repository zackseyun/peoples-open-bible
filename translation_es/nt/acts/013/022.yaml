translation:
  language: es
  text: 'Y después de quitarlo[a], les levantó a David como rey; y de él también dio testimonio y dijo: «He hallado a David, hijo de Isaí, un hombre conforme a mi corazón[b], que hará toda mi voluntad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también, «después de deponerlo» o «después de removerlo». El participio griego expresa la remoción previa de Saúl del reinado.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «según mi corazón». El griego expresa conformidad con el corazón de Dios; muchas traducciones tradicionales usan una fórmula equivalente.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστήσας
  english_pob_choice: after removing him
  chosen_spanish: después de quitarlo
  alternatives_spanish:
  - después de removerlo
  - después de deponerlo
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa por la cual Dios apartó a Saúl del reinado. «Quitar» conserva esa idea de remoción sin volverla excesivamente técnica o más política de lo que el contexto exige.
- source_word: ἤγειρεν
  english_pob_choice: raised up
  chosen_spanish: les levantó
  alternatives_spanish:
  - lo levantó
  - lo suscitó
  - lo estableció
  lexicon: BDAG
  rationale: «Levantar» mantiene el giro bíblico de ἐγείρω para la designación de un gobernante, sin convertirlo en una paráfrasis administrativa. El contexto con «como rey» aclara que no se trata de resurrección.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - en favor de ellos
  lexicon: BDAG
  rationale: El dativo de beneficio se expresa de manera natural en español con el complemento indirecto «les», que conserva la idea de provecho para el pueblo.
- source_word: εἰς βασιλέα
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - para rey
  - para ser rey
  lexicon: BDAG
  rationale: «Como rey» comunica con claridad la función o cargo resultante que expresa εἰς con predicativo.
- source_word: ᾧ καὶ εἶπεν μαρτυρήσας
  english_pob_choice: to whom he also bore witness and said
  chosen_spanish: y de él también dio testimonio y dijo
  alternatives_spanish:
  - y acerca de él también dio testimonio y dijo
  - a quien también testificó y dijo
  lexicon: BDAG
  rationale: «Dar testimonio» preserva el matiz testimonial de μαρτυρέω. En español, «de él» fluye mejor que un calco con «a quien» o «acerca de él», sin perder la referencia a David.
- source_word: Εὗρον
  english_pob_choice: I have found
  chosen_spanish: He hallado
  alternatives_spanish:
  - He encontrado
  - Encontré
  lexicon: BDAG
  rationale: El perfecto español transmite bien la acción cumplida con vigencia en la cita divina. «Hallar» también mantiene un tono ligeramente más bíblico y sobrio que «encontrar».
- source_word: τὸν τοῦ Ἰεσσαί
  english_pob_choice: the son of Jesse
  chosen_spanish: hijo de Isaí
  alternatives_spanish:
  - el hijo de Isaí
  - el descendiente de Isaí
  lexicon: BDAG
  rationale: La relación genitiva se expresa de forma idiomática en español como filiación. Se omite el artículo por fluidez, sin alterar el sentido.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una persona
  lexicon: BDAG
  rationale: «Hombre» corresponde con precisión a ἀνήρ y conserva la referencia masculina personal de David.
- source_word: κατὰ τὴν καρδίαν μου
  english_pob_choice: according to my heart
  chosen_spanish: conforme a mi corazón
  alternatives_spanish:
  - según mi corazón
  - de acuerdo con mi corazón
  - tras mi propio corazón
  lexicon: BDAG
  rationale: «Conforme a» reproduce con naturalidad la conformidad expresada por κατά + acusativo. Se evita «tras mi propio corazón» porque sería una tradición idiomática menos literal y podría desplazar el énfasis hacia afinidad afectiva.
- source_word: ποιήσει
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - cumplirá
  - hará y cumplirá
  lexicon: BDAG
  rationale: El futuro simple expresa adecuadamente el valor verbal sin añadir una glosa. «Hará» mantiene la amplitud semántica de ποιέω.
- source_word: πάντα τὰ θελήματά μου
  english_pob_choice: all my will
  chosen_spanish: toda mi voluntad
  alternatives_spanish:
  - todos mis designios
  - todos mis deseos
  - todas mis voluntades
  lexicon: BDAG
  rationale: Aunque el griego usa plural, en español «mi voluntad» es la manera más natural y fiel de expresar el conjunto de los propósitos divinos. «Toda mi voluntad» conserva la totalidad sin forzar un plural que sonaría artificial.
theological_decisions:
- issue: Si mantener la expresión tradicional «un hombre conforme a mi corazón» o la forma más literal «según/conforme a mi corazón»
  english_pob_reading: according to my heart
  chosen_spanish_reading: conforme a mi corazón
  alternative_spanish_readings:
  - según mi corazón
  - tras mi propio corazón
  rationale: La forma elegida sigue de cerca la sintaxis griega y evita sugerir una lectura meramente sentimental. Preserva la idea de correspondencia con la voluntad y el propósito divinos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo rendir el valor de «raised up» sin oscurecer el contexto histórico de la elección de David
  english_pob_reading: raised up David for them as king
  chosen_spanish_reading: les levantó a David como rey
  alternative_spanish_readings:
  - estableció a David como rey
  - suscitó a David como rey
  rationale: «Levantó» conserva el idiomático bíblico de elevación/instalación de un gobernante, mientras «como rey» aclara que el sentido es entronización, no resurrección.
  doctrine_reference: Translation philosophy §5
- issue: Cómo reflejar la pluralidad griega de θελήματα sin producir una expresión extraña en español
  english_pob_reading: all my will
  chosen_spanish_reading: toda mi voluntad
  alternative_spanish_readings:
  - todos mis designios
  - todos mis deseos
  - todas mis voluntades
  rationale: Aunque el griego conserva plural, el español suele expresar la totalidad de esos propósitos mediante un singular colectivo. La elección evita una fórmula poco natural y comunica la unidad de la intención divina.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El auditable inglés POB revisó la frase final de «all my wills» a «all my will» por la forma singular del griego; en español se resolvió esa tensión con «toda mi voluntad», evitando un plural artificial y manteniendo el sentido colectivo/totalizador. También se preservó la tensión lexical de κατὰ τὴν καρδίαν μου con una nota que distingue la literalidad griega de la expresión tradicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando apareciera el tetragrámaton; en este versículo no aparece.
  - Se usó «hijo de Isaí» para τὸν τοῦ Ἰεσσαί por ser la forma idiomática y transparente en español.
  - Se prefirió «conforme a mi corazón» sobre una formulación más tradicional para conservar la relación semántica con el griego.
  - Se evitó «siervo» porque el pasaje trata de la elección de David como rey, no de δοῦλος.
  - Se conservó un registro bíblico sobrio sin arcaísmos innecesarios.
