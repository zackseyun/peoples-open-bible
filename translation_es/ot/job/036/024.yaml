    rationale: Aunque «magnifica» puede ser una alternativa menor para תַשְׂגִּיא, la nota inglesa preservada es específicamente sobre שֹׁרְרוּ. Conviene no mezclar dos decisiones distintas en una sola nota anclada en un lugar incorrecto.
