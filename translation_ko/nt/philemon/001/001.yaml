id: PHM.1.1
reference: Philemon 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος δέσμιος Χριστοῦ Ἰησοῦ καὶ Τιμόθεος ὁ ἀδελφὸς Φιλήμονι τῷ ἀγαπητῷ καὶ συνεργῷ ἡμῶν
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/001.yaml
  text: 'Paul[a], a prisoner of Messiah Jesus, and Timothy our brother, to Philemon our beloved fellow worker[b],'
  footnotes:
  - marker: a
    text: Or 'Paul, a prisoner for Christ Jesus.' The Greek genitive can be understood as indicating relationship to or cause in relation to Messiah Jesus.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아 예수의 갇힌 자[a] 바울과 형제 디모데는, 우리의 사랑하는 동역자 빌레몬[b]에게 편지합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아 예수를 위해 갇힌 자」. 헬라어 속격은 매임의 관계(메시아께 속한 갇힘) 또는 원인(메시아 때문에 갇힘) 양쪽으로 읽힐 수 있다.
    reason: alternative_reading
  - marker: b
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέσμιος
  english_pob_choice: prisoner
  chosen_korean: 갇힌 자
  alternatives_korean:
  - 죄수
  - 포로
  lexicon: BDAG
  rationale: δέσμιος는 결박·옥에 갇힌 자를 가리킨다. 「갇힌 자」는 자발적 옥살이가 아니라 강제 구금의 무게를 자연스럽게 담아내며, 「죄수」는 형사적 함의가 너무 강하고 「포로」는 전쟁 포로를 떠올리게 한다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός는 「메시아」로 옮긴다. 빌레몬서 인사 정식에서도 칭호의 무게가 그대로 살아 있다.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: our brother
  chosen_korean: 형제
  alternatives_korean:
  - 우리 형제
  - 그 형제
  lexicon: BDAG
  rationale: 헬라어 정관사 ὁ가 붙은 「형제」를 한국어 어순에서는 「형제 디모데」로 옮기는 것이 가장 자연스럽다. 영어 POB의 「our brother」는 ἡμῶν이 본문에 없어도 관용적으로 보충한 것이며, 한국어에서는 굳이 「우리」를 더하지 않아도 동료성이 드러난다.
- source_word: ἀγαπητῷ
  english_pob_choice: beloved
  chosen_korean: 사랑하는
  alternatives_korean:
  - 친애하는
  - 사랑받는
  lexicon: BDAG
  rationale: ἀγαπητός는 그리스도인 공동체 내의 깊은 애정과 언약적 사랑을 담은 형용사이다. 「사랑하는」이 그 따뜻함을 가장 자연스럽게 보존한다.
- source_word: συνεργῷ
  english_pob_choice: fellow worker
  chosen_korean: 동역자
  alternatives_korean:
  - 협력자
  - 함께 일하는 자
  lexicon: BDAG
  rationale: συνεργός는 함께 일하는 자, 곧 사역의 동반자를 가리킨다. 「동역자」는 바울 서신의 사역적 협력 문맥에서 정립된 한국어이다.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_korean: 우리의
  alternatives_korean:
  - 나의
  lexicon: BDAG
  rationale: 복수 인칭대명사는 바울과 디모데를 공동 발신자로 묶는다. 단수 「나의」로 좁히지 않고 「우리의」를 유지한다.
- source_word: Φιλήμονι
  english_pob_choice: to Philemon
  chosen_korean: 빌레몬에게
  lexicon: BDAG
  rationale: 인사 정식의 여격을 한국어 「에게」로 자연스럽게 옮긴다. Φιλήμων은 한국 성서 전통의 정착된 표기 「빌레몬」을 따른다.
theological_decisions:
- issue: 인사 정식의 Χριστοῦ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 한국 전통 번역에서 「그리스도」는 사실상 이름처럼 굳어졌으나, 헬라어 본문은 칭호의 무게를 그대로 담고 있다. 본 번역의 일관성과 DOCTRINE.md 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
