base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/006/003.yaml
  text: They set the ark of God on a new cart and brought it from the house of Abinadab[a], which was on the hill; and Uzzah and Ahio, the sons of Abinadab, were driving the new cart.
