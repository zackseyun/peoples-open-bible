  text: דִּבְּר֣וּ דְבָרִ֔ים אָל֥וֹת שָׁ֖וְא כָּרֹ֣ת בְּרִ֑ית וּ/פָרַ֤ח כָּ/רֹאשׁ֙ מִשְׁפָּ֔ט עַ֖ל תַּלְמֵ֥י שָׂדָֽי׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/004.yaml
  text: They speak mere words[a], swearing false oaths, making covenants[d][c][b]; so judgment springs up like poison weed on the furrows of the field.
  footnotes:
