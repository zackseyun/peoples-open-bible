translation:
  language: es
  text: Yahvé conoce los pensamientos del hombre[a], que[b] son vanidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “de la humanidad”; el hebreo usa un singular genérico: “hombre”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “porque”, si כִּי se entiende con sentido más explícitamente causal.'
    reason: lexical_alternative
  - marker: c
    text: “Vanidad” también puede traducirse “vapor”, “aliento” o “vacío”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton en forma transparente, conforme a la norma del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma española estándar para esta decisión lexical-teológica.
- source_word: יֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - está al tanto de
  lexicon: HALOT
  rationale: '''Conoce'' comunica el conocimiento continuo y completo de Yahvé de modo natural en español. ''Sabe'' sería posible, pero aquí suena menos relacional y menos solemne.'
- source_word: מַחְשְׁב֣וֹת
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - planes
  - intenciones
  - razonamientos
  lexicon: HALOT
  rationale: En este contexto de examen divino de la interioridad humana, 'pensamientos' refleja bien מחשבות sin restringirlo a planes hostiles o a una mera idea intelectual.
- source_word: אָדָ֑ם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - la gente
  lexicon: HALOT
  rationale: Se mantiene el singular genérico del hebreo con 'el hombre', que conserva la forma representativa y concuerda con la política del proyecto de no neutralizar automáticamente el término. Se evita 'humanidad' porque desplaza el singular genérico del original.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, 'porque' expresa con naturalidad el valor causal que el inglés auditado preservó en nota, sin perder el vínculo explicativo entre el conocimiento de Yahvé y el juicio sobre esos pensamientos.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  - éstos son
  lexicon: HALOT
  rationale: 'El pronombre plural hebreo retoma ''los pensamientos''; en español resulta más fluido integrar la referencia en la cópula: ''son''. La pluralidad queda implícita por el referente inmediato.'
- source_word: הָבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - aliento
  - vacío
  lexicon: HALOT
  rationale: Se sigue la revisión más reciente del audit trail en favor de 'vanidad', que en este contexto poético refleja de manera más idiomática la insustancialidad de los pensamientos humanos. 'Vapor' conserva mejor la imagen concreta, pero 'vanidad' es más natural y formal en español bíblico.
theological_decisions:
- issue: Alcance de אָדָם como singular genérico
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El hebreo usa un singular genérico representativo. 'El hombre' conserva esa forma y el efecto retórico del verso; se documenta la alternativa inclusiva porque lectores modernos podrían entenderlo en sentido restringido.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Valor semántico de הָבֶל
  english_pob_reading: vanity
  chosen_spanish_reading: vanidad
  alternative_spanish_readings:
  - vapor
  - aliento
  - vacío
  rationale: La palabra hebrea admite la imagen de lo transitorio e insustancial. Dado el precedente de revisión del audit trail, 'vanidad' se adopta como la opción más idiomática y reverberante en español, sin borrar la tensión entre imagen concreta y abstracción moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que sustituyó 'vapor' por 'vanity/vanidad' para reflejar con mayor naturalidad y formalidad הבל en este contexto. La redacción española adopta esa decisión revisada, pero conserva nota de alternativas para no perder la imagen concreta del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se mantiene 'el hombre' como singular genérico y se documenta la alternativa inclusiva.
  - '''Porque'' en la cláusula final hace explícita la relación causal permitida por כִּי.'
  - '''Vanidad'' sigue la revisión del audit trail; se dejan alternativas semánticas en nota.'
  - La puntuación mantiene una lectura fluida y publicable en español bíblico moderno.
