translation:
  language: es
  text: Entonces[a], después de haberle inmovilizado los brazos por ambos lados, lo torturaban con látigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haberle atado por los codos por ambos lados». El participio griego περιαγκωνίσαντες es raro y probablemente alude a sujetar o torcer los brazos/codos desde ambos lados antes del azote.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: LSJ
  rationale: Marca una secuencia narrativa inmediata; «Entonces» es natural en español y conserva la progresión del relato.
- source_word: περιαγκωνίσαντες
  english_pob_choice: after pinning his arms back on both sides
  chosen_spanish: después de haberle inmovilizado los brazos por ambos lados
  alternatives_spanish:
  - después de haberle sujetado los brazos por ambos lados
  - después de haberle atado por los codos por ambos lados
  - después de haberle forzado los brazos hacia atrás por ambos lados
  lexicon: LSJ
  rationale: El verbo es raro y procede de ἀγκών («codo/brazo»), indicando sujeción o retorsión de los brazos/codos desde ambos lados. «Inmovilizado» comunica la restricción física sin afirmar con demasiada precisión un método técnico que el griego no explicita.
- source_word: ἑκατέρωθεν
  english_pob_choice: on both sides
  chosen_spanish: por ambos lados
  alternatives_spanish:
  - de ambos lados
  - a ambos lados
  - por cada lado
  lexicon: LSJ
  rationale: Expresa bien la acción bilateral y suena natural en español en combinación con el participio anterior.
- source_word: μάστιξιν
  english_pob_choice: with whips
  chosen_spanish: con látigos
  alternatives_spanish:
  - con azotes
  - con azotes de cuero
  - con flagelos
  lexicon: LSJ
  rationale: Dativo instrumental plural de μάστιξ. «Látigos» es claro y comunica el instrumento de castigo sin un registro demasiado arcaico.
- source_word: κατήκιζον
  english_pob_choice: they were torturing him
  chosen_spanish: lo torturaban
  alternatives_spanish:
  - lo atormentaban
  - lo maltrataban
  - lo castigaban cruelmente
  lexicon: LSJ
  rationale: El imperfecto expresa una acción continua de abuso. En contexto de flagelación, «lo torturaban» preserva la fuerza severa del griego y el carácter durativo.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su nota léxica sobre περιαγκωνίσαντες; la traducción española mantiene la misma cautela interpretativa y no especifica un método de sujeción más preciso de lo que permite el griego.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología teológica ajena porque el versículo no contiene vocabulario divino.
  - «Látigos» se mantiene como equivalente transparente de μάστιξιν, coherente con un registro bíblico moderno.
  - La nota textual conserva la ambigüedad documentada entre sujeción de los brazos y atadura por los codos.
