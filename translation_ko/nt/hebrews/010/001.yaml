id: HEB.10.1
reference: Hebrews 10:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σκιὰν γὰρ ἔχων ὁ νόμος τῶν μελλόντων ἀγαθῶν, οὐκ αὐτὴν τὴν εἰκόνα τῶν πραγμάτων, κατ’ ἐνιαυτὸν ταῖς αὐταῖς θυσίαις ἃς προσφέρουσιν εἰς τὸ διηνεκὲς οὐδέποτε ⸀δύναται τοὺς προσερχομένους τελειῶσαι·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/010/001.yaml
  text: For since the law has only a shadow of the good things to come[a], not the very form of the realities, it can never, by the same sacrifices that they continually offer year after year[c][b], perfect those who draw near.
  footnotes:
  - marker: a
    text: Or 'not the image itself of the realities.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who draw near'' carries the sense of approaching God in worship.'
    reason: cultural_note
  - marker: c
    text: Or 'make perfect' or 'bring to completion.'
    reason: lexical_alternative
translation:
  language: ko
  text: 율법은 다가올 좋은 것들의 그림자만을 가지고 있을 뿐, 그 실체들의 형상 자체는 아니므로, 해마다 계속 드리는 동일한 제물들로는 결코 가까이 나아오는 자들을 온전케 할 수 없습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σκιὰν
  english_pob_choice: shadow
  chosen_korean: 그림자
  alternatives_korean: []
  lexicon: BDAG
  rationale: 8:5의 그림자-모형 모티프의 연장.
- source_word: εἰκόνα
  english_pob_choice: form
  chosen_korean: 형상
  alternatives_korean:
  - 실상
  lexicon: BDAG
  rationale: 그림자에 대비되는 실체의 형상.
theological_decisions:
- issue: 10:1-18의 단번 제물 모티프 — 반복 언어 보존
  chosen_reading: 「해마다」, 「항상」, 「동일한 제물들」, 「단번에」의 대비 언어를 풀어쓰지 않고 보존
  alternative_readings:
  - 설명적 의역
  rationale: 히브리서 10:1-18은 율법의 반복적 제사와 메시아의 단번의 제물을 대조시킨다. 한국어 번역은 그 반복의 무게와 단번의 결정성을 모두 살리기 위해 ἐφάπαξ, εἰς τὸ διηνεκὲς, πολλάκις, κατ' ἐνιαυτὸν 등 시간 부사를 직역에 가깝게 보존한다.
  doctrine_reference: 'DOCTRINE.md: One sacrifice for all time'
