translation:
  language: es
  text: Israel tomó todas estas ciudades, e Israel se estableció en todas las ciudades de los amorreos, en Hesbón y en todas sus poblaciones dependientes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y en todas sus hijas», un modismo para los asentamientos menores dependientes de una ciudad mayor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: לקח en este contexto militar puede expresar conquista, pero el español bíblico y moderno permite «tomó» sin añadir más interpretación que el hebreo. «Capturó» o «se apoderó de» explican más la acción, pero son más interpretativos.
- source_word: כָּל הֶעָרִים הָאֵלֶּה
  english_pob_choice: all these cities
  chosen_spanish: todas estas ciudades
  alternatives_spanish:
  - todas estas urbes
  - todas estas poblaciones
  lexicon: HALOT
  rationale: עִיר normalmente designa ciudad o poblado. «Ciudades» conserva bien el valor general y sigue el paralelismo con el contexto de conquista. El demostrativo «estas» queda explícito.
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se asentó
  lexicon: HALOT
  rationale: ישב puede significar sentarse, habitar o establecerse. Aquí el sentido es ocupar y residir en los lugares conquistados. «Se estableció» comunica bien la instalación territorial sin sonar tan estático como «habitó».
- source_word: בְּכָל עָרֵי הָאֱמֹרִי
  english_pob_choice: in all the cities of the Amorites
  chosen_spanish: en todas las ciudades de los amorreos
  alternatives_spanish:
  - en todas las ciudades amorreas
  lexicon: HALOT
  rationale: La construcción en estado constructo se mantiene de forma transparente. «De los amorreos» preserva la relación posesiva/étnica del hebreo mejor que una adjetivación más libre.
- source_word: בְּחֶשְׁבּוֹן
  english_pob_choice: in Heshbon
  chosen_spanish: en Hesbón
  alternatives_spanish:
  - en Heshbón
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española común. «Hesbón» es clara, breve y fácilmente reconocible en castellano.
- source_word: וּבְכָל בְּנֹתֶיהָ
  english_pob_choice: and in all its daughter towns
  chosen_spanish: y en todas sus ciudades hijas
  alternatives_spanish:
  - y en todas sus poblaciones hijas
  - y en todas sus dependencias
  lexicon: HALOT
  rationale: El hebreo usa el idioma de «hijas» para las aldeas o asentamientos dependientes de una ciudad mayor. «Ciudades hijas» conserva la metáfora y la hace comprensible en español; «dependencias» explicaría el sentido pero perdería la imagen.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide sustancialmente con la decisión inglesa auditada. Se mantiene la metáfora de «ciudades hijas» mediante una traducción comprensible y una nota breve para preservar la tensión léxica del original.
  spanish_consistency_notes:
  - Se usó «Israel» en ambas apariciones para reflejar la repetición enfática del hebreo.
  - Se prefirió «se estableció» para evitar una simple repetición de «tomó» y capturar el cambio de posesión a residencia.
  - Se eligió «Hesbón» como forma castellana estable del topónimo.
  - Se mantuvo «ciudades» y no «pueblos» para conservar la amplitud semántica del hebreo עיר en contexto de conquista.
