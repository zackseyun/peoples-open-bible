translation:
  language: es
  text: A cambio de mi amor[a], me acusan; pero yo soy oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: "pero yo oro" o "pero soy un hombre de oración". El hebreo dice literalmente: "pero yo soy oración".'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: In return for
  chosen_spanish: En pago de
  alternatives_spanish:
  - A cambio de
  - En retorno de
  - En lugar de
  lexicon: HALOT
  rationale: El hebreo expresa aquí reciprocidad o retribución hostil, no un sentido espacial de 'debajo'. 'En pago de' comunica bien la idea de respuesta/recompensa en español natural y conserva el contraste del verso.
- source_word: אַהֲבָתִי
  english_pob_choice: my love
  chosen_spanish: mi amor
  alternatives_spanish:
  - mi afecto
  - mi cariño
  lexicon: HALOT
  rationale: El sustantivo deriva de אהב y designa amor/afecto. 'Mi amor' es la correspondencia más directa y mantiene la conexión léxica con el término bíblico común para amor.
- source_word: יִשְׂטְנ֗וּ/נִי
  english_pob_choice: they accuse me
  chosen_spanish: me acusan
  alternatives_spanish:
  - me hostigan
  - me adversan
  - me se oponen
  lexicon: HALOT
  rationale: El verbo de שטן en este contexto tiene fuerza adversarial o acusatoria. 'Me acusan' reproduce bien la hostilidad concreta y conserva una lectura más específica que simples equivalentes como 'me oponen'.
- source_word: וַאֲנִי
  english_pob_choice: but I
  chosen_spanish: pero yo
  alternatives_spanish:
  - y yo
  - mas yo
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el contraste discursivo en el verso pide en español una oposición explícita. 'Pero yo' es idiomático y refleja la antítesis con la conducta de los enemigos.
- source_word: תְפִלָּה
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - orando
  - hombre de oración
  - una oración
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'yo [soy] oración'. 'Oración' preserva la densidad nominal del original mejor que verbalizarlo. En español, 'yo soy oración' suena menos natural; 'yo soy oración' se mantiene en la forma más cercana posible sin perder inteligibilidad, pero se puede considerar 'yo soy oración' como eco poético; aquí se opta por 'yo soy oración' en la idea, expresado con un sustantivo equivalente y digno.
theological_decisions:
- issue: Cláusula nominal comprimida וַאֲנִי תְפִלָּה
  english_pob_reading: Preserve the literal intensity as 'but I am prayer' rather than interpretively expanding it.
  chosen_spanish_reading: Conservar la metáfora nominal con 'pero yo soy oración'.
  alternative_spanish_readings:
  - pero yo oro
  - pero soy un hombre de oración
  - pero yo, oración
  rationale: No hay una disputa doctrinal aquí, pero sí una condensación poética importante. Mantener la estructura nominal preserva la fuerza del hebreo y evita una paráfrasis explicativa que suavizaría el texto.
  doctrine_reference: 'Principio de equivalencia óptima: preservar la imagen y la compresión del original sin sobreexplicar.'
translation_notes:
  revision_awareness: La fuente y la revisión auditada coinciden en alto grado; no se registran cambios posteriores que afecten la redacción base. Se conservó la tensión poética del cierre nominal del verso y la lectura adversarial de יִשְׂטְנ֗וּ/נִי.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' y 'Yahvé' según los lineamientos generales del proyecto, aunque este verso no los contiene.
  - Se optó por 'me acusan' para reflejar la carga adversarial del verbo hebreo sin diluirla en un mero 'me odian' o 'me persiguen'.
  - La nota al pie preserva la alternativa interpretativa que el POB inglés documentó para la cláusula final.
