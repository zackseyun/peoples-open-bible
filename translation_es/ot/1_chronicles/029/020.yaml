translation:
  language: es
  text: 'Entonces David dijo a toda la asamblea[a]: «Ahora bendigan a Yahvé, su Dios». Y toda la asamblea bendijo a Yahvé, el Dios de sus padres[b], y se inclinaron y se postraron ante Yahvé y ante el rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por favor, bendigan a Yahvé, su Dios». La partícula נָא puede añadir ruego o urgencia.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo presenta un acto corporal de postración ante «Yahvé y el rey». La formulación describe reverencia física; algunas traducciones expresan la acción hacia el rey como «rindieron homenaje».
    reason: alternative_reading
lexical_decisions:
- source_word: בָּרְכוּ נָא
  english_pob_choice: Now bless
  chosen_spanish: Ahora bendigan
  alternatives_spanish:
  - Por favor, bendigan
  - Bendigan, les ruego
  lexicon: HALOT
  rationale: El imperativo plural aquí exhorta a la asamblea a pronunciar bendición/palabra de alabanza hacia Dios. נָא añade urgencia o ruego; en español, «Ahora» conserva el impulso inmediato sin volver la frase torpe o excesivamente arcaica. Se mantiene el valor exhortativo sin suavizarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino mediante transliteración, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma española estable para el Tetragrámaton en este proyecto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: En este contexto del discurso a la asamblea, el sufijo posesivo plural se expresa naturalmente como «su Dios» en español formal neutro. Se mantiene el sentido singular de referencia a YHWH, no a dioses múltiples.
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad reunida
  lexicon: HALOT
  rationale: קָהָל designa al pueblo reunido; «asamblea» es el equivalente claro y formal, adecuado al acto público de bendición en contexto cultual.
- source_word: אֱלֹהֵי אֲבֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se conserva la fórmula histórico-covenantal tradicional. «Padres» refleja con precisión el hebreo y mantiene el vínculo con la identidad patriarcal de Israel; «antepasados» sería posible, pero menos específico respecto del giro bíblico.
- source_word: וַיִּקְּדוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se inclinaron
  - se doblegaron
  lexicon: HALOT
  rationale: El verbo קדד expresa inclinación o postración parcial, especialmente del cuerpo o la cabeza. Aquí se vierte como «se inclinó» para reflejar el gesto de reverencia y diferenciarlo del verbo siguiente, que intensifica la acción. La forma singular en español se usa por el sustantivo colectivo «toda la asamblea»; también podría ser plural explícito «se inclinaron».
- source_word: וַיִּשְׁתַּחֲוּ
  english_pob_choice: prostrated themselves
  chosen_spanish: se postró
  alternatives_spanish:
  - se postraron
  - se prosternó
  lexicon: HALOT
  rationale: שׁחה en hitpael denota postrarse/prosternarse. «Se postró» expresa el gesto corporal completo en español bíblico claro y moderno; el singular sigue el mismo criterio de concordancia colectiva. Esta opción preserva la diferencia entre inclinación y postración.
- source_word: לַיהוָה וְלַמֶּלֶךְ
  english_pob_choice: before Yahweh and before the king
  chosen_spanish: ante Yahvé y ante el rey
  alternatives_spanish:
  - delante de Yahvé y delante del rey
  - frente a Yahvé y frente al rey
  lexicon: HALOT
  rationale: La preposición ל con este verbo se entiende idiomáticamente como postura «ante/delante de». «Ante» suena digno y natural en español litúrgico, y conserva la escena de homenaje corporal sin borrar que el mismo gesto se dirige tanto a Yahvé como al rey.
theological_decisions:
- issue: El gesto corporal hacia Yahvé y hacia el rey
  english_pob_reading: 'Retain the concrete bodily language: ''bowed down and prostrated themselves before Yahweh and before the king.'''
  chosen_spanish_reading: 'Mantener el lenguaje corporal concreto: «se inclinó y se postró ante Yahvé y ante el rey».'
  alternative_spanish_readings:
  - «adoró a Yahvé y rindió homenaje al rey»
  - «se inclinó ante Yahvé y honró al rey»
  - «se postró ante Yahvé y ante el rey»
  rationale: El hebreo usa dos verbos corporales con ambos objetos; la traducción conserva esa duplicidad para no resolver de antemano la tensión entre reverencia a Dios y homenaje real. Se evita traducir el segundo acto como «adoración» o «homenaje» porque eso interpretaría más de lo que el texto dice y diluiría la correspondencia verbal.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que rechazó añadir «heads» en la acción de inclinarse y prefirió mantener el verbo simple «bowed down». En español se siguió esa corrección, evitando ampliar el objeto del gesto. También se conservó la distinción entre los dos verbos hebreos (inclinarse / postrarse) y el tratamiento del Tetragrámaton como nombre propio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Tetragrámaton, coherente con el proyecto.
  - Se usa «asamblea» para קָהָל, consistente con el tono formal y público del pasaje.
  - 'Se conserva la secuencia de dos acciones corporales distintas: «se inclinó» / «se postró».'
  - Se evita sustituir el segundo objeto por una lectura interpretativa; el texto sigue diciendo «ante el rey» junto con Yahvé.
  - La concordancia en singular («se inclinó», «se postró») sigue la lectura colectiva del sustantivo singular «asamblea» y la flexibilidad estilística del español bíblico.
