translation:
  language: es
  text: Pero en cuanto a aquellos cuyo corazón va tras sus cosas detestables[b] y sus abominaciones[a], he hecho recaer su camino sobre su propia cabeza, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «su corazón va al corazón de sus cosas detestables y de sus abominaciones», un modismo que indica que están interiormente dedicados a ellas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus ídolos» para «sus cosas detestables»; el término hebreo suele referirse a objetos cultuales aborrecibles.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: But as for
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Y hacia
  - Pero para
  - Pero en relación con
  lexicon: HALOT
  rationale: La construcción introduce contraste y enfoque temático respecto del contexto inmediato; «pero en cuanto a» conserva ese valor adversativo y tópico sin sonar forzado.
- source_word: לֵב ... לִבָּם הֹלֵךְ
  english_pob_choice: whose heart goes after
  chosen_spanish: cuyo corazón va tras
  alternatives_spanish:
  - cuyo corazón camina hacia
  - su corazón va tras
  - cuyo pensamiento sigue
  lexicon: HALOT
  rationale: Se conserva la imagen del corazón que sigue o persigue, evitando una paráfrasis excesiva. «Va tras» transmite bien la devoción interna implícita en el hebreo.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus ídolos
  - sus abominaciones
  - sus cosas abominables
  lexicon: HALOT
  rationale: «Cosas detestables» preserva el valor léxico amplio de שִׁקּוּץ, que a menudo puede abarcar ídolos u objetos cultuales aborrecibles, sin colapsarlo de entrada en «ídolos».
- source_word: וְתוֹעֲבוֹתֵיהֶם
  english_pob_choice: their abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus cosas aborrecibles
  - sus prácticas detestables
  - sus cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» conserva el término profético tradicional y la fuerza moral/cultual de תּוֹעֵבָה, distinguiéndolo del término anterior.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - su senda
  - sus obras
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora hebrea estándar para conducta o curso de vida y encaja con la expresión idiomática siguiente.
- source_word: בְּרֹאשָׁם
  english_pob_choice: upon their own heads
  chosen_spanish: sobre su propia cabeza
  alternatives_spanish:
  - sobre sus propias cabezas
  - en sus cabezas
  - de vuelta sobre su cabeza
  lexicon: HALOT
  rationale: La imagen de retribución que recae sobre la persona se expresa de manera natural en español con «sobre su propia cabeza»; se conserva el singular distributivo del hebreo.
- source_word: נָתַתִּי
  english_pob_choice: I have brought
  chosen_spanish: he puesto
  alternatives_spanish:
  - he traído
  - he dado
  - he colocado
  lexicon: HALOT
  rationale: El hebreo usa el verbo de «poner/dar» dentro de un giro idiomático. «He puesto» refleja la estructura sin perder la idea de que la culpa o el camino son colocados como retribución sobre la cabeza.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  - declara el Señor Yavé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de renderizar יְהוָה como «Yahvé» y אֲדֹנָי como «Señor». «Declara» reproduce la fórmula profética נְאֻם con naturalidad en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yavé
  - el Soberano Yahvé
  rationale: El texto hebreo contiene explícitamente el nombre del pacto, y la política del proyecto exige no enmascararlo con una convención tipo «SEÑOR». La combinación con אֲדֹנָי se conserva con «Señor Yahvé» para reflejar ambos elementos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y la pauta auditada en inglés, pero adapta la sintaxis para un español publicable. Se preservan la imagen del «corazón que va tras», el paralelismo entre dos términos de repulsión cultual y la fórmula profética final con el nombre divino explícito. No se adopta la máscara «SEÑOR» porque la política del proyecto para el nombre divino exige «Yahvé» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב/לִבָּם, coherente con el uso bíblico y con el inglés auditado.
  - «Cosas detestables» y «abominaciones» distinguen dos lexemas hebreos relacionados pero no idénticos.
  - La fórmula final usa «Señor Yahvé» para reflejar Adonai + YHWH sin ocultar el nombre divino.
  - Se evita «ídolos» en el texto principal para no estrechar indebidamente שִׁקּוּצִים, pero se deja como alternativa en nota.
