  text: בָּ/עֵ֣ת הַ/הִ֗יא יֵאָמֵ֤ר לָֽ/עָם הַ/זֶּה֙ וְ/לִ/יר֣וּשָׁלִַ֔ם ר֣וּחַ צַ֤ח שְׁפָיִים֙ בַּ/מִּדְבָּ֔ר דֶּ֖רֶךְ בַּת עַמִּ֑/י ל֥וֹא לִ/זְר֖וֹת וְ/ל֥וֹא לְ/הָבַֽר־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/011.yaml
  text: 'At that time it will be said to this people and to Jerusalem: “A hot wind from the bare heights in the wilderness comes toward the daughter of my people—not for winnowing or for cleansing.”[a][b][c]'
  footnotes:
  - marker: a
    text: Or 'hot wind' or 'searing wind.'
    reason: lexical_alternative
  - marker: b
    text: '''Bare heights'' may also be rendered ''bare hills''; the Hebrew refers to exposed, treeless elevations.'
    reason: lexical_alternative
  - marker: c
    text: '''Cleansing'' refers to the cleaning of grain after winnowing, not to moral or ritual purification in this immediate context.'
    reason: cultural_note
