id: MIC.6.4
reference: Micah 6:4
source:
  edition: WLC
  text: כִּ֤י הֶעֱלִתִ֨י/ךָ֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם וּ/מִ/בֵּ֥ית עֲבָדִ֖ים פְּדִיתִ֑י/ךָ וָ/אֶשְׁלַ֣ח לְ/פָנֶ֔י/ךָ אֶת מֹשֶׁ֖ה אַהֲרֹ֥ן וּ/מִרְיָֽם־׃
translation:
  text: For I brought you up from the land of Egypt[a], and from the house of slavery I redeemed you; and I sent before you Moses, Aaron, and Miriam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'from the house of slavery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the LORD's ground or explanation for the accusation/appeal in context. 'For' preserves the argumentative connection better than the more emphatic 'Indeed' or the more narrowly causal 'Because'.
- source_word: הֶעֱלִתִיךָ
  chosen: I brought you up
  alternatives:
  - I brought you out
  - I caused you to go up
  lexicon: HALOT
  rationale: The Hiphil of עלה literally means 'cause to go up.' In exodus contexts, idiomatic English often uses 'bring up' or 'bring out.' 'Brought you up' preserves the Hebrew verb's conventional covenantal/exodus phrasing while remaining natural.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'From' is sufficient in English because the verb already carries the movement sense; 'out of' is possible but slightly more expansive.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of slavery
  - from the slave house
  - from the house of bondage
  lexicon: HALOT
  rationale: Literally 'from a house of slaves.' This avoids the traditional but more interpretive 'house of bondage' and preserves the concrete social reality emphasized by עֲבָדִים. 'House of slavery' is idiomatic, but 'house of slaves' stays closer to the Hebrew plural noun.
- source_word: פְּדִיתִיךָ
  chosen: I redeemed you
  alternatives:
  - I ransomed you
  - I rescued you
  lexicon: HALOT
  rationale: פדה commonly denotes redemption/ransom language, especially in covenantal deliverance contexts. 'Redeemed' preserves the theological and exodus resonance better than the more general 'rescued.'
- source_word: וָאֶשְׁלַח
  chosen: and I sent
  alternatives:
  - and I dispatched
  lexicon: HALOT
  rationale: Simple narrative waw-consecutive with שלח. 'Sent' is the natural and sufficiently formal English equivalent.
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - ahead of you
  - in front of you
  lexicon: HALOT
  rationale: The phrase can mean spatially or representationally 'before/ahead of.' 'Before you' preserves the Hebrew wording and allows the sense that these leaders were sent in advance or in Israel's presence.
- source_word: אֶת מֹשֶׁה אַהֲרֹן וּמִרְיָם
  chosen: Moses, Aaron, and Miriam
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. Including Miriam alongside Moses and Aaron should be preserved explicitly, as the Hebrew names all three leaders.
