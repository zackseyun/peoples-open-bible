translation:
  language: es
  text: 'Mi amado respondió y me dijo[a]: «Levántate, amor mío, hermosa mía, y ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y ve». El hebreo dice literalmente «ve», pero en este contexto la invitación suena mejor en español como una llamada a acercarse al hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנָה
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo usa el verbo idiomático de responder/contestar. En español, «respondió» conserva mejor el valor narrativo sin exigir que haya una cita previa inmediata; «contestó» también sería posible, pero «respondió» suena más natural en este registro poético.
- source_word: דוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi amante
  lexicon: HALOT
  rationale: En Cantar de los Cantares, דוֹדִי designa al varón amado en un contexto afectivo y poético. «Mi amado» mantiene la ternura y evita la explicitud de «mi amante», que en español puede sonar más sexual de lo que el texto exige.
- source_word: וְאָמַר לִי
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  - y me dijo
  lexicon: HALOT
  rationale: La construcción hebrea se expresa de forma natural en español con «y me dijo». Conserva la secuencia verbal sin sobrecargarla con una fórmula más pesada como «y me habló».
- source_word: קוּמִי
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate
  - Alzate
  lexicon: HALOT
  rationale: Imperativo femenino singular. «Levántate» comunica con claridad la llamada urgente y poética; «Alzate» es posible, pero hoy suena menos natural o puede parecer más estilizado de lo necesario.
- source_word: רַעְיָתִי
  english_pob_choice: my love
  chosen_spanish: amor mío
  alternatives_spanish:
  - amor mío
  - amada mía
  - compañera mía
  lexicon: HALOT
  rationale: El término es un apelativo afectivo para la mujer amada. «Amor mío» preserva la intimidad poética y evita reducirlo a un equivalente demasiado moderno o demasiado formal.
- source_word: יָפָתִי
  english_pob_choice: my beautiful one
  chosen_spanish: hermosa mía
  alternatives_spanish:
  - hermosa mía
  - bella mía
  - mi hermosa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi hermosa / la hermosa mía». «Hermosa mía» reproduce bien la relación poseída-afectiva del original y mantiene el paralelismo poético con «amor mío».
- source_word: וּלְכִי לָךְ
  english_pob_choice: and come away
  chosen_spanish: y ven conmigo
  alternatives_spanish:
  - y ven conmigo
  - y vete
  - y sal
  lexicon: HALOT
  rationale: El verbo básico es «ir», pero en este contexto el movimiento está orientado hacia el hablante y funciona como invitación. «Ven conmigo» expresa mejor el sentido relacional y la dinámica del llamado que un «vete» o «ve» demasiado literal.
theological_decisions:
- issue: Imperativo de invitación con movimiento direccional
  english_pob_reading: come away
  chosen_spanish_reading: ven conmigo
  alternative_spanish_readings:
  - ve
  - vete
  - ven
  rationale: La POB en inglés opta por una equivalencia que preserve la invitación amorosa del hablante. En español, «ven conmigo» comunica el mismo gesto relacional y evita una lectura áspera o confusa de un simple «ve» en una escena de llamada amorosa.
  doctrine_reference: Poética bíblica; no hay decisión doctrinal directa, sino de sentido contextual.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más formal («Arise») en el nivel de registro, pero en español se prefirió «Levántate» por naturalidad y por la fuerza imperativa del hebreo. Se conservó el valor afectivo y poético de los apelativos y se optó por una equivalencia dinámica solo en el cierre direccional para reflejar mejor la invitación.
  spanish_consistency_notes:
  - Se mantuvo «mi amado» para דוֹדִי conforme al tratamiento afectivo del Cantar.
  - Se evitó «SEÑOR» u otras convenciones de ocultamiento del nombre divino porque no aparecen en este versículo.
  - No se introdujo terminología eclesiástica ajena al tono del poema.
  - La nota [a] marca la alternativa literal de movimiento, útil para auditar la diferencia entre «ir» y la invitación española «venir» en este contexto.
