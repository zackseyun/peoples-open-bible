  - severity: medium
    issue: «habiendo recibido vergüenza por la intriga»
    rationale: La combinación es poco idiomática en español y «por» puede leerse como causa moral. El sentido es que el complot terminó en deshonra para él; conviene una formulación más natural y precisa.
