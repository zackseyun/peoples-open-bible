review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el contenido del hebreo: quitar la ropa de cautiverio, permanecer en la casa, llorar por sus padres durante un tiempo definido, y solo después acercarse a ella en sentido sexual y marital. También conserva la distinción entre el acercamiento sexual idiomático y el estatus matrimonial resultante. Sin embargo, hay dos puntos donde el español actual no preserva con suficiente naturalidad y precisión el valor del original: «entrar a ella» suena poco idiomático en español bíblico actual, y «ella será para ti esposa» resulta forzado frente a la fórmula marital natural.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero tiene giros poco naturales para un español eclesial moderno: «entrar a ella» se entiende, pero suena calco; «será para ti esposa» es gramaticalmente duro; y «llorará a su padre y a su madre» puede mantenerse, aunque «llorará por su padre y por su madre» fluye mejor. Conviene una reparación menor para mejorar legibilidad sin perder la textura legal del hebreo.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones sobre cautiverio, casa, esposo y esposa van en la dirección correcta. La excepción principal es el idiomático sexual: para preservar el valor de תָּבֹא אֵלֶיהָ conviene «llegarte a ella», que en español bíblico es más fiel y natural que «entrar a ella».'
  issues:
  - severity: medium
    issue: «podrás entrar a ella» es un calco poco natural
    rationale: Aunque intenta conservar el idiomático sexual del hebreo, en español amplio suena extraño. «Podrás llegarte a ella» preserva mejor el registro bíblico y la distinción frente a «ser su esposo».
  - severity: medium
    issue: «ella será para ti esposa» suena forzado
    rationale: La fórmula hebrea de estatus marital debe sonar natural en español. «Ella será tu esposa» comunica fielmente el sentido sin perder formalidad.
  - severity: low
    issue: «llorará a su padre y a su madre» puede producir leve aspereza idiomática
    rationale: Con verbos de llorar en español, la construcción con «por» suele ser más natural en contexto de duelo. No es un error grave, pero mejora la lectura y refleja mejor la fuerza de duelo que el contexto exige.
  revised_spanish_text: Ella quitará de sí la ropa de su cautiverio[a] y permanecerá en tu casa, y llorará por su padre y por su madre por un mes de días. Después de eso podrás llegarte a ella y ser su esposo, y ella será tu esposa.
  revised_footnotes:
  - marker: a
    text: O «las prendas de su cautiverio» o «la ropa que llevaba cuando fue capturada».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores de idiomaticidad y legibilidad en español sin alterar el sentido fuente ni las decisiones teológicas auditadas: «llegarte a ella» conserva mejor el idiomático sexual hebreo que «entrar a ella»; «será tu esposa» naturaliza la fórmula marital; y «llorará por su padre y por su madre» mejora la sintaxis de duelo en español.'
