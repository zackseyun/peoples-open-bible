  to: Estuvieron en su lugar, conforme a su costumbre[a], conforme a la ley de Moisés, el hombre de Dios. Los sacerdotes estaban rociando la sangre[b] de la mano de los levitas.
  rationale: Se reemplazó «Se mantuvieron» por «Estuvieron» para reflejar mejor el verbo narrativo hebreo sin sobrecargarlo con un matiz de permanencia. Se cambió «salpicando» por «rociando» porque es la opción española más fiel, natural y digna para la aplicación ritual de la sangre en este contexto. Se conservaron «conforme a su costumbre», «la ley de Moisés» y «de la mano de los levitas» por su buena correspondencia con el audit trail y el hebreo.
