id: ISA.56.6
reference: Isaiah 56:6
source:
  edition: WLC
  text: וּ/בְנֵ֣י הַ/נֵּכָ֗ר הַ/נִּלְוִ֤ים עַל יְהוָה֙ לְ/שָׁ֣רְת֔/וֹ וּֽ/לְ/אַהֲבָה֙ אֶת שֵׁ֣ם יְהוָ֔ה לִ/הְי֥וֹת ל֖/וֹ לַ/עֲבָדִ֑ים כָּל שֹׁמֵ֤ר שַׁבָּת֙ מֵֽ/חַלְּל֔/וֹ וּ/מַחֲזִיקִ֖ים בִּ/בְרִיתִֽ/י־־־׃
translation:
  text: And the sons of the foreigner who join themselves to Yahweh[a], to minister to him, and to love the name of Yahweh[d][c][b], to be his servants—everyone who keeps the Sabbath from profaning it and holds fast my covenant—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners.' Hebrew literally, 'sons of the foreigner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to serve him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to be his slaves.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and hold fast to my covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי הַנֵּכָר
  chosen: the sons of the foreigner
  alternatives:
  - the foreigners
  - the children of foreigners
  - the sons of a foreign land
  lexicon: HALOT
  rationale: Formally, the construct phrase is 'sons of the foreigner/foreign land.' I retained 'sons' to reflect the Hebrew expression and the gender-accurate policy, while allowing the phrase to function corporately for foreign people attached to Israel. 'Foreigners' alone is smoother but loses the concrete Hebrew idiom.
- source_word: הַנִּלְוִים עַל יְהוָה
  chosen: who join themselves to the LORD
  alternatives:
  - who attach themselves to the LORD
  - who bind themselves to the LORD
  lexicon: HALOT
  rationale: The Niphal participle of לוה here conveys attachment/allegiance. 'Join themselves to' is idiomatic English and preserves the reflexive sense of covenantal attachment. For יְהוָה, DOCTRINE.md specifies 'the LORD' as the default rendering.
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  lexicon: HALOT
  rationale: שרת often denotes ministerial/service language, especially in relation to God or sacred service. 'Minister to him' preserves that elevated nuance better than the flatter 'serve him,' while remaining readable.
- source_word: וּלְאַהֲבָה אֶת שֵׁם יְהוָה
  chosen: and to love the name of the LORD
  alternatives:
  - and to love the LORD's name
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'love the name of YHWH.' Retaining 'name' preserves the covenantal and reverential force rather than collapsing it into simply 'love the LORD.'
- source_word: לִהְיוֹת לוֹ לַעֲבָדִים
  chosen: to be his servants
  alternatives:
  - to be his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in this context of covenant devotion and worshipful allegiance, 'servants' is the more natural English rendering. The bonded nature is present but not foregrounded in the same way as some NT δοῦλος contexts. The plural predicate is preserved.
- source_word: כָּל שֹׁמֵר שַׁבָּת מֵחַלְּלוֹ
  chosen: everyone who keeps the Sabbath from profaning it
  alternatives:
  - all who keep the Sabbath and do not profane it
  - everyone keeping the Sabbath from desecrating it
  lexicon: HALOT
  rationale: The singular participle with כָּל has a distributive sense, hence 'everyone who.' The infinitive/prohibitive sense after מן is well conveyed by 'from profaning it.' 'Profane' matches the holiness register of חלל here.
- source_word: וּמַחֲזִיקִים בִּבְרִיתִי
  chosen: and holds fast my covenant
  alternatives:
  - and hold fast to my covenant
  - and grasp my covenant firmly
  lexicon: HALOT
  rationale: The participle means to seize/hold firmly. 'Hold fast' is idiomatic covenant language in English. I omitted 'to' in the main text because 'hold fast my covenant' is concise and literary, though 'hold fast to' is also possible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
