translation:
  language: es
  text: 'Y Yahvé dijo a los hijos de Israel[a]: «¿No fue de Egipto, y de los amorreos, y de los amonitas, y de los filisteos[b], de donde yo los libré?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel». Muchas versiones españolas lo vierten más idiomáticamente como «los israelitas».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula hebrea es elíptica en este versículo y se completa por el contexto inmediato; en español se ha suplido «de donde yo los libré» para dar claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor del Nombre divino como transliteración reverente, conforme al criterio del proyecto para YHWH, evitando la sustitución por un título. 'Yahvé' es la forma estable en español del mismo nombre personal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la construcción literal y masculina del hebreo, igual que en la decisión inglesa, porque la forma de parentesco es parte del texto y no solo un demónimo. 'Israelitas' sería más idiomático, pero borra la estructura lexical del original.
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿No era
  - ¿Acaso no fue
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con negación. En español, '¿No fue...?' reproduce bien la fuerza interrogativa y deja espacio para la cláusula implícita completada por el contexto.
- source_word: מִמִּצְרַיִם ... וּמִן ...
  english_pob_choice: from Egypt, and from the Amorites, and from the Ammonites, and from the Philistines
  chosen_spanish: de Egipto, de los amorreos, de los hijos de Amón y de los filisteos
  alternatives_spanish:
  - desde Egipto, desde los amorreos, desde los amonitas y desde los filisteos
  - de Egipto, de los amorreos, de Amón y de los filisteos
  lexicon: HALOT
  rationale: El hebreo usa repetidamente מִן para indicar origen o procedencia en una serie. 'De' mantiene la paridad de la lista en español sin sonar forzado. Se opta por 'los amorreos' y 'los filisteos' como nombres colectivos naturales; 'los hijos de Amón' preserva mejor la relación genealógica del hebreo que 'amonitas' en este contexto.
- source_word: '[cláusula implícita]'
  english_pob_choice: that I delivered you
  chosen_spanish: que yo los libré
  alternatives_spanish:
  - que yo los rescaté
  - que yo los salvé
  lexicon: HALOT
  rationale: El hebreo está elíptico y depende del contexto inmediato. 'Libré' expresa el acto de liberar/rescatar en la historia de Jueces sin cargar con matices doctrinales adicionales ni sonar excesivamente abstracto. Se usa 'los' para referir a los hijos de Israel mencionados antes.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la decisión del POB de no ocultar el Nombre divino tras una sustitución titulada. En español, 'Yahvé' preserva la referencia personal al Dios del pacto y armoniza con el criterio transparente del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cláusula elíptica al final de la pregunta retórica
  english_pob_reading: that I delivered you
  chosen_spanish_reading: que yo los libré
  alternative_spanish_readings:
  - que yo los rescaté
  - que yo los salvé
  rationale: El hebreo exige completar la idea implícita por contexto. 'Libré' comunica con fidelidad la acción histórica de liberación sin introducir una interpretación espiritualizante ni alterar la estructura retórica del verso.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §6
- issue: Preservación de 'hijos de Israel' frente a una etnia neutralizada
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva la forma semítica y masculina del original, de acuerdo con la política de fidelidad morfosintáctica del POB. La formulación no excluye al grupo; más bien refleja la manera en que el texto lo nombra.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta que el tramo inglés final fue revisado sin cambios y que el informe de control cruzado marcó alta concordancia con observaciones menores; por eso se mantiene la estructura del POB inglés, pero se ajusta el español para conservar la elipsis y la lista de naciones con naturalidad controlada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la repetición de 'de' para reflejar la serie de מִן en el hebreo.
  - Se mantiene 'hijos de Israel' en el texto principal y se documenta la alternativa idiomática en nota.
  - '''Libré'' se elige como equivalente de rescue/deliver en contexto de Jueces, evitando ''salvé'' por su posible carga doctrinal amplia.'
