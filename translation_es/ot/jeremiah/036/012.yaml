translation:
  language: es
  text: 'Él bajó a la casa del rey[a], a la cámara[b] del escriba, y he aquí, todos los oficiales[c] estaban sentados allí: Elisamá el escriba, Delaía hijo de Semaías, Elnatán hijo de Acbor, Gemarías hijo de Safán, Sedequías hijo de Jananías, y todos los oficiales[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el palacio real» para «la casa del rey».
    reason: lexical_alternative
  - marker: b
    text: O «la sala del escriba» o «la cámara del secretario».
    reason: lexical_alternative
  - marker: c
    text: «Oficiales» traduce un término hebreo que a menudo se vierte como «príncipes»; aquí se refiere a líderes de la corte u oficiales reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: he went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: El verbo hebreo ירד expresa descenso literal; en español, «bajó» comunica de forma natural la direccionalidad sin añadir matices innecesarios.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king's house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - la casa real
  lexicon: HALOT
  rationale: Se conserva la expresión concreta del hebreo «casa del rey». «Palacio real» es posible, pero interpreta más de lo que dice el texto.
- source_word: לִשְׁכַּת הַסֹּפֵר
  english_pob_choice: the scribe's chamber
  chosen_spanish: la cámara del escriba
  alternatives_spanish:
  - la sala del escriba
  - el cuarto del escriba
  - la cámara del secretario
  lexicon: HALOT
  rationale: לשכה es una habitación/cámara oficial; «cámara» mantiene el carácter administrativo y «escriba» conserva la función del cargo. Se evita «secretario» porque puede modernizar demasiado el oficio.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: La fórmula discursiva hebrea introduce una escena llamativa. «Y he aquí» preserva ese efecto narrativo en español bíblico claro.
- source_word: כָּל הַשָּׂרִים
  english_pob_choice: all the officials
  chosen_spanish: todos los oficiales
  alternatives_spanish:
  - todos los príncipes
  - todos los jefes
  lexicon: HALOT
  rationale: En este contexto de corte, שׂרים se refiere a funcionarios/líderes de la corte. «Oficiales» evita el posible engaño de «príncipes» y refleja el valor administrativo.
- source_word: יֹשְׁבִים
  english_pob_choice: were sitting
  chosen_spanish: estaban sentados
  alternatives_spanish:
  - estaban sentándose
  - se hallaban sentados
  lexicon: HALOT
  rationale: El participio describe una situación en curso; «estaban sentados» conserva el estado escénico mejor que un simple pretérito.
- source_word: אֱלִישָׁמָע הַסֹּפֵר
  english_pob_choice: Elishama the scribe
  chosen_spanish: Elishama el escriba
  alternatives_spanish:
  - Elishama el secretario
  lexicon: HALOT
  rationale: Se mantiene «escriba» para el cargo, en continuidad con la designación del mismo funcionario en la cláusula anterior.
- source_word: דְלָיָהוּ בֶן שְׁמַעְיָהוּ
  english_pob_choice: Delaiah son of Shemaiah
  chosen_spanish: Delaía hijo de Semaías
  alternatives_spanish:
  - Delaía, hijo de Semaías
  lexicon: HALOT
  rationale: Los nombres se transliteran en forma estándar al español y בן se rinde como «hijo de» para conservar la relación genealógica.
- source_word: אֶלְנָתָן בֶּן עַכְבּוֹר
  english_pob_choice: Elnathan son of Achbor
  chosen_spanish: Elnatán hijo de Acbor
  alternatives_spanish:
  - Elnatán, hijo de Acbor
  lexicon: HALOT
  rationale: Transliteración usual al español; se conserva la fórmula genealógica simple del hebreo.
- source_word: גְמַרְיָהוּ בֶן שָׁפָן
  english_pob_choice: Gemariah son of Shaphan
  chosen_spanish: Gemarías hijo de Safán
  alternatives_spanish:
  - Gemarías, hijo de Safán
  lexicon: HALOT
  rationale: Se sigue la transliteración española más común de los nombres propios y la relación filial explícita del texto.
- source_word: צִדְקִיָּהוּ בֶן חֲנַנְיָהוּ
  english_pob_choice: Zedekiah son of Hananiah
  chosen_spanish: Sedequías hijo de Jananías
  alternatives_spanish:
  - Sedequías, hijo de Jananías
  lexicon: HALOT
  rationale: La transliteración española normaliza los nombres hebreos sin alterar la identidad del personaje; se mantiene la construcción «hijo de».
- source_word: וְכָל הַשָּׂרִים
  english_pob_choice: and all the officials
  chosen_spanish: y todos los oficiales
  alternatives_spanish:
  - y todos los demás oficiales
  lexicon: HALOT
  rationale: Se conserva la repetición final del hebreo. No se añade «demás» porque no está explícito en la forma hebrea.
theological_decisions:
- issue: Título administrativo שׂרים en contexto cortesano
  english_pob_reading: Officials renders a Hebrew term often translated princes, referring here to court leaders or royal officers.
  chosen_spanish_reading: oficiales
  alternative_spanish_readings:
  - príncipes
  - jefes de la corte
  - funcionarios
  rationale: El contexto inmediato es una reunión en la casa del rey y la cámara del escriba; en español, «oficiales» comunica con claridad la función cortesana/administrativa sin inducir una lectura nobiliaria demasiado específica.
  doctrine_reference: Lexical/contextual rather than doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que solo ajustó la capitalización inicial y no introdujo cambios de contenido. La traducción española sigue el mismo contenido base sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «escriba» de manera consistente para el cargo de ספר.
  - Se usó «oficiales» en ambas apariciones de שׂרים para conservar la repetición retórica del hebreo.
  - Los nombres propios se transliteraron de forma uniforme al español y se conservó la fórmula genealógica «hijo de».
  - Se evitó «SEÑOR» porque no aparece aquí el nombre divino ni una cita del tetragrama.
  - La puntuación reproduce una lectura fluida y publicada, con dos puntos antes de la lista nominal para reflejar la estructura del hebreo.
