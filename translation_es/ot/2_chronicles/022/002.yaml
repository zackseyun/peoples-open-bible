translation:
  language: es
  text: Ocozías tenía[a] cuarenta y dos años cuando comenzó a reinar, y reinó un año en Jerusalén. Su madre se llamaba Atalía[b], hija de Omrí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cuarenta y dos años». El paralelo en 2 Reyes 8:26 dice «veintidós años», así que algunos entienden aquí un problema textual o proponen otra manera de contar el número.'
    reason: textual_variant
  - marker: b
    text: O «descendiente de Omrí». El hebreo «hija» a veces puede usarse en un sentido más amplio para una descendiente femenina.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אַרְבָּעִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: was forty-two years old
  chosen_spanish: tenía cuarenta y dos años
  alternatives_spanish:
  - era de cuarenta y dos años
  - era hijo de cuarenta y dos años
  lexicon: HALOT
  rationale: La fórmula hebrea expresa edad de manera idiomática como “hijo de ... años”. En español, la equivalencia natural y fiel es “tenía cuarenta y dos años”, que conserva el dato numérico sin calco forzado.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al reinar
  lexicon: HALOT
  rationale: La construcción marca el momento de acceso al trono. “Comenzó a reinar” comunica ese inicio con naturalidad en español y evita una forma demasiado literal.
- source_word: וְשָׁנָה אַחַת מָלַךְ
  english_pob_choice: and he reigned one year
  chosen_spanish: y reinó un año
  alternatives_spanish:
  - y reinó por un año
  - y reinó durante un año
  lexicon: HALOT
  rationale: La frase indica duración del reinado. “Reinó un año” preserva el sentido directo y suena natural en español.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es una referencia locativa estándar; la transliteración geográfica habitual en español es directa y suficiente.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre fue
  alternatives_spanish:
  - Y el nombre de su madre fue
  - Su madre se llamaba
  lexicon: HALOT
  rationale: La cláusula es una fórmula regia. “El nombre de su madre fue” conserva la estructura del hebreo sin sonar artificial en español.
- source_word: עֲתַלְיָהוּ
  english_pob_choice: Athaliah
  chosen_spanish: Atalía
  alternatives_spanish:
  - Atalía
  lexicon: Conventional Spanish biblical name form
  rationale: Se emplea la forma española bíblica estándar del nombre propio, manteniendo la identificación histórica y la legibilidad para lectores en español.
- source_word: בַּת עָמְרִי
  english_pob_choice: the daughter of Omri
  chosen_spanish: hija de Omrí
  alternatives_spanish:
  - descendiente de Omrí
  - nieta de Omrí
  lexicon: HALOT
  rationale: La traducción literal conserva la fuerza genealógica del hebreo. En español, “hija de” mantiene la forma directa sin resolver de antemano la cuestión de descendencia más amplia que el término puede admitir.
theological_decisions:
- issue: Tensión cronológica sobre la edad de Ocozías al comenzar a reinar
  english_pob_reading: Retain the Masoretic wording 'forty-two years old' in the main text
  chosen_spanish_reading: Mantener “cuarenta y dos años” en el texto principal
  alternative_spanish_readings:
  - veintidós años (armonizado con 2 Reyes 8:26)
  - entender el número de otra manera ligada a la dinastía
  rationale: El texto hebreo recibido lee “cuarenta y dos”. La traducción debe reflejar el dato fuente sin corregirlo silenciosamente. La nota permite señalar la tensión con el pasaje paralelo sin borrar la lectura masorética.
  doctrine_reference: Principios de traducción POB §3, §5
- issue: Alcance genealógico de “hija de Omrí”
  english_pob_reading: Translate literally as 'daughter of Omri'
  chosen_spanish_reading: Traducir literalmente “hija de Omrí”
  alternative_spanish_readings:
  - descendiente de Omrí
  - pariente de Omrí
  rationale: El hebreo usa el término común de parentesco. La versión principal conserva esa formulación y deja la posibilidad de descendencia más amplia para la nota, sin resolverla por anticipado.
  doctrine_reference: Principios de traducción POB §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y el trazado auditado en inglés: conserva la cifra de cuarenta y dos años en el texto principal, mantiene la fórmula regia de reinado y presenta la relación con Omrí de manera literal, dejando las alternativas en notas como en el POB inglés. No se aplicaron revisiones previas adicionales.'
  spanish_consistency_notes:
  - Se usa “Ocozías” como forma bíblica española del nombre propio.
  - Se usa “Atalía” para la reina madre, siguiendo la convención bíblica española.
  - Se mantiene “Omrí” con tilde por la forma española habitual.
  - La puntuación y el orden sintáctico buscan fluidez moderna sin alejarse del hebreo.
  - Las notas a y b están ancladas en el texto principal y cubren la variante textual y la alternativa léxica documentadas.
