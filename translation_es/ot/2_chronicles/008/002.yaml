    rationale: El hebreo aquí denota a los israelitas en general, no específicamente a varones. El English POB escogió 'the people of Israel' y relegó la forma literal a nota. En español, 'los hijos de Israel' puede sonar excesivamente calco y menos claro para lectura eclesial general.
  - severity: low
    issue: '''estableció allí'' es menos idiomático que ''asentó allí'' con objeto de personas'
    rationale: Aunque conserva cierta fuerza causativa, 'estableció allí a...' suena más pesado. 'Asentó allí al pueblo de Israel' expresa mejor el sentido de hacer habitar o poblar.
  revised_spanish_text: Y las ciudades que Huram había dado a Salomón[a], Salomón las reconstruyó[b] y asentó allí al pueblo de Israel[c].
