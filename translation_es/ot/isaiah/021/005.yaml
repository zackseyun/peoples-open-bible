translation:
  language: es
  text: Ponen la mesa[a], extienden las alfombras, comen, beben. Levántense, príncipes[b]; aceiten el escudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vigilan la atalaya» / «ponen una guardia». El hebreo de esta cláusula es difícil; el texto principal sigue el sentido de preparación de banquete que encaja con la secuencia circundante.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «unjan el escudo»; es decir, prepárenlo para la batalla aplicándole aceite.
    reason: cultural_note
lexical_decisions:
- source_word: עָרֹךְ
  english_pob_choice: they set
  chosen_spanish: ponen
  alternatives_spanish:
  - ponen en orden
  - disponen
  - preparan
  lexicon: HALOT
  rationale: El hebreo expresa la acción concreta de disponer o preparar. En este contexto de acciones sucesivas, «ponen» comunica de forma natural la preparación de la escena sin perder la concreción.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - el banquete
  lexicon: HALOT
  rationale: El sustantivo básico es «mesa». Se conserva la imagen concreta del banquete en vez de generalizarla a «banquete».
- source_word: צָפֹה
  english_pob_choice: they spread
  chosen_spanish: extienden
  alternatives_spanish:
  - cubren
  - preparan
  - vigilan
  lexicon: HALOT
  rationale: La secuencia inmediata sugiere preparación para un banquete. «Extienden» refleja bien la acción de desplegar algo sobre la mesa o en el suelo, acorde con el sentido adoptado por POB.
- source_word: הַצָּפִית
  english_pob_choice: the rugs
  chosen_spanish: las alfombras
  alternatives_spanish:
  - las cubiertas
  - las mantas
  - la cobertura
  lexicon: HALOT
  rationale: El término es raro y admite varias lecturas. «Alfombras» ofrece un equivalente español claro para un elemento extendido en escena de banquete, manteniendo la ambigüedad razonable del hebreo.
- source_word: אָכוֹל
  english_pob_choice: they eat
  chosen_spanish: comen
  alternatives_spanish:
  - están comiendo
  - a comer
  lexicon: HALOT
  rationale: El infinitivo absoluto funciona aquí de modo vívido dentro de una cadena narrativa. En español, un presente simple suena más natural y mantiene la rapidez del cuadro.
- source_word: שָׁתֹה
  english_pob_choice: they drink
  chosen_spanish: beben
  alternatives_spanish:
  - están bebiendo
  - a beber
  lexicon: HALOT
  rationale: Como con el verbo anterior, el valor aspectual se expresa mejor con un presente simple que conserve el ritmo de la escena.
- source_word: קוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense!
  alternatives_spanish:
  - ¡Álense!
  - ¡Párense!
  - ¡Despabilen!
  lexicon: HALOT
  rationale: Es un imperativo plural abrupto. «Levántense» conserva la urgencia y la elevación del tono.
- source_word: הַשָּׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - jefes
  - gobernantes
  lexicon: HALOT
  rationale: «Príncipes» reproduce bien el rango cortesano/político que POB documenta para שׂרים en este contexto.
- source_word: מִשְׁחוּ
  english_pob_choice: oil
  chosen_spanish: unjan
  alternatives_spanish:
  - aceiten
  - unten con aceite
  - anoten
  lexicon: HALOT
  rationale: El verbo significa literalmente aplicar aceite. En español, «ungir» conserva el gesto físico y también puede evocar la preparación militar del escudo, como en la nota inglesa.
- source_word: מָגֵן
  english_pob_choice: the shield
  chosen_spanish: el escudo
  alternatives_spanish:
  - la defensa
  - la adarga
  lexicon: HALOT
  rationale: Se mantiene el objeto bélico concreto. «Escudo» es el equivalente directo y claro en español.
theological_decisions:
- issue: Sentido de la instrucción final sobre el escudo
  english_pob_reading: Literally 'anoint the shield,' that is, prepare the shield for battle by oiling it.
  chosen_spanish_reading: «unjan el escudo», es decir, prepárenlo para la batalla mediante aceite.
  alternative_spanish_readings:
  - «aceiten el escudo»
  - «preparen el escudo para la batalla»
  rationale: La frase conserva la imagen literal de ungir con aceite, sin borrar la función militar que explica la orden. En español, «unjan» mantiene la tensión entre gesto literal y propósito bélico.
  doctrine_reference: Uso lexical y cultural del símbolo bélico; sin implicación doctrinal directa
- issue: Identificación de la escena como preparación de banquete o vigilancia
  english_pob_reading: The main text follows the banquet-preparation sense that fits the surrounding sequence.
  chosen_spanish_reading: La traducción principal sigue la escena de preparación de banquete.
  alternative_spanish_readings:
  - 'La traducción podría reflejar una lectura de vigilancia: «vigilan la atalaya» / «ponen una guardia».'
  rationale: La secuencia de acciones alimentarias y de disposición de mesa favorece la lectura de banquete, pero la dificultad del hebreo merece quedar visible en la nota para no borrar la alternativa.
  doctrine_reference: Crítica textual / decisión léxica, sin carga doctrinal
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente, que no introdujo cambios respecto del borrador anterior. La versión española conserva la lectura principal de POB y su nota de alternativa para la cláusula difícil, así como la explicación cultural del gesto de ungir el escudo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se usa un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - Se conserva la tensión entre la literalidad del gesto («unjan») y su función militar.
  - La ambigüedad de la primera cláusula queda visible mediante nota, sin forzar una sola lectura como segura.
