translation:
  language: es
  text: Porque derramaré agua sobre la tierra sedienta[a], y corrientes[b] sobre la tierra seca; derramaré mi Espíritu[c] sobre tu descendencia, y mi bendición sobre tus descendientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la sedienta'; el adjetivo hebreo puede funcionar sustantivamente, pero el paralelismo con 'tierra seca' favorece entender la imagen como tierra sedienta.
    reason: alternative_reading
  - marker: b
    text: O 'aguas que fluyen'; el término hebreo es literalmente 'cosas que fluyen'.
    reason: lexical_alternative
  - marker: c
    text: '''Mi Espíritu'' también podría traducirse ''mi aliento'' o ''mi viento'', pero aquí el contexto de bendición divina sobre la descendencia favorece ''Espíritu''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la promesa anterior. En español, 'Porque' conserva la relación causal/explanatoria con naturalidad y sin perder la fuerza discursiva.
- source_word: אֶצָּק / אֶצֹּק (יצק)
  english_pob_choice: I will pour / I will pour out
  chosen_spanish: derramaré / derramaré
  alternatives_spanish:
  - verteré / verteré
  - vaciaré / vaciaré
  lexicon: HALOT
  rationale: El verbo expresa la imagen de verter líquido. 'Derramar' funciona bien con 'agua' y también con una efusión metafórica del Espíritu, manteniendo la correspondencia entre ambas mitades del versículo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Sentido básico y literal del sustantivo; en español 'agua' es la forma natural para el sustantivo de masa.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' conserva la dirección de derramamiento/puesta encima, con buen paralelo en ambas cláusulas.'
- source_word: צָמֵא
  english_pob_choice: the thirsty land
  chosen_spanish: la tierra sedienta
  alternatives_spanish:
  - la sedienta
  - el terreno sediento
  lexicon: HALOT
  rationale: El adjetivo puede funcionar sustantivamente, pero el paralelismo con 'tierra seca' favorece una imagen geográfica. 'La tierra sedienta' explicita esa metáfora de modo idiomático en español.
- source_word: וְנֹזְלִים
  english_pob_choice: and streams
  chosen_spanish: y corrientes
  alternatives_spanish:
  - y aguas que fluyen
  - y flujos
  lexicon: HALOT
  rationale: El participio significa literalmente cosas que fluyen. 'Corrientes' preserva la imagen del agua en movimiento sin sobretraducir ni introducir un caudal excesivo.
- source_word: יַבָּשָׁה
  english_pob_choice: the dry ground
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - el suelo seco
  - la tierra árida
  lexicon: HALOT
  rationale: Designa tierra o suelo seco. 'La tierra seca' mantiene el paralelismo con 'la tierra sedienta' y es claro para lectura pública.
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi aliento
  - mi viento
  lexicon: HALOT
  rationale: Aunque רוּחַ puede significar espíritu, aliento o viento, el contexto de bendición divina sobre la descendencia favorece 'Espíritu'. La mayúscula refleja la referencia al Espíritu de Dios en español cristiano estándar.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus hijos
  lexicon: HALOT
  rationale: '''Descendencia'' expresa bien el colectivo generacional y evita el calco ''simiente'', menos natural en español actual.'
- source_word: וּבִרְכָתִי
  english_pob_choice: and my blessing
  chosen_spanish: y mi bendición
  alternatives_spanish:
  - y mi favor
  lexicon: HALOT
  rationale: Es la traducción normal del sustantivo y preserva el alcance benefactivo y pactal del término.
- source_word: צֶאֱצָאֶיךָ
  english_pob_choice: your descendants
  chosen_spanish: tus vástagos
  alternatives_spanish:
  - tus descendientes
  - tu progenie
  lexicon: HALOT
  rationale: El término alude a la progenie o los que proceden de uno. 'Vástagos' mantiene el paralelo con 'descendencia' sin repetir exactamente la misma palabra y conserva una textura bíblica inteligible.
theological_decisions:
- issue: Sentido de רוּחִי en una promesa de restauración y bendición
  english_pob_reading: my Spirit
  chosen_spanish_reading: mi Espíritu
  alternative_spanish_readings:
  - mi aliento
  - mi viento
  rationale: El versículo enlaza agua, vida y bendición con la acción divina sobre la descendencia. Traducirlo como 'mi Espíritu' preserva la lectura teológica de una presencia personal y dadora de vida, en vez de reducirla a un fenómeno natural impersonal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de צָמֵא en el paralelismo poético
  english_pob_reading: the thirsty land
  chosen_spanish_reading: la tierra sedienta
  alternative_spanish_readings:
  - el sediento
  - la gente sedienta
  rationale: La segunda cláusula ('sobre la tierra seca') determina un marco paisajístico. Leer el adjetivo como sustantivo de una tierra sedienta conserva el paralelismo y evita trasladar prematuramente la imagen a personas.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente señaló que no se requerían cambios y el dictamen de control cruzado fue de alta concordancia; por eso el borrador mantiene la estructura y las decisiones principales del análisis inglés, adaptándolas al español con equivalencias naturales y auditablemente justificadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada para el nombre divino cuando aparezca en este proyecto; este versículo no lo contiene explícitamente.
  - '''Descendencia'' y ''vástagos'' se distinguen para reflejar el paralelismo hebreo entre זַרְעֶךָ y צֶאֱצָאֶיךָ sin caer en mera repetición.'
  - Se conserva la metáfora hídrica con verbos de derramamiento para ambas mitades del versículo, evitando suavizar la imagen profética.
