translation:
  language: es
  text: 'Porque un hombre agarrará a su hermano en la casa de su padre: «Tú tienes un manto[a]; serás nuestro dirigente, y esta ruina estará bajo tu mano[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este derrumbe» o, más literalmente, «esta piedra de tropiezo».
    reason: lexical_alternative
  - marker: b
    text: «Bajo tu mano» es un modismo hebreo que significa bajo tu autoridad o a tu cargo.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una relación explicativa o causal con el contexto previo; «Porque» conserva bien ese valor en español sin sonar artificial.
- source_word: יִתְפֹּשׂ
  english_pob_choice: will seize
  chosen_spanish: agarrará
  alternatives_spanish:
  - tomará
  - se apoderará de
  lexicon: HALOT
  rationale: El verbo expresa asir a alguien con fuerza. «Agarrará» transmite la acción directa y tensa del pasaje, evitando una suavización excesiva.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y presenta un caso ejemplar; «un hombre» conserva esa forma con precisión.
- source_word: בְּאָחִיו
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su pariente
  lexicon: HALOT
  rationale: «Hermano» mantiene el sentido ordinario de אָח y encaja con el marco doméstico inmediato de la casa paterna.
- source_word: בֵּית אָבִיו
  english_pob_choice: in his father's house
  chosen_spanish: en la casa de su padre
  alternatives_spanish:
  - en la casa paterna
  - en la casa de su familia
  lexicon: HALOT
  rationale: La escena se ubica dentro del ámbito familiar/patrimonial; esta formulación es natural en español y conserva el marco del original.
- source_word: שִׂמְלָה
  english_pob_choice: a cloak
  chosen_spanish: un manto
  alternatives_spanish:
  - una capa
  - un vestido
  lexicon: HALOT
  rationale: El término designa una prenda exterior. «Manto» es amplio y digno en español, y permite representar una prenda visible que señala aptitud para dirigir.
- source_word: קָצִין
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder
  - gobernante
  lexicon: HALOT
  rationale: קָצִין denota a uno con autoridad. «Jefe» comunica bien la idea de autoridad personal sin cargarlo innecesariamente con matices militares o eclesiásticos.
- source_word: תִּהְיֶה לָּנוּ
  english_pob_choice: you shall be our leader
  chosen_spanish: serás nuestro jefe
  alternatives_spanish:
  - serás nuestro gobernante
  - serás nuestro líder
  lexicon: HALOT
  rationale: El futuro aquí expresa una asignación o petición comunitaria. «Serás nuestro jefe» conserva la fuerza directiva y suena natural en español.
- source_word: הַמַּכְשֵׁלָה
  english_pob_choice: this ruin
  chosen_spanish: esta ruina
  alternatives_spanish:
  - este tropiezo
  - este escándalo
  - este derrumbe
  lexicon: HALOT
  rationale: En contexto, el término apunta al desastre social y moral descrito por el profeta. «Ruina» comunica ese resultado con claridad, sin borrar la metáfora subyacente del tropiezo.
- source_word: תַּחַת יָדֶךָ
  english_pob_choice: under your hand
  chosen_spanish: bajo tu mano
  alternatives_spanish:
  - bajo tu autoridad
  - a tu cargo
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática del hebreo, que habla de control o responsabilidad. «Bajo tu mano» mantiene la fuerza figurativa del original.
theological_decisions:
- issue: La expresión final hebrea es un modismo de autoridad, no una referencia literal a una mano física
  english_pob_reading: “Under your hand” is a Hebrew idiom meaning under your authority or in your charge.
  chosen_spanish_reading: «Bajo tu mano» se entiende como un modismo de autoridad o responsabilidad.
  alternative_spanish_readings:
  - bajo tu autoridad
  - a tu cargo
  rationale: La traducción principal conserva la imagen hebrea, mientras que la nota aclara el sentido idiomático para el lector hispanohablante.
  doctrine_reference: Uso idiomático del lenguaje bíblico; no es una cuestión doctrinal sino hermenéutica.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportaron cambios necesarios y el acuerdo con el control cruzado fue alto (1.0).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se evita «SEÑOR» porque el pasaje no contiene יהוה ni κύριος en la base hebrea.
  - Se conserva la metáfora de autoridad en «bajo tu mano», con aclaración en nota.
  - «Manto» se eligió por ser una prenda exterior visible acorde con el valor social del contexto.
