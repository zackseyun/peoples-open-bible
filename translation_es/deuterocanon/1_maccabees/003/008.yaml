  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «Impíos» refleja bien ἀσεβεῖς, mejor que un término moral más amplio. «Ira» preserva la tensión teológica documentada sin explicitar «divina» en el texto principal. No aparece terminología sensible adicional del glosario principal.
