base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/029/017.yaml
  text: And I know[a], my God, that you test the heart and take pleasure in uprightness. I, in the uprightness of my heart, have willingly offered all these things[b], and now I have seen your people who are present here willingly offer to you with joy.
  footnotes:
