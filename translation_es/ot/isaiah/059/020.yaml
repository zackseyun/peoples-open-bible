translation:
  language: es
  text: Y vendrá un Redentor[c] a Sion[b], y a los que en Jacob se apartan de la transgresión[d][a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrepentidos en Jacob» o «los que en Jacob vuelven de la rebelión».
    reason: alternative_reading
  - marker: b
    text: O «para Sion»; la preposición hebrea a veces puede verterse así, aunque «a Sion» se ajusta mejor al verbo «venir».
    reason: lexical_alternative
  - marker: c
    text: «Redentor» traduce el hebreo go'el, un término para quien rescata o reivindica, con frecuencia con matices de parentesco y pacto.
    reason: cultural_note
  - marker: d
    text: Pablo cita este versículo en Romanos 11:26, donde la redacción difiere en parte bajo la influencia de la tradición griega.
    reason: cross_reference
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: And ... will come
  chosen_spanish: Y vendrá
  alternatives_spanish:
  - Y viene
  - Y vendrá entonces
  lexicon: HALOT
  rationale: El perfecto profético hebreo con וְ admite futuro en español; «vendrá» conserva el valor profético y suena natural en un registro bíblico digno.
- source_word: לְצִיּוֹן
  english_pob_choice: to Zion
  chosen_spanish: a Sion
  alternatives_spanish:
  - para Sion
  lexicon: HALOT
  rationale: Con el verbo venir, la preposición indica dirección/meta. «A Sion» es la equivalencia española más natural y fiel al movimiento del verbo.
- source_word: גּוֹאֵל
  english_pob_choice: a Redeemer
  chosen_spanish: un Redentor
  alternatives_spanish:
  - un rescatador
  - uno que redime
  lexicon: HALOT
  rationale: «Redentor» preserva el peso teológico y relacional de גּוֹאֵל sin convertirlo en una explicación excesiva. Mantiene la apertura del texto respecto de la identidad precisa del agente.
- source_word: וּלְשָׁבֵי
  english_pob_choice: and to those ... who turn
  chosen_spanish: y a los que ... se apartan
  alternatives_spanish:
  - y a los arrepentidos
  - y a los que vuelven
  lexicon: HALOT
  rationale: El participio de שוב expresa un acto de volver/ apartarse. En español, «se apartan» conserva la fuerza verbal del giro moral y evita fijar de antemano una formulación más teológica que el hebreo no exige aquí.
- source_word: פֶשַׁע
  english_pob_choice: transgression
  chosen_spanish: la transgresión
  alternatives_spanish:
  - la rebelión
  - el pecado
  lexicon: HALOT
  rationale: «Transgresión» reproduce bien el matiz de פשע como quebranto de un límite o autoridad legítima y armoniza con el sustantivo abstracto del hebreo.
- source_word: בְּיַעֲקֹב
  english_pob_choice: in Jacob
  chosen_spanish: en Jacob
  alternatives_spanish:
  - entre Jacob
  - dentro de Jacob
  lexicon: HALOT
  rationale: La preposición ב marca esfera/localización dentro del pueblo de Jacob. «En Jacob» mantiene la expresión hebrea y su referencia comunitaria/covenantal.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se rinde naturalmente con «declara». Se conserva «Yahvé» según la terminología española del proyecto para יְהוָה.
theological_decisions:
- issue: Identidad del Redentor
  english_pob_reading: Render גּוֹאֵל as 'a Redeemer' without explicitly identifying the figure in the main text.
  chosen_spanish_reading: «un Redentor» sin identificar explícitamente al personaje en el texto principal.
  alternative_spanish_readings:
  - «el Redentor»
  - «el Mesías»
  rationale: El hebreo nombra la función, no desarrolla la identidad. Mantener la designación funcional preserva la tensión teológica y permite que el texto siga abierto como en el original.
  doctrine_reference: Preservar la tensión teológica; no resolver el referente en la traducción principal.
- issue: Sentido de שָׁבֵי פֶשַׁע
  english_pob_reading: those in Jacob who turn from transgression
  chosen_spanish_reading: los que en Jacob se apartan de la transgresión
  alternative_spanish_readings:
  - los arrepentidos en Jacob
  - los que vuelven de la rebelión
  rationale: El hebreo describe un volver/apartarse respecto de la transgresión. «Se apartan» conserva el dinamismo verbal y evita importar una terminología doctrinal más cerrada que la del texto.
  doctrine_reference: Equivalencia óptima; no añadir categorías no explícitas en el hebreo.
translation_notes:
  revision_awareness: Se revisó el expediente inglés y no hay cambios aplicados en la última pasada; la versión española sigue de cerca las decisiones auditadas, sin resolver indebidamente la identidad del Redentor ni suavizar el participio de שוב.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la convención del proyecto.
  - Se usa «Redentor» por su carga bíblica y covenantal, no «Mesías», porque el hebreo no lo explicita.
  - «Transgresión» conserva el peso jurídico-moral de פשע.
  - La sintaxis española conserva el paralelismo del hebreo sin forzar un orden artificial.
