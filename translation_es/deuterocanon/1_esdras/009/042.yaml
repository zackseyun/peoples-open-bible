translation:
  language: es
  text: Y se puso en pie Esdras, el sacerdote y lector de la ley, sobre la plataforma[a] de madera que había sido construida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo en Nehemías 8:4 dice «Esdras el escriba» y añade que la estructura de madera se hizo «para el asunto» o «para la ocasión». El griego de 1 Esdras, en cambio, dice «el sacerdote y lector de la ley» y solo afirma que había sido construida.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστη
  english_pob_choice: stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - estuvo de pie
  - se alzó
  lexicon: BDAG
  rationale: El aoristo narrativo de ἵστημι expresa la acción de quedar en posición de pie. En español, "se puso en pie" suena natural y mantiene el sentido dinámico sin perder la narración puntual.
- source_word: Ἔσρας
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: Transliteración estándar bíblica en español
  rationale: En español bíblico la forma establecida y más reconocible es "Esdras". Conserva la referencia al mismo personaje sin introducir una grafía menos habitual.
- source_word: ὁ ἱερεύς
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ministro
  - el presbítero
  lexicon: BDAG
  rationale: El griego identifica explícitamente a Esdras como ἱερεύς. "Sacerdote" es la equivalencia directa y evita diluir el dato sacerdotal del texto fuente.
- source_word: ἀναγνώστης τοῦ νόμου
  english_pob_choice: reader of the law
  chosen_spanish: lector de la ley
  alternatives_spanish:
  - lector de la ley pública
  - quien leía la ley
  - escriba de la ley
  lexicon: BDAG
  rationale: ἀναγνώστης significa literalmente "lector" o lector público. "Lector de la ley" preserva la especificidad del griego y mantiene la tensión con el paralelo hebreo, que dice "escriba", sin armonizarlo en el texto principal.
- source_word: ἐπὶ τοῦ ξυλίνου βήματος
  english_pob_choice: on the wooden platform
  chosen_spanish: sobre el estrado de madera
  alternatives_spanish:
  - sobre la plataforma de madera
  - en el estrado de madera
  lexicon: BDAG
  rationale: βῆμα puede referirse a un estrado, plataforma o dais elevado. "Estrado" comunica bien la idea de una estructura elevada para la lectura pública y es natural en español, mientras "de madera" conserva ξύλινος.
- source_word: τοῦ κατασκευασθέντος
  english_pob_choice: that had been constructed
  chosen_spanish: que había sido construido
  alternatives_spanish:
  - que había sido hecho
  - preparado
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica una acción previa ya completada. "Había sido construido" expresa claramente el estado resultante de la estructura sin añadir más de lo que dice el griego.
theological_decisions:
- issue: Relación entre el título sacerdotal del griego y el "escriba" del paralelo hebreo
  english_pob_reading: The Greek of 1 Esdras instead reads 'the priest and reader of the law' and simply says it had been constructed.
  chosen_spanish_reading: 'El texto principal sigue al griego: "el sacerdote y lector de la ley"; el paralelo hebreo queda implícito en la nota.'
  alternative_spanish_readings:
  - el sacerdote y escriba de la ley
  - el sacerdote, es decir, el escriba
  rationale: No se debe borrar la diferencia textual entre 1 Esdras y Nehemías. El griego presenta a Esdras como sacerdote y lector, mientras el paralelo hebreo lo llama escriba. La traducción principal conserva el testimonio griego y deja la harmonización para la nota.
  doctrine_reference: Crítica textual / prioridad del testimonio griego en 1 Esdras frente al paralelo hebreo
translation_notes:
  revision_awareness: 'Se mantuvo la lectura griega como texto base, siguiendo el audit trail en inglés: ἔστη se vertió con una narración puntual; ἀναγνώστης se conservó como "lector" y no se armonizó con el hebreo; βῆμα se entendió como estrado/plataforma de uso público; y τοῦ κατασκευασθέντος se expresó con una construcción pasiva resultativa en español. No se aplicaron revisiones previas porque el informe de revisión indica acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa "Esdras" como forma bíblica estándar en español.
  - Se evita "SEÑOR" o términos de sustitución, ya que no aparece el nombre divino en este versículo.
  - '"Sacerdote" y "lector de la ley" preservan el doble dato del griego sin absorber la variante hebrea.'
  - '"Estrado de madera" mantiene la imagen física de una plataforma elevada apta para lectura pública.'
