translation:
  language: es
  text: y de nuestra disciplina bajo la ley de Dios. Por tanto[a], habiendo quedado así establecido el afecto fraternal, compartiendo un mismo sentir, los siete hermanos se unieron—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego provisto para este versículo termina a mitad de palabra (συνπα-). Por eso la última expresión se vierte provisionalmente y se marca con raya final para reflejar el testimonio incompleto.
    reason: textual_variant
lexical_decisions:
- source_word: ἀσκήσεως
  english_pob_choice: discipline
  chosen_spanish: ejercicio
  alternatives_spanish:
  - disciplina
  - práctica
  - entrenamiento
  lexicon: LSJ
  rationale: ἄσκησις/ἀσκήσεως puede expresar práctica entrenada o ejercicio disciplinado. En español, «ejercicio» conserva la idea de práctica continuada sin cargar de antemano el matiz ascético técnico; la frase «de nuestro ejercicio bajo la ley de Dios» mantiene el marco moral y normativo.
- source_word: ἐν νόμῳ θεοῦ
  english_pob_choice: under the law of God
  chosen_spanish: bajo la ley de Dios
  alternatives_spanish:
  - en la ley de Dios
  - según la ley de Dios
  - dentro de la ley de Dios
  lexicon: LSJ
  rationale: La preposición y el sustantivo sitúan la acción en el ámbito y la autoridad de la ley divina. «Bajo la ley de Dios» comunica mejor esa sujeción que una mera locución locativa.
- source_word: φιλαδελφίας
  english_pob_choice: brotherly affection
  chosen_spanish: fraternidad
  alternatives_spanish:
  - afecto fraternal
  - amor fraternal
  - amor de hermanos
  lexicon: LSJ
  rationale: El término señala afecto entre hermanos. «Fraternidad» es breve y natural en español, y puede abarcar el vínculo y el afecto fraterno; la continuidad con «los siete hermanos» mantiene el sentido familiar.
- source_word: συμπαθούσης
  english_pob_choice: sharing sympathy
  chosen_spanish: compartiendo simpatía
  alternatives_spanish:
  - compartiendo el sentir
  - con mutua compasión
  - simpatizando
  lexicon: LSJ
  rationale: El participio expresa sentir con otro, simpatía compartida. «Compartiendo simpatía» conserva esa reciprocidad sin convertirla en un comentario explicativo más amplio.
- source_word: καθεστηκυίας
  english_pob_choice: had thus been established
  chosen_spanish: habiendo quedado así establecida
  alternatives_spanish:
  - había quedado establecida
  - estando así establecida
  - había sido establecida
  lexicon: LSJ
  rationale: El participio perfecto indica un estado ya asentado. «Habiendo quedado así establecida» transmite ese estado resultante con una forma natural en español.
- source_word: οἱ ἑπτὰ ἀδελφοὶ
  english_pob_choice: the seven brothers
  chosen_spanish: los siete hermanos
  alternatives_spanish:
  - los siete siblings
  - los siete varones
  lexicon: LSJ
  rationale: El griego es explícitamente masculino y alude a los siete hermanos del relato. Se conserva el género del original.
- source_word: συνπα-
  english_pob_choice: joined together—
  chosen_spanish: se unieron—
  alternatives_spanish:
  - se juntaron—
  - quedaron unidos—
  - sufrieron juntos—
  lexicon: LSJ
  rationale: El texto griego termina truncado con el prefijo συνπα-, que sugiere una formación compuesta con sentido de unión o acción conjunta. «Se unieron—» es una solución provisional prudente, con la raya final para reflejar la interrupción del testimonio.
theological_decisions:
- issue: Lenguaje fraterno masculino
  english_pob_reading: the seven brothers
  chosen_spanish_reading: los siete hermanos
  alternative_spanish_readings:
  - los siete hermanos y hermanas
  - los siete miembros de la familia
  rationale: El griego usa ἀδελφοί en masculino plural y, por el contexto narrativo, designa a los siete hermanos varones. No se neutraliza el género donde el texto es explícito.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tratamiento honesto del final truncado del testimonio griego
  english_pob_reading: Retain an em dash after a cautious rendering of the truncated compound
  chosen_spanish_reading: Conservar una raya final tras una traducción cautelosa del compuesto truncado
  alternative_spanish_readings:
  - dejar puntos suspensivos
  - reconstruir el verbo completo
  rationale: El testimonio griego proporcionado termina a mitad de palabra. La traducción debe señalar esa incompletitud sin reconstruir de manera no auditable el final perdido.
  doctrine_reference: PHILOSOPHY.md transparency principle
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que separa con claridad la idea de establecimiento ya consumado de la de simpatía compartida. En español se mantuvo esa distinción con «habiendo quedado así establecida» y «compartiendo simpatía», y se evitó unir «simpatía» a «establecida».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se prefirió «ley de Dios» y no una formulación eclesial tradicional para preservar el marco jurídico del texto.
  - La raya final reproduce honestamente la interrupción del testimonio griego.
  - «Fraternidad» se usa aquí en sentido de vínculo entre hermanos, no como término eclesial abstracto.
