  lexicon: BDAG
  rationale: 3:22의 πίστις Ἰησοῦ Χριστοῦ와 평행한 모호성을 보존하기 위해 「예수의 믿음에 속한 자」 형식을 택한다.
theological_decisions:
- issue: 3:26 「의로우시면서 의롭다 하시는 분」 — 칭의의 핵심 명제
  chosen_reading: 그분 자신이 의로우시면서 예수의 믿음에 속한 자를 의롭다 하시는 분이 되시려 함
  alternative_readings:
  - 의로우시며 동시에 의롭다고 인정하시는 분
  rationale: 바울의 칭의론의 정점이 되는 명제(δίκαιον καὶ δικαιοῦντα)를 한국어 「의로우시면서 ... 의롭다 하시는」으로 동족 어원의 무게와 동시성을 모두 보존한다.
  doctrine_reference: DOCTRINE.md §1 — preserve true and powerful meaning at central nodes
