translation:
  language: es
  text: Tiro se construyó una fortaleza[a], y amontonó plata como polvo, y oro[b] como el lodo de las calles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fortificación' o 'baluarte' para 'fortaleza'. El hebreo מָצוֹר puede referirse a un lugar fortificado o a obras defensivas.
    reason: lexical_alternative
  - marker: b
    text: O 'oro fino'. El hebreo חָרוּץ puede referirse, en algunos contextos, a oro refinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - Tyr
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español bíblico y actual, 'Tiro' es la forma estándar y clara, equivalente al inglés 'Tyre'.
- source_word: וַתִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  - levantó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada. 'Edificó' conserva el tono elevado y poético del versículo sin perder el sentido de construir una obra defensiva.
- source_word: מָצוֹר
  english_pob_choice: fortress
  chosen_spanish: fortaleza
  alternatives_spanish:
  - fortaleza
  - baluarte
  - plaza fuerte
  - fortín
  lexicon: HALOT
  rationale: El término puede denotar un lugar fortificado o defensas de sitio. 'Fortaleza' comunica bien la idea de una posición defensiva estable; en nota se conserva la alternativa 'fortificación/plaza fuerte' implícita en el matiz del hebreo.
- source_word: לָהּ
  english_pob_choice: herself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí
  - se
  - a sí misma
  lexicon: HALOT
  rationale: El sufijo femenino singular aplica a Tiro personificada. En español, 'para sí' transmite el valor reflexivo sin forzar una construcción poco natural con 'sí misma'.
- source_word: וַתִּצְבָּר
  english_pob_choice: piled up
  chosen_spanish: amontonó
  alternatives_spanish:
  - amontonó
  - acumuló
  - apiló
  - amansó
  lexicon: HALOT
  rationale: El verbo expresa acumulación en gran cantidad. 'Amontonó' conserva la imagen concreta y el tono poético del hebreo, semejante al inglés 'piled up'.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - dinero
  - argent
  lexicon: HALOT
  rationale: Aquí el metal literal encaja con el paralelismo con 'oro'. 'Plata' es el equivalente natural en español y evita diluir la imagen material en 'dinero'.
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo
  - como el polvo
  lexicon: HALOT
  rationale: La comparación de abundancia se preserva de manera directa. 'Como polvo' es natural en español y mantiene la brevedad poética del hebreo.
- source_word: חָרוּץ
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro
  - oro fino
  - oro refinado
  lexicon: HALOT
  rationale: Aunque el término puede tener matices de oro refinado, el contexto inmediato contrasta con plata y polvo; 'oro' mantiene la lectura principal sin sobreinterpretar.
- source_word: כְּטִיט חוּצוֹת
  english_pob_choice: like the mud of the streets
  chosen_spanish: como el lodo de las calles
  alternatives_spanish:
  - como el lodo de las calles
  - como el barro de las calles
  - como la mugre de las calles
  lexicon: HALOT
  rationale: '''Lodo'' comunica bien la sustancia embarrada y conserva el paralelismo con la abundancia de oro. ''Calles'' reproduce el plural hebreo y el valor público de la imagen.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: Tyre/Tiro como nombre propio, מָצוֹר como término de defensa urbana, el valor figurado de abundancia en ''como polvo'' y la posibilidad léxica de חָרוּץ como ''oro fino''. La redacción española mantiene el paralelismo poético y la personificación femenina implícita en el sufijo de לָהּ.'
  spanish_consistency_notes:
  - Se usó 'Tiro' como forma bíblica usual del topónimo.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque no hay Tetragrámaton en este versículo.
  - Se mantuvo la imagen material de plata y oro, no 'dinero', para respetar el paralelismo.
  - '''Lodo de las calles'' conserva el plural hebreo חוּצוֹת y la imagen urbana pública.'
