translation:
  language: es
  text: '¿Pues por qué nuestro sapientísimo padre Jacob culpa[a] a los que estaban con Simeón y Leví por haber degollado a los siquemitas en masa[b], no con razón[c], diciendo: «Maldito sea su furor»[d]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reprocha»; el verbo griego expresa censura o reprensión.
    reason: lexical_alternative
  - marker: b
    text: O «como nación» o «colectivamente»; el adverbio griego destaca que fueron atacados como un solo pueblo o grupo étnico.
    reason: lexical_alternative
  - marker: c
    text: O «sin razón», si la frase griega μὴ λογισμῷ se toma de forma más idiomática; en contexto, el sentido es que la censura de Jacob estaba justificada, no que fuera irracional.
    reason: lexical_alternative
  - marker: d
    text: Eco de Génesis 49:7.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπεὶ διὰ τί
  english_pob_choice: For why
  chosen_spanish: ¿Pues por qué
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué, pues?
  lexicon: LSJ
  rationale: La partícula inferencial ἐπεὶ y la pregunta διὰ τί se conservan bien con «pues por qué», que mantiene el enlace lógico con el contexto y el tono retórico de la pregunta.
- source_word: ὁ πάνσοφος ἡμῶν πατὴρ Ἰακώβ
  english_pob_choice: our all-wise father Jacob
  chosen_spanish: nuestro padre, el todo sabio, Jacob
  alternatives_spanish:
  - nuestro padre Jacob, el todísimo sabio
  - nuestro padre Jacob, el muy sabio
  lexicon: LSJ
  rationale: πανσοφος expresa una sabiduría superlativa o absoluta; «todo sabio» preserva ese matiz elevado mejor que un simple «muy sabio». Se mantiene «nuestro padre» para el vínculo comunitario del griego.
- source_word: τοὺς περὶ Συμεὼν καὶ Λευεὶν
  english_pob_choice: those around Simeon and Levi
  chosen_spanish: los de alrededor de Simeón y Leví
  alternatives_spanish:
  - los que estaban con Simeón y Leví
  - el grupo de Simeón y Leví
  lexicon: LSJ
  rationale: τοὺς περὶ + nombre designa a los asociados o al grupo en torno a ellos. «Los de alrededor de» conserva esa relación sin fijar indebidamente la composición exacta del grupo.
- source_word: αἰτιᾶται
  english_pob_choice: blame
  chosen_spanish: culpa
  alternatives_spanish:
  - reprocha
  - censura
  - acusa
  lexicon: LSJ
  rationale: El verbo expresa reproche o censura; «culpa» es natural en español y comunica bien la idea de reprensión dirigida por Jacob.
- source_word: μὴ λογισμῷ
  english_pob_choice: not with reason
  chosen_spanish: no con razón
  alternatives_spanish:
  - sin razón
  - no racionalmente
  - no por juicio
  lexicon: LSJ
  rationale: La dativa λογισμῷ remite al juicio razonado. «No con razón» conserva la concisión del griego y, en este contexto, puede leerse como una afirmación de que la censura de Jacob era razonable, no irracional.
- source_word: τοὺς Σικιμίτας
  english_pob_choice: the Shechemites
  chosen_spanish: los siquemitas
  alternatives_spanish:
  - los habitantes de Siquem
  - la gente de Siquem
  lexicon: LSJ
  rationale: Se traduce el etnónimo con el equivalente habitual en español bíblico, «siquemitas».
- source_word: ἐθνηδόν
  english_pob_choice: as a nation
  chosen_spanish: como nación
  alternatives_spanish:
  - en masa
  - colectivamente
  - como pueblo
  lexicon: LSJ
  rationale: El adverbio indica tratamiento del grupo en su identidad colectiva; «como nación» preserva ese alcance mejor que una mera nota de cantidad.
- source_word: ἀποσφάξαντας
  english_pob_choice: slaughtering
  chosen_spanish: haber degollado
  alternatives_spanish:
  - haber matado
  - haber sacrificado
  - haber slaughtered
  lexicon: LSJ
  rationale: El compuesto verbal es fuerte y violento. «Degollar» transmite mejor la crudeza del acto que un «matar» más general.
- source_word: Ἐπικατάρατος ὁ θυμὸς αὐτῶν
  english_pob_choice: Cursed be their anger
  chosen_spanish: «Maldito sea su furor»
  alternatives_spanish:
  - «Maldita sea su ira»
  - «Sea maldito su furor»
  - «Cursed be their anger»
  lexicon: LSJ
  rationale: La cita eco de Génesis 49:7 admite «ira» o «furor». Se elige «furor» para reflejar θυμός como impulso pasional y violento, coherente con 4 Macabeos.
theological_decisions:
- issue: Relación entre la censura de Jacob y la frase μὴ λογισμῷ
  english_pob_reading: Jacob blames them with good reason; the phrase is rendered literally as 'not with reason' in close connection to the participial clause, preserving the compressed Greek rather than smoothing into an interpretive paraphrase.
  chosen_spanish_reading: Jacob los culpa con razón; la frase se mantiene literalmente como «no con razón», dejando la tensión sintáctica sin resolver del todo en el cuerpo del texto.
  alternative_spanish_readings:
  - Jacob los culpa sin razón
  - Jacob no los culpa racionalmente
  - Jacob los reprende con justicia
  rationale: La sintaxis griega es comprimida y algo difícil. En el contexto amplio de 4 Macabeos, la censura de Jacob es justificable; por eso se conserva la formulación cercana al griego y se evita convertirla en una paráfrasis que borre la tensión textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Eco de Génesis 49:7 en la maldición sobre el furor
  english_pob_reading: The quotation echoes Genesis 49:7.
  chosen_spanish_reading: La cita se conserva como eco de Génesis 49:7, usando una formulación muy cercana al texto bíblico conocido en español.
  alternative_spanish_readings:
  - Adaptar la cita a una forma más tradicional
  - Explicitar la referencia en el texto principal
  rationale: Mantener la resonancia intertextual ayuda a que el lector reconozca la alusión sin perder la fuerza retórica del pasaje.
  doctrine_reference: DOCTRINE.md §Intertextuality 2
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés, que prefirió «around Simeon and Levi» para τοὺς περὶ y una solución más natural para ἐθνηδόν. En español se reflejó esa misma lectura con «los de alrededor de Simeón y Leví» y «como nación», manteniendo además la tensión de μὴ λογισμῷ sin despejarla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca en el contexto POB; aquí no aplica.
  - Se preserva el tono retórico y elevado de 4 Macabeos con sintaxis relativamente directa.
  - Se usa «furor» para θυμός en la cita, por su carga pasional, en vez de suavizarlo a un término más genérico.
