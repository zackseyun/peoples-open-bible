revisions:
- from: Pero si el sacerdote la examina[a], y he aquí que no hay en ella pelo blanco, y no está más hundida que la piel, sino que está oscura, entonces el sacerdote lo aislará[b] por siete días.
  to: Pero si el sacerdote la examina[a], y he aquí que no hay en ella pelo blanco, y no está más hundida que la piel, y está tenue, entonces el sacerdote lo aislará[b] por siete días.
  rationale: Se reemplaza «está oscura» por «está tenue» para reflejar mejor כֵהָה como apariencia atenuada o apagada, no como color oscuro. También se ajusta el conector a «y está tenue» para una coordinación más natural y fiel al hebreo.
