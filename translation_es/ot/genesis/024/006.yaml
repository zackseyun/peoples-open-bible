    issue: '''hasta allí'' añade un matiz no presente en שָׁמָּה'
    rationale: שָׁמָּה es un adverbio direccional 'allí / allá / a ese lugar', no necesariamente 'hasta allí'. En español, 'hasta' puede sugerir límite o trayecto, lo cual no está exigido por el texto fuente ni por el POB inglés.
  - severity: low
    issue: La combinación 'llevar de vuelta ... hasta allí' suena menos natural
    rationale: Aunque comprensible, la secuencia resulta pesada en español. 'Llevar a mi hijo de vuelta allí' mantiene mejor la fluidez y conserva la fuerza causativa documentada.
