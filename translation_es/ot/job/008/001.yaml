translation:
  language: es
  text: Entonces Bildad el suhita respondió y dijo:[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contestó».'
    reason: lexical_alternative
  - marker: b
    text: «suhita» reproduce el gentilicio hebreo; señala pertenencia u origen asociado con Shuah.
