translation:
  language: es
  text: 'Y murió toda carne que se movía sobre la tierra: aves[a], ganado, animales salvajes, todo ser que pulula sobre la tierra, y toda la humanidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «todo el género humano». Hebreo: «todo el adam», es decir, la raza humana considerada en conjunto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְוַע
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - pereció
  - expiró
  lexicon: HALOT
  rationale: El verbo גוע comunica aquí la muerte real del conjunto descrito. En español, «murió» es la equivalencia más directa y natural; «pereció» puede sonar más interpretativo y «expiró» resulta más arcaico.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser viviente
  - todos los seres vivientes
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo con «carne», porque en el contexto del diluvio nombra la vida animal y humana en sentido amplio. «Toda carne» mantiene la transparencia formal y la resonancia bíblica del original.
- source_word: הָרֹמֵשׂ
  english_pob_choice: that moved
  chosen_spanish: que se movía
  alternatives_spanish:
  - que se arrastraba
  - que se movía de un lado a otro
  lexicon: HALOT
  rationale: El participio רמש puede abarcar moverse, reptar o pulular. Como la lista incluye aves, ganado y animales salvajes, «que se movía» preserva el alcance amplio sin restringirlo indebidamente a criaturas que reptan.
- source_word: בָּעוֹף
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves voladoras
  lexicon: HALOT
  rationale: «Aves» es un término natural en español y cubre el campo semántico de עוֹף en esta enumeración. «Pájaros» puede sonar más coloquial y menos abarcador.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales domésticos
  - bestias de carga
  lexicon: HALOT
  rationale: בְּהֵמָה aquí designa animales domesticados. «Ganado» expresa bien la categoría en español bíblico y moderno, sin volver al calco duro de «animales de rebaño».
- source_word: וּבַחַיָּה
  english_pob_choice: wild animals
  chosen_spanish: animales salvajes
  alternatives_spanish:
  - bestias
  - animales del campo
  lexicon: HALOT
  rationale: En contraste con el ganado, חַיָּה nombra animales no domesticados. «Animales salvajes» comunica con claridad la distinción de categorías en español actual.
- source_word: וּבְכָל הַשֶּׁרֶץ הַשֹּׁרֵץ
  english_pob_choice: every swarming thing that swarms
  chosen_spanish: todo ser que se arrastra y se multiplica
  alternatives_spanish:
  - todo ser que pulula y se arrastra
  - todo ser que repta y se multiplica
  lexicon: HALOT
  rationale: El hebreo repite la raíz para crear énfasis y juego léxico. En español, «se arrastra y se multiplica» intenta conservar tanto la imagen de criaturas pequeñas y móviles como la repetición intensificadora, sin reducir el sentido a una sola especie.
- source_word: וְכֹל הָאָדָם
  english_pob_choice: and all mankind
  chosen_spanish: y todo ser humano
  alternatives_spanish:
  - y toda la humanidad
  - y todo hombre
  lexicon: HALOT
  rationale: אָדָם se usa aquí colectivamente para la especie humana. «Todo ser humano» expresa el valor genérico sin implicar varón individual y mantiene el registro solemne del pasaje.
theological_decisions:
- issue: Sentido colectivo de הָאָדָם
  english_pob_reading: all mankind
  chosen_spanish_reading: todo ser humano
  alternative_spanish_readings:
  - toda la humanidad
  - todo hombre
  rationale: El hebreo nombra a la humanidad como conjunto, no a un varón particular. La opción elegida preserva ese alcance colectivo y evita una lectura restrictiva de género.
  doctrine_reference: 'DOCTRINE.md: términos en disputa — אָדָם; filosofía de traducción §4'
- issue: Distinción entre categorías de criaturas en el diluvio
  english_pob_reading: birds, livestock, wild animals, every swarming thing
  chosen_spanish_reading: aves, ganado, animales salvajes, todo ser que se arrastra y se multiplica
  alternative_spanish_readings:
  - pájaros, animales domésticos, fieras, todo ser que pulula
  rationale: La enumeración hebrea distingue clases de vida terrestre. La traducción conserva esa progresión y evita uniformarla con un solo término genérico.
  doctrine_reference: Génesis 7:21; consistencia léxica de la lista de criaturas
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el control inglés POB. No se requirieron revisiones textuales adicionales; se mantuvo la lectura colectiva de אָדָם y la enumeración de criaturas con distinciones léxicas claras.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como forma normal solo cuando el Tetragrámaton aparezca explícitamente; este versículo no lo contiene.
  - Se mantuvo «carne» para בָּשָׂר por transparencia idiomática bíblica, no como referencia exclusiva a carne humana.
  - La secuencia «se arrastra y se multiplica» busca reflejar la repetición hebrea sin sonar excesivamente técnica en español.
