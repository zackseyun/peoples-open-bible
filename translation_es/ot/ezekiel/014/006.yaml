  text: לָ/כֵ֞ן אֱמֹ֣ר אֶל בֵּ֣ית יִשְׂרָאֵ֗ל כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה שׁ֣וּבוּ וְ/הָשִׁ֔יבוּ מֵ/עַ֖ל גִּלּֽוּלֵי/כֶ֑ם וּ/מֵ/עַ֥ל כָּל תּוֹעֲבֹתֵי/כֶ֖ם הָשִׁ֥יבוּ פְנֵי/כֶֽם׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/014/006.yaml
  text: 'Therefore say to the house of Israel[a], ‘Thus says the Lord GOD: Turn back, and turn away from your idols[b], and turn your faces away from all your abominations.’'
  footnotes:
  - marker: a
    text: Or 'Repent, and turn away from your idols.' The Hebrew verb שׁוּב can carry the sense of returning or repenting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה, combining the title 'Lord' with the divine name YHWH.
    reason: cultural_note
