revisions:
- from: '¡Mira![a] de su boca brotan palabras como espadas; sobre sus labios hay espadas, porque dicen[b]: «¿Quién oye?»'
  to: '¡Mira![a], brotan de sus bocas; hay espadas sobre sus labios, porque dicen[b]: «¿Quién oye?»'
  rationale: La revisión elimina la adición interpretativa «palabras como espadas», restaura la distribución correcta de las imágenes del hebreo, y ajusta el plural a «sus bocas» para mayor fidelidad y naturalidad. Se conservan la pregunta abierta y la metáfora de las espadas en los labios.
