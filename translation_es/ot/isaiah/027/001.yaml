  glossary_alignment: 'Alinea correctamente con la terminología del proyecto: יְהוָה -> ''Yahvé''; לִוְיָתָן -> ''Leviatán''; הַתַּנִּין -> ''dragón''; no introduce ''SEÑOR'' ni resuelve alegóricamente la imagen. No hay conflictos doctrinales ni terminológicos mayores.'
