translation:
  language: es
  text: Porque nadie tomará botín[a] de manos de un hombre poderoso[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojos» en lugar de «botín».
    reason: lexical_alternative
  - marker: b
    text: O «un hombre fuerte».
    reason: lexical_alternative
  - marker: c
