translation:
  language: es
  text: No lo cuentes ni al amigo ni al enemigo[a], y si no es pecado para ti, no lo reveles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad más literal sería: «con amigo y con enemigo no cuentes; y si no es pecado para ti, no lo reveles». El griego es muy conciso; el texto principal comunica el sentido probable con mayor naturalidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν φίλῳ καὶ ἐν ἐχθρῷ
  english_pob_choice: to friend or foe
  chosen_spanish: ni al amigo ni al enemigo
  alternatives_spanish:
  - al amigo o al enemigo
  - a amigo y enemigo
  - con amigo y con enemigo
  lexicon: LSJ
  rationale: La construcción griega con dativos en paralelo señala las personas ante quienes no debe divulgarse algo. En español, «ni al amigo ni al enemigo» conserva el contraste proverbial y suena natural, sin perder el sentido distributivo de la advertencia.
- source_word: μὴ διηγοῦ
  english_pob_choice: Do not tell it
  chosen_spanish: No lo cuentes
  alternatives_spanish:
  - No lo relates
  - No lo refieras
  - No lo narres
  lexicon: BDAG
  rationale: διηγοῦ implica contar o relatar algo con cierta extensión. «Contarlo» es la forma más natural y breve en español para expresar esa prohibición, manteniendo el objeto implícito que en griego se sobreentiende.
- source_word: καὶ εἰ μή ἐστίν σοι ἁμαρτία
  english_pob_choice: and if it is not a sin for you
  chosen_spanish: y si no es pecado para ti
  alternatives_spanish:
  - y si no es pecado para ti,
  - y si para ti no hay pecado
  - y salvo que sea pecado para ti
  lexicon: LSJ
  rationale: La cláusula griega es elíptica. Siguiendo la revisión inglesa más reciente, «si no es pecado para ti» conserva con más fidelidad la forma condicional y deja abierta la tensión ética del pasaje, sin forzar una explicación interpretativa excesiva.
- source_word: μὴ ἀποκάλυπτε
  english_pob_choice: do not reveal it
  chosen_spanish: no lo reveles
  alternatives_spanish:
  - no lo descubras
  - no lo divulges
  - no lo des a conocer
  lexicon: BDAG
  rationale: ἀποκαλύπτω aquí significa hacer conocido lo oculto. «Revelar» reproduce bien ese matiz en español y corresponde al paralelo con «contarlo».
theological_decisions:
- issue: Fuerza de la cláusula condicional final
  english_pob_reading: and if it is not a sin for you, do not reveal it
  chosen_spanish_reading: y si no es pecado para ti, no lo reveles
  alternative_spanish_readings:
  - y a menos que sea pecado para ti, no lo reveles
  - y si no te es pecado, no lo reveles
  rationale: 'La revisión inglesa optó por una formulación condicional más cercana al griego y menos interpretativa que una lectura con «a menos que». En español conviene preservar esa misma apertura: el texto prohíbe divulgar, pero deja implícita la excepción donde callar pudiera ser pecado.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente en la cláusula final, evitando la formulación interpretativa «a menos que» y conservando la condición más literal «si no es pecado para ti». También he mantenido el paralelismo proverbial de «amigo/enemigo» con una forma idiomática en español.
  spanish_consistency_notes:
  - Usé «pecado» para ἁμαρτία en coherencia con el valor moral-jurídico del contexto.
  - Mantuve «revelar» para ἀποκαλύπτω, evitando «descubrir» porque en español podría sonar ambiguo o menos explícito.
  - La partícula negativa se expresó con «ni... ni...» para reproducir el doble contraste del griego sin alargar innecesariamente la frase.
