  lexicon: BDAG
  rationale: φυλάσσομαι(중간태)는 「자신을 지킴·경계함」. 1:12, 1:14의 「지키다」(φυλάσσω)와 동일 어근이나 의미가 다르므로 「조심하다」로 자연스럽게 옮긴다.
