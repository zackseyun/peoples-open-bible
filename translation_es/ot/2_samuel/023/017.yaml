translation:
  language: es
  text: 'Y dijo: «¡Lejos de mí, Yahvé, hacer esto! ¿No es la sangre de los hombres que fueron[a] a riesgo de sus vidas?» Y no quiso beberla[b]. Estas cosas hicieron los tres valientes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «con sus vidas»; la expresión indica que fueron en peligro de muerte.'
    reason: lexical_alternative
  - marker: b
    text: 'Lectura tradicional: «¿No es esta la sangre de los hombres...?». David trata el agua como si fuera su sangre porque la obtuvieron a riesgo de muerte.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָלִילָה לִּי יְהוָה
  english_pob_choice: Far be it from me, O Yahweh
  chosen_spanish: ¡Lejos de mí, Yahvé, hacer esto!
  alternatives_spanish:
  - ¡Lejos de mí, oh Yahvé, hacer esto!
  - ¡Yahvé me libre de hacer esto!
  lexicon: HALOT
  rationale: חָלִילָה expresa repulsión o rechazo enfático; en español, «Lejos de mí» comunica bien esa negativa moral intensa. Se mantiene Yahvé como nombre propio divino, sin reemplazarlo por un título genérico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino «Yahvé» según la convención del proyecto, preservando el nombre personal de Dios y no una sustitución titulada.
- source_word: מֵעֲשֹׂתִי זֹאת
  english_pob_choice: that I should do this
  chosen_spanish: hacer esto
  alternatives_spanish:
  - que yo hiciera esto
  - de hacer esto
  lexicon: HALOT
  rationale: El hebreo expresa repudio a realizar la acción; en español, la construcción infinitiva «hacer esto» dentro de la exclamación reproduce con naturalidad esa negativa moral sin añadir matices no pedidos por el texto.
- source_word: הֲדַם
  english_pob_choice: Is it not the blood
  chosen_spanish: ¿No es la sangre
  alternatives_spanish:
  - ¿No es sangre
  - ¿Acaso no es la sangre
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica. «Sangre» mantiene el efecto semántico de tratar el agua como si equivaliera a la sangre de esos hombres por el peligro mortal asumido.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - esos hombres
  - los guerreros
  lexicon: HALOT
  rationale: La forma básica «los hombres» sigue de cerca el hebreo. «Guerreros» sería una interpretación más específica que el sustantivo por sí solo no exige.
- source_word: הַהֹלְכִים בְּנַפְשׁוֹתָם
  english_pob_choice: who went at the risk of their lives
  chosen_spanish: que fueron con riesgo de su vida
  alternatives_spanish:
  - que fueron arriesgando su vida
  - que caminaron con su vida en peligro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «que iban con sus vidas», idiomático para peligro mortal. «Con riesgo de su vida» comunica esa fuerza en español sin perder la tensión lexical de vida expuesta al peligro.
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  english_pob_choice: So he was not willing to drink it
  chosen_spanish: Y no quiso beberla
  alternatives_spanish:
  - Y no estuvo dispuesto a beberla
  - Y se negó a beberla
  lexicon: HALOT
  rationale: אָבָה indica no querer o no consentir. «No quiso» es una forma natural y fiel; el pronombre femenino singular en español concuerda con «la» para el agua, aunque el hebreo usa un sufijo plural referido al líquido.
- source_word: אֵלֶּה עָשׂוּ
  english_pob_choice: These things ... did
  chosen_spanish: Estas cosas hicieron
  alternatives_spanish:
  - Estas cosas las hicieron
  - Eso hicieron
  lexicon: HALOT
  rationale: La fórmula de resumen se mantiene con el demostrativo «Estas cosas», que refleja la recapitulación enfática del hebreo.
- source_word: שְׁלֹשֶׁת הַגִּבֹּרִים
  english_pob_choice: the three mighty men
  chosen_spanish: los tres hombres valientes
  alternatives_spanish:
  - los tres valientes
  - los tres guerreros valientes
  lexicon: HALOT
  rationale: «Hombres valientes» transmite el valor militar de גִּבֹּרִים en este contexto narrativo. Se evita «mighty men» literal, que en español sería menos natural y no añade precisión.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene la política del proyecto de transliterar el nombre divino en vez de ocultarlo tras un título. «Yahvé» es la forma establecida en español dentro de este marco editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La imagen de la sangre aplicada al agua obtenida en peligro mortal
  english_pob_reading: 'Traditional rendering: “Is this not the blood of the men...?” David treats the water as if it were their blood because they obtained it at the risk of death.'
  chosen_spanish_reading: ¿No es la sangre de los hombres que fueron con riesgo de su vida?
  alternative_spanish_readings:
  - ¿No es esto la sangre de los hombres...?
  - ¿No es la sangre de esos hombres...?
  rationale: 'Se conserva la tensión interpretativa: el agua es tratada retóricamente como sangre por haber sido obtenida a riesgo de muerte. Esto evita suavizar la metáfora y mantiene el problema semántico que el texto quiere producir.'
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tension; do not erase metaphorical force'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto base y el audit trail inglés; no se requieren revisiones textuales adicionales. La principal decisión editorial es mantener la tensión metafórica de «sangre» y conservar el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió una sintaxis natural en español sin perder la pregunta retórica ni la metáfora de sangre.
  - «Hombres valientes» se usa como equivalente funcional de גִּבֹּרִים en este contexto narrativo militar.
