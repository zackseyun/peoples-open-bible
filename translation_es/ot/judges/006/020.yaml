translation:
  language: es
  text: 'Entonces el ángel de Dios le dijo[a]: «Toma la carne y los panes sin levadura, y colócalos sobre esta roca, y derrama el caldo». Y así lo hizo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Dios». El término hebreo puede significar tanto un mensajero humano como uno angélico; aquí el contexto favorece un enviado sobrenatural.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: the angel of God
  chosen_spanish: el ángel de Dios
  alternatives_spanish:
  - el mensajero de Dios
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘mensajero’ o ‘ángel’; en este contexto narrativo, la figura se presenta como un enviado sobrenatural. ‘Ángel’ conserva mejor ese peso teológico en español que ‘mensajero’, aunque esta última sigue siendo una alternativa lexicamente válida.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Recibe
  lexicon: HALOT
  rationale: El imperativo de לקח se expresa de manera directa con ‘toma’. Es la forma más natural y fiel en español para esta orden.
- source_word: הַבָּשָׂר
  english_pob_choice: the meat
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne asada
  - la comida
  lexicon: HALOT
  rationale: Aunque en contexto alimentario el inglés usa ‘meat’, en español ‘carne’ conserva el valor léxico básico de בשר sin forzar un giro más específico que el hebreo no exige.
- source_word: הַמַּצּוֹת
  english_pob_choice: the unleavened bread
  chosen_spanish: los panes sin levadura
  alternatives_spanish:
  - las tortas sin levadura
  - las matzot
  lexicon: HALOT
  rationale: מַצּוֹת designa panes o tortas sin levadura. ‘Panes sin levadura’ es claro, digno y comprensible; mantiene el plural y evita un término demasiado técnico.
- source_word: וְהַנַּח
  english_pob_choice: set them
  chosen_spanish: colócalos
  alternatives_spanish:
  - ponlos
  - déjalos
  lexicon: HALOT
  rationale: El hiphil de נוח aquí pide poner o colocar algo en un lugar. ‘Colócalos’ expresa bien la acción de disponer los elementos sobre la roca y suena natural en español bíblico contemporáneo.
- source_word: אֶל־הַסֶּלַע הַלָּז
  english_pob_choice: on this rock
  chosen_spanish: sobre esta roca
  alternatives_spanish:
  - en esta roca
  - hacia esta roca
  lexicon: HALOT
  rationale: Con הנח, el español idiomático prefiere ‘sobre’ para reflejar la disposición de los alimentos encima de la roca. הַלָּז se vierte como ‘esta’ para el valor demostrativo inmediato.
- source_word: הַמָּרַק
  english_pob_choice: the broth
  chosen_spanish: el caldo
  alternatives_spanish:
  - el caldo de cocción
  - el jugo
  lexicon: HALOT
  rationale: מָרָק denota un líquido de cocción o caldo. ‘Caldo’ es la opción natural en español y comunica bien el líquido que debe derramarse sin añadir precisión no presente en el hebreo.
- source_word: שְׁפֹוךְ
  english_pob_choice: pour out
  chosen_spanish: derrama
  alternatives_spanish:
  - vacía
  - vierte
  lexicon: HALOT
  rationale: El imperativo de שפך expresa vaciar o derramar un líquido. ‘Derrama’ transmite el gesto con naturalidad y fuerza en español; ‘vierte’ también sería posible, pero menos enfático aquí.
- source_word: וַיַּעַשׂ כֵּן
  english_pob_choice: And he did so
  chosen_spanish: Y él hizo así
  alternatives_spanish:
  - Y así lo hizo
  - Y obedeció
  lexicon: HALOT
  rationale: La fórmula hebrea comunica cumplimiento obediente. ‘Y él hizo así’ conserva la brevedad del original; en español también sería posible ‘Y así lo hizo’, pero la primera mantiene mejor el orden y la sobriedad del hebreo.
theological_decisions:
- issue: Renderización del ser celestial en un contexto teofánico
  english_pob_reading: the angel of God
  chosen_spanish_reading: el ángel de Dios
  alternative_spanish_readings:
  - el mensajero de Dios
  rationale: El término hebreo permite ‘mensajero’ o ‘ángel’, pero el contexto de Jueces 6 presenta a un enviado divino con rasgos sobrenaturales. ‘Ángel de Dios’ preserva esa carga narrativa sin resolver en exceso la identidad del personaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el auditorio inglés POB, pero se ajusta al hebreo cuando el español permite una equivalencia más natural: בשר se vierte como ‘carne’ en vez de ‘carne/matadero’ o ‘carne’ en sentido de ‘meat’; מַצּוֹת como ‘panes sin levadura’; and הַמָּרַק como ‘caldo’. No se detectaron revisiones recientes que alteren el contenido base.'
  spanish_consistency_notes:
  - Se mantiene ‘ángel de Dios’ para conservar la decisión teológica del POB en este pasaje.
  - Se usa ‘Yahvé’ como término de proyecto, pero aquí no aparece el tetragrámaton.
  - 'Se prefirió vocabulario litúrgico claro y moderno: ‘panes sin levadura’, ‘sobre esta roca’, ‘derrama el caldo’.'
  - El final breve ‘Y él hizo así’ mantiene la fórmula de obediencia del hebreo sin expandirla.
