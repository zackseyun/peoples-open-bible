translation:
  language: es
  text: Mira, yo estoy mandando a buscar y reuniendo a todos los clanes del norte, declara Yahvé, y a Nabucodonosor, rey de Babilonia, mi siervo[a], y los traeré contra esta tierra, contra sus habitantes y contra todas estas naciones circundantes. Los dedicaré a la destrucción[b] y los convertiré en un horror[c], en un silbido y en ruinas perpetuas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi siervo» aquí identifica a Nabucodonosor como un instrumento del propósito de Yahvé, no necesariamente como un adorador fiel.
    reason: theological_note
  - marker: b
    text: 'O: «los destruiré por completo»; el verbo hebreo puede denotar poner a personas o cosas bajo el anatema, es decir, dedicarlas a la destrucción.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «una desolación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: Es una fórmula de anuncio solemne que llama la atención. 'Mira' conserva la fuerza deíctica de manera natural en español actual; 'He aquí' es más tradicional, pero menos natural.
- source_word: שֹׁלֵחַ וְלָקַחְתִּי
  english_pob_choice: I am sending for and taking
  chosen_spanish: yo estoy enviando y tomando
  alternatives_spanish:
  - yo enviaré y tomaré
  - yo estoy enviando para tomar
  lexicon: HALOT
  rationale: La secuencia participa de una acción profética segura e inminente. 'Estoy enviando y tomando' conserva el valor vivo del hebreo sin perder la coordinación verbal; 'enviando para tomar' explicita la idea pero se aleja un poco más del paralelo.
- source_word: מִשְׁפְּחוֹת צָפוֹן
  english_pob_choice: the clans of the north
  chosen_spanish: los clanes del norte
  alternatives_spanish:
  - las familias del norte
  - las tribus del norte
  lexicon: HALOT
  rationale: '''Clanes'' refleja mejor grupos de parentesco o pueblos organizados que ''familias'', y evita sugerir una estructura étnica demasiado técnica como ''tribus''.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares the LORD
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el nombre divino transliterado según el criterio del proyecto. 'Declara' reproduce el tono solemne de la clausula hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el nombre propio divino tal como exige el proyecto, en lugar de sustituirlo por un título.
- source_word: וְאֶל נְבוּכַדְרֶאצַּר מֶלֶךְ בָּבֶל עַבְדִּי
  english_pob_choice: and Nebuchadnezzar king of Babylon, my servant
  chosen_spanish: y a Nabucodonosor, rey de Babilonia, mi esclavo
  alternatives_spanish:
  - y a Nabucodonosor, rey de Babilonia, mi siervo
  - e incluso a Nabucodonosor, rey de Babilonia, mi esclavo
  lexicon: HALOT
  rationale: El hebreo vincula también a Nabucodonosor con el movimiento de envío/recolección; en español se expresa con 'y a'. Se conserva el valor fuerte de עַבְדִּי con 'esclavo', acorde al criterio léxico del proyecto, sin suavizarlo a 'siervo'.
- source_word: וַהֲבִאֹתִים
  english_pob_choice: I will bring them
  chosen_spanish: los traeré
  alternatives_spanish:
  - los llevaré
  - los haré venir
  lexicon: HALOT
  rationale: La forma narrativa profética se vierte con futuro simple en español. 'Traeré' sigue la imagen de movimiento dirigido por Dios hacia la tierra juzgada.
- source_word: עַל הָאָרֶץ הַזֹּאת
  english_pob_choice: against this land
  chosen_spanish: contra esta tierra
  alternatives_spanish:
  - sobre esta tierra
  - a esta tierra
  lexicon: HALOT
  rationale: '''Contra'' expresa el matiz hostil y militar del preposición עַל en este contexto de juicio.'
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - sus moradores
  lexicon: HALOT
  rationale: Es la equivalencia más natural en español para el sustantivo participial con sufijo, manteniendo el tono formal del pasaje.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה סָבִיב
  english_pob_choice: all these surrounding nations
  chosen_spanish: todas estas naciones alrededor
  alternatives_spanish:
  - todas estas naciones vecinas
  - todos estos pueblos alrededor
  lexicon: HALOT
  rationale: '''Alrededor'' conserva el adverbio espacial סָבִיב de manera directa. Se evita ''vecinas'' porque introduce una relación más interpretativa.'
- source_word: וְהַחֲרַמְתִּים
  english_pob_choice: I will devote them to destruction
  chosen_spanish: los dedicaré a la destrucción
  alternatives_spanish:
  - los destruiré por completo
  - los pondré bajo anatema
  lexicon: HALOT
  rationale: Se preserva el peso técnico de חרם sin recurrir a una expresión opaca como 'anatema'. 'Dedicar a la destrucción' mantiene la idea de consagración para ruina bajo juicio.
- source_word: לְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - una desolación
  - un espanto
  lexicon: HALOT
  rationale: En el paralelismo con 'silbido' y 'ruinas perpetuas', el término apunta al efecto de devastación atroz; 'horror' comunica ese impacto de manera breve y fiel.
- source_word: לִשְׁרֵקָה
  english_pob_choice: a hissing
  chosen_spanish: un silbido
  alternatives_spanish:
  - un silbar
  - un objeto de silbidos
  lexicon: HALOT
  rationale: El sustantivo describe la reacción burlona de los observadores. 'Silbido' es natural en español y conserva el matiz de burla o escarnio.
- source_word: לְחָרְבוֹת עוֹלָם
  english_pob_choice: everlasting ruins
  chosen_spanish: ruinas perpetuas
  alternatives_spanish:
  - ruinas eternas
  - ruinas para siempre
  lexicon: HALOT
  rationale: '''Perpetuas'' expresa la duración continua del juicio con dignidad literaria y sin sonar excesivamente literal o arcaizante.'
theological_decisions:
- issue: Sentido de 'mi esclavo' para Nabucodonosor
  english_pob_reading: Nebuchadnezzar is called 'my servant' as an instrument used by the LORD to execute judgment.
  chosen_spanish_reading: Nabucodonosor es llamado 'mi esclavo' como instrumento de Yahvé para ejecutar juicio.
  alternative_spanish_readings:
  - Nabucodonosor es llamado 'mi siervo' como instrumento de Yahvé para ejecutar juicio.
  - Nabucodonosor recibe un título de honor espiritual.
  rationale: Se mantiene la dureza lexical de עבד sin convertirla en un título devocional más suave. El contexto inmediato es de soberanía judicial, no de aprobación moral o piedad personal.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor de חרם
  english_pob_reading: 'Translate with the technical sense preserved: ''devote them to destruction.'''
  chosen_spanish_reading: 'Traducir con el sentido técnico preservado: ''los dedicaré a la destrucción''.'
  alternative_spanish_readings:
  - los destruiré por completo
  - los pondré bajo anatema
  rationale: 'La fórmula conserva la tensión teológica del término hebreo: consagración al juicio y destrucción, sin diluirlo en un mero ''destruir'' ni ocultarlo con jerga eclesiástica.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del inglés POB, que eliminó un segundo 'for' antes de Nebuchadnezzar por no estar representado en el hebreo. La redacción española sigue esa estructura sin añadir preposiciones extras, y conserva el resto del versículo con correspondencia semántica estable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme al criterio del proyecto.
  - Se mantiene 'esclavo' para עבד en coherencia con la preferencia léxica indicada.
  - '''Dedicar a la destrucción'' preserva el matiz técnico de חרם sin transliteración.'
  - '''Horror'', ''silbido'' y ''ruinas perpetuas'' reflejan el paralelismo final del hebreo con registro literario natural en español.'
