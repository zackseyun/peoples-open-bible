theological_decisions:
- issue: Rendering δίκαιος in a prayer describing God's rule and judgment
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: Both are possible, but 'righteous sovereign' preserves the moral and covenantal breadth of δίκαιος while the following 'you judge' already supplies the judicial nuance. This also aligns with the project's preference to preserve theological weight without flattening terms.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη default rationale (righteousness / justice both possible depending on context)'
