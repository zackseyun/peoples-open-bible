    text: Or 'a shrine.' The Hebrew is literally 'a house of gods'; some take it as a private shrine.
    reason: lexical_alternative
  - marker: b
    text: Literally 'filled the hand of,' an idiom for installing or consecrating someone to priestly service.
    reason: lexical_alternative
