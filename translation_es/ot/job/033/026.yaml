translation:
  language: es
  text: Ora a Dios[a], y él lo acepta, y ve su rostro[b] con un grito de gozo; y restaura al hombre su justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ruega a Dios». El verbo hebreo puede subrayar una súplica insistente.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ve el rostro de Dios; el hebreo dice simplemente «su rostro».
    reason: alternative_reading
  - marker: c
    text: O «su vindicación» o «su rectitud». El hebreo «justicia» puede referirse al estado restaurado del hombre delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶעְתַּר
  english_pob_choice: prays
  chosen_spanish: ora
  alternatives_spanish:
  - ruega
  - implora
  lexicon: HALOT
  rationale: El verbo עתר en este contexto expresa súplica intensa dirigida a Dios. «Ora» es natural en español bíblico contemporáneo y preserva el acto de dirigirse a Dios; «ruega» o «implora» serían posibles, pero menos neutros o más marcados.
- source_word: אֱל֨וֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es un término poético singular para Dios en Job. «Dios» es la equivalencia directa y suficiente; añadir un calificativo no aparece en el hebreo de este versículo.
- source_word: וַיִּרְצֵהוּ
  english_pob_choice: and he accepts him
  chosen_spanish: y él lo acepta
  alternatives_spanish:
  - y le es favorable
  - y se complace en él
  lexicon: HALOT
  rationale: El sentido es que Dios recibe favorablemente al que ora. «Lo acepta» reproduce bien la aceptación relacional y la continuidad del sujeto divino; las otras opciones son válidas, pero menos directas en español.
- source_word: וַיַּרְא פָּנָיו
  english_pob_choice: he sees his face
  chosen_spanish: ve su rostro
  alternatives_spanish:
  - mira su rostro
  - ve el rostro de Dios
  lexicon: HALOT
  rationale: La construcción hebrea conserva un pronombre posesivo cuyo referente se aclara por el contexto. «Ve su rostro» mantiene la concisión del original; «el rostro de Dios» explicita la referencia, pero añade lo que el hebreo no dice de forma explícita.
- source_word: בִּתְרוּעָה
  english_pob_choice: with a shout of joy
  chosen_spanish: con un grito de gozo
  alternatives_spanish:
  - con júbilo
  - con un clamor de alegría
  lexicon: HALOT
  rationale: תְּרוּעָה designa un grito o clamor celebrativo. «Con un grito de gozo» conserva el componente vocal y festivo; «júbilo» es posible, pero puede sonar más abstracto.
- source_word: וַיָּשֶׁב
  english_pob_choice: and he restores
  chosen_spanish: y restaura
  alternatives_spanish:
  - y devuelve
  - y hace volver
  lexicon: HALOT
  rationale: 'El hiphil de שוב es causativo: devolver/restaurar. «Restaura» comunica bien la acción divina en español y evita ambigüedad con un simple «volver».'
- source_word: לֶאֱנוֹשׁ
  english_pob_choice: to man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a un hombre
  - al ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ enfatiza la humanidad mortal. «Al hombre» es idiomático y literario en español; «al ser humano» aclara el sentido, pero resulta menos poético.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su vindicación
  - su derecho
  lexicon: HALOT
  rationale: Aunque «justicia» puede abarcar rectitud o estado correcto delante de Dios, aquí preserva mejor la fuerza semántica del término sin forzar una lectura doctrinal específica. «Rectitud» o «vindicación» son alternativas contextuales, pero estrechan demasiado el campo.
theological_decisions:
- issue: Referente de los pronombres en «él lo acepta; ve su rostro»
  english_pob_reading: God accepts the praying man, and the man then sees God's face.
  chosen_spanish_reading: Dios acepta al hombre que ora, y ese hombre ve el rostro de Dios.
  alternative_spanish_readings:
  - el hombre acepta a Dios favorablemente
  - Dios ve el rostro del hombre
  rationale: El contexto describe el movimiento del ser humano hacia Dios y la recepción favorable por parte divina. En español, mantener «lo acepta» y «ve su rostro» conserva la relación sin sobreexplicar; la referencia a Dios se entiende por el contexto, aunque sigue implícita en la frase.
  doctrine_reference: Conservar ambigüedad referencial cuando el hebreo la deja implícita; no eliminarla por paráfrasis.
- issue: Sentido de «su justicia»
  english_pob_reading: Restored righteousness/right standing belonging to the man.
  chosen_spanish_reading: Justicia restaurada o restituida al hombre.
  alternative_spanish_readings:
  - vindicación del hombre
  - rectitud del hombre restituida
  rationale: El hebreo puede referirse a justicia, rectitud o reivindicación/restauración de su estado correcto. «Su justicia» preserva la ambigüedad productiva del texto; en la nota puede explicarse que también puede implicar vindicación o derecho restablecido, sin imponer una doctrina posterior.
  doctrine_reference: No importar un marco doctrinal que el verso no expresa explícitamente; conservar la amplitud semántica del sustantivo hebreo.
translation_notes:
  revision_awareness: La versión sigue el pasaje hebreo de Job 33:26 y el rastro de auditoría en inglés, manteniendo el flujo verbal, la referencia implícita del pronombre y la ambigüedad semántica de צִדְקָתוֹ sin resolverla de manera dogmática. No se detectaron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ conforme al estándar del proyecto.
  - Se mantiene «justicia» como término principal para צִדְקָה, con alternativa explicada en nota.
  - Se evita introducir «Mesías», «SEÑOR» o lenguaje eclesiástico no presente en el hebreo.
  - La puntuación y el orden de las cláusulas siguen el paralelismo del versículo hebreo.
