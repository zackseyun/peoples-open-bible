translation:
  language: es
  text: Y los tomó de Galilea y de Arbactis[b], junto con las mujeres y los niños y todo lo que tenían, y los llevaron a Judea con gran regocijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido cambia de singular («tomó») a plural («llevaron»). Se conserva esa oscilación textual en vez de armonizarla.
    reason: textual_variant
  - marker: b
    text: También puede entenderse «en Arbactis», porque el griego usa ἐν con el nombre del lugar; aquí se traduce con un giro de origen por el contexto de traslado.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - tomó consigo
  - los llevó
  lexicon: LSJ
  rationale: El verbo puede significar recibir, tomar o hacerse cargo de algo/personas. En este contexto narrativo de traslado, «tomó» conserva la acción de recoger o hacerse cargo sin forzar un complemento ajeno al griego.
- source_word: ἐκ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  lexicon: LSJ
  rationale: La preposición de origen/movimiento se expresa de manera natural en español con «desde»; mantiene mejor el matiz direccional del texto.
- source_word: ἐν Ἀρβάκτοις
  english_pob_choice: from Arbactis
  chosen_spanish: desde Arbactis
  alternatives_spanish:
  - en Arbactis
  lexicon: LSJ
  rationale: Aunque el griego usa ἐν con el topónimo, el contexto de traslado y la decisión auditada del inglés favorecen una expresión de origen en español. Se conserva el nombre propio transliterado.
- source_word: σὺν ταῖς γυναιξὶν καὶ τοῖς τέκνοις
  english_pob_choice: together with the women and the children
  chosen_spanish: junto con las mujeres y los niños
  alternatives_spanish:
  - con sus mujeres y sus hijos
  - con las mujeres y los niños
  lexicon: LSJ
  rationale: El griego dice literalmente «las mujeres y los niños», no «las esposas y los hijos». «Junto con» preserva el sentido inclusivo y evita estrechar el referente.
- source_word: πάντα ὅσα ἦν αὐτοῖς
  english_pob_choice: all that belonged to them
  chosen_spanish: todo lo que tenían
  alternatives_spanish:
  - todas sus posesiones
  - todo cuanto les pertenecía
  lexicon: LSJ
  rationale: La frase abarca pertenencias de manera amplia. «Todo lo que tenían» es natural en español y mantiene la amplitud semántica de propiedad/bienes sin volverlo más técnico de lo que exige el griego.
- source_word: ἤγαγον
  english_pob_choice: they brought
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los trajeron
  - lo llevaron
  lexicon: LSJ
  rationale: El griego transmitido pasa a plural; la traducción conserva esa tensión textual en lugar de armonizarla a singular. «Los llevaron» refleja el plural y la direccionalidad del traslado.
- source_word: εἰς τὴν Ἰουδαίαν
  english_pob_choice: into Judea
  chosen_spanish: a Judea
  alternatives_spanish:
  - hacia Judea
  - en Judea
  lexicon: LSJ
  rationale: En español, con verbos de movimiento, «a» expresa de forma natural la meta del desplazamiento; evita una rigidez que puede sonar menos idiomática que «into» en inglés.
- source_word: μετʼ εὐφροσύνης μεγάλης
  english_pob_choice: with great rejoicing
  chosen_spanish: con gran regocijo
  alternatives_spanish:
  - con gran alegría
  - con mucho gozo
  lexicon: LSJ
  rationale: «Regocijo» conserva el carácter celebrativo y público de εὐφροσύνη, y en combinación con «gran» reproduce adecuadamente la intensidad del original.
translation_notes:
  revision_awareness: Se sigue el pasaje griego de Swete 1909 y el audit trail inglés sin armonizar la oscilación singular/plural. La redacción española busca ser publicable y natural, pero conserva la tensión textual y la referencia geográfica según el expediente auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece el tetragrámaton ni κύριος.
  - Se mantiene el nombre propio «Arbactis» transliterado por tratarse de un topónimo no identificado en el uso español común.
  - Se preserva el cambio de número verbal documentado en el texto griego, siguiendo la decisión auditada del inglés.
  - «Niños» traduce τέκνοις de forma amplia; no se especifica «hijos» porque el griego no lo restringe necesariamente a varones descendientes.
