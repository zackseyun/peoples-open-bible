- from: No hablen tanto ni con tanta arrogancia; no salga insolencia de su boca[a], porque Yahvé es un Dios de conocimiento, y por él se pesan las acciones.
  to: No sigan hablando con tanta arrogancia; no salga insolencia de su boca[a], porque Yahvé es un Dios que sabe, y por él se pesan las acciones.
  rationale: Se ajusta la primera prohibición para reflejar mejor la intensificación/continuidad del hebreo, y se hace más idiomática la expresión sobre el conocimiento divino en español sin perder el sentido del constructo hebreo. Se conserva la nota textual y la cláusula final tradicionalmente entendida como evaluación divina de las obras.
