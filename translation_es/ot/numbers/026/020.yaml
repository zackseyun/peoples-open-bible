revisions:
- from: 'Los hijos de Judá por sus clanes fueron: de Sela[a], el clan de los selanitas; de Fares, el clan de los faretitas; de Zéraj[b], el clan de los zarjitas.'
  to: 'Los hijos de Judá por sus clanes fueron: de Sela[a], el clan de los selanitas; de Pérez[b], el clan de los perezitas; de Zérah, el clan de los zerahitas.'
  rationale: 'La revisión corrige la principal desviación respecto al hebreo y al audit trail inglés: se restituye «Pérez» como forma base para פֶרֶץ y se ajusta el gentilicio a «perezitas». También se mueve la nota de variante tradicional al nombre correcto. Se mantiene «Sela» y la fórmula censal original. Para זֶרַח se adopta «Zérah» y «zerahitas», que preservan mejor la relación con el hebreo que «Zéraj/zarjitas» y resultan más legibles en español amplio.'
