translation:
  language: es
  text: 'Entonces el rey le dijo: «¿Por qué sigues hablando de tus asuntos? Ya he decidido[a]: tú y Zibá repartirán[b] la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Ya dije».'
    reason: lexical_alternative
  - marker: b
    text: O «el campo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... הַמֶּלֶךְ
  english_pob_choice: Then the king said
  chosen_spanish: Entonces el rey le dijo
  alternatives_spanish:
  - Y el rey le dijo
  - Así que el rey le dijo
  lexicon: WLC; HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia con fluidez natural en español.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo?
  - ¿Por qué razón?
  lexicon: WLC; HALOT
  rationale: Interrogativo directo y natural en español, sin añadir matiz inexistente.
- source_word: תְּדַבֵּר עוֹד
  english_pob_choice: do you keep speaking
  chosen_spanish: sigues hablando
  alternatives_spanish:
  - sigues hablando todavía
  - continúas hablando
  - hablas aún
  lexicon: WLC; HALOT
  rationale: El imperfecto con עוֹד expresa continuidad; «sigues hablando» comunica bien la impaciencia del rey sin calcar de forma rígida.
- source_word: דְּבָרֶיךָ
  english_pob_choice: your affairs
  chosen_spanish: tus asuntos
  alternatives_spanish:
  - tu caso
  - tus cosas
  - tu asunto
  lexicon: WLC; HALOT
  rationale: דָּבָר puede significar «palabras», «asunto» o «caso». En este contexto de disputa, «asuntos» refleja la idea de la causa o reclamación de Mefibóset sin volverla demasiado técnica.
- source_word: אָמַרְתִּי
  english_pob_choice: I have decided
  chosen_spanish: Ya he decidido
  alternatives_spanish:
  - Ya dije
  - He dicho
  lexicon: WLC; HALOT
  rationale: Aunque el hebreo es literalmente «dije», en contexto funciona como un fallo ya emitido. «Ya he decidido» conserva esa fuerza performativa en español y sigue la decisión de la POB inglesa.
- source_word: אַתָּה וְצִיבָא
  english_pob_choice: you and Ziba
  chosen_spanish: tú y Zibá
  alternatives_spanish:
  - vos y Zibá
  - usted y Zibá
  lexicon: WLC; HALOT
  rationale: Se mantiene el pronombre explícito por tratarse de un decreto dirigido personalmente a Mefibóset. «Zibá» es la transliteración normalizada en español.
- source_word: תַּחְלְקוּ
  english_pob_choice: shall divide
  chosen_spanish: repartirán
  alternatives_spanish:
  - deberán repartir
  - dividirán
  - repartirán entre ambos
  lexicon: WLC; HALOT
  rationale: El imperfecto aquí expresa una orden o decisión del rey. «Repartirán» transmite mandato judicial con naturalidad; «deberán repartir» también sería posible, pero suena más perifrástico.
- source_word: הַשָּׂדֶה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el campo
  - la finca
  - la propiedad
  lexicon: WLC; HALOT
  rationale: Aunque el sentido literal es «campo», en este litigio de herencia y posesión conviene una expresión más amplia en español. «La tierra» mantiene la referencia al terreno sin restringirlo a una parcela agrícola.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el juicio de la POB en inglés, pero ajusta el valor de אָמַרְתִּי a un español natural de decreto («Ya he decidido») y conserva en nota la alternativa más literal («Ya dije»). También mantiene la amplitud semántica de הַשָּׂדֶה con «la tierra», dejando «el campo» como opción alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie cuando aparezca el nombre divino; aquí no aplica.
  - Se translitera «Zibá» con acento para la lectura en español.
  - Se evita «SEÑOR» como sustituto del nombre divino; aquí el versículo no contiene el Tetragrámaton.
  - Se mantiene un registro sobrio y judicial acorde al contexto narrativo-legislativo del pasaje.
