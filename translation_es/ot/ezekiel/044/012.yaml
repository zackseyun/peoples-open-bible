    reason: lexical_alternative
  - marker: c
    text: La fórmula profética אֲדֹנָי יְהוִה contiene explícitamente el nombre divino. Se vierte 'Señor Yahvé' para respetar la convención del proyecto y evitar la máscara tradicional 'SEÑOR'.
    reason: theological_note
