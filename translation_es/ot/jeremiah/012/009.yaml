translation:
  language: es
  text: ¿Es mi heredad para mí un ave de presa moteada[a]? ¿Están contra ella, por todos lados, las aves de presa[b]? Vayan, reúnan a todas las bestias del campo; tráiganlas para que devoren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «hiena». Algunos intérpretes relacionan aquí la palabra hebrea repetida עַיִט con un depredador como la hiena, dando un sentido como «¿Es mi heredad para mí una hiena moteada?». El texto principal sigue el sentido más común: «ave de presa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «¿Es mi heredad para mí un ave de presa moteada? el ave de presa alrededor de ella». El singular «ave de presa» puede funcionar aquí en sentido colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַיִט
  english_pob_choice: bird of prey
  chosen_spanish: ave de presa
  alternatives_spanish:
  - ave rapaz
  - ave carroñera
  - hiena
  lexicon: HALOT
  rationale: El hebreo עַיִט suele designar un ave rapaz o carroñera. «Ave de presa» conserva el sentido zoológico y el registro bíblico sin fijar una especie concreta. La alternativa «hiena» se reserva en una nota porque existe esa propuesta, pero el paralelismo con animales depredadores favorece mantener la imagen aviaria.
- source_word: צָבוּעַ
  english_pob_choice: speckled
  chosen_spanish: moteada
  alternatives_spanish:
  - manchada
  - salpicada
  - de color variado
  lexicon: HALOT
  rationale: El adjetivo expresa coloración marcada o variada. «Moteada» transmite de forma natural en español esa apariencia extraña o notable, equivalente al valor descriptivo de «speckled».
- source_word: נַחֲלָתִי
  english_pob_choice: my inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi posesión
  - mi patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה refiere a una posesión heredada. «Heredad» conserva el matiz bíblico/covenantal y suena más natural en registro bíblico que «herencia» en este contexto.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí mismo
  lexicon: HALOT
  rationale: La construcción hebrea retiene una dative enfática. «Para mí» reproduce el valor relacional y la extrañeza retórica de la pregunta sin sonar forzado en español.
- source_word: הַעַיִט סָבִיב עָלֶיהָ
  english_pob_choice: the birds of prey against her all around
  chosen_spanish: el ave de presa está contra ella, en derredor
  alternatives_spanish:
  - las aves de presa la rodean
  - el ave rapaz la asedia alrededor
  - las aves de presa están alrededor de ella
  lexicon: HALOT
  rationale: Aunque la forma es singular, el hebreo puede funcionar colectivamente; la traducción mantiene el singular lexical («el ave de presa») y añade el matiz adversativo con «está contra ella, en derredor», siguiendo la revisión inglesa que preserva el sentido de סָבִיב עָלֶיהָ como «around/against her».
- source_word: לְכוּ אִסְפוּ
  english_pob_choice: Go, gather
  chosen_spanish: Vayan, reúnan
  alternatives_spanish:
  - Vengan, reúnan
  - Vayan, junten
  - Acudan, reúnan
  lexicon: HALOT
  rationale: Son dos imperativos que convocan a la acción. «Vayan, reúnan» conserva el impulso directo y el carácter de llamada profética.
- source_word: כָּל חַיַּת הַשָּׂדֶה
  english_pob_choice: all the beasts of the field
  chosen_spanish: todas las bestias del campo
  alternatives_spanish:
  - todos los animales del campo
  - todas las fieras del campo
  - todos los animales salvajes del campo
  lexicon: HALOT
  rationale: Es una expresión bíblica fija para animales salvajes. «Bestias del campo» preserva el registro y la resonancia intertextual mejor que una paráfrasis más moderna.
- source_word: הֵתָיוּ לְאָכְלָה
  english_pob_choice: bring them to devour
  chosen_spanish: tráiganlas para que devoren
  alternatives_spanish:
  - tráiganlas para comer
  - háganlas venir para devorar
  - conduzcanlas al devorar
  lexicon: HALOT
  rationale: El hebreo expresa un envío o introducción con finalidad de comer/devorar. «Tráiganlas para que devoren» comunica con claridad la finalidad predatoria sin volverlo demasiado literal o rígido.
theological_decisions:
- issue: Referente de «mi heredad»
  english_pob_reading: Rendered generically as 'my inheritance' without specifying Judah, Jerusalem, the land, or the people in the translation itself.
  chosen_spanish_reading: «mi heredad» sin identificar explícitamente Judá, Jerusalén, la tierra o el pueblo.
  alternative_spanish_readings:
  - Judá
  - Jerusalén
  - la tierra
  - el pueblo del pacto
  rationale: El hebreo mantiene el referente implícito en la formulación inmediata. La versión española conserva esa apertura textual, evitando resolver en el verso una identificación que el contexto sugiere pero no nombra de forma explícita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al reflejar el matiz adversativo de סָבִיב עָלֶיהָ con «está contra ella, en derredor», en lugar de suavizarlo a un simple «alrededor». También conserva la ambigüedad del referente de «mi heredad» y no añade una identificación interpretativa que el hebreo no explicita.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se prefiere «heredad» para נַחֲלָה por su tonalidad bíblica y de posesión heredada.
  - Se conserva el singular lexical «el ave de presa» con valor colectivo implícito, ya que el hebreo lo permite y el contexto de hostilidad lo favorece.
  - «Tráiganlas» mantiene el referente colectivo de las bestias del campo en español natural, sin perder el sentido de convocatoria a los depredadores.
