translation:
  language: es
  text: Y los consolarán cuando vean sus caminos y sus obras[a]; y sabrán que no hice sin causa todo lo que hice en ella[b][c], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán consolados por ellos» o «ellos les darán consuelo». La forma hebrea permite que los sobrevivientes sean el medio de su consuelo al ver su conducta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hice en ella todo lo que hice sin razón».'
    reason: alternative_reading
  - marker: c
    text: Esto es, en Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: וְנִחֲמוּ אֶתְכֶם
  english_pob_choice: they will comfort you
  chosen_spanish: os consolarán
  alternatives_spanish:
  - seréis consolados por ellos
  - ellos os darán consuelo
  lexicon: HALOT
  rationale: El nifal de נחם admite aquí una lectura en la que los sobrevivientes son el sujeto que produce consuelo al ser vistos. «Os consolarán» conserva esa relación sin perder la posibilidad pasiva implícita del verbo.
- source_word: כִּי תִרְאוּ
  english_pob_choice: when you see
  chosen_spanish: cuando veáis
  alternatives_spanish:
  - porque veréis
  - al ver
  lexicon: HALOT
  rationale: כִּי introduce la circunstancia u ocasión del consuelo. «Cuando veáis» refleja mejor esa relación temporal-circunstancial en español que un simple «porque».
- source_word: דַּרְכָּם
  english_pob_choice: their ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - su manera de vivir
  lexicon: HALOT
  rationale: «Caminos» mantiene la metáfora hebrea de דֶּרֶךְ y es idiomático en español bíblico y moderno; no se reduce a una paráfrasis explicativa.
- source_word: עֲלִילוֹתָם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: עֲלִילוֹת señala actos u obras, a menudo con carga moral. «Obras» empareja bien con «caminos» y conserva la concreción del texto.
- source_word: וִידַעְתֶּם
  english_pob_choice: and you will know
  chosen_spanish: y sabréis
  alternatives_spanish:
  - y conoceréis
  - entonces sabréis
  lexicon: HALOT
  rationale: El futuro simple con valor resultativo queda naturalmente expresado por «sabréis». Se conserva la coordinación hebrea sin añadir un conector interpretativo innecesario.
- source_word: לֹא חִנָּם
  english_pob_choice: not done without cause
  chosen_spanish: no hice sin causa
  alternatives_spanish:
  - no lo hice en vano
  - no lo hice sin razón
  lexicon: HALOT
  rationale: חִנָּם expresa que algo no ocurre gratuitamente, sin motivo o sin causa. «Sin causa» mantiene el matiz judicial-teológico del contexto de Ezequiel.
- source_word: עָשִׂיתִי אֵת כָּל אֲשֶׁר עָשִׂיתִי
  english_pob_choice: I have not done without cause all that I did
  chosen_spanish: todo lo que hice
  alternatives_spanish:
  - todo cuanto hice
  - todo lo que había hecho
  lexicon: HALOT
  rationale: Se conserva la repetición enfática de עשה mediante «todo lo que hice», evitando suavizar la estructura hebrea. El perfecto español es suficiente en este contexto profético.
- source_word: בָהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - contra ella
  - en eso
  lexicon: HALOT
  rationale: El pronombre femenino singular remite a Jerusalén, por lo que «en ella» resulta natural y preciso en español.
- source_word: נְאֻם אֲדֹנָי יְהוָה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor, Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: El proyecto exige traducir el nombre divino por «Yahvé». «Señor Yahvé» preserva la distinción entre אֲדֹנָי y el Tetragrámaton sin recurrir a la convención de enmascararlo como «SEÑOR».
theological_decisions:
- issue: El efecto de los sobrevivientes sobre los exiliados
  english_pob_reading: The survivors' observable conduct will vindicate God's judgment and thereby bring consolation to the audience.
  chosen_spanish_reading: Los sobrevivientes serán motivo de consuelo al verse sus caminos y sus obras, porque esa observación mostrará que el juicio de Dios no fue arbitrario.
  alternative_spanish_readings:
  - ellos mismos os consolarán simplemente por haber sobrevivido
  - os consolaréis al verlos
  rationale: La fuerza explicativa del verso está en que ver sus caminos y obras produce comprensión del juicio; por eso el consuelo no se reduce a una emoción, sino que nace de la vindicación del acto divino.
  doctrine_reference: Preservar la tensión exegética del texto sin resolverla de manera simplista.
- issue: Forma de renderizar el nombre divino en אֲדֹנָי יְהוָה
  english_pob_reading: The verse uses the Tetragrammaton יְהוָה directly.
  chosen_spanish_reading: Se traduce como «Yahvé» en vez de ocultarlo tras una convención tipográfica.
  alternative_spanish_readings:
  - Señor
  - SEÑOR
  - Señor Yahvé
  rationale: La línea editorial del proyecto manda usar «Yahvé» para יְהוָה. Aquí la fórmula profética queda natural con «Señor Yahvé», que distingue אֲדֹנָי de YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión indicado como sin cambios; no se aplicaron revisiones nuevas. El borrador mantiene la lectura causal/judicial de las obras de los sobrevivientes y la distinción editorial entre אֲדֹנָי y יְהוָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה y «Señor» para אֲדֹנָי.
  - Se conserva el paralelismo «caminos / obras» como reflejo de דַּרְכָּם / עֲלִילוֹתָם.
  - «Sin causa» reproduce el valor de חִנָּם sin suavizar el juicio del pasaje.
  - El pronombre femenino «ella» remite a Jerusalén, coherente con el contexto inmediato.
