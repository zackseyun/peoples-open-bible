base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/005/009.yaml
  text: And after they had moved it around[a], the hand of Yahweh was against the city, causing a very great panic; and he struck the men of the city, from small to great, and tumors broke out on them.
