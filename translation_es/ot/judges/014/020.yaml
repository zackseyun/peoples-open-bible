    rationale: La nota española conserva «su amigo», pero el POB inglés también preserva la alternativa más literal de acompañamiento («who had accompanied him»). No es imprescindible, pero conviene reflejar mejor el abanico documentado y la observación sobre el grupo léxico רעה.
