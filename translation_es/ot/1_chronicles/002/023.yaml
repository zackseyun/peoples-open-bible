base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/002/023.yaml
  text: But Geshur and Aram took the villages of Jair from them[a], along with Kenath and its daughter towns—sixty cities. All these were the sons of Machir[c][b], the father of Gilead.
  footnotes:
