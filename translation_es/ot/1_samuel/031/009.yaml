revisions:
- from: Le cortaron la cabeza y le quitaron su armadura[a], y enviaron mensajeros por toda la tierra de los filisteos, alrededor[b], para dar la buena noticia a la casa de sus ídolos y al pueblo.
  to: Le cortaron la cabeza y le quitaron su armadura[a], y enviaron mensajeros por toda la tierra de los filisteos para dar la buena noticia a la casa de sus ídolos y al pueblo.
  rationale: Se eliminó «alrededor» porque en esa posición produce un español poco natural; «por toda la tierra de los filisteos» ya comunica adecuadamente la difusión territorial de סָבִיב en un castellano claro. También se quitó la nota [b] porque estaba incorrectamente anclada y no preservaba una alternativa válida en ese punto del texto. Se mantuvo el resto del borrador por ser fiel al hebreo y a las decisiones del POB.
