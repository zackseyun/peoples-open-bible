translation:
  language: es
  text: Y uno de los cuatro seres vivientes dio a los siete ángeles siete copas de oro[a], llenas[b] de la ira de Dios, que vive por los siglos de los siglos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete viales de oro» o «siete tazones de oro»; el término griego denota una vasija semejante a un cuenco o una copa.
    reason: lexical_alternative
  - marker: b
    text: O «colmadas de»; el participio griego expresa que las copas están llenas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «a los siglos de los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἓν ἐκ τῶν τεσσάρων ζῴων
  english_pob_choice: one of the four living creatures
  chosen_spanish: uno de los cuatro seres vivientes
  alternatives_spanish:
  - uno de las cuatro criaturas vivientes
  - uno de los cuatro animales vivientes
  lexicon: BDAG
  rationale: ζῷον en Apocalipsis designa a los seres del trono, no a animales comunes. 'Seres vivientes' conserva la referencia apocalíptica y evita la connotación engañosa de 'bestias' o 'animales'.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - presentó
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se expresa de manera directa con 'dio'; es la opción más natural y fiel al gesto simple del texto.
- source_word: τοῖς ἑπτὰ ἀγγέλοις
  english_pob_choice: to the seven angels
  chosen_spanish: a los siete ángeles
  alternatives_spanish:
  - para los siete ángeles
  lexicon: BDAG
  rationale: ἄγγελος se traduce normalmente por 'ángeles' en este contexto apocalíptico celestial.
- source_word: ἑπτὰ φιάλας
  english_pob_choice: seven bowls
  chosen_spanish: siete copas
  alternatives_spanish:
  - siete tazones
  - siete viales
  lexicon: BDAG
  rationale: φιάλη denota una vasija poco profunda, tipo copa o tazón. En español, 'copas' comunica bien la forma del recipiente y mantiene una equivalencia más natural que 'viales'.
- source_word: χρυσᾶς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - doradas
  lexicon: BDAG
  rationale: '''De oro'' expresa de forma clara el material del recipiente; en español suena más preciso y menos idiomático que ''doradas'' en este sintagma nominal.'
- source_word: γεμούσας
  english_pob_choice: full of
  chosen_spanish: llenas
  alternatives_spanish:
  - repletas
  - colmadas
  lexicon: BDAG
  rationale: El participio expresa que las copas están llenas; 'llenas' reproduce la fuerza descriptiva de modo simple y natural.
- source_word: τοῦ θυμοῦ
  english_pob_choice: the wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - la cólera
  lexicon: BDAG
  rationale: θυμός en este contexto apocalíptico expresa la ira judicial de Dios. 'Ira' preserva la fuerza solemne sin sonar más coloquial o emocional que 'furor'.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: 'Genitivo posesivo simple: la ira pertenece a Dios.'
- source_word: τοῦ ζῶντος
  english_pob_choice: who lives
  chosen_spanish: que vive
  alternatives_spanish:
  - el que vive
  - el Viviente
  lexicon: BDAG
  rationale: El participio presente modifica a Dios y afirma su vida permanente. 'Que vive' preserva el valor verbal y fluye bien en español.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por los siglos eternos
  - para siempre y por siempre
  lexicon: BDAG
  rationale: El idiomático griego de duración interminable se vierte con la fórmula española tradicional y reverente 'por los siglos de los siglos', que comunica bien el sentido de eternidad sin perder solemnidad.
theological_decisions:
- issue: Terminología de la ira divina
  english_pob_reading: the wrath of God
  chosen_spanish_reading: la ira de Dios
  alternative_spanish_readings:
  - el furor de Dios
  - la cólera de Dios
  rationale: Se preserva el tono judicial y escatológico del pasaje. 'Ira' es el equivalente más estable y bíblicamente reconocible para θυμός aquí, sin suavizar el juicio ni intensificarlo innecesariamente.
  doctrine_reference: Apocalipsis 15:7; Romanos 1:18; Translation philosophy §6
- issue: Descripción de la eternidad de Dios
  english_pob_reading: God, who lives forever and ever
  chosen_spanish_reading: Dios, que vive por los siglos de los siglos
  alternative_spanish_readings:
  - Dios, el que vive por los siglos de los siglos
  - Dios, el Viviente por los siglos de los siglos
  rationale: La cláusula une la afirmación de que Dios vive con el modismo de duración ilimitada. La traducción mantiene ambas ideas sin añadir ni restar contenido doctrinal.
  doctrine_reference: Deuteronomio 32:40; Apocalipsis 1:18; Translation philosophy §6
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el texto base sigue con acuerdo alto y sin observaciones pendientes. Esta versión española conserva ese perfil, trasladando de manera directa y auditable los elementos léxicos y teológicos principales del griego.'
  spanish_consistency_notes:
  - Se mantiene 'seres vivientes' para ζῷα, consistente con la terminología apocalíptica adoptada en la serie.
  - Se usa 'ira de Dios' para θυμός, preservando el registro judicial/esjatológico ya documentado en el POB inglés.
  - La fórmula 'por los siglos de los siglos' sigue la equivalencia tradicional española para el idiomático griego de duración interminable.
  - '''Copas'' se usa para φιάλας por claridad y naturalidad en español, sin perder la imagen de recipiente poco profundo.'
