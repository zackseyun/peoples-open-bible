translation:
  language: es
  text: 'Hijo de hombre, los habitantes de estas ruinas en la tierra de Israel dicen: «Abraham era uno solo y heredó la tierra; pero nosotros somos muchos; la tierra nos ha sido dada como posesión[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Abraham era uno solo y heredó la tierra; pero nosotros somos muchos; la tierra nos ha sido dada como herencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene la fórmula profética fija de Ezequiel y conserva el eco idiomático del hebreo. ‘Hijo de hombre’ es la equivalencia establecida en español y respeta mejor la repetición del vocativo que una paráfrasis como ‘ser humano’.
- source_word: יֹשְׁבֵי הֶחֳרָבוֹת הָאֵלֶּה
  english_pob_choice: the inhabitants of these ruins
  chosen_spanish: los habitantes de estas ruinas
  alternatives_spanish:
  - los que habitan estas ruinas
  - los moradores de estas ruinas
  lexicon: HALOT
  rationale: ‘יֹשְׁבֵי’ nombra a quienes residen allí; ‘habitantes’ es natural y preciso. ‘Ruinas’ conserva el cuadro concreto de lugares devastados sin suavizarlo.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: on the land of Israel
  chosen_spanish: sobre la tierra de Israel
  alternatives_spanish:
  - en la tierra de Israel
  - sobre el suelo de Israel
  lexicon: HALOT
  rationale: ‘אַדְמָה’ puede referirse a tierra/terreno/suelo; ‘tierra de Israel’ es claro y bíblicamente natural en español. ‘Sobre’ refleja la preposición עַל sin perder fluidez.
- source_word: אֹמְרִים לֵאמֹר
  english_pob_choice: are saying
  chosen_spanish: están diciendo
  alternatives_spanish:
  - dicen
  - van diciendo
  lexicon: HALOT
  rationale: El participio y la introducción לֵאמֹר expresan discurso en curso. ‘Están diciendo’ comunica la acción discursiva presente sin el calco pesado de ‘diciendo, diciendo’.
- source_word: אֶחָד הָיָה אַבְרָהָם
  english_pob_choice: Abraham was one man
  chosen_spanish: Abraham era uno solo
  alternatives_spanish:
  - Abraham era solo uno
  - Abraham fue uno solo
  lexicon: HALOT
  rationale: El hebreo subraya la contraposición numérica con ‘nosotros somos muchos’. ‘Uno solo’ reproduce ese contraste con naturalidad en español; añadir ‘hombre’ aquí sería posible, pero la expresión ya queda clara por el nombre propio y el contexto.
- source_word: וַיִּירַשׁ אֶת הָאָרֶץ
  english_pob_choice: and he inherited the land
  chosen_spanish: y heredó la tierra
  alternatives_spanish:
  - y tomó posesión de la tierra
  - y recibió la tierra en herencia
  lexicon: HALOT
  rationale: Se conserva la elección de ‘heredó’ porque el contexto apela al precedente de Abraham y el campo semántico de ירשׁ incluye heredar. ‘Tierra’ es la correspondencia bíblica usual para הָאָרֶץ en español y no exige una explicación más técnica en el texto.
- source_word: וַאֲנַחְנוּ רַבִּים
  english_pob_choice: but we are many
  chosen_spanish: pero nosotros somos muchos
  alternatives_spanish:
  - y nosotros somos muchos
  - mientras que nosotros somos muchos
  lexicon: HALOT
  rationale: ‘Pero’ expresa el contraste argumentativo del pasaje. ‘Nosotros’ conserva el énfasis del pronombre hebreo frente a la singularidad atribuida a Abraham.
- source_word: לָנוּ נִתְּנָה הָאָרֶץ
  english_pob_choice: the land has been given to us
  chosen_spanish: la tierra nos ha sido dada
  alternatives_spanish:
  - la tierra fue dada a nosotros
  - se nos ha dado la tierra
  lexicon: HALOT
  rationale: La pasiva del nifal de נתן se rinde bien con ‘nos ha sido dada’, que suena natural y mantiene la idea de un don ya concedido.
- source_word: לְמוֹרָשָׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como herencia
  - para posesión
  lexicon: HALOT
  rationale: ‘מוֹרָשָׁה’ puede significar posesión hereditaria; ‘posesión’ evita sobrecargar el verso con un tecnicismo legal y sigue la línea del audit trail inglés. ‘Herencia’ queda como alternativa viable, pero puede inclinar el sentido hacia una formulación más explícitamente patrimonial.
theological_decisions:
- issue: Cómo reflejar el reclamo de derecho a la tierra sin intensificarlo doctrinalmente
  english_pob_reading: the land has been given to us as a possession
  chosen_spanish_reading: la tierra nos ha sido dada como posesión
  alternative_spanish_readings:
  - la tierra nos ha sido dada como herencia
  - la tierra nos ha sido otorgada como posesión
  rationale: El verso reporta el razonamiento presuntuoso de los habitantes, no una validación teológica de su reclamo. ‘Como posesión’ conserva el argumento de tenencia sin convertirlo en una afirmación doctrinal más fuerte que el hebreo.
  doctrine_reference: Ezequiel 33:24; observación contextual sobre el discurso citado
translation_notes:
  revision_awareness: Sigo la revisión auditada que corrigió la relación entre אֶחָד הָיָה אַבְרָהָם y וַיִּירַשׁ אֶת הָאָרֶץ hacia una lectura más cercana al hebreo (‘Abraham era uno solo y heredó la tierra’), y mantengo la conclusión con ‘como posesión’ según el control revisado. También conservo la voz formal y la puntuación de cita directa más sobria.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ para el nombre divino en general, pero este versículo no lo contiene.
  - Conservo ‘Hijo de hombre’ como vocativo profético fijo de Ezequiel.
  - ‘Tierra’ traduce הָאָרֶץ en una forma bíblica natural y coherente con el contexto territorial.
  - La puntuación de la cita directa sigue el español editorial moderno, con comillas angulares.
  - El marcador de nota [a] está anclado en ‘Hijo de hombre’ y ofrece alternativas léxicas sin alterar el texto principal.
