  rationale: Se reubica la nota de alternativa verbal al segmento correcto («cuando salga»), se restaura la nota teológica del POB sobre «príncipe», se cambia «mira» por «he aquí» para un tono más digno y más cercano a וְהִנֵּה / «behold», y se suaviza «volveré para combatir contra» a «volveré a combatir contra» por mejor español. Se duplicó la nota de «príncipe» en ambas ocurrencias porque el mismo término aparece dos veces en el versículo y ambas instancias pueden beneficiarse de la misma aclaración contextual.
