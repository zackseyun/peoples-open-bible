translation:
  language: es
  text: En cuanto a todo animal que tiene la pezuña hendida, pero no la tiene completamente dividida[a], y no rumia, son impuros para ustedes. Todo el que los toque quedará impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'no divide una hendidura'; el hebreo intensifica la idea de una pezuña completamente partida.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָל הַבְּהֵמָה
  english_pob_choice: As for every animal
  chosen_spanish: En cuanto a todo animal
  alternatives_spanish:
  - Todo animal
  - En cuanto a toda bestia
  lexicon: HALOT
  rationale: La preposición לְ marca aquí el ámbito o categoría tratada; por eso "En cuanto a" conserva el valor tópico. בְּהֵמָה es un término amplio para animal de tierra; "animal" es claro y natural en español moderno.
- source_word: מַפְרֶסֶת פַּרְסָה
  english_pob_choice: has a divided hoof
  chosen_spanish: tiene la pezuña hendida
  alternatives_spanish:
  - tiene la pezuña dividida
  - parte la pezuña
  lexicon: HALOT
  rationale: El hebreo expresa el rasgo de una pezuña dividida; en español, "pezuña hendida" comunica bien la imagen zoológica sin sonar forzado. Se evita "divide la pezuña" por ser más mecánico.
- source_word: וְשֶׁסַע אֵינֶנָּה שֹׁסַעַת
  english_pob_choice: but does not split the hoof completely
  chosen_spanish: pero no la hendidura completamente dividida
  alternatives_spanish:
  - pero no la divide por completo
  - pero no la parte del todo
  lexicon: HALOT
  rationale: La construcción hebrea intensifica la idea de una hendidura realmente completa. En español, "la hendidura completamente dividida" preserva esa intensificación. Se mantiene la tensión lexical sin suavizarla a una simple repetición idiomática.
- source_word: וְגֵרָה אֵינֶנָּה מַעֲלָה
  english_pob_choice: and does not chew the cud
  chosen_spanish: y no rumia
  alternatives_spanish:
  - y no mastica el cud
  - y no vuelve a traer la comida
  lexicon: HALOT
  rationale: El hebreo habla literalmente de "hacer subir" la rumia, pero en español el equivalente zoológico natural es "rumiar". Esto conserva el sentido sin añadir paráfrasis innecesaria.
- source_word: טְמֵאִים הֵם לָכֶם
  english_pob_choice: they are unclean to you
  chosen_spanish: son impuros para ustedes
  alternatives_spanish:
  - son inmundos para ustedes
  - son impuros ante ustedes
  lexicon: HALOT
  rationale: En español bíblico actual, "impuros" comunica con precisión la categoría ritual de טָמֵא sin cargar de inmediato con la connotación moral de "inmundos". "Para ustedes" conserva el marco legal-covenantal de לָכֶם.
- source_word: כָּל הַנֹּגֵעַ בָּהֶם
  english_pob_choice: Everyone who touches them
  chosen_spanish: Todo el que los toque
  alternatives_spanish:
  - Quien los toque
  - Cualquiera que los toque
  lexicon: HALOT
  rationale: El participio con כָּל funciona como generalización normativa. "Todo el que" es una forma española clara y formal que conserva el valor distributivo.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - se contaminará
  lexicon: HALOT
  rationale: El imperfecto expresa la consecuencia legal. "Quedará impuro" en español hace explícito el estado resultante sin perder el tono prescriptivo. Se evita "contaminará" por introducir una connotación menos específica al contexto de pureza ritual.
theological_decisions:
- issue: Terminología de pureza ritual en Levítico
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: La sección trata categorías rituales de pureza, no una acusación moral. "Impuro" es el equivalente más equilibrado en español contemporáneo y evita cargar el texto con una noción ética ajena al pasaje.
  doctrine_reference: Levítico 11; pureza ritual/cultual
- issue: Valor legal de לָכֶם / to you
  english_pob_reading: to you
  chosen_spanish_reading: para ustedes
  alternative_spanish_readings:
  - para vosotros
  - a ustedes
  rationale: '"Para ustedes" mantiene la referencia al destinatario comunitario y el matiz normativo del texto de santidad. En español latinoamericano, es la forma más natural y ampliamente usable.'
  doctrine_reference: Ley de pureza en el Pentateuco
- issue: Intensificación de la expresión de la pezuña
  english_pob_reading: does not split the hoof completely
  chosen_spanish_reading: no la hendidura completamente dividida
  alternative_spanish_readings:
  - no la divide por completo
  - no tiene la pezuña totalmente hendida
  rationale: El hebreo no dice solo "no divide", sino que intensifica el concepto de división mediante cognados. La redacción española conserva esa tensión al mantener "hendidura" y "completamente dividida".
  doctrine_reference: Precisión lexical en Levítico 11:26
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la puntuación añadiendo una coma tras 'hoof'; no cambió el contenido semántico. El español refleja la misma lectura estable y conserva la intensificación hebrea destacada por la nota del original.
  spanish_consistency_notes:
  - Se mantiene "impuro" para טָמֵא en contexto ritual, conforme al criterio de la serie.
  - '"En cuanto a" reproduce el valor topical de לְכָל sin convertir el versículo en una simple afirmación genérica.'
  - La nota [a] se ancla en la expresión de la pezuña para preservar la alternativa lexical relevante sin sobreexplicar el texto principal.
  - '"Todo el que" conserva el carácter normativo y general del participio hebreo.'
  - No se usa "SEÑOR" ni terminología litúrgica ajena al pasaje, porque aquí no aparece el Tetragrámaton ni lenguaje de culto directo.
