translation:
  language: es
  text: Quien guarda su boca preserva su vida[a]; quien abre demasiado sus labios cae en ruina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su vida» (nephesh); en otros contextos el término también puede significar «alma» o «ser», pero aquí se refiere con más naturalidad a la vida.'
    reason: lexical_alternative
  - marker: b
    text: O «trae destrucción sobre sí» / «es ruina para él». La frase hebrea es compacta y admite varias traducciones cercanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹצֵר
  english_pob_choice: guards
  chosen_spanish: guarda
  alternatives_spanish:
  - custodia
  - vigila
  lexicon: HALOT
  rationale: El participio expresa la idea de velar cuidadosamente por algo. «Guarda» es natural en español y mantiene la noción de restricción vigilante del habla.
- source_word: פִּיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - sus labios
  lexicon: HALOT
  rationale: «Boca» conserva el equivalente concreto de la imagen hebrea. Aunque «labios» aparece después, aquí «boca» refleja mejor פִּי/ו y mantiene el paralelismo con la primera cola.
- source_word: שֹׁמֵר
  english_pob_choice: preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - conserva
  lexicon: HALOT
  rationale: 'En esta construcción, el verbo expresa el resultado de guardar la boca: preservar la vida. «Preserva» comunica bien el valor resultativo sin perder la fuerza proverbial.'
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: HALOT
  rationale: En Proverbios, נֶפֶשׁ suele referirse a la vida o a la persona misma. «Su vida» evita imponer un sentido técnico de «alma» que el contexto no exige.
- source_word: פֹּשֵׂק
  english_pob_choice: opens wide
  chosen_spanish: abre demasiado
  alternatives_spanish:
  - abre en exceso
  - desenfrena
  lexicon: HALOT
  rationale: El verbo sugiere abrir ampliamente o apartar con exceso. «Abre demasiado» conserva la imagen corporal y comunica la falta de freno sin volverlo demasiado interpretativo.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - su hablar
  lexicon: HALOT
  rationale: Aquí «labios» mantiene el paralelismo con «boca» y reproduce con precisión la imagen hebrea de la palabra pronunciada.
- source_word: מְחִתָּה לוֹ
  english_pob_choice: comes to ruin
  chosen_spanish: cae en ruina
  alternatives_spanish:
  - trae ruina sobre sí
  - le viene ruina
  lexicon: HALOT
  rationale: La frase hebrea es compacta y admite varias equivalencias cercanas. «Cae en ruina» conserva la consecuencia proverbia sin añadir un sujeto explícito ajeno al original.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en sabiduría
  english_pob_reading: '''his life'' rather than ''his soul'' or ''himself'''
  chosen_spanish_reading: «su vida» en vez de «su alma» o «sí mismo»
  alternative_spanish_readings:
  - «su alma»
  - «sí mismo»
  rationale: La lectura sapiencial apunta a la vida concreta del hablante. En español, «su vida» evita una carga doctrinal posterior que no está marcada por el hebreo aquí.
  doctrine_reference: Anthropology in Wisdom Literature / נֶפֶשׁ
- issue: Naturaleza de la ruina final
  english_pob_reading: '''comes to ruin'' with note allowing ''brings destruction on himself'' / ''is ruin to him'''
  chosen_spanish_reading: «cae en ruina»
  alternative_spanish_readings:
  - «trae destrucción sobre sí»
  - «es ruina para él»
  rationale: El hebreo es elíptico y permite varias formulaciones cercanas. «Cae en ruina» es idiomático en español y conserva el carácter de consecuencia inevitable sin cerrar innecesariamente la ambigüedad del original.
  doctrine_reference: Wisdom proverb ellipsis / proverbial consequence
translation_notes:
  revision_awareness: Se siguió el resultado de alta concordancia del audit trail inglés sin revisiones aplicadas; la versión española mantiene la misma estructura proverbial y la misma ambigüedad controlada en מְחִתָּה לוֹ, con equivalencias idiomáticas naturales para el español.
  spanish_consistency_notes:
  - Se conservó el paralelismo boca/labios con términos concretos («boca», «labios») en lugar de generalizar a «habla».
  - Se evitó «alma» para נֶפֶשׁ conforme al uso sapiencial y al criterio auditado del inglés.
  - «Yahvé» no aparece porque el versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
