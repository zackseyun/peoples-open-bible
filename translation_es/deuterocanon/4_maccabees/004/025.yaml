translation:
  language: es
  text: Por tanto, puesto que sus decretos eran despreciados por el pueblo, él mismo obligaba, por medio de torturas, a cada uno de la nación, después de probar alimentos impuros, a renunciar[a] al judaísmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abjurar del judaísmo bajo juramento». El verbo puede llevar un matiz relacionado con juramento, aunque en el contexto encaja bien el sentido general «renunciar».
    reason: lexical_alternative
lexical_decisions:
- source_word: δόγματα
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - edictos
  - ordenanzas
  lexicon: LSJ
  rationale: En este contexto político, δόγματα designa mandatos u órdenes oficiales del gobernante. «Decretos» conserva el carácter autoritativo y funciona con naturalidad en español sin tecnicismo innecesario.
- source_word: κατεφρονεῖτο
  english_pob_choice: were being despised
  chosen_spanish: eran despreciados
  alternatives_spanish:
  - eran menospreciados
  - eran tratados con desprecio
  lexicon: LSJ
  rationale: El imperfecto pasivo expresa una acción continua o reiterada. «Eran despreciados» mantiene la fuerza negativa de καταφρονέω y resulta idiomático en español.
- source_word: διὰ βασάνων
  english_pob_choice: by tortures
  chosen_spanish: por medio de torturas
  alternatives_spanish:
  - mediante torturas
  - a través de torturas
  lexicon: LSJ
  rationale: La expresión señala coerción por tormento físico. «Por medio de torturas» preserva el instrumental y suena natural en español; el plural conserva el matiz de múltiples actos de tormento.
- source_word: ἕνα ἕκαστον τοῦ ἔθνους
  english_pob_choice: each one of the nation
  chosen_spanish: a cada uno de la nación
  alternatives_spanish:
  - a cada individuo de la nación
  - a cada uno del pueblo
  lexicon: LSJ
  rationale: La expresión distributiva enfatiza el trato individual. «De la nación» reproduce el referente colectivo de ἔθνος, entendido aquí como el pueblo judío en cuanto grupo.
- source_word: μιερῶν ... τροφῶν
  english_pob_choice: defiling foods
  chosen_spanish: alimentos contaminantes
  alternatives_spanish:
  - alimentos impuros
  - alimentos que contaminan
  - alimentos defiling
  lexicon: LSJ
  rationale: μιερός denota lo que contamina ritualmente o profana. «Contaminantes» comunica esa fuerza de impureza ritual sin imponer una terminología técnica posterior; «alimentos» mantiene un registro claro y natural.
- source_word: ἀπογευομένους
  english_pob_choice: after tasting
  chosen_spanish: después de probar
  alternatives_spanish:
  - después de gustar
  - tras probar
  lexicon: LSJ
  rationale: El participio temporal indica la secuencia de la acción coercitiva. «Después de probar» refleja el valor temporal y conserva la concreción del acto de gustar/probar.
- source_word: ἐξόμνυσθαι
  english_pob_choice: to renounce
  chosen_spanish: a renunciar
  alternatives_spanish:
  - a abjurar
  - a desavowar bajo juramento
  - a negar
  lexicon: LSJ
  rationale: El verbo puede implicar renegar o desmentir con matiz de juramento. «Renunciar» es la opción más clara en español y conserva el sentido principal sin forzar explícitamente el componente juramentado en el cuerpo del texto.
- source_word: τὸν Ἰουδαϊσμόν
  english_pob_choice: Judaism
  chosen_spanish: el judaísmo
  alternatives_spanish:
  - la religión judía
  - la forma de vida judía
  lexicon: LSJ
  rationale: El sustantivo nombra de manera directa la identidad y práctica judías. «El judaísmo» preserva la formulación del original y la decisión inglesa, sin restringir indebidamente el alcance a solo creencia o solo etnicidad.
theological_decisions:
- issue: Alcance de τὸν Ἰουδαϊσμόν
  english_pob_reading: Judaism
  chosen_spanish_reading: el judaísmo
  alternative_spanish_readings:
  - la forma de vida judía
  - la religión judía
  rationale: El texto describe una apostasía forzada respecto de la identidad y práctica judías bajo persecución. «El judaísmo» mantiene la transparencia lexical del original sin reducir el término únicamente a religión o expandirlo solo a costumbre étnica.
  doctrine_reference: 'Translation philosophy: primacía del idioma original y transparencia léxica.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del contexto inglés: se tradujo el participio con valor temporal como «después de probar», en lugar de una fórmula más literal pero menos natural. También se conserva la idea de coerción individual («a cada uno de la nación») y el matiz de contaminación ritual en «alimentos contaminantes».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Judaísmo» se conserva como término técnico-transparente, en continuidad con la decisión inglesa documentada.
  - El tono es sobrio y apto para lectura pública, sin inflar el lenguaje más allá del griego.
