translation:
  language: es
  text: Un rey sabio aventa a los impíos[a] y hace girar la rueda sobre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dispersa a los impíos»; el verbo hebreo puede denotar dispersión, pero aquí probablemente evoca la imagen de aventar.
    reason: lexical_alternative
  - marker: b
    text: Lit. «y hace volver/retornar la rueda sobre ellos»; probablemente es una imagen tomada de la trilla, por eso se traduce de manera más natural como «hace girar la rueda sobre ellos».
    reason: cultural_note
lexical_decisions:
- source_word: מְזָרֶה
  english_pob_choice: winnows
  chosen_spanish: aventa
  alternatives_spanish:
  - avienta
  - avienta el grano
  - zarandea
  lexicon: HALOT
  rationale: El hebreo זרה evoca el aventado o winnowing agrícola, no solo una dispersión genérica. «Aventa» conserva la imagen concreta y resulta natural en español bíblico contemporáneo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  - los perversos
  lexicon: HALOT
  rationale: רשעים designa una clase moral; «los impíos» mantiene ese valor colectivo y es un equivalente bíblico bien establecido en español.
- source_word: מֶלֶךְ חָכָם
  english_pob_choice: a wise king
  chosen_spanish: Un rey sabio
  alternatives_spanish:
  - El rey sabio
  - Un rey que es sabio
  lexicon: HALOT
  rationale: La construcción proverbial pide un sintagma nominal breve e indefinido. «Un rey sabio» reproduce bien el orden natural del español y la forma proverbial.
- source_word: וַיָּשֶׁב
  english_pob_choice: turns the wheel
  chosen_spanish: hace pasar
  alternatives_spanish:
  - gira
  - vuelve
  - hace girar
  lexicon: HALOT
  rationale: El verbo causativo de שוב, con «rueda», expresa movimiento sobre el objeto. «Hace pasar» comunica de modo natural la acción de mover la rueda sobre ellos sin perder la fuerza de la imagen de trilla.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición על con el instrumento sugiere un movimiento por encima/de sobre. «Sobre ellos» conserva la imagen y la carga judicial del gesto.
- source_word: אוֹפָן
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - una rueda
  - la rueda de trillar
  lexicon: HALOT
  rationale: אוֹפָן significa literalmente «rueda». En el texto principal se mantiene la forma simple; no se explicita «de trillar» para no añadir más de lo que el hebreo dice, aunque el contexto agrícola es probable.
theological_decisions:
- issue: Imagen concreta de juicio y trilla
  english_pob_reading: Retain the concrete agricultural/judicial metaphor ('winnows' / 'turns the wheel over them') rather than flattening it into an abstract statement about punishment.
  chosen_spanish_reading: Conservar la metáfora agrícola/judicial («aventa» / «hace pasar la rueda sobre ellos») en vez de convertirla en una explicación abstracta del castigo.
  alternative_spanish_readings:
  - Un rey sabio separa a los impíos y los castiga
  - Un rey sabio dispersa a los impíos y los aplasta
  rationale: El proverbio usa una imagen vívida de trilla para discernimiento y juicio. Mantenerla respeta el género sapiencial y evita introducir una precisión doctrinal no explicitada en el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado más reciente del POB en inglés, que prefirió «turns the wheel over them» frente a «drives the wheel over them». En español se optó por «hace pasar la rueda sobre ellos» para conservar esa naturalidad revisada sin perder la imaginería de trilla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - «Impíos» se usa como término colectivo moral, equivalente al inglés «the wicked».
  - «Aventa» preserva el valor agrícola de זרה sin introducir una glosa interpretativa en el texto principal.
  - No se añadió «de trillar» en el cuerpo del verso para respetar la concisión del hebreo y dejar la imagen abierta.
