base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/006.yaml
  text: He brought the Asherah out from the house of Yahweh[a], outside Jerusalem, to the Kidron Valley, and burned it in the Kidron Valley, and beat it to dust, and threw its dust on the graves of the common people.
  footnotes:
