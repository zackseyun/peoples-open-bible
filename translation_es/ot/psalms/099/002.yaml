review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente el sentido del hebreo: Yahvé como nombre divino, ubicación en Sion, grandeza de Yahvé y su exaltación por encima de todos los pueblos. Sin embargo, la nota al pie no preserva bien la lógica del inglés auditado: presenta como texto principal ''sobre'' y como alternativa ''por encima de'', cuando el POB inglés hace principal ''above'' y alternativa ''over''. En español, para reflejar mejor esa distinción, conviene usar ''por encima de todos los pueblos'' como texto principal y dejar ''sobre todos los pueblos'' como alternativa.'
  spanish_quality_summary: El español es claro, natural y digno. 'Yahvé es grande en Sion' suena bien, y 'por encima de todos los pueblos' expresa mejor la superioridad comparativa ligada a 'exaltado' que 'sobre', que en español puede sonar más espacial o de autoridad. El resto del verso es plenamente legible.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; בְצִיּוֹן → ''en Sion''; עַמִּים → ''pueblos''. No hay conflicto doctrinal. El único ajuste necesario es la correspondencia entre el texto principal y la alternativa léxica de עַל.'
  issues:
  - severity: medium
    issue: La nota léxica invierte la relación principal/alternativa documentada en el POB inglés para עַל כָּל הָעַמִּים.
    rationale: El inglés usa como texto principal 'above all the peoples' y conserva 'over all the peoples' como alternativa. En el borrador español, el texto principal es 'sobre todos los pueblos' y la alternativa es 'por encima de todos los pueblos', lo cual desajusta la auditoría léxica. Dado que 'por encima de' refleja mejor 'above', debería pasar al texto principal y 'sobre' quedar como alternativa.
  revised_spanish_text: Yahvé es grande en Sion[a], y él es exaltado por encima de todos los pueblos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: "sobre todos los pueblos"; alternativamente, "por encima de todos los pueblos".'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción principal para alinearla con la decisión léxica auditada del POB inglés: ''above all the peoples'' se representa mejor como ''por encima de todos los pueblos'', mientras que ''sobre todos los pueblos'' queda como alternativa. No se requieren otros cambios.'
