revisions:
- from: Entonces Sanbalat me envió por quinta vez a su siervo[a], con una carta abierta en su mano.
  to: 'Entonces Sanbalat me envió a su siervo por quinta vez de esta manera: con una carta abierta[a] en su mano.'
  rationale: Se restaura 'de esta manera' para reflejar fielmente כַּדָּבָר הַזֶּה, y se reubica la nota al pie en 'abierta' porque la alternativa léxica corresponde a פְּתוּחָה, no a 'siervo'. También se ajusta ligeramente el orden para que el español suene natural y mantenga todos los elementos del original.
