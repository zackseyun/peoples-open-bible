revisions:
- from: 'Ordena a Aarón y a sus hijos[a], diciendo: Esta es la ley[b] del holocausto: el holocausto mismo permanecerá sobre su hogar de fuego[c] en el altar toda la noche hasta la mañana, y el fuego del altar será mantenido encendido sobre él.'
  to: 'Ordena a Aarón y a sus hijos, diciendo: Esta es la ley del holocausto[a]: el holocausto mismo permanecerá sobre su fogón[b] en el altar toda la noche hasta la mañana, y el fuego del altar será mantenido encendido sobre él.'
  rationale: 'Se corrige «hogar de fuego» por «fogón» para una expresión española más natural y fiel al sentido concreto de מוֹקְדָה. También se realinean las notas con el expediente inglés: la alternativa relevante se aplica a «ley del holocausto», y se conserva la nota sobre el lugar ardiente del altar. No se requieren cambios doctrinales ni adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativo directo, fórmula legal-sacrificial, énfasis en «el holocausto mismo», duración temporal durante la noche, y carácter prescriptivo de mantener el fuego. Sin embargo, «hogar de fuego» no representa bien el valor concreto de מוֹקְדָה en español bíblico natural; suena poco idiomático y añade «de fuego» innecesariamente. Además, la nota a en español no corresponde al tipo de alternativa preservada por el inglés POB para ese segmento, mientras que falta una nota que recoja la alternativa inglesa sobre «This is the instruction for the burnt offering».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «hogar de fuego» resulta extraño en español neutro y disminuye la legibilidad. «Será mantenido encendido» es comprensible, aunque «se mantendrá encendido» suena más natural; sin embargo, la pasiva perifrástica todavía es aceptable. La nota «sus descendientes varones» no mejora la lectura y es menos adecuada que una alternativa más directa como «Aarón y sus hijos».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego; «holocausto» y «ley» son defendibles según el expediente inglés. La principal corrección léxica requerida es para מוֹקְדָה, donde conviene una solución española natural como «fogón» con nota que preserve «lugar de combustión».'
  issues:
  - severity: medium
    issue: «hogar de fuego» para מוֹקְדָה es poco natural en español
    rationale: Aunque intenta reflejar «hearth», en español bíblico general «hogar de fuego» suena forzado. «Fogón» o una formulación equivalente comunica mejor el lugar donde arde la ofrenda, preservando la imagen concreta.
  - severity: medium
    issue: La nota [a] no sigue el expediente inglés para אַהֲרֹן וְאֶת־בָּנָיו
    rationale: El inglés POB no preserva «descendants/male descendants» como alternativa; la nota correspondiente está vinculada a זֹאת תּוֹרַת. Debe ajustarse la distribución de notas para reflejar el rastro auditado.
  - severity: low
    issue: Falta en nota la alternativa «instrucción para el holocausto»
    rationale: El expediente inglés conserva explícitamente esa alternativa para תּוֹרַת הָעֹלָה. Conviene mantenerla en español para preservar la justificación léxica documentada.
