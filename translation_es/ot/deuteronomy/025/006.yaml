translation:
  language: es
  text: Y acontecerá que el primogénito que ella dé a luz se levantará en nombre de su hermano muerto[a], para que no sea borrado su nombre de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se levantará sobre el nombre de su hermano muerto»; es decir, continuará su linaje y su lugar dentro de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primer hijo
  - el hijo primogénito
  lexicon: HALOT
  rationale: בכור nombra al hijo varón nacido primero; «primogénito» preserva el valor legal y familiar del término mejor que una expresión más explicativa.
- source_word: תֵּלֵד
  english_pob_choice: whom she bears
  chosen_spanish: que ella dé a luz
  alternatives_spanish:
  - que ella pare
  - que ella tenga
  lexicon: HALOT
  rationale: El verbo femenino singular señala a la viuda como sujeto. «Dar a luz» es natural en español y mantiene explícita la acción maternal sin añadir interpretación.
- source_word: יָקוּם עַל שֵׁם
  english_pob_choice: shall rise up in the name of
  chosen_spanish: se levantará sobre el nombre de
  alternatives_spanish:
  - tomará el nombre de
  - permanecerá en el nombre de
  - se alzará en nombre de
  lexicon: HALOT
  rationale: La POB inglesa revirtió una paráfrasis más interpretativa para acercarse al hebreo. En español, «se levantará sobre el nombre de» conserva la imagen y la fórmula legal, aunque suene menos idiomática que una solución más explicativa.
- source_word: אָחִיו הַמֵּת
  english_pob_choice: his dead brother
  chosen_spanish: su hermano muerto
  alternatives_spanish:
  - su hermano fallecido
  - su hermano difunto
  lexicon: HALOT
  rationale: Es una correspondencia directa y sobria del sintagma constructo, sin suavizar el registro.
- source_word: יִמָּחֶה
  english_pob_choice: may not be blotted out
  chosen_spanish: no sea borrado
  alternatives_spanish:
  - no sea borrado de la memoria
  - no sea eliminado
  - no sea borrado con borrón
  lexicon: HALOT
  rationale: El nifal de מחה aplicado al nombre retiene la imagen de «borrar». «No sea borrado» mantiene la resonancia bíblica y es claro en español.
- source_word: שְׁמ֖וֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su memoria
  lexicon: HALOT
  rationale: «Nombre» conserva el sentido de linaje, representación y memoria pública que está en juego en el contexto legal.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: «De Israel» reproduce de forma directa la idea de exclusión o borrado desde el pueblo; en español suena más natural que «de entre Israel» sin perder el sentido.
theological_decisions:
- issue: Sentido de יָקוּם עַל שֵׁם en la ley de levirato
  english_pob_reading: The child carries on the deceased brother's line and name, not necessarily the exact personal name.
  chosen_spanish_reading: El hijo continúa el nombre y la representación legal del hermano muerto, no necesariamente su nombre personal exacto.
  alternative_spanish_readings:
  - será llamado por el nombre del hermano muerto
  - tomará literalmente el mismo nombre personal
  rationale: La frase hebrea en este contexto legal apunta a la continuación del linaje y la memoria del difunto dentro de Israel. La traducción evita reducirla a mera imposición de un nombre propio y conserva la tensión entre nombre, herencia y permanencia social.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La versión final sigue la revisión más reciente del POB inglés, que cambió una paráfrasis de tipo «succeed to the name of» por «rise up in the name of» para acercarse más a יָקוּם עַל שֵׁם sin expandir el sentido. La redacción española intenta respetar esa decisión formal y la tensión legal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se escogió «primogénito» en lugar de «primer hijo» por su fuerza legal y genealógica.
  - Se conservó «nombre» en vez de sustituirlo por «memoria» o «linaje», porque el texto combina nombre, descendencia y permanencia social.
  - Se usó «de Israel» para reflejar la construcción מִיִּשְׂרָאֵל con naturalidad en español.
