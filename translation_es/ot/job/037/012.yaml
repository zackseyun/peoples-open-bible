  text: וְ/ה֤וּא מְסִבּ֨וֹת מִתְהַפֵּ֣ךְ ב/תחבולת/ו לְ/פָעֳלָ֑/ם כֹּ֖ל אֲשֶׁ֥ר יְצַוֵּ֓/ם עַל פְּנֵ֖י תֵבֵ֣ל אָֽרְצָ/ה׀׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/037/012.yaml
  text: It turns about this way and that by his guidance[c][b][a], to accomplish all that he commands them over the face of the inhabited world of the earth.
  footnotes:
  - marker: a
    text: Or 'in circuits' or 'round about'; the Hebrew emphasizes repeated circling motion.
    reason: lexical_alternative
  - marker: b
    text: Or 'by his steering' or 'by his direction'; the Hebrew term suggests skillful guidance or control.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the inhabited world, earthward/landward,' a layered expression for the terrestrial world.
    reason: lexical_alternative
