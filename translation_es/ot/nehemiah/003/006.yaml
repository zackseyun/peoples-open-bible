    rationale: 'Aunque las decisiones léxicas reconocen dos verbos (קֵרֻהוּ y וַיַּעֲמִידוּ), el texto final solo expresa una acción de instalación. Conviene diferenciar al menos mediante objetos distintos: vigas / puertas.'
  - severity: low
