revisions:
- from: Pero de ningún modo cesó de su arrogancia[a]; antes bien, se llenaba aún más de orgullo, respirando fuego en su ira contra los judíos y ordenando que se apresurara el viaje. Entonces sucedió que cayó del carro mientras avanzaba con ímpetu, y, al verse envuelto en aquella caída grave[b], todos los miembros de su cuerpo se dislocaron.
  to: Pero de ningún modo dejó de ser arrogante[a]; antes bien, estaba aún más lleno de orgullo, respirando fuego en su ira contra los judíos y ordenando que se apresurara el viaje. Entonces sucedió que cayó del carro mientras avanzaba con ímpetu, y, al verse envuelto en tan grave caída[b], todos los miembros de su cuerpo se dislocaron.
  rationale: Se corrige una construcción poco idiomática («cesó de su arrogancia») por una formulación española natural que conserva la fuerza del griego; se mejora la naturalidad de la cláusula sobre la caída; y se reparan las notas para que ofrezcan alternativas en español y no en inglés.
