translation:
  language: es
  text: 'Y dijo Lamec a sus esposas: “Ada y Zila, oigan mi voz; esposas de Lamec, escuchen mi palabra: porque he matado a un hombre por herirme[a], y a un joven por golpearme[b].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘he matado a un hombre por mi herida’. El hebreo puede leerse más literalmente con el sustantivo ‘herida’ en lugar de la expresión verbal ‘por herirme’.
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden las palabras de Lamec como una amenaza o jactancia general (‘mataría a un hombre...’) en vez de un relato de una muerte real. También puede leerse más literalmente ‘y a un joven por mi golpe’.
    reason: alternative_reading
lexical_decisions:
- source_word: לְנָשָׁיו
  english_pob_choice: to his wives
  chosen_spanish: a sus mujeres
  alternatives_spanish:
  - a sus esposas
  lexicon: HALOT
  rationale: אִשָּׁה en plural con sufijo posesivo se refiere aquí a las esposas de Lamec. En español, ‘mujeres’ mantiene la literalidad semántica del hebreo y evita añadir una terminología más eclesiástica o interpretativa que el contexto no exige. ‘Esposas’ sería claro, pero menos cercano al giro lexical del original.
- source_word: שְׁמַעַן
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  lexicon: HALOT
  rationale: Es un imperativo plural de שׁמע. ‘Oigan’ conserva la fuerza directa y el paralelismo con el segundo imperativo. Se prefiere a un calco más rígido para que el español suene natural sin perder el mandato poético.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - lo que digo
  lexicon: HALOT
  rationale: קוֹל significa literalmente ‘voz’ o ‘sonido’. ‘Mi voz’ reproduce la imagen concreta del hebreo y conserva el paralelismo con ‘mi palabra’.
- source_word: הַאְזֵנָּה
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - presten oído
  - atiendan
  lexicon: HALOT
  rationale: El hifil de אזן implica escuchar con atención. ‘Escuchen’ es idiomático en español y comunica bien la intensificación respecto del primer imperativo. ‘Presten oído’ sería más marcado, pero algo más forzado.
- source_word: אִמְרָתִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi dicho
  - mi decir
  lexicon: HALOT
  rationale: אִמְרָה puede significar enunciado, palabra o discurso. ‘Mi palabra’ es breve, natural y mantiene el singular poético del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o contenido de la declaración. ‘Porque’ expresa bien la relación causal en español y mantiene la tensión sin reinterpretarla.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un varón
  - a una persona
  lexicon: HALOT
  rationale: אִישׁ suele significar ‘hombre’. En contraste con יֶלֶד, conservar ‘hombre’ mantiene la oposición de edad/estatus que el verso construye.
- source_word: הָרַגְתִּי
  english_pob_choice: I have killed
  chosen_spanish: he matado
  alternatives_spanish:
  - maté
  - he dado muerte
  lexicon: HALOT
  rationale: El qatal puede leerse como pasado simple o perfecto. ‘He matado’ preserva el peso resultativo y la autoexposición del hablante en un registro bíblico natural para el español.
- source_word: לְפִצְעִי
  english_pob_choice: for wounding me
  chosen_spanish: por herirme
  alternatives_spanish:
  - por mi herida
  - por lesionarme
  - a causa de herirme
  lexicon: HALOT
  rationale: La preposición ל con el sustantivo ‘herida’ y sufijo de primera persona es idiomática y ambigua. Siguiendo el sentido contextual de causa o represalia, ‘por herirme’ comunica con claridad la relación sin perder el posible matiz de ‘herida’ como sustantivo subyacente. No se resuelve la ambigüedad en una sola dirección más allá de lo que el hebreo asegura.
- source_word: יֶלֶד
  english_pob_choice: a young man
  chosen_spanish: a un joven
  alternatives_spanish:
  - a un muchacho
  - a un muchacho joven
  - a un niño
  lexicon: HALOT
  rationale: יֶלֶד puede designar niño, muchacho o joven. En paralelo con אִישׁ y dentro de un dicho violento, ‘joven’ mantiene la oposición con ‘hombre’ sin sugerir necesariamente un niño pequeño.
- source_word: לְחַבֻּרָתִי
  english_pob_choice: for striking me
  chosen_spanish: por golpearme
  alternatives_spanish:
  - por mi golpe
  - por herirme
  - por causarme un moretón
  lexicon: HALOT
  rationale: חַבּוּרָה puede significar golpe, magulladura, moretón o herida. Igual que en el primer hemistiquio, la construcción con ל se entiende mejor en español como motivo u ocasión de represalia. ‘Por golpearme’ diferencia este paralelo de ‘por herirme’ y comunica el sentido de manera natural.
theological_decisions:
- issue: 'Sentido del gesto de Lamec: represalia, amenaza o declaración de un hecho'
  english_pob_reading: The line is rendered as retaliatory/casual language ('for wounding me ... for striking me') without adding explicit self-defense language.
  chosen_spanish_reading: La línea se traduce con lenguaje de represalia o causalidad (‘por herirme... por golpearme’) sin añadir una justificación explícita de defensa propia.
  alternative_spanish_readings:
  - He matado a un hombre porque me hirió, implicando defensa propia
  - Maté a un hombre por mi herida...
  rationale: El qatal hebreo permite entender una acción referida como realizada, y las frases con ל expresan con naturalidad causa u ocasión. El español conserva esa ambigüedad sin convertirla en una afirmación de defensa propia ni en una amenaza modal que el texto no exige de forma explícita.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla más allá del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la línea de audit trail inglesa, sin cambios de fondo respecto de la revisión más reciente: se mantiene la ambigüedad del motivo y del valor exacto de las frases con ל, y se conserva el paralelismo poético con dos imperativos y dos hemistiquios de represalia.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto cuando el Tetragrámaton no aparece aquí; por tanto no hay ajuste necesario en este versículo.
  - Se mantiene ‘hombre’ / ‘joven’ para conservar el contraste léxico del hebreo.
  - ‘Mi voz’ y ‘mi palabra’ reproducen el paralelismo semítico sin añadir interpretaciones.
  - El registro es bíblico-formal, pero con español natural para lectura pública.
