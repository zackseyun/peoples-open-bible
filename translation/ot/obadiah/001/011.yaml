theological_decisions:
- issue: Interpretive force of Edom's posture in עמד מנגד
  chosen_reading: Edom is condemned for culpable non-intervention that aligns him morally with Jerusalem's attackers.
  alternative_readings:
  - A merely descriptive statement that Edom was physically present at a distance
  rationale: The verse climaxes with 'you too were like one of them,' showing that detached standing is not neutral observation but participation by omission. The translation therefore uses 'stood aside' to preserve the prophetic accusation.
