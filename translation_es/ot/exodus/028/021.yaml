translation:
  language: es
  text: Y las piedras serán según los nombres de los hijos de Israel[a], doce según sus nombres. Serán como grabados de sello, cada cual según su nombre[c][b], para las doce tribus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a los nombres de los hijos de Israel»; el hebreo dice literalmente que «las piedras serán sobre/según los nombres de los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «con grabados de sello» o «grabadas con el grabado de un sello».
    reason: lexical_alternative
  - marker: c
    text: «Hijos de Israel» es la expresión hebrea; algunas traducciones la vierten «israelitas» o «hijos de Jacob/Israel», pero aquí se conserva la formulación formal del texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲבָנִים
  english_pob_choice: And the stones
  chosen_spanish: Y las piedras
  alternatives_spanish:
  - Ahora las piedras
  - Las piedras
  lexicon: HALOT
  rationale: Se conserva la conjunción y el artículo definido porque el contexto inmediato ya identifica las piedras del pectoral; en español, «Y las piedras» es natural y refleja la continuidad con la instrucción anterior.
- source_word: תִּהְיֶיןָ
  english_pob_choice: shall be according to
  chosen_spanish: estarán según
  alternatives_spanish:
  - serán según
  - estarán conforme a
  lexicon: HALOT
  rationale: El hebreo expresa relación/correspondencia más que simple existencia. «Estarán según» comunica esa adecuación sin forzar una paráfrasis excesiva.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: according to the names of the sons of Israel
  chosen_spanish: según los nombres de los hijos de Israel
  alternatives_spanish:
  - con los nombres de los hijos de Israel
  - conforme a los nombres de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión formal «hijos de Israel» por su fidelidad al hebreo y su valor pactual. «Según» reproduce bien el valor relacional de עַל en este contexto de correspondencia.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - las doce
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: עַל שְׁמֹתָם
  english_pob_choice: according to their names
  chosen_spanish: según sus nombres
  alternatives_spanish:
  - por sus nombres
  - conforme a sus nombres
  lexicon: HALOT
  rationale: La repetición subraya la correspondencia exacta entre cada piedra y cada nombre tribal; «según sus nombres» es idiomático y fiel.
- source_word: פִּתּוּחֵי חוֹתָם
  english_pob_choice: like signet engravings
  chosen_spanish: como grabados de sello
  alternatives_spanish:
  - como grabados de anillo-sello
  - con grabado de sello
  lexicon: HALOT
  rationale: El sintagma nominal indica el tipo de grabado, no solo el acto de grabar. «Grabados de sello» preserva la imagen técnica del sello/insignia sin sonar artificioso en español.
- source_word: אִישׁ עַל שְׁמוֹ
  english_pob_choice: each according to his name
  chosen_spanish: cada una según su nombre
  alternatives_spanish:
  - cada una conforme a su nombre
  - cada piedra según su nombre
  lexicon: HALOT
  rationale: Aunque אִישׁ es masculino en hebreo, el referente inmediato en español son las piedras; por eso «cada una» evita una discordancia innecesaria. «Según su nombre» conserva la distribución uno por uno.
- source_word: תִּהְיֶיןָ לִשְׁנֵי עָשָׂר שָׁבֶט
  english_pob_choice: for the twelve tribes
  chosen_spanish: para las doce tribus
  alternatives_spanish:
  - pertenecientes a las doce tribus
  - de las doce tribus
  lexicon: HALOT
  rationale: La clausula final expresa referencia/función representativa. «Para las doce tribus» es breve, natural y fiel al sentido representacional.
theological_decisions:
- issue: Expresión pactual genealógica בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos varones de Israel
  - israelitas
  rationale: Se conserva la fórmula genealógica y pactual del hebreo sin neutralizarla. «Hijos de Israel» es comprensible en español y mantiene la forma tradicional del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Correspondencia simbólica de las piedras con las tribus
  english_pob_reading: for the twelve tribes
  chosen_spanish_reading: para las doce tribus
  alternative_spanish_readings:
  - de las doce tribus
  - representando a las doce tribus
  rationale: El texto no solo enumera objetos, sino su función representativa en el pectoral sacerdotal. «Para» expresa finalidad/referencia sin añadir una explicación interpretativa ajena al verso.
  doctrine_reference: Exodus 28:21 context; priestly breastpiece symbolism
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del audit trail inglés, que movió la idea de mera existencia a una relación de conformidad ('according to') y precisó el sintagma de sello como frase nominal ('like signet engravings'). La versión española refleja esa precisión sin introducir un calco áspero.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» por coherencia con el tratamiento pactual y genealógico del inglés POB.
  - Se eligió «según» para עַל en ambos miembros del verso para conservar la repetición de correspondencia.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no pertinente al verso.
  - El distributivo se resolvió con «cada una» para concordar con «las piedras» en español, manteniendo el sentido singular distributivo del hebreo.
