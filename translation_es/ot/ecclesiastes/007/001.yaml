translation:
  language: es
  text: Mejor es el buen nombre que el buen aceite[a], y el día de la muerte que el día de su nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que el perfume fino’ o ‘que el precioso ungüento’; el hebreo dice literalmente ‘que el buen aceite’.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: mejor / buen
  alternatives_spanish:
  - bueno
  - excelente
  lexicon: HALOT
  rationale: En la primera cola, el hebreo presenta una construcción comparativa donde טוב conserva su valor adjetival de 'bueno', mientras la comparación la expresa מִן. En español conviene reflejar el contraste con 'mejor es' y mantener luego 'buen aceite' para respetar el paralelismo léxico sin forzar una paráfrasis.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - renombre
  lexicon: HALOT
  rationale: '''Nombre'' es el equivalente directo y mantiene la frase proverbial de sabiduría. En español también puede implicar reputación, por lo que conserva la carga semántica sin añadir una explicación interpretativa al texto principal.'
- source_word: מִשֶּׁמֶן טוֹב
  english_pob_choice: than good oil
  chosen_spanish: que el buen aceite
  alternatives_spanish:
  - que el perfume fino
  - que el precioso ungüento
  lexicon: HALOT
  rationale: שֶׁמֶן significa literalmente 'aceite'. Como el texto hebreo no especifica perfume ni ungüento, 'aceite' preserva la imagen concreta; 'buen' reproduce טוב. La nota a pie de página recoge la posibilidad idiomática de perfume/ungüento sin borrar la literalidad.
- source_word: וְיוֹם הַמָּוֶת
  english_pob_choice: and the day of death
  chosen_spanish: y el día de la muerte
  alternatives_spanish:
  - y un día de muerte
  lexicon: HALOT
  rationale: La expresión es proverbial y definida en hebreo; 'el día de la muerte' es la traducción más natural y fiel en español, conservando el tono sentencioso.
- source_word: מִיּוֹם
  english_pob_choice: than the day of
  chosen_spanish: que el día de
  alternatives_spanish:
  - más que el día de
  lexicon: HALOT
  rationale: La preposición marca comparación y en español requiere una estructura comparativa explícita. 'Que' permite sostener el paralelismo de ambas mitades de la sentencia con fluidez natural.
- source_word: הִוָּלְדוֹ
  english_pob_choice: one's birth
  chosen_spanish: el nacimiento de uno
  alternatives_spanish:
  - su nacimiento
  - haber nacido
  lexicon: HALOT
  rationale: El sustantivo verbal con sufijo 3ms indica literalmente 'su ser nacido'. Dado que la revisión inglesa optó por 'one's birth' para reflejar el valor genérico del sufijo, 'de uno' comunica ese sentido representativo sin forzar un masculino posesivo en español. 'El nacimiento de uno' conserva la abstracción del hebreo mejor que 'su nacimiento' en un proverbio de aplicación general.
theological_decisions:
- issue: Valor genérico del sufijo masculino singular en הִוָּלְדוֹ
  english_pob_reading: one's birth
  chosen_spanish_reading: el nacimiento de uno
  alternative_spanish_readings:
  - su nacimiento
  - su ser nacido
  rationale: El hebreo usa un sufijo masculino singular, pero en el dicho sapiencial funciona de manera representativa y genérica. La redacción española evita neutralizar indebidamente la forma original y, al mismo tiempo, expresa el alcance universal del proverbio con 'de uno'.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagen concreta de 'aceite' frente a 'perfume/ungüento'
  english_pob_reading: good oil
  chosen_spanish_reading: buen aceite
  alternative_spanish_readings:
  - perfume fino
  - precioso ungüento
  rationale: No hay base textual para sustituir el sustantivo literal 'aceite' por una glosa más interpretativa en el cuerpo del texto. La alternativa idiomática queda documentada en nota para no perder la posible connotación de lujo u honor.
  doctrine_reference: Lexical transparency policy
translation_notes:
  revision_awareness: El registro inglés pasó por una revisión que cambió 'his birth' a 'one's birth' para reflejar mejor el sentido genérico del sufijo hebreo. La versión española sigue esa decisión con 'el nacimiento de uno', manteniendo a la vez la literalidad de 'aceite' y dejando la lectura más idiomática en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - '''Nombre'' conserva el paralelismo proverbial y evita sustituirlo por una paráfrasis interpretativa como ''reputación'' en el texto principal.'
  - La comparación se expresa con 'mejor es... que...', una estructura natural en español que respeta el paralelismo hebreo.
  - No se introduce 'Cristo', 'Señor' ni vocabulario teológico ajeno al versículo.
