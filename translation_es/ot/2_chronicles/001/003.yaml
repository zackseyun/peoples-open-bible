translation:
  language: es
  text: Así que Salomón y toda la asamblea con él fueron al lugar alto[a] que estaba en Gabaón, porque allí estaba la tienda de reunión[b] de Dios, que Moisés, siervo de Yahvé, había hecho en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el santuario en la altura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el tabernáculo de reunión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se dirigieron
  - fueron
  lexicon: HALOT
  rationale: El hebreo narra el avance de la acción con wayyiqtol de הלך. En español, «fueron» comunica ese movimiento de forma natural y pública, sin añadir una dirección no explicitada.
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad reunida
  lexicon: HALOT
  rationale: קהל designa al grupo reunido. «Asamblea» preserva el sentido corporativo y evita una terminología más eclesiástica que podría sonar anacrónica aquí.
- source_word: לַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: el lugar alto
  alternatives_spanish:
  - el alto lugar
  - el santuario en la altura
  lexicon: HALOT
  rationale: במה alude a un lugar elevado de culto. «Lugar alto» conserva el valor literal y el trasfondo cultual sin imponer de entrada una evaluación negativa, dado el contexto legítimo de Gabaón.
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gabaón
  - en Gibeón
  lexicon: HALOT
  rationale: Se translitera el topónimo con la forma hispana común «Gabaón», más natural para lectura bíblica en español.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «tent of meeting» por transparencia, en español «tabernáculo de reunión» comunica con claridad la función cultual establecida del recinto. Se mantiene la relación con מוֹעֵד mediante «de reunión».
- source_word: הָאֱלֹהִים
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - de parte de Dios
  lexicon: HALOT
  rationale: 'La construcción genitiva se conserva de modo directo: «tabernáculo de reunión de Dios». No se atenúa la posesión/relación expresada por el hebreo.'
- source_word: עָשָׂה
  english_pob_choice: had made
  chosen_spanish: había hecho
  alternatives_spanish:
  - había construido
  - había fabricado
  lexicon: HALOT
  rationale: El pluscuamperfecto español reproduce el valor anterior respecto al momento narrativo principal. «Había hecho» sigue de cerca el verbo עשה sin sobreespecificar el tipo de acción.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of the LORD
  chosen_spanish: el esclavo de Yahvé
  alternatives_spanish:
  - el siervo de Yahvé
  - el servidor de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de עבד con «esclavo», coherente con la política POB cuando el término tiene peso de pertenencia/servicio vinculado al original. En este título honorífico aplicado a Moisés, la expresión conserva la tensión entre estatus de servicio y fidelidad. No se suaviza a «siervo» sin base textual específica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», en lugar de la sustitución tradicional «Señor». Esto preserva el nombre propio divino revelado en el texto fuente.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  lexicon: HALOT
  rationale: Aquí «desierto» es un equivalente español claro y natural para el ámbito narrativo de Israel. Aunque «wilderness» suele renderizarse como «desierto» o «desierto/ermos», en este contexto la referencia histórica es suficientemente reconocible sin perder fidelidad.
theological_decisions:
- issue: Rendering of במה in a context of legitimate worship before the temple
  english_pob_reading: high place
  chosen_spanish_reading: lugar alto
  alternative_spanish_readings:
  - lugar alto
  - santuario en la altura
  - alto lugar
  rationale: Se conserva la designación literal sin convertirla en juicio teológico negativo. En este versículo, el lugar alto de Gabaón funcionaba como sitio legítimo de adoración antes de la construcción del templo; por eso la traducción debe preservar esa tensión histórica.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se mantiene el nombre propio divino en forma transliterada para no ocultar el Tetragrámaton detrás de un título. Esto sigue la política doctrinal del POB y evita la sustitución tradicional por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Title applied to Moses: עֶבֶד יְהוָה'
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el esclavo de Yahvé
  alternative_spanish_readings:
  - el siervo de Yahvé
  - el servidor de Yahvé
  rationale: Aunque en español «siervo» es la opción más habitual en registros bíblicos, aquí se conserva «esclavo» para reflejar el peso semántico de עבד y la práctica POB de no suavizar la fuerza léxica cuando el original la carga. El contexto honorífico de Moisés queda intacto sin perder la relación de pertenencia y servicio.
  doctrine_reference: POB lexical policy on δοῦλος/עבד when forceful
translation_notes:
  revision_awareness: Revisado a la luz del paquete fuente hebreo, la traducción inglesa POB y sus decisiones léxicas. No se detectaron revisiones aplicadas en la pasada más reciente; por tanto, el borrador español sigue la lectura estable y conserva las tensiones documentadas, especialmente en במה, אֹהֶל מוֹעֵד y עֶבֶד יְהוָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Asamblea» se mantiene para הַקָּהָל en contexto histórico.
  - «Lugar alto» conserva el valor cultual de במה sin sobreinterpretación.
  - «Tabernáculo de reunión» comunica אֹהֶל מוֹעֵד con claridad en español.
  - Se preserva el pluscuamperfecto «había hecho» para la anterioridad relativa del relativo hebreo.
