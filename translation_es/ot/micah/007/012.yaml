translation:
  language: es
  text: Ese día vendrán a ti desde Asiria y las ciudades de Egipto[a], y desde Egipto hasta el Río[b], de mar a mar y de monte a monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo מָצוֹר también puede entenderse como «fortaleza», «asedio» o «ciudad fortificada», en vez de un nombre para Egipto.
    reason: lexical_alternative
  - marker: b
    text: «El Río» probablemente se refiere al Éufrates.
    reason: cross_reference
lexical_decisions:
- source_word: י֥וֹם הוּא֙
  english_pob_choice: That day
  chosen_spanish: Ese día
  alternatives_spanish:
  - En aquel día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión profética temporal es idiomática; «Ese día» conserva la referencia demostrativa y suena natural en español sin volverla arcaica.
- source_word: וְעָדֶ֣י/ךָ יָב֔וֹא
  english_pob_choice: they will come to you
  chosen_spanish: vendrán a ti
  alternatives_spanish:
  - vendrá a ti
  - vendrá a ustedes
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular, el contexto enumera procedencias múltiples y un movimiento colectivo; en español el plural comunica mejor ese sentido. El dativo «a ti» preserva el sufijo de 2ms dirigido a Sión/Jerusalén o al pueblo personificado.
- source_word: לְ/מִנִּ֥י אַשּׁ֖וּר
  english_pob_choice: from Assyria
  chosen_spanish: desde Asiria
  alternatives_spanish:
  - de Asiria
  - desde el país de Asiria
  lexicon: HALOT
  rationale: La preposición indica origen. «Asiria» es la forma española estándar para el topónimo אַשּׁוּר.
- source_word: וְ/עָרֵ֣י מָצ֑וֹר
  english_pob_choice: and the cities of Egypt
  chosen_spanish: y las ciudades de Egipto[a]
  alternatives_spanish:
  - y las ciudades fortificadas
  - y las ciudades de asedio
  lexicon: HALOT
  rationale: Se sigue la decisión auditada de leer aquí un referente geográfico a Egipto; en español esa elección queda marcada con nota porque el hebreo también permite un sentido común de «fortaleza/sitio/ciudad fortificada».
- source_word: וּ/לְ/מִנִּ֤י מָצוֹר֙
  english_pob_choice: and from Egypt
  chosen_spanish: y desde Egipto
  alternatives_spanish:
  - y desde fortaleza
  - y desde Matzor
  lexicon: HALOT
  rationale: La paralelidad con la frase anterior favorece repetir el mismo referente geográfico. Se mantiene la secuencia de origen en el discurso.
- source_word: וְ/עַד נָהָ֔ר
  english_pob_choice: to the River
  chosen_spanish: hasta el Río[b]
  alternatives_spanish:
  - hasta el río
  - hasta el Éufrates
  lexicon: HALOT
  rationale: «El Río» es una forma bíblica convencional para el Éufrates; en español conviene capitalizarlo para señalar ese referente probable sin añadir una glosa al texto principal.
- source_word: וְ/יָ֥ם מִ/יָּ֖ם
  english_pob_choice: from sea to sea
  chosen_spanish: de mar a mar
  alternatives_spanish:
  - de un mar a otro
  - de mar en mar
  lexicon: HALOT
  rationale: Es un merismo idiomático de extensión amplia. «De mar a mar» es la solución española más natural y fiel a la concisión hebrea.
- source_word: וְ/הַ֥ר הָ/הָֽר
  english_pob_choice: and from mountain to mountain
  chosen_spanish: y de monte a monte
  alternatives_spanish:
  - y de montaña a montaña
  - y de monte en monte
  lexicon: HALOT
  rationale: Se conserva el paralelismo merístico con la frase anterior. «Monte» es plenamente comprensible en registro bíblico y evita sonar demasiado técnico.
theological_decisions:
- issue: Alcance del movimiento descrito en la secuencia de regiones
  english_pob_reading: Collective, expansive return/gathering from many lands
  chosen_spanish_reading: Movimiento colectivo y expansivo de llegada desde múltiples regiones
  alternative_spanish_readings:
  - Llegada de un mensajero individual
  - Descripción estrictamente singular de una persona
  rationale: La lista de territorios y los merismos espaciales apuntan a un alcance colectivo. El plural español «vendrán» evita imponer un singular que oscurezca la imagen poética.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de מָצוֹר en la doble aparición del versículo
  english_pob_reading: Place-name reference to Egypt, while acknowledging the common-noun alternative 'fortress/siege'
  chosen_spanish_reading: Topónimo referido a Egipto, con la alternativa léxica preservada en nota
  alternative_spanish_readings:
  - fortaleza
  - ciudad fortificada
  - asedio
  rationale: La secuencia con Asiria y el Río favorece una lectura geográfica. La nota impide borrar la tensión lexical real del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase revisado, que quedó sin cambios, y conserva la decisión auditada de leer מָצוֹר como referencia geográfica a Egipto mientras mantiene visible la alternativa léxica en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo donde aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Egipto» de manera consistente en ambas apariciones de מָצוֹר, siguiendo el audit trail inglés.
  - 'Se conserva el merismo hebreo con parejas paralelas: mar/mar y monte/monte.'
  - «Río» va con mayúscula para reflejar el valor probable de Éufrates, conforme a la decisión auditada.
