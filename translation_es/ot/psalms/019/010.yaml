translation:
  language: es
  text: El temor de Yahvé es puro[a], permanece para siempre; los juicios de Yahvé son verdaderos[c][b]; son enteramente justos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'limpio' para 'puro'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'está en pie para siempre'.
    reason: lexical_alternative
  - marker: c
    text: O 'las ordenanzas de Yahvé'.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: ''justos juntamente''; es decir, completamente justos en conjunto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh / the LORD
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el reverente temor de Yahvé
  - la reverencia de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea conserva el sustantivo 'temor' como un término cargado de sentido sapiencial y devocional; en español, 'temor de Yahvé' mantiene esa fuerza idiomática mejor que una paráfrasis como 'reverencia', que suavizaría el campo semántico del original.
- source_word: טְהוֹרָה
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  lexicon: HALOT
  rationale: '''Puro'' comunica adecuadamente la cualidad de pureza moral/ritual en español moderno y conserva el valor evaluativo del hebreo. ''Limpio'' es posible, pero resulta menos natural en este contexto poético.'
- source_word: עוֹמֶדֶת לָעַד
  english_pob_choice: enduring forever
  chosen_spanish: que permanece para siempre
  alternatives_spanish:
  - que está en pie para siempre
  - que dura para siempre
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'está en pie para siempre'. 'Permanece para siempre' reproduce bien la idea de permanencia continua sin sonar forzado en español.
- source_word: מִשְׁפְּטֵי יְהוָה
  english_pob_choice: the judgments of Yahweh
  chosen_spanish: los juicios de Yahvé
  alternatives_spanish:
  - las ordenanzas de Yahvé
  - los decretos de Yahvé
  lexicon: HALOT
  rationale: '''Juicios'' preserva la conexión léxica con מִשְׁפָּט y su matiz judicial/legal. ''Ordenanzas'' o ''decretos'' son posibles, pero desplazan el énfasis del término hebreo.'
- source_word: אֱמֶת
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - verdad
  - fieles
  lexicon: HALOT
  rationale: Aquí funciona predicativamente respecto de los juicios; 'verdaderos' es el equivalente español más natural y mantiene la afirmación de confiabilidad/realidad del hebreo.
- source_word: צָדְקוּ יַחְדָּו
  english_pob_choice: they are altogether righteous
  chosen_spanish: todos ellos son absolutamente justos
  alternatives_spanish:
  - son justos en conjunto
  - son del todo justos
  lexicon: HALOT
  rationale: La expresión final comunica que, en conjunto, los juicios de Yahvé son plenamente justos. 'Absolutamente justos' transmite bien la totalidad intensiva de יַחְדָּו sin perder claridad.
theological_decisions:
- issue: Preservación del nombre divino en יְהוָה
  english_pob_reading: Yahweh rather than the LORD substitution
  chosen_spanish_reading: Yahvé en el texto principal
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: La política de la POB en inglés usa 'Yahweh' para el Tetragrámaton; en español, 'Yahvé' preserva el nombre divino revelado sin sustituirlo por un título, manteniendo la transparencia textual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de יִרְאַת יְהוָה en el marco sapiencial
  english_pob_reading: Retain 'the fear of the LORD' rather than interpretively substituting 'religion' or 'worship.'
  chosen_spanish_reading: Conservar 'el temor de Yahvé'
  alternative_spanish_readings:
  - la religión de Yahvé
  - el culto de Yahvé
  rationale: El hebreo tiene una densidad teológica que no conviene reducir a 'religión' o 'culto'. 'Temor de Yahvé' mantiene la ambivalencia de reverencia, obediencia y asombro que el texto deja abierta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y no se señalan ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, de acuerdo con la política POB en español.
  - '''Temor'' se conserva como término técnico-teológico, evitando diluirlo en ''reverencia''.'
  - Se usa 'juicios' para מִשְׁפְּטֵי para preservar la correspondencia léxica y el matiz judicial.
  - La cláusula final se formula para expresar la totalidad intensiva de יַחְדָּו sin sonar artificial en español.
  - Las notas a pie distinguen alternativas léxicas reales sin sobrecargar el texto principal.
