translation:
  language: es
  text: Por la púrpura y el mármol que se deterioran sobre ellos se conocerá que no son dioses; y al final ellos mismos serán comidos[a], y serán un oprobio en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después serán consumidos/devorados». El griego dice literalmente «serán comidos», lo que puede referirse al consumo físico por descomposición o por criaturas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πορφύρας
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - tela púrpura
  - adornos púrpura
  lexicon: LSJ
  rationale: El griego πορφύρα puede designar la púrpura como material, color o adorno de lujo. En español, «púrpura» conserva el valor breve y solemne del original y permite que el contexto de los adornos idolátricos haga explícito el matiz material.
- source_word: μαρμάρου
  english_pob_choice: marble
  chosen_spanish: mármol
  alternatives_spanish:
  - piedra pulida
  - revestimiento de mármol
  lexicon: LSJ
  rationale: μάρμαρον significa ordinariamente mármol o piedra brillante. «Mármol» es la equivalencia más directa y mantiene la pareja de materiales preciosos del texto.
- source_word: τῆς ἐπ’ αὐτοὺς σηπομένης
  english_pob_choice: rotting upon them
  chosen_spanish: que se pudren sobre ellos
  alternatives_spanish:
  - que se corrompen sobre ellos
  - que se descomponen sobre ellos
  lexicon: LSJ
  rationale: σήπομαι expresa pudrirse o descomponerse. «Que se pudren sobre ellos» suena natural en español y conserva la imagen concreta y polémica de materiales preciosos echándose a perder sobre los ídolos.
- source_word: γνωσθήσεται
  english_pob_choice: it will be known
  chosen_spanish: se conocerá
  alternatives_spanish:
  - se sabrá
  - se hará evidente
  lexicon: LSJ
  rationale: El futuro pasivo de γινώσκω aquí comunica conocimiento público o evidencia manifiesta. «Se conocerá» reproduce ese valor sin añadir interpretaciones.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: LSJ
  rationale: El texto niega la divinidad de los ídolos. «Dioses» es la correspondencia más directa y sostiene el contraste teológico del pasaje.
- source_word: ἐξ ὑστέρου
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - después
  - más tarde
  lexicon: LSJ
  rationale: La expresión indica lo que sucede posteriormente. «Al final» captura bien el sentido temporal y la progresión argumental del versículo.
- source_word: βρωθήσονται
  english_pob_choice: will be eaten
  chosen_spanish: serán comidos
  alternatives_spanish:
  - serán devorados
  - serán consumidos
  lexicon: LSJ
  rationale: 'βιβλίos? No: βρωθήσονται proviene de βρώσκω, «comer». «Serán comidos» preserva la literalidad y deja abierta la imagen de consumo físico por descomposición o criaturas, como en el audit trail inglés.'
- source_word: ὄνειδος
  english_pob_choice: a disgrace
  chosen_spanish: un oprobio
  alternatives_spanish:
  - una vergüenza
  - un reproche
  lexicon: LSJ
  rationale: ὄνειδος denota deshonra, afrenta o reproche público. «Un oprobio» comunica esa vergüenza pública con registro bíblico y sobrio; además evita suavizar la fuerza del término.
- source_word: ἐν τῇ χώρᾳ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país o región. «En la tierra» es suficientemente amplio y natural en español bíblico, sin restringir indebidamente el alcance.
theological_decisions:
- issue: Referente de los materiales que se pudren y del consumo final
  english_pob_reading: The verse mocks idols by pointing to the decay of their costly adornments and the idols' eventual consumption and shame.
  chosen_spanish_reading: El versículo ridiculiza a los ídolos mostrando que sus adornos costosos se pudren y que ellos mismos terminarán consumidos y en vergüenza.
  alternative_spanish_readings:
  - Los materiales, más que los ídolos, son el sujeto principal de las cláusulas finales.
  rationale: El plural αὐτά y el contexto del Libro de Jeremías se dirigen contra los ídolos como objetos sin poder. La redacción española mantiene a los ídolos como referente principal, sin borrar que los materiales sirven como evidencia de su falsedad.
  doctrine_reference: Preservar la tensión textual y la burla antiidolátrica sin resolver de antemano la ambigüedad referencial.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido; el consenso de control cruzado fue alto y el veredicto fue de acuerdo. La redacción española sigue de cerca el griego, con la misma ambigüedad léxica principal en βρωθήσονται.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Dioses» traduce θεοί sin sustituirlo por una formulación explicativa que atenúe la polémica.
  - «Púrpura» y «mármol» conservan el par de materiales preciosos del original.
  - «Oprobio» mantiene el registro bíblico sin introducir una interpretación más débil como «vergüenza» en el texto principal.
