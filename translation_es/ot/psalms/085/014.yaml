translation:
  language: es
  text: La justicia[a] irá delante de él, y hará de sus pasos un camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rectitud».
    reason: lexical_alternative
  - marker: b
    text: O «pondrá sus pasos por camino», siguiendo una construcción más formal del modismo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֶדֶק
  english_pob_choice: Righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: צֶדֶק puede expresar justicia o rectitud. En español, "justicia" conserva el campo semántico legal y covenantal que el inglés POB mantuvo con "Righteousness" y deja abierta la tensión con la alternativa "rectitud".
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: La expresión idiomática comunica bien el movimiento que precede al sujeto sin sonar arcaica. "Delante de él" preserva la imagen espacial del hebreo.
- source_word: יְהַלֵּךְ
  english_pob_choice: will go
  chosen_spanish: irá
  alternatives_spanish:
  - caminará
  - andará
  lexicon: HALOT
  rationale: El verbo הלך aquí describe movimiento. "Irá" transmite el avance poético de manera natural en español, aunque "caminará" también es posible si se quisiera conservar más literalmente la imagen de andar.
- source_word: וְיָשֵׂם
  english_pob_choice: will make
  chosen_spanish: pondrá
  alternatives_spanish:
  - hará
  - establecerá
  lexicon: HALOT
  rationale: שׂים significa colocar, poner. En esta construcción, "pondrá" sigue de cerca el valor verbal sin forzar una paráfrasis más interpretativa como "hará".
- source_word: לְדֶרֶךְ
  english_pob_choice: a path
  chosen_spanish: en un camino
  alternatives_spanish:
  - como camino
  - por camino
  lexicon: HALOT
  rationale: 'El hebreo usa una construcción resultativa/funcional: sus pasos quedan establecidos como camino. "En un camino" refleja esa relación de manera legible en español, manteniendo la apertura de la imagen sin añadir material no atestiguado.'
- source_word: פְּעָמָיו
  english_pob_choice: his steps
  chosen_spanish: sus pasos
  alternatives_spanish:
  - sus huellas
  - sus pisadas
  lexicon: HALOT
  rationale: פְּעָמִים se refiere a pasos o pisadas. "Sus pasos" es la opción más natural y conserva la imagen poética del hebreo y del inglés POB.
theological_decisions:
- issue: Referente de los sufijos masculinos singulares ('él', 'sus')
  english_pob_reading: The pronouns refer to the LORD in the immediate context.
  chosen_spanish_reading: Los pronombres se mantienen como referencia a Yahvé en el contexto inmediato.
  alternative_spanish_readings:
  - podrían leerse de un rey justo o figura representativa
  rationale: El salmo habla del actuar salvador de Dios; por ello, el referente más natural es Yahvé. Sin embargo, la formulación poética no elimina del todo la posibilidad de una lectura representativa, así que la traducción conserva los pronombres sin resolver más allá de lo que el hebreo permite.
  doctrine_reference: Preservar la tensión exegética sin imponer una identificación más específica que la del contexto inmediato.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del expediente inglés: se evita la expansión interpretativa de "hacer un camino para sus pasos" y se conserva la idea de que sus pasos quedan puestos en un camino. También se mantiene la lectura poética del sujeto y de los sufijos como referencia inmediata a Yahvé, sin forzar una resolución dogmática del referente.'
  spanish_consistency_notes:
  - Se usó "Yahvé" en la nota doctrinal, conforme al estándar del proyecto para el nombre divino.
  - Se prefirió "justicia" sobre "rectitud" en el texto principal, dejando la alternativa en nota para preservar la tensión léxica.
  - '"Camino" se eligió como equivalente natural de דֶרֶךְ, mientras que la nota conserva la posibilidad más formal de leer la construcción como "como un camino".'
  - Se evitó "SEÑOR" y también la paráfrasis "hacer un sendero", para no ocultar el paralelismo hebreo.
