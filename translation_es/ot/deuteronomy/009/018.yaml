translation:
  language: es
  text: Entonces me postré[a] delante de Yahvé, como la primera vez, durante cuarenta días y cuarenta noches; no comí pan ni bebí agua, a causa de todo el pecado que ustedes habían cometido al hacer lo que era malo ante los ojos de Yahvé, provocándolo a ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como antes» o «como anteriormente». La frase hebrea remite al período anterior de cuarenta días de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְנַפַּל
  english_pob_choice: Then I fell down
  chosen_spanish: Entonces me postré
  alternatives_spanish:
  - Entonces caí
  - Entonces me arrojé al suelo
  lexicon: HALOT
  rationale: El hebreo expresa una acción corporal de humillación e intercesión. En español, «me postré» comunica bien la postura reverente y evita una lectura accidentalmente pasiva de «caí», manteniendo la fuerza física del verbo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» conserva el valor relacional y espacial de לִפְנֵי sin cargar el español con una expresión demasiado rígida. Se mantiene «Yahvé» conforme a la terminología POB para יְהוָה.
- source_word: כָּרִאשֹׁנָה
  english_pob_choice: as at the first
  chosen_spanish: como la primera vez
  alternatives_spanish:
  - como antes
  - como anteriormente
  lexicon: HALOT
  rationale: La frase remite al período anterior de cuarenta días. «Como la primera vez» refleja de manera natural la referencia retrospectiva que el inglés POB explicó con nota.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta días y cuarenta noches
  lexicon: HALOT
  rationale: Se conserva la fórmula temporal literal y solemne del hebreo, que en español es idiomática y clara.
- source_word: לֶחֶם לֹא אָכַלְתִּי
  english_pob_choice: I ate no bread
  chosen_spanish: no comí pan
  alternatives_spanish:
  - no comí nada de pan
  - no comí alimento
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pan». En español, «pan» mantiene esa concreción léxica. Se evita generalizar a «alimento», porque el texto no lo hace.
- source_word: וּמַיִם לֹא שָׁתִיתִי
  english_pob_choice: and drank no water
  chosen_spanish: ni bebí agua
  alternatives_spanish:
  - y no bebí agua
  lexicon: HALOT
  rationale: La coordinación negativa española fluye de forma natural con «ni». Se conserva la literalidad del objeto «agua».
- source_word: עַל כָּל חַטַּאתְכֶם
  english_pob_choice: because of all your sin
  chosen_spanish: a causa de todo su pecado
  alternatives_spanish:
  - por todo su pecado
  - debido a todo su pecado
  lexicon: HALOT
  rationale: El hebreo עַל aquí expresa motivo/causa. Se eligió el singular colectivo «pecado» para reflejar חַטַּאתְכֶם con su fuerza global, y «su» reproduce el referente colectivo de segunda persona plural.
- source_word: אֲשֶׁר חֲטָאתֶם
  english_pob_choice: that you had committed
  chosen_spanish: que ustedes habían cometido
  alternatives_spanish:
  - que cometieron
  - que ustedes cometieron
  lexicon: HALOT
  rationale: Se mantiene el valor retrospectivo del pluperfecto que el inglés POB señala. «Cometido» es el verbo natural en español con «pecado».
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: by doing what was evil
  chosen_spanish: al hacer lo que era malo
  alternatives_spanish:
  - haciendo lo que era malo
  - al hacer el mal
  lexicon: HALOT
  rationale: La construcción infinitiva expresa el modo o la forma concreta del pecado. «Al hacer lo que era malo» conserva la idea de conducta evaluada moralmente, sin convertirla en un resumen interpretativo más fuerte que el hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se preserva el idioma figurado del hebreo y la idea de evaluación divina. «Ante los ojos de» es natural en español y mantiene la metáfora auditada por el inglés POB.
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - irritándolo
  - para enojarlo
  lexicon: HALOT
  rationale: 'El hiphil de כעס es causativo: provocar a enojo/ira. «Provocándolo a ira» conserva esa fuerza sin suavizarla; «ira» suena más solemne y bíblica que «enojo» en este contexto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La política terminológica del proyecto pide «Yahvé» como forma principal en español para יְהוָה. Se evita la sustitución litúrgica por «SEÑOR» para no ocultar el nombre del pacto presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de כָּרִאשֹׁנָה
  english_pob_reading: as at the first
  chosen_spanish_reading: como la primera vez
  alternative_spanish_readings:
  - como antes
  - como anteriormente
  rationale: La nota inglesa indica que la expresión remite al período anterior de cuarenta días de Moisés. En español, la opción elegida conserva el vínculo retrospectivo sin añadir una interpretación distinta.
  doctrine_reference: Audit trail lexical note on כָּרִאשֹׁנָה
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión inglesa: no hay cambios de sentido relevantes que requieran una relectura especial. Se mantuvo la nota de equivalencia lexical para כָּרִאשֹׁנָה, adaptada al español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se conserva la distinción entre «pecado» singular colectivo y el acto plural de «habían cometido».
  - «Provocándolo a ira» mantiene el valor causativo del hebreo y armoniza con el tono solemne del pasaje.
  - La puntuación separa claramente la prótasis temporal de la causa y del resultado final.
