review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y la imaginería corporal del hebreo: בְשָׂרִי = «mi carne», וְעוֹרִי = «y mi piel», שִׁבַּר = «ha quebrado», עַצְמוֹתַי = «mis huesos». Sin embargo, para בִּלָּה el hebreo y la auditoría inglesa favorecen la idea de desgaste o consumición por deterioro («has worn away / has wasted away») más que «ha consumido», que en español puede sugerir devorar o consumir por completo y se aleja levemente del matiz documentado.'
  spanish_quality_summary: El español es claro y digno, pero «ha desgastado mi carne y mi piel» suena más fiel y natural que «ha consumido». El resto del verso fluye bien en español bíblico moderno. «Ha quebrado mis huesos» mantiene buen tono poético y legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Carne», «piel» y «huesos» concuerdan con las decisiones léxicas documentadas. La principal corrección es alinear בִּלָּה con «ha desgastado» como equivalente principal, dejando «ha consumido» como alternativa posible en nota si se desea reflejar el rango semántico.
  issues:
  - severity: medium
    issue: El verbo principal «ha consumido» no refleja con suficiente precisión la decisión léxica auditada para בִּלָּה.
    rationale: La auditoría inglesa escogió «has worn away» y documentó «has wasted away» como alternativa. En español, «ha consumido» tiende a sonar más agentivo o totalizante; «ha desgastado» preserva mejor la idea de desgaste corporal progresivo del Piel de בלה.
  - severity: low
    issue: La nota al pie invierte el peso entre lectura principal y alternativa.
    rationale: Si el texto principal se corrige a «ha desgastado», la alternativa natural en la nota puede ser «ha consumido mi carne y mi piel» o «ha hecho que se consuman», manteniendo el espectro léxico sin desalinearse del texto fuente.
  revised_spanish_text: Él ha desgastado[a] mi carne y mi piel; ha quebrado mis huesos.
  revised_footnotes:
  - marker: a
    text: O «ha consumido mi carne y mi piel».
    reason: lexical_alternative
  revision_rationale: Se ajusta בִּלָּה al sentido principal documentado de desgaste corporal («has worn away») y se conserva «ha consumido» como alternativa léxica secundaria. El resto del verso ya era fiel al hebreo, idiomático en español y coherente con la auditoría inglesa.
