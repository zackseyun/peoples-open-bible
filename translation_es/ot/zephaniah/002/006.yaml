    rationale: La auditoría inglesa conserva explícitamente «with cisterns for shepherds and folds for flocks». La nota española actual repite «refugios» y por tanto no preserva la alternativa relevante del expediente fuente.
  revised_spanish_text: Y la costa se convertirá en pastos[a], con refugios para los pastores y cercados para los rebaños.
