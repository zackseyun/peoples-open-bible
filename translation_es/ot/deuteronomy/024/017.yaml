review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente las dos prohibiciones legales del hebreo: no torcer el derecho de personas vulnerables y no tomar la prenda de una viuda. También preserva bien el sentido de מִשְׁפָּט como derecho/justicia debida y de חבל como tomar en prenda. Sin embargo, «forastero» debilita la categoría social-jurídica específica de גֵּר, que en este contexto es un no nativo residente bajo protección legal; conviene reflejarlo mejor en español principal.'
  spanish_quality_summary: La redacción es clara y digna, pero «No pervertirás el derecho» suena menos natural en español bíblico contemporáneo que «No torcerás el derecho» o «No negarás la justicia debida». Además, «la ropa de la viuda» es más coloquial y menos preciso que «el manto» o «la prenda de vestir», dado que בֶּגֶד es singular y el contexto legal suele referirse a una prenda concreta tomada como garantía.
  glossary_alignment: 'No hay conflicto con terminología teológica mayor del proyecto. La principal cuestión léxica es גֵּר: para alinearse mejor con la decisión inglesa documentada (''sojourner'') y con su nota, es preferible «extranjero residente» en el texto o, secundariamente, «residente extranjero». «Huérfano» y «viuda» están bien. «Tomar en prenda» alinea bien con חבל.'
  issues:
  - severity: medium
    issue: «forastero» para גֵּר
    rationale: Aunque es comprensible, en español suele sonar a visitante o persona de fuera en sentido general, y no comunica tan bien la condición legal de residente no nativo protegida por la ley. La nota intenta suplirlo, pero el texto principal puede ser más fiel con «extranjero residente».
  - severity: medium
    issue: «pervertirás el derecho» suena poco idiomático
    rationale: Es una transferencia demasiado cercana del inglés legal 'pervert the justice'. En español bíblico y jurídico, «torcer el derecho» es más natural y mantiene la fuerza de נטה + משפט.
  - severity: low
    issue: «la ropa de la viuda» es algo impreciso/coloquial
    rationale: בֶּגֶד es singular y refiere una prenda tomada en garantía. «La ropa» puede sugerir vestimenta en general. «La prenda de vestir de la viuda» o «el manto de la viuda» son más precisos; el primero evita sobreespecificar.
  revised_spanish_text: No torcerás el derecho del extranjero residente[a] ni del huérfano, ni tomarás en prenda la prenda de vestir de la viuda.
  revised_footnotes:
  - marker: a
    text: O «forastero» o «extranjero». El término hebreo designa a una persona no nativa que vive entre Israel bajo sus protecciones sociales y legales.
    reason: lexical_alternative
  revision_rationale: Se ajusta גֵּר a «extranjero residente» para reflejar mejor la categoría legal protegida en el hebreo y en la auditoría inglesa; se cambia «pervertirás» por «torcerás» para un español más idiomático y fiel al giro jurídico; y se sustituye «ropa» por «prenda de vestir» para conservar el singular concreto de בֶּגֶד sin sobreespecificarlo como manto.
