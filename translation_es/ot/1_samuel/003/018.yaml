base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/003/018.yaml
  text: So Samuel told him all the words and hid nothing from him[a]. And he said, “He is Yahweh[b]; let him do what is good in his eyes.”
  footnotes:
  - marker: a
    text: Or, 'he will do what is good in his eyes.' The Hebrew imperfect may be understood as either a submissive wish ('let him do') or a simple future.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'in his eyes,' an idiom meaning according to his own judgment or what seems good to him.
    reason: lexical_alternative
