translation:
  language: es
  text: Así pues, ustedes guardarán mi obligación[a], para no practicar ninguno de los estatutos abominables[b] que se practicaron antes de ustedes, y no se harán impuros por ellos. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi encargo' / 'mi carga'. El hebreo מִשְׁמֶרֶת puede denotar una responsabilidad u obligación que debe guardarse.
    reason: lexical_alternative
  - marker: b
    text: O 'estatutos detestables' / 'costumbres detestables'. El hebreo puede referirse a estatutos, prácticas prescritas o costumbres establecidas, no solo a estatutos formales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: you shall keep
  chosen_spanish: ustedes guardarán
  alternatives_spanish:
  - ustedes deben guardar
  - ustedes habrán de guardar
  - ustedes observarán
  lexicon: HALOT
  rationale: שׁמר expresa guardar, observar o custodiar. 'Guardarán' conserva el sentido de mantener fielmente una obligación pactal y evita una paráfrasis excesiva.
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: my charge
  chosen_spanish: mi encargo
  alternatives_spanish:
  - mi cargo
  - mi obligación
  - mi mandato
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede designar una responsabilidad, custodia u obligación confiada. 'Encargo' comunica bien una responsabilidad encomendada y resulta natural en español, sin perder la idea de deber a guardar.
- source_word: לְבִלְתִּי עֲשׂוֹת
  english_pob_choice: so as not to practice
  chosen_spanish: para no practicar
  alternatives_spanish:
  - para no hacer
  - a fin de no hacer
  - para no cometer
  lexicon: HALOT
  rationale: La construcción expresa finalidad/previsión. 'Practicar' recoge mejor que 'hacer' el carácter reiterado o habitual de estas conductas y se ajusta al contexto de normas y usos.
- source_word: מֵחֻקּוֹת
  english_pob_choice: any of the ... statutes
  chosen_spanish: ninguna de las ... estatutos
  alternatives_spanish:
  - ninguno de los ... estatutos
  - ninguna de las ... normas
  - ninguna de las ... prácticas prescritas
  lexicon: HALOT
  rationale: חֻקּוֹת puede referirse a estatutos, normas o prácticas prescritas. En español, 'estatutos' mantiene la relación formal con el hebreo, aunque la construcción quedó algo marcada; se conserva para reflejar el valor normativo del término y el matiz partitivo del hebreo.
- source_word: הַתּוֹעֵבֹת
  english_pob_choice: abominable
  chosen_spanish: abominables
  alternatives_spanish:
  - detestables
  - repugnantes
  - abhorrecibles
  lexicon: HALOT
  rationale: תּוֹעֵבָה comunica fuerte repulsión moral y cultual. 'Abominables' preserva esa gravedad en un registro bíblico claro en español.
- source_word: אֲשֶׁר נַעֲשׂוּ לִפְנֵיכֶם
  english_pob_choice: that were practiced before you
  chosen_spanish: que se practicaron antes de ustedes
  alternatives_spanish:
  - que se hicieron antes de ustedes
  - que fueron practicadas delante de ustedes
  - que se realizaron antes de ustedes
  lexicon: HALOT
  rationale: 'El sentido es temporal e histórico: prácticas previas a Israel. ''Antes de ustedes'' transmite el valor de previo a su llegada/ocupación, y ''se practicaron'' mantiene la idea de usos establecidos.'
- source_word: וְלֹא תִטַּמְּאוּ בָּהֶם
  english_pob_choice: and you shall not make yourselves unclean by them
  chosen_spanish: y no se harán impuros por ellas
  alternatives_spanish:
  - y no se contaminarán con ellas
  - y no se mancharán por ellas
  - y no se volverán impuros por ellas
  lexicon: HALOT
  rationale: טמא en reflexivo indica contaminarse o hacerse impuro. 'Se harán impuros' conserva la reflexividad y el instrumental בָּהֶם con un español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrámaton se vierte ''Yahvé'', preservando el nombre pactal revelado, en lugar de ocultarlo bajo una sustitución funcional.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios y Señor
  - su Dios
  lexicon: HALOT
  rationale: אֱלֹהֵיכֶם es el posesivo plural de segunda persona. En español se usa 'su' como tratamiento reverencial y de concordancia con 'ustedes'.
theological_decisions:
- issue: Nombre divino en la autodeclaración final
  english_pob_reading: I am Yahweh your God.
  chosen_spanish_reading: Yo soy Yahvé, su Dios.
  alternative_spanish_readings:
  - Yo soy el SEÑOR, su Dios.
  - Yo soy Yahvé, el Dios de ustedes.
  rationale: El hebreo contiene explícitamente el Tetragrámaton. Se mantiene 'Yahvé' para preservar la identidad del nombre del pacto y evitar la sustitución litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza moral de תּוֹעֵבֹת
  english_pob_reading: abominable statutes
  chosen_spanish_reading: abominables estatutos
  alternative_spanish_readings:
  - estatutos detestables
  - prácticas abominables
  - costumbres detestables
  rationale: La frase hebrea une el valor normativo de חֻקּוֹת con la fuerte reprobación de תּוֹעֵבֹת. Se conserva la tensión entre forma legal y juicio moral, sin reducirla solo a 'costumbres' ni a un término eclesiástico más débil.
  doctrine_reference: HALOT / source context
- issue: Reflexivo de תִטַּמְּאוּ
  english_pob_reading: you shall not make yourselves unclean by them
  chosen_spanish_reading: no se harán impuros por ellas
  alternative_spanish_readings:
  - no se contaminarán con ellas
  - no se impurificarán por ellas
  rationale: 'El verbo en esta forma tiene valor reflexivo: el pueblo participa de su propia impureza por medio de esas prácticas. ''Se harán impuros'' conserva esa implicación sin sonar artificial en español.'
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail, donde no se registraron cambios posteriores y el revisor informó alta concordancia. Se mantiene la decisión doctrinal de traducir el Nombre divino como 'Yahvé' y la fuerza evaluativa de תּוֹעֵבֹת como 'abominables'.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de segunda persona plural con 'ustedes/su'.
  - '''Yahvé'' se usa de forma consistente para el Tetragrámaton.'
  - '''Se harán impuros'' conserva el valor reflexivo del hebreo sin introducir lenguaje técnico innecesario.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino revelado.
