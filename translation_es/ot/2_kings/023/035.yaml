    reason: lexical_alternative
  - marker: b
    text: O «cada uno según su evaluación» o, de forma más interpretativa, «cada uno según sus medios».
    reason: lexical_alternative
  - marker: c
    text: También puede escribirse «Neco» o «Necho» en transliteraciones bíblicas.
    reason: alternative_reading
  revision_rationale: Se eliminó la nota incorrecta sobre 'entregó', porque la alternativa fiscal pertenece al verbo hebreo הֶעֱרִיךְ y no a נָתַן. Se añadieron notas en los lugares pertinentes para preservar las alternativas documentadas por el POB inglés ('según la orden de Faraón' y 'cada uno según su tasación'). Se normalizó la secuencia de marcadores y se mantuvo el texto base casi intacto, ya que el español principal es generalmente fiel y legible.
