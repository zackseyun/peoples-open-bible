translation:
  language: es
  text: Y este es el relato del trabajo forzado[a] que el rey Salomón impuso para edificar la casa de Yahvé, su propia casa, el Milo[b], la muralla de Jerusalén, Hazor, Megido y Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מַס designa aquí una leva o servicio laboral obligatorio, no un impuesto en dinero.
    reason: lexical_alternative
  - marker: b
    text: «Milo» suele entenderse como un elemento fortificado o de relleno en Jerusalén; el término hebreo puede referirse al relleno, a terrazas o a una estructura conocida por ese nombre.
    reason: cultural_note
lexical_decisions:
- source_word: דְבַר
  english_pob_choice: account
  chosen_spanish: cuenta
  alternatives_spanish:
  - asunto
  - relato
  - registro
  lexicon: HALOT
  rationale: En la construcción וְזֶה דְבַר, el sustantivo introduce una explicación o declaración resumida. «Cuenta» conserva el valor de informe o exposición y suena natural en español, sin perder la relación con el hebreo.
- source_word: הַמַּס
  english_pob_choice: forced labor
  chosen_spanish: trabajo forzado
  alternatives_spanish:
  - leva de trabajo
  - corvea
  - tributo
  lexicon: HALOT
  rationale: Aquí מַס no es un impuesto monetario, sino una obligación laboral impuesta por el rey para proyectos de construcción. «Trabajo forzado» expresa con claridad esa carga compulsoria en español contemporáneo; «tributo» desviaría el sentido y «corvea» resulta demasiado técnico.
- source_word: הֶעֱלָה
  english_pob_choice: levied
  chosen_spanish: impuso
  alternatives_spanish:
  - levantó
  - estableció
  lexicon: HALOT
  rationale: El hifil de עלה tiene aquí el sentido administrativo de imponer o establecer una carga. «Impuso» comunica bien la acción real sobre la leva de trabajo.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - para levantar
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para edificar» mantiene el tono bíblico y sigue siendo claro en español; también deja intacta la relación con las obras nombradas en la frase.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el término literal «casa» para respetar el hebreo בית y su resonancia de santuario/edificio. En esta línea, יְהוָה se rinde como «Yahvé» según el criterio del proyecto, no como una sustitución reverencial.
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su casa
  - el palacio real
  lexicon: HALOT
  rationale: La expresión contrasta con la casa de Yahvé y se refiere al complejo real de Salomón. «Su propia casa» conserva el matiz posesivo y el contraste estructural del hebreo.
- source_word: הַמִּלּוֹא
  english_pob_choice: the Millo
  chosen_spanish: el Milo
  alternatives_spanish:
  - el relleno
  - las terrazas
  lexicon: HALOT
  rationale: Se translitera el término como nombre tradicional de una obra o estructura específica en Jerusalén, evitando una reconstrucción demasiado segura. Se mantiene la referencia cultural sin sobreinterpretarla.
- source_word: חוֹמַת יְרוּשָׁלִָם
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: la muralla de Jerusalén
  alternatives_spanish:
  - el muro de Jerusalén
  - la fortificación de Jerusalén
  lexicon: HALOT
  rationale: «Muralla» comunica de forma natural la fortificación urbana y evita la posible ambigüedad de «muro» en español. Conserva el constructo hebreo con claridad.
- source_word: חָצֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: מְגִדּוֹ
  english_pob_choice: Megiddo
  chosen_spanish: Meguidó
  alternatives_spanish:
  - Megido
  lexicon: HALOT
  rationale: Se adopta una transliteración española transparente que conserva la pronunciación aproximada del topónimo hebreo. «Meguidó» evita la forma demasiado anglicada y sigue siendo reconocible.
- source_word: גָּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto en español, se traduce como «Yahvé» para preservar el nombre pactual y evitar el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción refleja la revisión auditada que cambió la referencia temporal del inglés de «was» a «is» para corresponder más directamente con la construcción demostrativa hebrea «Y esta es...». Por eso se usa presente en español: «Y esta es la cuenta».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en el texto principal y en las notas.
  - Se conserva «casa» en vez de «templo» para respetar el hebreo בֵּית יְהוָה.
  - «Trabajo forzado» representa מַס en su sentido de leva laboral, no tributario.
  - Los topónimos se transliteran de manera consistente; se usa «Meguidó» como adaptación española legible.
