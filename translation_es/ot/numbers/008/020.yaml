revisions:
- from: Así Moisés y Aarón y toda la congregación de los hijos de Israel hicieron para con los levitas, conforme a todo lo que Yahvé había mandado a Moisés acerca de los levitas; así hicieron los hijos de Israel para con ellos.
  to: Así Moisés, Aarón y toda la congregación de los hijos de Israel hicieron con los levitas, conforme a todo lo que Yahvé había mandado a Moisés acerca de los levitas; así hicieron con ellos los hijos de Israel.
  rationale: Se ajusta únicamente la expresión preposicional para lograr un español natural y fiel al hebreo, sin sobreespecificar el tipo de acción. También se añaden comas leves tras los nombres iniciales para mejorar la legibilidad en español.
