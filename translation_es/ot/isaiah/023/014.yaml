translation:
  language: es
  text: ¡Giman[a], naves de Tarsis, porque vuestra fortaleza[b] ha sido destruida!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aúllen, naves de Tarsis»; el verbo hebreo denota un grito fuerte de dolor o angustia.
    reason: lexical_alternative
  - marker: b
    text: O «vuestro refugio». El hebreo probablemente alude al lugar de seguridad de las naves, probablemente Tiro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad!
  alternatives_spanish:
  - ¡Lamentad!
  - ¡Gritad de dolor!
  lexicon: HALOT
  rationale: El verbo hebreo expresa un grito fuerte de duelo o angustia. «Aullad» conserva la intensidad del imperativo plural y mantiene una opción natural en español para un clamor público; «lamentad» sería más suave y menos acústico.
- source_word: אֳנִיּוֹת
  english_pob_choice: ships
  chosen_spanish: naves
  alternatives_spanish:
  - barcos
  - buques
  lexicon: HALOT
  rationale: El hebreo dice simplemente «barcos/naves». «Naves» es más elevado y bíblico en español sin añadir la idea de comercio que no está explícita en el texto.
- source_word: תַּרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshis
  - Tarshish
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma usual en español bíblico «Tarsis». La referencia sigue siendo el topónimo bíblico y no requiere explicación adicional en el texto principal.
- source_word: מָעֻזְּכֶן
  english_pob_choice: your stronghold
  chosen_spanish: vuestra fortaleza
  alternatives_spanish:
  - vuestra fortificación
  - vuestro refugio
  lexicon: HALOT
  rationale: El sustantivo מָעוֹז puede significar «fortaleza», «refugio» o «bastión». «Fortaleza» conserva bien la idea de lugar de seguridad sin concretarla indebidamente como puerto o instalación marítima.
theological_decisions:
- issue: Referencia implícita al lugar de seguridad de las naves
  english_pob_reading: The Hebrew likely refers to Tyre as the ships' place of security.
  chosen_spanish_reading: El texto puede entenderse como la destrucción de la fortaleza o lugar de seguridad asociado a las naves, sin precisar más en el versículo.
  alternative_spanish_readings:
  - La fortaleza de estas naves ha sido destruida.
  - La fortaleza de Tarsis ha sido destruida.
  rationale: El hebreo permite entender מָעֹז como un lugar de seguridad o fortaleza. La POB inglesa conserva deliberadamente la amplitud semántica. En español se mantiene «vuestra fortaleza» para no cerrar la referencia demasiado pronto ni introducir una identificación local no explicitada en el versículo.
  doctrine_reference: Isaías 23:14; nota lexical sobre מָעֹז
- issue: Intensidad del lamento profético
  english_pob_reading: Wail; Or 'Howl, ships of Tarshish'; the Hebrew verb denotes a loud cry of grief or distress.
  chosen_spanish_reading: ¡Aullad!
  alternative_spanish_readings:
  - ¡Lamentad!
  - ¡Ululad!
  rationale: La elección busca reflejar el tono de duelo público y la fuerza sonora del imperativo hebreo. «Aullad» transmite mejor ese clamor que una traducción más neutral.
  doctrine_reference: Isaías 23:14; nota lexical sobre הֵילִילוּ
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y con la auditoría inglesa; no se registran revisiones aplicadas en el ciclo más reciente, por lo que la versión española sigue directamente la lectura estable sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en todo el proyecto, pero este versículo no contiene el nombre divino.
  - «Tarsis» se usa como transliteración española convencional para el topónimo.
  - Se conserva la imagen de lamento y destrucción sin añadir elementos no presentes en el hebreo.
