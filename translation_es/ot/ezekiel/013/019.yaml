translation:
  language: es
  text: Y me han profanado entre mi pueblo por puñados de cebada y por pedazos de pan, dando muerte a personas[a] que no debían morir y manteniendo con vida a personas[a] que no debían vivir, por mentirle a mi pueblo, que escucha mentiras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «almas» o «vidas» en ambas cláusulas; aquí se traduce «personas» para reflejar el modismo hebreo que se refiere a seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּחַלֶּלְנָה
  english_pob_choice: you have profaned
  chosen_spanish: habéis profanado
  alternatives_spanish:
  - habéis contaminado
  - habéis deshonrado
  lexicon: HALOT
  rationale: חלל en piel expresa profanar, tratar como común o violar lo santo. En español, «profanado» preserva mejor la fuerza religiosa/covenantal que opciones más generales como «deshonrado».
- source_word: אֹתִי אֶל־עַמִּי
  english_pob_choice: me among my people
  chosen_spanish: entre mi pueblo
  alternatives_spanish:
  - ante mi pueblo
  - para mi pueblo
  lexicon: HALOT
  rationale: El hebreo marca relación o esfera pública de afectación; «entre mi pueblo» suena natural en español y comunica que la profanación ocurrió en el ámbito del pueblo, no solo en un plano abstracto.
- source_word: בְּשַׁעֲלֵי שְׂעֹרִים
  english_pob_choice: for handfuls of barley
  chosen_spanish: por puñados de cebada
  alternatives_spanish:
  - por handfuls de cebada
  - por porciones de cebada
  lexicon: HALOT
  rationale: שַׁעֲלֵי denota pequeñas cantidades o puñados. «Puñados» es el equivalente natural en español y conserva la idea de pago ínfimo.
- source_word: וּבִפְתוֹתֵי לֶחֶם
  english_pob_choice: and for pieces of bread
  chosen_spanish: y por pedazos de pan
  alternatives_spanish:
  - y por migas de pan
  - y por trozos de pan
  lexicon: HALOT
  rationale: פְּתֹתֵי señala piezas rotas o porciones pequeñas. «Pedazos de pan» refleja bien la imagen concreta y mantiene el paralelismo con el hebreo.
- source_word: לְהָמִית נְפָשׁוֹת
  english_pob_choice: putting to death persons
  chosen_spanish: dando muerte a personas
  alternatives_spanish:
  - matando personas
  - dando muerte a vidas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí refiere a seres humanos concretos. «Personas» evita una lectura dualista de «almas» y conserva el sentido humano del término.
- source_word: אֲשֶׁר לֹא תְמוּתֶנָה
  english_pob_choice: who should not die
  chosen_spanish: que no debían morir
  alternatives_spanish:
  - que no tenían que morir
  - que no estaban destinadas a morir
  lexicon: HALOT
  rationale: La cláusula expresa una inversión moral/judicial del veredicto correcto. «Debían» comunica bien esa obligación o conveniencia normativa sin convertirlo en mera predicción.
- source_word: וּלְחַיּוֹת נְפָשׁוֹת
  english_pob_choice: and keeping alive persons
  chosen_spanish: y dando vida a personas
  alternatives_spanish:
  - y manteniendo con vida a personas
  - y preservando la vida de personas
  lexicon: HALOT
  rationale: El paralelo con «dando muerte» pide una forma activa y simétrica. «Dar vida» en español puede expresar causar o conceder vida, y conserva el contraste retórico.
- source_word: אֲשֶׁר לֹא תִחְיֶינָה
  english_pob_choice: who should not live
  chosen_spanish: que no debían vivir
  alternatives_spanish:
  - que no tenían que vivir
  - que no estaban destinadas a vivir
  lexicon: HALOT
  rationale: Como en la primera cláusula, el sentido es judicial y moral. «Debían» mantiene el paralelo con «morir» y evita una lectura meramente temporal o probabilística.
- source_word: בְּכַזֶּבְכֶם
  english_pob_choice: by your lying
  chosen_spanish: con vuestra mentira
  alternatives_spanish:
  - por vuestra mentira
  - mediante vuestra mentira
  lexicon: HALOT
  rationale: El prefijo ב expresa medio o instrumento. En español, «con vuestra mentira» comunica de modo idiomático que actuaron sirviéndose de la mentira; se conserva la fuerza del engaño sin volverlo excesivamente técnico.
- source_word: שֹׁמְעֵי כָזָב
  english_pob_choice: who listen to lies
  chosen_spanish: que escucha mentiras
  alternatives_spanish:
  - que escucha la mentira
  - que presta oído a mentiras
  lexicon: HALOT
  rationale: El participio describe a un pueblo receptivo al engaño. «Escucha mentiras» reproduce la idea de oír con aceptación, no solo la recepción auditiva.
theological_decisions:
- issue: Sentido de נְפָשׁוֹת
  english_pob_reading: persons
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - almas
  - vidas
  rationale: «Personas» conserva el referente humano concreto y evita introducir una antropología alma/cuerpo que el hebreo no exige aquí. Sigue de cerca la decisión auditada del POB en inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de las cláusulas de muerte y vida
  english_pob_reading: who should not die / who should not live
  chosen_spanish_reading: que no debían morir / que no debían vivir
  alternative_spanish_readings:
  - que no morirían / que no vivirían
  - que no tenían que morir / que no tenían que vivir
  rationale: La denuncia profética trata de un veredicto invertido y de manipulación moral, no solo de futuro predictivo. «Debían» conserva esa fuerza normativa/judicial en español.
  doctrine_reference: Translation philosophy §3
- issue: Referencia del engaño al pueblo
  english_pob_reading: by your lying to my people, who listen to lies
  chosen_spanish_reading: con vuestra mentira a mi pueblo, que escucha mentiras
  alternative_spanish_readings:
  - engañando a mi pueblo, que escucha engaños
  - con vuestra mentira para mi pueblo, que oye mentiras
  rationale: Se mantiene el vínculo entre el medio engañoso y el pueblo que lo recibe. «Escucha mentiras» refleja la receptividad culpable del pueblo sin suavizarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del audit trail inglés y no requiere revisión adicional; se conservaron las decisiones ya asentadas sobre חלל, נֶפֶשׁ y el paralelismo muerte/vida, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando el contexto lo requiera, pero en este versículo el texto hebreo no contiene el Tetragrámaton explícito.
  - Se mantuvo «personas» para נְפָשׁוֹת, coherente con la política del POB de evitar «almas» cuando el hebreo habla de seres humanos concretos.
  - Se conservó la estructura paralela «dando muerte / dando vida» para reflejar el hebreo y el audit trail inglés.
  - Las notas usan marcas únicas y están ancladas solo donde aparece ambigüedad léxica significativa.
