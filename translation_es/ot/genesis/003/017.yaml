  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado en inglés: conserva ‘Adán’, mantiene el modismo ‘la voz de tu esposa’, expresa bien ‘comiste del árbol’, preserva ‘diciendo’ y refleja correctamente que el comer proviene de la tierra. Sin embargo, ‘maldita será la tierra’ introduce un matiz futuro que no está exigido por אֲרוּרָה הָאֲדָמָה; una forma presente/declarativa como ‘maldita es la tierra’ o ‘la tierra está maldita’ se alinea mejor con el original y con la decisión inglesa ‘the ground is cursed’.'
  spanish_quality_summary: 'El español es generalmente claro y digno. No obstante, hay dos detalles mejorables: 1) la acumulación de notas [f][e][d][c][b] sobre ‘por causa de ti’ está mal anclada, porque varias notas pertenecen a frases anteriores; 2) ‘con dolor y fatiga’ es comprensible, pero ‘con penoso trabajo’ o ‘con doloroso trabajo’ preserva mejor la idea compacta de hardship/toil. La sintaxis general funciona bien.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. ‘Adán’, ‘tierra’ y el registro general son adecuados. La preservación de ‘voz’ concuerda con la racionalidad léxica documentada. El principal ajuste es no desplazar la fórmula de maldición a futuro.
  issues:
  - severity: medium
    issue: ‘maldita será la tierra’ añade un matiz futuro
    rationale: El hebreo אֲרוּרָה הָאֲדָמָה es una declaración de estado/jucio (‘maldita es/está maldita la tierra’), no necesariamente una predicción futura. La POB inglesa auditada opta por ‘the ground is cursed’.
  - severity: medium
    issue: Las notas al pie están ancladas en un solo punto incorrecto
    rationale: Las notas b, e y f corresponden a expresiones anteriores (‘la voz de tu esposa’, ‘acerca del cual te mandé’), y d corresponde a ‘con penoso trabajo’; no deben acumularse todas tras ‘por causa de ti’. Esto dificulta la lectura y no sigue la disciplina de anclaje.
  - severity: low
    issue: ‘con dolor y fatiga’ expande el sustantivo hebreo más de lo necesario
    rationale: Aunque comunica bien el sentido, añade coordinación donde el hebreo tiene un solo término. ‘Con penoso trabajo’ mantiene mejor la unidad semántica y la relación con el laborar para comer.
