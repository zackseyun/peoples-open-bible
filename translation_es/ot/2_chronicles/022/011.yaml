base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/011.yaml
  text: But Jehoshabeath[a], the king’s daughter, took Joash son of Ahaziah and stole him away from among the king’s sons who were being put to death, and she put him and his nurse in the bedroom. So Jehoshabeath, the daughter of King Jehoram, the wife of Jehoiada the priest, hid him from Athaliah[c][b], and she did not put him to death.
  footnotes:
  - marker: a
    text: Or, 'from among the king’s sons who were to be put to death.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the room of the beds'; that is, a bedroom or bedchamber.
    reason: lexical_alternative
  - marker: c
    text: 'The final ''she'' most likely refers to Athaliah: Jehoshabeath hid Joash so that Athaliah would not kill him.'
    reason: alternative_reading
