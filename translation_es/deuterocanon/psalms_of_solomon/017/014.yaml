revisions:
- from: En la ira de su [a] esplendor los envió hasta el occidente, y a los gobernantes de la tierra para burla [b]; y no perdonó.
  to: En la ira de su esplendor[a] los envió hasta el occidente, y a los gobernantes de la tierra al escarnio[b]; y no tuvo clemencia.
  rationale: Se corrige la colocación de la nota para que el español fluya naturalmente, se mejora εἰς ἐμπαιγμόν con 'al escarnio' por claridad y registro, y se cambia 'no perdonó' por 'no tuvo clemencia' para reflejar mejor οὐκ ἐφείσατο sin introducir un objeto implícito ni el matiz de absolución.
