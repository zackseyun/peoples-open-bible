translation:
  language: es
  text: 'Ve y dile a Ebed-mélec, el cusita[a]: «Así dice Yahvé de los ejércitos, el Dios de Israel: He aquí, yo estoy trayendo mis palabras sobre esta ciudad para mal y no para bien[b], y estarán delante de ti en aquel día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «etíope». El hebreo dice «cusita».
    reason: lexical_alternative
  - marker: b
    text: O «para desastre y no para bien».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָל֣וֹךְ וְאָמַרְתָּ
  english_pob_choice: Go and say
  chosen_spanish: Ve y dile
  alternatives_spanish:
  - Ve y habla
  - Ve, y dirás
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito refuerza la orden. En español, «Ve y dile» comunica la fuerza directiva de manera natural sin perder el valor enfático.
- source_word: לְעֶבֶד מֶלֶךְ
  english_pob_choice: to Ebed-melech
  chosen_spanish: a Ebed-melec
  alternatives_spanish:
  - a Ebed-Melec
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio; se translitera en español para conservar la referencia personal del texto.
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - el etíope
  lexicon: HALOT
  rationale: «Cusita» sigue más de cerca el etnónimo hebreo y evita importar una identificación geográfica posterior menos precisa. Se mantiene la opción histórica documentada como alternativa.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» y el título «de los ejércitos», equivalente directo de צְבָאוֹת en fórmula profética.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La frase constructa identifica de modo claro y directo al Dios de Israel; «Dios» mantiene el valor teológico normal del término.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Mira, yo estoy
  - He aquí que yo estoy
  lexicon: HALOT
  rationale: «He aquí» conserva la solemnidad profética del marcador de inmediatez; el pronombre explícito ayuda a sostener el énfasis en español.
- source_word: מֵבִיא אֶת־דְּבָרַי
  english_pob_choice: I am bringing my words
  chosen_spanish: estoy trayendo mis palabras
  alternatives_spanish:
  - estoy haciendo venir mis palabras
  - traigo mis palabras
  lexicon: HALOT
  rationale: El participio expresa acción cierta/inminente; «estoy trayendo» reproduce bien ese valor. Se conserva el plural explícito «palabras», como en el hebreo.
- source_word: אֶל הָעִיר הַזֹּאת
  english_pob_choice: upon this city
  chosen_spanish: sobre esta ciudad
  alternatives_spanish:
  - contra esta ciudad
  - a esta ciudad
  lexicon: HALOT
  rationale: «Sobre» refleja mejor la dirección de אֶל en este contexto de juicio, sin cargar de antemano la idea de hostilidad que el versículo desarrolla después.
- source_word: לְרָעָה וְלֹא לְטוֹבָה
  english_pob_choice: for harm and not for good
  chosen_spanish: para mal y no para bien
  alternatives_spanish:
  - para desastre y no para bien
  - para mal y no para el bien
  lexicon: HALOT
  rationale: «Mal» y «bien» reproducen el contraste del hebreo de manera clara y bíblica; en español, «mal» puede abarcar también calamidad en este contexto judicial.
- source_word: וְהָיוּ לְפָנֶיךָ
  english_pob_choice: and they will be before you
  chosen_spanish: y estarán delante de ti
  alternatives_spanish:
  - y serán delante de ti
  - y quedarán delante de ti
  lexicon: HALOT
  rationale: 'La frase hebrea es literal: «estarán delante de ti». En español, «delante de ti» preserva la imagen sin introducir expansión interpretativa.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel tiempo
  lexicon: HALOT
  rationale: Es la fórmula temporal profética habitual; «en aquel día» mantiene el tono bíblico y la referencia puntual.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir el Tetragrama como «Yahvé» en el texto principal, preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de לְרָעָה וְלֹא לְטוֹבָה
  english_pob_reading: for harm and not for good
  chosen_spanish_reading: para mal y no para bien
  alternative_spanish_readings:
  - para desastre y no para bien
  - para mal y no para el bien
  rationale: En español, «mal» conserva tanto el valor de daño/calamidad como el contraste antitético con «bien». Se evita imponer una paráfrasis más fuerte que no sea exigida por el hebreo.
  doctrine_reference: Jeremiah 39:16 lexical note; POB revision pass against/upon and literal preservation of the clause
translation_notes:
  revision_awareness: La versión inglesa revisada movió «against» a «upon» y luego redujo la expansión interpretativa de «they will come to pass before you» a la forma más literal «they will be before you». La redacción española sigue ese giro revisado con «sobre esta ciudad» y «estarán delante de ti», evitando añadir una interpretación causal o temporal no explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con el estándar español del proyecto.
  - «Cusita» se conserva como etnónimo principal, con nota alternativa a «etíope» según el audit trail inglés.
  - Se usa «mal/bien» para reflejar el contraste hebreo lĕ-rā‘āh wĕ-lō’ lĕ-ṭōbāh sin sobrerinterpretación.
  - No se sustituye la imagen espacial de «delante de ti» por una explicación de cumplimiento, siguiendo la revisión inglesa más literal.
