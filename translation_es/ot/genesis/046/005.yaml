  yaml_path: translation/ot/genesis/046/005.yaml
  text: Then Jacob set out from Beersheba[a], and the sons of Israel carried Jacob their father, their little ones[b], and their wives in the wagons that Pharaoh had sent to carry him.
  footnotes:
