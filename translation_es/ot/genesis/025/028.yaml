translation:
  language: es
  text: Isaac amó a Esaú porque la caza estaba en su boca[a], pero Rebeca amó a Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'porque la caza estaba en su boca'. La expresión probablemente significa que Isaac favorecía a Esaú porque disfrutaba la caza que Esaú le proporcionaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱהַב
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - llegó a amar
  lexicon: HALOT
  rationale: El qal wayyiqtol expresa acción narrativa pasada; en español, el pretérito simple 'amó' comunica bien el hecho puntual o general del afecto sin añadir matices no presentes en el hebreo.
- source_word: אֶת עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: a Esaú
  alternatives_spanish:
  - Esaú
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce; en español, el objeto personal normalmente requiere la preposición 'a'.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa del amor de Isaac; 'porque' es la equivalencia natural y clara en español.
- source_word: צַיִד
  english_pob_choice: game
  chosen_spanish: la caza
  alternatives_spanish:
  - la presa
  - la caza obtenida
  - el venado
  lexicon: HALOT
  rationale: El sustantivo puede referirse a lo cazado o a la presa cazada. 'La caza' mantiene la concreción del hebreo y evita estrechar el sentido a una especie animal específica.
- source_word: בְּפִיו
  english_pob_choice: was in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - estaba en su boca
  - era de su gusto
  lexicon: HALOT
  rationale: Se conserva la imagen literal hebrea 'en su boca', como en la POB inglesa, porque el giro es deliberadamente concreto y puede reflejar la razón expresada en el texto sin interpretarla demasiado.
- source_word: וְרִבְקָה
  english_pob_choice: but Rebekah
  chosen_spanish: pero Rebeca
  alternatives_spanish:
  - y Rebeca
  lexicon: HALOT
  rationale: Aunque la partícula es 'y', el contraste discursivo entre las preferencias parentales se expresa naturalmente con 'pero' en español, siguiendo el valor contextual reconocido en la auditoría inglesa.
- source_word: אֹהֶבֶת
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  lexicon: HALOT
  rationale: El participio indica una acción característica o continua; en español, el imperfecto 'amaba' expresa bien el estado habitual o duradero del afecto de Rebeca.
- source_word: אֶת יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Se omite la marca objetiva hebrea en la traducción, y en español se conserva la preposición personal 'a'.
theological_decisions:
- issue: Contraste entre los afectos de Isaac y Rebeca
  english_pob_reading: The verse simply describes parental preference; no doctrinal expansion is added.
  chosen_spanish_reading: El versículo describe la preferencia afectiva de cada padre/madre sin ampliar más allá del texto.
  alternative_spanish_readings:
  - El versículo enseña una aprobación divina de Jacob
  - El versículo solo narra dos amores sin contraste
  rationale: El hebreo y la POB inglesa presentan un contraste narrativo de preferencias, no una afirmación doctrinal explícita. El español debe conservar esa tensión descriptiva sin moralizarla ni hacerla dogmática.
  doctrine_reference: Principio de lectura contextual y no inferencia doctrinal más allá del texto narrativo.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de la POB inglesa sin cambios relevantes: el hebreo literal ''en su boca'' se conserva en el texto y se explica en nota, y el contraste introducido por וְ se expresa con ''pero'' por razón discursiva. No se introdujeron revisiones textuales ni alternativas mayores.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - 'Se usa ''amó/amaba'' para reflejar tiempos narrativos distintos: pretérito para Isaac, imperfecto para el amor característico de Rebeca.'
  - Se conserva la imagen corporal 'en su boca' para respetar la tensión lexical del hebreo y la auditoría inglesa.
