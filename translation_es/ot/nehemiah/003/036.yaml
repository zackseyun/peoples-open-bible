  to: Escucha[a], nuestro Dios, porque somos despreciados. Haz volver su oprobio sobre sus propias cabezas, y entrégalos[c] como botín en una tierra de cautiverio[d].
  rationale: Se revisa el verbo principal de reversión a «Haz volver» para reflejar mejor el valor causativo de וְהָשֵׁב y para sonar más natural en español. También se corrige «su propia cabeza» a «sus propias cabezas» para preservar el plural explícito del hebreo y la imagen retributiva documentada por el audit trail inglés. Se elimina la nota [b] porque ya no corresponde a una alternativa necesaria una vez incorporada al texto la mejor solución principal. Se ajusta mínimamente la nota [a] para corregir la forma española «óyenos».
