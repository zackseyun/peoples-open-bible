  rationale: Se ajusta el marcador discursivo inicial para reflejar mejor וְעַתָּה y se mejora la naturalidad reverente de la petición al rey. Se conserva la metáfora hebrea «caiga delante de ti», la referencia a la casa de Jehonatán, y el sentido preventivo de la cláusula final. La nota se mantiene, pero sin comillas externas innecesarias.
