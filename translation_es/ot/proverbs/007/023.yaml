review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: mantiene ''flecha'', ''hígado'', la comparación con el ave y el desenlace mortal del hebreo elíptico. Sin embargo, ''hacia una trampa'' debilita el valor de אֶל־פָּח en esta imagen, donde el ave entra en el lazo/trampa, no solo se dirige hacia él. También conviene alinear mejor la puntuación y fluidez de la frase comparativa.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y preciso con 'que se precipita a la trampa' o 'entra en una trampa'. El resto del verso está bien logrado. La nota al pie comunica adecuadamente la elipsis hebrea, aunque una redacción un poco más natural en español mejora la legibilidad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones ''flecha'', ''hígado'', ''ave'' y ''vida'' son adecuadas. El ajuste principal es estilístico-semántico en אֶל־פָּח: preferible ''a la trampa'' o ''en una trampa'' frente a ''hacia una trampa'' para preservar mejor la escena del ave atrapándose.'
  issues:
  - severity: medium
    issue: '''hacia una trampa'' subtraduce la imagen de אֶל־פָּח'
    rationale: En el símil, el ave no solo va en dirección a la trampa sino que se mete en ella. 'Hacia' deja la acción incompleta y pierde parte de la viveza del original y de la auditoría inglesa ('into a snare').
  - severity: low
    issue: La nota al pie puede leerse con redacción más idiomática
    rationale: La nota actual es fiel, pero 'que pierde su vida' suena menos natural que 'que pierde la vida', y quitar comillas internas innecesarias mejora la claridad.
  revised_spanish_text: hasta que una flecha le atraviese el hígado, como un ave que se precipita a la trampa, y no sabe que le costará la vida[a].
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «que es para su vida» o «que pierde la vida»; el hebreo es elíptico y quiere decir que el camino que sigue lo conduce a la muerte.'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'hacia una trampa' a 'a la trampa' para reflejar mejor la imagen hebrea y la decisión auditada en inglés de entrada al lazo, no mera dirección. También se pule la nota para un español más natural sin alterar su contenido. No se requieren cambios doctrinales ni de terminología del proyecto.
