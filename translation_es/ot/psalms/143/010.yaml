translation:
  language: es
  text: Enséñame a hacer tu voluntad[a], porque tú eres mi Dios. Que tu buen Espíritu me guíe en tierra llana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu buen espíritu me guíe». El hebreo no distingue mayúsculas, por lo que la frase puede entenderse como el Espíritu de Dios o como su espíritu/disposición buena.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְּדֵנִי
  english_pob_choice: Teach me
  chosen_spanish: Enséñame
  alternatives_spanish:
  - Instrúyeme
  lexicon: HALOT
  rationale: El piel imperativo de למד con sufijo de 1cs pide un verbo de enseñanza/instrucción. «Enséñame» es natural en español devocional y conserva el valor directo de la petición.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para hacer
  - a cumplir
  lexicon: HALOT
  rationale: El infinitivo constructo expresa el contenido de lo aprendido. «A hacer» conserva la sencillez verbal sin añadir matices no requeridos por el hebreo.
- source_word: רְצוֹנֶךָ
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu querer
  - lo que te agrada
  lexicon: HALOT
  rationale: En este contexto oracional, רָצוֹן se entiende de manera natural como la voluntad deseada por Dios. «Voluntad» es la equivalencia más clara y fiel para español.
- source_word: כִּי אַתָּה אֱלֹהָי
  english_pob_choice: for you are my God
  chosen_spanish: porque tú eres mi Dios
  alternatives_spanish:
  - pues tú eres mi Dios
  - ya que tú eres mi Dios
  lexicon: HALOT
  rationale: כִּי introduce la base de la petición. «Porque» mantiene la relación causal y suena natural en español de oración.
- source_word: רוּחֲךָ טוֹבָה
  english_pob_choice: your good Spirit
  chosen_spanish: tu buen Espíritu
  alternatives_spanish:
  - tu buen espíritu
  - tu Espíritu bueno
  lexicon: HALOT
  rationale: רוּחַ con sufijo puede referirse al Espíritu de Dios o, en lectura más general, al espíritu/disposición de Dios. En español, «Espíritu» con mayúscula señala la lectura teológica más probable sin eliminar la tensión textual, y «buen» conserva טוֹבָה de forma directa.
- source_word: תַּנְחֵנִי
  english_pob_choice: Let your good Spirit lead me
  chosen_spanish: me guíe
  alternatives_spanish:
  - me lleve
  - me conduzca
  lexicon: HALOT
  rationale: El hiphil de נחה significa guiar/dirigir. «Me guíe» reproduce bien el sentido de conducción en una súplica optativa.
- source_word: בְּאֶרֶץ מִישׁוֹר
  english_pob_choice: in level ground
  chosen_spanish: en tierra llana
  alternatives_spanish:
  - en tierra plana
  - en terreno llano
  - en tierra de rectitud
  lexicon: HALOT
  rationale: מִישׁוֹר nombra un lugar llano o nivelado; aquí la imagen espacial es primaria. «Tierra llana» es una forma natural en español y mantiene la metáfora de un terreno sin obstáculos.
theological_decisions:
- issue: 'Cómo traducir רוּחֲךָ: Espíritu personal o espíritu/disposición'
  english_pob_reading: your good Spirit
  chosen_spanish_reading: tu buen Espíritu
  alternative_spanish_readings:
  - tu buen espíritu
  - tu buena disposición
  rationale: El hebreo no distingue por mayúsculas, y la expresión puede leerse como el Espíritu de Dios o como su espíritu/disposición buena. La mayúscula en español marca la lectura teológica más probable en la oración, pero la ambigüedad permanece implícita porque el texto fuente no la resuelve de modo explícito.
  doctrine_reference: Preservar la tensión interpretativa de la fuente sin forzarla; equivalencia óptima
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «on level ground» por «in level ground» para ajustarse con mayor precisión a la preposición hebrea. En español se refleja con «en tierra llana», que mantiene la preposición de localización sin sobretraducir la imagen.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהָי, manteniendo la relación posesiva «mi Dios».
  - Se conserva «Espíritu» con mayúscula como decisión teológica señalada, pero la nota conserva la lectura alternativa en minúscula.
  - «Tierra llana» evita el calco rígido de «en suelo nivelado» y preserva la metáfora espacial del hebreo.
  - La formulación es adecuada para lectura pública y sigue un registro bíblico contemporáneo sin arcaísmos innecesarios.
