translation:
  language: es
  text: Del mismo modo, Salomón también observó los ocho días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «celebró los ocho días». El verbo griego, en sentido literal, significa «llevó/condujo», pero aquí se entiende como la observancia de un periodo festivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Del mismo modo
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: LSJ
  rationale: Marca comparación con el ejemplo anterior. 'Del mismo modo' conserva la relación adverbial sin sonar forzado en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: LSJ
  rationale: Aquí añade a Salomón como otro ejemplo; 'también' reproduce el valor aditivo mejor que una simple coordinación.
- source_word: ὁ Σαλωμὼν
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: LSJ
  rationale: Nombre propio con la forma española estándar, manteniendo el artículo griego sin traducirlo explícitamente.
- source_word: τὰς ὀκτὼ ἡμέρας
  english_pob_choice: the eight days
  chosen_spanish: los ocho días
  alternatives_spanish:
  - durante ocho días
  - la fiesta de ocho días
  lexicon: LSJ
  rationale: La frase griega es acusativa objeto de ἤγαγεν; 'los ocho días' preserva la forma más cercana sin introducir 'fiesta' en el texto principal.
- source_word: ἤγαγεν
  english_pob_choice: observed
  chosen_spanish: observó
  alternatives_spanish:
  - celebró
  - guardó
  - pasó
  lexicon: LSJ
  rationale: El verbo literalmente significa 'llevó/condujo', pero en este contexto festivo expresa la observancia de un periodo. 'Observó' sigue de cerca la opción inglesa auditada y es natural en español.
translation_notes:
  revision_awareness: La revisión inglesa cambió de 'kept' a 'observed' para sonar más natural y formal sin perder el sentido de ἤγαγεν en contexto festivo; el español sigue esa misma dirección con 'observó'.
  spanish_consistency_notes:
  - Se mantiene 'Salomón' como forma española estándar del nombre propio.
  - '''Observó'' conserva la decisión lexical de POB sin importar ''celebró'' al cuerpo principal.'
  - No se añade 'fiesta' en el texto principal para no sobreinterpretar una implicación contextual no explicitada en el griego.
