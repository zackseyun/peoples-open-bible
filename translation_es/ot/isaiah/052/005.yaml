    text: Or 'their oppressors howl.' The Hebrew term can denote those ruling over the people, and in context the rulers are oppressive.
    reason: lexical_alternative
  - marker: b
    text: Or 'my name is blasphemed continually all day long.'
    reason: lexical_alternative
