review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura enumerativa del griego y refleja adecuadamente κτήνη como «ganado» y τὰ κακά como «los males». Sin embargo, dos decisiones importantes no siguen el expediente auditado: γυναῖκες en este contexto doméstico debe verterse como «esposas», no «mujeres», y υἱοὶ se documentó como «sons», por lo que en español conviene marcar «hijos varones» para no neutralizar el masculino específico. Además, «se habían agravado sobre ellos» suena poco natural; el sentido de ἐσκληρύνθη ἐπʼ αὐτοὺς se expresa mejor como que los males «se habían vuelto severos para ellos» o «se habían agravado para ellos».'
  spanish_quality_summary: La frase es generalmente comprensible, pero «sus mujeres» en español moderno suena ambigua o poco natural en una lista familiar; «sus esposas» es más claro y digno. También «se habían agravado sobre ellos» es un calco poco idiomático; «para ellos» o una reestructuración similar mejora notablemente la lectura. El resto del registro es adecuado.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal alineación léxica pendiente es respetar el rationale del POB para γυναῖκες = «wives» y mantener la especificidad de υἱοὶ. «Ganado» alinea bien con κτήνη / livestock. «Los males» con nota alternativa también alinea bien con τὰ κακά.
  issues:
  - severity: medium
    issue: «sus mujeres» no refleja bien γυναῖκες en este contexto
    rationale: El audit trail inglés documenta que, en una lista de hogar con posesivo, el sentido es «wives». En español neutral y eclesial, «sus esposas» comunica esa relación con claridad, mientras que «sus mujeres» puede sonar coloquial o ambiguo.
  - severity: medium
    issue: «hijos» neutraliza la especificidad de υἱοὶ
    rationale: El expediente inglés subraya explícitamente «sons» frente a una opción genérica. En español, «hijos» puede entenderse genéricamente; «hijos varones» preserva la precisión del original, aunque sea un poco más explícito.
  - severity: low
    issue: «se habían agravado sobre ellos» es poco idiomático
    rationale: Aunque intenta reflejar ἐπʼ αὐτούς, en español «sobre ellos» con «agravarse» resulta forzado. «Se habían agravado para ellos» mantiene el sentido sin calco duro.
  - severity: low
    issue: La nota al pie repite una alternativa poco útil
    rationale: 'La nota actual ofrece como alternativa una frase casi idéntica a la principal. Conviene preservar las alternativas léxicas del inglés: «las desgracias» o «las calamidades».'
