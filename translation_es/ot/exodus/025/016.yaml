translation:
  language: es
  text: Y pondrás en el arca el testimonio[a] que yo te daré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en el contexto, «las tablas del testimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: And you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y meterás
  lexicon: HALOT
  rationale: נתן tiene un campo semántico amplio (“dar”, “poner”, “colocar”). Aquí, con אֶל + el arca, el valor espacial domina. “Pondrás” suena natural en español y conserva la idea de colocación sin cargar innecesariamente el verbo.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  lexicon: HALOT
  rationale: En español, con un objeto contenedor como “el arca”, la relación espacial se expresa de forma natural con “en”; el contexto ya implica inserción, como el inglés POB resuelve con “into”.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca sagrada
  - el cofre
  lexicon: HALOT
  rationale: En el contexto tabernacular, אָרוֹן designa el arca sagrada. “Arca” es la traducción establecida y comunica mejor su carácter cultual que “cofre” o “caja”.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio del pacto
  - las tablas del testimonio
  - el testimonio legal
  lexicon: HALOT
  rationale: “Testimonio” preserva el término hebreo sin anticipar más de lo que dice el versículo. El contexto posterior identifica este testimonio con las tablas, pero aquí conviene mantener la formulación general.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: Hebrew grammar
  rationale: “Que” es la partícula relativa más natural en español y refleja adecuadamente la relación subordinada sin rigidez.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: yo te daré
  alternatives_spanish:
  - yo daré a ti
  - yo te entregaré
  lexicon: HALOT
  rationale: El futuro de נתן aquí expresa acción futura divina. “Daré” mantiene la sencillez del hebreo y “te” expresa el dativo pronominal de manera idiomática.
- source_word: אֵלֶיךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: En español, con “dar”, el complemento indirecto se expresa naturalmente con el pronombre enclítico/átono “te”. Esto conserva la relación personal con Moisés sin sobrecargar la frase.
theological_decisions:
- issue: Alcance de “el testimonio”
  english_pob_reading: Render generically as 'the testimony' without specifying tablets in the main text.
  chosen_spanish_reading: Mantener “el testimonio” sin especificar “las tablas” en el cuerpo principal.
  alternative_spanish_readings:
  - “las tablas del testimonio”
  - “el documento del pacto”
  rationale: El hebreo del versículo nombra solo “el testimonio” que Dios dará. El contexto más amplio permite entender que serán las tablas, pero la redacción principal debe respetar el alcance inmediato del texto y no añadir una identificación explícita que el versículo aún no formula.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto base en inglés no requirió revisión; el draft español sigue la decisión auditada de mantener la referencia general “the testimony” sin explicitar “tablets” en el texto principal, reservando esa precisión para una nota.
  spanish_consistency_notes:
  - Se mantuvo “arca” como término técnico cultual, coherente con el uso bíblico en español.
  - Se preservó “testimonio” por consistencia con el término hebreo עֵדֻת y con la decisión inglesa auditada.
  - La estructura verbal en futuro (“pondrás”, “daré”) refleja adecuadamente el valor prospectivo del hebreo.
  - El pronombre de objeto indirecto quedó integrado de manera idiomática en español (“te daré”).
