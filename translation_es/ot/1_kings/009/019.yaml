    text: Or 'store cities' or 'supply cities.' The Hebrew refers to cities designated for storage or provisions.
    reason: lexical_alternative
  - marker: b
    text: Or 'cities of the horsemen' or 'cavalry cities.' The Hebrew term refers more specifically to horsemen than to horses in general.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'the desire of Solomon which he desired to build,' a Hebrew emphatic expression for what Solomon strongly wished to build.
    reason: lexical_alternative
