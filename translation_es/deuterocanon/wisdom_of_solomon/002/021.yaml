  - Se usa un verbo reflexivo para ἐπλανήθησαν («se desviaron») para conservar el matiz de apartarse del camino correcto sin añadir agentes externos.
  - No se introducen términos eclesiásticos no sustentados por el griego.
  - La puntuación con punto y coma reproduce bien la relación causal del original.
