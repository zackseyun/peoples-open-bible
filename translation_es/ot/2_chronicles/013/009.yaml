  to: ¿No han expulsado ustedes a los sacerdotes de Yahvé, a los hijos de Aarón y a los levitas, y han nombrado sacerdotes para ustedes, como los pueblos de las tierras? Todo el que viene a llenar su mano[a] con un novillo y siete carneros llega a ser sacerdote de lo que no son dioses[b].
  rationale: Se corrigió la cláusula central para reflejar el sentido de 'hacer/nombrar sacerdotes para ustedes' en vez de sugerir reflexivamente que ellos mismos se hicieron sacerdotes. También se simplificaron las notas para conservar solo las que preservan un tecnicismo importante del hebreo y una alternativa significativa para la frase polémica final, en línea con el rastro POB y la disciplina de notas del proyecto.
