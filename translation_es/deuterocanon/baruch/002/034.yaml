review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: retorno a la tierra jurada a los padres, mención explícita de Abraham, Isaac y Jacob, multiplicación y negación enfática de disminución. También preserva la alternativa léxica para κυριεύσουσιν. Sin embargo, «la gobernarán» suena menos natural con «tierra» en español y puede sugerir administración política más que dominio/posesión sobre la tierra; una formulación más fiel y legible es «dominarán sobre ella», con nota que preserve «la poseerán» como alternativa.'
  spanish_quality_summary: El español es generalmente claro y digno. La principal reparación es estilística y semántica en «la gobernarán[a]», porque en español bíblico-natural se gobierna un pueblo o nación más fácilmente que una tierra; «dominarán sobre ella[a]» reproduce mejor la fuerza de κυριεύω sin forzar el registro. También conviene ajustar la puntuación de los incisos para mayor fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Juré», «padres», «tierra» y «multiplicaré» están bien alineados con la justificación léxica y teológica documentada. La revisión propuesta mantiene la decisión inglesa de privilegiar el sentido fuerte de κυριεύσουσιν frente a una suavización posesiva, pero con español más idiomático.
  issues:
  - severity: medium
    issue: «la gobernarán» no es la mejor equivalencia española para κυριεύσουσιν en este contexto
    rationale: Aunque comunica dominio, en español sugiere más naturalmente gobernar una entidad política. Con «tierra», «dominarán sobre ella» refleja mejor el valor de κυριεύω y evita una lectura administrativa.
  - severity: low
    issue: Puntuación del inciso con los patriarcas algo cargada
    rationale: El uso de raya de cierre seguido de coma es defendible, pero una puntuación más limpia mejora la legibilidad sin afectar el sentido.
