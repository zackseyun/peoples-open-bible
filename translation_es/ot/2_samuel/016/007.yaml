  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: introduce el habla de Simeí, conserva la simultaneidad de «mientras lo maldecía», mantiene la repetición intensificadora «sal, sal» y evita leer בְּלִיַּעַל como nombre propio. Sin embargo, la nota [b] está anclada en «sal, sal» pero explica alternativas para el imperativo; la nota verdaderamente necesaria según el rastro inglés es la alternativa léxica de «hombre sanguinario» para אִישׁ הַדָּמִים, mientras que «hombre indigno» para בְּלִיַּעַל conviene acercarlo más a «hombre despreciable» o «hombre vil» para preservar mejor la noción de inutilidad/bajeza moral de «worthless man».'
