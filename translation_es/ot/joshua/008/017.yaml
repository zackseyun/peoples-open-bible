base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/017.yaml
  text: And not a man was left in Ai or Bethel who did not go out after Israel[b][a], and they left the city open and pursued Israel.
  footnotes:
  - marker: a
    text: Or, more dynamically, 'they left the city unguarded.' The Hebrew reads literally 'the city open.'
    reason: lexical_alternative
  - marker: b
    text: '''Not a man'' renders Hebrew אִישׁ, a masculine singular form used here generically for any person remaining behind.'
    reason: lexical_alternative
