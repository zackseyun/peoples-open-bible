revisions:
- from: 'Daniel respondió delante del rey y dijo[a]: «El misterio que el rey pregunta, ni los sabios, ni los encantadores, ni los magos[b], ni los adivinos pueden darlo a conocer al rey».'
  to: 'Daniel respondió ante el rey y dijo[a]: «El misterio que el rey pregunta, ni los sabios, los encantadores[b], los magos ni los adivinos pueden darlo a conocer al rey».'
  rationale: Se corrige la ubicación de la nota léxica para que «astrólogos» quede asociada al término arameo correspondiente («encantadores»), en conformidad con la evidencia fuente y la auditoría inglesa. Además, se pule levemente el español con «ante el rey» y una enumeración más natural, sin alterar el sentido.
