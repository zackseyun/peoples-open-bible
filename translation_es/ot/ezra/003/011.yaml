revisions:
- from: 'Y ellos respondieron con alabanza y acción de gracias a Yahvé: «Porque es bueno[a], porque para siempre[b] es su misericordia[c] sobre Israel». Y todo el pueblo gritó con gran clamor, en alabanza a Yahvé, porque se había puesto el fundamento de la casa de Yahvé.'
  to: 'Y respondían[a] con alabanza y acción de gracias a Yahvé: «Porque él es bueno, porque su amor constante hacia Israel es para siempre[b]». Y todo el pueblo gritó con un gran grito en alabanza a Yahvé, porque se había puesto el fundamento[c] de la casa de Yahvé.'
  rationale: 'Se ajustó el texto para alinear mejor el español con el hebreo y con las decisiones auditadas del POB: se hizo más explícito el sentido responsivo de וַיַּעֲנוּ; se reemplazó «misericordia» por «amor constante» para reflejar mejor חֶסֶד; se cambió «sobre Israel» por «hacia Israel»; y se restauraron notas más pertinentes al expediente inglés, incluida la nota cultural sobre el fundamento. El resultado sigue siendo natural y ampliamente legible en español eclesial.'
