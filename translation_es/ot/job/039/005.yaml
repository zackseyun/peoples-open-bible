translation:
  language: es
  text: ¿Quién ha dejado libre al asno salvaje[a]? ¿Quién ha soltado las ataduras del asno salvaje?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asno montés». El hebreo פֶּרֶא y עָרוֹד se refieren aquí al asno silvestre; «asno salvaje» expresa ese sentido con mayor claridad para el lector moderno. También puede traducirse «onagro».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ha
  lexicon: HALOT
  rationale: Interrogativo directo que introduce una pregunta retórica de Yahvé; en español, «¿Quién» conserva la fuerza y la naturalidad del original.
- source_word: שִׁלַּח
  english_pob_choice: has let ... go
  chosen_spanish: ha dejado libre
  alternatives_spanish:
  - ha soltado
  - ha liberado
  lexicon: HALOT
  rationale: En este contexto verbal con חָפְשִׁי, el sentido es de poner en libertad. «Ha dejado libre» expresa bien el valor de liberar sin sonar forzado en español.
- source_word: פֶּרֶא
  english_pob_choice: wild donkey
  chosen_spanish: asno montés
  alternatives_spanish:
  - burro salvaje
  - asno salvaje
  lexicon: HALOT
  rationale: El término designa un asno silvestre; «asno montés» es una forma clara y bíblicamente reconocible en español, manteniendo el referente animal sin introducir una lectura más doméstica.
- source_word: חָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - en libertad
  - desatado
  lexicon: HALOT
  rationale: Adjetivo que describe el estado del animal tras ser soltado. «Libre» preserva el complemento adjetival de manera directa.
- source_word: וּמֹסְרוֹת
  english_pob_choice: the bonds
  chosen_spanish: las ataduras
  alternatives_spanish:
  - los lazos
  - las ligaduras
  - los vínculos
  lexicon: HALOT
  rationale: El sustantivo plural se refiere a restricciones físicas. «Ataduras» es concreto, natural en español y adecuado para el paralelo con el verbo de soltar/aflojar.
- source_word: עָרוֹד
  english_pob_choice: the wild donkey
  chosen_spanish: asno montés
  alternatives_spanish:
  - onagro
  - asno salvaje
  lexicon: HALOT
  rationale: Aunque el inglés POB discutió una posible especificación distinta, la revisión final unificó el referente como «wild donkey». En español conviene mantener la misma identificación general para no crear una distinción no sustentada por el texto final.
- source_word: פִתֵּחַ
  english_pob_choice: has untied
  chosen_spanish: ha soltado
  alternatives_spanish:
  - ha desatado
  - ha aflojado
  lexicon: HALOT
  rationale: Con «ataduras», el verbo expresa la acción de aflojar o desatar. «Ha soltado» es idiomático y recoge el paralelismo con «ha dejado libre».
theological_decisions:
- issue: Discurso divino interrogativo y retórico
  english_pob_reading: Who has let the wild donkey go free? Who has untied the bonds of the wild donkey?
  chosen_spanish_reading: ¿Quién ha dejado libre al asno montés? ¿Quién ha soltado las ataduras del asno montés?
  alternative_spanish_readings:
  - ¿Quién soltó al asno montés?
  - ¿Quién liberó al asno montés?
  rationale: La pregunta no busca información, sino subrayar la soberanía creadora y providencial de Yahvé. El español conserva la forma retórica y el paralelismo sin explicitar más de lo que el hebreo dice.
  doctrine_reference: Job 38–41; soberanía de Yahvé sobre la creación
- issue: Nombre del animal en los dos miembros paralelos
  english_pob_reading: wild donkey / wild donkey
  chosen_spanish_reading: asno montés / asno montés
  alternative_spanish_readings:
  - asno salvaje / asno salvaje
  - onagro / onagro
  rationale: La revisión inglesa descartó una diferenciación léxica entre los dos miembros. En español, repetir el mismo referente evita introducir una oposición inexistente en el texto final y preserva el paralelismo hebreo.
  doctrine_reference: Paralelismo hebreo; consistencia léxica en la poesía bíblica
translation_notes:
  revision_awareness: La fuente inglesa pasó por una revisión que eliminó la distinción entre «swift donkey» y «wild donkey» para mantener precisión léxica. La redacción española sigue esa decisión y unifica ambos miembros del paralelismo como «asno montés», sin introducir una especificación adicional no sustentada por la versión final auditada.
  spanish_consistency_notes:
  - Se mantiene «asno montés» de forma consistente para פֶּרֶא y עָרוֹד, siguiendo la revisión inglesa final.
  - Se conserva el paralelismo interrogativo con dos preguntas separadas por punto y coma implícito mediante el punto final de cada oración interrogativa.
  - Se evita «SEÑOR» y otras sustituciones devocionales; el verso no contiene el Nombre divino explícito.
