translation:
  language: es
  text: Y se levantaron contra ellos en batalla en sábado[a]; y murieron ellos, sus mujeres, sus hijos y sus animales, como mil personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los sábados»; el griego está en plural, pero en contexto puede expresarse idiomáticamente en singular para referirse a ese día de reposo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστησαν ἐπʼ αὐτούς
  english_pob_choice: rose up against them
  chosen_spanish: se levantaron contra ellos
  alternatives_spanish:
  - se alzaron contra ellos
  - se pusieron en contra de ellos
  lexicon: LSJ
  rationale: Conserva la imagen verbal de alzarse/levantarse contra un enemigo, sin volverlo más técnico de lo que pide el griego.
- source_word: ἐν τῷ πολέμῳ
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en la guerra
  - en combate
  lexicon: LSJ
  rationale: La escena describe el enfrentamiento concreto; «en batalla» suena natural en español y mantiene el matiz de lucha directa.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en el sábado
  alternatives_spanish:
  - en los sábados
  - el día de reposo
  lexicon: LSJ
  rationale: El griego está en plural, pero el sentido es un ataque ocurrido en día de reposo. En español, «sábado» comunica mejor la referencia histórica concreta; se conserva la posible tensión del plural en nota.
- source_word: ἀπέθανον
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - fueron muertos
  - perecieron
  lexicon: LSJ
  rationale: El verbo griego es intransitivo. «Murieron» sigue de cerca la forma verbal y evita añadir una pasiva que el texto no expresa explícitamente.
- source_word: τὰ κτήνη
  english_pob_choice: their livestock
  chosen_spanish: sus animales
  alternatives_spanish:
  - su ganado
  - sus bestias
  lexicon: LSJ
  rationale: κτήνη puede abarcar animales domésticos/propiedad animal. «Animales» es claro y suficientemente amplio en español; «ganado» sería más estrecho.
- source_word: ἕως χιλίων ψυχῶν ἀνθρώπων
  english_pob_choice: about a thousand persons
  chosen_spanish: hasta unos mil personas
  alternatives_spanish:
  - hasta mil personas
  - como mil personas
  lexicon: LSJ
  rationale: ἕως con número puede indicar límite aproximado. Se mantiene la idea de cifra no exacta con «unos», pero «personas» requiere ajuste gramatical; la formulación conserva el sentido de totalidad humana.
theological_decisions:
- issue: Referencia al sábado como día de ataque
  english_pob_reading: on the Sabbath
  chosen_spanish_reading: en el sábado
  alternative_spanish_readings:
  - en los sábados
  - en día de reposo
  rationale: 'No se suaviza la tensión histórica: el ataque ocurre en día sagrado de reposo. «Sábado» es la forma más directa y reconocible para lectores hispanos.'
  doctrine_reference: Santidad del día de reposo / observancia del sábado en el contexto judío
- issue: Cantidad aproximada de muertos
  english_pob_reading: about a thousand persons
  chosen_spanish_reading: hasta unos mil personas
  alternative_spanish_readings:
  - como mil personas
  - hasta mil personas
  rationale: El griego permite entender un máximo aproximado más que un conteo exacto. La redacción española intenta conservar esa ambigüedad cuantitativa sin absolutizar la cifra.
  doctrine_reference: Precisión textual y cautela ante cifras aproximadas
translation_notes:
  revision_awareness: Coincide con el pasaje griego y con la lectura auditada en inglés; se ha mantenido la estructura enumerativa y la cifra aproximada, ajustando únicamente la fluidez del español y la referencia idiomática del plural griego.
  spanish_consistency_notes:
  - Se conserva «sábado» en vez de «día de reposo» en el texto principal por claridad histórica, pero se documenta la alternativa.
  - Se traduce ἕως χιλίων ψυχῶν ἀνθρώπων con una construcción aproximativa para no volver exacta una cifra que el griego no precisa plenamente.
  - Se mantiene la enumeración de víctimas y bienes en paralelo con el griego y la versión inglesa auditada.
