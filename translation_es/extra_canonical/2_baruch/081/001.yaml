  text: 'But also hear a word of consolation. For I was mourning over Zion, and I sought mercy from the Most High, and I said, “Will these things remain for us until the end? And will these afflictions come upon us at every time?” And the Mighty One acted according to the abundance of his mercies, and he spared according to the greatness of his grace. And he revealed a word to me, that I might be strengthened, and he gave me visions, that I might not again be shaken; and he made known to me the mysteries of the times, and showed me the coming of the ages.


    Therefore, my brothers, I have written to you so that you may be comforted because of the multitude of your tribulations. For know that our Maker will require vengeance from all our enemies for all the evil things they have done against us, and that the consummation which the Most High has prepared is near, and his mercy is coming, and the completion of his judgment is not far away.


    For now we see the abundance of the prosperity of the nations while they act wickedly, but they will be reckoned like a drop. And we look at the strength of their power, but it will be accounted as spittle. We think on the glory of their greatness, while they do not keep the commandments of the Mighty One, but have treated them with contempt. And we think on the beauty that is seen, though it is shaken in afflictions, and they will be sought out like flesh in pain. And we reckon only the confidence in which they trust, though it is shaken before our eyes; but they will be crushed like a wave. And we seek only the hope of their strength, when it flourishes in the good things that God gave them; but it will be laid away, and lamentation will overtake it.'
