review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: וַיִּשְׁבְּתוּ = «dejaron de», מֵעֲנוֹת = «responder», y la causal con כִּי está bien representada. También preserva correctamente la lectura masorética singular de בְּעֵינָיו y mantiene la variante textual en nota. La única desviación significativa es idiomática: «a sus propios ojos» no es la formulación española más natural para este modismo; «ante sus propios ojos» o «a sus propios ojos» puede entenderse, pero resulta menos claro que «ante sus propios ojos» o «a sus propios ojos» en registro bíblico. Además, la nota «a sus ojos» deja algo ambigua la referencia plural, aunque sigue el inglés.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, pero necesita un ajuste pequeño para mayor fidelidad idiomática y legibilidad bíblica en español. «Justo ante sus propios ojos» suena más natural y transparente que «justo a sus propios ojos». Conviene armonizar la nota con esa mejora: «justo ante sus ojos».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Justo» representa adecuadamente צַדִּיק en este contexto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión teológica de no afirmar la justicia objetiva de Job está bien preservada.
  issues:
  - severity: medium
    issue: Modismo español poco natural en «justo a sus propios ojos»
    rationale: Aunque comprensible, en español bíblico y general suena más idiomático «justo ante sus propios ojos» o «justo a sus propios ojos» menos frecuentemente. «Ante» refleja mejor la locución semítica sin producir una frase rígida o extraña.
  - severity: low
    issue: La nota textual puede sonar algo imprecisa con «a sus ojos»
    rationale: La variante plural se entiende, pero «ante sus ojos» mantiene mejor la correspondencia con la mejora del texto principal y evita una ligera aspereza estilística.
  revised_spanish_text: Así, estos tres hombres dejaron de responder a Job[a], porque él era justo ante sus propios ojos.
  revised_footnotes:
  - marker: a
    text: O, según otra tradición textual, «porque él era justo ante sus ojos».
    reason: textual_variant
  revision_rationale: 'Se aplica una corrección menor de estilo y fidelidad idiomática: «ante sus propios ojos» expresa de forma más natural en español el hebreo בְּעֵינָיו y preserva mejor la tensión teológica documentada por la POB inglesa. La nota se ajusta en paralelo para conservar consistencia estilística.'
