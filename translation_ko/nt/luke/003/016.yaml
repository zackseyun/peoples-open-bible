  text: ἀπεκρίνατο ⸂λέγων πᾶσιν ὁ Ἰωάννης⸃· Ἐγὼ μὲν ὕδατι βαπτίζω ὑμᾶς· ἔρχεται δὲ ὁ ἰσχυρότερός μου, οὗ οὐκ εἰμὶ ἱκανὸς λῦσαι τὸν ἱμάντα τῶν ὑποδημάτων αὐτοῦ· αὐτὸς ὑμᾶς βαπτίσει ἐν πνεύματι ἁγίῳ καὶ πυρί·
base_translation:
  language: en
  yaml_path: translation/nt/luke/003/016.yaml
  text: John answered them all[a], saying, “I indeed baptize you with water, but one stronger than I is coming, whose sandal strap I am not worthy to untie[d][c][b]. He will baptize you in the Holy Spirit and fire.”
  footnotes:
  - marker: a
    text: Or 'with water.' The Greek dative can express means or element here.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one more powerful than I.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with the Holy Spirit and fire.' The Greek reads 'in the Holy Spirit and fire,' and the precise nuance of the preposition may be understood in more than one way.
    reason: lexical_alternative
  - marker: d
    text: '''Fire'' may be understood as purifying, as judgment, or as part of the single image of Spirit-and-fire baptism; the translation leaves the expression as written.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러자 요한이 모두에게 대답하여 말했습니다. 「나는 너희에게 물로 세례를 베푸나, 나보다 더 강하신 분이 오시는데, 나는 그분의 신발 끈을 풀 자격조차 없다. 그분은 너희에게 성령과 불로 세례를 베푸실 것이다.
  philosophy: optimal-equivalence
