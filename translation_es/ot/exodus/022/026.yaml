translation:
  language: es
  text: Porque es su única cobertura; es su manto para su piel. ¿En qué se acostará? Y si me clama, lo oiré, porque soy compasivo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clemente» o «misericordioso» para «compasivo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandamiento previo; «porque» expresa bien la fuerza explicativa en español sin volverla demasiado analítica.
- source_word: כְּסוּתוֹ
  english_pob_choice: his only covering
  chosen_spanish: su única cubierta
  alternatives_spanish:
  - su cubierta solamente
  - su sola cubierta
  lexicon: HALOT
  rationale: כְּסוּת es una prenda o cubierta. «Única cubierta» conserva la idea de exclusividad que refuerza לְבַדָּהּ.
- source_word: לְבַדָּהּ
  english_pob_choice: only
  chosen_spanish: única
  alternatives_spanish:
  - sola
  - solamente
  lexicon: HALOT
  rationale: La expresión indica que no tiene otra cobertura disponible; en español «única» suena natural y mantiene el énfasis de exclusividad.
- source_word: שִׂמְלָתוֹ
  english_pob_choice: his cloak
  chosen_spanish: su manto
  alternatives_spanish:
  - su prenda
  - su capa
  lexicon: HALOT
  rationale: שִׂמְלָה suele referirse a una prenda exterior o manto; «manto» comunica bien la función de cobertura nocturna sin perder dignidad estilística.
- source_word: לְעֹרוֹ
  english_pob_choice: for his skin
  chosen_spanish: para su piel
  alternatives_spanish:
  - contra su piel
  - junto a su piel
  lexicon: HALOT
  rationale: עוֹר es literalmente «piel». «Para su piel» conserva la imaginería corporal del texto y sigue de cerca el hebreo.
- source_word: בַּמֶּה יִשְׁכָּב
  english_pob_choice: In what will he lie down?
  chosen_spanish: ¿En qué se acostará?
  alternatives_spanish:
  - ¿En qué dormirá?
  - ¿Con qué se acostará?
  lexicon: HALOT
  rationale: La pregunta retórica trata sobre el lugar o cobertura para dormir. «Acostarse» conserva el valor de שׁכב y suena natural en español.
- source_word: יִצְעַק אֵלַי
  english_pob_choice: he cries out to me
  chosen_spanish: clama a mí
  alternatives_spanish:
  - grita a mí
  - alza su voz a mí
  lexicon: HALOT
  rationale: צעק denota un clamor de angustia o petición de auxilio. «Clamar» es el equivalente español más estable y solemne para ese matiz.
- source_word: וְשָׁמַעְתִּי
  english_pob_choice: I will hear
  chosen_spanish: yo lo oiré
  alternatives_spanish:
  - lo escucharé
  - yo escucharé
  lexicon: HALOT
  rationale: שׁמע puede ser «oír» o «escuchar»; aquí el énfasis está en la respuesta divina al clamor. «Oiré» mantiene la concisión del hebreo.
- source_word: חַנּוּן
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - gracioso
  - misericordioso
  lexicon: HALOT
  rationale: חַנּוּן describe la disposición benevolente y compasiva de Dios. «Compasivo» comunica esa cualidad en español moderno sin forzar un término litúrgico.
theological_decisions:
- issue: Autodescripción divina חַנּוּן
  english_pob_reading: compassionate
  chosen_spanish_reading: compasivo
  alternative_spanish_readings:
  - gracioso
  - misericordioso
  rationale: En este contexto legal, la afirmación fundamenta la obligación de escuchar el clamor del vulnerable. «Compasivo» expresa con claridad la respuesta benevolente de Yahvé sin borrar la amplitud semántica del término.
  doctrine_reference: Translation philosophy §6 (registro moderno claro, sin arcaísmos innecesarios)
- issue: Referencia al clamor del pobre/endeudado como motivo de justicia divina
  english_pob_reading: he cries out to me, I will hear
  chosen_spanish_reading: si clama a mí, yo lo oiré
  alternative_spanish_readings:
  - si me clama, yo lo oiré
  - si me llama, yo lo escucharé
  rationale: 'La cláusula conserva el patrón de advertencia y respuesta judicial del hebreo: el clamor del afectado provoca la atención de Dios. «Clama a mí» mantiene el tono de urgencia y dependencia.'
  doctrine_reference: Éxodo 22:22-27; atención divina al oprimido en el marco de la ley del pacto
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y toma en cuenta la revisión inglesa que simplificó «And it will be that if» a «And if». En español se optó por una construcción natural equivalente («Y si clama a mí») sin añadir una perífrasis innecesaria. También se preservó la secuencia breve de cláusulas y el cierre con la autodescripción divina.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto, aunque este versículo no contiene el Tetragrámaton explícito en la superficie hebrea, porque el hablante es Dios en el discurso legal del pacto.
  - Se eligió «manto» en lugar de «capa» o «prenda» para conservar la imagen de una cobertura exterior usable para dormir.
  - «Compasivo» se usa como equivalente principal de חַנּוּן; la nota conserva las alternativas semánticas relevantes sin saturar el texto principal.
