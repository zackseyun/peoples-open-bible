translation:
  language: es
  text: Y se convertirá en polvo fino sobre toda la tierra de Egipto,[b] y se convertirá en llagas que brotan con ampollas sobre el hombre[a] y sobre la bestia por toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la humanidad»; el hebreo אָדָם es un término genérico para la humanidad aquí, en contraste con la bestia.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «sarpullido que produzca úlceras» o formulaciones semejantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: and it will become
  chosen_spanish: y se convertirá
  alternatives_spanish:
  - y será
  - y llegará a ser
  lexicon: HALOT
  rationale: El hebreo expresa un cambio de estado; «se convertirá» comunica mejor la transformación que un simple «será».
- source_word: לְאָבָק
  english_pob_choice: fine dust
  chosen_spanish: polvo fino
  alternatives_spanish:
  - polvo
  - polvillo
  lexicon: HALOT
  rationale: אָבָק designa polvo/partículas finas; «polvo fino» preserva el matiz de material pulverizado en suspensión.
- source_word: עַל כָּל אֶרֶץ מִצְרָיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Sobre» refleja el valor espacial de עַל en este contexto de dispersión extensa; «tierra» mantiene el registro bíblico natural en español.
- source_word: עַל הָאָדָם
  english_pob_choice: on man
  chosen_spanish: sobre el hombre
  alternatives_spanish:
  - sobre la humanidad
  - sobre las personas
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo, en contraste con la bestia; así no se pierde la fuerza representativa de אָדָם.
- source_word: וְעַל הַבְּהֵמָה
  english_pob_choice: and on beast
  chosen_spanish: y sobre la bestia
  alternatives_spanish:
  - y sobre los animales
  - y sobre el ganado
  lexicon: HALOT
  rationale: «Bestia» mantiene el colectivo singular del hebreo y el contraste con «el hombre» mejor que una pluralización explicativa.
- source_word: לִשְׁחִין פֹּרֵחַ אֲבַעְבֻּעֹת
  english_pob_choice: festering boils
  chosen_spanish: úlceras supurantes
  alternatives_spanish:
  - forúnculos supurantes
  - llagas supurantes
  - boils festering
  lexicon: HALOT
  rationale: El hebreo describe una afección eruptiva y en progresión; «úlceras supurantes» comunica el carácter abierto, inflamado y exudativo sin depender de un calco demasiado literal. Se evita «boils» en español por ser menos idiomático, pero se conserva la idea patológica y el registro formal.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: por toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - a lo largo de toda la tierra de Egipto
  lexicon: HALOT
  rationale: La repetición enfatiza extensión distributiva; «por toda» transmite bien la difusión del juicio en todo el territorio.
theological_decisions:
- issue: Alcance genérico de אָדָם frente a la contraposición con בְּהֵמָה
  english_pob_reading: on man
  chosen_spanish_reading: sobre el hombre
  alternative_spanish_readings:
  - sobre la humanidad
  - sobre las personas
  rationale: Se conserva el paralelismo hombre/bestia del hebreo y la lectura genérica de אָדָם. En español, «el hombre» puede funcionar de manera colectiva sin perder el contraste deliberado del texto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: La redacción incorpora la revisión del POB inglés que sustituyó una formulación más mecánica por «festering boils»; en español se optó por una equivalencia natural equivalente («úlceras supurantes») manteniendo el registro formal y la totalidad del juicio descrito en el versículo.
  spanish_consistency_notes:
  - Se mantiene «tierra de Egipto» de manera uniforme para אַרֶץ מִצְרַיִם.
  - Se preserva el contraste singular genérico «el hombre / la bestia» para reflejar la construcción hebrea.
  - El texto evita «SEÑOR» u այլ masking; no aplica aquí ningún nombre divino.
  - La terminología patológica se traduce de forma idiomática sin perder el valor de afección eruptiva y supurante.
