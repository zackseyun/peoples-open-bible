translation:
  language: es
  text: Tú has visto, porque miras la angustia y la aflicción para tomarla en tu mano[a]. El desamparado se encomienda a ti[b]; tú has sido la ayuda del huérfano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ponerla en tu mano»; el hebreo también puede entenderse como que Dios toma el asunto en sus manos para actuar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «El desamparado deja su causa en tus manos»; el hebreo puede referirse tanto a la persona desamparada como a su causa encomendada a Dios.'
    reason: alternative_reading
  - marker: c
    text: «Huérfano» también puede entenderse como «sin padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִתָה
  english_pob_choice: You have seen
  chosen_spanish: Tú has visto
  alternatives_spanish:
  - Tú ves
  - Tú viste
  lexicon: HALOT
  rationale: El perfecto hebreo dirigido a Dios se expresa bien en español con el pretérito perfecto compuesto, porque conserva la idea de una percepción ya reconocida y vigente en la apelación del salmista.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - problema
  - opresión
  lexicon: HALOT
  rationale: En este contexto poético, 'angustia' comunica sufrimiento opresivo sin reducir el término a simple labor o esfuerzo; mantiene el peso de la queja del salmo.
- source_word: כַעַס
  english_pob_choice: grief
  chosen_spanish: aflicción
  alternatives_spanish:
  - pena
  - dolor
  - vexación
  lexicon: HALOT
  rationale: Junto con עָמָל, el término apunta al sufrimiento experimentado. 'Aflicción' evita sugerir que se trata de la ira de Dios y conserva el tono de miseria observada.
- source_word: תַּבִּיט
  english_pob_choice: you look upon
  chosen_spanish: miras
  alternatives_spanish:
  - contemplas
  - miras atentamente
  - observas
  lexicon: HALOT
  rationale: El hifil de נבט expresa mirar con atención. 'Miras' es natural en español y, por el contexto, ya implica una mirada considerada, sin perder la imagen visual.
- source_word: לָתֵת בְּיָדֶךָ
  english_pob_choice: to take it into your hand
  chosen_spanish: para tomarla en tu mano
  alternatives_spanish:
  - para ponerla en tu mano
  - para tomarlo en tu mano
  - para poner el asunto en tu mano
  lexicon: HALOT
  rationale: La metáfora hebrea de 'dar en la mano' se vierte como 'tomar en tu mano' para conservar la acción de asumir el asunto. El complemento 'la' retoma 'angustia y aflicción' como objeto colectivo/poético.
- source_word: עָלֶיךָ יַעֲזֹב
  english_pob_choice: commits himself to you
  chosen_spanish: se encomienda a ti
  alternatives_spanish:
  - deja su causa en tus manos
  - se entrega a ti
  - confía en ti
  lexicon: HALOT
  rationale: El verbo עזב con עַל puede expresar confiar/encargar algo a alguien. 'Se encomienda a ti' preserva la idea de entrega confiada sin sugerir abandono negativo.
- source_word: חֵלֶכָה
  english_pob_choice: the helpless
  chosen_spanish: el desamparado
  alternatives_spanish:
  - el indefenso
  - el desvalido
  - el pobre
  lexicon: HALOT
  rationale: '''Desamparado'' comunica vulnerabilidad y necesidad de apoyo. Mantiene la función referencial del sustantivo en el paralelismo con ''huérfano''.'
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: huérfano
  alternatives_spanish:
  - huérfano de padre
  - sin padre
  lexicon: HALOT
  rationale: Aunque el valor más literal es 'sin padre', en español bíblico actual 'huérfano' es la equivalencia natural y clara; aquí conserva la categoría social vulnerable del hebreo.
- source_word: עוֹזֵר
  english_pob_choice: helper
  chosen_spanish: ayudador
  alternatives_spanish:
  - auxiliador
  - ayuda
  - el que ayuda
  lexicon: HALOT
  rationale: Como participio predicativo de Dios, 'ayudador' conserva el valor de agente personal y evita que se diluya en una abstracción impersonal.
theological_decisions:
- issue: Si el versículo describe solo observación divina o observación que lleva a intervención
  english_pob_reading: God sees the oppressed condition and takes the matter into his hand for action
  chosen_spanish_reading: Dios ve la angustia y la aflicción y asume el asunto para actuar, sin limitarse a mirar pasivamente
  alternative_spanish_readings:
  - Dios ve la angustia y la aflicción para ponerlas en su mano
  - Dios mira la angustia y la aflicción y actúa sobre ellas
  rationale: La frase infinitiva con לָתֵת apunta a una toma en mano con implicación de acción. La traducción conserva esa orientación sin explicitar más de lo que el hebreo exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de la respuesta del vulnerable a Dios
  english_pob_reading: The helpless entrusts himself to God
  chosen_spanish_reading: El desamparado se encomienda a Dios
  alternative_spanish_readings:
  - El desamparado deja su causa a Dios
  - El desamparado se abandona a Dios
  rationale: '''Encomendarse'' transmite confianza y entrega responsable; evita la idea de abandono resignado y refleja mejor la relación de dependencia confiada sugerida por עזב con עַל.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios sustanciales respecto del análisis fuente-idioma, y se preserva la ambigüedad idiomática principal de לָתֵת בְּיָדֶךָ y עָלֶיךָ יַעֲזֹב.'
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva un registro bíblico claro y actual, evitando calcos innecesarios.
  - '''Huérfano'' se usa como equivalente bíblico natural, con nota para la alternativa literal ''sin padre''.'
  - La combinación 'angustia y aflicción' busca reflejar la doble carga semántica del hebreo sin sobreinterpretarla.
