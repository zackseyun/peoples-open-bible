translation:
  language: es
  text: 'Su corazón clamó al Señor[a], Oh, muro de la hija de Sion: haz correr lágrimas como un arroyo[b], de día y de noche; no te concedas alivio; no repose la niña de tus ojos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus corazones clamaron al Señor». El hebreo tiene «corazón» en singular con sufijo plural, probablemente como expresión colectiva.
    reason: lexical_alternative
  - marker: b
    text: O «como un torrente / wadi». נחל puede referirse a un arroyo, cauce o torrente estacional.
    reason: lexical_alternative
  - marker: c
    text: Lit. «no esté quieta la hija de tu ojo», un modismo que alude a la pupila/ojos y, en este contexto, al llanto incesante.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: HALOT
  rationale: El verbo expresa un clamor intenso. «Clamó» conserva la fuerza del grito de dolor y funciona con naturalidad en español bíblico sin rebajarlo a un simple «lloró».
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - el corazón de ellos
  lexicon: HALOT
  rationale: El hebreo tiene sustantivo singular con sufijo plural, probablemente colectivo. «Su corazón» mantiene esa unidad colectiva mejor que pluralizarlo sin necesidad.
- source_word: אֶל אֲדֹנָי
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a mi Señor
  lexicon: HALOT
  rationale: En este contexto el título es el de Dios de Israel. Según la convención del proyecto, se vierte como «Yahvé» para no enmascarar el nombre divino y conservar la transparencia textual.
- source_word: חוֹמַת בַּת צִיּוֹן
  english_pob_choice: O wall of daughter Zion
  chosen_spanish: oh muro de la hija de Sion
  alternatives_spanish:
  - oh muralla de la hija de Sion
  - oh muro de la hija Sion
  lexicon: HALOT
  rationale: «Muro» conserva el sentido básico de חוֹמָה y «hija de Sion» preserva la personificación de la ciudad. El vocativo se marca con «oh» y dos puntos, como en el auditable inglés POB.
- source_word: הוֹרִידִי
  english_pob_choice: let ... run down
  chosen_spanish: haz correr
  alternatives_spanish:
  - deja correr
  - haz descender
  lexicon: HALOT
  rationale: La forma causativa pide un mandato dirigido a la ciudad/muro. Con «las lágrimas» como complemento, «haz correr» es la equivalencia española más natural y fiel a la imagen de descenso continuo.
- source_word: כַנַּחַל דִּמְעָה
  english_pob_choice: tears run down like a stream
  chosen_spanish: las lágrimas como un arroyo
  alternatives_spanish:
  - las lágrimas como un torrente
  - las lágrimas como un río
  lexicon: HALOT
  rationale: נחל puede ser arroyo, torrente o cauce estacional. «Arroyo» da la imagen de flujo continuo sin imponer una interpretación demasiado técnica o regionalizada del término.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - por día y por noche
  lexicon: HALOT
  rationale: La fórmula expresa continuidad. «De día y de noche» suena natural en español y conserva el valor de merismo sin perder solemnidad.
- source_word: פוּגַת
  english_pob_choice: give yourself no relief
  chosen_spanish: no te concedas alivio
  alternatives_spanish:
  - no te des respiro
  - no te concedas respiro
  lexicon: HALOT
  rationale: פוּגָה denota alivio, pausa o respiro. «Alivio» sigue de cerca la decisión inglesa y evita sugerir descanso físico completo, que sería demasiado específico.
- source_word: תִּדֹּם
  english_pob_choice: let not ... rest
  chosen_spanish: no cesen
  alternatives_spanish:
  - no callen
  - no se detengan
  lexicon: HALOT
  rationale: El verbo puede significar estar callado, quieto o cesar. En el contexto del llanto, «no cesen» transmite mejor la idea de lágrimas ininterrumpidas que un literal «no callen».
- source_word: בַּת עֵינֵךְ
  english_pob_choice: the apple of your eye
  chosen_spanish: tus ojos
  alternatives_spanish:
  - la niña de tus ojos
  - la pupila de tus ojos
  lexicon: HALOT
  rationale: La expresión hebrea alude al ojo/pupila y al llanto que no se detiene. En español, «tus ojos» evita una idiomatización que podría sonar formulística, y permite que la línea final se entienda como continuación del lamento.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - mi Señor
  rationale: La política terminológica del proyecto pide traducir יהוה como «Yahvé» en el texto principal. Aunque el inglés POB usa «the Lord» por su tradición tipográfica, aquí conviene mantener la transparencia del nombre divino sin sustituirlo por una máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה/YHWH → Yahvé'
- issue: Relación entre el clamor del corazón y la invocación
  english_pob_reading: Their heart cried out to the Lord
  chosen_spanish_reading: Su corazón clamó a Yahvé
  alternative_spanish_readings:
  - Sus corazones clamaron a Yahvé
  - El corazón de ellos clamó a Yahvé
  rationale: Se mantiene el singular colectivo del hebreo para no borrar la tensión gramatical. El español admite bien la unidad poética de un «corazón» representando al pueblo entero.
  doctrine_reference: HALOT / WLC singular with plural suffix collective usage
- issue: Imágenes finales del llanto incesante
  english_pob_reading: let not the apple of your eye rest
  chosen_spanish_reading: no cesen tus ojos
  alternative_spanish_readings:
  - no repose la pupila de tus ojos
  - no se detenga la niña de tus ojos
  rationale: El hebreo usa una idiomática imagen del ojo/pupila en el marco de un llanto sin tregua. En español, la meta principal es conservar la continuidad del lamento; por eso se traduce la función de la imagen y no una frase idiomática ajena al oído bíblico español.
  doctrine_reference: HALOT / idiom for unceasing weeping
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del POB inglés que ajustó la puntuación para el vocativo y prefirió una clausula final más natural. En español se adoptó esa misma lógica: dos puntos después de «Sion» para el llamado directo, y una clausula final que conserva el sentido de continuidad del llanto sin forzar un calco idiomático.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme a la convención del proyecto para יהוה.
  - Se conserva la personificación «hija de Sion» sin mayúsculas adicionales internas.
  - «Muro» y no «muralla» sigue la transparencia del hebreo חוֹמָה.
  - La imagen final se resuelve funcionalmente para que el lector español perciba el lamento continuo; la nota preserva la metáfora literal.
  - 'La puntuación reproduce el movimiento del texto: clamor, vocativo, mandato, duración, prohibición final.'
