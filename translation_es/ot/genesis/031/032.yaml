base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/032.yaml
  text: Whoever is found with your gods shall not live[a]. In the presence of our brothers, identify what of yours is with me[c][b], and take it for yourself.” Jacob did not know that Rachel had stolen them.
  footnotes:
  - marker: a
    text: Or, more formally, 'with whom you find your gods.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' may refer to the wider group of male relatives or kinsmen present, not necessarily only biological brothers.'
    reason: cultural_note
  - marker: c
    text: That is, Rachel had stolen Laban’s household gods.
    reason: cross_reference
