translation:
  language: es
  text: Mi ojo no perdonará[a], ni tendré compasión. Pondré tus caminos[b] sobre ti, y tus abominaciones estarán en medio de ti. Entonces sabrán ustedes que yo soy Yahvé[c], el que hiere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi ojo no tendrá compasión». El hebreo usa «ojo» como modismo para la acción de perdonar o ahorrar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «haré recaer tus caminos sobre ti». Literalmente: «pondré tus caminos sobre ti».'
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» representa en español el nombre divino YHWH del hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: תָח֥וֹס עֵינִ֖י
  english_pob_choice: My eye will not spare
  chosen_spanish: Mi ojo no perdonará[a]
  alternatives_spanish:
  - Mi ojo no tendrá compasión[a]
  - No perdonaré con mi ojo[a]
  - Mi ojo no se compadecerá[a]
  lexicon: HALOT
  rationale: El hebreo usa el modismo «ojo» con el verbo de perdonar/ahorrar. En español, «mi ojo no perdonará» conserva la imagen idiomática y la fuerza judicial del contexto; «tener compasión» o «compadecerse» son posibles, pero pierden la metáfora concreta que la POB inglesa retuvo.
- source_word: אֶחְמ֑וֹל
  english_pob_choice: nor will I show pity
  chosen_spanish: ni tendré compasión
  alternatives_spanish:
  - ni mostraré piedad
  - ni tendré piedad
  - ni me compadeceré
  lexicon: HALOT
  rationale: חמל agrega el matiz explícito de compasión/piedad. «Tendré compasión» comunica bien ese segundo miembro del paralelismo y evita repetir exactamente «perdonará», preservando la tensión entre los dos verbos.
- source_word: כִּדְרָכַ֜יִךְ עָלַ֣יִךְ אֶתֵּ֗ן
  english_pob_choice: I will bring your ways upon you
  chosen_spanish: Pondré tus caminos[b] sobre ti
  alternatives_spanish:
  - Haré recaer tus caminos sobre ti[b]
  - Pondré sobre ti tu conducta[b]
  - Haré venir sobre ti tus caminos[b]
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí se refiere a conducta o proceder. «Pondré tus caminos sobre ti» sigue de cerca la imagen hebrea y mantiene el sentido retributivo; «haré recaer» sería válido, pero menos literal respecto al verbo de poner/colocar.
- source_word: וְתוֹעֲבוֹתַ֨יִךְ
  english_pob_choice: and your abominations
  chosen_spanish: y tus abominaciones
  alternatives_spanish:
  - y tus cosas abominables
  - y tus prácticas abominables
  lexicon: HALOT
  rationale: «Abominaciones» conserva el peso pactal y profético de תועבות. Es más fuerte y más fiel al registro bíblico que una explicación suavizada como «cosas/prácticas abominables».
- source_word: בְּתוֹכֵ֣ךְ תִּֽהְיֶ֔יןָ
  english_pob_choice: will be in your midst
  chosen_spanish: estarán en medio de ti
  alternatives_spanish:
  - permanecerán dentro de ti
  - estarán dentro de ti
  - morarán en tu interior
  lexicon: HALOT
  rationale: La frase es espacial. «En medio de ti» refleja bien el hebreo y sugiere presencia interna e ineludible; «estarán en medio de ti» es natural en español y mantiene la imagen.
- source_word: וִֽידַעְתֶּ֕ם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: El resultado profético se expresa mejor con «Entonces». Se mantiene el futuro gnómico de conocimiento verificable tras el juicio.
- source_word: יְהוָ֖ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». En español bíblico es claro, reverente y consistente con la política terminológica del POB, evitando la sustitución por un título.'
- source_word: מַכֶּֽה
  english_pob_choice: who strikes
  chosen_spanish: el que hiere
  alternatives_spanish:
  - el que golpea
  - el que castiga
  - el que azota
  lexicon: HALOT
  rationale: El participio expresa la acción de herir/golpear en juicio. «El que hiere» es natural y fuerte en español, y conserva la agencia divina sin añadir explicaciones.
theological_decisions:
- issue: Paralelismo entre «mi ojo no perdonará» y «ni tendré compasión»
  english_pob_reading: My eye will not spare, nor will I show pity.
  chosen_spanish_reading: Mi ojo no perdonará, ni tendré compasión.
  alternative_spanish_readings:
  - Mi ojo no tendrá compasión, ni mostraré piedad.
  - No perdonaré ni tendré compasión.
  rationale: La versión española mantiene ambos miembros del paralelismo sin fusionarlos. Se conserva el antropomorfismo «mi ojo» porque el texto hebreo lo usa deliberadamente y la POB inglesa también lo retuvo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre divino en forma transliterada conforme al criterio del proyecto, en vez de reemplazarlo por «Señor». Esto hace auditable la identidad del nombre de pacto en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del participio final מַכֶּה
  english_pob_reading: who strikes
  chosen_spanish_reading: el que hiere
  alternative_spanish_readings:
  - el que castiga
  - el que golpea
  rationale: El participio no solo nombra una cualidad, sino la acción judicial continua de Yahvé. «El que hiere» conserva esa agencia y evita una formulación demasiado técnica o abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado más reciente del audit trail inglés, sin cambios relevantes posteriores: se conserva el paralelismo de juicio, la imagen idiomática de «ojo», el retribucionismo de «poner tus caminos sobre ti» y la elección del nombre divino como transliteración. También se ajusta a la terminología española del proyecto («Yahvé», «abominaciones», «el que hiere») y evita sustituciones por fórmulas tradicionales que oculten el nombre divino.'
  spanish_consistency_notes:
  - 'Se mantiene el mismo referente para el sujeto divino en toda la cláusula final: «yo» / «Yahvé».'
  - «Tendré compasión» funciona mejor que un segundo «perdonará» porque preserva el paralelismo sin perder la distinción semántica de חמל.
  - «Tus caminos» se entiende aquí como conducta; no se expande a «costumbres» para no debilitar la imagen retributiva del hebreo.
  - Se usa «Yahvé» según la política terminológica del proyecto, no «Señor» ni «Jehová».
  - «En medio de ti» conserva la espacialidad de בְּתוֹכֵךְ y sugiere presencia interna e ineludible.
