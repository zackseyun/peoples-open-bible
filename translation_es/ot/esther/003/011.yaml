  language: en
  yaml_path: translation/ot/esther/003/011.yaml
  text: Then the king said to Haman[a], “The silver is given to you, and the people also[b], to do with them as seems good in your eyes.”
  footnotes:
  - marker: a
    text: Or 'The money is given to you.' Hebrew כֶּסֶף can mean 'silver' literally or 'money' by extension.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people' is grammatically singular but collective; English renders the following pronoun as plural ('them') for natural sense.
    reason: lexical_alternative
