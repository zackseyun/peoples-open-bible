revisions:
- from: Y, después de dar a los que estaban con él la contraseña[a], “Victoria de Dios”, atacó de noche la corte real con los mejores jóvenes armados, derribó a unos dos mil hombres[b] del campamento, y abatió al elefante principal junto con el que iba en su torre.
  to: Y, después de dar a los que estaban con él la consigna[a], “Victoria de Dios”, atacó de noche el recinto real con los mejores jóvenes armados, mató a unos dos mil hombres en el campamento, y abatió al elefante principal junto con el que iba en su torre[b].
  rationale: Se corrige el anclaje de la nota cultural para que corresponda al ocupante del elefante, conforme a la evidencia griega y a la auditoría inglesa. Se reemplaza “contraseña” por “consigna” para un español más natural en contexto militar; “corte real” por “recinto real” para reflejar el sentido espacial de αὐλή; y “derribó” por “mató” para expresar con claridad la fuerza letal de ἀνεῖλεν respecto de los hombres. El resto del verso se conserva sustancialmente.
  reviewer_model: gpt-5.4
