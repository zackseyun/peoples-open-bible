translation:
  language: es
  text: 'A causa de estas cosas dijo: «Échenlas[a] lejos de mí»[b]. La belleza de su gloria no les aprovechó[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Arrójenlas lejos de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posibilidad de puntuación y traducción es: «Échenlas lejos de mí; la belleza de su gloria no les aprovechó».'
    reason: previous_rendering
  - marker: c
    text: O, más literalmente, «no les benefició» o «no les prosperó». Un manuscrito variante lee «de ella» en lugar de «de su/de él» en «la belleza de su gloria».
    reason: lexical_alternative_textual_variant
lexical_decisions:
- source_word: ἕνεκεν τούτων
  english_pob_choice: Because of these things
  chosen_spanish: Por causa de estas cosas
  alternatives_spanish:
  - Por estas cosas
  - A causa de estas cosas
  lexicon: BDAG
  rationale: Expresa con naturalidad la referencia retrospectiva a lo dicho en el versículo anterior, sin precisar indebidamente el antecedente.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - dijo esto
  lexicon: BDAG
  rationale: Verbo común de hablar; el español mantiene la sobriedad del griego sin añadir énfasis no presente en el texto.
- source_word: Ἀπορρίψατε αὐτὰ μακρὰν ἀπ' ἐμοῦ
  english_pob_choice: Cast them far away from me
  chosen_spanish: Échenlas lejos de mí
  alternatives_spanish:
  - Arrójenlas lejos de mí
  - Rechácenlas lejos de mí
  lexicon: BDAG
  rationale: Ἀπορρίπτω tiene fuerza de arrojar o descartar; en español, «Échenlas lejos de mí» conserva el imperativo vivo y la distancia marcada por μακράν.
- source_word: οὐκ εὐώδωκεν αὐτοῖς
  english_pob_choice: did them no good
  chosen_spanish: no les aprovechó
  alternatives_spanish:
  - no les hizo bien
  - no les benefició
  - no les prosperó
  lexicon: BDAG
  rationale: εὐοδόω puede significar prosperar o beneficiar. «No les aprovechó» comunica con claridad que aquello no resultó útil ni ventajoso para ellos.
- source_word: τὸ κάλλος τῆς δόξης αὐτοῦ
  english_pob_choice: his glorious beauty
  chosen_spanish: la belleza de su gloria
  alternatives_spanish:
  - su gloriosa belleza
  - la belleza gloriosa de él
  lexicon: BDAG
  rationale: Se conserva la construcción doble de κάλλος y δόξα sin reducirla a un solo adjetivo. En español, «la belleza de su gloria» suena más transparente y mantiene la tensión entre belleza y gloria. El pronombre sigue la base griega αὐτοῦ, aquí leído como «su» por la tradición textual de este pasaje.
theological_decisions:
- issue: Alcance de la cita después de «dijo»
  english_pob_reading: The quoted speech ends after 'from me'; the following clause is narration.
  chosen_spanish_reading: La cita termina en «de mí»; la cláusula siguiente queda fuera de la cita como narración.
  alternative_spanish_readings:
  - Mantener todo dentro de la cita
  - Hacer que toda la frase sea discurso directo
  rationale: El griego cierra la orden en ἀπ' ἐμοῦ y luego continúa con una observación narrativa. Separarlo en español evita atribuir al hablante una cláusula que funciona mejor como comentario del narrador.
  doctrine_reference: Psalms of Solomon 2:4, revisión textual y sintaxis del enunciado
- issue: Valor de αὐτοῦ en τὸ κάλλος τῆς δόξης αὐτοῦ
  english_pob_reading: Revised from 'its' to 'his' in the latest revision pass
  chosen_spanish_reading: «su»
  alternative_spanish_readings:
  - «de él»
  - «suya»
  rationale: La evidencia de la base griega usada por el texto auditado presenta αὐτοῦ; el español puede reflejarlo con «su» sin forzar el género del referente. Esta opción conserva la ambigüedad del pasaje sin apagar la referencia del pronombre.
  doctrine_reference: Swete LXX 1909, texto base y revisión auditada
- issue: Sentido de εὐώδωκεν
  english_pob_reading: did them no good / did not prosper them
  chosen_spanish_reading: no les aprovechó
  alternative_spanish_readings:
  - no les prosperó
  - no les benefició
  rationale: En español, «aprovechar» expresa bien la falta de ganancia o efecto benéfico sin convertir el verbo en una interpretación más fuerte de prosperidad económica o éxito general.
  doctrine_reference: Psalms of Solomon 2:4, valor léxico de εὐοδόω
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada que separa la cita tras «de mí» y conserva el valor de εὐώδωκεν como beneficio/ventaja, evitando la solución anterior que integraba toda la cláusula final dentro del discurso directo. También toma en cuenta la revisión textual que lee αὐτοῦ en el sintagma final y la reproduce con «su».
  spanish_consistency_notes:
  - Se usa «Dios» implícito solo en la referencia pronominal de la frase, sin añadir sujeto explícito inexistente en el griego.
  - Se mantiene un registro bíblico formal pero natural en español latinoamericano.
  - No se usa «SEÑOR» como sustituto del nombre divino porque el versículo no contiene el tetragrámaton.
