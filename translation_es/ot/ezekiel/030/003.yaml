translation:
  language: es
  text: Pues el día está cerca[a], sí, el día de Yahvé está cerca; será un día de nubes[c][b], un tiempo de naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «un día de nube».
    reason: lexical_alternative
  - marker: b
    text: O «el tiempo de las naciones». La expresión hebrea es breve y puede referirse a una temporada decisiva relativa a las naciones.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el día de Yahvé», una expresión profética para un día de intervención divina en juicio.'
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la explicación profética de manera natural en español, preservando la fuerza explicativa del hebreo sin volverla demasiado causal.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - se acerca
  - está próximo
  lexicon: HALOT
  rationale: ‘Está cerca’ es el equivalente más idiomático y fiel para la proximidad temporal urgente del hebreo.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: Mantiene la repetición retórica del hebreo con el sustantivo común y esperado en español.
- source_word: וְקָרוֹב
  english_pob_choice: yes, ... is near
  chosen_spanish: sí, ... está cerca
  alternatives_spanish:
  - y está cerca
  - ciertamente ... está cerca
  lexicon: HALOT
  rationale: La repetición enfática se refleja con ‘sí’, que preserva la intensificación sin sonar forzado en español.
- source_word: לַיהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahveh
  - el día de Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología POB para el nombre divino: ‘Yahvé’ en el texto principal, conservando la expresión profética establecida.'
- source_word: יוֹם עָנָן
  english_pob_choice: a day of clouds
  chosen_spanish: un día de nubes
  alternatives_spanish:
  - un día de nube
  - un día nuboso
  lexicon: HALOT
  rationale: El plural hebreo se rinde de forma natural como ‘nubes’, conservando la imagen ominosa del pasaje.
- source_word: עֵת
  english_pob_choice: a time of nations
  chosen_spanish: un tiempo de naciones
  alternatives_spanish:
  - un tiempo para las naciones
  - el tiempo de las naciones
  lexicon: HALOT
  rationale: 'Respeta la tersura del hebreo y la decisión revisada del POB: una expresión nominal breve, sin explicitar más de lo que el texto dice.'
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En contexto profético, ‘naciones’ es la equivalencia más clara y consistente con el sentido del original.
- source_word: יִהְיֶה
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - habrá
  - vendrá a ser
  lexicon: HALOT
  rationale: ‘Será’ completa la cláusula de modo natural en español y conserva el valor copulativo-futuro del hebreo.
theological_decisions:
- issue: Renderizado del nombre divino en la fórmula profética יוֹם לַיהוָה
  english_pob_reading: the day of Yahweh
  chosen_spanish_reading: el día de Yahvé
  alternative_spanish_readings:
  - el día del Señor
  - el día de Yahweh
  rationale: El POB inglés usa ‘Yahweh’ por la política del proyecto; en español se mantiene ‘Yahvé’ como forma estándar del nombre divino en este proyecto, evitando la máscara ‘SEÑOR’ y preservando la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de עֵת גּוֹיִם
  english_pob_reading: a time of nations
  chosen_spanish_reading: un tiempo de naciones
  alternative_spanish_readings:
  - el tiempo de las naciones
  - un tiempo para las naciones
  rationale: Se conserva la tensión del hebreo breve. ‘De naciones’ refleja la construcción nominal sin decidir si se trata de un período caracterizado por las naciones, concerniente a ellas o de juicio sobre ellas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it too narrowly'
- issue: Imagen de יוֹם עָנָן
  english_pob_reading: a day of clouds
  chosen_spanish_reading: un día de nubes
  alternative_spanish_readings:
  - un día de nube
  - un día nuboso
  rationale: La imagen se mantiene sin suavizarla. ‘Nubes’ conserva el matiz ominoso y profético, y es más natural que una traducción excesivamente literal o abstracta.
  doctrine_reference: 'Translation philosophy §2: Preserve source imagery where intelligible in target language'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: ‘a time of nations’ fue preferido sobre ‘a time for nations’. En español se refleja como ‘un tiempo de naciones’. También se mantiene la decisión del proyecto de traducir יהוה como ‘Yahvé’ en el texto principal.'
  spanish_consistency_notes:
  - Se conserva la repetición de ‘día’ para reproducir el énfasis del hebreo.
  - Se usa ‘Yahvé’ de forma consistente con la política del proyecto para יהוה.
  - ‘Naciones’ se mantiene sin glosa interpretativa en el texto principal; la posible lectura alternativa queda en nota.
  - El orden general sigue la cadencia profética del original, evitando una paráfrasis explicativa.
