translation:
  language: es
  text: Porque en esta ocasión yo envío todas mis plagas contra tu corazón[a], y contra tus siervos y contra tu pueblo[b], para que sepas que no hay nadie como yo en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «a tu corazón». El hebreo puede indicar que las plagas están dirigidas al propio Faraón, al centro de su ser.'
    reason: lexical_alternative
  - marker: b
    text: 'O «en todo el país» o «en toda la región», si la frase se entiende de modo más local; aquí se traduce «en toda la tierra» porque el contexto subraya la unicidad incomparable de Yahvé de manera universal.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּפַּעַם הַזֹּאת
  english_pob_choice: this time
  chosen_spanish: en esta ocasión
  alternatives_spanish:
  - esta vez
  - ahora
  lexicon: HALOT
  rationale: La expresión temporal hebrea señala una ocasión concreta y presente. «En esta ocasión» suena natural y conserva el matiz discursivo de una intervención específica, sin volverlo mecánico.
- source_word: שֹׁלֵחַ
  english_pob_choice: I am sending
  chosen_spanish: yo envío
  alternatives_spanish:
  - estoy enviando
  - voy a enviar
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. En español, el presente «yo envío» transmite con naturalidad ese valor vivo sin añadir una perífrasis innecesaria.
- source_word: כָּל מַגֵּפֹתַי
  english_pob_choice: all my plagues
  chosen_spanish: todas mis plagas
  alternatives_spanish:
  - todos mis azotes
  - todas mis calamidades
  lexicon: HALOT
  rationale: «Plagas» preserva el campo semántico de juicio divino del contexto del Éxodo. «Azotes» o «calamidades» serían posibles, pero debilitarían la conexión narrativa establecida por la serie de plagas.
- source_word: אֶל לִבְּךָ
  english_pob_choice: against your heart
  chosen_spanish: contra tu corazón
  alternatives_spanish:
  - a tu corazón
  - sobre tu corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacia/para tu corazón». Se mantiene «corazón» porque la expresión puede aludir al centro interior de Faraón, no solo a la persona externa. «Contra» conserva el tono confrontativo que el contexto sugiere y no borra la metáfora.
- source_word: וּבַעֲבָדֶיךָ
  english_pob_choice: and against your servants
  chosen_spanish: y contra tus siervos
  alternatives_spanish:
  - y contra tus servidores
  - y contra tus esclavos
  lexicon: HALOT
  rationale: Aquí «siervos» refleja mejor a los oficiales y subordinados de Faraón que «esclavos», que introduciría una relación social demasiado específica y no claramente requerida por el contexto. Se conserva el paralelismo con la frase anterior.
- source_word: וּבְעַמֶּךָ
  english_pob_choice: and your people
  chosen_spanish: y contra tu pueblo
  alternatives_spanish:
  - y contra tu gente
  - y contra tus gentes
  lexicon: HALOT
  rationale: «Pueblo» reproduce de manera precisa el referente colectivo de Egipto bajo Faraón. Aunque el hebreo repite la preposición, en español el paralelismo queda claro sin forzar una repetición idéntica.
- source_word: בַּעֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Marca finalidad. «Para que» es la forma española más directa y natural para expresar el propósito del juicio.
- source_word: תֵּדַע
  english_pob_choice: you may know
  chosen_spanish: sepas
  alternatives_spanish:
  - llegues a saber
  - conozcas
  lexicon: HALOT
  rationale: El imperfecto tras una cláusula de propósito comunica resultado buscado. «Sepas» mantiene esa fuerza sin endurecerlo a un simple futuro.
- source_word: אֵין כָּמֹנִי
  english_pob_choice: there is none like me
  chosen_spanish: no hay nadie como yo
  alternatives_spanish:
  - no existe otro como yo
  - nadie se compara conmigo
  lexicon: HALOT
  rationale: La fórmula hebrea expresa incomparabilidad absoluta. «No hay nadie como yo» es idiomático y conserva la afirmación sin añadir explicaciones doctrinales ajenas al texto.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitada
  - en toda la región
  lexicon: HALOT
  rationale: Se sigue la lectura universal, no la meramente local. «Tierra» permite un alcance amplio y solemne en español, y corresponde al sentido que el audit trail privilegia.
theological_decisions:
- issue: Alcance de la incomparabilidad divina
  english_pob_reading: 'Universal: ''in all the earth'''
  chosen_spanish_reading: 'Universal: ''en toda la tierra'''
  alternative_spanish_readings:
  - 'regional: ''en toda la región'''
  - 'local: ''en todo el país'''
  rationale: El versículo busca mostrar la singularidad de Yahvé más allá de Egipto. Mantener un alcance universal respeta la intención teológica del pasaje y la decisión auditada en inglés.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original; preservar el peso teológico sin reducirlo injustificadamente'
- issue: Metáfora de 'corazón'
  english_pob_reading: Retain the metaphor of the plagues being directed against Pharaoh's heart/core self
  chosen_spanish_reading: Retener 'corazón' como centro interior de Faraón
  alternative_spanish_readings:
  - contra ti
  - contra tu interior
  rationale: El hebreo nombra explícitamente el corazón. Conservarlo evita borrar la tensión narrativa sobre el endurecimiento de Faraón y permite que el lector perciba el blanco interno del juicio.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas; equivalencia óptima'
- issue: Uso de 'siervos'
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - sirvientes
  - esclavos
  rationale: «Siervos» mantiene la relación subordinada sin imponer «esclavos», que sería una precisión social no asegurada por el término hebreo en este contexto.
  doctrine_reference: 'DOCTRINE.md: no sobredeterminar el léxico; mantener el matiz contextual'
translation_notes:
  revision_awareness: El borrador sigue la lectura y decisiones del último pase del contexto en inglés, que quedó sin cambios y con acuerdo alto entre revisores. No se introdujeron revisiones nuevas ni se suavizó la tensión textual sobre 'corazón' o sobre el alcance universal de 'toda la tierra'.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para el nombre divino, aunque en este versículo el hebreo no contiene el tetragrámaton de forma explícita en la línea citada.
  - Se eligió «corazón» y no «mente» o «interior» para conservar la metáfora bíblica concreta y el paralelismo narrativo con el endurecimiento de Faraón.
  - Se prefirió «siervos» para reproducir el valor relacional de עֲבָדֶיךָ sin sobrecargarlo con una lectura social más fuerte.
  - «Tierra» se mantuvo como traducción amplia de הָאָרֶץ conforme a la decisión auditada en inglés, aunque «tierra/país/región» podría aparecer en otros contextos según el alcance textual.
