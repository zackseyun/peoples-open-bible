revisions:
- from: Entonces el pueblo se [a]metió furtivamente en la ciudad aquel día, como se meten furtivamente los que están avergonzados cuando huyen en la batalla.
  to: Entonces el pueblo entró a escondidas[a] en la ciudad aquel día, como se escabulle la gente avergonzada cuando huye en la batalla.
  rationale: Se reemplazó 'se metió furtivamente' por 'entró a escondidas' para lograr un español más natural sin perder el matiz furtivo del hitpael de גנב. En la comparación, 'como se escabulle la gente avergonzada' expresa mejor el segundo uso del verbo que 'se meten furtivamente', ya que el contexto describe retirada vergonzosa tras huir en batalla. También se reubicó la nota para no interrumpir la palabra.
