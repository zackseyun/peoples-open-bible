review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo: valor consecutivo de וְיָדְעוּ con «Entonces», reconocimiento de «las naciones», uso correcto de «Yahvé» para יְהוָה, «santifica a Israel» para מְקַדֵּשׁ אֶת־יִשְׂרָאֵל, y la cláusula temporal con «cuando mi santuario esté en medio de ellos para siempre». Sin embargo, la puntuación actual introduce una pausa que separa indebidamente «quien santifica a Israel» de «Yahvé», cuando en el original el participio modifica directamente a Yahvé sin inciso.'
  spanish_quality_summary: El español es claro, natural y digno. La única mejora necesaria es quitar las comas alrededor de «quien santifica a Israel», porque en español esa relativa especificativa no debe ir entre comas aquí; así se alinea mejor con la sintaxis fuente y mejora la fluidez.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; מְקַדֵּשׁ → «santifica»; מִקְדָּשִׁי → «mi santuario»; בְּתוֹכָם → «en medio de ellos»; לְעוֹלָם → «para siempre». No se requieren notas nuevas; las alternativas inglesas no generan ambigüedad nueva en español que exija nota.'
  issues:
  - severity: medium
    issue: Puntuación de la relativa «quien santifica a Israel»
    rationale: Las comas la convierten en una relativa explicativa, pero aquí debe funcionar como especificativa ligada directamente a «Yahvé», en paralelo con el participio hebreo מְקַדֵּשׁ. Quitar las comas preserva mejor la relación sintáctica y evita una pausa innecesaria.
  revised_spanish_text: Entonces las naciones sabrán que yo soy Yahvé quien santifica a Israel, cuando mi santuario esté en medio de ellos para siempre.
  revision_rationale: Se eliminan las comas alrededor de «quien santifica a Israel» para que la relativa modifique directamente a «Yahvé», en conformidad con el participio hebreo y con la revisión ya documentada en inglés. No se requieren cambios léxicos ni notas.
