base_translation:
  language: en
  yaml_path: translation/ot/exodus/006/013.yaml
  text: Then Yahweh spoke to Moses and to Aaron[a], and he commanded them concerning the sons of Israel and concerning Pharaoh king of Egypt[b], to bring the sons of Israel out from the land of Egypt.
  footnotes:
  - marker: a
    text: Or 'to the sons of Israel and to Pharaoh king of Egypt.' The Hebrew preposition can be taken as marking the recipients of the command, but in context it likely means the command given to Moses and Aaron concerned both Israel and Pharaoh.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the sons of Israel'; also rendered 'the Israelites.'
    reason: lexical_alternative
