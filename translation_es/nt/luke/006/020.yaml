base_translation:
  language: en
  yaml_path: translation/nt/luke/006/020.yaml
  text: 'And he[a], lifting up his eyes toward his disciples, was saying: “Blessed are the poor[b], because yours is the kingdom of God.”'
  footnotes:
  - marker: a
    text: Or, more formally, “Blessed are the poor.” The Greek expression is third person in form, but the following “yours” makes the address direct.
    reason: lexical_alternative
  - marker: b
    text: Luke says “the poor,” not “the poor in spirit” (compare Matt 5:3).
    reason: cross_reference
