revisions:
- from: Así, el campo y la cueva que estaba en él fueron adjudicados[a] a Abraham como propiedad de sepultura[b] por parte de los hijos de Het[c].
  to: Así, el campo y la cueva que estaba en él quedaron legalmente en posesión de Abraham como posesión para sepultura[a], de los hijos de Het[b].
  rationale: Se reemplaza ‘fueron adjudicados’ por ‘quedaron legalmente en posesión de’ para reflejar mejor el sentido de transferencia/establecimiento legal sin la connotación administrativa moderna de ‘adjudicar’. Se cambia ‘por parte de’ por ‘de’ para representar más fielmente מֵאֵת. También se ajusta ‘propiedad de sepultura’ a ‘posesión para sepultura’ para conservar mejor el matiz de אֲחֻזָּה como tenencia legal.
