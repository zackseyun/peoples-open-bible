translation:
  language: es
  text: Y sus enemigos planearon invadir su tierra, para destruir su tierra y alzar la mano contra sus lugares santos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su santuario» o «sus cosas santas» para «sus lugares santos»; el griego usa el plural τὰ ἅγια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλήθησαν
  english_pob_choice: planned
  chosen_spanish: planearon
  alternatives_spanish:
  - decidieron
  - se propusieron
  - intentaron
  lexicon: LSJ
  rationale: El verbo expresa una intención o plan hostil. «Planearon» reproduce bien la deliberación sin añadir un matiz más fuerte que el del griego.
- source_word: ἐμβατεῦσαι
  english_pob_choice: to invade
  chosen_spanish: invadir
  alternatives_spanish:
  - entrar en
  - marcharse dentro de
  - penetrar en
  lexicon: LSJ
  rationale: En este contexto militar, el verbo implica incursión hostil; «invadir» hace explícita esa agresión de forma natural en español.
- source_word: χώραν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  - región
  lexicon: LSJ
  rationale: «Tierra» es la opción más natural y conserva la repetición del sustantivo en el versículo.
- source_word: τοῦ ἐκτρῖψαι
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para arruinar
  - para devastar
  - para borrar
  lexicon: LSJ
  rationale: La frase de propósito expresa destrucción completa; «destruir» es más formal y cercano al ajuste revisado del inglés POB que «arruinar» o «devastar».
- source_word: ἐκτεῖναι τὰς χεῖρας
  english_pob_choice: to stretch out their hands against
  chosen_spanish: extender sus manos contra
  alternatives_spanish:
  - levantar sus manos contra
  - poner sus manos sobre
  - alzar sus manos contra
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de agresión con una traducción bastante literal que sigue el griego y el audit trail inglés.
- source_word: τὰ ἅγια
  english_pob_choice: their holy places
  chosen_spanish: sus lugares santos
  alternatives_spanish:
  - su santuario
  - sus cosas santas
  - sus cosas sagradas
  lexicon: LSJ
  rationale: El plural neutro permite «lugares santos» y conviene mantener la pluralidad que el inglés POB preservó. En español suena más natural que un singular, sin perder el sentido cultual.
theological_decisions:
- issue: Valor cultual de τὰ ἅγια en plural
  english_pob_reading: their holy places
  chosen_spanish_reading: sus lugares santos
  alternative_spanish_readings:
  - su santuario
  - sus cosas santas
  rationale: El griego está en plural y puede referirse a espacios sagrados o al ámbito cultual. Se mantiene el plural en el texto principal para no colapsar la referencia en un singular y para respetar la tensión lexical documentada.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: El inglés POB fue revisado de «wipe out» a «destroy» para ἐκτρῖψαι; la versión española sigue esa revisión con «destruir», evitando un verbo más coloquial o más enfático que alteraría el tono formal del texto auditado.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de «su tierra»... «su tierra» como en el griego y el audit trail inglés.
  - «Lugares santos» preserva el plural de τὰ ἅγια y evita reducirlo sin necesidad a «santuario».
  - La elección de «invadir» conserva el matiz hostil implícito en ἐμβατεῦσαι sin añadir interpretación extra.
