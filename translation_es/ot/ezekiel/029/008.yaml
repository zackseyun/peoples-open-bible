revisions:
- from: 'Por tanto, así dice el Señor Yahvé: He aquí, voy a traer una espada[a] contra ti, y cortaré de ti al hombre y a la bestia[b].'
  to: 'Por tanto, así dice el Señor, Yahvé: He aquí, voy a traer una espada[a] contra ti, y eliminaré de ti a hombre y bestia[b].'
  rationale: Se ajusta el título divino para reflejar con más claridad el compuesto אֲדֹנָי יְהוִה en español y se reemplaza 'cortaré de ti' por 'eliminaré de ti' para evitar un calco torpe, manteniendo el sentido de juicio y remoción total. También se ubica mejor la nota de la fórmula 'hombre y bestia'.
  reviewer_model: gpt-5.4
