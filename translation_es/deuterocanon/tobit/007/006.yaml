translation:
  language: es
  text: Y Raguel se levantó de un salto[a], lo besó[b] y lloró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἀνεπήδησεν expresa un movimiento repentino y enérgico; por eso se traduce con una imagen dinámica en español.
    reason: lexical_alternative
  - marker: b
    text: El verbo compuesto griego κατεφίλησεν intensifica el beso y sugiere un afecto marcado; el texto principal mantiene una formulación sobria y deja esa intensidad implícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεπήδησεν
  english_pob_choice: sprang up
  chosen_spanish: se levantó de un salto
  alternatives_spanish:
  - saltó de pie
  - se irguió de golpe
  - se puso de pie de un salto
  lexicon: LSJ
  rationale: El verbo expresa un levantarse súbito y entusiasta. En español, 'se levantó de un salto' conserva la rapidez y el impulso emocional sin sonar mecánico.
- source_word: κατεφίλησεν
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó con afecto
  - lo besó efusivamente
  - lo besó cálidamente
  lexicon: LSJ
  rationale: El compuesto intensifica el beso, pero la revisión inglesa prefirió dejar la intensidad implícita en la forma verbal principal. En español, 'lo besó' mantiene la sobriedad del texto y permite que el contexto afectivo aporte la fuerza.
- source_word: ἔκλαυσε
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró desconsoladamente
  - sollozó
  - derramó lágrimas
  lexicon: LSJ
  rationale: '''Lloró'' es la equivalencia más natural y fiel en español. ''Lloró'' comunica bien la emoción de la escena sin añadir matices no presentes en el griego.'
- source_word: Ῥαγουὴλ
  english_pob_choice: Raguel
  chosen_spanish: Ragüel
  alternatives_spanish:
  - Raguel
  - Reuel
  lexicon: Greek proper-name tradition
  rationale: Se conserva el nombre propio por transliteración. 'Ragüel' refleja mejor la forma griega Ῥαγουήλ en español y evita la lectura totalmente castellanizada que puede oscurecer la correspondencia con el nombre de la fuente.
translation_notes:
  revision_awareness: 'La base inglesa revisó ''kissed him warmly'' a ''kissed him'' para no sobretraducir κατεφίλησεν. El español sigue esa decisión: usa una forma simple en el texto principal y explica en nota que el griego sí lleva intensificación afectiva.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y claro, sin calcos innecesarios.
  - Se usa 'Ragüel' para reflejar la transliteración griega del nombre propio.
  - No se añade un objeto explícito en 'lloró', siguiendo el griego intransitivo.
  - Las notas preservan la tensión lexical entre la intensidad del griego y la sobriedad del texto principal.
