review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mandato de hablar, llamado a oír, doble mención de Yahvé, título divino completo, anuncio inminente de juicio sobre el lugar, y el modismo final de los oídos. Sin embargo, dos elecciones necesitan ajuste para mayor fidelidad y naturalidad: «Así ha dicho» suena menos idiomático que la fórmula profética corriente «Así dice», y el anclaje de notas está invertido respecto del modelo auditado: la nota léxica sobre רָעָה debe ir con «calamidad/desastre», mientras la nota cultural del modismo debe ir con la cláusula final de los oídos.'
  spanish_quality_summary: El texto es claro y digno, con buen registro bíblico contemporáneo. «Oigan», «la palabra de Yahvé» y «Yahvé de los ejércitos» funcionan bien. «He aquí, estoy trayendo» es aceptable, aunque algo pesado; no es necesario cambiarlo. La principal mejora de estilo es «Así dice» en vez de «Así ha dicho». También conviene colocar las notas donde realmente corresponden para evitar confusión al lector.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel» correcto; רָעָה -> «calamidad» es una opción válida y bien justificada; no hay conflictos doctrinales. «Yahvé de los ejércitos» respeta el valor de צְבָאוֹת. No se detectan desviaciones mayores del glosario.'
  issues:
  - severity: medium
    issue: La fórmula profética «כֹּה אָמַר» se traduce como «Así ha dicho».
    rationale: Aunque no es imposible, en español bíblico natural y en correspondencia con el hebreo discursivo la fórmula estable es «Así dice». «Así ha dicho» suena menos idiomático y menos directo en una proclamación profética.
  - severity: medium
    issue: Las notas [a] y [b] están ancladas en lugares incorrectos del texto.
    rationale: La nota [a] explica la alternativa léxica de רָעָה («calamidad/desastre»), por lo que debe ir sobre «calamidad». La nota [b] explica el modismo hebreo «sus oídos hormiguearán/zumbarán», por lo que debe anclarse en la cláusula final, no en «este lugar».
  revised_spanish_text: 'Y dirás: «Oigan la palabra de Yahvé, reyes de Judá y habitantes de Jerusalén. Así dice Yahvé de los ejércitos, el Dios de Israel: He aquí, estoy trayendo una calamidad[a] sobre este lugar, de modo que a todo el que la oiga le zumbarán los oídos[b]».'
  revised_footnotes:
