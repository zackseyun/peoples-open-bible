  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: conserva el movimiento idiomático de תֵלֵךְ, el lenguaje literal de «sangre», y usa «Yahvé» conforme al proyecto. También preserva en nota la lectura alternativa de לֹא תַעֲמֹד עַל דַּם רֵעֶךָ. Sin embargo, «chismoso» debilita la fuerza de רָכִיל, que en este contexto apunta a difundir informes dañinos o calumniosos más que a simple chisme.'
  spanish_quality_summary: El español es claro y legible, pero «No andarás como chismoso» suena algo coloquial y menos grave que el original. «No te pondrás contra la sangre de tu prójimo» es comprensible, aunque algo rígido; aun así, preserva mejor la tensión semántica que opciones más interpretativas. La nota actual es entendible, pero «No te pondrás de pie» suena poco natural para expresar la alternativa de «stand by».
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé» y «prójimo». No hay conflicto con otros términos doctrinales clave. La principal desviación léxica es רָכִיל -> «chismoso», que no mantiene suficientemente la gravedad documentada por el POB inglés («slanderer»).
  issues:
  - severity: medium
    issue: «chismoso» para רָכִיל
    rationale: Aunque natural, «chismoso» puede sonar ligero o doméstico y no transmite con suficiente fuerza la difusión dañina de acusaciones o informes maliciosos. Dado que el POB inglés eligió «slanderer» precisamente para evitar esa atenuación, conviene usar «calumniador» o «difamador».
  - severity: low
    issue: Redacción de la nota alternativa
    rationale: «No te pondrás de pie mientras se derrama la sangre de tu prójimo» es menos natural en español para la idea de «stand by». «No te quedarás de pie...» o «No te quedarás sin actuar...» comunica mejor la alternativa sin resolverla del todo.
  revised_spanish_text: No andarás como calumniador entre tu pueblo[a]. No te pondrás contra la sangre de tu prójimo. Yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «No te quedarás de pie mientras se derrama la sangre de tu prójimo».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «chismoso» por «calumniador» para reflejar mejor la gravedad de רָכִיל según la decisión léxica auditada, evitando un tono demasiado leve. Se ajusta la nota para que la alternativa suene más natural en español, manteniendo la ambigüedad interpretativa documentada por el POB inglés. El resto del texto puede permanecer, ya que conserva adecuadamente el lenguaje literal y la tensión del hebreo.
