translation:
  language: es
  text: y un macho cabrío, como ofrenda por el pecado, para hacer expiación[a] por ustedes—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para hacer expiación por ustedes». También puede expresarse «para hacer atonamiento por ustedes», pero «expiación» es más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  english_pob_choice: and one male goat
  chosen_spanish: y un macho cabrío
  alternatives_spanish:
  - y un cabrío
  - y un macho de las cabras
  lexicon: HALOT
  rationale: שְׂעִיר designa un macho cabrío, no un caprino genérico. En español, «macho cabrío» comunica el sexo y el tipo sacrificial con claridad natural. El «y» reproduce la conjunción וּ; el número «uno» puede quedar implícito por el artículo indefinido en este contexto enumerativo.
- source_word: עִזִּים
  english_pob_choice: male goat
  chosen_spanish: de las cabras
  alternatives_spanish:
  - de cabras
  - de la especie cabra
  lexicon: HALOT
  rationale: 'El constructo שְׂעִיר עִזִּים especifica la clase animal: un macho cabrío perteneciente al grupo de las cabras. «De las cabras» evita la calca «cabrío de cabras» y conserva la relación de especificación del hebreo.'
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - una sola
  lexicon: HALOT
  rationale: El numeral marca cantidad. En español, con un sustantivo contado, el artículo indefinido «un» expresa naturalmente el valor de «uno» sin afectar la fluidez.
- source_word: חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - como ofrenda por el pecado
  - como sacrificio expiatorio
  lexicon: HALOT
  rationale: Aunque חַטָּאת puede nombrar la ofrenda por el pecado, en español «para expiación» evita una construcción demasiado técnica y mantiene el sentido cultual de la acción sacrificial. Se preserva así la categoría de atonement/expiation que el POB inglés documenta en la nota alternativa, sin forzar una equivalencia eclesiástica fija.
- source_word: לְ/כַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para expiación
  alternatives_spanish:
  - para hacer expiación
  - para hacer expiación por ustedes
  lexicon: HALOT
  rationale: כפר en contexto sacerdotal expresa expiación/atonement. En español, «para expiación» condensa el infinitivo final sin perder el valor ritual; evita además duplicar la idea con una perífrasis pesada.
- source_word: עֲלֵי/כֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: La preposición עַל con כפר indica la persona beneficiaria o el objeto sobre el que recae la expiación. «Por ustedes» suena natural en español y preserva el sentido vicario/representativo del acto.
theological_decisions:
- issue: Traducción del lenguaje sacrificial de כפר
  english_pob_reading: to make atonement for you
  chosen_spanish_reading: para expiación por ustedes
  alternative_spanish_readings:
  - para hacer expiación por ustedes
  - para hacer expiación a favor de ustedes
  rationale: El hebreo expresa la función cultual de expiación sin explicitar un mecanismo doctrinal posterior. «Expiación» conserva la categoría bíblica y la tensión terminológica entre atonement y expiation que el POB inglés también deja abierta en su nota alternativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El paquete fuente y el audit trail inglés muestran alto acuerdo y ninguna revisión aplicada; la redacción española sigue de cerca la decisión inglesa principal, manteniendo la alternativa cultual «expiación» como nota para reflejar la tensión lexical documentada entre atonement y expiation.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier término de máscara; no hay mención al nombre divino en este versículo.
  - «Macho cabrío» se usa como equivalente natural de שְׂעִיר, conservando la especificidad sexual del animal sacrificial.
  - «Expiación» se mantiene en registro cultual bíblico, coherente con la nota alternativa inglesa.
  - El pronombre de segunda persona plural se expresa como «ustedes», adecuado para español neutral latinoamericano.
