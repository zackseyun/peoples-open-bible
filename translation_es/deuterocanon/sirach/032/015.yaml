translation:
  language: es
  text: Todo el que busca la ley[b] la obtendrá, pero el que actúa con arrogancia[a] quedará atrapado por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo ומתלהלה es incierto; puede apuntar a un pretencioso, a alguien que se engaña a sí mismo, o a una persona de actitud insincera semejante.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo difiere sustancialmente: «Y no insistas en un sacrificio injusto, porque el Señor es juez, y con él no hay parcialidad». Los testigos hebreo y griego parecen reflejar aquí formas textuales diferentes.'
    reason: textual_variant
lexical_decisions:
- source_word: דורש
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - indaga en
  - procura
  - estudia
  lexicon: HALOT
  rationale: El participio דורש expresa una búsqueda activa y diligente. «Busca» conserva esa fuerza natural en español sin reducirla a estudio formal ni a mera curiosidad.
- source_word: תורה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  - la Torá
  lexicon: HALOT
  rationale: En este contexto sapiencial, תורה puede abarcar instrucción divina, pero la opción bíblica y readable en español es «la ley», que mantiene el peso normativo y religioso del término.
- source_word: יפיקנה
  english_pob_choice: will obtain it
  chosen_spanish: la obtendrá
  alternatives_spanish:
  - la conseguirá
  - la alcanzará
  - la aprehenderá
  lexicon: HALOT
  rationale: El verbo sugiere lograr o sacar provecho de lo buscado. «La obtendrá» comunica resultado efectivo sin forzar una imagen más interpretativa como «aprehenderá».
- source_word: ומתלהלה
  english_pob_choice: acts arrogantly
  chosen_spanish: actúa con arrogancia
  alternatives_spanish:
  - finge
  - se hace el hipócrita
  - actúa con insinceridad
  lexicon: HALOT
  rationale: El hebreo es difícil y el expediente reconoce una incertidumbre lexical real. Dado el último ajuste inglés hacia «acts arrogantly», en español «actúa con arrogancia» reproduce la conducta externa sin afirmar con exceso un matiz único que el texto no asegura.
- source_word: יוקש
  english_pob_choice: will be ensnared
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será ensnaredo
  - caerá en la trampa
  - quedará enredado
  lexicon: HALOT
  rationale: La pasiva de יקש comunica quedar preso en una trampa. «Será atrapado» es idiomático y claro en español; «será ensnaredo» sería demasiado artificial, y «caerá en la trampa» añade una imagen no explicitada.
- source_word: בו
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - en ella
  - a causa de ella
  - por la misma ley
  lexicon: HALOT
  rationale: El sufijo remite naturalmente a «la ley». «Por ella» conserva la pasiva instrumental en español y mantiene la relación entre la ley buscada sinceramente y la misma ley que atrapa al insincero.
theological_decisions:
- issue: Cómo reflejar el contraste sapiencial entre el buscador sincero de la ley y el insincero/arrogante
  english_pob_reading: the one who acts arrogantly will be ensnared by it
  chosen_spanish_reading: el que actúa con arrogancia será atrapado por ella
  alternative_spanish_readings:
  - el que finge será atrapado por ella
  - el hipócrita será atrapado por ella
  - el que actúa con insinceridad será atrapado por ella
  rationale: 'El hebreo es notoriamente incierto y el POB inglés revisado optó por «acts arrogantly». La traducción española evita resolver la dificultad con un término más fuerte de lo que el hebreo garantiza, pero conserva el contraste moral: la ley beneficia al que la busca y expone al que se acerca a ella de manera torcida.'
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tension; original-language primacy over smoothing uncertainty'
- issue: Tratamiento del sustantivo תורה en un contexto judío sapiencial
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: Aunque תורה puede significar instrucción, en Sirácida este término suele portar la autoridad concreta de la ley divina. «La ley» es la forma más transparente y fiel para el lector hispanohablante.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms; Jewish textual context'
- issue: Relación con la variante griega, que presenta otro contenido textual
  english_pob_reading: The Greek parallel for this verse differs substantially
  chosen_spanish_reading: No se incorpora la línea griega como texto principal
  alternative_spanish_readings:
  - Ofrecer la variante griega como nota principal
  - Sustituir el hebreo por la lectura griega
  rationale: El expediente indica un desajuste importante entre testigos. Por fidelidad al texto base del registro, el cuerpo español sigue la lectura hebrea y deja constancia de la tensión textual mediante nota, en vez de armonizar artificialmente ambos testigos.
  doctrine_reference: 'DOCTRINE.md: Auditable reasoning; preserve textual variants rather than collapsing them'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del expediente, que movió la elección inglesa desde «will grasp it / plays the hypocrite / will be caught» hacia «will obtain it / acts arrogantly / will be ensnared». En español se adoptó esa orientación semántica reciente, pero se mantuvo visible la incertidumbre de ומתלהלה mediante una formulación prudente en la nota.
  spanish_consistency_notes:
  - Se usó «ley» para תורה conforme al valor normativo que el expediente atribuye al término en Sirácida.
  - Se evitó «Cristo» o terminología eclesial no presente en el versículo.
  - «Arrogancia» se eligió como equivalente sobrio de la conducta desviada; la nota preserva la ambigüedad del hebreo.
  - La pasiva «será atrapado por ella» mantiene la referencia anafórica a la ley sin sobreexplicarla.
