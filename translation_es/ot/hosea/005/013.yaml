revisions:
- from: Cuando Efraín vio su enfermedad[a], y Judá su herida, entonces Efraín fue a Asiria y envió al rey Jareb; pero él no puede sanarlos, ni puede quitar de ustedes su mal[b].
  to: Cuando Efraín vio su enfermedad, y Judá su herida, entonces Efraín fue a Asiria y envió al rey Jareb[a]; pero él no puede curarlos, ni puede curar su herida.
  rationale: Se corrigió el anclaje de la nota para que acompañe a ‘rey Jareb’, que es el elemento realmente comentado. Se reemplazó ‘ni puede quitar de ustedes su mal’ por ‘ni puede curar su herida’ para ajustarse mejor a מָזוֹר y a la decisión léxica auditada, preservando la metáfora médica/corporal con español natural. Se mantuvo ‘curarlos’ para la primera cláusula por claridad idiomática con el plural ‘ustedes’.
  reviewer_model: gpt-5.4
