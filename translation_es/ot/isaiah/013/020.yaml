translation:
  language: es
  text: No será habitada jamás, ni se morará en ella de generación en generación; ningún árabe[a] plantará su tienda allí, y los pastores[b] no harán echarse allí sus rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún nómada del desierto plantará su tienda allí». El término hebreo puede denotar específicamente a un árabe o, más ampliamente en el contexto, a un habitante nómada del desierto.'
    reason: lexical_alternative
  - marker: b
    text: Heb. «y pastores»; el verbo es causativo, de modo que el sentido es «hacer echarse» o «hacer recostar» a sus rebaños.
    reason: lexical_explanation
lexical_decisions:
- source_word: תֵשֵׁב
  english_pob_choice: will be inhabited
  chosen_spanish: será habitada
  alternatives_spanish:
  - será poblada
  - se habitará
  lexicon: HALOT
  rationale: Con un sujeto de ciudad desolada, יָשַׁב expresa aquí la idea de ser habitada. En español, la pasiva natural «será habitada» conserva el valor idiomático sin calco artificial.
- source_word: לָנֶצַח
  english_pob_choice: never
  chosen_spanish: jamás
  alternatives_spanish:
  - nunca
  - por siempre
  lexicon: HALOT
  rationale: La negación con לָנֶצַח expresa permanencia indefinida; después de la negación, «jamás» comunica con naturalidad la fuerza absoluta del texto.
- source_word: תִשְׁכֹּן
  english_pob_choice: will be dwelt in
  chosen_spanish: se morará en ella
  alternatives_spanish:
  - se habitará en ella
  - vivirá allí
  lexicon: HALOT
  rationale: שָׁכַן mantiene la idea de morar, residir. «Se morará en ella» conserva una distinción formal respecto de «será habitada» y sigue siendo inteligible en español bíblico contemporáneo.
- source_word: עַד דּוֹר וָדוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - a través de todas las generaciones
  lexicon: HALOT
  rationale: El hebreo es un modismo de duración continua a través de sucesivas generaciones. La fórmula española estándar reproduce bien esa continuidad.
- source_word: יַהֵל
  english_pob_choice: will pitch his tent
  chosen_spanish: habrá allí árabe
  alternatives_spanish:
  - acampará allí un árabe
  - allí plantará su tienda
  lexicon: HALOT
  rationale: El sujeto עֲרָבִי puede entenderse como «árabe» o, en el contexto, como nómada del desierto. En la línea principal se preserva el término lexical más directo, mientras la nota aclara la alternativa contextual. No se desarrolló la imagen de la tienda en el texto principal para no sobreespecificar más allá del hebreo mínimo.
- source_word: עֲרָבִי
  english_pob_choice: Arab
  chosen_spanish: árabe
  alternatives_spanish:
  - nómada del desierto
  - beduino
  lexicon: HALOT
  rationale: El sustantivo denota normalmente a un árabe/arabio. «Árabe» es el equivalente directo y comprensible; la posible ampliación a nómada del desierto queda preservada en nota.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los pastores de ganado
  - los trashumantes
  lexicon: HALOT
  rationale: El participio de רעה designa a quienes apacientan rebaños. «Pastores» es el equivalente claro y tradicional en español.
- source_word: יַרְבִּצוּ
  english_pob_choice: will not make their flocks lie down
  chosen_spanish: no harán recostar allí sus rebaños
  alternatives_spanish:
  - no harán echarse allí sus rebaños
  - no harán descansar allí sus rebaños
  lexicon: HALOT
  rationale: 'El hiphil de רבץ es causativo: hacer echarse/recostar. En español, «hacer recostar» conserva la causalidad y evita la ambigüedad de que los pastores mismos se acuesten. Se explicita «sus rebaños» porque el objeto está implícito en el contexto pastoral.'
theological_decisions:
- issue: Desolación permanente de la ciudad
  english_pob_reading: It will never be inhabited ... and it will not be dwelt in from generation to generation
  chosen_spanish_reading: No será habitada jamás ... ni se morará en ella de generación en generación
  alternative_spanish_readings:
  - No será poblada nunca ...
  - No se habitará allí por siempre ...
  rationale: No hay tensión doctrinal especial, pero sí una imagen profética de ruina total y duradera. La traducción mantiene ambas cláusulas para no diluir la repetición intensificadora del hebreo.
  doctrine_reference: Isaías 13:20; desolación/jucio histórico-profético
- issue: Sentido de עֲרָבִי
  english_pob_reading: no Arab will pitch his tent there; The Hebrew term can denote an Arab specifically or, more broadly in context, a nomadic desert-dweller.
  chosen_spanish_reading: no habrá allí árabe
  alternative_spanish_readings:
  - no habrá allí nómada del desierto
  - no acampará allí ningún beduino
  rationale: Se preserva el término directo «árabe» en el texto principal, porque ese es el valor léxico más inmediato. La nota recoge la amplitud contextual sin borrar la posible referencia étnica.
  doctrine_reference: Uso léxico de עֲרָבִי; nota filológica, no doctrinal
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el dictamen de revisión del POB en inglés: se mantiene el registro formal de «dwelt in» mediante «se morará en ella», y se conserva la diferenciación entre la inhabitación general de la ciudad y la acción pastoral específica de hacer recostar los rebaños. También se respeta la nota léxica sobre עֲרָבִי sin convertirla en paráfrasis explicativa dentro del texto principal.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otros equivalentes no pertinentes porque el versículo no contiene el Tetragrámaton ni un sustituto divino.
  - Se prefirió «jamás» para לָנֶצַח por su naturalidad en negación absoluta y su tono bíblico sobrio.
  - «Ser habitada» y «morarse en ella» preservan la doble cláusula hebrea sin aplanarla en una sola idea.
  - Se usó «rebaños» para hacer explícito el objeto de יַרְבִּצוּ, siguiendo el contexto pastoral y la lógica del hiphil causativo.
