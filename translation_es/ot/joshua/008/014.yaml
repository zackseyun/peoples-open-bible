  text: וַ/יְהִ֞י כִּ/רְא֣וֹת מֶֽלֶךְ הָ/עַ֗י וַֽ/יְמַהֲר֡וּ וַ/יַּשְׁכִּ֡ימוּ וַ/יֵּצְא֣וּ אַנְשֵֽׁי הָ/עִ֣יר לִ/קְרַֽאת יִ֠שְׂרָאֵל לַֽ/מִּלְחָמָ֞ה ה֧וּא וְ/כָל עַמּ֛/וֹ לַ/מּוֹעֵ֖ד לִ/פְנֵ֣י הָֽ/עֲרָבָ֑ה וְ/הוּא֙ לֹ֣א יָדַ֔ע כִּֽי אֹרֵ֥ב ל֖/וֹ מֵ/אַחֲרֵ֥י הָ/עִֽיר־־־־־׃
