translation:
  language: es
  text: Pero yo endureceré el corazón de Faraón[a], y multiplicaré mis señales y mis prodigios en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haré duro el corazón de Faraón» o «haré obstinado el corazón de Faraón». El verbo hebreo está en forma causativa y presenta el endurecimiento de manera directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - As me for, yo
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre explícito expresa contraste y énfasis. En español, «Pero yo» reproduce mejor ese giro adversativo que un simple «Y yo», y conserva la fuerza del hablante.
- source_word: אַקְשֶׁה
  english_pob_choice: will harden
  chosen_spanish: endureceré
  alternatives_spanish:
  - haré duro
  - haré obstinado
  lexicon: HALOT
  rationale: 'El hifil de קשׁה expresa una acción causativa: hacer duro/endurecer. «Endureceré» es el equivalente natural y fiel en español, sin suavizar la causalidad del verbo.'
- source_word: לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart
  chosen_spanish: el corazón de Faraón
  alternatives_spanish:
  - el corazón de Pharaoh
  - el ánimo de Faraón
  lexicon: HALOT
  rationale: Se conserva el sustantivo «corazón» para reflejar el hebreo, que alude al centro de la voluntad y del pensamiento. La construcción posesiva española normaliza la sintaxis sin interpretar el sentido en el cuerpo del texto.
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: and I will multiply
  chosen_spanish: y multiplicaré
  alternatives_spanish:
  - y aumentaré
  - y haré abundar
  lexicon: HALOT
  rationale: El verbo רבה en hifil conserva la idea de multiplicar/aumentar. «Multiplicaré» mantiene el vínculo léxico con el original y funciona bien con los objetos «señales» y «prodigios».
- source_word: אֹתֹתַי
  english_pob_choice: my signs
  chosen_spanish: mis señales
  alternatives_spanish:
  - mis signos
  - mis señales milagrosas
  lexicon: HALOT
  rationale: En contextos de actos divinos, אוֹת significa «señal». «Señales» es transparente en español y conserva la referencia a hechos que autentican y comunican el poder de Dios.
- source_word: מוֹפְתַי
  english_pob_choice: my wonders
  chosen_spanish: mis prodigios
  alternatives_spanish:
  - mis maravillas
  - mis portentos
  lexicon: HALOT
  rationale: מוֹפֵת puede referirse a prodigio, maravilla o portento. «Prodigios» mantiene la pareja natural con «señales» y transmite el carácter sobrenatural sin cargar el término hacia «augurio».
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra/land», por lo que se conserva en español para fidelidad formal y completitud textual.
theological_decisions:
- issue: La acción divina en el endurecimiento del corazón de Faraón
  english_pob_reading: I will harden Pharaoh’s heart
  chosen_spanish_reading: endureceré el corazón de Faraón
  alternative_spanish_readings:
  - haré obstinado el corazón de Faraón
  - dejaré que el corazón de Faraón se endurezca
  rationale: El hifil presenta una causación directa; por eso la versión principal mantiene un verbo activo e inequívoco. Se evita suavizarlo a mera अनुमति/permiso, preservando la tensión teológica que el texto expresa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el consenso de la última revisión inglesa sin cambios necesarios, manteniendo la misma lectura causativa y la pareja léxica «señales/prodigios» en un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino en el versículo.
  - Se mantiene «Faraón» como nombre-título consagrado en español bíblico.
  - «Señales» y «prodigios» preservan la distinción léxica del hebreo sin fusionarlos en un solo término.
  - La puntuación y el orden verbal siguen un español contemporáneo, sin perder el paralelismo del hebreo.
