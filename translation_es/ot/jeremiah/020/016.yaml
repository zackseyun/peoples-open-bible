  - severity: high
    issue: «sin arrepentirse» para וְלֹא נִחָם
    rationale: En este contexto de juicio divino, נחם indica no desistir/no retractarse/no ceder en el juicio. «Sin arrepentirse» en español se entiende primariamente como arrepentimiento moral, lo cual distorsiona el sentido y va contra la motivación explícita del audit trail inglés.
  revised_spanish_text: Que ese hombre sea como las ciudades que Yahvé derribó sin desistir[a], y que oiga un clamor por la mañana y una alarma[b] al mediodía.
