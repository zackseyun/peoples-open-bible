  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: ἔθεντο + φρουράν = «pusieron una guarnición», ἐν αὐτοῖς = «en ellos», y τοῦ ἐχθραίνειν expresa propósito hostil hacia Israel. Sin embargo, «para ser hostiles» suena poco idiomático en español con sujeto militar impersonal y además el pie de nota no ofrece una verdadera alternativa, porque repite exactamente la misma redacción del texto principal.'
