translation:
  language: es
  text: Y algunos hombres sin ley de la nación presentaban acusaciones contra él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presentaban una petición contra él», es decir, llevaban una queja ante la autoridad. El verbo griego puede denotar una apelación o petición; en este contexto es hostil y por eso se traduce como acusación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετύγχανον
  english_pob_choice: were making accusations
  chosen_spanish: se presentaban
  alternatives_spanish:
  - interponían una petición
  - presentaban una acusación
  - intercedían
  lexicon: LSJ/BDAG
  rationale: El verbo griego puede significar tanto ‘peticionar/interceder’ como ‘presentar un recurso o queja’; con κατʼ αὐτοῦ (‘contra él’), el sentido aquí es hostil. En español, ‘se presentaban’ mantiene la idea de comparecer ante una autoridad sin fijar de antemano si se trata de petición o denuncia, y queda abierto a la nota del matiz adversativo.
- source_word: κατʼ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su contra
  - acerca de él
  lexicon: LSJ/BDAG
  rationale: La preposición con genitivo expresa oposición dirigida a la persona; ‘contra él’ reproduce directamente esa fuerza adversativa.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: LSJ
  rationale: Corresponde a un indefinido parcial y natural en español, sin volverlo demasiado específico.
- source_word: ἄνομοι
  english_pob_choice: lawless men
  chosen_spanish: hombres sin ley
  alternatives_spanish:
  - hombres perversos
  - hombres impíos
  - desobedientes a la ley
  lexicon: LSJ
  rationale: 'El término tiene un matiz moral y legal: personas caracterizadas por vivir al margen de la ley. ‘Sin ley’ conserva esa fuerza y evita sustituirlo por un término más interpretativo como ‘impíos’.'
- source_word: τῶν ἐκ τοῦ ἔθνους
  english_pob_choice: from the nation
  chosen_spanish: de la nación
  alternatives_spanish:
  - del pueblo
  - de su nación
  - del pueblo judío
  lexicon: LSJ
  rationale: En 1 Macabeos, ἔθνος puede significar el pueblo/nación en sentido étnico-político. ‘De la nación’ sigue de cerca el griego y evita imponer el sentido de ‘gentiles’ que sería engañoso aquí.
theological_decisions:
- issue: Valor moral-jurídico de ἄνομοι
  english_pob_reading: lawless men
  chosen_spanish_reading: hombres sin ley
  alternative_spanish_readings:
  - hombres perversos
  - desobedientes a la ley
  rationale: Se conserva el peso moral-jurídico del término sin convertirlo en una etiqueta teológica más amplia. La traducción mantiene la evaluación del texto y su posible referencia al incumplimiento de la ley.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica; fidelidad léxica con español natural; evitar sobreparáfrasis'
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego de Swete y conserva la ambigüedad léxica documentada en ἐνετύγχανον, que el audit trail inglés resuelve en sentido hostil. Se evita traducir mecánicamente desde el inglés cuando el español puede sostener mejor el matiz de comparecer/presentarse ante autoridad con valor adversativo.
  spanish_consistency_notes:
  - Se usa ‘de la nación’ para ἔθνους siguiendo el valor étnico-político del contexto macabeo.
  - ‘hombres sin ley’ conserva la fuerza moral-jurídica de ἄνομοι sin añadir una interpretación doctrinal.
  - La nota al pie mantiene la alternativa ‘petición/apelación’ documentada por el POB inglés.
