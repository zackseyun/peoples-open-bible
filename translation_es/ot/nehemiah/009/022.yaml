translation:
  language: es
  text: Tú les diste reinos y pueblos[a], y les asignaste cada rincón. Así tomaron posesión de la tierra de Sijón, incluso la tierra del rey de Hesbón[b], y de la tierra de Og, rey de Basán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les repartiste por regiones», «les asignaste por distritos» o «hasta el extremo». La frase hebrea es difícil y puede describir una distribución territorial por regiones o hacia todos los extremos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la tierra de Sijón, y la tierra del rey de Hesbón». Como Sijón era el rey de Hesbón, la frase puede funcionar en aposición: «la tierra de Sijón, la tierra del rey de Hesbón».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַמְלָכוֹת
  english_pob_choice: kingdoms
  chosen_spanish: reinos
  alternatives_spanish:
  - reinos soberanos
  - dominios
  lexicon: HALOT
  rationale: El plural hebreo designa entidades políticas o territorios regios. En español, «reinos» conserva esa idea de dominio político de forma natural y digna.
- source_word: עֲמָמִים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: La palabra apunta a grupos étnicos o colectivos humanos. «Pueblos» mantiene bien el paralelismo con «reinos» sin imponer la carga moderna de «naciones».
- source_word: וַתַּחְלְקֵם
  english_pob_choice: allotted them
  chosen_spanish: les asignaste
  alternatives_spanish:
  - los dividiste
  - les repartiste
  - les distribuiste
  lexicon: HALOT
  rationale: El verbo implica dividir/aportar en porciones. En contexto, Dios distribuye territorios conquistados; «les asignaste» conserva la acción de repartir con matiz de concesión y sin sonar mecánico.
- source_word: לְפֵאָה
  english_pob_choice: to every corner
  chosen_spanish: a cada rincón
  alternatives_spanish:
  - hasta el extremo
  - por regiones
  - por todas partes
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y puede sugerir bordes, extremos o distritos. «A cada rincón» preserva la amplitud espacial sin fijar indebidamente una de las alternativas.
- source_word: וַיִּירְשׁוּ
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - heredaron
  - poseyeron
  lexicon: HALOT
  rationale: El verbo puede significar heredar, poseer o tomar posesión. Aquí se trata de la adquisición concreta de territorio; «tomaron posesión de» expresa bien ese sentido histórico.
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  lexicon: HALOT
  rationale: «Tierra» es el equivalente más natural y tradicional para referirse a dominio territorial en este tipo de relato.
- source_word: סִיחוֹן
  english_pob_choice: Sihon
  chosen_spanish: Sijón
  alternatives_spanish:
  - Sihón
  lexicon: Transliteración bíblica estándar en español
  rationale: Se adopta la transliteración habitual en español bíblico. «Sijón» representa de manera más consistente el valor consonántico hebreo que la forma anglicada.
- source_word: מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: the king of Heshbon
  chosen_spanish: el rey de Hesbón
  alternatives_spanish:
  - el rey de Heshbon
  lexicon: HALOT
  rationale: La cadena constructa identifica a Sijón como rey de Hesbón. En español, «el rey de Hesbón» es claro y refleja la sintaxis sin sobreexplicarla.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: Og king of Bashan
  chosen_spanish: Og, rey de Basán
  alternatives_spanish:
  - Og, el rey de Basán
  lexicon: HALOT
  rationale: La secuencia nombre-título-lugar se expresa de forma natural con coma. «Basán» sigue la transliteración bíblica española usual.
theological_decisions:
- issue: Alcance de «y les asignaste a cada rincón» frente a la ambigüedad de לְפֵאָה
  english_pob_reading: God allotted to them every corner; the phrase may refer to divisions by regions or to every extremity.
  chosen_spanish_reading: Dios distribuyó el territorio a Israel en todas sus partes o extensiones.
  alternative_spanish_readings:
  - les asignaste por regiones
  - les repartiste por distritos
  - les asignaste hasta los extremos
  rationale: La expresión hebrea es compacta y no debe cerrarse artificialmente. La traducción principal conserva una imagen amplia y espacial, mientras que la nota mantiene abiertas las alternativas reconocidas por el audit trail.
  doctrine_reference: §1, §3, §5 de la filosofía de traducción POB
- issue: «Es decir» para la relación apposicional entre Sijón y el rey de Hesbón
  english_pob_reading: the land of Sihon, even the land of the king of Heshbon
  chosen_spanish_reading: la tierra de Sijón, es decir, la tierra del rey de Hesbón
  alternative_spanish_readings:
  - la tierra de Sijón, incluso la tierra del rey de Hesbón
  - la tierra de Sijón, la tierra del rey de Hesbón
  rationale: 'El hebreo permite una lectura apposicional: Sijón se identifica con el rey de Hesbón. «Es decir» hace explícita esa relación sin alterar el sentido ni eliminar la tensión textual.'
  doctrine_reference: §1, §5 de la filosofía de traducción POB
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés, especialmente el ajuste de «allotted to them every corner» y la lectura apposicional con «even the land of the king of Heshbon». La versión española preserva ambas decisiones: asignación territorial amplia y relación apposicional sin sobreexplicación excesiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en el versículo, sino porque aquí el sujeto tácito es Dios en el marco del himno de Nehemías 9; no fue necesario introducir el nombre divino en el texto de este versículo.
  - Se prefirió «reinos» y «pueblos» para conservar el paralelismo semántico del hebreo y la elección inglesa auditada.
  - 'Se mantuvieron transliteraciones bíblicas españolas estables: Sijón, Hesbón, Basán.'
  - No se usó «Cristo» ni terminología eclesiástica no presente en el texto fuente.
