translation:
  language: es
  text: Pero aquel hombre tres veces maldito preguntó si hay en el cielo un gobernante que ordenó guardar el sábado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si el Soberano está en el cielo, el que ordenó guardar el sábado». El griego puede entenderse como una descripción indefinida («¿hay en el cielo un gobernante...?») o como una referencia más definida al Dios de Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: τρισαλιτήριος
  english_pob_choice: thrice-accursed
  chosen_spanish: tres veces maldito
  alternatives_spanish:
  - triple maldito
  - tres veces condenado
  - tres veces maldecido
  lexicon: LSJ
  rationale: El griego intensifica con τρις-; en español, «tres veces maldito» conserva la fuerza injuriosa y el matiz de maldición sin sonar artificial. Mantiene el tono insultante del contexto.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - cuestionó
  lexicon: BDAG
  rationale: «Preguntó» es natural en español y suficiente para el verbo introductorio; el tono hostil lo aporta el contexto inmediato, no el verbo en sí.
- source_word: δυνάστης
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - soberano
  - regente
  - señor
  lexicon: LSJ
  rationale: «Gobernante» expresa a la persona con poder o dominio de manera directa. Evita cargar innecesariamente el pasaje con el peso confesional de «Señor».
- source_word: προστατάξας
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - decretó
  - dispuso
  lexicon: LSJ
  rationale: El participio remite a una orden autoritativa; «mandó» es breve, claro y fiel al valor imperativo del verbo compuesto.
- source_word: ἄγειν
  english_pob_choice: the observance of
  chosen_spanish: observar
  alternatives_spanish:
  - guardar
  - celebrar
  - mantener
  lexicon: LSJ
  rationale: Con «día» el infinitivo expresa la acción de observar una jornada sagrada. «Observar» preserva el sentido de práctica continuada sin sobreparafrasear.
- source_word: τὴν τῶν σαββάτων ἡμέραν
  english_pob_choice: the Sabbath day
  chosen_spanish: el día del sábado
  alternatives_spanish:
  - el sábado
  - el día de reposo
  lexicon: LSJ
  rationale: La expresión griega alude al sábado semanal. «Día del sábado» es claro en español y conserva la referencia temporal sin borrar la forma descriptiva del original.
theological_decisions:
- issue: Referencia de la autoridad celestial
  english_pob_reading: whether there is in heaven a ruler who commanded the observance of the Sabbath day
  chosen_spanish_reading: si hay en el cielo un gobernante que mandó observar el día del sábado
  alternative_spanish_readings:
  - si hay en el cielo un soberano que mandó observar el día del sábado
  - si el Gobernante está en el cielo, el que mandó observar el día del sábado
  rationale: El griego puede leerse como una descripción indefinida («un gobernante en el cielo») o como una referencia más definida al Dios de Israel. En español se conserva la ambigüedad con «un gobernante», sin resolverla doctrinalmente.
  doctrine_reference: Preservar la tensión textual sobre la referencia divina sin imponer una identificación dogmática que el griego no obliga a cerrar.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del expediente inglés y toma en cuenta la revisión final que prefirió «ruler» y «observance of the Sabbath day». En español se eligió una solución equivalente y fluida («gobernante», «observar el día del sábado») manteniendo la ambigüedad teológica documentada.
  spanish_consistency_notes:
  - Se usa «sábado» para la festividad semanal, conforme al valor contextual de σαββάτων.
  - Se evita «Señor» como equivalente automático de δυνάστης para no introducir una titulación teológica no exigida por el pasaje.
  - La injuria «tres veces maldito» conserva la intensidad retórica del término griego.
  - La nota al pie marca la alternativa interpretativa del referente celestial, siguiendo el expediente inglés.
