translation:
  language: es
  text: Forasteros estarán allí y pastorearán tus rebaños[a][b], y los hijos de forasteros serán tus labradores y tus viñadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apacentarán tus ovejas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de forasteros», un modismo para personas de pueblos extranjeros.'
    reason: cultural_note
lexical_decisions:
- source_word: זָרִים
  english_pob_choice: Foreigners
  chosen_spanish: Forasteros
  alternatives_spanish:
  - extranjeros
  - extraños
  lexicon: HALOT
  rationale: ‘Forasteros’ comunica bien en español a personas de fuera del pueblo del pacto o de otra nación, y mantiene la relación con ‘hijos de forasteros’. ‘Extraños’ puede sonar a desconocidos; ‘extranjeros’ también es posible, pero ‘forasteros’ conserva mejor el matiz bíblico y la cadencia del paralelo.
- source_word: וְעָמְדוּ
  english_pob_choice: will stand
  chosen_spanish: se pondrán
  alternatives_spanish:
  - estarán de pie
  - se alzarán
  - se presentarán
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘estarán de pie’. En español, ‘se pondrán’ conserva la imagen de ponerse en posición para servir sin sonar forzado; evita una literalidad rígida que resultaría menos natural en esta construcción.
- source_word: וְרָעוּ
  english_pob_choice: shepherd
  chosen_spanish: pastorearán
  alternatives_spanish:
  - apacentarán
  - pastorearán sus rebaños
  - cuidarán como pastores
  lexicon: HALOT
  rationale: ‘Pastorearán’ preserva el verbo pastoral y la imagen de gobierno/cuidado del ganado. ‘Apacentarán’ es también válido, pero ‘pastorearán’ resulta más transparente para lectores actuales y mantiene la fuerza del oficio pastoral.
- source_word: צֹאנְכֶם
  english_pob_choice: your flocks
  chosen_spanish: tus rebaños
  alternatives_spanish:
  - tus ovejas
  - tu ganado menor
  lexicon: HALOT
  rationale: ‘Rebaños’ es el equivalente natural para el colectivo de ovejas/cabras y funciona bien con el verbo pastoral. ‘Ovejas’ estrecharía demasiado el alcance; ‘ganado menor’ es más técnico.
- source_word: בְנֵי נֵכָר
  english_pob_choice: sons of foreigners
  chosen_spanish: los hijos de forasteros
  alternatives_spanish:
  - hijos de extranjeros
  - descendientes de forasteros
  lexicon: HALOT
  rationale: Mantengo la construcción idiomática del hebreo para dejar visible el paralelismo y la expresión cultural. ‘Hijos de forasteros’ reproduce la forma hebrea sin convertirla en una mera referencia genética; en este contexto, designa personas pertenecientes a pueblos ajenos.
- source_word: אִכָּרֵי/כֶם
  english_pob_choice: your farmers
  chosen_spanish: tus labradores
  alternatives_spanish:
  - tus agricultores
  - tus trabajadores del campo
  lexicon: HALOT
  rationale: ‘Labradores’ conserva el sentido de quienes trabajan la tierra y suena más bíblico y preciso que ‘agricultores’ en este contexto. ‘Farmers’ en inglés se vuelve en español ‘agricultores’, pero ‘labradores’ mantiene mejor el tono y la imagen agrícola tradicional sin ser arcaizante en exceso.
- source_word: כֹרְמֵיכֶם
  english_pob_choice: your vinedressers
  chosen_spanish: tus viñadores
  alternatives_spanish:
  - tus podadores de viña
  - tus cuidadores de viñas
  - tus trabajadores de la viña
  lexicon: HALOT
  rationale: ‘Viñadores’ es el término bíblico y natural para quienes trabajan en viñas, y distingue bien esta labor de la agricultura general. ‘Trabajadores de la viña’ es más explícito pero menos compacto; ‘podadores’ sería demasiado estrecho.
theological_decisions:
- issue: Asimetría social de la restauración de Sion
  english_pob_reading: The verse is rendered as a description of foreigners serving restored Israel in agricultural and pastoral labor, without softening the asymmetry or importing later ecclesiological reinterpretation into the main text.
  chosen_spanish_reading: El verso describe a forasteros sirviendo al pueblo restaurado en labores pastoriles y agrícolas, sin suavizar la asimetría ni convertir el texto principal en una reinterpretación eclesiológica posterior.
  alternative_spanish_readings:
  - Una imagen general de cooperación entre naciones
  - Una metáfora de abundancia sin roles de servicio literales
  rationale: El hebreo presenta una escena concreta de servicio en el marco de la restauración. La traducción española conserva esa imagen y no la amplía hacia una lectura doctrinal posterior que el verso no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El inglés POB fue revisado para mantener ‘foreigners’ sons’ como una expresión más natural y fiel al hebreo; la versión española conserva deliberadamente la estructura idiomática equivalente (‘hijos de forasteros’) y el paralelismo del verso, sin introducir una paráfrasis explicativa en el cuerpo del texto. Se preservó además la imagen pastoral/agropecuaria sin suavizar la relación de servicio.
  spanish_consistency_notes:
  - Se usa ‘forasteros’ como equivalente principal de זָרִים, en coherencia con el paralelo interno del verso.
  - Se usa ‘Yahvé’ no aplica aquí; no hay tetragrámaton en este versículo.
  - ‘Pastorearán’ se mantiene como verbo pastoral fuerte y no se reduce a ‘alimentarán’.
  - ‘Labradores’ y ‘viñadores’ preservan la distinción entre trabajo de campo general y trabajo específico en la viña.
