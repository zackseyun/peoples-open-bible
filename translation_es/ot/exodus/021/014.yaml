  text: וְ/כִֽי יָזִ֥ד אִ֛ישׁ עַל רֵעֵ֖/הוּ לְ/הָרְג֣/וֹ בְ/עָרְמָ֑ה מֵ/עִ֣ם מִזְבְּחִ֔/י תִּקָּחֶ֖/נּוּ לָ/מֽוּת־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/014.yaml
  text: But if a man acts presumptuously against his neighbor to kill him by treachery[c][b][a], you shall take him from my altar to die.
  footnotes:
  - marker: a
    text: Or 'acts presumptuously against' or 'comes arrogantly against'; the Hebrew verb conveys willful, deliberate action.
    reason: lexical_alternative
  - marker: b
    text: Or 'with cunning' or 'deceitfully.'
    reason: lexical_alternative
  - marker: c
    text: That is, even if he seeks refuge at the altar, he is to be removed for execution.
    reason: cultural_note
