translation:
  language: es
  text: 'Entonces contendí con los nobles de Judá y les dije[a]: «¿Qué es esta cosa tan mala que ustedes están haciendo, profanando el día de reposo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «violando» o «desecrando el día de reposo». El verbo hebreo expresa la idea de tratar como común lo que es santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָרִיבָה
  english_pob_choice: So I contended
  chosen_spanish: Así que contendí
  alternatives_spanish:
  - Así que reprendí
  - Así que disputé
  lexicon: HALOT
  rationale: ריב en este contexto narrativo expresa una confrontación verbal y acusatoria. «Contendí» conserva ese tono adversarial sin convertirlo en una simple reprensión moral ni en una discusión genérica.
- source_word: חֹרֵי יְהוּדָה
  english_pob_choice: the nobles of Judah
  chosen_spanish: los nobles de Judá
  alternatives_spanish:
  - los oficiales de Judá
  - los principales de Judá
  lexicon: HALOT
  rationale: חֹרִים designa a los hombres prominentes o de rango. «Nobles» es la equivalencia más estable y fiel al peso social del término en este pasaje.
- source_word: וָאֹמְרָה לָהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dije
  alternatives_spanish:
  - y les hablé
  - y les dije a ellos
  lexicon: HALOT
  rationale: La repetición del sujeto ya queda clara por el contexto narrativo. En español, «les dije» suena natural y conserva la progresión del discurso directo.
- source_word: מָה הַדָּבָר הָרָע הַזֶּה
  english_pob_choice: What is this evil thing
  chosen_spanish: ¿Qué es esta mala cosa?
  alternatives_spanish:
  - ¿Qué es esta cosa malvada?
  - ¿Qué es este mal asunto?
  lexicon: HALOT
  rationale: דָּבָר significa «cosa» o «asunto». Opto por «cosa» para mantener la estructura concreta de la pregunta, y por «mala» para reflejar el juicio moral de רָע sin volver el español artificiosamente solemne. «Mala cosa» mantiene la fuerza evaluativa, aunque en español puede sonar menos idiomático que «mal asunto»; se prefiere por mayor cercanía al hebreo.
- source_word: אֲשֶׁר אַתֶּם עֹשִׂים
  english_pob_choice: that you are doing
  chosen_spanish: que ustedes están haciendo
  alternatives_spanish:
  - que hacen
  - que ustedes hacen
  lexicon: HALOT
  rationale: El participio expresa acción en curso. «Están haciendo» preserva ese aspecto progresivo y evita convertirlo en un hecho atemporal.
- source_word: וּמְחַלְּלִים
  english_pob_choice: profaning
  chosen_spanish: profanando
  alternatives_spanish:
  - desecrando
  - violando
  lexicon: HALOT
  rationale: חלל en este contexto significa tratar como común lo que es santo. «Profanando» conserva mejor el contraste entre lo santo y lo común que «violando», y coincide con la decisión auditada del POB inglés.
- source_word: אֶת יוֹם הַשַּׁבָּת
  english_pob_choice: the Sabbath day
  chosen_spanish: el día de reposo
  alternatives_spanish:
  - el sábado
  - el día del sábado
  lexicon: HALOT
  rationale: En español bíblico «día de reposo» comunica con claridad שַׁבָּת sin depender de la equivalencia litúrgica «sábado», que puede sonar demasiado calendárica. Mantiene el valor de día apartado para Dios.
theological_decisions:
- issue: Sabbath holiness versus mere rule-breaking
  english_pob_reading: profaning the Sabbath day
  chosen_spanish_reading: profanando el día de reposo
  alternative_spanish_readings:
  - violando el día de reposo
  - desecrando el día de reposo
  rationale: El hebreo subraya que el sábado es santo y que el problema es tratarlo como común. «Profanando» conserva esa carga teológica mejor que un término centrado solo en infracción legal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Corregido para anclar la nota al texto español mediante el marcador [a], evitando notas sin ancla. Se conserva la lectura auditada de POB sobre el matiz de חלל y se ajusta el sintagma final a una forma bíblica y natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando corresponda; aquí el versículo no contiene el nombre divino.
  - «Nobles de Judá» reproduce con fidelidad el estatus social de חֹרֵי יְהוּדָה.
  - «Profanando» se usa de manera consistente para חלל en contextos de santidad.
  - «Día de reposo» se prefiere aquí por claridad bíblica y para conservar el referente del sábado sin calco rígido.
