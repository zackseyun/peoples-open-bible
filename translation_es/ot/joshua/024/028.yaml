  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Josué hizo salir/despidió a la asamblea, y la frase distributiva אִישׁ לְנַחֲלָתוֹ está bien entendida como ‘cada hombre/uno a su heredad’. La nota alternativa también preserva adecuadamente el valor distributivo de אִישׁ.'
