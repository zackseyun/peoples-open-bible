lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: So ... came
  chosen_spanish: vinieron
  alternatives_spanish:
  - y vinieron
  - entonces vinieron
  lexicon: HALOT
  rationale: El wayyiqtol marca la siguiente acción en la narración; en español, "vinieron" comunica el avance secuencial sin añadir causalidad explícita. Se evita un calco rígido de "so" o "then" porque el castellano narrativo natural ya expresa esa progresión.
- source_word: עַבְדֵי
  english_pob_choice: servants of
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - funcionarios
  lexicon: HALOT
  rationale: El contexto de corte real permite "siervos" o "servidores". Se elige "siervos" porque conserva mejor el valor léxico básico de עבד sin forzar un término administrativo más interpretativo como "funcionarios".
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: En español, el sustantivo en aposición "rey Ezequías" es idiomático y fiel al constructo, equivalente al inglés POB "King Hezekiah".
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: uso estándar onomástico
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, manteniendo la identificabilidad bíblica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección a una persona se expresa naturalmente con "a" en español.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Yeshayahu
  lexicon: uso estándar onomástico
  rationale: Se conserva la forma española establecida del nombre profético.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con sintaxis natural en español.
  - No se sustituyó el valor léxico de עבד por "funcionarios" para no interpretar de más el término.
  - La aposición "rey Ezequías" sigue la práctica española idiomática para títulos reales.
