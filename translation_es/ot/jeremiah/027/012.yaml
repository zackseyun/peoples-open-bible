  to: 'Y a Sedequías, rey de Judá, hablé todas estas palabras[a], diciendo: «Traigan sus cuellos bajo el yugo del rey de Babilonia, sírvanle a él y a su pueblo, y vivan[b]».'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y corrección del español: ''sirvan a él'' se cambió por ''sírvanle a él'', que mantiene el referente explícito y lee con más fluidez. También se ancló correctamente la nota [b] en ''vivan'', ya que en el borrador la nota existía pero no aparecía en el texto. El resto del versículo conserva fielmente el sentido y las decisiones léxicas del original y del POB inglés.'
