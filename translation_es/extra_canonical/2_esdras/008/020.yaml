lexical_decisions:
- source_word: domine
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: vocativo reverencial
  rationale: En este vocativo dirigido a Dios, «Señor» reproduce con naturalidad el tratamiento reverente del latín y del inglés POB sin introducir un matiz ajeno. «Dueño» o «Soberano» serían posibles, pero menos litúrgicos y menos fieles al registro de la oración.
- source_word: inhabitas seculum
  english_pob_choice: you who inhabit eternity
  chosen_spanish: tú que habitas la eternidad
  alternatives_spanish:
  - tú que moras en la eternidad
  - tú que habitas para siempre
  lexicon: habitar + eternidad
  rationale: «Habitas la eternidad» sigue de cerca la imagen del original y conserva el valor durativo y trascendente de seculum en este contexto. «Moras en la eternidad» es viable, pero «habitas» mantiene mejor la correspondencia formal y la solemnidad.
- source_word: oculi elati
  english_pob_choice: whose eyes are exalted
  chosen_spanish: cuyos ojos están elevados
  alternatives_spanish:
  - cuyos ojos son altos
  - cuyos ojos son exaltados
  lexicon: alto/elevado
  rationale: El latín presenta una cualidad de altura/exaltación aplicada a los ojos; «están elevados» conserva esa imagen física y evita una paráfrasis psicológica. «Exaltados» sería posible, pero en español sugiere más una valoración abstracta que la elevación espacial del texto.
- source_word: superiora in aerem
  english_pob_choice: whose heights are in the air
  chosen_spanish: cuyas alturas están en el aire
  alternatives_spanish:
  - cuyas regiones altas están en el aire
  - cuyas cámaras altas están en el aire
  lexicon: superiora
  rationale: Se mantiene «alturas» para seguir la revisión más reciente del inglés POB y no imponer una interpretación demasiado específica. En la tradición textual señalada por el audit trail, el sentido apunta a un referente celestial/alto; «alturas» permite esa amplitud sin introducir «cámaras» como explicación interpretativa en el texto principal.
theological_decisions:
- issue: Descripción de la morada divina como trascendente y celestial
  english_pob_reading: you who inhabit eternity ... whose heights are in the air
  chosen_spanish_reading: tú que habitas la eternidad ... cuyas alturas están en el aire
  alternative_spanish_readings:
  - tú que habitas la eternidad ... cuyas cámaras están en el aire
  - tú que vives en la eternidad ... cuyos altos aposentos están en el aire
  rationale: 'La frase conserva la tensión entre trascendencia temporal («eternidad») y localización cósmica («alturas ... en el aire») sin resolverla de modo interpretativo. El audit trail muestra una corrección importante: no se trata de que Dios ‘mire’ las alturas, sino de que estas le pertenecen como ámbito de su morada.'
  doctrine_reference: Trascendencia divina; lenguaje de la morada celestial
translation_notes:
  revision_awareness: El inglés POB fue revisado desde una lectura errónea de ‘superiora’ como objeto del mirar («look upon») a la lectura más literal y menos interpretativa «heights in the air». La versión española sigue esa corrección y evita introducir ‘mirar’ o ‘contemplar’ en el texto principal. Además, respeta que el pasaje está transmitido de forma incompleta en el testimonio fuente.
  spanish_consistency_notes:
  - Se usó «Señor» como vocativo divino, coherente con el registro reverencial del pasaje.
  - Se evitó «SEÑOR» como sustituto editorial del nombre divino, porque el texto fuente aquí es un vocativo latino de oración y el audit trail en inglés no impone esa convención.
  - «Alturas» se eligió para mantener la ambigüedad controlada de superiora y no cerrar prematuramente el sentido en una interpretación más específica.
