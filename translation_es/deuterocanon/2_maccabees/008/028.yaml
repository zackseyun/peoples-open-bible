translation:
  language: es
  text: Pero después del sábado, habiendo distribuido parte del botín[a] a los oprimidos, a las viudas y a los huérfanos, repartieron el resto entre ellos y sus hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'a los maltratados' o 'a los afligidos'. El participio griego abarca de manera amplia a personas que habían sufrido dureza, abuso o daño.
    reason: lexical_alternative
  - marker: b
    text: '''Botín'' también puede traducirse ''despojos'' o ''presa''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ τὸ σάββατον
  english_pob_choice: But after the Sabbath
  chosen_spanish: Pero después del sábado
  alternatives_spanish:
  - Y después del sábado
  - Ahora bien, después del sábado
  lexicon: LSJ
  rationale: μετά con acusativo indica tiempo posterior; δέ introduce una leve transición discursiva. En español, 'Pero' conserva el giro del discurso sin forzar una oposición fuerte, y 'sábado' reproduce con naturalidad el término del texto fuente.
- source_word: τοῖς ἠκισμένοις
  english_pob_choice: to those who had been oppressed
  chosen_spanish: a los oprimidos
  alternatives_spanish:
  - a los afligidos
  - a los maltratados
  - a los que habían sufrido violencia
  lexicon: LSJ
  rationale: El participio perfecto/pasivo describe personas que han sufrido trato duro o abuso. 'Oprimidos' es una opción breve y fuerte que conserva la amplitud social del término sin restringirlo a una categoría técnica; se mantiene la tensión lexical amplia del griego.
- source_word: ταῖς χήραις
  english_pob_choice: the widows
  chosen_spanish: a las viudas
  alternatives_spanish:
  - a las mujeres viudas
  lexicon: LSJ
  rationale: χήραις corresponde de manera directa a 'viudas'; es la categoría social explícita del texto y debe mantenerse sin explicación añadida.
- source_word: τοῖς ὀρφανοῖς
  english_pob_choice: the orphans
  chosen_spanish: a los huérfanos
  alternatives_spanish:
  - a los niños huérfanos
  - a los hijos sin padre
  lexicon: LSJ
  rationale: ὀρφανοῖς designa a los huérfanos. 'Huérfanos' conserva la categoría bíblica familiar y social sin sobreespecificar el matiz de 'sin padre'.
- source_word: μερίσαντες ἀπὸ τῶν σκύλων
  english_pob_choice: having distributed some of the spoils
  chosen_spanish: habiendo distribuido parte del botín
  alternatives_spanish:
  - habiendo repartido parte del botín
  - habiendo asignado una porción del botín
  - habiendo repartido algo del botín
  lexicon: LSJ
  rationale: μερίσαντες significa 'habiendo dividido/repartido'; σκῦλα en contexto militar es 'botín', 'despojos' o 'presa'. ἀπό indica que se tomó una porción de ese botín para los grupos vulnerables; 'parte del botín' expresa bien esa relación sin mecanicismo.
- source_word: τὰ λοιπὰ
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - lo demás
  - la parte restante
  lexicon: LSJ
  rationale: Se refiere a lo que quedó del botín después de la primera distribución. 'El resto' es natural y exacto en español.
- source_word: αὐτοὶ καὶ τὰ παιδία
  english_pob_choice: among themselves and their children
  chosen_spanish: ellos y sus hijos
  alternatives_spanish:
  - entre sí y sus hijos
  - ellos mismos y sus hijos
  - ellos y los niños
  lexicon: LSJ
  rationale: La frase identifica a los receptores de lo restante. En español, 'ellos y sus hijos' comunica de forma clara y fiel que el reparto incluyó a los combatientes y a sus dependientes.
- source_word: διεμερίσαντο
  english_pob_choice: they divided
  chosen_spanish: repartieron
  alternatives_spanish:
  - dividieron
  - se repartieron
  - lo distribuyeron
  lexicon: LSJ
  rationale: El verbo medio de διαμερίζω expresa el reparto entre destinatarios. 'Repartieron' es idiomático en español y conserva la idea de distribución sin añadir sujetos o matices ajenos.
theological_decisions:
- issue: Distribución ética del botín a grupos vulnerables antes del reparto final
  english_pob_reading: The verse is rendered to show that the fighters first set aside a portion for the afflicted, widows, and orphans, then divided the remainder among themselves and their children.
  chosen_spanish_reading: El texto deja ver que primero apartaron una porción del botín para los oprimidos, las viudas y los huérfanos, y después repartieron lo restante entre ellos y sus hijos.
  alternative_spanish_readings:
  - Podría traducirse de manera más formal como 'habiendo repartido del botín', sin explicitar que primero se separó una porción.
  - También podría decirse 'a los maltratados', pero 'oprimidos' conserva mejor la amplitud social del término.
  rationale: La secuencia griega y el ἀπό con τῶν σκύλων indican claramente una porción tomada del botín para estos grupos antes del reparto restante. La formulación española conserva esa tensión textual y el énfasis social sin moralizar ni amplificar más allá de la evidencia.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: He seguido la última revisión inglesa, que prefirió 'oppressed' para ἠκισμένοις y mantuvo la estructura de distribución del botín con una primera porción para grupos vulnerables y el resto para los combatientes y sus hijos. La versión española conserva esa decisión lexical y la hace natural en español.
  spanish_consistency_notes:
  - Se mantiene 'botín' para σκῦλα, en coherencia con el campo semántico militar del pasaje.
  - Se usa 'huérfanos' como categoría social bíblica estándar, sin cambiarla por una paráfrasis más larga.
  - '''Oprimidos'' preserva la amplitud del griego ἠκισμένοις y evita estrechar indebidamente el sentido.'
  - El tono general es formal y claro, apto para lectura pública y coherente con una traducción de equivalencia óptima.
