revisions:
- from: Los humildes volverán a regocijarse en Yahvé[a], y los pobres de entre los hombres[b] se gozarán en el Santo de Israel.
  to: Los humildes volverán a regocijarse en Yahvé[a], y los pobres entre la humanidad[b] se gozarán en el Santo de Israel.
  rationale: Se ajusta únicamente la expresión de אָדָם para evitar una lectura masculina-específica y un calco poco natural. «Los pobres entre la humanidad» preserva el sentido genérico humano documentado en el audit trail y mejora la claridad del español sin alterar el contenido. Se mantienen «Yahvé» y «el Santo de Israel» conforme a la terminología del proyecto.
