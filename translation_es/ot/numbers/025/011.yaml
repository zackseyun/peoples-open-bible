  text: פִּֽינְחָ֨ס בֶּן אֶלְעָזָ֜ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֗ן הֵשִׁ֤יב אֶת חֲמָתִ/י֙ מֵ/עַ֣ל בְּנֵֽי יִשְׂרָאֵ֔ל בְּ/קַנְא֥/וֹ אֶת קִנְאָתִ֖/י בְּ/תוֹכָ֑/ם וְ/לֹא כִלִּ֥יתִי אֶת בְּנֵֽי יִשְׂרָאֵ֖ל בְּ/קִנְאָתִֽ/י־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/011.yaml
  text: Phinehas son of Eleazar[a], son of Aaron the priest, has turned back my wrath from the sons of Israel by being zealous with my zeal among them, so that I did not consume the sons of Israel in my zeal.
  footnotes:
