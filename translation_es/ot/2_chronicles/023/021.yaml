translation:
  language: es
  text: Y todo el pueblo de la tierra se alegraron[a], y la ciudad estuvo tranquila. Y mataron a Atalía con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se regocijaron». El hebreo permite una coordinación simple; el texto principal conserva la lectura secuencial sin convertirla en causalidad explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de alegría
  lexicon: HALOT
  rationale: שׂמח expresa alegría o gozo; en español, «se alegró» comunica bien el hecho narrativo y evita una solemnidad excesiva, manteniendo el sentido celebrativo del contexto.
- source_word: כָל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo del país
  - toda la gente de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se conserva casi literalmente para respetar el valor técnico de עַם הָאָרֶץ y no sustituirlo por una paráfrasis más interpretativa.
- source_word: וְהָעִיר
  english_pob_choice: and the city
  chosen_spanish: y la ciudad
  alternatives_spanish:
  - y la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la ciudad»; se evita precisar «Jerusalén» en el texto principal porque eso no está explícito aquí.
- source_word: שָׁקָטָה
  english_pob_choice: was quiet
  chosen_spanish: estuvo tranquila
  alternatives_spanish:
  - estuvo en paz
  - quedó en silencio
  - permaneció quieta
  lexicon: HALOT
  rationale: שׁקט denota quietud, calma o cese de disturbio. «Estuvo tranquila» comunica esa calma sin sobrecargarla con una interpretación más fuerte como «en paz».
- source_word: וְאֶת עֲתַלְיָהוּ הֵמִיתוּ
  english_pob_choice: And they put Athaliah to death
  chosen_spanish: Y mataron a Atalía
  alternatives_spanish:
  - Y dieron muerte a Atalía
  - Y la pusieron a muerte
  lexicon: HALOT
  rationale: הֵמִיתוּ (causar la muerte) puede traducirse de forma directa como «mataron»; en español suena más natural que una perífrasis muy pesada y conserva el sentido de ejecución.
- source_word: בֶחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: La construcción instrumental con ב + חֶרֶב admite «con la espada» en español claro y fiel. «A espada» también es posible, pero «con la espada» mantiene mejor el valor instrumental explícito.
theological_decisions:
- issue: Relación entre la alegría del pueblo y la muerte de Atalía
  english_pob_reading: The Hebrew conjunction can be read as simple coordination; the main text renders it as explanatory in context, since the city's quietness follows her death.
  chosen_spanish_reading: 'Se mantiene la coordinación simple: primero la alegría del pueblo, luego la calma de la ciudad y después la muerte de Atalía.'
  alternative_spanish_readings:
  - Se alegró el pueblo, porque la ciudad quedó tranquila.
  - Se alegró el pueblo, pues la ciudad quedó tranquila.
  rationale: El hebreo usa una secuencia coordinada con וְ; la versión española evita introducir una causalidad no marcada explícitamente y preserva la relación narrativa sin explicitar más de lo que el texto dice.
  doctrine_reference: Narrative sequencing in Hebrew conjunction usage; no doctrinal issue
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente reemplazó una causalidad implícita por coordinación simple. La versión española sigue esa misma decisión: mantiene la secuencia narrativa sin introducir «porque» o «pues» en el texto principal, y conserva el orden del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Atalía» como forma española estándar del nombre propio.
  - Se usa «la tierra» para reflejar el idiomático עַם הָאָרֶץ sin sustituirlo por «país», que sería más interpretativo.
  - La puntuación separa las tres proposiciones de manera clara y refleja la coordinación del hebreo.
