translation:
  language: es
  text: Pero la madre era especialmente admirable y digna[a] de honorable memoria; al ver perecer a sus siete hijos en un solo día, lo soportó con valentía por las esperanzas que tenía puestas en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «digna de buen recuerdo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπεραγόντως
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - sumamente
  - sobremanera
  - en gran manera
  lexicon: LSJ
  rationale: La partícula intensifica la alabanza que sigue. «Especialmente» conserva ese valor enfático de manera natural en español sin sobrerreformulación.
- source_word: ἀγαθὴ
  english_pob_choice: admirable
  chosen_spanish: admirable
  alternatives_spanish:
  - buena
  - noble
  lexicon: LSJ
  rationale: Aunque literalmente significa «buena», en este elogio moral y heroico «admirable» transmite mejor la valoración del pasaje y evita una repetición plana.
- source_word: μνήμης ἀγαθῆς ἀξία
  english_pob_choice: worthy of honorable memory
  chosen_spanish: digna de memoria honorable
  alternatives_spanish:
  - digna de buen recuerdo
  - digna de bendita memoria
  - merecedora de honorable recuerdo
  lexicon: LSJ
  rationale: La expresión señala que merece ser recordada favorablemente. «Digna de memoria honorable» conserva el sentido memorial y la cualidad evaluativa sin introducir una fórmula más eclesiástica de la que exige el griego.
- source_word: ἀπολλυμένους
  english_pob_choice: being destroyed
  chosen_spanish: perecer
  alternatives_spanish:
  - ser destruidos
  - ser muertos
  - desaparecer
  lexicon: LSJ
  rationale: 'El participio griego es amplio: puede abarcar ruina, destrucción o muerte violenta. «Perecer» mantiene esa amplitud y encaja bien en el contexto del martirio.'
- source_word: συνορῶσα
  english_pob_choice: saw
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - al observar
  - al presenciar
  lexicon: LSJ
  rationale: El participio indica que ella contempla la escena completa. «Al ver» es idiomático en español y preserva el valor de testigo ocular.
- source_word: μιᾷ τοῦ καιροῦ ἡμέρᾳ
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un mismo día
  - en una sola jornada
  lexicon: LSJ
  rationale: La frase subraya la concentración de la tragedia en un único día. «En un solo día» reproduce bien ese énfasis temporal.
- source_word: εὐψύχως
  english_pob_choice: courageously
  chosen_spanish: con valentía
  alternatives_spanish:
  - con coraje
  - con buen ánimo
  - con entereza
  lexicon: LSJ
  rationale: El adverbio expresa firmeza de ánimo ante el sufrimiento. «Con valentía» es claro, digno y suficientemente cercano al matiz del griego.
- source_word: ἔφερεν
  english_pob_choice: bore it
  chosen_spanish: lo soportó
  alternatives_spanish:
  - lo llevó
  - lo padeció
  - lo resistió
  lexicon: LSJ
  rationale: El verbo significa llevar/cargar/soportar una carga o prueba. «Lo soportó» expresa con naturalidad la idea de endurance en español.
- source_word: διὰ τὰς ἐπὶ Κύριον ἐλπίδας
  english_pob_choice: because of her hopes in the Lord
  chosen_spanish: por sus esperanzas en Yahvé
  alternatives_spanish:
  - a causa de sus esperanzas en Yahvé
  - por la esperanza que tenía en Yahvé
  - debido a sus esperanzas dirigidas a Yahvé
  lexicon: LSJ
  rationale: Se conserva el plural «esperanzas» como en el griego, porque el texto no usa una abstracción singular. Se traduce Κύριον como «Yahvé» conforme al estándar del proyecto para el nombre divino, y la preposición expresa el fundamento causal de su resistencia.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: LSJ
  rationale: Aunque la cita griega usa κύριος, en este proyecto el referente divino se vierte como «Yahvé» en el texto principal. Aquí la esperanza está dirigida a Dios, por lo que no se usa una convención de máscara litúrgica.
theological_decisions:
- issue: Nombre divino en κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El contexto atribuye la esperanza de la madre al Dios de Israel. Conforme a la política del proyecto, cuando κύριος remite al nombre divino, el texto principal usa «Yahvé» para no ocultar el referente del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / κύριος'
- issue: Valor del plural ἐλπίδας
  english_pob_reading: because of her hopes in the Lord
  chosen_spanish_reading: por sus esperanzas en Yahvé
  alternative_spanish_readings:
  - por su esperanza en Yahvé
  - por la esperanza que tenía en Yahvé
  rationale: Se preserva el plural para no aplanar la forma del griego. Teológicamente, el plural permite dejar abierta la gama de expectativas concretas sostenidas por su confianza en Dios, sin forzar una sola noción abstracta.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa en lo esencial: mantiene el elogio inicial, el participio de observación, el verbo de resistencia y el fundamento causal en las esperanzas. Se ajusta el referente de κύριος al criterio español del proyecto («Yahvé») y se conserva la amplitud semántica de ἀπολλυμένους con «perecer».'
  spanish_consistency_notes:
  - Se mantiene el tono solemne y narrativo, sin castellanizar mecánicamente la sintaxis griega.
  - «Yahvé» se usa para el referente divino según la terminología del proyecto.
  - «Esperanzas» conserva el plural del griego, evitando singularizarlo.
  - «Memoria honorable» queda en un registro sobrio y bíblico, sin recurrir a fórmulas devocionales no requeridas por el texto.
