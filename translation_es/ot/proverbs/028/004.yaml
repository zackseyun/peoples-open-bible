translation:
  language: es
  text: Los que abandonan la ley[b] alaban[a] al malvado, pero los que guardan la ley contienden con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Alaban» también puede entenderse como «aprueban» o «celebran»; el hebreo expresa elogio o respaldo al malvado.
    reason: lexical_alternative
  - marker: b
    text: «La ley» puede verterse también como «instrucción» o «enseñanza», especialmente en contextos sapienciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹזְבֵי
  english_pob_choice: those who forsake
  chosen_spanish: los que abandonan
  alternatives_spanish:
  - los que dejan
  - los que forsacan
  lexicon: HALOT
  rationale: El participio plural expresa personas caracterizadas por apartarse de la Torah. «Abandonan» conserva la fuerza moral de *forsake* sin sonar anticuado, y encaja bien en un proverbio.
- source_word: תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En Proverbios, תּוֹרָה puede abarcar instrucción sapiencial y normativa. «La ley» mantiene la concisión y la fuerza normativa que el POB inglés quiso conservar, sin cerrar del todo el sentido más amplio.
- source_word: יְהַלְלוּ
  english_pob_choice: praise
  chosen_spanish: alaban
  alternatives_spanish:
  - aprueban
  - celebran
  lexicon: HALOT
  rationale: El piel de הלל aquí expresa elogio/aprobación. «Alaban» reproduce directamente ese valor y deja intacta la ironía del verso.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - los malvados
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona de manera representativa y proverbial. En español, el singular «el malvado» conserva esa forma proverbial y permite reflejar el cambio al plural del pronombre final sin perder naturalidad.
- source_word: שֹׁמְרֵי
  english_pob_choice: those who keep
  chosen_spanish: los que guardan
  alternatives_spanish:
  - los que observan
  - los que preservan
  lexicon: HALOT
  rationale: «Guardar» es la correspondencia más natural con ley/mandamiento en español bíblico y mantiene la idea de observar fielmente, no solo de recordar.
- source_word: יִתְגָּרוּ
  english_pob_choice: contend
  chosen_spanish: contendrán
  alternatives_spanish:
  - se enfrentarán
  - discutirán
  - se opondrán
  lexicon: HALOT
  rationale: El hitpael de גרה puede expresar entrar en disputa o provocar contienda. «Contender» reproduce mejor esa fricción verbal/adversarial que un simple «oponerse», y conserva el paralelismo con la primera cola.
- source_word: בָם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - contra ellos
  lexicon: HALOT
  rationale: La preposición puede leerse de forma relacional/adversarial. «Con ellos» sigue la opción inglesa idiomática y deja abierta la idea de contienda activa, sin añadir explícitamente una preposición interpretativa que el hebreo no exige.
theological_decisions:
- issue: Valor de תּוֹרָה en un proverbio sapiencial
  english_pob_reading: the law; may also be instruction or teaching, especially in wisdom contexts.
  chosen_spanish_reading: la ley, con resonancia posible de instrucción o enseñanza.
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: Mantener «la ley» respeta la decisión auditada del POB y la densidad normativa del término. A la vez, en Proverbios el término puede tener un campo más amplio; esa amplitud queda implícita sin diluir la lectura principal.
  doctrine_reference: Sabbath/Instruction and Torah in wisdom literature; cf. Proverbios 1:8; 6:20
- issue: Antecedente de «ellos» en la segunda cola
  english_pob_reading: them refers to the wicked/law-forsakers of the first colon, especially the wicked just mentioned.
  chosen_spanish_reading: «ellos» retoma al malvado del primer miembro en sentido de clase representativa, es decir, a los que abandonan la ley.
  alternative_spanish_readings:
  - retoma a los malvados en general
  - retoma específicamente a los que abandonan la ley
  rationale: El hebreo pasa de un singular representativo a un plural pronominal. En español, el singular «el malvado» y el plural «ellos» reproducen esa tensión sin resolverla artificialmente.
  doctrine_reference: Hebrew representative singular and collective reference; cf. Proverbs 28:1-28 style of proverb compression
translation_notes:
  revision_awareness: 'Coincide con el control reciente: no se detectaron cambios necesarios respecto al último pase auditado; se mantiene la solución óptima ya aprobada.'
  spanish_consistency_notes:
  - Se conserva el paralelo proverbio/proverbio con dos miembros balanceados.
  - Se mantiene «la ley» por coherencia con el POB en español y con la nota semántica de תּוֹרָה.
  - Se usa el singular representativo «el malvado» para reflejar el hebreo, pero el pronombre plural «ellos» preserva el giro del texto fuente.
  - «Contendrán con ellos» reproduce la idea de contienda sin convertirla en una oposición demasiado fuerte o específica.
