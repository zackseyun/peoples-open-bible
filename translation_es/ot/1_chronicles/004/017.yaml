review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo y del POB inglés: encabezado genealógico colectivo, lista de nombres, sujeto femenino no identificado en «y ella concibió», y «padre de Eshtemoa» con nota alternativa. Sin embargo, hay una inconsistencia importante en los nombres: el texto principal dice «Ezra», pero la nota a y el hebreo auditado requieren «Ezrah». También conviene alinear mejor la transliteración de שַׁמַּי con la forma auditada «Shammai» en una forma española más fiel, en vez de «Samai», que pierde la consonante geminada/aspirada representada en la tradición de transliteración.'
  spanish_quality_summary: El español es claro y legible. La sintaxis funciona bien para una genealogía. No obstante, la mezcla «Ezra / Ezrah» dentro del mismo registro crea confusión, y «Samai» suena más como adaptación libre que como transliteración controlada. «Padre de Eshtemoa» sin artículo es aceptable en español genealógico, pero «el padre de Eshtemoa» refleja mejor el inglés auditado y su valor nominal.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. En nombres propios, el borrador se aparta innecesariamente del rastro auditado al usar «Ezra» por «Ezrah» y al adaptar «Shammai» como «Samai». Conviene conservar transliteraciones más auditables: «Ezrah», «Jéter», «Mered», «Éfer», «Jalón», «Miriam», «Samái», «Isbáh», «Eshtemoa».'
  issues:
  - severity: high
    issue: Inconsistencia entre «Ezra» en el texto principal y «Ezrah» en la nota y en la evidencia fuente.
    rationale: El hebreo auditado tiene עֶזְרָה (Ezrah). Usar «Ezra» en el texto pero «Ezrah» en la nota rompe la trazabilidad y puede sugerir otro nombre conocido.
  - severity: medium
    issue: «Samai» se aleja innecesariamente de שַׁמַּי / Shammai.
    rationale: La adaptación elimina la huella de la consonante inicial sh y de la doble m. Una forma como «Samái» conserva mejor la estructura del nombre en español sin introducir grafía inglesa.
  - severity: low
    issue: Falta el artículo en «padre de Eshtemoa».
    rationale: El hebreo lleva la construcción nominal «padre de...», y el POB inglés traduce «the father of Eshtemoa». En español, «el padre de Eshtemoa» suena más completo y formal en este contexto.
  revised_spanish_text: 'Los hijos de Ezrah: Jéter[a], Mered, Éfer y Jalón; y ella concibió a Miriam, Samái e Isbáh[b][c], el padre de Eshtemoa.'
