  language: en
  yaml_path: translation/ot/numbers/029/013.yaml
  text: 'And you shall present a burnt offering[a], an offering by fire, a pleasing aroma to Yahweh: thirteen bulls from the herd, two rams, and fourteen male lambs a year old; they shall be without blemish.'
  footnotes:
