lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En listas censales y genealógicas de Esdras, בְּנֵי introduce con frecuencia un grupo familiar o clan. En español, «los hijos de» conserva con claridad esa función corporativa sin sonar tan masculino o estrechamente biológico como una traducción literal rígida.
- source_word: פַשְׁחוּר
  english_pob_choice: Pashhur
  chosen_spanish: Pasjur
  alternatives_spanish:
  - Pashhur
  - Fasjur
  lexicon: HALOT
  rationale: Se translitera el nombre propio; «Pasjur» adapta la grafía al español manteniendo la identificación del nombre hebreo. La forma con «s»/«sh» del inglés se normaliza a la ortografía española sin alterar el referente.
- source_word: אֶלֶף מָאתַיִם אַרְבָּעִים וְשִׁבְעָה
  english_pob_choice: 1,247
  chosen_spanish: '1.247'
  alternatives_spanish:
  - mil doscientos cuarenta y siete
  - 1,247
  lexicon: HALOT
  rationale: La secuencia hebrea expresa exactamente 1,247. En un contexto de censo, el número arábigo preserva precisión y legibilidad; en español se usa el punto como separador de millares.
