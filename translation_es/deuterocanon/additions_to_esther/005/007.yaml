translation:
  language: es
  text: Pero consideren si es posible, no tanto a partir de las historias anteriores que hemos transmitido como de las cosas que están a sus pies[a], mientras investigan, discernir cuántas iniquidades[b] han sido llevadas a cabo por la pestilencia[c] de los que gobiernan indignamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de lo que está ante ustedes» para «de las cosas que están a sus pies». El giro griego subraya lo que está inmediatamente al alcance.
    reason: lexical_alternative
  - marker: b
    text: O «impiedades»; el adverbio griego puede destacar irreverencia además de maldad.
    reason: lexical_alternative
  - marker: c
    text: «Pestilencia» probablemente es metafórica aquí, describiendo el carácter destructivo de los gobernantes que ejercen el poder indignamente.
    reason: cultural_note
lexical_decisions:
- source_word: σκοπεῖτε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - miren
  - observen
  - tomen nota
  lexicon: BDAG
  rationale: El imperativo plural pide reflexión atenta, no mera percepción visual; «consideren» conserva el tono exhortativo y argumentativo.
- source_word: ἐξέστιν
  english_pob_choice: it is possible
  chosen_spanish: es posible
  alternatives_spanish:
  - se permite
  - es lícito
  - puede ser
  lexicon: BDAG
  rationale: Aquí expresa posibilidad/capacidad dentro de una pregunta retórica, más que permiso.
- source_word: παλαιοτέρων ... ἱστοριῶν
  english_pob_choice: the earlier histories
  chosen_spanish: las historias anteriores
  alternatives_spanish:
  - los relatos anteriores
  - las crónicas anteriores
  - los registros antiguos
  lexicon: LSJ
  rationale: «Historias» refleja ἱστορίαι como relatos históricos; «anteriores» conserva el comparativo παλαιοτέρων.
- source_word: παρεδώκαμεν
  english_pob_choice: that we have handed down
  chosen_spanish: que hemos transmitido
  alternatives_spanish:
  - que hemos entregado
  - que hemos legado
  - que hemos pasado
  lexicon: BDAG
  rationale: El verbo en primera persona plural indica tradición transmitida; «hemos transmitido» mantiene la idea de tradición recibida y entregada.
- source_word: παρὰ πόδας ὑμᾶς
  english_pob_choice: lying at your feet
  chosen_spanish: que están a sus pies
  alternatives_spanish:
  - que tienen delante
  - que están ante ustedes
  - que les quedan a la vista
  lexicon: LSJ
  rationale: La expresión idiomática conserva la imagen de inmediatez. En español, «a sus pies» mantiene la fuerza literal y comprensible.
- source_word: ἐξητοῦντας
  english_pob_choice: while you investigate
  chosen_spanish: mientras investigan
  alternatives_spanish:
  - mientras examinan
  - mientras buscan
  - mientras indagan
  lexicon: BDAG
  rationale: El participio temporal comunica un proceso activo de búsqueda o examen; «investigan» resulta natural y fiel.
- source_word: ὅσα
  english_pob_choice: how many
  chosen_spanish: cuántas
  alternatives_spanish:
  - cuáles
  - todo lo que
  - cuánto
  lexicon: BDAG
  rationale: El relativo cuantitativo pide una pregunta por cantidad; «cuántas» representa mejor el alcance de ὅσα que un simple «qué».
- source_word: ἀνοσίως
  english_pob_choice: lawlessly
  chosen_spanish: sin ley
  alternatives_spanish:
  - impíamente
  - malvadamente
  - de manera impía
  lexicon: BDAG
  rationale: La idea básica es conducta contraria a lo santo/recto. «Sin ley» preserva el valor fuerte sin restringirlo solo a una impiedad cultual.
- source_word: συντετελεσμένα
  english_pob_choice: have been accomplished
  chosen_spanish: han sido consumadas
  alternatives_spanish:
  - han sido realizadas
  - han sido llevadas a cabo
  - han quedado cumplidas
  lexicon: BDAG
  rationale: El perfecto pasivo señala actos ya completados; «consumadas» refleja el resultado terminado con tono elevado y sobrio.
- source_word: λοιμότητι
  english_pob_choice: the pestilence
  chosen_spanish: la pestilencia
  alternatives_spanish:
  - la plaga
  - la corrupción
  - el azote
  lexicon: LSJ
  rationale: Se conserva la imagen metafórica de enfermedad destructiva aplicada al poder injusto; «pestilencia» mantiene el impacto lexical del griego.
- source_word: τῇ τῶν ἀναξία δυναστευόντων λοιμότητι
  english_pob_choice: by the pestilence of those who rule unworthily
  chosen_spanish: por la pestilencia de los que dominan sin dignidad
  alternatives_spanish:
  - por la pestilencia de los que gobiernan indignamente
  - por la corrupción de los que ejercen el poder sin dignidad
  lexicon: LSJ
  rationale: «Dinastεύω» se entiende como ejercer dominio/poder; «dominan» evita un sesgo demasiado institucional. «Sin dignidad» reproduce ἀναξία adverbialmente y conserva la tensión moral.
theological_decisions:
- issue: Sentido moral-religioso de ἀνοσίως
  english_pob_reading: lawless deeds
  chosen_spanish_reading: obras sin ley
  alternative_spanish_readings:
  - obras impías
  - obras malvadas
  rationale: La expresión griega condena tanto la falta de rectitud como la irreverencia. «Sin ley» preserva el peso ético general sin cerrar el sentido a un matiz exclusivamente cultual.
  doctrine_reference: Tono moral del texto; traducción transparentemente auditable, sin suavizar la reprobación.
- issue: Metáfora de λοιμότης aplicada al poder
  english_pob_reading: pestilence
  chosen_spanish_reading: pestilencia
  alternative_spanish_readings:
  - plaga
  - azote
  - corrupción
  rationale: La imagen no parece literal sino metafórica, describiendo el carácter destructivo del dominio indigno. «Pestilencia» conserva la metáfora sin explicarla en exceso.
  doctrine_reference: Decisión semántica y retórica, no doctrinal dogmática.
- issue: Valor de ἐξέστιν en el contexto
  english_pob_reading: it is possible
  chosen_spanish_reading: es posible
  alternative_spanish_readings:
  - es lícito
  - se permite
  - puede ser
  rationale: El contexto funciona como apelación reflexiva sobre la posibilidad de discernimiento, no como permiso legal. «Es posible» sigue la lectura auditada.
  doctrine_reference: No aplica
