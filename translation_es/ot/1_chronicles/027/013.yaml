translation:
  language: es
  text: 'El décimo, para el décimo mes: Mahrai el netofatita, de los zeraítas[a]; y sobre su división había veinticuatro mil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la familia de Zérah».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲשִׂירִי
  english_pob_choice: The tenth
  chosen_spanish: El décimo
  alternatives_spanish:
  - El décimo jefe
  - La décima división
  lexicon: HALOT
  rationale: En este registro de turnos, el ordinal funciona sustantivado. En español, «El décimo» conserva la brevedad y deja implícito el cargo o turno por el contexto, como en el inglés POB.
- source_word: לַחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: for the tenth month
  chosen_spanish: para el décimo mes
  alternatives_spanish:
  - para el mes décimo
  - para el servicio del décimo mes
  lexicon: HALOT
  rationale: La preposición ל con חודש en este contexto marca asignación temporal de servicio. «Para el décimo mes» suena natural en español y mantiene la idea de turno mensual.
- source_word: מַהְרַי
  english_pob_choice: Mahrai
  chosen_spanish: Mahrai
  alternatives_spanish:
  - Maharai
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado sin adaptación. Se conserva la forma breve usada por la POB inglesa, que refleja la vocalización hebrea del contexto.
- source_word: הַנְּטוֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - el de Netofá
  - el netofateo
  lexicon: HALOT
  rationale: Se trata de un gentilicio/nisbe. «Netofatita» reproduce el valor étnico y geográfico del hebreo con forma natural en español; «el de Netofá» explicita el origen pero es menos compacto.
- source_word: לַזַּרְחִי
  english_pob_choice: of the Zerahites
  chosen_spanish: de los zeraítas
  alternatives_spanish:
  - el zeraíta
  - de la familia de Zérah
  lexicon: HALOT
  rationale: El hebreo puede leerse como afiliación clánica. En español, el plural «los zeraítas» expresa mejor el sentido colectivo que el singular adjetival, siguiendo la opción del POB inglés.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y sobre su división estaban
  - y a cargo de su división estaban
  lexicon: HALOT
  rationale: מַחֲלֻקָה en este capítulo designa el grupo o turno asignado. «Sobre su división había» conserva la relación de supervisión expresada por על sin forzar una construcción demasiado literal.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - veinte y cuatro mil
  lexicon: Numeral cardinal
  rationale: Se usa la forma cardinal normal en español contemporáneo. El hebreo numérico simple queda reflejado sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Valor de לַזַּרְחִי como afiliación clanica singular/plural
  english_pob_reading: of the Zerahites
  chosen_spanish_reading: de los zeraítas
  alternative_spanish_readings:
  - el zeraíta
  - de Zérah
  rationale: Aunque la forma hebrea es singular gentilicia, el contexto genealógico apunta a pertenencia a un clan. El plural español comunica mejor esa afiliación colectiva sin perder el vínculo con Zérah.
  doctrine_reference: Genealogía y filiación tribal en Crónicas; no implica una doctrina particular, sino precisión histórica y textual.
translation_notes:
  revision_awareness: Se mantiene la lectura del POB inglés sin cambios sustanciales respecto del audit trail disponible; no se identificaron revisiones aplicadas en la última pasada. La traducción sigue el texto hebreo y la decisión inglesa de entender el ordinal como designación de turno/función implícita.
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene un estilo sobrio y administrativo acorde con el contexto de listas de turnos en Crónicas.
  - Se evita introducir «Cristo», «Señor» u otra terminología no presente en el hebreo del versículo.
  - «Netofatita» y «zeraítas» se usan como gentilicios estables y coherentes con la nomenclatura histórica del proyecto.
