translation:
  language: es
  text: Aprecia a un amigo y sé fiel[a] con él; pero si revelas sus secretos, ciertamente no irás tras él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «leal». El griego permite un matiz de fidelidad y lealtad en la amistad.'
    reason: alternative_reading
  - marker: b
    text: 'O: «ciertamente no deberías ir tras él». El griego puede oírse como una consecuencia de la traición de confianza o, menos probablemente, como una prohibición.'
    reason: alternative_reading
lexical_decisions:
- source_word: στέργον
  english_pob_choice: Cherish
  chosen_spanish: Ama
  alternatives_spanish:
  - Quiero a
  - Aprecia
  - Guarda cariño a
  lexicon: LSJ
  rationale: στέργω expresa afecto leal y entrañable. En español, 'ama' comunica un apego personal fuerte y natural en estilo sapiencial; 'querer' o 'apreciar' son posibles, pero 'ama' conserva mejor la fuerza relacional sin sonar forzado.
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a tu amigo
  - a un amigo tuyo
  lexicon: LSJ
  rationale: El griego presenta un objeto humano en forma general. 'A un amigo' mantiene el carácter proverbial e indefinido del dicho, como en la versión inglesa auditada.
- source_word: πιστώθητι
  english_pob_choice: be faithful
  chosen_spanish: sé fiel
  alternatives_spanish:
  - muéstrate fiel
  - sé leal
  - muéstrate leal
  lexicon: LSJ
  rationale: '''πιστώθητι'' pide una actitud de fidelidad/probidad en la relación. ''Sé fiel'' es natural y conserva el valor relacional y de confianza del imperativo.'
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - para con él
  - hacia él
  lexicon: LSJ
  rationale: μετά con genitivo significa 'con'. 'Con él' es la equivalencia directa y idiomática en español.
- source_word: ἀποκαλύψῃς
  english_pob_choice: reveal
  chosen_spanish: revelas
  alternatives_spanish:
  - divulgas
  - descubres
  - destapas
  lexicon: LSJ
  rationale: El verbo significa descubrir o poner al descubierto. 'Revelas' es claro y adecuado para confidencias; 'divulgas' es posible, pero más específico y menos directo.
- source_word: τὰ μυστήρια αὐτοῦ
  english_pob_choice: his secrets
  chosen_spanish: sus secretos
  alternatives_spanish:
  - sus confidencias
  - sus asuntos reservados
  - sus misterios
  lexicon: LSJ
  rationale: En este contexto sapiencial, μυστήρια se refiere a asuntos confidenciales, no a 'misterios' religiosos. 'Sus secretos' reproduce bien la referencia interpersonal y mantiene la lectura de la POB inglesa.
- source_word: οὐ μὴ
  english_pob_choice: certainly not
  chosen_spanish: ciertamente no
  alternatives_spanish:
  - de ningún modo
  - sin duda no
  - en absoluto no
  lexicon: Greek grammar
  rationale: οὐ μή con subjuntivo expresa negación enfática. 'Ciertamente no' preserva el énfasis fuerte sin volver la frase antinatural.
- source_word: καταδιώξῃς ὀπίσω αὐτοῦ
  english_pob_choice: pursue after him
  chosen_spanish: lo perseguirás después de eso
  alternatives_spanish:
  - irás tras él
  - lo buscarás de nuevo
  - lo seguirás persiguiendo
  lexicon: LSJ
  rationale: La imagen literal es 'perseguir tras él', pero en español 'perseguirás después de eso' transmite la consecuencia de una amistad quebrada sin calcar torpemente la preposición repetida. Se conserva la idea de ir tras él y la imposibilidad implícita de recuperar la relación.
theological_decisions:
- issue: 'Sentido final de la cláusula tras revelar secretos: consecuencia irreversible o prohibición directa'
  english_pob_reading: 'The line is rendered as a consequence: after revealing a friend''s secrets, one will certainly not be able to pursue after him successfully.'
  chosen_spanish_reading: 'La cláusula final se entiende como consecuencia: tras revelar los secretos de un amigo, ya no se lo podrá perseguir de manera eficaz para recuperar la relación.'
  alternative_spanish_readings:
  - No persigas tras él
  - ciertamente no debes ir tras él
  - no lo seguirás persiguiendo
  rationale: El griego con οὐ μή + subjuntivo puede leerse como negación enfática de resultado, y el contexto sapiencial favorece un efecto proverbial de ruptura irreversible. La redacción española evita resolver en exceso la tensión entre consecuencia y prohibición, pero deja percibir el matiz de imposibilidad relacional.
  doctrine_reference: Preservar la tensión interpretativa documentada en la fuente; no resolverla más allá del texto
translation_notes:
  revision_awareness: He tenido en cuenta la lectura inglesa auditada, su nota sobre la posible fuerza de la cláusula final y la revisión posterior que ajustó 'with him/to him'. La versión española sigue el griego directamente y conserva la tensión entre consecuencia y prohibición sin armonizarla de forma excesiva.
  spanish_consistency_notes:
  - Se usa 'Dios'/'Yahvé' según corresponda en otros pasajes; aquí no aplica.
  - Se mantiene 'sus secretos' para μυστήρια por el contexto interpersonal, no 'misterios'.
  - '''Sé fiel'' refleja la fidelidad relacional sin introducir terminología eclesiástica ajena al proverbio.'
  - La cláusula final evita 'buscar' o 'seguir' de modo demasiado interpretativo y conserva la imagen de perseguir tras alguien.
