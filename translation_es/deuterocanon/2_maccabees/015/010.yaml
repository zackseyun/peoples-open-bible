translation:
  language: es
  text: Y después de haberles avivado el ánimo[a], les exhortó[b], al mismo tiempo señalando la impiedad de las naciones y la violación de los juramentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haberles despertado el ánimo».
    reason: lexical_alternative
  - marker: b
    text: O «les mandó» / «les ordenó».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς θυμοῖς διεγείρας
  english_pob_choice: after stirring up their spirits
  chosen_spanish: después de haberles excitado el ánimo
  alternatives_spanish:
  - después de haberles despertado el ánimo
  - después de haberles avivado el espíritu
  - después de haberles incitado el ánimo
  lexicon: LSJ
  rationale: θυμός puede referirse al ánimo, ímpetu, valor o ira. En este contexto militar de exhortación, la idea principal es reanimar el impulso interior antes de dar la orden; «excitar el ánimo» conserva ese sentido sin reducirlo a ira ni sonar demasiado moderno.
- source_word: παρήγγειλεν
  english_pob_choice: he urged them on
  chosen_spanish: les exhortó
  alternatives_spanish:
  - les mandó
  - les ordenó
  - les instó
  lexicon: LSJ
  rationale: El verbo puede ser mandamiento u orden, pero aquí el tono es exhortativo dentro de un discurso de aliento militar. «Exhortó» preserva la fuerza directiva sin volverlo meramente administrativo.
- source_word: ἅμα παρειδείκνυς
  english_pob_choice: at the same time pointing out
  chosen_spanish: al mismo tiempo mostrando
  alternatives_spanish:
  - al mismo tiempo señalando
  - mientras mostraba también
  - a la vez exponiendo
  lexicon: LSJ
  rationale: El participio expresa acción simultánea acompañando la exhortación. «Mostrando» es natural en español y mantiene el carácter explicativo del gesto o discurso.
- source_word: τὴν τῶν ἐθνῶν ἀθεσίαν
  english_pob_choice: the godlessness of the nations
  chosen_spanish: la impiedad de las naciones
  alternatives_spanish:
  - la irreligión de las naciones
  - la impiedad de los gentiles
  - la falta de temor de Dios de las naciones
  lexicon: LSJ
  rationale: ἀθεσία señala impiedad o irreligión. «Impiedad» conserva el juicio religioso-moral del texto. «Naciones» sigue la decisión del POB inglés de no cargar el término con el matiz técnico posterior de «gentiles».
- source_word: τὴν τῶν ὅρκων παράβασιν
  english_pob_choice: the violation of oaths
  chosen_spanish: la violación de los juramentos
  alternatives_spanish:
  - la quebrantación de los juramentos
  - la transgresión de los juramentos
  - la violación de los votos
  lexicon: LSJ
  rationale: παράβασις es violación o transgresión. «Juramentos» traduce con claridad ὅρκων en español bíblico actual. No se añade posesivo porque el griego no lo explicita.
theological_decisions:
- issue: ἔθνη / ἐθνῶν en contexto histórico
  english_pob_reading: nations rather than Gentiles
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  - pueblos
  rationale: En este pasaje el contraste es étnico-político e histórico, no una categoría confesional posterior. «Naciones» evita importar resonancias tardías y sigue la lectura auditada del POB inglés.
  doctrine_reference: Principio de primacía del texto fuente y de no imponer terminología tradicional ajena al contexto
- issue: Sentido de θυμός en la exhortación
  english_pob_reading: spirits / courage / anger nuance held open
  chosen_spanish_reading: ánimo
  alternative_spanish_readings:
  - coraje
  - valor
  - ira
  rationale: El griego permite matiz de vigor interior, impulso o pasión. «Ánimo» mantiene abierta la tensión entre valor y arrebato sin fijarlo indebidamente en ira.
  doctrine_reference: Respeto por la polisemia léxica del original y por la ambigüedad documentada
- issue: Relación de los juramentos con el sujeto implícito
  english_pob_reading: violation of oaths (no possessive added in final revision)
  chosen_spanish_reading: la violación de los juramentos
  alternative_spanish_readings:
  - la violación de sus juramentos
  - la quebrantación de juramentos
  rationale: La revisión inglesa corrigió el posesivo añadido porque el griego solo dice 'de los juramentos'. El español sigue esa precisión y no introduce posesivo no atestiguado.
  doctrine_reference: Fidelidad al alcance semántico del genitivo griego
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se evita añadir un posesivo en «los juramentos» y se procura una sintaxis más directa para τοῖς θυμοῖς διεγείρας αὐτούς. También se conserva la decisión del POB de traducir ἐθνῶν como «naciones» y no «gentiles».'
  spanish_consistency_notes:
  - Se mantiene el registro histórico y solemne propio de 2 Macabeos.
  - No se usa «SEÑOR» ni otras sustituciones teológicas ajenas al versículo.
  - «Impiedad» se usa para ἀθεσία por coherencia con el juicio moral del texto.
  - Los marcadores de nota a y b aparecen anclados en el texto en los puntos correspondientes.
