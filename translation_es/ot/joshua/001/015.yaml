translation:
  language: es
  text: hasta que Yahvé dé descanso[a] a sus hermanos, como les ha dado descanso a ustedes, y también ellos tomen posesión de la tierra que Yahvé su Dios les da. Entonces volverán a la tierra de su posesión y tomarán posesión de ella, la cual Moisés, siervo de Yahvé, les dio al otro lado del Jordán[b], hacia donde sale el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus compatriotas’; el hebreo dice literalmente ‘sus hermanos’, un plural masculino que aquí se refiere a las demás tribus de Israel.
    reason: lexical_alternative
  - marker: b
    text: O simplemente ‘al oriente’; literalmente, ‘hacia donde sale el sol’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָנִיחַ
  english_pob_choice: gives ... rest
  chosen_spanish: dé descanso
  alternatives_spanish:
  - haga descansar
  - les conceda reposo
  - les dé alivio
  lexicon: HALOT
  rationale: El hiphil de נוח aquí expresa conceder descanso o cese de conflicto. En español, 'dé descanso' mantiene la idea de reposo otorgado por Dios y suena natural en este contexto militar y de asentamiento.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos y hermanas
  - a sus compatriotas
  - a sus hermanos, es decir, los otros israelitas
  lexicon: HALOT
  rationale: El hebreo es masculino plural y el POB inglés preserva esa forma. En español, 'hermanos' reproduce el término de parentesco/solidaridad sin neutralizarlo; el contexto muestra que se trata de las otras tribus de Israel.
- source_word: כָּכֶם
  english_pob_choice: as he has given you
  chosen_spanish: como lo ha dado a ustedes
  alternatives_spanish:
  - como les ha dado a ustedes
  - como a ustedes
  - así como se los ha dado
  lexicon: HALOT
  rationale: 'El hebreo es comparativo y el inglés suplió la elipsis con ''rest''. En español, ''como lo ha dado a ustedes'' conserva la relación comparativa con un referente implícito ya claro en el contexto: el descanso concedido a ustedes.'
- source_word: וְיָרְשׁוּ
  english_pob_choice: take possession of
  chosen_spanish: tomen posesión de
  alternatives_spanish:
  - hereden
  - posean
  - ocupen
  lexicon: HALOT
  rationale: ירשׁ en contexto de conquista y reparto de la tierra comunica la entrada efectiva en posesión. 'Tomar posesión de' preserva tanto el valor activo como el sentido de adjudicación heredada.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  - la tierra prometida
  lexicon: HALOT
  rationale: En Josué, הארץ suele referirse a la tierra prometida o territorio asignado. 'La tierra' es la forma más natural y fiel para este contexto.
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: da
  alternatives_spanish:
  - está dando
  - está entregando
  - les está dando
  lexicon: HALOT
  rationale: El participio hebreo puede expresar acción continua o inminente. En español, el presente simple 'da' funciona bien para un acto divino vigente y evita una construcción excesivamente pesada.
- source_word: וְשַׁבְתֶּם
  english_pob_choice: Then you shall return
  chosen_spanish: Entonces volverán
  alternatives_spanish:
  - y volverán
  - luego volverán
  - entonces ustedes volverán
  lexicon: HALOT
  rationale: La waw-consecutiva marca avance secuencial. 'Entonces volverán' comunica con claridad el orden de eventos sin sobrecargar el castellano.
- source_word: אֶרֶץ יְרֻשַּׁתְכֶם
  english_pob_choice: the land of your possession
  chosen_spanish: la tierra de su posesión
  alternatives_spanish:
  - la tierra de su herencia
  - la tierra que poseen
  - la tierra heredada por ustedes
  lexicon: HALOT
  rationale: La expresión designa la tierra que les corresponde como heredad/posesión. 'Tierra de su posesión' mantiene el vínculo semántico con ירשׁ y funciona con fluidez en español bíblico actual.
- source_word: וִירִשְׁתֶּם אֹתָהּ
  english_pob_choice: take possession of it
  chosen_spanish: tomarán posesión de ella
  alternatives_spanish:
  - la poseerán
  - la heredarán
  - se apoderarán de ella
  lexicon: HALOT
  rationale: Se conserva la misma raíz española 'tomar posesión' para mantener consistencia con ירשׁ y evitar que el lector perciba dos acciones distintas cuando el hebreo repite el mismo campo léxico.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - esclavo de Yahvé
  - servidor de Yahvé
  - siervo del Señor
  lexicon: HALOT
  rationale: Aunque עבד puede significar 'esclavo', en este título honorífico referido a Moisés el español más fiel y natural es 'siervo'. El nombre divino se conserva como Yahvé según la terminología POB.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - en la otra orilla del Jordán
  - tras el Jordán
  lexicon: HALOT
  rationale: Es una expresión geográfica estable. 'Al otro lado del Jordán' es claro y equivale bien a la orientación del narrador sin fijar innecesariamente una perspectiva moderna.
- source_word: מִזְרַח הַשָּׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia donde sale el sol
  alternatives_spanish:
  - hacia el oriente
  - al este
  - hacia la salida del sol
  lexicon: HALOT
  rationale: 'La imagen hebrea es concreta: literalmente ''hacia el nacimiento/salida del sol''. ''Hacia donde sale el sol'' conserva esa imaginería y es plenamente inteligible en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el Tetragrama: ''Yahvé''. Esto preserva el nombre propio del pacto en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa explícitamente el Tetragrama. La línea POB exige traducirlo como nombre propio, no como máscara litúrgica. 'Yahvé' mantiene la referencia al Dios del pacto y la continuidad con la traducción inglesa auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Término de parentesco plural masculino אֲחֵיכֶם
  english_pob_reading: your brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - sus compatriotas
  - los otros israelitas
  rationale: Se preserva la forma masculina plural del hebreo. En este contexto incluye a las otras tribus de Israel, pero la traducción mantiene la referencia literal y deja la ampliación contextual para la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Valor de ירשׁ en el contexto de conquista y herencia
  english_pob_reading: take possession of
  chosen_spanish_reading: tomar posesión de
  alternative_spanish_readings:
  - heredar
  - poseer
  - ocupar
  rationale: El verbo combina adquisición efectiva con herencia asignada. 'Tomar posesión de' retiene esa tensión sin reducirla solo a 'heredar' ni volverlo meramente militar con 'ocupar'.
  doctrine_reference: HALOT/uso contextual de ירשׁ en Josué
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del texto inglés auditado, que añadió claridad sintáctica con comas alrededor de la comparación 'como lo ha dado a ustedes' sin modificar el contenido léxico. Aquí se refleja esa misma claridad mediante la pausa natural en español, manteniendo intactas las decisiones de fondo sobre nombre divino, kinship term y el doble uso de ירשׁ.
  spanish_consistency_notes:
  - 'Se mantiene coherencia terminológica con el proyecto: Yahvé para יְהוָה, tierra para הארץ, siervo para עֶבֶד en título honorífico, y tomar posesión de para ירשׁ.'
  - La comparación 'como lo ha dado a ustedes' conserva el referente implícito del descanso ya mencionado; no se explicita más allá de lo requerido por el español.
  - La nota sobre 'sus hermanos' preserva la tensión entre la forma masculina del hebreo y la referencia contextual a las otras tribus de Israel.
  - 'La expresión geográfica se deja concreta y sin eufemizar: ''al otro lado del Jordán'' y ''hacia donde sale el sol''.'
