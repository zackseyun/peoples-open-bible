revisions:
- from: Puso guarniciones en Edom[a]; por todo Edom puso guarniciones, y todo Edom quedó sometido a David. Yahvé dio a David victoria[b] en todo lo que fue.
  to: Puso guarniciones en Edom; por todo Edom[a] puso guarniciones, y todo Edom quedó sometido a David. Y Yahvé dio a David la victoria[b] dondequiera que fue.
