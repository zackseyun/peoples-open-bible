review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la mayor parte: conserva la instrucción legal, la expresión pactual «casa de Israel», la categoría del גֵּר, y el contraste sacrificial «holocausto o sacrificio». Sin embargo, «Y dirás a ellos» es español poco natural frente a la misma fuerza de וַאֲלֵהֶם תֹּאמַר, y «de entre el forastero residente» introduce una preposición innecesaria que no refleja bien וּמִן הַגֵּר. También conviene alinear mejor la nota b con una alternativa española, no inglesa.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos giros poco naturales para español bíblico moderno: «Y dirás a ellos» y «de entre el forastero residente». «Forastero residente» es defendible, pero «extranjero residente» o «residente forastero» serían más transparentes; aun así, puede conservarse si se corrige la sintaxis. La nota con «sojourner» en inglés desentona en una edición española.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Holocausto» para עֹלָה y «sacrificio» para זָבַח son adecuados. La decisión sobre גֵּר puede mantenerse como «forastero residente», pero la documentación de alternativa debe expresarse en español, p. ej. «residente extranjero» o «extranjero residente», no con el anglicismo «sojourner».
  issues:
  - severity: medium
    issue: «Y dirás a ellos» suena calcado y poco idiomático en español.
    rationale: El hebreo permite esa secuencia, pero en español natural y digno la forma correcta es «Y les dirás» sin pérdida de sentido ni registro legal.
  - severity: medium
    issue: «o de entre el forastero residente» no refleja bien la construcción y resulta torpe.
    rationale: וּמִן הַגֵּר significa «o del forastero/ extranjero residente», no «de entre». La frase actual introduce una idea partitiva que el hebreo no exige.
  - severity: low
    issue: La nota b usa la alternativa inglesa «sojourner» en una edición española.
    rationale: Las notas deben servir al lector hispanohablante. Conviene ofrecer una alternativa española equivalente, como «extranjero residente» o «residente extranjero».
  revised_spanish_text: 'Y les dirás: Todo hombre[a] de la casa de Israel, o del forastero residente[b] que habita entre ellos, que ofrezca un holocausto o un sacrificio—'
