source:
  edition: WLC
  text: חָמַ֣ד רָ֭שָׁע מְצ֣וֹד רָעִ֑ים וְ/שֹׁ֖רֶשׁ צַדִּיקִ֣ים יִתֵּֽן׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/012/012.yaml
  text: A wicked man desires the prey of evil men[b][a], but the root of the righteous yields fruit.
  footnotes:
  - marker: a
    text: Or 'A wicked man desires the net of evil men.' The Hebrew noun מְצוֹד is difficult and may refer to a net, snare, prey, or plunder; the main text adopts 'plunder' because it best fits the contrast with the fruitful root of the righteous.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the root of the righteous gives.' The translation 'yields fruit' makes explicit the likely agricultural sense of the Hebrew idiom.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
