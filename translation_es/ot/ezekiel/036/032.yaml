translation:
  language: es
  text: No es por causa de ustedes que yo actúo, declara el Señor Dios, Yahvé; sépanlo bien. Avergüéncense y sean humillados[a] por sus caminos, casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Avergüéncense y sean deshonrados por sus caminos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַנְכֶם
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - para su bien
  - en su beneficio
  lexicon: HALOT
  rationale: לְמַעַן expresa finalidad o beneficio; aquí el sentido es que la acción divina no nace del mérito ni del provecho de Israel. "Por causa de ustedes" conserva ese valor relacional y la negación enfática de motivo a favor de ellos.
- source_word: עֹשֶׂה
  english_pob_choice: am acting
  chosen_spanish: estoy actuando
  alternatives_spanish:
  - estoy haciendo
  - hago
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero en este contexto profético se refiere a la intervención de Yahvé en la historia. "Estoy actuando" comunica mejor la idea de obrar/intervenir que un simple "hacer".
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética de declaración, por eso se traduce con "declara". Para אֲדֹנָי יְהוִה, se conserva la distinción del título compuesto mediante "Señor Yahvé", siguiendo el principio del proyecto de renderizar el nombre divino como Yahvé.
- source_word: יְהוִה
  english_pob_choice: GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: El nombre propio divino se mantiene como "Yahvé", conforme al criterio del proyecto, y no se enmascara con "SEÑOR". En el compuesto titular con אֲדֹנָי, esta forma preserva la distinción entre título y nombre.
- source_word: יִוָּדַע לָכֶם
  english_pob_choice: let it be known to you
  chosen_spanish: que esto les quede sabido
  alternatives_spanish:
  - que lo sepan
  - háganlo saber
  lexicon: HALOT
  rationale: 'El nifal de ידע aquí tiene fuerza pasiva/medio-jusiva: algo debe quedar reconocido por ellos. "Que esto les quede sabido" mantiene la formalidad y la idea de reconocimiento obligado sin sonar rígido en español.'
- source_word: בּוֹשׁוּ
  english_pob_choice: be ashamed
  chosen_spanish: Sean avergonzados
  alternatives_spanish:
  - Avergüéncense
  - Sean avergonzados y queden avergonzados
  lexicon: HALOT
  rationale: El imperativo exhorta a una respuesta de vergüenza ante la conducta propia. "Sean avergonzados" conserva la fuerza moral y permite enlazar con el paralelo siguiente.
- source_word: וְהִכָּלְמוּ
  english_pob_choice: and humiliated
  chosen_spanish: y humillados
  alternatives_spanish:
  - y avergonzados
  - y cubiertos de vergüenza
  lexicon: HALOT
  rationale: כּלם en nifal expresa vergüenza pública, deshonra o humillación. Se distingue de בושׁ con "humillados", preservando la intensificación del paralelismo.
- source_word: מִדַּרְכֵיכֶם
  english_pob_choice: because of your ways
  chosen_spanish: por causa de sus caminos
  alternatives_spanish:
  - a causa de sus caminos
  - por sus caminos
  lexicon: HALOT
  rationale: El מן causal se entiende naturalmente como motivo de vergüenza. "Por causa de sus caminos" expresa con claridad que la conducta es la razón de la humillación.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - Oh casa de Israel
  - familia de Israel
  lexicon: HALOT
  rationale: La expresión vocativa se conserva en forma natural en español como "casa de Israel". El vocativo queda suficientemente marcado por el tono profético del mandato anterior, sin necesidad de añadir "Oh".
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La fuente hebrea contiene el Tetragrámaton y el título אֲדֹנָי. Siguiendo la norma del proyecto, se traduce el nombre propio como Yahvé y el título como Señor, preservando la distinción sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Fuerza de la secuencia imperativa בּוֹשׁוּ וְהִכָּלְמוּ
  english_pob_reading: Be ashamed and humiliated
  chosen_spanish_reading: Sean avergonzados y humillados
  alternative_spanish_readings:
  - Avergüéncense y sean humillados
  - Sean avergonzados y avergonzados
  rationale: El paralelismo hebreo intensifica la vergüenza pública y moral. Se mantiene la doble admonición en dos verbos distintos para no borrar la tensión léxica entre בושׁ y כלם.
  doctrine_reference: Hebreo poético-profético; paralelismo sin mitigación interpretativa
translation_notes:
  revision_awareness: El borrador sigue de cerca el packet fuente hebreo y el audit trail inglés. Se mantuvo la fórmula profética de declaración, el nombre divino como Yahvé, la negación de mérito en לְמַעַנְכֶם y el paralelismo imperativo doble sin suavizarlo. No se introdujeron lecturas nuevas ni cambios textuales respecto del contexto de revisión más reciente, que indica concordancia alta y sin cambios.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" según el estándar del proyecto para יְהוִה.
  - Se usó "Señor" para אֲדֹנָי y no una forma tradicional que esconda el nombre divino.
  - '"Estoy actuando" conserva el valor de intervención divina del contexto profético.'
  - '"Humillados" distingue נִכְלָם de בושׁ para preservar la duplicación semántica.'
  - La nota al pie ofrece una alternativa de vergüenza/deshonra que responde al matiz lexical del hebreo.
