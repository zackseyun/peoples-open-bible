translation:
  language: es
  text: Echa tu pan sobre las aguas[a], porque después de muchos días lo hallarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Envía tu pan sobre las aguas». La imagen hebrea puede sugerir generosidad, inversión o ambas; en el texto principal se deja como figura.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלַּח
  english_pob_choice: Cast
  chosen_spanish: Echa
  alternatives_spanish:
  - Lanza
  - Envía
  - Suelta
  lexicon: HALOT
  rationale: El hebreo es un imperativo de שׁלח, con sentido básico de ‘enviar/soltar’. En español, ‘echa’ conserva el gesto imperativo y la imagen proverbial de arrojar algo al agua sin sonar forzado.
- source_word: לַחְמְךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu alimento
  - tu comida
  - tu grano
  lexicon: HALOT
  rationale: לֶחֶם es literalmente ‘pan’ y puede ampliarse a ‘alimento’. Se mantiene ‘pan’ para conservar la imagen concreta y la figura proverbial del hebreo.
- source_word: עַל פְּנֵי הַמָּיִם
  english_pob_choice: upon the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre la superficie de las aguas
  - sobre el agua
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente ‘sobre la faz/superficie de las aguas’. En español, ‘sobre las aguas’ es natural y suficientemente fiel; mantiene el plural del hebreo y la metáfora abierta.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del imperativo. ‘Porque’ expresa bien la relación causal en un castellano claro y bíblico.
- source_word: בְרֹב הַיָּמִים
  english_pob_choice: after many days
  chosen_spanish: después de muchos días
  alternatives_spanish:
  - tras muchos días
  - con el paso de muchos días
  lexicon: HALOT
  rationale: La expresión temporal hebrea comunica demora y retorno posterior. ‘Después de muchos días’ conserva esa idea de espera prolongada sin sobreinterpretar.
- source_word: תִּמְצָאֶנּוּ
  english_pob_choice: you will find it
  chosen_spanish: lo hallarás
  alternatives_spanish:
  - lo encontrarás
  - lo recuperarás
  lexicon: HALOT
  rationale: El verbo significa ‘encontrar’. ‘Hallarás’ mantiene un tono proverbial clásico y fiel. ‘Lo’ refleja el sufijo masculino singular referido a ‘pan’.
theological_decisions:
- issue: Interpretación de la imagen proverbial
  english_pob_reading: Retain the metaphor of bread cast on waters without resolving it into a specific moral or economic application in the main text.
  chosen_spanish_reading: Mantener la metáfora del pan arrojado sobre las aguas sin convertirla en una exhortación explícita a la generosidad o a la inversión.
  alternative_spanish_readings:
  - Una exhortación a la generosidad
  - Un consejo sobre inversión o riesgo comercial
  rationale: El hebreo es deliberadamente figurado y admite varias lecturas. Siguiendo el criterio de no resolver tensiones interpretativas sin base textual, el texto principal conserva la imagen abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el pasaje revisado del inglés POB, que simplificó la expresión a ‘upon the waters’ por ser más natural y suficientemente literal. En español se adopta igualmente ‘sobre las aguas’ en lugar de una glosa más explicativa.
  spanish_consistency_notes:
  - Se mantiene ‘pan’ y no ‘alimento’, para conservar la concreción lexical del hebreo.
  - Se usa ‘hallar’ como equivalente bíblico natural de ‘find’ sin añadir el matiz de ‘recuperar’.
  - La preposición ‘sobre’ reproduce bien la relación espacial del hebreo sin forzar ‘sobre la superficie’.
