translation:
  language: es
  text: Terror y pavor caerán sobre ellos[a]; por la grandeza de tu brazo quedarán inmóviles como una piedra, hasta que pase tu pueblo, oh Yahvé[b][c], hasta que pase este pueblo que tú adquiriste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedarán callados' o 'quedarán en silencio' para 'quedarán inmóviles'.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta que crucen ... hasta que este pueblo que tú adquiriste cruce'.
    reason: lexical_alternative
  - marker: c
    text: '''Adquiriste'' también puede verterse ''compraste'' o, en un sentido pactal más amplio, ''hiciste tuyo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפֹּל
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - podrá caer
  - caerá
  lexicon: HALOT
  rationale: El imperfecto hebreo en este canto tiene valor prospectivo; en español, el plural verbal concuerda naturalmente con el sujeto colectivo 'terror y pavor'. 'Caerán' conserva la imagen de movimiento súbito sin volverla demasiado interpretativa.
- source_word: אֵימָתָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - espanto
  - horror
  lexicon: HALOT
  rationale: '''Terror'' mantiene la intensidad del sustantivo hebreo y preserva el par cercano con ''pavor'' sin fusionar ambos términos en uno solo.'
- source_word: וָפַחַד
  english_pob_choice: and dread
  chosen_spanish: y pavor
  alternatives_spanish:
  - y miedo
  - y temor
  lexicon: HALOT
  rationale: '''Pavor'' reproduce bien la idea de miedo intenso y distinguible de ''terror'', manteniendo la duplicación poética y evitando una repetición plana.'
- source_word: בִּגְדֹל זְרוֹעֲךָ
  english_pob_choice: by the greatness of your arm
  chosen_spanish: por la grandeza de tu brazo
  alternatives_spanish:
  - por el poder de tu brazo
  - a causa de la grandeza de tu brazo
  lexicon: HALOT
  rationale: '''Por'' expresa base o medio en español de forma natural. ''Brazo'' conserva la metáfora bíblica del poder divino, y ''grandeza'' reproduce el sustantivo abstracto sin reemplazarlo por una paráfrasis.'
- source_word: יִדְּמ֣וּ
  english_pob_choice: they will be still
  chosen_spanish: quedarán inmóviles
  alternatives_spanish:
  - callarán
  - quedarán en silencio
  - permanecerán quietos
  lexicon: HALOT
  rationale: El verbo puede implicar estar callados, quietos o paralizados; en este contexto con 'como una piedra', 'quedarán inmóviles' expresa mejor la paralización visual y poética que la mera ausencia de sonido.
- source_word: כָּאָבֶן
  english_pob_choice: as a stone
  chosen_spanish: como una piedra
  alternatives_spanish:
  - como piedra
  - como una roca
  lexicon: HALOT
  rationale: '''Piedra'' es el equivalente más directo y natural en español para la comparación, preservando la imagen de rigidez e inmovilidad.'
- source_word: עַד יַעֲבֹר
  english_pob_choice: until ... pass by
  chosen_spanish: hasta que pase
  alternatives_spanish:
  - hasta que crucen
  - hasta que pasen
  lexicon: HALOT
  rationale: '''Pasar'' mantiene la repetición del hebreo y funciona bien en el marco narrativo de Israel avanzando. No se fuerza ''cruzar'' porque el verbo aquí también sostiene el ritmo del canto y la idea general de avance.'
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: '''Pueblo'' conserva la relación pactal entre Yahvé e Israel y corresponde al sustantivo hebreo en contexto nacional.'
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh SEÑOR
  - oh Yahweh
  lexicon: HALOT
  rationale: Se usa 'Yahvé' conforme al criterio del proyecto para el Tetragrama, y el vocativo se expresa naturalmente con 'oh' en español.
- source_word: עַם זוּ
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: El demostrativo se conserva con 'este' para mantener la focalización del hebreo y la paridad con 'tu pueblo'.
- source_word: קָנִיתָ
  english_pob_choice: you acquired
  chosen_spanish: adquiriste
  alternatives_spanish:
  - compraste
  - hiciste tuyo
  - redimiste
  lexicon: HALOT
  rationale: '''Adquiriste'' reproduce el valor amplio de קנה sin introducir ''redimiste'', que sería más específico de otros lexemas hebreos de rescate. En español, ''adquirir'' preserva la idea de posesión por acto divino.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh SEÑOR
  - oh Yahweh
  rationale: Se preserva el nombre propio divino en lugar de sustituirlo por un título. La elección de 'Yahvé' sigue la convención del proyecto y mantiene visible la identidad pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de קָנִיתָ en el cierre del verso
  english_pob_reading: you acquired
  chosen_spanish_reading: adquiriste
  alternative_spanish_readings:
  - compraste
  - hiciste tuyo
  - redimiste
  rationale: El hebreo habla de adquisición/posesión, no usa aquí el léxico técnico más explícito de rescate. 'Adquiriste' conserva la tensión entre posesión y pertenencia sin resolverla en una sola categoría teológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La versión se mantiene en alto acuerdo con el último pasaje auditado; no se registran revisiones aplicadas en el historial más reciente, y la redacción española conserva las decisiones léxicas y teológicas ya validadas en el control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, de acuerdo con la terminología del proyecto.
  - '''Brazo'' se conserva como metáfora bíblica y no se reemplaza por ''poder''.'
  - '''Pueblo'' se usa de forma consistente para עַם / עַמְּךָ, evitando ''gente'' por pérdida del matiz pactal.'
  - '''Adquiriste'' conserva la amplitud de קנה sin introducir ''redimiste''.'
  - La duplicación 'hasta que pase ... hasta que pase' refleja la repetición del hebreo y el ritmo del canto.
