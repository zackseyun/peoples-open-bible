review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura calendárica y el sentido general del hebreo: séptimo mes, día quince, la fiesta, repetición durante siete días y la lista sacrificial final. Sin embargo, la nota [b] está anclada en ''ofrenda de cereal'', aunque su contenido explica כָאֵלֶּה / ''hará como estas'', no מִנְחָה. Además, ''ofrenda quemada'' para עֹלָה es inteligible pero menos establecido y menos digno que ''holocausto'' en contexto bíblico-sacrificial; aquí ''holocausto'' no crea una ambigüedad seria y preserva mejor la terminología cultual tradicional.'
  spanish_quality_summary: El español es claro y legible, pero conviene corregir la colocación de la nota [b] y pulir la terminología sacrificial para mayor naturalidad bíblica. 'En la fiesta' funciona; 'el día quince del mes' es correcto; 'hará lo mismo por siete días' suena natural. La secuencia comparativa 'como... así...' es algo rígida, pero aceptable y fiel.
  glossary_alignment: No hay conflicto con la glosa principal del proyecto. Las decisiones sacrificiales son mayormente adecuadas. Recomiendo 'holocausto' para עֹלָה como término bíblico estándar en español, y mantener 'ofrenda de cereal' para מִנְחָה. La nota léxica sobre 'hará como estas' debe ir anclada en 'hará lo mismo', no en 'ofrenda de cereal'.
  issues:
  - severity: high
    issue: La nota [b] está anclada al término equivocado.
    rationale: El contenido de la nota explica literalmente 'hará como estas', es decir, יַעֲשֶׂה כָאֵלֶּה, pero en el texto español el marcador aparece después de 'ofrenda de cereal'. Esto desorienta al lector y rompe la correspondencia entre nota y fuente.
  - severity: medium
    issue: '''Ofrenda quemada'' es menos idiomático que ''holocausto'' para עֹלָה.'
    rationale: Aunque 'ofrenda quemada' comunica el sentido básico, en español bíblico y eclesial 'holocausto' es el término técnico más reconocible y digno para el sacrificio de ascensión/quemado total. Aquí su uso es adecuado.
  revised_spanish_text: 'En el séptimo mes[a], el día quince del mes, en la fiesta, hará lo mismo[b] por siete días: como la ofrenda por el pecado, así el holocausto, y la ofrenda de cereal, y el aceite.'
  revised_footnotes:
  - marker: a
    text: O 'durante la fiesta' o 'en la festividad'.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''hará como estas''; es decir, hará según estas mismas prescripciones.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [b] para que explique correctamente יַעֲשֶׂה כָאֵלֶּה / 'hará lo mismo', y se ajusta עֹלָה a 'holocausto' por ser el término sacrificial estándar y más natural en español bíblico. El resto del versículo ya preservaba bien la estructura y el sentido del hebreo y del expediente POB.
