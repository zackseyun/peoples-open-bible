translation:
  language: es
  text: Tu bondad está sobre Israel como un don abundante[a]; tus ojos están puestos en ellos, y ninguno de ellos carecerá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un rico don». El griego δόματος significa «don»; la expresión es poética y comunica abundancia.
    reason: lexical_alternative
  - marker: b
    text: O «no habrá carencia entre ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: χρηστότης
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad benigna
  - benevolencia
  - bondad amable
  lexicon: BDAG
  rationale: χρηστότης denota bondad activa, benignidad o benevolencia. En español, «bondad» comunica de forma natural esa cualidad personal y benéfica. «Bondad» es preferible a un calco más técnico porque mantiene el tono poético sin perder el sentido.
- source_word: δόματος πλουσίου
  english_pob_choice: like a rich gift
  chosen_spanish: como un rico don
  alternatives_spanish:
  - como un don abundante
  - como un regalo rico
  - como un abundante obsequio
  lexicon: LSJ
  rationale: El sustantivo δόμα, según la revisión crítica del audit trail, significa «don» y no «techo/cobertura». Por eso se traduce con «don». El adjetivo πλουσίου se expresa bien con «rico», conservando la imagen de abundancia y calidad del don sin introducir una explicación ajena al griego.
- source_word: ἐπὶ Ἰσραήλ
  english_pob_choice: upon Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - encima de Israel
  - sobre la casa de Israel
  - por encima de Israel
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí expresa extensión sobre/encima de Israel. «Sobre Israel» preserva la imagen de cobertura o extensión poética en español con naturalidad.
- source_word: ἐπιβλέποντες
  english_pob_choice: look upon
  chosen_spanish: miran sobre
  alternatives_spanish:
  - miran hacia
  - velan sobre
  - contemplan
  lexicon: BDAG
  rationale: El participio indica una mirada atenta. «Miran sobre» conserva la referencia visual directa y también el matiz de atención sobre el pueblo, sin convertir el verbo en una interpretación demasiado libre como «velan».
- source_word: οὐχ ὑστερήσει ἐξ αὐτῶν
  english_pob_choice: none of them will be lacking
  chosen_spanish: no faltará ninguno de entre ellos
  alternatives_spanish:
  - no les faltará nada a ellos
  - ninguno de ellos carecerá
  - no habrá carencia entre ellos
  lexicon: BDAG
  rationale: ὑστερέω puede significar faltar, carecer o quedar en desventaja. Dado el referente plural, la idea es que ninguno quedará sin provisión o sin lo necesario bajo el cuidado divino. «No faltará ninguno de entre ellos» mantiene la fuerza del plural y evita una paráfrasis excesiva.
theological_decisions:
- issue: Sentido de la imagen poética de cobertura y provisión
  english_pob_reading: The verse describes God's kindness as extending over Israel with a rich gift; the image is protective and beneficent rather than merely decorative.
  chosen_spanish_reading: La bondad de Dios se presenta como una extensión sobre Israel, expresada en un don rico y protectivo.
  alternative_spanish_readings:
  - La bondad de Dios está sobre Israel como un rico regalo.
  - La bondad de Dios cubre a Israel con un don abundante.
  rationale: El griego usa una imagen compacta y poética. La versión española debe conservar tanto la sobreposición («sobre Israel») como la noción de abundancia («rico don») sin borrar la metáfora mediante una explicación plana. La lectura escogida sigue la dirección del audit trail revisado y evita la antigua confusión con «techo/cobertura» como si fuera el sentido léxico principal.
  doctrine_reference: Providencia divina y cuidado de Dios sobre Israel
- issue: Cláusula final sobre la falta o ausencia de carencia
  english_pob_reading: The clause is rendered as a statement about Israel's members not lacking under God's watchful care.
  chosen_spanish_reading: Se afirma que ninguno de entre ellos quedará en falta.
  alternative_spanish_readings:
  - No faltará entre ellos ninguna necesidad.
  - Ninguno de ellos carecerá de provisión.
  - No habrá carencia entre ellos.
  rationale: La sintaxis griega es breve y algo elíptica. En español, «no faltará ninguno de entre ellos» conserva la referencia plural y permite entender la ausencia de carencia sin imponer una explicación doctrinal más allá del texto. La ambigüedad entre falta personal y falta de provisión se mantiene suficientemente abierta.
  doctrine_reference: Providencia y preservación de Dios
translation_notes:
  revision_awareness: El audit trail revisado corrige una confusión anterior entre δόμα («don») y δῶμα («techo/cobertura»). La redacción española sigue la lectura revisada «como un rico don» y descarta la antigua interpretación arquitectónica. También conserva la clausula final en forma plural y abierta, acorde con la revisión que favorece la idea de que ninguno de ellos quedará en falta.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente aquí, sino porque el proyecto español lo reserva para el Tetragrámaton cuando corresponda; en este versículo el texto habla de Dios implícitamente, por lo que no se introduce el nombre divino.
  - Se eligió «bondad» para χρηστότης por ser natural y digno en español, evitando «benevolencia» por sonar más técnico.
  - Se mantuvo «don» para δόμα conforme a la revisión crítica del texto, evitando la antigua lectura errónea de «techo/cobertura».
  - La estructura «no faltará ninguno de entre ellos» conserva el plural griego sin forzar una singularización del sujeto.
