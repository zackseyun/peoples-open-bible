review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura solemne del hebreo: mantiene la doble invocación divina, el futuro para «Israel ... sabrá», la condición elíptica de «si fue en rebelión», la fuerza adversativa de «contra Yahvé» y la súplica negativa final. También sigue correctamente la política del proyecto al usar «Yahvé». Sin embargo, hay dos detalles mejorables para mayor fidelidad y español natural: en la segunda invocación falta el signo de apertura de exclamación, y «Él lo sabe / lo sabrá» introduce un objeto implícito que el hebreo no expresa; en español suena más limpio «Él sabe ... Israel mismo sabrá».'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. «Infidelidad contra Yahvé» funciona bien en registro bíblico. «El Fuerte» es defendible, aunque algo menos idiomático que «El Poderoso»; no exige cambio porque preserva la decisión documentada de mantener אֵל como título distinto. La corrección principal es estilística y de puntuación: evitar el «lo» añadido y marcar correctamente ambas exclamaciones.'
  glossary_alignment: 'Alineado en términos clave: יְהוָה → «Yahvé» conforme al proyecto; אֱלֹהִים → «Dios»; מֶרֶד → «rebelión»; מַעַל → «infidelidad» con nota alternativa adecuada; ישׁע → «salves». No hay conflicto teológico significativo. La nota [a] debe ajustarse para que el título citado coincida con el texto español («El Fuerte»), no «El».'
  issues:
  - severity: medium
    issue: Se añadió «lo» en «Él lo sabe ... Israel mismo lo sabrá».
    rationale: El hebreo dice simplemente «Él sabe» y «Israel ... sabrá». El pronombre objeto no está expreso y en español no hace falta; incluso suena más natural omitirlo.
  - severity: low
    issue: Falta el signo inicial de exclamación en la segunda invocación.
    rationale: La puntuación española requiere apertura también en la segunda exclamación coordinada.
  - severity: low
    issue: La nota [a] no refleja exactamente la forma elegida en el texto español.
    rationale: La nota cita «El, Dios, Yahvé» cuando el texto traducido usa «El Fuerte, Dios, Yahvé».
