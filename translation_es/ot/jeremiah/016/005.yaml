base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/016/005.yaml
  text: 'For thus says Yahweh: Do not enter a house of mourning[a], and do not go to mourn or show sympathy for them, for I have taken away my peace from this people[c][b], declares Yahweh—steadfast love and compassion.'
  footnotes:
  - marker: a
    text: Or 'a house of feasting.' The Hebrew term מַרְזֵחַ can denote a banquet setting in some contexts, but here the surrounding references to lamenting and showing sympathy favor 'house of mourning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'console them.' The Hebrew verb can refer to making gestures of condolence or sympathy in mourning.
    reason: lexical_alternative
  - marker: c
    text: '''Peace'' here likely includes well-being, wholeness, and welfare, not merely the absence of conflict.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
