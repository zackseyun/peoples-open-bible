translation:
  language: es
  text: Sin embargo, a Yahvé le agradó[a] aplastarlo; lo hizo enfermar.[b] Si pone su vida como ofrenda por la culpa[c][d], verá descendencia, prolongará sus días, y el agrado de Yahvé prosperará en su mano.[e]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Yahvé» o «Pero Yahvé». La conjunción hebrea puede expresarse de varias maneras según el flujo del discurso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo afligió» o «le causó dolor».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Cuando su vida sea puesta como ofrenda por la culpa», o «Si tú pones su vida como ofrenda por la culpa». El hebreo de esta cláusula es difícil, especialmente el sujeto de «poner».'
    reason: alternative_reading
  - marker: d
    text: «Ofrenda por la culpa» se refiere al sacrificio por culpa o reparación en la Torá.
    reason: cultural_note
  - marker: e
    text: 'O: «y la voluntad o el propósito de Yahvé prosperará por su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: Yet the LORD
  chosen_spanish: Sin embargo, a Yahvé
  alternatives_spanish:
  - Yahvé
  - Pero a Yahvé
  - Yahvé, sin embargo
  lexicon: HALOT
  rationale: La conjunción inicial expresa contraste con el sufrimiento previo del Siervo; «Sin embargo» comunica bien ese giro discursivo en español. Se conserva «Yahvé» por la norma del proyecto para יהוה, evitando el ocultamiento con «SEÑOR».
- source_word: חָפֵץ
  english_pob_choice: it pleased
  chosen_spanish: le agradó
  alternatives_spanish:
  - quiso
  - se complació
  - fue del agrado de
  lexicon: HALOT
  rationale: El verbo puede expresar placer, voluntad o deleite. «Le agradó» mantiene la fuerza volitiva sin sugerir una crueldad emocional que el hebreo no exige.
- source_word: דַּכְּאוֹ
  english_pob_choice: to crush him
  chosen_spanish: aplastarlo
  alternatives_spanish:
  - quebrantarlo
  - machacarlo
  - triturarlo
  lexicon: HALOT
  rationale: «Aplastar» transmite con claridad la violencia del verbo mejor que un calco débil como «magullar». El sufijo masculino singular queda reflejado en el objeto pronominal «-lo».
- source_word: הֶחֱלִי
  english_pob_choice: he made him sick
  chosen_spanish: lo hizo enfermar
  alternatives_spanish:
  - lo hizo enfermo
  - lo afligió
  - le causó enfermedad
  lexicon: HALOT
  rationale: El causativo de חלה apunta a hacer enfermar o afligir. «Lo hizo enfermar» es natural en español y conserva la concreción del hebreo.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Aunque
  lexicon: HALOT
  rationale: Se mantiene la lectura condicional principal, dejando la dificultad sintáctica del hebreo para la nota de alternativa.
- source_word: תָּשִׂים
  english_pob_choice: makes
  chosen_spanish: pone
  alternatives_spanish:
  - hace
  - presenta
  - convierte
  lexicon: HALOT
  rationale: La forma verbal es difícil por su posible sujeto implícito. «Pone» permite una construcción abierta en español, cercana a la ambigüedad del original, y combina con «ofrenda por la culpa».
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda por el delito
  - ofrenda de reparación
  - ofrenda por la culpa
  lexicon: HALOT
  rationale: Se usa una equivalencia cultual transparente para lectores españoles. «Ofrenda por la culpa» preserva el valor técnico sacrificial sin recurrir a «holocausto» ni a términos eclesiales ajenos.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - él mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ refiere a la vida/persona del Siervo. «Su vida» evita una lectura demasiado platónica de «alma» y sigue la decisión inglesa.
- source_word: יִרְאֶה זֶרַע
  english_pob_choice: he will see offspring
  chosen_spanish: verá descendencia
  alternatives_spanish:
  - verá hijos
  - verá prole
  - verá semilla
  lexicon: HALOT
  rationale: «Descendencia» conserva el sentido de זֶרַע como resultado familiar y evita una expresión literal extraña como «semilla» en español.
- source_word: יַאֲרִיךְ יָמִים
  english_pob_choice: he will prolong his days
  chosen_spanish: prolongará sus días
  alternatives_spanish:
  - alargará sus días
  - vivirá largos días
  - vivirá por mucho tiempo
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático hebreo casi de forma directa para conservar la imagen y el paralelismo con la primera mitad del versículo.
- source_word: וְחֵפֶץ יְהוָה
  english_pob_choice: and the pleasure of the LORD
  chosen_spanish: y el agrado de Yahvé
  alternatives_spanish:
  - y la voluntad de Yahvé
  - y el propósito de Yahvé
  - y el deleite de Yahvé
  lexicon: HALOT
  rationale: Se preserva el enlace léxico con חָפֵץ, ya traducido con «agradó». «Agrado» comunica tanto placer como voluntad eficaz, sin borrar la tensión semántica.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - por su mano
  - mediante él
  - bajo su mano
  lexicon: HALOT
  rationale: La imagen hebrea de agencia/instrumentalidad se conserva literalmente. En español «en su mano» es idiomático y mantiene la metáfora de control o medio.
- source_word: יִצְלָח
  english_pob_choice: will prosper
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - saldrá adelante
  - triunfará
  lexicon: HALOT
  rationale: El verbo expresa éxito efectivo. «Prosperará» conserva la idea de eficacia y coherencia con la agencia divina del verso.
theological_decisions:
- issue: Agencia divina en el sufrimiento del Siervo
  english_pob_reading: The LORD directly wills/pleases the crushing and affliction; this should not be softened to mere permission.
  chosen_spanish_reading: a Yahvé le agradó aplastarlo; lo hizo enfermar
  alternative_spanish_readings:
  - Yahvé permitió que lo aplastaran
  - Yahvé dejó que lo afligieran
  rationale: El hebreo atribuye la acción a Yahvé de manera directa. La traducción española conserva esa agencia, sin intentar mitigarla con una lectura de mera permisión que no está exigida por el texto.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Lectura de la cláusula de la ofrenda por la culpa
  english_pob_reading: The clause is syntactically difficult; the main text should preserve the ambiguity with footnoted alternatives.
  chosen_spanish_reading: Si pone su vida como ofrenda por la culpa
  alternative_spanish_readings:
  - Cuando su vida sea puesta como ofrenda por la culpa
  - Si tú pones su vida como ofrenda por la culpa
  rationale: Se mantiene una formulación viable y relativamente cercana a la sintaxis hebrea, pero sin cerrar la ambigüedad de sujeto/tiempo. La nota recoge las otras posibilidades relevantes.
  doctrine_reference: Translation philosophy §3
- issue: Sentido cultual de אָשָׁם
  english_pob_reading: '''Guilt offering'' refers to the sacrificial offering for guilt/reparation in the Torah.'
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por el delito
  rationale: Se conserva el valor sacrificial técnico del término. En español, «ofrenda por la culpa» es suficientemente clara y no diluye el trasfondo levítico.
  doctrine_reference: Levítico 5–7; Isaías 53:10
translation_notes:
  revision_awareness: La revisión más reciente mantuvo sin cambios el texto inglés y su aparato. La versión española sigue esa línea, conservando la agencia divina, la dificultad sintáctica de la cláusula de la ofrenda por la culpa y el enlace léxico entre חָפֵץ y חֵפֶץ.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de acuerdo con la norma del proyecto.
  - Se mantiene «ofrenda por la culpa» para אָשָׁם como término sacrificial técnico.
  - Se conserva la imagen de «mano» para בְּיָדוֹ por su valor de agencia/instrumentalidad.
  - Se evita «alma» para נֶפֶשׁ en favor de «vida», siguiendo el contexto sacrificial.
  - Se mantiene el paralelismo verbal con «agradó / agrado» para reflejar la raíz חָפֵץ.
