translation:
  language: es
  text: 'Y ahora muchas naciones se han reunido contra ti[a], diciendo: «Sea profanada[b], y que nuestros ojos vean a Sión[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre ti». El hebreo usa la preposición עַל, que en este contexto hostil comunica oposición.
    reason: lexical_alternative
  - marker: b
    text: O «sea contaminada» o «sea mancillada». El verbo hebreo puede expresar profanación moral o ritual.
    reason: lexical_alternative
  - marker: c
    text: O «que nuestros ojos miren a Sión». La expresión comunica el deseo hostil de contemplar la humillación de Sión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el valor discursivo de transición de וְ y la referencia temporal de עַתָּה. «Y ahora» es natural en español y mantiene la continuidad lógica del texto.
- source_word: נֶאֶסְפוּ
  english_pob_choice: have gathered
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se han juntado
  - han sido reunidas
  lexicon: HALOT
  rationale: El nifal perfecto indica acción completada con relevancia actual. «Se han reunido» expresa bien la reunión ya consumada de las naciones sin forzar un matiz pasivo artificial en español.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: En contexto hostil, על expresa oposición. «Contra ti» comunica de forma directa esa fuerza adversativa.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  lexicon: HALOT
  rationale: גוֹיִם aquí señala grupos nacionales o políticos. «Naciones» conserva mejor ese valor que «pueblos» en este contexto profético.
- source_word: הָאֹמְרִים
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dicen
  lexicon: HALOT
  rationale: El participio introduce el contenido del discurso hostil; «diciendo» es una fórmula clara y fiel en español.
- source_word: תֶּחֱנָף
  english_pob_choice: Let her be defiled
  chosen_spanish: Sea profanada
  alternatives_spanish:
  - Sea contaminada
  - Sea mancillada
  - Sea defilada
  lexicon: HALOT
  rationale: El verbo puede abarcar la idea de profanar o contaminar ritualmente/moralmente. En español, «profanada» retiene mejor esa tensión religiosa que una simple contaminación física; además, evita suavizar el tono del insulto.
- source_word: וְתַחַז
  english_pob_choice: and let our eyes look on
  chosen_spanish: y que nuestros ojos miren sobre
  alternatives_spanish:
  - y que nuestros ojos vean
  - y que nuestros ojos miren a
  lexicon: HALOT
  rationale: חזָה puede expresar ver o mirar con atención. La construcción «que nuestros ojos miren» preserva el cuerpo-partido idiomático del hebreo y el deseo hostil de contemplar la humillación de Sión.
- source_word: בְּצִיּוֹן
  english_pob_choice: on Zion
  chosen_spanish: sobre Sión
  alternatives_spanish:
  - en Sión
  - contra Sión
  lexicon: HALOT
  rationale: Con verbos de visión, «sobre» reproduce de modo natural la relación espacial de la escena. «Sión» mantiene el nombre propio bíblico usual en español.
- source_word: עֵינֵינוּ
  english_pob_choice: our eyes
  chosen_spanish: nuestros ojos
  alternatives_spanish:
  - nosotros
  lexicon: HALOT
  rationale: Se conserva el giro hebreo del órgano de la visión, que aporta viveza y tono despectivo en la boca de las naciones.
theological_decisions:
- issue: Referente femenino singular en el habla citada
  english_pob_reading: Use 'her' in the quoted speech, referring to Zion/Jerusalem
  chosen_spanish_reading: Usar el femenino implícito en «Sea profanada» para referir a Sión/Jerusalén
  alternative_spanish_readings:
  - Sea profanado
  - Sea profanada ella
  rationale: El hebreo pasa de la segunda persona del relato a un objeto femenino singular en la cita. En español, la forma verbal femenina mantiene esa referencia sin añadir un pronombre innecesario.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz moral y ritual de חנף
  english_pob_reading: Or 'Let her be polluted' or 'May she be profaned.' The Hebrew verb can denote becoming morally or ritually defiled.
  chosen_spanish_reading: «Sea profanada» con nota de alternativa a «sea contaminada»
  alternative_spanish_readings:
  - Sea contaminada
  - Sea mancillada
  rationale: «Profanada» permite abarcar la profanación sagrada y la contaminación moral/ritual sin escoger una sola faceta de modo indebido. La nota conserva la alternativa semántica que el inglés POB ya documenta.
  doctrine_reference: HALOT; Translation philosophy §2
- issue: Imagen hostil de la visión sobre Sión
  english_pob_reading: Or 'let our eyes look on Zion' / 'may our eyes see Zion.' The expression conveys the nations' hostile desire to watch Zion's humiliation.
  chosen_spanish_reading: «y que nuestros ojos miren sobre Sión»
  alternative_spanish_readings:
  - y que nuestros ojos vean Sión
  - y que nuestros ojos miren a Sión
  rationale: La frase conserva la imagen corporal y la intención hostil de observar la humillación de Sión. «Mirar sobre» reproduce mejor que «ver» el carácter insistente de la expresión.
  doctrine_reference: HALOT; Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés más reciente: se mantuvo la lectura natural de la escena y la formulación formalmente neutral del verbo de visión, reflejando la revisión que prefirió «look on» frente a una opción más marcada. No se introdujeron cambios doctrinales adicionales; la principal tensión léxica permanece en el verbo de profanación, preservada mediante nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no ocurre.
  - Se mantiene «Sión» como nombre propio bíblico.
  - Se conserva la metáfora corporal «nuestros ojos» en lugar de sustituirla por un sujeto abstracto.
  - La cita en discurso directo mantiene el cambio de referente de la narración a la voz de las naciones.
