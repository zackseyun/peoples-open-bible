translation:
  language: es
  text: Pero la senda de los justos es como la luz del alba[a], brillando cada vez más[b] hasta que el día ha llegado a su plenitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el resplandor del alba'.
    reason: lexical_alternative
  - marker: b
    text: O 'resplandeciendo cada vez más hasta el día pleno'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֹרַח
  english_pob_choice: But the path
  chosen_spanish: Pero la senda
  alternatives_spanish:
  - Y la senda
  - Ahora la senda
  - El camino
  lexicon: HALOT
  rationale: אֹרַח designa una senda, camino o trayectoria. En español, 'senda' conserva el matiz de un curso de vida o dirección moral. El prefijo conjuntivo puede reflejarse como 'pero' para mantener el contraste sapiencial implícito con el contexto anterior, sin añadir contenido ajeno al hebreo.
- source_word: צַ֭דִּיקִים
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de las personas justas
  - de los rectos y justos
  lexicon: HALOT
  rationale: El plural sustantivado se refiere a los justos como categoría moral. 'Justos' es idiomático en español y preserva la fuerza ética del término sin sobreespecificar una lectura doctrinal.
- source_word: כְּ/א֣וֹר נֹ֑גַהּ
  english_pob_choice: like the light of dawn
  chosen_spanish: como la luz del alba
  alternatives_spanish:
  - como la luz del amanecer
  - como el resplandor del alba
  - como la claridad del amanecer
  lexicon: HALOT
  rationale: נֹגַהּ puede significar brillo, resplandor o claridad, y el contexto pide una imagen de luz naciente que progresa hacia el día completo. 'Luz del alba' mantiene la imagen temporal y visual sin forzar una abstracción.
- source_word: הוֹלֵ֥ךְ וָ֝/א֗וֹר
  english_pob_choice: shining brighter and brighter
  chosen_spanish: brillando cada vez más
  alternatives_spanish:
  - avanzando y resplandeciendo
  - brillando y resplandeciendo
  - volviéndose cada vez más brillante
  lexicon: HALOT
  rationale: La secuencia verbal expresa incremento progresivo de brillo. 'Brillando cada vez más' comunica esa intensificación natural en español y respeta el movimiento del participio sin volverlo mecánico.
- source_word: עַד נְכ֥וֹן הַ/יּֽוֹם
  english_pob_choice: until the day is fully established
  chosen_spanish: hasta que el día está plenamente establecido
  alternatives_spanish:
  - hasta que el día queda firme
  - hasta que el día se afirma por completo
  - hasta que el día alcanza su plenitud
  lexicon: HALOT
  rationale: נכון expresa firmeza, establecimiento o quedar fijado. 'Plenamente establecido' conserva la idea de un día ya asentado en su plenitud, manteniendo la imagen de progreso desde el alba hasta el día completo.
theological_decisions:
- issue: La categoría de 'los justos' en la sabiduría bíblica
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - los rectos
  - las personas justas
  rationale: La frase describe el curso de vida de una categoría moral en contraste con el contexto sapiencial inmediato. 'Los justos' preserva esa categoría sin introducir terminología confesional posterior ni diluir el contraste ético.
  doctrine_reference: Translation philosophy §6; affirmaciones doctrinales sin sobrelectura denominacional
- issue: Imagen de progreso luminoso hasta la plenitud del día
  english_pob_reading: shining brighter and brighter until the day is fully established
  chosen_spanish_reading: brillando cada vez más hasta que el día está plenamente establecido
  alternative_spanish_readings:
  - resplandeciendo cada vez más hasta que el día queda firme
  - brillando hasta llegar a la plenitud del día
  rationale: La progresión no es solo estática ('luz') sino intensificadora. La redacción elegida conserva la metáfora de la luz y la culminación temporal sin convertir la imagen en una explicación interpretativa.
  doctrine_reference: Proverbios 4:18; principio de equivalencia óptima
translation_notes:
  revision_awareness: The English POB revised the Hebrew progression from a more literal 'going on and shining' to the more natural 'shining brighter and brighter' to better reflect the intensifying sense of הוֹלֵךְ וָאוֹר. This Spanish draft follows that revised understanding with 'brillando cada vez más,' while keeping the temporal endpoint explicit in 'hasta que el día está plenamente establecido.'
  spanish_consistency_notes:
  - Se usa 'justos' para צַדִּיקִים, coherente con el registro sapiencial y con el valor moral del término.
  - Se traduce YHWH nowhere in this verse because el texto hebreo no contiene el nombre divino explícitamente.
  - '''Alba'' conserva la imagen de נֹגַהּ como luz naciente; la nota aclara la alternativa ''resplandor''.'
  - Se evita 'SEÑOR' o 'Cristo' porque no hay base textual en este versículo.
  - La estructura paralela mantiene el progreso luminoso como imagen central sin introducir glosas interpretativas.
