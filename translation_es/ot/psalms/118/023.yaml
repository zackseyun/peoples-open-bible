    reason: literal_note
lexical_decisions:
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - por parte de
  lexicon: HALOT
  rationale: La preposición מֵאֵת señala procedencia u origen. En español, «de» expresa con naturalidad esa procedencia sin añadir imágenes ajenas al texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traslada como el nombre propio divino «Yahvé», de acuerdo con la terminología del proyecto y para conservar el nombre de pacto, no el título sustitutivo «SEÑOR».
- source_word: הָיְתָה זֹּאת
  english_pob_choice: This has come
  chosen_spanish: Esto ha venido
  alternatives_spanish:
  - Esto ha sido
  - Esto ha sucedido
  - Esto ha ocurrido
  lexicon: HALOT
  rationale: La forma hebrea comunica que este acontecimiento o situación procede de Yahvé. «Ha venido» conserva la idea de llegada/origen sin volverla mecánica ni introducir una interpretación más fuerte que el hebreo.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: es
  alternatives_spanish:
  - ello es
  - esto es
  lexicon: HALOT
  rationale: El pronombre independiente da énfasis en hebreo. En español, la cópula explícita «es» mantiene la fuerza enfática de la cláusula sin repetir innecesariamente el sujeto.
- source_word: נִפְלָאת
  english_pob_choice: marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - admirable
  - asombroso
  - maravilloso
  lexicon: HALOT
  rationale: El nifal de פלא expresa algo sorprendente, admirable o maravilloso. «Maravilloso» conserva el tono de asombro y es claro en español contemporáneo.
- source_word: בְּעֵינֵינוּ
  english_pob_choice: in our eyes
  chosen_spanish: en nuestros ojos
  alternatives_spanish:
  - a nuestros ojos
  - a nuestro parecer
  - a nuestra vista
  lexicon: HALOT
  rationale: Se conserva el hebraísmo literal para mantener la imagen y la perspectiva experiencial del original. «En nuestros ojos» es idiomático y transparente en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre personal de Dios en lugar de sustituirlo por un título. Esto preserva la distinción textual entre el Tetragrámaton y otras designaciones divinas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación causal/originaria del acontecimiento con Yahvé
  english_pob_reading: This has come from Yahweh
  chosen_spanish_reading: Esto ha venido de Yahvé
  alternative_spanish_readings:
  - Esto fue de Yahvé
  - Esto sucedió por Yahvé
  rationale: La sintaxis española mantiene la procedencia indicada por מֵאֵת sin convertir la frase en una explicación doctrinal adicional. Se conserva el valor de origen/causa implícito en el texto.
  doctrine_reference: HALOT; contexto poético de acción divina
- issue: Valor apreciativo de נִפְלָאת
  english_pob_reading: it is marvelous
  chosen_spanish_reading: es maravilloso
  alternative_spanish_readings:
  - es admirable
  - es asombroso
  - es maravilloso
  rationale: La traducción preserva la reacción de admiración de la comunidad sin suavizarla ni volverla técnica. «Maravilloso» refleja el asombro del original y encaja con la alabanza del salmo.
  doctrine_reference: Uso poético de פלא en Salmos
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas. La única decisión relevante para el español fue conservar el nombre divino como Yahvé y mantener la imagen idiomática de «en nuestros ojos», con una ligera adaptación verbal para que la frase suene natural en español sin perder la procedencia originaria del acontecimiento.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo breve del verso en dos miembros.
  - Se evita sustituir el hebraísmo «en nuestros ojos» por una paráfrasis más abstracta, para mantener la imagen textual.
