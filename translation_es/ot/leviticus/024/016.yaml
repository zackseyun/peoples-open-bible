revisions:
- from: Cualquiera que blasfeme el nombre de Yahvé[a] ciertamente será muerto[b]; toda la congregación ciertamente lo apedreará. Tanto el forastero como el natural del país—cuando blasfeme el Nombre—será muerto.
  to: Cualquiera que blasfeme el nombre de Yahvé[a] ciertamente será muerto; toda la congregación ciertamente lo apedreará. Tanto el forastero como el natural del país, cuando blasfeme el Nombre[b], será muerto.
  rationale: Se conservó la sustancia del borrador, pero se corrigió la ubicación de la nota cultural para que ancle correctamente en ‘el Nombre’, y se mantuvo el resto con cambios mínimos. No forzé una reescritura mayor de ‘será muerto’ para respetar la pasiva judicial breve del texto fuente, aunque sigue siendo una formulación algo rígida en español.
