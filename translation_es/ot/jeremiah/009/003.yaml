translation:
  language: es
  text: Cada uno, cuídese de su prójimo, y no confíe en ningún hermano[a]; porque todo hermano ciertamente engaña[b], y todo prójimo anda como calumniador[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermano» puede referirse a un hermano literal o, más ampliamente, a un miembro del mismo grupo o comunidad.
    reason: lexical_alternative
  - marker: b
    text: O «todo hermano es totalmente engañoso» o «todo hermano suplanta». El hebreo intensifica la raíz עָקֹב/יַעְקֹב, que puede comunicar engaño, sobrealcance o suplantación.
    reason: lexical_alternative
  - marker: c
    text: O «anda chismeando» o «como un cuentista/calumniador». El hebreo רָכִיל se refiere a quien va difundiendo habla dañina.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada hombre
  alternatives_spanish:
  - Cada uno
  - Todo hombre
  lexicon: HALOT
  rationale: El singular distributivo exige una advertencia individual. «Cada hombre» conserva la forma masculina/genérica del hebreo y reproduce bien el alcance distributivo de la advertencia.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: of his neighbor
  chosen_spanish: de su prójimo
  alternatives_spanish:
  - de su amigo
  - de su compañero
  lexicon: HALOT
  rationale: El hebreo usa רֵעַ en relación de procedencia/separación con la persona de la que se debe estar en guardia. «Prójimo» comunica la relación social amplia sin implicar necesariamente amistad.
- source_word: הִשָּׁמֵרוּ
  english_pob_choice: beware
  chosen_spanish: cuídese
  alternatives_spanish:
  - esté alerta
  - guárdese
  lexicon: HALOT
  rationale: El imperativo nifal pide vigilancia cautelosa. En español, «cuídese» es natural y conserva el matiz de precaución activa que sigue al complemento preposicional.
- source_word: וְעַל כָּל אָח אַל תִּבְטָחוּ
  english_pob_choice: and do not trust any brother
  chosen_spanish: y no confíe en ningún hermano
  alternatives_spanish:
  - y no pongan su confianza en ningún hermano
  - y no se fíe de ningún hermano
  lexicon: HALOT
  rationale: בָּטַח expresa confianza o dependencia. «No confíe» mantiene el valor verbal y «ningún hermano» reproduce el cuantificador distributivo de כָּל. En español, el término «hermano» conserva la ambigüedad entre pariente literal y miembro de la comunidad.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia; «porque» es la forma más clara y natural en español.
- source_word: עָקוֹב יַעְקֹב
  english_pob_choice: surely deceives
  chosen_spanish: engaña con engaño
  alternatives_spanish:
  - ciertamente engaña
  - es totalmente engañoso
  - suplanta con suplanto
  lexicon: HALOT
  rationale: El hebreo intensifica la raíz עקב y mantiene una tensión entre engaño, suplantación y sobrealcance. «Engaña con engaño» intenta preservar esa intensificación sin borrar el efecto retórico, aunque en español suene repetitivo de forma deliberada; se evita reducirlo a una sola lectura que elimine la riqueza lexical del hebreo.
- source_word: רֵעַ
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - amigo
  - compañero
  lexicon: HALOT
  rationale: 'Para mantener coherencia con מֵרֵעֵהוּ y evitar una falsa nota afectiva, se usa el mismo campo semántico amplio: una persona cercana en la red social, no necesariamente un amigo íntimo.'
- source_word: רָכִיל
  english_pob_choice: a slanderer
  chosen_spanish: calumniador
  alternatives_spanish:
  - chismoso
  - talebearer
  - difamador
  lexicon: HALOT
  rationale: רָכִיל designa a quien difunde habla dañina. «Calumniador» comunica bien el daño social y moral en español contemporáneo; «chismoso» sería demasiado leve y «talebearer» demasiado arcaico.
- source_word: יַהֲלֹךְ
  english_pob_choice: goes about
  chosen_spanish: anda
  alternatives_spanish:
  - va y viene
  - se mueve
  lexicon: HALOT
  rationale: El hebreo expresa conducta habitual. «Anda» es breve y natural en español, y con el predicativo «como calumniador» transmite acción continuada.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios sustantivos, con alta concordancia general y solo observaciones menores. La versión española mantiene la advertencia distributiva, la ambigüedad de «hermano/prójimo» y la intensificación lexical de עָקוֹב יַעְקֹב.
  spanish_consistency_notes:
  - Se mantuvo «prójimo» para רֵעַ por coherencia interna con מֵרֵעֵהוּ, evitando alternar con «amigo» dentro del mismo versículo.
  - Se conservó un registro bíblico moderno y digno, evitando el arcaísmo innecesario.
  - No se introdujo «SEÑOR» ni terminología eclesiástica no presente en el hebreo de este versículo.
