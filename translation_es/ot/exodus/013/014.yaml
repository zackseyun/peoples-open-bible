review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contingencia futura, pregunta del hijo, respuesta catequética, nombre divino Yahvé, salida de Egipto y la imagen de la casa de esclavitud. Sin embargo, dos elecciones necesitan ajuste para mayor fidelidad y español natural: «Con fuerza de mano» es demasiado calcado e impropio en español para בְּחֹזֶק יָד, y falta preservar la alternativa inglesa sobre מַה זֹּאת («¿Qué significa esto?») en nota.'
  spanish_quality_summary: El texto es claro y legible, pero «Con fuerza de mano» suena antinatural. «Con fuerza de su mano» o «Con mano fuerte» serían mejores; dada la revisión inglesa hacia una mayor literalidad, «Con fuerza de su mano» conserva la metáfora y mejora el español. El resto del verso fluye bien. Las notas están bien formuladas, pero conviene añadir la alternativa para la pregunta del hijo y afinar la nota de «casa de esclavitud» para evitar una alternativa redundante.
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales. «Casa de esclavitud» es aceptable y coherente con la revisión inglesa. Se debe mantener la imagen sin sustituirla por fórmulas tradicionales opacas.'
  issues:
  - severity: medium
    issue: «Con fuerza de mano» es un calco poco natural para בְּחֹזֶק יָד
    rationale: Aunque busca cercanía formal al hebreo y al inglés auditado («By strength of hand»), en español la frase sin posesivo o artículo resulta forzada. «Con fuerza de su mano» preserva la metáfora antropomórfica y comunica mejor.
  - severity: medium
    issue: Falta una nota para la alternativa de מַה זֹּאת
    rationale: El inglés POB preserva «What does this mean?» como alternativa significativa. En español conviene conservar «¿Qué significa esto?» como nota lexical, pues es una posibilidad natural y relevante.
  - severity: low
    issue: La nota b incluye una alternativa redundante
    rationale: Dice «de servidumbre» o «de esclavitud», pero el texto principal ya usa «de esclavitud». Es mejor ofrecer una alternativa real, como «de servidumbre», y explicar la imagen concreta.
