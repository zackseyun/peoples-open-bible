translation:
  language: es
  text: Pero los ojos de los impíos se agotarán[a], el refugio les desaparecerá, y su esperanza será la exhalación de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fallarán»; el hebreo presenta la imagen de ojos que se cansan o se consumen al esperar. La frase final también es difícil; «la exhalación de la vida» procura conservar la metáfora de la expiración, es decir, de un último aliento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - ojos de
  lexicon: HALOT
  rationale: Conservo la imagen literal del constructo hebreo. En español, ‘los ojos de’ es natural y mantiene el paralelismo con el verbo siguiente.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: ‘Impíos’ comunica el matiz moral y bíblico de רְשָׁעִים en un registro digno y ampliamente comprensible.
- source_word: תִּכְלֶינָה
  english_pob_choice: will fail
  chosen_spanish: se agotarán
  alternatives_spanish:
  - fallarán
  - se consumirán
  - se extinguirán
  lexicon: HALOT
  rationale: Con ‘ojos’ como sujeto, el hebreo expresa cansancio/agotamiento de la expectativa. ‘Se agotarán’ conserva la imagen de ojos exhaustos sin perder naturalidad en español.
- source_word: מָנוֹס
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - escape
  - huida
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que optó por ‘refuge’. ‘Refugio’ permite reflejar el sentido de posibilidad o lugar de escape sin volverlo demasiado abstracto.
- source_word: אָבַד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - desaparecerá
  - se perderá
  - se extinguirá
  lexicon: HALOT
  rationale: ‘Perecerá’ reproduce bien el valor de desaparición/ruina del verbo en estilo poético.
- source_word: תִקְוָתָם
  english_pob_choice: their hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su expectativa
  lexicon: HALOT
  rationale: ‘Esperanza’ es la equivalencia española más natural y fiel para תִקְוָה en este contexto.
- source_word: מַפַּח נָפֶשׁ
  english_pob_choice: the breathing out of life
  chosen_spanish: el exhalar de la vida
  alternatives_spanish:
  - el aliento postrero
  - la expiración de la vida
  - un último aliento
  lexicon: HALOT
  rationale: La frase hebrea es difícil y apunta a la imagen de exhalar/expirar. ‘El exhalar de la vida’ preserva la metáfora y la referencia a la muerte sin interpretarla en exceso.
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó ‘escape’ a ‘refuge’ para מָנוֹס y ‘a last breath’ a ‘the breathing out of life’ para מַפַּח נָפֶשׁ; esta traducción sigue esa revisión y mantiene la dificultad poética del cierre.
  spanish_consistency_notes:
  - Uso ‘impíos’ como equivalente bíblico de רְשָׁעִים, coherente con registro formal.
  - Conservo el paralelismo y la imaginería corporal (‘ojos’, ‘refugio’, ‘exhalar’) en vez de parafrasear de modo explicativo.
  - ‘Perecerá’ y ‘su esperanza’ mantienen el tono futuro del verso en español.
  - La nota al pie marca la alternativa semántica de תִּכְלֶינָה y la dificultad de מַפַּח נָפֶשׁ.
