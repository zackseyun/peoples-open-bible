translation:
  language: es
  text: Su longitud será de un codo, y su anchura, de un codo; será cuadrado[b], y su altura, de dos codos. Sus cuernos serán de una sola pieza con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'de él'; es decir, los cuernos del altar debían hacerse como una sola pieza con el altar mismo, no añadirse por separado.
    reason: lexical_alternative
  - marker: b
    text: El hebreo רָבוּעַ describe una figura cuadrada; versiones tradicionales inglesas suelen verterlo como 'foursquare'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַמָּה
  english_pob_choice: a cubit
  chosen_spanish: un codo
  alternatives_spanish:
  - un codo de longitud
  - un codo exacto
  lexicon: HALOT
  rationale: Se conserva la medida antigua 'codo' para mantener correspondencia formal con el hebreo y con la tradición de medidas del tabernáculo, sin convertirla a una unidad moderna imprecisa.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - su extensión
  lexicon: HALOT
  rationale: El sustantivo de dimensión expresa con claridad la medida lineal del altar y suena natural en español técnico-bíblico.
- source_word: רָחְבּוֹ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su amplitud
  lexicon: HALOT
  rationale: '''Anchura'' preserva el valor dimensional de la forma hebrea y mantiene un registro digno y preciso.'
- source_word: רָבוּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - de cuatro lados
  - foursquare
  lexicon: HALOT
  rationale: '''Cuadrado'' es la equivalencia más clara en español moderno para la forma geométrica descrita; evita el arcaísmo de ''de cuatro lados'' y comunica el mismo rasgo arquitectónico.'
- source_word: יִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - ha de ser
  - deberá ser
  lexicon: HALOT
  rationale: El imperfecto en instrucciones puede expresar prescripción; en español, 'será' reproduce bien el valor normativo sin recargar el estilo.
- source_word: אַמָּתַיִם
  english_pob_choice: two cubits
  chosen_spanish: dos codos
  alternatives_spanish:
  - dos codos de altura
  - dos medidas de codo
  lexicon: HALOT
  rationale: El dual hebreo indica dos unidades; 'dos codos' es la forma natural y fiel en español.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - su elevación
  lexicon: HALOT
  rationale: En contexto arquitectónico, 'altura' es la opción precisa y más clara para el lector español.
- source_word: מִמֶּנּוּ
  english_pob_choice: of one piece with it
  chosen_spanish: de una sola pieza con él
  alternatives_spanish:
  - del mismo bloque que él
  - saliendo de él
  lexicon: HALOT
  rationale: La preposición literalmente puede significar 'de él', pero el contexto artesanal exige la idea de construcción integral; 'de una sola pieza con él' conserva esa fuerza sin traducir de modo mecánico.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - sus puntas
  - sus salientes en forma de cuerno
  lexicon: HALOT
  rationale: Se mantiene el término cultual 'cuernos' para las protuberancias del altar, preservando la terminología bíblica y sus ecos intertextuales.
theological_decisions:
- issue: Construcción integral de los cuernos del altar
  english_pob_reading: The altar's horns were to be made as one piece with the altar itself, not attached separately.
  chosen_spanish_reading: Los cuernos debían ser hechos de una sola pieza con el altar, no añadidos aparte.
  alternative_spanish_readings:
  - Los cuernos saldrán de él
  - Sus cuernos serán del mismo material que él
  rationale: 'Se conserva la tensión entre el sentido literal de ''desde/de él'' y la intención técnica: no una simple unión externa, sino una fabricación integral. Esto evita perder la precisión del texto fuente.'
  doctrine_reference: Ex 30:2; cf. Ex 27:2
- issue: Forma geométrica del altar
  english_pob_reading: Traditional English versions often render רָבוּעַ as 'foursquare.'
  chosen_spanish_reading: El altar será cuadrado.
  alternative_spanish_readings:
  - será de cuatro lados
  - será cuádruple
  rationale: '''Cuadrado'' expresa con naturalidad la figura requerida. Se evita el arcaísmo, pero se mantiene el valor geométrico exacto del hebreo.'
  doctrine_reference: Ex 30:2
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de Éxodo 30:2 y mantiene el mismo contenido que la versión inglesa auditada. Se preserva la medida antigua 'codo', la terminología cultual 'cuernos' y la lectura técnica de מִמֶּנּוּ como construcción de una sola pieza. No se detectaron revisiones aplicadas en el historial inglés, por lo que la propuesta española refleja ese estado estable.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico formal pero contemporáneo.
  - Se conserva 'codos' y no se convierte la medida a unidades modernas.
  - '''Cuernos'' se usa en sentido cultual, no zoológico.'
  - La nota a aclara el valor técnico de 'de una sola pieza con él' sin cambiar el texto principal.
  - La nota b explica 'cuadrado' como equivalente de רָבוּעַ y preserva la alternativa tradicional 'foursquare'.
