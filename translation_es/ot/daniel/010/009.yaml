translation:
  language: es
  text: Entonces oí el sonido de sus palabras[a], y cuando oí el sonido de sus palabras, caí en un sueño profundo[b] sobre mi rostro, con mi rostro hacia la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la voz de sus palabras».
    reason: lexical_alternative
  - marker: b
    text: O «caí dormido» o «quedé aturdido hasta dormirme»; el hebreo indica un sueño pesado o profundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  english_pob_choice: Then I heard
  chosen_spanish: Entonces oí
  alternatives_spanish:
  - Y oí
  - Así que oí
  lexicon: BDB/HALOT
  rationale: El wayyiqtol narra secuencia. «Entonces» mantiene el avance narrativo natural en español sin perder el valor consecutivo de la forma verbal.
- source_word: ק֣וֹל דְּבָרָיו
  english_pob_choice: the sound of his words
  chosen_spanish: el sonido de sus palabras
  alternatives_spanish:
  - la voz de sus palabras
  - el sonido de su խոսa
  lexicon: HALOT
  rationale: קול abarca «sonido/voz»; דְּבָרָיו es «sus palabras». «El sonido de sus palabras» conserva la redundancia hebrea de modo claro y natural en español.
- source_word: וּכְשָׁמְעִי
  english_pob_choice: and when I heard
  chosen_spanish: y cuando oí
  alternatives_spanish:
  - y al oír
  - y cuando escuché
  lexicon: HALOT
  rationale: La construcción temporal se vierte de forma directa con «cuando». «Oí» mantiene la sencillez del verbo שמע sin introducir un matiz más fuerte de «escuchar».
- source_word: נִרְדָּם
  english_pob_choice: in a deep sleep
  chosen_spanish: en un sueño profundo
  alternatives_spanish:
  - en profundo sueño
  - quedé profundamente dormido
  - caí en un profundo letargo
  lexicon: HALOT
  rationale: El hebreo indica sueño pesado o profundo. En español, «sueño profundo» refleja bien esa intensidad; en la frase completa se hace explícito el movimiento con «caí», siguiendo el sentido verbal resaltado en la revisión inglesa.
- source_word: עַל פָּנַי
  english_pob_choice: on my face
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - sobre mi rostro
  - con la cara en el suelo
  lexicon: HALOT
  rationale: La expresión hebrea describe la postura de postración. En español, «con el rostro en tierra» comunica la posición con claridad y evita una repetición dura al combinarse con la siguiente cola.
- source_word: וּפָנַי אָרְצָה
  english_pob_choice: with my face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara hacia el suelo
  - con el rostro hacia el suelo
  lexicon: HALOT
  rationale: אָרְצָה es direccional hacia la tierra/suelo. La misma imagen de postración se conserva en español para no debilitar el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Naturaleza del estado de Daniel al oír las palabras
  english_pob_reading: physical collapse into deep sleep/prostration
  chosen_spanish_reading: caí en un sueño profundo, con el rostro en tierra
  alternative_spanish_readings:
  - quedé en trance
  - caí en éxtasis
  - me desmayé
  rationale: El hebreo נִרְדָּם apunta primariamente a sueño profundo o pesada somnolencia, y el contexto describe postración corporal. Por eso se evita imponer una categoría técnica como «trance» o «éxtasis».
  doctrine_reference: Daniel 10:9; cf. uso léxico de רדם en contextos de sueño profundo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que cambió «I was in a deep sleep» por «I fell into a deep sleep» para reflejar mejor el matiz verbal de caer/ser vencido por el sueño. La redacción española incorpora ese movimiento con «caí en un sueño profundo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Señor/Cristo» no aplica aquí; no hay sustituciones litúrgicas.
  - Se preserva la duplicación retórica de «el sonido de sus palabras» en ambas cláusulas, en línea con el hebreo y con la POB inglesa.
  - La imagen final se traduce con «con el rostro en tierra» para mantener la idea de postración y la orientación espacial del hebreo.
