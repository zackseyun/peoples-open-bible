translation:
  language: es
  text: Y él mismo será puro[a] de todo pecado, para gobernar a grandes pueblos, reprender a los gobernantes y quitar a los pecadores con la fuerza de su palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαρὸς ἀπὸ ἁμαρτίας
  english_pob_choice: pure from sin
  chosen_spanish: puro de pecado
  alternatives_spanish:
  - limpio de pecado
  - sin pecado
  lexicon: BDAG
  rationale: καθαρὸς expresa pureza o limpieza moral, no libertad. En español, "puro de pecado" conserva esa cualidad moral con naturalidad y sin añadir una idea ajena de emancipación. Se evita "sin pecado" como formulación más interpretativa, aunque es posible en el sentido general.
- source_word: ἄρχειν
  english_pob_choice: to rule
  chosen_spanish: gobernar
  alternatives_spanish:
  - reinar sobre
  - mandar
  lexicon: BDAG
  rationale: ἄρχειν denota ejercicio de autoridad. "Gobernar" comunica bien la función régia sin forzar una imagen exclusivamente monárquica que el español podría cerrar demasiado.
- source_word: λαοὺς μεγάλους
  english_pob_choice: great peoples
  chosen_spanish: pueblos grandes
  alternatives_spanish:
  - grandes naciones
  - muchos pueblos
  lexicon: BDAG
  rationale: λαοὺς conserva el plural de pueblos, no simplemente "naciones". "Pueblos grandes" mantiene la estructura del griego y el alcance plural étnico-político; el adjetivo se conserva con su valor más directo.
- source_word: ἐλέγξαι
  english_pob_choice: to rebuke
  chosen_spanish: reprender
  alternatives_spanish:
  - reprochar
  - convencer de culpa
  - corregir
  lexicon: BDAG
  rationale: En este contexto de autoridad sobre gobernantes, ἐλέγξαι implica censura o reprensión judicial. "Reprender" es una equivalencia clara y digna en español, sin perder la fuerza de corrección pública.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los príncipes
  - los dirigentes
  lexicon: BDAG
  rationale: ἄρχοντας se refiere a quienes ejercen mando. "Gobernantes" mantiene el valor político y no introduce una terminología eclesiástica o cortesana ajena al pasaje.
- source_word: ἐξᾶραι
  english_pob_choice: to remove
  chosen_spanish: quitar
  alternatives_spanish:
  - eliminar
  - sacar
  - expulsar
  lexicon: LSJ
  rationale: El verbo indica quitar, remover o sacar. "Quitar" es suficientemente amplio para no fijar prematuramente si la idea es expulsión o eliminación, algo que el griego deja relativamente abierto.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los que pecan
  lexicon: BDAG
  rationale: ἁμαρτωλοὺς es el sustantivo normal para "pecadores". La traducción directa preserva el contraste moral del texto sin suavizarlo ni reformularlo perifrásticamente.
- source_word: ἐν ἰσχύϊ λόγου
  english_pob_choice: by the strength of his word
  chosen_spanish: con la fuerza de su palabra
  alternatives_spanish:
  - por la fuerza de su palabra
  - con el poder de su palabra
  - mediante la fuerza de su palabra
  lexicon: BDAG
  rationale: La frase indica eficacia poderosa ejercida por medio del hablar. En español, "con la fuerza de su palabra" suena natural y mantiene el instrumento/medio sin convertirlo en una explicación más interpretativa.
theological_decisions:
- issue: Sinlessness of the messianic figure
  english_pob_reading: pure from sin
  chosen_spanish_reading: puro de pecado
  alternative_spanish_readings:
  - sin pecado
  - limpio de pecado
  rationale: El griego afirma una pureza moral respecto del pecado. "Puro de pecado" conserva la afirmación sin añadir formulaciones doctrinales posteriores; además, responde mejor al valor léxico de καθαρὸς que una expresión de libertad o separación conceptual.
  doctrine_reference: moral purity / sinlessness
- issue: Scope of punitive authority over rulers and sinners
  english_pob_reading: to rebuke rulers, and to remove sinners
  chosen_spanish_reading: reprender a los gobernantes y quitar a los pecadores
  alternative_spanish_readings:
  - reprender a los príncipes y expulsar a los pecadores
  - corregir a los gobernantes y eliminar a los pecadores
  rationale: El texto presenta autoridad real/judicial sobre gobernantes y pecadores. "Reprender" y "quitar" preservan la fuerza del pasaje sin decidir más de lo necesario entre expulsión y eliminación; así se respeta la amplitud del griego.
  doctrine_reference: messianic royal judgment
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en καθαρὸς: de "free from sin" a "pure from sin" por precisión léxica. La versión española sigue esa corrección y evita un equivalente de libertad; además, conserva la apertura de ἐξᾶραι con "quitar" en vez de fijar "expulsar".'
  spanish_consistency_notes:
  - Se usa "Yahvé" como término por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '"pecado/pecadores" se mantiene de forma uniforme para ἁμαρτία / ἁμαρτωλοί.'
  - '"gobernar" y "gobernantes" conservan la familia léxica de autoridad del pasaje.'
  - '"palabra" traduce λόγος en sentido de expresión autoritativa, no como "Verbo" teológico abstracto.'
