review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: avance hostil contra Judá, irrupción/invasión, saqueo de los bienes de la casa del rey, captura de hijos y mujeres, y la excepción del único hijo sobreviviente. Sin embargo, la nota al pie está anclada en ‘invadieron’, cuando el contenido de la nota corresponde al nombre ‘Jehoahaz’; eso rompe la trazabilidad del aparato crítico con la decisión textual documentada. Además, en español conviene hispanizar el nombre alternativo principal a ‘Joacaz’ para corresponder al hebreo יְהוֹאָחָז, manteniendo la nota sobre su identificación probable con Ocozías.'
  spanish_quality_summary: El español es claro y natural. ‘Subieron contra Judá’ y ‘se llevaron’ funcionan bien. ‘Invadieron la tierra’ añade ‘la tierra’, que no está explícito en el hebreo; aunque aclara el referente, es más ceñido y natural decir simplemente ‘la invadieron’ o ‘invadieron Judá’. También es preferible mover la nota al nombre propio pertinente.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La cuestión relevante es onomástica: el texto principal debe conservar la lectura masorética del nombre, mejor representada en español como ‘Joacaz’, con nota sobre su probable identidad con Ocozías. El borrador usa ‘Jehoahaz’, forma más inglesa que española e inconsistente con una meta de legibilidad eclesial en español.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en ‘invadieron’ en vez de en el nombre ‘Jehoahaz/Joacaz’.
    rationale: La nota explica la identificación alternativa del personaje, no el verbo de invasión. El marcador debe aparecer junto al nombre correspondiente para conservar claridad editorial y fidelidad al razonamiento documentado.
  - severity: medium
    issue: El nombre principal ‘Jehoahaz’ no está hispanizado naturalmente para una Biblia en español.
    rationale: Dado que el texto meta es español eclesial legible, ‘Joacaz’ es la forma española normal del nombre hebreo Jehoahaz. Mantiene la lectura masorética sin arrastrar una transliteración inglesa.
  - severity: low
    issue: ‘Invadieron la tierra’ introduce ‘la tierra’, ausente del hebreo.
    rationale: Aunque el referente es claro por el sufijo femenino de ‘la’, el añadido no es necesario. ‘La invadieron’ preserva mejor la referencia a Judá ya mencionada y suena natural en español.
  revised_spanish_text: Subieron contra Judá y la invadieron, y se llevaron todas las posesiones halladas en la casa del rey, y también a sus hijos y a sus mujeres; de modo que no le quedó hijo, excepto Joacaz[a], el menor de sus hijos.
  revised_footnotes:
  - marker: a
    text: Joacaz probablemente es la misma persona que en otros lugares se llama Ocozías (compárese 2 Reyes 8:24–26; 2 Crónicas 22:1).
    reason: alternative_reading
  revision_rationale: Se corrigió el anclaje de la nota para que recaiga sobre el nombre propio al que realmente explica. También se ajustó ‘Jehoahaz’ a la forma española ‘Joacaz’, más adecuada para una traducción bíblica en español y fiel a la decisión de conservar la lectura masorética en el texto principal. Finalmente, ‘invadieron la tierra’ se simplificó a ‘la invadieron’ para evitar añadir un sustantivo no expreso en el hebreo.
